  ### subprogram\n\n函数 `utl_call_stack.subprogram` 返回一个可变数组，其中包含从你作为参数传递的层级开始的所有程序名称。层级\
  \ 1 是当前程序，层级 2 是“父”程序，依此类推。可变数组是从底向上填充的，其中当前程序是数组中的最后一项。\n\n为了演示此函数的工作原理，请将\n\n\
  ```\n-----8<-replace-start------\nnull;\n------8<-replace-end------\n```\n\n替换为\n\
  \n```\n-----8<-replace-start------\nl_subprogram := utl_call_stack.subprogram( 1\
  \ );\ndbms_output.put_line('subprograms ');\nfor indx in l_subprogram.first .. l_subprogram.last\n\
  loop\ndbms_output.put_line(to_char(indx) || ')' ||\nl_subprogram(indx));\nend loop;\n\
  ------8<-replace-end------\n```\n\n如果你调用公共过程，输出如下：\n\n```\nbegin\nutl_call_stack_demo_subprogram.public_procedure;\n\
  end;\n/\nsubprograms\n1)UTL_CALL_STACK_DEMO\n2)PUBLIC_PROCEDURE\n调用本地过程\nsubprograms\n\
  1)UTL_CALL_STACK_DEMO\n2)PUBLIC_PROCEDURE\n3)LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE\n\
  调用本地过程中的本地过程\nsubprograms\n1)UTL_CALL_STACK_DEMO\n2)PUBLIC_PROCEDURE\n3)LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE\n\
  4)LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n调用私有过程\nsubprograms\n1)UTL_CALL_STACK_DEMO\n\
  2)PRIVATE_PROCEDURE\n调用私有过程中的本地过程\nsubprograms\n1)UTL_CALL_STACK_DEMO\n2)PRIVATE_PROCEDURE\n\
  3)LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE\n调用本地过程中的本地过程\nsubprograms\n1)UTL_CALL_STACK_DEMO\n\
  2)PRIVATE_PROCEDURE\n3)LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE\n4)LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
  PL/SQL 过程已成功完成\n```\n\n\n### `concatenate_subprogram`\n\n除了分别获取各个子程序名称外，你也可以方便地将子程序的变长数组（varray）连接成一个\
  \ `VARCHAR2` 字符串，其中包含以点号分隔的单元限定名称。`utl_call_stack.concatenate_subprogram` 过程的输入参数是一个变长数组，你可以使用\
  \ `utl_call_stack.subprogram` 过程来获取它。\n\n以下是一个调用此过程的示例：\n\n```\nutl_call_stack.concatenate_subprogram\n\
  ( utl_call_stack.subprogram( 1 ) );\n```\n\n为了演示此函数的功能，请将以下代码：\n\n```\n-----8<-replace-start------\n\
  null;\n------8<-replace-end------\n```\n\n替换为：\n\n```\n-----8<-replace-start------\n\
  dbms_output.put_line\n( utl_call_stack.concatenate_subprogram\n( utl_call_stack.subprogram(\
  \ 1 ) )\n);\n------8<-replace-end------\n```\n\n如果你调用公共过程，输出如下：\n\n```\nbegin\n\
  utl_call_stack_demo_concatenate_subprogram.public_procedure;\nend;\n/\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE\n\
  调用局部过程\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE\n\
  调用局部过程中的局部过程\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
  调用私有过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE\n调用私有过程中的局部过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE\n\
  调用局部过程中的局部过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
  PL/SQL 过程已成功完成。\n```\n\n### `owner`\n\n`utl_call_stack.owner` 函数返回子程序的所有者名称。其参数与你用于\
  \ `utl_call_stack.subprogram` 函数的参数相同。此函数的返回值是单个 `VARCHAR2` 字符串，表示给定层级的所有者，而不是整个堆栈的变长数组。\n\
  \n### `unit_line`\n\n使用 `utl_call_stack.unit_line`，你可以获取对程序进行调用的位置的行号。这些行号是调用堆栈中不同程序里的行号，而不仅仅是当前程序的行号。\n\
  \n为了演示此函数的功能，请将以下代码：\n\n```\n-----8<-replace-start------\nnull;\n------8<-replace-end------\n\
  ```\n\n替换为：\n\n```\n-----8<-replace-start------\nfor i in 1 .. utl_call_stack.dynamic_depth\
  \ loop\n  if i > 1 then\n    dbms_output.put('->');\n  end if;\n  dbms_output.put(to_char(utl_call_stack.unit_line(i)));\n\
  end loop;\ndbms_output.put_line('');\n------8<-replace-end------\n```\n\n如果你调用公共过程，输出如下：\n\
  \n```\nbegin\nutl_call_stack_demo_unit_line.public_procedure;\nend;\n/\n2->97\n\
  调用局部过程\n2->107->81\n调用局部过程中的局部过程\n2->107->91->66\n调用私有过程\n2->109->44\n调用私有过程中的局部过程\n\
  2->109->54->28\n调用局部过程中的局部过程\n2->109->54->38->13\nPL/SQL 过程已成功完成。\n```\n\n### 摘要\n\
  \n有很多可用的工具包。使用 `DBMS_SESSION` 中的过程和函数，你可以确保设置了正确的角色以及 `NLS` 设置是正确的。为了便于调试，可以设置会话标识符。使用\
  \ `DBMS_UTILITY` 和 `UTL_CALL_STACK` 中的过程和函数，你可以精确查询程序当前的位置以及它是如何到达那里的。使用这些过程和函数来检测你的代码，以便在发生意外情况时，能够弄清楚是什么、何时以及为什么发生的。\n\
  \n## 18. 查看你需要看到的内容\n\n如果你将数据存储在数据库中，它并不需要随时对所有人可见。有时你不想让人们看到你的数据。有时你希望某些群体看到你的数据，而其他群体看不到。有时你希望你的数据在特定时间段内可用。Oracle\
  \ 数据库为这些问题提供了不同的机制。\n\n### 时间有效性\n\n有时我们数据库中的数据只在特定时间段内有效。你可以简单地为新时间段将行更新为新值。但如果你需要能够检索某个时间点的数据呢？这意味着需要引入历史表，其中记录了表的所有更新，然后创建查询来检索所需的数据。\n\
  \n### 设置\n\nOracle Database 12c (12.1) 引入了 `temporal validity`（时间有效性）的概念。通过在表中使用两个\
  \ DATE 或 TIMESTAMP 列，Oracle Database 可以确定一条记录是否应包含在查询的结果集中。这些列可以是已有的列，也可以在创建有效期时自动创建。\n\
  \n假设你创建了一个关于一级方程式赛车手及其合同的表。使用可用数据创建一个表。这并不意味着结果是完全准确的，但对本示例而言是可行的。\n\n我们的假设如下：\n\
  \n*   车手为某车队参加的第一场比赛是合同开始日期。\n*   车手为某车队参加的最后一场比赛是合同结束日期。\n*   只显示 1965 年以来的合同（在此之前，可用数据不够准确）。\n\
  \n在这种情况下，你可以采用两种方法。一种是使用 `driverid` 和 `constructorid` 创建一个表，为合同添加一个有效期，这会自动添加开始和结束日期列，然后使用查询来填充表。\n\
  \n另一种可能性是创建表时就已经包含开始和结束日期列（例如，通过运行一个 `Create Table As Select` 语句），然后使用现有列添加合同的有效期。\n\
  \n这两种方法的主要区别在于，当列是自动创建时，它们被创建为不可见列，在描述表时不可见。新创建列的名称为 `<periodname>_start` 和 `<periodname>_end`。\n\
  \n在向表添加有效期时创建的检查约束会检查有效期的开始日期是否小于结束日期。如果任何一个值为 NULL，则该约束也被视为有效。\n\n使用清单 [18-1] 中的脚本创建表并添加有效期。\n\
  \n```\ncreate table driverconstructors as\nwith resultrace as\n( select rsl.driverid\n\
  , rsl.constructorid\n, rcs.year\n, rcs.round\n, rcs.race_date\nfrom   f1data.results\
  \ rsl\njoin   f1data.races   rcs\non     ( rsl.raceid = rcs.raceid )\nwhere  1 =\
  \ 1\nand    rcs.race_date > to_date('19650101', 'YYYYMMDD')\n)\n, contractinfo as\n\
  ( select rrc.driverid\n, rrc.constructorid\n, rrc.year\n, rrc.round\n, case\nwhen\
  \ lag( rrc.constructorid )\nover( partition by rrc.driverid order by year\n,round\
  \ ) = rrc.constructorid\nthen\nnull\nelse\nrrc.race_date\nend begincontract\n, case\n\
  when lead( rrc.constructorid )\nover( partition by rrc.driverid order by year\n\
  ,round ) = rrc.constructorid\nthen\nnull\nelse\nrrc.race_date\nend endcontract\n\
  from   resultrace rrc\n)\n, contracts as\n( select cif.driverid\n, cif.constructorid\n\
  , cif.year\n, cif.round\n, cif.begincontract\n, cif.endcontract\n, sum( case\nwhen\
  \ cif.begincontract is null\nthen\n\nelse\n\nend )\nover ( partition by driverid\
  \ order by year\n, round) contractnumber\nfrom   contractinfo cif\n)\n, all_contracts\
  \ as\n( select con.contractnumber\n, con.driverid\n, con.constructorid\n, min(con.begincontract)\
  \ as startcontract\n, max(con.endcontract) as endcontract\nfrom   contracts con\n\
  group  by con.driverid\n, con.constructorid\n, con.contractnumber)\nselect act.driverid\n\
  , act.constructorid\n, act.startcontract\n, greatest( act.startcontract + 1 / 24\
  \ / 60 / 60\n, act.endcontract) as endcontract\nfrom   all_contracts act\n/\n```\n\
  \n**清单 18-1**\n创建 `drivercontracts` 表\n\n创建表后，使用两个现有列 `startcontract` 和 `endcontract`\
  \ 向此表添加有效期。\n\n```\nalter table driverconstructors add period for drivercontract\
  \ (startcontract, endcontract)\n/\n```\n\n如果有效期的开始日期小于或等于指定日期，且有效期的结束日期大于指定日期，则该记录属于有效期内。日期的\
  \ NULL 值被视为无限小。对于开始日期，这意味着时间的起点；对于结束日期，这意味着时间的终点。\n\n### “As of” 查询\n\n以下查询允许你从表中仅检索在指定日期有效的记录。\n\
  \n```\nselect ... from <table_name> as of period for <period_name> <date_expression>\n\
  ```\n\n使用在 `DRIVERCONSTRUCTORS` 表上定义的周期，你可以查找在某个特定时间点有合同的车手。让我们查看 2022 赛季开始时的情况。\n\
  \n```\nselect d.forename as firstname\n, d.surname  as lastname\n, c.name     as\
  \ constructorname\nfrom   driverconstructors as of period\nfor    drivercontract\
  \ to_date( '20220320', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non     (dc.driverid\
  \ = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid = c.constructorid)\n\
  order  by constructorname, lastname, firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAME\n\
  ------------ ------------ ----------------\nValtteri     Bottas       Alfa Romeo\n\
  Guanyu       Zhou         Alfa Romeo\nPierre       Gasly        AlphaTauri\nYuki\
  \         Tsunoda      AlphaTauri\nFernando     Alonso       Alpine F1 Team\nEsteban\
  \      Ocon         Alpine F1 Team\nNico         Hülkenberg   Aston Martin\nLance\
  \        Stroll       Aston Martin\nSebastian    Vettel       Aston Martin\nCharles\
  \      Leclerc      Ferrari\nCarlos       Sainz        Ferrari\nKevin        Magnussen\
  \    Haas F1 Team\nMick         Schumacher   Haas F1 Team\nLando        Norris \
  \      McLaren\nDaniel       Ricciardo    McLaren\nLewis        Hamilton     Mercedes\n\
  George       Russell      Mercedes\nSergio       Pérez        Red Bull\nMax    \
  \      Verstappen   Red Bull\nAlexander    Albon        Williams\nNicholas     Latifi\
  \       Williams\n21 rows selected\n```\n\n你可以为 “as of” 周期使用任何日期。因此，如果你想查看 1998\
  \ 赛季开始时的车手，查询将如下所示。\n\n```\nselect d.forename as firstname\n, d.surname  as lastname\n\
  , c.name     as constructorname\nfrom   driverconstructors as of period\nfor   \
  \ drivercontract to_date( '19980308', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\n\
  on     (dc.driverid = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid\
  \ = c.constructorid)\norder  by constructorname, lastname, firstname\n/\nFIRSTNAME\
  \    LASTNAME     CONSTRUCTORNAME\n------------ ------------ ----------------\n\
  Pedro        Diniz        Arrows\nMika         Salo         Arrows\nGiancarlo  \
  \  Fisichella   Benetton\nAlexander    Wurz         Benetton\nEddie        Irvine\
  \       Ferrari\nMichael      Schumacher   Ferrari\nDamon        Hill         Jordan\n\
  Ralf         Schumacher   Jordan\nDavid        Coulthard    McLaren\nMika      \
  \   Häkkinen     McLaren\nTarso        Marques      Minardi\nShinji       Nakano\
  \       Minardi\nEsteban      Tuero        Minardi\nOlivier      Panis        Prost\n\
  Jarno        Trulli       Prost\nJean         Alesi        Sauber\nJohnny      \
  \ Herbert      Sauber\nRubens       Barrichello  Stewart\nJan          Magnussen\
  \    Stewart\nRicardo      Rosset       Tyrrell\nToranosuke   Takagi       Tyrrell\n\
  Heinz-Harald Frentzen     Williams\nJacques      Villeneuve   Williams\n23 rows\
  \ selected\n```\n\n> **提示：**\n> “as of”的一个典型用法是查询 `as of period for ... sysdate`\
  \ 以检索当前有效的数据。\n\n\n#### 查询间的版本 (Versions Between Queries)\n\n如果你想查看某位车手曾效力于哪些车队，可以使用\
  \ `versions between` 构造。若想查看基米·莱科宁 (Kimi Räikkönen) 的合同记录，请使用以下查询。\n\n```sql\nselect\
  \ d.forename as firstname\n, d.surname  as lastname\n, c.name     as constructorname\n\
  , dc.startcontract\n, dc.endcontract\nfrom   driverconstructors versions period\
  \ for drivercontract\nbetween to_date( '19900101', 'YYYYMMDD' )\nand     to_date(\
  \ '20230101', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non     (dc.driverid = d.driverid)\n\
  join   f1data.constructors c\non     (dc.constructorid = c.constructorid)\nwhere\
  \  d.surname = 'Räikkönen'\norder  by dc.startcontract\n, dc.endcontract\n/\nFIRSTNAME\
  \   LASTNAME    CONSTRUCTORNAME STARTCONTRACT ENDCONTRACT\n----------- -----------\
  \ --------------- ------------- -----------\nKimi        Räikkönen   Sauber    \
  \      04/03/2001    14/10/2001\nKimi        Räikkönen   McLaren         03/03/2002\
  \    22/10/2006\nKimi        Räikkönen   Ferrari         18/03/2007    01/11/2009\n\
  Kimi        Räikkönen   Lotus F1        18/03/2012    03/11/2013\nKimi        Räikkönen\
  \   Ferrari         16/03/2014    25/11/2018\nKimi        Räikkönen   Alfa Romeo\
  \      17/03/2019    12/12/2021\n6 rows selected\n```\n\n你也可以查询哪些车手曾效力于某个特定车队。\n\
  \n```sql\nselect d.forename as firstname\n, d.surname  as lastname\n, c.name   \
  \  as constructorname\n, dc.startcontract\n, dc.endcontract\nfrom   driverconstructors\
  \ versions period for drivercontract\nbetween to_date( '19900101', 'YYYYMMDD' )\n\
  and    to_date( '20230101', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non     (dc.driverid\
  \ = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid = c.constructorid)\n\
  where  c.name = 'Red Bull'\norder  by dc.startcontract\n, dc.endcontract\n/\nFIRSTNAME\
  \    LASTNAME   CONSTRUCTORNAME STARTCONTRACT ENDCONTRACT\n------------ ----------\
  \ --------------- ------------- -----------\nChristian    Klien      Red Bull  \
  \      06/03/2005    10/09/2006\nDavid        Coulthard  Red Bull        06/03/2005\
  \    02/11/2008\nVitantonio   Liuzzi     Red Bull        24/04/2005    29/05/2005\n\
  Robert       Doornbos   Red Bull        01/10/2006    22/10/2006\nMark         Webber\
  \     Red Bull        18/03/2007    24/11/2013\nSebastian    Vettel     Red Bull\
  \        29/03/2009    23/11/2014\nDaniel       Ricciardo  Red Bull        16/03/2014\
  \    25/11/2018\nDaniil       Kvyat      Red Bull        15/03/2015    01/05/2016\n\
  Max          Verstappen Red Bull        15/05/2016    03/07/2022\nPierre       Gasly\
  \      Red Bull        17/03/2019    04/08/2019\nAlexander    Albon      Red Bull\
  \        01/09/2019    13/12/2020\nSergio       Pérez      Red Bull        28/03/2021\
  \    03/07/2022\n12 rows selected\n```\n\n### DBMS_FLASHBACK_ARCHIVE\n\n使用 `dbms_flashback_archive.enable_at_valid_time`，可以将有效性日期设置为一个固定日期，这样就不必在每个查询中添加\
  \ `as of period` 子句。该过程的参数在表 18-1 中描述。\n\n表 18-1\nenable_at_valid_time 过程参数\n\n\
  | 参数 (Parameter) | 必填 (Mandatory) | 描述 (Description) |\n| --- | --- | --- |\n| level\
  \ | Y | 选项：− ALL 显示所有数据（默认值）− CURRENT 仅显示在当前时间戳有效的数据。数据会随时间推移而变得可见或不可见。− ASOF 显示在下一个参数设置的时间戳有效的数据。\
  \ |\n| query_time |   | 仅在 level 为 ASOF 时使用仅显示有效数据 |\n\n将闪回归档设置为 2022 赛季开始时。\n\n\
  ```sql\nbegin\ndbms_flashback_archive.enable_at_valid_time\n( level      => 'ASOF'\n\
  , query_time => to_date( '20220320','YYYYMMDD' )\n);\nend;\n/\n```\n\n你可以使用一个简单的查询（注意这里没有\
  \ `as of period` 子句）来获得与第一个示例相同的结果。\n\n```sql\nselect d.forename as firstname\n\
  , d.surname  as lastname\n, c.name     as constructorname\nfrom   driverconstructors\
  \  dc\njoin   f1data.drivers      d\non     (dc.driverid = d.driverid)\njoin   f1data.constructors\
  \ c\non     (dc.constructorid = c.constructorid)\norder  by constructorname, lastname,\
  \ firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAM\n------------ ------------\
  \ --------------\nValtteri     Bottas       Alfa Romeo\nGuanyu       Zhou      \
  \   Alfa Romeo\nPierre       Gasly        AlphaTauri\nYuki         Tsunoda     \
  \ AlphaTauri\nFernando     Alonso       Alpine F1 Team\nEsteban      Ocon      \
  \   Alpine F1 Team\nNico         Hülkenberg   Aston Martin\nLance        Stroll\
  \       Aston Martin\nSebastian    Vettel       Aston Martin\nCharles      Leclerc\
  \      Ferrari\nCarlos       Sainz        Ferrari\nKevin        Magnussen    Haas\
  \ F1 Team\nMick         Schumacher   Haas F1 Team\nLando        Norris       McLaren\n\
  Daniel       Ricciardo    McLaren\nLewis        Hamilton     Mercedes\nGeorge  \
  \     Russell      Mercedes\nSergio       Pérez        Red Bull\nMax          Verstappen\
  \   Red Bull\nAlexander    Albon        Williams\nNicholas     Latifi       Williams\n\
  21 rows selected\n```\n\n要恢复到“正常”操作，调用将 level 设置为 `ALL` 的 `dbms_flashback_archive.enable_at_valid_time`，或调用\
  \ `dbms_flashback_archive.disable_asof_valid_time` 过程。\n\n```sql\nbegin\ndbms_flashback_archive.disable_asof_valid_time;\n\
  end;\n/\n```\n\n### 虚拟专用数据库 (Virtual Private Database)\n\n虚拟专用数据库 (VPD) 使得每个终端用户都好像拥有自己的数据库，而实际上仍然使用单一的代码库和表集。假设一级方程式车队不允许查看其他车队的测试结果（实际情况并非如此，但在此示例中假设如此）。你可以在数据库中构建不同的模式，每个模式都有自己的表。当添加一场比赛的结果时，你必须将数据添加到正确的模式中。更简单的方法是在一个模式中创建一个表，并让\
  \ Oracle 数据库显示正确的数据。\n\n当表是 VPD 的一部分时，Oracle 数据库会在底层向针对该表发出的任何 SQL 语句添加一个额外的谓词。这可以是从该表进行的单次\
  \ `select` 查询，也可以是当该表用于连接或子查询时。要定义这个额外的谓词，你必须先定义一个策略函数，然后将此函数与表关联。\n\n#### 策略函数\
  \ (The Policy Function)\n\nOracle 数据库按顺序以两个参数 `schemaname` 和 `tablename` 调用此过程。VPD\
  \ 使用的策略函数签名如下。\n\n```sql\nfunction \n(  in varchar2\n,   in varchar2)\nreturn varchar2\n\
  ```\n\n该函数必须返回一个有效的谓词，该谓词将被添加到针对此表发出的任何 SQL 语句中。\n\n你可以在策略函数中执行任何操作，但它会被非常频繁地调用，如果函数需要很长时间才能完成，那么针对该表的每个\
  \ SQL 语句也会花费很长时间。\n\n代码清单 18-2 展示了一个策略函数，用于确保一个车队只能看到其自身的数据。\n\n```sql\ncreate or\
  \ replace function thisconstructoronly\n( schemaname_in in varchar2\n, tablename_in\
  \  in varchar2\n) return varchar2\nis\nbegin\nreturn q'[constructorid = sys_context\n\
  ( 'CONSTRUCTOR_CTX'\n, 'CONSTRUCTORID'\n)]';\nend;\n/\n代码清单 18-2\n策略函数 thisconstructoronly\n\
  ```\n\n此函数返回一个包含以下内容的 VARCHAR2。\n\n```sql\nconstructorid = sys_context( 'CONSTRUCTOR_CTX',\
  \ 'CONSTRUCTORID' )\n```\n\n\n\n#### 上下文\n\n将外部设置传递给策略函数或其生成的谓词的最简单（也是最快）的方法是使用\
  \ `应用上下文`。\n\n你可以使用以下命令创建一个上下文。\n\n```sql\ncreate or replace context constructor_ctx\
  \ using context_pkg\n/\n```\n\n然后，你需要构建一个包来在上下文中设置（或清除）属性。这些属性必须使用关联的包来设置。清单 18-3\
  \ 展示了用于与上下文通信的包。\n\n```sql\ncreate or replace package context_pkg as\nprocedure\
  \ set_constructor( constructorid_in in number );\nprocedure unset_constructor;\n\
  end;\n/\ncreate or replace package body context_pkg as\nprocedure set_constructor(constructorid_in\
  \ in number)\nis\nbegin\ndbms_session.set_context( namespace => 'CONSTRUCTOR_CTX'\n\
  , attribute => 'CONSTRUCTORID'\n, value     => constructorid_in\n);\nend set_constructor;\n\
  procedure unset_constructor\nis\nbegin\ndbms_session.clear_context( namespace =>\
  \ 'CONSTRUCTOR_CTX' );\nend unset_constructor;\nend context_pkg;\n/\n```\n\n清单 18-3\n\
  用于与 `constructor_ctx` 通信的 `context_pkg`\n\n#### 策略\n\n现在，必须将这个谓词添加到针对该表的每条语句中。你需要创建一个\
  \ VPD 策略，将策略函数连接到表上。\n\n#### add_policy\n\n`dbms_rls.add_policy` 过程可以接受表 18-2 中描述的参数。\n\
  \n表 18-3\n策略类型\n\n| 类型 | 描述 |\n| --- | --- |\n| `DYNAMIC` | 此策略类型在用户每次访问受 VPD 保护的数据库对象时运行策略函数。\
  \ |\n| `STATIC` | 此策略类型运行策略函数一次，然后将结果在 SGA 中共享。静态策略类型对实例中的所有用户强制执行相同的谓词。 |\n| `SHARED_STATIC`\
  \ | 你可以在多个表上使用相同的策略函数。 |\n| `CONTEXT_SENSITIVE` | 如果本地应用上下文没有变化，Oracle 数据库在用户会话中不会重新运行策略函数。如果用户会话期间任何应用上下文属性发生变化（甚至不必被引用）；默认情况下，数据库会重新执行策略函数以确保其捕获到自初始解析以来谓词的所有更改。\
  \ |\n| `SHARED_CONTEXT_SENSITIVE` | 当多个表使用相同的策略函数时使用此类型。 |\n\n表 18-2\n添加策略过程的参数\n\
  \n| 参数 | 是否必需 | 描述 |\n| --- | --- | --- |\n| `object_schema` | | 要保护的对象所在的模式。如果为\
  \ null，则假定为当前模式。 |\n| `object_name` | Y | 要保护的对象的名称。 |\n| `policy_name` | Y | 任意选择的名称。使用此名称来启用/禁用和删除策略。\
  \ |\n| `function_schema` | | 策略函数所在的模式。如果为 null，则假定为当前模式。 |\n| `policy_function`\
  \ | Y | 策略函数的名称。 |\n| `statement_types` | | 策略应用到的语句类型，`select`、`insert`、`update`、`delete`\
  \ 或 `index`。默认为除 `index` 外的任何类型。 |\n| `update_check` | | 根据策略检查更新或插入的值。根据策略，能够在语句执行后看到信息。\
  \ |\n| `Enable` | | 策略是否启用？ |\n| `static_policy` | | 策略是否总是产生相同的谓词？ |\n| `policy_type`\
  \ | | 从以下选项中选择：`DYNAMIC`、`STATIC`、`SHARED_STATIC`、`CONTEXT_SENSITIVE`、`SHARED_CONTEXT_SENSITIVE`。如果非\
  \ null，则覆盖 `static_policy`。（有关这些类型的说明，请参见表 18-3。） |\n| `long_predicate` | | 返回的谓词最大长度为\
  \ 4000 字节（默认）或 32K。 |\n| `sec_relevant_cols` | | 安全相关列的列表。当引用其中一列时，会执行策略函数。 |\n\
  | `sec_relevant_cols_opt` | | 如果设置为 `dbms_rls.all_rows`，则返回所有行，但将安全相关列选项中指定的列置为\
  \ null。 |\n| `namespace` | | 应用上下文命名空间的名称。 |\n| `attribute` | | 应用上下文属性的名称。 |\n\n\
  如果你查询 constructors 表，你会看到所有构造器的信息。\n\n```sql\nselect c.constructorid\n, c.name\n\
  , c.nationality\nfrom   f1data.constructors c\n/\n```\n\n```\nCONST NAME       \
  \     NATIONALITY\n----- --------------- ---------------\n1 McLaren         British\n\
  2 BMW Sauber      German\n3 Williams        British\n4 Renault         French\n\
  5 Toro Rosso      Italian\n6 Ferrari         Italian\n7 Toyota          Japanese\n\
  8 Super Aguri     Japanese\n9 Red Bull        Austrian\n10 Force India     Indian\n\
  ...\n```\n\n```sql\nselect cr.constructorresultsid as crid\n, cr.constructorid \
  \       as cid\n, cr.raceid               as rid\n, cr.points               as points\n\
  from   f1data.constructorresults cr\n/\n```\n\n```\nCRID   CID   RID POINT\n-----\
  \ ----- ----- -----\n1197     6   133    16\n1198     3   133     4\n1199    16\
  \   133     5\n1200    15   133     1\n1201    17   133     0\n1202     1   133\
  \     0\n1203    19   133     0\n1204     4   133     0\n1205    21   133     0\n\
  1206     7   133     0\n...\n```\n\n```sql\nselect cs.constructorstandingsid as\
  \ csid\n, cs.constructorid          as cid\n, cs.position               as pos\n\
  , cs.points                 as pnts\nfrom   f1data.constructorstandings cs\nwhere\
  \  rownum < 11\n/\n```\n\n```\nCSID   CID   POS  PNTS\n----- ----- ----- -----\n\
  6242    15     6    18\n6241     1     5    32\n6240    16     3    67\n6239   \
  \  3     4    41\n6238     4     2    79\n6237     6     1   174\n6256    18   \
  \ 10     1\n6255    17     9     5\n6254     7     7     8\n6253    19     8   \
  \  7\n...\n```\n\n因为这三个表都包含构造器信息（`CONSTRUCTORS`、`CONSTRUCTORRESULTS` 和 `CONSTRUCTORSTANDINGS`），并且你希望对所有三个表使用相同的策略，所以添加三个共享静态策略。\n\
  \n```sql\nbegin\nsys.dbms_rls.add_policy\n( object_schema   => 'F1DATA'\n, object_name\
  \     => 'CONSTRUCTORS'\n, policy_name     => 'THISCONSTRUCTOR'\n, function_schema\
  \ => 'BOOK'\n, policy_function => 'THISCONSTRUCTORONLY'\n, policy_type     => sys.dbms_rls.shared_static\n\
  );\nsys.dbms_rls.add_policy\n( object_schema   => 'F1DATA'\n, object_name     =>\
  \ 'CONSTRUCTORRESULTS'\n, policy_name     => 'THISCONSTRUCTORRESULT'\n, function_schema\
  \ => 'BOOK'\n, policy_function => 'THISCONSTRUCTORONLY'\n, policy_type     => sys.dbms_rls.shared_static\n\
  );\nsys.dbms_rls.add_policy\n( object_schema   => 'F1DATA'\n, object_name     =>\
  \ 'CONSTRUCTORSTANDINGS'\n, policy_name     => 'THISCONSTRUCTORSTANDING'\n, function_schema\
  \ => 'BOOK'\n, policy_function => 'THISCONSTRUCTORONLY'\n, policy_type     => sys.dbms_rls.shared_static\n\
  );\nend;\n/\n```\n\n即使策略函数返回引用上下文的谓词，它也不依赖于上下文。即使上下文发生变化，谓词文本本身仍然相同。它会根据上下文中的不同值进行不同的求值。你可以通过调用我们的\
  \ `set_constructor` 过程来设置上下文。\n\n```sql\nbegin\ncontext_pkg.set_constructor( constructorid_in\
  \ => 9 );\nend;\n/\n```\n\n当从表中选择数据时，谓词会自动添加到查询中，因此只显示红牛车队（Red Bull）的数据。\n\n\n###\
  \ 数据库策略与上下文管理\n\n#### 查询示例\n\n以下查询展示了构造函数（constructor）相关数据的检索。\n\n```\nselect c.constructorid\
  \ as cid\n, c.name          as name\n, c.nationality   as nationality\nfrom   f1data.constructors\
  \ c\n/\nCID NAME            NATIONALITY\n----- --------------- ---------------\n\
  9 Red Bull        Austrian\nselect cr.constructorresultsid as crid\n, cr.constructorid\
  \        as cid\n, cr.raceid               as rid\n, cr.points               as\
  \ points\nfrom   f1data.constructorresults cr\n/\nCRID   CID   RID POINT\n-----\
  \ ----- ----- -----\n9     9    18     0\n16     9    19     2\n27     9    20 \
  \    2\n37     9    21     4\n49     9    22     2\n58     9    23     5\n66   \
  \  9    24     6\n79     9    25     3\n92     9    26     0\n102     9    27  \
  \   0\n...\nselect cs.constructorstandingsid as csid\n, cs.constructorid       \
  \   as cid\n, cs.position               as pos\n, cs.points                 as pnts\n\
  from   f1data.constructorstandings cs\n/\nCSID   CID   POS  PNTS\n----- ----- -----\
  \ -----\n14     9     7     2\n25     9     7     4\n36     9     6     8\n47  \
  \   9     5    10\n58     9     5    15\n69     9     4    21\n80     9     4  \
  \  24\n91     9     5    24\n102     9     5    24\n113     9     6    24\n...\n\
  ```\n\n如果未设置或取消设置上下文，查询将不返回数据。\n\n```\nbegin\ncontext_pkg.unset_constructor;\nend;\n\
  /\nselect c.constructorid as cid\n, c.name          as name\n, c.nationality   as\
  \ nationality\nfrom   f1data.constructors c\n/\nCID NAME            NATIONALITY\n\
  ----- --------------- ---------------\nselect cr.constructorresultsid as crid\n\
  , cr.constructorid        as cid\n, cr.raceid               as rid\n, cr.points\
  \               as points\nfrom   f1data.constructorresults cr\n/\nCRID   CID  \
  \ RID POINT\n----- ----- ----- -----\nselect cs.constructorstandingsid as csid\n\
  , cs.constructorid          as cid\n, cs.position               as pos\n, cs.points\
  \                 as pnts\nfrom   f1data.constructorstandings cs\n/\nCSID   CID\
  \   POS  PNTS\n----- ----- ----- -----\n```\n\n#### 策略管理\n\n##### 启用策略\n\n要启用或禁用策略，需使用\
  \ `dbms_rls.enable_policy` 过程。\n\n`enable_policy` 过程可接受表 18-4 中描述的参数。\n\n表 18-4\n\
  \n启用策略过程的参数\n\n| 参数 | 是否必需 | 描述 |\n| --- | --- | --- |\n| object_schema | | 受保护对象所在的模式。如果为\
  \ null，则假定为当前模式 |\n| object_name | Y | 受保护对象的名称 |\n| policy_name | Y | 要启用或禁用的策略名称\
  \ |\n| Enable | | 使用 TRUE 启用策略，FALSE 禁用策略 |\n\n##### 删除策略\n\n当不再需要策略或需要以不同选项重新创建策略时，可使用\
  \ `dbms_rls.drop_policy` 删除它。\n\n`drop_policy` 过程可接受表 18-5 中描述的参数。\n\n表 18-5\n\n\
  删除策略过程的参数\n\n| 参数 | 是否必需 | 描述 |\n| --- | --- | --- |\n| object_schema | | 受保护对象所在的模式。如果为\
  \ null，则假定为当前模式 |\n| object_name | Y | 受保护对象的名称 |\n| policy_name | Y | 要启用或禁用的策略名称\
  \ |\n\n##### 修改策略\n\n可使用 `dbms_rls.alter_policy` 将某些属性与现有策略关联或取消关联。\n\n`alter_policy`\
  \ 过程可接受表 18-6 中描述的参数。\n\n表 18-6\n\n启用策略过程的参数\n\n| 参数 | 是否必需 | 描述 |\n| --- | ---\
  \ | --- |\n| object_schema | | 受保护对象所在的模式。如果为 null，则假定为当前模式 |\n| object_name | Y\
  \ | 受保护对象的名称 |\n| policy_name | Y | 要启用或禁用的策略名称 |\n| alter_option | | 关联的添加或移除 `dbms_rls.add_attribute_association`\
  \ `dbms_rls.remove_attribute_association` |\n| namespace | Y | 上下文的名称空间 |\n| attribute\
  \ | Y | 名称空间内的属性 |\n\n### 复杂策略\n\n你可以使用所有 SQL 技能来构建所需的任何谓词。但请注意，此谓词会被添加到语句中，并针对表中的每一行执行，而不仅仅是结果集中的行。因此，如果你构建的内容耗时很长，那么它将乘以表中的行数而耗时很长。尽量保持策略为纯\
  \ SQL。\n\n如果希望构造函数（constructor）只看到其自身车手的圈速，可以使用清单 18-4 中显示的代码。\n\n```\ncreate or\
  \ replace context constructor_ctx using context_pkg\n/\ncreate or replace package\
  \ context_pkg as\nprocedure set_constructor( constructorid_in in number );\nprocedure\
  \ unset_constructor;\nend context_pkg;\n/\ncreate or replace package body context_pkg\
  \ as\nprocedure set_constructor(constructorid_in in number) is\nbegin\ndbms_session.set_context(\
  \ namespace => 'CONSTRUCTOR_CTX'\n, attribute => 'CONSTRUCTORID'\n, value     =>\
  \ constructorid_in\n);\nEnd set_constructor;\nprocedure unset_constructor is\nbegin\n\
  dbms_session.clear_context( namespace => 'CONSTRUCTOR_CTX' );\nend unset_constructor;\n\
  end context_pkg;\n/\nbegin\ncontext_pkg.set_constructor( constructorid_in => 9 );\n\
  end;\n/\ncreate or replace function lapsforthisconstructoronly\n( schemaname_in\
  \ in varchar2\n, tablename_in  in varchar2\n) return varchar2\nis\nbegin\nreturn\
  \ q'[(raceid, driverid) in\n(select r.raceid, rs.driverid\nfrom   f1data.races r\n\
  join   f1data.results rs\non     (r.raceid = rs.raceid)\nwhere  rs.constructorid\
  \ =\nsys_context( 'CONSTRUCTOR_CTX'\n, 'CONSTRUCTORID' ) )]';\nend lapsforthisconstructoronly;\n\
  /\nselect lapsforthisconstructoronly(  null, null ) from dual\n/\nTHISCONSTRUCTORONLY(NULL,NULL)\n\
  \n(raceid, driverid) in\n(select r.raceid, rs.driverid\nfrom   f1data.races r\n\
  join   f1data.results rs\non     (r.raceid = rs.raceid)\nwhere  rs.constructorid\
  \ =\nsys_context( 'CONSTRUCTOR_CTX'\n, 'CONSTRUCTORID' ) )\nbegin\nsys.dbms_rls.add_policy\n\
  ( object_schema   => 'F1DATA'\n, object_name     => 'LAPTIMES'\n, policy_name  \
  \   => 'THISCONSTRUCTORSLAPTIMES'\n, function_schema => 'BOOK'\n, policy_function\
  \ => 'LAPSFORTHISCONSTRUCTORONLY'\n, policy_type     => sys.dbms_rls.STATIC\n);\n\
  end;\n/\n清单 18-4\n构造函数只能看到其自身车手的信息\n```\n\n### 数据脱敏\n\n在数据库中脱敏数据可确保数据仅由被授权者查看，从而使隐私规则和法规的合规性保持一致。脱敏是通过在将结果发送回调用进程时屏蔽（部分）数据来实现的。对持久化的数据不作任何更改。\n\
  \n假设你有一个 Web 应用程序，用于显示特定比赛中车手的排名。车手必须登录才能查看圈速。通过登录，会设置一个包含 `driverid` 的上下文。基于此上下文值已设置，时间和毫秒列会被显示；否则，这些列会被遮蔽。\n\
  \n首先，创建一个包含必要包的上下文，如清单 18-5 所示。\n\n```\ncreate or replace context driver_ctx using\
  \ driver_pkg\n/\ncreate or replace package driver_pkg as\nprocedure set_driver(\
  \ driverid_in in number );\nprocedure unset_driver;\nend driver_pkg;\n/\ncreate\
  \ or replace package body driver_pkg as\nprocedure set_driver(driverid_in in number)\
  \ is\nbegin\nsys.dbms_session.set_context\n( namespace => 'driver_ctx'\n, attribute\
  \ => 'driverid'\n, value     => driverid_in\n);\nend set_driver;\nprocedure unset_driver\
  \ is\nbegin\nsys.dbms_session.clear_context\n( namespace => 'driver_ctx' );\nend\
  \ unset_driver;\nend driver_pkg;\n/\n清单 18-5\n车手上下文\n```\n\n## add_policy\n\n要向表添加屏蔽策略，需要调用\
  \ `dbms_redact.add_policy` 过程。此过程的参数如表 **18-7** 所述。\n\n**表 18-7**\n\n`dbms_redact.add_policy`\
  \ 参数\n\n| 参数 | 是否必需 | 描述 |\n| --- | --- | --- |\n| `object_schema` | | 要保护的对象所在的模式。如果为\
  \ NULL，则假定为当前模式 |\n| `object_name` | 是 | 要保护的对象的名称 |\n| `policy_name` | 是 | 任意选择的名称，用于启用/禁用、更改和删除策略\
  \ |\n| `column_name` | | 策略应用到的单个列名。如果要屏蔽多个列，请使用 `ALTER_POLICY` 过程添加额外的列 |\n| `function_type`\
  \ | 是 | 要使用的屏蔽函数类型。<br>可能的值有：<br>- `DBMS_REDACT.NONE`<br>- `DBMS_REDACT.FULL`（默认）<br>-\
  \ `DBMS_REDACT.PARTIAL`<br>- `DBMS_REDACT.RANDOM`<br>- `DBMS_REDACT.REGEXP`<br>如果\
  \ `function_type` 是 `DBMS_REDACT.REGEXP`，则必须完全省略 `function_parameters`，且 `regexp_*`\
  \ 参数必须定义数据屏蔽策略 |\n| `function_parameters` | | 屏蔽函数的参数。<br>值取决于提供的 `function_type`：<br>–\
  \ `DBMS_REDACT.NONE`：可以完全省略，默认为 NULL。<br>– `DBMS_REDACT.FULL`：可以完全省略，默认为 NULL。<br>–\
  \ 部分字符屏蔽的掩码参数。<br>一个逗号分隔的列表，不同字段类型内容不同。<br>**字符数据类型**<br>− 输入格式：对每个可屏蔽的字符输入 `V`。对每个要使用格式化字符进行格式化的字符输入\
  \ `F`。确保每个字符都有对应的 `V` 或 `F` 值。<br>− 输出格式：对每个可能被屏蔽的字符输入 `V`。将输入格式中的每个 `F` 字符替换为用于显示输出的字符。<br>−\
  \ 掩码字符：指定用于屏蔽的字符。<br>− 起始数字位置：指定屏蔽的起始 `V` 数字位置。<br>− 结束数字位置：指定屏蔽的结束 `V` 数字位置。`F`\
  \ 位置不计入。<br>**数字数据类型设置**<br>− 掩码字符：指定要显示的字符。输入 0 到 9 的数字。<br>− 起始数字位置：指定屏蔽的起始数字位置，例如\
  \ 1 表示第一位。<br>− 结束数字位置：指定屏蔽的结束数字位置。<br>**日期时间数据类型设置**<br>`m`：屏蔽月份。要省略屏蔽，请输入大写 `M`。<br>`d`：屏蔽月份中的日。要省略屏蔽，请输入大写\
  \ `D`。<br>`y`：屏蔽年。要省略屏蔽，请输入大写 `Y`。<br>`h`：屏蔽小时。要省略屏蔽，请输入大写 `H`。<br>`m`：屏蔽分钟。要省略屏蔽，请输入大写\
  \ `M`。<br>`s`：屏蔽秒。要省略屏蔽，请输入大写 `S`。<br>有关不同参数的更多信息，请参阅《Oracle Database Advanced Security\
  \ Guide》文档。 |\n| `expression` | | 使用 `sys_context` 的布尔表达式。如果计算结果为 TRUE，则执行屏蔽 |\n\
  | `enable` | | 数据屏蔽策略在创建时是否启用？默认值为 TRUE |\n| `regexp_pattern` | | 正则表达式模式，最多 512\
  \ 字节 |\n| `regexp_replace_string` | | 正则表达式的替换字符串 |\n| `regexp_position` | | 从 1\
  \ 开始的整数，指定搜索必须开始的位置 |\n| `regexp_occurrence` | | `0` - 替换所有匹配项。<br>`n` - 替换第 `n`\
  \ 个匹配项 |\n| `regexp_match_parameter` | | 更改默认匹配行为。可能的值是 `'i'`、`'c'`、`'n'`、`'m'`、`'x'`\
  \ 的组合 |\n| `policy_description` | | 屏蔽策略的描述 |\n| `column_description` | | 被屏蔽列的描述\
  \ |\n\n```sql\nbegin\nsys.dbms_redact.add_policy\n( object_schema       => 'f1data'\n\
  , object_name         => 'laptimes'\n, policy_name         => 'maskedlaptime'\n\
  , column_name         => 'time'\n, function_type       => dbms_redact.partial\n\
  , function_parameters => 'VFVVFVVVVV,V:VV.VVVVV,X,1,3'\n, expression          =>\
  \ q'[sys_context( 'driver_ctx'\n, 'driverid' ) is null]'\n);\nend;\n/\n```\n\n##\
  \ alter_policy\n\n由于该表还包含毫秒时间列，因此需要将另一列添加到策略中进行屏蔽。为此使用 `dbms_redact.alter_policy`\
  \ 过程。\n\n`alter_policy` 过程可以采用与 `add_policy` 过程相同的参数，但多了一个 `action` 参数，该参数可以具有表\
  \ **18-8** 中描述的值之一。\n\n**表 18-8**\n\n`action` 参数的可能值\n\n| 常量 | 描述 |\n| --- | ---\
  \ |\n| `ADD_COLUMN` | 向屏蔽策略添加列。 |\n| `DROP_COLUMN` | 从屏蔽策略中删除列。 |\n| `MODIFY_EXPRESSION`\
  \ | 修改屏蔽策略的表达式（该表达式计算布尔值：如果为 TRUE，则应用屏蔽，否则不应用）。 |\n| `MODIFY_COLUMN` | 修改屏蔽策略中的列，以更改屏蔽函数类型\
  \ `function_type` 或函数参数 `function_parameters`。 |\n| `SET_POLICY_DESCRIPTION` | 为屏蔽策略设置描述。\
  \ |\n| `SET_COLUMN_DESCRIPTION` | 为列上执行的屏蔽设置描述。 |\n\n```sql\nbegin\nsys.dbms_redact.alter_policy\n\
  ( object_schema       => 'f1data'\n, object_name         => 'laptimes'\n, policy_name\
  \         => 'maskedlaptime'\n, action              => dbms_redact.add_column\n\
  , column_name         => 'milliseconds'\n, function_type       => dbms_redact.partial\n\
  , function_parameters => '9,1,4'\n);\nend;\n/\n```\n\n您可以通过设置上下文来测试策略。这会提供更清晰的数据。\n\
  \n```sql\nbegin\ndriver_pkg.set_driver( driverid_in => 830 );\nend;\n/\nselect *\n\
  from   f1data.laptimes\nwhere  driverid = sys_context( 'driver_ctx'\n, 'driverid'\
  \ )\n/\nRACEID DRIVERID LAP POS TIME       MILLISECO\n------ -------- --- --- ----------\
  \ ---------\n942      830   1   8 2:04.666      124666\n942      830   2   8 1:59.138\
  \      119138\n942      830   3   8 1:59.055      119055\n942      830   4   8 1:59.800\
  \      119800\n942      830   5   7 2:07.565      127565\n942      830   6   7 2:17.508\
  \      137508\n942      830   7   7 2:17.854      137854\n942      830   8   7 2:01.301\
  \      121301\n942      830   9   7 1:57.250      117250\n...\n```\n\n如果在不设置上下文或清除上下文的情况下查询计时表，则会获得屏蔽后的数据。\n\
  \n```sql\nbegin\ndriver_pkg.unset_driver;\nend;\n/\nselect *\nfrom   f1data.laptimes\n\
  where  1=1\nand    driverid = 830\n/\nRACEID DRIVERID LAP POS TIME       MILLISECO\n\
  ------ -------- --- --- ---------- ---------\n942      830   1   8 X:XX.666    \
  \  999966\n942      830   2   8 X:XX.138      999938\n942      830   3   8 X:XX.055\
  \      999955\n942      830   4   8 X:XX.800      999900\n942      830   5   7 X:XX.565\
  \      999965\n942      830   6   7 X:XX.508      999908\n942      830   7   7 X:XX.854\
  \      999954\n942      830   8   7 X:XX.301      999901\n942      830   9   7 X:XX.250\
  \      999950\n...\n```\n\n### enable_policy\n\n使用 `enable_policy` 过程来启用策略。\n\n\
  `enable_policy` 函数可以采用表 **18-9** 中描述的参数。\n\n**表 18-9**\n\n启用策略过程的参数\n\n| 参数 | 是否必需\
  \ | 描述 |\n| --- | --- | --- |\n| `object_schema` | | 要保护的对象所在的模式。如果为 NULL，则假定为当前模式\
  \ |\n| `object_name` | 是 | 要保护的对象的名称 |\n| `policy_name` | 是 | 要启用或禁用的策略的名称 |\n\n\
  ## disable_policy\n\n要禁用策略，请使用 `disable_policy` 过程。\n\n`disable_policy` 函数可以接受表\
  \ 18-10 中描述的参数。\n\n表 18-10\n\n禁用策略过程的参数\n\n| 参数 | 必填 | 描述 |\n| --- | --- | --- |\n\
  | `object_schema` |   | 受保护对象所属的模式。如果为 NULL，则假定为当前模式。 |\n| `object_name` | Y | 受保护对象的名称。\
  \ |\n| `policy_name` | Y | 您想要启用或禁用的策略的名称。 |\n\n## drop_policy\n\n如果不再需要该策略，可以使用\
  \ `dbms_redact.drop_policy` 过程将其删除。\n\n```sql\nbegin\nsys.dbms_redact.drop_policy\n\
  ( object_schema       => 'f1data'\n,object_name         => 'laptimes'\n,policy_name\
  \         => 'maskedlaptime');\nend;\n/\n```\n\n### 总结\n\nOracle Database 提供了一整套功能，可以根据规则显示或隐藏数据。时间有效性允许您只查看特定时间点有效的数据。VPD\
  \ 允许您拥有一个对不同用户可见的单一模式，就像他们在使用自己的模式和数据一样。Redaction 策略允许您向特定用户组隐藏（敏感）数据的某些部分。当用户需要看到部分（而非全部）数据时，Redaction\
  \ 非常有用。典型的场景是在呼叫中心，他们会要求提供信用卡号、电话号码、社会安全号码（SSN）等的最后几位数字来验证您的身份。\n\n## 19. 零停机时间升级应用程序\n\
  \n升级数据库应用程序总是需要停机时间。替换正在使用的 PL/SQL 对象在当时是不可能的。多年来，开发了许多技术来减少 Oracle Database 的停机时间，例如备用数据库、RAC、Streams、在线索引重建或在线表重定义。但有一件事仍然可能让用户的工作中断，那就是他们正在使用的实际数据库应用程序。为了克服这“最后一块拼图”，即能够在\
  \ PL/SQL 对象正在使用时替换它们，开发了基于版本的重定义（Edition-based redefinition）。\n\n### 停机时间\n\n本质上，有两种类型的停机时间：计划内的和计划外的。计划外的停机时间会意外发生，为此场景做准备非常困难。可以采取一些措施来减少计划外停机时间，但要消除它几乎是不可能的。\n\
  \n计划内的停机时间是预先知道的，Oracle 已经实现了相关功能来减少计划内停机时间。可以通过物理和/或逻辑备用数据库以及 RAC 来防止硬件故障。升级数据库软件本身不需要关闭数据库。当您拥有逻辑备用数据库和\
  \ Streams 时，可以在升级的同时保持数据库正常运行和可用。索引可以在线重建。表可以在线重定义，这允许数据库保持可用。\n\n唯一需要停机的是*您的*自定义应用程序。在运行时替换\
  \ PL/SQL 当时是不可能的。某个 PL/SQL 对象只能有一个版本，替换它需要锁定该对象。该对象将无法再执行，并中断正常的业务流程。当 PL/SQL 对象被替换时，依赖它的对象可能会变为无效并需要重新编译。\n\
  \n基于版本的重定义（EBR）解决了这个问题，并允许您的自定义应用程序在使用中进行升级。通过 EBR，您可以在一个版本的“私密环境”中进行 PL/SQL 更改。当自定义应用程序完全更新后，可以将其发布给用户。在升级过程中使用应用程序的最终用户可以继续工作，就像什么都没发生一样，而创建新连接的用户则立即使用新的应用程序对象。\n\
  \n在最后一个用户断开与预升级应用程序的连接后，预升级应用程序可以被停用，只剩下升级后的应用程序可用。\n\n### 定义\n\nEBR 使用了一些贯穿本章的术语。表\
  \ 19-1 概述了最常用的定义。\n\n表 19-1\n\nEBR 术语\n\n| 术语 | 描述 |\n| --- | --- |\n| Edition |\
  \ 一个标识非模式对象类型的名称，用于扩展标准命名解析。可版本化的对象通过版本、模式和对象名来标识。 |\n| Editioning view | 一种特殊类型的视图，充当底层表的抽象层。因为\
  \ editioning view 存在于特定版本中，所以它反映了底层表的当前实现。editioning view 有一些特定的限制。 |\n| Editionable\
  \ object | 可版本化的模式对象。这包括同义词、视图和所有 PL/SQL 对象类型。 |\n| Non-editionable object | 所有不可版本化的模式对象。这包括表或物化视图。版本不能拥有自己的非版本化对象的副本。非版本化对象由所有版本共享。\
  \ |\n| Crossedition trigger | 一种可以跨越版本边界的特殊触发器。 |\n| NE on E prohibition | 非版本化对象不能依赖于可版本化对象，因为版本化对象在名称解析期间是不可见的。但是，物化视图和虚拟列可以在名称解析期间指定一个评估版本。\
  \ |\n\n### 概念\n\nEBR 的目的非常直接：零停机时间打补丁或升级。如果您有条件可以安排停机时间，那么请务必这样做。这对所有相关方来说都要容易得多。\n\
  \n补丁和升级的区别如下。在理想情况下，程序的所有需求都在实际程序中实现。程序完全按照书面规范实现。当程序没有实现需求规范所规定的内容时，必须应用补丁来纠正这种情况，使实现与规范保持一致。补丁应使程序达到功能需求的标准。\n\
  \n升级的定义是在程序创建之后需求发生了变化。从这时起，文本中不再区分这两者。当提到升级时，也隐含了补丁，反之亦然。\n\n当然，当您想要零停机时间升级时，数据库并不是应用程序中唯一涉及的部分。用于建立数据库连接的方法决定了连接需要连接到哪个版本的应用程序。这可以由负载均衡器或流量导向器完成。正在进行中的会话，即连接到预升级应用程序的会话，通过一台应用服务器连接。而建立新连接的会话则使用另一台应用服务器并连接到升级后的应用程序。\n\
  \n零停机时间必须在 Oracle Database、应用服务器和客户端应用程序中有意地进行设计。\n\n实现零停机时间意味着应用程序应该始终对用户可用。这是一个巨大的挑战：使用预升级应用程序的用户不想停止他们正在做的事情来允许部署新的应用程序。想要使用升级后应用程序的用户不想等到预升级应用程序的用户完成工作后才连接到应用程序。因此，两个应用程序——预升级版本和升级后版本——需要同时处于活动状态，以便服务于使用预升级应用程序的用户，并建立到升级后应用程序的新连接。这被称为*热切换*。\n\
  \n能够在旧应用程序仍在使用时部署新应用程序，对于某些类型的应用程序来说可能很容易。部署新的源文件可能就足够了。\n\n当涉及到数据库时，这就变得困难得多。需要回答一些基本问题。\n\
  \n\n#### 零停机升级的挑战\n\n*当用户正在使用应用程序时，你该如何对其进行修改？*\n\n对应用程序进行修改通常涉及多个被修改的对象，但你不能逐一修改它们。那样会使应用程序处于无效状态。此外，在有人使用时，数据库代码*完全不可能*进行编译。所有对象需要同时被更改，但这可能会中断升级前的应用程序。\n\
  \n一种可能是使用升级前的数据库应用程序对数据库进行一次*完整副本*，并进行所需更改以达到升级后的状态。这解决了第一个问题，即能够在私密环境中进行升级工作。\n\
  \n另一个选项是复制数据库模式，并对这个新模式进行更改。\n\n两种选项都允许你在私密环境中更改对象，并为升级后的情况做好准备，但它们并未解决接下来的两个挑战，甚至可能使这些挑战变得更难。\n\
  \n*如何在两个应用程序（升级前和升级后）之间保持数据同步？*\n\n正如你所想，这并非易事。原始数据库对象仍在使用中，数据可能被输入和更改。必须有一种机制，允许数据变更在升级前和升级后的应用程序之间传播。\n\
  \n当数据在升级前和升级后的应用程序之间共享时，同步问题并不简单。升级前的应用程序可以访问由升级后应用程序创建或更改的数据，反之亦然。对于所有包含数据的对象（如物化视图和索引）也是如此。\n\
  \n*如果数据结构发生变化怎么办？*\n\n升级应用程序可能会改变数据结构，那么当数据在升级前和升级后的应用程序之间是共享的时候，你如何为每个应用程序定义不同的数据表示？\n\
  \n在升级前应用程序中执行的事务必须反映在升级后应用程序中。在热切换期间，反之亦然。升级后应用程序中的更改也必须反映在升级前应用程序中。\n\n`EBR` 可以满足零停机要求的全部三个挑战。\n\
  \n#### 解决方案\n\n解决这三个挑战的机制如下。\n\n- 更改在新的版本中私密地进行。\n- 通过使用版本化视图，实现对公共表的不同投影。\n- `跨版本`触发器在热切换期间保持不同版本之间的数据变更同步。\n\
  \n除了 `EBR` 引入的这些结构外，Oracle 数据库的两个支持特性使解决方案更加完善。\n\n第一个支持特性是非阻塞式 `DDL`。当你对表进行更改（如添加列）时，这是以非阻塞方式完成的。表上的当前事务不会阻止此更改。\n\
  \n另一个特性是细粒度的依赖跟踪。当你有一个包引用某个表时，两者之间存在依赖关系。过去，更改表（如添加列）会使包失效。现在情况已不同。依赖关系现在更加细粒度。因为没有引用到新列，所以包不会失效。向包规范添加新子程序也是如此。依赖对象不会失效。\n\
  \n实施 `EBR` 并不像按一下开关那么简单。`EBR` 的准备阶段非常重要，可能需要更改现有的数据库设计和源代码。\n\n#### 依赖关系\n\n在 Oracle\
  \ 数据库中，有保存数据的对象，如表、物化视图和索引，也有代码对象，即所有的 `PL/SQL` 对象。\n\n经验法则是：数据对象*不能*是可版本化的，而代码对象*可以*是可版本化的。\n\
  \n可能存在一个表，其中一列是基于用户定义类型（如对象类型）。因为用户定义类型是可版本化的而表不是，你可能会陷入一个不易解决的境地。当存在多个跨版本的表定义时，应使用哪个用户定义类型？这种困境称为\
  \ *`非版本化对象对版本化对象的禁止`*。一个非版本化对象不能依赖于一个可版本化对象。自 Oracle 数据库 12.1 起，一直有一个针对 `非版本化对象对版本化对象的禁止`\
  \ 的变通方法。你可以豁免某些对象*永远成为*可版本化的，而不是让整个模式启用版本化。在表中使用用户定义类型的例子中，你会希望在 `create type` 语句中将用户定义类型定义为非版本化的。这样，你就不会遇到\
  \ `非版本化对象对版本化对象的禁止`。\n\n此外，从 Oracle 数据库 12.1 开始，物化视图和虚拟列可以拥有额外的元数据，这些元数据提供了关于计算版本的信息。仅当物化视图或虚拟列使用了可版本化的\
  \ `PL/SQL` 函数调用时，拥有此额外元数据才相关。这些元数据需要通过执行 `CREATE` 和 `ALTER` 语句显式设置。\n\n在 12.1 之前的版本中，公共同义词不能启用版本化，因为那会违反\
  \ `非版本化对象对版本化对象的禁止`。从 12.1 版本开始，Oracle 维护的名为 `PUBLIC` 的用户启用了版本化，但所有现有的公共同义词都被标记为非版本化的。创建新的公共同义词可以是版本化的。\n\
  \n在热切换期间，你也可以在新版本的私密环境中测试升级后的应用程序。当必须测试升级后应用程序中的 `DML` 时，请确保使用“假数据”，这些数据应易于识别且不参与业务。使用假数据，实际数据不会受到基于版本重定义操作的影响，并且在测试完成后可以轻松识别和删除。另一种方法是仅以只读模式进行测试，以防止删除版本时留下残余数据。\n\
  \n如果出现问题，或者功能不符合规格，你可以在升级后版本的私密环境中继续前进。目标是创建一个升级后的应用程序，而这只有在错误被纠正时才能实现。\n\n当热切换期完成并且测试结束后，没有现有连接在使用升级前的应用程序，此时可以停用升级前版本。阻止用户连接到升级前的应用程序可能是第一步。用于在升级前和升级后应用程序之间保持数据同步的\
  \ `跨版本` 触发器不再需要。可以删除升级前版本中的对象，最终，可以从表中删除未使用的列。\n\n如果 `EBR` 操作失败，需要移除最新版本，可以通过一条语句删除该版本。请记住，当从数据库中删除版本时，对表的更改不会被撤销。此外，对数据的更改也不会被撤销，应予以清除才能恢复到升级前的版本。\n\
  \n\n\n### 准备工作\n\n要利用 EBR（版本隔离），必须采取一些步骤。自 11gR2 以来，每个 Oracle 数据库版本都有一个名为 `ORA$BASE`\
  \ 的默认版本。即使无意使用 EBR，这个版本也始终存在。\n\n第一步是在模式级别启用 EBR。这是一次性操作且不可逆。尽管不可逆，但这并不意味着你必须使用\
  \ EBR。\n\n使用以下语句可为模式启用版本。\n\n```sql\nalter user book enable editions\n/\n```\n\n\
  在 Oracle 数据库 12.1 之前的版本中，整个模式会被启用版本。从该版本开始，可以将某些通常应为可版本化的对象标记为不可版本化。\n\n以下语句可用于确定当前会话的版本。\n\
  \n```sql\nselect sys_context('userenv'\n,'current_edition_name'\n) \"Current_Edition\"\
  \nfrom   dual\n/\nCurrent_Edition\n\nORA$BASE\n```\n\n**提示**\n\n使用 SQLcl 时，可以使用\
  \ `show edition` 命令来显示当前版本，这比检查 `userenv` 应用程序上下文中的当前版本名称要方便得多。\n\n#### 权限\n\n在上一节中，用户“book”已被启用版本，允许创建其他版本。版本之间存在层级关系，每个版本总是有\
  \ *一个* 父版本。唯一的例外是 `ORA$BASE`，或者当此版本最终被移除时，层级中的下一个版本。这个顶级版本称为 *根版本*。\n\n为模式启用使用版本的功能并不意味着用户可以创建其他版本。要实现这一点，需要\
  \ `create any edition` 系统权限。除了此权限外，用户还需要在根版本上拥有 `use` 权限。\n\n```sql\ngrant create\
  \ any edition to book\n/\n```\n\n当用户 book 创建一个版本时，`use` 权限会自动授予。此权限也可以显式授予其他用户。\n\
  \n```sql\ngrant use on edition  to \n/\n```\n\n只有在授予 `drop any edition` 系统权限时，才能删除根或叶版本。\n\
  \n```sql\ngrant drop any edition to book\n/\n```\n\n连接到数据库时，也可以使用 `alter session`\
  \ 语句来更改版本。\n\n```sql\nalter session set edition = \n/\n```\n\n从一种版本切换到另一种版本时，不能有未完成的事务。如果在事务未通过提交或回滚关闭时尝试更改版本，将会引发错误。\n\
  \n```sql\nalter session set edition = r2\n/\nERROR:\nORA-38814: ALTER SESSION SET\
  \ EDITION must be first statement of transaction\n```\n\n### 多个复杂度级别\n\n使用 EBR 存在多个复杂度级别。最简单的\
  \ EBR 是 *仅* 在版本之间更改 PL/SQL 对象。\n\n下一级别是表结构也在版本之间更改，但 *无需* 同时保留多个版本可用。所有用户都会在未来指定的时间点迁移到升级后的版本。\n\
  \n最复杂的级别是涉及表结构更改，并且用户需要同时访问多个版本。这涉及在多个版本之间保持数据同步。\n\n接下来的几个章节将讨论涉及的每个步骤，从最简单的形式开始：仅在版本之间更改\
  \ PL/SQL 对象。\n\n#### 仅更改 PL/SQL 对象\n\nEBR 的最简单形式是仅更改 PL/SQL 对象。数据模型保持不变。在以下示例中，在\
  \ `ORA$BASE` 版本中创建一个过程，通过提供名和姓作为参数来显示驾驶员的全名。\n\n```sql\ncreate or replace\nprocedure\
  \ format_fullname (p_firstname in varchar2\n,p_lastname in varchar2)\nis\nbegin\n\
  dbms_output.put_line (p_firstname\n||' '||\np_lastname\n);\nend format_fullname;\n\
  /\n```\n\n启用服务器输出后，这个简单的过程会将名和姓连接在一起显示，中间用空格分隔。\n\n随着 EBR 的引入，数据字典扩展了许多同样反映版本信息的视图。这些数据字典视图带有\
  \ `_ae` 后缀，是 *all editions*（所有版本）的缩写。其中一个视图是 `user_objects_ae`。这个数据字典视图显示创建的 procedure\
  \ `format_fullname` 存在于版本 `ORA$BASE` 中。\n\n```sql\nselect object_name\n, object_type\n\
  , edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
  /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
  \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\n```\n\n**注意**\n\n当上述查询显示\
  \ `edition_name` 列为空时，表示用户尚未启用版本。\n\n下一步是创建一个名为 R1 的额外版本。\n\n```sql\ncreate edition\
  \ r1 as child of ora$base\n/\n```\n\n虽然严格来说不必指定哪个版本是父版本，但明确指定总是无妨。\n\n创建版本并不意味着当前会话已切换到它。要将当前版本更改为新创建的版本，需要发出\
  \ `alter session` 命令。\n\n```sql\nalter session set edition = r1\n/\nselect sys_context('userenv'\n\
  ,'current_edition_name'\n) \"Current_Edition\"\nfrom   dual\n/\nCurrent_Edition\n\
  \nR1\n```\n\n除了使用 `alter session` 语句切换版本外，也可以在连接时指定版本。\n\n```sql\nconn /@ edition\
  \ = r1\n```\n\n在 R1 版本中执行 `format_fullname` 过程会显示以下结果。\n\n```sql\nbegin\nformat_fullname\
  \ (p_firstname => 'Mick'\n,p_lastname  => 'Schumacher'\n);\nend;\n/\nMick Schumacher\n\
  ```\n\n这是如何实现的？过程 `format_fullname` 是从父版本 `ORA$BASE` 继承而来的。所有可版本化的对象都由子版本继承，并且可以像以前一样使用。\n\
  \n引入新版本的原因是为了改进 `format_fullname` 过程的功能。这可以通过非常熟悉的 `create or replace` 方法来完成。该过程的替换发生在版本\
  \ R1 的 *私有环境* 中，同时保持原始过程完整且有效。连接到 `ORA$BASE` 版本的用户不受 `format_fullname` 过程新版本的影响。\n\
  \n```sql\ncreate or replace\nprocedure format_fullname (p_firstname in varchar2\n\
  ,p_lastname  in varchar2)\nis\nbegin\ndbms_output.put_line (initcap (p_lastname)\n\
  ||', '||\ninitcap (p_firstname)\n);\nend format_fullname;\n/\n```\n\n过程 `format_fullname`\
  \ 在当前版本中被替换，`user_objects_ae` 数据字典视图显示两个同名但存在于不同版本中的过程。\n\n```sql\nselect object_name\n\
  , object_type\n, edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
  /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
  \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\nFORMAT_FULLNAME PROCEDURE\
  \       R1\n```\n\n新版本的用户在调用该过程时会得到以下结果。\n\n```sql\nbegin\nformat_fullname (p_firstname\
  \ => 'Mick'\n,p_lastname  => 'Schumacher'\n);\nend;\n/\nSchumacher, Mick\n```\n\n\
  还有可能在升级后的版本中不再需要某个 PL/SQL 对象。可以通过发出 `drop` 语句来移除该 PL/SQL 对象。请记住，删除 PL/SQL 对象仅从当前版本中移除它。同名的过程仍然存在于\
  \ `ORA$BASE` 中。\n\n\n\n删除过程后检查 `user_objects_ae` 数据字典视图，会显示以下结果。\n\n```\nselect\
  \ object_name\n, object_type\n, edition_name\nfrom   user_objects_ae\nwhere  object_name\
  \ = 'FORMAT_FULLNAME'\n/\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n---------------\
  \ --------------- ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\nFORMAT_FULLNAME\
  \ NON-EXISTENT    R1\n```\n\n前述结果显示，仍然有两个对名为 `format_fullname` 的对象的引用；一个在 `ORA$BASE`\
  \ 中，另一个在 `R1` 中。请注意，`ORA$BASE` 中的对象是一个 `procedure`（过程），而 `R1` 中的另一个对象是 `non-existent`（不存在）。\n\
  \n一旦对象从某个版本中移除，它就不再被下一个子版本继承，因此也无法再被调用。\n\n将过程更改为函数（用一个函数来格式化驾驶员全名更有意义）是通过组合使用 `drop`（这一步已经完成以删除过程）和\
  \ `create` 来实现函数功能。\n\n```\ncreate or replace\nfunction format_fullname (p_firstname\
  \ in varchar2\n,p_lastname  in varchar2)\nreturn varchar2\nis\nbegin\nreturn initcap\
  \ (p_lastname)\n||', '||\ninitcap (p_firstname);\nend format_fullname;\n/\n```\n\
  \n这些操作在数据字典中产生如下结果。\n\n```\nselect object_name\n, object_type\n, edition_name\n\
  from   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n/\nOBJECT_NAME \
  \    OBJECT_TYPE     EDITION_NAME\n--------------- --------------- ---------------\n\
  FORMAT_FULLNAME PROCEDURE       ORA$BASE\nFORMAT_FULLNAME FUNCTION        R1\n```\n\
  \n当仅涉及 PL/SQL 对象时，升级所需的仅此几个步骤。接下来要做的是使新版本对用户可用，并使旧版本不可用（即，停用旧版本）。这些主题将在下一节中介绍。\n\
  \n### 表变更：不要在版本间同步\n\n有时，在向新版本推进的过程中，有必要更改表的结构。如前所述：表不能是可版本化的。不可能拥有同一张表的多个版本。有两种机制有助于在对表进行更改时保持应用程序在线：细粒度依赖跟踪和非阻塞\
  \ DDL。\n\n细粒度依赖跟踪可防止在对表进行更改时对象失效。添加列不会使任何 PL/SQL 对象失效，因为 PL/SQL 对象中没有对该列的依赖关系。\n\
  \n由于非阻塞 DDL，添加列不会阻碍任何会话。\n\n在每个版本中，都需要数据的不同表示形式来公开新添加的列。\n\nEBR 引入了 `editioning\
  \ view`（版本视图）的概念。顾名思义，它是一个视图，但一种特殊类型的视图。版本视图充当底层表的抽象层。因为版本视图是可版本化的，所以它可能在每个版本中具有不同的结构。由于抽象层，数据仍然存储在一个地方，即底层表。该表保存数据，是单一事实来源。索引和约束保留在表上。\n\
  \n引入版本视图需要一些停机时间，尤其是在第一次涉及表的基于版本的重定义操作中。这是一项一次性操作，用于将现有的非基于版本的数据库应用程序准备好，以便将来进行基于版本的升级。一旦完成此操作，它就为零停机时间升级做好了准备。\n\
  \n**注意**\n\n表上使用的一些特性可能需要重新路由到版本视图，例如权限、触发器和虚拟专用数据库（`VPD`）。事先收集这些特性的脚本，可以大大简化切换到版本视图的过程。\n\
  \n在第一次 EBR 操作期间引入版本视图需要遵循六个步骤。\n\n1.  重命名表。\n2.  创建版本视图。\n3.  将权限重新路由到版本视图。\n4.\
  \  在版本视图上重新创建触发器。\n5.  重新编译 PL/SQL 对象。\n6.  重新应用 `VPD` 策略。\n\n版本视图是实际表与应用程序之间的抽象层。应用程序很可能在整个源代码中引用实际表。在源代码中将实际表的名称更改为版本视图可能是一项相当艰巨的任务，并且容易出错。将版本视图命名为与原表相同的名字，对应用程序和源代码的影响最小。不幸的是，这是不可能的。不能有两个同名的对象。你可以通过首先重命名实际表，然后创建一个与原表同名的版本视图来解决这个困境。\n\
  \n今后，应用程序不应再直接访问表，创建一个与常规表名可区分的表名应有助于防止这种情况。以下命名约定引入了一个特殊字符（通常是下划线）并使表名区分大小写。\n\n\
  ```\nalter table drivers rename to \"_drivers\"\n/\n```\n\n`_drivers` 表*只能*在名称带引号时使用，因为它区分大小写。这不是一种常见的表命名约定。具有特殊字符并区分大小写向开发人员表明此表是特殊的。\n\
  \n通过此操作，步骤一完成。下一步是引入与原表同名的版本视图。\n\n```\ncreate editioning view drivers\nas\nselect\
  \ driverid\n, driverref\n, driver_number\n, code\n, forename\n, surname\n, dob\n\
  , nationality\n, url\nfrom   \"_drivers\"\n/\n```\n\n版本视图只能基于单个表，并且不能包含聚合或表达式。\n\
  \n\n#### 重新路由特权与触发器\n\n接下来，将原本在实体表上的特权重新路由至版本化视图。这需要考虑诸如授予其他模式的 `select` 或 `insert`\
  \ 等特权。\n\n手头备有为原始表创建的特权脚本，能极大简化此过程。版本化视图已沿用了原始表的名称。通过重新执行原始的授权脚本，即可将特权授予该版本化视图。\n\
  \n下一步是将表级触发器从原始表重新创建到版本化视图上。拥有为原始表创建的原始脚本，使这一步变得轻而易举。由于不能存在两个同名对象，因此需要先删除当前与该表关联的触发器。\n\
  \n由于表已被重命名，源代码会变为无效状态，PL/SQL 对象需要重新编译。完成此重新编译步骤后，编译后的代码将引用版本化视图。\n\n完成向 EBR（版本化）过渡的最后一步是重新应用\
  \ VPD（虚拟专用数据库）策略函数。若未使用 VPD，可跳过此步骤。\n\n遵循所有这些步骤后，应用程序升级时便不再需要计划停机时间。新增功能可以在一个独立的版本中私下完成，而不会影响现有应用程序。\n\
  \n可以向表中添加列，且无需在不同版本间保持数据同步。由于该列在父版本中不存在，因此没有可展示数据的对应表示。\n\n以下示例在 `_drivers` 表中添加了一个电话号码列，以演示如何增加额外列。\n\
  \n```sql\nalter table \"_drivers\"\nadd (\nphone varchar2(10)\n)\n/\n```\n\n由于采用了细粒度依赖跟踪，更改表不会使任何引用该对象的\
  \ PL/SQL 对象失效。目前数据库中没有代码引用这个新添加的列。\n\n可以通过创建一个版本化视图，在某个特定版本中私下公开此列。\n\n```sql\n\
  create edition r2 as child of r1\n/\nEdition R2 created.\nalter session set edition\
  \ = r2\n/\nSession altered.\ncreate or replace\neditioning view drivers\nas\nselect\
  \ driverid\n, driverref\n, driver_number\n, code\n, forename\n, surname\n, dob\n\
  , nationality\n, url\n, phone\nfrom   \"_drivers\"\n/\nView created.\nselect forename\n\
  , surname\n, phone\nfrom   drivers\nfetch  first 5 rows only\n/\nFORENAME      \
  \       SURNAME              PHONE\n-------------------- -------------------- ----------\n\
  Bernd                Schneider\nPaolo                Barilla\nGregor           \
  \    Foitek\nClaudio              Langes\nGary                 Brabham\n```\n\n\
  从结果中可见，电话列已显示，但尚无数据。可以创建或修改一个应用程序来公开电话号码，并维护此信息。\n\n因为电话列是全新的，所以无需在多个版本间保持数据同步。旧版本不知道此列的存在，也不会使用它。\n\
  \n#### 涉及数据同步的表更改\n\n最复杂的基于版本的定义练习发生在需要在多个版本间保持数据同步时。\n\n在进行本节概述的步骤之前，应已完成前面练习中所述的实现版本化视图的六个步骤。\n\
  \n示例中，对 `_drivers` 表进行了如下更改：将列“forename”和“surname”分别重命名为“first_name”和“last_name”，并且它们的长度从\
  \ 25 字节增加到 35 字节。\n\n直接修改现有列非常容易，但这会影响现有应用程序。引用这些列的源代码会变为无效，并可能导致（部分）停机。这与零停机升级的目标背道而驰，因此修改现有列是不可接受的。\n\
  \n```sql\ncreate edition r3 as child of r2\n/\nEdition R3 created.\nalter session\
  \ set edition = r3\n/\nSession altered.\nalter table \"_drivers\"\nadd (\nfirst_name\
  \ varchar2 (35)\n, last_name  varchar2 (35)\n)\n/\nTable altered.\ncreate or replace\n\
  editioning view drivers\nas\nselect driverid\n, driverref\n, driver_number\n, code\n\
  , first_name\n, last_name\n, dob\n, nationality\n, url\n, phone\nfrom   \"_drivers\"\
  \n/\n```\n\n向表中添加列是容易的部分，修改版本化视图以公开新列也是如此。因为底层表是一个不可版本化的对象，所以在哪个版本中进行更改并不重要。但常识告诉我们，不应在旧版本中执行\
  \ DDL 操作。\n\n新列“first_name”和“last_name”不包含任何数据。在新情况下，这些列应获得与原始表中“forename”和“surname”相同的值。一个直接的\
  \ `update` 语句即可实现。但这样大规模的更新可能因锁机制而干扰正常业务。\n\n如果应用程序用户只使用最新版本（本例中为 R3 版本），那么执行大规模更新可能就足够了。从那时起，用户只需处理“first_name”和“last_name”，旧列不再需要维护。\n\
  \n比直接使用 `update` 语句更好的方法是利用 `dbms_parallel_execute` 来最小化完成任务所需的时间。当涉及大量数据时，这一点尤其有用。\n\
  \n如果需要同时向用户提供两个版本（称为*热切换期*），则需要额外的机制来保持“forename”与“first_name”同步、“surname”与“last_name”同步。使用\
  \ R2 版本旧应用程序的用户看到并操作的是“forename”和“surname”，而使用 R3 版本新应用程序的用户使用的是“first_name”和“last_name”。\n\
  \n实现这一点的机制——在版本间保持数据同步——是使用*跨版本触发器*实现的。它们类似于普通的表触发器，是可版本化的，并且必须在新版本（R3）中创建。\n\n\
  ```sql\ncreate or replace trigger driver_R2_R3_Fwd_Xed\nbefore insert or update\
  \ on \"_drivers\"\nfor each row\nforward crossedition\ndisable\nbegin\n:new.first_name\
  \ := :new.forename;\n:new.last_name  := :new.surname;\nend driver_R2_R3_Fwd_Xed;\n\
  /\n```\n\n该触发器创建在底层表上，而不是版本化视图上。触发器需要对每一行生效，“forward cross edition”指令表示当在父版本中执行任何\
  \ DML 时都会触发，无论哪个父版本。\n\n**提示**\n\n创建跨版本触发器时使用禁用模式。只有当触发器有效时，才应启用它。无效的触发器会阻止 DML\
  \ 操作完成。\n\n触发器的逻辑很简单：新添加的列用驱动程序名称的旧表示形式来填充。\n\n当触发器有效后，即可启用它，以便在旧应用程序用户进行更改时保持数据同步。\n\
  \n```sql\nalter trigger driver_R2_R3_Fwd_Xed enable\n/\nTrigger DRIVER_R2_R3_FWD_XED\
  \ altered.\n```\n\n## 20. 选择正确的表类型\n\n任何数据库的目的都是存储数据。为此，你需要在数据库中创建表。Oracle 数据库提供了许多不同的表类型，每种类型都有其自身的优点和缺点。\n\
  \n数据的存储方式直接影响到数据检索的效率。不难想象，当一起被查询的数据也被存储在一起时，其速度会比数据分散存储各处要快。高效的应用始于高效的设计。\n\n本章讨论不同的表类型。选择并不仅限于传统的堆表。\n\
  \n### 验证跨版本触发器\n\n以下更新展示了如何验证 `crossedition` 触发器的工作情况。\n\n```sql\nalter session\
  \ set edition = r1\n/\nupdate drivers\nset surname = surname\nwhere driverid = 102\n\
  /\ncommit\n/\nalter session set edition = r3\n/\nselect first_name\n,last_name\n\
  from drivers\nwhere driverid = 102\n/\nFIRST_NAME      LAST_NAME\n---------------\
  \ ---------------\nAyrton          Senna\n```\n\n在较旧版本中由 DML 语句触及的记录会触发 `crossedition`\
  \ 触发器，从而更新新添加的列。切换到较旧版本并执行批量更新可以同步数据，但缺点是这在软件安装过程中可能令人困惑且容易出错。\n\n一个更好的替代方案是保留在新版本中，并以一种特殊的方式更新底层表来触发正向\
  \ `crossedition` 触发器。\n\n**注意：** `Crossedition` 触发器在底层表被更新时不会触发。它们仅在更新版本化视图时才会触发。\n\
  \n使用 `dbms_sql`，你可以在更新底层表时触发 `crossedition` 触发器。在 `parse` 过程中，为 `apply_crossedition_trigger`\
  \ 参数传入需要触发的 `crossedition` 触发器的名称。以下代码示例触发了 `crossedition` 触发器来更改所有新添加的列。所使用的更新语句是虚假的。\n\
  \n```sql\ndeclare\nc number := dbms_sql.open_cursor();\nx number;\nbegin\ndbms_sql.parse\n\
  ( c                          => c\n, language_flag              => dbms_sql.native\n\
  , statement                  => 'update \"_drivers\"\nset   driverid = driverid'\n\
  , apply_crossedition_trigger => 'DRIVER_R2_R3_FWD_XED'\n);\nx := dbms_sql.execute(c);\n\
  dbms_sql.close_cursor(c);\ncommit;\nend;\n/\n```\n\n现在，从旧版本到新版本的同步已经实现，还需要添加相反方向的功能。用户可以在新应用程序中添加或更改数据，这需要反映到旧应用程序中。\n\
  \n反向 `crossedition` 触发器也创建在底层表上，就像正向 `crossedition` 触发器一样。在这种情况下，反向 `crossedition`\
  \ 短语表示当在最新版本中进行更改时，触发器应触发。出于同样的原因，采用相同的策略以禁用状态创建触发器。\n\n列长度存在差异。旧版本中的列比新版本的短。截断名称使其适配是不可接受的。一个人的姓名不应被截断，因此这个版本引入了更改。在热切换期间，升级前和升级后的应用程序都必须包含用户输入的有效数据。\n\
  \n反向 `crossedition` 触发器如下所示。\n\n```sql\ncreate or replace trigger driver_R3_R2_Rve_Xed\n\
  before insert or update of first_name, last_name on \"_drivers\"\nfor each row\n\
  reverse crossedition\ndisable\nbegin\nif length (:new.first_name) > 25\nor length\
  \ (:new.last_name) > 25\nthen\nraise_application_error (-20000\n,'During the hot\
  \ rollover it is not possible to enter more'||\n' than twenty-five (25) characters\
  \ for the First or Last Name'\n);\nelse\n:new.forename := :new.first_name;\n:new.surname\
  \ := :new.last_name;\nend if;\nend driver_R3_R2_Rve_Xed;\n/\nTrigger DRIVER_R3_R2_RVE_XED\
  \ compiled\n```\n\n当触发器有效时，可以启用它。\n\n```sql\nalter trigger driver_R3_R2_Rve_Xed\
  \ enable\n/\nTrigger DRIVER_R3_R2_RVE_XED altered.\n```\n\n### 退役旧版本\n\n当 EBR 练习完成后，就不再需要维护应用程序的旧版本了。如果用户仍能访问旧应用程序，就有可能它还会被使用。这是不希望发生的。旧版本的应用程序应该被退役，以便旧应用程序对用户不可用。\n\
  \n虽然非常罕见，但多个版本并行运行较长时间是可能的。升级到新应用程序与旧应用程序退役之间的过渡应尽可能短。\n\n撤销数据库中每个用户和角色对旧版本的使用权限，可以防止任何人建立新连接。应由具有权限的用户执行以下语句。\n\
  \n```sql\nrevoke use on edition r1 from book\n/\n```\n\n版本也可以被完全移除，但仅当涉及根版本或叶版本时。同时具有父版本和子版本的版本不能被删除。\n\
  \n删除版本，尤其是叶版本，可能会留下不可版本化的更改，例如对底层表的更改。这也适用于已经发生的数据更改。\n\n可以通过具有 `drop any edition`\
  \ 权限的用户执行以下语句来删除子版本。\n\n```sql\ndrop edition r3 cascade\n/\nEdition R3 dropped.\n\
  ```\n\n请记住，表更改无法撤销。该版本不能正被某个会话使用。否则将导致异常。\n\n同样，父版本也可以被删除，尽管并非绝对必要。拥有多个已退役版本不会干扰性能，因为引用是在编译时解析的。建议移除预升级版本中的所有对象，因为它们不再需要，同时移除来自后升级版本的\
  \ `crossedition` 触发器。这只是一个良好的内务管理问题。\n\n#### 更改默认版本\n\n默认的 Oracle 数据库版本是 `ORA$BASE`。连接到数据库时，如果未指定版本，则使用默认版本。除了通过\
  \ `alter session` 命令更改版本外，也可以更改默认版本。通常，DBA 会处理以下情况。\n\n```sql\nalter database default\
  \ edition = r1\n/\n```\n\n这会立即更改整个数据库的默认版本。除了 `SYS` 之外，所有用户对先前默认版本的 `use` 权限都会被撤销。同时，`PUBLIC`\
  \ 被授予 `use` 权限。\n\n普通用户无法再连接到 `ORA$BASE`；`SYS` 仍然可以。这允许在需要时将默认版本更改回 `ORA$BASE`。\n\
  \n### 总结\n\n本章概述了减少甚至可能消除计划内停机时间的解决方案。在 Oracle Database 11gR2 版本之前，升级自定义应用程序会导致计划内停机。EBR\
  \ 解决了这个计划内停机问题。在版本的私密空间中部署升级后的应用程序是关键。升级完成后，用户会被切换到升级后的应用程序，而不会经历停机。\n\n根据你的需求，你可以使用几个不同复杂度级别。从简单地在不同版本中替换\
  \ PL/SQL 对象，到创建多个带有 `crossedition` 触发器的版本化视图以保持跨版本的数据同步。本章也讨论了退役旧版本的方法。\n\n\n###\
  \ 堆表\n\n堆表（heap table）正如其名所示，所有记录都存储在一个巨大的堆中，完全没有顺序。如果从这样的表中选择行，除非在 `select` 语句中包含\
  \ `order by` 子句，否则无法保证返回给调用进程的行顺序。即使重复执行相同的语句，它每次可能都返回相同顺序的行。但只要表发生变化（例如由于任何 DML\
  \ 语句或数据库重启），这个顺序就可能大不相同。除非在 `select` 语句中显式包含 `order by` 子句，否则永远不要依赖记录返回的顺序。\n\n"
- "# 索引\n\n为了加快返回记录的速度，你可以在表的列上定义一个或多个索引。这是一个独立的数据结构，只包含感兴趣的列的数据以及指向原始记录的指针。\n\n假设你有一个包含过去\
  \ 70 年 F1 车手的表。如果你想查找所有姓氏为 Verstappen 的车手，那么 Oracle 除了访问表中的每一行（进行全表扫描）并检查内容以满足此条件并排除不符合的记录外，别无他法。当你检查该\
  \ `select` 语句的解释计划（explain plan）时，可以看到这一点。使用以下语句可以创建一个解释计划。\n\n```sql\nexplain plan\
  \ for\nselect drv.forename\n, drv.surname\nfrom   drivers drv\nwhere  drv.surname\
  \ = 'Verstappen'\n/\n```\n\n创建解释计划后，可以通过执行以下命令来查看它。\n\n```sql\nselect *\nFrom dbms_xplan.display(\
  \ 'plan_table' )\n/\n```\n\n让我们看看在 `drivers` 表中查找姓氏为 Verstappen 的车手是如何执行的。\n\n```sql\n\
  select drv.forename\n, drv.surname\nfrom   drivers drv\nwhere  drv.surname = 'Verstappen'\n\
  /\n```\n\n查询结果：\n\n```\n| Id  | Operation                   | Name    |\n\n|   0\
  \ | SELECT STATEMENT            |         |\n| * 1 |   TABLE ACCESS STORAGE FULL\
  \ | DRIVERS |\n\nPredicate Information (identified by operation id):\n\n1 - storage(\"\
  DRV\".\"SURNAME\"='Verstappen')\nfilter(\"DRV\".\"SURNAME\"='Verstappen')\n```\n\
  \n当你在此列上添加一个 B-tree 索引时。\n\n```sql\ncreate index ix_driversurname on drivers (surname,\
  \ forename)\n/\n```\n\n解释计划会发生变化。\n\n```\n| Id  | Operation        | Name      \
  \       |\n\n|   0 | SELECT STATEMENT |                  |\n|   1 |  INDEX RANGE\
  \ SCAN| IX_DRIVERSURNAME |\n\nPredicate Information (identified by operation id):\n\
  \n1 - access(\"DRV\".\"SURNAME\"='Verstappen')\n```\n\nSQL 引擎现在使用创建的索引来满足此查询。尽管索引建立在两个列（surname\
  \ 和 forename）上，但由于你查询的是索引的引导列（leading column），它仍然可以使用。在这个小表（少于 1000 行）上，你可能几乎看不到执行时间的差异，但如果表更大，就能看到显著的改善。\n\
  \n使用索引可以极大地加速 `select` 查询，但请注意这是有代价的。索引必须被维护。这是在执行 DML 的同时完成的，因此除了在表中插入数据外，还需要在索引中插入数据，这可能导致索引内容的重新排列。这需要花费时间；虽然不多，但总归是时间。如果一个表上定义了多个索引，那么所有这些索引都必须根据表的变化进行相应的更改。\n\
  \n#### B-tree\n\n默认情况下，Oracle Database 中的索引被创建为 B-tree（或平衡树）索引。平衡树意味着从根（索引的起点）到叶（存储信息的地方）总是需要相同数量的步骤。它们可以是普通索引或唯一索引。使用唯一索引时，每个值在每个索引中最多只允许出现一次。这也是\
  \ Oracle Database 通过在表上创建唯一索引来强制执行主键的方式。\n\n#### 位图索引\n\n在位图索引中，为每个索引键存储一个位图。每个索引键指向多行。以下是位图索引通常使用的场景：\n\
  \n*   索引列中的不同值数量相对于表中的行数较少时，例如性别列。\n*   表不经常通过 DML 语句修改或是只读表时。\n\n位图索引主要用于数据仓库应用程序，在\
  \ OLTP 应用程序中并不常见。对于 OLTP 环境，不建议使用位图索引。对基础表的 DML 操作会对位图维护产生显著影响，从而直接影响应用程序。\n\n###\
  \ 索引组织表（IOT）\n\n索引组织表在 Oracle Database 版本 8 中引入。它是索引和表的结合。普通的堆表没有隐式的排序，而这种表是一个有序的记录集合。B-tree\
  \ 索引只包含索引列的信息以及指向完整记录的指针，而索引组织表则将完整记录存储在索引中，无需额外的表来存储记录的其余部分。这种表最适合作为查找表使用，并且列数有限且类型简单（如\
  \ VARCHAR2、NUMBER 和 DATE）。\n\n要为 drivers 创建一个索引组织表，如下所示。\n\n```sql\ncreate table\
  \ drivers_iot\n(\ndriverid     number(11)    not null\n, driverref    varchar2(255)\n\
  , drivernumber number(11)\n, code         varchar2(3)\n, forename     varchar2(255)\n\
  , surname      varchar2(255)\n, dob          date\n, nationality  varchar2(255)\n\
  , url          varchar2(255)\n, primary key (surname, forename)\n)\norganization\
  \ index\n/\n```\n\n对于堆表，你可以在表创建后定义主键。但对于索引组织表，你必须在定义表时直接提供主键。\n\n执行以下语句，用与 `drivers`\
  \ 堆表相同的数据填充索引组织表。\n\n```sql\ninsert into drivers_iot (select * from drivers)\n/\n\
  ```\n\n在索引组织表上运行与之前相同的 `select` 语句。\n\n```sql\nselect drv.forename\n, drv.surname\n\
  from   drivers_iot drv\nwhere  drv.surname = 'Verstappen'\n/\n```\n\n然后你可以从解释计划中看到，所有需要的数据都已经在索引中了，无需在表中进行额外的查找。\n\
  \n```\n| Id  | Operation        | Name           |\n\n|   0 | SELECT STATEMENT |\
  \                |\n|*  1 |  INDEX RANGE SCAN| PK_DRIVERS_IOT |\n\nPredicate Information\
  \ (identified by operation id):\n\n1 - access(\"DRV\".\"SURNAME\"='Verstappen')\n\
  ```\n\n\n### 簇\n\n簇是另一种存储数据的方法。一组共享相同数据块的表就是一个簇。由于这些表拥有公共列，并且它们的数据经常被一起引用，因此将它们的数据存储在彼此靠近的位置是一个很好的理由。当你基于一个公共字段对表进行簇化时，Oracle\
  \ 数据库会物理地将所有表中具有相同公共字段值的所有行存储在相同的数据块中。\n\n由于不同表的相关行存储在同一个数据块中，你将获得两个主要好处。\n\n- 当连接簇化表时，磁盘\
  \ `I/O` 减少，访问时间得到改善。\n- 簇键（即簇中所有表共有的列或列组）只存储一次，无论不同表中有多少行包含该值。\n\n因此，在簇中存储相关表和索引数据所需的存储空间可能比非簇化表格式更少。\n\
  \n所有数据都位于 `F1DATA` 模式中，但让我们在 `BOOK` 模式中创建簇，然后复制行以比较存储使用情况。\n\n```\ncreate cluster\
  \ cl_f1laps\n( raceid      number  (  11 )\n, driverid    number  (  11 )\n)\n/\n\
  ```\n\n创建簇后，创建簇索引。\n\n```\ncreate index idx_cl_f1laps\non cluster cl_f1laps\n/\n\
  ```\n\n对于创建簇索引，使用簇中指定的列。你不能指定不同的列集。使用簇不影响在簇化表上创建额外索引；它们可以像往常一样创建和删除。\n\n要在簇中创建表，你必须指定它们应该被创建到哪个簇中。在簇中创建表时，至少应有一个列在簇中被指定。\n\
  \n让我们在同一个簇中创建 `RACES`、`DRIVERS` 和 `LAPTIMES` 表。\n\n```\ncreate table races (\nraceid\
  \                number  (   11 ) not null\n, year                  number  (  \
  \ 11 ) not null\n, round                 number  (   11 ) not null\n, circuitid\
  \             number  (   11 ) not null\n, name                  varchar2(  255\
  \ )\n, race_date             date             not null\n, time                 \
  \ date\n, url                   varchar2(  255 )\n, fp1_date              date\n\
  , fp1_time              date\n, fp2_date              date\n, fp2_time         \
  \     date\n, fp3_date              date\n, fp3_time              date\n, quali_date\
  \            date\n, quali_time            date\n, sprint_date           date\n\
  , sprint_time           date\n, constraint pk_races\nprimary key (raceid)\n, constraint\
  \ uk_races_url\nunique      (url)\n)\ncluster cl_f1laps( raceid )\n/\ncreate table\
  \ drivers\n(\ndriverid              number  (  11 ) not null\n, driverref      \
  \       varchar2( 255 )\n, driver_number         number  (  11 )\n, code       \
  \           varchar2(   3 )\n, forename              varchar2( 255 )\n, surname\
  \               varchar2( 255 )\n, dob                   date\n, nationality   \
  \        varchar2( 255 )\n, url                   varchar2( 255 )\n, constraint\
  \ pk_drivers\nprimary key ( driverid )\n)\ncluster cl_f1laps ( driverid )\n/\ncreate\
  \ table laptimes (\nraceid                number  (   11 ) not null\n, driverid\
  \              number  (   11 ) not null\n, lap                   number  (   11\
  \ ) not null\n, position              number  (   11 ) default null\n, time    \
  \              varchar2(  255 ) default null\n, milliseconds          number  (\
  \   11 ) default null\n, constraint pk_laptimes\nprimary key (raceid,driverid,lap)\n\
  , constraint fk_laptimes_races\nforeign key (raceid)\nreferences races (raceid)\n\
  , constraint fk_laptimes_drivers\nforeign key (driverid)\nreferences drivers (driverid)\n\
  )\ncluster cl_f1laps ( raceid, driverid )\n/\n```\n\n现在将数据从 `F1DATA` 模式复制到我们的表中，以比较查询计划。\n\
  \n```\ninsert into races\nselect raceid\n, year\n, round\n, circuitid\n, name\n\
  , race_date\n, time\n, url\n, fp1_date\n, fp1_time\n, fp2_date\n, fp2_time\n, fp3_date\n\
  , fp3_time\n, quali_date\n, quali_time\n, sprint_date\n, sprint_time\nfrom   f1data.races\n\
  /\ninsert into drivers\nselect driverid\n, driverref\n, driver_number\n, code\n\
  , forename\n, surname\n, dob\n, nationality\n, url\nfrom f1data.drivers\n/\ninsert\
  \ into laptimes\nselect raceid\n, driverid\n, lap\n, position\n, time\n, milliseconds\n\
  from   f1data.laptimes\n/\n```\n\n比较两个模式之间的磁盘大小时，你可以看到对于相同的信息量，簇化表占用的空间更小。\n\n以下是\
  \ `BOOK` 模式中的情况。\n\n```\nselect sum(bytes) bytes\nfrom   user_segments\nwhere  segment_type\
  \ = 'TABLE'\nand    segment_name in ( 'DRIVERS'\n, 'LAPTIMES'\n, 'RACES'\n)\n/\n\
  BYTES\n\n```\n\n以下是 `F1DATA` 模式中的情况。\n\n```\nselect sum(bytes) bytes\nfrom   user_segments\n\
  where  segment_type = 'TABLE'\nand    segment_name in ( 'DRIVERS'\n, 'LAPTIMES'\n\
  , 'RACES'\n)\n/\nBYTES\n\n```\n\n当查询这些表时，优化器可以减少访问的块数，因为簇中表的数据位于磁盘上的同一个块中。\n\n你不应该对频繁单独访问的表使用簇。那会违背其目的。\n\
  \n### 临时表\n\nOracle 数据库 `8i` 引入了 `temporary table`，它在一个事务**或**一个会话期间保存数据，并且其数据对并发运行在数据库中的其他会话是不可见的。它被称为全局的，但这是因为表的定义是全局的。Oracle\
  \ 数据库 `18c` 版本引入了私有临时表，其表的定义仅限于创建它的会话。\n\n#### 全局临时表\n\n`全局临时表`是“全局可用”的。你必须像对待任何其他表一样，授予其他方案（schema）对此表的访问权限。此表中的数据仅对创建该数据的会话可用。当你使用两个不同的会话连接到同一个方案时，一个会话无法看到另一个会话放入此表中的任何数据。因此，数据对于会话是私有的，但表的定义是全局可用的。\n\
  \n##### 事务级持续时间\n\n定义全局临时表时，你必须决定行数据是仅对事务可用，还是对整个会话的持续时间可用。若要使行数据仅对事务可用，你需要告诉表在提交时删除行。以下语句创建了一个事务级持续时间的全局临时表。\n\
  \n```sql\ncreate global temporary table gtt_drivers\n( driverid     number  (  11\
  \ ) not null\n, driverref    varchar2( 255 )\n, drivernumber number  (  11 )\n,\
  \ code         varchar2(   3 )\n, forename     varchar2( 255 )\n, surname      varchar2(\
  \ 255 )\n, dob          date\n, nationality  varchar2( 255 )\n, url          varchar2(\
  \ 255 )\n) on commit delete rows\n/\n```\n\n向表中填充一些数据后，可以像往常一样查询和操作这些数据。\n\n```sql\n\
  insert into gtt_drivers\nselect *\nfrom   f1data.drivers drv\nwhere  drv.nationality\
  \ = 'Dutch'\n/\nselect code\n, forename\n, surname\n, dob\n, nationality\nfrom \
  \  gtt_drivers\n/\n```\n\n```\nCODE FORENAME        SURNAME              DOB   \
  \     NATIONALITY\n---- --------------- -------------------- ---------- -----------\n\
  Huub            Rothengatter         08/10/1954 Dutch\nMichael         Bleekemolen\
  \          02/10/1949 Dutch\nBoy             Lunger               03/05/1949 Dutch\n\
  Roelof          Wunderink            12/12/1948 Dutch\nGijs            van Lennep\
  \           16/03/1942 Dutch\nALB  Christijan      Albers               16/04/1979\
  \ Dutch\nDOO  Robert          Doornbos             23/09/1981 Dutch\nJos       \
  \      Verstappen           04/03/1972 Dutch\nJan             Lammers          \
  \    02/06/1956 Dutch\nDries           van der Lof          23/08/1919 Dutch\nJan\
  \             Flinterman           02/10/1919 Dutch\nVDG  Giedo           van der\
  \ Garde        25/04/1985 Dutch\nVER  Max             Verstappen           30/09/1997\
  \ Dutch\nCarel Godin     de Beaufort          10/04/1934 Dutch\nErnie          \
  \ de Vos               01/07/1941 Dutch\nBen             Pon                  09/12/1936\
  \ Dutch\nRob             Slotemaker           13/06/1929 Dutch\n17 rows selected\n\
  ```\n\n然而，当事务结束（通过`commit`或`rollback`）时，表中的数据将被移除。\n\n```sql\ncommit\n/\nselect\
  \ code\n, forename\n, surname\n, dob\n, nationality\nfrom   gtt_drivers\n/\n```\n\
  \n```\nCODE FORENAME        SURNAME              DOB        NATIONALITY\n---- ---------------\
  \ -------------------- ---------- -----------\n```\n\n##### 会话级持续时间\n\n另一个选项是保留行，这意味着行在会话期间可用。以下语句重新创建了一个会话持续时间的全局临时表。\n\
  \n```sql\ncreate global temporary table gtt_drivers\n( driverid     number  (  11\
  \ ) not null\n, driverref    varchar2( 255 )\n, drivernumber number  (  11 )\n,\
  \ code         varchar2(   3 )\n, forename     varchar2( 255 )\n, surname      varchar2(\
  \ 255 )\n, dob          date\n, nationality  varchar2( 255 )\n, url          varchar2(\
  \ 255 )\n) on commit preserve rows\n/\n```\n\n用示例数据填充表，这些数据可以像往常一样进行查询和操作。\n\n```sql\n\
  insert into gtt_drivers\nselect *\nfrom   f1data.drivers drv\nwhere  drv.nationality\
  \ = 'Dutch'\n/\nselect code\n, forename\n, surname\n, dob\n, nationality\nfrom \
  \  gtt_drivers\n/\n```\n\n```\nCODE FORENAME        SURNAME              DOB   \
  \     NATIONALITY\n---- --------------- -------------------- ---------- -----------\n\
  Huub            Rothengatter         08/10/1954 Dutch\nMichael         Bleekemolen\
  \          02/10/1949 Dutch\nBoy             Lunger               03/05/1949 Dutch\n\
  Roelof          Wunderink            12/12/1948 Dutch\nGijs            van Lennep\
  \           16/03/1942 Dutch\nALB  Christijan      Albers               16/04/1979\
  \ Dutch\nDOO  Robert          Doornbos             23/09/1981 Dutch\nJos       \
  \      Verstappen           04/03/1972 Dutch\nJan             Lammers          \
  \    02/06/1956 Dutch\nDries           van der Lof          23/08/1919 Dutch\nJan\
  \             Flinterman           02/10/1919 Dutch\nVDG  Giedo           van der\
  \ Garde        25/04/1985 Dutch\nVER  Max             Verstappen           30/09/1997\
  \ Dutch\nCarel Godin     de Beaufort          10/04/1934 Dutch\nErnie          \
  \ de Vos               01/07/1941 Dutch\nBen             Pon                  09/12/1936\
  \ Dutch\nRob             Slotemaker           13/06/1929 Dutch\n17 rows selected\n\
  ```\n\n在发出`commit`语句后，行被保留。\n\n```sql\ncommit\n/\nselect code\n, forename\n, surname\n\
  , dob\n, nationality\nfrom   gtt_drivers\n/\n```\n\n```\nCODE FORENAME        SURNAME\
  \              DOB        NATIONALITY\n---- --------------- --------------------\
