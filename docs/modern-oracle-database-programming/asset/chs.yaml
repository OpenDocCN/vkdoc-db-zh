  ```\n\n##### 使用 CTAS 创建\n\n你也可以使用 `create table as select` 结构创建私有临时表。\n\n```sql\n\
  create private temporary table ora$ptt_drivers\nas\nselect *\nfrom   f1data.drivers\
  \ drv\nwhere  drv.nationality = 'Dutch'\n/\n```\n\n创建临时表的默认选项是 `on commit drop definition`。但由于这是一个仅内存的结构，没有隐式提交，因此行数据在表中是可用的。你可以添加选项以在提交后保留定义。\n\
  \n```sql\ncreate private temporary table ora$ptt_drivers\non commit preserve definition\n\
  as\nselect *\nfrom   f1data.drivers drv\nwhere  drv.nationality = 'Dutch'\n/\n```\n\
  \n私有临时表的定义仅对当前会话私有；因此 `on commit preserve definition` 意味着该定义将保留到会话结束，然后消失。你不能在私有临时表上创建索引。\n\
  \n##### 表前缀\n\n私有临时表必须使用标准前缀。默认情况下，此前缀为 `ORA$PTT_`，因为它是在参数中设置的。\n\n```sql\nselect\
  \ *\nfrom   v$parameter\nwhere  name = 'private_temp_table_prefix'\n/\n```\n\n#####\
  \ 临时表的限制\n\n尽管临时表看起来和行为上像常规表，但仍有一些限制。\n\n*   临时表不能被分区、集群或组织为索引。\n*   你不能在临时表上指定任何外键约束。\n\
  *   临时表不能包含嵌套表的列。\n*   你不能指定 `LOB_storage_clause` 的以下子句：`TABLESPACE`、`storage_clause`\
  \ 或 `logging_clause`。\n*   不支持对临时表进行并行 `UPDATE`、`DELETE` 和 `MERGE` 操作。\n*   对于临时表，`segment_attributes_clause`\
  \ 中唯一可以指定的部分是 `TABLESPACE`，它允许你指定一个单一的临时表空间。\n*   不支持对临时表进行分布式事务。\n*   临时表不能包含 `INVISIBLE`\
  \ 列。\n\n所有这些限制既适用于全局临时表，也适用于私有临时表。私有临时表在上述列表基础上还有更多限制。\n\n*   私有临时表的名称必须始终以 `init.ora`\
  \ 参数 `PRIVATE_TEMP_TABLE_PREFIX` 定义的任何内容为前缀。默认是 `ORA$PTT_`。\n*   你不能在私有临时表上创建索引、物化视图或区域映射。\n\
  *   不允许在私有临时表上定义主键或任何需要索引的约束。\n*   你不能定义带有默认值的列。\n*   你不能在任何永久对象（例如视图或触发器）中引用私有临时表。\n\
  *   私有临时表通过数据库链接不可见。\n\n尽管看起来临时表有很多限制，但它们可能非常有用。你可能不会受到这些限制的阻碍。\n\n\n### 外部表\n\n\
  #### 外部表基本概念\n\n外部表允许您像读取常规表一样从平面文件中读取数据。文件必须放置在 Oracle 数据库可以访问的位置。如果您使用的是文件系统上的文件，则需要创建一个目录对象并告诉\
  \ Oracle 数据库查找位置。\n\n```sql\ncreate or replace directory f1db_csv\nas '/media/sf_Ergast_F1/f1db_csv'\n\
  /\n```\n\n确保您对此位置拥有读取权限。如果使用`logfile`/`badfile`/`discardfile`，则还需要写入权限。\n\n现在，您可以使用`create\
  \ table … organization external`语法开始定义外部表。\n\n#### 创建外部表\n\n定义的第一部分类似于常规表，但需要通过`organization\
  \ external`关键字指定其为外部表。\n\n```sql\ncreate table drivers_ext\n( driverid     number\
  \  (  11 )\n, driverref    varchar2( 255 )\n, drivernumber varchar2( 255 )\n, code\
  \         varchar2(   3 )\n, forename     varchar2( 255 )\n, surname      varchar2(\
  \ 255 )\n, dob          date\n, nationality  varchar2( 255 )\n, url          varchar2(\
  \ 255 )\n) organization external\n/\n```\n\n#### 外部表属性\n\n现在，您需要指定外部表的属性。\n\n* \
  \  `type` 指定外部表的类型。每种类型都由其自己的访问驱动程序支持。\n    *   `oracle_loader` 是默认的访问驱动程序。它将数据从外部表加载到内部表。它只能读取文本数据文件，不能写入文本文件，即不能用于将内部表卸载到外部表中。\n\
  \    *   `oracle_datapump` 可以执行加载和卸载操作。数据必须位于二进制转储文件中。您只能作为使用`create table as select`语句创建外部表的一部分来使用此驱动程序写入转储文件。这是一次写入、多次读取的操作。您无法在外部表上执行任何\
  \ DML 操作。\n    *   `oracle_hdfs` 提取存储在 Hadoop 分布式文件系统 (HDFS) 中的数据。\n    *   `oracle_hive`\
  \ 提取存储在 Apache HIVE 中的数据。\n*   `default directory` 指定用于所有输入和输出文件的默认目录（如果您没有显式指定目录对象）。它是一个目录对象，而不是目录路径。\n\
  *   `access parameters` 描述外部数据源并实现外部表的类型。每种类型的外部表都有自己的访问驱动程序，需要自己的访问参数。访问参数是可选的。部分访问参数包括以下内容。\n\
  \    *   `records delimited by newline` 指示记录结束的字符。在 Unix 或 Linux 操作系统上，`NEWLINE`\
  \ 被假定为`'\\n'`。在 Microsoft Windows 操作系统上，`NEWLINE` 被假定为`'\\r\\n'`。如果您在 Unix 环境中使用在\
  \ Windows 系统上创建的文件，换行符会被错误地解析。要解决此问题，可以使用`records delimited by detected newline`。\n\
  \    *   注：`Detected newline` 是自 Oracle Database 19c 起提供的选项。\n    *   `skip <n>`\
  \ 指定在加载前要跳过的记录数。主要用于文件包含头信息的情况。\n    *   `badfile <filename>` 指定当记录因错误而无法加载时，将记录写入的文件名。\n\
  \    *   `logfile <filename>` 指定在访问数据时将所有消息写入的文件名。\n    *   `discardfile <filename>`\
  \ 指定将所有未能满足`load when`子句条件的记录写入的文件名。\n    *   `fields terminated by` 指定字段分隔符。\n\
  \    *   `optionally enclosed by` 指定字段包围符。\n\n在访问参数中，您还可以指定文件中发现的列。它必须是表定义中列的超集。指定列时，可以对列执行有限的操作，例如将日期字符串转换为`date`数据类型。\n\
  \n```\ndob char( 10 ) date_format date mask \"YYYY-MM-DD\"\n```\n\n有关所有其他访问参数，请查阅\
  \ Oracle 文档。\n\n*   `location` 指定外部表的数据文件。对于`oracle_loader`和`oracle_datapump`，使用`directory:file`格式。目录部分是可选的。如果省略，则使用默认目录。使用`oracle_loader`驱动程序时，可以在文件名中使用通配符。星号（`*`）表示\
  \ 0 个或多个字符，问号（`?`）表示单个字符。\n*   对于`oracle_hdfs`，它是目录或文件的 URI（统一资源标识符）列表。目录对象与 URI\
  \ 无关。\n*   对于`oracle_hive`，不使用此子句。而是使用 Hadoop HCatalog 表。\n*   `reject limit <n>`\
  \ 指定在加载完全停止之前可以拒绝的记录数。\n\n除了为日志文件、错误文件和废弃文件指定文件名外，您还可以指定`nologfile`、`nobadfile`和`nodiscardfile`选项。不会创建任何文件。\n\
  \n日志文件可能非常有用并包含有价值的信息，但它们可能变得非常大。在提升到生产环境时，您可能希望使用`nologfile`选项。如果希望使用`logfile`/`badfile`/`discardfile`，最好将它们放在不同的位置，以便包含这些文件的目录对象可以被授予只读权限。\n\
  \n清单 20-1 是创建外部表的完整脚本。\n\n```sql\ncreate table drivers_ext\n( driverid      number\
  \  (  11 )\n, driverref     varchar2( 256 )\n, driver_number varchar2( 256 )\n,\
  \ code          varchar2(   4 )\n, forename      varchar2( 256 )\n, surname    \
  \   varchar2( 256 )\n, dob           date\n, nationality   varchar2( 256 )\n, url\
  \           varchar2( 256 )\n) organization external\n(\ntype oracle_loader\ndefault\
  \ directory f1db_csv\naccess parameters\n( -- you can use comments,\n-- but only\
  \ at the beginning the parameters\nrecords delimited by newline\nskip 1\nbadfile\
  \ 'drivers.bad'\nlogfile 'drivers.log'\nfields terminated by ','\noptionally enclosed\
  \ by '\"'\n( driverid\n, driverref\n, driver_number\n, code\n, forename\n, surname\n\
  , dob          char( 10 ) date_format date mask \"YYYY-MM-DD\"\n, nationality\n\
  , url\n)\n)\nlocation ( 'drivers.csv' )\n)\nreject limit 0\n/\n```\n\n清单 20-1\n\
  创建 `drivers_ext` 外部表的脚本\n\n#### 修改与运行时操作\n\n创建外部表后，您可以修改设置，例如将其指向另一个文件。\n\n```sql\n\
  alter table drivers_ext location ( 'drivers100.csv' )\n```\n\n如果更改访问参数，请注意，您未提供的每个参数都会恢复为其默认值。它不会保留您之前提供的设置。\n\
  \nOracle Database 12.2 引入了在运行时修改某些设置的选项。\n\n*   您可以在`access`参数中更改`badfile`、`logfile`和`discardfile`的文件名。其他`access`参数保留其值。\n\
  *   更改`default directory`；它必须是一个字面值。\n*   更改`location`；它可以是一个字面值或绑定变量。\n*   更改`reject\
  \ limit`；它可以是一个字面值或绑定变量。\n\n```sql\nselect count(*)\nfrom   drivers_ext external\
  \ modify (location ('drivers100.csv'))\n/\nCOUNT(*)\n\nselect count(*)\nfrom   drivers_ext\n\
  /\nCOUNT(*)\n```\n\n#### 内联外部表\n\n自 Oracle Database 18c 起，您无需创建外部表即可访问外部表。通常位于外部表\
  \ DDL 中的所有代码现在都可以放入 SQL 语句中。\n\n```sql\nselect * from external (\n( constructorId\
  \  number(11)\n, constructorRef varchar2(256)\n, name           varchar2(256)\n\
  , nationality    varchar2(256)\n, url            varchar2(256)\n)\ntype oracle_loader\n\
  default directory f1db_csv\naccess parameters\n( records delimited by newline\n\
  skip 1\nbadfile 'constructors.bad'\nlogfile 'constructors.log'\nfields terminated\
  \ by ','\noptionally enclosed by '\"'\n( constructorId\n, constructorRef\n, name\n\
  , nationality\n, url\n)\n)\nlocation ( 'constructors.csv' )\nreject limit 0\n)\n\
  ```\n\n\n\n如果您之前使用 SQL*loader 实用程序将数据加载到 Oracle Database 中，可以通过 `EXTERNAL_TABLE=GENERATE_ONLY`\
  \ 选项来生成所需的外部表定义。\n\n### 不可变表\n\nOracle Database 21c 引入了不可变表的概念。不可变表是仅可插入的表，其中的现有数据无法更改。除非插入操作发生在指定的天数之前，否则禁止从不可变表中删除行。创建表后，无法执行任何\
  \ DDL 来更改表的布局。但是，可以添加和移除约束及索引。\n\n以下语句用于创建不可变表。\n\n```sql\ncreate immutable table\
  \ dutchdrivers\n( driverid     number  (  11 ) not null\n, driverref    varchar2(\
  \ 255 )\n, drivernumber number  (  11 )\n, code         varchar2(   3 )\n, forename\
  \     varchar2( 255 )\n, surname      varchar2( 255 )\n, dob          date\n, nationality\
  \  varchar2( 255 )\n, url          varchar2( 255 )\n)\n```\n\n您必须指定删除整个表和删除行的保留期。\n\
  \n首先，指定删除表的条件。\n\n```sql\nno drop [ until days idle ]\n```\n\n您可以为 idle 选项指定的最小天数为\
  \ 0。\n\n接下来，指定在能够删除行之前的记录保留时间。\n\n```sql\nno delete ( [ locked ] | ( until days\
  \ after insert [ locked ] ) )\n```\n\n您可以为 delete 选项指定的最小天数为 16 天。\n\n您可以选择永久保留数据；那么，您就不必在这两个子句中指定天数。\n\
  \n**提示**\n\n在尝试这些选项时，请确保将 drop 子句中的 idle 天数设置为一个较低的值，最好为 0；否则，您最终可能会得到一个充满无法删除的表的模式。除了完全删除您的数据库之外，没有其他选项可以移除仍处于保留期内的表。\n\
  \n创建表的完整脚本可以在清单 20-2 中找到。\n\n```sql\ncreate immutable table dutchdrivers\n( driverid\
  \      number  (  11 ) not null\n, driverref     varchar2( 255 )\n, driver_number\
  \ number  (  11 )\n, code          varchar2(   3 )\n, forename      varchar2( 255\
  \ )\n, surname       varchar2( 255 )\n, dob           date\n, nationality   varchar2(\
  \ 255 )\n, url           varchar2( 255 )\n)\nno drop until 0 days idle\nno delete\
  \ until 16 days after insert\n/\nListing 20-2\n创建不可变表 dutchdrivers\n```\n\n现在您已经创建了表，可以向其中插入数据。\n\
  \n```sql\ninsert into dutchdrivers\nselect *\nfrom f1data.drivers drv\nwhere drv.nationality\
  \ = 'Dutch'\n/\n```\n\n到目前为止，这与普通表完全相同。当您添加一条您稍后想要更改或移除的记录时，这就不可能了。\n\n```sql\n\
  insert into dutchdrivers\nselect *\nfrom f1data.drivers drv\nwhere drv.drivernumber\
  \ = 44\n/\n```\n\n如果您尝试更新该记录，将会遇到错误。\n\n```sql\nupdate dutchdrivers ddv\nset ddv.nationality\
  \ = 'Dutch'\nwhere ddv.drivernumber = 44\n/\nORA-05715: operation not allowed on\
  \ the blockchain or immutable table\n```\n\n如果您尝试删除该记录，将会遇到相同的错误。\n\n```sql\ndelete\
  \ from dutchdrivers ddv\nwhere ddv.drivernumber = '44'\n/\nORA-05715: operation\
  \ not allowed on the blockchain or immutable table\n```\n\n当您想要移除该记录时，如果您指定了 `no\
  \ delete until`，则必须等待指定的天数。\n\n此功能在 Oracle Database 21c 中引入，但已向后移植到 Oracle Database\
  \ 19.11。\n\n当存储不应被篡改的数据（例如合同数据）时，此功能非常有用。如果您想要比仅仅确保记录无法更改更高的安全性，可以使用区块链表，其中记录使用哈希算法链接在一起。\n\
  \n### 区块链表\n\n区块链表是仅可追加的表，其中只允许插入操作。删除行要么被禁止，要么根据时间受到限制。特殊的排序和链接算法使区块链表中的行具有防篡改性。用户可以验证行是否未被篡改。行元数据的一部分哈希值用于链接和验证行。\n\
  \n区块链表的语法与不可变表几乎相同。区块链表必须在表定义中包含一个额外的子句。\n\n```sql\nhashing using sha2_512 version\
  \ v1\n```\n\n哈希算法在记录添加到表中时基于现有数据计算，这与不可变表相比增加了加载时间。\n\n清单 20-3 是一个创建的区块链表，类似于之前创建的不可变表。\n\
  \n```sql\ncreate blockchain table dutchdrivers\n( driverid      number  (  11 )\
  \ not null\n, driverref     varchar2( 255 )\n, driver_number number  (  11 )\n,\
  \ code          varchar2(   3 )\n, forename      varchar2( 255 )\n, surname    \
  \   varchar2( 255 )\n, dob           date\n, nationality   varchar2( 255 )\n, url\
  \           varchar2( 255 )\n)\nno drop until 0 days idle\nno delete until 16 days\
  \ after insert\nhashing using sha2_512 version v1\n/\nListing 20-3\n创建区块链表 dutchdrivers\n\
  ```\n\n此表具有与不可变表相同的限制，因此在插入并提交数据后，您无法修改或删除行。但是，如果保留时间已过，则可以进行删除操作。\n\n此功能在 Oracle\
  \ Database 21c 中引入，但已向后移植到 Oracle Database 19.10。\n\n### 总结\n\n如您所见，Oracle Database\
  \ 远不止是一个“表容器”。某些表，如堆表，在 OLTP 环境中很有用。相比之下，其他表，如索引组织表，在 OLTP 和数据仓库环境中作为查找表非常有用。B 树索引在\
  \ OLTP 环境中更有用，而位图索引在数据仓库环境中更有用。有时，您可能希望将数据从内存卸载到数据库中，以充分利用 SQL 的功能，同时节省可用内存，这时临时表就派上用场了。如果您想要无法篡改的表，可以使用不可变表或区块链表。\n\
  \nOracle Database 为您提供了所有选项，现在您可以理解为什么一种类型会更适合。\n\n\n\n"
