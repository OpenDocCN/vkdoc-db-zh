  raw: '## Setup


    To be able to work with AQ, extra privileges are required. The privileges related
    to working with AQ are outlined in Table [16-1](#536316_1_En_16_Chapter.xhtml#Tab1).


    Table 16-1


    Privileges


    | Operations | Privileges |

    | --- | --- |

    | Create, drop, and monitor own queues | Execute privileges on DBMS_AQADM |

    | Create, drop, and monitor any queues | Execute privileges on DBMS_AQADM and
    the role AQ_ADMINISTRATOR_ROLE |

    | Enqueue and dequeue own queues | Execute privileges on DBMS_AQ |

    | Enqueue and dequeue another queue | Execute privileges on DBMS_AQThe owner of
    the other queue can grant privileges with DBMS_AQADM.GRANT_QUEUE_PRIVILEGE |

    | Enqueue and Dequeue any queue | Execute privileges on DBMS_AQThe AQ admin must
    grant ENQUEUE ANY QUEUE and DEQUEUE ANY QUEUE using DBMS_AQADM.GRANT_SYSTEM_PRIVILEGE
    |


    For the use case, execute privileges on `dbms_aqadm` and `dbms_aq`. This allows
    you to create and drop queues and enqueue and dequeue messages.


    As described in the high-level plan, a staging table is needed to hold the uploaded
    files. The table includes the columns outlined in Table [16-2](#536316_1_En_16_Chapter.xhtml#Tab2).


    Table 16-2


    Structure of the Staging table


    | Column Name | Purpose |

    | --- | --- |

    | FileID | Primary key to identify which file to process |

    | Filename | Name of the uploaded file, should include the file extension |

    | Mime_type | Mime type, in our case, should be “text/csv” |

    | Blob_content | The uploaded file in binary format |

    | Processed | A yes/no flag indicating if the file has been processed |

    | Uploaded_ts | A timestamp to register when the file was uploaded, default: `systimestamp`
    |

    | Processed_ts | A timestamp that records the completion of the processing |


    ## Queue Table and Queue


    The message (also called the *payload*) to be placed in the queue is defined by
    an object type. In this case, the object type is defined as follows.


    ```

    create noneditionable

    type file_payload_ot as object

    (fileid number)

    /

    ```


    This use case is very straightforward, but you can create an object type with
    many more attributes.


    Based on this object type, a queue table can be created using the DBMS_AQADM package.


    ```

    begin

    sys.dbms_aqadm.create_queue_table (

    queue_table        => ''file_process_qt''

    , queue_payload_type => ''file_payload_ot''

    );

    end;

    /

    ```


    This creates a queue table based on the payload object type that was created earlier.


    In this queue table, a queue is needed where the messages are placed and removed.
    It is possible to have multiple queues in a single queue table, but that’s beyond
    the scope of the use case. The queue is created and started with the following
    statement.


    ```

    begin

    sys.dbms_aqadm.create_queue

    ( queue_name  => ''file_process_q''

    , queue_table => ''file_process_qt''

    );

    sys.dbms_aqadm.start_queue

    ( queue_name => ''file_process_q'' );

    end;

    /

    ```


    When a queue is started, it is ready to accept messages to be enqueued.


    After these actions, several new extra objects are in the database to support
    the queue functionality.


    ```

    select object_name

    , object_type

    from   user_objects

    where  object_name like ''AQ%''

    /

    OBJECT_NAME               OBJECT_TYPE

    ------------------------- -----------------------

    AQ$FILE_PROCESS_QT        VIEW

    AQ$_FILE_PROCESS_QT_E     QUEUE

    AQ$_FILE_PROCESS_QT_F     VIEW

    AQ$_FILE_PROCESS_QT_H     TABLE

    AQ$_FILE_PROCESS_QT_I     INDEX

    AQ$_FILE_PROCESS_QT_T     INDEX

    6 rows selected.

    ```


    ## Enqueue and Dequeue


    Placing a message on the queue is done by calling `dbms_aq.enqueue`. While enqueuing
    a message, many properties can be set, such as specifying a delay or when a message
    should expire, but for the straightforward enqueue, the defaults are perfectly
    fine. For example, by default, the enqueuing follows the main transaction. When
    the session that enqueues a message rolls back the transaction, the message is
    removed from the queue. This behavior can be overruled; the message stay enqueued
    even if the main transaction rolls back.


    The options for enqueuing are set through a variable of the following type.


    ```

    sys.dbms_aq.enqueue_options_t

    ```


    The following code enqueues a message.


    ```

    declare

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    l_payload := file_payload_ot (1234);

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    end;

    /

    ```


    Caution


    The `queue_name` argument for enqueuing and dequeuing refers to the name of the
    queue, not the queue table.


    The message appears in the result set when the `file_process_qt` queue table is
    queried.


    ```

    select user_data

    from file_process_qt

    /

    USER_DATA(FILEID)


    FILE_PAYLOAD_OT(1234)

    ```


    Rolling back the transaction removes it again.


    ```

    rollback

    /

    Rollback complete.

    select user_data

    from file_process_qt

    /

    no rows selected

    ```


    To dequeue a message from a queue, the `dbms_aq.dequeue` procedure is used. Like
    with the enqueue procedure, the default settings for dequeuing are well-chosen
    and suffice in most situations. By default, the dequeue procedure follows the
    main transaction. When a message is dequeued and the transaction is rolled back,
    the message is not removed from the queue.


    Dequeuing options are set through a local variable of the following type.


    ```

    sys.dbms_aq.dequeue_options_t;

    ```


    The following code dequeues a message from the queue.


    ```

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    sys.dbms_aq.dequeue

    ( queue_name         => ''file_process_q''

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    sys.dbms_output.put_line

    ( ''File to be processed is ['' || l_payload.fileid || '']'' );

    end;

    /

    File to be processed is [1234]

    ```


    When there is no message to dequeue, the procedure waits until there is a message.
    The default setting for `wait` is *forever*. This can be overruled by setting
    the wait dequeue option to `no_wait` or a specific number of seconds to wait.


    ```

    l_dequeue_options.wait := dbms_aq.no_wait;

    ```


    Wait a maximum time of three seconds.


    ```

    l_dequeue_options.wait := 3;

    ```


    When the wait time is elapsed, or `no_wait` is specified, an exception is raised
    when there is no message on the queue.


    ```

    ORA-25228: timeout or end-of-fetch during message dequeue from BOOK.FILE_PROCESS_Q

    ```'
  trans: '

    ## 设置


    要使用 AQ，需要额外的权限。与 AQ 相关的权限在表 16-1 中概述。


    ### 权限


    | 操作 | 所需权限 |

    | --- | --- |

    | 创建、删除和监控自己的队列 | 对 `DBMS_AQADM` 的执行权限 |

    | 创建、删除和监控任何队列 | 对 `DBMS_AQADM` 的执行权限和 `AQ_ADMINISTRATOR_ROLE` 角色 |

    | 向自己的队列入队和出队 | 对 `DBMS_AQ` 的执行权限 |

    | 向其他队列入队和出队 | 对 `DBMS_AQ` 的执行权限。该队列的所有者可以使用 `DBMS_AQADM.GRANT_QUEUE_PRIVILEGE`
    授予权限 |

    | 向任何队列入队和出队 | 对 `DBMS_AQ` 的执行权限。AQ 管理员必须使用 `DBMS_AQADM.GRANT_SYSTEM_PRIVILEGE`
    授予 `ENQUEUE ANY QUEUE` 和 `DEQUEUE ANY QUEUE` 权限 |


    对于此用例，需要 `dbms_aqadm` 和 `dbms_aq` 的执行权限。这允许你创建和删除队列，以及入队和出队消息。


    如高层计划所述，需要一个暂存表来保存上传的文件。该表包含表 16-2 中概述的列。


    ### 暂存表结构


    | 列名 | 用途 |

    | --- | --- |

    | `FileID` | 主键，用于标识要处理的文件 |

    | `Filename` | 上传文件的名称，应包含文件扩展名 |

    | `Mime_type` | MIME 类型，在本例中应为 "text/csv" |

    | `Blob_content` | 上传文件的二进制格式 |

    | `Processed` | 一个 是/否 标志，指示文件是否已处理 |

    | `Uploaded_ts` | 记录文件上传时间的时间戳，默认值：`systimestamp` |

    | `Processed_ts` | 记录处理完成时间的时间戳 |


    ## 队列表与队列


    要放置在队列中的消息（也称为*有效负载*）由一个对象类型定义。本例中，对象类型定义如下。


    ```

    create noneditionable

    type file_payload_ot as object

    (fileid number)

    /

    ```


    这个用例非常直接，但你可以创建一个具有更多属性的对象类型。


    基于此对象类型，可以使用 `DBMS_AQADM` 包创建队列表。


    ```

    begin

    sys.dbms_aqadm.create_queue_table (

    queue_table        => ''file_process_qt''

    , queue_payload_type => ''file_payload_ot''

    );

    end;

    /

    ```


    这基于之前创建的有效负载对象类型创建了一个队列表。


    在此队列表中，需要一个队列来放置和移除消息。可以在单个队列表中有多个队列，但这超出了本用例的范围。队列通过以下语句创建并启动。


    ```

    begin

    sys.dbms_aqadm.create_queue

    ( queue_name  => ''file_process_q''

    , queue_table => ''file_process_qt''

    );

    sys.dbms_aqadm.start_queue

    ( queue_name => ''file_process_q'' );

    end;

    /

    ```


    当队列启动后，它就准备好接受要入队的消息了。


    这些操作之后，数据库中会新增几个支持队列功能的对象。


    ```

    select object_name

    , object_type

    from   user_objects

    where  object_name like ''AQ%''

    /

    OBJECT_NAME               OBJECT_TYPE

    ------------------------- -----------------------

    AQ$FILE_PROCESS_QT        VIEW

    AQ$_FILE_PROCESS_QT_E     QUEUE

    AQ$_FILE_PROCESS_QT_F     VIEW

    AQ$_FILE_PROCESS_QT_H     TABLE

    AQ$_FILE_PROCESS_QT_I     INDEX

    AQ$_FILE_PROCESS_QT_T     INDEX

    6 rows selected.

    ```


    ## 入队与出队


    通过调用 `dbms_aq.enqueue` 将消息放置到队列上。在入队消息时，可以设置许多属性，例如指定延迟或消息何时应过期，但对于简单的入队操作，默认设置完全足够。例如，默认情况下，入队跟随主事务。当入队消息的会话回滚事务时，消息将从队列中移除。此行为可以被覆盖；即使主事务回滚，消息也会保持入队状态。


    入队的选项通过以下类型的变量设置。


    ```

    sys.dbms_aq.enqueue_options_t

    ```


    以下代码将一个消息入队。


    ```

    declare

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    l_payload := file_payload_ot (1234);

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    end;

    /

    ```


    > 注意

    >

    > 入队和出队的 `queue_name` 参数指的是队列的名称，而不是队列表。


    查询 `file_process_qt` 队列表时，消息会出现在结果集中。


    ```

    select user_data

    from file_process_qt

    /

    USER_DATA(FILEID)


    FILE_PAYLOAD_OT(1234)

    ```


    回滚事务会再次移除它。


    ```

    rollback

    /

    Rollback complete.

    select user_data

    from file_process_qt

    /

    no rows selected

    ```


    要从队列中出队一个消息，使用 `dbms_aq.dequeue` 过程。与入队过程类似，出队过程的默认设置很合理，在大多数情况下已经足够。默认情况下，出队过程跟随主事务。当消息出队后事务被回滚，消息不会从队列中移除。


    出队选项通过以下类型的局部变量设置。


    ```

    sys.dbms_aq.dequeue_options_t;

    ```


    以下代码从队列中出队一个消息。


    ```

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    sys.dbms_aq.dequeue

    ( queue_name         => ''file_process_q''

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    sys.dbms_output.put_line

    ( ''要处理的文件是 ['' || l_payload.fileid || '']'' );

    end;

    /

    要处理的文件是 [1234]

    ```


    当没有消息可供出队时，该过程会等待直到有消息出现。`wait` 的默认设置是*永远等待*。这可以通过将 `wait` 出队选项设置为 `no_wait` 或特定的秒数来覆盖。


    ```

    l_dequeue_options.wait := dbms_aq.no_wait;

    ```


    等待最长时间三秒。


    ```

    l_dequeue_options.wait := 3;

    ```


    当等待时间结束，或指定了 `no_wait` 且队列上没有消息时，会引发异常。


    ```

    ORA-25228: timeout or end-of-fetch during message dequeue from BOOK.FILE_PROCESS_Q

    ```

    '
- fmt: '## Wrapper Procedures


    For this use case, a procedure is needed to store the file in the staging table
    and place a message on the queue. The wrapper procedure to enqueue a message is
    defined as follows.


    ```sql

    procedure process_later (p_fileid in staging.fileid%type)

    is

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    l_payload := file_payload_ot( p_fileid );

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    end process_later;

    ```


    The procedure called by the application to store the file in the staging table
    is defined as follows.


    ```sql

    procedure upload_file

    ( p_filename     in staging.filename%type

    , p_mime_type    in staging.mime_type%type

    , p_blob_content in staging.blob_content%type

    )

    is

    l_fileid staging.fileid%type;

    begin

    insert into staging

    ( filename

    , mime_type

    , blob_content

    , upload_ts

    , processed)

    values

    ( p_filename

    , p_mime_type

    , p_blob_content

    , systimestamp

    , ''N'')

    returning fileid

    into l_fileid;

    -- When the file is stored in the table

    -- place a message on the queue to

    -- initiate the processing at a later time

    process_later( p_fileid => l_fileid );

    end;

    /

    ```


    There also needs to be a procedure to process the file and distribute the data
    to the correct tables. For this chapter, the implementation of that procedure
    is irrelevant. The following procedure is implemented to simulate the processing
    of the file.


    ```sql

    procedure process_file (p_fileid in staging.fileid%type)

    is

    begin

    sys.dbms_session.sleep( 3 ); -- simulate hard work

    update staging

    set    processed = ''Y''

    , processed_ts = systimestamp

    where  fileid = p_fileid;

    end process_file;

    /

    ```


    This procedure first waits three seconds, after which the processed flag is set
    to `''Y''`, and the `processed_ts` is populated with the current timestamp.


    ## PL/SQL Callback Notification


    Once the file is uploaded to a staging table, and a message is placed in the queue,
    how do you kick off the processing?


    One method is to have a scheduled job run, let’s say, every day at a specified
    time. The downside of a scheduled job is that it would mean that the job also
    runs when there are no files to be processed. The files could also be uploaded
    after running the job, resulting in delayed processing. It would also mean that
    the job runs even if the system is really busy at that time, which would hinder
    the system’s users.


    ### Callback Notification Mechanism


    Queues have a better trick up their sleeve; PL/SQL callback notification. Callback
    notification can initiate a PL/SQL procedure when a message is added to the queue.
    When a message is enqueued, the callback procedure is started automatically. When
    this happens, it is handled by the database, most likely when it is “quiet.” The
    downside is that there is no control over *when* the file is processed.


    ### Setting Up the Callback


    Some steps must be taken to set up the PL/SQL callback notification. First, the
    queue table must allow multiple consumers to dequeue messages. A consumer is an
    agent that reads messages in the queue.


    Unfortunately, the queue table can’t be altered to allow multiple consumers. This
    can only be specified at creation time. To remove the queue table and queue, execute
    the following code.


    ```sql

    begin

    dbms_aqadm.stop_queue

    ( queue_name => ''file_process_q'' );

    dbms_aqadm.drop_queue

    ( queue_name => ''file_process_q'' );

    dbms_aqadm.drop_queue_table

    ( queue_table => ''file_process_qt'' );

    end;

    /

    ```


    A queue can’t be dropped when it has been started. It must be stopped first.


    The following code creates a new queue table with multiple consumers enabled and
    based on the same object type.


    ```sql

    begin

    sys.dbms_aqadm.create_queue_table

    ( queue_table        => ''file_process_qt''

    , queue_payload_type => ''file_payload_ot''

    , multiple_consumers => true

    );

    end;

    /

    ```


    After the queue table is re-created, the queue must also be reinstated.


    ```sql

    begin

    sys.dbms_aqadm.create_queue

    ( queue_name  => ''file_process_q''

    , queue_table => ''file_process_qt''

    );

    sys.dbms_aqadm.start_queue

    ( queue_name => ''file_process_q'' );

    end;

    /

    ```


    These actions lead to additional objects being created in the database.


    ```sql

    select object_name

    , object_type

    from   user_objects

    where  object_name like ''AQ%''

    /

    OBJECT_NAME               OBJECT_TYPE

    ------------------------- -----------------------

    AQ$FILE_PROCESS_QT        VIEW

    AQ$FILE_PROCESS_QT_R      VIEW

    AQ$FILE_PROCESS_QT_S      VIEW

    AQ$_FILE_PROCESS_QT_E     QUEUE

    AQ$_FILE_PROCESS_QT_F     VIEW

    AQ$_FILE_PROCESS_QT_G     TABLE

    AQ$_FILE_PROCESS_QT_H     TABLE

    AQ$_FILE_PROCESS_QT_I     TABLE

    AQ$_FILE_PROCESS_QT_L     TABLE

    AQ$_FILE_PROCESS_QT_N     SEQUENCE

    AQ$_FILE_PROCESS_QT_S     TABLE

    AQ$_FILE_PROCESS_QT_T     TABLE

    AQ$_FILE_PROCESS_QT_V     EVALUATION CONTEXT

    13 rows selected.

    ```


    ### The Callback Procedure


    Before the consumer can subscribe to the queue and specify which PL/SQL routine
    to call, the PL/SQL callback procedure must be created. The PL/SQL callback procedure
    must adhere to the following signature.


    ```sql

    procedure plsqlcallback(

    context  IN  RAW

    , reginfo  IN  SYS.AQ$_REG_INFO

    , descr    IN  SYS.AQ$_DESCRIPTOR

    , payload  IN  RAW

    , payloadl IN  NUMBER

    );

    ```


    For this simple use case, the `descr` argument contains all the information that
    is needed. The other arguments can be used for more advanced use cases. The main
    purpose of the PL/SQL callback procedure is to dequeue the message and call the
    file processing functionality.


    ```sql

    procedure process_file_callback( context  in raw

    , reginfo  in sys.aq$_reg_info

    , descr    in sys.aq$_descriptor

    , payload  in raw

    , payloadl in number)

    is

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw(16);

    l_payload            file_payload_ot;

    begin

    -- Retrieve the message from the queue

    l_dequeue_options.msgid := descr.msg_id;

    l_dequeue_options.consumer_name := descr.consumer_name;

    sys.dbms_aq.dequeue

    ( queue_name         => descr.queue_name

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    -- Once the message is dequeued, the real

    -- work can be done in the process file

    -- procedure to parse and process

    -- the file contents

    process_file (p_fileid => l_payload.fileid);

    -- The transaction must be committed to

    -- make sure that the message is removed

    -- from the queue

    commit;

    end process_file_callback;

    /

    ```


    The procedure should complete the transaction with a `commit` so that the message
    is definitively removed from the queue.


    ### Registering the Subscriber and Callback


    With this PL/SQL callback notification in place, a consumer can be created to
    subscribe to the queue. The name of the subscriber is `file_process_subscriber`
    and is added to the `file_process_q`.


    ```sql

    begin

    sys.dbms_aqadm.add_subscriber

    ( queue_name => ''file_process_q''

    , subscriber => sys.aq$_agent

    ( name     => ''file_process_subscriber''

    , address  => null

    , protocol => null

    )

    );

    end;

    /

    ```


    The final piece of the puzzle is to register the actual callback procedure.


    ```sql

    begin

    sys.dbms_aq.register

    ( reg_list =>

    sys.aq$_reg_info_list

    ( sys.aq$_reg_info

    ( name      => ''file_process_q:file_process_subscriber''

    , namespace => dbms_aq.namespace_aq

    , callback  => ''plsql://process_file_callback''

    , context   => null

    )

    )

    , reg_count => 1

    );

    end;

    /

    ```


    The `context` argument can be used to pass information (in RAW format) to the
    callback procedure. In the callback procedure you can use this information, for
    example, to distinguish between different subscribers to the queue. For this use
    case this is not needed as there is only one subscriber.'
