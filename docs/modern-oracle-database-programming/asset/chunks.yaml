    FAMILYNAME      PERM NICKN

    --------------- ---- -----

    Coulthard            DC

    Vettel          5

    ```


    In the query results, it is not immediately clear what causes the NULL values.
    At the column level, it is possible to test for attribute existence with the `exists`
    clause. In the following example, two extra columns are added to test for the
    existence of the attribute specified on the path. The existence test for the `permanentNumber`
    attribute returns a VARCHAR2 (true or false), and the test for “nickname” returns
    a number (0 or 1). Right after the column name (`has_nickname`), the data type
    you want to be returned is specified before the `exists` keyword.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( familyName

    , permanentNumber

    , has_permanentNumber exists path permanentNumber

    , nickname

    , has_nickname number exists path nickname

    )

    ) d

    /

    FAMILYNAME      PERM HAS_P NICKN HAS_N

    --------------- ---- ----- ----- -----

    Coulthard            false DC        1

    Vettel          5    true            1

    ```


    In the results, the null for `permanentNumber` is caused by the missing attribute
    for Coulthard (the `has_permanentnumber` column is false), while the nickname
    for Vettel has a NULL JSON value (the `has_nickname` column is 1).


    The sample JSON document has two arrays: Drivers and Constructors. The `nested
    path` clause, with its own `columns` clause, transforms the data in the nested
    array into a relational format.


    The following query shows the use of `nested path` in the columns clause.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( code

    , nested path ''$.Constructors[*]''

    columns

    ( constructorId

    , name

    , nationality

    )

    )

    ) d

    /

    CODE  CONSTRUCTORID   NAME              NATIONALITY

    ----- --------------- ----------------- ------------

    COU

    VET   red_bull        Red Bull          Austrian

    VET   aston_martin    Aston Martin      British

    ```


    Take special precautions when an attribute in the JSON document occurs multiple
    times and needs to be shown in a relational format. The `nationality` attribute
    appears in the Drivers array and the Constructors array in the sample JSON document.
    Adding both to the query leads to an error.


    ```

    00918\. 00000 -  "column ambiguously defined"

    ```


    When this occurs, one of the columns needs to be assigned a different name. In
    the following example, the nationality of the Constructor is renamed to `cnationality`.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( code

    , nationality

    , nested path ''$.Constructors[*]''

    columns

    ( name

    , cnationality path ''$.nationality''

    )

    )

    ) d

    /

    CODE  NATIONALITY     NAME            CNATIONALITY

    ----- --------------- --------------- ---------------

    COU   British

    VET   German          Red Bull        Austrian

    VET   German          Aston Martin    British

    ```


    Note that the driver’s code VET appears twice in the result set in the preceding
    query results. This is because there are two entries in the Constructors array.


    Because of the limited size of the sample JSON document, it is easy to see which
    data belongs together, but this might not always be the case.


    The `for ordinality` clause can be added to generate row numbers to clarify which
    records in the relational view belong together. There can only be one ordinality
    column per `json_table` or `nested` clause. The following example adds an ordinality
    column for the drivers and the constructors.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( dseq for ordinality

    , code

    , nationality

    , nested path ''$.Constructors[*]''

    columns

    ( cseq for ordinality

    , name

    )

    )

    ) d

    /

    DSEQ CODE  NATIONALITY           CSEQ NAME

    ---------- ----- --------------- ---------- ---------------

    1 COU   British

    2 VET   German                   1 Red Bull

    2 VET   German                   2 Aston Martin

    ```


    There are circumstances where there is a need to extract a fragment of the JSON
    document for processing later. For example, when the delivered JSON document contains
    customer information (multiple customers) with all their related orders. To distribute
    this JSON document over several database tables, it might be prudent to extract
    the customer data first and store it in the customer table while also extracting
    the related order data in JSON format so it can be passed to the next `json_table`
    function to parse the order data for this customer. This way, it is unnecessary
    to parse the complete JSON document several times but only parse the part needed
    for a specific task.


    The following query extracts the constructors JSON fragment, with `format json`
    added in the `columns` clause.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( code

    , constructors format json path ''$.Constructors''

    )

    ) d

    /

    CODE  CONSTRUCTORS

    ----- --------------------------------------------------

    COU

    VET   [{"constructorId":"red_bull","name":"Red Bull","na

    tionality":"Austrian"},{"constructorId":"aston_mar

    tin","name":"Aston Martin","nationality":"British"

    }]

    ```


    Only one of the drivers has a Constructors array associated with it.


    Caution


    The Constructors array does not exist for Coulthard and the results in the preceding
    query reflect this. When only the `error on error` clause is used at the table
    level or column level with `format json`, an error is raised. The error states
    that no value is targeted, which is correct in this situation. In situations like
    these, also add the `null on empty` clause.This also occurs when the `nested path`
    is used in the `columns` clause.'
