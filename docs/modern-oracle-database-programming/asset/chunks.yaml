    ## DML 错误日志


    执行 DML 时，可能会出现问题。例如，当违反约束时，操作无法完成，事务会被回滚。如果你正在处理单条记录，这不是问题：要么修复数据并重新运行语句，要么将错误记录到某处。但是，如果你运行一条插入一百万行的语句，而第一百万行失败了，整个事务都会被回滚。Oracle
    数据库提供了一种机制来解决这个问题。'
- fmt: '## Log Errors


    创建一个包含所有分配了永久编号的车手的表。


    ```

    create table drivers_with_number

    as

    select drv.*

    from   f1data.drivers drv

    where  1=2

    /

    ```


    为确保永久编号的唯一性，需要给表添加一个唯一性约束。


    ```

    alter table drivers_with_number add constraint un_driver_number

    unique (driver_number)

    /

    ```


    要使用此功能，必须创建一个表来保存有问题的记录。`dbms_errlog` 包提供了一个名为 `create_error_log` 的过程来简化此操作。


    ```

    procedure create_error_log

    ( dml_table_name varchar2

    , err_log_table_name  varchar2 default NULL

    , err_log_table_owner varchar2 default NULL

    , err_log_table_space varchar2 default NULL

    , skip_unsupported    boolean  default FALSE

    );

    ```


    使用此过程时指定所有默认值，如下所示。


    ```

    begin

    dbms_errlog.create_error_log

    (dml_table_name => ''drivers_with_number'');

    end;

    /

    ```


    这将在当前模式中创建一个名为 `ERR$_DRIVERS_WITH_NUMBER` 的表。该表有五个描述错误的列。


    ```

    desc err$_drivers_with_number

    Name            Type            Nullable Default Comments

    --------------- --------------- -------- ------- --------

    ORA_ERR_NUMBER$ NUMBER          Y

    ORA_ERR_MESG$   VARCHAR2(2000)  Y

    ORA_ERR_ROWID$  UROWID          Y

    ORA_ERR_OPTYP$  VARCHAR2(2)     Y

    ORA_ERR_TAG$    VARCHAR2(2000)  Y

    ```


    并且，对于源表中的每一列，它都会创建一个 `VARCHAR2` 类型的列。如果原始列的类型是 `VARCHAR2`，则新列也是 `VARCHAR2` 类型，但长度为最大字符串大小。其他所有列的类型都是
    `VARCHAR2(4000)`。在 `max_string_size=extended` 的数据库中，您会看到类似下面这样类型为 `VARCHAR2(32767)`
    的列。


    ```

    DRIVERID        VARCHAR2(4000)  Y

    DRIVERREF       VARCHAR2(32767) Y

    DRIVER_NUMBER   VARCHAR2(4000)  Y

    CODE            VARCHAR2(32767) Y

    FORENAME        VARCHAR2(32767) Y

    SURNAME         VARCHAR2(32767) Y

    DOB             VARCHAR2(4000)  Y

    NATIONALITY     VARCHAR2(32767) Y

    URL             VARCHAR2(32767) Y

    ```


    要将此表用作错误日志，必须在 DML 语句中添加 `log errors` 子句。


    - `into` 子句允许您指定错误日志表的名称。默认为当前模式下的 `err$_<tablename>`。

    - `error_tag` 允许您指定一个字符串，用于标识与此语句相关的记录。

    - `reject limit` 允许您在引发异常之前指定希望接受的错误数量。


    ```

    insert into drivers_with_number

    select *

    from   f1data.drivers drv

    where  drv.driver_number is not null

    log errors into err$_drivers_with_number (''with limit unlimited'') reject limit
    unlimited

    /

    ```


    ```

    log errors

    [into [schema_name.]table_name]

    [(''error_tag'')]

    [reject limit integer|unlimited]

    ```


    所有错误都被写入错误日志表。表 1-2 展示了其中一个错误。


    表 1-2


    一条错误记录


    | **ORA_ERR_NUMBER$** | 1 |

    | **ORA_ERR_MESG$** | ORA-00001: unique constraint (BOOK.UN_DRIVER_NUMBER) violated
    |

    | **ORA_ERR_ROWID$** |  |

    | **ORA_ERR_OPTYP$** | I |

    | **ORA_ERR_TAG$** | with limit unlimited |

    | **DRIVERID** | 846 |

    | **DRIVERREF** | Norris |

    | **DRIVER_NUMBER** | 4 |

    | **CODE** | NOR |

    | **FORENAME** | Lando |

    | **SURNAME** | Norris |

    | **DOB** | 13-NOV-99 |

    | **NATIONALITY** | British |

    | **URL** | [`http://en.wikipedia.org/wiki/Lando_Norris`](http://en.wikipedia.org/wiki/Lando_Norris)
    |


    目标表包含未引发错误的记录。所有有问题的记录都被记录在错误日志表中。错误日志表中的数据会被持久化保存，无论您是 `commit` 还是 `rollback`
    该事务。


    > **注意：** `ORA_ERR_ROWID$` 指向原始记录的行 ID；因此，在执行插入操作时该字段为空。当执行更新操作时，它会包含一个值。


    ## Save Exceptions


    在 PL/SQL 中使用 `forall` 语句执行批量 DML 操作时，有一个类似的选择。在这种情况下，错误不会被记录到表中，而是记录到内存中的一个集合里。


    Oracle 数据库会引发一个特殊的异常，您可以捕获并处理它。


    ```

    failure_in_forall exception;

    pragma exception_init( failure_in_forall, -24381 );

    ```


    所有异常都被保存到一个伪集合中：`sql%bulk_exceptions`。此集合中包含以下可用属性。


    - `error_code`: 保存相应的错误代码。

    - `error_index`: 保存当前 `forall` 语句的迭代编号。

    - `count`: 保存异常的总数量。


    ```

    declare

    cursor c_drivers is

    select drv.*

    from   f1data.drivers drv

    where  drv.driver_number is not null

    order  by drv.dob;

    type drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_drivers drivers_tt;

    failure_in_forall exception;

    pragma exception_init( failure_in_forall, -24381 );

    begin

    open  c_drivers;

    fetch c_drivers

    bulk  collect into l_drivers;

    close c_drivers;

    if l_drivers.count > 0

    then

    begin

    forall indx in l_drivers.first .. l_drivers.last

    save exceptions

    insert

    into drivers_with_number values l_drivers(indx);

    exception

    when failure_in_forall then

    for indx in 1 .. sql%bulk_exceptions.count

    loop

    dbms_output.put_line(  ''Error ''

    || indx

    || '' occurred on index ''

    || sql%bulk_exceptions( indx ).

    error_index

    || ''.''

    );

    dbms_output.put_line(  ''Oracle error is ''

    || sqlerrm( -1 *

    sql%bulk_exceptions( indx ).

    error_code)

    );        end loop;

    end;

    end if;

    end;

    /

    Error 1 occurred on index 25.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 2 occurred on index 31.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 3 occurred on index 32.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 4 occurred on index 36.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 5 occurred on index 39.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 6 occurred on index 47.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 7 occurred on index 50.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 8 occurred on index 51.

    Oracle error is ORA-00001: unique constraint (.) violated

    PL/SQL procedure successfully completed

    Listing 1-10

    Using forall with save exceptions

    ```


    > **注意：** 错误代码是一个正数，但 Oracle 错误代码是负数，因此必须将代码乘以 -1 才能获得正确的错误消息。


    ## Summary


    本章探讨了如何利用集合和批量操作从数据库检索数据并将其写回数据库表。集合与复合触发器结合用于日志记录，或者用于规避 *变异表* 问题时也非常有用。


    本章还涵盖了针对直接 DML（插入、更新、删除）和批量操作的错误处理。


    # 2. Analytic Functions and (un)Pivoting


    数据库应用程序的最终用户经常要求导出 Excel 文件，以便他们能够操作数据来获取做出业务决策所需的信息，这种情况太过常见了。通常，所需的信息可以通过使用
    SQL 以最终用户期望的格式检索到，从而消除了导出后手动操作数据的需要。您对 SQL 的了解越深入，就越有能力满足最终用户的各种需求。本章讨论两种重要的技术：分析函数和透视。


    分析函数是一个需要掌握的重要工具，尽管它已有超过 23 年的历史，但仍然相对不为人知。


    将结果集进行透视是将行转换为列的常见需求，同样地，逆透视则是将列转换为行。'
  raw: "### Log Errors\n\nCreate a table of all the drivers who have a permanent number\
    \ assigned to them.\n\n```\ncreate table drivers_with_number\nas\nselect drv.*\n\
    from   f1data.drivers drv\nwhere  1=2\n/\n```\n\nTo ensure the permanent number\
    \ is unique, add a unique constraint to the table.\n\n```\nalter table drivers_with_number\
    \ add constraint un_driver_number\nunique (driver_number)\n/\n```\n\nTo use this\
    \ feature, you must create a table to hold the problematic records. The `dbms_errlog`\
    \ package has a procedure (`create_error_log`) to facilitate this.\n\n```\nprocedure\
    \ create_error_log\n( dml_table_name varchar2\n, err_log_table_name  varchar2\
    \ default NULL\n, err_log_table_owner varchar2 default NULL\n, err_log_table_space\
    \ varchar2 default NULL\n, skip_unsupported    boolean  default FALSE\n);\n```\n\
    \nUse this procedure with all the default values, as follows.\n\n```\nbegin\n\
    dbms_errlog.create_error_log\n(dml_table_name => 'drivers_with_number');\nend;\n\
    /\n```\n\nA `ERR$_DRIVERS_WITH_NUMBER` table is created in the current schema.\
    \ This table has five columns describing the error.\n\n```\ndesc err$_drivers_with_number\n\
    Name            Type            Nullable Default Comments\n--------------- ---------------\
    \ -------- ------- --------\nORA_ERR_NUMBER$ NUMBER          Y\nORA_ERR_MESG$\
    \   VARCHAR2(2000)  Y\nORA_ERR_ROWID$  UROWID          Y\nORA_ERR_OPTYP$  VARCHAR2(2)\
    \     Y\nORA_ERR_TAG$    VARCHAR2(2000)  Y\n```\n\nAnd for every column in the\
    \ source table, it creates a VARCHAR2 column. If the original column is of type\
    \ VARCHAR2, the new column is of type VARCHAR2 with the max string size. Every\
    \ other column is of type VARCHAR2(4000). In a database with max_string_size=extended,\
    \ you see columns like these with a VARCHAR2(32767) data type.\n\n```\nDRIVERID\
    \        VARCHAR2(4000)  Y\nDRIVERREF       VARCHAR2(32767) Y\nDRIVER_NUMBER \
    \  VARCHAR2(4000)  Y\nCODE            VARCHAR2(32767) Y\nFORENAME        VARCHAR2(32767)\
    \ Y\nSURNAME         VARCHAR2(32767) Y\nDOB             VARCHAR2(4000)  Y\nNATIONALITY\
    \     VARCHAR2(32767) Y\nURL             VARCHAR2(32767) Y\n```\n\nTo use this\
    \ table as an error log, you must extend your DML statement with a `log errors`\
    \ clause.\n\n*   The `into` clause allows you to specify the name of the error\
    \ log table. The default is `err$_<tablename>` in the current schema.\n\n*   `error_tag`\
    \ allows you to specify any string you can use to identify the records connected\
    \ to this statement.\n\n*   `reject limit` allows you to specify the number of\
    \ errors you want to accept before an exception is raised.\n\n    ```\n    insert\
    \ into drivers_with_number\n    select *\n    from   f1data.drivers drv\n    where\
    \  drv.driver_number is not null\n    log errors into err$_drivers_with_number\
    \ ('with limit unlimited') reject limit unlimited\n    /\n    ```\n\n```\nlog\
    \ errors\n[into [schema_name.]table_name]\n[('error_tag')]\n[reject limit integer|unlimited]\n\
    ```\n\nAll the errors are written in the error log table. Table [1-2](#536316_1_En_1_Chapter.xhtml#Tab2)\
    \ shows one of these errors.\n\nTable 1-2\n\nAn Error Record\n\n| **ORA_ERR_NUMBER$**\
    \ | 1 |\n| **ORA_ERR_MESG$** | ORA-00001: unique constraint (BOOK.UN_DRIVER_NUMBER)\
    \ violated |\n| **ORA_ERR_ROWID$** |   |\n| **ORA_ERR_OPTYP$** | I |\n| **ORA_ERR_TAG$**\
    \ | with limit unlimited |\n| **DRIVERID** | 846 |\n| **DRIVERREF** | Norris |\n\
    | **DRIVER_NUMBER** | 4 |\n| **CODE** | NOR |\n| **FORENAME** | Lando |\n| **SURNAME**\
    \ | Norris |\n| **DOB** | 13-NOV-99 |\n| **NATIONALITY** | British |\n| **URL**\
    \ | [`http://en.wikipedia.org/wiki/Lando_Norris`](http://en.wikipedia.org/wiki/Lando_Norris)\
    \ |\n\nThe target table contains the records that raise no errors. All the problematic\
    \ records are logged in the error logging table. The data in the error logging\
    \ table is persisted, regardless of whether you `commit` or `rollback` the transaction.\n\
    \nNote\n\nORA_ERR_ROWID$ points to the original record row ID; therefore, it is\
    \ empty when performing an insert. It contains a value when an update is issued.\n\
    \n### Save Exceptions\n\nWhen performing bulk DML statements in PL/SQL using the\
    \ `forall` statement, you have a similar option. In this case, the errors are\
    \ not logged into a table but into a collection in memory.\n\nOracle Database\
    \ raises a special exception that you can handle.\n\n```\nfailure_in_forall exception;\n\
    pragma exception_init( failure_in_forall, -24381 );\n```\n\nAll the exceptions\
    \ are saved into a pseudo-collection: `sql%bulk_exceptions`. The following are\
    \ the attributes available in this collection.\n\n*   `error_code`: Holds the\
    \ corresponding error code\n\n*   `error_index`: Holds the iteration number of\
    \ the current forall statement\n\n*   `count`: Holds the total number of exceptions\n\
    \n    ```\n    declare\n    cursor c_drivers is\n    select drv.*\n    from  \
    \ f1data.drivers drv\n    where  drv.driver_number is not null\n    order  by\
    \ drv.dob;\n    type drivers_tt is table of f1data.drivers%rowtype\n    index\
    \ by pls_integer;\n    l_drivers drivers_tt;\n    failure_in_forall exception;\n\
    \    pragma exception_init( failure_in_forall, -24381 );\n    begin\n    open\
    \  c_drivers;\n    fetch c_drivers\n    bulk  collect into l_drivers;\n    close\
    \ c_drivers;\n    if l_drivers.count > 0\n    then\n    begin\n    forall indx\
    \ in l_drivers.first .. l_drivers.last\n    save exceptions\n    insert\n    into\
    \ drivers_with_number values l_drivers(indx);\n    exception\n    when failure_in_forall\
