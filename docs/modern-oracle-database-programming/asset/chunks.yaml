- fmt: '### 检查正确的数据库环境


    使用错误指令，你可以防止代码在不同环境（例如你的生产环境）中被编译。你可以创建一些不应在生产环境中编译的代码，因为它们包含的工具在开发环境中可能非常有用但被认为不安全。


    你可以使用选择指令和查询指令来检查你的环境。


    ```

    $if environment_pkg.development $then

    ```


    如果你的环境正确，就包含该代码。


    ```

    procedure still_in_development;

    ```


    如果环境不正确，则使用 `$error` 指令来阻止代码编译。


    ```

    $else

    $error ''This package is for the development environment only''

    $end

    $end

    ```


    清单 [6-11](#536316_1_En_6_Chapter.xhtml#PC53) 展示了完整的实现。


    ```

    create or replace package only_for_dev is

    $if environment_pkg.development $then

    procedure still_in_development;

    $else

    $error ''This package is for the development environment only''

    $end

    $end

    end only_for_dev;

    Listing 6-11

    仅用于开发环境的代码

    ```


    通过使用包含不同标志的环境包，你可以根据环境来编译代码。清单 [6-12](#536316_1_En_6_Chapter.xhtml#PC54) 创建了具有正确标志值的环境包。


    ```

    declare

    l_pack_spec varchar2( 32767 );

    l_env       varchar2( 128 );

    function tochar(

    p_val in boolean)

    return varchar2

    as

    begin

    return case p_val

    when true then ''TRUE''

    when false then ''FALSE''

    else null

    end;

    end tochar;

    begin

    l_env       := sys_context( ''userenv'', ''db_name'' );

    l_pack_spec := ''create or replace package environment_pkg''

    || chr( 10 );

    l_pack_spec := l_pack_spec || ''is'' || chr( 10 );

    l_pack_spec := l_pack_spec || ''   --=='' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   -- Environment Information''

    || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   development constant boolean := ''

    || lower( tochar( l_env like ''%DEV%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   test        constant boolean := ''

    || lower( tochar( l_env like ''%TST%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   acceptance  constant boolean := ''

    || lower( tochar( l_env like ''%ACC%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   production  constant boolean := ''

    || lower( tochar( l_env like ''%PRD%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec || ''   --=='' || chr( 10 );

    l_pack_spec := l_pack_spec || ''end environment_pkg;''

    || chr( 10 );

    execute immediate l_pack_spec;

    end;

    /

    Listing 6-12

    创建环境包

    ```


    如果你在部署脚本中包含这个匿名块，你就可以确保标志包含正确的值，并且你的代码将根据这些标志的设置进行编译。你必须创建一个包来保存这些值，因为查询指令必须包含静态常量，而
    `SYS_CONTEXT` 不被视为静态布尔表达式。


    使用环境检查还可以防止代码在不同环境中执行。一个很好的例子是防止程序在非生产环境中发送电子邮件。


    ### 展示已编译内容


    你可以执行以下命令来查看根据你的 `CCFLAGS` 设置、数据库版本或环境设置编译的代码。


    ```

    dbms_preprocessor.print_post_processed_source

    ```


    查看代码编译后的样子对于分析代码的行为非常有用。


    清单 [6-13](#536316_1_En_6_Chapter.xhtml#PC56) 展示了实际的源代码。


    ```

    create or replace package postprocesseddemo as

    $if $$exposeprocedure $then

    procedure private_procedure;

    $end

    procedure public_procedure;

    end postprocesseddemo;

    Listing 6-13

    预处理演示

    ```


    当你使用正确的参数调用该过程时。


    ```

    begin

    dbms_preprocessor.print_post_processed_source

    (object_type => ''PACKAGE''

    ,schema_name => ''BOOK''

    ,object_name => ''POSTPROCESSEDDEMO'');

    end;

    ```


    你会得到类似下面的结果。


    ```

    package ccdemo as

    procedure public_procedure;

    end ccdemo;

    ```


    注意输出中的空行。这些空行是为所有未进入编译源代码的行插入的，包括包含指令的行。这样做是为了在报告错误时保留行号。


    如果你重新编译包并将标志设置为 `TRUE`。


    ```

    alter package postprocesseddemo compile plsql_ccflags = ''exposeprocedure:true''

    ```


    你会得到不同的结果。


    ```

    package postprocesseddemo as

    procedure private_procedure;

    procedure public_procedure;

    end postprocesseddemo;

    ```


    **提示**


    使用此实用程序时，请确保在设置 `server output` 时启用了格式包装；否则，空行会被删除。`set serveroutput on size unlimited
    format wrapped`


    ### 总结


    本章介绍了选择、查询和错误指令，这些是条件编译的构建块。通过条件编译，你可以为不同的 Oracle 数据库版本创建单一代码库，确保代码被部署到正确的环境（例如，仅部署到开发环境而绝不部署到生产环境），以及出于测试目的暴露私有过程。文中还讨论了条件编译的几个用例和一些技巧。


    ## 7. 迭代和限定表达式


    自 Oracle 首次在数据库中引入 PL/SQL 以来，循环语句就一直存在。通过一些编码和创建特殊逻辑，所有类型的循环都是可能的。许多这些“自制”的循环类型，如步进循环和有条件退出点的循环，现在已通过标准代码实现。


    ### 迭代


    `for` 循环指定了一个迭代器及其迭代控制。如果需要，可以堆叠迭代控制，从而将多个循环浓缩为一个循环。迭代器的作用域仅限于循环内部。循环外的语句不能引用迭代器，迭代器在循环结束后是未定义的。


    #### 迭代控制


    在 Oracle Database 21c 之前发布的版本中，`for` 循环具有静态签名 `for <iterator> in [reverse] <iteration_start>
    .. <iteration_end>`，这是唯一的迭代控制。循环变量始终是整数，从起始值运行到结束值，或者如果指定了 `reverse`，则从结束值运行到起始值，访问起始值和结束值之间的所有值。当你想跳过值或想做一些特殊处理时，必须由你自己来构建。


    ##### 多重迭代控制


    以前，一个迭代器只能有一个迭代控制，因此如果你想对多个集合做相同的事情，你就必须设计多个循环并复制逻辑。当然，你会为此创建一个（局部）过程，但即便如此，你仍然在创建代码，如清单
    [7-1](#536316_1_En_7_Chapter.xhtml#PC1) 所示。


    ```

    begin

    for i in 1 .. 3

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 100 .. 104

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-1

    21c 之前的多重迭代

    ```


    从 Oracle Database 21c 开始，你可以在一个循环内堆叠多个迭代控制。为了实现相同的逻辑，你可以编写如清单 [7-2](#536316_1_En_7_Chapter.xhtml#PC2)
    所示的代码。


    ```

    begin

    for i in 1 .. 3, 100 .. 104, 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-2

    21c 及更高版本的多重迭代

    ```'
  raw: '### Checking for the Correct Database Environment


    Using the error directive, you can prevent code from being compiled on different
    environments, for instance, your production environment. You can create code that
    should not be compiled in a production environment because it holds utilities
    that might be considered unsafe but very helpful in a development environment.


    You can check your environment using a selection directive with an inquiry directive.


    ```

    $if environment_pkg.development $then

    ```


    If your environment is correct, you include the code.


    ```

    procedure still_in_development;

    ```


    If it is not the correct environment, you use the `$error` directive to prevent
    the code from compiling.


    ```

    $else

    $error ''This package is for the development environment only''

    $end

    $end

    ```


    Listing [6-11](#536316_1_En_6_Chapter.xhtml#PC53) shows the complete implementation.


    ```

    create or replace package only_for_dev is

    $if environment_pkg.development $then

    procedure still_in_development;

    $else

    $error ''This package is for the development environment only''

    $end

    $end

    end only_for_dev;

    Listing 6-11

    Code for development environment only

    ```


    Using an environment package that holds the different flags, you compile the code
    depending on the environment. Listing [6-12](#536316_1_En_6_Chapter.xhtml#PC54)
    creates the environment package with the correct flags’ values.


    ```

    declare

    l_pack_spec varchar2( 32767 );

    l_env       varchar2( 128 );

    function tochar(

    p_val in boolean)

    return varchar2

    as

    begin

    return case p_val

    when true then ''TRUE''

    when false then ''FALSE''

    else null

    end;

    end tochar;

    begin

    l_env       := sys_context( ''userenv'', ''db_name'' );

    l_pack_spec := ''create or replace package environment_pkg''

    || chr( 10 );

    l_pack_spec := l_pack_spec || ''is'' || chr( 10 );

    l_pack_spec := l_pack_spec || ''   --=='' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   -- Environment Information''

    || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   development constant boolean := ''

    || lower( tochar( l_env like ''%DEV%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   test        constant boolean := ''

    || lower( tochar( l_env like ''%TST%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   acceptance  constant boolean := ''

    || lower( tochar( l_env like ''%ACC%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec

    || ''   production  constant boolean := ''

    || lower( tochar( l_env like ''%PRD%'' ) )

    || '';'' || chr( 10 );

    l_pack_spec := l_pack_spec || ''   --=='' || chr( 10 );

    l_pack_spec := l_pack_spec || ''end environment_pkg;''

    || chr( 10 );

    execute immediate l_pack_spec;

    end;

    /

    Listing 6-12

    Create the environment package

    ```


    If you include this anonymous block in your deployment scripts, you can be sure
    the flags contain the correct values, and your code with be compiled according
    to the settings of these flags. You must create a package to hold the values because
    the inquiry directive must contain static constants, and SYS_CONTEXT is not considered
    a static boolean expression.


    Using the check for the environment can also prevent code from being executed
    in different environments. A good example is preventing the program from sending
    emails while not running in the production environment.


    ## Showing What’s Compiled


    You can issue the following command to view the code compiled based on your CCFLAGS
    settings, database version, or environment settings.


    ```

    dbms_preprocessor.print_post_processed_source

    ```


    Seeing your code as it is compiled can be very useful when analyzing what the
    code is doing.


    Listing [6-13](#536316_1_En_6_Chapter.xhtml#PC56) shows the actual source code.


    ```

    create or replace package postprocesseddemo as

    $if $$exposeprocedure $then

    procedure private_procedure;

    $end

    procedure public_procedure;

    end postprocesseddemo;

    Listing 6-13

    Post-processed demo

    ```


    When you call the procedure with the correct parameters.


    ```

    begin

    dbms_preprocessor.print_post_processed_source

    (object_type => ''PACKAGE''

    ,schema_name => ''BOOK''

    ,object_name => ''POSTPROCESSEDDEMO'');

    end;

    ```


    You get a result like the following.


    ```

    package ccdemo as

    procedure public_procedure;

    end ccdemo;

    ```


    Notice the empty lines in the output. These empty lines are inserted for all the
    lines that didn’t make it to the compiled source, including the lines with the
    directives. This is done to preserve the line number when reporting an error.


    If you recompile the package and set the flag to TRUE.


    ```

    alter package postprocesseddemo compile plsql_ccflags = ''exposeprocedure:true''

    ```


    You get a different result.


    ```

    package postprocesseddemo as

    procedure private_procedure;

    procedure public_procedure;

    end postprocesseddemo;

    ```


    Tip


    when using this utility, make sure you have set format wrapped when setting server
    output on; otherwise, the empty lines are deleted. `set serveroutput on size unlimited
    format wrapped`


    ## Summary


    This chapter covered selection, inquiry, and error directives, the building blocks
    of conditional compilation. With conditional compilation, you can create a single
    codebase for different Oracle Database versions, make sure that code is deployed
    to the correct environment (code that should only be deployed to a development
    environment and certainly not to production), and expose private procedures for
    testing purposes. Several use cases and some tips on working with conditional
    compilation were discussed.


    # 7. Iterations and Qualified Expressions


    Oracle Database has had loop statements since it first introduced PL/SQL into
    the database. All kinds of loops were possible with a little coding and creating
    special logic. Many of these “home brew” loop types, like stepped loops and loops
    with conditional exit points, are now available in standard code.


    ## Iterations


    The `for` loop specifies an iterator and the iteration controls. If necessary,
    the iteration controls can be stacked, resulting in multiple loops condensed into
    one loop. The iterator only has scope inside the loop. Statements outside the
    loop cannot reference the iterator, which is undefined after the loop.


    ### Iteration Controls


    In versions released prior to Oracle Database 21c, the `for` loop had a static
    signature `for <iterator> in [reverse] <iteration_start> .. <iteration_end>`,
    which was the only iteration control. Loops were always an integer, run from start
    to end or from end to start if the reverse, visiting all values between start
    and end. When you wanted to skip values or wanted to do something special, it
    had to be built by you.


    #### Multiple Iteration Controls


    There used to be only a single iteration control for an iterator, so if you wanted
    to do the same thing for multiple sets, you would have to come up with multiple
    loops and copy the logic here. Of course, you would create a (local) procedure
    for this, but still, you would create code, as seen in Listing [7-1](#536316_1_En_7_Chapter.xhtml#PC1).


    ```

    begin

    for i in 1 .. 3

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 100 .. 104

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-1

    Multiple iterations pre-21c

    ```


    Since Oracle Database 21c, you can stack up multiple iteration controls within
    one loop. To achieve the same logic, you can create code as written in Listing
    [7-2](#536316_1_En_7_Chapter.xhtml#PC2).


    ```

    begin

    for i in 1 .. 3, 100 .. 104, 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-2

    Multiple iterations 21c and up

    ```'
