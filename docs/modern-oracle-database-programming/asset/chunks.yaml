    | `MODIFY_COLUMN` | 修改屏蔽策略中的列，以更改屏蔽函数类型 `function_type` 或函数参数 `function_parameters`。
    |

    | `SET_POLICY_DESCRIPTION` | 为屏蔽策略设置描述。 |

    | `SET_COLUMN_DESCRIPTION` | 为列上执行的屏蔽设置描述。 |


