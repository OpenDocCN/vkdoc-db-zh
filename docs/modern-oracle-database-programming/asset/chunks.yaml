- fmt: "# 在 Oracle APEX 中处理 Web 服务请求头与 JSON 数据\n\n当 Web 服务要求您指定请求头时，最初可能不太清楚该如何操作。\n\
    \n设置请求头是通过为全局变量 `g_request_headers` 赋值来完成的，该变量在 `apex_web_service` 包中定义。\n\n[清单\
    \ 15-2](#536316_1_En_15_Chapter.xhtml#PC10) 展示了如何设置用于 Bearer 令牌授权的请求头，将文本 “Bearer\
    \ ”（带一个尾随空格）与局部变量 `l_bearer_token` 连接起来，以及一个包含在通过 HTTP GET 请求调用 Web 服务时发送的请求体内容类型的请求头。\n\
    \n```\napex_web_service.g_request_headers(1).name  := 'Authorization';\napex_web_service.g_request_headers(1).value\
    \ := 'Bearer ' || l_bearer_token;\napex_web_service.g_request_headers(2).name\
    \  := 'Content-Type';\napex_web_service.g_request_headers(2).value := 'application/json';\n\
    ```\n\n清单 15-2 设置请求头\n\n由于请求头是设置在全局变量中的，建议在 Web 服务调用后将其清除。这可以防止其他 Web 服务调用重用于特定\
    \ Web 服务的相同请求头。可以通过以下方式清除请求头。\n\n```\napex_web_service.clear_request_headers;\n\
    ```\n\n虽然前述设置请求头的方法有效，但一个打包过程可以一步到位。\n\n```\napex_web_service.set_request_headers\
    \ (\n    p_name_01  => 'Authorization'\n   ,p_value_01 => 'Bearer ' || l_bearer_token\n\
    \   ,p_name_02  => 'Content-Type'\n   ,p_value_02 => 'application/json'\n);\n\
    ```\n\n调用此过程的优点在于默认重置请求头；您无需担心它们。它们仅用于当前的 Web 服务调用。最多可以通过 `set_request_headers`\
    \ 过程设置五个请求头。\n\n`APEX_WEB_SERVICE` 包还能实现更多功能，例如基本认证、OAuth 认证、指定使用哪个 Oracle Wallet\
    \ 以及向 Web 服务发送 multipart/form 请求体。\n\n一个常见的需求是根据环境让 Web 服务指向多个不同的端点。对于开发环境，您希望指向端点\
    \ A，而生产环境则应指向端点 B。这可以通过条件编译实现（更多详情参见第 [6](#536316_1_En_6_Chapter.xhtml) 章）。\n\n\
    [清单 15-3](#536316_1_En_15_Chapter.xhtml#PC13) 是一个变量声明的示例，它根据 `environment_pkg`\
    \ 中的静态布尔值指向不同的端点。\n\n```\nl_url constant varchar2(50) :=\n$if environment_pkg.development\n\
    $then 'url to endpoint A'\n$elsif environment_pkg.production\n$then 'url to endpoint\
    \ B'\n$end;\n```\n\n清单 15-3 一个变量，不同环境指向不同端点\n\n`environment_pkg` 中的静态布尔值声明如下所示。\n\
    \n```\ndevelopment constant boolean := TRUE;\nproduction  constant boolean :=\
    \ FALSE;\n```\n\n## 从 JSON 获取数据\n\n当使用 Oracle Database 12 或更高版本时，最好使用内置的 JSON\
    \ 功能（参见第 [11](#536316_1_En_11_Chapter.xhtml)、[12](#536316_1_En_12_Chapter.xhtml)、[13](#536316_1_En_13_Chapter.xhtml)\
    \ 和 [14](#536316_1_En_14_Chapter.xhtml) 章），而不是 APEX 的功能。内置 JSON 功能的性能远优于 `apex_json`。\n\
    \n您已经检索了一个包含 Formula 1 数据的 JSON 文档。[清单 15-4](#536316_1_En_15_Chapter.xhtml#PC15)\
    \ 是此响应的一个格式化的小样本。\n\n```\n{\n  \"MRData\": {\n    \"xmlns\": \"http:\\/\\/ergast.com\\\
    /mrd\\/1.5\",\n    \"series\": \"f1\",\n    \"url\": \"http://ergast.com/api/f1/current.json\"\
    ,\n    \"limit\": \"30\",\n    \"offset\": \"0\",\n    \"total\": \"22\",\n  \
    \  \"RaceTable\": {\n      \"season\": \"2022\",\n      \"Races\": [\n       \
    \ {\n          \"season\": \"2022\",\n          \"round\": \"1\",\n          \"\
    url\": \"http:\\/\\/en.wikipedia.org\\/wiki\\/2022_Bahrain_Grand_Prix\",\n   \
    \       \"raceName\": \"Bahrain Grand Prix\",\n          // 为简洁起见省略\n        \
    \  // 此部分包含 22 场比赛的详细信息，例如赛道\n        }\n      ]\n    }\n  }\n}\n```\n\n清单 15-4\
    \ 格式化的 JSON 响应\n\n在从此 JSON 文档中提取数据之前，您需要将 JSON 文档解析为内部格式。\n\n```\napex_json.parse\
    \ ( p_values => races\n                 ,p_source => l_races\n               \
    \ );\n```\n\n其中 `races` 是类型为 `apex_json.t_values` 的局部变量，这是所需的内部格式。在局部变量中，`l_races`\
    \ 是调用 Web 服务的响应，其数据类型为 CLOB。\n\n本赛季的比赛数量存储在 `MRData` 对象的 `total` 属性中。因为此值预期是一个数字，所以可以使用\
    \ `get_number` 函数提取它。\n\n```\napex_json.get_number (\n    p_path   => 'MRData.total'\n\
    \   ,p_values => races\n);\n```\n\n使用点表示法，您指出了通往比赛总数的路径。同样，您可以提取位于 `RaceTable`\
    \ 对象中更深层的赛季值。\n\n```\napex_json.get_number (\n    p_path   => 'MRData.RaceTable.season'\n\
    \   ,p_values => races\n);\n```\n\n注意\n\n路径中的名称区分大小写。如果使用错误的大小写，则无法找到您要查找的节点。\n\
    \n所有赛季比赛的名称位于 `Races` 属性中的一个对象数组中。可以通过相应地调整路径来获取本赛季的第一场比赛名称。\n\n```\napex_json.get_varchar2\n\
    \   (p_path => 'MRData.RaceTable.Races[1].raceName'\n   ,p_values => races\n \
    \  );\n```\n\n[清单 15-5](#536316_1_En_15_Chapter.xhtml#PC20) 是一个完整的示例，包含对 Web 服务的调用并显示\
    \ JSON 文档中的不同值。\n\n```\ndeclare\n    races      apex_json.t_values;\n    l_races\
    \    clob;\n    l_elements apex_t_varchar2;\nbegin\n    l_races := apex_web_service.make_rest_request\n\
    \                   (p_url         => 'http://ergast.com/api/f1/current.json'\n\
    \                   ,p_http_method => 'GET'\n                   );\n    if apex_web_service.g_status_code\
    \ between 200 and 299\n    then\n        apex_json.parse ( p_values => races\n\
    \                         ,p_source => l_races\n                        );\n \
    \       sys.dbms_output.put_line (\n            'Season: '||\n            apex_json.get_number\n\
    \                         (p_path   => 'MRData.RaceTable.season'\n           \
    \              ,p_values => races)\n        );\n        sys.dbms_output.put_line\
    \ (\n            'Nr of races: '||\n            apex_json.get_number\n       \
    \                  (p_path   => 'MRData.total'\n                         ,p_values\
    \ => races)\n        );\n        sys.dbms_output.put_line (\n            'First\
    \ Race: '||\n            apex_json.get_varchar2\n                         (p_path\
    \ => 'MRData.RaceTable.Races[1].raceName'\n                         ,p_values\
    \ => races)\n        );\n    end if;\nend;\nSeason: 2022\nNr of races: 22\nFirst\
    \ Race: Bahrain Grand Prix\n```\n\n清单 15-5 从 JSON 文档中提取值"
  raw: 'When the web service requires that you specify request headers, it might not
    be clear how to do that at first.


    Setting request headers is done by assigning values to the global variable `g_request_headers`,
    specified in the `apex_web_service` package.


    Listing [15-2](#536316_1_En_15_Chapter.xhtml#PC10) shows how to set the request
    header for a Bearer token authorization, concatenating the text “Bearer ” (with
    a trailing space) and a local variable “l_bearer_token”, as well as a request
    header containing the content type of the body that you send when invoking the
    web service with an HTTP GET request.


    ```

    apex_web_service.g_request_headers(1).name  := ''Authorization'';

    apex_web_service.g_request_headers(1).value := ''Bearer '' || l_bearer_token;

    apex_web_service.g_request_headers(2).name  := ''Content-Type'';

    apex_web_service.g_request_headers(2).value := ''application/json'';

    Listing 15-2

    Setting request headers

    ```


    As the request headers are set in a global variable, it is advisable to clear
    them after the web service call. This prevents other web service invocations from
    reusing the same request headers meant for a specific web service. Clearing the
    request headers can be done via the following.


    ```

    apex_web_service.clear_request_headers;

    ```


    While the preceding method of setting the request headers works as expected, a
    packaged procedure can do it all.


    ```

    apex_web_service.set_request_headers (

    p_name_01  => ''Authorization''

    ,p_value_01 => ''Bearer '' || l_bearer_token

    ,p_name_02  => ''Content-Type''

    ,p_value_02 => ''application/json''

    );

    ```


    Invoking this procedure has the advantage of resetting request headers by default;
    you don’t have to worry about them. They are only used for the current web service
    call. Up to five request headers can be set via the `set_request_headers` procedure.


    Much more is possible with the APEX_WEB_SERVICE package, such as basic authentication,
    OAuth authentication, specifying which Oracle Wallet to use, and sending a multipart/form
    request body to a web service.


    A common requirement is to have multiple endpoints that the web service needs
    to point to, depending on the environment. For development, you want to point
    to endpoint A, while production should point to endpoint B. This can be achieved
    using conditional compilation (see Chapter [6](#536316_1_En_6_Chapter.xhtml) for
    more details).


    Listing [15-3](#536316_1_En_15_Chapter.xhtml#PC13) is an example of a variable
    declaration that points to different endpoints depending on the static boolean
    values in the `environment_pkg`.


    ```

    l_url constant varchar2(50) :=

    $if environment_pkg.development

    $then ''url to endpoint A''

    $elsif environment_pkg.production

    $then ''url to endpoint B''

    $end;

    Listing 15-3

    One variable, different endpoints per environment

    ```


    The declarations of the static booleans in `environment_pkg` look something like
    the following.


    ```

    development constant boolean := TRUE;

    production  constant boolean := FALSE;

    ```


    ## Getting Data from JSON


    When working with Oracle Database 12 or higher, you are better off using the built-in
    JSON functionality (see Chapters [11](#536316_1_En_11_Chapter.xhtml), [12](#536316_1_En_12_Chapter.xhtml),
    [13](#536316_1_En_13_Chapter.xhtml) and [14](#536316_1_En_14_Chapter.xhtml)) over
    APEX’s functionality. The performance of built-in JSON functionality is far superior
    to `apex_json`.


    You already retrieved a JSON document containing Formula 1 data. Listing [15-4](#536316_1_En_15_Chapter.xhtml#PC15)
    is a small sample of this response, nicely formatted.


    ```

    {

    "MRData": {

    "xmlns": "http:\/\/ergast.com\/mrd\/1.5",

    "series": "f1",

    "url": "http://ergast.com/api/f1/current.json",

    "limit": "30",

    "offset": "0",

    "total": "22",

    "RaceTable": {

    "season": "2022",

    "Races": [

    {

    "season": "2022",

    "round": "1",

    "url": "http:\/\/en.wikipedia.org\/wiki\/2022_Bahrain_Grand_Prix",

    "raceName": "Bahrain Grand Prix",

    // omitted for brevity

    // there are details of 22 races

    // in this section, such as circuits

    }

    ]

    }

    }

    }

    Listing 15-4

    Formatted JSON response

    ```


    Before you can extract data from this JSON document, you need to parse the JSON
    document into an internal format.


    ```

    apex_json.parse (p_values => races

    ,p_source => l_races

    );

    ```


    Where `races` is a local variable of type `apex_json.t_values` is the internal
    format needed. In the local variable, `l_races` is the response from the call
    to the web services, which data type is CLOB.


    The number of races in this season is stored in the `total` attribute in the `MRData`
    object. Because this value is expected to be a number, you can extract it using
    the `get_number` function.


    ```

    apex_json.get_number (

    p_path   => ''MRData.total''

    ,p_values => races

    );

    ```


    Using a dot notation, you indicate the path that leads to the total number of
    races. Similarly, you can extract the season, located one level deeper in the
    `RaceTable` object.


    ```

    apex_json.get_number (

    p_path   => ''MRData.RaceTable.season''

    ,p_values => races

    );

    ```


    Note


    Names in a path are case-sensitive. You cannot find the node you are looking for
    if you use the wrong case.


    The names of all the season races are located in an array of objects in the `Races`
    attribute. Getting the first race name of the season can be done by adjusting
    the path accordingly.


    ```

    apex_json.get_varchar2

    (p_path => ''MRData.RaceTable.Races[1].raceName''

    ,p_values => races

    );

    ```


    Listing [15-5](#536316_1_En_15_Chapter.xhtml#PC20) is a full-fledged example with
    the call to the web service and showing different values from the JSON document.


    ```

    declare

    races apex_json.t_values;

    l_races clob;

    l_elements apex_t_varchar2;

    begin

