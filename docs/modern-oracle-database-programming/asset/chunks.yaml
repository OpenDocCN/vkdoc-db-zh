- fmt: '# 使用 PL/SQL 与递归子查询因子化


    ```

    with

    function fullname( forename_in    in varchar2

    , surname_in     in varchar2

    , constructor_in in varchar2 )

    return varchar2

    is

    begin

    return forename_in

    || '' '' || surname_in

    || '' ('' || constructor_in || '')'';

    end fullname;

    function formattop3( pos1 in varchar2

    , pos2 in varchar2

    , pos3 in varchar2 )

    return varchar2

    is

    begin

    return ''1) '' || pos1 || chr(10)

    || ''2) '' || pos2 || chr(10)

    || ''3) '' || pos3 || chr(10);

    end formattop3;

    monaco as (

    select rsl.driverid

    , rsl.position

    , rcs.year

    from   f1data.circuits cct

    join   f1data.races rcs

    on   cct.circuitid = rcs.circuitid

    join   f1data.results rsl

    on   rcs.raceid = rsl.raceid

    where  cct.circuitref = ''monaco''

    and    rsl.position <= 3

    )

    , motorists as (

    select drv.driverid

    , fullname ( drv.forename

    , drv.surname

    , ctr.name

    ) as driver

    from   f1data.drivers      drv

    join   f1data.results      rsl

    on   drv.driverid = rsl.driverid

    join   f1data.constructors ctr

    on   rsl.constructorid = ctr.constructorid

    )

    , monaco_podiums as (

    select mon.year

    , mon.position

    , mtt.driver

    from   monaco mon

    join   motorists mtt

    on   mon.driverid = mtt.driverid

    )

    , monaco_pivot as (

    select year

    , first

    , second

    , third

    from   monaco_podiums

    pivot  (

    min(driver)

    for position in ( 1 as first

    , 2 as second

    , 3 as third

    )

    )

    )

    select year

    , formattop3 ( first

    , second

    , third

    ) as formatted

    from   monaco_pivot

    where  year < 1958

    order by year

    /

    YEAR FORMATTED

    ------ ----------------------------------------

    1950 1) Juan Fangio (Alfa Romeo)

    2) Alberto Ascari (Ferrari)

    3) Louis Chiron (Lancia)

    1955 1) Maurice Trintignant (Aston Martin)

    2) Eugenio Castellotti (Ferrari)

    3) Cesare Perdisa (Ferrari)

    1956 1) Stirling Moss (BRM)

    2) Juan Fangio (Alfa Romeo)

    3) Jean Behra (BRM)

    1957 1) Juan Fangio (Alfa Romeo)

    2) Tony Brooks (BRM)

    3) Masten Gregory (BRM)

    Listing 9-2

    Retrieve formatted Monaco top 3

    ```


    It is also possible to create procedures in the `with` clause, but you cannot
    call them from SQL because a procedure has no return value. The advantage of using
    PL/SQL in your factored query is that the context switch’s overhead is much lower
    than when calling a PL/SQL function. The disadvantage of using PL/SQL in your
    query is that the code is not reusable. Chapter [10](#536316_1_En_10_Chapter.xhtml)
    provides more information on calling PL/SQL from SQL. If you want to use the same
    code in a different query, you must duplicate the code there. An alternative is
    to use SQL Macros (see Chapter [8](#536316_1_En_8_Chapter.xhtml)).


    ## Recursive Subquery Factoring


    Traditionally a recursive relationship in the data model is when there is a foreign
    key relation to the primary key of the same table. The typical example is in the
    SCOTT schema, specifically the `EMP` table. In that table are employees, as well
    as managers, stored. The `mgr` column (as a foreign key) refers to the primary
    key `empno` of the same table, creating a hierarchical relation between the two.


    There is no such relationship in the data model used in this book. The following
    example explores the hierarchical relationship between `CONSTRUCTORS` and `DRIVERS`.


    The first step is to create a list of constructors and drivers, where there are
    only three columns involved.


    *   A fake “primary key” consisting of the letter `''c''` and the real `constructorid`
    (when a driver record, it is `''d''` and the `driverid`)


    *   The name of the constructor or the driver


    *   “foreign key” to the “primary key”


    This is done in a named subquery.


    ```

    with constructor_drivers as (

    select ''c''||to_char (ctr.constructorid) as pk

    , ctr.name

    , null as fk

    from   f1data.constructors ctr

    where  ctr.constructorref in (''ferrari'', ''mercedes'')

    union all

    select distinct

    ''d''||to_char (drv.driverid)

    , drv.surname as driver

    , ''c''||to_char (rst.constructorid) ctr_id

    from   f1data.results rst

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid)

    select *

    from constructor_drivers

    /

    PK         NAME                           FK

    ---------- ------------------------------ ----------

    c6         Ferrari

    c131       Mercedes

    d17        Webber                         c9

    d14        Coulthard                      c9

    d13        Massa                          c6

    d8         Räikkönen                      c6

    d847       Russell                        c131

    d1         Hamilton                       c131

    d844       Leclerc                        c6

    d832       Sainz                          c6

    d20        Vettel                         c6

    d608       Castellotti                    c6

    d802       Serafini                       c6

    d791       Biondetti                      c6

    >

    ```


    As seen in the output, the first column (`PK`) is a contraction of either a “c”
    (for constructor) or “d” (for driver) and the real primary key of the underlying
    table. The `name` column shows either a constructor *or* a driver name. The last
    column (`FK`) shows in case of a driver for which constructor he has driven or
    still drives. When the record is a constructor, the `FK` column is empty.


    The reason for the contraction of the primary key of the underlying table and
    a letter is to prevent ambiguous relations between the parent and child. The `FK`
    column with a value of 6 could point to the constructor Ferrari or driver Kazuki
    Nakajima.


    The recursive relation can easily be spotted with the data in this format: the
    `FK` column refers to the `PK` column in the result set.


    The recursive subquery factoring clause *must* contain two query blocks combined
    with a `union all` set operator. The first block of the query defines the anchor
    record, which signifies the start of the recursion. The anchor for this result
    set can be queried as follows.


    ```

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    ```


    This anchor query *only* selects those records that contain constructors. The
    `FK` column is always null for them.


    The next block, the recursive member, selects child records related to the anchor
    just selected and must reference the query name once.


    ```

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    ```


    The table “hierarchy” in the preceding query is the named query, referring to
    itself. This self-reference in the query block makes it a recursive subquery.
    Notice that the query named `constructor_drivers` also has a `union all`, but
    it has no self-reference and is not recursive.'
