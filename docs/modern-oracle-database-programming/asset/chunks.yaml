    ### DBMS_HPROF


    To help with profiling your code, you can use the DBMS_HPROF package. This package
    consists of a procedure to create the necessary tables, procedures, and functions
    to start and stop profiling and to analyze the acquired data.


    ### create_tables


    The `create_tables` procedure creates the tables needed to store all the profiling
    data.


    ```

    begin

    dbms_hprof.create_tables;

    end;

    /

    ```


    If you run this procedure a second time, you get an error telling you that the
    tables already exist. If you want to drop and re-create the tables, you can call
    the procedure with the `force_it` parameter set to TRUE.


    ```

    begin

    dbms_hprof.create_tables( force_it => true );

    end;

    /

    ```


    This procedure also re-creates two sequences.'
