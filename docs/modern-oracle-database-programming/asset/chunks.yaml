  trans: "\n## APEX 可用性\n\n只有当你的数据库中安装了 APEX 时，你才能利用它的功能。安装后，请保持其为最新版本，因为新功能和特性在不断加入，安全修复也在持续实施。\n\
    \nAPEX 作为一个独立的模式（schema）存在于数据库中，因此检查 APEX 是否已安装的一个简单方法是查询 APEX 用户。\n\n```sql\n\
    select username\nfrom all_users\nwhere username like 'APEX%'\n```\n\n该查询产生的结果会告诉你\
    \ APEX 模式是否存在，如果存在，还会显示已安装的版本。\n\n当你安装了 22.1 版本时，结果如下：\n\n```\nAPEX_220100\n```\n\
    \n如果你从这个查询中没有得到任何结果，那仅仅意味着 APEX 未安装。安装 APEX 超出了本书的范围，请参考相关文档。始终推荐使用最新版本的 APEX。最新版本的文档可以通过以下\
    \ URL 找到。\n\n```\nhttps://apex.oracle.com/doc\n```\n\n对于特定版本的文档，你可以在 URL 后附加你正在查找的版本号，如下所示。\n\
    \n```\nhttps://apex.oracle.com/doc212\n```\n\n由于本章重点介绍 APEX 提供的一些内置包，因此能够方便地访问文档非常有帮助。有一个\
    \ URL 可以直接带你进入 PL/SQL API 文档。\n\n```\nhttps://apex.oracle.com/api\n```\n\n注意\n\
    \n当数据库管理员（DBA）可能以“让 Web 服务器访问数据库风险太大”为由，导致无法充分利用 APEX 提供的全部功能时，或许可以请求*只*安装 APEX\
    \ 包而*不*设置 Web 服务器。拥有 APEX 包可以使 PL/SQL 开发工作轻松许多。\n\n## 调用 Web 服务\n\n一个常见的需求是将本地数据库中的数据与不同数据源中可用的数据结合起来。想想天气信息、货币汇率、运费报价或交换发票数据。\n\
    \n实现此目标的一种方法是调用 Web 服务。以前，在与 Web 服务交互时，你必须使用 `UTL_HTTP` 并处理许多底层细节。Oracle APEX\
    \ 使得调用 Web 服务变得非常简单。APEX 包同时支持 SOAP Web 服务和 REST 风格的 API。\n\n本部分讨论的示例使用了 Ergast\
    \ Developer API (`http://ergast.com/mrd/`)，该 API 提供了赛车运动的历史数据记录。通过此 Web 服务，可以获取\
    \ XML 或 JSON 格式的结果。我们更倾向于使用 JSON。\n\n本章中的示例使用 Oracle Database 21c Express Edition。根据你的数据库设置，你可能需要你的\
    \ DBA 配置网络访问控制列表（ACL）。\n\n注意\n\n配置网络 ACL 超出了本书的范围。这在 *Oracle APEX 安装指南* 的第 [6]\
    \ 章“安装和配置 Oracle APEX 与 Oracle REST 数据服务”中有所讨论。\n\n在 `apex_web_service` 包中，有两个用于调用\
    \ REST 风格 Web 服务的过程；一个返回 `CLOB`，另一个返回 `BLOB`。在示例中，调用了 `CLOB` 变体，以便可以轻松检查结果。当你需要将\
    \ JSON 文档存储在数据库中时，请参考第 [11] 章。\n\n调用 Web 服务所需的最低限度是 URL 和 HTTP 方法，本例中是 `GET` 请求。\n\
    \n```sql\ndeclare\n  l_response clob;\n  l_part     varchar2(4000 char);\n  l_offset\
    \   pls_integer;\nbegin\n  l_response := apex_web_service.make_rest_request\n\
    \                 (p_url         => 'http://ergast.com/api/f1/current.json'\n\
    \                 ,p_http_method => 'GET'\n                 );\n```\n\n该 URL 指定了要检索的内容：以\
    \ JSON 文档形式呈现的当前年份的一级方程式数据。如果从 URL 中省略 .json 扩展名，则会返回 XML。URL 语法由你所使用的 Web 服务决定。\n\
    \n调用 Web 服务后，最佳实践是验证调用是否成功。可以通过检查 `apex_web_service` 包中声明的全局变量 `g_status_code`\
    \ 来获取此值。成功的响应可能与错误响应大相径庭，因此你的解析方法也必须不同，以便从失败的响应中提取有用信息。\n\n响应状态码在 200 到 299 之间表示响应成功。\n\
    \n```sql\nif apex_web_service.g_status_code between 200 and 299 then\n```\n\n\
