    ### Simulate Built-in Recursive Functions


    With traditional recursive queries (`start with ... connect by`), some built-in
    functions are not available with recursive subquery factoring, but these can be
    easily simulated. For this section, only the query named `hierarchy` is shown.
    The named query `constructor_drivers` is defined as follows.


    ```

    with constructor_drivers as

    (

    select ''c''||to_char (ctr.constructorid) as pk

    , ctr.name

    , null as fk

    from   f1data.constructors ctr

    where  ctr.constructorref in (''ferrari'', ''mercedes'')

    union  all

    select distinct

    ''d''||to_char (drv.driverid)

    , drv.surname as driver

    , ''c''||to_char (rst.constructorid) ctr_id

    from   f1data.results rst

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    union  all

    select ''champ''||to_char (min (dsg.driverstandingsid))

    , to_char (rce.year)

    ||'' ('' || to_char (max (dsg.points) )

    || '' points)'' as points

    , ''d''||to_char (

    max (dsg.driverid)

    keep (dense_rank first

    order by dsg.points desc

    )) as driver

    from f1data.races rce

    join f1data.driverstandings dsg

    on rce.raceid = dsg.raceid

    group by rce.year

    )

    ```


    The preceding named query adds a third level that lists the champions over the
    years, where the PK column is a contraction of “champ” and an ID, and the FK column
    is a contraction of “d” and the `driverid` that was champion in that year. The
    NAME column shows the year and the points scored. Some results include the following.


