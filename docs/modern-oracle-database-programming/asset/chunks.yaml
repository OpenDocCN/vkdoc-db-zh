    function getdobfordriver( driverid_in in number )

    return date;

    end ccexception;

    /

    Listing 6-9

    测试异常的包规范

    ```


    如果你在不设置查询指令的情况下运行 `getdobfordriver` 函数，你会得到预期的输出。


    ```

