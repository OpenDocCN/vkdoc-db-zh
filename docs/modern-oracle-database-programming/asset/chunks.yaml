    ```

    create or replace

    function averagelaptime( raceid_in   in number

    , driverid_in in number )

    return varchar2 sql_macro( table ) is

    begin

    return q''[

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    , count( ltm.lap )        as lapcount

    , avg( ltm.milliseconds ) as averagemilliseconds

    from   f1data.laptimes ltm

    where  ltm.raceid   = raceid_in

    and    ltm.driverid = driverid_in

    group  by ltm.raceid

    , ltm.driverid

    ]'';

    end;

    /

    Listing 8-8

    averagelaptime SQL Macro

    ```


    Then your queries become simpler.


    ```

    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 830 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093      830           6131687       56    109494,410714286

    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 1 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093        1           6136710       56    109584,107142857

    ```


    ### Column Splitter (Table)


    You already saw an example of splitting a column into separate columns using PTFs.
    Let’s revisit that functionality, but now using SQL Macros.


    For this function, you need a table parameter for the table (or view or result
    set) to be processed and a parameter to tell the macro which columns to create
    in the output.


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    ```


    The function returns a VARCHAR2, which is a sql_macro of type table.


    ```

    return varchar2 sql_macro( table ) is

    ```


    In the macro, build up the SQL text to split the column into the new columns.


    ```

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split || q''[, trim( '';]'' ||

    q''['' from regexp_substr( ]'' ||

    table_in.column( 1 ).description.name ||

    q''[, ''{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    ```


    This is roughly the same code used in the PTF example.


    Because every new column has a leading space, you end up with a list of columns
    where you must strip the leading comma (`,`) to make it a valid piece of SQL text.


    ```

    l_split := trim( leading '','' from l_split );

    ```


    Now let’s build the complete SQL statement that results in the table you can select
    from.


    ```

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    ```


    In the preceding statement, `table_in` is replaced with the value of the `table_in`
    parameter.


    Listing [8-9](#536316_1_En_8_Chapter.xhtml#PC43) is the complete script.


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    return varchar2 sql_macro( table ) is

    l_sql         varchar2( 32767 );

    l_split       varchar2( 32767 );

    begin

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split ||

    q''[, trim( '';'' from regexp_substr( ]''||

    table_in.column( 1 ).description.name ||

    q''[, ''[^;]*;{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    l_split := trim( leading '','' from l_split );

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    dbms_tf.trace( l_sql );

    return l_sql;

    end;

    /

    Listing 8-9

    Split SQL Macro

    ```


    #### Splitting Columns with a SQL Macro


    With the same table in the PTF example of a split function, you can use a similar
    SQL statement to transform these separated values into individual columns.


    ```

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from split( f1drivers

    , columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

    /

    ```


    You get the same result as with the PTF. As you can see, there is a lot less code
    involved in this approach.'
  trans: '### 表类型 SQL 宏


    表类型 SQL 宏返回一段 SQL 文本，该文本的结果是一组行。参数化视图是表类型 SQL 宏的一种用例。视图让你访问有限的数据集。SQL 宏中的参数化视图可以根据你提供的参数，让你访问该数据集的一个子集。


    当然，你可以通过利用应用上下文并在视图的 `where` 子句中使用 `SYS_CONTEXT` 来实现一个伪参数化视图，但这需要更多的组件，并且可能并不总是能明显地看出如何使用该视图。而使用
    SQL 宏，你可以传递一个参数来限制结果集的输出，这一点是显而易见的。


    ```

    select *

    from   drivers( nationality => ''Dutch'' )

    /

    ```


    注意

    关于如何实现此 SQL 宏，请参见列拆分器用例中的“参数化视图”。


    但你也可以操作为每一行返回的数据。只要你能用纯 SQL 构建它，你就可以为其构建 SQL 宏。


    ### 标量类型 SQL 宏


    标量类型 SQL 宏返回一段 SQL 文本，该文本的结果是一个标量值。标量类型 SQL 宏不能有表参数，只能有标量参数。


    ## 用例


    SQL 宏的用例无穷无尽。你可以构建一个列拆分器，就像用 PTF 实现的那个——只是简单得多。你可以构建参数化视图。你可以构建标量宏来捕获你通常在 PL/SQL
    函数中实现的公式。你还可以实现对其他数据库（如 MySQL）中可用功能的支持。


    ### 参数化视图


    如果你想显示特定比赛中每位车手的总时间、圈数和平均圈速，可以创建一个视图来返回所有比赛的这些值（参见清单 8-7）。


    ```

    create or replace view v_averagelaptime as

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    , count( ltm.lap )        as lapcount

    , avg( ltm.milliseconds ) as averagemilliseconds

    from   f1data.laptimes ltm

    group  by ltm.raceid

    , ltm.driverid

    /

    清单 8-7

    v_averagelaptime 视图

    ```


    在你的查询中，必须通过添加一个谓词来限制返回的结果。


    ```

    select *

    from   v_averagelaptime alp

    where  alp.raceid = 1093 -- 2022 年美国大奖赛

    and  alp.driverid = 830 -- 马克斯·维斯塔潘

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093      830           6131687       56    109494,410714286


    select *

    from   v_averagelaptime alp

    where  alp.raceid = 1093 -- 2022 年美国大奖赛

    and  alp.driverid = 1  -- 刘易斯·汉密尔顿

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093        1           6136710       56    109584,107142857

    ```


    如果你将此视图封装在一个 SQL 宏中，它就变成了一个参数化视图。


    ```

    create or replace

    function averagelaptime( raceid_in   in number

    , driverid_in in number )

    return varchar2 sql_macro( table ) is

    begin

    return q''[

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    , count( ltm.lap )        as lapcount

    , avg( ltm.milliseconds ) as averagemilliseconds

    from   f1data.laptimes ltm

    where  ltm.raceid   = raceid_in

    and    ltm.driverid = driverid_in

    group  by ltm.raceid

    , ltm.driverid

    ]'';

    end;

    /

    清单 8-8

    averagelaptime SQL 宏

    ```


    然后你的查询就变得更简单了。


    ```

    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 830 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093      830           6131687       56    109494,410714286


    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 1 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093        1           6136710       56    109584,107142857

    ```


    ### 列拆分器（表）


    你已经看到了使用 PTF 将一列拆分为多列的示例。让我们重新审视该功能，但这次使用 SQL 宏。


    对于这个函数，你需要一个表参数来指定要处理的表（或视图或结果集），以及一个参数来告诉宏在输出中创建哪些列。


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    ```


    该函数返回一个 `VARCHAR2`，即一个 `table` 类型的 `sql_macro`。


    ```

    return varchar2 sql_macro( table ) is

    ```


    在宏中，构建 SQL 文本以将列拆分为新列。


    ```

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split || q''[, trim( '';]'' ||

    q''['' from regexp_substr( ]'' ||

    table_in.column( 1 ).description.name ||

    q''[, ''{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    ```


    这与在 PTF 示例中使用的代码大致相同。


    因为每个新列都有一个前导空格，最终你会得到一个列列表，你必须去除前导逗号（`,`）才能使其成为有效的 SQL 文本。


    ```

    l_split := trim( leading '','' from l_split );

    ```


    现在让我们构建完整的 SQL 语句，该语句将生成你可以从中选择的表。


    ```

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    ```


    在上面的语句中，`table_in` 被 `table_in` 参数的值所替换。


    清单 8-9 是完整的脚本。


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    return varchar2 sql_macro( table ) is

    l_sql         varchar2( 32767 );

    l_split       varchar2( 32767 );

    begin

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split ||

    q''[, trim( '';'' from regexp_substr( ]''||

    table_in.column( 1 ).description.name ||

    q''[, ''[^;]*;{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    l_split := trim( leading '','' from l_split );

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    dbms_tf.trace( l_sql );

    return l_sql;

    end;

    /

    清单 8-9

    拆分 SQL 宏

    ```


    #### 使用 SQL 宏拆分列


    使用与拆分函数的 PTF 示例中相同的表，你可以使用类似的 SQL 语句将这些分隔值转换为单独的列。


    ```

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from split( f1drivers

    , columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

    /

    ```


    你会得到与使用 PTF 相同的结果。如你所见，这种方法涉及的代码量要少得多。'
- fmt: '#### 参数化视图


    您不能在 SQL 宏中嵌套 SQL 宏，但可以基于此查询构建视图，如`Listing 8-10`所示。


    ```

    create or replace view v_f1drivers as

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from split( table_in   => f1drivers

    , columns_in => columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

    /

    Listing 8-10

    view v_f1drivers

    ```


    您必须通过添加谓词来限制查询中返回的结果。


    ```

    select d.givenname

    , d.familyname

    , d.nationality

    from   v_f1drivers d

    where  d.nationality like ''British''

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Lewis           Hamilton        British

    Lando           Norris          British

    George          Russell         British

    select d.givenname

    , d.familyname

    , d.nationality

    from   v_f1drivers d

    where  d.givenname like ''M%''

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Max             Verstappen      Dutch

    ```


    如果将此视图封装在 SQL 宏中，就可以使其参数化。您可以使用多个可选参数，如`Listing 8-11`所示。


    ```

    create or replace

    function drivers( code            in varchar2 default null

    , givenName       in varchar2 default null

    , familyName      in varchar2 default null

    , nationality     in varchar2 default null

    ) return varchar2 sql_macro( table )

    is

    begin

    return q''[

    select f1d.permanentnumber

    , f1d.code

    , f1d.givenname

    , f1d.familyname

    , f1d.dateofbirth

    , f1d.nationality

    from   v_f1drivers                 f1d

    where  (   drivers.code            is null

    or f1d.code                like drivers.code)

    and    (   drivers.givenname       is null

    or f1d.givenname           like drivers.givenname)

    and    (   drivers.familyname      is null

    or f1d.familyname          like drivers.familyname)

    and    (   drivers.nationality     is null

    or f1d.nationality         like drivers.nationality)

    ]'';

    end;

    /

    Listing 8-11

    drivers SQL Macro

    ```


    现在您可以使用参数来查询该视图。


    ```

    select d.givenname

    , d.familyname

    , d.nationality

    from   drivers( nationality => ''British'' ) d

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Lewis           Hamilton        British

    Lando           Norris          British

    George          Russell         British

    select d.givenname

    , d.familyname

    , d.nationality

    from   drivers( givenname => ''M%'' ) d

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Max             Verstappen      Dutch

    ```


    ### 模仿其他数据库（标量函数）


    如果您的代码在其他数据库（例如 MySQL）中有效，并且您正在迁移到 Oracle 数据库，您可能会遇到 SQL 语句中使用的某些函数在 Oracle 数据库中不可用的问题。您可以构建一组
    SQL 宏来确保语句正常工作，并执行正确的 Oracle SQL。


    #### 日期函数


    表`Table 8-4`描述了针对几个 MySQL 日期函数的 SQL 宏。


    **Table 8-4**

    **MySQL 日期函数**


    | 函数 | 描述 |

    | --- | --- |

    | CURDATE() | 获取当前日期。 |

    | NOW() | 返回语句执行的日期和时间。 |

    | DAY() | 返回指定日期的天数。 |

    | DAYNAME() | 返回指定日期的星期名称。 |

    | DAYOFWEEK() | 返回指定日期的星期索引。 |

    | MONTH() | 返回指定日期的月份编号。 |

    | WEEK() | 返回指定日期的周数。 |

    | WEEKDAY() | 返回指定日期的星期索引。 |

    | YEAR() | 返回指定日期的年份。 |


    `curdate()`函数返回不带时间组件的当前日期。Oracle 日期始终包含时间组件，因此我们返回`sysdate`的不带时间组件的字符串表示。


    ```

    create or replace function curdate

    ( format_in in varchar2 default ''DD/MM/YYYY'' )

    return varchar2 sql_macro( scalar ) is

    begin

    return ''to_char( sysdate, format_in )'';

    end;

    /

    Listing 8-12

    curdate SQL Macro

    ```


    `now()`函数返回包含时间组件的当前日期。这与`sysdate`相同。


    ```

    create or replace function now

    return varchar2 sql_macro( scalar ) is

    begin

    return ''sysdate'';

    end;

    /

    Listing 8-13

    now SQL Macro

    ```


    `day()`函数返回指定日期的月份中的天数。这可以通过`extract( day from date_in )`实现。


    ```

    create or replace function day( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[extract( day from date_in )]'';

    end;

    /

    Listing 8-14

    day SQL Macro

    ```


    `dayname()`函数返回指定日期的星期名称。这可以通过`to_char( date_in, ''DAY'' )`实现。


    ```

    create or replace function dayname( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''DAY'' )]'';

    end;

    /

    Listing 8-15

    dayname SQL Macro

    ```


    `dayofweek()`函数返回指定日期是星期几（1-7）。这可以通过`to_char( date_in, ''D'' )`实现。


    ```

    create or replace function dayofweek( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''D'' )]'';

    end;

    /

    Listing 8-16

    dayofweek SQL Macro

    ```


    `month()`函数返回指定日期的月份编号。这可以通过`extract( month from date_in )`实现。


    ```

    create or replace function month( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[extract( month from date_in )]'';

    end;

    /

    Listing 8-17

    month SQL Macro

    ```


    `week()`函数返回指定日期的周数。这可以通过`to_char( date_in, ''IW'' )`实现。


    ```

    create or replace function week( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''IW'' )]'';

    end;

    /

    Listing 8-18

    week SQL Macro

    ```


    `weekday()`函数返回指定日期是星期几（1-7）。这与`dayofweek()`函数相同。与其返回另一个字符串，您也可以调用另一个 SQL 宏。由于它返回一个字符串，您只需调用不同的函数。


    ```

    create or replace function weekday( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return dayofweek( date_in );

    end;

    /

    Listing 8-19

    weekday SQL Macro

    ```


    `year()`函数返回指定日期的年份。这可以通过`extract( year from date_in )`实现。


    ```

    create or replace function year( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[extract( year from date_in )]'';

    end;

    /

    Listing 8-20

    year SQL Macro

    ```'
  raw: '#### Parametrized View


    You cannot nest SQL Macros within SQL Macros, but you can build a view based on
    this query, as seen in Listing [8-10](#536316_1_En_8_Chapter.xhtml#PC45).


    ```

    create or replace view v_f1drivers as

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from split( table_in   => f1drivers

    , columns_in => columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

    /

    Listing 8-10

    view v_f1drivers

    ```


    You must limit the result returned in your query by adding a predicate.


    ```

    select d.givenname

    , d.familyname

    , d.nationality

    from   v_f1drivers d

    where  d.nationality like ''British''

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Lewis           Hamilton        British

    Lando           Norris          British

    George          Russell         British

    select d.givenname

    , d.familyname

    , d.nationality

    from   v_f1drivers d

    where  d.givenname like ''M%''

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Max             Verstappen      Dutch

    ```


    If you encapsulate this view in a SQL Macro, you can make it parametrized. You
    can use multiple, optional arguments, as seen in Listing [8-11](#536316_1_En_8_Chapter.xhtml#PC47).


    ```

    create or replace

    function drivers( code            in varchar2 default null

    , givenName       in varchar2 default null

    , familyName      in varchar2 default null

    , nationality     in varchar2 default null

    ) return varchar2 sql_macro( table )

    is

    begin

    return q''[

    select f1d.permanentnumber

    , f1d.code

    , f1d.givenname

    , f1d.familyname

    , f1d.dateofbirth

    , f1d.nationality

    from   v_f1drivers                 f1d

    where  (   drivers.code            is null

    or f1d.code                like drivers.code)

    and    (   drivers.givenname       is null

    or f1d.givenname           like drivers.givenname)

    and    (   drivers.familyname      is null

    or f1d.familyname          like drivers.familyname)

    and    (   drivers.nationality     is null

    or f1d.nationality         like drivers.nationality)

    ]'';

    end;

    /

    Listing 8-11

    drivers SQL Macro

    ```


    You can now query the view using parameters.


    ```

    select d.givenname

    , d.familyname

    , d.nationality

    from   drivers( nationality => ''British'' ) d

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Lewis           Hamilton        British

    Lando           Norris          British

    George          Russell         British

    select d.givenname

    , d.familyname

    , d.nationality

    from   drivers( givenname => ''M%'' ) d

    /

    GIVENNAME       FAMILYNAME      NATIONALITY

    --------------- --------------- ---------------

    Max             Verstappen      Dutch

    ```


    ### Mimic Other Databases (Scalar)


    If your code worked in a different database (e.g., MySQL), and you are migrating
    to an Oracle database, you may run into issues with functions that have been used
    in the SQL statements that are not available in Oracle Database. You can build
    a set of SQL Macros to ensure your statement works and that the correct Oracle
    SQL is executed.


    #### Date Functions


    Table [8-4](#536316_1_En_8_Chapter.xhtml#Tab4) describes SQL Macros for several
    MySQL date functions.


    Table 8-4


    MySQL Date Functions


    | Function | Description |

    | --- | --- |

    | CURDATE() | Gives the current date. |

    | NOW() | Returns the date and time of statement execution. |

    | DAY() | Returns the day of the specified date. |

    | DAYNAME() | Returns the day name for the specified date. |

    | DAYOFWEEK() | Returns the day of the week index for a specified date. |

    | MONTH() | Returns the month number of the specified date. |

    | WEEK() | It returns the week number of a specified date. |

    | WEEKDAY() | Returns the index of the weekday of a specified date. |

    | YEAR() | Returns the year from a specified date. |


    The `curdate()` function returns the current date without the time component.
    Oracle dates always include a time component, so let’s return a string representation
    of the `sysdate` without the time component.


    ```

    create or replace function curdate

    ( format_in in varchar2 default ''DD/MM/YYYY'' )

    return varchar2 sql_macro( scalar ) is

    begin

    return ''to_char( sysdate, format_in )'';

    end;

    /

    Listing 8-12

    curdate SQL Macro

    ```


    The `now()` function returns the current date, including the time component. That
    is the same as `sysdate`.


    ```

    create or replace function now

    return varchar2 sql_macro( scalar ) is

    begin

    return ''sysdate'';

    end;

    /

    Listing 8-13

    now SQL Macro

    ```


    The `day()` function returns the day of the month of the specified date. That
    can be implemented as `extract( day from date_in )`.


    ```

    create or replace function day( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[extract( day from date_in )]'';

    end;

    /

    Listing 8-14

    day sql macro

    ```


    The `dayname()` function returns the day name of the specified date. That can
    be implemented as `to_char( date_in, ''DAY'' )`.


    ```

    create or replace function dayname( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''DAY'' )]'';

    end;

    /

    Listing 8-15

    dayname SQL Macro

    ```


    The `dayofweek()` function returns the day of the week (1–7) of the specified
    date. That can be implemented as `to_char( date_in, ''D'' )`.


    ```

    create or replace function dayofweek( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''D'' )]'';

    end;

    /

    Listing 8-16

    dayofweek sql macro

    ```


    The `month()` function returns the month number of the specified date. That can
    be implemented as `extract( month from date_in )`.


    ```

    create or replace function month( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[extract( month from date_in )]'';

    end;

    /

    Listing 8-17

    month SQL Macro

    ```


    The `week()` function returns the week number of the specified date. That can
    be implemented as `to_char( date_in, ''IW'' )`.


    ```

    create or replace function week( date_in in date )

    return varchar2 sql_macro( scalar ) is

    begin

    return q''[to_char( date_in, ''IW'' )]'';

    end;

    /

    Listing 8-18

    week sql macro

    ```


    The `weekday()` function returns the day of the week (1–7) of the specified date.
    This is the same as the `dayofweek()` function. Instead of returning another string,
    you can also call another SQL Macro. Since it returns a string, you can just call
    the different function


    ```

