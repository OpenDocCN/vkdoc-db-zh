    \nIn the `describe` function, you can tell which input table columns should be\
    \ read (`for_read`) and which columns should be passed through (`pass_through`)\
    \ to the result. If a column has its `for_read` property set to true, then its\
    \ *values* are available in the other procedures of the PTF. If it is set to FALSE,\
    \ they are not.\n\nIf you want the column to appear in the resulting columns,\
    \ you must set the `pass_through` property to true. If this property is set to\
    \ FALSE, the column is not visible in the resulting columns.\n\nNot only can you\
    \ choose to show or hide existing columns, but you can also create completely\
    \ new columns that only exist in the result set.\n\n#### open\n\nThe `open` procedure,\
    \ if present, is invoked once before the `fetch_rows` procedure. It can be used\
    \ to initialize and allocate specific states. It is mostly useful when implementing\
    \ a table semantics PTF. Since the execution state is session and the cursor private,\
    \ like a normal package, a table semantics PTF can use package globals for storing\
    \ the execution state. The PTF uses the database-provided unique execution ID\
    \ to identify that state. You can use the `get_xid` function to get a unique id\
    \ for this execution state. This ID remains the same for all the execution functions\
    \ of the PTF.\n\n#### fetch_rows\n\nThe `fetch_rows` procedure is where the real\
    \ work is done. It produces an output rowset that gets sent back to the requesting\
    \ process. This procedure can be invocated multiple times, depending on the data.\
    \ How often it is invocated is determined during query execution. It looks like\
    \ this procedure is called for every batch of 1024 rows, but this does not seem\
    \ to be documented anywhere.\n\n#### close\n\nThe `close` procedure is called\
    \ once at the end of the PTF execution. Use this procedure to release resources\
    \ associated with the PTF execution state. You can also reset global settings\
    \ back to their original values.\n\n### Usage\n\nWhile developing your PTF, you\
    \ probably want to use tracing to see what your program is doing. You could use\
    \ `dbms_output.put_line` for this, but the DBMS_TF package provides an overloaded\
    \ `trace` procedure. Not only can you write messages similar to `dbms_output.put_line`,\
    \ but it also has overloading to print out the entire row set, table information,\
    \ the complete environment, and more.\n\n```\nprocedure trace(msg            \
    \       varchar2,\nwith_id               boolean   default false,\nseparator \
    \            varchar2  default null,\nprefix                varchar2  default\
    \ null);\nprocedure trace(rowset             in row_set_t);\nprocedure trace(env\
    \                in env_t);\nprocedure trace(columns_new        in columns_new_t);\n\
    procedure trace(cols               in columns_t);\nprocedure trace(columns_with_type\
    \  in columns_with_type_t);\nprocedure trace(tab                in table_t);\n\
    procedure trace(col                in column_metadata_t);\n```\n\nThis can give\
    \ a lot of information when developing. You may want to include calls to the trace\
    \ functions using conditional compilation (see Chapter [6](#536316_1_En_6_Chapter.xhtml)),\
    \ so you can turn this on and off at compile time without changing the source\
    \ code.\n\n## Use Cases\n\nA common requirement is to split strings into smaller\
    \ bits, depending on a delimiter. Since there is no built-in functionality in\
    \ SQL to do this, it is where a PTF can fill the hiatus."
  trans: '

    ### 函数


    包装函数（wrapper function）负责从 SQL 语句到 PTF 的接口转换。`table` 伪运算符用于将表对象转换为 `dbms_tf.table_t`
    PL/SQL 类型。引入了一个新的伪运算符 `columns`，以方便将列转换为 `dbms_tf.columns_t` 类型。其他参数（如果有）则使用其对应的
    SQL 形式。包装函数没有函数体。它仅仅是通往 PTF 包的接口。


    该函数指定了以下内容。


    *   PTF 名称

    *   恰好一个类型为 `table` 的参数，以及任意数量的 `non-table` 参数

    *   返回类型是 `table`

    *   PTF 的类型，即 `row` 或 `table` 语义

    *   实现 PTF 的包名称


    ```

    create [ or replace ] [ editionable | noneditionable ]

    function [ schema. ] function_name

    [ ( parameter_declaration [, parameter_declaration]... ) ]

    return table

    pipelined ( row | table ) polymorphic

    using [ schema. ] implementation_package

    ```


    如果 PTF 定义为 `row semantics`（行语义），则输入为单行。PTF 所需的所有信息都包含在此单行中。PTF 不知道也不需要知道其他行的任何信息。如果
    PTF 定义为 `table semantics`（表语义），则输入是一组行。PTF 可以利用来自多行的信息，例如，用于构建你自己的聚合函数。当你拥有一个
    `table semantics` PTF 时，你可以选择使用 `partition by` 子句和/或 `order by` 子句来扩展表参数。


    ### 包


    该包包含实现 PTF 所需的所有代码。它必须包含一个 `describe` 函数，但也可以包含 `open`、`fetch_rows` 和 `close`
    过程。`describe` 函数是必需的；所有其他过程都是可选的。


    #### describe


    传递给 `describe` 函数的参数可以是可传递给常规表函数的标准标量参数。但 PTF 也接受一个表参数。表参数必须是一个基本表名，它可以是一个 `with`
    子句查询，或者是 `from` 子句中允许的任何模式级对象（表、视图或表函数）。`describe` 函数也可以接受一个 `columns` 参数。


    在 `describe` 函数中，你可以指定哪些输入表列应被读取 (`for_read`)，以及哪些列应被传递 (`pass_through`) 到结果中。如果某列的
    `for_read` 属性设置为 `true`，则其 `values` 在 PTF 的其他过程中可用。如果设置为 `FALSE`，则不可用。


    如果你希望该列出现在结果列中，你必须将 `pass_through` 属性设置为 `true`。如果此属性设置为 `FALSE`，则该列在结果列中不可见。


    你不仅可以选择显示或隐藏现有列，还可以创建仅存在于结果集中的全新列。


    #### open


    如果存在 `open` 过程，它会在 `fetch_rows` 过程之前被调用一次。它可用于初始化和分配特定状态。这在实现 `table semantics`
    PTF 时尤为有用。由于执行状态是会话和游标私有的（如同普通包一样），`table semantics` PTF 可以使用包全局变量来存储执行状态。PTF
    使用数据库提供的唯一执行 ID 来标识该状态。你可以使用 `get_xid` 函数获取此执行状态的唯一 ID。此 ID 对于 PTF 的所有执行函数保持不变。


    #### fetch_rows


    `fetch_rows` 过程是真正执行工作的地方。它产生一个输出行集，该行集被发送回请求进程。根据数据情况，此过程可能会被多次调用。调用的频率在查询执行期间确定。看起来这个过程似乎是每批
    1024 行调用一次，但这一点似乎没有在任何地方有文档记载。


    #### close


    `close` 过程在 PTF 执行结束时被调用一次。使用此过程释放与 PTF 执行状态关联的资源。你还可以将全局设置重置回其原始值。


    ### 用法


    在开发 PTF 时，你可能希望使用跟踪功能来查看程序的运行情况。你可以为此使用 `dbms_output.put_line`，但 `DBMS_TF` 包提供了一个重载的
    `trace` 过程。你不仅可以编写类似于 `dbms_output.put_line` 的消息，它还具有重载功能，可以打印整个行集、表信息、完整环境等。


    ```

    procedure trace(msg                   varchar2,

    with_id               boolean   default false,

    separator             varchar2  default null,

    prefix                varchar2  default null);

    procedure trace(rowset             in row_set_t);

    procedure trace(env                in env_t);

    procedure trace(columns_new        in columns_new_t);

    procedure trace(cols               in columns_t);

    procedure trace(columns_with_type  in columns_with_type_t);

    procedure trace(tab                in table_t);

    procedure trace(col                in column_metadata_t);

    ```


    这在开发过程中可以提供大量信息。你可能希望使用条件编译（参见第 6 章）来包含对跟踪函数的调用，这样你就可以在编译时开启或关闭此功能，而无需更改源代码。


    ### 用例


    一个常见的需求是根据分隔符将字符串拆分为更小的部分。由于 SQL 中没有内置功能来实现这一点，这正是 PTF 可以填补的空白。

    '
- fmt: '## Split


    假设你有许多需要加载到数据库中的 CSV 文件。可能存在多种不同的布局，因此你必须为每种布局创建不同的代码。这不仅是一项繁琐的工作，而且容易出错。你可能会从早期的程序中复制代码并根据需要进行调整，但很可能会遗漏一两个细节。


    如果你使用一个 PTF，不仅能大大简化使用，还能减少出错的可能性。


    对于这个 PTF，假设需要拆分的行位于结果集（表、视图等）的第一列，并且使用分号 (`;`) 作为分隔符。你需要一个包含强制 `describe` 函数和一个
    `fetch_rows` 过程的包（`split_ptf`），因为你想要单独处理每一行。此 PTF 具有行语义，因此不需要 `open` 和 `close`
    过程。


    `describe` 函数需要接受表参数的 PL/SQL 版本（在以下代码中称为 `tab`）以及一个参数 (`cols`)，以告知 PTF 在输出中创建哪些列。


    ```

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t;

    ```


    `fetch_rows` 过程不需要任何参数。


    清单 [8-1](#536316_1_En_8_Chapter.xhtml#PC4) 是完整的包头。


    ```

    create or replace package split_ptf is

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t;

    procedure fetch_rows;

    end split_ptf;

    /

    Listing 8-1

    split_ptf package header

    ```


    函数的设置在 `describe` 函数中完成。由于表的第一列必须保存要拆分的数据，因此将此列标记为由引擎读取，该引擎将分号分隔的字符串转换为单独的部分。


    ```

    tab.column( 1 ).for_read     := true;

    ```


    将字符串拆分为单独的部分后，你就不希望它再出现在结果集中了。要将其从结果集中移除，需将 `pass_through` 参数设置为 FALSE。


    ```

    tab.column( 1 ).pass_through := false;

    ```


    完成此操作后，根据 `cols` 参数中的指定创建新列。此参数的类型是 `dbms_tf.columns`，但只包含列名。你将所有这些列定义为 VARCHAR2
    类型，最大长度为 4000。你可以依赖这些值的默认值，但我们希望使代码更加明确。这样，即使默认值发生变化，代码也能以相同的方式工作。


    ```

    l_new_col := dbms_tf.column_metadata_t

    ( type    => dbms_tf.type_varchar2

    , max_len => 4000

    , name    => cols( indx )

    );

    -- add the new column to the list of columns new columns

    l_new_cols( l_new_cols.count + 1 ) := l_new_col;

    ```


    当你构建一组新列时，会返回以下内容。


    ```

    return dbms_tf.describe_t( new_columns => l_new_cols );

    ```


    现在是 `fetch_rows` 过程的时间了。此过程每次调用处理 1024 行，因此它不是逐行处理。因此，你必须创建集合来保存传入的数据和产生的数据。


    ```

    type colset is table of dbms_tf.tab_varchar2_t

    index by pls_integer;

    -- variable to hold the rowset as retrieved

    l_rowset dbms_tf.row_set_t;

    -- variable to hold the number of rows as retrieved

    l_rowcount pls_integer;

    -- variable to hold the number of (out)put columns

    l_putcolcount pls_integer :=

    dbms_tf.get_env().put_columns.count;

    -- variable to hold the new values

    l_newcolset colset;

    ```


    现在所有的变量和设置都已就绪，让我们开始实际的代码。首先，将行获取到本地行集中。这将产生一个最多包含 1024 行的集合。第二个参数给出当前集的行数，你也可以获取列数，但对于此函数可以忽略。


    ```

    dbms_tf.get_row_set( rowset    => l_rowset

    , row_count =>  l_rowcount );

    ```


    现在你已将行放入集合中，是时候开始处理数据了。因此，从两个循环开始。第一个循环遍历每一行。


    ```

    for rowindx in 1 .. l_rowcount

    loop

    ```


    在该循环内，启动一个循环遍历输出集中定义的每一列。


    ```

    for colindx in 1 .. l_putcolcount

    loop

    ```


    使用 `dbms_tf.col_to_char` 函数，通过正则表达式检索要拆分的列，为正确的输出列提取正确的部分。


    ```

    l_columnvalue := trim(both ''"'' from

    dbms_tf.col_to_char( l_rowset( 1 )

    , rowindx ) );

    l_newcolset(colindx)(rowindx) := trim( '';'' from

    regexp_substr( l_columnvalue

    , ''[^;]*;{0,1}''

    , 1

    , colindx

    )

    );

    ```


    处理完当前集中的每一行后，将结果集合添加到输出行集中。


    ```

    for indx in 1 .. l_putcolcount

    loop

    dbms_tf.put_col( columnid   => indx

    , collection => l_newcolset( indx )

    );

    end loop;

    ```


    清单 [8-2](#536316_1_En_8_Chapter.xhtml#PC15) 展示了 `split_ptf` 包体的完整实现。


    ```

    create or replace package body split_ptf as

    subtype maxvarchar2 is varchar2( 32767 );

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t as

    -- metadata for column to add

    l_new_col dbms_tf.column_metadata_t;

    -- table of columns to add

    l_new_cols dbms_tf.columns_new_t;

    begin

    -- Mark the first column to be read and don''t display it anymore

    tab.column( 1 ).for_read     := true;

    tab.column( 1 ).pass_through := false;

    -- Add the new columns, as specified in the cols parameter

    for indx in 1 .. cols.count

    loop

    -- define metadata for column named cols(indx)

    l_new_col := dbms_tf.column_metadata_t

    ( type    => dbms_tf.type_varchar2

    , max_len => 4000

    , name    => cols( indx )

    );

    -- add the new column to the list of columns new columns

    l_new_cols( l_new_cols.count + 1 ) := l_new_col;

    end loop;

    -- Now we return a specific DESCRIBE_T that adds new columns

    return dbms_tf.describe_t( new_columns => l_new_cols );

    end;

    procedure fetch_rows is

    -- define a table type of varchar2 tables

    type colset is table of dbms_tf.tab_varchar2_t

    index by pls_integer;

    -- variable to hold the rowset as retrieved

    l_rowset dbms_tf.row_set_t;

    -- variable to hold the number of rows as retrieved

    l_rowcount pls_integer;

    -- variable to hold the number of (out)put columns

    l_putcolcount pls_integer :=

    dbms_tf.get_env().put_columns.count;

    -- variable to hold the new values

    l_newcolset colset;

    -- the value of the column

    l_columnvalue maxvarchar2;

    begin

    -- fetch rows into a local rowset

    -- at this point the rows will have columns

    -- from the the table/view/query passed in

    dbms_tf.get_row_set( rowset    => l_rowset

    , row_count =>  l_rowcount

    );

    -- for every row in the rowset...

    for rowindx in 1 .. l_rowcount

    loop

    -- for every column

    for colindx in 1 .. l_putcolcount

    loop

    l_columnvalue := trim(both ''"'' from

    dbms_tf.col_to_char( l_rowset( 1 )

    , rowindx ) );

    l_newcolset(colindx)(rowindx) := trim( '';'' from

    regexp_substr( l_columnvalue

    , ''[^;]*;{0,1}''

    , 1

    , colindx

    )

    );

    end loop; -- every column

    end loop; -- every row in the rowset

    -- add the newly populated columns to the rowset

    for indx in 1 .. l_putcolcount

    loop

    dbms_tf.put_col( columnid   => indx

    , collection => l_newcolset( indx )

    );

    end loop;

    end;

    end split_ptf;

    /

    Listing 8-2

    split_ptf package body

    ```


    现在包已完成，让我们为这个 PTF 编写包装函数。包装函数具有与包中 `describe` 函数相同的参数，只是这次使用的是 PL/SQL 类型的 SQL
    等价物。此外，还声明了 PTF 的语义类型。在本例中，它是一个行语义函数，因为 PTF 是按行工作的。


    清单 [8-3](#536316_1_En_8_Chapter.xhtml#PC16) 展示了包装函数。


    ```

    create or replace function split

    (

    tab  in table

    , cols in columns default null

    ) return table

    pipelined row polymorphic using split_ptf;

    /

    Listing 8-3

    Split wrapper function

    ```'
  raw: '### Split


    Suppose you have many CSV files that need to be loaded into a database. There
    are a lot of different layouts possible, so you would have to create different
    code for each of them. Not only is this a tedious job, but it is also error-prone.
    You probably copy the code from an earlier program and adjust it to your needs.
    Chances are that you miss one or two.


    If you use a PTF, you not only make your usage a lot easier, but chances are also
    that there are fewer errors.


    For this PTF, assume the lines to be split are in the first column of the result
    set (table, view, etc.) and that a semicolon (;) is used as the separator. You
    need a package (`split_ptf`) with the mandatory `describe` function and a `fetch_rows`
    procedure, because you want to process every row individually. This PTF has row
    semantics, so you do not need the open and close procedures.


    The `describe` function needs to accept the PL/SQL version of the table parameter
    (called tab in the following code) and a parameter (`cols`) to tell the PTF which
    columns to create in the output.


    ```

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t;

    ```


    The `fetch_rows` procedure doesn’t need any parameters.


    Listing [8-1](#536316_1_En_8_Chapter.xhtml#PC4) is the complete package header.


    ```

    create or replace package split_ptf is

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t;

    procedure fetch_rows;

    end split_ptf;

    /

    Listing 8-1

    split_ptf package header

    ```


    The setup for the function is done in the describe function. Since the first column
    of the table must hold the data to be split, mark this column to be read by the
    engine that transforms the semicolon-separated string into individual parts.


    ```

    tab.column( 1 ).for_read     := true;

    ```


    After the string is split into individual parts, you do not want to display it
    in the result set anymore. To remove it from the result set, set the `pass_through`
    argument to FALSE.


    ```

    tab.column( 1 ).pass_through := false;

    ```


    After this is done, create the new columns as specified in the `cols` argument.
    This argument is of type `dbms_tf.columns` but only holds the names of the columns.
    You define all these columns as type VARCHAR2 with a maximum length of 4000\.
    You could rely on the defaults for these values, but we like to make our code
    more explicit. This way, the code works the same, even if the defaults change.


    ```

    l_new_col := dbms_tf.column_metadata_t

    ( type    => dbms_tf.type_varchar2

    , max_len => 4000

    , name    => cols( indx )

    );

    -- add the new column to the list of columns new columns

    l_new_cols( l_new_cols.count + 1 ) := l_new_col;

    ```


    When you build a new set of columns, the following is returned.


    ```

    return dbms_tf.describe_t( new_columns => l_new_cols );

    ```


    Now it is time for the `fetch_rows` procedure. This procedure is called for 1024
    rows at a time, so it is not row-by-row processing. Therefore, you must create
    collections to hold the incoming and resulting data.


    ```

    type colset is table of dbms_tf.tab_varchar2_t

    index by pls_integer;

    -- variable to hold the rowset as retrieved

    l_rowset dbms_tf.row_set_t;

    -- variable to hold the number of rows as retrieved

    l_rowcount pls_integer;

    -- variable to hold the number of (out)put columns

    l_putcolcount pls_integer :=

    dbms_tf.get_env().put_columns.count;

    -- variable to hold the new values

    l_newcolset colset;

    ```


    Now that all the variables and settings are in place, let’s start the actual code.
    First, fetch the rows in a local row set. This result in a collection of a maximum
    of 1024 rows. The second argument gives you the row count of the current set,
    you could also have the column count returned, but you can ignore that for this
    function.


    ```

    dbms_tf.get_row_set( rowset    => l_rowset

    , row_count =>  l_rowcount );

    ```


    Now that you have the rows in the collection, it is time to start processing the
    data. Therefore, start with two loops. The first is a loop for every row.


    ```

    for rowindx in 1 .. l_rowcount

    loop

    ```


    And within that loop, start a loop for every column defined in the output set.


    ```

    for colindx in 1 .. l_putcolcount

    loop

    ```


    Using the `dbms_tf.col_to_char` function, retrieve the column to split with regular
    expressions to extract the right part for the right output column.


    ```

    l_columnvalue := trim(both ''"'' from

    dbms_tf.col_to_char( l_rowset( 1 )

    , rowindx ) );

    l_newcolset(colindx)(rowindx) := trim( '';'' from

    regexp_substr( l_columnvalue

    , ''[^;]*;{0,1}''

    , 1

    , colindx

    )

    );

    ```


    After processing every row in the current set, add the resulting collections to
    the output row set.


    ```

    for indx in 1 .. l_putcolcount

    loop

    dbms_tf.put_col( columnid   => indx

    , collection => l_newcolset( indx )

    );

    end loop;

    ```


    Listing [8-2](#536316_1_En_8_Chapter.xhtml#PC15) shows the complete implementation
    of the `split_ptf` package body.


    ```

    create or replace package body split_ptf as

    subtype maxvarchar2 is varchar2( 32767 );

    function describe

    (

    tab  in out dbms_tf.table_t

    , cols in     dbms_tf.columns_t default null

    ) return dbms_tf.describe_t as

    -- metadata for column to add

    l_new_col dbms_tf.column_metadata_t;

    -- table of columns to add

    l_new_cols dbms_tf.columns_new_t;

    begin

    -- Mark the first column to be read and don''t display it anymore

    tab.column( 1 ).for_read     := true;

    tab.column( 1 ).pass_through := false;

    -- Add the new columns, as specified in the cols parameter

    for indx in 1 .. cols.count

    loop

    -- define metadata for column named cols(indx)

    l_new_col := dbms_tf.column_metadata_t

    ( type    => dbms_tf.type_varchar2

    , max_len => 4000

    , name    => cols( indx )

    );

    -- add the new column to the list of columns new columns

    l_new_cols( l_new_cols.count + 1 ) := l_new_col;

    end loop;

    -- Now we return a specific DESCRIBE_T that adds new columns

    return dbms_tf.describe_t( new_columns => l_new_cols );

    end;

    procedure fetch_rows is

    -- define a table type of varchar2 tables

    type colset is table of dbms_tf.tab_varchar2_t

    index by pls_integer;

    -- variable to hold the rowset as retrieved

    l_rowset dbms_tf.row_set_t;

    -- variable to hold the number of rows as retrieved

    l_rowcount pls_integer;

    -- variable to hold the number of (out)put columns

    l_putcolcount pls_integer :=

    dbms_tf.get_env().put_columns.count;

    -- variable to hold the new values

    l_newcolset colset;

    -- the value of the column

    l_columnvalue maxvarchar2;

    begin

    -- fetch rows into a local rowset

    -- at this point the rows will have columns

    -- from the the table/view/query passed in

    dbms_tf.get_row_set( rowset    => l_rowset

    , row_count =>  l_rowcount

    );

    -- for every row in the rowset...

    for rowindx in 1 .. l_rowcount

    loop

    -- for every column

    for colindx in 1 .. l_putcolcount

    loop

    l_columnvalue := trim(both ''"'' from

    dbms_tf.col_to_char( l_rowset( 1 )

    , rowindx ) );

    l_newcolset(colindx)(rowindx) := trim( '';'' from

    regexp_substr( l_columnvalue

    , ''[^;]*;{0,1}''

    , 1

    , colindx

    )

    );

    end loop; -- every column

    end loop; -- every row in the rowset

    -- add the newly populated columns to the rowset

    for indx in 1 .. l_putcolcount

    loop

    dbms_tf.put_col( columnid   => indx

    , collection => l_newcolset( indx )

    );

    end loop;

    end;

    end split_ptf;

    /

