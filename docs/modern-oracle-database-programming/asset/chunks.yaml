    ## Faster at the End


    The elapsed time of each race is recorded in the `LAPTIMES` table. Often you hear
    that the lap times are shorter towards the end of a race because there is less
    fuel in the car, making the car lighter. However, tire degradation would cause
    laps to take longer. Let’s put this theory to the test and examine what is really
    going on.


    First, you must determine if a lap was slower or faster than the previous lap.
    The following are the definitions of faster and slower.


    ```

    faster as laptime  prev (laptime)

    ```


    The definition compares the current lap time to the previous lap time with the
    `prev ()` function.


    In this case, all records need to be classified with either a `FASTER` or `SLOWER`
    tag, so `all rows per match` is used. The following pattern is used.


    ```

    pattern ( faster* slower* )

    ```


    The pattern reads zero or more records identified by `FASTER` followed by zero
    or more records identified as `SLOWER`. Putting everything together results in
    the following query.


    ```

    with cota as (

    select ltm.lap

    , numtodsinterval( ltm.milliseconds / 1000

    , ''second'') as laptime

    from   f1data.laptimes ltm

    where  ltm.raceid = 1093  -- Circuit of the Americas

    and    ltm.driverid = 830 -- Max Verstappen

    )

    select *

    from   cota

    match_recognize (

    order by lap

    measures

    match_number() as mnr

    ,classifier() as cls

    all rows per match

    pattern (faster* slower* )

    define

    faster as laptime  prev (laptime)

    )

    order  by lap

    /

    LAP        MNR CLS     LAPTIME

    ---------- ---------- ------- -------------------

    1          1         +00 00:01:41.343000

    2          2 SLOWER  +00 00:01:41.696000

    3          2 SLOWER  +00 00:01:41.893000

    4          2 SLOWER  +00 00:01:42.581000

    5          2 SLOWER  +00 00:01:42.870000

    6          3 FASTER  +00 00:01:42.826000

    7          3 FASTER  +00 00:01:42.314000

    8          3 SLOWER  +00 00:01:42.830000

    9          4 FASTER  +00 00:01:42.412000

    10          4 SLOWER  +00 00:01:42.492000

    >

    37         13 FASTER  +00 00:01:39.541000

    38         13 SLOWER  +00 00:01:40.211000

    39         13 SLOWER  +00 00:01:40.337000

    40         14 FASTER  +00 00:01:40.108000

    41         14 FASTER  +00 00:01:40.077000

    42         14 FASTER  +00 00:01:40.010000

    43         14 FASTER  +00 00:01:39.776000

    44         14 SLOWER  +00 00:01:40.410000

    45         15 FASTER  +00 00:01:39.986000

    46         15 FASTER  +00 00:01:39.945000

    47         15 SLOWER  +00 00:01:40.058000

    48         15 SLOWER  +00 00:01:40.271000

    49         16 FASTER  +00 00:01:40.230000

    50         16 SLOWER  +00 00:01:40.830000

    51         17 FASTER  +00 00:01:40.152000

    52         17 SLOWER  +00 00:01:40.431000

    53         18 FASTER  +00 00:01:40.297000

    54         18 FASTER  +00 00:01:40.168000

    55         18 SLOWER  +00 00:01:40.674000

    56         19 FASTER  +00 00:01:40.654000

    ```


    The first lap doesn’t have a classification, as there is no lap to compare it
    to. The second through fifth lap is classified as slower, which can be deducted
    from the data in the `laptime` column. Finally, lap 6 is the first time a lap
    was faster than the previous one.


    Note


    In the preceding result set, there is also a column `MNR` which shows the match
    number. The records with the same `match_number` belong to the same matching pattern.
    Lap 5 is the last lap to match the pattern. Lap 6 is classified as a faster record,
    which restarts the pattern again.


    Now it is also possible to analyze if there are consecutive laps that were faster
    than the previous ones. When more than two consecutive laps are faster, these
    should go in the output. The following is the pattern.


    ```

    faster{2,}

    ```


    The pattern reads at least two records classified as faster.'
