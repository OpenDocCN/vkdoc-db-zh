    \ (apex_web_service.g_status_code);\n  if apex_web_service.g_status_code between\
    \ 200 and 299 then\n    while apex_string.next_chunk (\n            p_str    =>\
    \ l_response\n           ,p_chunk  => l_part\n           ,p_offset => l_offset\n\
    \           ,p_amount => 4000)\n    loop\n      sys.dbms_output.put_line (l_part);\n\
    \    end loop;\n  end if;\nend;\n{\"MRData\":{\"xmlns\":\"http:\\/\\/ergast.com\\\
    /mrd\\/1.5\",\"series\":\"f1\",\"url\":\"http://ergast.com/api/f1/current.json\"\
    ,\"limit\":\"30\",\"offset\":\"0\",\"total\":\"22\",\"RaceTable\":{\"season\"\
    :\"2022\",\"Races\":[{\"season\":\"2022\",\"round\":\"1\",...\n```\n\n代码清单 15-1\n\
