    ## 可变迭代器


    How many times have you tried to assign a value to your iterator? For example,
    you wanted to skip an arbitrary number of steps in the iterations. Consider the
    script shown in Listing [7-13](#536316_1_En_7_Chapter.xhtml#PC14).


    ```

    begin

    for i in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /

    ORA-06550: line 7, column 7:

    PLS-00363: expression ''I'' cannot be used as an assignment target

    ORA-06550: line 7, column 7:

    PL/SQL: Statement ignored

    Listing 7-13

    Try to assign a value to the iterator

    ```


    Oracle Database 21c comes with a new option: the `mutable` iterator. Using the
    keyword `mutable` after the name of the iterator makes it modifiable during the
    execution of the loop so that the code in Listing [7-14](#536316_1_En_7_Chapter.xhtml#PC15)
    runs.


    ```

    begin

    for i mutable in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /


    Listing 7-14

    Make the iterator mutable

    ```


    The default behavior is to have an `immutable` iterator, which can be specified
    in a more verbose way, like in Listing [7-15](#536316_1_En_7_Chapter.xhtml#PC16).


    ```

    begin

    for i immutable in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /

    ORA-06550: line 7, column 7:

    PLS-00363: expression ''I'' cannot be used as an assignment target

    ORA-06550: line 7, column 7:

    PL/SQL: Statement ignored

    Listing 7-15

    Make the iterator immutable

    ```


    ## 增强迭代器


    When a numeric iterator is not `mutable` unless you specify a `mutable` keyword,
    the record in a cursor `for loop` is mutable; that is, the values of the individual
    attributes are mutable, even though the iterator itself is not declared mutable.
    Let’s say you have a procedure to reverse a string, as shown in Listing [7-16](#536316_1_En_7_Chapter.xhtml#PC17).


    ```

    create or replace procedure

    reversestring(string_inout in out varchar2)

    is

    l_reversed varchar2( 32767 );

    l_strlen number;

    begin

    l_strlen := length( string_inout );

    for i in reverse 1..l_strlen

    loop

    l_reversed := l_reversed || substr( string_inout, i, 1 );

    end loop;

    string_inout := l_reversed;

    end;

    /

    Listing 7-16

    Reverse string procedure

    ```


    If you create a cursor `for loop`, where the iterator is a record from the cursor,
    even though the iterator is not defined as mutable, you can still assign values
    to the different elements of the record. This has been possible since Oracle Database
    version 7.


    ```

    begin

    for driver in (select *

    from   f1data.drivers d

    where  d.nationality = ''Dutch'')

    loop

    dbms_output.put_line( driver.forename

    || '' ''

    || driver.surname );

    reversestring( driver.forename );

    reversestring( driver.surname );

    dbms_output.put_line( driver.surname

    || '' ''

    || driver.forename );

    end loop;

    end;

    /

    ```


    ## 数组中的循环


    Instead of creating a `for` loop and then assigning values to an associative array
    inside the loop, as you can see in Listing [7-17](#536316_1_En_7_Chapter.xhtml#PC19),
    you can define the loop inside the assignment statement, as you can see in Listing
    [7-18](#536316_1_En_7_Chapter.xhtml#PC20).


    ```

    declare

    type num_list is table of int index by pls_integer;

    s1 num_list;

    s2 num_list;

    begin

    s1 := num_list( for i in 1 .. 10 => i );

    s2 := num_list( for i in 2 .. 10 by 2 => s1( i ) );

    end;

    /

    Listing 7-18

    Use loop inside array in 21c

    ```


    ```

    declare

    type num_list is table of int index by pls_integer;

    s1 num_list;

    s2 num_list;

    begin

    for i in 1 .. 10

    loop

    s1(i) := i * 10;

    end loop;

    for i in 1 .. 10

    loop

    if mod(i, 2) = 0

    then

    s2(i) := s1(i);

    end if;

    end loop;

    end;

    /

    Listing 7-17

    Use loops to assign values pre-21c

    ```


    ## 数组的索引


    The complementary statement to the `bulk collect` construction to retrieve the
    data from the database in a single pass is the `forall` statement to write changes
    back to the database in a single pass. The `forall` statement has, besides using
    the `<collection>.first .. <collection>.last` construction for dense collections,
    the possibility to use the `indices of` and `values of` constructions. Starting
    in Oracle Database 21c, it is possible to use these constructions in a `for` loop.
    Instead of writing a `while` loop as is displayed in Listing [7-19](#536316_1_En_7_Chapter.xhtml#PC21),
    you can use the `indices of` construction as you can see in Listing [7-20](#536316_1_En_7_Chapter.xhtml#PC22).


    ```

    declare

    type num_list is table of int index by pls_integer;

    s2 num_list;

    begin

    s2 := num_list(for i in 2 .. 10 by 2 => i * 10);

    for idx in indices of s2

    loop

    dbms_output.put_line(idx || ''='' || s2(idx));

    end loop;

    end;

    /

    2=20

    4=40

    6=60

    8=80

    10=100

    Listing 7-20

    Displaying a sparse collection since 21c

    ```


    ```

    declare

    type num_list is table of int index by pls_integer;

    s2 num_list;

    idx int;

    begin

    s2 := num_list(2  => 20

    ,4  => 40

    ,6  => 60

    ,8  => 80

    ,10 => 100);

    idx := s2.first;

    while idx is not null

    loop

    dbms_output.put_line(idx || ''='' || s2(idx));

    idx := s2.next(idx);

    end loop;

    end;

    /

    2=20

    4=40

    6=60

    8=80

    10=100

    Listing 7-19

    Displaying a sparse collection pre 21c

    ```


    Tip


    The `s2` variable is initialized using a qualified expression in the iteration
    control. Read more in the qualified expressions section later in this chapter.'
