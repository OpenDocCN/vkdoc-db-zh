- fmt: '### Pagination


    行限制子句还提供了用于分页类型查询的功能。除了显示前x行外，还可以跳过前x行并显示下一组记录。以下示例显示了一个`offset`子句，它跳过2022年第一轮比赛中的前十行。


    ```sql

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by points desc

    offset 10 rows

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         11 Mick Schumacher             0          0

    1         12 Lance Stroll                0          0

    1         13 Alexander Albon             0          0

    1         14 Daniel Ricciardo            0          0

    1         15 Lando Norris                0          0

    1         16 Nicholas Latifi             0          0

    1         17 Nico Hülkenberg             0          0

    1         18 Sergio Pérez                0          0

    1         20 Pierre Gasly                0          0

    1         19 Max Verstappen              0          0

    ```


    `offset`子句仅限于x行；不能指定行的百分比。如果表达式计算结果为数值，则可以指定该表达式。


    对数据集进行分页的最常见方法是首先显示一组行（假设是五条记录），当导航到下一页时，跳过已经看过的前五行，显示接下来的五行。这可以使用`offset`子句和`fetch`子句来实现。以下示例跳过前五行并返回接下来的五行。


    ```sql

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset 5 rows

    fetch  next 5 rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    6 Valtteri Bottas             8          0

    7 Esteban Ocon                6          0

    8 Yuki Tsunoda                4          0

    9 Fernando Alonso             2          0

    10 Guanyu Zhou                 1          0

    ```


    对于分页，使用`fetch next`而不是`fetch first`。在分页查询中将行数硬编码是没有意义的，很可能使用此查询的应用程序希望指定偏移量以及向用户显示多少行。以下查询使用SQLcl中的绑定变量显示了获取接下来五条记录的分页查询。


    ```sql

    var offset number

    var next  number

    begin

    :offset := 10;

    :next := 5;

    end;

    /

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset :offset rows

    fetch  next :next rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    11 Mick Schumacher             0          0

    12 Lance Stroll                0          0

    13 Alexander Albon             0          0

    14 Daniel Ricciardo            0          0

    15 Lando Norris                0          0

    ```


    使用此查询，当偏移量使用0时，也可以显示结果集中的前五行。


    ```sql

    begin

    :offset := 0;

    end;

    /

    >

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    1 Charles Leclerc            26          1

    2 Carlos Sainz               18          0

    3 Lewis Hamilton             15          0

    4 George Russell             12          0

    5 Kevin Magnussen            10          0

    ```


    根据所使用的查询，获取第十页可能比获取第一页更耗时。


    ### Under the Hood


    在底层，行限制子句利用了分析函数，如`row_number()`或`rank()`，当检查行限制部分中第一个查询的执行计划的谓词信息时可以观察到这一点（仅显示相关信息）。


    ```sql

    select *

    from dbms_xplan.display_cursor (null, null, ''BASIC PREDICATE'')

    /

    PLAN_TABLE_OUTPUT


    | Id  | Operation                          | Name            |


    |   0 | SELECT STATEMENT                   |                 |

    |*  1 |  VIEW                              |                 |

    |*  2 |   WINDOW SORT PUSHED RANK          |                 |

    Predicate Information (identified by operation id):


    1 - filter("from$_subquery$_002"."rowlimit_$$_rownumber"<=5)

    2 - filter(ROW_NUMBER() OVER ( ORDER BY "RCS"."ROUND")<=5)

    ```


    正如在谓词信息中所看到的，分析函数`row_number()`与原始查询中的排序结合使用。


    **注意**

    从查询中省略`order by`子句不会引发错误或给出警告。在查询中省略`order by`可能导致分析函数中的“order by null”可能不会给出预期的结果。


    ## Set Operators


    让我们使用来自`drivers`表的两个数据子集来演示集合操作的工作原理。首先，有一组名字是Graham的车手。


    ```sql

    create view grahams

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.forename = ''Graham''

    /

    ```


    该视图显示以下结果集。


    ```sql

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    289 hill                Graham     Hill       British

    745 graham_whitehead    Graham     Whitehead  British

    ```


    其次，有一组姓氏是Hill的车手。


    ```sql

    create view hills

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.surname = ''Hill''

    /

    ```


    该视图显示以下结果集。


    ```sql

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    71 damon_hill          Damon      Hill       British

    289 hill                Graham     Hill       British

    403 phil_hill           Phil       Hill       American

    ```


    这些视图基于同一个表，每个视图包含数据的一个子集。'
  raw: '### Pagination


    The row-limiting clause also provides functionality for pagination-type queries.
    Instead of showing the first x number of rows, it is possible to skip the first
    x number of rows and show the next set of records. The following example shows
    an `offset` clause, skipping the first ten rows from the first round in 2022.


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by points desc

    offset 10 rows

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         11 Mick Schumacher             0          0

    1         12 Lance Stroll                0          0

    1         13 Alexander Albon             0          0

    1         14 Daniel Ricciardo            0          0

    1         15 Lando Norris                0          0

    1         16 Nicholas Latifi             0          0

    1         17 Nico Hülkenberg             0          0

    1         18 Sergio Pérez                0          0

    1         20 Pierre Gasly                0          0

    1         19 Max Verstappen              0          0

    ```


    The `offset` clause is limited to x number of rows; you cannot specify a percentage
    of rows. It is possible to specify an expression if it evaluates to a numeric
    value.


    The most common way to paginate through a set of data is to show first a set of
    rows (let’s say five records) and, when navigating to the next page, show the
    next five records skipping the first five that have already been seen. This can
    be implemented using the `offset` clause and the `fetch` clause. The following
    example skips the first five rows and returns the next five rows.


    ```

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset 5 rows

    fetch  next 5 rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    6 Valtteri Bottas             8          0

    7 Esteban Ocon                6          0

    8 Yuki Tsunoda                4          0

    9 Fernando Alonso             2          0

    10 Guanyu Zhou                 1          0

    ```


    Instead of using `fetch first`, `fetch next` is used for pagination. Having the
    number of rows hard coded in a pagination query doesn’t make sense, most likely
    the application that uses this query wants to dictate the offset and how many
    rows are shown to the user. The following query shows the pagination query for
    the next five records using bind variables in SQLcl.


    ```

    var offset number

    var next  number

    begin

    :offset := 10;

    :next := 5;

    end;

    /

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset :offset rows

    fetch  next :next rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    11 Mick Schumacher             0          0

    12 Lance Stroll                0          0

    13 Alexander Albon             0          0

    14 Daniel Ricciardo            0          0

    15 Lando Norris                0          0

    ```


    Using this query, it is also possible to show the first five records from the
    result set when using a value of 0 as the offset.


    ```

    begin

    :offset := 0;

    End;

    /

    >

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    1 Charles Leclerc            26          1

    2 Carlos Sainz               18          0

    3 Lewis Hamilton             15          0

    4 George Russell             12          0

    5 Kevin Magnussen            10          0

    ```


    Depending on the query that is used, it could be that retrieving the tenth page
    is more time-consuming than the first one.


    ### Under the Hood


    Under the hood, the row-limiting clause utilizes analytic functions, like `row_number`
    or `rank`, which can be observed when the predicate information of the explain
    plan is examined from the first query in the row-limiting section (only the relevant
    information is shown).


    ```

    select *

    from dbms_xplan.display_cursor (null, null, ''BASIC PREDICATE'')

    /

    PLAN_TABLE_OUTPUT


    | Id  | Operation                          | Name            |


    |   0 | SELECT STATEMENT                   |                 |

    |*  1 |  VIEW                              |                 |

    |*  2 |   WINDOW SORT PUSHED RANK          |                 |

    Predicate Information (identified by operation id):


    1 - filter("from$_subquery$_002"."rowlimit_$$_rownumber"<=5)

    2 - filter(ROW_NUMBER() OVER ( ORDER BY "RCS"."ROUND")<=5)

    ```


    As can be seen in the predicate information, the analytic function `row_number`
    is used in combination with the sorting that was in the original query.


    Caution


    Omitting the `order by` clause from the query doesn’t raise an error or give a
    warning. Leaving `order by` out of the query results in an “order by null” in
    the analytic function might not give the expected results.


    ## Set Operators


    Let’s use two subsets of data from the `drivers` table to demonstrate the workings
    of the set operators. First, there is a set of drivers whose first name is Graham.


    ```

    create view grahams

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.forename = ''Graham''

    /

    ```


    The view exposes the following result set.


    ```

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    289 hill                Graham     Hill       British

    745 graham_whitehead    Graham     Whitehead  British

    ```


    Second, there is a set of drivers whose surname is Hill.


    ```

    create view hills

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.surname = ''Hill''

    /

    ```


    The view exposes the following result set.


    ```

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    71 damon_hill          Damon      Hill       British

    289 hill                Graham     Hill       British

    403 phil_hill           Phil       Hill       American

    ```


    These views are based off the same table, with a subset of the data each.'
  trans: '### 分页


    行限制子句还提供了用于分页类型查询的功能。除了显示前 x 行外，还可以跳过前 x 行并显示下一组记录。以下示例显示了一个 `offset` 子句，它跳过 2022
    年第一轮比赛中的前十行。


    ```sql

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by points desc

    offset 10 rows

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         11 Mick Schumacher             0          0

    1         12 Lance Stroll                0          0

    1         13 Alexander Albon             0          0

    1         14 Daniel Ricciardo            0          0

    1         15 Lando Norris                0          0

    1         16 Nicholas Latifi             0          0

    1         17 Nico Hülkenberg             0          0

    1         18 Sergio Pérez                0          0

    1         20 Pierre Gasly                0          0

    1         19 Max Verstappen              0          0

    ```


    `offset` 子句仅限于 x 行；不能指定行的百分比。如果表达式计算结果为数值，则可以指定该表达式。


    对数据集进行分页的最常见方法是首先显示一组行（假设是五条记录），当导航到下一页时，跳过已经看过的前五行，显示接下来的五行。这可以使用 `offset` 子句和
    `fetch` 子句来实现。以下示例跳过前五行并返回接下来的五行。


    ```sql

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset 5 rows

    fetch  next 5 rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    6 Valtteri Bottas             8          0

    7 Esteban Ocon                6          0

    8 Yuki Tsunoda                4          0

    9 Fernando Alonso             2          0

    10 Guanyu Zhou                 1          0

    ```


    对于分页，使用 `fetch next` 而不是 `fetch first`。在分页查询中将行数硬编码是没有意义的，很可能使用此查询的应用程序希望指定偏移量以及向用户显示多少行。以下查询使用
    SQLcl 中的绑定变量显示了获取接下来五条记录的分页查询。


    ```sql

    var offset number

    var next  number

    begin

    :offset := 10;

    :next := 5;

    end;

    /

    select position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    round = 1

    order  by position

    offset :offset rows

    fetch  next :next rows only

    /

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    11 Mick Schumacher             0          0

    12 Lance Stroll                0          0

    13 Alexander Albon             0          0

    14 Daniel Ricciardo            0          0

    15 Lando Norris                0          0

    ```


    使用此查询，当偏移量使用 0 时，也可以显示结果集中的前五行。


    ```sql

    begin

    :offset := 0;

    end;

    /

    >

    POSITION DRIVER                 POINTS       WINS

    ---------- ------------------ ---------- ----------

    1 Charles Leclerc            26          1

    2 Carlos Sainz               18          0

    3 Lewis Hamilton             15          0

    4 George Russell             12          0

    5 Kevin Magnussen            10          0

    ```


    根据所使用的查询，获取第十页可能比获取第一页更耗时。


    ### 底层机制


    在底层，行限制子句利用了分析函数，如 `row_number()` 或 `rank()`，当检查行限制部分中第一个查询的执行计划的谓词信息时可以观察到这一点（仅显示相关信息）。


    ```sql

    select *

    from dbms_xplan.display_cursor (null, null, ''BASIC PREDICATE'')

    /

    PLAN_TABLE_OUTPUT


    | Id  | Operation                          | Name            |


    |   0 | SELECT STATEMENT                   |                 |

    |*  1 |  VIEW                              |                 |

    |*  2 |   WINDOW SORT PUSHED RANK          |                 |

    Predicate Information (identified by operation id):


    1 - filter("from$_subquery$_002"."rowlimit_$$_rownumber"<=5)

    2 - filter(ROW_NUMBER() OVER ( ORDER BY "RCS"."ROUND")<=5)

    ```


    正如在谓词信息中所看到的，分析函数 `row_number()` 与原始查询中的排序结合使用。


    **注意**

    从查询中省略 `order by` 子句不会引发错误或给出警告。在查询中省略 `order by` 可能导致分析函数中的“order by null”可能不会给出预期的结果。


    ## 集合操作符


    让我们使用来自 `drivers` 表的两个数据子集来演示集合操作符的工作原理。首先，有一组名字是 Graham 的车手。


    ```sql

    create view grahams

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.forename = ''Graham''

    /

    ```


    该视图显示以下结果集。


    ```sql

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    289 hill                Graham     Hill       British

    745 graham_whitehead    Graham     Whitehead  British

    ```


    其次，有一组姓氏是 Hill 的车手。


    ```sql

    create view hills

    as

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.surname = ''Hill''

    /

    ```


    该视图显示以下结果集。


    ```sql

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    71 damon_hill          Damon      Hill       British

    289 hill                Graham     Hill       British

    403 phil_hill           Phil       Hill       American

    ```


    这些视图基于同一个表，每个视图包含数据的一个子集。'
- fmt: '## Union


    Combining the two views created earlier can be achieved with the `union` operator.
    For this operator, both sets must have the same shape and form; that is, the data
    types of each column must match or at least be in the same family. Integers and
    floats can be mixed and matched, but you cannot mix `VARCHAR2` with numbers.


    Joining the two result sets gives the following result.


    ```sql

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    336 mcrae            Graham McRae     New Zealander

    403 phil_hill        Phil   Hill      American

    745 graham_whitehead Graham Whitehead British

    ```


    The `union` operator does more than just join the two result sets. It also sorts
    them and removes the duplicate rows from the final result. This behavior can be
    observed in the explain plan for the preceding query.


    ```sql

    select *

    from dbms_xplan.display_cursor(null, null, ''BASIC'')

    /

    PLAN_TABLE_OUTPUT


    | Id  | Operation                   | Name    |


    |   0 | SELECT STATEMENT            |         |

    |   1 |  SORT UNIQUE                |         |

    |   2 |   UNION-ALL                 |         |

    |*  3 |    TABLE ACCESS STORAGE FULL| DRIVERS |

    |*  4 |    TABLE ACCESS STORAGE FULL| DRIVERS |


    ```


    The `sort unique` step is seen in step 1 of the explain plan, resulting in five
    records in the output. `Graham Hill` only occurs once, although he appears in
    both views.


    This union operator can, starting in Oracle Database 21c, be written more explicitly
    by adding `distinct` to it.


    ```sql

    union distinct

    ```


    The workings remain the same; it adds syntactic clarity.


    When all the data is needed, regardless of whether there are duplicates, use the
    `union all` operator. This eliminates the need for the `sort unique` step in the
    explain plan.


    ```sql

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union all

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    336 mcrae            Graham McRae     New Zealander

    289 hill             Graham Hill      British

    745 graham_whitehead Graham Whitehead British

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    403 phil_hill        Phil   Hill      American

    ```


    As you can see in the final result, driver 289 (`Graham Hill`) appears twice.
    In the explain plan, `sort unique` is no longer present.


    ```sql

    | Id  | Operation                  | Name    |


    |   0 | SELECT STATEMENT           |         |

    |   1 |  UNION-ALL                 |         |

    |   2 |   TABLE ACCESS STORAGE FULL| DRIVERS |

    |   3 |   TABLE ACCESS STORAGE FULL| DRIVERS |


    ```


    ## Minus and Except


    The following view is added to demonstrate the workings of the `minus` and `minus
    all` operators.


    ```sql

    create or replace view grahams_and_hills

    as

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union all

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    ```


    This view exposes the following data.


    ```sql

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    336 mcrae            Graham McRae     New Zealander

    289 hill             Graham Hill      British

    745 graham_whitehead Graham Whitehead British

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    403 phil_hill        Phil   Hill      American

    ```


    Note that `Graham Hill` appears twice in the result set.


    The `minus` operator filters out only the rows that exist in the first input set
    but doesn’t exist in the second. To demonstrate this operation, let’s take the
    `grahams_and_hills` view and use the `minus` operator with a query that selects
    all the `British` drivers.


    ```sql

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from grahams_and_hills gh

    minus

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.nationality = ''British''

    /

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    403 phil_hill           Phil       Hill       American

    ```


    As you can see, even though `Graham Hill` (a `British` driver) appears twice in
    the first set (the `grahams_and_hills` view), he doesn’t appear in the final result
    set anymore. Both occurrences of `Graham Hill` are removed from the first result
    set.


    This `minus` operator can, starting in Oracle Database 21c, be written more explicitly
    by adding `distinct` to it.


    ```sql

    minus distinct

    ```


    The workings remain the same; it adds syntactic clarity.


    Since Oracle Database 21c, the `minus` operator also has an `all` version. You
    get a different result if the script is altered to use the `minus all` operator.


    ```sql

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    minus all

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.nationality = ''British''

    /

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    289 hill                Graham     Hill       British

    403 phil_hill           Phil       Hill       American

    ```


    In this case, `Graham Hill` does appear in the final result set. That is because
    he appears twice in the first set (the `grahams_and_hills` view) but only once
    in the second set. The record is removed only once instead of all appearances.


    The `except` operator is also implemented to comply with the ANSI standard. The
    workings of `except` are like `minus`, including all variations.


    ```sql

    except

    except distinct

    except all

    ```'
