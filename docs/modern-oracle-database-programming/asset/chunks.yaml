    ) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
    \"COU\"\n```\n\n当请求与`JSON`类型不同的`SQL`数据类型时，会尝试进行隐式转换，如果成功则返回。以下示例返回驾驶员的永久编号（在`JSON`示例中是一个字符串），并将其转换为数字。\n\
    \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[1].permanentNumber'\n\
    returning number\n) as permanentnumber\nfrom f1_drivers_json f\n/\nPERMANENTNUMBER\n\
    ---------------\n```\n\n查询结果的右对齐表明它是数字`SQL`数据类型。使用`JSON`路径表达式中的`number()`项方法也可以得到相同的查询结果。\n\
    \n与`json_value`不同，`json_query`可以返回对象或数组。在以下示例中，返回了第一位驾驶员的驾驶员对象。通过添加`returning\
    \ varchar2 pretty`，结果通过添加换行和缩进变得更易于阅读。\n\n```sql\nselect json_query (f.json_document\n\
    ,'$.MRData.DriverTable.Drivers[0]'\nreturning varchar2 pretty\n) as drivercode\n\
    from f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------------------------------------------------------\n\
    {\n  \"driverId\" : \"coulthard\",\n  \"code\" : \"COU\",\n  \"givenName\" : \"\
    David\",\n  \"familyName\" : \"Coulthard\",\n  \"dateOfBirth\" : \"1971-03-27\"\
    ,\n  \"nationality\" : \"British\",\n  \"champion\" : false,\n  \"nickname\" :\
    \ \"DC\"\n}\n```\n\n当定位多个值并希望结果是格式良好的`JSON`时，这些值可能需要一个数组包装器。这意味着结果被包装在方括号中。在以下查询中，定位了驾驶员代码。示例`JSON`中有两个代码。两个标量值必须包装在方括号中，使结果再次成为有效的`JSON`。\n\
    \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*].code'\n\
    with array wrapper\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
    [\"COU\",\"VET\"]\n```\n\n默认的包装子句是`without array wrapper`，当定位到多个值时，会引发错误，默认情况下导致`null`。\n\
    \n> 提示\n> > 当您不希望*总是*将结果括在数组中时，也可以使用`with conditional array wrapper`，让`Oracle\
    \ Database`来决定何时需要将结果包装在数组中。\n\n有几种原因可能导致错误，这些错误可以在`on error`子句中处理。\n\n*   传递给函数的输入不是格式良好的`JSON`数据。\n\
    *   `JSON`路径表达式未找到匹配项。属性可能不存在。此错误也可以由`on empty`子句处理，该子句优先于`on error`子句。\n*   返回值数据类型不足以容纳返回值。\n\
    *   返回值数据类型无法隐式转换为请求的返回类型。此错误也可以由`on mismatch`子句处理，该子句优先于`on error`子句。\n*   定位了多个值，并且省略了`with\
    \ array wrapper`。"
- fmt: '# JSON值处理与JSON_TABLE函数


    默认处理方法是返回空值。这可以通过`null on error`、`null on empty`和`null on mismatch`子句来显式指定。


    除了使用`error on error`和`error on empty`来传播错误外，还可以通过指定`empty object on error`、`empty
    array on error`、`empty object on empty`或`empty array on empty`来返回空对象或数组。


    当返回值超出`returning`子句指定的范围时，会引发错误。除了调整返回数据类型，也可以截断结果。


    ```sql

    select json_query (f.json_document

    , ''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(3) truncate

    ) as familyname

    from f1_drivers_json f

    /

    FAM


    "Co

    ```


    为了演示`on mismatch`子句，下面的查询针对车手代码（`code`），并请求在查询结果中返回一个SQL数值。这行不通，因为代码不是数字。默认情况下，会返回空值。


    ```sql

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].code''

    returning number

    ) as numericCode

    from f1_drivers_json f

    /

    NUMERICCODE


    ```


    可以同时使用`on error`子句和`on mismatch`子句。`on mismatch`子句具有优先权。


    ```sql

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code''

    returning number

    default -99 on error

    error on mismatch

    )

    from f1_drivers_json f

    /

    ORA-01722: invalid number

    ```


    当省略`on mismatch`子句时，会返回-99。`on mismatch`子句可以处理`returning`子句数据类型不匹配，以及上述案例中的`number()`项方法。


    ### JSON_TABLE


    使用`json_table`函数，可以创建JSON数据的关系视图。此函数只能出现在SQL语句的`from`子句中。


    JSON路径表达式决定了用于将JSON数据投影为关系格式的行源。在`json_table`函数内部，`columns`子句对行源进行求值以找到JSON值，并将其作为SQL值返回到关系数据行的列中。


    在以下示例中，`Drivers`数组的一部分被投影为关系格式。


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverid  varchar2(10) path ''$.driverId''

    , code      varchar2(3)  path ''$.code''

    , firstname varchar2(10) path ''$.givenName''

    , lastname  varchar2(10) path ''$.familyName''

    , dob       date         path ''$.dateOfBirth''

    )

    ) d

    /

    DRIVERID   COD FIRSTNAME  LASTNAME   DOB

    ---------- --- ---------- ---------- -------------------

    coulthard  COU David      Coulthard  27-03-1971 00:00:00

    vettel     VET Sebastian  Vettel     03-07-1987 00:00:00

    ```


    关系表`f1_drivers_json`与`json_table`进行连接以创建笛卡尔积。JSON路径表达式将`Drivers`数组作为行源。在`columns`子句中，路径表达式指示相对于行源可以在何处找到JSON值。`columns`子句中的`$`上下文项指的是`json_table`级别路径表达式的输出。


    > 提示：

    > 除了使用`cross apply`，也可以使用`cross join`将JSON文档投影为关系格式。使用`cross apply`反映了连接是横向的（`lateral`），因为关系表与`json_table`之间存在关联。


    在当前的Oracle Database版本中，也可以只指定行源的键。只要JSON文档中的键名匹配（区分大小写！），就可以返回值。以下查询返回与之前相同的数据，但存在一些显著差异。


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverId

    , code

    , givenName

    , familyName

    , dateOfBirth

    )

    ) d

    /

    DRIVERID   COD GIVENNAME  FAMILYNAME DATEOFBIRT

    ---------- --- ---------- ---------- ----------

    coulthard  COU David      Coulthard  1971-03-27

    vettel     VET Sebastian  Vettel     1987-07-03

    ```


    为每一列返回的SQL数据类型是`varchar2(4000)`，列名源自JSON键。


    可以通过在`columns`子句中添加所需的类型来更改特定列的SQL数据类型。在以下示例中，指定了数据类型，例如出生日期为SQL日期，通过截断`givenName`属性的其余部分，只返回了车手名的首字母。


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverId    varchar2(10)

    , code        varchar2(3)

    , givenName   varchar2(1) truncate

    , familyName  varchar2(10)

    , dateOfBirth date

    )

    ) d

    /

    DRIVERID   COD G FAMILYNAME DATEOFBIR

    ---------- --- - ---------- ---------

    coulthard  COU D Coulthard  27-MAR-71

    vettel     VET S Vettel     03-JUL-87

    ```


    对于每一列，可以使用`json_value`和`json_query`函数中所有可用的选项，例如`on error`或`on empty`子句。由于之前已经讨论过，本节将不再赘述。


    除了为每一列指定`error on error`，也可以在最高级别定义一次。这需要在`columns`子句之前完成。列中的错误子句优先于表级别的子句。以下查询演示了在表级别使用`error
    on error`以及在列级别进行覆盖。'
  raw: 'The default handling method is to return a null. This can be made explicitly
    with `null on error`, `null on empty,` and `null on mismatch`.


    Besides propagating the error with `error on error` and `error on empty`, it is
    also possible to return an empty object or array by specifying `empty object on
    error`, `empty array on error`, `empty object on empty` or `empty array on empty`.


    When a return value exceeds the `returning` clause, it raises an error. Besides
    adjusting the return data type, it is possible to truncate the results.


    ```

    select json_query (f.json_document

    , ''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(3) truncate

    ) as familyname

    from f1_drivers_json f

    /

    FAM


    "Co

    ```


    To demonstrate the `on mismatch` clause, the following query targets the drivers
    code and requests a SQL number in the query results. This cannot work because
    the code is not numeric. By default, a null is returned.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].code''

    returning number

    ) as numericCode

    from f1_drivers_json f

    /

    NUMERICCODE


    ```


    Both the `on error` clause and the `on mismatch` clause can be used. The `on mismatch`
    clause has precedence.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code''

    returning number

    default -99 on error

    error on mismatch

    )

    from f1_drivers_json f

    /

    ORA-01722: invalid number

    ```


    When the `on mismatch` clause is omitted, –99 is returned. The `on mismatch` clause
    can handle the `returning` clause data type mismatch and the `number()` item method
    in the preceding case.


    ### JSON_TABLE


    With the `json_table` function, a relational view of JSON data is created. This
    function can only appear in the `from` clause of a SQL statement.


    The JSON path expression determines the row source used to project the JSON data
    in a relational format. Within the `json_table` function, the `columns` clause
    evaluates the row source to find the JSON values and returns them as SQL values
    as columns in a row of relational data.


    In the following example, part of the Drivers array is projected in a relational
    format.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverid  varchar2(10) path ''$.driverId''

    , code      varchar2(3)  path ''$.code''

    , firstname varchar2(10) path ''$.givenName''

    , lastname  varchar2(10) path ''$.familyName''

    , dob       date         path ''$.dateOfBirth''

    )

    ) d

    /

    DRIVERID   COD FIRSTNAME  LASTNAME   DOB

    ---------- --- ---------- ---------- -------------------

    coulthard  COU David      Coulthard  27-03-1971 00:00:00

    vettel     VET Sebastian  Vettel     03-07-1987 00:00:00

    ```


    The `f1_drivers_json` relational table is joined with `json_table` to create a
    cartesian product. The JSON path expression targets the Drivers array as the row
    source. In the `columns` clause, the path expression indicates where the JSON
    values can be found relative to the row source. The `$` context item in the `columns`
    clause refers to the output of the path expression at the `json_table` level.


    Tip


    Besides using a cross apply, it is also possible to use a cross join to project
    the JSON document in a relational format. Using a cross apply reflects that the
    join is lateral, as there is a correlation between the relational table and the
    `json_table`.


    In current Oracle Database releases, it is also possible to only specify the keys
    of the row source. The values can be returned as long as the names of the keys
    in the JSON document match (case-sensitive!). The following query returns the
    same data as previously, but some significant differences exist.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverId

    , code

    , givenName

    , familyName

    , dateOfBirth

    )

    ) d

    /

    DRIVERID   COD GIVENNAME  FAMILYNAME DATEOFBIRT

    ---------- --- ---------- ---------- ----------

    coulthard  COU David      Coulthard  1971-03-27

    vettel     VET Sebastian  Vettel     1987-07-03

    ```


    The SQL data type returned for each column is a `varchar2(4000)`, and the column
    names are derived from the JSON keys.


    Changing the SQL data type for a specific column can be done by adding the required
    type in the `columns` clause. In the following example, the data types are specified,
    like a SQL date for the date of birth, and instead of the driver’s first name,
    only the first initial is returned by truncating the rest of the `givenName` attribute.


    ```

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( driverId    varchar2(10)

    , code        varchar2(3)

    , givenName   varchar2(1) truncate

    , familyName  varchar2(10)

    , dateOfBirth date

    )

    ) d

    /

    DRIVERID   COD G FAMILYNAME DATEOFBIR

    ---------- --- - ---------- ---------

    coulthard  COU D Coulthard  27-MAR-71

    vettel     VET S Vettel     03-JUL-87

    ```


    For each column it is possible to use all options that are available with the
    `json_value` and `json_query` functions, like the `on error` or `on empty` clauses.
    As they have been discussed before, they are omitted from this section.


    Instead of specifying `error on error` for each column, it is also possible to
    define this once at the highest level. This needs to be done before the `columns`
    clause. Error clauses in the column have precedence over table-level clauses.
    The following query demonstrates the use of `error on error` at the table level
    and the override at the column level.'
