    ### SQL 宏


    Oracle Database 21c (21.1) 引入了 SQL 宏。它被 backport（向后移植）到 19c (19.10)，但仅支持表类型的 SQL
    宏。通过 SQL 宏，你可以利用 PL/SQL 的全部功能——包括 PTF 中引入的所有功能——在运行时创建一个 SQL 片段，该片段会被包含在 SQL 引擎执行的
    SQL 语句中。


    你可以将在 PTF 中学到的很多知识应用于 SQL 宏。PTF 允许你访问流经处理过程的实际数据，而 SQL 宏仅提供在 SQL 语句执行前对其进行操纵的权限。你只调用一次
    PL/SQL 函数（在 SQL 语句执行前），并返回一个 SQL 片段，该片段会被插入到待执行的文本中。你可以使用 SQL 宏来集中实现那些之前可能封装在
    PL/SQL 函数中的功能，但无需承担所有上下文切换的开销。


    函数中不应包含 PL/SQL 逻辑；传入的字符串参数为 null。所有逻辑都应放入 SQL 表达式中。


    SQL 宏有两种类型：标量（scalar）和表（table）。它们有什么区别？


    表类型的 SQL 宏可用于 SQL 语句的`from`子句。标量类型的 SQL 宏可用于 SQL 语句中其他任何地方，例如`select`列表、`where`、`having`、`group
    by`和`order by`子句。


    当你有一个封装在 PL/SQL 函数中的公式用于集中其实现，并且该公式可以用纯 SQL 编写时，那么你就有了一个使用 SQL 宏的用例。

