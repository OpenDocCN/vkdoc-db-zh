    ## JSON 与 PL/SQL


    为了在 PL/SQL 中支持 JSON，专门设计了几种对象类型来读写 JSON 文档。这可以提高性能，尤其是在需要多次解析文档时。


    通过这些对象类型，可以在内存中以编程方式操作 JSON，以验证、构造或转换 JSON 文档。


    PL/SQL 对象类型列于表 14-2 中。


    **表 14-2：与 JSON 相关的 PL/SQL 对象类型**


    | 对象类型 | 描述 |

    | --- | --- |

    | `json_element_t` | 所有其他类型的超类型此类型是可实例化的使用 `treat` 函数，可以将 `json_element_t` 类型的变量实例化为某个子类型
    |

    | `json_object_t` | `json_element_t` 的子类型对应于 JSON 对象类型 |

    | `json_array_t` | `json_element_t` 的子类型对应于 JSON 数组类型 |

    | `json_scalar_t` | `json_element_t` 的子类型对应于 JSON 标量类型 |

    | `json_key_list` | `json_element_t` 的子类型设计用于保存 `json_object_t` 键的 VARCHAR2(4000)
    可变数组 |


    对于接下来的示例，使用的 JSON 文档与第 12 章中的清单 12-1 相同，这次作为一个名为 `l_f1data`、数据类型为 `CLOB` 的局部变量。


    当已知 JSON 文档的结构时，车手信息包含在一个 JSON 对象中。可以直接将其解析为相应的数据类型。


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    end;

    /

    ```


    一旦文本表示形式被解析为 JSON 文档，就可以根据需要提取对象和数组。示例中的顶级对象名为 `MRData`；为了提取此对象，在下面的示例中使用了 `get_object`
    方法函数。


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    l_mrdata json_object_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    l_mrdata := l_object.get_object ( ''MRData'' );

    end;

    /

    ```


    同样的方法可用于提取 `Drivers` 数组，为 JSON 文档中的每一层声明适当的数据类型，并使用 `get_object` 和 `get_array`
    方法函数。


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    l_mrdata json_object_t;

    l_drivertable json_object_t;

    l_drivers_array json_array_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    l_mrdata := l_object.get_object ( ''MRData'' );

    l_drivertable := l_mrdata.get_object ( ''DriverTable'' );

    l_drivers_array := l_drivertable.get_array( ''Drivers'' );

    end;

    /

    ```


    也可以将其浓缩，连续应用方法函数，结果是一样的。


    ```

    declare

    l_f1data clob := '''';

    l_drivers_array json_array_t;

    begin

    l_drivers_array := json_object_t.parse (l_f1data)

    .get_object (''MRData'')

    .get_object (''DriverTable'')

    .get_array  (''Drivers'');

    end;

    /

    ```


    当 JSON 文档的结构未知时，可以检查 JSON 文档的内容。在以下示例中，JSON 文档被解析。使用 `json_element_t` 超类型以及 `is_object`
    和 `is_array` 自省函数来确定 JSON 数据类型。


    ```

    declare

    l_f1data clob := '''';

    l_element json_element_t;

    begin

    l_element := json_element_t.parse ( l_f1data );

    if l_element.is_object

    then

    sys.dbms_output.put_line ( ''It is an Object'' );

    elsif l_element.is_array

    then

    sys.dbms_output.put_line ( ''It is an Array'' );

    end if;

    end;

    /

    It is an Object

    ```


    `Drivers` 数组内包含的是表示车手的 JSON 对象。使用 `get` 方法函数可以提取这些 JSON 对象。请注意，`get` 方法函数返回的是超类型
    `json_element_t`。因此，需要使用 `treat` 函数将其转换为 JSON 对象。

    '
- fmt: "## 从 JSON 对象获取属性值\n\n转换为 JSON 对象后，可以使用 `get_string`、`get_number`、`get_date`\
    \ 等方法函数来检索各个属性。以下示例展示了如何获取 JSON 对象中特定键的值。\n\n```\ndeclare\n  l_f1data clob :=\
    \ '';\n  l_drivers_array json_array_t;\n  l_driver json_object_t;\nbegin\n  l_drivers_array\
    \ := json_object_t.parse (l_f1data)\n                       .get_object ('MRData')\n\
    \                       .get_object ('DriverTable')\n                       .get_array\
    \  ('Drivers');\n  for i in 0 .. l_drivers_array.get_size -1\n  loop\n    l_driver\
    \ := treat (l_drivers_array.get (i)\n                       as json_object_t);\n\
    \    sys.dbms_output.put_line (l_driver.get_string ('driverId'));\n    sys.dbms_output.put_line\
    \ (l_driver.get_string ('code'));\n    sys.dbms_output.put_line (l_driver.get_date\
    \ ('dateOfBirth'));\n  end loop;\nend;\n/\ncoulthard\nCOU\n27-MAR-71\nvettel\n\
    VET\n03-JUL-87\n```\n\n## 通用方式获取键值对\n\n除了通过在 JSON 文档中查找每个键来获取属性值外，还可以采用更通用的方法。\n\
    \n`get_keys` 方法函数返回一个 `VARCHAR2` 类型的变长数组，最好存储在 `json_key_list` 类型的变量中。在以下示例中，`get_keys`\
    \ 用于提取属性名称及其关联的值。\n\n```\ndeclare\n  l_f1data clob := '';\n  l_drivers_array json_array_t;\n\
    \  l_driver json_object_t;\n  l_driver_keys json_key_list;\nbegin\n  l_drivers_array\
    \ := json_object_t.parse (l_f1data)\n                       .get_object ('MRData')\n\
    \                       .get_object ('DriverTable')\n                       .get_array\
    \  ('Drivers');\n  for i in 0 .. l_drivers_array.get_size -1\n  loop\n    l_driver\
    \ := treat (l_drivers_array.get (i)\n                       as json_object_t);\n\
    \    l_driver_keys := l_driver.get_keys;\n    for key_idx in 1 .. l_driver_keys.count\n\
    \    loop\n      sys.dbms_output.put_line (\n        l_driver_keys (key_idx)||'\
    \ : '||\n        l_driver.get_string (l_driver_keys (key_idx))\n      );\n   \
    \ end loop;\n  end loop;\nend;\n/\ndriverId : coulthard\ncode : COU\ngivenName\
    \ : David\nfamilyName : Coulthard\ndateOfBirth : 1971-03-27\nnationality : British\n\
    champion : false\nnickname : DC\ndriverId : vettel\npermanentNumber : 5\ncode\
    \ : VET\ngivenName : Sebastian\nfamilyName : Vettel\ndateOfBirth : 1987-07-03\n\
    nationality : German\nchampion : true\nnickname :\nConstructors :\n```\n\n在上面的输出中，`Constructors`\
    \ 属性没有显示关联的值。仔细查看示例 JSON 中的这个属性，其值是一个对象数组。为了使这些值也可见，可以创建类似的嵌套循环结构：一个循环用于获取对象，另一个循环用于从对象中获取键值对。\n\
    \n```\n    l_constructor_array := l_driver.get_array (\n                     \
    \        l_driver_keys (key_idx));\n    for ci in 0 .. l_constructor_array.get_size\
    \ -1\n    loop\n      l_constructor := treat (l_constructor_array.get (ci)\n \
    \                             as json_object_t);\n      l_constructor_keys :=\
    \ l_constructor.get_keys;\n      for constructor_idx in 1 .. l_constructor_keys.count\n\
    \      loop\n        sys.dbms_output.put_line (\n          l_constructor.get_string\
    \ (\n            l_constructor_keys (constructor_idx))\n        );\n      end\
    \ loop;\n    end loop;\n```\n\n## 判断 JSON 数据类型\n\n您可以使用 `get_type` 方法函数来确定遇到的\
    \ JSON 数据类型。\n\n以下代码使用 `dbms_output` 显示示例 JSON 内容。为简洁起见，省略了输出。\n\n```\ndeclare\n\
    \  l_f1data clob := '';\n  l_drivers_array json_array_t;\n  l_driver        json_object_t;\n\
    \  l_driver_keys.  json_key_list;\n  l_constructor_array json_array_t;\n  l_constructor_keys\
    \  json_key_list;\n  l_constructor       json_object_t;\nbegin\n  l_drivers_array\
    \ := json_object_t.parse (l_f1data)\n                       .get_object ('MRData')\n\
    \                       .get_object ('DriverTable')\n                       .get_array\
    \  ('Drivers');\n  for i in 0 .. l_drivers_array.get_size -1\n  loop\n    l_driver\
    \ := treat (l_drivers_array.get (i)\n                       as json_object_t);\n\
    \    l_driver_keys := l_driver.get_keys;\n    for key_idx in 1 .. l_driver_keys.count\n\
    \    loop\n      case l_driver.get_type (l_driver_keys (key_idx))\n        when\
    \ 'SCALAR'\n        then\n          sys.dbms_output.put_line (\n            l_driver_keys\
    \ (key_idx)||' : '||\n            l_driver.get_string (l_driver_keys (key_idx)));\n\
    \        when 'ARRAY'\n        then\n          l_constructor_array := l_driver.get_array\
    \ (\n                                   l_driver_keys (key_idx));\n          for\
    \ ci in 0 .. l_constructor_array.get_size -1\n          loop\n            l_constructor\
    \ := treat (l_constructor_array.get (ci)\n                                   \
    \ as json_object_t);\n            l_constructor_keys := l_constructor.get_keys;\n\
    \            for constructor_idx in 1 .. l_constructor_keys.count\n          \
    \  loop\n              sys.dbms_output.put_line (\n                l_constructor.get_string\
    \ (\n                  l_constructor_keys (constructor_idx))\n              );\n\
    \            end loop;\n          end loop;\n      end case;\n    end loop;\n\
    \  end loop;\nend;\n```\n\n## 在 PL/SQL 中使用 SQL/JSON 函数\n\n在 PL/SQL 代码中，也可以使用 SQL/JSON\
    \ 函数，如 `json_value` 和 `json_query`。因为 PL/SQL 中 *有* 布尔数据类型，所以它可以从 JSON 直接映射。以下示例展示了\
    \ `json_value` 和 `json_query` 在 PL/SQL 中的用法。\n\n```\ndeclare\n  l_f1data clob\
    \ := '';\n  l_boolean boolean;\nbegin\n  l_boolean := json_value\n           \
    \      ( l_drivers\n                 ,'$.MRData.DriverTable.Drivers[1].champion'\n\
    \                   returning boolean\n                 );\n  sys.dbms_output.put_line\n\
    \    ( json_value\n        ( l_drivers\n        , '$.MRData.DriverTable.Drivers[1].givenName'\n\
