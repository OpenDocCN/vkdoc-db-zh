    Suppose you have a table of lap times of Formula 1 races. Note that the lap times
    are recorded in intervals: INTERVAL_DAY_TO_SECOND. A sample of the lap times is
    listed in Table [8-3](#536316_1_En_8_Chapter.xhtml#Tab3).


