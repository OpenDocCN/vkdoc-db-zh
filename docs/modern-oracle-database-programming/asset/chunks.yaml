- fmt: '### start_profiling


    要开始性能分析会话，你需要调用`start_profiling`函数。


    ```

    function start_profiling( max_depth   PLS_INTEGER DEFAULT NULL

    , profile_uga BOOLEAN     DEFAULT NULL

    , profile_pga BOOLEAN     DEFAULT NULL

    , sqlmonitor  BOOLEAN     DEFAULT TRUE

    , run_comment VARCHAR2    DEFAULT NULL

    ) return number;

    ```


    表[10-1](#536316_1_En_10_Chapter.xhtml#Tab1)解释了这些参数的含义。


    **表 10-1**


    **dbms_hprof.start_profiling 函数参数**


    | 参数 | 描述 |

    | --- | --- |

    | `max_depth` | 当为`NULL`时，收集所有调用深度级别的函数的性能分析信息。当提供非`NULL`值时，收集到指定调用深度级别的所有函数的性能分析信息。在深度大于指定级别的函数中所花费的时间，会计入其祖先函数。
    |

    | `profile_uga` | 意为分析会话内存使用情况（未文档化，仅供内部使用）。 |

    | `profile_pga` | 意为分析进程内存使用情况（未文档化，仅供内部使用）。 |

    | `sqlmonitor` | 当为`TRUE`时，分析器运行结束时会生成一份实时监控报告。 |

    | `run_comment` | 意为此次性能分析数据收集运行的任意注释。 |


    收集的数据存储在`DBMSHP_TRACE_DATA`表中（见表[10-2](#536316_1_En_10_Chapter.xhtml#Tab2)）。


    **表 10-2**


    **DBMSHP_TRACE_DATA**


    | 名称 | 类型 | 可空 |

    | --- | --- | --- |

    | `trace_id` | `NUMBER` |  |

    | `Rawdata` | `CLOB` | y |

    | `Sqlmonitor` | `CLOB` | y |

    | `trace_timestamp` | `TIMESTAMP(6)` | y |

    | `run_comment` | `VARCHAR2(2047)` | y |


    当数据生成并存储在此表中时，会使用同样被创建的`dbmshp_tracenumber`序列生成一个唯一的`trace_id`。此`trace_id`由函数返回。


    现在告诉Oracle数据库开始分析。将`trace_id`检索到一个本地变量中供后续使用。为性能分析添加一个注释是个好主意，这样以后可以轻松找到它。


    ```

    l_trace_id := dbms_hprof.start_profiling( run_comment => ''HProf Demo'' );

    ```


    接下来是对要追踪的程序的调用。


    ```

    f1info.show_season(2022);

    ```


    ### stop_profiling


    一旦程序执行完毕，就告诉Oracle数据库结束你的性能分析会话。


    ```

    dbms_hprof.stop_profiling;

    ```


    所有收集的数据都会被刷新到`dbmshp_trace_data`表中。你也可以调用`stop_profiling`函数，它会将性能分析结果返回到一个CLOB变量中。


    ```

    function stop_profiling return clob;

    ```


    该CLOB包含一个类似如下的文本文档。


    ```

    P#V PLSHPROF Internal Version 1.0

    P#! PL/SQL Timer Started

    P#C SQL."SYS"."DBMS_HPROF"::11."__static_sql_exec_line700" #700."8ggw94h7mvxd7"

    P#! COMMIT

    P#X 100

    P#R

    P#C PLSQL."BOOK"."F1INFO"::11."SHOW_SEASON"#e17d780a3c3eae3d #58

    P#X 22

    P#C SQL."BOOK"."F1INFO"::11."__sql_fetch_line62" #62."dajrzh30ttucf"

    P#! SELECT DISTINCT RES.CONSTRUCTORID FROM F1DATA.RESU

    P#X 84115

    P#R

    >

    ```


    表[10-3](#536316_1_En_10_Chapter.xhtml#Tab3)展示了对前缀的解释。


    **表 10-3**


    **文档中的前缀**


    | 前缀 | 含义 |

    | --- | --- |

    | `P#V` | 带版本号的PLSHPROF标识 |

    | `P#C` | 对子程序的调用（调用事件） |

    | `P#R` | 从子程序返回 |

    | `P#X` | 前一个事件与后一个事件之间经过的时间 |

    | `P#!` | 注释 |


    与其自己审阅和分析文档，你可以调用`analyze`过程或函数。


    ### analyze


    `analyze`过程（也有一个重载的同名函数）分析性能分析器数据表中的数据，并生成一个包含性能分析器报告的HTML文档，或者生成一组表中的行，以便你构建自己的报告。


    ```

    procedure analyze

    (

    trace_id    number

    , report_clob out clob

    , trace       varchar2 default null

    , skip        pls_integer default 0

    , collect     pls_integer default null

    , profile_uga boolean default null

    , profile_pga boolean default null

    );

    ```


    `analyze`过程接受表[10-4](#536316_1_En_10_Chapter.xhtml#Tab4)中描述的参数，并通过其`out`参数返回一个CLOB。


    **表 10-4**


    **分析过程参数**


    | 参数 | 必填 | 描述 |

    | --- | --- | --- |

    | `trace_id` | Y | 性能分析器数据表（`dbmshp_data`）中的`traceid`条目 |

    | `report_clob` | Y | 分析得到的HTML报告，以CLOB形式输出（输出） |

    | `Trace` |  | 当为`NULL`（默认）时，为整个运行生成分析/报告。仅为以指定“`trace`”条目为根的子树进行分析。必须以限定格式指定；例如，“BOOK”.”F1INFO”.”SHOW_DRIVER”（如果过程或函数被重载，则分析所有重载版本。）
    |

    | `Skip` |  | 仅在指定了“`trace`”时使用。跳过对“`trace`”的前“`skip`”次调用。默认值为0。 |

    | `Collect` |  | 仅在指定了“`trace`”时使用。分析“`collect`”次对“`trace`”的调用（从第“`skip`”+1次调用开始）。默认只分析1次调用。
    |

    | `profile_uga` |  | 报告UGA使用情况。 |

    | `profile_pga` |  | 报告PGA使用情况。 |


    ```

    function analyze

    (

    trace_id     number

    , summary_mode boolean default false

    , trace        varchar2 default null

    , skip         pls_integer default 0

    , collect      pls_integer default null

    , run_comment  varchar2 default null

    , profile_uga  boolean default null

    , profile_pga  boolean default null

    ) return number;

    ```


    `analyze`函数返回`runnumber`，这是它在不同表中生成的行的键。该函数接受表[10-5](#536316_1_En_10_Chapter.xhtml#Tab5)中描述的参数。


    **表 10-5**


    **分析函数参数**


    | 参数 | 必填 | 描述 |

    | --- | --- | --- |

    | `trace_id` | Y | 性能分析器数据表（`dbmshp_data`）中的`traceid`条目 |

    | `summary_mode` |  | 当为`FALSE`（默认）时，进行完整分析。当为`TRUE`时，只生成顶层摘要。 |

    | `Trace` |  | 当为`NULL`（默认）时，为整个运行生成分析/报告。仅为以指定“`trace`”条目为根的子树进行分析。必须以限定格式指定；例如，“BOOK”.”F1INFO”.”SHOW_DRIVER”（如果过程或函数被重载，则分析所有重载版本。）
    |

    | `Skip` |  | 仅在指定了“`trace`”时使用。跳过对“`trace`”的前“`skip`”次调用。默认值为0。 |

    | `collect` |  | 仅在指定了“`trace`”时使用。分析“`collect`”次对“`trace`”的调用（从第“`skip`”+1次调用开始）。默认分析1次调用。
    |

    | `run_comment` |  | 分析运行的任意注释。 |

    | `profile_uga` |  | 报告UGA使用情况。 |

    | `profile_pga` |  | 报告PGA使用情况。 |


    `analyze`函数使用以下三个表（均使用`dbms_hprof.create_tables`过程创建）。


    *   `dbmshp_runs`

    *   `dbmshp_function_info`

    *   `dbmshp_parent_child_info`


    对于每条已被分析的追踪记录，会在`dbmshp_runs`表中添加一条记录（见表[10-6](#536316_1_En_10_Chapter.xhtml#Tab6)）。


    **表 10-6**


    **dbmshp_runs**


    | 名称 | 类型 | 可空 |

    | --- | --- | --- |

    | `Runid` | `NUMBER` |  |

    | `run_timestamp` | `TIMESTAMP(6)` | y |

    | `total_elapsed_time` | `INTEGER` | y |

    | `run_comment` | `VARCHAR2(2047)` | y |

    | `trace_id` | `NUMBER` | y |


    每个过程、函数和SQL语句都会在`dbmshp_function_info`表中获得一行，使用与`dbmshp_runs`表中记录相同的运行ID（见表[10-7](#536316_1_En_10_Chapter.xhtml#Tab7)）。


    **表 10-7**


    **dbmshp_function_info**'
  raw: '### start_profiling


    To begin your profiling session, you call the `start_profiling` function.


    ```

    function start_profiling( max_depth   PLS_INTEGER DEFAULT NULL

    , profile_uga BOOLEAN     DEFAULT NULL

    , profile_pga BOOLEAN     DEFAULT NULL

    , sqlmonitor  BOOLEAN     DEFAULT TRUE

    , run_comment VARCHAR2    DEFAULT NULL

    ) return number;

    ```


    Table [10-1](#536316_1_En_10_Chapter.xhtml#Tab1) explains the meaning of the parameters.


    Table 10-1


    dbms_hprof.start_profiling Function Parameters


    | Parameter | Description |

    | --- | --- |

    | max_depth | When NULL, profile information is gathered for all functions in
    all call level depths.When a non-NULL value is provided, profile information is
    gathered for all functions up to the specified call level depth. The time spent
    in functions with a call level depth greater than the supplied level is charged
    to the ancestor function. |

    | profile_uga | This means profile session memory usage (undocumented, for internal
    use only). |

    | profile_pga | This means profile process memory usage (undocumented, for internal
    use only). |

    | sqlmonitor | When TRUE, a Real-Time monitoring report is generated at the end
    of the profiler run. |

    | run_comment | This means an arbitrary comment for this profiler data collection
    run. |


    The data collected is stored in the `DBMSHP_TRACE_DATA` table (see Table [10-2](#536316_1_En_10_Chapter.xhtml#Tab2)).


    Table 10-2


    DBMSHP_TRACE_DATA


    | Name | Type | Nullable |

    | --- | --- | --- |

    | trace_id | NUMBER |   |

    | Rawdata | CLOB | y |

    | Sqlmonitor | CLOB | y |

    | trace_timestamp | TIMESTAMP(6) | y |

    | run_comment | VARCHAR2(2047) | y |


    When the data gets generated and stored in this table a unique `trace_id` is generated
    using the `dbmshp_tracenumber` sequence that is also created. This `trace_id`
    is returned by the function.


    Now tell the Oracle database to start profiling. Retrieve `trace_id` in a local
    variable for later use. It is a good idea to give the profile a comment, so you
    can later easily find it.


    ```

    l_trace_id := dbms_hprof.start_profiling( run_comment => ''HProf Demo'' );

    ```


    Next is the call to the program you want to trace.


    ```

    f1info.show_season(2022);

    ```


    ### stop_profiling


    And as soon as the program is done, you tell the Oracle database to end your profiling
    session.


    ```

    dbms_hprof.stop_profiling;

    ```


    All data collected is flushed in the `dbmshp_trace_data` table. You can also call
    the `stop_profiling` function, which returns the profile in a CLOB variable.


    ```

    function stop_profiling return clob;

    ```


    The CLOB contains a text document that looks like the following.


    ```

    P#V PLSHPROF Internal Version 1.0

    P#! PL/SQL Timer Started

    P#C SQL."SYS"."DBMS_HPROF"::11."__static_sql_exec_line700" #700."8ggw94h7mvxd7"

    P#! COMMIT

    P#X 100

    P#R

