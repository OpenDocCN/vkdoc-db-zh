    \    ( json_query\n        ( l_drivers\n        , '$.MRData.DriverTable.Drivers[*].champion'\n\
    \          returning varchar2\n          with conditional array wrapper\n    \
    \    )\n    );\nend;\n/\n```\n\n> **注意**\n> 请注意从 SQL/JSON 函数返回的数据类型。如果不使用项方法函数（如\
    \ `string()`、`number()`）或指定数据类型的 `returning` 子句，当使用 Oracle Database 21c 或更高版本时，它们返回\
    \ JSON；否则返回 `VARCHAR2(4000)`。"
  raw: 'After converting it to a JSON object, the individual attributes can be retrieved
    using the `get_string`, `get_number`, `get_date,` and similar method functions.
    The following example shows how to get the value of a specific key in the JSON
    object.


    ```

    declare

    l_f1data clob := '''';

    l_drivers_array json_array_t;

    l_driver json_object_t;

    begin

    l_drivers_array := json_object_t.parse (l_f1data)

    .get_object (''MRData'')

    .get_object (''DriverTable'')

    .get_array  (''Drivers'');

    for i in 0 .. l_drivers_array.get_size -1

    loop

    l_driver := treat (l_drivers_array.get (i)

    as json_object_t);

    sys.dbms_output.put_line (l_driver.get_string (''driverId''));

    sys.dbms_output.put_line (l_driver.get_string (''code''));

    sys.dbms_output.put_line (l_driver.get_date (''dateOfBirth''));

    end loop;

    end;

    /

    coulthard

    COU

    27-MAR-71

    vettel

    VET

    03-JUL-87

    ```


    Instead of getting the values of the attributes by looking up each key in the
    JSON document, it is also possible to get it more generically.


    The `get_keys` method function returns a varray of VARCHAR2, best stored in a
    variable of type `json_key_list`. In the following example, `get_keys` is used
    to extract the attribute names and the related values.


    ```

    declare

    l_f1data clob := '''';

    l_drivers_array json_array_t;

    l_driver json_object_t;

    l_driver_keys json_key_list;

    begin

    l_drivers_array := json_object_t.parse (l_f1data)

    .get_object (''MRData'')

    .get_object (''DriverTable'')

    .get_array  (''Drivers'');

    for i in 0 .. l_drivers_array.get_size -1

    loop

    l_driver := treat (l_drivers_array.get (i)

    as json_object_t);

    l_driver_keys := l_driver.get_keys;

    for key_idx in 1 .. l_driver_keys.count

    loop

    sys.dbms_output.put_line (

    l_driver_keys (key_idx)||'' : ''||

    l_driver.get_string (l_driver_keys (key_idx))

    );

    end loop;

    end loop;

    end;

    /

    driverId : coulthard

    code : COU

    givenName : David

    familyName : Coulthard

    dateOfBirth : 1971-03-27

    nationality : British

    champion : false

    nickname : DC

    driverId : vettel

    permanentNumber : 5

    code : VET

    givenName : Sebastian

    familyName : Vettel

    dateOfBirth : 1987-07-03

    nationality : German

    champion : true

    nickname :

    Constructors :

    ```


    In the preceding output, the Constructors attributes don’t show a value associated
    with it. When looking closer at this attribute in the sample JSON, the value is
    an array of objects. To make these values visible as well, a similar nested loop
    construction can be created; one loop to get the objects and one to get the key-value
    pairs from the object.


    ```

    l_constructor_array := l_driver.get_array (

    l_driver_keys (key_idx));

    for ci in 0 .. l_constructor_array.get_size -1

    loop

    l_constructor := treat (l_constructor_array.get (ci)

    as json_object_t);

    l_constructor_keys := l_constructor.get_keys;

    for constructor_idx in 1 .. l_constructor_keys.count

    loop

    sys.dbms_output.put_line (

    l_constructor.get_string (

    l_constructor_keys (constructor_idx))

    );

    end loop;

    end loop;

    ```


    You can determine which JSON data type is encountered using the `get_type` method
    function.


    The following code makes the sample JSON visible with `dbms_output`. The output
    is omitted for brevity.


    ```

    declare

    l_f1data clob := '''';

    l_drivers_array json_array_t;

    l_driver        json_object_t;

    l_driver_keys.  json_key_list;

    l_constructor_array json_array_t;

    l_constructor_keys  json_key_list;

    l_constructor       json_object_t;

    begin

    l_drivers_array := json_object_t.parse (l_f1data)

    .get_object (''MRData'')

    .get_object (''DriverTable'')

    .get_array  (''Drivers'');

    for i in 0 .. l_drivers_array.get_size -1

    loop

    l_driver := treat (l_drivers_array.get (i)

    as json_object_t);

    l_driver_keys := l_driver.get_keys;

    for key_idx in 1 .. l_driver_keys.count

    loop

    case l_driver.get_type (l_driver_keys (key_idx))

    when ''SCALAR''

    then

    sys.dbms_output.put_line (

    l_driver_keys (key_idx)||'' : ''||

    l_driver.get_string (l_driver_keys (key_idx)));

    when ''ARRAY''

    then

    l_constructor_array := l_driver.get_array (

    l_driver_keys (key_idx));

    for ci in 0 .. l_constructor_array.get_size -1

    loop

    l_constructor := treat (l_constructor_array.get (ci)

    as json_object_t);

    l_constructor_keys := l_constructor.get_keys;

    for constructor_idx in 1 .. l_constructor_keys.count

    loop

    sys.dbms_output.put_line (

    l_constructor.get_string (

    l_constructor_keys (constructor_idx))

    );

    end loop;

    end loop;

    end case;

    end loop;

    end loop;

    end;

    ```


    Using the SQL/JSON functions, like `json_value` and `json_query`, is also possible
    in PL/SQL code. Because there *is* a boolean data type in PL/SQL, it can be mapped
    from JSON directly. The following example shows the usage of `json_value` and
    `json_query` in PL/SQL.


    ```

    declare

    l_f1data clob := '''';

    l_boolean boolean;

    begin

    l_boolean := json_value

    ( l_drivers

    ,''$.MRData.DriverTable.Drivers[1].champion''

    returning boolean

    );

    sys.dbms_output.put_line

    ( json_value

    ( l_drivers

    , ''$.MRData.DriverTable.Drivers[1].givenName''

    returning varchar2

    )

    );

    sys.dbms_output.put_line

    ( json_query

    ( l_drivers

    , ''$.MRData.DriverTable.Drivers[*].champion''

    returning varchar2

    with conditional array wrapper

    )

    );

    end;

    /

    ```


    Caution


    Pay attention to the data type returned from the SQL/JSON functions. Without the
    usage of item method functions (like `string()`, `number()`) or the `returning`
    clause that specifies the data type, they return JSON when using Oracle Database
    21c or higher; VARCHAR2(4000) otherwise.'
