  trans: "\n# DBMS_DB_VERSION 包\n\nOracle 提供了一个包，其中包含一个用于当前 RDBMS 版本号的常量和一个用于当前发行号的常量。该包的名称为\
    \ `DBMS_DB_VERSION`。它还包含一组布尔值，可用于确定当前版本。代码清单 6-1 显示了随 Oracle Database 21c 提供的当前\
    \ `DBMS_DB_VERSION` 包。\n\n```sql\npackage sys.dbms_db_version is\nversion constant\
    \ pls_integer :=\n21; -- RDBMS 版本号\nrelease constant pls_integer := 0;  -- RDBMS\
    \ 发行号\n/* 以下的布尔常量遵循一种命名约定。\n   每个常量为一个布尔表达式命名。\n   例如，\n   ver_le_9_1  表示 version\
    \ <=  9 且 release <= 1\n   ver_le_10_2 表示 version <= 10 且 release <= 2\n   ver_le_10\
    \   表示 version <= 10\n   引用这些布尔常量（而不是直接引用 version 和 release）的代码，\n   将随着 version\
    \ 和 release 值的变化而受益于细粒度失效。\n   这些布尔常量的典型用法是：\n   $if dbms_db_version.ver_le_10\
    \ $then\n   version 10 及更早版本的代码\n   $elsif dbms_db_version.ver_le_11 $then\n \
    \  version 11 代码\n   $else\n   version 12 及之后版本的代码\n   $end\n   这种代码结构将保护对 version\
    \ 12 代码的任何引用。\n   它还防止在 version 10 下编译程序时，引用控制包常量 dbms_db_version.ver_le_11。\n\
    \   对 version 11 的观察也类似。\n   即使在 version 10 数据库中未定义静态常量 ver_le_11，此方案也有效，\n  \
    \ 因为如果 dbms_db_version.ver_le_10 为 TRUE，条件编译会保护 $elsif 子句不被求值。\n*/\n/* 弃用针对不支持版本的布尔常量\
    \ */\nver_le_9_1    constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_9_1);\n\
    ver_le_9_2    constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_9_2);\nver_le_9\
    \      constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_9);\nver_le_10_1  \
    \ constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_10_1);\nver_le_10_2   constant\
    \ boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_10_2);\nver_le_10     constant boolean\
    \ := FALSE;\nPRAGMA DEPRECATE(ver_le_10);\nver_le_11_1   constant boolean := FALSE;\n\
    PRAGMA DEPRECATE(ver_le_11_1);\nver_le_11_2   constant boolean := FALSE;\nver_le_11\
    \     constant boolean := FALSE;\nver_le_12_1   constant boolean := FALSE;\nver_le_12_2\
    \   constant boolean := FALSE;\nver_le_12     constant boolean := FALSE;\nver_le_18\
    \     constant boolean := FALSE;\nver_le_19     constant boolean := FALSE;\nver_le_20\
    \     constant boolean := FALSE;\nver_le_21     constant boolean := TRUE;\nend\
    \ dbms_db_version;\n代码清单 6-1\n21c 版本的 DBMS_DB_VERSION 包\n```\n\n在所有较低版本的数据库中，这些标志均为\
    \ `FALSE`。只有当前版本被设置为 `TRUE`。\n\n如果您使用 `DBMS_DB_VERSION` 常量，请从可用的最低版本号开始查询。如果某个查询指令求值为\
    \ true，则 `$then` 块中的代码将被包含，而其余代码将被忽略，因此不会被包含。由于此代码不再被求值，因此该块是否引用对象（例如包中不存在的常量）并不重要。\n\
    \n如果您的应用程序当前运行在 Oracle 12c 实例上，您的条件编译块应开始查询版本是否为 12（或更早）。\n\n```sql\n$if dbms_db_version.ver_le_12\
    \ $then\ndbms_output.put_line( '这将运行 12c 代码。' );\n```\n\n如果您希望程序包含多个版本的代码，以使用每个数据库版本中可用的最佳功能，请使用\
    \ `$elsif` 指令来处理多个查询指令，类似于 case 语句。\n\n```sql\n$elsif dbms_db_version.ver_le_18\
    \ $then\ndbms_output.put_line( '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19\
    \ $then\ndbms_output.put_line( '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_20\
    \ $then\ndbms_output.put_line( '这将运行 20c 代码。' );\n$elsif dbms_db_version.ver_le_21\
    \ $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n```\n\n如果所有查询指令都不为 true，则包含一个捕获所有情况的\
    \ `$else` 指令。\n\n```sql\n$else\ndbms_output.put_line( '此版本不受支持' );\n```\n\n代码清单\
    \ 6-2 显示了完整的脚本。\n\n```sql\nbegin\n$if dbms_db_version.ver_le_12 $then\ndbms_output.put_line(\
    \ '这将运行 12c 代码。' );\n$elsif dbms_db_version.ver_le_18 $then\ndbms_output.put_line(\
    \ '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19 $then\ndbms_output.put_line(\
    \ '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_20 $then\ndbms_output.put_line(\
    \ '这将运行 20c 代码。' );\n$elsif dbms_db_version.ver_le_21 $then\ndbms_output.put_line(\
    \ '这将运行 21c 代码。' );\n$else\ndbms_output.put_line( '此版本不受支持' );\n$end\nend;\n代码清单\
    \ 6-2\n正在运行哪个版本？\n```\n\n如果您构建一个包含多个条件的块（即类 case 语句），请确保包含所有可能的标志，以便您的代码能在每个版本的数据库上编译。\n\
    \n以下代码无法在 Oracle 20c 实例上编译，因为尽管 `ver_le_21` 表示“版本小于或等于 21”，但该变量在 Oracle 20c 数据库的\
    \ `DBMS_DB_VERSION` 包中并未声明。因此，编译会抛出错误。\n\n```sql\nbegin\n$if dbms_db_version.ver_le_12\
    \ $then\ndbms_output.put_line( '这将运行 12c 代码。' );\n$elsif dbms_db_version.ver_le_18\
    \ $then\ndbms_output.put_line( '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19\
    \ $then\ndbms_output.put_line( '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_21\
    \ $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n$else\ndbms_output.put_line(\
    \ '此版本不受支持' );\n$end\nend;\n```\n\n此外，条件编译不进行短路求值，因此请确保不要在一个语句中混合多个可能非法的条件。\n\n\
    ```sql\nbegin\n$if dbms_db_version.ver_le_12\nor dbms_db_version.ver_le_18\nor\
    \ dbms_db_version.ver_le_19 $then\ndbms_output.put_line( '这将运行 20c 之前的代码。' );\n\
    $elsif dbms_db_version.ver_le_20 $then\ndbms_output.put_line( '这将运行 20c 代码。' );\n\
    $elsif dbms_db_version.ver_le_21 $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n\
    $else\ndbms_output.put_line( '此版本不受支持' );\n$end\nend;\n```\n\n例如，此代码无法在 Oracle\
    \ 12c 实例上编译。同样，`DBMS_DB_VERSION.VER_LE_18` 和 `DBMS_DB_VERSION.VER_LE_19` 常量根本还不存在。\n\
    \n## 预定义的 CCFLAGS\n\n对于任何程序单元，都自动定义了一些 `CCFLAGS`。这些标志作为选择指令中的查询指令可能不是很有用，但它们可以提供有关程序的有用信息。例如，在对代码进行插桩时，了解操作发生的行号可能会很有帮助。表\
    \ 6-1 显示了预定义 `CCFLAGS` 的列表。\n\n**表 6-1 预定义的 CCFLAGS**\n\n| 标志 | 描述 |\n| --- |\
    \ --- |\n| `$$PLSQL_LINE` | 一个 `PLS_INTEGER` 字面量，其值为该指令在当前 PL/SQL 单元中出现的源代码行号。\
    \ |\n| `$$PLSQL_UNIT` | 一个 `VARCHAR2` 字面量，包含当前 PL/SQL 单元的名称。如果当前 PL/SQL 单元是匿名块，则\
    \ `$$PLSQL_UNIT` 包含 `NULL` 值。仅限顶级对象，不包括子程序。 |\n| `$$PLSQL_UNIT_OWNER` | 一个 `VARCHAR2`\
    \ 字面量，包含当前 PL/SQL 单元所有者的名称。如果当前 PL/SQL 单元是匿名块，则 `$$PLSQL_UNIT_OWNER` 包含 `NULL`\
    \ 值。 |\n| `$$PLSQL_UNIT_TYPE` | 一个 `VARCHAR2` 字面量，包含当前 PL/SQL 单元的类型——`ANONYMOUS\
    \ BLOCK`（匿名块）、`FUNCTION`（函数）、`PACKAGE`（包）、`PACKAGE BODY`（包体）、`PROCEDURE`（过程）、`TRIGGER`（触发器）、`TYPE`（类型）或\
    \ `TYPE BODY`（类型体）。在匿名块或非 DML 触发器内部，`$$PLSQL_UNIT_TYPE` 的值为 `ANONYMOUS BLOCK`。\
    \ |\n"
- fmt: '# Conditional Compilation Directives


    ## Error Directive


    To stop compilation completely, for instance, because certain conditions aren’t
    met, you use the `error` directive. The `error` directive consists of this building
    block.


    ```sql

    $error ''error message'' $end

    ```


    As soon as this code is included in the compiled program, it remains in an invalid
    state. Listing 6-3 shows a package that cannot compile.


    ```sql

    create or replace package willnotcompile as

    the_answer constant number := 42;

    $error ''This package should not be compiled'' $end

    wear_towel constant boolean := true;

    end willnotcompile;

    ```


    This code will not compile successfully.


    The code in Listing 6-3 results in a compilation failure.


    ```sql

    Warning: Package created with compilation errors

    Errors for PACKAGE BOOK.CCWILLNOTCOMPILE:

    LINE/COL ERROR

    -------- ------------------------------------------------------

    3/3      PLS-00179: $ERROR: This package should not be compiled

    ```


    Compilation is terminated right after this directive. The rest of the code is
    not even parsed. Since the program is in an invalid state, you cannot reference
    anything from it, not even the constants that were defined before the error directive.


    ## DEPRECATE Pragma Directive


    If the `error` directive is too harsh since it prevents your code from being compiled
    completely, it might be a good idea to use the `DEPRECATE` pragma directive. This
    way, the code still compiles, but there is a warning that this part of the code
    is deprecated and removed in a future version. The `DEPRECATE` pragma should follow
    directly after the declaration. If you add a pragma at any other position in your
    code, it raises a `plw-06021` warning. You can deprecate a procedure, a function,
    or a package. If you try to deprecate the package in the package body, the `plw-06022`
    warning is raised.


    Listing 6-4 shows some of the warnings that can be issued.


    ```sql

    create or replace package deprecatedwarnings is

    procedure deprecate_this_later;

    procedure deprecate_this_now;

    pragma deprecate( deprecate_this_now,

    ''This will raise PLW-6019, when this program is compiled'' );

    pragma deprecate( deprecate_this_later,

    ''This will raise PLW-6021, because this pragma is misplaced'' );

    procedure call_the_deprecated_procedure;

    end deprecatedwarnings;

    ```


    Deprecated warnings.


    The `plw-06020` exception is raised in the calling program. Warnings are raised
    at compile time if enabled using the following statement.


    ```sql

    alter session set plsql_warnings=''enable:(6019,6020,6021,6022)'';

    ```


    The warnings that can be issued are shown in Table 6-2.


    Table 6-2. Deprecated warnings


    | Warning | Meaning |

    | --- | --- |

    | 6019 | The entity was deprecated and could be removed in a future release. Do
    not use the deprecated entity. |

    | 6020 | The referenced entity was deprecated and could be removed in a future
    release. Do not use the deprecated entity. Follow the specific instructions in
    the warning if any are given. |

    | 6021 | Misplaced pragma. The `DEPRECATE` pragma should follow immediately after
    the declaration of the entity that is being deprecated. Place the pragma immediately
    after the declaration of the entity that is being deprecated. |

    | 6022 | This entity cannot be deprecated. Deprecation only applies to entities
    that may be declared in a package or type specification and to top-level procedure
    and function definitions. Remove the pragma. |


    To see the warnings issued, the compiler warnings must be enabled while compiling.


    ```sql

    alter session set plsql_warnings=''enable:(6019,6020,6021,6022)''

    ```


    Or you may want to enable all warnings.


    ```sql

    alter session set plsql_warnings=''enable:all''

    ```


    This can also be set when compiling a specific object.


    ```sql

    alter package deprecatedwarnings compile

    plsql_warnings = ''enable:(6019,6020,6021,6022)''

    ```


    ## Using Directives


    A conditional compilation block generally starts with a `$if` selection directive.


    ```sql

    $if dbms_db_version.version <= 19 $then

    ```


    If this evaluates to true, the code following the `$then` directive is included.
    All the code until the next directive is found.


    ```sql

    dbms_output.put_line( ''pre Oracle 19c code'' );

    ```


    If you want to include a different part of the code, include a `$else` directive
    with a different block of code.


    ```sql

    $else

    dbms_output.put_line( ''post Oracle 19c code'' );

    ```


    A conditional compilation block ends with a `$end` directive.


    Listing 6-5 shows the complete script.


    ```sql

    begin

    $if dbms_db_version.version <= 19 $then

    dbms_output.put_line( ''pre Oracle 19c code'' );

    $else

    dbms_output.put_line( ''post Oracle 19c code'' );

    $end

    end;

    ```


    Include code depending on the database version.


    You get the following output if you run this anonymous block on an Oracle 19c
    instance.


    ```sql

    pre Oracle 19c code

    ```


    You get the following output if you run the same anonymous block on an Oracle
    21c instance.


    ```sql

    post Oracle 19c code

    ```


    ## Use Cases


    There are countless situations in which conditional compilation can be useful.
    For example, you can use conditional compilation to prepare your application for
    new database versions, test private programs, check whether the database is for
    development, test, or production, check the compiler optimization level, and include
    or exclude code depending on the environment. And there are probably many more
    use cases you can think of.


    ### Checking for the Presence of New Features


    If you have access to a sandbox database, for instance, a free tier, you probably
    know about new features you want to use in your application. However, you can’t
    implement them because your production environment is still running an older version
    of the database. In this case, you have (at least) two options.


    *   You note the feature, where you want to use it, and where you can find the
    documentation, so you can start developing your new solution when your production
    environment is upgraded to the newer version. Now, you must remember that you
    want to use this feature when the database is upgraded.


    *   You can implement the new solution in your current codebase and ‘hide’ this
    code from the older database using conditional compilation.


    Let’s look at a simple example. Oracle 21c comes with a simpler implementation
    of a stepped iterator. First, check the version of the instance you are compiling
    the program for.


    ```sql

    $if dbms_db_version.version >= 21 $then

    ```


    You can use the new iterator construct if running at least version 21 of the database.


    ```sql

    -- code using the iterators available from 21c

    for n in 2 .. 10 by 2 loop

    dbms_output.put_line(n);

    end loop;

    ```


    If you are running an older version, you must revert to the construction that
    has been available since Oracle 7.


    ```sql

    -- code using the iterators as available before 21c

    for n in 2 .. 10 loop

    if mod(n, 2) = 0 then

    dbms_output.put_line(n);

    end if;

    end loop;

    ```


    The complete script can be found in Listing 6-6.


    ```sql

    begin

    $if dbms_db_version.version >= 21 $then

    -- code using the iterators available from 21c

    for n in 2 .. 10 by 2 loop

    dbms_output.put_line(n);

    end loop;

    $else

    -- code using the iterators as available before 21c

    for n in 2 .. 10 loop

    if mod(n, 2) = 0 then

    dbms_output.put_line(n);

    end if;

    end loop;

    $end

    end;

    ```


    Use the new iterator if available.'
