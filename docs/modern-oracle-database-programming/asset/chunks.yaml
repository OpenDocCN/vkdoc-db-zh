- fmt: '# SQL窗口函数：lag、lead与排名分析


    ## 引言


    默认情况下，`lag`函数访问前一行的值。偏移量为一行。`lead`函数同样如此，偏移量为一行，但它检索当前行之后一行的值。这两个函数都可以接受第二个参数来更改行偏移量。当需要回看两行时，可以使用以下语句。


    ```sql

    lag (ltm.milliseconds, 2)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    前面结果集中的第一行在`diff`列没有值，这是可以解释的，因为没有前一行。该函数超出了窗口的范围。默认情况下，当出现这种情况时，返回值是`NULL`。第三个参数可以覆盖此行为；这样，就可以区分`NULL`值（指向前一行值为`NULL`的行）和分析函数指向窗口外行的情况。可以通过以下表达式修改前面的示例，通过将默认值设置为第一圈的圈速，在diff列中显示适当的值。


    ```sql

    lag (ltm.milliseconds, 1, ltm.milliseconds)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    这将产生以下结果。


    ```

    LAP MILLISECONDS       DIFF

    ---------- ------------ ----------

    1       100236          0

    2        97880      -2356

    3        98357        477

    4        98566        209

    ```


    ## 最快圈速与最慢圈速


    与聚合函数不同，分析函数不会减少行数。同时显示所有圈速并标记最快和最慢的圈速，使用分析函数很容易做到，无需自连接。最快的圈速是圈速最低的那一圈，这需要`min`函数，而最慢的圈速需要`max`函数。


    以下示例使用`case`表达式将当前行的圈速与整体最快圈速进行比较。当圈速匹配时，显示单词 *F A S T*。对最慢圈速也做了类似处理。


    由于结果集对比赛（巴林大奖赛）和车手（夏尔·勒克莱尔）进行了筛选，因此在分析函数中无需使用分区子句。


    ```sql

    select ltm.lap

    , ltm.milliseconds

    , case

    when min (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''F A S T''

    end as fastest

    , case

    when max (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''S L O W''

    end as slowest

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    ltm.driverid = 844 -- Charles Leclerc

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    /

    LAP MILLISECONDS FASTEST SLOWEST

    ---------- ------------ ------- -------

    1        99070

    2        97853

    3        98272

    4        98414

    5        98471

    6        98712

    7        98835


    46       125151

    47       163846         S L O W

    48       151364

    49       146221

    50       144429

    51        94570 F A S T

    52        95027

    53        95127


    ```


    ## 排名：Top-N


    谈论比赛数据离不开排名，因为每场比赛都以前三名登上领奖台结束。三种不同的分析函数处理排名，其差异很细微。对相等值的处理方式不同。


    有三种排名函数：


    *   `rank`表示相等的值被分配相同的排名。下一个排名会跳过相等值的数量，这会导致非连续的排名。这种排名被称为 *Olympic ranking*。


    *   `dense_rank`表示相等的值被分配相同的排名。下一个排名不会跳过数值；它创建连续的排名。


    *   `row_number`忽略重复值，其工作方式类似于`rownum`，创建连续的排名。


    在该示例中，对每位车手的总积分（不考虑赛季或比赛）进行排名。`DRIVERSTANDINGS`表包含车手累积的所有积分。行按`DRIVERID`分区，并按积分降序排序。结果仅显示了积分为190分的塞尔吉奥·佩雷斯。


    `rank()`分析函数（下面结果集中的rk列）将前三行排名为1，而第四行的值为4。`dense_rank()`函数（dr列）也将前三行的值分配为1，而第四行的值为2。最后，`row_number()`函数（rn列）为每一行分配任意值。


    ```sql

    select drv.forename ||'' ''|| drv.surname as driver

    , drs.points

    , rank () over win rk

    , dense_rank () over win dr

    , row_number() over win rn

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    where  drv.driverid  = 815

    window win as (partition by drv.driverid

    order by drs.points desc)

    /

    DRIVER              POINTS         RK         DR         RN

    --------------- ---------- ---------- ---------- ----------

    Sergio Pérez           190          1          1          1

    Sergio Pérez           190          1          1          2

    Sergio Pérez           190          1          1          3

    Sergio Pérez           178          4          2          4

    Sergio Pérez           165          5          3          5

    ```


    ## 数据去重


    当需要对数据进行去重时，`row_number()`排名函数非常有用。在以下示例中，基于`DRIVERS`表创建了一个新表`DUP_DRIVERS`，并且其中的数据被复制了。


    ```sql

    create table dup_drivers

    as

    select *

    from f1data.drivers

    /

    insert into dup_drivers

    select *

    from dup_drivers

    /

    commit

    /

    ```


    目前，此表中有超过1700名车手。


    ```sql

    select count(*)

    from dup_drivers

    /

    COUNT(*)


    ```


    使用`row_number()`排名函数进行去重的思路是：基于重复值（如`driverid`）创建分区，为该分区中的每一行分配一个任意的排名，并删除所有排名大于1的记录。


    第一步，数据集按`driverid`分区，并使用`row_number()`为每一行分配排名（仅显示八行）。在这种情况下，分区内行的顺序并不重要。分析函数中的排序反映了这一点（`order
    by null`）。


    ```sql

    select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only

    /

    RID                DRIVER                  RN

    ------------------ --------------- ----------

    AAAYwqAAAAABAB7AAA Lewis Hamilton           1

    AAAYwqAAAAABAEHAAA Lewis Hamilton           2

    AAAYwqAAAAABAB7AAB Nick Heidfeld            1

    AAAYwqAAAAABAEHAAB Nick Heidfeld            2

    AAAYwqAAAAABAB7AAC Nico Rosberg             1

    AAAYwqAAAAABAEHAAC Nico Rosberg             2

    AAAYwqAAAAABAB7AAD Fernando Alonso          1

    AAAYwqAAAAABAEHAAD Fernando Alonso          2

    8 rows selected.

    ```


    下一步是过滤掉所有排名大于1的记录。因为分析函数不能在最终谓词（where子句）中使用，所以需要将前面的查询推入到一个内联视图中。


    ```sql

    select rid

    , driver

    from   (select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only)

    where  rn > 1

    /

    RID                DRIVER

    ------------------ ---------------

    AAAYwqAAAAABAEHAAA Lewis Hamilton

    AAAYwqAAAAABAEHAAB Nick Heidfeld

    AAAYwqAAAAABAEHAAC Nico Rosberg

    AAAYwqAAAAABAEHAAD Fernando Alonso

    ```


    最后一步是从表中删除这些行。查询中移除了对前八行的限制。


    ```sql

    delete

    from   dup_drivers

    where  rowid in (

    select rid

    from   (select rowid as rid

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers)

    where  rn > 1)

    /

    854 rows deleted.

    ```'
  raw: 'By default, the `lag` function accesses the value from the previous row. The
    offset is one row. The same is true for the `lead` function, the offset is one
    row, but it retrieves the value from the row following the current row. Both functions
    can take a second argument to change the row offset. When it is needed to look
    back two rows, the following statement can be used.


    ```

    lag (ltm.milliseconds, 2)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    The first row in the preceding result set has no value for the `diff` column,
    which is explainable because there is no previous row. The function goes beyond
    the scope of the window. By default, the returned value is NULL when this is the
    case. A third argument can overrule this; this way, it is possible to distinguish
    between NULL values (point to a previous row where the value is NULL) and when
    the analytic function points to a row outside the window. The previous example
    could be amended to show an appropriate value in the diff column with the following
    expression by setting the default value to the lap time of the first lap.


    ```

    lag (ltm.milliseconds, 1, ltm.milliseconds)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    This would then give the following results.


    ```

    LAP MILLISECONDS       DIFF

    ---------- ------------ ----------

    1       100236          0

    2        97880      -2356

    3        98357        477

    4        98566        209

    ```


    ## The Fastest Lap and the Slowest Lap


    Unlike aggregate functions, analytic functions do not reduce the number of rows.
    Showing all lap times and marking the fastest and slowest lap at the same time
    is trivial to do with analytic function without the need for a self-join. The
    fastest lap is the one where the lap time is the lowest, which calls for the `min`
    function, and the slowest lap calls for the `max` function.


    The following example uses a `case` expression to compare the lap time of the
    current row with the overall fastest lap. When the lap times match, the word *F
    A S T* is shown. Something similar is done for the slowest lap.


    Because the result set has a filter on the race (Bahrain Grand Prix) and the driver
    (Charles Leclerc), there is no need to use the partition clause in the analytic
    functions.


    ```

    select ltm.lap

    , ltm.milliseconds

    , case

    when min (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''F A S T''

    end as fastest

    , case

    when max (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''S L O W''

    end as slowest

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    ltm.driverid = 844 -- Charles Leclerc

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    /

    LAP MILLISECONDS FASTEST SLOWEST

    ---------- ------------ ------- -------

    1        99070

    2        97853

    3        98272

    4        98414

    5        98471

    6        98712

    7        98835


    46       125151

    47       163846         S L O W

    48       151364

    49       146221

    50       144429

    51        94570 F A S T

    52        95027

    53        95127


    ```


    ## Ranking: Top-N


    You cannot examine race data without talking about ranking, as each race ends
    with a podium for the first three. Three different analytic functions deal with
    ranking, and the differences are subtle. Dealing with equal values is resolved
    differently.


    There are three ranking functions.


    *   `rank` means equal values are assigned the same ranking. The next ranking
    skips the number of equal values, which causes a nonconsecutive ranking. This
    ranking is referred to as *Olympic ranking*.


    *   `dense_rank` means equal values are assigned the same ranking. The next ranking
    does not skip a value; it creates a consecutive ranking.


    *   `row_number` ignores duplicate values comparable to the workings of `rownum`
    creates a consecutive ranking.


    In the example, the total points per driver, regardless of season or race, are
    ranked. The `DRIVERSTANDINGS` table contains all points that a driver has accumulated.
    The rows are partitioned by `DRIVERID` and sorted by the points in descending
    order. The results are only shown for Sergio Pérez, who scored 190 points.


    The `rank()` analytic function (the rk column in the following result set) ranks
    the first three rows with 1, while the fourth row has a value of 4\. The `dense_rank()`
    function (dr column) also assigns a value of 1 for the first three rows, while
    the fourth row has a value of 2\. Lastly, the `row_number()` function (rn column)
    assigns arbitrary values to each row.


    ```

    select drv.forename ||'' ''|| drv.surname as driver

    , drs.points

    , rank () over win rk

    , dense_rank () over win dr

    , row_number() over win rn

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    where  drv.driverid  = 815

    window win as (partition by drv.driverid

    order by drs.points desc)

    /

    DRIVER              POINTS         RK         DR         RN

    --------------- ---------- ---------- ---------- ----------

    Sergio Pérez           190          1          1          1

    Sergio Pérez           190          1          1          2

    Sergio Pérez           190          1          1          3

    Sergio Pérez           178          4          2          4

    Sergio Pérez           165          5          3          5

    ```


    ## Deduplication


    The `row_number()` ranking function is very useful when data needs to be deduplicated.
    For the following example, a new table, `DUP_DRIVERS`, is created based on the
    `DRIVERS` table, and this data is duplicated.


    ```

    create table dup_drivers

    as

    select *

    from f1data.drivers

    /

    insert into dup_drivers

    select *

    from dup_drivers

    /

    commit

    /

    ```


    Currently, there are over 1700 drivers in this table.


    ```

    select count(*)

    from dup_drivers

    /

    COUNT(*)


    ```


    The idea behind deduplication with the `row_number()` ranking function is to create
    partitions based on duplicated values (like `driverid`), assign an arbitrary ranking
    to each row in that partition, and remove all records that have a ranking greater
    than one.


    For the first step, the data set is partitioned by `driverid` and `row_number()`
    is used to assign a ranking to each row (only eight rows are shown). In this case,
    the order of the rows within the partition is not important. The sorting within
    the analytic functions reflects that (`order by null`).


    ```

    select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only

    /

    RID                DRIVER                  RN

    ------------------ --------------- ----------

    AAAYwqAAAAABAB7AAA Lewis Hamilton           1

    AAAYwqAAAAABAEHAAA Lewis Hamilton           2

    AAAYwqAAAAABAB7AAB Nick Heidfeld            1

    AAAYwqAAAAABAEHAAB Nick Heidfeld            2

    AAAYwqAAAAABAB7AAC Nico Rosberg             1

    AAAYwqAAAAABAEHAAC Nico Rosberg             2

    AAAYwqAAAAABAB7AAD Fernando Alonso          1

    AAAYwqAAAAABAEHAAD Fernando Alonso          2

    8 rows selected.

    ```


    The next step is to filter out all records with a ranking greater than 1\. Because
    analytic functions can’t be used in the final predicate (the where clause), it
    is needed to push the preceding query into an inline view.


    ```

    select rid

    , driver

    from   (select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only)

    where  rn > 1

    /

    RID                DRIVER

    ------------------ ---------------

    AAAYwqAAAAABAEHAAA Lewis Hamilton

    AAAYwqAAAAABAEHAAB Nick Heidfeld

    AAAYwqAAAAABAEHAAC Nico Rosberg

    AAAYwqAAAAABAEHAAD Fernando Alonso

    ```


    The last step is to remove the rows from the table. The restriction on the first
    eight rows is removed from the query.


    ```

    delete

    from   dup_drivers

    where  rowid in (

    select rid

    from   (select rowid as rid

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers)

    where  rn > 1)

    /

    854 rows deleted.

    ```'
  trans: '# SQL 窗口函数：lag、lead 与排名分析


    ## 引言


    默认情况下，`lag`函数访问前一行的值。偏移量为一行。`lead`函数同样如此，偏移量为一行，但它检索当前行之后一行的值。这两个函数都可以接受第二个参数来更改行偏移量。当需要回看两行时，可以使用以下语句。


    ```sql

    lag (ltm.milliseconds, 2)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    前面结果集中的第一行在`diff`列没有值，这是可以解释的，因为没有前一行。该函数超出了窗口的范围。默认情况下，当出现这种情况时，返回值是`NULL`。第三个参数可以覆盖此行为；这样，就可以区分`NULL`值（指向前一行值为`NULL`的行）和分析函数指向窗口外行的情况。可以通过以下表达式修改前面的示例，通过将默认值设置为第一圈的圈速，在
    diff 列中显示适当的值。


    ```sql

    lag (ltm.milliseconds, 1, ltm.milliseconds)

    over (partition by ltm.driverid

    order by ltm.lap)

    ```


    这将产生以下结果。


    ```

    LAP MILLISECONDS       DIFF

    ---------- ------------ ----------

    1       100236          0

    2        97880      -2356

    3        98357        477

    4        98566        209

    ```


    ## 最快圈速与最慢圈速


    与聚合函数不同，分析函数不会减少行数。同时显示所有圈速并标记最快和最慢的圈速，使用分析函数很容易做到，无需自连接。最快的圈速是圈速最低的那一圈，这需要`min`函数，而最慢的圈速需要`max`函数。


    以下示例使用`case`表达式将当前行的圈速与整体最快圈速进行比较。当圈速匹配时，显示单词 *F A S T*。对最慢圈速也做了类似处理。


    由于结果集对比赛（巴林大奖赛）和车手（夏尔·勒克莱尔）进行了筛选，因此在分析函数中无需使用分区子句。


    ```sql

    select ltm.lap

    , ltm.milliseconds

    , case

    when min (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''F A S T''

    end as fastest

    , case

    when max (ltm.milliseconds) over ()

    = ltm.milliseconds

    then ''S L O W''

    end as slowest

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    ltm.driverid = 844 -- Charles Leclerc

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    /

    LAP MILLISECONDS FASTEST SLOWEST

    ---------- ------------ ------- -------

    1        99070

    2        97853

    3        98272

    4        98414

    5        98471

    6        98712

    7        98835


    46       125151

    47       163846         S L O W

    48       151364

    49       146221

    50       144429

    51        94570 F A S T

    52        95027

    53        95127


    ```


    ## 排名：Top-N


    谈论比赛数据离不开排名，因为每场比赛都以前三名登上领奖台结束。三种不同的分析函数处理排名，其差异很细微。对相等值的处理方式不同。


    有三种排名函数：


    *   `rank`表示相等的值被分配相同的排名。下一个排名会跳过相等值的数量，这会导致非连续的排名。这种排名被称为 *奥林匹克排名法*。


    *   `dense_rank`表示相等的值被分配相同的排名。下一个排名不会跳过数值；它创建连续的排名。


    *   `row_number`忽略重复值，其工作方式类似于`rownum`，创建连续的排名。


    在该示例中，对每位车手的总积分（不考虑赛季或比赛）进行排名。`DRIVERSTANDINGS`表包含车手累积的所有积分。行按`DRIVERID`分区，并按积分降序排序。结果仅显示了积分为
    190 分的塞尔吉奥·佩雷斯。


    `rank()`分析函数（下面结果集中的 rk 列）将前三行排名为 1，而第四行的值为 4。`dense_rank()`函数（dr 列）也将前三行的值分配为
    1，而第四行的值为 2。最后，`row_number()`函数（rn 列）为每一行分配任意值。


    ```sql

    select drv.forename ||'' ''|| drv.surname as driver

    , drs.points

    , rank () over win rk

    , dense_rank () over win dr

    , row_number() over win rn

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    where  drv.driverid  = 815

    window win as (partition by drv.driverid

    order by drs.points desc)

    /

    DRIVER              POINTS         RK         DR         RN

    --------------- ---------- ---------- ---------- ----------

    Sergio Pérez           190          1          1          1

    Sergio Pérez           190          1          1          2

    Sergio Pérez           190          1          1          3

    Sergio Pérez           178          4          2          4

    Sergio Pérez           165          5          3          5

    ```


    ## 数据去重


    当需要对数据进行去重时，`row_number()`排名函数非常有用。在以下示例中，基于`DRIVERS`表创建了一个新表`DUP_DRIVERS`，并且其中的数据被复制了。


    ```sql

    create table dup_drivers

    as

    select *

    from f1data.drivers

    /

    insert into dup_drivers

    select *

    from dup_drivers

    /

    commit

    /

    ```


    目前，此表中有超过 1700 名车手。


    ```sql

    select count(*)

    from dup_drivers

    /

    COUNT(*)


    ```


    使用`row_number()`排名函数进行去重的思路是：基于重复值（如`driverid`）创建分区，为该分区中的每一行分配一个任意的排名，并删除所有排名大于
    1 的记录。


    第一步，数据集按`driverid`分区，并使用`row_number()`为每一行分配排名（仅显示八行）。在这种情况下，分区内行的顺序并不重要。分析函数中的排序反映了这一点（`order
    by null`）。


    ```sql

    select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only

    /

    RID                DRIVER                  RN

    ------------------ --------------- ----------

    AAAYwqAAAAABAB7AAA Lewis Hamilton           1

    AAAYwqAAAAABAEHAAA Lewis Hamilton           2

    AAAYwqAAAAABAB7AAB Nick Heidfeld            1

    AAAYwqAAAAABAEHAAB Nick Heidfeld            2

    AAAYwqAAAAABAB7AAC Nico Rosberg             1

    AAAYwqAAAAABAEHAAC Nico Rosberg             2

    AAAYwqAAAAABAB7AAD Fernando Alonso          1

    AAAYwqAAAAABAEHAAD Fernando Alonso          2

    8 rows selected.

    ```


    下一步是过滤掉所有排名大于 1 的记录。因为分析函数不能在最终谓词（where 子句）中使用，所以需要将前面的查询推入到一个内联视图中。


    ```sql

    select rid

    , driver

    from   (select rowid as rid

    , forename ||'' ''|| surname as driver

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers

    fetch  first 8 rows only)

    where  rn > 1

    /

    RID                DRIVER

    ------------------ ---------------

    AAAYwqAAAAABAEHAAA Lewis Hamilton

    AAAYwqAAAAABAEHAAB Nick Heidfeld

    AAAYwqAAAAABAEHAAC Nico Rosberg

    AAAYwqAAAAABAEHAAD Fernando Alonso

    ```


    最后一步是从表中删除这些行。查询中移除了对前八行的限制。


    ```sql

    delete

    from   dup_drivers

    where  rowid in (

    select rid

    from   (select rowid as rid

    , row_number() over

    (partition by driverid

    order by null

    ) as rn

    from   dup_drivers)

    where  rn > 1)

    /

    854 rows deleted.

    ```'
- fmt: '## Reusable Windowing Clause


    Since Oracle Database 21c, it is possible to define a reusable named windowing
    clause. A named windowing clause allows you to use the same definition for multiple
    analytic functions in a query instead of copying over the definition. The named
    windowing clause can also include other named windows.


    In Listing [2-2](#536316_1_En_2_Chapter.xhtml#PC19), there are five named windows
    defined. The first window (`w_part`) defines a partition by `driverid`. The second
    window uses `w_part` and sorts the data by points in descending order. The third,
    fourth, and fifth use the sorted partition, and each specifies a different windowing
    clause using `rows`, `range`, and `groups` offset.


    ```sql

    select points

    , whole_partition

    , rows_

    , groups_

    , range_

    from (

    select drv.driverid

    , drs.points

    , max (drs.points) over w_part  as whole_partition

    , max (drs.points) over w_rows  as rows_

    , max (drs.points) over w_group as groups_

    , max (drs.points) over w_range as range_

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    window w_part  as (partition by drv.driverid)

    ,w_sort  as (w_part order by drs.points desc)

    ,w_rows  as (w_sort rows   between 10 preceding

    and current row)

    ,w_group as (w_sort groups between 10 preceding

    and current row)

    ,w_range as (w_sort range  between 10 preceding

    and current row)

    )

    where  driverid = 815

    and    rownum <= 20

    order  by driverid, points desc

    /

    ```


    ```

    POINTS WHOLE_PARTITION      ROWS_    GROUPS_     RANGE_

    ---------- --------------- ---------- ---------- ----------

    190             190        190        190        190

    190             190        190        190        190

    190             190        190        190        190

    178             190        190        190        178

    165             190        190        190        165

    150             190        190        190        150

    147             190        190        190        150

    135             190        190        190        135

    129             190        190        190        135

    129             190        190        190        135

    125             190        190        190        135

    125             190        190        190        135

    120             190        190        190        129

    118             190        178        190        125

    110             190        165        190        120

    108             190        150        178        118

    104             190        147        165        110

    104             190        135        165        110

    104             190        129        165        110

    104             190        129        165        110

    20 rows selected.

    ```


    Listing 2-2

    Reusable windowing clause


    The `rows` windowing clause uses a physical offset. The preceding example shows
    up to ten rows before the current row is within the window. The `range` windowing
    clause uses a logical offset. Values of 10 less than the current row’s value are
    in scope. The `groups` windowing clause divides the values into groups where ties
    are in the same group. In the preceding example, the offset is the number of groups
    before the current row.


    Note


    In the preceding example, the syntax `over <window_name>` is used. Using parenthesis
    around the window name: `over (<window_name>)` is also possible. These are not
    equivalent. The latter implies copying and modifying the window specification
    and is rejected if the referenced window specification includes a windowing clause.


    ## Pivot and Unpivot


    End users don’t always want to see data going down the page; instead, they prefer
    it go across the page. The `pivot` clause is an aggregate operator that turns
    rows into columns. Similarly, occasionally the opposite makes more sense, and
    the `unpivot` clause can assist with that.


    ### Pivot


    For the examples, the `results` table is used. This table is denormalized to contain
    information about drivers, constructors, points scored, and laps completed per
    race. The following is an excerpt from this table.


    ```sql

    select rcs.year

    , drv.driverref

    , rsl.points

    , rsl.laps

    from   f1data.results rsl

    join   f1data.races rcs

    on   rcs.raceid = rsl.raceid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  drv.driverref in (''norris'', ''bottas'')

    /

    ```


    ```

    YEAR DRIVERREF      POINTS       LAPS

    ---------- ---------- ---------- ----------

    2013 bottas              0         57

    2013 bottas              0         56

    2013 bottas              0         56

    2013 bottas              0         57

    2013 bottas              0         52

    2022 norris              2         51

    2022 bottas              0         50

    2022 bottas              6         70

    2022 norris              0         70

    2022 norris              8         52

    2022 bottas              0         20

    ```


    The objective is to gather all points for each year for Norris and Bottas and
    show the results for both drivers next to each other.


    For this initial requirement, only the `year`, `driverref`, and `points` are needed.
    The `laps` from the preceding data set can be ignored for now. The preceding query
    is the input for the `pivot` clause. The aggregate is `sum` (to collect all the
    points). The aggregate and pivot columns need to be specified in the `pivot` clause.
    The pivot columns are not dynamic.


    In the following query, the input query has been factored out in a named subquery
    (called `results`), and the points are aggregated for drivers Norris and Bottas.
    Columns that are part of the input query but not used in the `pivot` clause (like
    `year`) can be considered the “group by” columns. All columns that are part of
    the input query but not used in the `pivot` clause are used implicitly as “group
    by” columns.


    Tip


    Use an inline view or subquery factoring (`with` clause) when pivoting a result
    set, even when only using a single table. This safeguards the pivot action if
    the underlying table or view gets a new column.


    ```sql

    with results as (

    select rcs.year

    , drv.driverref

    , rsl.points

    from   f1data.results rsl

    join   f1data.races rcs

    on   rcs.raceid = rsl.raceid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  drv.driverref in (''norris'', ''bottas'')

    )

    select year

    , norris

    , bottas

    from   results

    pivot  (

    sum (points)

    for driverref in ( ''norris'' as norris

    , ''bottas'' as bottas

    )

    )

    /

    ```


    ```

    YEAR     NORRIS     BOTTAS

    ---------- ---------- ----------

    2013                     4

    2014                   186

    2015                   136

    2016                    85

    2017                   305

    2018                   247

    2019         49        326

    2020         97        223

    2021        160        219

    2022         54         44

    ```


    The pivot columns are aliased to prevent the column names from becoming case-sensitive
    i.e., the column name would be `‘norris’`, including the quotes.


    There can be multiple aggregate functions in the `pivot` clause. When the number
    of completed laps should also be summarized, the `laps` must be in the input query,
    and an aggregate for the completed laps must be in the `pivot` clause.'
