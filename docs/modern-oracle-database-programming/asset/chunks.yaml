    ## Comparing JSON Documents


    For JSON documents, whitespace and attribute order is irrelevant. So even though
    the following JSON snippets look different from a textual perspective, they are
    the same from a JSON perspective.


    ```

    {"code":"COU","givenName":"David","familyName":"Coulthard"}

    {

    "givenName" : "David",

    "familyName" : "Coulthard",

    "code" : "COU"

    }

    ```


    The `json_equal` function can compare JSON documents. It is not possible to compare
    a part of the JSON document using a JSON path expression directly; only complete
    JSON documents are comparable. It is possible to use `json_query` to pass in a
    snippet of a JSON document. In the following example, the JSON snippets are compared.


    ```

    select *

    from   dual

    where  json_equal (''{"code":"COU","givenName":"David","familyName":"Coulthard"}''

    ,''

    {

    "givenName" : "David",

    "familyName" : "Coulthard",

    "code" : "COU"

    }'')

    /

    D

    -

    X

    ```


    The comparison works even when the JSON document is in a binary format, like stored
    in a BLOB column. The following query compares a JSON string and a binary representation
    of the same JSON document.


    ```

    with test as

    (

    select utl_raw.cast_to_raw

    (''{"code":"COU","givenName":"David","familyName":"Coulthard"}'') as bin_json

    , json (''{"code":"COU","givenName":"David","familyName":"Coulthard"}'') as j_json

    from   dual)

    select ''The JSON documents are the same'' as result

    from   test t

    where  json_equal ( t.bin_json, t.j_json )

    /

    RESULT


    The JSON documents are the same

    ```


    When this function is used in the `SELECT` clause, the following error might be
    encountered: `ORA-40600: JSON_EQUAL used outside predicate`. This might give the
    impression that it can only be used in the `WHERE` clause of a query, this is
    not the case. It can also be used in a CASE expression.


    ## Changing a JSON Document


    Changing the structure of a JSON document can be done with the `json_transform`
    function. This function is like a Swiss-army knife; almost all possible manipulations
    of a JSON document are possible. The most common usage is in combination with
    an `UPDATE` statement to persist the changed JSON document. There is also the
    `json_mergepatch` function to change JSON documents, but this is not covered because
    of its limited functionality.


    Table [14-1](#536316_1_En_14_Chapter.xhtml#Tab1) shows the possible modifications
    that can be done.


    Table 14-1


    Modifications with json_transform


    | Modification | Description |

    | --- | --- |

    | Remove | Remove the input data that is targeted by the path expression. |

    | Append | Append the value to a targeted array. It raises an error if the target
    is not an array. |

    | Keep | Remove all inputs that are not targeted by the path expression. It is
    possible to specify multiple path expressions. |

    | Rename | Rename the attribute targeted by the path expression. |

    | Set | Replace existing target data with a new value or creates a new attribute
    when it doesn’t exist. |

    | Replace | Replace existing target data. Similar to `set ignore on missing`.
    |

    | Insert | Add new value when it doesn’t exist. Raises an error when it already
    exists. Similar to `set create on missing`. |


    The following example shows a modified JSON document. The input is the sample
    JSON document defined in Chapter [12](#536316_1_En_12_Chapter.xhtml), Listing
    [12-1](#536316_1_En_12_Chapter.xhtml#PC1).


    ```

    select json_transform (f.json_document

    , remove  ''$.MRData.DriverTable.Drivers[1]''

    , replace ''$.MRData.series'' = ''Formula 1''

    , set ''$.FIA'' = ''Fédération Internationale de l''''Automobile''

    , append  ''$.MRData.DriverTable.Drivers'' =

    json { ''code'': ''RIC''

    , ''givenName'':''Daniel''

    , ''familyName'':''Ricciardo''

    , ''nickname'':''Honey Badger''

    }

    , insert  ''$.MRData.Constructors'' =

    json [''Red Bull'', ''Ferrari'', ''Mercedes'', ''Renault'']

    , rename  ''$.MRData'' = ''F1Data''

    )

    from f1_drivers_json f

    /

    {

    "FIA": "Fédération Internationale de l''Automobile",

    "F1Data": {

    "series": "Formula 1",

    "DriverTable": {

    "Drivers": [

    {

    "driverId": "coulthard",

    "code": "COU",

    "givenName": "David",

    "familyName": "Coulthard",

    "dateOfBirth": "1971-03-27",

    "nationality": "British",

    "champion": false,

    "nickname": "DC"

    },

    {

    "code": "RIC",

    "givenName": "Daniel",

    "familyName": "Ricciardo",

    "nickname": "Honey Badger"

    }

    ]

    },

    "Constructors": [

    "Red Bull",

    "Ferrari",

    "Mercedes",

    "Renault"

    ]

    }

    }

    ```


    The modifications that were done in the preceding query.


    *   The second driver (array 1) is removed from the Drivers array.


    *   The value of the series attribute is changed to Formula 1.


    *   An extra FIA attribute is added at the root level with the full name as the
    value.


    *   A new driver is added to the Drivers array.


    *   An array of Constructors is added.


    *   The name of the `MRData` attribute is changed to F1Data.


    With the `keep` modification, you specify the sections of the JSON document that
    should be preserved. All other keys are removed. The following example modifies
    the JSON document, so that only the `Driver` object is preserved when the nickname
    equals DC. The output is formatted for readability.


    ```

