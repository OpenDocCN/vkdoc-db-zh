    value but is later overwritten by Giovinazzo. This results in two entries in the
    l_driver_numbers collection, but they both point to the same record in the l_drivers_with_number
    collection, resulting in the `forall` statement inserting the same record twice.


    ### Bulk Exceptions


    The “DML Error Logging” section in this chapter discusses bulk exceptions.


    ## Compound Triggers


    When performing DML on tables (or views), Oracle Database can fire triggers at
    four different points during the execution of the statement.


    *   Before the firing statement


    *   Before each row that the firing statement affects


    *   After each row that the firing statement affects


    *   After the firing statement


    Different triggers can be built for each DML action: `insert`, `update`, and `delete`.


    The concept of compound triggers was introduced in Oracle Database 11g. All the
    actions can be built into a single trigger with a compound trigger. Not only does
    this limit the number of objects, and therefore source files, needed, but the
    compound trigger allows sharing of state between all the trigger points using
    variables. The compound trigger has a declaration section, similar to the declaration
    section of a package. The common state is created at the start of the triggering
    statement and is destroyed at the completion of the trigger.


    Before the introduction of compound triggers, the same behavior could (and still
    can) be accomplished using packages to share the data, except that you had to
    take care of the creation and destruction of the data structures yourself. The
    following is the skeleton of a compound trigger with a short explanation of each
    section.


    ```

    create or replace trigger compound_trigger_name

    for [insert|delete]update] [of column] on table

    compound trigger

    -- declarative section (optional)

    -- variables declared here have firing-statement duration.

    --executed before dml statement

    before statement is

    begin

    null;

    end before statement;

    --executed before each row change- :new, :old are available

    before each row is

    begin

    null;

    end before each row;

    --executed after each row change- :new, :old are available

    after each row is

    begin

    null;

    end after each row;

    --executed after dml statement

    after statement is

    begin

    null;

    end after statement;

    end compound_trigger_name;

    /

    ```


    Two common use cases exist where a compound trigger outshines the traditional
    triggers and packages combination. The first is custom journaling on tables, and
    the second is a workaround for a mutating table problem. These two use cases are
    described in more detail in the next sections.'
