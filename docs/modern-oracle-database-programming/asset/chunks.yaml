    join   f1data.results rs

    on     (r.raceid = rs.raceid)

    where  rs.constructorid =

    sys_context( ''CONSTRUCTOR_CTX''

    , ''CONSTRUCTORID'' ) )]'';

    end lapsforthisconstructoronly;

