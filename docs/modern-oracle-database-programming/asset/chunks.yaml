- fmt: '## Path Expressions and Filters


    Navigating through a JSON document is crucial regardless of when you’re using
    SQL or PL/SQL. This is accomplished with JSON path expressions.


    JSON path expressions are somewhat comparable to XQuery or XPath expressions for
    an XML document. The JSON path expression describes the path to get to the value
    of interest. The starting point of the JSON path expression is defined by a special
    symbol—a context-item. The JSON path expression starts with an absolute context-item
    symbol (`$`) followed by zero or more steps. In the filter condition, the relative
    context-item symbol is an at sign (`@`). The complete JSON document is implied
    when there is only the absolute context-item symbol in the JSON path expression.


    Each step in the JSON path expression can be an object, array, or descendant step.
    These are called `nonfunction steps` and are separated by a period (`.`). Each
    `nonfunction step` can be followed by a filter expression and/or a function step.
    `Function steps`, also called item methods, are built-in functions that can be
    applied to the last step of the JSON path expression.


    Let’s look at a simple path expression with only `nonfunction steps`. The `json_value`
    function in the following query extracts a scalar value from a JSON document as
    directed by the JSON path expression.


    ```

    select json_value (

    f.json_document

    ,''$.MRData.series''

    ) as series

    from f1_drivers_json f

    /

    SERIES


    f1

    ```


    The JSON path expression extracts the value of the field `series`. The context-item
    (`$`) is immediately followed by a period (`.`) to navigate to the `MRData`, which
    is a JSON object.


    In the following example, all the driver’s codes are extracted. The driver’s code
    is located in the `Drivers` array. To extract values from an array, square brackets
    are used. The asterisk (`*`) in square brackets indicates that you want to extract
    all values. In this case, the `json_value` function can’t be used as the result
    is an array of values, not a scalar value, so the `json_query` function is used
    instead, with the `with array wrapper` clause. The result from the query is a
    JSON array.


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[*].code''

    with array wrapper

    ) as driver_codes

    from f1_drivers_json f

    /

    DRIVER_CODES


    ["COU","VET"]

    ```


    Instead of using the asterisk in square brackets, it is possible to specify a
    specific entry in the array you want to extract. Since JSON arrays are zero-indexed,
    extracting the first value by `[0]`, extracting the second value is `[1]`, and
    so on. It is also possible to specify multiple index values between square brackets
    or a range of index values, like in the following example.


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[0 to 1].code''

    with array wrapper

    ) as codes

    from f1_drivers_json f

    /

    CODES


    ["COU","VET"]

    ```


    The same result could have been achieved by specifying `[0,1]`. When dealing with
    JSON arrays, this is also possible to state something like `[0,2 to 6, 10]` to
    extract the first, third through seventh, and eleventh index values from the array.


    Besides the object and array steps taken in the previous examples, there is also
    a `descendant step`. A `descendant step` consists of two periods (`..`). The `descendant
    step` descends recursively into each object or array below the preceding step
    and gathers all values of the fields that match the field name. The following
    query extracts all nationalities regardless of where the `nationality` key appears
    in the JSON document. Some are within the drivers, and others are within the `Constructors`
    object.


    ```

    select json_query (f.json_document

    ,''$..nationality''

    with array wrapper

    ) as nationalities

    from f1_drivers_json f

    /

    NATIONALITIES


    ["British","German","Austrian","British"]

    ```


    ### Using Filter Conditions


    Next to the steps you can take to traverse the JSON document, it is possible to
    add filters in the JSON path expression. When a value matches the filter, it returns
    `true`; otherwise, it returns `false`.


    The filter expression starts with a question mark (`?`) followed by the filter
    condition in parentheses. Inside the filter condition, you use relative path expressions,
    which start with an at sign (`@`) as the context-item symbol instead of the dollar
    sign.


    A filter condition might look like the following.


    ```

    ?(@.code == "COU")

    ```


    The attribute `code` is compared for equality with the `"COU"` string. As the
    filter condition is applied to the previous JSON path expression, whatever JSON
    path expression is before the filter is important, it can only potentially evaluate
    to `true` when the `code` attribute appears in the selected JSON object. In our
    sample JSON document, the `code` attribute only appears in the `Drivers` array,
    so the complete JSON path expression is as follows.


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    It is possible to specify multiple conditions within the filter condition, each
    in its own parentheses.


    Table 12-1 shows an overview of combining filter conditions.


    Table 12-1


    Combining Filter Conditions


    | Condition | Meaning |

    | --- | --- |

    | ( condition ) | Use parentheses for grouping and separating filter conditions
    from other filter conditions |

    | && | AND; both conditions on each side must evaluate to true |

    | &#124;&#124; | OR; One of the conditions must evaluate to true, or both conditions
    evaluate to true |

    | ! ( condition ) | Negation of the condition, the condition must not be satisfied
    |

    | exists ( condition ) | The target in the condition must exist |

    | == | Equal |

    | <> or != | Not equal |

    | < | Less than |

    | <= | Less than or equal to |

    | > | Greater than |

    | >= | Greater than or equal to |

    | has substring | The matching data value has the specified string as substring
    |

    | starts with | The matching data value has the specified string as prefix |

    | like | Similar to SQL `like`; `%` zero or more characters, `_` matches a single
    character |

    | like_regex | Similar to SQL `regexp_like`. Use a regular expression to match
    the data value with the specified string |

    | eq_regex | Matches its regular expression syntax against the entire JSON string
    data value |

    | in (value1, value2) | Matching data value is one of the values specified in
    a values list, enclosed in parenthesis, separated by commas |


    The level where the filter expression is applied has effect on the results that
    are returned. The two following filter expressions look very similar, they both
    have the same filter condition (`code` is compared for equality with `"COU"`)
    but the results are quite different.


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    The JSON path expression returns an object of the `Drivers` array where there
    is a `code` attribute whose value is the `"COU"` string.


    The following JSON path expression returns an object of the `DriverTable` provided
    that there is a `Drivers` array with a `code` attribute whose value is the `"COU"`
    string.


    ```

    $.MRData.DriverTable?(@.Drivers[*].code == "COU")

    ```


    When both filter conditions are used in a query, you can see the different results.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].code == "COU")

    .Drivers[*].familyName''

    with array wrapper

    ) as drivertable

    ,json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.code == "COU")

    .familyName''

    with array wrapper

    ) as drivers

    from f1_drivers_json f

    /

    DRIVERTABLE                    DRIVERS

    ------------------------------ ------------------------------

    ["Coulthard","Vettel"]         ["Coulthard"]

    ```'
  raw: '## Path Expressions and Filters


    Navigating through a JSON document is crucial regardless of when you’re using
    SQL or PL/SQL. This is accomplished with JSON path expressions.


    JSON path expressions are somewhat comparable to XQuery or XPath expressions for
    an XML document. The JSON path expression describes the path to get to the value
    of interest. The starting point of the JSON path expression is defined by a special
    symbol—a context-item. The JSON path expression starts with an absolute context-item
    symbol ($) followed by zero or more steps. In the filter condition, the relative
    context-item symbol is an at sign (`@`). The complete JSON document is implied
    when there is only the absolute context-item symbol in the JSON path expression.


    Each step in the JSON path expression can be an object, array, or descendant step.
    These are called *nonfunction steps* and are separated by a period (`.`). Each
    nonfunction step *can* be followed by a filter expression and/or a function step.
    *Function steps*, also called item methods, are built-in functions that can be
    applied to the last step of the JSON path expression.


    Let’s look at a simple path expression with only nonfunction steps. The `json_value`
    function in the following query extracts a scalar value from a JSON document as
    directed by the JSON path expression.


    ```

    select json_value (

    f.json_document

    ,''$.MRData.series''

    ) as series

    from f1_drivers_json f

    /

    SERIES


    f1

    ```


    The JSON path expression extracts the value of the field `series`. The context-item
    (`$`) is immediately followed by a period (`.`) to navigate to the `MRData,` which
    is a JSON object.


    In the following example, all the driver’s codes are extracted. The driver’s code
    is located in the Drivers array. To extract values from an array, square brackets
    are used. The asterisk (`*`) in square brackets indicates that you want to extract
    all values. In this case, the `json_value` function can’t be used as the result
    is an array of values, not a scalar value, so the `json_query` function is used
    instead, with the `with array wrapper` clause. The result from the query is a
    JSON array.


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[*].code''

    with array wrapper

    ) as driver_codes

    from f1_drivers_json f

    /

    DRIVER_CODES


    ["COU","VET"]

    ```


    Instead of using the asterisk in square brackets, it is possible to specify a
    specific entry in the array you want to extract. Since JSON arrays are zero-indexed,
    extracting the first value by [0], extracting the second value is [1], and so
    on. It is also possible to specify multiple index values between square brackets
    or a range of index values, like in the following example.


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[0 to 1].code''

    with array wrapper

    ) as codes

    from f1_drivers_json f

    /

    CODES


    ["COU","VET"]

    ```


    The same result could have been achieved by specifying [0,1]. When dealing with
    JSON arrays, this is also possible to state something like [0,2 to 6, 10] to extract
    the first, third through seventh, and eleventh index values from the array.


    Besides the object and array steps taken in the previous examples, there is also
    a *descendant* step. A descendant step consists of two periods. The descendant
    step descends recursively into each object or array below the preceding step and
    gathers all values of the fields that match the field name. The following query
    extracts all nationalities regardless of where the `nationality` key appears in
    the JSON document. Some are within the drivers, and others are within the Constructors
    object.


    ```

    select json_query (f.json_document

    ,''$..nationality''

    with array wrapper

    ) as nationalities

    from f1_drivers_json f

    /

    NATIONALITIES


    ["British","German","Austrian","British"]

    ```


    ### Using Filter Conditions


    Next to the steps you can take to traverse the JSON document, it is possible to
    add filters in the JSON path expression. When a value matches the filter, it returns
    true; otherwise, it returns false.


    The filter expression starts with a question mark (`?`) followed by the filter
    condition in parentheses. Inside the filter condition, you use relative path expressions,
    which start with an at sign (`@`) as the context-item symbol instead of the dollar
    sign.


    A filter condition might look like the following.


    ```

    ?(@.code == "COU")

    ```


    The attribute `code` is compared for equality with the `"COU"` string. As the
    filter condition is applied to the previous JSON path expression, whatever JSON
    path expression is before the filter is important, it can only potentially evaluate
    to true when the `code` attribute appears in the selected JSON object. In our
    sample JSON document, the `code` attribute only appears in the Drivers array,
    so the complete JSON path expression is as follows.


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    It is possible to specify multiple conditions within the filter condition, each
    in its own parentheses.


    Table [12-1](#536316_1_En_12_Chapter.xhtml#Tab1) shows an overview of combining
    filter conditions.


    Table 12-1


    Combining Filter Conditions


    | Condition | Meaning |

    | --- | --- |

    | ( condition ) | Use parentheses for grouping and separating filter conditions
    from other filter conditions |

    | && | AND; both conditions on each side must evaluate to true |

    | &#124;&#124; | OR; One of the conditions must evaluate to true, or both conditions
    evaluate to true |

    | ! ( condition ) | Negation of the condition, the condition must not be satisfied
    |

    | exists ( condition ) | The target in the condition must exist |

    | == | Equal |

    | <> or != | Not equal |

    | < | Less than |

    | <= | Less than or equal to |

    | > | Greater than |

    | >= | Greater than or equal to |

    | has substring | The matching data value has the specified string as substring
    |

    | starts with | The matching data value has the specified string as prefix |

    | like | Similar to SQL `like`; % zero or more characters, _ matches a single
    character |

    | like_regex | Similar to SQL `regexp_like`. Use a regular expression to match
    the data value with the specified string |

    | eq_regex | Matches its regular expression syntax against the entire JSON string
    data value |

    | in (value1, value2) | Matching data value is one of the values specified in
    a values list, enclosed in parenthesis, separated by commas |


    The level where the filter expression is applied has effect on the results that
    are returned. The two following filter expressions look very similar, they both
    have the same filter condition (code is compared for equality with “COU”) but
    the results are quite different.


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    The JSON path expression returns an object of the Drivers array where there is
    a `code` attribute whose value is the `"COU"` string.


    The following JSON path expression returns an object of the DriverTable provided
    that there is a Drivers array with a `code` attribute whose value is the `"COU"`
    string.


    ```

    $.MRData.DriverTable?(@.Drivers[*].code == "COU")

    ```


    When both filter conditions are used in a query, you can see the different results.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].code == "COU")

    .Drivers[*].familyName''

    with array wrapper

    ) as drivertable

    ,json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.code == "COU")

    .familyName''

    with array wrapper

    ) as drivers

    from f1_drivers_json f

    /

    DRIVERTABLE                    DRIVERS

    ------------------------------ ------------------------------

    ["Coulthard","Vettel"]         ["Coulthard"]

    ```'
  trans: '

    ## 路径表达式与过滤器


    无论您是在使用 SQL 还是 PL/SQL，在 JSON 文档中进行导航都至关重要。这是通过 JSON 路径表达式实现的。


    JSON 路径表达式在某种程度上可与用于 XML 文档的 XQuery 或 XPath 表达式相媲美。JSON 路径表达式描述了获取目标值的路径。JSON
    路径表达式的起点由一个特殊符号定义——上下文项。JSON 路径表达式以绝对上下文项符号 (`$`) 开头，后跟零个或多个步骤。在过滤条件中，相对上下文项符号是
    at 符号 (`@`)。当 JSON 路径表达式中只包含绝对上下文项符号时，即表示整个 JSON 文档。


    JSON 路径表达式中的每个步骤可以是对象、数组或后代步骤。这些被称为 `非函数步骤`，并用句点 (`.`) 分隔。每个 `非函数步骤` 后可以跟一个过滤表达式和/或一个函数步骤。`函数步骤`，也称为项方法，是可应用于
    JSON 路径表达式最后一个步骤的内置函数。


    让我们看一个仅包含 `非函数步骤` 的简单路径表达式。以下查询中的 `json_value` 函数根据 JSON 路径表达式的指示从 JSON 文档中提取一个标量值。


    ```

    select json_value (

    f.json_document

    ,''$.MRData.series''

    ) as series

    from f1_drivers_json f

    /

    SERIES


    f1

    ```


    该 JSON 路径表达式提取了 `series` 字段的值。上下文项 (`$`) 后紧跟一个句点 (`.`) 以导航到 `MRData`，这是一个 JSON
    对象。


    在下面的示例中，提取了所有车手的代码。车手代码位于 `Drivers` 数组中。要从数组中提取值，需使用方括号。方括号中的星号 (`*`) 表示要提取所有值。在这种情况下，由于结果是值的数组而非标量值，因此不能使用
    `json_value` 函数，而应改用 `json_query` 函数，并搭配 `with array wrapper` 子句。查询的结果是一个 JSON
    数组。


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[*].code''

    with array wrapper

    ) as driver_codes

    from f1_drivers_json f

    /

    DRIVER_CODES


    ["COU","VET"]

    ```


    除了在方括号中使用星号，也可以指定要提取的数组中的特定条目。由于 JSON 数组的索引从零开始，因此 `[0]` 提取第一个值，`[1]` 提取第二个值，依此类推。也可以在方括号中指定多个索引值或一个索引值范围，如下面的示例所示。


    ```

    select json_query (

    f.json_document

    ,''$.MRData.DriverTable.Drivers[0 to 1].code''

    with array wrapper

    ) as codes

    from f1_drivers_json f

    /

    CODES


    ["COU","VET"]

    ```


    通过指定 `[0,1]` 也能得到相同的结果。在处理 JSON 数组时，也可以使用类似 `[0,2 to 6, 10]` 的写法来提取数组中索引为第一、第三到第七以及第十一的值。


    除了前面示例中采用的对象和数组步骤外，还有一个 `后代步骤`。`后代步骤` 由两个句点 (`..`) 组成。`后代步骤` 会递归地深入到前一步骤下的每个对象或数组中，并收集所有与字段名称匹配的字段值。以下查询提取了所有的国籍信息，无论
    `nationality` 键出现在 JSON 文档的哪个位置。有些在车手信息内，另一些在 `Constructors` 对象内。


    ```

    select json_query (f.json_document

    ,''$..nationality''

    with array wrapper

    ) as nationalities

    from f1_drivers_json f

    /

    NATIONALITIES


    ["British","German","Austrian","British"]

    ```


    ### 使用过滤条件


    除了可用于遍历 JSON 文档的步骤外，还可以在 JSON 路径表达式中添加过滤器。当值与过滤器匹配时，它返回 `true`；否则返回 `false`。


    过滤表达式以问号 (`?`) 开头，后跟括号中的过滤条件。在过滤条件内部，您使用相对路径表达式，这些表达式以 at 符号 (`@`) 作为上下文项符号，而不是美元符号。


    一个过滤条件可能如下所示。


    ```

    ?(@.code == "COU")

    ```


    将属性 `code` 与字符串 `"COU"` 进行相等比较。由于过滤条件应用于前面的 JSON 路径表达式，因此过滤器之前的 JSON 路径表达式很重要，它只有在所选的
    JSON 对象中出现 `code` 属性时才有可能评估为 `true`。在我们的示例 JSON 文档中，`code` 属性仅出现在 `Drivers` 数组中，因此完整的
    JSON 路径表达式如下。


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    可以在过滤条件内指定多个条件，每个条件都有自己的括号。


    表 12-1 展示了组合过滤条件的概览。


    表 12-1


    组合过滤条件


    | 条件 | 含义 |

    | --- | --- |

    | ( condition ) | 使用括号进行分组，并将过滤条件与其他过滤条件分开 |

    | && | 与 (AND)；两侧的条件都必须评估为 true |

    | &#124;&#124; | 或 (OR)；必须有一个条件评估为 true，或者两个条件都评估为 true |

    | ! ( condition ) | 条件的否定，该条件不得被满足 |

    | exists ( condition ) | 条件中的目标必须存在 |

    | == | 等于 |

    | <> or != | 不等于 |

    | < | 小于 |

    | <= | 小于或等于 |

    | > | 大于 |

    | >= | 大于或等于 |

    | has substring | 匹配的数据值包含指定的子字符串 |

    | starts with | 匹配的数据值以指定的字符串为前缀 |

    | like | 类似于 SQL `like`；`%` 匹配零个或多个字符，`_` 匹配单个字符 |

    | like_regex | 类似于 SQL `regexp_like`。使用正则表达式将数据值与指定字符串匹配 |

    | eq_regex | 根据其正则表达式语法匹配整个 JSON 字符串数据值 |

    | in (value1, value2) | 匹配的数据值是指定值列表中的一个，值列表用括号括起来，并以逗号分隔 |


    过滤表达式应用的层级对返回的结果有影响。以下两个过滤表达式看起来非常相似，它们具有相同的过滤条件（将 `code` 与 `"COU"` 进行相等比较），但结果却大不相同。


    ```

    $.MRData.DriverTable.Drivers[*]?(@.code == "COU")

    ```


    该 JSON 路径表达式返回 `Drivers` 数组中 `code` 属性值为 `"COU"` 字符串的对象。


    下面的 JSON 路径表达式返回 `DriverTable` 的对象，前提是存在一个 `Drivers` 数组，其中某个 `code` 属性的值为 `"COU"`
    字符串。


    ```

    $.MRData.DriverTable?(@.Drivers[*].code == "COU")

    ```


    在查询中同时使用这两个过滤条件时，可以看到不同的结果。


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].code == "COU")

    .Drivers[*].familyName''

    with array wrapper

    ) as drivertable

    ,json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.code == "COU")

    .familyName''

    with array wrapper

    ) as drivers

    from f1_drivers_json f

    /

    DRIVERTABLE                    DRIVERS

    ------------------------------ ------------------------------

    ["Coulthard","Vettel"]         ["Coulthard"]

    ```

    '
- fmt: '# SQL/JSON 路径过滤：条件应用与变量传递


    Filter conditions don’t necessarily apply to the same object. Let’s examine the
    following example where the objective is to retrieve the name of a British champion
    (note that in our small sample JSON, there is only one British driver, but he
    wasn’t a world champion; the other driver is German, and he was a world champion).
    Using the following filter condition on the `DriverTable` object gets results,
    but not the one intended.


    ```sql

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British")

    ```


    Both filter conditions must be true. There is an `and` condition (`&&`). The first
    filter tests for the condition that the `champion` attribute is `true` within
    the `Drivers` array.


    The second filter tests for the condition that the `nationality` attribute is
    `British` within the `Drivers` array. However, it does not test that both conditions
    are true on the same object within the `Drivers` array.


    When this filter condition is used in a query, you get the following results.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British"

    ).Drivers[*].familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    ["Coulthard","Vettel"]

    ```


    The tests are done on the `DriverTable` object. In the `DriverTable` object, there
    is a `champion` attribute with the value of `true`, and there is a `nationality`
    attribute with a value of `British`. Both conditions are satisfied, and the complete
    object is returned.


    The correct way to filter for a British driver that was a world champion would
    be to navigate down an additional level to the `Drivers` array and then apply
    the filter.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.champion == true

    && @.nationality=="British"

    ).familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    null

    ```


    Now both filter conditions are applied at the same level, being the individual
    objects in the `Drivers` array.


    ## Passing Variables


    So far, the filter conditions only contained static values. It is also possible
    to use bind variables in the filter conditions.


    Within the filter condition, a bind variable is prefixed with the dollar sign
    (`$`) followed by the name of the variable. The name of the bind variable is case-sensitive.
    The value that you pass in is defined in the `passing` clause. In the following
    example, there is a bind variable `$nationality,` and the value that is passed
    in is `"British"`.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality).familyName''

    passing ''British'' as "nationality"

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    "Coulthard"

    ```


    The named variable can be used multiple times in the filter condition. In the
    following example the bind variable is used to compare with the driver’s nationality
    and the nationality of the constructor.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality

    || @.Constructors[*].nationality == $nationality

    ).familyName''

    passing ''British'' as "nationality"

    with conditional array wrapper

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    ["Coulthard","Vettel"]

    ```


    ## Empty String and NULL


    Dealing with `NULL` is always tricky, and in the JSON realm this is even more
    true. In JSON a `NULL` is its own data type. A `NULL` in JSON is not the same
    as a SQL `NULL`, even though they might appear the same. These values are mapped
    to each other. This becomes obvious when you make a JSON comparison with `NULL`,
    with an equality comparison.


    ```sql

    [*]?(@.nickname == null)

    ```


    However, when passing a `NULL` as a bind variable, like in the following example,
    is not allowed, it raises an error.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing null as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    Error at Command Line : 6 Column : 11

    Error report -

    SQL Error: ORA-40576: Invalid use of bind variable in SQL/JSON path.

    40576. 00000 -  "Invalid use of bind variable in SQL/JSON path."

    *Cause:    An attempt was made to bind a non-runtime constant to

    a bind variable in SQL/JSON path.

    *Action:   Bind either compile time constant or runtime SQL bind variable value
    to a bind variable for SQL/JSON path.

    ```


    Passing in an empty string does not raise an error.


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing '''' as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    When referencing a bind variable from the calling environment, `SQLcl` in the
    following example, does not raise an error either.


    ```sql

    var b varchar2 (3)

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    .       passing :b as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    The last two examples do not raise an error, but they do not return the correct
    results either. When searching for a JSON `null`, the only option is to do an
    equality comparison without using a bind variable.


    **Note**

    In JSON there is a difference between an empty string and a `NULL`, this difference
    does not exist in Oracle SQL. A JSON empty string is equal to a SQL empty string,
    but not equal to a SQL `NULL`.


    ```sql

    select ''empty strings are the equal'' as same

    from dual where json_exists(''{a:""}''       ,''$?(@.a == $b)''       passing
    '''' as "b"       )/

    SAME

    ______________________________

    empty strings are the equal

    ```'
  raw: 'Filter conditions don’t necessarily apply to the same object. Let’s examine
    the following example where the objective is to retrieve the name of a British
    champion (note that in our small sample JSON, there is only one British driver,
    but he wasn’t a world champion; the other driver is German, and he was a world
    champion). Using the following filter condition on the DriverTable object gets
    results, but not the one intended.


    ```

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British")

    ```


    Both filter conditions must be true. There is an `and` condition (`&&`). The first
    filter tests for the condition that the `champion` attribute is `true` within
    the Drivers array.


    The second filter tests for the condition that the `nationality` attribute is
    British within the Drivers array. However, it does not test that both conditions
    are true on the same object within the Drivers array.


    When this filter condition is used in a query, you get the following results.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British"

    ).Drivers[*].familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    ["Coulthard","Vettel"]

    ```


    The tests are done on the `DriverTable` object. In the `DriverTable` object, there
    is a `champion` attribute with the value of true, and there is a `nationality`
    attribute with a value of British. Both conditions are satisfied, and the complete
    object is returned.


    The correct way to filter for a British driver that was a world champion would
    be to navigate down an additional level to the Drivers array and then apply the
    filter.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.champion == true

    && @.nationality=="British"

    ).familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    null

    ```


    Now both filter conditions are applied at the same level, being the individual
    objects in the Drivers array.


    #### Passing Variables


    So far, the filter conditions only contained static values. It is also possible
    to use bind variables in the filter conditions.


    Within the filter condition, a bind variable is prefixed with the dollar sign
    (`$`) followed by the name of the variable. The name of the bind variable is case-sensitive.
    The value that you pass in is defined in the `passing` clause. In the following
    example, there is a bind variable `$nationality,` and the value that is passed
    in is “British”.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality).familyName''

    passing ''British'' as "nationality"

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    "Coulthard"

    ```


    The named variable can be used multiple times in the filter condition. In the
    following example the bind variable is used to compare with the driver’s nationality
    and the nationality of the constructor.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality

    || @.Constructors[*].nationality == $nationality

    ).familyName''

    passing ''British'' as "nationality"

    with conditional array wrapper

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    ["Coulthard","Vettel"]

    ```


    #### Empty String and NULL


    Dealing with NULL is always tricky, and in the JSON realm this is even more true.
    In JSON a NULL is its own data type. A NULL in JSON is not the same as a SQL NULL,
    even though they might appear the same. These values are mapped to each other.
    This becomes obvious when you make a JSON comparison with NULL, with an equality
    comparison.


    ```

    [*]?(@.nickname == null)

    ```


    However, when passing a NULL as a bind variable, like in the following example,
    is not allowed, it raises an error.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing null as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    Error at Command Line : 6 Column : 11

    Error report -

    SQL Error: ORA-40576: Invalid use of bind variable in SQL/JSON path.

    40576\. 00000 -  "Invalid use of bind variable in SQL/JSON path."

    *Cause:    An attempt was made to bind a non-runtime constant to

    a bind variable in SQL/JSON path.

    *Action:   Bind either compile time constant or runtime SQL bind variable value
    to a bind variable for SQL/JSON path.

    ```


    Passing in an empty string does not raise an error.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing '''' as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    When referencing a bind variable from the calling environment, SQLcl in the following
    example, does not raise an error either.


    ```

    var b varchar2 (3)

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    .       passing :b as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    The last two examples do not raise an error, but they do not return the correct
    results either. When searching for a JSON null, the only option is to do an equality
    comparison without using a bind variable.


    Note


    In JSON there is a difference between an empty string and a NULL, this difference
    does not exist in Oracle SQL. A JSON empty string is equal to a SQL empty string,
    but not equal to a SQL NULL.`select ''empty strings are the equal'' as same`


    `from dual where json_exists(''{a:""}''       ,''$?(@.a == $b)''       passing
    '''' as "b"       )/SAME                           ______________________________
    empty strings are the equal`'
  trans: '

    # SQL/JSON 路径过滤：条件应用与变量传递


    过滤条件并不一定作用于同一个对象。让我们看下面这个例子，其目标是检索一位英国冠军的名字（请注意，在我们这个小的示例 JSON 中，只有一位英国车手，但他不是世界冠军；另一位车手是德国人，他是世界冠军）。在
    `DriverTable` 对象上使用以下过滤条件能得到结果，但并非预期的结果。


    ```sql

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British")

    ```


    两个过滤条件都必须为真。这里有一个 `and` 条件 (`&&`)。第一个过滤条件检查 `Drivers` 数组内的 `champion` 属性是否为 `true`。


    第二个过滤条件检查 `Drivers` 数组内的 `nationality` 属性是否为 `British`。然而，它并没有检查这两个条件是否在 `Drivers`
    数组内的同一个对象上都为真。


    当此过滤条件在查询中使用时，你会得到以下结果。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    ?(@.Drivers[*].champion == true

    && @.Drivers[*].nationality=="British"

    ).Drivers[*].familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    ["Coulthard","Vettel"]

    ```


    测试是在 `DriverTable` 对象上进行的。在 `DriverTable` 对象中，有一个值为 `true` 的 `champion` 属性，也有一个值为
    `British` 的 `nationality` 属性。两个条件都满足了，因此返回了完整的对象。


    正确的过滤方式，用于查找曾是世界冠军的英国车手，应该是再向下导航一层到 `Drivers` 数组，然后再应用过滤条件。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.champion == true

    && @.nationality=="British"

    ).familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    CHAMPIONS


    null

    ```


    现在，两个过滤条件都在同一层级上应用，即 `Drivers` 数组中的各个独立对象上。


    ## 传递变量


    到目前为止，过滤条件只包含静态值。在过滤条件中也可以使用绑定变量。


    在过滤条件中，绑定变量以美元符号 (`$`) 开头，后跟变量名。绑定变量的名称区分大小写。传入的值在 `passing` 子句中定义。在下面的例子中，有一个绑定变量
    `$nationality`，传入的值是 `"British"`。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality).familyName''

    passing ''British'' as "nationality"

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    "Coulthard"

    ```


    命名变量可以在过滤条件中多次使用。在下面的例子中，绑定变量用于比较车手的国籍和车队的国籍。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nationality == $nationality

    || @.Constructors[*].nationality == $nationality

    ).familyName''

    passing ''British'' as "nationality"

    with conditional array wrapper

    ) as lastname

    from f1_drivers_json f

    /

    LASTNAME


    ["Coulthard","Vettel"]

    ```


    ## 空字符串与 NULL


    处理 `NULL` 总是棘手的，在 JSON 领域更是如此。在 JSON 中，`NULL` 是其自身的数据类型。JSON 中的 `NULL` 与 SQL 的
    `NULL` 并不相同，即使它们看起来可能一样。这些值会相互映射。当你使用 `NULL` 进行 JSON 相等性比较时，这一点变得很明显。


    ```sql

    [*]?(@.nickname == null)

    ```


    但是，像下面这样将 `NULL` 作为绑定变量传入是不允许的，它会引发错误。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing null as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    Error at Command Line : 6 Column : 11

    Error report -

    SQL Error: ORA-40576: Invalid use of bind variable in SQL/JSON path.

    40576. 00000 -  "Invalid use of bind variable in SQL/JSON path."

    *Cause:    An attempt was made to bind a non-runtime constant to

    a bind variable in SQL/JSON path.

    *Action:   Bind either compile time constant or runtime SQL bind variable value
    to a bind variable for SQL/JSON path.

    ```


    传入空字符串不会引发错误。


    ```sql

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    passing '''' as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    当引用调用环境（如下例中的 `SQLcl`）中的绑定变量时，也不会引发错误。


    ```sql

    var b varchar2 (3)

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*]

    ?(@.nickname == $bind ).code''

    .       passing :b as "bind"

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ```


    最后两个例子不会引发错误，但它们也没有返回正确的结果。当搜索 JSON `null` 时，唯一的选择是进行不使用绑定变量的相等性比较。


    **注意**

    在 JSON 中，空字符串和 `NULL` 是有区别的，而 Oracle SQL 中不存在这种区别。JSON 空字符串等于 SQL 空字符串，但不等于 SQL
    `NULL`。


    ```sql

    select ''empty strings are the equal'' as same

    from dual where json_exists(''{a:""}''       ,''$?(@.a == $b)''       passing
    '''' as "b"       )/

    SAME

    ______________________________

    empty strings are the equal

    ```

    '
- fmt: '### Item Methods


    在“使用过滤条件”章节中的最后一个查询，其中过滤器尝试匹配一位英国冠军车手，返回了一个 `null` 的 JSON 数据类型值。


    当使用 CTAS（`Create Table As Select`）将查询具体化为表时，这一点变得非常清晰。


    ```

    create table champions

    as

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.champion == true

    && @.nationality=="British"

    ).familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    Table CHAMPIONS created.

    ```


    对新建表进行描述（`desc`）显示其数据类型为 JSON。


    ```

    desc champions

    Name      Null? Type

    --------- ----- ----

    CHAMPIONS       JSON

    ```


    此语句在具有 JSON 数据类型的 Oracle Database 21c 中执行。如果在 Oracle Database 19c 中执行前面的语句，数据类型将是
    `varchar2(4000)`。


    到目前为止，JSON 路径表达式的结果始终是 JSON 数据类型。让查询返回 JSON 并不是很有用。它们无法被比较、排序或分组；相反，返回 SQL 标量数据类型更有意义。


    借助*项方法*，你可以将返回的数据类型转换为 SQL 数据类型，如 `VARCHAR2`、`NUMBER` 或 `DATE`。它还可以为你提供有关返回值的信息，例如
    JSON 数据类型或数组的长度。


    项方法应用于 JSON 路径表达式的末尾。以下是最常见的用于转换为相应 SQL 数据类型的方法。


    *   `number()`、`numberOnly()`、`string()`、`stringOnly()`、`boolean()`、`booleanOnly()`、`date()`
    和 `timestamp()`。


    `number()` 项方法将匹配的 JSON 值转换为 SQL 数字，即使 JSON 数据类型是字符串。当使用 `numberOnly()` 项方法时，JSON
    数据类型*必须*也是数字，不会发生隐式数据类型转换。这对于其他带有 `Only()` 变体的项方法也是如此，例如 `stringOnly()` 和 `booleanOnly()`。可以安全地说，这些项方法也充当过滤器。


    在以下示例中，提取了 Vettel 的 `permanentNumber` 属性，并应用 `number()` 项方法将其转换为 SQL NUMBER 数据类型。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[1]

    .permanentNumber.number()''

    )  as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER

    ```


    如前面的结果所示，`permanentNumber` 在列中右对齐，就像 SQL 中的数字一样。而当应用 `numberOnly()` 项方法时，结果为 `null`。JSON
    文档中 `permanentNumber` 属性的数据类型是字符串，与请求的数据类型不匹配。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[1]

    .permanentNumber.numberOnly()''

    )  as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER

    ```


    对于 `date()` 和 `timestamp()`，目标 JSON 值必须符合 ISO-8601 标准。由于车手的出生日期采用 ISO 8601 标准，你可以提取它并将其转换为
    SQL 日期。


    ```

    alter session set nls_date_format =''dd-mm-yyyy''

    /

    Session altered.

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[0]

    .dateOfBirth.date()''

    )  as birthdate

    from f1_drivers_json f

    /

    BIRTHDATE

    27-03-1971

    ```


    与 JSON 路径表达式不同，你应用的项方法不会引发错误；返回的值是 SQL `NULL`。


    有四个项方法提供有关目标 JSON 值的信息：`type()`、`size()`、`count()` 和 `length()`。


    `type()` 方法可以返回的值列于表 [12-2](#536316_1_En_12_Chapter.xhtml#Tab2) 中。


    表 12-2

    `type()` 返回的数据类型名称


    | JSON 数据类型 |          | 备注 |

    | --- | --- | --- |

    | "array" | Array |          |

    | "object" | Object |          |

    | "string" | 对应于 `varchar2` 的值 |          |

    | "null" | `null` |          |

    | "boolean" | True 或 false |          |

    | "double" | 对应于 `binary_double` 的数字 | 仅当使用 JSON 数据类型时 |

    | "float" | 对应于 `binary_float` 的数字 | 仅当使用 JSON 数据类型时 |

    | "binary" | 对应于 `raw` 的值 | 仅当使用 JSON 数据类型时 |

    | "date" | 对应于 `date` 的值 | 仅当使用 JSON 数据类型时 |

    | "timestamp" | 对应于 `timestamp` 的值 | 仅当使用 JSON 数据类型时 |

    | "daysecondInterval" | 对应于 `interval day to second` 的值 | 仅当使用 JSON 数据类型时 |

    | "yearmonthInterval" | 对应于 `interval year to month` 的值 | 仅当使用 JSON 数据类型时 |


    `type()` 项方法在其应用的级别提供信息。当在 Drivers 数组上应用 `type()` 项方法时，结果是 "array"。当将相同的项方法应用于
    Drivers 数组的*内容*时，结果是一个包含两个 "object" 的数组，因为每个车手都是其自身的对象。


    ```

    $.MRData.DriverTable.Drivers.type()

    "array"

    $.MRData.DriverTable.Drivers[*].type()

    ["object","object"]

    ```


    再往下一层可以提供有关属性的信息。


    ```

    $.MRData.DriverTable.Drivers[*].nickname.type()

    ["string","null"]

    ```


    `size()` 项方法提供有关目标元素数量的信息。当 JSON 路径表达式的目标是标量时，`size()` 为一。对于对象也是如此。当目标是数组时，`size()`
    给出数组中元素的数量。


    ```

    $.MRData.DriverTable.Drivers.size()

    ```


    `count()` 项方法提供有关目标 JSON 值数量的信息，无论其类型如何。如果没有目标 JSON 值，则会引发错误。


    `length()` 项方法提供字符串中字符数的信息，它不适用于任何其他数据类型。


    JSON 路径表达式最多可以长达 32 KB，但很难达到这个限制。'
  raw: '### Item Methods


    The last query in the section “Using filter condition”, where the filter attempts
    to match a British driver that was champion, returned a JSON data type value of
    null.


    This becomes very clear when materialize the query into a table with a CTAS (**C**reate
    **T**able **A**s **S**elect).


    ```

    create table champions

    as

    select json_query (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[*]?(@.champion == true

    && @.nationality=="British"

    ).familyName

    ''

    with array wrapper

    ) as champions

    from f1_drivers_json f

    /

    Table CHAMPIONS created.

    ```


    A describe of the newly created table reveals that the data type is JSON.


    ```

    desc champions

    Name      Null? Type

    --------- ----- ----

    CHAMPIONS       JSON

    ```


    This statement was executed in Oracle Database 21c, which has the JSON data type.
    When the preceding statements are executed in Oracle Database 19c, the data type
    would be `varchar2(4000)`.


    So far, the results from the JSON path expressions have always been JSON data
    types. Having the query return JSON is not very useful. They can’t be compared,
    ordered, or grouped; instead, it makes more sense to have a SQL scalar data type.


    With *item methods,* you can cast the data type returned to a SQL data type, like
    `VARCHAR2`, `NUMBER`, or `DATE`. It can also provide you with information about
    the returned value, like the JSON data type or the length of an array.


    An item method is applied at the end of the JSON path expression. The following
    are the most common ones to change to a corresponding SQL data type.


    *   `number()`, `numberOnly()`, `string()`, `stringOnly()`, `boolean()`, `booleanOnly()`,
    `date()` and `timestamp()`.


    The `number()` item method converts the matched JSON value to a SQL number, even
    when the JSON data type is a string. When the `numberOnly()` item method is used
    then the JSON data type *must* also be a number, an implicit data type conversion
    does not take place. The same is true for the other item methods where there is
    an `Only()` variation, like `stringOnly()` and `booleanOnly()`. It is safe to
    say that these item methods also act as filters.


    In the following example, the `permanentNumber` attribute of Vettel is extracted
    from the JSON document and the `number()` item method is applied to convert it
    to a SQL NUMBER data type.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[1]

    .permanentNumber.number()''

    )  as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER


    ```


    As you can see in the preceding results, `permanentNumber` is right-aligned in
    the column as numbers in SQL do. When instead the `numberOnly()` item method is
    applied, the result is null. The data type of the `permanentNumber` attribute
    in the JSON document is string that doesn’t match the requested data type.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[1]

    .permanentNumber.numberOnly()''

    )  as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER


    ```


    For `date()` and `timestamp()` the targeted JSON value must adhere to the ISO-8601
    standard. As the birthdates of the drivers are in the ISO 8601 standard, you can
    extract it and convert it to a SQL Date.


    ```

    alter session set nls_date_format =''dd-mm-yyyy''

    /

    Session altered.

    select json_value (f.json_document

    ,''$.MRData.DriverTable

    .Drivers[0]

    .dateOfBirth.date()''

    )  as birthdate

    from f1_drivers_json f

    /

    BIRTHDATE


    27-03-1971

    ```


    The item method you apply does not raise an error, unlike the JSON path expressions;
    instead, the returned value is a SQL `NULL`.


    Four item methods give information about the targeted JSON value: `type()`, `size()`,
    `count()`, and `length()`.


    The values that the `type()` method can return are listed in Table [12-2](#536316_1_En_12_Chapter.xhtml#Tab2).


    Table 12-2


    Data Type Names Returned by type()


    | JSON Data Type |   | Remarks |

    | --- | --- | --- |

    | “array” | Array |   |

    | “object” | Object |   |

    | “string” | Value that corresponds to `varchar2` |   |

    | “null” | `null` |   |

    | “boolean” | True or false |   |

    | “double” | Number that corresponds to `binary_double` | Only when JSON data
    type is used |

    | “float” | Number that corresponds to `binary_float` | Only when JSON data type
    is used |

    | “binary” | Value that corresponds to `raw` | Only when JSON data type is used
    |

    | “date” | Value that corresponds to `date` | Only when JSON data type is used
    |

    | “timestamp” | Value that corresponds to `timestamp` | Only when JSON data type
    is used |

    | “daysecondInterval” | Value that corresponds to `interval day to second` | Only
    when JSON data type is used |

    | “yearmonthInterval” | Value that corresponds to `interval year to month` | Only
    when JSON data type is used |


    The `type()` item method provides information at the level where it is applied.
    When applying the `type()` item method at the Drivers array, the result is “array”.
    When the same item method is applied to the *content* of the Drivers array, the
    result is an array of two “objects” because each driver is an object of its own.


    ```

    $.MRData.DriverTable.Drivers.type()

    "array"

    $.MRData.DriverTable.Drivers[*].type()

    ["object","object"]

    ```


    Going down another level give information about the attributes.


    ```

    $.MRData.DriverTable.Drivers[*].nickname.type()

    ["string","null"]

    ```


    The `size()` item method gives information about the number of elements that are
    targeted. When the target of the JSON path expression is a scalar, the `size()`
    is one. The same is true for an object. When an array is targeted, `size()` gives
    the number of elements in the array.


    ```

    $.MRData.DriverTable.Drivers.size()


    ```


    The `count()` item method gives information about the number of targeted JSON
    values, regardless of their type. If there is no targeted JSON value, an error
    is raised.


    The `length()` item method gives information about the number of characters in
    a string, it does not work on any other data type.


    A JSON path expression can be at most 32 KB long, but it would be hard pressed
    to get to this limit.'
