- fmt: '# 16. Processing Data in the Background


    Processing data can be quite time-consuming; for instance, when a file is uploaded
    to the database, and it needs to be parsed and loaded into several tables. As
    an end user, working with the application grinds to a halt until the process has
    been completed.

    Often the processing of a file (or any other type of data influx—like a web service)
    can be delayed until later. Moving the process to the background gives the control
    of the application back to the user, giving the appearance of a fast-responding
    application, which improves the user experience.


    ## Resource Intensive


    Processing data can be resource-intensive, which could hinder the application’s
    users. Postponing data processing later when the peak load on the system is less
    would be beneficial as it doesn’t hinder any users.

    Any process that is not time-dependent, generating documents by an external web
    service or sending out emails from the database, can be offloaded to a background
    process. You are the best judge of your system if a process can be offloaded to
    the background.


    ## Queuing


    The Merriam-Webster dictionary defines *queuing* as “a data structure that consists
    of a list of records such that records are added at one end and removed from the
    other.”

    At the most basic level, messages are enqueued into a queue, and each message
    is dequeued and processed once by a consumer. The message stays on the queue until
    it is removed by dequeuing or if the message is expired. The producer of the message
    determines when a message expires. Messages are not necessarily dequeued in the
    order that they were enqueued.

    Within Oracle Database, queuing is a full-featured messaging solution. Point-to-point,
    publish/subscribe, persistent, and non-persistent messaging. There are many ways
    to interact with the queuing functionality, including PL/SQL, JMS, JDBC, .NET,
    Python, and Node.js.

    Oracle Database offers two types of queuing systems: Transactional Event Queues
    (`TEQ`) and Advanced Queuing (`AQ`). `TEQ` is a high-performance partitioned implementation
    with multiple event streams per queue. `AQ` is a disk-based implementation for
    simpler workflow use cases. In this chapter, the focus is on `AQ`.


    ## The Use Case


    Several CSV files with the latest details are uploaded through an application
    to keep the Formula 1 database up to date. There are many details to store, like
    lap times, pit stop information, qualifications results, and so on.

    Processing all the different results from the files takes a considerable amount
    of time and can be resource-intensive. While these files are parsed and processed,
    the application doesn’t respond, and users complain about this.

    By moving the parsing and processing of the files to a later moment in time, the
    control of the application can be returned to the user.

    At a high level, the plan is to store the files in a database table. A message
    with the primary key of the newly created record is placed on a queue. When this
    is done, the control is passed back to the user.

    Later, the messages on the queue are retrieved, indicating which files still need
    to be processed. When the processing is done, the message from the queue can be
    removed, and the record from the staging table can be removed (but this is not
    necessary for the process, it might be useful to keep them just in case).

    Reading the messages from the queue can be done at a timed interval with a scheduler
    job, but `AQ` has a better method for it, which is explored later.


    ## Unzipping Files


    Once the uploaded `ZIP` file is in the database, extracting the files from it
    is straightforward. It is good practice to upload the files into a separate table.

    To unzip the file, you first need to fetch it into a local `BLOB` variable based
    on the name of the `ZIP` file. This local `BLOB` variable is being passed as an
    argument into the `get_files()` function. The return value is of data type `apex_zip.t_files`,
    which is an associative array. It is a list of file names inside the `ZIP` file.

    ```sql

    declare

    l_zip_file      blob;

    l_unzipped_file blob;

    l_files         apex_zip.t_files;

    begin

    select blob_content

    into l_zip_file

    from zip_files

    where filename = ''archive.zip'';

    l_files := apex_zip.get_files

    (p_zipped_blob => l_zip_file);

    ```

    The next step is to get the actual files from the `ZIP` file. To do this, use
    the `get_file_content()` function, which takes the name of the files inside the
    `ZIP` file. This example uses a simple `for loop` to insert the files inside the
    `ZIP` into the table created earlier.

    ```sql

    for i in 1 .. l_files.count

    loop

    l_unzipped_file := apex_zip.get_file_content

    (p_zipped_blob => l_zip_file

    ,p_file_name   => l_files(i)

    );

    insert into temp_files

    (filename

    ,blob_content

    )

    values

    (l_files (i)

    ,l_unzipped_file

    );

    end loop;

    end;

    ```

    And that is all that is needed to extract a `ZIP` file and store the files in
    a database table.

    When the `ZIP` file contains folders, the filenames reflect that in the form of
    `dir/subdir/filename`.


    ## Zipping Files


    Creating a `ZIP` file inside the database, which the application can download,
    can be useful for the user.

    First, you must retrieve the files you want to compress into a `ZIP` file. For
    this example, a cursor for loop is used; it does an implicit bulk fetch for 100
    rows. The local variable, data type `BLOB`, is the `ZIP` file.

    ```sql

    declare

    l_zip_file blob;

    begin

    for r in (select tf.filename

    ,tf.blob_content

    from temp_files tf

    )

    loop

    ```

    The `add_file()` procedure takes three arguments: the local variable (a `ZIP`
    file), the name of the file, and the file content.

    ```sql

    apex_zip.add_file (p_zipped_blob => l_zip_file

    ,p_file_name   => r.filename

    ,p_content     => r.blob_content

    );

    end loop;

    ```

    To complete the `ZIP` file, you need to tell the zipping process that you no longer
    want to add files to the zip.

    ```sql

    apex_zip.finish (p_zipped_blob => l_zip_file);

    ```

    The following example stores the result in an existing table.

    ```sql

    insert into zip_files

    (filename

    ,mime_type

    ,blob_content

    )

    values

    (''all_files.zip''

    ,''application/zip''

    ,l_zip_file

    );

    end;

    ```


    ## Summary


    This chapter took a closer look at `APEX` packages. Even when you are not using
    `APEX` to develop applications, you can still take advantage of some of its functionality.

    You learned about calling a web service and extracting information from a `JSON`
    document. The `JSON` document contained spatial information, so `APEX` functions
    could be used to convert them to real spatial geometries. Formatting strings and
    extracting initials are made easy with `apex_string`.

    Parsing data from files and extracting the relevant information is easy with `apex_data_parser`.

    Finally, you saw how to zip and unzip files from a database.'
