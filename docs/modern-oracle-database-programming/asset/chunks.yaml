    ## Creating with CTAS


    You can also create a private temporary table using a `create table as select`
    construction.


    ```sql

    create private temporary table ora$ptt_drivers

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```


    The default for creating temporary tables is `on commit drop definition`. But
    since this is a memory-only construction, there is no implicit commit, so the
    rows are available in the table. You can add the option to preserve the definition
    after a commit.


    ```sql

    create private temporary table ora$ptt_drivers

    on commit preserve definition

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```


    The definition of a private temporary table is private to the current session;
    therefore `on commit preserve definition` means the definition stays until the
    end of the session and then goes away. You cannot create indexes on private temporary
    tables.


    ## The Table Prefix


    A private temporary table must be prefixed with a standard prefix. By default,
    this prefix is `ORA$PTT_` as it is set in the parameters.


    ```sql

    select *

    from   v$parameter

    where  name = ''private_temp_table_prefix''

    /

    ```


    ## Restrictions on Temporary Tables


    Although the temporary table looks and behaves like regular tables, there are
    some restrictions.


    *   Temporary tables cannot be partitioned, clustered, or index-organized.

    *   You cannot specify any foreign key constraints on temporary tables.

    *   Temporary tables cannot contain columns of nested tables.

    *   You cannot specify the following clauses of `LOB_storage_clause`: `TABLESPACE`,
    `storage_clause`, or `logging_clause`.

    *   Parallel `UPDATE`, `DELETE` and `MERGE` are not supported for temporary tables.

    *   The only part of the `segment_attributes_clause` that you can specify for
    a temporary table is `TABLESPACE`, which allows you to specify a single temporary
    tablespace.

    *   Distributed transactions are not supported for temporary tables.

    *   A temporary table cannot contain `INVISIBLE` columns.


    All these restrictions apply to both global temporary tables and private temporary
    tables. Private temporary tables have some more restrictions on top of the preceding
    list.


    *   The name of private temporary tables must always be prefixed with whatever
    is defined with the `init.ora` parameter `PRIVATE_TEMP_TABLE_PREFIX`. The default
    is `ORA$PTT_`.

    *   You cannot create indexes, materialized views, or zone maps on private temporary
    tables.

    *   Primary keys, or any constraint that requires an index, are not allowed on
    private temporary tables.

    *   You cannot define columns with default values.

    *   You cannot reference private temporary tables in any permanent object (e.g.,
    views or triggers).

    *   Private temporary tables are not visible through database links.


    Even though it looks like there are lots of restrictions on temporary tables,
    they can be very useful. You probably not be hindered by the restrictions.'
