    ## 可变迭代器


    你曾多少次试图给你的迭代器赋值？例如，你想在迭代中跳过任意数量的步骤。考虑代码清单 7-13 中所示的脚本。


    ```

    begin

    for i in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /

    ORA-06550: line 7, column 7:

    PLS-00363: expression ''I'' cannot be used as an assignment target

    ORA-06550: line 7, column 7:

    PL/SQL: Statement ignored

    代码清单 7-13

    尝试给迭代器赋值

    ```


    Oracle Database 21c 引入了一个新选项：`mutable` 迭代器。在迭代器名称后使用关键字 `mutable` 使其在循环执行期间可被修改，这样代码清单
    7-14 中的代码就能运行了。


    ```

    begin

    for i mutable in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /


    代码清单 7-14

    使迭代器可变

    ```


    默认行为是使用 `immutable`（不可变）迭代器，也可以用更冗长的方式指定，如代码清单 7-15 所示。


    ```

    begin

    for i immutable in 1 .. 10

    loop

    dbms_output.put_line(i);

    i := i + 3;

    end loop;

    end;

    /

    ORA-06550: line 7, column 7:

    PLS-00363: expression ''I'' cannot be used as an assignment target

    ORA-06550: line 7, column 7:

    PL/SQL: Statement ignored

    代码清单 7-15

    使迭代器不可变

    ```


    ## 增强迭代器


    数值迭代器除非你明确指定 `mutable` 关键字，否则不是 `mutable` 的，而游标 `for` 循环中的记录却是可变的；也就是说，尽管迭代器本身未被声明为可变，但其各个属性的值是可变的。假设你有一个用于反转字符串的过程，如代码清单
    7-16 所示。


    ```

    create or replace procedure

    reversestring(string_inout in out varchar2)

    is

    l_reversed varchar2( 32767 );

    l_strlen number;

    begin

    l_strlen := length( string_inout );

    for i in reverse 1..l_strlen

    loop

    l_reversed := l_reversed || substr( string_inout, i, 1 );

    end loop;

    string_inout := l_reversed;

    end;

    /

    代码清单 7-16

    反转字符串过程

    ```


    如果你创建一个游标 `for` 循环，其中的迭代器是来自游标的一条记录，那么即使该迭代器未定义为可变，你仍然可以给记录的不同元素赋值。这从 Oracle Database
    版本 7 开始就已可行。


    ```

    begin

    for driver in (select *

    from   f1data.drivers d

    where  d.nationality = ''Dutch'')

    loop

    dbms_output.put_line( driver.forename

    || '' ''

    || driver.surname );

    reversestring( driver.forename );

    reversestring( driver.surname );

    dbms_output.put_line( driver.surname

    || '' ''

    || driver.forename );

    end loop;

    end;

    /

    ```


    ## 数组中的循环


    你不必像代码清单 7-17 中那样，先创建一个 `for` 循环，然后在循环内部给关联数组赋值；你可以在赋值语句内部定义循环，如代码清单 7-18 所示。


    ```

    declare

    type num_list is table of int index by pls_integer;

    s1 num_list;

    s2 num_list;

    begin

    s1 := num_list( for i in 1 .. 10 => i );

    s2 := num_list( for i in 2 .. 10 by 2 => s1( i ) );

    end;

    /

    代码清单 7-18

    在 21c 中于数组内部使用循环

    ```


    ```

    declare

    type num_list is table of int index by pls_integer;

    s1 num_list;

    s2 num_list;

    begin

    for i in 1 .. 10

    loop

    s1(i) := i * 10;

    end loop;

    for i in 1 .. 10

    loop

    if mod(i, 2) = 0

    then

    s2(i) := s1(i);

    end if;

    end loop;

    end;

    /

    代码清单 7-17

    在 21c 之前使用循环赋值

    ```


    ## 数组的索引


    与用于单次从数据库检索数据的 `bulk collect` 构造语句互补的是 `forall` 语句，它用于单次将更改写回数据库。`forall` 语句除了对密集集合使用
    `<collection>.first .. <collection>.last` 构造外，还可以使用 `indices of` 和 `values of`
    构造。从 Oracle Database 21c 开始，可以在 `for` 循环中使用这些构造。你可以使用 `indices of` 构造，如代码清单 7-20
    所示，而不必像代码清单 7-19 中展示的那样编写 `while` 循环。


    ```

    declare

    type num_list is table of int index by pls_integer;

    s2 num_list;

    begin

    s2 := num_list(for i in 2 .. 10 by 2 => i * 10);

    for idx in indices of s2

    loop

    dbms_output.put_line(idx || ''='' || s2(idx));

    end loop;

    end;

    /

    2=20

    4=40

    6=60

    8=80

    10=100

    代码清单 7-20

    自 21c 起显示稀疏集合

    ```


    ```

    declare

    type num_list is table of int index by pls_integer;

    s2 num_list;

    idx int;

    begin

    s2 := num_list(2  => 20

    ,4  => 40

    ,6  => 60

    ,8  => 80

    ,10 => 100);

    idx := s2.first;

    while idx is not null

    loop

    dbms_output.put_line(idx || ''='' || s2(idx));

    idx := s2.next(idx);

    end loop;

    end;

    /

    2=20

    4=40

    6=60

    8=80

    10=100

    代码清单 7-19

    在 21c 之前显示稀疏集合

    ```


    提示


    `s2` 变量是在迭代控制中使用限定表达式初始化的。更多内容请参阅本章后面的限定表达式部分。

