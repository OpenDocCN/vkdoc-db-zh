    \    end if;\n    if l_driver_numbers.count > 0\n    then\n        forall indx\
    \ in values of l_driver_numbers\n            insert into drivers_with_number\n\
    \            values l_drivers_with_number( indx );\n    end if;\nend;\n/\nselect\
    \ dwn.driverid      as id\n     , dwn.driverref     as ref\n     , dwn.driver_number\
    \ as num\nfrom   drivers_with_number dwn\norder  by dwn.driver_number\n/\n```\n\
    \n```\nID REF                  NUM\n----- -------------------- ---\n  838 vandoorne\
    \              2\n  817 ricciardo              3\n  846 norris               \
    \  4\n  846 norris                 4\n   20 vettel                 5\n  849 latifi\
    \                 6\n  849 latifi                 6\n    8 raikkonen         \
    \     7\n  154 grosjean               8\n  853 mazepin                9\n  853\
    \ mazepin                9\n  842 gasly                 10\n  842 gasly      \
    \           10\n  815 perez                 11\n  831 nasr                  12\n\
    \  813 maldonado             13\n    4 alonso                14\n  844 leclerc\
    \               16\n  824 jules_bianchi         17\n  840 stroll             \
    \   18\n   13 massa                 19\n  825 kevin_magnussen       20\n  821\
    \ gutierrez             21\n  852 tsunoda               22\n  852 tsunoda    \
    \           22\n  848 albon                 23\n  855 zhou                  24\n\
    \  818 vergne                25\n  826 kvyat                 26\n  807 hulkenberg\
    \            27\n  843 brendon_hartley       28\n  843 brendon_hartley       28\n\
    \  835 jolyon_palmer         30\n  839 ocon                  31\n  830 max_verstappen\
    \        33\n  845 sirotkin              35\n    1 hamilton              44\n\
    \  827 lotterer              45\n  854 mick_schumacher       47\n  850 pietro_fittipaldi\
    \     51\n  834 rossi                 53\n  832 sainz                 55\n  847\
    \ russell               63\n  822 bottas                77\n  837 haryanto   \
    \           88\n  837 haryanto              88\n  851 aitken                89\n\
    \  836 wehrlein              94\n  833 merhi                 98\n  841 giovinazzi\
    \            99\n  841 giovinazzi            99\n\n51 行已选择。\n```\n\n代码清单 1-6：使用带有\
    \ `values of` 选项的 `forall`\n\n如你所见，这导致了重复记录，因为 `driver_number` 在 `l_drivers_with_number`\
    \ 集合中被用作索引，因此可能会覆盖现有记录。例如，索引 99 处的条目可能首先获得 Sutil 的值，但后来被 Giovinazzo 覆盖。这导致 `l_driver_numbers`\
    \ 集合中有两个条目，但它们都指向 `l_drivers_with_number` 集合中的同一条记录，从而导致 `forall` 语句两次插入同一条记录。\n\
    \n### 批量异常\n\n本章中的“DML 错误日志记录”一节讨论了批量异常。\n\n## 复合触发器\n\n在对表（或视图）执行 DML 时，Oracle\
    \ 数据库可以在语句执行的四个不同时间点触发触发器。\n\n*   触发语句执行前\n*   触发语句影响的每一行之前\n*   触发语句影响的每一行之后\n\
    *   触发语句执行后\n\n可以为每个 DML 操作（`insert`、`update` 和 `delete`）构建不同的触发器。\n\n复合触发器的概念是在\
    \ Oracle Database 11g 中引入的。所有操作都可以构建到一个复合触发器中。这不仅限制了所需对象（从而也是源文件）的数量，而且复合触发器允许使用变量在所有触发点之间共享状态。复合触发器有一个声明部分，类似于包的声明部分。公共状态在触发语句开始时创建，并在触发器完成时销毁。\n\
    \n在引入复合触发器之前，相同的（并且现在仍然可以）通过使用包来共享数据来实现，只是你必须自己负责数据结构的创建和销毁。以下是复合触发器的框架，并附有每个部分的简短说明。\n\
    \n```sql\ncreate or replace trigger compound_trigger_name\nfor [insert | delete\
    \ | update] [of column] on table\ncompound trigger\n    -- 声明部分（可选）\n    -- 此处声明的变量具有触发语句持续时间。\n\
    \    -- 在 DML 语句之前执行\n    before statement is\n    begin\n        null;\n    end\
    \ before statement;\n    -- 在每一行更改之前执行 - :new, :old 可用\n    before each row is\n\
    \    begin\n        null;\n    end before each row;\n    -- 在每一行更改之后执行 - :new,\
    \ :old 可用\n    after each row is\n    begin\n        null;\n    end after each\
    \ row;\n    -- 在 DML 语句之后执行\n    after statement is\n    begin\n        null;\n\
    \    end after statement;\nend compound_trigger_name;\n/\n```\n\n存在两个常见用例，其中复合触发器优于传统的触发器和包组合。第一个是表上的自定义日志记录，第二个是变通解决变异表问题。这两个用例将在接下来的章节中更详细地描述。\n"
- fmt: '## 日志记录


    当需要对某个表上的所有事务保留日志表时，使用复合触发器可以通过批量处理来加速这个过程。你可以在复合触发器中将受影响行的数据累积到集合中，然后使用批量操作将这些数据推送到日志表中，而不是在每一行处理后都向日志表插入一行。


    首先，创建一个日志表。


    ```sql

    create table constructors_jn

    as

    select constructorid

    , constructorref

    , name

    , nationality

    , url

    , CAST( null as varchar2( 1 ) ) jn_action

    , systimestamp jn_date

    from   f1data.constructors

    where  1 = 2

    /

    ```


    你可以为插入、更新和删除事件创建一个单一的复合触发器。


    ```sql

    create or replace trigger tr_constructors_cti

    for insert or update or delete on constructors

    compound trigger

    ```


    在复合触发器中，为日志记录声明一个集合类型。


    ```sql

    -- declarative section (optional)

    type constructors_tt is table of constructors_jn%rowtype

    index by pls_integer;

    ```


    接下来，声明一个全局变量来保存该集合。


    ```sql

    -- variables declared here have firing-statement duration.

    g_constructors_jn constructors_tt;

    ```


    然后，在 `after each row` 部分记录日志表所需的所有信息。


    ```sql

    --executed aftereach row change- :new, :old are available

    after each row is

    l_constructor constructors_jn%rowtype;

    begin

    if inserting

    or updating

    then

    l_constructor.constructorid  := :new.constructorid;

    l_constructor.constructorref := :new.constructorref;

    l_constructor.name := :new.name;

    l_constructor.nationality    := :new.nationality;

    l_constructor.url  := :new.url;

    else

    l_constructor.constructorid  := :old.constructorid;

    l_constructor.constructorref := :old.constructorref;

    l_constructor.name := :old.name;

    l_constructor.nationality    := :old.nationality;

    l_constructor.url  := :old.url;

    end if;

    if inserting

    then

    l_constructor.jn_action := ''I'';

    elsif updating

    then

    l_constructor.jn_action := ''U'';

    else

    l_constructor.jn_action := ''D'';

    end if;

    l_constructor.jn_date := systimestamp;

    g_constructors_jn(g_constructors_jn.count + 1) :=

    l_constructor;

    end after each row;

    ```


    最后，在 `after statement` 部分，执行批量操作将数据推送到数据库。


    ```sql

    --executed after dml statement

    after statement is

    begin

    forall indx in g_constructors_jn.first ..

    g_constructors_jn.last

    insert

    into   constructors_jn

    values g_constructors_jn( indx );

    end after statement;

    ```


    清单 [1-7](#536316_1_En_1_Chapter.xhtml#PC25) 是完整的复合触发器。


    **提示**


    如果你预计日志集合会变得非常大，可以在复合触发器的 `AFTER EACH ROW` 部分，当集合大小达到某个阈值时，构建一个 `FORALL BULK INSERT`，然后清空该集合。


    ```sql

    create or replace trigger tr_constructors_cti

    for insert or update or delete on constructors

    compound trigger

    -- declarative section (optional)

    type constructors_tt is table of constructors_jn%rowtype

    index by pls_integer;

    -- variables declared here have firing-statement duration.

    g_constructors_jn constructors_tt;

    --executed after each row change- :new, :old are available

    after each row is

    l_constructor constructors_jn%rowtype;

    begin

    if inserting

    or updating

    then

    l_constructor.constructorid  := :new.constructorid;

    l_constructor.constructorref := :new.constructorref;

    l_constructor.name           := :new.name;

    l_constructor.nationality    := :new.nationality;

    l_constructor.url            := :new.url;

    else

    l_constructor.constructorid  := :old.constructorid;

    l_constructor.constructorref := :old.constructorref;

    l_constructor.name           := :old.name;

    l_constructor.nationality    := :old.nationality;

    l_constructor.url            := :old.url;

    end if;

    if inserting

    then

    l_constructor.jn_action := ''I'';

    elsif updating

    then

    l_constructor.jn_action := ''U'';

    else

    l_constructor.jn_action := ''D'';

    end if;

    l_constructor.jn_date := systimestamp;

    g_constructors_jn(g_constructors_jn.count + 1) :=

    l_constructor;

    end after each row;

    --executed after dml statement

    after statement is

    begin

    forall indx in g_constructors_jn.first ..

    g_constructors_jn.last

    insert

    into   constructors_jn

    values g_constructors_jn( indx );

    end after statement;

    end tr_constructors_cti;

    /

    ```


    **清单 1-7**

    复合触发器 `tr_constructors_cti`


    ## 变异表


    假设你想在将比赛结果添加到 `RESULTS` 表时更新 `CONSTRUCTORRESULTS` 表。如果你尝试在触发器中执行此操作，如清单 [1-8](#536316_1_En_1_Chapter.xhtml#PC27)
    所示，当你尝试在 `RESULTS` 表中插入或更新行时，会收到错误。


    ```sql

    create or replace trigger tr_results_ariu

    after insert or update on f1data.results

    for each row

    begin

    merge into f1data.constructorresults tgt

    using (select rsl.raceid        as raceid

    , rsl.constructorid as constructorid

    , sum( rsl.points ) as points

    from   f1data.results rsl

    where  rsl.raceid        = :new.raceid

    and    rsl.constructorid = :new.constructorid

    group  by rsl.raceid

    , rsl.constructorid) src

    on (    tgt.raceid        = src.raceid

    and tgt.constructorid = src.constructorid)

    when matched then

    update

    set    tgr.points = src.points

    when not matched then

    insert

    ( constructorresultsid

    , raceid

    , constructorid

    , points)

    values

    ( f1data.constructorresults_seq.nextval

    , src.raceid

    , src.constructorid

    , src.points);

    end tr_results_ariu;

    /

    ```


    **清单 1-8**

    在 `RESULTS` 上的行后触发器，用于更新 `CONSTRUCTORRESULTS`


    ```

    ORA-04091: table F1DATA.RESULTS is mutating, trigger/function may not see it

    ```


    你可以通过创建一个复合触发器来解决这个问题，该触发器在 after row 部分将不同的构造函数添加到一个集合中，然后在 after statement 触发器中使用该集合来执行实际的合并语句。


    ```sql

    create or replace trigger f1data.tr_results_cti

    for insert or update or delete on f1data.results

    compound trigger

    -- declarative section (optional)

    type raceid_t is record

    ( raceid        number

    , constructorid number);

    type raceids_tt is table of raceid_t

    index by pls_integer;

    -- variables declared here have firing-statement duration.

    g_raceids raceids_tt;

    --executed before dml statement

    before statement is

    begin

    null;

    end before statement;

    --executed aftereach row change- :new, :old are available

    after each row is

    begin

    g_raceids(:new.constructorid).raceid :=

    :new.raceid;

    g_raceids(:new.constructorid).constructorid :=

    :new.constructorid;

    end after each row;

    --executed after dml statement

    after statement is

    begin

    forall indx in indices of g_raceids

    merge into f1data.constructorresults tgt

    using (select rsl.raceid

    , rsl.constructorid

    , sum( rsl.points ) as points

    from   f1data.results rsl

    where  rsl.raceid =

    g_raceids( indx ).raceid

    and    rsl.constructorid =

    g_raceids(indx).constructorid

    group  by rsl.raceid

    ,rsl.constructorid) src

    on (    tgt.raceid        = src.raceid

    and tgt.constructorid = src.constructorid)

    when matched then

    update

    set    tgt.points = src.points

    when not matched then

    insert

    ( constructorresultsid

    , raceid

    , constructorid

    , points)

    values

    ( f1data.constructorresults_seq.nextval

    , src.raceid

    , src.constructorid

    , src.points);

    end after statement;

    end tr_results_cti;

    /

    ```


    **清单 1-9**

    在 `RESULTS` 上的复合触发器，用于更新 `CONSTRUCTORRESULTS`


    ## DML 错误日志


    执行 DML 时，可能会出现问题。例如，当违反约束时，操作无法完成，事务会被回滚。如果你正在处理单条记录，这不是问题：要么修复数据并重新运行语句，要么将错误记录到某处。但是，如果你运行一条插入一百万行的语句，而第一百万行失败了，整个事务都会被回滚。Oracle
    数据库提供了一种机制来解决这个问题。'
  raw: '### Journaling


    When you must keep journaling tables for all the transactions you do on a certain
    table, using compound triggers can speed up this process by using bulk processing.
    Instead of inserting a row in the journal table after a row has been processed,
    you can accumulate all the data of the rows affected in collections in the compound
    trigger and then use bulk operations to push this data to the journaling table.


    First, create a journaling table.


    ```

    create table constructors_jn

    as

    select constructorid

    , constructorref

    , name

    , nationality

    , url

    , CAST( null as varchar2( 1 ) ) jn_action

    , systimestamp jn_date

    from   f1data.constructors

    where  1 = 2

    /

    ```


    You can create a single compound trigger for the insert, update and delete events.


    ```

    create or replace trigger tr_constructors_cti

    for insert or update or delete on constructors

    compound trigger

    ```


    In the compound trigger, declare a collection type for the journaling records.


    ```

    -- declarative section (optional)

    type constructors_tt is table of constructors_jn%rowtype

    index by pls_integer;

    ```


    Next, declare a global variable to hold the collection.


    ```

    -- variables declared here have firing-statement duration.

    g_constructors_jn constructors_tt;

    ```


    Then, record all the information needed for the journaling table in the `after
    each row` section.


    ```

    --executed aftereach row change- :new, :old are available

    after each row is

    l_constructor constructors_jn%rowtype;

    begin

    if inserting

    or updating

    then

    l_constructor.constructorid  := :new.constructorid;

    l_constructor.constructorref := :new.constructorref;

    l_constructor.name := :new.name;

    l_constructor.nationality    := :new.nationality;

    l_constructor.url  := :new.url;

    else

    l_constructor.constructorid  := :old.constructorid;

    l_constructor.constructorref := :old.constructorref;

    l_constructor.name := :old.name;

    l_constructor.nationality    := :old.nationality;

    l_constructor.url  := :old.url;

    end if;

    if inserting

    then

    l_constructor.jn_action := ''I'';

    elsif updating

    then

    l_constructor.jn_action := ''U'';

    else

    l_constructor.jn_action := ''D'';

    end if;

    l_constructor.jn_date := systimestamp;

    g_constructors_jn(g_constructors_jn.count + 1) :=

    l_constructor;

    end after each row;

    ```


    And in the `after statement` section, perform the bulk operation to push the data
    to the database.


    ```

    --executed after dml statement

    after statement is

    begin

    forall indx in g_constructors_jn.first ..

    g_constructors_jn.last

    insert

    into   constructors_jn

    values g_constructors_jn( indx );

    end after statement;

    ```


    Listing [1-7](#536316_1_En_1_Chapter.xhtml#PC25) is the complete compound trigger.


    Tip


    If you expect the journaling collection to become very big, you can build a `FORALL
    BULK INSERT` in the `AFTER EACH ROW` part of the compound trigger when the size
    of the collections reaches a certain size and then empty the collection.


    ```

    create or replace trigger tr_constructors_cti

    for insert or update or delete on constructors

    compound trigger

    -- declarative section (optional)

    type constructors_tt is table of constructors_jn%rowtype

    index by pls_integer;

    -- variables declared here have firing-statement duration.

    g_constructors_jn constructors_tt;

    --executed after each row change- :new, :old are available

    after each row is

    l_constructor constructors_jn%rowtype;

    begin

    if inserting

    or updating

    then

    l_constructor.constructorid  := :new.constructorid;

    l_constructor.constructorref := :new.constructorref;

    l_constructor.name           := :new.name;

    l_constructor.nationality    := :new.nationality;

    l_constructor.url            := :new.url;

    else

    l_constructor.constructorid  := :old.constructorid;

    l_constructor.constructorref := :old.constructorref;

    l_constructor.name           := :old.name;

    l_constructor.nationality    := :old.nationality;

    l_constructor.url            := :old.url;

    end if;

    if inserting

    then

    l_constructor.jn_action := ''I'';

    elsif updating

    then

    l_constructor.jn_action := ''U'';

    else

    l_constructor.jn_action := ''D'';

    end if;

    l_constructor.jn_date := systimestamp;

    g_constructors_jn(g_constructors_jn.count + 1) :=

    l_constructor;

    end after each row;

    --executed after dml statement

    after statement is

    begin

    forall indx in g_constructors_jn.first ..

    g_constructors_jn.last

    insert

    into   constructors_jn

    values g_constructors_jn( indx );

    end after statement;

    end tr_constructors_cti;

    /

    Listing 1-7

    Compound Trigger tr_constructors_cti

    ```


    ### Mutating Table


    Suppose you want to update the `CONSTRUCTORRESULTS` table when you add the result
    of a race to the `RESULTS` table. If you try to do this in a trigger, as you see
    in Listing [1-8](#536316_1_En_1_Chapter.xhtml#PC27), you receive an error when
    you try to insert or update a row in the `RESULTS` table.


    ```

    create or replace trigger tr_results_ariu

    after insert or update on f1data.results

    for each row

    begin

    merge into f1data.constructorresults tgt

    using (select rsl.raceid        as raceid

    , rsl.constructorid as constructorid

    , sum( rsl.points ) as points

    from   f1data.results rsl

    where  rsl.raceid        = :new.raceid

    and    rsl.constructorid = :new.constructorid

    group  by rsl.raceid

    , rsl.constructorid) src

    on (    tgt.raceid        = src.raceid

    and tgt.constructorid = src.constructorid)

    when matched then

    update

    set    tgr.points = src.points

    when not matched then

    insert

    ( constructorresultsid

    , raceid

    , constructorid

    , points)

    values

    ( f1data.constructorresults_seq.nextval

    , src.raceid

    , src.constructorid

    , src.points);

    end tr_results_ariu;

    /

    Listing 1-8

    After row trigger on RESULTS to update the CONSTRUCTORRESULTS

    ```


    ```

    ORA-04091: table F1DATA.RESULTS is mutating, trigger/function may not see it

    ```


    You can work around this problem by creating a compound trigger that, in the after
    row, adds the different constructors to a collection, which is used in the after
    statement trigger to perform the actual merge statement.


    ```

    create or replace trigger f1data.tr_results_cti

    for insert or update or delete on f1data.results

    compound trigger

    -- declarative section (optional)

    type raceid_t is record

    ( raceid        number

    , constructorid number);

    type raceids_tt is table of raceid_t

    index by pls_integer;

    -- variables declared here have firing-statement duration.

    g_raceids raceids_tt;

    --executed before dml statement

    before statement is

    begin

    null;

    end before statement;

    --executed aftereach row change- :new, :old are available

    after each row is

    begin

    g_raceids(:new.constructorid).raceid :=

    :new.raceid;

    g_raceids(:new.constructorid).constructorid :=

    :new.constructorid;

    end after each row;

    --executed after dml statement

    after statement is

    begin

    forall indx in indices of g_raceids

    merge into f1data.constructorresults tgt

    using (select rsl.raceid

    , rsl.constructorid

    , sum( rsl.points ) as points

    from   f1data.results rsl

    where  rsl.raceid =

    g_raceids( indx ).raceid

    and    rsl.constructorid =

    g_raceids(indx).constructorid

    group  by rsl.raceid

    ,rsl.constructorid) src

    on (    tgt.raceid        = src.raceid

    and tgt.constructorid = src.constructorid)

    when matched then

    update

    set    tgt.points = src.points

    when not matched then

    insert

    ( constructorresultsid

    , raceid

    , constructorid

    , points)

    values

    ( f1data.constructorresults_seq.nextval

    , src.raceid

    , src.constructorid

    , src.points);

    end after statement;

    end tr_results_cti;

    /

    Listing 1-9

    Compound trigger on RESULTS to update the CONSTRUCTORRESULTS

    ```


    ## DML Error Logging


    When performing DML, things can go wrong. For example, when a constraint is violated,
    the action does not complete, and the transaction is rolled back. This is not
    a problem when you are working with a single record. Either fix the data and run
    the statement again, or log the error somewhere. But if you run a statement where
    you insert a million rows, and the millionth row fails, the entire transaction
    is rolled back. Oracle Database provides a mechanism to work around this problem.'
  trans: '## 日志记录


    当需要对某个表上的所有事务保留日志表时，使用复合触发器可以通过批量处理来加速这个过程。你可以在复合触发器中将受影响行的数据累积到集合中，然后使用批量操作将这些数据推送到日志表中，而不是在每一行处理后都向日志表插入一行。


    首先，创建一个日志表。


    ```sql

    create table constructors_jn

    as

    select constructorid

    , constructorref

    , name

    , nationality

    , url

    , CAST( null as varchar2( 1 ) ) jn_action

    , systimestamp jn_date

    from   f1data.constructors

    where  1 = 2

    /

    ```


    你可以为插入、更新和删除事件创建一个单一的复合触发器。


    ```sql

    create or replace trigger tr_constructors_cti

    for insert or update or delete on constructors

    compound trigger

    ```


    在复合触发器中，为日志记录声明一个集合类型。


    ```sql

    -- 声明部分（可选）

    type constructors_tt is table of constructors_jn%rowtype

    index by pls_integer;

    ```


    接下来，声明一个全局变量来保存该集合。


    ```sql

    -- 此处声明的变量具有触发语句的持续时间。

    g_constructors_jn constructors_tt;

    ```


    然后，在 `after each row` 部分记录日志表所需的所有信息。


    ```sql

    -- 在每行变更后执行 - :new, :old 可用

    after each row is

    l_constructor constructors_jn%rowtype;

    begin

    if inserting

    or updating

    then

    l_constructor.constructorid  := :new.constructorid;

    l_constructor.constructorref := :new.constructorref;

    l_constructor.name := :new.name;

    l_constructor.nationality    := :new.nationality;

    l_constructor.url  := :new.url;

    else

    l_constructor.constructorid  := :old.constructorid;

    l_constructor.constructorref := :old.constructorref;

    l_constructor.name := :old.name;

    l_constructor.nationality    := :old.nationality;

    l_constructor.url  := :old.url;

    end if;

    if inserting

    then

    l_constructor.jn_action := ''I'';

    elsif updating

    then

    l_constructor.jn_action := ''U'';

    else

    l_constructor.jn_action := ''D'';

    end if;

    l_constructor.jn_date := systimestamp;

    g_constructors_jn(g_constructors_jn.count + 1) :=

    l_constructor;

    end after each row;

    ```


    最后，在 `after statement` 部分，执行批量操作将数据推送到数据库。


    ```sql

    -- 在 DML 语句之后执行

    after statement is

    begin

    forall indx in g_constructors_jn.first ..

    g_constructors_jn.last

    insert

    into   constructors_jn

    values g_constructors_jn( indx );

    end after statement;

    ```


    清单 1-7 是完整的复合触发器。


    **提示**


    如果你预计日志集合会变得非常大，可以在复合触发器的 `AFTER EACH ROW` 部分，当集合大小达到某个阈值时，构建一个 `FORALL BULK INSERT`，然后清空该集合。


    ```sql

