    | **Index type** | (Alpha)Numeric | Numeric | Numeric |

    | **Range** | Unlimited–2^(31)+1 to 2^(31)–1 | Unlimited1 to 2^(31)–1 | Limited
    |

    | **Sparse** | Sparse | Initially Dense / Sparse after deletes | Dense |

    | **Ordered** | Unordered | Unordered | Ordered |

    | **When stored in a database table** | n/a | Out of line | Inline |

    | **Usage** | Any set of data | Any set of data | Small sets of data |


    When selecting data from the database into PL/SQL variables or writing data from
    PL/SQL variables to the database, you can do this row-by-row (also called slow-by-slow).
    But, since Oracle Database 8i, you have the bulk operations available. To be able
    to do this, collections are essential.


    ### Bulk Collect


    You can use the bulk collect option to retrieve data from the database. Instead
    of selecting a single record from the database, you can select a whole set of
    records from the database and store them in a collection in a single trip to the
    database.


    If you want to retrieve only the Dutch drivers from the database, you must create
    a collection type to hold the data. In this case, make a collection of records
    based on the structure of the cursor.


    ```

    declare

    cursor c_dutch_drivers

    is

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    ```


    And then create a variable based on this collection type.


    ```

    l_dutch_drivers dutch_drivers_tt;

    ```


    Then in the cursor, bulk collect into the collection variable instead of fetching
    into a single record.


    ```

    begin

    open  c_dutch_drivers;

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers;

    close c_dutch_drivers;

    ```


    This way, the entire result set is fetched into the local variable in a single
    pass to the database.


    This statement does not generate an error if no data is found; instead, it returns
    an empty collection. So, before you start processing the collection, it is good
    practice to see if there is anything to process in the first place.


    ```

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    end if;

    end;

    ```


    Listing [1-2](#536316_1_En_1_Chapter.xhtml#PC6) is the complete anonymous block.


    ```

    declare

    cursor c_dutch_drivers

    is

    select drv.*

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_dutch_drivers dutch_drivers_tt;

    begin

    open  c_dutch_drivers;

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers;

    close c_dutch_drivers;

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    end if;

    end;

    /

    Listing 1-2

    Display the names of the Dutch drivers

    ```


    #### Limit


    If you bulk collect the result set into a collection variable, be aware that all
    data is transferred into memory. This can take up a lot of memory and since chances
    are that multiple processes are running, performing similar queries, you can run
    out of available memory. Oracle Database provides the `limit` clause to limit
    the amount of memory used.


    This takes a bit more coding because you must build a loop to fetch all the records
    in multiple passes. Listing [1-3](#536316_1_En_1_Chapter.xhtml#PC7) implements
    the same code but now uses the `limit` clause.


    ```

    declare

    cursor c_dutch_drivers

    is

    select drv.*

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_dutch_drivers dutch_drivers_tt;

    begin

    open  c_dutch_drivers;

    loop

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers

    limit 5;

    dbms_output.put_line(  ''----- ''

    || to_char( l_dutch_drivers.count )

    || '' -----'');

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    else

    exit;

    end if;

    end loop;

    close c_dutch_drivers;

    end;

    /

    ----- 5 -----

    Michael Bleekemolen

    Boy Lunger

    Roelof Wunderink

    Gijs van Lennep

    Christijan Albers

    ----- 5 -----

    Robert Doornbos

    Jos Verstappen

    Jan Lammers

    Huub Rothengatter

    Dries van der Lof

    ----- 5 -----

    Jan Flinterman

    Giedo van der Garde

    Max Verstappen

    Carel Godin de Beaufort

    Ernie de Vos

    ----- 2 -----

    Ben Pon

    Rob Slotemaker

    ----- 0 -----

    PL/SQL procedure successfully completed

    Listing 1-3

    Display the names of the Dutch drivers using the limit clause

    ```


    ### forall


    Since you can get the data from the database in bulk, you can also write data
    back to the database in bulk using a `forall` statement.


    The syntax for the `forall` statement looks a lot like a loop statement, but instead
    of sending the individual statements to the SQL engine, they are bundled and sent
    in one pass.


    There are three ways you can use the `forall` statement. The easiest way to use
    it is to specify a range from a dense collection. If your collection is sparse,
    you can use the `indices of` clause. And if you want to use the values of your
    collection as pointers to another collection, you can use the `values of` clause.
    For these examples, create a table to hold the drivers who have a fixed driver
    number.


    ```

    create table drivers_with_number

    as

    select drv.*

    from   f1data.drivers drv

    where  1=2

    /

    ```


    Note


    All these examples can be done using a single SQL statement, but it is to display
    the different possible usages.'
  trans: '# 合并


    假设你想根据 `RESULTS`（结果）表来更新 `CONSTRUCTORRESULTS`（ constructors 结果）表。你可以创建一个 PL/SQL
    块来判断哪些行已存在需要更新、哪些需要新建。但你可以用一条 `merge`（合并）语句来完成这一切。


    `merge` 语句（在 Oracle 数据库 9i 中引入）根据数据在表中的存在情况，有条件地向表中插入或更新数据。如果记录不存在，则插入；如果记录已存在，则更新。可以在
    `matched`（匹配）子句中添加一个可选的 `delete where`（删除条件）子句。这仅删除那些同时符合 `on`（关联）子句和 `delete
    where` 子句的行。此技术在代码清单 1-1 中展示。


    ```

    merge into constructorresults tgt

    using (select rsl.raceid          as raceid

    , rsl.constructorid   as constructorid

    , sum( rsl.points )   as points

    from   f1data.results rsl

    where  rsl.raceid = g_raceids(indx).raceid

    and    rsl.constructorid = g_raceids(indx).constructorid

    group  by rsl.raceid

    , rsl.constructorid) src

    on (    tgt.raceid = src.raceid

    and tgt.constructorid = src.constructorid )

    when matched

    then

    update

    set    tgt.points = src.points

    when not matched

    then

    insert

    ( constructorresultsid

    , raceid

    , constructorid

    , points)

    values

    ( f1data.constructorresults_seq.nextval

    , src.raceid

    , src.constructorid

    , src.points)

    /

    代码清单 1-1

    将 RESULTS 表合并到 CONSTRUCTORRESULTS 表

    ```


    # 集合


    集合（Collections）在 PL/SQL 中自其被引入 Oracle 数据库起就已存在。如今，你可以选择三种类型的集合。


    *   `associative array`（关联数组）

    *   `nested table`（嵌套表）

    *   `varray`（可变数组）


    `associative array` 仅在 PL/SQL 中可用。其他两种在 SQL 中也可用，因此它们可以作为表中的列数据类型或独立的 SQL 对象使用。


    这些集合有许多相似之处，但也有一些重要区别，如表 1-1 所述。


    表 1-1

    集合比较


    |   | `关联数组` | `嵌套表` | `可变数组` |

    | --- | --- | --- | --- |

    | **使用的语言** | 仅 PL/SQL | SQL 和 PL/SQL | SQL 和 PL/SQL |

    | **索引类型** | （字母）数字 | 数字 | 数字 |

    | **范围** | 不受限制 – 2³¹+1 到 2³¹–1 | 不受限制 1 到 2³¹–1 | 受限制 |

    | **稀疏性** | 稀疏 | 初始密集/删除后稀疏 | 密集 |

    | **有序性** | 无序 | 无序 | 有序 |

    | **存储在数据库表中时** | 不适用 | 行外存储 | 行内存储 |

    | **用途** | 任何数据集 | 任何数据集 | 小型数据集 |


    当将数据从数据库选取到 PL/SQL 变量中或将数据从 PL/SQL 变量写回数据库时，你可以逐行进行（也称为慢速逐行处理）。但是，自 Oracle 数据库
    8i 起，你就有了批量操作可用。要实现这一点，集合至关重要。


    ## 批量收集


    你可以使用 `bulk collect`（批量收集）选项从数据库中检索数据。与其从数据库中选择单条记录，不如从数据库中选择整个记录集，并在一次数据库访问中将它们存储在一个集合中。


    如果你想仅从数据库中检索荷兰籍车手，你必须创建一个集合类型来保存数据。在这种情况下，基于游标的结构创建一个记录的集合。


    ```

    declare

    cursor c_dutch_drivers

    is

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    ```


    然后基于此集合类型创建一个变量。


    ```

    l_dutch_drivers dutch_drivers_tt;

    ```


    接着在游标中，使用 `bulk collect` 批量收集到集合变量中，而不是提取到单个记录。


    ```

    begin

    open  c_dutch_drivers;

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers;

    close c_dutch_drivers;

    ```


    这样，整个结果集在一次数据库访问中被提取到本地变量中。


    此语句在找不到数据时不会生成错误；相反，它返回一个空集合。因此，在开始处理集合之前，良好的做法是先检查是否有内容需要处理。


    ```

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    end if;

    end;

    ```


    代码清单 1-2 是完整的匿名块。


    ```

    declare

    cursor c_dutch_drivers

    is

    select drv.*

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_dutch_drivers dutch_drivers_tt;

    begin

    open  c_dutch_drivers;

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers;

    close c_dutch_drivers;

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    end if;

    end;

    /

    代码清单 1-2

    显示荷兰籍车手的姓名

    ```


    ### 限制


    如果你将结果集 `bulk collect` 批量收集到一个集合变量中，请注意所有数据都会传输到内存中。这可能会占用大量内存，并且由于可能有多个进程正在运行并执行类似的查询，你可能会耗尽可用内存。Oracle
    数据库提供了 `limit`（限制）子句来限制使用的内存量。


    这需要多写一点代码，因为你必须构建一个循环来分多次获取所有记录。代码清单 1-3 实现了相同的代码，但现在使用了 `limit` 子句。


    ```

    declare

    cursor c_dutch_drivers

    is

    select drv.*

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    ;

    type dutch_drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_dutch_drivers dutch_drivers_tt;

    begin

    open  c_dutch_drivers;

    loop

    fetch c_dutch_drivers

    bulk  collect

    into  l_dutch_drivers

    limit 5;

    dbms_output.put_line(  ''----- ''

    || to_char( l_dutch_drivers.count )

    || '' -----'');

    if l_dutch_drivers.count > 0

    then

    for indx in l_dutch_drivers.first ..

    l_dutch_drivers.last

    loop

    dbms_output.put_line(  l_dutch_drivers( indx ).forename

    || '' ''

    || l_dutch_drivers( indx ).surname);

    end loop;

    else

    exit;

    end if;

    end loop;

    close c_dutch_drivers;

    end;

    /

