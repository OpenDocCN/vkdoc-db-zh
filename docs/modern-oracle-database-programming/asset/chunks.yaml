    # Foreword


    `SQL` is a powerful language. With a few lines, you can answer complex questions.


    `PL/SQL` includes many extensions to make `SQL` even easier to work with. This
    tight integration makes these languages perfect for data management.


    Yet it can be unclear *which* `SQL` or `PL/SQL` features you should use to solve
    a problem. The documentation for Oracle Database is huge. Browsing through it
    in the hopes of finding the syntax or feature to help you is an endless task.


    Sadly, this means many applications have pages of code re-creating features Oracle
    Database offers. Often this is because the developers were unaware this functionality
    was available to them.


    So, I’m thrilled to see Alex and Patrick write this book. They have a long history
    of sharing their knowledge to help others use Oracle Database. Their real-world
    experience and willingness to help others understand Oracle `SQL` and `PL/SQL`
    have led both to the deserved recognition of Oracle ACE Director. This makes them
    ideal candidates to make this guide.


    Reading this book will teach you how to use the more powerful database options,
    many of which are unavailable on other platforms. It’s filled with examples to
    show you how this `SQL` and `PL/SQL` language features work. But most importantly,
    the scripts help illustrate when and why you should use these options.


    When working with any technology, I think you should know what features it offers.
    Using inbuilt functionality saves you time and simplifies your code. Alex and
    Patrick have done a great job showing you how to do this.


    I’ve learned a lot from them both over the years. I hope this book helps you write
    better `SQL` and `PL/SQL` too.


    —Chris Saxon, Oracle Developer Advocate


    # Introduction


    When writing a book on database technology, you have to come up with a data set
    to write your examples with. We could have used the standard `EMP` and `DEPT`
    tables that have been available in the `SCOTT` schema forever. Still, since this
    is a book on modern Oracle Database programming, we wanted to use a different
    data set.


    Because we are both fans of Formula 1 and Oracle is a big sponsor of the Red Bull
    Racing team, which happens to be the team where our countryman Max Verstappen
    is driving, we went looking for a Formula 1–related data set. Of course, not all
    examples in this book are related to Max; many other drivers and results also
    play an important role.


    The Ergast Developer API ([`https://ergast.com/mrd/`](https://ergast.com/mrd/))
    lets you query all kinds of motor racing data and retrieve that in multiple formats.
    This site also offers all the tables in a CSV format, so we created an `F1DATA`
    schema where we could import the data. The original data set was a MySQL database,
    so we had to make some minor tweaks to the data model.


    The source files for this book can be found on GitHub at [`https://github.com/Apress/modern-oracle-database-programming`](https://github.com/Apress/modern-oracle-database-programming).


    # Part I: Advanced Basics


    In the first part of the book, several topics are bundled together, which should
    be in the toolbox of every Oracle Database developer. Frequently we meet experienced
    developers unfamiliar with collections and bulk operations, which have been around
    forever. The same is true for ANSI joins, analytic functions, row pattern matching,
    or conditional compilation.


    # Part II: Multiple Techniques and Languages


    The second part of the book highlights the integration between `SQL` and `PL/SQL`.
    Keeping context switches between the `SQL` and `PL/SQL` engine to a minimum is
    always better for performance.


    After the introduction of `JSON` into Oracle Database, it has taken flight in
    functionality and performance. There is a lot to learn when dealing with `JSON`
    in the database, and there are several chapters to get a headstart.


    # Part III: Oracle-Provided Functionality


    Out of the box, Oracle Database has a lot of functionality ready to use. In the
    third part of this book, some of these functionalities play a central role.


    Even if `APEX` is not used for front-end development, it offers some very useful
    packages that can be used in everyday database development. Edition-based redefinition
    enables zero downtime upgrades of your bespoke application. Getting data that
    is currently based on a period where it is valid can be handled by the database
    without having to write complicated `SQL` statements.'
