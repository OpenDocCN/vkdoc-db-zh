- fmt: '# 14. Generate, Compare, and Manipulate JSON


    ## Summary


    本章重点介绍了 SQL/JSON 函数。`json_value` 函数可以从 JSON 文档中提取标量值。`json_query` 函数允许从 JSON 文档中提取
    JSON 片段。`json_table` 函数在将 JSON 文档以关系格式投影方面起着关键作用。`json_serialize` 函数可以将 JSON 文档转换为文本格式。


    最后，解释了`json_exists`的用法以及如何在`where`子句或`CASE`表达式中应用它。


    从关系数据生成 JSON 文档是一个常见的需求，Oracle 数据库提供了必要的工具。本章探讨了 SQL 和 PL/SQL 中的这些可能性。


    还包括在 PL/SQL 中处理 JSON 文档的信息，例如提取数据和修改 JSON 文档。


    ## Generating JSON Documents


    要在 SQL 中生成 JSON 文档，有多个可用的函数。


    * `json` 是 Oracle Database 21c 新引入的一种非常灵活的生成 JSON 文档的方式。`JSON` 构造函数可以接受任何格式正确的
    JSON 字符串并返回 JSON 数据类型，包括 JSON 标量。它也可以与花括号一起使用来构造 JSON 对象，或与方括号一起使用来生成 JSON 数组。

    * `json_scalar` 接受一个 SQL 值并返回其 JSON 等效值。这在将日期、时间戳或间隔转换为正确的 ISO 8601 格式时特别有用，该功能在
    Oracle Database 21c 中是新的。

    * `json_object` 接受键值对并返回一个 JSON 对象。你可以使用通配符或列名作为输入。

    * `json_objectagg` 是一个聚合函数，接受键值对并返回一个单一的 JSON 对象。通常，键或值是表中的列。

    * `json_array` 接受一个或多个标量 SQL 表达式或列，将它们转换为 JSON 标量，并返回一个数组。

    * `json_arrayagg` 是一个聚合函数，接受一个列或 SQL 表达式并返回一个单一的 JSON 数组。


    所有这些函数都允许你从关系数据生成从简单到复杂的 JSON 文档。


    `json_scalar` 函数在将`date`、`timestamp`和`interval`转换为其 JSON 等效值时特别有用。以下示例将这些数据类型转换为
    ISO-8601 格式的 JSON。


    ```

    select json_scalar (current_date) as now

    from dual

    /

    NOW


    "2022-08-24T08:53:29"

    ```


    `json_scalar` 函数知道其源 SQL 数据类型。使用`json_value`函数配合相应的项方法可以将其转换回原始数据类型。以下示例显示了到 JSON
    标量（作为 VARCHAR2 格式的 ISO-8601）的转换，并且数据类型被保留。


    ```

    select json_value

    ( json_scalar (current_timestamp)

    , ''$''

    ) as now

    , json_value

    ( json_scalar (current_timestamp)

    , ''$.type()''

    ) as now_datatype

    from   dual

    /

    NOW                            NOW_DATATYPE

    ------------------------------ ------------------------

    2022-08-24T07:13:42.365662Z    timestamp with time zone

    ```


    以下示例使用 ISO-8601 标准将间隔转换为 JSON 等效值。


    ```

    select json_scalar ( to_dsinterval ( ''1 2:45:15'' ) ) as ds

    , json_scalar ( to_yminterval ( ''2-3'' ) ) as ym

    from   dual

    /

    DS                   YM

    -------------------- -------

    "P1DT2H45M15S"       "P2Y3M"

    ```


    提示：在 Oracle Database 21c 中，也可以在`to_dsinterval`和`to_yminterval`函数中使用 ISO-8601 间隔表示法。

    ```

    select to_dsinterval (''P1DT2H45M15S'') as ds

    from dual

    /

    DS

    --------------------

    +01 02:45:15.000000

    ```


    在以下示例中，使用了四种不同的方法来生成一个简单的对象。第一列使用显式的“key”和“value”关键字，第二列使用冒号 (`:`) 分隔键和值。第三列使用列名生成
    JSON 对象。最后，`json`操作符使用花括号和冒号来定义 JSON 对象。

    每种方法都生成相同的 JSON 对象（因此只显示一次）。


    ```

    select json_object ( key ''driverid'' value driverid ) as verbose

    , json_object ( ''driverid'' : driverid )  as colon

    , json_object ( driverid ) as col

    , json {''driverid'' : driverid} as curly_braces

    from   f1_drivers

    where  givenname = ''David''

    and    familyname = ''Coulthard''

    /

    {"driverid":"coulthard"}

    ```


    需要注意的是，可以传入多个列名来生成 JSON 对象，甚至可以使用星号 (`*`) 来选择所有列。


    ```

    select json_object ( familyname

    , nationality

    ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {"familyname":"Tuero","nationality":"Argentine"}

    {"familyname":"Gutiérrez","nationality":"Mexican"}

    {"familyname":"Ocon","nationality":"French"}

    ```


    为`f1_drivers`表中的每条记录返回一个 JSON 对象。当需要一个单一的 JSON 对象而不是三个独立的对象时，可以使用`json_objectagg`函数。


    ```

    select json_objectagg

    ( key familyname value nationality ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {"Tuero":"Argentine","Gutiérrez":"Mexican","Ocon":"French"}

    ```


    `json_objectagg`函数只能聚合单个键值对，但这个键值对可以是另一个 JSON 对象，以创建对象之中的对象（为了可读性，JSON 输出已被格式化）。


    ```

    select json_objectagg

    ( key givenname value json_object ( familyname

    , nationality

    )

    ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {

    "Esteban": {

    "familyname": "Tuero",

    "nationality": "Argentine"

    },

    "Esteban": {

    "familyname": "Gutiérrez",

    "nationality": "Mexican"

    },

    "Esteban": {

    "familyname": "Ocon",

    "nationality": "French"

    }

    }

    ```


    生成 JSON 数组可以通过使用`json_array`函数来完成。使用新的`json`构造函数，当使用方括号时也可以实现这一点。以下示例显示了两种表示法。每行显示一个数组。


    ```

    select json_array ( familyname, nationality ) as estebans

    , json [familyname, nationality] as estebans

    from f1_drivers

    where givenname = ''Esteban''

    /

    ESTEBANS                ESTEBANS

    ----------------------- -----------------------

    ["Tuero","Argentine"]   ["Tuero","Argentine"]

    ["Gutiérrez","Mexican"] ["Gutiérrez","Mexican"]

    ["Ocon","French"]       ["Ocon","French"]

    ```


    要生成一个单一的 JSON 数组，请使用`json_arrayagg`。以下示例显示了一个包含对象的单一数组。


    ```

    select json_arrayagg

    ( json {key familyname value nationality} ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    [{"Tuero":"Argentine"},{"Gutiérrez":"Mexican"},{"Ocon":"French"}]

    ```


    提示：当创建可能超过默认 4000 字节的较大、较复杂的 JSON 文档时，请在每个对象和数组级别使用返回`CLOB`/`BLOB`或返回`JSON`（Oracle
    Database 21c 及以上）。特别是在遇到以下错误时：`ORA-40478: output value too large`。


    以下示例展示了`json_object`、`json_array`和`json_arrayagg`的组合使用，以生成更复杂的 JSON 文档。JSON 文档的第一部分也被显示（以格式化形式）。在生成的
    JSON 文档中，有几点需要注意。


    * 场次在数组内按场次编号排序（`order by rce.round`）。

    * 前三名由相关子查询确定。

    * 当未来计划的比赛没有前三名时，前三名属性不会包含在 JSON 文档中（`absent on null`）。

    * 由于 JSON 文档的大小，它作为`CLOB`返回。当至少使用 Oracle Database 21c 时，它也可以作为`JSON`返回。

    * 为每一年创建一个 JSON 文档。当需要所有年份的单一文档时，请将`''raceresults''`属性的`json_array`改为`json_arrayagg`，并删除最后的`where`子句。'
  raw: '## Summary


    This chapter focused on SQL/JSON functions. The `json_value` function can extract
    scalar values from a JSON document. The `json_query` function allows you to extract
    JSON snippets from a JSON document. The `json_table` function plays a crucial
    role in projecting a JSON document in a relational format. The `json_serialize`
    function can change a JSON document to a textual format.


    Finally, the usage of `json_exists` and how to apply it in a `where` clause or
    a CASE expression were explained.


    # 14. Generate, Compare, and Manipulate JSON


    Generating JSON documents from relational data is a common requirement, and Oracle
    Database offers the necessary tools. This chapter looks at these possibilities
    in SQL and PL/SQL.


    There is also information about working with JSON documents in PL/SQL, like extracting
    data and making changes to a JSON document.


    ## Generating JSON Documents


    To generate JSON documents in SQL, there are several functions available.


    *   `json` is a very flexible way to generate JSON documents newly introduced
    in Oracle Database 21c. The JSON constructor can accept any well-formed JSON string
    and returns a JSON data type, including JSON scalars. It can also be used with
    curly braces to construct a JSON object or with square brackets to generate a
    JSON array.


    *   `json_scalar` accepts a SQL value and returns a JSON equivalent. This is especially
    useful when converting dates, timestamps, or intervals in the correct ISO 8601
    format, which is new in Oracle Database 21c.


    *   `json_object` accepts key-value pairs and returns a JSON object. You can use
    wildcard or column names as input.


    *   `json_objectagg` is an aggregate function that accepts key-value pairs and
    returns a single JSON object. Typically, the key or value are columns from a table.


    *   `json_array` accepts one or more scalar SQL expressions or columns turns them
    into JSON scalar, and returns an array.


    *   `json_arrayagg` is an aggregate function that accepts a column or SQL expression
    and returns a single JSON array.


    All these functions allow you to generate JSON documents from relational data
    from simple to complex.


    The `json_scalar` function is especially useful when converting `date`, `timestamp,`
    and `interval` to their JSON equivalent. The following example converts these
    data types to JSON in ISO-8601 format.


    ```

    select json_scalar (current_date) as now

    from dual

    /

    NOW


    "2022-08-24T08:53:29"

    ```


    The `json_scalar` function knows the SQL data type from which it was derived.
    The appropriate item method with the `json_value` function converts it back to
    its original data type. The following example shows the conversion to a JSON scalar,
    as VARCHAR2 in ISO-8601 format, and the data type is preserved.


    ```

    select json_value

    ( json_scalar (current_timestamp)

    , ''$''

    ) as now

    , json_value

    ( json_scalar (current_timestamp)

    , ''$.type()''

    ) as now_datatype

    from   dual

    /

    NOW                            NOW_DATATYPE

    ------------------------------ ------------------------

    2022-08-24T07:13:42.365662Z    timestamp with time zone

    ```


    The following example converts the interval to the JSON equivalent using the ISO-8601
    standard.


    ```

    select json_scalar ( to_dsinterval ( ''1 2:45:15'' ) ) as ds

    , json_scalar ( to_yminterval ( ''2-3'' ) ) as ym

    from   dual

    /

    DS                   YM

    -------------------- -------

    "P1DT2H45M15S"       "P2Y3M"

    ```


    Tip


    It is also possible in Oracle Database 21c to use the ISO-8601 interval notation
    in the `to_dsinterval` and `to_yminterval` functions.`select to_dsinterval (''P1DT2H45M15S'')
    as ds`


    `from dual/DS --------------------+01 02:45:15.000000`


    In the following example, four different methods are used to generate a simple
    object. The first column uses an explicit “key” and “value” keyword, and the second
    column uses a colon (`:`) to separate the key and value. The third column uses
    the name of the column to generate a JSON object. Finally, the `json` operator
    uses curly braces and a colon to define the JSON object.


    Each method generates the same JSON object (so it is only shown once).


    ```

    select json_object ( key ''driverid'' value driverid ) as verbose

    , json_object ( ''driverid'' : driverid )  as colon

    , json_object ( driverid ) as col

    , json {''driverid'' : driverid} as curly_braces

    from   f1_drivers

    where  givenname = ''David''

    and    familyname = ''Coulthard''

    /

    {"driverid":"coulthard"}

    ```


    It should be noted that it is possible to pass multiple column names in to generate
    a JSON object or even an asterisk to select all columns.


    ```

    select json_object ( familyname

    , nationality

    ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {"familyname":"Tuero","nationality":"Argentine"}

    {"familyname":"Gutiérrez","nationality":"Mexican"}

    {"familyname":"Ocon","nationality":"French"}

    ```


    A JSON object is returned for each record in the `f1_drivers` table. When it is
    desirable to have a single JSON object instead of three separate ones, the `json_objectagg`
    function can be used.


    ```

    select json_objectagg

    ( key familyname value nationality ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {"Tuero":"Argentine","Gutiérrez":"Mexican","Ocon":"French"}

    ```


    The `json_objectagg` function can only aggregate a single key-value pair, but
    this pair can be another JSON object to create an object of objects (the JSON
    output has been formatted for readability).


    ```

    select json_objectagg

    ( key givenname value json_object ( familyname

    , nationality

    )

    ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    {

    "Esteban": {

    "familyname": "Tuero",

    "nationality": "Argentine"

    },

    "Esteban": {

    "familyname": "Gutiérrez",

    "nationality": "Mexican"

    },

    "Esteban": {

    "familyname": "Ocon",

    "nationality": "French"

    }

    }

    ```


    Generating JSON arrays can be done by using the `json_array` function. With the
    new `json` constructor, this can also be achieved when square brackets are used.
    Both notations are shown in the following example. An array is shown for each
    row.


    ```

    select json_array ( familyname, nationality ) as estebans

    , json [familyname, nationality] as estebans

    from f1_drivers

    where givenname = ''Esteban''

    /

    ESTEBANS                ESTEBANS

    ----------------------- -----------------------

    ["Tuero","Argentine"]   ["Tuero","Argentine"]

    ["Gutiérrez","Mexican"] ["Gutiérrez","Mexican"]

    ["Ocon","French"]       ["Ocon","French"]

    ```


    To generate a single JSON array, use `json_arrayagg`. The following example shows
    a single array with objects.


    ```

    select json_arrayagg

    ( json {key familyname value nationality} ) as estebans

    from   f1_drivers

    where  givenname = ''Esteban''

    /

    ESTEBANS


    [{"Tuero":"Argentine"},{"Gutiérrez":"Mexican"},{"Ocon":"French"}]

    ```


    Tip


    When creating larger, more complex JSON documents which might exceed the default
    4000 bytes, use the returning CLOB/BLOB or returning JSON (Oracle Database 21c
    and up) at every object and array level. This is especially true when the following
    error is encountered: `ORA-40478: output value too large`


    The following example shows the combined use of `json_object`, `json_array`, and
    `json_arrayagg` to generate a more complex JSON document. The first part of the
    JSON document is also shown (in formatted form). In the resulting JSON document,
    there are a few things to note.


    *   The rounds are ordered by round number within the array (`order by rce.round`).


    *   The top three are determined by a correlated subquery.


    *   When there is no top three when a race is planned in the future, the top three
    attributes are not included in the JSON document (`absent on null`).


    *   Because of the size of the JSON document, it is returned as a CLOB. When at
    least Oracle Database 21c is used, it can also be returned as JSON.


    *   A JSON document for each year is created. When a single document is needed
    for all years, change `json_array` for the `''raceresults''` attribute to `json_arrayagg`
    and remove the final `where` clause.'
