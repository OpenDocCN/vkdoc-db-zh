- fmt: '## The Schema in the Oracle Cloud


    The data model used for most of the examples in this book was taken from the Ergast
    motor racing data website ([`https://ergast.com/mrd/`](https://ergast.com/mrd/))
    and imported into Oracle Database 19c and 21c.


    A schematic display of the Ergast F1 data model is displayed in Figure [I-1](#536316_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig1).
    We used Oracle Always Free Cloud Services for our database. We took the following
    steps to get the schemas up and running. Assuming you already have a database
    created and have access to the `admin` user.


    ![](images/536316_1_En_BookFrontmatter_Fig1_HTML.png)


    The flow structure of F 1 data status, qualifying, drivers, sprint results, constructors,
    constructor results, races, circuits, seasons, pitstops, driver standings, lap
    times, and results.


    Figure I-1: F1DATA schema


    Execute the following scripts using the schema listed.


    - **ADMIN**: Create a user `F1DATA`. Script: `F1Data_Create_User`

    - **F1DATA**: Create the tables. Script: `F1Data_Tables`

    - **F1DATA**: Apply the comments to the columns. Script: `F1Data_Comments`

    - **F1DATA**: Create public synonyms and grant access to the tables to the public.
    Script: `F1Data_Grants_And_Synonyms`

    - **F1DATA**: Create the polymorphic table function to split the CSV lines. The
    function is explained in Chapter [8](#536316_1_En_8_Chapter.xhtml). Script: `F1Data_Separated_PTF`


    In the cloud console, perform the following steps.


    Create a bucket in your cloud environment to store the CSV files. Create a pre-authenticated
    request for this bucket. Go to Create Pre-Authenticated Request*.*


    ![](images/536316_1_En_BookFrontmatter_Fig2_HTML.jpg)


    The screen displays the menu view bucket details, create pre-authenticated request,
    move resource, edit visibility, add tags, view tags, and delete.


    Figure I-2: Create a Pre-Authenticated Request menu


    Fill in the details and click Create Pre-Authenticated Request*.*


    ![](images/536316_1_En_BookFrontmatter_Fig3_HTML.jpg)


    The screen displays create pre-authentication request has name, request target,
    bucket, object and object with prefix, permit object reads, writes, and both read
    and writes options, expiration date, and create request button at the bottom.


    Figure I-3: Create Pre-Authenticated Request


    Copy the Pre-Authenticated Request URL and store it in a safe place. *It will
    not be shown again.*


    ![](images/536316_1_En_BookFrontmatter_Fig4_HTML.jpg)


    The screen displays to create a pre-authentication request name read-only, request
    U R L read-only, and copy this U R L for your records. It will not be shown again.
    and the close button is at the bottom.


    Figure I-4: Pre-Authenticated Request Details


    Download the latest CSV files from the Ergast Developer API website: [`http://ergast.com/downloads/f1db_csv.zip`](http://ergast.com/downloads/f1db_csv.zip).


    Unzip the CSV to your local machine. Upload the files to your bucket.


    Create an object store auth token. Go to *User settings*.


    ![](images/536316_1_En_BookFrontmatter_Fig5_HTML.jpg)


    The screen displays the profile with user settings, console settings, and sign-out.


    Figure I-5: User settings


    Click *Auth Tokens* under Resources.


    ![](images/536316_1_En_BookFrontmatter_Fig6_HTML.jpg)


    The screen displays the resource with options groups, A P keys, auth tokens, customer
    secret keys, database passwords, C auth 2.0 client credentials, and S M T P credentials.


    Figure I-6: Auth Tokens


    Click *Generate Token*.


    ![](images/536316_1_En_BookFrontmatter_Fig7_HTML.jpg)


    The screen displays auth tokens with a generate token button.


    Figure I-7: Generate Token


    Copy the generated token and store it in a safe place. *It will not be shown again.*


    ![](images/536316_1_En_BookFrontmatter_Fig8_HTML.jpg)


    The screen displays the generated token copy this token for your records. It will
    not be shown again. The show, copy and close button option is below.


    Figure I-8: Generated token


    In the `ADMIN` schema, execute the following files.


    - **ADMIN**: Create a credential. Replace `<<Authorization Token>>` with the token
    you generated in the previous step. Script: `F1Data_Create_Credential`

    - **ADMIN**: Import the data into the tables. Replace `<<URL Path (URI)>>` with
    your Pre-Authenticated Request URL path. Script: `F1Data_Import_Data`


    ### Acknowledgments


    When I was first approached to write this book, my first reaction was, “No, not
    again, too much work, don’t have the time.” After a good night’s sleep, it changed
    to “Yes, but not alone.” Thankfully, my dear friend and colleague Patrick Barel
    was brave enough to join me on this quest. I enjoyed working with you and bouncing
    ideas off you. Thanks, Patrick.


    Without a thorough technical review, this book would have looked totally different.
    Thank you, Kim Berg Hansen, for your insights, suggestions, and valuable feedback.
    Any outstanding errors in my chapters are, of course, my own.


    The data we used to show examples throughout the book comes from [`http://ergast.com`](http://ergast.com).
    Chris, the admin, was kind enough to allow us to use it.


    Without the continuing support of my wife, Rian, and my children, Tim and Lara,
    I could never have worked on this. Spending countless hours locked up in my office
    would not have been possible if you weren’t so understanding.


    Finally, I thank Apress for having confidence in this project. Thanks, Jonathan
    Gennick, for the initial idea, and Sowmya Thodur for keeping us on the straight
    and narrow.


    —Alex


    I want to thank everyone who made this project possible, Jonathan Gennick for
    inviting us to write this book, Apress for having confidence in us for writing
    this book; Sowmya Thodur for keeping us focussed on getting the book done on time;
    and Kim Berg Hansen for reviewing all the chapters—thanks for extra insights and
    nit-picking.


    I also thank Alex for inviting me to write this book with him. Writing a book
    was high on my bucket list, but I never came around to it. I really enjoyed working
    together with you on this project.


    And, of course, I want to thank my loving wife, Dana, for giving me the space
    and time to spend writing, and my children—Quinty, Kayleigh, and Mitchell, for
    keeping up with me when my mind was distracted by the book, instead of paying
    attention to them. Love you much.


    —Patrick


    ### About the Authors


    ### About the Technical Reviewer


    ## Part I: Advanced Basics


    ### 1. Underutilized Functionality and Enhancements


    With each Oracle Database release, more and more functionality is added to make
    database development easier, simpler, and/or more performant. Some of these enhancements
    are still relatively unknown to the average developer, and that’s a shame. Oracle
    Database has a lot to offer, which should be exploited to its full potential before
    you roll your own solution. In this chapter, the focus is on these functions that
    deserve more attention, like bulk operations, compound triggers, and error logging,
    to name a few. This chapter gives a short introduction and example of how to use
    them to raise awareness and for you to explore further. See the introduction for
    the tables used to follow along with the examples.'
