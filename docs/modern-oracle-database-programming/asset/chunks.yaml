- fmt: "# sys_connect_by_path, connect_by_root, connect_by_isleaf\n\n`sys_connect_by_path`\
    \ 函数返回从层次结构的根节点到当前节点的路径。\n\n为了在递归子查询因子化（recursive subquery factoring）中模拟此功能，在锚定成员（anchor\
    \ member）中添加一列并将其指定为根节点，在以下查询中别名为 `SCBP`。在每次迭代中，通过从递归成员中连接一个值来扩展此值，如清单 [9-4](#536316_1_En_9_Chapter.xhtml#PC19)\
    \ 所示。\n\n`connect_by_root` 一元操作符返回当前行用作其根节点的列。清单 [9-4](#536316_1_En_9_Chapter.xhtml#PC19)\
    \ 在 `CBR` 列中模拟了这一点。根节点的值在锚定成员中设置，并在递归成员中重复。\n\n`connect_by_isleaf` 伪列（pseudocolumn）在当前行是层次结构中的叶节点时返回\
    \ 1；否则返回 0。此函数可以在最终查询中使用 `CASE` 表达式和分析函数来实现。然而，有一个注意事项：所示的 `CASE` 表达式和分析函数仅在搜索条件设置为\
    \ `search depth first` 时才有效。\n\n这一点在清单 [9-4](#536316_1_En_9_Chapter.xhtml#PC19)\
    \ 中展示。\n\n```sql\nwith constructor_drivers as\n(\nselect 'c'||to_char (ctr.constructorid)\
    \ as pk\n, ctr.name\n, null as fk\nfrom   f1data.constructors ctr\nwhere  ctr.constructorref\
    \ in ('ferrari', 'mercedes')\nunion  all\nselect distinct\n'd'||to_char (drv.driverid)\n\
    , drv.surname as driver\n, 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results\
    \ rst\njoin   f1data.drivers drv\non   drv.driverid = rst.driverid\nunion  all\n\
    select 'champ'||to_char (min (dsg.driverstandingsid)),\nto_char (rce.year)||'\
    \ ('\n|| to_char (max (dsg.points)|| ' points)') as points,\n'd'||to_char (max\
    \ (dsg.driverid) keep (dense_rank first order  by dsg.points desc)) as driver\n\
    from   f1data.races rce\njoin   f1data.driverstandings dsg\non   rce.raceid =\
    \ dsg.raceid\ngroup  by rce.year\n)\n, hierarchy (pk, name, fk, lvl, scbp, cbr)\n\
    as (\nselect pk\n, name\n, fk\n, 1    as lvl\n, name as scbp\n, name as cbr\n\
    from   constructor_drivers\nwhere  fk is null\nunion  all\nselect cdv.pk\n, lpad\
    \ ('.', hier.lvl * 2, '.')||cdv.name\n, cdv.fk\n, hier.lvl + 1\n, hier.scbp ||',\
    \ '||cdv.name\n, hier.cbr\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
    on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n, scbp\n\
    , cbr\n, case\nwhen lvl >= lead ( lvl, 1, 1 )\nover ( order by seq )\nthen 'Y'\n\
    else 'N'\nend as leaf\nfrom   hierarchy\norder  by seq\n/\nLV SCBP           \
    \                          CBR        L\n-- ----------------------------------------\
    \ ---------- -\n1 Ferrari                                  Ferrari    N\n2 Ferrari,\
    \ Adolff                          Ferrari    Y\n2 Ferrari, Alboreto          \
    \              Ferrari    Y\n2 Ferrari, Alesi                           Ferrari\
    \    Y\n2 Ferrari, Allison                         Ferrari    Y\n2 Ferrari, Alonso\
    \                          Ferrari    N\n3 Ferrari, Alonso, 2005 (133 points)\
    \       Ferrari    Y\n3 Ferrari, Alonso, 2006 (134 points)       Ferrari    Y\n\
    2 Ferrari, Amon                            Ferrari    Y\n2 Ferrari, Andretti \
    \                       Ferrari    N\n3 Ferrari, Andretti, 1978 (64 points)  \
    \    Ferrari    Y\n2 Ferrari, Arnoux                          Ferrari    Y\n\n\
    Listing 9-4\nsys_connect_by_path simulation\n```\n\n## Sorting the Results\n\n\
    递归子查询因子化提供了两种对结果集进行排序的选项。层次结构可以从根级别遍历到其节点，然后再转到下一个根节点及其节点。使用传统编写层次查询的方法时，这是唯一的方式。\n\
    \n层次结构可以遍历所有根节点，然后再向下深入一级。它输出该级别的所有记录，再深入下一级，输出这些记录，依此类推。\n\n通过指定以下内容之一，将 `search`\
    \ 子句添加到递归子查询因子化查询中：\n\n```sql\nsearch depth first by  set \n```\n\n或\n\n```sql\n\
    search breadth first by  set \n```\n\n`search depth` 在转到下一个根节点之前，从根节点导航到叶节点。`search\
    \ breadth` 在导航到下一级别之前，输出同一级别的所有内容。\n\n> **注意**\n> 与所有未指定 `order by` 子句的查询一样，返回的结果集没有特定顺序。对于递归子查询也是如此。当需要排序时，需要在查询中添加\
    \ `order by` 子句。似乎递归子查询的默认排序是执行 `breadth first` 搜索，并且在每个级别内的顺序是不确定的。\n\n它可以是任何用于对结果排序的列。在\
    \ `set` 关键字之后，指定一个排序列，类似于搜索条件的别名。\n\n```sql\n, hierarchy (pk, name, fk, lvl)\n\
    as (\nselect pk\n, name\n, fk\n, 1    as lvl\nfrom   constructor_drivers\nwhere\
    \  fk is null\nunion  all\nselect cdv.pk\n, lpad ('.', hier.lvl * 2, '.')||cdv.name\n\
    , cdv.fk\n, hier.lvl + 1\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
    on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n,name\n\
    from   hierarchy\norder  by seq\n/\nLV NAME\n-- -------------------------\n1 Ferrari\n\
    2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n3 ....2005 (133\
    \ points)\n3 ....2006 (134 points)\n2 ..Amon\n2 ..Andretti\n3 ....1978 (64 points)\n\
    2 ..Arnoux\n2 ..Ascari\n3 ....1952 (36 points)\n3 ....1953 (34.5 points)\n\n1\
    \ Mercedes\n2 ..Bottas\n2 ..Fangio\n3 ....1951 (31 points)\n3 ....1954 (42 points)\n\
    3 ....1955 (40 points)\n3 ....1956 (30 points)\n3 ....1957 (40 points)\n\n```\n\
    \n前面的结果集显示了构造函数 Ferrari，然后是其车手（按字母顺序排列），以及该车手成为冠军的年份。在列出所有车手之后，显示了构造函数 Mercedes\
    \ 及其车手。\n\n将搜索条件更改为：\n\n```sql\nsearch breadth first by name set seq\n```\n\n\
    它产生以下结果：\n\n```sql\nLV NAME\n-- -------------------------\n1 Ferrari\n1 Mercedes\n\
    2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n2 ..Amon\n\n2 ..de\
    \ Tomaso\n2 ..de Tornaco\n2 ..von Stuck\n2 ..von Trips\n3 ....1950 (30 points)\n\
    3 ....1951 (31 points)\n3 ....1951 (31 points)\n3 ....1952 (36 points)\n3 ....1953\
    \ (34.5 points)\n3 ....1954 (42 points)\n\n```\n\n首先，显示级别 1 的所有记录（按字母顺序），然后是级别\
    \ 2 的所有记录，最后是级别 3 的所有记录。"
  raw: "#### sys_connect_by_path, connect_by_root, connect_by_isleaf\n\nThe `sys_connect_by_path`\
    \ function returns the path of the root of the hierarchy to the current node.\n\
    \nTo simulate this functionality in recursive subquery factoring, a column is\
    \ added and designated as the root in the anchor member, aliased as SCBP in the\
    \ following query. In each iteration, this value is extended by concatenating\
    \ a value from the recursive member, as seen in Listing [9-4](#536316_1_En_9_Chapter.xhtml#PC19).\n\
    \nThe `connect_by_root` unary operator returns the column that the current row\
    \ uses as its root. Listing [9-4](#536316_1_En_9_Chapter.xhtml#PC19) simulates\
    \ this in the CBR column. The root value is set in the anchor member and repeated\
    \ in the recursive member.\n\nThe `connect_by_isleaf` pseudocolumn returns one\
    \ when the current row is a leaf row in the hierarchy; otherwise, it returns a\
    \ zero. This function can be implemented using a CASE expression and an analytic\
    \ function in the final query. There is a catch, however. The shown CASE expression\
    \ and analytic function only work when the search condition is set to `search\
    \ depth first`.\n\nThis is shown in Listing [9-4](#536316_1_En_9_Chapter.xhtml#PC19).\n\
    \n```\nwith constructor_drivers as\n(\nselect 'c'||to_char (ctr.constructorid)\
    \ as pk\n, ctr.name\n, null as fk\nfrom   f1data.constructors ctr\nwhere  ctr.constructorref\
    \ in ('ferrari', 'mercedes')\nunion  all\nselect distinct\n'd'||to_char (drv.driverid)\n\
    , drv.surname as driver\n, 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results\
    \ rst\njoin   f1data.drivers drv\non   drv.driverid = rst.driverid\nunion  all\n\
    select 'champ'||to_char (min (dsg.driverstandingsid)),\nto_char (rce.year)||'\
    \ ('\n|| to_char (max (dsg.points)|| ' points)') as points,\n'd'||to_char (max\
    \ (dsg.driverid) keep (dense_rank first order  by dsg.points desc)) as driver\n\
    from   f1data.races rce\njoin   f1data.driverstandings dsg\non   rce.raceid =\
    \ dsg.raceid\ngroup  by rce.year\n)\n, hierarchy (pk, name, fk, lvl, scbp, cbr)\n\
    as (\nselect pk\n, name\n, fk\n, 1    as lvl\n, name as scbp\n, name as cbr\n\
    from   constructor_drivers\nwhere  fk is null\nunion  all\nselect cdv.pk\n, lpad\
    \ ('.', hier.lvl * 2, '.')||cdv.name\n, cdv.fk\n, hier.lvl + 1\n, hier.scbp ||',\
    \ '||cdv.name\n, hier.cbr\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
    on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n, scbp\n\
    , cbr\n, case\nwhen lvl >= lead ( lvl, 1, 1 )\nover ( order by seq )\nthen 'Y'\n\
    else 'N'\nend as leaf\nfrom   hierarchy\norder  by seq\n/\nLV SCBP           \
    \                          CBR        L\n-- ----------------------------------------\
    \ ---------- -\n1 Ferrari                                  Ferrari    N\n2 Ferrari,\
    \ Adolff                          Ferrari    Y\n2 Ferrari, Alboreto          \
    \              Ferrari    Y\n2 Ferrari, Alesi                           Ferrari\
    \    Y\n2 Ferrari, Allison                         Ferrari    Y\n2 Ferrari, Alonso\
    \                          Ferrari    N\n3 Ferrari, Alonso, 2005 (133 points)\
    \       Ferrari    Y\n3 Ferrari, Alonso, 2006 (134 points)       Ferrari    Y\n\
    2 Ferrari, Amon                            Ferrari    Y\n2 Ferrari, Andretti \
    \                       Ferrari    N\n3 Ferrari, Andretti, 1978 (64 points)  \
    \    Ferrari    Y\n2 Ferrari, Arnoux                          Ferrari    Y\n\n\
    Listing 9-4\nsys_connect_by_path simulation\n```\n\n#### Sorting the Results\n\
    \nRecursive subquery factoring offers two options to sort the result set. The\
    \ hierarchy can go from the root level to its nodes before going to the next root\
    \ and its nodes. This method is the only way with the traditional method of writing\
    \ hierarchical queries.\n\nThe hierarchy can navigate through all root nodes before\
    \ descending one level down. It outputs all records at that level, goes down a\
    \ level, outputs these records, and so on.\n\nThe `search` clause is added to\
    \ the recursive subquery factoring query by specifying either\n\n```\nsearch depth\
    \ first by  set \n```\n\nor\n\n```\nsearch breadth first by  set \n```\n\n`search\
    \ depth` navigates from root to leaf nodes before going to the next root node.\
    \ `search breadth` outputs everything at the same level before navigating to the\
    \ next level.\n\nNote\n\nAs with all queries not specifying an `order by` clause,\
    \ return the result set in no particular order. This is also true with recursive\
    \ subqueries. Add an `order by` clause to the query when sorting is needed. It\
    \ seems that the default sorting of a recursive subquery is to do a `breadth first`\
    \ search with an undetermined ordering at each level.\n\nIt can be any column\
    \ to order the results by. After the `set` keyword, an ordering column is specified,\
    \ like an alias for the search condition.\n\n```\n, hierarchy (pk, name, fk, lvl)\n\
    as (\nselect pk\n, name\n, fk\n, 1    as lvl\nfrom   constructor_drivers\nwhere\
    \  fk is null\nunion  all\nselect cdv.pk\n, lpad ('.', hier.lvl * 2, '.')||cdv.name\n\
    , cdv.fk\n, hier.lvl + 1\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
    on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n,name\n\
    from   hierarchy\norder  by seq\n/\nLV NAME\n-- -------------------------\n1 Ferrari\n\
    2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n3 ....2005 (133\
    \ points)\n3 ....2006 (134 points)\n2 ..Amon\n2 ..Andretti\n3 ....1978 (64 points)\n\
    2 ..Arnoux\n2 ..Ascari\n3 ....1952 (36 points)\n3 ....1953 (34.5 points)\n\n1\
    \ Mercedes\n2 ..Bottas\n2 ..Fangio\n3 ....1951 (31 points)\n3 ....1954 (42 points)\n\
    3 ....1955 (40 points)\n3 ....1956 (30 points)\n3 ....1957 (40 points)\n\n```\n\
    \nThe preceding result set shows the constructor Ferrari, followed by its drivers\
    \ (in alphabetical order), and when this driver was champion. After all the drivers\
    \ have been listed, the constructor Mercedes is shown with its drivers.\n\nChange\
    \ the search condition as follows.\n\n```\nsearch breadth first by name set seq\n\
    ```\n\nIt yields the following results.\n\n```\nLV NAME\n-- -------------------------\n\
    1 Ferrari\n1 Mercedes\n2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n\
    2 ..Amon\n\n2 ..de Tomaso\n2 ..de Tornaco\n2 ..von Stuck\n2 ..von Trips\n3 ....1950\
    \ (30 points)\n3 ....1951 (31 points)\n3 ....1951 (31 points)\n3 ....1952 (36\
    \ points)\n3 ....1953 (34.5 points)\n3 ....1954 (42 points)\n\n```\n\nFirst, all\
    \ records in level 1 are shown (in alphabetical order), followed by all records\
    \ in level 2, and finally, all records in level 3."
  trans: "\n# sys_connect_by_path, connect_by_root, connect_by_isleaf\n\n`sys_connect_by_path`\
    \ 函数返回从层次结构的根节点到当前节点的路径。\n\n为了在递归子查询因子化中模拟此功能，在锚定成员中添加一列并将其指定为根节点，在以下查询中别名为 `SCBP`。在每次迭代中，通过从递归成员中连接一个值来扩展此值，如清单\
    \ 9-4 所示。\n\n`connect_by_root` 一元操作符返回当前行用作其根节点的列。清单 9-4 在 `CBR` 列中模拟了这一点。根节点的值在锚定成员中设置，并在递归成员中重复。\n\
    \n`connect_by_isleaf` 伪列在当前行是层次结构中的叶节点时返回 1；否则返回 0。此函数可以在最终查询中使用 `CASE` 表达式和分析函数来实现。然而，有一个注意事项：所示的\
    \ `CASE` 表达式和分析函数仅在搜索条件设置为 `search depth first` 时才有效。\n\n这一点在清单 9-4 中展示。\n\n```sql\n\
    with constructor_drivers as\n(\nselect 'c'||to_char (ctr.constructorid) as pk\n\
    , ctr.name\n, null as fk\nfrom   f1data.constructors ctr\nwhere  ctr.constructorref\
    \ in ('ferrari', 'mercedes')\nunion  all\nselect distinct\n'd'||to_char (drv.driverid)\n\
    , drv.surname as driver\n, 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results\
    \ rst\njoin   f1data.drivers drv\non   drv.driverid = rst.driverid\nunion  all\n\
    select 'champ'||to_char (min (dsg.driverstandingsid)),\nto_char (rce.year)||'\
    \ ('\n|| to_char (max (dsg.points)|| ' points)') as points,\n'd'||to_char (max\
    \ (dsg.driverid) keep (dense_rank first order  by dsg.points desc)) as driver\n\
    from   f1data.races rce\njoin   f1data.driverstandings dsg\non   rce.raceid =\
    \ dsg.raceid\ngroup  by rce.year\n)\n, hierarchy (pk, name, fk, lvl, scbp, cbr)\n\
    as (\nselect pk\n, name\n, fk\n, 1    as lvl\n, name as scbp\n, name as cbr\n\
    from   constructor_drivers\nwhere  fk is null\nunion  all\nselect cdv.pk\n, lpad\
    \ ('.', hier.lvl * 2, '.')||cdv.name\n, cdv.fk\n, hier.lvl + 1\n, hier.scbp ||',\
    \ '||cdv.name\n, hier.cbr\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
    on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n, scbp\n\
    , cbr\n, case\nwhen lvl >= lead ( lvl, 1, 1 )\nover ( order by seq )\nthen 'Y'\n\
    else 'N'\nend as leaf\nfrom   hierarchy\norder  by seq\n/\nLV SCBP           \
    \                          CBR        L\n-- ----------------------------------------\
    \ ---------- -\n1 Ferrari                                  Ferrari    N\n2 Ferrari,\
    \ Adolff                          Ferrari    Y\n2 Ferrari, Alboreto          \
    \              Ferrari    Y\n2 Ferrari, Alesi                           Ferrari\
    \    Y\n2 Ferrari, Allison                         Ferrari    Y\n2 Ferrari, Alonso\
    \                          Ferrari    N\n3 Ferrari, Alonso, 2005 (133 points)\
    \       Ferrari    Y\n3 Ferrari, Alonso, 2006 (134 points)       Ferrari    Y\n\
    2 Ferrari, Amon                            Ferrari    Y\n2 Ferrari, Andretti \
    \                       Ferrari    N\n3 Ferrari, Andretti, 1978 (64 points)  \
    \    Ferrari    Y\n2 Ferrari, Arnoux                          Ferrari    Y\n\n\
    Listing 9-4\nsys_connect_by_path simulation\n```\n\n## 对结果排序\n\n递归子查询因子化提供了两种对结果集进行排序的选项。层次结构可以从根级别遍历到其节点，然后再转到下一个根节点及其节点。使用传统编写层次查询的方法时，这是唯一的方式。\n\
    \n层次结构可以遍历所有根节点，然后再向下深入一级。它输出该级别的所有记录，再深入下一级，输出这些记录，依此类推。\n\n通过指定以下内容之一，将 `search`\
