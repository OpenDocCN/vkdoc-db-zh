    ## 使用 CTAS 创建


    你也可以使用 `create table as select` 结构创建私有临时表。


    ```sql

    create private temporary table ora$ptt_drivers

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```


    创建临时表的默认选项是 `on commit drop definition`。但由于这是一个仅内存的结构，没有隐式提交，因此行数据在表中是可用的。你可以添加选项以在提交后保留定义。


    ```sql

    create private temporary table ora$ptt_drivers

    on commit preserve definition

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```


    私有临时表的定义仅对当前会话私有；因此 `on commit preserve definition` 意味着该定义将保留到会话结束，然后消失。你不能在私有临时表上创建索引。


    ## 表前缀


    私有临时表必须使用标准前缀。默认情况下，此前缀为 `ORA$PTT_`，因为它是在参数中设置的。


    ```sql

    select *

    from   v$parameter

    where  name = ''private_temp_table_prefix''

    /

    ```


    ## 临时表的限制


    尽管临时表看起来和行为上像常规表，但仍有一些限制。


    *   临时表不能被分区、集群或组织为索引。

    *   你不能在临时表上指定任何外键约束。

    *   临时表不能包含嵌套表的列。

    *   你不能指定 `LOB_storage_clause` 的以下子句：`TABLESPACE`、`storage_clause` 或 `logging_clause`。

    *   不支持对临时表进行并行 `UPDATE`、`DELETE` 和 `MERGE` 操作。

    *   对于临时表，`segment_attributes_clause` 中唯一可以指定的部分是 `TABLESPACE`，它允许你指定一个单一的临时表空间。

    *   不支持对临时表进行分布式事务。

    *   临时表不能包含 `INVISIBLE` 列。


    所有这些限制既适用于全局临时表，也适用于私有临时表。私有临时表在上述列表基础上还有更多限制。


    *   私有临时表的名称必须始终以 `init.ora` 参数 `PRIVATE_TEMP_TABLE_PREFIX` 定义的任何内容为前缀。默认是 `ORA$PTT_`。

    *   你不能在私有临时表上创建索引、物化视图或区域映射。

    *   不允许在私有临时表上定义主键或任何需要索引的约束。

    *   你不能定义带有默认值的列。

    *   你不能在任何永久对象（例如视图或触发器）中引用私有临时表。

    *   私有临时表通过数据库链接不可见。


    尽管看起来临时表有很多限制，但它们可能非常有用。你可能不会受到这些限制的阻碍。'
- fmt: "# External Table\n\n## 外部表基本概念\n\n外部表允许您像读取常规表一样从平面文件中读取数据。文件必须放置在 Oracle\
    \ 数据库可以访问的位置。如果您使用的是文件系统上的文件，则需要创建一个目录对象并告诉 Oracle 数据库查找位置。\n\n```sql\ncreate\
    \ or replace directory f1db_csv\nas '/media/sf_Ergast_F1/f1db_csv'\n/\n```\n\n\
    确保您对此位置拥有读取权限。如果使用`logfile`/`badfile`/`discardfile`，则还需要写入权限。\n\n现在，您可以使用`create\
    \ table … organization external`语法开始定义外部表。\n\n## 创建外部表\n\n定义的第一部分类似于常规表，但需要通过`organization\
    \ external`关键字指定其为外部表。\n\n```sql\ncreate table drivers_ext\n( driverid     number\
    \  (  11 )\n, driverref    varchar2( 255 )\n, drivernumber varchar2( 255 )\n,\
    \ code         varchar2(   3 )\n, forename     varchar2( 255 )\n, surname    \
    \  varchar2( 255 )\n, dob          date\n, nationality  varchar2( 255 )\n, url\
    \          varchar2( 255 )\n) organization external\n/\n```\n\n## 外部表属性\n\n现在，您需要指定外部表的属性。\n\
    \n*   `type` 指定外部表的类型。每种类型都由其自己的访问驱动程序支持。\n    *   `oracle_loader` 是默认的访问驱动程序。它将数据从外部表加载到内部表。它只能读取文本数据文件，不能写入文本文件，即不能用于将内部表卸载到外部表中。\n\
    \    *   `oracle_datapump` 可以执行加载和卸载操作。数据必须位于二进制转储文件中。您只能作为使用`create table as\
    \ select`语句创建外部表的一部分来使用此驱动程序写入转储文件。这是一次写入、多次读取的操作。您无法在外部表上执行任何 DML 操作。\n    *\
    \   `oracle_hdfs` 提取存储在 Hadoop 分布式文件系统 (HDFS) 中的数据。\n    *   `oracle_hive` 提取存储在\
    \ Apache HIVE 中的数据。\n*   `default directory` 指定用于所有输入和输出文件的默认目录（如果您没有显式指定目录对象）。它是一个目录对象，而不是目录路径。\n\
    *   `access parameters` 描述外部数据源并实现外部表的类型。每种类型的外部表都有自己的访问驱动程序，需要自己的访问参数。访问参数是可选的。部分访问参数包括以下内容。\n\
    \    *   `records delimited by newline` 指示记录结束的字符。在 Unix 或 Linux 操作系统上，`NEWLINE`\
    \ 被假定为`'\\n'`。在 Microsoft Windows 操作系统上，`NEWLINE` 被假定为`'\\r\\n'`。如果您在 Unix 环境中使用在\
    \ Windows 系统上创建的文件，换行符会被错误地解析。要解决此问题，可以使用`records delimited by detected newline`。\n\
    \    *   注：`Detected newline` 是自 Oracle Database 19c 起提供的选项。\n    *   `skip <n>`\
    \ 指定在加载前要跳过的记录数。主要用于文件包含头信息的情况。\n    *   `badfile <filename>` 指定当记录因错误而无法加载时，将记录写入的文件名。\n\
    \    *   `logfile <filename>` 指定在访问数据时将所有消息写入的文件名。\n    *   `discardfile <filename>`\
    \ 指定将所有未能满足`load when`子句条件的记录写入的文件名。\n    *   `fields terminated by` 指定字段分隔符。\n\
    \    *   `optionally enclosed by` 指定字段包围符。\n\n在访问参数中，您还可以指定文件中发现的列。它必须是表定义中列的超集。指定列时，可以对列执行有限的操作，例如将日期字符串转换为`date`数据类型。\n\
    \n```\ndob char( 10 ) date_format date mask \"YYYY-MM-DD\"\n```\n\n有关所有其他访问参数，请查阅\
    \ Oracle 文档。\n\n*   `location` 指定外部表的数据文件。对于`oracle_loader`和`oracle_datapump`，使用`directory:file`格式。目录部分是可选的。如果省略，则使用默认目录。使用`oracle_loader`驱动程序时，可以在文件名中使用通配符。星号（`*`）表示\
    \ 0 个或多个字符，问号（`?`）表示单个字符。\n*   对于`oracle_hdfs`，它是目录或文件的 URI（统一资源标识符）列表。目录对象与 URI\
    \ 无关。\n*   对于`oracle_hive`，不使用此子句。而是使用 Hadoop HCatalog 表。\n*   `reject limit <n>`\
    \ 指定在加载完全停止之前可以拒绝的记录数。\n\n除了为日志文件、错误文件和废弃文件指定文件名外，您还可以指定`nologfile`、`nobadfile`和`nodiscardfile`选项。不会创建任何文件。\n\
    \n日志文件可能非常有用并包含有价值的信息，但它们可能变得非常大。在提升到生产环境时，您可能希望使用`nologfile`选项。如果希望使用`logfile`/`badfile`/`discardfile`，最好将它们放在不同的位置，以便包含这些文件的目录对象可以被授予只读权限。\n\
    \n清单 [20-1](#536316_1_En_20_Chapter.xhtml#PC35) 是创建外部表的完整脚本。\n\n```sql\ncreate\
    \ table drivers_ext\n( driverid      number  (  11 )\n, driverref     varchar2(\
    \ 256 )\n, driver_number varchar2( 256 )\n, code          varchar2(   4 )\n, forename\
    \      varchar2( 256 )\n, surname       varchar2( 256 )\n, dob           date\n\
    , nationality   varchar2( 256 )\n, url           varchar2( 256 )\n) organization\
    \ external\n(\ntype oracle_loader\ndefault directory f1db_csv\naccess parameters\n\
    ( -- you can use comments,\n-- but only at the beginning the parameters\nrecords\
    \ delimited by newline\nskip 1\nbadfile 'drivers.bad'\nlogfile 'drivers.log'\n\
    fields terminated by ','\noptionally enclosed by '\"'\n( driverid\n, driverref\n\
    , driver_number\n, code\n, forename\n, surname\n, dob          char( 10 ) date_format\
    \ date mask \"YYYY-MM-DD\"\n, nationality\n, url\n)\n)\nlocation ( 'drivers.csv'\
    \ )\n)\nreject limit 0\n/\n```\n\n清单 20-1\n创建 `drivers_ext` 外部表的脚本\n\n## 修改与运行时操作\n\
    \n创建外部表后，您可以修改设置，例如将其指向另一个文件。\n\n```sql\nalter table drivers_ext location ( 'drivers100.csv'\
    \ )\n```\n\n如果更改访问参数，请注意，您未提供的每个参数都会恢复为其默认值。它不会保留您之前提供的设置。\n\nOracle Database\
    \ 12.2 引入了在运行时修改某些设置的选项。\n\n*   您可以在`access`参数中更改`badfile`、`logfile`和`discardfile`的文件名。其他`access`参数保留其值。\n\
    *   更改`default directory`；它必须是一个字面值。\n*   更改`location`；它可以是一个字面值或绑定变量。\n*   更改`reject\
    \ limit`；它可以是一个字面值或绑定变量。\n\n```sql\nselect count(*)\nfrom   drivers_ext external\
    \ modify (location ('drivers100.csv'))\n/\nCOUNT(*)\n\nselect count(*)\nfrom \
    \  drivers_ext\n/\nCOUNT(*)\n```\n\n## 内联外部表\n\n自 Oracle Database 18c 起，您无需创建外部表即可访问外部表。通常位于外部表\
    \ DDL 中的所有代码现在都可以放入 SQL 语句中。\n\n```sql\nselect * from external (\n( constructorId\
    \  number(11)\n, constructorRef varchar2(256)\n, name           varchar2(256)\n\
    , nationality    varchar2(256)\n, url            varchar2(256)\n)\ntype oracle_loader\n\
    default directory f1db_csv\naccess parameters\n( records delimited by newline\n\
    skip 1\nbadfile 'constructors.bad'\nlogfile 'constructors.log'\nfields terminated\
    \ by ','\noptionally enclosed by '\"'\n( constructorId\n, constructorRef\n, name\n\
    , nationality\n, url\n)\n)\nlocation ( 'constructors.csv' )\nreject limit 0\n\
    )\n```"
  raw: "## External Table\n\nExternal tables allow you to read data from flat files\
    \ like regular tables. The files must be placed in a location the Oracle database\
    \ can access. If you are using files on a filesystem, you need to create a directory\
    \ object and tell the Oracle database where to look.\n\n```\ncreate or replace\
    \ directory f1db_csv\nas '/media/sf_Ergast_F1/f1db_csv'\n/\n```\n\nMake sure you\
    \ have read access to this location. You also need write access if using the logfile/badfile/discardfile.\n\
    \nNow you can start defining the external table using the `create table … organization\
    \ external` syntax.\n\nThe first part of the definition is a lot like a regular\
    \ table, except you tell it to be external with the `organization external` keywords.\n\
    \n```\ncreate table drivers_ext\n( driverid     number  (  11 )\n, driverref \
    \   varchar2( 255 )\n, drivernumber varchar2( 255 )\n, code         varchar2(\
    \   3 )\n, forename     varchar2( 255 )\n, surname      varchar2( 255 )\n, dob\
    \          date\n, nationality  varchar2( 255 )\n, url          varchar2( 255\
    \ )\n) organization external\n/\n```\n\nNow you specify the attributes of the\
    \ external table.\n\n*   `type` specifies the type of the external table. Each\
    \ type is supported by its own access driver.\n    *   `oracle_loader` is the\
    \ default access driver. It loads data from external tables to internal tables.\
    \ It can only read text data files and cannot write to text files, i.e., it cannot\
    \ be used to unload internal tables into external tables.\n\n*   `oracle_datapump`\
    \ can perform both loads and unloads. The data must be in binary dump files. You\
    \ can use this driver to write a dump file only as part of creating the external\
    \ table using a `create table as select` statement. It is a write-once-read-many\
    \ operation. You cannot perform any DML on the external table.\n\n*   `oracle_hdfs`\
    \ extracts data stored in a Hadoop Distributed File System (HDFS).\n\n*   `oracle_hive`\
    \ extracts data that is stored in Apache HIVE.\n\n*   `default directory` specifies\
    \ the default directory to use for all input and output files if you don’t explicitly\
    \ specify a directory object. It is a directory object, not a directory path.\n\
    \n*   `access parameters` describe the external data source and implement the\
    \ type of external table. Each type of external table has its own access driver\
    \ and needs its own access parameters. Access parameters are optional. Some of\
    \ the access parameters include the following.\n    *   `records delimited by\
    \ newline` indicates the character that identifies the end of a record. On Unix\
    \ or Linux operating systems, NEWLINE is assumed to be '\\n'. On Microsoft Windows\
    \ operating systems, NEWLINE is assumed to be '\\r\\n'. The newline is incorrectly\
    \ parsed if you use a file created on a Windows system in a Unix environment.\
    \ To overcome this issue, you can use `records delimited by detected newline`.\n\
    \n**Note** Detected newline has been an option since Oracle Database 19c.\n\n\
    *   `skip <n>` specifies the number of records to skip before loading. Used primarily\
    \ if the file contains header information.\n\n*   `badfile <filename>` specifies\
    \ the filename to which records are written when they cannot be loaded because\
    \ of errors.\n\n*   `logfile <filename>` specifies the filename to which all the\
    \ messages are written while accessing the data.\n\n*   `discardfile <filename>`\
    \ specifies the filename to which all the records are written that fail the condition\
    \ of the `load when` clause.\n\n*   `fields terminated by` specifies the field\
    \ separation character.\n\n*   `optionally enclosed by` specifies field enclosure\
    \ characters.\n\nIn the access parameters, you can also specify the columns found\
    \ in the file. It must be a superset of the columns defined in the table definition.\
    \ When specifying the columns, you can perform a limited set of operations on\
    \ the columns, for instance, casting a date string to a `date` data type.\n\n\
    `dob char( 10 ) date_format date mask \"YYYY-MM-DD\"`\n\nFor all the other access\
    \ parameters, check the Oracle documentation.\n\n*   `location` specifies the\
    \ data file or data files for the external table. For `oracle_loader` and `oracle_datapump,`\
    \ use `directory:file` format. The directory part is optional. The default directory\
    \ is used if it is missing. When using the oracle_loader driver, you can use wildcards\
    \ in the filename. An asterisk (`*`) signifies 0 or more characters, and a question\
    \ mark (`?`) signifies a single character.\n\nFor `oracle_hdfs,` it is a list\
    \ of URIs (Uniform Resource Identifiers) for directories or files. Directory objects\
    \ are not associated with a URI.\n\nFor `oracle_hive,` the clause is not used.\
    \ Instead, the Hadoop HCatalog table is used.\n\n*   `reject limit <n>` specifies\
    \ how many records can be rejected before loading is stopped completely.\n\nInstead\
    \ of specifying filenames for the log file, the bad file, and the discard file,\
    \ you can specify the `nologfile`, `nobadfile,` and `nodiscardfile` options. No\
    \ files are created.\n\nThe log files can be very useful and contain valuable\
    \ information, but they can grow very big. You probably want to use the nologfile\
    \ option when promoting to a production environment. If you want to use the logfile/badfile/discardfile,\
    \ it is best to put them in a different location, so the directory object with\
    \ the files can be granted read-only privileges.\n\nListing [20-1](#536316_1_En_20_Chapter.xhtml#PC35)\
    \ is the complete script to create the external table.\n\n```\ncreate table drivers_ext\n\
    ( driverid      number  (  11 )\n, driverref     varchar2( 256 )\n, driver_number\
    \ varchar2( 256 )\n, code          varchar2(   4 )\n, forename      varchar2(\
    \ 256 )\n, surname       varchar2( 256 )\n, dob           date\n, nationality\
    \   varchar2( 256 )\n, url           varchar2( 256 )\n) organization external\n\
    (\ntype oracle_loader\ndefault directory f1db_csv\naccess parameters\n( -- you\
    \ can use comments,\n-- but only at the beginning the parameters\nrecords delimited\
    \ by newline\nskip 1\nbadfile 'drivers.bad'\nlogfile 'drivers.log'\nfields terminated\
    \ by ','\noptionally enclosed by '\"'\n( driverid\n, driverref\n, driver_number\n\
    , code\n, forename\n, surname\n, dob          char( 10 ) date_format date mask\
    \ \"YYYY-MM-DD\"\n, nationality\n, url\n)\n)\nlocation ( 'drivers.csv' )\n)\n\
    reject limit 0\n/\nListing 20-1\nScript to create the drivers_ext external table\n\
    ```\n\nYou can modify the settings after you create the external table, like pointing\
    \ it to another file.\n\n```\nalter table drivers_ext location ( 'drivers100.csv'\
    \ )\n```\n\nIf you change the access parameters, be aware that every parameter\
    \ you don’t supply reverts to its default. It doesn’t retain the setting you gave\
    \ it earlier.\n\nOracle Database 12.2 introduced the option to modify some settings\
    \ at runtime.\n\n*   You can change the filenames for the badfile, logfile, and\
    \ discardfile in the `access` parameters. The other `access` parameters retain\
    \ their values.\n\n*   Change the `default directory`; it must be a literal value.\n\
    \n*   Change the `location`; it can be a literal value or a bind variable.\n\n\
    *   Change the `reject limit`; it can be a literal value or a bind variable.\n\
    \n```\nselect count(*)\nfrom   drivers_ext external modify (location ('drivers100.csv'))\n\
    /\nCOUNT(*)\n\nselect count(*)\nfrom   drivers_ext\n/\nCOUNT(*)\n\n```\n\nSince\
    \ Oracle Database 18c, you can access external tables without creating an external\
    \ table. All the code normally in the DDL for an external table can now be put\
    \ inside the SQL statement.\n\n```\nselect * from external (\n( constructorId\
    \  number(11)\n, constructorRef varchar2(256)\n, name           varchar2(256)\n\
    , nationality    varchar2(256)\n, url            varchar2(256)\n)\ntype oracle_loader\n\
    default directory f1db_csv\naccess parameters\n( records delimited by newline\n\
    skip 1\nbadfile 'constructors.bad'\nlogfile 'constructors.log'\nfields terminated\
    \ by ','\noptionally enclosed by '\"'\n( constructorId\n, constructorRef\n, name\n\
    , nationality\n, url\n)\n)\nlocation ( 'constructors.csv' )\nreject limit 0\n\
    )\n```"
