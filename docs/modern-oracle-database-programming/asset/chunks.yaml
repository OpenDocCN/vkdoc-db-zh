- fmt: '### Table-Type SQL Macros


    A table-type SQL Macro returns a piece of SQL text that results in a set of rows.
    A parametrized view is one of the use cases for a table-type SQL Macro. A view
    gives you access to a limited set of data. A parametrized view in a SQL Macro
    can give you access to a subset of that data set, depending on the parameters
    you provide.


    Of course, you can implement a pseudo-parameterized view by utilizing an application
    context and using `SYS_CONTEXT` in the `where` clause of the view, but this requires
    many more components and might not always be obvious how to utilize the view.
    Using a SQL Macro, it is immediately obvious that you can pass an argument limiting
    the output of the result set.


    ```

    select *

    from   drivers( nationality => ''Dutch'' )

    /

    ```


    Note

    See “parametrized view” in the column splitter use case for implementing this
    SQL Macro.


    But you can also manipulate the data returned for each row. As long as you can
    build it in pure SQL, you can build a SQL Macro for it.


    ### Scalar-Type SQL Macro


    A scalar-type SQL Macro returns a piece of SQL text that results in a scalar value.
    A scalar-type SQL Macro cannot have table arguments, only scalar arguments.


    ## Use Cases


    There are endless use cases for SQL Macros. You can build a column splitter, like
    the one done as a PTF—only a lot simpler. You can build parametrized views. You
    can build scalar macros to capture formulas that you would normally implement
    in PL/SQL functions. You can also implement support for functionality available
    in other databases, like MySQL.


    ### Parametrized View


    If you want to show the total time, the lap count, and the average lap times per
    driver for a specific race, create a view that returns these values for all races
    (see Listing [8-7](#536316_1_En_8_Chapter.xhtml#PC34)).


    ```

    create or replace view v_averagelaptime as

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    , count( ltm.lap )        as lapcount

    , avg( ltm.milliseconds ) as averagemilliseconds

    from   f1data.laptimes ltm

    group  by ltm.raceid

    , ltm.driverid

    /

    Listing 8-7

    v_averagelaptime view

    ```


    In your query, you must limit the result returned by adding a predicate.


    ```

    select *

    from   v_averagelaptime alp

    where  alp.raceid = 1093 -- United States Grand Prix 2022

    and  alp.driverid = 830 -- Max Verstappen

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093      830           6131687       56    109494,410714286


    select *

    from   v_averagelaptime alp

    where  alp.raceid = 1093 -- United States Grand Prix 2022

    and  alp.driverid = 1  -- Lewis Hamilton

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093        1           6136710       56    109584,107142857

    ```


    If you encapsulate this view in a SQL Macro, you make it a parametrized view.


    ```

    create or replace

    function averagelaptime( raceid_in   in number

    , driverid_in in number )

    return varchar2 sql_macro( table ) is

    begin

    return q''[

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    , count( ltm.lap )        as lapcount

    , avg( ltm.milliseconds ) as averagemilliseconds

    from   f1data.laptimes ltm

    where  ltm.raceid   = raceid_in

    and    ltm.driverid = driverid_in

    group  by ltm.raceid

    , ltm.driverid

    ]'';

    end;

    /

    Listing 8-8

    averagelaptime SQL Macro

    ```


    Then your queries become simpler.


    ```

    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 830 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093      830           6131687       56    109494,410714286


    select *

    from   averagelaptime( raceid_in   => 1093

    , driverid_in => 1 )

    /

    RACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS

    ------ -------- ----------------- -------- -------------------

    1093        1           6136710       56    109584,107142857

    ```


    ### Column Splitter (Table)


    You already saw an example of splitting a column into separate columns using PTFs.
    Let’s revisit that functionality, but now using SQL Macros.


    For this function, you need a table parameter for the table (or view or result
    set) to be processed and a parameter to tell the macro which columns to create
    in the output.


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    ```


    The function returns a `VARCHAR2`, which is a `sql_macro` of type `table`.


    ```

    return varchar2 sql_macro( table ) is

    ```


    In the macro, build up the SQL text to split the column into the new columns.


    ```

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split || q''[, trim( '';]'' ||

    q''['' from regexp_substr( ]'' ||

    table_in.column( 1 ).description.name ||

    q''[, ''{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    ```


    This is roughly the same code used in the PTF example.


    Because every new column has a leading space, you end up with a list of columns
    where you must strip the leading comma (`,`) to make it a valid piece of SQL text.


    ```

    l_split := trim( leading '','' from l_split );

    ```


    Now let’s build the complete SQL statement that results in the table you can select
    from.


    ```

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    ```


    In the preceding statement, `table_in` is replaced with the value of the `table_in`
    parameter.


    Listing [8-9](#536316_1_En_8_Chapter.xhtml#PC43) is the complete script.


    ```

    create or replace function split

    (

    table_in   in dbms_tf.table_t

    , columns_in in dbms_tf.columns_t default null

    )

    return varchar2 sql_macro( table ) is

    l_sql         varchar2( 32767 );

    l_split       varchar2( 32767 );

    begin

    for cols in columns_in.first .. columns_in.last

    loop

    l_split := l_split ||

    q''[, trim( '';'' from regexp_substr( ]''||

    table_in.column( 1 ).description.name ||

    q''[, ''[^;]*;{0,1}'', 1, ]'' ||

    cols || q''[ ) ) ]'' ||

    columns_in( cols );

    end loop;

    l_split := trim( leading '','' from l_split );

    l_sql   := q''[select t.*, ]'' ||

    l_split ||

    q''[ from table_in t]'';

    dbms_tf.trace( l_sql );

    return l_sql;

    end;

    /

    Listing 8-9

    Split SQL Macro

    ```


    #### Splitting Columns with a SQL Macro


    With the same table in the PTF example of a split function, you can use a similar
    SQL statement to transform these separated values into individual columns.


    ```

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from split( f1drivers

    , columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

    /

    ```


    You get the same result as with the PTF. As you can see, there is a lot less code
    involved in this approach.'
