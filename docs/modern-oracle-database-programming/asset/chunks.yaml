    ## Summary


    There are many things to learn when dealing with JSON documents. Getting to grips
    with path expressions and filters might be the most important thing in this chapter.
    Understanding how path expressions and filters work makes working with JSON documents
    much simpler. Handling errors in the path expressions clarifies when a null is
    encountered.


    Finally, the dot notation syntax is introduced, an easy way to convert JSON documents
    into a relational format.


    # 13. SQL/JSON and Conditions


    Having JSON documents stored in the database is one thing, and knowing how to
    navigate through the document is another, but extracting the data into a relational
    format is what it is all about.


    This chapter focuses on this transformation, creating a relational output from
    a JSON document using SQL statements.


    The examples in this chapter use the sample data from the previous chapter.


    ## SQL/JSON Functions


    Four SQL functions can be used to extract values from a JSON document.


    *   `json_value` extracts a scalar JSON value and returns the SQL equivalent

    *   `json_query` extracts a fragment of the JSON document

    *   `json_table` transforms the JSON document into a relational format

    *   `json_serialize` transforms a JSON document and returns a textual representation


    Each of these functions is examined separately in the next sections.


    ### JSON_VALUE


    The SQL/JSON `json_value` function *must* target a scalar JSON value. It raises
    an error when it targets a non-scalar value, an `OBJECT`, or an `ARRAY`. By default,
    an error in the JSON path expression returns a `NULL` value, which can be overridden
    in the `on error` clause.


    There are several reasons an error can occur, which can be handled in the `on
    error` clause.


    *   The JSON document is not well-formed.

    *   A non-scalar value is found when the JSON data is evaluated by the JSON path
    expression.

    *   No match is found when the JSON data is evaluated, like when an attribute
    doesn’t exist; this case can also be handled by the `on empty` clause, which has
    precedence over `on error`.

    *   The return value data type is not large enough to hold the returned value.


    The first argument to pass into the `json_value` function can be any text literal,
    `BLOB`, or `JSON`. An error is raised when the text literal or `BLOB` is not well-formed
    JSON.


    The second argument is the JSON path expression which targets the value of interest.
    This JSON path expression can include filter conditions as well as item methods.
    An item method can influence the data type retrieved from the JSON document; however,
    it is also possible to specify the data type that the `json_value` should return
    in the `returning` clause.


    In the `returning` clause, the SQL data type can be specified how the JSON value
    needs to be returned. By default, when the `returning` clause is omitted, a `varchar2(4000)`
    is returned.


    **Tip:** You have more control over the returned data type with the `returning`
    clause. It is possible to specify the length of a string, for example, `varchar2(10)`.
    This is not possible with the `string()` item method.


    This section covers the most common data types, like `STRING`, `NUMBER`, `DATE`,
    and `BOOLEAN`, but it is also possible to return other data types, like `TIMESTAMP`
    (with or without timezone), `INTERVAL`, `CHAR`, `BLOB`, `CLOB`, or `SDO_GEOMETRY`.


    In the following query, the family name of a driver is targeted, and a `varchar2(6)`
    is returned.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].familyName''

    returning varchar2(6)

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    Vettel

    ```


    The driver’s name is six characters, and the `returning` clause specifies `varchar2(6)`.
    The preceding query works fine. When the JSON path expression targets the other
    driver, whose name is nine characters, an error is raised (the default is to return
    null when an error occurs).


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(6)

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    ```


    Instead of increasing the size of the returning value, it is also possible to
    add the `truncate` clause to the `returning` clause. The returned value is truncated
    whenever the targeted value exceeds the requested length.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(6) truncate

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    Coulth

    ```


    The permanent number of the driver is numeric, but in the JSON document, it is
    a string. With the `returning` clause, this can be converted to a number. The
    right alignment in the result set indicates that it is a true number.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].permanentNumber''

    returning number

    ) as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER

    ---------------

    ```


    The date of birth in the JSON document is a string. JSON doesn’t have a date data
    type. The `dateOfBirth` string is in the ISO 8601 format, so this can be converted
    into a SQL date data type.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].dateOfBirth''

    returning date

    ) as dateofbirth

    from f1_drivers_json f

    /

    DATEOFBIR

    ---------

    27-MAR-71

    ```'
