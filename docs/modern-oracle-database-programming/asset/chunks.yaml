    \  'Error '\n    || indx\n    || ' occurred on index '\n    || sql%bulk_exceptions(\
    \ indx ).\n    error_index\n    || '.'\n    );\n    dbms_output.put_line(  'Oracle\
    \ error is '\n    || sqlerrm( -1 *\n    sql%bulk_exceptions( indx ).\n    error_code)\n\
    \    );        end loop;\n    end;\n    end if;\n    end;\n    /\n    Error 1\
    \ occurred on index 25.\n    Oracle error is ORA-00001: unique constraint (.)\
    \ violated\n    Error 2 occurred on index 31.\n    Oracle error is ORA-00001:\
    \ unique constraint (.) violated\n    Error 3 occurred on index 32.\n    Oracle\
    \ error is ORA-00001: unique constraint (.) violated\n    Error 4 occurred on\
    \ index 36.\n    Oracle error is ORA-00001: unique constraint (.) violated\n \
