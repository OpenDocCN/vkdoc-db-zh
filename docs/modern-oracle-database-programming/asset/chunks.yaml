    \  Pérez      Red Bull        28/03/2021    03/07/2022\n12 rows selected\n```\n\
    \n### DBMS_FLASHBACK_ARCHIVE\n\n使用 `dbms_flashback_archive.enable_at_valid_time`，可以将有效性日期设置为一个固定日期，这样就不必在每个查询中添加\
    \ `as of period` 子句。该过程的参数在表 18-1 中描述。\n\n表 18-1\nenable_at_valid_time 过程参数\n\n\
    | 参数 (Parameter) | 必填 (Mandatory) | 描述 (Description) |\n| --- | --- | --- |\n\
    | level | Y | 选项：− ALL 显示所有数据（默认值）− CURRENT 仅显示在当前时间戳有效的数据。数据会随时间推移而变得可见或不可见。−\
    \ ASOF 显示在下一个参数设置的时间戳有效的数据。 |\n| query_time |   | 仅在 level 为 ASOF 时使用仅显示有效数据 |\n\
    \n将闪回归档设置为 2022 赛季开始时。\n\n```sql\nbegin\ndbms_flashback_archive.enable_at_valid_time\n\
    ( level      => 'ASOF'\n, query_time => to_date( '20220320','YYYYMMDD' )\n);\n\
    end;\n/\n```\n\n你可以使用一个简单的查询（注意这里没有 `as of period` 子句）来获得与第一个示例相同的结果。\n\n```sql\n\
    select d.forename as firstname\n, d.surname  as lastname\n, c.name     as constructorname\n\
    from   driverconstructors  dc\njoin   f1data.drivers      d\non     (dc.driverid\
    \ = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid = c.constructorid)\n\
    order  by constructorname, lastname, firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAM\n\
    ------------ ------------ --------------\nValtteri     Bottas       Alfa Romeo\n\
    Guanyu       Zhou         Alfa Romeo\nPierre       Gasly        AlphaTauri\nYuki\
    \         Tsunoda      AlphaTauri\nFernando     Alonso       Alpine F1 Team\n\
    Esteban      Ocon         Alpine F1 Team\nNico         Hülkenberg   Aston Martin\n\
    Lance        Stroll       Aston Martin\nSebastian    Vettel       Aston Martin\n\
    Charles      Leclerc      Ferrari\nCarlos       Sainz        Ferrari\nKevin  \
    \      Magnussen    Haas F1 Team\nMick         Schumacher   Haas F1 Team\nLando\
    \        Norris       McLaren\nDaniel       Ricciardo    McLaren\nLewis      \
    \  Hamilton     Mercedes\nGeorge       Russell      Mercedes\nSergio       Pérez\
    \        Red Bull\nMax          Verstappen   Red Bull\nAlexander    Albon    \
    \    Williams\nNicholas     Latifi       Williams\n21 rows selected\n```\n\n要恢复到“正常”操作，调用将\
    \ level 设置为 `ALL` 的 `dbms_flashback_archive.enable_at_valid_time`，或调用 `dbms_flashback_archive.disable_asof_valid_time`\
    \ 过程。\n\n```sql\nbegin\ndbms_flashback_archive.disable_asof_valid_time;\nend;\n\
    /\n```\n\n### 虚拟专用数据库 (Virtual Private Database)\n\n虚拟专用数据库 (VPD) 使得每个终端用户都好像拥有自己的数据库，而实际上仍然使用单一的代码库和表集。假设一级方程式车队不允许查看其他车队的测试结果（实际情况并非如此，但在此示例中假设如此）。你可以在数据库中构建不同的模式，每个模式都有自己的表。当添加一场比赛的结果时，你必须将数据添加到正确的模式中。更简单的方法是在一个模式中创建一个表，并让\
    \ Oracle 数据库显示正确的数据。\n\n当表是 VPD 的一部分时，Oracle 数据库会在底层向针对该表发出的任何 SQL 语句添加一个额外的谓词。这可以是从该表进行的单次\
    \ `select` 查询，也可以是当该表用于连接或子查询时。要定义这个额外的谓词，你必须先定义一个策略函数，然后将此函数与表关联。\n\n### 策略函数\
    \ (The Policy Function)\n\nOracle 数据库按顺序以两个参数 `schemaname` 和 `tablename` 调用此过程。VPD\
    \ 使用的策略函数签名如下。\n\n```sql\nfunction \n(  in varchar2\n,   in varchar2)\nreturn\
    \ varchar2\n```\n\n该函数必须返回一个有效的谓词，该谓词将被添加到针对此表发出的任何 SQL 语句中。\n\n你可以在策略函数中执行任何操作，但它会被非常频繁地调用，如果函数需要很长时间才能完成，那么针对该表的每个\
    \ SQL 语句也会花费很长时间。\n\n代码清单 18-2 展示了一个策略函数，用于确保一个车队只能看到其自身的数据。\n\n```sql\ncreate\
    \ or replace function thisconstructoronly\n( schemaname_in in varchar2\n, tablename_in\
    \  in varchar2\n) return varchar2\nis\nbegin\nreturn q'[constructorid = sys_context\n\
    ( 'CONSTRUCTOR_CTX'\n, 'CONSTRUCTORID'\n)]';\nend;\n/\n代码清单 18-2\n策略函数 thisconstructoronly\n\
    ```\n\n此函数返回一个包含以下内容的 VARCHAR2。\n\n```sql\nconstructorid = sys_context( 'CONSTRUCTOR_CTX',\
    \ 'CONSTRUCTORID' )\n```\n"
- fmt: '### Context


    The easiest (and fastest) way to communicate settings from outside the policy
    function to the policy function or the predicate it results in is using `application
    context`.


    You can create a context by using this command.


    ```sql

    create or replace context constructor_ctx using context_pkg

    /

    ```


    Then you build a package to set (or clear) properties within the context. They
    must be set using the associated package. Listing [18-3](#536316_1_En_18_Chapter.xhtml#PC15)
    features the package to communicate with the context.


    ```sql

    create or replace package context_pkg as

    procedure set_constructor( constructorid_in in number );

    procedure unset_constructor;

    end;

    /

    create or replace package body context_pkg as

    procedure set_constructor(constructorid_in in number)

    is

    begin

    dbms_session.set_context( namespace => ''CONSTRUCTOR_CTX''

    , attribute => ''CONSTRUCTORID''

    , value     => constructorid_in

    );

    end set_constructor;

    procedure unset_constructor

    is

    begin

    dbms_session.clear_context( namespace => ''CONSTRUCTOR_CTX'' );

    end unset_constructor;

    end context_pkg;

    /

    ```


    Listing 18-3

    `context_pkg` to communicate with the `constructor_ctx`


    ### Policy


    This predicate must now be added to every statement issued against the table.
    You must create a VPD policy to connect the policy function to the table.


    #### add_policy


    The `dbms_rls.add_policy` procedure can take the parameters described in Table
    [18-2](#536316_1_En_18_Chapter.xhtml#Tab2).


    Table 18-3

    Policy Types


    | Type | Description |

    | --- | --- |

    | `DYNAMIC` | This policy type runs the policy function each time a user accesses
    the VPD-protected database objects. |

    | `STATIC` | This policy type runs the policy function once, then shares the outcome
    in the SGA. The static policy type enforces the same predicate for all users in
    the instance. |

    | `SHARED_STATIC` | You can use the same policy function for multiple tables.
    |

    | `CONTEXT_SENSITIVE` | If there is no change in the local application context,
    Oracle Database does not rerun the policy function within the user session. If
    there is a change in any application context attribute during the user session,
    it doesn’t even have to be referenced; by default, the database re-executes the
    policy function to ensure that it captures all changes to the predicate since
    the initial parsing. |

    | `SHARED_CONTEXT_SENSITIVE` | This is used when there is the same policy function
    for multiple tables. |


    Table 18-2

    Parameters for the Add Policy Procedure


    | Parameter | Mandatory | Description |

    | --- | --- | --- |

    | `object_schema` | | The schema in which the object to be protected resides.
    If null, then the current schema is assumed. |

    | `object_name` | Y | The name of the object that is to be protected. |

    | `policy_name` | Y | An arbitrarily chosen name. Use this name to enable/disable
    and drop the policy. |

    | `function_schema` | | The schema in which the policy function resides. If null,
    then the current schema is assumed. |

    | `policy_function` | Y | The name of the policy function. |

    | `statement_types` | | Statement type that the policy applies to, `select`, `insert`,
    `update`, `delete`, or `index`. Default is any type, except `index`. |

    | `update_check` | | Policy is checked against the updated or inserted value.
    Ability to see the information after the statement is executed, based on the policy.
    |

    | `Enable` | | Is the policy enabled? |

    | `static_policy` | | Will the policy always result in the same predicate? |

    | `policy_type` | | Choose from these options: `DYNAMIC`, `STATIC`, `SHARED_STATIC`,
    `CONTEXT_SENSITIVE`, `SHARED_CONTEXT_SENSITIVE`. Overwrites `static_policy` if
    non-null. (See Table [18-3](#536316_1_En_18_Chapter.xhtml#Tab3) for an explanation
    of these types.) |

    | `long_predicate` | | Predicate returned has a maximum length of 4000 bytes (default)
    or 32K. |

    | `sec_relevant_cols` | | List of security-relevant columns. The policy function
    is executed when one of these columns is referenced. |

    | `sec_relevant_cols_opt` | | If set to `dbms_rls.all_rows`, all rows returned,
    but with the columns specified in the security relevant column option nullified.
    |

    | `namespace` | | The name of application context namespace. |

    | `attribute` | | The name of application context attribute. |


    If you query the constructors table you see information of all constructors.


    ```sql

    select c.constructorid

    , c.name

    , c.nationality

    from   f1data.constructors c

    /

    ```


    ```

    CONST NAME            NATIONALITY

    ----- --------------- ---------------

    1 McLaren         British

    2 BMW Sauber      German

    3 Williams        British

    4 Renault         French

    5 Toro Rosso      Italian

    6 Ferrari         Italian

    7 Toyota          Japanese

    8 Super Aguri     Japanese

    9 Red Bull        Austrian

    10 Force India     Indian

    ...

    ```


    ```sql

    select cr.constructorresultsid as crid

    , cr.constructorid        as cid

    , cr.raceid               as rid

    , cr.points               as points

    from   f1data.constructorresults cr

    /

    ```


    ```

    CRID   CID   RID POINT

    ----- ----- ----- -----

    1197     6   133    16

    1198     3   133     4

    1199    16   133     5

    1200    15   133     1

    1201    17   133     0

    1202     1   133     0

    1203    19   133     0

    1204     4   133     0

    1205    21   133     0

    1206     7   133     0

    ...

    ```


    ```sql

    select cs.constructorstandingsid as csid

    , cs.constructorid          as cid

    , cs.position               as pos

    , cs.points                 as pnts

    from   f1data.constructorstandings cs

    where  rownum < 11

    /

    ```


    ```

    CSID   CID   POS  PNTS

    ----- ----- ----- -----

    6242    15     6    18

    6241     1     5    32

    6240    16     3    67

    6239     3     4    41

    6238     4     2    79

    6237     6     1   174

    6256    18    10     1

    6255    17     9     5

    6254     7     7     8

    6253    19     8     7

    ...

    ```


    Because these three tables all have constructor information (`CONSTRUCTORS`, `CONSTRUCTORRESULTS`,
    and `CONSTRUCTORSTANDINGS`) and you want to use the same policy for all three
    tables, add three shared static policies.


    ```sql

    begin

    sys.dbms_rls.add_policy

    ( object_schema   => ''F1DATA''

    , object_name     => ''CONSTRUCTORS''

    , policy_name     => ''THISCONSTRUCTOR''

    , function_schema => ''BOOK''

    , policy_function => ''THISCONSTRUCTORONLY''

    , policy_type     => sys.dbms_rls.shared_static

    );

    sys.dbms_rls.add_policy

    ( object_schema   => ''F1DATA''

    , object_name     => ''CONSTRUCTORRESULTS''

    , policy_name     => ''THISCONSTRUCTORRESULT''

    , function_schema => ''BOOK''

    , policy_function => ''THISCONSTRUCTORONLY''

    , policy_type     => sys.dbms_rls.shared_static

    );

    sys.dbms_rls.add_policy

    ( object_schema   => ''F1DATA''

    , object_name     => ''CONSTRUCTORSTANDINGS''

    , policy_name     => ''THISCONSTRUCTORSTANDING''

    , function_schema => ''BOOK''

    , policy_function => ''THISCONSTRUCTORONLY''

    , policy_type     => sys.dbms_rls.shared_static

    );

    end;

    /

    ```


    Even though the policy function returns a predicate referencing the context, it
    doesn’t rely on it. If the context changes, the predicate text is still the same.
    It evaluates differently with a different value in the context. You set the context
    by calling our `set_constructor` procedure.


    ```sql

    begin

    context_pkg.set_constructor( constructorid_in => 9 );

    end;

    /

    ```


    When selecting data from the tables, the predicate is automatically added to the
    query, therefore only showing the data for Red Bull.'
