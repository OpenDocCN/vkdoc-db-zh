    **清单 7-10** 显示信息的游标 for 循环


    如您所见，要显示信息，您必须在两个游标 `for loop` 语句之间复制逻辑。在 Oracle Database 21c 中，可以将迭代器定义为预定义的记录类型，您可以将其用作显示过程的参数。清单
    7-11 是此用法的示例；它声明了一个记录类型 `info_t`，并使用此类型作为迭代器，而不是标准的标量值。


