    | P#X | The elapsed time between the preceding and following events |

    | P#! | Comment |


    Instead of reviewing and analyzing the document yourself, you can call the `analyze`
    procedure or function.


    ### analyze


    The `analyze` procedure, there is also an overloaded function with the same name,
    analyzes profiler data in the profiler data table and produces either an HTML
    document with the profiler report or a set of rows in the tables, so you can build
    your reports.


    ```

    procedure analyze

    (

    trace_id    number

    , report_clob out clob

    , trace       varchar2 default null

    , skip        pls_integer default 0

    , collect     pls_integer default null

    , profile_uga boolean default null

    , profile_pga boolean default null

    );

    ```


    The `analyze` procedure takes the parameters described in Table [10-4](#536316_1_En_10_Chapter.xhtml#Tab4)
    and returns a CLOB in its `out` parameter.


    Table 10-4


    Analyze Procedure Parameters


    | Parameter | Mandatory | Description |

    | --- | --- | --- |

    | trace_id | Y | The traceid entry in profiler data table (`dbmshp_data`) |

    | report_clob | Y | The analyzed HTML report in a CLOB (output) |

    | Trace |   | When NULL (default), analysis/reporting generated for the entire
    runAnalysis only for the subtrees rooted at the specified “trace” entryMust be
    specified in the qualified format; e.g., “BOOK”.”F1INFO”.”SHOW_DRIVER”(If the
    procedure or function is overloaded, all of them is analyzed.) |

    | Skip |   | Used only when “trace” is specifiedSkips first “skip” invocations
    to “trace”Default value is 0 |

    | Collect |   | Used only when “trace”is specifiedAnalyzes “collect” number of
    invocations of “trace” (starting from “skip”+1''th invocation)Default is only
    1 invocation collected |

    | profile_uga |   | Report UGA usage |

    | profile_pga |   | Report PGA usage |


    ```

    function analyze

    (

    trace_id     number

    , summary_mode boolean default false

    , trace        varchar2 default null

    , skip         pls_integer default 0

    , collect      pls_integer default null

    , run_comment  varchar2 default null

    , profile_uga  boolean default null

    , profile_pga  boolean default null

    ) return number;

    ```


    The `analyze` function returns `runnumber`, which is the key to the rows it generates
    in different tables. The function takes arguments as described in Table [10-5](#536316_1_En_10_Chapter.xhtml#Tab5).


    Table 10-5


    Analyze Procedure Parameters


    | Parameter | Mandatory | Description |

    | --- | --- | --- |

    | trace_id | Y | The traceid entry in profiler data table (`dbmshp_data`) |

    | summary_mode |   | When FALSE (default), does a full analysisWhen TRUE, only
    generates a top-level summary |

    | Trace |   | When NULL (default), analysis/reporting generated for entire runAnalysis
    only for the subtrees rooted at the specified “trace” entryMust be specified in
    the qualified format; e.g., “BOOK”.”F1INFO”.”SHOW_DRIVER”(If the procedure or
    function is overloaded, all are analyzed.) |

    | Skip |   | Used only when “trace” is specified.Skips the first “skip” invocations
    to “trace”Default value is 0 |

    | collect |   | Used only when “trace” is specifiedAnalyzes “collect” number of
    invocations of “trace” (starting from “skip”+1''th invocation)Default is 1 invocation
    collected |

    | run_comment |   | Arbitrary comment analyzes run |

    | profile_uga |   | Report UGA usage |

    | profile_pga |   | Report PGA usage |


    The `analyze` function uses the following three tables (all created using the
    `dbms_hprof.create_tables` procedure).


    *   dbmshp_runs


    *   dbmshp_function_info


    *   dbmshp_parent_child_info


    For each trace record that has been analyzed, one record is added to the `dbmshp_runs`
    table (see Table [10-6](#536316_1_En_10_Chapter.xhtml#Tab6)).


    Table 10-6


    dbmshp_runs


    | Name | Type | Nullable |

    | --- | --- | --- |

    | Runid | NUMBER |   |

    | run_timestamp | TIMESTAMP(6) | y |

    | total_elapsed_time | INTEGER | y |

    | run_comment | VARCHAR2(2047) | y |

    | trace_id | NUMBER | y |


    Every procedure, function, and SQL statement gets a row in the `dbmshp_function_info`
    table using the same run ID as the one in the record in the `dbmshp_runs` table
    (see Table [10-7](#536316_1_En_10_Chapter.xhtml#Tab7)).


