    1) Romain Grosjean

    2) Esteban Gutiérrez

    3) Kevin Magnussen

    4) Nikita Mazepin

    5) Mick Schumacher

    6) Pietro Fittipaldi

    PL/SQL procedure successfully completed

    清单 17-7

    显示每个车队的车手

    ```


