    The data is preserved in this global temporary table until the session is ended.


    ## 索引与错误处理


    You can add indexes to global temporary tables, but only when empty. If you try
    to add an index to a global temporary table that has `on commit preserve rows`
    set, you may encounter this error.


    ```

    ORA-14452: attempt to create, alter or drop an index on temporary table already
    in use

    ```


    If this happens, and your session is the only session using the table, you can
    solve this by disconnecting and reconnecting or issuing a `truncate table` statement.


    ## 使用CTAS创建


    You can also create the global temporary table using a `create table as select`
    construction.


    ```sql

    create global temporary table gtt_drivers

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```


    Since the default option is `on commit delete rows`, and any DDL performs an implicit
    commit, the table definition is created, but the rows are removed immediately.
    To preserve the rows, you must create the table with the `on commit preserve rows`
    option.


    ```sql

    create global temporary table gtt_drivers

    on commit preserve rows

    as

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    ```'
