    `keep` 修改是唯一可以处理多个 JSON 路径表达式的操作。下面的示例保留了所有驱动程序的昵称和 `Drivers` 数组中第一个驱动程序的 `code`。


    ```sql

    select json_transform

    ( f.json_document

    , keep ''$.MRData.DriverTable.Drivers[*].nickname''

    , ''$.MRData.DriverTable.Drivers[0].code''

    ) nickname_code

    from   f1_drivers_json f

    /

