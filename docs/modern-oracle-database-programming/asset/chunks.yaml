    | `column_name` | | 策略应用到的单个列名。如果要屏蔽多个列，请使用 `ALTER_POLICY` 过程添加额外的列 |

    | `function_type` | 是 | 要使用的屏蔽函数类型。<br>可能的值有：<br>- `DBMS_REDACT.NONE`<br>- `DBMS_REDACT.FULL`（默认）<br>-
    `DBMS_REDACT.PARTIAL`<br>- `DBMS_REDACT.RANDOM`<br>- `DBMS_REDACT.REGEXP`<br>如果
    `function_type` 是 `DBMS_REDACT.REGEXP`，则必须完全省略 `function_parameters`，且 `regexp_*`
    参数必须定义数据屏蔽策略 |

