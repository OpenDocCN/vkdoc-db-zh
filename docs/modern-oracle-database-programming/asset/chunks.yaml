    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$.driverId''

    )

    /

    FIRSTNAME


    David

    Sebastian

    ```


    两个驾驶员都有`driverId`属性，因此两行都被返回。


    以下示例使用`json_exists`条件从表中过滤正确的 JSON 文档。使用过滤条件测试`driverId`是否为名称“coulthard”。


    ```

