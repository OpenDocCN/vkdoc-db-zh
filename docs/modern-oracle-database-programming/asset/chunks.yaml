  trans: "\n## 准备工作\n\n要利用 EBR（版本隔离），必须采取一些步骤。自 11gR2 以来，每个 Oracle 数据库版本都有一个名为 `ORA$BASE`\
    \ 的默认版本。即使无意使用 EBR，这个版本也始终存在。\n\n第一步是在模式级别启用 EBR。这是一次性操作且不可逆。尽管不可逆，但这并不意味着你必须使用\
    \ EBR。\n\n使用以下语句可为模式启用版本。\n\n```sql\nalter user book enable editions\n/\n```\n\
    \n在 Oracle 数据库 12.1 之前的版本中，整个模式会被启用版本。从该版本开始，可以将某些通常应为可版本化的对象标记为不可版本化。\n\n以下语句可用于确定当前会话的版本。\n\
    \n```sql\nselect sys_context('userenv'\n,'current_edition_name'\n) \"Current_Edition\"\
    \nfrom   dual\n/\nCurrent_Edition\n\nORA$BASE\n```\n\n**提示**\n\n使用 SQLcl 时，可以使用\
    \ `show edition` 命令来显示当前版本，这比检查 `userenv` 应用程序上下文中的当前版本名称要方便得多。\n\n### 权限\n\n\
    在上一节中，用户“book”已被启用版本，允许创建其他版本。版本之间存在层级关系，每个版本总是有 *一个* 父版本。唯一的例外是 `ORA$BASE`，或者当此版本最终被移除时，层级中的下一个版本。这个顶级版本称为\
    \ *根版本*。\n\n为模式启用使用版本的功能并不意味着用户可以创建其他版本。要实现这一点，需要 `create any edition` 系统权限。除了此权限外，用户还需要在根版本上拥有\
    \ `use` 权限。\n\n```sql\ngrant create any edition to book\n/\n```\n\n当用户 book 创建一个版本时，`use`\
    \ 权限会自动授予。此权限也可以显式授予其他用户。\n\n```sql\ngrant use on edition  to \n/\n```\n\n只有在授予\
    \ `drop any edition` 系统权限时，才能删除根或叶版本。\n\n```sql\ngrant drop any edition to book\n\
    /\n```\n\n连接到数据库时，也可以使用 `alter session` 语句来更改版本。\n\n```sql\nalter session set\
    \ edition = \n/\n```\n\n从一种版本切换到另一种版本时，不能有未完成的事务。如果在事务未通过提交或回滚关闭时尝试更改版本，将会引发错误。\n\
    \n```sql\nalter session set edition = r2\n/\nERROR:\nORA-38814: ALTER SESSION\
    \ SET EDITION must be first statement of transaction\n```\n\n## 多个复杂度级别\n\n使用\
    \ EBR 存在多个复杂度级别。最简单的 EBR 是 *仅* 在版本之间更改 PL/SQL 对象。\n\n下一级别是表结构也在版本之间更改，但 *无需* 同时保留多个版本可用。所有用户都会在未来指定的时间点迁移到升级后的版本。\n\
    \n最复杂的级别是涉及表结构更改，并且用户需要同时访问多个版本。这涉及在多个版本之间保持数据同步。\n\n接下来的几个章节将讨论涉及的每个步骤，从最简单的形式开始：仅在版本之间更改\
    \ PL/SQL 对象。\n\n### 仅更改 PL/SQL 对象\n\nEBR 的最简单形式是仅更改 PL/SQL 对象。数据模型保持不变。在以下示例中，在\
    \ `ORA$BASE` 版本中创建一个过程，通过提供名和姓作为参数来显示驾驶员的全名。\n\n```sql\ncreate or replace\nprocedure\
    \ format_fullname (p_firstname in varchar2\n,p_lastname in varchar2)\nis\nbegin\n\
    dbms_output.put_line (p_firstname\n||' '||\np_lastname\n);\nend format_fullname;\n\
    /\n```\n\n启用服务器输出后，这个简单的过程会将名和姓连接在一起显示，中间用空格分隔。\n\n随着 EBR 的引入，数据字典扩展了许多同样反映版本信息的视图。这些数据字典视图带有\
    \ `_ae` 后缀，是 *all editions*（所有版本）的缩写。其中一个视图是 `user_objects_ae`。这个数据字典视图显示创建的 procedure\
    \ `format_fullname` 存在于版本 `ORA$BASE` 中。\n\n```sql\nselect object_name\n, object_type\n\
    , edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
    /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
    \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\n```\n\n**注意**\n\n\
    当上述查询显示 `edition_name` 列为空时，表示用户尚未启用版本。\n\n下一步是创建一个名为 R1 的额外版本。\n\n```sql\ncreate\
    \ edition r1 as child of ora$base\n/\n```\n\n虽然严格来说不必指定哪个版本是父版本，但明确指定总是无妨。\n\n\
    创建版本并不意味着当前会话已切换到它。要将当前版本更改为新创建的版本，需要发出 `alter session` 命令。\n\n```sql\nalter session\
    \ set edition = r1\n/\nselect sys_context('userenv'\n,'current_edition_name'\n\
    ) \"Current_Edition\"\nfrom   dual\n/\nCurrent_Edition\n\nR1\n```\n\n除了使用 `alter\
    \ session` 语句切换版本外，也可以在连接时指定版本。\n\n```sql\nconn /@ edition = r1\n```\n\n在 R1 版本中执行\
    \ `format_fullname` 过程会显示以下结果。\n\n```sql\nbegin\nformat_fullname (p_firstname\
    \ => 'Mick'\n,p_lastname  => 'Schumacher'\n);\nend;\n/\nMick Schumacher\n```\n\
    \n这是如何实现的？过程 `format_fullname` 是从父版本 `ORA$BASE` 继承而来的。所有可版本化的对象都由子版本继承，并且可以像以前一样使用。\n\
    \n引入新版本的原因是为了改进 `format_fullname` 过程的功能。这可以通过非常熟悉的 `create or replace` 方法来完成。该过程的替换发生在版本\
    \ R1 的 *私有环境* 中，同时保持原始过程完整且有效。连接到 `ORA$BASE` 版本的用户不受 `format_fullname` 过程新版本的影响。\n\
    \n```sql\ncreate or replace\nprocedure format_fullname (p_firstname in varchar2\n\
    ,p_lastname  in varchar2)\nis\nbegin\ndbms_output.put_line (initcap (p_lastname)\n\
    ||', '||\ninitcap (p_firstname)\n);\nend format_fullname;\n/\n```\n\n过程 `format_fullname`\
    \ 在当前版本中被替换，`user_objects_ae` 数据字典视图显示两个同名但存在于不同版本中的过程。\n\n```sql\nselect object_name\n\
    , object_type\n, edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
    /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
    \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\nFORMAT_FULLNAME PROCEDURE\
    \       R1\n```\n\n新版本的用户在调用该过程时会得到以下结果。\n\n```sql\nbegin\nformat_fullname (p_firstname\
    \ => 'Mick'\n,p_lastname  => 'Schumacher'\n);\nend;\n/\nSchumacher, Mick\n```\n\
    \n还有可能在升级后的版本中不再需要某个 PL/SQL 对象。可以通过发出 `drop` 语句来移除该 PL/SQL 对象。请记住，删除 PL/SQL 对象仅从当前版本中移除它。同名的过程仍然存在于\
    \ `ORA$BASE` 中。\n"
- fmt: 'Inspecting the `user_objects_ae` data dictionary view after dropping the procedure
    shows the following results.


    ```

    select object_name

    , object_type

    , edition_name

    from   user_objects_ae

    where  object_name = ''FORMAT_FULLNAME''

    /

    OBJECT_NAME     OBJECT_TYPE     EDITION_NAME

    --------------- --------------- ---------------

    FORMAT_FULLNAME PROCEDURE       ORA$BASE

    FORMAT_FULLNAME NON-EXISTENT    R1

    ```


    The preceding results reveal that there are still two references to an object
    named `format_fullname`; one in `ORA$BASE` and one in `R1`. Note that the object
    in `ORA$BASE` is a `procedure`, while the other object in `R1` is `non-existent`.


    Once an object is removed from a certain edition, it is no longer inherited by
    the next child edition, and therefore it can no longer be called.


    Changing the procedure to a function (it makes more sense to have a function to
    format the driver’s full name) is done by a combination of `drop` (to remove the
    procedure already done) followed by a `create` for the function implementation.


    ```

    create or replace

    function format_fullname (p_firstname in varchar2

    ,p_lastname  in varchar2)

    return varchar2

    is

    begin

    return initcap (p_lastname)

    ||'', ''||

    initcap (p_firstname);

    end format_fullname;

    /

    ```


    These actions yield the following results in the data dictionary.


    ```

    select object_name

    , object_type

    , edition_name

    from   user_objects_ae

    where  object_name = ''FORMAT_FULLNAME''

    /

    OBJECT_NAME     OBJECT_TYPE     EDITION_NAME

    --------------- --------------- ---------------

    FORMAT_FULLNAME PROCEDURE       ORA$BASE

    FORMAT_FULLNAME FUNCTION        R1

    ```


    These are the only steps needed to upgrade when only PL/SQL objects are involved.
    What is left to do is make the new edition available to the users and make the
    old edition unavailable (i.e., retire the old edition). These topics are covered
    in the next sections.


    ## Table Changes: Don’t Sync Between Editions


    Sometimes it is necessary to change the structure of a table as progression to
    the new version is made. As stated before: tables cannot be editionable. It is
    not possible to have multiple versions of the same table. Two mechanisms help
    keep the application online while changes to the table are made: fine-grained
    dependency tracking and non-blocking DDL.


    Fine-grained dependency tracking prevents objects from getting invalidated when
    changes to a table are made. Adding a column does not invalidate any PL/SQL object
    because there is no dependency on that column in the PL/SQL objects.


    Because of non-blocking DDL, no sessions are hindered by adding columns.


    In each edition, there needs to be a different representation of the data to expose
    the newly added columns.


    EBR introduces the concept of an `editioning view`. As the name already implies,
    it is a view, but a special type of view. The editioning view act as an abstraction
    layer for the underlying table. Because the editioning view is editionable, it
    likely has a different structure in each edition. Because of the abstraction layer,
    the data is still stored in a single place, the underlying table. The table holds
    the data and is a single point of truth. Indexes and constraints remain on the
    table.


    Introducing editioning views requires some downtime when it is the first edition-based
    redefinition exercise when tables are to be involved. This is a one-time operation
    needed to take an existing non-edition-based database application and prepare
    it for edition-based in the future. Once this exercise is completed, it is prepared
    for zero-downtime upgrades.


    **Note**


    Some features used on the tables might need to be rerouted to the editioning views,
    like privileges, triggers, and virtual private database (`VPD`). Gathering the
    scripts for these features beforehand makes switching to editioning views a lot
    simpler.


    There are six steps to follow when introducing editioning views during the first
    EBR exercise.


    1.  Rename the tables.

    2.  Create editioning views.

    3.  Reroute privileges to the editioning views.

    4.  Re-create triggers on the editioning views.

    5.  Recompile PL/SQL objects.

    6.  Reapply `VPD` policies.


    The editioning view is the abstraction layer between the actual table and the
    application. The application most likely references the actual table throughout
    the source code. Changing the name of the actual table in the source code to the
    editioning view can be quite a daunting task and might be error-prone. Naming
    the editioning view the same as the original table would have the least impact
    on the application and the source code. Unfortunately, this is not possible. There
    cannot be two objects with the same name. You can solve this predicament by first
    renaming the actual table and creating an editioning view with the same name as
    the original table.


    Going forward, the table shouldn’t be accessed directly in the application anymore,
    and creating a table name that is distinguishable from the regular table names
    should help prevent that. The following naming convention introduces a special
    character (usually an underscore) and makes the table case-sensitive.


    ```

    alter table drivers rename to "_drivers"

    /

    ```


    The `_drivers` table can *only* be used when the name is in quotes because it
    is case-sensitive. This is not a common naming convention for the table name.
    Having special characters and being case-sensitive signals to developers that
    this table is special.


    With this action, step one is completed. The next step is to introduce editioning
    views with the same name as the original table.


    ```

    create editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    from   "_drivers"

    /

    ```


    An editioning view can only be based on a single table and can’t contain aggregates
    or expressions.'
