    ### 总结


    本章介绍了选择、查询和错误指令，这些是条件编译的构建块。通过条件编译，你可以为不同的 Oracle 数据库版本创建单一代码库，确保代码被部署到正确的环境（例如，仅部署到开发环境而绝不部署到生产环境），以及出于测试目的暴露私有过程。文中还讨论了条件编译的几个用例和一些技巧。


    ## 7. 迭代和限定表达式


    自 Oracle 首次在数据库中引入 PL/SQL 以来，循环语句就一直存在。通过一些编码和创建特殊逻辑，所有类型的循环都是可能的。许多这些“自制”的循环类型，如步进循环和有条件退出点的循环，现在已通过标准代码实现。


    ### 迭代


    `for` 循环指定了一个迭代器及其迭代控制。如果需要，可以堆叠迭代控制，从而将多个循环浓缩为一个循环。迭代器的作用域仅限于循环内部。循环外的语句不能引用迭代器，迭代器在循环结束后是未定义的。


    #### 迭代控制


    在 Oracle Database 21c 之前发布的版本中，`for` 循环具有静态签名 `for <iterator> in [reverse] <iteration_start>
    .. <iteration_end>`，这是唯一的迭代控制。循环变量始终是整数，从起始值运行到结束值，或者如果指定了 `reverse`，则从结束值运行到起始值，访问起始值和结束值之间的所有值。当你想跳过值或想做一些特殊处理时，必须由你自己来构建。


    ##### 多重迭代控制


    以前，一个迭代器只能有一个迭代控制，因此如果你想对多个集合做相同的事情，你就必须设计多个循环并复制逻辑。当然，你会为此创建一个（局部）过程，但即便如此，你仍然在创建代码，如清单
    7-1 所示。


    ```

    begin

    for i in 1 .. 3

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 100 .. 104

    loop

    dbms_output.put_line(i);

    end loop;

    for i in 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-1

    21c 之前的多重迭代

    ```


    从 Oracle Database 21c 开始，你可以在一个循环内堆叠多个迭代控制。为了实现相同的逻辑，你可以编写如清单 7-2 所示的代码。


    ```

    begin

    for i in 1 .. 3, 100 .. 104, 200 .. 202

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /


    Listing 7-2

    21c 及更高版本的多重迭代

    ```'
- fmt: '## Stepped Iteration Controls


    If you have an iteration where you want a stepped control, you must build it yourself.
    You can either build a short `for` loop and then do some arithmetic with the iterator
    value or build a long loop and then skip over the iterator values you don’t want
    to use. The latter solution is displayed in Listing [7-3](#536316_1_En_7_Chapter.xhtml#PC3).


    ```

    begin

    for i in 1 .. 20

    loop

    if mod(i, 3) = 1

    then

    dbms_output.put_line(i);

    end if;

    end loop;

    end;

    /

    ```


    **Listing 7-3** Stepped iteration pre-21c


    Since Oracle Database 21c, you can write the step directly into the iteration,
    as shown in Listing [7-4](#536316_1_En_7_Chapter.xhtml#PC4).


    ```

    begin

    for i in 1 .. 20 by 3

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /

    ```


    **Listing 7-4** Stepped iteration 21c and up


    You can even take fractional steps if you declare the iterator as a non-integer
    variable instead of an integer. Listing [7-5](#536316_1_En_7_Chapter.xhtml#PC5)
    is an example.


    ```

    begin

    for i number(3, 1) in 1 .. 10 by 0.5

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /

    ```


    ```

    1.5

    2.5

    3.5

    4.5

    5.5

    6.5

    7.5

    8.5

    9.5

    ```


    **Listing 7-5** Fractional stepped iteration 21c and up


    ## The while Loop in Iteration Controls


    You could build `while` loops in previous Oracle Database versions, but that would
    mean declaring a variable, initializing it, and building the loop. The problem
    was always, how do you initialize the variable, and where do you alter its value?
    Listing [7-6](#536316_1_En_7_Chapter.xhtml#PC6) shows a `while` loop in a pre-21c
    database.


    ```

    declare

    power2 number;

    begin

    power2 := 1;

    while power2 <= 1024 loop

    dbms_output.put_line( power2 );

    power2 := power2 * 2;

    end loop;

    end;

    /

    ```


    **Listing 7-6** while loop


    In Oracle Database 21c, you can include a `while` loop in a `for` loop, as seen
    in Listing [7-7](#536316_1_En_7_Chapter.xhtml#PC7).


    ```

    begin

    for power2 in 1, repeat power2 * 2 while power2 <= 1024

    loop

    dbms_output.put_line(power2);

    end loop;

    end;

    /

    ```


    **Listing 7-7** A while loop in iteration control


    ## when in Iteration Controls


    Where you would normally run all the iterations in your loop and, within each
    iteration, check for a specified condition to be satisfied before executing some
    logic, these conditions can now be handled in the iteration control itself.


    If you create a function returning a `BOOLEAN` value, as shown in Listing [7-8](#536316_1_En_7_Chapter.xhtml#PC8),
    you can use this as part of a condition inside your iteration control used in
    Listing [7-9](#536316_1_En_7_Chapter.xhtml#PC9).


    ```

    create or replace function is_prime(number_in in number)

    return boolean is

    l_returnvalue boolean := true;

    begin

    for indx in 2 .. number_in / 2

    loop

    if mod(number_in, indx) = 0

    then

    l_returnvalue := false;

    exit;

    end if;

    end loop;

    return l_returnvalue;

    end;

    /

    ```


    **Listing 7-8** The `is_prime` function


    Using this function, you can ensure the loop is only executed when our condition
    is satisfied. The example in Listing [7-9](#536316_1_En_7_Chapter.xhtml#PC9) shows
    the use of this function to determine the condition to execute the code block
    inside the block.


    ```

    begin

    for i in 1 .. 100 when is_prime(i) and i not in (19, 37)

    loop

    dbms_output.put_line(i);

    end loop;

    end;

    /

    ```


    **Listing 7-9** `when` in iteration control


    The loop is only executed for the values that satisfy the condition specified
    in the `when` clause.


    ## Cursor in Iteration Controls


    The cursor `for loop` statement has been available since the first implementation
    of PL/SQL in Oracle Database. You could use the iterator record to process the
    cursor’s data. Listing [7-10](#536316_1_En_7_Chapter.xhtml#PC10) shows an implementation
    of such a cursor `for loop`.


    ```

    begin

    dbms_output.put_line( ''Drivers:'');

    for rec in (select d.driverid

    , d.driverref

    , d.forename || '' '' || d.surname as name

    , d.nationality

    from   f1data.drivers d

    ) loop

    dbms_output.put_line( rec.driverid

    ||''(''

    ||rec.driverref

    ||'')''

    ||rec.name

    ||''-''

    ||rec.nationality

    );

    end loop;

    dbms_output.put_line( ''Constructors:'');

    for rec in (select c.constructorid

    , c.constructorref

    , c.name

    , c.nationality

    from   f1data.constructors c

    ) loop

    dbms_output.put_line( rec.constructorid

    ||''(''

    ||rec.constructorref

    ||'')''

    ||rec.name

    ||''-''

    ||rec.nationality

    );

    end loop;

    end;

    /

    ```


    ```

    Drivers:

    1(hamilton)Lewis Hamilton-British

    2(heidfeld)Nick Heidfeld-German

    3(rosberg)Nico Rosberg-German

    4(alonso)Fernando Alonso-Spanish

    5(kovalainen)Heikki Kovalainen-Finnish

    6(nakajima)Kazuki Nakajima-Japanese

    7(bourdais)Sébastien Bourdais-French

    8(raikkonen)Kimi Räikkönen-Finnish

    9(kubica)Robert Kubica-Polish

    10(glock)Timo Glock-German

    >

    Constructors:

    1(mclaren)McLaren-British

    2(bmw_sauber)BMW Sauber-German

    3(williams)Williams-British

    4(renault)Renault-French

    5(toro_rosso)Toro Rosso-Italian

    6(ferrari)Ferrari-Italian

    7(toyota)Toyota-Japanese

    8(super_aguri)Super Aguri-Japanese

    9(red_bull)Red Bull-Austrian

    10(force_india)Force India-Indian

    >

    ```


    **Listing 7-10** Cursor for loop displaying information


    As you can see, to display the information, you must copy the logic between the
    two cursor `for loop` statements. In Oracle Database 21c, it is possible to define
    the iterator as a predefined record type, which you can use as a parameter in
    a display procedure. Listing [7-11](#536316_1_En_7_Chapter.xhtml#PC11) is an example
    of this usage; it declares a record type `info_t` and uses this type as the iterator
    instead of a standard scalar value.


    ```

    declare

    type info_t is record

    ( id          number(11)

    , ref         varchar2(255)

    , name        varchar2(255)

    , nationality varchar2(255)

    );

    procedure printit(rec_in in info_t)

    is

    begin

    dbms_output.put_line

    ( rec_in.id

    ||''(''

    ||rec_in.ref

    ||'')''

    ||rec_in.name

    ||''-''

    ||rec_in.nationality

    );

    end;

    begin

    dbms_output.put_line( ''Drivers:'');

    for rec info_t in (select d.driverid

    , d.driverref

    , d.forename || '' '' || d.surname

    , d.nationality

    from   f1data.drivers d

    where  rownum <= 10) loop

    printit(rec);

    end loop;

    dbms_output.put_line( ''Constructors:'');

    for rec info_t in (select c.constructorid

    , c.constructorref

    , c.name

    , c.nationality

    from   f1data.constructors c

    where  rownum <= 10) loop

    printit(rec);

    end loop;

    end;

    /

    ```


    ```

    Drivers:

    1(hamilton)Lewis Hamilton-British

    2(heidfeld)Nick Heidfeld-German

    3(rosberg)Nico Rosberg-German

    4(alonso)Fernando Alonso-Spanish

    5(kovalainen)Heikki Kovalainen-Finnish

    6(nakajima)Kazuki Nakajima-Japanese

    7(bourdais)Sébastien Bourdais-French

    8(raikkonen)Kimi Räikkönen-Finnish

    9(kubica)Robert Kubica-Polish

    10(glock)Timo Glock-German

    >

    Constructors:

    1(mclaren)McLaren-British

    2(bmw_sauber)BMW Sauber-German

    3(williams)Williams-British

    4(renault)Renault-French

    5(toro_rosso)Toro Rosso-Italian

    6(ferrari)Ferrari-Italian

    7(toyota)Toyota-Japanese

    8(super_aguri)Super Aguri-Japanese

    9(red_bull)Red Bull-Austrian

    10(force_india)Force India-Indian

    >

    ```


    **Listing 7-11** Cursor for loop with predefined record type


    This technique can also create procedures or functions that accept a ref cursor
    as one of the parameters. Listing [7-12](#536316_1_En_7_Chapter.xhtml#PC12) implements
    this in a package. Instead of creating a cursor `for loop`, you create a loop
    over the `values of` a cursor variable.'
