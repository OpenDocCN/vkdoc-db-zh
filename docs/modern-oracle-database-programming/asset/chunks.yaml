    ,policy_name         => ''maskedlaptime'');

    end;

    /

    ```


    ## Summary


    Oracle Database provides a whole set of functionalities to either show or hide
    the data based on rules. Temporal validity allows you to see only valid data at
    a certain point in time. VPD allows you to have a single schema visible to different
    users as if they were using their own schema with their own data. The Redaction
    policies allow you to hide certain parts of your (sensitive) data from certain
    groups of users. Redaction is useful when users need to see part (but not all)
    of the data. Typical in call centers where they ask for the last digits of your
    credit card, phone number, SSN, and so forth to verify you.


    # 19. Upgrade Your Application with Zero Downtime


    Upgrading a database application would always require downtime. It was simply
    not possible to replace PL/SQL objects that were in use. Throughout the years,
    numerous technologies were developed to reduce Oracle Database downtime, like
    standby databases, RAC, Streams, online index rebuilds, or online table redefinition.
    The one thing that could keep users from working uninterrupted is the actual database
    application that they are using. To overcome this “last piece of the puzzle”,
    being able to replace PL/SQL objects while in use, Edition-based redefinition
    was developed.


    ## Downtime


    In essence, there are two types of downtime: planned and unplanned. Unplanned
    downtime occurs unexpectedly, and preparing for this scenario is very hard. Some
    measures can be taken to reduce unplanned downtime but eliminating it is almost
    impossible.


    Planned downtime is known ahead of time, and Oracle has implemented features to
    reduce the amount of planned downtime. Hardware failures can be protected by physical
    and/or logical standby databases and RAC. The database doesn’t need to be taken
    down to upgrade the database software itself. When you have logical standby and
    streams, it is possible to keep the database up and running while being upgraded
    simultaneously. Indexes can be rebuilt online. Tables can be redefined online,
    which allows the database to stay available.


    The one thing that would require downtime was *your* custom application. Replacing
    PL/SQL at runtime was simply not possible. There can only be one version of a
    certain PL/SQL object, and replacing that would require a lock on the object.
    This object can no longer be executed and disrupts regular business processes.
    When a PL/SQL object is replaced, objects that depend on it might become invalid
    and require recompilation.


    Edition-Based Redefinition (EBR) solves this problem and allows your custom application
    to be upgraded while it is in use. With EBR, you can create PL/SQL changes in
    the privacy of an edition. When the custom application is completely updated,
    it can be released to the users. End users using the application during the upgrade
    can continue to work as if nothing happened, while users that create a new connection
    immediately use the new application objects.


    After the last user disconnects from the pre-upgraded application, the pre-upgraded
    application can be retired, and only the post-upgraded application is available.


    ## Definitions


    EBR uses certain terminology that is used throughout this chapter. Table [19-1](#536316_1_En_19_Chapter.xhtml#Tab1)
    is an overview of the most commonly used definitions.


    Table 19-1


    EBR Terminology


    | Term | Description |

    | --- | --- |

    | Edition | Name identifying a non-schema object type to extend the standard naming
    resolution. Editionable objects are identified by edition, schema, and object
    name. |

    | Editioning view | A special kind of view that acts as an abstraction layer for
    the underlying table. Because the editioning view exists in a certain edition,
    it reflects the current implementation of the underlying table. There are certain
    restrictions for the editioning view. |

    | Editionable object | Schema objects that are editionable. These include synonyms,
    views, and all PL/SQL object types. |

    | Non-editionable object | These are all schema objects that are not editionable.
    These include tables or materialized views. An edition cannot have its own copy
    of a non-editionable object. A non-editionable object is shared by all editions.
    |

    | Crossedition trigger | This is a special kind of trigger that can cross the
    boundaries of editions. |

    | NE on E prohibition | Non-editionable objects cannot depend on editionable objects
    because the editioned object is invisible during name resolution. However, materialized
    views and virtual columns can specify an evaluation edition during name resolution.
    |


    ## Concept


    The purpose of EBR is very straightforward: zero-downtime patching or upgrades.
    When you have the luxury of taking downtime, by all means, do so. It is a lot
    easier for all parties involved.


    The distinction between a patch and an upgrade is the following. In the ideal
    situation, all the requirements for a program are implemented in the actual program.
    The program implements exactly the written specification. When the program doesn’t
    implement what the requirement specifies, a patch must be applied to correct the
    situation and bring the implementation and the specification together. The patch
    should bring the program up to par with the functionality requirement.


    The definition of an upgrade is when the requirement changes after the program
    are created. From this moment on, this distinction is not made any more in the
    text. A patch is also implied when it says upgrade and vice versa.


    Of course, the database is not the only part of the application involved when
    you want zero-downtime upgrades. The method used to set up the connection to the
    database determines to which version of the application the connection needs to
    be set up. This can be done by a load balancer or traffic director. Sessions that
    are in flight, connected to the pre-upgrade application, connect through one application
    server. In contrast, sessions that set up a new connection use another application
    server and connect to the post-upgrade application.


    Zero downtime must be designed deliberately in Oracle Database, the application
    server, and the client application.


    Obtaining zero downtime means the application should always be available to the
    users. This is a big challenge: users of the pre-upgrade application don’t want
    to stop what they are doing to allow a new application to be deployed. Users wanting
    to use the post-upgrade application don’t want to wait until the users of the
    pre-upgrade application are done with their work, so they can finally connect
    to the application. Both applications—the pre- and post-upgrade versions—need
    to be active at the same time so they can accommodate the users using the pre-upgrade
    application and establish new connections to the post-upgrade application. This
    is called a *hot rollover*.


    To be able to deploy a new application while there is an old application in use
    can be easy for certain types of applications. Deploying new source files might
    be sufficient.


    When a database is involved, it proves to be a lot harder. Some elementary questions
    need to be answered.'
  trans: '## disable_policy


    要禁用策略，请使用 `disable_policy` 过程。


    `disable_policy` 函数可以接受表 18-10 中描述的参数。


    表 18-10


    禁用策略过程的参数


    | 参数 | 必填 | 描述 |

    | --- | --- | --- |

    | `object_schema` |   | 受保护对象所属的模式。如果为 NULL，则假定为当前模式。 |

    | `object_name` | Y | 受保护对象的名称。 |

    | `policy_name` | Y | 您想要启用或禁用的策略的名称。 |


    ## drop_policy


    如果不再需要该策略，可以使用 `dbms_redact.drop_policy` 过程将其删除。


    ```sql

    begin

    sys.dbms_redact.drop_policy

    ( object_schema       => ''f1data''

    ,object_name         => ''laptimes''

    ,policy_name         => ''maskedlaptime'');

    end;

    /

    ```


    ## 总结


    Oracle Database 提供了一整套功能，可以根据规则显示或隐藏数据。时间有效性允许您只查看特定时间点有效的数据。VPD 允许您拥有一个对不同用户可见的单一模式，就像他们在使用自己的模式和数据一样。Redaction
    策略允许您向特定用户组隐藏（敏感）数据的某些部分。当用户需要看到部分（而非全部）数据时，Redaction 非常有用。典型的场景是在呼叫中心，他们会要求提供信用卡号、电话号码、社会安全号码（SSN）等的最后几位数字来验证您的身份。


    # 19. 零停机时间升级应用程序


    升级数据库应用程序总是需要停机时间。替换正在使用的 PL/SQL 对象在当时是不可能的。多年来，开发了许多技术来减少 Oracle Database 的停机时间，例如备用数据库、RAC、Streams、在线索引重建或在线表重定义。但有一件事仍然可能让用户的工作中断，那就是他们正在使用的实际数据库应用程序。为了克服这“最后一块拼图”，即能够在
    PL/SQL 对象正在使用时替换它们，开发了基于版本的重定义（Edition-based redefinition）。


    ## 停机时间


    本质上，有两种类型的停机时间：计划内的和计划外的。计划外的停机时间会意外发生，为此场景做准备非常困难。可以采取一些措施来减少计划外停机时间，但要消除它几乎是不可能的。


    计划内的停机时间是预先知道的，Oracle 已经实现了相关功能来减少计划内停机时间。可以通过物理和/或逻辑备用数据库以及 RAC 来防止硬件故障。升级数据库软件本身不需要关闭数据库。当您拥有逻辑备用数据库和
    Streams 时，可以在升级的同时保持数据库正常运行和可用。索引可以在线重建。表可以在线重定义，这允许数据库保持可用。


    唯一需要停机的是*您的*自定义应用程序。在运行时替换 PL/SQL 当时是不可能的。某个 PL/SQL 对象只能有一个版本，替换它需要锁定该对象。该对象将无法再执行，并中断正常的业务流程。当
    PL/SQL 对象被替换时，依赖它的对象可能会变为无效并需要重新编译。


    基于版本的重定义（EBR）解决了这个问题，并允许您的自定义应用程序在使用中进行升级。通过 EBR，您可以在一个版本的“私密环境”中进行 PL/SQL 更改。当自定义应用程序完全更新后，可以将其发布给用户。在升级过程中使用应用程序的最终用户可以继续工作，就像什么都没发生一样，而创建新连接的用户则立即使用新的应用程序对象。


    在最后一个用户断开与预升级应用程序的连接后，预升级应用程序可以被停用，只剩下升级后的应用程序可用。


    ## 定义


    EBR 使用了一些贯穿本章的术语。表 19-1 概述了最常用的定义。


    表 19-1


    EBR 术语


    | 术语 | 描述 |

    | --- | --- |

    | Edition | 一个标识非模式对象类型的名称，用于扩展标准命名解析。可版本化的对象通过版本、模式和对象名来标识。 |

    | Editioning view | 一种特殊类型的视图，充当底层表的抽象层。因为 editioning view 存在于特定版本中，所以它反映了底层表的当前实现。editioning
    view 有一些特定的限制。 |

    | Editionable object | 可版本化的模式对象。这包括同义词、视图和所有 PL/SQL 对象类型。 |

    | Non-editionable object | 所有不可版本化的模式对象。这包括表或物化视图。版本不能拥有自己的非版本化对象的副本。非版本化对象由所有版本共享。
    |

    | Crossedition trigger | 一种可以跨越版本边界的特殊触发器。 |

    | NE on E prohibition | 非版本化对象不能依赖于可版本化对象，因为版本化对象在名称解析期间是不可见的。但是，物化视图和虚拟列可以在名称解析期间指定一个评估版本。
    |


    ## 概念


    EBR 的目的非常直接：零停机时间打补丁或升级。如果您有条件可以安排停机时间，那么请务必这样做。这对所有相关方来说都要容易得多。


    补丁和升级的区别如下。在理想情况下，程序的所有需求都在实际程序中实现。程序完全按照书面规范实现。当程序没有实现需求规范所规定的内容时，必须应用补丁来纠正这种情况，使实现与规范保持一致。补丁应使程序达到功能需求的标准。


    升级的定义是在程序创建之后需求发生了变化。从这时起，文本中不再区分这两者。当提到升级时，也隐含了补丁，反之亦然。


    当然，当您想要零停机时间升级时，数据库并不是应用程序中唯一涉及的部分。用于建立数据库连接的方法决定了连接需要连接到哪个版本的应用程序。这可以由负载均衡器或流量导向器完成。正在进行中的会话，即连接到预升级应用程序的会话，通过一台应用服务器连接。而建立新连接的会话则使用另一台应用服务器并连接到升级后的应用程序。


    零停机时间必须在 Oracle Database、应用服务器和客户端应用程序中有意地进行设计。


    实现零停机时间意味着应用程序应该始终对用户可用。这是一个巨大的挑战：使用预升级应用程序的用户不想停止他们正在做的事情来允许部署新的应用程序。想要使用升级后应用程序的用户不想等到预升级应用程序的用户完成工作后才连接到应用程序。因此，两个应用程序——预升级版本和升级后版本——需要同时处于活动状态，以便服务于使用预升级应用程序的用户，并建立到升级后应用程序的新连接。这被称为*热切换*。


    能够在旧应用程序仍在使用时部署新应用程序，对于某些类型的应用程序来说可能很容易。部署新的源文件可能就足够了。


    当涉及到数据库时，这就变得困难得多。需要回答一些基本问题。'
- fmt: '### The Challenges of Zero-Downtime Upgrades


    *How can you make changes to an application when someone is using the application?*


    Making changes to an application usually involves many modified objects, but you
    can’t modify them one after the other. That would leave the application in an
    invalid state. On top of that, it is simply *not* possible to compile database
    code when someone is using it. All objects need to be changed at the same time,
    but that might interrupt the pre-upgrade application.


    One possibility is to take a *complete copy* of the database with the pre-upgrade
    database application and make the changes needed to get to the post-upgrade state.
    This solves the first issue of being able to work in privacy for the upgrade.


    Another option is to copy the database schema and make changes to this new schema.


    Both options allow you to change objects in privacy and ready them for the post-upgrade
    situation, but they do not solve the next two challenges and might even make them
    harder.


    *How can you keep data in sync between two applications, the pre- and post-upgrade
    application?*


    As you can imagine, this is not an easy task to do. The original database objects
    are still in use, and data can be entered and altered. There must be a mechanism
    to allow data changes to propagate between the pre- and post-upgrade applications.


    When the data is shared between the pre-upgraded and the post-upgraded application,
    the issue of synchronization is not trivial. The pre-upgraded application has
    access to the data that is created or changed by the post-upgraded application,
    and vice versa. The same is true for all objects that contain data, such as materialized
    views and indexes.


    *What if the data structures changes?*


    Upgrading an application might change data structures, so how do you define different
    data representations for each application when the data is common to both the
    pre-upgrade and post-upgrade applications?


    Transactions performed in the pre-upgrade application must be reflected in the
    post-upgrade application. The reverse is also true during the hot rollover period.
    Changes in the post-upgrade application must also be reflected in the pre-upgrade
    application.


    All three challenges with a zero-downtime requirement are met by `EBR`.


    ### Solution


    The mechanism to solve the three challenges are as follows.


    - Changes are made in the privacy of a new edition.

    - Different projections of the common tables are achieved by using an editioning
    view.

    - The `crossedition` trigger keeps data changes in sync between different editions
    during the hot rollover period.


    Besides these structures, introduced with `EBR`, two supporting features of Oracle
    Database make the picture complete.


    The first supporting feature is non-blocking `DDL`. When you make changes to a
    table, like adding a column, this is done in a non-blocking fashion. Current transactions
    on the table do not prohibit this change.


    The other feature is fine-grained dependency tracking. When you have a package
    that refers to a certain table, there is a dependency between the two. Changing
    the table, like adding a column, would invalidate the package in the past. This
    is no longer the case. The dependency nowadays is more fine-grained. Because there
    is no reference to the new column, the package does not become invalid. The same
    holds for adding new subprograms to a package specification. Dependents do not
    become invalid.


    Implementing `EBR` is not as trivial as flipping a switch. The preparation phase
    of `EBR` is very important and might require changing the existing database design
    and source code.


    ### Dependencies


    Within an Oracle database, there are objects that hold data, like tables, materialized
    views, and indexes, and there are code objects, all `PL/SQL` objects.


    As a rule of thumb: data objects *cannot* be editionable, and code objects *can*
    be editionable.


    It is possible to have a table where one of the columns is based upon a user-defined
    type (like an object type). Because the user-defined type is editionable and the
    table is not editionable you can get into a situation that is not easily solved.
    Which user-defined type should be used when there are multiple versions across
    editions for the table definition? This predicament is called *`NE-on-E prohibition`*.
    A non-editionable object cannot depend on an editionable object. There has been
    a work-around for `NE-on-E prohibition` since Oracle Database 12.1. Instead of
    having the complete schema being edition-enabled, you can exempt objects from
    *ever becoming* editionable. In the example of the user-defined type in the table,
    you would want to define the user-defined type as non-editionable in the `create
    type` statement. Thus, you do not encounter `NE-on-E prohibition`.


    Also, starting with Oracle Database 12.1, materialized views and virtual columns
    can have extra metadata, which provides information about the evaluation edition.
    Having this extra metadata is only relevant when the materialized view or virtual
    column uses a `PL/SQL` function call that is editionable. This metadata needs
    to be explicitly set by issuing `CREATE` and `ALTER` statements.


    In versions before 12.1, public synonyms could not be edition-enabled, because
    that would violate `NE-on-E prohibition`. From version 12.1 onwards, the Oracle-maintained
    user called `PUBLIC` is edition-enabled, but all existing public synonyms are
    marked as non-editioned. Creating new public synonyms can be editioned.


    During the hot rollover period, you can also test the post-upgrade application
    in the privacy of the new edition. When you must test `DML` in the post-upgrade
    application, make sure you use “fake data,” which should be easily recognizable
    and not play a role in the business. With fake data, the actual data is not affected
    by the edition-based redefinition exercise and can be easily identified and removed
    once the tests are completed. The alternative is to test only in a read-only modus
    to prevent the removal of the edition from leading to remnant data.


    If something goes wrong, or the functionality is not up to the specifications,
    you can keep going forward in the privacy of the post-upgrade edition. The objective
    is to create a post-upgrade application, which can only be achieved when mistakes
    are corrected.


    When the hot rollover period is completed and testing has been done, no existing
    connections are using the pre-upgrade application, and the pre-upgrade edition
    can be retired. Preventing users from connecting to the pre-upgrade application
    might be the first step. The `crossedition` triggers, used to keep the data in
    sync between the pre- and post-upgrade application, are no longer needed. Objects
    in the pre-upgrade edition can be dropped, and eventually, the unused columns
    can be removed from the table.


    If the `EBR` exercise fails and the latest edition must be removed, the edition
    can be dropped by a single statement. Remember that changes to the table are not
    reversed when an edition is dropped from the database. Also, changes to the data
    are not reversed and should be removed to return to the pre-upgraded version.'
