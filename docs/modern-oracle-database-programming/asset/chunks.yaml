    Making more complex changes, like adding a `fullname` attribute for each driver
    and populating it with the values of the `givenName` and `familyName` attributes,
    takes more effort. In the next example, it is done as follows: with `json_table`
    each `givenname` and `familyname` is extracted, as well as the `Driver` objects
    from the `Drivers` array. The `json_transform` function adds a new attribute,
    `fullName`, to the `Driver` objects and populates it with the concatenated `givenname`
    and `familyname`. Finally, a combination of `json_arrayagg` and `json_object`
    finalizes the JSON document. To keep the output short, only the new `fullName`
    attribute is kept.


    ```

    select json_object

    ( ''DriversList'' value json_arrayagg

    ( json_transform ( jt.driver

    , insert ''$.fullName'' =

    jt.givenname||'' ''||jt.familyname

    , keep ''$.fullName''

    )

    )

    ) as just_names

    from   f1_drivers_json f

    cross

    join   json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( givenName

    , familyName

    , driver json path ''$''

    )

    ) jt

    /

