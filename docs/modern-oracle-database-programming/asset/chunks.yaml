    ```


    如果你现在描述该包，你会看到私有过程已经被暴露。


    ```

    SQL> desc cctestdemo

    PROCEDURE PRIVATE_PROCEDURE

    PROCEDURE PUBLIC_PROCEDURE

    ```


    你现在可以访问私有过程来测试其内容。


    ```

    SQL> exec cctestdemo.private_procedure

    => This is the private_procedure <=

    ```


    要使用条件编译标志的最后设置重新编译程序，请在编译语句中使用 `reuse settings`。


    ```

    alter package cctestdemo compile reuse settings

    ```


    如果你的程序在不同的环境中依赖于不同的设置，这将特别有用。


    使用此语句查找程序编译时使用了哪些设置。


    ```

    select plsql_ccflags

    from   all_plsql_object_settings

    where  name  = :object_name

    and    owner = :object_owner

    and    type  = :object_type

    ```


    你可以测试私有程序，并检查你的程序是否优雅地处理了所有异常，即使是那些不太可能发生的异常。


    例如，如果你依赖唯一约束的存在，你不太可能遇到 `too_many_rows` 异常。如果约束缺失或被禁用，你希望你的代码能优雅地处理这个异常，而不是抛出错误。


    首先，你必须实现代码并包含异常处理器。


    ```

    function getdobfordriver( driverid_in in number )

    return date

    is

    l_dob date;

    begin

    begin

    select drv.dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    exception

    when no_data_found

    then

    l_dob := null;

    when too_many_rows

    then

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    return l_dob;

    end getdobfordriver;

    ```


    然后，使用查询指令，你包含测试异常所需的所有代码。


    ```

    begin

    $if $$testexceptions $then

    case

    when mod( driverid_in, 2 ) = 0

    then raise no_data_found;

    else raise too_many_rows;

    end case;

    $else

    select drv,dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    $end

    ```


    如果你想看到引发并处理了哪个异常，扩展异常处理器以显示它们处理了哪个异常可能是个好主意。


    ```

    exception

    when no_data_found

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''no_data_found'' );

    $end

    l_dob := null;

    when too_many_rows

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''too_many_rows'' );

    $end

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    ```


    列表 [6-9](#536316_1_En_6_Chapter.xhtml#PC45) 显示了包规范，列表 [6-10](#536316_1_En_6_Chapter.xhtml#PC46)
    显示了包体。


    ```

    create or replace package body ccexception as

    function getdobfordriver( driverid_in in number )

    return date

    is

    l_dob date;

    begin

    begin

    $if $$testexceptions $then

    case

    when mod( driverid_in, 2 ) = 0

    then raise no_data_found;

    else raise too_many_rows;

    end case;

    $else

    select drv.dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    $end

    exception

    when no_data_found

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''no_data_found'' );

    $end

    l_dob := null;

    when too_many_rows

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''too_many_rows'' );

    $end

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    return l_dob;

    end getdobfordriver;

    end ccexception;

    /

    Listing 6-10

    Testing exception package body

    ```


    ```

    create or replace package ccexception as

    function getdobfordriver( driverid_in in number )

    return date;

    end ccexception;

    /

    Listing 6-9

    Testing exceptions package specification

    ```


    如果你在不设置查询指令的情况下运行 `getdobfordriver` 函数，你会得到预期的输出。


    ```

    begin

    dbms_output.put_line( ''Date or birth for unknown: ''

    || ccexception.getdobfordriver ( -1 )

    );

    dbms_output.put_line( ''Date or birth for Hamilton: ''

    || ccexception.getdobfordriver ( 1 )

    );

    dbms_output.put_line( ''Date or birth for Verstappen: ''

    || ccexception.getdobfordriver ( 830 )

    );

    end;

    /

    Date or birth for unknown:

    Date or birth for Hamilton: 07-JAN-85

    Date or birth for Verstappen: 30-SEP-97

    ```


    为了得到不同的结果，在重新编译包体时设置查询指令。


    ```

    alter package ccexception compile

    plsql_ccflags = ''testexceptions:true''

    ```


    现在当你运行代码时，你还会看到可能引发的不同的异常。


    ```

    begin

    dbms_output.put_line( ''Date or birth for unknown: ''

    || ccexception.getdobfordriver ( -1 )

    );

    dbms_output.put_line( ''Date or birth for Hamilton: ''

    || ccexception.getdobfordriver ( 1 )

    );

    dbms_output.put_line( ''Date or birth for Verstappen: ''

    || ccexception.getdobfordriver ( 830 )

    );

    end;

    /

    too_many_rows

    Date or birth for unknown: 29-DEC-72

    too_many_rows

    Date or birth for Hamilton: 29-DEC-72

    no_data_found

    Date or birth for Verstappen:

    ```'
  raw: '### Showing Output of Debug and Test Code


    Conditional compilation can also expose and hide procedures and functions in your
    package. If you want to test a private procedure or function on a package, you
    must change the package specification to expose this program. Then, when you release
    your code, you must hide the program again.


    Using conditional compilation, you can make these programs visible or hidden depending
    on the value of a flag in the CCFLAGS setting. If this flag is not defined, its
    inquiry evaluates to false, so you don’t have to define it before compiling your
    source.


    A selection directive using your own flag defines if the program is visible or
    not.


    ```

    $if $$expose_for_test $then

    procedure private_procedure;

    $end

    ```


    You can put this anywhere in your package specification. The code is not included
    in the compiled program if you compile the package source without the flag defined
    or set to false.


    The complete package specification is shown in Listing [6-7](#536316_1_En_6_Chapter.xhtml#PC31).


    ```

    create or replace package cctestdemo as

    $if $$expose_for_test $then

    procedure private_procedure;

    $end

    procedure public_procedure;

    end cctestdemo;

    Listing 6-7

    Package specification with conditionally exposed programs

    ```


    Listing [6-8](#536316_1_En_6_Chapter.xhtml#PC32) shows the implementation of this
    package.


    ```

    create or replace package body cctestdemo as

    procedure private_procedure

    is

    begin

    dbms_output.put_line(''=> This is the private_procedure  This is the public_procedure
    <='');

    end public_procedure;

    end cctestdemo;

    Listing 6-8

    Package body with all the programs implemented

    ```


    If you describe the current package, you only see the public procedure defined.


    ```

    SQL> desc cctestdemo

    PROCEDURE PUBLIC_PROCEDURE

    ```


    If you want to execute the private procedure, you get an error that this procedure
    must be declared.


    ```

    SQL> exec cctestdemo.private_procedure

    BEGIN ccdemo.private_procedure; END;

    *

    ERROR at line 1:

    ORA-06550: line 1, column 14:

    PLS-00302: component ''PRIVATE_PROCEDURE'' must be declared

    ORA-06550: line 1, column 7:

    PL/SQL: Statement ignored

    ```


    You can expose the code for testing without changing the source code but by defining
    the value of the inquiry directive using an `alter session` statement.


    ```

    SQL> alter session set PLSQL_CCFLAGS = ''expose_for_test:true''

    ```


    Then recompile the existing package in the database.


    ```

    SQL> alter package cctestdemo compile

    ```


    By doing this, you can expose this procedure, making it available for testing.


    Alternatively, you can specify the CCFLAGS directly when compiling.


    ```

    alter package cctestdemo compile plsql_ccflags=''expose_for_test:true''

    ```


    If you describe the package now, you see that the private procedure has been exposed.


    ```

    SQL> desc cctestdemo

    PROCEDURE PRIVATE_PROCEDURE

    PROCEDURE PUBLIC_PROCEDURE

    ```


    You can now access the private procedure to test its contents.


    ```

    SQL> exec cctestdemo.private_procedure

    => This is the private_procedure <=

    ```


    To recompile a program using the last settings of the conditional compilation
    flags use `reuse settings` in your compile statement.


    ```

    alter package cctestdemo compile reuse settings

    ```


    This is especially useful if your program depends on different settings in different
    environments.


    Use this statement to find out what settings were used when the program was compiled.


    ```

    select plsql_ccflags

    from   all_plsql_object_settings

    where  name  = :object_name

    and    owner = :object_owner

    and    type  = :object_type

    ```


    You can test private programs and check if your program handles all your exceptions
    gracefully, even the ones that are very unlikely to happen.


    If, for example, you rely on your unique constraints being in place, you are unlikely
    to encounter the too_many_rows exception. If the constraint is absent or disabled,
    you want your code to handle this exception gracefully and not throw an error.


    First, you have to implement your code and include the exception handlers.


    ```

    function getdobfordriver( driverid_in in number )

    return date

    is

    l_dob date;

    begin

    begin

    select drv.dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    exception

    when no_data_found

    then

    l_dob := null;

    when too_many_rows

    then

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    return l_dob;

    end getdobfordriver;

    ```


    Then, using an inquiry directive, you include all the code necessary to test the
    exceptions.


    ```

    begin

    $if $$testexceptions $then

    case

    when mod( driverid_in, 2 ) = 0

    then raise no_data_found;

    else raise too_many_rows;

    end case;

    $else

    select drv,dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    $end

    ```


    If you want to see which exception is raised and handled, it may be a nice idea
    to extend the exception handlers to also show which exception they handled.


    ```

    exception

    when no_data_found

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''no_data_found'' );

    $end

    l_dob := null;

    when too_many_rows

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''too_many_rows'' );

    $end

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    ```


    Listing [6-9](#536316_1_En_6_Chapter.xhtml#PC45) shows the package specification,
    and Listing [6-10](#536316_1_En_6_Chapter.xhtml#PC46) shows the package body.


    ```

    create or replace package body ccexception as

    function getdobfordriver( driverid_in in number )

    return date

    is

    l_dob date;

    begin

    begin

    $if $$testexceptions $then

    case

    when mod( driverid_in, 2 ) = 0

    then raise no_data_found;

    else raise too_many_rows;

    end case;

    $else

    select drv.dob

    into   l_dob

    from   f1data.drivers drv

    where  drv.driverid = driverid_in;

    $end

    exception

    when no_data_found

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''no_data_found'' );

    $end

    l_dob := null;

    when too_many_rows

    then

    $if $$testexceptions $then

    dbms_output.put_line( ''too_many_rows'' );

    $end

    l_dob := to_date(''19721229'', ''YYYYMMDD'');

    end;

    return l_dob;

    end getdobfordriver;

    end ccexception;

    /

    Listing 6-10

    Testing exception package body

    ```


    ```

    create or replace package ccexception as

    function getdobfordriver( driverid_in in number )

    return date;

    end ccexception;

    /

    Listing 6-9

    Testing exceptions package specification

    ```


    You get the expected output if you run the `getdobfordriver` function without
    the inquiry directive set.


    ```

    begin

    dbms_output.put_line( ''Date or birth for unknown: ''

    || ccexception.getdobfordriver ( -1 )

    );

    dbms_output.put_line( ''Date or birth for Hamilton: ''

    || ccexception.getdobfordriver ( 1 )

    );

    dbms_output.put_line( ''Date or birth for Verstappen: ''

    || ccexception.getdobfordriver ( 830 )

    );

    end;

    /

    Date or birth for unknown:

    Date or birth for Hamilton: 07-JAN-85

    Date or birth for Verstappen: 30-SEP-97

    ```


    For a different result, set the inquiry directive while recompiling the package
    body.


    ```

    alter package ccexception compile

    plsql_ccflags = ''testexceptions:true''

    ```


    Now when you run the code, you also see the different exceptions that can be raised.


    ```

    begin

    dbms_output.put_line( ''Date or birth for unknown: ''

    || ccexception.getdobfordriver ( -1 )

    );

    dbms_output.put_line( ''Date or birth for Hamilton: ''

    || ccexception.getdobfordriver ( 1 )

    );

    dbms_output.put_line( ''Date or birth for Verstappen: ''

    || ccexception.getdobfordriver ( 830 )

    );

    end;

    /

    too_many_rows

    Date or birth for unknown: 29-DEC-72

    too_many_rows

    Date or birth for Hamilton: 29-DEC-72

    no_data_found

    Date or birth for Verstappen:

    ```'
