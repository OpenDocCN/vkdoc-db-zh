    2) Tony Brooks (BRM)

    3) Masten Gregory (BRM)

    列表 9-2

    获取格式化的摩纳哥前三名

    ```


    也可以在 `with` 子句中创建过程，但无法从 SQL 中调用它们，因为过程没有返回值。在因子化查询中使用 PL/SQL 的优势是上下文切换的开销远低于调用
    PL/SQL 函数。而在查询中使用 PL/SQL 的缺点是代码不可复用。第 10 章提供了更多关于从 SQL 调用 PL/SQL 的信息。如果你要在不同的查询中使用相同的代码，必须在那里复制一份代码。另一种选择是使用
    SQL 宏（参见第 8 章）。


    ## 递归子查询因子化


    传统上，数据模型中的递归关系是指存在指向同一表主键的外键关系。典型的例子是在 SCOTT 方案中，特别是 `EMP` 表。该表中存储了员工以及经理。`mgr`
    列（作为外键）引用同一表的主键 `empno`，从而在两者之间创建了层级关系。


    本书使用的数据模型中不存在这种关系。以下示例探讨了 `CONSTRUCTORS`（车队）与 `DRIVERS`（车手）之间的层级关系。


    第一步是创建一个仅涉及三列的车队和车手列表。


    *   一个伪“主键”，由字母 `''c''` 和真实的 `constructorid` 组成（当是车手记录时，则是 `''d''` 和 `driverid`）

    *   车队或车手的名称

    *   指向该“主键”的“外键”


    这是在一个命名的子查询中完成的。


    ```

    with constructor_drivers as (

    select ''c''||to_char (ctr.constructorid) as pk

    , ctr.name

    , null as fk

    from   f1data.constructors ctr

    where  ctr.constructorref in (''ferrari'', ''mercedes'')

    union all

    select distinct

    ''d''||to_char (drv.driverid)

    , drv.surname as driver

    , ''c''||to_char (rst.constructorid) ctr_id

    from   f1data.results rst

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid)

    select *

    from constructor_drivers

    /

    PK         NAME                           FK

    ---------- ------------------------------ ----------

    c6         Ferrari

    c131       Mercedes

    d17        Webber                         c9

    d14        Coulthard                      c9

    d13        Massa                          c6

    d8         Räikkönen                      c6

    d847       Russell                        c131

    d1         Hamilton                       c131

    d844       Leclerc                        c6

    d832       Sainz                          c6

    d20        Vettel                         c6

    d608       Castellotti                    c6

    d802       Serafini                       c6

    d791       Biondetti                      c6

    >

    ```


    从输出中可以看到，第一列 (`PK`) 是字母“c”（代表 constructor）或“d”（代表 driver）与底层表真实主键的组合。`name` 列显示车队*或*车手的名称。最后一列
    (`FK`) 对于车手记录，显示他曾经或正在为之效力的车队。当记录是车队时，`FK` 列为空。


    将底层表的主键与一个字母组合的原因是为了防止父子关系之间出现歧义。`FK` 列值为 6 可能指向车队 Ferrari，也可能指向车手 Kazuki Nakajima。


    采用这种格式的数据，递归关系可以很容易地发现：`FK` 列引用结果集中的 `PK` 列。


    递归子查询因子化子句*必须*包含两个通过 `union all` 集合运算符组合的查询块。查询的第一个块定义了锚记录，表示递归的开始。该结果集的锚点可以按如下方式查询。


    ```

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    ```


    此锚点查询*仅*选择那些包含车队的记录。对于它们，`FK` 列始终为空。


    下一个块，即递归成员，选择与刚刚选定的锚点相关的子记录，并且必须引用一次查询名称。


    ```

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    ```


    前面查询中的表“hierarchy”就是命名查询本身，指的是自身。查询块中的这种自引用使其成为一个递归子查询。请注意，名为 `constructor_drivers`
    的查询也有一个 `union all`，但它没有自引用，因此不是递归的。

    '
- fmt: '# 递归子查询示例


    括号中列出的、跟在查询名（下例中的 `hierarchy`）之后的列别名是必需的。以下是完整的递归子查询。


    ```

    hierarchy (pk, name, fk)

    as (

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    union  all

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    )

    ```


    在主查询中，“`hierarchy`” 显示了 `CONSTRUCTORS` 和 `DRIVERS` 之间的层级关系。将所有部分组合起来，得到以下查询。


    ```

    with constructor_drivers as

    (

    select ''c''||to_char (ctr.constructorid) as pk

    , ctr.name

    , null as fk

    from   f1data.constructors ctr

    where  ctr.constructorref in (''ferrari'', ''mercedes'')

    union  all

    select distinct

    ''d''||to_char (drv.driverid)

    , drv.surname as driver

    , ''c''||to_char (rst.constructorid) ctr_id

    from   f1data.results rst

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    )

    , hierarchy (pk, name, fk)

    as (

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    union  all

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    )

    select pk

    , name

    , fk

    from   hierarchy

    /

    PK         NAME                           FK

