    Starting in lap 40, each lap was faster than the previous one and lasted four
    laps. The count of faster laps is also included in the output.


    When relaxing the pattern a little bit, let’s say it’s all right to have one slower
    lap in a fast streak. The pattern looks like the following.


    ```

    faster{2,} slower {1} faster{1,}

    ```


    The pattern reads two (or more) faster laps, followed by one (and only one) slower
    lap, followed by one (or more) faster laps.


    With this pattern in place and with the definition of what defines a slower lap,
    the results are as follows.


    ```

    FIRST_LAP   LAST_LAP  LAP_COUNT

    ---------- ---------- ----------

    6          9          4

    40         46          7

    53         56          4

    ```


    Based on these results, it is very plausible that the laps get faster—despite
    tire degradation—toward the end of the race.


    ## Winning?


    The `CONSTRUCTORSTANDINGS` table contains each race, constructor, and recorded
    cumulative wins. The following is the output for the first five rounds of the
    2022 season for Ferrari and Red Bull only.


    ```

    select ctr.name

    , cts.wins

    , rcs.name as race_name

    , rcs.round

    , rcs.year

    from   f1data.constructorstandings cts

    join   f1data.constructors ctr

    on   ctr.constructorid = cts.constructorid

    join   f1data.races rcs

    on   rcs.raceid = cts.raceid

    where  rcs.year = 2022

    and    ctr.constructorid in (6,9)

    and    rcs.round <= 5

    order  by ctr.name

    , rcs.round

    /

    NAME     WINS RACE_NAME                 ROU   YEAR

    -------- ---- ------------------------- --- ------

    Ferrari     1 Bahrain Grand Prix          1   2022

    Ferrari     1 Saudi Arabian Grand Prix    2   2022

    Ferrari     2 Australian Grand Prix       3   2022

    Ferrari     2 Emilia Romagna Grand Prix   4   2022

    Ferrari     2 Miami Grand Prix            5   2022

    Red Bull    0 Bahrain Grand Prix          1   2022

    Red Bull    1 Saudi Arabian Grand Prix    2   2022

    Red Bull    1 Australian Grand Prix       3   2022

    Red Bull    2 Emilia Romagna Grand Prix   4   2022

    Red Bull    3 Miami Grand Prix            5   2022

    ```


    The `wins` column has the cumulative number of wins. Ferrari won the first round
    but lost the second round leaving the number of wins at one. They did win the
    third round, so the wins increased to two, and so on.


    Based on this data, the following definition of *winning* can be made.


    ```

    winning as (wins > prev (wins))

    ```


    The round is won when the current win count is larger than the previous win count.
    Similarly, the definition of not winning can be as follows.


    ```

    not_winning as (wins = prev (wins))

    ```


    When the current record’s win count stays the same compared to the previous win
    count, some other teams must have won (i.e., the current record’s team didn’t
    win).


    The following is the pattern to classify each record in the data set.


    ```

    ( winning | not_winning )

    ```


    Meaning that a record is either classified as winning *or* not winning. Let’s
    put this to the test.


    ```

    with ctrs as (

    select ctr.name

    , cts.wins

    , rcs.name as race_name

    , rcs.round

    , rcs.year

    from   f1data.constructorstandings cts

    join   f1data.constructors ctr

    on   ctr.constructorid = cts.constructorid

    join   f1data.races rcs

    on   rcs.raceid = cts.raceid

    where  rcs.year = 2022

    and    ctr.constructorid in (6,9)

    and    rcs.round  prev (wins))

    , not_winning as (wins = prev (wins))

    )

    order  by year, round, name

    /

    ROU RACE_NAME                 NAME     CLS          WINS

    --- ------------------------- -------- ------------ ----

    2 Saudi Arabian Grand Prix  Ferrari  NOT_WINNING     1

    2 Saudi Arabian Grand Prix  Red Bull WINNING         1

    3 Australian Grand Prix     Ferrari  WINNING         2

    3 Australian Grand Prix     Red Bull NOT_WINNING     1

    4 Emilia Romagna Grand Prix Ferrari  NOT_WINNING     2

    4 Emilia Romagna Grand Prix Red Bull WINNING         2

    5 Miami Grand Prix          Ferrari  NOT_WINNING     2

    5 Miami Grand Prix          Red Bull WINNING         3

    ```


    Now there are only eight records in the result set. Round one is missing from
    the results. This record can’t be compared to the previous one, and there is no
    classification yet.


    ### Undefined Classification


    One way to solve the problem of the missing first round is by adding an extra
    classification to the pattern.


    ```

    pattern ( winning | not_winning | unknown )

    ```


    An extra definition is expected to be added to the `define` clause, but that is
    not needed. The pattern is assumed to be true when it encounters an undefined
    definition. Since the first round does not match any of the other defined classifications,
    it is matched with the “always true” definition, which was named unknown. The
    first records in the result set would become the following.


    ```

    ROU RACE_NAME                 NAME     CLS          WINS

    --- ------------------------- -------- ------------ ----

    1 Bahrain Grand Prix        Ferrari  UNKNOWN         1

    1 Bahrain Grand Prix        Red Bull UNKNOWN         0

    2 Saudi Arabian Grand Prix  Ferrari  NOT_WINNING     1

    2 Saudi Arabian Grand Prix  Red Bull WINNING         1

    ```


    This would solve the problem of missing records, but it is incorrect. Ferrari
    won the season’s first race, but it is labeled as UNKNOWN. The same is true for
    Red Bull; it is known that they didn’t win the first race. It might be tempting
    to change the definition of winning to the following.


    ```

    winning as (wins > prev (wins) or wins = 1)

    ```


    But this is not correct either; it would label the first race correctly for Ferrari,
    but the second race would also be labeled as WINNING for Ferrari (because the
    win count remains 1). Applying this changed definition would lead to these results.


    ```

    ROU RACE_NAME                 NAME     CLS          WINS

    --- ------------------------- -------- ------------ ----

    1 Bahrain Grand Prix        Ferrari  WINNING         1

    1 Bahrain Grand Prix        Red Bull UNKNOWN         0

    2 Saudi Arabian Grand Prix  Ferrari  WINNING         1

    2 Saudi Arabian Grand Prix  Red Bull WINNING         1

    ```


    The solution would be to expand the definition of WINNING as follows.


    ```

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    ```


    This specifically checks for a win in the first round of the year. The `match_recognize`
    clause becomes the following.


    ```

    match_recognize (

    partition by name

    ,year

    order by round

    measures

    classifier () as cls

    all rows per match

    pattern ( winning | not_winning )

    define

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    , not_winning as (wins = prev (wins)

    or  wins = 0)

    )

    ```


    The following are the results.


    ```

    ROU RACE_NAME                 NAME     CLS          WINS

    --- ------------------------- -------- ------------ ----

    1 Bahrain Grand Prix        Ferrari  WINNING         1

    1 Bahrain Grand Prix        Red Bull NOT_WINNING     0

    2 Saudi Arabian Grand Prix  Ferrari  NOT_WINNING     1

    2 Saudi Arabian Grand Prix  Red Bull WINNING         1

    3 Australian Grand Prix     Ferrari  WINNING         2

    3 Australian Grand Prix     Red Bull NOT_WINNING     1

    4 Emilia Romagna Grand Prix Ferrari  NOT_WINNING     2

    4 Emilia Romagna Grand Prix Red Bull WINNING         2

    5 Miami Grand Prix          Ferrari  NOT_WINNING     2

    5 Miami Grand Prix          Red Bull WINNING         3

    ```


    Each record now has the correct classification: WINNING or NOT_WINNING.'
