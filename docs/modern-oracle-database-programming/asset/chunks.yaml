    The PTF makes transforming these separated values into individual columns trivial.


    ```sql

    select permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    from   split( tab  => f1drivers

    , cols => columns( permanentNumber

    , code

    , givenName

    , familyName

    , dateOfBirth

    , nationality

    )

    )

