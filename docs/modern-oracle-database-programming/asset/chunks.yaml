    #### String Functions


    The MySQL database has a `left` and a `right` string manipulation function. These
    are not available in Oracle SQL. But you can implement them using the `substr`
    functionality and wrap these in SQL Macros so you can port your MySQL queries
    directly to the Oracle database (see Table [8-5](#536316_1_En_8_Chapter.xhtml#Tab5)).


    Table 8-5


    MySQL String Functions


    | function | result |

    | --- | --- |

    | left (''Oracle Database'', 6) | ''Oracle'' |

    | left (''Oracle Database'', 0) | '''' |

    | left (''Oracle Database'', -6) | '''' |

    | right (''Oracle Database'', 8) | ''Database'' |

    | right (''Oracle Database'', 0) | '''' |

    | right (''Oracle Database'', -8) | '''' |


    The `left` function is easy to implement. It is a substring, starting at position
    1 and then getting the desired number of characters.


    ```sql

    create or replace function left

    (

    string_in in varchar2

    , left_in   in number

    ) return varchar2 sql_macro( scalar ) is

    l_sql varchar2( 64 );

    begin

    l_sql := ''substr( string_in, 1, left_in )'';

    return l_sql;

    end left;

    /

    ```


    Listing 8-21

    `left` sql macro


    The `right` function is a little more complex. You must make sure you handle the
    edge cases yourself. The function should return a NULL value if the number of
    characters requested is 0 or a negative number. If the number of characters requested
    is larger than the number available, then return the entire string. Otherwise,
    return the number of characters by starting from the right.


    ```sql

    create or replace function right

    (

    string_in in varchar2

    , right_in  in number

    ) return varchar2 sql_macro( scalar ) is

    l_sql varchar2( 32767 );

    begin

    l_sql := ''

    case

    when right_in  length( string_in ) then  string_in

    else substr( string_in, -right_in )

    end

    '';

    return l_sql;

    end right;

    /

    ```


    Listing 8-22

    Right SQL Macro


    ### expand_sql_text


    `dbms_utility.expand_sql_text` lets you check which statement executed. Let’s
    say you have a simple SQL Macro.


    ```sql

    create or replace

    function total_laptime( raceid_in   in number

    , driverid_in in number )

    return varchar2 sql_macro( table ) is

    begin

    return q''[

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    from   f1data.laptimes ltm

    where  ltm.raceid   = raceid_in

    and    ltm.driverid = driverid_in

    group  by ltm.raceid

    , ltm.driverid

    order  by ltm.raceid

    , ltm.driverid

    ]'';

    end;

    /

    ```


    Listing 8-23

    `total_laptime` SQL Macro


    The following is the statement you execute.


    ```sql

    select * from total_laptime(1093, 830)

    ```


    If you enter this statement as a parameter for the `dbms_utility.expand_sql_text`
    procedure as follows.


    ```sql

    declare

    output_text clob;

    begin

    dbms_utility.expand_sql_text(

    input_sql_text  => q''[select * from total_laptime(1093, 830)

    ]''

    , output_sql_text => output_text

    );

    dbms_output.put_line( output_text );

    end;

    /

    ```


    You get the actual statement that has been executed (formatted for readability).


    ```sql

    select "A1"."RACEID"            "RACEID"

    , "A1"."DRIVERID"          "DRIVERID"

    , "A1"."TOTALMILLISECONDS" "TOTALMILLISECONDS"

    from   (select "A2"."RACEID"            "RACEID"

    , "A2"."DRIVERID"          "DRIVERID"

    , "A2"."TOTALMILLISECONDS" "TOTALMILLISECONDS"

    from   (select "A3"."RACEID" "RACEID"

    , "A3"."DRIVERID" "DRIVERID"

    , sum("A3"."MILLISECONDS")

    "TOTALMILLISECONDS"

    from   "F1DATA"."LAPTIMES" "A3"

    where  "A3"."RACEID"   = 1093

    and    "A3"."DRIVERID" = 830

    group  by "A3"."RACEID"

    , "A3"."DRIVERID"

    order  by "A3"."RACEID"

    , "A3"."DRIVERID") "A2") "A1"

    ```


    ## Summary


    This chapter discussed polymorphic table functions and how to build and use them.
    You also learned about SQL Macros, which can lead to simpler solutions than PTFs.
    So why should you learn about polymorphic table functions? Well, there are things
    you cannot solve in pure SQL which can be solved using PL/SQL. SQL Macros always
    return a SQL snippet. PL/SQL is being used to build this snippet, but the usage
    is pure SQL. PTFs let you access the actual values in the query, so you can manipulate
    what is coming out of your query. You can manipulate the statement using SQL Macros
    before executing it, but you are still creating pure SQL.


    # 9. Subquery Factoring, the WITH Clause, Explained


    Subquery factoring is also known as a common table expression (CTE). Commonly
    referred to as the `with` clause. A CTE is a named temporary result set that exists
    within the scope of a single statement, and that can be referred to later within
    that statement, possibly multiple times.


    You can specify a subquery in the `from` clause of a query, which is called an
    inline view; but if you want to join the same query multiple times, you must repeat
    that query multiple times. And if that inline view changed, you had to make the
    same changes multiple times. No more with subquery factoring. You define the subquery
    once and reference it by name, complying with the “define once, reuse often” paradigm.'
