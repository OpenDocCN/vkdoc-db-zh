  trans: '

    ## 联合 (Union)


    将之前创建的两个视图结合起来，可以使用 `union` 操作符。对于此操作符，两个集合必须具有相同的形状和形式；也就是说，每列的数据类型必须匹配或至少属于同一族。整数和浮点数可以混合匹配，但不能将
    `VARCHAR2` 与数字混合。


    将两个结果集联合起来会得到以下结果。


    ```sql

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    336 mcrae            Graham McRae     New Zealander

    403 phil_hill        Phil   Hill      American

    745 graham_whitehead Graham Whitehead British

    ```


    `union` 操作符不仅仅是连接两个结果集。它还会对它们进行排序，并从最终结果中删除重复的行。这种行为可以在前面查询的执行计划中观察到。


    ```sql

    select *

    from dbms_xplan.display_cursor(null, null, ''BASIC'')

    /

    PLAN_TABLE_OUTPUT


    | Id  | Operation                   | Name    |


    |   0 | SELECT STATEMENT            |         |

    |   1 |  SORT UNIQUE                |         |

    |   2 |   UNION-ALL                 |         |

    |*  3 |    TABLE ACCESS STORAGE FULL| DRIVERS |

    |*  4 |    TABLE ACCESS STORAGE FULL| DRIVERS |


    ```


    执行计划的步骤 1 中可见 `sort unique` 步骤，导致输出中有 5 条记录。`Graham Hill` 只出现一次，尽管他在两个视图中都存在。


    从 Oracle Database 21c 开始，这个联合操作符可以通过添加 `distinct` 来更明确地编写。


    ```sql

    union distinct

    ```


    工作原理保持不变；它增加了语法清晰度。


    当需要所有数据，无论是否存在重复时，使用 `union all` 操作符。这消除了执行计划中对 `sort unique` 步骤的需要。


    ```sql

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union all

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    336 mcrae            Graham McRae     New Zealander

    289 hill             Graham Hill      British

    745 graham_whitehead Graham Whitehead British

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    403 phil_hill        Phil   Hill      American

    ```


    正如你在最终结果中看到的，驾驶员 289 (`Graham Hill`) 出现了两次。在执行计划中，不再有 `sort unique`。


    ```sql

    | Id  | Operation                  | Name    |


    |   0 | SELECT STATEMENT           |         |

    |   1 |  UNION-ALL                 |         |

    |   2 |   TABLE ACCESS STORAGE FULL| DRIVERS |

    |   3 |   TABLE ACCESS STORAGE FULL| DRIVERS |


    ```


    ## 减去 (Minus) 与排除 (Except)


    添加以下视图以演示 `minus` 和 `minus all` 操作符的工作原理。


    ```sql

    create or replace view grahams_and_hills

    as

    select g.driverid

    , g.driverref

    , g.forename

    , g.surname

    , g.nationality

    from   grahams g

    union all

    select h.driverid

    , h.driverref

    , h.forename

    , h.surname

    , h.nationality

    from   hills h

    /

    ```


    此视图暴露以下数据。


    ```sql

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    336 mcrae            Graham McRae     New Zealander

    289 hill             Graham Hill      British

    745 graham_whitehead Graham Whitehead British

    71 damon_hill       Damon  Hill      British

    289 hill             Graham Hill      British

    403 phil_hill        Phil   Hill      American

    ```


    请注意，`Graham Hill` 在结果集中出现了两次。


    `minus` 操作符仅过滤出存在于第一个输入集合但不存在于第二个输入集合中的行。为了演示这个操作，让我们使用 `grahams_and_hills` 视图，并通过一个选择所有
    `British` 驾驶员的查询来使用 `minus` 操作符。


    ```sql

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from grahams_and_hills gh

    minus

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.nationality = ''British''

    /

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    403 phil_hill           Phil       Hill       American

    ```


    如你所见，尽管 `Graham Hill`（一位 `British` 驾驶员）在第一个集合（`grahams_and_hills` 视图）中出现了两次，但他不再出现在最终结果集中。`Graham
    Hill` 的两次出现都从第一个结果集中移除了。


    从 Oracle Database 21c 开始，这个 `minus` 操作符可以通过添加 `distinct` 来更明确地编写。


    ```sql

    minus distinct

    ```


    工作原理保持不变；它增加了语法清晰度。


    自 Oracle Database 21c 起，`minus` 操作符也有一个 `all` 版本。如果将脚本改为使用 `minus all` 操作符，你会得到不同的结果。


    ```sql

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    minus all

    select drv.driverid

    , drv.driverref

    , drv.forename

    , drv.surname

    , drv.nationality

    from   f1data.drivers drv

    where  drv.nationality = ''British''

    /

    DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

    -------- ------------------- ---------- ---------- --------------

    336 mcrae               Graham     McRae      New Zealander

    289 hill                Graham     Hill       British

    403 phil_hill           Phil       Hill       American

    ```


    在这种情况下，`Graham Hill` 确实出现在最终结果集中。这是因为他出现在第一个集合（`grahams_and_hills` 视图）中两次，但在第二个集合中只出现一次。该记录只被移除了一次，而不是所有出现都被移除。


    还实现了 `except` 操作符以符合 ANSI 标准。`except` 的工作原理类似于 `minus`，包括所有变体。


    ```sql

    except

    except distinct

    except all

    ```

