    输入格式：对每个可屏蔽的字符输入 `V`。对每个要使用格式化字符进行格式化的字符输入 `F`。确保每个字符都有对应的 `V` 或 `F` 值。<br>− 输出格式：对每个可能被屏蔽的字符输入
    `V`。将输入格式中的每个 `F` 字符替换为用于显示输出的字符。<br>− 掩码字符：指定用于屏蔽的字符。<br>− 起始数字位置：指定屏蔽的起始 `V`
    数字位置。<br>− 结束数字位置：指定屏蔽的结束 `V` 数字位置。`F` 位置不计入。<br>**数字数据类型设置**<br>− 掩码字符：指定要显示的字符。输入
    0 到 9 的数字。<br>− 起始数字位置：指定屏蔽的起始数字位置，例如 1 表示第一位。<br>− 结束数字位置：指定屏蔽的结束数字位置。<br>**日期时间数据类型设置**<br>`m`：屏蔽月份。要省略屏蔽，请输入大写
    `M`。<br>`d`：屏蔽月份中的日。要省略屏蔽，请输入大写 `D`。<br>`y`：屏蔽年。要省略屏蔽，请输入大写 `Y`。<br>`h`：屏蔽小时。要省略屏蔽，请输入大写
