- fmt: "### `concatenate_subprogram`\n\nInstead of retrieving all the individual subprogram\
    \ names, you can also get the varray conveniently concatenated into a `VARCHAR2`\
    \ comprising the names in the unit-qualified name, separated by dots. The input\
    \ to the `utl_call_stack.concatenate_subprogram` procedure is a varray that you\
    \ can retrieve using the `utl_call_stack.subprogram` procedure.\n\nThe following\
    \ is an example of a call to this procedure.\n\n```\nutl_call_stack.concatenate_subprogram\n\
    ( utl_call_stack.subprogram( 1 ) );\n```\n\nTo demonstrate the workings of this\
    \ function, replace\n\n```\n-----8<-replace-start------\nnull;\n------8<-replace-end------\n\
    ```\n\nwith\n\n```\n-----8<-replace-start------\ndbms_output.put_line\n( utl_call_stack.concatenate_subprogram\n\
    ( utl_call_stack.subprogram( 1 ) )\n);\n------8<-replace-end------\n```\n\nThe\
    \ following is the output if you call the public procedure.\n\n```\nbegin\nutl_call_stack_demo_concatenate_subprogram.public_procedure;\n\
    end;\n/\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE\nCall the local procedure\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE\n\
    Call the local in local procedure\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
    Call the private procedure\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE\nCall the local\
    \ in private procedure\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE\n\
    Call the local in local procedure\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
    PL/SQL procedure successfully completed\n```\n\n### `owner`\n\nThe `utl_call_stack.owner`\
    \ function returns the owner name of the subprogram. The parameter is the same\
    \ as you would use for the `utl_call_stack.subprogram` function. The return value\
    \ of this function is a single `VARCHAR2` with the owner of the given level, not\
    \ the entire stack in a varray.\n\n### `unit_line`\n\nUsing the `utl_call_stack.unit_line`,\
    \ you can get the line numbers of where the calls to the programs occurred. The\
    \ line numbers are the line numbers in the different programs in the call stack,\
    \ not just the current program.\n\nTo demonstrate the workings of this function,\
    \ replace\n\n```\n-----8<-replace-start------\nnull;\n------8<-replace-end------\n\
    ```\n\nwith\n\n```\n-----8<-replace-start------\nfor i in 1 .. utl_call_stack.dynamic_depth\
    \ loop\n  if i > 1 then\n    dbms_output.put('->');\n  end if;\n  dbms_output.put(to_char(utl_call_stack.unit_line(i)));\n\
    end loop;\ndbms_output.put_line('');\n------8<-replace-end------\n```\n\nThe following\
    \ is the output if you call the public procedure.\n\n```\nbegin\nutl_call_stack_demo_unit_line.public_procedure;\n\
    end;\n/\n2->97\nCall the local procedure\n2->107->81\nCall the local in local\
    \ procedure\n2->107->91->66\nCall the private procedure\n2->109->44\nCall the\
    \ local in private procedure\n2->109->54->28\nCall the local in local procedure\n\
    2->109->54->38->13\nPL/SQL procedure successfully completed\n```\n\n## Summary\n\
    \nThere are a lot of utility packages available. Using the procedures and functions\
    \ in `DBMS_SESSION`, you can ensure the correct role is set and the `NLS` settings\
    \ are correct. To make debugging easier, set the session identifier. Using the\
    \ procedures and functions in `DBMS_UTILITY` and `UTL_CALL_STACK`, you can inquire\
    \ exactly where your program is at and what path it has taken to get there. Use\
    \ these procedures and functions to instrument your code so you can figure out\
    \ what, when, and why if something unanticipated happens.\n\n# 18. See What You\
    \ Need to See\n\nIf you store data in the database, it does not have to be visible\
    \ to everyone at any time. Sometimes you don’t want people to see your data. Sometimes\
    \ you want certain groups to see your data and others not. And sometimes you want\
    \ your data to be available at a certain period. Oracle Database provides different\
    \ mechanisms for these issues.\n\n## Temporal Validity\n\nSometimes the data in\
    \ our database is only valid for a certain period of time. You can simply update\
    \ the rows to their new values for the new period. But what if you need to be\
    \ able to retrieve the data as it was at a certain point in time? This means introducing\
    \ history tables where all the updates to the table are logged and then creating\
    \ queries to retrieve the data needed."
