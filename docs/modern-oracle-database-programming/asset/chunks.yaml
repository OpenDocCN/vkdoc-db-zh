  trans: '# 外连接


    外连接会显示一张表中的所有行，无论其在另一张表中是否存在匹配记录。可能有些车队目前还没有任何比赛结果。


    使用 ANSI 风格的外连接时，查询中表的顺序很重要。一个`左`外连接会指定显示连接关键字左侧表中的*所有行*，即使它与连接关键字右侧的表没有匹配项。`右`外连接也是同样的道理，但针对的是连接关键字右侧的行。


    > 注意

    >

    > 在网络论坛和各种示例中，书写外连接最常见的方式是使用`左外`连接。这可能是因为主表通常被首先书写。尽管常见，但这并非强制要求，而是一种最佳实践。本章及全书都将使用`左外连接`。


    在以下示例中，将显示所有车队，即使它们在`constructorresults`表中没有任何积分。


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid = crt.constructorid

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- -----------

    18         14 McLaren         British

    19         10 McLaren         British

    20          4 McLaren         British


    Pawl            American

    Rae             American

    Adams           American

    ```


    > 注意

    >

    > `outer`和`inner`关键字是可选的，但强烈建议使用它们以使语法更清晰。


    ## 几乎外连接


    “几乎外连接”是指在查询中书写了外连接，但被`where`子句中的额外条件所否定。


    在以下示例中，目标是查看所有车队及其车队成绩；但是，如果车队是`红牛`，你还想看到他们的积分。对于其他车队，此信息无关紧要，无需显示。该查询的首次尝试如下。


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid = crt.constructorid

    where  csr.constructorref = ''red_bull''

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    1062          2 Red Bull        Austrian

    1063       12.5 Red Bull        Austrian


    1072         18 Red Bull        Austrian

    1073         26 Red Bull        Austrian

    1074          0 Red Bull        Austrian

    1075         37 Red Bull        Austrian

    1076         18 Red Bull        Austrian

    1077         58 Red Bull        Austrian

    336 rows selected.

    ```


    如示例所示，查询中使用了外连接，但结果只显示了`红牛`的数据。所有其他车队的成绩都缺失了。这个查询并没有显示先前陈述的目标结果。要获得所需的查询结果集，过滤条件必须是一个连接条件。


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid  = crt.constructorid

    and    csr.constructorref = ''red_bull''

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    1062          2 Red Bull        Austrian

    1063       12.5 Red Bull        Austrian


    Alpine F1 Team  French

    McLaren         British

    Martini         French

    Pawl            American

    Cooper-BRM      British

    546 rows selected.

    ```


    现在查询按指定方式显示了结果，仅显示`红牛`车队的积分。


    ## 全外连接


    数据模型中没有一个可以应用全外连接的合适例子，但为了演示目的，将`RACES`和`CIRCUITS`之间的外键从必需改为可选。其思路是，未来应该可以安排一场比赛，而赛道是未知的。也可能存在一个赛道，但目前还没有为它安排任何比赛。


    在每个表中，都添加了一条带有虚构数据的额外记录。


    ```sql

    Insert into f1data.races

    ( raceid

    , year

    , round

    , circuitid

    , name

    , race_date

    )

    values

    ( 0

    , 2023

    , 42

    , null

    , ''Hitchhiker Race''

    , date ''2023-10-07''

    )

    /

    ```


    ```sql

    insert into f1data.circuits

    ( circuitid

    , circuitref

    , name

    , location

    , country

    )

    values

    ( 0

    , ''brabantbaan''

    , ''Brabant Baan''

    , ''Oosterhout''

    , ''Netherlands'')

    /

    ```


    在以下示例中，执行了一个全外连接，并对结果进行了过滤，仅显示在前面代码中刚刚添加的行。


    ```sql

    select rce.name      as race

    ,      rce.race_date

    ,      cct.name      as circuit

    ,      cct.location

    from   f1data.races rce

    full outer

    join   f1data.circuits cct

    on     rce.circuitid = cct.circuitid

    where  rce.rowid is null

    or     cct.rowid is null

    /

    RACE             RACE_DATE  CIRCUIT          LOCATION

    ---------------  ---------  ---------------  -----------

    Hitchhiker Race  07-OCT-23  Brabant Baan     Oosterhout

    ```


    一条来自`RACES`表的记录被显示出来，即使没有赛道来举办该赛事；同时一个没有安排比赛的赛道也被显示出来。


    ## 交叉连接


    在笛卡尔积中，第一张表的所有记录都与第二张表的记录相连接。使用 ANSI 连接语法，可以清楚地看出这是有意为之，而不是意外缺少了连接条件。在 ANSI 连接语法中，这被称为`交叉连接`。以下示例创建了一个车手的笛卡尔积；`drivers`表与自身相连接。为了展示交叉连接的效果，使用了一个计数。


    ```sql

    select count(*)

    from   f1data.drivers drv

    /

    COUNT(*)


    ```


    表中有 854 名车手。当这张表与自身进行笛卡尔积连接时，会生成所有可能的车手组合，结果是 854 × 854 条记录：729316 条记录。


    ```sql

    select count(*)

    from   f1data.drivers drv

    cross

    join   f1data.drivers drv2

    /

    COUNT(*)


    ```


    由于使用了明确的`交叉连接`语法，下一个阅读此代码的开发者会清楚地知道这个笛卡尔积是特意为之。'
- fmt: '## Partitioned Outer Joins


    A regular outer join remedies the situation where there is a missing matched row
    in the join condition by adding a null record to the result set. However, there
    are situations when a single row added to the result set is insufficient.


    Earlier in the chapter, an extra race was added to the calendar. There are no
    race results for this race. The objective is to show a result for each driver
    for this race, even if there is no result (which there isn’t).


    The tables involved are `RACES`, `RESULTS`, and `DRIVERS` (to show each driver’s
    name). A first attempt would be to outer join the results to the races and the
    drivers.


    ```sql

    select rce.name

    , drv.forename||'' ''||drv.surname as driver

    , rst.result_number

    from   f1data.races rce

    left outer

    join   f1data.results rst

    on   rce.raceid = rst.raceid

    left outer

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    where  rce.raceid = 0

    /

    ```

    ```

    NAME            DRIVER          RESULT_NUMBER

    --------------- --------------- -------------

    Hitchhiker Race

    ```


    The result is not what is requested. There is only one row for the race. There
    are no drivers listed, which is requested. The outer join to `RESULTS` only adds
    a single row as there is no match, but it should add a row for each driver. The
    `RESULTS` table should be subdivided by `driverid` and outer joined to the `RACES`
    table; that way, there is a record for each driver. By adding the `partition by`
    clause to the table, the outer join is *per partition* instead of the whole table.
    As the partition is per `driverid`, each driver has a `RESULTS` record. Because
    there is a record of the result for each driver, it is no longer necessary to
    have an outer join to the `drivers` table. The following query shows the partition
    outer join only for the drivers in the current season (2022).


    ```sql

    select rce.name

    , drv.forename||'' ''||drv.surname as driver

    , rst.result_number

    from   f1data.races rce

    left outer

    join   f1data.results rst partition by (rst.driverid)

    on   rce.raceid = rst.raceid

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    where  rce.raceid = 0

    and    drv.driverid in ( 1, 4, 830, 815, 847

    , 844, 832, 846, 839

    , 20, 822, 817, 842

    , 855, 854, 825, 840

    , 852, 848, 849)

    /

    ```

    ```

    NAME            DRIVER             RESULT_NUMBER

    --------------- ------------------ -------------

    Hitchhiker Race Lewis Hamilton

    Hitchhiker Race Fernando Alonso

    Hitchhiker Race Sebastian Vettel

    Hitchhiker Race Sergio Pérez

    Hitchhiker Race Daniel Ricciardo

    Hitchhiker Race Valtteri Bottas

    Hitchhiker Race Kevin Magnussen

    Hitchhiker Race Max Verstappen

    Hitchhiker Race Carlos Sainz

    Hitchhiker Race Esteban Ocon

    Hitchhiker Race Lance Stroll

    Hitchhiker Race Pierre Gasly

    Hitchhiker Race Charles Leclerc

    Hitchhiker Race Lando Norris

    Hitchhiker Race George Russell

    Hitchhiker Race Alexander Albon

    Hitchhiker Race Nicholas Latifi

    Hitchhiker Race Yuki Tsunoda

    Hitchhiker Race Mick Schumacher

    Hitchhiker Race Guanyu Zhou

    ```


    When the records are not filtered to only show data for certain drivers, there
    is a record for each driver listed in the `RESULTS` table. Since the results table
    has records for all races since the 1950s, there would be more data.


    ## Lateral Joins


    You cannot join a table to a correlated subquery unless a lateral join is used.
    With a lateral inline view, you can specify tables that appear to the left of
    the lateral inline view in the `from` clause of a query.


    The most common use case for a lateral join is to convert JSON documents to a
    relational format using the `JSON_TABLE` operator or similarly converted XML documents
    with the `XML_TABLE` operator.


    The following query shows a select group of drivers and their points in the `driverstandings`
    table, but only the first two (ordered by the highest points) and if points are
    scored. There is a correlation from the lateral inline view to the `drivers` table
    in the `driverid` column.


    ```sql

    select drv.driverid

    , drv.forename ||'' ''||drv.surname as driver

    , dsg.points

    , dsg.position

    from   f1data.drivers drv

    cross

    join lateral

    (select dsg.points

    , dsg.position

    from   f1data.driverstandings dsg

    where  dsg.driverid = drv.driverid

    and    dsg.points > 0

    order  by dsg.points desc

    fetch  first 2 rows only) dsg

    where  drv.driverid in ( 855, 854, 840, 852, 848, 849)

    order  by driverid desc

    /

    ```

    ```

    DRIVERID DRIVER              POINTS   POSITION

    ---------- --------------- ---------- ----------

    855 Guanyu Zhou              6         17

    855 Guanyu Zhou              6         18

    854 Mick Schumacher         12         15

    854 Mick Schumacher         12         15

    852 Yuki Tsunoda            32         14

    852 Yuki Tsunoda            20         14

    849 Nicholas Latifi          7         17

    849 Nicholas Latifi          7         16

    848 Alexander Albon        105          7

    848 Alexander Albon         93          8

    840 Lance Stroll            75         11

    840 Lance Stroll            74         10

    ```


    In the results, two columns were selected from the correlated subquery. With a
    scalar subquery, this would not be possible. A scalar subquery can only return
    a single value.


    Note: In addition to `cross join lateral`, you can also use `inner join lateral`;
    however, an inner join also requires a join condition (`on` clause or `using`
    clause). Because there is already a correlation between the table and the inline
    view, having a join condition is superfluous and doesn’t contribute to readability
    or maintainability. It is not recommended to use `inner join lateral`.


    The `cross apply` join is a variation of the `cross join` and can use a correlated
    subquery, unlike the latter. The same results from the preceding example can be
    achieved using a `cross apply` instead of `cross join lateral`. In the following
    example, the `cross apply` join is applied.


    ```sql

    select drv.driverid

    , drv.forename ||'' ''||drv.surname as driver

    , dsg.points

    from   f1data.drivers drv

    cross

    apply  (select dsg.points

    , dsg.driverid

    from   f1data.driverstandings dsg

    where  dsg.driverid = drv.driverid

    and    dsg.points > 0

    order  by dsg.points desc

    fetch  first 2 rows only

    ) dsg

    where  drv.driverid in ( 855, 854, 840, 852, 848, 849)

    order  by driverid desc

    /

    ```

    ```

    DRIVERID DRIVER                 POINTS

    ---------- ------------------ ----------

    855 Guanyu Zhou                 5

    855 Guanyu Zhou                 5

    854 Mick Schumacher             4

    852 Yuki Tsunoda               32

    852 Yuki Tsunoda               20

    849 Nicholas Latifi             7

    849 Nicholas Latifi             7

    848 Alexander Albon           105

    848 Alexander Albon            93

    840 Lance Stroll               75

    840 Lance Stroll               74

    ```


    To demonstrate the `outer apply` join, an extra driver is added to the drivers
    table.


    ```sql

    insert into f1data.drivers

    ( driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    )

    values

    ( 0

    , ''alxntn''

    , 53

    , ''ALX''

    , ''Alex''

    , ''Nuijten''

    )

    /

    ```


    The `outer apply` join is a variation of the left outer join and can use a correlated
    inline view. The following example shows the same results as earlier but includes
    the extra driver that was just created and has no driver standings record (he’s
    not that good).'
  raw: '## Partitioned Outer Joins


    A regular outer join remedies the situation where there is a missing matched row
    in the join condition by adding a null record to the result set. However, there
    are situations when a single row added to the result set is insufficient.


    Earlier in the chapter, an extra race was added to the calendar. There are no
    race results for this race. The objective is to show a result for each driver
    for this race, even if there is no result (which there isn’t).


    The tables involved are `RACES`, `RESULTS`, and `DRIVERS` (to show each driver’s
    name). A first attempt would be to outer join the results to the races and the
    drivers.


    ```

    select rce.name

    , drv.forename||'' ''||drv.surname as driver

    , rst.result_number

    from   f1data.races rce

    left outer

    join   f1data.results rst

    on   rce.raceid = rst.raceid

    left outer

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    where  rce.raceid = 0

    /

    NAME            DRIVER          RESULT_NUMBER

    --------------- --------------- -------------

    Hitchhiker Race

    ```


    The result is not what is requested. There is only one row for the race. There
    are no drivers listed, which is requested. The outer join to `RESULTS` only adds
    a single row as there is no match, but it should add a row for each driver. The
    `RESULTS` table should be subdivided by `driverid` and outer joined to the `RACES`
    table; that way, there is a record for each driver. By adding the `partition by`
    clause to the table, the outer join is *per partition* instead of the whole table.
    As the partition is per `driverid`, each driver has a `RESULTS` record. Because
    there is a record of the result for each driver, it is no longer necessary to
    have an outer join to the `drivers` table. The following query shows the partition
    outer join only for the drivers in the current season (2022).


    ```

    select rce.name

    , drv.forename||'' ''||drv.surname as driver

    , rst.result_number

    from   f1data.races rce

    left outer

    join   f1data.results rst partition by (rst.driverid)

    on   rce.raceid = rst.raceid

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    where  rce.raceid = 0

    and    drv.driverid in ( 1, 4, 830, 815, 847

    , 844, 832, 846, 839

    , 20, 822, 817, 842

    , 855, 854, 825, 840

    , 852, 848, 849)

    /

