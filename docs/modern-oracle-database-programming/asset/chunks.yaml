    )

    /

    PK NAME                              FK

    ---------- ------------------------- ----------

    1 McLaren

    131 Mercedes

    1 Hamilton                           1

    131 Modena                            17

    131 Modena                            25

    131 Modena                            34

    131 Modena                            44

    1 Hamilton                         131

    ```


    Only two constructors and two drivers are selected. The main difference with previous
    examples is that the prefixes of the columns PK and FK are removed, leading to
    false positive relations, and causing a cycle in the data.


    With the traditional `start with ... connect by` syntax, it is also possible to
    do cycle detection. The following error is raised when there is a cycle in the
    data.


    ```

    ORA-01436: CONNECT BY loop in user data

    ```


    The `connect_by_iscycle` pseudocolumn returns a one when the current row has a
    child record which is also one of its parents (direct parent, grandparent, etc.).
    This pseudocolumn can only be used when `nocycle` is specified in the `connect
    by` clause.


    With recursive subquery factoring, a cyclic relation is when the current row is
    also one of its ancestors. A `cycle` clause can be added to recursive subquery
    factoring to detect cyclic relations. When there is a cyclic relation in recursive
    subquery factoring, the following exception is raised.


    ```

    ORA-32044: cycle detected while executing recursive WITH query

    ```


    The following example shows the use of the `cycle` clause.


    ```

    , hierarchy (pk, name, fk)

    as (

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    union  all

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    ) search depth first by name set seq

    cycle name set is_cycle to ''Y'' default ''N''

    select pk

    , name

    , fk

    , is_cycle

    from   hierarchy

    /

    PK NAME                    FK I

    ---------- --------------- ---------- -

    1 McLaren                    N

    1 Hamilton                 1 N

    1 Hamilton                 1 Y

    131 Mercedes                   N

    1 Hamilton               131 N

    1 Hamilton                 1 Y

    ```


    As seen in the last column, the cyclic relation is detected. The column used for
    cycle detection can be set to any column, not necessarily the columns directly
    involved in the hierarchy, which isn’t possible with a `connect by` hierarchical
    query.


    ## Summary


    Subquery factoring is a very useful technique for writing SQL statements. Because
    it is possible to break down the result set into smaller bite-size pieces, it
    has an almost procedural feel. Instead of writing a massive query, subquery factoring
    can help keep your SQL statement clean.


    Recursive subquery factoring offers nearly the same functionality as the traditional
    start with .. `connect by` syntax but has more advanced cycle detection. Because
    the recursive member is a separate subquery, it can be much more flexible and
    include multiple tables, more complex column expressions, and results from previous
    iterations. It allows more flexibility and complexity when the need arises.


    # 10. Calling PL/SQL from SQL


    Calling a reusable piece of code stored in a PL/SQL function—packaged or stand-alone—results
    in a context switch. The SQL engine stops whatever it is doing and gives control
    to the PL/SQL engine, which then does its work and returns control to the SQL
    engine after it’s done. These context switches are relatively expensive. They
    involve a lot of work by both engines to transfer all the relative information
    before the real work can be done. Oracle Database offers a multitude of possible
    solutions to minimize the overhead.


    ## UDF Pragma


    The UDF pragma tells the compiler that this function is used primarily in SQL,
    so the code is optimized for this, which *might* improve performance. UDF stands
    for *user-defined function*. The only insurance you get is that it is not slower
    than a function not using this pragma when called from SQL. If this function is
    called from PL/SQL, you may see a decrease in performance. Listing [10-1](#536316_1_En_10_Chapter.xhtml#PC1)
    is an example of a function with the UDF pragma.


    ```

    create or replace function fullname_udf

    ( forename_in in varchar2

    , surname_in  in varchar2 )

    return varchar2

    is

    pragma udf;

    l_returnvalue varchar2( 32767 );

    begin

    l_returnvalue := initcap( forename_in )

    || '' ''

    || initcap( surname_in );

    return l_returnvalue;

    end;

    /

    Listing 10-1

    A function with UDF pragma

    ```


    You may see a substantial performance increase or none at all. Your mileage may
    vary. If you are sure the function is only called from SQL, then it can be a good
    idea to include this pragma, otherwise, be sure you test the different scenarios
    and then determine whether you want to use this or not.'
  trans: '## 循环检测


    在以下示例中，名为 `constructor_drivers` 的子查询定义如下。


    ```

    with constructor_drivers as

    (

    select ctr.constructorid as pk

    , ctr.name

    , null as fk

    from   f1data.constructors ctr

    where  ctr.constructorid in ( 1   -- McLaren

    , 131 -- Mercedes

    )

    union all

    select distinct

    drv.driverid

    , drv.surname as driver

    , rst.constructorid

    from   f1data.results rst

    join   f1data.drivers drv

    on   drv.driverid = rst.driverid

    where  drv.driverid in ( 1   -- Hamilton

    , 131 -- Modena

    )

    )

    /

    PK NAME                              FK

    ---------- ------------------------- ----------

    1 McLaren

    131 Mercedes

    1 Hamilton                           1

    131 Modena                            17

    131 Modena                            25

    131 Modena                            34

    131 Modena                            44

    1 Hamilton                         131

    ```


    这里仅选择了两个车队和两位车手。与之前示例的主要区别在于，`PK` 和 `FK` 列的前缀被移除，这导致了错误的关联关系（假阳性），并在数据中造成了循环。


    使用传统的 `start with ... connect by` 语法也可以进行循环检测。当数据中存在循环时，会引发以下错误。


    ```

    ORA-01436: CONNECT BY loop in user data

    ```


    `connect_by_iscycle` 伪列在当前行的子记录同时也是其父记录之一（直系父级、祖父级等）时返回 1。此伪列仅在 `connect by` 子句中指定了
    `nocycle` 时才能使用。


    使用递归子查询分解时，循环关系是指当前行也是其祖先之一。可以在递归子查询分解中添加 `cycle` 子句来检测循环关系。当递归子查询分解中存在循环关系时，会引发以下异常。


    ```

    ORA-32044: cycle detected while executing recursive WITH query

    ```


    以下示例展示了 `cycle` 子句的用法。


    ```

    , hierarchy (pk, name, fk)

    as (

    select pk

    , name

    , fk

    from   constructor_drivers

    where  fk is null

    union  all

    select cdv.pk

    , cdv.name

    , cdv.fk

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    ) search depth first by name set seq

    cycle name set is_cycle to ''Y'' default ''N''

    select pk

    , name

    , fk

    , is_cycle

    from   hierarchy

    /

    PK NAME                    FK I

    ---------- --------------- ---------- -

    1 McLaren                    N

    1 Hamilton                 1 N

    1 Hamilton                 1 Y

    131 Mercedes                   N

    1 Hamilton               131 N

    1 Hamilton                 1 Y

    ```


    如最后一列所示，检测到了循环关系。用于循环检测的列可以设置为任何列，不一定是直接参与层次结构的列，而这在 `connect by` 层次查询中是无法实现的。


    ### 总结


    子查询分解是编写 SQL 语句的一项非常有用的技术。因为它可以将结果集分解为更小的、易于理解的部分，所以它几乎具有过程化的感觉。子查询分解有助于保持 SQL
    语句的清晰，而不是编写一个庞大的查询。


    递归子查询分解提供了与传统 `start with .. connect by` 语法几乎相同的功能，但具有更高级的循环检测能力。因为递归成员是一个独立的子查询，所以它可以更加灵活，可以包含多个表、更复杂的列表达式以及先前迭代的结果。当需要时，它允许更大的灵活性和处理更复杂的情况。


    ## 10. 从 SQL 调用 PL/SQL


    调用存储在 PL/SQL 函数（打包的或独立的）中的可重用代码会导致上下文切换。SQL 引擎会停止正在执行的操作，并将控制权交给 PL/SQL 引擎，后者完成其工作，然后将控制权交还给
    SQL 引擎。这些上下文切换的开销相对较大。在真正的工作开始之前，两个引擎都需要做大量工作来传递所有相关信息。Oracle 数据库提供了多种可能的解决方案来最小化这种开销。


    ### UDF 编译指示


    UDF 编译指示告诉编译器此函数主要在 SQL 中使用，因此代码会为此进行优化，这可能会提高性能。UDF 代表 *用户定义函数*。你能得到的唯一保证是，当从
    SQL 调用时，它不比未使用此编译指示的函数慢。如果此函数从 PL/SQL 调用，你可能会看到性能下降。清单 10-1 是一个带有 UDF 编译指示的函数示例。


    ```

    create or replace function fullname_udf

    ( forename_in in varchar2

    , surname_in  in varchar2 )

    return varchar2

    is

    pragma udf;

    l_returnvalue varchar2( 32767 );

    begin

    l_returnvalue := initcap( forename_in )

    || '' ''

    || initcap( surname_in );

    return l_returnvalue;

    end;

    /

    清单 10-1

    带有 UDF 编译指示的函数

    ```


    你可能会看到显著的性能提升，也可能完全没有提升。效果可能因情况而异。如果你确定该函数仅从 SQL 调用，那么包含此编译指示可能是个好主意，否则，请务必测试不同场景，然后决定是否要使用它。'
- fmt: '## Deterministic


    A function that is declared deterministic caches the parameters during the execution
    of a SQL statement. If the input parameters are the same as they were on a previous
    execution, then the body of the function is not executed again. The result is
    taken from the cache and returned directly. When you make a function deterministic,
    you tell the database that this function `always` returns the same output for
    the same input. That means you can never have the output of a deterministic function
    depend on table values, `SYSDATE`, or the like—the output must `only` depend on
    the input.


    This can lead to a major performance increase since the body of the function doesn’t
    have to be executed anymore. And no matter how fast your code is, not executing
    it is always faster.


    To demonstrate the performance increase, create a simple table with a single column.

    ```

    create table t ( c number )

    /

    ```


    Then add ten rows to this table with three distinct values.

    ```

    begin

    insert into t( c ) values ( 1 );

    insert into t( c ) values ( 2 );

    insert into t( c ) values ( 3 );

    insert into t( c ) values ( 1 );

    insert into t( c ) values ( 2 );

    insert into t( c ) values ( 3 );

    insert into t( c ) values ( 1 );

    insert into t( c ) values ( 2 );

    insert into t( c ) values ( 3 );

    insert into t( c ) values ( 1 );

    commit;

    end;

    /

    ```


    For demonstration purposes, create a function that does nothing but sleep for
    a second before returning the value provided in the `in` parameter (see Listing
    [10-2](#536316_1_En_10_Chapter.xhtml#PC4)).

    ```

    create or replace function myslowfunction( p_in in number )

    return number

    is

    begin

    dbms_session.sleep( 1 );

    return p_in;

    end;

    /

    Listing 10-2

    A very slow function

    ```


    Then call the function for every row in the table.

    ```

    set timing on

    select myslowfunction( t.c ) from t

    /

    set timing off

    MYSLOWFUNCTION(T.C)


    10 rows selected

    Executed in 10,384 seconds

    ```


    As you can see, the execution takes a little over 10 seconds, which makes sense
    because the function is called ten times and didn’t do much more than sleep for
    a second.


    If you alter the function and add the keyword `deterministic`, you can run the
    same query again (see Listing [10-3](#536316_1_En_10_Chapter.xhtml#PC6)).

    ```

    create or replace function myslowfunction( p_in in number )

    return number

    deterministic

    is

    begin

    dbms_session.sleep( 1 );

    return p_in;

    end;

    /

    set timing on

    select myslowfunction( t.c ) from t

    /

    set timing off

    MYSLOWFUNCTION(T.C)


    10 rows selected

    Executed in 3,234 seconds

    Listing 10-3

    A very slow deterministic function

    ```


    As you can see, the statement now takes a little over 3 seconds. The function
    had to be executed three times because of the three distinct values. Every time
    the function was called with a parameter it had already seen, the body of the
    function was not executed, and the result was directly returned from the cache.


    ## Result Cache


    When a function is declared with the `result_cache` keyword, the effect is pretty
    much the same as when the function is declared as deterministic; but in this case,
    the function can rely on table data. Oracle Database automatically invalidates
    the cache when the table data changes.


    Another advantage of declaring it as a result cached is that the cache is shared
    between sessions in the database. That means that the first one to call the function
    with a certain set of parameters takes the hit of executing the entire function.
    Also, a bit of time is used to fill up the cache. The second time this function
    gets called, by any session, just return the result from the cache without executing
    the function body (see Listing [10-4](#536316_1_En_10_Chapter.xhtml#PC7)).

    ```

    create or replace function myslowfunction( p_in in number )

    return number

    result_cache

    is

    begin

    dbms_session.sleep( 1 );

    return p_in;

    end;

    /

    set timing on

    select myslowfunction( t.c ) from t

    /

    set timing off

    MYSLOWFUNCTION(T.C)


    10 rows selected

    Executed in 3,237 seconds

    disconnect

    connect book/>

    set timing on

    select myslowfunction( t.c ) from t

    /

    set timing off

    MYSLOWFUNCTION(T.C)


    10 rows selected

    Executed in 0,097 seconds

    Listing 10-4

    A very slow result_cache function

    ```


    ## Hierarchical Profiler


    To determine where you should focus your attention to improve performance, it
    is a good idea to have insight into where your program is spending its time. You
    can do this by profiling your code. Start a profiling session and execute your
    program. A hierarchical profiler can help in this process.


    There are a few steps to take if you have a block of code to analyze. First, compile
    the program you want to trace. Let’s create a package to display info about the
    constructors and their drivers for a given year.


    Note


    This is not the best and/or fastest way to build a procedure that shows information
    about constructors and their drivers, but it is done to demonstrate hierarchical
    profiler usage.


    The package specification consists of only one procedure, as shown in Listing
    [10-5](#536316_1_En_10_Chapter.xhtml#PC8).

    ```

    create or replace package f1info is

    procedure show_season(year_in in number);

    end f1info;

    /

    Listing 10-5

    f1info package

    ```


    In the body of the package, build a private procedure to display a driver’s information.

    ```

    procedure show_driver(driverid_in in number)

    is

    l_forename    f1data.drivers.forename%type;

    l_surname     f1data.drivers.surname%type;

    l_nationality f1data.drivers.nationality%type;

    begin

    select d.forename

    , d.surname

    , d.nationality

    into   l_forename

    , l_surname

    , l_nationality

    from   f1data.drivers d

    where  d.driverid = driverid_in;

    dbms_output.put_line( ''  ''

    ||l_forename

    ||'' ''

    ||l_surname

    ||''(''

    ||l_nationality

    ||'')''

    );

    end show_driver;

    ```


    Also, create a procedure to display the information of a constructor. This procedure
    calls the `show_driver` procedure for all the drivers that drive for this constructor
    in the requested year.

    ```

    procedure show_constructor( year_in          in number

    , constructorid_in in number

    )

    is

    l_name        f1data.constructors.name%type;

    l_nationality f1data.constructors.nationality%type;

    begin

    select c.name

    , c.nationality

    into   l_name

    , l_nationality

    from   f1data.constructors c

    where  c.constructorid = constructorid_in;

    dbms_output.put_line( l_name

    ||''(''

    ||l_nationality

    ||'')''

    );

    for driver in

    (select distinct res.driverid

    from   f1data.results res

    join   f1data.races   r

    on   (res.raceid = r.raceid)

    where  1=1

    and    r.year = year_in

    and    res.constructorid = constructorid_in

    ) loop

    show_driver( driverid_in => driver.driverid );

    end loop;

    end show_constructor;

    ```


    Finally, implement the `show_season` procedure.

    ```

    procedure show_season(year_in in number)

    is

    begin

    for constructor in

    (select distinct res.constructorid

    from   f1data.results res

    join   f1data.races   r

    on   (res.raceid = r.raceid)

    where  1=1

    and    r.year = year_in

    ) loop

    show_constructor

    ( year_in          => year_in

    , constructorid_in => constructor.constructorid

    );

    end loop;

    end show_season;

    ```


    Listing 10-6 is the complete package body, which can be downloaded from this book’s
    GitHub page.


    ### DBMS_HPROF


    To help with profiling your code, you can use the `DBMS_HPROF` package. This package
    consists of a procedure to create the necessary tables, procedures, and functions
    to start and stop profiling and to analyze the acquired data.


    ### create_tables


    The `create_tables` procedure creates the tables needed to store all the profiling
    data.

    ```

    begin

    dbms_hprof.create_tables;

    end;

    /

    ```


    If you run this procedure a second time, you get an error telling you that the
    tables already exist. If you want to drop and re-create the tables, you can call
    the procedure with the `force_it` parameter set to `TRUE`.

    ```

    begin

    dbms_hprof.create_tables( force_it => true );

    end;

    /

    ```


    This procedure also re-creates two sequences.'
