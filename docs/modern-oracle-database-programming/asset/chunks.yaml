  trans: '


    ## 包装过程


    对于此用例，需要一个过程将文件存储在暂存表中，并在队列上放置一条消息。用于入队消息的包装过程定义如下。


    ```sql

    procedure process_later (p_fileid in staging.fileid%type)

    is

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw( 16 );

    l_payload            file_payload_ot;

    begin

    l_payload := file_payload_ot( p_fileid );

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    end process_later;

    ```


    应用程序调用的用于将文件存储在暂存表中的过程定义如下。


    ```sql

    procedure upload_file

    ( p_filename     in staging.filename%type

    , p_mime_type    in staging.mime_type%type

    , p_blob_content in staging.blob_content%type

    )

    is

    l_fileid staging.fileid%type;

    begin

    insert into staging

    ( filename

    , mime_type

    , blob_content

    , upload_ts

    , processed)

    values

    ( p_filename

    , p_mime_type

    , p_blob_content

    , systimestamp

    , ''N'')

    returning fileid

    into l_fileid;

    -- 当文件存储在表中后

    -- 在队列上放置一条消息以

    -- 在稍后时间启动处理

    process_later( p_fileid => l_fileid );

    end;

    /

    ```


    还需要一个过程来处理文件并将数据分发到正确的表中。对于本章，该过程的实现并不重要。实现了以下过程来模拟文件的处理。


    ```sql

    procedure process_file (p_fileid in staging.fileid%type)

    is

    begin

    sys.dbms_session.sleep( 3 ); -- 模拟耗时操作

    update staging

    set    processed = ''Y''

    , processed_ts = systimestamp

    where  fileid = p_fileid;

    end process_file;

    /

    ```


    此过程首先等待三秒钟，之后将处理标志设置为 `''Y''`，并用当前时间戳填充 `processed_ts`。


    ## PL/SQL 回调通知


    一旦文件被上传到暂存表，并且消息被放入队列，如何启动处理？


    一种方法是安排一个作业运行，比如每天在指定时间运行。安排作业的缺点是，即使没有文件需要处理，作业也会运行。文件也可能在作业运行后上传，导致处理延迟。这也意味着即使系统在该时间非常繁忙，作业也会运行，从而妨碍系统用户。


    ### 回调通知机制


    队列有一个更好的技巧：PL/SQL 回调通知。当消息添加到队列时，回调通知可以启动一个 PL/SQL 过程。当消息入队时，回调过程会自动启动。当这种情况发生时，它由数据库处理，很可能是在数据库“安静”时。缺点是无法控制*何时*处理文件。


    ### 设置回调


    必须采取一些步骤来设置 PL/SQL 回调通知。首先，队列表必须允许多个消费者出队消息。消费者是读取队列中消息的代理。


    不幸的是，队列表不能被修改以允许多个消费者。这只能在创建时指定。要删除队列表和队列，请执行以下代码。


    ```sql

    begin

    dbms_aqadm.stop_queue

    ( queue_name => ''file_process_q'' );

    dbms_aqadm.drop_queue

    ( queue_name => ''file_process_q'' );

    dbms_aqadm.drop_queue_table

    ( queue_table => ''file_process_qt'' );

    end;

    /

    ```


    队列在启动时无法被删除。必须先停止它。


    以下代码创建一个新的队列表，启用了多消费者功能，并基于相同的对象类型。


    ```sql

    begin

    sys.dbms_aqadm.create_queue_table

    ( queue_table        => ''file_process_qt''

    , queue_payload_type => ''file_payload_ot''

    , multiple_consumers => true

    );

    end;

    /

    ```


    重新创建队列表后，也必须重建队列。


    ```sql

    begin

    sys.dbms_aqadm.create_queue

    ( queue_name  => ''file_process_q''

    , queue_table => ''file_process_qt''

    );

    sys.dbms_aqadm.start_queue

    ( queue_name => ''file_process_q'' );

    end;

    /

    ```


    这些操作会导致数据库中创建额外的对象。


    ```sql

    select object_name

    , object_type

    from   user_objects

    where  object_name like ''AQ%''

    /

    OBJECT_NAME               OBJECT_TYPE

    ------------------------- -----------------------

    AQ$FILE_PROCESS_QT        VIEW

    AQ$FILE_PROCESS_QT_R      VIEW

    AQ$FILE_PROCESS_QT_S      VIEW

    AQ$_FILE_PROCESS_QT_E     QUEUE

    AQ$_FILE_PROCESS_QT_F     VIEW

    AQ$_FILE_PROCESS_QT_G     TABLE

    AQ$_FILE_PROCESS_QT_H     TABLE

    AQ$_FILE_PROCESS_QT_I     TABLE

    AQ$_FILE_PROCESS_QT_L     TABLE

    AQ$_FILE_PROCESS_QT_N     SEQUENCE

    AQ$_FILE_PROCESS_QT_S     TABLE

    AQ$_FILE_PROCESS_QT_T     TABLE

    AQ$_FILE_PROCESS_QT_V     EVALUATION CONTEXT

    13 行已选择。

    ```


    ### 回调过程


    在消费者可以订阅队列并指定要调用的 PL/SQL 例程之前，必须创建 PL/SQL 回调过程。PL/SQL 回调过程必须遵循以下签名。


    ```sql

    procedure plsqlcallback(

    context  IN  RAW

    , reginfo  IN  SYS.AQ$_REG_INFO

    , descr    IN  SYS.AQ$_DESCRIPTOR

    , payload  IN  RAW

    , payloadl IN  NUMBER

    );

    ```


    对于这个简单的用例，`descr` 参数包含了所有需要的信息。其他参数可用于更高级的用例。PL/SQL 回调过程的主要目的是出队消息并调用文件处理功能。


    ```sql

    procedure process_file_callback( context  in raw

    , reginfo  in sys.aq$_reg_info

    , descr    in sys.aq$_descriptor

    , payload  in raw

    , payloadl in number)

    is

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw(16);

    l_payload            file_payload_ot;

    begin

    -- 从队列中检索消息

    l_dequeue_options.msgid := descr.msg_id;

    l_dequeue_options.consumer_name := descr.consumer_name;

    sys.dbms_aq.dequeue

    ( queue_name         => descr.queue_name

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_msgid

    );

    -- 一旦消息出队，就可以在处理文件

    -- 过程中完成实际工作，以解析和处理

    -- 文件内容

    process_file (p_fileid => l_payload.fileid);

    -- 必须提交事务以

    -- 确保消息从队列中

    -- 被移除

    commit;

    end process_file_callback;

    /

    ```


    该过程应使用 `commit` 完成事务，以确保消息从队列中明确移除。


    ### 注册订阅者和回调


    有了这个 PL/SQL 回调通知，就可以创建一个消费者来订阅队列。订阅者的名称是 `file_process_subscriber`，并被添加到 `file_process_q`。


    ```sql

    begin

    sys.dbms_aqadm.add_subscriber

    ( queue_name => ''file_process_q''

    , subscriber => sys.aq$_agent

    ( name     => ''file_process_subscriber''

    , address  => null

    , protocol => null

    )

    );

    end;

    /

    ```


    最后一步是注册实际的回调过程。


    ```sql

    begin

    sys.dbms_aq.register

    ( reg_list =>

    sys.aq$_reg_info_list

    ( sys.aq$_reg_info

    ( name      => ''file_process_q:file_process_subscriber''

    , namespace => dbms_aq.namespace_aq

    , callback  => ''plsql://process_file_callback''

    , context   => null

    )

    )

    , reg_count => 1

    );

    end;

    /

    ```


    `context` 参数可用于将信息（以 RAW 格式）传递给回调过程。在回调过程中，您可以使用此信息，例如，来区分队列的不同订阅者。对于此用例，由于只有一个订阅者，因此不需要这样做。


    '
- fmt: '## Seeing It in Action


    Once all components are in place, the code that the application uses to upload
    the files to the database initiates the whole process. As the files are not parsed
    and processed, the control returns immediately back to the user of the application.


    ```

    begin

    upload_file

    ( p_filename     => ''latest.csv''

    , p_mime_type    => ''text/csv''

    , p_blob_content => :file

    );

    end;

    /

    ```


    The front-end application manages the transactions. The user is in control of
    ending a transaction with either a `commit` or `rollback`.


    Once the transaction is ended with a `commit`, the message on the queue is stored,
    and the callback procedure is called.


    Right after a file is uploaded using the preceding routine, the following can
    be observed in the staging table.


    ```

    select to_char (upload_ts, ''hh24:mi:ss.ff9'')    as upload_ts

    , to_char (processed_ts, ''hh24:mi:ss.ff9'') as processed_ts

    , processed_ts - upload_ts                 as elapsed_time

    from   staging

    /

    UPLOAD_TS          PROCESSED_TS       ELAPSED_TIM

    ------------------ ------------------ -----------

    12:28:54.873961000

    ```


    After waiting for a few seconds, the following results can be seen.


    ```

    UPLOAD_TS          PROCESSED_TS       ELAPSED_TIME

    ------------------ ------------------ -------------------

    12:28:54.873961000 12:28:58.108458000 +00 00:00:03.234497

    ```


    Of course, this strongly depends on how “busy” or “quiet” the database is. When
    the database is busy, the callback function is executed later. There is no API
    to control or define the number of concurrent `PL/SQL` notification dequeue processes.
    This is because `AQ` messages can come in bursts, and having a fixed number of
    processes may not always work efficiently. `AQ` notification automatically starts
    the appropriate number of background processes (a.k.a. `EMON` slaves), depending
    on the total workload and time it takes to execute the user-defined `PL/SQL` callback
    procedure.


    When a message is enqueued, user `SYS` starts a new session in the background.
    The module is `DBMS_SCHEDULER`, so there must be some involvement of this package
    in relation to the mechanism. The action is set to something to the effect of
    “`AQ$_PLSQL_NTFN_`” followed by a number. The action signals involve `AQ` and
    `PL/SQL` notification. This can be observed by querying `gv$session`.


    ```

    select username

    , module

    , action

    from   gv$session

    /

    USERNAME    MODULE              ACTION

    ----------- ------------------- -------------------------

    SYS         DBMS_SCHEDULER      AQ$_PLSQL_NTFN_4107371948

    ```


    ## Exception Queue


    An exception queue is automatically added when a queue table is created. When
    an unexpected exception occurs during the execution of the callback procedure,
    the message that is on the queue is moved to an exception queue.


    Querying the `user_queues` data dictionary view shows two queues in the `file_process_qt`
    queue table: one normal and one exception.


    ```

    select name

    , queue_table

    , queue_type

    from   user_queues

    /

    NAME                  QUEUE_TABLE     QUEUE_TYPE

    --------------------- --------------- --------------------

    FILE_PROCESS_Q        FILE_PROCESS_QT NORMAL_QUEUE

    AQ$_FILE_PROCESS_QT_E FILE_PROCESS_QT EXCEPTION_QUEUE

    ```


    For demonstration purposes, the `process_file` procedure, which is eventually
    called from the callback procedure, is modified to `always` raise an exception
    by including the following line in the procedure body.


    ```

    raise zero_divide;

    ```


    This exception goes unhandled in the `process_file` procedure and is propagated
    to the calling `process_file_callback` procedure. As the callback procedure is
    being called `headless`, there is no client to observe this exception. The message
    is moved to the exception queue.


    This doesn’t happen immediately; several attempts are made to execute the procedure
    successfully. How often these attempts are made and how much delay should be between
    attempts can be controlled when the queue is created. Two arguments control these
    settings: `max_retries` and `retry_delay`. When these arguments are not filled
    out, the callback procedure is tried six times before the message is moved to
    the exception queue. Each attempt is tried immediately. There is no delay.


    The movement of the message from the normal queue to the exception queue can be
    observed when querying the queue table `file_process_qt` in succession.


    ```

    select qt.q_name

    , qt.msgid

    , to_char (systimestamp, ''hh24:mi:ss.ff9'') as ts

    from   file_process_qt qt

    /

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    FILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:45:55.842533000

    >

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    FILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:46:12.811844000

    >

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    AQ$_FILE_PROCESS_QT_E ECA2CF1D94B3043FE0539518 13:46:15.315077000

    ```


    Once the situation has been remedied and the exceptional situation is gone, the
    messages from the exception queue can be placed back into the normal queue, which
    triggers the callback procedure to be executed again.


    Before messages can be dequeued from an exception queue, the exception queue must
    be started for dequeue operations. The following code must be executed to start
    the exception queue for dequeuing operations.


    ```

    begin

    sys.dbms_aqadm.start_queue

    ( queue_name => ''AQ$_FILE_PROCESS_QT_E''

    , enqueue    => false

    , dequeue    => true

    );

    end;

    /

    ```


    The exception queue can’t be started for enqueue operations.


    Moving the messages from the exception to the normal queue can be done by dequeuing
    them from the exception queue and enqueuing them on the normal queue. The following
    code shows this for all messages on the exception queue with a simple `for-loop`
    construct.


    ```

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_message_handle     raw(16);

    l_payload            file_payload_ot;

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    begin

    for r in (select qt.msgid

    from   file_process_qt qt

    where  qt.q_name = ''AQ$_FILE_PROCESS_QT_E'')

    loop

    l_dequeue_options.msgid := r.msgid;

    sys.dbms_aq.dequeue

    ( queue_name         => ''AQ$_FILE_PROCESS_QT_E''

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_message_handle

    );

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_message_handle

    );

    end loop;

    commit;

    end;

    /

    ```


    There are situations where messages are on the exception queue and need to be
    removed. When this is the case, the exception queue can be purged using the `purge_queue_table`
    procedure from the `DBMS_AQADM` package.


    ```

    declare

    l_purge_options sys.dbms_aqadm.aq$_purge_options_t;

    begin

    sys.dbms_aqadm.purge_queue_table

    ( ''file_process_qt''

    , ''qtview.queue = ''''AQ$_FILE_PROCESS_QT_E''''''

    , l_purge_options

    );

    end;

    /

    ```'
