    Nr of drivers: 3

    1) Nico Hülkenberg

    2) Lance Stroll

    3) Sebastian Vettel

    Mercedes

    Nr of drivers: 5

    1) Valtteri Bottas

    2) Lewis Hamilton

    3) Michael Schumacher

    4) Nico Rosberg

    5) George Russell

    Red Bull

    Nr of drivers: 12

    1) Alexander Albon

    2) David Coulthard

    3) Robert Doornbos

    4) Pierre Gasly

    5) Christian Klien

    6) Daniil Kvyat

    7) Vitantonio Liuzzi

    8) Max Verstappen

    9) Sergio Pérez

    10) Daniel Ricciardo

    11) Sebastian Vettel

    12) Mark Webber

    >

    Haas F1 Team

