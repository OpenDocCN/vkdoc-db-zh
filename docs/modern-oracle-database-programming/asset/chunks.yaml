    split_ptf package body

    ```


    Now that the package is complete, let’s write the wrapper function for this PTF.
    The wrapper function has the same parameters as the `describe` function in the
    package, only this time, the SQL equivalent of the PL/SQL types is used. Also,
    the semantics type of a PTF is declared. In this case, it is a row semantics function
    as the PTF works per row.


    Listing [8-3](#536316_1_En_8_Chapter.xhtml#PC16) features the wrapper function.


    ```

    create or replace function split

    (

    tab  in table

    , cols in columns default null

    ) return table

    pipelined row polymorphic using split_ptf;

    /

