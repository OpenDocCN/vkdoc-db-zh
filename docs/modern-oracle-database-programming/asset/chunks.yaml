  raw: '### comma_to_table


    Using `comma_to_table``,` you can split a comma-separated string into values in
    an associative array. This can be useful if a column in your database consists
    of comma-separated values you want to process individually, especially when the
    number of elements can differ in every row.


    Note


    `dbms_utility.comma_to_table` is intended for comma-separated list of identifiers,
    so the `uncl_array` used as an example in this section is `table of varchar2(227)`,
    where 227 is the max length possible for `"user"."name"."column"@link` format
    identifiers. You cannot use `comma_to_table` for any generic list of values, only
    with a maximum length of 227\. If a more generic solution is needed, look into
    `apex_string.split` (see Chapter [15](#536316_1_En_15_Chapter.xhtml)).


    Let’s say you have a view with a column containing all the drivers for a certain
    constructor, as shown in Listing [17-6](#536316_1_En_17_Chapter.xhtml#PC27).


    ```

    create or replace view drivers_for_constructors

    as

    select dcr.constructorid                         as constructorid

    , ctr.name                                  as name

    , listagg( distinct( drv.driverref ), '','' ) as drivers

    from   driverconstructors  dcr

    join   f1data.constructors ctr

    on ( dcr.constructorid = ctr.constructorid )

    join   f1data.drivers      drv

    on ( dcr.driverid      = drv.driverid )

    group  by dcr.constructorid

    , ctr.name

    /

    Listing 17-6

    A view containing all the drivers per constructor

    ```


    Some constructors only have two drivers, for example, because they only participated
    for a single season. Some have a plethora of drivers because they have participated
    since Formula 1 started.


    If you want to display the separate drivers for every constructor, you can build
    a script as you see in Listing [17-7](#536316_1_En_17_Chapter.xhtml#PC28).


    ```

    declare

    l_tablen binary_integer;

    l_tab dbms_utility.uncl_array;

    l_drivername varchar2( 32767 );

    begin

    for rec in (select distinct ctr.name

    , dfc.drivers

    from   drivers_for_constructors dfc

    join   driverconstructors as of period

    for    drivercontract to_date( ''20220320''

    , ''YYYYMMDD'') dcr

    on     ( dfc.constructorid = dcr.constructorid )

    join   f1data.constructors ctr

    on     ( dfc.constructorid = ctr.constructorid )

    )

    loop

    dbms_output.put_line( rec.name );

    dbms_utility.comma_to_table( list   => rec.drivers

    , tablen => l_tablen

    , tab    => l_tab );

    dbms_output.put_line(  ''Nr of drivers: ''

    || to_char( l_tablen )

    );

    for indx in 1 .. l_tablen

    loop

    select d.forename || '' '' || d.surname as drivername

    into   l_drivername

    from   f1data.drivers d

    where  d.driverref = l_tab( indx );

    dbms_output.put_line(  to_char( indx )

    || '') ''

    || l_drivername

    );

    end loop;

    end loop;

    end;

    /

    Aston Martin

    Nr of drivers: 3

    1) Nico Hülkenberg

    2) Lance Stroll

    3) Sebastian Vettel

    Mercedes

    Nr of drivers: 5

    1) Valtteri Bottas

    2) Lewis Hamilton

    3) Michael Schumacher

    4) Nico Rosberg

    5) George Russell

    Red Bull

    Nr of drivers: 12

    1) Alexander Albon

    2) David Coulthard

    3) Robert Doornbos

    4) Pierre Gasly

    5) Christian Klien

    6) Daniil Kvyat

    7) Vitantonio Liuzzi

    8) Max Verstappen

    9) Sergio Pérez

    10) Daniel Ricciardo

    11) Sebastian Vettel

    12) Mark Webber

    >

    Haas F1 Team

    Nr of drivers: 6

    1) Romain Grosjean

    2) Esteban Gutiérrez

    3) Kevin Magnussen

    4) Nikita Mazepin

    5) Mick Schumacher

    6) Pietro Fittipaldi

    PL/SQL procedure successfully completed

    Listing 17-7

    Display drivers per constructor

    ```


    Note


    This code is not optimized; it only shows the use of `dbms_utility.comma_to_table`.


