    ```


    #### Level Pseudocolumn


    The `level` pseudocolumn returns an integer indicating the level of the hierarchy.
    The root level is 1, the level below is 2, the next level is 3, and so on.


    To simulate the `level` pseudocolumn, the anchor member of the recursive subquery
    factoring gets an integer with a value of 1\. In each iteration, this value is
    increased by one. In the following query, the LVL column is added.


    ```

    , hierarchy (pk, name, fk, lvl)

    as (

    select pk

    , name

    , fk

    , 1 as lvl

    from   constructor_drivers

    where  fk is null

    union  all

    select cdv.pk

    , lpad (''.'', hier.lvl * 2, ''.'')||cdv.name

    , cdv.fk

    , hier.lvl + 1

    from   constructor_drivers cdv

    join   hierarchy hier

    on   hier.pk = cdv.fk

    )

    select *

    from   hierarchy

