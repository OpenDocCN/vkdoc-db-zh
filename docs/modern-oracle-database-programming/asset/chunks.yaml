    To add a redaction policy to a table, you need to call the `dbms_redact.add_policy`
    procedure. This procedure takes the parameters as described in Table [18-7](#536316_1_En_18_Chapter.xhtml#Tab7).


    Table 18-7


    dbms_redact.add_policy Parameters


    | Parameter | Mandatory | Description |

    | --- | --- | --- |

    | object_schema |   | The schema in which the object to be protected residesIf
    null, then the current schema is assumed |

    | object_name | Y | The name of the object that is to be protected |

    | policy_name | Y | An arbitrarily chosen nameUse to enable/disable, alter, and
    drop the policy |

    | column_name |   | Name of one column to which the redaction policy appliesIf
    redacting more than one column, use ALTER_POLICY procedure to add the additional
    columns |

    | function_type | Y | Type of redaction function to usePossible values are- DBMS_REDACT.NONE-
    DBMS_REDACT.FULL (default)- DBMS_REDACT.PARTIAL- DBMS_REDACT.RANDOM- DBMS_REDACT.REGEXPIf
    function_type is DBMS_REDACT.REGEXP, function_parameters must be omitted completely,
    and regexp_* parameters must define the data redaction policy |

    | function_parameters |   | Parameters to the redaction functionValues depend
    on the value of the function_type provided– DBMS_REDACT.NONE: Can be omitted entirely
    and defaults to NULL– DBMS_REDACT.FULL: Can be omitted entirely and defaults to
    NULL– Masking parameters for partial character maskingA comma-separated list with
    different contents for different field typesCharacter Data Types− Input format:
    Enter V for each character that can be redacted. Enter F for each character you
    want to format using a formatting character. Ensure that each character has a
    corresponding V or F value. |

    |   |   | − Output format: Enter V for each character to be potentially redacted.
    Replace each F character in the input format with the character you want to use
    for the displayed output.− Mask character: Specify the character to be used for
    the redaction.− Starting digit position: Specify the starting V digit position
    for the redaction.− Ending digit position: Specify the ending V digit position
    for the redaction. The F positions don’t count.Settings for Number Data Types−
    Mask character: Specifies the character to display. Enter a number from 0 to 9.−
    Starting digit position: Specifies the starting digit position for the redaction,
    such as 1 for the first digit.− Ending digit position: Specifies the ending digit
    position for the redaction.Settings for Date-Time Data Typesm: Redacts the month.
    To omit redaction, enter an uppercase M.d: Redacts the day of the month. To omit
    redaction, enter an uppercase D.y: Redacts the year. To omit redaction, enter
    an uppercase Y.h: Redacts the hour. To omit redaction, enter an uppercase H.m:
    Redacts the minute. To omit redaction, enter an uppercase M.s: Redacts the second.
    To omit redaction, enter an uppercase S.For more information on the different
