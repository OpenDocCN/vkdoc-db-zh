- fmt: '## Summary


    To speed up your PL/SQL code, you have multiple possibilities in Oracle Database.
    The `UDF` pragma tells the compiler that this function is primarily for SQL, so
    it can be optimized for this. The `deterministic` and `result_cache` functions
    minimize the times the code is executed. If the parameters are the same, the outcome
    is expected to be the same, so it can be retrieved from a previous run.

    All options come with a cost, such as to memory, performance, the cache not filled,
    or values flushed from the cache. To get an insight into where you should try
    to optimize, you can use the procedures and functions in the `DBMS_HPROF` package.


    ## 11. Storing JSON in the Database


    When you work with JSON documents, you must decide *if* and *how* you will store
    JSON in the database. The first decision, *if*, needs to be made early on. Do
    you need the JSON document in its original format? You can make the case to do
    this when you are not storing all the data in relational tables, and the JSON
    document might contain data that could prove valuable later.

    When storing all JSON data in a relational format, do you need to keep the JSON
    document?

    When you have decided to store the JSON document as-is, what would be the best
    way to store it? This chapter explores the possibilities.


    ### Stage Data Before Processing


    When you import data into the database, let’s say by calling a web service that
    should return a JSON document, it could be beneficial to store the returned value
    in a table without restrictions.

    A common problem is that a call to a web service that should respond with a JSON
    document might return an HTML document when the web service is not reachable.
    If either the web service is down or a firewall restricts access to the web service,
    an HTML document is returned.

    Trying to parse an HTML document as if it was a JSON document does not work without
    throwing an exception. Before processing the JSON document, it is recommended
    to store the response and decide after loading how to process the document. Dumping
    the results into a staging table first also has the benefit that the call to the
    web service doesn’t have to take longer than it needs to. The processing of the
    document can be postponed to a later time. This is especially useful when the
    parsing of the JSON document takes a considerable amount of time.


    ### Which Data Type to Choose?


    Because a JSON document is just text but in a special format, most developers
    tend to store the JSON document in something “readable,” like a `VARCHAR2` or
    a `CLOB` column, but this might not always be the best choice.

    Storing it in a text column is very convenient when inspecting the JSON document.
    You don’t need any special queries to extract the relevant information. You can
    simply select the column and inspect the JSON document.

    When you are only dealing with very small JSON documents, less than 4000 bytes,
    a `VARCHAR2` column would suffice. Slightly larger documents can also be stored
    in a `VARCHAR2` column if you enable extended data types, up to 32,767 bytes.

    If you need to go larger that 32K, then choose a `BLOB` column. This recommendation
    is especially true when you have an Oracle Database release 19 or lower. The recommendation
    from Oracle Database 21 (or higher) is to use the native JSON data type.

    Why would you choose a `BLOB` over a `CLOB` column? The main reason for this is
    storage. A `CLOB` column encodes characters as `UCS2` (similar to `UTF16`), which
    means that every character takes up two bytes. This could mean that your JSON
    document, which is originally 100 bytes, stored in a `CLOB` column, takes up 200
    bytes.

    Textual JSON is encoded using Unicode encoding, either `UTF-8` or `UTF-16`, but
    when loaded into the database, it is automatically converted to `UTF-8`. A `BLOB`
    column stores the JSON document as-is. It avoids character set conversion. This
    takes up less space than a `CLOB` column and takes less IO to load it.

    There is a downside to using a `BLOB` column, mainly for the developer that needs
    to inspect the whole JSON document, as binary data is not easily readable. You
    need a query like the following to make the JSON document readable.

    ```

    select json_query

    (stg.json_payload

    ,''$'' returning clob pretty)

    from staging stg

    /

    ```

    This query returns the JSON document as a `CLOB`, which is also nicely formatted,
    complete with line breaks and indentations.


    ### JSON Constraint


    Regardless of which data type you use to store the JSON document, you want to
    make sure that the values contained within are properly formed JSON documents.
    With the native JSON data type, this constraint is implicit as long as the keys
    used in the JSON document are unique.

    Let’s look at an example of implementing a JSON check constraint, beginning with
    a table with a `VARCHAR2` column.

    ```

    create table json_test

    (json_document varchar2(500))

    /

    ```

    Implement the following check constraint to ensure that only JSON documents are
    stored in the `json_document` column.

    ```

    alter table json_test

    add constraint jt_chk check (json_document is json)

    /

    ```

    The `is json` condition ensures that the entered data adhere to a well-formed
    JSON format. Consider the following insert statement.

    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```

    The first key in this JSON document (driverId) is not in quotes, while all other
    keys are. This is not correct because all the keys should be in quotes. Unfortunately,
    not everybody adheres to this standard, so you might receive data where the keys
    are not in quotes. By default, `is json` checks work in a tolerant mode and allows
    the keys not to be in quotes.

    This behavior is not always desirable, and you might want to prevent this. In
    that case, you want to create the constraint as follows.

    ```

    alter table json_test

    add constraint jt_chk check (json_document is json strict)

    /

    ```

    Adding the `strict` keyword in the check constraint definition prevents keys from
    being unquoted.

    An exception is raised when attempting to execute the same insert statement as
    earlier.

    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    Error starting at line : 1 in command -

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    Error report -

    ORA-02290: check constraint (BOOK.JT_CHK) violated

    ```

    With the `strict` addition to the check constraint, it is no longer allowed to
    leave the keys unquoted.

    Unfortunately, the JSON specification does not mention anything about duplicate
    keys. The following insert statement creates a technically correct JSON document.

    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```

    In the JSON document in the preceding insert statement, the key “driverId” occurs
    twice, and as you can see, this is allowed. Even though it is allowed, it is highly
    undesirable, as you can imagine. Luckily having a duplicate key in a JSON document
    seldom occurs.

    Changing the check constraint prevents duplicate keys.

    ```

    alter table json_test

    add constraint jt_chk check

    (json_document is json with unique keys)

    ```

    Adding a `with unique keys` check constraint ensures that keys only appear once
    in the JSON document.'
  raw: '## Summary


    To speed up your PL/SQL code, you have multiple possibilities in Oracle Database.
    The UDF pragma tells the compiler that this function is primarily for SQL, so
    it can be optimized for this. The `deterministic` and `result_cache` functions
    minimize the times the code is executed. If the parameters are the same, the outcome
    is expected to be the same, so it can be retrieved from a previous run.


    All options come with a cost, such as to memory, performance, the cache not filled,
    or values flushed from the cache. To get an insight into where you should try
    to optimize, you can use the procedures and functions in the DBMS_HPROF package.


    # 11. Storing JSON in the Database


    When you work with JSON documents, you must decide *if* and *how* you will store
    JSON in the database. The first decision, *if*, needs to be made early on. Do
    you need the JSON document in its original format? You can make the case to do
    this when you are not storing all the data in relational tables, and the JSON
    document might contain data that could prove valuable later.


    When storing all JSON data in a relational format, do you need to keep the JSON
    document?


    When you have decided to store the JSON document as-is, what would be the best
    way to store it? This chapter explores the possibilities.


    ## Stage Data Before Processing


    When you import data into the database, let’s say by calling a web service that
    should return a JSON document, it could be beneficial to store the returned value
    in a table without restrictions.


    A common problem is that a call to a web service that should respond with a JSON
    document might return an HTML document when the web service is not reachable.
    If either the web service is down or a firewall restricts access to the web service,
    an HTML document is returned.


    Trying to parse an HTML document as if it was a JSON document does not work without
    throwing an exception. Before processing the JSON document, it is recommended
    to store the response and decide after loading how to process the document. Dumping
    the results into a staging table first also has the benefit that the call to the
    web service doesn’t have to take longer than it needs to. The processing of the
    document can be postponed to a later time. This is especially useful when the
    parsing of the JSON document takes a considerable amount of time.


    ## Which Data Type to Choose?


    Because a JSON document is just text but in a special format, most developers
    tend to store the JSON document in something “readable,” like a VARCHAR2 or a
    CLOB column, but this might not always be the best choice.


    Storing it in a text column is very convenient when inspecting the JSON document.
    You don’t need any special queries to extract the relevant information. You can
    simply select the column and inspect the JSON document.


    When you are only dealing with very small JSON documents, less than 4000 bytes,
    a VARCHAR2 column would suffice. Slightly larger documents can also be stored
    in a VARCHAR2 column if you enable extended data types, up to 32,767 bytes.


    If you need to go larger that 32K, then choose a BLOB column. This recommendation
    is especially true when you have an Oracle Database release 19 or lower. The recommendation
    from Oracle Database 21 (or higher) is to use the native JSON data type.


    Why would you choose a BLOB over a CLOB column? The main reason for this is storage.
    A CLOB column encodes characters as UCS2 (similar to UTF16), which means that
    every character takes up two bytes. This could mean that your JSON document, which
    is originally 100 bytes, stored in a CLOB column, takes up 200 bytes.


    Textual JSON is encoded using Unicode encoding, either UTF-8 or UTF-16, but when
    loaded into the database, it is automatically converted to UTF-8\. A BLOB column
    stores the JSON document as-is. It avoids character set conversion. This takes
    up less space than a CLOB column and takes less IO to load it.


    There is a downside to using a BLOB column, mainly for the developer that needs
    to inspect the whole JSON document, as binary data is not easily readable. You
    need a query like the following to make the JSON document readable.


    ```

    select json_query

    (stg.json_payload

    ,''$'' returning clob pretty)

    from staging stg

    /

    ```


    This query returns the JSON document as a CLOB, which is also nicely formatted,
    complete with line breaks and indentations.


    ## JSON Constraint


    Regardless of which data type you use to store the JSON document, you want to
    make sure that the values contained within are properly formed JSON documents.
    With the native JSON data type, this constraint is implicit as long as the keys
    used in the JSON document are unique.


    Let’s look at an example of implementing a JSON check constraint, beginning with
    a table with a VARCHAR2 column.


    ```

    create table json_test

    (json_document varchar2(500))

    /

    ```


    Implement the following check constraint to ensure that only JSON documents are
    stored in the `json_document` column.


    ```

    alter table json_test

    add constraint jt_chk check (json_document is json)

    /

    ```


    The `is json` condition ensures that the entered data adhere to a well-formed
    JSON format. Consider the following insert statement.


    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```


    The first key in this JSON document (driverId) is not in quotes, while all other
    keys are. This is not correct because all the keys *should* be in quotes. Unfortunately,
    not everybody adheres to this standard, so you might receive data where the keys
    are not in quotes. By default, `is json` checks work in a *tolerant mode* and
    allows the keys not to be in quotes.


    This behavior is not always desirable, and you might want to prevent this. In
    that case, you want to create the constraint as follows.


    ```

    alter table json_test

    add constraint jt_chk check (json_document is json strict)

    /

    ```


    Adding the `strict` keyword in the check constraint definition prevents keys from
    being unquoted.


    An exception is raised when attempting to execute the same insert statement as
    earlier.


    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    Error starting at line : 1 in command -

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    Error report -

    ORA-02290: check constraint (BOOK.JT_CHK) violated

    ```


    With the `strict` addition to the check constraint, it is no longer allowed to
    leave the keys unquoted.


    Unfortunately, the JSON specification does not mention anything about duplicate
    keys. The following insert statement creates a technically correct JSON document.


    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```


    In the JSON document in the preceding insert statement, the key “driverId” occurs
    twice, and as you can see, this *is* allowed. Even though it is allowed, it is
    highly undesirable, as you can imagine. Luckily having a duplicate key in a JSON
    document seldom occurs.


    Changing the check constraint prevents duplicate keys.


    ```

    alter table json_test

    add constraint jt_chk check

    (json_document is json with unique keys)

    ```


    Adding a `with unique keys` check constraint ensures that keys only appear once
    in the JSON document.'
  trans: '## 摘要


    在 Oracle 数据库中，有多种方法可以加速你的 PL/SQL 代码。`UDF`编译指示告知编译器该函数主要用于 SQL，从而可以针对此场景进行优化。`deterministic`和`result_cache`函数则能最小化代码的执行次数。如果参数相同，预期结果也相同，那么就可以从先前的运行中检索结果。

    所有这些选项都伴随着一定的成本，例如内存消耗、性能开销、缓存未填充或值被从缓存中清除等。为了深入了解何处可以尝试优化，你可以使用`DBMS_HPROF`包中的过程和函数。


    ## 11. 在数据库中存储 JSON


    处理 JSON 文档时，你必须决定*是否*以及*如何*在数据库中存储 JSON。第一个决策，*是否*，需要尽早做出。你是否需要保留 JSON 文档的原始格式？在以下情况下，你可以选择这样做：你没有将所有数据存储在关系表中，并且
    JSON 文档可能包含未来可能有价值的数据。

    当所有 JSON 数据都以关系格式存储时，你是否还需要保留 JSON 文档？

    一旦决定按原样存储 JSON 文档，最好的存储方式是什么？本章将探讨各种可能性。


    ### 在处理前暂存数据


    当你将数据导入数据库时（例如通过调用一个应返回 JSON 文档的 Web 服务），将返回的值存储到一个没有限制的表中可能是有益的。

    一个常见的问题是，当无法访问应返回 JSON 文档的 Web 服务时，它可能返回一个 HTML 文档。如果 Web 服务宕机或防火墙限制了访问，就会返回 HTML
    文档。

    试图将 HTML 文档当作 JSON 文档来解析，必然会引发异常。在处理 JSON 文档之前，建议先存储响应，然后在加载后再决定如何处理该文档。首先将结果转储到临时暂存表还有一个好处：调用
    Web 服务的耗时不会超过实际需要。文档的处理可以推迟到以后进行。当解析 JSON 文档需要相当长的时间时，这一点尤其有用。


    ### 选择哪种数据类型？


    由于 JSON 文档只是文本，但采用特殊格式，大多数开发人员倾向于将其存储在“可读”的东西中，例如`VARCHAR2`或`CLOB`列，但这可能并非总是最佳选择。

    将 JSON 文档存储在文本列中，对于检查文档内容非常方便。你不需要特殊的查询来提取相关信息，只需选择该列即可检查 JSON 文档。

    当你只处理非常小的 JSON 文档（小于 4000 字节）时，`VARCHAR2`列就足够了。稍大的文档（启用扩展数据类型后，最大可达 32,767 字节）也可以存储在`VARCHAR2`列中。

    如果需要存储大于 32K 的文档，那么请选择`BLOB`列。此建议在使用 Oracle Database 19c 或更低版本时尤其适用。对于 Oracle
    Database 21c（或更高版本），Oracle 推荐使用原生 JSON 数据类型。

    为什么选择`BLOB`而不是`CLOB`列？主要原因是存储空间。`CLOB`列使用`UCS2`（类似于`UTF16`）对字符进行编码，这意味着每个字符占用两个字节。这可能导致你原本
    100 字节的 JSON 文档，存储在`CLOB`列中会占用 200 字节。

    文本格式的 JSON 使用 Unicode 编码（`UTF-8`或`UTF-16`），但加载到数据库时会自动转换为`UTF-8`。`BLOB`列则按原样存储
    JSON 文档，避免了字符集转换。这比`CLOB`列占用更少空间，加载所需的 IO 也更少。

    使用`BLOB`列有一个缺点，主要是对于需要检查整个 JSON 文档的开发人员来说，因为二进制数据不易阅读。你需要类似如下的查询使 JSON 文档可读：

    ```

    select json_query

    (stg.json_payload

    ,''$'' returning clob pretty)

    from staging stg

    /

    ```

    此查询将 JSON 文档作为`CLOB`返回，并带有良好的格式，包含换行和缩进。


    ### JSON 约束


    无论你使用哪种数据类型存储 JSON 文档，都希望确保其中包含的值是格式正确的 JSON 文档。对于原生 JSON 数据类型，只要 JSON 文档中使用的键是唯一的，此约束是隐式的。

    让我们看一个实现 JSON 检查约束的示例，从一个包含`VARCHAR2`列的表开始。

    ```

    create table json_test

    (json_document varchar2(500))

    /

    ```

    实现以下检查约束，以确保仅在`json_document`列中存储 JSON 文档。

    ```

    alter table json_test

    add constraint jt_chk check (json_document is json)

    /

    ```

    `is json`条件确保输入数据遵循格式良好的 JSON 格式。考虑以下插入语句。

    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```

    在此 JSON 文档中，第一个键（driverId）没有引号，而所有其他键都有引号。这是不正确的，因为所有键都应该用引号括起来。不幸的是，并非每个人都遵循此标准，因此你可能会收到键未加引号的数据。默认情况下，`is
    json`检查以宽容模式工作，允许键不加引号。

    这种行为并非总是可取的，你可能希望阻止它。在这种情况下，应如下创建约束。

    ```

    alter table json_test

    add constraint jt_chk check (json_document is json strict)

    /

    ```

    在检查约束定义中添加`strict`关键字，可防止键不加引号。

    尝试执行相同的插入语句会引发异常。

    ```

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    Error starting at line : 1 in command -

    insert into json_test

    values (''{

    driverId: "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    Error report -

    ORA-02290: check constraint (BOOK.JT_CHK) violated

    ```

    在检查约束中添加了`strict`后，不再允许键不加引号。

    不幸的是，JSON 规范没有提及重复键的问题。以下插入语句创建了一个技术上正确的 JSON 文档。

    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    1 row inserted.

    ```

    在上述插入语句的 JSON 文档中，键“driverId”出现了两次，如你所见，这是允许的。尽管允许，但你可以想象，这是非常不可取的。幸运的是，JSON 文档中出现重复键的情况很少发生。

    修改检查约束可以防止重复键。

    ```

    alter table json_test

    add constraint jt_chk check

    (json_document is json with unique keys)

    ```

    添加`with unique keys`检查约束可确保键在 JSON 文档中只出现一次。'
- fmt: '## Under the Hood


    在向列添加正确的 JSON 检查约束后，这些列在数据字典中将显示为 JSON 列。你可以通过三个数据字典表来检查这些 JSON 列：

    *   `USER_JSON_COLUMNS`

    *   `ALL_JSON_COLUMNS`

    *   `DBA_JSON_COLUMNS`


    让我们看看当你创建不同的数据类型来存储 JSON 文档并添加适当的 `is json` 检查约束时，数据字典会显示什么。首先是原生 JSON 数据类型。


    ```

    create table native_json

    (json_document json)

    ```


    这个列不需要检查约束来确保输入的数据是格式良好的 JSON。查询数据字典时，你会看到以下结果。


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''NATIVE_JSON''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            OSON      JSON

    ```


    结果集中突出的是 `FORMAT` 列。原生 JSON 数据类型的格式是 `OSON`。Oracle 使用这种内部二进制格式来加载和扫描 JSON 文档。这种
    `OSON` 格式是 Oracle 独有的。


    由于 `OSON` 是 JSON 文档的二进制表示，这是否意味着当你使用 `BLOB` 列来保存数据时，它也以 `OSON` 格式存储？让我们接下来检查这一点。


    ```

    create table blob_json

    (json_document blob)

    /

    alter table blob_json

    add constraint blob_chk check (json_document is json)

    /

    ```


    `BLOB_JSON` 表在 `JSON_DOCUMENT` 列上有一个检查约束以确保其为 JSON。数据字典揭示了以下信息。


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''BLOB_JSON''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            TEXT      BLOB

    ```


    简短的回答：否，`BLOB` 列使用文本格式来存储 JSON 文档。如前所述，它按原样存储 JSON 文档，不进行字符集转换。


    对于其他数据类型，`VARCHAR2` 和 `CLOB` 也是如此。这些列使用 `TEXT` 格式。


    ```

    create table clob_json

    (json_document clob)

    /

    alter table clob_json

    add constraint clob_chk check (json_document is json)

    /

    create table varchar2_json

    (json_document varchar2(4000))

    /

    alter table varchar2_json

    add constraint varchar2_chk check (json_document is json)

    /

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name in (''CLOB_JSON'', ''VARCHAR_JSON'')

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            TEXT      CLOB

    TABLE       JSON_DOCUMENT            TEXT      VARCHAR2

    ```


    在数据字典中，当一个列在投影 JSON 文档时，对象也会出现。假设你有一个暂存表，包含 JSON 和非 JSON 数据。两个视图覆盖此表：一个只暴露 JSON
    数据，另一个只暴露非 JSON 数据。以下表定义用于此示例。


    ```

    create table no_constraint_json

    (document clob)

    /

    ```


    `document` 列保存 JSON 或非 JSON 数据。覆盖视图定义如下。


    ```

    create view json_view

    as

    select treat (document as json) as json_document

    from no_constraint_json

    where document is json

    /

    create view non_json_view

    as

    select document

    from no_constraint_json

    where document is not json

    /

    ```


    视图中的 `where` 条件决定了哪些数据通过视图暴露。请注意，暴露 JSON 文档的视图使用了 `treat` 函数将 `DOCUMENT` 列投影为
    JSON。


    `JSON_VIEW` 出现在 `USER_JSON_COLUMNS` 数据字典视图中，其特征与使用 `CLOB` 作为存储 JSON 文档的数据类型时类似。


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''JSON_VIEW''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    VIEW        JSON_DOCUMENT            TEXT      CLOB

    ```


    在视图定义中使用 `treat`，此技术可用于 Oracle Database 21 之前的版本。从版本 21 开始，你也可以使用 `JSON` 构造函数将列投影为原生
    JSON 格式。


    ```

    create view native_json_view

    as

    select json (document) as json_document

    from no_constraint_json

    where document is json

    /

    View NATIVE_JSON_VIEW created.

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''NATIVE_JSON_VIEW''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    VIEW        JSON_DOCUMENT            OSON      JSON

    ```


    如数据字典视图中的结果所示，现在视图以 `OSON` 格式暴露 JSON 列。


    **提示** 当你为 JSON 文档列选择名称时，添加一些标识以便于识别。例如，总是将它们命名为 `JSON_DOCUMENT` 或添加标识其为 JSON
    的后缀。这样，你可以使用数据字典视图 `*_JSON_COLUMNS` 和 `*_TAB_COLUMNS` 来识别那些应该具有 `is json` 检查约束但缺失的列。


    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    Error starting at line : 1 in command -

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    Error report -

    ORA-02290: check constraint (BOOK.JT_CHK) violated

    ```


    键的唯一性只适用于可能发生歧义的相同层级。因此，即使在以下插入语句中，`driverId`、`givenName` 和 `familyName` 键在 JSON
    文档中多次出现，但它们位于不同的层级，因此是被允许的。


    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch",

    "teammate": {"driverId": "sergio_perez",

    "givenName": "Sergio",

    "familyName": "Pérez"

    }

    }'')

    /

    1 row inserted.

    ```


    你可以在检查约束中指定 `strict` 和 `with unique keys`。这确保所有键都被引号包围，并且在 JSON 文档中只出现一次。


    原生 JSON 数据类型，添加于 Oracle Database 21，是一种受约束的数据类型。除了显而易见的 `is json` 约束外，只隐含了 `with
    unique keys`。当使用 JSON 数据类型时，无法强制执行 `strict` 条件或禁用 `with unique keys` 条件。存储在 JSON
    列中的 JSON 文档键被引号包围，即使原始文本中的键没有引号。'
  raw: '```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    /

    Error starting at line : 1 in command -

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "driverId": "lewis_hamilton",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch"

    }'')

    Error report -

    ORA-02290: check constraint (BOOK.JT_CHK) violated

    ```


    The uniqueness of the key is only applicable at the same level where ambiguity
    might occur. So even though the “driverId”, “givenName,” and “familyName” keys
    occur multiple times in the JSON document in the following insert statement, they
    are at different levels and thus allowed.


    ```

    insert into json_test

    values (''{

    "driverId": "max_verstappen",

    "permanentNumber": "33",

    "code": "VER",

    "url": "http://en.wikipedia.org/wiki/Max_Verstappen",

    "givenName": "Max",

    "familyName": "Verstappen",

    "dateOfBirth": "1997-09-30",

    "nationality": "Dutch",

    "teammate": {"driverId": "sergio_perez",

    "givenName": "Sergio",

    "familyName": "Pérez"

    }

    }'')

    /

    1 row inserted.

    ```


    You can specify `strict` and `with unique keys` in the check constraint. This
    make sure that all keys are in quotes and that they appear only once in the JSON
    document.


    The native JSON data type, added in Oracle Database 21, is a constrained data
    type. Besides the obvious `is json` constraint, only `with unique keys` is implied.
    It is not possible to enforce the `strict` condition nor disable the `with unique
    keys` condition when using the JSON data type. The JSON document keys that are
    stored in the JSON column are in quotes, even if the original text does not have
    quotes around the keys.


    ## Under the Hood


    After you add the proper JSON check constraint to the column, these columns are
    visible as JSON columns in the data dictionary. There are three data dictionary
    tables where you can inspect the JSON columns.


    *   USER_JSON_COLUMNS


    *   ALL_JSON_COLUMNS


    *   DBA_JSON_COLUMNS


    Let’s see what the data dictionary says when you create all the different data
    types to store the JSON document and add the proper `is json` check constraint
    on them. First, the native JSON data type.


    ```

    create table native_json

    (json_document json)

    ```


    This column doesn’t need a check constraint to ensure that the data that is entered
    is well-formed JSON. When querying the data dictionary, you see the following
    results.


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''NATIVE_JSON''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            OSON      JSON

    ```


    What stands out in the result set is the FORMAT column. The format for the native
    JSON data type is OSON. Oracle uses this internal binary format to load and scan
    JSON documents. This OSON format is unique to Oracle.


    As OSON is a binary representation of the JSON document, does this mean that when
    you use a BLOB column to hold data, it also stores it in the OSON format? Let’s
    examine this next.


    ```

    create table blob_json

    (json_document blob)

    /

    alter table blob_json

    add constraint blob_chk check (json_document is json)

    /

    ```


    The BLOB_JSON table has a check constraint on the JSON_DOCUMENT column to ensure
    it is JSON. The data dictionary reveals the following information.


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''BLOB_JSON''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            TEXT      BLOB

    ```


    Short answer: no, the BLOB column uses the text format to store the JSON document.
    As mentioned, it stores the JSON document as-is without character set conversion.


    The same is true for the other data types, VARCHAR2 and CLOB. The TEXT format
    is used for these columns.


    ```

    create table clob_json

    (json_document clob)

    /

    alter table clob_json

    add constraint clob_chk check (json_document is json)

    /

    create table varchar2_json

    (json_document varchar2(4000))

    /

    alter table varchar2_json

    add constraint varchar2_chk check (json_document is json)

    /

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name in (''CLOB_JSON'', ''VARCHAR_JSON'')

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    TABLE       JSON_DOCUMENT            TEXT      CLOB

    TABLE       JSON_DOCUMENT            TEXT      VARCHAR2

    ```


    In the data dictionary, objects also appear when a column is projecting JSON documents.
    Suppose you have a staging table containing JSON and non-JSON data. Two views
    cover this table: one exposing only the JSON data, and the other only exposing
    the non-JSON data. The following table definition is used for this example.


    ```

    create table no_constraint_json

    (document clob)

    /

    ```


    The document column holds either JSON or non-JSON data. The covering views are
    defined as follows.


    ```

    create view json_view

    as

    select treat (document as json) as json_document

    from no_constraint_json

    where document is json

    /

    create view non_json_view

    as

    select document

    from no_constraint_json

    where document is not json

    /

    ```


    The `where` condition in the views determines which data is exposed through the
    view. Note that the view that exposes the JSON document uses the `treat` function
    to project the DOCUMENT column as JSON.


    The JSON_VIEW shows up in the USER_JSON_COLUMNS data dictionary view with similar
    characteristics as when using a CLOB as the data type to store the JSON documents.


    ```

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''JSON_VIEW''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    VIEW        JSON_DOCUMENT            TEXT      CLOB

    ```


    Using `treat` in the view definition, this technique can be used in releases prior
    to Oracle Database 21\. From release 21 onward, you can also use the JSON constructor
    to project the column to a native JSON format.


    ```

    create view native_json_view

    as

    select json (document) as json_document

    from no_constraint_json

    where document is json

    /

    View NATIVE_JSON_VIEW created.

    select object_type

    ,column_name

    ,format

    ,data_type

    from user_json_columns

    where table_name = ''NATIVE_JSON_VIEW''

    /

    OBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE

    ----------- ------------------------ --------- -------------

    VIEW        JSON_DOCUMENT            OSON      JSON

    ```


    As you can see in the results from the data dictionary view, now the view exposes
    the JSON column in the OSON format.


    **Tip** When you choose the name for your JSON document columns, add something
    to identify them easily. For example, always name them JSON_DOCUMENT or a suffix
    that identifies it as JSON. This way, you can use the data dictionary views: *_JSON_COLUMNS
    and *_TAB_COLUMNS to identify those columns that should have the `is json` check
    constraint on them but are missing.'
