    #### The pairs of Array


    In Oracle Database 21c, you can use `pairs of` construction. Instead of creating
    an index iterator and using that to get the value from the collection (see Listing
    [7-23](#536316_1_En_7_Chapter.xhtml#PC25)), you can get both the index and the
    value as iterators in the loop (see Listing [7-24](#536316_1_En_7_Chapter.xhtml#PC26)).
