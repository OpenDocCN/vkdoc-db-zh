  trans: '

    ## 可重用窗口子句


    自 Oracle Database 21c 起，可以定义可重用的命名窗口子句。命名窗口子句允许您在查询中为多个分析函数使用相同的定义，而无需复制该定义。命名窗口子句还可以包含其他命名窗口。


    在示例 2-2 中，定义了五个命名窗口。第一个窗口 (`w_part`) 按 `driverid` 定义分区。第二个窗口使用 `w_part` 并按积分降序对数据排序。第三、第四和第五个窗口使用排序后的分区，每个窗口分别使用
    `rows`、`range` 和 `groups` 偏移量指定了不同的窗口子句。


    ```sql

    select points

    , whole_partition

    , rows_

    , groups_

    , range_

    from (

    select drv.driverid

    , drs.points

    , max (drs.points) over w_part  as whole_partition

    , max (drs.points) over w_rows  as rows_

    , max (drs.points) over w_group as groups_

    , max (drs.points) over w_range as range_

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    window w_part  as (partition by drv.driverid)

    ,w_sort  as (w_part order by drs.points desc)

    ,w_rows  as (w_sort rows   between 10 preceding

    and current row)

    ,w_group as (w_sort groups between 10 preceding

    and current row)

    ,w_range as (w_sort range  between 10 preceding

    and current row)

    )

    where  driverid = 815

    and    rownum <= 20

    order  by driverid, points desc

    /

    ```


    ```

    POINTS WHOLE_PARTITION      ROWS_    GROUPS_     RANGE_

    ---------- --------------- ---------- ---------- ----------

    190             190        190        190        190

    190             190        190        190        190

    190             190        190        190        190

    178             190        190        190        178

    165             190        190        190        165

    150             190        190        190        150

    147             190        190        190        150

    135             190        190        190        135

    129             190        190        190        135

    129             190        190        190        135

    125             190        190        190        135

    125             190        190        190        135

    120             190        190        190        129

    118             190        178        190        125

    110             190        165        190        120

    108             190        150        178        118

    104             190        147        165        110

    104             190        135        165        110

    104             190        129        165        110

    104             190        129        165        110

    20 rows selected.

    ```


    示例 2-2

    可重用窗口子句


    `rows` 窗口子句使用物理偏移量。前面的示例显示，在窗口内最多包含当前行之前的十行。`range` 窗口子句使用逻辑偏移量。值小于当前行值 10 以内的数据都在范围内。`groups`
    窗口子句将值分组，其中具有相同值的行位于同一组中。在前面的示例中，偏移量是指当前行之前的组数。


    注意


    在前面的示例中，使用了语法 `over <window_name>`。也可以使用括号括住窗口名：`over (<window_name>)`。两者并不等效。后者意味着复制并修改窗口规范，如果引用的窗口规范包含窗口子句，则会被拒绝。


    ## 透视和逆透视


    最终用户并不总是希望看到数据在页面上纵向排列；他们更喜欢数据横向展示。`pivot` 子句是一个聚合运算符，可将行转换为列。类似地，有时相反的操作更有意义，`unpivot`
    子句可以协助完成此操作。


    ### 透视


    对于示例，使用 `results` 表。该表是反规范化的，包含有关车手、车队、所得积分和每场比赛完成圈数的信息。以下是该表的一部分摘录。


    ```sql

    select rcs.year

    , drv.driverref

    , rsl.points

    , rsl.laps

    from   f1data.results rsl

    join   f1data.races rcs

    on   rcs.raceid = rsl.raceid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  drv.driverref in (''norris'', ''bottas'')

    /

    ```


    ```

    YEAR DRIVERREF      POINTS       LAPS

    ---------- ---------- ---------- ----------

    2013 bottas              0         57

    2013 bottas              0         56

    2013 bottas              0         56

    2013 bottas              0         57

    2013 bottas              0         52

    2022 norris              2         51

    2022 bottas              0         50

    2022 bottas              6         70

    2022 norris              0         70

    2022 norris              8         52

    2022 bottas              0         20

    ```


    目标是汇总 Norris 和 Bottas 每年的所有积分，并将两位车手的结果并排显示。


    对于这个初始需求，只需要 `year`、`driverref` 和 `points`。前面数据集中的 `laps` 现在可以忽略。前面的查询是 `pivot`
    子句的输入。聚合函数是 `sum`（用于汇总所有积分）。聚合函数和透视列需要在 `pivot` 子句中指定。透视列不是动态的。


    在下面的查询中，输入查询已被提取到一个命名的子查询（称为 `results`）中，并对车手 Norris 和 Bottas 的积分进行了汇总。属于输入查询的一部分但未在
    `pivot` 子句中使用的列（如 `year`）可以被视为“分组依据”列。所有属于输入查询的一部分但未在 `pivot` 子句中使用的列都隐式用作“分组依据”列。


    提示


    即使只使用单个表，在透视结果集时也建议使用内联视图或子查询因子化（`with` 子句）。这样，如果基础表或视图新增了列，也能保障透视操作的安全性。


    ```sql

    with results as (

    select rcs.year

    , drv.driverref

    , rsl.points

    from   f1data.results rsl

    join   f1data.races rcs

    on   rcs.raceid = rsl.raceid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  drv.driverref in (''norris'', ''bottas'')

    )

    select year

    , norris

    , bottas

    from   results

    pivot  (

    sum (points)

    for driverref in ( ''norris'' as norris

    , ''bottas'' as bottas

    )

    )

    /

    ```


    ```

    YEAR     NORRIS     BOTTAS

    ---------- ---------- ----------

    2013                     4

    2014                   186

    2015                   136

    2016                    85

    2017                   305

    2018                   247

    2019         49        326

    2020         97        223

    2021        160        219

    2022         54         44

    ```


    透视列被赋予了别名，以防止列名变为区分大小写的形式，即列名会是包含引号的 `‘norris’`。


    `pivot` 子句中可以有多个聚合函数。当还需要汇总完成圈数时，`laps` 必须包含在输入查询中，并且完成圈数的聚合函数必须包含在 `pivot` 子句中。

