    Hitchhiker Race Alexander Albon

    Hitchhiker Race Nicholas Latifi

    Hitchhiker Race Yuki Tsunoda

    Hitchhiker Race Mick Schumacher

    Hitchhiker Race Guanyu Zhou

    ```


    When the records are not filtered to only show data for certain drivers, there
    is a record for each driver listed in the `RESULTS` table. Since the results table
    has records for all races since the 1950s, there would be more data.


    ## Lateral Joins


    You cannot join a table to a correlated subquery unless a lateral join is used.
    With a lateral inline view, you can specify tables that appear to the left of
    the lateral inline view in the `from` clause of a query.


    The most common use case for a lateral join is to convert JSON documents to a
    relational format using the JSON_TABLE operator or similarly converted XML documents
    with the XML_TABLE operator.


    The following query shows a select group of drivers and their points in the `driverstandings`
    table, but only the first two (ordered by the highest points) and if points are
    scored. There is a correlation from the lateral inline view to the `drivers` table
    in the `driverid` column.


    ```

    select drv.driverid

    , drv.forename ||'' ''||drv.surname as driver

    , dsg.points

