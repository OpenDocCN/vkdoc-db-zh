- fmt: '## Basic Spatial Functionality


    The web service used in this chapter also includes the circuits’ coordinates—latitude
    (lat) and longitude (long). These values can be seen in the following JSON snippet,
    which is not a complete JSON document, in the `Location` object.


    ```

    "Races": [

    {

    "season": "2022",

    "round": "15",

    "url": "http:\/\/en.wikipedia.org\/wiki\/2022_Dutch_Grand_Prix",

    "raceName": "Dutch Grand Prix",

    "Circuit": {

    "circuitId": "zandvoort",

    "url": "http:\/\/en.wikipedia.org\/wiki\/Circuit_Zandvoort",

    "circuitName": "Circuit Park Zandvoort",

    "Location": {

    "lat": "52.3888",

    "long": "4.54092",

    "locality": "Zandvoort",

    "country": "Netherlands"

    }

    },

    ```


    The following expression extracts the latitude, located in the `Location` object,
    for the 15th race (Zandvoort), which is also the 15th object in the array.


    ```

    apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    ```


    And a similar expression for the longitude.


    To work with all spatial functions that Oracle Database offers, the coordinates
    need to be altered into the correct data type, `mdsys.sdo_geometry`.


    This is done in the following code fragment, where `l_circuit` is a local variable.


    ```

    l_circuit := apex_spatial.point

    (p_lon =>  apex_json.get_number

    (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.long''

    ,p_values => races)

    ,p_lat => apex_json.get_number

    (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    );

    ```


    Now that the values from the JSON document are converted to a real geometry, let’s
    use spatial functions to determine the distance between Oosterhout in the Netherlands
    and the circuit in Zandvoort. Listing [15-6](#536316_1_En_15_Chapter.xhtml#PC24)
    is the complete code sample where two geometries are constructed with `apex_spatial.`
    The `sdo_distance` spatial function determines the distance (in kilometers) between
    the two. For example, you can look up the coordinates for your hometown using
    Google Maps.


    ```

    declare

    l_circuit  mdsys.sdo_geometry;

    l_hometown mdsys.sdo_geometry;

    races      apex_json.t_values;

    l_races    clob;

    begin

    l_hometown := apex_spatial.point

    (p_lon => 4.861316883708699

    ,p_lat => 51.64485385756768

    );

    l_races := apex_web_service.make_rest_request

    (p_url         => ''http://ergast.com/api/f1/current.json''

    ,p_http_method => ''GET''

    );

    apex_json.parse (p_values => races

    ,p_source => l_races

    );

    l_circuit := apex_spatial.point

    (p_lon =>  apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.long''

    ,p_values => races)

    ,p_lat => apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    );

    sys.dbms_output.put_line (

    ''The distance from my hometown to the circuit is ''

    ||sdo_geom.sdo_distance

    (geom1 => l_hometown

    ,geom2 => l_circuit

    ,unit  => ''unit=KM'')

    ||'' km''

    );

    end;

    The distance from my hometown to the circuit is 85.64951103008 km

    Listing 15-6

    How far is my hometown from the Zandvoort circuit?

    ```


    ## Utilities for Text Manipulations


    You learned how to display a CLOB by taking advantage of the `apex_string.next_chunk`
    packaged function, but there are many more cool functions worth investigating.


    One of our personal favorites is `split`. Listing [15-7](#536316_1_En_15_Chapter.xhtml#PC25)
    shows an example of this function.


    ```

    select column_value

    from apex_string.split

    (p_str => ''this:should:be:shown:as:a:table''

    ,p_sep => '':'')

    COLUMN_VALUE


    this

    should

    be

    shown

    as

    a

    table

    Listing 15-7

    Example usage of apex_string.split

    ```


    As you can see in Listing [15-7](#536316_1_En_15_Chapter.xhtml#PC25), the `split`
    function turns a character-separated string, which can also be a CLOB, into a
    nested table type.


    There must also be a `join` function when there is a `split` function. The input
    nested table is of type `apex_t_varchar2`. You can see an example of this functionality
    and the output in Listing [15-8](#536316_1_En_15_Chapter.xhtml#PC26).


    ```

    declare

    l_ename_t apex_t_varchar2;

    begin

    select ename

    bulk collect

    into l_ename_t

    from emp;

    sys.dbms_output.put_line (

    apex_string.join (p_table => l_ename_t

    ,p_sep   => ''~''

    )

    );

    end;

    SMITH~ALLEN~WARD~JONES~MARTIN~BLAKE~CLARK~SCOTT~KING~TURNER~ADAMS~JAMES~FORD~MILLER

    Listing 15-8

    Example usage of apex_string.join

    ```


    It must be noted that the above `apex_string.join` function can also be achieved
    with the SQL function `listagg`. The maximum size that the `listagg` function
    can handle depends on the setting of the `max_string_size` initialization parameter.
    When the `listagg` function doesn’t suffice, it exceeds the length limits, `apex_string.join_clobs`
    can fill this void.


    ### Formatting a Message


    When you need to format a message, the `format` function is really helpful. This
    function allows you to create a message with up to 19 substitution variable placeholders.
    Listing [15-9](#536316_1_En_15_Chapter.xhtml#PC27) is an example of a formatted
    error message with substitution parameters.


    ```

    raise_application_error

    (-20000

    ,apex_string.format (p_message => q''{The combination %0, %1, and %2 is not allowed}''

    ,p0 => ''A''

    ,p1 => ''B''

    ,p2 => ''C''

    )

    );

    Error report -

    ORA-20000: The combination A, B, and C is not allowed

    ORA-06512: at line 2

    Listing 15-9

    A nicely formatted error message with variables

    ```


    This function also provides an argument, `p_max_length`, which can prevent the
    message from becoming too long. The default value for this argument is 1000.


    When you need to preserve the layout of a multiline message, then the `p_prefix`
    argument is very useful. The given prefix and the leading whitespace are removed
    from each line. Listing [15-10](#536316_1_En_15_Chapter.xhtml#PC28) shows an example
    of a multiline message and the output. Note that all the leading whitespace is
    removed, but the resulting text is indented as intended.


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.format (

    p_message => q''{Things you should do:

    !   * Get quality sleep

    !   * Eat Healthy

    !   * Exercise regularly

    !and all will be well}''

    ,p_prefix => ''!''

    ));

    end;

    /

    Things you should do:

    * Get quality sleep

    * Eat Healthy

    * Exercise regularly

    and all will be well

    Listing 15-10

    Preserve the layout of a multiline message

    ```


    ### Please Initial Here


    A nice little utility in the APEX_STRING package is `get_initials`. This function
    transforms names into initials. It outputs the first letter of each word, in uppercase,
    with a maximum that you specify. The default is to get two letters back. If there
    are more words than `p_cnt`, you get the initials from the *first* `p_cnt` words.
    Listing [15-11](#536316_1_En_15_Chapter.xhtml#PC29) is an example of this function.
    Note that the name input is in lowercase and specified to get a maximum of four
    letters back. The result is two letters, only two words in the input string, changed
    to uppercase.


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => ''alex nuijten''

    ,p_cnt => 4

    )

    );

    end;

    AN

    Listing 15-11

    Retrieving initials

    ```


    A more dynamic way to get all the initials from a given name can be obtained by
    using a regular expression to count the number of words there are in a name, something
    along the lines of the following example:


    ```

    declare

    l_str varchar2(140) := ''Willem-Alexander Claus George Ferdinand'';

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => l_str

    ,p_cnt => regexp_count (l_str, ''[[:punct:][:space:]]'') + 1

    )

    );

    end;

    WACGF

    ```


    ## Parsing Data


    A common requirement is to upload a file to the database, let’s say an Excel or
    CSV file, and parse it to get the content and store it in database tables. This
    requirement can be quite challenging, especially when you need to escape certain
    values when there are multiple sheets in the Excel file, and so on. This is where
    `apex_data_parser` shines and can make your programs elegant.'
