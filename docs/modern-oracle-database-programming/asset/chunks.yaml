    ### JSON 路径表达式中的错误处理


    JSON 路径表达式的每个步骤都会尝试进行匹配。当某个匹配步骤失败时，其他步骤将不会被评估，整个 JSON 路径表达式即告失败。即使 JSON 路径表达式失败，默认情况下查询仍会成功执行。对于失败的
    JSON 路径表达式，将返回一个`NULL`。这意味着，当你看到`NULL`时，它可能表示 JSON 路径表达式失败（其中可能存在错误），也可能表示该属性*确实*存在，但其值为`NULL`。


    #### 错误子句


    根据指定的错误子句（可用于`json_value()`、`json_query()`和`json_table()`函数），返回值可以是`NULL`、特定的错误信息，也可能是默认值。并非所有
    SQL 函数都有相同的选项；例如，`json_query()`不允许定义默认值。


    以下示例尝试使用不同的错误子句从 JSON 文档中一个不存在的节点提取值。首先，使用默认错误子句`null on error`，不会引发异常，而是返回`NULL`。


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    null on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    ---------

    ```


    当错误子句设置为`error on error`时，语句将失败并引发异常，指出`json_value()`函数评估后没有值。


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    error on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    Error starting at line : 1 in command -

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    error on error

    ) as nothing

    from f1_drivers_json f

    Error report -

    ORA-40462: JSON_VALUE evaluated to no value

    ```


    对于某些 SQL 函数，还可以在遇到错误时定义一个默认值。默认值必须是一个常量。以下语句展示了如何使用`default <constant> on error`。


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    default ''node does not exist'' on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    ---------------------------------

    node does not exist

    ```


    当使用的函数期望标量值，但 JSON 路径表达式定位到了多个值时，同样会引发错误。


    #### 处理空结果


    缺少属性是一种特殊情况，由`on error`子句处理，但也可以由`on empty`子句处理。当两者同时存在时，`on empty`子句优先于`on error`子句。以下语句定位
    JSON 文档中一个不存在的属性，并同时包含了`on error`和`on empty`子句。


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    default ''node error'' on error

    default ''node empty'' on empty

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    -----------

    node empty

    ```


    #### 处理类型不匹配


    当应用一个项方法，尝试将选定的 JSON 值转换为不兼容的 SQL 数据类型时，也可能引发错误。针对这种情况也有一个特殊的子句：`on mismatch`。在下面的例子中，尝试使用`number()`项方法将`Driver`代码转换为
    SQL `NUMBER`类型。当两者同时存在时，`on mismatch`子句会覆盖`on error`子句。


    ```sql

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code.number()''

    default ''-10'' on error

    error on mismatch

    )

    from f1_drivers_json f

    /

    ```


    ```

    Error starting at line : 1 in command -

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code.number()''

    default ''-10'' on error

    error on mismatch

    )

    from f1_drivers_json f

    Error report -

    ORA-01722: invalid number

    ```


    ## 点表示法


    从 JSON 文档中提取值的最简单方法是使用点表示法语法。点表示法语法使用表别名、JSON 列名以及 JSON 文档中的一个或多个字段名，所有部分用句点分隔。这可以用于
    JSON 对象和 JSON 数组。


    返回值取决于存储 JSON 文档的列的数据类型。当列的数据类型为`JSON`时，返回值是`JSON`数据类型的实例。在所有其他情况下，返回值是`VARCHAR2`。


    点表示法语法*仅*在 JSON 文档以以下方式之一存储时才能使用。


    *   `JSON`数据类型

    *   `VARCHAR2`、`CLOB`、`BLOB`列，并且存在`is json`检查约束

    *   `VARCHAR2`、`CLOB`、`BLOB`列，并且在查询中使用`treat (<column_name> as json)`。


    ### 点表示法基本示例


    让我们从使用点表示法提取键“series”的值开始。


    ```sql

    select f.json_document."MRData"."series"

    from f1_drivers_json f

    /

    ```


    ```

    MRDATA

    -------

    "f1"

    ```


    JSON 文档中的键是大小写敏感的；因此在早期的 Oracle 数据库版本中，键必须用引号括起来。在较新的 Oracle 数据库版本（18 及更高版本）中，这不再是必需的。必须遵循
    JSON 中键的大小写。以下查询省略了引号，仍然得到相同的结果。


    ```sql

    select f.json_document.MRData.series

    from f1_drivers_json f

    /

    ```


    ```

    MRDATA

    -------

    "f1"

    ```


    在本章的剩余部分，除非绝对必要，否则查询中不会使用引号。当 JSON 键与 SQL 中的保留字同名，或者存在与 SQL 配合不佳的特殊字符（如星号*）时，可能需要使用引号。


    **注意**：当您使用代码格式化程序时，请注意使用 JSON 路径表达式的查询会发生什么变化。如果所有文本都被转换为（例如）小写，查询可能不再产生原来的结果。


    查询返回的结果是`JSON`数据类型。使用的数据库版本是 Oracle 21c 数据库。前面的查询返回了一个 JSON 标量。当 JSON 路径表达式定位单个值时，返回值可以是
    JSON 标量、对象或数组。当 JSON 路径表达式定位多个值时，将返回 JSON 数组。


    前面讨论的项方法，如`number()`、`string()`、`size()`，也可以在点表示法语法中使用。


    你可以使用项方法将返回值转换为相应的 SQL 标量。在下面的查询中，`series`属性作为字符串返回，车手的`permanentNumber`作为数字返回。


    ```sql

    select f.json_document.MRData.series.string() as serie

    ,f.json_document.MRData.DriverTable

    .Drivers.permanentNumber

    .number() as permanentnumber

    from f1_drivers_json f

    /

    ```


    ```

    SERIE      PERMANENTNUMBER

    ---------- ---------------

    f1                       5

    ```


    前面的查询之所以能“工作”，是因为 JSON 文档中只有一名车手（维特尔）拥有永久号码。这个 JSON 标量值可以被转换为 SQL `number`数据类型。


    让我们看看当你尝试提取两名车手（车手们在一个名为`Drivers`的数组中）的出生日期，并对结果应用`date()`项方法时会发生什么。以下查询同时显示了
    JSON 结果（在`j_dateofbirth`列中）和`date()`项方法的应用结果。


    ```sql

    select f.json_document.MRData

    .DriverTable.Drivers.dateOfBirth as j_dateOfBirth

    ,f.json_document.MRData

    .DriverTable.Drivers.dateOfBirth.date() as dateOfBirth

    from f1_drivers_json f

    /

    ```


    ```

    J_DATEOFBIRTH                  DATEOFBIR

    ------------------------------ ---------

    ["1971-03-27","1987-07-03"]

    ```

