    聚合函数也被赋予别名，以区分它们所代表的值。列名来源于透视列，而别名则来源于聚合。


    ## 逆透视（UNPIVOT）


    如果说透视（pivot）是将行变为列的操作，那么逆透视（unpivot）则做相反的事情。`排位赛`表有三列，分别对应每次排位。排位赛在比赛前一天进行，用于确定发车顺位以及谁获得杆位。每一轮排位都是淘汰赛，只有最快的车手进入下一轮。以下是罗伯特·多恩博斯（Robert
    Doornbos）的排位赛表摘录；他只进入过两次第二轮，一次进入最终轮。


    ```

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    /

    DRIVER          NAME                 Q1       Q2       Q3

    --------------- -------------------- -------- -------- --------

    Robert Doornbos Chinese Grand Prix   1:46.387 1:45.747 1:48.021

    Robert Doornbos Japanese Grand Prix  1:32.402

    Robert Doornbos Brazilian Grand Prix 1:12.530 1:12.591

    Robert Doornbos German Grand Prix    1:18.313

    Robert Doornbos Hungarian Grand Prix 1:25.484

    Robert Doornbos Italian Grand Prix   1:24.904

    Robert Doornbos Belgian Grand Prix   1:49.779

    Robert Doornbos Japanese Grand Prix  1:52.894

    Robert Doornbos Chinese Grand Prix   1:39.460

    9 行 已选择。

    ```


    目标是将三个排位时间列（`Q1`、`Q2` 和 `Q3`）转换为行。


    输入查询与前面的查询相同，只是现在作为一个命名的查询块。需要逆透视的列必须包含在输入查询中，本例中就是三个排位列。在逆透视子句中，新列被标记为 `qtime`，它包含三个排位列逆透视后的值，而
    `quali_round` 标签表示它所代表的轮次。


    ```

    with qualies as (

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    )

    select driver

    , name

    , quali_round

    , qtime

    from   qualies

    unpivot (

    qtime for quali_round in (q1, q2, q3)

    )

    /

    DRIVER          NAME                 QU QTIME

    --------------- -------------------- -- --------

    Robert Doornbos Chinese Grand Prix   Q1 1:46.387

    Robert Doornbos Chinese Grand Prix   Q2 1:45.747

    Robert Doornbos Chinese Grand Prix   Q3 1:48.021

    Robert Doornbos Japanese Grand Prix  Q1 1:32.402

    Robert Doornbos Brazilian Grand Prix Q1 1:12.530

    Robert Doornbos Brazilian Grand Prix Q2 1:12.591

    Robert Doornbos German Grand Prix    Q1 1:18.313

    Robert Doornbos Hungarian Grand Prix Q1 1:25.484

    Robert Doornbos Italian Grand Prix   Q1 1:24.904

    Robert Doornbos Belgian Grand Prix   Q1 1:49.779

    Robert Doornbos Japanese Grand Prix  Q1 1:52.894

    Robert Doornbos Chinese Grand Prix   Q1 1:39.460

    12 行 已选择。

    ```


    默认情况下，`NULL` 列会从结果集中排除。输出中没有 `Q2` 或 `Q3` 为 `NULL` 的行。可以通过在逆透视子句后声明 `include nulls`
    来覆盖此行为。


    ### 处理 NULL 值


    ```

    with qualies as (

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    )

    select driver

    , name

    , quali_round

    , qtime

    from   qualies

    unpivot include nulls (

    qtime for quali_round in (q1, q2, q3)

    )

    /

    DRIVER          NAME                 QU QTIME

    --------------- -------------------- -- --------

    Robert Doornbos Chinese Grand Prix   Q1 1:46.387

    Robert Doornbos Chinese Grand Prix   Q2 1:45.747

    Robert Doornbos Chinese Grand Prix   Q3 1:48.021

    Robert Doornbos Japanese Grand Prix  Q1 1:32.402

    Robert Doornbos Japanese Grand Prix  Q2

    Robert Doornbos Japanese Grand Prix  Q3

    Robert Doornbos Brazilian Grand Prix Q1 1:12.530

    Robert Doornbos Brazilian Grand Prix Q2 1:12.591

    Robert Doornbos Brazilian Grand Prix Q3


    ```


    ## 总结


    本章讨论了分析函数及其最常见的应用场景。一旦开始使用分析函数，你会发现更多的可能性。这里也存在一个警示：分析函数是在结果集确定之后（`连接`、`where`、`group
    by`、`having`）和最终排序之前（`order by`）应用的。当你在分析函数中使用 `distinct` 操作符时，可能你需要的是聚合函数而不是分析函数。


    本章最后讨论了结果集的透视（pivoting）和逆透视（unpivoting）。要透视结果，需要在 `pivot` 子句中聚合度量值。使用 `pivot`，行变为列；使用
    `unpivot`，列变为行。


    # 3. 连接


    与其他数据库开发人员讨论连接语法几乎总是会引向关于首选数据连接方式的讨论。有些人是 `ANSI` 风格连接的狂热支持者，而另一些人则倾向于坚持传统方式。我们偏爱的方法是前者——`ANSI`
    风格。


    本章讨论了使用 `ANSI` 风格连接的优势，并描述了最常见的连接：`外连接`、`内连接`和`全连接`。它还涵盖了一些不太为人所知的连接，如 `分区外连接`
    和 `横向连接`。当提到表时，指的是可以在查询中使用的所有类型的数据源，例如视图或物化视图。

    '
- fmt: '## Why Choose ANSI Joins?


    The main advantage of using ANSI-style join syntax is the separation of join and
    filter criteria. Where the traditional syntax mixes the join and filter criteria,
    this is simply not possible with ANSI-style. The join criteria specifies how the
    tables are joined, while the filter criteria is located in the `where` clause.


    The traditional style of joining tables is listing the table in the `from` clause
    and specifying the join criteria in the `where` clause. When the data needs extra
    filters, they also go into the `where` clause. This could potentially lead to
    confusion as to whether a condition in the `where` clause is a join or filter
    criteria.


    ANSI-style syntax forces to specify the join criteria in either an `on` clause
    or a `using` clause. The filter criteria always go in the `where` clause.


    Forgetting a join criteria with the traditional style leads to a cartesian product.


    You cannot create an accidental cartesian product with ANSI-style syntax. When
    the intention is to create a cartesian product traditionally, the code needs to
    be properly commented to signal the next developer that this cartesian product
    is, in fact, intentional. An ANSI-style cartesian product is clear as day: `cross
    join`. This signals to the next developer that this cartesian product is intentional
    without needing additional comments.


    Outer joining tables together is not as intuitive as the traditional style. Should
    the outer join notation `(+)` go on the outer joined table, or should it be on
    the other? The use of `(+)` must be applied to all outer joined columns for the
    join to remain an outer join. Database developers from other database vendors
    will not be familiar with this Oracle-style syntax of outer joining.


    ANSI-style outer joins are easier to understand. To write a query that performs
    an outer join of tables A and B and should return all rows from A (the table located
    to the left of the join keyword), specify the `left outer join` in the `from`
    clause. With the traditional style of writing an outer join, the outer join operator
    `(+)` must be applied to all columns of table B, which can be counterintuitive.


    Under the hood, it doesn’t matter which style of join is used. They are rewritten
    by the optimizer and executed in the same way.


    Regardless of your join style preference, a common agreement can be that both
    styles shouldn’t be mixed within the same query. Although this is possible, it
    is considered a bad practice. Most commonly, the query style is agreed upon by
    all database developers at the start of a project.


    ## Natural Joins


    A natural join is where the join criteria are derived from the `name` of the columns
    in both tables. This abomination is in the ANSI standard but shouldn’t be used.


    The `DRIVERS`, `RESULTS`, and `CONSTRUCTORS` tables are used to demonstrate the
    absurdity of the natural join. Using natural joins, these tables are combined,
    and the following query is executed.


    ```

    select ctr.name

    ,drv.forename

    ,drv.surname

    from f1data.drivers drv

    natural

    join f1data.results rst

    natural

    join f1data.constructors ctr

    /

    no rows selected

    ```


    There are no results for this query, and the reason for this becomes clear when
    the explain plan is inspected.


    ```

    explain plan for

    select ctr.name

    , drv.forename

    , drv.surname

    from   f1data.drivers drv

    natural

    join   f1data.results rst

    natural

    join   f1data.constructors ctr

    /

    select *

    from   table (dbms_xplan.display (format => ''BASIC +PREDICATE'' ))

    /


    | Id  | Operation                    | Name         |


    |   0 | SELECT STATEMENT             |              |

    |*  1 |  HASH JOIN                   |              |

    |   2 |   JOIN FILTER CREATE         | :BF0000      |

    |*  3 |    HASH JOIN                 |              |

    |   4 |     TABLE ACCESS STORAGE FULL| CONSTRUCTORS |

    |   5 |     TABLE ACCESS STORAGE FULL| DRIVERS      |

    |   6 |   JOIN FILTER USE            | :BF0000      |

    |*  7 |    TABLE ACCESS STORAGE FULL | RESULTS      |


    Predicate Information (identified by operation id):


    1 - access("RST"."CONSTRUCTORID"="CTR"."CONSTRUCTORID" AND

    "DRV"."DRIVERID"="RST"."DRIVERID")

    3 - access("DRV"."URL"="CTR"."URL" AND

    "DRV"."NATIONALITY"="CTR"."NATIONALITY")

    7 - storage(SYS_OP_BLOOM_FILTER(:BF0000,"RST"."DRIVERID"))

    filter(SYS_OP_BLOOM_FILTER(:BF0000,"RST"."DRIVERID"))

    ```


    As seen in the access predicate information, the join criteria performed by the
    natural joins are based on the similarity between column names. Some are correct,
    like constructorid and driverid, but others don’t make sense, like nationality
    or url. Again, this abomination in the ANSI standard shouldn’t be used.


    ## Inner Joins


    The most common method of tying two tables together is done with an inner join.
    Tables are joined together on certain columns specified in the join criteria.
    The following example shows an inner join between the `drivers` and the `results`
    table.


    ```

    select crt.raceid

    , crt.points

    , csr.name

    , csr.nationality

    from   f1data.constructors csr

    inner

    join   f1data.constructorresults crt

    on   csr.constructorid = crt.constructorid

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    18         14 McLaren         British

    18          8 BMW Sauber      German

    18          9 Williams        British

    18          5 Renault         French

    18          2 Toro Rosso      Italian

    18          1 Ferrari         Italian

    18          0 Toyota          Japanese

    18          0 Super Aguri     Japanese

    18          0 Red Bull        Austrian

    18          0 Force India     Indian

    ```


    In this query, it is explicitly stated that this concerns an inner join by use
    of the optional keyword: `inner`. The join criteria are specified in the `on`
    clause. It is also possible to use the `using` clause, which implies a common
    column between the two tables. The `using` clause makes an equality comparison
    between the two columns. The `on` clause allows other types of comparison between
    the joining columns. The following example is equivalent to the previous example,
    but now uses the `using` clause in the join criteria.


    ```

    select crt.raceid

    , crt.points

    , csr.name

    , csr.nationality

    from   f1data.constructors csr

    join   f1data.constructorresults crt

    using  (constructorid)

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    18         14 McLaren         British

    18          8 BMW Sauber      German

    18          9 Williams        British

    18          5 Renault         French

    18          2 Toro Rosso      Italian

    18          1 Ferrari         Italian

    18          0 Toyota          Japanese

    18          0 Super Aguri     Japanese

    18          0 Red Bull        Austrian

    18          0 Force India     Indian


    ```


    The `using` clause cannot specify the columns used in the join condition with
    an alias anywhere in the query. To be clear, the columns can be used; however,
    they can’t be prefixed by the table alias. After all, the columns that join the
    tables are common columns to join the tables together.'
