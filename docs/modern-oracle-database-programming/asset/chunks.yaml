    ## 比较JSON文档


    对于JSON文档，空白和属性顺序无关紧要。因此，尽管下面的JSON片段在文本视角下看起来不同，但从JSON视角来看它们是相同的。


    ```json

    {"code":"COU","givenName":"David","familyName":"Coulthard"}

    ```


    ```json

    {

    "givenName" : "David",

    "familyName" : "Coulthard",

    "code" : "COU"

    }

