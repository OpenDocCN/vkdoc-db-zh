    \ collection, but they both point to the same record in the `l_drivers_with_number`\
    \ collection, resulting in the `forall` statement inserting the same record twice.\n\
    \n### Bulk Exceptions\n\nThe “DML Error Logging” section in this chapter discusses\
    \ bulk exceptions.\n\n## Compound Triggers\n\nWhen performing DML on tables (or\
    \ views), Oracle Database can fire triggers at four different points during the\
    \ execution of the statement.\n\n*   Before the firing statement\n*   Before each\
    \ row that the firing statement affects\n*   After each row that the firing statement\
    \ affects\n*   After the firing statement\n\nDifferent triggers can be built for\
    \ each DML action: `insert`, `update`, and `delete`.\n\nThe concept of compound\
    \ triggers was introduced in Oracle Database 11g. All the actions can be built\
    \ into a single trigger with a compound trigger. Not only does this limit the\
    \ number of objects, and therefore source files, needed, but the compound trigger\
    \ allows sharing of state between all the trigger points using variables. The\
    \ compound trigger has a declaration section, similar to the declaration section\
    \ of a package. The common state is created at the start of the triggering statement\
    \ and is destroyed at the completion of the trigger.\n\nBefore the introduction\
    \ of compound triggers, the same behavior could (and still can) be accomplished\
    \ using packages to share the data, except that you had to take care of the creation\
    \ and destruction of the data structures yourself. The following is the skeleton\
    \ of a compound trigger with a short explanation of each section.\n\n```sql\n\
