    ## PIVOT


    ```

    with results as (

    select rcs.year

    , drv.driverref

    , rsl.points

    , rsl.laps --<----- Laps added to input

    from   f1data.results rsl

    join   f1data.races rcs

    on   rcs.raceid = rsl.raceid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  drv.driverref in (''norris'', ''bottas'')

    )

    select year

    , norris_points

    , norris_laps

    , bottas_points

    , bottas_laps

    from   results

    pivot  ( sum (points) as points

    , sum (laps)   as laps

    for driverref in ( ''norris'' as norris

    , ''bottas'' as bottas

    )

    )

    order  by year

    /

    YEAR NORRIS_POINTS NORRIS_LAPS BOTTAS_POINTS BOTTAS_LAPS

    ---------- ------------- ----------- ------------- -----------

    2013                                       4        1070

    2014                                     186        1110

    2015                                     136        1037

    2016                                      85        1186

    2017                                     305        1168

    2018                                     247        1202

    2019            49        1102           326        1233

    2020            97        1015           223         994

    2021           160        1223           219        1134

    2022            54         570            44         541

    10 rows selected.

    ```


    The aggregate functions are also aliased to distinguish the values and what they
    represent. The column names are derived from the pivot column, and the alias from
    the aggregate.


    ## UNPIVOT


    Where pivoting is the action of turning rows into columns, unpivot does the opposite.
    The `QUALIFYING` table has three columns, one for each qualification. Qualifications
    are used the day before the race to determine the starting grid and who starts
    in the pole position. Each qualification round is an elimination. Only the fastest
    go on to the next round. The following is an excerpt from the qualifications table
    for Robert Doornbos; he only managed to get to the second round twice and once
    to the final round.


    ```

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    /

    DRIVER          NAME                 Q1       Q2       Q3

    --------------- -------------------- -------- -------- --------

    Robert Doornbos Chinese Grand Prix   1:46.387 1:45.747 1:48.021

    Robert Doornbos Japanese Grand Prix  1:32.402

    Robert Doornbos Brazilian Grand Prix 1:12.530 1:12.591

    Robert Doornbos German Grand Prix    1:18.313

    Robert Doornbos Hungarian Grand Prix 1:25.484

    Robert Doornbos Italian Grand Prix   1:24.904

    Robert Doornbos Belgian Grand Prix   1:49.779

    Robert Doornbos Japanese Grand Prix  1:52.894

    Robert Doornbos Chinese Grand Prix   1:39.460

    9 rows selected.

    ```


    The objective is to turn the three qualifying times columns (`Q1`, `Q2`, and `Q3`)
    into rows.


    The input query is the same as the preceding query, only now as a named query
    block. The columns that need to be unpivoted must be in the input query, in this
    case, the three qualifying columns. In the unpivot clause, the new column is labeled
    `qtime`, which contains the unpivoted value of the three qualifying columns, and
    `quali_round` labels what it represents.


    ```

    with qualies as (

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    )

    select driver

    , name

    , quali_round

    , qtime

    from   qualies

    unpivot (

    qtime for quali_round in (q1, q2, q3)

    )

    /

    DRIVER          NAME                 QU QTIME

    --------------- -------------------- -- --------

    Robert Doornbos Chinese Grand Prix   Q1 1:46.387

    Robert Doornbos Chinese Grand Prix   Q2 1:45.747

    Robert Doornbos Chinese Grand Prix   Q3 1:48.021

    Robert Doornbos Japanese Grand Prix  Q1 1:32.402

    Robert Doornbos Brazilian Grand Prix Q1 1:12.530

    Robert Doornbos Brazilian Grand Prix Q2 1:12.591

    Robert Doornbos German Grand Prix    Q1 1:18.313

    Robert Doornbos Hungarian Grand Prix Q1 1:25.484

    Robert Doornbos Italian Grand Prix   Q1 1:24.904

    Robert Doornbos Belgian Grand Prix   Q1 1:49.779

    Robert Doornbos Japanese Grand Prix  Q1 1:52.894

    Robert Doornbos Chinese Grand Prix   Q1 1:39.460

    12 rows selected.

    ```


    By default, `NULL` columns are excluded from the result set. There are no rows
    in the output where `Q2` or `Q3` is `NULL`. This behavior can be overridden by
    stating `include nulls` after the unpivot clause.


    ### 处理NULL值


    ```

    with qualies as (

    select drv.forename ||'' ''||drv.surname as driver

    , rcs.name

    , qlf.q1

    , qlf.q2

    , qlf.q3

    from   f1data.qualifying qlf

    join   f1data.drivers drv

    on   drv.driverid = qlf.driverid

    join   f1data.races rcs

    on   rcs.raceid = qlf.raceid

    where  drv.driverref = ''doornbos''

    and    qlf.q1 is not null

    )

    select driver

    , name

    , quali_round

    , qtime

    from   qualies

    unpivot include nulls (

    qtime for quali_round in (q1, q2, q3)

    )

    /

    DRIVER          NAME                 QU QTIME

    --------------- -------------------- -- --------

    Robert Doornbos Chinese Grand Prix   Q1 1:46.387

    Robert Doornbos Chinese Grand Prix   Q2 1:45.747

    Robert Doornbos Chinese Grand Prix   Q3 1:48.021

    Robert Doornbos Japanese Grand Prix  Q1 1:32.402

    Robert Doornbos Japanese Grand Prix  Q2

    Robert Doornbos Japanese Grand Prix  Q3

    Robert Doornbos Brazilian Grand Prix Q1 1:12.530

    Robert Doornbos Brazilian Grand Prix Q2 1:12.591

    Robert Doornbos Brazilian Grand Prix Q3


    ```


    ## Summary


    This chapter discussed analytic functions and the most common use cases. Once
    you start using analytic functions, the more possibilities you recognize. There
    also lies a warning: analytic functions are applied after the result set is determined
    (`join`, `where`, `group by`, `having`) and before the final sort (`order by`).
    When you use an analytic function with a distinct operator, maybe you need an
    aggregate instead of an analytic function.


    At the end of the chapter, pivoting and unpivoting a result set are discussed.
    To pivot results, the measures are aggregated in the `pivot` clause. With `pivot`,
    rows are turned into columns, and with `unpivot`, columns are turned into rows.


    # 3. Joins


    Discussing join syntax with other database developers almost always leads to discussing
    the preferred style of joining data sources. Some are fanatic supporters of `ANSI`-style
    joins, while others prefer to stick to the traditional way. Our preferred method
    is the former—`ANSI` style.


    This chapter discusses the advantages of using `ANSI`-style joins and describes
    the most common joins: `outer`, `inner`, and `full`. It also covers some lesser-known
    joins, like the `partition outer` and the `lateral` join. Where tables are mentioned,
    all types of data sources that can be used in a query are meant, such as views
    or materialized views.'
