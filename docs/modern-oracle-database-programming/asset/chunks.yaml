- fmt: '### JSON_SERIALIZE


    `json_serialize`函数可以将JSON文档转换为文本表示形式。当JSON文档存储在BLOB中并且需要读取其内容时，这特别有用。


    复制了示例JSON表，以演示`json_serialize`如何将JSON文档转换为不同的数据类型，但这次使用二进制格式的JSON。


    ```

    create table f1_drivers_blob

    as

    select json_serialize

    ( json_document returning blob ) as json_document

    from   f1_drivers_json

    /

    ```


    在这种情况下，`returning`子句指定了所需的BLOB数据类型。


    在`returning`子句后添加`pretty`可以使文本表示更易于阅读。


    ```

    select json_serialize

    ( json_document returning clob pretty ) as json_document

    from f1_drivers_blob

    /

    JSON_DOCUMENT


    {

    "MRData" :

    {

    "series" : "f1",

    "DriverTable" :

    {

    "Drivers" :

    [

    {

    "driverId" : "coulthard",

    ```


    当JSON文档包含非ASCII字符时，可以通过在`returning`子句后添加`ascii`来转义这些字符。由于我们的示例数据不包含此类特殊字符，以下示例使用从dual中选择来演示`ascii`子句的作用。


    ![](images/536316_1_En_13_Chapter/536316_1_En_13_Figa_HTML.png)


    一张图片显示了一个编码窗口。它以文本开头，select jason underscore serialize。第一个代码不包含A S C I I，而第二个包含。


    ## SQL条件


    过滤掉满足特定条件的行是在查询的`where`子句中完成的。当这些条件涉及JSON文档时，有几种选项可用。


    当有一个包含JSON文档和其他非JSON文档的表时，可以使用`is json`和`is not json`条件。


    以下示例创建了一个暂存表（`f1_staging`）来存储所有数据。目的是稍后处理这些数据。


    ```

    create table f1_staging

    (all_data clob)

    /

    ```


    插入了两条记录：一条非JSON和另一条JSON。


    ```

    insert into f1_staging

    values (''David Marshall Coulthard MBE born 27 March 1971) is a British former
    racing driver from Scotland, later turned presenter, commentator and journalist.
    Nicknamed "DC", he competed in 15 seasons of Formula One between 1994 and 2008,
    taking 13 Grand Prix victories and 62 podium finishes. He was runner-up in the
    2001 championship, driving for McLaren.'')

    /

    insert into f1_staging

    values (''{"driverId":"coulthard","code":"COU","givenName":"David","familyName":"Coulthard","dateOfBirth":"1971-03-27","nationality":"British","champion":false,"nickname":"DC"}'')

    /

    commit

    /

    ```


    使用以下语句过滤掉非JSON数据。


    ```

    select *

    from   f1_staging

    where  all_data is not json

    /

    ALL_DATA


    David Marshall Coulthard MBE born 27 March 1971) is a British

    ```


    以下语句用于过滤JSON数据。


    ```

    select *

    from   f1_staging

    where  all_data is json

    /

    ALL_DATA


    {"driverId":"coulthard","code":"COU","givenName":"David","familyName":"Coulthard

    ```


    可以使用`json_exists`在JSON文档中过滤特定属性和/或与该属性关联的值。


    在以下示例中，驾驶员对象已在`f1_drivers_obj`表中被分成两行。Coulthard一行，Vettel一行。


    JSON路径表达式定位要测试其属性是否存在的属性。以下查询测试`driverId`属性的存在性。


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$.driverId''

    )

    /

    FIRSTNAME


    David

    Sebastian

    ```


    两个驾驶员都有`driverId`属性，因此两行都被返回。


    以下示例使用`json_exists`条件从表中过滤正确的JSON文档。使用过滤条件测试`driverId`是否为名称“coulthard”。


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.driverId == "coulthard")''

    )

    /

    FIRSTNAME


    David

    ```


    两个驾驶员都有`nickname`属性，一个值为DC，另一个值为JSON NULL（不是SQL NULL）。以下过滤条件查找昵称为`null`的驾驶员。


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nickname == null)''

    )

    /

    FIRSTNAME


    Sebastian

    ```


    `json_exists`条件也可以在CASE表达式中使用，如以下示例所示。


    ```

    select case

    when json_exists ( f.driver

    , ''$?(@.champion ==true)''

    )

    then

    ''We''''ve got a winner''

    end as champion

    from   f1_drivers_obj f

    /

    CHAMPION


    We''ve got a winner

    ```


    返回了两行，每个驾驶员一行，但因为条件只对其中一个驾驶员满足，所以只有一行有“We''ve got a winner”文本，而另一行是null。


    可以通过组合JSON路径过滤条件来测试多个条件（参见第[12](#536316_1_En_12_Chapter.xhtml)章）。然而，测试一个属性具有某个值*和*另一个属性的存在需要一个`exists`过滤器。


    以下条件尝试过滤国籍为芬兰*或*存在Constructors数组的驾驶员。


    ```

    $?(@.nationality == "Finnish" || @.Constructors[*])

    ```


    这会导致以下错误。


    ```

    SQL Error: ORA-40597: JSON path expression syntax error (''$?(@.nationality ==
    "Finnish" || @.Constructors[*])'')

    JZN-00224: Unexpected characters in comparison operator

    at position 51

    40597\. 00000 -  "JSON path expression syntax error (''%s'')%s\nat position %s"

    *Cause:    The specified JavaScript Object Notation (JSON) path expression

    had invalid syntax and could not be parsed.

    *Action:   Specify JSON path expression with the correct syntax.

    ```


    以下是用于测试这些条件的正确JSON路径表达式。


    ```

    $?(@.nationality == "Finnish" || exists(@.Constructors[*]))

    ```


    在`json_exists`条件中使用这个会返回以下结果。尽管驾驶员是德国人，不是芬兰人，但为他存在一个Constructors数组。


    ```

    select f.driver.familyName.string() as lastname

    , f.driver.nationality.string() as nationality

    , f.driver.Constructors[*].nationality as c_nationalities

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nationality == "Finnish"

    || exists(@.Constructors[*]))''

    )

    /

    LASTNAME        NATIONALITY     C_NATIONALITIES

    --------------- --------------- ----------------------

    Vettel          German          ["Austrian","British"]

    ```


    当然，也可以将绑定变量传递给`json_exists`子句。以下查询显示所有驾驶员，其中*要么*他们的国籍是英国，*要么*构造函数的国籍是英国，*或者*两个条件都为真。


    ```

    select f.driver.familyName.string() as lastname

    , f.driver.nationality.string() as nationality

    , f.driver.Constructors[*].nationality as c_nationalities

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nationality == $nationality

    || @.Constructors[*].nationality

    == $nationality)''

    passing ''British'' as "nationality"

    )

    /

    LASTNAME        NATIONALITY     C_NATIONALITIES

    --------------- --------------- ----------------------

    Coulthard       British         null

    Vettel          German          ["Austrian","British"]

    ```


    可以为JSON文档的全文搜索创建JSON搜索索引。JSON搜索索引类似于Oracle Text索引。有关JSON搜索索引以及如何创建和使用它的更多信息，请参见第[11](#536316_1_En_11_Chapter.xhtml)章。'
  raw: '### JSON_SERIALIZE


    The `json_serialize` function can transform a JSON document into a textual representation.
    This is especially useful when the JSON document is stored in a BLOB, and the
    contents need to be read.


    The sample JSON table is copied to demonstrate how `json_serialize` can convert
    the JSON document to a different data type, but this time with JSON in a binary
    format.


    ```

    create table f1_drivers_blob

    as

    select json_serialize

    ( json_document returning blob ) as json_document

    from   f1_drivers_json

    /

    ```


    In this case, the `returning` clause dictates the data type wanted for a BLOB.


    Adding `pretty` after the `returning` clause makes the textual representation
    easier to read.


    ```

    select json_serialize

    ( json_document returning clob pretty ) as json_document

    from f1_drivers_blob

    /

    JSON_DOCUMENT


    {

    "MRData" :

    {

    "series" : "f1",

    "DriverTable" :

    {

    "Drivers" :

    [

    {

    "driverId" : "coulthard",


    ```


    When the JSON document contains non-ASCII characters, these can be escaped by
    adding `ascii` after the `returning` clause. As our sample data doesn’t contain
    special characters like these, the following example uses a select from dual to
    demonstrate what the `ascii` clause does.


    ![](images/536316_1_En_13_Chapter/536316_1_En_13_Figa_HTML.png)


    An image shows a coding window. It starts with the text, select jason underscore
    serialize. The first code does not include A S C I I in it, while the second one
    does.


    ## SQL Conditions


    Filtering out rows that meet specific conditions is done in the `where` clause
    of a query. When these conditions involve JSON documents, a few options are available.


    When there is a table that contains JSON documents and other non-JSON documents,
    you can use the `is json` and `is not json` conditions.


    The following example creates a staging table (`f1_staging`) to store all the
    data. The idea is that this data is processed later.


    ```

    create table f1_staging

    (all_data clob)

    /

    ```


    Two records are inserted: one non-JSON and the other JSON.


    ```

    insert into f1_staging

    values (''David Marshall Coulthard MBE born 27 March 1971) is a British former
    racing driver from Scotland, later turned presenter, commentator and journalist.
    Nicknamed "DC", he competed in 15 seasons of Formula One between 1994 and 2008,
    taking 13 Grand Prix victories and 62 podium finishes. He was runner-up in the
    2001 championship, driving for McLaren.'')

    /

    insert into f1_staging

    values (''{"driverId":"coulthard","code":"COU","givenName":"David","familyName":"Coulthard","dateOfBirth":"1971-03-27","nationality":"British","champion":false,"nickname":"DC"}'')

    /

    commit

    /

    ```


    Filtering out the non-JSON data is done with the following statement.


    ```

    select *

    from   f1_staging

    where  all_data is not json

    /

    ALL_DATA


    David Marshall Coulthard MBE born 27 March 1971) is a British


    ```


    The following statement is used to filter out the JSON data.


    ```

    select *

    from   f1_staging

    where  all_data is json

    /

    ALL_DATA


    {"driverId":"coulthard","code":"COU","givenName":"David","familyName":"Coulthard


    ```


    You can use `json_exists` to filter in a JSON document for a specific attribute
    and/or value associated with the attribute.


    For the following examples, the driver objects have been separated into two rows
    in the `f1_drivers_obj` table. There is one row for Coulthard and one for Vettel.


    The JSON path expression targets the attribute to test for the existence of an
    attribute. The following query tests for the existence of the `driverId` attribute.


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$.driverId''

    )

    /

    FIRSTNAME


    David

    Sebastian

    ```


    Both drivers have the `driverId` attribute, so both rows are returned.


    The following example uses the `json_exists` condition to filter the correct JSON
    document from the table. A filter condition is used to test the `driverId` for
    the name “coulthard”.


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.driverId == "coulthard")''

    )

    /

    FIRSTNAME


    David

    ```


    Both drivers have a `nickname` attribute, one with a value of DC, and the other
    has a value of JSON NULL (not SQL NULL). The following filter condition finds
    the driver whose nickname is `null`.


    ```

    select f.driver.givenName.string() as firstname

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nickname == null)''

    )

    /

    FIRSTNAME


    Sebastian

    ```


    The `json_exists` condition can also be used in a CASE expression, like in the
    following example.


    ```

    select case

    when json_exists ( f.driver

    , ''$?(@.champion ==true)''

    )

    then

    ''We''''ve got a winner''

    end as champion

    from   f1_drivers_obj f

    /

    CHAMPION


    We''ve got a winner

    ```


    Two rows are returned, one for each driver, but because the condition is only
    satisfied for one of the drivers, only one row has the “We’ve got a winner” text,
    whereas the other is null.


    Multiple conditions can be tested by combining JSON path filter conditions (see
    Chapter [12](#536316_1_En_12_Chapter.xhtml)). However, testing for an attribute
    having a certain value *and* the existence of another attribute requires an `exists`
    filter.


    The following condition attempts to filter for a driver whose nationality is Finnish
    *or* there is a Constructors array present.


    ```

    $?(@.nationality == "Finnish" || @.Constructors[*])

    ```


    This leads to the following error.


    ```

    SQL Error: ORA-40597: JSON path expression syntax error (''$?(@.nationality ==
    "Finnish" || @.Constructors[*])'')

    JZN-00224: Unexpected characters in comparison operator

    at position 51

    40597\. 00000 -  "JSON path expression syntax error (''%s'')%s\nat position %s"

    *Cause:    The specified JavaScript Object Notation (JSON) path expression

    had invalid syntax and could not be parsed.

    *Action:   Specify JSON path expression with the correct syntax.

    ```


    The following is the correct JSON path expression to test for these conditions.


    ```

    $?(@.nationality == "Finnish" || exists(@.Constructors[*]))

    ```


    Using this in a `json_exists` condition returns the following result. Even though
    the driver is German, not Finnish, a Constructors array exists for him.


    ```

    select f.driver.familyName.string() as lastname

    , f.driver.nationality.string() as nationality

    , f.driver.Constructors[*].nationality as c_nationalities

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nationality == "Finnish"

    || exists(@.Constructors[*]))''

    )

    /

    LASTNAME        NATIONALITY     C_NATIONALITIES

    --------------- --------------- ----------------------

    Vettel          German          ["Austrian","British"]

    ```


    Of course, it is also possible to pass bind variables to the `json_exists` clause.
    The following query shows all drivers where *either* their nationality is British
    *or* the nationality of the constructor is British, *or* both conditions are true.


    ```

    select f.driver.familyName.string() as lastname

    , f.driver.nationality.string() as nationality

    , f.driver.Constructors[*].nationality as c_nationalities

    from   f1_drivers_obj f

    where  json_exists ( f.driver

    , ''$?(@.nationality == $nationality

    || @.Constructors[*].nationality

    == $nationality)''

    passing ''British'' as "nationality"

    )

    /

    LASTNAME        NATIONALITY     C_NATIONALITIES

    --------------- --------------- ----------------------

    Coulthard       British         null

    Vettel          German          ["Austrian","British"]

    ```


    A JSON search index can be created for full-text searches of the JSON document.
    The JSON search index is comparable to an Oracle Text index. For more information
    about the JSON search index and how to create and use it, see Chapter [11](#536316_1_En_11_Chapter.xhtml).'
