    ### alter_policy


    Since the table also holds a column with the time in milliseconds, you want to
    add another column to be redacted to the policy. Use the `dbms_redact.alter_policy`
    procedure for this.


    The `alter_policy` procedure can take the same parameters as the `add_policy`
    procedure but has an `action` extra parameter, which can have one of the values
    described in Table [18-8](#536316_1_En_18_Chapter.xhtml#Tab8).


    Table 18-8


    Possible Values for the Action Parameter


    | Constant | Description |

    | --- | --- |

    | ADD_COLUMN | Add a column to the redaction policy. |

    | DROP_COLUMN | Drop a column from the redaction policy. |

    | MODIFY_EXPRESSION | Modify the expression of a redaction policy (the expression
    evaluates to a boolean value: if TRUE, then redaction is applied, otherwise, not).
    |

    | MODIFY_COLUMN | Modify a column in the redaction policy to change the redaction
    function_type or the function_parameters. |

    | SET_POLICY_DESCRIPTION | Set a description for the redaction policy. |

    | SET_COLUMN_DESCRIPTION | Set a description for the redaction performed on the
    column. |


    ```

    begin

    sys.dbms_redact.alter_policy

    ( object_schema       => ''f1data''

    , object_name         => ''laptimes''

    , policy_name         => ''maskedlaptime''

    , action              => dbms_redact.add_column

    , column_name         => ''milliseconds''

    , function_type       => dbms_redact.partial

    , function_parameters => ''9,1,4''

    );

    end;

    /

    ```


