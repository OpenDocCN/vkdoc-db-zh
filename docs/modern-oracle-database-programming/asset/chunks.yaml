    ## PL/SQL Qualified Expressions


    Since Oracle Database 18c, it is possible to use qualified expressions. Qualified
    expressions look a lot like calling a procedure or function with named parameters.


    ### Records


    In previous Oracle Database versions, you could initialize records by initializing
    the variable and then providing values for all the attributes of the record (see
    Listing [7-26](#536316_1_En_7_Chapter.xhtml#PC28)).


    ```

    declare

    type circuit_t is record

    ( circuitid  number(11)

    , circuitref varchar2(255)

    , name       varchar2(255)

    , location   varchar2(255)

    , country    varchar2(255)

    , lat        float

    , lng        float

    , alt        number(11)

    , url        varchar2(255));

    l_circuit circuit_t;

    begin

    l_circuit := circuit_t();

    l_circuit.circuitid  := 2912;

    l_circuit.circuitref := ''tt_circuit'';

    l_circuit.name       := ''TT Circuit Assen'';

    l_circuit.location   := ''Assen'';

    l_circuit.country    := ''Netherlands'';

    l_circuit.lat        := 52.961667;

    l_circuit.lng        := 6.523333;

    l_circuit.url        :=

    ''https://en.wikipedia.org/wiki/TT_Circuit_Assen'';

    dbms_output.put_line( ''Name     : '' || l_circuit.name );

    dbms_output.put_line( ''Location : '' || l_circuit.location );

    dbms_output.put_line( ''Latitude : '' || l_circuit.lat );

    dbms_output.put_line( ''Lngitude : '' || l_circuit.lng );

    dbms_output.put_line( ''Altitude : '' || l_circuit.alt );

    end;

    /

    Name     : TT Circuit Assen

    Location : Assen

    Latitude : 52.961667

    Lngitude : 6.523333

    Altitude :

    Listing 7-26

    Initializing variable pre-18c

    ```


    Providing the values could also be done in the initialization by providing these
    values as parameters. If they were unknown, you could supply `NULL` (see Listing
    [7-27](#536316_1_En_7_Chapter.xhtml#PC29)).


    ```

    declare

    type circuit_t is record

    ( circuitid  number(11)

    , circuitref varchar2(255)

    , name       varchar2(255)

    , location   varchar2(255)

    , country    varchar2(255)

    , lat        float

    , lng        float

    , alt        number(11)

    , url        varchar2(255));

    l_circuit circuit_t;

    begin

    l_circuit := circuit_t

    ( 2912

    , ''tt_circuit''

    , ''TT Circuit Assen''

    , ''Assen''

    , ''Netherlands''

    , 52.961667

    , 6.523333

    , null

    , ''https://en.wikipedia.org/wiki/TT_Circuit_Assen''

    );

    dbms_output.put_line( ''Name     : '' || l_circuit.name );

    dbms_output.put_line( ''Location : '' || l_circuit.location );

    dbms_output.put_line( ''Latitude : '' || l_circuit.lat );

    dbms_output.put_line( ''Lngitude : '' || l_circuit.lng );

    dbms_output.put_line( ''Altitude : '' || l_circuit.alt );

    end;

    /

