    \n, nationality\n, url\n)\n)\nlocation ( 'drivers.csv' )\n)\nreject limit 0\n\
    /\n```\n\n清单 20-1\n创建 `drivers_ext` 外部表的脚本\n\n## 修改与运行时操作\n\n创建外部表后，您可以修改设置，例如将其指向另一个文件。\n\
    \n```sql\nalter table drivers_ext location ( 'drivers100.csv' )\n```\n\n如果更改访问参数，请注意，您未提供的每个参数都会恢复为其默认值。它不会保留您之前提供的设置。\n\
    \nOracle Database 12.2 引入了在运行时修改某些设置的选项。\n\n*   您可以在`access`参数中更改`badfile`、`logfile`和`discardfile`的文件名。其他`access`参数保留其值。\n\
    *   更改`default directory`；它必须是一个字面值。\n*   更改`location`；它可以是一个字面值或绑定变量。\n*   更改`reject\
    \ limit`；它可以是一个字面值或绑定变量。\n\n```sql\nselect count(*)\nfrom   drivers_ext external\
    \ modify (location ('drivers100.csv'))\n/\nCOUNT(*)\n\nselect count(*)\nfrom \
    \  drivers_ext\n/\nCOUNT(*)\n```\n\n## 内联外部表\n\n自 Oracle Database 18c 起，您无需创建外部表即可访问外部表。通常位于外部表\
    \ DDL 中的所有代码现在都可以放入 SQL 语句中。\n\n```sql\nselect * from external (\n( constructorId\
    \  number(11)\n, constructorRef varchar2(256)\n, name           varchar2(256)\n\
    , nationality    varchar2(256)\n, url            varchar2(256)\n)\ntype oracle_loader\n\
    default directory f1db_csv\naccess parameters\n( records delimited by newline\n\
    skip 1\nbadfile 'constructors.bad'\nlogfile 'constructors.log'\nfields terminated\
    \ by ','\noptionally enclosed by '\"'\n( constructorId\n, constructorRef\n, name\n\
    , nationality\n, url\n)\n)\nlocation ( 'constructors.csv' )\nreject limit 0\n\
    )\n```\n"
- fmt: 'If you previously loaded data into Oracle Database using the SQL*loader utility,
    you can generate the needed external table definition using the `EXTERNAL_TABLE=GENERATE_ONLY`
    option.


    ## Immutable Table


    Oracle Database 21c introduced the concept of immutable tables. Immutable tables
    are insert-only tables in which existing data cannot be changed. Deleting rows
    from the immutable table is prohibited unless the insert occurred more than the
    specified number of days ago. After creation, no DDL can be performed to alter
    the table’s layout. It is possible to add and remove constraints and indexes,
    however.


    The following statement is executed to create an immutable table.


    ```sql

    create immutable table dutchdrivers

    ( driverid     number  (  11 ) not null

    , driverref    varchar2( 255 )

    , drivernumber number  (  11 )

    , code         varchar2(   3 )

    , forename     varchar2( 255 )

    , surname      varchar2( 255 )

    , dob          date

    , nationality  varchar2( 255 )

    , url          varchar2( 255 )

    )

    ```


    You have to specify the retention periods for dropping the table as a whole and
    deleting rows.


    First, you specify the drop table condition.


    ```sql

    no drop [ until days idle ]

    ```


    The minimum number of days you can specify for the idle option is 0.


    Next, specify the records’ retention time before being able to delete rows.


    ```sql

    no delete ( [ locked ] | ( until days after insert [ locked ] ) )

    ```


    The minimum number of days you can specify for the delete option is 16 days.


    You can choose to keep the data forever; then, you don’t specify the number of
    days in these two clauses.


    **Tip**


    When experimenting with these options, make sure you set the number of days idle
    in the drop clause to a low value, preferably 0; otherwise, you may end up with
    a schema full of tables you cannot get rid of. There is no option to remove tables
    still in their retention period other than dropping your database completely.


    The complete script to create the table can be found in Listing [20-2](#536316_1_En_20_Chapter.xhtml#PC42).


    ```sql

    create immutable table dutchdrivers

    ( driverid      number  (  11 ) not null

    , driverref     varchar2( 255 )

    , driver_number number  (  11 )

    , code          varchar2(   3 )

    , forename      varchar2( 255 )

    , surname       varchar2( 255 )

    , dob           date

    , nationality   varchar2( 255 )

    , url           varchar2( 255 )

    )

    no drop until 0 days idle

    no delete until 16 days after insert

    /

    Listing 20-2

    Create immutable table dutchdrivers

    ```


    Now that you have created you can put data in it.


    ```sql

    insert into dutchdrivers

    select *

    from f1data.drivers drv

    where drv.nationality = ''Dutch''

    /

    ```


    So far, it is all the same as a normal table. This is not possible when you add
    a record that you want to change or remove later.


    ```sql

    insert into dutchdrivers

    select *

    from f1data.drivers drv

    where drv.drivernumber = 44

    /

    ```


    If you try to update the record, you’ll hit an error.


    ```sql

    update dutchdrivers ddv

    set ddv.nationality = ''Dutch''

    where ddv.drivernumber = 44

    /

    ORA-05715: operation not allowed on the blockchain or immutable table

    ```


    If you try to delete the record, you’ll hit the same error.


    ```sql

    delete from dutchdrivers ddv

    where ddv.drivernumber = ''44''

    /

    ORA-05715: operation not allowed on the blockchain or immutable table

    ```


    When you want to remove the record, you have to wait for the number of days specified
    in the `no delete until` if you specified this.


    This feature was introduced in Oracle Database 21c but backported to Oracle Database
    19.11.


    This feature can be very useful when storing data that should not be tampered
    with, like contract data. If you want even more security than just making sure
    the records cannot be changed, you can use the blockchain table, where the records
    are chained together using a hashing algorithm.


    ## Blockchain Table


    Blockchain tables are append-only tables in which only insert operations are allowed.
    Deleting rows is either prohibited or restricted based on time. Special sequencing
    and chaining algorithms make rows in a blockchain table tamper-resistant. Users
    can verify that rows have not been tampered with. A hash value part of the row
    metadata is used to chain and validate rows.


    The syntax for the blockchain table is almost identical to the immutable table.
    A blockchain table must contain one more clause to the table definition.


    ```sql

    hashing using sha2_512 version v1

    ```


    The hashing algorithm is calculated based on the existing data when records are
    added to the table, which increases the load time compared to an immutable table.


    Listing [20-3](#536316_1_En_20_Chapter.xhtml#PC48) is a blockchain table created,
    similar to the immutable table created before.


    ```sql

    create blockchain table dutchdrivers

    ( driverid      number  (  11 ) not null

    , driverref     varchar2( 255 )

    , driver_number number  (  11 )

    , code          varchar2(   3 )

    , forename      varchar2( 255 )

    , surname       varchar2( 255 )

    , dob           date

    , nationality   varchar2( 255 )

    , url           varchar2( 255 )

    )

    no drop until 0 days idle

    no delete until 16 days after insert

    hashing using sha2_512 version v1

    /

    Listing 20-3

    Create blockchain table dutchdrivers

    ```


    This table has the same restrictions as an immutable table, so you cannot modify
    or remove the rows after inserting and committing data. The delete can be done
    if the retention time has passed, however.


    This feature was introduced in Oracle Database 21c but backported to Oracle Database
    19.10.


    ## Summary


    As you can see, Oracle Database is much more than just a “bag of tables.” Some
    tables, like heap tables, are useful in an OLTP environment. In contrast, others,
    like index-organized tables, are very useful as lookup tables in OLTP and data
    warehouse environments. The B-tree index is more useful in an OLTP environment,
    but a bitmap index is more useful in a data warehouse environment. Sometimes you
    may want to unload data from memory to the database to use the full power of SQL
    but go easy on the available memory, where temporary tables can come in handy.
    If you want tables that cannot be tampered with, you can use immutable or blockchain
    tables.


    Oracle Database provides you with all the options, and now you can understand
    why one type would be a better fit.'
