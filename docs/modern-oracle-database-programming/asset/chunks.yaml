    \n## 总结\n\n自 Oracle 数据库 21c 起，您在循环中拥有了广泛的可用性。迭代器不必是整数，也可以是非整数或字符串值。迭代器现在可以声明为可变的，因此您可以在循环内部更改其值。迭代控制可以被步进和堆叠。\n\
    \n使用 `qualified expressions` 使您的代码清晰且更具自描述性。\n\n# 第二部分 多重技术与语言\n\n# 8. 多态表函数与\
    \ SQL 宏\n\nOracle 数据库开箱即用地提供了大量功能。大多数常见的函数和过程都触手可及。但是，当您需要一些 Oracle 未提供的功能时，它们能提供什么呢？假设您只有签到和签退时间，需要计算总工作时间。一个能够对开始时间和结束时间之间的间隔差进行求和的聚合函数将非常有用。遗憾的是，Oracle\
    \ 数据库目前尚未提供这样的聚合函数。（您永远不知道他们什么时候会实现这样的功能。）您可以创建一个“普通”的 PL/SQL 函数，但那样您总是会承受性能损失。\n\
    \n如果您正在从其他数据库（如 SQL Server）迁移，那里有一个用于确定当前日期和时间的函数（`SYSDATE`），而您不想更改应用程序使用的所有代码，该怎么办？\n\
    \n在之前的 Oracle 数据库版本中，您可以利用 Oracle 数据盒式接口（`ODCI`），但正确实现它并非易事。最难实现的事情之一是使您的 `ODCI`\
    \ 函数能够与并行查询处理正确协作。\n\n随着 *多态表函数*（`PTF`）的引入，实现您自己的 SQL 函数变得简单多了，尽管并非微不足道。Oracle\
    \ 负责底层的“管道铺设”，以确保 `PTF` 与并行查询良好协作。\n\nSQL 宏也可以用于此领域，使一些 `PTF` 的实现变得稍微容易一些。使用 SQL\
    \ 宏，您可以创建可重用的 SQL 片段。一次实现，即可在您的 SQL 语句中使用，并且不会带来常规 PL/SQL 函数调用所导致的性能影响。\n\n##\
    \ 多态表函数\n\nSQL:2016 标准对 *多态表函数* 的描述如下。\n\n> *... 可以在 FROM 子句中调用的用户定义函数。它们可以处理在定义时行类型未声明的表，并生成一个在定义时行类型可能已声明也可能未声明的结果表。多态表函数允许应用程序开发者利用长期定义的动态\
    \ SQL 功能来创建强大而复杂的自定义函数。*\n\nOracle 数据库 18c 引入了这一概念。根据输入参数的不同，返回类型在运行时定义。这与传统的表函数不同，传统表函数的返回类型在编译时是固定的。\n\
    \n一个多态表函数由两部分组成。\n\n*   一个包含 `PTF` 实现所有代码的 PL/SQL 包。\n*   一个独立的或打包的函数，它作为接口命名\
    \ `PTF` 及其关联的实现包。\n\nPL/SQL 包包含实现 `PTF` 的程序。这些程序接受接口函数中提供的参数的 PL/SQL 版本。"
- fmt: '### Function


    The wrapper function performs the interface from the SQL statement to the PTF.
    The `table` pseudo-operator is used to translate the table object to the `dbms_tf.table_t`
    PL/SQL type. A new pseudo-operator, `columns`, is introduced to facilitate the
    translation of the columns to the `dbms_tf.columns_t` type. The other parameters,
    if any, use their SQL counterpart. The wrapper function does not have a function
    body. It is just the interface to the PTF package.


    The function specifies the following things.


    *   The PTF name

    *   Exactly one argument of type `table` and any number of `non-table` arguments

    *   The return type is `table`

    *   The type of PTF, either `row` or `table semantics`

    *   The package name where the PTF is implemented


    ```

    create [ or replace ] [ editionable | noneditionable ]

    function [ schema. ] function_name

    [ ( parameter_declaration [, parameter_declaration]... ) ]

    return table

    pipelined ( row | table ) polymorphic

    using [ schema. ] implementation_package

    ```


    If the PTF is defined as `row semantics`, the input is a single row. All the information
    the PTF needs is available in this single row. The PTF doesn’t know or need to
    know anything about other rows. The input is a set of rows if the PTF is defined
    as `table semantics`. The PTF can use the information from multiple rows, for
    example, to build your own aggregate function. When you have a `table semantics`
    PTF, you can optionally extend the table argument with a `partition by` clause
    and/or an `order by` clause.


    ### Package


    The package contains all the code necessary to implement the PTF. It must contain
    a `describe` function but can also contain `open`, `fetch_rows`, and `close` procedures.
    The `describe` function is mandatory; all other procedures are optional.


    #### describe


    The arguments passed to the `describe` function can be the standard scalar arguments
    that can be passed to a regular table function. But a PTF also accepts a table
    argument. A table argument must be a basic table name, which can be a `with` clause
    query or any schema-level object allowed in a `from` clause (table, view, or table
    function). The `describe` function can also accept a `columns` parameter.


    In the `describe` function, you can tell which input table columns should be read
    (`for_read`) and which columns should be passed through (`pass_through`) to the
    result. If a column has its `for_read` property set to `true`, then its `values`
    are available in the other procedures of the PTF. If it is set to `FALSE`, they
    are not.


    If you want the column to appear in the resulting columns, you must set the `pass_through`
    property to `true`. If this property is set to `FALSE`, the column is not visible
    in the resulting columns.


    Not only can you choose to show or hide existing columns, but you can also create
    completely new columns that only exist in the result set.


    #### open


    The `open` procedure, if present, is invoked once before the `fetch_rows` procedure.
    It can be used to initialize and allocate specific states. It is mostly useful
    when implementing a `table semantics` PTF. Since the execution state is session
    and the cursor private, like a normal package, a `table semantics` PTF can use
    package globals for storing the execution state. The PTF uses the database-provided
    unique execution ID to identify that state. You can use the `get_xid` function
    to get a unique id for this execution state. This ID remains the same for all
    the execution functions of the PTF.


    #### fetch_rows


    The `fetch_rows` procedure is where the real work is done. It produces an output
    rowset that gets sent back to the requesting process. This procedure can be invocated
    multiple times, depending on the data. How often it is invocated is determined
    during query execution. It looks like this procedure is called for every batch
    of 1024 rows, but this does not seem to be documented anywhere.


    #### close


    The `close` procedure is called once at the end of the PTF execution. Use this
    procedure to release resources associated with the PTF execution state. You can
    also reset global settings back to their original values.


    ### Usage


    While developing your PTF, you probably want to use tracing to see what your program
    is doing. You could use `dbms_output.put_line` for this, but the `DBMS_TF` package
    provides an overloaded `trace` procedure. Not only can you write messages similar
    to `dbms_output.put_line`, but it also has overloading to print out the entire
    row set, table information, the complete environment, and more.


    ```

    procedure trace(msg                   varchar2,

    with_id               boolean   default false,

    separator             varchar2  default null,

    prefix                varchar2  default null);

    procedure trace(rowset             in row_set_t);

    procedure trace(env                in env_t);

    procedure trace(columns_new        in columns_new_t);

    procedure trace(cols               in columns_t);

    procedure trace(columns_with_type  in columns_with_type_t);

    procedure trace(tab                in table_t);

    procedure trace(col                in column_metadata_t);

    ```


    This can give a lot of information when developing. You may want to include calls
    to the trace functions using conditional compilation (see Chapter [6](#536316_1_En_6_Chapter.xhtml)),
    so you can turn this on and off at compile time without changing the source code.


    ### Use Cases


    A common requirement is to split strings into smaller bits, depending on a delimiter.
    Since there is no built-in functionality in SQL to do this, it is where a PTF
    can fill the hiatus.'
