- fmt: '# Private Temporary Table


    Oracle Database 18c introduced the `private temporary table`. It is a temporary
    table that is private to the current session. Private temporary tables must use
    the prefix: `ora$ptt_`. The following statement creates a private temporary table.


    ```sql

    create private temporary table ora$ptt_drivers

