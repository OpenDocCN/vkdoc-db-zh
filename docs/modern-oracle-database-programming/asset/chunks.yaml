- fmt: "## Preparation\n\nSome steps must be taken to take advantage of EBR. Every\
    \ Oracle Database version since 11gR2 has a default edition called `ORA$BASE`.\
    \ This edition is there even if there is no intention to use EBR.\n\nThe first\
    \ step is to enable EBR at the schema level. This one-time action is irreversible.\
    \ Even though it is irreversible, it doesn’t mean you must use EBR.\n\nThe schema\
    \ is edition-enabled using the following statement.\n\n```sql\nalter user book\
    \ enable editions\n/\n```\n\nIn versions before Oracle Database 12.1, the complete\
    \ schema would be edition-enabled. Since then, it has been possible to mark certain\
    \ objects as non-editionable, which normally would be editionable.\n\nThe following\
    \ statement can be used to determine the current session.\n\n```sql\nselect sys_context('userenv'\n\
    ,'current_edition_name'\n) \"Current_Edition\"\nfrom   dual\n/\nCurrent_Edition\n\
    \nORA$BASE\n```\n\nTip\n\nWhen using SQLcl, the `show edition` command can be\
    \ used to reveal the current edition, which is a lot more convenient than inspecting\
    \ the current edition name in the `userenv` application context.\n\n### Privileges\n\
    \nIn the previous section, the user “book” was edition-enabled, allowing additional\
    \ editions to be created. There is a hierarchical relation between editions where\
    \ an edition always has *one* parent. The only exception is `ORA$BASE`, or when\
    \ this edition is eventually removed, the next edition in the hierarchy. This\
    \ top-level edition is called the *root edition*.\n\nEnabling the schema to use\
    \ editions doesn’t mean the user can create additional editions. To do this, the\
    \ `create any edition` system privilege is needed. Besides this privilege, the\
    \ user also needs `use` privileges on the root edition.\n\n```sql\ngrant create\
    \ any edition to book\n/\n```\n\nWhen the user book creates an edition, the `use`\
    \ privilege is automatically granted. This privilege can also be explicitly granted\
    \ to other users.\n\n```sql\ngrant use on edition  to \n/\n```\n\nRemoving a root\
    \ or leaf edition can only be done when the `drop any edition` system privilege\
    \ is granted.\n\n```sql\ngrant drop any edition to book\n/\n```\n\nWhile connected\
    \ to the database, it is also possible to change the edition by using an `alter\
    \ session` statement.\n\n```sql\nalter session set edition = \n/\n```\n\nThere\
    \ cannot be an open transaction to change from one edition to another. Attempting\
    \ to change the edition when the transaction isn’t closed by a commit or rollback\
    \ raises an error.\n\n```sql\nalter session set edition = r2\n/\nERROR:\nORA-38814:\
    \ ALTER SESSION SET EDITION must be first statement of transaction\n```\n\n##\
    \ Several Levels of Complexity\n\nThere are several levels of complexity when\
    \ using EBR. The simplest EBR is where *only* PL/SQL objects are changed between\
    \ editions.\n\nThe next level is where table structures are also changed between\
    \ editions, but there is *no need* to keep multiple editions available at the\
    \ same time. The users all move to the post-upgraded edition at a specified time\
    \ in the future.\n\nThe most complex level is where there are table structure\
    \ changes, and the users need access to multiple editions simultaneously. This\
    \ involves keeping data in sync between multiple editions.\n\nEach step involved\
    \ is discussed in the next few sections, beginning with the simplest form: changing\
    \ only PL/SQL objects between editions.\n\n### Only Changing PL/SQL Objects\n\n\
    The simplest form of EBR is to only change PL/SQL objects. The data model stays\
    \ the same. In the following example, a procedure is created in the `ORA$BASE`\
    \ edition to display the full name of a driver by supplying the first and last\
    \ name as arguments.\n\n```sql\ncreate or replace\nprocedure format_fullname (p_firstname\
    \ in varchar2\n,p_lastname in varchar2)\nis\nbegin\ndbms_output.put_line (p_firstname\n\
    ||' '||\np_lastname\n);\nend format_fullname;\n/\n```\n\nWhen server output is\
    \ enabled, this simple procedure shows the first and last names concatenated together,\
    \ separated by a space.\n\nWith the introduction of EBR, the data dictionary was\
    \ extended with a number of views that also reflect edition information. These\
    \ dictionary views have `_ae`, short for *all editions*. One of these views is\
    \ `user_objects_ae`. This data dictionary view shows that the create procedure\
    \ `format_fullname` exists in edition `ORA$BASE`.\n\n```sql\nselect object_name\n\
    , object_type\n, edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
    /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
    \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\n```\n\nNote\n\nWhen\
    \ the preceding query reveals the `edition_name` column to be empty, the user\
    \ has not been edition-enabled.\n\nThe next step is to create an additional edition\
    \ called R1.\n\n```sql\ncreate edition r1 as child of ora$base\n/\n```\n\nAlthough\
    \ not strictly necessary to specify which edition is the parent edition, being\
    \ explicit never hurts.\n\nCreating the edition does not imply that the current\
    \ session has switched over to it. To change the current edition to the newly\
    \ created one, an `alter session` command needs to be issued.\n\n```sql\nalter\
    \ session set edition = r1\n/\nselect sys_context('userenv'\n,'current_edition_name'\n\
    ) \"Current_Edition\"\nfrom   dual\n/\nCurrent_Edition\n\nR1\n```\n\nBesides switching\
    \ the edition with an `alter session` statement, it’s also possible to specify\
    \ the edition at connect time.\n\n```sql\nconn /@ edition = r1\n```\n\nExecuting\
    \ the `format_fullname` procedure in the R1 edition shows the following results.\n\
    \n```sql\nbegin\nformat_fullname (p_firstname => 'Mick'\n,p_lastname  => 'Schumacher'\n\
    );\nend;\n/\nMick Schumacher\n```\n\nHow is this possible? The procedure `format_fullname`\
    \ was inherited from the parent edition `ORA$BASE`. All editionable objects are\
    \ inherited from the child edition and can be used the same way as before.\n\n\
    The reason for introducing the new edition was to improve the functionality of\
    \ the `format_fullname` procedure. This can be done by the very familiar method\
    \ of `create or replace`. The replacement of the procedure happens in the *privacy*\
    \ of edition R1 while leaving the original procedure intact and valid. Users connected\
    \ to the `ORA$BASE` edition are unaffected by the new version of the `format_fullname`\
    \ procedure.\n\n```sql\ncreate or replace\nprocedure format_fullname (p_firstname\
    \ in varchar2\n,p_lastname  in varchar2)\nis\nbegin\ndbms_output.put_line (initcap\
    \ (p_lastname)\n||', '||\ninitcap (p_firstname)\n);\nend format_fullname;\n/\n\
    ```\n\nThe procedure `format_fullname` is replaced in the current edition, and\
    \ the `user_objects_ae` data dictionary view shows two procedures with the same\
    \ name but in different editions.\n\n```sql\nselect object_name\n, object_type\n\
    , edition_name\nfrom   user_objects_ae\nwhere  object_name = 'FORMAT_FULLNAME'\n\
    /\nOBJECT_NAME     OBJECT_TYPE     EDITION_NAME\n--------------- ---------------\
    \ ---------------\nFORMAT_FULLNAME PROCEDURE       ORA$BASE\nFORMAT_FULLNAME PROCEDURE\
    \       R1\n```\n\nUsers of the new edition get the following results when calling\
    \ the procedure.\n\n```sql\nbegin\nformat_fullname (p_firstname => 'Mick'\n,p_lastname\
    \  => 'Schumacher'\n);\nend;\n/\nSchumacher, Mick\n```\n\nThere is also the possibility\
    \ that a PL/SQL object is no longer needed in the post-upgraded edition. The PL/SQL\
    \ object can be removed by issuing a `drop` statement. Keep in mind that dropping\
    \ the PL/SQL object removes it only from the current edition. The procedure with\
    \ the same name still exists in `ORA$BASE`."
