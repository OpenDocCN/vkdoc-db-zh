    \ [of column] on table\ncompound trigger\n    -- declarative section (optional)\n\
    \    -- variables declared here have firing-statement duration.\n    -- executed\
    \ before dml statement\n    before statement is\n    begin\n        null;\n  \
    \  end before statement;\n    -- executed before each row change - :new, :old\
    \ are available\n    before each row is\n    begin\n        null;\n    end before\
    \ each row;\n    -- executed after each row change - :new, :old are available\n\
    \    after each row is\n    begin\n        null;\n    end after each row;\n  \
    \  -- executed after dml statement\n    after statement is\n    begin\n      \
    \  null;\n    end after statement;\nend compound_trigger_name;\n/\n```\n\nTwo\
    \ common use cases exist where a compound trigger outshines the traditional triggers\
    \ and packages combination. The first is custom journaling on tables, and the\
    \ second is a workaround for a mutating table problem. These two use cases are\
    \ described in more detail in the next sections."
  raw: '#### values of


    If you want to use your collection as a set of pointers in another collection,
    you can use the `values of` clause.


    After fetching all the rows from the table into our collection, fill another collection
    (`l_drivers_with_number`) with the records that have a `driver_number` available.
    The index of this collection is the `driver_number`. Also, save the `driver_number`
    into a different collection (`l_driver_numbers`). These are our pointers into
    the `l_drivers_with_number` collection.


    ```

    for indx in l_drivers.first .. l_drivers.last

    loop

    if l_drivers( indx ).driver_number is not null

    then

    l_drivers_with_number(l_drivers( indx ).driver_number) :=

    l_drivers( indx );

    l_driver_numbers( l_driver_numbers.count + 1 ) :=

    l_drivers( indx ).driver_number;

    end if;

    end loop;

    ```


    Using these two collections, you can use the `values of` clause to insert the
    rows into the database. The values of the `l_driver_numbers` collection are the
    indices of the `l_drivers_with_number` collection.


    ```

    forall indx in values of l_driver_numbers

    insert into drivers_with_number

    values l_drivers_with_number( indx );

    ```


    Listing [1-6](#536316_1_En_1_Chapter.xhtml#PC17) is the complete script.


    ```

    declare

    cursor c_drivers

    is

    select drv.*

    from   f1data.drivers drv

    ;

    type drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    type driver_numbers_tt is table of pls_integer

    index by pls_integer;

    l_drivers             drivers_tt;

    l_drivers_with_number drivers_tt;

    l_driver_numbers      driver_numbers_tt;

    begin

    open c_drivers;

    fetch c_drivers

    bulk  collect into l_drivers;

    close c_drivers;

    if l_drivers.count > 0

    then

    for indx in l_drivers.first .. l_drivers.last

    loop

    if l_drivers( indx ).driver_number is not null

    then

    l_drivers_with_number(l_drivers( indx ).driver_number) :=

    l_drivers( indx );

    l_driver_numbers( l_driver_numbers.count + 1 ) :=

    l_drivers( indx ).driver_number;

    end if;

    end loop;

    end if;

    if l_driver_numbers.count > 0

    then

    forall indx in values of l_driver_numbers

    insert into drivers_with_number

    values l_drivers_with_number( indx );

    end if;

    end;

    /

    select dwn.driverid      as id

    , dwn.driverref     as ref

    , dwn.driver_number as num

