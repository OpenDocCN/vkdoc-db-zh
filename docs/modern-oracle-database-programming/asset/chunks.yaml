    # 8. SQL 宏


    #### 字符串函数


    MySQL 数据库提供了 `left` 和 `right` 字符串操作函数。这些函数在 Oracle SQL 中并不直接可用。但你可以使用 `substr`
    功能来实现它们，并将其封装在 SQL 宏中，这样就能将你的 MySQL 查询直接移植到 Oracle 数据库（参见表 8-5）。


    表 8-5


    MySQL 字符串函数


    | 函数 | 结果 |

    | --- | --- |

    | left (''Oracle Database'', 6) | ''Oracle'' |

    | left (''Oracle Database'', 0) | '''' |

    | left (''Oracle Database'', -6) | '''' |

    | right (''Oracle Database'', 8) | ''Database'' |

    | right (''Oracle Database'', 0) | '''' |

    | right (''Oracle Database'', -8) | '''' |


    `left` 函数很容易实现。它是一个子字符串，从位置 1 开始，然后获取指定数量的字符。


    ```sql

    create or replace function left

    (

    string_in in varchar2

    , left_in   in number

    ) return varchar2 sql_macro( scalar ) is

    l_sql varchar2( 64 );

    begin

    l_sql := ''substr( string_in, 1, left_in )'';

    return l_sql;

    end left;

    /

    ```


    代码清单 8-21

    `left` SQL 宏


    `right` 函数稍微复杂一些。你必须自己处理好边界情况。如果请求的字符数为 0 或负数，函数应返回 NULL 值。如果请求的字符数大于可用字符数，则返回整个字符串。否则，从右侧开始返回指定数量的字符。


    ```sql

    create or replace function right

    (

    string_in in varchar2

    , right_in  in number

    ) return varchar2 sql_macro( scalar ) is

    l_sql varchar2( 32767 );

    begin

    l_sql := ''

    case

    when right_in <= 0 then null

    when right_in > length( string_in ) then  string_in

    else substr( string_in, -right_in )

    end

    '';

    return l_sql;

    end right;

    /

    ```


    代码清单 8-22

    Right SQL 宏


    ### expand_sql_text


    `dbms_utility.expand_sql_text` 可以让你检查实际执行的是哪条语句。假设你有一个简单的 SQL 宏。


    ```sql

    create or replace

    function total_laptime( raceid_in   in number

    , driverid_in in number )

    return varchar2 sql_macro( table ) is

    begin

    return q''[

    select ltm.raceid              as raceid

    , ltm.driverid            as driverid

    , sum( ltm.milliseconds ) as totalmilliseconds

    from   f1data.laptimes ltm

    where  ltm.raceid   = raceid_in

    and    ltm.driverid = driverid_in

    group  by ltm.raceid

    , ltm.driverid

    order  by ltm.raceid

    , ltm.driverid

    ]'';

    end;

    /

    ```


    代码清单 8-23

    `total_laptime` SQL 宏


    以下是你执行的语句。


    ```sql

    select * from total_laptime(1093, 830)

    ```


    如果你将这个语句作为参数传递给 `dbms_utility.expand_sql_text` 过程，如下所示。


    ```sql

    declare

    output_text clob;

    begin

    dbms_utility.expand_sql_text(

    input_sql_text  => q''[select * from total_laptime(1093, 830)

    ]''

    , output_sql_text => output_text

    );

    dbms_output.put_line( output_text );

    end;

    /

    ```


    你会得到实际执行的语句（为了可读性进行了格式化）。


    ```sql

    select "A1"."RACEID"            "RACEID"

    , "A1"."DRIVERID"          "DRIVERID"

    , "A1"."TOTALMILLISECONDS" "TOTALMILLISECONDS"

    from   (select "A2"."RACEID"            "RACEID"

    , "A2"."DRIVERID"          "DRIVERID"

    , "A2"."TOTALMILLISECONDS" "TOTALMILLISECONDS"

    from   (select "A3"."RACEID" "RACEID"

    , "A3"."DRIVERID" "DRIVERID"

    , sum("A3"."MILLISECONDS")

    "TOTALMILLISECONDS"

    from   "F1DATA"."LAPTIMES" "A3"

    where  "A3"."RACEID"   = 1093

    and    "A3"."DRIVERID" = 830

    group  by "A3"."RACEID"

    , "A3"."DRIVERID"

    order  by "A3"."RACEID"

    , "A3"."DRIVERID") "A2") "A1"

    ```


    ## 本章小结


    本章讨论了多态表函数以及如何构建和使用它们。你还了解了 SQL 宏，它有时能提供比 PTF 更简单的解决方案。那么，为什么你还应该学习多态表函数呢？嗯，有些问题无法用纯
    SQL 解决，但可以使用 PL/SQL 来解决。SQL 宏总是返回一段 SQL 代码片段。PL/SQL 被用来构建这个代码片段，但其使用方式是纯 SQL 的。PTF
    允许你访问查询中的实际值，因此你可以操作从查询中输出的内容。你可以使用 SQL 宏在执行前操作语句，但这仍然是在创建纯 SQL。


    # 9. 子查询因式分解，WITH 子句详解


    子查询因式分解也称为公共表表达式（CTE）。通常被称为 `with` 子句。CTE 是一个命名的临时结果集，它存在于单条语句的作用域内，并且可以在该语句的后面部分被引用，可能被多次引用。


    你可以在查询的 `from` 子句中指定一个子查询，这称为内联视图；但如果你想多次连接同一个查询，你就必须多次重复该子查询。而且如果那个内联视图发生了变化，你就不得不在多处进行相同的更改。使用子查询因式分解后，情况就不同了。你只需定义一次子查询，然后通过名称引用它，这遵循了“一次定义，多次重用”的模式。

    '
- fmt: '## Monaco Podium


    在数据库中，包含自1950年以来在摩纳哥进行的所有比赛结果。目标是检索摩纳哥赛道的前三名，并将它们以不同列的形式漂亮地展示在领奖台上。这个例子是人为设计的，可以被简化，但被用来演示子查询因子化子句。子查询因子化几乎让编写SQL查询有了过程化的感觉。


    第一步是获取摩纳哥的前三名车手。这可以通过连接`CIRCUITS`、`RACES`和`RESULTS`表来完成。以下查询展示了一个名为`monaco`的子查询。这个命名子查询在`WITH`子句之后的主查询中被使用。


    ```sql

    with monaco as (

    select rsl.driverid

    , rsl.position

    , rcs.year

    from   f1data.circuits cct

    join   f1data.races rcs

    on   cct.circuitid = rcs.circuitid

    join   f1data.results rsl

    on   rcs.raceid = rsl.raceid

    where  cct.circuitref = ''monaco''

    and    rsl.position >

    )

    ```


    这给出了一个车手ID、他们的名次以及他们登上领奖台的年份的列表。由于`driverid`没有意义，添加车手的名字会更有帮助。在`monaco`子查询的最后一个括号之后，添加了以下命名子查询以提供格式良好的车手姓名。


    ```sql

    , motorists as (

    select drv.driverid

    , drv.forename

    || '' '' ||

    drv.surname as driver

    from   f1data.drivers drv

    )

    ```


    现在可以修改主查询以包含车手姓名。


    ```sql

    select year

    , position

    , driver

    from   monaco mon

    join   motorists mtt

    on   mon.driverid = mtt.driverid

    /

    YEAR   POSITION DRIVER

    ------ ---------- -------------------------

    1950          3 Louis Chiron

    1950          2 Alberto Ascari

    1950          1 Juan Fangio

    1955          1 Maurice Trintignant

    1955          3 Cesare Perdisa

    1955          3 Jean Behra

    1955          2 Eugenio Castellotti

    1956          2 Juan Fangio

    1956          3 Jean Behra

    1956          2 Peter Collins

    1956          1 Stirling Moss

    1957          2 Tony Brooks

    1957          1 Juan Fangio

    1957          3 Masten Gregory

    >

    ```


    结果集包括年份、领奖台名次和车手全名。这个查询被添加到子查询因子化子句中，并命名为`monaco_podiums`。


    ```sql

    monaco_podiums as (

    select mon.year

    , mon.position

    , mtt.driver

    from   monaco mon

    join   motorists mtt

    on   mon.driverid = mtt.driverid

    )

    ```


    `PIVOT`子句可以将第一、第二和第三名的领奖台位置显示在不同的列中。这完成了任务。


    ```sql

    select year

    , first

    , second

    , third

    from monaco_podiums

    pivot (

    min(driver)

    for position in ( 1 as first

    , 2 as second

    , 3 as third

    )

    )

    /

    ```


    以下是包含所有子查询因子化的完整查询。


    ```sql

    with monaco as (

    select rsl.driverid

    , rsl.position

    , rcs.year

    from   f1data.circuits cct

    join   f1data.races rcs

    on   cct.circuitid = rcs.circuitid

    join   f1data.results rsl

    on   rcs.raceid = rsl.raceid

    where  cct.circuitref = ''monaco''

    and    rsl.position >

    Listing 9-1

    Retrieve Monaco top 3

    ```


    > 注意

    >

    > 这些结果并不反映现实。1955年，有两位第三名获胜者：Jean Behra和Cesare Perdisa。由于名次在一年内不是唯一的，`MIN`函数按名字的字母顺序解决此问题。1956年也是如此，当时有两位第二名获胜者：Peter
    Collins和Juan Fangio。


    ## 在WITH子句中使用函数


    从Oracle Database 12c开始，可以在`WITH`子句中构建PL/SQL函数。从SQL语句调用PL/SQL函数由于上下文切换而代价高昂，应尽可能避免。当一个函数被添加到子查询因子化子句时，该函数会在SQL引擎中编译。这不完全正确，但可以这样认为，从而消除了昂贵的上下文切换。


    在下面的例子中，在`WITH`子句中构建了两个函数。一个函数用于将车手和制造商的名字格式化为单个字符串，另一个用于将前三名车手格式化为单个列。


    第一个函数名为`fullname`，接受三个参数。


    ```sql

    function fullname( forename_in    in varchar2

    , surname_in     in varchar2

    , constructor_in in varchar2 )

    return varchar2

    is

    begin

    return forename_in

    || '' '' || surname_in

    || '' ('' || constructor_in || '')'';

    end fullname;

    ```


    第二个函数名为`formattop3`，也接受三个参数。


    ```sql

    function formattop3( pos1 in varchar2

    , pos2 in varchar2

    , pos3 in varchar2 )

    return varchar2

    is

    begin

    return ''1) '' || pos1 || chr(10)

    || ''2) '' || pos2 || chr(10)

    || ''3) '' || pos3 || chr(10);

    end formattop3;

    ```


    函数`must`在`WITH`子句的开头声明，也就是在任何因子化子句之前。与子查询不同，函数之间`not`用逗号分隔。第一个命名查询之前也没有逗号。另一个特殊之处在于，在SQL语句中使用的函数`can''t`使用命名表示法来指定哪个参数被赋予哪个值。


    由于也希望列出制造商，因此清单[9-1](#536316_1_En_9_Chapter.xhtml#PC6)中的命名子查询应替换为以下内容。


    ```sql

    , motorists as (

    select drv.driverid

    , fullname ( drv.forename

    , drv.surname

    , ctr.name

    ) as driver

    from   f1data.drivers      drv

    join   f1data.results      rsl

    on   drv.driverid = rsl.driverid

    join   f1data.constructors ctr

    on   rsl.constructorid = ctr.constructorid

    )

    ```


    这通过调用`fullname`函数，按要求格式化了车手姓名和制造商。


    结束了清单[9-1](#536316_1_En_9_Chapter.xhtml#PC6)的透视查询被包装到名为`monaco_pivot`的子查询中。该查询在最终查询中使用，如清单[9-2](#536316_1_En_9_Chapter.xhtml#PC10)所示。（仅显示了截至1957年的结果。）'
  raw: '## Monaco Podium


    In the database are the results for all races driven in Monaco dating back to
    1950\. The objective is to retrieve the top three for the Monaco circuit and have
    them nicely laid out in a different column for each podium place. The example
    is contrived and can be simplified, but it is used to demonstrate the subquery
    factoring clause. Subquery factoring almost gives a procedural feel to writing
    SQL queries.


    The first step is to get the top three drivers for Monaco. This can be accomplished
    by joining the `CIRCUITS`, `RACES`, and `RESULTS` tables. The following query
    shows a subquery named `monaco`. This named subquery is used in the main query
    after the `with` clause.


    ```

    with monaco as (

    select rsl.driverid

    , rsl.position

    , rcs.year

    from   f1data.circuits cct

    join   f1data.races rcs

    on   cct.circuitid = rcs.circuitid

    join   f1data.results rsl

    on   rcs.raceid = rsl.raceid

    where  cct.circuitref = ''monaco''

    and    rsl.position >

    ```


    This gives a list of driver IDs, their position, and the year they were on the
    podium. Since `driverid` is meaningless, adding the driver’s name would be more
    helpful. After the last bracket of the `monaco` subquery, the following named
    subquery is added to provide a nicely formatted driver’s name.


    ```

    , motorists as (

    select drv.driverid

    , drv.forename

    || '' '' ||

    drv.surname as driver

    from   f1data.drivers drv

    )

    ```


    Now the main query can be changed to include the driver’s name.


    ```

    select year

    , position

    , driver

    from   monaco mon

    join   motorists mtt

    on   mon.driverid = mtt.driverid

    /

    YEAR   POSITION DRIVER

    ------ ---------- -------------------------

    1950          3 Louis Chiron

    1950          2 Alberto Ascari

    1950          1 Juan Fangio

    1955          1 Maurice Trintignant

    1955          3 Cesare Perdisa

    1955          3 Jean Behra

    1955          2 Eugenio Castellotti

    1956          2 Juan Fangio

    1956          3 Jean Behra

    1956          2 Peter Collins

    1956          1 Stirling Moss

    1957          2 Tony Brooks

    1957          1 Juan Fangio

    1957          3 Masten Gregory

    >

    ```


    The result set includes the year, the podium position, and the driver’s full name.
    This query is added to the subquery factoring clause and named `monaco_podiums`.


    ```

    monaco_podiums as (

    select mon.year

    , mon.position

    , mtt.driver

    from   monaco mon

    join   motorists mtt

    on   mon.driverid = mtt.driverid

    )

    ```


    The `pivot` clause can display the first, second, and third podium places in separate
    columns. This completes the task.


    ```

    select year

    , first

    , second

    , third

    from monaco_podiums

    pivot (

    min(driver)

    for position in ( 1 as first

    , 2 as second

    , 3 as third

    )

    )

    /

    ```


    The following is the complete query with all the subquery factoring in place.


    ```

    with monaco as (

    select rsl.driverid

    , rsl.position

    , rcs.year

    from   f1data.circuits cct

    join   f1data.races rcs

    on   cct.circuitid = rcs.circuitid

    join   f1data.results rsl

    on   rcs.raceid = rsl.raceid

    where  cct.circuitref = ''monaco''

    and    rsl.position >

    Listing 9-1

    Retrieve Monaco top 3

    ```


    Note


    These results don’t reflect reality. In 1955, there were two third-place winners:
    Jean Behra and Cesare Perdisa. Since the position is not unique in a year, the
    MIN function resolves this alphabetically by first name. The same is true for
    1956 when there were two second-place winners: Peter Collins and Juan Fangio.


    ## Functions in the WITH clause


    Starting with Oracle Database 12c, it is possible to build PL/SQL functions in
    the `with` clause. Calling a PL/SQL function from a SQL statement is expensive
    due to context switches and should be avoided when possible. When a function is
    added to the subquery factoring clause, the function is compiled in the SQL engine.
    This is not completely true, but it can be considered like that, eliminating the
    expensive context switch.


    For the following example, there are two functions built in the `with` clause.
    One function is to format the name of the driver and the constructor into a single
    string, and one is to format the top three drivers into a single column.


    The first function, called `fullname`, takes three arguments.


    ```

    function fullname( forename_in    in varchar2

    , surname_in     in varchar2

    , constructor_in in varchar2 )

    return varchar2

    is

    begin

    return forename_in

    || '' '' || surname_in

    || '' ('' || constructor_in || '')'';

    end fullname;

    ```


    The second function, called `formattop3,` also takes three arguments.


    ```

    function formattop3( pos1 in varchar2

    , pos2 in varchar2

    , pos3 in varchar2 )

    return varchar2

    is

    begin

    return ''1) '' || pos1 || chr(10)

    || ''2) '' || pos2 || chr(10)

    || ''3) '' || pos3 || chr(10);

    end formattop3;

    ```


    The functions *must* be declared at the beginning of the `with` clause, that is,
    before any factored subquery. Unlike subqueries, functions are *not* separated
    by commas. There is also no comma before the first named query. Another peculiarity
    is that functions used in the SQL statements *can’t* use the named notation to
    specify which argument is populated with which value.


    Because there is a desire to also list the constructor, the named subquery from
    Listing [9-1](#536316_1_En_9_Chapter.xhtml#PC6) should be replaced with the following.


    ```

    , motorists as (

    select drv.driverid

    , fullname ( drv.forename

    , drv.surname

    , ctr.name

    ) as driver

    from   f1data.drivers      drv

    join   f1data.results      rsl

    on   drv.driverid = rsl.driverid

    join   f1data.constructors ctr

    on   rsl.constructorid = ctr.constructorid

    )

    ```


    This formats the driver’s name and constructor as requested by calling the `fullname`
    function.


    The pivot query that ended Listing [9-1](#536316_1_En_9_Chapter.xhtml#PC6) is
    wrapped into the subquery named `monaco_pivot`. This query is used in the final
    query, shown in Listing [9-2](#536316_1_En_9_Chapter.xhtml#PC10). (Only the results
    through 1957 are shown.)'
