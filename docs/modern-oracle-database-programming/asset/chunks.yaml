    # 5. 分页与集合操作


    使用 Oracle 数据库时，处理大型数据集相当常见。但并非所有数据都应该展示给数据库应用程序的用户。通常，仅前 50 条记录就足以供用户交互。本章探讨了一个典型的
    Top-N 查询，用于检索前 50 条记录。展示接下来的 50 条记录，或任何偏移量，是分页类查询的示例，这也是本章的重点。


    此外，本章还将探讨不同的集合操作符，用于获取多个数据集之间的差异和共同元素。在这方面，Oracle Database 21c 增加了更多功能，以更好地符合
    ANSI 标准。


    ## Top-N 与分页


    在 Oracle 中，获取较大集合的前几条记录，例如前 5 条，一直是可以实现的，但方法总是有点“笨拙”，而且并非总是像它本应那样直接。


    对于以下示例，使用如下定义创建了一个视图。


    ```sql

    create view all_driverstandings

    as

    select rcs.year

    , rcs.round

    , cct.name

    , drs.position

    , drv.driverid

    , drv.forename ||'' ''||drv.surname as driver

    , drs.points

    , drs.wins

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    join   f1data.races rcs

    on   rcs.raceid = drs.raceid

    join   f1data.circuits cct

    on   cct.circuitid = rcs.circuitid

    /

    ```


    `ALL_DRIVERSTANDINGS` 视图展示了按年份和场次划分的车手排名。该视图显示了超过 33,000 条记录，因为数据可追溯至 20 世纪 50
    年代。


    以下是首次尝试，用于获取 2021 赛季且仅针对两位车手的该视图中的前五行。


    ```sql

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2021

    and    driverid in (830, 844) -- Leclerc, Verstappen

    and    rownum <= 5

    order  by round

    /

    ```


    ```

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1          2 Max Verstappen             18          0

    1          6 Charles Leclerc             8          0

    2          4 Charles Leclerc            20          0

    20          1 Max Verstappen          351.5          9

    20          6 Charles Leclerc           152          0

    ```


    如输出所示，结果集是不正确的。在前五行中，不应该包含第 20 圈的数据。这个查询的问题在于，`rownum` 伪列是在最终的排序操作*之前*确定的。当一行因符合过滤条件而被考虑输出时，`rownum`
    会为其分配一个值，从 1 开始。下一个符合过滤条件的行被分配值 2，依此类推。当 `rownum` 达到 5（在前面的查询中）时，不再选择更多记录。在此步骤之后，结果集才按照
    `order by` 子句指定的按场次排序。可以在执行计划中观察到此行为（仅显示相关部分）。


    ```sql

    select *

    from dbms_xplan.display_cursor(null, null, ''BASIC PREDICATE'')

    /

    ```


    ```

    PLAN_TABLE_OUTPUT


    | Id  | Operation                          | Name            |


    |   0 | SELECT STATEMENT                   |                 |

    |   1 |  SORT ORDER BY                     |                 |

    |*  2 |   COUNT STOPKEY                    |                 |

    >

    Predicate Information (identified by operation id):


    2 - filter(ROWNUM>

    ```


    过滤器在操作 ID 2 中应用（`rownum <= 5`）。结果数据集在步骤 1 中进行排序。


    要正确获取预期的输出，需要将排序后的数据集推入一个内联视图（或子查询因子化子句）中。


    ```sql

    select *

    from   (select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2021

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    )

    where  rownum <= 5

    /

    ```


    ```

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1          2 Max Verstappen             18          0

    1          6 Charles Leclerc             8          0

    2          4 Charles Leclerc            20          0

    2          2 Max Verstappen             43          1

    3          2 Max Verstappen             61          1

    ```


    现在优化器理解了意图，这反映在执行计划中（仅显示相关部分）。


    ```

    |   0 | SELECT STATEMENT                    |

    |*  1 |  COUNT STOPKEY                      |

    |   2 |   VIEW                              |

    |*  3 |    SORT ORDER BY STOPKEY            |

    >

    Predicate Information (identified by operation id):


    1 - filter(ROWNUM>

    ```'
- fmt: '### Row-Limiting Clause


    自 Oracle Database 12c 起，这种 Top-N 查询被极大简化，并提供了额外的功能，例如通过行限制子句实现分页。


    以下查询将获取两位车手在本赛季的前五名成绩。


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first 5 rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    ```


    查询的意图立即变得清晰：获取前五条记录。而“前五条”由查询中的排序子句决定。


    行限制子句可以容纳一个静态的、需要查询的固定行数，也可以是一个绑定变量。以下示例使用 SQLcl 声明了一个名为 `b` 的绑定变量并执行。


    ```

    var b number

    begin

    :b := 5;

    end;

    /

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first :b rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    ```


    如请求所示，前面的查询返回了五行数据，但如果存在并列值怎么办？在这种情况下，你可能会认为查询应该返回六条记录，因为两位车手都参与了前三轮比赛。当排序依据的值不是确定的（本例中是
    `round`），最后一条记录是任意的。行限制子句也可以处理并列值，使用 `rows with ties` 子句代替 `rows only`。


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first 5 rows with ties

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    3          6 Max Verstappen             25          1

    ```


    除了通过行限制子句返回一个固定行数（静态或绑定变量），还可以返回总行数的百分比。以下示例返回百分之六的记录。本例中，总结果集有 38 条记录，百分之六是 2.28
    条记录。


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844)

    order  by round

    fetch  first 6 percent rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    ```


    百分比会向上取整（后台使用了 `ceil` 函数），导致前面的结果显示三条记录。当然，百分比也可以与 `rows with ties` 结合使用。


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844)

    order  by round

    fetch  first 6 percent rows with ties

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    ```'
  raw: '### Row-Limiting Clause


    Since Oracle Database 12c, this top-N query is greatly simplified and offers extra
    functionality like pagination with the row-limiting clause.


    Getting the first five rows for the current season for two drivers would be queried
    as follows.


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first 5 rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    ```


    The intention of the query is immediately clear; get the first five records. What
    determines the “first records” is determined by the sorting clause in the query.


    The row-limiting clause accommodates a static, fixed number of rows that need
    to be queried, and it can also be a bind variable. The following example has been
    executed using SQLcl to declare a bind variable named “b”.


    ```

    var b number

    begin

    :b := 5;

    end;

    /

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first :b rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    ```


    As requested, the preceding query returns five rows, but what if there are tied
    values? In this case, you might argue that the query should return six records
    because both drivers participated in the first three rounds. When the value sorted
    by is not deterministic (round in this case), the last record is arbitrary. The
    row-limiting clause can also provide for tied values, using the `rows with ties`
    clause instead of `rows only`.


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    fetch  first 5 rows with ties

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    3          1 Charles Leclerc            71          2

    3          6 Max Verstappen             25          1

    ```


    Besides a fixed number of rows, static or with a bind variable, that is to be
    returned by the row-limiting clause, it is also possible to return a percentage
    of the total row count to be returned. The following example returns six percent
    of the records. In this case, the total result set is 38 records, and six percent
    is 2.28 records.


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844)

    order  by round

    fetch  first 6 percent rows only

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    ```


    The percentage is rounded up (using the ceil function in the background), resulting
    in three records to be shown in the preceding results. Of course, using percentages
    in combination with `rows with ties` is also possible.


    ```

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2022

    and    driverid in (830, 844)

    order  by round

    fetch  first 6 percent rows with ties

    /

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1         19 Max Verstappen              0          0

    1          1 Charles Leclerc            26          1

    2          1 Charles Leclerc            45          1

    2          3 Max Verstappen             25          1

    ```'
