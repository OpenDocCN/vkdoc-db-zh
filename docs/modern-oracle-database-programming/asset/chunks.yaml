  trans: '## 记录错误


    创建一个表，用于存放所有被分配了永久编号的车手。


    ```

    create table drivers_with_number

    as

    select drv.*

    from   f1data.drivers drv

    where  1=2

    /

    ```


    为确保永久编号的唯一性，需要为该表添加一个唯一性约束。


    ```

    alter table drivers_with_number add constraint un_driver_number

    unique (driver_number)

    /

    ```


    要使用此功能，必须创建一个表来保存有问题的记录。`dbms_errlog` 包提供了一个名为 `create_error_log` 的过程来简化此操作。


    ```

    procedure create_error_log

    ( dml_table_name varchar2

    , err_log_table_name  varchar2 default NULL

    , err_log_table_owner varchar2 default NULL

    , err_log_table_space varchar2 default NULL

    , skip_unsupported    boolean  default FALSE

    );

    ```


    使用此过程时，可以指定所有默认值，如下所示。


    ```

    begin

    dbms_errlog.create_error_log

    (dml_table_name => ''drivers_with_number'');

    end;

    /

    ```


    这将在当前模式中创建一个名为 `ERR$_DRIVERS_WITH_NUMBER` 的表。该表包含五个描述错误的列。


    ```

    desc err$_drivers_with_number

    Name            Type            Nullable Default Comments

    --------------- --------------- -------- ------- --------

    ORA_ERR_NUMBER$ NUMBER          Y

    ORA_ERR_MESG$   VARCHAR2(2000)  Y

    ORA_ERR_ROWID$  UROWID          Y

    ORA_ERR_OPTYP$  VARCHAR2(2)     Y

    ORA_ERR_TAG$    VARCHAR2(2000)  Y

    ```


    并且，对于源表中的每一列，它都会创建一个 `VARCHAR2` 类型的列。如果原始列的类型是 `VARCHAR2`，则新列也是 `VARCHAR2` 类型，但长度为最大字符串大小。其他所有列的类型都是
    `VARCHAR2(4000)`。在 `max_string_size=extended` 的数据库中，您会看到类似下面这样类型为 `VARCHAR2(32767)`
    的列。


    ```

    DRIVERID        VARCHAR2(4000)  Y

    DRIVERREF       VARCHAR2(32767) Y

    DRIVER_NUMBER   VARCHAR2(4000)  Y

    CODE            VARCHAR2(32767) Y

    FORENAME        VARCHAR2(32767) Y

    SURNAME         VARCHAR2(32767) Y

    DOB             VARCHAR2(4000)  Y

    NATIONALITY     VARCHAR2(32767) Y

    URL             VARCHAR2(32767) Y

    ```


    要将此表用作错误日志，必须在 DML 语句中添加 `log errors` 子句。


    - `into` 子句允许您指定错误日志表的名称。默认为当前模式下的 `err$_<tablename>`。

    - `error_tag` 允许您指定一个字符串，用于标识与此语句相关的记录。

    - `reject limit` 允许您在引发异常之前指定希望接受的错误数量。


    ```

    insert into drivers_with_number

    select *

    from   f1data.drivers drv

    where  drv.driver_number is not null

    log errors into err$_drivers_with_number (''with limit unlimited'') reject limit
    unlimited

    /

    ```


    ```

    log errors

    [into [schema_name.]table_name]

    [(''error_tag'')]

    [reject limit integer|unlimited]

    ```


    所有错误都被写入错误日志表。表 1-2 展示了其中一个错误。


    表 1-2


    一条错误记录


    | **ORA_ERR_NUMBER$** | 1 |

    | **ORA_ERR_MESG$** | ORA-00001: unique constraint (BOOK.UN_DRIVER_NUMBER) violated
    |

    | **ORA_ERR_ROWID$** |  |

    | **ORA_ERR_OPTYP$** | I |

    | **ORA_ERR_TAG$** | with limit unlimited |

    | **DRIVERID** | 846 |

    | **DRIVERREF** | Norris |

    | **DRIVER_NUMBER** | 4 |

    | **CODE** | NOR |

    | **FORENAME** | Lando |

    | **SURNAME** | Norris |

    | **DOB** | 13-NOV-99 |

    | **NATIONALITY** | British |

    | **URL** | [`http://en.wikipedia.org/wiki/Lando_Norris`](http://en.wikipedia.org/wiki/Lando_Norris)
    |


    目标表包含未引发错误的记录。所有有问题的记录都被记录在错误日志表中。错误日志表中的数据会被持久化保存，无论您是 `commit` 还是 `rollback`
    该事务。


    > **注意：** `ORA_ERR_ROWID$` 指向原始记录的行 ID；因此，在执行插入操作时该字段为空。当执行更新操作时，它会包含一个值。


    ## 保存异常


    在 PL/SQL 中使用 `forall` 语句执行批量 DML 操作时，有一个类似的选择。在这种情况下，错误不会被记录到表中，而是记录到内存中的一个集合里。


    Oracle 数据库会引发一个特殊的异常，您可以捕获并处理它。


    ```

    failure_in_forall exception;

    pragma exception_init( failure_in_forall, -24381 );

    ```


    所有异常都被保存到一个伪集合中：`sql%bulk_exceptions`。此集合中包含以下可用属性。


    - `error_code`: 保存相应的错误代码。

    - `error_index`: 保存当前 `forall` 语句的迭代编号。

    - `count`: 保存异常的总数量。


    ```

    declare

    cursor c_drivers is

    select drv.*

    from   f1data.drivers drv

    where  drv.driver_number is not null

    order  by drv.dob;

    type drivers_tt is table of f1data.drivers%rowtype

    index by pls_integer;

    l_drivers drivers_tt;

    failure_in_forall exception;

    pragma exception_init( failure_in_forall, -24381 );

    begin

    open  c_drivers;

    fetch c_drivers

    bulk  collect into l_drivers;

    close c_drivers;

    if l_drivers.count > 0

    then

    begin

    forall indx in l_drivers.first .. l_drivers.last

    save exceptions

    insert

    into drivers_with_number values l_drivers(indx);

    exception

    when failure_in_forall then

    for indx in 1 .. sql%bulk_exceptions.count

    loop

    dbms_output.put_line(  ''Error ''

    || indx

    || '' occurred on index ''

    || sql%bulk_exceptions( indx ).

    error_index

    || ''.''

    );

    dbms_output.put_line(  ''Oracle error is ''

    || sqlerrm( -1 *

    sql%bulk_exceptions( indx ).

    error_code)

    );        end loop;

    end;

    end if;

    end;

    /

    Error 1 occurred on index 25.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 2 occurred on index 31.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 3 occurred on index 32.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 4 occurred on index 36.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 5 occurred on index 39.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 6 occurred on index 47.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 7 occurred on index 50.

    Oracle error is ORA-00001: unique constraint (.) violated

    Error 8 occurred on index 51.

    Oracle error is ORA-00001: unique constraint (.) violated

    PL/SQL procedure successfully completed

    Listing 1-10

    Using forall with save exceptions

    ```


    > **注意：** 错误代码是一个正数，但 Oracle 错误代码是负数，因此必须将代码乘以 -1 才能获得正确的错误消息。


    ## 总结


    本章探讨了如何利用集合和批量操作从数据库检索数据并将其写回数据库表。集合与复合触发器结合用于日志记录，或者用于规避 *变异表* 问题时也非常有用。


    本章还涵盖了针对直接 DML（插入、更新、删除）和批量操作的错误处理。


    # 2. 分析函数与（逆）透视


    数据库应用程序的最终用户经常要求导出 Excel 文件，以便他们能够操作数据来获取做出业务决策所需的信息，这种情况太过常见了。通常，所需的信息可以通过使用
    SQL 以最终用户期望的格式检索到，从而消除了导出后手动操作数据的需要。您对 SQL 的了解越深入，就越有能力满足最终用户的各种需求。本章讨论两种重要的技术：分析函数和透视。


    分析函数是一个需要掌握的重要工具，尽管它已有超过 23 年的历史，但仍然相对不为人知。


    将结果集进行透视是将行转换为列的常见需求，同样地，逆透视则是将列转换为行。'
- fmt: "## Analytic Functions\n\nAnalytic functions were introduced in Oracle Database\
    \ 8.1.6 Enterprise Edition, yet they are still relatively unknown. Analytic functions\
    \ enable access to values from more than one row without the need for a self-join,\
    \ creating aggregate values without a `group by`. Another example where analytic\
    \ functions shine is determining ranking within a group of values.\n\nThe processing\
    \ order of a query with analytic functions happens in three stages. In the first\
    \ stage, the joins, where conditions, `group by`, and `having` clauses are resolved.\
    \ Analytic functions are applied to the result set in the second stage. Finally,\
    \ the `order by` is applied to the complete result set. The processing order is\
    \ relevant because a standard aggregate might suffice. A tell-tale sign is a query\
    \ that combines an analytic function and a distinct operator. This query can probably\
    \ be written with a normal aggregate.\n\nWhere aggregate functions reduce the\
    \ number of rows in the final result set—a `count(*)` only returns one row—analytic\
    \ functions don’t do that. Analytic functions return a value for each row in the\
    \ final result set.\n\n### Building Blocks\n\nThe first step in working with analytic\
    \ functions is to decide which function is needed, the *what*. Many aggregate\
    \ functions have an analytic counterpart, like `count`, `sum`, or `avg`. The following\
    \ example shows the skeleton of the analytic counterpart of the `avg` function.\n\
    \n```\navg () over ()\n```\n\nThe keyword `over` signals that the function is\
    \ indeed an analytic function.\n\nAfter deciding which function to use, the next\
    \ step is determining those parts of the result set to which the function should\
    \ be applied. Rows in the result set are “grouped” together, called *partitions*,\
    \ and the analytic function is applied to these sets.\n\nNote\n\nPartitions in\
    \ the context of analytic functions are not related to table partitioning. Analytic\
    \ partitions are a logical grouping of data.\n\nA partition can be as small as\
    \ a single row or as large as the whole result set. The criteria in the partition\
    \ clause determine how many different groups there are—never more than one per\
    \ record, never less than one per result set. The whole result set is considered\
    \ a single partition when the partition clause is omitted. The result of the function\
    \ of choice is applied to a single partition. It can’t cross partitions. The following\
    \ example shows the skeleton of the analytic function to include the partition\
    \ clause.\n\n```\navg () over (partition by )\n```\n\nWithin a partition, it is\
    \ possible to specify a *window*. The window determines which range of rows in\
    \ the current partition are available to perform the function upon. Analytic functions\
    \ are always performed from the perspective of the current row. Window sizes can\
    \ be based on either a physical number of rows or a logical interval, such as\
    \ a numeric value or time.\n\nCurrently, there are three options to define the\
    \ windowing clause. Oracle Database 21c introduced the groups window.\n\n*   `rows`\
    \ specify the number of rows relative to the current row. This can be either forward\
    \ or backward from the current row.\n*   `range` specifies the range of values\
    \ relative to the current row. The number of rows depends on the value of the\
    \ current row. The sort key must allow for addition or subtraction operations,\
    \ like numeric, date, or interval data types.\n*   `groups` are where the data\
    \ is divided based on the ordered values. Ties are part of the same group. The\
    \ offset specified refers to the preceding or following group.\n\nBecause the\
    \ windowing clause relies on an ordered result set, it is required to include\
    \ an `order by` in the analytic clause. The windowing clause defaults to `range\
    \ unbounded preceding and current row` when an `order by` is present. Listing\
    \ 2-2 is an example of the differences between `rows`, `range`, and `groups`.\n\
    \nThe `DRIVERS`, `RACES`, and `LAPTIMES` tables are used in the examples to demonstrate\
    \ how analytic functions work unless otherwise noted.\n\n### Running Totals\n\n\
    Creating a running total, where the totals are accumulated as the rows progress,\
    \ is trivial with analytic functions. The `laptimes` table records the time (in\
    \ milliseconds) it takes to complete a lap around the circuit. The following example\
    \ filters the data on the first 2022 season Bahrain Grand Prix race for Charles\
    \ Leclerc using only the first ten laps.\n\nThe analytic counterpart of the `sum`\
    \ function is used to create a running total. The `over` keyword signals that\
    \ it is an analytic function. The partition clause is missing in the following\
    \ example, indicating that the complete result set is the partition. There is,\
    \ however, a window that expands with each row because of the `order by` clause\
    \ in the analytic clause. In this case, the implicit window is the default window:\
    \ `range unbounded preceding and current row`, all preceding lap times are added\
    \ to the current row’s value creating a running total, as well as the lap times\
    \ that have the same value as the current row. Even though it *appears* to work\
    \ in this case, it only works because the values of the lap times are unique.\
    \ When there are duplicate values, all preceding lap times are added, as well\
    \ as any following with the same value as the current row. A true running total\
    \ would require the following explicit window: `rows between unbounded preceding\
    \ and current row`.\n\nIn Listing 2-1, the `running_total` column in the result\
    \ set shows the running total time for the first ten laps for Charles Leclerc.\
    \ The third row (lap 3) shows the total time in milliseconds for the first three\
    \ rows (99070 + 97853 + 98272 = 295195).\n\n```\nselect ltm.lap\n, ltm.milliseconds\n\
    , sum (ltm.milliseconds) over (\n    order by ltm.lap\n    rows between unbounded\
    \ preceding\n             and current row\n    ) as running_total\nfrom   f1data.laptimes\
    \ ltm\njoin   f1data.races rcs\n  on   rcs.raceid = ltm.raceid\nwhere  rcs.race_date\
    \ between trunc (sysdate, 'yy') and sysdate\n  and    ltm.driverid = 844 -- Charles\
    \ Leclerc\n  and    rcs.raceid = 1074 -- Bahrain Grand Prix\n  and    ltm.lap\
    \ between 1 and 10\norder  by ltm.lap\n/\nLAP MILLISECONDS RUNNING_TOTAL\n----------\
    \ ------------ -------------\n         1        99070         99070\n        \
    \ 2        97853        196923\n         3        98272        295195\n      \
    \   4        98414        393609\n         5        98471        492080\n    \
    \     6        98712        590792\n         7        98835        689627\n  \
    \       8        98951        788578\n         9        98807        887385\n\
    \        10        99123        986508\nListing 2-1\nRunning total for a single\
    \ driver\n```\n\nTo create a running total per driver, add a partition clause,\
    \ as is done in the following example. The results are filtered on just four drivers\
    \ for the first three laps.\n\n```\nselect ltm.lap\n, drv.forename||' '||drv.surname\
    \ as driver\n, ltm.milliseconds\n, sum (ltm.milliseconds)\n    over (partition\
    \ by ltm.driverid\n          order by ltm.lap) as running_total\nfrom   f1data.laptimes\
    \ ltm\njoin   f1data.races rcs\n  on   rcs.raceid = ltm.raceid\njoin   f1data.drivers\
    \ drv\n  on   drv.driverid = ltm.driverid\nwhere  rcs.race_date between trunc\
    \ (sysdate, 'yy') and sysdate\n  and    rcs.raceid = 1074 -- Bahrain Grand Prix\n\
    \  and    ltm.lap between 1 and 3\n  and    ltm.driverid in (1, 815, 830, 844)\n\
    order  by ltm.lap\n        ,ltm.milliseconds\n        ,ltm.driverid\n/\nLAP DRIVER\
    \          MILLISECONDS RUNNING_TOTAL\n---------- --------------- ------------\
    \ -------------\n         1 Charles Leclerc        99070         99070\n     \
    \    1 Max Verstappen        100236        100236\n         1 Lewis Hamilton \
    \       101555        101555\n         1 Sergio Pérez          102993        102993\n\
    \         2 Charles Leclerc        97853        196923\n         2 Max Verstappen\
    \         97880        198116\n         2 Lewis Hamilton         99002       \
    \ 200557\n         2 Sergio Pérez           99092        202085\n         3 Charles\
    \ Leclerc        98272        295195\n         3 Max Verstappen         98357\
    \        296473\n         3 Lewis Hamilton         99075        299632\n     \
    \    3 Sergio Pérez           99473        301558\n12 rows selected.\n```"
  raw: '## Analytic Functions


    Analytic functions were introduced in Oracle Database 8.1.6 Enterprise Edition,
    yet they are still relatively unknown. Analytic functions enable access to values
    from more than one row without the need for a self-join, creating aggregate values
    without a `group by`. Another example where analytic functions shine is determining
    ranking within a group of values.


    The processing order of a query with analytic functions happens in three stages.
    In the first stage, the joins,where conditions, group by, and having clauses are
    resolved. Analytic functions are applied to the result set in the second stage.
    Finally, the `order by` is applied to the complete result set. The processing
    order is relevant because a standard aggregate might suffice. A tell-tale sign
    is a query that combines an analytic function and a distinct operator. This query
    can probably be written with a normal aggregate.


    Where aggregate functions reduce the number of rows in the final result set, a
    `count(*)` only returns one row, analytic functions don’t do that. Analytic functions
    return a value for each row in the final result set.


    ### Building Blocks


    The first step in working with analytic functions is to decide which function
    is needed, the *what*. Many aggregate functions have an analytic counterpart,
    like `count`, `sum`, or `avg`. The following example shows the skeleton of the
    analytic counterpart of the `avg` function.


    ```

    avg () over ()

    ```


    The keyword `over` signals that the function is indeed an analytic function.


    After deciding which function to use, the next step is determining those parts
    of the result set to which the function should be applied. Rows in the result
    set are “grouped” together, called *partitions*, and the analytic function is
    applied to these sets.


    Note


    Partitions in the context of analytic functions are not related to table partitioning.
    Analytic partitions are a logical grouping of data.


    A partition can be as small as a single row or as large as the whole result set.
    The criteria in the partition clause determine how many different groups there
    are—never more than one per record, never less than one per result set. The whole
    result set is considered a single partition when the partition clause is omitted.
    The result of the function of choice is applied to a single partition. It can’t
    cross partitions. The following example shows the skeleton of the analytic function
    to include the partition clause.


    ```

    avg () over (partition by )

    ```


    Within a partition, it is possible to specify a *window*. The window determines
    which range of rows in the current partition are available to perform the function
    upon. Analytic functions are always performed from the perspective of the current
    row. Window sizes can be based on either a physical number of rows or a logical
    interval, such as a numeric value or time.


    Currently, there are three options to define the windowing clause. Oracle Database
    21c introduced the groups window.


    *   **rows** specify the number of rows relative to the current row. This can
    be either forward or backward from the current row.


    *   **range** specifies the range of values relative to the current row. The number
    of rows depends on the value of the current row. The sort key must allow for addition
    or subtraction operations, like numeric, date, or interval data types.


    *   **groups** are where the data is divided based on the ordered values. Ties
    are part of the same group. The offset specified refers to the preceding or following
    group.


    Because the windowing clause relies on an ordered result set, it is required to
    include an `order by` in the analytic clause. The windowing clause defaults to
    `range unbounded preceding and current row` when an `order by` is present. Listing
    [2-2](#536316_1_En_2_Chapter.xhtml#PC19) is an example of the differences between
    `rows`, `range`, and `groups`.


    The `DRIVERS`, `RACES`, and `LAPTIMES` tables are used in the examples to demonstrate
    how analytic functions work unless otherwise noted.


    ### Running Totals


    Creating a running total, where the totals are accumulated as the rows progress,
    is trivial with analytic functions. The `laptimes` table records the time (in
    milliseconds) it takes to complete a lap around the circuit. The following example
    filters the data on the first 2022 season Bahrain Grand Prix race for Charles
    Leclerc using only the first ten laps.


    The analytic counterpart of the `sum` function is used to create a running total.
    The `over` keyword signals that it is an analytic function. The partition clause
    is missing in the following example, indicating that the complete result set is
    the partition. There is, however, a window that expands with each row because
    of the `order by` clause in the analytic clause. In this case, the implicit window
    is the default window: `range unbounded preceding and current row`, all preceding
    lap times are added to the current row’s value creating a running total, as well
    as the lap times that have the same value as the current row. Even though it *appears*
    to work in this case, it only works because the values of the lap times are unique.
    When there are duplicate values, all preceding lap times are added, as well as
    any following with the same value as the current row. A true running total would
    require the following explicit window: `rows between unbounded preceding and current
    row`.


    In Listing [2-1](#536316_1_En_2_Chapter.xhtml#PC3), the `running_total` column
    in the result set shows the running total time for the first ten laps for Charles
    Leclerc. The third row (lap 3) shows the total time in milliseconds for the first
    three rows (99070 + 97853 + 98272 = 295195).


    ```

    select ltm.lap

    , ltm.milliseconds

    , sum (ltm.milliseconds) over (

    order by ltm.lap

    rows between unbounded preceding

    and current row

    ) as running_total

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    ltm.driverid = 844 -- Charles Leclerc

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    and    ltm.lap between 1 and 10

    order  by ltm.lap

    /

    LAP MILLISECONDS RUNNING_TOTAL

    ---------- ------------ -------------

    1        99070         99070

    2        97853        196923

    3        98272        295195

    4        98414        393609

    5        98471        492080

    6        98712        590792

    7        98835        689627

    8        98951        788578

    9        98807        887385

    10        99123        986508

    Listing 2-1

    Running total for a single driver

    ```


    To create a running total per driver, add a partition clause, as is done in the
    following example. The results are filtered on just four drivers for the first
    three laps.


    ```

    select ltm.lap

    , drv.forename||'' ''||drv.surname as driver

    , ltm.milliseconds

    , sum (ltm.milliseconds)

    over (partition by ltm.driverid

    order by ltm.lap) as running_total

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    join   f1data.drivers drv

    on   drv.driverid = ltm.driverid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    and    ltm.lap between 1 and 3

    and    ltm.driverid in (1, 815, 830, 844)

    order  by ltm.lap

    ,ltm.milliseconds

    ,ltm.driverid

    /

    LAP DRIVER          MILLISECONDS RUNNING_TOTAL

    ---------- --------------- ------------ -------------

    1 Charles Leclerc        99070         99070

    1 Max Verstappen        100236        100236

    1 Lewis Hamilton        101555        101555

    1 Sergio Pérez          102993        102993

    2 Charles Leclerc        97853        196923

    2 Max Verstappen         97880        198116

    2 Lewis Hamilton         99002        200557

    2 Sergio Pérez           99092        202085

    3 Charles Leclerc        98272        295195

    3 Max Verstappen         98357        296473

    3 Lewis Hamilton         99075        299632

    3 Sergio Pérez           99473        301558

    12 rows selected.

    ```'
  trans: "\n## 分析函数\n\n分析函数在 Oracle 数据库 8.1.6 企业版中被引入，但至今仍鲜为人知。分析函数使得访问多行数据的值成为可能，而无需使用自连接，也不需要\
    \ `group by` 子句即可创建聚合值。分析函数大放异彩的另一个例子是确定一组值内的排名。\n\n包含分析函数的查询，其处理顺序分为三个阶段。在第一阶段，解析连接、`where`\
    \ 条件、`group by` 和 `having` 子句。分析函数在第二阶段应用于结果集。最后，`order by` 作用于完整的结果集。处理顺序之所以重要，是因为有时使用标准的聚合函数可能就足够了。一个典型的迹象是查询同时结合了分析函数和\
    \ `distinct` 操作符。这种查询很可能可以用普通的聚合函数来编写。\n\n聚合函数会减少最终结果集的行数——例如 `count(*)` 只返回一行——而分析函数则不然。分析函数会为最终结果集中的每一行返回一个值。\n\
    \n### 构成要素\n\n使用分析函数的第一步是决定需要哪个函数，即“做什么”。许多聚合函数都有对应的分析函数，例如 `count`、`sum` 或 `avg`。以下示例展示了\
    \ `avg` 函数对应的分析函数的骨架。\n\n```\navg () over ()\n```\n\n关键字 `over` 表明该函数确实是一个分析函数。\n\
    \n在决定了使用哪个函数之后，下一步是确定该函数应应用于结果集的哪些部分。结果集中的行被“分组”在一起，称为*分区*，分析函数被应用于这些分区。\n\n注意\n\
    \n分析函数上下文中的分区与表分区无关。分析分区是数据的一种逻辑分组。\n\n分区可以小到只有一行，也可以大到整个结果集。分区子句中的标准决定了有多少个不同的组——每个记录至少一个分区，每个结果集至少一个分区。当省略分区子句时，整个结果集被视为单个分区。所选函数的结果被应用于单个分区。它不能跨分区工作。以下示例展示了包含分区子句的分析函数的骨架。\n\
    \n```\navg () over (partition by )\n```\n\n在分区内部，可以指定一个*窗口*。窗口决定了当前分区中哪些行范围可用于执行函数。分析函数总是从当前行的角度执行。窗口大小可以基于物理行数，也可以基于逻辑区间，例如数值或时间。\n\
    \n目前有三种选项来定义开窗子句。Oracle 数据库 21c 引入了 groups 窗口。\n\n*   `rows` 指定相对于当前行的行数。可以是当前行之前或之后的行。\n\
    *   `range` 指定相对于当前行的值范围。行的数量取决于当前行的值。排序键必须支持加法或减法运算，例如数值、日期或间隔数据类型。\n*   `groups`\
    \ 是根据有序值将数据进行划分的方式。值相等的行属于同一组。指定的偏移量指的是前一组或后一组。\n\n由于开窗子句依赖于有序的结果集，因此必须在分析子句中包含\
    \ `order by`。当存在 `order by` 时，开窗子句默认为 `range unbounded preceding and current row`。清单\
    \ 2-2 是 `rows`、`range` 和 `groups` 之间差异的示例。\n\n除非另有说明，示例中使用 `DRIVERS`、`RACES` 和\
    \ `LAPTIMES` 表来演示分析函数的工作原理。\n\n### 累计总和\n\n使用分析函数创建累计总和（即随着行的推进累积总量）是轻而易举的。`laptimes`\
    \ 表记录了完成一圈赛道所需的时间（以毫秒为单位）。以下示例筛选了 2022 赛季巴林大奖赛中 Charles Leclerc 的数据，仅使用前 10 圈。\n\
    \n`sum` 函数的分析函数版本被用来创建累计总和。关键字 `over` 表明它是一个分析函数。下面的例子中缺少分区子句，表明整个结果集就是一个分区。然而，由于分析子句中的\
    \ `order by` 子句，存在一个随每行扩展的窗口。在这种情况下，隐式的窗口是默认窗口：`range unbounded preceding and\
    \ current row`，所有前面的圈速都会加到当前行的值上，形成累计总和，同时也包括那些与当前行值相同的圈速。尽管在此情况下它*看起来*有效，但这仅仅是因为圈速值是唯一的。当存在重复值时，所有前面的圈速以及任何与当前行值相同的后续圈速都会被加进来。一个真正的累计总和需要以下显式窗口：`rows\
    \ between unbounded preceding and current row`。\n\n在清单 2-1 中，结果集中的 `running_total`\
    \ 列显示了 Charles Leclerc 前十圈的累计总时间。第三行（第 3 圈）显示了前三行（99070 + 97853 + 98272 = 295195）的总时间（以毫秒为单位）。\n\
    \n```\nselect ltm.lap\n, ltm.milliseconds\n, sum (ltm.milliseconds) over (\n \
    \   order by ltm.lap\n    rows between unbounded preceding\n             and current\
    \ row\n    ) as running_total\nfrom   f1data.laptimes ltm\njoin   f1data.races\
    \ rcs\n  on   rcs.raceid = ltm.raceid\nwhere  rcs.race_date between trunc (sysdate,\
    \ 'yy') and sysdate\n  and    ltm.driverid = 844 -- Charles Leclerc\n  and   \
    \ rcs.raceid = 1074 -- Bahrain Grand Prix\n  and    ltm.lap between 1 and 10\n\
    order  by ltm.lap\n/\nLAP MILLISECONDS RUNNING_TOTAL\n---------- ------------\
    \ -------------\n         1        99070         99070\n         2        97853\
    \        196923\n         3        98272        295195\n         4        98414\
    \        393609\n         5        98471        492080\n         6        98712\
    \        590792\n         7        98835        689627\n         8        98951\
    \        788578\n         9        98807        887385\n        10        99123\
    \        986508\nListing 2-1\n单一车手的累计总和\n```\n\n要为每位车手创建累计总和，需要添加分区子句，如下例所示。结果被筛选为仅四位车手的前三圈数据。\n\
    \n```\nselect ltm.lap\n, drv.forename||' '||drv.surname as driver\n, ltm.milliseconds\n\
    , sum (ltm.milliseconds)\n    over (partition by ltm.driverid\n          order\
    \ by ltm.lap) as running_total\nfrom   f1data.laptimes ltm\njoin   f1data.races\
    \ rcs\n  on   rcs.raceid = ltm.raceid\njoin   f1data.drivers drv\n  on   drv.driverid\
    \ = ltm.driverid\nwhere  rcs.race_date between trunc (sysdate, 'yy') and sysdate\n\
    \  and    rcs.raceid = 1074 -- Bahrain Grand Prix\n  and    ltm.lap between 1\
    \ and 3\n  and    ltm.driverid in (1, 815, 830, 844)\norder  by ltm.lap\n    \
    \    ,ltm.milliseconds\n        ,ltm.driverid\n/\nLAP DRIVER          MILLISECONDS\
    \ RUNNING_TOTAL\n---------- --------------- ------------ -------------\n     \
    \    1 Charles Leclerc        99070         99070\n         1 Max Verstappen \
    \       100236        100236\n         1 Lewis Hamilton        101555        101555\n\
    \         1 Sergio Pérez          102993        102993\n         2 Charles Leclerc\
    \        97853        196923\n         2 Max Verstappen         97880        198116\n\
    \         2 Lewis Hamilton         99002        200557\n         2 Sergio Pérez\
    \           99092        202085\n         3 Charles Leclerc        98272     \
    \   295195\n         3 Max Verstappen         98357        296473\n         3\
    \ Lewis Hamilton         99075        299632\n         3 Sergio Pérez        \
    \   99473        301558\n12 rows selected.\n```\n"
- fmt: 'The final `order by` (last line in the preceding query) determines the order
    of the result set. The running total might not be immediately obvious, but when
    focusing on the running total for Charles Leclerc, the same results are shown
    as in the first query in Listing [2-1](#536316_1_En_2_Chapter.xhtml#PC3).


    To help visualize the window the functions `first_value` and `last_value` can
    assist with that. In the following query the `first_value` and `last_value` have
    the same analytic clause as the `sum` function and show the lap number where the
    window starts (in the `win_start` column) and where the window ends (in the `win_end`
    column).


    ```sql

    select lt.lap

    , lt.milliseconds

    , sum (lt.milliseconds)

    over (partition by lt.driverid

    order by lap) as running_total

    , first_value (lt.lap)

    over (partition by lt.driverid

    order by lt.lap) as win_start

    , last_value (lt.lap)

    over (partition by lt.driverid

    order by lt.lap) as win_end

    from   f1data.laptimes lt

    join   f1data.races r

    on   r.raceid = lt.raceid

    where  race_date between trunc (sysdate, ''yy'') and sysdate

    and    r.raceid = 1074 -- Bahrain Grand Prix

    and    lt.lap between 1 and 3

    and    lt.driverid = 844 -- Charles Leclerc

    order  by lt.lap

    ,lt.milliseconds

    /

    LAP MILLISECONDS RUNNING_TOTAL  WIN_START    WIN_END

    ---------- ------------ ------------- ---------- ----------

    1        99070         99070          1          1

    2        97853        196923          1          2

    3        98272        295195          1          3

    ```


    In the preceding result set, the `win_start` column keeps the value of 1 as the
    start of the window, while the `win_end` column shows it is increased with the
    rows.


    Note


    When you want to know the last value in the `partition`, instead of the current
    last row in the window, specify `unbounded following`. This expands the window
    from the current row to the last row.


    Since Oracle Database 21c, it is possible to define a reusable windowing clause.
    The following query is a variation of the preceding query where the window can
    be visualized with `first_value` and `last_value` functions. The reusable window
    clause is named “win” and is used in all three analytic functions.


    ```sql

    select ltm.lap

    , ltm.milliseconds

    , sum (ltm.milliseconds) over win as running_total

    , first_value (ltm.lap) over win as win_start

    , last_value (ltm.lap) over win as win_end

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    and    ltm.lap between 1 and 3

    and    ltm.driverid = 844 -- Charles Leclerc

    window win as (partition by ltm.driverid

    order by ltm.lap)

    order  by ltm.lap

    , ltm.milliseconds

    /

    LAP MILLISECONDS RUNNING_TOTAL  WIN_START    WIN_END

    ---------- ------------ ------------- ---------- ----------

    1        99070         99070          1          1

    2        97853        196923          1          2

    3        98272        295195          1          3

    More on the reusable window clause in the section "Reusable windowing clause".

    ```


    ### Accessing Values from Other Rows


    Several functions allow accessing values from other rows in the result set without
    needing a self-join. In a previous example, `first_value` and `last_value` have
    already been shown to help visualize where a window starts and ends. A variation
    of these functions is `nth_value`.


    Where `first_value` retrieves a value from the first row in the window, and `last_value`
    retrieves a value from the last row in the window, `nth_value` allows retrieving
    a value from any row in the window.


    The first argument for the `nth_value` function specifies which value needs to
    be retrieved. The second argument specifies the offset of the row that needs to
    be returned. This can be a constant, bind variable, column, or expression involving
    each of them if it resolves to a positive integer.


    In the following example, the difference between the current lap (current row)
    and the elapsed time of the second lap is examined per driver. The differences
    between the second lap are shown in the column labeled `diff`.


    In this example, every row is compared to the second in the result set, even the
    first row. The window `rows between unbounded preceding and unbounded following`
    are not restricted to only “look behind.” It can also “look ahead.”


    Lewis Hamilton and Sergio Pérez were faster in the fourth lap than in the second.


    ```sql

    select ltm.lap

    , drv.forename||'' ''||drv.surname as driver

    , ltm.milliseconds

    , ltm.milliseconds

    - nth_value (ltm.milliseconds, 2)

    over (partition by ltm.driverid

    order by ltm.lap

    rows between unbounded preceding

    and unbounded following)

    as diff

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    join   f1data.drivers drv

    on   drv.driverid = ltm.driverid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    and    ltm.lap between 1 and 4

    and    ltm.driverid in (1, 815, 830, 844)

    order  by ltm.lap

    , ltm.milliseconds

    /

    LAP DRIVER          MILLISECONDS       DIFF

    ---------- --------------- ------------ ----------

    1 Charles Leclerc        99070       1217

    1 Max Verstappen        100236       2356

    1 Lewis Hamilton        101555       2553

    1 Sergio Pérez          102993       3901

    2 Charles Leclerc        97853          0

    2 Max Verstappen         97880          0

    2 Lewis Hamilton         99002          0

    2 Sergio Pérez           99092          0

    3 Charles Leclerc        98272        419

    3 Max Verstappen         98357        477

    3 Lewis Hamilton         99075         73

    3 Sergio Pérez           99473        381

    4 Charles Leclerc        98414        561

    4 Max Verstappen         98566        686

    4 Sergio Pérez           98741       -351

    4 Lewis Hamilton         98892       -110

    16 rows selected.

    ```


    Comparing lap times from one lap to the next can be done with the `lag` and `lead`
    functions. With `lag`, it is possible to retrieve values from previous rows, while
    `lead` retrieves values from the following rows in the result set.


    The following example compares lap times for a single driver with the lap time
    of the previous lap. Because the filter only selects a single driver, the partitioning
    clause is omitted from the analytic function. As seen in the result set, the second
    lap was significantly faster than the first.


    ```sql

    select ltm.lap

    , ltm.milliseconds

    , ltm.milliseconds

    - lag (ltm.milliseconds)

    over (partition by ltm.driverid

    order by ltm.lap)

    as diff

    from   f1data.laptimes ltm

    join   f1data.races rcs

    on   rcs.raceid = ltm.raceid

    join   f1data.drivers drv

    on   drv.driverid = ltm.driverid

    where  rcs.race_date between trunc (sysdate, ''yy'') and sysdate

    and    rcs.raceid = 1074 -- Bahrain Grand Prix

    and    ltm.lap between 1 and 4

    and    ltm.driverid = 830 -- Max Verstappen

    order  by ltm.lap

    , ltm.milliseconds

    /

    LAP MILLISECONDS       DIFF

    ---------- ------------ ----------

    1       100236

    2        97880      -2356

    3        98357        477

    4        98566        209

    ```'
