    where  ltm.raceid = 1093  -- Circuit of the Americas

    and    ltm.driverid = 830 -- Max Verstappen

    )

    select first_lap

    , last_lap

    , lap_count

    from   cota

    match_recognize (

    order by lap

    measures

    first (lap) as first_lap

    , last (lap)  as last_lap

    , count(*)    as lap_count

    one row per match

    pattern ( faster{2,} )

    define

