- fmt: '# The DBMS_DB_VERSION Package


    Oracle ships a package that holds a constant for the current RDBMS version and
    one for the current release number. The name of this package is `DBMS_DB_VERSION`.
    It also contains a set of boolean values you can use to determine the current
    version. Listing [6-1](#536316_1_En_6_Chapter.xhtml#PC5) shows the current `DBMS_DB_VERSION`
    package shipped with Oracle Database 21c.


    ```sql

    package sys.dbms_db_version is

    version constant pls_integer :=

    21; -- RDBMS version number

    release constant pls_integer := 0;  -- RDBMS release number

    /* The following boolean constants follow a naming convention.

    Each constant gives a name for a boolean expression.

    For example,

    ver_le_9_1  represents version <=  9 and release <= 1

    ver_le_10_2 represents version <= 10 and release <= 2

    ver_le_10   represents version <= 10

    Code that references these boolean constants (rather than

    directly referencing version and release) will benefit from

    fine grain invalidation as the version and release values

    change.

    A typical usage of these boolean constants is

    $if dbms_db_version.ver_le_10 $then

    version 10 and ealier code

    $elsif dbms_db_version.ver_le_11 $then

    version 11 code

    $else

    version 12 and later code

    $end

    This code structure will protect any reference to the code

    for version 12. It also prevents the controlling package

    constant dbms_db_version.ver_le_11 from being referenced

    when the program is compiled under version 10. A similar

    observation applies to version 11. This scheme works even

    though the static constant ver_le_11 is not defined in

    version 10 database because conditional compilation protects

    the $elsif from evaluation if the dbms_db_version.ver_le_10

    is TRUE.

    */

    /* Deprecate boolean constants for unsupported releases */

    ver_le_9_1    constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9_1);

    ver_le_9_2    constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9_2);

    ver_le_9      constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9);

    ver_le_10_1   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10_1);

    ver_le_10_2   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10_2);

    ver_le_10     constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10);

    ver_le_11_1   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_11_1);

    ver_le_11_2   constant boolean := FALSE;

    ver_le_11     constant boolean := FALSE;

    ver_le_12_1   constant boolean := FALSE;

    ver_le_12_2   constant boolean := FALSE;

    ver_le_12     constant boolean := FALSE;

    ver_le_18     constant boolean := FALSE;

    ver_le_19     constant boolean := FALSE;

    ver_le_20     constant boolean := FALSE;

    ver_le_21     constant boolean := TRUE;

    end dbms_db_version;

    Listing 6-1

    21c version of the DBMS_DB_VERSION package

    ```


    The flags are `FALSE` in all lower versions of the database. Only the current
    version is set to `TRUE`.


    If you use the `DBMS_DB_VERSION` constants, inquire them from the lowest version
    number available. If an inquiry directive evaluates to true, the code in the `$then`
    block is included, and the rest of the code is ignored and, therefore, not included.
    Since this code is not evaluated anymore, it doesn’t matter if this block references
    objects; for example, a constant in the package that doesn’t exist.


    If your application is currently running on an Oracle 12c instance, your conditional
    compilation block should start inquiring if the version is 12 (or less).


    ```sql

    $if dbms_db_version.ver_le_12 $then

    dbms_output.put_line( ''This will run 12c code.'' );

    ```


    If you want your program to include code for multiple versions to use the best
    features available in every version of the database, use the `$elsif` directive
    for multiple inquiry directives comparable to a case statement.


    ```sql

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line( ''This will run 18c code.'' );

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run 19c code.'' );

    $elsif dbms_db_version.ver_le_20 $then

    dbms_output.put_line( ''This will run 20c code.'' );

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line( ''This will run 21c code.'' );

    ```


    If neither of the inquiry directives is true, include a catch-all `$else` directive.


    ```sql

    $else

    dbms_output.put_line( ''This version is not supported'' );

    ```


    Listing [6-2](#536316_1_En_6_Chapter.xhtml#PC9) shows the complete script.


    ```sql

    begin

    $if dbms_db_version.ver_le_12 $then

    dbms_output.put_line( ''This will run 12c code.'' );

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line( ''This will run 18c code.'' );

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run 19c code.'' );

    $elsif dbms_db_version.ver_le_20 $then

    dbms_output.put_line( ''This will run 20c code.'' );

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line( ''This will run 21c code.'' );

    $else

    dbms_output.put_line( ''This version is not supported'' );

    $end

    end;

    Listing 6-2

    Which version is running?

    ```


    If you build a block with multiple conditions, the case-like statement, be sure
    to include all the possible flags so your code compiles on every version of the
    database.


    The following code cannot compile on an Oracle 20c instance because although `ver_le_21`
    means “version less than or equal to 21,” this variable isn’t declared in the
    `DBMS_DB_VERSION` package on an Oracle 20c database. Therefore, the compile throws
    an error.


    ```sql

    begin

    $if dbms_db_version.ver_le_12 $then

    dbms_output.put_line( ''This will run 12c code.'' );

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line( ''This will run 18c code.'' );

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run 19c code.'' );

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line( ''This will run 21c code.'' );

    $else

    dbms_output.put_line( ''This version is not supported'' );

    $end

    end;

    ```


    Also, conditional compilation does not do short-circuit evaluation, so make sure
    you don’t mix multiple, possibly illegal, conditions in one statement.


    ```sql

    begin

    $if dbms_db_version.ver_le_12

    or dbms_db_version.ver_le_18

    or dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run pre 20c code.'' );

    $elsif dbms_db_version.ver_le_20 $then

    dbms_output.put_line( ''This will run 20c code.'' );

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line( ''This will run 21c code.'' );

    $else

    dbms_output.put_line( ''This version is not supported'' );

    $end

    end;

    ```


    This code cannot compile on an Oracle 12c instance, for example. Again, the `DBMS_DB_VERSION.VER_LE_18`
    and `DBMS_DB_VERSION.VER_LE_19` constants simply don’t exist yet.


    ## Predefined CCFLAGS


    There are some `CCFLAGS` defined automatically for any program unit. These may
    not be very useful as an inquiry directive in a selection directive, but they
    can give you helpful information about your program. For instance, when instrumenting
    your code, it can be helpful to know the line number where something is done.
    Table [6-1](#536316_1_En_6_Chapter.xhtml#Tab1) shows a list of the predefined
    `CCFLAGS`.


    **Table 6-1 Predefined CCFLAGS**


    | Flag | Description |

    | --- | --- |

    | `$$PLSQL_LINE` | A `PLS_INTEGER` literal whose value is the number of the source
    line on which the directive appears in the current PL/SQL unit. |

    | `$$PLSQL_UNIT` | A `VARCHAR2` literal that contains the name of the current
    PL/SQL unit. If the current PL/SQL unit is an anonymous block, then `$$PLSQL_UNIT`
    contains a `NULL` value. Only the top-level object, not the subprograms. |

    | `$$PLSQL_UNIT_OWNER` | A `VARCHAR2` literal that contains the name of the owner
    of the current PL/SQL unit. If the current PL/SQL unit is an anonymous block,
    then `$$PLSQL_UNIT_OWNER` contains a `NULL` value. |

    | `$$PLSQL_UNIT_TYPE` | A `VARCHAR2` literal that contains the type of the current
    PL/SQL unit—`ANONYMOUS BLOCK`, `FUNCTION`, `PACKAGE`, `PACKAGE BODY`, `PROCEDURE`,
    `TRIGGER`, `TYPE`, or `TYPE BODY`. Inside an anonymous block or non-DML trigger,
    `$$PLSQL_UNIT_TYPE` has the value `ANONYMOUS BLOCK`. |'
  raw: '#### The DBMS_DB_VERSION Package


    Oracle ships a package that holds a constant for the current RDBMS version and
    one for the current release number. The name of this package is DBMS_DB_VERSION.
    It also contains a set of boolean values you can use to determine the current
    version. Listing [6-1](#536316_1_En_6_Chapter.xhtml#PC5) shows the current DBMS_DB_VERSION
    package shipped with Oracle Database 21c.


    ```

    package sys.dbms_db_version is

    version constant pls_integer :=

    21; -- RDBMS version number

    release constant pls_integer := 0;  -- RDBMS release number

    /* The following boolean constants follow a naming convention.

    Each constant gives a name for a boolean expression.

    For example,

    ver_le_9_1  represents version <=  9 and release <= 1

    ver_le_10_2 represents version <= 10 and release <= 2

    ver_le_10   represents version <= 10

    Code that references these boolean constants (rather than

    directly referencing version and release) will benefit from

    fine grain invalidation as the version and release values

    change.

    A typical usage of these boolean constants is

    $if dbms_db_version.ver_le_10 $then

    version 10 and ealier code

    $elsif dbms_db_version.ver_le_11 $then

    version 11 code

    $else

    version 12 and later code

    $end

    This code structure will protect any reference to the code

    for version 12\. It also prevents the controlling package

    constant dbms_db_version.ver_le_11 from being referenced

    when the program is compiled under version 10\. A similar

    observation applies to version 11\. This scheme works even

    though the static constant ver_le_11 is not defined in

    version 10 database because conditional compilation protects

    the $elsif from evaluation if the dbms_db_version.ver_le_10

    is TRUE.

    */

    /* Deprecate boolean constants for unsupported releases */

    ver_le_9_1    constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9_1);

    ver_le_9_2    constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9_2);

    ver_le_9      constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_9);

    ver_le_10_1   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10_1);

    ver_le_10_2   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10_2);

    ver_le_10     constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_10);

    ver_le_11_1   constant boolean := FALSE;

    PRAGMA DEPRECATE(ver_le_11_1);

    ver_le_11_2   constant boolean := FALSE;

    ver_le_11     constant boolean := FALSE;

    ver_le_12_1   constant boolean := FALSE;

    ver_le_12_2   constant boolean := FALSE;

    ver_le_12     constant boolean := FALSE;

    ver_le_18     constant boolean := FALSE;

    ver_le_19     constant boolean := FALSE;

    ver_le_20     constant boolean := FALSE;

    ver_le_21     constant boolean := TRUE;

    end dbms_db_version;

    Listing 6-1

    21c version of the DBMS_DB_VERSION package

    ```


    The flags are FALSE in all lower versions of the database. Only the current version
    is set to TRUE.


    If you use the DBMS_DB_VERSION constants, inquire them from the lowest version
    number available. If an inquiry directive evaluates to true, the code in the `$then`
    block is included, and the rest of the code is ignored and, therefore, not included.
    Since this code is not evaluated anymore, it doesn’t matter if this block references
    objects; for example, a constant in the package that doesn’t exist.


    If your application is currently running on an Oracle 12c instance, your conditional
    compilation block should start inquiring if the version is 12 (or less).


    ```

    $if dbms_db_version.ver_le_12 $then

    dbms_output.put_line( ''This will run 12c code.'' );

    ```


    If you want your program to include code for multiple versions to use the best
    features available in every version of the database, use the `$elsif` directive
    for multiple inquiry directives comparable to a case statement.


    ```

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line( ''This will run 18c code.'' );

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run 19c code.'' );

    $elsif dbms_db_version.ver_le_20 $then

    dbms_output.put_line( ''This will run 20c code.'' );

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line( ''This will run 21c code.'' );

    ```


    If neither of the inquiry directives is true, include a catch-all `$else` directive.


    ```

    $else

    dbms_output.put_line( ''This version is not supported'' );

    ```


    Listing [6-2](#536316_1_En_6_Chapter.xhtml#PC9) shows the complete script.


    ```

    begin

    $if dbms_db_version.ver_le_12 $then

    dbms_output.put_line( ''This will run 12c code.'' );

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line( ''This will run 18c code.'' );

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line( ''This will run 19c code.'' );

    $elsif dbms_db_version.ver_le_20 $then

    dbms_output.put_line( ''This will run 20c code.'' );

