    null;\n------8<-replace-end------\n```\n\n替换为：\n\n```\n-----8<-replace-start------\n\
    dbms_output.put_line\n( utl_call_stack.concatenate_subprogram\n( utl_call_stack.subprogram(\
    \ 1 ) )\n);\n------8<-replace-end------\n```\n\n如果你调用公共过程，输出如下：\n\n```\nbegin\n\
    utl_call_stack_demo_concatenate_subprogram.public_procedure;\nend;\n/\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE\n\
    调用局部过程\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE\n\
    调用局部过程中的局部过程\nUTL_CALL_STACK_DEMO.PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_PUBLIC_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
    调用私有过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE\n调用私有过程中的局部过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE\n\
    调用局部过程中的局部过程\nUTL_CALL_STACK_DEMO.PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_PRIVATE_PROCEDURE.LOCAL_PROCEDURE_IN_LOCAL_PROCEDURE\n\
    PL/SQL 过程已成功完成。\n```\n\n### `owner`\n\n`utl_call_stack.owner` 函数返回子程序的所有者名称。其参数与你用于\
    \ `utl_call_stack.subprogram` 函数的参数相同。此函数的返回值是单个 `VARCHAR2` 字符串，表示给定层级的所有者，而不是整个堆栈的变长数组。\n\
    \n### `unit_line`\n\n使用 `utl_call_stack.unit_line`，你可以获取对程序进行调用的位置的行号。这些行号是调用堆栈中不同程序里的行号，而不仅仅是当前程序的行号。\n\
    \n为了演示此函数的功能，请将以下代码：\n\n```\n-----8<-replace-start------\nnull;\n------8<-replace-end------\n\
    ```\n\n替换为：\n\n```\n-----8<-replace-start------\nfor i in 1 .. utl_call_stack.dynamic_depth\
    \ loop\n  if i > 1 then\n    dbms_output.put('->');\n  end if;\n  dbms_output.put(to_char(utl_call_stack.unit_line(i)));\n\
    end loop;\ndbms_output.put_line('');\n------8<-replace-end------\n```\n\n如果你调用公共过程，输出如下：\n\
    \n```\nbegin\nutl_call_stack_demo_unit_line.public_procedure;\nend;\n/\n2->97\n\
    调用局部过程\n2->107->81\n调用局部过程中的局部过程\n2->107->91->66\n调用私有过程\n2->109->44\n调用私有过程中的局部过程\n\
    2->109->54->28\n调用局部过程中的局部过程\n2->109->54->38->13\nPL/SQL 过程已成功完成。\n```\n\n## 摘要\n\
    \n有很多可用的工具包。使用 `DBMS_SESSION` 中的过程和函数，你可以确保设置了正确的角色以及 `NLS` 设置是正确的。为了便于调试，可以设置会话标识符。使用\
    \ `DBMS_UTILITY` 和 `UTL_CALL_STACK` 中的过程和函数，你可以精确查询程序当前的位置以及它是如何到达那里的。使用这些过程和函数来检测你的代码，以便在发生意外情况时，能够弄清楚是什么、何时以及为什么发生的。\n\
    \n# 18. 查看你需要看到的内容\n\n如果你将数据存储在数据库中，它并不需要随时对所有人可见。有时你不想让人们看到你的数据。有时你希望某些群体看到你的数据，而其他群体看不到。有时你希望你的数据在特定时间段内可用。Oracle\
    \ 数据库为这些问题提供了不同的机制。\n\n## 时间有效性\n\n有时我们数据库中的数据只在特定时间段内有效。你可以简单地为新时间段将行更新为新值。但如果你需要能够检索某个时间点的数据呢？这意味着需要引入历史表，其中记录了表的所有更新，然后创建查询来检索所需的数据。"
- fmt: '# Setup


    Oracle Database 12c (12.1) 引入了 `temporal validity` 的概念。通过在表中使用两个 DATE 或 TIMESTAMP
    列，Oracle Database 可以确定一条记录是否应包含在查询的结果集中。这些列可以是已有的列，也可以在创建有效期时自动创建。


    假设你创建了一个关于一级方程式赛车手及其合同的表。使用可用数据创建一个表。这并不意味着结果是完全准确的，但对本示例而言是可行的。


    我们的假设如下：


    *   车手为某车队参加的第一场比赛是合同开始日期。

    *   车手为某车队参加的最后一场比赛是合同结束日期。

    *   只显示 1965 年以来的合同（在此之前，可用数据不够准确）。


    在这种情况下，你可以采用两种方法。一种是使用 `driverid` 和 `constructorid` 创建一个表，为合同添加一个有效期，这会自动添加开始和结束日期列，然后使用查询来填充表。


    另一种可能性是创建表时就已经包含开始和结束日期列（例如，通过运行一个 `Create Table As Select` 语句），然后使用现有列添加合同的有效期。


    这两种方法的主要区别在于，当列是自动创建时，它们被创建为不可见列，在描述表时不可见。新创建列的名称为 `<periodname>_start` 和 `<periodname>_end`。


    在向表添加有效期时创建的检查约束会检查有效期的开始日期是否小于结束日期。如果任何一个值为 NULL，则该约束也被视为有效。


    使用清单 [18-1] 中的脚本创建表并添加有效期。


    ```

    create table driverconstructors as

    with resultrace as

    ( select rsl.driverid

    , rsl.constructorid

    , rcs.year

    , rcs.round

    , rcs.race_date

    from   f1data.results rsl

    join   f1data.races   rcs

    on     ( rsl.raceid = rcs.raceid )

    where  1 = 1

    and    rcs.race_date > to_date(''19650101'', ''YYYYMMDD'')

    )

    , contractinfo as

    ( select rrc.driverid

    , rrc.constructorid

    , rrc.year

    , rrc.round

    , case

    when lag( rrc.constructorid )

    over( partition by rrc.driverid order by year

    ,round ) = rrc.constructorid

    then

    null

    else

    rrc.race_date

    end begincontract

    , case

    when lead( rrc.constructorid )

    over( partition by rrc.driverid order by year

    ,round ) = rrc.constructorid

    then

    null

    else

    rrc.race_date

    end endcontract

    from   resultrace rrc

    )

    , contracts as

    ( select cif.driverid

    , cif.constructorid

    , cif.year

    , cif.round

    , cif.begincontract

    , cif.endcontract

    , sum( case

    when cif.begincontract is null

    then


    else


    end )

    over ( partition by driverid order by year

    , round) contractnumber

    from   contractinfo cif

    )

    , all_contracts as

    ( select con.contractnumber

    , con.driverid

    , con.constructorid

    , min(con.begincontract) as startcontract

    , max(con.endcontract) as endcontract

    from   contracts con

    group  by con.driverid

    , con.constructorid

    , con.contractnumber)

    select act.driverid

    , act.constructorid

    , act.startcontract

    , greatest( act.startcontract + 1 / 24 / 60 / 60

    , act.endcontract) as endcontract

    from   all_contracts act

    /

    ```


    **清单 18-1**

    创建 `drivercontracts` 表


    创建表后，使用两个现有列 `startcontract` 和 `endcontract` 向此表添加有效期。


    ```

    alter table driverconstructors add period for drivercontract (startcontract, endcontract)

    /

    ```


    如果有效期的开始日期小于或等于指定日期，且有效期的结束日期大于指定日期，则该记录属于有效期内。日期的 NULL 值被视为无限小。对于开始日期，这意味着时间的起点；对于结束日期，这意味着时间的终点。


    ## As of 查询


    以下查询允许你从表中仅检索在指定日期有效的记录。


    ```

    select ... from <table_name> as of period for <period_name> <date_expression>

    ```


    使用在 `DRIVERCONSTRUCTORS` 表上定义的周期，你可以查找在某个特定时间点有合同的车手。让我们查看 2022 赛季开始时的情况。


    ```

    select d.forename as firstname

    , d.surname  as lastname

    , c.name     as constructorname

    from   driverconstructors as of period

    for    drivercontract to_date( ''20220320'', ''YYYYMMDD'' ) dc

    join   f1data.drivers d

    on     (dc.driverid = d.driverid)

    join   f1data.constructors c

    on     (dc.constructorid = c.constructorid)

    order  by constructorname, lastname, firstname

    /

    FIRSTNAME    LASTNAME     CONSTRUCTORNAME

    ------------ ------------ ----------------

    Valtteri     Bottas       Alfa Romeo

    Guanyu       Zhou         Alfa Romeo

    Pierre       Gasly        AlphaTauri

    Yuki         Tsunoda      AlphaTauri

    Fernando     Alonso       Alpine F1 Team

    Esteban      Ocon         Alpine F1 Team

    Nico         Hülkenberg   Aston Martin

    Lance        Stroll       Aston Martin

    Sebastian    Vettel       Aston Martin

    Charles      Leclerc      Ferrari

    Carlos       Sainz        Ferrari

    Kevin        Magnussen    Haas F1 Team

    Mick         Schumacher   Haas F1 Team

    Lando        Norris       McLaren

    Daniel       Ricciardo    McLaren

    Lewis        Hamilton     Mercedes

    George       Russell      Mercedes

    Sergio       Pérez        Red Bull

    Max          Verstappen   Red Bull

    Alexander    Albon        Williams

    Nicholas     Latifi       Williams

    21 rows selected

    ```


    你可以为 “as of” 周期使用任何日期。因此，如果你想查看 1998 赛季开始时的车手，查询将如下所示。


    ```

    select d.forename as firstname

    , d.surname  as lastname

    , c.name     as constructorname

    from   driverconstructors as of period

    for    drivercontract to_date( ''19980308'', ''YYYYMMDD'' ) dc

    join   f1data.drivers d

    on     (dc.driverid = d.driverid)

    join   f1data.constructors c

    on     (dc.constructorid = c.constructorid)

    order  by constructorname, lastname, firstname

    /

    FIRSTNAME    LASTNAME     CONSTRUCTORNAME

    ------------ ------------ ----------------

    Pedro        Diniz        Arrows

    Mika         Salo         Arrows

    Giancarlo    Fisichella   Benetton

    Alexander    Wurz         Benetton

    Eddie        Irvine       Ferrari

    Michael      Schumacher   Ferrari

    Damon        Hill         Jordan

    Ralf         Schumacher   Jordan

    David        Coulthard    McLaren

    Mika         Häkkinen     McLaren

    Tarso        Marques      Minardi

    Shinji       Nakano       Minardi

    Esteban      Tuero        Minardi

    Olivier      Panis        Prost

    Jarno        Trulli       Prost

    Jean         Alesi        Sauber

    Johnny       Herbert      Sauber

    Rubens       Barrichello  Stewart

    Jan          Magnussen    Stewart

    Ricardo      Rosset       Tyrrell

    Toranosuke   Takagi       Tyrrell

    Heinz-Harald Frentzen     Williams

    Jacques      Villeneuve   Williams

    23 rows selected

    ```


    > **提示：**

    > “as of” 的一个典型用法是查询 `as of period for ... sysdate` 以检索当前有效的数据。'
  raw: "### Setup\n\nOracle Database 12c (12.1) introduces the concept of *temporal\
    \ validity*. Using two DATE or TIMESTAMP columns in your table, Oracle Database\
    \ can determine if a record should be returned in the result set of a query or\
    \ not. They can be existing columns, or they can be created automatically when\
    \ creating the validity period.\n\nSuppose you create a table of Formula 1 drivers\
    \ and their contracts. Create a table using the data available. This doesn’t mean\
    \ the result is correct, but it does for the example.\n\nOur assumptions are as\
    \ follows.\n\n*   The first race of a driver for a certain constructor is the\
    \ start of the contract.\n\n*   The last race of a driver for a certain constructor\
    \ is the end of the contract.\n\n*   Only show contracts since 1965 (before that,\
    \ the data available is not accurate enough).\n\nYou can take two approaches in\
    \ this case. Create a table with `driverid` and `constructorid`, add a period\
    \ for the contract, which automatically adds a start and an end date column, and\
    \ then use the query to fill the table.\n\nThe other possibility is to create\
    \ the table with the start and end date columns already in place (e.g., by running\
    \ a **C**reate **T**able **A**s **S**elect statement) and then add the period\
    \ for the contract using the existing columns.\n\nThe main difference between\
    \ these two approaches is that when the columns are automatically created, they\
    \ are created as invisible columns, which are not visible when describing the\
    \ table. The names of the newly created columns are `<periodname>_start` and `<periodname>_end`.\n\
    \nThe check constraint created when adding a period to a table checks if the period’s\
    \ start date is less than the end date. If either one of the values is NULL, then\
    \ the constraint is also considered to be valid.\n\nUsing the script in Listing\
    \ [18-1](#536316_1_En_18_Chapter.xhtml#PC1), create the table and add the validity\
    \ period.\n\n```\ncreate table driverconstructors as\nwith resultrace as\n( select\
    \ rsl.driverid\n, rsl.constructorid\n, rcs.year\n, rcs.round\n, rcs.race_date\n\
    from   f1data.results rsl\njoin   f1data.races   rcs\non     ( rsl.raceid = rcs.raceid\
    \ )\nwhere  1 = 1\nand    rcs.race_date > to_date('19650101', 'YYYYMMDD')\n)\n\
    , contractinfo as\n( select rrc.driverid\n, rrc.constructorid\n, rrc.year\n, rrc.round\n\
    , case\nwhen lag( rrc.constructorid )\nover( partition by rrc.driverid order by\
    \ year\n,round ) = rrc.constructorid\nthen\nnull\nelse\nrrc.race_date\nend begincontract\n\
    , case\nwhen lead( rrc.constructorid )\nover( partition by rrc.driverid order\
    \ by year\n,round ) = rrc.constructorid\nthen\nnull\nelse\nrrc.race_date\nend\
    \ endcontract\nfrom   resultrace rrc\n)\n, contracts as\n( select cif.driverid\n\
    , cif.constructorid\n, cif.year\n, cif.round\n, cif.begincontract\n, cif.endcontract\n\
    , sum( case\nwhen cif.begincontract is null\nthen\n\nelse\n\nend )\nover ( partition\
    \ by driverid order by year\n, round) contractnumber\nfrom   contractinfo cif\n\
    )\n, all_contracts as\n( select con.contractnumber\n, con.driverid\n, con.constructorid\n\
    , min(con.begincontract) as startcontract\n, max(con.endcontract) as endcontract\n\
    from   contracts con\ngroup  by con.driverid\n, con.constructorid\n, con.contractnumber)\n\
    select act.driverid\n, act.constructorid\n, act.startcontract\n, greatest( act.startcontract\
    \ + 1 / 24 / 60 / 60\n, act.endcontract) as endcontract\nfrom   all_contracts\
    \ act\n/\nListing 18-1\nCreate drivercontracts table\n```\n\nAfter creating the\
    \ table, add a validity period to this table, using the two existing columns:\
    \ `startcontract` and `endcontract`.\n\n```\nalter table driverconstructors add\
    \ period for drivercontract (startcontract, endcontract)\n/\n```\n\nA record falls\
    \ within the validity period if the period’s start date is less than or equal\
    \ to the appointed date *and* the period’s end date is greater than the appointed\
    \ date. NULL values for dates are considered infinitely small. For the start date,\
    \ that would be the beginning of time, or infinitely large. For the end date,\
    \ that would be the end of time.\n\n### as of Queries\n\nThe following lets you\
    \ retrieve only those records from the table valid on the date supplied.\n\n```\n\
    select ... from  as of period for  \n```\n\nUsing the period defined on the DRIVERCONSTRUCTORS\
    \ table, you can find the drivers having a contract at a certain point in time.\
    \ Let’s look at the start of the 2022 season.\n\n```\nselect d.forename as firstname\n\
    , d.surname  as lastname\n, c.name     as constructorname\nfrom   driverconstructors\
    \ as of period\nfor    drivercontract to_date( '20220320', 'YYYYMMDD' ) dc\njoin\
    \   f1data.drivers d\non     (dc.driverid = d.driverid)\njoin   f1data.constructors\
    \ c\non     (dc.constructorid = c.constructorid)\norder  by constructorname, lastname,\
    \ firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAME\n------------ ------------\
    \ ----------------\nValtteri     Bottas       Alfa Romeo\nGuanyu       Zhou  \
    \       Alfa Romeo\nPierre       Gasly        AlphaTauri\nYuki         Tsunoda\
    \      AlphaTauri\nFernando     Alonso       Alpine F1 Team\nEsteban      Ocon\
    \         Alpine F1 Team\nNico         Hülkenberg   Aston Martin\nLance      \
    \  Stroll       Aston Martin\nSebastian    Vettel       Aston Martin\nCharles\
    \      Leclerc      Ferrari\nCarlos       Sainz        Ferrari\nKevin        Magnussen\
    \    Haas F1 Team\nMick         Schumacher   Haas F1 Team\nLando        Norris\
    \       McLaren\nDaniel       Ricciardo    McLaren\nLewis        Hamilton    \
    \ Mercedes\nGeorge       Russell      Mercedes\nSergio       Pérez        Red\
    \ Bull\nMax          Verstappen   Red Bull\nAlexander    Albon        Williams\n\
    Nicholas     Latifi       Williams\n21 rows selected\n```\n\nYou can use any date\
    \ for the “as of” period, so if you would like to see the drivers at the start\
    \ of the 1998 season, the query would look like the following.\n\n```\nselect\
    \ d.forename as firstname\n, d.surname  as lastname\n, c.name     as constructorname\n\
    from   driverconstructors as of period\nfor    drivercontract to_date( '19980308',\
    \ 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non     (dc.driverid = d.driverid)\n\
    join   f1data.constructors c\non     (dc.constructorid = c.constructorid)\norder\
    \  by constructorname, lastname, firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAME\n\
    ------------ ------------ ----------------\nPedro        Diniz        Arrows\n\
    Mika         Salo         Arrows\nGiancarlo    Fisichella   Benetton\nAlexander\
    \    Wurz         Benetton\nEddie        Irvine       Ferrari\nMichael      Schumacher\
    \   Ferrari\nDamon        Hill         Jordan\nRalf         Schumacher   Jordan\n\
    David        Coulthard    McLaren\nMika         Häkkinen     McLaren\nTarso  \
    \      Marques      Minardi\nShinji       Nakano       Minardi\nEsteban      Tuero\
    \        Minardi\nOlivier      Panis        Prost\nJarno        Trulli       Prost\n\
    Jean         Alesi        Sauber\nJohnny       Herbert      Sauber\nRubens   \
    \    Barrichello  Stewart\nJan          Magnussen    Stewart\nRicardo      Rosset\
    \       Tyrrell\nToranosuke   Takagi       Tyrrell\nHeinz-Harald Frentzen    \
    \ Williams\nJacques      Villeneuve   Williams\n23 rows selected\n```\n\nTip\n\
    \nOne typical use of “as of” is to query “as of period for … sysdate” to retrieve\
    \ currently valid data."
