    During the hot rollover period, the pre- and post-upgraded applications must contain
    valid data that the users enter.


    The reverse crossedition trigger looks like the following.


    ```

    create or replace trigger driver_R3_R2_Rve_Xed

    before insert or update of first_name, last_name on "_drivers"

    for each row

    reverse crossedition

    disable

    begin

    if length (:new.first_name) > 25

    or length (:new.last_name) > 25

    then

    raise_application_error (-20000

    ,''During the hot rollover it is not possible to enter more''||

    '' than twenty-five (25) characters for the First or Last Name''

    );

    else

    :new.forename := :new.first_name;

    :new.surname := :new.last_name;

    end if;

    end driver_R3_R2_Rve_Xed;

    /

    Trigger DRIVER_R3_R2_RVE_XED compiled

    ```


    When the trigger is valid, it can be enabled.


    ```

    alter trigger driver_R3_R2_Rve_Xed enable

    /

    Trigger DRIVER_R3_R2_RVE_XED altered.

    ```


    ## Retiring Older Editions


    When the EBR exercise has been completed, it is no longer necessary to maintain
    the old version of the application. When the old application is still accessible
    to the users, there is a chance that it might still be used. This is undesirable.
    The old version of the application should be retired so that the old application
    is no longer available to the users.


    Although very uncommon, it is possible to have multiple editions running side
    by side for an extended period. The transition between the upgrade to the new
    application and the retiring of the old application should be as short as possible.


    Revoking the use privileges on the old edition from every user and role in the
    database prevents anyone from setting up a new connection. A privileged user should
    execute the following statement.


    ```

    revoke use on edition r1 from book

    /

    ```


    Editions can also be removed completely, but only when it concerns a root or leaf
    edition. Editions that have both parent and child editions can’t be dropped.


    Dropping editions, especially leaf editions, can leave behind non-editionable
    changes, such as changes to the underlying table. This also applies to changes
    in the data that have already taken place.


    Dropping a child edition can be done by issuing the following statement by a user
    that has the `drop any edition` privilege.


    ```

    drop edition r3 cascade

    /

    Edition R3 dropped.

    ```


    Remember that the table changes cannot be reverted. The edition can’t be in use
    by a session. This would result in an exception.


    Similarly, the parent edition can be dropped, although not strictly necessary.
    Having multiple retired editions doesn’t interfere with performance, as references
    are resolved at compile time. Removing all the objects from the pre-upgrade edition
    is advisable because they are no longer needed, and the crossedition triggers
    from the post-upgrade edition. This is just a matter of good housekeeping.


    ### Change Default Edition


    The default Oracle Database edition is ORA$BASE. When connecting to the database,
    and no edition is specified, it uses the default edition. Instead of changing
    the edition by issuing `alter session` commands, there is also the possibility
    of changing the default edition. Typically, the DBA takes care of the following.


    ```

    alter database default edition = r1

    /

    ```


    This changes the default edition for the entire database immediately. The `use`
    privilege is revoked from all users in the former default edition, except SYS.
    At the same time, the `use` privilege is granted to PUBLIC.


    Normal users can’t connect to ORA$BASE anymore; SYS still can. This allows changing
    the default edition back to ORA$BASE if needed.


    ## Summary


    This chapter outlines the solution to reduce, or maybe even eliminate, planned
    downtime. Until Oracle Database release 11gR2, the application incurs planned
    downtime to upgrade your custom application. EBR is solving this planned downtime
    issue. Deploying an upgraded application in the privacy of an edition is key.
    Users are switched to the post-upgraded application when the upgrade is completed
    without experiencing downtime.


    There are several levels of complexity that you can use, depending on your needs.
    From simply replacing PL/SQL objects in different editions to creating multiple
    editioning views with crossedition triggers to keep data synchronized across editions.
    The method to retire old editions was discussed as well.


    # 20. Choosing the Right Table Type


    The purpose of any database is to store data. To do this, you create tables in
    your database. Oracle Database provides many different table types, each with
    its own strengths and weaknesses.


    How the data is stored directly affects how efficiently the data is retrieved.
    It is not difficult to imagine that when data that is queried together is also
    stored together, it is faster than when data is stored all over the place. An
    efficient application starts with an efficient design.


    This chapter discusses the different table types. There is more choice than just
    the old-fashioned heap tables.'
  trans: '# 20. 选择正确的表类型


    任何数据库的目的都是存储数据。为此，你需要在数据库中创建表。Oracle 数据库提供了许多不同的表类型，每种类型都有其自身的优点和缺点。


    数据的存储方式直接影响到数据检索的效率。不难想象，当一起被查询的数据也被存储在一起时，其速度会比数据分散存储各处要快。高效的应用始于高效的设计。


    本章讨论不同的表类型。选择并不仅限于传统的堆表。


    ## 验证跨版本触发器


    以下更新展示了如何验证 `crossedition` 触发器的工作情况。


    ```sql

    alter session set edition = r1

    /

    update drivers

    set surname = surname

    where driverid = 102

    /

    commit

    /

    alter session set edition = r3

    /

    select first_name

    ,last_name

    from drivers

    where driverid = 102

    /

    FIRST_NAME      LAST_NAME

    --------------- ---------------

    Ayrton          Senna

    ```


    在较旧版本中由 DML 语句触及的记录会触发 `crossedition` 触发器，从而更新新添加的列。切换到较旧版本并执行批量更新可以同步数据，但缺点是这在软件安装过程中可能令人困惑且容易出错。


    一个更好的替代方案是保留在新版本中，并以一种特殊的方式更新底层表来触发正向 `crossedition` 触发器。


    **注意：** `Crossedition` 触发器在底层表被更新时不会触发。它们仅在更新版本化视图时才会触发。


    使用 `dbms_sql`，你可以在更新底层表时触发 `crossedition` 触发器。在 `parse` 过程中，为 `apply_crossedition_trigger`
    参数传入需要触发的 `crossedition` 触发器的名称。以下代码示例触发了 `crossedition` 触发器来更改所有新添加的列。所使用的更新语句是虚假的。


    ```sql

    declare

    c number := dbms_sql.open_cursor();

    x number;

    begin

    dbms_sql.parse

    ( c                          => c

    , language_flag              => dbms_sql.native

    , statement                  => ''update "_drivers"

    set   driverid = driverid''

    , apply_crossedition_trigger => ''DRIVER_R2_R3_FWD_XED''

    );

    x := dbms_sql.execute(c);

    dbms_sql.close_cursor(c);

    commit;

    end;

    /

    ```


    现在，从旧版本到新版本的同步已经实现，还需要添加相反方向的功能。用户可以在新应用程序中添加或更改数据，这需要反映到旧应用程序中。


    反向 `crossedition` 触发器也创建在底层表上，就像正向 `crossedition` 触发器一样。在这种情况下，反向 `crossedition`
    短语表示当在最新版本中进行更改时，触发器应触发。出于同样的原因，采用相同的策略以禁用状态创建触发器。


    列长度存在差异。旧版本中的列比新版本的短。截断名称使其适配是不可接受的。一个人的姓名不应被截断，因此这个版本引入了更改。在热切换期间，升级前和升级后的应用程序都必须包含用户输入的有效数据。


    反向 `crossedition` 触发器如下所示。


    ```sql

    create or replace trigger driver_R3_R2_Rve_Xed

    before insert or update of first_name, last_name on "_drivers"

    for each row

    reverse crossedition

    disable

    begin

    if length (:new.first_name) > 25

    or length (:new.last_name) > 25

    then

    raise_application_error (-20000

    ,''During the hot rollover it is not possible to enter more''||

    '' than twenty-five (25) characters for the First or Last Name''

    );

    else

    :new.forename := :new.first_name;

    :new.surname := :new.last_name;

    end if;

    end driver_R3_R2_Rve_Xed;

    /

    Trigger DRIVER_R3_R2_RVE_XED compiled

    ```


    当触发器有效时，可以启用它。


    ```sql

    alter trigger driver_R3_R2_Rve_Xed enable

    /

    Trigger DRIVER_R3_R2_RVE_XED altered.

    ```


    ## 退役旧版本


    当 EBR 练习完成后，就不再需要维护应用程序的旧版本了。如果用户仍能访问旧应用程序，就有可能它还会被使用。这是不希望发生的。旧版本的应用程序应该被退役，以便旧应用程序对用户不可用。


    虽然非常罕见，但多个版本并行运行较长时间是可能的。升级到新应用程序与旧应用程序退役之间的过渡应尽可能短。


    撤销数据库中每个用户和角色对旧版本的使用权限，可以防止任何人建立新连接。应由具有权限的用户执行以下语句。


    ```sql

    revoke use on edition r1 from book

    /

    ```


    版本也可以被完全移除，但仅当涉及根版本或叶版本时。同时具有父版本和子版本的版本不能被删除。


    删除版本，尤其是叶版本，可能会留下不可版本化的更改，例如对底层表的更改。这也适用于已经发生的数据更改。


    可以通过具有 `drop any edition` 权限的用户执行以下语句来删除子版本。


    ```sql

    drop edition r3 cascade

    /

    Edition R3 dropped.

    ```


    请记住，表更改无法撤销。该版本不能正被某个会话使用。否则将导致异常。


    同样，父版本也可以被删除，尽管并非绝对必要。拥有多个已退役版本不会干扰性能，因为引用是在编译时解析的。建议移除预升级版本中的所有对象，因为它们不再需要，同时移除来自后升级版本的
    `crossedition` 触发器。这只是一个良好的内务管理问题。


    ### 更改默认版本


    默认的 Oracle 数据库版本是 `ORA$BASE`。连接到数据库时，如果未指定版本，则使用默认版本。除了通过 `alter session` 命令更改版本外，也可以更改默认版本。通常，DBA
    会处理以下情况。


    ```sql

    alter database default edition = r1

    /

    ```


    这会立即更改整个数据库的默认版本。除了 `SYS` 之外，所有用户对先前默认版本的 `use` 权限都会被撤销。同时，`PUBLIC` 被授予 `use`
    权限。


    普通用户无法再连接到 `ORA$BASE`；`SYS` 仍然可以。这允许在需要时将默认版本更改回 `ORA$BASE`。


    ## 总结


    本章概述了减少甚至可能消除计划内停机时间的解决方案。在 Oracle Database 11gR2 版本之前，升级自定义应用程序会导致计划内停机。EBR 解决了这个计划内停机问题。在版本的私密空间中部署升级后的应用程序是关键。升级完成后，用户会被切换到升级后的应用程序，而不会经历停机。


    根据你的需求，你可以使用几个不同复杂度级别。从简单地在不同版本中替换 PL/SQL 对象，到创建多个带有 `crossedition` 触发器的版本化视图以保持跨版本的数据同步。本章也讨论了退役旧版本的方法。'
- fmt: '# Heap Table


    堆表（heap table）正如其名所示，所有记录都存储在一个巨大的堆中，完全没有顺序。如果从这样的表中选择行，除非在 `select` 语句中包含 `order
    by` 子句，否则无法保证返回给调用进程的行顺序。即使重复执行相同的语句，它每次可能都返回相同顺序的行。但只要表发生变化（例如由于任何DML语句或数据库重启），这个顺序就可能大不相同。除非在
    `select` 语句中显式包含 `order by` 子句，否则永远不要依赖记录返回的顺序。


    ## Index


    为了加快返回记录的速度，你可以在表的列上定义一个或多个索引。这是一个独立的数据结构，只包含感兴趣的列的数据以及指向原始记录的指针。


    假设你有一个包含过去70年F1车手的表。如果你想查找所有姓氏为 Verstappen 的车手，那么 Oracle 除了访问表中的每一行（进行全表扫描）并检查内容以满足此条件并排除不符合的记录外，别无他法。当你检查该
    `select` 语句的解释计划（explain plan）时，可以看到这一点。使用以下语句可以创建一个解释计划。


    ```sql

    explain plan for

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /

    ```


    创建解释计划后，可以通过执行以下命令来查看它。


    ```sql

    select *

    From dbms_xplan.display( ''plan_table'' )

    /

    ```


    让我们看看在 `drivers` 表中查找姓氏为 Verstappen 的车手是如何执行的。


    ```sql

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /

    ```


    查询结果：


    ```

    | Id  | Operation                   | Name    |


    |   0 | SELECT STATEMENT            |         |

    | * 1 |   TABLE ACCESS STORAGE FULL | DRIVERS |


    Predicate Information (identified by operation id):


    1 - storage("DRV"."SURNAME"=''Verstappen'')

    filter("DRV"."SURNAME"=''Verstappen'')

    ```


    当你在此列上添加一个B-tree索引时。


    ```sql

    create index ix_driversurname on drivers (surname, forename)

    /

    ```


    解释计划会发生变化。


    ```

    | Id  | Operation        | Name             |


    |   0 | SELECT STATEMENT |                  |

    |   1 |  INDEX RANGE SCAN| IX_DRIVERSURNAME |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```


    SQL引擎现在使用创建的索引来满足此查询。尽管索引建立在两个列（surname 和 forename）上，但由于你查询的是索引的引导列（leading column），它仍然可以使用。在这个小表（少于1000行）上，你可能几乎看不到执行时间的差异，但如果表更大，就能看到显著的改善。


    使用索引可以极大地加速 `select` 查询，但请注意这是有代价的。索引必须被维护。这是在执行DML的同时完成的，因此除了在表中插入数据外，还需要在索引中插入数据，这可能导致索引内容的重新排列。这需要花费时间；虽然不多，但总归是时间。如果一个表上定义了多个索引，那么所有这些索引都必须根据表的变化进行相应的更改。


    ## B-tree


    默认情况下，Oracle Database 中的索引被创建为 B-tree（或平衡树）索引。平衡树意味着从根（索引的起点）到叶（存储信息的地方）总是需要相同数量的步骤。它们可以是普通索引或唯一索引。使用唯一索引时，每个值在每个索引中最多只允许出现一次。这也是
    Oracle Database 通过在表上创建唯一索引来强制执行主键的方式。


    ## Bitmap Index


    在位图索引中，为每个索引键存储一个位图。每个索引键指向多行。以下是位图索引通常使用的场景：


    *   索引列中的不同值数量相对于表中的行数较少时，例如性别列。

    *   表不经常通过DML语句修改或是只读表时。


    位图索引主要用于数据仓库应用程序，在OLTP应用程序中并不常见。对于OLTP环境，不建议使用位图索引。对基础表的DML操作会对位图维护产生显著影响，从而直接影响应用程序。


    # Index-Organized Table (IOT)


    索引组织表在 Oracle Database 版本 8 中引入。它是索引和表的结合。普通的堆表没有隐式的排序，而这种表是一个有序的记录集合。B-tree索引只包含索引列的信息以及指向完整记录的指针，而索引组织表则将完整记录存储在索引中，无需额外的表来存储记录的其余部分。这种表最适合作为查找表使用，并且列数有限且类型简单（如
    VARCHAR2、NUMBER 和 DATE）。


    要为 drivers 创建一个索引组织表，如下所示。


    ```sql

    create table drivers_iot

    (

    driverid     number(11)    not null

    , driverref    varchar2(255)

    , drivernumber number(11)

    , code         varchar2(3)

    , forename     varchar2(255)

    , surname      varchar2(255)

    , dob          date

    , nationality  varchar2(255)

    , url          varchar2(255)

    , primary key (surname, forename)

    )

    organization index

    /

    ```


    对于堆表，你可以在表创建后定义主键。但对于索引组织表，你必须在定义表时直接提供主键。


    执行以下语句，用与 `drivers` 堆表相同的数据填充索引组织表。


    ```sql

    insert into drivers_iot (select * from drivers)

    /

    ```


    在索引组织表上运行与之前相同的 `select` 语句。


    ```sql

    select drv.forename

    , drv.surname

    from   drivers_iot drv

    where  drv.surname = ''Verstappen''

    /

    ```


    然后你可以从解释计划中看到，所有需要的数据都已经在索引中了，无需在表中进行额外的查找。


    ```

    | Id  | Operation        | Name           |


    |   0 | SELECT STATEMENT |                |

    |*  1 |  INDEX RANGE SCAN| PK_DRIVERS_IOT |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```'
  raw: '## Heap Table


    The heap table acts as you would expect from its name; all the records are in
    a giant heap with no order whatsoever. If you select rows from this table, there
    is no guarantee in which order the rows are returned to the calling process unless
    you include an `order by` clause in your `select` statement. If you execute the
    same statement repeatedly, it probably returns the rows in the same order every
    time. But as soon as the table changes, for example, because of any DML statement
    or a database restart, this order might be very different. Never rely on the order
    in which the records are returned unless you explicitly include the `order by`
    clause in your `select` statement.


    ### Index


    To speed up returning records, you can define one or more indexes on the table’s
    columns. This is a separate data structure with only the data of the column(s)
    of interest and a pointer to the original record.


    Suppose you have a table with the Formula 1 drivers of the last 70 years. If you
    want to find all the drivers with the surname Verstappen, then Oracle has no other
    option than to visit every row in the table, do a full table scan, and inspect
    the contents to satisfy this condition and eliminate the ones that don’t. This
    can be seen when you inspect the explain plan for the `select` statement. With
    the following statement, you can create an explain plan.


    ```

    explain plan for

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /

    ```


    After the explain plan is created, it can be inspected by executing the following.


    ```

    select *

    From dbms_xplan.display( ''plan_table'' )

    /

    ```


    Let’s see how the search for a driver with the surname Verstappen is found in
    the `drivers` table.


    ```

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /


    | Id  | Operation                   | Name    |


    |   0 | SELECT STATEMENT            |         |

    | * 1 |   TABLE ACCESS STORAGE FULL | DRIVERS |


    Predicate Information (identified by operation id):


    1 - storage("DRV"."SURNAME"=''Verstappen'')

    filter("DRV"."SURNAME"=''Verstappen'')

    ```


    When you add a B-tree index on this column.


    ```

    create index ix_driversurname on drivers (surname, forename)

    /

    ```


    The explain plan changes.


    ```


    | Id  | Operation        | Name             |


    |   0 | SELECT STATEMENT |                  |

    |   1 |  INDEX RANGE SCAN| IX_DRIVERSURNAME |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```


    The SQL engine now uses the index created to satisfy this query. Even though the
    index is built on two columns, surname and forename, it can still be used because
    you query the leading column of the index. On this small table (less than 1000
    rows), you probably see almost no difference in execution time, but if you have
    bigger tables, you can see considerable improvement.


    Using indexes can speed up your select queries dramatically, but be aware that
    there is a price to pay. Indexes must be maintained. This is done at the same
    time the DML is executed, so instead of just an insert in the table, there is
    also an insert into the index, which might result in a reshuffling of its contents.
    This takes up time; not much, but some. If you have more than one index defined
    on a table, then all these indexes must be changed according to the change in
    the table.


    ### B-tree


    By default, indexes in Oracle Database are created as B-tree (or balanced tree)
    indexes. A balanced tree means that it always takes the same number of steps to
    go from the root, the starting point of the index, to the leaf, where the information
    is. They can either be normal- or unique indexes. With a unique index, each value
    is allowed at most once per index. This is also how Oracle Database enforces the
    primary key by creating a unique index on the table.


    ### Bitmap Index


    In a bitmap index, a bitmap is stored for each index key. Each index key points
    to multiple rows. The following describes when bitmap indexes are typically used.


    *   When there are not many distinct values in the indexed columns, compared to
    the number of rows in the table, for example, a gender column


    *   When the table is not often modified with DML statements or is read-only.


    Bitmap indexes are mainly used in data warehouse applications and are not very
    often used in OLTP applications. For OLTP environments, it is not recommended
    to use bitmap indexes. DML on the base table has a dramatic impact on bitmap maintenance
    and, thus, a direct impact on the application.


    ## Index-Organized Table (IOT)


    The index-organized table was introduced in Oracle Database version 8\. This is
    a combination of an index and a table. Where a normal heap table has no implicit
    ordering, this kind of table is an ordered set of records. Where a B-tree index
    has just the information for the indexed column or columns in it, together with
    a pointer to the full record, the index-organized table has the full record in
    the index, with no need for an additional table to store the rest of the record.
    This kind of table is best used for tables that are used as a lookup and with
    a limited number of simple columns, like VARCHAR2, NUMBER, and DATE.


    To create an index-organized table for the drivers, it would look like the following.


    ```

    create table drivers_iot

    (

    driverid     number(11)    not null

    , driverref    varchar2(255)

    , drivernumber number(11)

    , code         varchar2(3)

    , forename     varchar2(255)

    , surname      varchar2(255)

    , dob          date

    , nationality  varchar2(255)

    , url          varchar2(255)

    , primary key (surname, forename)

    )

    organization index

    /

    ```


    For a heap table, you can define the primary key after the table has been created.
    But for an index-organized table, you must provide the primary key directly with
    the table definition.


    The following statement is executed to fill the index-organized table with the
    same data as the `drivers` heap table.


    ```

    insert into drivers_iot (select * from drivers)

    /

    ```


    Running the same `select` statement as before, but now on the index-organized
    table.


    ```

    select drv.forename

    , drv.surname

    from   drivers_iot drv

    where  drv.surname = ''Verstappen''

    /

    ```


    Then you can see from the explain plan that all the data needed is already in
    the index. There is no need for an extra lookup in a table.


    ```


    | Id  | Operation        | Name           |


    |   0 | SELECT STATEMENT |                |

    |*  1 |  INDEX RANGE SCAN| PK_DRIVERS_IOT |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```'
  trans: '

    # 堆表


    堆表（heap table）正如其名所示，所有记录都存储在一个巨大的堆中，完全没有顺序。如果从这样的表中选择行，除非在 `select` 语句中包含 `order
    by` 子句，否则无法保证返回给调用进程的行顺序。即使重复执行相同的语句，它每次可能都返回相同顺序的行。但只要表发生变化（例如由于任何 DML 语句或数据库重启），这个顺序就可能大不相同。除非在
    `select` 语句中显式包含 `order by` 子句，否则永远不要依赖记录返回的顺序。


    ## 索引


    为了加快返回记录的速度，你可以在表的列上定义一个或多个索引。这是一个独立的数据结构，只包含感兴趣的列的数据以及指向原始记录的指针。


    假设你有一个包含过去 70 年 F1 车手的表。如果你想查找所有姓氏为 Verstappen 的车手，那么 Oracle 除了访问表中的每一行（进行全表扫描）并检查内容以满足此条件并排除不符合的记录外，别无他法。当你检查该
    `select` 语句的解释计划（explain plan）时，可以看到这一点。使用以下语句可以创建一个解释计划。


    ```sql

    explain plan for

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /

    ```


    创建解释计划后，可以通过执行以下命令来查看它。


    ```sql

    select *

    From dbms_xplan.display( ''plan_table'' )

    /

    ```


    让我们看看在 `drivers` 表中查找姓氏为 Verstappen 的车手是如何执行的。


    ```sql

    select drv.forename

    , drv.surname

    from   drivers drv

    where  drv.surname = ''Verstappen''

    /

    ```


    查询结果：


    ```

    | Id  | Operation                   | Name    |


    |   0 | SELECT STATEMENT            |         |

    | * 1 |   TABLE ACCESS STORAGE FULL | DRIVERS |


    Predicate Information (identified by operation id):


    1 - storage("DRV"."SURNAME"=''Verstappen'')

    filter("DRV"."SURNAME"=''Verstappen'')

    ```


    当你在此列上添加一个 B-tree 索引时。


    ```sql

    create index ix_driversurname on drivers (surname, forename)

    /

    ```


    解释计划会发生变化。


    ```

    | Id  | Operation        | Name             |


    |   0 | SELECT STATEMENT |                  |

    |   1 |  INDEX RANGE SCAN| IX_DRIVERSURNAME |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```


    SQL 引擎现在使用创建的索引来满足此查询。尽管索引建立在两个列（surname 和 forename）上，但由于你查询的是索引的引导列（leading column），它仍然可以使用。在这个小表（少于
    1000 行）上，你可能几乎看不到执行时间的差异，但如果表更大，就能看到显著的改善。


    使用索引可以极大地加速 `select` 查询，但请注意这是有代价的。索引必须被维护。这是在执行 DML 的同时完成的，因此除了在表中插入数据外，还需要在索引中插入数据，这可能导致索引内容的重新排列。这需要花费时间；虽然不多，但总归是时间。如果一个表上定义了多个索引，那么所有这些索引都必须根据表的变化进行相应的更改。


    ## B-tree


    默认情况下，Oracle Database 中的索引被创建为 B-tree（或平衡树）索引。平衡树意味着从根（索引的起点）到叶（存储信息的地方）总是需要相同数量的步骤。它们可以是普通索引或唯一索引。使用唯一索引时，每个值在每个索引中最多只允许出现一次。这也是
    Oracle Database 通过在表上创建唯一索引来强制执行主键的方式。


    ## 位图索引


    在位图索引中，为每个索引键存储一个位图。每个索引键指向多行。以下是位图索引通常使用的场景：


    *   索引列中的不同值数量相对于表中的行数较少时，例如性别列。

    *   表不经常通过 DML 语句修改或是只读表时。


    位图索引主要用于数据仓库应用程序，在 OLTP 应用程序中并不常见。对于 OLTP 环境，不建议使用位图索引。对基础表的 DML 操作会对位图维护产生显著影响，从而直接影响应用程序。


    # 索引组织表（IOT）


    索引组织表在 Oracle Database 版本 8 中引入。它是索引和表的结合。普通的堆表没有隐式的排序，而这种表是一个有序的记录集合。B-tree 索引只包含索引列的信息以及指向完整记录的指针，而索引组织表则将完整记录存储在索引中，无需额外的表来存储记录的其余部分。这种表最适合作为查找表使用，并且列数有限且类型简单（如
    VARCHAR2、NUMBER 和 DATE）。


    要为 drivers 创建一个索引组织表，如下所示。


    ```sql

    create table drivers_iot

    (

    driverid     number(11)    not null

    , driverref    varchar2(255)

    , drivernumber number(11)

    , code         varchar2(3)

    , forename     varchar2(255)

    , surname      varchar2(255)

    , dob          date

    , nationality  varchar2(255)

    , url          varchar2(255)

    , primary key (surname, forename)

    )

    organization index

    /

    ```


    对于堆表，你可以在表创建后定义主键。但对于索引组织表，你必须在定义表时直接提供主键。


    执行以下语句，用与 `drivers` 堆表相同的数据填充索引组织表。


    ```sql

    insert into drivers_iot (select * from drivers)

    /

    ```


    在索引组织表上运行与之前相同的 `select` 语句。


    ```sql

    select drv.forename

    , drv.surname

    from   drivers_iot drv

    where  drv.surname = ''Verstappen''

    /

    ```


    然后你可以从解释计划中看到，所有需要的数据都已经在索引中了，无需在表中进行额外的查找。


    ```

    | Id  | Operation        | Name           |


    |   0 | SELECT STATEMENT |                |

    |*  1 |  INDEX RANGE SCAN| PK_DRIVERS_IOT |


    Predicate Information (identified by operation id):


    1 - access("DRV"."SURNAME"=''Verstappen'')

    ```

    '
- fmt: '## Clusters


    簇是另一种存储数据的方法。一组共享相同数据块的表就是一个簇。由于这些表共享公共列，且它们的数据经常被一起引用，因此将它们的数据存储在彼此靠近的位置是一个很好的理由。当你基于一个公共字段对表进行簇化时，Oracle
    数据库会物理地将所有表中具有相同公共字段值的所有行存储在相同的数据块中。


    由于不同表的相关行存储在同一个数据块中，你将获得两个主要好处。


    - 当连接簇化表时，磁盘 `I/O` 减少，访问时间得到改善。

    - 簇键（即簇中所有表共有的列或列组）只存储一次，无论不同表中有多少行包含该值。


    因此，在簇中存储相关表和索引数据所需的存储空间可能比非簇化表格式更少。


    所有数据都位于 `F1DATA` 模式中，但让我们在 `BOOK` 模式中创建簇，然后复制行以比较存储使用情况。


    ```

    create cluster cl_f1laps

    ( raceid      number  (  11 )

    , driverid    number  (  11 )

    )

    /

    ```


    创建簇后，创建簇索引。


    ```

    create index idx_cl_f1laps

    on cluster cl_f1laps

    /

    ```


    对于创建簇索引，使用簇中指定的列。你不能指定不同的列集。使用簇不影响在簇化表上创建额外索引；它们可以像往常一样创建和删除。


    要在簇中创建表，你必须指定它们应该被创建到哪个簇中。在簇中创建表时，至少应有一个列在簇中被指定。


    让我们在同一个簇中创建 `RACES`、`DRIVERS` 和 `LAPTIMES` 表。


    ```

    create table races (

    raceid                number  (   11 ) not null

    , year                  number  (   11 ) not null

    , round                 number  (   11 ) not null

    , circuitid             number  (   11 ) not null

    , name                  varchar2(  255 )

    , race_date             date             not null

    , time                  date

    , url                   varchar2(  255 )

    , fp1_date              date

    , fp1_time              date

    , fp2_date              date

    , fp2_time              date

    , fp3_date              date

    , fp3_time              date

    , quali_date            date

    , quali_time            date

    , sprint_date           date

    , sprint_time           date

    , constraint pk_races

    primary key (raceid)

    , constraint uk_races_url

    unique      (url)

    )

    cluster cl_f1laps( raceid )

    /

    create table drivers

    (

    driverid              number  (  11 ) not null

    , driverref             varchar2( 255 )

    , driver_number         number  (  11 )

    , code                  varchar2(   3 )

    , forename              varchar2( 255 )

    , surname               varchar2( 255 )

    , dob                   date

    , nationality           varchar2( 255 )

    , url                   varchar2( 255 )

    , constraint pk_drivers

    primary key ( driverid )

    )

    cluster cl_f1laps ( driverid )

    /

    create table laptimes (

    raceid                number  (   11 ) not null

    , driverid              number  (   11 ) not null

    , lap                   number  (   11 ) not null

    , position              number  (   11 ) default null

    , time                  varchar2(  255 ) default null

    , milliseconds          number  (   11 ) default null

    , constraint pk_laptimes

    primary key (raceid,driverid,lap)

    , constraint fk_laptimes_races

    foreign key (raceid)

    references races (raceid)

    , constraint fk_laptimes_drivers

    foreign key (driverid)

    references drivers (driverid)

    )

    cluster cl_f1laps ( raceid, driverid )

    /

    ```


    现在将数据从 `F1DATA` 模式复制到我们的表中，以比较查询计划。


    ```

    insert into races

    select raceid

    , year

    , round

    , circuitid

    , name

    , race_date

    , time

    , url

    , fp1_date

    , fp1_time

    , fp2_date

    , fp2_time

    , fp3_date

    , fp3_time

    , quali_date

    , quali_time

    , sprint_date

    , sprint_time

    from   f1data.races

    /

    insert into drivers

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    from f1data.drivers

    /

    insert into laptimes

    select raceid

    , driverid

    , lap

    , position

    , time

    , milliseconds

    from   f1data.laptimes

    /

    ```


    比较两个模式之间的磁盘大小时，你可以看到对于相同的信息量，簇化表占用的空间更小。


    以下是 `BOOK` 模式中的情况。


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    以下是 `F1DATA` 模式中的情况。


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    当查询这些表时，优化器可以减少访问的块数，因为簇中表的数据位于磁盘上的同一个块中。


    你不应该对频繁单独访问的表使用簇。那会违背其目的。


    ## Temporary Table


    Oracle 数据库 `8i` 引入了 `temporary table`，它在一个事务`或`一个会话期间保存数据，并且其数据对并发运行在数据库中的其他会话是不可见的。它被称为全局的，但这是因为表的定义是全局的。Oracle
    数据库 `18c` 版本引入了私有临时表，其表的定义仅限于创建它的会话。'
  raw: '## Clusters


    A cluster is another method of storing data. A group of tables that share the
    same data blocks is a cluster. Because the tables share common columns and their
    data is often referenced together, it is a good argument to store their data close
    to each other. When you cluster tables based on a common field, Oracle Database
    physically stores all rows from all the tables with the same value in the common
    field in the same data blocks.


    Because the related rows of different tables are stored in the same data block,
    you’ll get two primary benefits.


    *   Disk I/O is reduced, and the access time is improved when joining clustered
    tables.


    *   The cluster key, which is the column or group of columns all tables in the
    cluster have in common, is stored only once, no matter how many rows in different
    tables contain the value.


    Therefore, less storage might be required to store the related table and index
    data in a cluster than in a non-clustered table format.


    All the data is available in the F1DATA schema, but let’s create the cluster in
    the schema (BOOK) and then copy the rows to compare the storage usage.


    ```

    create cluster cl_f1laps

    ( raceid      number  (  11 )

    , driverid    number  (  11 )

    )

    /

    ```


    After creating the cluster, create the cluster index.


    ```

    create index idx_cl_f1laps

    on cluster cl_f1laps

    /

    ```


    For creating a cluster index, the columns specified in the cluster are used. You
    cannot specify a different set of columns. Using clusters does not affect the
    creation of additional indexes on the clustered tables; they can be created and
    dropped as usual.


    To create tables in the cluster, you have to specify in which cluster they should
    be created. When creating a table in a cluster, at least one of the columns should
    be specified in the cluster.


    Let’s create the `RACES`, `DRIVERS` and `LAPTIMES` table in the same cluster.


    ```

    create table races (

    raceid                number  (   11 ) not null

    , year                  number  (   11 ) not null

    , round                 number  (   11 ) not null

    , circuitid             number  (   11 ) not null

    , name                  varchar2(  255 )

    , race_date             date             not null

    , time                  date

    , url                   varchar2(  255 )

    , fp1_date              date

    , fp1_time              date

    , fp2_date              date

    , fp2_time              date

    , fp3_date              date

    , fp3_time              date

    , quali_date            date

    , quali_time            date

    , sprint_date           date

    , sprint_time           date

    , constraint pk_races

    primary key (raceid)

    , constraint uk_races_url

    unique      (url)

    )

    cluster cl_f1laps( raceid )

    /

    create table drivers

    (

    driverid              number  (  11 ) not null

    , driverref             varchar2( 255 )

    , driver_number         number  (  11 )

    , code                  varchar2(   3 )

    , forename              varchar2( 255 )

    , surname               varchar2( 255 )

    , dob                   date

    , nationality           varchar2( 255 )

    , url                   varchar2( 255 )

    , constraint pk_drivers

    primary key ( driverid )

    )

    cluster cl_f1laps ( driverid )

    /

    create table laptimes (

    raceid                number  (   11 ) not null

    , driverid              number  (   11 ) not null

    , lap                   number  (   11 ) not null

    , position              number  (   11 ) default null

    , time                  varchar2(  255 ) default null

    , milliseconds          number  (   11 ) default null

    , constraint pk_laptimes

    primary key (raceid,driverid,lap)

    , constraint fk_laptimes_races

    foreign key (raceid)

    references races (raceid)

    , constraint fk_laptimes_drivers

    foreign key (driverid)

    references drivers (driverid)

    )

    cluster cl_f1laps ( raceid, driverid )

    /

    ```


    Now copy the data from the F1DATA schema into our tables to compare the query
    plans.


    ```

    insert into races

    select raceid

    , year

    , round

    , circuitid

    , name

    , race_date

    , time

    , url

    , fp1_date

    , fp1_time

    , fp2_date

    , fp2_time

    , fp3_date

    , fp3_time

    , quali_date

    , quali_time

    , sprint_date

    , sprint_time

    from   f1data.races

    /

    insert into drivers

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    from f1data.drivers

    /

    insert into laptimes

    select raceid

    , driverid

    , lap

    , position

    , time

    , milliseconds

    from   f1data.laptimes

    /

    ```


    When comparing the size of the disk between the two schemas, you can see that
    the clustered tables take up less space for the same amount of information.


    The following is in the BOOK schema.


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    The following is in the F1DATA schema.


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    When querying these tables, the optimizer can save on the number of blocks accessed
    because the data for the tables in the cluster are in the same block on disk.


    You should not use clusters for tables that are frequently accessed individually.
    That would defeat its purpose.


    ## Temporary Table


    Oracle Database 8i introduced the *temporary table*, which holds data for the
    length of a transaction *or* a session, and its data is invisible to other sessions
    concurrently running in the database. It is called global, but that is because
    the definition of the table is global. Oracle Database version 18c introduces
    the private temporary table where the definition of the table is limited to the
    session that created it.'
