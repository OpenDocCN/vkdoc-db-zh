    ### subprogram


    The `utl_call_stack.subprogram` function returns a varray with all the individual
    names of programs starting at the level you pass as a parameter. Level 1 is the
    current program, level 2 is the “parent” program, and so on. The varray is filled
    from the bottom up, where the current program is the last item in the varray.


    To demonstrate the workings of this function, replace


    ```

    -----8<-replace-start------

    null;

    ------8<-replace-end------

