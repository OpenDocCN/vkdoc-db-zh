    ```


    We prefer to use a searched case statement. When there is no match (an unknown
    file was uploaded), it raises a CASE_NOT_FOUND exception. This can be handled
    and provide feedback to the application that an incorrect file was uploaded.


    After a match is found, the file can finally be processed. You need a separate
    procedure to extract the relevant information for each file type.


    You can retrieve all data from the uploaded file using the `parse` function from
    the APEX_DATA_PARSER package. Up to 300 columns are supported.


    Listing [15-14](#536316_1_En_15_Chapter.xhtml#PC33) shows how to use the `parse`
    function to insert the relevant data into `DESTINATION_TBL`.


    ```

    insert into destination_tbl

    (date_

    ,payment_method

    ,currency

    ,amount

    ,status

    ,description

    )

    select to_date (col001, ''yyyy-mm-dd hh24:mi:ss'')

    ,col002

    ,col003

    ,col004

    ,col005

    ,col007

    from temp_files tf

    cross

    join table (apex_data_parser.parse

    (p_content   => tf.blob_content

    ,p_file_name => tf.filename

    ,p_skip_rows => 1 -- skip the header line

    ))

    where tf.id = p_id;

    Listing 15-14

    Move the data from the file into the table

    ```


    This gives you an impression of what is possible with the `apex_data_parser,`
    but it can be even more flexible. In the file profile, which you get from the
    `discover` function, there is also information about the format mask used in the
    column and the decimal character used. This information can convert the data from
    the file into the correct data in the database.


    Tip


    Using the `validate_conversion` function, you can determine if an expression can
    be converted to a specified data type. Also, the `default on conversion error`
    of `to_date` and `to_number` can help in this respect.


    ## Working with ZIP Files


    The previous section discussed uploading files to the database, but for a user
    of the application, this can be quite tedious. In those situations, it might be
    beneficial that the user can upload ZIP files containing all the files that need
    to be uploaded to the database.


    The other way around is also true. When the user wants to download multiple files
    from the database, it is more efficient to download a single ZIP file instead
    of ten separate files.'
  trans: '

    ## 业务案例


    本节中的示例是一个业务案例的一部分。我们应用的用户可以将 CSV 文件上传到数据库。这些文件存储在一个 `BLOB` 列中。在此案例中，保存已上传文件的 `TEMP_FILES`
    表包含表 15-1 中概述的列。


    **表 15-1**


    **TEMP_FILES 表中的列**


    | 列名 | 用途 |

    | --- | --- |

    | ID | 用于识别要处理文件的主键 |

    | Filename | 已上传文件的名称，应包含文件扩展名 |

    | Mime_type | Mime 类型，在此案例中应为 "text/csv" |

    | Blob_content | 以二进制格式存储的已上传文件 |


    **注意**


    文件扩展名被 `APEX_DATA_PARSER` 包用于识别应如何解析文件。在此案例中，文件名应以 `.csv` 为后缀。


    这些文件包含支付数据，例如 `payment_date`、`payment_method`、`currency`、`amount` 等。CSV 文件中使用的分隔符可能各不相同；有时是逗号，有时是分号。有些文件的标题行带引号；有些则不带。


    由于应用允许上传不同的文件，每个文件的结构可能差异很大。文件中的标题行决定了你应如何使用其中的数据。文件中可能包含比你需要的多得多的列，但这些列可以忽略。


    对于每个文件，你都知道相关信息在哪里可以找到。


    一个名为 `DESTINATION_TBL` 的目标表用于存储解析后的数据。


    你需要处理许多变化；实现这一点绝非易事。


    ### 让我们开始解析吧！


    实现需求的第一步是确定你正在处理哪种变化的支付文件。


    因为文件的变化种类是有限的，所以在此案例中，你可以为每个已知的标题行结构定义常量。清单 15-12 定义了两种不同标题的常量：一个是 Mollie 文件的，另一个是
    PayPal 文件的。常量的数据类型是 `apex_t_varchar2`，这是一种嵌套表类型。即使文件中的每一列并不都用于提取数据，你仍然需要在常量中声明它们。如你所见，这两种文件的结构差异很大。


    ```sql

    l_mollie_headers constant apex_t_varchar2

    := apex_t_varchar2

    (''DATE_''

    ,''PAYMENT_METHOD''

    ,''CURRENCY''

    ,''AMOUNT''

    ,''STATUS''

    ,''ID''

    ,''DESCRIPTION''

    ,''CONSUMER_NAME''

    ,''CONSUMER_BANK_ACCOUNT''

    ,''CONSUMER_BIC''

    ,''SETTLEMENT_CURRENCY''

    ,''SETTLEMENT_AMOUNT''

    ,''SETTLEMENT_REFERENCE''

    ,''AMOUNT_REFUNDED''

    );

    l_paypal_headers constant apex_t_varchar2

    := apex_t_varchar2

    (''DATE_''

    ,''TIME''

    ,''TIME_ZONE''

    ,''DESCRIPTION''

    ,''CURRENCY''

    ,''GROSS''

    ,''FEE''

    ,''NET''

    ,''BALANCE''

    ,''TRANSACTION_ID''

    ,''FROM_EMAIL_ADDRESS''

    ,''NAME''

    ,''BANK_NAME''

    ,''BANK_ACCOUNT''

    ,''SHIPPING_AND_HANDLING_AMOUNT''

    ,''SALES_TAX''

    ,''INVOICE_ID''

    ,''REFERENCE_TXN_ID''

    );

    ```


    *清单 15-12*

    *用于不同文件头的常量*


    下一步是从上传的 CSV 文件中提取第一行，即标题行。这个文件标题存储在一个局部变量中，也是一个 `apex_t_varchar2` 类型。


    你可以使用 `APEX_DATA_PARSER` 包中的 `discover` 函数来识别你正在处理的文件。该函数返回一个 `CLOB` 值，其中包含文件的列配置信息。你可以通过将此配置信息传递给
    `get_columns` 函数来获取有关列的信息，例如以下内容。


    - 列位置

    - 列名

    - 数据类型

    - 格式掩码


    使用一个简单的 select 语句，你可以提取清单 15-13 中显示的信息。参数是 `P_ID`。它需要你想要处理的已上传文件的主键。


    ```sql

    select column_name

    bulk collect

    into l_file_headers

    from temp_files tf

    cross

    join table (apex_data_parser.get_columns

    (apex_data_parser.discover

    (p_content   => tf.blob_content

    ,p_file_name => tf.filename

    )))

    where tf.id = p_id;

    ```


    *清单 15-13*

    *从文件中提取列名*


    **提示**


    清单 15-13 中的 `table` 运算符自 Oracle Database 12.2 起已是可选的。你不再需要使用它。但它可以使你的代码更易读、更容易理解。


    一旦你获得了文件的配置信息以及该文件中的列名，你就可以将其与预定义的文件模式（之前声明的常量）进行比较。


    ```sql

    case l_file_headers

    when l_mollie_headers

    then

    process_mollie;

    when l_paypal_headers

    then

    process_paypal;

    end case;

    ```


    我们更倾向于使用搜索式 case 语句。当没有匹配项时（上传了未知文件），它会引发 `CASE_NOT_FOUND` 异常。这个异常可以被捕获，并向应用提供反馈，告知上传了错误的文件。


    找到匹配项后，文件终于可以开始处理了。你需要为每种文件类型编写单独的 procedure 来提取相关信息。


    你可以使用 `APEX_DATA_PARSER` 包中的 `parse` 函数从上传的文件中检索所有数据。最多支持 300 列。


    清单 15-14 展示了如何使用 `parse` 函数将相关数据插入到 `DESTINATION_TBL` 中。


    ```sql

    insert into destination_tbl

    (date_

    ,payment_method

    ,currency

    ,amount

    ,status

    ,description

    )

    select to_date (col001, ''yyyy-mm-dd hh24:mi:ss'')

    ,col002

    ,col003

    ,col004

    ,col005

    ,col007

    from temp_files tf

    cross

    join table (apex_data_parser.parse

    (p_content   => tf.blob_content

    ,p_file_name => tf.filename

    ,p_skip_rows => 1 -- 跳过标题行

    ))

    where tf.id = p_id;

    ```


    *清单 15-14*

    *将数据从文件移动到表中*


    这让你对 `apex_data_parser` 的功能有了初步了解，但它还可以更加灵活。在你从 `discover` 函数获取的文件配置信息中，还包含有关列中使用的格式掩码和小数字符的信息。这些信息可以将文件中的数据转换为数据库中的正确数据。


    **提示**


    使用 `validate_conversion` 函数，你可以确定一个表达式是否可以转换为指定的数据类型。此外，`to_date` 和 `to_number`
    的 `default on conversion error` 子句在这方面也能提供帮助。


    ## 处理 ZIP 文件


    上一节讨论了将文件上传到数据库，但对于应用用户来说，这可能相当繁琐。在这些情况下，如果用户能够上传包含所有需要上传到数据库的文件的 ZIP 文件，可能会更有益。


    反之亦然。当用户想要从数据库下载多个文件时，下载单个 ZIP 文件比下载十个单独的文件更有效率。

