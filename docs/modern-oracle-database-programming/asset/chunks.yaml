    fetch  first 2 rows only

    ) dsg

    where  drv.driverid in (0, 855, 854, 840, 852, 848, 849)

    order  by driverid desc

    /

    DRIVERID DRIVER                 POINTS

    ---------- ------------------ ----------

    855 Guanyu Zhou                 5

    855 Guanyu Zhou                 5

    854 Mick Schumacher             4

    852 Yuki Tsunoda               32

    852 Yuki Tsunoda               20

    849 Nicholas Latifi             7

    849 Nicholas Latifi             7

    848 Alexander Albon           105

    848 Alexander Albon            93

    840 Lance Stroll               75

    840 Lance Stroll               74

    0 Alex Nuijten

    12 rows selected.

    ```


    Because of the `outer apply` join, the newly added driver is also listed even
    though he has no points.


    ## Summary


    This chapter covered ANSI joins. The separation of join and filter criteria makes
    these types of joins significantly more elegant than the traditional method of
    joining tables. There will always be a discussion between developers on the benefits
    of one over the other, and it will always be a matter of preference. Choose what
    you’re most comfortable with but know the possibilities of ANSI joins and know
    how to interpret and apply them when needed. Once you embrace ANSI joins, you
    will never go back.


    There is one thing that both sides of the discussion can hopefully agree upon:
    don’t mix the traditional syntax with ANSI joins in a single query.


    # 4. Finding Patterns


    Oracle Database 12c introduced row pattern matching, where it is possible to analyze
    patterns in sets of data. The `match_recognize` clause implements this. To a certain
    extent, analytic functions can also be used to do some rudimentary pattern matching,
    but it has its limitations. Other workarounds to find patterns in a sequence of
    rows were difficult to write, often hard to understand, and inefficient to execute.
    The `match_recognize` clause solves these problems using native SQL to allow pattern
    detection in data sets.


    ## Looking for Contracts


    The data model has no information about the contracts between teams and drivers.
    Maybe the contracts can be deduced by looking at the races. When a driver races
    for a particular team, you can assume there is a contract between them.


    There is information about races, drivers, and teams (constructors). The assumption
    is made that during a race, the driver was under contract by the constructor and
    that the contract starts at the first race of the season and ends with the last
    race of the season. The following query retrieves information about Kimi Räikkönen
    over the years.


    ```

    select rcs.year

    , ctr.name            as constructor

    , min (rcs.race_date) as startrace

    , max (rcs.race_date) as endrace

    from f1data.results rsl

    join f1data.races rcs

    on rsl.raceid = rcs.raceid

    join f1data.constructors ctr

    on ctr.constructorid = rsl.constructorid

    where rsl.driverid = 8 -- Kimi Räikkönen

    group by rcs.year

    ,ctr.name

    order by rcs.year

    /

    YEAR CONSTRUCTO STARTRACE ENDRACE

    ---------- ---------- --------- ---------

    2001 Sauber     04-MAR-01 14-OCT-01

    2002 McLaren    03-MAR-02 13-OCT-02

    2003 McLaren    09-MAR-03 12-OCT-03

    2004 McLaren    07-MAR-04 24-OCT-04

    2005 McLaren    06-MAR-05 16-OCT-05

    2006 McLaren    12-MAR-06 22-OCT-06

    2007 Ferrari    18-MAR-07 21-OCT-07

    2008 Ferrari    16-MAR-08 02-NOV-08

    2009 Ferrari    29-MAR-09 01-NOV-09

    2012 Lotus F1   18-MAR-12 25-NOV-12

    2013 Lotus F1   17-MAR-13 03-NOV-13

    2014 Ferrari    16-MAR-14 23-NOV-14

    2015 Ferrari    15-MAR-15 29-NOV-15

    2016 Ferrari    20-MAR-16 27-NOV-16

    2017 Ferrari    26-MAR-17 26-NOV-17

    2018 Ferrari    25-MAR-18 25-NOV-18

    2019 Alfa Romeo 17-MAR-19 01-DEC-19

    2020 Alfa Romeo 05-JUL-20 13-DEC-20

    2021 Alfa Romeo 28-MAR-21 12-DEC-21

    ```


    This result set is based on the results of the races over the years by Kimi Räikkönen
    for different constructors. His career started with Sauber, followed by McLaren,
    Ferrari, Lotus, Ferrari again, and ended with Alfa Romeo.


    The objective is to group consecutive values, meaning that when the constructor
    remains the same season after season, they collapse into a single group. The years
    when Kimi raced with McLaren would be collapsed into a single group: 2002 to 2006.


    The preceding query is the *input* to the pattern-matching `match_recognize` clause.
    In the following example, it is named `races` and used in the subquery factoring
    clause (`with` clause).


    The pattern we want groups the records based on the same constructors with respect
    to *consecutive* years. That would mean that there are two separate periods in
    which Kimi was under contract by Ferrari.


    In looking for consecutive patterns in a data set, sorting order is important.
    In this case, the sorting is done on year, which makes the most sense. This is
    implemented with `order by` in the `match_recognize` clause:


    ```

    order by year

    ```'
  trans: '


    ## 概要


    本章介绍了 ANSI 连接。将连接条件与过滤条件分开的写法，使得这类连接比传统的表连接方式更加优雅。开发者之间对于哪种方式更好的讨论会一直存在，这通常也取决于个人偏好。请根据你最熟悉的方式选择，但要了解
    ANSI 连接的可能性，并知道在需要时如何解读和应用它们。一旦你习惯了 ANSI 连接，就再也不想回去了。


    有一点希望持不同意见的双方都能认同：**不要**在同一个查询中混合使用传统语法和 ANSI 连接。


    # 4. 发现模式


    Oracle Database 12c 引入了行模式匹配功能，可以对数据集中的模式进行分析。`match_recognize`子句实现了这一点。在某种程度上，分析函数也可用于进行一些基本的模式匹配，但这有其局限性。过去在行序列中寻找模式的其他变通方法编写困难，往往难以理解且执行效率低下。`match_recognize`子句使用原生
    SQL 解决了这些问题，允许在数据集中进行模式检测。


    ## 寻找合同


    数据模型中没有关于车队与车手之间合同的信息。或许可以通过观察比赛来推断合同。当一名车手为某支车队比赛时，你可以假设他们之间存在合同。


    现有的信息包括比赛、车手和车队（制造商）。这里做出的假设是：在一场比赛期间，车手受雇于制造商，合同从赛季第一场比赛开始，到赛季最后一场比赛结束。以下查询检索了历年关于基米·莱科宁的信息。


    ```

    select rcs.year

    , ctr.name            as constructor

    , min (rcs.race_date) as startrace

    , max (rcs.race_date) as endrace

    from f1data.results rsl

    join f1data.races rcs

    on rsl.raceid = rcs.raceid

    join f1data.constructors ctr

    on ctr.constructorid = rsl.constructorid

    where rsl.driverid = 8 -- Kimi Räikkönen

    group by rcs.year

    ,ctr.name

    order by rcs.year

    /

    YEAR CONSTRUCTO STARTRACE ENDRACE

    ---------- ---------- --------- ---------

    2001 Sauber     04-MAR-01 14-OCT-01

    2002 McLaren    03-MAR-02 13-OCT-02

    2003 McLaren    09-MAR-03 12-OCT-03

    2004 McLaren    07-MAR-04 24-OCT-04

    2005 McLaren    06-MAR-05 16-OCT-05

    2006 McLaren    12-MAR-06 22-OCT-06

    2007 Ferrari    18-MAR-07 21-OCT-07

    2008 Ferrari    16-MAR-08 02-NOV-08

    2009 Ferrari    29-MAR-09 01-NOV-09

    2012 Lotus F1   18-MAR-12 25-NOV-12

    2013 Lotus F1   17-MAR-13 03-NOV-13

    2014 Ferrari    16-MAR-14 23-NOV-14

    2015 Ferrari    15-MAR-15 29-NOV-15

    2016 Ferrari    20-MAR-16 27-NOV-16

    2017 Ferrari    26-MAR-17 26-NOV-17

    2018 Ferrari    25-MAR-18 25-NOV-18

    2019 Alfa Romeo 17-MAR-19 01-DEC-19

    2020 Alfa Romeo 05-JUL-20 13-DEC-20

    2021 Alfa Romeo 28-MAR-21 12-DEC-21

    ```


    这个结果集基于基米·莱科宁历年为不同制造商参赛的成绩。他的职业生涯始于索伯车队，随后是迈凯伦、法拉利、路特斯、再次法拉利，最后在阿尔法·罗密欧结束。


    目标是对连续的值进行分组，即当制造商在连续多个赛季中保持不变时，将它们折叠成一个单一的组。基米在迈凯伦比赛的那些年（2002 年至 2006 年）将被折叠成一个组。


    前面的查询是模式匹配`match_recognize`子句的*输入*。在下面的例子中，它被命名为`races`，并用于子查询因子化子句（`with`子句）中。


    我们想要的模式是基于*连续*年份中相同的制造商对记录进行分组。这意味着基米曾为法拉利效力的两个独立时期将被识别出来。


    在数据集中寻找连续模式时，排序顺序很重要。在这个例子中，按年份排序是最合理的。这在`match_recognize`子句中通过`order by`来实现：


    ```

    order by year

    ```


