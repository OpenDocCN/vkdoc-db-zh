- fmt: '### Handling Errors in JSON Path Expressions


    Each step in the JSON path expression is attempted to match. When a matching step
    fails, the other steps are not evaluated, and the JSON path expression fails.
    Even though the JSON path expression fails, the query is still executed successfully
    by default. For the failed JSON path expression, a `NULL` is returned. This means
    that when you see a `NULL`. As a result, it could mean that the JSON path expression
    fails (there might be an error in it), or it could mean that the attribute *does*
    exist but has the value of `NULL`.


    #### Error Clauses


    Depending on the error clause (available with the `json_value()`, `json_query()`,
    and `json_table()` functions), the returned value is either a `NULL` or a specific
    error message or possibly a default value. Not all SQL functions have the same
    options; for example, `json_query()` doesn’t allow defining a default value.


    The following examples attempt to extract a value from a non-existing node in
    the JSON document with different error clauses. First, with the default error
    clause, which is `null on error`, no exception is raised; instead, a `NULL` is
    returned.


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    null on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    ---------

    ```


    With the error clause set to `error on error`, the statement fails with an exception
    stating that the `json_value()` function evaluated to no value.


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    error on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    Error starting at line : 1 in command -

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    error on error

    ) as nothing

    from f1_drivers_json f

    Error report -

    ORA-40462: JSON_VALUE evaluated to no value

    ```


    For some SQL functions it is also possible to define a default value when an error
    is encountered. The default value must be a constant. An example of using `default
    <constant> on error` is in the following statement.


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    default ''node does not exist'' on error

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    ---------------------------------

    node does not exist

    ```


    An error is also raised when the used function expects a scalar value, but multiple
    values are targeted by the JSON path expression.


    #### Handling Empty Results


    A missing attribute is a special case that is handled by the `on error` clause
    but can also be handled by the `on empty` clause. The `on empty` clause precedes
    the `on error` clause when both are present. The following statement targets a
    non-existing attribute in the JSON document and has both an `on error` and an
    `on empty` clause.


    ```sql

    select json_value (

    f.json_document

    ,''$.MRData.non_existing_node''

    default ''node error'' on error

    default ''node empty'' on empty

    ) as nothing

    from f1_drivers_json f

    /

    ```


    ```

    NOTHING

    -----------

    node empty

    ```


    #### Handling Type Mismatches


    When an item method is applied, and there is an attempt to convert the selected
    JSON value to an incompatible SQL data type, this could also raise an error. There
    is also a special clause for this situation: `on mismatch`. In the following example,
    the `Driver` code is attempted to be converted to a SQL `NUMBER` type using the
    `number()` item method. The `on mismatch` clause overrides the `on error` clause
    when both are present.


    ```sql

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code.number()''

    default ''-10'' on error

    error on mismatch

    )

    from f1_drivers_json f

    /

    ```


    ```

    Error starting at line : 1 in command -

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code.number()''

    default ''-10'' on error

    error on mismatch

    )

    from f1_drivers_json f

    Error report -

    ORA-01722: invalid number

    ```


    ## Dot Notation


    The easiest way to extract values from a JSON document is to use the dot notation
    syntax. The dot notation syntax uses the table alias, the JSON column name, and
    one or more field names found in the JSON document, all separated by periods.
    This can be used for JSON objects as well as JSON arrays.


    The returned value depends on the data type of the column holding the JSON document.
    When the data type of the column is `JSON`, then the returned value is an instance
    of `JSON` data type. In all other cases, it is a `VARCHAR2` value.


    The dot notation syntax can *only* be used when a JSON document is stored in either
    of these ways.


    *   `JSON` data type

    *   `VARCHAR2`, `CLOB`, `BLOB` column, and there is an `is json` check constraint
    present

    *   `VARCHAR2`, `CLOB`, `BLOB` column and `treat (<column_name> as json)` is used
    in the query.


    ### Basic Dot Notation Examples


    Let’s start with extracting the key “series” value using the dot notation.


    ```sql

    select f.json_document."MRData"."series"

    from f1_drivers_json f

    /

    ```


    ```

    MRDATA

    -------

    "f1"

    ```


    The keys in the JSON document are case-sensitive; in earlier Oracle Database releases,
    it was therefore necessary that the keys were in quotes. In more recent releases
    of the Oracle Database (18 and higher), this is no longer needed. The case of
    the keys in the JSON must be followed. The following query omits the quotation
    marks and still yields the same results.


    ```sql

    select f.json_document.MRData.series

    from f1_drivers_json f

    /

    ```


    ```

    MRDATA

    -------

    "f1"

    ```


    For the remainder of this chapter, quotation marks are not used in the queries
    unless absolutely necessary. This might be the case when a JSON key has the same
    name as a reserved word in SQL or when there are special characters that don’t
    work well with SQL, like the asterisk.


    **Caution**: When you are using a formatter to format your code, pay attention
    to what happens with your queries that use JSON path expressions. When all text
    is converted to, let’s say, lowercase, the query might no longer give you the
    results that it originally did.


    The result returned from the query is of data type `JSON`. The database version
    used is an Oracle 21c database. The preceding query returned a JSON scalar. When
    the JSON path expression targets a single value, the returned value could either
    be a JSON scalar, object, or array. A JSON array is returned when the JSON path
    expression targets multiple values.


    Item methods discussed earlier, such as `number()`, `string()`, `size()`, can
    be used in the dot notation syntax as well.


    You convert the returned value to a corresponding SQL scalar with an item method.
    In the following query, the `series` attribute is returned as a string and the
    drivers’ `permanentNumber` as a number.


    ```sql

    select f.json_document.MRData.series.string() as serie

    ,f.json_document.MRData.DriverTable

    .Drivers.permanentNumber

    .number() as permanentnumber

    from f1_drivers_json f

    /

    ```


    ```

    SERIE      PERMANENTNUMBER

    ---------- ---------------

    f1                       5

    ```


    The preceding query “works” because only one driver in the JSON document has a
    permanent number—Vettel. This JSON scalar value can be converted to a SQL `number`
    data type.


    Let’s examine what happens when you try to extract the date of birth of both drivers
    (the drivers are in an array labeled `Drivers`) and apply the `date()` item method
    to the results. The following query shows both the JSON result (in the `j_dateofbirth`
    column) and the `date()` item method application.


    ```sql

    select f.json_document.MRData

    .DriverTable.Drivers.dateOfBirth as j_dateOfBirth

    ,f.json_document.MRData

    .DriverTable.Drivers.dateOfBirth.date() as dateOfBirth

    from f1_drivers_json f

    /

    ```


    ```

    J_DATEOFBIRTH                  DATEOFBIR

    ------------------------------ ---------

    ["1971-03-27","1987-07-03"]

    ```'
