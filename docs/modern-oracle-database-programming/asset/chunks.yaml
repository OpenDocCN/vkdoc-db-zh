    #### indices of


    If you have a sparse collection (i.e., some elements are missing in the range),
    you can use the `indices of` option. Unlike the previous example, where you did
    not select the drivers with no fixed `driver_number` in the first place, you now
    select all the drivers from the database into our collection.


    ```

    open c_drivers;

    fetch c_drivers

    bulk  collect into l_drivers;

    close c_drivers;

    ```


    Then remove the drivers with no fixed `driver_number` from the collection, creating
    a sparse collection.


