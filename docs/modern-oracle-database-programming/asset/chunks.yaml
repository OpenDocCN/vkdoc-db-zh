    ## DBMS_UTILITY


    The utility package contains various utility routines, like `compile_schema`,
    `format_call_stack`, and `expand_sql_text`. The `compile_schema` is useful after
    upgrading the application to ensure that the code base is recompiled when needed.
    Inspecting related to a view or nested views can easily be done with `expand_sql_text`.
    This eliminates the need to inspect the source code manually.


    ### compile_schema


    The `compile_schema` procedure is not a procedure you want to call during the
    execution of your program but rather a procedure you want to call after installing
    a new version of your codebase. It compiles all procedures, functions, packages,
    and triggers in the specified schema. Since it is not necessary to recompile already
    valid objects, it is recommended to set the flag `compile_all` to FALSE.


    After calling this procedure, you can use the `ALL_OBJECTS` or `USER_OBJECTS`
    view to check if all objects were successfully compiled. The parameters are described
    in Table [17-1](#536316_1_En_17_Chapter.xhtml#Tab1).


    Table 17-1


    Parameters for the compile_schema Procedure


    | Parameter | Mandatory | Description |

    | --- | --- | --- |

    | schema | Y | The schema that is to be (re)compiled |

    | compile_all |   | A boolean flag indicating whether all schema objects should
    be compiled, regardless of whether the object is currently invalidThe default
    value is TRUE |

    | reuse_settings |   | A boolean flag indicating whether the session settings
    in the objects should be reused or whether the current session settings should
    be used insteadDefault value is FALSE |


    ### format_call_stack


    It can be very useful to retrieve the call stack, especially during debugging.
    The `dbms_utility.``format_call_stack` procedure returns a formatted string of
    the current call stack, including the names of private package procedures and
    functions. This string can be up to 2000 bytes in size. To demonstrate this, look
    at the package in Listing [17-4](#536316_1_En_17_Chapter.xhtml#PC23).


    Note


    Instead of writing your own parser for the call stack, look at the functionality
    available in `utl_call_stack`, later in this chapter.


    ```

    create or replace package call_stack_demo is

    procedure packageprocedure;

    end call_stack_demo;

    /

    create or replace package body call_stack_demo is

    procedure privateprocedure is

    begin

    dbms_output.put_line(''-- call stack in PRIVATEPROCEDURE --'');

    dbms_output.put_line( dbms_utility.format_call_stack );

    dbms_output.put_line(''------------------------------------'');

    end privateprocedure;

    procedure packageprocedure is

    begin

    dbms_output.put_line(''-- call stack in PACKAGEPROCEDURE --'');

    dbms_output.put_line( dbms_utility.format_call_stack );

    dbms_output.put_line(''------------------------------------'');

    privateprocedure;

    end packageprocedure;

    end call_stack_demo;

    /

    Listing 17-4

    Package to demonstrate dbms_utility.format_call_stack

    ```


    The following is the output from calling the package procedure.


    ```

    begin

    dbms_output.put_line( ''-- call stack in ANONYMOUS BLOCK    --'' );

    dbms_output.put_line( dbms_utility.format_call_stack );

    dbms_output.put_line( ''--------------------------------------'' );

    call_stack_demo.packageprocedure;

    end;

    /

    -- call stack in ANONYMOUS BLOCK    --

    ----- PL/SQL Call Stack -----

    object  line   object

    handle  number name

    0x2138aa190  3 anonymous block


    -- call stack in PACKAGEPROCEDURE --

    ----- PL/SQL Call Stack -----

    object  line   object

    handle  number name

    0x6863c2600 13 package body BOOK.CALL_STACK_DEMO.PACKAGEPROCEDURE

    0x2138aa190  5 anonymous block


    -- call stack in PRIVATEPROCEDURE --

    ----- PL/SQL Call Stack -----

    object  line   object

    handle  number name

    0x6863c2600  6 package body BOOK.CALL_STACK_DEMO.PRIVATEPROCEDURE

    0x6863c2600 15 package body BOOK.CALL_STACK_DEMO.PACKAGEPROCEDURE

    0x2138aa190  5 anonymous block


    PL/SQL procedure successfully completed

    ```


    ### format_error_stack


    Knowing the error stack when an exception occurs may be more important than retrieving
    the call stack. There are two procedures to retrieve this, `dbms_utility.``format_error_stack`,
    which includes the error code and description that occurred, and `dbms_utility.format_error_backtrace`,
    which doesn’t give you the error code, but it returns the full call stack. Not
    the procedure or function names but the line numbers where the error occurred
    or where the next procedure or function was called. To demonstrate this, look
    at the package in Listing [17-5](#536316_1_En_17_Chapter.xhtml#PC25).


    ```

    create or replace package body error_stack_demo is

    procedure privateprocedure is

    begin

    raise no_data_found;

    end privateprocedure;

    procedure packageprocedure is

    begin

    privateprocedure;

    exception

    when others

    then

    dbms_output.put_line(''-- error stack in PACKAGEPROCEDURE--'');

    dbms_output.put_line( dbms_utility.format_error_stack );

    dbms_output.put_line(''------------------------------------'');

    dbms_output.put_line(''-error backtrace in PACKAGEPROCEDURE'');

    dbms_output.put_line( dbms_utility.format_error_backtrace );

    dbms_output.put_line(''------------------------------------'');

    end packageprocedure;

    end error_stack_demo;

    /

    Listing 17-5

    Package to demonstrate the error stack procedures

    ```


    The following is the output from calling the package procedure.


    ```

    begin

    error_stack_demo.packageprocedure;

    end;

    /

    -- error stack in PACKAGEPROCEDURE--

    ORA-01403: no data found

    ORA-06512: at "BOOK.ERROR_STACK_DEMO", line 5


    -- error backtrace in PACKAGEPROCEDURE--

    ORA-06512: at "BOOK.ERROR_STACK_DEMO", line 5

    ORA-06512: at "BOOK.ERROR_STACK_DEMO", line 10


    PL/SQL procedure successfully completed

    ```


    Depending on your needs, you can use either one of these procedures.'
