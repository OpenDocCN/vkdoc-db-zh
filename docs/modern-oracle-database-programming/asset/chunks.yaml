    # 5. Pagination and Set Operators


    Working with large sets of data is quite common when an Oracle Database is involved.
    But not always should all the data be shown to the user of a database application.
    Often, only the first 50 records are enough for users to interact with. A typical
    top-N query is examined in this chapter, retrieving the first 50 records. Showing
    the following 50 records, or any offset is an example of a pagination-type query
    that also takes center stage.


    Also, in this chapter, the different set operators, getting the difference between
    multiple sets of data and the common denominators, are being looked at. In this
    area, Oracle Database 21c added more functionality to be more compliant with the
    ANSI standard.


    ## Top-N and Pagination


    Getting the first few records of a larger set, like the top 5, has always been
    possible in Oracle, but it was always a bit “clunky” and not always as straightforward
    as it could be.


    For the following examples, a view is created with the following definition.


    ```sql

    create view all_driverstandings

    as

    select rcs.year

    , rcs.round

    , cct.name

    , drs.position

    , drv.driverid

    , drv.forename ||'' ''||drv.surname as driver

    , drs.points

    , drs.wins

    from   f1data.driverstandings drs

    join   f1data.drivers drv

    on   drv.driverid = drs.driverid

    join   f1data.races rcs

    on   rcs.raceid = drs.raceid

    join   f1data.circuits cct

    on   cct.circuitid = rcs.circuitid

    /

    ```


    The `ALL_DRIVERSTANDINGS` view shows the drivers’ standing by year and round.
    The view exposes more than 33,000 records because the data goes back to the 1950s.


    The following is a first attempt at getting the first five rows in this view for
    the 2021 season and only for two drivers.


    ```sql

    select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2021

    and    driverid in (830, 844) -- Leclerc, Verstappen

    and    rownum <= 5

    order  by round

    /

    ```


    ```

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1          2 Max Verstappen             18          0

    1          6 Charles Leclerc             8          0

    2          4 Charles Leclerc            20          0

    20          1 Max Verstappen          351.5          9

    20          6 Charles Leclerc           152          0

    ```


    As you can see in the output, the result set is not correct. In the first five
    rows, there shouldn’t be data for round 20. The problem with this query is that
    the `rownum` pseudo-column is determined *before* the final sorting operation.
    When a row is considered for output as it matches the filter criteria, `rownum`
    assigns a value, starting with one. The next row that matches the filter criteria
    is assigned the value 2, and so on. No more records are selected when `rownum`
    reaches five (in the preceding query). After this step, the result set is sorted
    by round, as specified in the `order by` clause. This behavior can be observed
    in the explain plan (only the relevant parts are shown).


    ```sql

    select *

    from dbms_xplan.display_cursor(null, null, ''BASIC PREDICATE'')

    /

    ```


    ```

    PLAN_TABLE_OUTPUT


    | Id  | Operation                          | Name            |


    |   0 | SELECT STATEMENT                   |                 |

    |   1 |  SORT ORDER BY                     |                 |

    |*  2 |   COUNT STOPKEY                    |                 |

    >

    Predicate Information (identified by operation id):


    2 - filter(ROWNUM>

    ```


    The filter is applied (`rownum <= 5`) in operation ID 2. The resulting data set
    is sorted in step 1.


    To correctly get the intended output, the sorted data set needs to be pushed into
    an inline view (or in the subquery factoring clause).


    ```sql

    select *

    from   (select round

    , position

    , driver

    , points

    , wins

    from   all_driverstandings

    where  year = 2021

    and    driverid in (830, 844) -- Leclerc, Verstappen

    order  by round

    )

    where  rownum <= 5

    /

    ```


    ```

    ROU   POSITION DRIVER                 POINTS       WINS

    --- ---------- ------------------ ---------- ----------

    1          2 Max Verstappen             18          0

    1          6 Charles Leclerc             8          0

    2          4 Charles Leclerc            20          0

    2          2 Max Verstappen             43          1

    3          2 Max Verstappen             61          1

    ```


    Now the optimizer understands the intention, which is reflected in the explain
    plan (only the relevant parts are shown).


    ```

    |   0 | SELECT STATEMENT                    |

    |*  1 |  COUNT STOPKEY                      |

    |   2 |   VIEW                              |

    |*  3 |    SORT ORDER BY STOPKEY            |

    >

    Predicate Information (identified by operation id):


    1 - filter(ROWNUM>

    ```'
