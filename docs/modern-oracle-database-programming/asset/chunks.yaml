    ## SQL Macros


    Oracle Database 21c (21.1) introduced SQL Macros. It was backported to 19c (19.10)
    but only for table-type SQL Macros. With SQL Macros, you can use all the power
    of PL/SQL—including everything introduced in PTF—to create a SQL snippet at runtime,
    which is included in the SQL statement executed by the SQL engine.


    You can utilize a lot of what you learned in the PTFs in SQL Macros. Where the
    PTFs gave you access to the actual data running through the process, SQL Macros
    only offer access to manipulate the SQL statement before it gets executed. You
    call a PL/SQL function only once, before the SQL statement gets executed, and
    return a SQL fragment that gets placed in the text that gets executed. You can
    use SQL Macros to centralize functionality that you might previously have captured
    in a PL/SQL function, but without the cost of all the context switching.


    There should be no PL/SQL logic in the function; incoming string arguments are
    null. All the logic should go into the SQL expression.


    There are two types of SQL Macros: scalar and table. What is the difference?


    A table-type SQL Macro can be used in a `from` clause of a SQL statement. A scalar-type
    SQL Macro can be used everywhere else in the SQL statement, the `select` list,
    `where`, `having`, `group by,` and `order by` clauses.


    When you have a formula encapsulated in a PL/SQL function to centralize its implementation,
    and this formula could be written in pure SQL, then you have a use case for SQL
    Macros.'
