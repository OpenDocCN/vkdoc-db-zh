  trans: '

    ## 实际应用观察


    一旦所有组件准备就绪，应用程序用于将文件上传到数据库的代码就会启动整个流程。由于文件尚未被解析和处理，控制权会立即返回给应用程序用户。


    ```

    begin

    upload_file

    ( p_filename     => ''latest.csv''

    , p_mime_type    => ''text/csv''

    , p_blob_content => :file

    );

    end;

    /

    ```


    前端应用程序管理着事务。用户通过发出 `commit` 或 `rollback` 命令来控制事务的结束。


    一旦事务以 `commit` 结束，队列中的消息就会被存储，并且回调过程会被调用。


    在使用上述例程上传文件后，可以在临时表中观察到以下内容。


    ```

    select to_char (upload_ts, ''hh24:mi:ss.ff9'')    as upload_ts

    , to_char (processed_ts, ''hh24:mi:ss.ff9'') as processed_ts

    , processed_ts - upload_ts                 as elapsed_time

    from   staging

    /

    UPLOAD_TS          PROCESSED_TS       ELAPSED_TIM

    ------------------ ------------------ -----------

    12:28:54.873961000

    ```


    等待几秒钟后，可以看到以下结果。


    ```

    UPLOAD_TS          PROCESSED_TS       ELAPSED_TIME

    ------------------ ------------------ -------------------

    12:28:54.873961000 12:28:58.108458000 +00 00:00:03.234497

    ```


    当然，这很大程度上取决于数据库的“繁忙”或“空闲”程度。当数据库繁忙时，回调函数会延迟执行。没有 API 可以控制或定义并发 `PL/SQL` 通知出队进程的数量。这是因为
    `AQ` 消息可能以突发式到达，固定数量的进程可能并不总是能高效工作。`AQ` 通知会根据总工作量和执行用户定义的 `PL/SQL` 回调过程所需的时间，自动启动合适数量的后台进程（又称
    `EMON` 从属进程）。


    当消息入队时，用户 `SYS` 会在后台启动一个新会话。模块是 `DBMS_SCHEDULER`，因此这个包必然涉及该机制。操作（action）被设置为类似“`AQ$_PLSQL_NTFN_`”后跟一个数字的内容。该操作信号涉及
    `AQ` 和 `PL/SQL` 通知。这可以通过查询 `gv$session` 观察到。


    ```

    select username

    , module

    , action

    from   gv$session

    /

    USERNAME    MODULE              ACTION

    ----------- ------------------- -------------------------

    SYS         DBMS_SCHEDULER      AQ$_PLSQL_NTFN_4107371948

    ```


    ## 异常队列


    创建队列表时会自动添加一个异常队列。当在执行回调过程期间发生意外异常时，队列上的消息会被移至异常队列。


    查询 `user_queues` 数据字典视图，可以看到 `file_process_qt` 队列表中有两个队列：一个是常规队列，一个是异常队列。


    ```

    select name

    , queue_table

    , queue_type

    from   user_queues

    /

    NAME                  QUEUE_TABLE     QUEUE_TYPE

    --------------------- --------------- --------------------

    FILE_PROCESS_Q        FILE_PROCESS_QT NORMAL_QUEUE

    AQ$_FILE_PROCESS_QT_E FILE_PROCESS_QT EXCEPTION_QUEUE

    ```


    出于演示目的，对最终从回调过程调用的 `process_file` 过程进行了修改，通过在过程体中包含以下行，使其 `总是` 引发异常。


    ```

    raise zero_divide;

    ```


    此异常在 `process_file` 过程中未被处理，并传播到调用它的 `process_file_callback` 过程。由于回调过程是 `无客户端`
    调用的，因此没有客户端能观察到此异常。该消息被移至异常队列。


    这不会立即发生；系统会多次尝试成功执行该过程。这些尝试的频率以及尝试之间的延迟时间可以在创建队列时进行控制。有两个参数控制这些设置：`max_retries`
    和 `retry_delay`。如果未填写这些参数，系统将尝试执行回调过程六次，然后才将消息移至异常队列。每次尝试都会立即进行，没有延迟。


    当连续查询队列表 `file_process_qt` 时，可以观察到消息从常规队列移动到异常队列的过程。


    ```

    select qt.q_name

    , qt.msgid

    , to_char (systimestamp, ''hh24:mi:ss.ff9'') as ts

    from   file_process_qt qt

    /

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    FILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:45:55.842533000

    >

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    FILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:46:12.811844000

    >

    Q_NAME                MSGID                    TS

    --------------------- ------------------------ ------------------

    AQ$_FILE_PROCESS_QT_E ECA2CF1D94B3043FE0539518 13:46:15.315077000

    ```


    一旦问题得到解决，异常情况消失，就可以将异常队列中的消息放回常规队列，这将再次触发回调过程的执行。


    在可以从异常队列中出队消息之前，必须启动异常队列以进行出队操作。必须执行以下代码才能为出队操作启动异常队列。


    ```

    begin

    sys.dbms_aqadm.start_queue

    ( queue_name => ''AQ$_FILE_PROCESS_QT_E''

    , enqueue    => false

    , dequeue    => true

    );

    end;

    /

    ```


    无法为入队操作启动异常队列。


    将消息从异常队列移动到常规队列，可以通过从异常队列出队消息，然后将它们入队到常规队列来完成。以下代码使用一个简单的 `for-loop` 结构，对异常队列上的所有消息执行此操作。


    ```

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_message_handle     raw(16);

    l_payload            file_payload_ot;

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    begin

    for r in (select qt.msgid

    from   file_process_qt qt

    where  qt.q_name = ''AQ$_FILE_PROCESS_QT_E'')

    loop

    l_dequeue_options.msgid := r.msgid;

    sys.dbms_aq.dequeue

    ( queue_name         => ''AQ$_FILE_PROCESS_QT_E''

    , dequeue_options    => l_dequeue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_message_handle

    );

    sys.dbms_aq.enqueue

    ( queue_name         => ''file_process_q''

    , enqueue_options    => l_enqueue_options

    , message_properties => l_message_properties

    , payload            => l_payload

    , msgid              => l_message_handle

    );

    end loop;

    commit;

    end;

    /

    ```


    在某些情况下，消息位于异常队列上且需要被移除。此时，可以使用 `DBMS_AQADM` 包中的 `purge_queue_table` 过程清除异常队列。


    ```

    declare

    l_purge_options sys.dbms_aqadm.aq$_purge_options_t;

    begin

    sys.dbms_aqadm.purge_queue_table

    ( ''file_process_qt''

    , ''qtview.queue = ''''AQ$_FILE_PROCESS_QT_E''''''

    , l_purge_options

    );

    end;

    /

    ```

    '
- fmt: '# Advanced Queuing and JSON


    Since Oracle Database 21c, AQ also supports native JSON payloads. This release
    introduced a native JSON data type. Before this release, working with a JSON payload
    was possible but was always text-based; for example, with `sys.aq$_jms_text_message`
    as the payload data type.


    To create a queue table that handles a JSON payload, specify JSON for the `queue_payload_type`
    argument.


    ```sql

    begin

    sys.dbms_aqadm.create_queue_table (

    queue_table        => ''json_qt''

    ,queue_payload_type => ''json''

    );

    end;

    /

    ```


    Creating and starting the queue in the queue table is the same as before.


    ```sql

    begin

    sys.dbms_aqadm.create_queue (

    queue_name  => ''jq''

    ,queue_table => ''json_qt''

    );

    sys.dbms_aqadm.start_queue (

    queue_name => ''jq''

    );

    end;

    /

    ```


    The message placed on the queue should be JSON, of course.


    ```sql

    declare

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw (16);

    l_payload            json;

    begin

    l_payload := json (''{"Hello" : "World"}'');

    sys.dbms_aq.enqueue

    (queue_name         => ''jq''

    ,enqueue_options    => l_enqueue_options

    ,message_properties => l_message_properties

    ,payload            => l_payload

    ,msgid              => l_msgid

    );

    commit;

    end;

    /

    ```


    When the message is dequeued, keep in mind that the payload is JSON. This means
    that it should be treated as such when used in `dbms_output`. In the following
    example, the returned value should be converted to a string.


    ```sql

    set serveroutput on

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw(16);

    l_payload            json;

    begin

    sys.dbms_aq.dequeue(

    queue_name         => ''jq'',

    dequeue_options    => l_dequeue_options,

    message_properties => l_message_properties,

    payload            => l_payload,

    msgid              => l_msgid

    );

    sys.dbms_output.put_line(

    ''Retrieved from the JSON-payload [''

    || json_value (l_payload, ''$.Hello'' returning varchar2 )

    || '']''

    );

    end;

    /

    Retrieved from the JSON-payload [World]

    ```


    # Summary


    This chapter examined a common use case to increase the user experience and discussed
    how AQ plays a role. Offloading processing to a background process gives the impression
    that the application is very responsive when control is passed back to the user.


    Generating PDF documents can take time and be resource-intensive. When this generation
    is offloaded to a background process, it does not hinder any users by excessive
    resource consumption.


    Because callback procedures run in the background, any exceptions that lead to
    the message being propagated to the exception queue must be monitored to ensure
    that the work it was supposed to do is done.


    The chapter also included a short example showcasing the native JSON data type
    introduced in Oracle Database 21c.


    # 17. Introspecting PL/SQL


    Knowing what is going on in an executing PL/SQL block can provide valuable information.
    Setting client_identifier, module, and action from within a PL/SQL block can help
    track what each session is doing. In the `DBMS_SESSION` package, there are supporting
    procedures and functions for this.


    Within the `DBMS_UTILITY` package are procedures and functions that can identify
    the call stack in case of an unexpected exception. Even more information about
    the call stack can be retrieved with `utl_call_stack`, also covered in this chapter.


    ## DBMS_SESSION


    Using `DBMS_SESSION`, you can execute `alter session` commands from PL/SQL. Settings
    you normally would do in your SQL*Plus or SQLcl session have been made available
    to your PL/SQL procedures and functions.


    ### current_is_role_enabled


    If a certain part of your program needs you to have a certain role enabled, you
    can use `dbms_session.current_is_role_enabled` to check if the named role is currently
    enabled. You supply the function with the name of the role you want to check.
    The function returns `TRUE` if the role is enabled; it returns `FALSE` if it is
    not.


    ```sql

    function current_is_role_enabled(rolename varchar2)

    return boolean;

    ```


    ### set_role


    If the role needed is not enabled but has been granted to you, you can use `dbms_session.set_role`
    to set the role a run time. If the role is already enabled, issuing a set role
    command again executes without error. The text in the parameter is appended to
    the “SET ROLE” SQL statement and then executed as dynamic SQL.


    ```sql

    procedure set_role(role_cmd varchar2);

    ```


    ### set_nls


    Sometimes your programs rely on specific NLS settings; for instance, when converting
    a string to a date or the other way around. If you want to be sure the NLS settings
    are done correctly, independent of the user’s settings, you can use `dbms_session.set_nls`
    to set these specific settings. The procedure takes two parameters, the param
    name, and its value.


    ```sql

    procedure set_nls(param varchar2, value varchar2);

    ```


    Calling this procedure is equivalent to issuing `alter session set <nls_parameter>
    = <value>`.


    The parameter name must begin with NLS. If the value is a text literal, it needs
    to be embedded in single quotes. The following is an example.


    ```sql

    set_nls(''nls_date_format'',''''''DD-MON-YY'''''')

    ```


    If the parameter needs a lot of quotes, you might want to use alternative quoting.


    ```sql

    dbms_session.set_nls(''nls_date_format'', q''[''DD-MON-YY'']'')

    ```


    **Note**


    Using `execute immediate ''alter session ...''` has better performance. Also,
    `execute immediate` permits multiple parameters in one statement, which is more
    efficient than calling `dbms_session.set_nls` multiple times.'
