    "fullName": "David Coulthard"

    },

    {

    "fullName": "Sebastian Vettel"

    }

    ]

    }

    ```


    ## JSON and PL/SQL


    To support JSON in PL/SQL, several object types are specifically designed to read
    and write JSON documents. This can increase performance, especially when a document
    needs to be parsed multiple times.


    With the object types, it is possible to programmatically manipulate JSON in memory
    to validate, construct or transform JSON documents.


    The PL/SQL object types are listed in Table [14-2](#536316_1_En_14_Chapter.xhtml#Tab2).


    **Table 14-2: JSON-Related PL/SQL Object Types**


    | Object Type | Description |

    | --- | --- |

    | `json_element_t` | Supertype of all other typesThis type is instantiableWith
    the `treat` function, a variable of `json_element_t` can be instantiated as one
    of the subtypes |

    | `json_object_t` | Subtype of `json_element_t`Corresponds to a JSON object type
    |

    | `json_array_t` | Subtype of `json_element_t`Corresponds to a JSON array type
    |

    | `json_scalar_t` | Subtype of `json_element_t`Corresponds to a JSON scalar type
    |

    | `json_key_list` | Subtype of `json_element_t`Varray of VARCHAR2(4000) designed
    to hold the keys of a `json_object_t` |


    For the coming examples, the same JSON document is used as in Listing [12-1](#536316_1_En_12_Chapter.xhtml#PC1)
    from Chapter [12](#536316_1_En_12_Chapter.xhtml), this time as a local variable
    named `l_f1data` with data type `CLOB`.


    When the structure of the JSON document is known, the driver’s information is
    contained in a JSON object. It is possible to parse it directly to the appropriate
    data type.


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    end;

    /

    ```


    Once the textual representation is parsed as a JSON document, you can extract
    the object and arrays as needed. The top-level object in the sample is named `MRData`;
    to extract this object, the `get_object` method function is used in the following
    example.


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    l_mrdata json_object_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    l_mrdata := l_object.get_object ( ''MRData'' );

    end;

    /

    ```


    The same methodology can be used to extract the `Drivers` array, declare the appropriate
    data type for each level in the JSON document and use the `get_object` and `get_array`
    method functions.


    ```

    declare

    l_f1data clob := '''';

    l_object json_object_t;

    l_mrdata json_object_t;

    l_drivertable json_object_t;

    l_drivers_array json_array_t;

    begin

    l_object := json_object_t.parse ( l_f1data );

    l_mrdata := l_object.get_object ( ''MRData'' );

    l_drivertable := l_mrdata.get_object ( ''DriverTable'' );

    l_drivers_array := l_drivertable.get_array( ''Drivers'' );

    end;

    /

    ```


    It can also be condensed to apply the method functions in succession, the result
    would be the same.


    ```

    declare

    l_f1data clob := '''';

    l_drivers_array json_array_t;

    begin

    l_drivers_array := json_object_t.parse (l_f1data)

    .get_object (''MRData'')

    .get_object (''DriverTable'')

    .get_array  (''Drivers'');

    end;

    /

    ```


    When the structure of the JSON document is unknown, it is possible to examine
    the content of the JSON document. In the following example, the JSON document
    is parsed. The `json_element_t` supertype and the `is_object` and `is_array` introspection
    functions determine the JSON data type.


    ```

    declare

    l_f1data clob := '''';

    l_element json_element_t;

    begin

    l_element := json_element_t.parse ( l_f1data );

    if l_element.is_object

    then

    sys.dbms_output.put_line ( ''It is an Object'' );

    elsif l_element.is_array

    then

    sys.dbms_output.put_line ( ''It is an Array'' );

    end if;

    end;

    /

    It is an Object

    ```


    Contained within the `Drivers` array are JSON objects representing the drivers.
    Extracting these JSON objects can be done with the `get` method function. Note
    that the `get` method function returns the supertype `json_element_t`. Therefore,
    it needs to be converted to a JSON object using the `treat` function.'
