  trans: "\n### 对记录进行分类\n\n在寻找模式之前，必须对每一行数据进行分类。行的分类方式取决于具体需求。以下定义通过比较当前行的构造函数与组中\
    \ `first` （第一个）构造函数来进行分类。\n\n```\ndefine eq as constructor = first (constructor)\n\
    ```\n\n对于结果集中的第一行，组的开始就是当前行（索伯车队）。结果集中的第二行是下一个组的开始（迈凯伦车队）。第三行仍然属于迈凯伦车队组，依此类推。有了这个定义，就可以确定模式了。模式定义如下。\n\
    \n```\npattern (eq+)\n```\n\n这意味着一个或多个被分类为“eq”的记录属于同一个组。在模式子句中，可以使用正则表达式来指定需要在数据集中匹配的模式。表\
    \ 4-1 概述了最常见的正则表达式量词。\n\n表 4-1\n正则表达式量词\n\n| 类型 | 描述 |\n| --- | --- |\n| `*` |\
    \ 零个或多个 |\n| `+` | 一个或多个 |\n| `?` | 零个或一个 |\n| `{n}` | 恰好 n 个 |\n| `{n,}` | 至少\
    \ n 个 |\n| `{,m}` | 最多 m 个 |\n| `{n, m}` | 介于 n 和 m 个之间 |\n| `&#124;` | 或；尝试此模式，否则尝试彼模式\
    \ |\n\n下面的查询使用内置的 `match_number()` 函数来展示此数据集中的不同分组。\n\n```\nwith race_years as\
    \ (\nselect rcs.year\n, ctr.name as constructor\n, min (rcs.race_date) as startrace\n\
    , max (rcs.race_date) as endrace\nfrom   f1data.results rsl\njoin   f1data.races\
    \ rcs\non   rsl.raceid = rcs.raceid\njoin   f1data.constructors ctr\non   ctr.constructorid\
    \ = rsl.constructorid\nwhere  rsl.driverid = 8 -- 基米·莱科宁\ngroup  by rcs.year\n\
    , ctr.name\n)\nselect rce.mnr\n, rce.constructor\n, rce.startrace\n, rce.endrace\n\
    from   race_years\nmatch_recognize (\norder by year\nmeasures\nmatch_number()\
    \ as mnr\nall rows per match\npattern (eq+)\ndefine eq as constructor = first\
    \ (constructor)\n) rce\norder  by year\n/\nMNR CONSTRUCTOR               STARTRACE\
    \ ENDRACE\n---------- ------------------------- --------- ---------\n1 Sauber\
    \                    04-MAR-01 14-OCT-01\n2 McLaren                   03-MAR-02\
    \ 13-OCT-02\n2 McLaren                   09-MAR-03 12-OCT-03\n2 McLaren      \
    \             07-MAR-04 24-OCT-04\n2 McLaren                   06-MAR-05 16-OCT-05\n\
    2 McLaren                   12-MAR-06 22-OCT-06\n3 Ferrari                   18-MAR-07\
    \ 21-OCT-07\n3 Ferrari                   16-MAR-08 02-NOV-08\n3 Ferrari      \
    \             29-MAR-09 01-NOV-09\n4 Lotus F1                  18-MAR-12 25-NOV-12\n\
    4 Lotus F1                  17-MAR-13 03-NOV-13\n5 Ferrari                   16-MAR-14\
    \ 23-NOV-14\n5 Ferrari                   15-MAR-15 29-NOV-15\n5 Ferrari      \
    \             20-MAR-16 27-NOV-16\n5 Ferrari                   26-MAR-17 26-NOV-17\n\
    5 Ferrari                   25-MAR-18 25-NOV-18\n6 Alfa Romeo                17-MAR-19\
    \ 01-DEC-19\n6 Alfa Romeo                05-JUL-20 13-DEC-20\n6 Alfa Romeo   \
    \             28-MAR-21 12-DEC-21\n```\n\n如结果所示，`MNR` 列显示了 `match_number()` 以识别不同的分组。这是对找到的匹配项进行的连续编号。在前面的查询中，显示了所有行。`all\
    \ rows per match` 子句返回所有行，因此很容易识别哪些记录被分在了一组。`all rows per match` 子句还确保返回输入数据集的所有列，以及\
    \ `measures` 子句中列出的所有内容。\n\n#### 表别名\n\n表别名放在 `match_recognize` 子句的最终括号之后。\n\n\
    现在已经清楚哪些记录应该归为一组，可以修改查询以仅显示 `one row per match` （每个匹配一行）。度量值是在查询其他部分可用的表达式。以下是一些值得关注的度量值。\n\
    \n*   组的构造函数：为此，使用了 `first (constructor)` 表达式。在这种情况下，也可以使用 `last (constructor)`，因为组内的构造函数保持不变。\n\
    *   与该构造函数合同的第一年：此度量值的表达式是 `first (startrace)`。\n*   与该构造函数合同的最后一年：此度量值的表达式是 `last\
    \ (endrace)`。\n\n```\n    with race_years as (\n    select rcs.year\n    , ctr.name\
    \ as constructor\n    , min (rcs.race_date) as startrace\n    , max (rcs.race_date)\
    \ as endrace\n    from   f1data.results rsl\n    join   f1data.races rcs\n   \
    \ on   rsl.raceid = rcs.raceid\n    join   f1data.constructors ctr\n    on   ctr.constructorid\
    \ = rsl.constructorid\n    where  rsl.driverid = 8\n    group  by rcs.year\n \
    \   , ctr.name\n    )\n    select rce.constructor\n    , rce.strt\n    , rce.stp\n\
    \    from   race_years\n    match_recognize (\n    order by year\n    measures\n\
    \    first (constructor) as constructor\n    , extract (year from first (startrace))\
    \ as strt\n    , extract (year from last (endrace)) as stp\n    one row per match\n\
    \    pattern (eq+)\n    define eq as constructor = first (constructor)\n    )\
    \ rce\n    order by rce.strt\n    /\n    CONSTRUCTOR                     STRT\
    \        STP\n    ------------------------- ---------- ----------\n    Sauber\
    \                          2001       2001\n    McLaren                      \
    \   2002       2006\n    Ferrari                         2007       2009\n   \
    \ Lotus F1                        2012       2013\n    Ferrari               \
    \          2014       2018\n    Alfa Romeo                      2019       2021\n\
    \    6 rows selected.\n    ```\n\n使用了 `extract` 函数来获取年份。它只显示年份而非具体日期。\n\n####\
    \ 度量值子句的别名设置\n\n度量值子句中的表达式必须始终设置别名，即使该表达式是输入表的列也是如此。\n"
- fmt: '## Logical Groups


    Just like with analytic functions, it is also possible to partition the input
    data set in the `match_recognize` clause. That way, the pattern is applied to
    each logical data set group. The next example determines the contracts, in the
    same way as before, for the years after 2021 and this time for all drivers. The
    subquery factoring clause is amended to include the driver’s name. The following
    partition clause is added to the `match_recognize` clause.


    ```

    partition by driver

    ```


    This creates logical groups, one for each driver, and applies the same pattern
    detection. The following is the complete query to determine the contracts for
    each driver since 2021.


    ```

    with race_years as (

    select drv.forename || '' '' || drv.surname as driver

    , rcs.year

    , ctr.name as constructor

    ,min (rcs.race_date) as startrace

    ,max (rcs.race_date) as endrace

    from   f1data.results rsl

    join   f1data.races rcs

    on   rsl.raceid = rcs.raceid

    join   f1data.constructors ctr

    on   ctr.constructorid = rsl.constructorid

    join   f1data.drivers drv

    on   drv.driverid = rsl.driverid

    where  rcs.year >= 2021

    group  by rcs.year

    ,ctr.name

    ,drv.forename

    ,drv.surname

    )

    select rce.driver

    , rce.constructor

    , rce.strt

    , rce.stp

    from   race_years

    match_recognize (

    partition by driver

    order by year

    measures

    first (constructor) as constructor

    , extract (year from first (startrace)) as strt

    , extract (year from last (endrace)) as stp

    , match_number() as mnr

    one row per match

    pattern (eq+)

    define eq as constructor = first (constructor)

    ) rce

    order  by rce.constructor

    , rce.strt

    /

    DRIVER               CONSTRUCTOR             STRT        STP

    -------------------- ----------------- ---------- ----------

    Robert Kubica        Alfa Romeo              2021       2021

    Antonio Giovinazzi   Alfa Romeo              2021       2021

    Kimi Räikkönen       Alfa Romeo              2021       2021

