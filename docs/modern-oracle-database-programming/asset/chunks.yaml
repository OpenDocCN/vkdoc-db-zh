    ## 总结


    处理 JSON 文档时有很多需要学习的地方。掌握路径表达式和过滤器可能是本章最重要的内容。理解路径表达式和过滤器的工作原理可以使处理 JSON 文档变得简单得多。处理路径表达式中的错误可以澄清何时遇到空值。


    最后，介绍了点符号语法，这是一种将 JSON 文档转换为关系格式的简便方法。


    # 13. SQL/JSON 与条件


    将 JSON 文档存储在数据库中是一回事，知道如何遍历文档是另一回事，但将数据提取为关系格式才是其核心目的。


    本章重点介绍这种转换，即使用 SQL 语句从 JSON 文档创建关系输出。


    本章的示例使用了上一章的示例数据。


    ## SQL/JSON 函数


    有四个 SQL 函数可用于从 JSON 文档中提取值。


    *   `json_value` 提取标量 JSON 值并返回等效的 SQL 值

    *   `json_query` 提取 JSON 文档的一个片段

    *   `json_table` 将 JSON 文档转换为关系格式

    *   `json_serialize` 转换 JSON 文档并返回其文本表示形式


    这些函数将在接下来的小节中逐一探讨。


    ### JSON_VALUE


    SQL/JSON `json_value` 函数*必须*针对标量 JSON 值。当它针对非标量值、`OBJECT` 或 `ARRAY` 时，会引发错误。默认情况下，JSON
    路径表达式中的错误会返回 `NULL` 值，这可以在 `on error` 子句中被覆盖。


    错误可能由多种原因引起，可以在 `on error` 子句中进行处理。


    *   JSON 文档格式不正确。

    *   当 JSON 数据由 JSON 路径表达式求值时，发现非标量值。

    *   当 JSON 数据求值时未找到匹配项，例如属性不存在；这种情况也可以通过 `on empty` 子句处理，该子句优先于 `on error`。

    *   返回值数据类型不足以容纳返回的值。


    传递给 `json_value` 函数的第一个参数可以是任何文本字面量、`BLOB` 或 `JSON`。如果文本字面量或 `BLOB` 不是格式正确的 JSON，则会引发错误。


    第二个参数是目标为感兴趣值的 JSON 路径表达式。此 JSON 路径表达式可以包括过滤条件以及项目方法。项目方法可以影响从 JSON 文档中检索的数据类型；但是，也可以在
    `returning` 子句中指定 `json_value` 应返回的数据类型。


    在 `returning` 子句中，可以指定 SQL 数据类型以决定如何返回 JSON 值。默认情况下，当省略 `returning` 子句时，返回 `varchar2(4000)`。


    **提示：** 使用 `returning` 子句可以更好地控制返回的数据类型。例如，可以指定字符串的长度，如 `varchar2(10)`。这在 `string()`
    项目方法中是无法实现的。


    本节涵盖了最常见的数据类型，如 `STRING`、`NUMBER`、`DATE` 和 `BOOLEAN`，但也可以返回其他数据类型，如 `TIMESTAMP`（带或不带时区）、`INTERVAL`、`CHAR`、`BLOB`、`CLOB`
    或 `SDO_GEOMETRY`。


    在下面的查询中，目标是车手的姓氏，并返回一个 `varchar2(6)`。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].familyName''

    returning varchar2(6)

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    Vettel

    ```


    车手的名字是六个字符，`returning` 子句指定了 `varchar2(6)`。上面的查询工作正常。当 JSON 路径表达式针对另一个名字有九个字符的车手时，会引发错误（默认情况下，发生错误时返回
    null）。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(6)

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    ```


    除了增加返回值的大小，还可以在 `returning` 子句中添加 `truncate` 子句。每当目标值超过请求的长度时，返回值都会被截断。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].familyName''

    returning varchar2(6) truncate

    ) as familyname

    from f1_drivers_json f

    /

    FAMILY

    ------

    Coulth

    ```


    车手的永久号码是数字类型，但在 JSON 文档中，它是一个字符串。使用 `returning` 子句，可以将其转换为数字。结果集中的右对齐表明它是一个真正的数字。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].permanentNumber''

    returning number

    ) as permanentNumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER

    ---------------

    ```


    JSON 文档中的出生日期是一个字符串。JSON 没有日期数据类型。`dateOfBirth` 字符串采用 ISO 8601 格式，因此可以将其转换为 SQL
    日期数据类型。


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].dateOfBirth''

    returning date

    ) as dateofbirth

    from f1_drivers_json f

    /

    DATEOFBIR

    ---------

    27-MAR-71

    ```

    '
- fmt: "# Oracle数据库中的JSON处理：json_value与json_query函数\n\n## 日期与时间处理\n\n`ISO 8601`格式可以包含时间部分，但使用的示例`JSON`没有。在`returning`子句中，可以指定如何处理日期的时间部分，是保留还是移除。由于示例`JSON`文档中的日期没有时间部分，以下示例使用了`SYSDATE`，通过在子查询因子化子句（`with`子句，命名为`datesampler`）中使用`json_scalar`函数转换为`JSON`值。此会话的日期格式被修改为显示日期的时间部分。\n\
    \n```sql\nalter session set nls_date_format = 'dd-mm-yyyy hh24:mi:ss'\n/\nSession\
    \ altered.\nwith datesampler\nas\n(select json_scalar (sysdate) as dt\nfrom dual)\n\
    select json_value (dt, '$' returning date) as d1\n,json_value (dt, '$' returning\
    \ date truncate time) as d2\n,json_value (dt, '$' returning date preserve time)\
    \ as d3\nfrom datesampler\n/\nD1                  D2                  D3\n-------------------\
    \ ------------------- -------------------\n05-08-2022 00:00:00 05-08-2022 00:00:00\
    \ 05-08-2022 12:33:07\n```\n\n默认情况下，返回日期时，时间部分会被截断（列`D1`）。这也可以通过添加`truncate time`来显式完成（列`D2`）。当需要保留时间部分时，在将`JSON`值作为日期返回时添加`preserve\
    \ time`（列`D3`）。\n\n## 布尔值处理\n\n`JSON`具有并需要映射到`SQL`数据类型的另一种数据类型是布尔值。目前，`SQL`没有原生的布尔数据类型。根据偏好，布尔值可以表示为数字（`0`或`1`）或字符串（`true`或`false`）。这两种符号格式都可以在`returning`子句中指定。\n\
    \n示例中的驾驶员信息用一个布尔值指明他是否曾是冠军。当使用`returning varchar2`并且目标是布尔值时，会返回`true`或`false`。\n\
    \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
    returning varchar2\n) as champion\nfrom f1_drivers_json f\n/\nCHAMPION\n--------------------------------\n\
    false\n```\n\n如果希望返回数字值，简单地指定`returning number`是不起作用的。\n\n```sql\nselect json_value\
    \ (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\nreturning number\n\
    ) as champion\nfrom f1_drivers_json f\n/\nCHAMPION\n----------\n```\n\n前面查询中返回的`null`表明有问题；添加`on\
    \ error`子句可以揭示原因。\n\n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
    returning number\nerror on error\n) as champion\nfrom f1_drivers_json f\n/\nError\
    \ report -\nORA-40799: cannot convert Boolean value to number\n```\n\n必须显式声明允许将`JSON`布尔值转换为数字。\n\
    \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
    returning number\nallow boolean to number conversion\n) as champion\nfrom f1_drivers_json\
    \ f\n/\nCHAMPION\n----------\n```\n\n在`Oracle Database 21`之前，前面查询中的布尔关键字``must``必须省略。\n\
    \n## json_query函数\n\n使用`json_query`可以提取`JSON`文档的一个片段。与`json_value`最大的区别是，`json_query`可以将多个目标值作为`JSON`片段返回。\n\
    \n默认情况下，返回值的`数据类型`是`varchar2(4000)`，但这可以在`returning`子句中更改，并且始终是格式良好的`JSON`。截断返回值可能看起来像是格式不良的`JSON`，但事实并非如此。截断是在值被`json_query`定位之后进行的。唯一允许的返回类型是`VARCHAR2`、`CLOB`、`BLOB`或`JSON`。\n\
    \n使用`json_query`可以模仿`json_value`来提取标量值，但有一个细微差别。`json_query`函数返回的是`JSON`片段的字符串化版本，当目标是标量时，它会被括在引号中，使其成为格式良好的`JSON`。下面查询中的`drivercode`长度为五个字符。\n\
    \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[0].code'\n\
    ) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
    \"COU\"\n```\n\n当请求与`JSON`类型不同的`SQL`数据类型时，会尝试进行隐式转换，如果成功则返回。以下示例返回驾驶员的永久编号（在`JSON`示例中是一个字符串），并将其转换为数字。\n\
    \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[1].permanentNumber'\n\
    returning number\n) as permanentnumber\nfrom f1_drivers_json f\n/\nPERMANENTNUMBER\n\
    ---------------\n```\n\n查询结果的右对齐表明它是数字`SQL`数据类型。使用`JSON`路径表达式中的`number()`项方法也可以得到相同的查询结果。\n\
    \n与`json_value`不同，`json_query`可以返回对象或数组。在以下示例中，返回了第一位驾驶员的驾驶员对象。通过添加`returning\
    \ varchar2 pretty`，结果通过添加换行和缩进变得更易于阅读。\n\n```sql\nselect json_query (f.json_document\n\
    ,'$.MRData.DriverTable.Drivers[0]'\nreturning varchar2 pretty\n) as drivercode\n\
    from f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------------------------------------------------------\n\
    {\n  \"driverId\" : \"coulthard\",\n  \"code\" : \"COU\",\n  \"givenName\" : \"\
    David\",\n  \"familyName\" : \"Coulthard\",\n  \"dateOfBirth\" : \"1971-03-27\"\
    ,\n  \"nationality\" : \"British\",\n  \"champion\" : false,\n  \"nickname\" :\
    \ \"DC\"\n}\n```\n\n当定位多个值并希望结果是格式良好的`JSON`时，这些值可能需要一个数组包装器。这意味着结果被包装在方括号中。在以下查询中，定位了驾驶员代码。示例`JSON`中有两个代码。两个标量值必须包装在方括号中，使结果再次成为有效的`JSON`。\n\
    \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*].code'\n\
    with array wrapper\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
    [\"COU\",\"VET\"]\n```\n\n默认的包装子句是`without array wrapper`，当定位到多个值时，会引发错误，默认情况下导致`null`。\n\
    \n> 提示\n> > 当您不希望*总是*将结果括在数组中时，也可以使用`with conditional array wrapper`，让`Oracle\
    \ Database`来决定何时需要将结果包装在数组中。\n\n有几种原因可能导致错误，这些错误可以在`on error`子句中处理。\n\n*   传递给函数的输入不是格式良好的`JSON`数据。\n\
    *   `JSON`路径表达式未找到匹配项。属性可能不存在。此错误也可以由`on empty`子句处理，该子句优先于`on error`子句。\n*   返回值数据类型不足以容纳返回值。\n\
    *   返回值数据类型无法隐式转换为请求的返回类型。此错误也可以由`on mismatch`子句处理，该子句优先于`on error`子句。\n*   定位了多个值，并且省略了`with\
    \ array wrapper`。"
  raw: 'The ISO 8601 format can have a time component, but the sample JSON that is
    used does not. In the `returning` clause, you can specify what to do with the
    time portion of the date, keep it or remove it. As the sample JSON document doesn’t
    have any dates with a time component, the following example use `SYSDATE`, converted
    to a JSON value by using the `json_scalar` function in the subquery factoring
    clause (`with` clause, named datesampler). The date-format in this session is
    changed to show the time component of dates.


    ```

    alter session set nls_date_format = ''dd-mm-yyyy hh24:mi:ss''

    /

    Session altered.

    with datesampler

    as

    (select json_scalar (sysdate) as dt

    from dual)

    select json_value (dt, ''$'' returning date) as d1

    ,json_value (dt, ''$'' returning date truncate time) as d2

    ,json_value (dt, ''$'' returning date preserve time) as d3

    from datesampler

    /

    D1                  D2                  D3

    ------------------- ------------------- -------------------

    05-08-2022 00:00:00 05-08-2022 00:00:00 05-08-2022 12:33:07

    ```


    By default, when returning a date, the time is truncated (column D1). This can
    also be done explicitly with the `truncate time` addition (column D2). When the
    time component needs to be preserved, add `preserve time` when returning the JSON
    value as a date (column D3).


    The other data type that JSON has and needs to be mapped to a SQL data type is
    boolean. Currently, there is no native SQL boolean data type. Depending on your
    preference, a boolean can be represented as numeric (0 or 1) or as a string (true
    or false). Both notational formats can be specified in the `returning` clause.


    The driver information in the sample specifies in a boolean value if he has been
    a champion. When using `returning varchar2` and a boolean is the target, true
    or false is returned.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].champion''

    returning varchar2

    ) as champion

    from f1_drivers_json f

    /

    CHAMPION


    false

    ```


    When the preference is to return a numeric value, simply specifying `returning
    number` doesn’t work.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].champion''

    returning number

    ) as champion

    from f1_drivers_json f

    /

    CHAMPION


    ```


    The null returned in the preceding query indicates something wrong; adding the
    `on error` clause reveals the following.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].champion''

    returning number

    error on error

    ) as champion

    from f1_drivers_json f

    /

    Error report -

    ORA-40799: cannot convert Boolean value to number

    ```


    It must be explicitly stated that this is allowed to convert the JSON boolean
    to a number.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].champion''

    returning number

    allow boolean to number conversion

    ) as champion

    from f1_drivers_json f

    /

    CHAMPION


    ```


    Prior to Oracle Database 21, the boolean keyword in the preceding query *must*
    be omitted.


    ### JSON_QUERY


    With the `json_query` you can extract a fragment of a JSON document. The biggest
    difference with `json_value` is that `json_query` can return multiple targeted
    values as a JSON snippet.


    By default, the returned value’s data type is a `varchar2(4000)`, but this can
    be changed in the `returning` clause and is always well-formed JSON. Truncating
    the returned value might give the appearance of JSON that is not well-formed,
    but this is not the case. Truncating is done after the value is targeted by `json_query`.
    The only allowed return types are `VARCHAR2`, `CLOB`, `BLOB,` or `JSON`.


    With `json_query` it is possible to mimic `json_value` to extract a scalar value,
    but there is a subtle difference. The `json_query` function returns a stringified
    version of a JSON snippet, and when a scalar is targeted, it is enclosed in quotation
    marks so that it is well-formed JSON. The length of the drivers code in the following
    query is five characters long.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[0].code''

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    "COU"

    ```


    When a different SQL data type than the JSON type is requested, implicit conversion
    is attempted and, when successful, returned. The following example returns the
    permanent number of a driver (a string in the JSON sample) and converts it to
    a number.


    ```

    select json_value (f.json_document

    ,''$.MRData.DriverTable.Drivers[1].permanentNumber''

    returning number

    ) as permanentnumber

    from f1_drivers_json f

    /

    PERMANENTNUMBER


    ```


    The right alignment of the query result reveals that it is a numeric SQL data
    type. The same query results can be achieved using the `number()` item method
    in the JSON path expression.


    Unlike `json_value`, `json_query` can return an object or array. In the following
    example, the driver object of the first driver is returned. By adding `returning
    varchar2 pretty`, the result is easier to read by adding new lines and indentation.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[0]''

    returning varchar2 pretty

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    {

    "driverId" : "coulthard",

    "code" : "COU",

    "givenName" : "David",

    "familyName" : "Coulthard",

    "dateOfBirth" : "1971-03-27",

    "nationality" : "British",

    "champion" : false,

    "nickname" : "DC"

    }

    ```


    When multiple values are targeted and to have the result as well-formed JSON,
    it might be necessary that these values require an array wrapper. This means that
    the result is wrapped in square brackets. In the following query, the driver codes
    are targeted. There are two codes in the sample JSON. Two scalar values must be
    wrapped in square brackets, making the result valid JSON again.


    ```

    select json_query (f.json_document

    ,''$.MRData.DriverTable.Drivers[*].code''

    with array wrapper

    ) as drivercode

    from f1_drivers_json f

    /

    DRIVERCODE


    ["COU","VET"]

    ```


    The default wrapper clause is `without array wrapper,` and when multiple values
    are targeted, an error is raised, resulting (by default) in null.


    Tip


    When you don’t want to *always* enclose the results in an array, you can also
    use `with conditional array wrapper` and leave it to Oracle Database to figure
    out when it is needed to wrap the results in an array.


    There are several reasons an error can occur, which can be handled in the `on
    error` clause.


    *   The input to the function is not well-formed JSON data.


    *   No match is found by the JSON path expression. An attribute might not exist.
    This error can also be handled by the `on empty` clause, which has precedence
    over the on `error clause`.


    *   Return value data type is not large enough to hold the return value.


    *   Return value data type cannot be implicitly converted to the return requested.
    This error can also be handled by the `on mismatch` clause, which has precedence
    over the on `error clause`.


    *   Multiple values are targeted, and the `with array wrapper` is omitted.'
