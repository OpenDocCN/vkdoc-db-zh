    \ JSON 路径表达式与基于函数的索引中的表达式相同，这就是成立的。\n\n这种索引类型，即基于函数的索引，在你确切知道要查找什么时是有效的。这听起来像是一个缺点，但在实际处理\
    \ JSON 文档时，你通常确实知道自己要找什么。\n\n### 使用 JSON 搜索索引进行即时搜索\n\n从 Oracle Database 12.2\
    \ 开始，可以使用 JSON 搜索索引来索引 JSON 文档。其行为类似于 Oracle Text 索引，因此可能看起来很熟悉。在后台，会为 JSON 文档创建一个\
    \ Oracle Text 索引。\n\nJSON 搜索索引的语法非常简单，但效果很好。\n\n```sql\ncreate search index standing_idx\
    \ on\nnative_json (\n    json_document\n)\nfor json\n/\n```\n\n创建 JSON 搜索索引可能需要一些时间，并且它会在你的模式中创建各种`DR$`表，类似于\
    \ Oracle Text。\n\n**提示**\n\n要将持久化的数据指南信息作为 JSON 搜索索引的一部分创建，你可以在`parameters`子句中指定。\n\
    \n```sql\ncreate search index standing_idx on native_json (json_document) for\
    \ json parameters ('dataguide on');\n```\n\n或者，你也可以稍后通过重建 JSON 搜索索引来完成。\n\n```sql\n\
    alter index standing_idx rebuild parameters ('dataguide on');\n```\n\n一旦索引创建完成，你就可以查询出现在\
    \ JSON 文档中任何位置的任何属性。例如，让我们搜索任何提到“verstappen”的 JSON 文档。\n\n```sql\nselect *\nfrom\
    \ native_json\nwhere json_textcontains (\n    json_document\n    ,'$'\n    ,'verstappen'\n\
    )\n/\n```\n\n正如你在前面的查询中看到的，就像使用 Oracle Text 一样，你可以使用一个特殊的谓词来利用 JSON 搜索索引，尽管这并非严格必要。\n\
    \n```sql\n| Id  | 操作                      | 名称          |\n|---|---|---|\n|  \
    \ 0 | SELECT STATEMENT          |               |\n|   1 |  通过索引 ROWID 访问表   \
    \   | NATIVE_JSON   |\n|   2 |   域索引                  | STANDING_IDX  |\n```\n\
    \n重要的是要知道，你搜索的词需要精确匹配。传递“stap”作为搜索词不会产生任何结果。搜索“VER”或“ver”会产生结果，仅仅因为那是静态的车手代码，就像“HAM”代表汉密尔顿，“LEC”代表勒克莱尔一样（尽管在\
    \ 1973 年和 1977 年也有一个制造商（LEC Refrigeration）拥有相同的标识）。\n\n即使你使用`json_value`在谓词中查询\
    \ JSON 文档，JSON 搜索索引也可以被使用（在此示例中，之前创建的基于函数的索引已被删除）。\n\n```sql\nselect *\nfrom native_json\n\
    where json_value (\n    json_document\n    , '$.MRData.StandingsTable.StandingsLists.season'\n\
    ) = :season\n/\n```\n\n这会显示以下执行计划。\n\n```sql\n| Id  | 操作                     \
    \ | 名称          |\n|---|---|---|\n|   0 | SELECT STATEMENT          |        \
    \       |\n|   1 |  通过索引 ROWID 访问表      | NATIVE_JSON   |\n|   2 |   域索引     \
    \             | STANDING_IDX  |\n```"
- fmt: '### Multivalue Indexes


    当使用 JSON 数据类型存储 JSON 文档时，还可以创建多值索引来优化使用 `json_exists` 条件的查询，无论是单独作为标量值还是位于数组中。


    以下示例创建了一个包含所有 F1 世界冠军的表。


    ```

    create table f1_champions

    (driver varchar2(50)

    ,season json

    )

    /

    ```


    在 `season` JSON 列中，存储了一个 JSON 文档，列出了该车手获得世界冠军的所有赛季，例如：


    ```

    {"winner":[1994, 1995, 2000, 2001, 2002, 2003, 2004]}

    ```


    要查询所有自 2010 年以来成为世界冠军的车手，可以编写带有 `json_exists` 条件的查询。


    ```

    select driver

    from f1_champions f

    where json_exists (f.season

    ,''$.winner?(@.number() >= 2010)'')

    /

    DRIVER

    --------------------

    Sebastian Vettel

    Lewis Hamilton

    Nico Rosberg

    Max Verstappen

    ```


    多值索引可以有效地搜索所有 JSON 文档。为确保查询能使用多值索引，索引必须指定要索引的数据类型，且查询谓词必须与索引指定的类型匹配。在这种情况下，可以使用
    JSON 路径表达式中的点表示法创建多值索引。


    ```

    create multivalue index season_idx on f1_champions f

    (f.season.winner.number())

    /

    ```


    用于查找自 2010 年以来所有 F1 冠军的查询的执行计划如下。


    ```

    | Id  | Operation                           | Name         |

    |-----|-------------------------------------|--------------|

    |   0 | SELECT STATEMENT                    |              |

    |   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| F1_CHAMPIONS |

    |   2 |   HASH UNIQUE                       |              |

    |   3 |    INDEX RANGE SCAN (MULTI VALUE)   | SEASON_IDX   |

    ```


    多值索引也可以索引标量值，但一个简单的基于函数的索引通常就足够了。


    ## 本章小结


    本章介绍了在 Oracle 数据库中存储 JSON 文档时的不同选择以及一些索引 JSON 文档的技术。通过 JSON 数据指南可以熟悉 JSON 文档的结构，它可以帮助你基于
    JSON 文档生成视图。存储方式的最佳选择取决于你使用的版本。当你使用 Oracle Database 21 或更高版本时，选择 JSON 数据类型是合乎逻辑的，这为创建多值索引提供了可能。


    # 12. JSON 中的路径表达式


    要有效地使用 JSON，从基础功能开始很重要。最重要的一点是学习路径表达式、导航和定位正确的 JSON 键。路径表达式在 SQL 和 PL/SQL 中都是必需的。本章介绍路径表达式及其过滤功能和错误处理。最后，你将了解如何使用易于理解的
    SQL 语句，通过点表示法从 JSON 文档中提取值。


    ## 示例数据


    本章的示例使用了如下创建的表。


    ```

    create table f1_drivers_json

    (json_document json)

    /

    ```


    列表 [12-1](#536316_1_En_12_Chapter.xhtml#PC2) 中的 JSON 文档存储在此表中。


    ```

    {

    "MRData": {

    "series": "f1",

    "DriverTable": {

    "Drivers": [

    {

    "driverId": "coulthard",

    "code": "COU",

    "givenName": "David",

    "familyName": "Coulthard",

    "dateOfBirth": "1971-03-27",

    "nationality": "British",

    "champion": false,

    "nickname": "DC"

    },

    {

    "driverId": "vettel",

    "permanentNumber": "5",

    "code": "VET",

    "givenName": "Sebastian",

    "familyName": "Vettel",

    "dateOfBirth": "1987-07-03",

    "nationality": "German",

    "champion": true,

    "nickname": null,

    "Constructors": [

    {

    "constructorId": "red_bull",

    "name": "Red Bull",

    "nationality": "Austrian"

    },

    {

    "constructorId": "aston_martin",

    "name": "Aston Martin",

    "nationality": "British"

    }]

    }

    ]

    }

    }

    }

    ```

    列表 12-1

    示例 JSON 文档


    脚本 `f1_drivers_json.sql`（可在本书的 GitHub 页面上找到）创建了该表并插入了 JSON 文档。


    该 JSON 文档包含对象和数组。请注意，JSON 文档中的键包含大写和小写字符。并非两位车手的所有属性都存在，例如永久号码。Coulthard 没有，而
    Vettel 有。


    ## JSON 数据类型


    JSON 文档可以由对象、数组和/或标量值组成。


    JSON 文档内值的数据类型可以是 OBJECT、ARRAY 或标量类型：NUMBER、STRING、BOOLEAN 或 NULL。


    从 JSON 文档中提取值时，JSON 数据类型必须映射到可比较的 SQL 数据类型才能有用。JSON 数据不能用于排序、分组或比较。


    如何将 JSON 值映射到 SQL 数据类型由开发者决定。例如，JSON 字符串可以映射到 `VARCHAR2`、`CLOB`、`BLOB`，甚至当值为数字时可以映射到
    `NUMBER`。这些 JSON 值的映射方式取决于你使用的 SQL 函数；例如，通过 `json_value` 函数的 `returning` 子句，你可以指定希望
    JSON 值映射到哪种 SQL 类型。


    由于没有与 JSON BOOLEAN（只有 true 或 false）匹配的数据类型，开发者必须决定如何处理它，要么将其映射为 0 和 1，要么映射为 "true"
    或 "false" 字符串。


    可以使用 `type()` 项方法检查 JSON 数据类型，关于项方法的更多信息请参见本章相关章节。'
  raw: '### Multivalue Indexes


    When you are using a JSON data type to store the JSON document, there is also
    a possibility to create a multivalue index to optimize queries that use the `json_exists`
    condition, either as scalar values individually or in an array.


    For the following example, a table is created for all champions of F1.


    ```

    create table f1_champions

    (driver varchar2(50)

    ,season json

    )

    /

    ```


    In the season JSON column, there is a JSON document listing all the seasons that
    this driver has been a world champion, such as the following.


    ```

    {"winner":[1994, 1995, 2000, 2001, 2002, 2003, 2004]}

    ```


    To query all drivers that have been world champions since 2010, you can write
    a query with the `json_exists` condition.


    ```

    select driver

    from f1_champions f

    where json_exists (f.season

    ,''$.winner?(@.number() >= 2010)'')

    /

    DRIVER


    Sebastian Vettel

    Lewis Hamilton

    Nico Rosberg

    Max Verstappen

    ```


    A multivalue index can be beneficial to efficiently search all the JSON documents.
    To assure that the query picks up the multivalue index, the index must specify
    the data type to be indexed, and the query predicate must match the type specified
    by the index. In this case, you can create a multivalue index using the dot notation
    in the JSON path expression.


    ```

    create multivalue index season_idx on f1_champions f

    (f.season.winner.number())

    /

    ```


    The explain plan for the query to find all F1 champions since 2010 is as follows.


    ```


    | Id  | Operation                           | Name         |


    |   0 | SELECT STATEMENT                    |              |

    |   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| F1_CHAMPIONS |

    |   2 |   HASH UNIQUE                       |              |

    |   3 |    INDEX RANGE SCAN (MULTI VALUE)   | SEASON_IDX   |


    ```


    The multivalue index can also index scalar values, but a straightforward function-based
    index would suffice.


    ## Summary


    This chapter looked at the different choices you have when you need to store JSON
    documents in Oracle Database and some techniques to index the JSON documents.
    Getting familiar with the structure of the JSON document can be done with the
    JSON data guide, which can aid you with generating views on top of the JSON documents.
    The best choice for storage depends on the release that you have. When you have
    an Oracle Database 21 or higher, the choice of a JSON data type is logical. This
    opens the possibility of creating multivalue indexes on them.


    # 12. Path Expressions in JSON


    To work effectively with JSON, it is important to start with the basic functionality.
    One of the most important things to learn is the path expressions, navigating,
    and targeting the correct JSON keys. Path expressions are needed in SQL as well
    as in PL/SQL. This chapter introduces the path expression and its filtering capabilities
    and error handling. Finally, you look at the dot notation to extract values from
    a JSON document with easy-to-understand SQL statements.


    ## Sample Data


    For the samples in this chapter, the following table was created.


    ```

    create table f1_drivers_json

    (json_document json)

    /

    ```


    Listing [12-1](#536316_1_En_12_Chapter.xhtml#PC2), a JSON document, is stored
    in this table.


    ```

    {

    "MRData": {

    "series": "f1",

    "DriverTable": {

    "Drivers": [

    {

    "driverId": "coulthard",

    "code": "COU",

    "givenName": "David",

    "familyName": "Coulthard",

    "dateOfBirth": "1971-03-27",

    "nationality": "British",

    "champion": false,

    "nickname": "DC"

    },

    {

    "driverId": "vettel",

    "permanentNumber": "5",

    "code": "VET",

    "givenName": "Sebastian",

    "familyName": "Vettel",

    "dateOfBirth": "1987-07-03",

    "nationality": "German",

    "champion": true,

    "nickname": null,

    "Constructors": [

    {

    "constructorId": "red_bull",

    "name": "Red Bull",

    "nationality": "Austrian"

    },

    {

    "constructorId": "aston_martin",

    "name": "Aston Martin",

    "nationality": "British"

    }]

    }

    ]

    }

    }

    }

    Listing 12-1

    The sample JSON document

    ```


    The script `f1_drivers_json.sql`, which can be found on the GitHub pages for this
    book, creates the table and inserts the JSON document.


    The JSON document contains objects as well as arrays. Notice that the keys in
    the JSON document contain upper- and lowercase characters. Not all attributes
    are present for both drivers, like the permanent number. Coulthard doesn’t have
    one, while Vettel does.


    ## JSON Data Types


    A JSON document can consist of objects, arrays, and/or scalar values.


    The data types for the values within the JSON document can be either an OBJECT,
    ARRAY, or scalar type: NUMBER, STRING, BOOLEAN, or NULL.


    When values are extracted from a JSON document, the JSON data types must be mapped
    to a comparable SQL data type to be useful. JSON data can’t be used for sorting,
    comparing, or grouping.


    How the JSON values are mapped to a SQL data type is up to the developer. For
    example, a JSON string can be mapped to VARCHAR2, CLOB, BLOB, or even a NUMBER
    when the value is numerical. How these JSON values are mapped depends on the SQL
    function you use; for example, with the `returning` clause of the `json_value`
    function, you can specify to which SQL type you want the JSON value to map.


    Because there is no matching data type for the JSON BOOLEAN (only true or false),
    the developer must determine what to do with it, either map it to 0 and 1 or map
    it to a “true” or “false” string.


    The JSON data type can be inspected with the `type()` item method, more on item
    methods in the related section in this chapter.'
