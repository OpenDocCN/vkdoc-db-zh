- fmt: '## Major Differences Between TREAT and JSON Constructor


    Using the JSON constructor (in Oracle Database 21) to project a column (`VARCHAR2`,
    `CLOB`, `BLOB`) to a `JSON` data type sounds like a no-brainer. It uses the `OSON`
    internal binary format, so this must be the best way to convert any string to
    a `JSON`. The `treat` function casts it to a `JSON` but still uses the `TEXT`
    format to produce the JSON document.


    There is a major difference in the behavior between the two options. Let’s re-examine
    the table containing JSON and non-JSON data and the views covering this table.
    This time let’s use two views to project the column to a `JSON` data type, one
    with the `treat` function and one with the JSON constructor.


    ```sql

    create table staging_table

    (document varchar2(500))

    /

    ```


    Also, add some data in this table, one row which is properly formatted JSON data
    and one row which is not.


    ```sql

    insert into staging_table

    values (''{"this":"that"}'')

    /

    insert into staging_table

    values (''this is surely no json data'')

    /

    ```


    For the views covering this table, use the following definitions.


    ```sql

    create or replace

    view treat_json_view

    as

    select treat (document as json) as document

    from staging_table

    /

    create or replace

    view native_json_view

    as

    select json (document) as document

    from staging_table

    /

    ```


    Note that both view definitions don’t have a predicate to filter out valid JSON
    data. All data, JSON or not, is exposed via the views.


    Querying the view that uses the `treat` function, all the data is returned from
    the underlying table, even the data that is clearly not JSON.


    ```sql

    select *

    from treat_json_view

    /

    ```


    ```

    DOCUMENT

    ------------------------------------------------------------

    {"this":"that"}

    this is surely no json data

    ```


    The other view that projects the columns to native `JSON` behaves differently.
    In the following `SELECT` statement, you can see that an exception is raised.


    ```sql

    select *

    from native_json_view

    /

    ```


    ```

    Error starting at line : 1 in command -

    select *

    from native_json_view

    Error report -

    ORA-40441: JSON syntax error

    ```


    Adding a predicate to filter out the JSON documents results in the same exception.


    ```sql

    select *

    from native_json_view

    where document is json

    /

    ```


    ```

    Error starting at line : 1 in command -

    select *

    from native_json_view

    where document is json

    Error report -

    ORA-40441: JSON syntax error

    ```


    Effectively this view is unusable unless it is modified to only expose JSON documents
    using a `where` clause with the `is json` predicate. The lesson to learn here
    is to be careful when covering a table that contains JSON and non-JSON data and
    applying functions to convert it to `JSON`.


    ## Determining the Structure


    Once you have loaded the JSON document into the database, its structure might
    be unknown. To get information about the structure, you can use the `json_dataguide`
    aggregate to help you understand.


    We took JSON documents returned by the Ergast Developer API ([`http://ergast.com/mrd/`](http://ergast.com/mrd/))
    web service for the examples. The web services return Formula 1 data. How to call
    this web service is outlined in Chapter 15.


    In the table `native_json`, I have loaded all driver standings for all completed
    seasons (1950 – 2021). Refer to the `load_json_docs.sql` code file, which can
    be downloaded from this book’s GitHub page.


    With the aggregate `json_dataguide`, information about the structure of the JSON
    is returned. `json_dataguide` analyzes all the JSON documents in the table and
    identifies each attribute, its type, its length, and what path to follow to retrieve
    it. The result is another JSON document called a JSON schema. There is currently
    no built-in functionality to validate this JSON schema, nor to validate incoming
    JSON documents against this JSON schema.


    The following query shows the first part of the JSON schema (the rest omitted
    for brevity).


    ```sql

    select json_dataguide (json_document) as guide

    from native_json

    /

    ```


    ```

    GUIDE

    --------------------------------------------------------------------------------

    [{"o:path":"$","type":"object","o:length":1},{"o:path":"$.MRData","type":"object

    ```


    Because the result is another JSON document, it is easy to get the results in
    a relational format (not all results are listed).


    ```sql

    with dataguide

    as

    (select json_dataguide (json_document) as guide

    from native_json)

    select jt.*

    from dataguide dg

    cross

    join json_table (dg.guide, ''$[*]''

    columns (

    json_path path ''$."o:path"''

    ,json_type path ''$."type"''

    ,len       path ''$."o:length"''

    )

    ) jt

    /

    ```


    ```

    JSON_PATH                                      JSON_TYPE    LEN

    ---------------------------------------------- ------------ ---

    $                                              object       1

    $.MRData                                       object       1

    $.MRData.url                                   string       64

    $.MRData.limit                                 string       4

    $.MRData.total                                 string       4

    $.MRData.xmlns                                 string       32

    $.MRData.offset                                string       1

    $.MRData.series                                string       2

    $.MRData.StandingsTable                        object       1

    $.MRData.StandingsTable.season                 string       4

    $.MRData.StandingsTable.StandingsLists         array        1

    $.MRData.StandingsTable.StandingsLists.round   string       2

    $.MRData.StandingsTable.StandingsLists.season  string       4

    ```


    The analysis of the JSON document shows that the top level (`$`) is a JSON object,
    while the `limit` attribute is a string and `StandingsLists` is an array. The
    JSON path expressions can extract values from the JSON document.


    Because `json_dataguide` analyses all JSON documents, it can take quite some time
    to get this done. It is also possible to store the data guide permanently using
    a JSON search index.


    To create the data guide–enabled search index, issue the following statement.


    ```sql

    create search index standing_idx on

    native_json (json_document)

    for json parameters (''dataguide on'')

    /

    ```


    With the data guide, you have all the information to project the JSON document
    into a relational format. There are two procedures in the `DBMS_JSON` package
    which can generate a view for you.


    *   `CREATE_VIEW`. This procedure creates a view with relational columns based
    on the data guide you pass in as an argument. The data guide argument can be created
    with `json_dataguide`. This procedure can also be used when there is a data guide–enabled
    search index. In that case, you would use the `dbms_json.get_index_dataguide`
    function to pass in as an argument. The data guide argument must be in a hierarchical
    format.'
  raw: '## Major Differences Between TREAT and JSON Constructor


    Using the JSON constructor (in Oracle Database 21) to project a column (VARCHAR2,
    CLOB, BLOB) to a JSON data type sounds like a no-brainer. It uses the OSON internal
    binary format, so this must be the best way to convert any string to a JSON. The
    `treat` function casts it to a JSON but still uses the TEXT format to produce
    the JSON document.


    There is a major difference in the behavior between the two options. Let’s re-examine
    the table containing JSON and non-JSON data and the views covering this table.
    This time let’s use two views to project the column to a JSON data type, one with
    the `treat` function and one with the JSON constructor.


    ```

    create table staging_table

    (document varchar2(500))

    /

    ```


    Also, add some data in this table, one row which is properly formatted JSON data
    and one row which is not.


    ```

    insert into staging_table

    values (''{"this":"that"}'')

    /

    insert into staging_table

    values (''this is surely no json data'')

    /

    ```


    For the views covering this table, use the following definitions.


    ```

    create or replace

    view treat_json_view

    as

    select treat (document as json) as document

    from staging_table

    /

    create or replace

    view native_json_view

    as

    select json (document) as document

    from staging_table

    /

    ```


    Note that both view definitions don’t have a predicate to filter out valid JSON
    data. All data, JSON or not, is exposed via the views.


    Querying the view that uses the `treat` function, all the data is returned from
    the underlying table, even the data that is clearly not JSON.


    ```

    select *

    from treat_json_view

    /

    DOCUMENT


    {"this":"that"}

    this is surely no json data

    ```


    The other view that projects the columns to native JSON behaves differently. In
    the following SELECT statement, you can see that an exception is raised.


    ```

    select *

    from native_json_view

    /

    Error starting at line : 1 in command -

    select *

    from native_json_view

    Error report -

    ORA-40441: JSON syntax error

    ```


    Adding a predicate to filter out the JSON documents results in the same exception.


    ```

    select *

    from native_json_view

    where document is json

    /

    Error starting at line : 1 in command -

    select *

    from native_json_view

    where document is json

    Error report -

    ORA-40441: JSON syntax error

    ```


    Effectively this view is unusable unless it is modified to only expose JSON documents
    using a `where` clause with the `is json` predicate. The lesson to learn here
    is to be careful when covering a table that contains JSON and non-JSON data and
    applying functions to convert it to JSON.


    ## Determining the Structure


    Once you have loaded the JSON document into the database, its structure might
    be unknown. To get information about the structure, you can use the `json_dataguide`
    aggregate to help you understand.


    We took JSON documents returned by the Ergast Developer API ([`http://ergast.com/mrd/`](http://ergast.com/mrd/))
    web service for the examples. The web services return Formula 1 data. How to call
    this web service is outlined in Chapter [15](#536316_1_En_15_Chapter.xhtml).


    In the table `native_json`, I have loaded all driver standings for all completed
    seasons (1950 – 2021). Refer to the `load_json_docs.sql` code file`,` which can
    be downloaded from this book’s GitHub page.


    With the aggregate `json_dataguide,` information about the structure of the JSON
    is returned. `json_dataguide` analyzes all the JSON documents in the table and
    identifies each attribute, its type, its length, and what path to follow to retrieve
    it. The result is another JSON document called a JSON schema. There is currently
    no built-in functionality to validate this JSON schema, nor to validate incoming
    JSON documents against this JSON schema.


    The following query shows the first part of the JSON schema (the rest omitted
    for brevity).


    ```

    select json_dataguide (json_document) as guide

    from native_json

    /

    GUIDE


    [{"o:path":"$","type":"object","o:length":1},{"o:path":"$.MRData","type":"object

    ```


    Because the result is another JSON document, it is easy to get the results in
    a relational format (not all results are listed).


    ```

    with dataguide

    as

    (select json_dataguide (json_document) as guide

    from native_json)

    select jt.*

    from dataguide dg

    cross

    join json_table (dg.guide, ''$[*]''

    columns (

    json_path path ''$."o:path"''

    ,json_type path ''$."type"''

    ,len       path ''$."o:length"''

    )

    ) jt

    /

    JSON_PATH                                      JSON_TYPE    LEN

    ---------------------------------------------- ------------ ---

    $                                              object       1

    $.MRData                                       object       1

    $.MRData.url                                   string       64

    $.MRData.limit                                 string       4

    $.MRData.total                                 string       4

    $.MRData.xmlns                                 string       32

    $.MRData.offset                                string       1

    $.MRData.series                                string       2

    $.MRData.StandingsTable                        object       1

    $.MRData.StandingsTable.season                 string       4

    $.MRData.StandingsTable.StandingsLists         array        1

    $.MRData.StandingsTable.StandingsLists.round   string       2

    $.MRData.StandingsTable.StandingsLists.season  string       4

    ```


    The analysis of the JSON document shows that the top level ($) is a JSON object,
    while the `limit` attribute is a string and `StandingsLists` is an array. The
    JSON path expressions can extract values from the JSON document.


    Because `json_dataguide` analyses all JSON documents, it can take quite some time
    to get this done. It is also possible to store the data guide permanently using
    a JSON search index.


    To create the data guide–enabled search index, issue the following statement.


    ```

    create search index standing_idx on

    native_json (json_document)

    for json parameters (''dataguide on'')

    /

    ```


    With the data guide, you have all the information to project the JSON document
    into a relational format. There are two procedures in the DBMS_JSON package which
    can generate a view for you.


    *   **CREATE_VIEW.** This procedure creates a view with relational columns based
    on the data guide you pass in as an argument. The data guide argument can be created
    with `json_dataguide`. This procedure can also be used when there is a data guide–enabled
    search index. In that case, you would use the `dbms_json.get_index_dataguide`
    function to pass in as an argument. The data guide argument must be in a hierarchical
    format.'
  trans: '

    ## TREAT 与 JSON 构造函数之间的主要区别


    在 Oracle Database 21 中，使用 JSON 构造函数将列（`VARCHAR2`、`CLOB`、`BLOB`）映射到 `JSON` 数据类型，听起来似乎不假思索。因为它使用
    `OSON` 内部二进制格式，所以这必定是将任何字符串转换为 `JSON` 的最佳方式。而 `treat` 函数则将其转换为 `JSON`，但仍使用 `TEXT`
    格式来生成 JSON 文档。


    这两种选项的行为存在重大差异。让我们重新审视那个包含 JSON 和非 JSON 数据的表，以及覆盖该表的视图。这次，我们使用两个视图将列映射到 `JSON`
    数据类型，一个使用 `treat` 函数，另一个使用 JSON 构造函数。


    ```sql

    create table staging_table

    (document varchar2(500))

    /

    ```


    同时，向该表添加一些数据，一行是格式正确的 JSON 数据，另一行则不是。


    ```sql

    insert into staging_table

    values (''{"this":"that"}'')

    /

    insert into staging_table

    values (''this is surely no json data'')

    /

    ```


    对于覆盖该表的视图，使用以下定义。


    ```sql

    create or replace

    view treat_json_view

    as

    select treat (document as json) as document

    from staging_table

    /

    create or replace

    view native_json_view

    as

    select json (document) as document

    from staging_table

    /

    ```


    请注意，两个视图定义都没有谓词来过滤掉有效的 JSON 数据。所有数据，无论是 JSON 还是非 JSON，都通过视图暴露出来。


    查询使用 `treat` 函数的视图时，会从底层表返回所有数据，甚至是那些明显不是 JSON 的数据。


    ```sql

    select *

    from treat_json_view

    /

    ```


    ```

    DOCUMENT

    ------------------------------------------------------------

    {"this":"that"}

    this is surely no json data

    ```


    另一个将列映射到原生 `JSON` 的视图行为则不同。在下面的 `SELECT` 语句中，你会看到抛出了一个异常。


    ```sql

    select *

    from native_json_view

    /

    ```


    ```

    Error starting at line : 1 in command -

    select *

    from native_json_view

    Error report -

    ORA-40441: JSON syntax error

    ```


    添加一个谓词来过滤 JSON 文档，仍然会导致相同的异常。


    ```sql

    select *

    from native_json_view

    where document is json

    /

    ```


    ```

    Error starting at line : 1 in command -

    select *

    from native_json_view

    where document is json

    Error report -

    ORA-40441: JSON syntax error

    ```


    实际上，除非修改该视图，仅使用带有 `is json` 谓词的 `where` 子句来暴露 JSON 文档，否则该视图无法使用。这里的经验教训是，在覆盖包含
    JSON 和非 JSON 数据的表，并应用函数将其转换为 `JSON` 时，需要格外小心。


    ## 确定结构


    一旦将 JSON 文档加载到数据库中，其结构可能未知。要获取结构信息，你可以使用聚合函数 `json_dataguide` 来辅助理解。


    我们的示例采用了 Ergast Developer API ([`http://ergast.com/mrd/`](http://ergast.com/mrd/))
    Web 服务返回的 JSON 文档。该 Web 服务提供一级方程式数据。如何调用此 Web 服务在第 15 章有概述。


    在表 `native_json` 中，我加载了所有已完成赛季（1950 – 2021）的车手积分榜。请参考本书 GitHub 页面可下载的 `load_json_docs.sql`
    代码文件。


    使用聚合函数 `json_dataguide`，可以返回有关 JSON 结构的信息。`json_dataguide` 分析表中的所有 JSON 文档，识别每个属性、其类型、长度以及检索它所需的路径。结果是另一个称为
    JSON 模式的 JSON 文档。目前没有内置功能来验证此 JSON 模式，也没有功能根据此 JSON 模式验证传入的 JSON 文档。


    以下查询显示了 JSON 模式的开头部分（为简洁起见，省略了其余部分）。


    ```sql

    select json_dataguide (json_document) as guide

    from native_json

    /

    ```


    ```

    GUIDE

    --------------------------------------------------------------------------------

    [{"o:path":"$","type":"object","o:length":1},{"o:path":"$.MRData","type":"object

    ```


    由于结果是另一个 JSON 文档，因此很容易以关系格式获取结果（未列出所有结果）。


    ```sql

    with dataguide

    as

    (select json_dataguide (json_document) as guide

    from native_json)

    select jt.*

    from dataguide dg

    cross

    join json_table (dg.guide, ''$[*]''

    columns (

    json_path path ''$."o:path"''

    ,json_type path ''$."type"''

    ,len       path ''$."o:length"''

    )

    ) jt

    /

    ```


    ```

    JSON_PATH                                      JSON_TYPE    LEN

    ---------------------------------------------- ------------ ---

    $                                              object       1

    $.MRData                                       object       1

    $.MRData.url                                   string       64

    $.MRData.limit                                 string       4

    $.MRData.total                                 string       4

    $.MRData.xmlns                                 string       32

    $.MRData.offset                                string       1

    $.MRData.series                                string       2

    $.MRData.StandingsTable                        object       1

    $.MRData.StandingsTable.season                 string       4

    $.MRData.StandingsTable.StandingsLists         array        1

    $.MRData.StandingsTable.StandingsLists.round   string       2

    $.MRData.StandingsTable.StandingsLists.season  string       4

    ```


    对 JSON 文档的分析显示，顶层（`$`）是一个 JSON 对象，而 `limit` 属性是一个字符串，`StandingsLists` 是一个数组。JSON
    路径表达式可以从 JSON 文档中提取值。


    因为 `json_dataguide` 分析所有 JSON 文档，所以完成分析可能需要相当长的时间。也可以使用 JSON 搜索索引永久存储数据指南。


    要创建支持数据指南的搜索索引，请执行以下语句。


    ```sql

    create search index standing_idx on

    native_json (json_document)

    for json parameters (''dataguide on'')

    /

    ```


    有了数据指南，你就拥有了将 JSON 文档映射为关系格式所需的所有信息。`DBMS_JSON` 包中有两个过程可以为你生成视图。


    *   `CREATE_VIEW`。此过程根据你作为参数传入的数据指南，创建一个包含关系列的视图。数据指南参数可通过 `json_dataguide` 创建。当存在支持数据指南的搜索索引时，也可以使用此过程。在这种情况下，你需要使用
    `dbms_json.get_index_dataguide` 函数作为参数传入。数据指南参数必须采用分层格式。

    '
- fmt: '# CREATE_VIEW_ON_PATH 过程


    `CREATE_VIEW_ON_PATH` 过程基于启用了数据指南的搜索索引创建一个包含关系列的视图。这种方法更灵活，因为您可以传入用于创建视图的 JSON
    路径表达式和一个最小频率阈值。该频率阈值由对 JSON 文档收集的统计信息指导。


    您可以运行以下语句，在具有启用了数据指南的搜索索引的表中为 JSON 文档生成一个视图。


    ```sql

    begin

    dbms_json.create_view

    (viewname  => ''standingsview''

    ,tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,dataguide => dbms_json.get_index_dataguide

    (tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,format    => dbms_json.format_hierarchical

    )

    );

    end;

    /

    ```


    创建的视图具有以下结构。


    ```

    Name                          Null?    Type

    ----------------------------- -------- -------------

    ID                            NOT NULL NUMBER

    JSON_DOCUMENT$url                      VARCHAR2(64)

    JSON_DOCUMENT$limit                    VARCHAR2(4)

    JSON_DOCUMENT$total                    VARCHAR2(4)

    JSON_DOCUMENT$xmlns                    VARCHAR2(32)

    JSON_DOCUMENT$offset                   VARCHAR2(1)

    JSON_DOCUMENT$series                   VARCHAR2(2)

    JSON_DOCUMENT$season                   VARCHAR2(4)

    JSON_DOCUMENT$round                    VARCHAR2(2)

    JSON_DOCUMENT$season_1                 VARCHAR2(4)

    JSON_DOCUMENT$wins                     VARCHAR2(2)

    JSON_DOCUMENT$url_2                    VARCHAR2(128)

    JSON_DOCUMENT$code                     VARCHAR2(4)

    JSON_DOCUMENT$driverId                 VARCHAR2(32)

    JSON_DOCUMENT$givenName                VARCHAR2(32)

    JSON_DOCUMENT$familyName               VARCHAR2(32)

    JSON_DOCUMENT$dateOfBirth              VARCHAR2(16)

    JSON_DOCUMENT$nationality              VARCHAR2(32)

    JSON_DOCUMENT$permanentNumber          VARCHAR2(2)

    JSON_DOCUMENT$points                   VARCHAR2(8)

    JSON_DOCUMENT$position                 VARCHAR2(4)

    JSON_DOCUMENT$positionText             VARCHAR2(4)

    JSON_DOCUMENT$url_3                    VARCHAR2(128)

    JSON_DOCUMENT$name                     VARCHAR2(32)

    JSON_DOCUMENT$nationality_4            VARCHAR2(16)

    JSON_DOCUMENT$constructorId            VARCHAR2(32)

    ```


    所有列名都基于数据指南，并且区分大小写。要查询视图，您必须在列名上使用引号。


    ```sql

    select "JSON_DOCUMENT$url"

    from standingsview

    /

    ```


    正如您能想到的，这远非理想情况。可以使用过程 `dbms_json.rename_column` 重命名列。但是，有一个注意事项：这需要在视图（重新）创建之前完成，并且只能在存在已启用数据指南的搜索索引（该索引已创建）时进行。


    > 提示

    >

    > 您可以多次运行 `dbms_json.create_view` 而无需先删除视图。这会自动为您处理。


    您可以使用以下语句重命名列。


    ```sql

    begin

    dbms_json.rename_column

    (tablename.     => ''native_json''

    ,jcolname       => ''json_document''

    ,path           => ''$.MRData.url''

    ,type           => dbms_json.type_string

    ,preferred_name => ''URL''

    );

    end;

    /

    ```


    请注意，前面代码中的 `preferred_name` 参数区分大小写。当您为列指定小写名称时，它会按原样创建，从而使列再次区分大小写。


    当为您创建视图时，JSON 文档中的所有数组都会被取消嵌套。这意味着原始的 71 个 JSON 文档现在变成了超过 3000 行。当您检查视图定义、`JSON_TABLE`
    与用于展开 JSON 文档的几个 `NESTED PATH` 表达式结合使用时，可以观察到这一点。这是 `FROM` 子句的摘录。为简洁起见，大多数列已被移除。


    ```sql

    from

    "BOOK"."NATIVE_JSON" rt,

    json_table ( "JSON_DOCUMENT", ''$[*]''

    columns

    "URL" varchar2 ( 64 ) path ''$.MRData.url'',

    ...

    nested path ''$.MRData.StandingsTable.StandingsLists[*]''

    columns (

    "JSON_DOCUMENT$season_1" varchar2 ( 4 ) path ''$.season'',

    nested path ''$.DriverStandings[*]''

    columns (

    "JSON_DOCUMENT$wins" varchar2 ( 2 ) path ''$.wins'',

    ...

    nested path ''$.Constructors[*]''

    columns (

    "JSON_DOCUMENT$url_3" varchar2 ( 128 ) path ''$.url'',

    ...

    ),

    ...

    )))   jt

    ```


    ## 索引 JSON 文档


    由于 JSON 文档可能相当大，对其进行索引以快速查找所需内容是有意义的。


    有几种索引 JSON 文档的方法，您选择的方法很大程度上取决于您的需求。本节探讨其中几种技术。


    为了生成以下各节中不同查询的执行计划，每条语句都按如下方式运行。


    ```sql

    explain plan for

    <statement>

    ```


    要检查执行计划，使用以下查询。


    ```sql

    select *

    from dbms_xplan.display (format => ''BASIC'')

    /

    ```


    基本格式显示最少的信息，例如操作和名称，这足以演示特定索引的使用。'
  raw: '*   **CREATE_VIEW_ON_PATH.** This procedure creates a view with relational
    columns based on a data guide–enabled search index. This method is more flexible
    as you can pass in a JSON path expression to use for creating the view and a minimum
    frequency threshold. The frequency threshold is guided by the gathering of statistics
    on the JSON document.


    You can run the following statement to generate a view of the JSON documents in
    the table with a data guide–enabled search index.


    ```

    begin

    dbms_json.create_view

    (viewname  => ''standingsview''

    ,tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,dataguide => dbms_json.get_index_dataguide

    (tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,format    => dbms_json.format_hierarchical

    )

    );

    end;

    /

    ```


    The view that is created has the following structure.


    ```

    Name                          Null?    Type

    ----------------------------- -------- -------------

    ID                            NOT NULL NUMBER

    JSON_DOCUMENT$url                      VARCHAR2(64)

    JSON_DOCUMENT$limit                    VARCHAR2(4)

    JSON_DOCUMENT$total                    VARCHAR2(4)

    JSON_DOCUMENT$xmlns                    VARCHAR2(32)

    JSON_DOCUMENT$offset                   VARCHAR2(1)

    JSON_DOCUMENT$series                   VARCHAR2(2)

    JSON_DOCUMENT$season                   VARCHAR2(4)

    JSON_DOCUMENT$round                    VARCHAR2(2)

    JSON_DOCUMENT$season_1                 VARCHAR2(4)

    JSON_DOCUMENT$wins                     VARCHAR2(2)

    JSON_DOCUMENT$url_2                    VARCHAR2(128)

    JSON_DOCUMENT$code                     VARCHAR2(4)

    JSON_DOCUMENT$driverId                 VARCHAR2(32)

    JSON_DOCUMENT$givenName                VARCHAR2(32)

    JSON_DOCUMENT$familyName               VARCHAR2(32)

    JSON_DOCUMENT$dateOfBirth              VARCHAR2(16)

    JSON_DOCUMENT$nationality              VARCHAR2(32)

    JSON_DOCUMENT$permanentNumber          VARCHAR2(2)

    JSON_DOCUMENT$points                   VARCHAR2(8)

    JSON_DOCUMENT$position                 VARCHAR2(4)

    JSON_DOCUMENT$positionText             VARCHAR2(4)

    JSON_DOCUMENT$url_3                    VARCHAR2(128)

    JSON_DOCUMENT$name                     VARCHAR2(32)

    JSON_DOCUMENT$nationality_4            VARCHAR2(16)

    JSON_DOCUMENT$constructorId            VARCHAR2(32)

    ```


    All the column names are based on the data guide and are case-sensitive. To query
    the view, you would have to use quotes in the column names.


    ```

    select "JSON_DOCUMENT$url"

    from standingsview

    /

    ```


    As you can imagine, this is far from ideal. There is a way to rename the columns
    using the procedure `dbms_json.rename_column`. However, there is a catch. This
    needs to be done before the view is (re)created and can only be done when there
    is a data guide–enabled search index, which was already created.


    Tip


    You can run `dbms_json.create_view` multiple times without first dropping the
    view. This is handled automatically for you.


    You can rename the column with the following statement.


    ```

    begin

    dbms_json.rename_column

    (tablename.     => ''native_json''

    ,jcolname       => ''json_document''

    ,path           => ''$.MRData.url''

    ,type           => dbms_json.type_string

    ,preferred_name => ''URL''

    );

    end;

    /

    ```


    Note that the `preferred_name` argument in the preceding code is case-sensitive.
    When you specify a lowercase name for the column, it is created as such, making
    the column once again case-sensitive.


    When the view is created for you, all the arrays in the JSON document are unnested.
    This means that the original 71 JSON documents are now over 3000 rows. This can
    be observed when you inspect the view definition, JSON_TABLE, in combination with
    several NESTED PATH expressions used to explode the JSON document. This is an
    excerpt of the `FROM` clause. Most columns were removed for brevity.


    ```

    from

    "BOOK"."NATIVE_JSON" rt,

    json_table ( "JSON_DOCUMENT", ''$[*]''

    columns

    "URL" varchar2 ( 64 ) path ''$.MRData.url'',

    ...

    nested path ''$.MRData.StandingsTable.StandingsLists[*]''

    columns (

    "JSON_DOCUMENT$season_1" varchar2 ( 4 ) path ''$.season'',

    nested path ''$.DriverStandings[*]''

    columns (

    "JSON_DOCUMENT$wins" varchar2 ( 2 ) path ''$.wins'',

    ...

    nested path ''$.Constructors[*]''

    columns (

    "JSON_DOCUMENT$url_3" varchar2 ( 128 ) path ''$.url'',

    ...

    ),

    ...

    )))   jt

    ```


    ### Indexing JSON Documents


    As JSON documents can be quite large, it makes sense to index them to quickly
    find what you’re looking for.


    There are several ways to index JSON documents, and your chosen method strongly
    depends on your needs. This section explores several of these techniques.


    To generate the explain plan for the different queries in the following sections,
    each statement is run as follows.


    ```

    explain plan for


    ```


    To examine the explain plan, the following query is used.


    ```

    select *

    from dbms_xplan.display (format => ''BASIC'')

    /

    ```


    The basic format displays the minimum information, such as operation and name,
    which is sufficient to demonstrate the use of a specific index.'
  trans: '# CREATE_VIEW_ON_PATH 过程


    `CREATE_VIEW_ON_PATH` 过程基于启用了数据指南的搜索索引创建一个包含关系列的视图。这种方法更灵活，因为您可以传入用于创建视图的 JSON
    路径表达式和一个最小频率阈值。该频率阈值由对 JSON 文档收集的统计信息指导。


    您可以运行以下语句，在具有启用了数据指南的搜索索引的表中为 JSON 文档生成一个视图。


    ```sql

    begin

    dbms_json.create_view

    (viewname  => ''standingsview''

    ,tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,dataguide => dbms_json.get_index_dataguide

    (tablename => ''native_json''

    ,jcolname  => ''json_document''

    ,format    => dbms_json.format_hierarchical

    )

    );

    end;

    /

    ```


    创建的视图具有以下结构。


    ```

    Name                          Null?    Type

    ----------------------------- -------- -------------

    ID                            NOT NULL NUMBER

    JSON_DOCUMENT$url                      VARCHAR2(64)

    JSON_DOCUMENT$limit                    VARCHAR2(4)

    JSON_DOCUMENT$total                    VARCHAR2(4)

    JSON_DOCUMENT$xmlns                    VARCHAR2(32)

    JSON_DOCUMENT$offset                   VARCHAR2(1)

    JSON_DOCUMENT$series                   VARCHAR2(2)

    JSON_DOCUMENT$season                   VARCHAR2(4)

    JSON_DOCUMENT$round                    VARCHAR2(2)

    JSON_DOCUMENT$season_1                 VARCHAR2(4)

    JSON_DOCUMENT$wins                     VARCHAR2(2)

    JSON_DOCUMENT$url_2                    VARCHAR2(128)

    JSON_DOCUMENT$code                     VARCHAR2(4)

    JSON_DOCUMENT$driverId                 VARCHAR2(32)

    JSON_DOCUMENT$givenName                VARCHAR2(32)

    JSON_DOCUMENT$familyName               VARCHAR2(32)

    JSON_DOCUMENT$dateOfBirth              VARCHAR2(16)

    JSON_DOCUMENT$nationality              VARCHAR2(32)

    JSON_DOCUMENT$permanentNumber          VARCHAR2(2)

    JSON_DOCUMENT$points                   VARCHAR2(8)

    JSON_DOCUMENT$position                 VARCHAR2(4)

    JSON_DOCUMENT$positionText             VARCHAR2(4)

    JSON_DOCUMENT$url_3                    VARCHAR2(128)

    JSON_DOCUMENT$name                     VARCHAR2(32)

    JSON_DOCUMENT$nationality_4            VARCHAR2(16)

    JSON_DOCUMENT$constructorId            VARCHAR2(32)

    ```


    所有列名都基于数据指南，并且区分大小写。要查询视图，您必须在列名上使用引号。


    ```sql

    select "JSON_DOCUMENT$url"

    from standingsview

    /

    ```


    正如您能想到的，这远非理想情况。可以使用过程 `dbms_json.rename_column` 重命名列。但是，有一个注意事项：这需要在视图（重新）创建之前完成，并且只能在存在已启用数据指南的搜索索引（该索引已创建）时进行。


    > 提示

    >

    > 您可以多次运行 `dbms_json.create_view` 而无需先删除视图。这会自动为您处理。


    您可以使用以下语句重命名列。


    ```sql

    begin

    dbms_json.rename_column

    (tablename.     => ''native_json''

    ,jcolname       => ''json_document''

    ,path           => ''$.MRData.url''

    ,type           => dbms_json.type_string

    ,preferred_name => ''URL''

    );

    end;

    /

    ```


    请注意，前面代码中的 `preferred_name` 参数区分大小写。当您为列指定小写名称时，它会按原样创建，从而使列再次区分大小写。


    当为您创建视图时，JSON 文档中的所有数组都会被取消嵌套。这意味着原始的 71 个 JSON 文档现在变成了超过 3000 行。当您检查视图定义、`JSON_TABLE`
    与用于展开 JSON 文档的几个 `NESTED PATH` 表达式结合使用时，可以观察到这一点。这是 `FROM` 子句的摘录。为简洁起见，大多数列已被移除。


    ```sql

    from

    "BOOK"."NATIVE_JSON" rt,

    json_table ( "JSON_DOCUMENT", ''$[*]''

    columns

    "URL" varchar2 ( 64 ) path ''$.MRData.url'',

    ...

    nested path ''$.MRData.StandingsTable.StandingsLists[*]''

    columns (

    "JSON_DOCUMENT$season_1" varchar2 ( 4 ) path ''$.season'',

    nested path ''$.DriverStandings[*]''

    columns (

    "JSON_DOCUMENT$wins" varchar2 ( 2 ) path ''$.wins'',

    ...

    nested path ''$.Constructors[*]''

    columns (

    "JSON_DOCUMENT$url_3" varchar2 ( 128 ) path ''$.url'',

    ...

    ),

    ...

    )))   jt

    ```


    ## 索引 JSON 文档


    由于 JSON 文档可能相当大，对其进行索引以快速查找所需内容是有意义的。


    有几种索引 JSON 文档的方法，您选择的方法很大程度上取决于您的需求。本节探讨其中几种技术。


    为了生成以下各节中不同查询的执行计划，每条语句都按如下方式运行。


    ```sql

    explain plan for

    <statement>

    ```


    要检查执行计划，使用以下查询。


    ```sql

    select *

    from dbms_xplan.display (format => ''BASIC'')

    /

    ```


    基本格式显示最少的信息，例如操作和名称，这足以演示特定索引的使用。'
- fmt: "### Searching for a Specific Key\n\n假设你需要查询某个特定赛季。\n\n```sql\nselect *\nfrom\
    \ native_json\nwhere json_value (\n    json_document\n    ,'$.MRData.StandingsTable.StandingsLists.season'\n\
    ) = :season\n/\n```\n\n这个查询的执行计划显示需要进行全表扫描。目前看来，没有其他方式可以获取该信息。\n\n```sql\n| Id\
    \  | Operation         | Name        |\n|---|---|---|\n|   0 | SELECT STATEMENT\
    \  |             |\n|   1 |  TABLE ACCESS FULL| NATIVE_JSON |\n```\n\n要为此查询创建索引，你可以使用查询中相同的表达式创建一个基于函数的索引。\n\
    \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value ( json_document\n\
    \    ,'$.MRData.StandingsTable.StandingsLists.season' )\n)\n/\n```\n\n这种技术只能为每个JSON文档索引一个值。数组无法用这种方式索引。并且，由于无法保证JSON文档始终保持不变（Web服务的创建者可能会改变主意），这可能导致意外的结果。以下是一种更好、更清晰的方式来定义这个索引。\n\
    \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value (\n \
    \       json_document\n        ,'$.MRData.StandingsTable.StandingsLists.season'\n\
    \        error on error\n        null on empty\n    )\n)\n/\n```\n\n有了这个索引后，执行计划发生了变化，你可以看到*索引范围扫描*。\n\
    \n```sql\n| Id  | Operation                           | Name            |\n|---|---|---|\n\
    |   0 | SELECT STATEMENT                    |                 |\n|   1 |  TABLE\
    \ ACCESS BY INDEX ROWID BATCHED| NATIVE_JSON     |\n|   2 |   INDEX RANGE SCAN\
    \                  | RACE_SEASON_IDX |\n```\n\n关于索引能否被使用，有相同的规则适用。其中之一是索引列的数据类型与谓词中用作绑定变量的数据类型是否匹配。\n\
    \n在前面的例子中，`season`属性被索引，其数据类型是`VARCHAR2(4000)`。这意味着当查询谓词将索引列与数字进行比较时，索引无法被使用。\n\
    \n```sql\nwhere json_value (\n    json_document\n    ,'$.MRData.StandingsTable.StandingsLists.season'\n\
    ) = 1969 --<-- number\n/\n\n| Id  | Operation         | Name        |\n|---|---|---|\n\
    |   0 | SELECT STATEMENT  |             |\n|   1 |  TABLE ACCESS FULL| NATIVE_JSON\
    \ |\n```\n\n谓词需要将索引值与字符串进行比较。\n\n```sql\nwhere json_value (\n    json_document\n\
    \    ,'$.MRData.StandingsTable.StandingsLists.season'\n) = '1969' --<-- string\n\
    /\n\n| Id  | Operation                           | Name            |\n|---|---|---|\n\
    |   0 | SELECT STATEMENT                    |                 |\n|   1 |  TABLE\
    \ ACCESS BY INDEX ROWID BATCHED| NATIVE_JSON     |\n|   2 |   INDEX RANGE SCAN\
    \                  | RACE_SEASON_IDX |\n```\n\n当你将索引定义改为使用`number()`项方法时，你明确指定了索引值是数值类型。对于编写查询的人来说，因为他们需要使用与基于函数的索引中定义的相同的表达式，所以也很清楚在比较中应该使用数值。\n\
    \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value (\n \
    \       json_document\n        ,'$.MRData.StandingsTable.StandingsLists.season.number()'\n\
    \        error on error\n        null on empty\n    )\n)\n/\n```\n\n使用此索引进行测试后发现，即使你在谓词中使用字符串，索引仍然会被使用。只要JSON路径表达式与基于函数的索引中的表达式相同，这就是成立的。\n\
    \n这种索引类型，即基于函数的索引，在你确切知道要查找什么时是有效的。这听起来像是一个缺点，但在实际处理JSON文档时，你通常确实知道自己要找什么。\n\n\
    ### Ad Hoc Searching with the JSON Search Index\n\n从Oracle Database 12.2开始，可以使用JSON搜索索引来索引JSON文档。其行为类似于Oracle\
    \ Text索引，因此可能看起来很熟悉。在后台，会为JSON文档创建一个Oracle Text索引。\n\nJSON搜索索引的语法非常简单，但效果很好。\n\
    \n```sql\ncreate search index standing_idx on\nnative_json (\n    json_document\n\
    )\nfor json\n/\n```\n\n创建JSON搜索索引可能需要一些时间，并且它会在你的模式中创建各种`DR$`表，类似于Oracle Text。\n\
    \n**提示**\n\n要将持久化的数据指南信息作为JSON搜索索引的一部分创建，你可以在`parameters`子句中指定。\n\n```sql\ncreate\
    \ search index standing_idx on native_json (json_document) for json parameters\
    \ ('dataguide on');\n```\n\n或者，你也可以稍后通过重建JSON搜索索引来完成。\n\n```sql\nalter index standing_idx\
    \ rebuild parameters ('dataguide on');\n```\n\n一旦索引创建完成，你就可以查询出现在JSON文档中任何位置的任何属性。例如，让我们搜索任何提到“verstappen”的JSON文档。\n\
    \n```sql\nselect *\nfrom native_json\nwhere json_textcontains (\n    json_document\n\
    \    ,'$'\n    ,'verstappen'\n)\n/\n```\n\n正如你在前面的查询中看到的，就像使用Oracle Text一样，你可以使用一个特殊的谓词来利用JSON搜索索引，尽管这并非严格必要。\n\
    \n```sql\n| Id  | Operation                   | Name         |\n|---|---|---|\n\
    |   0 | SELECT STATEMENT            |              |\n|   1 |  TABLE ACCESS BY\
    \ INDEX ROWID| NATIVE_JSON  |\n|   2 |   DOMAIN INDEX              | STANDING_IDX\
    \ |\n```\n\n重要的是要知道，你搜索的词需要精确匹配。传递“stap”作为搜索词不会产生任何结果。搜索“VER”或“ver”会产生结果，仅仅因为那是静态的车手代码，就像“HAM”代表汉密尔顿，“LEC”代表勒克莱尔一样（尽管在1973年和1977年也有一个制造商（LEC\
    \ Refrigeration）拥有相同的标识）。\n\n即使你使用`json_value`在谓词中查询JSON文档，JSON搜索索引也可以被使用（在此示例中，之前创建的基于函数的索引已被删除）。\n\
    \n```sql\nselect *\nfrom native_json\nwhere json_value (\n    json_document\n\
    \    , '$.MRData.StandingsTable.StandingsLists.season'\n) = :season\n/\n```\n\n\
    这会显示以下执行计划。\n\n```sql\n| Id  | Operation                   | Name         |\n\
    |---|---|---|\n|   0 | SELECT STATEMENT            |              |\n|   1 | \
    \ TABLE ACCESS BY INDEX ROWID| NATIVE_JSON  |\n|   2 |   DOMAIN INDEX        \
    \      | STANDING_IDX |\n```"
  raw: '### Searching for a Specific Key


    Suppose you have a query to search for a specific season.


    ```

    select *

    from native_json

    where json_value (

    json_document

    ,''$.MRData.StandingsTable.StandingsLists.season''

    ) = :season

    /

    ```


    The explain plan for this query shows that a full table scan is needed. There
    is simply no other way to get the information.


    ```


    | Id  | Operation         | Name        |


    |   0 | SELECT STATEMENT  |             |

    |   1 |  TABLE ACCESS FULL| NATIVE_JSON |


    ```


    To create an index for this query, you can create a function-based index with
    the same expression that you have in the query.


    ```

    create index race_season_idx on

    native_json (

    json_value ( json_document

    ,''$.MRData.StandingsTable.StandingsLists.season'' )

    )

    /

    ```


    This technique can only index one value per JSON document. Arrays can’t be indexed
    in this way. Because there is no way to guarantee that the JSON document always
    stays the same (the creator of the web service can change their mind), it could
    lead to unexpected results. The following is a better and cleaner way to define
    this index.


    ```

    create index race_season_idx on

    native_json (

    json_value (

    json_document

    ,''$.MRData.StandingsTable.StandingsLists.season''

    error on error

    null on empty

    )

    )

    /

    ```


    With this index in place, the explain plan changes, and you can see an *index
    range scan*.


    ```


    | Id  | Operation                           | Name            |


    |   0 | SELECT STATEMENT                    |                 |

    |   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| NATIVE_JSON     |

    |   2 |   INDEX RANGE SCAN                  | RACE_SEASON_IDX |


    ```


    The same rules apply when an index can be used or not. One of them is the data
    type that is indexed vs. the data type used in the predicate as a bind variable.


    In the preceding example, the `season a`ttribute is indexed, and the data type
    is VARCHAR2(4000). This means that when the query predicate compares the indexed
    column with a number, the index can’t be used.


    ```

    where json_value (

    json_document

    ,''$.MRData.StandingsTable.StandingsLists.season''

    ) = 1969 --<-- number

    /


    | Id  | Operation         | Name        |


    |   0 | SELECT STATEMENT  |             |

    |   1 |  TABLE ACCESS FULL| NATIVE_JSON |


    ```


    The predicate needs to compare the indexed value with a string.


    ```

    where json_value (

    json_document

    ,''$.MRData.StandingsTable.StandingsLists.season''

    ) = ''1969'' --<-- string

    /


    | Id  | Operation                           | Name            |


    |   0 | SELECT STATEMENT                    |                 |

    |   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| NATIVE_JSON     |

    |   2 |   INDEX RANGE SCAN                  | RACE_SEASON_IDX |


    ```


    When you change the index definition to use the `number()` item method, you explicitly
    define that the indexed value is numeric. For the writer of the query, as they
    need to use the same expression as is defined in the function-based index, it
    is also clear that a numeric value should be used in the comparison.


    ```

    create index race_season_idx on

    native_json (

    json_value (

    json_document

    ,''$.MRData.StandingsTable.StandingsLists.season.number()''

    error on error

    null on empty

    )

    )

    /

    ```


    Testing with this index revealed that the index is still used even if you use
    a string in the predicate. As long as the JSON path expression is the same as
    the expression in the function-based index, this is true.


    This type of index, a function-based index, is fine as long as you know what you
    are looking for. It sounds like a downside, but realistically quite often, you
    know exactly what you are looking for when processing JSON documents.


    ### Ad Hoc Searching with the JSON Search Index


    Since Oracle Database 12.2, it is possible to index JSON documents with JSON search
    indexes. The behavior is similar to Oracle Text indexes, so they might seem familiar.
    In the background, an Oracle Text index is created for the JSON documents.


    The syntax for a JSON search index is very simple, but the result is fantastic.


    ```

    create search index standing_idx on

    native_json (

    json_document

    )

    for json

    /

    ```


    Creating a JSON search index might take some time, and it creates all kinds of
    DR$-tables in your schema, similar to Oracle Text.


    Tip


    To create persistent data guide information as part of a JSON search index, you
    can specify this in the parameter clause.


    `create search index standing_idx on native_json (json_document) for json parameters
    (''dataguide on'');`


    Or, later you can do this by rebuilding the JSON search index.


    `alter index standing_idxrebuild parameters (''dataguide on'');`


    Once the index is created, you can query any attribute that appears anywhere in
    the JSON document. For example, let’s search for any JSON document that mentions
    “verstappen” anywhere.


    ```

    select *

    from native_json

    where json_textcontains (

    json_document

    ,''$''

    ,''verstappen''

    )

    /

    ```


    As you can see in the preceding query, just like with Oracle Text, you can use
    a special predicate to use the JSON search index, although this is not strictly
    necessary.


    ```


    | Id  | Operation                   | Name         |


    |   0 | SELECT STATEMENT            |              |

    |   1 |  TABLE ACCESS BY INDEX ROWID| NATIVE_JSON  |

    |   2 |   DOMAIN INDEX              | STANDING_IDX |


    ```


    It is important to know that the word that you are searching for needs to be an
    exact match. Passing “stap” as the search term does not yield any results. Searching
    for “VER” or “ver” yield results simply because that is the static driver code,
    just like “HAM” is for Hamilton, and “LEC” is for Leclerc (although there was
    also a constructor (1973, 1977) with the same identification: LEC Refrigeration).


    Even if you are querying the JSON documents by using a JSON_VALUE in the predicate,
    the JSON search index can be used (for this example, the earlier created function-based
    index has been dropped).


    ```

    select *

    from native_json

    where json_value (

    json_document

    , ''$.MRData.StandingsTable.StandingsLists.season''

    ) = :season

    /

    ```


    This shows the following explain plan.


    ```


    | Id  | Operation                   | Name         |


    |   0 | SELECT STATEMENT            |              |

    |   1 |  TABLE ACCESS BY INDEX ROWID| NATIVE_JSON  |

    |   2 |   DOMAIN INDEX              | STANDING_IDX |


    ```'
