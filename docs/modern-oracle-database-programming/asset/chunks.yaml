  trans: '## 为什么选择 ANSI 连接？


    使用 ANSI 风格连接语法的主要优势在于将连接条件与过滤条件分离。传统语法会将连接条件与过滤条件混在一起，而使用 ANSI 风格则完全避免了这种情况。连接条件指定了表如何关联，而过滤条件则位于
    `where` 子句中。


    传统的表连接方式是在 `from` 子句中列出表，并在 `where` 子句中指定连接条件。当数据需要额外过滤时，这些过滤条件也会进入 `where` 子句。这可能导致混淆，无法确定
    `where` 子句中的条件究竟是连接条件还是过滤条件。


    ANSI 风格的语法强制要求将连接条件指定在 `on` 子句或 `using` 子句中。而过滤条件则始终放在 `where` 子句中。


    在传统风格中，如果忘记指定连接条件，会导致产生笛卡尔积。


    使用 ANSI 风格语法则不会意外产生笛卡尔积。当传统风格的代码确实意图创建笛卡尔积时，需要添加适当的注释，以告知后续开发者这个笛卡尔积是故意为之。而 ANSI
    风格的笛卡尔积则一目了然：`cross join`。这直接向后续开发者表明该笛卡尔积是故意的，无需额外注释。


    使用外连接表时，传统风格不那么直观。外连接符号 `(+)` 应该加在外连接的表上，还是加在另一张表上？必须对外连接的所有列都应用 `(+)` 符号，连接才能保持为外连接。其他数据库厂商的数据库开发者不会熟悉这种
    Oracle 风格的外连接语法。


    ANSI 风格的外连接更容易理解。要编写一个查询，对表 A 和 B 执行外连接，并返回 A 表（位于连接关键字左侧的表）的所有行，只需在 `from` 子句中指定
    `left outer join`。而使用传统风格编写外连接时，必须对外连接操作符 `(+)` 应用于表 B 的所有列，这可能有违直觉。


    实际上，底层使用哪种连接风格并不重要。优化器会重写它们，并以相同的方式执行。


    无论你偏好哪种连接风格，一个共识是：不应在同一个查询中混合使用这两种风格。虽然这是可能的，但被认为是不良实践。最常见的是，所有数据库开发者在项目开始时就商定好查询风格。


    ## 自然连接


    自然连接是指连接条件由两表中列的 `名称` 推导而来。这种设计堪称 ANSI 标准中的一个败笔，不应被使用。


    以下用 `DRIVERS`、`RESULTS` 和 `CONSTRUCTORS` 表来演示自然连接的荒谬之处。使用自然连接组合这些表，并执行以下查询：


    ```

    select ctr.name

    ,drv.forename

    ,drv.surname

    from f1data.drivers drv

    natural

    join f1data.results rst

    natural

    join f1data.constructors ctr

    /

    no rows selected

    ```


    该查询没有返回任何结果，检查执行计划后，原因一目了然。


    ```

    explain plan for

    select ctr.name

    , drv.forename

    , drv.surname

    from   f1data.drivers drv

    natural

    join   f1data.results rst

    natural

    join   f1data.constructors ctr

    /

    select *

    from   table (dbms_xplan.display (format => ''BASIC +PREDICATE'' ))

    /


    | Id  | Operation                    | Name         |


    |   0 | SELECT STATEMENT             |              |

    |*  1 |  HASH JOIN                   |              |

    |   2 |   JOIN FILTER CREATE         | :BF0000      |

    |*  3 |    HASH JOIN                 |              |

    |   4 |     TABLE ACCESS STORAGE FULL| CONSTRUCTORS |

    |   5 |     TABLE ACCESS STORAGE FULL| DRIVERS      |

    |   6 |   JOIN FILTER USE            | :BF0000      |

    |*  7 |    TABLE ACCESS STORAGE FULL | RESULTS      |


    Predicate Information (identified by operation id):


    1 - access("RST"."CONSTRUCTORID"="CTR"."CONSTRUCTORID" AND

    "DRV"."DRIVERID"="RST"."DRIVERID")

    3 - access("DRV"."URL"="CTR"."URL" AND

    "DRV"."NATIONALITY"="CTR"."NATIONALITY")

    7 - storage(SYS_OP_BLOOM_FILTER(:BF0000,"RST"."DRIVERID"))

    filter(SYS_OP_BLOOM_FILTER(:BF0000,"RST"."DRIVERID"))

    ```


    从访问谓词信息中可以看到，自然连接执行的连接条件是基于列名的相似性。有些是正确的，比如 constructorid 和 driverid，但其他的则毫无意义，比如
    nationality 或 url。重申一次，这个 ANSI 标准中的败笔不应被使用。


    ## 内连接


    将两个表关联起来的最常用方法是内连接。表根据连接条件中指定的某些列进行连接。以下示例展示了 `drivers` 表和 `results` 表之间的内连接。


    ```

    select crt.raceid

    , crt.points

    , csr.name

    , csr.nationality

    from   f1data.constructors csr

    inner

    join   f1data.constructorresults crt

    on   csr.constructorid = crt.constructorid

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    18         14 McLaren         British

    18          8 BMW Sauber      German

    18          9 Williams        British

    18          5 Renault         French

    18          2 Toro Rosso      Italian

    18          1 Ferrari         Italian

    18          0 Toyota          Japanese

    18          0 Super Aguri     Japanese

    18          0 Red Bull        Austrian

    18          0 Force India     Indian

    ```


    在这个查询中，通过使用可选关键字 `inner`，明确指定了这是一个内连接。连接条件在 `on` 子句中指定。也可以使用 `using` 子句，它表示两表之间存在一个同名公共列。`using`
    子句会在两个列之间进行相等性比较。而 `on` 子句允许在连接列之间进行其他类型的比较。以下示例与前一个示例等价，但在连接条件中使用了 `using` 子句。


    ```

    select crt.raceid

    , crt.points

    , csr.name

    , csr.nationality

    from   f1data.constructors csr

    join   f1data.constructorresults crt

    using  (constructorid)

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    18         14 McLaren         British

    18          8 BMW Sauber      German

    18          9 Williams        British

    18          5 Renault         French

    18          2 Toro Rosso      Italian

    18          1 Ferrari         Italian

    18          0 Toyota          Japanese

    18          0 Super Aguri     Japanese

    18          0 Red Bull        Austrian

    18          0 Force India     Indian


    ```


    `using` 子句中指定的、用于连接条件的列，在查询的任何地方都不能使用表别名作为前缀。需要明确的是，这些列是可以使用的；只是不能在前面加上表别名。毕竟，用于连接表的列是表之间的公共列。'
- fmt: '# Outer Joins


    An outer join shows rows from one table, regardless of having a match in the other
    table. There can be constructors that don’t have any results yet.


    With ANSI-style outer join, the order of the tables as they appear in the query
    is important. A `left` outer join directs that *all rows* from the table located
    on the left of the join keyword are shown, even if there is no match with the
    table on the right of the join keyword. A `right` outer join does the same, but
    now regarding the rows on the right side of the join keyword.


    > Note

    >

    > The most common way of writing outer joins that can be found in forums and examples
    around the internet is to use a `left outer` join. Maybe the reason for this is
    that the leading table is often written down first. Even though common, it is
    not a requirement, but still a best practice. In this chapter and throughout the
    book, a `left outer join` is used.


    In the following example, all constructors are shown even when they don’t have
    any points in the `constructorresults` table.


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid = crt.constructorid

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- -----------

    18         14 McLaren         British

    19         10 McLaren         British

    20          4 McLaren         British


    Pawl            American

    Rae             American

    Adams           American

    ```


    > Note

    >

    > The `outer` and `inner` keywords are optional, but it is highly recommended
    to use them for syntactic clarity.


    ## Almost Outer Joins


    An “almost outer join” is where an outer join is written in the query, but it
    has been negated by extra conditions in the `where` clause.


    In the following example, the objective is to see all constructors and their constructor
    results; however, if the team is `Red Bull`, you want to also see their points.
    For other teams, this information is irrelevant and doesn’t need to be shown.
    The first attempt for this query is the following.


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid = crt.constructorid

    where  csr.constructorref = ''red_bull''

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    1062          2 Red Bull        Austrian

    1063       12.5 Red Bull        Austrian


    1072         18 Red Bull        Austrian

    1073         26 Red Bull        Austrian

    1074          0 Red Bull        Austrian

    1075         37 Red Bull        Austrian

    1076         18 Red Bull        Austrian

    1077         58 Red Bull        Austrian

    336 rows selected.

    ```


    As seen in the example, there is an outer join in the query, but the results only
    show `Red Bull` data. The constructor results for all other constructors are missing.
    This query doesn’t show the results that were the objective stated earlier. To
    get the requested result set, the filter criteria must be a join criteria.


    ```sql

    select crt.raceid

    ,      crt.points

    ,      csr.name

    ,      csr.nationality

    from   f1data.constructors csr

    left outer

    join   f1data.constructorresults crt

    on     csr.constructorid  = crt.constructorid

    and    csr.constructorref = ''red_bull''

    /

    RACEID     POINTS NAME            NATIONALITY

    ---------- ---------- --------------- ---------------

    1062          2 Red Bull        Austrian

    1063       12.5 Red Bull        Austrian


    Alpine F1 Team  French

    McLaren         British

    Martini         French

    Pawl            American

    Cooper-BRM      British

    546 rows selected.

    ```


    Now the query shows the results the way specified, only points for team `Red Bull`.


    ## Full Outer Joins


    The data model doesn’t have a good example where a full outer join can be applied,
    but for demonstration purposes, the foreign key between `RACES` and `CIRCUITS`
    is changed from mandatory to optional. The idea is that it should be possible
    to schedule a race in the future where the circuit is unknown. It is also possible
    to have a circuit, but there are no races for it yet.


    In each table, an extra record is added with fictitious data.


    ```sql

    Insert into f1data.races

    ( raceid

    , year

    , round

    , circuitid

    , name

    , race_date

    )

    values

    ( 0

    , 2023

    , 42

    , null

    , ''Hitchhiker Race''

    , date ''2023-10-07''

    )

    /

    ```


    ```sql

    insert into f1data.circuits

    ( circuitid

    , circuitref

    , name

    , location

    , country

    )

    values

    ( 0

    , ''brabantbaan''

    , ''Brabant Baan''

    , ''Oosterhout''

    , ''Netherlands'')

    /

    ```


    In the following example, a full outer join is performed, and the results are
    filtered to only show the rows that were just added in the preceding code.


    ```sql

    select rce.name      as race

    ,      rce.race_date

    ,      cct.name      as circuit

    ,      cct.location

    from   f1data.races rce

    full outer

    join   f1data.circuits cct

    on     rce.circuitid = cct.circuitid

    where  rce.rowid is null

    or     cct.rowid is null

    /

    RACE             RACE_DATE  CIRCUIT          LOCATION

    ---------------  ---------  ---------------  -----------

    Hitchhiker Race  07-OCT-23  Brabant Baan     Oosterhout

    ```


    A record from the `RACES` table is shown, even when there is no circuit to host
    the event, and a circuit is shown where no race is planned.


    ## Cross Joins


    In a cartesian product, all records from the first table are joined with the records
    from the second table. Using the ANSI join syntax, it is very clear that this
    is on purpose and not because a join condition is missing by accident. In ANSI
    join syntax, this is called a `cross join`. The following example creates a cartesian
    product of drivers; the `drivers` table is joined with itself. To show the effect
    of the cross join, a count is used.


    ```sql

    select count(*)

    from   f1data.drivers drv

    /

    COUNT(*)


    ```


    There are 854 drivers in the table. When this table is joined to itself as a cartesian
    product, all possible combinations of drivers are made, resulting in 854 × 854
    records: 729316 records.


    ```sql

    select count(*)

    from   f1data.drivers drv

    cross

    join   f1data.drivers drv2

    /

    COUNT(*)


    ```


    Because of the explicit `cross join` syntax, it is clear to the next developer
    reading this code that the cartesian product is on purpose.'
