- fmt: "# Collections\n\nSimilar to records, you can also initialize collections using\
    \ `qualified expressions`. In previous Oracle Database versions, you had to initialize\
    \ the collection on an item-per-item basis (see Listing [7-29](#536316_1_En_7_Chapter.xhtml#PC31)).\n\
    \n```\ndeclare\n  type numbers_tt is table of number index by pls_integer;\n \
    \ l_numbers numbers_tt;\nbegin\n  l_numbers(72) := 29;\n  l_numbers(76) := 6;\n\
    \  l_numbers(98) := 18;\n  l_numbers(69) := 5;\n  for indx in indices of l_numbers\
    \ loop\n    dbms_output.put_line( '('\n                        ||indx\n      \
    \                  ||') '\n                        ||l_numbers(indx)\n       \
    \                 );\n  end loop;\nend;\n/\n(69) 5\n(72) 29\n(76) 6\n(98) 18\n\
    Listing 7-29\nInitializing collections pre-18c\n```\n\nThe same script becomes\
    \ clearer and more concise using a qualified expression (see Listing [7-30](#536316_1_En_7_Chapter.xhtml#PC32)).\n\
    \n```\ndeclare\n  type numbers_tt is table of number index by pls_integer;\n \
    \ l_numbers numbers_tt;\nbegin\n  l_numbers := numbers_tt( 72 => 29\n        \
    \                 , 76 => 6\n                         , 98 => 18\n           \
    \              , 69 => 5\n                         );\n  for indx in indices of\
    \ l_numbers loop\n    dbms_output.put_line( '('\n                        ||indx\n\
    \                        ||') '\n                        ||l_numbers(indx)\n \
    \                       );\n  end loop;\nend;\n/\n(69) 5\n(72) 29\n(76) 6\n(98)\
    \ 18\nListing 7-30\nInitializing collections in 18c\n```\n\nIf you want to initialize\
    \ a dense collection with indices starting at number 1, Oracle Database 21c does\
    \ not require using qualified expressions (see Listing [7-31](#536316_1_En_7_Chapter.xhtml#PC33)).\n\
    \n```\ndeclare\n  type numbers_tt is table of number index by pls_integer;\n \
    \ l_numbers numbers_tt;\nbegin\n  l_numbers := numbers_tt( 29, 6, 18, 5 );\n \
    \ for indx in indices of l_numbers loop\n    dbms_output.put_line( '('\n     \
    \                   ||indx\n                        ||') '\n                 \
    \       ||l_numbers(indx)\n                        );\n  end loop;\nend;\n/\n\
    (1) 29\n(2) 6\n(3) 18\n(4) 5\nListing 7-31\nInitializing dense collections in\
    \ 21c\n```\n\nYou can also use a cursor directly in the constructor of the collection.\
    \ There are two ways to populate the collection using a cursor. You can populate\
    \ it as a dense collection in the same way your collection would be populated\
    \ using a `bulk collect`. In this case, you use the `sequence` keyword for the\
    \ index in your collection (see Listing [7-32](#536316_1_En_7_Chapter.xhtml#PC34)).\n\
    \n```\ndeclare\n  type circuit_tt is table of f1data.circuits%rowtype\n    index\
    \ by pls_integer;\n  l_circuits circuit_tt;\nbegin\n  l_circuits := circuit_tt\n\
    \    (for rec in\n      (select c.circuitid\n             , c.circuitref\n   \
    \          , c.name\n             , c.location\n             , c.country\n   \
    \          , c.lat\n             , c.lng\n             , c.alt\n             ,\
    \ c.url\n       from   f1data.circuits c\n       order  by c.circuitref\n    \
    \  ) sequence => rec);\n  dbms_output.put_line( l_circuits(1).name\n         \
    \             ||' ('\n                      ||l_circuits(1).location\n       \
    \               ||' ['\n                      ||l_circuits(1).lat\n          \
    \            ||','\n                      ||l_circuits(1).lng\n              \
    \        ||'])'\n                      );\nend;\n/\nCircuit Park Zandvoort (Zandvoort\
    \ [52.3888,4.54092])\nListing 7-32\nInitializing dense collections using cursor\
    \ in 21c\n```\n\nSometimes it makes more sense to use the table’s primary key\
    \ as an index, or even a unique key, like in this case, the `circuitref` field.\
    \ Here you use the `index` keyword to assign a field from the cursor as an index\
    \ (see Listing [7-33](#536316_1_En_7_Chapter.xhtml#PC35)).\n\n```\ndeclare\n \
    \ type circuit_tt is table of f1data.circuits%rowtype\n    index by varchar2(256);\n\
    \  l_circuits circuit_tt;\nbegin\n  l_circuits := circuit_tt\n    (for rec in\n\
    \      (select c.circuitid\n             , c.circuitref\n             , c.name\n\
    \             , c.location\n             , c.country\n             , c.lat\n \
    \            , c.lng\n             , c.alt\n             , c.url\n       from\
    \   f1data.circuits c\n      ) index rec.circuitref => rec);\n  dbms_output.put_line(\
    \ l_circuits('zandvoort').name\n                      ||' ('\n               \
    \       ||l_circuits('zandvoort').location\n                      ||' ['\n   \
    \                   ||l_circuits('zandvoort').lat\n                      ||','\n\
    \                      ||l_circuits('zandvoort').lng\n                      ||'])'\n\
    \                      );\nend;\n/\nCircuit Park Zandvoort (Zandvoort [52.3888,4.54092])\n\
    Listing 7-33\nInitializing sparse collections using cursor in 21c\n```\n\n## Summary\n\
    \nSince Oracle Database 21c, you have access to an extensive range of possibilities\
    \ in loops. The iterator doesn’t have to be an integer. It can also be a non-integer\
    \ or a string value. The iterator can now be declared mutable, so you can alter\
    \ the value inside the loop. Iteration controls can be stepped and stacked.\n\n\
    Using `qualified expressions` makes your code clear and more self-documenting.\n\
    \n# Part II Multiple Techniques and Languages\n\n# 8. Polymorphic Table Functions\
    \ and SQL Macros\n\nA lot of functionality is provided by Oracle Database out\
    \ of the box. Most common functions and procedures are at your fingertips. But\
    \ what do they offer when you need something not provided by Oracle? Suppose you\
    \ have to figure out the total work hours when you only have a check-in and check-out\
    \ time. An aggregate to sum up the interval differences between the start and\
    \ end times would be very helpful. Unfortunately, Oracle Database does not provide\
    \ an aggregate that sums up intervals yet. (You never know when they will implement\
    \ a function like that.) You could create a “normal” PL/SQL function, but then\
    \ you would always take a performance hit.\n\nWhat if you’re migrating from a\
    \ different database, like SQL Server, where there is a function to determine\
    \ the current date and time (`SYSDATE`), and you don’t want to change all the\
    \ code the application uses?\n\nIn previous Oracle Database releases, you could\
    \ take advantage of the Oracle Data Cartridge Interface (`ODCI`), but that was\
    \ not trivial to implement correctly. One of the hardest things to implement was\
    \ to make your `ODCI` function work correctly with parallel query processing.\n\
    \nWith the introduction of the *polymorphic table function* (`PTF`), implementing\
    \ your own SQL functions is a lot simpler, not trivial. Oracle takes care of the\
    \ underlying plumbing to ensure that the `PTF` plays nicely with parallel queries.\n\
    \nSQL Macros can also be used in this area, making some implementations of `PTF`s\
    \ a little easier. With SQL Macros, you can create reusable SQL snippets. Implement\
    \ once, use in your SQL statements, and don’t have the performance impact that\
    \ a regular PL/SQL function call has.\n\n## Polymorphic Table Functions\n\nThe\
    \ SQL:2016 standard describes *polymorphic table functions* as follows.\n\n> *…\
    \ user-defined functions that can be invoked in the FROM clause. They can process\
    \ tables whose row type is not declared at definition time and produce a result\
    \ table whose row type may or may not be declared at definition time. Polymorphic\
    \ Table Functions allow application developers to leverage the long-defined dynamic\
    \ SQL capabilities to create powerful and complex custom functions.*\n\nOracle\
    \ Database 18c introduces this concept. Depending on the input parameters, the\
    \ return type is defined at runtime. This differs from the conventional table\
    \ functions, where the return type is fixed at compile time.\n\nA polymorphic\
    \ table function consists of two parts.\n\n*   A PL/SQL package that holds all\
    \ the code for the `PTF` implementation.\n*   A stand-alone or packaged function\
    \ that acts as an interface naming the `PTF` and its associated implementation\
    \ package.\n\nThe PL/SQL package contains the programs to implement the `PTF`.\
    \ The programs accept the PL/SQL version of the arguments supplied in the interface\
    \ function."
  raw: '### Collections


    Similar to records, you can also initialize collections using *qualified expressions*.
    In previous Oracle Database versions, you had to initialize the collection on
    an item-per-item basis (see Listing [7-29](#536316_1_En_7_Chapter.xhtml#PC31)).


    ```

    declare

    type numbers_tt is table of number index by pls_integer;

    l_numbers numbers_tt;

    begin

    l_numbers(72) := 29;

    l_numbers(76) := 6;

    l_numbers(98) := 18;

    l_numbers(69) := 5;

    for indx in indices of l_numbers loop

    dbms_output.put_line( ''(''

    ||indx

    ||'') ''

    ||l_numbers(indx)

    );

    end loop;

    end;

    /

    (69) 5

    (72) 29

    (76) 6

    (98) 18

    Listing 7-29

    Initializing collections pre-18c

    ```


    The same script becomes clearer and more concise using a qualified expression
    (see Listing [7-30](#536316_1_En_7_Chapter.xhtml#PC32)).


    ```

    declare

    type numbers_tt is table of number index by pls_integer;

    l_numbers numbers_tt;

    begin

    l_numbers := numbers_tt( 72 => 29

    , 76 => 6

    , 98 => 18

    , 69 => 5

    );

    for indx in indices of l_numbers loop

    dbms_output.put_line( ''(''

    ||indx

    ||'') ''

    ||l_numbers(indx)

    );

    end loop;

    end;

    /

    (69) 5

    (72) 29

    (76) 6

    (98) 18

    Listing 7-30

    Initializing collections in 18c

    ```


    If you want to initialize a dense collection with indices starting at number 1,
    Oracle Database 21c does not require using qualified expressions (see Listing
    [7-31](#536316_1_En_7_Chapter.xhtml#PC33)).


    ```

    declare

    type numbers_tt is table of number index by pls_integer;

    l_numbers numbers_tt;

    begin

    l_numbers := numbers_tt( 29, 6, 18, 5 );

    for indx in indices of l_numbers loop

    dbms_output.put_line( ''(''

    ||indx

    ||'') ''

    ||l_numbers(indx)

    );

    end loop;

    end;

    /

    (1) 29

    (2) 6

    (3) 18

    (4) 5

    Listing 7-31

    Initializing dense collections in 21c

    ```


    You can also use a cursor directly in the constructor of the collection. There
    are two ways to populate the collection using a cursor. You can populate it as
    a dense collection in the same way your collection would be populated using a
    `bulk collect`. In this case, you use the sequence keyword for the index in your
    collection (see Listing [7-32](#536316_1_En_7_Chapter.xhtml#PC34)).


    ```

    declare

    type circuit_tt is table of f1data.circuits%rowtype

    index by pls_integer;

    l_circuits circuit_tt;

    begin

    l_circuits := circuit_tt

    (for rec in

    (select c.circuitid

    , c.circuitref

    , c.name

    , c.location

    , c.country

    , c.lat

    , c.lng

    , c.alt

    , c.url

    from   f1data.circuits c

    order  by c.circuitref

    ) sequence => rec);

    dbms_output.put_line( l_circuits(1).name

    ||'' (''

    ||l_circuits(1).location

    ||'' [''

    ||l_circuits(1).lat

    ||'',''

    ||l_circuits(1).lng

    ||''])''

    );

    end;

    /

    Circuit Park Zandvoort (Zandvoort [52.3888,4.54092])

    Listing 7-32

    Initializing dense collections using cursor in 21c

    ```


    Sometimes it makes more sense to use the table’s primary key as an index, or even
    a unique key, like in this case, the `circuitref` field. Here you use the `index`
    keyword to assign a field from the cursor as an index (see Listing [7-33](#536316_1_En_7_Chapter.xhtml#PC35)).


    ```

    declare

    type circuit_tt is table of f1data.circuits%rowtype

    index by varchar2(256);

    l_circuits circuit_tt;

    begin

    l_circuits := circuit_tt

    (for rec in

    (select c.circuitid

    , c.circuitref

    , c.name

    , c.location

    , c.country

    , c.lat

    , c.lng

    , c.alt

    , c.url

    from   f1data.circuits c

    ) index rec.circuitref => rec);

    dbms_output.put_line( l_circuits(''zandvoort'').name

    ||'' (''

    ||l_circuits(''zandvoort'').location

    ||'' [''

    ||l_circuits(''zandvoort'').lat

    ||'',''

    ||l_circuits(''zandvoort'').lng

    ||''])''

    );

    end;

    /

    Circuit Park Zandvoort (Zandvoort [52.3888,4.54092])

    Listing 7-33

    Initializing sparse collections using cursor in 21c

    ```


    ## Summary


    Since Oracle Database 21c, you have access to an extensive range of possibilities
    in loops. The iterator doesn’t have to be an integer. It can also be a non-integer
    or a string value. The iterator can now be declared mutable, so you can alter
    the value inside the loop. Iteration controls can be stepped and stacked.


    Using qualified expressions makes your code clear and more self-documenting.


    # Part IIMultiple Techniques and Languages


    # 8. Polymorphic Table Functions and SQL Macros


    A lot of functionality is provided by Oracle Database out of the box. Most common
    functions and procedures are at your fingertips. But what do they offer when you
    need something not provided by Oracle? Suppose you have to figure out the total
    work hours when you only have a check-in and check-out time. An aggregate to sum
    up the interval differences between the start and end times would be very helpful.
    Unfortunately, Oracle Database does not provide an aggregate that sums up intervals
    yet. (You never know when they will implement a function like that.) You could
    create a “normal” PL/SQL function, but then you would always take a performance
    hit.


    What if you’re migrating from a different database, like SQL Server, where there
    is a function to determine the current date and time (SYSDATE), and you don’t
    want to change all the code the application uses?


    In previous Oracle Database releases, you could take advantage of the Oracle Data
    Cartridge Interface (ODCI), but that was not trivial to implement correctly. One
    of the hardest things to implement was to make your ODCI function work correctly
    with parallel query processing.


    With the introduction of the *polymorphic table function* (PTF), implementing
    your own SQL functions is a lot simpler, not trivial. Oracle takes care of the
    underlying plumbing to ensure that the PTF plays nicely with parallel queries.


    SQL Macros can also be used in this area, making some implementations of PTFs
    a little easier. With SQL Macros, you can create reusable SQL snippets. Implement
    once, use in your SQL statements, and don’t have the performance impact that a
    regular PL/SQL function call has.


    ## Polymorphic Table Functions


    The SQL:2016 standard describes *polymorphic table functions* as follows.


    > *… user-defined functions that can be invoked in the FROM clause. They can process
    tables whose row type is not declared at definition time and produce a result
    table whose row type may or may not be declared at definition time. Polymorphic
    Table Functions allow application developers to leverage the long-defined dynamic
    SQL capabilities to create powerful and complex custom functions.*


    Oracle Database18c introduces this concept. Depending on the input parameters,
    the return type is defined at runtime. This differs from the conventional table
    functions, where the return type is fixed at compile time.


    A polymorphic table function consists of two parts.


    *   A PL/SQL package that holds all the code for the PTF implementation.


    *   A stand-alone or packaged function that acts as an interface naming the PTF
    and its associated implementation package.


    The PL/SQL package contains the programs to implement the PTF. The programs accept
    the PL/SQL version of the arguments supplied in the interface function.'
