    l_subprogram := utl_call_stack.subprogram( 1 );

    dbms_output.put_line(''subprograms '');

    for indx in l_subprogram.first .. l_subprogram.last

    loop

    dbms_output.put_line(to_char(indx) || '')'' ||

    l_subprogram(indx));

    end loop;

