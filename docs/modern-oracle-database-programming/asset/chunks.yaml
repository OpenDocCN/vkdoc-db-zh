    d63        ..Salo                    c6                  2

    d203       ..Villeneuve              c6                  2

    d832       ..Sainz                   c6                  2

    d477       ..Allison                 c6                  2

    d278       ..Amon                    c6                  2

    d581       ..Collins                 c6                  2


