- fmt: '# 6. 条件编译


    条件编译自 Oracle 10g 起就已可用。此功能在无数场景中都非常有用。例如，您可以使用条件编本来检查数据库环境（开发、测试、生产）、检查编译器优化级别、根据环境包含或排除代码，并为未来数据库版本的发布准备代码。


    ## 指令


    条件编译语法由三条指令组成：选择指令、查询指令和错误指令。这些指令以美元符号（`$`）为前缀，以区别于普通的 PL/SQL 语法。


    ### 选择指令


    选择指令使用以下构建块。


    ```

    $if $then [ $elsif ] [ $else ] $end

    ```


    一个代码块可能如下所示。


    ```

    $if some_condition = true $then

    select ''Patrick'' into l_name from dual;

    $else

    select ''Alex'' into l_name from dual;

    $end

    ```


    这看起来很像普通的 PL/SQL 条件，但美元符号告诉编译器它正在进入一个条件编译块。如果条件（`查询指令`）求值为 true，则跟在 `$then` 之后的代码块会被包含在编译后的程序中。如果查询指令为
    false，则编译器会评估 `$elsif` 条件（如果可用）。如果没有条件为 true，则会包含 `$else` 分支中的块（如果可用）。


    ### 查询指令


    在选择指令之后，您需要指定一个查询指令，以确定选择指令的哪个分支应被包含在编译后的程序中。查询指令可以是一个标志，使用 `plsql_ccflags` 设置来定义。您可以使用
    `alter session` 语句来设置这些标志。


    ```

    alter session set plsql_ccflags = ''myflag:true''

    ```


    但您也可以在编译程序时指定标志。


    ```

    alter package mypackage compile plsql_ccflags=''myflag:true''

    ```


    如果一个标志不存在，则它会被求值为 false。标志只能保存静态布尔值。要使用数值，您必须创建一个包来将这些值保存为常量。在 Oracle Database
    19c 之前，您只能使用整数或 `pls_integer`；从该版本起，所有数值数据类型都已可用。查询指令必须是静态布尔表达式。


    注意


    您不能在查询指令中使用 `VARCHAR2` 常量。


    ## 总结


    本章探讨了前 N 条和分页查询。内联视图、分析函数以及 `offset` 和 `fetch` 子句使查询更具可读性且更易于维护。


    对集合操作的增强增加了语法清晰度，并提高了对 ANSI 标准的遵循度。


    # Intersect


    `intersect` 操作符仅筛选出同时存在于两个输入集合中的行。上一节中的 `grahams_and_hills` 视图被用来演示此操作。


    在 `intersect` 操作符之前的第一个集合是视图中的所有行（共六条记录）。在 `intersect` 操作符之后的第二个集合被筛选为仅包含 Graham
    Hill（两条记录）。


    ```

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    intersect

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    where  gh.driverref = ''hill''

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    289 hill             Graham Hill      British

    ```


    与 `union` 操作符类似，这会对结果集执行去重操作。因此，即使 *Graham Hill* 在两个集合中都出现了两次，他在最终结果集中也只出现一次。


    从 Oracle Database 21c 开始，可以通过为其添加 `distinct` 来更明确地编写此 `intersect` 操作符。


    ```

    intersect distinct

    ```


    其工作原理保持不变；它增加了语法上的清晰度。


    从 Oracle Database 21c 开始，`intersect` 操作符就有了 `all` 版本。如果将脚本改为使用 `intersect all`
    操作符，则会得到不同的结果。


    ```

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    intersect all

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    where  gh.driverref = ''hill''

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    289 hill             Graham Hill      British

    289 hill             Graham Hill      British

    ```


    正如您在结果集中看到的，Graham Hill 在每个结果集中出现了两次，在最终结果集中也出现了两次。'
  raw: '### Intersect


    The `intersect` operator filters out only the rows that exist in both input sets.
    The `grahams_and_hills` view from the previous section is used to demonstrate
    this operation.


    The first set, before the `intersect` operator, are all the rows in the views
    (six records in total). The second set, after the `intersect` operator, is filtered
    to only include Graham Hill (two records).


    ```

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    intersect

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    where  gh.driverref = ''hill''

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    289 hill             Graham Hill      British

    ```


    Like, with the union operator, this performs a distinct on the result set. So,
    even though *Graham Hill* appears twice is both sets, he only appears once in
    the final result set.


    This `intersect` operator can, starting in Oracle Database 21c, be written more
    explicit by adding distinct to it.


    ```

    intersect distinct

    ```


    The workings remain the same; it adds syntactic clarity.


    The `intersect` operator has had an `all` version since Oracle Database 21c. You
    get a different result if the script is altered to use the `intersect all` operator.


    ```

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    intersect all

    select gh.driverid

    , gh.driverref

    , gh.forename

    , gh.surname

    , gh.nationality

    from   grahams_and_hills gh

    where  gh.driverref = ''hill''

    /

    DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

    ---------- ---------------- ------ --------- -------------

    289 hill             Graham Hill      British

    289 hill             Graham Hill      British

    ```


    As you can see in the result set, Graham Hill occurs twice in each result set
    and twice in the final result set.


    ## Summary


    This chapter examined top-N and pagination queries. Inline views, analytic functions,
    and the `offset` and `fetch` clauses make queries more readable and easier to
    maintain.


    Enhancements to the set operations add syntactic clarity and increase adherence
    to the ANSI standard.


    # 6. Conditional Compilation


    Conditional compilation has been available since Oracle 10g. There are countless
    scenarios in which this can be useful. For example, you can use conditional compilation
    to check the database (develop, test, production), check the compiler optimization
    level, include or exclude code depending on the environment, and prepare your
    code for release on future versions of the database.


    ## Directives


    The conditional compilation syntax consists of three directives. The selection
    directive, the inquiry directive, and the error directive. The directives are
    prefixed by the dollar sign ($) to distinguish them from the normal PL/SQL syntax.


    ### Selection Directive


    The selection directive uses these building blocks.


    ```

    $if $then [ $elsif ] [ $else ] $end

    ```


    A block could look something like the following.


    ```

    $if some_condition = true $then

    select ''Patrick'' into l_name from dual;

    $else

    select ''Alex'' into l_name from dual;

    $end

    ```


    This looks a lot like normal PL/SQL conditions, but the dollar sign tells the
    compiler it is entering a conditional compilation block. If the condition (`inquiry
    directive`) evaluates to true, the code block following `$then` is included in
    the compiled program. If the inquiry directive is false, then the compiler evaluates
    the `$elsif` condition if available. If none of the conditions are true, then
    the block in the `$else` branch, if available, is included.


    ### Inquiry Directive


    After the selection directive, you specify an inquiry directive to determine which
    branch of the selection directive should be included in the compiled program.
    The inquiry directive can be a flag, defined using the `plsql_ccflags` setting.
    You can set these flags using an `alter session` statement.


    ```

    alter session set plsql_ccflags = ''myflag:true''

    ```


    But you can also specify the flags when compiling the program.


    ```

    alter package mypackage compile plsql_ccflags=''myflag:true''

    ```


    If a flag is non-existent, it is evaluated as false. Flags can only hold static
    boolean values. To use numeric values, you must create a package to hold these
    values as constants. Prior to Oracle Database 19c, you could only use integers
    or pls_integers; all numeric data types have been available since then. Inquiry
    directives must be static boolean expressions.


    Note


    You cannot use a VARCHAR2 constant in an inquiry directive.'
