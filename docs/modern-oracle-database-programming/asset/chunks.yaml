  trans: '

    # 高级队列与 JSON


    自 Oracle 数据库 21c 起，高级队列（AQ）也支持原生 JSON 负载。此版本引入了原生 JSON 数据类型。在此之前，处理 JSON 负载虽然可行，但始终是基于文本的；例如，使用
    `sys.aq$_jms_text_message` 作为负载数据类型。


    要创建处理 JSON 负载的队列表，请为 `queue_payload_type` 参数指定 JSON。


    ```sql

    begin

    sys.dbms_aqadm.create_queue_table (

    queue_table        => ''json_qt''

    ,queue_payload_type => ''json''

    );

    end;

    /

    ```


    在队列表中创建和启动队列的操作与之前相同。


    ```sql

    begin

    sys.dbms_aqadm.create_queue (

    queue_name  => ''jq''

    ,queue_table => ''json_qt''

    );

    sys.dbms_aqadm.start_queue (

    queue_name => ''jq''

    );

    end;

    /

    ```


    当然，放入队列的消息应该是 JSON 格式。


    ```sql

    declare

    l_enqueue_options    sys.dbms_aq.enqueue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw (16);

    l_payload            json;

    begin

    l_payload := json (''{"Hello" : "World"}'');

    sys.dbms_aq.enqueue

    (queue_name         => ''jq''

    ,enqueue_options    => l_enqueue_options

    ,message_properties => l_message_properties

    ,payload            => l_payload

    ,msgid              => l_msgid

    );

    commit;

    end;

    /

    ```


    当消息出队时，请记住负载是 JSON。这意味着在 `dbms_output` 中使用时，应将其视为 JSON 处理。在下面的示例中，返回值应转换为字符串。


    ```sql

    set serveroutput on

    declare

    l_dequeue_options    sys.dbms_aq.dequeue_options_t;

    l_message_properties sys.dbms_aq.message_properties_t;

    l_msgid              raw(16);

    l_payload            json;

    begin

    sys.dbms_aq.dequeue(

    queue_name         => ''jq'',

    dequeue_options    => l_dequeue_options,

    message_properties => l_message_properties,

    payload            => l_payload,

    msgid              => l_msgid

    );

    sys.dbms_output.put_line(

    ''Retrieved from the JSON-payload [''

    || json_value (l_payload, ''$.Hello'' returning varchar2 )

    || '']''

    );

    end;

    /

    Retrieved from the JSON-payload [World]

    ```


    # 总结


    本章通过一个常见用例探讨了如何提升用户体验，并讨论了高级队列（AQ）在其中发挥的作用。将处理任务卸载给后台进程，能够在控制权交还给用户时，让应用程序显得响应非常迅速。


    生成 PDF 文档可能耗时且耗费资源。当此生成过程被卸载到后台进程时，就不会因过度消耗资源而妨碍任何用户。


    由于回调过程在后台运行，必须监控任何导致消息传播到异常队列的异常，以确保该消息本应执行的工作得以完成。


    本章还包含一个简短示例，展示了 Oracle 数据库 21c 中引入的原生 JSON 数据类型。


    # 17. 内省 PL/SQL


    了解正在执行的 PL/SQL 块中发生了什么可以提供有价值的信息。从 PL/SQL 块内部设置 client_identifier、module 和 action
    有助于跟踪每个会话正在执行的操作。`DBMS_SESSION` 包中为此提供了支持性的过程和函数。


    在 `DBMS_UTILITY` 包中，有可以在发生意外异常时识别调用堆栈的过程和函数。甚至可以使用本章同样涵盖的 `utl_call_stack` 来检索关于调用堆栈的更多信息。


    ## DBMS_SESSION


    使用 `DBMS_SESSION`，您可以从 PL/SQL 中执行 `alter session` 命令。通常在 SQL*Plus 或 SQLcl 会话中进行的设置，现在可以通过您的
    PL/SQL 过程和函数来完成。


    ### current_is_role_enabled


    如果程序的某部分需要您启用某个角色，您可以使用 `dbms_session.current_is_role_enabled` 来检查指定角色当前是否已启用。您向函数提供要检查的角色名称。如果角色已启用，函数返回
    `TRUE`；否则返回 `FALSE`。


    ```sql

    function current_is_role_enabled(rolename varchar2)

    return boolean;

    ```


    ### set_role


    如果所需角色未启用但已授予您，您可以使用 `dbms_session.set_role` 在运行时设置角色。如果角色已经启用，再次发出 set role 命令会执行而不会报错。参数中的文本被附加到
    "SET ROLE" SQL 语句后，然后作为动态 SQL 执行。


    ```sql

    procedure set_role(role_cmd varchar2);

    ```


    ### set_nls


    有时您的程序依赖于特定的 NLS 设置；例如，在将字符串转换为日期或反向转换时。如果您想确保 NLS 设置正确完成，而不依赖于用户的设置，可以使用 `dbms_session.set_nls`
    来设置这些特定设置。该过程接受两个参数：参数名称和其值。


    ```sql

    procedure set_nls(param varchar2, value varchar2);

    ```


    调用此过程等效于执行 `alter session set <nls_parameter> = <value>`。


    参数名称必须以 NLS 开头。如果值是文本字面量，则需要用单引号括起来。下面是一个示例。


    ```sql

    set_nls(''nls_date_format'',''''''DD-MON-YY'''''')

    ```


    如果参数需要很多引号，您可能希望使用替代引用法。


    ```sql

    dbms_session.set_nls(''nls_date_format'', q''[''DD-MON-YY'']'')

    ```


    **注意**


    使用 `execute immediate ''alter session ...''` 具有更好的性能。此外，`execute immediate` 允许在一条语句中指定多个参数，这比多次调用
    `dbms_session.set_nls` 更高效。

    '
- fmt: '### set_context


    要使用上下文设置，您必须使用如清单 [17-1](#536316_1_En_17_Chapter.xhtml#PC6) 中的 SQL 命令创建一个上下文。


    ```

    create or replace context modp_ctx using modp_pkg

    /

    Listing 17-1

    Creating an application context

    ```


    如果要在此上下文中设置或清除值，您不能直接调用 `DBMS_SESSION` 包。


    ```

    begin

    dbms_session.set_context( namespace => ''modp_ctx''

    , attribute => ''author1''

    , value     => ''Alex Nuijten''

    );

    dbms_session.set_context( namespace => ''modp_ctx''

    , attribute => ''author2''

    , value     => ''Patrick Barel''

    );

    end;

    /

    ORA-01031: insufficient privileges

    ORA-06512: at "SYS.DBMS_SESSION", line 141

    ORA-06512: at line 2

    ```


    您必须创建一个包来访问 `DBMS_SESSION` 包中的过程。这可以是一个简单的包装器包，如清单 [17-2](#536316_1_En_17_Chapter.xhtml#PC8)
    所示。如您在清单 [17-1](#536316_1_En_17_Chapter.xhtml#PC6) 创建应用程序上下文的语句中所见，此包与上下文相关联。


    ```

    create or replace package modp_pkg as

    procedure set_context

    ( namespace_in in varchar2

    , attribute_in in varchar2

    , value_in     in varchar2

    , username_in  in varchar2 default null

    , client_id_in in varchar2 default null

    );

    procedure clear_context

    ( namespace_in in varchar2

    , client_id_in in varchar2 default null

    , attribute_in in varchar2 default null

    );

    procedure clear_all_context

    ( namespace_in in varchar2 );

    end modp_pkg;

    /

    create or replace package body modp_pkg as

    procedure set_context

    ( namespace_in in varchar2

    , attribute_in in varchar2

    , value_in     in varchar2

    , username_in  in varchar2 default null

    , client_id_in in varchar2 default null

    ) is

    begin

    dbms_session.set_context(namespace => namespace_in

    ,attribute => attribute_in

    ,value     => value_in

    ,username  => username_in

    ,client_id => client_id_in);

    end set_context;

    procedure clear_context

    ( namespace_in in varchar2

    , client_id_in in varchar2 default null

    , attribute_in in varchar2 default null

    ) is

    begin

    dbms_session.clear_context(namespace => namespace_in

    ,client_id => client_id_in

    ,attribute => attribute_in);

    end clear_context;

    procedure clear_all_context

    ( namespace_in in varchar2 ) is

    begin

    dbms_session.clear_all_context(namespace => namespace_in);

    end clear_all_context;

    end modp_pkg;

    /

    Listing 17-2

    modp_pkg to communicate to the context

    ```


    现在，当您尝试运行与之前相同的块时，只需调用包装器包，您就可以设置上下文值。


    ```

    begin

    modp_pkg.set_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author1''

    , value_in     => ''Alex Nuijten''

    );

    modp_pkg.set_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author2''

    , value_in     => ''Patrick Barel''

    );

    end;

    /

    PL/SQL procedure successfully completed

    ```


    注意：包装器包可用于多个上下文。如果该包仅用于单个上下文，则最好删除 `namespace_in` 参数。


    您可以使用简单的 select 语句检查上下文中的值，如下所示。


    ```

    select sys_context(''modp_ctx'',''author1'') author1

    , sys_context(''modp_ctx'',''author2'') author2

    from   dual

    /

    AUTHOR1              AUTHOR2

    -------------------- --------------------

    Alex Nuijten         Patrick Barel

    ```


    但您也可以在 `where` 子句的谓词中使用上下文值。


    ```

    select ''author2 = Patrick Barel''

    from   dual

    where  sys_context(''modp_ctx'',''author2'') = ''Patrick Barel''

    /

    ''AUTHOR2=PATRICKBAREL''


    author2 = Patrick Barel

    ```


    注意：此技术有时用于 *参数化视图*，其中上下文谓词用作过滤器。


    ### clear_context


    您可以调用 `dbms_session.clear_context` 过程来清除上下文中的属性。与 `set_context` 过程一样，您必须编写一个包装器过程来调用此过程。


    ```

    begin

    dbms_session.clear_context( namespace => ''modp_ctx''

    , attribute => ''author1'' );

    dbms_session.clear_context( namespace => ''modp_ctx''

    , attribute => ''author2'' );

    end;

    /

    ORA-01031: insufficient privileges

    ORA-06512: at "SYS.DBMS_SESSION", line 155

    ORA-06512: at line 2

    ```


    您可以使用清单 [17-2](#536316_1_En_17_Chapter.xhtml#PC8) 所示的包来清除属性。


    ```

    begin

    modp_pkg.clear_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author1'' );

    modp_pkg.clear_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author2'' );

    end;

    /

    PL/SQL procedure successfully completed

    ```


    ### clear_all_context


    如果要清除上下文中的所有属性，请使用 `dbms_session.clear_all_context` 过程。与其他上下文过程一样，这不能直接调用，只能通过用户定义的包调用。


    ### set_identifier


    当您想在 `v$session` 数据字典视图中标识连接的会话时，可以使用 `dbms_session.set_identifier` 过程。您可以在参数中设置任何内容，但仅使用前
    64 个字符。


    ```

    begin

    dbms_session.set_identifier

    ( client_id => ''Whatever you want, whatever you need.'' );

    end;

    /

    ```


    如果您有权访问 `v$session` 视图，则可以看到该标识符。


    ```

    select username

    ,client_identifier

    from   v$session

    /

    USERNAME   CLIENT_IDENTIFIER

    ---------- ----------------------------------------

    BOOK

    BOOK       Whatever you want, whatever you need.

    ```


    ### clear_identifier


    要清除标识符，您可以使用空字符串调用 `set_identifier` 过程，但更有意义的做法是调用 `dbms_session.clear_identifier`
    过程。


    ```

    begin

    dbms_session.clear_identifier;

    end;

    /

    ```


    如您所见，标识符已被清除。


    ```

    select username

    ,client_identifier

    from   v$session

    /

    USERNAME   CLIENT_IDENTIFIER

    ---------- ----------------------------------------

    BOOK

    BOOK

    ```


    ### sleep


    有时您希望会话暂停一小段时间。您可以使用 `dbms_session.sleep` 过程来实现这一点。


    ```

    procedure sleep(seconds in number);

    ```


    该参数也接受秒的小数部分。最大分辨率为百分之一秒；例如，1.5、1.01 和 0.99 都是合法值。


    调用此过程比调用 `dbms_lock.sleep` 更可取，后者功能相同，但此过程避免了需要授予 `dbms_lock` 权限并暴露更敏感的方法。


    ## DBMS_APPLICATION_INFO


    使用 `DBMS_APPLICATION_INFO` 中的过程来设置有关程序的运行时信息。您可以在通用的日志记录过程和函数中使用此信息。模块和操作也用于数据库工具。它们被记录用于跟踪和各种企业管理器报告，这与
    `set_client_info` 不同，后者不被数据库使用，仅用于您的自定义代码。


    ### set_module


    此过程将当前模块的名称设置为一个新模块。在日志记录框架中使用此过程时，应注意以下事项：如果过程或函数终止，应将其设置为先前的值，这样当调用程序恢复时，它会被设置为正确的值。如果没有先前的值，则应将其设置为
    `NULL`。


    ```

    procedure set_module(module_name varchar2, action_name varchar2);

    ```


    参数的最大长度为 64 字节。较长的名称将被截断。


    ### set_action


    此过程在当前模块内设置当前操作的名称。可以使用 `set_module` 过程设置模块。


    ```

    procedure set_action(action_name varchar2);

    ```


    参数的最大长度为 64 字节。较长的名称将被截断。'
  raw: '### set_context


    To work with context settings, you must create a context using the SQL command
    in Listing [17-1](#536316_1_En_17_Chapter.xhtml#PC6).


    ```

    create or replace context modp_ctx using modp_pkg

    /

    Listing 17-1

    Creating an application context

    ```


    If you want to set or clear values in this context, you cannot call the DBMS_SESSION
    package directly.


    ```

    begin

    dbms_session.set_context( namespace => ''modp_ctx''

    , attribute => ''author1''

    , value     => ''Alex Nuijten''

    );

    dbms_session.set_context( namespace => ''modp_ctx''

    , attribute => ''author2''

    , value     => ''Patrick Barel''

    );

    end;

    /

    ORA-01031: insufficient privileges

    ORA-06512: at "SYS.DBMS_SESSION", line 141

    ORA-06512: at line 2

    ```


    You must create a package to access the procedures in the DBMS_SESSION package.
    This can be a simple wrapper package, as shown in Listing [17-2](#536316_1_En_17_Chapter.xhtml#PC8).
    As you can see in the statement in Listing [17-1](#536316_1_En_17_Chapter.xhtml#PC6)
    creating the application context, this package is connected to the context.


    ```

    create or replace package modp_pkg as

    procedure set_context

    ( namespace_in in varchar2

    , attribute_in in varchar2

    , value_in     in varchar2

    , username_in  in varchar2 default null

    , client_id_in in varchar2 default null

    );

    procedure clear_context

    ( namespace_in in varchar2

    , client_id_in in varchar2 default null

    , attribute_in in varchar2 default null

    );

    procedure clear_all_context

    ( namespace_in in varchar2 );

    end modp_pkg;

    /

    create or replace package body modp_pkg as

    procedure set_context

    ( namespace_in in varchar2

    , attribute_in in varchar2

    , value_in     in varchar2

    , username_in  in varchar2 default null

    , client_id_in in varchar2 default null

    ) is

    begin

    dbms_session.set_context(namespace => namespace_in

    ,attribute => attribute_in

    ,value     => value_in

    ,username  => username_in

    ,client_id => client_id_in);

    end set_context;

    procedure clear_context

    ( namespace_in in varchar2

    , client_id_in in varchar2 default null

    , attribute_in in varchar2 default null

    ) is

    begin

    dbms_session.clear_context(namespace => namespace_in

    ,client_id => client_id_in

    ,attribute => attribute_in);

    end clear_context;

    procedure clear_all_context

    ( namespace_in in varchar2 ) is

    begin

    dbms_session.clear_all_context(namespace => namespace_in);

    end clear_all_context;

    end modp_pkg;

    /

    Listing 17-2

    modp_pkg to communicate to the context

    ```


    Now, when you try to run the same block as before, only now calling the wrapper
    packages, you can set the context values.


    ```

    begin

    modp_pkg.set_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author1''

    , value_in     => ''Alex Nuijten''

    );

    modp_pkg.set_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author2''

    , value_in     => ''Patrick Barel''

    );

    end;

    /

    PL/SQL procedure successfully completed

    ```


    Note


    The wrapper package can be used for multiple contexts. If the package is used
    for a single context only, it would be better to remove the `namespace_in` parameter.


    You can check the values in the context using a simple select, as follows.


    ```

    select sys_context(''modp_ctx'',''author1'') author1

    , sys_context(''modp_ctx'',''author2'') author2

    from   dual

    /

    AUTHOR1              AUTHOR2

    -------------------- --------------------

    Alex Nuijten         Patrick Barel

    ```


    But you can also use the context values in a predicate in your `where` clause.


    ```

    select ''author2 = Patrick Barel''

    from   dual

    where  sys_context(''modp_ctx'',''author2'') = ''Patrick Barel''

    /

    ''AUTHOR2=PATRICKBAREL''


    author2 = Patrick Barel

    ```


    Note


    This technique is sometimes used for a *parameterized view*, where the context
    predicate is used as a filter.


    ### clear_context


    You can call the `dbms_session.clear` context procedure to clear an attribute
    in the context. Just as with the `set_context` procedure, you have to write a
    wrapper procedure to call this procedure.


    ```

    begin

    dbms_session.clear_context( namespace => ''modp_ctx''

    , attribute => ''author1'' );

    dbms_session.clear_context( namespace => ''modp_ctx''

    , attribute => ''author2'' );

    end;

    /

    ORA-01031: insufficient privileges

    ORA-06512: at "SYS.DBMS_SESSION", line 155

    ORA-06512: at line 2

    ```


    You can clear the attributes using the package shown in Listing [17-2](#536316_1_En_17_Chapter.xhtml#PC8).


    ```

    begin

    modp_pkg.clear_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author1'' );

    modp_pkg.clear_context( namespace_in => ''modp_ctx''

    , attribute_in => ''author2'' );

    end;

    /

    PL/SQL procedure successfully completed

    ```


    ### clear_all_context


    If you want to clear all the attributes in a context, use the `dbms_session.clear_all_context`
    procedure. As with the other context procedures, this cannot be called directly,
    only through a user-defined package.


    ### set_identifier


    When you want to identify the connected session in the `v$session` data dictionary
    view, you can use the `dbms_session.set_identifier` procedure. You can set anything
    in the parameter, but only the first 64 characters are used.


    ```

    begin

    dbms_session.set_identifier

    ( client_id => ''Whatever you want, whatever you need.'' );

    end;

    /

    ```


    You can see the identifier if you have access to the `v$session` view.


    ```

    select username

    ,client_identifier

    from   v$session

    /

    USERNAME   CLIENT_IDENTIFIER

    ---------- ----------------------------------------

    BOOK

    BOOK       Whatever you want, whatever you need.

    ```


    ### clear_identifier


    To clear the identifier, you can call the `set_identifier` procedure with an empty
    string, but it makes more sense to call the `dbms_session.clear_identifier` procedure.


    ```

    begin

    dbms_session.clear_identifier;

    end;

    /

    ```


    As you can see, the identifier is cleared.


    ```

    select username

    ,client_identifier

    from   v$session

    /

    USERNAME   CLIENT_IDENTIFIER

    ---------- ----------------------------------------

    BOOK

    BOOK

    ```


    ### sleep


    Sometimes you want your session to hold for a short time. You can use the `dbms_session.sleep`
    procedure for this.


    ```

    procedure sleep(seconds in number);

    ```


    The parameter also accepts fractions of seconds. The maximum resolution is hundredths
    of seconds; for example, 1.5, 1.01, and 0.99 are legal values.


    Calling this procedure is preferable over calling `dbms_lock.sleep`, which does
    the same, but this procedure avoids having to grant `dbms_lock` permissions and
    exposes more sensitive methods.


    ## DBMS_APPLICATION_INFO


    Use the procedures in DBMS_APPLICATION_INFO to set runtime information about your
    program. You can use this information in your generic logging procedures and functions.
    The module and action are also used by database instrumentation. They are logged
    for tracing and in various Enterprise Manager reports, unlike `set_client_info,`
    which is not used by the database, only in your custom code.


    ### set_module


    This procedure sets the name of the current module to a new module. When using
    this procedure in a logging framework, you should note the following: If the procedure
    or function terminates, it should be set to the previous value, so when the calling
    program resumes, it is set to the correct value. If there is no previous value,
    it should be set to `NULL`.


    ```

    procedure set_module(module_name varchar2, action_name varchar2);

    ```


    The maximum length of the parameters is 64 bytes. Longer names are truncated.


    ### set_action


    This procedure sets the name of the current action within the current module.
    The module can be set using the `set_module` procedure.


    ```

    procedure set_action(action_name varchar2);

    ```


    The maximum length of the parameter is 64 bytes. Longer names are truncated.'
