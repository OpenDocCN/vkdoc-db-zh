- fmt: '# Constructing and Manipulating JSON with PL/SQL


    Generating JSON is often based on relational data, but sometimes it is necessary
    to create or manipulate a JSON document with PL/SQL.


    With the constructor functions of the JSON PL/SQL objects, it is trivial to generate
    a JSON document. In the following example, a string representing a JSON object
    is passed as an argument to the `json_object_t` constructor function. It returns
    a `json_object_t` and is shown using `dbms_output`.


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    Extracting a nested object or array is done by reference. Making changes to the
    extracted object or array is reflected in the containing object. The `extra` object
    is extracted and modified in the following example by adding an extra key-value
    pair. The additional key-value pair also appears when the original object is inspected.


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' );

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}}

    ```


    The `clone` function makes a copy when extracting the nested object or array;
    changes done on this object or array are not reflected in the containing object.
    The following example shows this behavior. The `extra` nested object is not changed
    in the containing object.


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' ).clone;

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    The `put` procedure sets the value of a specific key in a JSON object. When the
    key is not present in the object, it is added. When the key is already present,
    the value is overwritten. With JSON arrays the `put` procedure works slightly
    different, it is required to specify where the value needs to be added and by
    default it does not overwrite the value at that location. It is possible to direct
    that the value is overwritten when it exists.


    Removing and renaming keys in an object are done with the `remove` and `rename_key`
    procedures. The next example removes the `extra` nested object, constructs a placeholder
    based on the first- and last name and renames the key to `fullName`.


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_driver.remove ( ''extra'' );

    l_driver.put ( ''placeholder''

    , ''Sir ''||

    l_driver.get_string (''firstname'')

    ||'' ''||

    l_driver.get_string (''lastname'')

    );

    l_driver.remove ( ''firstname'' );

    l_driver.remove ( ''lastname'' );

    l_driver.rename_key ( ''placeholder'', ''fullName'' );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"fullName":"Sir Stirling Moss"}

    ```


    Sir Stirling Moss raced from 1951 to 1961 and won many races. The following example
    captures the race years in a JSON array using a simple `for` loop. The `append`
    procedure adds values at the end of the array. Using the `put` procedure, the
    year 1900 is added at the first position, overwritten with 2022, and finally removed.


    ```

    declare

    l_races  json_array_t;

    begin

    l_races := new json_array_t ();

    for i in 1951 .. 1961

    loop

    l_races.append(i);

    end loop;

    sys.dbms_output.put_line

    ( ''Race year count: ''

    || l_races.get_size

    );

    l_races.put ( 0,1900, false );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.put ( 0,2022, true );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.remove ( 0 );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    end;

    /

    Race year count: 11

    First race year in the Array: 1900

    First race year in the Array: 2022

    First race year in the Array: 1951

    ```


    ## Summary

    In this chapter generation of JSON documents from SQL is discussed. Using various
    functions (`json`, `json_object`, `json_objectagg`, `json_array`, `json_arrayagg`),
    all JSON documents can be constructed from relational data. Changing JSON documents
    and removing, adding, or renaming keys is easily done with `json_transform`. Finally,
    the focus was JSON and PL/SQL to extract values and manipulate and generate complete
    JSON documents.


    # Part III: Oracle-Provided Functionality


    ## 15. Useful APEX Packages


    Oracle Application Express (APEX) is a low-code development platform that allows
    you to build scalable, secure enterprise applications that can be deployed anywhere.
    Well, almost anywhere; the APEX engine still needs an Oracle database. APEX is
    a no-cost option with Oracle Database from the Always Free cloud tier to XE to
    the Enterprise Edition.


    All APEX packages are useful when using APEX. However, even if you are not using
    APEX for what it is intended for—creating front-end applications, you can still
    benefit from its functionality. And these packages are the subject of this topic.


    Because APEX resides inside the Oracle database, you can integrate it seamlessly
    with your own code. APEX packages are maintained by Oracle. A homegrown solution
    would have to be maintained by you.


    Calling a web service from PL/SQL can be quite challenging, but with the APEX
    package, this is trivial. Creating a ZIP file and parsing CSV data are easy to
    do with the functionality that APEX provides out of the box.'
  raw: '### Constructing and Manipulating JSON with PL/SQL


    Generating JSON is often based on relational data, but sometimes it is necessary
    to create or manipulate a JSON document with PL/SQL.


    With the constructor functions of the JSON PL/SQL objects, it is trivial to generate
    a JSON document. In the following example, a string representing a JSON object
    is passed as an argument to the `json_object_t` constructor function. It returns
    a `json_object_t` function and is shown using `dbms_output`.


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    Extracting a nested object or array is done by reference. Making changes to the
    extracted object or array is reflected in the containing object. The `extra` object
    is extracted and modified in the following example by adding an extra key-value
    pair. The additional key-value pair also appears when the original object is inspected.


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' );

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}}

    ```


    The `clone` function makes a copy when extracting the nested object or array;
    changes done on this object or array are not reflected in the containing object.
    The following example shows this behavior. The `extra` nested object is not changed
    in the containing object.


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' ).clone;

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    The `put` procedure sets the value of a specific key in a JSON object. When the
    key is not present in the object, it is added. When the key is already present,
    the value is overwritten. With JSON arrays the `put` procedure works slightly
    different, it is required to specify where the value needs to be added and by
    default it does not overwrite the value at that location. It is possible to direct
    that the value is overwritten when it exists.


    Removing and renaming keys in an object are done with the `remove` and `rename_key`
    procedures. The next example removes the "`extra`" nested object, constructs a
    placeholder based on the first- and last name and renames the key to `fullName`.


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_driver.remove ( ''extra'' );

    l_driver.put ( ''placeholder''

    , ''Sir ''||

    l_driver.get_string (''firstname'')

    ||'' ''||

    l_driver.get_string (''lastname'')

    );

    l_driver.remove ( ''firstname'' );

    l_driver.remove ( ''lastname'' );

    l_driver.rename_key ( ''placeholder'', ''fullName'' );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"fullName":"Sir Stirling Moss"}

    ```


    Sir Stirling Moss raced from 1951 to 1961 and won many races. The following example
    captures the race years in a JSON array using a simple `for` loop. The `append`
    procedure adds values at the end of the array. Using the `put` procedure, the
    year 1900 is added at the first position, overwritten with 2022, and finally removed.


    ```

    declare

    l_races  json_array_t;

    begin

    l_races := new json_array_t ();

    for i in 1951 .. 1961

    loop

    l_races.append(i);

    end loop;

    sys.dbms_output.put_line

    ( ''Race year count: ''

    || l_races.get_size

    );

    l_races.put ( 0,1900, false );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.put ( 0,2022, true );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.remove ( 0 );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    end;

    /

    Race year count: 11

    First race year in the Array: 1900

    First race year in the Array: 2022

    First race year in the Array: 1951

    ```


    ## Summary


    In this chapter generation of JSON documents from SQL is discussed. Using various
    functions (`json`, `json_object`, `json_objectagg`, `json_array`, `json_arrayagg`),
    all JSON documents can be constructed from relational data. Changing JSON documents
    and removing, adding, or renaming keys is easily done with `json_transform`. Finally,
    the focus was JSON and PL/SQL to extract values and manipulate and generate complete
    JSON documents.


    # Part IIIOracle-Provided Functionality


    # 15. Useful APEX Packages


    Oracle Application Express (APEX) is a low-code development platform that allows
    you to build scalable, secure enterprise applications that can be deployed anywhere.
    Well, almost anywhere; the APEX engine still needs an Oracle database. APEX is
    a no-cost option with Oracle Database from the Always Free cloud tier to XE to
    the Enterprise Edition.


    All APEX packages are useful when using APEX. However, even if you are not using
    APEX for what it is intended for—creating front-end applications, you can still
    benefit from its functionality. And these packages are the subject of this topic.


    Because APEX resides inside the Oracle database, you can integrate it seamlessly
    with your own code. APEX packages are maintained by Oracle. A homegrown solution
    would have to be maintained by you.


    Calling a web service from PL/SQL can be quite challenging, but with the APEX
    package, this is trivial. Creating a ZIP file and parsing CSV data are easy to
    do with the functionality that APEX provides out of the box.'
  trans: '# 使用 PL/SQL 构建与操作 JSON


    生成 JSON 通常基于关系型数据，但有时需要使用 PL/SQL 来创建或操作 JSON 文档。


    借助 JSON PL/SQL 对象的构造函数，生成 JSON 文档变得轻而易举。在下面的示例中，一个表示 JSON 对象的字符串作为参数传递给 `json_object_t`
    构造函数。它返回一个 `json_object_t` 对象，并通过 `dbms_output` 显示。


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    提取嵌套对象或数组是通过引用完成的。对提取出的对象或数组进行的更改会反映在包含它的对象中。在下面的示例中，`extra` 对象被提取出来并通过添加一个额外的键值对进行修改。当检查原始对象时，这个新增的键值对也会出现。


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' );

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}}

    ```


    `clone` 函数在提取嵌套对象或数组时会创建一个副本；对此副本对象或数组所做的更改不会反映在包含对象中。下面的示例展示了这一行为。包含对象中的 `extra`
    嵌套对象没有改变。


    ```

    declare

    l_driver json_object_t;

    l_extra  json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_extra := l_driver.get_object ( ''extra'' ).clone;

    l_extra.put ( ''notRelated'', ''Bill'' );

    sys.dbms_output.put_line ( l_extra.to_string );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"dob":"1929-09-17","nationality":"British","notRelated":"Bill"}

    {"firstname":"Stirling","lastname":"Moss","extra":{"dob":"1929-09-17","nationality":"British"}}

    ```


    `put` 过程用于设置 JSON 对象中特定键的值。如果对象中不存在该键，则会添加它。如果键已存在，则其值会被覆盖。对于 JSON 数组，`put` 过程的工作方式略有不同：需要指定值要添加到的位置，并且默认情况下不会覆盖该位置原有的值。但可以指定在值存在时进行覆盖。


    在对象中移除和重命名键分别使用 `remove` 和 `rename_key` 过程完成。下一个示例移除了 `extra` 嵌套对象，基于名字和姓氏构造了一个占位符值，并将该键重命名为
    `fullName`。


    ```

    declare

    l_driver json_object_t;

    begin

    l_driver := new json_object_t (

    ''{

    "firstname": "Stirling",

    "lastname": "Moss",

    "extra": {

    "dob": "1929-09-17",

    "nationality": "British"

    }

    }'');

    l_driver.remove ( ''extra'' );

    l_driver.put ( ''placeholder''

    , ''Sir ''||

    l_driver.get_string (''firstname'')

    ||'' ''||

    l_driver.get_string (''lastname'')

    );

    l_driver.remove ( ''firstname'' );

    l_driver.remove ( ''lastname'' );

    l_driver.rename_key ( ''placeholder'', ''fullName'' );

    sys.dbms_output.put_line ( l_driver.to_string );

    end;

    /

    {"fullName":"Sir Stirling Moss"}

    ```


    Sir Stirling Moss 从 1951 年到 1961 年参加比赛并赢得了许多胜利。下面的示例使用一个简单的 `for` 循环将比赛年份捕获到一个
    JSON 数组中。`append` 过程在数组末尾添加值。使用 `put` 过程，将年份 1900 添加到第一个位置，然后用 2022 覆盖，最后将其移除。


    ```

    declare

    l_races  json_array_t;

    begin

    l_races := new json_array_t ();

    for i in 1951 .. 1961

    loop

    l_races.append(i);

    end loop;

    sys.dbms_output.put_line

    ( ''Race year count: ''

    || l_races.get_size

    );

    l_races.put ( 0,1900, false );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.put ( 0,2022, true );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    l_races.remove ( 0 );

    sys.dbms_output.put_line

    ( ''First race year in the Array: ''

    || l_races.get_string ( 0 )

    );

    end;

    /

    Race year count: 11

    First race year in the Array: 1900

    First race year in the Array: 2022

    First race year in the Array: 1951

    ```


    ## 总结

    本章讨论了如何从 SQL 生成 JSON 文档。使用各种函数 (`json`、`json_object`、`json_objectagg`、`json_array`、`json_arrayagg`)，可以从关系型数据构建所有
    JSON 文档。使用 `json_transform` 可以轻松更改 JSON 文档，以及移除、添加或重命名键。最后，重点介绍了使用 JSON 和 PL/SQL
    来提取值、操作和生成完整的 JSON 文档。


    # 第三部分：Oracle 提供的功能


    ## 15. 实用的 APEX 包


    Oracle Application Express (APEX) 是一个低代码开发平台，允许您构建可扩展、安全的企业应用程序，并可部署在任何地方。嗯，几乎是任何地方；APEX
    引擎仍然需要一个 Oracle 数据库。APEX 是 Oracle 数据库的一个免费选项，从 Always Free 云层到 XE 再到企业版都可用。


    所有 APEX 包在使用 APEX 时都非常有用。然而，即使您并非将 APEX 用于其设计初衷——创建前端应用程序，您仍然可以从其功能中受益。而这些包正是本主题讨论的对象。


    因为 APEX 驻留在 Oracle 数据库内部，所以您可以将其与自己的代码无缝集成。APEX 包由 Oracle 维护。自行开发的解决方案则需要由您自己维护。


    从 PL/SQL 调用 Web 服务可能相当具有挑战性，但使用 APEX 包，这变得轻而易举。使用 APEX 开箱即用的功能，可以轻松创建 ZIP 文件和解析
    CSV 数据。'
- fmt: "## APEX Availability\n\nYou can only take advantage of APEX if it is available\
    \ in your database. When it is installed, keep up to date because new features\
    \ and functionality are always being added, and security fixes are being implemented.\n\
    \nAPEX lives in the database in a separate schema, so an easy way to check if\
    \ APEX is installed is to query for the APEX user.\n\n```sql\nselect username\n\
    from all_users\nwhere username like 'APEX%'\n```\n\nThe result that this query\
    \ produces gives you information about the existence of the APEX schema and, if\
    \ so, about the installed version.\n\nWhen you have version 22.1 installed, the\
    \ result is as follows.\n\n```\nAPEX_220100\n```\n\nWhen you don’t get any results\
    \ from this query, it simply means that APEX is not installed. Installing APEX\
    \ is beyond the scope of this book, so refer to the documentation. The latest\
    \ version of APEX is always recommended. The documentation (for the latest version)\
    \ can be found via this URL.\n\n```\nhttps://apex.oracle.com/doc\n```\n\nFor version-specific\
    \ documentation, you can suffix the URL with the version you are looking for,\
    \ such as the following.\n\n```\nhttps://apex.oracle.com/doc212\n```\n\nBecause\
    \ this chapter focuses on some of the built-in packages that APEX provides, easy\
    \ access to the documentation is very helpful. There is a URL that directly takes\
    \ you to the PL/SQL API.\n\n```\nhttps://apex.oracle.com/api\n```\n\nNote\n\n\
    When it is not possible to take advantage of everything that APEX has to offer\
    \ because a DBA might argue that “it is too risky to have a web server access\
    \ the database,” it might be possible to ask that *only* the APEX packages be\
    \ installed *without* setting up a web server. Having the APEX packages available\
    \ makes PL/SQL development a lot easier.\n\n## Calling Web Services\n\nA common\
    \ requirement is to combine the data in a local database with data available in\
    \ a different data source. Think of weather information, currency exchange rates,\
    \ quotes for shipping, or exchange invoice data.\n\nOne method that this objective\
    \ can be achieved is by calling web services. Previously, when interacting with\
    \ web services, you would have to use `UTL_HTTP` and do much of the plumbing.\
    \ Oracle APEX makes it very simple to call web services. The APEX package supports\
    \ both SOAP web services and REST-style APIs.\n\nThe example discussed in this\
    \ part uses the Ergast Developer API (`http://ergast.com/mrd/`), which provides\
    \ a historical record of motor racing data. With this web service, it is possible\
    \ to get the results back in either XML or JSON format. We prefer to work with\
    \ JSON.\n\nThe examples in this chapter use Oracle Database 21c Express Edition.\
    \ Depending on your database setup, you might need a network ACL configured by\
    \ your DBA.\n\nNote\n\nConfiguring a network ACL is beyond the scope of this book.\
    \ It is discussed in Chapter [6], “Installing and Configuring Oracle APEX and\
    \ Oracle REST Data Services,” of the *Oracle APEX Installation Guide*.\n\nIn the\
    \ package `apex_web_service`, there are two procedures to call a REST-style web\
    \ service; one that returns a `CLOB` and one that returns a `BLOB`. In the example,\
    \ the `CLOB` variant is called so the results can be easily inspected. When you\
    \ need to store JSON documents in the database, refer to Chapter [11].\n\nThe\
    \ bare minimum needed to call the web service is the URL and the HTTP method,\
    \ in this case, a `GET` request.\n\n```sql\ndeclare\n  l_response clob;\n  l_part\
    \     varchar2(4000 char);\n  l_offset   pls_integer;\nbegin\n  l_response :=\
    \ apex_web_service.make_rest_request\n                 (p_url         => 'http://ergast.com/api/f1/current.json'\n\
    \                 ,p_http_method => 'GET'\n                 );\n```\n\nThe URL\
    \ specifies what to retrieve: the current year of Formula 1 as a JSON document.\
    \ Omitting the JSON extension from the URL returns an XML instead. The URL syntax\
    \ is dictated by the web service that you are using.\n\nAfter calling a web service,\
    \ it is good practice to verify that the call was successful. This value can be\
    \ obtained by inspecting the global variable `g_status_code`, which is declared\
    \ in the `apex_web_service` package. A successful response can differ significantly\
    \ from an error response, so your parsing method must also be different to extract\
    \ useful information from a failed response.\n\nA response status ranging from\
    \ 200 to 299 indicates a successful response.\n\n```sql\nif apex_web_service.g_status_code\
    \ between 200 and 299 then\n```\n\nTo show the response’s content, let’s use another\
    \ APEX package, `apex_string`, to get the parts of the `CLOB` variable and show\
    \ them with `dbms_output`.\n\n```sql\nwhile apex_string.next_chunk (\n       \
    \ p_str    => l_response\n       ,p_chunk  => l_part\n       ,p_offset => l_offset\n\
    \       ,p_amount => 4000)\nloop\n  sys.dbms_output.put_line (l_part);\nend loop;\n\
    ```\n\nListing [15-1] shows the complete code sample and the first part of the\
    \ output. The complete message is too long to show here.\n\n```sql\ndeclare\n\
    \  l_response clob;\n  l_part     varchar2(4000 char);\n  l_offset   pls_integer;\n\
    begin\n  l_response := apex_web_service.make_rest_request\n                 (p_url\
    \         => 'http://ergast.com/api/f1/current.json'\n                 ,p_http_method\
    \ => 'GET'\n                 );\n  sys.dbms_output.put_line (apex_web_service.g_status_code);\n\
    \  if apex_web_service.g_status_code between 200 and 299 then\n    while apex_string.next_chunk\
    \ (\n            p_str    => l_response\n           ,p_chunk  => l_part\n    \
    \       ,p_offset => l_offset\n           ,p_amount => 4000)\n    loop\n     \
    \ sys.dbms_output.put_line (l_part);\n    end loop;\n  end if;\nend;\n{\"MRData\"\
    :{\"xmlns\":\"http:\\/\\/ergast.com\\/mrd\\/1.5\",\"series\":\"f1\",\"url\":\"\
    http://ergast.com/api/f1/current.json\",\"limit\":\"30\",\"offset\":\"0\",\"total\"\
    :\"22\",\"RaceTable\":{\"season\":\"2022\",\"Races\":[{\"season\":\"2022\",\"\
    round\":\"1\",...\n```\n\nListing 15-1\nGet the current season of F1 races from\
    \ a web service"
  raw: '## APEX Availability


    You can only take advantage of APEX if it is available in your database. When
    it is installed, keep up to date because new features and functionality are always
    being added, and security fixes are being implemented.


    APEX lives in the database in a separate schema, so an easy way to check if APEX
    is installed is to query for the APEX user.


    ```

    select username

    from all_users

    where username like ''APEX%''

    ```


    The result that this query produces gives you information about the existence
    of the APEX schema and, if so, about the installed version.


    When you have version 22.1 installed, the result is as follows.


    ```

    APEX_220100

    ```


    When you don’t get any results from this query, it simply means that APEX is not
    installed. Installing APEX is beyond the scope of this book, so refer to the documentation.
    The latest version of APEX is always recommended. The documentation (for the latest
    version) can be found via this URL.


    ```

    https://apex.oracle.com/doc

    ```


    For version-specific documentation, you can suffix the URL with the version you
    are looking for, such as the following.


    ```

    https://apex.oracle.com/doc212

    ```


    Because this chapter focuses on some of the built-in packages that APEX provides,
    easy access to the documentation is very helpful. There is a URL that directly
    takes you to the PL/SQL API.


    ```

    https://apex.oracle.com/api

    ```


    Note


    When it is not possible to take advantage of everything that APEX has to offer
    because a DBA might argue that “it is too risky to have a web server access the
    database,” it might be possible to ask that *only* the APEX packages be installed
    *without* setting up a web server. Having the APEX packages available makes PL/SQL
    development a lot easier.


    ## Calling Web Services


    A common requirement is to combine the data in a local database with data available
    in a different data source. Think of weather information, currency exchange rates,
    quotes for shipping, or exchange invoice data.


    One method that this objective can be achieved is by calling web services. Previously,
    when interacting with web services, you would have to use UTL_HTTP and do much
    of the plumbing. Oracle APEX makes it very simple to call web services. The APEX
    package supports both SOAP web services and REST-style APIs.


    The example discussed in this part uses the Ergast Developer API ([*http://ergast.com/mrd/*](http://ergast.com/mrd/)),
    which provides a historical record of motor racing data. With this web service,
    it is possible to get the results back in either XML or JSON format. We prefer
    to work with JSON.


    The examples in this chapter use Oracle Database 21c Express Edition. Depending
    on your database setup, you might need a network ACL configured by your DBA.


    Note


    Configuring a network ACL is beyond the scope of this book. It is discussed in
    Chapter [6](#536316_1_En_6_Chapter.xhtml), “Installing and Configuring Oracle
    APEX and Oracle REST Data Services,” of the *Oracle APEX Installation Guide*.


    In the package `apex_web_service,` there are two procedures to call a REST-style
    web service; one that returns a CLOB and one that returns a BLOB. In the example,
    the CLOB variant is called so the results can be easily inspected. When you need
    to store JSON documents in the database, refer to Chapter [11](#536316_1_En_11_Chapter.xhtml).


    The bare minimum needed to call the web service is the URL and the HTTP method,
    in this case, a GET request.


    ```

    declare

    l_response clob;

    l_part     varchar2(4000 char);

    l_offset   pls_integer;

    begin

    l_response := apex_web_service.make_rest_request

    (p_url         => ''http://ergast.com/api/f1/current.json''

    ,p_http_method => ''GET''

    );

    ```


    The URL specifies what to retrieve: the current year of Formula 1 as a JSON document.
    Omitting the JSON extension from the URL returns an XML instead. The URL syntax
    is dictated by the web service that you are using.


    After calling a web service, it is good practice to verify that the call was successful.
    This value can be obtained by inspecting the global variable `g_status_code,`
    which is declared in the `apex_web_service` package. A successful response can
    differ significantly from an error response, so your parsing method must also
    be different to extract useful information from a failed response.


    A response status ranging from 200 to 299 indicates a successful response.


    ```

    if apex_web_service.g_status_code between 200 and 299 then

    ```


    To show the response’s content, let’s use another APEX package, `apex_string`,
    to get the parts of the CLOB variable and show them with `dbms_output`.


    ```

    while apex_string.next_chunk (

    p_str    => l_response

    ,p_chunk  => l_part

    ,p_offset => l_offset

    ,p_amount => 4000)

    loop

    sys.dbms_output.put_line (l_part);

    end loop;

    ```


    Listing [15-1](#536316_1_En_15_Chapter.xhtml#PC9) shows the complete code sample
    and the first part of the output. The complete message is too long to show here.


    ```

    declare

    l_response clob;

    l_part     varchar2(4000 char);

    l_offset   pls_integer;

    begin

    l_response := apex_web_service.make_rest_request

    (p_url         => ''http://ergast.com/api/f1/current.json''

    ,p_http_method => ''GET''

    );

    sys.dbms_output.put_line (apex_web_service.g_status_code);

    if apex_web_service.g_status_code between 200 and 299 then

    while apex_string.next_chunk (

    p_str    => l_response

    ,p_chunk  => l_part

    ,p_offset => l_offset

    ,p_amount => 4000)

    loop

    sys.dbms_output.put_line (l_part);

    end loop;

    end if;

    end;

