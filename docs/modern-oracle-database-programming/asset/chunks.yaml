    \ unique constraint (.) violated\n    Error 7 occurred on index 50.\n    Oracle\
    \ error is ORA-00001: unique constraint (.) violated\n    Error 8 occurred on\
    \ index 51.\n    Oracle error is ORA-00001: unique constraint (.) violated\n \
    \   PL/SQL procedure successfully completed\n    Listing 1-10\n    Using forall\
    \ with save exceptions\n    ```\n\nNote\n\nThe error code is a positive number,\
    \ but Oracle error codes are negative, so you must multiply the code by –1 to\
    \ get the correct error message.\n\n## Summary\n\nThis chapter looked at how to\
    \ take advantage of collections, with bulk operations, to retrieve data from the\
    \ database and write it back into database tables. Collections are also very useful\
    \ when combined with a compound trigger for journaling purposes or to circumvent\
    \ a *mutating table* problem.\n\nHandling errors for DML operations was also covered\
    \ for straight DML (insert, update, delete) and bulk operations.\n\n# 2. Analytic\
    \ Functions and (un)Pivoting\n\nIt happens all too often that end users of a database\
    \ application ask for exports in Excel so that they can manipulate the data to\
    \ get the information they need to make business decisions. Often the required\
