  trans: '

    删除过程后检查 `user_objects_ae` 数据字典视图，会显示以下结果。


    ```

    select object_name

    , object_type

    , edition_name

    from   user_objects_ae

    where  object_name = ''FORMAT_FULLNAME''

    /

    OBJECT_NAME     OBJECT_TYPE     EDITION_NAME

    --------------- --------------- ---------------

    FORMAT_FULLNAME PROCEDURE       ORA$BASE

    FORMAT_FULLNAME NON-EXISTENT    R1

    ```


    前述结果显示，仍然有两个对名为 `format_fullname` 的对象的引用；一个在 `ORA$BASE` 中，另一个在 `R1` 中。请注意，`ORA$BASE`
    中的对象是一个 `procedure`（过程），而 `R1` 中的另一个对象是 `non-existent`（不存在）。


    一旦对象从某个版本中移除，它就不再被下一个子版本继承，因此也无法再被调用。


    将过程更改为函数（用一个函数来格式化驾驶员全名更有意义）是通过组合使用 `drop`（这一步已经完成以删除过程）和 `create` 来实现函数功能。


    ```

    create or replace

    function format_fullname (p_firstname in varchar2

    ,p_lastname  in varchar2)

    return varchar2

    is

    begin

    return initcap (p_lastname)

    ||'', ''||

    initcap (p_firstname);

    end format_fullname;

    /

    ```


    这些操作在数据字典中产生如下结果。


    ```

    select object_name

    , object_type

    , edition_name

    from   user_objects_ae

    where  object_name = ''FORMAT_FULLNAME''

    /

    OBJECT_NAME     OBJECT_TYPE     EDITION_NAME

    --------------- --------------- ---------------

    FORMAT_FULLNAME PROCEDURE       ORA$BASE

    FORMAT_FULLNAME FUNCTION        R1

    ```


    当仅涉及 PL/SQL 对象时，升级所需的仅此几个步骤。接下来要做的是使新版本对用户可用，并使旧版本不可用（即，停用旧版本）。这些主题将在下一节中介绍。


    ## 表变更：不要在版本间同步


    有时，在向新版本推进的过程中，有必要更改表的结构。如前所述：表不能是可版本化的。不可能拥有同一张表的多个版本。有两种机制有助于在对表进行更改时保持应用程序在线：细粒度依赖跟踪和非阻塞
    DDL。


    细粒度依赖跟踪可防止在对表进行更改时对象失效。添加列不会使任何 PL/SQL 对象失效，因为 PL/SQL 对象中没有对该列的依赖关系。


    由于非阻塞 DDL，添加列不会阻碍任何会话。


    在每个版本中，都需要数据的不同表示形式来公开新添加的列。


    EBR 引入了 `editioning view`（版本视图）的概念。顾名思义，它是一个视图，但一种特殊类型的视图。版本视图充当底层表的抽象层。因为版本视图是可版本化的，所以它可能在每个版本中具有不同的结构。由于抽象层，数据仍然存储在一个地方，即底层表。该表保存数据，是单一事实来源。索引和约束保留在表上。


    引入版本视图需要一些停机时间，尤其是在第一次涉及表的基于版本的重定义操作中。这是一项一次性操作，用于将现有的非基于版本的数据库应用程序准备好，以便将来进行基于版本的升级。一旦完成此操作，它就为零停机时间升级做好了准备。


    **注意**


    表上使用的一些特性可能需要重新路由到版本视图，例如权限、触发器和虚拟专用数据库（`VPD`）。事先收集这些特性的脚本，可以大大简化切换到版本视图的过程。


    在第一次 EBR 操作期间引入版本视图需要遵循六个步骤。


    1.  重命名表。

    2.  创建版本视图。

    3.  将权限重新路由到版本视图。

    4.  在版本视图上重新创建触发器。

    5.  重新编译 PL/SQL 对象。

    6.  重新应用 `VPD` 策略。


    版本视图是实际表与应用程序之间的抽象层。应用程序很可能在整个源代码中引用实际表。在源代码中将实际表的名称更改为版本视图可能是一项相当艰巨的任务，并且容易出错。将版本视图命名为与原表相同的名字，对应用程序和源代码的影响最小。不幸的是，这是不可能的。不能有两个同名的对象。你可以通过首先重命名实际表，然后创建一个与原表同名的版本视图来解决这个困境。


    今后，应用程序不应再直接访问表，创建一个与常规表名可区分的表名应有助于防止这种情况。以下命名约定引入了一个特殊字符（通常是下划线）并使表名区分大小写。


    ```

    alter table drivers rename to "_drivers"

    /

    ```


    `_drivers` 表*只能*在名称带引号时使用，因为它区分大小写。这不是一种常见的表命名约定。具有特殊字符并区分大小写向开发人员表明此表是特殊的。


    通过此操作，步骤一完成。下一步是引入与原表同名的版本视图。


    ```

    create editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    from   "_drivers"

    /

    ```


    版本视图只能基于单个表，并且不能包含聚合或表达式。

    '
- fmt: '### Rerouting Privileges and Triggers


    Next, reroute privileges originally on the actual table to the editioning view.
    Think of privileges like `select` or `insert` granted to other schemas.


    Having the privileges-scripts handy that were created for the original table simplifies
    this process tremendously. The editioning view has taken the name of the original
    table. The privileges are granted on the editioning view instead by re-executing
    the original grant script.


    The next step is to re-create the table-level triggers from the original table
    to the editioning view. Having the original scripts created for the original table
    make this a trivial step. As there can’t be two objects with the same name, the
    triggers currently associated with the table need to be dropped.


    As the tables have been renamed, the source code has become invalidated, and the
    PL/SQL objects need to be recompiled. After this recompilation step, the compiled
    code references the editioning views.


    The final step to complete the transition to EBR is to reapply the VPD policy
    functions. This step can be skipped when the VPD is not used.


    When all these steps are followed, it is no longer necessary to have planned downtime
    when the application needs to be upgraded. Creating new functionality can be done
    in the privacy of an edition without affecting the existing application.


    Adding columns to the tables can be done without the need to keep data in sync
    between different editions. As the column is missing in the parent edition, there
    is no representation to show the data.


    A phone number is added to the `_drivers` table to demonstrate adding an additional
    column.


    ```sql

    alter table "_drivers"

    add (

    phone varchar2(10)

    )

    /

    ```


    Changing the table does not invalidate any PL/SQL objects referenced by the object
    because of fine-grained dependency tracking. There is currently no code in the
    database that references this newly added column.


    Exposing this column can be done in the privacy of an editioning by creating an
    editioning view.


    ```sql

    create edition r2 as child of r1

    /

    Edition R2 created.

    alter session set edition = r2

    /

    Session altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    View created.

    select forename

    , surname

    , phone

    from   drivers

    fetch  first 5 rows only

    /

    FORENAME             SURNAME              PHONE

    -------------------- -------------------- ----------

    Bernd                Schneider

    Paolo                Barilla

    Gregor               Foitek

    Claudio              Langes

    Gary                 Brabham

    ```


    As seen in the results, the phone is shown, although without data. An application
    can be created or modified to expose the phone number, and this information can
    be maintained.


    Because the phone is completely new, there is no need to keep the data in sync
    between multiple editions. The old editions do not know the column and are not
    using it.


    ### Table Changes with Data Sync


    The most difficult edition-based definition exercise is when data needs to be
    kept in sync between multiple editions.


    The previous exercise, the six steps to implementing editioning views, should
    have already been taken before the steps outlined in this section can be done.


    For the example, the `_drivers` table has the following changes: the columns “forename”
    and “surname” are going to be renamed to “first_name” and “last_name” respectively,
    and their length is increased from 25 bytes to 35 bytes.


    It is very tempting to alter the existing columns, which is trivially easy to
    do, but this impact the existing application. Source code that references these
    columns become invalid and would cause (some) downtime. This goes against the
    objective of zero-downtime upgrades, so changing the existing columns is not acceptable.


    ```sql

    create edition r3 as child of r2

    /

    Edition R3 created.

    alter session set edition = r3

    /

    Session altered.

    alter table "_drivers"

    add (

    first_name varchar2 (35)

    , last_name  varchar2 (35)

    )

    /

    Table altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , first_name

    , last_name

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    ```


    Adding the columns to the table is the easy part, as well as modifying the editioning
    view to expose the new columns. Because the underlying table is a non-editionable
    object, it doesn’t matter in which edition the changes are made. But common sense
    dictates that performing DDL shouldn’t be done in older editions.


    The new columns, “first_name” and “last_name” don’t contain any data. For the
    new situation, these columns should get the same values as the forename and surname
    in the original table. A straightforward `update` can accomplish this. A massive
    update like that might disrupt normal business because of the locking.


    When the application users only use the latest version, edition R3 in this example,
    doing a massive update might be good enough. From that point forward, the users
    only have to deal with “first_name” and “last_name”, and the old columns no longer
    have to be maintained.


    A better method than a straightforward `update` statement is to utilize `dbms_parallel_execute`
    to minimize the time required to complete the task. When a lot of data is involved,
    this is especially useful.


    If there is a need to have both editions available to the users at the same time,
    called the *hot rollover period*, there needs to be an additional mechanism to
    keep the “forename” in sync with “first_name” and “surname” in sync with “last_name”.
    Users of the older application that uses edition R2 see and manipulate “forename”
    and “surname”, while users of the new application that uses edition R3 use “first_name”
    and “last_name”.


    The mechanism that does that—keeping data in sync across editions—is implemented
    using *crossedition triggers*. They are like ordinary table triggers, are editionable,
    and must be created in the new edition (R3).


    ```sql

    create or replace trigger driver_R2_R3_Fwd_Xed

    before insert or update on "_drivers"

    for each row

    forward crossedition

    disable

    begin

    :new.first_name := :new.forename;

    :new.last_name  := :new.surname;

    end driver_R2_R3_Fwd_Xed;

    /

    ```


    The trigger is created on the underlying table, not the editioning view. The trigger
    needs to fire for each row and the “forward cross edition” instructs to fire whenever
    DML is executed in a parent edition, regardless of which one.


    Tip


    Create crossedition triggers in disabled mode. Only when the trigger is valid
    should it be enabled. Invalid triggers prevent DML from being completed.


    The logic of the trigger is straightforward. The newly added columns are populated
    with the older representation of the drivers’ names.


    When the trigger is valid, it can be enabled so that data can be kept in sync
    when users from the old application are making changes.


    ```sql

    alter trigger driver_R2_R3_Fwd_Xed enable

    /

    Trigger DRIVER_R2_R3_FWD_XED altered.

    ```'
  raw: 'Next, reroute privileges originally on the actual table to the editioning
    view. Think of privileges like select or insert granted to other schemas.


    Having the privileges-scripts handy that were created for the original table simplifies
    this process tremendously. The editioning view has taken the name of the original
    table. The privileges are granted on the editioning view instead by re-executing
    the original grant script.


    The next step is to re-create the table-level triggers from the original table
    to the editioning view. Having the original scripts created for the original table
    make this a trivial step. As there can’t be two objects with the same name, the
    triggers currently associated with the table need to be dropped.


    As the tables have been renamed, the source code has become invalidated, and the
    PL/SQL objects need to be recompiled. After this recompilation step, the compiled
    code references the editioning views.


    The final step to complete the transition to EBR is to reapply the VPD policy
    functions. This step can be skipped when the VPD is not used.


    When all these steps are followed, it is no longer necessary to have planned downtime
    when the application needs to be upgraded. Creating new functionality can be done
    in the privacy of an edition without affecting the existing application.


    Adding columns to the tables can be done without the need to keep data in sync
    between different editions. As the column is missing in the parent edition, there
    is no representation to show the data.


    A phone number is added to the `_drivers` table to demonstrate adding an additional
    column.


    ```

    alter table "_drivers"

    add (

    phone varchar2(10)

    )

    /

    ```


    Changing the table does not invalidate any PL/SQL objects referenced by the object
    because of fine-grained dependency tracking. There is currently no code in the
    database that references this newly added column.


    Exposing this column can be done in the privacy of an editioning by creating an
    editioning view.


    ```

    create edition r2 as child of r1

    /

    Edition R2 created.

    alter session set edition = r2

    /

    Session altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    View created.

    select forename

    , surname

    , phone

    from   drivers

    fetch  first 5 rows only

    /

    FORENAME             SURNAME              PHONE

    -------------------- -------------------- ----------

    Bernd                Schneider

    Paolo                Barilla

    Gregor               Foitek

    Claudio              Langes

    Gary                 Brabham

    ```


    As seen in the results, the phone is shown, although without data. An application
    can be created or modified to expose the phone number, and this information can
    be maintained.


    Because the phone is completely new, there is no need to keep the data in sync
    between multiple editions. The old editions do not know the column and are not
    using it.


    ### Table Changes with Data Sync


    The most difficult edition-based definition exercise is when data needs to be
    kept in sync between multiple editions.


    The previous exercise, the six steps to implementing editioning views, should
    have already been taken before the steps outlined in this section can be done.


    For the example, the `_drivers` table has the following changes: the columns “forename”
    and “surname” are going to be renamed to “first_name” and “last_name” respectively,
    and their length is increased from 25 bytes to 35 bytes.


    It is very tempting to alter the existing columns, which is trivially easy to
    do, but this impact the existing application. Source code that references these
    columns become invalid and would cause (some) downtime. This goes against the
    objective of zero-downtime upgrades, so changing the existing columns is not acceptable.


    ```

    create edition r3 as child of r2

    /

    Edition R3 created.

    alter session set edition = r3

    /

    Session altered.

    alter table "_drivers"

    add (

    first_name varchar2 (35)

    , last_name  varchar2 (35)

    )

    /

    Table altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , first_name

    , last_name

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    ```


    Adding the columns to the table is the easy part, as well as modifying the editioning
    view to expose the new columns. Because the underlying table is a non-editionable
    object, it doesn’t matter in which edition the changes are made. But common sense
    dictates that performing DDL shouldn’t be done in older editions.


    The new columns, “first_name” and “last_name” don’t contain any data. For the
    new situation, these columns should get the same values as the forename and surname
    in the original table. A straightforward `update` can accomplish this. A massive
    update like that might disrupt normal business because of the locking.


    When the application users only use the latest version, edition R3 in this example,
    doing a massive update might be good enough. From that point forward, the users
    only have to deal with “first_name” and “last_name”, and the old columns no longer
    have to be maintained.


    A better method than a straightforward update statement is to utilize `dbms_parallel_execute`
    to minimize the time required to complete the task. When a lot of data is involved,
    this is especially useful.


    If there is a need to have both editions available to the users at the same time,
    called the *hot rollover period*, there needs to be an additional mechanism to
    keep the “forename” in sync with “first_name” and “surname” in sync with “last_name”.
    Users of the older application that uses edition R2 see and manipulate “forename”
    and “surname”, while users of the new application that uses edition R3 use “first_name”
    and “last_name”.


    The mechanism that does that—keeping data in sync across editions—is implemented
    using *crossedition triggers*. They are like ordinary table triggers, are editionable,
    and must be created in the new edition (R3).


    ```

    create or replace trigger driver_R2_R3_Fwd_Xed

    before insert or update on "_drivers"

    for each row

    forward crossedition

    disable

    begin

    :new.first_name := :new.forename;

    :new.last_name  := :new.surname;

    end driver_R2_R3_Fwd_Xed;

    /

    ```


    The trigger is created on the underlying table, not the editioning view. The trigger
    needs to fire for each row and the “forward cross edition” instructs to fire whenever
    DML is executed in a parent edition, regardless of which one.


    Tip


    Create crossedition triggers in disabled mode. Only when the trigger is valid
    should it be enabled. Invalid triggers prevent DML from being completed.


    The logic of the trigger is straightforward. The newly added columns are populated
    with the older representation of the drivers’ names.


    When the trigger is valid, it can be enabled so that data can be kept in sync
    when users from the old application are making changes.


    ```

    alter trigger driver_R2_R3_Fwd_Xed enable

    /

    Trigger DRIVER_R2_R3_FWD_XED altered.

    ```'
  trans: '### 重新路由特权与触发器


    接下来，将原本在实体表上的特权重新路由至版本化视图。这需要考虑诸如授予其他模式的 `select` 或 `insert` 等特权。


    手头备有为原始表创建的特权脚本，能极大简化此过程。版本化视图已沿用了原始表的名称。通过重新执行原始的授权脚本，即可将特权授予该版本化视图。


    下一步是将表级触发器从原始表重新创建到版本化视图上。拥有为原始表创建的原始脚本，使这一步变得轻而易举。由于不能存在两个同名对象，因此需要先删除当前与该表关联的触发器。


    由于表已被重命名，源代码会变为无效状态，PL/SQL 对象需要重新编译。完成此重新编译步骤后，编译后的代码将引用版本化视图。


    完成向 EBR（版本化）过渡的最后一步是重新应用 VPD（虚拟专用数据库）策略函数。若未使用 VPD，可跳过此步骤。


    遵循所有这些步骤后，应用程序升级时便不再需要计划停机时间。新增功能可以在一个独立的版本中私下完成，而不会影响现有应用程序。


    可以向表中添加列，且无需在不同版本间保持数据同步。由于该列在父版本中不存在，因此没有可展示数据的对应表示。


    以下示例在 `_drivers` 表中添加了一个电话号码列，以演示如何增加额外列。


    ```sql

    alter table "_drivers"

    add (

    phone varchar2(10)

    )

    /

    ```


    由于采用了细粒度依赖跟踪，更改表不会使任何引用该对象的 PL/SQL 对象失效。目前数据库中没有代码引用这个新添加的列。


    可以通过创建一个版本化视图，在某个特定版本中私下公开此列。


    ```sql

    create edition r2 as child of r1

    /

    Edition R2 created.

    alter session set edition = r2

    /

    Session altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    View created.

    select forename

    , surname

    , phone

    from   drivers

    fetch  first 5 rows only

    /

    FORENAME             SURNAME              PHONE

    -------------------- -------------------- ----------

    Bernd                Schneider

    Paolo                Barilla

    Gregor               Foitek

    Claudio              Langes

    Gary                 Brabham

    ```


    从结果中可见，电话列已显示，但尚无数据。可以创建或修改一个应用程序来公开电话号码，并维护此信息。


    因为电话列是全新的，所以无需在多个版本间保持数据同步。旧版本不知道此列的存在，也不会使用它。


    ### 涉及数据同步的表更改


    最复杂的基于版本的定义练习发生在需要在多个版本间保持数据同步时。


    在进行本节概述的步骤之前，应已完成前面练习中所述的实现版本化视图的六个步骤。


    示例中，对 `_drivers` 表进行了如下更改：将列“forename”和“surname”分别重命名为“first_name”和“last_name”，并且它们的长度从
    25 字节增加到 35 字节。


    直接修改现有列非常容易，但这会影响现有应用程序。引用这些列的源代码会变为无效，并可能导致（部分）停机。这与零停机升级的目标背道而驰，因此修改现有列是不可接受的。


    ```sql

    create edition r3 as child of r2

    /

    Edition R3 created.

    alter session set edition = r3

    /

    Session altered.

    alter table "_drivers"

    add (

    first_name varchar2 (35)

    , last_name  varchar2 (35)

    )

    /

    Table altered.

    create or replace

    editioning view drivers

    as

    select driverid

    , driverref

    , driver_number

    , code

    , first_name

    , last_name

    , dob

    , nationality

    , url

    , phone

    from   "_drivers"

    /

    ```


    向表中添加列是容易的部分，修改版本化视图以公开新列也是如此。因为底层表是一个不可版本化的对象，所以在哪个版本中进行更改并不重要。但常识告诉我们，不应在旧版本中执行
    DDL 操作。


    新列“first_name”和“last_name”不包含任何数据。在新情况下，这些列应获得与原始表中“forename”和“surname”相同的值。一个直接的
    `update` 语句即可实现。但这样大规模的更新可能因锁机制而干扰正常业务。


    如果应用程序用户只使用最新版本（本例中为 R3 版本），那么执行大规模更新可能就足够了。从那时起，用户只需处理“first_name”和“last_name”，旧列不再需要维护。


    比直接使用 `update` 语句更好的方法是利用 `dbms_parallel_execute` 来最小化完成任务所需的时间。当涉及大量数据时，这一点尤其有用。


    如果需要同时向用户提供两个版本（称为*热切换期*），则需要额外的机制来保持“forename”与“first_name”同步、“surname”与“last_name”同步。使用
    R2 版本旧应用程序的用户看到并操作的是“forename”和“surname”，而使用 R3 版本新应用程序的用户使用的是“first_name”和“last_name”。


    实现这一点的机制——在版本间保持数据同步——是使用*跨版本触发器*实现的。它们类似于普通的表触发器，是可版本化的，并且必须在新版本（R3）中创建。


    ```sql

    create or replace trigger driver_R2_R3_Fwd_Xed

    before insert or update on "_drivers"

    for each row

    forward crossedition

    disable

    begin

    :new.first_name := :new.forename;

    :new.last_name  := :new.surname;

    end driver_R2_R3_Fwd_Xed;

    /

    ```


    该触发器创建在底层表上，而不是版本化视图上。触发器需要对每一行生效，“forward cross edition”指令表示当在父版本中执行任何 DML 时都会触发，无论哪个父版本。


    **提示**


    创建跨版本触发器时使用禁用模式。只有当触发器有效时，才应启用它。无效的触发器会阻止 DML 操作完成。


    触发器的逻辑很简单：新添加的列用驱动程序名称的旧表示形式来填充。


    当触发器有效后，即可启用它，以便在旧应用程序用户进行更改时保持数据同步。


    ```sql

    alter trigger driver_R2_R3_Fwd_Xed enable

    /

    Trigger DRIVER_R2_R3_FWD_XED altered.

    ```'
- fmt: '# 20. Choosing the Right Table Type


    The purpose of any database is to store data. To do this, you create tables in
    your database. Oracle Database provides many different table types, each with
    its own strengths and weaknesses.


    How the data is stored directly affects how efficiently the data is retrieved.
    It is not difficult to imagine that when data that is queried together is also
    stored together, it is faster than when data is stored all over the place. An
    efficient application starts with an efficient design.


    This chapter discusses the different table types. There is more choice than just
    the old-fashioned heap tables.


    ## Validating the Crossedition Trigger


    The following update shows how to validate the workings of the `crossedition`
    trigger.


    ```sql

    alter session set edition = r1

    /

    update drivers

    set surname = surname

    where driverid = 102

    /

    commit

    /

    alter session set edition = r3

    /

    select first_name

    ,last_name

    from drivers

    where driverid = 102

    /

    FIRST_NAME      LAST_NAME

    --------------- ---------------

    Ayrton          Senna

    ```


    Records touched by a DML statement in an older edition cause the `crossedition`
    trigger to fire, updating the newly added columns. Switching to an older edition
    and performing a mass update sync the data, but the downside is that this can
    be confusing and error-prone during the software installation.


    A better alternative is to stay in the new edition and trigger the forward `crossedition`
    trigger by updating the underlying table in a special way.


    **Note:** `Crossedition` triggers don’t fire when the underlying table is updated.
    They only fire when an editioning view is updated.


    With `dbms_sql` you can trigger the `crossedition` trigger when updating the underlying
    table. In the `parse` procedure, pass in the name of the `crossedition` trigger
    that needs firing for the `apply_crossedition_trigger` argument. The following
    code sample fires the `crossedition` trigger to change all the newly added columns.
    The update statement used is bogus.


    ```sql

    declare

    c number := dbms_sql.open_cursor();

    x number;

    begin

    dbms_sql.parse

    ( c                          => c

    , language_flag              => dbms_sql.native

    , statement                  => ''update "_drivers"

    set   driverid = driverid''

    , apply_crossedition_trigger => ''DRIVER_R2_R3_FWD_XED''

    );

    x := dbms_sql.execute(c);

    dbms_sql.close_cursor(c);

    commit;

    end;

    /

    ```


    Now that the synchronization from the old edition to the new one is in place,
    the opposite also needs to be added. Users can add or alter data in the new application,
    which needs to be reflected in the old application.


    The reverse `crossedition` trigger is also created on the underlying table, just
    like the forward `crossedition` trigger. In this case, the reverse `crossedition`
    phrase signals that the trigger should fire when changes are made in the latest
    edition. For the same reasons, the same tactic is applied to create the trigger
    in a disabled state.


    There is a length discrepancy in the columns. The ones in the old edition are
    shorter than the new ones. Truncating the name to make it fit is unacceptable.
    A person’s name shouldn’t be truncated, hence the changes that this edition introduces.
    During the hot rollover period, the pre- and post-upgraded applications must contain
    valid data that the users enter.


    The reverse `crossedition` trigger looks like the following.


    ```sql

    create or replace trigger driver_R3_R2_Rve_Xed

    before insert or update of first_name, last_name on "_drivers"

    for each row

    reverse crossedition

    disable

    begin

    if length (:new.first_name) > 25

    or length (:new.last_name) > 25

    then

    raise_application_error (-20000

    ,''During the hot rollover it is not possible to enter more''||

    '' than twenty-five (25) characters for the First or Last Name''

    );

    else

    :new.forename := :new.first_name;

    :new.surname := :new.last_name;

    end if;

    end driver_R3_R2_Rve_Xed;

    /

    Trigger DRIVER_R3_R2_RVE_XED compiled

    ```


    When the trigger is valid, it can be enabled.


    ```sql

    alter trigger driver_R3_R2_Rve_Xed enable

    /

    Trigger DRIVER_R3_R2_RVE_XED altered.

    ```


    ## Retiring Older Editions


    When the EBR exercise has been completed, it is no longer necessary to maintain
    the old version of the application. When the old application is still accessible
    to the users, there is a chance that it might still be used. This is undesirable.
    The old version of the application should be retired so that the old application
    is no longer available to the users.


    Although very uncommon, it is possible to have multiple editions running side
    by side for an extended period. The transition between the upgrade to the new
    application and the retiring of the old application should be as short as possible.


    Revoking the use privileges on the old edition from every user and role in the
    database prevents anyone from setting up a new connection. A privileged user should
    execute the following statement.


    ```sql

    revoke use on edition r1 from book

    /

    ```


    Editions can also be removed completely, but only when it concerns a root or leaf
    edition. Editions that have both parent and child editions can’t be dropped.


    Dropping editions, especially leaf editions, can leave behind non-editionable
    changes, such as changes to the underlying table. This also applies to changes
    in the data that have already taken place.


    Dropping a child edition can be done by issuing the following statement by a user
    that has the `drop any edition` privilege.


    ```sql

    drop edition r3 cascade

    /

    Edition R3 dropped.

    ```


    Remember that the table changes cannot be reverted. The edition can’t be in use
    by a session. This would result in an exception.


    Similarly, the parent edition can be dropped, although not strictly necessary.
    Having multiple retired editions doesn’t interfere with performance, as references
    are resolved at compile time. Removing all the objects from the pre-upgrade edition
    is advisable because they are no longer needed, and the `crossedition` triggers
    from the post-upgrade edition. This is just a matter of good housekeeping.


    ### Change Default Edition


    The default Oracle Database edition is `ORA$BASE`. When connecting to the database,
    and no edition is specified, it uses the default edition. Instead of changing
    the edition by issuing `alter session` commands, there is also the possibility
    of changing the default edition. Typically, the DBA takes care of the following.


    ```sql

    alter database default edition = r1

    /

    ```


    This changes the default edition for the entire database immediately. The `use`
    privilege is revoked from all users in the former default edition, except `SYS`.
    At the same time, the `use` privilege is granted to `PUBLIC`.


    Normal users can’t connect to `ORA$BASE` anymore; `SYS` still can. This allows
    changing the default edition back to `ORA$BASE` if needed.


    ## Summary


    This chapter outlines the solution to reduce, or maybe even eliminate, planned
    downtime. Until Oracle Database release 11gR2, the application incurs planned
    downtime to upgrade your custom application. EBR is solving this planned downtime
    issue. Deploying an upgraded application in the privacy of an edition is key.
    Users are switched to the post-upgraded application when the upgrade is completed
    without experiencing downtime.


    There are several levels of complexity that you can use, depending on your needs.
    From simply replacing PL/SQL objects in different editions to creating multiple
    editioning views with `crossedition` triggers to keep data synchronized across
    editions. The method to retire old editions was discussed as well.'
