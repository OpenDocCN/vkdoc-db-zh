- fmt: '## 基础查询与结果


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    error on error

    columns

    ( driverId

    , does_not_exist default ''x'' on empty

    )

    ) d

    /

    DRIVERID   DOES_

    ---------- -----

    coulthard  x

    vettel     x

    ```


    只有其中一个车手（Vettel）拥有 `permanentNumber` 属性。Coulthard 没有这个属性。两人都有 `nickname` 属性，但只有
    Coulthard 拥有非空值。当你提取 `familyName` 属性时，Coulthard 的 `permanentNumber` 为 null（属性缺失），而
    Vettel 的昵称为 null（因为其 JSON 值为 null）。


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( familyName

    , permanentNumber

    , nickname

    )

    ) d

    /

    FAMILYNAME      PERM NICKN

    --------------- ---- -----

    Coulthard            DC

    Vettel          5

    ```


    在查询结果中，无法直接看出 NULL 值产生的原因。在列级别，可以使用 `exists` 子句来测试属性是否存在。在以下示例中，添加了两个额外列来测试指定路径上属性的存在性。对
    `permanentNumber` 属性的存在性测试返回一个 VARCHAR2（true 或 false），而对 “nickname” 的测试返回一个数字（0
    或 1）。紧接在列名（`has_nickname`）之后，在 `exists` 关键字之前指定了要返回的数据类型。


    ```sql

    select d.*

    from   f1_drivers_json f

    cross

    apply  json_table

    ( f.json_document

    , ''$.MRData.DriverTable.Drivers[*]''

    columns

    ( familyName

    , permanentNumber

    , has_permanentNumber exists path permanentNumber

    , nickname

    , has_nickname number exists path nickname

    )

    ) d

    /

    FAMILYNAME      PERM HAS_P NICKN HAS_N

    --------------- ---- ----- ----- -----

    Coulthard            false DC        1

    Vettel          5    true            1

    ```


    在结果中，`permanentNumber` 的 null 是由 Coulthard 缺失该属性导致的（`has_permanentnumber` 列为 false），而
    Vettel 的昵称有一个 NULL JSON 值（`has_nickname` 列为 1）。


