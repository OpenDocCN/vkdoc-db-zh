- fmt: "### Classifying the Records\n\nBefore you can look for a pattern, each row\
    \ must be classified. How rows are classified depends on the requirement. The\
    \ following definition compares the current row’s constructor to the `first` one\
    \ in the group.\n\n```\ndefine eq as constructor = first (constructor)\n```\n\n\
    For the first row in the result set, the start of the group is the current row\
    \ (Sauber). The second row in the result set is the start of the next group (McLaren).\
    \ The third row still belongs to the McLaren group, and so on. With this definition\
    \ in place, the pattern can be determined. The pattern is defined as follows.\n\
    \n```\npattern (eq+)\n```\n\nThis means that one or more of the records classified\
    \ as “eq” belong in the same group. In the pattern clause, regular expressions\
    \ can be used, which specify the pattern that needs to be matched in the data\
    \ set. Table [4-1](#536316_1_En_4_Chapter.xhtml#Tab1) overviews the most common\
    \ regular expression quantifiers.\n\nTable 4-1\nRegular Expressions Quantifiers\n\
    \n| Type | Description |\n| --- | --- |\n| `*` | Zero or more |\n| `+` | One or\
    \ more |\n| `?` | Zero or one |\n| `{n}` | Exactly n |\n| `{n,}` | At least n\
    \ |\n| `{,m}` | At most m |\n| `{n, m}` | Between n and m |\n| `&#124;` | Alteration;\
    \ try this, else try that |\n\nThe following query uses the built-in `match_number()`\
    \ function to show the different groups in this data set.\n\n```\nwith race_years\
    \ as (\nselect rcs.year\n, ctr.name as constructor\n, min (rcs.race_date) as startrace\n\
    , max (rcs.race_date) as endrace\nfrom   f1data.results rsl\njoin   f1data.races\
    \ rcs\non   rsl.raceid = rcs.raceid\njoin   f1data.constructors ctr\non   ctr.constructorid\
    \ = rsl.constructorid\nwhere  rsl.driverid = 8 -- Kimi Räikkönen\ngroup  by rcs.year\n\
    , ctr.name\n)\nselect rce.mnr\n, rce.constructor\n, rce.startrace\n, rce.endrace\n\
    from   race_years\nmatch_recognize (\norder by year\nmeasures\nmatch_number()\
    \ as mnr\nall rows per match\npattern (eq+)\ndefine eq as constructor = first\
    \ (constructor)\n) rce\norder  by year\n/\nMNR CONSTRUCTOR               STARTRACE\
    \ ENDRACE\n---------- ------------------------- --------- ---------\n1 Sauber\
    \                    04-MAR-01 14-OCT-01\n2 McLaren                   03-MAR-02\
    \ 13-OCT-02\n2 McLaren                   09-MAR-03 12-OCT-03\n2 McLaren      \
    \             07-MAR-04 24-OCT-04\n2 McLaren                   06-MAR-05 16-OCT-05\n\
    2 McLaren                   12-MAR-06 22-OCT-06\n3 Ferrari                   18-MAR-07\
    \ 21-OCT-07\n3 Ferrari                   16-MAR-08 02-NOV-08\n3 Ferrari      \
    \             29-MAR-09 01-NOV-09\n4 Lotus F1                  18-MAR-12 25-NOV-12\n\
    4 Lotus F1                  17-MAR-13 03-NOV-13\n5 Ferrari                   16-MAR-14\
    \ 23-NOV-14\n5 Ferrari                   15-MAR-15 29-NOV-15\n5 Ferrari      \
    \             20-MAR-16 27-NOV-16\n5 Ferrari                   26-MAR-17 26-NOV-17\n\
    5 Ferrari                   25-MAR-18 25-NOV-18\n6 Alfa Romeo                17-MAR-19\
    \ 01-DEC-19\n6 Alfa Romeo                05-JUL-20 13-DEC-20\n6 Alfa Romeo   \
    \             28-MAR-21 12-DEC-21\n```\n\nAs seen in the results, the column `MNR`\
    \ shows the `match_number()` to identify the different groups. It is a consecutive\
    \ numbering of the matches found. In the preceding query, all rows are shown.\
    \ The `all rows per match` clause returns all rows, so it is easy to identify\
    \ which records are grouped. The `all rows per match` clause also ensures that\
    \ all columns of the input data set are returned, as well as everything listed\
    \ in the `measures` clause.\n\n#### Table Alias\n\nThe table alias goes after\
    \ the final parenthesis of the `match_recognize` clause.\n\nNow that it is clear\
    \ which records should be bundled together, the query can be modified to only\
    \ show `one row per match`. The measures are expressions that are usable in other\
    \ parts of the query. The following are the measures of interest.\n\n*   The constructor\
    \ of the group: For this, the `first (constructor)` expression is used. In this\
    \ case, it could also be `last (constructor)` as the constructor remains the same\
    \ in the group.\n*   The first year under contract for this constructor: The expression\
    \ for this measure is `first (startrace)`.\n*   The last year under contract for\
    \ this constructor: The expression for this measure is `last (endrace)`.\n\n```\n\
    \    with race_years as (\n    select rcs.year\n    , ctr.name as constructor\n\
    \    , min (rcs.race_date) as startrace\n    , max (rcs.race_date) as endrace\n\
    \    from   f1data.results rsl\n    join   f1data.races rcs\n    on   rsl.raceid\
    \ = rcs.raceid\n    join   f1data.constructors ctr\n    on   ctr.constructorid\
    \ = rsl.constructorid\n    where  rsl.driverid = 8\n    group  by rcs.year\n \
    \   , ctr.name\n    )\n    select rce.constructor\n    , rce.strt\n    , rce.stp\n\
    \    from   race_years\n    match_recognize (\n    order by year\n    measures\n\
    \    first (constructor) as constructor\n    , extract (year from first (startrace))\
    \ as strt\n    , extract (year from last (endrace)) as stp\n    one row per match\n\
    \    pattern (eq+)\n    define eq as constructor = first (constructor)\n    )\
    \ rce\n    order by rce.strt\n    /\n    CONSTRUCTOR                     STRT\
    \        STP\n    ------------------------- ---------- ----------\n    Sauber\
    \                          2001       2001\n    McLaren                      \
    \   2002       2006\n    Ferrari                         2007       2009\n   \
    \ Lotus F1                        2012       2013\n    Ferrari               \
    \          2014       2018\n    Alfa Romeo                      2019       2021\n\
    \    6 rows selected.\n    ```\n\nThe `extract` function is used to get the year.\
    \ It shows only the year rather than a specific date.\n\n#### Measures Clause\
    \ Aliasing\n\nThe expressions in the measures clause must always be aliased, even\
    \ when the expression is a column of the input table."
