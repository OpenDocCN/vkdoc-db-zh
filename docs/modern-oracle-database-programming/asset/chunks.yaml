    Ernie           de Vos               01/07/1941 Dutch

    Ben             Pon                  09/12/1936 Dutch

    Rob             Slotemaker           13/06/1929 Dutch

    17 rows selected

    ```


    However, when the transaction has ended (with a `commit` or `rollback`), the data
    in the table is removed.


    ```sql

    commit

    /

    select code

    , forename

    , surname

    , dob

    , nationality

    from   gtt_drivers

    /

    ```


    ```

    CODE FORENAME        SURNAME              DOB        NATIONALITY

    ---- --------------- -------------------- ---------- -----------

    ```


    ## 会话级持续时间


    The other option is to preserve the rows, which means the rows are available during
    the session. The following statement re-creates the global temporary table with
    session duration.


    ```sql

    create global temporary table gtt_drivers

    ( driverid     number  (  11 ) not null

    , driverref    varchar2( 255 )

    , drivernumber number  (  11 )

    , code         varchar2(   3 )

    , forename     varchar2( 255 )

    , surname      varchar2( 255 )

    , dob          date

    , nationality  varchar2( 255 )

    , url          varchar2( 255 )

    ) on commit preserve rows

    /

    ```


    Populate the table with sample data, which is available for querying and manipulation
    as usual.


    ```sql

    insert into gtt_drivers

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

