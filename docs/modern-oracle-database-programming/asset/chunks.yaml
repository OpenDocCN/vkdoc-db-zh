    {

    "MRData" :

    {

    "series" : "f1",

    "DriverTable" :

    {

    "Drivers" :


    {

    "driverId" : "coulthard",

    ```


    当 JSON 文档包含非 ASCII 字符时，可以通过在`returning`子句后添加`ascii`来转义这些字符。由于我们的示例数据不包含此类特殊字符，以下示例使用从
    dual 中选择来演示`ascii`子句的作用。


