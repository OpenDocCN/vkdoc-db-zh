    /

    create table laptimes (

    raceid                number  (   11 ) not null

    , driverid              number  (   11 ) not null

    , lap                   number  (   11 ) not null

    , position              number  (   11 ) default null

    , time                  varchar2(  255 ) default null

    , milliseconds          number  (   11 ) default null

    , constraint pk_laptimes

    primary key (raceid,driverid,lap)

    , constraint fk_laptimes_races

    foreign key (raceid)

    references races (raceid)

    , constraint fk_laptimes_drivers

    foreign key (driverid)

    references drivers (driverid)

    )

    cluster cl_f1laps ( raceid, driverid )

    /

    ```


    现在将数据从 `F1DATA` 模式复制到我们的表中，以比较查询计划。


    ```

    insert into races

    select raceid

    , year

    , round

    , circuitid

    , name

    , race_date

    , time

    , url

    , fp1_date

    , fp1_time

    , fp2_date

    , fp2_time

    , fp3_date

    , fp3_time

    , quali_date

    , quali_time

    , sprint_date

    , sprint_time

    from   f1data.races

    /

    insert into drivers

    select driverid

    , driverref

    , driver_number

    , code

    , forename

    , surname

    , dob

    , nationality

    , url

    from f1data.drivers

    /

    insert into laptimes

    select raceid

    , driverid

    , lap

    , position

    , time

    , milliseconds

    from   f1data.laptimes

    /

    ```


    比较两个模式之间的磁盘大小时，你可以看到对于相同的信息量，簇化表占用的空间更小。


    以下是 `BOOK` 模式中的情况。


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    以下是 `F1DATA` 模式中的情况。


    ```

    select sum(bytes) bytes

    from   user_segments

    where  segment_type = ''TABLE''

    and    segment_name in ( ''DRIVERS''

    , ''LAPTIMES''

    , ''RACES''

    )

    /

    BYTES


    ```


    当查询这些表时，优化器可以减少访问的块数，因为簇中表的数据位于磁盘上的同一个块中。


    你不应该对频繁单独访问的表使用簇。那会违背其目的。


    ## 临时表


    Oracle 数据库 `8i` 引入了 `temporary table`，它在一个事务**或**一个会话期间保存数据，并且其数据对并发运行在数据库中的其他会话是不可见的。它被称为全局的，但这是因为表的定义是全局的。Oracle
    数据库 `18c` 版本引入了私有临时表，其表的定义仅限于创建它的会话。'
- fmt: '# Global Temporary Table


    A `global temporary table` is “globally available.” You must grant access to this
    table to other schemas like you do for any table. The data in this table is only
    available to the session that created the data. When you connect to the same schema
    using two different sessions, one session cannot see any data put into this table
    by the other session. So, the data is private to the session, but the definition
    of the table is globally available.


    ## 事务级持续时间


    When defining a global temporary table, you must decide if the rows are available
    for the transaction only or the duration of the session. To have the rows available
    for the transaction only, you tell the table to delete the rows on commit. The
    following statement creates a global temporary table with a transaction-level
    duration.


    ```sql

    create global temporary table gtt_drivers

    ( driverid     number  (  11 ) not null

    , driverref    varchar2( 255 )

    , drivernumber number  (  11 )

    , code         varchar2(   3 )

    , forename     varchar2( 255 )

    , surname      varchar2( 255 )

    , dob          date

    , nationality  varchar2( 255 )

    , url          varchar2( 255 )

    ) on commit delete rows

    /

    ```


    After populating the table with some data, it is available to query and manipulate
    as usual.


    ```sql

    insert into gtt_drivers

    select *

    from   f1data.drivers drv

    where  drv.nationality = ''Dutch''

    /

    select code

    , forename

    , surname

    , dob

    , nationality

    from   gtt_drivers

    /

    ```


    ```

    CODE FORENAME        SURNAME              DOB        NATIONALITY

    ---- --------------- -------------------- ---------- -----------

    Huub            Rothengatter         08/10/1954 Dutch

    Michael         Bleekemolen          02/10/1949 Dutch

    Boy             Lunger               03/05/1949 Dutch

    Roelof          Wunderink            12/12/1948 Dutch

    Gijs            van Lennep           16/03/1942 Dutch

    ALB  Christijan      Albers               16/04/1979 Dutch

    DOO  Robert          Doornbos             23/09/1981 Dutch

    Jos             Verstappen           04/03/1972 Dutch

    Jan             Lammers              02/06/1956 Dutch

    Dries           van der Lof          23/08/1919 Dutch

    Jan             Flinterman           02/10/1919 Dutch

