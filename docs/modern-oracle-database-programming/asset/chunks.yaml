    A nicely formatted error message with variables

    ```


    This function also provides an argument, `p_max_length`, which can prevent the
    message from becoming too long. The default value for this argument is 1000.


    When you need to preserve the layout of a multiline message, then the `p_prefix`
    argument is very useful. The given prefix and the leading whitespace are removed
    from each line. Listing [15-10](#536316_1_En_15_Chapter.xhtml#PC28) shows an example
    of a multiline message and the output. Note that all the leading whitespace is
    removed, but the resulting text is indented as intended.


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.format (

    p_message => q''{Things you should do:

    !   * Get quality sleep

    !   * Eat Healthy

    !   * Exercise regularly

    !and all will be well}''

    ,p_prefix => ''!''

    ));

    end;

    /

    Things you should do:

    * Get quality sleep

    * Eat Healthy

    * Exercise regularly

    and all will be well

    Listing 15-10

    Preserve the layout of a multiline message

    ```


    ### Please Initial Here


    A nice little utility in the APEX_STRING package is `get_initials`. This function
    transforms names into initials. It outputs the first letter of each word, in uppercase,
    with a maximum that you specify. The default is to get two letters back. If there
    are more words than `p_cnt`, you get the initials from the *first* `p_cnt` words.
    Listing [15-11](#536316_1_En_15_Chapter.xhtml#PC29) is an example of this function.
    Note that the name input is in lowercase and specified to get a maximum of four
    letters back. The result is two letters, only two words in the input string, changed
    to uppercase.


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => ''alex nuijten''

    ,p_cnt => 4

    )

    );

    end;

    AN

    Listing 15-11

    Retrieving initials

    ```


    A more dynamic way to get all the initials from a given name can be obtained by
    using a regular expression to count the number of words there are in a name, something
    along the lines of the following example:


    ```

    declare

    l_str varchar2(140) := ''Willem-Alexander Claus George Ferdinand'';

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => l_str

    ,p_cnt => regexp_count (l_str, ''[[:punct:][:space:]]'') + 1

    )

    );

    end;

    WACGF

    ```


    ## Parsing Data


    A common requirement is to upload a file to the database, let’s say an Excel or
    CSV file, and parse it to get the content and store it in database tables. This
    requirement can be quite challenging, especially when you need to escape certain
    values when there are multiple sheets in the Excel file, and so on. This is where
    `apex_data_parser` shines and can make your programs elegant.'
  trans: '

    ## 基础空间功能


    本章使用的 Web 服务还包含了赛道的坐标——纬度（lat）和经度（long）。这些值可以在以下 JSON 片段（并非完整的 JSON 文档）的 `Location`
    对象中看到。


    ```

    "Races": [

    {

    "season": "2022",

    "round": "15",

    "url": "http:\/\/en.wikipedia.org\/wiki\/2022_Dutch_Grand_Prix",

    "raceName": "Dutch Grand Prix",

    "Circuit": {

    "circuitId": "zandvoort",

    "url": "http:\/\/en.wikipedia.org\/wiki\/Circuit_Zandvoort",

    "circuitName": "Circuit Park Zandvoort",

    "Location": {

    "lat": "52.3888",

    "long": "4.54092",

    "locality": "Zandvoort",

    "country": "Netherlands"

    }

    },

    ```


    以下表达式提取了第 15 场比赛（赞德沃特）的纬度，该值位于 `Location` 对象中，也是数组中的第 15 个对象。


    ```

    apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    ```


    经度的提取方式类似。


    要使用 Oracle 数据库提供的所有空间函数，需要将坐标转换为正确的数据类型 `mdsys.sdo_geometry`。


    以下代码片段展示了如何进行此转换，其中 `l_circuit` 是一个局部变量。


    ```

    l_circuit := apex_spatial.point

    (p_lon =>  apex_json.get_number

    (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.long''

    ,p_values => races)

    ,p_lat => apex_json.get_number

    (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    );

    ```


    现在 JSON 文档中的值已经转换为真实的几何对象，让我们使用空间函数来计算荷兰 Oosterhout 与赞德沃特赛道之间的距离。清单 15-6 是一个完整的代码示例，其中用
    `apex_spatial.` 构建了两个几何对象。`sdo_distance` 空间函数用于确定两者之间的距离（以公里为单位）。例如，你可以使用 Google
    Maps 查找你家乡的坐标。


    ```

    declare

    l_circuit  mdsys.sdo_geometry;

    l_hometown mdsys.sdo_geometry;

    races      apex_json.t_values;

    l_races    clob;

    begin

    l_hometown := apex_spatial.point

    (p_lon => 4.861316883708699

    ,p_lat => 51.64485385756768

    );

    l_races := apex_web_service.make_rest_request

    (p_url         => ''http://ergast.com/api/f1/current.json''

    ,p_http_method => ''GET''

    );

    apex_json.parse (p_values => races

    ,p_source => l_races

    );

    l_circuit := apex_spatial.point

    (p_lon =>  apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.long''

    ,p_values => races)

    ,p_lat => apex_json.get_number (p_path => ''MRData.RaceTable.Races[15].Circuit.Location.lat''

    ,p_values => races)

    );

    sys.dbms_output.put_line (

    ''The distance from my hometown to the circuit is ''

    ||sdo_geom.sdo_distance

    (geom1 => l_hometown

    ,geom2 => l_circuit

    ,unit  => ''unit=KM'')

    ||'' km''

    );

    end;

    The distance from my hometown to the circuit is 85.64951103008 km

    清单 15-6

    我的家乡距离赞德沃特赛道有多远？

    ```


    ## 文本处理实用工具


    你已经学习了如何利用 `apex_string.next_chunk` 包函数来显示 CLOB，但还有许多其他很酷的函数值得研究。


    我们个人最喜欢的功能之一是 `split`。清单 15-7 展示了该函数的示例。


    ```

    select column_value

    from apex_string.split

    (p_str => ''this:should:be:shown:as:a:table''

    ,p_sep => '':'')

    COLUMN_VALUE


    this

    should

    be

    shown

    as

    a

    table

    清单 15-7

    apex_string.split 用法示例

    ```


    如清单 15-7 所示，`split` 函数将一个字符分隔的字符串（也可以是 CLOB）转换为一个嵌套表类型。


    既然有 `split` 函数，那也一定有 `join` 函数。输入的嵌套表类型为 `apex_t_varchar2`。你可以在清单 15-8 中看到此功能的示例及其输出。


    ```

    declare

    l_ename_t apex_t_varchar2;

    begin

    select ename

    bulk collect

    into l_ename_t

    from emp;

    sys.dbms_output.put_line (

    apex_string.join (p_table => l_ename_t

    ,p_sep   => ''~''

    )

    );

    end;

    SMITH~ALLEN~WARD~JONES~MARTIN~BLAKE~CLARK~SCOTT~KING~TURNER~ADAMS~JAMES~FORD~MILLER

    清单 15-8

    apex_string.join 用法示例

    ```


    必须指出的是，上述 `apex_string.join` 函数的功能也可以通过 SQL 函数 `listagg` 实现。`listagg` 函数能处理的最大长度取决于
    `max_string_size` 初始化参数的设置。当 `listagg` 函数不适用（超出长度限制）时，`apex_string.join_clobs`
    可以填补这个空缺。


    ### 格式化消息


    当你需要格式化消息时，`format` 函数非常有用。此函数允许你创建包含最多 19 个替换变量占位符的消息。清单 15-9 是一个带有替换参数的格式化错误消息示例。


    ```

    raise_application_error

    (-20000

    ,apex_string.format (p_message => q''{The combination %0, %1, and %2 is not allowed}''

    ,p0 => ''A''

    ,p1 => ''B''

    ,p2 => ''C''

    )

    );

    Error report -

    ORA-20000: The combination A, B, and C is not allowed

    ORA-06512: at line 2

    清单 15-9

    一个带有变量的、格式良好的错误消息

    ```


    此函数还提供了一个参数 `p_max_length`，用于防止消息变得过长。该参数的默认值为 1000。


    当你需要保留多行消息的布局时，`p_prefix` 参数就非常有用。指定的前导前缀和空白将从每一行中移除。清单 15-10 展示了一个多行消息及其输出的示例。注意，所有的前导空白都被移除了，但结果文本按照预期进行了缩进。


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.format (

    p_message => q''{Things you should do:

    !   * Get quality sleep

    !   * Eat Healthy

    !   * Exercise regularly

    !and all will be well}''

    ,p_prefix => ''!''

    ));

    end;

    /

    Things you should do:

    * Get quality sleep

    * Eat Healthy

    * Exercise regularly

    and all will be well

    清单 15-10

    保留多行消息的布局

    ```


    ### 请在此处签上姓名首字母


    APEX_STRING 包中一个实用的小工具是 `get_initials`。此函数将姓名转换为姓名首字母缩写。它输出每个单词的首字母（大写），数量上限由你指定。默认返回两个字母。如果单词数量超过
    `p_cnt`，则返回 *前* `p_cnt` 个单词的首字母。清单 15-11 是此函数的示例。注意，输入的名字是小写，并指定了最多返回四个字母。由于输入字符串中只有两个单词，结果是两个大写字母。


    ```

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => ''alex nuijten''

    ,p_cnt => 4

    )

    );

    end;

    AN

    清单 15-11

    获取姓名首字母

    ```


    一种更动态地获取给定姓名中所有首字母的方法是使用正则表达式来统计姓名中的单词数量，类似于下面的示例：


    ```

    declare

    l_str varchar2(140) := ''Willem-Alexander Claus George Ferdinand'';

    begin

    sys.dbms_output.put_line (

    apex_string.get_initials (

    p_str => l_str

    ,p_cnt => regexp_count (l_str, ''[[:punct:][:space:]]'') + 1

    )

    );

    end;

    WACGF

    ```


    ## 解析数据


    一个常见的需求是将文件（例如 Excel 或 CSV 文件）上传到数据库，然后解析它以获取内容并将其存储到数据库表中。这个需求可能相当具有挑战性，特别是当
    Excel 文件中有多个工作表，或者需要转义某些值等情况时。这正是 `apex_data_parser` 大放异彩的地方，它可以让你的程序变得优雅。

    '
- fmt: '## Business Case


    The examples in this section are part of a business case. Users of our application
    can upload CSV files to the database. These files are stored in a `BLOB` column.
    In this case, the `TEMP_FILES` table that holds the uploaded files have the columns
    outlined in Table [15-1](#536316_1_En_15_Chapter.xhtml#Tab1).


    **Table 15-1**


    **Columns in the TEMP_FILES Table**


    | Column Name | Purpose |

    | --- | --- |

    | ID | Primary key to identify which file to process |

    | Filename | Name of the uploaded file, should include the file extension |

    | Mime_type | Mime type, in this case, should be “text/csv” |

    | Blob_content | The uploaded file in binary format |


    **Caution**


    The filename extension is used by the `APEX_DATA_PARSER` package to identify how
    the file should be parsed. In this case, the filename should be suffixed with
    `.csv`.


    The files contain payment data, such as `payment_date`, `payment_method`, `currency`,
    `amount`, and so on. The delimiter used in the CSV file can vary from one to the
    other; sometimes it’s a comma, sometimes a semi-colon. In some of the files, the
    headers are in quotes; in others, they are not.


    As the application allows different files to be uploaded, the signatures of each
    file can be quite different. The header in the file determines how you should
    use the data within. There can be many more columns in the file that you need,
    but these can be ignored.


    For each file, you know where the relevant information can be found.


    A target table, called `DESTINATION_TBL`, stores the parsed data.


    You must deal with many variations; implementing this is certainly not trivial.


    ### Let’s Parse!


    The first step to implementing the requirements is to determine which variation
    of the payment file you are dealing with.


    Because there are a finite set of file variations, in this case, you can define
    constants with the known structure of each header line. Listing [15-12](#536316_1_En_15_Chapter.xhtml#PC30)
    defines the constants for two different headers: one for a Mollie file and one
    for a PayPal file. The data type for the constants is `apex_t_varchar2`, a nested
    table type. Even though every column in the file isn’t used to extract data from,
    later on, you still need to declare them in the constant. As you can see, the
    structure of both files is quite different.


    ```sql

    l_mollie_headers constant apex_t_varchar2

    := apex_t_varchar2

    (''DATE_''

    ,''PAYMENT_METHOD''

    ,''CURRENCY''

    ,''AMOUNT''

    ,''STATUS''

    ,''ID''

    ,''DESCRIPTION''

    ,''CONSUMER_NAME''

    ,''CONSUMER_BANK_ACCOUNT''

    ,''CONSUMER_BIC''

    ,''SETTLEMENT_CURRENCY''

    ,''SETTLEMENT_AMOUNT''

    ,''SETTLEMENT_REFERENCE''

    ,''AMOUNT_REFUNDED''

    );

    l_paypal_headers constant apex_t_varchar2

    := apex_t_varchar2

    (''DATE_''

    ,''TIME''

    ,''TIME_ZONE''

    ,''DESCRIPTION''

    ,''CURRENCY''

    ,''GROSS''

    ,''FEE''

    ,''NET''

    ,''BALANCE''

    ,''TRANSACTION_ID''

    ,''FROM_EMAIL_ADDRESS''

    ,''NAME''

    ,''BANK_NAME''

    ,''BANK_ACCOUNT''

    ,''SHIPPING_AND_HANDLING_AMOUNT''

    ,''SALES_TAX''

    ,''INVOICE_ID''

    ,''REFERENCE_TXN_ID''

    );

    ```


    *Listing 15-12*

    *Constants for the different file headers*


    The next step would be to extract the first line, the header, from the uploaded
    CSV file. This file header is stored in a local variable, also an `apex_t_varchar2`.


    You can use the `discover` function in the `APEX_DATA_PARSER` package to discover
    the file you are dealing with. This function returns a `CLOB` value with the column
    profile of the file. You can retrieve information about the columns by feeding
    this profile into the `get_columns` function, such as the following.


    - Column position

    - Column name

    - Data type

    - Format mask


    With a single select statement, you can extract this information shown in Listing
    [15-13](#536316_1_En_15_Chapter.xhtml#PC31). As an argument, it is `P_ID`. It
    needs the primary key of the uploaded file you want to process.


    ```sql

    select column_name

    bulk collect

    into l_file_headers

    from temp_files tf

    cross

    join table (apex_data_parser.get_columns

    (apex_data_parser.discover

    (p_content   => tf.blob_content

    ,p_file_name => tf.filename

    )))

    where tf.id = p_id;

    ```


    *Listing 15-13*

    *Extract the column names from the file*


    **Tip**


    The `table` operator in Listing [15-13](#536316_1_En_15_Chapter.xhtml#PC31) has
    been optional since Oracle Database 12.2. You are no longer required to use it.
    But it can make your code more legible and easier to understand.


    Once you have the profile of the file and the names of the columns in that file,
    you can compare this with the predefined file patterns (the constants declared
    earlier).


    ```sql

    case l_file_headers

    when l_mollie_headers

    then

    process_mollie;

    when l_paypal_headers

    then

    process_paypal;

    end case;

    ```


    We prefer to use a searched case statement. When there is no match (an unknown
    file was uploaded), it raises a `CASE_NOT_FOUND` exception. This can be handled
    and provide feedback to the application that an incorrect file was uploaded.


    After a match is found, the file can finally be processed. You need a separate
    procedure to extract the relevant information for each file type.


    You can retrieve all data from the uploaded file using the `parse` function from
    the `APEX_DATA_PARSER` package. Up to 300 columns are supported.


    Listing [15-14](#536316_1_En_15_Chapter.xhtml#PC33) shows how to use the `parse`
    function to insert the relevant data into `DESTINATION_TBL`.


    ```sql

    insert into destination_tbl

    (date_

    ,payment_method

    ,currency

    ,amount

    ,status

    ,description

    )

    select to_date (col001, ''yyyy-mm-dd hh24:mi:ss'')

    ,col002

    ,col003

    ,col004

    ,col005

    ,col007

    from temp_files tf

    cross

    join table (apex_data_parser.parse

    (p_content   => tf.blob_content

    ,p_file_name => tf.filename

    ,p_skip_rows => 1 -- skip the header line

    ))

    where tf.id = p_id;

    ```


    *Listing 15-14*

    *Move the data from the file into the table*


    This gives you an impression of what is possible with the `apex_data_parser`,
    but it can be even more flexible. In the file profile, which you get from the
    `discover` function, there is also information about the format mask used in the
    column and the decimal character used. This information can convert the data from
    the file into the correct data in the database.


    **Tip**


    Using the `validate_conversion` function, you can determine if an expression can
    be converted to a specified data type. Also, the `default on conversion error`
    of `to_date` and `to_number` can help in this respect.


    ## Working with ZIP Files


    The previous section discussed uploading files to the database, but for a user
    of the application, this can be quite tedious. In those situations, it might be
    beneficial that the user can upload ZIP files containing all the files that need
    to be uploaded to the database.


    The other way around is also true. When the user wants to download multiple files
    from the database, it is more efficient to download a single ZIP file instead
    of ten separate files.'
