- fmt: "### Versions Between Queries\n\nIf you want to see for which constructor a\
    \ certain driver has driven, you can use the `versions between` construction.\
    \ If you want to see the contracts for Kimi Räikkönen, use the following query.\n\
    \n```sql\nselect d.forename as firstname\n, d.surname  as lastname\n, c.name \
    \    as constructorname\n, dc.startcontract\n, dc.endcontract\nfrom   driverconstructors\
    \ versions period for drivercontract\nbetween to_date( '19900101', 'YYYYMMDD'\
    \ )\nand     to_date( '20230101', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non\
    \     (dc.driverid = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid\
    \ = c.constructorid)\nwhere  d.surname = 'Räikkönen'\norder  by dc.startcontract\n\
    , dc.endcontract\n/\nFIRSTNAME   LASTNAME    CONSTRUCTORNAME STARTCONTRACT ENDCONTRACT\n\
    ----------- ----------- --------------- ------------- -----------\nKimi      \
    \  Räikkönen   Sauber          04/03/2001    14/10/2001\nKimi        Räikkönen\
    \   McLaren         03/03/2002    22/10/2006\nKimi        Räikkönen   Ferrari\
    \         18/03/2007    01/11/2009\nKimi        Räikkönen   Lotus F1        18/03/2012\
    \    03/11/2013\nKimi        Räikkönen   Ferrari         16/03/2014    25/11/2018\n\
    Kimi        Räikkönen   Alfa Romeo      17/03/2019    12/12/2021\n6 rows selected\n\
    ```\n\nYou can also check which drivers drove for a certain constructor.\n\n```sql\n\
    select d.forename as firstname\n, d.surname  as lastname\n, c.name     as constructorname\n\
    , dc.startcontract\n, dc.endcontract\nfrom   driverconstructors versions period\
    \ for drivercontract\nbetween to_date( '19900101', 'YYYYMMDD' )\nand    to_date(\
    \ '20230101', 'YYYYMMDD' ) dc\njoin   f1data.drivers d\non     (dc.driverid =\
    \ d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid = c.constructorid)\n\
    where  c.name = 'Red Bull'\norder  by dc.startcontract\n, dc.endcontract\n/\n\
    FIRSTNAME    LASTNAME   CONSTRUCTORNAME STARTCONTRACT ENDCONTRACT\n------------\
    \ ---------- --------------- ------------- -----------\nChristian    Klien   \
    \   Red Bull        06/03/2005    10/09/2006\nDavid        Coulthard  Red Bull\
    \        06/03/2005    02/11/2008\nVitantonio   Liuzzi     Red Bull        24/04/2005\
    \    29/05/2005\nRobert       Doornbos   Red Bull        01/10/2006    22/10/2006\n\
    Mark         Webber     Red Bull        18/03/2007    24/11/2013\nSebastian  \
    \  Vettel     Red Bull        29/03/2009    23/11/2014\nDaniel       Ricciardo\
    \  Red Bull        16/03/2014    25/11/2018\nDaniil       Kvyat      Red Bull\
    \        15/03/2015    01/05/2016\nMax          Verstappen Red Bull        15/05/2016\
    \    03/07/2022\nPierre       Gasly      Red Bull        17/03/2019    04/08/2019\n\
    Alexander    Albon      Red Bull        01/09/2019    13/12/2020\nSergio     \
    \  Pérez      Red Bull        28/03/2021    03/07/2022\n12 rows selected\n```\n\
    \n### DBMS_FLASHBACK_ARCHIVE\n\nUsing the `dbms_flashback_archive.enable_at_valid_time`\
    \ you can set the validity date to a fixed date, so you don’t have to add the\
    \ `as of period` clause to every query. The parameters of this procedure are described\
    \ in Table [18-1](#536316_1_En_18_Chapter.xhtml#Tab1).\n\nTable 18-1\nenable_at_valid_time\
    \ Procedure Parameters\n\n| Parameter | Mandatory | Description |\n| --- | ---\
    \ | --- |\n| level | Y | Options:− ALLDisplays all the data, the default− CURRENTThis\
    \ displays only the data that is valid at the current timestamp. Data becomes\
    \ visible and invisible as time passes.− ASOFThis displays the data valid at the\
    \ timestamp set in the next parameters. |\n| query_time |   | Used only if the\
    \ level is ASOFOnly valid data is shown |\n\nSet the flashback archive to the\
    \ start of the 2022 season.\n\n```sql\nbegin\ndbms_flashback_archive.enable_at_valid_time\n\
    ( level      => 'ASOF'\n, query_time => to_date( '20220320','YYYYMMDD' )\n);\n\
    end;\n/\n```\n\nYou can use a simple query, note the absence of the `as of period`\
    \ clause, to get the same result as in the first example.\n\n```sql\nselect d.forename\
    \ as firstname\n, d.surname  as lastname\n, c.name     as constructorname\nfrom\
    \   driverconstructors  dc\njoin   f1data.drivers      d\non     (dc.driverid\
    \ = d.driverid)\njoin   f1data.constructors c\non     (dc.constructorid = c.constructorid)\n\
    order  by constructorname, lastname, firstname\n/\nFIRSTNAME    LASTNAME     CONSTRUCTORNAM\n\
    ------------ ------------ --------------\nValtteri     Bottas       Alfa Romeo\n\
    Guanyu       Zhou         Alfa Romeo\nPierre       Gasly        AlphaTauri\nYuki\
    \         Tsunoda      AlphaTauri\nFernando     Alonso       Alpine F1 Team\n\
    Esteban      Ocon         Alpine F1 Team\nNico         Hülkenberg   Aston Martin\n\
    Lance        Stroll       Aston Martin\nSebastian    Vettel       Aston Martin\n\
    Charles      Leclerc      Ferrari\nCarlos       Sainz        Ferrari\nKevin  \
    \      Magnussen    Haas F1 Team\nMick         Schumacher   Haas F1 Team\nLando\
    \        Norris       McLaren\nDaniel       Ricciardo    McLaren\nLewis      \
    \  Hamilton     Mercedes\nGeorge       Russell      Mercedes\nSergio       Pérez\
    \        Red Bull\nMax          Verstappen   Red Bull\nAlexander    Albon    \
    \    Williams\nNicholas     Latifi       Williams\n21 rows selected\n```\n\nTo\
    \ return to a “normal” operation, call the `dbms_flashback_archive.enable_at_valid_time`\
    \ with the level set to `ALL` or call the `dbms_flashback_archive.disable_asof_valid_time`\
    \ procedure.\n\n```sql\nbegin\ndbms_flashback_archive.disable_asof_valid_time;\n\
    end;\n/\n```\n\n### Virtual Private Database\n\nVirtual Private Database (VPD)\
    \ gives the impression that each end user has their own database while still having\
    \ a single code base and set of tables. Let’s assume that the Formula1 teams are\
    \ not allowed to see the results of the other constructors (this is not the case,\
    \ but for this example, assume it is). You could build different schemas in the\
    \ database, each with its own tables. When adding the results for a race, you\
    \ must add the data to the correct schema. It is easier to create one table in\
    \ one schema and have Oracle Database show the correct data.\n\nWhen the table\
    \ is part of the VPD, Oracle Database under the hood adds an extra predicate to\
    \ any SQL statement issued against this table. This can be a single select from\
    \ this table, but also when the table is used in a join or a subselect. To define\
    \ this extra predicate, you have to define a policy function and then connect\
    \ this function to the table.\n\n### The Policy Function\n\nOracle Database calls\
    \ this procedure with two parameters—`schemaname` and `tablename`—in that order.\
    \ The signature of the policy function VPD uses is as follows.\n\n```sql\nfunction\
    \ \n(  in varchar2\n,   in varchar2)\nreturn varchar2\n```\n\nThe function has\
    \ to return a valid predicate that is added to any SQL statement issued against\
    \ this table.\n\nYou can do whatever you want in the policy function, but it is\
    \ called very often, and if the function takes a lot of time to complete, then\
    \ every SQL statement against the table takes a lot of time.\n\nListing [18-2](#536316_1_En_18_Chapter.xhtml#PC12)\
    \ shows a policy function to ensure a constructor can only see its own data.\n\
    \n```sql\ncreate or replace function thisconstructoronly\n( schemaname_in in varchar2\n\
    , tablename_in  in varchar2\n) return varchar2\nis\nbegin\nreturn q'[constructorid\
    \ = sys_context\n( 'CONSTRUCTOR_CTX'\n, 'CONSTRUCTORID'\n)]';\nend;\n/\nListing\
    \ 18-2\nPolicy function thisconstructoronly\n```\n\nThis function returns a VARCHAR2\
    \ with these contents.\n\n```sql\nconstructorid = sys_context( 'CONSTRUCTOR_CTX',\
    \ 'CONSTRUCTORID' )\n```"
