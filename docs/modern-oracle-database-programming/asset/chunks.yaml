    ## Redaction


    Redacting data in the database ensures that data is only seen by those entitled
    to it, making compliance with privacy rules and regulations consistent. Redaction
    is done by masking (part of) the data when the results are sent back to the calling
    process. There are no changes made to the persisted data.


    Let’s assume you have a web application that displays the position of the drivers
    in a certain race. A driver must be logged in to see the lap times. By logging
    in, a context with `driverid` is set. Based on this context value being set, the
    time and milliseconds columns are displayed; otherwise, they are obscured from
    view.


    First, create a context including the necessary package, as shown in Listing [18-5](#536316_1_En_18_Chapter.xhtml#PC22).


    ```

    create or replace context driver_ctx using driver_pkg

    /

    create or replace package driver_pkg as

    procedure set_driver( driverid_in in number );

    procedure unset_driver;

    end driver_pkg;

    /

    create or replace package body driver_pkg as

    procedure set_driver(driverid_in in number) is

    begin

    sys.dbms_session.set_context

    ( namespace => ''driver_ctx''

    , attribute => ''driverid''

    , value     => driverid_in

    );

    end set_driver;

    procedure unset_driver is

    begin

    sys.dbms_session.clear_context

    ( namespace => ''driver_ctx'' );

    end unset_driver;

    end driver_pkg;

    /

    Listing 18-5

    Driver context

    ```'
