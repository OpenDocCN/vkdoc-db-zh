    `json_serialize`函数可以将 JSON 文档转换为文本表示形式。当 JSON 文档存储在 BLOB 中并且需要读取其内容时，这特别有用。


    复制了示例 JSON 表，以演示`json_serialize`如何将 JSON 文档转换为不同的数据类型，但这次使用二进制格式的 JSON。


