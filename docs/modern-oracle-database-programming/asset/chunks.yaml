    \ as firstname\n, d.surname  as lastname\n, c.name     as constructorname\n, dc.startcontract\n\
    , dc.endcontract\nfrom   driverconstructors versions period for drivercontract\n\
    between to_date( '19900101', 'YYYYMMDD' )\nand     to_date( '20230101', 'YYYYMMDD'\
