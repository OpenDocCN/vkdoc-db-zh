    ### subprogram


    函数`utl_call_stack.subprogram`返回一个变长数组，其中包含从你作为参数传递的层级开始的所有程序名称。层级1是当前程序，层级2是“父”程序，依此类推。变长数组是从底向上填充的，其中当前程序是数组中的最后一项。


    为了演示此函数的工作原理，请将


    ```

