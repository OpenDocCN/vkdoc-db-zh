    当当前胜场数大于前一次胜场数时，即认为该轮获胜。类似地，*未获胜* 的定义如下：


    ```

    not_winning as (wins = prev (wins))

    ```


    当当前记录的胜场数与前一次相比保持不变时，意味着其他车队赢得了该轮（即当前记录对应的车队未获胜）。


    以下是用于对数据集中的每条记录进行分类的模式：


    ```

    ( winning | not_winning )

    ```


    这意味着一条记录要么被分类为 winning，要么为 not winning。让我们测试一下。


    ```sql

    with ctrs as (

    select ctr.name

    , cts.wins

    , rcs.name as race_name

    , rcs.round

    , rcs.year

    from   f1data.constructorstandings cts

    join   f1data.constructors ctr

    on   ctr.constructorid = cts.constructorid

    join   f1data.races rcs

    on   rcs.raceid = cts.raceid

    where  rcs.year = 2022

    and    ctr.constructorid in (6,9)

    and    rcs.round <= 5

    )

    select round

    , race_name

    , name

    , cls

    , wins

    from   ctrs

    match_recognize (

    partition by name, year

    order by round

    measures

    classifier () as cls

    all rows per match

    pattern ( winning | not_winning )

    define

    winning as (wins > prev (wins))

    , not_winning as (wins = prev (wins))

    )

    order  by year, round, name

    /

    ROUND RACE_NAME                 NAME     CLS          WINS

    ----- ------------------------- -------- ------------ ----

    2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING     1

    2 沙特阿拉伯大奖赛              红牛     WINNING         1

    3 澳大利亚大奖赛                法拉利   WINNING         2

    3 澳大利亚大奖赛                红牛     NOT_WINNING     1

    4 艾米利亚-罗马涅大奖赛          法拉利   NOT_WINNING     2

    4 艾米利亚-罗马涅大奖赛          红牛     WINNING         2

    5 迈阿密大奖赛                  法拉利   NOT_WINNING     2

    5 迈阿密大奖赛                  红牛     WINNING         3

    ```


    现在结果集中只有八条记录。第一轮的数据缺失了。这条记录无法与前一条进行比较，因此还没有分类。


    ### 未定义的分类


    解决第一轮缺失问题的一个方法是向模式中添加一个额外的分类。


    ```

    pattern ( winning | not_winning | unknown )

    ```


    这需要在 `define` 子句中添加一个额外的定义，但实际上并不需要。当模式遇到未定义的定义时，它会被假定为真。由于第一轮不匹配任何其他已定义的分类，它会与“始终为真”的定义匹配，该定义被命名为
    unknown。结果集中最前面的记录将变为：


    ```

    ROUND RACE_NAME                 NAME     CLS          WINS

    ----- ------------------------- -------- ------------ ----

    1 巴林大奖赛                    法拉利   UNKNOWN         1

    1 巴林大奖赛                    红牛     UNKNOWN         0

    2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING     1

    2 沙特阿拉伯大奖赛              红牛     WINNING         1

    ```


    这解决了记录缺失的问题，但却是不正确的。法拉利赢得了赛季第一场比赛，但它被标记为 UNKNOWN。红牛也是如此；已知他们没有赢得第一场比赛。也许会想把 winning
    的定义改为：


    ```

    winning as (wins > prev (wins) or wins = 1)

    ```


    但这也不正确；它会正确标记法拉利的第一场比赛，但法拉利的第二场比赛也会被标记为 WINNING（因为胜场数保持为 1）。应用这个修改后的定义将导致以下结果：


    ```

    ROUND RACE_NAME                 NAME     CLS          WINS

    ----- ------------------------- -------- ------------ ----

    1 巴林大奖赛                    法拉利   WINNING         1

    1 巴林大奖赛                    红牛     UNKNOWN         0

    2 沙特阿拉伯大奖赛              法拉利   WINNING         1

    2 沙特阿拉伯大奖赛              红牛     WINNING         1

    ```


    解决方案是扩展 `winning` 的定义，如下所示：


    ```

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    ```


    这专门检查是否赢得了当年的第一轮比赛。`match_recognize` 子句变为：


    ```sql

    match_recognize (

    partition by name

    ,year

    order by round

    measures

    classifier () as cls

    all rows per match

    pattern ( winning | not_winning )

    define

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    , not_winning as (wins = prev (wins)

    or  wins = 0)

    )

    ```


    结果如下：


    ```

    ROUND RACE_NAME                 NAME     CLS          WINS

    ----- ------------------------- -------- ------------ ----

    1 巴林大奖赛                    法拉利   WINNING         1

    1 巴林大奖赛                    红牛     NOT_WINNING     0

    2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING     1

    2 沙特阿拉伯大奖赛              红牛     WINNING         1

    3 澳大利亚大奖赛                法拉利   WINNING         2

    3 澳大利亚大奖赛                红牛     NOT_WINNING     1

    4 艾米利亚-罗马涅大奖赛          法拉利   NOT_WINNING     2

    4 艾米利亚-罗马涅大奖赛          红牛     WINNING         2

    5 迈阿密大奖赛                  法拉利   NOT_WINNING     2

    5 迈阿密大奖赛                  红牛     WINNING         3

    ```


    现在每条记录都有了正确的分类：WINNING 或 NOT_WINNING。

    '
- fmt: '## Longest Winning Streak


    When this book was written, the 2022 season was still underway, and only the Ferrari
    and Red Bull teams had won a race. But which team had the most consecutive wins?
    Let’s find out.


    The last section identified a race as won using the following `define` clause.


    ```

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    ```


    With this definition in place, the following pattern can be applied to find at
    least one record with this classification.


    ```

    ( winning+ )

    ```


    The following is the complete query to find the longest winning streak by a team.


    ```

    with ctr as (

    select ctr.name

    , cts.wins

    , rcs.name as race_name

    , rcs.round

    , rcs.year

    from   f1data.constructorstandings cts

    join   f1data.constructors ctr

    on   ctr.constructorid = cts.constructorid

    join   f1data.races rcs

    on   rcs.raceid = cts.raceid

    where  rcs.year = 2022

    )

    select *

    from   ctr

    match_recognize (

    partition by name

    order by round

    measures

    classifier () as cls

    , first (round) as first_win

    , last (round)  as last_win

    , count(*)      as race_count

    one row per match

    pattern ( winning+ )

    define

    winning as (wins > prev (wins)

    or (wins = 1 and round = 1))

    )

    order  by race_count desc

    /

    NAME     CLS           FIRST_WIN   LAST_WIN RACE_COUNT

    -------- ------------ ---------- ---------- ----------

    Red Bull WINNING              12         19          8

    Red Bull WINNING               4          9          6

    Ferrari  WINNING              10         11          2

    Red Bull WINNING               2          2          1

    Ferrari  WINNING               1          1          1

    Ferrari  WINNING               3          3          1

    6 rows selected.

    ```


    Red Bull won eight consecutive races: rounds 12 through 19.


    ## Pit Stops and Hazards


    Analyzing the lap times can also give insights into when a pit stop occurs during
    the race. When a driver makes a pit stop, the next lap (the out lap) takes longer
    than the average time during the race. Similarly, hazardous situations can be
    detected. When there is a yellow flag situation, the speed of the cars needs to
    be reduced, which increases the lap times. When a driver makes a pit stop during
    a hazardous situation, always a good strategy, these are not detected.


    Before the pattern matching can be used, the input data must be prepped. Besides
    the driver, laps, and lap times, the average lap time (per driver) is also needed.
    For this, the `avg` analytic function is used, like in the following example.


    ```

    select drv.driverid

    , drv.forename||'' ''||drv.surname as driver

    , ltm.lap

    , ltm.milliseconds

    , avg (ltm.milliseconds)

    over (partition by drv.driverid

    ) as avg_laptime

    from   f1data.laptimes ltm

    join   f1data.drivers drv

    on   drv.driverid = ltm.driverid

    where  ltm.raceid = 1093 -- Circuit of the Americas

    order  by drv.driverid

    , ltm.lap

    /

    DRIVERID DRIVER                  LAP MILLISECONDS AVG_LAPTIME

    ---------- ---------------- ---------- ------------ -----------

    1 Lewis Hamilton            1       102630  109584.107

    1 Lewis Hamilton            2       102325  109584.107

    1 Lewis Hamilton            3       102175  109584.107

    1 Lewis Hamilton            4       102798  109584.107

    1 Lewis Hamilton            5       103196  109584.107

    1 Lewis Hamilton            6       102576  109584.107

    1 Lewis Hamilton            7       102702  109584.107

    1 Lewis Hamilton            8       103212  109584.107

    >

    855 Guanyu Zhou              52       103373  110854.482

    855 Guanyu Zhou              53       105200  110854.482

    855 Guanyu Zhou              54       104102  110854.482

    855 Guanyu Zhou              55       103812  110854.482

    855 Guanyu Zhou              56       103881  110854.482

    ```


    With the following definitions, the `faster_than_avg` and `slow_lap` can be defined
    as follows.


    ```

    faster_than_avg as milliseconds  avg_laptime

    ```


    With the definitions in place, it’s easiest to start by showing all records and
    classifying them using the following pattern.


    ```

    faster_than_avg* slow_lap*

    ```


    This leads to the following `match_recognize` clause.


    ```

    match_recognize (

    partition by driverid

    order by lap

    measures

    classifier() as what

    all rows per match

    pattern (

    faster_than_avg* slow_lap*

    )

    define

    faster_than_avg as milliseconds  avg_laptime

    )

    ```


    A closer look at Guanyu Zhou’s first 26 laps and classifying each lap accordingly
    reveals the following.


    ```

    DRIVER                  LAP MILLISECONDS WHAT

    ---------------- ---------- ------------ ----------------

    Guanyu Zhou               1       112824 SLOW_LAP

    Guanyu Zhou               2       105535 FASTER_THAN_AVG

    Guanyu Zhou               3       104538 FASTER_THAN_AVG

    Guanyu Zhou               4       104511 FASTER_THAN_AVG

    Guanyu Zhou               5       104904 FASTER_THAN_AVG

    Guanyu Zhou               6       104476 FASTER_THAN_AVG

    Guanyu Zhou               7       104454 FASTER_THAN_AVG

    Guanyu Zhou               8       105360 FASTER_THAN_AVG

    Guanyu Zhou               9       105956 FASTER_THAN_AVG

    Guanyu Zhou              10       127583 SLOW_LAP

    Guanyu Zhou              11       103895 FASTER_THAN_AVG

    Guanyu Zhou              12       104152 FASTER_THAN_AVG

    Guanyu Zhou              13       104739 FASTER_THAN_AVG

    Guanyu Zhou              14       103824 FASTER_THAN_AVG

    Guanyu Zhou              15       103741 FASTER_THAN_AVG

    Guanyu Zhou              16       104030 FASTER_THAN_AVG

    Guanyu Zhou              17       104266 FASTER_THAN_AVG

    Guanyu Zhou              18       134425 SLOW_LAP

    Guanyu Zhou              19       138587 SLOW_LAP

    Guanyu Zhou              20       144384 SLOW_LAP

    Guanyu Zhou              21       142312 SLOW_LAP

    Guanyu Zhou              22       133593 SLOW_LAP

    Guanyu Zhou              23       169446 SLOW_LAP

    Guanyu Zhou              24       184224 SLOW_LAP

    Guanyu Zhou              25       139116 SLOW_LAP

    Guanyu Zhou              26       105555 FASTER_THAN_AVG

    ```


    As seen in the output, the first lap was slower than his average lap time. It
    is not likely that this is due to a pit stop or a hazardous situation. Lap 10
    was a slow lap, so this could be due to a pit stop. It is also clear to see that
    something happened during laps 18 through 25, as the lap times are significantly
    slower than the others.


    As stated, the lap following a pit stop takes longer. To determine which lap the
    pitlane was entered, one lap must be subtracted to get the correct lap number.
    This can be corrected in the final query.


    Based on these assumptions, lap times increase after a pit stop for one lap and
    multiple laps when there is a hazardous situation. The following pattern can be
    deducted.


    ```

    faster_than_avg{1} slow_lap{1,} faster_than_avg{1}

    ```


    The pattern reads only one lap, which is faster than average, followed by one
    or more slow laps, followed by one (and only one) faster than an average lap.
    This eliminates the first lap when that one is a slow lap, like with Guanyu Zhou.


    The following is the complete query to detect (possible) pit stops and hazardous
    situations.'
