  **清单 3-9**

  分析函数与连接查询：执行计划


  ###### 性能考虑


  在某些情况下，由分析查询引起的排序操作可能非常低效，以至于即使没有任何索引，使用额外连接的方法也可能具有更好的性能。尽管这种情况相当罕见，但考虑不同的方法来获取所需的结果集总是有意义的。


  ###### 函数的差异与互换性


  本节并非旨在描述`row_number`和`rank`之间，或`rank`和`dense_rank`之间的差异。相反，我们将考虑如何利用不同函数的特点和窗口子句，来实现相同的逻辑。


  有时你可能会遇到如**清单 3-10**所示的代码。


  ```sql

  max(version) over (partition by dt order by version

  rows between unbounded preceding and unbounded following) latest_version

  ```

  **清单 3-10**

  使用无界范围的`order by`


  在这种情况下，指定`order by`没有任何意义，因为每一行的窗口都是整个分区。因此，**清单 3-11**展示了逻辑上相同的表达式。


  ```sql

  max(version) over (partition by dt) latest_version

  ```

  **清单 3-11**

  按分区求最大值


  然而，有时即使窗口是整个分区，指定`order by`也是有意义的。


  考虑以下任务：对于每一行，我们需要得出对应最大日期的最大值。这在下面的`m2`和`m3`表达式中得以实现。


  ```sql

  with t(id, value, dt, part) as

  (

  select 1, 10, date ''2015-07-01'', 1 from dual

  union all select 2, 3, date ''2015-08-01'', 1 from dual

  union all select 3, 2, date ''2015-09-01'', 1 from dual

  union all select 4, 0, date ''2016-11-01'', 1 from dual

  union all select 5, 5, date ''2016-11-01'', 1 from dual

  union all select 6, 9, date ''2017-01-01'', 1 from dual

  union all select 7, 4, date ''2017-01-01'', 1 from dual

  )

  select

  t.*,

  max(value) over (partition by part) m1,

  max(value) keep (dense_rank last order by dt) over (partition by part) m2,

  last_value(value)

  over (partition by part order by dt, value

  rows between unbounded preceding and unbounded following) m3,

  max(value)

  over (partition by part order by dt, value

  rows between unbounded preceding and unbounded following) m4

  from t

  order by id ;

  ID           VALUE DT        PART   M1   M2   M3   M4

  ---------- ---------- -------- ---------- ---- ---- ---- ----

  1         10 01.07.15          1   10    9    9   10

  2          3 01.08.15          1   10    9    9   10

  3          2 01.09.15          1   10    9    9   10

  4          0 01.11.16          1   10    9    9   10

  5          5 01.11.16          1   10    9    9   10

  6          9 01.01.17          1   10    9    9   10

  7          4 01.01.17          1   10    9    9   10

  7 rows selected.

  ```

  **清单 3-12**

  最大日期对应的最大值


  因此，最大日期是`01.01.2017`，它有两个对应的值——`4`和`9`。结果可以通过在关键字`keep`之后指定`"last"`函数并按`dt`排序，或者通过使用`"last_value"`函数并按`dt`和`value`排序来计算。


  如果我们需要获取最小值，则可以使用`min`函数代替`max`，或者简单地在`last_value`函数中为`value`指定降序排序。


  ```sql

  min(value) keep (dense_rank last order by dt) over (partition by part) m2,

  last_value(value)

  over (partition by part order by dt, value desc

  rows between unbounded preceding and unbounded following) m3

  from t

  ```

  **清单 3-13**

  最大日期对应的最小值


  所以，在第一种情况下我们使用了另一个函数，而在第二种情况下只改变了按`value`的排序方向。


  最后一个例子突出了`"last_value"`函数和`"ignore nulls"`构造的具体特点。在 10g 之前无法指定`"ignore nulls"`，但解决方法非常直接。


  ```sql

  with t(id, value, part) as

  (

  select 1, null, 1 from dual

  union all select 2, ''one'', 1 from dual

  union all select 3, null, 1 from dual

  union all select 1, ''two'', 2 from dual

  union all select 2, null, 2 from dual

  union all select 3, null, 2 from dual

  union all select 4, ''three'', 2 from dual

  )

  select t.*, max(value) over(partition by part, cnt) lv0

  from (select t.*,

  last_value(value ignore nulls) over(partition by part order by id) lv,

  count(value) over(partition by part order by id) cnt

  from t

  order by part, id) t;

  ID VALUE       PART LV           CNT LV0

  ---------- ----- ---------- ----- ---------- ---

  1                1                0

  2 one            1 one            1 one

  3                1 one            1 one

  1 two            2 two            1 two

  2                2 two            1 two

  3                2 two            1 two

  4 three          2 three          2 three

  7 rows selected.

  ```

  **清单 3-14**

  `last_value` + `ignore nulls`及针对旧版本的变通方法


  我们在内联视图中使用`count`来构建分区，该分区包含当前值及后续所有空白值的行，然后在其上使用`max`函数来模拟`last_value` + `ignore
  nulls`的行为。因此，显然，具有完全不同目的的函数可用于实现相同的逻辑。


  ##### 总结


  分析函数是一个非常强大的工具，可用于获取原本需要自连接或子查询的结果。它们自 Oracle 8i 引入以来已经显著发展；然而，包括 Oracle 12c 在内的许多版本中，它们的能力仍在持续发展。Oracle
  提供了灵活的窗口子句定义来调整分析窗口的默认定义，这个特性有其自身的局限性，但对于大多数实际任务来说，内置的灵活性已经绰绰有余。



  '
- '# 4. 聚合函数


  聚合函数对 `group by` 子句中定义的每个组返回一行。列名和表达式都可用于定义组，一个组是指 `group by` 中指定的所有表达式值都相同的行集合。每行属于且仅属于一个组。如果未指定
  `group by`，则整个记录集被视为一个单一组，这种情况下，即使要分组的记录集为空，查询也始终返回一行。


  代码清单 `4-1` 展示了如何基于第 `1` 章代码清单 `1-58` 中引入的表，计算所有作者的报告总次数和工作日数。


  ```sql

  select p.name,

  count(*) cnt_all,

  count(distinct p.day) cnt_day,

  listagg(p.day || '' '' || p.time || '':00'', ''; '') within group(order by w.id)
  details

  from presentation p, week w

  where p.day = w.day

  group by p.name;

  NAME    CNT_ALL    CNT_DAY DETAILS

  ---- ---------- ---------- ------------------------------------

  John          3          2 monday 14:00; monday 9:00; friday 9:00

  Rex            2             2 wednesday 11:00; friday 11:00

  Listing 4-1

  聚合函数。简单示例

  ```


  当指定 `distinct` 关键字时，只有不同的值才会被传递给聚合函数。`listagg` 函数用于显示所有报告的详细信息，正如前一章指出的——`listagg`
  不是可交换的，并且必须在 `within group` 关键字后指定顺序。还有一些其他聚合函数，其结果依赖于组内的顺序，例如 `percentile_cont`（更复杂的例子请参见第二部分中的测验“带偏移的百分位数”）。


  大多数聚合函数返回原子类型的结果，其类型与参数类型相同——例如 `number`、`date`、`varchar2` 等。然而，有些函数只是将值组合在一起，而不是基于输入计算结果值——例如
  `collect` 和 `xmlagg`。


  用户定义函数（UDF）可以应用于 `collect` 函数之上，以处理每组的元素。下面的 `collagg` 函数可用于连接集合元素。


  ```sql

  create or replace function collagg(p in strings) return varchar is

  result varchar2(4000);

  begin

  for i in 1 .. p.count loop

  result := result || '', '' || p(i);

  end loop;

  return(substr(result, 3));

  end collagg;

  /

  Listing 4-2

  连接集合元素

  ```


  其中 `strings` 是定义为以下内容的集合：


  ```sql

  create or replace type strings as table of varchar2(4000)

  /

  ```


  代码清单 `4-3` 展示了如何按报告者获取所有报告日的列表以及不同日期的列表。


  ```sql

  select name,

  collagg(cast(collect(p.day order by w.id desc) as strings)) days,

  collagg(set(cast(collect(p.day order by w.id desc) as strings))) days_unique

  from presentation p, week w

  where p.day = w.day

  group by p.name;

  NAME DAYS                           DAYS_UNIQUE

  ---- ------------------------------ ---------------------------

  John friday, monday, monday         friday, monday

  Rex  friday, wednesday              friday, wednesday

  Listing 4-3

  使用 collect 函数

  ```


  与 `listagg` 不同，`order by` 是在函数本身中指定的，`distinct` 关键字不被允许在 `collect` 中使用，但可以使用 `set`
  函数来消除重复项。尽管 `set` 函数似乎能保留元素的顺序——但并不能保证在所有情况下都是如此。


  类似的逻辑，包括排序，可以使用 `xmlagg` 来实现，如下列表达式所示，但在这种情况下，如果没有额外的内联视图，则无法消除重复项。


  ```sql

  substr(xmlagg(xmlelement("x", '', '' || p.day) order by w.id desc)

  .extract(''//x/text()'')

  .getstringval(), 3) x

  ```


  除了内置的聚合函数，Oracle（自版本 9i Release 1 起）还提供了用户定义聚合（UDAG）的接口，可用于实现任何复杂的分组逻辑。例如，有一个单行函数
  `bitand`，它没有对应的聚合函数。如果需要，可以使用 UDF + `collect` 或 UDAG 来实现此逻辑。


  在前一章中，展示了分析函数如何帮助避免连接，聚合函数也可用于此目的。


  例如，一个 `requirements` 表包含职位和相应技能的信息。目标是找出需要 `Oracle` 知识但不需要 `Linux` 的职位。


  ```sql

  create table requirements(position, skill) as

  (

  select ''Data Scientist'', ''R'' from dual

  union all select ''Data Scientist'', ''Python'' from dual

  union all select ''Data Scientist'', ''Spark'' from dual

  union all select ''DB Developer'', ''Oracle'' from dual

  union all select ''DB Developer'', ''Linux'' from dual

  union all select ''BI Developer'', ''Oracle'' from dual

  union all select ''BI Developer'', ''MSSQL'' from dual

  union all select ''BI Developer'', ''Analysis Services'' from dual

  union all select ''System Administrator'', ''Linux'' from dual

  union all select ''System Administrator'', ''Network Protocols'' from dual

  union all select ''System Administrator'', ''Python'' from dual

  union all select ''System Administrator'', ''Perl'' from dual

  );

  ```


  一个直接的解决方案如下所示。


  ```sql

  select position

  from requirements r

  where skill = ''Oracle''

  and not exists (select null

  from requirements r0

  where r0.position = r.position

  and r0.skill = ''Linux'');

  POSITION


  BI Developer

  ```


  此解决方案的主要缺点是 `where` 子句中的关联子查询，这会导致对 `requirements` 表的额外扫描。


  另一种方法是计算 `Oracle` 和 `Linux` 技能的计数，并过滤掉不满足条件的职位。


  ```sql

  select position

  from requirements

  group by position

  having count(decode(skill, ''Oracle'', 1)) = 1

  and count(decode(skill, ''Linux'', 1)) = 0;

  POSITION


  BI Developer

  ```


  从性能角度来看，这个解决方案更可取，你可能会注意到聚合函数仅用于过滤目的，而不在 `select` 列表中。


  让我们考虑一个更通用的例子。表 `entity` 和 `property` 用于实现实体-属性-值（EAV）模型——这种方法在数据库设计中用于在单个表中存储具有可变属性数量的实体。


  ```sql

  with entity(id, name) as

  (select 1, ''E1'' from dual

  union all select 2, ''E2'' from dual

  union all select 3, ''E3'' from dual),

  property(id, entity_id, name, value) as

  (select 1, 1, ''P1'', 1 from dual

  union all select 2, 1, ''P2'', 10 from dual

  union all select 3, 1, ''P3'', 20 from dual

  union all select 4, 1, ''P4'', 50 from dual

  union all select 5, 2, ''P1'', 1 from dual

  union all select 6, 2, ''P3'', 100 from dual

  union all select 7, 2, ''P4'', 50 from dual

  union all select 8, 3, ''P1'', 1 from dual

  union all select 19, 3, ''P2'', 10 from dual

  union all select 10, 3, ''P3'', 100 from dual)

  Listing 4-4

  EAV 模型

  ```


  我们的目标是选择属性 `P1`、`P2`、`P3` 的值分别等于 1、10、100 的实体，并且假设每个实体的属性是唯一的。有时开发人员使用多个连接来实现这一点，这是非常低效的——实际上，连接的数量等于我们感兴趣的属性数量。


  ```sql

  select e.name

  from entity e

  join property p1 on p1.entity_id = e.id and p1.name = ''P1''

  join property p2 on p2.entity_id = e.id and p2.name = ''P2''

  join property p3 on p3.entity_id = e.id and p3.name = ''P3''

  where p1.value = 1 and p2.value = 10 and p3.value = 100;

  NAME


  E3

  ```


  如果我们需要获取 20 个属性的值，这将导致 20 个连接，这根本不是一个可行的解决方案。


  考虑到每个属性可能有一个值，也可能根本没有值，我们可以将每个实体的所有属性扁平化为一行，并在之上应用筛选条件。


  ##### 透视和逆透视操作符


  `代码清单 4-5` 展示了使用 `group by` 实现的扁平化逻辑；但从 Oracle 11g 开始，可以使用 `pivot` 操作符实现相同的效果。


  ```sql

  create table entity_flattened as

  select *

  from (select e.name name, p.name p_name, value

  from entity e

  join property p

  on p.entity_id = e.id)

  pivot(max(value) for p_name in(''P1'' p1_value, ''P2'' p2_value, ''P3'' p3_value));

  ```


  `代码清单 4-6`

  使用 `pivot` 操作符扁平化 EAV 模型


  表 `entity_flattened` 包含一个与使用 `group by` 的内联视图中相同的记录集。关于 `pivot` 操作符最重要的一点是，查询中必须列出所有列，因为
  Oracle 在解析阶段定义了结果集的所有列。也就是说，无法基于表中的数据或其他条件在记录集中动态创建列，因此如果你有此类需求，可以使用 `ODCItable`
  接口（或从 Oracle 18c 开始的多态表函数）。`Pivot XML` 允许你为动态数量的列生成 XML，但如果希望以关系形式获得结果，你需要列出所有列以进行
  XML 解析。此技术在 `代码清单 4-7` 中演示。


  ```sql

  select name, x.*

  from (select *

  from (select e.name name, p.name p_name, value

  from entity e

  join property p

  on p.entity_id = e.id)

  pivot xml(max(value) value for p_name in(any))),

  xmltable(''/PivotSet'' passing p_name_xml

  columns

  name1 varchar2(30)

  path ''/PivotSet/item[1]/column[@name="P_NAME"]/text()'',

  value1 varchar2(30)

  path ''/PivotSet/item[1]/column[@name="VALUE"]/text()'',

  name2 varchar2(30)

  path ''/PivotSet/item[2]/column[@name="P_NAME"]/text()'',

  value2 varchar2(30)

  path ''/PivotSet/item[2]/column[@name="VALUE"]/text()'',

  name3 varchar2(30)

  path ''/PivotSet/item[3]/column[@name="P_NAME"]/text()'',

  value3 varchar2(30)

  path ''/PivotSet/item[3]/column[@name="VALUE"]/text()'') x;

  NAME  NAME1 VALUE1 NAME2 VALUE2 NAME3 VALUE3

  ----- ----- ------ ----- ------ ----- ------

  E1    P1    1      P2     10     P3     20

  E2    P1    1      P3    100     P4     50

  E3    P1    1      P2     10     P3    100

  ```


  `代码清单 4-7`

  解析 `pivot` XML


  鉴于此逻辑与呈现结果相关，有时在客户端实现它是有意义的。


  可以使用 `unpivot` 操作符执行反向操作，如 `代码清单 4-8` 所示。


  ```sql

  select *

  from entity_flattened

  unpivot (value for p_name in

  (p1_value as ''P1'', p2_value as ''P2'', p3_value as ''P3''));

  NAME  P_NAME      VALUE

  ----- ------ ----------

  E1    P1              1

  E1    P2             10

  E1    P3             20

  E3    P1              1

  E3    P2             10

  E3    P3            100

  E2    P1              1

  E2    P3            100

  8 rows selected.

  ```


  `代码清单 4-8`

  `Unpivot` 操作符


  它为 `unpivot` 子句中列出的每个列创建新行，并复制所有剩余列的值。在上面的例子中，剩余列是 “`p1_value, p2_value, p3_value`”
  和对应的 `name`。`unpivot` 不需要 “`any`” 关键字，因为要进行逆透视的记录集总是包含固定且预定义数量的列。Oracle 本可以引入像 “`unpivot
  (value for p_name in (any except name))`” 这样的语法糖，但这并非强烈必需。


  `Unpivot` 可以使用笛卡尔连接实现。


  ```sql

  select name,

  p_name,

  decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) value

  from entity_flattened,

  (select ''P1'' p_name from dual

  union all select ''P2'' from dual

  union all select ''P3'' from dual)

  where decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) is not
  null

  order by 1, 2;

  ```


  ## Cube, Rollup, 分组集


  Oracle 提供了计算总计和小计的附加功能。让我们考虑一个包含订单信息的表。


  ```sql

  create table orders(order_id, client_id, product_id, quantity) as

  (

  select 1, 1, 1, 1 from dual

  union all select 1, 1, 2, 2 from dual

  union all select 1, 1, 3, 1 from dual

  union all select 2, 2, 1, 1 from dual

  union all select 2, 2, 5, 1 from dual

  union all select 3, 1, 1, 1 from dual

  union all select 3, 1, 4, 1 from dual

  union all select 3, 1, 4, 1 from dual

  union all select 4, 2, 4, 1 from dual

  union all select 4, 2, 5, 1 from dual

  );

  ```


  “`Rollup`” 允许我们从右向左计算小计，“`cube`” 允许我们计算所列列的所有可能的小计。


  ```sql

  select client_id, product_id, sum(quantity) cnt

  from orders

  group by rollup(client_id, product_id)

  order by client_id, product_id;

  CLIENT_ID PRODUCT_ID        CNT

  ---------- ---------- ----------

  1          1          2

  1          2          2

  1          3          1

  1          4          2

  1                     7

  2          1          1

  2          4          1

  2          5          2

  2                     4


  10 rows selected.

  ```


  ```sql

  select client_id, product_id, sum(quantity) cnt

  from orders

  group by cube(client_id, product_id)

  order by client_id, product_id;

  CLIENT_ID PRODUCT_ID        CNT

  ---------- ---------- ----------

  1          1          2

  1          2          2

  1          3          1

  1          4          2

  1                     7

  2          1          1

  2          4          1

  2          5          2

  2                     4

  1          3

  2          2

  3          1

  4          3

  5          2


  15 rows selected.

  ```


  同样的效果可以分别使用以下语句完成。


  ```sql

  grouping sets ((), (client_id), (client_id, product_id))

  和

  grouping sets ((), (client_id), (product_id), (client_id, product_id))

  ```


  函数 `grouping` 和 `grouping_id` 可用于识别小计。`Grouping` 只接受单个表达式作为参数，而 `grouping_id` 可以接受多个表达式。


  ```sql

  select decode(grouping(client_id), 1, ''all clients'', client_id) as client_id,

  decode(grouping(product_id), 1, ''all products'', product_id) as product_id,

  sum(quantity) cnt,

  decode(grouping_id(client_id, product_id),

  bitand(grouping_id(client_id, product_id), bin_to_num(0, 0)),

  ''client, product'',

  bitand(grouping_id(client_id, product_id), bin_to_num(0, 1)),

  ''client'',

  bitand(grouping_id(client_id, product_id), bin_to_num(1, 1)),

  ''grand total'') slice

  from orders

  group by rollup(client_id, product_id)

  order by client_id, product_id;

  CLIENT_ID       PRODUCT_ID             CNT SLICE

  --------------- --------------- ---------- --------------------

  1               1                        2 client, product

  1               2                        2 client, product

  1               3                        1 client, product

  1               4                        2 client, product

  1               all products             7 client

  2               1                        1 client, product

  2               4                        1 client, product

  2               5                        2 client, product

  2               all products             4 client

  all clients     all products            11 grand total

  10 rows selected.

  ```


  还有一个函数 `group_id` 可用于区分相同的切片。


  '
- '# 5. 层次查询：Connect By


  ##### 概要


  聚合函数允许我们为每个组计算单个结果行。除了各种内置聚合函数外，开发人员还可以实现自己的用户定义聚合函数（同样可以作为带`over`子句的分析函数使用），或者使用`collect`函数将行聚合到集合中，并通过用户定义函数对其应用任意逻辑。大多数内置聚合函数是可交换的，因此组内行的顺序无关紧要；然而，像`listagg`或`percentile_cont`这样的函数则需要`within
  group`关键字后指定的顺序。顺序对于`collect`或`xmlagg`函数也很重要，并且可以在函数本身中指定。


  与分析函数所示的方式类似，Oracle 允许我们使用`keep`关键字和`first`/`last`函数，根据指定的顺序访问组中的第一个（或最后一个）值。这在需要查找组中的最小或最大值及其相应属性时非常有用。


  有时，分组可以帮助避免额外的连接（JOIN）；然而，这种情况相当罕见。此外，分组可以替代`pivot`来“扁平化”数据，但使用内置功能更为可取。


  ## Connect By 子句


  `connect by`子句用于查询以父子关系存储的层次结构，这也称为邻接表模型。简单来说，该模型意味着为每个子代存储一个父-子对。通常，邻接表可以表示有向图，而不仅仅是层次树；在这种情况下，该列表描述了图中顶点的邻居集合。因此，邻接表模型的范围更广，而父-子模型是其实现之一。


  列表 [5-1] 展示了一个基于父子关系构建层次结构并使用 Oracle 层次查询伪列的查询。


  ```sql

  create table tree as

  select 2 id, 1 id_parent from dual

  union all select 3 id, 1 id_parent from dual

  union all select 4 id, 3 id_parent from dual

  union all select 5 id, 4 id_parent from dual

  union all select 11 id, 10 id_parent from dual

  union all select 12 id, 11 id_parent from dual

  union all select 13 id, 11 id_parent from dual;

  select connect_by_root id_parent root,

  level lvl,

  rpad('' '', (level - 1) * 3, '' '') || t.id as id,

  prior id_parent grand_parent,

  sys_connect_by_path(id, ''->'') path,

  connect_by_isleaf is_leaf

  from tree t

  start with t.id_parent in (1, 10)

  connect by prior t.id = t.id_parent;

  ROOT      LVL ID       GRAND_PARENT PATH          IS_LEAF

  -------- ----------- ------------------------ ---------------

  1      1 2                ->2                        1

  1      1 3                ->3                        0

  1      2    4           1 ->3->4                     0

  1      3       5        3 ->3->4->5                  1

  10      1 11               ->11                       0

  10      2    12         10 ->11->12                   1

  10      2    13         10 ->11->13                   1

  Listing 5-1

  查询父子关系

  ```


  构建层次结构必须指定：

  *   **根** – 在示例中，我们构建了根父 ID 等于 1 和 10 的两棵树；

  *   父与子之间的关系。`prior`是一个一元运算符，返回给定表达式（通常是列）对于当前行的直接父行的值。


  列表 [5-1] 中演示的其他层次查询特性：

  *   `connect_by_root` – 一元运算符，返回根行的表达式值。

  *   `level` 和 `connect_by_isleaf` – 伪列，分别返回每个行的层次深度（层级）以及节点是否为叶节点的标志。

  *   `sys_connect_by_path` – 函数，返回从根到节点并带有给定分隔符的路径。


  `prior`运算符不仅可以在`connect by`子句中使用，也可以在`select`列表中使用，但它只能对给定表达式应用一次。例如，如果目标是选择向上两级的父
  ID，那么可以对`id_parent`列应用`prior` – 参见列表 [5-1] 中`grand_parent`的表达式。


  `Connect by`使用深度优先搜索方法遍历层次结构，因此在处理同一级别的下一个节点之前，会处理当前节点的所有后代。可以使用“order siblings
  by”来指定同一级别内的顺序。在这种情况下，Oracle 也会使用深度优先搜索，但父节点的子节点顺序可能会改变。列表 [5-2] 展示了在先前查询中指定`order
  siblings by t.id desc`后的结果。不能保证第一级节点会按照“order siblings by”中指定的顺序排序，因为我们无法说它们有一个共同的父节点。


  ```

  select decode(grouping(client_id), 1, ''所有客户'', client_id) as client_id,

  decode(grouping(product_id), 1, ''所有产品'', product_id) as product_id,

  sum(quantity) cnt,

  group_id() group_id

  from orders

  group by grouping sets(client_id, product_id,(),())

  order by client_id, product_id;

  CLIENT_ID       PRODUCT_ID             CNT   GROUP_ID

  --------------- --------------- ---------- ----------

  1               所有产品             7          0

  2               所有产品             4          0

  所有客户     1                        3          0

  所有客户     2                        2          0

  所有客户     3                        1          0

  所有客户     4                        3          0

  所有客户     5                        2          0

  所有客户     所有产品            11          0

  所有客户     所有产品            11          1

  已选择 9 行。

  ```


  Without these capabilities, the same result can be achieved using multiple table
  scans and groupings for each grouping set. On the other hand, it’s doable using
  a single table scan and Cartesian join with slices, but performance of built-in
  functionality will be better because it’s optimized to calculate aggregates by different
  attributes for the same recordset.


  ```sql

  select client_id, product_id, sum(quantity) cnt, slice

  from (select decode(instr(slice, ''client''), 0,

  ''所有客户'', client_id) as client_id,

  decode(instr(slice, ''product''), 0,

  ''所有产品'', product_id) as product_id,

  quantity,

  slice

  from orders,

  (select ''client, product'' slice from dual

  union all select ''client'' from dual

  union all select ''总计'' from dual))

  group by client_id, product_id, slice

  order by client_id, product_id;

  ```


  因此，PIVOT 可以用 GROUP BY 重写，UNPIVOT 可以用笛卡尔积模仿，而 GROUP BY CUBE/ROLLUP/GROUPING SETS
  可以用笛卡尔积和简单的 GROUP BY 替代。然而，内置功能不仅使查询更简洁、更易于理解，而且性能明显更好。


  本章最后要提及的是，聚合函数可以嵌套或与分析函数混合使用，这在第 9 章“查询子句的逻辑执行顺序”中有更详细的解释。


  ##### 代码清单 5-2

  ##### 兄弟节点排序


  ```

  ROOT     LVL ID    ----GRAND_PARENT PATH       IS_LEAF

  -------- --------------- -------------------------- ------

  10     1 11                 ->11                   0

  10     2    13           10 ->11->13               1

  10     2    12           10 ->11->12               1

  1     1 3                  ->3                    0

  1     2    4             1 ->3->4                 0

  1     3       5          3 ->3->4->5              1

  1     1 2                  ->2                    1

  ```


  如果 `connect by` 与连接（join）在同一个查询块中指定，那么 Oracle 会按以下顺序处理层级查询：连接（包括在 where 子句中指定的连接）、`connect
  by`、所有剩余的 where 子句谓词。


  让我们创建以下表来进行演示：


  ```

  drop table tree;

  drop table nodes;

  create table tree(id, id_parent) as

  select rownum, rownum - 1 from dual connect by level <= 4;

  create table nodes(id, name, sign) as

  select rownum, ''name'' || rownum, decode(rownum, 3, 0, 1)

  from dual connect by rownum <= 4;

  ```


  在代码清单 5-3 的第二个和第三个查询中，`sign` 过滤是在构建层级结构之前应用的，而在第一个查询中，它是在层级结构构建之后应用的。


  ```

  select t.*, n.name

  from tree t, nodes n

  where t.id = n.id

  and n.sign = 1

  start with t.id_parent = 0

  connect by prior t.id = t.id_parent;

  ID  ID_PARENT NAME

  ---------- ---------- -----------------------------------------

  1          0 name1

  2          1 name2

  4          3 name4

  select *

  from (select t.*, n.name

  from tree t, nodes n

  where t.id = n.id

  and n.sign = 1) t

  start with t.id_parent = 0

  connect by prior t.id = t.id_parent;

  ID  ID_PARENT NAME

  ---------- ---------- -----------------------------------------

  1          0 name1

  2          1 name2

  select t.*, n.name

  from tree t

  join nodes n

  on t.id = n.id

  and n.sign = 1

  start with t.id_parent = 0

  connect by prior t.id = t.id_parent;

  ID  ID_PARENT NAME

  ---------- ---------- -----------------------------------------

  1          0 name1

  2          1 name2

  ```


  ##### 代码清单 5-3

  ## Connect by 与连接


  对于使用 ANSI 连接的原始查询，经过转换后的最终查询包含一个笛卡尔积连接（Cartesian join），而连接谓词则被移到了 “start with” 和
  “connect by” 子句中。然而，更符合逻辑的预期是，在转换后的查询中会看到一个内联视图（inline view），其上再应用 `connect by`。因此，如果你为转换后的查询构建执行计划，它将与原始查询的执行计划不同，连接类型将是
  “MERGE JOIN CARTESIAN”。


  ```

  select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

  from "TREE" "T", "NODES" "N"

  start with "T"."ID_PARENT" = 0

  and "T"."ID" = "N"."ID"

  and "N"."SIGN" = 1

  connect by "T"."ID_PARENT" = prior "T"."ID"

  and "T"."ID" = "N"."ID"

  and "N"."SIGN" = 1

  ```


  对于代码清单 5-3 中第一个查询的转换结果，看起来也有点出乎意料——正如你所看到的，连接条件从 where 子句移到了 “start with” 和 “connect
  by” 子句中。


  ```

  select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

  from "TREE" "T", "NODES" "N"

  where "N"."SIGN" = 1

  start with "T"."ID_PARENT" = 0

  and "T"."ID" = "N"."ID"

  connect by "T"."ID_PARENT" = prior "T"."ID"

  and "T"."ID" = "N"."ID"

  ```


  我想再次强调，这些转换后的查询与原始查询的执行计划是不同的；即使它们在语义上是等效的，转换后文本的查询性能会差很多，因为层级结构将建立在笛卡尔积连接之上。


  说到外连接（outer joins），无论它们是在 “join” 子句还是 “where” 子句中指定都没有区别，因为包含 `(+)` 的谓词会在构建层级结构之前被求值。


  同样值得一提的是，如果目标是获取所有后代直到特定层级，那么在 “connect by” 条件中指定 `"level <= n"` 过滤比在 where 子句中指定更有意义，因为这样会在达到特定层级时停止构建层级结构。否则，层级结构将为所有层级构建，之后才会应用
  where 过滤器。


  另一个重点是，`connect by` 条件只对层级大于 1 的节点进行求值。第一层级的节点必须使用 “start with” 子句进行过滤。例如，无论你在 connect
  by 条件中指定 `"level <= 1"` 还是 `"level <= 0"`，所有第一层级的节点都会被返回。


  `Connect by` 允许你遍历有向图，即使它们包含环。参见图 5-1。


  ![A455196_1_En_5_Fig1_HTML.jpg](img/A455196_1_En_5_Fig1_HTML.jpg)


  图 5-1

  ##### 有向图


  ```

  with graph (id, id_parent) as

  (select 2, 1 from dual

  union all select 3, 1 from dual

  union all select 4, 3 from dual

  union all select 5, 4 from dual

  union all select 3, 5 from dual)

  select level lvl, graph.*, connect_by_iscycle cycle

  from graph

  start with id_parent = 1

  connect by nocycle prior id = id_parent;

  LVL         ID  ID_PARENT      CYCLE

  ---------- ---------- ---------- ----------

  1          2          1          0

  1          3          1          0

  2          4          3          0

  3          5          4          1

  ```


  `id = 3` 的节点是 `id = 5` 的节点的子节点，并且在我们访问 `id = 5` 的节点时，它已经被处理过了。在这种情况下，该节点的层级构建会停止，并被标记为环。换句话说，如果当前行的子节点同时也是其祖先节点，则
  `connect_by_iscycle` 等于 1。


  在一般情况下，使用 “connect by” 子句时，“start with” 和 `prior` 运算符都不是强制性的。这常用于生成序列。代码清单 5-4 展示了几种方法。


  ```

  select level id from dual connect by level <= 10;

  select rownum id from dual connect by rownum <= 10;

  select rownum id from (select * from dual connect by 1 = 1)

  where rownum <= 10;

  ```


  ##### 代码清单 5-4

  ## 使用 connect by 生成序列


  这些查询不会识别出环，因为在 connect by 条件中没有使用 `prior` 运算符引用父记录。因此，当不存在父子关系时，环就不可能存在。尝试在 “connect
  by” 条件中添加谓词 `«prior 1 = 1»` 来执行代码清单 5-4 中的任意查询。


  文档中说：“在层级查询中，[connect by] 条件中的一个表达式必须使用 PRIOR 运算符进行限定，以引用父行。” 因此，如果你想引用父行，就必须使用
  `prior` 运算符，但你并不被强制去引用它——也就是说，`connect by` 不仅可以用于遍历层级结构。


  `prior` 运算符的关键点是，其中引用的值必须在构建层级结构之前就存在。此外，当你使用 `prior` 运算符时，不能引用在层级查询中计算的列。这意味着无法累积计算子节点的值。然而，对于递归子查询因子分解（Recursive
  subquery factoring），则没有这样的限制，这将在下一章中展示。


  为了演示这个限制，让我们考虑一个任务：目标是生成与函数 `f` 返回的相同序列（类型 `numbers` 在“集合转置（Unnesting Collections）”一节中已定义）。


  ```

  create or replace function f(n in number) return numbers as

  result numbers := numbers();

  begin

  result.extend(n + 1);

  result(1) := 1;

  for i in 2 .. n + 1 loop

  result(i) := round(100 * sin(result(i - 1) + i - 2));

  end loop;

  return result;

  end f;

  /

  ```



  ##### 递归序列生成与循环处理


  该函数返回一个递归序列，其中当前值等于前一个值与其索引之和的正弦值，该和乘以 100 并取整。代码中使用`i-2`是因为元素索引从零开始。


  为了突出序列的递归特性，它也可以用递归函数来定义。


  ```sql

  create or replace function f(n in number) return numbers as

  result numbers;

  begin

  if n = 0 then return numbers(1);

  else

  result := f(n - 1);

  result.extend;

  result(n + 1) := round(100 * sin(result(n) + n - 1));

  return result;

  end if;

  end f;

  /

  ```


  鉴于正弦值范围在[-1, 1]之间，且函数值乘以 100 并取整，因此可以为序列生成所有可能的值——即范围[-100, 100]。基于此假设，可以使用`connect
  by`来生成序列。


  清单 5-5 中的查询仅生成前 14 个值而非 21 个，因为第 14 行被识别为一个循环。


  ```sql

  with t as

  (select -100 + level - 1 result from dual connect by level <= 201)

  select level - 1 as id, result, connect_by_iscycle cycle

  from t

  start with result = 1

  connect by nocycle round(100 * sin(prior result + level - 2)) = result

  and level <= 21;

  ID     RESULT      CYCLE

  ---------- ---------- ----------

  0          1          0

  1         84          0

  2        -18          0

  3         29          0

  4         55          0

  5         64          0

  6        -11          0

  7         96          0

  8         62          0

  9         77          0

  10        -92          0

  11        -31          0

  12        -91          0

  13         44          1

  ```

  **清单 5-5** 使用`connect by`生成递归序列值


  在`connect by`子句中添加`prior sys_guid() is not null`的技巧有助于我们避免循环并生成所有元素。`sys_guid()`返回唯一值，因此已生成的任何行都不会被视为当前行的子行；从而不会识别出循环。请参阅清单
  5-6 查看此方法的实际应用。


  ```sql

  with t as

  (select -100 + level - 1 result from dual connect by level <= 201)

  select level - 1 as id, result, connect_by_iscycle cycle

  from t

  start with result = 1

  connect by nocycle round(100 * sin(prior result + level - 2)) = result

  and prior sys_guid() is not null

  and level <= 21;

  ID     RESULT      CYCLE

  ---------- ---------- ----------

  0          1          0

  1         84          0

  2        -18          0

  3         29          0

  4         55          0

  5         64          0

  6        -11          0

  7         96          0

  8         62          0

  9         77          0

  10        -92          0

  11        -31          0

  12        -91          0

  13         44          0

  14         44          0

  15         99          0

  16         78          0

  17        -25          0

  18        -99          0

  19         63          0

  20         31          0

  ```

  **清单 5-6** 在生成递归序列时处理具有相同值的元素


  现在我们看到没有识别出循环，因此可以移除`nocycle`关键字。


  总结循环识别的细节：

  *   只有当`connect by`条件包含`prior`运算符时，才能识别循环。

  *   如果我们对任何返回唯一值的函数应用`prior`运算符，则不会识别循环，因为在这种情况下，具有相同值的行不被视为层次结构中的相同节点。


  这种遍历预生成值的方法甚至可以在递归公式引用前两次迭代的值时使用，但在这种情况下，有必要生成所有可能的前一个元素和它之前元素的组合。清单 5-7 展示了如何使用此方法生成斐波那契数。


  ```sql

  with t as

  (select rownum id from dual connect by rownum <= power(2, 15) / 15),

  pairs as

  (select t1.id id1, t2.id id2

  from t t1, t t2

  where t2.id between (1 / 2) * t1.id and (2 / 3) * t1.id

  union all

  select 1, 0 from dual

  union all

  select 1, 1 from dual)

  select rownum lvl, id2 fib

  from pairs

  start with (id1, id2) in ((1, 0))

  connect by prior id1 = id2

  and prior (id1 + id2) = id1

  and level <= 15;

  LVL        FIB

  ---------- ----------

  1          0

  2          1

  3          1

  4          2

  5          3

  6          5

  7          8

  8         13

  9         21

  10         34

  11         55

  12         89

  13        144

  14        233

  15        377

  15 rows selected.

  ```

  **清单 5-7** 使用`connect by`生成斐波那契数


  我们可以注意到，对于所有大于 1 的元素，有`F[i] < 2^i/i`且`F[i-1]`在½ * F[i]和¾ *F[i]之间，这些条件被用来减少预生成组合的数量。与前面的例子不同，这里不需要使用`prior
  sys_guid`技巧，因为该序列对于所有大于 1 的元素都是单调递增的，因此不可能遇到循环。


  经过时间随层级呈指数增长，这种方法不能用于实际任务；主要意图是演示`connect by`子句的特性。


  `sys_guid`技巧也可用于生成每行的副本数量。


  ```sql

  with t as

  (select ''A'' value, 2 cnt from dual

  union all

  select ''B'' value, 3 cnt from dual)

  select *

  from t

  connect by level <= cnt

  and prior value = value

  and prior sys_guid() is not null;

  V        CNT

  - ----------

  A          2

  A          2

  B          3

  B          3

  B          3

  ```


  如你所见，查询中没有`start with`条件，因此第一层包含所有行，并且连接在每个值的范围内执行，直到生成`cnt`行。使用`sys_guid`技巧是为了避免循环，因为每个根的所有行都具有相同的值。生成每行指定副本数量的其他方法很多，`connect
  by`并不是最佳方式。


  在遍历有向图时也可以使用此技巧。它会阻止 Oracle 识别循环，因此同一循环可能被遍历多次。正如预期的那样，所有行的`cycle`列都等于零。


  ```sql

  select level lvl, graph.*, connect_by_iscycle cycle

  from graph

  start with id_parent = 1

  connect by nocycle prior id = id_parent

  and prior sys_guid() is not null

  and level <= 10;

  LVL         ID  ID_PARENT      CYCLE

  ---------- ---------- ---------- ----------

  1          2          1          0

  1          3          1          0

  2          4          3          0

  3          5          4          0

  4          3          5          0

  5          4          3          0

  6          5          4          0

  7          3          5          0

  8          4          3          0

  9          5          4          0

  10          3          5          0

  ```


  如果目标是选择所有边，包括闭合循环的边，那么我们可以添加条件`prior id_parent is not null`，如清单 5-8 所示。在这种情况下，如果我们访问了同一个节点两次，循环将被识别。更多细节可在下一章的“再次讨论循环”一节中找到。


  ```sql

  select level lvl, graph.*, connect_by_iscycle cycle

  from graph

  start with id_parent = 1

  connect by nocycle prior id = id_parent

  and prior id_parent is not null;

  LVL         ID  ID_PARENT      CYCLE

  ---------- ---------- ---------- ----------

  1          2          1          0

  1          3          1          0

  2          4          3          0

  3          5          4          0

  4          3          5          1

  ```

  **清单 5-8** 通过添加`prior id_parent is not null`影响循环检测




  ##### 伪列生成详解


  我们已经探讨了层次查询中 `join`、`connect by` 和 `where` 子句的工作原理。当查询包含伪列时，无法简单地说它们的值是在某个特定查询子句之前还是之后生成的，但我们可以陈述以下规则：


  *   当生成新层级的行时，`level` 会递增。

  *   当新行被添加到结果集中时，`rownum` 会递增。


  清单 5-9 通过一个示例演示了上述陈述。


  ```

  create table t_two_branches(id, id_parent) as

  (select rownum, rownum - 1 from dual connect by level <= 10

  union all

  select 100 + rownum, 100 + rownum - 1 from dual connect by level <= 10

  union all

  select 0, null from dual

  union all

  select 100, null from dual);

  select rownum rn,

  level lvl,

  replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

  replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

  sys_connect_by_path(id, ''~'') path_id

  from t_two_branches

  where mod(level, 3) = 0

  start with id_parent is null

  connect by prior id = id_parent;

  RN    LVL PATH_RN     PATH_LVL     PATH_ID

  ------ -------- ------- ------------ --------------------------

  1      3 111         123          ~0~1~2

  2      6 111222      123456       ~0~1~2~3~4~5

  3      9 111222333   123456789    ~0~1~2~3~4~5~6~7~8

  4      3 444         123          ~100~101~102

  5      6 444555      123456       ~100~101~102~103~104~105

  6      9 444555666   123456789    ~100~101~102~103~104~105~106~107~108

  6 rows selected.

  清单 5-9

  level 和 rownum 伪列生成的具体情况

  ```


  对于两个分支中的每一个，Oracle 都生成了 9 个层级和 3 行：第 1-3 行属于第一个分支，第 4-6 行属于第二个分支。`path_rn` 和 `path_lvl`
  列帮助我们理解了伪列值是如何生成的。从技术上讲，`where` 子句是在构建层次结构时进行评估的，而不是之后。


  另外，指出当 `rownum`/`level` 用于 `connect by` 子句时的差异也很有趣。


  ```

  select rownum rn,

  level lvl,

  replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

  replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

  sys_connect_by_path(id, ''~'') path_id

  from t_two_branches

  start with id_parent is null

  connect by prior id = id_parent

  and rownum <= 2;

  RN        LVL PATH_RN         PATH_LVL        PATH_ID

  ---------- ---------- --------------- --------------- ---------

  1          1 1               1               ~0

  2          2 12              12              ~0~1

  3          1 3               1               ~100

  select rownum rn,

  level lvl,

  replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

  replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

  sys_connect_by_path(id, ''~'') path_id

  from t_two_branches

  start with id_parent is null

  connect by prior id = id_parent

  and level <= 2;

  RN        LVL PATH_RN         PATH_LVL        PATH_ID

  ---------- ---------- --------------- -------- ----------------

  1        1 1                  1              ~0

  2        2 12                12              ~0~1

  3        1 3                  1              ~100

  4        2 34                12              ~100~101

  清单 5-10

  在 "connect by" 条件中使用 level 和 rownum 的区别

  ```


  在第一种情况下，Oracle 为第一个分支返回两行，并为第二个分支返回一行根节点行。尽管 `connect by` 条件对于该行是 false，但 `start
  with` 是 true；因此所有根节点都出现在结果中。在第二种情况下，Oracle 简单地遍历所有分支直到指定的层级，显然 `rownum` 是单调递增的。


  ##### 总结


  `connect by` 子句是 Oracle 的一个特有特性，可用于遍历父子层次结构或生成没有父子依赖关系的序列。通常，此特性允许遍历任何有向图，并且可以使用
  `nocycle` 关键字来处理环路。


  '
- '# 6. 递归子查询因子化


  子查询因子化子句（有时也称为 `with` 子句或 CTE – 公用表表达式）在 Oracle 9.2 中引入。当时它不允许我们定义递归子查询，主要用于将逻辑分解为命名查询——将子查询提取出来，并在主查询中通过名称引用它们。CBO（基于成本的优化器）可以决定是物化提取出的子查询结果，还是将其作为内联视图插入。在前一种情况下，如果命名查询在主查询中被多次引用，可以提高性能；而在后一种情况下，可能会对性能产生负面影响，因为转换引擎不以与内联视图相同的方式处理命名查询。例如，在旧版本中，Oracle
  可以合并内联视图，但不能合并具有完全相同文本的命名查询。


  从 Oracle 11.2 开始，子查询因子化子句允许我们递归执行查询，如果子查询引用了其自身的名称，这在清单 6-1 中进行了示意性展示。


  ```

  with rec as

  (

  anchor_query_text - 锚定成员

  union all

  recursive_query_text – 引用 rec 的递归成员

  )

  select *

  from rec

  清单 6-1

  递归子查询因子化

  ```


  执行时使用以下算法：


  1.  运行锚定成员以获取基础结果集 `Set[0]`。

  2.  使用前一次迭代的结果集 `Set[i-1]` 执行递归成员。

  3.  重复步骤 2，直到返回空结果集。

  4.  返回最终结果集，即 `Set[0] … Set[n]` 的 `union all`。


  清单 6-2 中的查询遍历了上一章（清单 5-1）介绍的 `tree` 表中的树。你可能会注意到结果的顺序与 `connect by` 方法不同。


  ```

  with rec(lvl, id, path) as

  (

  select 1 lvl, id, cast(''->'' || id as varchar2(4000))

  from tree where id_parent in (1, 10)

  union all

  select r.lvl + 1, t.id, r.path || ''->'' || t.id

  from tree t

  join rec r on t.id_parent = r.id

  )

  select lvl,

  rpad('' '', (lvl - 1) * 3, '' '') || id as id,

  path

  from rec;

  LVL ID         PATH

  ---------- ---------- ----------

  1 2          ->2

  1 3          ->3

  1 11         ->11

  2    4       ->3->4

  2    12      ->11->12

  2    13      ->11->13

  3       5    ->3->4->5

  清单 6-2

  使用递归子查询因子化构建层次结构

  ```


  要返回与 `connect by` 相同顺序的结果，你必须指定 `search depth first`——在这种情况下，节点的所有后代将在其层级上的其他节点之前返回——参见清单
  6-3。默认排序是 `search breadth first`，因此先前层级的所有节点在当前层级的节点之前返回。正如将在“遍历层次结构”一节中展示的那样，顺序只影响结果的返回方式，而不影响遍历层次结构的方式。



  '
- '# **递归子查询因式分解**


  递归子查询因式分解没有预定义的伪列，因此计算逻辑需要手动实现。例如，当指定 `search depth first` 时，如果一个节点后面跟着下一层级的节点，则该节点不是叶子节点——这就是计算
  `is_leaf` 列所使用的逻辑。


  路径计算的机制则更有趣一些。路径表达式引用了前一次迭代计算出的路径。这是与 `connect by` 最重要的区别之一，后者只允许引用现有列（而非计算列）。因此，如果目标是计算从当前节点到根节点的路径，而不是从根节点到当前节点的路径，那么可以通过将
  `r.path || ''->'' || t.id` 替换为 `''->'' || t.id || r.path` 来实现。另一方面，使用 `connect by`
  及其内置功能是无法做到这一点的。


  ##### 生成递归序列


  Listing 6-4 展示了如何使用递归子查询因式分解来生成上一章中的递归序列。在第一种情况下，当前值仅依赖于前一个值，而在第二种情况下，它依赖于前一个值和再前一个值。递归子查询因式分解只允许引用前一次迭代的值，因此为了能够使用
  `i-2` 次迭代的值，我们引入了一个辅助列。


  ```

  with t(id, result) as

  (

  select 0 id, 1 result from dual

  union all

  select t.id + 1, round(100 * sin(t.result + t.id))

  from t

  where t.id < 20

  )

  select * from t;

  with t (lvl, result, tmp) as

  (

  select 1, 0, 1 from dual

  union all

  select lvl + 1, tmp, tmp + result

  from t

  where lvl < 15)

  select lvl, result from t;

  Listing 6-4

  生成递归序列

  ```


  如果我们需要使用前几次迭代的值，可以添加多个辅助列，或者使用一个集合列。


  总之，这种方法比 `connect by` 高效得多，因为无需遍历预先生成的值来生成每个新行。


  ##### 使用前几次迭代的值


  如前所述，递归子查询因式分解允许引用前一次迭代计算出的值。此技术可用于使用二分法进行求根。此方法纯粹是为了突出 SQL 语言的能力，实际上没有使用 SQL 完成此任务的必要。


  考虑函数 `y`，它在点 `1` 和 `2` 处的符号不同。


  ```

  create or replace function y(x in number) return number as

  begin return x*x - 2; end;

  ```


  Listing 6-5 展示了如何在范围 `[1; 2]` 内以 `0.01` 的精度查找根。


  ```

  with t(id, x, x0, x1) as

  (

  select 0, 0, 1, 2

  from dual

  union all

  select t.id + 1,

  (t.x0 + t.x1) / 2,

  case

  when sign(y(x0)) = sign(y((t.x0 + t.x1) / 2))

  then (t.x0 + t.x1) / 2

  else x0

  end,

  case

  when sign(y(x1)) = sign(y((t.x0 + t.x1) / 2))

  then (t.x0 + t.x1) / 2

  else x1

  end

  from t

  where abs((t.x0 + t.x1) / 2 - t.x) > 1e-2

  )

  select t.*, (x0+x1)/2 result from t;

  ID          X         X0         X1     RESULT

  ---------- ---------- ---------- ---------- ----------

  0          0          1          2        1.5

  1        1.5          1        1.5       1.25

  2       1.25       1.25        1.5      1.375

  3      1.375      1.375        1.5     1.4375

  4     1.4375      1.375     1.4375    1.40625

  5    1.40625    1.40625     1.4375   1.421875

  6   1.421875    1.40625   1.421875  1.4140625

  Listing 6-5

  使用二分法和递归子查询因式分解子句查找根

  ```


  该算法根据以下规则在每一步划分范围：如果函数在中点的符号与右边界的符号相同，则将右边界移动到中点，否则将左边界移动到中点。重复迭代，直到当前步骤的中点与上一步的中点之差小于
  `0.01`。


  所需精度在第 6 次迭代时得到满足，找到的根是下一次迭代的中点，即 `1.4140625`。


  每次迭代的边界都是使用前一次迭代的值计算的。使用 `connect by` 无法实现此方法。使用术语 “迭代” 而不是 “层级” 是为了强调算法的迭代性质。




  ##### 遍历层级结构


  文档说明 `«subquery_factoring_clause»` 支持递归子查询因子化（递归 `WITH`），并允许查询层级数据。此功能比 `CONNECT
  BY` 更强大，因为它提供了深度优先搜索和广度优先搜索，并支持多个递归分支。听起来 `CONNECT BY` 总是执行深度优先搜索，而递归子查询因子化的遍历算法可以通过在
  `search_clause` 中指定 `depth-first` 或 `breadth-first` 来影响。让我们检查一下这种印象是否正确。


  函数 `stop_at` 在访问特定节点时设置一个标志，如果标志被设置则返回一个非空值。


  ```

  create or replace function stop_at(p_id in number, p_stop in number)

  return number is

  begin

  if p_id = p_stop then

  dbms_application_info.set_client_info(''1'');

  return 1;

  end if;

  for i in (select client_info from v$session where sid = userenv(''sid'')) loop

  return i.client_info;

  end loop;

  end;

  ```


  ```

  exec dbms_application_info.set_client_info('''');

  PL/SQL 过程已成功完成。

  with rec(lvl, id) as

  (

  select 1, id

  from t_two_branches where id_parent is null

  union all

  select r.lvl + 1, t.id

  from t_two_branches t

  join rec r on t.id_parent = r.id

  where stop_at(t.id, 101) is null

  )

  search breadth first by id set ord

  --search depth first by id set ord

  select *

  from rec;

  LVL         ID        ORD

  ---------- ---------- ----------

  1          0          1

  1        100          2

  2          1          3

  exec dbms_application_info.set_client_info('''');

  PL/SQL 过程已成功完成。

  with rec(lvl, id) as

  (

  select 1, id

  from t_two_branches where id_parent is null

  union all

  select r.lvl + 1, t.id

  from t_two_branches t

  join rec r on t.id_parent = r.id

  where stop_at(t.id, 101) is null

  )

  --search breadth first by id set ord

  search depth first by id set ord

  select *

  from rec;

  LVL         ID        ORD

  ---------- ---------- ----------

  1          0          1

  2          1          2

  1        100          3

  代码清单 6-6

  指定广度优先和深度优先搜索

  ```


  Oracle 11.2 和 12.1 在两种情况下都只返回 3 行；然而，预期查询会为深度优先搜索返回第一个分支的所有节点，因为它们都不等于 101。因此看起来，无论我们在
  `search_clause` 中指定何种方法，Oracle 总是执行广度优先搜索，然后相应地对结果排序。另一方面，Oracle 12.2 返回以下结果。


  ```

  LVL         ID        ORD

  ---------- ---------- ----------

  1          0          1

  1        100          2

  2          1          3

  3          2          4

  4          3          5

  5          4          6

  6          5          7

  7          6          8

  8          7          9

  9          8         10

  10          9         11

  11         10         12

  已选择 12 行。

  LVL         ID        ORD

  ---------- ---------- ----------

  1          0          1

  2          1          2

  3          2          3

  4          3          4

  5          4          5

  6          5          6

  7          6          7

  8          7          8

  9          8          9

  10          9         10

  11         10         11

  1        100         12

  已选择 12 行。

  ```


  这意味着它执行的是深度优先搜索，无论 `search_clause` 中指定了什么——在两种情况下都返回了第一个分支的所有节点。


  现在让我们检查 `CONNECT BY` 的结果。


  ```

  select rownum rn, level lvl, id, id_parent

  from t_two_branches

  start with id_parent is null

  connect by prior id = id_parent

  and stop_at(id, 101) is null;

  RN        LVL         ID  ID_PARENT

  ---------- ---------- ---------- ----------

  1          1          0

  2          2          1          0

  3          3          2          1

  4          4          3          2

  5          5          4          3

  6          6          5          4

  7          7          6          5

  8          8          7          6

  9          9          8          7

  10         10          9          8

  11         11         10          9

  12          1        100

  已选择 12 行。

  ```


  这与 12.2 版本上递归子查询因子化的深度优先搜索结果相同。


  总而言之，`CONNECT BY` 总是使用深度优先搜索遍历层级结构，而递归子查询因子化的行为在 12.2 版本中从广度优先搜索变为了深度优先搜索。`search_clause`
  只影响最终顺序，不影响 Oracle 用来遍历层级结构的算法。对于 `CONNECT BY`，通过按 `LEVEL` 对结果排序可以轻松模拟广度优先搜索。


  ##### 再谈循环


  让我们研究如何使用递归子查询因子化和上一章的图（图 5-1）来处理循环。


  ```

  with t(id, id_parent) as

  (

  select * from graph where id_parent = 1

  union all

  select g.id, g.id_parent

  from t

  join graph g on t.id = g.id_parent

  )

  search depth first by id set ord

  cycle id set cycle to 1 default 0

  select * from t;

  ID  ID_PARENT        ORD CYCLE

  ---------- ---------- ---------- ----------

  2          1          1 0

  3          1          2 0

  4          3          3 0

  5          4          4 0

  3          5          5 1

  代码清单 6-7

  通过 ID 检测循环

  ```


  `"cycle id set cycle to 1 default 0"` 指示 Oracle，如果检测到按 `id` 的循环，则将 `"cycle"` 列设置为
  1。Oracle 不会为有问题的行查找子行，但会继续查找其他非循环行。如果一行的某个祖先行在循环列中具有相同的值，则该行被视为形成循环。换句话说，如果一行被标记为循环，则结果集中已存在的一行在指定列中具有相同的值。


  在上面的例子中，`ID = 3` 的行被标记为循环，因为 `ID = 3` 已经存在于结果中。在 `"CONNECT BY"` 子句的情况下，`ID = 5`
  的行被标记为循环，因为它的子行（`ID = 3` 的行）也是它的祖先——参见上一章图 5-1。


  与 `CONNECT BY` 不同，我们可以指定使用哪一列来检测循环。因此，如果我们在 `cycle_clause` 中指定 `id_parent`，结果会略有不同——当我们第二次遇到
  `ID_PARENT = 3` 的节点时，执行停止。


  ```

  with t(id, id_parent) as

  (

  select * from graph where id_parent = 1

  union all

  select g.id, g.id_parent

  from t

  join graph g on t.id = g.id_parent

  )

  search depth first by id set ord

  cycle id_parent set cycle to 1 default 0

  select * from t;

  ID  ID_PARENT        ORD C

  ---------- ---------- ---------- -

  2          1          1 0

  3          1          2 0

  4          3          3 0

  5          4          4 0

  3          5          5 0

  4          3          6 1

  代码清单 6-8

  通过 ID_PARENT 检测循环

  ```


  我们可以注意到，按 `ID` 的循环是在与 `CONNECT BY` 查询和条件 `"nocycle prior id = id_parent and prior
  id_parent is not null"`（参见代码清单 5-8）相同的行中识别的。然而，情况并非总是如此。如果根节点是循环的一部分，结果可能不同。让我们看看当我们从
  `ID = 3` 的节点开始时的结果。




  ##### 限制条件


  递归成员在查询中受到一系列限制；特别是，不能在其中使用 `DISTINCT`、`GROUP BY`、`HAVING`、`CONNECT BY`、聚合函数、`MODEL`
  子句等。有人可能会问，这是当前实现的限制，还是使用如此复杂逻辑时递归执行本身就无意义。我倾向于认为其中一些限制在未来会被解除。另一方面，对于某些限制，即使在当前版本中，我们也可以使用变通方法，但这可能看起来有些笨拙。特别是，我们可以使用分析函数和额外的过滤器来获得聚合结果——尽管这不是在实际任务中应该使用的方式。


  以下演示主要是出于学术目的。所以，假设我们需要构建一个父子层次结构，其中父节点是当前层级上所有 ID 的总和。


  ```

  with t0(id, id_parent, letter) as

  (select 1, 0, ''B'' from dual

  union all select 2, 1, ''D'' from dual

  union all select 3, 1, ''A'' from dual

  union all select 10, 5, ''C'' from dual

  union all select 66, 6, ''X'' from dual),

  t(id, id_parent, sum_id, lvl, str, rn) as

  (select id, id_parent, id, 1, letter, 1 from t0 where id_parent = 0

  union all

  select

  t0.id,

  t0.id_parent,

  sum(t0.id) over (),

  t.lvl + 1,

  listagg(letter, '', '') within group (order by letter) over (),

  rownum

  from t

  join t0 on t.sum_id = t0.id_parent and t.rn = 1)

  select * from t;

  ID  ID_PARENT     SUM_ID      LVL STR              RN

  ------- ---------- ---------- -------- -------- --------

  1          0          1        1 B                 1

  3          1          5        2 A, D              2

  2          1          5        2 A, D              1

  10          5         10        3 C                 1

  ```


  这里使用了分析函数来替代聚合函数，并在连接条件中添加了“`t.rn = 1`”以避免重复，因为分析函数的值对所有行都是相同的，它们没有被分组到每个组一行。


  如果我们只对每一层级的聚合结果感兴趣，那么可以使用如下查询实现：


  ```

  select sum_id, lvl, str from t where rn = 1;

  ```


  在递归成员中使用分析函数在 Oracle 11.2.0.1 中会导致«`ORA-32486: unsupported operation in recursive
  branch of recursive WITH clause`»错误；然而，此问题已在 11.2.0.3 中修复。


  ##### 总结


  “`RECURSIVE WITH`”在标准 SQL:1999 中定义，而“`CONNECT BY`”子句是 Oracle 特有的功能。尽管如此，在所有可能的情况下，使用
  `CONNECT BY` 而非递归子查询因式分解是有意义的，因为它经过更好优化且运行更快。如前所述，在 `CONNECT BY` 查询中无法引用计算出的表达式，而
  `RECURSIVE WITH` 提供了这一功能。因此，如果在遍历层次结构时需要进行任何类似累积的计算，那么递归子查询因式分解可能是最佳选择。


  遍历层次结构并不是递归子查询因式分解的唯一应用。当需要对记录集多次应用相同逻辑时，它可以用于各种任务。需要强调的是，最终结果包含来自所有迭代的记录集，而在当前迭代中只能访问前一次迭代的行。返回所有迭代记录集的要求可能会导致工作区使用量激增和其他开销。因此，如果你不需要所有迭代的记录集而只需要最后一次迭代的，那么使用
  PL/SQL 循环和集合或临时表是更合理的。


  即使递归子查询因式分解和 `CONNECT BY` 具有处理循环的内置功能，在琐碎的情况下使用它们才有意义。对于更复杂的情况，过程化方法更好。无论如何，`CONNECT
  BY` 和递归子查询因式分解处理循环的方式略有不同，因此了解细节可能很重要。




  '
- "# 7. `Model`\n\n可以说，`model` 子句是 SQL 中最强大的功能，这意味着它可以用来解决许多使用 SQL 原本无法解决的任务。这不仅是因为\
  \ `model` 子句极大地扩展了声明式 SQL 的可能性，还因为它为 SQL 在记录集之上引入了迭代计算的能力。另一方面，`model` 子句在可扩展性方面存在一些问题，而且总体上，`model`\
  \ 子句大放异彩的问题类别是相当有限的。在许多情况下，即使可以通过 `model` 子句实现结果，PL/SQL 也往往是更优的选择，不过我们还是从基础开始讲起。\n\
  \n`model` 子句允许你将记录集视为一个多维立方体，通过将列映射到三组：分区、维度和度量。\n\n*   分区指定了逻辑组，`model` 规则会独立地应用于各个分区。指定分区可能有助于显著提升并行执行的能力。\n\
  *   维度列用于定义多维立方体，默认情况下，所有维度的组合唯一标识立方体中的单元格。从另一个角度看，我们可以这么说——用于唯一标识电子表格中的一行或多维数组中的一个值。\n\
  *   度量是多维立方体的值，可以使用 `model` 规则进行计算。通常，度量是数值，但与其他许多多维分析工具不同，Oracle 支持日期、字符串甚至 RAW\
  \ 值作为度量。\n\n分区、维度和度量不仅可以映射到查询的列，也可以指定为表达式。\n\n让我们通过清单 7-1 中的例子来看看它是如何工作的。\n\n```sql\n\
  with t(id, value) as\n(\nselect 1, 3 from dual\nunion all select 2, 9 from dual\n\
  union all select 3, 8 from dual\nunion all select 5, 5 from dual\nunion all select\
  \ 10, 4 from dual\n)\nselect * from t\nmodel\n-- 返回更新后的行\ndimension by (id)\nmeasures\
  \ (value, 0 result)\n-- 规则\n(\nresult[id >= 5] = sum(value)[id <= cv(id)],\nresult[0]\
  \ = value[10] + value[value[1]]\n);\nID      VALUE     RESULT\n---------- ----------\
  \ ----------\n1          3          0\n2          9          0\n3          8   \
  \       0\n5          5         25\n10          4         29\n0                \
  \    12\n清单 7-1\nmodel 子句的基本示例\n```\n\n我们通过 `ID` 列定义了一个维度和两个度量：一个映射到 `value` 列，另一个初始值为零。\n\
  \n规则 `result[id >= 5] = sum(value)[id <= cv(id)]` 仅应用于维度值大于或等于 5 的行，在我们的例子中意味着两行——`ID\
  \ = 5` 和 `ID = 10` 的行。表达式的值是维度值小于或等于当前维度值的所有行的度量值总和。当规则左侧引用了多行时，右侧使用 `cv` 函数来访问当前的维度值。\n\
  \n##### 注意\n\n在 Oracle 10g Release 1 的文档中，你可能还会看到 `currentv` 函数，但在后续版本的文档中它不再出现，尽管看起来它仍然有效。类似地，`model`\
  \ 关键字可以与 `spreadsheet` 关键字互换使用，但后者已不再有文档记载。\n\n规则 `result[0] = value[10] + value[value[1]]`\
  \ 表示维度值为 0 的单元格的度量值是 `ID = 10` 和 `ID = value[1]`（即 3）的度量值之和。请注意，维度值为 0 的单元格在原始记录集中并不存在，而是在\
  \ `model` 子句求值期间被添加的。稍后将展示，这种行为是可以调整的。`value[value[1]]` 是嵌套单元格引用的一个例子。\n\n因此，我们可以将度量视为多维数组的值，而维度是寻址这些值的索引；然而，度量值也可以用于访问单元格。\n\
  \n如果我们取消清单 7-1 中 `return updated rows` 的注释，那么结果将只包含应用了规则的行——即 ID 为 5、10 和 0 的行。默认值是\
  \ `return for all rows`。`rules` 关键字是可选的，除非你想指定迭代次数。\n\n有两种表示法来寻址单元格——`symbolic dimension\
  \ reference`（符号维度引用）和 `positional dimension reference`（位置维度引用）。在符号维度引用的情况下，必须存在一个包含维度名称的谓词；否则，维度引用就是位置的——例如，常量值、表达式甚至是\
  \ `for` 循环。这些表示法之间的差异对于规则的左侧非常重要，左侧标识了将被右侧值更新的单元格。\n\n可以使用关键字 `update`/`upsert all`/`upsert`\
  \ 来指定 Oracle 处理缺失单元格的方式。`Update` 只更新现有单元格，`upsert`（默认值）更新现有单元格，并在位置引用的情况下创建缺失单元格，而\
  \ `upsert all` 在符号引用所使用的维度值存在于原始记录集中时，也会为混合引用创建缺失单元格。让我们通过清单 7-2 所示的具体例子来看看它是如何工作的。\n\
  \n```sql\nwith t(dim1, dim2, value) as\n(\nselect 0, 0, 1 from dual\nunion all select\
  \ 0, 1, 2 from dual\nunion all select 1, 0, 3 from dual\n)\nselect * from t\nmodel\n\
  dimension by (dim1, dim2)\nmeasures (value, cast(null as number) result)\nrules\
  \ upsert all\n(\nresult[0, 0] = -1,\nresult[dim1=1, dim2=0] = -3,\nresult[-1, for\
  \ dim2 in (select count(*) from dual)] = -4,\nresult[-2, dim2=1] = -10,\nresult[-3,\
  \ dim2=-1] = -100,\nresult[-4, -1] = -1000\n)\norder by dim1, dim2;\nDIM1      \
  \ DIM2      VALUE     RESULT\n---------- ---------- ---------- ----------\n-4  \
  \       -1                 -1000\n-2          1                   -10\n-1      \
  \    1                    -4\n0          0          1         -1\n0          1 \
  \         2\n1          0          3         -3\n清单 7-2\nUpsert all 实战\n```\n\n\
  清单 7-2 的查询输出中有 3 行原始行和 3 行创建的行。值为 -4 和 -1000 的单元格被添加，是因为两个维度都使用了位置表示法。值为 -10 的单元格被添加，是因为符号表示法\
  \ `dim2=1` 的值存在于原始记录集中，即使 `dim1` 的位置值不存在。值为 -100 的度量未被添加，是因为符号表示法中用于 `dim2` 的值 -1\
  \ 不存在。单元格 `[0, 1]` 的度量值未知，因为没有为它指定规则。最后，单元格 `[0, 0]` 和 `[dim1=1, dim2=0]` 的结果被计算，因为它们存在于原始记录集中。\n\
  \n如果我们指定 `upsert`，那么度量 -10 将从结果集中排除；如果我们指定 `update`，那么结果值为 -4 和 -1000 的单元格也将消失。\n\
  \n简而言之，当我们只处理现有数据时，使用符号引用；而如果可能需要添加新单元格——例如，在预测或插值的情况下——则可以使用位置引用。当某些维度是固定的而其他维度可以通过添加新成员来扩展时，混合引用是有意义的。\n\
  \n如果我们想引用维度的所有成员，可以在位置引用中使用关键字 `any`，或在符号引用中使用 `is any` 谓词。两种情况下的行为是相同的——规则应用于维度的所有成员，并且不能创建新成员。\n\
  \n当规则的左侧引用多行时，顺序可能非常重要，如清单 7-3 所示。\n\n\n\n代码清单 7-3\n##### 在规则左侧指定顺序\n\n```sql\n\
  with t(id, value) as\n(select rownum, rownum from dual connect by level <= 3)\n\
  select *\nfrom t\nmodel\ndimension by (id)\nmeasures (value, 100 r1, 100 r2)\n(\n\
  r1[any] order by id asc  = nvl(r1[cv(id)-1], 0) + value[cv(id)],\nr2[id is any]\
  \ order by id desc = nvl(r2[cv(id)-1], 0) + value[cv(id)]\n)\norder by id;\nID \
  \     VALUE         R1         R2\n---------- ---------- ---------- ----------\n\
  1          1          1          1\n2          2          3        102\n3      \
  \    3          6        103\n```\n\n当我们指定升序时，结果是一个累积和；而对于降序，结果则完全不同。我们得到了 `102`\
  \ 和 `103`，它们是当前行的 `value` 度量与上一行 `r2` 度量（初始化为 `100`）的和。对于第一行，没有“上一行”，所以结果就是该行的 `value`\
  \ 度量值。\n\n如果规则应用于多行，在左侧指定顺序总是有意义的，因为\n\n*   它能提升性能；\n*   它增加了方案的清晰度；\n*   它有助于避免\
  \ `ORA-32637: Self cyclic rule in sequential order MODEL.`（顺序 MODEL 中的自循环规则）错误。\n\
  \n代码清单 7-4 展示了一个递归度量的例子。Oracle 无法解析这种依赖关系，但如果我们取消 `/*order by id*/` 的注释，结果就能成功计算。试着在不运行查询的情况下猜测一下结果。\n\
  \n代码清单 7-4\n##### 递归度量\n\n```sql\nwith t as\n(select rownum id from dual connect\
  \ by level <= 3)\nselect *\nfrom t\nmodel\ndimension by (id)\nmeasures (id result)\n\
  rules\n(\nresult[any] /*order by id*/ = sum(result)[any]\n);\n(select rownum id\
  \ from dual connect by level <= 3)\n*\nERROR at line 2:\nORA-32637: Self cyclic\
  \ rule in sequential order MODEL\n```\n\n默认情况下，所有规则都按照它们在查询中指定的顺序进行求值。这也可以使用可选的关键字\
  \ `sequential order`（顺序）来显式指定。如果我们指定 `automatic order`（自动顺序），则这种行为可能会改变，它会考虑单元格之间的依赖关系。\n\
  \n代码清单 7-5\n##### 使用自动规则排序的模型\n\n```sql\nwith t as\n(select rownum id from dual\
  \ connect by level <= 3)\nselect *\nfrom t\nmodel\ndimension by (id)\nmeasures (0\
  \ t1, 0 x, 0 t2)\nrules automatic order\n(\nt1[id] = x[cv(id)-1],\nx[id] = cv(id),\n\
  t2[id] = x[cv(id)-1]\n)\norder by id;\nID         T1          X         T2\n----------\
  \ ---------- ---------- ----------\n1                     1\n2          1      \
  \    2          1\n3          2          3          2\n```\n\n如果你在代码清单 7-5 中省略 `automatic\
  \ order`，那么 `t1` 的值将为 `NULL`、`0`、`0`。\n\n正如已经展示的，你可以为同一个度量指定多个规则；此外，即使你为同一个度量和相同的单元格指定多个规则，Oracle\
  \ 也不会报错；然而，这应该避免。例如，我们可以在代码清单 7-5 的查询中添加第四个规则 `t1[id] = x[cv(id)] + t2[cv(id)]`，但之后，规则\
  \ `t1[id] = x[cv(id)-1]` 就完全被覆盖了，应该移除。\n\n无论指定什么顺序，规则都是一个接一个计算的。这意味着首先对左侧引用的所有单元格求值第一条规则，然后对左侧引用的所有单元格求值第二条规则，依此类推。换句话说，规则是按列应用而不是按行应用。\n\
  \n关键字 `automatic order`/`sequential order` 定义了一个查询计划。对于 `sequential order`，你会在计划中看到\
  \ `SQL MODEL ORDERED`；而对于 `automatic order`，根据是否存在循环依赖，它可能是 `SQL MODEL CYCLIC`（循环）或\
  \ `SQL MODEL ACYCLIC`（非循环）。\n\n在简单情况下，循环依赖可能发生在同一个度量的作用域内（当第一个规则中一个单元格引用另一个，而第二个规则中反过来引用），或者发生在不同度量但相同单元格的情况下。坦率地说，我没有遇到过带有循环依赖的有用模型示例，所以我建议你始终以正确的顺序指定规则并使用默认值\
  \ `sequential order`；另外，为每个引用多个单元格的规则指定左侧的顺序。\n\n在 `ORDERED`/`ACYCLIC` 模型的情况下，如果所有规则都使用单个单元格引用，你可能还会在计划中看到\
  \ `FAST`（快速）。\n\n例如，对于这条规则\n\n```sql\nrules automatic order (x[1] = cv(id), x[-1]\
  \ = cv(id))\n```\n\n计划中将出现 `SQL MODEL ACYCLIC FAST`；而对于这条\n\n```sql\nrules automatic\
  \ order (x[for id in (1, -1)] = cv(id))\n```\n\n或这条\n\n```sql\nrules automatic order\
  \ (x[id in (1, -1)] = cv(id))\n```\n\n它将是 `SQL MODEL ACYCLIC`。\n\n第二个和第三个例子之间的逻辑区别在于，第二个使用位置引用，而第三个使用符号引用，因此如果源记录集中缺少某些单元格，结果将会不同。\n\
  \n如果我们为代码清单 7-4 的查询指定 `automatic order`，Oracle 将抛出模型不收敛的异常。\n\n代码清单 7-6\n##### 具有循环规则和自动顺序的模型\n\
  \n```sql\nwith t as\n(select rownum id from dual connect by level <= 3)\nselect\
  \ *\nfrom t\nmodel\ndimension by (id)\nmeasures (id result)\nrules automatic order\n\
  (\nresult[any] /*order by id*/ = sum(result)[any]\n);\nfrom t\n*\nERROR at line\
  \ 4:\nORA-32634: automatic order MODEL evaluation does not converge\n```\n\n根据文档，“收敛被定义为模型的进一步执行不会改变模型中任何单元格值的状态”。根据经验我们可以推断，最多使用三步（四步）来检查收敛性。\n\
  \n代码清单 7-7\n##### 检查收敛性\n\n```sql\nselect * from (select 1 x from dual)\nmodel dimension\
  \ by (x) measures (0 as result, 64 tmp)\nrules automatic order\n(result[1]=ceil(tmp[1]/4),\
  \ tmp[1]=result[1]);\nX     RESULT        TMP\n---------- ---------- ----------\n\
  1          1          1\nselect * from (select 1 x from dual)\nmodel dimension by\
  \ (x) measures (0 as result, 65 tmp)\nrules automatic order\n(result[1]=ceil(tmp[1]/4),\
  \ tmp[1]=result[1]);\nselect * from (select 1 x from dual)\n*\nERROR at line 1:\n\
  ORA-32634: automatic order MODEL evaluation does not converge\n```\n\n在第一种情况下，(`result`,\
  \ `tmp`) 的值依次是 `16`、`4`、`1`，然后又是 `1`——模型收敛了；在第二种情况下，第三步和第四步的值不匹配，这导致了异常。\n\n当没有循环依赖时（例如，参考代码清单\
  \ 7-5 进行验证），`automatic order` 可以将计划操作从 `MODEL ORDERED` 更改为 `MODEL ACYCLIC`，但只需通过以适当的顺序指定规则也可以达到预期的结果。\n\
  \n到目前为止的所有例子中（严格来说，不包括非循环模型的例子），模型规则只被求值一次；然而，可以迭代地对规则进行求值，直到满足终止条件。为了演示迭代计算，让我们使用与代码清单\
  \ 6-5 相同的区间和函数来实现二分法。\n\n\n\n```\nwith t as (select 0 id from dual)\nselect *\n\
  from t\nmodel\ndimension by (id)\nmeasures ((1+2)/2 x, 1 x0, 2 x1)\nrules iterate\
  \ (1e2) until abs(x[0]-previous(x[0])) < 1e-2\n(\nx[iteration_number+1] = x[0],\n\
  x0[iteration_number+1] = case when sign(y(x[0])) =\nsign(y(x0[iteration_number]))\n\
  then x[0]\nelse x0[iteration_number]\nend,\nx1[iteration_number+1] = case when sign(y(x[0]))\
  \ =\nsign(y(x1[iteration_number]))\nthen x[0]\nelse x1[iteration_number]\nend,\n\
  x[0] = (x0[iteration_number+1] + x1[iteration_number+1])/2\n)\norder by id ;\nID\
  \          X         X0         X1\n---------- ---------- ---------- ----------\n\
  0  1.4140625          1          2\n1        1.5          1        1.5\n2      \
  \ 1.25       1.25        1.5\n3      1.375      1.375        1.5\n4     1.4375 \
  \     1.375     1.4375\n5    1.40625    1.40625     1.4375\n6   1.421875    1.40625\
  \   1.421875\n选择了 7 行。\n代码清单 7-8\n使用迭代模型实现二分法\n```\n\n`Iteration_number` 是一个返回整数的函数，代表从\
  \ 0 开始完成模型规则迭代的次数。在上面的例子中，最大可能的迭代次数被限制为 100（此值只能使用常量指定，不能是表达式）；但是，存在一个终止条件 `abs(x[0]-previous(x[0]))\
  \ < 1e-2`，这意味着当前迭代的根与上一次迭代的根之间的绝对差应小于 0.01。因此，计算在第 6 步停止，结果与使用子查询分解子句（subquery factoring\
  \ clause）计算的结果相同——`1.4140625`。`previous` 函数用于引用上一次迭代的值。\n\n无法根据查询计划判断模型是否是迭代的。查询计划操作与非迭代模型相同。此外，启用了运行时执行统计信息时，计划中的统计信息列不会反映迭代次数。代码清单\
  \ 7-8 的查询计划如下所示。\n\n```sql\nselect * from dbms_xplan.display_cursor(format => 'IOSTATS\
  \ LAST');\n\n| Id | Operation                | Name | Starts | E-Rows | A-Rows |\
  \      A-Time      |\n\n|  0 | SELECT STATEMENT         |      |      1 |      \
  \  |      7 | 00:00:00.01 |\n|  1 |  SORT ORDER BY           |      |      1 | \
  \     1 |      7 | 00:00:00.01 |\n|  2 |   SQL MODEL ORDERED FAST |      |     \
  \ 1 |      1 |      7 | 00:00:00.01 |\n|  3 |    FAST DUAL             |      |\
  \      1 |      1 |      1 | 00:00:00.01 |\n```\n\n在 MODEL 子句中，我们可以定义 `引用模型`，用作“查找数组”。\n\
  \n```sql\nwith sales(year, currency, value) as\n(select '2015', 'GBP', 100 from\
  \ dual\nunion all select '2015', 'USD', 200 from dual\nunion all select '2015',\
  \ 'EUR', 300 from dual\nunion all select '2016', 'GBP', 400 from dual\nunion all\
  \ select '2016', 'EUR', 500 from dual)\n, usd_rates(currency, rate) as\n(select\
  \ 'GBP', 1.45 from dual\nunion all select 'USD', 1 from dual\nunion all select 'EUR',\
  \ 1.12 from dual)\nselect *\nfrom sales\nmodel\nreference usd_rates_model on (select\
  \ * from usd_rates)\ndimension by (currency)\nmeasures (rate)\nmain sales_model\n\
  dimension by (year, currency)\nmeasures (value, 0 usd_value)\n(\nusd_value[any,\
  \ any] order by year, currency =\nvalue[cv(year), cv(currency)] * usd_rates_model.rate[cv(currency)]\n\
  )\norder by 1, 2;\nYEAR CUR      VALUE  USD_VALUE\n---- --- ---------- ----------\n\
  2015 EUR        300        336\n2015 GBP        100        145\n2015 USD       \
  \ 200        200\n2016 EUR        500        560\n2016 GBP        400        580\n\
  代码清单 7-9\n使用引用模型\n```\n\n正如本章开头所述，所有维度的组合唯一标识了数据立方体中的一个单元格，但如果你指定了 `unique single\
  \ reference` 关键字，则可以放宽此规则。代码清单 7-10 中的查询，在寻址方式的默认值（唯一维度）下，会抛出异常 `ORA-32638: Non\
  \ unique addressing in MODEL dimensions`。\n\n```sql\nwith t(id, value) as\n(select\
  \ trunc(rownum/2), rownum from dual connect by level <= 3)\nselect *\nfrom t\nmodel\n\
  unique single reference\ndimension by (id)\nmeasures (value, 0 result)\n(result[0]\
  \ = 111)\norder by id;\nID      VALUE     RESULT\n---------- ---------- ----------\n\
  0          1        111\n1          2          0\n1          3          0\n代码清单\
  \ 7-10\n具有唯一单一引用的模型\n```\n\n关于基本功能最后要提到的是空值的处理。对于 MODEL 子句有两个特殊函数 `presentv`/`presentnnv`，其工作方式类似于\
  \ `nvl2`。`Presentv` 检查在 MODEL 子句执行前记录集中是否存在该值，而 `presentnnv` 除此之外还检查该值是否不为空。代码清单\
  \ 7-11 展示了 `presentv`、`presentnnv` 和 `nvl2` 之间的区别。\n\n```sql\nwith t(id) as\n(select\
  \ cast('base' as varchar2(10)) from dual)\nselect *\nfrom t\nmodel\nignore nav\n\
  dimension by (id)\nmeasures (cast(null as varchar2(10)) msr_base,\ncast(null as\
  \ varchar2(10)) msr_calc,\nto_number(null) num)\n(\nmsr_base['calc'] = '1',\nmsr_base['presentv']\
  \ = presentv(msr_base['base'], '+', '-'),\nmsr_base['presentnnv'] = presentnnv(msr_base['base'],\
  \ '+', '-'),\nmsr_base['nvl2'] = nvl2(msr_base['base'], '+', '-'),\nmsr_calc['presentv']\
  \ = presentv(msr_base['calc'], '+', '-'),\nmsr_calc['presentnnv'] = presentnnv(msr_base['calc'],\
  \ '+', '-'),\nmsr_calc['nvl2'] = nvl2(msr_base['calc'], '+', '-'),\nnum[any] = num[-1]\n\
  )\norder by id;\nID         MSR_BASE   MSR_CALC          NUM\n---------- ----------\
  \ ---------- ----------\nbase                                      0\ncalc     \
  \  1                              0\nnvl2       -          +                   0\n\
  presentnnv -          -                   0\npresentv   +          -           \
  \        0\n代码清单 7-11\n比较 presentv、presentnnv 和 nvl2 的结果\n```\n\n当你指定 `ignore nav`\
  \ 时，缺失的数值度量被视为零而非空。在默认行为 `keep nav` 下，`num` 列的所有值都将为空。\n\n分析函数可以在 MODEL 子句中使用以实现高级逻辑。代码清单\
  \ 7-12 展示了一个使用示例。\n\n```sql\nwith t(value) as\n(select column_value from table(sys.odcivarchar2list('A','B','C','D','E')))\n\
  select *\nfrom t\nmodel\nignore nav\ndimension by (row_number() over (order by value)\
  \ id)\nmeasures (value, cast(null as varchar2(4000)) result, count(*) over () num)\n\
  (\nresult[mod(id, 2) = 1] = listagg(value, ', ') within group (order by id) over\
  \ (),\nnum[mod(id, 2) = 1] = count(*) over (order by id desc)\n)\norder by id;\n\
  ID VALUE      RESULT            NUM\n---------- ---------- ---------- ----------\n\
  1 A          A, C, E             3\n2 B                              5\n3 C    \
  \      A, C, E             2\n4 D                              5\n5 E          A,\
  \ C, E             1\n代码清单 7-12\nMODEL 子句中的分析函数\n```\n\n相同的逻辑可以使用聚合函数以如下方式实现：\n\n\
  ```sql\nresult[mod(id, 2) = 1] = listagg(value, ', ') within group (order by null)[mod(id,\
  \ 2) = 1],\nnum[mod(id, 2) = 1] = count(*)[mod(id, 2) = 1 and id >= cv(id)]\n```\n\
  \nMODEL 子句中的聚合函数与常规聚合函数的关键区别在于，MODEL 子句中的聚合函数不需要分组。相反，你需要为聚合函数指定单元格的范围。\n\n与分析函数不同，聚合函数允许灵活地寻址单元格范围。但是分析函数接受度量和维度作为参数，而聚合函数只能应用于度量。此外，当使用分析函数时，无法在规则的左侧指定排序。代码清单\
  \ 7-13 中的规则 1 和规则 3 分别展示了分析函数和聚合函数的局限性。\n```\n\n\n\n## 模型子句中分析函数与聚合函数的局限性\n```sql\n\
  select *\nfrom (select rownum id from dual connect by rownum = cv(id)]\n-- 4)\n\
  r2[any] = sum(value)[id >= cv(id)]\n)\n```\n\n为了探索聚合函数寻址的灵活性，让我们回到前面关于分析函数局限性的示例（清单\
  \ 7-6）。第一个局限性根本不是问题。清单 7-14 展示了如何通过两个坐标计算距离为 5 以内的点数。\n\n##### 清单 7-14\n模型子句中的聚合函数，支持按多维度进行条件寻址\n\
  ```sql\nwith points as\n(select rownum id, rownum * rownum x, mod(rownum, 3) y\n\
  from dual\nconnect by rownum <= 6)\n, t as\n(select p.*,\n-- 基于 x 坐标计算距离为 5 以内的点数\
  \       -- 当涉及多于一个坐标时，无法用分析函数解决       count(*) over(order by x range between 5 preceding\
  \ and 5 following) cnt,       -- 计算到点 (3, 3) 的距离总和       -- 按 id 排序，从无界前行到当前行  \
  \     -- 如果要求计算其他行与当前行之间的距离，而不是到某个常量点的距离，则无法用分析函数解决\nround(sum(sqrt((x - 3) * (x\
  \ - 3) + (y - 3) * (y - 3)))\nover(order by id),\n2) dist\nfrom points p)\nselect\
  \ *\nfrom t\nmodel\ndimension by (x, y)\nmeasures (id, cnt, dist, 0 cnt2)\nrules\n\
  (\ncnt2[any, any] = count(*)[x between cv(x) - 5 and cv(x) + 5,\ny between cv(y)\
  \ - 1 and cv(y) + 1]\n)\norder by id;\n```\n\n然而，对于第二个局限性，没有直接的解决方案，因为无法在聚合函数的表达式中引用当前行的度量值。作为一种变通方法，我们可以使用迭代模型，并执行与行数一样多的迭代，以维护两个包含当前行坐标的辅助度量值。思路如清单\
  \ 7-15 所示，但这种方法看起来有些笨拙，且性能不佳。\n\n##### 清单 7-15\n使用迭代模型作为聚合函数局限性的变通方案\n```sql\nwith\
  \ points as\n(select rownum id, rownum * rownum x, mod(rownum, 3) y\nfrom dual\n\
  connect by rownum <= 6)\nselect *\nfrom points\nmodel\ndimension by (id)\nmeasures\
  \ (id i, x, y, 0 x_cur, 0 y_cur, 0 dist2)\nrules iterate (1e6) until i[iteration_number+2]\
  \ is null\n(\nx_cur[any] = x[iteration_number + 1],\ny_cur[any] = y[iteration_number\
  \ + 1],\ndist2[iteration_number + 1] =\nround(sum(sqrt((x - x_cur) * (x - x_cur)\
  \ +\n(y - y_cur) * (y - y_cur)))[id <= cv(id)], 2)\n)\norder by id;\n```\n\n如你所见，辅助度量\
  \ `x_cur` 和 `y_cur` 必须在所有迭代中为所有行初始化。为了用当前行的值 `(x, y)` 填充 `(x_cur, y_cur)`，我们使用了\
  \ `[iteration_number + 1]`，因为行编号从 1 开始，而 `interation_number` 从 0 开始。度量 `dist2` 在每次迭代中仅针对单行进行计算。\n\
  \n鉴于有时聚合函数和分析函数在模型子句中可以互换，我们将在性能分析期间进一步讨论这个问题。\n\n### 使用模型子句生成递归序列\n\n让我们继续讨论具体任务。清单\
  \ 7-16 展示了如何使用模型来生成前面章节讨论的递归序列。\n\n```sql\nselect *\nfrom dual\nmodel\ndimension\
  \ by (0 id)\nmeasures (1 result)\nrules\n(\nresult[for id from 1 to 20 increment\
  \ 1] =\nround(100 * sin(result[cv(id)-1] + cv(id) - 1))\n);\nselect *\nfrom (select\
  \ rownum lvl, rownum - 1 result\nfrom dual connect by level <= 2)\nmodel\nignore\
  \ nav\ndimension by (lvl)\nmeasures (result)\nrules\n(\nresult[for lvl from 3 to\
  \ 15 increment 1] =\nresult[cv(lvl)-1] + result[cv(lvl)-2]\n);\n```\n\n模型允许我们使用先前阶段计算的值，类似于递归子查询因式分解。从逻辑角度看，两者之间的关键区别在于，模型按列应用规则和计算值（度量），而不是按行；而递归子查询因式分解在处理下一行之前，会为当前行计算所有表达式。更多细节可参见第\
  \ 12 章的测验“篮子”。\n\n此外，与递归子查询因式分解不同，模型提供了一种简单的方法来引用任何其他行的度量值；因此，例如在生成斐波那契数列时，无需使用辅助列。递归子查询因式分解的可见性仅限于上一次迭代的记录集。\n\
  \n尽管递归子查询因式分解和模型可用于解决相同的任务，但它们的能力完全不同，且设计目的不同，因此使用相同的术语并不十分恰当。谈及递归子查询因式分解时，我们可以说“引用先前层级计算的值”或“引用父记录的计算值”，而对于模型子句，更准确的说法是“引用前一个维度成员的度量值”。\n\
  \n递归子查询因式分解旨在能够多次应用相同逻辑，并特别用于处理层次数据；而模型子句则旨在进行类似电子表格的计算，并处理多维数据。\n\n### 模型子句的使用场景\n\
  \n总结使用场景，在以下情况下使用模型是合理的：\n\n1.  类似电子表格的计算。简而言之，这意味着根据其他单元格或其范围的值来计算单元格。简单的表达式通常可以重写以使用其他\
  \ SQL 功能：分析函数和/或额外的连接。例如，如果我们有月度销售信息，并想计算与第一个月的比例，我们可以使用模型：\n    ```sql\n    with\
  \ t as\n    (select rownum id, 100 + rownum - 1 value from dual connect by level\
  \ <= 12)\n    select *\n    from t\n    model\n    dimension by (id)\n    measures\
  \ (value, 0 ratio)\n    rules\n    (ratio[any] order by id = value[cv(id)]/value[1])\n\
  \    ```\n    同时，使用分析函数也可以轻松计算：\n    ```sql\n    select id, value, value / first_value(value)\
  \ over(order by id) ratio from t\n    ```\n    这是一个更综合的例子：计算当前行值与 `ref_id` 所引用行值的比例。\n\
  \    ```sql\n    exec dbms_random.seed(100);\n    create table t as\n    select\
  \ rownum id,\n    100 + rownum - 1 value,\n    trunc(dbms_random.value(1, 10 + 1))\
  \ ref_id\n    from dual\n    connect by level <= 10;\n    ```\n    模型解决方案如下：\n \
  \   ```sql\n    select *\n    from t\n    model\n    dimension by (id)\n    measures\
  \ (value, ref_id, 0 ratio)\n    rules\n    (\n    ratio[any] order by id =\n   \
  \ round(value[cv(id)] / value[ref_id[cv(id)]], 3)\n    );\n    ```\n    ```\n  \
  \  ID      VALUE     REF_ID      RATIO\n    ---------- ---------- ---------- ----------\n\
  \    1        100          6       .952\n    2        101          7       .953\n\
  \    3        102          7       .962\n    4        103          8       .963\n\
  \    5        104          3      1.02\n    6        105          5      1.01\n\
  \    7        106         10       .972\n    8        107          4      1.039\n\
  \    9        108          2      1.069\n    10        109          7      1.028\n\
  \    ```\n    同样的结果也可以通过自连接（或使用清单 3-3 中的方法的分析函数）实现：\n    ```sql\n    select t1.*,\
  \ round(t1.value / t2.value, 3) ratio\n    from t t1\n    join t t2\n    on t1.ref_id\
  \ = t2.id\n    order by t1.id\n    ```\n\n\n\n## 模型子句的使用场景\n\n然而，有时更复杂的表达式可能需要多次连接以及大量使用分析函数、聚合函数和其他\
  \ SQL 功能，而使用模型子句和紧凑规则可以完成同样的事情。值得一提的是，模型子句存在一些可扩展性问题，因此，即使解决方案简洁明了，在真实数据量上测试它总是有意义的，并且如果模型扩展性不足，则切换到包括`PL/SQL`在内的替代方法。另一方面，用于类电子表格计算的客户端应用程序，如`Excel`，并非设计用于处理大数据量。例如，`Excel\
  \ 2016`的最大行数是 100 万，而模型可以轻松处理这个量级的数据而不会出现明显的性能下降，更不用说结果可以在服务器端计算，无需将数据提取到客户端。\n\n\
  2. 计算使用纯 SQL 无法实现的复杂结果。\n\n有时，Oracle 账户用于报告系统时只有`select`权限，因此无法为结果创建表函数和类型。当然，这可以在另一个模式中创建并授予报告系统用户权限，但模型减少了真正必要的情况。模型也可能是为物化视图实现复杂逻辑的好方法——尽管模型计算可能开销较大，但这对于终端用户来说可能是察觉不到的。\n\
  \n通常，人们会在并非最佳选项时使用模型子句：\n*   生成序列，其中当前值可能基于初始值推导——例如，日期范围。在这种情况下，使用`connect by`生成会更快。\n\
  *   各种字符数据处理，从将字符串拆分为标记到计算字符串中的表达式。要拆分字符串，可以使用`connect by`；对于更复杂的操作，最好将逻辑封装在`PL/SQL`甚至\
  \ C 函数中。\n*   在数据中查找特定序列——例如，没有间隔的整数子序列。更好的工具是模式匹配或分析函数。\n*   计算总计和小计。`group by\
  \ rollup/grouping sets/cube`就是为此目的设计的。\n*   转置。这是`pivot/unpivot`操作符的工作。\n*   所有其他可以避免使用它的情况。☺\n\
  \n##### 性能简要分析\n\n模型子句的具体特点在于，用于建模的完整记录集被加载到内存中。结果列的数量是固定且预定义的（等于分区数+维度数+度量数），但行数是变化的，可能多于、少于或等于初始记录集中的行数。\n\
  \n为了分析可扩展性，让我们测量生成递归序列的不同方法的性能，该序列使用`sin`函数，最初在关于`connect by`（第 5 章）的章节中介绍。这些方法包括`PL/SQL`函数、递归子查询分解和模型。你可以在相应的章节中找到所有代码。\n\
  \n对于`PL/SQL`函数，我们将计算行数递增时所有元素的和：1e5, 2e5, 3e5, 4e5, 5e5, 1e6。函数`f`的递归和非递归实现性能大致相同，因此你可以使用其中任何一种进行重现。\n\
  \n```\nselect sum(value(t)) result from table(f(1e5)) t;\n```\n\n类似地，我们将测量递归子查询分解和模型方法的耗时，以代替`PL/SQL`函数。\n\
  \n使用了聚合函数来获取单行结果并避免获取；我们的主要目标是生成序列。为了完整起见，让我们也考虑一个迭代模型，它不生成序列而是计算元素之和。\n\n```\n\
  select cumul\nfrom dual\nmodel\ndimension by (0 id)\nmeasures (1 result, 1 cumul)\n\
  rules iterate (1e5)\n(\nresult[0] =  round(100 * sin(result[0] + iteration_number)),\n\
  cumul[0] = cumul[0] + result[0]\n);\n```\n\n对于所有方法，大部分时间都花在 CPU 上，执行统计信息如表 7-1 所示。\n\
  \n**表 7-1**\n\n序列生成的执行统计\n\n| 行数 | PL/SQL | 递归 WITH | 模型 | 迭代模型 |\n| --- | --- |\
  \ --- | --- | --- |\n| `1e5` | `01.18` | `02.29` | `03.22` | `01.86` |\n| `2e5`\
  \ | `02.43` | `04.52` | `12.68` | `03.35` |\n| `3e5` | `03.47` | `07.58` | `27.93`\
  \ | `05.00` |\n| `4e5` | `04.70` | `10.31` | `53.45` | `06.90` |\n| `5e5` | `05.82`\
  \ | `12.85` | `01:18.57` | `08.58` |\n| `1e6` | `11.80` | `27.32` | `05:01.87` |\
  \ `17.00` |\n\n此外，生成过程中消耗了大量的`PGA`内存；另一方面，只有递归`WITH`使用了临时表空间（这可以通过手动内存管理来避免，正如本节后面将要展示的——因此递归`WITH`的性能可能会稍好一些）。\n\
  \n对于模型和递归子查询分解，内存类别（`v$process_memory.category`）是`SQL`，而对于`PL/SQL`函数则是`PL/SQL`，这是相当符合预期的。你可以深入查看`v$sql_workarea.operation_type`，对于模型子句将是`SPREADSHEET`，对于递归`WITH`将是`CONNECT-BY\
  \ (SORT)`。\n\n`v$active_session_history.pga_allocated`和`v$active_session_history.temp_space_allocated`是跟踪内存使用动态增长的良好来源。如果需要更详细的分析，你可能需要使用`v$process_memory_detail`性能视图。\n\
  \n如你所见，模型表现出较差的性能，并且耗时随行数增长呈非线性增长。迭代模型看起来好得多，但严格来说它没有解决原始任务——生成序列；它只计算了元素之和。另一方面，通常模型是在现有数据之上使用，而不是生成新数据，但无论如何，大数据量仍然是一个问题。\n\
  \n对于这个任务，递归`WITH`的性能和可扩展性远优于模型子句，但对于许多其他任务，模型可能是更好的方法。如前所述，递归`WITH`在每次迭代时添加一个新的记录集，但对于模型来说这不是必需的，因此如果你需要对某个记录集迭代应用一组转换，那么模型可能是更好的方法。\n\
  \n\n# SQL 模型子句性能分析\n\n用于生成递归序列的模型子句的查询计划很简单——迭代模型使用`SQL MODEL ORDERED FAST`，非迭代模型使用`SQL\
  \ MODEL ORDERED`。\n\n清单 7-17 展示了一个包含模型子句的查询，由于其中的分析/聚合函数，该查询需要一些额外的操作。让我们分别针对 1e6\
  \ 行和 1.2e6 行（增加 20%）执行带有分析函数的查询，并对聚合函数执行相同操作。此查询中根本不需要模型，它纯粹用于性能分析。\n\n```\nselect\
  \ *\nfrom\n(select *\nfrom (select rownum id from dual connect by rownum = cv(id))]\n\
  )\norder by id\n)\nwhere rownum <= 3;\nID      VALUE           RESULT\n----------\
  \ ---------- ----------------\n1          1     500000500000\n2          2     500000499999\n\
  3          3     500000499997\n清单 7-17\n模型子句中的分析/聚合函数\n```\n\n对于 1e6 行，两种情况的执行时间均为\
  \ 4 秒——这并不令人惊讶，因为聚合函数和分析函数的计划是相同的。但当我们将行数增加 20%时，耗时跃升至 8 秒。\n\n```\n| Id  | Operation\
  \                          | Name |\n|   0 | SELECT STATEMENT                  \
  \ |      |\n|   1 |  COUNT STOPKEY                     |      |\n|   2 |   VIEW\
  \                             |      |\n|   3 |    SORT ORDER BY STOPKEY       \
  \    |      |\n|   4 |     SQL MODEL ORDERED              |      |\n|   5 |    \
  \  VIEW                          |      |\n|   6 |       COUNT                 \
  \       |      |\n|   7 |        CONNECT BY WITHOUT FILTERING|      |\n|   8 | \
  \        FAST DUAL                  |      |\n|   9 |      WINDOW (IN SQL MODEL)\
  \ SORT    |      |\n清单 7-18\n包含分析/聚合函数的模型执行时间\n```\n\n当增加行数时，查询执行没有足够的内存，因此 Oracle\
  \ 开始使用临时表空间——这是非线性耗时增长的原因。您可以通过为相应的`SQL_ID`运行以下查询来验证这一点。\n\n```\nselect pga_allocated\
  \ / (1024 * 1024) pga_mb,\ntemp_space_allocated / (1024 * 1024) temp_mb,\nash.*\n\
  from v$active_session_history ash\nwhere sql_id = ''\norder by sample_time desc\n\
  ```\n\n让我们切换到手动内存管理，并将排序内存增加到最大可能值——2GB。\n\n```\nalter session set workarea_size_policy\
  \ = manual;\nalter session set sort_area_size = 2147483647;\n```\n\n此更改后的耗时为 5 秒，这意味着与记录数呈线性依赖关系。不过，最好让\
  \ Oracle 管理内存，仅针对特定查询并在有充分理由时才使用手动内存管理。\n\n最后要提到的是，在没有模型且使用默认内存设置的情况下，1.2e6 行的执行时间仅为\
  \ 2 秒。我要重申，当所需结果可以在不使用模型子句的情况下实现时，应避免使用它。\n\n```\nselect *\nfrom (select t.*, sum(id)\
  \ over(order by id desc) result\nfrom (select rownum id from dual\nconnect by rownum\
  \ <= 1.2e6) t\norder by id)\nwhere rownum <= 3;\n```\n\n关于性能的观察总结如下：\n\n*   模型子句导致密集的内存使用。总会有一个“SPREADSHEET”工作区操作，但对于核心复杂逻辑，可能会有“WINDOW\
  \ (SORT)”等其他操作。\n*   规则评估和操作大型工作区可能需要大量 CPU 资源。\n*   当然，带有运行时执行统计信息的查询计划是宝贵的信息来源——它显示了哪个操作最消耗资源以及每个操作的内存使用情况。\n\
  *   在某些情况下，分区模型和并行执行可以显著提高性能——这将在下一节中进一步研究。\n\n## 模型并行执行\n\n为了分析模型并行执行，让我们考虑以下任务：对于每个分区，我们需要计算一个运行总和，当达到某个预定义限制时，该总和会清零。\n\
  \n清单 7-19 展示了计算限制为 3e3（3000）的运行总和的模型查询。\n\n```\ncreate table t (part int, id int,\
  \ value int);\nbegin\nfor i in 1 .. 80 loop\ndbms_random.seed(i);\ninsert into t\n\
  select i, rownum id, trunc(dbms_random.value(1, 1000 + 1)) value\nfrom dual\nconnect\
  \ by rownum  3e3 then value[cv(id)]\nelse x[cv(id)-1] + value[cv(id)]\nend,\nsid[any]\
  \ order by id = userenv('sid')\n)\n清单 7-19\n用于条件运行总和计算的模型子句\n```\n\n相同的逻辑可以使用并行管道函数实现。弱`REF\
  \ CURSOR`参数只允许按`ANY`分区，因此我们创建了强`REF CURSOR`以按`hash(part)`分区。`part`列也在`order by`子句中指定，因为不能保证每个从属进程只有一个分区。此外，表函数要求结果使用\
  \ SQL 集合类型。\n\n```\ncreate or replace type to_3int as object (part int, x int, sid\
  \ int)\n/\ncreate or replace type tt_3int as table of to_3int\n/\ncreate or replace\
  \ package pkg as\ntype refcur_t is ref cursor return t%rowtype;\nend;\n/\ncreate\
  \ or replace function f_running(p in pkg.refcur_t) return tt_3int\npipelined\nparallel_enable(partition\
  \ p by hash(part)) order p by(part, id) is\nrec  p%rowtype ;\nprev p%rowtype;\n\
  x    int := 0;\nbegin\nloop\nfetch p\ninto rec;\nexit when p%notfound;\nif rec.id\
  \ = 1 then\nx := rec.value;\nelsif x > 3e3 then\nx := rec.value;\nelse\nx := x +\
  \ rec.value;\nend if;\npipe row(to_3int(rec.part, x, userenv('sid')));\nprev :=\
  \ rec;\nend loop;\nreturn;\nend;\n/\n清单 7-20\n用于并行处理的管道函数\n```\n\n性能测试在具有 80 个 CPU\
  \ 内核的服务器上完成，以详细分析并行执行对性能的影响。使用不同的 DOP（并行度）执行以下查询，以测量 PL/SQL 方法的耗时。\n\n```\nselect\
  \ count(distinct sid) c, sum(x*part) s\nfrom table(f_running(cursor(select /*+ parallel(2)\
  \ */ * from t)));\n```\n\n类似地，使用包含模型子句的内联视图代替表运算符来测试模型方法。\n\n表 7-2 展示了两种方法的执行统计数据以及耗时比。如您所见，即使对于串行执行，模型子句也比\
  \ PL/SQL 方法更快；此外，它更有效地利用了并行执行。对于 DOP 20，模型运行速度比 PL/SQL 函数快 3 倍以上。将 DOP 增加到 40 会对\
  \ PL/SQL 的性能产生负面影响，因为管理并行执行的开销成本抑制了收益。\n\n表 7-2\n并行执行统计\n\n| DOP | 实际 DOP | PL/SQL\
  \ | 模型 | 比率 |\n| --- | --- | --- | --- | --- |\n| `串行` | `1` | `01:47.37` | `53.34`\
  \ | `2.01` |\n| `4` | `4` | `36.59` | `15.83` | `2.31` |\n| `10` | `10` | `19.78`\
  \ | `08.72` | `2.27` |\n| `20` | `19` | `16.22` | `05.24` | `3.1` |\n| `40` | `34`\
  \ | `18.72` | `04.35` | `4.3` |\n\n需要注意的是，用于序列生成的 PL/SQL 方法更好，而对于此任务，模型更快。这是因为我们在第一种情况下使用了数字集合，但在第二种情况下使用了对象集合。Oracle\
  \ 需要额外的 CPU 资源来为每一行构造对象。此外，序列生成需要`sin`和`round`函数，而条件运行总和的逻辑中只使用了原始操作。逻辑越复杂，为每行构造对象的影响就越小。\n\
  \n\n并行处理的另一个关键细节是分区。当我们为模型子句指定分区时，其中的数据将完全隔离，并且规则会针对每个分区独立评估；但在管道函数的情况下，无法保证每个从属进程只有一个分区，因此在实现逻辑时需要牢记这一点。\n\
  \n还需要提及最后一个细节——两种方法的实际并行度（DOP）是相同的，这并不奇怪，因为 DOP 是在 SQL 查询中指定的，最终由 SQL 引擎负责将数据分发到各个从属会话。\n\
  \n##### 总结\n\n模型子句是 Oracle SQL 最强大的功能。理论上，迭代模型允许我们实现任意复杂度的算法（参见第 10 章“图灵完备性”）。另一方面，模型子句可能导致过度的\
  \ CPU 和内存消耗，并且对于某些其他方法（包括 PL/SQL）根据数据量表现出线性可扩展性的任务，它并不具备线性可扩展性。然而，可以利用并行执行来处理分区模型，这使得\
  \ SQL 建模成为某些任务的完美工具。\n\n对于类似电子表格的计算，使用模型是有意义的，它允许实现复杂的规则，同时避免多次连接。同样，当希望避免使用过程化方法时，特别是在模型用于物化视图且响应时间不是关键因素的情况下，模型也可能是实现复杂逻辑的合适工具。\n\
  \n# 8. 行模式匹配：match_recognize\n\n查找和分析数据中模式的能力一直被广泛需要，但在 Oracle 12c 之前，SQL 无法实现。\n\
  \n这在许多业务领域都是必需的，例如安全应用和欺诈检测，或者金融应用和定价分析。SQL 中的原生模式匹配功能有助于避免在客户端或中间件应用服务器中构建复杂的定制解决方案，而是使用易于共享的\
  \ SQL 查询。\n\n这是 Oracle 特有的 SQL 功能中的最后一项，但在深入探讨之前，让我们简要回顾一下 SQL 的演变。\n\n基本 SQL——实现了关系代数的五种主要操作——只允许行级可见性。\n\
  \n聚合函数引入了组级可见性，但组是由特定表达式定义的，该表达式对于组中的所有行必须相同，并且每行只属于一个组。\n\n分析函数允许窗口级可见性。窗口定义对所有行是相同的；然而，`windowing_clause`增加了一些灵活性，使得当前行的属性可以通过范围/行指定为偏移值。\n\
  \n模式匹配是下一个级别的灵活性；为了匹配记录集中的模式，它被视为一个行序列——其思想类似于正则表达式，其中输入字符串被视为字符序列。每行可以属于零个、一个或多个匹配。\n\
  \n让我们重用清单 3-4 中的表`atm`。我们可以使用下面的查询获取金额等于 5 的所有行。\n\n```\nselect * from atm where\
  \ amount = 5\n```\n\n同样的结果可以通过`match_recognize`实现。\n\n```\nselect *\nfrom atm\n\
  match_recognize\n( all rows per match\npattern (five)\ndefine\nfive as five.amount\
  \ = 5\n) mr\norder by ts;\nTS            AMOUNT\n--------- ----------\n03-JUL-16\
  \          5\n03-JUL-16          5\n```\n\n显然，模式匹配并非为此类任务设计，例如，如果`amount`列上有索引，Oracle\
  \ 将不会使用它（尽管如果你同时指定模式匹配和 where 子句，则可以使用索引）。查询计划如下所示（`FINITE AUTOMATON`在`dbms_xplan`的输出中被截断）。\n\
  \n```\n| Id  | Operation                                        | Name |\n|   0\
  \ | SELECT STATEMENT                                 |      |\n|   1 |  SORT ORDER\
  \ BY                                   |      |\n|   2 |   VIEW                \
  \                           |      |\n|   3 |    MATCH RECOGNIZE BUFFER DETERMINISTIC\
  \ FINITE AU|      |\n|   4 |     TABLE ACCESS FULL                            |\
  \ ATM  |\n```\n\n让我们看一个稍微复杂的例子。\n\n```\nalter session set NLS_DATE_FORMAT = 'mi';\n\
  Session altered.\nselect *\nfrom atm\nmatch_recognize\n( order by ts\nmeasures\n\
  strt.amount start_amount,\nfinal last(up.amount) end_amount,\nrunning count(*) as\
  \ cnt,\nmatch_number() as match,\nclassifier() as cls\nall rows per match\nafter\
  \ match skip past last row\npattern (strt down* up*)\ndefine\ndown as down.amount\
  \  prev(up.amount)\n) mr\norder by ts;\nTS START_AMOUNT END_AMOUNT        CNT  \
  \    MATCH CLS            AMOUNT\n-- ------------ ---------- ---------- ----------\
  \ ---------- ----------\n01           85        100          1          1 STRT \
  \              85\n03           85        100          2          1 DOWN       \
  \        15\n05           85        100          3          1 UP               \
  \ 100\n07           40         85          1          2 STRT               40\n\
  09           40         85          2          2 DOWN               30\n11     \
  \      40         85          3          2 UP                 50\n13           40\
  \         85          4          2 UP                 85\n15           60      \
  \  100          1          3 STRT               60\n17           60        100 \
  \         2          3 DOWN                5\n19           60        100       \
  \   3          3 UP                100\n21           25         80          1  \
  \        4 STRT               25\n23           25         80          2        \
  \  4 UP                 30\n25           25         80          3          4 UP\
  \                 80\n27            5         35          1          5 STRT    \
  \            5\n29            5         35          2          5 UP            \
  \     35\n```\n\n这里定义的模式是一个标记为`strt`的行，零个或多个标记为`down`的行，以及零个或多个标记为`up`的行。实际上，`strt`、`down`和`up`被称为模式变量。当金额小于前一行的金额时，一行被标记为`down`；相应地，当金额大于前一行的金额时，标记为`up`。如果我们将`amount`和`ts`之间的关系可视化，那么每个匹配将是一个\
  \ V 形，或者如果缺少另一部分，则只是其上升或下降部分。\n\n`all rows per match`意味着匹配到的每一行都包含在模式匹配输出中。如果指定`one\
  \ row per match`，那么对于找到的每个模式匹配，结果集中将有一行。在第一种情况下，输出生成方式类似于分析函数，而在第二种情况下，则类似于聚合函数。\n\
  \n模式匹配有两个特定的内置度量。`match_number`从 1 开始对匹配进行编号，并为特定匹配中的所有行分配相同的编号。`classifier`显示哪一行映射到了哪个模式变量。除了`match_number`函数之外，所有度量都在给定匹配的范围内进行评估。\n\
  \n注意\n\n你可以使用`subset`关键字定义模式变量的联合，以便在度量中一起引用它们。例如，`SUBSET STDN = (STRT, DOWN)`。这些分组也可以在`define`子句中引用，以指定其他模式变量的定义。用法示例见清单\
  \ 8-3。\n\n表达式`running count(*)`用于在匹配内对行进行编号。`final count(*)`可用于显示匹配中的总行数。类似地，表达式`final\
  \ last(up.amount)`意味着对于匹配中的所有行，我们显示映射到`up`模式变量的最后一个（最大的）值。\n\n\n##### Oracle 模式匹配与分析函数\n\
  \n`after match skip past last row` 表示每当一次匹配完成时，新的搜索将从匹配中最后一行之后的一行重新开始。可以改变此行为，使得新搜索从已完成匹配的某一行开始；因此，行可能属于多个匹配。新搜索不能从与前一次搜索相同的行开始；否则\
  \ Oracle 会抛出异常 `ORA-62517: Next match starts at the same point the last match started`。在边界情况下，新搜索可以从当前匹配的第二行开始。\n\
  \n可以使用分析函数轻松计算相同的匹配组和分类器，如清单 8-1 所示。\n\n```sql\nselect ts,\n       amount,\n   \
  \    count(decode(cls, 'STRT', 1)) over(order by ts) match,\n       cls\nfrom (select\
  \ ts,\n             amount,\n             case\n                 when lag(cls) over(order\
  \ by ts) = 'UP' and cls <> 'UP' then\n                      'STRT'\n           \
  \      else\n                     cls\n             end cls\n      from (select\
  \ atm.*,\n                   nvl(case\n                          when amount > lag(amount)\
  \ over(order by ts) then\n                               'UP'\n                \
  \       end,\n                       'STRT') cls\n            from atm))\norder\
  \ by ts;\n-- 清单 8-1\n-- 使用分析函数实现模式匹配逻辑\n```\n\n如果我们更改模式，使得只匹配完整的 V 形（包含上升和下降分支）-\
  \ `strt down+ up+`，那么一些行将不属于任何匹配模式。如果我们希望将它们作为结果的一部分查看，则可以在模式中指定替代项：`strt down+\
  \ up+|dummy+?`，或者使用选项 `with unmatched rows`，即 `all rows per match with unmatched\
  \ rows`。\n\n```sql\nselect *\nfrom atm\nmatch_recognize\n( order by ts\n  measures\n\
  \       strt.amount start_amount,\n       final last(up.amount) end_amount,\n  \
  \     running count(*) as cnt,\n       match_number() as match,\n       classifier()\
  \ as cls\n  all rows per match\n  after match skip past last row\n  pattern (strt\
  \ down+ up+|dummy+?)\n  define\n       down as down.amount < prev(up.amount)\n)\
  \ mr\norder by ts;\n-- TS 起始金额 结束金额        CNT      匹配 CLS          金额\n-- -- ------------\
  \ ---------- ---------- ---------- ---------- --------\n-- 01           85     \
  \   100          1          1 STRT             85\n-- 03           85        100\
  \          2          1 DOWN             15\n-- 05           85        100     \
  \     3          1 UP              100\n-- 07           40         85          1\
  \          2 STRT             40\n-- 09           40         85          2     \
  \     2 DOWN             30\n-- 11           40         85          3          2\
  \ UP               50\n-- 13           40         85          4          2 UP  \
  \             85\n-- 15           60        100          1          3 STRT     \
  \        60\n-- 17           60        100          2          3 DOWN          \
  \    5\n-- 19           60        100          3          3 UP              100\n\
  -- 21                                  1          4 DUMMY            25\n-- 23 \
  \                                 1          5 DUMMY            30\n-- 25      \
  \     80         35          1          6 STRT             80\n-- 27           80\
  \         35          2          6 DOWN              5\n-- 29           80     \
  \    35          3          6 UP               35\n```\n\n我相信无需赘言，这个查询也可以改写为使用分析函数。\n\
  \n清单 8-2 显示了标记序列中斐波那契数的查询。\n\n```sql\nwith t as (select rownum id from dual connect\
  \ by rownum <= 55)\nselect * from t\nmatch_recognize\n( order by id\n  all rows\
  \ per match\n  pattern ((fib|{-dummy-})+)\n  define fib as (id = 1 or id = 2 or\
  \ id = last(fib.id, 1) + last(fib.id, 2)));\n-- ID\n-- 清单 8-2\n-- 使用模式匹配标记斐波那契数\n\
  ```\n\n这个查询不能用分析函数重写，因为当我们标记一行时，需要考虑到目前为止已标记的行。\n\n这里还有几个更有趣的细节需要提及。像 `define` 子句中的\
  \ `last` 这样的函数在匹配组的范围内工作。这意味着，如果我们想访问匹配变量的两个前值，那么整个序列必须是一次匹配。为了避免中断匹配，我们在模式中使用了替代项。语法\
  \ `{--}` 意味着用此标签标记的行将不会成为结果的一部分，即使它们是匹配的一部分。最后，关键的一点是，行是预先生成的，模式匹配只是帮助标记了所需的行。因此，模式匹配不能像`model`或递归子查询因子化那样根据某些规则生成数据；然而，它可以用于填充数据缺口。\n\
  \n假设我们有一个包含区间的表，目标是添加缺失的区间。对于下面的数据，缺失的区间是 `(5, 6)`、`(15, 19)` 和 `(26, 29)`。\n\n\
  ```sql\nwith t(s, e) as (\n    select 1, 4 from dual\n    union all select 7, 8\
  \ from dual\n    union all select 9, 10 from dual\n    union all select 11, 14 from\
  \ dual\n    union all select 20, 25 from dual\n    union all select 30, 40 from\
  \ dual)\n```\n\n清单 8-3 显示了如何使用模式匹配添加缺失区间。`X` 模式变量用于标记匹配中的连续区间，`Y` 标记如果当前区间与前一个区间之间有间隙的区间。我们从\
  \ `Y` 开始搜索下一个匹配，因此带有前置间隙的区间在结果中出现两次——被标记为 `Y` 和 `STRT`。对于那些标记为 `Y` 的行，我们用它们来计算缺失区间的起点和终点，而标记为\
  \ `Y` 的行数等于缺失区间的数量。为了正确处理最后一行，我们添加了一个虚假区间 `(1e10, 1e10)`。\n\n```sql\nselect mr.*\n\
  from (select * from t union all\n      select 1e10, 1e10 from dual)\nmatch_recognize\n\
  ( order by s\n  measures\n       classifier() cls,\n       decode(classifier(),\
  \ 'Y', last(cont.e) + 1, s) strt,\n       decode(classifier(), 'Y', s - 1, e) end\n\
  \  all rows per match with unmatched rows\n  after match skip to last y\n  pattern\
  \ (strt x* y)\n  subset cont = (strt, x)\n  define x as x.s = prev(x.e) + 1\n) mr\n\
  where s < 1e10\norder by strt, end ;\n-- S CLS         STRT        END         \
  \ E\n-- ---------- ----- ---------- ---------- ----------\n-- 1 STRT           1\
  \          4          4\n-- 7 Y              5          6          8\n-- 7 STRT\
  \           7          8          8\n-- 9 X              9         10         10\n\
  -- 11 X             11         14         14\n-- 20 Y             15         19\
  \         25\n-- 20 STRT          20         25         25\n-- 30 Y            \
  \ 26         29         40\n-- 30 STRT          30         40         40\n-- 9 行已选择。\n\
  -- 清单 8-3\n-- 使用模式匹配填充数据间隙\n```\n\n前面已经提到，在某些情况下，模式匹配的逻辑可以使用分析函数重新实现。现在，让我们基于一个特定任务比较两种方法的性能：在包含数字\
  \ 0 到 9 的表中，找出所有连续的 1、2、3 组合。\n\n```sql\nexec dbms_random.seed(1);\ncreate table\
  \ digit as\nselect rownum id, trunc(dbms_random.value(0, 9 + 1)) value\nfrom dual\n\
  connect by rownum <= 2e6;\n```\n\n清单 8-4 显示了使用模式匹配的解决方案。与之前的所有示例不同，我们指定了 `one row\
  \ per match`，以将每次匹配的三个匹配行分组为一行。\n\n\n##### 清单 8-4：使用模式匹配查找元素 (1, 2, 3) 的组合\n\n```sql\n\
  select decode(v_id, v1_id, 1, v2_id, 2, v3_id, 3) v1,\ndecode(v_id + 1, v1_id, 1,\
  \ v2_id, 2, v3_id, 3) v2,\ndecode(v_id + 2, v1_id, 1, v2_id, 2, v3_id, 3) v3,\n\
  count(*) cnt\nfrom digit\nmatch_recognize\n( order by id\nmeasures\nleast(v1.id,\
  \ v2.id, v3.id) v_id,\n(v1.id) v1_id,\n(v2.id) v2_id,\n(v3.id) v3_id\none row per\
  \ match\nafter match skip to next row\npattern (permute (v1, v2, v3))\ndefine\n\
  v1 as v1.value = 1,\nv2 as v2.value = 2,\nv3 as v3.value = 3)\ngroup by decode(v_id,\
  \ v1_id, 1, v2_id, 2, v3_id, 3),\ndecode(v_id + 1, v1_id, 1, v2_id, 2, v3_id, 3),\n\
  decode(v_id + 2, v1_id, 1, v2_id, 2, v3_id, 3)\norder by 1, 2, 3;\n```\n\n```\n\
  V1         V2         V3        CNT\n---------- ---------- ---------- ----------\n\
  1          2          3       2066\n1          3          2       1945\n2      \
  \    1          3       2027\n2          3          1       1971\n3          1 \
  \         2       1962\n3          2          1       2015\n```\n\n指定了关键字 `after\
  \ match skip to next row` 以便捕获所有组合。例如，在 ID 区间 (709, 719) 上有两个重叠的序列 1, 3, 2 和 3,\
  \ 2, 1，ID 为 715 和 716 的行是两个不同匹配的一部分。\n\n```sql\nselect * from digit where id between\
  \ 709 and 719;\n```\n\n```\nID      VALUE\n---------- ----------\n709          9\n\
  710          3\n711          2\n712          4\n713          6\n714          1\n\
  715          3\n716          2\n717          1\n718          5\n719          0\n\
  ```\n\n关键字 `permute` 意味着我们考虑 `v1`、`v2`、`v3` 的所有可能组合。为了定义匹配到的排列，我们推导匹配的 ID 并使用 `decode`\
  \ 逻辑。模式匹配后的行数等于匹配组的数量，而分组后的行数不超过 6 —— 即 1, 2, 3 的排列数。\n\n##### 清单 8-5：使用分析函数查找元素\
  \ (1, 2, 3) 的组合\n\n清单 8-5 展示了一种使用分析函数的方法。对于每一行，我们推导出前两行，并检查它们是否唯一且属于集合 (1, 2, 3)。\n\
  \n```sql\nselect v1, v2, v3, count(*) cnt\nfrom (select row_number() over(order\
  \ by id) rn,\nvalue v3,\nlag(value, 1) over(order by id) v2,\nlag(value, 2) over(order\
  \ by id) v1\nfrom digit)\nwhere rn > 2\nand v1 in (1, 2, 3)\nand v2 in (1, 2, 3)\n\
  and v3 in (1, 2, 3)\nand v1 <> v2\nand v1 <> v3\nand v2 <> v3\ngroup by v1, v2,\
  \ v3\norder by 1, 2, 3;\n```\n\n顺便说一下，类似的逻辑也可以用于模式匹配；在这种情况下，我们可以避免使用 `decode`、`permute`\
  \ 和分组。\n\n```sql\npattern (v1 v2 v3)\ndefine\nv1 as v1.value = any (1, 2, 3),\n\
  v2 as v2.value = any (1, 2, 3)\nand v2.value <> v1.value,\nv3 as v3.value = any\
  \ (1, 2, 3)\nand v3.value <> v2.value\nand v3.value <> v1.value)\n```\n\n##### 清单\
  \ 8-6：查找元素 (1, 2, 3) 组合的查询计划\n\n清单 8-6 展示了带有运行时执行统计信息的查询计划（为了格式化目的，`starts` 列恒等于\
  \ 1 并被手动移除）。\n\n```sql\nselect * from table(dbms_xplan.display_cursor(format =>\
  \ 'IOSTATS LAST'));\n```\n\n```\n| Id | Operation             | Name  | E-Rows \
  \ | A-Rows  |    A-Time   | Buffers |\n-------------------------------------------------------------------------------------------\n\
  |  0 | SELECT STATEMENT      |       |         |      6  | 00:00:04.85 |    3712\
  \ |\n|  1 |  SORT GROUP BY        |       |     10  |      6  | 00:00:04.85 |  \
  \  3712 |\n|* 2 |   VIEW                |       |   2000K |  11986  | 00:00:04.85\
  \ |    3712 |\n|  3 |    WINDOW SORT        |       |   2000K |   2000K | 00:00:03.91\
  \ |    3712 |\n|  4 |     TABLE ACCESS FULL | DIGIT |   2000K |   2000K | 00:00:00.16\
  \ |    3712 |\n```\n\n```\n| Id | Operation               | Name  | E-Rows  | A-Rows\
  \  |      A-Time     | Buffers |\n-----------------------------------------------------------------------------------------------\n\
  |  0 | SELECT STATEMENT        |       |         |      6  | 00:00:02.74 |    3712\
  \ |\n|  1 |  SORT GROUP BY          |       |   2000K |      6  | 00:00:02.74 |\
  \    3712 |\n|  2 |   VIEW                  |       |   2000K |  11986  | 00:00:02.73\
  \ |    3712 |\n|  3 |    MATCH RECOGNIZE SORT |       |   2000K |  11986  | 00:00:02.72\
  \ |    3712 |\n|  4 |     TABLE ACCESS FULL   | DIGIT |   2000K |   2000K | 00:00:00.16\
  \ |    3712 |\n```\n\n如你所见，第一个查询中模式匹配和聚合所花费的时间小于第二个查询中仅分析所用的经过时间。另请注意，`Reads` 列不存在，这意味着所有表块都在缓冲区缓存中。\n\
  \n谈到性能，值得一提的是，类似于 `model` 子句，你可以利用并行执行的能力——特别是当数据可以被分区时。在“模型并行执行”一节中，我比较了模型与 PL/SQL。让我们通过添加一个模式匹配解决方案来完善这幅图景。\n\
  \n```sql\nselect --+ parallel(10)\n*\nfrom t\nmodel\nmatch_recognize\n(\npartition\
  \ by part\norder by id\nmeasures\nsum(value) x,\nuserenv('sid') sid\nall rows per\
  \ match\npattern(x+)\ndefine\nx as sum(value) - value <= 3e3\n) mr;\n```\n\n在相同并行度的情况下，它的运行速度比模型方法快约\
  \ 3 倍。\n\n模式匹配基于状态机，模式本身定义了状态机是：\n\n*   确定性有限自动机 (DFA) - 每个转换由其源状态和事件唯一确定；\n*  \
  \ 非确定性有限自动机 (NFA) - 下一状态不仅取决于当前事件，还可能取决于任意数量的后续事件。\n\n在第一种情况下，使用高效算法，你会在计划中看到 `MATCH\
  \ RECOGNIZE SORT DETERMINISTIC FINITE AUTOMATON`；而在第二种情况下，需要回溯，计划中将包含操作 `MATCH RECOGNIZE\
  \ SORT`。如果在应用模式匹配之前记录集已按要求排序，则可能会出现关键字 `BUFFER` 而不是 `SORT`。\n\n##### 清单 8-7：带回溯的模式匹配\n\
  \n清单 8-7 包含一个生成 NFA 的查询，原因是模式变量 `y` 的量词。如果 `y` 匹配了 3 次但对 `z` 的测试失败，那么状态机会回溯并再次尝试匹配\
  \ `z`——这正是识别第二个组时发生的情况。如果我们指定 `pattern (x y{3} z)`，那么将使用 DFA，但只会有一个匹配。\n\n```sql\n\
  with t as (select rownum id from dual connect by rownum <= 10)\nselect * from t\n\
  match_recognize\n( order by id\nmeasures\nmatch_number() match,\nclassifier() cls\n\
  all rows per match with unmatched rows\npattern (x y{2, 3} z)\ndefine\nz as x.id\
  \ + z.id <= 15\n) mr;\n```\n\n```\nID      MATCH CLS\n---------- ----------\n1 \
  \         1 X\n2          1 Y\n3          1 Y\n4          1 Y\n5          1 Z\n\
  6          2 X\n7          2 Y\n8          2 Y\n9          2 Z\n\n10 rows selected.\n\
  ```\n\n尽管功能强大，模式匹配目前仍有一些限制。特别是：\n\n*   在 `define` 子句和 `measures` 子句中只能使用有限的聚合函数子集。例如，你不能使用\
  \ `listagg` 或 `UDAG`。这会导致 `ORA-62512: This aggregate is not yet supported in MATCH_RECOGNIZE\
  \ clause`。关于模式匹配中聚合函数的更多细节可以在第 12 章的测验“相似组”中找到。\n*   你可以在 `define` 子句中使用子查询，但它们不能是关联子查询。否则查询会失败并报错\
  \ `ORA-62510: Correlated subqueries are not allowed in MATCH_RECOGNIZE clause`。我相信原因是为了不混合有限自动机和\
  \ SQL 引擎的执行。\n\n\n##### 总结\n\n行模式匹配极大地扩展了 SQL 用于数据分析的能力。此功能使我们能够执行复杂的分析，否则这类分析将需要分析函数、聚合函数、连接和子查询。在某些情况下，`match_recognize`\
  \ 是使用 SQL 以高效且可扩展的方式获取结果的唯一途径。即使对于那些可以通过分析函数重写来实现模式匹配的情况，其性能表现也更为出色。这可以类比于 `pivot/unpivot`\
  \ 操作符，它们虽可被交叉连接/分组所替代，但新功能通常比传统方法的表现稍好。\n\n类似正则表达式的语法允许以简洁的方式定义模式，这简化了可维护性并提高了可读性。最终，模式匹配是\
  \ SQL 能力上的一次重大突破，无疑是一个实用的功能。\n\n# 9. 查询子句的逻辑执行顺序\n\nOracle 允许在同一个查询块中组合各种查询子句，从连接、过滤和分组等基本功能，到模型子句或模式匹配等高级构造。有时，无法仅使用单个\
  \ `select ... from` 查询块来实现所需的结果，因此你可能需要在查询中创建额外的内联视图——例如，当你想要按分析函数的值进行过滤时。然而，即使你能够使用单个查询块实现整个逻辑——也并非总是必要的，因为\
  \ Oracle 可以在查询转换过程中消除内联视图。此外，在某些情况下，额外的内联视图可能有助于提高性能，这将在本章末尾展示。\n\n本章从逻辑角度介绍查询块中子句的执行顺序，这有助于以简洁的方式实现复杂逻辑。\n\
  \n假设我们有一个仅包含一个 `select` 关键字的单条 `select` 语句——即没有子查询或内联视图。基本的执行顺序如下：\n\n1.  `from`,\
  \ `join`, `where`\n2.  `connect by`\n3.  `group by`\n4.  `having`\n5.  分析函数\n6.\
  \  `select` 列表 (`distinct`, 标量子查询等)\n7.  `order by`\n\n然而，这需要一些澄清。\n\n1.  `join`、`where`\
  \ 和 `connect by` 组合使用的具体细节已在第 5 章“分层查询：Connect by”中介绍。此外，正如“伪列生成详解”一节所演示的，严格来说，说\
  \ `where` 子句中的谓词在 `connect by` 之前或之后执行都是不准确的。\n2.  尽管逻辑上，连接后谓词应该在连接前谓词之后评估，但实际上，如果这样能产生成本更低的执行计划，它们可能会更早被应用。\n\
  3.  查询转换可能会影响单个查询块的实际执行顺序。例如，如果发生了“Distinct Placement”转换，`distinct` 可能在连接之前应用——从技术上讲，Oracle\
  \ 会创建额外的内联视图。\n4.  了解特定查询执行顺序的宝贵信息来源当然是查询计划。它将显示谓词何时被应用、聚合和分析函数何时执行、以及各种排序（如果有的话）在何时进行等等。\n\
  \n所有这些转换和优化只有在不会改变结果的前提下才能发生，但更重要的是，实际执行顺序在 CBO（基于成本的优化器）转换后可能会发生变化——“Distinct Placement”转换就是一个简单的例子。\n\
  \n有时，开发者编写的代码基于对执行顺序的错误假设，这可能是危险的。以下是一些需要注意的地方。\n\n1.  你不应该基于同一个查询块中某些过滤器会在其他过滤器之前应用的假设来构建逻辑，或者依赖于特定的执行计划。下面的例子演示了当查询计划改变时，查询可能会如何失败。\n\
  \n```\ncreate table t01(id, value, constraint pk_t01 primary key(id)) as\nselect\
  \ 1, '1' from dual union all\nselect 2, '2' from dual union all\nselect 0, 'X' from\
  \ dual;\ncreate table t02(id, value) as\nselect 1, 1 from dual union all\nselect\
  \ 2, 2 from dual;\nselect\n* from t01 join t02 using (id, value);\nselect *\nfrom\
  \ table(dbms_xplan.display_cursor(format => 'basic predicate'));\nselect --+ no_index(t01)\n\
  * from t01 join t02 using (id, value);\nselect *\nfrom table(dbms_xplan.display_cursor(format\
  \ => 'basic predicate'));\n```\n\n在第一种情况下，Oracle 执行了嵌套循环，通过 ID 进行访问，并在连接后的记录集上应用了值过滤器；而在第二种情况下，执行的是哈希连接，由于在尝试将\
  \ X 转换为数字时发生了隐式转换，查询会因 `ORA-01722: invalid number` 错误而失败。\n\n```\nselect\n* from\
  \ t01 join t02 using (id, value);\nID      VALUE\n---------- ----------\n1     \
  \     1\n2          2\n-----------------------------------------------\n| Id  |\
  \ 操作                        | 名称   |\n-----------------------------------------------\n\
  |   0 | SELECT STATEMENT             |        |\n|   1 |  NESTED LOOPS         \
  \       |        |\n|   2 |   NESTED LOOPS               |        |\n|   3 |   \
  \ TABLE ACCESS FULL         | T02    |\n|*  4 |    INDEX UNIQUE SCAN         | PK_T01\
  \ |\n|*  5 |   TABLE ACCESS BY INDEX ROWID| T01    |\n-----------------------------------------------\n\
  谓词信息 (由操作 ID 标识):\n---------------------------------------------------\n4 - access(\"\
  T01\".\"ID\"=\"T02\".\"ID\")\n5 - filter(\"T02\".\"VALUE\"=TO_NUMBER(\"T01\".\"\
  VALUE\"))\nselect --+ no_index(t01)\n* from t01 join t02 using (id, value);\n错误:\n\
  ORA-01722: 无效数字\n-----------------------------------\n| Id  | 操作               |\
  \ 名称 |\n-----------------------------------\n|   0 | SELECT STATEMENT   |      |\n\
  |*  1 |  HASH JOIN         |      |\n|   2 |   TABLE ACCESS FULL| T02  |\n|   3\
  \ |   TABLE ACCESS FULL| T01  |\n-----------------------------------\n谓词信息 (由操作\
  \ ID 标识):\n---------------------------------------------------\n1 - access(\"T02\"\
  .\"VALUE\"=TO_NUMBER(\"T01\".\"VALUE\") AND\n\"T01\".\"ID\"=\"T02\".\"ID\")\n```\n\
  \n##### 1. 你不能依赖复合条件中谓词的求值顺序\n\n例如，在下面的两个查询中，谓词按照指定的顺序求值，因此第一个查询失败，第二个查询成功执行。给定\
  \ `id < 3` 对于第三行为 false，Oracle 没有求值第二个条件。\n\n```\nselect id, case when 1 / (id -\
  \ 3) < 0 and id < 3 then 1 end x\nfrom (select rownum id from dual connect by level\
  \ <= 3);\n错误:\nORA-01476: 除数为零\nselect id, case when id < 3 and 1 / (id - 3) < 0\
  \ then 1 end x\nfrom (select rownum id from dual connect by level <= 3);\nID   \
  \       X\n---------- ----------\n1          1\n2          1\n```\n\n关键点是，不保证有这种求值顺序。例如，下面的两个查询都会失败，无论谓词如何指定。\n\
  \n```\ncreate table t03 as\nselect 'A' id from dual union all select '123' from\
  \ dual;\n表已创建。\nselect * from t03\nwhere id >= 100 and regexp_like(id, '\\d+');\n\
  where id >= 100 and regexp_like(id, '\\d+')\n*\n第 2 行出现错误:\nORA-01722: 无效数字\nselect\
  \ * from t03\nwhere regexp_like(id, '\\d+') and id >= 100;\nwhere regexp_like(id,\
  \ '\\d+') and id >= 100\n*\n第 2 行出现错误:\nORA-01722: 无效数字\n```\n\n为了确保某些谓词在其他谓词之前求值，我们可以使用\
  \ `case` 表达式。\n\n```\nselect * from t03\nwhere case when regexp_like(id, '\\d+')\
  \ then id end >= 100;\nID\n---\n```\n\n##### 2. 不保证标量子查询或确定性函数的执行次数\n\n当然，你可能想使用各种优化技术，如标量子查询缓存，或通过使其具有确定性来减少特定函数的执行次数，但你不应依赖会有特定的执行次数，特别是单次执行。\n\
  \n让我们回到查询子句的执行顺序，看一下 `connect by` 与分析函数和聚合函数的混合。\n\n```\nselect\nid,\ncount(*) cnt,\n\
  max(level) max_lvl,\nmax(rownum) max_rn,\nsum(id + count(*)) over(order by id) summ\n\
  from (select column_value id from table(numbers(0, 0, 1)))\ngroup by id\nstart with\
  \ id = 0\nconnect by prior id + 1 = id;\nID        CNT    MAX_LVL     MAX_RN   \
  \    SUMM\n---------- ---------- ---------- ---------- ----------\n0          2\
  \          1          3          2\n1          2          2          4         \
  \ 5\n```\n\n最初 Oracle 构建了一棵树 0, 1, 0, 1（四行，两级），并为 `rownum` 和 `level` 伪列生成了值。之后，记录集被分组，最后计算了分析函数。\n\
  \n正如关于执行顺序的列表中所述，分析函数在 `group by` 之后、`distinct` 之前执行。因此，在 select 列表中使用带有 `distinct`\
  \ 的分析函数是 `distinct` 无法在没有额外内联视图的情况下被 `group by` 替换的一个例子。\n\n让我们创建一个表，并演示更多 `group\
  \ by` 不能代替 `distinct` 的例子。\n\n```\ncreate table tt as\nselect rownum id, mod(rownum,\
  \ 2) value\nfrom dual connect by level <= 3;\n```\n\n这两个查询在逻辑上是相同的，并产生相同的输出：\n\n\
  ```\nselect distinct value from tt\nselect value from tt group by value\n```\n\n\
  然而，在以下情况下，`group by` 无法在不使用额外内联视图的情况下使用，因为 select 列表中的表达式在 `group by` 之后求值。\n\n\
  ```\nselect distinct row_number() over(partition by id order by null) rn, value\n\
  from tt;\nRN      VALUE\n---------- ----------\n1          0\n1          1\nselect\
  \ distinct (select count(*) from tt) cnt, value from tt;\nCNT      VALUE\n----------\
  \ ----------\n3          1\n3          0\nselect distinct sys_connect_by_path(value,\
  \ '->') path, value\nfrom tt\nconnect by 1 = 0;\nPATH            VALUE\n----------\
  \ ----------\n->1                 1\n->0                 0\n```\n\n为了检查 `distinct`\
  \ 和通过 `rownum` 过滤的行为，让我们创建另一个表：\n\n```\ncreate table tt1 as\n(select trunc(rownum\
  \ / 2) id from dual connect by level <= 5);\nselect * from tt1;\nID\n```\n\n尽管过滤条件指定为返回三行，但下面的查询只返回两行，因为过滤后返回三行，其中只有两行是唯一的。内联视图用于\
  \ `from` 子句中以保证顺序。\n\n```\nselect distinct id\nfrom (select * from tt1 order by\
  \ id)\nwhere rownum <= 3;\nID\n```\n\n使用 `group by` 不需要额外的内联视图也可以完成，因为所有用于分组以及过滤条件的表达式都可以在\
  \ `group by` 之前求值。\n\n```\nselect id\nfrom (select * from tt1 order by id)\nwhere\
  \ rownum <= 3\ngroup by id;\n```\n\n让我们更详细地分析聚合函数和分析函数混合在同一查询块中的情况。来自列表 9-1 的第一个查询返回两行，如原表所示，但第二个查询只返回一行，因为整个记录集在分析之前被聚合了。\n\
  \n```\nselect count(*) over() cnt1\nfrom (select column_value id from table(numbers(1,\
  \ 1)));\nCNT1\n\nselect count(*) over() cnt1, count(*) cnt2\nfrom (select column_value\
  \ id from table(numbers(1, 1)));\nCNT1       CNT2\n---------- ----------\n1    \
  \      2\n```\n\n列表 9-1\n混合聚合和分析函数\n\n聚合和分析函数可以嵌套。要理解列表 9-2 的结果，请记住聚合函数先求值，然后在其上应用分析函数。\n\
  \n```\nselect value,\ncount(*) agg,\ncount(*) over() an,\nsum(count(*)) over(order\
  \ by value) agg_an\nfrom tt\ngroup by value;\nVALUE        AGG         AN     AGG_AN\n\
  ---------- ---------- ---------- ----------\n0          1          2          1\n\
  1          2          2          3\n```\n\n列表 9-2\n嵌套聚合和分析函数\n\n\n\n一些开发者会试图避免使用内联视图，尽管并无特别原因；但在其他情况下，从性能角度看，这确实会产生差异。清单\
  \ 9-3 展示了将清单 9-2 中的查询改写为使用内联视图并稍微简化后的版本（不含分析计数），以及它们经过转换后的版本和执行计划。\n\n```\nselect\
  \ t.*, sum(agg) over(order by value) agg_an\nfrom (select value, count(*) agg, count(*)\
  \ over() an\nfrom tt\ngroup by value) t;\nselect \"T\".\"VALUE\" \"VALUE\",\n\"\
  T\".\"AGG\" \"AGG\",\n\"T\".\"AN\" \"AN\",\nsum(\"T\".\"AGG\") over(order by \"\
  T\".\"VALUE\"\nrange between unbounded preceding and current row) \"AGG_AN\"\nfrom\
  \ (select \"TT\".\"VALUE\" \"VALUE\",\ncount(*) \"AGG\",\ncount(*) over() \"AN\"\
  \nfrom \"TT\" \"TT\"\ngroup by \"TT\".\"VALUE\") \"T\";\n\n| Id  | Operation   \
  \          | Name |\n\n|   0 | SELECT STATEMENT      |      |\n|   1 |  WINDOW SORT\
  \          |      |\n|   2 |   VIEW                |      |\n|   3 |    WINDOW BUFFER\
  \      |      |\n|   4 |     HASH GROUP BY     |      |\n|   5 |      TABLE ACCESS\
  \ FULL| TT   |\n\nselect t.*, sum(agg) over(order by value) agg_an\nfrom (select\
  \ value, count(*) agg\nfrom tt\ngroup by value) t;\nselect \"TT\".\"VALUE\" \"VALUE\"\
  ,\ncount(*) \"AGG\",\nsum(count(*)) over(order by \"TT\".\"VALUE\"\nrange between\
  \ unbounded preceding and current row) \"AGG_AN\"\nfrom \"TT\" \"TT\"\ngroup by\
  \ \"TT\".\"VALUE\";\n\n| Id  | Operation           | Name |\n\n|   0 | SELECT STATEMENT\
  \    |      |\n|   1 |  WINDOW BUFFER      |      |\n|   2 |   SORT GROUP BY   \
  \  |      |\n|   3 |    TABLE ACCESS FULL| TT   |\n\n清单 9-3\n使用内联视图替代嵌套的聚合和分析函数\n\
  ```\n\n如你所见，Oracle 未能为第一个查询消除内联视图，但更重要的是——它们的执行计划不同。第二个查询的执行计划与使用嵌套函数的原始查询的执行计划相同；然而列\
  \ `\"an\"` 并未被计算。另一方面，第一个查询返回的结果与原始查询相同，但从执行计划中我们看到有两个 `WINDOW` 操作，并且顶层函数需要自己进行排序。这意味着在这种情况下，出于性能考虑，你可能需要使用嵌套函数。从技术上讲，第二个查询应用了复杂的视图合并转换，但无法应用于第一个查询。\n\
  \n聚合函数也可以嵌套。你可能记得无法在 `listagg` 函数中使用 `distinct` 关键字，但如果结果预期是单行，那么嵌套聚合可以帮助从连接中移除重复项，如清单\
  \ 9-4 所示。\n\n```\nselect listagg(id, ',') within group(order by id) list\nfrom (select\
  \ column_value id, rownum rn\nfrom table(numbers(1, 2, 3, 5, 2)));\nLIST\n\n1,2,2,3,5\n\
  select listagg(max(id), ',') within group(order by max(id)) list\nfrom (select column_value\
  \ id, rownum rn\nfrom table(numbers (1, 2, 3, 5, 2)))\ngroup by id;\nLIST\n\n1,2,3,5\n\
  要在连接之前执行按 id 的聚合，只需在一个位置指定聚合函数 max 即可。\nlistagg(id, ',') within group(order by max(id))\
  \ list\nlistagg(max(id), ',') within group(order by id) list\n清单 9-4\n嵌套的聚合函数\n\
  ```\n\n当聚合函数被嵌套时，结果总是单行，并且只允许一层深度的嵌套。\n\n如果我们想在相关标量子查询中连接唯一值，这个功能可能非常有用。清单 9-5 演示了几种方法，但第二种方法仅在\
  \ `12c` 中有效，而在 `11g` 中会因 `ORA-00904: \"T1\".\"ID\": invalid identifier` 而失败，因为关联名的作用域仅限于一层深度。\n\
  \n```\nselect t1.*,\n(select listagg(max(t2.name), ', ') within group(order by t2.name)\n\
  from t2\nwhere t1.id = t2.id\ngroup by t2.name) x1,\n(select listagg(t2.name, ',\
  \ ') within group(order by t2.name)\nfrom (select distinct name from t2 where t1.id\
  \ = t2.id) t2) x2\nfrom t1;\n清单 9-5\n在相关标量子查询中连接唯一值\n```\n\n正如本章开头所提到的，有时内联视图是必须的，例如，如果你想在\
  \ `where` 子句中使用分析函数的结果。在其他情况下，它可能是可选的，如在混合了分析和聚合函数的查询中所示。在这种情况下，是否使用内联视图以便于阅读查询，或者摆脱它以使其更简洁并避免不必要的层次，这取决于你的决定。\n\
  \n在一般情况下，无法根据执行计划判断一个查询是否包含（可合并的）内联视图。如前所述，摆脱内联视图可能会改变执行计划并对性能产生积极影响；然而，额外的内联视图也可能带来性能的提升。\n\
  \n让我们创建一个执行时间接近一秒的函数来演示这种情况。\n\n```\ncreate or replace function f return number\
  \ is\nbegin\ndbms_lock.sleep(1);\nreturn 1;\nend f;\n/\n```\n\n清单 9-6 中的第一个查询耗时\
  \ 6 秒，因为函数对每一行都计算了两次。第二个查询耗时 2 秒，这是由于标量子查询缓存——函数为第一行计算了一次，结果被缓存。最后，第三个查询仅耗时 1 秒，因为我们可以重用内联视图中缓存的标量值用于两个表达式。\n\
  \n```\nselect id, value, f + 1 f1, f - 1 f2 from tt t;\nID      VALUE         F1\
  \         F2\n---------- ---------- ---------- ----------\n1          1        \
  \  2          0\n2          0          2          0\n3          1          2   \
  \       0\nElapsed: 00:00:06.04\nselect id, value, (select f from dual) + 1 f1,\
  \ (select f from dual) - 1 f2\nfrom tt t;\nID      VALUE         F1         F2\n\
  ---------- ---------- ---------- ----------\n1          1          2          0\n\
  2          0          2          0\n3          1          2          0\nElapsed:\
  \ 00:00:02.02\nselect id, value, ff + 1 f1, ff - 1 f2\nfrom (select tt.*, (select\
  \ f from dual) ff from tt) t;\nID      VALUE         F1         F2\n---------- ----------\
  \ ---------- ----------\n1          1          2          0\n2          0      \
  \    2          0\n3          1          2          0\nElapsed: 00:00:01.02\n清单\
  \ 9-6\n使用内联视图和标量子查询缓存提高性能\n```\n\n即使是特定的 Oracle 子句，如模式匹配或 `model`，也可以在同一查询块中组合。\n\
  \n```\nselect * from dual\nmatch_recognize (all rows per match pattern (x) define\
  \ x as 1 = 1)\nmodel dimension by (1 id) measures (0 result) rules ();\n```\n\n\
  在这种情况下，`match_recognize` 将首先应用，`model` 将在其上执行；此外，每个子句相互隔离，因此如果你想在应用逻辑之前以特定方式处理记录集，可能必须为每个子句指定分区和排序。\n\
  \n##### 总结\n\n本文通过示例探讨了关于查询子句逻辑执行的一些细节。当逻辑相当复杂时，即使不是必需的，也有必要使用多个查询块——这是出于可维护性的目的。然而，你必须确保内联视图按预期合并，以免对性能产生负面影响。并非总是可以避免内联视图——例如，当需要按分析函数的结果进行过滤时。此外，在某些情况下，内联视图可能会提高性能，正如本章末尾所演示的那样。内联视图也可作为\
  \ Bug 的变通方案（例如，在旧版本中，当 `connect by` 和分析函数混合在同一查询块时存在许多 Bug），以及用于控制转换——你可以禁用视图合并并单独控制每个子查询中的转换。\n\
  \n\n\n# 10. 图灵完备性\n\n##### 图灵完备性概述\n\n图灵完备性是计算机科学中一个非常重要的概念，因为一个模型具备图灵完备性意味着它可以执行任何算法，无论该算法多么复杂、使用了何种数据结构，或者需要多少存储空间和时间来评估它。SQL\
  \ 可以被视为另一种计算模型，尽管它并非设计用于实现任何算法或业务逻辑，但为了完整性，分析它是否是图灵完备的也很有趣。此外，正如将在下一章“当 PL/SQL 优于原生\
  \ SQL 时”中展示的，有时即使一个算法可以很容易地用纯 SQL 实现，它也并非获得结果的最佳方式。\n\n在计算理论中，一个数据操作规则系统（或计算模型）被称为是图灵完备的，如果它可以用来模拟任何图灵机。这类系统的例子包括：处理器的指令集、一种编程语言、一个元胞自动机，甚至是终极精简指令集计算机（URISC）。另一方面，一些广为人知的计算模型并不是图灵完备的——例如，确定性有限自动机（DFA）。\n\
  \n根据丘奇-图灵论题，“所有物理上可计算的函数都是图灵可计算的”，换句话说，如果某个计算模型可以模拟图灵机，那么它就可以实现任何可计算函数。\n\n证明一种语言是否是图灵完备的最简单方法之一，是实现一个称为\
  \ **规则 110** 的基本元胞自动机，该自动机是图灵完备的——证明可以在附录的注释 [7] 中找到。\n\n##### 规则 110 元胞自动机\n\n\
  在一个基本元胞自动机中，一个由 0 和 1 组成的一维模式根据一组简单的规则演化。模式中的一个点在新一代中是 0 还是 1，取决于它的当前值以及它两个邻居的值，如表\
  \ 10-1 所描述。对于第一个符号，其左邻居是纸带上的最后一个符号；对于最后一个符号，其右邻居是第一个符号。\n\n**表 10-1** 规则 110 自动机的规则集\n\
  \n| 当前模式 | 111 | 110 | 101 | 100 | 011 | 010 | 001 | 000 |\n|---|---|---|---|---|---|---|---|---|\n\
  | 中心单元格的新状态 | 0 | 1 | 1 | 0 | 1 | 1 | 1 | 0 |\n\n它被称为规则 110，是因为新的状态序列 `01101110`\
  \ 解释为一个二进制数时，对应于十进制值 110。\n\n清单 10-1 展示了对初始纸带 `000000000010000000000000010000` 运行规则\
  \ 110 的前 19 步评估示例。\n\n```\nPART STR\n---------- ----------------------------------------\n\
  1 000000000010000000000000010000\n2 000000000110000000000000110000\n3 000000001110000000000001110000\n\
  4 000000011010000000000011010000\n5 000000111110000000000111110000\n6 000001100010000000001100010000\n\
  7 000011100110000000011100110000\n8 000110101110000000110101110000\n9 001111111010000001111111010000\n\
  10 011000001110000011000001110000\n11 111000011010000111000011010000\n12 101000111110001101000111110001\n\
  13 111001100010011111001100010011\n14 001011100110110001011100110110\n15 011110101111110011110101111110\n\
  16 110011111000010110011111000010\n17 110110001000111110110001000111\n18 011110011001100011110011001100\n\
  19 110010111011100110010111011100\n20 110111101110101110111101110101\n```\n**清单\
  \ 10-1** 规则 110 的评估示例\n\n##### 使用 SQL 实现 规则 110\n\n清单 10-2 展示了如何使用递归子查询因子化和分析函数来实现规则\
  \ 110。简而言之，纸带被转换成一个记录集，其中一行代表一个符号，分析函数用于推导每个值的邻居；生成所需步数的符号后，它们被连接成字符串。\n\n```\n\
  with t0 as\n(select '000000000010000000000000010000' str from dual),\nt1 as\n(select\
  \ 1 part, rownum rn, substr(str, rownum, 1) x\nfrom t0\nconnect by substr(str, rownum,\
  \ 1) is not null),\nt2(part, rn, x) as\n(select part, rn, cast(x as char(1))\nfrom\
  \ t1\nunion all\nselect part + 1,\nrn,\ncase nvl(lag(x) over(order by rn),\nlast_value(x)\
  \ over(order by rn rows\nbetween current row and unbounded following))\n|| x ||\n\
  nvl(lead(x) over(order by rn),\nfirst_value(x) over(order by rn rows\nbetween unbounded\
  \ preceding and current row))\nwhen '111' then '0'\nwhen '110' then '1'\nwhen '101'\
  \ then '1'\nwhen '100' then '0'\nwhen '011' then '1'\nwhen '010' then '1'\nwhen\
  \ '001' then '1'\nelse '0'\nend\nfrom t2\nwhere part < 20)\nselect part, listagg(x)\
  \ within group(order by rn) str\nfrom t2\ngroup by part\norder by 1;\n```\n**清单\
  \ 10-2** 使用递归子查询因子化实现 规则 110\n\n如果没有分析函数，就无法推导邻居的值，因为递归查询名称在递归分支中只能被引用一次，因此不允许使用包含递归查询名称的子查询进行自连接。因此，我认为在递归分支中不支持分析函数的\
  \ SQL 不是图灵完备的；不过这一点还有待证明。\n\n##### 关于算法实现与图灵完备性的讨论\n\n一旦证明了元胞自动机可以用来实现任何算法，人们可能会问“如何实际用它来做到这一点？例如，实现一个非常简单的两数相加的例程。”为了做到这一点，0\
  \ 和 1 的模式必须同时被视为数据和代码，因此必须以特定方式构造输入纸带。换句话说，算法必须编码在输入纸带中——而不是在 SQL 中。\n\n关于规则 110\
  \ 最后要提的一点是，即使不使用迭代，也可以使用 `model` 子句相对简单地实现任意长度纸带的计算。不过，此类 SQL 模拟速度相当慢，只能用于学术目的。\n\
  \n从学术角度来看，`model` 子句还有另一个有趣的特点——如果你能消除嵌套循环（这在理论上总是可能的），它就可以用来实现任何算法。为了演示这一点，让我们看一下清单\
  \ 10-3 中展示的冒泡排序算法。\n\n```\ndeclare\ns varchar2(4000) := 'abcd c*de 01';\nn number\
  \ := length(s);\nj number := 1;\nk number := 1;\nx number := 1;\ni number := 1;\n\
  begin\nwhile x > 0 loop\nx := 0;\nfor j in 1 .. n - k loop\ni := i + 1;\nif substr(s,\
  \ j + 1, 1) < substr(s, j, 1) then\ns := substr(s, 1, j - 1) || substr(s, j + 1,\
  \ 1) ||\nsubstr(s, j, 1) || substr(s, j + 2);\nx := 1;\nend if;\nend loop;\nk :=\
  \ k + 1;\nend loop;\ndbms_output.put_line(i || s);\nend;\n```\n**清单 10-3** 符号字符串的冒泡排序\n\
  \n我们重复嵌套循环，直到当前 `while` 循环迭代中至少发生一次交换，这通过变量 `x` 来标记。\n\n在清单 10-4 中将其转换为单个 `while`\
  \ 循环后，我们引入了一个额外的标志 `c`。这个标志类似于清单 10-3 中的 `x`，而 `x` 本身始终等于 1，并且只有在“内层循环”完成时才可能重置为零，因此只有当我们处理完当前步骤的所有符号且没有发生交换（即\
  \ `c = 0`）时，算法才能终止。\n\n```\ndeclare\ns varchar2(4000) := 'abcd c*de 01';\nn number\
  \ := length(s);\nj number := 1;\nk number := 1;\nx number := 1;\ni number := 1;\n\
  c number := 0;\nbegin\nwhile x > 0 loop\ni := i + 1;\nc := case when substr(s, j\
  \ + 1, 1) < substr(s, j, 1)\nthen 1\nelse case when j = 1 then 0 else c end\nend;\n\
  s := case when substr(s, j + 1, 1) < substr(s, j, 1)\nthen substr(s, 1, j - 1) ||\
  \ substr(s, j + 1, 1) ||\nsubstr(s, j, 1) || substr(s, j + 2)\nelse s\nend;\nx :=\
  \ case when j = n - k and c = 0 then 0 else 1 end;\nk := case when j = n - k then\
  \ k + 1 else k end;\nj := case when j - 1 = n - k then 1 else j + 1 end;\nend loop;\n\
  dbms_output.put_line(i || s);\nend;\n```\n**清单 10-4** 使用单个 while 循环的冒泡排序\n\n\n要使用模型子句实现此逻辑，我们必须：\n\
  \n*   声明必要的变量（列）；\n*   用等号“=”替换赋值操作符“:=”；\n*   将分隔语句的分号替换为逗号，以分隔模型中的规则；\n*   为寻址添加\
  \ `[0]` —— 逻辑应用于由 `rn = 0` 标识的单个字符串。\n\n`清单 10-5` 展示了一种 SQL 方法。在所有三种情况下，结果都是相同的，并且都执行了\
  \ 64 次迭代才得到它。\n\n```sql\nwith t as (select 'abcd c*de 01' s from dual)\nselect i,\
  \ s\nfrom t\nmodel\ndimension by (0 rn)\nmeasures (length(s) n, 1 j, 1 k, 1 x, 1\
  \ i, 0 c, s)\nrules iterate(60) until x[0]=0\n(\ni[0] = i[0] + 1,\nc[0] = case when\
  \ substr(s[0], j[0] + 1, 1) < substr(s[0], j[0], 1)\nthen 1\nelse case when j[0]\
  \ = 1 then 0 else c[0] end\nend,\ns[0] = case when substr(s[0], j[0] + 1, 1) < substr(s[0],\
  \ j[0], 1)\nthen substr(s[0], 1, j[0] - 1) || substr(s[0], j[0] + 1, 1) ||\nsubstr(s[0],\
  \ j[0], 1) || substr(s[0], j[0] + 2)\nelse s[0]\nend,\nx[0] = case when j[0] = n[0]\
  \ - k[0] and c[0] = 0 then 0 else 1 end,\nk[0] = case when j[0] = n[0] - k[0] then\
  \ k[0] + 1 else k[0] end,\nj[0] = case when j[0] - 1 = n[0] - k[0] then 1 else j[0]\
  \ + 1 end\n);\n```\n\n`清单 10-5` 使用模型子句实现的冒泡排序\n\n##### 总结\n\n本文展示了递归子查询分解使 SQL 具备了图灵完备性。此外，还演示了如何使用迭代模型来实现任意算法。然而，尽管功能强大，SQL\
  \ 并非一种用于迭代计算的语言。同样，正如第 7 章关于模型子句的“性能简析”小节所示，即使对于简单的算法，PL/SQL 也可能比递归子查询分解或模型子句更快。关于\
  \ PL/SQL 何时是比 SQL 更优选择的更多细节，可以在下一章——“何时 PL/SQL 优于原生 SQL”中找到。\n\n# 第二部分\nPL/SQL 与\
  \ SQL 解决方案\n\n## PL/SQL 与模式\n\n第 12 章中的任务列表及演示的解决方案对应于以下 Oracle 特性：\n\n| # | 问题\
  \ | CB | AF | RW | M | PM | PL |\n| --- | --- | --- | --- | --- | --- | --- | ---\
  \ |\n| 1 | 转换为十进制 | + |   |   |   |   | + |\n| 2 | 连通分量 | + |   |   |   |   | +\
  \ |\n| 3 | 排序依赖 | + |   |   |   |   | + |\n| 4 | 带偏移的百分位数 |   | + |   |   |   |\
  \   |\n| 5 | 连续 N 个 1 |   | + |   | + | + |   |\n| 6 | 下一个值 |   | + |   | + | +\
  \ |   |\n| 7 | 下一个分支 |   | + |   | + | + |   |\n| 8 | 随机子集 |   |   | + | + |   |\
  \ + |\n| 9 | 覆盖范围 | + | + |   |   | + |   |\n| 10 | Zeckendorf 表示 | + |   | + |\
  \ + | + |   |\n| 11 | 最佳路径 |   | + |   |   | + |   |\n| 12 | 相似性分组 |   |   |   |\
  \ + | + |   |\n| 13 | 购物篮 |   |   | + | + |   |   |\n| 14 | 最长递增子序列 |   |   |  \
  \ | + |   | + |\n| 15 | 奎因 |   |   |   |   |   |   |\n\n**图例**\n\n`AF`: 分析函数\n`CB`:\
  \ 连接 BY\n`RW`: 递归 WITH\n`M`: 模型\n`PM`: 模式匹配\n`PL`: PL/SQL\n\n## 11. 何时 PL/SQL 优于原生\
  \ SQL\n\n前文已多次提到，对于许多任务，与其使用模型子句或递归子查询分解等高级 Oracle 特性，不如在 PL/SQL 中实现逻辑，以获得更好的性能和可扩展性。然而，即使问题仅用基本的\
  \ SQL 特性就能解决，PL/SQL 可能仍是获取结果集更好的选择。通常，原因是由于 SQL 的局限性或当前实现方式，或是 SQL 查询的特殊性。SQL 是一种声明性语言，其在\
  \ Oracle RDBMS 中的实现并非开源；因此，对于底层发生的事情，只能进行一定程度的控制。以下尝试对 PL/SQL 解决方案优于原生 SQL 的情况进行分类；请记住，这种分类是相对的，某些情况可能属于多个类别。\n\
  \n##### 分析函数的特殊性\n\n分析功能是极其强大的特性，它们显著扩展了可使用纯 SQL 高效解决的任务集。另一方面，正如相应章节（第 3 章）所示，分析功能存在一些功能上的限制，以及在实现方面的一些特殊性，这可能是无法达到最优性能的原因。\n\
  \n\n##### 获取终止\n\n本小节第一个问题的核心在于，无法高效地在查询中指定获取行应持续到某个条件为假为止。分析函数只是一个能够通过纯 SQL 实现这一目标的功能，但并非总是以高效的方式实现。\n\
  \n让我们考虑一种需要根据某个条件终止获取或停止返回行的情况。清单 11-1 展示了一个包含交易信息的表，目标是返回所有最新的交易，直到总金额达到上限 X（或者直到返回了\
  \ N 个特定的行）。\n\n至少可以立即提出三种不同的方法：\n\n*   使用分析函数；\n*   在表（管道化）函数中实现逻辑；\n*   获取数据并在客户端验证终止条件。\n\
  \n```\nexec dbms_random.seed(1);\ncreate table transaction(id int not null, value\
  \ number not null);\ninsert --+ append\ninto transaction\nselect rownum, trunc(1000\
  \ * dbms_random.value + 1) value\nfrom dual\nconnect by rownum <= 3e6;\ncreate index\
  \ idx_tran_id on transaction(id);\nexec dbms_stats.gather_table_stats(user, 'transaction');\n\
  ```\n\n清单 11-1\n交易表\n\n测试在 Oracle 12.1.0.2 上进行，配置如下：\n\n1.  启用了运行时执行统计信息。\n\n```\n\
  alter session set statistics_level = all;\n```\n\n2.  禁用了自适应计划。\n\n```\nalter session\
  \ set \"_optimizer_adaptive_plans\" = false;\n```\n\n使用以下命令显示执行计划：\n\n```\nselect\
  \ *\nfrom table(dbms_xplan.display_cursor(format => 'IOSTATS LAST'));\n```\n\n使用\
  \ `IOSTATS` 而非 `ALLSTATS` 主要是为了格式化目的——以便执行计划能适应页面宽度。可以通过使用 `MEMSTATS` 或 `ALLSTATS`\
  \ 来显示有关内存使用的统计信息。\n\n首先，让我们考虑一个稍微简化的任务：只需返回最近的 10 笔交易。第一种方法是使用带有 `order by` 和 `rownum`\
  \ 过滤的内联视图。参见清单 11-2。\n\n```\nselect *\nfrom (select * from transaction order by\
  \ id desc)\nwhere rownum <= 10;\nID      VALUE\n---------- ----------\n3000000 \
  \       875\n2999999        890\n2999998        266\n2999997        337\n2999996\
  \        570\n2999995        889\n2999994        425\n2999993         64\n2999992\
  \        140\n2999991        638\n10 rows selected.\n```\n\n清单 11-2\n使用 `rownum`\
  \ 限制行数\n\n查询几乎立即返回了结果——少于百分之一秒。\n\n```\n| Id | Operation                     |Name\
  \         | Starts | E-Rows | A-Rows |   A-Time    | Buffers|\n|  0 | SELECT STATEMENT\
  \              |             |      1 |        |     10 | 00:00:00.01 |      7 |\n\
  |* 1 |  COUNT STOPKEY                |             |      1 |        |     10 |\
  \ 00:00:00.01 |      7 |\n|  2 |   VIEW                        |             | \
  \     1 |     10 |     10 | 00:00:00.01 |      7 |\n|  3 |    TABLE ACCESS BY INDEX\
  \ ROWID| TRANSACTION |      1 |  3000K |     10 | 00:00:00.01 |      7 |\n|  4 |\
  \     INDEX FULL SCAN DESCENDING| IDX_TRAN_ID |      1 |     10 |     10 | 00:00:00.01\
  \ |      4 |\n```\n\n这是通过按降序读取索引并通过 `rowid` 访问表来获取值实现的，但关键点在于，获取 10 行后读取就停止了。\n\n\
  现在让我们使用分析函数实现该逻辑。参见清单 11-3。\n\n```\nselect t1.id, t1.value\nfrom (select row_number()\
  \ over(order by id desc) rn, t0.*\nfrom transaction t0) t1\nwhere rn <= 10;\n```\n\
  \n清单 11-3\n使用 `row_number` 限制行数\n\n尽管执行计划中没有 `Reads` 列（这意味着所有数据都是从内存而非磁盘读取的——即 `Buffers`），但执行耗时超过了\
  \ 2 秒（比第一种方法慢数倍）。\n\n```\n| Id | Operation                 | Name        | Starts\
  \ | E-Rows | A-Rows |   A-Time    | Buffers |\n|  0 | SELECT STATEMENT         \
  \ |             |      1 |        |     10 | 00:00:02.05 |    6047 |\n|* 1 |  VIEW\
  \                     |             |      1 |     10 |     10 | 00:00:02.05 | \
  \   6047 |\n|* 2 |   WINDOW SORT PUSHED RANK |             |      1 |  3000K | \
  \    10 | 00:00:02.05 |    6047 |\n|  3 |    TABLE ACCESS FULL      | TRANSACTION\
  \ |      1 |  3000K |  3000K | 00:00:00.46 |    6047 |\n```\n\n`WINDOW SORT PUSHED\
  \ RANK` 操作意味着排序会持续进行，直到返回指定行数，但该操作的输入数据是表中的所有行。换句话说，这意味着扫描了整张表，但只为指定行数保证了顺序。\n\n\
  使用分析函数时，我们也可以利用索引中数据已排序这一事实，但在这种情况下，我们必须使用额外的连接，如清单 11-4 所示。\n\n```\nselect t2.*\n\
  from (select --+ cardinality(10) index_desc(t0 idx_tran_id)\nrow_number() over(order\
  \ by id desc) rn, rowid row_id\nfrom transaction t0) t1\njoin transaction t2\non\
  \ t1.row_id = t2.rowid\nwhere t1.rn <= 10;\n```\n\n清单 11-4\n使用 `row_number` 限制行数\
  \ - 优化版本\n\n我们在内联视图中显式指定了访问方法以避免全表扫描，并提示了低基数，以便 Oracle 执行嵌套循环。执行时间少于百分之一秒——与使用 `rownum`\
  \ 过滤的方法类似。额外的连接充当了 `TABLE ACCESS BY USER ROWID`，而不是第一种方法中的 `TABLE ACCESS BY INDEX\
  \ ROWID`。\n\n```\n| Id | Operation                       | Name        | Starts\
  \ | E-Rows | A-Rows |   A-Time    | Buffers |\n|  0 | SELECT STATEMENT         \
  \       |             |      1 |        |     10 | 00:00:00.01 |       6 |\n|  1\
  \ |  NESTED LOOPS                   |             |      1 |     10 |     10 | 00:00:00.01\
  \ |       6 |\n|* 2 |   VIEW                          |             |      1 | \
  \    10 |     10 | 00:00:00.01 |       4 |\n|* 3 |    WINDOW NOSORT STOPKEY    \
  \    |             |      1 |     10 |     10 | 00:00:00.01 |       4 |\n|  4 |\
  \     INDEX FULL SCAN DESCENDING  | IDX_TRAN_ID |      1 |  3000K |     11 | 00:00:00.01\
  \ |       4 |\n|  5 |      TABLE ACCESS BY USER ROWID | TRANSACTION |     10 | \
  \     1 |     10 | 00:00:00.01 |       2 |\n```\n\n关于简化任务最后要提到的一点是，如果限制是通过常量或绑定变量指定的，则可以实现最优计划。如果我们使用标量子查询\
  \ `(select 10 from dual)`，那么执行计划将如下所示。\n\n```\n| Id | Operation                \
  \        | Name        | Starts | E-Rows | A-Rows |   A-Time    | Buffers |\n| \
  \ 0 | SELECT STATEMENT                 |             |      1 |        |     10\
  \ | 00:00:03.37 |    6971 |\n|  1 |  NESTED LOOPS                    |         \
  \    |      1 |     10 |     10 | 00:00:03.37 |    6971 |\n|* 2 |   VIEW       \
  \                    |             |      1 |     10 |     10 | 00:00:03.37 |  \
  \  6969 |\n|  3 |    WINDOW NOSORT                 |             |      1 |    \
  \ 10 |  3000K | 00:00:02.91 |    6969 |\n|  4 |     INDEX FULL SCAN DESCENDING \
  \  | IDX_TRAN_ID |      1 |  3000K |  3000K | 00:00:01.11 |    6969 |\n|  5 |  \
  \    FAST DUAL                   |             |      1 |      1 |      1 | 00:00:00.01\
  \ |       0 |\n|  6 |   TABLE ACCESS BY USER ROWID     | TRANSACTION |     10 |\
  \      1 |     10 | 00:00:00.01 |       2 |\n```\n\n你可能会注意到，`WINDOW NOSORT STOPKEY`\
  \ 操作变成了 `WINDOW NOSORT`，这意味着索引被完全扫描了。因此，如果限制是通过子查询计算的，你可能希望将查询拆分成两个，并对限制使用绑定变量。\n\
  \n让我们回到原始任务：我们需要获取最新的行，直到总金额达到限制值；假设为 5000。\n\n显然，在这种情况下不能使用 `rownum` 过滤。清单 11-5\
  \ 展示了一种通过累积和来限制行数的分析方法。\n\n\n\n```\nselect t1.id, t1.value\nfrom (select sum(value)\
  \ over(order by id desc) s, t0.*\nfrom transaction t0) t1\nwhere s <= 5000;\nID\
  \      VALUE\n---------- ----------\n3000000        875\n2999999        890\n2999998\
  \        266\n2999997        337\n2999996        570\n2999995        889\n2999994\
  \        425\n2999993         64\n2999992        140\n9 rows selected.\n```\n\n\
  **清单 11-5**\n使用 `SUM` 限制行数\n\n从执行计划中可以看出，与使用 `row_number` 的原始查询（清单 11-3）相比，耗时要长得多。这是因为即使我们只需要结果集中的\
  \ 9 行，所有行也被进行了排序。\n\n| Id | Operation            | Name        | Starts | E-Rows\
  \ | A-Rows |    A-Time   | Buffers | Reads | Writes |\n|---|---|---|---|---|---|---|---|---|---|\n\
  |  0 | `SELECT STATEMENT`     |             |      1 |        |      9 | 00:00:13.59\
  \ |    6055 | 12746 |  11861 |\n|* 1 |  `VIEW`                |             |  \
  \    1 |  3000K |      9 | 00:00:13.59 |    6055 | 12746 |  11861 |\n|  2 |   `WINDOW\
  \ SORT`        |             |      1 |  3000K |  3000K | 00:00:13.07 |    6055\
  \ | 12746 |  11861 |\n|  3 |    `TABLE ACCESS FULL` | `TRANSACTION` |      1 | \
  \ 3000K |  3000K | 00:00:00.47 |    6047 |     0 |      0 |\n\n**Reads/Writes**\
  \ 列表示排序操作使用了临时表空间。让我们在将 `sort area size` 增加到其最大可能值后重新运行测试。\n\n```\nalter session\
  \ set workarea_size_policy = manual;\nalter session set sort_area_size = 2147483647;\n\
  ```\n\n| Id | Operation            | Name        | Starts | E-Rows | A-Rows |  \
  \ A-Time    | Buffers |\n|---|---|---|---|---|---|---|---|\n|  0 | `SELECT STATEMENT`\
  \     |             |      1 |        |      9 | 00:00:04.95 |    6047 |\n|* 1 |\
  \  `VIEW`                |             |      1 |  3000K |      9 | 00:00:04.95\
  \ |    6047 |\n|  2 |   `WINDOW SORT`        |             |      1 |  3000K | \
  \ 3000K | 00:00:04.48 |    6047 |\n|  3 |    `TABLE ACCESS FULL` | `TRANSACTION`\
  \ |      1 |  3000K |  3000K | 00:00:00.44 |    6047 |\n\n进行此更改后，有足够的内存来执行排序，执行时间显著下降，但无论如何都没有必要对表中所有行进行排序。\n\
  \n假设 `ID` 是连续编号的（这在真实数据中极为罕见），我们可以使用基于递归子查询因子化的下一种方法。\n\n```\nwith rec(id, value,\
  \ s) as\n(\nselect id, value, value\nfrom transaction\nwhere id = (select max(id)\
  \ from transaction)\nunion all\nselect t.id, t.value, rec.s + t.value\nfrom transaction\
  \ t\njoin rec on rec.id - 1 = t.id\nwhere rec.s + t.value <= 5000\n)\nselect * from\
  \ rec;\n```\n\n**清单 11-6**\n使用递归子查询因子化限制行数 – 适用于连续编号\n\n执行时间再次降至 1 厘秒。\n\n|  Id\
  \ | Operation                                  | Name        | Starts | E-Rows |\
  \ A-Rows |   A-Time    | Buffers |\n|---|---|---|---|---|---|---|---|\n|   0 | `SELECT\
  \ STATEMENT`                           |             |      1 |        |      9\
  \ | 00:00:00.01 |      35 |\n|   1 |  `VIEW`                                   \
  \   |             |      1 |      2 |      9 | 00:00:00.01 |      35 |\n|   2 |\
  \   `UNION ALL (RECURSIVE WITH) BREADTH FIRST` |             |      1 |        |\
  \      9 | 00:00:00.01 |      35 |\n|   3 |    `TABLE ACCESS BY INDEX ROWID BATCHED`\
  \     | `TRANSACTION` |      1 |      1 |      1 | 00:00:00.01 |       7 |\n|* \
  \ 4 |     `INDEX RANGE SCAN`                       | `IDX_TRAN_ID` |      1 |  \
  \    1 |      1 | 00:00:00.01 |       6 |\n|   5 |      `SORT AGGREGATE`       \
  \                 |             |      1 |      1 |      1 | 00:00:00.01 |     \
  \  3 |\n|   6 |       `INDEX FULL SCAN (MIN/MAX)`            | `IDX_TRAN_ID` | \
  \     1 |      1 |      1 | 00:00:00.01 |       3 |\n|   7 |    `NESTED LOOPS` \
  \                           |             |      9 |      1 |      8 | 00:00:00.01\
  \ |      28 |\n|   8 |     `NESTED LOOPS`                           |          \
  \   |      9 |      1 |      9 | 00:00:00.01 |      19 |\n|   9 |      `RECURSIVE\
  \ WITH PUMP`                   |             |      9 |        |      9 | 00:00:00.01\
  \ |       0 |\n|* 10 |      `INDEX RANGE SCAN`                      | `IDX_TRAN_ID`\
  \ |      9 |      1 |      9 | 00:00:00.01 |      19 |\n|* 11 |     `TABLE ACCESS\
  \ BY INDEX ROWID`            | `TRANSACTION` |      9 |      1 |      8 | 00:00:00.01\
  \ |       9 |\n\n对于 Oracle 12c，处理 `ID` 编号中的间隙很容易（对于更早的版本，你可以使用第一章小节“关联内联视图和子查询”中描述的方法），如清单\
  \ 11-7 所示。\n\n```\nwith rec(id, value, s) as\n(\nselect id, value, value\nfrom transaction\n\
  where id = (select max(id) from transaction)\nunion all\nselect t.id, t.value, rec.s\
  \ + t.value\nfrom rec\ncross apply (select max(id) id from transaction where id\
  \ < rec.id) t0\njoin transaction t on t0.id = t.id\nwhere rec.s + t.value <= 5000\n\
  )\ncycle id set c to 1 default 0\nselect * from rec;\n```\n\n|  Id | Operation \
  \                                 | Name           | Starts | E-Rows | A-Rows |\
  \   A-Time    | Buffers |\n\n\n\n##### 清单 11-7\n使用递归子查询因子化限制行数——通用情况\n```\n|   0\
  \ | SELECT STATEMENT                           |                |      1 |     \
  \   |      9 | 00:00:00.01 |     54 |\n|   1 |  VIEW                           \
  \           |                |      1 |      2 |      9 | 00:00:00.01 |     54 |\n\
  |   2 |   UNION ALL (RECURSIVE WITH) BREADTH FIRST |                |      1 | \
  \       |      9 | 00:00:00.01 |     54 |\n|   3 |    TABLE ACCESS BY INDEX ROWID\
  \ BATCHED     | TRANSACTION    |      1 |      1 |      1 | 00:00:00.01 |      7\
  \ |\n|*  4 |     INDEX RANGE SCAN                       | IDX_TRAN_ID    |     \
  \ 1 |      1 |      1 | 00:00:00.01 |      6 |\n|   5 |      SORT AGGREGATE    \
  \                    |                |      1 |      1 |      1 | 00:00:00.01 |\
  \      3 |\n|   6 |       INDEX FULL SCAN (MIN/MAX)            | IDX_TRAN_ID   \
  \ |      1 |      1 |      1 | 00:00:00.01 |      3 |\n|   7 |    NESTED LOOPS \
  \                           |                |      9 |      1 |      8 | 00:00:00.01\
  \ |     47 |\n|   8 |     NESTED LOOPS                           |             \
  \   |      9 |      1 |      9 | 00:00:00.01 |     38 |\n|   9 |      NESTED LOOPS\
  \                          |                |      9 |      1 |      9 | 00:00:00.01\
  \ |     19 |\n|  10 |       RECURSIVE WITH PUMP                  |             \
  \   |      9 |        |      9 | 00:00:00.01 |      0 |\n|  11 |       VIEW    \
  \                             | VW_LAT_EC725798|      9 |      1 |      9 | 00:00:00.01\
  \ |     19 |\n|  12 |        SORT AGGREGATE                      |             \
  \   |      9 |      1 |      9 | 00:00:00.01 |     19 |\n|  13 |         FIRST ROW\
  \                          |                |      9 |      1 |      9 | 00:00:00.01\
  \ |     19 |\n|* 14 |          INDEX RANGE SCAN (MIN/MAX)        | IDX_TRAN_ID \
  \   |      9 |      1 |      9 | 00:00:00.01 |     19 |\n|* 15 |      INDEX RANGE\
  \ SCAN                      | IDX_TRAN_ID    |      9 |      1 |      9 | 00:00:00.01\
  \ |     19 |\n|* 16 |     TABLE ACCESS BY INDEX ROWID            | TRANSACTION \
  \   |      9 |      1 |      9 | 00:00:00.01 |      9 |\n```\n\n你可能会注意到查询中的 `cycle`\
  \ 子句。尽管对所有行而言循环标记都为零，但如果没有 `cycle` 子句，查询将因 `ORA-32044: 执行递归 WITH 查询时检测到循环` 而失败。这种行为并不完全正确，本章稍后将对此进行讨论。\n\
  \n好吧，在最新版本中，递归子查询因子化能以相当高效的方式获得结果，但如果我们需要实现比累计求和限制更复杂的逻辑，或者使用的是不支持递归子查询因子化的旧版本，该怎么办呢？清单\
  \ 11-8 展示了如何将逻辑封装在一个 PL/SQL 函数中，以及创建所需类型的语句。\n\n##### 清单 11-8\n用于限制行数的类型与函数\n```\n\
  create or replace type to_id_value as object(id int, value number)\n/\ncreate or\
  \ replace type tt_id_value as table of to_id_value\n/\ncreate or replace function\
  \ f_transaction(p_limit in number)\nreturn tt_id_value\npipelined is\nl_limit number\
  \ := 0;\nbegin\nfor i in (select --+ index_desc(transaction idx_tran_id)\n*\nfrom\
  \ transaction\norder by id desc) loop\nl_limit := l_limit + i.value;\nif l_limit\
  \ <= 5000 then\npipe row(to_id_value(i.id, i.value));\nelse\nexit;\nend if;\nend\
  \ loop;\nend f_transaction;\n/\n```\n\n平均执行时间是二百分之一秒。\n\n##### 清单 11-9\n使用 PL/SQL\
  \ 函数限制行数\n```\nselect * from table(f_transaction(p_limit => 5000));\nID      VALUE\n\
  ---------- ----------\n3000000        875\n2999999        890\n2999998        266\n\
  2999997        337\n2999996        570\n2999995        889\n2999994        425\n\
  2999993         64\n2999992        140\n9 rows selected.\nElapsed: 00:00:00.02\n\
  ```\n\n让我们在提示 `--+ index_desc(transaction idx_tran_id)` 中添加一个独特的字符组合 `zzz`，并重新编译该函数，这样我们就能在\
  \ `v$sql` 中轻松找到所需语句的详细信息。执行几次之后，统计信息如下：\n\n```\ncolumn sql_text format a50\nselect\
  \ executions, rows_processed, sql_text\nfrom v$sql v\nwhere sql_text like '%index_desc(transaction\
  \ idx_tran_id) zzz%'\nand sql_text not like '%v$sql%';\nEXECUTIONS ROWS_PROCESSED\
  \ SQL_TEXT\n---------- -------------- ------------------------------------\n2  \
  \           20 SELECT --+ index_desc(transaction idx_tran_id) zzz\n* FROM TRANSACTION\
  \ ORDER BY ID DESC\n```\n\n尽管查询中没有过滤器，但只处理（获取）了 20 行，这意味着如预期那样，每次执行处理了 10 行。\n\n\
  类似的方法也可以在客户端应用程序中实现，但将逻辑封装在 PL/SQL 函数中的能力非常重要。\n\n关于带有限制的查询需要注意的最后一点是，所谓的 Top-N\
  \ 查询已在 Oracle 12c 中引入。此功能并未对 SQL 引擎做出根本性改变，如果你查看 Top-N 语法转换后的最终查询，你会看到分析函数。因此，简而言之，Top-N\
  \ 只是语法糖，避免使用它能在许多情况下编写出更高效的查询——特别是，你可以应用如清单 11-4 所示的优化技术。我认为引入此功能是基于以下原因：\n\n* \
  \  市场原因。其他关系型数据库管理系统（RDBMS）有此功能，现在 Oracle 也有了；\n*   简化从其他 RDBMS 的迁移；\n*   为非专业数据库开发人员编写即时查询提供便利；对于复杂的、对性能至关重要的查询使用此功能并不合理。\n\
  \n\n\n##### 避免多次排序\n\n关于分析函数的第二个用例将涉及由分析操作引起的排序。清单 11-10 展示了一个具有低基数维度的事实表。\n\n```sql\n\
  exec dbms_random.seed(1);\ncreate table fact_a as\nselect date '2010-01-01' + level\
  \ / (60 * 24) dt,\ntrunc(3 * dbms_random.value()) dim_1_id,\ntrunc(3 * dbms_random.value())\
  \ dim_2_id,\ntrunc(1000 * dbms_random.value()) value\nfrom dual\nconnect by level\
  \ <= 3e6;\nexec dbms_stats.gather_table_stats(user, 'fact_a');\n```\n\n**清单 11-10**\n\
  具有低基数维度的事实表\n\n目标是按每个维度及其组合——`dim_1_id`、`dim_2_id`，并按照 `dt` 排序来计算累计总和。\n\n```sql\n\
  select dt,\ndim_1_id,\ndim_2_id,\nvalue,\nsum(val) over(partition by dim_1_id order\
  \ by dt) dim1_sum,\nsum(val) over(partition by dim_2_id order by dt) dim2_sum,\n\
  sum(val) over(partition by dim_1_id, dim_2_id order by dt)\ndim1_dim2_sum\nfrom\
  \ fact_a\norder by dt\n```\n\n为了最小化提取次数，让我们使用以下查询，它只返回一行结果。\n\n```sql\nselect to_char(sum(dim1_sum),\
  \ lpad('9', 20, '9')) d1,\nto_char(sum(dim2_sum), lpad('9', 20, '9')) d2,\nto_char(sum(dim1_dim2_sum),\
  \ lpad('9', 20, '9')) d12\nfrom (select dt,\ndim_1_id,\ndim_2_id,\nvalue,\nsum(value)\
  \ over(partition by dim_1_id order by dt) dim1_sum,\nsum(value) over(partition by\
  \ dim_2_id order by dt) dim2_sum,\nsum(value) over(partition by dim_1_id, dim_2_id\
  \ order by dt)\ndim1_dim2_sum\nfrom fact_a\norder by dt);\nD1                  \
  \  D2                    D12\n------------------- --------------------- ---------------------\n\
  749461709848354       749461230723892       249821726573778\n```\n\n查询计划中存在三次排序，尽管总是按照\
  \ `dt` 排序。这是因为分区的表达式不同。\n\n```\n| Id | Operation                | Name   | Starts\
  \ | E-Rows  | A-Rows  |   A-Time    | Buffers | Reads | Writes |\n|  0 | SELECT\
  \ STATEMENT         |        |      1 |         |      1  | 00:01:21.85 |    9272\
  \ | 96051 |  90717 |\n|  1 |  SORT AGGREGATE          |        |      1 |      1\
  \  |      1  | 00:01:21.85 |    9272 | 96051 |  90717 |\n|  2 |   VIEW         \
  \          |        |      1 |   3000K |   3000K | 00:01:21.06 |    9272 | 96051\
  \ |  90717 |\n|  3 |    SORT ORDER BY         |        |      1 |   3000K |   3000K\
  \ | 00:01:20.05 |    9272 | 96051 |  90717 |\n|  4 |     WINDOW SORT          |\
  \        |      1 |   3000K |   3000K | 00:01:11.46 |    9267 | 82098 |  76764 |\n\
  |  5 |      WINDOW SORT         |        |      1 |   3000K |   3000K | 00:00:42.91\
  \ |    9257 | 48721 |  45685 |\n|  6 |       WINDOW SORT        |        |     \
  \ 1 |   3000K |   3000K | 00:00:20.28 |    9249 | 21504 |  20284 |\n|  7 |     \
  \   TABLE ACCESS FULL | FACT_A |      1 |   3000K |   3000K | 00:00:00.49 |    9240\
  \ |     0 |      0 |\n```\n\n总执行时间大约为 1 分 20 秒，并且从 `Reads`/`Writes` 列可以看出，所有三次排序都导致了从临时表空间的读写。让我们为排序设置最大可能的内存并重新运行查询。\n\
  \n```sql\nalter session set workarea_size_policy = manual;\nalter session set sort_area_size\
  \ = 2147483647;\n```\n\n经过时间减少了四倍，并且所有排序都在内存中执行。\n\n```\n| Id | Operation      \
  \          | Name   | Starts | E-Rows  | A-Rows  |   A-Time    | Buffers |\n|  0\
  \ | SELECT STATEMENT         |        |      1 |         |      1  | 00:00:21.08\
  \ |    9240 |\n|  1 |  SORT AGGREGATE          |        |      1 |      1  |   \
  \   1  | 00:00:21.08 |    9240 |\n|  2 |   VIEW                   |        |   \
  \   1 |   3000K |   3000K | 00:00:20.41 |    9240 |\n|  3 |    SORT ORDER BY   \
  \      |        |      1 |   3000K |   3000K | 00:00:19.59 |    9240 |\n|  4 | \
  \    WINDOW SORT          |        |      1 |   3000K |   3000K | 00:00:17.50 |\
  \    9240 |\n|  5 |      WINDOW SORT         |        |      1 |   3000K |   3000K\
  \ | 00:00:11.83 |    9240 |\n|  6 |       WINDOW SORT        |        |      1 |\
  \   3000K |   3000K | 00:00:06.58 |    9240 |\n|  7 |        TABLE ACCESS FULL |\
  \ FACT_A |      1 |   3000K |   3000K | 00:00:00.47 |    9240 |\n```\n\n考虑到此查询中分析窗口的特性，我们可以使用\
  \ PL/SQL 关联数组和一个带有单次 `order by` 的游标来实现所需的逻辑。清单 11-11 展示了这种方法和所需的类型。\n\n```sql\n\
  create or replace function f_fact_a return tt_fact_a\npipelined is\ntype tt1 is\
  \ table of number index by pls_integer;\ntype tt2 is table of tt1 index by pls_integer;\n\
  l_dim1  tt1;\nl_dim2  tt1;\nl_dim12 tt2;\nbegin\nfor r in (select /*+ lvl 0 */\n\
  dt, dim_1_id, dim_2_id, value\nfrom fact_a\norder by dt) loop\n-- NoFormat Start\n\
  l_dim1(r.dim_1_id) := case\nwhen l_dim1.exists(r.dim_1_id)\nthen l_dim1(r.dim_1_id)\n\
  else 0\nend + r.value;\nl_dim2(r.dim_2_id) := case\nwhen l_dim2.exists(r.dim_2_id)\n\
  then l_dim2(r.dim_2_id)\nelse 0\nend + r.value;\nl_dim12(r.dim_1_id)(r.dim_2_id)\
  \ :=\ncase\nwhen l_dim12.exists(r.dim_1_id)\nand l_dim12(r.dim_1_id).exists(r.dim_2_id)\n\
  then l_dim12(r.dim_1_id)(r.dim_2_id)\nelse 0\nend + r.value ;\n-- NoFormat End\n\
  pipe row(to_fact_a(r.dt,\nr.dim_1_id,\nr.dim_2_id,\nr.value,\nl_dim1(r.dim_1_id),\n\
  l_dim2(r.dim_2_id),\nl_dim12(r.dim_1_id) (r.dim_2_id)));\nend loop;\nend;\n/\n\n\
  create or replace type to_fact_a as object\n(\ndt            date,\ndim_1_id   \
  \   number,\ndim_2_id      number,\nvalue         number,\ndim1_sum      number,\n\
  dim2_sum      number,\ndim1_dim2_sum number\n)\n/\n\ncreate or replace type tt_fact_a\
  \ as table of to_fact_a\n/\n```\n\n**清单 11-11**\n避免多次排序操作\n\n让我们编译一个禁用了 PL/SQL 优化的函数。\n\
  \n```sql\nalter session set plsql_optimize_level = 0;\nalter function f_fact_a compile;\n\
  set timing on\nselect to_char(sum(dim1_sum), lpad('9', 20, '9')) d1,\nto_char(sum(dim2_sum),\
  \ lpad('9', 20, '9')) d2,\nto_char(sum(dim1_dim2_sum), lpad('9', 20, '9')) d12\n\
  from table(f_fact_a)\norder by dt;\n```\n\n平均执行时间约为 45 秒，这比 SQL 方法更差。\n\n现在，让我们将参数值\
  \ `plsql_optimize_level` 改为 2（这是默认值），并在代码中将 `/*+ lvl 0 */` 替换为 `/*+ lvl 2 */` 后重新编译该函数。\n\
  \n平均执行时间变为 12-14 秒，这比 SQL 方法更好。\n\n如此显著改进的原因在于，默认优化级别的提取大小（fetch size）是 100 行。你可以在\
  \ `v$sql` 视图中轻松验证这一点。\n\n```sql\nselect regexp_substr(sql_text, '/.*/') hint,\n\
  executions,\nfetches,\nrows_processed\nfrom v$sql s\nwhere sql_text like '%FROM\
  \ FACT_A%'\nand sql_text not like '%v$sql%';\nHINT            EXECUTIONS    FETCHES\
  \ ROWS_PROCESSED\n--------------- ---------- ---------- --------------\n/*+ lvl\
  \ 0 */             2    6000002        6000000\n/*+ lvl 2 */             2     \
  \ 60002        6000000\n```\n\n因此，对于这个任务，PL/SQL 方法大约快 35%，但对于更多数量的累计总和，差异会更加显著。更重要的是，可以增加提取大小，这将使\
  \ PL/SQL 方法快数倍。关于此的更多信息可以在“从 PL/SQL 执行 SQL：最佳和最差实践”[9]中找到。\n\n\n\n##### 迭代式计算\n\n\
  Oracle 至少提供了两种在 SQL 中基于记录集执行迭代式计算的方法：迭代模型和递归子查询因子化。迭代模型的源数据是单个记录集，您不能使用任何额外的数据结构（如列表或栈）；其次，可能只能有一个循环计数器（出于学术兴趣，第\
  \ 10 章“图灵完备性”中展示了使用迭代模型实现的冒泡排序）。递归子查询因子化的特点是，在每次迭代中，您只能使用前一次迭代的数据，即使结果集包含所有迭代的数据。简而言之，这些功能的应用范围相当有限，更不用说可扩展性问题以及对内存和\
  \ CPU 的密集使用了。\n\n您可以在下一章找到一些使用迭代模型或递归子查询因子化的解决方案，以及它们与 PL/SQL 方法的比较。然而，在本章中，我们将考虑几个可以使用纯\
  \ SQL 解决的任务，无需用到这些高级功能及其在 PL/SQL 中的替代方案。\n\n##### 当没有有效的内置访问方法时\n\n假设目标是返回一个非空、低基数列的不同值。\n\
  \n```sql\ncreate table t_str(str varchar2(30) not null, padding varchar2(240));\n\
  insert into t_str\nselect 'AAA', lpad('x', 240, 'x') from dual\nunion all\nselect\
  \ 'BBB', lpad('x', 240, 'x') from dual\nunion all\nselect lpad('C', 30, 'C'), lpad('x',\
  \ 240, 'x') from dual\nconnect by rownum <= 3e6\nunion all\nselect 'DDD', lpad('x',\
  \ 240, 'x') from dual;\ncreate index t_str_idx on t_str(str);\nexec dbms_stats.gather_table_stats(user,'t_str');\n\
  ```\n\n当然，一个简单的解决方案是使用 `distinct` 关键字。\n\n```sql\nselect distinct str from t_str;\n\
  STR\n------------------------------\nBBB\nAAA\nCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC\n\
  DDD\n```\n\n```\n| Id | Operation              | Name      | Starts | E-Rows  |\
  \ A-Rows  |   A-Time    | Buffers |\n|----|------------------------|-----------|--------|---------|---------|-------------|---------|\n\
  |  0 | SELECT STATEMENT       |           |      1 |         |      4  | 00:00:01.04\
  \ |   17662 |\n|  1 |  HASH UNIQUE           |           |      1 |      4  |  \
  \    4  | 00:00:01.04 |   17662 |\n|  2 |   INDEX FAST FULL SCAN | T_STR_IDX | \
  \     1 |   3000K |   3000K | 00:00:00.53 |   17662 |\n```\n\n执行时间超过 1 秒，并且需要近 18000\
  \ 次逻辑读取。\n\n列表 11-12 展示了如何使用递归子查询因子化来获取列的不同值列表。\n\n```sql\nwith rec(lvl, str) as\n\
  (\n  select 1, min(str) from t_str\n  union all\n  select lvl + 1, (select min(str)\
  \ from t_str where str > rec.str)\n  from rec\n  where str is not null\n)\nselect\
  \ * from rec where str is not null;\n```\n\n```\n| Id | Operation              \
  \                    | Name      | Starts | E-Rows | A-Rows |   A-Time    | Buffers\
  \ |\n|----|--------------------------------------------|-----------|--------|--------|--------|-------------|---------|\n\
  |  0 | SELECT STATEMENT                           |           |      1 |       \
  \ |      4 | 00:00:00.01 |      13 |\n|* 1 |  VIEW                             \
  \         |           |      1 |      2 |      4 | 00:00:00.01 |      13 |\n|  2\
  \ |   UNION ALL (RECURSIVE WITH) BREADTH FIRST |           |      1 |        | \
  \     5 | 00:00:00.01 |      13 |\n|  3 |    SORT AGGREGATE                    \
  \      |           |      1 |      1 |      1 | 00:00:00.01 |       3 |\n|  4 |\
  \     INDEX FULL SCAN (MIN/MAX)              | T_STR_IDX |      1 |      1 |   \
  \   1 | 00:00:00.01 |       3 |\n|  5 |    SORT AGGREGATE                      \
  \    |           |      4 |      1 |      4 | 00:00:00.01 |      10 |\n|  6 |  \
  \   FIRST ROW                              |           |      4 |      1 |     \
  \ 3 | 00:00:00.01 |      10 |\n|* 7 |      INDEX RANGE SCAN (MIN/MAX)          \
  \  | T_STR_IDX |      4 |      1 |      3 | 00:00:00.01 |      10 |\n|  8 |    RECURSIVE\
  \ WITH PUMP                     |           |      5 |        |      4 | 00:00:00.01\
  \ |       0 |\n```\n\n列表 11-12 使用递归子查询因子化获取列的不同值\n\n执行时间缩短了超过 100 倍，逻辑读取次数减少了超过\
  \ 1000 倍。这是通过执行几次 \"`INDEX RANGE SCAN (MIN/MAX)`\" 操作而不是 \"`INDEX FAST FULL SCAN`\"\
  \ 实现的。\n\n列表 11-13 展示了如何使用 PL/SQL 函数为旧版 Oracle 实现类似的逻辑。\n\n```sql\ncreate or replace\
  \ function f_str return strings\npipelined is\n  l_min t_str.str%type;\nbegin\n\
  \  select min(str) into l_min from t_str;\n  pipe row(l_min);\n  while true loop\n\
  \    select min(str) into l_min from t_str where str > l_min;\n    if l_min is not\
  \ null then\n      pipe row(l_min);\n    else\n      return;\n    end if;\n  end\
  \ loop;\nend f_str;\n/\n```\n\n列表 11-13 用于获取列不同值的 PL/SQL 函数\n\n让我们使用 `dbms_hprof`\
  \ 包来分析性能：\n\n```sql\nexec dbms_hprof.start_profiling('UDUMP', '1.trc');\nPL/SQL\
  \ procedure successfully completed.\nselect column_value str from table(f_str);\n\
  STR\n------------------------------\nAAA\nBBB\nCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC\n\
  DDD\nexec dbms_hprof.stop_profiling;\nPL/SQL procedure successfully completed.\n\
  select dbms_hprof.analyze('UDUMP', '1.trc') runid from dual;\n     RUNID\n----------\n\
  \         4\n```\n\n列表 11-13 显示了分析结果。如您所见，第 5 行的查询执行了一次，第 8 行的查询执行了 4 次，总耗时 931\
  \ 微秒，约 0.01 秒，这与使用递归子查询因子化的方法非常接近。\n\n```sql\nselect pci.runid,\n       level depth,\n\
  \       rpad(' ', (level - 1) * 3, ' ') || fi.function as name,\n       fi.subtree_elapsed_time,\n\
  \       fi.function_elapsed_time,\n       fi.calls\nfrom (select runid, parentsymid,\
  \ childsymid\n      from dbmshp_parent_child_info\n      union all\n      select\
  \ runid, null, 2 from dbmshp_runs) pci\njoin dbmshp_function_info fi\n  on pci.runid\
  \ = fi.runid\n and pci.childsymid = fi.symbolid\n and fi.function != 'STOP_PROFILING'\n\
  connect by prior childsymid = parentsymid\n       and prior pci.runid = pci.runid\n\
  start with pci.parentsymid is null\n       and pci.runid in (4);\n```\n\n```\nRUNID\
  \  DEPTH NAME                        SUBTREE_ELAPSED_TIME FUNCTION_ELAPSED_TIME\
  \ CALLS\n----- ------ --------------------------- -------------------- ---------------------\
  \ -----\n    4      1 __plsql_vm                                   931         \
  \           16     3\n    4      2   __anonymous_block                         \
  \  77                    77     1\n    4      2   F_STR                        \
  \              838                   110     2\n    4      3     __static_sql_exec_line5\
  \                  198                   198     1\n    4      3     __static_sql_exec_line8\
  \                  530                   530     4\n```\n\n列表 11-14 使用 `dbms_hprof`\
  \ 的执行统计信息\n\nSQL 语句的附加统计信息可以在 `v$sql` 中找到，如前面的示例所示。\n\n\n\n##### 组合性质的问题\n\n与数据相关的组合问题可能需要生成排列来分析元素的组合。SQL\
  \ 提供了多种生成记录集的方法——`connect by`（层次查询）、`recursive subquery factoring`（递归子查询分解）和`model`子句；但如果你想在生成过程中引用或复用已生成的数据，这可能会很棘手或效率低下。\n\
  \n让我们考虑一个具体的例子：对于一组行，生成所有包含两个或更多元素的可能子集的数值总和。清单 11-15 展示了一个脚本，用于生成一个记录集，其中每个值都大于之前生成的所有值的总和；因此每个子集的总和都是唯一的。\n\
  \n```\nexec dbms_random.seed(3);\ncreate table t_num as\nselect id, num\nfrom dual\n\
  model\ndimension by (1 id)\nmeasures (1 num)\n(\nnum[for id from 2 to 19 increment\
  \ 1] order by id =\nsum(num)[any] + trunc(dbms_random.value(1, 11))\n);\nListing\
  \ 11-15\n创建输入集\n```\n\n前三个元素的所有排列及其总和如下：\n\n```\nselect * from t_num where id <=\
  \ 3;\nID        NUM\n---------- ----------\n1          1\n2          8\n3      \
  \   15\n1 + 8 = 9\n1 + 15 = 16\n8 + 15 = 23\n1 + 8 + 15 = 24\n```\n\n为了衡量性能，我们将计算总和以最小化获取操作，但主要目标是生成所有子集并计算其总和。n\
  \ 个元素的所有子集数量为 `2^n`，包括空子集、单元素子集和原始集合本身。不包括单元素子集的总和等于 ![ $$ \\frac{2^n}{2}\\sum \\\
  limits_{i=1}^n{x}_i-\\sum \\limits_{i=1}^n{x}_i=\\left({2}^{n-1}-1\\right)\\sum\
  \ \\limits_{i=1}^n{x}_i $$ ](img/A455196_1_En_11_Chapter_IEq1.gif) ，对于三行数据是 72，对于所有行数据是\
  \ 536338548711。\n\n```\nselect sum(num) * (power(2, count(*) - 1) - 1) total from\
  \ t_num;\nTOTAL\n----------\n```\n\n至少有两种直接的方法可以使用 `connect by` 生成所有排列并计算它们的总和，如清单\
  \ 11-16 所示。\n\n```\nwith\nt1 as\n(select power(2, rownum-1) row_mask, num from t_num),\n\
  t2 as\n(select rownum as total_mask\nfrom (select count(*) as cnt from t1)\nconnect\
  \ by rownum < power(2, cnt)\n)\nselect count(*) cnt, sum(num) sum_num\nfrom (select\
  \ total_mask as id, sum(num) as num\nfrom t2, t1\nwhere bitand(row_mask, total_mask)\
  \ != 0\ngroup by total_mask\nhaving count(*) > 1);\nCNT       SUM_NUM\n----------\
  \ -------------\n524268  536338548711\nListing 11-16\nConnect by + 连接以获取所有子集的总和\n\
  ```\n\n执行时间约为 25 秒，大部分时间花在执行嵌套循环和重新评估子查询 `t1` 524268 次上。如果我们在 `t1` 中指定 `materialized`\
  \ 提示，则可以进行优化；之后执行时间下降到 14 秒。\n\n```\n---------------------------------------------------------------------------------------------------------------\n\
  | Id  | Operation                           | Name  | Starts  | E-Rows | A-Rows\
  \  |    A-Time   | Buffers  |\n---------------------------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                    |       |      1  |        |      1\
  \  | 00:00:25.81 |    1572K |\n|   1 |  SORT AGGREGATE                      |  \
  \     |      1  |      1 |      1  | 00:00:25.81 |    1572K |\n|   2 |   VIEW  \
  \                            |       |      1  |      1 |    524K | 00:00:25.70\
  \ |    1572K |\n|*  3 |    FILTER                           |       |      1  |\
  \        |    524K | 00:00:25.54 |    1572K |\n|   4 |     HASH GROUP BY       \
  \            |       |      1  |      1 |    524K | 00:00:25.36 |    1572K |\n|\
  \   5 |      NESTED LOOPS                   |       |      1  |      1 |   4980K\
  \ | 00:00:22.24 |    1572K |\n|   6 |       VIEW                          |    \
  \   |      1  |      1 |    524K | 00:00:01.39 |       3  |\n|   7 |        COUNT\
  \                        |       |      1  |        |    524K | 00:00:01.17 |  \
  \     3  |\n|   8 |         CONNECT BY WITHOUT FILTERING|       |      1  |    \
  \    |    524K | 00:00:00.98 |       3  |\n|   9 |          VIEW               \
  \        |       |      1  |      1 |      1  | 00:00:00.01 |       3  |\n|  10\
  \ |           SORT AGGREGATE            |       |      1  |      1 |      1  | 00:00:00.01\
  \ |       3  |\n|  11 |            VIEW                     |       |      1  |\
  \     19 |     19  | 00:00:00.01 |       3  |\n|  12 |             COUNT       \
  \            |       |      1  |        |     19  | 00:00:00.01 |       3  |\n|\
  \  13 |              TABLE ACCESS FULL      | T_NUM |      1  |     19 |     19\
  \  | 00:00:00.01 |       3  |\n|* 14 |       VIEW                          |   \
  \    |    524K |      1 |   4980K | 00:00:19.37 |    1572K |\n|  15 |        COUNT\
  \                        |       |    524K |        |   9961K | 00:00:10.07 |  \
  \  1572K |\n|  16 |         TABLE ACCESS FULL           | T_NUM |    524K |    \
  \ 19 |   9961K | 00:00:07.02 |    1572K |\n---------------------------------------------------------------------------------------------------------------\n\
  ```\n\n我们可以通过使用 `sys_connect_by_path` 函数生成求和表达式并实现一个函数来计算它，从而避免连接——这种方法如清单 11-17\
  \ 所示。\n\n```\nselect count(*) cnt, sum(f_calc(path)) sum_num\nfrom (select sys_connect_by_path(num,\
  \ '+') || '+' as path\nfrom t_num\nwhere level > 1\nconnect by num > prior num);\n\
  create or replace function f_calc(p_str in varchar2) return number is\npragma udf;\n\
  result number := 0;\ni      int := 0;\nn      varchar2(30);\nbegin\nwhile true loop\n\
  \    i := i + 1;\n    n := substr(p_str,\n                instr(p_str, '+', 1, i)\
  \ + 1,\n                instr(p_str, '+', 1, i + 1) - instr(p_str, '+', 1, i) -\
  \ 1);\n    if n is not null then\n        result := result + n;\n    else\n    \
  \    exit;\n    end if;\nend loop;\nreturn result;\nend f_calc;\nListing 11-17\n\
  Connect by + UDF 以获取所有子集的总和\n```\n\n如果指定 `pragma udf`，执行大约需要 7 秒，否则需要 10 秒。大部分资源用于计算总和表达式，如果我们注释掉\
  \ `sum(f_calc(path))`，执行时间不到 1 秒。\n\n现在让我们使用临时表来存储中间结果：\n\n```\ncreate global temporary\
  \ table tmp(lvl int, x int, num number);\n```\n\n这使得仅用半秒钟就能生成所有组合的总和！\n\n```\nbegin\n\
  insert into tmp (lvl, x, num)\n    select 1, rownum, num from (select num from t_num\
  \ order by num);\nfor c in (select rownum x, num\n          from (select num from\
  \ t_num order by num)) loop\n    insert into tmp (lvl, x, num)\n    select c.x,\
  \ 0, tmp.num + c.num from tmp where tmp.x = c.x - 1;\n    commit;\nend loop;\nend;\n\
  /\nselect count(*) cnt, sum(num) sum_num from tmp where lvl != 0;\nCNT       SUM_NUM\n\
  ---------- -------------\n524268  536338548711\n已用时间: 00:00:00.03\n```\n\n\n\n显然，对于此任务，**PL/SQL**\
  \ 方法的性能远优于 **SQL**。PL/SQL 代码给人一种印象，即此逻辑也可以使用递归子查询因子化来实现。但有一个问题——在 **PL/SQL** 循环中，我们需要一个包含所有迭代数据的完整\
  \ `tmp` 表，而递归子查询因子化仅访问前一次迭代的数据。我们可以使用一个技巧，通过额外的联接将前一次迭代的记录集添加到当前迭代的记录集中。此方法如代码清单\
  \ 11-18 所示。\n\n```\nwith\nr0(x, num) as\n(select rownum, num from (select num from\
  \ t_num order by num)),\nrec(iter, lvl, x, num) as\n(select 1, 1, rownum, num from\
  \ r0\nunion all\nselect rec.iter + 1,\ndecode(z.id, 1, rec.lvl, rec.lvl + 1),\n\
  decode(z.id, 1, rec.x, 0),\ndecode(z.id, 1, rec.num, rec.num + r0.num)\nfrom rec\n\
  join r0\non rec.iter + 1 = r0.x\njoin (select 1 id from dual union all select 2\
  \ id from dual) z\non (z.id = 1 or rec.x < r0.x)\nwhere rec.iter < 15\n)\nselect\
  \ * from rec\nwhere iter = 15 and lvl = 1;\n代码清单 11-18\n使用递归子查询因子化获取所有子集的和\n```\n\
  \n尽管此方法有效并产生正确结果，但效率相当低，因为在每次迭代中，我们都会复制所有前一次迭代的数据。如果我们将 `sort_area_size` 设置为最大值，则耗时约为\
  \ 30 秒，但无论如何，这主要是出于学术目的进行演示，以说明即使是简单的 **PL/SQL** 循环也可能无法通过递归子查询因子化高效地重新实现。\n\n如果我们改变查询中的联接顺序，它将失败并出现\
  \ `ORA-32044: cycle detected while executing recursive WITH query` 错误，并且为了避免此错误，需要\
  \ `cycle` 子句，尽管这是一个逻辑上等效的查询，并且即使没有 `cycle` 子句，其执行计划也与代码清单 11-18 中的查询相同。\n\n```\n\
  ...\nfrom rec\ncross join (select 1 id from dual union all select 2 id from dual)\
  \ z\njoin r0\non rec.iter + 1 = r0.x\nwhere (z.id = 1 or rec.x < r0.x))\ncycle iter\
  \ set c to 1 default 0\n...\n```\n\n本节分析了两项任务：在第一种情况下，迭代有助于避免扫描不必要的数据或“优化计划”；而第二项任务本身具有迭代性质。\n\
  \n##### 联接与子查询的特性\n\nSQL 设计用于处理记录集，实际上只有三种联接方法——`HASH JOIN`（哈希联接）、`NESTED LOOPS`（嵌套循环）和\
  \ `MERGE JOIN`（合并联接）。它们都有各自的优缺点和适用范围；`HASH JOIN` 和 `MERGE JOIN` 不能像 `NESTED LOOPS`\
  \ 那样用于任意谓词。\n\n谈到子查询，存在一些限制，例如相关子查询的嵌套限制，这有时使得无法在子查询中实现复杂逻辑。这些限制以及其他一些细节和示例将在以下小节中讨论。\n\
  \n##### 联接的特性\n\n在本小节中，我们将考虑一个任务，其中 **PL/SQL** 帮助以比 **SQL** 更高效的方式实现查找。\n\n代码清单\
  \ 11-19 展示了创建一个包含电话呼叫信息的表的脚本，该表包含电话号码和以分钟为单位的时长。\n\n```\ncreate table phone_call\
  \ (num varchar2(11), duration int);\nexec dbms_random.seed(1);\ninsert --+ append\n\
  into phone_call\nselect '01' || to_char(trunc(1e9 * dbms_random.value), 'fm099999999'),\n\
  trunc(dbms_random.value(1, 5 + 1))\nfrom dual\nconnect by level <= 1e6;\ncommit;\n\
  exec dbms_stats.gather_table_stats(user, 'phone_call');\n代码清单 11-19\n包含电话呼叫信息的表\n\
  ```\n\n代码清单 11-20 展示了创建一个包含英国电话区号静态列表的表的脚本。如果您没有权限在 Oracle 中通过 `httpuritype` 获取它，可以使用\
  \ [`​www.​area-codes.​org.​uk/​uk-area-codes.​xlsx`](http://www.area-codes.org.uk/uk-area-codes.xlsx)\
  \ 下载此列表并手动导入。\n\n```\ncreate table phone_code as\nwith tbl as\n(select regexp_substr(httpuritype('http://www.area-codes.org.uk/full-uk-area-code-list.php')\n\
  .getclob(),\n'.*?',\n1,\n1,\n'n') c\nfrom dual)\nselect *\nfrom xmltable('/table/tr'\
  \ passing xmltype((select c from tbl))\ncolumns\ncode varchar2(6) path '/tr/td[1]',\n\
  area varchar2(50) path '/tr/td[2]')\norder by 1;\nexec dbms_stats.gather_table_stats(user,\
  \ 'phone_call');\n代码清单 11-20\n包含电话区号列表的表\n```\n\n目标是计算每个区号的总时长。\n\n预生成的数据中有一些特点：\n\
  \n1.  为简单起见，电话号码以 `01` 开头，但实际上前两位数字可以是 `01`、`02`、`03`、`05`、`07`、`08` 和 `09`。\n2.\
  \  有些电话号码是不正确的，因为它们的区号不存在：例如，`0119`。这是生成的副作用，此类呼叫将从结果中排除。\n3.  号码不是唯一的，这可以通过下面的查询轻松检查。\n\
  \n```\nselect count(*) cnt_all, count(distinct num) cnt_dist from phone_call;\n\
  CNT_ALL   CNT_DIST\n---------- ----------\n1000000     999490\n```\n\n谈到电话区号，一个区号可能是另一个区号的前缀。在这种情况下，作为电话号码前缀的最长区号才是实际的区号。\n\
  \n```\nselect *\nfrom phone_code pc1\njoin phone_code pc2\non pc2.code like pc1.code\
  \ || '%'\nand pc2.code <> pc1.code\norder by 1, 3;\nCODE   AREA                \
  \        CODE   AREA\n------ --------------------------- ------ --------------------\n\
  01387  Dumfries                    013873 Langholm\n01524  Lancaster           \
  \        015242 Hornby\n01539  Kendal                      015394 Hawkshead\n01539\
  \  Kendal                      015395 Grange-Over-Sands\n01539  Kendal         \
  \             015396 Sedbergh\n01697  Brampton (6 figure numbers) 016973 Wigton\n\
  01697  Brampton (6 figure numbers) 016974 Raughton Head\n01697  Brampton (6 figure\
  \ numbers) 016977 Brampton (4 and 5 figure numbers)\n01768  Penrith            \
  \         017683 Appleby\n01768  Penrith                     017684 Pooley Bridge\n\
  01768  Penrith                     017687 Keswick\n01946  Whitehaven           \
  \       019467 Gosforth\n12 rows selected.\n```\n\n以 `01` 开头的可能前缀长度为 4、5 和 6 位数字。\n\
  \n```\nselect length(code) l, count(*) cnt\nfrom phone_code\nwhere code like '01%'\n\
  group by length(code)\norder by 1;\nL        CNT\n---------- ----------\n4     \
  \    12\n5        582\n6         12\n```\n\n对于其他国家/地区，区号长度的范围可能要广泛得多，并且一个区号是另一个区号前缀的情况可能要多得多。\n\
  \n一个直接的解决方案如下：\n\n```\nselect code, sum(duration) s\nfrom (select ca.rowid,\nnum,\n\
  duration,\nmax(code)\nkeep(dense_rank first order by length(code) desc) code\nfrom\
  \ phone_call ca\nleft join phone_code co\non ca.num like co.code || '%'\ngroup by\
  \ ca.rowid, num, duration)\nwhere code is not null\ngroup by code\norder by code;\n\
  ```\n\n\n\n为了最小化输出和获取开销，我们将使用一个聚合函数结合内联视图来进行性能测试。\n\n##### 初始方法与分析\n\n```\nselect\
  \ sum(code * sum(duration)) s, count(*) cnt\nfrom (select ca.rowid,\nnum,\nduration,\n\
  max(code)\nkeep(dense_rank first order by length(code) desc) code\nfrom phone_call\
  \ ca\njoin phone_code co\non ca.num like co.code || '%'\ngroup by ca.rowid, num,\
  \ duration)\ngroup by code;\nS        CNT\n---------- ----------\n2884843733   \
  \     606\nselect * from table(dbms_xplan.display_cursor(null,null,'IOSTATS LAST'));\n\
  \n|  Id | Operation               | Name       | Starts |E-Rows  | A-Rows  |   A-Time\
  \    | Buffers  |\n\n|   0 | SELECT STATEMENT        |            |      1 |   \
  \     |      1  | 00:01:08.44 |    1696K |\n|   1 |  SORT AGGREGATE         |  \
  \          |      1 |     1  |      1  | 00:01:08.44 |    1696K |\n|   2 |   HASH\
  \ GROUP BY         |            |      1 |     1  |    606  | 00:01:08.44 |    1696K\
  \ |\n|   3 |    VIEW                 |            |      1 |  2000K |    701K |\
  \ 00:01:08.23 |    1696K |\n|   4 |     SORT GROUP BY       |            |     \
  \ 1 |  2000K |    701K | 00:01:08.06 |    1696K |\n|   5 |      NESTED LOOPS   \
  \    |            |      1 |  2000K |    702K | 00:01:04.81 |    1696K |\n|   6\
  \ |       TABLE ACCESS FULL | PHONE_CODE |      1 |   611  |    611  | 00:00:00.01\
  \ |       4  |\n|*  7 |       TABLE ACCESS FULL | PHONE_CALL |    611 |  3273  |\
  \    702K | 00:01:04.57 |    1696K |\n\n```\n\n从执行计划中可以看出，执行期间没有使用临时表空间（没有`Reads/Writes`列），所有数据都从内存中读取。由于谓词中包含`like`运算符，唯一的连接方法是`NESTED\
  \ LOOPS`。事实上，大部分时间都花在了`NESTED LOOPS`上，后续的分组和排序操作只增加了大约 3 秒钟。\n\n为了将表缓存在内存中，你可能需要禁用直接路径读取——执行“`alter\
  \ session set events '10949 trace name context forever, level 1';`”。\n\n##### 使用交叉连接优化为哈希连接\n\
  \n既然我们提前知道`code`长度的可能范围，就可以利用这一点，通过添加一个辅助连接来获取给定范围内的所有前缀，从而实现`HASH JOIN`方法。\n\n\
  ```\nselect sum(code * sum(duration)) s, count(*) cnt\nfrom (select ca.rowid,\n\
  num,\nduration,\nmax(code)\nkeep(dense_rank first order by length(code) desc) code\n\
  from phone_call ca\ncross join (select rownum + 3 idx\nfrom dual connect by rownum\
  \ <= 3) x\njoin phone_code co\non substr(ca.num, 1, x.idx) = co.code\ngroup by ca.rowid,\
  \ num, duration)\ngroup by code;\n\n|  Id  | Operation                         \
  \   | Name       | Starts | E-Rows  | A-Rows  |   A-Time    | Buffers |\n\n|   0\
  \ | SELECT STATEMENT                      |            |      1 |         |    \
  \  1  | 00:00:04.86 |    2781 |\n|   1 |  SORT AGGREGATE                       |\
  \            |      1 |      1  |      1  | 00:00:04.86 |    2781 |\n|   2 |   HASH\
  \ GROUP BY                       |            |      1 |      1  |    606  | 00:00:04.86\
  \ |    2781 |\n|   3 |    VIEW                               |            |    \
  \  1 |   1000K |    701K | 00:00:04.65 |    2781 |\n|   4 |     SORT GROUP BY  \
  \                   |            |      1 |   1000K |    701K | 00:00:04.47 |  \
  \  2781 |\n|*  5 |      HASH JOIN                        |            |      1 |\
  \   1000K |    702K | 00:00:03.34 |    2781 |\n|   6 |       TABLE ACCESS FULL \
  \              | PHONE_CODE |      1 |    611  |    611  | 00:00:00.01 |       4\
  \ |\n|   7 |       MERGE JOIN CARTESIAN            |            |      1 |   1000K\
  \ |   3000K | 00:00:01.44 |    2777 |\n|   8 |        VIEW                     \
  \      |            |      1 |      1  |      3  | 00:00:00.01 |       0 |\n|  \
  \ 9 |         COUNT                         |            |      1 |         |  \
  \    3  | 00:00:00.01 |       0 |\n|  10 |          CONNECT BY WITHOUT FILTERING\
  \ |            |      1 |         |      3  | 00:00:00.01 |       0 |\n|  11 | \
  \          FAST DUAL                   |            |      1 |      1  |      1\
  \  | 00:00:00.01 |       0 |\n|  12 |        BUFFER SORT                    |  \
  \          |      3 |   1000K |   3000K | 00:00:00.79 |    2777 |\n|  13 |     \
  \    TABLE ACCESS FULL             | PHONE_CALL |      1 |   1000K |   1000K | 00:00:00.05\
  \ |    2777 |\n\n```\n\n经过此修改，性能显著提升，执行时间从 68 秒降至 5 秒——快了 10 倍以上！\n\n交叉连接为每个数字生成三行，以提取相应长度的前缀，然后我们与电话区号连接，并为每个数字取最长的前缀。我们注意到，如果一个\
  \ 6 位数的连接成功了，那么当前数字就没有必要再与更短的区号连接。理想情况下，最好能与一个有序集合连接直到第一个匹配项，但这在 SQL 中无法实现。另一方面，我们可以使用\
  \ PL/SQL 函数和关联数组进行查找，从而避免任何连接。\n\n##### 使用 PL/SQL 函数与关联数组\n\n```\ncreate or replace\
  \ package phone_pkg is\ntype tp_phone_code is table of int index by varchar2(6);\n\
  g_phone_code tp_phone_code;\nfunction get_code(p_num in varchar2) return varchar2\
  \ deterministic;\nend phone_pkg;\n/\ncreate or replace package body phone_pkg is\n\
  function get_code(p_num in varchar2) return varchar2 deterministic is\nl_num varchar2(6);\n\
  begin\nl_num := substr(p_num, 1, 6);\nwhile (l_num is not null) and (not g_phone_code.exists(l_num))\
  \ loop\nl_num := substr(l_num, 1, length(l_num) - 1);\nend loop;\nreturn l_num;\n\
  end;\nbegin\nfor cur in (select * from phone_code) loop\ng_phone_code(cur.code)\
  \ := 1;\nend loop;\nend phone_pkg;\n/\nselect sum(code * sum(duration)) s, count(*)\
  \ cnt\nfrom (select ca.rowid, num, duration, phone_pkg.get_code(num) code\nfrom\
  \ phone_call ca\ngroup by ca.rowid, num, duration)\ngroup by code ;\nS        CNT\n\
  ---------- ----------\n2884843733        607\n\n|  Id | Operation              |\
  \ Name       | Starts | E-Rows  | A-Rows  |   A-Time    | Buffers |\n\n|   0 | SELECT\
  \ STATEMENT       |            |      1 |         |      1  | 00:00:06.34 |    2777\
  \ |\n|   1 |  SORT AGGREGATE        |            |      1 |      1  |      1  |\
  \ 00:00:06.34 |    2777 |\n|   2 |   HASH GROUP BY        |            |      1\
  \ |      1  |    607  | 00:00:06.34 |    2777 |\n|   3 |    VIEW               \
  \ | VM_NWVW_0  |      1 |   1000K |   1000K | 00:00:05.71 |    2777 |\n|   4 | \
  \    HASH GROUP BY      |            |      1 |   1000K |   1000K | 00:00:00.92\
  \ |    2777 |\n|   5 |      TABLE ACCESS FULL | PHONE_CALL |      1 |   1000K |\
  \   1000K | 00:00:00.06 |    2777 |\n\n```\n\n如你所见，性能比使用`HASH JOIN`的 SQL 方法稍差一些，但如果我们添加`pragma\
  \ udf`，那么 PL/SQL 方法会更快。\n\n```\n|  Id | Operation              | Name       | Starts\
  \ | E-Rows  | A-Rows  |   A-Time    | Buffers |\n\n|   0 | SELECT STATEMENT    \
  \   |            |      1 |         |      1  | 00:00:03.50 |    2777 |\n|   1 |\
  \  SORT AGGREGATE        |            |      1 |      1  |      1  | 00:00:03.50\
  \ |    2777 |\n|   2 |   HASH GROUP BY        |            |      1 |      1  |\
  \    607  | 00:00:03.50 |    2777 |\n|   3 |    VIEW                | VM_NWVW_0\
  \  |      1 |   1000K |   1000K | 00:00:03.03 |    2777 |\n|   4 |     HASH GROUP\
  \ BY      |            |      1 |   1000K |   1000K | 00:00:00.85 |    2777 |\n\
  |   5 |      TABLE ACCESS FULL | PHONE_CALL |      1 |   1000K |   1000K | 00:00:00.05\
  \ |    2777 |\n\n```\n\n如果我们使函数具有确定性，并且只传递号码的前 6 位数字作为参数，还可以进一步改进。但是，随着区号数量和复杂性的增加，PL/SQL\
  \ 方法将越来越比 SQL 方法更可取。\n\n\n\n##### 子查询的限制\n\n正如第一章已经提到的，任何需要连接两个及以上记录集的查询，都可以通过使用`join`关键字的显式连接来实现。然而，在某些情况下，子查询可能更可取——例如，如果我们需要根据复杂逻辑推导某个属性，可以使用标量子查询来利用标量子查询缓存，并避免在主查询中使用聚合或分析函数及其他复杂性。`where`子句中的子查询也可能比显式连接更可取——例如，当需要`ANTI`或`SEMI`连接时，请参阅第\
  \ 12 章中的测验“Top Paths”以获取具体示例（尽管它不需要多层嵌套）。\n\n有时，由于嵌套层级限制，无法在关联子查询中用多层结构实现复杂逻辑。这些限制文档记录不全，但很容易演示。\n\
  \n```sql\nselect t1.*,\n(select *\nfrom (select t2.name\nfrom t2 where t2.id = t1.id\
  \ order by t2.name) t\nwhere rownum = 1) scalar\nfrom t1;\nID N S\n---------- -\
  \ -\n0 X X\n1 A\nselect t1.*\nfrom t1\nwhere exists\n(select 1\nfrom t2\nwhere t2.id\
  \ = t1.id\nand t2.id =\n(select id\nfrom (select id from t3 where t3.id = t1.id\
  \ order by 1)\nwhere rownum = 1));\nID N\n---------- -\n0 X\n```\n\n这些查询在 Oracle\
  \ 12c 中运行正常，但在 11g 中会失败，报错 «`ORA-00904: \"D1\".\"DUMMY\": invalid identifier`»；在\
  \ Oracle 12c 中，对于更复杂的子查询，你仍可能遇到 `ORA-00904`。\n\n当主查询中的标识符在子查询中不可见时，你可以将子查询中的逻辑在\
  \ `UDF` 中实现作为解决方法。此外，Oracle 12c 提供了 «`pragma udf`»，当在 SQL 中调用 `UDF` 时，它能提供额外的性能改进。\n\
  \n如果我们查看转换后的最终查询，可能会注意到引入了一个用于替代主查询中列的**人工绑定变量**。\n\n```sql\nselect \"T1\".\"ID\"\
  \ \"ID\",\n\"T1\".\"NAME\" \"NAME\",\n(select \"T\".\"NAME\" \"NAME\"\nfrom (select\
  \ \"T2\".\"NAME\" \"NAME\"\nfrom \"T2\" \"T2\"\nwhere \"T2\".\"ID\" = :b1\norder\
  \ by \"T2\".\"NAME\") \"T\"\nwhere rownum = 1) \"SCALAR\"\nfrom \"T1\" \"T1\"\n\
  select \"T1\".\"ID\" \"ID\", \"T1\".\"NAME\" \"NAME\"\nfrom \"T1\" \"T1\"\nwhere\
  \ exists (select 0\nfrom \"T2\" \"T2\"\nwhere \"T2\".\"ID\" = \"T1\".\"ID\"\nand\
  \ \"T2\".\"ID\" = (select \"from$_subquery$_003\".\"ID\" \"ID\"\nfrom (select \"\
  T3\".\"ID\" \"ID\"\nfrom \"T3\" \"T3\"\nwhere \"T3\".\"ID\" = :b1\norder by \"T3\"\
  .\"ID\")\n\"from$_subquery$_003\"\nwhere rownum = 1))\n```\n\n在 `UDF` 中实现逻辑与在子查询中实现逻辑的关键区别在于，`UDF`\
  \ 返回的数据是**当前调用时**的数据，而子查询返回的数据是**查询开始时**的数据。\n\n为了演示这种差异，让我们创建一个表和一个执行大约需要 5 秒的函数。\n\
  \n```sql\ncreate table t_scn(id, name) as\nselect 1, 'A' from dual\nunion all select\
  \ 2, 'B' from dual\nunion all select 3, 'C' from dual;\ncreate or replace function\
  \ f_get_name(p_id in int) return varchar2 is\nbegin\ndbms_lock.sleep(5);\nfor i\
  \ in (select * from t_scn where id = p_id) loop\nreturn(i.name);\nend loop;\nend\
  \ f_get_name;\n/\n```\n\n在下面的查询运行时\n\n```sql\nselect t_main.*,\n(select name from\
  \ t_scn where id = t_main.id) name1,\nf_get_name(t_main.id) name2\nfrom t_scn t_main;\n\
  ```\n\n让我们在并发会话中更新行\n\n```sql\nupdate t_scn set name = 'X' where id = 3;\ncommit;\n\
  ```\n\n主会话中的结果如下：\n\n```sql\nselect t_main.*,\n(select name from t_scn where id\
  \ = t_main.id) name1,\nf_get_name(t_main.id) name2\nfrom t_scn t_main;\nID NAME\
  \  NAME1 NAME2\n---------- ----- ----- -----\n1 A     A     A\n2 B     B     B\n\
  3 C     C     X\n```\n\n这意味着在查询执行期间，并发会话中的更改已被函数拾取。为避免这种情况，我们需要创建一个运算符。\n\n```sql\n\
  create operator op_get_name binding (int) return varchar2 using f_get_name;\n```\n\
  \n重复测试后，我们看到该运算符保证了与子查询相同的**一致性**。\n\n```sql\nselect t_main.*,\n(select name from\
  \ t_scn where id = t_main.id) name1,\nf_get_name(t_main.id) name2,\nop_get_name(t_main.id)\
  \ name3\nfrom t_scn t_main;\nID NAME  NAME1 NAME2 NAME3\n---------- ----- -----\
  \ ----- -----\n1 A     A     A     A\n2 B     B     B     B\n3 C     C     X   \
  \  C\n```\n\n##### 总结\n\n如果一个记录集可以使用**原生** SQL 实现，那么这在绝大多数情况下是获得结果的最快方式。然而，对于某些特定任务，`PL/SQL`\
  \ 可能更可取，这已在以下分类的示例中得到演示：\n\n*   分析函数的特性；\n*   类迭代计算；\n*   连接和子查询的特性。\n\n需要强调的是，从技术上讲，以下每种方法都在每个\
  \ `PL/SQL` 解决方案中使用过：\n\n*   带 `PL/SQL` 处理的游标 `FOR` 循环；\n*   封装在 `UDF` 中并在查询中使用；\n\
  *   SQL 语句的迭代执行。\n\n我想再次强调，在游标 `FOR` 循环处理的情况下，**提取量**的大小非常重要。\n\n在某些情况下，高级 SQL 特性（如递归子查询因式分解）有助于使用\
  \ SQL 高效地获得结果，否则将需要 `PL/SQL`。下一章包含一系列任务及其使用高级 SQL 特性的解决方案，以及不同方法的性能比较。\n\n# 12.\
  \ 解决 SQL 测验\n\n在这最后一章中，我想通过一些现实中的具体任务及其 SQL 解决方案，来展示 Oracle SQL 的强大功能。任务的复杂性将有很大差异，不同解决方案的分析深度也会不同。对于少数任务，将同时提供\
  \ SQL 和 `PL/SQL` 解决方案，但本章的重点在于 **SQL 的能力**。\n\n为了简单起见，我尽量剔除了所有不必要的细节，并使问题表述尽可能简单。\n\
  \n##### 转换为十进制数字系统\n\n我们有一个某种字母表中的符号字符串，目标是将其转换为十进制。字母表中的第一个符号是零，第二个符号的值是一，第三个符号的值是二，依此类推。\n\
  \n\n\n###### 解决方案\n\n首先从字母表为十六进制的情况开始。这种情况下，我们可以使用函数 `to_number()` 配合相应的格式模型，如清单\
  \ 12-1 所示。\n\n```\nvar x varchar2(30)\nvar alphabet varchar2(30)\nexec :alphabet\
  \ := '0123456789ABCDEF';\nPL/SQL 过程已成功完成。\nexec :x := '1A0A';\nPL/SQL 过程已成功完成。\n\
  select to_number(:x, 'XXXX') num from dual;\nNUM\n----------\n清单 12-1\n将十六进制值转换为十进制\n\
  ```\n\n清单 12-2 展示了将字符串从任意字母表转换的 SQL 方法。\n\n```\nselect sum(power(base, level - 1)\
  \ *\n(instr(:alphabet, substr(:x, -level, 1)) - 1)) num\nfrom (select length(:alphabet)\
  \ base from dual)\nconnect by level <= length(:x);\nNUM\n----------\n清单 12-2\n在\
  \ SQL 中将任意字母表的字符串转换为十进制\n```\n\n类似的逻辑可以在 PL/SQL 中实现，如清单 12-3 所示。\n\n```\ncreate\
  \ or replace function f_10base(p_x        in varchar,\n                        \
  \            p_alphabet in varchar\n                                           \
  \    default '0123456789ABCDEF')\n  return number is\n  result number := 0;\n  l_base\
  \ int := length(p_alphabet);\nbegin\n  for i in 1 .. length(p_x) loop\n    result\
  \ := result + power(l_base, i - 1) *\n              (instr(p_alphabet, substr(p_x,\
  \ -i, 1)) - 1);\n  end loop;\n  return result;\nend f_10base;\n清单 12-3\n在 PL/SQL\
  \ 中从任意字母表转换为十进制\n```\n\n让我们比较一下这两种方法的性能。\n\n```\nselect sum(f_10base('ABC' || rownum))\
  \ f from dual connect by level <= 1e6;\nF\n----------\n4.1760E+16\n已用时间: 00:00:16.61\n\
  \nselect sum(num) f\nfrom (select (select sum(power(base, level - 1) *\n       \
  \                 (instr(:alphabet, substr(x, -level, 1)) - 1)) num\n          \
  \    from (select length(:alphabet) base from dual)\n              connect by level\
  \ <= length(x)) num\n      from (select 'ABC' || rownum x from dual connect by level\
  \ <= 1e6));\nF\n----------\n4.1760E+16\n已用时间: 00:00:25.53\n```\n\n如你所见，PL/SQL 解决方案更快；尽管存在上下文切换。你可以使用\
  \ `dbms_hprof` 和 `dbms_xplan` 配合运行时执行统计信息，更详细地检查 PL/SQL 和 SQL 方法各自的时间花费在哪里。\n\n\
  为了完整起见，让我们测量一下内置函数的耗时。\n\n```\nselect sum(to_number('ABC' || rownum, lpad('X', 10,\
  \ 'X'))) f\nfrom dual\nconnect by level <= 1e6;\nF\n----------\n4.1760E+16\n已用时间:\
  \ 00:00:01.11\n```\n\n外部 C 函数的性能大约与内置函数相同。这个任务说明，在某些情况下，如果性能至关重要，SQL 和 PL/SQL 都不是最佳方法。\n\
  \n##### 连通分量\n\n图论是一个庞大的学科，包含许多术语、典型任务列表以及表示图的各种方式。关系数据库管理系统并非处理通用图的最佳工具，但 SQL 在处理特定类别的图（称为层次结构）时可能非常高效。\n\
  \n在现实生活中，你可能会遇到涉及各种类型图的任务，理解如何应对这一挑战非常重要，因此本次和下一次测验是对该主题的快速接触。\n\n在当前任务中，让我们考虑一个表示为边列表的无向图，如图\
  \ 12-1 所示。\n\n![A455196_1_En_12_Fig1_HTML.jpg](img/A455196_1_En_12_Fig1_HTML.jpg)\n\
  *图 12-1. 连通分量*\n\n```\ncreate table edge(x1, x2) as\nselect 10,20 from dual\nunion\
  \ all select 50,40 from dual\nunion all select 20,30 from dual\nunion all select\
  \ 20,40 from dual\nunion all select 60,70 from dual\nunion all select 80,60 from\
  \ dual\nunion all select 20,90 from dual;\n```\n\n目标是对连通分量进行编号。上述数据的结果如下：\n\n```\n\
  X        GRP\n---------- ----------\n10          1\n20          1\n30          1\n\
  40          1\n50          1\n60          2\n70          2\n80          2\n90  \
  \        1\n已选择 9 行。\n```\n\n因此，在此示例中，每个节点属于两个连通分量之一，并且哪个是第一、哪个是第二并不关键。\n\n######\
  \ 解决方案\n\n清单 12-4 展示了对连通分量进行编号的 SQL 方法。\n\n```\nselect x, dense_rank() over(order\
  \ by min(root)) grp\nfrom (select connect_by_root x1 root, x1, x2\n      from edge\n\
  \      connect by nocycle prior x1 in (x1, x2)\n                  or prior x2 in\
  \ (x1, x2))\nunpivot(x for x12 in(x1, x2))\ngroup by x\norder by 1, 2;\n清单 12-4\n\
  在 SQL 中对连通分量进行编号\n```\n\n鉴于该图是无向的，边 X1 – X2 意味着可以从 X1 遍历到 X2，反之亦然；因此，在 `connect\
  \ by` 条件中指定了所有可能的父子关系组合来处理这种情况。\n\n请注意，这里没有 `start with` 子句，所以对于每条边，我们构建所有连接的边，然后使用\
  \ `pivot` 在列 X 中返回所有连接的节点。最后，对于每个节点，我们推导出一个最小的根（定义为 X1 的起始值，但同样也可以是 X2 的起始值），并使用\
  \ `dense_rank` 对连通分量进行编号。\n\n该查询看起来相当简洁，但实际上效率很低，因为同一条边被遍历了多次，但这是考虑所有可能连接的唯一方法。\n\
  \n然而，PL/SQL 方法可能非常高效，如清单 12-5 所示。通过单次表扫描和在关联数组中的快速查找即可实现所需结果。\n\n```\ncreate or\
  \ replace type to_2int as object (x int, grp int)\n/\ncreate or replace type tt_2int\
  \ as table of to_2int\n/\ncreate or replace function f_connected_component return\
  \ tt_2int\n  pipelined is\n  i_list number := 0;\n  i      number;\n  n      number;\n\
  \  k      number;\n  type tp1 is table of binary_integer index by binary_integer;\n\
  \  type tp2 is table of tp1 index by binary_integer;\n  t1 tp1;\n  t2 tp2;\nbegin\n\
  \  for c in (select x1, x2 from edge) loop\n    if not t1.exists(c.x1) and not t1.exists(c.x2)\
  \ then\n      i_list := i_list + 1;\n      t1(c.x1) := i_list;\n      t1(c.x2) :=\
  \ i_list;\n      t2(i_list)(c.x1) := null;\n      t2(i_list)(c.x2) := null;\n  \
  \  elsif t1.exists(c.x1) and not t1.exists(c.x2) then\n      t1(c.x2) := t1(c.x1);\n\
  \      t2(t1(c.x1))(c.x2) := null;\n    elsif t1.exists(c.x2) and not t1.exists(c.x1)\
  \ then\n      t1(c.x1) := t1(c.x2);\n      t2(t1(c.x2))(c.x1) := null;\n    elsif\
  \ t1.exists(c.x1) and t1.exists(c.x2) and t1(c.x1) != t1(c.x2) then\n      n :=\
  \ greatest(t1(c.x1), t1(c.x2));\n      k := least(t1(c.x1), t1(c.x2));\n      i\
  \ := t2(n).first;\n      while (i is not null) loop\n        t2(k)(i) := null;\n\
  \        t1(i) := k;\n        i := t2(n).next(i);\n      end loop;\n      t2.delete(n);\n\
  \    end if;\n  end loop;\n  i := t1.first;\n  for idx in 1 .. t1.count loop\n \
  \   pipe row(to_2int(i, t1(i)));\n    i := t1.next(i);\n  end loop;\nend;\n清单 12-5\n\
  在 PL/SQL 中对连通分量进行编号\n```\n\nT1 数组包含每个节点所属的连通分量索引。T2 数组是分量的列表，其中每个分量是一个节点数组。实际上，引入\
  \ T2 是出于性能原因，因为如果某些边的节点属于不同的分量，那么我们需要重新对其中一个分量的节点进行编号，而每个分量的节点列表使此操作非常快速。\n\n```\n\
  select x, dense_rank() over(order by grp) grp\nfrom table(f_connected_component)\n\
  order by x;\n```\n\n两种方法的效率无法相提并论，坦率地说，对于此任务，SQL 方法根本不合理。你可以使用以下方法生成唯一的边：\n\n```\n\
  exec dbms_random.seed(11);\ncreate table edge as\nselect trunc(dbms_random.value(1,\
  \ 100)) x1,\n       trunc(dbms_random.value(1, 100)) x2\nfrom dual\nconnect by level\
  \ <= 61;\nselect count(distinct least(x1, x2) || ' ' || greatest(x1, x2)) from edge;\n\
  ```\n\n在我的笔记本电脑上，PL/SQL 方法耗时几毫秒，而 SQL 查询执行需要超过 3 分钟。如果你再多加几个元素，PL/SQL 的执行时间仍然在毫秒级，而\
  \ SQL 方法将需要数小时。\n\n\n\n但需要注意的是，如果目标是返回特定节点的连通分量，而不是所有连通分量，那么如果节点已建立索引，全表扫描可能不是最优方法。在这种情况下，结合使用\
  \ SQL 和 PL/SQL 方法，通过广度优先搜索遍历图可能是最佳解决方案。即使在纯 SQL 中使用递归子查询分解也无法实现这一点，因为遍历图需要维护一个已访问节点的单一列表。\n\
  \n##### 排序依赖关系\n\n在这个任务中，我们将在一个有向无环图（DAG）上实现一个算法。DAG 与层次结构的主要区别在于，层次结构中的每个节点都有一个父节点，而\
  \ DAG 中的某些节点可能有多个父节点和子节点。这可能导致 DAG 中从一个节点到另一个节点存在多条不同路径。SQL 可以比遍历无向图更高效地遍历有向图，`connect\
  \ by` 条件看起来与层次结构中的相同，但节点之间可能存在多条路径的问题可能会导致效率低下。\n\n清单 12-6 中的脚本创建了一个表，其中每一行表示两个对象之间的一个依赖关系。不存在循环依赖，但多个对象可能依赖于一个特定对象，同样，一个对象也可能引用许多其他对象。显然，这种数据是\
  \ DAG 而非层次结构。图形化展示见图 12-2，但请注意，边被表示为箭头，因为图是有向的。\n\n![A455196_1_En_12_Fig2_HTML.jpg](img/A455196_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n有向无环图\n\n```\ncreate table d(name, referenced_name) as\n(select null,\
  \ 'o' from dual\nunion all select 'o', 'a' from dual\nunion all select 'o', 'd'\
  \ from dual\nunion all select 'a', 'b' from dual\nunion all select 'd', 'b' from\
  \ dual\nunion all select 'b', 'e' from dual\nunion all select 'b', 'c' from dual\n\
  union all select 'e', 'c' from dual\nunion all select 'c', 'x' from dual\nunion\
  \ all select 'c', 'y' from dual\nunion all select 'c', 'z' from dual\n);\n```\n\n\
  清单 12-6\n\n创建描述依赖关系的表\n\n目标是从独立对象开始为依赖关系编号。因此，独立对象代表第一层级，依赖于独立对象且没有未访问依赖项的对象代表第二层级，依此类推。\n\
  \n###### 解决方案\n\n清单 12-7 展示了一种直接对依赖关系排序的方法。\n\n```\nselect referenced_name, max(level)\
  \ ord, count(*) cnt\nfrom d\nstart with not exists\n(select 1 from d d_in where\
  \ d_in.name = d.referenced_name)\nconnect by prior name = referenced_name\ngroup\
  \ by referenced_name\norder by 2, 1;\nR        ORD        CNT\n- ---------- ----------\n\
  x          1          1\ny          1          1\nz          1          1\nc   \
  \       2          6\ne          3          3\nb          4         12\na      \
  \    5          6\nd          5          6\no          6         12\n9 rows selected.\n\
  ```\n\n清单 12-7\n\n在 SQL 中对依赖关系排序\n\n因此 `x`、`y` 和 `z` 代表第一层级。第二层级仅包含节点 `c`。`b` 和\
  \ `e` 都引用了 `c`，但 `b` 还引用了 `e`，所以 `e` 必须排在 `b` 之前，这是唯一的第三层级节点。节点 `b` 代表第四层级，以此类推。\n\
  \n你可能注意到没有 `nocycle` 关键字，因为根据要求不存在循环。这种方法效率不高，因为它构建了从独立节点（我们不能称它们为叶子，因为我们的数据是 DAG\
  \ 而非树）出发的所有可能路径，并多次访问相同的节点。例如，到达节点 `b` 有 6 条路径：`x->c->b`、`y->c->b`、`z->c->b`、`x->c->e->b`、`y->c->e->b`、`z->c->e->b`，因此它访问\
  \ `b` 的两个子节点各六次，导致 `b` 在结果集中出现了 12 次。\n\n另一方面，我们可以使用广度优先搜索算法来遍历图，但这需要维护一个已访问节点的列表，这在纯\
  \ SQL 中是无法实现的。\n\n清单 12-8 展示了使用管道函数的 PL/SQL 实现。我们在结果集合中维护一个已访问节点的列表，并使用当前集合来引用在上一次迭代中添加的节点。\n\
  \n```\ncreate or replace type to_node as object (name varchar2(30), lvl  number)\n\
  /\ncreate or replace type tt_node as table of to_node\n/\ncreate or replace function\
  \ f_traverse return tt_node is\nresult  tt_node;\ncurrent tt_node;\ntmp     tt_node;\n\
  lvl     int := 1;\nbegin\nselect to_node(referenced_name, lvl) bulk collect\ninto\
  \ current\nfrom (select distinct referenced_name\nfrom d\nwhere not exists\n(select\
  \ null from d d_in where d_in.name = d.referenced_name));\nresult := current;\n\
  while true loop\nlvl := lvl + 1;\nselect to_node(name, lvl) bulk collect\ninto tmp\n\
  from (select distinct d1.name\nfrom d d1\njoin table(current) cur\non d1.referenced_name\
  \ = cur.name\n-- 仅添加没有未访问子节点的节点\nwhere not exists (select null\nfrom d d2\nleft\
  \ join table(result) r\non d2.referenced_name = r.name\nwhere d1.name = d2.name\n\
  and r.name is null));\nif tmp.count = 0 then\nreturn result;\nelse\nresult  := result\
  \ multiset union all tmp;\ncurrent := tmp;\nend if;\nend loop;\nend f_traverse;\n\
  ```\n\n清单 12-8\n\n在 PL/SQL 中对依赖关系排序\n\n此算法返回所有层级（包括最后一层）的节点，这与展示的 SQL 方法不同。\n\n\
  ```\nselect * from table(f_traverse) order by 2, 1;\nNAME         LVL\n----- ----------\n\
  x              1\ny              1\nz              1\nc              2\ne      \
  \        3\nb              4\na              5\nd              5\no            \
  \  6\n\n10 rows selected.\n```\n\n通过在 `name` 和 `referenced_name` 上创建索引，并使用带索引的临时表来维护已访问节点列表，可以进一步提高性能。对于相对简单的\
  \ DAG，SQL 方法可能是可接受的，但如果依赖关系复杂，那么 PL/SQL 将表现得更好。例如，对于下面的数据，PL/SQL 方法将快 100 倍，但实际上这只是一个仅有\
  \ 65 个节点的 DAG。\n\n```\ncreate table d as\nselect decode(type, 'to', 'x' || to_char(x\
  \ + 1), 'n' || x || y) name,\ndecode(type, 'to', 'n' || x || y, 'x' || x) referenced_name\n\
  from (select to_char(trunc((rownum - 1) / 7) + 1) x,\nto_char(mod(rownum, 7) + 1)\
  \ y\nfrom dual\nconnect by level <= 8 * 7) n,\n(select 'from' type\nfrom dual\n\
  union all\nselect 'to' from dual);\n```\n\n##### 带偏移的百分位数\n\n现在我们来看一些涉及分析函数的测验题。\n\
  \n目标听起来很简单：对于每一行，计算一个固定值的百分位数，同时考虑从当前行开始到后续 `n` 行的行。\n\n关于如何计算百分位数的详细解释可以在 Oracle\
  \ 文档中关于 `percentile_cont` 函数的部分找到（你也可以使用 Excel 函数 - `PERCENTILE`）。\n\n当 `x = 0.3`\
  \ 且 `n = 4` 时，结果如下：\n\n| 排序 | 值 | 百分位数 |\n| --- | --- | --- |\n| 1 | 10 | 64 |\n\
  | 2 | 333 | 95.5 |\n| 3 | 100 | 82 |\n| 4 | 55 | 338.5 |\n| 5 | 1000 | 1000 |\n\n\
  \n\n###### 解决方案\n\n当 `percentile_cont` 作为分析函数使用时，无法指定窗口子句，因此它会应用于整个分区。鉴于我们需要从当前行开始，对特定的行子集计算百分位，我们可以通过自连接获取所需的子集，并使用\
  \ `percentile_cont` 的聚合版本。参见代码清单 12-9。\n\n```sql\ncreate table flow(ord, value)\
  \ as\nselect 1, 10 from dual\nunion all select 2, 333 from dual\nunion all select\
  \ 3, 100 from dual\nunion all select 4, 55 from dual\nunion all select 5, 1000 from\
  \ dual;\nselect t1.*, percentile_cont(0.3) within group(order by t2.value) pct\n\
  from flow t1\njoin flow t2 on t2.ord between t1.ord and t1.ord + 4\ngroup by t1.ord,\
  \ t1.value;\n```\n\n```\nORD      VALUE        PCT\n---------- ----------\n1   \
  \      10         64\n2        333       95.5\n3        100         82\n4      \
  \   55      338.5\n5       1000       1000\n```\n\n代码清单 12-9\n使用自连接和 `percentile_cont`\
  \ 计算带偏移的百分位\n\n如果我们实现该函数文档中描述的计算逻辑，则可以在不使用 `percentile_cont` 的情况下获得相同的结果。参见代码清单\
  \ 12-10。\n\n```sql\nselect tt.*,\ndecode(frn, crn, frn_value,\n(crn - rn) * frn_value\
  \ + (rn - frn) * crn_value) percentile\nfrom (select t.ord,\nt.value,\nt.rn,\nt.frn,\n\
  t.crn,\nmax(decode(rnum, frn, v)) frn_value,\nmax(decode(rnum, crn, v)) crn_value\n\
  from (select t1.*,\nt2.value v,\nrow_number() over(partition by t1.ord order by\
  \ t2.value) rnum,\n1 + 0.3 * (count(*) over(partition by t1.ord) - 1) rn,\nfloor(1\
  \ + 0.3 * (count(*) over(partition by t1.ord) - 1)) frn,\nceil(1 + 0.3 * (count(*)\
  \ over(partition by t1.ord) - 1)) crn\nfrom flow t1\njoin flow t2\non t2.ord between\
  \ t1.ord and t1.ord + 4) t\ngroup by t.ord, t.value, t.rn, t.frn, t.crn) tt\norder\
  \ by tt.ord;\n```\n\n```\nORD  VALUE   RN  FRN  CRN  FRN_VALUE  CRN_VALUE PERCENTILE\n\
  ------- ------ ---- ---- ---- ---------- ----------\n1     10  2.2    2    3   \
  \       55        100         64\n2    333  1.9    1    2          55        100\
  \       95.5\n3    100  1.6    1    2          55        100         82\n4     55\
  \  1.3    1    2          55       1000      338.5\n5   1000    1    1    1    \
  \    1000       1000       1000\n```\n\n代码清单 12-10\n使用自连接和分析函数计算带偏移的百分位\n\n因此，我们为每个子集计算\
  \ `frn` 和 `crn` 索引，导出相应的值，并在必要时执行线性插值。但我们真的需要自连接吗？\n\n让我们考虑源表中值已排序的解决方案。代码清单 12-11\
  \ 的结果与前两个查询不同，因为值是按 `ord` 排序的。\n\n```sql\nselect ttt.*,\ndecode(frn, crn, frn_value,\
  \ (crn - rn) * frn_value + (rn - frn) * crn_value) percentile\nfrom (select tt.*,\n\
  nth_value(value, ord + frn - 1)\nover(order by ord range between unbounded preceding\
  \ and unbounded following) frn_v,\nnth_value(value, ord + crn - 1)\nover(order by\
  \ ord range between unbounded preceding and unbounded following) crn_v,\nlast_value(value)\n\
  over(order by ord range between frn - 1 following and frn - 1 following) frn_value,\n\
  last_value(value)\nover(order by ord range between crn - 1 following and crn - 1\
  \ following) crn_value\nfrom (select t.*, floor(rn) frn, ceil(rn) crn\nfrom (select\
  \ t0.*,\n1 +\n0.3 * (count(*)\nover(order by ord range between current row and 4\
  \ following) - 1) rn\nfrom flow t0) t) tt) ttt;\n```\n\n```\nORD  VALUE   RN   FRN\
  \   CRN   FRN_V  CRN_V  FRN_VALUE  CRN_VALUE PERCENTILE\n----- ------ ---- -----\
  \ ----- ------- ------ ---------- ----------\n1     10  2,2     2     3      55\
  \    100         55        100         64\n2     55  1,9     1     2      55   \
  \ 100         55        100       95,5\n3    100  1,6     1     2      55    100\
  \        100        333      239,8\n4    333  1,3     1     2      55    100   \
  \     333       1000      533,1\n5   1000    1     1     1      55    100      \
  \ 1000       1000       1000\n```\n\n代码清单 12-11\n仅使用分析函数计算带偏移的百分位\n\n每行对应的 `crn`\
  \ 和 `frn` 索引值是通过两种完全不同的方式推导出来的——`nth_value`/`last_value`。此外，如果第二个参数不是常量，函数 `nth_value`（`crn_v`\
  \ 和 `frn_v` 列）在 Oracle 11g 中会返回不正确的结果（此 bug 已在 12c 中修复）。\n\n我们可以运行代码清单 12-9 中的查询并获得相同的结果，但是，如前所述，这种方法仅在值按\
  \ `ord` 排序时有效。如果情况并非如此，那么计算索引 `crn` 和 `frn` 根本不是问题，但使用分析函数推导出对应的值是不可能的——对于每一行，我们都需要对它自己的值子集进行排序（此逻辑在代码清单\
  \ 12-10 中实现为 `row_number() over(partition by t1.ord order by t2.value) rnum`）。\n\
  \n##### N 个连续的 1\n\n对于下面的表，目标是找到按 `id` 排序的、包含 10 个连续 1 的序列的数量。例如，如果有 11 个连续的 1，这意味着两个序列：从第\
  \ 1 行到第 10 行，以及从第 2 行到第 11 行。\n\n```sql\nexec dbms_random.seed(1);\ncreate table\
  \ t_sign as\nselect rownum id,\ncase when trunc(dbms_random.value(1, 10 + 1)) >\
  \ 3\nthen 1\nelse 0\nend sign\nfrom dual\nconnect by rownum <= 1e6;\n```\n\n######\
  \ 解决方案\n\n有多种可能的解决方法：\n\n*   多层分析函数\n*   带有窗口子句的分析函数\n*   MODEL 子句\n*   模式匹配\n\n\
  下面你可以看到代码及其执行时间。执行了以下语句以避免临时表空间使用并确保工作区有足够的内存。\n\n```sql\nalter session set workarea_size_policy\
  \ = manual;\nalter session set sort_area_size = 2147483647;\n```\n\n结果如下：\n\n```sql\n\
  select count(*) cnt\nfrom (select t.*, sum(sign) over(partition by g order by id)\
  \ s\nfrom (select id, sign, sum(x) over(order by id) g\nfrom (select t0.*,\ndecode(nvl(lag(sign)\
  \ over(order by id), -1),\nsign,\n0,\n1) x\nfrom t_sign t0)\nwhere sign  0) t)\n\
  where s >= 10;\n```\n\n```\nCNT\n---\n999693\n\nElapsed: 00:00:03.11\n```\n\n```sql\n\
  select count(*)\nfrom (select id,\nsum(sign) over(order by id rows between 9 preceding\
  \ and current row) s\nfrom t_sign)\nwhere s = 10;\n```\n\n```\nCOUNT(*)\n---\n999693\n\
  \nElapsed: 00:00:01.45\n```\n\n```sql\nselect count(*) cnt from\n(\nselect *\nfrom\
  \ t_sign\nmodel\nignore nav\ndimension by (id)\nmeasures (sign, 0 s)\nrules\n(\n\
  s[any] order by id = decode(sign[cv()], 0, 0, s[cv()-1]+sign[cv()])\n)\n)\nwhere\
  \ s >= 10;\n```\n\n```\nCNT\n---\n999693\n\nElapsed: 00:00:04.64\n```\n\n```sql\n\
  select count(*)\nfrom t_sign\nmatch_recognize\n(\norder by id\none row per match\n\
  after match skip to first one\npattern (strt one{9})\ndefine\nstrt as strt.sign\
  \ = 1,\none as one.sign = 1\n) mr;\n```\n\n```\nCOUNT(*)\n---\n999693\n\nElapsed:\
  \ 00:00:01.55\n```\n\n因此，最快的方法是模式匹配和带窗口子句的分析函数，其次是需要两次排序的多层分析函数解决方案，最后是 MODEL 子句。\n\
  \n##### 下一个更大的值\n\n对于来自表的每一行\n\n```sql\nexec dbms_random.seed(1);\ncreate table\
  \ t_value as\nselect trunc(dbms_random.value(1, 1000 + 1)) value\nfrom dual\nconnect\
  \ by level <= 1e5;\n```\n\n推导出下一个更大的值。\n\n示例结果：\n\n| value | next_value |\n| ---\
  \ | --- |\n| 1 | 2 |\n| 2 | 3 |\n| 2 | 3 |\n| 3 | null |\n\n\n###### 解答\n\n由于值可能重复，无法使用前导函数，因此不能使用固定的偏移量。不过，与之前的测验类似，有多种解决方案：\n\
  \n*   使用多层分析函数\n*   带有窗口子句的分析函数\n*   模型子句\n*   模式匹配\n\n使用了聚合函数 `«sum(nvl(next_value,\
  \ 0) - value)»` 以最小化数据获取。\n\n```sql\nselect sum(nvl(next_value, 0) - value) s\n\
  from (select value, max(next_value) over(partition by value) next_value\nfrom (select\
  \ value,\ndecode(lead(value, 1) over(order by value),\nvalue,\nto_number(null),\n\
  lead(value, 1) over(order by value)) next_value\nfrom t_value));\nS\n\nElapsed:\
  \ 00:00:02.33\nselect sum(nvl(next_value, 0) - value) s\nfrom (select value,\nmin(value)\
  \ over(order by value range between 1 following and 1 following) next_value\nfrom\
  \ t_value);\nS\n\nElapsed: 00:00:01.79\nselect sum(nvl(next_value, 0) - value) s\n\
  from\n(\nselect value, next_value\nfrom t_value\nmodel\ndimension by (row_number\
  \ () over (order by value desc) rn)\nmeasures(value, cast(null as number) next_value)\n\
  rules\n(\nnext_value[rn > 1] order by rn =\ndecode(value[cv()], value[cv()-1], next_value[cv()-1],\
  \ value[cv()-1])\n)\n);\nS\n\nElapsed: 00:00:05.94\nselect sum(nvl(next_value, 0)\
  \ - value) s\nfrom (select * from t_value union all select null from dual)\nmatch_recognize\n\
  (\norder by value nulls last\nmeasures\nfinal first (next_val.value) as next_value\n\
  all rows per match\nafter match skip to next_val\npattern (val+ {-next_val-})\n\
  define\nval as val.value = first(val.value)\n) mr;\nS\n\nElapsed: 00:00:01.53\n\
  ```\n\n本测验最高效的解决方案同样是模式匹配和带窗口子句的分析函数，其次是使用前导（lead）和最大值（max）函数的方案，最后是模型子句方案。在窗口子句中使用最小必需窗口非常重要。例如，如果你指定\
  \ `“range between 1 following and unbounded following”`，结果虽然是正确的，但执行时间会比使用 `“range\
  \ between 1 following and 1 following”` 高出几个数量级。\n\n为模式匹配解决方案添加了一行特定的空值行，以便原始表的最后一行有后续行。\n\
  \n##### 下一个分支\n\n让我们将“下一个分支”定义为遍历层次结构（例如行号大于当前行，但层级小于或等于当前层级）之后的最接近行。如果我们想对给定节点的所有子节点应用某些逻辑，这个值可能非常有用。\n\
  \n目标是找到一个不使用连接和子查询的解决方案。\n\n使用连接的解决方案是显而易见的：\n\n```sql\nwith t(id, parent_id, description,\
  \ amount) as\n(\nselect 1 id, null, 'top', 10  from dual\nunion all select 2, 1,\
  \ 'top-one', 100 from dual\nunion all select 3, 2, 'one-one', 2000 from dual\nunion\
  \ all select 4, 2, 'one-two', 3000 from dual\nunion all select 5, 1, 'top-two',\
  \ 1000 from dual\nunion all select 6, 2, 'one-three', 300 from dual\nunion all select\
  \ 7, 6, 'three-one', 1 from dual\n)\n, h as\n(\nselect id, parent_id, description,\
  \ amount, level l, rownum rn\nfrom t\nstart with id = 1\nconnect by parent_id =\
  \ prior id\n)\nselect h.*,\n(select min(rn)\nfrom h h0\nwhere h0.rn > h.rn\nand\
  \ h0.l <= h.l) next_branch\nfrom h;\nID  PARENT_ID DESCRIPTI     AMOUNT    L   \
  \  RN NEXT_BRANCH\n------- ---------- --------- ---------- ---- ------ -----------\n\
  1            top               10    1      1\n2          1 top-one          100\
  \    2      2           7\n3          2 one-one         2000    3      3       \
  \    4\n4          2 one-two         3000    3      4           5\n6          2\
  \ one-three        300    3      5           7\n7          6 three-one         \
  \ 1    4      6           7\n5          1 top-two         1000    2      7\n7 rows\
  \ selected.\n```\n\n对于 ID 为 (3, 4) 的行，下一个分支就是下一行，因为它的层级相同。对于 ID 为 (2, 6, 7) 的行，下一个分支是\
  \ RN = 7 的行，因为它的层级较低。\n\n###### 解答\n\n逻辑似乎可以很容易地用分析函数重写，但我们面临两个限制，这在之前关于分析函数的章节中已经演示过。\n\
  \n1.  在按多列排序时，无法指定多个范围。在这个特定案例中，我们无法为 `rn` 指定一个范围\n    `rn range between 1 following\
  \ and unbounded following`\n    同时又为 `l` 指定一个范围\n    `l range between unbounded\
  \ preceding and current row`\n\n2.  如果我们尝试只按一列排序，无论是 `l` 还是 `rn`，我们都必须在函数中通过第二列来限制行，但在函数的表达式中无法使用该属性的当前值。\n\
  \n正如在关于模型子句的章节中已经提到的，第一种情况可以很容易地使用模型子句实现，而第二种情况则需要迭代和一个辅助度量，在每次迭代中将其用作当前行给定属性的值。\n\
  \n代码清单 12-12 展示了使用模型子句的实现。\n\n```sql\nselect *\nfrom h\nmodel\ndimension by (l,\
  \ rn)\nmeasures (id, parent_id, rn xrn, 0 next_branch)\nrules\n(\nnext_branch[any,\
  \ any] order by rn, l =\nmin(xrn)[l  cv(rn)]\n);\nL       RN         ID  PARENT_ID\
  \        XRN NEXT_BRANCH\n------- -------- ---------- ---------- ---------- -----------\n\
  1        1          1                     1\n2        2          2          1  \
  \        2            7\n3        3          3          2          3           \
  \ 4\n3        4          4          2          4            5\n3        5      \
  \    6          2          5            7\n4        6          7          6    \
  \      6            7\n2        7          5          1          7\n7 rows selected.\n\
  select *\nfrom h\nmodel\ndimension by (rn)\nmeasures (id, parent_id, l, 0 l_cur,\
  \ rn xrn, 0 next_branch)\nrules iterate (1e6) until l[iteration_number+2] is null\n\
  (\nl_cur[rn > iteration_number + 1] = l[iteration_number + 1],\nnext_branch[iteration_number\
  \ + 1] =\nmin(case when l  cv(rn)]\n)\norder by rn;\nRN     ID  PARENT_ID     L\
  \    L_CUR      XRN NEXT_BRANCH\n-------- ------ ---------- ----- -------- --------\
  \ -----------\n1      1                1        0        1\n2      2          1\
  \     2        1        2           7\n3      3          2     3        2      \
  \  3           4\n4      4          2     3        3        4           5\n5   \
  \   6          2     3        3        5           7\n6      7          6     4\
  \        3        6           7\n7      5          1     2        4        7\n7\
  \ rows selected.\n```\n\n**代码清单 12-12** 使用模型子句查找下一个分支\n\n我相信无需多说，第一种方法比第二种带有迭代和辅助度量的方法更高效，但如果我们做出一些假设，使用分析函数可以提供更好的解决方案，如代码清单\
  \ 12-13 所示。\n\n```sql\nselect h0.*,\nnullif(max(rn) over(order by s range between\
  \ current\nrow and x - 1e-38 following),\ncount(*) over()) + 1 next_branch\nfrom\
  \ (select h.*,\npower(2 * 10, 1 - l) x,\nsum(power(2 * 10, 1 - l)) over(order by\
  \ rn) s\nfrom h) h0;\nID  PARENT_ID     L    RN          X          S NEXT_BRANCH\n\
  ------ ---------- ----- ----- ---------- ---------- -----------\n1             \
  \   1     1          1          1\n2          1     2     2        ,05       1,05\
  \           7\n3          2     3     3      ,0025     1,0525           4\n4   \
  \       2     3     4      ,0025      1,055           5\n6          2     3    \
  \ 5      ,0025     1,0575           7\n7          6     4     6    ,000125   1,057625\
  \           7\n5          1     2     7        ,05   1,107625\n7 rows selected.\n\
  ```\n\n**代码清单 12-13** 使用分析函数查找下一个分支\n\n如果我们假设每个节点的直接后代不超过 10 个，那么对于第 n 层的给定节点，所有可能后代节点的\
  \ x 值之和可以计算为以下级数的和\n\n\n![ $$ \\sum \\limits_{i=1}^{\\infty}\\frac{10^i}{{\\left(10\\\
  ast 2\\right)}^{i+n-1}}=\\sum \\limits_{i=1}^{\\infty}\\frac{10^i}{20^{n-1\\ast\
  \ }{10}^{i\\ast }{2}^i}=\\frac{1}{20^{n-1}}\\sum \\limits_{i=1}^{\\infty}\\frac{1}{2^i}=\\\
  frac{1}{20^{n-1}} $$ ](img/A455196_1_En_12_Chapter_Equa.gif)\n\n换言之，所有后代节点的 `x`\
  \ 值之和不会超过给定节点的 `x` 值。更具体地说：对于第一层的节点，其和的极限等于 1；对于第二层的节点，该极限等于 0.05，依此类推。\n\n实际上，深度受到数字精度的限制。我们假设\
  \ `x` 与其所有后代节点的 `x` 值之和的差值永远不会小于 `1e-38`，因此窗口子句为 `range between current row and\
  \ x - 1e-38 following`；这样窗口就包含了当前节点及其所有后代节点。如果我们定义范围为 `range between 1e-38 following\
  \ and x - 1e-38 following`，那么窗口将仅包含所有后代节点。\n\n最终，我们成功地计算出了一个列 `s`，它可以用来定义一个以 `x`\
  \ 为范围的窗口。这种技术使我们能够解决各种需要对给定节点（可能包括节点本身）的所有后代应用某种逻辑的任务。\n\n例如，如果我们需要计算所有后代节点的数量或其总和（包括当前节点的值），则可以按照清单\
  \ 12-14 所示的方式完成。\n\n```sql\nselect h0.*,\ncount(*) over(order by s range between\
  \ 1e-38 following and x - 1e-38 following) cnt_children,\nsum(amount) over(order\
  \ by s range between current row and x - 1e-38 following) h_sum\nfrom (select h.*,\n\
  power(2 * 10, 1 - l) x,\nsum(power(2 * 10, 1 - l)) over(order by rn) s\nfrom h)\
  \ h0;\nID  PARENT_ID  DESCRIPTI   AMOUNT   L     RN        X         S    CNT_CHILDREN\
  \   H_SUM\n---- ---------- ---------- -------- --- ------ -------- --------- ---------------\
  \ -------\n1            top              10   1      1        1         1      \
  \         6    6411\n2          1 top-one         100   2      2      ,05      1,05\
  \               4    5401\n3          2 one-one        2000   3      3    ,0025\
  \    1,0525               0    2000\n4          2 one-two        3000   3      4\
  \    ,0025     1,055               0    3000\n6          2 one-three       300 \
  \  3      5    ,0025    1,0575               1     301\n7          6 three-one \
  \        1   4      6  ,000125  1,057625               0       1\n5          1 top-two\
  \        1000   2      7      ,05  1,107625               0    1000\n7 rows selected.\n\
  ```\n*清单 12-14 使用窗口函数对所有后代节点应用逻辑*\n\n如果没有分析函数，这将需要连接/子查询或 `MODEL` 子句。然而，Oracle 12c\
  \ 提供了另一种方法——模式匹配。\n\n```sql\nselect *\nfrom (select h.*, power(2 * 10, 1 - l) x\
  \ from h)\nmatch_recognize\n(\norder by rn\nmeasures\nfirst (id) as id,\nfirst (parent_id)\
  \ as parent_id,\nfirst (l) as l,\nfirst (rn) as rn,\nfinal count(*)-1 cnt_children,\n\
  final sum(amount) h_sum\none row per match\nafter match skip to next row\npattern\
  \ (y+)\ndefine\ny as sum(x) < 2 * first(x)\n) mr;\nID  PARENT_ID       L       \
  \  RN CNT_CHILDREN      H_SUM\n------- ---------- ------- ---------- ------------\
  \ ----------\n1                  1          1            6        6411\n2      \
  \    1       2          2            4        5401\n3          2       3       \
  \   3            0        2000\n4          2       3          4            0   \
  \     3000\n6          2       3          5            1         301\n7        \
  \  6       4          6            0           1\n5          1       2         \
  \ 7            0        1000\n7 rows selected.\n```\n\n在这个解决方案中，我们使用了一个带聚合函数的条件\
  \ `sum(x) < 2 * first(x)` 来代替累积求和。一个等效的、同时使用 `x` 和 `s` 的条件是 `last(s) - first(s)\
  \ < first(x)`。然而，如果使用 `max(s) - min(s) < first(x)`，查询会因 ORA-03113 错误而失败（版本 12.2.0.1.0,\
  \ 12.1.0.2.0）。在模式匹配中，特定函数 `first`/`last` 比聚合函数 `min`/`max` 更可取，因为我们知道 `s` 是单调递增的。\n\
  \n也可以使用带有 `min`/`max` 的规则；但如果我们使用所有行（`all rows`）而不是单行（`one row`）并进行过滤，这显然会引入额外的成本。\n\
  \n```sql\nselect *\nfrom (select h.*,\npower(2 * 10, 1 - l) x,\nsum(power(2 * 10,\
  \ 1 - l)) over(order by rn) s\nfrom h) h0\nmatch_recognize\n(\norder by rn\nmeasures\n\
  final count(*)-1 cnt_children,\nfinal sum(amount) h_sum,\ncount(*) cnt\nall rows\
  \ per match\nafter match skip to next row\npattern (y+)\ndefine\ny as max(s) - min(s)\
  \ < first(x)\n) mr\nwhere cnt = 1;\n```\n\n最后，使用模式匹配时最重要的细节是，如果我们想查找下一个分支或对所有后代节点应用某些逻辑，则无需使用基于和极限的技巧。我们只需指定一个匹配所有后代的模式，并从每一行开始搜索——`after\
  \ match skip to next row`。\n\n```sql\nselect *\nfrom h\nmatch_recognize\n(\norder\
  \ by rn\nmeasures\nclassifier() cls,\nfirst (id) as id,\nfirst (parent_id) as parent_id,\n\
  first (l) as l,\nfirst (rn) as rn,\nfirst (amount) as amount,\nfinal count(child.*)\
  \ cnt_children,\nfinal sum(amount) h_sum\none row per match\nafter match skip to\
  \ next row\npattern (strt child+|no_children)\ndefine\nchild as child.l > strt.l\n\
  ) mr;\nCLS             ID     PARENT_ID    L  RN     AMOUNT   CNT_CHILDREN   H_SUM\n\
  -----------  ----- ------------- ---- --- ---------- -------------- -------\nCHILD\
  \            1                  1   1         10              6    6411\nCHILD \
  \           2             1    2   2        100              4    5401\nNO_CHILDREN\
  \      3             2    3   3       2000              0    2000\nNO_CHILDREN \
  \     4             2    3   4       3000              0    3000\nCHILD        \
  \    6             2    3   5        300              1     301\nNO_CHILDREN   \
  \   7             6    4   6          1              0       1\nNO_CHILDREN    \
  \  5             1    2   7       1000              0    1000\n7 rows selected.\n\
  ```\n\n##### 随机子集\n\n对于一个包含 `n` 行、具有主键且值从 1 到 `n` 无间隔的表：\n\n```sql\ncreate table\
  \ t_id_value as\nselect rownum id, 'name' || rownum value from dual connect by rownum\
  \ <= 2e6;\nalter table t_id_value add constraint pk_t_id_value primary key (id);\n\
  ```\n\n目标是返回 `k` 个唯一的随机行，使得每一行出现在结果中的概率对所有行都相等。为简单起见，我们假设 `k` 等于 10。\n\n\n######\
  \ 解决方案\n\n一个简单的解决方案如下：\n\n```sql\nselect *\nfrom (select * from t_id_value order\
  \ by dbms_random.value)\nwhere rownum <= 10;\n```\n\n在这个案例中，我们为所有行生成`dbms_random.value`，然后取值最低的前\
  \ 10 行。\n\n如果表很宽——即包含许多列或一些长字符串，那么我们可以通过仅排序`rowid`并引入额外的连接来优化排序。\n\n```sql\nselect\
  \ *\nfrom t_id_value\nwhere rowid in\n(select *\nfrom (select rowid from t_id_value\
  \ order by dbms_random.value)\nwhere rownum <= 10);\n```\n\n对于本任务引入的表，所演示的优化并未带来显著的性能提升。\n\
  \n鉴于所有`ID`都从 1 开始且没有间隙，我们可以使用下面的方法生成 10 个随机`ID`。\n\n```sql\nselect *\nfrom t_id_value\n\
  where id in (select trunc(dbms_random.value(1,\n(select max(id) from t_id_value)\
  \ + 1))\nfrom dual\nconnect by level <= 10);\n```\n\n然而，存在我们生成重复值的可能性。例如，下面的查询返回了\
  \ 9 行而不是 10 行：\n\n```sql\nexec dbms_random.seed(48673);\nPL/SQL procedure successfully\
  \ completed.\nselect *\nfrom t_id_value\nwhere id in (select trunc(dbms_random.value(1,\n\
  (select max(id) from t_id_value) + 1))\nfrom dual\nconnect by level <= 10);\nID\
  \ VALUE\n---------- --------------------------------------------\n564703 name564703\n\
  917426 name917426\n1230672 name1230672\n1837951 name1837951\n1367140 name1367140\n\
  248223 name248223\n873017 name873017\n581109 name581109\n1206874 name1206874\n9\
  \ rows selected.\n```\n\n我们可以通过预先生成一些保留行并选择`k`个唯一行来规避这个问题。然而，为了避免哪怕是理论上的重复机会，我们需要验证第`k`个行生成时所有已生成的行是否唯一。如果不是，则生成一个新行并重新验证。这种引用所有已生成行的方法可以使用`model`子句或递归子查询因子来实现。\n\
  \n```sql\nselect *\nfrom t_id_value\nwhere id in\n(\nselect distinct x\nfrom dual\n\
  model return updated rows\ndimension by (0 id)\nmeasures(0 i, 0 x, (select max(id)\
  \ from t_id_value) max_id)\nrules\niterate (1e9) until i[0] = 10\n(\nx[iteration_number]\
  \ = trunc(dbms_random.value(1, max_id[0] + 1)),\ni[0] = case when iteration_number\
  \ < 10 - 1\nthen 0 else count(distinct x)[any] end\n)\n);\n```\n\n如果我们使用`exec dbms_random.seed(48673)`，那么验证将执行两次：在第\
  \ 10 行生成后和第 11 行生成后，但在大多数情况下，验证只会发生一次。\n\n一个使用递归子查询因子的解决方案如下：\n\n```sql\nwith rec(lvl,\
  \ batch)\nas (select 1,\nnumbers(trunc(dbms_random.value(1, 2e6 + 1)))\nfrom dual\n\
  union all\nselect lvl + 1,\nbatch multiset union all\nnumbers(trunc(dbms_random.value(1,\
  \ 2e6 + 1)))\nfrom rec\nwhere case when lvl < 10 then 0\n-- cardinality(set())\n\
  -- does not work in recursive member\nelse (select count(*) from table(set(rec.batch)))\n\
  end < 10)\nselect *\nfrom t_id_value\nwhere id in (select column_value\nfrom (select\
  \ *\nfrom (select * from rec t order by lvl desc)\nwhere rownum = 1),\ntable(batch));\n\
  ```\n\n我们在数据类型为`numbers`的列`batch`中累加生成的值，并从第`k`次迭代开始检查唯一性，类似于`model`解决方案。为简单起见，最大值被硬编码，而不是使用标量子查询。\n\
  \nSQL 方法的缺点是，我们需要扫描所有生成的值来检查唯一性，这对于大的`k`来说可能效率低下。如果我们使用关联数组，PL/SQL 可以帮助避免这一点（此逻辑可以封装在管道函数中并在\
  \ SQL 中使用）。\n\n```sql\ndeclare\ntype tp_arr is table of binary_integer index by\
  \ binary_integer;\narr tp_arr;\ni   int := 0;\nbegin\nwhile true loop\narr(trunc(dbms_random.value(1,\
  \ 2e6 + 1))) := null;\ni := i + 1;\nif i >= 10 and arr.count = 10 then\nexit;\n\
  end if;\nend loop;\ni := arr.first;\nwhile (i is not null) loop\ndbms_output.put_line(i);\n\
  i := arr.next(i);\nend loop;\nend;\n/\n```\n\n另一方面，我们需要生成的值越多，第一种按随机值排序的方法就越可取。另外我想强调，所有生成`k`个唯一值的方法仅在没有间隙的情况下才有效。因此，如果主键是`varchar2`，那么我们可能需要读取所有数据并将所有行映射到数组或整数。\n\
  \n##### 覆盖范围\n\n对于包含从`a`到`b`的范围的表，满足`b > a`且`a`是唯一的：\n\n```sql\ncreate table t_range(a,\
  \ b) as\n(select 1, 15 from dual\nunion all select 3, 17 from dual\nunion all select\
  \ 6, 19 from dual\nunion all select 10, 21 from dual\nunion all select 17, 26 from\
  \ dual\nunion all select 18, 29 from dual\nunion all select 20, 32 from dual\nunion\
  \ all select 24, 35 from dual\nunion all select 28, 45 from dual\nunion all select\
  \ 30, 49 from dual);\n```\n\n我们需要返回覆盖范围 (1:15), (17:26), (28:45)，也就是说，我们从具有最小`a`的行开始，然后挑选`a`大于当前`b`的最小`a`的行，依此类推。\n\
  \n###### 解决方案\n\n相对简单，可以使用`connect by`和分析函数来解决，但在这种情况下性能相当低效。\n\n```sql\nselect\
  \ a, b\nfrom (select a,\nb,\nmin(a) over(order by a range between b - a following\n\
  and unbounded following) as next_a,\nmin(a) over() start_a\nfrom t_range)\nstart\
  \ with a = start_a\nconnect by prior next_a = a;\nA          B\n---------- ----------\n\
  1         15\n17         26\n28         45\n\nselect a, b\nfrom (select a, b, lag(a)\
  \ over(order by a) as lag_a from t_range)\nstart with lag_a is null\nconnect by\
  \ a >= prior b and lag_a < prior b;\nA          B\n---------- ----------\n1    \
  \     15\n17         26\n28         45\n```\n\n一个非常优雅且高效的解决方案可以使用模式匹配来展示。\n\n```sql\n\
  select *\nfrom t_range\nmatch_recognize\n(\norder by a\nall rows per match\npattern((x|{-dummy-})+)\n\
  define\nx as nvl(last(x.b, 1), 0) <= x.a\n) mr;\nA          B\n---------- ----------\n\
  1         15\n17         26\n28         45\n```\n\n有一些使用`model`子句的替代解决方案，但它们的性能比模式匹配解决方案差。\n\
  \n##### Zeckendorf 表示法\n\nZeckendorf 定理指出，每个正整数都可以唯一地表示为一个或多个不连续的斐波那契数之和，且该和不包括任何两个连续的斐波那契数。\n\
  \n对于任何给定的正整数，可以使用贪心算法找到 Zeckendorf 表示，在每个阶段选择最大的可能的斐波那契数。\n\n我们的目标是为表`n`中的所有数字找到满足\
  \ Zeckendorf 定理条件的表示。\n\n```sql\ncreate table n(num) as select 222 from dual union\
  \ all select 3690 from dual;\n```\n\n预期结果是：\n\n```sql\nNUM PATH\n---------- ------------------------------\n\
  222 144+55+21+2\n3690 2584+987+89+21+8+1\n```\n\n为简单起见，假设我们有一个表`fib(lvl, value)`，其中包含前\
  \ 20 个斐波那契数。数字可以使用本书描述的众多方法之一生成。\n\n###### 解法\n\n可以使用 `connect by` 实现一个暴力解法，如下所示。\n\
  \n*   生成所有小于给定数字的斐波那契数的排列；\n*   仅筛选那些和值等于给定数字的排列；\n*   筛选具有最少元素数量的排列。\n\n```sql\n\
  with n_fib as\n(select num, value, lvl, max(lvl) over(partition by num) max_lvl\n\
  from n\njoin fib\non fib.value <= n.num\nand sys_guid() is not null)\nselect num,\n\
  max(substr(path, 2)) keep(dense_rank first order by p_lvl) path\nfrom (select num,\
  \ path, p_lvl\nfrom permutation p\njoin fib\non instr(p.path || '+', '+' || fib.value\
  \ || '+') > 0\ngroup by num, path, p_lvl\nhaving sum(value) = num)\ngroup by num\n\
  order by num;\n```\n*列表 12-15 使用 connect by 的 Zeckendorf 表示法*\n\n显然，这种方法效率极低。作为替代，我们可以对每个输入数字，按降序循环遍历斐波那契数，并在每一步中，如果当前斐波那契数与已标记数字的和不超过输入数字，则标记该当前斐波那契数。这种迭代逻辑可以使用递归子查询因式分解来实现，例如。\n\
  \n```sql\nwith n_fib as\n(select num, value, lvl, max(lvl) over(partition by num)\
  \ max_lvl\nfrom n\njoin fib\non fib.value <= n.num),\nrec(lvl, num, f, s) as\n(select\
  \ 1, n_fib.num, n_fib.value, 0\nfrom n_fib\nwhere n_fib.lvl = n_fib.max_lvl\nunion\
  \ all\nselect rec.lvl + 1, l.num, l.value, rec.f + rec.s\nfrom rec\ncross apply\
  \ (select *\nfrom (select *\nfrom n_fib\nwhere n_fib.num = rec.num\nand n_fib.value\
  \ + rec.s + rec.f <= rec.num\norder by lvl desc)\nwhere rownum = 1) l)\ncycle lvl\
  \ set c to 1 default 0\nselect num, listagg(f, '+') within group(order by f desc)\
  \ path\nfrom rec\ngroup by num\norder by num;\n```\n*列表 12-16 使用递归子查询因式分解和 cross\
  \ apply 的 Zeckendorf 表示法*\n\n列表 12-16 中使用了侧向视图，以便在每一步获取满足条件的最大斐波那契数。如前一章“何时 PL/SQL\
  \ 优于原生 SQL”中提到的，如果在递归成员中存在多个连接或侧向视图，可能会出现假阳性循环检测；使用了 `cycle` 子句来处理这种情况。\n\n通过使用标量子查询代替侧向视图，可以简化和优化此解决方案——在这种情况下，查询可以在\
  \ Oracle 11g 上执行。\n\n```sql\nwith rec(lvl, num, f, s) as\n(select 1,\nn.num,\n(select\
  \ max(fib.value) from fib where fib.value <= n.num),\n0\nfrom n\nunion all\nselect\
  \ lvl + 1,\nd.num,\n(select max(fib.value)\nfrom fib\nwhere fib.value <= d.num -\
  \ (d.f + d.s)),\nd.f + d.s\nfrom rec d\nwhere d.s + d.f < d.num)\nselect num, listagg(f,\
  \ '+') within group(order by f desc) path\nfrom rec\ngroup by num\norder by num;\n\
  ```\n*列表 12-17 使用递归子查询因式分解的 Zeckendorf 表示法。简化版*\n\n如你所见，两种方法都会对 `fib` 表进行多次扫描。为避免多次扫描，我们可以连接表\
  \ `n` 和 `fib`，并在连接后的记录集上应用 `model` 子句。\n\n```sql\nwith n_fib as\n(select num, value,\
  \ lvl\nfrom n\njoin fib\non fib.value <= n.num)\n, m as\n(select *\nfrom n_fib\n\
  model\nignore nav\npartition by (num part)\ndimension by (lvl)\nmeasures (num, value,\
  \ 0 x)\nrules\n(\nx[any] order by lvl desc =\ncase when x[cv(lvl)+1] + value[cv(lvl)]\
  \ <= num[cv(lvl)]\nthen x[cv(lvl)+1] + value[cv(lvl)]\nelse x[cv(lvl)+1]\nend\n\
  ))\nselect num, listagg(f, '+') within group(order by f desc) path\nfrom (select\
  \ num, max(value) f from m group by num, x)\ngroup by num\norder by num;\n```\n\
  *列表 12-18 使用 model 子句的 Zeckendorf 表示法*\n\n最终，最有效的解决方案可以使用模式匹配来实现。\n\n```sql\nselect\
  \ num,\n(select listagg(value, '+')\nwithin group(order by value desc) path\nfrom\
  \ (select n.num, fib.value from n, fib) y\nmatch_recognize\n(\norder by value desc\n\
  all rows per match\npattern((x|{-dummy-})+)\ndefine\nx as sum(x.value) <= num\n\
  ) mr\n) path\nfrom n;\n```\n*列表 12-19 使用模式匹配的 Zeckendorf 表示法*\n\n我们本可以在 `match_recognize`\
  \ 子句中使用显式的 `fib` 表连接和 `partition by num order by value desc`，而不是标量子查询。\n\n使用递归子查询因式分解的实现无法在关联标量子查询中完成，因为在这种情况下无法引用主表的列。\n\
  \n让我们用一个简单的例子来演示这一点：\n\n```sql\nselect t.*,\n(with rec(lvl) as (select /*t.id*/\
  \ 5 lvl from dual\nunion all\nselect rec.lvl + 1 from rec where lvl < 10)\nselect\
  \ listagg(lvl, ', ') within group(order by lvl)\nfrom rec) str\nfrom (select 5 id\
  \ from dual) t;\n```\n\n如果取消注释 `t.id`，查询将失败并显示 `ORA-00904: \"T\".\"ID\": invalid\
  \ identifier`。\n\n##### 顶级路径\n\n对于包含路径列表的表，仅返回那些没有子路径的路径。\n\n```sql\ncreate table\
  \ t_path(path) as\nselect '/tmp/cat/' from dual\nunion all select '/tmp/cata/' from\
  \ dual\nunion all select '/tmp/catb/' from dual\nunion all select '/tmp/catb/catx/'\
  \ from dual\nunion all select '/usr/local/' from dual\nunion all select '/usr/local/lib/liba/'\
  \ from dual\nunion all select '/usr/local/lib/libx/' from dual\nunion all select\
  \ '/var/cache/' from dual\nunion all select '/var/cache/'||'xyz'||rownum||'/' from\
  \ dual\nconnect by level <= 1e6;\n```\n*列表 12-20 路径列表*\n\n对于列表 12-20 中的数据，预期结果如下：\n\
  \n```sql\nPATH\n\n/tmp/cat/\n/tmp/cata/\n/tmp/catb/\n/usr/local/\n/var/cache/\n\
  ```\n\n###### 解决方案\n\n一个直接的解决方案是基于 `like` 进行自连接并过滤。这种方法的主要缺点是，由于连接谓词，连接方法只能是 `NESTED\
  \ LOOPS`，或者从技术上讲，对于内表的每一行，都需要对外表进行一次全表扫描。如果使用 `not exists` 代替外连接，性能可以稍微改善——在这种情况下，Oracle\
  \ 会为内表的每条记录扫描外表，直到找到第一个匹配项为止。\n\n```sql\nselect t_path.path\nfrom t_path\nleft join\
  \ t_path t_top\non t_path.path like t_top.path || '%_/'\nwhere t_top.path is null;\n\
  PATH\n\n/tmp/cat/\n/tmp/cata/\n/tmp/catb/\n/usr/local/\n/var/cache/\nElapsed: 00:00:34.54\n\
  ```\n\n```sql\nselect path\nfrom t_path\nwhere not exists (select null\nfrom t_path\
  \ t_top\nwhere t_path.path like t_top.path || '%_/');\nPATH\n\n/tmp/cat/\n/tmp/cata/\n\
  /tmp/catb/\n/usr/local/\n/var/cache/\nElapsed: 00:00:09.63\n```\n\n代码清单 12-21 使用连接/子查询过滤顶级路径\n\
  \n在将查询重写为 `not exists` 执行后，时间减少了两倍以上。如果在子查询中指定额外的过滤条件 `and where rownum = 1`，由于过滤器的工作方式，这对性能没有影响。\n\
  \n显然，大部分时间都花在了连接和评估 `like` 谓词上，最好能摆脱它。我们可以为每个路径派生所有子路径，如果某些路径有共同的子路径，则只返回那些具有最少子路径数的路径，如代码清单\
  \ 12-22 所示。\n\n```sql\nwith t0 as\n(select path,\nlength(path) - length(replace(path,\
  \ '/')) - 1 depth,\nsubstr(path, 1, instr(path, '/', 1, l.id + 1)) token\nfrom t_path,\n\
  lateral (select rownum id\nfrom dual\nconnect by level <\nlength(path) - length(replace(path,\
  \ '/'))) l),\nt1 as (select t0.*, min(depth) over(partition by token) m from t0)\n\
  select path from t1 group by path, depth having depth = min(m)\norder by path;\n\
  PATH\n\n/tmp/cat/\n/tmp/cata/\n/tmp/catb/\n/usr/local/\n/var/cache/\nElapsed: 00:00:22.78\n\
  ```\n\n代码清单 12-22 使用 lateral 视图和 group by 过滤顶级路径\n\n在这种情况下，`lateral` 视图也会导致 `NESTED\
  \ LOOPS`，这相当消耗 CPU，最终执行时间介于代码清单 12-21 中的第一个和第二个查询之间。\n\n如果最大可能的路径深度是事先已知的，那么我们可以实现以下方法：对于每个子路径，我们检查当前路径在子路径之后是否包含内容（`p[i]`\
  \ 不是 `null`），并且是否存在另一个路径终止于此子路径（`m[i] = 0`），如果是，则过滤掉当前路径。\n\n```sql\nselect path\n\
  from (select t1.*,\nmin(nvl2(p2, 1, 0)) over(partition by p1) m2,\nmin(nvl2(p3,\
  \ 1, 0)) over(partition by p1, p2) m3,\nmin(nvl2(p4, 1, 0)) over(partition by p1,\
  \ p2, p3) m4,\nmin(nvl2(p5, 1, 0)) over(partition by p1, p2, p3, p4) m5\nfrom (select\
  \ path,\nsubstr(path, i1, i2 - i1) p1,\nsubstr(path, i2, i3 - i2) p2,\nsubstr(path,\
  \ i3, i4 - i3) p3,\nsubstr(path, i4, i5 - i4) p4,\nsubstr(path, i5, i6 - i5) p5\n\
  from (select path,\ninstr(path, '/', 1, 1) i1,\ninstr(path, '/', 1, 2) i2,\ninstr(path,\
  \ '/', 1, 3) i3,\ninstr(path, '/', 1, 4) i4,\ninstr(path, '/', 1, 5) i5,\ninstr(path,\
  \ '/', 1, 6) i6\nfrom t_path) t0) t1)\nwhere not (m2 = 0 and p2 is not null or m3\
  \ = 0 and p3 is not null or\nm4 = 0 and p4 is not null or m5 = 0 and p5 is not null);\n\
  PATH\n\n/tmp/cat/\n/tmp/cata/\n/tmp/catb/\n/usr/local/\n/var/cache/\nElapsed: 00:00:13.68\n\
  ```\n\n代码清单 12-23 使用巧妙的分析函数过滤顶级路径\n\n`not exists` 的解决方案比代码清单 12-23 中的查询更快；然而，后者是基于一些假设，而前者是一种更通用的方法。对于使用分析函数的查询，大部分时间都花在了排序上。同样重要的是要注意，`sort_area_size`\
  \ 被设置为最大值，并且没有一个查询需要磁盘 I/O。\n\n最后一个解决方案使用了模式匹配。\n\n```sql\nselect *\nfrom t_path\n\
  match_recognize\n(\norder by path\nmeasures\nfirst(path) path\none row per match\n\
  pattern(x+)\ndefine\nx as path like first(path) || '%'\n) mr;\nPATH\n\n/tmp/cat/\n\
  /tmp/cata/\n/tmp/catb/\n/usr/local/\n/var/cache/\nElapsed: 00:00:00.89\n```\n\n\
  执行时间不到一秒！算法非常简单：我们检查当前组中的第一个路径是否是当前路径的子路径；如果不是，则开始一个新组。\n\n对于 12c 之前的 Oracle 版本，最佳解决方案是使用\
  \ PL/SQL 管道化函数，只需一次表扫描，并采用与模式匹配类似的逻辑。换句话说，这个测验是另一个很好的例子，说明游标 `for` 循环在某些情况下可能比普通的\
  \ SQL 更好。\n\n##### 相似组\n\n根据以下逻辑将行组合成一个相似组：我们从最小值到最大值遍历所有行，如果组中存在某行的值与当前值的差值不超过\
  \ 1，则标记当前行。\n\n对于下面的数据，除了 `ID` 为 6 和 8 的行之外，所有行都应属于该组。\n\n```sql\ncreate table t_resemblance(id,\
  \ value) as\n(select 1, 1 from dual\nunion all select 2, 2 from dual\nunion all\
  \ select 3, 2.5 from dual\nunion all select 4, 3.4 from dual\nunion all select 5,\
  \ 0.4 from dual\nunion all select 6, 5 from dual\nunion all select 7, -0.5 from\
  \ dual\nunion all select 8, -2 from dual\nunion all select 9, -1 from dual\nunion\
  \ all select 10, 3 from dual\nunion all select 11, 4 from dual\nunion all select\
  \ 12, 5 from dual);\n```\n\n第 12 行是该组的一部分，尽管它的值等于未被标记的第 6 行。这是因为在检查第 12 行时，组中包含了值为\
  \ 4 的第 11 行。\n\n\n###### 解决方案\n\n对于集合中的每个元素，都存在另一个元素，使得两者之间的差值不超过 1；因此，根据传递律，我们可以在将当前元素添加到组之前，仅检查它与上下界的关系。\n\
  \n在纯 SQL 中，这个逻辑可以通过迭代模型实现。\n\n```sql\nselect *\nfrom t_resemblance\nmodel\nignore\
  \ nav\ndimension by (row_number() over (order by id) id)\nmeasures(value, 0 mi,\
  \ 0 ma, 0 flag)\nrules iterate (1e9) until value[iteration_number + 2] = 0\n(\n\
  flag[iteration_number + 1] =\ncase when value[iteration_number + 1] between\nmi[iteration_number]\
  \ - 1 and ma[iteration_number] + 1\nor iteration_number = 0\nthen 1 end,\nmi[iteration_number\
  \ + 1] =\ndecode(flag[iteration_number + 1], 1, least(mi[iteration_number],\nvalue[iteration_number\
  \ + 1]), mi[iteration_number]),\nma[iteration_number + 1] =\ndecode(flag[iteration_number\
  \ + 1], 1, greatest(ma[iteration_number],\nvalue[iteration_number + 1]), ma[iteration_number])\n\
  );\nID      VALUE         MI         MA       FLAG\n---------- ---------- ----------\
  \ ---------- ----------\n1          1          0          1          1\n2      \
  \    2          0          2          1\n3        2.5          0        2.5    \
  \      1\n4        3.4          0        3.4          1\n5         .4          0\
  \        3.4          1\n6          5          0        3.4\n7        -.5      \
  \  -.5        3.4          1\n8         -2        -.5        3.4\n9         -1 \
  \        -1        3.4          1\n10          3         -1        3.4         \
  \ 1\n11          4         -1          4          1\n12          5         -1  \
  \        5          1\n12 rows selected.\n```\n\n该算法遍历记录集，每次迭代仅更改一行的度量值。它更新组的上下界并标记当前元素。\n\
  \n迭代是必要的，因为我们必须为每一行更新多个度量。如果使用带有 `ANY` 的规则，那么模型会先对所有行计算第一条规则，然后再计算第二条规则，依此类推。\n\n\
  考虑到逻辑的具体情况，我们可以尝试使用模式匹配子句来接近解决方案，但在这种情况下，我们会面临几个限制：\n\n*   如果在定义子句中使用聚合函数，它会应用于所有行，包括当前行。因此，我们无法将当前值与迄今为止匹配值的最小值/最大值进行比较。\n\
  *   不能在定义子句中使用度量，并且更无法使用前一行的度量值。原因在于度量是在找到匹配之后才进行评估的。\n\n我们可以回想一下，可以使用 `next()`\
  \ 函数，但在这种情况下，我们需要将其应用于偏移一行的值。下面通过使用一个新列 `vv` 而不是 `value` 来进行演示。\n\n```sql\nselect\
  \ *\nfrom (select t.*, lag(value, 1, value) over(order by id) vv\nfrom (select id,\
  \ value\nfrom t_resemblance t\nunion all select null, null from dual) t)\nmatch_recognize\n\
  (\norder by id\nmeasures\nmatch_number() match,\nclassifier() cls,\nmin(x.value)\
  \ mi,\nmax(x.value) ma\nall rows per match\npattern((x|dummy)+)\ndefine\nx as (next(x.vv)\
  \ >= min(x.vv) - 1 and next(x.vv) <= max(x.vv) + 1)\n-- x as (next(x.vv) between\
  \ min(x.vv) - 1 and max(x.vv) + 1)\n) mr\nwhere id is not null;\nID    MATCH CLS\
  \        MI       MA      VALUE         VV\n-------- -------- ----- ------- --------\
  \ ---------- ----------\n1        1 X           1        1          1          1\n\
  2        1 X           1        2          2          1\n3        1 X          \
  \ 1      2.5        2.5          2\n4        1 X           1      3.4        3.4\
  \        2.5\n5        1 X          .4      3.4         .4        3.4\n6       \
  \ 1 DUMMY      .4      3.4          5         .4\n7        1 X         -.5     \
  \ 3.4        -.5          5\n8        1 DUMMY     -.5      3.4         -2      \
  \  -.5\n9        1 X          -1      3.4         -1         -2\n10        1 X \
  \         -1      3.4          3         -1\n11        1 X          -1        4\
  \          4          3\n12        1 X          -1        5          5         \
  \ 4\n12 rows selected.\n```\n\n我们还必须添加一个具有 `null` ID 值的额外行，以正确处理原始记录集中的最后一行。使用 `min()`/`max()`\
  \ 函数并以 `x.value` 作为参数来返回每一步的上下界，但这仅用于信息展示。所有逻辑都在定义子句的一行中实现。如果使用 `next()` 函数和 `between`\
  \ 操作符，查询将引发异常 “`ORA-62508: illegal use of aggregates or navigation operators in\
  \ MATCH_RECOGNIZE clause`”；这就是为什么使用了带有两个条件的规则。\n\n关于这个任务最后需要注意的一点是，还可以使用递归子查询因子化来实现另一个解决方案，但模式匹配方案效率要高得多。\n\
  \n##### 篮子分配\n\n目标是将物品分配到具有定义容量的篮子中。我们从最小到最大的标识符循环遍历篮子，并根据物品的优先级进行分配。如果某个物品已分配到特定篮子，则它不能被分配到任何其他篮子。对于每个篮子，物品的总金额不能超过篮子金额。\n\
  \n对于以下数据：\n\n```sql\nwith\nbaskets(basket_id, basket_amount) as\n( select 100, 500000\
  \ from dual union all\nselect 200, 400000 from dual union all\nselect 300, 1000000\
  \ from dual\n),\ninventory(item_id, item_amount) as\n( select 1000001, 50000 from\
  \ dual union all\nselect 1000002, 15000 from dual union all\nselect 1000003, 250000\
  \ from dual union all\nselect 1000004, 350000 from dual union all\nselect 1000005,\
  \ 45000 from dual union all\nselect 1000006, 100500 from dual union all\nselect\
  \ 1000007, 200500 from dual union all\nselect 1000008, 30050 from dual union all\n\
  select 1000009, 400500 from dual union all\nselect 1000010, 750000 from dual\n),\n\
  eligibility(basket_id, item_id, priority_level) as\n( select 100, 1000003, 1 from\
  \ dual union all\nselect 100, 1000004, 2 from dual union all\nselect 100, 1000002,\
  \ 3 from dual union all\nselect 100, 1000005, 4 from dual union all\nselect 200,\
  \ 1000004, 1 from dual union all\nselect 200, 1000003, 2 from dual union all\nselect\
  \ 200, 1000001, 3 from dual union all\nselect 200, 1000005, 4 from dual union all\n\
  select 200, 1000007, 5 from dual union all\nselect 200, 1000006, 6 from dual union\
  \ all\nselect 300, 1000002, 1 from dual union all\nselect 300, 1000009, 2 from dual\
  \ union all\nselect 300, 1000010, 3 from dual union all\nselect 300, 1000006, 4\
  \ from dual union all\nselect 300, 1000008, 5 from dual\n)\n```\n\n预期结果如下：\n\n```\n\
  BASKET_ID PRIORITY_LEVEL  ITEM_ID BASKET_AMOUNT   ITEM_AMOUNT  RESULT\n----------\
  \ -------------- -------- -------------  ----------- -------\n100              1\
  \  1000003        500000       250000  250000\n100              2  1000004     \
  \   500000       350000       0\n100              3  1000002        500000     \
  \   15000  265000\n100              4  1000005        500000        45000  310000\n\
  200              1  1000004        400000       350000  350000\n200            \
  \  2  1000003        400000       250000       0\n200              3  1000001  \
  \      400000        50000  400000\n200              4  1000005        400000  \
  \      45000       0\n200              5  1000007        400000       200500   \
  \    0\n200              6  1000006        400000       100500       0\n300    \
  \          1  1000002       1000000        15000       0\n300              2  1000009\
  \       1000000       400500  400500\n300              3  1000010       1000000\
  \       750000       0\n300              4  1000006       1000000       100500 \
  \ 501000\n300              5  1000008       1000000        30050  531050\n15 rows\
  \ selected.\n```\n\n\n###### 解决方案\n\n此任务的主要复杂性在于我们需要跟踪已分配的次数。否则，解决方案将相当简单，并类似于“曾肯道夫表示法”。这个细节也使得无法使用模式匹配来求解。\n\
  \n我们将使用一个联合记录集作为来源，因此引入一个因子化查询 `t`。\n\n```\nt(basket_id, item_id, basket_amount,\
  \ item_amount, priority_level) as\n( select e.basket_id,\ne.item_id,\nb.basket_amount,\n\
  i.item_amount,\ne.priority_level\nfrom eligibility e\njoin baskets b\non b.basket_id\
  \ = e.basket_id\njoin inventory i\non i.item_id = e.item_id\norder by basket_id,\
  \ priority_level)\n```\n\n代码清单 12-24 展示了如何使用 `model` 子句来解决此问题。\n\n```\nselect *\n\
  from t\nmodel\ndimension by (basket_id, priority_level, item_id)\nmeasures (basket_amount,\
  \ item_amount, 0 result)\nrules\n(\nresult[any, any, any] order by basket_id, priority_level,\
  \ item_id =\ncase when max(result)[any, any, cv(item_id)] = 0 and\nnvl(max(result)[cv(basket_id),priority_level\
  \ < cv(priority_level),any],0) +\nitem_amount[cv(basket_id),cv(priority_level),cv(item_id)]\n\
  <= max(basket_amount)[cv(basket_id),cv(priority_level),any]\nthen nvl(max(result)[cv(basket_id),priority_level\
  \ < cv(priority_level),any],0) +\nitem_amount[cv(basket_id),cv(priority_level),cv(item_id)]\n\
  else 0\nend\n)\norder by 1, 2;\n```\n代码清单 12-24: 使用 model 子句分配物品\n\n`basket_id`\
  \ 和 `priority_level` 的组合足以进行唯一寻址，但 `item_id` 被添加到维度中，以便我们能够判断某个特定物品是否已被使用。整个逻辑在一个紧凑的规则中实现，但它使用了一些具有不同寻址方式的聚合函数，这使得解决方案的效率不高。\n\
  \n我们可以注意到，使用一种类似于前一个测验“相似分组”中的方法是可行的，在那个方法中，我们以特定顺序遍历记录集，并为每一行计算多个度量值。在这种情况下，度量值是\
  \ `is_used`（一个标识特定物品是否已分配给特定篮子的标志）、`total`（每个篮子的运行总计）和 `str`（已分配物品的拼接）。实现可以使用迭代模型（如同前一个任务）或递归子查询因子化。后者在代码清单\
  \ 12-25 中展示。\n\n```\nwith t0 as\n(select t.*, row_number() over (order by basket_id,\
  \ priority_level) rn\nfrom t),\nrec (basket_id, item_id, basket_amount, item_amount,\
  \ priority_level,\nrn, total, is_used, str) as\n(select t.basket_id, t.item_id,\
  \ t.basket_amount,\nt.item_amount, t.priority_level, t.rn,\ncase when t.item_amount\
  \ <= t.basket_amount\nthen t.item_amount else 0 end,\ncase when t.item_amount <=\
  \ t.basket_amount then 1 end,\ncast(case when t.item_amount <= t.basket_amount\n\
  then ',' || t.item_id end as varchar2(4000))\nfrom t0 t where rn = 1\nunion all\n\
  select t.basket_id, t.item_id, t.basket_amount,\nt.item_amount, t.priority_level,\
  \ t.rn,\ncase when decode(t.basket_id, r.basket_id, r.total, 0)\n+ t.item_amount\
  \ <= t.basket_amount\nand instr(r.str, t.item_id) = 0\nthen decode(t.basket_id,\
  \ r.basket_id, r.total, 0)\n+ t.item_amount\nelse decode(t.basket_id, r.basket_id,\
  \ r.total, 0)\nend,\ncase when decode(t.basket_id, r.basket_id, r.total, 0)\n+ t.item_amount\
  \ <= t.basket_amount\nand instr(r.str, t.item_id) = 0\nthen 1\nend,\ncase when decode(t.basket_id,\
  \ r.basket_id, r.total, 0)\n+ t.item_amount <= t.basket_amount\nand instr(r.str,\
  \ t.item_id) = 0\nthen r.str || ',' || t.item_id\nelse r.str\nend\nfrom t0 t\njoin\
  \ rec r on t.rn = r.rn + 1)\nselect * from rec;\n```\n代码清单 12-25: 使用递归子查询因子化分配物品\n\
  \n已分配物品的拼接用于检查当前物品是否已被分配，但我们可以使用一个集合（collection）而不是字符串，以避免 `varchar2` 长度的限制。无论如何，我们必须为每一行填充已使用物品的列表，这对内存消耗和整体性能都有负面影响。\n\
  \n尽管使用 `model` 的解决方案相当简洁，但对于相对较小的数据量（大约数千行）来说，其性能是合理的。如果你将 `t0` 插入到一个按 `rn` 建立索引的临时表中，以便\
  \ Oracle 在每次迭代中通过索引只访问单行，那么递归子查询因子化的性能可以得到改善。\n\n最高效的解决方案将是使用 PL/SQL 函数，该函数使用游标\
  \ FOR 循环和一个已分配物品的关联数组，以最快地检查物品是否已被分配。\n\n##### 最长递增子序列\n\n最长递增子序列问题是在给定序列中找到一个子序列，该子序列的元素按从低到高的顺序排序，并且子序列尽可能长。这个子序列不一定是连续的。针对数据库，我们将在一系列行中寻找最长的子序列。\n\
  \n例如，对于序列\n\n```\n14, 15, 9, 11, 16, 12, 13\n```\n\n预期结果是\n\n```\n9, 11, 12, 13\n\
  ```\n\n为简单起见，我们将推导最长递增子序列的长度，而不返回子序列本身。对于上述数据，正确答案是 4。\n\n###### 解决方案\n\n与之前所有任务不同，让我们从一种\
  \ PL/SQL 方法开始。这个问题可以使用**动态规划**以相当高效的方式解决。\n\n因此，假设我们需要为当前元素计算子序列长度 `L`，并且对于已分析的元素，`L`\
  \ 值已经计算好。在这种情况下，当前元素的 `L` 值等于所有小于当前元素的前序元素中的 `max(L)` 值再加 1。这听起来可能有点复杂，但实现起来相当简单。让我们重用“Unnesting\
  \ Collections”一节中的类型 `numbers` 和“Iterative-Like computations”一节中的表 `tmp`，`lvl` 代表当前步骤的长度，`x`\
  \ 是序号，`num` 是值。\n\n```sql\ndeclare\n    t numbers := numbers(14, 15, 9, 11, 16,\
  \ 12, 13);\nbegin\n    delete from tmp;\n    for i in 1 .. t.count loop\n      \
  \  insert into tmp\n            (lvl, x, num)\n        values\n            ((select\
  \ nvl(max(lvl), 0) + 1 from tmp where num < t(i)), i, t(i));\n    end loop;\nend;\n\
  /\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n```sql\nselect *\
  \ from tmp;\n```\n\n```\n       LVL          X        NUM\n---------- ----------\
  \ ----------\n         1          1         14\n         2          2         15\n\
  \         1          3          9\n         2          4         11\n         3\
  \          5         16\n         3          6         12\n         4          7\
  \         13\n\n7 rows selected.\n```\n\n要获取所有元素的 `max(lvl)`，我们需要扫描 `tmp` 表。另一种选择是使用\
  \ PL/SQL 变量并在每次迭代时更新它。鉴于对于每个元素我们都要扫描所有前序元素，该算法的计算复杂度为 `O(n²)`。同样，扫描所有前序元素的必要性使得使用递归子查询因式分解的实现变得不合理；请查看“Iterative-Like\
  \ computations”一节以获取更多细节。\n\n回到 PL/SQL，如果我们使用一个辅助数组来保存最长递增子序列并在每次迭代时刷新它，算法可以得到改进。刷新遵循以下原理：我们查找小于当前值的最大值，并将当前值放在找到的值之后。二分查找在对数时间\
  \ `O(log[2]n)` 内运行，因此总计算复杂度为 `O(n * log[2]n)`。\n\n```sql\ndeclare\n    x    numbers\
  \ := numbers(14, 15, 9, 11, 16, 12, 13);\n    m    numbers := numbers();\n    l\
  \    int;\n    newl int;\n    v    varchar2(4000);\n    -- 数组 M 中小于 p 的最大元素的索引\n\
  \    function f(p in number) return int as\n        lo  int;\n        hi  int;\n\
  \        mid int;\n    begin\n        lo := 1;\n        hi := l;\n        while\
  \ lo <= hi loop\n            mid := floor((lo + hi) / 2);\n            if x(m(mid))\
  \ < p then\n                lo := mid + 1;\n            else\n                hi\
  \ := mid - 1;\n            end if;\n        end loop;\n        return hi;\n    end;\n\
  begin\n    for i in 1 .. x.count loop\n        newl := f(x(i)) + 1;\n        if\
  \ newl > l then\n            l := newl;\n            m.extend;\n        end if;\n\
  \        m(newl) := i;\n        v := '';\n        for j in 1 .. l loop\n       \
  \     v := v || ' ' || x(m(j));\n        end loop;\n        dbms_output.put_line(i\
  \ || ' ' || v);\n    end loop;\nend;\n/\n```\n\n```\n1  14\n2  14 15\n3  9 15\n\
  4  9 11\n5  9 11 16\n6  9 11 12\n7  9 11 12 13\nPL/SQL procedure successfully completed.\n\
  ```\n\n`l` 是每次迭代时最长递增子序列的长度。\n\nSQL 实现可以使用 `model` 子句完成。\n\n```sql\nwith t(id, value)\
  \ as\n    (select rownum, column_value from table(numbers(14, 15, 9, 11, 16, 12,\
  \ 13)))\nselect *\nfrom t\nmodel\n    dimension by (id, value)\n    measures(0 l)\n\
  \    (l[any, any] order by id = nvl(max(l)[id < cv(id),value < cv(value)],0) + 1)\n\
  order by 1;\n```\n\n该方法类似于 PL/SQL 中的第一个解决方案，但由于无法在纯 SQL 中像使用 PL/SQL 那样高效地实现第二个解决方案。当我们使用\
  \ `model` 时，我们处理的是包含列和行的扁平数据集（即使我们认为它是一个多维数组），并且无法使用任何辅助数据结构来优化解决方案。\n\n##### Quine（自产生程序）\n\
  \n最后一个测验更多是为了趣味，而不是为了展示 Oracle SQL 特性。Quine 是一个不接受任何输入，并以其自身源代码的副本作为唯一输出的程序。你可以在互联网上找到各种编程语言的许多解决方案，我将不专注于\
  \ PL/SQL 解决方案，因为其方法与 Pascal 等语言非常相似。展示 SQL 方法则更有趣一些。\n\n###### 解决方案\n\n其中一个要求是程序（在我们的例子中是\
  \ SQL 查询）不能访问外部源来读取其代码。因此，下面的查询不能被视为一个完整的解决方案。\n\n```sql\nset pagesize 0 linesize\
  \ 90\nselect sql_text||';'from v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\n\
  select sql_text||';'from v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\n\
  ```\n\n另一方面，以下两个解决方案满足所有要求。\n\n```sql\nselect substr(rpad(1,125,'||chr(39)),26)from\n\
  dual;select substr(rpad(1,125,'||chr(39)),26)from\ndual;\nselect substr(rpad(1,125,'||chr(39)),26)from\n\
  dual;select substr(rpad(1,125,'||chr(39)),26)from\ndual;\n```\n\n```sql\nselect\n\
  replace('@''[@'||chr(93)||''')from dual;','@',q'[select\nreplace('@''[@'||chr(93)||''')from\
  \ dual;','@',q]')from dual;\nselect\nreplace('@''[@'||chr(93)||''')from dual;','@',q'[select\n\
  replace('@''[@'||chr(93)||''')from dual;','@',q]')from dual;\n```\n\n也许你可以在 Oracle\
  \ SQL 中写出更短的 quine？\n\n##### 总结\n\n*这里展示了*通过选定的任务，Oracle 专有 SQL 比标准 SQL 强大得多，并且一些任务可以用非常少的代码以高度可扩展的方式解决。我特别想强调\
  \ Oracle 12c 的一个新特性——模式匹配，它使得能够以非常高效的方式解决各种任务，否则这些任务将需要大量的 PL/SQL 代码。\n\n一些复杂任务可以使用递归子查询因式分解或带有\
  \ `model` 子句的方法解决，其性能与 PL/SQL 相比具有竞争力。这两种方法都不需要对象集合，这与使用管道函数的 PL/SQL 方法不同。`model`\
  \ 子句的优点是代码简洁，并且在分区使用和并行执行时具有出色的可扩展性。递归子查询因式分解的优点是在 SQL 引擎范围内执行，并且不需要在每次迭代时进行上下文切换。\n\
  \n然而，如果你需要实现一个可能需要额外数据结构和执行控制的复杂算法，那么 PL/SQL 往往是更优的方法。但是，当你切换到过程语言来处理数据时，你总是应该有一个答案来说明为什么对于你的特定任务它比\
  \ SQL 更好。最后需要注意的一点是：如果你必须实现一些需要大量 CPU 的密集计算，那么外部库和使用 C 语言实现可能是最佳选择。\n\n细节确实很重要，因此在决定优选方法之前，你必须考虑特定任务的具体情况，并比较不同方法在你所用\
  \ Oracle 版本上的表现。\n\n\n# 实用 Oracle 链接\n\n1.  CBO 内幕探秘：10053 事件 [`http://www.centrexcc.com/A%20Look%20under%20the%20Hood%20of%20CBO%20-%20the%2010053%20Event.pdf`](http://www.centrexcc.com/A%20Look%20under%20the%20Hood%20of%20CBO%20-%20the%2010053%20Event.pdf)\n\
