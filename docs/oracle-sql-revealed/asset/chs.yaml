  ###### 引言


  本书的主要目的是描述 SQL 在实现复杂逻辑方面的能力，特别是 Oracle SQL 方言的特定功能。SQL，尤其是 Oracle 方言，是一种极其强大的语言，能够让你用极少的代码以高度可扩展的方式获得结果。


  本书面向具有任何关系型 DBMS 工作经验以及基本 SQL 知识的读者。特别是，最好能理解 SQL 是一种声明式语言，因此它描述的是“要获得什么”，而不是“如何获得结果”。同样，了解查询计划是什么以及如何阅读它也是极为可取的。


  第一部分详细概述了 Oracle 中用于数据选择的 SQL 功能以及一些基本的 SQL 概念。关于基于成本的优化器的信息被刻意最小化，这样读者就不会陷入细枝末节，而可以专注于实现业务逻辑和理解
  SQL 引擎机制的功能。然而，完全跳过某些概念是不可能的，因此有一章专门讨论查询转换。


  Oracle 的功能和特性随着版本更新而不断演进，因此有时会提及不同的 Oracle 版本 10g (10.2.0.5)、11g (11.2.0.4) 和 12c
  (12.1.0.2, 12.2.0.1) 以突出这些变化。Oracle 在引入新功能的同时，也致力于修复现有错误，因此我尽量不提及那些已修复且对于描述 SQL
  可能性不重要的错误。非常重要的一点是，要记住 Oracle 的这种演进意味着，5 年、10 年或 15 年前的最佳实践，在新版本上可能根本不是最佳方法。


  目标是，一方面提供对功能的全面分析，另一方面最小化页数。因此，几乎每一章的叙述都迅速从基本概念推进到复杂细节。有时读者可能会有疑问，而这些问题将在后续文本中得到解答，所以请继续阅读，希望你能找到所需的说明或更多细节。


  本书第二部分涵盖了许多可以使用 Oracle SQL 方言解决的实际任务。有时也提供了 PL/SQL 解决方案，只是为了突显 SQL 当前的限制，或者为了说明即使
  SQL 解决方案看起来简洁易懂，从性能角度来看 PL/SQL 可能是更优的选择。你可以在第二部分的第一章中找到许多 `PL/SQL` 优于 `Vanilla SQL`
  的实际案例。


  我认为没有必要收集那些只需要 PL/SQL 编程的算法测验，因为 PL/SQL 是另一种带有一些面向对象扩展的过程式语言，所以读者可以找到各种关于算法和编程的书籍，并尝试用
  PL/SQL 实现这些程序。要了解 PL/SQL 相对于普通过程式语言的优势，请参阅附录中的注释 [8]。此外，PL/SQL 具有许多与 SQL 引擎高效交互的功能，附录中的注释
  [9] 可能是一个很好的起点。




