    жҳҫз„¶пјҢеҜ№дәҺжӯӨд»»еҠЎпјҢ**PL/SQL** ж–№жі•зҡ„жҖ§иғҪиҝңдјҳдәҺ **SQL**гҖӮPL/SQL д»Јз Ғз»ҷдәәдёҖз§ҚеҚ°иұЎпјҢеҚіжӯӨйҖ»иҫ‘д№ҹеҸҜд»ҘдҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–жқҘе®һзҺ°гҖӮдҪҶжңүдёҖдёӘй—®йўҳвҖ”вҖ”еңЁ
    **PL/SQL** еҫӘзҺҜдёӯпјҢжҲ‘д»¬йңҖиҰҒдёҖдёӘеҢ…еҗ«жүҖжңүиҝӯд»Јж•°жҚ®зҡ„е®Ңж•ҙ `tmp` иЎЁпјҢиҖҢйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–д»…и®ҝй—®еүҚдёҖж¬Ўиҝӯд»Јзҡ„ж•°жҚ®гҖӮжҲ‘д»¬еҸҜд»ҘдҪҝз”ЁдёҖдёӘжҠҖе·§пјҢйҖҡиҝҮйўқеӨ–зҡ„иҒ”жҺҘе°ҶеүҚдёҖж¬Ўиҝӯд»Јзҡ„и®°еҪ•йӣҶж·»еҠ еҲ°еҪ“еүҚиҝӯд»Јзҡ„и®°еҪ•йӣҶдёӯгҖӮжӯӨж–№жі•еҰӮд»Јз Ғжё…еҚ•
    11-18 жүҖзӨәгҖӮ


    ```

    with

    r0(x, num) as

    (select rownum, num from (select num from t_num order by num)),

    rec(iter, lvl, x, num) as

    (select 1, 1, rownum, num from r0

    union all

    select rec.iter + 1,

    decode(z.id, 1, rec.lvl, rec.lvl + 1),

    decode(z.id, 1, rec.x, 0),

    decode(z.id, 1, rec.num, rec.num + r0.num)

    from rec

    join r0

    on rec.iter + 1 = r0.x

    join (select 1 id from dual union all select 2 id from dual) z

    on (z.id = 1 or rec.x < r0.x)

    where rec.iter < 15

    )

    select * from rec

    where iter = 15 and lvl = 1;

    д»Јз Ғжё…еҚ• 11-18

    дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–иҺ·еҸ–жүҖжңүеӯҗйӣҶзҡ„е’Ң

    ```


    е°Ҫз®ЎжӯӨж–№жі•жңүж•Ҳе№¶дә§з”ҹжӯЈзЎ®з»“жһңпјҢдҪҶж•ҲзҺҮзӣёеҪ“дҪҺпјҢеӣ дёәеңЁжҜҸж¬Ўиҝӯд»ЈдёӯпјҢжҲ‘д»¬йғҪдјҡеӨҚеҲ¶жүҖжңүеүҚдёҖж¬Ўиҝӯд»Јзҡ„ж•°жҚ®гҖӮеҰӮжһңжҲ‘д»¬е°Ҷ `sort_area_size` и®ҫзҪ®дёәжңҖеӨ§еҖјпјҢеҲҷиҖ—ж—¶зәҰдёә
    30 з§’пјҢдҪҶж— и®әеҰӮдҪ•пјҢиҝҷдё»иҰҒжҳҜеҮәдәҺеӯҰжңҜзӣ®зҡ„иҝӣиЎҢжј”зӨәпјҢд»ҘиҜҙжҳҺеҚідҪҝжҳҜз®ҖеҚ•зҡ„ **PL/SQL** еҫӘзҺҜд№ҹеҸҜиғҪж— жі•йҖҡиҝҮйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–й«ҳж•Ҳең°йҮҚж–°е®һзҺ°гҖӮ


    еҰӮжһңжҲ‘д»¬ж”№еҸҳжҹҘиҜўдёӯзҡ„иҒ”жҺҘйЎәеәҸпјҢе®ғе°ҶеӨұиҙҘе№¶еҮәзҺ° `ORA-32044: cycle detected while executing recursive WITH
    query` й”ҷиҜҜпјҢе№¶дё”дёәдәҶйҒҝе…ҚжӯӨй”ҷиҜҜпјҢйңҖиҰҒ `cycle` еӯҗеҸҘпјҢе°Ҫз®ЎиҝҷжҳҜдёҖдёӘйҖ»иҫ‘дёҠзӯүж•Ҳзҡ„жҹҘиҜўпјҢе№¶дё”еҚідҪҝжІЎжңү `cycle` еӯҗеҸҘпјҢе…¶жү§иЎҢи®ЎеҲ’д№ҹдёҺд»Јз Ғжё…еҚ•
    11-18 дёӯзҡ„жҹҘиҜўзӣёеҗҢгҖӮ


    ```

    ...

    from rec

    cross join (select 1 id from dual union all select 2 id from dual) z

    join r0

    on rec.iter + 1 = r0.x

    where (z.id = 1 or rec.x < r0.x))

    cycle iter set c to 1 default 0

    ...

    ```


    жң¬иҠӮеҲҶжһҗдәҶдёӨйЎ№д»»еҠЎпјҡеңЁз¬¬дёҖз§Қжғ…еҶөдёӢпјҢиҝӯд»ЈжңүеҠ©дәҺйҒҝе…Қжү«жҸҸдёҚеҝ…иҰҒзҡ„ж•°жҚ®жҲ–вҖңдјҳеҢ–и®ЎеҲ’вҖқпјӣиҖҢз¬¬дәҢйЎ№д»»еҠЎжң¬иә«е…·жңүиҝӯд»ЈжҖ§иҙЁгҖӮ


    ## иҒ”жҺҘдёҺеӯҗжҹҘиҜўзҡ„зү№жҖ§


    SQL и®ҫи®Ўз”ЁдәҺеӨ„зҗҶи®°еҪ•йӣҶпјҢе®һйҷ…дёҠеҸӘжңүдёүз§ҚиҒ”жҺҘж–№жі•вҖ”вҖ”`HASH JOIN`пјҲе“ҲеёҢиҒ”жҺҘпјүгҖҒ`NESTED LOOPS`пјҲеөҢеҘ—еҫӘзҺҜпјүе’Ң `MERGE JOIN`пјҲеҗҲе№¶иҒ”жҺҘпјүгҖӮе®ғд»¬йғҪжңүеҗ„иҮӘзҡ„дјҳзјәзӮ№е’ҢйҖӮз”ЁиҢғеӣҙпјӣ`HASH
    JOIN` е’Ң `MERGE JOIN` дёҚиғҪеғҸ `NESTED LOOPS` йӮЈж ·з”ЁдәҺд»»ж„Ҹи°“иҜҚгҖӮ


    и°ҲеҲ°еӯҗжҹҘиҜўпјҢеӯҳеңЁдёҖдәӣйҷҗеҲ¶пјҢдҫӢеҰӮзӣёе…іеӯҗжҹҘиҜўзҡ„еөҢеҘ—йҷҗеҲ¶пјҢиҝҷжңүж—¶дҪҝеҫ—ж— жі•еңЁеӯҗжҹҘиҜўдёӯе®һзҺ°еӨҚжқӮйҖ»иҫ‘гҖӮиҝҷдәӣйҷҗеҲ¶д»ҘеҸҠе…¶д»–дёҖдәӣз»ҶиҠӮе’ҢзӨәдҫӢе°ҶеңЁд»ҘдёӢе°ҸиҠӮдёӯи®Ёи®әгҖӮ


    ### иҒ”жҺҘзҡ„зү№жҖ§


    еңЁжң¬е°ҸиҠӮдёӯпјҢжҲ‘д»¬е°ҶиҖғиҷ‘дёҖдёӘд»»еҠЎпјҢе…¶дёӯ **PL/SQL** её®еҠ©д»ҘжҜ” **SQL** жӣҙй«ҳж•Ҳзҡ„ж–№ејҸе®һзҺ°жҹҘжүҫгҖӮ


    д»Јз Ғжё…еҚ• 11-19 еұ•зӨәдәҶеҲӣе»әдёҖдёӘеҢ…еҗ«з”өиҜқе‘јеҸ«дҝЎжҒҜзҡ„иЎЁзҡ„и„ҡжң¬пјҢиҜҘиЎЁеҢ…еҗ«з”өиҜқеҸ·з Ғе’Ңд»ҘеҲҶй’ҹдёәеҚ•дҪҚзҡ„ж—¶й•ҝгҖӮ


    ```

    create table phone_call (num varchar2(11), duration int);

    exec dbms_random.seed(1);

    insert --+ append

    into phone_call

    select ''01'' || to_char(trunc(1e9 * dbms_random.value), ''fm099999999''),

    trunc(dbms_random.value(1, 5 + 1))

    from dual

    connect by level <= 1e6;

    commit;

    exec dbms_stats.gather_table_stats(user, ''phone_call'');

    д»Јз Ғжё…еҚ• 11-19

    еҢ…еҗ«з”өиҜқе‘јеҸ«дҝЎжҒҜзҡ„иЎЁ

    ```


    д»Јз Ғжё…еҚ• 11-20 еұ•зӨәдәҶеҲӣе»әдёҖдёӘеҢ…еҗ«иӢұеӣҪз”өиҜқеҢәеҸ·йқҷжҖҒеҲ—иЎЁзҡ„иЎЁзҡ„и„ҡжң¬гҖӮеҰӮжһңжӮЁжІЎжңүжқғйҷҗеңЁ Oracle дёӯйҖҡиҝҮ `httpuritype` иҺ·еҸ–е®ғпјҢеҸҜд»ҘдҪҝз”Ё
    [`вҖӢwww.вҖӢarea-codes.вҖӢorg.вҖӢuk/вҖӢuk-area-codes.вҖӢxlsx`](http://www.area-codes.org.uk/uk-area-codes.xlsx)
    дёӢиҪҪжӯӨеҲ—иЎЁе№¶жүӢеҠЁеҜје…ҘгҖӮ


    ```

    create table phone_code as

    with tbl as

    (select regexp_substr(httpuritype(''http://www.area-codes.org.uk/full-uk-area-code-list.php'')

    .getclob(),

    ''.*?'',

    1,

    1,

    ''n'') c

    from dual)

    select *

    from xmltable(''/table/tr'' passing xmltype((select c from tbl))

    columns

    code varchar2(6) path ''/tr/td[1]'',

    area varchar2(50) path ''/tr/td[2]'')

    order by 1;

    exec dbms_stats.gather_table_stats(user, ''phone_call'');

    д»Јз Ғжё…еҚ• 11-20

    еҢ…еҗ«з”өиҜқеҢәеҸ·еҲ—иЎЁзҡ„иЎЁ

    ```


    зӣ®ж ҮжҳҜи®Ўз®—жҜҸдёӘеҢәеҸ·зҡ„жҖ»ж—¶й•ҝгҖӮ


    йў„з”ҹжҲҗзҡ„ж•°жҚ®дёӯжңүдёҖдәӣзү№зӮ№пјҡ


    1.  дёәз®ҖеҚ•иө·и§ҒпјҢз”өиҜқеҸ·з Ғд»Ҙ `01` ејҖеӨҙпјҢдҪҶе®һйҷ…дёҠеүҚдёӨдҪҚж•°еӯ—еҸҜд»ҘжҳҜ `01`гҖҒ`02`гҖҒ`03`гҖҒ`05`гҖҒ`07`гҖҒ`08` е’Ң `09`гҖӮ

    2.  жңүдәӣз”өиҜқеҸ·з ҒжҳҜдёҚжӯЈзЎ®зҡ„пјҢеӣ дёәе®ғд»¬зҡ„еҢәеҸ·дёҚеӯҳеңЁпјҡдҫӢеҰӮпјҢ`0119`гҖӮиҝҷжҳҜз”ҹжҲҗзҡ„еүҜдҪңз”ЁпјҢжӯӨзұ»е‘јеҸ«е°Ҷд»Һз»“жһңдёӯжҺ’йҷӨгҖӮ

    3.  еҸ·з ҒдёҚжҳҜе”ҜдёҖзҡ„пјҢиҝҷеҸҜд»ҘйҖҡиҝҮдёӢйқўзҡ„жҹҘиҜўиҪ»жқҫжЈҖжҹҘгҖӮ


    ```

    select count(*) cnt_all, count(distinct num) cnt_dist from phone_call;

    CNT_ALL   CNT_DIST

    ---------- ----------

    1000000     999490

    ```


    и°ҲеҲ°з”өиҜқеҢәеҸ·пјҢдёҖдёӘеҢәеҸ·еҸҜиғҪжҳҜеҸҰдёҖдёӘеҢәеҸ·зҡ„еүҚзјҖгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪңдёәз”өиҜқеҸ·з ҒеүҚзјҖзҡ„жңҖй•ҝеҢәеҸ·жүҚжҳҜе®һйҷ…зҡ„еҢәеҸ·гҖӮ


