    There are no predefined pseudocolumns for recursive subquery factoring so the
    calculation logic should be implemented manually. For example, a node is not a
    leaf node if itвҖҷs followed by node on the next level when search depth first is
    specifiedВ вҖ“ this logic was used to calculate is_leaf column.


    Mechanics of calculating a path from the previous example is a bit more interesting.
    An expression for a path references a path from a previous iteration. This is
    one of the most important differences from вҖңconnect by,вҖқ which allows referencing
    only existing columns (not calculated ones). So if the goal is to calculate a
    path not from the root to the current node but in the opposite directionВ вҖ“ from
    current node to root, then it can be done by replacing вҖң`r.path || ''->'' || t.id`вҖқ
    with вҖң`''->'' || t.id || r.path`вҖқ. On the other hand, itвҖҷs not possible with connect
    by and built-in capabilities.


    Listing [6-4](#A455196_1_En_6_Chapter.html#Par16) shows how recursive sequences
    from the previous chapter can be generated using recursive subquery factoring.
    In the first case the current value depends only on the previous value while in
    the second case it depends on the previous value and the one before it. Recursive
    subquery factoring allows referring only values from previous iteration so in
    order to be able to use values from an i-2 iteration, we introduced an auxiliary
    column.


    ```

    with t(id, result) as

    (

    select 0 id, 1 result from dual

    union all

    select t.id + 1, round(100 * sin(t.result + t.id))

    from t

    where t.id < 20

    )

    select * from t;

    with t (lvl, result, tmp) as

    (

    select 1, 0, 1 from dual

    union all

    select lvl + 1, tmp, tmp + result

    from t

    where lvl < 15)

    select lvl, result from t;

    Listing 6-4

    Generating of recursive sequences

    ```


    If we need to use values from several previous iterations, we can either add multiple
    auxiliary columns or use a collection column .


    Anyway, such approaches are much more efficient than вҖңconnect byвҖқ because there
    is no need for running over pre-generated values to generate each new row.


    As it was already mentioned, recursive subquery factoring allows referring values
    calculated on a previous iteration. This technique can be used for root-finding
    using the bisection method . This method is demonstrated purely to highlight capabilities
    of the SQL language, and there is no practical need to use SQL for this task.


    LetвҖҷs consider function y, which has different signs in points 1 and 2.


    ```

    create or replace function y(x in number) return number as

    begin return x*x - 2; end;

    ```


    Listing [6-5](#A455196_1_En_6_Chapter.html#Par23) shows how to find the root in
    the range [1; 2] with precision 0.01.


    ```

    with t(id, x, x0, x1) as

    (

    select 0, 0, 1, 2

    from dual

    union all

    select t.id + 1,

    (t.x0 + t.x1) / 2,

    case

    when sign(y(x0)) = sign(y((t.x0 + t.x1) / 2))

    then (t.x0 + t.x1) / 2

    else x0

    end,

    case

    when sign(y(x1)) = sign(y((t.x0 + t.x1) / 2))

    then (t.x0 + t.x1) / 2

    else x1

    end

    from t

    where abs((t.x0 + t.x1) / 2 - t.x) > 1e-2

    )

    select t.*, (x0+x1)/2 result from t;

    ID          X         X0         X1     RESULT

    ---------- ---------- ---------- ---------- ----------

    0          0          1          2        1.5

    1        1.5          1        1.5       1.25

    2       1.25       1.25        1.5      1.375

    3      1.375      1.375        1.5     1.4375

    4     1.4375      1.375     1.4375    1.40625

    5    1.40625    1.40625     1.4375   1.421875

    6   1.421875    1.40625   1.421875  1.4140625

    Listing 6-5

    Finding the root using bisection method and recursive subquery factoring clause

    ```


    The algorithm divides the range on each step according to following rule: if sign
    of the function in the midpoint is the same as at the right border, then move
    the right border to the midpoint or else move the left border to the midpoint.
    Repeat iterations unless the difference between the midpoint on the current step
    and the midpoint on the previous step is less than 0.01.


    Required precision was satisfied on the 6th iteration and the found root is a
    midpoint on the next iteration, which is 1.4140625.


    Range borders on each iteration were calculated using values from a previous iteration.
    It would not be possible to use вҖңconnect byвҖқ to implement this approach. The term
    вҖңiterationвҖқ instead of level was used to highlight the iterative nature of the
    algorithm.'
