    ## еј•иЁҖ


    жң¬д№Ұзҡ„дё»иҰҒзӣ®зҡ„жҳҜжҸҸиҝ° SQL еңЁе®һзҺ°еӨҚжқӮйҖ»иҫ‘ж–№йқўзҡ„иғҪеҠӣпјҢзү№еҲ«жҳҜ Oracle SQL ж–№иЁҖзҡ„зү№е®ҡеҠҹиғҪгҖӮSQLпјҢе°Өе…¶жҳҜ Oracle ж–№иЁҖпјҢжҳҜдёҖз§ҚжһҒе…¶ејәеӨ§зҡ„иҜӯиЁҖпјҢиғҪеӨҹи®©дҪ з”ЁжһҒе°‘зҡ„д»Јз Ғд»Ҙй«ҳеәҰеҸҜжү©еұ•зҡ„ж–№ејҸиҺ·еҫ—з»“жһңгҖӮ


    жң¬д№Ұйқўеҗ‘е…·жңүд»»дҪ•е…ізі»еһӢ DBMS е·ҘдҪңз»ҸйӘҢд»ҘеҸҠеҹәжң¬ SQL зҹҘиҜҶзҡ„иҜ»иҖ…гҖӮзү№еҲ«жҳҜпјҢжңҖеҘҪиғҪзҗҶи§Ј SQL жҳҜдёҖз§ҚеЈ°жҳҺејҸиҜӯиЁҖпјҢеӣ жӯӨе®ғжҸҸиҝ°зҡ„жҳҜвҖңиҰҒиҺ·еҫ—д»Җд№ҲвҖқпјҢиҖҢдёҚжҳҜвҖңеҰӮдҪ•иҺ·еҫ—з»“жһңвҖқгҖӮеҗҢж ·пјҢдәҶи§ЈжҹҘиҜўи®ЎеҲ’жҳҜд»Җд№Ҳд»ҘеҸҠеҰӮдҪ•йҳ…иҜ»е®ғд№ҹжҳҜжһҒдёәеҸҜеҸ–зҡ„гҖӮ


    з¬¬дёҖйғЁеҲҶиҜҰз»ҶжҰӮиҝ°дәҶ Oracle дёӯз”ЁдәҺж•°жҚ®йҖүжӢ©зҡ„ SQL еҠҹиғҪд»ҘеҸҠдёҖдәӣеҹәжң¬зҡ„ SQL жҰӮеҝөгҖӮе…ідәҺеҹәдәҺжҲҗжң¬зҡ„дјҳеҢ–еҷЁзҡ„дҝЎжҒҜиў«еҲ»ж„ҸжңҖе°ҸеҢ–пјҢиҝҷж ·иҜ»иҖ…е°ұдёҚдјҡйҷ·е…Ҙз»Ҷжһқжң«иҠӮпјҢиҖҢеҸҜд»Ҙдё“жіЁдәҺе®һзҺ°дёҡеҠЎйҖ»иҫ‘е’ҢзҗҶи§Ј
    SQL еј•ж“ҺжңәеҲ¶зҡ„еҠҹиғҪгҖӮз„¶иҖҢпјҢе®Ңе…Ёи·іиҝҮжҹҗдәӣжҰӮеҝөжҳҜдёҚеҸҜиғҪзҡ„пјҢеӣ жӯӨжңүдёҖз« дё“й—Ёи®Ёи®әжҹҘиҜўиҪ¬жҚўгҖӮ


    Oracle зҡ„еҠҹиғҪе’Ңзү№жҖ§йҡҸзқҖзүҲжң¬жӣҙж–°иҖҢдёҚж–ӯжј”иҝӣпјҢеӣ жӯӨжңүж—¶дјҡжҸҗеҸҠдёҚеҗҢзҡ„ Oracle зүҲжң¬ 10g (10.2.0.5)гҖҒ11g (11.2.0.4) е’Ң
    12c (12.1.0.2, 12.2.0.1) д»ҘзӘҒеҮәиҝҷдәӣеҸҳеҢ–гҖӮOracle еңЁеј•е…Ҙж–°еҠҹиғҪзҡ„еҗҢж—¶пјҢд№ҹиҮҙеҠӣдәҺдҝ®еӨҚзҺ°жңүй”ҷиҜҜпјҢеӣ жӯӨжҲ‘е°ҪйҮҸдёҚжҸҗеҸҠйӮЈдәӣе·Ідҝ®еӨҚдё”еҜ№дәҺжҸҸиҝ°
