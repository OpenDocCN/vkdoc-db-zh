- fmt: '### ANSI to Native Transformation


    LetвҖҷs use the following tables and query to demonstrate transformation.


    ```sql

    create table fact as (select 1 value, 1 dim_1_id, 1 dim_2_id, ''A'' type from
    dual);

    create table dim_1 as (select 1 id, 1 dim_n_id from dual);

    create table dim_n as (select 1 id, 1 value from dual);

    create table map as (select 1 value, ''DETAILED VALUE'' category from dual);

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on fact.type in (''A'', ''B'', ''C'')

    and ((map.category = ''FACT VALUE'' and map.value = fact.value) or

    (map.category = ''DETAILED VALUE'' and map.value = dim_n.value));

    ```


    *Listing 1-53: Tables and query to demonstrate ANSI to native transformation*


    ```sql

    select "FACT"."VALUE"               "VALUE",

    "FACT"."DIM_1_ID"            "DIM_1_ID",

    "FACT"."DIM_2_ID"            "DIM_2_ID",

    "FACT"."TYPE"                "TYPE",

    "VW_LAT_3C55142F"."ITEM_1_0" "VALUE",

    "VW_LAT_3C55142F"."ITEM_2_1" "CATEGORY"

    from "FACT" "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    lateral((select "MAP"."VALUE" "ITEM_1_0", "MAP"."CATEGORY" "ITEM_2_1"

    from "MAP" "MAP"

    where ("FACT"."TYPE" = ''A'' or "FACT"."TYPE" = ''B'' or

    "FACT"."TYPE" = ''C'')

    and ("MAP"."CATEGORY" = ''FACT VALUE'' and

    "MAP"."VALUE" = "FACT"."VALUE" or

    "MAP"."CATEGORY" = ''DETAILED VALUE'' and

    "MAP"."VALUE" = "DIM_N"."VALUE")))(+) "VW_LAT_3C55142F"

    where "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    ```


    *Listing 1-54: Query after transformation into native syntax*


    The crucial point here is that Oracle creates a non-mergeable lateral view. A
    logically equivalent query in native syntax may be implemented as the following
    (itвҖҷs not possible to implement a query without an additional inline view for
    pre Oracle 12c versions because `map` table cannot be outer joined to both `fact`
    and `dim_n` and query fails with вҖңORA-01417: a table may be outer joined to at
    most one other tableвҖқ).


    ```sql

    select *

    from (select fact.*, dim_n.value as value_1

    from fact, dim_1, dim_n

    where dim_1.id = fact.dim_1_id

    and dim_1.dim_n_id = dim_n.id) sub,

    map

    where case when decode(map.rowid(+), map.rowid(+), sub.type) in (''A'', ''B'',
    ''C'') then 1 end = 1

    and decode(map.category(+), ''FACT VALUE'', sub.value, ''DETAILED VALUE'', sub.value_1)
    = map.value(+);

    ```


    *Listing 1-55: Query manually rewritten into native syntax*


    The ANSI version has better readability, but in case of native syntax, Oracle
    does not create a non-mergeable correlated inline view so that it allows us to
    achieve better performance because the SQL engine can use `HASH JOIN` in such
    cases. This join method is not possible for lateral views.


    ### е…ідәҺи°“иҜҚеҪўејҸзҡ„йҮҚиҰҒиҜҙжҳҺ


    A very important point is that if we use predicates for ANSI syntax in the same
    form as they were for native syntax, then a lateral view is not created.


    ```sql

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on case when decode(map.rowid, map.rowid, fact.type) in (''A'', ''B'', ''C'')
    then 1 end = 1

    and decode(map.category, ''FACT VALUE'', fact.value, ''DETAILED VALUE'', dim_n.value)
    = map.value

    ```


    *Listing 1-56: ANSI syntax with predicates copied from native syntax*


    The query above transformed into the following and the `VIEW` operation is absent
    in the query plan, which means there are non-mergeable views in the query itself.


    ```sql

    select "FACT"."VALUE"    "VALUE",

    "FACT"."DIM_1_ID" "DIM_1_ID",

    "FACT"."DIM_2_ID" "DIM_2_ID",

    "FACT"."TYPE"     "TYPE",

    "MAP"."VALUE"     "VALUE",

    "MAP"."CATEGORY"  "CATEGORY"

    from "FACT"  "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    "MAP"   "MAP"

    where case when decode("MAP".ROWID(+), "MAP".ROWID(+), "FACT"."TYPE") in (''A'',
    ''B'', ''C'') then 1 end = 1

    and "MAP"."VALUE"(+) = decode("MAP"."CATEGORY"(+), ''FACT VALUE'', "FACT"."VALUE",
    ''DETAILED VALUE'', "DIM_N"."VALUE")

    and "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    ```


    *Listing 1-57: Transformed query for ANSI version with amended predicates*


    Transformation ANSI to native continuously evolves from one Oracle version to
    another, and some queries do not have lateral views after transformation even
    though they led to lateral view creation in older versions.


    As it was mentioned earlier, `full join` and `left/right join partition by` are
    not transformed into native syntax.


    ### жј”зӨә `partition by`


    To demonstrate the latter, letвҖҷs consider the following requirement. For each
    presenter from the table `вҖңpresentationвҖқ` display all days of the week and number
    of presentations for each day.


    ```sql

    create table week(id, day) as

    select rownum,

    to_char(trunc(sysdate, ''d'') + level - 1,

    ''fmday'',

    ''NLS_DATE_LANGUAGE = English'')

    from dual

    connect by rownum <= 7;

    create table presentation(name, day, time) as

    select ''John'', ''monday'', ''14'' from dual

    union all

    select ''John'', ''monday'', ''9'' from dual

    union all

    select ''John'', ''friday'', ''9'' from dual

    union all

    select ''Rex'', ''wednesday'', ''11'' from dual

    union all

    select ''Rex'', ''friday'', ''11'' from dual;

    ```


    *Listing 1-58: Tables to demonstrate join partition by*


    The result can be achieved by using the query below.


    ```sql

    select p.name, w.day, count(p.time) cnt

    from week w

    left join presentation p partition by (p.name)

    on w.day = p.day

    group by p.name, w.day, w.id

    order by p.name, w.id;

    ```

    ```

    NAME DAY              CNT

    ---- --------- ----------

    John monday             2

    John tuesday            0

    John wednesday          0

    John thursday           0

    John friday             1

    John saturday           0

    John sunday             0

    Rex  monday             0

    Rex  tuesday            0

    Rex  wednesday          1

    Rex  thursday           0

    Rex  friday             1

    Rex  saturday           0

    Rex  sunday             0

    14 rows selected.

    ```


    *Listing 1-59: Join partition by*


    ```sql

    select "from$_subquery$_003"."NAME_0" "NAME",

    "from$_subquery$_003"."QCSJ_C000000000300000_2" "DAY",

    count("from$_subquery$_003"."TIME_4") "CNT"

    from (select "P"."NAME" "NAME_0",

    "W"."ID"   "ID_1",

    "W"."DAY"  "QCSJ_C000000000300000_2",

    "P"."DAY"  "QCSJ_C000000000300001",

    "P"."TIME" "TIME_4"

    from "PRESENTATION" "P" partition by("P"."NAME")

    right outer join "WEEK" "W"

    on "W"."DAY" = "P"."DAY") "from$_subquery$_003"

    group by "from$_subquery$_003"."NAME_0",

    "from$_subquery$_003"."QCSJ_C000000000300000_2",

    "from$_subquery$_003"."ID_1"

    order by "from$_subquery$_003"."NAME_0", "from$_subquery$_003"."ID_1"

    ```


    *Listing 1-60: Final query after transformations*


    `вҖңpartition by (p.name)вҖқ` means that all rows from the `week` table will be joined
    for each `name` from the `presentation` table. The same result can be achieved
    without this capability but it requires an additional join.


    ```sql

    select w.name, w.day, count(p.time) cnt

    from (select p0.name, w0.*

    from (select distinct name from presentation) p0, week w0) w,

    presentation p

    where w.day = p.day(+)

    and w.name = p.name(+)

    group by w.name, w.day, w.id

    order by w.name, w.id;

    ```


    *Listing 1-61: Workaround for join partition by*


    ### SEMI дёҺ ANTI иҝһжҺҘ


    LetвҖҷs consider final query after transformations for SEMI join `вҖңselect t1.* from
    t1 where t1.id in (select id from t0)вҖқ`


    ```sql

    select "T1"."ID" "ID", "T1"."NAME" "NAME"

    from "M12"."T0" "T0", "M12"."T1" "T1"

    where "T1"."ID" = "T0"."ID"

    ```


    *Listing 1-62: Transformed query for SEMI join*


    There is no special notation for SEMI join predicates, thus a condition in a final
    query looks like a simple equality predicate; however the join method for the
    original query is `HASH JOIN SEMI` (similar reasoning applies to ANTI joins as
    well). If you try to build a plan for a transformed query, then the join method
    will be just `HASH JOIN`. So additional attention is required when working with
    final queries after transformation вҖ“ they are just a representation of the transformed
    queries and may not be semantically equivalent in all cases to the original query.
    We can add `distinct` and `t1.rowid` to select a list to get what is required
    but performance is not the same as for SEMI join вҖ“ joining and applying distinct
    on top of it is not the same as looking for one row satisfying a join condition
    for each row from `t1`.'
  raw: '### ANSI to Native Transformation


    LetвҖҷs use the following tables and query to demonstrate transformation.


    ```

    create table fact as (select 1 value, 1 dim_1_id, 1 dim_2_id, ''A'' type from
    dual);

    create table dim_1 as (select 1 id, 1 dim_n_id from dual);

    create table dim_n as (select 1 id, 1 value from dual);

    create table map as (select 1 value, ''DETAILED VALUE'' category from dual);

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on fact.type in (''A'', ''B'', ''C'')

    and ((map.category = ''FACT VALUE'' and map.value = fact.value) or

    (map.category = ''DETAILED VALUE'' and map.value = dim_n.value));

    Listing 1-53

    Tables and query to demonstrate ANSI to native transformation

    ```


    ```

    select "FACT"."VALUE"               "VALUE",

    "FACT"."DIM_1_ID"            "DIM_1_ID",

    "FACT"."DIM_2_ID"            "DIM_2_ID",

    "FACT"."TYPE"                "TYPE",

    "VW_LAT_3C55142F"."ITEM_1_0" "VALUE",

    "VW_LAT_3C55142F"."ITEM_2_1" "CATEGORY"

    from "FACT" "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    lateral((select "MAP"."VALUE" "ITEM_1_0", "MAP"."CATEGORY" "ITEM_2_1"

    from "MAP" "MAP"

    where ("FACT"."TYPE" = ''A'' or "FACT"."TYPE" = ''B'' or

    "FACT"."TYPE" = ''C'')

    and ("MAP"."CATEGORY" = ''FACT VALUE'' and

    "MAP"."VALUE" = "FACT"."VALUE" or

    "MAP"."CATEGORY" = ''DETAILED VALUE'' and

    "MAP"."VALUE" = "DIM_N"."VALUE")))(+) "VW_LAT_3C55142F"

    where "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    Listing 1-54

    Query after transformation into native syntax

    ```


    The crucial point here is that Oracle creates a non-mergeable lateral view. A
    logically equivalent query in native syntax may be implemented as the following
    (itвҖҷs not possible to implement a query without an additional inline view for
    pre Oracle 12c versions because map table cannot be outer joined to both fact
    and dim_n and query fails with вҖңORA-01417: a table may be outer joined to at most
    one other tableвҖқ).


    ```

    select *

    from (select fact.*, dim_n.value as value_1

    from fact, dim_1, dim_n

    where dim_1.id = fact.dim_1_id

    and dim_1.dim_n_id = dim_n.id) sub,

    map

    where case when decode(map.rowid(+), map.rowid(+), sub.type) in (''A'', ''B'',
    ''C'') then 1 end = 1

    and decode(map.category(+), ''FACT VALUE'', sub.value, ''DETAILED VALUE'', sub.value_1)
    = map.value(+);

    Listing 1-55

    Query manually rewritten into native syntax

    ```


    The ANSI version has better readability, but in case of native syntax, Oracle
    does not create a non-mergeable correlated inline view so that it allows us to
    achieve better performance because the SQL engine can use HASH JOIN in such cases.
    This join method is not possible for lateral views.


    A very important point is that if we use predicates for ANSI syntax in the same
    form as they were for native syntax, then a lateral view is not created.


    ```

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on case when decode(map.rowid, map.rowid, fact.type) in (''A'', ''B'', ''C'')
    then 1 end = 1

    and decode(map.category, ''FACT VALUE'', fact.value, ''DETAILED VALUE'', dim_n.value)
    = map.value

    Listing 1-56

    ANSI syntax with predicates copied from native syntax

    ```


    The query above transformed into the following and the VIEW operation is absent
    in the query plan, which means there are non-mergeable views in the query itself.


    ```

    select "FACT"."VALUE"    "VALUE",

    "FACT"."DIM_1_ID" "DIM_1_ID",

    "FACT"."DIM_2_ID" "DIM_2_ID",

    "FACT"."TYPE"     "TYPE",

    "MAP"."VALUE"     "VALUE",

    "MAP"."CATEGORY"  "CATEGORY"

    from "FACT"  "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    "MAP"   "MAP"

    where case when decode("MAP".ROWID(+), "MAP".ROWID(+), "FACT"."TYPE") in (''A'',
    ''B'', ''C'') then 1 end = 1

    and "MAP"."VALUE"(+) = decode("MAP"."CATEGORY"(+), ''FACT VALUE'', "FACT"."VALUE",
    ''DETAILED VALUE'', "DIM_N"."VALUE")

    and "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    Listing 1-57

    Transformed query for ANSI version with amended predicates

    ```


    Transformation ANSI to native continuously evolves from one Oracle version to
    another, and some queries do not have lateral views after transformation even
    though they led to lateral view creation in older versions.


    As it was mentioned earlier, full join and left/right join partition by are not
    transformed into native syntax.


    To demonstrate the latter, letвҖҷs consider the following requirement. For each
    presenter from the table вҖңpresentationвҖқ display all days of the week and number
    of presentations for each day.


    ```

    create table week(id, day) as

    select rownum,

    to_char(trunc(sysdate, ''d'') + level - 1,

    ''fmday'',

    ''NLS_DATE_LANGUAGE = English'')

    from dual

    connect by rownum <= 7;

    create table presentation(name, day, time) as

    select ''John'', ''monday'', ''14'' from dual

    union all

    select ''John'', ''monday'', ''9'' from dual

    union all

    select ''John'', ''friday'', ''9'' from dual

    union all

    select ''Rex'', ''wednesday'', ''11'' from dual

    union all

    select ''Rex'', ''friday'', ''11'' from dual;

    Listing 1-58

    Tables to demonstrate join partition by

    ```


    The result can be achieved by using the query below.


    ```

    select p.name, w.day, count(p.time) cnt

    from week w

    left join presentation p partition by (p.name)

    on w.day = p.day

    group by p.name, w.day, w.id

    order by p.name, w.id;

    NAME DAY              CNT

    ---- --------- ----------

    John monday             2

    John tuesday            0

    John wednesday          0

    John thursday           0

    John friday             1

    John saturday           0

    John sunday             0

    Rex  monday             0

    Rex  tuesday            0

    Rex  wednesday          1

    Rex  thursday           0

    Rex  friday             1

    Rex  saturday           0

    Rex  sunday             0

    14 rows selected.

    Listing 1-59

    Join partition by

    ```


    ```

    select "from$_subquery$_003"."NAME_0" "NAME",

    "from$_subquery$_003"."QCSJ_C000000000300000_2" "DAY",

    count("from$_subquery$_003"."TIME_4") "CNT"

    from (select "P"."NAME" "NAME_0",

    "W"."ID"   "ID_1",

    "W"."DAY"  "QCSJ_C000000000300000_2",

    "P"."DAY"  "QCSJ_C000000000300001",

    "P"."TIME" "TIME_4"

    from "PRESENTATION" "P" partition by("P"."NAME")

    right outer join "WEEK" "W"

    on "W"."DAY" = "P"."DAY") "from$_subquery$_003"

    group by "from$_subquery$_003"."NAME_0",

    "from$_subquery$_003"."QCSJ_C000000000300000_2",

    "from$_subquery$_003"."ID_1"

    order by "from$_subquery$_003"."NAME_0", "from$_subquery$_003"."ID_1"

    Listing 1-60

    Final query after transformations

    ```


    вҖңpartition by (p.name)вҖқ means that all rows from the week table will be joined
    for each name from the presentation table. The same result can be achieved without
    this capability but it requires an additional join.


    ```

    select w.name, w.day, count(p.time) cnt

    from (select p0.name, w0.*

    from (select distinct name from presentation) p0, week w0) w,

    presentation p

    where w.day = p.day(+)

    and w.name = p.name(+)

    group by w.name, w.day, w.id

    order by w.name, w.id;

    Listing 1-61

    Workaround for join partition by

    ```


    LetвҖҷs consider final query after transformations for SEMI join вҖң`select t1.* from
    t1 where t1.id in (select id from t0)`вҖқ


    ```

    select "T1"."ID" "ID", "T1"."NAME" "NAME"

    from "M12"."T0" "T0", "M12"."T1" "T1"

    where "T1"."ID" = "T0"."ID"

    Listing 1-62

    Transformed query for SEMI join

    ```


    There is no special notation for SEMI join predicates, thus a condition in a final
    query looks like a simple equality predicate; however the join method for the
    original query is HASH JOIN SEMI (similar reasoning applies to ANTI joins as well).
    If you try to build a plan for a transformed query, then the join method will
    be just HASH JOIN. So additional attention is required when working with final
    queries after transformationВ вҖ“ they are just a representation of the transformed
    queries and may not be semantically equivalent in all cases to the original query.
    We can add distinct and t1.rowid to select a list to get what is required but
    performance is not the same as for SEMI joinВ вҖ“ joining and applying distinct on
    top of it is not the same as looking for one row satisfying a join condition for
    each row from t1.'
  trans: '### ANSI иҪ¬еҺҹз”ҹиҜӯжі•иҪ¬жҚў


    и®©жҲ‘д»¬дҪҝз”Ёд»ҘдёӢиЎЁе’ҢжҹҘиҜўжқҘжј”зӨәиҪ¬жҚўиҝҮзЁӢгҖӮ


    ```sql

    create table fact as (select 1 value, 1 dim_1_id, 1 dim_2_id, ''A'' type from
    dual);

    create table dim_1 as (select 1 id, 1 dim_n_id from dual);

    create table dim_n as (select 1 id, 1 value from dual);

    create table map as (select 1 value, ''DETAILED VALUE'' category from dual);

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on fact.type in (''A'', ''B'', ''C'')

    and ((map.category = ''FACT VALUE'' and map.value = fact.value) or

    (map.category = ''DETAILED VALUE'' and map.value = dim_n.value));

    ```


    *жё…еҚ• 1-53пјҡз”ЁдәҺжј”зӨә ANSI еҲ°еҺҹз”ҹиҜӯжі•иҪ¬жҚўзҡ„иЎЁе’ҢжҹҘиҜў*


    ```sql

    select "FACT"."VALUE"               "VALUE",

    "FACT"."DIM_1_ID"            "DIM_1_ID",

    "FACT"."DIM_2_ID"            "DIM_2_ID",

    "FACT"."TYPE"                "TYPE",

    "VW_LAT_3C55142F"."ITEM_1_0" "VALUE",

    "VW_LAT_3C55142F"."ITEM_2_1" "CATEGORY"

    from "FACT" "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    lateral((select "MAP"."VALUE" "ITEM_1_0", "MAP"."CATEGORY" "ITEM_2_1"

    from "MAP" "MAP"

    where ("FACT"."TYPE" = ''A'' or "FACT"."TYPE" = ''B'' or

    "FACT"."TYPE" = ''C'')

    and ("MAP"."CATEGORY" = ''FACT VALUE'' and

    "MAP"."VALUE" = "FACT"."VALUE" or

    "MAP"."CATEGORY" = ''DETAILED VALUE'' and

    "MAP"."VALUE" = "DIM_N"."VALUE")))(+) "VW_LAT_3C55142F"

    where "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    ```


    *жё…еҚ• 1-54пјҡиҪ¬жҚўдёәеҺҹз”ҹиҜӯжі•еҗҺзҡ„жҹҘиҜў*


    иҝҷйҮҢзҡ„е…ій”®зӮ№жҳҜпјҢOracle еҲӣе»әдәҶдёҖдёӘ**дёҚеҸҜеҗҲе№¶зҡ„жЁӘеҗ‘и§Ҷеӣҫ**гҖӮйҖ»иҫ‘дёҠзӯүж•Ҳзҡ„еҺҹз”ҹиҜӯжі•жҹҘиҜўеҸҜд»Ҙе®һзҺ°дёәд»ҘдёӢеҪўејҸпјҲеңЁ Oracle 12c д№ӢеүҚзҡ„зүҲжң¬дёӯпјҢз”ұдәҺ
    `map` иЎЁж— жі•еҗҢж—¶дёҺ `fact` е’Ң `dim_n` иҝӣиЎҢеӨ–иҝһжҺҘпјҢжҹҘиҜўдјҡеӣ  вҖңORA-01417: a table may be outer joined
    to at most one other tableвҖқ иҖҢеӨұиҙҘпјҢеӣ жӯӨж— жі•еңЁдёҚдҪҝз”ЁйўқеӨ–еҶ…иҒ”и§Ҷеӣҫзҡ„жғ…еҶөдёӢе®һзҺ°жҹҘиҜўпјүгҖӮ


    ```sql

    select *

    from (select fact.*, dim_n.value as value_1

    from fact, dim_1, dim_n

    where dim_1.id = fact.dim_1_id

    and dim_1.dim_n_id = dim_n.id) sub,

    map

    where case when decode(map.rowid(+), map.rowid(+), sub.type) in (''A'', ''B'',
    ''C'') then 1 end = 1

    and decode(map.category(+), ''FACT VALUE'', sub.value, ''DETAILED VALUE'', sub.value_1)
    = map.value(+);

    ```


    *жё…еҚ• 1-55пјҡжүӢеҠЁйҮҚеҶҷдёәеҺҹз”ҹиҜӯжі•зҡ„жҹҘиҜў*


    ANSI зүҲжң¬е…·жңүжӣҙеҘҪзҡ„еҸҜиҜ»жҖ§пјҢдҪҶеңЁеҺҹз”ҹиҜӯжі•жғ…еҶөдёӢпјҢOracle дёҚдјҡеҲӣе»әдёҚеҸҜеҗҲе№¶зҡ„е…іиҒ”еҶ…иҒ”и§ҶеӣҫпјҢиҝҷдҪҝжҲ‘д»¬иғҪеӨҹиҺ·еҫ—жӣҙеҘҪзҡ„жҖ§иғҪпјҢеӣ дёә SQL еј•ж“ҺеңЁиҝҷдәӣжғ…еҶөдёӢеҸҜд»ҘдҪҝз”Ё
    `HASH JOIN`гҖӮиҝҷз§ҚиҝһжҺҘж–№жі•еҜ№дәҺжЁӘеҗ‘и§ҶеӣҫжҳҜдёҚеҸҜиғҪзҡ„гҖӮ


    ### е…ідәҺи°“иҜҚеҪўејҸзҡ„йҮҚиҰҒиҜҙжҳҺ


    дёҖдёӘйқһеёёйҮҚиҰҒзҡ„зӮ№жҳҜпјҢеҰӮжһңжҲ‘д»¬дҪҝз”ЁдёҺеҺҹз”ҹиҜӯжі•еҪўејҸзӣёеҗҢзҡ„и°“иҜҚз”ЁдәҺ ANSI иҜӯжі•пјҢйӮЈд№Ҳе°ұдёҚдјҡеҲӣе»әжЁӘеҗ‘и§ҶеӣҫгҖӮ


    ```sql

    select fact.*, map.*

    from fact

    join dim_1

    on dim_1.id = fact.dim_1_id

    join dim_n

    on dim_1.dim_n_id = dim_n.id

    left join map

    on case when decode(map.rowid, map.rowid, fact.type) in (''A'', ''B'', ''C'')
    then 1 end = 1

    and decode(map.category, ''FACT VALUE'', fact.value, ''DETAILED VALUE'', dim_n.value)
    = map.value

    ```


    *жё…еҚ• 1-56пјҡд»ҺеҺҹз”ҹиҜӯжі•еӨҚеҲ¶дәҶи°“иҜҚзҡ„ ANSI иҜӯжі•*


    дёҠйқўзҡ„жҹҘиҜўиў«иҪ¬жҚўдёәд»ҘдёӢеҪўејҸпјҢжҹҘиҜўи®ЎеҲ’дёӯдёҚеӯҳеңЁ `VIEW` ж“ҚдҪңпјҢиҝҷж„Ҹе‘ізқҖжҹҘиҜўдёӯеӯҳеңЁдёҚеҸҜеҗҲе№¶зҡ„и§ҶеӣҫгҖӮ


    ```sql

    select "FACT"."VALUE"    "VALUE",

    "FACT"."DIM_1_ID" "DIM_1_ID",

    "FACT"."DIM_2_ID" "DIM_2_ID",

    "FACT"."TYPE"     "TYPE",

    "MAP"."VALUE"     "VALUE",

    "MAP"."CATEGORY"  "CATEGORY"

    from "FACT"  "FACT",

    "DIM_1" "DIM_1",

    "DIM_N" "DIM_N",

    "MAP"   "MAP"

    where case when decode("MAP".ROWID(+), "MAP".ROWID(+), "FACT"."TYPE") in (''A'',
    ''B'', ''C'') then 1 end = 1

    and "MAP"."VALUE"(+) = decode("MAP"."CATEGORY"(+), ''FACT VALUE'', "FACT"."VALUE",
    ''DETAILED VALUE'', "DIM_N"."VALUE")

    and "DIM_1"."DIM_N_ID" = "DIM_N"."ID"

    and "DIM_1"."ID" = "FACT"."DIM_1_ID"

    ```


    *жё…еҚ• 1-57пјҡдҝ®жӯЈдәҶи°“иҜҚзҡ„ ANSI зүҲжң¬иҪ¬жҚўеҗҺжҹҘиҜў*


    ANSI еҲ°еҺҹз”ҹиҜӯжі•зҡ„иҪ¬жҚўд»ҺдёҖдёӘ Oracle зүҲжң¬еҲ°еҸҰдёҖдёӘзүҲжң¬жҢҒз»ӯжј”иҝӣпјҢдёҖдәӣжҹҘиҜўеңЁиҪ¬жҚўеҗҺеҚідҪҝеңЁж—§зүҲжң¬дёӯдјҡеҜјиҮҙжЁӘеҗ‘и§ҶеӣҫеҲӣе»әпјҢзҺ°еңЁд№ҹдёҚеҶҚдә§з”ҹжЁӘеҗ‘и§ҶеӣҫгҖӮ


    еҰӮеүҚжүҖиҝ°пјҢ`full join` е’Ң `left/right join partition by` дёҚдјҡиў«иҪ¬жҚўдёәеҺҹз”ҹиҜӯжі•гҖӮ


    ### жј”зӨә `partition by`


    дёәдәҶжј”зӨәеҗҺиҖ…пјҢи®©жҲ‘д»¬иҖғиҷ‘д»ҘдёӢйңҖжұӮгҖӮеҜ№дәҺиЎЁ `вҖңpresentationвҖқ` дёӯзҡ„жҜҸдёӘжј”и®ІиҖ…пјҢжҳҫзӨәжүҖжңүжҳҹжңҹеҮ д»ҘеҸҠжҜҸдёӘжҳҹжңҹеҮ зҡ„жј”и®Іж¬Ўж•°гҖӮ


    ```sql

    create table week(id, day) as

    select rownum,

    to_char(trunc(sysdate, ''d'') + level - 1,

    ''fmday'',

    ''NLS_DATE_LANGUAGE = English'')

    from dual

    connect by rownum <= 7;

    create table presentation(name, day, time) as

    select ''John'', ''monday'', ''14'' from dual

    union all

    select ''John'', ''monday'', ''9'' from dual

    union all

    select ''John'', ''friday'', ''9'' from dual

    union all

    select ''Rex'', ''wednesday'', ''11'' from dual

    union all

    select ''Rex'', ''friday'', ''11'' from dual;

    ```


    *жё…еҚ• 1-58пјҡз”ЁдәҺжј”зӨә join partition by зҡ„иЎЁ*


    еҸҜд»ҘйҖҡиҝҮдҪҝз”Ёд»ҘдёӢжҹҘиҜўжқҘе®һзҺ°з»“жһңгҖӮ


    ```sql

    select p.name, w.day, count(p.time) cnt

    from week w

    left join presentation p partition by (p.name)

    on w.day = p.day

    group by p.name, w.day, w.id

    order by p.name, w.id;

    ```

