- fmt: '## Traversing Hierarchies


    Documentation says that the `В«subquery_factoring_clauseВ»` supports recursive subquery
    factoring (recursive `WITH`) and lets you query hierarchical data. This feature
    is more powerful than `CONNECT BY` in that it provides depth-first search and
    breadth-first search, and supports multiple recursive branches. It sounds like
    `CONNECT BY` always does depth-first search while a traversing algorithm for recursive
    subquery factoring can be affected by specifying `depth-first` or `breadth-first`
    in `search_clause`. LetвҖҷs check whether this is the correct impression or not.


    Function `stop_at` sets a flag if a specific node was visited and returns a not
    null value if the flag is set.


    ```

    create or replace function stop_at(p_id in number, p_stop in number)

    return number is

    begin

    if p_id = p_stop then

    dbms_application_info.set_client_info(''1'');

    return 1;

    end if;

    for i in (select client_info from v$session where sid = userenv(''sid'')) loop

    return i.client_info;

    end loop;

    end;

    ```


    ```

    exec dbms_application_info.set_client_info('''');

    PL/SQL procedure successfully completed.

    with rec(lvl, id) as

    (

    select 1, id

    from t_two_branches where id_parent is null

    union all

    select r.lvl + 1, t.id

    from t_two_branches t

    join rec r on t.id_parent = r.id

    where stop_at(t.id, 101) is null

    )

    search breadth first by id set ord

    --search depth first by id set ord

    select *

    from rec;

    LVL         ID        ORD

    ---------- ---------- ----------

    1          0          1

    1        100          2

    2          1          3

    exec dbms_application_info.set_client_info('''');

    PL/SQL procedure successfully completed.

    with rec(lvl, id) as

    (

    select 1, id

    from t_two_branches where id_parent is null

    union all

    select r.lvl + 1, t.id

    from t_two_branches t

    join rec r on t.id_parent = r.id

    where stop_at(t.id, 101) is null

    )

    --search breadth first by id set ord

    search depth first by id set ord

    select *

    from rec;

    LVL         ID        ORD

    ---------- ---------- ----------

    1          0          1

    2          1          2

    1        100          3

    Listing 6-6

    Specifying breadth-first and depth-first search

    ```


    Oracle 11.2 and 12.1 return only 3 rows in both cases; however it was expected
    that a query will return all nodes for the first branch for depth-first search
    because none of them equals 101. So it looks like irrespective of whatever approach
    we specify in the `search_clause`, Oracle always does a breadth-first search and
    after that orders a result accordingly. On the other hand, Oracle 12.2 returns
    the following results.


    ```

    LVL         ID        ORD

    ---------- ---------- ----------

    1          0          1

    1        100          2

    2          1          3

    3          2          4

    4          3          5

    5          4          6

    6          5          7

    7          6          8

    8          7          9

    9          8         10

    10          9         11

    11         10         12

    12 rows selected.

    LVL         ID        ORD

    ---------- ---------- ----------

    1          0          1

    2          1          2

    3          2          3

    4          3          4

    5          4          5

    6          5          6

    7          6          7

    8          7          8

    9          8          9

    10          9         10

    11         10         11

    1        100         12

    12 rows selected.

    ```


    This means that it does a depth-first search regardless of whatever is specified
    in the `search_clause` вҖ“ in both cases all the nodes for the first branch are
    returned.


    LetвҖҷs now check the result for `CONNECT BY`.


    ```

    select rownum rn, level lvl, id, id_parent

    from t_two_branches

    start with id_parent is null

    connect by prior id = id_parent

    and stop_at(id, 101) is null;

    RN        LVL         ID  ID_PARENT

    ---------- ---------- ---------- ----------

    1          1          0

    2          2          1          0

    3          3          2          1

    4          4          3          2

    5          5          4          3

    6          6          5          4

    7          7          6          5

    8          8          7          6

    9          9          8          7

    10         10          9          8

    11         11         10          9

    12          1        100

    12 rows selected.

    ```


    ItвҖҷs the same as for the recursive subquery factoring on 12.2 and depth-first
    search.


    To summarize, `CONNECT BY` always traverses a hierarchy using a depth-first search
    while the behavior for the recursive subquery factoring has changed from for breadth-first
    to depth-first search in version 12.2. The `search_clause` has an impact only
    on the final order, not on the algorithm Oracle uses to traverse the hierarchy.
    For `CONNECT BY` itвҖҷs easy to mimic a breadth-first search by ordering a result
    by `LEVEL`.


    ## Once Again About Cycles


    LetвҖҷs investigate how to handle a cycle using recursive subquery factoring and
    a graph table from the previous chapter (Figure 5-1).


    ```

    with t(id, id_parent) as

    (

    select * from graph where id_parent = 1

    union all

    select g.id, g.id_parent

    from t

    join graph g on t.id = g.id_parent

    )

    search depth first by id set ord

    cycle id set cycle to 1 default 0

    select * from t;

    ID  ID_PARENT        ORD CYCLE

    ---------- ---------- ---------- ----------

    2          1          1 0

    3          1          2 0

    4          3          3 0

    5          4          4 0

    3          5          5 1

    Listing 6-7

    Detecting cycle by ID

    ```


    `"cycle id set cycle to 1 default 0"` instructs Oracle to set the `"cycle"` column
    to 1 if cycle by `id` is detected. Oracle will not look for child rows for the
    offending row, but it will continue to look for other noncyclic rows. A row is
    considered to form a cycle if one of its ancestor rows has the same values for
    the cycle columns. In other words, if row is marked as a cycle, then one of the
    existing rows in the result set has the same value in the specified column.


    In the above example, the row with `ID = 3` was marked as a cycle because `ID
    = 3` already existed in a result. In the case of a `"CONNECT BY"` clause the row
    with `ID = 5` was marked as a cycle because its child (row with `ID = 3`) is also
    its ancestor вҖ“ see Figure 5-1 in the previous chapter.


    Unlike `CONNECT BY`, we can specify which column to use to detect a cycle. So
    if we specify `id_parent` in a `cycle_clause`, then the result will be a bit different
    вҖ“ the execution stops when we face a node with `ID_PARENT = 3` for a second time.


    ```

    with t(id, id_parent) as

    (

    select * from graph where id_parent = 1

    union all

    select g.id, g.id_parent

    from t

    join graph g on t.id = g.id_parent

    )

    search depth first by id set ord

    cycle id_parent set cycle to 1 default 0

    select * from t;

    ID  ID_PARENT        ORD C

    ---------- ---------- ---------- -

    2          1          1 0

    3          1          2 0

    4          3          3 0

    5          4          4 0

    3          5          5 0

    4          3          6 1

    Listing 6-8

    Detecting cycle by ID_PARENT

    ```


    We may notice that cycle by `ID` was identified in the same row as it was for
    the `CONNECT BY` query and condition `"nocycle prior id = id_parent and prior
    id_parent is not null"` (see Listing 5-8). However, itвҖҷs not always the case.
    If the root node is part of the cycle, then results may differ. LetвҖҷs have a look
    at the result when we start from the node with `ID = 3`.'
