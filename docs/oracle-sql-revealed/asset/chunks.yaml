    ## 2. Query Transformations


    зӣёеҗҢзҡ„йҖ»иҫ‘еҸҜд»ҘдҪҝз”Ёеҗ„з§ҚдҪҶиҜӯд№үзӯүж•Ҳзҡ„жҹҘиҜўжқҘе®һзҺ°пјҢиҝҷдәӣжҹҘиҜўзңӢиө·жқҘе®Ңе…ЁдёҚеҗҢпјҢдҪҶе…·жңүзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’е’ҢжҖ§иғҪгҖӮиҝҷжҳҜдҪңдёәжҹҘиҜўиҪ¬жҚўзҡ„з»“жһңе®һзҺ°зҡ„вҖ”вҖ”еҺҹе§ӢжҹҘиҜўиў«иҪ¬жҚўжҲҗзӣёеҗҢзҡ„жңҖз»ҲжҹҘиҜўгҖӮ


    дҫӢеҰӮпјҢеҲ—иЎЁ [2-1] дёӯзҡ„жҹҘиҜўе…·жңүзӣёеҗҢзҡ„жҖ§иғҪе’Ңжү§иЎҢи®ЎеҲ’гҖӮжңҖеҗҺдёҖдёӘжҹҘиҜўжңүеҫ®е°Ҹзҡ„е·®ејӮвҖ”вҖ”иҝһжҺҘж–№жі•жҳҜ`HASH JOIN ANTI NA`пјҢиҖҢеҜ№дәҺжүҖжңүе…¶д»–жҹҘиҜўеҲҷжҳҜ`HASH
    JOIN ANTI`пјҢеӣ жӯӨеҰӮжһң`t2.id`еҢ…еҗ«з©әеҖјпјҢжңҖеҗҺдёҖдёӘжҹҘиҜўзҡ„з»“жһңйӣҶе°Ҷдёәз©әгҖӮ


    ```sql

    select t1.* from t1 left join t2 on t1.id = t2.id where t2.id is null;

    select t1.* from t1 where not exists (select t2.id from t2 where t1.id = t2.id);

    select t1.* from t1, t2 where t1.id = t2.id(+) and t2.id is null;

    select t1.* from t1 where t1.id not in (select t2.id from t2);

    ```

