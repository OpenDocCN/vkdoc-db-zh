    Oracle 12c дёӯпјҢеҜ№дәҺжӣҙеӨҚжқӮзҡ„еӯҗжҹҘиҜўпјҢдҪ д»ҚеҸҜиғҪйҒҮеҲ° `ORA-00904`гҖӮ


    еҪ“дё»жҹҘиҜўдёӯзҡ„ж ҮиҜҶз¬ҰеңЁеӯҗжҹҘиҜўдёӯдёҚеҸҜи§Ғж—¶пјҢдҪ еҸҜд»Ҙе°ҶеӯҗжҹҘиҜўдёӯзҡ„йҖ»иҫ‘еңЁ `UDF` дёӯе®һзҺ°дҪңдёәи§ЈеҶіж–№жі•гҖӮжӯӨеӨ–пјҢOracle 12c жҸҗдҫӣдәҶ В«`pragma udf`В»пјҢеҪ“еңЁ
    SQL дёӯи°ғз”Ё `UDF` ж—¶пјҢе®ғиғҪжҸҗдҫӣйўқеӨ–зҡ„жҖ§иғҪж”№иҝӣгҖӮ


    еҰӮжһңжҲ‘д»¬жҹҘзңӢиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўпјҢеҸҜиғҪдјҡжіЁж„ҸеҲ°еј•е…ҘдәҶдёҖдёӘз”ЁдәҺжӣҝд»Јдё»жҹҘиҜўдёӯеҲ—зҡ„**дәәе·Ҙз»‘е®ҡеҸҳйҮҸ**гҖӮ


    ```sql

    select "T1"."ID" "ID",

    "T1"."NAME" "NAME",

    (select "T"."NAME" "NAME"

    from (select "T2"."NAME" "NAME"

    from "T2" "T2"

    where "T2"."ID" = :b1

    order by "T2"."NAME") "T"

    where rownum = 1) "SCALAR"

    from "T1" "T1"

    select "T1"."ID" "ID", "T1"."NAME" "NAME"

