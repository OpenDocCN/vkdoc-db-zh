    ```sql

    declare

    type tp_arr is table of binary_integer index by binary_integer;

    arr tp_arr;

    i   int := 0;

    begin

    while true loop

    arr(trunc(dbms_random.value(1, 2e6 + 1))) := null;

    i := i + 1;

    if i >= 10 and arr.count = 10 then

    exit;

    end if;

    end loop;

    i := arr.first;

    while (i is not null) loop

    dbms_output.put_line(i);

    i := arr.next(i);

    end loop;

    end;

