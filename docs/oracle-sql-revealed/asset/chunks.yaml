    ## Oracle-Specific Syntax


    The ANSI join syntax was introduced in Oracle 9i thus before that in order to
    join tables all of them should be specified in the `from` clause and join conditions
    in the `where` clause. Oracle-specific syntax (also called Oracle native syntax)
    for outer joins was available much earlier, including versions such as Oracle
    5.


    Listing [1-3](#A455196_1_En_1_Chapter.html#Par11) with inner join can be rewritten
    in the following way, as shown in Listing [1-15](#A455196_1_En_1_Chapter.html#Par45).


    ```

    select * from t1, t2 where t1.id = t2.id;

    Listing 1-15

    Another form of inner join

    ```


    Even though this statement does not have the keyword вҖң`join`,вҖқ it fully complies
    with the ANSI standard.


    Before ANSI support, the only way to specify that join was left or right was to
    use Oracle-specific syntax. The construction `(+)` near column name indicates
    that join is outer. Left and right outer joins from Listing [1-6](#A455196_1_En_1_Chapter.html#Par20)
    and Listing [1-7](#A455196_1_En_1_Chapter.html#Par21) can be expressed in the
    following way, as shown in Listing [1-16](#A455196_1_En_1_Chapter.html#Par48).


    ```

    select * from t1, t2 where t1.id = t2.id(+);

    select * from t1, t2 where t1.id(+) = t2.id;

    Listing 1-16

    Oracle native syntax for left and right outer join

    ```


    In the first case table `t1` is an inner table and table `t2` is a left outer
    table; in the second case table `t1` is a right outer table and table `t2` is
    an inner table.


    A full outer join cannot be expressed using native syntax in a way so that each
    table is used only once. As a rule, developers imitated it using two queries combined
    using `union all`.


    ```

    select *

    from t1, t2

    where t1.id = t2.id(+)

    union all

    select *

    from t1, t2

    where t1.id(+) = t2.id

    and t1.id is null;

    Listing 1-17

    Imitation of full join using Oracle native syntax

    ```


    Speaking about outer joins, itвҖҷs very important to understand concepts of вҖңpre-joinвҖқ
    and вҖңpost-joinвҖқ predicates (Metalink Doc ID 14736.1). As it was mentioned earlier,
    in the ANSI outer join description, if there is no matching row in the outer table,
    then columns in the result set are populated with `NULL` values. The difference
    between pre-join and post-join predicates is that pre-join predicates are evaluated
    before `NULL` augmentation while post-join predicates are logically evaluated
    after it. In other words, pre-join can be considered as join predicates and post-join
    as filter predicates.


    ```

    select *

    from t1, t2

    where t1.id = t2.id(+)

    and t2.id is null;

    ID N         ID N

    ---------- - ---------- -

    1 A

    Listing 1-18

    Pre-join and post-join predicates in Oracle native syntax

    ```


    Expression вҖң`t1.id = t2.id(+)`вҖқ in Listing [1-18](#A455196_1_En_1_Chapter.html#Par53)
    is a pre-join predicate and вҖң`t2.id is null`вҖқ is a post-join predicate. Row with
    `id = 1` from table `t1` does not have a matching row from table `t2` for the
    join condition вҖң`t1.id = t2.id(+)`вҖқ so `NULL` values are populated for columns
    from `t2` and after that filter by вҖң`t2.id is null`вҖқ is applied.


    ItвҖҷs important to mention that a filter predicate by an inner table may be (will
    be) applied before joining but this does not violate the definitions of pre-join
    and post-join predicates. This is part of optimization and you can find additional
    details at the end of Chapter [2](#A455196_1_En_2_Chapter.html), вҖңQuery TransformationsвҖқ
    where the вҖңselectionвҖқ operation is mentioned.


