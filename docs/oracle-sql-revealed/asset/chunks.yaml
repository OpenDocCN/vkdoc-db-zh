    \ native syntax\n```\n\nExpression вҖң`t1.id = t2.id(+)`вҖқ in Listing [1-18](#A455196_1_En_1_Chapter.html#Par53)\
    \ is a pre-join predicate and вҖң`t2.id is null`вҖқ is a post-join predicate. Row\
    \ with id = 1 from table t1 does not have a matching row from table t2 for the\
    \ join condition вҖң`t1.id = t2.id(+)`вҖқ so NULL values are populated for columns\
    \ from t2 and after that filter by вҖң`t2.id is null`вҖқ is applied.\n\nItвҖҷs important\
    \ to mention that a filter predicate by an inner table may be (will be) applied\
    \ before joining but this does not violate the definitions of pre-join and post-join\
    \ predicates. This is part of optimization and you can find additional details\
    \ at the end of Chapter [2](#A455196_1_En_2_Chapter.html), вҖңQuery TransformationsвҖқ\
    \ where the вҖңselectionвҖқ operation is mentioned.\n\nPlease analyze which predicates\
    \ are pre-join and post-join in ListingВ [1-19](#A455196_1_En_1_Chapter.html#Par57)\
    \ (answer will be given right after the code snippet)."
