- fmt: 'ItвҖҷs important to note though that if the goal is to return a connected component
    for a specific node instead of all connected components, then a full table scan
    may not be the optimal approach if nodes are indexed. In this case a combined
    SQL and PL/SQL approach to traverse the graph using a breadth-first search may
    be the best solution. This is not implementable in pure SQL even with recursive
    subquery factoring because traversing a graph requires maintaining a single list
    of visited nodes.


    ## Ordering Dependencies


    In this task we will implement an algorithm on a directed acyclic graph вҖ“ DAG.
    The main difference between DAGs and hierarchies is that each hierarchy node has
    one parent while there may be multiple parents and children for some nodes in
    a DAG. This may result in various routes from one node to another in DAG. SQL
    can be used to traverse directed graphs in much more efficient way than undirected
    ones and the `connect by` condition looks the same as for hierarchies, but the
    issue with multiple possible paths between nodes may cause inefficiency.


    A script from Listing 12-6 creates a table where each row represents a dependency
    between two objects. There are no cycle dependencies but several objects may depend
    on one specific object, as well as one object may reference a number of other
    objects. Obviously such data is DAG and not a hierarchy. Graphically itвҖҷs shown
    on Figure 12-2, but please note that edges are represented as arrows because the
    graph is directed.


    ![A455196_1_En_12_Fig2_HTML.jpg](A455196_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Directed acyclic graph


    ```

    create table d(name, referenced_name) as

    (select null, ''o'' from dual

    union all select ''o'', ''a'' from dual

    union all select ''o'', ''d'' from dual

    union all select ''a'', ''b'' from dual

    union all select ''d'', ''b'' from dual

    union all select ''b'', ''e'' from dual

    union all select ''b'', ''c'' from dual

    union all select ''e'', ''c'' from dual

    union all select ''c'', ''x'' from dual

    union all select ''c'', ''y'' from dual

    union all select ''c'', ''z'' from dual

    );

    ```


    Listing 12-6


    Creating table describing dependencies


    The goal is to number dependencies starting with independent objects. So independent
    objects represent the first level, objects that depend on independent objects
    and do not have unvisited dependencies represent the second level, and so on.


    ### Solution


    Listing 12-7 shows a straightforward approach to order dependencies.


    ```

    select referenced_name, max(level) ord, count(*) cnt

    from d

    start with not exists

    (select 1 from d d_in where d_in.name = d.referenced_name)

    connect by prior name = referenced_name

    group by referenced_name

    order by 2, 1;

    R        ORD        CNT

    - ---------- ----------

    x          1          1

    y          1          1

    z          1          1

    c          2          6

    e          3          3

    b          4         12

    a          5          6

    d          5          6

    o          6         12

    9 rows selected.

    ```


    Listing 12-7


    Ordering dependencies in SQL


    So `x`, `y`, and `z` represent the first level. The second level contains only
    node `c`. Both `b` and `e` reference `c` but `b` also references `e`, so `e` must
    go before `b` and this is the only node on the third level. Node `b` represents
    the fourth level and so on.


    You may notice that there is no `nocycle` keyword because there are no cycles
    according to requirements. This approach is not quite efficient because it builds
    all possible routes from independent nodes (we cannot call them leaves because
    our data is DAG and not a tree) and visits the same nodes multiple times. For
    example, there are 6 routes to node `b`: `x->c->b`, `y->c->b`, `z->c->b`, `x->c->e->b`,
    `y->c->e->b`, `z->c->e->b` so it visits two children from `b` six times each so
    `b` appears 12 times in the result set.


    On the other hand we can use a breadth-first search algorithm for traversing graphs,
    but this requires maintaining a list of visited nodes, which is not doable using
    pure SQL.


    Listing 12-8 shows PL/SQL implementation using a pipelined function. We maintain
    a list of visited nodes in the result collection and use the current collection
    to refer nodes added on a previous iteration.


    ```

    create or replace type to_node as object (name varchar2(30), lvl  number)

    /

    create or replace type tt_node as table of to_node

    /

    create or replace function f_traverse return tt_node is

    result  tt_node;

    current tt_node;

    tmp     tt_node;

    lvl     int := 1;

    begin

    select to_node(referenced_name, lvl) bulk collect

    into current

    from (select distinct referenced_name

    from d

    where not exists

    (select null from d d_in where d_in.name = d.referenced_name));

    result := current;

    while true loop

    lvl := lvl + 1;

    select to_node(name, lvl) bulk collect

    into tmp

    from (select distinct d1.name

    from d d1

    join table(current) cur

    on d1.referenced_name = cur.name

    -- add only nodes without unvisited children

    where not exists (select null

    from d d2

    left join table(result) r

    on d2.referenced_name = r.name

    where d1.name = d2.name

    and r.name is null));

    if tmp.count = 0 then

    return result;

    else

    result  := result multiset union all tmp;

    current := tmp;

    end if;

    end loop;

    end f_traverse;

    ```


    Listing 12-8


    Ordering dependencies in PL/SQL


    This algorithm returns nodes on all levels including the last one, unlike the
    demonstrated SQL approach.


    ```

    select * from table(f_traverse) order by 2, 1;

    NAME         LVL

    ----- ----------

    x              1

    y              1

    z              1

    c              2

    e              3

    b              4

    a              5

    d              5

    o              6


    10 rows selected.

    ```


    Performance may be further improved by creating indexes on the `name` and `referenced_name`
    and using a temporary table with an index to maintain a list of visited nodes.
    An SQL approach may be acceptable for relatively simple DAGs, but if there are
    complex dependencies, then PL/SQL will perform better. For instance, for the data
    below the PL/SQL approach will be 100 times faster but in fact there is only one
    DAG with just 65 nodes.


    ```

    create table d as

    select decode(type, ''to'', ''x'' || to_char(x + 1), ''n'' || x || y) name,

    decode(type, ''to'', ''n'' || x || y, ''x'' || x) referenced_name

    from (select to_char(trunc((rownum - 1) / 7) + 1) x,

    to_char(mod(rownum, 7) + 1) y

    from dual

    connect by level <= 8 * 7) n,

    (select ''from'' type

    from dual

    union all

    select ''to'' from dual);

    ```


    ## Percentile with Shift


    LetвҖҷs move on to quizzes with analytic functions.


    The goal sounds simple: for each row, calculate a percentile for fixed value taking
    into account rows from the current row to `n` following.


    A detailed explanation on how to calculate percentile can be found in Oracle documentation
    for `percentile_cont` function (also you can use Excel function - `PERCENTILE`).


    For `x = 0.3` and `n = 4` the result is as follows:


    | Order | Value | Percentile |

    | --- | --- | --- |

    | 1 | 10 | 64 |

    | 2 | 333 | 95.5 |

    | 3 | 100 | 82 |

    | 4 | 55 | 338.5 |

    | 5 | 1000 | 1000 |'
