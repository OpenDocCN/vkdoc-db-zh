  raw: '### Problems of aВ Combinatorial Nature


    Combinatorial problems related to data may require generating permutations to
    analyze combinations of elements. SQL provides various ways to generate recordsetsВ вҖ“
    connect by, recursive subquery factoring, and a model clause; but if you want
    to refer or reuse during the generation process the data generated so far, then
    this may be either tricky or inefficient.


    LetвҖҷs consider a specific example: for a set or rows, generate sums of values
    for all possible subsets with two or more elements. Listing [11-15](#A455196_1_En_11_Chapter.html#Par105)
    shows the script to generate a recordset of values such as each value is greater
    than the sum of all values generated so far; thus the sum of values for each subset
    is unique.


    ```

    exec dbms_random.seed(3);

    create table t_num as

    select id, num

    from dual

    model

    dimension by (1 id)

    measures (1 num)

    (

    num[for id from 2 to 19 increment 1] order by id =

    sum(num)[any] + trunc(dbms_random.value(1, 11))

    );

    Listing 11-15

    Creating input set

    ```


    All permutations and sums for the first three elements are below :


    ```

    select * from t_num where id <= 3;

    ID        NUM

    ---------- ----------

    1          1

    2          8

    3         15

    1 + 8 = 9

    1 + 15 = 16

    8 + 15 = 23

    1 + 8 + 15 = 24

    ```


    For measuring performance we will calculate the total sum to minimize fetch, but
    the main goal is to generate all the subsets and calculate sums. The number of
    all subsets for n elements is 2^n including empty subset, singletons, and original
    set. The total sum without singletons equals to ![ $$ \frac{2^n}{2}\sum \limits_{i=1}^n{x}_i-\sum
    \limits_{i=1}^n{x}_i=\left({2}^{n-1}-1\right)\sum \limits_{i=1}^n{x}_i $$ ](A455196_1_En_11_Chapter_IEq1.gif)or
    72 for three rows and 536338548711 for all rows.


    ```

    select sum(num) * (power(2, count(*) - 1) - 1) total from t_num;

    TOTAL


    ```


    There are at least two straightforward ways to generate all permutations with
    connect by and calculate their sums as demonstrated in Listing [11-16](#A455196_1_En_11_Chapter.html#Par111).


    ```

    with

    t1 as

    (select power(2, rownum-1) row_mask, num from t_num),

    t2 as

    (select rownum as total_mask

    from (select count(*) as cnt from t1)

    connect by rownum  prior num

    )

    select count(*) cnt, sum(num) sum_num

    from (select total_mask as id, sum(num) as num

    from t2, t1

    where bitand(row_mask, total_mask)  0

    group by total_mask

    having count(*) > 1);

    CNT       SUM_NUM

    ---------- -------------

    524268  536338548711

    Listing 11-16

    Connect by + join to get sums of all subsets

    ```


    With execution time around 25 seconds, most of the time was spent on doing nested
    loops and re-evaluating subquery t1 524268 times. This can be optimized if we
    specify the hint materialized in t1; after that the execution time drops to 14
    seconds.


    ```


    |  Id | Operation                           | Name  | Starts  | E-Rows | A-Rows  |    A-Time   |
    Buffers  | Reads | Writes |


    |   0 | SELECT STATEMENT                    |       |      1  |        |      1  |
    00:00:25.81 |    1572K |   868 |    868 |

    |   1 |  SORT AGGREGATE                      |       |      1  |      1 |      1  |
    00:00:25.81 |    1572K |   868 |    868 |

    |   2 |   VIEW                              |       |      1  |      1 |    524K
    | 00:00:25.70 |    1572K |   868 |    868 |

    |*  3 |    FILTER                           |       |      1  |        |    524K
    | 00:00:25.54 |    1572K |   868 |    868 |

    |   4 |     HASH GROUP BY                   |       |      1  |      1 |    524K
    | 00:00:25.36 |    1572K |   868 |    868 |

    |   5 |      NESTED LOOPS                   |       |      1  |      1 |   4980K
    | 00:00:22.24 |    1572K |     0 |      0 |

    |   6 |       VIEW                          |       |      1  |      1 |    524K
    | 00:00:01.39 |       3  |     0 |      0 |

    |   7 |        COUNT                        |       |      1  |        |    524K
    | 00:00:01.17 |       3  |     0 |      0 |

    |   8 |         CONNECT BY WITHOUT FILTERING|       |      1  |        |    524K
    | 00:00:00.98 |       3  |     0 |      0 |

    |   9 |          VIEW                       |       |      1  |      1 |      1  |
    00:00:00.01 |       3  |     0 |      0 |

    |  10 |           SORT AGGREGATE            |       |      1  |      1 |      1  |
    00:00:00.01 |       3  |     0 |      0 |

    |  11 |            VIEW                     |       |      1  |     19 |     19  |
    00:00:00.01 |       3  |     0 |      0 |

    |  12 |             COUNT                   |       |      1  |        |     19  |
    00:00:00.01 |       3  |     0 |      0 |

    |  13 |              TABLE ACCESS FULL      | T_NUM |      1  |     19 |     19  |
    00:00:00.01 |       3  |     0 |      0 |

    |* 14 |       VIEW                          |       |    524K |      1 |   4980K
    | 00:00:19.37 |    1572K |     0 |      0 |

    |  15 |        COUNT                        |       |    524K |        |   9961K
    | 00:00:10.07 |    1572K |     0 |      0 |

    |  16 |         TABLE ACCESS FULL           | T_NUM |    524K |     19 |   9961K
    | 00:00:07.02 |    1572K |     0 |      0 |


    ```


    We can avoid join if we generate a sum expression with sys_connect_by_path function
    and implement a function to evaluate itВ вҖ“ this approach is shown in Listing [11-17](#A455196_1_En_11_Chapter.html#Par115).


    ```

    select count(*) cnt, sum(f_calc(path)) sum_num

    from (select sys_connect_by_path(num, ''+'') || ''+'' as path

    from t_num

    where level > 1

    connect by num > prior num);

    create or replace function f_calc(p_str in varchar2) return number is

    pragma udf;

    result number := 0;

    i      int := 0;

    n      varchar2(30);

    begin

    while true loop

    i := i + 1;

    n := substr(p_str,

    instr(p_str, ''+'', 1, i) + 1,

    instr(p_str, ''+'', 1, i + 1) - instr(p_str, ''+'', 1, i) - 1);

    if n is not null then

    result := result + n;

    else

    exit;

    end if;

    end loop;

    return result;

    end f_calc;

    Listing 11-17

    Connect by + UDF to get sums of all subsets

    ```


    Execution takes around 7 seconds if we specify В«`pragma udf`В» and 10 seconds otherwise
    . Most of the resources are used for evaluating an expression for sum, if we comment
    out В«`sum(f_calc(path))`В» then the execution time is less than 1 second.


    LetвҖҷs now use a temporary table to store intermediate results:


    ```

    create global temporary table tmp(lvl int, x int, num number);

    ```


    This makes it possible to generate sums of all the combinations in just half a
    second!


    ```

    begin

    insert into tmp (lvl, x, num)

    select 1, rownum, num from (select num from t_num order by num);

    for c in (select rownum x, num

    from (select num from t_num order by num)) loop

    insert into tmp (lvl, x, num)

    select c.x, 0, tmp.num + c.num from tmp where tmp.x  1;

    CNT       SUM_NUM

    ---------- -------------

    524268  536338548711

    Elapsed: 00:00:00.03

    ```'
