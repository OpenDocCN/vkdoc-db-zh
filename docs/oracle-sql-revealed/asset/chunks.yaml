    \ between 1 following and 1 followingвҖқ` й«ҳеҮәеҮ дёӘж•°йҮҸзә§гҖӮ\n\nдёәжЁЎејҸеҢ№й…Қи§ЈеҶіж–№жЎҲж·»еҠ дәҶдёҖиЎҢзү№е®ҡзҡ„з©әеҖјиЎҢпјҢд»ҘдҫҝеҺҹе§ӢиЎЁзҡ„жңҖеҗҺдёҖиЎҢжңүеҗҺз»ӯиЎҢгҖӮ\n\
    \n### дёӢдёҖдёӘеҲҶж”Ҝ\n\nи®©жҲ‘д»¬е°ҶвҖңдёӢдёҖдёӘеҲҶж”ҜвҖқе®ҡд№үдёәйҒҚеҺҶеұӮж¬Ўз»“жһ„пјҲдҫӢеҰӮиЎҢеҸ·еӨ§дәҺеҪ“еүҚиЎҢпјҢдҪҶеұӮзә§е°ҸдәҺжҲ–зӯүдәҺеҪ“еүҚеұӮзә§пјүд№ӢеҗҺзҡ„жңҖжҺҘиҝ‘иЎҢгҖӮеҰӮжһңжҲ‘д»¬жғіеҜ№з»ҷе®ҡиҠӮзӮ№зҡ„жүҖжңүеӯҗиҠӮзӮ№еә”з”ЁжҹҗдәӣйҖ»иҫ‘пјҢиҝҷдёӘеҖјеҸҜиғҪйқһеёёжңүз”ЁгҖӮ\n\
    \nзӣ®ж ҮжҳҜжүҫеҲ°дёҖдёӘдёҚдҪҝз”ЁиҝһжҺҘе’ҢеӯҗжҹҘиҜўзҡ„и§ЈеҶіж–№жЎҲгҖӮ\n\nдҪҝз”ЁиҝһжҺҘзҡ„и§ЈеҶіж–№жЎҲжҳҜжҳҫиҖҢжҳ“и§Ғзҡ„пјҡ\n\n```sql\nwith t(id, parent_id,\
    \ description, amount) as\n(\nselect 1 id, null, 'top', 10  from dual\nunion all\
    \ select 2, 1, 'top-one', 100 from dual\nunion all select 3, 2, 'one-one', 2000\
    \ from dual\nunion all select 4, 2, 'one-two', 3000 from dual\nunion all select\
    \ 5, 1, 'top-two', 1000 from dual\nunion all select 6, 2, 'one-three', 300 from\
    \ dual\nunion all select 7, 6, 'three-one', 1 from dual\n)\n, h as\n(\nselect\
    \ id, parent_id, description, amount, level l, rownum rn\nfrom t\nstart with id\
    \ = 1\nconnect by parent_id = prior id\n)\nselect h.*,\n(select min(rn)\nfrom\
    \ h h0\nwhere h0.rn > h.rn\nand h0.l <= h.l) next_branch\nfrom h;\nID  PARENT_ID\
    \ DESCRIPTI     AMOUNT    L     RN NEXT_BRANCH\n------- ---------- --------- ----------\
    \ ---- ------ -----------\n1            top               10    1      1\n2  \
    \        1 top-one          100    2      2           7\n3          2 one-one\
    \         2000    3      3           4\n4          2 one-two         3000    3\
    \      4           5\n6          2 one-three        300    3      5          \
    \ 7\n7          6 three-one          1    4      6           7\n5          1 top-two\
    \         1000    2      7\n7 rows selected.\n```\n\nеҜ№дәҺ ID дёә (3, 4) зҡ„иЎҢпјҢдёӢдёҖдёӘеҲҶж”Ҝе°ұжҳҜдёӢдёҖиЎҢпјҢеӣ дёәе®ғзҡ„еұӮзә§зӣёеҗҢгҖӮеҜ№дәҺ\
    \ ID дёә (2, 6, 7) зҡ„иЎҢпјҢдёӢдёҖдёӘеҲҶж”ҜжҳҜ RN = 7 зҡ„иЎҢпјҢеӣ дёәе®ғзҡ„еұӮзә§иҫғдҪҺгҖӮ\n\n### и§Јзӯ”\n\nйҖ»иҫ‘дјјд№ҺеҸҜд»ҘеҫҲе®№жҳ“ең°з”ЁеҲҶжһҗеҮҪж•°йҮҚеҶҷпјҢдҪҶжҲ‘д»¬йқўдёҙдёӨдёӘйҷҗеҲ¶пјҢиҝҷеңЁд№ӢеүҚе…ідәҺеҲҶжһҗеҮҪж•°зҡ„з« иҠӮдёӯе·Із»Ҹжј”зӨәиҝҮгҖӮ\n\
    \n1.  еңЁжҢүеӨҡеҲ—жҺ’еәҸж—¶пјҢж— жі•жҢҮе®ҡеӨҡдёӘиҢғеӣҙгҖӮеңЁиҝҷдёӘзү№е®ҡжЎҲдҫӢдёӯпјҢжҲ‘д»¬ж— жі•дёә `rn` жҢҮе®ҡдёҖдёӘиҢғеӣҙ\n    `rn range between 1 following\
    \ and unbounded following`\n    еҗҢж—¶еҸҲдёә `l` жҢҮе®ҡдёҖдёӘиҢғеӣҙ\n    `l range between unbounded\
    \ preceding and current row`\n\n2.  еҰӮжһңжҲ‘д»¬е°қиҜ•еҸӘжҢүдёҖеҲ—жҺ’еәҸпјҢж— и®әжҳҜ `l` иҝҳжҳҜ `rn`пјҢжҲ‘д»¬йғҪеҝ…йЎ»еңЁеҮҪж•°дёӯйҖҡиҝҮз¬¬дәҢеҲ—жқҘйҷҗеҲ¶иЎҢпјҢдҪҶеңЁеҮҪж•°зҡ„иЎЁиҫҫејҸдёӯж— жі•дҪҝз”ЁиҜҘеұһжҖ§зҡ„еҪ“еүҚеҖјгҖӮ\n\
    \nжӯЈеҰӮеңЁе…ідәҺжЁЎеһӢеӯҗеҸҘзҡ„з« иҠӮдёӯе·Із»ҸжҸҗеҲ°зҡ„пјҢз¬¬дёҖз§Қжғ…еҶөеҸҜд»ҘеҫҲе®№жҳ“ең°дҪҝз”ЁжЁЎеһӢеӯҗеҸҘе®һзҺ°пјҢиҖҢз¬¬дәҢз§Қжғ…еҶөеҲҷйңҖиҰҒиҝӯд»Је’ҢдёҖдёӘиҫ…еҠ©еәҰйҮҸпјҢеңЁжҜҸж¬Ўиҝӯд»Јдёӯе°Ҷе…¶з”ЁдҪңеҪ“еүҚиЎҢз»ҷе®ҡеұһжҖ§зҡ„еҖјгҖӮ\n\
    \nд»Јз Ғжё…еҚ• 12-12 еұ•зӨәдәҶдҪҝз”ЁжЁЎеһӢеӯҗеҸҘзҡ„е®һзҺ°гҖӮ\n\n```sql\nselect *\nfrom h\nmodel\ndimension by (l,\
    \ rn)\nmeasures (id, parent_id, rn xrn, 0 next_branch)\nrules\n(\nnext_branch[any,\
    \ any] order by rn, l =\nmin(xrn)[l  cv(rn)]\n);\nL       RN         ID  PARENT_ID\
