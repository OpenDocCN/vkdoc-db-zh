    ## еҶҚи°ҲеҫӘзҺҜ


    и®©жҲ‘д»¬з ”з©¶еҰӮдҪ•дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–е’ҢдёҠдёҖз« зҡ„еӣҫпјҲеӣҫ 5-1пјүжқҘеӨ„зҗҶеҫӘзҺҜгҖӮ


    ```

    with t(id, id_parent) as

    (

    select * from graph where id_parent = 1

    union all

    select g.id, g.id_parent

    from t

    join graph g on t.id = g.id_parent

    )

    search depth first by id set ord

    cycle id set cycle to 1 default 0

    select * from t;

    ID  ID_PARENT        ORD CYCLE

    ---------- ---------- ---------- ----------

    2          1          1 0

    3          1          2 0

    4          3          3 0

    5          4          4 0

    3          5          5 1

    д»Јз Ғжё…еҚ• 6-7

    йҖҡиҝҮ ID жЈҖжөӢеҫӘзҺҜ

    ```


