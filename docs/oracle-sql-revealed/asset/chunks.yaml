- fmt: '# Solution


    The main complexity of this task is that we need to track allocated times. Otherwise
    the solution would be quite simple and similar to В«Zeckendorf representationВ».
    Also this detail makes it impossible to use pattern matching for a solution.


    We will use a joined recordset as a source so letвҖҷs introduce a factored query
    `t`.


    ```

    t(basket_id, item_id, basket_amount, item_amount, priority_level) as

    ( select e.basket_id,

    e.item_id,

    b.basket_amount,

    i.item_amount,

    e.priority_level

    from eligibility e

    join baskets b

    on b.basket_id = e.basket_id

    join inventory i

    on i.item_id = e.item_id

    order by basket_id, priority_level)

    ```


    Listing 12-24 shows how a task can be solved using a `model` clause.


    ```

    select *

    from t

    model

    dimension by (basket_id, priority_level, item_id)

    measures (basket_amount, item_amount, 0 result)

    rules

    (

    result[any, any, any] order by basket_id, priority_level, item_id =

    case when max(result)[any, any, cv(item_id)] = 0 and

    nvl(max(result)[cv(basket_id),priority_level < cv(priority_level),any],0) +

    item_amount[cv(basket_id),cv(priority_level),cv(item_id)]

    <= max(basket_amount)[cv(basket_id),cv(priority_level),any]

    then nvl(max(result)[cv(basket_id),priority_level < cv(priority_level),any],0)
    +

    item_amount[cv(basket_id),cv(priority_level),cv(item_id)]

    else 0

    end

    )

    order by 1, 2;

    ```

    Listing 12-24: Allocating items using model clause


    The combination of `basket_id` and `priority_level` is enough for unique addressing
    but `item_id` has been added to the dimensions so that we can figure out whether
    a specific item has been used or not. The entire logic is implemented in one compact
    rule but it uses a few aggregates with various addressing, which makes a solution
    not quite efficient.


    We may note that itвҖҷs possible to use an approach similar to the one for the previous
    quiz вҖңResemblance groupвҖқ when we iterated through recordset in a specific order
    and calculated several measures for each row. In this case measures are `is_used`
    вҖ“ flag, which identifies whether a specific item has been allocated to a specific
    basket or not, `total` вҖ“ running total for each basket and `str` вҖ“ concatenation
    of allocated items. Implementation may be done using an iterative model (like
    for previous task) or recursive subquery factoring. The latter is shown in Listing
    12-25.


    ```

    with t0 as

    (select t.*, row_number() over (order by basket_id, priority_level) rn

    from t),

    rec (basket_id, item_id, basket_amount, item_amount, priority_level,

    rn, total, is_used, str) as

    (select t.basket_id, t.item_id, t.basket_amount,

    t.item_amount, t.priority_level, t.rn,

    case when t.item_amount <= t.basket_amount

    then t.item_amount else 0 end,

    case when t.item_amount <= t.basket_amount then 1 end,

    cast(case when t.item_amount <= t.basket_amount

    then '','' || t.item_id end as varchar2(4000))

    from t0 t where rn = 1

    union all

    select t.basket_id, t.item_id, t.basket_amount,

    t.item_amount, t.priority_level, t.rn,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount

    else decode(t.basket_id, r.basket_id, r.total, 0)

    end,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then 1

    end,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then r.str || '','' || t.item_id

    else r.str

    end

    from t0 t

    join rec r on t.rn = r.rn + 1)

    select * from rec;

    ```

    Listing 12-25: Allocating items using recursive subquery factoring


    Concatenation of allocated items is used to check whether a current item has been
    allocated or not, but we could have used a collection instead of a string to avoid
    limitations of `varchar2` length. Anyway, we have to populate a list of used items
    for each row, which has negative impact on memory consumption and overall performance.


    Although a solution with a `model` is quite concise, the performance is reasonable
    for relatively small data volumes - around thousands of rows. Performance of a
    recursive subquery factoring may be improved if you insert `t0` into a temporary
    table with index by `rn` so that Oracle accesses only a single row by index on
    each iteration.


    The most efficient solution would be PL/SQL function that uses a cursor for loop
    and an associative array of allocated items for the fastest check to determine
    whether an item was allocated or not.


    # Longest Increasing Subsequence


    The longest increasing subsequence problem is to find a subsequence of a given
    sequence in which the subsequence''s elements are in sorted order, lowest to highest,
    and in which the subsequence is as long as possible. This subsequence is not necessarily
    contiguous. With adaptation to a database we will be looking for the longest subsequence
    in a sequence or rows.


    For example, for sequence


    ```

    14, 15, 9, 11, 16, 12, 13

    ```


    The expected result is


    ```

    9, 11, 12, 13

    ```


    For simplicity we will be deriving the length of the longest increasing subsequence
    without returning the subsequence itself. For the above data the correct answer
    is 4.'
