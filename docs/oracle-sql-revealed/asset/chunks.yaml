  trans: '## йҖҸи§Ҷе’ҢйҖҶйҖҸи§Ҷж“ҚдҪңз¬Ұ


    `д»Јз Ғжё…еҚ• 4-5` еұ•зӨәдәҶдҪҝз”Ё `group by` е®һзҺ°зҡ„жүҒе№іеҢ–йҖ»иҫ‘пјӣдҪҶд»Һ Oracle 11g ејҖе§ӢпјҢеҸҜд»ҘдҪҝз”Ё `pivot` ж“ҚдҪңз¬Ұе®һзҺ°зӣёеҗҢзҡ„ж•ҲжһңгҖӮ


    ```sql

    create table entity_flattened as

    select *

    from (select e.name name, p.name p_name, value

    from entity e

    join property p

    on p.entity_id = e.id)

    pivot(max(value) for p_name in(''P1'' p1_value, ''P2'' p2_value, ''P3'' p3_value));

    ```


    `д»Јз Ғжё…еҚ• 4-6`

    дҪҝз”Ё `pivot` ж“ҚдҪңз¬ҰжүҒе№іеҢ– EAV жЁЎеһӢ


    иЎЁ `entity_flattened` еҢ…еҗ«дёҖдёӘдёҺдҪҝз”Ё `group by` зҡ„еҶ…иҒ”и§ҶеӣҫдёӯзӣёеҗҢзҡ„и®°еҪ•йӣҶгҖӮе…ідәҺ `pivot` ж“ҚдҪңз¬ҰжңҖйҮҚиҰҒзҡ„дёҖзӮ№жҳҜпјҢжҹҘиҜўдёӯеҝ…йЎ»еҲ—еҮәжүҖжңүеҲ—пјҢеӣ дёә
    Oracle еңЁи§Јжһҗйҳ¶ж®өе®ҡд№үдәҶз»“жһңйӣҶзҡ„жүҖжңүеҲ—гҖӮд№ҹе°ұжҳҜиҜҙпјҢж— жі•еҹәдәҺиЎЁдёӯзҡ„ж•°жҚ®жҲ–е…¶д»–жқЎд»¶еңЁи®°еҪ•йӣҶдёӯеҠЁжҖҒеҲӣе»әеҲ—пјҢеӣ жӯӨеҰӮжһңдҪ жңүжӯӨзұ»йңҖжұӮпјҢеҸҜд»ҘдҪҝз”Ё `ODCItable`
    жҺҘеҸЈпјҲжҲ–д»Һ Oracle 18c ејҖе§Ӣзҡ„еӨҡжҖҒиЎЁеҮҪж•°пјүгҖӮ`Pivot XML` е…Ғи®ёдҪ дёәеҠЁжҖҒж•°йҮҸзҡ„еҲ—з”ҹжҲҗ XMLпјҢдҪҶеҰӮжһңеёҢжңӣд»Ҙе…ізі»еҪўејҸиҺ·еҫ—з»“жһңпјҢдҪ йңҖиҰҒеҲ—еҮәжүҖжңүеҲ—д»ҘиҝӣиЎҢ
    XML и§ЈжһҗгҖӮжӯӨжҠҖжңҜеңЁ `д»Јз Ғжё…еҚ• 4-7` дёӯжј”зӨәгҖӮ


    ```sql

    select name, x.*

    from (select *

    from (select e.name name, p.name p_name, value

    from entity e

    join property p

    on p.entity_id = e.id)

    pivot xml(max(value) value for p_name in(any))),

    xmltable(''/PivotSet'' passing p_name_xml

    columns

    name1 varchar2(30)

    path ''/PivotSet/item[1]/column[@name="P_NAME"]/text()'',

    value1 varchar2(30)

    path ''/PivotSet/item[1]/column[@name="VALUE"]/text()'',

    name2 varchar2(30)

    path ''/PivotSet/item[2]/column[@name="P_NAME"]/text()'',

    value2 varchar2(30)

    path ''/PivotSet/item[2]/column[@name="VALUE"]/text()'',

    name3 varchar2(30)

    path ''/PivotSet/item[3]/column[@name="P_NAME"]/text()'',

    value3 varchar2(30)

    path ''/PivotSet/item[3]/column[@name="VALUE"]/text()'') x;

    NAME  NAME1 VALUE1 NAME2 VALUE2 NAME3 VALUE3

    ----- ----- ------ ----- ------ ----- ------

    E1    P1    1      P2     10     P3     20

    E2    P1    1      P3    100     P4     50

    E3    P1    1      P2     10     P3    100

    ```


    `д»Јз Ғжё…еҚ• 4-7`

    и§Јжһҗ `pivot` XML


    йүҙдәҺжӯӨйҖ»иҫ‘дёҺе‘ҲзҺ°з»“жһңзӣёе…іпјҢжңүж—¶еңЁе®ўжҲ·з«Ҝе®һзҺ°е®ғжҳҜжңүж„Ҹд№үзҡ„гҖӮ


    еҸҜд»ҘдҪҝз”Ё `unpivot` ж“ҚдҪңз¬Ұжү§иЎҢеҸҚеҗ‘ж“ҚдҪңпјҢеҰӮ `д»Јз Ғжё…еҚ• 4-8` жүҖзӨәгҖӮ


    ```sql

    select *

    from entity_flattened

    unpivot (value for p_name in

    (p1_value as ''P1'', p2_value as ''P2'', p3_value as ''P3''));

    NAME  P_NAME      VALUE

    ----- ------ ----------

    E1    P1              1

    E1    P2             10

    E1    P3             20

    E3    P1              1

    E3    P2             10

    E3    P3            100

    E2    P1              1

    E2    P3            100

    8 rows selected.

    ```


    `д»Јз Ғжё…еҚ• 4-8`

    `Unpivot` ж“ҚдҪңз¬Ұ


    е®ғдёә `unpivot` еӯҗеҸҘдёӯеҲ—еҮәзҡ„жҜҸдёӘеҲ—еҲӣе»әж–°иЎҢпјҢе№¶еӨҚеҲ¶жүҖжңүеү©дҪҷеҲ—зҡ„еҖјгҖӮеңЁдёҠйқўзҡ„дҫӢеӯҗдёӯпјҢеү©дҪҷеҲ—жҳҜ вҖң`p1_value, p2_value, p3_value`вҖқ
    е’ҢеҜ№еә”зҡ„ `name`гҖӮ`unpivot` дёҚйңҖиҰҒ вҖң`any`вҖқ е…ій”®еӯ—пјҢеӣ дёәиҰҒиҝӣиЎҢйҖҶйҖҸи§Ҷзҡ„и®°еҪ•йӣҶжҖ»жҳҜеҢ…еҗ«еӣәе®ҡдё”йў„е®ҡд№үж•°йҮҸзҡ„еҲ—гҖӮOracle жң¬еҸҜд»Ҙеј•е…ҘеғҸ
    вҖң`unpivot (value for p_name in (any except name))`вҖқ иҝҷж ·зҡ„иҜӯжі•зі–пјҢдҪҶиҝҷе№¶йқһејәзғҲеҝ…йңҖгҖӮ


    `Unpivot` еҸҜд»ҘдҪҝз”Ёз¬ӣеҚЎе°”иҝһжҺҘе®һзҺ°гҖӮ


    ```sql

    select name,

    p_name,

    decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) value

    from entity_flattened,

    (select ''P1'' p_name from dual

    union all select ''P2'' from dual

    union all select ''P3'' from dual)

    where decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) is
    not null

    order by 1, 2;

    ```


    ## Cube, Rollup, еҲҶз»„йӣҶ


    Oracle жҸҗдҫӣдәҶи®Ўз®—жҖ»и®Ўе’Ңе°Ҹи®Ўзҡ„йҷ„еҠ еҠҹиғҪгҖӮи®©жҲ‘д»¬иҖғиҷ‘дёҖдёӘеҢ…еҗ«и®ўеҚ•дҝЎжҒҜзҡ„иЎЁгҖӮ


    ```sql

    create table orders(order_id, client_id, product_id, quantity) as

    (

    select 1, 1, 1, 1 from dual

    union all select 1, 1, 2, 2 from dual

    union all select 1, 1, 3, 1 from dual

    union all select 2, 2, 1, 1 from dual

    union all select 2, 2, 5, 1 from dual

    union all select 3, 1, 1, 1 from dual

    union all select 3, 1, 4, 1 from dual

    union all select 3, 1, 4, 1 from dual

    union all select 4, 2, 4, 1 from dual

    union all select 4, 2, 5, 1 from dual

    );

    ```


    вҖң`Rollup`вҖқ е…Ғи®ёжҲ‘д»¬д»ҺеҸіеҗ‘е·Ұи®Ўз®—е°Ҹи®ЎпјҢвҖң`cube`вҖқ е…Ғи®ёжҲ‘д»¬и®Ўз®—жүҖеҲ—еҲ—зҡ„жүҖжңүеҸҜиғҪзҡ„е°Ҹи®ЎгҖӮ


    ```sql

    select client_id, product_id, sum(quantity) cnt

    from orders

    group by rollup(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID PRODUCT_ID        CNT

