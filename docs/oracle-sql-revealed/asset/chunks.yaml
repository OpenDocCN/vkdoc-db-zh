    # и§ЈеҶіж–№жЎҲ


    еҜ№дәҺйӣҶеҗҲдёӯзҡ„жҜҸдёӘе…ғзҙ пјҢйғҪеӯҳеңЁеҸҰдёҖдёӘе…ғзҙ пјҢдҪҝеҫ—дёӨиҖ…д№Ӣй—ҙзҡ„е·®еҖјдёҚи¶…иҝҮ 1пјӣеӣ жӯӨпјҢж №жҚ®дј йҖ’еҫӢпјҢжҲ‘д»¬еҸҜд»ҘеңЁе°ҶеҪ“еүҚе…ғзҙ ж·»еҠ еҲ°з»„д№ӢеүҚпјҢд»…жЈҖжҹҘе®ғдёҺдёҠдёӢз•Ңзҡ„е…ізі»гҖӮ


    еңЁзәҜ SQL дёӯпјҢиҝҷдёӘйҖ»иҫ‘еҸҜд»ҘйҖҡиҝҮиҝӯд»ЈжЁЎеһӢе®һзҺ°гҖӮ


    ```sql

    select *

    from t_resemblance

    model

    ignore nav

    dimension by (row_number() over (order by id) id)

    measures(value, 0 mi, 0 ma, 0 flag)

    rules iterate (1e9) until value[iteration_number + 2] = 0

    (

    flag[iteration_number + 1] =

    case when value[iteration_number + 1] between

    mi[iteration_number] - 1 and ma[iteration_number] + 1

    or iteration_number = 0

    then 1 end,

    mi[iteration_number + 1] =

    decode(flag[iteration_number + 1], 1, least(mi[iteration_number],

    value[iteration_number + 1]), mi[iteration_number]),

    ma[iteration_number + 1] =

    decode(flag[iteration_number + 1], 1, greatest(ma[iteration_number],

    value[iteration_number + 1]), ma[iteration_number])

    );

    ID      VALUE         MI         MA       FLAG

    ---------- ---------- ---------- ---------- ----------

    1          1          0          1          1

    2          2          0          2          1

    3        2.5          0        2.5          1

    4        3.4          0        3.4          1

    5         .4          0        3.4          1

    6          5          0        3.4

    7        -.5        -.5        3.4          1

    8         -2        -.5        3.4

    9         -1         -1        3.4          1

    10          3         -1        3.4          1

    11          4         -1          4          1

    12          5         -1          5          1

    12 rows selected.

    ```


    иҜҘз®—жі•йҒҚеҺҶи®°еҪ•йӣҶпјҢжҜҸж¬Ўиҝӯд»Јд»…жӣҙж”№дёҖиЎҢзҡ„еәҰйҮҸеҖјгҖӮе®ғжӣҙж–°з»„зҡ„дёҠдёӢз•Ңе№¶ж Үи®°еҪ“еүҚе…ғзҙ гҖӮ


    иҝӯд»ЈжҳҜеҝ…иҰҒзҡ„пјҢеӣ дёәжҲ‘д»¬еҝ…йЎ»дёәжҜҸдёҖиЎҢжӣҙж–°еӨҡдёӘеәҰйҮҸгҖӮеҰӮжһңдҪҝз”ЁеёҰжңү `ANY` зҡ„и§„еҲҷпјҢйӮЈд№ҲжЁЎеһӢдјҡе…ҲеҜ№жүҖжңүиЎҢи®Ўз®—з¬¬дёҖжқЎи§„еҲҷпјҢз„¶еҗҺеҶҚи®Ўз®—з¬¬дәҢжқЎи§„еҲҷпјҢдҫқжӯӨзұ»жҺЁгҖӮ


    иҖғиҷ‘еҲ°йҖ»иҫ‘зҡ„е…·дҪ“жғ…еҶөпјҢжҲ‘д»¬еҸҜд»Ҙе°қиҜ•дҪҝз”ЁжЁЎејҸеҢ№й…ҚеӯҗеҸҘжқҘжҺҘиҝ‘и§ЈеҶіж–№жЎҲпјҢдҪҶеңЁиҝҷз§Қжғ…еҶөдёӢпјҢжҲ‘д»¬дјҡйқўдёҙеҮ дёӘйҷҗеҲ¶пјҡ


    *   еҰӮжһңеңЁе®ҡд№үеӯҗеҸҘдёӯдҪҝз”ЁиҒҡеҗҲеҮҪж•°пјҢе®ғдјҡеә”з”ЁдәҺжүҖжңүиЎҢпјҢеҢ…жӢ¬еҪ“еүҚиЎҢгҖӮеӣ жӯӨпјҢжҲ‘д»¬ж— жі•е°ҶеҪ“еүҚеҖјдёҺиҝ„д»ҠдёәжӯўеҢ№й…ҚеҖјзҡ„жңҖе°ҸеҖј/жңҖеӨ§еҖјиҝӣиЎҢжҜ”иҫғгҖӮ

    *   дёҚиғҪеңЁе®ҡд№үеӯҗеҸҘдёӯдҪҝз”ЁеәҰйҮҸпјҢе№¶дё”жӣҙж— жі•дҪҝз”ЁеүҚдёҖиЎҢзҡ„еәҰйҮҸеҖјгҖӮеҺҹеӣ еңЁдәҺеәҰйҮҸжҳҜеңЁжүҫеҲ°еҢ№й…Қд№ӢеҗҺжүҚиҝӣиЎҢиҜ„дј°зҡ„гҖӮ


    жҲ‘д»¬еҸҜд»ҘеӣһжғідёҖдёӢпјҢеҸҜд»ҘдҪҝз”Ё `next()` еҮҪж•°пјҢдҪҶеңЁиҝҷз§Қжғ…еҶөдёӢпјҢжҲ‘д»¬йңҖиҰҒе°Ҷе…¶еә”з”ЁдәҺеҒҸз§»дёҖиЎҢзҡ„еҖјгҖӮдёӢйқўйҖҡиҝҮдҪҝз”ЁдёҖдёӘж–°еҲ— `vv` иҖҢдёҚжҳҜ `value`
    жқҘиҝӣиЎҢжј”зӨәгҖӮ


    ```sql

    select *

    from (select t.*, lag(value, 1, value) over(order by id) vv

    from (select id, value

    from t_resemblance t

    union all select null, null from dual) t)

    match_recognize

    (

    order by id

    measures

    match_number() match,

    classifier() cls,

    min(x.value) mi,

    max(x.value) ma

    all rows per match

    pattern((x|dummy)+)

    define

    x as (next(x.vv) >= min(x.vv) - 1 and next(x.vv) <= max(x.vv) + 1)

    -- x as (next(x.vv) between min(x.vv) - 1 and max(x.vv) + 1)

    ) mr

    where id is not null;

    ID    MATCH CLS        MI       MA      VALUE         VV

    -------- -------- ----- ------- -------- ---------- ----------

    1        1 X           1        1          1          1

    2        1 X           1        2          2          1

    3        1 X           1      2.5        2.5          2

    4        1 X           1      3.4        3.4        2.5

    5        1 X          .4      3.4         .4        3.4

    6        1 DUMMY      .4      3.4          5         .4

    7        1 X         -.5      3.4        -.5          5

    8        1 DUMMY     -.5      3.4         -2        -.5

    9        1 X          -1      3.4         -1         -2

    10        1 X          -1      3.4          3         -1

    11        1 X          -1        4          4          3

    12        1 X          -1        5          5          4

    12 rows selected.

    ```


    жҲ‘д»¬иҝҳеҝ…йЎ»ж·»еҠ дёҖдёӘе…·жңү `null` ID еҖјзҡ„йўқеӨ–иЎҢпјҢд»ҘжӯЈзЎ®еӨ„зҗҶеҺҹе§Ӣи®°еҪ•йӣҶдёӯзҡ„жңҖеҗҺдёҖиЎҢгҖӮдҪҝз”Ё `min()`/`max()` еҮҪж•°е№¶д»Ҙ `x.value`
    дҪңдёәеҸӮж•°жқҘиҝ”еӣһжҜҸдёҖжӯҘзҡ„дёҠдёӢз•ҢпјҢдҪҶиҝҷд»…з”ЁдәҺдҝЎжҒҜеұ•зӨәгҖӮжүҖжңүйҖ»иҫ‘йғҪеңЁе®ҡд№үеӯҗеҸҘзҡ„дёҖиЎҢдёӯе®һзҺ°гҖӮеҰӮжһңдҪҝз”Ё `next()` еҮҪж•°е’Ң `between` ж“ҚдҪңз¬ҰпјҢжҹҘиҜўе°Ҷеј•еҸ‘ејӮеёё
    вҖң`ORA-62508: illegal use of aggregates or navigation operators in MATCH_RECOGNIZE
    clause`вҖқпјӣиҝҷе°ұжҳҜдёәд»Җд№ҲдҪҝз”ЁдәҶеёҰжңүдёӨдёӘжқЎд»¶зҡ„и§„еҲҷгҖӮ


    е…ідәҺиҝҷдёӘд»»еҠЎжңҖеҗҺйңҖиҰҒжіЁж„Ҹзҡ„дёҖзӮ№жҳҜпјҢиҝҳеҸҜд»ҘдҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–жқҘе®һзҺ°еҸҰдёҖдёӘи§ЈеҶіж–№жЎҲпјҢдҪҶжЁЎејҸеҢ№й…Қж–№жЎҲж•ҲзҺҮиҰҒй«ҳеҫ—еӨҡгҖӮ


    # зҜ®еӯҗеҲҶй…Қ


    зӣ®ж ҮжҳҜе°Ҷзү©е“ҒеҲҶй…ҚеҲ°е…·жңүе®ҡд№үе®№йҮҸзҡ„зҜ®еӯҗдёӯгҖӮжҲ‘д»¬д»ҺжңҖе°ҸеҲ°жңҖеӨ§зҡ„ж ҮиҜҶз¬ҰеҫӘзҺҜйҒҚеҺҶзҜ®еӯҗпјҢе№¶ж №жҚ®зү©е“Ғзҡ„дјҳе…Ҳзә§иҝӣиЎҢеҲҶй…ҚгҖӮеҰӮжһңжҹҗдёӘзү©е“Ғе·ІеҲҶй…ҚеҲ°зү№е®ҡзҜ®еӯҗпјҢеҲҷе®ғдёҚиғҪиў«еҲҶй…ҚеҲ°д»»дҪ•е…¶д»–зҜ®еӯҗгҖӮеҜ№дәҺжҜҸдёӘзҜ®еӯҗпјҢзү©е“Ғзҡ„жҖ»йҮ‘йўқдёҚиғҪи¶…иҝҮзҜ®еӯҗйҮ‘йўқгҖӮ


    еҜ№дәҺд»ҘдёӢж•°жҚ®пјҡ


    ```sql

    with

    baskets(basket_id, basket_amount) as

    ( select 100, 500000 from dual union all

    select 200, 400000 from dual union all

    select 300, 1000000 from dual

    ),

    inventory(item_id, item_amount) as

    ( select 1000001, 50000 from dual union all

    select 1000002, 15000 from dual union all

    select 1000003, 250000 from dual union all

    select 1000004, 350000 from dual union all

    select 1000005, 45000 from dual union all

    select 1000006, 100500 from dual union all

    select 1000007, 200500 from dual union all

    select 1000008, 30050 from dual union all

    select 1000009, 400500 from dual union all

    select 1000010, 750000 from dual

    ),

    eligibility(basket_id, item_id, priority_level) as

    ( select 100, 1000003, 1 from dual union all

    select 100, 1000004, 2 from dual union all

    select 100, 1000002, 3 from dual union all

    select 100, 1000005, 4 from dual union all

    select 200, 1000004, 1 from dual union all

    select 200, 1000003, 2 from dual union all

    select 200, 1000001, 3 from dual union all

    select 200, 1000005, 4 from dual union all

    select 200, 1000007, 5 from dual union all

    select 200, 1000006, 6 from dual union all

    select 300, 1000002, 1 from dual union all

    select 300, 1000009, 2 from dual union all

    select 300, 1000010, 3 from dual union all

    select 300, 1000006, 4 from dual union all

    select 300, 1000008, 5 from dual

    )

    ```


    йў„жңҹз»“жһңеҰӮдёӢпјҡ


    ```

    BASKET_ID PRIORITY_LEVEL  ITEM_ID BASKET_AMOUNT   ITEM_AMOUNT  RESULT

    ---------- -------------- -------- -------------  ----------- -------

    100              1  1000003        500000       250000  250000

