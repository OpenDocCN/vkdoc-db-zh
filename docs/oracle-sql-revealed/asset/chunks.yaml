- fmt: "## Limitation of analytic and aggregate functions in model clause\n```sql\n\
    select *\nfrom (select rownum id from dual connect by rownum = cv(id)]\n-- 4)\n\
    r2[any] = sum(value)[id >= cv(id)]\n)\n```\n\nTo explore flexibility of addressing\
    \ for aggregate functions, letвҖҳs get back to the example regarding limitations\
    \ of analytic functions shown in Listing 7-6. The first limitation is not an issue\
    \ at all. Listing 7-14 shows how to calculate the number of points within the\
    \ distance of 5 by two coordinates.\n\n### Listing 7-14\nAggregate functions in\
    \ model clause with conditional addressing by multiple dimensions\n```sql\nwith\
    \ points as\n(select rownum id, rownum * rownum x, mod(rownum, 3) y\nfrom dual\n\
    connect by rownum <= 6)\n, t as\n(select p.*,\n-- the number of points within\
    \ the distance of 5 by x coordinate       -- cannot be solved with analytic functions\
    \ for more than one coordinate       count(*) over(order by x range between 5\
    \ preceding and 5 following) cnt,       -- sum of the distances to the point (3,\
    \ 3) for all rows       -- between unbounded preceding and current row ordered\
    \ by id       -- cannot be solved using analytic function if required to calculate\
    \       -- distance between other rows and current row rather than a constant\
    \ point\nround(sum(sqrt((x - 3) * (x - 3) + (y - 3) * (y - 3)))\nover(order by\
    \ id),\n2) dist\nfrom points p)\nselect *\nfrom t\nmodel\ndimension by (x, y)\n\
    measures (id, cnt, dist, 0 cnt2)\nrules\n(\ncnt2[any, any] = count(*)[x between\
    \ cv(x) - 5 and cv(x) + 5,\ny between cv(y) - 1 and cv(y) + 1]\n)\norder by id;\n\
    ```\n\nHowever, there is no straightforward solution for the second limitation\
    \ because itвҖҷs not possible to refer a measure for the current row in the expression\
    \ for an aggregate function. As a workaround we can use an iterative model and\
    \ do as many iterations as the number of rows to maintain two auxiliary measures\
    \ with coordinates for the current row. The idea is shown in Listing 7-15, but\
    \ this approach looks a bit awkward and performance is inefficient.\n\n### Listing\
    \ 7-15\nUsing iterative model as a workaround for limitation of aggregate functions\n\
    ```sql\nwith points as\n(select rownum id, rownum * rownum x, mod(rownum, 3) y\n\
    from dual\nconnect by rownum <= 6)\nselect *\nfrom points\nmodel\ndimension by\
    \ (id)\nmeasures (id i, x, y, 0 x_cur, 0 y_cur, 0 dist2)\nrules iterate (1e6)\
    \ until i[iteration_number+2] is null\n(\nx_cur[any] = x[iteration_number + 1],\n\
    y_cur[any] = y[iteration_number + 1],\ndist2[iteration_number + 1] =\nround(sum(sqrt((x\
    \ - x_cur) * (x - x_cur) +\n(y - y_cur) * (y - y_cur)))[id <= cv(id)], 2)\n)\n\
    order by id;\n```\n\nAs you see, auxiliary measures `x_cur` and `y_cur` have to\
    \ be initialized for all the rows on all the iterations. To populate `(x_cur,\
    \ y_cur)` with values `(x, y)` for the current row, we use `[iteration_number\
    \ + 1]` because row numbering starts with 1 while `interation_number` starts with\
    \ 0. Measure `dist2` is calculated only for a single row on each iteration.\n\n\
    Given that sometimes aggregate and analytic functions are interchangeable in a\
    \ model clause, we will discuss this question a bit further during performance\
    \ analysis.\n\n### Generation of recursive sequences using model clause\n\nLetвҖҷs\
    \ proceed to specific tasks. Listing 7-16 shows how to use the model to generate\
    \ recursive sequences discussed in previous chapters.\n\n```sql\nselect *\nfrom\
    \ dual\nmodel\ndimension by (0 id)\nmeasures (1 result)\nrules\n(\nresult[for\
    \ id from 1 to 20 increment 1] =\nround(100 * sin(result[cv(id)-1] + cv(id) -\
    \ 1))\n);\nselect *\nfrom (select rownum lvl, rownum - 1 result\nfrom dual connect\
    \ by level <= 2)\nmodel\nignore nav\ndimension by (lvl)\nmeasures (result)\nrules\n\
    (\nresult[for lvl from 3 to 15 increment 1] =\nresult[cv(lvl)-1] + result[cv(lvl)-2]\n\
    );\n```\n\nThe model allows us to use values calculated on previous stages likewise\
    \ recursive subquery factoring. The crucial difference from a logical perspective\
    \ between the two is that a model applies rules and calculates values (measures)\
    \ by columns and not by rows, while recursive subquery factoring evaluates all\
    \ the expressions for a current row before processing the next row. You can find\
    \ additional details in the quiz вҖңBasketsвҖқ in Chapter 12.\n\nAlso, unlike recursive\
    \ subquery factoring, a model provides an easy way to reference measures from\
    \ any other row; thus there is no need to use an auxiliary column to generate\
    \ Fibonacci, for example. Visibility for recursive subquery factoring is limited\
    \ to the recordset on the previous iteration.\n\nEven though recursive subquery\
    \ factoring and a model can be used to solve the same tasks, these capabilities\
    \ are completely different and designed for different purposes so using the same\
    \ terminology is not quite appropriate. Speaking about recursive subquery factoring,\
    \ we can say вҖңreferring value calculated on a previous levelвҖқ or вҖңreferring calculated\
    \ value for parent recordвҖқ while for the model clause, a more correct statement\
    \ would be вҖңreferring measure value for a previous dimension member.вҖқ\n\nRecursive\
    \ subquery factoring was designed to be able to apply the same logic multiple\
    \ times and to work with hierarchical data in particular, while the model clause\
    \ was designed for spreadsheet-like computations and to work with multidimensional\
    \ data.\n\n### Use cases for the model clause\n\nSummarizing use cases, it makes\
    \ sense to use the model in the following situations:\n\n1.  Spreadsheet-like\
    \ calculations. Simply speaking, this means calculating cells based on values\
    \ for other cells or their ranges. Trivial expressions can often be rewritten\
    \ to use other SQL capabilities: analytic functions and/or additional joins. For\
    \ example, if we have information about monthly sales and want to calculate a\
    \ ratio to the first month, we can use the model:\n    ```sql\n    with t as\n\
    \    (select rownum id, 100 + rownum - 1 value from dual connect by level <= 12)\n\
    \    select *\n    from t\n    model\n    dimension by (id)\n    measures (value,\
    \ 0 ratio)\n    rules\n    (ratio[any] order by id = value[cv(id)]/value[1])\n\
    \    ```\n    At the same time, it can be easily calculated using analytic functions:\n\
    \    ```sql\n    select id, value, value / first_value(value) over(order by id)\
    \ ratio from t\n    ```\n    Here is a more synthetic example: calculate the ratio\
    \ between the current row value and the value from the row referenced by `ref_id`.\n\
    \    ```sql\n    exec dbms_random.seed(100);\n    create table t as\n    select\
    \ rownum id,\n    100 + rownum - 1 value,\n    trunc(dbms_random.value(1, 10 +\
    \ 1)) ref_id\n    from dual\n    connect by level <= 10;\n    ```\n    Model solution\
    \ is below:\n    ```sql\n    select *\n    from t\n    model\n    dimension by\
    \ (id)\n    measures (value, ref_id, 0 ratio)\n    rules\n    (\n    ratio[any]\
    \ order by id =\n    round(value[cv(id)] / value[ref_id[cv(id)]], 3)\n    );\n\
    \    ```\n    ```\n    ID      VALUE     REF_ID      RATIO\n    ---------- ----------\
    \ ---------- ----------\n    1        100          6       .952\n    2       \
    \ 101          7       .953\n    3        102          7       .962\n    4   \
    \     103          8       .963\n    5        104          3      1.02\n    6\
    \        105          5      1.01\n    7        106         10       .972\n  \
    \  8        107          4      1.039\n    9        108          2      1.069\n\
    \    10        109          7      1.028\n    ```\n    The same can be achieved\
    \ with self join (or analytic function using approach from Listing 3-3):\n   \
    \ ```sql\n    select t1.*, round(t1.value / t2.value, 3) ratio\n    from t t1\n\
    \    join t t2\n    on t1.ref_id = t2.id\n    order by t1.id\n    ```"
