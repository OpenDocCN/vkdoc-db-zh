    **Listing 1-19 йў„иҝһжҺҘдёҺеҗҺиҝһжҺҘи°“иҜҚ**


    з¬¬дёҖдёӘжҹҘиҜўз®ҖеҚ•ең°жј”зӨәдәҶе·ҰеӨ–иҝһжҺҘгҖӮз¬¬дёүдёӘе’Ңз¬¬дә”дёӘжҹҘиҜўдёӯзҡ„и°“иҜҚ `вҖңt1.id = 1вҖқ` жҳҜеҗҺиҝһжҺҘи°“иҜҚпјҢиҖҢз¬¬дәҢдёӘе’Ңз¬¬еӣӣдёӘжҹҘиҜўдёӯзұ»дјјзҡ„и°“иҜҚжҳҜйў„иҝһжҺҘи°“иҜҚгҖӮеңЁз¬¬еӣӣдёӘжҹҘиҜўдёӯпјҢжҲ‘д»¬дҪҝз”Ё
    `(+)` е°Ҷи°“иҜҚж Үи®°дёәйў„иҝһжҺҘпјҢиҖҢеңЁз¬¬дәҢдёӘжҹҘиҜўдёӯпјҢе®ғжҳҜйў„иҝһжҺҘжҳҜеӣ дёәе®ғеұһдәҺеӨ–иҝһжҺҘеӯҗеҸҘзҡ„дёҖйғЁеҲҶгҖӮ


    йў„/еҗҺиҝһжҺҘи°“иҜҚзҡ„жҰӮеҝөд»…еҜ№еӨ–иҝһжҺҘжңүж„Ҹд№үгҖӮеӨ–иҝһжҺҘзҡ„ејәеҲ¶жҖ§иҰҒжұӮжҳҜжӢҘжңүдёҖдёӘеҢ…еҗ«жқҘиҮӘдёӨдёӘиЎЁзҡ„еҲ—пјҢе№¶дё”еңЁе…¶дёӯдёҖдёӘеҲ—ж—Ғиҫ№жңү `(+)` зҡ„и°“иҜҚгҖӮ


    и®©жҲ‘д»¬иҖғиҷ‘д»ҘдёӢдёӨдёӘжҹҘиҜўгҖӮ


