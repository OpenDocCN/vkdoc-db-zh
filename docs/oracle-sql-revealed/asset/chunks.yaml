    recursive_query_text вҖ“ recursive member referencing rec

    )

    select *

    from rec

    Listing 6-1

    Recursive subquery factoring

    ```


    The following algorithm is used for execution:


    1.  Run anchor member to get base result set Set[0]. В 

    2.  Execute recursive member with result set Set[i-1] from previous iteration.
    В 

    3.  Repeat step 2 until empty result set is returned. В 

    4.  Return final result set, which is the union all of Set[0] вҖҰ Set[n].


    The query in Listing [6-2](#A455196_1_En_6_Chapter.html#Par10) traverses the trees
    from the tree table introduced in the previous chapter (Listing [5-1](#A455196_1_En_5_Chapter.html#Par3)).
    You may notice that the order of the result differs from the вҖңconnect byвҖқ approach.


    ```

    with rec(lvl, id, path) as

    (

    select 1 lvl, id, cast(''->'' || id as varchar2(4000))

    from tree where id_parent in (1, 10)

    union all

    select r.lvl + 1, t.id, r.path || ''->'' || t.id

    from tree t

    join rec r on t.id_parent = r.id

    )

    select lvl,

    rpad('' '', (lvl - 1) * 3, '' '') || id as id,

    path

    from rec;

    LVL ID         PATH

    ---------- ---------- ----------

    1 2          ->2

    1 3          ->3

    1 11         ->11

    2    4       ->3->4

    2    12      ->11->12

    2    13      ->11->13

    3       5    ->3->4->5

    Listing 6-2

    Building hierarchies using recursive subquery factoring

    ```


    To return the result in the same order as вҖңconnect byвҖқ does, you must specify
    вҖң`search depth first`вҖқВ вҖ“ in this case all the descendants for the node will be
    returned before the other nodes on its level вҖ“ see Listing [6-3](#A455196_1_En_6_Chapter.html#Par12).
    Default ordering is вҖң`search breadth first`вҖқ so all nodes from previous levels
    are returned before nodes on the current level. As it will be shown in section
    вҖңTraversing Hierarchies,вҖқ order impacts only how results are returned, not the
    way of traversing a hierarchy.'
