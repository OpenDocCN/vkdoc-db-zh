    ```


    We may notice that F[i] < 2^i/i and F[i-1] between ВҪ * F[i] and Вҫ *F[i] for all
    elements greater than 1 and these conditions were used to reduce the number of
    pre-generated pairs. Unlike the previous example, there is no need to use a trick
    with prior sys_guid because the sequence is monotonically increasing for all elements
    greater than 1 so itвҖҷs not possible to face a cycle.


    Elapsed time grows exponentially depending on the level and such an approach cannot
    be used in real-life tasks; the main intention was to demonstrate specifics of
    the вҖңconnect byвҖқ clause.


    The trick with sys_guid can also be used to generate the number of copies for
    each row.


    ```

    with t as

    (select ''A'' value, 2 cnt from dual

    union all

    select ''B'' value, 3 cnt from dual)

    select *

    from t

    connect by level <= cnt

    and prior value = value

    and prior sys_guid() is not null;

    V        CNT

    - ----------

    A          2

    A          2

    B          3

    B          3

    B          3

    ```


    As you can see, there is no вҖңstart withвҖқ condition in a query so the first level
    contains all the rows and connection is performed in the scope of each value until
    the cnt rows are generated. The trick with sys_guid was used to avoid cycles,
    given that all the rows for each root have the same values. There are many other
    ways to generate a specified number of copies for each row and connect by is not
    the best way to do that.


    We can also use this trick while traversing directed graphs. It prevents Oracle
    from identifying cycles so the same cycle may be traversed multiple times. The
