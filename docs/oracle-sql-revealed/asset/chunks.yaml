    ### жҺ§еҲ¶жү§иЎҢи®ЎеҲ’


    еҰӮеүҚжүҖиҝ°пјҢз”ұдәҺеңЁеҗҺеҸ°еҲӣе»әдәҶlateral/inlineи§ҶеӣҫпјҢдҪҝз”ЁANSIиҜӯжі•ж—¶жҹҗдәӣжҸҗзӨәеҸҜиғҪдјҡеӨұж•ҲгҖӮжӯӨеӨ–пјҢжңүдәӣжҸҗзӨәдёҚиғҪдёҺANSIдёҖиө·дҪҝз”ЁпјҢзү№еҲ«жҳҜ`qb_name`гҖӮеҪ“жңүдәәе°қиҜ•еңЁдё»жҹҘиҜўжҸҗзӨәдёӯжҢҮе®ҡеҶ…иҒ”и§Ҷеӣҫдёӯзҡ„иЎЁж—¶пјҢиҝҷдёӘжҸҗзӨәеҸҜиғҪйқһеёёжңүз”ЁгҖӮ


    и®©жҲ‘д»¬дҪҝз”Ё`вҖңselect * from table(dbms_xplan.display_cursor(format => вҖҳBASIC ALIASвҖҷ));вҖқ`жқҘжЈҖжҹҘдёӢйқўжҹҘиҜўзҡ„еҲ«еҗҚгҖӮ


    ```

    select --+ qb_name(q)

    *

    from t1

    join t2

    on t1.id = t2.id;

    select --+ qb_name(q)

    *

    from t1, t2

    where t1.id = t2.id;

    Listing 1-77

    Specifying qb_name hint

    ```


    з»“жһңеҰӮдёӢжүҖзӨәпјҲеҜ№дәҺANSIиҜӯжі•пјҢжҸҗзӨәеӨұж•ҲдәҶпјүпјҢи§ҒListing [1-78](#A455196_1_En_1_Chapter.html#Par231)гҖӮ


    ```

    Query Block Name / Object Alias (identified by operation id):


    1 - SEL$695B99D2

    2 - SEL$695B99D2 / T1@SEL$1

    3 - SEL$695B99D2 / T2@SEL$1

    Query Block Name / Object Alias (identified by operation id):


    1 - Q

    2 - Q / T1@Q

    3 - Q / T2@Q

    Listing 1-78

    Aliases after using qb_name

    ```


    ### ANSIзҡ„йҷҗеҲ¶


    еңЁOracle 12cд№ӢеүҚпјҢеңЁеӯҗжҹҘиҜўдёӯдҪҝз”ЁANSIиҜӯжі•еӯҳеңЁдёҖдёӘйҷҗеҲ¶гҖӮдёҚиҝҮпјҢжҲ‘еҫ—иҜҙиҝҷжҳҜдёҖдёӘй”ҷиҜҜиҖҢдёҚжҳҜйҷҗеҲ¶гҖӮ


    еҰӮжһңжҲ‘д»¬еңЁиҝһжҺҘжқЎд»¶дёӯдҪҝз”Ёдё»жҹҘиҜўзҡ„еҲ—пјҢе®ғдјҡеӣ `ORA-00904`иҖҢеӨұиҙҘгҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    join t1

    on t2.id = t1.id

    and t2.id = t3.id) x

    from t3

    order by t3.id;

    and t2.id = t3.id) x

    *

    ERROR at line 6:

    ORA-00904: "T3"."ID": invalid identifier

    Listing 1-79

    Using column from main query in ANSI join predicate

    ```


    жҲ‘д»¬еҸҜд»Ҙж‘Ҷи„ұе…іиҒ”ж ҮйҮҸеӯҗжҹҘиҜўпјҢж”№дёәдҪҝз”ЁжҳҫејҸиҝһжҺҘжқҘйҒҝе…Қй”ҷиҜҜпјҲж·»еҠ `t3.rowid`еҲ°`group by`жҳҜеӣ дёәдёҚиғҪдҝқиҜҒ`t3.id`жҳҜе”ҜдёҖзҡ„пјүгҖӮ


    ```

    select t3.id, count(t2.rowid) + count(t1.rowid) x

    from t3

    left join(t2 join t1 on t2.id = t1.id) on t3.id = t2.id

    group by t3.rowid, t3.id

    order by t3.id;

    ID          X

    ---------- ----------

    0          2

    1          0

    2          0

    Listing 1-80

    Using explicit joins instead of correlated scalar subquery

    ```


    еҰӮжһң`t3.id`зҡ„еҹәж•°иҫғдҪҺпјҢз”ұдәҺж ҮйҮҸеӯҗжҹҘиҜўзј“еӯҳпјҢж ҮйҮҸеӯҗжҹҘиҜўеҸҜиғҪеҮәдәҺжҖ§иғҪеҺҹеӣ жӣҙеҸҜеҸ–гҖӮ


    еҰӮжһңжҲ‘д»¬е°Ҷи°“иҜҚ`вҖңt2.id = t3.idвҖқ`з§»еҲ°`where`еӯҗеҸҘдёӯпјҢйӮЈд№ҲжҹҘиҜўе°ұиғҪжӯЈеёёе·ҘдҪңгҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    join t1

    on t2.id = t1.id

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    Listing 1-81

    Moving predicate with column from main query into where clause

    ```


    з„¶иҖҢпјҢиҝҷз§ҚеҸҳйҖҡж–№жі•е№¶дёҚжҖ»жҳҜеҸҜиЎҢзҡ„пјҢеӣ дёәиҝһжҺҘеҸҜиғҪжҳҜеӨ–иҝһжҺҘпјҢе№¶дё”жқЎд»¶дёӯеҢ…еҗ«жқҘиҮӘдё»жҹҘиҜўзҡ„еҲ—гҖӮListing [1-82](#A455196_1_En_1_Chapter.html#Par241)дёӯзҡ„жҹҘиҜўжҳҜеңЁOracle
    12cдёҠжү§иЎҢзҡ„пјҲеңЁж—§зүҲжң¬дёҠдјҡеӨұиҙҘпјүгҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    left join t1

    on t2.id = t1.id

    and t3.id > 0

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    ID          X

    ---------- ----------

    0          1

    1          0

    2          1

    Listing 1-82

    ANSI outer join in scalar subquery

    ```


    еңЁ11gдёӯпјҢеҰӮжһңжҲ‘д»¬е°ҶйҖ»иҫ‘з§»еҲ°`select`еҲ—иЎЁиЎЁиҫҫејҸдёӯпјҢеҸҜд»ҘйҒҝе…Қй”ҷиҜҜпјҢдҪҶиҝҷз§Қж–№жі•дёҚиғҪиў«и®ӨдёәжҳҜеҗҲйҖӮзҡ„еҸҳйҖҡж–№жі•гҖӮеҸӮи§ҒListing [1-83](#A455196_1_En_1_Chapter.html#Par243)гҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + decode(sign(t3.id), 1, count(t1.rowid), 0)

    from t2

    left join t1

    on t2.id = t1.id

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    ID          X

    ---------- ----------

    0          1

    1          0

    2          1

    Listing 1-83

    Avoiding error for ANSI outer join in scalar subquery

    ```


    жӣҙеҘҪзҡ„ж–№жі•жҳҜдҪҝз”ЁеӨ–йғЁе…іиҒ”иЎЁж“ҚдҪңз¬ҰпјҲ`numbers`зұ»еһӢе®ҡд№үеңЁвҖңUnnesting CollectionsвҖқдёҖиҠӮдёӯпјүпјҢеҰӮListing [1-84](#A455196_1_En_1_Chapter.html#Par245)жүҖзӨәгҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + count(tt.column_value)

    from t2

    left join table(cast(multiset (select nvl2(t2.rowid, 1, null)

    from t1

    where t2.id = t1.id

    and t3.id > 0) as numbers)) tt

    on 1 = 1

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    Listing 1-84

    Using table operator with ANSI join in scalar subquery

    ```


    жңҖеҗҺпјҢжҹҘиҜўеҸҜд»Ҙиў«йҮҚеҶҷдёәдҪҝз”ЁеҺҹз”ҹиҝһжҺҘпјҢеҰӮListing [1-85](#A455196_1_En_1_Chapter.html#Par247)жүҖзӨәгҖӮ


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2, t1

    where t2.id = t3.id

    and t2.id = t1.id(+)

    and decode(sign(t3.id), 1, 0) = nvl2(t1.id(+), 0, 0)) x

    from t3

    order by t3.id;

    Listing 1-85

    Using native join instead of ANSI in scalar subquery

    ```


    еҗҢж ·зҡ„й—®йўҳд№ҹеҸ‘з”ҹеңЁ`where`еӯҗеҸҘдёӯдҪҝз”ЁANSIе’Ңе…іиҒ”еӯҗжҹҘиҜўж—¶пјҢжүҖд»Ҙиҝҷе№¶йқһ`select`еҲ—иЎЁдёӯзҡ„ж ҮйҮҸеӯҗжҹҘиҜўжүҖзү№жңүгҖӮ'
  raw: '### Mixing Syntax


    Some people prefer native syntax while others tend to use only ANSI syntax. In
    rare cases, it may be acceptable to use both ANSI and native in the same query
    but on different levels (or in different subqueries). This could happen, for example,
    if the development standard in the team is ANSI but it does not allow you to fix
    the plan because of inline views creation under the hood, or you faced some ANSI
    bug or limitation (see section вҖңLimitations of ANSIвҖқ).


    It is more surprising that Oracle allows you to mix ANSI and native syntax even
    in single from clause. The following examples will demonstrate some bad practices.
    I do not think anyone should be using this but itвҖҷs important to understand what
    is going on if you face such a query.


    So, if you specify ANSI inner join and add operator (+) to a join condition, then,
    in fact, Oracle will execute it as an outer join.


    ```

    select * from t1 join t2 on t1.id = t2.id(+)

    select "T1"."ID"   "ID",

    "T1"."NAME" "NAME",

    "T2"."ID"   "ID",

    "T2"."NAME" "NAME"

    from "T1" "T1", "T2" "T2"

    where "T1"."ID" = "T2"."ID"(+)

    Listing 1-71

    Original and transformed queries for mixed syntax

    ```


    LetвҖҷs proceed to the following query in Listing [1-72](#A455196_1_En_1_Chapter.html#Par217).


    ```

    select *

    from t1, t2

    left join t3

    on t3.id = t2.id + 1;

    ID N         ID N         ID

    ---------- - ---------- - ----------

    0 X          0 X          1

    1 A          0 X          1

    0 X          2 B

    1 A          2 B

    Listing 1-72

    Mixed syntax in from clause

    ```


    Please note that tables t1 and t2 are listed using a comma while t3 was added
    using an ANSI join. The transformed query looks as shown in Listing [1-73](#A455196_1_En_1_Chapter.html#Par219).


    ```

    select "T1"."ID"   "ID",

    "T1"."NAME" "NAME",

    "T2"."ID"   "ID",

    "T2"."NAME" "NAME",

    "T3"."ID"   "ID"

    from "T1" "T1", "T2" "T2", "T3" "T3"

    where "T3"."ID"(+) = "T2"."ID" + 1

    Listing 1-73

    Transformed query for mixed syntax in from clause

    ```


    LetвҖҷs specify all joins in ANSI style and add one more condition.


    ```

    select *

    from t1

    cross join t2

    left join t3

    on t3.id = t2.id + 1

    and t3.id = t1.id;

    ID N         ID N         ID

    ---------- - ---------- - ----------

    1 A          0 X          1

    0 X          0 X

    1 A          2 B

    0 X          2 B

    Listing 1-74

    Mixed query rewritten into ANSI along with additional predicate

    ```


    If we try to use mixed syntax for the above query, it will fail, which means that
    only t2 is visible in an on clause for join with t3.


    ```

    select *

    from t1, t2

    left join t3

    on t3.id = t2.id + 1

    and t3.id = t1.id;

    and t3.id = t1.id

    *

    ERROR at line 5:

    ORA-00904: "T1"."ID": invalid identifier

    Listing 1-75

    Mixed syntax and complex predicate

    ```


    If we try to specify a predicate for joining t1 and t3 using (+) in a where clause,
    then the query fails with ORA-25156.


    ```

    select *

    from t1, t2

    left join t3

    on t3.id = t2.id + 1

    where t3.id(+) = t1.id;

    where t3.id(+) = t1.id

    *

    ERROR at line 5:

    ORA-25156: old style outer join (+) cannot be used with ANSI joins

    Listing 1-76

    Mixed syntax and predicates in where and on clauses

    ```


    It would be reasonable to raise В«`ORA-25156`В» always when a from clause contains
    ANSI syntax and (+) operator or raise another exception, then different join styles
    are used in a from clause but demonstrated examples with mixed syntax work successfully
    on Oracle 10g, 11g, and 12c.


    ### Controlling Execution Plan


    As already mentioned, some hints may become invalid while using ANSI syntax because
    of lateral/inline views creation under the hood. Moreover, some hints cannot be
    used with ANSI, particularly, qb_name. This hint may be very useful when someone
    tries to specify tables from an inline view in the main query hint.


    LetвҖҷs check aliases for the queries below using вҖңselect * from table(dbms_xplan.display_cursor(format
    => вҖҳBASIC ALIASвҖҷ));вҖқ.


    ```

    select --+ qb_name(q)

    *

    from t1

    join t2

    on t1.id = t2.id;

    select --+ qb_name(q)

    *

    from t1, t2

    where t1.id = t2.id;

    Listing 1-77

    Specifying qb_name hint

    ```


    The result is shown below (hint became invalid for ANSI syntax) in Listing [1-78](#A455196_1_En_1_Chapter.html#Par231).


    ```

    Query Block Name / Object Alias (identified by operation id):


    1 - SEL$695B99D2

    2 - SEL$695B99D2 / T1@SEL$1

    3 - SEL$695B99D2 / T2@SEL$1

    Query Block Name / Object Alias (identified by operation id):


    1 - Q

    2 - Q / T1@Q

    3 - Q / T2@Q

    Listing 1-78

    Aliases after using qb_name

    ```


    ### Limitations of ANSI


    Before Oracle 12c there was a limitation in using ANSI syntax in subqueries. However
    IвҖҷd say that it was a bug rather than a limitation.


    If we use a column from the main query in a join condition, then it fails with
    ORA-00904.


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    join t1

    on t2.id = t1.id

    and t2.id = t3.id) x

    from t3

    order by t3.id;

    and t2.id = t3.id) x

    *

    ERROR at line 6:

    ORA-00904: "T3"."ID": invalid identifier

    Listing 1-79

    Using column from main query in ANSI join predicate

    ```


    We can get rid of the correlated scalar subquery and use explicit joins instead
    to avoid error (t3.rowid is added to group by because there is no guarantee that
    t3.id is unique).


    ```

    select t3.id, count(t2.rowid) + count(t1.rowid) x

    from t3

    left join(t2 join t1 on t2.id = t1.id) on t3.id = t2.id

    group by t3.rowid, t3.id

    order by t3.id;

    ID          X

    ---------- ----------

    0          2

    1          0

    2          0

    Listing 1-80

    Using explicit joins instead of correlated scalar subquery

    ```


    Scalar subqueries may be preferable for performance reasons because of scalar
    subquery caching if t3.id has low cardinality.


    If we move predicate вҖң`t2.id = t3.id`вҖқ into the where clause, then the query works
    fine.


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    join t1

    on t2.id = t1.id

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    Listing 1-81

    Moving predicate with column from main query into where clause

    ```


    This workaround is not always possible though, because the join may be outer and
    with a condition containing column from the main query. Query from Listing [1-82](#A455196_1_En_1_Chapter.html#Par241)
    was executed on Oracle 12c (it fails on older versions).


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2

    left join t1

    on t2.id = t1.id

    and t3.id > 0

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    ID          X

    ---------- ----------

    0          1

    1          0

    2          1

    Listing 1-82

    ANSI outer join in scalar subquery

    ```


    We can avoid an error in 11g if we move the logic into a select list expression,
    but this approach cannot be considered a proper workaround. See Listing [1-83](#A455196_1_En_1_Chapter.html#Par243).


    ```

    select t3.id,

    (select count(t2.rowid) + decode(sign(t3.id), 1, count(t1.rowid), 0)

    from t2

    left join t1

    on t2.id = t1.id

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    ID          X

    ---------- ----------

    0          1

    1          0

    2          1

    Listing 1-83

    Avoiding error for ANSI outer join in scalar subquery

    ```


    A better approach would be to use an outer correlated table operator (type numbers
    was defined in section вҖңUnnesting CollectionsвҖқ) as shown in Listing [1-84](#A455196_1_En_1_Chapter.html#Par245).


    ```

    select t3.id,

    (select count(t2.rowid) + count(tt.column_value)

    from t2

    left join table(cast(multiset (select nvl2(t2.rowid, 1, null)

    from t1

    where t2.id = t1.id

    and t3.id > 0) as numbers)) tt

    on 1 = 1

    where t2.id = t3.id) x

    from t3

    order by t3.id;

    Listing 1-84

    Using table operator with ANSI join in scalar subquery

    ```


    And finally a query may be rewritten to use native joins, as shown in Listing
    [1-85](#A455196_1_En_1_Chapter.html#Par247).


    ```

    select t3.id,

    (select count(t2.rowid) + count(t1.rowid)

    from t2, t1

    where t2.id = t3.id

    and t2.id = t1.id(+)

    and decode(sign(t3.id), 1, 0) = nvl2(t1.id(+), 0, 0)) x

    from t3

    order by t3.id;

    Listing 1-85

    Using native join instead of ANSI in scalar subquery

    ```


    The same issues occur while using ANSI and correlated subqueries in a where clause,
    so this is not specific for scalar subqueries in a select list.'
  trans: '

    ### ж··еҗҲиҜӯжі•


    жңүдәӣдәәе–ңж¬ўдҪҝз”ЁеҺҹз”ҹиҜӯжі•пјҢиҖҢеҸҰдёҖдәӣдәәеҲҷеҖҫеҗ‘дәҺеҸӘдҪҝз”Ё**ANSI**иҜӯжі•гҖӮеңЁжһҒе°‘ж•°жғ…еҶөдёӢпјҢеңЁеҗҢдёҖжҹҘиҜўзҡ„дёҚеҗҢеұӮзә§пјҲжҲ–еңЁдёҚеҗҢзҡ„еӯҗжҹҘиҜўдёӯпјүж··еҗҲдҪҝз”Ё**ANSI**е’ҢеҺҹз”ҹиҜӯжі•еҸҜиғҪжҳҜеҸҜд»ҘжҺҘеҸ—зҡ„гҖӮдҫӢеҰӮпјҢеҰӮжһңеӣўйҳҹзҡ„ејҖеҸ‘ж ҮеҮҶжҳҜ**ANSI**пјҢдҪҶиҜҘж ҮеҮҶдёҚе…Ғи®ёдҪ йҖҡиҝҮеңЁеҗҺеҸ°еҲӣе»әеҶ…иҒ”и§ҶеӣҫжқҘдҝ®еӨҚжү§иЎҢи®ЎеҲ’пјҢжҲ–иҖ…дҪ йҒҮеҲ°дәҶжҹҗдёӘ**ANSI**зҡ„й”ҷиҜҜжҲ–йҷҗеҲ¶пјҲиҜ·еҸӮйҳ…вҖң**ANSI**зҡ„йҷҗеҲ¶вҖқдёҖиҠӮпјүпјҢе°ұеҸҜиғҪеҸ‘з”ҹиҝҷз§Қжғ…еҶөгҖӮ


    жӣҙд»ӨдәәжғҠи®¶зҡ„жҳҜпјҢ**Oracle**з”ҡиҮіе…Ғи®ёдҪ еңЁеҚ•дёӘ `from` еӯҗеҸҘдёӯж··еҗҲдҪҝз”Ё**ANSI**е’ҢеҺҹз”ҹиҜӯжі•гҖӮд»ҘдёӢзӨәдҫӢе°Ҷжј”зӨәдёҖдәӣзіҹзі•зҡ„е®һи·өгҖӮжҲ‘и®Өдёәд»»дҪ•дәәйғҪдёҚеә”иҜҘиҝҷж ·дҪҝз”ЁпјҢдҪҶйҮҚиҰҒзҡ„жҳҜпјҢеҰӮжһңдҪ йҒҮеҲ°иҝҷж ·зҡ„жҹҘиҜўпјҢиҰҒзҗҶи§ЈеҸ‘з”ҹдәҶд»Җд№ҲгҖӮ


    еӣ жӯӨпјҢеҰӮжһңдҪ жҢҮе®ҡдәҶ**ANSI**зҡ„ `inner join` е№¶еңЁиҝһжҺҘжқЎд»¶дёӯж·»еҠ дәҶ `(+)` иҝҗз®—з¬ҰпјҢйӮЈд№Ҳе®һйҷ…дёҠ**Oracle**дјҡе°Ҷе…¶дҪңдёәеӨ–иҝһжҺҘжү§иЎҢгҖӮ


    ```

    select * from t1 join t2 on t1.id = t2.id(+)

    select "T1"."ID"   "ID",

    "T1"."NAME" "NAME",

    "T2"."ID"   "ID",

    "T2"."NAME" "NAME"

    from "T1" "T1", "T2" "T2"

    where "T1"."ID" = "T2"."ID"(+)

