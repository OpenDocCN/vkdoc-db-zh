    ## 1. дҪ дёҚиғҪдҫқиө–еӨҚеҗҲжқЎд»¶дёӯи°“иҜҚзҡ„жұӮеҖјйЎәеәҸ


    дҫӢеҰӮпјҢеңЁдёӢйқўзҡ„дёӨдёӘжҹҘиҜўдёӯпјҢи°“иҜҚжҢүз…§жҢҮе®ҡзҡ„йЎәеәҸжұӮеҖјпјҢеӣ жӯӨз¬¬дёҖдёӘжҹҘиҜўеӨұиҙҘпјҢз¬¬дәҢдёӘжҹҘиҜўжҲҗеҠҹжү§иЎҢгҖӮз»ҷе®ҡ `id < 3` еҜ№дәҺз¬¬дёүиЎҢдёә falseпјҢOracle жІЎжңүжұӮеҖјз¬¬дәҢдёӘжқЎд»¶гҖӮ


    ```

    select id, case when 1 / (id - 3) < 0 and id < 3 then 1 end x

    from (select rownum id from dual connect by level <= 3);

    ERROR:

    ORA-01476: divisor is equal to zero

    select id, case when id < 3 and 1 / (id - 3) < 0 then 1 end x

    from (select rownum id from dual connect by level <= 3);

    ID          X

    ---------- ----------

    1          1

    2          1

    ```


    е…ій”®зӮ№жҳҜпјҢдёҚдҝқиҜҒжңүиҝҷз§ҚжұӮеҖјйЎәеәҸгҖӮдҫӢеҰӮпјҢдёӢйқўзҡ„дёӨдёӘжҹҘиҜўйғҪдјҡеӨұиҙҘпјҢж— и®әи°“иҜҚеҰӮдҪ•жҢҮе®ҡгҖӮ


    ```

    create table t03 as

    select ''A'' id from dual union all select ''123'' from dual;

