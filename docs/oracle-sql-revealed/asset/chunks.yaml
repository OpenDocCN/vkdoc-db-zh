    жё…еҚ• 1-18

    Oracle еҺҹз”ҹиҜӯжі•дёӯзҡ„иҝһжҺҘеүҚи°“иҜҚе’ҢиҝһжҺҘеҗҺи°“иҜҚ

    ```


    жё…еҚ• 1-18 дёӯзҡ„иЎЁиҫҫејҸ вҖң`t1.id = t2.id(+)`вҖқ жҳҜиҝһжҺҘеүҚи°“иҜҚпјҢиҖҢ вҖң`t2.id is null`вҖқ жҳҜиҝһжҺҘеҗҺи°“иҜҚгҖӮиЎЁ `t1` дёӯ
    `id = 1` зҡ„иЎҢеңЁиҝһжҺҘжқЎд»¶ вҖң`t1.id = t2.id(+)`вҖқ дёӢпјҢжІЎжңүжқҘиҮӘиЎЁ `t2` зҡ„еҢ№й…ҚиЎҢпјҢеӣ жӯӨдёәжқҘиҮӘ `t2` зҡ„еҲ—еЎ«е……дәҶ `NULL`
    еҖјпјҢд№ӢеҗҺеә”з”ЁдәҶ вҖң`t2.id is null`вҖқ зҡ„иҝҮж»ӨгҖӮ


    йңҖиҰҒйҮҚзӮ№жҸҗеҸҠзҡ„жҳҜпјҢеҜ№еҶ…иЎЁзҡ„иҝҮж»Өи°“иҜҚеҸҜиғҪдјҡпјҲе°ҶдјҡпјүеңЁиҝһжҺҘд№ӢеүҚеә”з”ЁпјҢдҪҶиҝҷе№¶дёҚиҝқеҸҚиҝһжҺҘеүҚи°“иҜҚе’ҢиҝһжҺҘеҗҺи°“иҜҚзҡ„е®ҡд№үгҖӮиҝҷжҳҜдјҳеҢ–зҡ„дёҖйғЁеҲҶпјҢдҪ еҸҜд»ҘеңЁз¬¬ 2 з« вҖңжҹҘиҜўиҪ¬жҚўвҖқзҡ„жң«е°ҫжүҫеҲ°жӣҙеӨҡз»ҶиҠӮпјҢе…¶дёӯжҸҗеҲ°дәҶвҖңйҖүжӢ©вҖқж“ҚдҪңгҖӮ


