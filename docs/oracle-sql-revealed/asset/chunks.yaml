  raw: '## Iterative-Like Computations


    Oracle provides at least two ways to perform iterative-like computations in SQL
    on top of recordset: iterative model and recursive subquery factoring . The source
    data for an iterative model is a single recordset and you cannot use any additional
    data structures like list or stack; and, secondly, there may be only one loop
    counter (for academic interest implementation of bubble sort using iterative model
    was shown in Chapter [10](#A455196_1_En_10_Chapter.html), вҖқTuring CompletenessвҖқ).
    The specifics of recursive subquery factoring are that on each iteration you can
    use data only from the previous iteration even though the result set contains
    data from all the iterations. Briefly speaking, the field of application for these
    features is quite limited, not to mention issues with scalability and intensive
    memory and CPU usage.


    You can find in the next chapter some solutions with iterative models or recursive
    subquery factoring and their comparison with PL/SQL approaches. In this chapter,
    however, we will consider a couple of tasks that can be solved in pure SQL without
    those advanced features and their alternatives in PL/SQL.


    ### When There Is No Effective Built-In Access Method


    LetвҖҷs assume the goal is to return distinct values for a not nullable column with
    low cardinality.


    ```

    create table t_str(str varchar2(30) not null, padding varchar2(240));

    insert into t_str

    select ''AAA'', lpad(''x'', 240, ''x'') from dual

    union all

    select ''BBB'', lpad(''x'', 240, ''x'') from dual

    union all

    select lpad(''C'', 30, ''C''), lpad(''x'', 240, ''x'') from dual

    connect by rownum <= 3e6

    union all

    select ''DDD'', lpad(''x'', 240, ''x'') from dual;

    create index t_str_idx on t_str(str);

    exec dbms_stats.gather_table_stats(user,''t_str'');

    ```


    Of course, a trivial solution is using a distinct keyword.


    ```

    select distinct str from t_str;

    STR


    BBB

    AAA

    CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC

    DDD


    | Id | Operation              | Name      | Starts | E-Rows  | A-Rows  |   A-Time    |
    Buffers |


    |  0 | SELECT STATEMENT       |           |      1 |         |      4  | 00:00:01.04
    |   17662 |

    |  1 |  HASH UNIQUE           |           |      1 |      4  |      4  | 00:00:01.04
    |   17662 |

    |  2 |   INDEX FAST FULL SCAN | T_STR_IDX |      1 |   3000K |   3000K | 00:00:00.53
    |   17662 |


    ```


    Execution time is more than 1 second and it required almost 18k logical reads.


    Listing [11-12](#A455196_1_En_11_Chapter.html#Par94) shows how recursive subquery
    factoring can be used for getting a list of distinct values for a column.


    ```

    with rec(lvl, str) as

    (

    select 1, min(str) from t_str

    union all

    select lvl + 1, (select min(str) from t_str where str > rec.str)

    from rec

    where str is not null

    )

    select * from rec where str is not null;


    | Id | Operation                                  | Name      | Starts | E-Rows
    | A-Rows |   A-Time    | Buffers |


    |  0 | SELECT STATEMENT                           |           |      1 |        |      4
    | 00:00:00.01 |      13 |

    |* 1 |  VIEW                                      |           |      1 |      2
    |      4 | 00:00:00.01 |      13 |

    |  2 |   UNION ALL (RECURSIVE WITH) BREADTH FIRST |           |      1 |        |      5
    | 00:00:00.01 |      13 |

    |  3 |    SORT AGGREGATE                          |           |      1 |      1
    |      1 | 00:00:00.01 |       3 |

    |  4 |     INDEX FULL SCAN (MIN/MAX)              | T_STR_IDX |      1 |      1
    |      1 | 00:00:00.01 |       3 |

    |  5 |    SORT AGGREGATE                          |           |      4 |      1
    |      4 | 00:00:00.01 |      10 |

    |  6 |     FIRST ROW                              |           |      4 |      1
    |      3 | 00:00:00.01 |      10 |

    |* 7 |      INDEX RANGE SCAN (MIN/MAX)            | T_STR_IDX |      4 |      1
    |      3 | 00:00:00.01 |      10 |

    |  8 |    RECURSIVE WITH PUMP                     |           |      5 |        |      4
    | 00:00:00.01 |       0 |


    Listing 11-12

    Using recursive subquery factoring to get distinct values for a column

    ```


    The execution time dropped more than 100 times and the number for logical reads
    reduced more than 1000 times. This was achieved by performing a few вҖң`INDEX RANGE
    SCAN (MIN/MAX)`вҖқ operations instead of вҖң`INDEX FAST FULL SCAN`вҖқ.


    Listing [11-13](#A455196_1_En_11_Chapter.html#Par97) shows how similar logic can
    be implemented using PL/SQL function for old Oracle versions.


    ```

    create or replace function f_str return strings

    pipelined is

    l_min t_str.str%type;

    begin

    select min(str) into l_min from t_str;

    pipe row(l_min);

    while true loop

    select min(str) into l_min from t_str where str > l_min;

    if l_min is not null then

    pipe row(l_min);

    else

    return;

    end if;

    end loop;

    end f_str;

    /

    Listing 11-13

    PL/SQL function to get distinct values for a column

    ```


    LetвҖҷs analyze performance using a dbms_hprof package:


    ```

    exec dbms_hprof.start_profiling(''UDUMP'', ''1.trc'');

    PL/SQL procedure successfully completed.

    select column_value str from table(f_str);

    STR


    AAA

    BBB

    CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC

    DDD

    exec dbms_hprof.stop_profiling;

    PL/SQL procedure successfully completed.

    select dbms_hprof.analyze(''UDUMP'', ''1.trc'') runid from dual;

    RUNID


    ```


    Listing [11-13](#A455196_1_En_11_Chapter.html#Par97) shows profiling results.
    As you see, the query on the 5th line was executed once and the query from the
    8th line was executed 4 times, and the total elapsed time is 931 microseconds
    or approximately 0.01 second, which is very close to the approach with recursive
    subquery factoring.


    ```

    select pci.runid,

    level depth,

    rpad('' '', (level - 1) * 3, '' '') || fi.function as name,

    fi.subtree_elapsed_time,

    fi.function_elapsed_time,

    fi.calls

    from (select runid, parentsymid, childsymid

    from dbmshp_parent_child_info

    union all

    select runid, null, 2 from dbmshp_runs) pci

    join dbmshp_function_info fi

    on pci.runid = fi.runid

    and pci.childsymid = fi.symbolid

    and fi.function  ''STOP_PROFILING''

    connect by prior childsymid = parentsymid

    and prior pci.runid = pci.runid

    start with pci.parentsymid is null

    and pci.runid in (4);

    RUNID  DEPTH NAME                        SUBTREE_ELAPSED_TIME FUNCTION_ELAPSED_TIME
    CALLS

    ----- ------ --------------------------- -------------------- ---------------------
    -----

    4      1 __plsql_vm                                   931                    16     3

    4      2   __anonymous_block                           77                    77     1

    4      2   F_STR                                      838                   110     2

    4      3     __static_sql_exec_line5                  198                   198     1

    4      3     __static_sql_exec_line8                  530                   530     4

    Listing 11-14

    Execution statistics using dbms_hprof

    ```


    Additional statistics for SQL statements can be found in v$sql as was shown in
    a previous example.'
  trans: "\n## иҝӯд»ЈејҸи®Ўз®—\n\nOracle иҮіе°‘жҸҗдҫӣдәҶдёӨз§ҚеңЁ SQL дёӯеҹәдәҺи®°еҪ•йӣҶжү§иЎҢиҝӯд»ЈејҸи®Ўз®—зҡ„ж–№жі•пјҡиҝӯд»ЈжЁЎеһӢе’ҢйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–гҖӮиҝӯд»ЈжЁЎеһӢзҡ„жәҗж•°жҚ®жҳҜеҚ•дёӘи®°еҪ•йӣҶпјҢжӮЁдёҚиғҪдҪҝз”Ёд»»дҪ•йўқеӨ–зҡ„ж•°жҚ®з»“жһ„пјҲеҰӮеҲ—иЎЁжҲ–ж Ҳпјүпјӣе…¶ж¬ЎпјҢеҸҜиғҪеҸӘиғҪжңүдёҖдёӘеҫӘзҺҜи®Ўж•°еҷЁпјҲеҮәдәҺеӯҰжңҜе…ҙи¶ЈпјҢз¬¬\
    \ 10 з« вҖңеӣҫзҒөе®ҢеӨҮжҖ§вҖқдёӯеұ•зӨәдәҶдҪҝз”Ёиҝӯд»ЈжЁЎеһӢе®һзҺ°зҡ„еҶ’жіЎжҺ’еәҸпјүгҖӮйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–зҡ„зү№зӮ№жҳҜпјҢеңЁжҜҸж¬Ўиҝӯд»ЈдёӯпјҢжӮЁеҸӘиғҪдҪҝз”ЁеүҚдёҖж¬Ўиҝӯд»Јзҡ„ж•°жҚ®пјҢеҚідҪҝз»“жһңйӣҶеҢ…еҗ«жүҖжңүиҝӯд»Јзҡ„ж•°жҚ®гҖӮз®ҖиҖҢиЁҖд№ӢпјҢиҝҷдәӣеҠҹиғҪзҡ„еә”з”ЁиҢғеӣҙзӣёеҪ“жңүйҷҗпјҢжӣҙдёҚз”ЁиҜҙеҸҜжү©еұ•жҖ§й—®йўҳд»ҘеҸҠеҜ№еҶ…еӯҳе’Ң\
    \ CPU зҡ„еҜҶйӣҶдҪҝз”ЁдәҶгҖӮ\n\nжӮЁеҸҜд»ҘеңЁдёӢдёҖз« жүҫеҲ°дёҖдәӣдҪҝз”Ёиҝӯд»ЈжЁЎеһӢжҲ–йҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–зҡ„и§ЈеҶіж–№жЎҲпјҢд»ҘеҸҠе®ғд»¬дёҺ PL/SQL ж–№жі•зҡ„жҜ”иҫғгҖӮз„¶иҖҢпјҢеңЁжң¬з« дёӯпјҢжҲ‘д»¬е°ҶиҖғиҷ‘еҮ дёӘеҸҜд»ҘдҪҝз”ЁзәҜ\
    \ SQL и§ЈеҶізҡ„д»»еҠЎпјҢж— йңҖз”ЁеҲ°иҝҷдәӣй«ҳзә§еҠҹиғҪеҸҠе…¶еңЁ PL/SQL дёӯзҡ„жӣҝд»Јж–№жЎҲгҖӮ\n\n### еҪ“жІЎжңүжңүж•Ҳзҡ„еҶ…зҪ®и®ҝй—®ж–№жі•ж—¶\n\nеҒҮи®ҫзӣ®ж ҮжҳҜиҝ”еӣһдёҖдёӘйқһз©әгҖҒдҪҺеҹәж•°еҲ—зҡ„дёҚеҗҢеҖјгҖӮ\n\
    \n```sql\ncreate table t_str(str varchar2(30) not null, padding varchar2(240));\n\
