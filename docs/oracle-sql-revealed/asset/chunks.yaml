    \ but in this case query also fails with ORA-01719.\n\n```\n    select *\n   \
    \ from t1, t2\n    where t1.id = t2.id(+)\n    or t1.id = nvl2(t2.id(+), 1, 1);\n\
    \    Listing 1-34\n    Disjunction, pre-join predicates, native syntax\n    ```\n\
    \nFinally, if we use case-expression, it helps to specify the inseparability of\
