    If we change a pattern so only complete V-shapes (with ascending and descending
    branches) are matched - `strt down+ up+,` then some rows will not be part of any
    matched pattern. If want to see them as part of the result, then we can specify
    either alternative in the pattern: `strt down+ up+|dummy+?` or use an option `with
    unmatched rows`, that is, `all rows per match with unmatched` `rows` .


    ```

    select *

    from atm

    match_recognize

    ( order by ts

    measures

    strt.amount start_amount,

    final last(up.amount) end_amount,

    running count(*) as cnt,

    match_number() as match,

    classifier() as cls

    all rows per match

    after match skip past last row

    pattern (strt down+ up+|dummy+?)

    define

    down as down.amount  prev(up.amount)

    ) mr

    order by ts;

