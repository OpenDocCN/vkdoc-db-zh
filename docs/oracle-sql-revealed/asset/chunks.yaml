- fmt: '# Part I

    ## Features and Theory


    Chapters [1](#A455196_1_En_1_Chapter.html)-[10](#A455196_1_En_10_Chapter.html)
    are organized to follow the list below of Oracle SQL features:


    1.  All joins can be implicitly specified in the query; however sometimes it makes
    sense to use subqueries, for example, for a more efficient way to implement an
    `ANTI`/`EQUI` join. Correlated scalar subqueries may be more efficient than outer
    joins because of scalar subquery caching.

    2.  Query transformations make it possible for two queries with quite different
    text to have the same plan and performance. On the other hand, query transformations
    are not a universal panacea and sometimes manual query refactoring is required
    to achieve the best performance.

    3.  Analytic functions are an invaluable feature that helps to implement tricky
    logic without joins. On the other hand, they almost always require a sort, which
    may be an issue on big data volumes.

    4.  Aggregate functions allow us to group data and calculate aggregate values
    as well as implement some complex flattening or pivoting logic.

    5.  `Connect by` is the best tool to traverse hierarchies or generate lists; however
    it should not be used to traverse graphs despite built-in capabilities to handle
    cycles if performance is critical.

    6.  Recursive subquery factoring extends capabilities of traversing hierarchies
    in a way that you can refer values calculated on a previous level. When recursive
    subquery factoring is used for iterative transformations of a dataset you should
    take into account that a new recordset is generated on each iteration, which leads
    to intensive memory consumption. A functional advantage in comparison to a `model`
    clause is that you can calculate multiple measures on each step. In case of a
    `model` clause, the first measure is evaluated for all specified rows, then the
    second one, one and so on.

    7.  `Model` is the most powerful SQL feature but itвҖҷs shining in quite specific
    cases. `Model` may require intensive CPU and memory consumption and does not scale
    well enough for millions of rows; however performance can be dramatically improved
    in case of parallel execution of partitioned models.

    8.  Row pattern matching adds noticeable flexibility for analysis of recordsets.
    This feature is the only way to solve a wide range of tasks in pure SQL in a scalable
    and efficient manner, and in addition it demonstrates a bit better performance
    for those tasks that can also be solved using analytic functions.

    9.  One query block may contain various clauses including joins, aggregate and
    analytic, or even mixes of advanced features like `model` clause and pattern matching.
    ItвҖҷs important to understand how this will be executed from a logical point of
    view and what are the pros and cons of using inline views.

    10. It was proven that SQL is Turing complete language and for academic purposes
    it was shown how to implement arbitrary algorithms using an iterative model. SQL
    is a declarative language though and was designed to manipulate data and not for
    iterative computations.


    Tom Kyte wrote many times over the years, вҖңYou should do it in a single SQL statement
    if at all possible.вҖқ IвҖҷd like to elaborate on this statement a little bit. Even
    if we remove from consideration advanced features like recursive subquery factoring,
    `model` clause, row pattern matching, and `connect by`, there are some tasks that
    can be solved more efficiently using PL/SQL. Various examples will be considered
    in Chapter [11](#A455196_1_En_11_Chapter.html) to provide more background.


    ## 1. Joins


    Most real-life queries combine data from multiple tables instead of querying a
    single table. Logic may be encapsulated in a view to hide complexity from the
    end user, but the database accesses multiple tables anyway to get the result set.
    ItвҖҷs not necessary that data from all tables in a query appear in the result;
    some tables may be used to filter out data from other tables, for example.


    Data from two tables may be combined using `join` (a `join` keyword is not mandatory
    as it will be shown later), subquery (may be correlated or not), lateral view
    (starting with `Oracle 12c`), or set operators (`union`/`union all`/`intersect`/`minus`).


    Any logic implemented using set operators or subqueries may be rewritten with
    joins, but this may not be always optimal from a performance point of view. Moreover,
    semantically equivalent queries may be rewritten into the same query after query
    transformations are applied (see details in Chapter [2](#A455196_1_En_2_Chapter.html),
    вҖңQuery TransformationsвҖқ) or may have the same execution plan even if they have
    not been rewritten into the same query. Lateral views can be imitated using a
    table operator on older versions.


    Looking forward, let me mention that some queries that use only one table may
    be not very easy to understand and may contain quite complex logic, but that is
    a rare case (a lot of such queries you can find in Part II).


    This chapter covers joins (both ANSI and traditional Oracle outer joins syntax)
    along with some details about subqueries, lateral views, and join methods.'
