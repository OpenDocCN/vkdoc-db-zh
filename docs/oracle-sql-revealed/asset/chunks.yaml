- fmt: "### Problems of a Combinatorial Nature\n\nCombinatorial problems related to\
    \ data may require generating permutations to analyze combinations of elements.\
    \ SQL provides various ways to generate recordsets вҖ“ `connect by`, `recursive\
    \ subquery factoring`, and a `model` clause; but if you want to refer or reuse\
    \ during the generation process the data generated so far, then this may be either\
    \ tricky or inefficient.\n\nLetвҖҷs consider a specific example: for a set or rows,\
    \ generate sums of values for all possible subsets with two or more elements.\
    \ Listing [11-15](#A455196_1_En_11_Chapter.html#Par105) shows the script to generate\
    \ a recordset of values such as each value is greater than the sum of all values\
    \ generated so far; thus the sum of values for each subset is unique.\n\n```\n\
    exec dbms_random.seed(3);\ncreate table t_num as\nselect id, num\nfrom dual\n\
    model\ndimension by (1 id)\nmeasures (1 num)\n(\nnum[for id from 2 to 19 increment\
    \ 1] order by id =\nsum(num)[any] + trunc(dbms_random.value(1, 11))\n);\nListing\
    \ 11-15\nCreating input set\n```\n\nAll permutations and sums for the first three\
    \ elements are below :\n\n```\nselect * from t_num where id <= 3;\nID        NUM\n\
    ---------- ----------\n1          1\n2          8\n3         15\n1 + 8 = 9\n1\
    \ + 15 = 16\n8 + 15 = 23\n1 + 8 + 15 = 24\n```\n\nFor measuring performance we\
    \ will calculate the total sum to minimize fetch, but the main goal is to generate\
    \ all the subsets and calculate sums. The number of all subsets for n elements\
    \ is `2^n` including empty subset, singletons, and original set. The total sum\
    \ without singletons equals to ![ $$ \\frac{2^n}{2}\\sum \\limits_{i=1}^n{x}_i-\\\
    sum \\limits_{i=1}^n{x}_i=\\left({2}^{n-1}-1\\right)\\sum \\limits_{i=1}^n{x}_i\
    \ $$ ](A455196_1_En_11_Chapter_IEq1.gif) or 72 for three rows and 536338548711\
    \ for all rows.\n\n```\nselect sum(num) * (power(2, count(*) - 1) - 1) total from\
    \ t_num;\nTOTAL\n----------\n```\n\nThere are at least two straightforward ways\
    \ to generate all permutations with `connect by` and calculate their sums as demonstrated\
    \ in Listing [11-16](#A455196_1_En_11_Chapter.html#Par111).\n\n```\nwith\nt1 as\n\
    (select power(2, rownum-1) row_mask, num from t_num),\nt2 as\n(select rownum as\
    \ total_mask\nfrom (select count(*) as cnt from t1)\nconnect by rownum < power(2,\
    \ cnt)\n)\nselect count(*) cnt, sum(num) sum_num\nfrom (select total_mask as id,\
    \ sum(num) as num\nfrom t2, t1\nwhere bitand(row_mask, total_mask) != 0\ngroup\
    \ by total_mask\nhaving count(*) > 1);\nCNT       SUM_NUM\n---------- -------------\n\
    524268  536338548711\nListing 11-16\nConnect by + join to get sums of all subsets\n\
    ```\n\nWith execution time around 25 seconds, most of the time was spent on doing\
    \ nested loops and re-evaluating subquery `t1` 524268 times. This can be optimized\
    \ if we specify the hint `materialized` in `t1`; after that the execution time\
    \ drops to 14 seconds.\n\n```\n---------------------------------------------------------------------------------------------------------------\n\
    | Id  | Operation                           | Name  | Starts  | E-Rows | A-Rows\
    \  |    A-Time   | Buffers  |\n---------------------------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                    |       |      1  |        |     \
    \ 1  | 00:00:25.81 |    1572K |\n|   1 |  SORT AGGREGATE                     \
    \ |       |      1  |      1 |      1  | 00:00:25.81 |    1572K |\n|   2 |   VIEW\
    \                              |       |      1  |      1 |    524K | 00:00:25.70\
    \ |    1572K |\n|*  3 |    FILTER                           |       |      1 \
    \ |        |    524K | 00:00:25.54 |    1572K |\n|   4 |     HASH GROUP BY   \
    \                |       |      1  |      1 |    524K | 00:00:25.36 |    1572K\
    \ |\n|   5 |      NESTED LOOPS                   |       |      1  |      1 |\
    \   4980K | 00:00:22.24 |    1572K |\n|   6 |       VIEW                     \
    \     |       |      1  |      1 |    524K | 00:00:01.39 |       3  |\n|   7 |\
    \        COUNT                        |       |      1  |        |    524K | 00:00:01.17\
    \ |       3  |\n|   8 |         CONNECT BY WITHOUT FILTERING|       |      1 \
    \ |        |    524K | 00:00:00.98 |       3  |\n|   9 |          VIEW       \
    \                |       |      1  |      1 |      1  | 00:00:00.01 |       3\
    \  |\n|  10 |           SORT AGGREGATE            |       |      1  |      1 |\
    \      1  | 00:00:00.01 |       3  |\n|  11 |            VIEW                \
    \     |       |      1  |     19 |     19  | 00:00:00.01 |       3  |\n|  12 |\
    \             COUNT                   |       |      1  |        |     19  | 00:00:00.01\
    \ |       3  |\n|  13 |              TABLE ACCESS FULL      | T_NUM |      1 \
    \ |     19 |     19  | 00:00:00.01 |       3  |\n|* 14 |       VIEW          \
