    **Listing 1-20 еӨ–иҝһжҺҘдёҺ `(+)` зҡ„еӯҳеңЁжҖ§**


    з¬¬дёҖдёӘжҹҘиҜўжІЎжңүиҝ”еӣһиЎҢпјҢеӣ дёәжІЎжңүжҢҮе®ҡиЎЁд№Ӣй—ҙжҳҜеӨ–иҝһжҺҘгҖӮз„¶иҖҢпјҢеңЁз¬¬дәҢдёӘжҹҘиҜўдёӯпјҢйҖҡиҝҮдҪҝз”ЁдёҖдёӘжҖ»жҳҜжұӮеҖјдёә `TRUE` зҡ„и°“иҜҚпјҢжҳҺзЎ®жҢҮе®ҡдәҶ `t1` жҳҜе·ҰеӨ–иҝһжҺҘиЎЁгҖӮ


    еҰӮжһңиЎЁдёӯзҡ„жҹҗдәӣеҲ—иў«ж Үи®°дәҶ `(+)` иҖҢе…¶д»–еҲ—жІЎжңүпјҢйӮЈд№Ҳ Oracle еҸҜиғҪдјҡеә”з”ЁиҪ¬жҚў вҖңеӨ–иҝһжҺҘиҪ¬еҶ…иҝһжҺҘиҪ¬жҚўвҖқпјҲе…ідәҺжҹҘиҜўиҪ¬жҚўзҡ„жӣҙеӨҡз»ҶиҠӮе°ҶеңЁдёӢдёҖз« дёӯжүҫеҲ°пјүгҖӮ


    ```sql

    select * from t1 left join t2 on t1.id = t2.id where t1.name = t2.name;

    select * from t1, t2 where t1.id = t2.id(+) and t1.name = t2.name;

    ```


    **Listing 1-21 иҪ¬жҚўдёәеҶ…иҝһжҺҘзҡ„еӨ–иҝһжҺҘ**


    еңЁиҝҷз§Қжғ…еҶөдёӢдҪҝз”ЁеӨ–иҝһжҺҘиҜӯжі•пјҲж— и®әжҳҜ ANSI иҝҳжҳҜ Oracle еҺҹз”ҹиҜӯжі•пјүжҳҜжІЎжңүж„Ҹд№үзҡ„пјҢиҖҢдё”еҸҜиғҪйқһеёёиҜҜеҜјдәәпјҢеӣ жӯӨеә”е§Ӣз»ҲйҒҝе…ҚгҖӮ


    жңүж—¶пјҢдҪҝз”Ё Oracle еҺҹз”ҹиҜӯжі•жҢҮе®ҡи°“иҜҚжҳҜйў„иҝһжҺҘзҡ„еҸҜиғҪжңүзӮ№жҢ‘жҲҳгҖӮеҰӮжһңйў„иҝһжҺҘи°“иҜҚеҢ…еҗ«дёӨдёӘиЎЁжҲ–еӨ–иҝһжҺҘиЎЁпјҢйӮЈд№ҲеҫҲе®№жҳ“жҢҮе®ҡе®ғпјҢеҰӮ `Listing 1-19` дёӯзҡ„з¬¬еӣӣдёӘжғ…еҶөжүҖзӨәгҖӮз„¶иҖҢпјҢеҰӮжһңйў„иҝһжҺҘи°“иҜҚеҸӘеҢ…еҗ«еҶ…иЎЁпјҢйӮЈд№ҲжҲ‘д»¬йңҖиҰҒдҪҝз”ЁеӨ–иҝһжҺҘиЎЁзҡ„дёҖеҲ—жқҘе®ҡд№үи°“иҜҚзҡ„йў„иҝһжҺҘжҖ§иҙЁгҖӮ


    ```sql

    select *

    from t3

    left join t1

    on t3.id = t1.id

    and t3.sign = 1

