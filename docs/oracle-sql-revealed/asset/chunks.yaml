- fmt: 'Inline view can be used as a workaround (please see transformed query for
    Oracle 11g in Listing [1-40](#A455196_1_En_1_Chapter.html#Par115)). The ANSI syntax
    may look as follows.


    ```

    select *

    from t1

    join t2

    on t1.id = t2.id

    left join t t3

    on t1.id = t3.id

    and t2.name = t3.name;

    ID N         ID N         ID N DUMMY

    ---------- - ---------- - ---------- - -----

    0 X          0 X

    Listing 1-39

    Table outer joined with two tables. ANSI syntax

    ```


    If we check the transformed query for ANSI syntax, then Oracle 11g will create
    an additional inline view (not lateral) with joined `t1` and `t2` while the query
    for Oracle 12c will be as the query above in native syntax. Transformed queries
    are shown below (details regarding how to see transformed queries will be provided
    in the next chapter вҖ“ вҖңQuery TransformationsвҖқ).


    ```

    11g

    select "from$_subquery$_003"."ID"   "ID",

    "from$_subquery$_003"."NAME" "NAME",

    "from$_subquery$_003"."ID"   "ID",

    "from$_subquery$_003"."NAME" "NAME",

    "T3"."ID"                    "ID",

    "T3"."NAME"                  "NAME",

    "T3"."DUMMY"                 "DUMMY"

    from (select "T1"."ID"   "ID",

    "T1"."NAME" "NAME",

    "T2"."ID"   "ID",

    "T2"."NAME" "NAME"

    from "T1" "T1", "T2" "T2"

    where "T1"."ID" = "T2"."ID") "from$_subquery$_003",

    "T" "T3"

    where "from$_subquery$_003"."NAME" = "T3"."NAME"(+)

    and "from$_subquery$_003"."ID" = "T3"."ID"(+)

    12c

    select "T1"."ID"    "ID",

    "T1"."NAME"  "NAME",

    "T2"."ID"    "ID",

    "T2"."NAME"  "NAME",

    "T3"."ID"    "ID",

    "T3"."NAME"  "NAME",

    "T3"."DUMMY" "DUMMY"

    from "T1" "T1", "T2" "T2", "T" "T3"

    where "T1"."ID" = "T3"."ID"(+)

    and "T2"."NAME" = "T3"."NAME"(+)

    and "T1"."ID" = "T2"."ID"

    Listing 1-40

    Transformed queries for join with two tables

    ```


    The last detailed example in this section is rather specific of native joins than
    limitation. If a table joined to one other table as inner and to another one as
    outer, then it may be not obvious how to specify the predicate that contains only
    a column from that table. So in the example below, table `t2` joined with `t1`
    as the outer table and with `t3` as the inner table and the question is this:
    how to specify predicate вҖң`tt2.name is not null`вҖқ in native syntax.


    ```

    create table tt1 as select ''name'' || rownum name from dual connect by level
    <= 3;

    create table tt2 as select ''x_name'' || rownum name from dual connect by level
    <= 2;

    create table tt3 as select ''y_x_name'' || rownum name from dual;

    select tt1.name, tt2.name, tt3.name

    from tt1

    left join tt2

    on tt2.name like ''%'' || tt1.name || ''%''

    left join tt3

    on tt3.name like ''%'' || tt2.name || ''%''

    and tt2.name is not null;

    NAME       NAME       NAME

    ---------- ---------- ----------

    name1      x_name1    y_x_name1

    name2      x_name2

    name3

    Listing 1-41

    Inner/outer joined table

    ```


    If we try to use native syntax, then we are getting wrong results regardless of
    whether we use `(+)` or not for вҖң`tt2.name is not null`вҖқ.


    ```

    select tt1.name, tt2.name, tt3.name

    from tt1, tt2, tt3

    where tt2.name(+) like ''%'' || tt1.name || ''%''

    and tt3.name(+) like ''%'' || tt2.name || ''%''

    and tt2.name is not null;

    NAME       NAME       NAME

    ---------- ---------- ----------

    name1      x_name1    y_x_name1

    name2      x_name2

    select tt1.name, tt2.name, tt3.name

    from tt1, tt2, tt3

    where tt2.name(+) like ''%'' || tt1.name || ''%''

    and tt3.name(+) like ''%'' || tt2.name || ''%''

    and tt2.name(+) is not null;

    NAME       NAME       NAME

    ---------- ---------- ----------

    name1      x_name1    y_x_name1

    name2      x_name2

    name3                 y_x_name1

    Listing 1-42

    Inner/outer joined table and native syntax

    ```


    To explicitly specify that that condition is a pre-join predicate for `t2` and
    `t3` we can use the approach described in the section вҖңOracle-Specific Syntax.вҖқ


    ```

    nvl2(tt2.name, 0, null) = nvl2(tt3.rowid(+), 0, 0)

    ```


    So the predicate shows that `t3` is outer joined to `t2` and it evaluates to TRUE
    if вҖң`tt2.name`вҖң is not null.


    Taking into account specifics of the query, we can combine the predicates below


    ```

    and tt3.name(+) like ''%'' || tt2.name || ''%''

    and nvl2(tt2.name, 0, null) = nvl2(tt3.rowid(+), 0, 0)

    ```


    into one


    ```

    and tt3.name(+) like nvl2(tt2.name, ''%'' || tt2.name || ''%'', null)

    ```


    Another possible workaround for Oracle 12c is a `lateral view`; actually for this
    query Oracle creates a `lateral view` after transformation from ANSI syntax for
    all versions.'
