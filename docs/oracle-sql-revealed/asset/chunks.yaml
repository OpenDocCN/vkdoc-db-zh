    иҝҷйҮҢдҪҝз”ЁдәҶеҲҶжһҗеҮҪж•°жқҘжӣҝд»ЈиҒҡеҗҲеҮҪж•°пјҢе№¶еңЁиҝһжҺҘжқЎд»¶дёӯж·»еҠ дәҶвҖң`t.rn = 1`вҖқд»ҘйҒҝе…ҚйҮҚеӨҚпјҢеӣ дёәеҲҶжһҗеҮҪж•°зҡ„еҖјеҜ№жүҖжңүиЎҢйғҪжҳҜзӣёеҗҢзҡ„пјҢе®ғд»¬жІЎжңүиў«еҲҶз»„еҲ°жҜҸдёӘз»„дёҖиЎҢгҖӮ


    еҰӮжһңжҲ‘д»¬еҸӘеҜ№жҜҸдёҖеұӮзә§зҡ„иҒҡеҗҲз»“жһңж„ҹе…ҙи¶ЈпјҢйӮЈд№ҲеҸҜд»ҘдҪҝз”ЁеҰӮдёӢжҹҘиҜўе®һзҺ°пјҡ


    ```

    select sum_id, lvl, str from t where rn = 1;

    ```


    еңЁйҖ’еҪ’жҲҗе‘ҳдёӯдҪҝз”ЁеҲҶжһҗеҮҪж•°еңЁ Oracle 11.2.0.1 дёӯдјҡеҜјиҮҙВ«`ORA-32486: unsupported operation in recursive
    branch of recursive WITH clause`В»й”ҷиҜҜпјӣз„¶иҖҢпјҢжӯӨй—®йўҳе·ІеңЁ 11.2.0.3 дёӯдҝ®еӨҚгҖӮ


    ## жҖ»з»“


    вҖң`RECURSIVE WITH`вҖқеңЁж ҮеҮҶ SQL:1999 дёӯе®ҡд№үпјҢиҖҢвҖң`CONNECT BY`вҖқеӯҗеҸҘжҳҜ Oracle зү№жңүзҡ„еҠҹиғҪгҖӮе°Ҫз®ЎеҰӮжӯӨпјҢеңЁжүҖжңүеҸҜиғҪзҡ„жғ…еҶөдёӢпјҢдҪҝз”Ё
    `CONNECT BY` иҖҢйқһйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈжҳҜжңүж„Ҹд№үзҡ„пјҢеӣ дёәе®ғз»ҸиҝҮжӣҙеҘҪдјҳеҢ–дё”иҝҗиЎҢжӣҙеҝ«гҖӮеҰӮеүҚжүҖиҝ°пјҢеңЁ `CONNECT BY` жҹҘиҜўдёӯж— жі•еј•з”Ёи®Ўз®—еҮәзҡ„иЎЁиҫҫејҸпјҢиҖҢ
    `RECURSIVE WITH` жҸҗдҫӣдәҶиҝҷдёҖеҠҹиғҪгҖӮеӣ жӯӨпјҢеҰӮжһңеңЁйҒҚеҺҶеұӮж¬Ўз»“жһ„ж—¶йңҖиҰҒиҝӣиЎҢд»»дҪ•зұ»дјјзҙҜз§Ҝзҡ„и®Ўз®—пјҢйӮЈд№ҲйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈеҸҜиғҪжҳҜжңҖдҪійҖүжӢ©гҖӮ


    йҒҚеҺҶеұӮж¬Ўз»“жһ„е№¶дёҚжҳҜйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јзҡ„е”ҜдёҖеә”з”ЁгҖӮеҪ“йңҖиҰҒеҜ№и®°еҪ•йӣҶеӨҡж¬Ўеә”з”ЁзӣёеҗҢйҖ»иҫ‘ж—¶пјҢе®ғеҸҜд»Ҙз”ЁдәҺеҗ„з§Қд»»еҠЎгҖӮйңҖиҰҒејәи°ғзҡ„жҳҜпјҢжңҖз»Ҳз»“жһңеҢ…еҗ«жқҘиҮӘжүҖжңүиҝӯд»Јзҡ„и®°еҪ•йӣҶпјҢиҖҢеңЁеҪ“еүҚиҝӯд»ЈдёӯеҸӘиғҪи®ҝй—®еүҚдёҖж¬Ўиҝӯд»Јзҡ„иЎҢгҖӮиҝ”еӣһжүҖжңүиҝӯд»Ји®°еҪ•йӣҶзҡ„иҰҒжұӮеҸҜиғҪдјҡеҜјиҮҙе·ҘдҪңеҢәдҪҝз”ЁйҮҸжҝҖеўһе’Ңе…¶д»–ејҖй”ҖгҖӮеӣ жӯӨпјҢеҰӮжһңдҪ дёҚйңҖиҰҒжүҖжңүиҝӯд»Јзҡ„и®°еҪ•йӣҶиҖҢеҸӘйңҖиҰҒжңҖеҗҺдёҖж¬Ўиҝӯд»Јзҡ„пјҢйӮЈд№ҲдҪҝз”Ё
    PL/SQL еҫӘзҺҜе’ҢйӣҶеҗҲжҲ–дёҙж—¶иЎЁжҳҜжӣҙеҗҲзҗҶзҡ„гҖӮ


    еҚідҪҝйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Је’Ң `CONNECT BY` е…·жңүеӨ„зҗҶеҫӘзҺҜзҡ„еҶ…зҪ®еҠҹиғҪпјҢеңЁзҗҗзўҺзҡ„жғ…еҶөдёӢдҪҝз”Ёе®ғд»¬жүҚжңүж„Ҹд№үгҖӮеҜ№дәҺжӣҙеӨҚжқӮзҡ„жғ…еҶөпјҢиҝҮзЁӢеҢ–ж–№жі•жӣҙеҘҪгҖӮж— и®әеҰӮдҪ•пјҢ`CONNECT
    BY` е’ҢйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈеӨ„зҗҶеҫӘзҺҜзҡ„ж–№ејҸз•ҘжңүдёҚеҗҢпјҢеӣ жӯӨдәҶи§Јз»ҶиҠӮеҸҜиғҪеҫҲйҮҚиҰҒгҖӮ

