- fmt: "### Solution\n\nLetвҖҷs start with the case when the alphabet is hexadecimal.\
    \ In such a situation we can use the function `to_number()` with the corresponding\
    \ format model as shown in Listing [12-1](#A455196_1_En_12_Chapter.html#Par5).\n\
    \n```\nvar x varchar2(30)\nvar alphabet varchar2(30)\nexec :alphabet := '0123456789ABCDEF';\n\
    PL/SQL procedure successfully completed.\nexec :x := '1A0A';\nPL/SQL procedure\
    \ successfully completed.\nselect to_number(:x, 'XXXX') num from dual;\nNUM\n\
    ----------\nListing 12-1\nConverting hexadecimal value into decimal\n```\n\nListing\
    \ [12-2](#A455196_1_En_12_Chapter.html#Par7) shows the SQL approach to convert\
    \ a string from an arbitrary alphabet.\n\n```\nselect sum(power(base, level -\
    \ 1) *\n(instr(:alphabet, substr(:x, -level, 1)) - 1)) num\nfrom (select length(:alphabet)\
    \ base from dual)\nconnect by level <= length(:x);\nNUM\n----------\nListing 12-2\n\
    Converting string in arbitrary alphabet into decimal in SQL\n```\n\nSimilar logic\
    \ can be implemented in PL/SQL as shown in Listing [12-3](#A455196_1_En_12_Chapter.html#Par9).\n\
    \n```\ncreate or replace function f_10base(p_x        in varchar,\n          \
    \                          p_alphabet in varchar\n                           \
    \                    default '0123456789ABCDEF')\n  return number is\n  result\
    \ number := 0;\n  l_base int := length(p_alphabet);\nbegin\n  for i in 1 .. length(p_x)\
    \ loop\n    result := result + power(l_base, i - 1) *\n              (instr(p_alphabet,\
    \ substr(p_x, -i, 1)) - 1);\n  end loop;\n  return result;\nend f_10base;\nListing\
    \ 12-3\nConverting from arbitrary alphabet into decimal in PL/SQL\n```\n\nLetвҖҷs\
    \ compare the performance of the two approaches.\n\n```\nselect sum(f_10base('ABC'\
    \ || rownum)) f from dual connect by level <= 1e6;\nF\n----------\n4.1760E+16\n\
    Elapsed: 00:00:16.61\n\nselect sum(num) f\nfrom (select (select sum(power(base,\
    \ level - 1) *\n                        (instr(:alphabet, substr(x, -level, 1))\
    \ - 1)) num\n              from (select length(:alphabet) base from dual)\n  \
    \            connect by level <= length(x)) num\n      from (select 'ABC' || rownum\
    \ x from dual connect by level <= 1e6));\nF\n----------\n4.1760E+16\nElapsed:\
    \ 00:00:25.53\n```\n\nAs you see, the PL/SQL solution is faster; nevertheless\
    \ the context switches. You can use `dbms_hprof` and `dbms_xplan` with runtime\
    \ execution statistics to check in more detail where the time is spent for the\
    \ PL/SQL and SQL approach correspondingly.\n\nTo complete the picture letвҖҷs measure\
    \ timing for a built-in function.\n\n```\nselect sum(to_number('ABC' || rownum,\
    \ lpad('X', 10, 'X'))) f\nfrom dual\nconnect by level <= 1e6;\nF\n----------\n\
    4.1760E+16\nElapsed: 00:00:01.11\n```\n\nThe performance of an external C function\
    \ would be approximately the same as for a built-in function. This task demonstrates\
    \ that in some cases neither SQL nor PL/SQL is the best approach if performance\
    \ is critical.\n\n## Connected Components\n\nGraph theory is a huge subject with\
    \ a number of terms, list of typical tasks, and various ways of representing the\
    \ graphs. RDBMSs are not the best tool to work with generic graphs but SQL may\
    \ be very efficient in working with specific classes of graphs known as hierarchies.\n\
    \nIn real life you may face tasks with various types of graphs, and itвҖҷs quite\
    \ important to understand how this challenge can be approached, so this and the\
    \ next quiz are a quick touch on the subject.\n\nIn the current task letвҖҷs consider\
    \ an undirected graph that is represented as a list of edges and shown on Figure\
    \ [12-1](#A455196_1_En_12_Chapter.html#Fig1).\n\n![A455196_1_En_12_Fig1_HTML.jpg](A455196_1_En_12_Fig1_HTML.jpg)\n\
    *Figure 12-1. Connected components*\n\n```\ncreate table edge(x1, x2) as\nselect\
    \ 10,20 from dual\nunion all select 50,40 from dual\nunion all select 20,30 from\
    \ dual\nunion all select 20,40 from dual\nunion all select 60,70 from dual\nunion\
    \ all select 80,60 from dual\nunion all select 20,90 from dual;\n```\n\nThe goal\
    \ is to number the connected components. The result for the data above is this:\n\
    \n```\nX        GRP\n---------- ----------\n10          1\n20          1\n30 \
    \         1\n40          1\n50          1\n60          2\n70          2\n80  \
    \        2\n90          1\n9 rows selected.\n```\n\nSo each node belongs to one\
    \ of the two connected components in this example, and itвҖҷs not critical which\
    \ one is first and which one is second.\n\n### Solution\n\nListing [12-4](#A455196_1_En_12_Chapter.html#Par24)\
    \ shows an SQL approach to number connected components.\n\n```\nselect x, dense_rank()\
    \ over(order by min(root)) grp\nfrom (select connect_by_root x1 root, x1, x2\n\
    \      from edge\n      connect by nocycle prior x1 in (x1, x2)\n            \
    \      or prior x2 in (x1, x2))\nunpivot(x for x12 in(x1, x2))\ngroup by x\norder\
    \ by 1, 2;\nListing 12-4\nNumbering connected components in SQL\n```\n\nGiven\
    \ that the graph is undirected, edge X1 вҖ“ X2 means that nodes may be traversed\
    \ from X1 to X2 and the other way around; thus all the combinations of parentвҖ“child\
    \ relations have been specified in the `connect by` condition to handle this.\n\
    \nPlease pay attention that there is no `start with` clause, so for each edge\
    \ we are building all connected edges and then use `pivot` to return all the connected\
    \ nodes in column X. Finally, for each node we derive a minimal root (which is\
    \ defined as the starting value for X1 but similarly it may be the starting value\
    \ for X2) and number the connected components using `dense_rank`.\n\nThe query\
    \ looks quite concise but in fact itвҖҷs very inefficient because the same edges\
    \ are traversed multiple times, but this is the only way to consider all possible\
    \ connections.\n\nThe PL/SQL approach, however, may be very efficient and itвҖҷs\
    \ demonstrated in Listing [12-5](#A455196_1_En_12_Chapter.html#Par29). The required\
    \ result can be achieved with a single table scan and fast look-ups in associative\
    \ arrays.\n\n```\ncreate or replace type to_2int as object (x int, grp int)\n\
    /\ncreate or replace type tt_2int as table of to_2int\n/\ncreate or replace function\
    \ f_connected_component return tt_2int\n  pipelined is\n  i_list number := 0;\n\
    \  i      number;\n  n      number;\n  k      number;\n  type tp1 is table of\
    \ binary_integer index by binary_integer;\n  type tp2 is table of tp1 index by\
    \ binary_integer;\n  t1 tp1;\n  t2 tp2;\nbegin\n  for c in (select x1, x2 from\
    \ edge) loop\n    if not t1.exists(c.x1) and not t1.exists(c.x2) then\n      i_list\
    \ := i_list + 1;\n      t1(c.x1) := i_list;\n      t1(c.x2) := i_list;\n     \
    \ t2(i_list)(c.x1) := null;\n      t2(i_list)(c.x2) := null;\n    elsif t1.exists(c.x1)\
    \ and not t1.exists(c.x2) then\n      t1(c.x2) := t1(c.x1);\n      t2(t1(c.x1))(c.x2)\
    \ := null;\n    elsif t1.exists(c.x2) and not t1.exists(c.x1) then\n      t1(c.x1)\
    \ := t1(c.x2);\n      t2(t1(c.x2))(c.x1) := null;\n    elsif t1.exists(c.x1) and\
    \ t1.exists(c.x2) and t1(c.x1) != t1(c.x2) then\n      n := greatest(t1(c.x1),\
    \ t1(c.x2));\n      k := least(t1(c.x1), t1(c.x2));\n      i := t2(n).first;\n\
    \      while (i is not null) loop\n        t2(k)(i) := null;\n        t1(i) :=\
    \ k;\n        i := t2(n).next(i);\n      end loop;\n      t2.delete(n);\n    end\
    \ if;\n  end loop;\n  i := t1.first;\n  for idx in 1 .. t1.count loop\n    pipe\
    \ row(to_2int(i, t1(i)));\n    i := t1.next(i);\n  end loop;\nend;\nListing 12-5\n\
    Numbering connected components in PL/SQL\n```\n\nThe T1 array contains an index\
    \ of a connected component for each node. The T2 array is the list of components\
    \ where a component is an array of nodes. In fact, t2 was introduced for performance\
    \ reasons, because if nodes for some edges belong to different components, then\
    \ we need to re-renumber nodes for one of the components, and a list of nodes\
    \ for each component makes this operation very fast.\n\n```\nselect x, dense_rank()\
    \ over(order by grp) grp\nfrom table(f_connected_component)\norder by x;\n```\n\
    \nThe efficiency of two approaches in non-comparable and, frankly speaking, SQL\
    \ approach for this task is not reasonable at all. You can use the approach below\
    \ to generate unique edges:\n\n```\nexec dbms_random.seed(11);\ncreate table edge\
    \ as\nselect trunc(dbms_random.value(1, 100)) x1,\n       trunc(dbms_random.value(1,\
    \ 100)) x2\nfrom dual\nconnect by level <= 61;\nselect count(distinct least(x1,\
    \ x2) || ' ' || greatest(x1, x2)) from edge;\n```\n\nThe PL/SQL approach takes\
    \ a couple of milliseconds while an SQL query takes more than 3 minutes to execute\
    \ on my laptop. If you add a few more elements, PL/SQL execution time still will\
    \ be milliseconds while an SQL approach will take hours."
