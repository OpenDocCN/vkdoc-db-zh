  trans: "\n## Oracle еҺҹз”ҹиҜӯжі•зҡ„йҷҗеҲ¶\n\n1.  `IN`гҖҒ`OR` жқЎд»¶дёҚе…Ғи®ёеҮәзҺ°еңЁйў„иҝһжҺҘи°“иҜҚдёӯгҖӮжё…еҚ• 1-25 дёӯзҡ„жҹҘиҜўеңЁ Oracle\
