    Keywords `after match skip to next row` were specified in order to catch all the
    combinations. For example, there are two overlapping sequences 1, 3, 2 and 3,
    2, 1 on the ID interval (709, 719) and the rows with ID 715 and 716 are part of
    two different matches.


    ```

    select * from digit where id between 709 and 719;

    ID      VALUE

    ---------- ----------

    709          9

    710          3

    711          2

    712          4

    713          6

    714          1

    715          3

    716          2

    717          1

    718          5

    719          0

    ```


    Keyword `permute` means that we consider all possible combinations of `v1`, `v2`,
    `v3`. To define which permutation was matched we derive matching IDs and use logic
    with `decode`. The number of rows after pattern matching equals to the number
    of matched groups and the number of rows after group by is not more than 6В вҖ“ the
    number of permutations of 1, 2, and 3.


    Listing [8-5](#A455196_1_En_8_Chapter.html#Par43) shows an approach using analytic
    functions. For each row we derive two previous rows and check that all of them
    are unique and members of the set (1, 2, 3).


    ```

    select v1, v2, v3, count(*) cnt

    from (select row_number() over(order by id) rn,

    value v3,

    lag(value, 1) over(order by id) v2,

    lag(value, 2) over(order by id) v1

    from digit)

    where rn > 2

    and v1 in (1, 2, 3)

    and v2 in (1, 2, 3)

    and v3 in (1, 2, 3)

    and v1  v2

    and v1  v3

    and v2  v3

    group by v1, v2, v3

    order by 1, 2, 3;

    Listing 8-5

    Finding combinations of elements (1, 2, 3) using analytic functions

    ```


    By the way, similar logic can be used for pattern matching as well; in such case
    we can avoid `decode`, `permute,` and grouping.


    ```

    pattern (v1 v2 v3)

    define

    v1 as v1.value = any (1, 2, 3),

    v2 as v2.value = any (1, 2, 3)

    and v2.value  v1.value,

    v3 as v3.value = any (1, 2, 3)

    and v3.value  v2.value

    and v3.value  v1.value)

    ```


