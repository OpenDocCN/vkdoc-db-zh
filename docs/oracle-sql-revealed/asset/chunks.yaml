    иЎҢжЁЎејҸеҢ№й…ҚжһҒеӨ§ең°жү©еұ•дәҶ SQL з”ЁдәҺж•°жҚ®еҲҶжһҗзҡ„иғҪеҠӣгҖӮжӯӨеҠҹиғҪдҪҝжҲ‘д»¬иғҪеӨҹжү§иЎҢеӨҚжқӮзҡ„еҲҶжһҗпјҢеҗҰеҲҷиҝҷзұ»еҲҶжһҗе°ҶйңҖиҰҒеҲҶжһҗеҮҪж•°гҖҒиҒҡеҗҲеҮҪж•°гҖҒиҝһжҺҘе’ҢеӯҗжҹҘиҜўгҖӮеңЁжҹҗдәӣжғ…еҶөдёӢпјҢ`match_recognize`
    жҳҜдҪҝз”Ё SQL д»Ҙй«ҳж•Ҳдё”еҸҜжү©еұ•зҡ„ж–№ејҸиҺ·еҸ–з»“жһңзҡ„е”ҜдёҖйҖ”еҫ„гҖӮеҚідҪҝеҜ№дәҺйӮЈдәӣеҸҜд»ҘйҖҡиҝҮеҲҶжһҗеҮҪж•°йҮҚеҶҷжқҘе®һзҺ°жЁЎејҸеҢ№й…Қзҡ„жғ…еҶөпјҢе…¶жҖ§иғҪиЎЁзҺ°д№ҹжӣҙдёәеҮәиүІгҖӮиҝҷеҸҜд»Ҙзұ»жҜ”дәҺ `pivot/unpivot`
    ж“ҚдҪңз¬ҰпјҢе®ғд»¬иҷҪеҸҜиў«дәӨеҸүиҝһжҺҘ/еҲҶз»„жүҖжӣҝд»ЈпјҢдҪҶж–°еҠҹиғҪйҖҡеёёжҜ”дј з»ҹж–№жі•зҡ„иЎЁзҺ°зЁҚеҘҪгҖӮ


    зұ»дјјжӯЈеҲҷиЎЁиҫҫејҸзҡ„иҜӯжі•е…Ғи®ёд»Ҙз®ҖжҙҒзҡ„ж–№ејҸе®ҡд№үжЁЎејҸпјҢиҝҷз®ҖеҢ–дәҶеҸҜз»ҙжҠӨжҖ§е№¶жҸҗй«ҳдәҶеҸҜиҜ»жҖ§гҖӮжңҖз»ҲпјҢжЁЎејҸеҢ№й…ҚжҳҜ SQL иғҪеҠӣдёҠзҡ„дёҖж¬ЎйҮҚеӨ§зӘҒз ҙпјҢж— з–‘жҳҜдёҖдёӘе®һз”Ёзҡ„еҠҹиғҪгҖӮ


    # 9. жҹҘиҜўеӯҗеҸҘзҡ„йҖ»иҫ‘жү§иЎҢйЎәеәҸ


    Oracle е…Ғи®ёеңЁеҗҢдёҖдёӘжҹҘиҜўеқ—дёӯз»„еҗҲеҗ„з§ҚжҹҘиҜўеӯҗеҸҘпјҢд»ҺиҝһжҺҘгҖҒиҝҮж»Өе’ҢеҲҶз»„зӯүеҹәжң¬еҠҹиғҪпјҢеҲ°жЁЎеһӢеӯҗеҸҘжҲ–жЁЎејҸеҢ№й…Қзӯүй«ҳзә§жһ„йҖ гҖӮжңүж—¶пјҢж— жі•д»…дҪҝз”ЁеҚ•дёӘ `select ...
    from` жҹҘиҜўеқ—жқҘе®һзҺ°жүҖйңҖзҡ„з»“жһңпјҢеӣ жӯӨдҪ еҸҜиғҪйңҖиҰҒеңЁжҹҘиҜўдёӯеҲӣе»әйўқеӨ–зҡ„еҶ…иҒ”и§ҶеӣҫвҖ”вҖ”дҫӢеҰӮпјҢеҪ“дҪ жғіиҰҒжҢүеҲҶжһҗеҮҪж•°зҡ„еҖјиҝӣиЎҢиҝҮж»Өж—¶гҖӮз„¶иҖҢпјҢеҚідҪҝдҪ иғҪеӨҹдҪҝз”ЁеҚ•дёӘжҹҘиҜўеқ—е®һзҺ°ж•ҙдёӘйҖ»иҫ‘вҖ”вҖ”д№ҹе№¶йқһжҖ»жҳҜеҝ…иҰҒзҡ„пјҢеӣ дёә
    Oracle еҸҜд»ҘеңЁжҹҘиҜўиҪ¬жҚўиҝҮзЁӢдёӯж¶ҲйҷӨеҶ…иҒ”и§ҶеӣҫгҖӮжӯӨеӨ–пјҢеңЁжҹҗдәӣжғ…еҶөдёӢпјҢйўқеӨ–зҡ„еҶ…иҒ”и§ҶеӣҫеҸҜиғҪжңүеҠ©дәҺжҸҗй«ҳжҖ§иғҪпјҢиҝҷе°ҶеңЁжң¬з« жң«е°ҫеұ•зӨәгҖӮ


    жң¬з« д»ҺйҖ»иҫ‘и§’еәҰд»Ӣз»ҚжҹҘиҜўеқ—дёӯеӯҗеҸҘзҡ„жү§иЎҢйЎәеәҸпјҢиҝҷжңүеҠ©дәҺд»Ҙз®ҖжҙҒзҡ„ж–№ејҸе®һзҺ°еӨҚжқӮйҖ»иҫ‘гҖӮ


    еҒҮи®ҫжҲ‘д»¬жңүдёҖдёӘд»…еҢ…еҗ«дёҖдёӘ `select` е…ій”®еӯ—зҡ„еҚ•жқЎ `select` иҜӯеҸҘвҖ”вҖ”еҚіжІЎжңүеӯҗжҹҘиҜўжҲ–еҶ…иҒ”и§ҶеӣҫгҖӮеҹәжң¬зҡ„жү§иЎҢйЎәеәҸеҰӮдёӢпјҡ


    1.  `from`, `join`, `where`

    2.  `connect by`

    3.  `group by`

    4.  `having`

    5.  еҲҶжһҗеҮҪж•°

    6.  `select` еҲ—иЎЁ (`distinct`, ж ҮйҮҸеӯҗжҹҘиҜўзӯү)

    7.  `order by`


    з„¶иҖҢпјҢиҝҷйңҖиҰҒдёҖдәӣжҫ„жё…гҖӮ


    1.  `join`гҖҒ`where` е’Ң `connect by` з»„еҗҲдҪҝз”Ёзҡ„е…·дҪ“з»ҶиҠӮе·ІеңЁз¬¬ 5 з« вҖңеҲҶеұӮжҹҘиҜўпјҡConnect byвҖқдёӯд»Ӣз»ҚгҖӮжӯӨеӨ–пјҢжӯЈеҰӮвҖңдјӘеҲ—з”ҹжҲҗиҜҰи§ЈвҖқдёҖиҠӮжүҖжј”зӨәзҡ„пјҢдёҘж јжқҘиҜҙпјҢиҜҙ
    `where` еӯҗеҸҘдёӯзҡ„и°“иҜҚеңЁ `connect by` д№ӢеүҚжҲ–д№ӢеҗҺжү§иЎҢйғҪжҳҜдёҚеҮҶзЎ®зҡ„гҖӮ

    2.  е°Ҫз®ЎйҖ»иҫ‘дёҠпјҢиҝһжҺҘеҗҺи°“иҜҚеә”иҜҘеңЁиҝһжҺҘеүҚи°“иҜҚд№ӢеҗҺиҜ„дј°пјҢдҪҶе®һйҷ…дёҠпјҢеҰӮжһңиҝҷж ·иғҪдә§з”ҹжҲҗжң¬жӣҙдҪҺзҡ„жү§иЎҢи®ЎеҲ’пјҢе®ғд»¬еҸҜиғҪдјҡжӣҙж—©иў«еә”з”ЁгҖӮ

    3.  жҹҘиҜўиҪ¬жҚўеҸҜиғҪдјҡеҪұе“ҚеҚ•дёӘжҹҘиҜўеқ—зҡ„е®һйҷ…жү§иЎҢйЎәеәҸгҖӮдҫӢеҰӮпјҢеҰӮжһңеҸ‘з”ҹдәҶвҖңDistinct PlacementвҖқиҪ¬жҚўпјҢ`distinct` еҸҜиғҪеңЁиҝһжҺҘд№ӢеүҚеә”з”ЁвҖ”вҖ”д»ҺжҠҖжңҜдёҠи®ІпјҢOracle
    дјҡеҲӣе»әйўқеӨ–зҡ„еҶ…иҒ”и§ҶеӣҫгҖӮ

    4.  дәҶи§Јзү№е®ҡжҹҘиҜўжү§иЎҢйЎәеәҸзҡ„е®қиҙөдҝЎжҒҜжқҘжәҗеҪ“з„¶жҳҜжҹҘиҜўи®ЎеҲ’гҖӮе®ғе°ҶжҳҫзӨәи°“иҜҚдҪ•ж—¶иў«еә”з”ЁгҖҒиҒҡеҗҲе’ҢеҲҶжһҗеҮҪж•°дҪ•ж—¶жү§иЎҢгҖҒд»ҘеҸҠеҗ„з§ҚжҺ’еәҸпјҲеҰӮжһңжңүзҡ„иҜқпјүеңЁдҪ•ж—¶иҝӣиЎҢзӯүзӯүгҖӮ


    жүҖжңүиҝҷдәӣиҪ¬жҚўе’ҢдјҳеҢ–еҸӘжңүеңЁдёҚдјҡж”№еҸҳз»“жһңзҡ„еүҚжҸҗдёӢжүҚиғҪеҸ‘з”ҹпјҢдҪҶжӣҙйҮҚиҰҒзҡ„жҳҜпјҢе®һйҷ…жү§иЎҢйЎәеәҸеңЁ CBOпјҲеҹәдәҺжҲҗжң¬зҡ„дјҳеҢ–еҷЁпјүиҪ¬жҚўеҗҺеҸҜиғҪдјҡеҸ‘з”ҹеҸҳеҢ–вҖ”вҖ”вҖңDistinct PlacementвҖқиҪ¬жҚўе°ұжҳҜдёҖдёӘз®ҖеҚ•зҡ„дҫӢеӯҗгҖӮ


    жңүж—¶пјҢејҖеҸ‘иҖ…зј–еҶҷзҡ„д»Јз ҒеҹәдәҺеҜ№жү§иЎҢйЎәеәҸзҡ„й”ҷиҜҜеҒҮи®ҫпјҢиҝҷеҸҜиғҪжҳҜеҚұйҷ©зҡ„гҖӮд»ҘдёӢжҳҜдёҖдәӣйңҖиҰҒжіЁж„Ҹзҡ„ең°ж–№гҖӮ


    1.  дҪ дёҚеә”иҜҘеҹәдәҺеҗҢдёҖдёӘжҹҘиҜўеқ—дёӯжҹҗдәӣиҝҮж»ӨеҷЁдјҡеңЁе…¶д»–иҝҮж»ӨеҷЁд№ӢеүҚеә”з”Ёзҡ„еҒҮи®ҫжқҘжһ„е»әйҖ»иҫ‘пјҢжҲ–иҖ…дҫқиө–дәҺзү№е®ҡзҡ„жү§иЎҢи®ЎеҲ’гҖӮдёӢйқўзҡ„дҫӢеӯҗжј”зӨәдәҶеҪ“жҹҘиҜўи®ЎеҲ’ж”№еҸҳж—¶пјҢжҹҘиҜўеҸҜиғҪдјҡеҰӮдҪ•еӨұиҙҘгҖӮ


    ```

    create table t01(id, value, constraint pk_t01 primary key(id)) as

    select 1, ''1'' from dual union all

    select 2, ''2'' from dual union all

    select 0, ''X'' from dual;

    create table t02(id, value) as

    select 1, 1 from dual union all

    select 2, 2 from dual;

    select

    * from t01 join t02 using (id, value);

    select *

    from table(dbms_xplan.display_cursor(format => ''basic predicate''));

    select --+ no_index(t01)

    * from t01 join t02 using (id, value);

    select *

    from table(dbms_xplan.display_cursor(format => ''basic predicate''));

    ```


    еңЁз¬¬дёҖз§Қжғ…еҶөдёӢпјҢOracle жү§иЎҢдәҶеөҢеҘ—еҫӘзҺҜпјҢйҖҡиҝҮ ID иҝӣиЎҢи®ҝй—®пјҢе№¶еңЁиҝһжҺҘеҗҺзҡ„и®°еҪ•йӣҶдёҠеә”з”ЁдәҶеҖјиҝҮж»ӨеҷЁпјӣиҖҢеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢжү§иЎҢзҡ„жҳҜе“ҲеёҢиҝһжҺҘпјҢз”ұдәҺеңЁе°қиҜ•е°Ҷ X
    иҪ¬жҚўдёәж•°еӯ—ж—¶еҸ‘з”ҹдәҶйҡҗејҸиҪ¬жҚўпјҢжҹҘиҜўдјҡеӣ  `ORA-01722: invalid number` й”ҷиҜҜиҖҢеӨұиҙҘгҖӮ'
