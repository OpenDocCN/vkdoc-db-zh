    So what happens here? Oracle scans table T3 and then uses the index access to
    get correspondent rows from TR, and as a last step it applies group by. The final
    query looks like the following shown in Listing [2-10](#A455196_1_En_2_Chapter.html#Par32):


    ```

    SELECT MAX("TR"."NAME") "NAME",COUNT(*) "CNT" FROM "T3", "TR" WHERE "TR"."ID"="T3"."ID"
    GROUP BY "TR"."ID","T3".ROWID

    Listing 2-10

