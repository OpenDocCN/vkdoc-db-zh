    cycle without any recurrences.


    In addition to built-in capabilities to detect cycles we can implement our own
    logic as shown in Listing [6-10](#A455196_1_En_6_Chapter.html#Par49). cnt1 is
    the number of occurrences of ID in the concatenation of ancestor IDs, similarly
    cnt2 is the number of occurrences of ID in the concatenation of ancestor PARENT_IDs.
    If you uncomment filters by cnt1/cnt2, then the result will be the same as for
    recursive subquery factoring/connect by queries from Listing [6-9](#A455196_1_En_6_Chapter.html#Par45).
    There is no need to specify cycle_clause when such filters are used.


    ```

    with t(id, id_parent, path_id, path_id_parent, cnt1, cnt2) as

    (

    select g.*,

    cast(''->'' || g.id as varchar2(4000)),

    cast(''->'' || g.id_parent as varchar2(4000)),

    0,


    from graph g

    where id = 3

    union all

    select g.id,

    g.id_parent,

    t.path_id || ''->'' || g.id,

    t.path_id_parent || ''->'' || g.id_parent,

    regexp_count(t.path_id || ''->'', ''->'' || g.id || ''->''),

    regexp_count(t.path_id_parent || ''->'', ''->'' || g.id || ''->'')

    from t

    join graph g

    on t.id = g.id_parent

    -- and t.cnt1 = 0

    -- and t.cnt2 = 0

    )

    search depth first by id set ord

    cycle id set cycle to 1 default 0

    select * from t;

    ID ID_PARENT PATH_ID       PATH_ID_PARENT   CNT1  CNT2  ORD C

    ---- --------- ------------- --------------- ----- ----- ---- -

    3         1 ->3           ->1                 0     0    1 0

    4         3 ->3->4        ->1->3              0     0    2 0

    5         4 ->3->4->5     ->1->3->4           0     0    3 0

    3         5 ->3->4->5->3  ->1->3->4->5        1     1    4 1

    3         5 ->3           ->5                 0     0    5 0

    4         3 ->3->4        ->5->3              0     0    6 0

    5         4 ->3->4->5     ->5->3->4           0     1    7 0

    3         5 ->3->4->5->3  ->5->3->4->5        1     1    8 1

    Listing 6-10

    Manual implementation of the logic to detect cycles

    ```


    ## Limitations of the Current Implementation


    The query in a recursive member has a number of limitations; in particular, you
    cannot use distinct, group by, having, connect by, aggregate functions, model,
    etc., in it. One may ask whether this is a limitation of the current implementation
    or the recursive execution does not make sense when such a complex logic is used.
    My inclination is that some of these limitations will be removed in the future.
    On the other hand, we can use workarounds for some limitations even in the current
    version, but that may look a bit awkward. In particular, we can use analytic functions
    and additional filters to get an aggregated resultВ вҖ“ although this is not something
    to be used in real-life tasks.


    The following will be demonstrated mainly for academic purposes. So, letвҖҷs assume
    we need to build a parentвҖ“child hierarchy where the parent is the sum of all IDs
    on the current level.


    ```

    with t0(id, id_parent, letter) as

    (select 1, 0, ''B'' from dual

    union all select 2, 1, ''D'' from dual

    union all select 3, 1, ''A'' from dual

    union all select 10, 5, ''C'' from dual

    union all select 66, 6, ''X'' from dual),

    t(id, id_parent, sum_id, lvl, str, rn) as

    (select id, id_parent, id, 1, letter, 1 from t0 where id_parent = 0

    union all

    select

    t0.id,

    t0.id_parent,

    sum(t0.id) over (),

    t.lvl + 1,

    listagg(letter, '', '') within group (order by letter) over (),

    rownum

    from t

    join t0 on t.sum_id = t0.id_parent and t.rn = 1)

    select * from t;

    ID  ID_PARENT     SUM_ID      LVL STR              RN

    ------- ---------- ---------- -------- ---------- --------

    1          0          1        1 B                 1

    3          1          5        2 A, D              2

    2          1          5        2 A, D              1

    10          5         10        3 C                 1

    ```


    Analytic functions were used instead of aggregate ones and вҖңt.rn = 1вҖқ was added
    to the join condition to avoid duplicates, because the value of the analytic function
    is the same for all rows and they are not grouped into one row per group.


    If we are interested only in an aggregated result for each level, then it can
    be achieved using a query like this:


    ```

    select sum_id, lvl, str from t where rn = 1;

    ```


    Analytic functions in a recursive member would cause В«ORA-32486: unsupported operation
    in recursive branch of recursive WITH clauseВ» in Oracle 11.2.0.1; however it was
    fixed in 11.2.0.3.


    ## Summary


    вҖңRecursive withвҖқ is defined in standard SQL:1999 while the вҖңconnect byвҖқ clause
    is an Oracle-specific feature. Nevertheless, it makes sense to use connect by
    instead of recursive subquery factoring in all cases where itвҖҷs possible, because
    itвҖҷs better optimized and works faster. As it was mentioned previously, itвҖҷs not
    possible to reference calculated expressions in вҖңconnect byвҖқ queries while recursive
    with provides this facility. So if any cumulative-like calculations are required
    while traversing a hierarchy, then recursive subquery factoring may be the best
    option.


    Traversing hierarchies is not the only application of recursive subquery factoring.
    It can be used for various tasks when the same logic has to be applied to a recordset
    multiple times. ItвҖҷs important to highlight that the final result contains recordsets
    from all the iterations while on current iteration itвҖҷs possible to access rows
    only from the previous one. The necessity to return recordsets from all the iterations
    may cause intensive work area usage and other overhead costs. So if you do not
    need recordsets from all iterations but only from the last one, then itвҖҷs reasonable
    to use PL/SQL loops and collections or temporary tables.


    Even though recursive subquery factoring and connect by have built-in capabilities
    to handle cycles, it makes sense to use them only in trivial cases. For more complex
    cases, procedural approaches are better. Anyway, connect by and recursive subquery
    factoring handle cycle a bit differently so it may be important to know the details.'
