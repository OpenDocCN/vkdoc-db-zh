- fmt: "### Solution\n\nItвҖҷs not possible to use a lead function given that values\
    \ may repeat so we cannot use a fixed shift. However, similar to the previous\
    \ quiz, there are multiple approaches to the solution:\n\n*   A few layers of\
    \ analytic functions\n*   Analytic function with windowing clause\n*   Model clause\n\
    *   Pattern matching\n\nAggregate function `В«sum(nvl(next_value, 0) - value)В»`\
    \ was used to minimize fetch.\n\n```sql\nselect sum(nvl(next_value, 0) - value)\
    \ s\nfrom (select value, max(next_value) over(partition by value) next_value\n\
    from (select value,\ndecode(lead(value, 1) over(order by value),\nvalue,\nto_number(null),\n\
    lead(value, 1) over(order by value)) next_value\nfrom t_value));\nS\n\nElapsed:\
    \ 00:00:02.33\nselect sum(nvl(next_value, 0) - value) s\nfrom (select value,\n\
    min(value) over(order by value range between 1 following and 1 following) next_value\n\
    from t_value);\nS\n\nElapsed: 00:00:01.79\nselect sum(nvl(next_value, 0) - value)\
    \ s\nfrom\n(\nselect value, next_value\nfrom t_value\nmodel\ndimension by (row_number\
    \ () over (order by value desc) rn)\nmeasures(value, cast(null as number) next_value)\n\
    rules\n(\nnext_value[rn > 1] order by rn =\ndecode(value[cv()], value[cv()-1],\
    \ next_value[cv()-1], value[cv()-1])\n)\n);\nS\n\nElapsed: 00:00:05.94\nselect\
    \ sum(nvl(next_value, 0) - value) s\nfrom (select * from t_value union all select\
    \ null from dual)\nmatch_recognize\n(\norder by value nulls last\nmeasures\nfinal\
    \ first (next_val.value) as next_value\nall rows per match\nafter match skip to\
    \ next_val\npattern (val+ {-next_val-})\ndefine\nval as val.value = first(val.value)\n\
    ) mr;\nS\n\nElapsed: 00:00:01.53\n```\n\nThe most efficient solutions for this\
    \ quiz are also pattern matching and analytics with a windowing clause, then a\
    \ solution with lead and max functions and finally a model clause. ItвҖҷs quite\
    \ important to use a minimally required window in a windowing clause. For example,\
    \ if you specify `вҖңrange between 1 following and unbounded following,вҖқ` then the\
    \ result will be correct but the elapsed time will be few orders of magnitude\
    \ greater than for `вҖңrange between 1 following and 1 followingвҖқ`.\n\nOne specific\
    \ row with null values has been added for a pattern matching solution so that\
    \ the last row in the original tables has a next row.\n\n### Next Branch\n\nLetвҖҷs\
    \ define вҖңnext branchвҖқ as the nearest row after a traversing hierarchy such as\
    \ its row number greater than for current row while its level is less or equal\
    \ to the current level. This value may be very useful if we want to apply some\
    \ logic for all children of a given node.\n\nThe goal is to find a solution without\
    \ joins and subqueries.\n\nThis approach with joins is trivial:\n\n```sql\nwith\
    \ t(id, parent_id, description, amount) as\n(\nselect 1 id, null, 'top', 10  from\
    \ dual\nunion all select 2, 1, 'top-one', 100 from dual\nunion all select 3, 2,\
    \ 'one-one', 2000 from dual\nunion all select 4, 2, 'one-two', 3000 from dual\n\
    union all select 5, 1, 'top-two', 1000 from dual\nunion all select 6, 2, 'one-three',\
    \ 300 from dual\nunion all select 7, 6, 'three-one', 1 from dual\n)\n, h as\n\
    (\nselect id, parent_id, description, amount, level l, rownum rn\nfrom t\nstart\
    \ with id = 1\nconnect by parent_id = prior id\n)\nselect h.*,\n(select min(rn)\n\
    from h h0\nwhere h0.rn > h.rn\nand h0.l <= h.l) next_branch\nfrom h;\nID  PARENT_ID\
    \ DESCRIPTI     AMOUNT    L     RN NEXT_BRANCH\n------- ---------- --------- ----------\
    \ ---- ------ -----------\n1            top               10    1      1\n2  \
    \        1 top-one          100    2      2           7\n3          2 one-one\
    \         2000    3      3           4\n4          2 one-two         3000    3\
    \      4           5\n6          2 one-three        300    3      5          \
    \ 7\n7          6 three-one          1    4      6           7\n5          1 top-two\
    \         1000    2      7\n7 rows selected.\n```\n\nFor rows with ID in (3, 4),\
    \ the next branch is the next row because it has the same level. For rows with\
    \ ID in (2, 6, 7), the next branch is row with RN = 7 because it has a lower level.\n\
    \n### Solution\n\nIt may seem that logic can be easily rewritten with analytic\
    \ functions, but we face two limitations that have been demonstrated earlier for\
    \ analytic functions in the corresponding chapter.\n\n1.  ItвҖҷs not possible to\
    \ specify multiple ranges when ordering by multiple columns. In this particular\
    \ case we cannot specify a range for `rn`\n\n    `rn range between 1 following\
    \ and unbounded following`\n\n    and in the same time range for `l`\n\n    `l\
    \ range between unbounded preceding and current row`\n\n2.  If we try to order\
    \ by only one column whether itвҖҷs `l` or `rn`, we have to limit rows by the second\
    \ column in a function, but itвҖҷs not possible to use the current value of that\
    \ attribute in the expression for a function.\n\nAs was already mentioned in the\
    \ chapter about model clauses, the first case can be easily implemented using\
    \ a model clause while the second case requires iterations and an auxiliary measure\
    \ to use it as a value of a given attribute from the current row on each iteration.\n\
    \nListing 12-12 shows the implementation using the model clause.\n\n```sql\nselect\
    \ *\nfrom h\nmodel\ndimension by (l, rn)\nmeasures (id, parent_id, rn xrn, 0 next_branch)\n\
    rules\n(\nnext_branch[any, any] order by rn, l =\nmin(xrn)[l  cv(rn)]\n);\nL \
    \      RN         ID  PARENT_ID        XRN NEXT_BRANCH\n------- -------- ----------\
    \ ---------- ---------- -----------\n1        1          1                   \
    \  1\n2        2          2          1          2            7\n3        3   \
    \       3          2          3            4\n3        4          4          2\
    \          4            5\n3        5          6          2          5       \
    \     7\n4        6          7          6          6            7\n2        7\
    \          5          1          7\n7 rows selected.\nselect *\nfrom h\nmodel\n\
    dimension by (rn)\nmeasures (id, parent_id, l, 0 l_cur, rn xrn, 0 next_branch)\n\
    rules iterate (1e6) until l[iteration_number+2] is null\n(\nl_cur[rn > iteration_number\
    \ + 1] = l[iteration_number + 1],\nnext_branch[iteration_number + 1] =\nmin(case\
    \ when l  cv(rn)]\n)\norder by rn;\nRN     ID  PARENT_ID     L    L_CUR      XRN\
    \ NEXT_BRANCH\n-------- ------ ---------- ----- -------- -------- -----------\n\
    1      1                1        0        1\n2      2          1     2       \
    \ 1        2           7\n3      3          2     3        2        3        \
    \   4\n4      4          2     3        3        4           5\n5      6     \
    \     2     3        3        5           7\n6      7          6     4       \
    \ 3        6           7\n7      5          1     2        4        7\n7 rows\
    \ selected.\n```\n\n**Listing 12-12** Finding next branch using model clause\n\
    \nI believe there is no need to say that the first approach is more efficient\
    \ than the second one with iterations and auxiliary measure, but better solution\
    \ may be provided with analytic functions as shown in Listing 12-13 if we made\
    \ some assumptions.\n\n```sql\nselect h0.*,\nnullif(max(rn) over(order by s range\
    \ between current\nrow and x - 1e-38 following),\ncount(*) over()) + 1 next_branch\n\
    from (select h.*,\npower(2 * 10, 1 - l) x,\nsum(power(2 * 10, 1 - l)) over(order\
    \ by rn) s\nfrom h) h0;\nID  PARENT_ID     L    RN          X          S NEXT_BRANCH\n\
    ------ ---------- ----- ----- ---------- ---------- -----------\n1           \
    \     1     1          1          1\n2          1     2     2        ,05     \
    \  1,05           7\n3          2     3     3      ,0025     1,0525          \
    \ 4\n4          2     3     4      ,0025      1,055           5\n6          2\
    \     3     5      ,0025     1,0575           7\n7          6     4     6    ,000125\
    \   1,057625           7\n5          1     2     7        ,05   1,107625\n7 rows\
    \ selected.\n```\n\n**Listing 12-13** Finding next branch using analytic functions\n\
    \nIf we assume that each node has not more than 10 direct descendants, then the\
    \ sum of x for all possible descendants for a given node on the nth level can\
    \ be calculated as the sum of the series below"
