    1          1          2

    1          2          2

    1          3          1

    1          4          2

    1                     7

    2          1          1

    2          4          1

    2          5          2

    2                     4


    10 rows selected.

    ```


    ```sql

    select client_id, product_id, sum(quantity) cnt

    from orders

    group by cube(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID PRODUCT_ID        CNT

    ---------- ---------- ----------

    1          1          2

    1          2          2

    1          3          1

    1          4          2

    1                     7

    2          1          1

    2          4          1

    2          5          2

    2                     4

    1          3

    2          2

    3          1

    4          3

    5          2


    15 rows selected.

    ```


    еҗҢж ·зҡ„ж•ҲжһңеҸҜд»ҘеҲҶеҲ«дҪҝз”Ёд»ҘдёӢиҜӯеҸҘе®ҢжҲҗгҖӮ


    ```sql

    grouping sets ((), (client_id), (client_id, product_id))

    е’Ң

    grouping sets ((), (client_id), (product_id), (client_id, product_id))

    ```


    еҮҪж•° `grouping` е’Ң `grouping_id` еҸҜз”ЁдәҺиҜҶеҲ«е°Ҹи®ЎгҖӮ`Grouping` еҸӘжҺҘеҸ—еҚ•дёӘиЎЁиҫҫејҸдҪңдёәеҸӮж•°пјҢиҖҢ `grouping_id`
    еҸҜд»ҘжҺҘеҸ—еӨҡдёӘиЎЁиҫҫејҸгҖӮ


    ```sql

    select decode(grouping(client_id), 1, ''all clients'', client_id) as client_id,

    decode(grouping(product_id), 1, ''all products'', product_id) as product_id,

    sum(quantity) cnt,

    decode(grouping_id(client_id, product_id),

    bitand(grouping_id(client_id, product_id), bin_to_num(0, 0)),

    ''client, product'',

    bitand(grouping_id(client_id, product_id), bin_to_num(0, 1)),

    ''client'',

    bitand(grouping_id(client_id, product_id), bin_to_num(1, 1)),

    ''grand total'') slice

    from orders

    group by rollup(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID       PRODUCT_ID             CNT SLICE

    --------------- --------------- ---------- --------------------

    1               1                        2 client, product

    1               2                        2 client, product

    1               3                        1 client, product

    1               4                        2 client, product

    1               all products             7 client

    2               1                        1 client, product

    2               4                        1 client, product

    2               5                        2 client, product

    2               all products             4 client

    all clients     all products            11 grand total

    10 rows selected.

    ```


    иҝҳжңүдёҖдёӘеҮҪж•° `group_id` еҸҜз”ЁдәҺеҢәеҲҶзӣёеҗҢзҡ„еҲҮзүҮгҖӮ'
- fmt: '# 5. Hierarchical Queries: Connect by


    ## Summary


    иҒҡеҗҲеҮҪж•°е…Ғи®ёжҲ‘д»¬дёәжҜҸдёӘз»„и®Ўз®—еҚ•дёӘз»“жһңиЎҢгҖӮйҷӨдәҶеҗ„з§ҚеҶ…зҪ®иҒҡеҗҲеҮҪж•°еӨ–пјҢејҖеҸ‘дәәе‘ҳиҝҳеҸҜд»Ҙе®һзҺ°иҮӘе·ұзҡ„з”ЁжҲ·е®ҡд№үиҒҡеҗҲеҮҪж•°пјҲд№ҹеҸҜдҪңдёәеёҰ`over`еӯҗеҸҘзҡ„еҲҶжһҗеҮҪж•°дҪҝз”ЁпјүпјҢжҲ–дҪҝз”Ё`collect`еҮҪж•°е°ҶиЎҢиҒҡеҗҲеҲ°йӣҶеҗҲдёӯпјҢе№¶дҪҝз”Ёз”ЁжҲ·е®ҡд№үеҮҪж•°еҜ№е…¶еә”з”Ёд»»дҪ•йҖ»иҫ‘гҖӮеӨ§еӨҡж•°еҶ…зҪ®иҒҡеҗҲеҮҪж•°жҳҜеҸҜдәӨжҚўзҡ„пјҢеӣ жӯӨз»„еҶ…иЎҢзҡ„йЎәеәҸж— е…ізҙ§иҰҒпјӣз„¶иҖҢпјҢеғҸ`listagg`жҲ–`percentile_cont`иҝҷж ·зҡ„еҮҪж•°йңҖиҰҒ`within
    group`е…ій”®еӯ—еҗҺжҢҮе®ҡзҡ„йЎәеәҸгҖӮйЎәеәҸеҜ№дәҺ`collect`жҲ–`xmlagg`еҮҪж•°д№ҹеҫҲйҮҚиҰҒпјҢе№¶дё”еҸҜд»ҘеңЁеҮҪж•°жң¬иә«дёӯжҢҮе®ҡгҖӮ


    дёҺеҲҶжһҗеҮҪж•°жүҖзӨәзҡ„ж–№ејҸзұ»дјјпјҢOracleе…Ғи®ёжҲ‘д»¬дҪҝз”Ё`keep`е…ій”®еӯ—е’Ң`first`/`last`еҮҪж•°пјҢж №жҚ®жҢҮе®ҡзҡ„йЎәеәҸи®ҝй—®з»„дёӯзҡ„з¬¬дёҖдёӘпјҲжҲ–жңҖеҗҺдёҖдёӘпјүеҖјгҖӮиҝҷеңЁйңҖиҰҒжҹҘжүҫз»„дёӯзҡ„жңҖе°ҸжҲ–жңҖеӨ§еҖјд»ҘеҸҠзӣёеә”еұһжҖ§ж—¶йқһеёёжңүз”ЁгҖӮ


    жңүж—¶пјҢеҲҶз»„еҸҜд»Ҙеё®еҠ©йҒҝе…ҚйўқеӨ–зҡ„иҝһжҺҘпјӣз„¶иҖҢпјҢиҝҷз§Қжғ…еҶөзӣёеҪ“зҪ•и§ҒгҖӮжӯӨеӨ–пјҢеҲҶз»„еҸҜд»Ҙд»Јжӣҝ`pivot`жқҘвҖңжүҒе№іеҢ–вҖқж•°жҚ®пјҢдҪҶдҪҝз”ЁеҶ…зҪ®еҠҹиғҪжӣҙеҸҜеҸ–гҖӮ


    ## The connect by Clause


    `connect by`еӯҗеҸҘз”ЁдәҺжҹҘиҜўд»ҘзҲ¶еӯҗе…ізі»еӯҳеӮЁзҡ„еұӮж¬Ўз»“жһ„пјҢиҝҷд№ҹз§°дёәйӮ»жҺҘиЎЁжЁЎеһӢгҖӮз®ҖеҚ•ең°иҜҙпјҢиҜҘжЁЎеһӢж„Ҹе‘ізқҖдёәжҜҸдёӘеӯҗд»ЈеӯҳеӮЁдёҖдёӘзҲ¶-еӯҗеҜ№гҖӮйҖҡеёёпјҢйӮ»жҺҘиЎЁеҸҜд»ҘиЎЁзӨәжңүеҗ‘еӣҫпјҢиҖҢдёҚд»…д»…жҳҜеұӮж¬Ўж ‘пјӣеңЁиҝҷз§Қжғ…еҶөдёӢпјҢиҜҘеҲ—иЎЁжҸҸиҝ°дәҶеӣҫдёӯйЎ¶зӮ№зҡ„йӮ»еұ…йӣҶеҗҲгҖӮеӣ жӯӨпјҢйӮ»жҺҘиЎЁжЁЎеһӢиҢғеӣҙжӣҙе№ҝпјҢиҖҢзҲ¶-еӯҗжЁЎеһӢжҳҜе…¶е®һзҺ°д№ӢдёҖгҖӮ


    еҲ—иЎЁ[5-1]еұ•зӨәдәҶеҹәдәҺзҲ¶еӯҗе…ізі»жһ„е»әеұӮж¬Ўз»“жһ„е№¶дҪҝз”ЁOracleеұӮж¬ЎжҹҘиҜўдјӘеҲ—зҡ„жҹҘиҜўгҖӮ


    ```sql

    create table tree as

    select 2 id, 1 id_parent from dual

    union all select 3 id, 1 id_parent from dual

    union all select 4 id, 3 id_parent from dual

    union all select 5 id, 4 id_parent from dual

    union all select 11 id, 10 id_parent from dual

    union all select 12 id, 11 id_parent from dual

    union all select 13 id, 11 id_parent from dual;

    select connect_by_root id_parent root,

    level lvl,

    rpad('' '', (level - 1) * 3, '' '') || t.id as id,

    prior id_parent grand_parent,

    sys_connect_by_path(id, ''->'') path,

    connect_by_isleaf is_leaf

    from tree t

    start with t.id_parent in (1, 10)

    connect by prior t.id = t.id_parent;

    ROOT      LVL ID       GRAND_PARENT PATH          IS_LEAF

    -------- ----------- ------------------------ ---------------

    1      1 2                ->2                        1

    1      1 3                ->3                        0

    1      2    4           1 ->3->4                     0

    1      3       5        3 ->3->4->5                  1

    10      1 11               ->11                       0

    10      2    12         10 ->11->12                   1

    10      2    13         10 ->11->13                   1

    Listing 5-1

    Querying parent-child relationship

    ```


    жһ„е»әеұӮж¬Ўз»“жһ„еҝ…йЎ»жҢҮе®ҡпјҡ

    *   **ж №** вҖ“ еңЁзӨәдҫӢдёӯпјҢжҲ‘д»¬жһ„е»әдәҶж №зҲ¶IDзӯүдәҺ1е’Ң10зҡ„дёӨжЈөж ‘пјӣ

    *   зҲ¶дёҺеӯҗд№Ӣй—ҙзҡ„е…ізі»гҖӮ`prior`жҳҜдёҖдёӘдёҖе…ғиҝҗз®—з¬ҰпјҢиҝ”еӣһз»ҷе®ҡиЎЁиҫҫејҸпјҲйҖҡеёёжҳҜеҲ—пјүеҜ№дәҺеҪ“еүҚиЎҢзҡ„зӣҙжҺҘзҲ¶иЎҢзҡ„еҖјгҖӮ


    еҲ—иЎЁ[5-1]дёӯжј”зӨәзҡ„е…¶д»–еұӮж¬ЎжҹҘиҜўзү№жҖ§пјҡ

    *   `connect_by_root` вҖ“ дёҖе…ғиҝҗз®—з¬ҰпјҢиҝ”еӣһж №иЎҢзҡ„иЎЁиҫҫејҸеҖјгҖӮ

    *   `level` е’Ң `connect_by_isleaf` вҖ“ дјӘеҲ—пјҢеҲҶеҲ«иҝ”еӣһжҜҸдёӘиЎҢзҡ„еұӮж¬Ўж·ұеәҰпјҲеұӮзә§пјүд»ҘеҸҠиҠӮзӮ№жҳҜеҗҰдёәеҸ¶иҠӮзӮ№зҡ„ж Үеҝ—гҖӮ

    *   `sys_connect_by_path` вҖ“ еҮҪж•°пјҢиҝ”еӣһд»Һж №еҲ°е…·жңүз»ҷе®ҡеҲҶйҡ”з¬Ұзҡ„иҠӮзӮ№зҡ„и·Ҝеҫ„гҖӮ


    `prior`иҝҗз®—з¬ҰдёҚд»…еҸҜд»ҘеңЁ`connect by`еӯҗеҸҘдёӯдҪҝз”ЁпјҢд№ҹеҸҜд»ҘеңЁ`select`еҲ—иЎЁдёӯдҪҝз”ЁпјҢдҪҶе®ғеҸӘиғҪеҜ№з»ҷе®ҡиЎЁиҫҫејҸеә”з”ЁдёҖж¬ЎгҖӮдҫӢеҰӮпјҢеҰӮжһңзӣ®ж ҮжҳҜйҖүжӢ©еҗ‘дёҠдёӨзә§зҡ„зҲ¶IDпјҢйӮЈд№ҲеҸҜд»ҘеҜ№`id_parent`еҲ—еә”з”Ё`prior`
    вҖ“ еҸӮи§ҒеҲ—иЎЁ[5-1]дёӯ`grand_parent`зҡ„иЎЁиҫҫејҸгҖӮ


    `Connect by`дҪҝз”Ёж·ұеәҰдјҳе…Ҳжҗңзҙўж–№жі•йҒҚеҺҶеұӮж¬Ўз»“жһ„пјҢеӣ жӯӨеңЁеӨ„зҗҶеҗҢдёҖзә§еҲ«зҡ„дёӢдёҖдёӘиҠӮзӮ№д№ӢеүҚпјҢдјҡеӨ„зҗҶеҪ“еүҚиҠӮзӮ№зҡ„жүҖжңүеҗҺд»ЈгҖӮеҸҜд»ҘдҪҝз”ЁвҖңorder siblings
    byвҖқжқҘжҢҮе®ҡеҗҢдёҖзә§еҲ«еҶ…зҡ„йЎәеәҸгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢOracleд№ҹдјҡдҪҝз”Ёж·ұеәҰдјҳе…ҲжҗңзҙўпјҢдҪҶзҲ¶иҠӮзӮ№зҡ„еӯҗиҠӮзӮ№йЎәеәҸеҸҜиғҪдјҡж”№еҸҳгҖӮеҲ—иЎЁ[5-2]еұ•зӨәдәҶеңЁе…ҲеүҚжҹҘиҜўдёӯжҢҮе®ҡ`order
    siblings by t.id desc`еҗҺзҡ„з»“жһңгҖӮдёҚиғҪдҝқиҜҒз¬¬дёҖзә§иҠӮзӮ№дјҡжҢүз…§вҖңorder siblings byвҖқдёӯжҢҮе®ҡзҡ„йЎәеәҸжҺ’еәҸпјҢеӣ дёәжҲ‘д»¬ж— жі•иҜҙе®ғд»¬жңүдёҖдёӘе…ұеҗҢзҡ„зҲ¶иҠӮзӮ№гҖӮ


    ```

    select decode(grouping(client_id), 1, ''all clients'', client_id) as client_id,

    decode(grouping(product_id), 1, ''all products'', product_id) as product_id,

    sum(quantity) cnt,

    group_id() group_id

    from orders

    group by grouping sets(client_id, product_id,(),())

    order by client_id, product_id;

    CLIENT_ID       PRODUCT_ID             CNT   GROUP_ID

    --------------- --------------- ---------- ----------

    1               all products             7          0

    2               all products             4          0

    all clients     1                        3          0

    all clients     2                        2          0

    all clients     3                        1          0

    all clients     4                        3          0

    all clients     5                        2          0

    all clients     all products            11          0

    all clients     all products            11          1

    9 rows selected.

    ```


    Without these capabilities, the same result can be achieved using multiple table
    scans and groupings for each grouping set. On the other hand, itвҖҷs doable using
    a single table scan and Cartesian join with slices, but performance of built-in
    functionality will be better because itвҖҷs optimized to calculate aggregates by
    different attributes for the same recordset.


    ```sql

    select client_id, product_id, sum(quantity) cnt, slice

    from (select decode(instr(slice, ''client''), 0,

    ''all clients'', client_id) as client_id,

    decode(instr(slice, ''product''), 0,

    ''all products'', product_id) as product_id,

    quantity,

    slice

    from orders,

    (select ''client, product'' slice from dual

    union all select ''client'' from dual

    union all select ''grand total'' from dual))

    group by client_id, product_id, slice

    order by client_id, product_id;

    ```


    So pivot can be rewritten with group by, unpivot can be imitated with a Cartesian
    product, and group by cube/rollup/grouping sets can be replaced with a Cartesian
    product and simple group by. However, built-in capabilities not only make queries
    more concise and easier to understand but have noticeably better performance.


    The last thing to mention in this chapter is that aggregate functions can be nested
    or mixed up with analytic functions, which is explained in more detail in Chapter
    [9](#A455196_1_En_9_Chapter.html), вҖңLogical Execution Order of Query Clauses.вҖқ'
