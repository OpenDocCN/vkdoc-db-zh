    # 3. еҲҶжһҗеҮҪж•°


    еҹәзЎҖ SQL жҸҗдҫӣиЎҢзә§еҸҜи§ҒжҖ§пјҢиҖҢиҒҡеҗҲеҮҪж•°е…Ғи®ёжҲ‘д»¬жҢүз»„еҲҶжһҗж•°жҚ®пјҢдҪҝеҫ—жҜҸдёҖиЎҢж №жҚ® `group by` иЎЁиҫҫејҸеҜ№еә”еҲ°дёҖдёӘзү№е®ҡзҡ„з»„пјҲе…ідәҺиҒҡеҗҲеҮҪж•°зҡ„жӣҙеӨҡз»ҶиҠӮе°ҶеңЁдёӢдёҖз« вҖңиҒҡеҗҲеҮҪж•°вҖқдёӯжҸҗдҫӣпјүгҖӮ


    еҲҶжһҗеҮҪж•°еј•е…ҘдәҶзӘ—еҸЈзә§еҸҜи§ҒжҖ§гҖӮзӘ—еҸЈе®ҡд№үдәҶз”ЁдәҺеҜ№жҜҸдёӘиҫ“е…ҘиЎҢеә”з”ЁеҮҪж•°зҡ„иЎҢеӯҗйӣҶпјҢе…¶е®ҡд№үеҜ№жүҖжңүиЎҢйғҪжҳҜзӣёеҗҢзҡ„пјҢе№¶еңЁеҮҪж•°зҡ„ `analytic clause`пјҲеҲҶжһҗеӯҗеҸҘпјүдёӯжҢҮе®ҡгҖӮеҲҶжһҗеҮҪж•°еңЁиҜёеҰӮ
    `join`гҖҒ`where`гҖҒ`group by`гҖҒ`having` зӯүжүҖжңүж“ҚдҪңд№ӢеҗҺпјҢдҪҶеңЁ `order by` д№ӢеүҚиҝӣиЎҢжұӮеҖјгҖӮеӣ жӯӨпјҢдҫӢеҰӮпјҢе®ғд»¬еҸӘиғҪеҮәзҺ°еңЁ
    `select` еҲ—иЎЁжҲ– `order by` еӯҗеҸҘдёӯпјҢиҖҢдёҚиғҪеҮәзҺ°еңЁ `where` еӯҗеҸҘдёӯгҖӮдёҺеә”з”ЁиҒҡеҗҲеҮҪж•°еҗҺз»“жһңйӣҶдёӯжҜҸз»„з”ұдёҖиЎҢиЎЁзӨәдёҚеҗҢпјҢеә”з”ЁеҲҶжһҗеҮҪж•°еҗҺпјҢи®°еҪ•йӣҶдёӯзҡ„иЎҢж•°дҝқжҢҒдёҚеҸҳгҖӮ


    йҖҡиҝҮдёҖдёӘдҫӢеӯҗжқҘи§ЈйҮҠе…¶е·ҘдҪңеҺҹзҗҶдјҡжӣҙе®№жҳ“пјҢеҰӮжё…еҚ• 3-1 жүҖзӨәгҖӮ


    ```sql

    with t as

    (select rownum id, trunc(rownum / 4) part from dual connect by rownum <= 6)

    select t.*,

    sum(id) over(partition by part order by id) sum1,

    sum(id) over(partition by part) sum2

    from t

    order by id;

    ID       PART       SUM1       SUM2

    ---------- ---------- ---------- ----------

    1          0          1          6

    2          0          3          6

    3          0          6          6

    4          1          4         15

    5          1          9         15

    6          1         15         15

    6 rows selected.

    жё…еҚ• 3-1

    еҲҶжһҗеҮҪж•°

    ```


    `partition by part` ж„Ҹе‘ізқҖжҲ‘д»¬дёәжҜҸдёӘ `part` зӢ¬з«Ӣең°еә”з”ЁеҲҶжһҗеҮҪж•°гҖӮеҰӮжһңзңҒз•ҘпјҢеҲҷж•ҙдёӘи®°еҪ•йӣҶиў«и§ҶдёәдёҖдёӘеҲҶеҢәгҖӮеҰӮжһңжІЎжңү `order by`
    еӯҗеҸҘпјҢеҲҷжҜҸиЎҢзҡ„зӘ—еҸЈиҰҶзӣ–еҪ“еүҚеҲҶеҢәзҡ„жүҖжңүиЎҢпјҢеӣ жӯӨжүҖжңүиЎҢзҡ„з»“жһңйғҪзӣёеҗҢгҖӮдҪҝз”Ё `order by` еӯҗеҸҘж—¶пјҢжҜҸиЎҢзҡ„зӘ—еҸЈиҰҶзӣ–д»ҺеҲҶеҢәејҖе§ӢеҲ°еҪ“еүҚиЎҢзҡ„жүҖжңүиЎҢгҖӮиҝҷеҸҜд»ҘйҖҡиҝҮеңЁ
    `order by` еҗҺжҢҮе®ҡдёҖдёӘ `windowing clause`пјҲејҖзӘ—еӯҗеҸҘпјүжқҘи°ғж•ҙгҖӮеҪ“жҢҮе®ҡдәҶ `order by` ж—¶пјҢй»ҳи®ӨиЎҢдёәжҳҜ `range between
    unbounded preceding and current row`пјҲжҲ–з®ҖеҶҷдёә `range unbounded preceding`пјүпјӣеҗҰеҲҷжҳҜ `range
    between unbounded preceding and unbounded following`гҖӮ


    `partition by` еӯҗеҸҘдёҚжҳҜејәеҲ¶жҖ§зҡ„пјҢеҗҢж ·пјҢеңЁ `order by` еҗҺд№ҹеҸҜиғҪдёҚжҢҮе®ҡ `windowing clause`пјӣз„¶иҖҢпјҢеҜ№дәҺжҹҗдәӣеҮҪж•°пјҢеҝ…йЎ»е§Ӣз»ҲжҸҗдҫӣ
    `order by`вҖ”вҖ”дҫӢеҰӮпјҢеңЁдҪҝз”Ё `row_number` жҲ– `rank` зҡ„жғ…еҶөдёӢгҖӮ


    дҪҝз”ЁеҲҶжһҗеҮҪж•°е’ҢеҚ•иЎЁи®ҝй—®еҸҜд»Ҙе®һзҺ°зҡ„йҖ»иҫ‘пјҢеҗҰеҲҷе°ҶйңҖиҰҒйўқеӨ–зҡ„иҝһжҺҘжҲ–еӯҗжҹҘиҜўгҖӮжё…еҚ• 3-2 еұ•зӨәдәҶеҰӮдҪ•еңЁдёҚдҪҝз”ЁеҲҶжһҗеҮҪж•°зҡ„жғ…еҶөдёӢе®һзҺ°жё…еҚ• 3-1 дёӯзҡ„йҖ»иҫ‘гҖӮ


    ```sql

    with t as

    (select rownum id, trunc(rownum / 4) part from dual connect by rownum <= 6)

    select t.*,

    (select sum(id) from t t0 where t0.part = t.part and t0.id <= t.id) sum1,

    (select sum(id) from t t0 where t0.part = t.part) sum2

    from t

    order by id;

