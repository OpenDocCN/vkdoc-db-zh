    \ by`пјҲе·Ұ/еҸіиҝһжҺҘеҲҶеҢәдҫқжҚ®пјүгҖӮ\n*   еҸҰдёҖдёӘйқһеёёйҮҚиҰҒзҡ„ CBO зү№жҖ§жҳҜиҮӘеҠЁз”ҹжҲҗйҷ„еҠ и°“иҜҚпјҢд№ҹз§°дёәдј йҖ’й—ӯеҢ…пјҲMetalink ж–ҮжЎЈ ID 68979.1пјүгҖӮз®ҖеҚ•жқҘиҜҙпјҢеҰӮжһңжҲ‘д»¬д»ҺдёҖдёӘеҪўеҰӮ\
    \ `where t1.id = t2.id and t1.id = 1 and t2.id = 1` зҡ„жқЎд»¶дёӯз§»йҷӨз¬¬дәҢдёӘжҲ–з¬¬дёүдёӘи°“иҜҚпјҢе®ғе°Ҷдјҡиў«иҮӘеҠЁз”ҹжҲҗгҖӮ\n\
    *   дёӢдёҖдёӘиҰҒжҸҗеҸҠзҡ„иҪ¬жҚўжҳҜеҲ—жҠ•еҪұгҖӮжҠ•еҪұжҳҜдә”з§Қе…ізі»д»Јж•°ж“ҚдҪңд№ӢдёҖпјҡйҖүжӢ©гҖҒжҠ•еҪұгҖҒе№¶гҖҒе·®гҖҒиҝһжҺҘгҖӮIggy Fernandez ж’°еҶҷдәҶдёҖдәӣе…ідәҺе…ізі»д»Јж•°зҡ„дјҳз§Җе…Ҙй—Ёж–Үз« пјҡSQL\
    \ Sucks [5]пјҢExplaining the EXPLAIN PLAN [6]гҖӮдёәдәҶжј”зӨәеҲ—жҠ•еҪұпјҢи®©жҲ‘д»¬жү§иЎҢдёӢйқўзҡ„жҹҘиҜўпјҡ\n\n```\n    with\
    \ t_ as (select id, id, name from t)\n    select name from t_;\n    ```\n\nе®ғиҝ”еӣһдәҶз»“жһңиҖҢжІЎжңүд»»дҪ•й”ҷиҜҜпјҢеӣ дёәе®һйҷ…дёҠпјҢе®ғиў«иҪ¬жҚўдёәдёӢйқўзҡ„жҹҘиҜўпјҲеә”з”ЁжҠ•еҪұеҗҺпјҢеҸӘжңү\
    \ name еҲ—дҝқз•ҷпјүпјҡ\n\n```\n    SELECT \"T\".\"NAME\" \"NAME\" FROM \"T\" \"T\"\n   \
    \ ```\n\nеҸҰдёҖж–№йқўпјҢз”ұдәҺжҳҫиҖҢжҳ“и§Ғзҡ„еҺҹеӣ пјҢOracle дёҚе…Ғи®ёжҲ‘д»¬дҪҝз”ЁдёҠйқўзҡ„еёҰеӣ еӯҗжҹҘиҜўжқҘеҲӣе»әи§ҶеӣҫгҖӮеғҸи®ёеӨҡе…¶д»–жөҒиЎҢзҡ„е…ізі»ж•°жҚ®еә“з®ЎзҗҶзі»з»ҹдёҖж ·пјҢOracle\
    \ еә”з”ЁдәҶд»ҘдёӢеҗҜеҸ‘ејҸи§„еҲҷпјҡ\n    *   е°Ҫж—©иҝӣиЎҢжҠ•еҪұвҖңд»ҺиЎҢжәҗдёӯж¶ҲйҷӨдёҚеҝ…иҰҒзҡ„еҲ—вҖқпјӣ\n    *   е°Ҫж—©иҝӣиЎҢйҖүжӢ©вҖңиҝҮж»ӨжҺүдёҚеҝ…иҰҒзҡ„иЎҢвҖқгҖӮе®һйҷ…дёҠпјҢиҝҷж„Ҹе‘ізқҖеҶ…иЎЁдёҠзҡ„иҝһжҺҘеҗҺи°“иҜҚе°ҶеңЁиҝһжҺҘд№ӢеүҚеә”з”ЁгҖӮеңЁ\
    \ CBO зҡ„дёҠдёӢж–ҮдёӯпјҢиҝҷж„Ҹе‘ізқҖвҖңеҰӮжһңиҝҷж ·еҒҡиғҪдә§з”ҹжҲҗжң¬жӣҙдҪҺзҡ„и®ЎеҲ’пјҢеҲҷе°Ҫж—©еә”з”ЁвҖқгҖӮ\n*   дјҳеҢ–еҷЁи·ҹиёӘдёӯзҡ„жңҖз»ҲжҹҘиҜўеҸӘжҳҜеҜ№жңҖз»Ҳе°Ҷжү§иЎҢеҶ…е®№зҡ„ SQL зұ»иЎЁзӨәпјҢеңЁжүҖжңүжғ…еҶөдёӢеҸҜиғҪе№¶дёҚзӯүеҗҢдәҺеҺҹе§ӢжҹҘиҜўзҡ„иҜӯд№үгҖӮеңЁжҹҗдәӣжғ…еҶөдёӢпјҢеҺҹе§ӢжҹҘиҜўе’ҢжңҖз»ҲжҹҘиҜўзҡ„и®ЎеҲ’еҸҜиғҪдёҚеҗҢгҖӮжӯӨеӨ–пјҢжңҖз»ҲжҹҘиҜўеҸҜиғҪдёҚдјҡиҝ”еӣһдёҺеҺҹе§ӢжҹҘиҜўзӣёеҗҢзҡ„з»“жһңпјҢдҫӢеҰӮпјҢеӣ дёә\
    \ ANTI/SEMI иҝһжҺҘжІЎжңүзү№ж®Ҡзҡ„иЎЁзӨәжі•пјҢе®ғд»¬зҡ„и°“иҜҚеҸӘжҳҜеғҸзӣёзӯүи°“иҜҚйӮЈж ·жҳҫзӨәгҖӮ\n*   еҰӮеӣҫ 2-1 жүҖзӨәпјҢиҪ¬жҚўеҸ‘з”ҹеңЁи®ЎеҲ’з”ҹжҲҗд№ӢеүҚпјҢжҹҘиҜўжҸҗзӨәеңЁиҪ¬жҚўеҗҺеҸҜиғҪдјҡеҸҳеҫ—дёҚеҸҜз”ЁгҖӮдҫӢеҰӮпјҢеҰӮжһңеңЁи§ҶеӣҫеҗҲе№¶еҗҺеҶ…иҒ”и§Ҷеӣҫиў«ж¶ҲйҷӨпјҢе№¶дё”жӮЁеңЁжҸҗзӨәдёӯдҪҝз”ЁдәҶе®ғзҡ„еҲ«еҗҚпјҢйӮЈд№ҲиҜҘжҸҗзӨәе°ұдёҚеҶҚжңүж•ҲгҖӮ\n\
    \n## жҖ»з»“\n\nжҹҘиҜўиҪ¬жҚўдёәејҖеҸ‘иҖ…зј–еҶҷжҹҘиҜўжҸҗдҫӣдәҶжһҒеӨ§зҡ„зҒөжҙ»жҖ§пјҢе®ғд»¬дҪҝеҫ—жҹҘиҜўж–Үжң¬е·®ејӮеҫҲеӨ§зҡ„жҹҘиҜўжңҖз»ҲеҸҜиғҪжӢҘжңүзӣёеҗҢзҡ„жҹҘиҜўи®ЎеҲ’пјҢз”ҡиҮіеҸҜиғҪжҳҜзӣёеҗҢзҡ„жңҖз»ҲжҹҘиҜўж–Үжң¬гҖӮеҫ—зӣҠдәҺжҹҘиҜўиҪ¬жҚўпјҢжҲ‘д»¬ж— йңҖе…іеҝғжҹҘиҜўж“ҚдҪңзҡ„йЎәеәҸгҖӮдҫӢеҰӮпјҢеҰӮжһңжӮЁиҝһжҺҘдёӨдёӘиЎЁе№¶и®Ўз®—жҹҗдәӣиҒҡеҗҲпјҢOracle\
    \ е°ҶеҶіе®ҡе…ҲеҒҡд»Җд№ҲвҖ”вҖ”`group by` иҝҳжҳҜ `join`вҖ”вҖ”еҰӮжһңиҝҷж ·еҒҡжҳҜеҸҜиЎҢзҡ„гҖӮжӯӨеӨ–пјҢиҪ¬жҚўдҪҝжҲ‘д»¬иғҪеӨҹйҒҝе…Қд»Јз ҒйҮҚеӨҚвҖ”вҖ”дҫӢеҰӮпјҢжҲ–жү©еұ•еҸҜд»Ҙе°ҶдёҖдёӘжҹҘиҜўеұ•ејҖдёәеӨҡдёӘеёҰжңү\
    \ `union all` зҡ„еҲҶж”ҜпјҢиҖҢдј йҖ’й—ӯеҢ…жңүеҠ©дәҺйҒҝе…ҚвҖңдёҚеҝ…иҰҒвҖқзҡ„и°“иҜҚгҖӮ\n\nз„¶иҖҢпјҢиҪ¬жҚўеј•ж“Һе№¶йқһвҖңй“¶еј№вҖқпјҢејҖеҸ‘иҖ…еңЁзј–еҶҷжҹҘиҜўж—¶еә”йҒөеҫӘжңҖдҪіе®һи·өпјҢд»Ҙеё®еҠ©дјҳеҢ–еҷЁеҒҡеҮәжӯЈзЎ®зҡ„еҶізӯ–е№¶жһ„е»әжңҖдјҳи®ЎеҲ’гҖӮиҪ¬жҚўеј•ж“ҺжҒҗжҖ•ж°ёиҝңдёҚдјҡжҷәиғҪеҲ°еҸҜд»Ҙе®Ңе…ЁйҒҝе…ҚжүӢеҠЁжҹҘиҜўйҮҚеҶҷгҖӮ\n\
    \nйҷӨдәҶжҹҘиҜўиҪ¬жҚўд№ӢеӨ–пјҢSQL еј•ж“Һиҝҳеә”з”ЁдәҶи®ёеӨҡе…¶д»–иҪ¬жҚўпјҢдҫӢеҰӮе°Ҷ ANSI иҪ¬жҚўдёәжң¬ең°иҜӯжі•пјҢд»ҘеҸҠеҲ—жҠ•еҪұжҲ–еҲ—йҖүжӢ©зӯүеҗҜеҸ‘ејҸж–№жі•гҖӮ\n"
- fmt: '# 3. Analytic Functions


    Basic SQL provides row-level visibility, and aggregate functions allow us to analyze
    data in groups so that each row corresponds to one specific group according to
    `group by` expressions (more details about aggregate functions provided in the
    next chapter, вҖңAggregate FunctionsвҖқ).


    Analytic functions introduce window-level visibility. Window defines the subset
    of rows used to apply a function for each input row, and its definition is the
    same for all rows and is specified in the `analytic clause` of the function. Analytic
    functions are evaluated after all operations like `join`s, `where`, `group by`,
    `having` but before `order by` so they can appear only in `select` list or in
    `order by` clause but not in `where` clause, for example. The number of rows in
    a recordset remains the same after the analytic function is applied, unlike the
    number of rows after aggregate function is applied where each group is represented
    by one row in a result set.


    ItвҖҷs easier to explain how it works based on an example, as shown in Listing 3-1.


    ```sql

    with t as

    (select rownum id, trunc(rownum / 4) part from dual connect by rownum <= 6)

    select t.*,

    sum(id) over(partition by part order by id) sum1,

    sum(id) over(partition by part) sum2

    from t

    order by id;

    ID       PART       SUM1       SUM2

    ---------- ---------- ---------- ----------

    1          0          1          6

    2          0          3          6

    3          0          6          6

    4          1          4         15

    5          1          9         15

    6          1         15         15

    6 rows selected.

    Listing 3-1

    Analytic functions

    ```


    `partition by part` means that we apply an analytic function for each part independently.
    If itвҖҷs omitted, then the whole recordset is treated as one partition. Without
    an `order by` clause, window for each row covers all the rows for the current
    partition so the result is the same for all rows. With an `order by` clause, window
    for each row covers all rows from the beginning of the partition to the current
    row. This can be adjusted by specifying a `windowing clause` after `order by`
    while the default behavior is `range between unbounded preceding and current row`
    (or simply `range unbounded preceding`) when `order by` is specified; otherwise
    itвҖҷs `range between unbounded preceding and unbounded following`.


    `Partition by` clause is not mandatory as well as a `windowing clause` may not
    be specified after an `order by`; however, for some functions `order by` must
    be always provided вҖ“ for example, in case of `row_number` or `rank`.


    The logic that can be implemented using analytic functions and single table access
    would otherwise require additional joins or subqueries. Listing 3-2 shows how
    logic from Listing 3-1 can be implemented without analytic functions.


    ```sql

    with t as

    (select rownum id, trunc(rownum / 4) part from dual connect by rownum <= 6)

    select t.*,

    (select sum(id) from t t0 where t0.part = t.part and t0.id <= t.id) sum1,

    (select sum(id) from t t0 where t0.part = t.part) sum2

    from t

    order by id;

    ID       PART       SUM1       SUM2

    ---------- ---------- ---------- ----------

    1          0          1          6

    2          0          3          6

    3          0          6          6

    4          1          4         15

    5          1          9         15

    6          1         15         15

    6 rows selected.

    Listing 3-2

    Rewriting query without analytic functions

    ```


    Back to query transformations, Oracle cannot rewrite this query to use analytic
    functions and avoid unnecessary joins and table scans. Such an intelligence unlikely
    will be added in the near future.


    Analytic functions can help to avoid joins even if different columns are used
    in a join condition. In Listing 3-3, the same value is calculated using a correlated
    scalar subquery and analytic functions.


    ```sql

    exec dbms_random.seed(99);

    create table ta as

    select rownum id,

    trunc(dbms_random.value(1, 5 + 1)) x1,

    trunc(dbms_random.value(1, 5 + 1)) x2,

    trunc(dbms_random.value(1, 5 + 1)) x3

    from dual

    connect by level <= 10;

    select (select sum(x3) from ta t0 where t0.x2 = ta.x2) s,

    case when x1 > x2 then

    sum(x3) over(order by x2 range between greatest(x1 - x2, 0)

    following and greatest(x1 - x2, 0) following)

    else

    sum(x3) over(order by x2 range between greatest(x2 - x1, 0)

    preceding and greatest(x2 - x1, 0) preceding)

    end sa,

    ta.*

    from ta

    order by id;

    S         SA         ID         X1         X2         X3

    ---------- ---------- ---------- ---------- ---------- ----------

    4          4          1          3          1          2

    10         10          2          1          5          4

    1          1          3          2          5          1

    9          9          4          5          3          4

    4          4          5          3          1          1

    6          6          6          5          1          1

    7          7          7          5          3          1

    4          4          8          3          1          5

    9          9          9          5          2          1

    9          9         10          5          1          2

    10 rows selected .

    Listing 3-3

    Avoiding joins by using analytic functions

    ```


    In order to calculate a sum of `x3` for rows where `x2` equals to `x1`, we use
    a window with a range shift that equals the difference between `x1` and `x2`.
    Depending on whether `x1` is greater or less than `x2`, we consider the `following`
    or `preceding` rows. For each row we are interested only in one sum, but Oracle
    needs to calculate both for all rows, so to avoid an exception when `x1-x2` or
    `x2-x1` is negative we apply the `greatest` function.


    In addition to a logical offset by range, a window may be specified with a physical
    offset by rows. To highlight the difference letвҖҷs consider the following task.
    There is a table containing information about cash withdrawals from an ATM and
    we need to calculate for each withdrawal the following:


    *   For how many transactions the amount was not less than 50 considering the
    current transaction and the 5 preceding transactions вҖ“ 6 withdrawals in total
    (`cnt1`);

    *   For how many transactions the amount was not less than 50 considering the
    range between the current transaction and 5 preceding minutes (`cnt2`).


    ```sql

    exec dbms_random.seed(11);

    create table atm as

    select trunc(sysdate) + (2 * rownum - 1) / (24 * 60) ts,

    trunc(dbms_random.value(1, 20 + 1)) * 5 amount

    from dual

    connect by level <= 15;

    select to_char(ts, ''mi'') minute,

    amount,

    count(nullif(sign(amount - 50), -1))

    over(order by ts rows 5 preceding) cnt1,

    count(nullif(sign(amount - 50), -1))

    over(order by ts range interval ''5'' minute preceding) cnt2

    from atm;

    MI     AMOUNT       CNT1       CNT2

    -- ---------- ---------- ----------

    01         85          1          1

    03         15          1          1

    05        100          2          2

    07         40          2          1

    09         30          2          1

    11         50          3          1

    13         85          3          2

    15         60          4          3

    17          5          3          2

    19        100          4          2

    21         25          4          1

    23         30          3          1

    25         80          3          1

    27          5          2          1

    29         35          2          1

    15 rows selected .

    Listing 3-4

    Implementing logic using windowing clause

    ```


    A bit simpler example to highlight the difference between offset by range and
    by rows is in Listing 3-5.'
