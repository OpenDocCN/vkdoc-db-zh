    View merging transformation may be affected using hints merge/no_merge; however
    if we turn off this transformation for the above query, then another one will
    be appliedВ вҖ“ filter push down. To completely disable all the transformations we
    can use a no_query_transformation hint. The original and final query after transformations
    in this case is below in Listing [2-11](#A455196_1_En_2_Chapter.html#Par34).


    ```

    select --+ no_query_transformation

    name, cnt

    from t3

    join (select id, max(name) name, count(*) cnt from tr group by id) sub

    on sub.id = t3.id;

    select "from$_subquery$_004"."NAME_0" "NAME",

    "from$_subquery$_004"."CNT_1"  "CNT"

    from (select "SUB"."NAME" "NAME_0", "SUB"."CNT" "CNT_1"

    from "T3",

    (select "TR"."ID" "ID",

    max("TR"."NAME") "NAME",

    count(*) "CNT"

    from "TR"

    group by "TR"."ID") "SUB"

    where "SUB"."ID" = "T3"."ID") "from$_subquery$_004"

    Listing 2-11

    Original and final query with disabled transformations

    ```


    As you see, ANSI syntax was converted into Oracle native syntax even though all
    the transformations are disabled. This will be more than 100 times slower than
    the original one with enabled transformations.


    In some rare cases both cost-based and heuristic transformations may lead to degraded
    performance; however itвҖҷs better to narrow down the root case and disable specific
    transformations rather than all of them.


