    Listing 12-1

    Converting hexadecimal value into decimal

    ```


    Listing [12-2](#A455196_1_En_12_Chapter.html#Par7) shows the SQL approach to convert
    a string from an arbitrary alphabet.


    ```

    select sum(power(base, level - 1) *

    (instr(:alphabet, substr(:x, -level, 1)) - 1)) num

    from (select length(:alphabet) base from dual)

    connect by level <= length(:x);

    NUM


    Listing 12-2

    Converting string in arbitrary alphabet into decimal in SQL

    ```


    Similar logic can be implemented in PL/SQL as shown in Listing [12-3](#A455196_1_En_12_Chapter.html#Par9).


    ```

    create or replace function f_10base(p_x        in varchar,

    p_alphabet in varchar

    default ''0123456789ABCDEF'')

    return number is

    result number := 0;

    l_base int := length(p_alphabet);

    begin

    for i in 1 .. length(p_x) loop

    result := result + power(l_base, i - 1) *

    (instr(p_alphabet, substr(p_x, -i, 1)) - 1);

    end loop;

    return result;

    end f_10base;

    Listing 12-3

    Converting from arbitrary alphabet into decimal in PL/SQL

    ```


    LetвҖҷs compare the performance of the two approaches.


    ```

    select sum(f_10base(''ABC'' || rownum)) f from dual connect by level <= 1e6;

    F


    4.1760E+16

    Elapsed: 00:00:16.61

    select sum(num) f

    from (select (select sum(power(base, level - 1) *

    (instr(:alphabet, substr(x, -level, 1)) - 1)) num

    from (select length(:alphabet) base from dual)

    connect by level <= length(x)) num

    from (select ''ABC'' || rownum x from dual connect by level <= 1e6));

    F


    4.1760E+16

    Elapsed: 00:00:25.53

    ```


    As you see, the PL/SQL solution is faster; nevertheless the context switches.
    You can use dbms_hprof and dbms_xplan with runtime execution statistics to check
    in more detail where the time is spent for the PL/SQL and SQL approach correspondingly.


    To complete the picture letвҖҷs measure timing for a built-in function.


    ```

    select sum(to_number(''ABC'' || rownum, lpad(''X'', 10, ''X''))) f

    from dual

    connect by level <= 1e6;

    F


    4.1760E+16

    Elapsed: 00:00:01.11

    ```


    The performance of an external C function would be approximately the same as for
    a built-in function. This task demonstrates that in some cases neither SQL nor
    PL/SQL is the best approach if performance is critical.


    ## Connected Components


    Graph theory is a huge subject with a number of terms, list of typical tasks,
    and various ways of representing the graphs. RDBMSs are not the best tool to work
    with generic graphs but SQL may be very efficient in working with specific classes
    of graphs known as hierarchies.


    In real life you may face tasks with various types of graphs, and itвҖҷs quite important
    to understand how this challenge can be approached, so this and the next quiz
    are a quick touch on the subject.


    In the current task letвҖҷs consider an undirected graph that is represented as
    a list of edges and shown on Figure [12-1](#A455196_1_En_12_Chapter.html#Fig1).


    ![A455196_1_En_12_Fig1_HTML.jpg](A455196_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Connected components


    ```

    create table edge(x1, x2) as

    select 10,20 from dual

    union all select 50,40 from dual

    union all select 20,30 from dual

    union all select 20,40 from dual

    union all select 60,70 from dual

    union all select 80,60 from dual

    union all select 20,90 from dual;

    ```


    The goal is to number the connected components. The result for the data above
    is this:


    ```

    X        GRP

    ---------- ----------

    10          1

    20          1

    30          1

    40          1

    50          1

    60          2

    70          2

    80          2

    90          1

    9 rows selected.

    ```


    So each node belongs to one of the two connected components in this example, and
    itвҖҷs not critical which one is first and which one is second.


    ### Solution


    Listing [12-4](#A455196_1_En_12_Chapter.html#Par24) shows an SQL approach to number
    connected components.


    ```

    select x, dense_rank() over(order by min(root)) grp

    from (select connect_by_root x1 root, x1, x2

    from edge

    connect by nocycle prior x1 in (x1, x2)

    or prior x2 in (x1, x2))

    unpivot(x for x12 in(x1, x2))

    group by x

    order by 1, 2;

    Listing 12-4

    Numbering connected components in SQL

    ```


    Given that the graph is undirected, edge X1В вҖ“ X2 means that nodes may be traversed
    from X1 to X2 and the other way around; thus all the combinations of parentвҖ“child
    relations have been specified in the connect by condition to handle this.


    Please pay attention that there is no start with clause, so for each edge we are
    building all connected edges and then use pivot to return all the connected nodes
    in column X. Finally, for each node we derive a minimal root (which is defined
    as the starting value for X1 but similarly it may be the starting value for X2)
    and number the connected components using dense_rank.


    The query looks quite concise but in fact itвҖҷs very inefficient because the same
    edges are traversed multiple times, but this is the only way to consider all possible
    connections.


    The PL/SQL approach , however, may be very efficient and itвҖҷs demonstrated in
    Listing [12-5](#A455196_1_En_12_Chapter.html#Par29). The required result can be
    achieved with a single table scan and fast look-ups in associative arrays.


    ```

    create or replace type to_2int as object (x int, grp int)

    /

    create or replace type tt_2int as table of to_2int

    /

    create or replace function f_connected_component return tt_2int

    pipelined is

    i_list number := 0;

    i      number;

    n      number;

    k      number;

    type tp1 is table of binary_integer index by binary_integer;

    type tp2 is table of tp1 index by binary_integer;

    t1 tp1;

    t2 tp2;

    begin

    for c in (select x1, x2 from edge) loop

    if not t1.exists(c.x1) and not t1.exists(c.x2) then

    i_list := i_list + 1;

    t1(c.x1) := i_list;

    t1(c.x2) := i_list;

    t2(i_list)(c.x1) := null;

    t2(i_list)(c.x2) := null;

    elsif t1.exists(c.x1) and not t1.exists(c.x2) then

    t1(c.x2) := t1(c.x1);

    t2(t1(c.x1))(c.x2) := null;

    elsif t1.exists(c.x2) and not t1.exists(c.x1) then

    t1(c.x1) := t1(c.x2);

    t2(t1(c.x2))(c.x1) := null;

    elsif t1.exists(c.x1) and t1.exists(c.x2) and t1(c.x1)  t1(c.x2) then

    n := greatest(t1(c.x1), t1(c.x2));

    k := least(t1(c.x1), t1(c.x2));

    i := t2(n).first;

    while (i is not null) loop

    t2(k)(i) := null;

    t1(i) := k;

    i := t2(n).next(i);

    end loop;

    t2.delete(n);

    end if;

    end loop;

    i := t1.first;

    for idx in 1 .. t1.count loop

    pipe row(to_2int(i, t1(i)));

    i := t1.next(i);

    end loop;

    end;

    Listing 12-5

    Numbering connected components in PL/SQL

    ```


    The T1 array contains an index of a connected component for each node. The T2
    array is the list of components where a component is an array of nodes. In fact,
    t2 was introduced for performance reasons, because if nodes for some edges belong
    to different components, then we need to re-renumber nodes for one of the components,
    and a list of nodes for each component makes this operation very fast.


    ```

    select x, dense_rank() over(order by grp) grp

    from table(f_connected_component)

    order by x;

    ```


    The efficiency of two approaches in non-comparable and, frankly speaking, SQL
    approach for this task is not reasonable at all. You can use the approach below
    to generate unique edges:


    ```

    exec dbms_random.seed(11);

    create table edge as

    select trunc(dbms_random.value(1, 100)) x1,

    trunc(dbms_random.value(1, 100)) x2

    from dual

    connect by level <= 61;

    select count(distinct least(x1, x2) || '' '' || greatest(x1, x2)) from edge;

    ```


    The PL/SQL approach takes a couple of milliseconds while an SQL query takes more
    than 3 minutes to execute on my laptop. If you add a few more elements, PL/SQL
    execution time still will be milliseconds while an SQL approach will take hours.'
