    '
- fmt: '# 4. Aggregate Functions


    Aggregate functions return one row for each group defined in a `group by` clause.
    Both column names and expressions can be used to define groups, and one group
    is a set of rows with the same values for all expressions specified in `group
    by`. Each row belongs to one and only one group. If `group by` is not specified,
    then the entire recordset is a single group, and in this case query always returns
    one row even if the recordset to be grouped is empty.


    Listing `4-1` shows how to calculate the total amount of presentations and count
    of working days for all authors based on tables introduced in Listing `1-58` in
    Chapter `1`.


    ```sql

    select p.name,

    count(*) cnt_all,

    count(distinct p.day) cnt_day,

    listagg(p.day || '' '' || p.time || '':00'', ''; '') within group(order by w.id)
    details

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME    CNT_ALL    CNT_DAY DETAILS

    ---- ---------- ---------- ------------------------------------

    John          3          2 monday 14:00; monday 9:00; friday 9:00

    Rex            2             2 wednesday 11:00; friday 11:00

    Listing 4-1

    Aggregate functions. Simple example

    ```


    Only distinct values are passed to an aggregate function when a `distinct` keyword
    is specified. `listagg` function was used to display details for all presentations,
    as this was pointed out in the previous chapter вҖ“ `listagg` is not commutative
    and order must be specified after `within group` keywords. There are some other
    aggregate functions whose result depends on the order within a group, for instance
    - `percentile_cont` (see quiz вҖңPercentile with ShiftвҖқ in Part II for a more complicated
    example).


    Most of the aggregate functions return a result of the atomic type, which is the
    same as a type of argument вҖ“ for example, `number`, `date`, `varchar2`, etc. However,
    some functions just combine values together instead of calculating a result value
    based on input вҖ“ for example, `collect` and `xmlagg`.


    UDFs can be applied on top of the `collect` function to process elements for each
    group. The `collagg` function below may be used to concatenate collection elements.


    ```sql

    create or replace function collagg(p in strings) return varchar is

    result varchar2(4000);

    begin

    for i in 1 .. p.count loop

    result := result || '', '' || p(i);

    end loop;

    return(substr(result, 3));

    end collagg;

    /

    Listing 4-2

    Concatenating collection elements

    ```


    Where `strings` is a collection defined as


    ```sql

    create or replace type strings as table of varchar2(4000)

    /

    ```


    Listing `4-3` shows how to get a list of all days with presentations per presenter
    as well as a list of distinct days.


    ```sql

    select name,

    collagg(cast(collect(p.day order by w.id desc) as strings)) days,

    collagg(set(cast(collect(p.day order by w.id desc) as strings))) days_unique

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME DAYS                           DAYS_UNIQUE

    ---- ------------------------------ ---------------------------

    John friday, monday, monday         friday, monday

    Rex  friday, wednesday              friday, wednesday

    Listing 4-3

    Using collect function

    ```


    Unlike `listagg`, `order by` is specified in the function itself, and `distinct`
    keyword is not allowed in `collect` but the `set` function can be used to eliminate
    duplicates. Even though `set` function seems to preserve the order of elements
    вҖ“ there is no guarantee that itвҖҷs true in all cases.


    Similar logic including ordering can be implemented using `xmlagg` as shown in
    the expression below, but elimination of duplicates is not possible in this case
    without an additional inline view.


    ```sql

    substr(xmlagg(xmlelement("x", '', '' || p.day) order by w.id desc)

    .extract(''//x/text()'')

    .getstringval(), 3) x

    ```


    In addition to built-in aggregate functions, Oracle (since version 9i Release
    1) provides an interface for user-defined aggregates (UDAG) that can be leveraged
    to implement any complex logic for grouping. For example, there is a single-row
    function `bitand` which does not have an aggregate analog. If necessary this logic
    can be implemented using UDF + `collect` or UDAG.


    In a previous chapter it was shown how analytic functions may help to avoid joins,
    and aggregate functions can also be used for this purpose.


    For example, a `requirements` table contains information about positions and corresponding
    skills. The goal is to get positions that require `Oracle` knowledge without `Linux`.


    ```sql

    create table requirements(position, skill) as

    (

    select ''Data Scientist'', ''R'' from dual

    union all select ''Data Scientist'', ''Python'' from dual

    union all select ''Data Scientist'', ''Spark'' from dual

    union all select ''DB Developer'', ''Oracle'' from dual

    union all select ''DB Developer'', ''Linux'' from dual

    union all select ''BI Developer'', ''Oracle'' from dual

    union all select ''BI Developer'', ''MSSQL'' from dual

    union all select ''BI Developer'', ''Analysis Services'' from dual

    union all select ''System Administrator'', ''Linux'' from dual

    union all select ''System Administrator'', ''Network Protocols'' from dual

    union all select ''System Administrator'', ''Python'' from dual

    union all select ''System Administrator'', ''Perl'' from dual

    );

    ```


    A straightforward solution is shown below.


    ```sql

    select position

    from requirements r

    where skill = ''Oracle''

    and not exists (select null

    from requirements r0

    where r0.position = r.position

    and r0.skill = ''Linux'');

    POSITION


    BI Developer

    ```


    The main disadvantage of this solution is a correlated subquery in a `where` clause
    that causes an additional scan of the `requirements` table.


    An alternative approach would be to calculate counts for `Oracle` and `Linux`
    skills and filter out those that do not satisfy.


    ```sql

    select position

    from requirements

    group by position

    having count(decode(skill, ''Oracle'', 1)) = 1

    and count(decode(skill, ''Linux'', 1)) = 0;

    POSITION


    BI Developer

    ```


    This solution is more preferable from a performance point of view, and you may
    notice that aggregate functions are used only for filtering purposes and not in
    a `select` list.


    LetвҖҷs consider a more generic example. A tables `entity` and `property` are used
    to implement an entityвҖ“attributeвҖ“value (EAV) model вҖ“ this approach is used in
    database design to store entities with variable number of attributes in a single
    table.


    ```sql

    with entity(id, name) as

    (select 1, ''E1'' from dual

    union all select 2, ''E2'' from dual

    union all select 3, ''E3'' from dual),

    property(id, entity_id, name, value) as

    (select 1, 1, ''P1'', 1 from dual

    union all select 2, 1, ''P2'', 10 from dual

    union all select 3, 1, ''P3'', 20 from dual

    union all select 4, 1, ''P4'', 50 from dual

    union all select 5, 2, ''P1'', 1 from dual

    union all select 6, 2, ''P3'', 100 from dual

    union all select 7, 2, ''P4'', 50 from dual

    union all select 8, 3, ''P1'', 1 from dual

    union all select 19, 3, ''P2'', 10 from dual

    union all select 10, 3, ''P3'', 100 from dual)

    Listing 4-4

    EAV model

    ```


    Our goal is to select entities with values for attributes `P1`, `P2`, `P3` equal
    to 1, 10, 100 correspondingly, and properties are supposed to be unique for each
    entity. Sometimes developers use multiple joins to achieve this, which is very
    inefficient вҖ“ in fact, the number of joins equals to the number of attributes
    we are interested in.


    ```sql

    select e.name

    from entity e

    join property p1 on p1.entity_id = e.id and p1.name = ''P1''

    join property p2 on p2.entity_id = e.id and p2.name = ''P2''

    join property p3 on p3.entity_id = e.id and p3.name = ''P3''

    where p1.value = 1 and p2.value = 10 and p3.value = 100;

    NAME


    E3

    ```


    If we required getting values for 20 attributes, this would cause 20 joins, which
    is not a viable solution at all.


    Taking into account that for each property there may be either one value or no
    values at all, we can flatten properties for each entity in one row and apply
    a filter on top of that.'
  raw: '# 4.В Aggregate Functions


    Aggregate functions return one row for each group defined in a group by clause.
    Both column names and expressions can be used to define groups, and one group
    is a set of rows with the same values for all expressions specified in вҖңgroup
    by.вҖқ Each row belongs to one and only one group. If вҖңgroup byвҖқ is not specified,
    then the entire recordset is a single group, and in this case query always returns
    one row even if the recordset to be grouped is empty.


    Listing [4-1](#A455196_1_En_4_Chapter.html#Par3) shows how to calculate the total
    amount of presentations and count of working days for all authors based on tables
    introduced in Listing [1-58](#A455196_1_En_1_Chapter.html#Par174) in Chapter [1](#A455196_1_En_1_Chapter.html).


    ```

    select p.name,

    count(*) cnt_all,

    count(distinct p.day) cnt_day,

    listagg(p.day || '' '' || p.time || '':00'', ''; '') within group(order by w.id)
    details

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME    CNT_ALL    CNT_DAY DETAILS

    ---- ---------- ---------- ------------------------------------

    John          3          2 monday 14:00; monday 9:00; friday 9:00

    Rex            2             2 wednesday 11:00; friday 11:00

    Listing 4-1

    Aggregate functions. Simple example

    ```


    Only distinct values are passed to an aggregate function when a distinct keyword
    is specified. Listagg function was used to display details for all presentations,
    as this was pointed out in the previous chapterВ вҖ“ listagg is not commutative and
    order must be specified after вҖңwithin groupвҖқ keywords. There are some other aggregate
    functions whose result depends on the order within a group, for instance - percentile_cont
    (see quiz вҖңPercentile with ShiftвҖқ in Part II for a more complicated example).


    Most of the aggregate functions return a result of the atomic type , which is
    the same as a type of argumentВ вҖ“ for example, number, date, varchar2, etc. However,
    some functions just combine values together instead of calculating a result value
    based on inputВ вҖ“ for example, collect and xmlagg.


    UDFs can be applied on top of the collect function to process elements for each
    group. The collagg function below may be used to concatenate collection elements.


    ```

    create or replace function collagg(p in strings) return varchar is

    result varchar2(4000);

    begin

    for i in 1 .. p.count loop

    result := result || '', '' || p(i);

    end loop;

    return(substr(result, 3));

    end collagg;

    /

    Listing 4-2

    Concatenating collection elements

    ```


    Where strings is a collection defined as


    ```

    create or replace type strings as table of varchar2(4000)

    /

    ```


    Listing [4-3](#A455196_1_En_4_Chapter.html#Par11) shows how to get a list of all
    days with presentations per presenter as well as a list of distinct days.


    ```

    select name,

    collagg(cast(collect(p.day order by w.id desc) as strings)) days,

    collagg(set(cast(collect(p.day order by w.id desc) as strings))) days_unique

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME DAYS                           DAYS_UNIQUE

    ---- ------------------------------ ---------------------------

    John friday, monday, monday         friday, monday

    Rex  friday, wednesday              friday, wednesday

    Listing 4-3

    Using collect function

    ```


    Unlike listagg, order by is specified in the function itself, and distinct keyword
    is not allowed in collect but the set function can be used to eliminate duplicates.
    Even though set function seems to preserve the order of elementsВ вҖ“ there is no
    guarantee that itвҖҷs true in all cases.


    Similar logic including ordering can be implemented using xmlagg as shown in the
    expression below, but elimination of duplicates is not possible in this case without
    an additional inline view.


    ```

    substr(xmlagg(xmlelement("x", '', '' || p.day) order by w.id desc)

    .extract(''//x/text()'')

    .getstringval(), 3) x

    ```


    In addition to built-in aggregate functions, Oracle (since version 9i Release
    1) provides an interface for user-defined aggregates (UDAG) that can be leveraged
    to implement any complex logic for grouping. For example, there is a single-row
    function bitand which does not have an aggregate analog. If necessary this logic
    can be implemented using UDF + collect or UDAG.


    In a previous chapter it was shown how analytic functions may help to avoid joins,
    and aggregate functions can also be used for this purpose.


    For example, a requirements table contains information about positions and corresponding
    skills. The goal is to get positions that require Oracle knowledge without Linux.


    ```

    create table requirements(position, skill) as

    (

    select ''Data Scientist'', ''R'' from dual

    union all select ''Data Scientist'', ''Python'' from dual

    union all select ''Data Scientist'', ''Spark'' from dual

    union all select ''DB Developer'', ''Oracle'' from dual

    union all select ''DB Developer'', ''Linux'' from dual

    union all select ''BI Developer'', ''Oracle'' from dual

    union all select ''BI Developer'', ''MSSQL'' from dual

    union all select ''BI Developer'', ''Analysis Services'' from dual

    union all select ''System Administrator'', ''Linux'' from dual

    union all select ''System Administrator'', ''Network Protocols'' from dual

    union all select ''System Administrator'', ''Python'' from dual

    union all select ''System Administrator'', ''Perl'' from dual

    );

    ```


    A straightforward solution is shown below.


    ```

    select position

    from requirements r

    where skill = ''Oracle''

    and not exists (select null

    from requirements r0

    where r0.position = r.position

    and r0.skill = ''Linux'');

    POSITION


    BI Developer

    ```


    The main disadvantage of this solution is a correlated subquery in a where clause
    that causes an additional scan of the requirements table.


    An alternative approach would be to calculate counts for Oracle and Linux skills
    and filter out those that do not satisfy.


    ```

    select position

    from requirements

    group by position

    having count(decode(skill, ''Oracle'', 1)) = 1

    and count(decode(skill, ''Linux'', 1)) = 0;

    POSITION


    BI Developer

    ```


    This solution is more preferable from a performance point of view, and you may
    notice that aggregate functions are used only for filtering purposes and not in
    a select list.


    LetвҖҷs consider a more generic example. A tables entity and property are used to
    implement an entityвҖ“attributeвҖ“value (EAV) model В вҖ“ this approach is used in database
    design to store entities with variable number of attributes in a single table.


    ```

    with entity(id, name) as

    (select 1, ''E1'' from dual

    union all select 2, ''E2'' from dual

    union all select 3, ''E3'' from dual),

    property(id, entity_id, name, value) as

    (select 1, 1, ''P1'', 1 from dual

    union all select 2, 1, ''P2'', 10 from dual

    union all select 3, 1, ''P3'', 20 from dual

    union all select 4, 1, ''P4'', 50 from dual

    union all select 5, 2, ''P1'', 1 from dual

    union all select 6, 2, ''P3'', 100 from dual

    union all select 7, 2, ''P4'', 50 from dual

    union all select 8, 3, ''P1'', 1 from dual

    union all select 19, 3, ''P2'', 10 from dual

    union all select 10, 3, ''P3'', 100 from dual)

    Listing 4-4

    EAV model

    ```


    Our goal is to select entities with values for attributes P1, P2, P3 equal to
    1, 10, 100 correspondingly, and properties are supposed to be unique for each
    entity. Sometimes developers use multiple joins to achieve this, which is very
    inefficientВ вҖ“ in fact, the number of joins equals to the number of attributes
    we are interested in.


    ```

    select e.name

    from entity e

    join property p1 on p1.entity_id = e.id and p1.name = ''P1''

    join property p2 on p2.entity_id = e.id and p2.name = ''P2''

    join property p3 on p3.entity_id = e.id and p3.name = ''P3''

    where p1.value = 1 and p2.value = 10 and p3.value = 100;

    NAME


    E3

    ```


    If we required getting values for 20 attributes, this would cause 20 joins, which
    is not a viable solution at all.


    Taking into account that for each property there may be either one value or no
    values at all, we can flatten properties for each entity in one row and apply
    a filter on top of that.'
  trans: '# 4. иҒҡеҗҲеҮҪж•°


    иҒҡеҗҲеҮҪж•°еҜ№ `group by` еӯҗеҸҘдёӯе®ҡд№үзҡ„жҜҸдёӘз»„иҝ”еӣһдёҖиЎҢгҖӮеҲ—еҗҚе’ҢиЎЁиҫҫејҸйғҪеҸҜз”ЁдәҺе®ҡд№үз»„пјҢдёҖдёӘз»„жҳҜжҢҮ `group by` дёӯжҢҮе®ҡзҡ„жүҖжңүиЎЁиҫҫејҸеҖјйғҪзӣёеҗҢзҡ„иЎҢйӣҶеҗҲгҖӮжҜҸиЎҢеұһдәҺдё”д»…еұһдәҺдёҖдёӘз»„гҖӮеҰӮжһңжңӘжҢҮе®ҡ
    `group by`пјҢеҲҷж•ҙдёӘи®°еҪ•йӣҶиў«и§ҶдёәдёҖдёӘеҚ•дёҖз»„пјҢиҝҷз§Қжғ…еҶөдёӢпјҢеҚідҪҝиҰҒеҲҶз»„зҡ„и®°еҪ•йӣҶдёәз©әпјҢжҹҘиҜўд№ҹе§Ӣз»Ҳиҝ”еӣһдёҖиЎҢгҖӮ


    д»Јз Ғжё…еҚ• `4-1` еұ•зӨәдәҶеҰӮдҪ•еҹәдәҺз¬¬ `1` з« д»Јз Ғжё…еҚ• `1-58` дёӯеј•е…Ҙзҡ„иЎЁпјҢи®Ўз®—жүҖжңүдҪңиҖ…зҡ„жҠҘе‘ҠжҖ»ж¬Ўж•°е’Ңе·ҘдҪңж—Ҙж•°гҖӮ


    ```sql

    select p.name,

    count(*) cnt_all,

    count(distinct p.day) cnt_day,

    listagg(p.day || '' '' || p.time || '':00'', ''; '') within group(order by w.id)
    details

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME    CNT_ALL    CNT_DAY DETAILS

    ---- ---------- ---------- ------------------------------------

    John          3          2 monday 14:00; monday 9:00; friday 9:00

    Rex            2             2 wednesday 11:00; friday 11:00

    Listing 4-1

    иҒҡеҗҲеҮҪж•°гҖӮз®ҖеҚ•зӨәдҫӢ

    ```


    еҪ“жҢҮе®ҡ `distinct` е…ій”®еӯ—ж—¶пјҢеҸӘжңүдёҚеҗҢзҡ„еҖјжүҚдјҡиў«дј йҖ’з»ҷиҒҡеҗҲеҮҪж•°гҖӮ`listagg` еҮҪж•°з”ЁдәҺжҳҫзӨәжүҖжңүжҠҘе‘Ҡзҡ„иҜҰз»ҶдҝЎжҒҜпјҢжӯЈеҰӮеүҚдёҖз« жҢҮеҮәзҡ„вҖ”вҖ”`listagg`
    дёҚжҳҜеҸҜдәӨжҚўзҡ„пјҢе№¶дё”еҝ…йЎ»еңЁ `within group` е…ій”®еӯ—еҗҺжҢҮе®ҡйЎәеәҸгҖӮиҝҳжңүдёҖдәӣе…¶д»–иҒҡеҗҲеҮҪж•°пјҢе…¶з»“жһңдҫқиө–дәҺз»„еҶ…зҡ„йЎәеәҸпјҢдҫӢеҰӮ `percentile_cont`пјҲжӣҙеӨҚжқӮзҡ„дҫӢеӯҗиҜ·еҸӮи§Ғз¬¬дәҢйғЁеҲҶдёӯзҡ„жөӢйӘҢвҖңеёҰеҒҸз§»зҡ„зҷҫеҲҶдҪҚж•°вҖқпјүгҖӮ


    еӨ§еӨҡж•°иҒҡеҗҲеҮҪж•°иҝ”еӣһеҺҹеӯҗзұ»еһӢзҡ„з»“жһңпјҢе…¶зұ»еһӢдёҺеҸӮж•°зұ»еһӢзӣёеҗҢвҖ”вҖ”дҫӢеҰӮ `number`гҖҒ`date`гҖҒ`varchar2` зӯүгҖӮз„¶иҖҢпјҢжңүдәӣеҮҪж•°еҸӘжҳҜе°ҶеҖјз»„еҗҲеңЁдёҖиө·пјҢиҖҢдёҚжҳҜеҹәдәҺиҫ“е…Ҙи®Ўз®—з»“жһңеҖјвҖ”вҖ”дҫӢеҰӮ
    `collect` е’Ң `xmlagg`гҖӮ


    з”ЁжҲ·е®ҡд№үеҮҪж•°пјҲUDFпјүеҸҜд»Ҙеә”з”ЁдәҺ `collect` еҮҪж•°д№ӢдёҠпјҢд»ҘеӨ„зҗҶжҜҸз»„зҡ„е…ғзҙ гҖӮдёӢйқўзҡ„ `collagg` еҮҪж•°еҸҜз”ЁдәҺиҝһжҺҘйӣҶеҗҲе…ғзҙ гҖӮ


    ```sql

    create or replace function collagg(p in strings) return varchar is

    result varchar2(4000);

    begin

    for i in 1 .. p.count loop

    result := result || '', '' || p(i);

    end loop;

    return(substr(result, 3));

    end collagg;

    /

    Listing 4-2

    иҝһжҺҘйӣҶеҗҲе…ғзҙ 

    ```


    е…¶дёӯ `strings` жҳҜе®ҡд№үдёәд»ҘдёӢеҶ…е®№зҡ„йӣҶеҗҲпјҡ


    ```sql

    create or replace type strings as table of varchar2(4000)

    /

    ```


    д»Јз Ғжё…еҚ• `4-3` еұ•зӨәдәҶеҰӮдҪ•жҢүжҠҘе‘ҠиҖ…иҺ·еҸ–жүҖжңүжҠҘе‘Ҡж—Ҙзҡ„еҲ—иЎЁд»ҘеҸҠдёҚеҗҢж—Ҙжңҹзҡ„еҲ—иЎЁгҖӮ


    ```sql

    select name,

    collagg(cast(collect(p.day order by w.id desc) as strings)) days,

    collagg(set(cast(collect(p.day order by w.id desc) as strings))) days_unique

    from presentation p, week w

    where p.day = w.day

    group by p.name;

    NAME DAYS                           DAYS_UNIQUE

    ---- ------------------------------ ---------------------------

    John friday, monday, monday         friday, monday

    Rex  friday, wednesday              friday, wednesday

    Listing 4-3

    дҪҝз”Ё collect еҮҪж•°

    ```


    дёҺ `listagg` дёҚеҗҢпјҢ`order by` жҳҜеңЁеҮҪж•°жң¬иә«дёӯжҢҮе®ҡзҡ„пјҢ`distinct` е…ій”®еӯ—дёҚиў«е…Ғи®ёеңЁ `collect` дёӯдҪҝз”ЁпјҢдҪҶеҸҜд»ҘдҪҝз”Ё `set`
    еҮҪж•°жқҘж¶ҲйҷӨйҮҚеӨҚйЎ№гҖӮе°Ҫз®Ў `set` еҮҪж•°дјјд№ҺиғҪдҝқз•ҷе…ғзҙ зҡ„йЎәеәҸвҖ”вҖ”дҪҶе№¶дёҚиғҪдҝқиҜҒеңЁжүҖжңүжғ…еҶөдёӢйғҪжҳҜеҰӮжӯӨгҖӮ


    зұ»дјјзҡ„йҖ»иҫ‘пјҢеҢ…жӢ¬жҺ’еәҸпјҢеҸҜд»ҘдҪҝз”Ё `xmlagg` жқҘе®һзҺ°пјҢеҰӮдёӢеҲ—иЎЁиҫҫејҸжүҖзӨәпјҢдҪҶеңЁиҝҷз§Қжғ…еҶөдёӢпјҢеҰӮжһңжІЎжңүйўқеӨ–зҡ„еҶ…иҒ”и§ҶеӣҫпјҢеҲҷж— жі•ж¶ҲйҷӨйҮҚеӨҚйЎ№гҖӮ


    ```sql

    substr(xmlagg(xmlelement("x", '', '' || p.day) order by w.id desc)

    .extract(''//x/text()'')

    .getstringval(), 3) x

    ```


    йҷӨдәҶеҶ…зҪ®зҡ„иҒҡеҗҲеҮҪж•°пјҢOracleпјҲиҮӘзүҲжң¬ 9i Release 1 иө·пјүиҝҳжҸҗдҫӣдәҶз”ЁжҲ·е®ҡд№үиҒҡеҗҲпјҲUDAGпјүзҡ„жҺҘеҸЈпјҢеҸҜз”ЁдәҺе®һзҺ°д»»дҪ•еӨҚжқӮзҡ„еҲҶз»„йҖ»иҫ‘гҖӮдҫӢеҰӮпјҢжңүдёҖдёӘеҚ•иЎҢеҮҪж•°
    `bitand`пјҢе®ғжІЎжңүеҜ№еә”зҡ„иҒҡеҗҲеҮҪж•°гҖӮеҰӮжһңйңҖиҰҒпјҢеҸҜд»ҘдҪҝз”Ё UDF + `collect` жҲ– UDAG жқҘе®һзҺ°жӯӨйҖ»иҫ‘гҖӮ


    еңЁеүҚдёҖз« дёӯпјҢеұ•зӨәдәҶеҲҶжһҗеҮҪж•°еҰӮдҪ•её®еҠ©йҒҝе…ҚиҝһжҺҘпјҢиҒҡеҗҲеҮҪж•°д№ҹеҸҜз”ЁдәҺжӯӨзӣ®зҡ„гҖӮ


    дҫӢеҰӮпјҢдёҖдёӘ `requirements` иЎЁеҢ…еҗ«иҒҢдҪҚе’Ңзӣёеә”жҠҖиғҪзҡ„дҝЎжҒҜгҖӮзӣ®ж ҮжҳҜжүҫеҮәйңҖиҰҒ `Oracle` зҹҘиҜҶдҪҶдёҚйңҖиҰҒ `Linux` зҡ„иҒҢдҪҚгҖӮ


    ```sql

    create table requirements(position, skill) as

    (

    select ''Data Scientist'', ''R'' from dual

    union all select ''Data Scientist'', ''Python'' from dual

    union all select ''Data Scientist'', ''Spark'' from dual

    union all select ''DB Developer'', ''Oracle'' from dual

    union all select ''DB Developer'', ''Linux'' from dual

    union all select ''BI Developer'', ''Oracle'' from dual

    union all select ''BI Developer'', ''MSSQL'' from dual

    union all select ''BI Developer'', ''Analysis Services'' from dual

    union all select ''System Administrator'', ''Linux'' from dual

    union all select ''System Administrator'', ''Network Protocols'' from dual

    union all select ''System Administrator'', ''Python'' from dual

    union all select ''System Administrator'', ''Perl'' from dual

    );

    ```


    дёҖдёӘзӣҙжҺҘзҡ„и§ЈеҶіж–№жЎҲеҰӮдёӢжүҖзӨәгҖӮ


    ```sql

    select position

    from requirements r

    where skill = ''Oracle''

    and not exists (select null

    from requirements r0

    where r0.position = r.position

    and r0.skill = ''Linux'');

    POSITION


    BI Developer

    ```


    жӯӨи§ЈеҶіж–№жЎҲзҡ„дё»иҰҒзјәзӮ№жҳҜ `where` еӯҗеҸҘдёӯзҡ„е…іиҒ”еӯҗжҹҘиҜўпјҢиҝҷдјҡеҜјиҮҙеҜ№ `requirements` иЎЁзҡ„йўқеӨ–жү«жҸҸгҖӮ


    еҸҰдёҖз§Қж–№жі•жҳҜи®Ўз®— `Oracle` е’Ң `Linux` жҠҖиғҪзҡ„и®Ўж•°пјҢе№¶иҝҮж»ӨжҺүдёҚж»Ўи¶іжқЎд»¶зҡ„иҒҢдҪҚгҖӮ


    ```sql

    select position

    from requirements

    group by position

    having count(decode(skill, ''Oracle'', 1)) = 1

    and count(decode(skill, ''Linux'', 1)) = 0;

    POSITION


    BI Developer

    ```


    д»ҺжҖ§иғҪи§’еәҰжқҘзңӢпјҢиҝҷдёӘи§ЈеҶіж–№жЎҲжӣҙеҸҜеҸ–пјҢдҪ еҸҜиғҪдјҡжіЁж„ҸеҲ°иҒҡеҗҲеҮҪж•°д»…з”ЁдәҺиҝҮж»Өзӣ®зҡ„пјҢиҖҢдёҚеңЁ `select` еҲ—иЎЁдёӯгҖӮ


    и®©жҲ‘д»¬иҖғиҷ‘дёҖдёӘжӣҙйҖҡз”Ёзҡ„дҫӢеӯҗгҖӮиЎЁ `entity` е’Ң `property` з”ЁдәҺе®һзҺ°е®һдҪ“-еұһжҖ§-еҖјпјҲEAVпјүжЁЎеһӢвҖ”вҖ”иҝҷз§Қж–№жі•еңЁж•°жҚ®еә“и®ҫи®Ўдёӯз”ЁдәҺеңЁеҚ•дёӘиЎЁдёӯеӯҳеӮЁе…·жңүеҸҜеҸҳеұһжҖ§ж•°йҮҸзҡ„е®һдҪ“гҖӮ


    ```sql

    with entity(id, name) as

    (select 1, ''E1'' from dual

    union all select 2, ''E2'' from dual

    union all select 3, ''E3'' from dual),

    property(id, entity_id, name, value) as

    (select 1, 1, ''P1'', 1 from dual

    union all select 2, 1, ''P2'', 10 from dual

    union all select 3, 1, ''P3'', 20 from dual

    union all select 4, 1, ''P4'', 50 from dual

    union all select 5, 2, ''P1'', 1 from dual

    union all select 6, 2, ''P3'', 100 from dual

    union all select 7, 2, ''P4'', 50 from dual

    union all select 8, 3, ''P1'', 1 from dual

    union all select 19, 3, ''P2'', 10 from dual

    union all select 10, 3, ''P3'', 100 from dual)

    Listing 4-4

    EAV жЁЎеһӢ

    ```


    жҲ‘д»¬зҡ„зӣ®ж ҮжҳҜйҖүжӢ©еұһжҖ§ `P1`гҖҒ`P2`гҖҒ`P3` зҡ„еҖјеҲҶеҲ«зӯүдәҺ 1гҖҒ10гҖҒ100 зҡ„е®һдҪ“пјҢе№¶дё”еҒҮи®ҫжҜҸдёӘе®һдҪ“зҡ„еұһжҖ§жҳҜе”ҜдёҖзҡ„гҖӮжңүж—¶ејҖеҸ‘дәәе‘ҳдҪҝз”ЁеӨҡдёӘиҝһжҺҘжқҘе®һзҺ°иҝҷдёҖзӮ№пјҢиҝҷжҳҜйқһеёёдҪҺж•Ҳзҡ„вҖ”вҖ”е®һйҷ…дёҠпјҢиҝһжҺҘзҡ„ж•°йҮҸзӯүдәҺжҲ‘д»¬ж„ҹе…ҙи¶Јзҡ„еұһжҖ§ж•°йҮҸгҖӮ


    ```sql

    select e.name

    from entity e

    join property p1 on p1.entity_id = e.id and p1.name = ''P1''

    join property p2 on p2.entity_id = e.id and p2.name = ''P2''

    join property p3 on p3.entity_id = e.id and p3.name = ''P3''

    where p1.value = 1 and p2.value = 10 and p3.value = 100;

    NAME


    E3

    ```


    еҰӮжһңжҲ‘д»¬йңҖиҰҒиҺ·еҸ– 20 дёӘеұһжҖ§зҡ„еҖјпјҢиҝҷе°ҶеҜјиҮҙ 20 дёӘиҝһжҺҘпјҢиҝҷж №жң¬дёҚжҳҜдёҖдёӘеҸҜиЎҢзҡ„и§ЈеҶіж–№жЎҲгҖӮ


    иҖғиҷ‘еҲ°жҜҸдёӘеұһжҖ§еҸҜиғҪжңүдёҖдёӘеҖјпјҢд№ҹеҸҜиғҪж №жң¬жІЎжңүеҖјпјҢжҲ‘д»¬еҸҜд»Ҙе°ҶжҜҸдёӘе®һдҪ“зҡ„жүҖжңүеұһжҖ§жүҒе№іеҢ–дёәдёҖиЎҢпјҢе№¶еңЁд№ӢдёҠеә”з”ЁзӯӣйҖүжқЎд»¶гҖӮ'
- fmt: '## Pivot and Unpivot Operators


    `Listing 4-5` demonstrates flattening logic implemented using `group by`; however
    starting with Oracle 11g, the same can be achieved using a `pivot` operator.


    ```sql

    create table entity_flattened as

    select *

    from (select e.name name, p.name p_name, value

    from entity e

    join property p

    on p.entity_id = e.id)

    pivot(max(value) for p_name in(''P1'' p1_value, ''P2'' p2_value, ''P3'' p3_value));

    ```


    `Listing 4-6`

    Flattening EAV model using `pivot` operator


    Table `entity_flattened` contains a recordset identical to the one in the inline
    view with `group by`. One of the most important points regarding the `pivot` operator
    is that all columns must be listed in a query because Oracle defines all the columns
    of a result set during the parsing phase. Saying that, itвҖҷs not possible to dynamically
    create columns in a recordset based on data in a table or other conditions, so
    if you have such a requirement, then you can use `ODCItable` interface (or polymorphic
    table functions starting with Oracle 18c). `Pivot XML` allows you to generate
    XMLs for a dynamic number of columns, but if you want to get a result in a relational
    form you need to list all of them for XML parsing. This technique is demonstrated
    in `Listing 4-7`.


    ```sql

    select name, x.*

    from (select *

    from (select e.name name, p.name p_name, value

    from entity e

    join property p

    on p.entity_id = e.id)

    pivot xml(max(value) value for p_name in(any))),

    xmltable(''/PivotSet'' passing p_name_xml

    columns

    name1 varchar2(30)

    path ''/PivotSet/item[1]/column[@name="P_NAME"]/text()'',

    value1 varchar2(30)

    path ''/PivotSet/item[1]/column[@name="VALUE"]/text()'',

    name2 varchar2(30)

    path ''/PivotSet/item[2]/column[@name="P_NAME"]/text()'',

    value2 varchar2(30)

    path ''/PivotSet/item[2]/column[@name="VALUE"]/text()'',

    name3 varchar2(30)

    path ''/PivotSet/item[3]/column[@name="P_NAME"]/text()'',

    value3 varchar2(30)

    path ''/PivotSet/item[3]/column[@name="VALUE"]/text()'') x;

    NAME  NAME1 VALUE1 NAME2 VALUE2 NAME3 VALUE3

    ----- ----- ------ ----- ------ ----- ------

    E1    P1    1      P2     10     P3     20

    E2    P1    1      P3    100     P4     50

    E3    P1    1      P2     10     P3    100

    ```


    `Listing 4-7`

    Parsing `pivot` XML


    Given that this logic relates to presenting a result, sometimes it makes sense
    to implement it on the client side.


    The reverse operation can be done using the `unpivot` operator as shown in `Listing
    4-8`.


    ```sql

    select *

    from entity_flattened

    unpivot (value for p_name in

    (p1_value as ''P1'', p2_value as ''P2'', p3_value as ''P3''));

    NAME  P_NAME      VALUE

    ----- ------ ----------

    E1    P1              1

    E1    P2             10

    E1    P3             20

    E3    P1              1

    E3    P2             10

    E3    P3            100

    E2    P1              1

    E2    P3            100

    8 rows selected.

    ```


    `Listing 4-8`

    `Unpivot` operator


    It creates new rows for each column listed in `unpivot` clause and replicates
    values for all remaining columns. In the example above itвҖҷs вҖң`p1_value, p2_value,
    p3_value`вҖқ and `name` correspondingly. There is no need for вҖң`any`вҖқ keyword for
    `unpivot` because the recordset to be unpivoted always contains fixed and predefined
    number of columns. Oracle could have introduced syntactic sugar like вҖң`unpivot
    (value for p_name in (any except name))`вҖқ but there is no strong necessity for
    this.


    `Unpivot` can be implemented using Cartesian jon.


    ```sql

    select name,

    p_name,

    decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) value

    from entity_flattened,

    (select ''P1'' p_name from dual

    union all select ''P2'' from dual

    union all select ''P3'' from dual)

    where decode(p_name, ''P1'', p1_value, ''P2'', p2_value, ''P3'', p3_value) is
    not null

    order by 1, 2;

    ```


    ## Cube, Rollup, Grouping Sets


    Oracle provides additional capabilities for calculating totals and subtotals.
    LetвҖҷs consider a table with information about orders.


    ```sql

    create table orders(order_id, client_id, product_id, quantity) as

    (

    select 1, 1, 1, 1 from dual

    union all select 1, 1, 2, 2 from dual

    union all select 1, 1, 3, 1 from dual

    union all select 2, 2, 1, 1 from dual

    union all select 2, 2, 5, 1 from dual

    union all select 3, 1, 1, 1 from dual

    union all select 3, 1, 4, 1 from dual

    union all select 3, 1, 4, 1 from dual

    union all select 4, 2, 4, 1 from dual

    union all select 4, 2, 5, 1 from dual

    );

    ```


    вҖң`Rollup`вҖқ allows us to calculate subtotals from right to left and вҖң`cube`вҖқ allows
    us to calculate all possible subtotals for listed columns.


    ```sql

    select client_id, product_id, sum(quantity) cnt

    from orders

    group by rollup(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID PRODUCT_ID        CNT

    ---------- ---------- ----------

    1          1          2

    1          2          2

    1          3          1

    1          4          2

    1                     7

    2          1          1

    2          4          1

    2          5          2

    2                     4


    10 rows selected.

    ```


    ```sql

    select client_id, product_id, sum(quantity) cnt

    from orders

    group by cube(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID PRODUCT_ID        CNT

    ---------- ---------- ----------

    1          1          2

    1          2          2

    1          3          1

    1          4          2

    1                     7

    2          1          1

    2          4          1

    2          5          2

    2                     4

    1          3

    2          2

    3          1

    4          3

    5          2


    15 rows selected.

    ```


    The same can be done using respectively.


    ```sql

    grouping sets ((), (client_id), (client_id, product_id))

    and

    grouping sets ((), (client_id), (product_id), (client_id, product_id))

    ```


    Functions `grouping` and `grouping_id` can be used to identify subtotals. `Grouping`
    accepts only a single expression as a parameter while `grouping_id` can accept
    multiple expressions.


    ```sql

    select decode(grouping(client_id), 1, ''all clients'', client_id) as client_id,

    decode(grouping(product_id), 1, ''all products'', product_id) as product_id,

    sum(quantity) cnt,

    decode(grouping_id(client_id, product_id),

    bitand(grouping_id(client_id, product_id), bin_to_num(0, 0)),

    ''client, product'',

    bitand(grouping_id(client_id, product_id), bin_to_num(0, 1)),

    ''client'',

    bitand(grouping_id(client_id, product_id), bin_to_num(1, 1)),

    ''grand total'') slice

    from orders

    group by rollup(client_id, product_id)

    order by client_id, product_id;

    CLIENT_ID       PRODUCT_ID             CNT SLICE

    --------------- --------------- ---------- --------------------

    1               1                        2 client, product

    1               2                        2 client, product

    1               3                        1 client, product

    1               4                        2 client, product

    1               all products             7 client

    2               1                        1 client, product

    2               4                        1 client, product

    2               5                        2 client, product

    2               all products             4 client

    all clients     all products            11 grand total

    10 rows selected.

    ```


    There is also a function `group_id` that can be used to distinguish the same slices.'
