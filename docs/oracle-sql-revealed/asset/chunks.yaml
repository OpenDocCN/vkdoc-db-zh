    union all

    select r.root, r.lvl + 1, t.id, t.id_parent, r.id_parent

    from tree t

    join rec r on t.id_parent = r.id

    )

    search depth first by id set ord

    select root,

    lvl,

    rpad('' '', (lvl - 1) * 3, '' '') || id as id,

    id_parent,

