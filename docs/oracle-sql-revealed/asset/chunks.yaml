    note that the `Reads` column is absent, which means that all table blocks were
    in the buffer cache.


    Speaking about performance, itвҖҷs worth it to mention that, similar to a model
    clause, you can leverage the power parallel executionВ вҖ“ especially if data can
    be partitioned. In the section вҖңModel Parallel Execution,вҖқ I compared model vs.
    PL/SQL. LetвҖҷs complete the picture by adding a pattern-matching solution.


    ```

    select --+ parallel(10)

    *

    from t

    model

    match_recognize

    (

    partition by part

    order by id

    measures

    sum(value) x,

    userenv(''sid'') sid

    all rows per match

    pattern(x+)

    define

    x as sum(value) - value <= 3e3

    ) mr;

    ```


    It runs about 3 times faster than the model approach with the same degree of parallelism.


    Pattern matching is based on state machines and the pattern itself defines whether
    the state machine is


    *   Deterministic Finite Auto (DFA ) - each of the transitions is uniquely determined
    by its source state and event;

    *   Nondeterministic Finite Auto (NFA ) - next state depends not only on the current
    event, but also possibly on an arbitrary number of subsequent events.


    In the first case, an efficient algorithm is used and you will see `MATCH RECOGNIZE
    SORT DETERMINISTIC FINITE AUTOMATON` in the plan while in the second case, backtracking
    is required and the plan will contain an operation `MATCH RECOGNIZE SORT`. There
    may be the keyword `BUFFER` instead of `SORT` if a recordset is ordered as required
    before applying pattern matching.


    Listing [8-7](#A455196_1_En_8_Chapter.html#Par57) contains a query that generates
    NFA, because of the quantifier for pattern variable `y`. If `y` was matched 3
    times but the test for `z` fails, then the state machine walks back and tries
    to match `z` againВ вҖ“ this is exactly what is happening during recognition of the
    second group. If we specify `pattern (x y{3} z)` instead, then DFA will be used
    but there will be only one match.


    ```

    with t as (select rownum id from dual connect by rownum <= 10)

    select * from t

    match_recognize

    ( order by id

    measures

    match_number() match,

    classifier() cls

    all rows per match with unmatched rows

    pattern (x y{2, 3} z)

    define

    z as x.id + z.id <= 15

    ) mr;

    ID      MATCH CLS

    ---------- ---------- -----

    1          1 X

    2          1 Y

    3          1 Y

    4          1 Y

    5          1 Z

    6          2 X

    7          2 Y

    8          2 Y

    9          2 Z


    10 rows selected.

    Listing 8-7

    Pattern matching with backtracking

    ```


    Nevertheless, even with all the power, pattern matching currently has some limitations.
    In particular


    *   ItвҖҷs possible to use only a limited subset of aggregate functions in the define
    clause and measures clause. For example, you cannot use listagg or UDAG. It causes
    `ORA-62512: This aggregate is not yet supported in MATCH_RECOGNIZE clause`. Additional
    details regarding aggregate function in pattern matching can be found in Chapter
    [12](#A455196_1_En_12_Chapter.html) in the quiz вҖңResemblance Group.вҖқ

    *   You can use subqueries in a define clause but they cannot be correlated. Otherwise
    the query fails with `ORA-62510: Correlated subqueries are not allowed in MATCH_RECOGNIZE
    clause`. I believe the reason is to not mix up execution of finite automata and
    the SQL engine.'
  trans: '

    ### жё…еҚ• 8-4пјҡдҪҝз”ЁжЁЎејҸеҢ№й…ҚжҹҘжүҫе…ғзҙ  (1, 2, 3) зҡ„з»„еҗҲ


