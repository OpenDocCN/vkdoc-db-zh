    *жё…еҚ• 1-60пјҡиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜў*


    `вҖңpartition by (p.name)вҖқ` ж„Ҹе‘ізқҖе°Ҷдёә `presentation` иЎЁдёӯзҡ„жҜҸдёӘ `name` иҝһжҺҘ `week` иЎЁзҡ„жүҖжңүиЎҢгҖӮдёҚдҪҝз”ЁжӯӨеҠҹиғҪд№ҹеҸҜд»Ҙе®һзҺ°зӣёеҗҢзҡ„з»“жһңпјҢдҪҶйңҖиҰҒйўқеӨ–зҡ„иҝһжҺҘгҖӮ


    ```sql

    select w.name, w.day, count(p.time) cnt

    from (select p0.name, w0.*

    from (select distinct name from presentation) p0, week w0) w,

    presentation p

    where w.day = p.day(+)

    and w.name = p.name(+)

    group by w.name, w.day, w.id

    order by w.name, w.id;

    ```


    *жё…еҚ• 1-61пјҡJoin partition by зҡ„еҸҳйҖҡж–№жі•*


    ### SEMI дёҺ ANTI иҝһжҺҘ


    и®©жҲ‘д»¬иҖғиҷ‘ SEMI иҝһжҺҘ `вҖңselect t1.* from t1 where t1.id in (select id from t0)вҖқ` иҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜў


    ```sql

    select "T1"."ID" "ID", "T1"."NAME" "NAME"

    from "M12"."T0" "T0", "M12"."T1" "T1"

    where "T1"."ID" = "T0"."ID"

    ```


    *жё…еҚ• 1-62пјҡSEMI иҝһжҺҘзҡ„иҪ¬жҚўеҗҺжҹҘиҜў*


    SEMI иҝһжҺҘи°“иҜҚжІЎжңүзү№ж®ҠиЎЁзӨәжі•пјҢеӣ жӯӨжңҖз»ҲжҹҘиҜўдёӯзҡ„жқЎд»¶зңӢиө·жқҘеғҸдёҖдёӘз®ҖеҚ•зҡ„зӯүејҸи°“иҜҚпјӣз„¶иҖҢпјҢеҺҹе§ӢжҹҘиҜўзҡ„иҝһжҺҘж–№жі•жҳҜ `HASH JOIN SEMI`пјҲзұ»дјјзҡ„жҺЁзҗҶд№ҹйҖӮз”ЁдәҺ
    ANTI иҝһжҺҘпјүгҖӮеҰӮжһңдҪ е°қиҜ•дёәиҪ¬жҚўеҗҺзҡ„жҹҘиҜўжһ„е»әжү§иЎҢи®ЎеҲ’пјҢйӮЈд№ҲиҝһжҺҘж–№жі•е°ҶеҸӘжҳҜ `HASH JOIN`гҖӮеӣ жӯӨпјҢеңЁеӨ„зҗҶиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўж—¶йңҖиҰҒзү№еҲ«жіЁж„ҸвҖ”вҖ”е®ғд»¬еҸӘжҳҜиҪ¬жҚўеҗҺжҹҘиҜўзҡ„иЎЁзӨәеҪўејҸпјҢеңЁжүҖжңүжғ…еҶөдёӢеҸҜиғҪдёҺеҺҹе§ӢжҹҘиҜўеңЁиҜӯд№үдёҠе№¶дёҚзӯүж•ҲгҖӮжҲ‘д»¬еҸҜд»ҘйҖҡиҝҮеңЁ
    select еҲ—иЎЁдёӯж·»еҠ  `distinct` е’Ң `t1.rowid` жқҘиҺ·еҫ—жүҖйңҖзҡ„з»“жһңпјҢдҪҶжҖ§иғҪдёҺ SEMI иҝһжҺҘдёҚеҗҢвҖ”вҖ”е…ҲиҝһжҺҘеҶҚеңЁз»“жһңдёҠеә”з”Ё distinctпјҢдёҺдёә
    `t1` дёӯзҡ„жҜҸдёҖиЎҢжҹҘжүҫж»Ўи¶іиҝһжҺҘжқЎд»¶зҡ„дёҖиЎҢжҳҜдёҚеҗҢзҡ„гҖӮ'
- fmt: "# SQLжҹҘиҜўдјҳеҢ–\n\n## еј•иЁҖ\n\nеҸҜд»ҘдёәжҹҘиҜўжҢҮе®ҡеҸҰдёҖз§ҚиҝһжҺҘж–№жі•пјҲеңЁжӯӨдҫӢдёӯдёә`NESTED LOOPS SEMI`пјүпјҢжҲ–дҪҝз”ЁдјҳеҢ–еҷЁжҸҗзӨәе®Ңе…ЁзҰҒз”ЁжүҖжңүиҪ¬жҚўгҖӮ\n\
    \n```sql\nselect t1.* from t1 where t1.id in (select /*+ use_nl(t0) */ id from\
    \ t0);\nselect /*+ no_query_transformation */ t1.* from t1 where t1.id in (select\
    \ id from t0);\n```\n\nеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢ`Oracle`дјҡеҜ№жқҘиҮӘ`T1`зҡ„жҜҸдёҖиЎҢеҜ№`T0`иҝӣиЎҢе…ЁиЎЁжү«жҸҸпјҲеҰӮжһң`T0(id)`дёҠеӯҳеңЁзҙўеј•пјҢеҲҷеҸҜиғҪжҳҜзҙўеј•и®ҝй—®пјүд»ҘжүҫеҲ°з¬¬дёҖдёӘеҢ№й…ҚйЎ№гҖӮ\n\
    \n```\n| Id  | Operation          | Name |\n|   0 | SELECT STATEMENT   |     \
    \ |\n|   1 |  FILTER            |      |\n|   2 |   TABLE ACCESS FULL| T1   |\n\
    |   3 |   TABLE ACCESS FULL| T0   |\n\nPredicate Information (identified by operation\
    \ id):\n\n1 - filter( EXISTS (SELECT 0 FROM \"T0\" \"T0\" WHERE \"ID\"=:B1))\n\
    3 - access(\"ID\"=:B1)\n```\n*д»Јз Ғжё…еҚ• 1-63*\n*зҰҒз”ЁиҪ¬жҚўеҗҺзҡ„жҹҘиҜўи®ЎеҲ’*\n\nдёҖиҲ¬жғ…еҶөдёӢпјҢеҺҹе§ӢжҹҘиҜўе’ҢиҪ¬жҚўеҗҺжҹҘиҜўзҡ„и®ЎеҲ’еҸҜиғҪдёҚеҗҢпјҢе№¶дё”еҰӮеүҚжүҖиҝ°пјҢиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўжҳҜжңҖз»Ҳжү§иЎҢеҶ…е®№зҡ„зұ»`SQL`иЎЁзӨәгҖӮ\n\
    \nеңЁдҪҝз”ЁеҹәдәҺжҲҗжң¬зҡ„дјҳеҢ–еҷЁпјҲ`CBO`пјүж—¶пјҢеӨ–и§Ӯе·®ејӮеҫҲеӨ§зҡ„еҺҹе§ӢжҹҘиҜўеҸҜиғҪиў«иҪ¬жҚўдёәзӣёеҗҢзҡ„жңҖз»ҲжҹҘиҜўпјҢе№¶еӣ жҹҘиҜўиҪ¬жҚўиҖҢеҜјиҮҙзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’гҖӮ\n\nеҸҰдёҖж–№йқўпјҢеңЁдҪҝз”ЁеҹәдәҺи§„еҲҷзҡ„дјҳеҢ–еҷЁпјҲ`RBO`пјүжңҖз»ҲжҹҘиҜўж—¶пјҢжҹҘиҜўзҡ„зј–еҶҷж–№ејҸеҜ№жҹҘиҜўи®ЎеҲ’жңүзӣёеҪ“еӨ§зҡ„еҪұе“ҚгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢжҹҘиҜўи®ЎеҲ’жҳҜж №жҚ®йў„е®ҡд№үзҡ„и§„еҲҷйӣҶе’Ңйқһеёёжңүйҷҗзҡ„иҪ¬жҚўж•°йҮҸжһ„е»әзҡ„гҖӮи®ёеӨҡиҝһжҺҘж–№жі•е№¶жңӘдёә`RBO`е®һзҺ°пјӣзү№еҲ«жҳҜпјҢжІЎжңү`SEMI\
    \ JOIN`гҖӮ\n\n```sql\nselect /*+ rule */ t1.* from t1 where t1.id in (select id\
    \ from t0);\n```\n\n```\n| Id  | Operation             | Name     |\n|   0 | SELECT\
    \ STATEMENT      |          |\n|   1 |  MERGE JOIN           |          |\n| \
    \  2 |   SORT JOIN           |          |\n|   3 |    TABLE ACCESS FULL  | T1\
    \       |\n|*  4 |   SORT JOIN           |          |\n|   5 |    VIEW       \
    \        | VW_NSO_1 |\n|   6 |     SORT UNIQUE       |          |\n|   7 |   \
    \   TABLE ACCESS FULL| T0       |\n\nPredicate Information (identified by operation\
    \ id):\n\n4 - access(\"T1\".\"ID\"=\"ID\")\nfilter(\"T1\".\"ID\"=\"ID\")\n```\n\
    *д»Јз Ғжё…еҚ• 1-64*\n*з”ұ`RBO`жһ„е»әж—¶зҡ„жҹҘиҜўи®ЎеҲ’*\n\n`CBO`еңЁ`Oracle 7.3`дёӯеј•е…ҘпјҢе№¶д»ҺйӮЈж—¶иө·еҫ—еҲ°дәҶжһҒеӨ§ж”№иҝӣпјӣжӯӨеӨ–пјҢиҮӘ`Oracle\
    \ 10g`иө·`RBO`е·Іиў«ејғз”ЁпјҢ`Oracle`дёҚе»әи®®еңЁд»»дҪ•жғ…еҶөдёӢдҪҝз”Ёе®ғгҖӮдёҠйқўзҡ„дҫӢеӯҗжҳҜдёәдәҶиҜҙжҳҺ`RBO`зјәе°‘жҹҗдәӣиҝһжҺҘж–№жі•пјҢиҖҢдё”жүӢеҠЁйҮҚеҶҷжҹҘиҜўеҸҜиғҪдёҚеғҸиҝҮеҺ»йӮЈж ·йҮҚиҰҒгҖӮ\n\
    \n### жё…жҷ°еәҰдёҺеҸҜиҜ»жҖ§\n\nи®©жҲ‘д»¬дҪҝз”ЁдёҖдёӘз®ҖеҚ•зҡ„жЁЎеһӢпјҢе…¶дёӯеҢ…еҗ«дёҖдёӘе…·жңүеҚ•дёҖз»ҙеәҰзҡ„дёӨдёӘеқҗж Үзҡ„дәӢе®һиЎЁгҖӮ\n\n```sql\ncreate table fact_\
    \ as (select 1 value, 1 dim_1_id, 2 dim_2_id from dual);\ncreate table dim_ as\
    \ (select rownum id, 'name'||rownum name from dual connect by rownum <= 2);\n\
    ```\n*д»Јз Ғжё…еҚ• 1-65*\n*з”ЁдәҺжҳҹеһӢжЁЎеһӢзҡ„з®ҖеҚ•жЁЎеһӢ*\n\nеҰӮжһңйңҖиҰҒиҺ·еҸ–дёӨдёӘеқҗж Үзҡ„з»ҙеәҰеұһжҖ§пјҢеҸҜд»ҘдҪҝз”Ё`ANSI`иҜӯжі•е®ҢжҲҗпјҢеҰӮд»Јз Ғжё…еҚ• [1-66](#A455196_1_En_1_Chapter.html#Par195)\
    \ жүҖзӨәгҖӮ\n\n```sql\nselect *\nfrom fact_ f\njoin dim_ d1 on f.dim_1_id = d1.id\n\
    join dim_ d2 on f.dim_2_id = d2.id\n```\n*д»Јз Ғжё…еҚ• 1-66*\n*дҪҝз”Ё`ANSI`иҝһжҺҘдәӢе®һиЎЁдёҺз»ҙеәҰиЎЁ*\n\n\
    `ANSI`иҜӯжі•еңЁжё…жҷ°еәҰе’ҢеҸҜиҜ»жҖ§ж–№йқўзҡ„дә®зӮ№пјҡ\n\n1.  жҜҸдёӘз»ҙеәҰзҡ„иҝһжҺҘжқЎд»¶иў«еҲҶзҰ»еҲ°еҜ№еә”зҡ„`on`еӯҗеҸҘдёӯгҖӮеҜ№дәҺеҶ…иҝһжҺҘе’ҢеӨҚжқӮзҡ„иҝһжҺҘжқЎд»¶пјҢеңЁ`where`еӯҗеҸҘиҝҳжҳҜеңЁ`on`еӯҗеҸҘдёӯжҢҮе®ҡи°“иҜҚеҸҜиғҪе№¶дёҚжҳҺжҳҫгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдёӢдёҖжқЎи§„еҲҷеҸҜиғҪжңүжүҖеё®еҠ©пјҡ`where`еӯҗеҸҘеә”д»…еҢ…еҗ«жҢүдәӢе®һиЎЁиҝӣиЎҢзҡ„иҝҮж»ӨгҖӮеҜ№дәҺеӨ–иҝһжҺҘпјҢеҲҷдёҚйңҖиҰҒиҝҷж ·зҡ„и§„еҲҷгҖӮ\n\
    2.  еҜ№дәҺеӨ–иҝһжҺҘпјҢдёҚйңҖиҰҒеҲӣе»әйўқеӨ–зҡ„еҶ…иҒ”/жЁӘеҗ‘и§ҶеӣҫгҖӮжӯӨзү№жҖ§д№ҹеҸҜиғҪиў«и§ҶдёәдёҖдёӘзјәзӮ№пјҢеӣ дёәеҸҜиҜ»жҖ§еҜјиҮҙеҜ№жҹҘиҜўи®ЎеҲ’зҡ„жҺ§еҲ¶жӣҙжңүй—®йўҳпјҲеҸҰиҜ·еҸӮи§ҒвҖңжҺ§еҲ¶жү§иЎҢи®ЎеҲ’вҖқйғЁеҲҶпјүгҖӮ\n\
    3.  еҜ№иҝһжҺҘи°“иҜҚжңүйўқеӨ–зҡ„йӘҢиҜҒгҖӮеҸӘиғҪдҪҝз”ЁеңЁеҪ“еүҚиЎЁд№ӢеүҚеҲ—еҮәзҡ„йӮЈдәӣиЎЁгҖӮдҫӢеҰӮпјҢдёӢйқўзҡ„жҹҘиҜўе°ҶеӨұиҙҘе№¶жҸҗзӨәвҖң`ORA-00904: вҖңD2вҖқ. вҖңIDвҖқ: invalid\
    \ identifier.`вҖқ\n\n```sql\n    select *\n    from fact_ f\n    join dim_ d1 on\
    \ f.dim_1_id = d2.id\n    join dim_ d2 on f.dim_2_id = d2.id\n```\n*д»Јз Ғжё…еҚ• 1-67*\n\
    *`ANSI`иҜӯжі•и°“иҜҚзҡ„йӘҢиҜҒ*\n\nеңЁеҺҹз”ҹиҜӯжі•зҡ„жғ…еҶөдёӢпјҢжүҖжңүи°“иҜҚйғҪеҲ—еңЁ`where`еӯҗеҸҘдёӯгҖӮйҖҡиҝҮдҪҝз”ЁеҶ…иҒ”и§ҶеӣҫеҸҜд»ҘиҺ·еҫ—йўқеӨ–зҡ„жҺ§еҲ¶гҖӮжҲ‘д»¬д№ҹеҸҜд»ҘеңЁ`where`еӯҗеҸҘдёӯеј•е…Ҙеҗ„з§Қи°“иҜҚжҢҮе®ҡи§„иҢғпјҢдҪҶеҰӮжһңдёҖдёӘжҹҘиҜўеҢ…еҗ«пјҢжҜ”еҰӮиҜҙпјҢ`20`дёӘиЎЁзҡ„иҝһжҺҘпјҢж— и®әеҰӮдҪ•пјҢиҝҷдәӣи°“иҜҚзңӢиө·жқҘйғҪдјҡжңүзӮ№ж··д№ұгҖӮеҰӮжһңжҲ‘д»¬еҜ№еҶ…иҝһжҺҘдҪҝз”Ё`ANSI`пјҢеҸҜд»ҘдәӨеҸүиҝһжҺҘжүҖжңүиЎЁпјҢз„¶еҗҺеңЁ`where`еӯҗеҸҘдёӯеҲ—еҮәжүҖжңүи°“иҜҚпјҢдҪҶжІЎжңүдәәйҒөеҫӘиҝҷз§ҚиҚ’и°¬зҡ„ж–№жі•пјҢеӣ дёәеҲҶзҰ»иҝһжҺҘжқЎд»¶жһҒеӨ§ең°жҸҗй«ҳдәҶеҸҜиҜ»жҖ§гҖӮ\n\
    4.  `ANSI`иҜӯжі•дёәжҜҸдёӘи°“иҜҚжҳҺзЎ®е®ҡд№үдәҶе®ғжүҖеұһзҡ„зү№е®ҡиҝһжҺҘгҖӮеңЁеҺҹз”ҹиҜӯжі•зҡ„жғ…еҶөдёӢпјҢе№¶дёҚжҖ»жҳҜе®№жҳ“жҢҮе®ҡдёҖдёӘи°“иҜҚжҳҜеҗҰеҸӘеҢ…еҗ«дёҖдёӘиЎЁпјҲиҝҷеңЁвҖң`Oracle`еҺҹз”ҹиҜӯжі•зҡ„йҷҗеҲ¶вҖқйғЁеҲҶдёӯе·Іеұ•зӨәпјүгҖӮ\n\
    \n`ANSI`иҜӯжі•зҡ„зҒөжҙ»жҖ§е…Ғи®ёжҲ‘д»¬зј–еҶҷдёҖдәӣдёҚжҳ“зҗҶи§Јзҡ„е·§еҰҷжҹҘиҜўгҖӮжҲ‘дёҚе»әи®®дҪҝз”ЁиҝҷдәӣеҠҹиғҪпјҢдҪҶдәҶи§Је®ғд»¬зҡ„еӯҳеңЁеҫҲйҮҚиҰҒгҖӮ\n\nеӣ жӯӨпјҢеңЁ`from`е’Ң`join`еӯҗеҸҘдёӯж”№еҸҳиЎЁзҡ„йЎәеәҸеҸҜиғҪдјҡеҪұе“ҚжҹҘиҜўз»“жһңгҖӮ\n\
    \nд»ҘдёӢжҹҘиҜўзҡ„з»“жһңдёҚеҗҢпјҢеӣ дёәеңЁз¬¬дёҖз§Қжғ…еҶөдёӢпјҢ`Oracle`е°Ҷ`t1`дёҺ`t2`иҝһжҺҘпјҢз„¶еҗҺе°Ҷз»“жһңйӣҶдёҺ`t3`иҝһжҺҘпјҢиҖҢеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢе®ғе°Ҷ`t2`дёҺ`t3`иҝһжҺҘпјҢз„¶еҗҺе°Ҷз»“жһңйӣҶдёҺ`t1`иҝһжҺҘгҖӮ\n\
    \n```sql\nselect t1.*, t2.*, t3.*\nfrom t1\nfull join t2\non t1.id = t2.id\njoin\
    \ t3\non t2.id = t3.id\norder by t1.id;\n```\n```\nID N         ID N         ID\n\
    ---------- - ---------- - ----------\n0 X          0 X          0\n2 B       \
    \   2\n```\n\n```sql\nselect t1.*, t2.*, t3.*\nfrom t2\njoin t3\non t2.id = t3.id\n\
    full join t1\non t1.id = t2.id\norder by t1.id;\n```\n```\nID N         ID N \
    \        ID\n---------- - ---------- - ----------\n0 X          0 X          0\n\
    1 A\n2 B          2\n```\n*д»Јз Ғжё…еҚ• 1-68*\n*жӣҙж”№`ANSI`иҜӯжі•зҡ„иҝһжҺҘйЎәеәҸ*\n\nз„¶иҖҢпјҢеҸҜд»ҘеңЁдёҚжӣҙж”№жҹҘиҜўж–Үжң¬дёӯиЎЁзҡ„йЎәеәҸзҡ„жғ…еҶөдёӢжӣҙж”№иҝһжҺҘзҡ„йЎәеәҸгҖӮ\n\
    \n```sql\nselect t1.*, t2.*, t3.*\nfrom t1\nfull join (t2 join t3 on t2.id = t3.id)\
    \ on t1.id = t2.id\norder by t1.id;\n```\n```\nID N         ID N         ID\n\
    ---------- - ---------- - ----------\n0 X          0 X          0\n1 A\n2 B  \
    \        2\n```\n*д»Јз Ғжё…еҚ• 1-69*\n*еңЁиЎЁеј•з”Ёзҡ„дҪҚзҪ®жҢҮе®ҡиҝһжҺҘеӯҗеҸҘ*\n\nеҰӮжһңжҲ‘д»¬з§»йҷӨжӢ¬еҸ·пјҢиҝҷдёӘжҹҘиҜўеҸҜиғҪзңӢиө·жқҘжӣҙеҠ жЁЎзіҠгҖӮе°Ҫз®ЎеҰӮжӯӨпјҢжӯӨеҠҹиғҪжҳҜжңүж–ҮжЎЈи®°иҪҪзҡ„пјҢе№¶дё”`join_clause`еҸҜд»ҘеңЁиЎЁеј•з”Ёзҡ„дҪҚзҪ®жҢҮе®ҡгҖӮеңЁз®ҖеҚ•жғ…еҶөдёӢпјҢеҰӮдёӢжүҖзӨәпјҡ\n\
    \n```sql\n-- table_reference in ()\nselect * from (dual);\n-- join_clause in ()\n\
    select * from (dual cross join dual);\n```\n*д»Јз Ғжё…еҚ• 1-70*\n*`table_reference` е’Ң\
    \ `join_clause`*"
  raw: "ItвҖҷs possible to specify another join method (NESTED LOOPS SEMI in this case)\
    \ for the query or to completely disable all transformations using optimizer hints.\n\
    \n```\nselect t1.* from t1 where t1.id in (select /*+ use_nl(t0) */ id from t0);\n\
    select /*+ no_query_transformation */ t1.* from t1 where t1.id in (select id from\
    \ t0);\n```\n\nIn the second case Oracle does a full scan of T0 for each row from\
    \ T1 (it may be index access though if there is an index on T0(id)) to find the\
    \ first match.\n\n```\n\n| Id  | Operation          | Name |\n\n|   0 | SELECT\
    \ STATEMENT   |      |\n|   1 |  FILTER            |      |\n|   2 |   TABLE ACCESS\
    \ FULL| T1   |\n|   3 |   TABLE ACCESS FULL| T0   |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - filter( EXISTS (SELECT 0 FROM \"T0\" \"T0\" WHERE \"\
    ID\"=:B1))\n3 - access(\"ID\"=:B1)\nListing 1-63\nQuery plan with disabled transformations\n\
    ```\n\nIn general case, plans for an original query and transformed query may\
    \ be different and, as it was already mentioned, the final query after transformation\
    \ is an SQL-like representation of what will be eventually executed.\n\nIn case\
    \ of using a Cost Based Optimizer (CBO), original queries that look quite different\
    \ may be transformed into the same final query and lead to the same execution\
    \ plan because of query transformations.\n\nOn the other hand, the way a query\
    \ is written has much considerable influence on the query plan while using Rule\
    \ Based Optimizer (RBO) final query. In this case a query plan is built based\
    \ on a predefined set of rules and a very limited number of transformations. Many\
    \ of the join methods are not implemented for RBO; in particular, there is no\
    \ SEMI JOIN.\n\n```\nselect /*+ rule */ t1.* from t1 where t1.id in (select id\
    \ from t0);\n\n| Id  | Operation             | Name     |\n\n|   0 | SELECT STATEMENT\
    \      |          |\n|   1 |  MERGE JOIN           |          |\n|   2 |   SORT\
    \ JOIN           |          |\n|   3 |    TABLE ACCESS FULL  | T1       |\n|*\
    \  4 |   SORT JOIN           |          |\n|   5 |    VIEW               | VW_NSO_1\
    \ |\n|   6 |     SORT UNIQUE       |          |\n|   7 |      TABLE ACCESS FULL|\
    \ T0       |\n\nPredicate Information (identified by operation id):\n\n4 - access(\"\
    T1\".\"ID\"=\"ID\")\nfilter(\"T1\".\"ID\"=\"ID\")\nListing 1-64\nQuery plan when\
    \ built by RBO\n```\n\nCBO was introduced in Oracle 7.3 and has been greatly improved\
    \ since then; moreover RBO is deprecated since Oracle 10g and Oracle do not recommend\
    \ using it in any cases. The above example was provided to demonstrate that some\
    \ join methods were missing for RBO and also manual rewriting of the queries may\
    \ not be that important as it was in the past.\n\n### Clearness and Readability\n\
    \nLetвҖҷs use a simple model with a fact table containing two coordinates of a single\
    \ dimension.\n\n```\ncreate table fact_ as (select 1 value, 1 dim_1_id, 2 dim_2_id\
    \ from dual);\ncreate table dim_ as (select rownum id, 'name'||rownum name from\
    \ dual connect by rownum <= 2);\nListing 1-65\nTrivial model for star schema\n\
    ```\n\nIf we need to get dimensional attributes for both coordinates, it can be\
    \ done using ANSI syntax as shown in Listing [1-66](#A455196_1_En_1_Chapter.html#Par195).\n\
    \n```\nselect *\nfrom fact_ f\njoin dim_ d1 on f.dim_1_id = d1.id\njoin dim_ d2\
    \ on f.dim_2_id = d2.id\nListing 1-66\nUsing ANSI to join fact with dimensions\n\
    ```\n\nClearness and readability highlights for ANSI:\n\n1.  Join conditions for\
    \ each dimension are separated into a correspondent on clause. For inner joins\
    \ and complex join conditions it may be not obvious where to specify predicatesВ вҖ“\
    \ in the where clause or in the on clause. In such cases the next rule may help:\
    \ where clause should contain only filters by a fact table. For outer joins there\
    \ is no need for such a rule. В \n2.  There is no need to create additional inline/lateral\
    \ views for outer joins. This feature also may be considered as a disadvantage\
    \ because readability results in more problematic control on a query plan (see\
    \ also the section вҖңControlling Execution PlanвҖқ). В \n3.  There is additional validation\
    \ for join predicates. ItвҖҷs possible to use only those tables that listed before\
    \ the current table. For example, the query below will fail with вҖңORA-00904: вҖңD2вҖқ.\
    \ вҖңIDвҖқ: invalid identifier.вҖқ\n\n```\n    select *\n    from fact_ f\n    join\
    \ dim_ d1 on f.dim_1_id = d2.id\n    join dim_ d2 on f.dim_2_id = d2.id\n    Listing\
    \ 1-67\n    Validation for predicates for ANSI syntax\n    ```\n\nIn case of native\
    \ syntax, all predicates are listed in a where clause. Additional control may\
    \ be achieved by using inline views. Also we can introduce various standards for\
    \ specifying predicates in a where clause but if a query contain joins of, letвҖҷs\
    \ say, 20 tables anyway, those predicates will look a bit messy. If we use ANSI\
    \ for inner joins itвҖҷs possible to cross join all the tables and then list all\
    \ predicates in a where clause but no one follows this ridiculous approach because\
    \ separating join conditions improves readability a lot. В \n4.  ANSI syntax clearly\
    \ defines for each predicate the specific join it belongs to. In case of native\
    \ syntax itвҖҷs not always easy to specify if a predicate contains only one table\
    \ (that was shown in section вҖңLimitation of the Oracle Native SyntaxвҖқ).\n\nFlexibility\
    \ of ANSI syntax allows us to write some cunning queries that are not that easy\
    \ to understand. I would not recommend using these capabilities, but itвҖҷs important\
    \ to know they exist.\n\nSo, changing the order of tables in from and join clauses\
    \ for ANSI syntax may impact the query result.\n\nResults are different for the\
    \ queries below because in in the first case, Oracle joins t1 with t2 and then\
    \ the result set with t3, while in the second case it joins t2 with t3 and then\
    \ the result set with t1.\n\n```\nselect t1.*, t2.*, t3.*\nfrom t1\nfull join\
    \ t2\non t1.id = t2.id\njoin t3\non t2.id = t3.id\norder by t1.id;\nID N     \
    \    ID N         ID\n---------- - ---------- - ----------\n0 X          0 X \
    \         0\n2 B          2\nselect t1.*, t2.*, t3.*\nfrom t2\njoin t3\non t2.id\
    \ = t3.id\nfull join t1\non t1.id = t2.id\norder by t1.id;\nID N         ID N\
    \         ID\n---------- - ---------- - ----------\n0 X          0 X         \
    \ 0\n1 A\n2 B          2\nListing 1-68\nChanging join order for ANSI syntax\n\
    ```\n\nHowever, itвҖҷs possible to change the order of joins without changing the\
    \ order of tables in the query text.\n\n```\nselect t1.*, t2.*, t3.*\nfrom t1\n\
    full join (t2 join t3 on t2.id = t3.id) on t1.id = t2.id\norder by t1.id;\nID\
    \ N         ID N         ID\n---------- - ---------- - ----------\n0 X       \
    \   0 X          0\n1 A\n2 B          2\nListing 1-69\nSpecifying join clause\
    \ in place of table reference\n```\n\nThis query may look even more ambiguous\
    \ if we remove brackets. Nevertheless this functionality is documented and join_clause\
    \ may be specified in place of the table reference. In a trivial case it looks\
    \ like the following:\n\n```\n-- table_reference in ()\nselect * from (dual);\n\
    -- join_clause in ()\nselect * from (dual cross join dual);\nListing 1-70\ntable_reference\
    \ and join_clause\n```"
  trans: "\n# SQL жҹҘиҜўдјҳеҢ–\n\n## еј•иЁҖ\n\nеҸҜд»ҘдёәжҹҘиҜўжҢҮе®ҡеҸҰдёҖз§ҚиҝһжҺҘж–№жі•пјҲеңЁжӯӨдҫӢдёӯдёә`NESTED LOOPS SEMI`пјүпјҢжҲ–дҪҝз”ЁдјҳеҢ–еҷЁжҸҗзӨәе®Ңе…ЁзҰҒз”ЁжүҖжңүиҪ¬жҚўгҖӮ\n\
    \n```sql\nselect t1.* from t1 where t1.id in (select /*+ use_nl(t0) */ id from\
    \ t0);\nselect /*+ no_query_transformation */ t1.* from t1 where t1.id in (select\
    \ id from t0);\n```\n\nеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢ`Oracle`дјҡеҜ№жқҘиҮӘ`T1`зҡ„жҜҸдёҖиЎҢеҜ№`T0`иҝӣиЎҢе…ЁиЎЁжү«жҸҸпјҲеҰӮжһң`T0(id)`дёҠеӯҳеңЁзҙўеј•пјҢеҲҷеҸҜиғҪжҳҜзҙўеј•и®ҝй—®пјүд»ҘжүҫеҲ°з¬¬дёҖдёӘеҢ№й…ҚйЎ№гҖӮ\n\
    \n```\n| Id  | Operation          | Name |\n|   0 | SELECT STATEMENT   |     \
    \ |\n|   1 |  FILTER            |      |\n|   2 |   TABLE ACCESS FULL| T1   |\n\
    |   3 |   TABLE ACCESS FULL| T0   |\n\nPredicate Information (identified by operation\
    \ id):\n\n1 - filter( EXISTS (SELECT 0 FROM \"T0\" \"T0\" WHERE \"ID\"=:B1))\n\
    3 - access(\"ID\"=:B1)\n```\n*д»Јз Ғжё…еҚ• 1-63*\n*зҰҒз”ЁиҪ¬жҚўеҗҺзҡ„жҹҘиҜўи®ЎеҲ’*\n\nдёҖиҲ¬жғ…еҶөдёӢпјҢеҺҹе§ӢжҹҘиҜўе’ҢиҪ¬жҚўеҗҺжҹҘиҜўзҡ„и®ЎеҲ’еҸҜиғҪдёҚеҗҢпјҢе№¶дё”еҰӮеүҚжүҖиҝ°пјҢиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўжҳҜжңҖз»Ҳжү§иЎҢеҶ…е®№зҡ„зұ»`SQL`иЎЁзӨәгҖӮ\n\
    \nеңЁдҪҝз”ЁеҹәдәҺжҲҗжң¬зҡ„дјҳеҢ–еҷЁпјҲ`CBO`пјүж—¶пјҢеӨ–и§Ӯе·®ејӮеҫҲеӨ§зҡ„еҺҹе§ӢжҹҘиҜўеҸҜиғҪиў«иҪ¬жҚўдёәзӣёеҗҢзҡ„жңҖз»ҲжҹҘиҜўпјҢе№¶еӣ жҹҘиҜўиҪ¬жҚўиҖҢеҜјиҮҙзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’гҖӮ\n\nеҸҰдёҖж–№йқўпјҢеңЁдҪҝз”ЁеҹәдәҺи§„еҲҷзҡ„дјҳеҢ–еҷЁпјҲ`RBO`пјүжңҖз»ҲжҹҘиҜўж—¶пјҢжҹҘиҜўзҡ„зј–еҶҷж–№ејҸеҜ№жҹҘиҜўи®ЎеҲ’жңүзӣёеҪ“еӨ§зҡ„еҪұе“ҚгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢжҹҘиҜўи®ЎеҲ’жҳҜж №жҚ®йў„е®ҡд№үзҡ„и§„еҲҷйӣҶе’Ңйқһеёёжңүйҷҗзҡ„иҪ¬жҚўж•°йҮҸжһ„е»әзҡ„гҖӮи®ёеӨҡиҝһжҺҘж–№жі•е№¶жңӘдёә`RBO`е®һзҺ°пјӣзү№еҲ«жҳҜпјҢжІЎжңү`SEMI\
    \ JOIN`гҖӮ\n\n```sql\nselect /*+ rule */ t1.* from t1 where t1.id in (select id\
    \ from t0);\n```\n\n```\n| Id  | Operation             | Name     |\n|   0 | SELECT\
    \ STATEMENT      |          |\n|   1 |  MERGE JOIN           |          |\n| \
    \  2 |   SORT JOIN           |          |\n|   3 |    TABLE ACCESS FULL  | T1\
    \       |\n|*  4 |   SORT JOIN           |          |\n|   5 |    VIEW       \
    \        | VW_NSO_1 |\n|   6 |     SORT UNIQUE       |          |\n|   7 |   \
    \   TABLE ACCESS FULL| T0       |\n\nPredicate Information (identified by operation\
    \ id):\n\n4 - access(\"T1\".\"ID\"=\"ID\")\nfilter(\"T1\".\"ID\"=\"ID\")\n```\n\
    *д»Јз Ғжё…еҚ• 1-64*\n*з”ұ`RBO`жһ„е»әж—¶зҡ„жҹҘиҜўи®ЎеҲ’*\n\n`CBO`еңЁ`Oracle 7.3`дёӯеј•е…ҘпјҢе№¶д»ҺйӮЈж—¶иө·еҫ—еҲ°дәҶжһҒеӨ§ж”№иҝӣпјӣжӯӨеӨ–пјҢиҮӘ`Oracle\
    \ 10g`иө·`RBO`е·Іиў«ејғз”ЁпјҢ`Oracle`дёҚе»әи®®еңЁд»»дҪ•жғ…еҶөдёӢдҪҝз”Ёе®ғгҖӮдёҠйқўзҡ„дҫӢеӯҗжҳҜдёәдәҶиҜҙжҳҺ`RBO`зјәе°‘жҹҗдәӣиҝһжҺҘж–№жі•пјҢиҖҢдё”жүӢеҠЁйҮҚеҶҷжҹҘиҜўеҸҜиғҪдёҚеғҸиҝҮеҺ»йӮЈж ·йҮҚиҰҒгҖӮ\n\
    \n### жё…жҷ°еәҰдёҺеҸҜиҜ»жҖ§\n\nи®©жҲ‘д»¬дҪҝз”ЁдёҖдёӘз®ҖеҚ•зҡ„жЁЎеһӢпјҢе…¶дёӯеҢ…еҗ«дёҖдёӘе…·жңүеҚ•дёҖз»ҙеәҰзҡ„дёӨдёӘеқҗж Үзҡ„дәӢе®һиЎЁгҖӮ\n\n```sql\ncreate table fact_\
    \ as (select 1 value, 1 dim_1_id, 2 dim_2_id from dual);\ncreate table dim_ as\
    \ (select rownum id, 'name'||rownum name from dual connect by rownum <= 2);\n\
