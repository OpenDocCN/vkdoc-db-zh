    ## Random Subset


    еҜ№дәҺеҢ…еҗ« `n` иЎҢгҖҒе…·жңүдё»й”®дё”еҖјд»Һ 1 еҲ° `n` ж— й—ҙйҡ”зҡ„иЎЁпјҡ


    ```sql

    create table t_id_value as

    select rownum id, ''name'' || rownum value from dual connect by rownum <= 2e6;

    alter table t_id_value add constraint pk_t_id_value primary key (id);

    ```


    зӣ®ж ҮжҳҜиҝ”еӣһ `k` дёӘе”ҜдёҖзҡ„йҡҸжңәиЎҢпјҢдҪҝеҫ—жҜҸдёҖиЎҢеҮәзҺ°еңЁз»“жһңдёӯзҡ„жҰӮзҺҮеҜ№жүҖжңүиЎҢйғҪзӣёзӯүгҖӮдёәз®ҖеҚ•иө·и§ҒпјҢжҲ‘д»¬еҒҮи®ҫ `k` зӯүдәҺ 10гҖӮ'
  raw: '![ $$ \sum \limits_{i=1}^{\infty}\frac{10^i}{{\left(10\ast 2\right)}^{i+n-1}}=\sum
    \limits_{i=1}^{\infty}\frac{10^i}{20^{n-1\ast }{10}^{i\ast }{2}^i}=\frac{1}{20^{n-1}}\sum
    \limits_{i=1}^{\infty}\frac{1}{2^i}=\frac{1}{20^{n-1}} $$ ](A455196_1_En_12_Chapter_Equa.gif)


    In other words, the sum of x for all descendants does not exceed value x for a
    given node, or more specifically: for the node on the 1st level, the limit of
    the sum equals to 1; for the node on the 2nd level, the limit of the sum equals
    to 0.05 and so on.


    Practically, depth is limited with number precision and we assume that the difference
    between x and the sum of x for all descendants is never less than 1e-38, thus
    the windowing clause is В«`range between current row and x - 1e-38 following`В»;
    so the window spans the current node and all its descendants. If we defined range
    as В«`range between 1e-38 following and x - 1e-38 following` В» then the window
    covers only all descendants.


    Eventually we managed to calculate a columns s that can be used to define a window
    with a range by x. This technique allows us to solve various tasks that require
    applying some logic to all descendants for a given node, possible, including the
    node itself.


    For example, if we need to calculate the number of all descendants or their sum,
    including the value of the current node, then it can be done as shown in Listing
    [12-14](#A455196_1_En_12_Chapter.html#Par110).


    ```

    select h0.*,

    count(*) over(order by s range between 1e-38 following and x - 1e-38 following)
    cnt_children,

    sum(amount) over(order by s range between current row and x - 1e-38 following)
    h_sum

    from (select h.*,

    power(2 * 10, 1 - l) x,

    sum(power(2 * 10, 1 - l)) over(order by rn) s

    from h) h0;

    ID  PARENT_ID  DESCRIPTI   AMOUNT   L     RN        X         S    CNT_CHILDREN   H_SUM

    ---- ---------- ---------- -------- --- ------ -------- --------- ---------------
    -------

    1            top              10   1      1        1         1               6    6411

    2          1 top-one         100   2      2      ,05      1,05               4    5401

    3          2 one-one        2000   3      3    ,0025    1,0525               0    2000

    4          2 one-two        3000   3      4    ,0025     1,055               0    3000

    6          2 one-three       300   3      5    ,0025    1,0575               1     301

    7          6 three-one         1   4      6  ,000125  1,057625               0       1

    5          1 top-two        1000   2      7      ,05  1,107625               0    1000

    7 rows selected.

    Listing 12-14

    Applying logic using window by all descendants

    ```


    Without an analytic function it would require a join/subquery or model clause.
    However, Oracle 12c provides one more way of doing thatВ вҖ“ pattern matching.


    ```

    select *

    from (select h.*, power(2 * 10, 1 - l) x from h)

    match_recognize

    (

    order by rn

    measures

    first (id) as id,

    first (parent_id) as parent_id,

    first (l) as l,

    first (rn) as rn,

    final count(*)-1 cnt_children,

    final sum(amount) h_sum

    one row per match

    after match skip to next row

    pattern (y+)

    define

    y as sum(x) < 2 * first(x)

    ) mr;

    ID  PARENT_ID       L         RN CNT_CHILDREN      H_SUM

    ------- ---------- ------- ---------- ------------ ----------

    1                  1          1            6        6411

    2          1       2          2            4        5401

    3          2       3          3            0        2000

    4          2       3          4            0        3000

    6          2       3          5            1         301

    7          6       4          6            0           1

    5          1       2          7            0        1000

    7 rows selected.

    ```


    In this solution we used a condition with aggregate function В«`sum(x) < 2 * first(x)`В»
    instead of a cumulative sum. An equivalent condition using both x and s is В«`last(s)
    - first(s) < first(x)`В». If, however, you use В«`max(s) - min(s) < first(x)`В»,
    then the query fails with ORA-03113 (versions 12.2.0.1.0, 12.1.0.2.0). Using pattern
    matching, specific functions first/last is more preferable than aggregate functions
    min/max because we know that s is monotonically increasing.


    ItвҖҷs possible to use a rule with min/max; however if we use all rows instead of
    one row and apply filtering, this obviously introduces additional costs.


    ```

    select *

    from (select h.*,

    power(2 * 10, 1 - l) x,

    sum(power(2 * 10, 1 - l)) over(order by rn) s

    from h) h0

    match_recognize

    (

    order by rn

    measures

    final count(*)-1 cnt_children,

    final sum(amount) h_sum,

    count(*) cnt

    all rows per match

    after match skip to next row

    pattern (y+)

    define

    y as max(s) - min(s) < first(x)

    ) mr

    where cnt = 1;

    ```


    And finally, the most important detail when using pattern matching is that there
    is no need to use a trick based on the limit of the sum if we want to find the
    next branch or apply some logic to all the descendants . We just need to specify
    a pattern that matches all descendants and start the search from every row -В«`after
    match skip to next row`В».


    ```

    select *

    from h

    match_recognize

    (

    order by rn

    measures

    classifier() cls,

    first (id) as id,

    first (parent_id) as parent_id,

    first (l) as l,

    first (rn) as rn,

    first (amount) as amount,

    final count(child.*) cnt_children,

    final sum(amount) h_sum

    one row per match

    after match skip to next row

    pattern (strt child+|no_children)

    define

    child as child.l > strt.l

    ) mr;

    CLS             ID     PARENT_ID    L  RN     AMOUNT   CNT_CHILDREN   H_SUM

    -----------  ----- ------------- ---- --- ---------- -------------- -------

    CHILD            1                  1   1         10              6    6411

    CHILD            2             1    2   2        100              4    5401

    NO_CHILDREN      3             2    3   3       2000              0    2000

    NO_CHILDREN      4             2    3   4       3000              0    3000

    CHILD            6             2    3   5        300              1     301

    NO_CHILDREN      7             6    4   6          1              0       1

    NO_CHILDREN      5             1    2   7       1000              0    1000

    7 rows selected.

    ```


