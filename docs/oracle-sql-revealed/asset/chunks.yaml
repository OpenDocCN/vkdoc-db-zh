    \     | T_NUM |    524K |     19 |   9961K | 00:00:07.02 |    1572K |\n---------------------------------------------------------------------------------------------------------------\n\
    ```\n\nWe can avoid join if we generate a sum expression with `sys_connect_by_path`\
    \ function and implement a function to evaluate it вҖ“ this approach is shown in\
    \ Listing [11-17](#A455196_1_En_11_Chapter.html#Par115).\n\n```\nselect count(*)\
    \ cnt, sum(f_calc(path)) sum_num\nfrom (select sys_connect_by_path(num, '+') ||\
    \ '+' as path\nfrom t_num\nwhere level > 1\nconnect by num > prior num);\ncreate\
    \ or replace function f_calc(p_str in varchar2) return number is\npragma udf;\n\
    result number := 0;\ni      int := 0;\nn      varchar2(30);\nbegin\nwhile true\
    \ loop\n    i := i + 1;\n    n := substr(p_str,\n                instr(p_str,\
    \ '+', 1, i) + 1,\n                instr(p_str, '+', 1, i + 1) - instr(p_str,\
    \ '+', 1, i) - 1);\n    if n is not null then\n        result := result + n;\n\
    \    else\n        exit;\n    end if;\nend loop;\nreturn result;\nend f_calc;\n\
    Listing 11-17\nConnect by + UDF to get sums of all subsets\n```\n\nExecution takes\
    \ around 7 seconds if we specify `pragma udf` and 10 seconds otherwise. Most of\
    \ the resources are used for evaluating an expression for sum, if we comment out\
    \ `sum(f_calc(path))` then the execution time is less than 1 second.\n\nLetвҖҷs\
    \ now use a temporary table to store intermediate results:\n\n```\ncreate global\
    \ temporary table tmp(lvl int, x int, num number);\n```\n\nThis makes it possible\
    \ to generate sums of all the combinations in just half a second!\n\n```\nbegin\n\
    insert into tmp (lvl, x, num)\n    select 1, rownum, num from (select num from\
