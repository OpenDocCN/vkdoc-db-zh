    \ itвҖҷs translated to the query below (only name column remains after projection\
    \ is applied):\n\n```\n    SELECT \"T\".\"NAME\" \"NAME\" FROM \"T\" \"T\"\n \
    \   ```\n\nOn the other hand, Oracle does not allow us to create a view using\
    \ the factored query above because of obvious reasons. Like many other popular\
    \ RDBMS, Oracle applies heuristics like the following:\n    *   do a projection\
    \ вҖңelimination of unnecessary columns from row-sourceвҖқ as early as possible;\n\
    \    *   do a selection вҖңfiltering out unnecessary rowsвҖқ as early as possible.\
    \ In fact this means that the post-join predicate on the inner table will be applied\
    \ before join.In context of CBO this means вҖңas early as possible if it leads to\
    \ the plan with lower cost.вҖқ\n*   The final query in the optimizer trace is only\
    \ an SQL-like representation of what will be eventually executed and may not be\
    \ semantically equivalent to the original query in all cases. In some cases, plans\
    \ for the original and final query may differ. Also, the final query may not return\
    \ the same result as the original query, for example, because there is no special\
    \ notation for ANTI/SEMI joins and predicates for them are displayed simply like\
    \ equality predicates.\n*   As you see on Figure [2-1](#A455196_1_En_2_Chapter.html#Fig1),\
    \ transformations happen before plan generation and query hints may become unusable\
    \ after transformations. For example, if inline view has been eliminated after\
    \ view merging and you used its alias in the hint, then the hint is no longer\
    \ valid.\n\n## Summary\n\nQuery transformations allow to provide significant flexibility\
    \ for developers in writing queries, and they make it possible for queries with\
    \ considerably different query texts to have eventually the same query plan and,\
    \ possibly, the same final query text. Thanks to query transformations, itвҖҷs not\
    \ necessary to care about the order of query operations. For example, if you join\
    \ two tables and calculate some aggregates, Oracle will decide what to do firstВ вҖ“\
    \ group by or join if that is possible. Also transformations allow us to avoid\
    \ code duplicationВ вҖ“ for instance, or-expansion may expand one query into several\
    \ branches with union all, and transitive closure helps to avoid вҖңunnecessaryвҖқ\
    \ predicates.\n\nHowever, the transformation engine is not a вҖңsilver bulletвҖқ and\
    \ developers should follow best practices when writing queries to help optimizer\
    \ make the right decisions and build optimal plans. The transformation engine\
    \ will unlikely ever be so intelligent that manual query rewriting can be completely\
    \ avoided.\n\nIn additional to query transformations, the SQL engine applies a\
    \ lot of other conversions, for example, translation ANSI to native and heuristics\
    \ like column projection or column selection."
