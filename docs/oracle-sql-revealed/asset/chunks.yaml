- fmt: '### Limitations of the Subqueries


    As it was already mentioned in the first chapter, any query that requires joining
    two and more recordsets may be implemented using explicit joins with a `join`
    keyword. However, in some cases subqueries may be preferable вҖ“ for example, if
    we need to derive some attribute according to complex logic, we can use scalar
    subqueries to leverage scalar subquery caching and to avoid aggregate or analytic
    functions and other complexities in the main query. Subqueries in the `where`
    clause also may be more preferable than explicit joins вҖ“ for instance, when `ANTI`
    or `SEMI` joins are required, please refer to the quiz вҖңTop PathsвҖқ in Chapter
    [12](#A455196_1_En_12_Chapter.html) for a specific example (it does not require
    multiple nesting levels though).


    Sometimes itвҖҷs not possible to implement complex logic with multiple layers in
    correlated subquery because of nesting level limitation. These limitations are
    not well documented but easy to demonstrate.


    ```sql

    select t1.*,

    (select *

    from (select t2.name

    from t2 where t2.id = t1.id order by t2.name) t

    where rownum = 1) scalar

    from t1;

    ID N S

    ---------- - -

    0 X X

    1 A

    select t1.*

    from t1

    where exists

    (select 1

    from t2

    where t2.id = t1.id

    and t2.id =

    (select id

    from (select id from t3 where t3.id = t1.id order by 1)

    where rownum = 1));

    ID N

    ---------- -

    0 X

    ```


    Queries work fine in Oracle 12c but fail on 11g with В«`ORA-00904: "D1"."DUMMY":
    invalid identifier`В»; in Oracle 12c you still may face `ORA-00904` for more complex
    subqueries.


    You can implement logic from a subquery in `UDF` as a workaround when the identifier
    from the main query is not visible in the subquery. In addition, Oracle 12c provides
    В«`pragma udf`В», which provides additional performance improvement when `UDF` is
    called in SQL.


    If we have a look at final queries after transformations, we may notice an artificial
    bind variable introduced instead of a column from the main query.


    ```sql

    select "T1"."ID" "ID",

    "T1"."NAME" "NAME",

    (select "T"."NAME" "NAME"

    from (select "T2"."NAME" "NAME"

    from "T2" "T2"

    where "T2"."ID" = :b1

    order by "T2"."NAME") "T"

    where rownum = 1) "SCALAR"

    from "T1" "T1"

    select "T1"."ID" "ID", "T1"."NAME" "NAME"

    from "T1" "T1"

    where exists (select 0

    from "T2" "T2"

    where "T2"."ID" = "T1"."ID"

    and "T2"."ID" = (select "from$_subquery$_003"."ID" "ID"

    from (select "T3"."ID" "ID"

    from "T3" "T3"

    where "T3"."ID" = :b1

    order by "T3"."ID")

    "from$_subquery$_003"

    where rownum = 1))

    ```


    The key difference between implementation logic in the `UDF` and in the subquery
    is that `UDF` returns data as of the time of the current call while the subquery
    returns data as of the time of query start.


    To demonstrate the difference, letвҖҷs create a table and function that takes around
    5 seconds to execute.


    ```sql

    create table t_scn(id, name) as

    select 1, ''A'' from dual

    union all select 2, ''B'' from dual

    union all select 3, ''C'' from dual;

    create or replace function f_get_name(p_id in int) return varchar2 is

    begin

    dbms_lock.sleep(5);

    for i in (select * from t_scn where id = p_id) loop

    return(i.name);

    end loop;

    end f_get_name;

    /

    ```


    While the query below is running


    ```sql

    select t_main.*,

    (select name from t_scn where id = t_main.id) name1,

    f_get_name(t_main.id) name2

    from t_scn t_main;

    ```


    LetвҖҷs update the row in the concurrent session


    ```sql

    update t_scn set name = ''X'' where id = 3;

    commit;

    ```


    Result in main session is the following:


    ```sql

    select t_main.*,

    (select name from t_scn where id = t_main.id) name1,

    f_get_name(t_main.id) name2

    from t_scn t_main;

    ID NAME  NAME1 NAME2

    ---------- ----- ----- -----

    1 A     A     A

    2 B     B     B

    3 C     C     X

    ```


    This means that changes in a concurrent session during query execution have been
    picked up by the function. To avoid this we need to create an operator.


    ```sql

    create operator op_get_name binding (int) return varchar2 using f_get_name;

    ```


    After repeating the test we see that the operator guarantees the same consistency
    as the subquery does.


    ```sql

    select t_main.*,

    (select name from t_scn where id = t_main.id) name1,

    f_get_name(t_main.id) name2,

    op_get_name(t_main.id) name3

    from t_scn t_main;

    ID NAME  NAME1 NAME2 NAME3

    ---------- ----- ----- ----- -----

    1 A     A     A     A

    2 B     B     B     B

    3 C     C     X     C

    ```


    ## Summary


    If a recordset can be achieved using vanilla SQL, then this is the fastest way
    to get a result in the absolute majority of cases. However, for some specific
    tasks, `PL/SQL` may be more preferable, which was demonstrated based on examples
    divided into the following categories:


    *   Specifics of analytic functions;

    *   Iterative-like computations;

    *   Specifics of joins and subqueries.


    ItвҖҷs important to note that technically one of the below approaches was used in
    each `PL/SQL` solution:


    *   Cursor for loop with processing in `PL/SQL`;

    *   Encapsulation in `UDF` and its usage in a query;

    *   Iterative execution of SQL statements.


    I want to emphasize one more time, then, that the size of the fetch is very important
    in case of a cursor for loop processing.


    In some cases, advanced SQL features like recursive subquery factoring help to
    efficiently get the result using SQL, which otherwise would require `PL/SQL`.
    The next chapter contains a series of tasks and their solutions using advanced
    SQL features as well as a performance comparison of different approaches.


    # 12. Solving SQL Quizzes


    In this last chapter IвҖҷd like to consider specific real-life tasks and their solutions
    in SQL to demonstrate the power of Oracle SQL. The complexity of the tasks will
    vary a lot as well as the depth of analysis for different solutions. For a few
    tasks there will be both SQL and `PL/SQL` solutions, but the main accent in this
    chapter is on SQL capabilities.


    For the sake of simplicity I tried to eliminate all the unnecessary details and
    make the problem formulations as simple as possible.


    ## Converting into Decimal Numeral System


    We have a string of symbols in some alphabet, and the goal is to convert it into
    decimal. The first symbol in the alphabet is zero, the value for the second symbol
    is one, and the value for the third symbol is two, and so on.'
