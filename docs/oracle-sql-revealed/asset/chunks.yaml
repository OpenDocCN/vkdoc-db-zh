  trans: '# и§ЈеҶіж–№жЎҲ


    жӯӨд»»еҠЎзҡ„дё»иҰҒеӨҚжқӮжҖ§еңЁдәҺжҲ‘д»¬йңҖиҰҒи·ҹиёӘе·ІеҲҶй…Қзҡ„ж¬Ўж•°гҖӮеҗҰеҲҷпјҢи§ЈеҶіж–№жЎҲе°ҶзӣёеҪ“з®ҖеҚ•пјҢе№¶зұ»дјјдәҺвҖңжӣҫиӮҜйҒ“еӨ«иЎЁзӨәжі•вҖқгҖӮиҝҷдёӘз»ҶиҠӮд№ҹдҪҝеҫ—ж— жі•дҪҝз”ЁжЁЎејҸеҢ№й…ҚжқҘжұӮи§ЈгҖӮ


    жҲ‘д»¬е°ҶдҪҝз”ЁдёҖдёӘиҒ”еҗҲи®°еҪ•йӣҶдҪңдёәжқҘжәҗпјҢеӣ жӯӨеј•е…ҘдёҖдёӘеӣ еӯҗеҢ–жҹҘиҜў `t`гҖӮ


    ```

    t(basket_id, item_id, basket_amount, item_amount, priority_level) as

    ( select e.basket_id,

    e.item_id,

    b.basket_amount,

    i.item_amount,

    e.priority_level

    from eligibility e

    join baskets b

    on b.basket_id = e.basket_id

    join inventory i

    on i.item_id = e.item_id

    order by basket_id, priority_level)

    ```


    д»Јз Ғжё…еҚ• 12-24 еұ•зӨәдәҶеҰӮдҪ•дҪҝз”Ё `model` еӯҗеҸҘжқҘи§ЈеҶіжӯӨй—®йўҳгҖӮ


    ```

    select *

    from t

    model

    dimension by (basket_id, priority_level, item_id)

    measures (basket_amount, item_amount, 0 result)

    rules

    (

    result[any, any, any] order by basket_id, priority_level, item_id =

    case when max(result)[any, any, cv(item_id)] = 0 and

    nvl(max(result)[cv(basket_id),priority_level < cv(priority_level),any],0) +

    item_amount[cv(basket_id),cv(priority_level),cv(item_id)]

    <= max(basket_amount)[cv(basket_id),cv(priority_level),any]

    then nvl(max(result)[cv(basket_id),priority_level < cv(priority_level),any],0)
    +

    item_amount[cv(basket_id),cv(priority_level),cv(item_id)]

    else 0

    end

    )

    order by 1, 2;

    ```

    д»Јз Ғжё…еҚ• 12-24: дҪҝз”Ё model еӯҗеҸҘеҲҶй…Қзү©е“Ғ


    `basket_id` е’Ң `priority_level` зҡ„з»„еҗҲи¶ід»ҘиҝӣиЎҢе”ҜдёҖеҜ»еқҖпјҢдҪҶ `item_id` иў«ж·»еҠ еҲ°з»ҙеәҰдёӯпјҢд»ҘдҫҝжҲ‘д»¬иғҪеӨҹеҲӨж–ӯжҹҗдёӘзү№е®ҡзү©е“ҒжҳҜеҗҰе·Іиў«дҪҝз”ЁгҖӮж•ҙдёӘйҖ»иҫ‘еңЁдёҖдёӘзҙ§еҮ‘зҡ„и§„еҲҷдёӯе®һзҺ°пјҢдҪҶе®ғдҪҝз”ЁдәҶдёҖдәӣе…·жңүдёҚеҗҢеҜ»еқҖж–№ејҸзҡ„иҒҡеҗҲеҮҪж•°пјҢиҝҷдҪҝеҫ—и§ЈеҶіж–№жЎҲзҡ„ж•ҲзҺҮдёҚй«ҳгҖӮ


    жҲ‘д»¬еҸҜд»ҘжіЁж„ҸеҲ°пјҢдҪҝз”ЁдёҖз§Қзұ»дјјдәҺеүҚдёҖдёӘжөӢйӘҢвҖңзӣёдјјеҲҶз»„вҖқдёӯзҡ„ж–№жі•жҳҜеҸҜиЎҢзҡ„пјҢеңЁйӮЈдёӘж–№жі•дёӯпјҢжҲ‘д»¬д»Ҙзү№е®ҡйЎәеәҸйҒҚеҺҶи®°еҪ•йӣҶпјҢе№¶дёәжҜҸдёҖиЎҢи®Ўз®—еӨҡдёӘеәҰйҮҸеҖјгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢеәҰйҮҸеҖјжҳҜ
    `is_used`пјҲдёҖдёӘж ҮиҜҶзү№е®ҡзү©е“ҒжҳҜеҗҰе·ІеҲҶй…Қз»ҷзү№е®ҡзҜ®еӯҗзҡ„ж Үеҝ—пјүгҖҒ`total`пјҲжҜҸдёӘзҜ®еӯҗзҡ„иҝҗиЎҢжҖ»и®Ўпјүе’Ң `str`пјҲе·ІеҲҶй…Қзү©е“Ғзҡ„жӢјжҺҘпјүгҖӮе®һзҺ°еҸҜд»ҘдҪҝз”Ёиҝӯд»ЈжЁЎеһӢпјҲеҰӮеҗҢеүҚдёҖдёӘд»»еҠЎпјүжҲ–йҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–гҖӮеҗҺиҖ…еңЁд»Јз Ғжё…еҚ•
    12-25 дёӯеұ•зӨәгҖӮ


    ```

    with t0 as

    (select t.*, row_number() over (order by basket_id, priority_level) rn

    from t),

    rec (basket_id, item_id, basket_amount, item_amount, priority_level,

    rn, total, is_used, str) as

    (select t.basket_id, t.item_id, t.basket_amount,

    t.item_amount, t.priority_level, t.rn,

    case when t.item_amount <= t.basket_amount

    then t.item_amount else 0 end,

    case when t.item_amount <= t.basket_amount then 1 end,

    cast(case when t.item_amount <= t.basket_amount

    then '','' || t.item_id end as varchar2(4000))

    from t0 t where rn = 1

    union all

    select t.basket_id, t.item_id, t.basket_amount,

    t.item_amount, t.priority_level, t.rn,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount

    else decode(t.basket_id, r.basket_id, r.total, 0)

    end,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then 1

    end,

    case when decode(t.basket_id, r.basket_id, r.total, 0)

    + t.item_amount <= t.basket_amount

    and instr(r.str, t.item_id) = 0

    then r.str || '','' || t.item_id

    else r.str

    end

    from t0 t

    join rec r on t.rn = r.rn + 1)

    select * from rec;

    ```

    д»Јз Ғжё…еҚ• 12-25: дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–еҲҶй…Қзү©е“Ғ


    е·ІеҲҶй…Қзү©е“Ғзҡ„жӢјжҺҘз”ЁдәҺжЈҖжҹҘеҪ“еүҚзү©е“ҒжҳҜеҗҰе·Іиў«еҲҶй…ҚпјҢдҪҶжҲ‘д»¬еҸҜд»ҘдҪҝз”ЁдёҖдёӘйӣҶеҗҲпјҲcollectionпјүиҖҢдёҚжҳҜеӯ—з¬ҰдёІпјҢд»ҘйҒҝе…Қ `varchar2` й•ҝеәҰзҡ„йҷҗеҲ¶гҖӮж— и®әеҰӮдҪ•пјҢжҲ‘д»¬еҝ…йЎ»дёәжҜҸдёҖиЎҢеЎ«е……е·ІдҪҝз”Ёзү©е“Ғзҡ„еҲ—иЎЁпјҢиҝҷеҜ№еҶ…еӯҳж¶ҲиҖ—е’Ңж•ҙдҪ“жҖ§иғҪйғҪжңүиҙҹйқўеҪұе“ҚгҖӮ


    е°Ҫз®ЎдҪҝз”Ё `model` зҡ„и§ЈеҶіж–№жЎҲзӣёеҪ“з®ҖжҙҒпјҢдҪҶеҜ№дәҺзӣёеҜ№иҫғе°Ҹзҡ„ж•°жҚ®йҮҸпјҲеӨ§зәҰж•°еҚғиЎҢпјүжқҘиҜҙпјҢе…¶жҖ§иғҪжҳҜеҗҲзҗҶзҡ„гҖӮеҰӮжһңдҪ е°Ҷ `t0` жҸ’е…ҘеҲ°дёҖдёӘжҢү `rn` е»әз«Ӣзҙўеј•зҡ„дёҙж—¶иЎЁдёӯпјҢд»Ҙдҫҝ
    Oracle еңЁжҜҸж¬Ўиҝӯд»ЈдёӯйҖҡиҝҮзҙўеј•еҸӘи®ҝй—®еҚ•иЎҢпјҢйӮЈд№ҲйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–зҡ„жҖ§иғҪеҸҜд»Ҙеҫ—еҲ°ж”№е–„гҖӮ


    жңҖй«ҳж•Ҳзҡ„и§ЈеҶіж–№жЎҲе°ҶжҳҜдҪҝз”Ё PL/SQL еҮҪж•°пјҢиҜҘеҮҪж•°дҪҝз”Ёжёёж Ү FOR еҫӘзҺҜе’ҢдёҖдёӘе·ІеҲҶй…Қзү©е“Ғзҡ„е…іиҒ”ж•°з»„пјҢд»ҘжңҖеҝ«ең°жЈҖжҹҘзү©е“ҒжҳҜеҗҰе·Іиў«еҲҶй…ҚгҖӮ


    # жңҖй•ҝйҖ’еўһеӯҗеәҸеҲ—


    жңҖй•ҝйҖ’еўһеӯҗеәҸеҲ—й—®йўҳжҳҜеңЁз»ҷе®ҡеәҸеҲ—дёӯжүҫеҲ°дёҖдёӘеӯҗеәҸеҲ—пјҢиҜҘеӯҗеәҸеҲ—зҡ„е…ғзҙ жҢүд»ҺдҪҺеҲ°й«ҳзҡ„йЎәеәҸжҺ’еәҸпјҢе№¶дё”еӯҗеәҸеҲ—е°ҪеҸҜиғҪй•ҝгҖӮиҝҷдёӘеӯҗеәҸеҲ—дёҚдёҖе®ҡжҳҜиҝһз»ӯзҡ„гҖӮй’ҲеҜ№ж•°жҚ®еә“пјҢжҲ‘д»¬е°ҶеңЁдёҖзі»еҲ—иЎҢдёӯеҜ»жүҫжңҖй•ҝзҡ„еӯҗеәҸеҲ—гҖӮ


    дҫӢеҰӮпјҢеҜ№дәҺеәҸеҲ—


    ```

    14, 15, 9, 11, 16, 12, 13

    ```


    йў„жңҹз»“жһңжҳҜ


    ```

    9, 11, 12, 13

    ```


    дёәз®ҖеҚ•иө·и§ҒпјҢжҲ‘д»¬е°ҶжҺЁеҜјжңҖй•ҝйҖ’еўһеӯҗеәҸеҲ—зҡ„й•ҝеәҰпјҢиҖҢдёҚиҝ”еӣһеӯҗеәҸеҲ—жң¬иә«гҖӮеҜ№дәҺдёҠиҝ°ж•°жҚ®пјҢжӯЈзЎ®зӯ”жЎҲжҳҜ 4гҖӮ'
- fmt: "## Solution\n\nUnlike all previous tasks let's start with a PL/SQL approach.\
    \ The problem can be solved in a quite efficient way using dynamic programming.\n\
    \nSo, let's assume that we need to calculate length `L` of a subsequence for a\
    \ current element and it's already calculated for elements analyzed so far. In\
    \ such a case, the `L` for the current element is `max(L)` across all previous\
    \ elements, which are less than current element plus 1. This may sound a bit complicated\
    \ but implementation is fairly simple. Let's reuse type `numbers` from the section\
    \ \"Unnesting Collections\" and table `tmp` from the section \"Iterative-Like\
    \ computations,\" `lvl` stays for length on current step, `x` is order, and `num`\
    \ is a value.\n\n```sql\ndeclare\n    t numbers := numbers(14, 15, 9, 11, 16,\
    \ 12, 13);\nbegin\n    delete from tmp;\n    for i in 1 .. t.count loop\n    \
    \    insert into tmp\n            (lvl, x, num)\n        values\n            ((select\
    \ nvl(max(lvl), 0) + 1 from tmp where num < t(i)), i, t(i));\n    end loop;\n\
    end;\n/\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n```sql\n\
    select * from tmp;\n```\n\n```\n       LVL          X        NUM\n---------- ----------\
    \ ----------\n         1          1         14\n         2          2        \
    \ 15\n         1          3          9\n         2          4         11\n   \
    \      3          5         16\n         3          6         12\n         4 \
    \         7         13\n\n7 rows selected.\n```\n\nTo get a `max(lvl)` for all\
    \ elements we need to scan the `tmp` table. Another option is using a PL/SQL variable\
    \ and updating it on each iteration. Given that for each element we scan all previous\
    \ elements, the computational complexity of the algorithm is `O(nВІ)`. Also the\
    \ necessity to scan all previous elements makes implementation using recursive\
    \ subquery factoring not reasonable; please check the section \"Iterative-Like\
    \ computations\" for additional details.\n\nBack to PL/SQL, an algorithm can be\
    \ improved if we use an auxiliary array that will contain the longest common subsequence\
    \ and will be refreshed on each iteration. Refresh is implemented according to\
    \ the next principle: we look up for the max value that is less than the current\
    \ value and put the current value after the found value. The binary search runs\
    \ in logarithmic time `O(log[2]n)`, thus total computational complexity is `O(n\
    \ * log[2]n)`.\n\n```sql\ndeclare\n    x    numbers := numbers(14, 15, 9, 11,\
    \ 16, 12, 13);\n    m    numbers := numbers();\n    l    int;\n    newl int;\n\
    \    v    varchar2(4000);\n    -- index of the greatest element lower than p in\
    \ array M\n    function f(p in number) return int as\n        lo  int;\n     \
    \   hi  int;\n        mid int;\n    begin\n        lo := 1;\n        hi := l;\n\
    \        while lo <= hi loop\n            mid := floor((lo + hi) / 2);\n     \
    \       if x(m(mid)) < p then\n                lo := mid + 1;\n            else\n\
    \                hi := mid - 1;\n            end if;\n        end loop;\n    \
    \    return hi;\n    end;\nbegin\n    for i in 1 .. x.count loop\n        newl\
    \ := f(x(i)) + 1;\n        if newl > l then\n            l := newl;\n        \
    \    m.extend;\n        end if;\n        m(newl) := i;\n        v := '';\n   \
    \     for j in 1 .. l loop\n            v := v || ' ' || x(m(j));\n        end\
    \ loop;\n        dbms_output.put_line(i || ' ' || v);\n    end loop;\nend;\n/\n\
    ```\n\n```\n1  14\n2  14 15\n3  9 15\n4  9 11\n5  9 11 16\n6  9 11 12\n7  9 11\
    \ 12 13\nPL/SQL procedure successfully completed.\n```\n\nThe `l` is the length\
    \ of the longest increasing subsequence on each iteration.\n\nSQL implementation\
    \ can be done using the `model` clause.\n\n```sql\nwith t(id, value) as\n    (select\
    \ rownum, column_value from table(numbers(14, 15, 9, 11, 16, 12, 13)))\nselect\
    \ *\nfrom t\nmodel\n    dimension by (id, value)\n    measures(0 l)\n    (l[any,\
    \ any] order by id = nvl(max(l)[id < cv(id),value < cv(value)],0) + 1)\norder\
    \ by 1;\n```\n\nThe approach is similar to the first solution in PL/SQL while\
    \ there is no way to implement a second solution on pure SQL as efficient as using\
    \ PL/SQL. When we use the `model` we work with a flat dataset containing columns\
    \ and rows (even though we consider it as a multidimensional array), and it's\
    \ not possible to use any auxiliary data structures to optimize the solution.\n\
    \n## Quine\n\nThe last quiz is just for fun rather than to demonstrate Oracle\
    \ SQL features. Quine is a program that takes no input and produces a copy of\
    \ its own source code as its only output. You can find a lot of solutions on the\
    \ Internet for various programming languages, and I will not focus on a PL/SQL\
    \ solution where the approach is quite similar to Pascal language, for example.\
    \ It's a bit more interesting to demonstrate SQL approaches.\n\n### Solution\n\
    \nOne of the requirements is that the program (in our case, SQL query) cannot\
    \ access external sources to read its code. So the query below cannot be treated\
    \ as a complete solution.\n\n```sql\nset pagesize 0 linesize 90\nselect sql_text||';'from\
    \ v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\nselect sql_text||';'from\
    \ v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\n```\n\nOn the\
    \ other hand, the two following solutions satisfy all requirements.\n\n```sql\n\
    select substr(rpad(1,125,'||chr(39)),26)from\ndual;select substr(rpad(1,125,'||chr(39)),26)from\n\
    dual;\nselect substr(rpad(1,125,'||chr(39)),26)from\ndual;select substr(rpad(1,125,'||chr(39)),26)from\n\
    dual;\n```\n\n```sql\nselect\nreplace('@''[@'||chr(93)||''')from dual;','@',q'[select\n\
    replace('@''[@'||chr(93)||''')from dual;','@',q]')from dual;\nselect\nreplace('@''[@'||chr(93)||''')from\
    \ dual;','@',q'[select\nreplace('@''[@'||chr(93)||''')from dual;','@',q]')from\
    \ dual;\n```\n\nMaybe you can write shorter quine in Oracle SQL?\n\n## Summary\n\
    \nIt was demonstrated using selected tasks that Oracle-specific SQL is much more\
    \ powerful than standard SQL, and some tasks can be solved in a highly scalable\
    \ way with very little code. I'd especially like to highlight a new Oracle 12c\
    \ feature вҖ“ pattern matching, which makes it possible to solve various tasks in\
    \ a very efficient manner that otherwise would require a lot of PL/SQL code.\n\
    \nSome complex tasks can be solved using recursive subquery factoring or a `model`\
    \ clause with competitive performance in compare to PL/SQL. Both approaches do\
    \ not require collections of objects unlike the PL/SQL approach with pipelined\
    \ functions. Advantages of the `model` are concise code and great scalability\
    \ when using partitioning and parallel execution. Pros for recursive subquery\
    \ factoring are execution in the scope of the SQL engine, and there is no need\
    \ for context switches on each iteration.\n\nIf, however, you need to implement\
    \ a relatively complex algorithm that may require additional data structures and\
    \ control of execution, then PL/SQL tends to be the preferable approach. But when\
    \ you switch to procedural language to work with data, you always should have\
    \ an answer why it's better than SQL for your particular task. The last thing\
    \ to note: if you have to implement some intensive computations that require a\
    \ lot of CPU, then external libraries and implementation using C can be the best\
    \ choice.\n\nDetails really matter, so you have to take into account the specifics\
    \ of a particular task and compare different approaches for your Oracle version\
    \ before making a decision about the preferable approach."
  raw: '### Solution


    Unlike all previous tasks letвҖҷs start with a PL/SQL approach. The problem can
    be solved in a quite efficient way using dynamic programming.


    So, letвҖҷs assume that we need to calculate length - L of a subsequence for a current
    element and itвҖҷs already calculated for elements analyzed so far. In such a case,
    the L for the current element is max(L) across all previous elements, which are
    less than current element plus 1\. This may sound a bit complicated but implementation
    is fairly simple. LetвҖҷs reuse type numbers from the section вҖңUnnesting CollectionsвҖқ
    and table tmp from the section вҖңIterative-Like computations,вҖқ lvl stays for length
    on current step, x is order, and num is a value.


    ```

    declare

    t numbers := numbers(14, 15, 9, 11, 16, 12, 13);

    begin

    delete from tmp;

    for i in 1 .. t.count loop

    insert into tmp

    (lvl, x, num)

    values

    ((select nvl(max(lvl), 0) + 1 from tmp where num < t(i)), i, t(i));

    end loop;

    end;

    /

    PL/SQL procedure successfully completed.

    select * from tmp;

    LVL          X        NUM

    ---------- ---------- ----------

    1          1         14

    2          2         15

    1          3          9

    2          4         11

    3          5         16

    3          6         12

    4          7         13

    7 rows selected.

    ```


    To get a max(lvl) for all elements we need to scan the tmp table. Another option
    is using a PL/SQL variable and updating it on each iteration. Given that for each
    element we scan all previous elements, the computational complexity of the algorithm
    is O(n ВІ). Also the necessity to scan all previous elements makes implementation
    using recursive subquery factoring not reasonable; please check the section вҖңIterative-Like
    computationsвҖқ for additional details.


    Back to PL/SQL, an algorithm can be improved if we use an auxiliary array that
    will contain the longest common subsequence and will be refreshed on each iteration.
    Refresh is implemented according to the next principle: we look up for the max
    value that is less than the current value and put the current value after the
    found value. The binary search runs in logarithmic time O(log[2]n), thus total
    computational complexity is O(n * log[2]n).


    ```

    declare

    x    numbers := numbers(14, 15, 9, 11, 16, 12, 13);

    m    numbers := numbers();

    l    int;

    newl int;

    v    varchar2(4000);

    -- index of the greatest element lower than p in array M

    function f(p in number) return int as

    lo  int;

    hi  int;

    mid int;

    begin

    lo := 1;

    hi := l;

    while lo  l then l := newl; end if;

    v := '''';

    for j in 1 .. l loop

    v := v || '' '' || x(m(j));

    end loop;

    dbms_output.put_line(i || '' '' || v);

    end loop;

    end;

    /

    1  14

    2  14 15

    3  9 15

    4  9 11

    5  9 11 16

    6  9 11 12

    7  9 11 12 13

    PL/SQL procedure successfully completed.

    ```


    The l is the length of the longest increasing subsequence on each iteration.


    SQL implementation can be done using the model clause.


    ```

    with t(id, value) as

    (select rownum, column_value from table(numbers(14, 15, 9, 11, 16, 12, 13)))

    select *

    from t

    model

    dimension by (id, value)

    measures(0 l)

    (l[any, any] order by id = nvl(max(l)[id < cv(id),value < cv(value)],0) + 1)

    order by 1;

    ```


    The approach is similar to the first solution in PL/SQL while there is no way
    to implement a second solution on pure SQL as efficient as using PL/SQL. When
    we use the model we work with a flat dataset containing columns and rows (even
    though we consider it as a multidimensional array), and itвҖҷs not possible to use
    any auxiliary data structures to optimize the solution .


    ## Quine


    The last quiz is just for fun rather than to demonstrate Oracle SQL features.
    Quine is a program that takes no input and produces a copy of its own source code
    as its only output. You can find a lot of solutions on the Internet for various
    programming languages, and I will not focus on a PL/SQL solution where the approach
    is quite similar to Pascal language, for example. ItвҖҷs a bit more interesting
    to demonstrate SQL approaches.


    ### Solution


    One of the requirements is that the program (in our case, SQL query) cannot access
    external sources to read its code. So the query below cannot be treated as a complete
    solution.


    ```

    set pagesize 0 linesize 90

    select sql_text||'';''from v$sqlarea join v$session using(sql_id)where sid=userenv(''sid'');

    select sql_text||'';''from v$sqlarea join v$session using(sql_id)where sid=userenv(''sid'');

    ```


    On the other hand, the two following solutions satisfy all requirements.


    ```

    select substr(rpad(1,125,''||chr(39)),26)from

    dual;select substr(rpad(1,125,''||chr(39)),26)from

    dual;

    select substr(rpad(1,125,''||chr(39)),26)from

    dual;select substr(rpad(1,125,''||chr(39)),26)from

    dual;

    select

    replace(''@''''[@''||chr(93)||'''''')from dual;'',''@'',q''[select

    replace(''@''''[@''||chr(93)||'''''')from dual;'',''@'',q]'')from dual;

    select

    replace(''@''''[@''||chr(93)||'''''')from dual;'',''@'',q''[select

    replace(''@''''[@''||chr(93)||'''''')from dual;'',''@'',q]'')from dual;

    ```


    Maybe you can write shorter quine in Oracle SQL?


    ## Summary


    It was demonstrated using selected tasks that Oracle-specific SQL is much more
    powerful than standard SQL, and some tasks can be solved in a highly scalable
    way with very little code. IвҖҷd especially like to highlight a new Oracle 12c featureВ вҖ“
    pattern matching, which makes it possible to solve various tasks in a very efficient
    manner that otherwise would require a lot of PL/SQL code.


    Some complex tasks can be solved using recursive subquery factoring or a model
    clause with competitive performance in compare to PL/SQL. Both approaches do not
    require collections of objects unlike the PL/SQL approach with pipelined functions.
    Advantages of the model are concise code and great scalability when using partitioning
    and parallel execution. Pros for recursive subquery factoring are execution in
    the scope of the SQL engine, and there is no need for context switches on each
    iteration.


    If, however, you need to implement a relatively complex algorithm that may require
    additional data structures and control of execution, then PL/SQL tends to be the
    preferable approach. But when you switch to procedural language to work with data,
    you always should have an answer why itвҖҷs better than SQL for your particular
    task. The last thing to note: if you have to implement some intensive computations
    that require a lot of CPU, then external libraries and implementation using C
    can be the best choice.


    Details really matter, so you have to take into account the specifics of a particular
    task and compare different approaches for your Oracle version before making a
    decision about the preferable approach.'
  trans: "## и§ЈеҶіж–№жЎҲ\n\nдёҺд№ӢеүҚжүҖжңүд»»еҠЎдёҚеҗҢпјҢи®©жҲ‘д»¬д»ҺдёҖз§Қ PL/SQL ж–№жі•ејҖе§ӢгҖӮиҝҷдёӘй—®йўҳеҸҜд»ҘдҪҝз”Ё**еҠЁжҖҒи§„еҲ’**д»ҘзӣёеҪ“й«ҳж•Ҳзҡ„ж–№ејҸи§ЈеҶігҖӮ\n\n\
    еӣ жӯӨпјҢеҒҮи®ҫжҲ‘д»¬йңҖиҰҒдёәеҪ“еүҚе…ғзҙ и®Ўз®—еӯҗеәҸеҲ—й•ҝеәҰ `L`пјҢе№¶дё”еҜ№дәҺе·ІеҲҶжһҗзҡ„е…ғзҙ пјҢ`L` еҖје·Із»Ҹи®Ўз®—еҘҪгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢеҪ“еүҚе…ғзҙ зҡ„ `L` еҖјзӯүдәҺжүҖжңүе°ҸдәҺеҪ“еүҚе…ғзҙ зҡ„еүҚеәҸе…ғзҙ дёӯзҡ„\
    \ `max(L)` еҖјеҶҚеҠ  1гҖӮиҝҷеҗ¬иө·жқҘеҸҜиғҪжңүзӮ№еӨҚжқӮпјҢдҪҶе®һзҺ°иө·жқҘзӣёеҪ“з®ҖеҚ•гҖӮи®©жҲ‘д»¬йҮҚз”ЁвҖңUnnesting CollectionsвҖқдёҖиҠӮдёӯзҡ„зұ»еһӢ `numbers`\
    \ е’ҢвҖңIterative-Like computationsвҖқдёҖиҠӮдёӯзҡ„иЎЁ `tmp`пјҢ`lvl` д»ЈиЎЁеҪ“еүҚжӯҘйӘӨзҡ„й•ҝеәҰпјҢ`x` жҳҜеәҸеҸ·пјҢ`num` жҳҜеҖјгҖӮ\n\
    \n```sql\ndeclare\n    t numbers := numbers(14, 15, 9, 11, 16, 12, 13);\nbegin\n\
    \    delete from tmp;\n    for i in 1 .. t.count loop\n        insert into tmp\n\
    \            (lvl, x, num)\n        values\n            ((select nvl(max(lvl),\
    \ 0) + 1 from tmp where num < t(i)), i, t(i));\n    end loop;\nend;\n/\n```\n\n\
    ```\nPL/SQL procedure successfully completed.\n```\n\n```sql\nselect * from tmp;\n\
    ```\n\n```\n       LVL          X        NUM\n---------- ---------- ----------\n\
    \         1          1         14\n         2          2         15\n        \
    \ 1          3          9\n         2          4         11\n         3      \
    \    5         16\n         3          6         12\n         4          7   \
    \      13\n\n7 rows selected.\n```\n\nиҰҒиҺ·еҸ–жүҖжңүе…ғзҙ зҡ„ `max(lvl)`пјҢжҲ‘д»¬йңҖиҰҒжү«жҸҸ `tmp` иЎЁгҖӮеҸҰдёҖз§ҚйҖүжӢ©жҳҜдҪҝз”Ё\
    \ PL/SQL еҸҳйҮҸе№¶еңЁжҜҸж¬Ўиҝӯд»Јж—¶жӣҙж–°е®ғгҖӮйүҙдәҺеҜ№дәҺжҜҸдёӘе…ғзҙ жҲ‘д»¬йғҪиҰҒжү«жҸҸжүҖжңүеүҚеәҸе…ғзҙ пјҢиҜҘз®—жі•зҡ„и®Ўз®—еӨҚжқӮеәҰдёә `O(nВІ)`гҖӮеҗҢж ·пјҢжү«жҸҸжүҖжңүеүҚеәҸе…ғзҙ зҡ„еҝ…иҰҒжҖ§дҪҝеҫ—дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јзҡ„е®һзҺ°еҸҳеҫ—дёҚеҗҲзҗҶпјӣиҜ·жҹҘзңӢвҖңIterative-Like\
    \ computationsвҖқдёҖиҠӮд»ҘиҺ·еҸ–жӣҙеӨҡз»ҶиҠӮгҖӮ\n\nеӣһеҲ° PL/SQLпјҢеҰӮжһңжҲ‘д»¬дҪҝз”ЁдёҖдёӘиҫ…еҠ©ж•°з»„жқҘдҝқеӯҳжңҖй•ҝйҖ’еўһеӯҗеәҸеҲ—е№¶еңЁжҜҸж¬Ўиҝӯд»Јж—¶еҲ·ж–°е®ғпјҢз®—жі•еҸҜд»Ҙеҫ—еҲ°ж”№иҝӣгҖӮеҲ·ж–°йҒөеҫӘд»ҘдёӢеҺҹзҗҶпјҡжҲ‘д»¬жҹҘжүҫе°ҸдәҺеҪ“еүҚеҖјзҡ„жңҖеӨ§еҖјпјҢе№¶е°ҶеҪ“еүҚеҖјж”ҫеңЁжүҫеҲ°зҡ„еҖјд№ӢеҗҺгҖӮдәҢеҲҶжҹҘжүҫеңЁеҜ№ж•°ж—¶й—ҙ\
    \ `O(log[2]n)` еҶ…иҝҗиЎҢпјҢеӣ жӯӨжҖ»и®Ўз®—еӨҚжқӮеәҰдёә `O(n * log[2]n)`гҖӮ\n\n```sql\ndeclare\n    x    numbers\
    \ := numbers(14, 15, 9, 11, 16, 12, 13);\n    m    numbers := numbers();\n   \
    \ l    int;\n    newl int;\n    v    varchar2(4000);\n    -- ж•°з»„ M дёӯе°ҸдәҺ p зҡ„жңҖеӨ§е…ғзҙ зҡ„зҙўеј•\n\
    \    function f(p in number) return int as\n        lo  int;\n        hi  int;\n\
    \        mid int;\n    begin\n        lo := 1;\n        hi := l;\n        while\
    \ lo <= hi loop\n            mid := floor((lo + hi) / 2);\n            if x(m(mid))\
    \ < p then\n                lo := mid + 1;\n            else\n               \
    \ hi := mid - 1;\n            end if;\n        end loop;\n        return hi;\n\
    \    end;\nbegin\n    for i in 1 .. x.count loop\n        newl := f(x(i)) + 1;\n\
    \        if newl > l then\n            l := newl;\n            m.extend;\n   \
    \     end if;\n        m(newl) := i;\n        v := '';\n        for j in 1 ..\
    \ l loop\n            v := v || ' ' || x(m(j));\n        end loop;\n        dbms_output.put_line(i\
    \ || ' ' || v);\n    end loop;\nend;\n/\n```\n\n```\n1  14\n2  14 15\n3  9 15\n\
    4  9 11\n5  9 11 16\n6  9 11 12\n7  9 11 12 13\nPL/SQL procedure successfully\
    \ completed.\n```\n\n`l` жҳҜжҜҸж¬Ўиҝӯд»Јж—¶жңҖй•ҝйҖ’еўһеӯҗеәҸеҲ—зҡ„й•ҝеәҰгҖӮ\n\nSQL е®һзҺ°еҸҜд»ҘдҪҝз”Ё `model` еӯҗеҸҘе®ҢжҲҗгҖӮ\n\n```sql\n\
    with t(id, value) as\n    (select rownum, column_value from table(numbers(14,\
    \ 15, 9, 11, 16, 12, 13)))\nselect *\nfrom t\nmodel\n    dimension by (id, value)\n\
    \    measures(0 l)\n    (l[any, any] order by id = nvl(max(l)[id < cv(id),value\
    \ < cv(value)],0) + 1)\norder by 1;\n```\n\nиҜҘж–№жі•зұ»дјјдәҺ PL/SQL дёӯзҡ„з¬¬дёҖдёӘи§ЈеҶіж–№жЎҲпјҢдҪҶз”ұдәҺж— жі•еңЁзәҜ SQL\
    \ дёӯеғҸдҪҝз”Ё PL/SQL йӮЈж ·й«ҳж•Ҳең°е®һзҺ°з¬¬дәҢдёӘи§ЈеҶіж–№жЎҲгҖӮеҪ“жҲ‘д»¬дҪҝз”Ё `model` ж—¶пјҢжҲ‘д»¬еӨ„зҗҶзҡ„жҳҜеҢ…еҗ«еҲ—е’ҢиЎҢзҡ„жүҒе№іж•°жҚ®йӣҶпјҲеҚідҪҝжҲ‘д»¬и®Өдёәе®ғжҳҜдёҖдёӘеӨҡз»ҙж•°з»„пјүпјҢе№¶дё”ж— жі•дҪҝз”Ёд»»дҪ•иҫ…еҠ©ж•°жҚ®з»“жһ„жқҘдјҳеҢ–и§ЈеҶіж–№жЎҲгҖӮ\n\
    \n## QuineпјҲиҮӘдә§з”ҹзЁӢеәҸпјү\n\nжңҖеҗҺдёҖдёӘжөӢйӘҢжӣҙеӨҡжҳҜдёәдәҶи¶Је‘іпјҢиҖҢдёҚжҳҜдёәдәҶеұ•зӨә Oracle SQL зү№жҖ§гҖӮQuine жҳҜдёҖдёӘдёҚжҺҘеҸ—д»»дҪ•иҫ“е…ҘпјҢе№¶д»Ҙе…¶иҮӘиә«жәҗд»Јз Ғзҡ„еүҜжң¬дҪңдёәе”ҜдёҖиҫ“еҮәзҡ„зЁӢеәҸгҖӮдҪ еҸҜд»ҘеңЁдә’иҒ”зҪ‘дёҠжүҫеҲ°еҗ„з§Қзј–зЁӢиҜӯиЁҖзҡ„и®ёеӨҡи§ЈеҶіж–№жЎҲпјҢжҲ‘е°ҶдёҚдё“жіЁдәҺ\
    \ PL/SQL и§ЈеҶіж–№жЎҲпјҢеӣ дёәе…¶ж–№жі•дёҺ Pascal зӯүиҜӯиЁҖйқһеёёзӣёдјјгҖӮеұ•зӨә SQL ж–№жі•еҲҷжӣҙжңүи¶ЈдёҖдәӣгҖӮ\n\n### и§ЈеҶіж–№жЎҲ\n\nе…¶дёӯдёҖдёӘиҰҒжұӮжҳҜзЁӢеәҸпјҲеңЁжҲ‘д»¬зҡ„дҫӢеӯҗдёӯжҳҜ\
    \ SQL жҹҘиҜўпјүдёҚиғҪи®ҝй—®еӨ–йғЁжәҗжқҘиҜ»еҸ–е…¶д»Јз ҒгҖӮеӣ жӯӨпјҢдёӢйқўзҡ„жҹҘиҜўдёҚиғҪиў«и§ҶдёәдёҖдёӘе®Ңж•ҙзҡ„и§ЈеҶіж–№жЎҲгҖӮ\n\n```sql\nset pagesize 0 linesize\
    \ 90\nselect sql_text||';'from v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\n\
    select sql_text||';'from v$sqlarea join v$session using(sql_id)where sid=userenv('sid');\n\
    ```\n\nеҸҰдёҖж–№йқўпјҢд»ҘдёӢдёӨдёӘи§ЈеҶіж–№жЎҲж»Ўи¶іжүҖжңүиҰҒжұӮгҖӮ\n\n```sql\nselect substr(rpad(1,125,'||chr(39)),26)from\n\
    dual;select substr(rpad(1,125,'||chr(39)),26)from\ndual;\nselect substr(rpad(1,125,'||chr(39)),26)from\n\
    dual;select substr(rpad(1,125,'||chr(39)),26)from\ndual;\n```\n\n```sql\nselect\n\
    replace('@''[@'||chr(93)||''')from dual;','@',q'[select\nreplace('@''[@'||chr(93)||''')from\
    \ dual;','@',q]')from dual;\nselect\nreplace('@''[@'||chr(93)||''')from dual;','@',q'[select\n\
    replace('@''[@'||chr(93)||''')from dual;','@',q]')from dual;\n```\n\nд№ҹи®ёдҪ еҸҜд»ҘеңЁ Oracle\
    \ SQL дёӯеҶҷеҮәжӣҙзҹӯзҡ„ quineпјҹ\n\n## жҖ»з»“\n\n*иҝҷйҮҢеұ•зӨәдәҶ*йҖҡиҝҮйҖүе®ҡзҡ„д»»еҠЎпјҢOracle дё“жңү SQL жҜ”ж ҮеҮҶ SQL ејәеӨ§еҫ—еӨҡпјҢе№¶дё”дёҖдәӣд»»еҠЎеҸҜд»Ҙз”Ёйқһеёёе°‘зҡ„д»Јз Ғд»Ҙй«ҳеәҰеҸҜжү©еұ•зҡ„ж–№ејҸи§ЈеҶігҖӮжҲ‘зү№еҲ«жғіејәи°ғ\
    \ Oracle 12c зҡ„дёҖдёӘж–°зү№жҖ§вҖ”вҖ”жЁЎејҸеҢ№й…ҚпјҢе®ғдҪҝеҫ—иғҪеӨҹд»Ҙйқһеёёй«ҳж•Ҳзҡ„ж–№ејҸи§ЈеҶіеҗ„з§Қд»»еҠЎпјҢеҗҰеҲҷиҝҷдәӣд»»еҠЎе°ҶйңҖиҰҒеӨ§йҮҸзҡ„ PL/SQL д»Јз ҒгҖӮ\n\nдёҖдәӣеӨҚжқӮд»»еҠЎеҸҜд»ҘдҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈжҲ–еёҰжңү\
    \ `model` еӯҗеҸҘзҡ„ж–№жі•и§ЈеҶіпјҢе…¶жҖ§иғҪдёҺ PL/SQL зӣёжҜ”е…·жңүз«һдәүеҠӣгҖӮиҝҷдёӨз§Қж–№жі•йғҪдёҚйңҖиҰҒеҜ№иұЎйӣҶеҗҲпјҢиҝҷдёҺдҪҝз”Ёз®ЎйҒ“еҮҪж•°зҡ„ PL/SQL ж–№жі•дёҚеҗҢгҖӮ`model`\
    \ еӯҗеҸҘзҡ„дјҳзӮ№жҳҜд»Јз Ғз®ҖжҙҒпјҢе№¶дё”еңЁеҲҶеҢәдҪҝз”Ёе’Ңе№¶иЎҢжү§иЎҢж—¶е…·жңүеҮәиүІзҡ„еҸҜжү©еұ•жҖ§гҖӮйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јзҡ„дјҳзӮ№жҳҜеңЁ SQL еј•ж“ҺиҢғеӣҙеҶ…жү§иЎҢпјҢе№¶дё”дёҚйңҖиҰҒеңЁжҜҸж¬Ўиҝӯд»Јж—¶иҝӣиЎҢдёҠдёӢж–ҮеҲҮжҚўгҖӮ\n\
    \nз„¶иҖҢпјҢеҰӮжһңдҪ йңҖиҰҒе®һзҺ°дёҖдёӘеҸҜиғҪйңҖиҰҒйўқеӨ–ж•°жҚ®з»“жһ„е’Ңжү§иЎҢжҺ§еҲ¶зҡ„еӨҚжқӮз®—жі•пјҢйӮЈд№Ҳ PL/SQL еҫҖеҫҖжҳҜжӣҙдјҳзҡ„ж–№жі•гҖӮдҪҶжҳҜпјҢеҪ“дҪ еҲҮжҚўеҲ°иҝҮзЁӢиҜӯиЁҖжқҘеӨ„зҗҶж•°жҚ®ж—¶пјҢдҪ жҖ»жҳҜеә”иҜҘжңүдёҖдёӘзӯ”жЎҲжқҘиҜҙжҳҺдёәд»Җд№ҲеҜ№дәҺдҪ зҡ„зү№е®ҡд»»еҠЎе®ғжҜ”\
    \ SQL жӣҙеҘҪгҖӮжңҖеҗҺйңҖиҰҒжіЁж„Ҹзҡ„дёҖзӮ№жҳҜпјҡеҰӮжһңдҪ еҝ…йЎ»е®һзҺ°дёҖдәӣйңҖиҰҒеӨ§йҮҸ CPU зҡ„еҜҶйӣҶи®Ўз®—пјҢйӮЈд№ҲеӨ–йғЁеә“е’ҢдҪҝз”Ё C иҜӯиЁҖе®һзҺ°еҸҜиғҪжҳҜжңҖдҪійҖүжӢ©гҖӮ\n\nз»ҶиҠӮзЎ®е®һеҫҲйҮҚиҰҒпјҢеӣ жӯӨеңЁеҶіе®ҡдјҳйҖүж–№жі•д№ӢеүҚпјҢдҪ еҝ…йЎ»иҖғиҷ‘зү№е®ҡд»»еҠЎзҡ„е…·дҪ“жғ…еҶөпјҢе№¶жҜ”иҫғдёҚеҗҢж–№жі•еңЁдҪ жүҖз”Ё\
    \ Oracle зүҲжң¬дёҠзҡ„иЎЁзҺ°гҖӮ"
