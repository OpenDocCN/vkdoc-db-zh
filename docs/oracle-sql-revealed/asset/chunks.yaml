    еҜ№дәҺе…¶д»–еӣҪе®¶/ең°еҢәпјҢеҢәеҸ·й•ҝеәҰзҡ„иҢғеӣҙеҸҜиғҪиҰҒе№ҝжіӣеҫ—еӨҡпјҢе№¶дё”дёҖдёӘеҢәеҸ·жҳҜеҸҰдёҖдёӘеҢәеҸ·еүҚзјҖзҡ„жғ…еҶөеҸҜиғҪиҰҒеӨҡеҫ—еӨҡгҖӮ


    дёҖдёӘзӣҙжҺҘзҡ„и§ЈеҶіж–№жЎҲеҰӮдёӢпјҡ


    ```

    select code, sum(duration) s

    from (select ca.rowid,

    num,

    duration,

    max(code)

    keep(dense_rank first order by length(code) desc) code

    from phone_call ca

    left join phone_code co

    on ca.num like co.code || ''%''

    group by ca.rowid, num, duration)

    where code is not null

    group by code

    order by code;

    ```

