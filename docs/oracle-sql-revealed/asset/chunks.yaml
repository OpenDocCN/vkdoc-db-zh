    ```


    еӣ жӯӨпјҢеҖј `cnt2` е’Ң `dist2` ж— жі•дҪҝз”ЁеҲҶжһҗеҮҪж•°и®Ўз®—гҖӮ


    иҝҳеҖјеҫ—дёҖжҸҗзҡ„жҳҜпјҢеҰӮжһңжҺ’еәҸй”®зҡ„зұ»еһӢдёҚж”ҜжҢҒз®—жңҜиҝҗз®—пјҢеҲҷж— жі•дҪҝз”ЁйҖ»иҫ‘еҒҸз§»пјҲ`range`пјүгҖӮжҳҫз„¶пјҢзү©зҗҶеҒҸз§»пјҲ`rows`пјүжІЎжңүжӯӨйҷҗеҲ¶гҖӮ


    еӨ§еӨҡж•°еҲҶжһҗеҮҪж•°д№ҹеҸҜд»Ҙе……еҪ“иҒҡеҗҲеҮҪж•°пјҲеҰӮжһңжңӘжҢҮе®ҡ `over`пјүпјӣз„¶иҖҢпјҢе…¶дёӯдёҖдәӣжҳҜзәҜзІ№зҡ„еҲҶжһҗеҮҪж•°пјҢдҫӢеҰӮ `row_number` жҲ– `rank`гҖӮеҰӮеүҚжүҖиҝ°пјҢ`order
    by` еҜ№дәҺжӯӨзұ»еҮҪж•°жҳҜеҝ…йңҖзҡ„гҖӮ


    `listagg` жҳҜеҲҶжһҗеҮҪж•°зҡ„дёҖдёӘзү№дҫӢгҖӮйҰ–е…ҲпјҢе®ғдёҚжҳҜеҸҜдәӨжҚўзҡ„пјҢиҝҷж„Ҹе‘ізқҖз¬¬дёҖдёӘеҖје’Ңз¬¬дәҢдёӘеҖјзҡ„иҝһжҺҘдёҺз¬¬дәҢдёӘеҖје’Ңз¬¬дёҖдёӘеҖјзҡ„иҝһжҺҘдёҚеҗҢпјҢиҝҷдёҺ `sum` жҲ– `average`
    дёҚеҗҢгҖӮе…¶ж¬ЎпјҢдёҚиғҪеңЁеҲҶжһҗеӯҗеҸҘдёӯжҢҮе®ҡ `order by`гҖӮз¬¬дёүпјҢж— жі•еңЁеҮҪж•°дёӯдҪҝз”Ё `distinct` е…ій”®еӯ—гҖӮ`listagg` е’Ң UDF `stragg`пјҲжәҗд»Јз ҒеҸҜеңЁ
    AskTom дёҠжүҫеҲ°пјүд№Ӣй—ҙзҡ„дёҖдәӣе·®ејӮеҰӮжё…еҚ• [3-7](#A455196_1_En_3_Chapter.html#Par30) жүҖзӨәгҖӮ


    ```sql

    with t as

    (select rownum id, column_value value

    from table(sys.odcinumberlist(2, 1, 1, 3, 1))),

    t0 as

    (select t.*, row_number() over(partition by value order by id) rn from t)

    select t1.*,

    (select listagg(value, '','') within group(order by value)

    from t t_in

    where t_in.id <= t1.id) cumul_ord

    from (select t0.*,

    listagg(value, '','') within group(order by value) over() list_ord,

    listagg(decode(rn, 1, value), '','') within group(order by value) over() dist_ord,

    stragg(value) over(order by id) cumul,

    stragg(distinct value) over() dist,

    stragg(decode(rn, 1, value)) over(order by id) cumul_dist

    from t0) t1

    order by id;

