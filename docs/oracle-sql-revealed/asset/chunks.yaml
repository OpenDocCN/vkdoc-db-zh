    еңЁе°ҶжҹҘиҜўйҮҚеҶҷдёә `not exists` жү§иЎҢеҗҺпјҢж—¶й—ҙеҮҸе°‘дәҶдёӨеҖҚд»ҘдёҠгҖӮеҰӮжһңеңЁеӯҗжҹҘиҜўдёӯжҢҮе®ҡйўқеӨ–зҡ„иҝҮж»ӨжқЎд»¶ `and where rownum = 1`пјҢз”ұдәҺиҝҮж»ӨеҷЁзҡ„е·ҘдҪңж–№ејҸпјҢиҝҷеҜ№жҖ§иғҪжІЎжңүеҪұе“ҚгҖӮ


    жҳҫз„¶пјҢеӨ§йғЁеҲҶж—¶й—ҙйғҪиҠұеңЁдәҶиҝһжҺҘе’ҢиҜ„дј° `like` и°“иҜҚдёҠпјҢжңҖеҘҪиғҪж‘Ҷи„ұе®ғгҖӮжҲ‘д»¬еҸҜд»ҘдёәжҜҸдёӘи·Ҝеҫ„жҙҫз”ҹжүҖжңүеӯҗи·Ҝеҫ„пјҢеҰӮжһңжҹҗдәӣи·Ҝеҫ„жңүе…ұеҗҢзҡ„еӯҗи·Ҝеҫ„пјҢеҲҷеҸӘиҝ”еӣһйӮЈдәӣе…·жңүжңҖе°‘еӯҗи·Ҝеҫ„ж•°зҡ„и·Ҝеҫ„пјҢеҰӮ
    Listing [12-22](#A455196_1_En_12_Chapter.html#Par182) жүҖзӨәгҖӮ


    ```sql

    with t0 as

    (select path,

    length(path) - length(replace(path, ''/'')) - 1 depth,

    substr(path, 1, instr(path, ''/'', 1, l.id + 1)) token

    from t_path,

    lateral (select rownum id

    from dual

    connect by level <

    length(path) - length(replace(path, ''/''))) l),

    t1 as (select t0.*, min(depth) over(partition by token) m from t0)

    select path from t1 group by path, depth having depth = min(m)

    order by path;

    PATH


