    дёәдәҶи®Ўз®— `x2` зӯүдәҺ `x1` зҡ„иЎҢзҡ„ `x3` д№Ӣе’ҢпјҢжҲ‘д»¬дҪҝз”ЁдәҶдёҖдёӘе…·жңүзӯүдәҺ `x1` дёҺ `x2` д№Ӣе·®зҡ„иҢғеӣҙеҒҸз§»йҮҸзҡ„зӘ—еҸЈгҖӮж №жҚ® `x1` еӨ§дәҺиҝҳжҳҜе°ҸдәҺ
    `x2`пјҢжҲ‘д»¬иҖғиҷ‘ `following`пјҲд№ӢеҗҺпјүжҲ– `preceding`пјҲд№ӢеүҚпјүзҡ„иЎҢгҖӮеҜ№дәҺжҜҸдёҖиЎҢпјҢжҲ‘д»¬еҸӘе…іеҝғдёҖдёӘжҖ»е’ҢпјҢдҪҶ Oracle йңҖиҰҒдёәжүҖжңүиЎҢи®Ўз®—дёӨдёӘжҖ»е’ҢгҖӮеӣ жӯӨпјҢдёәдәҶйҒҝе…ҚеҪ“
    `x1-x2` жҲ– `x2-x1` дёәиҙҹж•°ж—¶еҮәзҺ°ејӮеёёпјҢжҲ‘д»¬еә”з”ЁдәҶ `greatest` еҮҪж•°гҖӮ


    йҷӨдәҶжҢүиҢғеӣҙиҝӣиЎҢзҡ„йҖ»иҫ‘еҒҸз§»пјҢзӘ—еҸЈиҝҳеҸҜд»ҘйҖҡиҝҮжҢүиЎҢиҝӣиЎҢзү©зҗҶеҒҸз§»жқҘжҢҮе®ҡгҖӮдёәдәҶзӘҒжҳҫе·®ејӮпјҢи®©жҲ‘д»¬иҖғиҷ‘д»ҘдёӢд»»еҠЎгҖӮжңүдёҖдёӘеҢ…еҗ« ATM еҸ–ж¬ҫдҝЎжҒҜзҡ„иЎЁпјҢжҲ‘д»¬йңҖиҰҒдёәжҜҸж¬ЎеҸ–ж¬ҫи®Ўз®—д»ҘдёӢеҶ…е®№пјҡ


    *   иҖғиҷ‘еҲ°еҪ“еүҚдәӨжҳ“е’Ңд№ӢеүҚ 5 з¬”дәӨжҳ“пјҲжҖ»е…ұ 6 з¬”еҸ–ж¬ҫпјүпјҢйҮ‘йўқдёҚдҪҺдәҺ 50 зҡ„дәӨжҳ“ж•°йҮҸпјҲ`cnt1`пјүпјӣ

    *   иҖғиҷ‘еҲ°еҪ“еүҚдәӨжҳ“е’Ңд№ӢеүҚ 5 еҲҶй’ҹиҢғеӣҙеҶ…пјҲ`cnt2`пјүзҡ„дәӨжҳ“пјҢйҮ‘йўқдёҚдҪҺдәҺ 50 зҡ„дәӨжҳ“ж•°йҮҸгҖӮ


    ```sql

    exec dbms_random.seed(11);

    create table atm as

    select trunc(sysdate) + (2 * rownum - 1) / (24 * 60) ts,

    trunc(dbms_random.value(1, 20 + 1)) * 5 amount

    from dual

    connect by level <= 15;

    select to_char(ts, ''mi'') minute,

    amount,

    count(nullif(sign(amount - 50), -1))

    over(order by ts rows 5 preceding) cnt1,

    count(nullif(sign(amount - 50), -1))

    over(order by ts range interval ''5'' minute preceding) cnt2

    from atm;

