    # з¬¬дёҖйғЁеҲҶ

    ## зү№жҖ§дёҺзҗҶи®ә


    з¬¬ 1 иҮі 10 з« йҒөеҫӘд»ҘдёӢ Oracle SQL зү№жҖ§еҲ—иЎЁиҝӣиЎҢз»„з»Үпјҡ


    1.  жүҖжңүиҝһжҺҘйғҪеҸҜд»ҘеңЁжҹҘиҜўдёӯйҡҗејҸжҢҮе®ҡпјӣдҪҶжңүж—¶дҪҝз”ЁеӯҗжҹҘиҜўжҳҜжңүж„Ҹд№үзҡ„пјҢдҫӢеҰӮпјҢдёәдәҶжӣҙй«ҳж•Ҳең°е®һзҺ°`ANTI`/`EQUI`иҝһжҺҘгҖӮе…іиҒ”ж ҮйҮҸеӯҗжҹҘиҜўеҸҜиғҪжҜ”еӨ–иҝһжҺҘжӣҙй«ҳж•ҲпјҢиҝҷеҫ—зӣҠдәҺж ҮйҮҸеӯҗжҹҘиҜўзј“еӯҳгҖӮ

    2.  жҹҘиҜўиҪ¬жҚўдҪҝеҫ—дёӨдёӘж–Үжң¬е·®ејӮеҫҲеӨ§зҡ„жҹҘиҜўеҸҜиғҪжӢҘжңүзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’е’ҢжҖ§иғҪгҖӮеҸҰдёҖж–№йқўпјҢжҹҘиҜўиҪ¬жҚўе№¶йқһдёҮиғҪиҚҜпјҢжңүж—¶йңҖиҰҒжүӢеҠЁйҮҚжһ„жҹҘиҜўд»ҘиҺ·еҫ—жңҖдҪіжҖ§иғҪгҖӮ

    3.  еҲҶжһҗеҮҪж•°жҳҜдёҖйЎ№е®қиҙөзҡ„зү№жҖ§пјҢжңүеҠ©дәҺеңЁдёҚдҪҝз”ЁиҝһжҺҘзҡ„жғ…еҶөдёӢе®һзҺ°еӨҚжқӮйҖ»иҫ‘гҖӮеҸҰдёҖж–№йқўпјҢе®ғд»¬еҮ д№ҺжҖ»жҳҜйңҖиҰҒжҺ’еәҸпјҢиҝҷеңЁж•°жҚ®йҮҸеӨ§зҡ„жғ…еҶөдёӢеҸҜиғҪжҲҗдёәй—®йўҳгҖӮ

    4.  иҒҡеҗҲеҮҪж•°е…Ғи®ёжҲ‘д»¬еҜ№ж•°жҚ®иҝӣиЎҢеҲҶз»„е№¶и®Ўз®—иҒҡеҗҲеҖјпјҢеҗҢж—¶д№ҹеҸҜе®һзҺ°дёҖдәӣеӨҚжқӮзҡ„жүҒе№іеҢ–жҲ–йҖҸи§ҶйҖ»иҫ‘гҖӮ

    5.  `Connect by`жҳҜйҒҚеҺҶеұӮж¬Ўз»“жһ„жҲ–з”ҹжҲҗеҲ—иЎЁзҡ„жңҖдҪіе·Ҙе…·пјӣз„¶иҖҢпјҢе°Ҫз®ЎеҶ…зҪ®дәҶеӨ„зҗҶеҫӘзҺҜзҡ„иғҪеҠӣпјҢдҪҶеҪ“жҖ§иғҪиҮіе…ійҮҚиҰҒж—¶пјҢдёҚеә”дҪҝз”Ёе®ғжқҘйҒҚеҺҶеӣҫгҖӮ

    6.  йҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–жү©еұ•дәҶйҒҚеҺҶеұӮж¬Ўз»“жһ„зҡ„иғҪеҠӣпјҢдҪҝеҫ—еҸҜд»Ҙеј•з”ЁеңЁдёҠдёҖеұӮзә§и®Ўз®—зҡ„еҖјгҖӮеҪ“йҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–з”ЁдәҺж•°жҚ®йӣҶзҡ„иҝӯд»ЈиҪ¬жҚўж—¶пјҢеә”иҖғиҷ‘еҲ°жҜҸж¬Ўиҝӯд»ЈйғҪдјҡз”ҹжҲҗдёҖдёӘж–°зҡ„и®°еҪ•йӣҶпјҢиҝҷдјҡеҜјиҮҙеӨ§йҮҸзҡ„еҶ…еӯҳж¶ҲиҖ—гҖӮдёҺ`model`еӯҗеҸҘзӣёжҜ”зҡ„дёҖдёӘеҠҹиғҪдјҳеҠҝжҳҜпјҢдҪ еҸҜд»ҘеңЁжҜҸдёҖжӯҘи®Ўз®—еӨҡдёӘеәҰйҮҸгҖӮиҖҢеңЁ`model`еӯҗеҸҘзҡ„жғ…еҶөдёӢпјҢз¬¬дёҖдёӘеәҰйҮҸдјҡеҜ№жүҖжңүжҢҮе®ҡиЎҢиҝӣиЎҢи®Ўз®—пјҢз„¶еҗҺжҳҜз¬¬дәҢдёӘпјҢд»ҘжӯӨзұ»жҺЁгҖӮ

    7.  `Model`жҳҜжңҖејәеӨ§зҡ„ SQL зү№жҖ§пјҢдҪҶе®ғдё»иҰҒеңЁзү№е®ҡеңәжҷҜдёӢиЎЁзҺ°еҮәиүІгҖӮ`Model`еҸҜиғҪйңҖиҰҒеӨ§йҮҸзҡ„ CPU е’ҢеҶ…еӯҳж¶ҲиҖ—пјҢеҜ№дәҺж•°зҷҫдёҮиЎҢзҡ„ж•°жҚ®жү©еұ•жҖ§дёҚеӨҹеҘҪпјӣз„¶иҖҢпјҢеңЁеҲҶеҢәжЁЎеһӢзҡ„е№¶иЎҢжү§иЎҢжғ…еҶөдёӢпјҢжҖ§иғҪеҸҜд»Ҙеҫ—еҲ°жҳҫи‘—жҸҗеҚҮгҖӮ

    8.  иЎҢжЁЎејҸеҢ№й…Қдёәи®°еҪ•йӣҶеҲҶжһҗеўһеҠ дәҶжҳҫи‘—зҡ„зҒөжҙ»жҖ§гҖӮиҜҘзү№жҖ§жҳҜе”ҜдёҖиғҪеӨҹд»ҘеҸҜжү©еұ•дё”й«ҳж•Ҳзҡ„ж–№ејҸпјҢдҪҝз”ЁзәҜ SQL и§ЈеҶіе№ҝжіӣд»»еҠЎиҢғеӣҙзҡ„ж–№жі•пјҢжӯӨеӨ–пјҢеҜ№дәҺйӮЈдәӣд№ҹиғҪз”ЁеҲҶжһҗеҮҪж•°и§ЈеҶізҡ„д»»еҠЎпјҢе®ғиҝҳиЎЁзҺ°еҮәзЁҚеҘҪзҡ„жҖ§иғҪгҖӮ

    9.  дёҖдёӘжҹҘиҜўеқ—еҸҜиғҪеҢ…еҗ«еҗ„з§ҚеӯҗеҸҘпјҢеҢ…жӢ¬иҝһжҺҘгҖҒиҒҡеҗҲе’ҢеҲҶжһҗпјҢз”ҡиҮіж··еҗҲдәҶй«ҳзә§зү№жҖ§пјҢеҰӮ`model`еӯҗеҸҘе’ҢжЁЎејҸеҢ№й…ҚгҖӮйҮҚиҰҒзҡ„жҳҜиҰҒд»ҺйҖ»иҫ‘и§’еәҰзҗҶи§Јиҝҷе°ҶеҰӮдҪ•жү§иЎҢпјҢд»ҘеҸҠдҪҝз”ЁеҶ…иҒ”и§Ҷеӣҫзҡ„дјҳзјәзӮ№гҖӮ

    10. е·ІиҜҒжҳҺ SQL жҳҜеӣҫзҒөе®ҢеӨҮзҡ„иҜӯиЁҖпјҢе№¶дё”еңЁеӯҰжңҜзӣ®зҡ„дёҠеұ•зӨәдәҶеҰӮдҪ•дҪҝз”Ёиҝӯд»ЈжЁЎеһӢе®һзҺ°д»»ж„Ҹз®—жі•гҖӮз„¶иҖҢпјҢSQL жҳҜдёҖз§ҚеЈ°жҳҺжҖ§иҜӯиЁҖпјҢжҳҜдёәж“ҚдҪңж•°жҚ®иҖҢи®ҫи®Ўзҡ„пјҢиҖҢдёҚжҳҜз”ЁдәҺиҝӯд»Ји®Ўз®—гҖӮ


    Tom Kyte еӨҡе№ҙжқҘеӨҡж¬ЎеҶҷйҒ“пјҡвҖңеҰӮжһңеҸҜиғҪзҡ„иҜқпјҢдҪ еә”иҜҘеңЁеҚ•дёӘ SQL иҜӯеҸҘдёӯе®ҢжҲҗгҖӮвҖқ жҲ‘жғізЁҚеҫ®иҜҰз»Ҷйҳҗиҝ°дёҖдёӢиҝҷдёӘи§ӮзӮ№гҖӮеҚідҪҝжҲ‘д»¬дёҚиҖғиҷ‘йҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–гҖҒ`model`еӯҗеҸҘгҖҒиЎҢжЁЎејҸеҢ№й…Қе’Ң`connect
    by`иҝҷдәӣй«ҳзә§зү№жҖ§пјҢд»ҚжңүдёҖдәӣд»»еҠЎдҪҝз”Ё PL/SQL и§ЈеҶідјҡжӣҙй«ҳж•ҲгҖӮз¬¬ 11 з« е°ҶиҖғиҷ‘еҗ„з§ҚдҫӢеӯҗжқҘжҸҗдҫӣжӣҙеӨҡиғҢжҷҜдҝЎжҒҜгҖӮ


    ## 1. иҝһжҺҘ


    еӨ§еӨҡж•°е®һйҷ…жҹҘиҜўйңҖиҰҒз»„еҗҲжқҘиҮӘеӨҡдёӘиЎЁзҡ„ж•°жҚ®пјҢиҖҢдёҚжҳҜеҸӘжҹҘиҜўеҚ•дёӘиЎЁгҖӮйҖ»иҫ‘еҸҜд»Ҙе°ҒиЈ…еңЁи§ҶеӣҫдёӯпјҢд»Ҙеҗ‘жңҖз»Ҳз”ЁжҲ·йҡҗи—ҸеӨҚжқӮжҖ§пјҢдҪҶж•°жҚ®еә“ж— и®әеҰӮдҪ•йғҪйңҖиҰҒи®ҝй—®еӨҡдёӘиЎЁжқҘиҺ·еҸ–з»“жһңйӣҶгҖӮжҹҘиҜўз»“жһңдёӯе№¶дёҚдёҖе®ҡйңҖиҰҒеҢ…еҗ«жҹҘиҜўдёӯжүҖжңүиЎЁзҡ„ж•°жҚ®пјӣдҫӢеҰӮпјҢжҹҗдәӣиЎЁеҸҜиғҪз”ЁдәҺиҝҮж»Өе…¶д»–иЎЁзҡ„ж•°жҚ®гҖӮ


    жқҘиҮӘдёӨдёӘиЎЁзҡ„ж•°жҚ®еҸҜд»ҘдҪҝз”Ё`join`пјҲ`join`е…ій”®еӯ—е№¶йқһеҝ…йңҖпјҢеҗҺж–Үе°Ҷеұ•зӨәпјүгҖҒеӯҗжҹҘиҜўпјҲеҸҜд»ҘжҳҜе…іиҒ”зҡ„жҲ–йқһе…іиҒ”зҡ„пјүгҖҒжЁӘеҗ‘и§ҶеӣҫпјҲд»Һ`Oracle 12c`ејҖе§Ӣж”ҜжҢҒпјүжҲ–йӣҶеҗҲиҝҗз®—з¬ҰпјҲ`union`/`union
    all`/`intersect`/`minus`пјүиҝӣиЎҢз»„еҗҲгҖӮ


    д»»дҪ•дҪҝз”ЁйӣҶеҗҲиҝҗз®—з¬ҰжҲ–еӯҗжҹҘиҜўе®һзҺ°зҡ„йҖ»иҫ‘йғҪеҸҜд»Ҙз”ЁиҝһжҺҘйҮҚеҶҷпјҢдҪҶд»ҺжҖ§иғҪи§’еәҰжқҘзңӢпјҢиҝҷе№¶дёҚжҖ»жҳҜжңҖдјҳзҡ„гҖӮжӯӨеӨ–пјҢиҜӯд№үдёҠзӯүж•Ҳзҡ„жҹҘиҜўеңЁеә”з”ЁжҹҘиҜўиҪ¬жҚўеҗҺпјҲиҜҰи§Ғз¬¬ 2 з« вҖңжҹҘиҜўиҪ¬жҚўвҖқпјүеҸҜиғҪиў«йҮҚеҶҷдёәзӣёеҗҢзҡ„жҹҘиҜўпјҢжҲ–иҖ…еҚідҪҝжңӘиў«йҮҚеҶҷдёәзӣёеҗҢзҡ„жҹҘиҜўпјҢд№ҹеҸҜиғҪе…·жңүзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’гҖӮеңЁж—§зүҲжң¬дёӯпјҢеҸҜд»ҘдҪҝз”ЁиЎЁиҝҗз®—з¬ҰжқҘжЁЎжӢҹжЁӘеҗ‘и§ҶеӣҫгҖӮ


    еұ•жңӣжңӘжқҘпјҢи®©жҲ‘жҸҗдёҖдёӢпјҢдёҖдәӣеҸӘдҪҝз”ЁеҚ•дёӘиЎЁзҡ„жҹҘиҜўеҸҜиғҪдёҚеӨӘе®№жҳ“зҗҶи§ЈпјҢе№¶дё”еҸҜиғҪеҢ…еҗ«зӣёеҪ“еӨҚжқӮзҡ„йҖ»иҫ‘пјҢдҪҶиҝҷз§Қжғ…еҶөжҜ”иҫғе°‘и§ҒпјҲдҪ еҸҜд»ҘеңЁз¬¬дәҢйғЁеҲҶжүҫеҲ°еҫҲеӨҡиҝҷж ·зҡ„жҹҘиҜўпјүгҖӮ


    жң¬з« ж¶өзӣ–иҝһжҺҘпјҲеҢ…жӢ¬ ANSI е’Ңдј з»ҹзҡ„ Oracle еӨ–иҝһжҺҘиҜӯжі•пјүд»ҘеҸҠжңүе…іеӯҗжҹҘиҜўгҖҒжЁӘеҗ‘и§Ҷеӣҫе’ҢиҝһжҺҘж–№жі•зҡ„дёҖдәӣз»ҶиҠӮгҖӮ

    '
- fmt: "# ANSI Joins\n\nд»ҘдёӢиЎЁж је°Ҷз”ЁдәҺжј”зӨәгҖӮ\n\n*   дәӨеҸүиҝһжҺҘпјҲд№ҹз§°дёәз¬ӣеҚЎе°”з§ҜпјүгҖӮе®ғиҝ”еӣһдёӨдёӘиЎЁиЎҢзҡ„жүҖжңүеҸҜиғҪз»„еҗҲгҖӮ\n\n```sql\n\
    \    select *\n    from t1\n    cross join t2;\n    ID N         ID N\n    ----------\
    \ - ---------- -\n    1 A          2 B\n    1 A          0 X\n    0 X        \
    \  2 B\n    0 X          0 X\n    Listing 1-2\n    Cross join\n```\n\n*   еҶ…иҝһжҺҘ\
    \ вҖ“ дёҖз§ҚиҝһжҺҘзұ»еһӢпјҢд»…иҝ”еӣһжқҘиҮӘиҝһжҺҘиЎЁзҡ„гҖҒж»Ўи¶іиҝһжҺҘи°“иҜҚпјҲеҚіи°“иҜҚи®Ўз®—з»“жһңдёә `TRUE`пјүзҡ„иЎҢгҖӮ\n\n```sql\n    select *\n    from\
    \ t1\n    join t2\n    on t1.id = t2.id;\n    ID N         ID N\n    ----------\
    \ - ---------- -\n    0 X          0 X\n    Listing 1-3\n    Inner join\n```\n\
    \n```sql\ncreate table t1(id, name) as\nselect 1, 'A' from dual union all select\
    \ 0, 'X' from dual;\ncreate table t2(id, name) as\nselect 2, 'B' from dual union\
    \ all select 0, 'X' from dual;\nListing 1-1\nTables for demonstration\n```\n\n\
    еңЁ `join` е…ій”®еӯ—д№ӢеүҚзҡ„иЎЁз§°дёәвҖңе·ҰиҝһжҺҘиЎЁвҖқпјҢеңЁ `join` е…ій”®еӯ—д№ӢеҗҺзҡ„иЎЁз§°дёәвҖңеҸіиҝһжҺҘиЎЁвҖқгҖӮеҜ№дәҺеҶ…иҝһжҺҘпјҢе“ӘдёӘиЎЁжҳҜе·ҰиЎЁгҖҒе“ӘдёӘжҳҜеҸіиЎЁе№¶дёҚйҮҚиҰҒпјҢеӣ дёәеҜ№дәҺзӣёеҗҢзҡ„иЎЁе’ҢиҝһжҺҘи°“иҜҚпјҢз»“жһңжҖ»жҳҜзӣёеҗҢзҡ„гҖӮ\n\
    \nи°“иҜҚдёҚдёҖе®ҡжҖ»жҳҜзӣёзӯүжқЎд»¶пјӣе®ғеҸҜд»ҘжҳҜд»»дҪ•и®Ўз®—з»“жһңдёә `TRUE`гҖҒ`FALSE` жҲ– `UNKNOWN` зҡ„иЎЁиҫҫејҸгҖӮ`UNKNOWN` зҡ„иЎҢдёәеҮ д№ҺдёҺ `FALSE`\
    \ зӣёеҗҢпјӣеҰӮжһңз»ҷе®ҡдёӨиЎҢзҡ„иҝһжҺҘи°“иҜҚи®Ўз®—з»“жһңдёә `UNKNOWN`пјҢйӮЈд№Ҳе®ғд»¬е°ҶдёҚдјҡжҲҗдёәз»“жһңйӣҶзҡ„дёҖйғЁеҲҶгҖӮз„¶иҖҢпјҢеҰӮжһңеҺҹеӯҗи°“иҜҚдҪҝз”Ё `AND`гҖҒ`OR`гҖҒ`NOT`\
    \ жқЎд»¶з»„еҗҲпјҢйӮЈд№ҲеҪ“еӯҗиЎЁиҫҫејҸи®Ўз®—з»“жһңдёә `UNKNOWN` иҖҢдёҚжҳҜ `FALSE` ж—¶пјҢз»“жһңеҸҜиғҪдјҡдёҚеҗҢгҖӮдҫӢеҰӮпјҢ`NOT FALSE` и®Ўз®—з»“жһңдёә `TRUE`пјҢдҪҶ\
    \ `NOT UNKNOWN` и®Ўз®—з»“жһңдёә `UNKNOWN`гҖӮ\n\nеңЁи®Ёи®әиҝһжҺҘж—¶пјҢвҖңжқЎд»¶вҖқгҖҒвҖңи°“иҜҚвҖқе’ҢвҖңж ҮеҮҶвҖқиҝҷдәӣжңҜиҜӯеҸҜд»Ҙдә’жҚўдҪҝз”ЁгҖӮ\n\nе№¶дёҚиҰҒжұӮеҝ…йЎ»еңЁи°“иҜҚдёӯдҪҝз”ЁжқҘиҮӘдёӨдёӘиЎЁзҡ„еҲ—гҖӮвҖң`t1.id\
    \ > 0`вҖқд№ҹжҳҜдёҖдёӘжңүж•Ҳзҡ„иҝһжҺҘжқЎд»¶гҖӮиЎЁ `t2` зҡ„жүҖжңүиЎҢйғҪж»Ўи¶іиҝҷдёӘжқЎд»¶пјҢиҖҢиЎЁ `t1` еҸӘжңүдёҖиЎҢж»Ўи¶ігҖӮ\n\n```sql\nselect *\nfrom\
    \ t1\njoin t2\non t1.id > 0;\nID N         ID N\n---------- - ---------- -\n1\
    \ A          2 B\n1 A          0 X\nListing 1-4\nInner join with predicate containing\
    \ only one table\n```\n\nеҰӮжһңдёҖдёӘиҝһжҺҘжқЎд»¶еҜ№дәҺдёҖдёӘиЎЁдёӯзҡ„дёҖиЎҢе’ҢеҸҰдёҖдёӘиЎЁдёӯзҡ„еӨҡиЎҢи®Ўз®—з»“жһңдёә `TRUE`пјҢйӮЈд№ҲиҜҘиЎҢе°ҶеңЁз»“жһңдёӯйҮҚеӨҚеӨҡж¬ЎгҖӮдҫӢеҰӮпјҢдёӢйқўзӨәдҫӢдёӯзҡ„иҝһжҺҘжқЎд»¶\
    \ вҖң`t1.id <= t2.id`вҖқ еҜ№дәҺе·ҰиҝһжҺҘиЎЁдёӯ `id = 0` зҡ„иЎҢе’ҢеҸіиҝһжҺҘиЎЁдёӯзҡ„дёӨиЎҢи®Ўз®—з»“жһңдёә `TRUE`пјҢеӣ жӯӨ `id = 0` зҡ„иЎҢеңЁз»“жһңдёӯеҮәзҺ°дәҶдёӨж¬ЎгҖӮеҗҢж ·зҡ„жҺЁзҗҶд№ҹйҖӮз”ЁдәҺз¬¬дәҢеј иЎЁдёӯ\
    \ `id = 2` зҡ„иЎҢгҖӮ\n\n*   еӨ–иҝһжҺҘ вҖ“ дёҖз§ҚиҝһжҺҘзұ»еһӢпјҢиҝ”еӣһдёҺеҶ…иҝһжҺҘзӣёеҗҢзҡ„иЎҢпјҲеҚіпјҢдёӨеј иЎЁдёӯж»Ўи¶іиҝһжҺҘжқЎд»¶зҡ„иЎҢпјүд»ҘеҸҠжқҘиҮӘе·ҰиҝһжҺҘиЎЁпјҲеҜ№дәҺе·ҰиҝһжҺҘпјүгҖҒеҸіиҝһжҺҘиЎЁпјҲеҜ№дәҺеҸіиҝһжҺҘпјүжҲ–дёӨеј иЎЁпјҲеҜ№дәҺе…ЁеӨ–иҝһжҺҘпјүзҡ„гҖҒдёҚж»Ўи¶іиҝһжҺҘжқЎд»¶зҡ„иЎҢпјҢе№¶еңЁе…¶д»–иЎЁзҡ„еҲ—дҪҚзҪ®з”Ё\
    \ `NULL` еҖјеЎ«е……гҖӮ\n\n```sql\nselect *\nfrom t1\njoin t2\non t1.id <= t2.id;\nID N\
    \   ID N\n---- - ---- -\n0 X    0 X\n0 X    2 B\n1 A    2 B\nListing 1-5\nInner\
    \ join with non-equality predicate\n```\n\n```sql\nselect *\nfrom t1\nleft join\
    \ t2\non t1.id = t2.id;\nID N         ID N\n---------- - ---------- -\n0 X   \
    \       0 X\n1 A\nListing 1-6\nLeft outer join\n```\n\n```sql\nselect *\nfrom\
    \ t1\nright join t2\non t1.id = t2.id;\nID N         ID N\n---------- - ----------\
    \ -\n0 X          0 X\n2 B\nListing 1-7\nRight outer join\n```\n\n```sql\nselect\
    \ *\nfrom t1\nfull join t2\non t1.id = t2.id;\nID N         ID N\n---------- -\
    \ ---------- -\n0 X          0 X\n2 B\n1 A\nListing 1-8\nFull outer join\n```\n\
    \nеңЁзӨәдҫӢ [1-6](#A455196_1_En_1_Chapter.html#Par20)гҖҒ[1-7](#A455196_1_En_1_Chapter.html#Par21)\
    \ е’Ң [1-8](#A455196_1_En_1_Chapter.html#Par22) дёӯжІЎжңүдҪҝз”ЁдёҚеҝ…иҰҒзҡ„ `outer` е…ій”®еӯ—пјҢеӣ дёәе…ій”®еӯ— `left`/`right`/`full`\
    \ жң¬иә«е°ұиЎЁжҳҺдәҶиҝһжҺҘжҳҜеӨ–иҝһжҺҘгҖӮеҗҢж ·ең°пјҢеҰӮжһңеңЁиҝһжҺҘдёӯжңӘдҪҝз”Ё `left`/`right`/`full` дёӯзҡ„д»»дҪ•дёҖдёӘе…ій”®еӯ—пјҢйӮЈд№Ҳе®ғе°ұжҳҜеҶ…иҝһжҺҘпјҢеӣ жӯӨжІЎжңүж„Ҹд№үеҶҚдҪҝз”Ё\
    \ `inner` е…ій”®еӯ—жқҘжҳҺзЎ®жҢҮе®ҡгҖӮ\n\nйҖҡеёёпјҢејҖеҸ‘дәәе‘ҳеңЁзҺ°е®һд»»еҠЎдёӯдёҚдҪҝз”ЁеҸіиҝһжҺҘпјҢеӣ дёәжҖ»жҳҜеҸҜд»Ҙз”Ёе·ҰиҝһжҺҘжқҘд»ЈжӣҝпјҢиҝҷдҪҝеҫ—иҜӯеҸҘжӣҙжҳ“дәҺзҗҶи§Је№¶жҸҗй«ҳдәҶеҸҜиҜ»жҖ§гҖӮ\n\n\
    еҪ“жҹҘиҜўдёӯиҝһжҺҘеӨҡдёӘиЎЁпјҲж•°жҚ®йӣҶпјүж—¶пјҢOracle дјҡе…ҲиҝһжҺҘеүҚдёӨдёӘиЎЁпјҢз„¶еҗҺе°Ҷз”ҹжҲҗзҡ„з»“жһңйӣҶдёҺз¬¬дёүдёӘж•°жҚ®йӣҶиҝһжҺҘпјҢдҫқжӯӨзұ»жҺЁгҖӮеҜ№дәҺеҶ…иҝһжҺҘпјҢиҝһжҺҘзҡ„йЎәеәҸжІЎжңүйҖ»иҫ‘йҷҗеҲ¶пјҢCBOпјҲеҹәдәҺжҲҗжң¬зҡ„дјҳеҢ–еҷЁпјүеҸҜд»ҘжҢүд»»дҪ•йЎәеәҸиҝһжҺҘиЎЁпјҢиҖҢдёҚз®ЎиЎЁеңЁжҹҘиҜўж–Үжң¬дёӯеҰӮдҪ•еҲ—еҮәгҖӮеҜ№дәҺ\
    \ ANSI еӨ–иҝһжҺҘпјҢжҹҘиҜўдёӯиҝһжҺҘзҡ„йЎәеәҸеҫҲйҮҚиҰҒвҖ”вҖ”иҜҰжғ…иҜ·еҸӮйҳ…вҖңжё…жҷ°еәҰдёҺеҸҜиҜ»жҖ§вҖқз« иҠӮгҖӮ\n\n# е…¶д»–зұ»еһӢзҡ„иҝһжҺҘ\n\n*   зӯүеҖјиҝһжҺҘгҖӮеҰӮжһңжүҖжңүиҝһжҺҘжқЎд»¶йғҪеҢ…еҗ«зӣёзӯүиҝҗз®—з¬ҰпјҢеҲҷиҜҘиҝһжҺҘз§°дёәзӯүеҖјиҝһжҺҘпјӣеҗҰеҲҷз§°дёәйқһзӯүеҖјиҝһжҺҘпјҲTheta\
    \ иҝһжҺҘпјүгҖӮзӨәдҫӢ [1-3](#A455196_1_En_1_Chapter.html#Par11)гҖҒ[1-6](#A455196_1_En_1_Chapter.html#Par20)гҖҒ[1-7](#A455196_1_En_1_Chapter.html#Par21)\
    \ е’Ң [1-8](#A455196_1_En_1_Chapter.html#Par22) жҳҜзӯүеҖјиҝһжҺҘзҡ„дҫӢеӯҗгҖӮзӨәдҫӢ [1-4](#A455196_1_En_1_Chapter.html#Par16)\
    \ е’Ң [1-5](#A455196_1_En_1_Chapter.html#Par18) жҳҜйқһзӯүеҖјиҝһжҺҘгҖӮ\n\nзӯүеҖјиҝһжҺҘзҡ„дёҖдёӘзү№дҫӢжҳҜиҮӘз„¶иҝһжҺҘгҖӮиҮӘз„¶иҝһжҺҘдҪҝз”ЁйҡҗејҸзҡ„иҝһжҺҘжқЎд»¶пјҢеҚідёӨеј иЎЁдёӯеҗҢеҗҚеҲ—пјҲеҚіеҗҚз§°зӣёеҗҢзҡ„еҲ—пјүдёҠзҡ„зӣёзӯүи°“иҜҚгҖӮиҝҷеј•е…ҘдәҶжҪңеңЁзҡ„еҚұйҷ©пјҢеӣ дёәеҰӮжһңиЎЁз»“жһ„еҸ‘з”ҹеҸҳеҢ–пјҢиҝһжҺҘжқЎд»¶д№ҹеҸҜиғҪйҡҸд№Ӣж”№еҸҳгҖӮ\n\
    \n```sql\nselect * from t1 natural join t2;\nID N\n---------- -\n0 X\nListing\
    \ 1-9\nNatural join\n```\n\nеҸҜд»ҘжҢҮе®ҡиҮӘз„¶иҝһжҺҘжҳҜеҶ…иҝһжҺҘиҝҳжҳҜеӨ–иҝһжҺҘгҖӮ\n\n```sql\ncreate table t(id, name,\
    \ dummy) as select 1, 'A', 'dummy' from dual;\nselect * from t1 natural left join\
    \ t;\nID N DUMMY\n---------- - -----\n1 A dummy\n0 X\nListing 1-10\nOuter natural\
    \ join\n```\n\nеҰӮжһңдёӨдёӘиЎЁдёӯжІЎжңүе…ұеҗҢзҡ„еҲ—пјҢйӮЈд№ҲиҮӘз„¶иҝһжҺҘе°Ҷжңүж•Ҳең°жҲҗдёәдәӨеҸүиҝһжҺҘгҖӮ\n\nеҸҰдёҖз§ҚеҹәдәҺзӣёеҗҢеҲ—зҡ„зӯүеҖјиҝһжҺҘжҳҜе‘ҪеҗҚеҲ—иҝһжҺҘгҖӮе®ғе…Ғи®ёжҲ‘д»¬еҲ—еҮәжүҖжңүз”ЁдәҺиҝһжҺҘжқЎд»¶зҡ„еҲ—пјҢе№¶дё”еҚідҪҝеңЁиЎЁз»“жһ„ж”№еҸҳеҗҺд№ҹиғҪдҝқз•ҷиҝһжҺҘжқЎд»¶гҖӮ\n\
    \n```sql\nselect * from t1 join t2 using (id);\nID N N\n---------- - -\n0 X X\n\
    Listing 1-11\nNamed columns join\n```\n\nдҪҝз”ЁжӯӨиҜӯжі•ж—¶пјҢе…ұеҗҢеҲ—д»…д»ҺдёҖдёӘиЎЁдёӯеҮәзҺ°еңЁз»“жһңдёӯгҖӮеңЁзӨәдҫӢ [1-9](#A455196_1_En_1_Chapter.html#Par29)\
    \ е’Ң [1-10](#A455196_1_En_1_Chapter.html#Par31) зҡ„иҮӘз„¶иҝһжҺҘжғ…еҶөдёӢд№ҹдјҡеҸ‘з”ҹеҗҢж ·зҡ„дәӢжғ…гҖӮ\n\n*   еҚҠиҝһжҺҘгҖӮеҪ“дҪҝз”Ё\
    \ вҖң`in (subquery)`вҖқ жҲ– вҖң`exists (correlated subquery)`вҖқ зӯүжқЎд»¶ж—¶пјҢдјҡеҸ‘з”ҹиҝҷз§ҚиҝһжҺҘзұ»еһӢгҖӮз»“жһңеҸӘеҢ…еҗ«жқҘиҮӘдёҖдёӘиЎЁзҡ„еҲ—пјҢе№¶дё”еҚідҪҝеӯҗжҹҘиҜўдёӯзҡ„еӨҡиЎҢж»Ўи¶іжқЎд»¶пјҢд№ҹеҸӘд»ҺиҜҘиЎЁиҝ”еӣһдёҖиЎҢгҖӮ\n\
    \n```sql\n    create table t0(id, name) as\n    select 0, 'X' from dual union\
    \ all select 0, 'X' from dual;\n    select t1.* from t1 where t1.id in (select\
    \ id from t0);\n    ID N\n    ---------- -\n    0 X\n    select t1.* from t1 where\
    \ exists (select id from t0 where t1.id = t0.id);\n    ID N\n    ---------- -\n\
    \    0 X\n    select t1.* from t1 join t0 on t1.id = t0.id;\n    ID N\n    ----------\
    \ -\n    0 X\n    0 X\n    Listing 1-12\n    Semi join\n```\n\n*   еҸҚиҝһжҺҘгҖӮе·ҘдҪңж–№ејҸзұ»дјјдәҺеҚҠиҝһжҺҘпјҢдҪҶиҝ”еӣһеңЁз¬¬дәҢеј иЎЁдёӯжІЎжңүеҢ№й…ҚйЎ№зҡ„иЎҢгҖӮеҪ“дҪҝз”Ёи°“иҜҚ\
    \ вҖң`not in (subquery)`вҖқ жҲ– вҖң`not exists (correlated subquery)`вҖқ ж—¶дјҡеҮәзҺ°еҸҚиҝһжҺҘгҖӮеҰӮжһңдҪҝз”Ё вҖң`not\
    \ in`вҖқ дё”еӯҗжҹҘиҜўеҢ…еҗ« `NULL` еҖјпјҢеҲҷз»“жһңе°ҶжІЎжңүиЎҢгҖӮеҰӮжһңжқЎд»¶еҜ№жҹҗдәӣиЎҢи®Ўз®—з»“жһңдёә `UNKNOWN` е№¶дё”дҪҝз”Ё вҖң`not exists`вҖқ жқЎд»¶пјҢйӮЈд№ҲиҝҷдәӣиЎҢе°ҶдёҚдјҡеҮәзҺ°еңЁз»“жһңдёӯпјӣдҪҶеҰӮжһңеӯҗжҹҘиҜўиЎЁдёӯз”ЁдәҺиҝһжҺҘзҡ„еҲ—еҢ…еҗ«\
    \ `NULL` еҖјпјҢз»“жһңдёҚдёҖе®ҡдёәз©әгҖӮиҝҷз§ҚйҖ»иҫ‘е·®ејӮеҸҜд»ҘеңЁжҹҘиҜўи®ЎеҲ’ж“ҚдҪңеҗҚз§° `HASH JOIN ANTI NA` дёӯзңӢеҲ°гҖӮ"
  raw: "## ANSI Joins\n\nThe following tables will be used for demonstration.\n\n\
    *   Cross join (also called Cartesian product). It returns all possible combinations\
    \ of two tableвҖҷs rows.\n\n```\n    select *\n    from t1\n    cross join t2;\n\
    \    ID N         ID N\n    ---------- - ---------- -\n    1 A          2 B\n\
    \    1 A          0 X\n    0 X          2 B\n    0 X          0 X\n    Listing\
    \ 1-2\n    Cross join\n    ```\n\n*   Inner joinВ вҖ“ join type that returns those\
    \ and only those rows from both joined tables satisfying a join predicate (i.e.,\
    \ predicate evaluates into TRUE).\n\n```\n    select *\n    from t1\n    join\
    \ t2\n    on t1.id = t2.id;\n    ID N         ID N\n    ---------- - ----------\
    \ -\n    0 X          0 X\n    Listing 1-3\n    Inner join\n    ```\n\n```\ncreate\
    \ table t1(id, name) as\nselect 1, 'A' from dual union all select 0, 'X' from\
    \ dual;\ncreate table t2(id, name) as\nselect 2, 'B' from dual union all select\
    \ 0, 'X' from dual;\nListing 1-1\nTables for demonstration\n```\n\nThe table before\
    \ the join keyword is called a вҖңleft joined table,вҖқ and the table after the join\
    \ keyword is called a вҖңright joined table.вҖқ For an inner join it does not matter\
    \ which table is left and which one is right, as the result will always be the\
    \ same for the same tables and join predicate.\n\nA predicate may not always be\
    \ an equality condition; it can be any expression that evaluates into TRUE, FALSE,\
    \ or UNKNOWN. UNKNOWN acts almost like FALSE; if a join predicate evaluates into\
    \ UNKNOWN for given rows from two tables, then they will not be part of the result\
    \ set. However, if atomic predicates are combined using AND, OR, NOT conditions,\
    \ then the result may be different if the subexpression evaluates to UNKNOWN and\
    \ not to FALSE. For example, NOT FALSE evaluates to TRUE, but NOT UNKNOWN evaluates\
    \ to UNKNOWN.\n\nSpeaking about joins, the terms вҖңcondition,вҖқ вҖңpredicate,вҖқ and\
    \ вҖңcriteriaвҖқ are interchangeable.\n\nItвҖҷs not mandatory that columns from both\
    \ tables should be used in the predicate. вҖң`t1.id > 0`вҖқ is also a valid join condition.\
    \ All rows from table t2 satisfy this condition and only one row from table t1\
    \ does.\n\n```\nselect *\nfrom t1\njoin t2\non t1.id > 0;\nID N         ID N\n\
    ---------- - ---------- -\n1 A          2 B\n1 A          0 X\nListing 1-4\nInner\
    \ join with predicate containing only one table\n```\n\nIf a join condition evaluates\
    \ into true for some row from one table and multiple rows from another one, then\
    \ that row will be repeated in the result multiple times. For example, join condition\
    \ В«`t1.id <= t2.id`В» in the below example evaluates to true for row with id =\
    \ 0 from the left join table and two rows from the right joined table so row with\
    \ id = 0 appears in the result twice. The same reasoning is valid for row with\
    \ id = 2 from the second table.\n\n*   Outer joinВ вҖ“ type of join that returns\
    \ the same rows as inner join (i.e., rows from both tables that match join condition\
    \ and) and rows from left joined table (for left join) or right joined table (for\
    \ right join) or both tables (full join), which do not match the join condition\
    \ along with NULL values in place of other tableвҖҷs columns.\n\n```\nselect *\n\
    from t1\njoin t2\non t1.id <= t2.id;\nID N   ID N\n---- - ---- -\n0 X    0 X\n\
    0 X    2 B\n1 A    2 B\nListing 1-5\nInner join with non-equality predicate\n\
    ```\n\n```\nselect *\nfrom t1\nleft join t2\non t1.id = t2.id;\nID N         ID\
    \ N\n---------- - ---------- -\n0 X          0 X\n1 A\nListing 1-6\nLeft outer\
    \ join\n```\n\n```\nselect *\nfrom t1\nright join t2\non t1.id = t2.id;\nID N\
    \         ID N\n---------- - ---------- -\n0 X          0 X\n2 B\nListing 1-7\n\
    Right outer join\n```\n\n```\nselect *\nfrom t1\nfull join t2\non t1.id = t2.id;\n\
    ID N         ID N\n---------- - ---------- -\n0 X          0 X\n2 B\n1 A\nListing\
    \ 1-8\nFull outer join\n```\n\nThe unnecessary keyword вҖң`outer`вҖқ was not used\
    \ in Listings [1-6](#A455196_1_En_1_Chapter.html#Par20), [1-7](#A455196_1_En_1_Chapter.html#Par21),\
    \ or [1-8](#A455196_1_En_1_Chapter.html#Par22) because keywords left/right/full\
    \ indicate then that the join is outer. Similarly, if none of the keywords left/right/full\
    \ are used in join, then itвҖҷs inner, so it does not make sense to specify this\
    \ explicitly using an вҖң`inner`вҖқ keyword.\n\nAs a rule, developers do not use right\
    \ join in real-life tasks because itвҖҷs always possible to use left join instead,\
    \ which makes the statement easier to understand and improves readability.\n\n\
    When multiple tables (data sets) are joined in a query, then Oracle joins the\
    \ first two and after that joins the resulting data set with the third data set\
    \ etc. In case of inner joins, there are no logical limitations on the order of\
    \ joins and CBO (Cost Based Optimizer) can join tables in any order irrespective\
    \ of how tables are listed in the query text. For ANSI outer joins, the order\
    \ of joins in the query matters - see section вҖңClearness and ReadabilityвҖқ for\
    \ more details.\n\n## Other Types of Joins\n\n*   Equi joins . If all join conditions\
    \ contain equality operators, then join is called equi join; otherwise join is\
    \ called non-equi (Theta) join. Listing [1-3](#A455196_1_En_1_Chapter.html#Par11),\
    \ Listing [1-6](#A455196_1_En_1_Chapter.html#Par20), Listing [1-7](#A455196_1_En_1_Chapter.html#Par21),\
    \ and Listing [1-8](#A455196_1_En_1_Chapter.html#Par22) are examples for equi\
    \ join. Listing [1-4](#A455196_1_En_1_Chapter.html#Par16) and Listing [1-5](#A455196_1_En_1_Chapter.html#Par18)\
    \ are non-equi joins.\n\nA special case of an equi join is a natural join. A Natural\
    \ join uses an implicit join condition, which are equality predicates on common\
    \ columns from both tables (i.e., columns with the same names). This introduces\
    \ potential danger because if table structure changes, then the join condition\
    \ may change as well.\n\n```\nselect * from t1 natural join t2;\nID N\n----------\
    \ -\n0 X\nListing 1-9\nNatural join\n```\n\nItвҖҷs possible to specify whether a\
    \ natural join is inner or outer.\n\n```\ncreate table t(id, name, dummy) as select\
    \ 1, 'A', 'dummy' from dual;\nselect * from t1 natural left join t;\nID N DUMMY\n\
    ---------- - -----\n1 A dummy\n0 X\nListing 1-10\nOuter natural join\n```\n\n\
    If there are no common columns in both tables, then natural join will be effectively\
    \ cross join.\n\nAnother form of equi join on the same columns is named columns\
    \ join. It allows us to list all columns for join conditions and preserve join\
    \ conditions even if table structure changes.\n\n```\nselect * from t1 join t2\
    \ using (id);\nID N N\n---------- - -\n0 X X\nListing 1-11\nNamed columns join\n\
    ```\n\nWhen using this syntax, a common column only from one table appears in\
    \ the result. The same happens in case of a natural join in Listing [1-9](#A455196_1_En_1_Chapter.html#Par29)\
    \ and Listing [1-10](#A455196_1_En_1_Chapter.html#Par31).\n\n*   Semi joins .\
    \ This type of join happens in case of using conditions like вҖңin (subquery)вҖқ or\
    \ вҖңexists (correlated subquery)вҖқ. Result contains column only from one table and\
    \ only one row is returned from that table even if multiple rows from the subquery\
    \ satisfy the condition.\n\n```\n    create table t0(id, name) as\n    select\
    \ 0, 'X' from dual union all select 0, 'X' from dual;\n    select t1.* from t1\
    \ where t1.id in (select id from t0);\n    ID N\n    ---------- -\n    0 X\n \
    \   select t1.* from t1 where exists (select id from t0 where t1.id = t0.id);\n\
    \    ID N\n    ---------- -\n    0 X\n    select t1.* from t1 join t0 on t1.id\
    \ = t0.id;\n    ID N\n    ---------- -\n    0 X\n    0 X\n    Listing 1-12\n \
    \   Semi join\n    ```\n\n*   Anti joins . Work similarly to semi joins but return\
    \ rows with no matches from the second table. Anti join appears when using predicates\
    \ вҖңnot in (subquery)вҖқ or вҖңnot exists (correlated subquery).вҖқ The result will have\
    \ no rows when using вҖңnot inвҖқ and the subquery contains NULL values. If the condition\
    \ evaluates to UNKWNOWN for some rows and the вҖңnot existsвҖқ condition, then those\
    \ rows will not be part of results; but result is not necessarily empty if the\
    \ table in the subquery has NULL values for joining columns. This logical difference\
    \ can be seen in the query plan operation nameВ вҖ“ HASH JOIN ANTI NA."
  trans: "# ANSI иҝһжҺҘ\n\nд»ҘдёӢиЎЁж је°Ҷз”ЁдәҺжј”зӨәгҖӮ\n\n*   дәӨеҸүиҝһжҺҘпјҲд№ҹз§°дёәз¬ӣеҚЎе°”з§ҜпјүгҖӮе®ғиҝ”еӣһдёӨдёӘиЎЁиЎҢзҡ„жүҖжңүеҸҜиғҪз»„еҗҲгҖӮ\n\n```sql\n\
    \    select *\n    from t1\n    cross join t2;\n    ID N         ID N\n    ----------\
    \ - ---------- -\n    1 A          2 B\n    1 A          0 X\n    0 X        \
    \  2 B\n    0 X          0 X\n    Listing 1-2\n    дәӨеҸүиҝһжҺҘ\n```\n\n*   еҶ…иҝһжҺҘ вҖ“ дёҖз§ҚиҝһжҺҘзұ»еһӢпјҢд»…иҝ”еӣһжқҘиҮӘиҝһжҺҘиЎЁзҡ„гҖҒж»Ўи¶іиҝһжҺҘи°“иҜҚпјҲеҚіи°“иҜҚи®Ўз®—з»“жһңдёә\
    \ `TRUE`пјүзҡ„иЎҢгҖӮ\n\n```sql\n    select *\n    from t1\n    join t2\n    on t1.id =\
    \ t2.id;\n    ID N         ID N\n    ---------- - ---------- -\n    0 X      \
    \    0 X\n    Listing 1-3\n    еҶ…иҝһжҺҘ\n```\n\n```sql\ncreate table t1(id, name) as\n\
    select 1, 'A' from dual union all select 0, 'X' from dual;\ncreate table t2(id,\
    \ name) as\nselect 2, 'B' from dual union all select 0, 'X' from dual;\nListing\
    \ 1-1\nз”ЁдәҺжј”зӨәзҡ„иЎЁ\n```\n\nеңЁ `join` е…ій”®еӯ—д№ӢеүҚзҡ„иЎЁз§°дёәвҖңе·ҰиҝһжҺҘиЎЁвҖқпјҢеңЁ `join` е…ій”®еӯ—д№ӢеҗҺзҡ„иЎЁз§°дёәвҖңеҸіиҝһжҺҘиЎЁвҖқгҖӮеҜ№дәҺеҶ…иҝһжҺҘпјҢе“ӘдёӘиЎЁжҳҜе·ҰиЎЁгҖҒе“ӘдёӘжҳҜеҸіиЎЁе№¶дёҚйҮҚиҰҒпјҢеӣ дёәеҜ№дәҺзӣёеҗҢзҡ„иЎЁе’ҢиҝһжҺҘи°“иҜҚпјҢз»“жһңжҖ»жҳҜзӣёеҗҢзҡ„гҖӮ\n\
    \nи°“иҜҚдёҚдёҖе®ҡжҖ»жҳҜзӣёзӯүжқЎд»¶пјӣе®ғеҸҜд»ҘжҳҜд»»дҪ•и®Ўз®—з»“жһңдёә `TRUE`гҖҒ`FALSE` жҲ– `UNKNOWN` зҡ„иЎЁиҫҫејҸгҖӮ`UNKNOWN` зҡ„иЎҢдёәеҮ д№ҺдёҺ `FALSE`\
    \ зӣёеҗҢпјӣеҰӮжһңз»ҷе®ҡдёӨиЎҢзҡ„иҝһжҺҘи°“иҜҚи®Ўз®—з»“жһңдёә `UNKNOWN`пјҢйӮЈд№Ҳе®ғд»¬е°ҶдёҚдјҡжҲҗдёәз»“жһңйӣҶзҡ„дёҖйғЁеҲҶгҖӮз„¶иҖҢпјҢеҰӮжһңеҺҹеӯҗи°“иҜҚдҪҝз”Ё `AND`гҖҒ`OR`гҖҒ`NOT`\
    \ жқЎд»¶з»„еҗҲпјҢйӮЈд№ҲеҪ“еӯҗиЎЁиҫҫејҸи®Ўз®—з»“жһңдёә `UNKNOWN` иҖҢдёҚжҳҜ `FALSE` ж—¶пјҢз»“жһңеҸҜиғҪдјҡдёҚеҗҢгҖӮдҫӢеҰӮпјҢ`NOT FALSE` и®Ўз®—з»“жһңдёә `TRUE`пјҢдҪҶ\
    \ `NOT UNKNOWN` и®Ўз®—з»“жһңдёә `UNKNOWN`гҖӮ\n\nеңЁи®Ёи®әиҝһжҺҘж—¶пјҢвҖңжқЎд»¶вҖқгҖҒвҖңи°“иҜҚвҖқе’ҢвҖңж ҮеҮҶвҖқиҝҷдәӣжңҜиҜӯеҸҜд»Ҙдә’жҚўдҪҝз”ЁгҖӮ\n\nе№¶дёҚиҰҒжұӮеҝ…йЎ»еңЁи°“иҜҚдёӯдҪҝз”ЁжқҘиҮӘдёӨдёӘиЎЁзҡ„еҲ—гҖӮвҖң`t1.id\
    \ > 0`вҖқд№ҹжҳҜдёҖдёӘжңүж•Ҳзҡ„иҝһжҺҘжқЎд»¶гҖӮиЎЁ `t2` зҡ„жүҖжңүиЎҢйғҪж»Ўи¶іиҝҷдёӘжқЎд»¶пјҢиҖҢиЎЁ `t1` еҸӘжңүдёҖиЎҢж»Ўи¶ігҖӮ\n\n```sql\nselect *\nfrom\
    \ t1\njoin t2\non t1.id > 0;\nID N         ID N\n---------- - ---------- -\n1\
    \ A          2 B\n1 A          0 X\nListing 1-4\nи°“иҜҚд»…ж¶үеҸҠдёҖдёӘиЎЁзҡ„еҶ…иҝһжҺҘ\n```\n\nеҰӮжһңдёҖдёӘиҝһжҺҘжқЎд»¶еҜ№дәҺдёҖдёӘиЎЁдёӯзҡ„дёҖиЎҢе’ҢеҸҰдёҖдёӘиЎЁдёӯзҡ„еӨҡиЎҢи®Ўз®—з»“жһңдёә\
    \ `TRUE`пјҢйӮЈд№ҲиҜҘиЎҢе°ҶеңЁз»“жһңдёӯйҮҚеӨҚеӨҡж¬ЎгҖӮдҫӢеҰӮпјҢдёӢйқўзӨәдҫӢдёӯзҡ„иҝһжҺҘжқЎд»¶ вҖң`t1.id <= t2.id`вҖқ еҜ№дәҺе·ҰиҝһжҺҘиЎЁдёӯ `id = 0` зҡ„иЎҢе’ҢеҸіиҝһжҺҘиЎЁдёӯзҡ„дёӨиЎҢи®Ўз®—з»“жһңдёә\
    \ `TRUE`пјҢеӣ жӯӨ `id = 0` зҡ„иЎҢеңЁз»“жһңдёӯеҮәзҺ°дәҶдёӨж¬ЎгҖӮеҗҢж ·зҡ„жҺЁзҗҶд№ҹйҖӮз”ЁдәҺз¬¬дәҢеј иЎЁдёӯ `id = 2` зҡ„иЎҢгҖӮ\n\n*   еӨ–иҝһжҺҘ вҖ“ дёҖз§ҚиҝһжҺҘзұ»еһӢпјҢиҝ”еӣһдёҺеҶ…иҝһжҺҘзӣёеҗҢзҡ„иЎҢпјҲеҚіпјҢдёӨеј иЎЁдёӯж»Ўи¶іиҝһжҺҘжқЎд»¶зҡ„иЎҢпјүд»ҘеҸҠжқҘиҮӘе·ҰиҝһжҺҘиЎЁпјҲеҜ№дәҺе·ҰиҝһжҺҘпјүгҖҒеҸіиҝһжҺҘиЎЁпјҲеҜ№дәҺеҸіиҝһжҺҘпјүжҲ–дёӨеј иЎЁпјҲеҜ№дәҺе…ЁеӨ–иҝһжҺҘпјүзҡ„гҖҒдёҚж»Ўи¶іиҝһжҺҘжқЎд»¶зҡ„иЎҢпјҢе№¶еңЁе…¶д»–иЎЁзҡ„еҲ—дҪҚзҪ®з”Ё\
    \ `NULL` еҖјеЎ«е……гҖӮ\n\n```sql\nselect *\nfrom t1\njoin t2\non t1.id <= t2.id;\nID N\
    \   ID N\n---- - ---- -\n0 X    0 X\n0 X    2 B\n1 A    2 B\nListing 1-5\nйқһзӯүеҖји°“иҜҚзҡ„еҶ…иҝһжҺҘ\n\
    ```\n\n```sql\nselect *\nfrom t1\nleft join t2\non t1.id = t2.id;\nID N      \
