    Now we see that no cycles were identified and so we can remove the nocycle keyword.


    Summarizing the details of cycle identification :


    *   Cycle can be identified only if the вҖңconnect byвҖқ condition contains a вҖңpriorвҖқ
    operator.

    *   If we apply a вҖңpriorвҖқ operator to any function retuning unique values, then
    the cycle will not be identified because in this case rows with the same values
    are not considered as the same nodes of the hierarchy.


    The demonstrated approach for running over pre-generated values can be used even
    if the recursive formula refers values on two previous iterations, but in this
    case itвҖҷs necessary to generate all the possible pairs of previous element and
    the one before it. Listing [5-7](#A455196_1_En_5_Chapter.html#Par49) shows how
    to generate Fibonacci numbers using this approach.


    ```

    with t as

    (select rownum id from dual connect by rownum <= power(2, 15) / 15),

    pairs as

    (select t1.id id1, t2.id id2

    from t t1, t t2

    where t2.id between (1 / 2) * t1.id and (2 / 3) * t1.id

    union all

    select 1, 0 from dual

    union all

    select 1, 1 from dual)

    select rownum lvl, id2 fib

    from pairs

    start with (id1, id2) in ((1, 0))

    connect by prior id1 = id2

    and prior (id1 + id2) = id1

    and level <= 15;

