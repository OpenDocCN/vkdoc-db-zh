    ## Oracle зү№е®ҡиҜӯжі•


    ANSI иҝһжҺҘиҜӯжі•жҳҜеңЁ Oracle 9i дёӯеј•е…Ҙзҡ„гҖӮеңЁжӯӨд№ӢеүҚпјҢдёәдәҶиҝһжҺҘиЎЁпјҢжүҖжңүиЎЁйғҪеҝ…йЎ»еңЁ `from` еӯҗеҸҘдёӯжҢҮе®ҡпјҢиҝһжҺҘжқЎд»¶еҲҷж”ҫеңЁ `where` еӯҗеҸҘдёӯгҖӮOracle
    зү№е®ҡзҡ„иҜӯжі•пјҲд№ҹз§°дёә Oracle еҺҹз”ҹиҜӯжі•пјүз”ЁдәҺеӨ–иҝһжҺҘзҡ„еҮәзҺ°иҰҒж—©еҫ—еӨҡпјҢз”ҡиҮіеҸҜд»ҘиҝҪжәҜеҲ° Oracle 5 зӯүзүҲжң¬гҖӮ


    жё…еҚ• 1-3 дёӯзҡ„еҶ…иҝһжҺҘеҸҜд»Ҙж”№еҶҷдёәд»ҘдёӢж–№ејҸпјҢеҰӮжё…еҚ• 1-15 жүҖзӨәгҖӮ


    ```

    select * from t1, t2 where t1.id = t2.id;

    жё…еҚ• 1-15

    еҶ…иҝһжҺҘзҡ„еҸҰдёҖз§ҚеҪўејҸ

    ```


    е°Ҫз®ЎжӯӨиҜӯеҸҘжІЎжңүе…ій”®еӯ— вҖң`join`вҖқпјҢдҪҶе®ғе®Ңе…Ёз¬ҰеҗҲ ANSI ж ҮеҮҶгҖӮ


    еңЁж”ҜжҢҒ ANSI д№ӢеүҚпјҢжҢҮе®ҡе·ҰиҝһжҺҘжҲ–еҸіиҝһжҺҘзҡ„е”ҜдёҖж–№жі•жҳҜдҪҝз”Ё Oracle зү№е®ҡиҜӯжі•гҖӮеңЁеҲ—еҗҚйҷ„иҝ‘дҪҝз”Ёжһ„йҖ  `(+)` иЎЁзӨәиҝһжҺҘжҳҜеӨ–иҝһжҺҘгҖӮжё…еҚ• 1-6 е’Ңжё…еҚ•
    1-7 дёӯзҡ„е·ҰеӨ–иҝһжҺҘе’ҢеҸіеӨ–иҝһжҺҘеҸҜд»Ҙз”Ёд»ҘдёӢж–№ејҸиЎЁиҫҫпјҢеҰӮжё…еҚ• 1-16 жүҖзӨәгҖӮ


    ```

    select * from t1, t2 where t1.id = t2.id(+);

    select * from t1, t2 where t1.id(+) = t2.id;

    жё…еҚ• 1-16

    з”ЁдәҺе·ҰеӨ–иҝһжҺҘе’ҢеҸіеӨ–иҝһжҺҘзҡ„ Oracle еҺҹз”ҹиҜӯжі•

    ```


    еңЁз¬¬дёҖз§Қжғ…еҶөдёӢпјҢиЎЁ `t1` жҳҜеҶ…иЎЁпјҢиЎЁ `t2` жҳҜе·ҰеӨ–иҝһжҺҘиЎЁпјӣеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢиЎЁ `t1` жҳҜеҸіеӨ–иҝһжҺҘиЎЁпјҢиЎЁ `t2` жҳҜеҶ…иЎЁгҖӮ


    е…ЁеӨ–иҝһжҺҘж— жі•дҪҝз”ЁеҺҹз”ҹиҜӯжі•д»ҘжҜҸдёӘиЎЁд»…дҪҝз”ЁдёҖж¬Ўзҡ„ж–№ејҸжқҘиЎЁиҫҫгҖӮйҖҡеёёпјҢејҖеҸ‘дәәе‘ҳдјҡдҪҝз”Ё `union all` з»„еҗҲдёӨдёӘжҹҘиҜўжқҘжЁЎжӢҹе®ғгҖӮ


    ```

    select *

    from t1, t2

    where t1.id = t2.id(+)

    union all

    select *

    from t1, t2

    where t1.id(+) = t2.id

    and t1.id is null;

    жё…еҚ• 1-17

    дҪҝз”Ё Oracle еҺҹз”ҹиҜӯжі•жЁЎжӢҹе…ЁеӨ–иҝһжҺҘ

    ```


    и°ҲеҲ°еӨ–иҝһжҺҘпјҢзҗҶи§ЈвҖңиҝһжҺҘеүҚи°“иҜҚвҖқе’ҢвҖңиҝһжҺҘеҗҺи°“иҜҚвҖқзҡ„жҰӮеҝөйқһеёёйҮҚиҰҒпјҲMetalink ж–ҮжЎЈ ID 14736.1пјүгҖӮеҰӮеүҚжүҖиҝ°пјҢеңЁ ANSI еӨ–иҝһжҺҘжҸҸиҝ°дёӯпјҢеҰӮжһңеңЁеӨ–иЎЁдёӯжІЎжңүеҢ№й…Қзҡ„иЎҢпјҢеҲҷз»“жһңйӣҶдёӯзҡ„еҲ—е°ҶеЎ«е……
    `NULL` еҖјгҖӮиҝһжҺҘеүҚи°“иҜҚе’ҢиҝһжҺҘеҗҺи°“иҜҚд№Ӣй—ҙзҡ„еҢәеҲ«еңЁдәҺпјҢиҝһжҺҘеүҚи°“иҜҚеңЁ `NULL` жү©е……д№ӢеүҚиў«жұӮеҖјпјҢиҖҢиҝһжҺҘеҗҺи°“иҜҚеңЁйҖ»иҫ‘дёҠжҳҜеңЁд№ӢеҗҺиў«жұӮеҖјзҡ„гҖӮжҚўеҸҘиҜқиҜҙпјҢиҝһжҺҘеүҚи°“иҜҚеҸҜи§ҶдёәиҝһжҺҘжқЎд»¶пјҢиҝһжҺҘеҗҺи°“иҜҚеҸҜи§ҶдёәиҝҮж»ӨжқЎд»¶гҖӮ


    ```

    select *

    from t1, t2

    where t1.id = t2.id(+)

    and t2.id is null;

    ID N         ID N

