    ```


    L1 and L2 differ for id = 5 because the upper bound for the last_value in the
    first case is 3.6 (4.6В вҖ“ 1) while in the second case itвҖҷs simply the value from
    the previous row - 4.5.


    A windowing clause doesnвҖҷt make sense for some analytic functions so it cannot
    be specified for lag/lead, for example.


    Despite all the flexibility, analytic functions have some limitations :


    1.  Only the unbounded preceding, current row, unbounded following boundaries
    are allowed when sorting by multiple columns. For example, if we have a table
    containing information about points (coordinates x and y), then itвҖҷs not possible
    to calculate for each row how many points exist within a given shift by x and
    y from the current point. В 

    2.  Attributes from the current row cannot be referred to in a function. For example,
    if we want to sum the distances from the current point to all other points, then
    itвҖҷs not doable using analytic functions. However, if the goal is to sum the distances
    to some specific point, then it can be easily done for different ranges of rows.


    The specifics with brief comments inline are below.


    ```

    with points as

    (select rownum id, rownum * rownum x, mod(rownum, 3) y

    from dual

    connect by rownum <= 6)

    , t as

    (select p.*,

    -- the number of points within the distance of 5 by x coordinate

    -- cannot be solved with analytic functions for more than one coordinate

    count(*) over(order by x range between 5 preceding and 5 following) cnt,

    -- sum of the distances to the point (3, 3) for all rows

    -- between unbounded preceding and current row ordered by id

    -- cannot be solved using analytic functions if required to calculate

    -- distance between other rows and current row rather than a constant point

    round(sum(sqrt((x - 3) * (x - 3) + (y - 3) * (y - 3)))

    over(order by id),

    2) dist

    from points p)

    select t.*,

    (select count(*)

    from t t0 where t0.x between t.x-5 and t.x + 5) cnt1,

    (select count(*)

    from t t0 where t0.x between t.x-5 and t.x + 5 and t0.y between t.y-1 and t.y
    + 1) cnt2,

    (select round(sum(sqrt((x - 3) * (x - 3) + (y - 3) * (y - 3))), 2)

    from t t0 where t0.id <= t.id) dist1,

    (select round(sum(sqrt((x - t.x) * (x - t.x) + (y - t.y) * (y - t.y))), 2)

    from t t0 where t0.id <= t.id) dist2

    from t

    order by id;

