- fmt: 'Some developers try to avoid inline views with no particular reason; however
    in other cases it makes a difference from a performance point of view. Listing
    [9-3](#A455196_1_En_9_Chapter.html#Par50) shows a query from Listing [9-2](#A455196_1_En_9_Chapter.html#Par48)
    rewritten with an inline view and a bit simplified query (without analytic count)
    along with their versions after transformations and plans .


    ```

    select t.*, sum(agg) over(order by value) agg_an

    from (select value, count(*) agg, count(*) over() an

    from tt

    group by value) t;

    select "T"."VALUE" "VALUE",

    "T"."AGG" "AGG",

    "T"."AN" "AN",

    sum("T"."AGG") over(order by "T"."VALUE"

    range between unbounded preceding and current row) "AGG_AN"

    from (select "TT"."VALUE" "VALUE",

    count(*) "AGG",

    count(*) over() "AN"

    from "TT" "TT"

    group by "TT"."VALUE") "T";


    | Id  | Operation             | Name |


    |   0 | SELECT STATEMENT      |      |

    |   1 |  WINDOW SORT          |      |

    |   2 |   VIEW                |      |

    |   3 |    WINDOW BUFFER      |      |

    |   4 |     HASH GROUP BY     |      |

    |   5 |      TABLE ACCESS FULL| TT   |


    select t.*, sum(agg) over(order by value) agg_an

    from (select value, count(*) agg

    from tt

    group by value) t;

    select "TT"."VALUE" "VALUE",

    count(*) "AGG",

    sum(count(*)) over(order by "TT"."VALUE"

    range between unbounded preceding and current row) "AGG_AN"

    from "TT" "TT"

    group by "TT"."VALUE";


    | Id  | Operation           | Name |


    |   0 | SELECT STATEMENT    |      |

    |   1 |  WINDOW BUFFER      |      |

    |   2 |   SORT GROUP BY     |      |

    |   3 |    TABLE ACCESS FULL| TT   |


    Listing 9-3

    Inline view instead of nested aggregate and analytic functions

    ```


    As you see, Oracle did not manage to eliminate an inline view for the first query,
    but what is more important вҖ“ plans differ. The plan for the second query is the
    same as the plan for the original query with nested functions; however column
    `"an"` is not calculated. On the other hand, the first query returns the identical
    result as the original one, but as we see from the plan there are two `WINDOW`
    operations and a top-level function requires its own sort. This means that in
    this case you may want to use nested functions for performance reasons. Technically,
    a complex view merging transformation was applied for the second query but could
    not be applied for the first one.


    Aggregate functions also can be nested. As you may remember itвҖҷs not possible
    to use a `distinct` keyword in `listagg` function, but if result is supposed to
    be a single row, then nested aggregates can help to remove duplicates from concatenation
    as shown in Listing [9-4](#A455196_1_En_9_Chapter.html#Par53).


    ```

    select listagg(id, '','') within group(order by id) list

    from (select column_value id, rownum rn

    from table(numbers(1, 2, 3, 5, 2)));

    LIST


    1,2,2,3,5

    select listagg(max(id), '','') within group(order by max(id)) list

    from (select column_value id, rownum rn

    from table(numbers (1, 2, 3, 5, 2)))

    group by id;

    LIST


    1,2,3,5

    To perform aggregation by id before concatenation it''s enough to specify aggregate
    function max just in one place.

    listagg(id, '','') within group(order by max(id)) list

    listagg(max(id), '','') within group(order by id) list

    Listing 9-4

    Nested aggregate functions

    ```


    When aggregate functions are nested, then the result is always a single row and
    only one level deep nesting makes sense and is allowed.


    This capability may be quite useful if we want to concatenate unique values in
    a correlated scalar subquery . Listing [9-5](#A455196_1_En_9_Chapter.html#Par56)
    demonstrates a couple of approaches but the second one works only in `12c` while
    on `11g` it fails with `ORA-00904: "T1"."ID": invalid identifier` because correlation
    names scoped only to one level deep.


    ```

    select t1.*,

    (select listagg(max(t2.name), '', '') within group(order by t2.name)

    from t2

    where t1.id = t2.id

    group by t2.name) x1,

    (select listagg(t2.name, '', '') within group(order by t2.name)

    from (select distinct name from t2 where t1.id = t2.id) t2) x2

    from t1;

    Listing 9-5

    Concatenating unique values in correlated scalar subquery

    ```


    As was mentioned in the beginning of the chapter, sometimes an inline view may
    be mandatory, for example, if you want to use the result of the analytic function
    in a `where` clause. In other cases it may be optional as was shown in a query
    with mixed analytic and aggregate functions. In such situations itвҖҷs up to you
    to decide whether to use an inline view and make a query easier to read or get
    rid of it to make it more concise and avoid unnecessary layers.


    ItвҖҷs not possible to figure out in a general case whether a query contains (mergeable)
    inline views or not based on the plan. As was demonstrated, getting rid of an
    inline view can change the plan and have a positive impact on the performance;
    however additional inline views also may lead to improved performance.


    LetвҖҷs create a function with an execution time close to one second to demonstrate
    such a case.


    ```

    create or replace function f return number is

    begin

    dbms_lock.sleep(1);

    return 1;

    end f;

    /

    ```


    The first query from Listing [9-6](#A455196_1_En_9_Chapter.html#Par62) takes 6
    seconds because functions are evaluated twice for each row. The second query takes
    2 seconds because of scalar subquery caching вҖ“ the function is evaluated twice
    for the first row and the result is cached. Finally, the third query takes only
    a second because we can reuse the cached scalar from the inline view in both expressions.


    ```

    select id, value, f + 1 f1, f - 1 f2 from tt t;

    ID      VALUE         F1         F2

    ---------- ---------- ---------- ----------

    1          1          2          0

    2          0          2          0

    3          1          2          0

    Elapsed: 00:00:06.04

    select id, value, (select f from dual) + 1 f1, (select f from dual) - 1 f2

    from tt t;

    ID      VALUE         F1         F2

    ---------- ---------- ---------- ----------

    1          1          2          0

    2          0          2          0

    3          1          2          0

    Elapsed: 00:00:02.02

    select id, value, ff + 1 f1, ff - 1 f2

    from (select tt.*, (select f from dual) ff from tt) t;

    ID      VALUE         F1         F2

    ---------- ---------- ---------- ----------

    1          1          2          0

    2          0          2          0

    3          1          2          0

    Elapsed: 00:00:01.02

    Listing 9-6

    Improving performance with inline views and scalar subquery caching

    ```


    Even specific Oracle clauses like pattern matching or `model` may be combined
    in the same query block.


    ```

    select * from dual

    match_recognize (all rows per match pattern (x) define x as 1 = 1)

    model dimension by (1 id) measures (0 result) rules ();

    ```


    In this case `match_recognize` will be applied first and the `model` will be executed
    on top of it; furthermore each clause is isolated to another so if you want to
    treat a recordset in a specific way before applying the logic, you may have to
    specify partitioning and ordering for each clause.


    ## Summary


    Some details regarding logical execution of query clauses, along with the examples,
    have been examined. When logic is quite complicated it makes sense to use multiple
    query blocks even if that is not necessary - for maintainability purposes. However
    you have to make sure that inline views are merged as expected so there is no
    negative impact on the performance. ItвҖҷs not always possible to avoid inline views
    вҖ“ for example, when filtering by result of an analytic function is required. Moreover,
    in some cases inline views may improve the performance as was demonstrated in
    the end of the chapter. Also inline views may be useful as workarounds for bugs
    (for example, there were a lot of bugs on old versions when `connect by` and analytic
    functions have been mixed in the same query block) and to control transformations
    вҖ“ you can disable view merging and control transformations in each subqeury separately.'
