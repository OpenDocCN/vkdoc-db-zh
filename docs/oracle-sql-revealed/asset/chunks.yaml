    жү§иЎҢж—¶й—ҙдёҚеҲ°дёҖз§’пјҒз®—жі•йқһеёёз®ҖеҚ•пјҡжҲ‘д»¬жЈҖжҹҘеҪ“еүҚз»„дёӯзҡ„з¬¬дёҖдёӘи·Ҝеҫ„жҳҜеҗҰжҳҜеҪ“еүҚи·Ҝеҫ„зҡ„еӯҗи·Ҝеҫ„пјӣеҰӮжһңдёҚжҳҜпјҢеҲҷејҖе§ӢдёҖдёӘж–°з»„гҖӮ


    еҜ№дәҺ 12c д№ӢеүҚзҡ„ Oracle зүҲжң¬пјҢжңҖдҪіи§ЈеҶіж–№жЎҲжҳҜдҪҝз”Ё PL/SQL з®ЎйҒ“еҢ–еҮҪж•°пјҢеҸӘйңҖдёҖж¬ЎиЎЁжү«жҸҸпјҢе№¶йҮҮз”ЁдёҺжЁЎејҸеҢ№й…Қзұ»дјјзҡ„йҖ»иҫ‘гҖӮжҚўеҸҘиҜқиҜҙпјҢиҝҷдёӘжөӢйӘҢжҳҜеҸҰдёҖдёӘеҫҲеҘҪзҡ„дҫӢеӯҗпјҢиҜҙжҳҺжёёж Ү
    `for` еҫӘзҺҜеңЁжҹҗдәӣжғ…еҶөдёӢеҸҜиғҪжҜ”жҷ®йҖҡзҡ„ SQL жӣҙеҘҪгҖӮ


    ## Resemblance Group


    ж №жҚ®д»ҘдёӢйҖ»иҫ‘е°ҶиЎҢз»„еҗҲжҲҗдёҖдёӘзӣёдјјз»„пјҡжҲ‘д»¬д»ҺжңҖе°ҸеҖјеҲ°жңҖеӨ§еҖјйҒҚеҺҶжүҖжңүиЎҢпјҢеҰӮжһңз»„дёӯеӯҳеңЁжҹҗиЎҢзҡ„еҖјдёҺеҪ“еүҚеҖјзҡ„е·®еҖјдёҚи¶…иҝҮ 1пјҢеҲҷж Үи®°еҪ“еүҚиЎҢгҖӮ


    еҜ№дәҺдёӢйқўзҡ„ж•°жҚ®пјҢйҷӨдәҶ `ID` дёә 6 е’Ң 8 зҡ„иЎҢд№ӢеӨ–пјҢжүҖжңүиЎҢйғҪеә”еұһдәҺиҜҘз»„гҖӮ


    ```sql

    create table t_resemblance(id, value) as

    (select 1, 1 from dual

    union all select 2, 2 from dual

    union all select 3, 2.5 from dual

    union all select 4, 3.4 from dual

    union all select 5, 0.4 from dual

    union all select 6, 5 from dual

    union all select 7, -0.5 from dual

    union all select 8, -2 from dual

    union all select 9, -1 from dual

    union all select 10, 3 from dual

    union all select 11, 4 from dual

    union all select 12, 5 from dual);

    ```


    з¬¬ 12 иЎҢжҳҜиҜҘз»„зҡ„дёҖйғЁеҲҶпјҢе°Ҫз®Ўе®ғзҡ„еҖјзӯүдәҺжңӘиў«ж Үи®°зҡ„з¬¬ 6 иЎҢгҖӮиҝҷжҳҜеӣ дёәеңЁжЈҖжҹҘз¬¬ 12 иЎҢж—¶пјҢз»„дёӯеҢ…еҗ«дәҶеҖјдёә 4 зҡ„з¬¬ 11 иЎҢгҖӮ'
  raw: '### Solution


    A straightforward solution is self join on like and filtering. The main disadvantage
    of this approach is that the join method can be only NESTED LOOPS because of the
    join predicate, or technically there will be a full scan of an outer table for
    each row from the inner table. This can be improved a little bit if we use not
    exists instead of an outer joinВ вҖ“ in this case Oracle will scan the outer table
    until the first match for each record from the inner table is found.


    ```

    select t_path.path

    from t_path

    left join t_path t_top

    on t_path.path like t_top.path || ''%_/''

    where t_top.path is null;

    PATH


    /tmp/cat/

    /tmp/cata/

    /tmp/catb/

    /usr/local/

    /var/cache/

    Elapsed: 00:00:34.54

    select path

    from t_path

    where not exists (select null

    from t_path t_top

    where t_path.path like t_top.path || ''%_/'');

    PATH


    /tmp/cat/

    /tmp/cata/

    /tmp/catb/

    /usr/local/

    /var/cache/

    Elapsed: 00:00:09.63

    Listing 12-21

    Filtering top paths using join/subquery

    ```


    After rewriting the query with a not exist execution, time dropped more than thrice.
    If we specify an additional filter В«`and where rownum = 1`В» in a subquery, this
    will have no impact on performance because of the way how filter works.


    Apparently most of the time is spent on joining and evaluating the like predicate
    and it would be good to get rid of it. We can derive all subpaths for each path
    and if some paths have common subpaths, then return only those with a minimal
    number of subpaths as shown in Listing [12-22](#A455196_1_En_12_Chapter.html#Par182).


    ```

    with t0 as

    (select path,

    length(path) - length(replace(path, ''/'')) - 1 depth,

    substr(path, 1, instr(path, ''/'', 1, l.id + 1)) token

    from t_path,

    lateral (select rownum id

    from dual

    connect by level <

    length(path) - length(replace(path, ''/''))) l),

    t1 as (select t0.*, min(depth) over(partition by token) m from t0)

    select path from t1 group by path, depth having depth = min(m)

    order by path;

    PATH


    /tmp/cat/

    /tmp/cata/

    /tmp/catb/

    /usr/local/

    /var/cache/

    Elapsed: 00:00:22.78

    Listing 12-22

    Filtering top path using lateral and group by

    ```


    In this case the lateral view also causes NESTED LOOPS, which is quite CPU intensive
    and the final execution time is somewhere between the first and second query from
    Listing [12-21](#A455196_1_En_12_Chapter.html#Par179).


    If a maximal possible path depth is known in advance, then we can implement the
    following approach: for each subpath we check if the current path contains something
    after subpath (p[i] is not null) and there is another path that terminates in
    this subpath (m[i] = 0) then the current path is filtered out.


    ```

    select path

    from (select t1.*,

    min(nvl2(p2, 1, 0)) over(partition by p1) m2,

    min(nvl2(p3, 1, 0)) over(partition by p1, p2) m3,

    min(nvl2(p4, 1, 0)) over(partition by p1, p2, p3) m4,

    min(nvl2(p5, 1, 0)) over(partition by p1, p2, p3, p4) m5

    from (select path,

    substr(path, i1, i2 - i1) p1,

    substr(path, i2, i3 - i2) p2,

    substr(path, i3, i4 - i3) p3,

    substr(path, i4, i5 - i4) p4,

    substr(path, i5, i6 - i5) p5

    from (select path,

    instr(path, ''/'', 1, 1) i1,

    instr(path, ''/'', 1, 2) i2,

    instr(path, ''/'', 1, 3) i3,

    instr(path, ''/'', 1, 4) i4,

    instr(path, ''/'', 1, 5) i5,

    instr(path, ''/'', 1, 6) i6

    from t_path) t0) t1)

    where not (m2 = 0 and p2 is not null or m3 = 0 and p3 is not null or

    m4 = 0 and p4 is not null or m5 = 0 and p5 is not null);

    PATH


    /tmp/cat/

    /tmp/cata/

    /tmp/catb/

    /usr/local/

    /var/cache/

    Elapsed: 00:00:13.68

    Listing 12-23

    Filtering out top path using tricky analytics

    ```


    A solution with not exists is faster than the query from Listing [12-23](#A455196_1_En_12_Chapter.html#Par185);
    nevertheless the latter one is based on some assumptions while the former is a
    more generic approach. Most of the time for a query with analytics was spent on
    sorting. Also itвҖҷs important to note that В«`sort_area_size`В» was set to the maximal
    value and none of the queries required disk IO.


    The last solution uses pattern matching .


    ```

    select *

    from t_path

    match_recognize

    (

    order by path

    measures

    first(path) path

    one row per match

    pattern(x+)

    define

    x as path like first(path) || ''%''

    ) mr;

    PATH


    /tmp/cat/

    /tmp/cata/

    /tmp/catb/

    /usr/local/

    /var/cache/

    Elapsed: 00:00:00.89

    ```


    Execution time is less than a second! The algorithm is very simple: we check whether
    he first path from the current group is a subpath of the current path; if not,
    then a new group starts.


    For Oracle versions before 12c, the optimal solution would be a PL/SQL pipelined
    function with a single table scan and similar logic to pattern matching. In other
    words, this quiz is yet another great example when the cursor for loop may be
    a better solution than a vanilla SQL.


    ## Resemblance Group


    Combine rows into a resemblance group according to this logic: we move across
    all rows from min to max and mark the current row if there is a row in the group
    such as the difference between its value and current value is not more than 1.


    For the data below all the rows should be in the group except those with ID =
    6 and ID = 8.


    ```

    create table t_resemblance(id, value) as

    (select 1, 1 from dual

    union all select 2, 2 from dual

    union all select 3, 2.5 from dual

    union all select 4, 3.4 from dual

    union all select 5, 0.4 from dual

    union all select 6, 5 from dual

    union all select 7, -0.5 from dual

    union all select 8, -2 from dual

    union all select 9, -1 from dual

    union all select 10, 3 from dual

    union all select 11, 4 from dual

    union all select 12, 5 from dual);

    ```


    The 12th row is part of the group even though its value equals to the 6th row,
    which has not been marked. That is because the group contained 11th row with a
    value = 4 when we were checking the 12th row.'
