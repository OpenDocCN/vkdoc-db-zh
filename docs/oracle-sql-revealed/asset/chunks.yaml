    \n1.  жҜҸдёӘз»ҙеәҰзҡ„иҝһжҺҘжқЎд»¶иў«еҲҶзҰ»еҲ°еҜ№еә”зҡ„`on`еӯҗеҸҘдёӯгҖӮеҜ№дәҺеҶ…иҝһжҺҘе’ҢеӨҚжқӮзҡ„иҝһжҺҘжқЎд»¶пјҢеңЁ`where`еӯҗеҸҘиҝҳжҳҜеңЁ`on`еӯҗеҸҘдёӯжҢҮе®ҡи°“иҜҚеҸҜиғҪе№¶дёҚжҳҺжҳҫгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдёӢдёҖжқЎи§„еҲҷеҸҜиғҪжңүжүҖеё®еҠ©пјҡ`where`еӯҗеҸҘеә”д»…еҢ…еҗ«жҢүдәӢе®һиЎЁиҝӣиЎҢзҡ„иҝҮж»ӨгҖӮеҜ№дәҺеӨ–иҝһжҺҘпјҢеҲҷдёҚйңҖиҰҒиҝҷж ·зҡ„и§„еҲҷгҖӮ\n\
