    The last thing to mention regarding basic functionality is the treatment of null
    values. There are two special functions for model clause `presentv`/`presentnnv`
    that work similarly to `nvl2`. `Presentv` checks if the value existed in the recordset
    prior to execution of the model clause while `presentnnv` in addition to that
    also checks if the value was not null. Listing 7-11 shows differences between
    `presentv`, `presentnnv`, and `nvl2`.


    ```sql

