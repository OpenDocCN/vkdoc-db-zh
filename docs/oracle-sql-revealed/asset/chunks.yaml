    ## Summary


    It has been shown that recursive subquery factoring makes SQL Turing complete.
    Moreover it was demonstrated how an iterative model can be used to implement an
    arbitrary algorithm. Nevertheless with all the power, SQL is not a language for
    iterative computations. Also as was shown in the subsection вҖңBrief Analysis of
    the PerformanceвҖқ in Chapter 7 about the model clause, even for trivial algorithms
    PL/SQL may be faster than recursive subquery factoring or model clauses. Additional
    details when PL/SQL is a more preferable approach than SQL can be found in the
    next chapter вҖ“ вҖңWhen PL/SQL Is Better Than Vanilla SQL.вҖқ


