  trans: "\n## жЁЎеһӢеӯҗеҸҘдёӯеҲҶжһҗеҮҪж•°дёҺиҒҡеҗҲеҮҪж•°зҡ„еұҖйҷҗжҖ§\n```sql\nselect *\nfrom (select rownum id from dual\
    \ connect by rownum = cv(id)]\n-- 4)\nr2[any] = sum(value)[id >= cv(id)]\n)\n\
    ```\n\nдёәдәҶжҺўзҙўиҒҡеҗҲеҮҪж•°еҜ»еқҖзҡ„зҒөжҙ»жҖ§пјҢи®©жҲ‘д»¬еӣһеҲ°еүҚйқўе…ідәҺеҲҶжһҗеҮҪж•°еұҖйҷҗжҖ§зҡ„зӨәдҫӢпјҲжё…еҚ• 7-6пјүгҖӮз¬¬дёҖдёӘеұҖйҷҗжҖ§ж №жң¬дёҚжҳҜй—®йўҳгҖӮжё…еҚ• 7-14 еұ•зӨәдәҶеҰӮдҪ•йҖҡиҝҮдёӨдёӘеқҗж Үи®Ўз®—и·қзҰ»дёә\
    \ 5 д»ҘеҶ…зҡ„зӮ№ж•°гҖӮ\n\n### жё…еҚ• 7-14\nжЁЎеһӢеӯҗеҸҘдёӯзҡ„иҒҡеҗҲеҮҪж•°пјҢж”ҜжҢҒжҢүеӨҡз»ҙеәҰиҝӣиЎҢжқЎд»¶еҜ»еқҖ\n```sql\nwith points as\n(select\
    \ rownum id, rownum * rownum x, mod(rownum, 3) y\nfrom dual\nconnect by rownum\
    \ <= 6)\n, t as\n(select p.*,\n-- еҹәдәҺ x еқҗж Үи®Ўз®—и·қзҰ»дёә 5 д»ҘеҶ…зҡ„зӮ№ж•°       -- еҪ“ж¶үеҸҠеӨҡдәҺдёҖдёӘеқҗж Үж—¶пјҢж— жі•з”ЁеҲҶжһҗеҮҪж•°и§ЈеҶі\
    \       count(*) over(order by x range between 5 preceding and 5 following) cnt,\
    \       -- и®Ўз®—еҲ°зӮ№ (3, 3) зҡ„и·қзҰ»жҖ»е’Ң       -- жҢү id жҺ’еәҸпјҢд»Һж— з•ҢеүҚиЎҢеҲ°еҪ“еүҚиЎҢ       -- еҰӮжһңиҰҒжұӮи®Ўз®—е…¶д»–иЎҢдёҺеҪ“еүҚиЎҢд№Ӣй—ҙзҡ„и·қзҰ»пјҢиҖҢдёҚжҳҜеҲ°жҹҗдёӘеёёйҮҸзӮ№зҡ„и·қзҰ»пјҢеҲҷж— жі•з”ЁеҲҶжһҗеҮҪж•°и§ЈеҶі\n\
    round(sum(sqrt((x - 3) * (x - 3) + (y - 3) * (y - 3)))\nover(order by id),\n2)\
    \ dist\nfrom points p)\nselect *\nfrom t\nmodel\ndimension by (x, y)\nmeasures\
    \ (id, cnt, dist, 0 cnt2)\nrules\n(\ncnt2[any, any] = count(*)[x between cv(x)\
    \ - 5 and cv(x) + 5,\ny between cv(y) - 1 and cv(y) + 1]\n)\norder by id;\n```\n\
    \nз„¶иҖҢпјҢеҜ№дәҺз¬¬дәҢдёӘеұҖйҷҗжҖ§пјҢжІЎжңүзӣҙжҺҘзҡ„и§ЈеҶіж–№жЎҲпјҢеӣ дёәж— жі•еңЁиҒҡеҗҲеҮҪж•°зҡ„иЎЁиҫҫејҸдёӯеј•з”ЁеҪ“еүҚиЎҢзҡ„еәҰйҮҸеҖјгҖӮдҪңдёәдёҖз§ҚеҸҳйҖҡж–№жі•пјҢжҲ‘д»¬еҸҜд»ҘдҪҝз”Ёиҝӯд»ЈжЁЎеһӢпјҢе№¶жү§иЎҢдёҺиЎҢж•°дёҖж ·еӨҡзҡ„иҝӯд»ЈпјҢд»Ҙз»ҙжҠӨдёӨдёӘеҢ…еҗ«еҪ“еүҚиЎҢеқҗж Үзҡ„иҫ…еҠ©еәҰйҮҸеҖјгҖӮжҖқи·ҜеҰӮжё…еҚ•\
    \ 7-15 жүҖзӨәпјҢдҪҶиҝҷз§Қж–№жі•зңӢиө·жқҘжңүдәӣз¬ЁжӢҷпјҢдё”жҖ§иғҪдёҚдҪігҖӮ\n\n### жё…еҚ• 7-15\nдҪҝз”Ёиҝӯд»ЈжЁЎеһӢдҪңдёәиҒҡеҗҲеҮҪж•°еұҖйҷҗжҖ§зҡ„еҸҳйҖҡж–№жЎҲ\n```sql\nwith\
    \ points as\n(select rownum id, rownum * rownum x, mod(rownum, 3) y\nfrom dual\n\
    connect by rownum <= 6)\nselect *\nfrom points\nmodel\ndimension by (id)\nmeasures\
    \ (id i, x, y, 0 x_cur, 0 y_cur, 0 dist2)\nrules iterate (1e6) until i[iteration_number+2]\
    \ is null\n(\nx_cur[any] = x[iteration_number + 1],\ny_cur[any] = y[iteration_number\
    \ + 1],\ndist2[iteration_number + 1] =\nround(sum(sqrt((x - x_cur) * (x - x_cur)\
    \ +\n(y - y_cur) * (y - y_cur)))[id <= cv(id)], 2)\n)\norder by id;\n```\n\nеҰӮдҪ жүҖи§ҒпјҢиҫ…еҠ©еәҰйҮҸ\
    \ `x_cur` е’Ң `y_cur` еҝ…йЎ»еңЁжүҖжңүиҝӯд»ЈдёӯдёәжүҖжңүиЎҢеҲқе§ӢеҢ–гҖӮдёәдәҶз”ЁеҪ“еүҚиЎҢзҡ„еҖј `(x, y)` еЎ«е…… `(x_cur, y_cur)`пјҢжҲ‘д»¬дҪҝз”ЁдәҶ\
    \ `[iteration_number + 1]`пјҢеӣ дёәиЎҢзј–еҸ·д»Һ 1 ејҖе§ӢпјҢиҖҢ `interation_number` д»Һ 0 ејҖе§ӢгҖӮеәҰйҮҸ `dist2`\
    \ еңЁжҜҸж¬Ўиҝӯд»Јдёӯд»…й’ҲеҜ№еҚ•иЎҢиҝӣиЎҢи®Ўз®—гҖӮ\n\nйүҙдәҺжңүж—¶иҒҡеҗҲеҮҪж•°е’ҢеҲҶжһҗеҮҪж•°еңЁжЁЎеһӢеӯҗеҸҘдёӯеҸҜд»Ҙдә’жҚўпјҢжҲ‘д»¬е°ҶеңЁжҖ§иғҪеҲҶжһҗжңҹй—ҙиҝӣдёҖжӯҘи®Ёи®әиҝҷдёӘй—®йўҳгҖӮ\n\n### дҪҝз”ЁжЁЎеһӢеӯҗеҸҘз”ҹжҲҗйҖ’еҪ’еәҸеҲ—\n\
    \nи®©жҲ‘д»¬з»§з»ӯи®Ёи®әе…·дҪ“д»»еҠЎгҖӮжё…еҚ• 7-16 еұ•зӨәдәҶеҰӮдҪ•дҪҝз”ЁжЁЎеһӢжқҘз”ҹжҲҗеүҚйқўз« иҠӮи®Ёи®әзҡ„йҖ’еҪ’еәҸеҲ—гҖӮ\n\n```sql\nselect *\nfrom dual\n\
    model\ndimension by (0 id)\nmeasures (1 result)\nrules\n(\nresult[for id from\
    \ 1 to 20 increment 1] =\nround(100 * sin(result[cv(id)-1] + cv(id) - 1))\n);\n\
    select *\nfrom (select rownum lvl, rownum - 1 result\nfrom dual connect by level\
    \ <= 2)\nmodel\nignore nav\ndimension by (lvl)\nmeasures (result)\nrules\n(\n\
    result[for lvl from 3 to 15 increment 1] =\nresult[cv(lvl)-1] + result[cv(lvl)-2]\n\
    );\n```\n\nжЁЎеһӢе…Ғи®ёжҲ‘д»¬дҪҝз”Ёе…ҲеүҚйҳ¶ж®өи®Ўз®—зҡ„еҖјпјҢзұ»дјјдәҺйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈгҖӮд»ҺйҖ»иҫ‘и§’еәҰзңӢпјҢдёӨиҖ…д№Ӣй—ҙзҡ„е…ій”®еҢәеҲ«еңЁдәҺпјҢжЁЎеһӢжҢүеҲ—еә”з”Ёи§„еҲҷе’Ңи®Ўз®—еҖјпјҲеәҰйҮҸпјүпјҢиҖҢдёҚжҳҜжҢүиЎҢпјӣиҖҢйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈеңЁеӨ„зҗҶдёӢдёҖиЎҢд№ӢеүҚпјҢдјҡдёәеҪ“еүҚиЎҢи®Ўз®—жүҖжңүиЎЁиҫҫејҸгҖӮжӣҙеӨҡз»ҶиҠӮеҸҜеҸӮи§Ғз¬¬\
    \ 12 з« зҡ„жөӢйӘҢвҖңзҜ®еӯҗвҖқгҖӮ\n\nжӯӨеӨ–пјҢдёҺйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈдёҚеҗҢпјҢжЁЎеһӢжҸҗдҫӣдәҶдёҖз§Қз®ҖеҚ•зҡ„ж–№жі•жқҘеј•з”Ёд»»дҪ•е…¶д»–иЎҢзҡ„еәҰйҮҸеҖјпјӣеӣ жӯӨпјҢдҫӢеҰӮеңЁз”ҹжҲҗж–җжіўйӮЈеҘ‘ж•°еҲ—ж—¶пјҢж— йңҖдҪҝз”Ёиҫ…еҠ©еҲ—гҖӮйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јзҡ„еҸҜи§ҒжҖ§д»…йҷҗдәҺдёҠдёҖж¬Ўиҝӯд»Јзҡ„и®°еҪ•йӣҶгҖӮ\n\
    \nе°Ҫз®ЎйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Је’ҢжЁЎеһӢеҸҜз”ЁдәҺи§ЈеҶізӣёеҗҢзҡ„д»»еҠЎпјҢдҪҶе®ғд»¬зҡ„иғҪеҠӣе®Ңе…ЁдёҚеҗҢпјҢдё”и®ҫи®Ўзӣ®зҡ„дёҚеҗҢпјҢеӣ жӯӨдҪҝз”ЁзӣёеҗҢзҡ„жңҜиҜӯе№¶дёҚеҚҒеҲҶжҒ°еҪ“гҖӮи°ҲеҸҠйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јж—¶пјҢжҲ‘д»¬еҸҜд»ҘиҜҙвҖңеј•з”Ёе…ҲеүҚеұӮзә§и®Ўз®—зҡ„еҖјвҖқжҲ–вҖңеј•з”ЁзҲ¶и®°еҪ•зҡ„и®Ўз®—еҖјвҖқпјҢиҖҢеҜ№дәҺжЁЎеһӢеӯҗеҸҘпјҢжӣҙеҮҶзЎ®зҡ„иҜҙжі•жҳҜвҖңеј•з”ЁеүҚдёҖдёӘз»ҙеәҰжҲҗе‘ҳзҡ„еәҰйҮҸеҖјвҖқгҖӮ\n\
    \nйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§Јж—ЁеңЁиғҪеӨҹеӨҡж¬Ўеә”з”ЁзӣёеҗҢйҖ»иҫ‘пјҢе№¶зү№еҲ«з”ЁдәҺеӨ„зҗҶеұӮж¬Ўж•°жҚ®пјӣиҖҢжЁЎеһӢеӯҗеҸҘеҲҷж—ЁеңЁиҝӣиЎҢзұ»дјјз”өеӯҗиЎЁж јзҡ„и®Ўз®—пјҢе№¶еӨ„зҗҶеӨҡз»ҙж•°жҚ®гҖӮ\n\n### жЁЎеһӢеӯҗеҸҘзҡ„дҪҝз”ЁеңәжҷҜ\n\
    \nжҖ»з»“дҪҝз”ЁеңәжҷҜпјҢеңЁд»ҘдёӢжғ…еҶөдёӢдҪҝз”ЁжЁЎеһӢжҳҜеҗҲзҗҶзҡ„пјҡ\n\n1.  зұ»дјјз”өеӯҗиЎЁж јзҡ„и®Ўз®—гҖӮз®ҖиҖҢиЁҖд№ӢпјҢиҝҷж„Ҹе‘ізқҖж №жҚ®е…¶д»–еҚ•е…ғж јжҲ–е…¶иҢғеӣҙзҡ„еҖјжқҘи®Ўз®—еҚ•е…ғж јгҖӮз®ҖеҚ•зҡ„иЎЁиҫҫејҸйҖҡеёёеҸҜд»ҘйҮҚеҶҷд»ҘдҪҝз”Ёе…¶д»–\
    \ SQL еҠҹиғҪпјҡеҲҶжһҗеҮҪж•°е’Ң/жҲ–йўқеӨ–зҡ„иҝһжҺҘгҖӮдҫӢеҰӮпјҢеҰӮжһңжҲ‘д»¬жңүжңҲеәҰй”Җе”®дҝЎжҒҜпјҢе№¶жғіи®Ўз®—дёҺз¬¬дёҖдёӘжңҲзҡ„жҜ”дҫӢпјҢжҲ‘д»¬еҸҜд»ҘдҪҝз”ЁжЁЎеһӢпјҡ\n    ```sql\n    with\
    \ t as\n    (select rownum id, 100 + rownum - 1 value from dual connect by level\
    \ <= 12)\n    select *\n    from t\n    model\n    dimension by (id)\n    measures\
    \ (value, 0 ratio)\n    rules\n    (ratio[any] order by id = value[cv(id)]/value[1])\n\
    \    ```\n    еҗҢж—¶пјҢдҪҝз”ЁеҲҶжһҗеҮҪж•°д№ҹеҸҜд»ҘиҪ»жқҫи®Ўз®—пјҡ\n    ```sql\n    select id, value, value / first_value(value)\
    \ over(order by id) ratio from t\n    ```\n    иҝҷжҳҜдёҖдёӘжӣҙз»јеҗҲзҡ„дҫӢеӯҗпјҡи®Ўз®—еҪ“еүҚиЎҢеҖјдёҺ `ref_id` жүҖеј•з”ЁиЎҢеҖјзҡ„жҜ”дҫӢгҖӮ\n\
    \    ```sql\n    exec dbms_random.seed(100);\n    create table t as\n    select\
    \ rownum id,\n    100 + rownum - 1 value,\n    trunc(dbms_random.value(1, 10 +\
    \ 1)) ref_id\n    from dual\n    connect by level <= 10;\n    ```\n    жЁЎеһӢи§ЈеҶіж–№жЎҲеҰӮдёӢпјҡ\n\
    \    ```sql\n    select *\n    from t\n    model\n    dimension by (id)\n    measures\
    \ (value, ref_id, 0 ratio)\n    rules\n    (\n    ratio[any] order by id =\n \
    \   round(value[cv(id)] / value[ref_id[cv(id)]], 3)\n    );\n    ```\n    ```\n\
    \    ID      VALUE     REF_ID      RATIO\n    ---------- ---------- ----------\
    \ ----------\n    1        100          6       .952\n    2        101       \
    \   7       .953\n    3        102          7       .962\n    4        103   \
    \       8       .963\n    5        104          3      1.02\n    6        105\
    \          5      1.01\n    7        106         10       .972\n    8        107\
    \          4      1.039\n    9        108          2      1.069\n    10      \
    \  109          7      1.028\n    ```\n    еҗҢж ·зҡ„з»“жһңд№ҹеҸҜд»ҘйҖҡиҝҮиҮӘиҝһжҺҘпјҲжҲ–дҪҝз”Ёжё…еҚ• 3-3 дёӯзҡ„ж–№жі•зҡ„еҲҶжһҗеҮҪж•°пјүе®һзҺ°пјҡ\n\
    \    ```sql\n    select t1.*, round(t1.value / t2.value, 3) ratio\n    from t\
    \ t1\n    join t t2\n    on t1.ref_id = t2.id\n    order by t1.id\n    ```\n"
- fmt: '## жЁЎеһӢеӯҗеҸҘзҡ„дҪҝз”ЁеңәжҷҜ


    з„¶иҖҢпјҢжңүж—¶жӣҙеӨҚжқӮзҡ„иЎЁиҫҫејҸеҸҜиғҪйңҖиҰҒеӨҡж¬ЎиҝһжҺҘд»ҘеҸҠеӨ§йҮҸдҪҝз”ЁеҲҶжһҗеҮҪж•°гҖҒиҒҡеҗҲеҮҪж•°е’Ңе…¶д»–SQLеҠҹиғҪпјҢиҖҢдҪҝз”ЁжЁЎеһӢеӯҗеҸҘе’Ңзҙ§еҮ‘и§„еҲҷеҸҜд»Ҙе®ҢжҲҗеҗҢж ·зҡ„дәӢжғ…гҖӮеҖјеҫ—дёҖжҸҗзҡ„жҳҜпјҢжЁЎеһӢеӯҗеҸҘеӯҳеңЁдёҖдәӣеҸҜжү©еұ•жҖ§й—®йўҳпјҢеӣ жӯӨпјҢеҚідҪҝи§ЈеҶіж–№жЎҲз®ҖжҙҒжҳҺдәҶпјҢеңЁзңҹе®һж•°жҚ®йҮҸдёҠжөӢиҜ•е®ғжҖ»жҳҜжңүж„Ҹд№үзҡ„пјҢе№¶дё”еҰӮжһңжЁЎеһӢжү©еұ•жҖ§дёҚи¶іпјҢеҲҷеҲҮжҚўеҲ°еҢ…жӢ¬`PL/SQL`еңЁеҶ…зҡ„жӣҝд»Јж–№жі•гҖӮеҸҰдёҖж–№йқўпјҢз”ЁдәҺзұ»з”өеӯҗиЎЁж ји®Ўз®—зҡ„е®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸпјҢеҰӮ`Excel`пјҢе№¶йқһи®ҫи®Ўз”ЁдәҺеӨ„зҗҶеӨ§ж•°жҚ®йҮҸгҖӮдҫӢеҰӮпјҢ`Excel
    2016`зҡ„жңҖеӨ§иЎҢж•°жҳҜ100дёҮпјҢиҖҢжЁЎеһӢеҸҜд»ҘиҪ»жқҫеӨ„зҗҶиҝҷдёӘйҮҸзә§зҡ„ж•°жҚ®иҖҢдёҚдјҡеҮәзҺ°жҳҺжҳҫзҡ„жҖ§иғҪдёӢйҷҚпјҢжӣҙдёҚз”ЁиҜҙз»“жһңеҸҜд»ҘеңЁжңҚеҠЎеҷЁз«Ҝи®Ўз®—пјҢж— йңҖе°Ҷж•°жҚ®жҸҗеҸ–еҲ°е®ўжҲ·з«ҜгҖӮ


    2. и®Ўз®—дҪҝз”ЁзәҜSQLж— жі•е®һзҺ°зҡ„еӨҚжқӮз»“жһңгҖӮ


    жңүж—¶пјҢOracleиҙҰжҲ·з”ЁдәҺжҠҘе‘Ҡзі»з»ҹж—¶еҸӘжңү`select`жқғйҷҗпјҢеӣ жӯӨж— жі•дёәз»“жһңеҲӣе»әиЎЁеҮҪж•°е’Ңзұ»еһӢгҖӮеҪ“з„¶пјҢиҝҷеҸҜд»ҘеңЁеҸҰдёҖдёӘжЁЎејҸдёӯеҲӣе»әе№¶жҺҲдәҲжҠҘе‘Ҡзі»з»ҹз”ЁжҲ·жқғйҷҗпјҢдҪҶжЁЎеһӢеҮҸе°‘дәҶзңҹжӯЈеҝ…иҰҒзҡ„жғ…еҶөгҖӮжЁЎеһӢд№ҹеҸҜиғҪжҳҜдёәзү©еҢ–и§Ҷеӣҫе®һзҺ°еӨҚжқӮйҖ»иҫ‘зҡ„еҘҪж–№жі•вҖ”вҖ”е°Ҫз®ЎжЁЎеһӢи®Ўз®—еҸҜиғҪејҖй”ҖиҫғеӨ§пјҢдҪҶиҝҷеҜ№дәҺз»Ҳз«Ҝз”ЁжҲ·жқҘиҜҙеҸҜиғҪжҳҜеҜҹи§үдёҚеҲ°зҡ„гҖӮ


    йҖҡеёёпјҢдәәд»¬дјҡеңЁе№¶йқһжңҖдҪійҖүйЎ№ж—¶дҪҝз”ЁжЁЎеһӢеӯҗеҸҘпјҡ

    *   з”ҹжҲҗеәҸеҲ—пјҢе…¶дёӯеҪ“еүҚеҖјеҸҜиғҪеҹәдәҺеҲқе§ӢеҖјжҺЁеҜјвҖ”вҖ”дҫӢеҰӮпјҢж—ҘжңҹиҢғеӣҙгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪҝз”Ё`connect by`з”ҹжҲҗдјҡжӣҙеҝ«гҖӮ

    *   еҗ„з§Қеӯ—з¬Ұж•°жҚ®еӨ„зҗҶпјҢд»Һе°Ҷеӯ—з¬ҰдёІжӢҶеҲҶдёәж Үи®°еҲ°и®Ўз®—еӯ—з¬ҰдёІдёӯзҡ„иЎЁиҫҫејҸгҖӮиҰҒжӢҶеҲҶеӯ—з¬ҰдёІпјҢеҸҜд»ҘдҪҝз”Ё`connect by`пјӣеҜ№дәҺжӣҙеӨҚжқӮзҡ„ж“ҚдҪңпјҢжңҖеҘҪе°ҶйҖ»иҫ‘е°ҒиЈ…еңЁ`PL/SQL`з”ҡиҮіCеҮҪж•°дёӯгҖӮ

    *   еңЁж•°жҚ®дёӯжҹҘжүҫзү№е®ҡеәҸеҲ—вҖ”вҖ”дҫӢеҰӮпјҢжІЎжңүй—ҙйҡ”зҡ„ж•ҙж•°еӯҗеәҸеҲ—гҖӮжӣҙеҘҪзҡ„е·Ҙе…·жҳҜжЁЎејҸеҢ№й…ҚжҲ–еҲҶжһҗеҮҪж•°гҖӮ

    *   и®Ўз®—жҖ»и®Ўе’Ңе°Ҹи®ЎгҖӮ`group by rollup/grouping sets/cube`е°ұжҳҜдёәжӯӨзӣ®зҡ„и®ҫи®Ўзҡ„гҖӮ

    *   иҪ¬зҪ®гҖӮиҝҷжҳҜ`pivot/unpivot`ж“ҚдҪңз¬Ұзҡ„е·ҘдҪңгҖӮ

    *   жүҖжңүе…¶д»–еҸҜд»ҘйҒҝе…ҚдҪҝз”Ёе®ғзҡ„жғ…еҶөгҖӮвҳә


    ## жҖ§иғҪз®ҖиҰҒеҲҶжһҗ


    жЁЎеһӢеӯҗеҸҘзҡ„е…·дҪ“зү№зӮ№еңЁдәҺпјҢз”ЁдәҺе»әжЁЎзҡ„е®Ңж•ҙи®°еҪ•йӣҶиў«еҠ иҪҪеҲ°еҶ…еӯҳдёӯгҖӮз»“жһңеҲ—зҡ„ж•°йҮҸжҳҜеӣәе®ҡдё”йў„е®ҡд№үзҡ„пјҲзӯүдәҺеҲҶеҢәж•°+з»ҙеәҰж•°+еәҰйҮҸж•°пјүпјҢдҪҶиЎҢж•°жҳҜеҸҳеҢ–зҡ„пјҢеҸҜиғҪеӨҡдәҺгҖҒе°‘дәҺжҲ–зӯүдәҺеҲқе§Ӣи®°еҪ•йӣҶдёӯзҡ„иЎҢж•°гҖӮ


    дёәдәҶеҲҶжһҗеҸҜжү©еұ•жҖ§пјҢи®©жҲ‘д»¬жөӢйҮҸз”ҹжҲҗйҖ’еҪ’еәҸеҲ—зҡ„дёҚеҗҢж–№жі•зҡ„жҖ§иғҪпјҢиҜҘеәҸеҲ—дҪҝз”Ё`sin`еҮҪж•°пјҢжңҖеҲқеңЁе…ідәҺ`connect by`пјҲз¬¬[5](#A455196_1_En_5_Chapter.html)з« пјүзҡ„з« иҠӮдёӯд»Ӣз»ҚгҖӮиҝҷдәӣж–№жі•еҢ…жӢ¬`PL/SQL`еҮҪж•°гҖҒйҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§Је’ҢжЁЎеһӢгҖӮдҪ еҸҜд»ҘеңЁзӣёеә”зҡ„з« иҠӮдёӯжүҫеҲ°жүҖжңүд»Јз ҒгҖӮ


    еҜ№дәҺ`PL/SQL`еҮҪж•°пјҢжҲ‘д»¬е°Ҷи®Ўз®—иЎҢж•°йҖ’еўһж—¶жүҖжңүе…ғзҙ зҡ„е’Ңпјҡ1e5, 2e5, 3e5, 4e5, 5e5, 1e6гҖӮеҮҪж•°`f`зҡ„йҖ’еҪ’е’ҢйқһйҖ’еҪ’е®һзҺ°жҖ§иғҪеӨ§иҮҙзӣёеҗҢпјҢеӣ жӯӨдҪ еҸҜд»ҘдҪҝз”Ёе…¶дёӯд»»дҪ•дёҖз§ҚиҝӣиЎҢйҮҚзҺ°гҖӮ


    ```

    select sum(value(t)) result from table(f(1e5)) t;

    ```


    зұ»дјјең°пјҢжҲ‘д»¬е°ҶжөӢйҮҸйҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§Је’ҢжЁЎеһӢж–№жі•зҡ„иҖ—ж—¶пјҢд»Ҙд»Јжӣҝ`PL/SQL`еҮҪж•°гҖӮ


    дҪҝз”ЁдәҶиҒҡеҗҲеҮҪж•°жқҘиҺ·еҸ–еҚ•иЎҢз»“жһңе№¶йҒҝе…ҚиҺ·еҸ–пјӣжҲ‘д»¬зҡ„дё»иҰҒзӣ®ж ҮжҳҜз”ҹжҲҗеәҸеҲ—гҖӮдёәдәҶе®Ңж•ҙиө·и§ҒпјҢи®©жҲ‘д»¬д№ҹиҖғиҷ‘дёҖдёӘиҝӯд»ЈжЁЎеһӢпјҢе®ғдёҚз”ҹжҲҗеәҸеҲ—иҖҢжҳҜи®Ўз®—е…ғзҙ д№Ӣе’ҢгҖӮ


    ```

    select cumul

    from dual

    model

    dimension by (0 id)

    measures (1 result, 1 cumul)

    rules iterate (1e5)

    (

    result[0] =  round(100 * sin(result[0] + iteration_number)),

    cumul[0] = cumul[0] + result[0]

    );

    ```


    еҜ№дәҺжүҖжңүж–№жі•пјҢеӨ§йғЁеҲҶж—¶й—ҙйғҪиҠұеңЁCPUдёҠпјҢжү§иЎҢз»ҹи®ЎдҝЎжҒҜеҰӮиЎЁ[7-1](#A455196_1_En_7_Chapter.html#Tab1)жүҖзӨәгҖӮ


    **иЎЁ 7-1**


    еәҸеҲ—з”ҹжҲҗзҡ„жү§иЎҢз»ҹи®Ў


    | иЎҢж•° | PL/SQL | йҖ’еҪ’ WITH | жЁЎеһӢ | иҝӯд»ЈжЁЎеһӢ |

    | --- | --- | --- | --- | --- |

    | `1e5` | `01.18` | `02.29` | `03.22` | `01.86` |

    | `2e5` | `02.43` | `04.52` | `12.68` | `03.35` |

    | `3e5` | `03.47` | `07.58` | `27.93` | `05.00` |

    | `4e5` | `04.70` | `10.31` | `53.45` | `06.90` |

    | `5e5` | `05.82` | `12.85` | `01:18.57` | `08.58` |

    | `1e6` | `11.80` | `27.32` | `05:01.87` | `17.00` |


    жӯӨеӨ–пјҢз”ҹжҲҗиҝҮзЁӢдёӯж¶ҲиҖ—дәҶеӨ§йҮҸзҡ„`PGA`еҶ…еӯҳпјӣеҸҰдёҖж–№йқўпјҢеҸӘжңүйҖ’еҪ’`WITH`дҪҝз”ЁдәҶдёҙж—¶иЎЁз©әй—ҙпјҲиҝҷеҸҜд»ҘйҖҡиҝҮжүӢеҠЁеҶ…еӯҳз®ЎзҗҶжқҘйҒҝе…ҚпјҢжӯЈеҰӮжң¬иҠӮеҗҺйқўе°ҶиҰҒеұ•зӨәзҡ„вҖ”вҖ”еӣ жӯӨйҖ’еҪ’`WITH`зҡ„жҖ§иғҪеҸҜиғҪдјҡзЁҚеҘҪдёҖдәӣпјүгҖӮ


    еҜ№дәҺжЁЎеһӢе’ҢйҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§ЈпјҢеҶ…еӯҳзұ»еҲ«пјҲ`v$process_memory.category`пјүжҳҜ`SQL`пјҢиҖҢеҜ№дәҺ`PL/SQL`еҮҪж•°еҲҷжҳҜ`PL/SQL`пјҢиҝҷжҳҜзӣёеҪ“з¬ҰеҗҲйў„жңҹзҡ„гҖӮдҪ еҸҜд»Ҙж·ұе…ҘжҹҘзңӢ`v$sql_workarea.operation_type`пјҢеҜ№дәҺжЁЎеһӢеӯҗеҸҘе°ҶжҳҜ`SPREADSHEET`пјҢеҜ№дәҺйҖ’еҪ’`WITH`е°ҶжҳҜ`CONNECT-BY
    (SORT)`гҖӮ


    `v$active_session_history.pga_allocated`е’Ң`v$active_session_history.temp_space_allocated`жҳҜи·ҹиёӘеҶ…еӯҳдҪҝз”ЁеҠЁжҖҒеўһй•ҝзҡ„иүҜеҘҪжқҘжәҗгҖӮеҰӮжһңйңҖиҰҒжӣҙиҜҰз»Ҷзҡ„еҲҶжһҗпјҢдҪ еҸҜиғҪйңҖиҰҒдҪҝз”Ё`v$process_memory_detail`жҖ§иғҪи§ҶеӣҫгҖӮ


    еҰӮдҪ жүҖи§ҒпјҢжЁЎеһӢиЎЁзҺ°еҮәиҫғе·®зҡ„жҖ§иғҪпјҢе№¶дё”иҖ—ж—¶йҡҸиЎҢж•°еўһй•ҝе‘ҲйқһзәҝжҖ§еўһй•ҝгҖӮиҝӯд»ЈжЁЎеһӢзңӢиө·жқҘеҘҪеҫ—еӨҡпјҢдҪҶдёҘж јжқҘиҜҙе®ғжІЎжңүи§ЈеҶіеҺҹе§Ӣд»»еҠЎвҖ”вҖ”з”ҹжҲҗеәҸеҲ—пјӣе®ғеҸӘи®Ўз®—дәҶе…ғзҙ д№Ӣе’ҢгҖӮеҸҰдёҖж–№йқўпјҢйҖҡеёёжЁЎеһӢжҳҜеңЁзҺ°жңүж•°жҚ®д№ӢдёҠдҪҝз”ЁпјҢиҖҢдёҚжҳҜз”ҹжҲҗж–°ж•°жҚ®пјҢдҪҶж— и®әеҰӮдҪ•пјҢеӨ§ж•°жҚ®йҮҸд»Қз„¶жҳҜдёҖдёӘй—®йўҳгҖӮ


    еҜ№дәҺиҝҷдёӘд»»еҠЎпјҢйҖ’еҪ’`WITH`зҡ„жҖ§иғҪе’ҢеҸҜжү©еұ•жҖ§иҝңдјҳдәҺжЁЎеһӢеӯҗеҸҘпјҢдҪҶеҜ№дәҺи®ёеӨҡе…¶д»–д»»еҠЎпјҢжЁЎеһӢеҸҜиғҪжҳҜжӣҙеҘҪзҡ„ж–№жі•гҖӮеҰӮеүҚжүҖиҝ°пјҢйҖ’еҪ’`WITH`еңЁжҜҸж¬Ўиҝӯд»Јж—¶ж·»еҠ дёҖдёӘж–°зҡ„и®°еҪ•йӣҶпјҢдҪҶеҜ№дәҺжЁЎеһӢжқҘиҜҙиҝҷдёҚжҳҜеҝ…йңҖзҡ„пјҢеӣ жӯӨеҰӮжһңдҪ йңҖиҰҒеҜ№жҹҗдёӘи®°еҪ•йӣҶиҝӯд»Јеә”з”ЁдёҖз»„иҪ¬жҚўпјҢйӮЈд№ҲжЁЎеһӢеҸҜиғҪжҳҜжӣҙеҘҪзҡ„ж–№жі•гҖӮ'
  raw: 'However, sometimes more complex expressions might require multiple joins and
    extensive usage of analytic and aggregate functions as well as other SQL capabilities,
    while the same can be done using a model clause and compact rules . ItвҖҷs worth
    mentioning that the model has some scalability issues so, even if the solution
    is concise and simple, it always makes sense to test it on real-data volumes and
    switch to alternative approaches including PL/SQL if the model does not scale
    enough. On the other hand, client applications for spreadsheet-like calculations,
    like Excel, are not designed to work with large data volumes. For example, the
    max number of rows for Excel 2016 is 1 million, which a model can easily handle
    without notable performance degradation, not to mention that the result can be
    calculated on the server side without fetching data to the client. В 

    2.  Calculating a complicated result that otherwise cannot be achieved using pure
    SQL.


    Sometimes Oracle accounts for reporting systems have only select privileges so
    that you cannot create a table function and type for its result. Of course, that
    can be created in another schema and granted to a reporting system user, but the
    model reduces the number of cases when itвҖҷs really necessary. Also the model may
    be a good solution to implement complex logic for materialized viewsВ вҖ“ even though
    model calculations can be expensive this may be unnoticeable for end users.


    Quite often people use a model clause when itвҖҷs not the best option :


    *   Generation of sequences where the current value may be derived based on an
    initial valueВ вҖ“ for example, date ranges. In this case generation would be faster
    with `connect by`.

    *   Various char data treatment from splitting string into tokens to calculating
    expression in a string. To split strings you can use `connect by`; for more complex
    manipulations itвҖҷs better to encapsulate logic in PL/SQL or even C function.

    *   Finding specific sequences in a dataВ вҖ“ for example, subsequences of integers
    without gaps. The better instrument for this is pattern matching or analytic functions.

    *   Calculation of totals and subtotals. Group by rollup/grouping sets/cube designed
    for this purpose.

    *   Transposing. This is the job for pivot/unpivot operators.

    *   All other cases when you can avoid using it. вҳә


    ## Brief Analysis of theВ Performance


    The specific of the model clause is that a full recordset used for modeling is
    getting loaded into memory. The number of result columns is fixed and predefined
    (equals to partitions + dimensions + measures), but he number of rows varies and
    may be more than or less than the number of rows in the initial recordset as well
    as equal to it.


    To analyze scalability, letвҖҷs measure performance of the different approaches
    to generate a recursive sequence with `sin` function initially introduced in the
    chapter about `connect by (Chapter` [`5`](#A455196_1_En_5_Chapter.html) `)`. The
    approaches are PL/SQL function, recursive subquery factoring, and model. You can
    find all the code in the corresponding chapters .


    For a PL/SQL function, we will calculate the sum of all elements for an increasing
    number of rows: 1e5, 2e5, 3e5, 4e5, 5e5, 1e6\. The performance of recursive and
    non-recursive implementation of function `f` is approximately the same so you
    can use any of them for reproducing.


    ```

    select sum(value(t)) result from table(f(1e5)) t;

    ```


    Similarly, we will measure timings for recursive subquery factoring and model
    approaches instead of the PL/SQL function.


    Aggregate function was used to get a single row result and avoid fetching; our
    primary goal is to generate a sequence though. To complete the picture, letвҖҷs
    also consider an iterative model that does not generate a sequence but calculates
    the sum of the elements.


    ```

    select cumul

    from dual

    model

    dimension by (0 id)

    measures (1 result, 1 cumul)

    rules iterate (1e5)

    (

    result[0] =  round(100 * sin(result[0] + iteration_number)),

    cumul[0] = cumul[0] + result[0]

    );

    ```


    For all the approaches, most of the time is spent on CPU and execution statistics
    are shown in Table [7-1](#A455196_1_En_7_Chapter.html#Tab1).


    Table 7-1


    Execution statistics for sequence generation


    | Number of rows | PL/SQL | Recursive with | Model | Iterative model |

    | --- | --- | --- | --- | --- |

    | `1e5` | `01.18` | `02.29` | `03.22` | `01.86` |

    | `2e5` | `02.43` | `04.52` | `12.68` | `03.35` |

    | `3e5` | `03.47` | `07.58` | `27.93` | `05.00` |

    | `4e5` | `04.70` | `10.31` | `53.45` | `06.90` |

    | `5e5` | `05.82` | `12.85` | `01:18.57` | `08.58` |

    | `1e6` | `11.80` | `27.32` | `05:01.87` | `17.00` |


    Also a lot of PGA memory is consumed during generation; on the other hand, temporary
    tablespace was involved only for recursive with (this can be avoided using manual
    memory management as will be shown later in this sectionВ вҖ“ so performance from
    recursive with may be a bit better).


    Memory category (v$process_memory.category) for the model and recursive subquery
    factoring is SQL and for PL/SQL function itвҖҷs PL/SQL, which is quite expected.
    You can drill down and check v$sql_workarea.operation_type, it will be SPREADSHEET
    for model clause and CONNECT-BY (SORT) for recursive with.


    v$active_session_history.pga_allocated and v$active_session_history.temp_space_allocated
    are good sources to track memory usage growth in dynamics. If more detailed analysis
    is required, then you may want to use v$process_memory_detail performance view
    .


    So as you see, the model demonstrated worse performance and moreover nonlinear
    growth of elapsed time depending on the number of rows. The iterative model looks
    much better, but strictly speaking it does not solve the original taskВ вҖ“ to generate
    the sequence; it only calculates the sum of elements. On the other hand, as a
    rule, the model is used on top of existing data instead of generating new data,
    but anyway large data volumes remain an issue.


    Performance and scalability of recursive with for this task was much better than
    for the model clause, but the model may be a better approach for many other tasks.
    As it was mentioned earlier, recursive with adds a new recordset on each iteration,
    but this is not necessary for a model so if you need to iteratively apply a set
    of transformations to some recordset then model may be a much better approach.'
  trans: '

    ## жЁЎеһӢеӯҗеҸҘзҡ„дҪҝз”ЁеңәжҷҜ


    з„¶иҖҢпјҢжңүж—¶жӣҙеӨҚжқӮзҡ„иЎЁиҫҫејҸеҸҜиғҪйңҖиҰҒеӨҡж¬ЎиҝһжҺҘд»ҘеҸҠеӨ§йҮҸдҪҝз”ЁеҲҶжһҗеҮҪж•°гҖҒиҒҡеҗҲеҮҪж•°е’Ңе…¶д»– SQL еҠҹиғҪпјҢиҖҢдҪҝз”ЁжЁЎеһӢеӯҗеҸҘе’Ңзҙ§еҮ‘и§„еҲҷеҸҜд»Ҙе®ҢжҲҗеҗҢж ·зҡ„дәӢжғ…гҖӮеҖјеҫ—дёҖжҸҗзҡ„жҳҜпјҢжЁЎеһӢеӯҗеҸҘеӯҳеңЁдёҖдәӣеҸҜжү©еұ•жҖ§й—®йўҳпјҢеӣ жӯӨпјҢеҚідҪҝи§ЈеҶіж–№жЎҲз®ҖжҙҒжҳҺдәҶпјҢеңЁзңҹе®һж•°жҚ®йҮҸдёҠжөӢиҜ•е®ғжҖ»жҳҜжңүж„Ҹд№үзҡ„пјҢе№¶дё”еҰӮжһңжЁЎеһӢжү©еұ•жҖ§дёҚи¶іпјҢеҲҷеҲҮжҚўеҲ°еҢ…жӢ¬`PL/SQL`еңЁеҶ…зҡ„жӣҝд»Јж–№жі•гҖӮеҸҰдёҖж–№йқўпјҢз”ЁдәҺзұ»з”өеӯҗиЎЁж ји®Ўз®—зҡ„е®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸпјҢеҰӮ`Excel`пјҢе№¶йқһи®ҫи®Ўз”ЁдәҺеӨ„зҗҶеӨ§ж•°жҚ®йҮҸгҖӮдҫӢеҰӮпјҢ`Excel
    2016`зҡ„жңҖеӨ§иЎҢж•°жҳҜ 100 дёҮпјҢиҖҢжЁЎеһӢеҸҜд»ҘиҪ»жқҫеӨ„зҗҶиҝҷдёӘйҮҸзә§зҡ„ж•°жҚ®иҖҢдёҚдјҡеҮәзҺ°жҳҺжҳҫзҡ„жҖ§иғҪдёӢйҷҚпјҢжӣҙдёҚз”ЁиҜҙз»“жһңеҸҜд»ҘеңЁжңҚеҠЎеҷЁз«Ҝи®Ўз®—пјҢж— йңҖе°Ҷж•°жҚ®жҸҗеҸ–еҲ°е®ўжҲ·з«ҜгҖӮ


    2. и®Ўз®—дҪҝз”ЁзәҜ SQL ж— жі•е®һзҺ°зҡ„еӨҚжқӮз»“жһңгҖӮ


    жңүж—¶пјҢOracle иҙҰжҲ·з”ЁдәҺжҠҘе‘Ҡзі»з»ҹж—¶еҸӘжңү`select`жқғйҷҗпјҢеӣ жӯӨж— жі•дёәз»“жһңеҲӣе»әиЎЁеҮҪж•°е’Ңзұ»еһӢгҖӮеҪ“з„¶пјҢиҝҷеҸҜд»ҘеңЁеҸҰдёҖдёӘжЁЎејҸдёӯеҲӣе»әе№¶жҺҲдәҲжҠҘе‘Ҡзі»з»ҹз”ЁжҲ·жқғйҷҗпјҢдҪҶжЁЎеһӢеҮҸе°‘дәҶзңҹжӯЈеҝ…иҰҒзҡ„жғ…еҶөгҖӮжЁЎеһӢд№ҹеҸҜиғҪжҳҜдёәзү©еҢ–и§Ҷеӣҫе®һзҺ°еӨҚжқӮйҖ»иҫ‘зҡ„еҘҪж–№жі•вҖ”вҖ”е°Ҫз®ЎжЁЎеһӢи®Ўз®—еҸҜиғҪејҖй”ҖиҫғеӨ§пјҢдҪҶиҝҷеҜ№дәҺз»Ҳз«Ҝз”ЁжҲ·жқҘиҜҙеҸҜиғҪжҳҜеҜҹи§үдёҚеҲ°зҡ„гҖӮ


    йҖҡеёёпјҢдәәд»¬дјҡеңЁе№¶йқһжңҖдҪійҖүйЎ№ж—¶дҪҝз”ЁжЁЎеһӢеӯҗеҸҘпјҡ

    *   з”ҹжҲҗеәҸеҲ—пјҢе…¶дёӯеҪ“еүҚеҖјеҸҜиғҪеҹәдәҺеҲқе§ӢеҖјжҺЁеҜјвҖ”вҖ”дҫӢеҰӮпјҢж—ҘжңҹиҢғеӣҙгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪҝз”Ё`connect by`з”ҹжҲҗдјҡжӣҙеҝ«гҖӮ

    *   еҗ„з§Қеӯ—з¬Ұж•°жҚ®еӨ„зҗҶпјҢд»Һе°Ҷеӯ—з¬ҰдёІжӢҶеҲҶдёәж Үи®°еҲ°и®Ўз®—еӯ—з¬ҰдёІдёӯзҡ„иЎЁиҫҫејҸгҖӮиҰҒжӢҶеҲҶеӯ—з¬ҰдёІпјҢеҸҜд»ҘдҪҝз”Ё`connect by`пјӣеҜ№дәҺжӣҙеӨҚжқӮзҡ„ж“ҚдҪңпјҢжңҖеҘҪе°ҶйҖ»иҫ‘е°ҒиЈ…еңЁ`PL/SQL`з”ҡиҮі
    C еҮҪж•°дёӯгҖӮ

    *   еңЁж•°жҚ®дёӯжҹҘжүҫзү№е®ҡеәҸеҲ—вҖ”вҖ”дҫӢеҰӮпјҢжІЎжңүй—ҙйҡ”зҡ„ж•ҙж•°еӯҗеәҸеҲ—гҖӮжӣҙеҘҪзҡ„е·Ҙе…·жҳҜжЁЎејҸеҢ№й…ҚжҲ–еҲҶжһҗеҮҪж•°гҖӮ

    *   и®Ўз®—жҖ»и®Ўе’Ңе°Ҹи®ЎгҖӮ`group by rollup/grouping sets/cube`е°ұжҳҜдёәжӯӨзӣ®зҡ„и®ҫи®Ўзҡ„гҖӮ

    *   иҪ¬зҪ®гҖӮиҝҷжҳҜ`pivot/unpivot`ж“ҚдҪңз¬Ұзҡ„е·ҘдҪңгҖӮ

    *   жүҖжңүе…¶д»–еҸҜд»ҘйҒҝе…ҚдҪҝз”Ёе®ғзҡ„жғ…еҶөгҖӮвҳә


    ## жҖ§иғҪз®ҖиҰҒеҲҶжһҗ


    жЁЎеһӢеӯҗеҸҘзҡ„е…·дҪ“зү№зӮ№еңЁдәҺпјҢз”ЁдәҺе»әжЁЎзҡ„е®Ңж•ҙи®°еҪ•йӣҶиў«еҠ иҪҪеҲ°еҶ…еӯҳдёӯгҖӮз»“жһңеҲ—зҡ„ж•°йҮҸжҳҜеӣәе®ҡдё”йў„е®ҡд№үзҡ„пјҲзӯүдәҺеҲҶеҢәж•°+з»ҙеәҰж•°+еәҰйҮҸж•°пјүпјҢдҪҶиЎҢж•°жҳҜеҸҳеҢ–зҡ„пјҢеҸҜиғҪеӨҡдәҺгҖҒе°‘дәҺжҲ–зӯүдәҺеҲқе§Ӣи®°еҪ•йӣҶдёӯзҡ„иЎҢж•°гҖӮ


    дёәдәҶеҲҶжһҗеҸҜжү©еұ•жҖ§пјҢи®©жҲ‘д»¬жөӢйҮҸз”ҹжҲҗйҖ’еҪ’еәҸеҲ—зҡ„дёҚеҗҢж–№жі•зҡ„жҖ§иғҪпјҢиҜҘеәҸеҲ—дҪҝз”Ё`sin`еҮҪж•°пјҢжңҖеҲқеңЁе…ідәҺ`connect by`пјҲз¬¬ 5 з« пјүзҡ„з« иҠӮдёӯд»Ӣз»ҚгҖӮиҝҷдәӣж–№жі•еҢ…жӢ¬`PL/SQL`еҮҪж•°гҖҒйҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§Је’ҢжЁЎеһӢгҖӮдҪ еҸҜд»ҘеңЁзӣёеә”зҡ„з« иҠӮдёӯжүҫеҲ°жүҖжңүд»Јз ҒгҖӮ


    еҜ№дәҺ`PL/SQL`еҮҪж•°пјҢжҲ‘д»¬е°Ҷи®Ўз®—иЎҢж•°йҖ’еўһж—¶жүҖжңүе…ғзҙ зҡ„е’Ңпјҡ1e5, 2e5, 3e5, 4e5, 5e5, 1e6гҖӮеҮҪж•°`f`зҡ„йҖ’еҪ’е’ҢйқһйҖ’еҪ’е®һзҺ°жҖ§иғҪеӨ§иҮҙзӣёеҗҢпјҢеӣ жӯӨдҪ еҸҜд»ҘдҪҝз”Ёе…¶дёӯд»»дҪ•дёҖз§ҚиҝӣиЎҢйҮҚзҺ°гҖӮ


    ```

    select sum(value(t)) result from table(f(1e5)) t;

    ```


    зұ»дјјең°пјҢжҲ‘д»¬е°ҶжөӢйҮҸйҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§Је’ҢжЁЎеһӢж–№жі•зҡ„иҖ—ж—¶пјҢд»Ҙд»Јжӣҝ`PL/SQL`еҮҪж•°гҖӮ


    дҪҝз”ЁдәҶиҒҡеҗҲеҮҪж•°жқҘиҺ·еҸ–еҚ•иЎҢз»“жһңе№¶йҒҝе…ҚиҺ·еҸ–пјӣжҲ‘д»¬зҡ„дё»иҰҒзӣ®ж ҮжҳҜз”ҹжҲҗеәҸеҲ—гҖӮдёәдәҶе®Ңж•ҙиө·и§ҒпјҢи®©жҲ‘д»¬д№ҹиҖғиҷ‘дёҖдёӘиҝӯд»ЈжЁЎеһӢпјҢе®ғдёҚз”ҹжҲҗеәҸеҲ—иҖҢжҳҜи®Ўз®—е…ғзҙ д№Ӣе’ҢгҖӮ


    ```

    select cumul

    from dual

    model

    dimension by (0 id)

    measures (1 result, 1 cumul)

    rules iterate (1e5)

    (

    result[0] =  round(100 * sin(result[0] + iteration_number)),

    cumul[0] = cumul[0] + result[0]

    );

    ```


