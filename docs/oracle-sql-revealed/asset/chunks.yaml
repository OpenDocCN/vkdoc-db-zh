    \ 1-29\n    ANSI syntax for lateral views\n    ```\n\nThe following example also\
    \ fails with ORA-01719 on all Oracle versions with ANSI support.\n\n```\n    select\
    \ *\n    from t1\n    left join t2\n    on t1.id = t2.id\n    or t1.id = 1;\n\
    \    ID N         ID N\n    ---------- - ---------- -\n    0 X          0 X\n\
