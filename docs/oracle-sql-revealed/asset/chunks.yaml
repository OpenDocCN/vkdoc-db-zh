    select *

    from t_range

    match_recognize

    (

    order by a

    all rows per match

    pattern((x|{-dummy-})+)

    define

    x as nvl(last(x.b, 1), 0) <= x.a

    ) mr;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

