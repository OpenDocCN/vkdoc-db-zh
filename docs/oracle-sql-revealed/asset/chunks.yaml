- fmt: "However, if we try to check that using query from Listing 2-14, it will be\
    \ extremely slow. This query cannot be transformed to use `HASH JOIN ANTI` twice\
    \ - because of current implementation limitations.\n\n```\nexplain plan for\n\
    select *\nfrom fact_ f\nwhere dim_1_id not in (select id from dim_)\nor dim_2_id\
    \ not in (select id from dim_);\nExplained.\nselect * from table(dbms_xplan.display(format\
    \ => 'basic predicate'));\nPLAN_TABLE_OUTPUT\n\nPlan hash value: 481481104\n\n\
    | Id  | Operation          | Name  |\n\n|   0 | SELECT STATEMENT   |       |\n\
    |*  1 |  FILTER            |       |\n|   2 |   TABLE ACCESS FULL| FACT_ |\n|*\
    \  3 |   TABLE ACCESS FULL| DIM_  |\n|*  4 |   TABLE ACCESS FULL| DIM_  |\n\n\
    Predicate Information (identified by operation id):\n\n1 - filter( NOT EXISTS\
    \ (SELECT 0 FROM \"DIM_\" \"DIM_\" WHERE\nLNNVL(\"ID\":B1)) OR  NOT EXISTS (SELECT\
    \ 0 FROM \"DIM_\" \"DIM_\" WHERE\nLNNVL(\"ID\":B2)))\n3 - filter(LNNVL(\"ID\"\
    :B1))\n4 - filter(LNNVL(\"ID\":B1))\n20 rows selected.\nListing 2-14\nChecking\
    \ existence for dimension IDs. Slow version\n```\n\nIf we rewrite the query manually\
    \ and create an inline view, then it will be fast again, as shown in Listing 2-15.\n\
    \n```\nexplain plan for\nselect *\nfrom (select * from fact_ f where dim_1_id\
    \ not in (select id from dim_))\nwhere dim_2_id not in (select id from dim_);\n\
    Explained.\nselect * from table(dbms_xplan.display(format => 'basic predicate'));\n\
    PLAN_TABLE_OUTPUT\n\nPlan hash value: 1918822958\n\n| Id  | Operation        \
    \        | Name  |\n\n|   0 | SELECT STATEMENT         |       |\n|*  1 |  HASH\
    \ JOIN ANTI NA       |       |\n|*  2 |   HASH JOIN RIGHT ANTI NA|       |\n|\
    \   3 |    TABLE ACCESS FULL     | DIM_  |\n|   4 |    TABLE ACCESS FULL     |\
    \ FACT_ |\n|   5 |   TABLE ACCESS FULL      | DIM_  |\n\nPredicate Information\
    \ (identified by operation id):\n\n1 - access(\"F\".\"DIM_2_ID\"=\"ID\")\n2 -\
    \ access(\"DIM_1_ID\"=\"ID\")\n18 rows selected.\nListing 2-15\nChecking existence\
    \ for dimension IDs. Fast version\n```\n\nYou may have noticed an interesting\
    \ detail about the filter operation вҖ“ it has three child operations. In our case,\
    \ one operation is for the fact table and two operations are for the dimension\
    \ table to check both IDs. The first child operation for the filter is row-source,\
    \ which is filtered and others are row-sources to check filter conditions. Once\
    \ first match is found for the current row then Oracle proceeds to the next one\
    \ from the main row-source.\n\nSpeaking about joins, there are only three join\
    \ methods in Oracle - `MERGE JOIN`, `HASH JOIN`, `NESTED LOOPS` вҖ“ and all of them\
    \ can operate with only two row-sources unlike filter operation.\n\nThe number\
    \ of query transformations keeps increasing from one release to another, and their\
    \ capabilities evolve more and more as well; for example, scalar subquery unnesting\
    \ transformation that can dramatically improve the performance of some queries\
    \ was added in Oracle 11gR2. On the other hand, it will unlikely be possible to\
    \ make the transformation engine so intelligent that we can completely avoid manual\
    \ query rewriting.\n\nBesides query transformation, there are a lot of other conversions\
    \ applied to query during the optimization phase starting from ANSI to native\
    \ translation to column projection. Important details to note:\n\n*   Transformation\
    \ may impact the query plan and query performance, but itвҖҷs not always possible\
    \ to figure out whether transformation was applied or not based on final query\
    \ text. For detailed analysis, you can start with the вҖңQuery Transformations (QT)вҖқ\
    \ section of the optimizer trace.\n*   ItвҖҷs important to distinguish query optimizer\
    \ transformation and other transformations like ANSI to native syntax translation.\
    \ The latter one applies for all queries regardless of whether query optimizer\
    \ transformations are enabled or not. ANSI syntax may appear in the final query\
    \ if original query has:\n    *   `full join`;\n    *   `left/right join partition\
    \ by`.\n*   Another very important CBO feature is automatic generation of additional\
    \ predicates, also referred as transitive closure (Metalink Doc ID 68979.1). Simply\
    \ speaking, if we remove the second or third predicate from a condition like `where\
    \ t1.id = t2.id and t1.id = 1 and t2.id = 1` then it will be generated automatically.\n\
    *   The next transformation to mention is column projection. Projection is one\
    \ out of five relation algebra operations: selection, projection, union, difference,\
    \ join. Great introductional articles about relational algebra written by Iggy\
    \ Fernandez: SQL Sucks [5], Explaining the EXPLAIN PLAN [6]. To demonstrate column\
    \ projection letвҖҷs execute the query below:\n\n```\n    with t_ as (select id,\
    \ id, name from t)\n    select name from t_;\n    ```\n\nIt returned a result\
    \ without any errors because, in fact, itвҖҷs translated to the query below (only\
    \ name column remains after projection is applied):\n\n```\n    SELECT \"T\".\"\
    NAME\" \"NAME\" FROM \"T\" \"T\"\n    ```\n\nOn the other hand, Oracle does not\
    \ allow us to create a view using the factored query above because of obvious\
    \ reasons. Like many other popular RDBMS, Oracle applies heuristics like the following:\n\
    \    *   do a projection вҖңelimination of unnecessary columns from row-sourceвҖқ\
    \ as early as possible;\n    *   do a selection вҖңfiltering out unnecessary rowsвҖқ\
    \ as early as possible. In fact this means that the post-join predicate on the\
    \ inner table will be applied before join. In context of CBO this means вҖңas early\
    \ as possible if it leads to the plan with lower cost.вҖқ\n*   The final query in\
    \ the optimizer trace is only an SQL-like representation of what will be eventually\
    \ executed and may not be semantically equivalent to the original query in all\
    \ cases. In some cases, plans for the original and final query may differ. Also,\
    \ the final query may not return the same result as the original query, for example,\
    \ because there is no special notation for ANTI/SEMI joins and predicates for\
    \ them are displayed simply like equality predicates.\n*   As you see on Figure\
    \ 2-1, transformations happen before plan generation and query hints may become\
    \ unusable after transformations. For example, if inline view has been eliminated\
    \ after view merging and you used its alias in the hint, then the hint is no longer\
    \ valid.\n\n## Summary\n\nQuery transformations allow to provide significant flexibility\
    \ for developers in writing queries, and they make it possible for queries with\
    \ considerably different query texts to have eventually the same query plan and,\
    \ possibly, the same final query text. Thanks to query transformations, itвҖҷs not\
    \ necessary to care about the order of query operations. For example, if you join\
    \ two tables and calculate some aggregates, Oracle will decide what to do first\
    \ вҖ“ `group by` or `join` if that is possible. Also transformations allow us to\
    \ avoid code duplication вҖ“ for instance, or-expansion may expand one query into\
    \ several branches with `union all`, and transitive closure helps to avoid вҖңunnecessaryвҖқ\
    \ predicates.\n\nHowever, the transformation engine is not a вҖңsilver bulletвҖқ and\
    \ developers should follow best practices when writing queries to help optimizer\
    \ make the right decisions and build optimal plans. The transformation engine\
    \ will unlikely ever be so intelligent that manual query rewriting can be completely\
    \ avoided.\n\nIn additional to query transformations, the SQL engine applies a\
    \ lot of other conversions, for example, translation ANSI to native and heuristics\
    \ like column projection or column selection."
