    еүҚж–Үе·ІеӨҡж¬ЎжҸҗеҲ°пјҢеҜ№дәҺи®ёеӨҡд»»еҠЎпјҢдёҺе…¶дҪҝз”ЁжЁЎеһӢеӯҗеҸҘжҲ–йҖ’еҪ’еӯҗжҹҘиҜўеҲҶи§Јзӯүй«ҳзә§ Oracle зү№жҖ§пјҢдёҚеҰӮеңЁ PL/SQL дёӯе®һзҺ°йҖ»иҫ‘пјҢд»ҘиҺ·еҫ—жӣҙеҘҪзҡ„жҖ§иғҪе’ҢеҸҜжү©еұ•жҖ§гҖӮз„¶иҖҢпјҢеҚідҪҝй—®йўҳд»…з”Ёеҹәжң¬зҡ„
    SQL зү№жҖ§е°ұиғҪи§ЈеҶіпјҢPL/SQL еҸҜиғҪд»ҚжҳҜиҺ·еҸ–з»“жһңйӣҶжӣҙеҘҪзҡ„йҖүжӢ©гҖӮйҖҡеёёпјҢеҺҹеӣ жҳҜз”ұдәҺ SQL зҡ„еұҖйҷҗжҖ§жҲ–еҪ“еүҚе®һзҺ°ж–№ејҸпјҢжҲ–жҳҜ SQL жҹҘиҜўзҡ„зү№ж®ҠжҖ§гҖӮSQL жҳҜдёҖз§ҚеЈ°жҳҺжҖ§иҜӯиЁҖпјҢе…¶еңЁ
    Oracle RDBMS дёӯзҡ„е®һзҺ°е№¶йқһејҖжәҗпјӣеӣ жӯӨпјҢеҜ№дәҺеә•еұӮеҸ‘з”ҹзҡ„дәӢжғ…пјҢеҸӘиғҪиҝӣиЎҢдёҖе®ҡзЁӢеәҰзҡ„жҺ§еҲ¶гҖӮд»ҘдёӢе°қиҜ•еҜ№ PL/SQL и§ЈеҶіж–№жЎҲдјҳдәҺеҺҹз”ҹ SQL зҡ„жғ…еҶөиҝӣиЎҢеҲҶзұ»пјӣиҜ·и®°дҪҸпјҢиҝҷз§ҚеҲҶзұ»жҳҜзӣёеҜ№зҡ„пјҢжҹҗдәӣжғ…еҶөеҸҜиғҪеұһдәҺеӨҡдёӘзұ»еҲ«гҖӮ


    ### еҲҶжһҗеҮҪж•°зҡ„зү№ж®ҠжҖ§


    еҲҶжһҗеҠҹиғҪжҳҜжһҒе…¶ејәеӨ§зҡ„зү№жҖ§пјҢе®ғд»¬жҳҫи‘—жү©еұ•дәҶеҸҜдҪҝз”ЁзәҜ SQL й«ҳж•Ҳи§ЈеҶізҡ„д»»еҠЎйӣҶгҖӮеҸҰдёҖж–№йқўпјҢжӯЈеҰӮзӣёеә”з« иҠӮпјҲз¬¬ 3 з« пјүжүҖзӨәпјҢеҲҶжһҗеҠҹиғҪеӯҳеңЁдёҖдәӣеҠҹиғҪдёҠзҡ„йҷҗеҲ¶пјҢд»ҘеҸҠеңЁе®һзҺ°ж–№йқўзҡ„дёҖдәӣзү№ж®ҠжҖ§пјҢиҝҷеҸҜиғҪжҳҜж— жі•иҫҫеҲ°жңҖдјҳжҖ§иғҪзҡ„еҺҹеӣ гҖӮ'
- fmt: '### Fetch Termination


    The core of the first problem in this subsection is the inability to efficiently
    specify in a query that rows should be fetched until some condition is false.
    Analytic functions are just a feature that helps to achieve this with pure SQL,
    but not always in an efficient way.


    LetвҖҷs consider a case when itвҖҷs required to terminate fetching or stop returning
    the rows based on some condition. Listing [11-1](#A455196_1_En_11_Chapter.html#Par6)
    shows a table with information about transactions, and the goal is to return all
    the latest transactions unless the total reaches limit X (or unless N specific
    rows are returned).


    At least three different approaches may be proposed right off the bat:


    *   Using analytic functions;

    *   Implementing logic in table (pipelined) function;

    *   Fetch data and validate termination condition on client side.


    ```

    exec dbms_random.seed(1);

    create table transaction(id int not null, value number not null);

    insert --+ append

    into transaction

    select rownum, trunc(1000 * dbms_random.value + 1) value

    from dual

    connect by rownum <= 3e6;

    create index idx_tran_id on transaction(id);

    exec dbms_stats.gather_table_stats(user, ''transaction'');

    ```


    Listing 11-1

    Transaction table


    Tests are performed on Oracle 12.1.0.2 with


    1.  Enabled runtime execution statistics.


    ```

    alter session set statistics_level = all;

    ```


    2.  Disabled adaptive plans .


    ```

    alter session set "_optimizer_adaptive_plans" = false;

    ```


    Plans were displayed using command


    ```

    select *

    from table(dbms_xplan.display_cursor(format => ''IOSTATS LAST''));

    ```


    `IOSTATS` was used instead of `ALLSTATS` mainly due to formatting purposes вҖ“ so
    that plans can fit the page width. Statistics about memory usage can be displayed
    by using `MEMSTATS` or `ALLSTATS`.


    First of all letвҖҷs consider a bit simplified task when we need to return just
    10 of the latest transactions. The first approach is an inline view with `order
    by` and filter by `rownum`. See Listing [11-2](#A455196_1_En_11_Chapter.html#Par20).


    ```

    select *

    from (select * from transaction order by id desc)

    where rownum <= 10;

    ID      VALUE

    ---------- ----------

    3000000        875

    2999999        890

    2999998        266

    2999997        337

    2999996        570

    2999995        889

    2999994        425

    2999993         64

    2999992        140

    2999991        638

    10 rows selected.

    ```


    Listing 11-2

    Limiting rows with `rownum`


    Query returns the result almost immediately вҖ“ less than in a centisecond .


    ```

    | Id | Operation                     |Name         | Starts | E-Rows | A-Rows
    |   A-Time    | Buffers|

    |  0 | SELECT STATEMENT              |             |      1 |        |     10
    | 00:00:00.01 |      7 |

    |* 1 |  COUNT STOPKEY                |             |      1 |        |     10
    | 00:00:00.01 |      7 |

    |  2 |   VIEW                        |             |      1 |     10 |     10
    | 00:00:00.01 |      7 |

    |  3 |    TABLE ACCESS BY INDEX ROWID| TRANSACTION |      1 |  3000K |     10
    | 00:00:00.01 |      7 |

    |  4 |     INDEX FULL SCAN DESCENDING| IDX_TRAN_ID |      1 |     10 |     10
    | 00:00:00.01 |      4 |

    ```


    This is achieved by reading the index in descending order and accessing the table
    by `rowid` to get the value, but the crucial point is that reading stops after
    getting 10 rows.


    LetвҖҷs now implement the logic using analytic functions. See Listing [11-3](#A455196_1_En_11_Chapter.html#Par25).


    ```

    select t1.id, t1.value

    from (select row_number() over(order by id desc) rn, t0.*

    from transaction t0) t1

    where rn <= 10;

    ```


    Listing 11-3

    Limiting rows with `row_number`


    Even though the `Reads` column is missing in the plan, which means that all data
    was read from memory and not from disk - `Buffers`, it took more than 2 seconds
    to execute (which is multiple times longer than the first approach).


    ```

    | Id | Operation                 | Name        | Starts | E-Rows | A-Rows |   A-Time    |
    Buffers |

    |  0 | SELECT STATEMENT          |             |      1 |        |     10 | 00:00:02.05
    |    6047 |

    |* 1 |  VIEW                     |             |      1 |     10 |     10 | 00:00:02.05
    |    6047 |

    |* 2 |   WINDOW SORT PUSHED RANK |             |      1 |  3000K |     10 | 00:00:02.05
    |    6047 |

    |  3 |    TABLE ACCESS FULL      | TRANSACTION |      1 |  3000K |  3000K | 00:00:00.46
    |    6047 |

    ```


    `WINDOW SORT PUSHED RANK` operation means that ordering is performed until a specified
    number of rows is returned, but input data for this operation is all the rows
    from the table. In other words, this means that the full table is scanned but
    order is guaranteed only for a specified number of rows.


    When using analytic functions we also can take advantage of the fact that data
    in an index is ordered, but in this case we have to use an additional join as
    shown in Listing [11-4](#A455196_1_En_11_Chapter.html#Par30).


    ```

    select t2.*

    from (select --+ cardinality(10) index_desc(t0 idx_tran_id)

    row_number() over(order by id desc) rn, rowid row_id

    from transaction t0) t1

    join transaction t2

    on t1.row_id = t2.rowid

    where t1.rn <= 10;

    ```


    Listing 11-4

    Limiting rows with `row_number` - optimized version


    We explicitly specified an access method in the inline view to avoid a full scan
    and hinted at low cardinality so that Oracle does nested loops. Execution time
    is less than a centisecond вҖ“ similar to the approach with filter by `rownum`.
    An additional join acts as `TABLE ACCESS BY USER ROWID` instead of `TABLE ACCESS
    BY INDEX ROWID` as in the first approach.


    ```

    | Id | Operation                       | Name        | Starts | E-Rows | A-Rows
    |   A-Time    | Buffers |

    |  0 | SELECT STATEMENT                |             |      1 |        |     10
    | 00:00:00.01 |       6 |

    |  1 |  NESTED LOOPS                   |             |      1 |     10 |     10
    | 00:00:00.01 |       6 |

    |* 2 |   VIEW                          |             |      1 |     10 |     10
    | 00:00:00.01 |       4 |

    |* 3 |    WINDOW NOSORT STOPKEY        |             |      1 |     10 |     10
    | 00:00:00.01 |       4 |

    |  4 |     INDEX FULL SCAN DESCENDING  | IDX_TRAN_ID |      1 |  3000K |     11
    | 00:00:00.01 |       4 |

    |  5 |      TABLE ACCESS BY USER ROWID | TRANSACTION |     10 |      1 |     10
    | 00:00:00.01 |       2 |

    ```


    The last thing to mention about a simplified task is that an optimal plan can
    be achieved if a limit is specified using a constant or bind variable. If we use
    a scalar subquery `(select 10 from dual)`, then the plan will look like the one
    below.


    ```

    | Id | Operation                        | Name        | Starts | E-Rows | A-Rows
    |   A-Time    | Buffers |

    |  0 | SELECT STATEMENT                 |             |      1 |        |     10
    | 00:00:03.37 |    6971 |

    |  1 |  NESTED LOOPS                    |             |      1 |     10 |     10
    | 00:00:03.37 |    6971 |

    |* 2 |   VIEW                           |             |      1 |     10 |     10
    | 00:00:03.37 |    6969 |

    |  3 |    WINDOW NOSORT                 |             |      1 |     10 |  3000K
    | 00:00:02.91 |    6969 |

    |  4 |     INDEX FULL SCAN DESCENDING   | IDX_TRAN_ID |      1 |  3000K |  3000K
    | 00:00:01.11 |    6969 |

    |  5 |      FAST DUAL                   |             |      1 |      1 |      1
    | 00:00:00.01 |       0 |

    |  6 |   TABLE ACCESS BY USER ROWID     | TRANSACTION |     10 |      1 |     10
    | 00:00:00.01 |       2 |

    ```


    You may note that operation `WINDOW NOSORT STOPKEY` became `WINDOW NOSORT`, which
    means that the index was fully scanned. So if a limit is calculated using a subquery,
    then you may want to split the query into two and use a bind variable for the
    limit.


    LetвҖҷs proceed to the original task: we need to fetch the latest rows until the
    total amount reaches the limit; let it be 5000.


    Obviously, filter by `rownum` cannot be used in this case. Listing [11-5](#A455196_1_En_11_Chapter.html#Par38)
    shows an analytic approach to limit rows by a cumulative sum.'
