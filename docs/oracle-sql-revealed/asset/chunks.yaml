- fmt: "## Iterative-Like Computations\n\nOracle provides at least two ways to perform\
    \ iterative-like computations in SQL on top of recordset: iterative model and\
    \ recursive subquery factoring. The source data for an iterative model is a single\
    \ recordset and you cannot use any additional data structures like list or stack;\
    \ and, secondly, there may be only one loop counter (for academic interest implementation\
    \ of bubble sort using iterative model was shown in Chapter [10](#A455196_1_En_10_Chapter.html),\
    \ вҖқTuring CompletenessвҖқ). The specifics of recursive subquery factoring are that\
    \ on each iteration you can use data only from the previous iteration even though\
    \ the result set contains data from all the iterations. Briefly speaking, the\
    \ field of application for these features is quite limited, not to mention issues\
    \ with scalability and intensive memory and CPU usage.\n\nYou can find in the\
    \ next chapter some solutions with iterative models or recursive subquery factoring\
    \ and their comparison with PL/SQL approaches. In this chapter, however, we will\
    \ consider a couple of tasks that can be solved in pure SQL without those advanced\
    \ features and their alternatives in PL/SQL.\n\n### When There Is No Effective\
    \ Built-In Access Method\n\nLetвҖҷs assume the goal is to return distinct values\
    \ for a not nullable column with low cardinality.\n\n```sql\ncreate table t_str(str\
    \ varchar2(30) not null, padding varchar2(240));\ninsert into t_str\nselect 'AAA',\
    \ lpad('x', 240, 'x') from dual\nunion all\nselect 'BBB', lpad('x', 240, 'x')\
    \ from dual\nunion all\nselect lpad('C', 30, 'C'), lpad('x', 240, 'x') from dual\n\
    connect by rownum <= 3e6\nunion all\nselect 'DDD', lpad('x', 240, 'x') from dual;\n\
    create index t_str_idx on t_str(str);\nexec dbms_stats.gather_table_stats(user,'t_str');\n\
    ```\n\nOf course, a trivial solution is using a `distinct` keyword.\n\n```sql\n\
    select distinct str from t_str;\nSTR\n------------------------------\nBBB\nAAA\n\
    CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC\nDDD\n```\n\n```\n| Id | Operation            \
    \  | Name      | Starts | E-Rows  | A-Rows  |   A-Time    | Buffers |\n|----|------------------------|-----------|--------|---------|---------|-------------|---------|\n\
    |  0 | SELECT STATEMENT       |           |      1 |         |      4  | 00:00:01.04\
    \ |   17662 |\n|  1 |  HASH UNIQUE           |           |      1 |      4  |\
    \      4  | 00:00:01.04 |   17662 |\n|  2 |   INDEX FAST FULL SCAN | T_STR_IDX\
    \ |      1 |   3000K |   3000K | 00:00:00.53 |   17662 |\n```\n\nExecution time\
    \ is more than 1 second and it required almost 18k logical reads.\n\nListing [11-12](#A455196_1_En_11_Chapter.html#Par94)\
    \ shows how recursive subquery factoring can be used for getting a list of distinct\
    \ values for a column.\n\n```sql\nwith rec(lvl, str) as\n(\n  select 1, min(str)\
    \ from t_str\n  union all\n  select lvl + 1, (select min(str) from t_str where\
    \ str > rec.str)\n  from rec\n  where str is not null\n)\nselect * from rec where\
    \ str is not null;\n```\n\n```\n| Id | Operation                             \
    \     | Name      | Starts | E-Rows | A-Rows |   A-Time    | Buffers |\n|----|--------------------------------------------|-----------|--------|--------|--------|-------------|---------|\n\
    |  0 | SELECT STATEMENT                           |           |      1 |     \
    \   |      4 | 00:00:00.01 |      13 |\n|* 1 |  VIEW                         \
    \             |           |      1 |      2 |      4 | 00:00:00.01 |      13 |\n\
    |  2 |   UNION ALL (RECURSIVE WITH) BREADTH FIRST |           |      1 |     \
    \   |      5 | 00:00:00.01 |      13 |\n|  3 |    SORT AGGREGATE             \
    \             |           |      1 |      1 |      1 | 00:00:00.01 |       3 |\n\
    |  4 |     INDEX FULL SCAN (MIN/MAX)              | T_STR_IDX |      1 |     \
    \ 1 |      1 | 00:00:00.01 |       3 |\n|  5 |    SORT AGGREGATE             \
    \             |           |      4 |      1 |      4 | 00:00:00.01 |      10 |\n\
    |  6 |     FIRST ROW                              |           |      4 |     \
    \ 1 |      3 | 00:00:00.01 |      10 |\n|* 7 |      INDEX RANGE SCAN (MIN/MAX)\
    \            | T_STR_IDX |      4 |      1 |      3 | 00:00:00.01 |      10 |\n\
    |  8 |    RECURSIVE WITH PUMP                     |           |      5 |     \
    \   |      4 | 00:00:00.01 |       0 |\n```\n\nListing 11-12 Using recursive subquery\
    \ factoring to get distinct values for a column\n\nThe execution time dropped\
    \ more than 100 times and the number for logical reads reduced more than 1000\
