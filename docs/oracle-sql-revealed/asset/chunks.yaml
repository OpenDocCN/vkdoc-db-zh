    7 Y              5          6          8

    7 STRT           7          8          8

    9 X              9         10         10

    11 X             11         14         14

    20 Y             15         19         25

    20 STRT          20         25         25

    30 Y             26         29         40

    30 STRT          30         40         40

    9 rows selected.

    Listing 8-3

    Filling data gaps using pattern matching

    ```


    It was already mentioned that in some cases the logic for pattern matching can
    be re-implemented using analytic functions. LetвҖҷs now compare the performance
    between two approaches based on a specific task: find all consecutive combinations
    of 1, 2, and 3 for table that contains digits from 0 to 9.


    ```

    exec dbms_random.seed(1);

    create table digit as

    select rownum id, trunc(dbms_random.value(0, 9 + 1)) value

    from dual

    connect by rownum <= 2e6;

    ```


