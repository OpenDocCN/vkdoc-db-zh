    `PM`: pattern matching

    `PL`: PL/SQL


    ## 11. When PL/SQL Is Better Than Vanilla SQL


    It was already mentioned a few times that for many tasks, instead of using advanced
    Oracle features like a model clause or recursive subquery factoring, you can implement
    the logic in PL/SQL with better performance and scalability. However PL/SQL may
    be a better choice to get a recordset even if the challenge can be addressed with
    basic SQL features only. As a rule, the reason is because of limitations or current
    implementation of SQL or specifics of SQL queries. SQL is declarative language
    and its implementation in Oracle RDBMS is not open source; thus what is happening
    under the hood can be controlled only to some extent. Below is an attempt to categorize
    cases when PL/SQL solution is better than vanilla SQL; please keep in mind that
    this categorization is quite relative and some cases may fall into multiple categories.


    ### Specifics of Analytic Functions


    Analytic functions are extremely powerful features and they significantly extend
    a set of tasks that can be efficiently solved using pure SQL. On the other hand,
    analytic functions have some functional limitations as was shown in the corresponding
    chapter (Chapter 3) as well as some specifics in implementation that may be a
    reason for not achieving the optimal performance.'
