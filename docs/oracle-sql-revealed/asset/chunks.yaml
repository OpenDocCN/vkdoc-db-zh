- fmt: '## Pseudocolumn Generation in Detail


    We already considered how `join`, `connect by`, and `where` clauses work in hierarchical
    queries. When a query contains pseudocolumns itвҖҷs not possible to say that their
    values are generated before or after a specific query clause, but we can state
    the following rules:


    *   `level` is incremented when a row for a new level is generated

    *   `rownum` is incremented when a new row is added to a result set


    Listing [5-9](#A455196_1_En_5_Chapter.html#Par63) demonstrates the above statements,
    based on an example.


    ```

    create table t_two_branches(id, id_parent) as

    (select rownum, rownum - 1 from dual connect by level <= 10

    union all

    select 100 + rownum, 100 + rownum - 1 from dual connect by level <= 10

    union all

    select 0, null from dual

    union all

    select 100, null from dual);

    select rownum rn,

    level lvl,

    replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

    replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

    sys_connect_by_path(id, ''~'') path_id

    from t_two_branches

    where mod(level, 3) = 0

    start with id_parent is null

    connect by prior id = id_parent;

    RN    LVL PATH_RN     PATH_LVL     PATH_ID

    ------ -------- ------- ------------ --------------------------

    1      3 111         123          ~0~1~2

    2      6 111222      123456       ~0~1~2~3~4~5

    3      9 111222333   123456789    ~0~1~2~3~4~5~6~7~8

    4      3 444         123          ~100~101~102

    5      6 444555      123456       ~100~101~102~103~104~105

    6      9 444555666   123456789    ~100~101~102~103~104~105~106~107~108

    6 rows selected.

    Listing 5-9

    Specific of level and rownum pseudocolumns generation

    ```


    For each of the two branches Oracle generated 9 levels and 3 rows: rows 1-3 for
    the first branch and rows 4-6 for the second branch. Columns `path_rn` and `path_lvl`
    help us to understand how values for pseudocolumns were generated. Technically,
    the `where` clause evaluates when a hierarchy is being built, not afterward.


    Also itвҖҷs interesting to point out the difference when a `rownum`/`level` is used
    in a `connect by`.


    ```

    select rownum rn,

    level lvl,

    replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

    replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

    sys_connect_by_path(id, ''~'') path_id

    from t_two_branches

    start with id_parent is null

    connect by prior id = id_parent

    and rownum <= 2;

    RN        LVL PATH_RN         PATH_LVL        PATH_ID

    ---------- ---------- --------------- --------------- ---------

    1          1 1               1               ~0

    2          2 12              12              ~0~1

    3          1 3               1               ~100

    select rownum rn,

    level lvl,

    replace(sys_connect_by_path(rownum, ''~''), ''~'') as path_rn,

    replace(sys_connect_by_path(level, ''~''), ''~'') as path_lvl,

    sys_connect_by_path(id, ''~'') path_id

    from t_two_branches

    start with id_parent is null

    connect by prior id = id_parent

    and level <= 2;

    RN        LVL PATH_RN         PATH_LVL        PATH_ID

    ---------- ---------- --------------- -------- ----------------

    1        1 1                  1              ~0

    2        2 12                12              ~0~1

    3        1 3                  1              ~100

    4        2 34                12              ~100~101

    Listing 5-10

    Difference between using level and rownum in "connect by" condition

    ```


    In the first case Oracle returns two rows for the first branch and a root row
    for the second branch. Although the `connect by` condition is false for it, `start
    with` is true; thus all the roots are present in the result. In the second case
    Oracle simply traverses all the branches up to a specified level, and obviously
    the `rownum` monotonically increases.


    ## Summary


    The `connect by` clause is one of OracleвҖҷs specific features and can be used for
    traversing parent-child hierarchies or generating sequences without parent-child
    dependencies. In general, this feature allows traversing any directed graphs and
    a `nocycle` keyword can be used to handle cycles.


    # 6. Recursive Subquery Factoring


    A subquery factoring clause (sometimes also referred to as a `with` clause or
    CTE вҖ“ common table expression) was introduced in Oracle 9.2. At that time it did
    not allow us to define recursive subqueries and was mainly used to decompose the
    logic into named queries вҖ“ factor out subqueries and reference them by names in
    the main query. CBO can decide whether to materialize results of factored out
    subqueries or plug them in as inline views. In the former case it can improve
    performance if the named query is referenced multiple times in the main query,
    while in the latter case it may have a negative impact on the performance because
    the transformation engine doesnвҖҷt treat named queries in the same way as inline
    views. For example, on older versions Oracle could have merged an inline view
    but not the named query with exactly the same text.


    Starting with Oracle 11.2, the subquery factoring clause allows us to execute
    a query recursively if a subquery references its own name, which is presented
    schematically in Listing [6-1](#A455196_1_En_6_Chapter.html#Par3).


    ```

    with rec as

    (

    anchor_query_text - anchor member

    union all

    recursive_query_text вҖ“ recursive member referencing rec

    )

    select *

    from rec

    Listing 6-1

    Recursive subquery factoring

    ```


    The following algorithm is used for execution:


    1.  Run anchor member to get base result set `Set[0]`.

    2.  Execute recursive member with result set `Set[i-1]` from previous iteration.

    3.  Repeat step 2 until empty result set is returned.

    4.  Return final result set, which is the `union all` of `Set[0] вҖҰ Set[n]`.


    The query in Listing [6-2](#A455196_1_En_6_Chapter.html#Par10) traverses the trees
    from the `tree` table introduced in the previous chapter (Listing [5-1](#A455196_1_En_5_Chapter.html#Par3)).
    You may notice that the order of the result differs from the `connect by` approach.


    ```

    with rec(lvl, id, path) as

    (

    select 1 lvl, id, cast(''->'' || id as varchar2(4000))

    from tree where id_parent in (1, 10)

    union all

    select r.lvl + 1, t.id, r.path || ''->'' || t.id

    from tree t

    join rec r on t.id_parent = r.id

    )

    select lvl,

    rpad('' '', (lvl - 1) * 3, '' '') || id as id,

    path

    from rec;

    LVL ID         PATH

    ---------- ---------- ----------

    1 2          ->2

    1 3          ->3

    1 11         ->11

    2    4       ->3->4

    2    12      ->11->12

    2    13      ->11->13

    3       5    ->3->4->5

    Listing 6-2

    Building hierarchies using recursive subquery factoring

    ```


    To return the result in the same order as `connect by` does, you must specify
    `search depth first` вҖ“ in this case all the descendants for the node will be returned
    before the other nodes on its level вҖ“ see Listing [6-3](#A455196_1_En_6_Chapter.html#Par12).
    Default ordering is `search breadth first` so all nodes from previous levels are
    returned before nodes on the current level. As it will be shown in section вҖңTraversing
    Hierarchies,вҖқ order impacts only how results are returned, not the way of traversing
    a hierarchy.'
