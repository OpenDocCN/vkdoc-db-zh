    ## з”ҹжҲҗйҖ’еҪ’еәҸеҲ—


    Listing 6-4 еұ•зӨәдәҶеҰӮдҪ•дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈжқҘз”ҹжҲҗдёҠдёҖз« дёӯзҡ„йҖ’еҪ’еәҸеҲ—гҖӮеңЁз¬¬дёҖз§Қжғ…еҶөдёӢпјҢеҪ“еүҚеҖјд»…дҫқиө–дәҺеүҚдёҖдёӘеҖјпјҢиҖҢеңЁз¬¬дәҢз§Қжғ…еҶөдёӢпјҢе®ғдҫқиө–дәҺеүҚдёҖдёӘеҖје’ҢеҶҚеүҚдёҖдёӘеҖјгҖӮйҖ’еҪ’еӯҗжҹҘиҜўеӣ ејҸеҲҶи§ЈеҸӘе…Ғи®ёеј•з”ЁеүҚдёҖж¬Ўиҝӯд»Јзҡ„еҖјпјҢеӣ жӯӨдёәдәҶиғҪеӨҹдҪҝз”Ё
    `i-2` ж¬Ўиҝӯд»Јзҡ„еҖјпјҢжҲ‘д»¬еј•е…ҘдәҶдёҖдёӘиҫ…еҠ©еҲ—гҖӮ


    ```

    with t(id, result) as

    (

    select 0 id, 1 result from dual

    union all

    select t.id + 1, round(100 * sin(t.result + t.id))

    from t

    where t.id < 20

