    So cross joins generate three rows for each number to extract the prefix of the
    corresponding length, and after that we join with phone codes and take the longest
    prefix for each number. We may note that if join was successful for a code with
    6 digits, then there is no reason to join with shorter codes for the current number.
    Ideally it would be nice to join with an ordered set until the first match but
    this is not possible in SQL. On the other hand, we can avoid any joins by using
    the PL/SQL function and associative array for look-up.


    ```

