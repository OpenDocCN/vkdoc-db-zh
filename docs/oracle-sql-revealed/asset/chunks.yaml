    `Iteration_number` is a function that returns an integer representing the completed
    iteration through the model rules starting with 0. The maximum possible iteration
    number in the above example is limited with 100 (this can be specified only using
    a constant, not an expression); however, there is termination condition `abs(x[0]-previous(x[0]))
    < 1e-2` that means the absolute difference between root on current iteration and
    on the previous iteration should be less than 0.01. So computation stopped on
    the 6th step and the result is the same as the one calculated using the subquery
    factoring clause - `1.4140625`. The `previous` function is used to refer the value
    on the previous iteration.


    There is no way to figure out whether a model is iterative or not based on a query
    plan. Query plan operations are the same as for non-iterative models. Moreover,
    a stats column in the plan does not reflect the number of iterations with enabled
    runtime execution statistics. A query plan for Listing 7-8 will be the following.


