  raw: '`after match skip past last row` means that whenever a match is completed,
    a new search is restarted from the row right after the last row in the match.
    This behavior may be changed so that a new search starts from some row at a completed
    match; thus rows may belong to more than one match. New search cannot start from
    the same row as the previous one; otherwise Oracle would throw an exception `ORA-62517:
    Next match starts at the same point the last match started`. In the edge case,
    a new search can start from the second row of the current match.


    The same matched groups and classifiers can be easily calculated using analytic
    functions as shown in Listing [8-1](#A455196_1_En_8_Chapter.html#Par23).


    ```

    select ts,

    amount,

    count(decode(cls, ''STRT'', 1)) over(order by ts) match,

    cls

    from (select ts,

    amount,

    case

