    ## еёҰеҒҸз§»зҡ„зҷҫеҲҶдҪҚж•°


    зҺ°еңЁжҲ‘д»¬жқҘзңӢдёҖдәӣж¶үеҸҠеҲҶжһҗеҮҪж•°зҡ„жөӢйӘҢйўҳгҖӮ


    зӣ®ж Үеҗ¬иө·жқҘеҫҲз®ҖеҚ•пјҡеҜ№дәҺжҜҸдёҖиЎҢпјҢи®Ўз®—дёҖдёӘеӣәе®ҡеҖјзҡ„зҷҫеҲҶдҪҚж•°пјҢеҗҢж—¶иҖғиҷ‘д»ҺеҪ“еүҚиЎҢејҖе§ӢеҲ°еҗҺз»ӯ `n` иЎҢзҡ„иЎҢгҖӮ


    е…ідәҺеҰӮдҪ•и®Ўз®—зҷҫеҲҶдҪҚж•°зҡ„иҜҰз»Ҷи§ЈйҮҠеҸҜд»ҘеңЁ Oracle ж–ҮжЎЈдёӯе…ідәҺ `percentile_cont` еҮҪж•°зҡ„йғЁеҲҶжүҫеҲ°пјҲдҪ д№ҹеҸҜд»ҘдҪҝз”Ё Excel еҮҪж•° - `PERCENTILE`пјүгҖӮ


    еҪ“ `x = 0.3` дё” `n = 4` ж—¶пјҢз»“жһңеҰӮдёӢпјҡ


    | жҺ’еәҸ | еҖј | зҷҫеҲҶдҪҚж•° |

    | --- | --- | --- |

    | 1 | 10 | 64 |

    | 2 | 333 | 95.5 |

    | 3 | 100 | 82 |

    | 4 | 55 | 338.5 |

    | 5 | 1000 | 1000 |

    '
- fmt: '### Solution


    ItвҖҷs not possible to specify a windowing clause when using `percentile_cont` as
    an analytic function so itвҖҷs applied to the entire partition. Given that we need
    to calculate percentile for a specific subset of rows starting with the current
    row, we can get the required subset using a self join and use an aggregate version
    of `percentile_cont`. See Listing [12-9](#A455196_1_En_12_Chapter.html#Par56).


    ```sql

    create table flow(ord, value) as

    select 1, 10 from dual

    union all select 2, 333 from dual

    union all select 3, 100 from dual

    union all select 4, 55 from dual

    union all select 5, 1000 from dual;

    select t1.*, percentile_cont(0.3) within group(order by t2.value) pct

    from flow t1

    join flow t2 on t2.ord between t1.ord and t1.ord + 4

    group by t1.ord, t1.value;

    ```


    ```

    ORD      VALUE        PCT

    ---------- ----------

    1         10         64

    2        333       95.5

    3        100         82

    4         55      338.5

    5       1000       1000

    ```


    Listing 12-9

    Calculating percentile with shift using self join and `percentile_cont`


    We can get the same without `percentile_cont` if we implement calculations described
    in the documentation for that function. See Listing [12-10](#A455196_1_En_12_Chapter.html#Par58).


    ```sql

    select tt.*,

    decode(frn, crn, frn_value,

    (crn - rn) * frn_value + (rn - frn) * crn_value) percentile

    from (select t.ord,

    t.value,

    t.rn,

    t.frn,

    t.crn,

    max(decode(rnum, frn, v)) frn_value,

    max(decode(rnum, crn, v)) crn_value

    from (select t1.*,

    t2.value v,

    row_number() over(partition by t1.ord order by t2.value) rnum,

    1 + 0.3 * (count(*) over(partition by t1.ord) - 1) rn,

    floor(1 + 0.3 * (count(*) over(partition by t1.ord) - 1)) frn,

    ceil(1 + 0.3 * (count(*) over(partition by t1.ord) - 1)) crn

    from flow t1

    join flow t2

    on t2.ord between t1.ord and t1.ord + 4) t

    group by t.ord, t.value, t.rn, t.frn, t.crn) tt

    order by tt.ord;

    ```


    ```

    ORD  VALUE   RN  FRN  CRN  FRN_VALUE  CRN_VALUE PERCENTILE

    ------- ------ ---- ---- ---- ---------- ----------

    1     10  2.2    2    3          55        100         64

    2    333  1.9    1    2          55        100       95.5

    3    100  1.6    1    2          55        100         82

    4     55  1.3    1    2          55       1000      338.5

    5   1000    1    1    1        1000       1000       1000

    ```


    Listing 12-10

    Calculating percentile with shift using self join and analytic functions


    So we calculate `frn` and `crn` indexes for each subset, derive corresponding
    values, and perform linear interpolation when necessary. But do we really need
    self join?


    LetвҖҷs consider the solution when values are ordered in a source table. The result
    of the Listing [12-11](#A455196_1_En_12_Chapter.html#Par61) differs from the two
    previous queries because values are ordered by `ord`.


    ```sql

    select ttt.*,

    decode(frn, crn, frn_value, (crn - rn) * frn_value + (rn - frn) * crn_value) percentile

    from (select tt.*,

    nth_value(value, ord + frn - 1)

    over(order by ord range between unbounded preceding and unbounded following) frn_v,

    nth_value(value, ord + crn - 1)

    over(order by ord range between unbounded preceding and unbounded following) crn_v,

    last_value(value)

    over(order by ord range between frn - 1 following and frn - 1 following) frn_value,

    last_value(value)

    over(order by ord range between crn - 1 following and crn - 1 following) crn_value

    from (select t.*, floor(rn) frn, ceil(rn) crn

    from (select t0.*,

    1 +

    0.3 * (count(*)

    over(order by ord range between current row and 4 following) - 1) rn

    from flow t0) t) tt) ttt;

    ```


    ```

    ORD  VALUE   RN   FRN   CRN   FRN_V  CRN_V  FRN_VALUE  CRN_VALUE PERCENTILE

    ----- ------ ---- ----- ----- ------- ------ ---------- ----------

    1     10  2,2     2     3      55    100         55        100         64

    2     55  1,9     1     2      55    100         55        100       95,5

    3    100  1,6     1     2      55    100        100        333      239,8

    4    333  1,3     1     2      55    100        333       1000      533,1

    5   1000    1     1     1      55    100       1000       1000       1000

    ```


    Listing 12-11

    Calculating percentile with shift using analytic functions only


    Corresponding values for `crn` and `frn` indexes for each row have been derived
    in two completely different ways вҖ“ `nth_value`/`last_value`. Moreover, the function
    `nth_value` (`crn_v` and `frn_v` columns) returns an incorrect result for Oracle
    11g if its second parameter is not a constant (this bug has been fixed in 12c).


    We can run a query from Listing [12-9](#A455196_1_En_12_Chapter.html#Par56) and
    get the same result, but, as it was already mentioned, this approach works only
    if the value ordered by `ord`. If that is not true, then calculating indexes `crn`
    and `frn` is not a problem at all, but deriving correspondent values is not possible
    with analytic functions вҖ“ for each row we need to order its own subset of values
    (this logic is implemented in Listing [12-10](#A455196_1_En_12_Chapter.html#Par58)
    as `row_number() over(partition by t1.ord order by t2.value) rnum`).


    ## N Consequent 1s


    For the table below the goal is to find the number of sequences with 10 consequent
    1s ordered by `id`. If there is, say, 11 consequent 11s, this means two sequences:
    from the 1st to 10th and from the 2nd to 11th row.


    ```sql

    exec dbms_random.seed(1);

    create table t_sign as

    select rownum id,

    case when trunc(dbms_random.value(1, 10 + 1)) > 3

    then 1

    else 0

    end sign

    from dual

    connect by rownum <= 1e6;

    ```


    ### Solution


    There are multiple possible approaches to a solution:


    *   A few layers of analytic functions

    *   Analytic function with windowing clause

    *   Model clause

    *   Pattern matching


    Below you can see the code along with the timings. The following statements have
    been executed to avoid temporary tablespace usage and ensure that there is enough
    memory for work areas.


    ```sql

    alter session set workarea_size_policy = manual;

    alter session set sort_area_size = 2147483647;

    ```


    Results are the following:


    ```sql

    select count(*) cnt

    from (select t.*, sum(sign) over(partition by g order by id) s

    from (select id, sign, sum(x) over(order by id) g

    from (select t0.*,

    decode(nvl(lag(sign) over(order by id), -1),

    sign,

    0,

    1) x

    from t_sign t0)

    where sign  0) t)

    where s >= 10;

    ```


