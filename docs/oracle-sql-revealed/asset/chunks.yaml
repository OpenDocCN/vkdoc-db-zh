    all`/`intersect`/`minus`вҖ”вҖ”иҝӣиЎҢз»„еҗҲпјүгҖӮиҝһжҺҘеҸҜд»ҘйҖҡиҝҮдҪҝз”Ё`join`е…ій”®еӯ—жҳҫејҸжҢҮе®ҡпјҢжҲ–дҪҝз”Ё Oracle еҺҹз”ҹиҜӯжі•жҲ–еӯҗжҹҘиҜўйҡҗејҸжҢҮе®ҡгҖӮпјҲ`ANTI`пјү`SEMI`иҝһжҺҘеҸҜд»ҘйҖҡиҝҮдҪҝз”Ё`(not)
    in/exists`жқЎд»¶жқҘжҢҮе®ҡгҖӮ


    зӣёеҗҢзҡ„йҖ»иҫ‘еҸҜд»Ҙз”ЁжҲӘз„¶дёҚеҗҢзҡ„ж–№ејҸжқҘе®һзҺ°пјҢдҪҶеҜ№дәҺдёҚеҗҢдҪҶиҜӯд№үзӯүж•Ҳзҡ„жҹҘиҜўпјҢе№¶дёҚжҖ»иғҪиҺ·еҫ—зӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’гҖӮеңЁжҹҘиҜўжү§иЎҢжңҹй—ҙпјҢе®ғдјҡиў«иҪ¬жҚўдёәеҺҹз”ҹиҜӯжі•е№¶еә”з”Ёеҗ„з§ҚиҪ¬жҚўвҖ”вҖ”йўқеӨ–зҡ„з»ҶиҠӮе°ҶеңЁдёӢдёҖз« дёӯи§ЈйҮҠгҖӮ


    и°ҲеҲ°`ANSI`иҜӯжі•дёҺеҺҹз”ҹиҜӯжі•пјҢеҖјеҫ—дёҖжҸҗзҡ„жҳҜ`ANSI`жҸҗдҫӣдәҶжӣҙеҘҪзҡ„еҸҜиҜ»жҖ§е’Ңжё…жҷ°еәҰпјӣз„¶иҖҢпјҢеҺҹз”ҹиҜӯжі•е…Ғи®ёжӣҙеҘҪең°жҺ§еҲ¶жү§иЎҢи®ЎеҲ’гҖӮдёӨз§Қзұ»еһӢзҡ„`ANSI`иҝһжҺҘвҖ”вҖ”е…ЁиҝһжҺҘе’Ң`outer
    partition by`вҖ”вҖ”ж— жі•з”ЁеҺҹз”ҹиҜӯжі•иЎЁиҫҫпјҢеӣ жӯӨе®ғд»¬дёҺ`ANSI`зӯүж•ҲйЎ№е…·жңүзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’гҖӮ


    `ANSI`иҜӯжі•жҜ”еҺҹз”ҹиҜӯжі•еј•е…Ҙеҫ—жҷҡеҫ—еӨҡпјҢе№¶дё”жңҖеҲқжңүеӨ§йҮҸзҡ„й”ҷиҜҜгҖӮз„¶иҖҢпјҢжӯЈеҰӮеңЁвҖңйӣҶеҗҲеҸ–ж¶ҲеөҢеҘ—вҖқдёҖиҠӮдёӯжүҖзӨәпјҢеҚідҪҝеңЁ`Oracle 12c`дёӯд»Қз„¶еӯҳеңЁдёҖдәӣй”ҷиҜҜпјҢе№¶дё”еҸҜиғҪеҮәзҺ°еңЁ`ANSI`е’ҢеҺҹз”ҹиҜӯжі•дёӯгҖӮ


    ## 2. жҹҘиҜўиҪ¬жҚў


    зӣёеҗҢзҡ„йҖ»иҫ‘еҸҜд»ҘдҪҝз”Ёеҗ„з§ҚдҪҶиҜӯд№үзӯүж•Ҳзҡ„жҹҘиҜўжқҘе®һзҺ°пјҢиҝҷдәӣжҹҘиҜўзңӢиө·жқҘе®Ңе…ЁдёҚеҗҢпјҢдҪҶе…·жңүзӣёеҗҢзҡ„жү§иЎҢи®ЎеҲ’е’ҢжҖ§иғҪгҖӮиҝҷжҳҜдҪңдёәжҹҘиҜўиҪ¬жҚўзҡ„з»“жһңе®һзҺ°зҡ„вҖ”вҖ”еҺҹе§ӢжҹҘиҜўиў«иҪ¬жҚўжҲҗзӣёеҗҢзҡ„жңҖз»ҲжҹҘиҜўгҖӮ


    дҫӢеҰӮпјҢеҲ—иЎЁ [2-1] дёӯзҡ„жҹҘиҜўе…·жңүзӣёеҗҢзҡ„жҖ§иғҪе’Ңжү§иЎҢи®ЎеҲ’гҖӮжңҖеҗҺдёҖдёӘжҹҘиҜўжңүеҫ®е°Ҹзҡ„е·®ејӮвҖ”вҖ”иҝһжҺҘж–№жі•жҳҜ`HASH JOIN ANTI NA`пјҢиҖҢеҜ№дәҺжүҖжңүе…¶д»–жҹҘиҜўеҲҷжҳҜ`HASH
    JOIN ANTI`пјҢеӣ жӯӨеҰӮжһң`t2.id`еҢ…еҗ«з©әеҖјпјҢжңҖеҗҺдёҖдёӘжҹҘиҜўзҡ„з»“жһңйӣҶе°Ҷдёәз©әгҖӮ


    ```sql

    select t1.* from t1 left join t2 on t1.id = t2.id where t2.id is null;

    select t1.* from t1 where not exists (select t2.id from t2 where t1.id = t2.id);

    select t1.* from t1, t2 where t1.id = t2.id(+) and t2.id is null;

    select t1.* from t1 where t1.id not in (select t2.id from t2);

    ```

    **еҲ—иЎЁ 2-1**

    е®һзҺ°`ANTI`иҝһжҺҘзҡ„дёҚеҗҢж–№ејҸ


    иҰҒжЈҖжҹҘеә”з”Ёзҡ„иҪ¬жҚўе’ҢжңҖз»ҲжҹҘиҜўпјҢйңҖиҰҒеңЁжү§иЎҢиҜӯеҸҘд№ӢеүҚи®ҫзҪ®дәӢд»¶`10053`жҲ–еҗҜз”Ё`SQL`дјҳеҢ–еҷЁи·ҹиёӘпјҲиҝҷдәӣе‘Ҫд»Өзҡ„иҜҰз»ҶжҸҸиҝ°и¶…еҮәдәҶжң¬д№Ұзҡ„иҢғеӣҙпјҢжӣҙеӨҡдҝЎжҒҜеҸҜд»ҘеңЁ[1]дёӯжүҫеҲ°пјүгҖӮ


    ```sql

    alter session set events ''trace[rdbms.SQL_Optimizer.*]'';

    alter session set events ''10053 trace name context forever, level 1'';

    ```

    **еҲ—иЎЁ 2-2**

    дёәиҪ¬жҚўеҗҜз”Ёи·ҹиёӘ


    жңҖз»ҲжҹҘиҜўж–Үжң¬е°ҶеңЁи·ҹиёӘж–Үд»¶зҡ„вҖңжңҖз»ҲиҪ¬жҚўеҗҺжҹҘиҜўпјҡ******* UNPARSED QUERY IS *******вҖқйғЁеҲҶдёӯжүҫеҲ°гҖӮеҜ№дәҺдёҠйқўжүҖжңүзҡ„жҹҘиҜўпјҢе®ғе°ҶжҳҜе®Ңе…ЁзӣёеҗҢзҡ„пјҲиҜӯеҸҘдёӯзҡ„жЁЎејҸеҗҚз§°е·Іиў«жүӢеҠЁз§»йҷӨпјүпјҢеҰӮеҲ—иЎЁ
    [2-3] жүҖзӨәпјҡ


    ```sql

    SELECT "T1"."ID" "ID","T1"."NAME" "NAME" FROM "T2", "T1" WHERE "T1"."ID"="T2"."ID"

    ```

    **еҲ—иЎЁ 2-3**

    `ANTI`иҝһжҺҘзҡ„иҪ¬жҚўеҗҺжҹҘиҜў


    еҰӮжһңдҪ жү§иЎҢиҝҷдёӘжҹҘиҜўпјҢе®ғдёҚдјҡиҝ”еӣһйў„жңҹзҡ„з»“жһңгҖӮиҝҷжҳҜеӣ дёәеңЁи·ҹиёӘж–Үд»¶дёӯжІЎжңү`ANTI`иҝһжҺҘзҡ„зү№ж®ҠиЎЁзӨәжі•вҖ”вҖ”еҚідҪҝе®ғеңЁе…ізі»д»Јж•°дёӯеӯҳеңЁгҖӮ`ANTI`пјҲжҲ–`SEMI`пјүиҝһжҺҘе№¶дёҚжҳҜе”ҜдёҖдёҖз§ҚжңҖз»ҲжҹҘиҜўзҡ„жҹҘиҜўи®ЎеҲ’дёҺеҺҹе§ӢжҹҘиҜўзҡ„жҹҘиҜўи®ЎеҲ’дёҚеҢ№й…Қзҡ„жғ…еҶөгҖӮиҝҳжңүи®ёеӨҡе…¶д»–зҡ„дҫӢеӯҗпјҢе…¶дёӯдёҖдёӘе°ҶеңЁз¬¬
    5 з« вҖңеҲҶеұӮжҹҘиҜўпјҡconnect byвҖқдёӯеұ•зӨәпјҢз”ЁдәҺи§ЈйҮҠ`connect by + join + where`зҡ„е·ҘдҪңеҺҹзҗҶгҖӮ


    иҰҒжЈҖжҹҘиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўпјҢдҪ иҝҳеҸҜд»ҘдҪҝз”Ё`Oracle 12c`дёӯж·»еҠ зҡ„еӯҳеӮЁиҝҮзЁӢ`dbms_utility.expand_sql_text`пјҲд»Һ`Oracle
    11.2.0.3`ејҖе§ӢпјҢжңүдёҖдёӘжңӘе…¬ејҖзҡ„`dbms_sql2.expand_sql_text`з”ЁдәҺзӣёеҗҢзӣ®зҡ„пјүпјӣдҪҶжҳҜпјҢе®ғзҡ„иҫ“еҮәеҸҜиғҪдёҺжҲ‘д»¬еңЁи·ҹиёӘж–Үд»¶дёӯзңӢеҲ°зҡ„дёҚеҗҢпјҢеӣ жӯӨжҲ‘е»әи®®дҪҝз”Ёи·ҹиёӘж–Үд»¶дҪңдёәжӣҙеҸҜйқ зҡ„жқҘжәҗгҖӮ


    иҪ¬жҚўеј•ж“ҺжҳҜжҹҘиҜўдјҳеҢ–еҷЁзҡ„дёҖйғЁеҲҶпјҢдјҳеҢ–еҷЁзҡ„жҖ»дҪ“жһ¶жһ„еҰӮеӣҫ [2-1] жүҖзӨәгҖӮе®ғз”ұдёүдёӘдё»иҰҒз»„д»¶з»„жҲҗпјҡиҪ¬жҚўеҷЁгҖҒиҜ„дј°еҷЁе’Ңи®ЎеҲ’з”ҹжҲҗеҷЁгҖӮ


