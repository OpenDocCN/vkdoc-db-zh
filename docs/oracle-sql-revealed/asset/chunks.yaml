    LetвҖҷs proceed to heuristic transformations and consider view merging. To reproduce
    it in Oracle 12c, it may be necessary to disable adaptive plans using the statement
    вҖң`alter session set optimizer_adaptive_reporting_only = true;`вҖқ.


    ```

