    create table t3 as

    select rownum - 1 id, mod(rownum, 2) sign from dual connect by level <= 3;

    1)

    select *

    from t3

    left join t1

    on t1.id = t3.id

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1          0 X

    1          0          1 A

    2          1

    2)

    select *

    from t3

    left join t1

    on t1.id = t3.id

    and t1.id = 1

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1

    1          0          1 A

    2          1

    3)

    select *

    from t3

    left join t1

    on t1.id = t3.id

    where t1.id = 1

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    1          0          1 A

    4)

    select *

    from t3, t1

    where t1.id(+) = t3.id

    and t1.id(+) = 1

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1

    1          0          1 A

    2          1

    5)

    select *

    from t3, t1

    where t1.id(+) = t3.id

    and t1.id = 1

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    1          0          1 A

    Listing 1-19

    Pre-join and post-join predicates

    ```


    The first query simply demonstrates the left outer equi join. Predicate вҖң`t1.id
    = 1`вҖқ in the third and fifth queries is post-join while a similar predicate in
    the second and fourth queries is pre-join. In the fourth query we use (+) to mark
    the predicate as pre-join while in the second case itвҖҷs pre-join because itвҖҷs
    part of the outer join clause.


    The concept of pre/post predicates makes sense only in case of outer joins. The
    mandatory requirement for an outer join is to have a predicate that contains columns
    from both tables and (+) near one of those columns.


    LetвҖҷs consider the following two queries.


    ```

    select *

    from t3, t1

    where 0 = 0

    and t1.id(+) > 1

    order by t3.id;

    no rows selected

    select *

    from t3, t1

    where nvl2(t3.id, 0, 0) = nvl2(t1.id(+), 0, 0)

    and t1.id(+) > 1

    order by t3.id;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1

    1          0

    2          1

    Listing 1-20

    Outer joins and presence of (+)

    ```


    The first query returned no rows because it was not specified that tables are
    an outer join. However, in the second query itвҖҷs explicitly specified that t1
    is the left outer table by using a predicate that always evaluates to TRUE.


    If some columns from the table are marked with (+) while others are not, then
    Oracle may apply transformation вҖңouter to inner join conversionвҖқ (more details
    about query transformations can be found in the next chapter).


    ```

    select * from t1 left join t2 on t1.id = t2.id where t1.name = t2.name;

    select * from t1, t2 where t1.id = t2.id(+) and t1.name = t2.name;

    Listing 1-21

    Outer joins converted into inner ones

    ```


    Using the outer join syntax (whether itвҖҷs ANSI or Oracle native) does not makes
    sense in such cases and it may be very misleading so it should always be avoided.


    Sometimes it may be a bit challenging to specify that the predicate is pre-join
    using Oracle native syntax. If a pre-join predicate contains either both tables
    or the outer table, itвҖҷs quite straightforward to specify it as was shown in Listing
    [1-19](#A455196_1_En_1_Chapter.html#Par57), the fourth case. However, if the pre-join
    predicate contains only an inner table then we need to use a column from the outer
    table as well to define pre-join nature of the predicate.


    ```

    select *

    from t3

    left join t1

    on t3.id = t1.id

    and t3.sign = 1

    order by 1;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1          0 X

    1          0

    2          1

    Listing 1-22

    Pre-join predicates on inner table in ANSI syntax

    ```


    So to indicate that a predicate on an inner table is pre-join, we can use, for
    example, a trick with rowid of the outer table.


    ```

    select *

    from t3, t1

    where t3.id = t1.id(+)

    and nvl2(t1.rowid(+), t3.sign, null) = 1

    order by 1;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1          0 X

    1          0

    2          1

    Listing 1-23

    Pre-join predicate on inner table and trick with rowid

    ```


    Another approach is to use a case expression (more details about this approach
    can be found in the next sectionВ вҖ“ вҖңLimitation of the Oracle Native SyntaxвҖқ),
    which can be easily expressed with decode for equi conditions.


    ```

    select *

    from t3, t1

    where case when t3.sign = 1 then t3.id end = t1.id(+)

    order by 1;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1          0 X

    1          0

    2          1

    select *

    from t3, t1

    where decode(t3.sign, 1, t3.id) = t1.id(+)

    order by 1;

    ID       SIGN         ID N

    ---------- ---------- ---------- -

    0          1          0 X

    1          0

    2          1

    Listing 1-24

    Pre-join predicate on inner table and approach with case (decode) expression

    ```


    The left part of the case expression evaluates to t3.id only if the condition
    вҖң`t3.sign = 1`вҖқ is met and right part of the expression indicates that tables
    are outer joined. Unlike trick with rowid, in this case both predicates from the
    original query are combined into a single predicate.


    ## ANSI vs. Oracle Native Syntax


    Both ANSI and native syntax have pros and cons. Some consider ANSI syntax as syntactic
    sugar, because it improves readability, but eventually queries are transformed
    into native syntax by an SQL engine. However, there are two exceptions: full join
    and outer join partition by. This means itвҖҷs not possible to achieve the same
    execution plan by using Oracle native syntax. In all other cases, a query in ANSI
    syntax has a semantically equivalent form in native syntax with the same query
    plan; however, it was not always possible to use such an equivalent before Oracle
    12c because some capabilities were not available for developersВ вҖ“ in particular,
    lateral views. The current subsection is dedicated to a comprehensive comparisonВ вҖ“
    ANSI vs Oracle native syntaxВ вҖ“ and if you are not interested in such details,
    then feel free to skip the comparison and proceed to the conclusion at the end
    of the chapter.'
