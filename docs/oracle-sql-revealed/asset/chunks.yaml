  raw: '### Solution


    For each element in the group there is another element such as a difference between
    the two is not more than 1; thus, according to transitivity law we can check a
    current element only with lower and upper bounds before adding it into the group.


    In pure SQL this logic can be implemented using an iterative model.


    ```

    select *

    from t_resemblance

    model

    ignore nav

    dimension by (row_number() over (order by id) id)

    measures(value, 0 mi, 0 ma, 0 flag)

    rules iterate (1e9) until value[iteration_number + 2] = 0

    (

    flag[iteration_number + 1] =

    case when value[iteration_number + 1] between

    mi[iteration_number] - 1 and ma[iteration_number] + 1

    or iteration_number = 0

    then 1 end,

    mi[iteration_number + 1] =

    decode(flag[iteration_number + 1], 1, least(mi[iteration_number],

    value[iteration_number + 1]), mi[iteration_number]),

    ma[iteration_number + 1] =

    decode(flag[iteration_number + 1], 1, greatest(ma[iteration_number],

    value[iteration_number + 1]), ma[iteration_number])

    );

    ID      VALUE         MI         MA       FLAG

    ---------- ---------- ---------- ---------- ----------

    1          1          0          1          1

    2          2          0          2          1

    3        2.5          0        2.5          1

    4        3.4          0        3.4          1

    5         .4          0        3.4          1

    6          5          0        3.4

    7        -.5        -.5        3.4          1

    8         -2        -.5        3.4

    9         -1         -1        3.4          1

    10          3         -1        3.4          1

    11          4         -1          4          1

    12          5         -1          5          1

    12 rows selected.

    ```


    An algorithm walks through the recordset and on each iteration changes measures
    only for one row. It updates the upper and lower bounds for the group and marks
    the current element.


    Iterations are necessary because we have to update multiple measures for each
    row. If we use rules with ANY instead, then the model would evaluate the first
    rule for all rows and then the second rule for all rows and so on.


    Taking into account the specific of the logic, we can try to approach a solution
    using a pattern-matching clause but in this case we are facing a couple of limitations.


    *   If we use an aggregate function in the define clause then itвҖҷs applied to
    all rows the including current row. So we cannot compare current value with min/max
    across values matched so far.

    *   ItвҖҷs not possible to use measures in the define clause and moreover measure
    values for the previous row. The reason is that measures are evaluated after a
    match is found.


    We can recall that we can use the next function but in this case we need to apply
    it to shifted values by one row. This is demonstrated below by using a new column
    vv instead of a value in the define clause.


    ```

    select *

    from (select t.*, lag(value, 1, value) over(order by id) vv

    from (select id, value

    from t_resemblance t

    union all select null, null from dual) t)

    match_recognize

    (

    order by id

    measures

    match_number() match,

    classifier() cls,

    min(x.value) mi,

    max(x.value) ma

    all rows per match

    pattern((x|dummy)+)

    define

    x as (next(x.vv) >= min(x.vv) - 1 and next(x.vv) <= max(x.vv) + 1)

    -- x as (next(x.vv) between min(x.vv) - 1 and max(x.vv) + 1)

    ) mr

    where id is not null;

    ID    MATCH CLS        MI       MA      VALUE         VV

    -------- -------- ----- ------- -------- ---------- ----------

    1        1 X           1        1          1          1

    2        1 X           1        2          2          1

    3        1 X           1      2.5        2.5          2

    4        1 X           1      3.4        3.4        2.5

    5        1 X          .4      3.4         .4        3.4

    6        1 DUMMY      .4      3.4          5         .4

    7        1 X         -.5      3.4        -.5          5

    8        1 DUMMY     -.5      3.4         -2        -.5

    9        1 X          -1      3.4         -1         -2

    10        1 X          -1      3.4          3         -1

    11        1 X          -1        4          4          3

    12        1 X          -1        5          5          4

    12 rows selected.

    ```


    We also have to add one additional row with a null ID value to properly handle
    the last row in the original recordset. Functions min/max with x.value as an argument
    were used to return lower and upper bounds for each step, but this is for information
    purposes only. All the logic is implemented in one line in the define clause.
    If we use the next function with the between operator, then the query fails with
    an exception вҖң`ORA-62508: illegal use of aggregates or navigation operators in
    MATCH_RECOGNIZE clause`вҖқ; that is why a rule with two conditions was used instead.


    The last thing to note about this task is that one more solution can be implemented
    using a recursive subquery factoring, but a pattern-matching solution is much
    more efficient .


    ## Baskets


    The goal is to allocate items to baskets with defined capacities. We loop through
    baskets from a min to max identifier and allocate items according to their priority.
    If some item was allocated to a specific basket, then it cannot be allocated to
    any other basket. For every basket, the total amount of the items cannot exceed
    the basket amount.


    For the below data


    ```

    with

    baskets(basket_id, basket_amount) as

    ( select 100, 500000 from dual union all

    select 200, 400000 from dual union all

    select 300, 1000000 from dual

    ),

    inventory(item_id, item_amount) as

    ( select 1000001, 50000 from dual union all

    select 1000002, 15000 from dual union all

    select 1000003, 250000 from dual union all

    select 1000004, 350000 from dual union all

    select 1000005, 45000 from dual union all

    select 1000006, 100500 from dual union all

    select 1000007, 200500 from dual union all

    select 1000008, 30050 from dual union all

    select 1000009, 400500 from dual union all

    select 1000010, 750000 from dual

    ),

    eligibility(basket_id, item_id, priority_level) as

    ( select 100, 1000003, 1 from dual union all

    select 100, 1000004, 2 from dual union all

    select 100, 1000002, 3 from dual union all

    select 100, 1000005, 4 from dual union all

    select 200, 1000004, 1 from dual union all

    select 200, 1000003, 2 from dual union all

    select 200, 1000001, 3 from dual union all

    select 200, 1000005, 4 from dual union all

    select 200, 1000007, 5 from dual union all

    select 200, 1000006, 6 from dual union all

    select 300, 1000002, 1 from dual union all

    select 300, 1000009, 2 from dual union all

    select 300, 1000010, 3 from dual union all

    select 300, 1000006, 4 from dual union all

    select 300, 1000008, 5 from dual

    )

    ```


    The expected result is the following


    ```

    BASKET_ID PRIORITY_LEVEL  ITEM_ID BASKET_AMOUNT   ITEM_AMOUNT  RESULT

    ---------- -------------- -------- -------------  ----------- -------

    100              1  1000003        500000       250000  250000

    100              2  1000004        500000       350000       0

    100              3  1000002        500000        15000  265000

    100              4  1000005        500000        45000  310000

    200              1  1000004        400000       350000  350000

    200              2  1000003        400000       250000       0

    200              3  1000001        400000        50000  400000

    200              4  1000005        400000        45000       0

    200              5  1000007        400000       200500       0

    200              6  1000006        400000       100500       0

    300              1  1000002       1000000        15000       0

    300              2  1000009       1000000       400500  400500

    300              3  1000010       1000000       750000       0

    300              4  1000006       1000000       100500  501000

    300              5  1000008       1000000        30050  531050

    15 rows selected.

    ```'
