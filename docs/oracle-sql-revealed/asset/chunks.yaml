    ## Summary


    Aggregate functions allow us to calculate a single result row for each group.
    In addition to various built-in aggregates, developers can implement their own
    UDAG (which also can be used as analytic functions with вҖңoverвҖқ clause) or use
    the collect function to aggregate rows into collection and apply any logic on
    top of it using UDF. Most of the built-in aggregates are commutative so order
    of rows within a group does not matter; however, some of them, like listagg or
    percentile_cont, require order that is specified after вҖңwithin groupвҖқ keywords.
    Order also matters for collect or xmlagg functions and may be specified in a function
    itself.


    In a similar manner as it was shown for analytic functions, Oracle allows us to
    access first (or last) values from the group according to a specified order using
    the keyword keep and functions first/last. This is very helpful when itвҖҷs required
    to find a min or max value from the group and corresponding attributes.


    Sometimes grouping may help to avoid additional joins; however, such cases are
    quite rare. Also grouping can be used instead of pivot to вҖңflattenвҖқ data, but
    using built-in capabilities are more preferable.


    # 5.В Hierarchical Queries: Connect by


    The connect by clause is used to query hierarchies if they are stored as parent-child
    relationships , also known as an adjacency lists model . Simply speaking, this
    model means that a parentВ вҖ“ child pair is stored for each child. In general adjacency
    lists can represent directed graphs, not only hierarchical trees; in this case
    the list describes the set of neighbors of a vertex in the graph. So an adjacency
    list model is much wider and a parent-child model is one of its implementations.


    Listing [5-1](#A455196_1_En_5_Chapter.html#Par3) shows the query for building
    hierarchy based on a parent-child relationship and using Oracle hierarchical query
    pseudocolumns .


    ```

    create table tree as

    select 2 id, 1 id_parent from dual

    union all select 3 id, 1 id_parent from dual

    union all select 4 id, 3 id_parent from dual

    union all select 5 id, 4 id_parent from dual

    union all select 11 id, 10 id_parent from dual

    union all select 12 id, 11 id_parent from dual

    union all select 13 id, 11 id_parent from dual;

    select connect_by_root id_parent root,

    level lvl,

    rpad('' '', (level - 1) * 3, '' '') || t.id as id,

    prior id_parent grand_parent,

    sys_connect_by_path(id, ''->'') path,

    connect_by_isleaf is_leaf

    from tree t

    start with t.id_parent in (1, 10)

    connect by prior t.id = t.id_parent;

    ROOT      LVL ID       GRAND_PARENT PATH          IS_LEAF

    -------- ----------- ------------------------ ---------------

    1      1 2                ->2                        1

    1      1 3                ->3                        0

    1      2    4           1 ->3->4                     0

    1      3       5        3 ->3->4->5                  1

    10      1 11               ->11                       0

    10      2    12         10 ->11->12                   1

    10      2    13         10 ->11->13                   1

    Listing 5-1

    Querying parent-child relationship

    ```


    The following must be specified for building a hierarchy:


    *   RootВ вҖ“ in the example we build two trees with root parent IDs equal 1 and
    10;

    *   Relationship between parents and children. В«`prior`В» is a unary operator that
    returns a value of a given expression (which is column as a rule) for an immediate
    parent for the current row.


    Other hierarchical queries features demonstrated in ListingВ [5-1](#A455196_1_En_5_Chapter.html#Par3):


    *   connect_by_rootВ вҖ“ unary operator that returns an expression value for the
    root row.

    *   level and connect_by_isleafВ вҖ“ pseudocolumns, which return level (hierarchical
    depth) and flag whether a node is leaf or not for each row.

    *   sys_connect_by_pathВ вҖ“ function that returns path from root to node with given
    separator.


    prior operator can be used not just in вҖңconnect byвҖқ clause but in a select list
    as well, but it can be applied to a given expression only once. For example, if
    the goal is to select a parent id two levels up, then the prior can be applied
    to the id_parent column - see expression for grand_parent in ListingВ В [5-1](#A455196_1_En_5_Chapter.html#Par3).


    Connect by traverses a hierarchy using a depth-first search approach , so all
    descendants for the current node are processed before the next node on the same
    level. вҖңOrder siblings byвҖқ can be used to specify the order within the same level.
    In this case, Oracle also will use a depth-first search but the order of the children
    for the parent may change. Listing [5-2](#A455196_1_En_5_Chapter.html#Par12) shows
    the result after specifying В«`order siblings by t.id desc`В» in the previous query.
    There is no guarantee that first level nodes will be ordered as specified in вҖңorder
    siblings byвҖқ because we cannot say they have a common parent.'
