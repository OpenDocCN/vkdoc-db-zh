  raw: '## Summary


    As a rule, a query returns data from many tables (or one table occurs multiple
    times) and data sets from different tables must be joined into a single result
    set (except in cases when they are combined using set operators - union/union
    all/intersect/minus). Joins may be explicitly specified using a join keyword or
    implicitly using an Oracle native syntax or subqueries. (ANTI) SEMI joins may
    be specified by using conditions (not) in/exists.


    The same logic may be implemented in a very different fashion, but itвҖҷs not always
    possible to get the same plan for different but semantically equivalent queries.
    During execution of a query, itвҖҷs getting converted into native syntax and various
    transformations are appliedВ вҖ“ additional details will be explained in the next
    chapter.


    Speaking about ANSI vs. native syntax, itвҖҷs worth to mention that ANSI provides
    better readability and clearness; however, native syntax allows better control
    over an execution plan. Two types of ANSI joinsВ вҖ“ full and outer partition byВ вҖ“
    cannot be expressed in native syntax, so that they have the same execution plan
    as an ANSI equivalent.


    ANSI syntax was introduced much later than the native one and initially had a
    huge number of bugs. However, as it was shown in the section вҖңUnnesting Collections,вҖқ
    some bugs still exist even in Oracle 12c and may appear for both ANSI and native
    syntaxes.


    # 2.В Query Transformations


    The same logic can be implemented using various but semantically equivalent queries
    that look quite different but have the same plans and performance. This is achieved
    as a result of query transformationsВ вҖ“ original queries transform into the same
    final query.


    For instance, the queries from Listing [2-1](#A455196_1_En_2_Chapter.html#Par3)
    have the same performance and plans. The last one has minor difference thoughВ вҖ“
    the join method is HASH JOIN ANTI NA while for all other queries it is HASH JOIN
    ANTI, so the result set for the last query will be empty if t2.id has null values.


    ```

    select t1.* from t1 left join t2 on t1.id = t2.id where t2.id is null;

    select t1.* from t1 where not exists (select t2.id from t2 where t1.id = t2.id);

    select t1.* from t1, t2 where t1.id = t2.id(+) and t2.id is null;

    select t1.* from t1 where t1.id not in (select t2.id from t2);

    Listing 2-1

    Different ways to implement ANTI join

    ```


    To check applied transformations and final queries, one needs to set an event
    10053 or enable SQL Optimizer tracing before executing the statement (detailed
    descriptions of these commands is out of the scope of this book, additional information
    can be found in [1]).


    ```

    alter session set events ''trace[rdbms.SQL_Optimizer.*]'';

    alter session set events ''10053 trace name context forever, level 1'';

    Listing 2-2

    Enabling tracing for transformations

    ```


    Final query text will be in a tracing file in the section В«Final query after transformations:*******
    UNPARSED QUERY IS *******В». For all above queries it will be exactly the same
    (schema name was manually removed from the statement) as shown in Listing [2-3](#A455196_1_En_2_Chapter.html#Par7):


    ```

    SELECT "T1"."ID" "ID","T1"."NAME" "NAME" FROM "T2", "T1" WHERE "T1"."ID"="T2"."ID"

    Listing 2-3

    Transformed query for ANTI join

    ```


    If you execute this query it will not return the expected result. That is because
    there is no special notation for an ANTI join in a tracing file - even though
    it exists in relational algebra. ANTI (or SEMI) joins are not the only case when
    a query plan for a final query does not match the query plan for the original
    query. There are many other examples and one of them will be shown in Chapter
    [5](#A455196_1_En_5_Chapter.html), вҖңHierarchical queries: connect byвҖқ while explaining
    how connect by + join + where works.


    To check the final query after transformations, you can also use stored procedure
    dbms_utility.expand_sql_text added in Oracle 12c (starting with Oracle 11.2.0.3
    there was undocumented dbms_sql2.expand_sql_text for the same purpose); however,
    its output may differ from what we see in trace file so I would recommend using
    trace files as a more reliable source.


    The transformation engine is part of the query optimizer and the general schema
    of the optimizer is shown in Figure [2-1](#A455196_1_En_2_Chapter.html#Fig1).
    It consists of three main components: the transformer, estimator, and plan generator.


    ![A455196_1_En_2_Fig1_HTML.gif](A455196_1_En_2_Fig1_HTML.gif)


    Figure 2-1


    Query optimizer components


    Transformations are also known as logical optimization while the plan generator
    (searches through different access paths, join methods, and join orders) is responsible
    for physical optimization. Please see further details in [2], [3].


    Transformations are divided into two main categories (additional information can
    be found in documentation and [4]):


    *   Cost-based transformationsВ вҖ“ applied based on cost, for example, or-expansion;

    *   Heuristic-based transformationsВ вҖ“ applied based on heuristics, for instance,
    simple/complex view merging.


    So cost-based transformations are applied only if the cost of the transformed
    query is lower than the cost of the original query while heuristic-based transformations
    are applied always when some conditions are met (conditions differ from one transformation
    to another).'
