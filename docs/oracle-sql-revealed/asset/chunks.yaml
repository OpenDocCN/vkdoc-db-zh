    declare

    s varchar2(4000) := ''abcd c*de 01'';

    n number := length(s);

    j number := 1;

    k number := 1;

    x number := 1;

    i number := 1;

    c number := 0;

    begin

    while x > 0 loop

    i := i + 1;

    c := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then 1

    else case when j = 1 then 0 else c end

    end;

    s := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then substr(s, 1, j - 1) || substr(s, j + 1, 1) ||

