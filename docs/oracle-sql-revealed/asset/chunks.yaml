    \ Media, LLC is a California LLC and the sole member (owner) is Springer Science\
    \ + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a Delaware\
    \ corporation.\n\n## Introduction\n\nThe main purpose of this book is to describe\
    \ the capabilities of SQL for implementing complex logic and specific features\
    \ of Oracle SQL dialect, in particular. SQL, and especially Oracle dialect, are\
    \ extremely powerful languages that allow you to get the result in a highly scalable\
    \ fashion with very little code.\n\nThe book is dedicated to readers who have\
    \ working experience with any relational DBMS as well as basic SQL knowledge.\
    \ In particular, itвҖҷs good to understand that SQL is a declarative language so\
    \ it describes what to get rather than how to get the result. Also itвҖҷs highly\
    \ desirable to know what a query plan is and how to read it.\n\nThe first part\
    \ provides a thorough overview of SQL capabilities in Oracle for selecting data\
    \ as well as some basic SQL concepts. Information regarding the Cost Based Optimizer\
    \ intentionally was minimized so the reader is not getting bogged down in minutiae\
    \ and can concentrate on features for implementing business logic and understanding\
    \ mechanics of the SQL engine. However, it was impossible to skip some concepts\
    \ so a separate chapter is dedicated to query transformations.\n\nOracle capabilities\
    \ and features keep evolving from one version to another so sometimes different\
    \ Oracle versions 10g (10.2.0.5), 11g (11.2.0.4), and 12c (12.1.0.2, 12.2.0.1)\
    \ are referred to highlight these changes. While introducing new functionality\
    \ Oracle also aims to fix existing bugs so I tried not to mention bugs that are\
    \ already fixed and are not important for describing possibilities of SQL. ItвҖҷs\
    \ very important to keep in mind that such Oracle evolution occurred because best\
    \ practices, which were actual 5, 10, or 15 years ago, may be not the best approach\
    \ at all on new versions.\n\nThe goal, on one hand, was to provide comprehensive\
    \ analysis of the functionality but, on the other hand, to minimize the number\
    \ of pages. So narration in almost every chapter quickly flows from basic concepts\
    \ to complex details. Sometimes the reader may want to ask questions that will\
    \ be answered later on in the text so just keep reading and hopefully you will\
    \ find required clarifications or additional details.\n\nThe bookвҖҷs second part\
    \ covers a number of real-life tasks that can be solved using Oracle SQL dialect.\
    \ Sometimes PL/SQL solutions are also provided just to highlight current limitations\
    \ of SQL or to demonstrate that PL/SQL may be a preferable solution from a performance\
    \ point of view even if an SQL solution looks concise and easy. You can find a\
    \ bunch of real cases when `PL/SQL` is better than `Vanilla SQL` in the first\
    \ chapter of Part II.\n\nI do not see a reason to collect algorithmic quizzes\
    \ that require only PL/SQL programming because PL/SQL is yet another procedural\
    \ language with some OOP extensions, so the reader can find various books dedicated\
    \ to algorithms and programming and try to implement those programs in PL/SQL.\
    \ To understand PL/SQL advantages to compare to an ordinary procedural language,\
    \ please refer to note [8] in the Appendix. Also PL/SQL has a number of features\
    \ to effectively interact with the SQL engine and note [9] in the Appendix may\
    \ be a good source to begin with."
