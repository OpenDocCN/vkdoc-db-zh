    Even specific Oracle clauses like pattern matching or model may be combined in
    the same query block.


    ```

    select * from dual

    match_recognize (all rows per match pattern (x) define x as 1 = 1)

    model dimension by (1 id) measures (0 result) rules ();

    ```


    In this case match_recognize will be applied first and the model will be executed
    on top of it; furthermore each clause is isolated to another so if you want to
    treat a recordset in a specific way before applying the logic, you may have to
    specify partitioning and ordering for each clause.


    ## Summary


    Some details regarding logical execution of query clauses, along with the examples,
    have been examined. When logic is quite complicated it makes sense to use multiple
    query blocks even if that is not necessary - for maintainability purposes. However
    you have to make sure that inline views are merged as expected so there is no
    negative impact on the performance. ItвҖҷs not always possible to avoid inline viewsВ вҖ“
    for example, when filtering by result of an analytic function is required. Moreover,
    in some cases inline views may improve the performance as was demonstrated in
    the end of the chapter. Also inline views may be useful as workarounds for bugs
    (for example, there were a lot of bugs on old versions when connect by and analytic
    functions have been mixed in the same query block) and to control transformationsВ вҖ“
    you can disable view merging and control transformations in each subqeury separately.'
