    Listing 12-22 дҪҝз”Ё lateral и§Ҷеӣҫе’Ң group by иҝҮж»ӨйЎ¶зә§и·Ҝеҫ„


    еңЁиҝҷз§Қжғ…еҶөдёӢпјҢ`lateral` и§Ҷеӣҫд№ҹдјҡеҜјиҮҙ `NESTED LOOPS`пјҢиҝҷзӣёеҪ“ж¶ҲиҖ— CPUпјҢжңҖз»Ҳжү§иЎҢж—¶й—ҙд»ӢдәҺ Listing [12-21](#A455196_1_En_12_Chapter.html#Par179)
    дёӯзҡ„з¬¬дёҖдёӘе’Ңз¬¬дәҢдёӘжҹҘиҜўд№Ӣй—ҙгҖӮ


    еҰӮжһңжңҖеӨ§еҸҜиғҪзҡ„и·Ҝеҫ„ж·ұеәҰжҳҜдәӢе…Ҳе·ІзҹҘзҡ„пјҢйӮЈд№ҲжҲ‘д»¬еҸҜд»Ҙе®һзҺ°д»ҘдёӢж–№жі•пјҡеҜ№дәҺжҜҸдёӘеӯҗи·Ҝеҫ„пјҢжҲ‘д»¬жЈҖжҹҘеҪ“еүҚи·Ҝеҫ„еңЁеӯҗи·Ҝеҫ„д№ӢеҗҺжҳҜеҗҰеҢ…еҗ«еҶ…е®№пјҲ`p[i]` дёҚжҳҜ `null`пјүпјҢе№¶дё”жҳҜеҗҰеӯҳеңЁеҸҰдёҖдёӘи·Ҝеҫ„з»ҲжӯўдәҺжӯӨеӯҗи·Ҝеҫ„пјҲ`m[i]
    = 0`пјүпјҢеҰӮжһңжҳҜпјҢеҲҷиҝҮж»ӨжҺүеҪ“еүҚи·Ҝеҫ„гҖӮ


    ```sql

    select path

    from (select t1.*,

    min(nvl2(p2, 1, 0)) over(partition by p1) m2,

    min(nvl2(p3, 1, 0)) over(partition by p1, p2) m3,

    min(nvl2(p4, 1, 0)) over(partition by p1, p2, p3) m4,

    min(nvl2(p5, 1, 0)) over(partition by p1, p2, p3, p4) m5

    from (select path,

