    ItвҖҷs not possible to specify a windowing clause when using percentile_cont as
    an analytic function so itвҖҷs applied to the entire partition. Given that we need
    to calculate percentile for a specific subset of rows starting with the current
    row, we can get the required subset using a self join and use an aggregate version
    of percentile_cont. See Listing [12-9](#A455196_1_En_12_Chapter.html#Par56).


    ```

    create table flow(ord, value) as

    select 1, 10 from dual

    union all select 2, 333 from dual

    union all select 3, 100 from dual

    union all select 4, 55 from dual

    union all select 5, 1000 from dual;

    select t1.*, percentile_cont(0.3) within group(order by t2.value) pct

    from flow t1

    join flow t2 on t2.ord between t1.ord and t1.ord + 4

    group by t1.ord, t1.value;

    ORD      VALUE        PCT

    ---------- ---------- ----------

    1         10         64

    2        333       95.5

    3        100         82

    4         55      338.5

    5       1000       1000

    Listing 12-9

    Calculating percentile with shift using self join and percentile_cont

    ```


    We can get the same without percentile_cont if we implement calculations described
    in the documentation for that function. See Listing [12-10](#A455196_1_En_12_Chapter.html#Par58).


    ```

    select tt.*,

    decode(frn, crn, frn_value,

    (crn - rn) * frn_value + (rn - frn) * crn_value) percentile

    from (select t.ord,

    t.value,

    t.rn,

    t.frn,

    t.crn,

    max(decode(rnum, frn, v)) frn_value,

    max(decode(rnum, crn, v)) crn_value

    from (select t1.*,

    t2.value v,

    row_number() over(partition by t1.ord order by t2.value) rnum,

    1 + 0.3 * (count(*) over(partition by t1.ord) - 1) rn,

    floor(1 + 0.3 * (count(*) over(partition by t1.ord) - 1)) frn,

    ceil(1 + 0.3 * (count(*) over(partition by t1.ord) - 1)) crn

    from flow t1

    join flow t2

    on t2.ord between t1.ord and t1.ord + 4) t

    group by t.ord, t.value, t.rn, t.frn, t.crn) tt

    order by tt.ord;

    ORD  VALUE   RN  FRN  CRN  FRN_VALUE  CRN_VALUE PERCENTILE

    ------- ------ ---- ---- ---- ---------- ---------- ----------

    1     10  2.2    2    3          55        100         64

    2    333  1.9    1    2          55        100       95.5

    3    100  1.6    1    2          55        100         82

    4     55  1.3    1    2          55       1000      338.5

    5   1000    1    1    1        1000       1000       1000

    Listing 12-10

    Calculating percentile with shift using self join and analytic functions

    ```


    So we calculate frn and crn indexes for each subset, derive corresponding values,
    and perform linear interpolation when necessary. But do we really need self join?


    LetвҖҷs consider the solution when values are ordered in a source table. The result
    of the Listing [12-11](#A455196_1_En_12_Chapter.html#Par61) differs from the two
    previous queries because values are ordered by ord.


    ```

