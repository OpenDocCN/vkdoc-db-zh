- fmt: 'Listing 7-3

    ## Specifying order on the left side of the rule


    ```sql

    with t(id, value) as

    (select rownum, rownum from dual connect by level <= 3)

    select *

    from t

    model

    dimension by (id)

    measures (value, 100 r1, 100 r2)

    (

    r1[any] order by id asc  = nvl(r1[cv(id)-1], 0) + value[cv(id)],

    r2[id is any] order by id desc = nvl(r2[cv(id)-1], 0) + value[cv(id)]

    )

    order by id;

    ID      VALUE         R1         R2

    ---------- ---------- ---------- ----------

    1          1          1          1

    2          2          3        102

    3          3          6        103

    ```


    When we specify ascending order the result is a cumulative sum while for descending
    order, the result is completely different. We got `102` and `103`, which are the
    sum of the measure `value` for current row and measure `r2` for the previous row,
    which was initialized as `100`. There is no previous row for the first row so
    the result is simply a measure `value` for that row.


    It always makes sense to specify the order on the left side of the rule if itвҖҷs
    applied for multiple rows because


    *   It improves performance;

    *   It adds clarity to the solution;

    *   It helps to avoid `ORA-32637: Self cyclic rule in sequential order MODEL.`


    Listing 7-4 shows an example of recursive measure. Oracle cannot resolve this
    dependency but if we uncomment `/*order by id*/`, then the result will be calculated
    successfully. Try to guess what the result is without running the query.


    Listing 7-4

    ## Recursive measure


    ```sql

    with t as

    (select rownum id from dual connect by level <= 3)

    select *

    from t

    model

    dimension by (id)

    measures (id result)

    rules

    (

    result[any] /*order by id*/ = sum(result)[any]

    );

    (select rownum id from dual connect by level <= 3)

    *

    ERROR at line 2:

    ORA-32637: Self cyclic rule in sequential order MODEL

    ```


    By default, all the rules are evaluated in the order they are specified in a query.
    This also can be explicitly specified using an optional keyword `sequential order`.
    This behavior may be changed if we specify `automatic order` so that dependencies
    among the cells are taken into account.


    Listing 7-5

    ## Model with automatic rule ordering


    ```sql

    with t as

    (select rownum id from dual connect by level <= 3)

    select *

    from t

    model

    dimension by (id)

    measures (0 t1, 0 x, 0 t2)

    rules automatic order

    (

    t1[id] = x[cv(id)-1],

    x[id] = cv(id),

    t2[id] = x[cv(id)-1]

    )

    order by id;

    ID         T1          X         T2

    ---------- ---------- ---------- ----------

    1                     1

    2          1          2          1

    3          2          3          2

    ```


    If you omit `automatic order` in Listing 7-5, then values for `t1` would be `NULL`,
    `0`, `0`.


    As it was already shown, you can specify multiple rules for the same measure;
    moreover Oracle will not complain even if you specify multiple rules for the same
    measure and the same cells; however this should be avoided. For example, we can
    add fourth rule `t1[id] = x[cv(id)] + t2[cv(id)]` into the query from Listing
    7-5, but after that, rule `t1[id] = x[cv(id)-1]` is completely overridden and
    should be removed.


    Whatever order is specified, rules are calculated one by one. This means the first
    rule is evaluated for all cells referenced on the left side and then the second
    rule is evaluated for all cells referenced on its left side and so on. In other
    words, rules are applied by columns and not by rows.


    The keywords `automatic order`/`sequential order` define a query plan. For `sequential
    order` youвҖҷll see `SQL MODEL ORDERED` in the plan, and in the case of `automatic
    order` it can be `SQL MODEL CYCLIC`/`SQL MODEL ACYCLIC` depending on whether cyclic
    dependencies exist or not.


    In a simple case cyclic dependency may be in the scope of the same measure (when
    one cell references another in the first rule and the other way round in the second
    rule) or for different measures and the same cell. Frankly speaking, I did not
    come across useful examples of models with cyclic dependencies so IвҖҷd suggest
    that you always specify rules in correct order and use default value `sequential
    order`; and in addition to that, specify the order on the left-hand side of each
    rule that references multiple cells.


    In case of `ORDERED`/`ACYCLIC` models you also may see `FAST` in the plan if all
    the rules use a single cell reference.


    For example, for this rule


    ```sql

    rules automatic order (x[1] = cv(id), x[-1] = cv(id))

    ```


    there will be `SQL MODEL ACYCLIC FAST` in the plan while for this one


    ```sql

    rules automatic order (x[for id in (1, -1)] = cv(id))

    ```


    or this one


    ```sql

    rules automatic order (x[id in (1, -1)] = cv(id))

    ```


    it will be `SQL MODEL ACYCLIC`.


    The logical difference between the second and third examples is that the second
    one uses positional reference while the third one uses symbolic reference, so
    if some cells are missing in the source recordset, then the result will differ.


    If we specify `automatic order` for the query from Listing 7-4, then Oracle will
    throw an exception that the model does not converge.


    Listing 7-6

    ## Model with cyclic rule and automatic order


    ```sql

    with t as

    (select rownum id from dual connect by level <= 3)

    select *

    from t

    model

    dimension by (id)

    measures (id result)

    rules automatic order

    (

    result[any] /*order by id*/ = sum(result)[any]

    );

    from t

    *

    ERROR at line 4:

    ORA-32634: automatic order MODEL evaluation does not converge

    ```


    According to documentation, В«Convergence is defined as the state in which further
    executions of the model will not change values of any of the cell in the modelВ».
    Empirically we can figure out that, and at most three (four) steps are used to
    check convergence.


    Listing 7-7

    ## Checking convergence


    ```sql

    select * from (select 1 x from dual)

    model dimension by (x) measures (0 as result, 64 tmp)

    rules automatic order

    (result[1]=ceil(tmp[1]/4), tmp[1]=result[1]);

    X     RESULT        TMP

    ---------- ---------- ----------

    1          1          1

    select * from (select 1 x from dual)

    model dimension by (x) measures (0 as result, 65 tmp)

    rules automatic order

    (result[1]=ceil(tmp[1]/4), tmp[1]=result[1]);

    select * from (select 1 x from dual)

    *

    ERROR at line 1:

    ORA-32634: automatic order MODEL evaluation does not converge

    ```


    In the first case values for (`result`, `tmp`) were `16`, `4`, `1`, and `1` again
    вҖ“ model converged; in the second case values on the third and fourth steps did
    not match, which led to an exception.


    `automatic order` may change the plan operation from `MODEL ORDERED` to `MODEL
    ACYCLIC` when there are no cyclic dependencies (refer, for example, to Listing
    7-5 to check that), but the desired result can be achieved by just specifying
    rules in a proper order.


    In all the examples so far (strictly speaking excluding acyclic model example),
    model rules have been evaluated only once; however itвҖҷs possible to evaluate rules
    iteratively until the termination condition is satisfied. To demonstrate iterative
    computations letвҖҷs implement a bisection method using the same interval and function
    as in Listing 6-5.'
