    As we see from the plan, temporary tablespace was not used during execution (there
    are no Reads/Writes columns) and all the data was read from memory. The only possible
    join method is NESTED LOOPS because of a predicate containing the like operator.
    In fact, most of the time was spent on doing NESTED LOOPS, and further grouping
    and ordering added just 3 seconds.


    To get a table cached in memory you may want to disable direct path readsВ вҖ“ вҖң`alter
    session set events ''10949 trace name context forever, level 1'';`вҖқ.


    Given that we know a possible range of code lengths in advance , we can use this
    fact to achieve a HASH JOIN method with codes if we add an auxiliary join to get
    all the prefixes for a given range.


    ```

    select sum(code * sum(duration)) s, count(*) cnt

    from (select ca.rowid,

    num,

    duration,

    max(code)

    keep(dense_rank first order by length(code) desc) code

    from phone_call ca

    cross join (select rownum + 3 idx

    from dual connect by rownum <= 3) x

    join phone_code co

    on substr(ca.num, 1, x.idx) = co.code

    group by ca.rowid, num, duration)

    group by code;


