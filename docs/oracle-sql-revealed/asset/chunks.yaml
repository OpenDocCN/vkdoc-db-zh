    жңүдёҖдәӣдҪҝз”Ё`model`еӯҗеҸҘзҡ„жӣҝд»Ји§ЈеҶіж–№жЎҲпјҢдҪҶе®ғд»¬зҡ„жҖ§иғҪжҜ”жЁЎејҸеҢ№й…Қи§ЈеҶіж–№жЎҲе·®гҖӮ


    ## Zeckendorf иЎЁзӨәжі•


    Zeckendorf е®ҡзҗҶжҢҮеҮәпјҢжҜҸдёӘжӯЈж•ҙж•°йғҪеҸҜд»Ҙе”ҜдёҖең°иЎЁзӨәдёәдёҖдёӘжҲ–еӨҡдёӘдёҚиҝһз»ӯзҡ„ж–җжіўйӮЈеҘ‘ж•°д№Ӣе’ҢпјҢдё”иҜҘе’ҢдёҚеҢ…жӢ¬д»»дҪ•дёӨдёӘиҝһз»ӯзҡ„ж–җжіўйӮЈеҘ‘ж•°гҖӮ


    еҜ№дәҺд»»дҪ•з»ҷе®ҡзҡ„жӯЈж•ҙж•°пјҢеҸҜд»ҘдҪҝз”ЁиҙӘеҝғз®—жі•жүҫеҲ° Zeckendorf иЎЁзӨәпјҢеңЁжҜҸдёӘйҳ¶ж®өйҖүжӢ©жңҖеӨ§зҡ„еҸҜиғҪзҡ„ж–җжіўйӮЈеҘ‘ж•°гҖӮ


    жҲ‘д»¬зҡ„зӣ®ж ҮжҳҜдёәиЎЁ`n`дёӯзҡ„жүҖжңүж•°еӯ—жүҫеҲ°ж»Ўи¶і Zeckendorf е®ҡзҗҶжқЎд»¶зҡ„иЎЁзӨәгҖӮ


    ```sql

    create table n(num) as select 222 from dual union all select 3690 from dual;

    ```


    йў„жңҹз»“жһңжҳҜпјҡ


    ```sql

    NUM PATH

    ---------- ------------------------------

    222 144+55+21+2

    3690 2584+987+89+21+8+1

    ```


    дёәз®ҖеҚ•иө·и§ҒпјҢеҒҮи®ҫжҲ‘д»¬жңүдёҖдёӘиЎЁ`fib(lvl, value)`пјҢе…¶дёӯеҢ…еҗ«еүҚ 20 дёӘж–җжіўйӮЈеҘ‘ж•°гҖӮж•°еӯ—еҸҜд»ҘдҪҝз”Ёжң¬д№ҰжҸҸиҝ°зҡ„дј—еӨҡж–№жі•д№ӢдёҖз”ҹжҲҗгҖӮ'
- fmt: '### Solution


    A brute force solution can be implemented using `connect by` as follows.


    *   Generate all permutations of Fibonacci numbers that are less than a given
    number;

    *   Filter only those with sum value equals to given number;

    *   Filter permutation with a min number of elements.


    ```sql

    with n_fib as

    (select num, value, lvl, max(lvl) over(partition by num) max_lvl

    from n

    join fib

    on fib.value  value

    and sys_guid() is not null)

    select num,

    max(substr(path, 2)) keep(dense_rank first order by p_lvl) path

    from (select num, path, p_lvl

    from permutation p

    join fib

    on instr(p.path || ''+'', ''+'' || fib.value || ''+'') > 0

    group by num, path, p_lvl

    having sum(value) = num)

    group by num

    order by num;

    ```

    *Listing 12-15 Zeckendorf representation using connect by*


    Obviously this approach is extremely inefficient, and we can instead, for each
    input number, loop thorough Fibonacci numbers in descending order and on each
    step mark a current Fibonacci numbers if its sum with the numbers marked so far
    does not exceed the input number. This iterative logic can be implemented using
    recursive subquery factoring, for example.


    ```sql

    with n_fib as

    (select num, value, lvl, max(lvl) over(partition by num) max_lvl

    from n

    join fib

    on fib.value <= n.num),

    rec(lvl, num, f, s) as

    (select 1, n_fib.num, n_fib.value, 0

    from n_fib

    where n_fib.lvl = n_fib.max_lvl

    union all

    select rec.lvl + 1, l.num, l.value, rec.f + rec.s

    from rec

    cross apply (select *

    from (select *

    from n_fib

    where n_fib.num = rec.num

    and n_fib.value + rec.s + rec.f <= rec.num

    order by lvl desc)

    where rownum = 1) l)

    cycle lvl set c to 1 default 0

    select num, listagg(f, ''+'') within group(order by f desc) path

    from rec

    group by num

    order by num;

    ```

    *Listing 12-16 Zeckendorf representation using recursive subquery factoring and
    cross apply*


    The lateral view has been used in Listing [12-16](#A455196_1_En_12_Chapter.html#Par161)
    in order to get on each step a max Fibonacci number that satisfies a condition.
    As was mentioned in the previous chapter, "When PL/SQL Is Better Than Vanilla
    SQL," there may be a false positive cycle detection if there are multiple joins
    or lateral views in a recursive member; the `cycle` clause was used to handle
    that.


    This solution can be simplified and optimized by using a scalar subquery instead
    of a lateral view вҖ“ in this case, a query can be executed on Oracle 11g.


    ```sql

    with rec(lvl, num, f, s) as

    (select 1,

    n.num,

    (select max(fib.value) from fib where fib.value <= n.num),


    from n

    union all

    select lvl + 1,

    d.num,

    (select max(fib.value)

    from fib

    where fib.value <= d.num - (d.f + d.s)),

    d.f + d.s

    from rec d

    where d.s + d.f < d.num)

    select num, listagg(f, ''+'') within group(order by f desc) path

    from rec

    group by num

    order by num;

    ```

    *Listing 12-17 Zeckendorf representation using recursive subquery factoring .
    Simplified*


    As you see, table `fib` is scanned multiple times for both approaches. To avoid
    multiple scans we can join tables `n` and `fib` and apply a `model` on top of
    the joined recordset.


    ```sql

    with n_fib as

    (select num, value, lvl

    from n

    join fib

    on fib.value <= n.num)

    , m as

    (select *

    from n_fib

    model

    ignore nav

    partition by (num part)

    dimension by (lvl)

    measures (num, value, 0 x)

    rules

    (

    x[any] order by lvl desc =

    case when x[cv(lvl)+1] + value[cv(lvl)] <= num[cv(lvl)]

    then x[cv(lvl)+1] + value[cv(lvl)]

    else x[cv(lvl)+1]

    end

    ))

    select num, listagg(f, ''+'') within group(order by f desc) path

    from (select num, max(value) f from m group by num, x)

    group by num

    order by num;

    ```

    *Listing 12-18 Zeckendorf representation using model clause*


    And finally the most efficient solution can be implemented using pattern matching.


    ```sql

    select num,

    (select listagg(value, ''+'')

    within group(order by value desc) path

    from (select n.num, fib.value from fib) y

    match_recognize

    (

    order by value desc

    all rows per match

    pattern((x|{-dummy-})+)

    define

    x as sum(x.value) <= num

    ) mr

    ) path

    from n;

    ```

    *Listing 12-19 Zeckendorf representation using pattern matching*


    Instead of a scalar subquery we could have used an explicit join with a `fib`
    table and `partition by num order by value desc` in a `match_recognize` clause.


    Implementation using recursive subquery factoring cannot be done in a correlated
    scalar subquery because in this case itвҖҷs not possible to refer columns from the
    main table.


    LetвҖҷs demonstrate this on a simple example:


    ```sql

    select t.*,

    (with rec(lvl) as (select /*t.id*/ 5 lvl from dual

    union all

    select rec.lvl + 1 from rec where lvl < 10)

    select listagg(lvl, '', '') within group(order by lvl)

    from rec) str

    from (select 5 id from dual) t;

    ```


    If you uncomment `t.id` the query will fail with `ORA-00904: "T"."ID": invalid
    identifier`.


