    еңЁд»Јз Ғжё…еҚ• 5-3 зҡ„з¬¬дәҢдёӘе’Ңз¬¬дёүдёӘжҹҘиҜўдёӯпјҢ`sign` иҝҮж»ӨжҳҜеңЁжһ„е»әеұӮзә§з»“жһ„д№ӢеүҚеә”з”Ёзҡ„пјҢиҖҢеңЁз¬¬дёҖдёӘжҹҘиҜўдёӯпјҢе®ғжҳҜеңЁеұӮзә§з»“жһ„жһ„е»әд№ӢеҗҺеә”з”Ёзҡ„гҖӮ


    ```

    select t.*, n.name

    from tree t, nodes n

    where t.id = n.id

    and n.sign = 1

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    4          3 name4

    select *

    from (select t.*, n.name

    from tree t, nodes n

    where t.id = n.id

    and n.sign = 1) t

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    select t.*, n.name

    from tree t

    join nodes n

    on t.id = n.id

    and n.sign = 1

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    ```


    # д»Јз Ғжё…еҚ• 5-3

    ## Connect by дёҺиҝһжҺҘ


    еҜ№дәҺдҪҝз”Ё ANSI иҝһжҺҘзҡ„еҺҹе§ӢжҹҘиҜўпјҢз»ҸиҝҮиҪ¬жҚўеҗҺзҡ„жңҖз»ҲжҹҘиҜўеҢ…еҗ«дёҖдёӘз¬ӣеҚЎе°”з§ҜиҝһжҺҘпјҲCartesian joinпјүпјҢиҖҢиҝһжҺҘи°“иҜҚеҲҷиў«з§»еҲ°дәҶ вҖңstart withвҖқ
    е’Ң вҖңconnect byвҖқ еӯҗеҸҘдёӯгҖӮз„¶иҖҢпјҢжӣҙз¬ҰеҗҲйҖ»иҫ‘зҡ„йў„жңҹжҳҜпјҢеңЁиҪ¬жҚўеҗҺзҡ„жҹҘиҜўдёӯдјҡзңӢеҲ°дёҖдёӘеҶ…иҒ”и§ҶеӣҫпјҲinline viewпјүпјҢе…¶дёҠеҶҚеә”з”Ё `connect
    by`гҖӮеӣ жӯӨпјҢеҰӮжһңдҪ дёәиҪ¬жҚўеҗҺзҡ„жҹҘиҜўжһ„е»әжү§иЎҢи®ЎеҲ’пјҢе®ғе°ҶдёҺеҺҹе§ӢжҹҘиҜўзҡ„жү§иЎҢи®ЎеҲ’дёҚеҗҢпјҢиҝһжҺҘзұ»еһӢе°ҶжҳҜ вҖңMERGE JOIN CARTESIANвҖқгҖӮ


    ```

    select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

    from "TREE" "T", "NODES" "N"

    start with "T"."ID_PARENT" = 0

    and "T"."ID" = "N"."ID"

    and "N"."SIGN" = 1

    connect by "T"."ID_PARENT" = prior "T"."ID"

    and "T"."ID" = "N"."ID"

    and "N"."SIGN" = 1

    ```


    еҜ№дәҺд»Јз Ғжё…еҚ• 5-3 дёӯз¬¬дёҖдёӘжҹҘиҜўзҡ„иҪ¬жҚўз»“жһңпјҢзңӢиө·жқҘд№ҹжңүзӮ№еҮәд№Һж„Ҹж–ҷвҖ”вҖ”жӯЈеҰӮдҪ жүҖзңӢеҲ°зҡ„пјҢиҝһжҺҘжқЎд»¶д»Һ where еӯҗеҸҘз§»еҲ°дәҶ вҖңstart withвҖқ е’Ң вҖңconnect
    byвҖқ еӯҗеҸҘдёӯгҖӮ


    ```

    select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

    from "TREE" "T", "NODES" "N"

    where "N"."SIGN" = 1

    start with "T"."ID_PARENT" = 0

    and "T"."ID" = "N"."ID"

    connect by "T"."ID_PARENT" = prior "T"."ID"

    and "T"."ID" = "N"."ID"

    ```


    жҲ‘жғіеҶҚж¬Ўејәи°ғпјҢиҝҷдәӣиҪ¬жҚўеҗҺзҡ„жҹҘиҜўдёҺеҺҹе§ӢжҹҘиҜўзҡ„жү§иЎҢи®ЎеҲ’жҳҜдёҚеҗҢзҡ„пјӣеҚідҪҝе®ғд»¬еңЁиҜӯд№үдёҠжҳҜзӯүж•Ҳзҡ„пјҢиҪ¬жҚўеҗҺж–Үжң¬зҡ„жҹҘиҜўжҖ§иғҪдјҡе·®еҫҲеӨҡпјҢеӣ дёәеұӮзә§з»“жһ„е°Ҷе»әз«ӢеңЁз¬ӣеҚЎе°”з§ҜиҝһжҺҘд№ӢдёҠгҖӮ


    иҜҙеҲ°еӨ–иҝһжҺҘпјҲouter joinsпјүпјҢж— и®әе®ғд»¬жҳҜеңЁ вҖңjoinвҖқ еӯҗеҸҘиҝҳжҳҜ вҖңwhereвҖқ еӯҗеҸҘдёӯжҢҮе®ҡйғҪжІЎжңүеҢәеҲ«пјҢеӣ дёәеҢ…еҗ« `(+)` зҡ„и°“иҜҚдјҡеңЁжһ„е»әеұӮзә§з»“жһ„д№ӢеүҚиў«жұӮеҖјгҖӮ


    еҗҢж ·еҖјеҫ—дёҖжҸҗзҡ„жҳҜпјҢеҰӮжһңзӣ®ж ҮжҳҜиҺ·еҸ–жүҖжңүеҗҺд»ЈзӣҙеҲ°зү№е®ҡеұӮзә§пјҢйӮЈд№ҲеңЁ вҖңconnect byвҖқ жқЎд»¶дёӯжҢҮе®ҡ `"level <= n"` иҝҮж»ӨжҜ”еңЁ where еӯҗеҸҘдёӯжҢҮе®ҡжӣҙжңүж„Ҹд№үпјҢеӣ дёәиҝҷж ·дјҡеңЁиҫҫеҲ°зү№е®ҡеұӮзә§ж—¶еҒңжӯўжһ„е»әеұӮзә§з»“жһ„гҖӮеҗҰеҲҷпјҢеұӮзә§з»“жһ„е°ҶдёәжүҖжңүеұӮзә§жһ„е»әпјҢд№ӢеҗҺжүҚдјҡеә”з”Ё
    where иҝҮж»ӨеҷЁгҖӮ


    еҸҰдёҖдёӘйҮҚзӮ№жҳҜпјҢ`connect by` жқЎд»¶еҸӘеҜ№еұӮзә§еӨ§дәҺ 1 зҡ„иҠӮзӮ№иҝӣиЎҢжұӮеҖјгҖӮз¬¬дёҖеұӮзә§зҡ„иҠӮзӮ№еҝ…йЎ»дҪҝз”Ё вҖңstart withвҖқ еӯҗеҸҘиҝӣиЎҢиҝҮж»ӨгҖӮдҫӢеҰӮпјҢж— и®әдҪ еңЁ
    connect by жқЎд»¶дёӯжҢҮе®ҡ `"level <= 1"` иҝҳжҳҜ `"level <= 0"`пјҢжүҖжңүз¬¬дёҖеұӮзә§зҡ„иҠӮзӮ№йғҪдјҡиў«иҝ”еӣһгҖӮ


    `Connect by` е…Ғи®ёдҪ йҒҚеҺҶжңүеҗ‘еӣҫпјҢеҚідҪҝе®ғд»¬еҢ…еҗ«зҺҜгҖӮеҸӮи§Ғеӣҫ 5-1гҖӮ


    ![A455196_1_En_5_Fig1_HTML.jpg](img/A455196_1_En_5_Fig1_HTML.jpg)


    еӣҫ 5-1

    ## жңүеҗ‘еӣҫ


    ```

    with graph (id, id_parent) as

    (select 2, 1 from dual

    union all select 3, 1 from dual

    union all select 4, 3 from dual

    union all select 5, 4 from dual

    union all select 3, 5 from dual)

    select level lvl, graph.*, connect_by_iscycle cycle

    from graph

    start with id_parent = 1

    connect by nocycle prior id = id_parent;

    LVL         ID  ID_PARENT      CYCLE

    ---------- ---------- ---------- ----------

    1          2          1          0

    1          3          1          0

    2          4          3          0

    3          5          4          1

    ```


    `id = 3` зҡ„иҠӮзӮ№жҳҜ `id = 5` зҡ„иҠӮзӮ№зҡ„еӯҗиҠӮзӮ№пјҢе№¶дё”еңЁжҲ‘д»¬и®ҝй—® `id = 5` зҡ„иҠӮзӮ№ж—¶пјҢе®ғе·Із»Ҹиў«еӨ„зҗҶиҝҮдәҶгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢиҜҘиҠӮзӮ№зҡ„еұӮзә§жһ„е»әдјҡеҒңжӯўпјҢе№¶иў«ж Үи®°дёәзҺҜгҖӮжҚўеҸҘиҜқиҜҙпјҢеҰӮжһңеҪ“еүҚиЎҢзҡ„еӯҗиҠӮзӮ№еҗҢж—¶д№ҹжҳҜе…¶зҘ–е…ҲиҠӮзӮ№пјҢеҲҷ
    `connect_by_iscycle` зӯүдәҺ 1гҖӮ


    еңЁдёҖиҲ¬жғ…еҶөдёӢпјҢдҪҝз”Ё вҖңconnect byвҖқ еӯҗеҸҘж—¶пјҢвҖңstart withвҖқ е’Ң `prior` иҝҗз®—з¬ҰйғҪдёҚжҳҜејәеҲ¶жҖ§зҡ„гҖӮиҝҷеёёз”ЁдәҺз”ҹжҲҗеәҸеҲ—гҖӮд»Јз Ғжё…еҚ• 5-4
    еұ•зӨәдәҶеҮ з§Қж–№жі•гҖӮ


    ```

    select level id from dual connect by level <= 10;

    select rownum id from dual connect by rownum <= 10;

    select rownum id from (select * from dual connect by 1 = 1)

    where rownum <= 10;

    ```


    # д»Јз Ғжё…еҚ• 5-4

    ## дҪҝз”Ё connect by з”ҹжҲҗеәҸеҲ—


    иҝҷдәӣжҹҘиҜўдёҚдјҡиҜҶеҲ«еҮәзҺҜпјҢеӣ дёәеңЁ connect by жқЎд»¶дёӯжІЎжңүдҪҝз”Ё `prior` иҝҗз®—з¬Ұеј•з”ЁзҲ¶и®°еҪ•гҖӮеӣ жӯӨпјҢеҪ“дёҚеӯҳеңЁзҲ¶еӯҗе…ізі»ж—¶пјҢзҺҜе°ұдёҚеҸҜиғҪеӯҳеңЁгҖӮе°қиҜ•еңЁ вҖңconnect
    byвҖқ жқЎд»¶дёӯж·»еҠ и°“иҜҚ `В«prior 1 = 1В»` жқҘжү§иЎҢд»Јз Ғжё…еҚ• 5-4 дёӯзҡ„д»»ж„ҸжҹҘиҜўгҖӮ


    ж–ҮжЎЈдёӯиҜҙпјҡвҖңеңЁеұӮзә§жҹҘиҜўдёӯпјҢ[connect by] жқЎд»¶дёӯзҡ„дёҖдёӘиЎЁиҫҫејҸеҝ…йЎ»дҪҝз”Ё PRIOR иҝҗз®—з¬ҰиҝӣиЎҢйҷҗе®ҡпјҢд»Ҙеј•з”ЁзҲ¶иЎҢгҖӮвҖқ еӣ жӯӨпјҢеҰӮжһңдҪ жғіеј•з”ЁзҲ¶иЎҢпјҢе°ұеҝ…йЎ»дҪҝз”Ё
    `prior` иҝҗз®—з¬ҰпјҢдҪҶдҪ е№¶дёҚиў«ејәеҲ¶еҺ»еј•з”Ёе®ғвҖ”вҖ”д№ҹе°ұжҳҜиҜҙпјҢ`connect by` дёҚд»…еҸҜд»Ҙз”ЁдәҺйҒҚеҺҶеұӮзә§з»“жһ„гҖӮ


    `prior` иҝҗз®—з¬Ұзҡ„е…ій”®зӮ№жҳҜпјҢе…¶дёӯеј•з”Ёзҡ„еҖјеҝ…йЎ»еңЁжһ„е»әеұӮзә§з»“жһ„д№ӢеүҚе°ұеӯҳеңЁгҖӮжӯӨеӨ–пјҢеҪ“дҪ дҪҝз”Ё `prior` иҝҗз®—з¬Ұж—¶пјҢдёҚиғҪеј•з”ЁеңЁеұӮзә§жҹҘиҜўдёӯи®Ўз®—зҡ„еҲ—гҖӮиҝҷж„Ҹе‘ізқҖж— жі•зҙҜз§Ҝи®Ўз®—еӯҗиҠӮзӮ№зҡ„еҖјгҖӮз„¶иҖҢпјҢеҜ№дәҺйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҲҶи§ЈпјҲRecursive
    subquery factoringпјүпјҢеҲҷжІЎжңүиҝҷж ·зҡ„йҷҗеҲ¶пјҢиҝҷе°ҶеңЁдёӢдёҖз« дёӯеұ•зӨәгҖӮ


    дёәдәҶжј”зӨәиҝҷдёӘйҷҗеҲ¶пјҢи®©жҲ‘д»¬иҖғиҷ‘дёҖдёӘд»»еҠЎпјҡзӣ®ж ҮжҳҜз”ҹжҲҗдёҺеҮҪж•° `f` иҝ”еӣһзҡ„зӣёеҗҢеәҸеҲ—пјҲзұ»еһӢ `numbers` еңЁвҖңйӣҶеҗҲиҪ¬зҪ®пјҲUnnesting CollectionsпјүвҖқдёҖиҠӮдёӯе·Іе®ҡд№үпјүгҖӮ


    ```

    create or replace function f(n in number) return numbers as

    result numbers := numbers();

    begin

    result.extend(n + 1);

    result(1) := 1;

    for i in 2 .. n + 1 loop

    result(i) := round(100 * sin(result(i - 1) + i - 2));

    end loop;

    return result;

    end f;

    /

    ```'
- fmt: '# йҖ’еҪ’еәҸеҲ—з”ҹжҲҗдёҺеҫӘзҺҜеӨ„зҗҶ


    иҜҘеҮҪж•°иҝ”еӣһдёҖдёӘйҖ’еҪ’еәҸеҲ—пјҢе…¶дёӯеҪ“еүҚеҖјзӯүдәҺеүҚдёҖдёӘеҖјдёҺе…¶зҙўеј•д№Ӣе’Ңзҡ„жӯЈејҰеҖјпјҢиҜҘе’Ңд№ҳд»Ҙ100е№¶еҸ–ж•ҙгҖӮд»Јз ҒдёӯдҪҝз”Ё`i-2`жҳҜеӣ дёәе…ғзҙ зҙўеј•д»Һйӣ¶ејҖе§ӢгҖӮ


    дёәдәҶзӘҒеҮәеәҸеҲ—зҡ„йҖ’еҪ’зү№жҖ§пјҢе®ғд№ҹеҸҜд»Ҙз”ЁйҖ’еҪ’еҮҪж•°жқҘе®ҡд№үгҖӮ


    ```sql

    create or replace function f(n in number) return numbers as

    result numbers;

    begin

    if n = 0 then return numbers(1);

    else

    result := f(n - 1);

    result.extend;

    result(n + 1) := round(100 * sin(result(n) + n - 1));

    return result;

    end if;

    end f;

    /

    ```


    йүҙдәҺжӯЈејҰеҖјиҢғеӣҙеңЁ[-1, 1]д№Ӣй—ҙпјҢдё”еҮҪж•°еҖјд№ҳд»Ҙ100е№¶еҸ–ж•ҙпјҢеӣ жӯӨеҸҜд»ҘдёәеәҸеҲ—з”ҹжҲҗжүҖжңүеҸҜиғҪзҡ„еҖјвҖ”вҖ”еҚіиҢғеӣҙ[-100, 100]гҖӮеҹәдәҺжӯӨеҒҮи®ҫпјҢеҸҜд»ҘдҪҝз”Ё`connect
    by`жқҘз”ҹжҲҗеәҸеҲ—гҖӮ


    жё…еҚ•[5-5](#A455196_1_En_5_Chapter.html#Par41)дёӯзҡ„жҹҘиҜўд»…з”ҹжҲҗеүҚ14дёӘеҖјиҖҢйқһ21дёӘпјҢеӣ дёәз¬¬14иЎҢиў«иҜҶеҲ«дёәдёҖдёӘеҫӘзҺҜгҖӮ


    ```sql

