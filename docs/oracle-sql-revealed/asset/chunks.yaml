    I believe there is no need to say that this query can also be rewritten to use
    analytic functions instead.


    Listing [8-2](#A455196_1_En_8_Chapter.html#Par28) shows the query that marks Fibonacci
    numbers in a sequence .


    ```

    with t as (select rownum id from dual connect by rownum <= 55)

    select * from t

    match_recognize

    ( order by id

    all rows per match

    pattern ((fib|{-dummy-})+)

    define fib as (id = 1 or id = 2 or id = last(fib.id, 1) + last(fib.id, 2)));

    ID


    Listing 8-2

    Marking Fibonacci numbers using pattern matching

    ```


    This query cannot be rewritten with an analytic function because when we mark
    a row, we need to consider rows marked so far.


    There are a few more interesting details to mention here. Functions like last
    in the `define` clause work in the scope of a matched group. This means that if
    we want to access two previous values for a matched variable, then the whole sequence
    must be one match. To avoid interrupting the match, we used an alternative in
    the pattern. Syntax `{--}` means that rows marked with this label will not be
    part of the result even though they are part of the match. Finally, a crucial
    point is that rows were pre-generated and pattern matching just helped to mark
    the required rows. So pattern matching cannot be used to generate data based on
    some rules unlike model or recursive subquery factoring; however it can be used
    to fill data gaps , for example.


    LetвҖҷs say we have a table with intervals and the goal is to add missing ones.
    For the data below, the missing intervals are (5, 6), (15, 19), and (26, 29).


    ```

    with t(s, e) as (

    select 1, 4 from dual

    union all select 7, 8 from dual

    union all select 9, 10 from dual

    union all select 11, 14 from dual

    union all select 20, 25 from dual

    union all select 30, 40 from dual)

    ```


    Listing [8-3](#A455196_1_En_8_Chapter.html#Par34) shows how missing intervals
    can be added using pattern matching. The `X` pattern variable is used to mark
    consecutive intervals in the match and `Y` marks the interval if there is a gap
    between it and the previous one. We start searching for the next match from `Y`
    so intervals with the preceding gaps appear in the result twiceВ вҖ“ marked as `Y`
    and as `STRT`. For those marked as `Y`, we use them to calculate the start and
    end for missing intervals, and the number of rows marked as `Y` equals to the
    number of missing intervals. To correctly handle the last row we added a fake
    interval (1e10, 1e10).


    ```

    select mr.*

    from (select * from t union all

    select 1e10, 1e10 from dual)

    match_recognize

    ( order by s

    measures

    classifier() cls,

    decode(classifier(), ''Y'', last(cont.e) + 1, s) strt,

    decode(classifier(), ''Y'', s - 1, e) end

    all rows per match with unmatched rows

    after match skip to last y

    pattern (strt x* y)

    subset cont = (strt, x)

    define x as x.s = prev(x.e) + 1

    ) mr

    where s  1e10

    order by strt, end ;

    S CLS         STRT        END          E

