    ```


    жӯӨжӣҙж”№еҗҺзҡ„иҖ—ж—¶дёә5з§’пјҢиҝҷж„Ҹе‘ізқҖдёҺи®°еҪ•ж•°е‘ҲзәҝжҖ§дҫқиө–е…ізі»гҖӮдёҚиҝҮпјҢжңҖеҘҪи®©Oracleз®ЎзҗҶеҶ…еӯҳпјҢд»…й’ҲеҜ№зү№е®ҡжҹҘиҜўе№¶еңЁжңүе……еҲҶзҗҶз”ұж—¶жүҚдҪҝз”ЁжүӢеҠЁеҶ…еӯҳз®ЎзҗҶгҖӮ


    жңҖеҗҺиҰҒжҸҗеҲ°зҡ„жҳҜпјҢеңЁжІЎжңүжЁЎеһӢдё”дҪҝз”Ёй»ҳи®ӨеҶ…еӯҳи®ҫзҪ®зҡ„жғ…еҶөдёӢпјҢ1.2e6иЎҢзҡ„жү§иЎҢж—¶й—ҙд»…дёә2з§’гҖӮжҲ‘иҰҒйҮҚз”іпјҢеҪ“жүҖйңҖз»“жһңеҸҜд»ҘеңЁдёҚдҪҝз”ЁжЁЎеһӢеӯҗеҸҘзҡ„жғ…еҶөдёӢе®һзҺ°ж—¶пјҢеә”йҒҝе…ҚдҪҝз”Ёе®ғгҖӮ


    ```

    select *

    from (select t.*, sum(id) over(order by id desc) result

    from (select rownum id from dual

    connect by rownum <= 1.2e6) t

    order by id)

    where rownum <= 3;

    ```


    е…ідәҺжҖ§иғҪзҡ„и§ӮеҜҹжҖ»з»“еҰӮдёӢпјҡ


    *   жЁЎеһӢеӯҗеҸҘеҜјиҮҙеҜҶйӣҶзҡ„еҶ…еӯҳдҪҝз”ЁгҖӮжҖ»дјҡжңүдёҖдёӘвҖңSPREADSHEETвҖқе·ҘдҪңеҢәж“ҚдҪңпјҢдҪҶеҜ№дәҺж ёеҝғеӨҚжқӮйҖ»иҫ‘пјҢеҸҜиғҪдјҡжңүвҖңWINDOW (SORT)вҖқзӯүе…¶д»–ж“ҚдҪңгҖӮ

    *   и§„еҲҷиҜ„дј°е’Ңж“ҚдҪңеӨ§еһӢе·ҘдҪңеҢәеҸҜиғҪйңҖиҰҒеӨ§йҮҸCPUиө„жәҗгҖӮ

    *   еҪ“з„¶пјҢеёҰжңүиҝҗиЎҢж—¶жү§иЎҢз»ҹи®ЎдҝЎжҒҜзҡ„жҹҘиҜўи®ЎеҲ’жҳҜе®қиҙөзҡ„дҝЎжҒҜжқҘжәҗвҖ”вҖ”е®ғжҳҫзӨәдәҶе“ӘдёӘж“ҚдҪңжңҖж¶ҲиҖ—иө„жәҗд»ҘеҸҠжҜҸдёӘж“ҚдҪңзҡ„еҶ…еӯҳдҪҝз”Ёжғ…еҶөгҖӮ

    *   еңЁжҹҗдәӣжғ…еҶөдёӢпјҢеҲҶеҢәжЁЎеһӢе’Ңе№¶иЎҢжү§иЎҢеҸҜд»Ҙжҳҫи‘—жҸҗй«ҳжҖ§иғҪвҖ”вҖ”иҝҷе°ҶеңЁдёӢдёҖиҠӮдёӯиҝӣдёҖжӯҘз ”з©¶гҖӮ


    ## жЁЎеһӢе№¶иЎҢжү§иЎҢ


    дёәдәҶеҲҶжһҗжЁЎеһӢе№¶иЎҢжү§иЎҢпјҢи®©жҲ‘д»¬иҖғиҷ‘д»ҘдёӢд»»еҠЎпјҡеҜ№дәҺжҜҸдёӘеҲҶеҢәпјҢжҲ‘д»¬йңҖиҰҒи®Ўз®—дёҖдёӘиҝҗиЎҢжҖ»е’ҢпјҢеҪ“иҫҫеҲ°жҹҗдёӘйў„е®ҡд№үйҷҗеҲ¶ж—¶пјҢиҜҘжҖ»е’Ңдјҡжё…йӣ¶гҖӮ


    жё…еҚ• [7-19](#A455196_1_En_7_Chapter.html#Par142) еұ•зӨәдәҶи®Ўз®—йҷҗеҲ¶дёә3e3пјҲ3000пјүзҡ„иҝҗиЎҢжҖ»е’Ңзҡ„жЁЎеһӢжҹҘиҜўгҖӮ


    ```

    create table t (part int, id int, value int);

    begin

    for i in 1 .. 80 loop

    dbms_random.seed(i);

    insert into t

    select i, rownum id, trunc(dbms_random.value(1, 1000 + 1)) value

    from dual

    connect by rownum  3e3 then value[cv(id)]

    else x[cv(id)-1] + value[cv(id)]

    end,

    sid[any] order by id = userenv(''sid'')

    )

    Listing 7-19

    Model clause for conditional running sum calculation

    ```


    зӣёеҗҢзҡ„йҖ»иҫ‘еҸҜд»ҘдҪҝз”Ёе№¶иЎҢз®ЎйҒ“еҮҪж•°е®һзҺ°гҖӮејұ`REF CURSOR`еҸӮж•°еҸӘе…Ғи®ёжҢү`ANY`еҲҶеҢәпјҢеӣ жӯӨжҲ‘д»¬еҲӣе»әдәҶејә`REF CURSOR`д»ҘжҢү`hash(part)`еҲҶеҢәгҖӮ`part`еҲ—д№ҹеңЁ`order
    by`еӯҗеҸҘдёӯжҢҮе®ҡпјҢеӣ дёәдёҚиғҪдҝқиҜҒжҜҸдёӘд»ҺеұһиҝӣзЁӢеҸӘжңүдёҖдёӘеҲҶеҢәгҖӮжӯӨеӨ–пјҢиЎЁеҮҪж•°иҰҒжұӮз»“жһңдҪҝз”ЁSQLйӣҶеҗҲзұ»еһӢгҖӮ


    ```

    create or replace type to_3int as object (part int, x int, sid int)

    /

    create or replace type tt_3int as table of to_3int

    /

    create or replace package pkg as

    type refcur_t is ref cursor return t%rowtype;

    end;

    /

    create or replace function f_running(p in pkg.refcur_t) return tt_3int

    pipelined

    parallel_enable(partition p by hash(part)) order p by(part, id) is

    rec  p%rowtype ;

    prev p%rowtype;

    x    int := 0;

    begin

    loop

    fetch p

    into rec;

    exit when p%notfound;

    if rec.id = 1 then

    x := rec.value;

    elsif x > 3e3 then

    x := rec.value;

    else

    x := x + rec.value;

    end if;

    pipe row(to_3int(rec.part, x, userenv(''sid'')));

    prev := rec;

    end loop;

    return;

    end;

    /

    Listing 7-20

    Pipelined function for parallel processing

    ```


    жҖ§иғҪжөӢиҜ•еңЁе…·жңү80дёӘCPUеҶ…ж ёзҡ„жңҚеҠЎеҷЁдёҠе®ҢжҲҗпјҢд»ҘиҜҰз»ҶеҲҶжһҗе№¶иЎҢжү§иЎҢеҜ№жҖ§иғҪзҡ„еҪұе“ҚгҖӮдҪҝз”ЁдёҚеҗҢзҡ„DOPпјҲе№¶иЎҢеәҰпјүжү§иЎҢд»ҘдёӢжҹҘиҜўпјҢд»ҘжөӢйҮҸPL/SQLж–№жі•зҡ„иҖ—ж—¶гҖӮ


    ```

    select count(distinct sid) c, sum(x*part) s

    from table(f_running(cursor(select /*+ parallel(2) */ * from t)));

    ```


    зұ»дјјең°пјҢдҪҝз”ЁеҢ…еҗ«жЁЎеһӢеӯҗеҸҘзҡ„еҶ…иҒ”и§Ҷеӣҫд»ЈжӣҝиЎЁиҝҗз®—з¬ҰжқҘжөӢиҜ•жЁЎеһӢж–№жі•гҖӮ


    иЎЁ [7-2](#A455196_1_En_7_Chapter.html#Tab2) еұ•зӨәдәҶдёӨз§Қж–№жі•зҡ„жү§иЎҢз»ҹи®Ўж•°жҚ®д»ҘеҸҠиҖ—ж—¶жҜ”гҖӮеҰӮжӮЁжүҖи§ҒпјҢеҚідҪҝеҜ№дәҺдёІиЎҢжү§иЎҢпјҢжЁЎеһӢеӯҗеҸҘд№ҹжҜ”PL/SQLж–№жі•жӣҙеҝ«пјӣжӯӨеӨ–пјҢе®ғжӣҙжңүж•Ҳең°еҲ©з”ЁдәҶе№¶иЎҢжү§иЎҢгҖӮеҜ№дәҺDOP
    20пјҢжЁЎеһӢиҝҗиЎҢйҖҹеәҰжҜ”PL/SQLеҮҪж•°еҝ«3еҖҚд»ҘдёҠгҖӮе°ҶDOPеўһеҠ еҲ°40дјҡеҜ№PL/SQLзҡ„жҖ§иғҪдә§з”ҹиҙҹйқўеҪұе“ҚпјҢеӣ дёәз®ЎзҗҶе№¶иЎҢжү§иЎҢзҡ„ејҖй”ҖжҲҗжң¬жҠ‘еҲ¶дәҶж”¶зӣҠгҖӮ


    иЎЁ 7-2

    е№¶иЎҢжү§иЎҢз»ҹи®Ў


    | DOP | Actual DOP | PL/SQL | Model | Ratio |

    | --- | --- | --- | --- | --- |

    | `Serial` | `1` | `01:47.37` | `53.34` | `2.01` |

    | `4` | `4` | `36.59` | `15.83` | `2.31` |

    | `10` | `10` | `19.78` | `08.72` | `2.27` |

    | `20` | `19` | `16.22` | `05.24` | `3.1` |

    | `40` | `34` | `18.72` | `04.35` | `4.3` |


    йңҖиҰҒжіЁж„Ҹзҡ„жҳҜпјҢз”ЁдәҺеәҸеҲ—з”ҹжҲҗзҡ„PL/SQLж–№жі•жӣҙеҘҪпјҢиҖҢеҜ№дәҺжӯӨд»»еҠЎпјҢжЁЎеһӢжӣҙеҝ«гҖӮиҝҷжҳҜеӣ дёәжҲ‘д»¬еңЁз¬¬дёҖз§Қжғ…еҶөдёӢдҪҝз”ЁдәҶж•°еӯ—йӣҶеҗҲпјҢдҪҶеңЁз¬¬дәҢз§Қжғ…еҶөдёӢдҪҝз”ЁдәҶеҜ№иұЎйӣҶеҗҲгҖӮOracleйңҖиҰҒйўқеӨ–зҡ„CPUиө„жәҗжқҘдёәжҜҸдёҖиЎҢжһ„йҖ еҜ№иұЎгҖӮжӯӨеӨ–пјҢеәҸеҲ—з”ҹжҲҗйңҖиҰҒ`sin`е’Ң`round`еҮҪж•°пјҢиҖҢжқЎд»¶иҝҗиЎҢжҖ»е’Ңзҡ„йҖ»иҫ‘дёӯеҸӘдҪҝз”ЁдәҶеҺҹе§Ӣж“ҚдҪңгҖӮйҖ»иҫ‘и¶ҠеӨҚжқӮпјҢдёәжҜҸиЎҢжһ„йҖ еҜ№иұЎзҡ„еҪұе“Қе°ұи¶Ҡе°ҸгҖӮ'
  raw: 'Query plans for a model clause to generate a recursive sequence were trivial
    - `SQL MODEL ORDERED FAST` and `SQL MODEL ORDERED` for iterative and non-iterative
    model respectively.


    Listing [7-17](#A455196_1_En_7_Chapter.html#Par125) shows a query with a model
    clause that requires some additional operations because of the analytic/aggregate
    function in it. LetвҖҷs execute the query with an analytic function for 1e6 and
    1.2e6 (20% more) number of rows and do the same for the aggregate function. There
    is no need for the model in this query at all, and itвҖҷs used purely for performance
    analysis.


    ```

    select *

    from

    (select *

    from (select rownum id from dual connect by rownum = cv(id)]

    )

    order by id

    )

    where rownum <= 3;

    ID      VALUE           RESULT

    ---------- ---------- ----------------

    1          1     500000500000

    2          2     500000499999

    3          3     500000499997

    Listing 7-17

    Analytic/aggregate functions in model clause

    ```


    Execution time for 1e6 rows was 4 seconds in both casesВ вҖ“ this is not surprising
    because plans for aggregate and analytic functions are the same. But elapsed time
    jumped to 8 seconds when we increased the number of rows by 20%.


    ```


    | Id  | Operation                          | Name |


    |   0 | SELECT STATEMENT                   |      |

    |   1 |  COUNT STOPKEY                     |      |

    |   2 |   VIEW                             |      |

    |   3 |    SORT ORDER BY STOPKEY           |      |

    |   4 |     SQL MODEL ORDERED              |      |

    |   5 |      VIEW                          |      |

    |   6 |       COUNT                        |      |

    |   7 |        CONNECT BY WITHOUT FILTERING|      |

    |   8 |         FAST DUAL                  |      |

    |   9 |      WINDOW (IN SQL MODEL) SORT    |      |


    Listing 7-18

    Execution time for model with analytic/aggregate function

    ```


    There was not enough memory for the query execution when we increased the number
    of rows so Oracle started using temporary tablespaceВ вҖ“ this is the reason for
    nonlinear elapsed time growth. You can check that by running the query below for
    the corresponding SQL_ID.


    ```

    select pga_allocated / (1024 * 1024) pga_mb,

    temp_space_allocated / (1024 * 1024) temp_mb,

    ash.*

    from v$active_session_history ash

    where sql_id = ''''

    order by sample_time desc

    ```


    LetвҖҷs switch to manual memory management and increase memory for sorting to the
    max possible valueВ вҖ“ 2GB.


    ```

    alter session set workarea_size_policy = manual;

    alter session set sort_area_size = 2147483647;

    ```


    Elapsed time after this change is 5 second, which means linear dependency on the
    record count. ItвҖҷs better to let Oracle manage memory though and use manual memory
    management only for specific queries and when there is a strong reason for it.


    The last thing to mention is that execution time for 1.2e6 rows without a model
    and with default memory settings is just 2 seconds. Let me reiterate that you
    should avoid using a model clause when the required result can be achieved without
    it.


    ```

    select *

    from (select t.*, sum(id) over(order by id desc) result

    from (select rownum id from dual

    connect by rownum <= 1.2e6) t

    order by id)

    where rownum <= 3;

    ```


    Summarizing observations regarding performance:


    *   Model clause causes intensive memory usage. There is always вҖңSPREADSHEETвҖқ
    work area operation, but for core complex logic there may be вҖңWINDOW (SORT)вҖқ and
    others.

    *   Rule evaluation and operating on huge work areas may require a lot of CPU
    resources.

    *   Of course, a query plan with runtime execution statistics is an invaluable
    source of informationВ вҖ“ it shows which operation was the most resource consumptive
    as well as memory usage per operation.

    *   In some cases, the partitioned model and parallel execution may dramatically
    improve the performanceВ вҖ“ this will be investigated further in the next section.


    ## Model Parallel Execution


    To analyze model parallel execution, letвҖҷs consider the following task: for each
    partition we need to calculate a running sum that drops to zero when reaches some
    predefined limit.


    Listing [7-19](#A455196_1_En_7_Chapter.html#Par142) shows the model query to calculate
    running for limit 3e3 (3000).


    ```

    create table t (part int, id int, value int);

    begin

    for i in 1 .. 80 loop

    dbms_random.seed(i);

    insert into t

    select i, rownum id, trunc(dbms_random.value(1, 1000 + 1)) value

    from dual

    connect by rownum  3e3 then value[cv(id)]

    else x[cv(id)-1] + value[cv(id)]

    end,

    sid[any] order by id = userenv(''sid'')

    )

    Listing 7-19

    Model clause for conditional running sum calculation

    ```


    The same logic can be implemented using a parallel pipelined function. A weak
    REF CURSOR parameter allows only partitioning by ANY so we created a strong REF
    CURSOR to partition by the hash(part). The column part also specified in order
    by clause because there is no guarantee that there will be one partition per slave.
    Also the table function requires an SQL collection type for result.


    ```

    create or replace type to_3int as object (part int, x int, sid int)

    /

    create or replace type tt_3int as table of to_3int

    /

    create or replace package pkg as

    type refcur_t is ref cursor return t%rowtype;

    end;

    /

    create or replace function f_running(p in pkg.refcur_t) return tt_3int

    pipelined

    parallel_enable(partition p by hash(part)) order p by(part, id) is

    rec  p%rowtype ;

    prev p%rowtype;

    x    int := 0;

    begin

    loop

    fetch p

    into rec;

    exit when p%notfound;

    if rec.id = 1 then

    x := rec.value;

    elsif x > 3e3 then

    x := rec.value;

    else

    x := x + rec.value;

    end if;

    pipe row(to_3int(rec.part, x, userenv(''sid'')));

    prev := rec;

    end loop;

    return;

    end;

    /

    Listing 7-20

    Pipelined function for parallel processing

    ```


    Performance testing was done on a server with 80 CPU cores for granular analysis
    of parallel execution impact on the performance. The following query was executed
    with a different DOP (degree of parallelism) to measure elapsed time for a PL/SQL
    approach.


    ```

    select count(distinct sid) c, sum(x*part) s

    from table(f_running(cursor(select /*+ parallel(2) */ * from t)));

    ```


    Similarly, an inline view with a model clause was used instead of a table operator
    to test the model approach.


    TableВ [7-2](#A455196_1_En_7_Chapter.html#Tab2) represents execution statics for
    two approaches and a ratio between elapsed times. As you see, the model clause
    is faster than a PL/SQL approach even for serial execution; moreover it leverages
    parallel execution more efficiently. For a DOP 20 model runs more than 3 times
    faster than a PL/SQL function. Increasing DOP to 40 negatively impacts performance
    of a PL/SQL because overhead costs to manage parallel execution stifle the benefit.


    Table 7-2


    Parallel execution statistics


    | DOP | Actual DOP | PL/SQL | Model | Ratio |

    | --- | --- | --- | --- | --- |

    | `Serial` | `1` | `01:47.37` | `53.34` | `2.01` |

    | `4` | `4` | `36.59` | `15.83` | `2.31` |

    | `10` | `10` | `19.78` | `08.72` | `2.27` |

    | `20` | `19` | `16.22` | `05.24` | `3.1` |

    | `40` | `34` | `18.72` | `04.35` | `4.3` |


    ItвҖҷs important to note that a PL/SQL approach for sequence generation was better,
    while for this task the model is faster. This is because we used a collection
    of numbers in the first case but a collection of objects in the second case. Oracle
    requires additional CPU resources to construct the object for every single row.
    Also sequence generation required `sin` and `round` functions, while only primitive
    operations were used in the logic for the conditional running sum. The more complex
    the logic is, the less the impact of constructing an object for each row.'
  trans: '# SQL жЁЎеһӢеӯҗеҸҘжҖ§иғҪеҲҶжһҗ


    з”ЁдәҺз”ҹжҲҗйҖ’еҪ’еәҸеҲ—зҡ„жЁЎеһӢеӯҗеҸҘзҡ„жҹҘиҜўи®ЎеҲ’еҫҲз®ҖеҚ•вҖ”вҖ”иҝӯд»ЈжЁЎеһӢдҪҝз”Ё`SQL MODEL ORDERED FAST`пјҢйқһиҝӯд»ЈжЁЎеһӢдҪҝз”Ё`SQL MODEL ORDERED`гҖӮ


    жё…еҚ• 7-17 еұ•зӨәдәҶдёҖдёӘеҢ…еҗ«жЁЎеһӢеӯҗеҸҘзҡ„жҹҘиҜўпјҢз”ұдәҺе…¶дёӯзҡ„еҲҶжһҗ/иҒҡеҗҲеҮҪж•°пјҢиҜҘжҹҘиҜўйңҖиҰҒдёҖдәӣйўқеӨ–зҡ„ж“ҚдҪңгҖӮи®©жҲ‘д»¬еҲҶеҲ«й’ҲеҜ№ 1e6 иЎҢе’Ң 1.2e6 иЎҢпјҲеўһеҠ  20%пјүжү§иЎҢеёҰжңүеҲҶжһҗеҮҪж•°зҡ„жҹҘиҜўпјҢе№¶еҜ№иҒҡеҗҲеҮҪж•°жү§иЎҢзӣёеҗҢж“ҚдҪңгҖӮжӯӨжҹҘиҜўдёӯж №жң¬дёҚйңҖиҰҒжЁЎеһӢпјҢе®ғзәҜзІ№з”ЁдәҺжҖ§иғҪеҲҶжһҗгҖӮ


    ```

    select *

    from

    (select *

    from (select rownum id from dual connect by rownum = cv(id))]

    )

    order by id

    )

    where rownum <= 3;

    ID      VALUE           RESULT

    ---------- ---------- ----------------

    1          1     500000500000

    2          2     500000499999

    3          3     500000499997

    жё…еҚ• 7-17

    жЁЎеһӢеӯҗеҸҘдёӯзҡ„еҲҶжһҗ/иҒҡеҗҲеҮҪж•°

