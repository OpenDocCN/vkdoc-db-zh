    ## еӣҫзҒөе®ҢеӨҮжҖ§жҰӮиҝ°


    еӣҫзҒөе®ҢеӨҮжҖ§жҳҜи®Ўз®—жңәз§‘еӯҰдёӯдёҖдёӘйқһеёёйҮҚиҰҒзҡ„жҰӮеҝөпјҢеӣ дёәдёҖдёӘжЁЎеһӢе…·еӨҮеӣҫзҒөе®ҢеӨҮжҖ§ж„Ҹе‘ізқҖе®ғеҸҜд»Ҙжү§иЎҢд»»дҪ•з®—жі•пјҢж— и®әиҜҘз®—жі•еӨҡд№ҲеӨҚжқӮгҖҒдҪҝз”ЁдәҶдҪ•з§Қж•°жҚ®з»“жһ„пјҢжҲ–иҖ…йңҖиҰҒеӨҡе°‘еӯҳеӮЁз©әй—ҙе’Ңж—¶й—ҙжқҘиҜ„дј°е®ғгҖӮSQL
    еҸҜд»Ҙиў«и§ҶдёәеҸҰдёҖз§Қи®Ўз®—жЁЎеһӢпјҢе°Ҫз®Ўе®ғе№¶йқһи®ҫи®Ўз”ЁдәҺе®һзҺ°д»»дҪ•з®—жі•жҲ–дёҡеҠЎйҖ»иҫ‘пјҢдҪҶдёәдәҶе®Ңж•ҙжҖ§пјҢеҲҶжһҗе®ғжҳҜеҗҰжҳҜеӣҫзҒөе®ҢеӨҮзҡ„д№ҹеҫҲжңүи¶ЈгҖӮжӯӨеӨ–пјҢжӯЈеҰӮе°ҶеңЁдёӢдёҖз« вҖңеҪ“ PL/SQL дјҳдәҺеҺҹз”ҹ
    SQL ж—¶вҖқдёӯеұ•зӨәзҡ„пјҢжңүж—¶еҚідҪҝдёҖдёӘз®—жі•еҸҜд»ҘеҫҲе®№жҳ“ең°з”ЁзәҜ SQL е®һзҺ°пјҢе®ғд№ҹе№¶йқһиҺ·еҫ—з»“жһңзҡ„жңҖдҪіж–№ејҸгҖӮ


    еңЁи®Ўз®—зҗҶи®әдёӯпјҢдёҖдёӘж•°жҚ®ж“ҚдҪңи§„еҲҷзі»з»ҹпјҲжҲ–и®Ўз®—жЁЎеһӢпјүиў«з§°дёәжҳҜеӣҫзҒөе®ҢеӨҮзҡ„пјҢеҰӮжһңе®ғеҸҜд»Ҙз”ЁжқҘжЁЎжӢҹд»»дҪ•еӣҫзҒөжңәгҖӮиҝҷзұ»зі»з»ҹзҡ„дҫӢеӯҗеҢ…жӢ¬пјҡеӨ„зҗҶеҷЁзҡ„жҢҮд»ӨйӣҶгҖҒдёҖз§Қзј–зЁӢиҜӯиЁҖгҖҒдёҖдёӘе…ғиғһиҮӘеҠЁжңәпјҢз”ҡиҮіжҳҜз»ҲжһҒзІҫз®ҖжҢҮд»ӨйӣҶи®Ўз®—жңәпјҲURISCпјүгҖӮеҸҰдёҖж–№йқўпјҢдёҖдәӣе№ҝдёәдәәзҹҘзҡ„и®Ўз®—жЁЎеһӢе№¶дёҚжҳҜеӣҫзҒөе®ҢеӨҮзҡ„вҖ”вҖ”дҫӢеҰӮпјҢзЎ®е®ҡжҖ§жңүйҷҗиҮӘеҠЁжңәпјҲDFAпјүгҖӮ


    ж №жҚ®дёҳеҘҮ-еӣҫзҒөи®әйўҳпјҢвҖңжүҖжңүзү©зҗҶдёҠеҸҜи®Ўз®—зҡ„еҮҪж•°йғҪжҳҜеӣҫзҒөеҸҜи®Ўз®—зҡ„вҖқпјҢжҚўеҸҘиҜқиҜҙпјҢеҰӮжһңжҹҗдёӘи®Ўз®—жЁЎеһӢеҸҜд»ҘжЁЎжӢҹеӣҫзҒөжңәпјҢйӮЈд№Ҳе®ғе°ұеҸҜд»Ҙе®һзҺ°д»»дҪ•еҸҜи®Ўз®—еҮҪж•°гҖӮ


    иҜҒжҳҺдёҖз§ҚиҜӯиЁҖжҳҜеҗҰжҳҜеӣҫзҒөе®ҢеӨҮзҡ„жңҖз®ҖеҚ•ж–№жі•д№ӢдёҖпјҢжҳҜе®һзҺ°дёҖдёӘз§°дёә **Rule 110** зҡ„еҹәжң¬е…ғиғһиҮӘеҠЁжңәпјҢиҜҘиҮӘеҠЁжңәжҳҜеӣҫзҒөе®ҢеӨҮзҡ„вҖ”вҖ”иҜҒжҳҺеҸҜд»ҘеңЁйҷ„еҪ•зҡ„жіЁйҮҠ [7]
    дёӯжүҫеҲ°гҖӮ


    ## Rule 110 е…ғиғһиҮӘеҠЁжңә


    еңЁдёҖдёӘеҹәжң¬е…ғиғһиҮӘеҠЁжңәдёӯпјҢдёҖдёӘз”ұ 0 е’Ң 1 з»„жҲҗзҡ„дёҖз»ҙжЁЎејҸж №жҚ®дёҖз»„з®ҖеҚ•зҡ„и§„еҲҷжј”еҢ–гҖӮжЁЎејҸдёӯзҡ„дёҖдёӘзӮ№еңЁж–°дёҖд»ЈдёӯжҳҜ 0 иҝҳжҳҜ 1пјҢеҸ–еҶідәҺе®ғзҡ„еҪ“еүҚеҖјд»ҘеҸҠе®ғдёӨдёӘйӮ»еұ…зҡ„еҖјпјҢеҰӮиЎЁ
    [10-1](#A455196_1_En_10_Chapter.html#Tab1) жүҖжҸҸиҝ°гҖӮеҜ№дәҺз¬¬дёҖдёӘз¬ҰеҸ·пјҢе…¶е·ҰйӮ»еұ…жҳҜзәёеёҰдёҠзҡ„жңҖеҗҺдёҖдёӘз¬ҰеҸ·пјӣеҜ№дәҺжңҖеҗҺдёҖдёӘз¬ҰеҸ·пјҢе…¶еҸійӮ»еұ…жҳҜз¬¬дёҖдёӘз¬ҰеҸ·гҖӮ


    **иЎЁ 10-1** Rule 110 иҮӘеҠЁжңәзҡ„и§„еҲҷйӣҶ


    | еҪ“еүҚжЁЎејҸ | 111 | 110 | 101 | 100 | 011 | 010 | 001 | 000 |

    | дёӯеҝғеҚ•е…ғж јзҡ„ж–°зҠ¶жҖҒ | 0 | 1 | 1 | 0 | 1 | 1 | 1 | 0 |


    е®ғиў«з§°дёә Rule 110пјҢжҳҜеӣ дёәж–°зҡ„зҠ¶жҖҒеәҸеҲ— `01101110` и§ЈйҮҠдёәдёҖдёӘдәҢиҝӣеҲ¶ж•°ж—¶пјҢеҜ№еә”дәҺеҚҒиҝӣеҲ¶еҖј 110гҖӮ


    жё…еҚ• [10-1](#A455196_1_En_10_Chapter.html#Par8) еұ•зӨәдәҶеҜ№еҲқе§ӢзәёеёҰ `000000000010000000000000010000`
    иҝҗиЎҢ Rule 110 зҡ„еүҚ 19 жӯҘиҜ„дј°зӨәдҫӢгҖӮ


    ```

    PART STR

    ---------- ----------------------------------------

    1 000000000010000000000000010000

    2 000000000110000000000000110000

    3 000000001110000000000001110000

    4 000000011010000000000011010000

    5 000000111110000000000111110000

    6 000001100010000000001100010000

    7 000011100110000000011100110000

    8 000110101110000000110101110000

    9 001111111010000001111111010000

    10 011000001110000011000001110000

    11 111000011010000111000011010000

    12 101000111110001101000111110001

    13 111001100010011111001100010011

    14 001011100110110001011100110110

    15 011110101111110011110101111110

    16 110011111000010110011111000010

    17 110110001000111110110001000111

    18 011110011001100011110011001100

    19 110010111011100110010111011100

    20 110111101110101110111101110101

    ```

    **жё…еҚ• 10-1** Rule 110 зҡ„иҜ„дј°зӨәдҫӢ


    ## дҪҝз”Ё SQL е®һзҺ° Rule 110


    жё…еҚ• [10-2](#A455196_1_En_10_Chapter.html#Par10) еұ•зӨәдәҶеҰӮдҪ•дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–е’ҢеҲҶжһҗеҮҪж•°жқҘе®һзҺ° Rule 110гҖӮз®ҖиҖҢиЁҖд№ӢпјҢзәёеёҰиў«иҪ¬жҚўжҲҗдёҖдёӘи®°еҪ•йӣҶпјҢе…¶дёӯдёҖиЎҢд»ЈиЎЁдёҖдёӘз¬ҰеҸ·пјҢеҲҶжһҗеҮҪж•°з”ЁдәҺжҺЁеҜјжҜҸдёӘеҖјзҡ„йӮ»еұ…пјӣз”ҹжҲҗжүҖйңҖжӯҘж•°зҡ„з¬ҰеҸ·еҗҺпјҢе®ғд»¬иў«иҝһжҺҘжҲҗеӯ—з¬ҰдёІгҖӮ


    ```

    with t0 as

    (select ''000000000010000000000000010000'' str from dual),

    t1 as

    (select 1 part, rownum rn, substr(str, rownum, 1) x

    from t0

    connect by substr(str, rownum, 1) is not null),

    t2(part, rn, x) as

    (select part, rn, cast(x as char(1))

    from t1

    union all

    select part + 1,

    rn,

    case nvl(lag(x) over(order by rn),

    last_value(x) over(order by rn rows

    between current row and unbounded following))

    || x ||

    nvl(lead(x) over(order by rn),

    first_value(x) over(order by rn rows

    between unbounded preceding and current row))

    when ''111'' then ''0''

    when ''110'' then ''1''

    when ''101'' then ''1''

    when ''100'' then ''0''

    when ''011'' then ''1''

    when ''010'' then ''1''

    when ''001'' then ''1''

    else ''0''

    end

    from t2

    where part < 20)

    select part, listagg(x) within group(order by rn) str

    from t2

    group by part

    order by 1;

    ```

    **жё…еҚ• 10-2** дҪҝз”ЁйҖ’еҪ’еӯҗжҹҘиҜўеӣ еӯҗеҢ–е®һзҺ° Rule 110


    еҰӮжһңжІЎжңүеҲҶжһҗеҮҪж•°пјҢе°ұж— жі•жҺЁеҜјйӮ»еұ…зҡ„еҖјпјҢеӣ дёәйҖ’еҪ’жҹҘиҜўеҗҚз§°еңЁйҖ’еҪ’еҲҶж”ҜдёӯеҸӘиғҪиў«еј•з”ЁдёҖж¬ЎпјҢеӣ жӯӨдёҚе…Ғи®ёдҪҝз”ЁеҢ…еҗ«йҖ’еҪ’жҹҘиҜўеҗҚз§°зҡ„еӯҗжҹҘиҜўиҝӣиЎҢиҮӘиҝһжҺҘгҖӮеӣ жӯӨпјҢжҲ‘и®ӨдёәеңЁйҖ’еҪ’еҲҶж”ҜдёӯдёҚж”ҜжҢҒеҲҶжһҗеҮҪж•°зҡ„
    SQL дёҚжҳҜеӣҫзҒөе®ҢеӨҮзҡ„пјӣдёҚиҝҮиҝҷдёҖзӮ№иҝҳжңүеҫ…иҜҒжҳҺгҖӮ


    ## е…ідәҺз®—жі•е®һзҺ°дёҺеӣҫзҒөе®ҢеӨҮжҖ§зҡ„и®Ёи®ә


    дёҖж—ҰиҜҒжҳҺдәҶе…ғиғһиҮӘеҠЁжңәеҸҜд»Ҙз”ЁжқҘе®һзҺ°д»»дҪ•з®—жі•пјҢдәәд»¬еҸҜиғҪдјҡй—®вҖңеҰӮдҪ•е®һйҷ…з”Ёе®ғжқҘеҒҡеҲ°иҝҷдёҖзӮ№пјҹдҫӢеҰӮпјҢе®һзҺ°дёҖдёӘйқһеёёз®ҖеҚ•зҡ„дёӨж•°зӣёеҠ зҡ„дҫӢзЁӢгҖӮвҖқдёәдәҶеҒҡеҲ°иҝҷдёҖзӮ№пјҢ0 е’Ң 1 зҡ„жЁЎејҸеҝ…йЎ»еҗҢж—¶иў«и§Ҷдёәж•°жҚ®е’Ңд»Јз ҒпјҢеӣ жӯӨеҝ…йЎ»д»Ҙзү№е®ҡж–№ејҸжһ„йҖ иҫ“е…ҘзәёеёҰгҖӮжҚўеҸҘиҜқиҜҙпјҢз®—жі•еҝ…йЎ»зј–з ҒеңЁиҫ“е…ҘзәёеёҰдёӯвҖ”вҖ”иҖҢдёҚжҳҜеңЁ
    SQL дёӯгҖӮ


    е…ідәҺ Rule 110 жңҖеҗҺиҰҒжҸҗзҡ„дёҖзӮ№жҳҜпјҢеҚідҪҝдёҚдҪҝз”Ёиҝӯд»ЈпјҢд№ҹеҸҜд»ҘдҪҝз”Ё `model` еӯҗеҸҘзӣёеҜ№з®ҖеҚ•ең°е®һзҺ°д»»ж„Ҹй•ҝеәҰзәёеёҰзҡ„и®Ўз®—гҖӮдёҚиҝҮпјҢжӯӨзұ» SQL жЁЎжӢҹйҖҹеәҰзӣёеҪ“ж…ўпјҢеҸӘиғҪз”ЁдәҺеӯҰжңҜзӣ®зҡ„гҖӮ


    д»ҺеӯҰжңҜи§’еәҰжқҘзңӢпјҢ`model` еӯҗеҸҘиҝҳжңүеҸҰдёҖдёӘжңүи¶Јзҡ„зү№зӮ№вҖ”вҖ”еҰӮжһңдҪ иғҪж¶ҲйҷӨеөҢеҘ—еҫӘзҺҜпјҲиҝҷеңЁзҗҶи®әдёҠжҖ»жҳҜеҸҜиғҪзҡ„пјүпјҢе®ғе°ұеҸҜд»Ҙз”ЁжқҘе®һзҺ°д»»дҪ•з®—жі•гҖӮдёәдәҶжј”зӨәиҝҷдёҖзӮ№пјҢи®©жҲ‘д»¬зңӢдёҖдёӢжё…еҚ•
    [10-3](#A455196_1_En_10_Chapter.html#Par15) дёӯеұ•зӨәзҡ„еҶ’жіЎжҺ’еәҸз®—жі•гҖӮ


    ```

    declare

    s varchar2(4000) := ''abcd c*de 01'';

    n number := length(s);

    j number := 1;

    k number := 1;

    x number := 1;

    i number := 1;

    begin

    while x > 0 loop

    x := 0;

    for j in 1 .. n - k loop

    i := i + 1;

    if substr(s, j + 1, 1) < substr(s, j, 1) then

    s := substr(s, 1, j - 1) || substr(s, j + 1, 1) ||

    substr(s, j, 1) || substr(s, j + 2);

    x := 1;

    end if;

    end loop;

    k := k + 1;

    end loop;

    dbms_output.put_line(i || s);

    end;

    ```

    **жё…еҚ• 10-3** з¬ҰеҸ·еӯ—з¬ҰдёІзҡ„еҶ’жіЎжҺ’еәҸ


    жҲ‘д»¬йҮҚеӨҚеөҢеҘ—еҫӘзҺҜпјҢзӣҙеҲ°еҪ“еүҚ `while` еҫӘзҺҜиҝӯд»ЈдёӯиҮіе°‘еҸ‘з”ҹдёҖж¬ЎдәӨжҚўпјҢиҝҷйҖҡиҝҮеҸҳйҮҸ `x` жқҘж Үи®°гҖӮ


    еңЁжё…еҚ• [10-4](#A455196_1_En_10_Chapter.html#Par18) дёӯе°Ҷе…¶иҪ¬жҚўдёәеҚ•дёӘ `while` еҫӘзҺҜеҗҺпјҢжҲ‘д»¬еј•е…ҘдәҶдёҖдёӘйўқеӨ–зҡ„ж Үеҝ—
    `c`гҖӮиҝҷдёӘж Үеҝ—зұ»дјјдәҺжё…еҚ• [10-3](#A455196_1_En_10_Chapter.html#Par15) дёӯзҡ„ `x`пјҢиҖҢ `x` жң¬иә«е§Ӣз»ҲзӯүдәҺ
    1пјҢе№¶дё”еҸӘжңүеңЁвҖңеҶ…еұӮеҫӘзҺҜвҖқе®ҢжҲҗж—¶жүҚеҸҜиғҪйҮҚзҪ®дёәйӣ¶пјҢеӣ жӯӨеҸӘжңүеҪ“жҲ‘д»¬еӨ„зҗҶе®ҢеҪ“еүҚжӯҘйӘӨзҡ„жүҖжңүз¬ҰеҸ·дё”жІЎжңүеҸ‘з”ҹдәӨжҚўпјҲеҚі `c = 0`пјүж—¶пјҢз®—жі•жүҚиғҪз»ҲжӯўгҖӮ


    ```

    declare

    s varchar2(4000) := ''abcd c*de 01'';

    n number := length(s);

    j number := 1;

    k number := 1;

    x number := 1;

    i number := 1;

    c number := 0;

    begin

    while x > 0 loop

    i := i + 1;

    c := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then 1

    else case when j = 1 then 0 else c end

    end;

    s := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then substr(s, 1, j - 1) || substr(s, j + 1, 1) ||

    substr(s, j, 1) || substr(s, j + 2)

    else s

    end;

    x := case when j = n - k and c = 0 then 0 else 1 end;

    k := case when j = n - k then k + 1 else k end;

    j := case when j - 1 = n - k then 1 else j + 1 end;

    end loop;

    dbms_output.put_line(i || s);

    end;

    ```

    **жё…еҚ• 10-4** дҪҝз”ЁеҚ•дёӘ while еҫӘзҺҜзҡ„еҶ’жіЎжҺ’еәҸ'
  raw: '# 10.В Turing Completeness


    Turing completeness is a very important notion in computer science because being
    Turing complete means that your model of computations can execute any algorithm
    no matter how complex itвҖҷs, what data structures are used, and how much storage
    or time would be needed to evaluate it. SQL can be considered as yet another example
    of a model of computations and even though itвҖҷs not supposed to be used to implement
    any algorithm or business logic, itвҖҷs interesting to analyze whether itвҖҷs Turing
    complete or not for the sake of completeness. Moreover, as will be shown in the
    next chapter вҖңWhen PL/SQL Is Better Than Vanilla SQL,вҖқ sometimes pure SQL is not
    the best way to get the result even if an algorithm can be easily implemented
    using it.


    In computation theory, a system of data-manipulation rules (or model of computations)
    is said to be Turing complete if it can be used to simulate any Turing machine.
    The examples of such systems are the following: processorвҖҷs instruction set, a
    programming language, a cellular automaton, or even an ultimate reduced instruction
    set computer (URISC). On the other hand, some widely known models of computations
    are not Turing completeВ вҖ“ for instance, deterministic finite automaton (DFA) .


    According to the ChurchвҖ“Turing thesis , вҖңAll physically computable functions are
    Turing-computable,вҖқ or in other words, if some model of computations can simulate
    a Turing machine then it can implement any computable function.


    One of the easiest ways to prove whether language is Turing complete is to implement
    an elementary cellular automaton called Rule 110, which is Turing completeВ вҖ“ proof
    can be found in note [7] in the Appendix.


    In an elementary cellular automaton , a one-dimensional pattern of 0s and 1s evolves
    according to a simple set of rules. Whether a point in the pattern will be 0 or
    1 in the new generation depends on its current value, as well as on those of its
    two neighbors as described in Table [10-1](#A455196_1_En_10_Chapter.html#Tab1).
    The left neighbor for the first symbol is the last symbol in the tape and the
    right neighbor for the last symbol is the first symbol.


    Table 10-1


    The set of rules for Rule 110 automaton


    | Current pattern | 111 | 110 | 101 | 100 | 011 | 010 | 001 | 000 |

    | New start for the center cell | 0 | 1 | 1 | 0 | 1 | 1 | 1 | 0 |


    Rule 110 is called like that because if a binary sequence for new states 01101110
    interpreted as a binary number corresponds to the decimal value 110.


    Listing [10-1](#A455196_1_En_10_Chapter.html#Par8) shows the example of an evaluation
    for the first 19 steps of Rule 110 for the initial tape `000000000010000000000000010000`.


    ```

    PART STR

    ---------- ----------------------------------------

    1 000000000010000000000000010000

    2 000000000110000000000000110000

    3 000000001110000000000001110000

    4 000000011010000000000011010000

    5 000000111110000000000111110000

    6 000001100010000000001100010000

    7 000011100110000000011100110000

    8 000110101110000000110101110000

    9 001111111010000001111111010000

    10 011000001110000011000001110000

    11 111000011010000111000011010000

    12 101000111110001101000111110001

    13 111001100010011111001100010011

    14 001011100110110001011100110110

    15 011110101111110011110101111110

    16 110011111000010110011111000010

    17 110110001000111110110001000111

    18 011110011001100011110011001100

    19 110010111011100110010111011100

    20 110111101110101110111101110101

    Listing 10-1

    Example of evaluation for Rule 110

    ```


    Listing [10-2](#A455196_1_En_10_Chapter.html#Par10) shows how Rule 110 can be
    implemented using recursive subquery factoring and analytic functions . In a nutshell,
    the tape is transformed into a recordset where one row is one symbol and analytic
    functions are used to derive neighbors for each value, after symbols for the required
    steps are generated, they getting concatenated into strings.


    ```

    with t0 as

    (select ''000000000010000000000000010000'' str from dual),

    t1 as

    (select 1 part, rownum rn, substr(str, rownum, 1) x

    from t0

    connect by substr(str, rownum, 1) is not null),

    t2(part, rn, x) as

    (select part, rn, cast(x as char(1))

    from t1

    union all

    select part + 1,

    rn,

    case nvl(lag(x) over(order by rn),

    last_value(x) over(order by rn rows

    between current row and unbounded following))

    || x ||

    nvl(lead(x) over(order by rn),

    first_value(x) over(order by rn rows

    between unbounded preceding and current row))

    when ''111'' then ''0''

    when ''110'' then ''1''

    when ''101'' then ''1''

    when ''100'' then ''0''

    when ''011'' then ''1''

    when ''010'' then ''1''

    when ''001'' then ''1''

    else ''0''

    end

    from t2

    where part < 20)

    select part, listagg(x) within group(order by rn) str

    from t2

    group by part

    order by 1;

    Listing 10-2

    Implementation of Rule 110 using recursive subquery factoring

    ```


    Without analytic functions itвҖҷs not possible to derive values for neighbors because
    a recursive query name must be referenced only once in a recursive branch, so
    self joins of subqueries with a recursive query name are not allowed. Therefore
    I do not think that SQL is Turing complete without support of analytic functions
    in a recursive branch; however this has to be proven.


    After itвҖҷs proven that cellular automaton can be used to implement any algorithm,
    one may ask вҖңhow to actually use it for that? For example, to implement a very
    simple routine that sums up two numbers.вҖқ In order to do that, pattern of 0s and
    1s must be treated as data and code so the tape has to be constructed in a specific
    manner. In other words, the algorithm has to be coded in input tapeВ вҖ“ not in SQL.


    The last thing to mention about Rule 110 is that it can be implemented relatively
    simply for a tape of arbitrary length using a model clause even without iterations.
    Such imitations using SQL are quite slow and can be used only for academic purposes
    though.


    A model clause has yet another interesting feature from an academic point of viewВ вҖ“
    it can be used to implement any algorithm if you get rid of nested loops, which
    is theoretically always possible. To demonstrate this letвҖҷs have a look at a bubble
    sort algorithm shown in Listing [10-3](#A455196_1_En_10_Chapter.html#Par15).


    ```

    declare

    s varchar2(4000) := ''abcd c*de 01'';

    n number := length(s);

    j number := 1;

    k number := 1;

    x number := 1;

    i number := 1;

    begin

    while x > 0 loop

    x := 0;

    for j in 1 .. n - k loop

    i := i + 1;

    if substr(s, j + 1, 1) < substr(s, j, 1) then

    s := substr(s, 1, j - 1) || substr(s, j + 1, 1) ||

    substr(s, j, 1) || substr(s, j + 2);

    x := 1;

    end if;

    end loop;

    k := k + 1;

    end loop;

    dbms_output.put_line(i || s);

    end;

    Listing 10-3

    Bubble sort for string of symbols

    ```


    We repeat nested loops until there is at least one swap on the current iteration
    of the `while loop,` which is flagged in an `x` variable.


    After conversion to a single while loop in Listing [10-4](#A455196_1_En_10_Chapter.html#Par18),
    we introduced an additional flagВ вҖ“ `c`. This flag is an analogue to `x` from Listing
    [10-3](#A455196_1_En_10_Chapter.html#Par15) while `x` itself always equals to
    1 and may reset to zero only when an вҖңinner loopвҖқ is completed so algorithms can
    terminate only if we processed all the symbols on the current step and there were
    no swaps (i.e., `c = 0`).


    ```

    declare

    s varchar2(4000) := ''abcd c*de 01'';

    n number := length(s);

    j number := 1;

    k number := 1;

    x number := 1;

    i number := 1;

    c number := 0;

    begin

    while x > 0 loop

    i := i + 1;

    c := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then 1

    else case when j = 1 then 0 else c end

    end;

    s := case when substr(s, j + 1, 1) < substr(s, j, 1)

    then substr(s, 1, j - 1) || substr(s, j + 1, 1) ||

    substr(s, j, 1) || substr(s, j + 2)

    else s

    end;

    x := case when j = n - k and c = 0 then 0 else 1 end;

    k := case when j = n - k then k + 1 else k end;

    j := case when j - 1 = n - k then 1 else j + 1 end;

    end loop;

    dbms_output.put_line(i || s);

    end;

    Listing 10-4

    Bubble sort using single while loop

    ```'
  trans: '

    # 10. еӣҫзҒөе®ҢеӨҮжҖ§


    ## еӣҫзҒөе®ҢеӨҮжҖ§жҰӮиҝ°


    еӣҫзҒөе®ҢеӨҮжҖ§жҳҜи®Ўз®—жңәз§‘еӯҰдёӯдёҖдёӘйқһеёёйҮҚиҰҒзҡ„жҰӮеҝөпјҢеӣ дёәдёҖдёӘжЁЎеһӢе…·еӨҮеӣҫзҒөе®ҢеӨҮжҖ§ж„Ҹе‘ізқҖе®ғеҸҜд»Ҙжү§иЎҢд»»дҪ•з®—жі•пјҢж— и®әиҜҘз®—жі•еӨҡд№ҲеӨҚжқӮгҖҒдҪҝз”ЁдәҶдҪ•з§Қж•°жҚ®з»“жһ„пјҢжҲ–иҖ…йңҖиҰҒеӨҡе°‘еӯҳеӮЁз©әй—ҙе’Ңж—¶й—ҙжқҘиҜ„дј°е®ғгҖӮSQL
    еҸҜд»Ҙиў«и§ҶдёәеҸҰдёҖз§Қи®Ўз®—жЁЎеһӢпјҢе°Ҫз®Ўе®ғе№¶йқһи®ҫи®Ўз”ЁдәҺе®һзҺ°д»»дҪ•з®—жі•жҲ–дёҡеҠЎйҖ»иҫ‘пјҢдҪҶдёәдәҶе®Ңж•ҙжҖ§пјҢеҲҶжһҗе®ғжҳҜеҗҰжҳҜеӣҫзҒөе®ҢеӨҮзҡ„д№ҹеҫҲжңүи¶ЈгҖӮжӯӨеӨ–пјҢжӯЈеҰӮе°ҶеңЁдёӢдёҖз« вҖңеҪ“ PL/SQL дјҳдәҺеҺҹз”ҹ
    SQL ж—¶вҖқдёӯеұ•зӨәзҡ„пјҢжңүж—¶еҚідҪҝдёҖдёӘз®—жі•еҸҜд»ҘеҫҲе®№жҳ“ең°з”ЁзәҜ SQL е®һзҺ°пјҢе®ғд№ҹе№¶йқһиҺ·еҫ—з»“жһңзҡ„жңҖдҪіж–№ејҸгҖӮ


    еңЁи®Ўз®—зҗҶи®әдёӯпјҢдёҖдёӘж•°жҚ®ж“ҚдҪңи§„еҲҷзі»з»ҹпјҲжҲ–и®Ўз®—жЁЎеһӢпјүиў«з§°дёәжҳҜеӣҫзҒөе®ҢеӨҮзҡ„пјҢеҰӮжһңе®ғеҸҜд»Ҙз”ЁжқҘжЁЎжӢҹд»»дҪ•еӣҫзҒөжңәгҖӮиҝҷзұ»зі»з»ҹзҡ„дҫӢеӯҗеҢ…жӢ¬пјҡеӨ„зҗҶеҷЁзҡ„жҢҮд»ӨйӣҶгҖҒдёҖз§Қзј–зЁӢиҜӯиЁҖгҖҒдёҖдёӘе…ғиғһиҮӘеҠЁжңәпјҢз”ҡиҮіжҳҜз»ҲжһҒзІҫз®ҖжҢҮд»ӨйӣҶи®Ўз®—жңәпјҲURISCпјүгҖӮеҸҰдёҖж–№йқўпјҢдёҖдәӣе№ҝдёәдәәзҹҘзҡ„и®Ўз®—жЁЎеһӢе№¶дёҚжҳҜеӣҫзҒөе®ҢеӨҮзҡ„вҖ”вҖ”дҫӢеҰӮпјҢзЎ®е®ҡжҖ§жңүйҷҗиҮӘеҠЁжңәпјҲDFAпјүгҖӮ


    ж №жҚ®дёҳеҘҮ-еӣҫзҒөи®әйўҳпјҢвҖңжүҖжңүзү©зҗҶдёҠеҸҜи®Ўз®—зҡ„еҮҪж•°йғҪжҳҜеӣҫзҒөеҸҜи®Ўз®—зҡ„вҖқпјҢжҚўеҸҘиҜқиҜҙпјҢеҰӮжһңжҹҗдёӘи®Ўз®—жЁЎеһӢеҸҜд»ҘжЁЎжӢҹеӣҫзҒөжңәпјҢйӮЈд№Ҳе®ғе°ұеҸҜд»Ҙе®һзҺ°д»»дҪ•еҸҜи®Ўз®—еҮҪж•°гҖӮ


