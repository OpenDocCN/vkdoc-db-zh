    In some cases, a sort operation caused by analytic queries may be so inefficient
    that approaches with additional joins would have better performance even without
    any indexes. Even though such cases are quite rare, it always makes sense to consider
    different ways to get the desired result set.


    ## Differences and Interchangeability of Functions


    This section is not dedicated to describing differences between row_number and
    rank or, letвҖҷs say, between rank and dense_rank. Instead of that, we will consider
    how different functions can be used to implement the same logic, taking into account
    specifics of the functions and windowing clause.


    Sometimes you may come across code demonstrated in Listing [3-10](#A455196_1_En_3_Chapter.html#Par40).


    ```

    max(version) over (partition by dt order by version

    rows between unbounded preceding and unbounded following) latest_version

    Listing 3-10

    Order by with unbounded range

    ```


    In this case it does not make any sense to specify the order because the window
    for each row is the whole partition so Listing [3-11](#A455196_1_En_3_Chapter.html#Par42)
    shows logically identical expression.


    ```

    max(version) over (partition by dt) latest_version

    Listing 3-11

    Max value by partition

    ```


    However, sometimes it makes sense to specify order even if the window is the whole
    partition.


    LetвҖҷs consider the following task: for each row we need to derive a max value
    corresponding to a max date. This is implemented in expressions for m2 and m3
    below.


    ```

    with t(id, value, dt, part) as

    (

    select 1, 10, date ''2015-07-01'', 1 from dual

    union all select 2, 3, date ''2015-08-01'', 1 from dual

    union all select 3, 2, date ''2015-09-01'', 1 from dual

    union all select 4, 0, date ''2016-11-01'', 1 from dual

    union all select 5, 5, date ''2016-11-01'', 1 from dual

    union all select 6, 9, date ''2017-01-01'', 1 from dual

    union all select 7, 4, date ''2017-01-01'', 1 from dual

    )

    select

    t.*,

    max(value) over (partition by part) m1,

    max(value) keep (dense_rank last order by dt) over (partition by part) m2,

    last_value(value)

    over (partition by part order by dt, value

    rows between unbounded preceding and unbounded following) m3,

    max(value)

    over (partition by part order by dt, value

    rows between unbounded preceding and unbounded following) m4

    from t

    order by id ;

    ID           VALUE DT        PART   M1   M2   M3   M4

    ---------- ---------- -------- ---------- ---- ---- ---- ----

    1         10 01.07.15          1   10    9    9   10

    2          3 01.08.15          1   10    9    9   10

    3          2 01.09.15          1   10    9    9   10

    4          0 01.11.16          1   10    9    9   10

    5          5 01.11.16          1   10    9    9   10

    6          9 01.01.17          1   10    9    9   10

    7          4 01.01.17          1   10    9    9   10

    7 rows selected.

    Listing 3-12

    Max value for max date

    ```


    So the max date is 01.01.2017 and it has two corresponding values - 4 and 9\.
    The result can be calculated as вҖңmax(value)вҖқ with вҖңlastвҖқ function specified after
    the keyword keep and ordering by dt or by using the вҖңlast_valueвҖқ function and
    ordering by dt and value.


    If we need to get the min value then we can use min function instead of max or
    simply specify descending order for the value in last_value function.


    ```

    min(value) keep (dense_rank last order by dt) over (partition by part) m2,

    last_value(value)

    over (partition by part order by dt, value desc

    rows between unbounded preceding and unbounded following) m3

    from t

    Listing 3-13

    Min value for max date

    ```


    So in the first case we used another function while in the second one only the
    ordering direction by value has changed.


    The last example highlights specifics of the вҖңlast_value вҖқ function and construction
    вҖңignore nulls.вҖқ It was impossible to specify вҖңignore nullsвҖқ before 10g but the
    workaround is quite straightforward.


    ```

    with t(id, value, part) as

    (

    select 1, null, 1 from dual

    union all select 2, ''one'', 1 from dual

    union all select 3, null, 1 from dual

    union all select 1, ''two'', 2 from dual

    union all select 2, null, 2 from dual

    union all select 3, null, 2 from dual

    union all select 4, ''three'', 2 from dual

    )

    select t.*, max(value) over(partition by part, cnt) lv0

    from (select t.*,

    last_value(value ignore nulls) over(partition by part order by id) lv,

    count(value) over(partition by part order by id) cnt

    from t

    order by part, id) t;

    ID VALUE       PART LV           CNT LV0

    ---------- ----- ---------- ----- ---------- ---

    1                1                0

    2 one            1 one            1 one

    3                1 one            1 one

    1 two            2 two            1 two

    2                2 two            1 two

    3                2 two            1 two

    4 three          2 three          2 three

    7 rows selected.

    Listing 3-14

    Last_value + ignore nulls and workaround for old versions

    ```


    We used count in the inline view to build partitions containing the current value
    and all subsequent rows with blank values and max function on top of that to mimic
    behavior of the last_value + ignore nulls. So apparently functions with completely
    different purposes can be used to implement the same logic.


    ## Summary


    Analytic functions are very powerful tool that can be used to get the result that
    otherwise would require self joins or subqueries. They have been introduced in
    Oracle 8i and has significantly evolved since then; however, their capabilities
    continue developing in many versions including Oracle 12c. Oracle provides a flexible
    definition of the windowing clause to adjust the default definition of the analytic
    window, and such a feature has its own limitations but for most of the practical
    tasks, built-in flexibility is more than enough.'
