    жңүж—¶пјҢеҲҶз»„еҸҜд»Ҙеё®еҠ©йҒҝе…ҚйўқеӨ–зҡ„иҝһжҺҘпјҲJOINпјүпјӣз„¶иҖҢпјҢиҝҷз§Қжғ…еҶөзӣёеҪ“зҪ•и§ҒгҖӮжӯӨеӨ–пјҢеҲҶз»„еҸҜд»Ҙжӣҝд»Ј`pivot`жқҘвҖңжүҒе№іеҢ–вҖқж•°жҚ®пјҢдҪҶдҪҝз”ЁеҶ…зҪ®еҠҹиғҪжӣҙдёәеҸҜеҸ–гҖӮ


    ## Connect By еӯҗеҸҘ


    `connect by`еӯҗеҸҘз”ЁдәҺжҹҘиҜўд»ҘзҲ¶еӯҗе…ізі»еӯҳеӮЁзҡ„еұӮж¬Ўз»“жһ„пјҢиҝҷд№ҹз§°дёәйӮ»жҺҘиЎЁжЁЎеһӢгҖӮз®ҖеҚ•жқҘиҜҙпјҢиҜҘжЁЎеһӢж„Ҹе‘ізқҖдёәжҜҸдёӘеӯҗд»ЈеӯҳеӮЁдёҖдёӘзҲ¶-еӯҗеҜ№гҖӮйҖҡеёёпјҢйӮ»жҺҘиЎЁеҸҜд»ҘиЎЁзӨәжңүеҗ‘еӣҫпјҢиҖҢдёҚд»…д»…жҳҜеұӮж¬Ўж ‘пјӣеңЁиҝҷз§Қжғ…еҶөдёӢпјҢиҜҘеҲ—иЎЁжҸҸиҝ°дәҶеӣҫдёӯйЎ¶зӮ№зҡ„йӮ»еұ…йӣҶеҗҲгҖӮеӣ жӯӨпјҢйӮ»жҺҘиЎЁжЁЎеһӢзҡ„иҢғеӣҙжӣҙе№ҝпјҢиҖҢзҲ¶-еӯҗжЁЎеһӢжҳҜе…¶е®һзҺ°д№ӢдёҖгҖӮ


    еҲ—иЎЁ [5-1] еұ•зӨәдәҶдёҖдёӘеҹәдәҺзҲ¶еӯҗе…ізі»жһ„е»әеұӮж¬Ўз»“жһ„е№¶дҪҝз”Ё Oracle еұӮж¬ЎжҹҘиҜўдјӘеҲ—зҡ„жҹҘиҜўгҖӮ


    ```sql

    create table tree as

    select 2 id, 1 id_parent from dual

    union all select 3 id, 1 id_parent from dual

    union all select 4 id, 3 id_parent from dual

    union all select 5 id, 4 id_parent from dual

    union all select 11 id, 10 id_parent from dual

    union all select 12 id, 11 id_parent from dual

    union all select 13 id, 11 id_parent from dual;

    select connect_by_root id_parent root,

    level lvl,

    rpad('' '', (level - 1) * 3, '' '') || t.id as id,

    prior id_parent grand_parent,

    sys_connect_by_path(id, ''->'') path,

    connect_by_isleaf is_leaf

    from tree t

    start with t.id_parent in (1, 10)

    connect by prior t.id = t.id_parent;

    ROOT      LVL ID       GRAND_PARENT PATH          IS_LEAF

    -------- ----------- ------------------------ ---------------

    1      1 2                ->2                        1

    1      1 3                ->3                        0

    1      2    4           1 ->3->4                     0

    1      3       5        3 ->3->4->5                  1

    10      1 11               ->11                       0

    10      2    12         10 ->11->12                   1

    10      2    13         10 ->11->13                   1

    Listing 5-1

    жҹҘиҜўзҲ¶еӯҗе…ізі»

    ```


    жһ„е»әеұӮж¬Ўз»“жһ„еҝ…йЎ»жҢҮе®ҡпјҡ

    *   **ж №** вҖ“ еңЁзӨәдҫӢдёӯпјҢжҲ‘д»¬жһ„е»әдәҶж №зҲ¶ ID зӯүдәҺ 1 е’Ң 10 зҡ„дёӨжЈөж ‘пјӣ

    *   зҲ¶дёҺеӯҗд№Ӣй—ҙзҡ„е…ізі»гҖӮ`prior`жҳҜдёҖдёӘдёҖе…ғиҝҗз®—з¬ҰпјҢиҝ”еӣһз»ҷе®ҡиЎЁиҫҫејҸпјҲйҖҡеёёжҳҜеҲ—пјүеҜ№дәҺеҪ“еүҚиЎҢзҡ„зӣҙжҺҘзҲ¶иЎҢзҡ„еҖјгҖӮ


    еҲ—иЎЁ [5-1] дёӯжј”зӨәзҡ„е…¶д»–еұӮж¬ЎжҹҘиҜўзү№жҖ§пјҡ

    *   `connect_by_root` вҖ“ дёҖе…ғиҝҗз®—з¬ҰпјҢиҝ”еӣһж №иЎҢзҡ„иЎЁиҫҫејҸеҖјгҖӮ

    *   `level` е’Ң `connect_by_isleaf` вҖ“ дјӘеҲ—пјҢеҲҶеҲ«иҝ”еӣһжҜҸдёӘиЎҢзҡ„еұӮж¬Ўж·ұеәҰпјҲеұӮзә§пјүд»ҘеҸҠиҠӮзӮ№жҳҜеҗҰдёәеҸ¶иҠӮзӮ№зҡ„ж Үеҝ—гҖӮ

    *   `sys_connect_by_path` вҖ“ еҮҪж•°пјҢиҝ”еӣһд»Һж №еҲ°иҠӮзӮ№е№¶еёҰжңүз»ҷе®ҡеҲҶйҡ”з¬Ұзҡ„и·Ҝеҫ„гҖӮ


    `prior`иҝҗз®—з¬ҰдёҚд»…еҸҜд»ҘеңЁ`connect by`еӯҗеҸҘдёӯдҪҝз”ЁпјҢд№ҹеҸҜд»ҘеңЁ`select`еҲ—иЎЁдёӯдҪҝз”ЁпјҢдҪҶе®ғеҸӘиғҪеҜ№з»ҷе®ҡиЎЁиҫҫејҸеә”з”ЁдёҖж¬ЎгҖӮдҫӢеҰӮпјҢеҰӮжһңзӣ®ж ҮжҳҜйҖүжӢ©еҗ‘дёҠдёӨзә§зҡ„зҲ¶
    IDпјҢйӮЈд№ҲеҸҜд»ҘеҜ№`id_parent`еҲ—еә”з”Ё`prior` вҖ“ еҸӮи§ҒеҲ—иЎЁ [5-1] дёӯ`grand_parent`зҡ„иЎЁиҫҫејҸгҖӮ


    `Connect by`дҪҝз”Ёж·ұеәҰдјҳе…Ҳжҗңзҙўж–№жі•йҒҚеҺҶеұӮж¬Ўз»“жһ„пјҢеӣ жӯӨеңЁеӨ„зҗҶеҗҢдёҖзә§еҲ«зҡ„дёӢдёҖдёӘиҠӮзӮ№д№ӢеүҚпјҢдјҡеӨ„зҗҶеҪ“еүҚиҠӮзӮ№зҡ„жүҖжңүеҗҺд»ЈгҖӮеҸҜд»ҘдҪҝз”ЁвҖңorder siblings
    byвҖқжқҘжҢҮе®ҡеҗҢдёҖзә§еҲ«еҶ…зҡ„йЎәеәҸгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢOracle д№ҹдјҡдҪҝз”Ёж·ұеәҰдјҳе…ҲжҗңзҙўпјҢдҪҶзҲ¶иҠӮзӮ№зҡ„еӯҗиҠӮзӮ№йЎәеәҸеҸҜиғҪдјҡж”№еҸҳгҖӮеҲ—иЎЁ [5-2] еұ•зӨәдәҶеңЁе…ҲеүҚжҹҘиҜўдёӯжҢҮе®ҡ`order
