    ## жҖ»з»“


    жЁЎеһӢеӯҗеҸҘжҳҜ Oracle SQL жңҖејәеӨ§зҡ„еҠҹиғҪгҖӮзҗҶи®әдёҠпјҢиҝӯд»ЈжЁЎеһӢе…Ғи®ёжҲ‘д»¬е®һзҺ°д»»ж„ҸеӨҚжқӮеәҰзҡ„з®—жі•пјҲеҸӮи§Ғз¬¬ 10 з« вҖңеӣҫзҒөе®ҢеӨҮжҖ§вҖқпјүгҖӮеҸҰдёҖж–№йқўпјҢжЁЎеһӢеӯҗеҸҘеҸҜиғҪеҜјиҮҙиҝҮеәҰзҡ„
    CPU е’ҢеҶ…еӯҳж¶ҲиҖ—пјҢе№¶дё”еҜ№дәҺжҹҗдәӣе…¶д»–ж–№жі•пјҲеҢ…жӢ¬ PL/SQLпјүж №жҚ®ж•°жҚ®йҮҸиЎЁзҺ°еҮәзәҝжҖ§еҸҜжү©еұ•жҖ§зҡ„д»»еҠЎпјҢе®ғе№¶дёҚе…·еӨҮзәҝжҖ§еҸҜжү©еұ•жҖ§гҖӮз„¶иҖҢпјҢеҸҜд»ҘеҲ©з”Ёе№¶иЎҢжү§иЎҢжқҘеӨ„зҗҶеҲҶеҢәжЁЎеһӢпјҢиҝҷдҪҝеҫ—
    SQL е»әжЁЎжҲҗдёәжҹҗдәӣд»»еҠЎзҡ„е®ҢзҫҺе·Ҙе…·гҖӮ


    еҜ№дәҺзұ»дјјз”өеӯҗиЎЁж јзҡ„и®Ўз®—пјҢдҪҝз”ЁжЁЎеһӢжҳҜжңүж„Ҹд№үзҡ„пјҢе®ғе…Ғи®ёе®һзҺ°еӨҚжқӮзҡ„и§„еҲҷпјҢеҗҢж—¶йҒҝе…ҚеӨҡж¬ЎиҝһжҺҘгҖӮеҗҢж ·пјҢеҪ“еёҢжңӣйҒҝе…ҚдҪҝз”ЁиҝҮзЁӢеҢ–ж–№жі•ж—¶пјҢзү№еҲ«жҳҜеңЁжЁЎеһӢз”ЁдәҺзү©еҢ–и§Ҷеӣҫдё”е“Қеә”ж—¶й—ҙдёҚжҳҜе…ій”®еӣ зҙ зҡ„жғ…еҶөдёӢпјҢжЁЎеһӢд№ҹеҸҜиғҪжҳҜе®һзҺ°еӨҚжқӮйҖ»иҫ‘зҡ„еҗҲйҖӮе·Ҙе…·гҖӮ


    # 8. иЎҢжЁЎејҸеҢ№й…Қпјҡmatch_recognize


    жҹҘжүҫе’ҢеҲҶжһҗж•°жҚ®дёӯжЁЎејҸзҡ„иғҪеҠӣдёҖзӣҙиў«е№ҝжіӣйңҖиҰҒпјҢдҪҶеңЁ Oracle 12c д№ӢеүҚпјҢSQL ж— жі•е®һзҺ°гҖӮ


    иҝҷеңЁи®ёеӨҡдёҡеҠЎйўҶеҹҹйғҪжҳҜеҝ…йңҖзҡ„пјҢдҫӢеҰӮе®үе…Ёеә”з”Ёе’Ңж¬әиҜҲжЈҖжөӢпјҢжҲ–иҖ…йҮ‘иһҚеә”з”Ёе’Ңе®ҡд»·еҲҶжһҗгҖӮSQL дёӯзҡ„еҺҹз”ҹжЁЎејҸеҢ№й…ҚеҠҹиғҪжңүеҠ©дәҺйҒҝе…ҚеңЁе®ўжҲ·з«ҜжҲ–дёӯй—ҙд»¶еә”з”ЁжңҚеҠЎеҷЁдёӯжһ„е»әеӨҚжқӮзҡ„е®ҡеҲ¶и§ЈеҶіж–№жЎҲпјҢиҖҢжҳҜдҪҝз”Ёжҳ“дәҺе…ұдә«зҡ„
    SQL жҹҘиҜўгҖӮ


    иҝҷжҳҜ Oracle зү№жңүзҡ„ SQL еҠҹиғҪдёӯзҡ„жңҖеҗҺдёҖйЎ№пјҢдҪҶеңЁж·ұе…ҘжҺўи®Ёд№ӢеүҚпјҢи®©жҲ‘д»¬з®ҖиҰҒеӣһйЎҫдёҖдёӢ SQL зҡ„жј”еҸҳгҖӮ


    еҹәжң¬ SQLвҖ”вҖ”е®һзҺ°дәҶе…ізі»д»Јж•°зҡ„дә”з§Қдё»иҰҒж“ҚдҪңвҖ”вҖ”еҸӘе…Ғи®ёиЎҢзә§еҸҜи§ҒжҖ§гҖӮ


    иҒҡеҗҲеҮҪж•°еј•е…ҘдәҶз»„зә§еҸҜи§ҒжҖ§пјҢдҪҶз»„жҳҜз”ұзү№е®ҡиЎЁиҫҫејҸе®ҡд№үзҡ„пјҢиҜҘиЎЁиҫҫејҸеҜ№дәҺз»„дёӯзҡ„жүҖжңүиЎҢеҝ…йЎ»зӣёеҗҢпјҢе№¶дё”жҜҸиЎҢеҸӘеұһдәҺдёҖдёӘз»„гҖӮ


    еҲҶжһҗеҮҪж•°е…Ғи®ёзӘ—еҸЈзә§еҸҜи§ҒжҖ§гҖӮзӘ—еҸЈе®ҡд№үеҜ№жүҖжңүиЎҢжҳҜзӣёеҗҢзҡ„пјӣз„¶иҖҢпјҢ`windowing_clause`еўһеҠ дәҶдёҖдәӣзҒөжҙ»жҖ§пјҢдҪҝеҫ—еҪ“еүҚиЎҢзҡ„еұһжҖ§еҸҜд»ҘйҖҡиҝҮиҢғеӣҙ/иЎҢжҢҮе®ҡдёәеҒҸз§»еҖјгҖӮ


    жЁЎејҸеҢ№й…ҚжҳҜдёӢдёҖдёӘзә§еҲ«зҡ„зҒөжҙ»жҖ§пјӣдёәдәҶеҢ№й…Қи®°еҪ•йӣҶдёӯзҡ„жЁЎејҸпјҢе®ғиў«и§ҶдёәдёҖдёӘиЎҢеәҸеҲ—вҖ”вҖ”е…¶жҖқжғізұ»дјјдәҺжӯЈеҲҷиЎЁиҫҫејҸпјҢе…¶дёӯиҫ“е…Ҙеӯ—з¬ҰдёІиў«и§Ҷдёәеӯ—з¬ҰеәҸеҲ—гҖӮжҜҸиЎҢеҸҜд»ҘеұһдәҺйӣ¶дёӘгҖҒдёҖдёӘжҲ–еӨҡдёӘеҢ№й…ҚгҖӮ


    и®©жҲ‘д»¬йҮҚз”Ёжё…еҚ• 3-4 дёӯзҡ„иЎЁ`atm`гҖӮжҲ‘д»¬еҸҜд»ҘдҪҝз”ЁдёӢйқўзҡ„жҹҘиҜўиҺ·еҸ–йҮ‘йўқзӯүдәҺ 5 зҡ„жүҖжңүиЎҢгҖӮ


    ```

    select * from atm where amount = 5

    ```


    еҗҢж ·зҡ„з»“жһңеҸҜд»ҘйҖҡиҝҮ`match_recognize`е®һзҺ°гҖӮ


    ```

    select *

    from atm

    match_recognize

    ( all rows per match

    pattern (five)

    define

    five as five.amount = 5

    ) mr

    order by ts;

    TS            AMOUNT

    --------- ----------

    03-JUL-16          5

    03-JUL-16          5

    ```


    жҳҫз„¶пјҢжЁЎејҸеҢ№й…Қе№¶йқһдёәжӯӨзұ»д»»еҠЎи®ҫи®ЎпјҢдҫӢеҰӮпјҢеҰӮжһң`amount`еҲ—дёҠжңүзҙўеј•пјҢOracle е°ҶдёҚдјҡдҪҝз”Ёе®ғпјҲе°Ҫз®ЎеҰӮжһңдҪ еҗҢж—¶жҢҮе®ҡжЁЎејҸеҢ№й…Қе’Ң where еӯҗеҸҘпјҢеҲҷеҸҜд»ҘдҪҝз”Ёзҙўеј•пјүгҖӮжҹҘиҜўи®ЎеҲ’еҰӮдёӢжүҖзӨәпјҲ`FINITE
    AUTOMATON`еңЁ`dbms_xplan`зҡ„иҫ“еҮәдёӯиў«жҲӘж–ӯпјүгҖӮ


    ```

    | Id  | Operation                                        | Name |

    |   0 | SELECT STATEMENT                                 |      |

    |   1 |  SORT ORDER BY                                   |      |

    |   2 |   VIEW                                           |      |

    |   3 |    MATCH RECOGNIZE BUFFER DETERMINISTIC FINITE AU|      |

    |   4 |     TABLE ACCESS FULL                            | ATM  |

    ```


    и®©жҲ‘д»¬зңӢдёҖдёӘзЁҚеҫ®еӨҚжқӮзҡ„дҫӢеӯҗгҖӮ


    ```

    alter session set NLS_DATE_FORMAT = ''mi'';

    Session altered.

    select *

    from atm

    match_recognize

    ( order by ts

    measures

    strt.amount start_amount,

    final last(up.amount) end_amount,

    running count(*) as cnt,

    match_number() as match,

    classifier() as cls

    all rows per match

    after match skip past last row

    pattern (strt down* up*)

    define

    down as down.amount  prev(up.amount)

    ) mr

    order by ts;

    TS START_AMOUNT END_AMOUNT        CNT      MATCH CLS            AMOUNT

    -- ------------ ---------- ---------- ---------- ---------- ----------

    01           85        100          1          1 STRT               85

    03           85        100          2          1 DOWN               15

    05           85        100          3          1 UP                100

    07           40         85          1          2 STRT               40

    09           40         85          2          2 DOWN               30

    11           40         85          3          2 UP                 50

    13           40         85          4          2 UP                 85

    15           60        100          1          3 STRT               60

    17           60        100          2          3 DOWN                5

    19           60        100          3          3 UP                100

    21           25         80          1          4 STRT               25

    23           25         80          2          4 UP                 30

    25           25         80          3          4 UP                 80

    27            5         35          1          5 STRT                5

    29            5         35          2          5 UP                 35

    ```


    иҝҷйҮҢе®ҡд№үзҡ„жЁЎејҸжҳҜдёҖдёӘж Үи®°дёә`strt`зҡ„иЎҢпјҢйӣ¶дёӘжҲ–еӨҡдёӘж Үи®°дёә`down`зҡ„иЎҢпјҢд»ҘеҸҠйӣ¶дёӘжҲ–еӨҡдёӘж Үи®°дёә`up`зҡ„иЎҢгҖӮе®һйҷ…дёҠпјҢ`strt`гҖҒ`down`е’Ң`up`иў«з§°дёәжЁЎејҸеҸҳйҮҸгҖӮеҪ“йҮ‘йўқе°ҸдәҺеүҚдёҖиЎҢзҡ„йҮ‘йўқж—¶пјҢдёҖиЎҢиў«ж Үи®°дёә`down`пјӣзӣёеә”ең°пјҢеҪ“йҮ‘йўқеӨ§дәҺеүҚдёҖиЎҢзҡ„йҮ‘йўқж—¶пјҢж Үи®°дёә`up`гҖӮеҰӮжһңжҲ‘д»¬е°Ҷ`amount`е’Ң`ts`д№Ӣй—ҙзҡ„е…ізі»еҸҜи§ҶеҢ–пјҢйӮЈд№ҲжҜҸдёӘеҢ№й…Қе°ҶжҳҜдёҖдёӘ
    V еҪўпјҢжҲ–иҖ…еҰӮжһңзјәе°‘еҸҰдёҖйғЁеҲҶпјҢеҲҷеҸӘжҳҜе…¶дёҠеҚҮжҲ–дёӢйҷҚйғЁеҲҶгҖӮ


