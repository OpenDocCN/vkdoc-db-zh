    select *

    from t

    model

    dimension by (id)

    measures ((1+2)/2 x, 1 x0, 2 x1)

    rules iterate (1e2) until abs(x[0]-previous(x[0])) < 1e-2

    (

    x[iteration_number+1] = x[0],

    x0[iteration_number+1] = case when sign(y(x[0])) =

    sign(y(x0[iteration_number]))

    then x[0]

    else x0[iteration_number]

    end,

    x1[iteration_number+1] = case when sign(y(x[0])) =

    sign(y(x1[iteration_number]))

    then x[0]

    else x1[iteration_number]

    end,

    x[0] = (x0[iteration_number+1] + x1[iteration_number+1])/2

    )

    order by id ;

    ID          X         X0         X1

    ---------- ---------- ---------- ----------

    0  1.4140625          1          2

    1        1.5          1        1.5

    2       1.25       1.25        1.5

    3      1.375      1.375        1.5

    4     1.4375      1.375     1.4375

    5    1.40625    1.40625     1.4375

    6   1.421875    1.40625   1.421875

    7 rows selected.

    Listing 7-8

    Implementation of bisection method using iterative model

    ```


    `Iteration_number` is a function that returns an integer representing the completed
    iteration through the model rules starting with 0\. The maximum possible iteration
    number in the above example is limited with 100 (this can be specified only using
    a constant, not an expression); however, there is termination condition `abs(x[0]-previous(x[0]))
    < 1e-2` that means the absolute difference between root on current iteration and
    on the previous iteration should be less than 0.01\. So computation stopped on
    the 6th step and the result is the same as the one calculated using the subquery
    factoring clause - `1.4140625`. The previous function is used to refer the value
    on the previous iteration.


    There is no way to figure out whether a model is iterative or not based on a query
    plan. Query plan operations are the same as for non-iterative models. Moreover,
    a stats column in the plan does not reflect the number of iterations with enabled
    runtime execution statistics. A query plan for Listing [7-8](#A455196_1_En_7_Chapter.html#Par54)
    will be the following.


    ```

    select * from dbms_xplan.display_cursor(format => ''IOSTATS LAST'');


    | Id | Operation                | Name | Starts | E-Rows | A-Rows |      A-Time      |


    |  0 | SELECT STATEMENT         |      |      1 |        |      7 | 00:00:00.01
    |

    |  1 |  SORT ORDER BY           |      |      1 |      1 |      7 | 00:00:00.01
    |

    |  2 |   SQL MODEL ORDERED FAST |      |      1 |      1 |      7 | 00:00:00.01
    |

    |  3 |    FAST DUAL             |      |      1 |      1 |      1 | 00:00:00.01
    |


    ```


    In the model clause we can define `reference model`(s) that can be used as вҖңlookup
    arrays.вҖқ


    ```

    with sales(year, currency, value) as

    (select ''2015'', ''GBP'', 100 from dual

    union all select ''2015'', ''USD'', 200 from dual

    union all select ''2015'', ''EUR'', 300 from dual

    union all select ''2016'', ''GBP'', 400 from dual

    union all select ''2016'', ''EUR'', 500 from dual)

    , usd_rates(currency, rate) as

    (select ''GBP'', 1.45 from dual

    union all select ''USD'', 1 from dual

    union all select ''EUR'', 1.12 from dual)

    select *

    from sales

    model

    reference usd_rates_model on (select * from usd_rates)

    dimension by (currency)

    measures (rate)

    main sales_model

    dimension by (year, currency)

    measures (value, 0 usd_value)

    (

    usd_value[any, any] order by year, currency =

    value[cv(year), cv(currency)] * usd_rates_model.rate[cv(currency)]

    )

    order by 1, 2;

    YEAR CUR      VALUE  USD_VALUE

    ---- --- ---------- ----------

    2015 EUR        300        336

    2015 GBP        100        145

    2015 USD        200        200

    2016 EUR        500        560

    2016 GBP        400        580

    Listing 7-9

    Using reference models

    ```


    As was stated at the beginning of this chapter, a combination of all the dimensions
    uniquely identifies the cell in the cube, but this rule can be relaxed if you
    specify `unique single reference` keyword. Query from Listing [7-10](#A455196_1_En_7_Chapter.html#Par61)
    would throw an exception `ORA-32638: Non unique addressing in MODEL dimensions`
    with the default value for addressing which is unique dimension.


    ```

    with t(id, value) as

    (select trunc(rownum/2), rownum from dual connect by level <= 3)

    select *

    from t

    model

    unique single reference

    dimension by (id)

    measures (value, 0 result)

    (result[0] = 111)

    order by id;

    ID      VALUE     RESULT

    ---------- ---------- ----------

    0          1        111

    1          2          0

    1          3          0

    Listing 7-10

    Model with unique single reference

    ```


    The last thing to mention regarding basic functionality is the treatment of null
    values. There are two special functions for model clause `presentv/presentnnv`
    that work similarly to `nvl2\. Presentv` checks if the value existed in the recordset
    prior to execution of the model clause while `presentnnv` in addition to that
    also checks if the value was not null. Listing [7-11](#A455196_1_En_7_Chapter.html#Par63)
    shows differences between `presentv`, `presentnnv,` and `nvl2`.


    ```

    with t(id) as

    (select cast(''base'' as varchar2(10)) from dual)

    select *

    from t

    model

    ignore nav

    dimension by (id)

    measures (cast(null as varchar2(10)) msr_base,

    cast(null as varchar2(10)) msr_calc,

    to_number(null) num)

    (

    msr_base[''calc''] = ''1'',

    msr_base[''presentv''] = presentv(msr_base[''base''], ''+'', ''-''),

    msr_base[''presentnnv''] = presentnnv(msr_base[''base''], ''+'', ''-''),

    msr_base[''nvl2''] = nvl2(msr_base[''base''], ''+'', ''-''),

    msr_calc[''presentv''] = presentv(msr_base[''calc''], ''+'', ''-''),

    msr_calc[''presentnnv''] = presentnnv(msr_base[''calc''], ''+'', ''-''),

    msr_calc[''nvl2''] = nvl2(msr_base[''calc''], ''+'', ''-''),

    num[any] = num[-1]

    )

    order by id;

    ID         MSR_BASE   MSR_CALC          NUM

    ---------- ---------- ---------- ----------

    base                                      0

    calc       1                              0

    nvl2       -          +                   0

    presentnnv -          -                   0

    presentv   +          -                   0

    Listing 7-11

    Comparing results for presentv, presentnnv, and nvl2

    ```


    Missing numeric measures are treated as zeros instead of nulls when you specify
    `ignore nav`. All values for the num column would be nulls with the default behavior
    - `keep nav`.


    Analytic functions can be used in a model clause to implement advanced logic.
    Listing [7-12](#A455196_1_En_7_Chapter.html#Par66) demonstrates a usage example.


    ```

    with t(value) as

    (select column_value from table(sys.odcivarchar2list(''A'',''B'',''C'',''D'',''E'')))

    select *

    from t

    model

    ignore nav

    dimension by (row_number() over (order by value) id)

    measures (value, cast(null as varchar2(4000)) result, count(*) over () num)

    (

    result[mod(id, 2) = 1] = listagg(value, '', '') within group (order by id) over
    (),

    num[mod(id, 2) = 1] = count(*) over (order by id desc)

    )

    order by id;

    ID VALUE      RESULT            NUM

    ---------- ---------- ---------- ----------

    1 A          A, C, E             3

    2 B                              5

    3 C          A, C, E             2

    4 D                              5

    5 E          A, C, E             1

    Listing 7-12

    Analytic functions in model clause

    ```


    The same logic can be implemented using aggregate functions in the following way:


    ```

    result[mod(id, 2) = 1] = listagg(value, '', '') within group (order by null)[mod(id,
    2) = 1],

    num[mod(id, 2) = 1] = count(*)[mod(id, 2) = 1 and id >= cv(id)]

    ```


    The crucial difference between aggregate functions in a model clause and an regular
    aggregate functions is that aggregate functions in model clauses do not require
    grouping. Instead you need to specify the range of cells for the aggregate function.


    Aggregate functions allow flexible addressing of cellsвҖҷ ranges unlike analytic
    functions. But analytic functions accept both measures and dimensions as arguments
    while an aggregate function can be applied only to measures. Also itвҖҷs not possible
    to specify ordering on the left side of the rule when an analytic function is
    used. Rule 1 and rule 3 from Listing [7-13](#A455196_1_En_7_Chapter.html#Par71)
    demonstrate limitations of analytic and aggregate functions correspondingly.'
