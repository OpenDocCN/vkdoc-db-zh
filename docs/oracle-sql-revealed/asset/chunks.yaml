    ```\n\nжӮЁеҸҜиғҪе·Із»ҸжіЁж„ҸеҲ°дәҶе…ідәҺиҝҮж»Өж“ҚдҪңзҡ„дёҖдёӘжңүи¶Јз»ҶиҠӮвҖ”вҖ”е®ғжңүдёүдёӘеӯҗж“ҚдҪңгҖӮеңЁжҲ‘д»¬зҡ„жЎҲдҫӢдёӯпјҢдёҖдёӘж“ҚдҪңз”ЁдәҺдәӢе®һиЎЁпјҢдёӨдёӘж“ҚдҪңз”ЁдәҺз»ҙеәҰиЎЁд»ҘжЈҖжҹҘдёӨдёӘ IDгҖӮиҝҮж»Өзҡ„з¬¬дёҖдёӘеӯҗж“ҚдҪңжҳҜиЎҢжәҗпјҢе®ғиў«иҝҮж»ӨпјҢиҖҢе…¶д»–зҡ„жҳҜз”ЁдәҺжЈҖжҹҘиҝҮж»ӨжқЎд»¶зҡ„иЎҢжәҗгҖӮдёҖж—ҰдёәеҪ“еүҚиЎҢжүҫеҲ°дәҶз¬¬дёҖдёӘеҢ№й…ҚйЎ№пјҢOracle\
    \ е°ұдјҡз»§з»ӯеӨ„зҗҶдё»иЎҢжәҗзҡ„дёӢдёҖдёӘгҖӮ\n\nи°ҲеҲ°иҝһжҺҘпјҢOracle дёӯеҸӘжңүдёүз§ҚиҝһжҺҘж–№жі•вҖ”вҖ”`MERGE JOIN`пјҲеҗҲе№¶иҝһжҺҘпјүгҖҒ`HASH JOIN`пјҲе“ҲеёҢиҝһжҺҘпјүгҖҒ`NESTED\
    \ LOOPS`пјҲеөҢеҘ—еҫӘзҺҜпјүвҖ”вҖ”дёҺиҝҮж»Өж“ҚдҪңдёҚеҗҢпјҢе®ғд»¬йғҪеҸӘиғҪж“ҚдҪңдёӨдёӘиЎҢжәҗгҖӮ\n\nжҹҘиҜўиҪ¬жҚўзҡ„ж•°йҮҸд»ҺдёҖдёӘзүҲжң¬еҲ°еҸҰдёҖдёӘзүҲжң¬дёҚж–ӯеўһеҠ пјҢе®ғд»¬зҡ„иғҪеҠӣд№ҹж—ҘзӣҠеўһејәпјӣдҫӢеҰӮпјҢеңЁ\
    \ Oracle 11gR2 дёӯж·»еҠ дәҶж ҮйҮҸеӯҗжҹҘиҜўеұ•ејҖиҪ¬жҚўпјҢеҸҜд»Ҙжҳҫи‘—жҸҗй«ҳжҹҗдәӣжҹҘиҜўзҡ„жҖ§иғҪгҖӮеҸҰдёҖж–№йқўпјҢи®©иҪ¬жҚўеј•ж“ҺеҸҳеҫ—и¶іеӨҹжҷәиғҪпјҢд»ҺиҖҢе®Ңе…ЁйҒҝе…ҚжүӢеҠЁжҹҘиҜўйҮҚеҶҷпјҢиҝҷжҒҗжҖ•дёҚеӨӘеҸҜиғҪгҖӮ\n\
    \nйҷӨдәҶжҹҘиҜўиҪ¬жҚўд№ӢеӨ–пјҢеңЁдјҳеҢ–йҳ¶ж®өиҝҳдјҡеҜ№жҹҘиҜўеә”з”Ёи®ёеӨҡе…¶д»–иҪ¬жҚўпјҢд»Һ ANSI еҲ°жң¬ең°иҜӯжі•зҡ„иҪ¬жҚўпјҢеҶҚеҲ°еҲ—жҠ•еҪұгҖӮйңҖиҰҒжіЁж„Ҹзҡ„йҮҚиҰҒз»ҶиҠӮпјҡ\n\n*   иҪ¬жҚўеҸҜиғҪдјҡеҪұе“ҚжҹҘиҜўи®ЎеҲ’е’ҢжҹҘиҜўжҖ§иғҪпјҢдҪҶйҖҡеёёж— жі•д»…ж №жҚ®жңҖз»ҲжҹҘиҜўж–Үжң¬жқҘеҲӨж–ӯиҪ¬жҚўжҳҜеҗҰе·Іиў«еә”з”ЁгҖӮиҰҒиҝӣиЎҢиҜҰз»ҶеҲҶжһҗпјҢеҸҜд»Ҙд»ҺдјҳеҢ–еҷЁи·ҹиёӘзҡ„вҖңжҹҘиҜўиҪ¬жҚў\
    \ (QT)вҖқйғЁеҲҶејҖе§ӢгҖӮ\n*   еҢәеҲҶжҹҘиҜўдјҳеҢ–еҷЁиҪ¬жҚўе’Ңе…¶д»–иҪ¬жҚўпјҲеҰӮ ANSI еҲ°жң¬ең°иҜӯжі•зҡ„иҪ¬жҚўпјүйқһеёёйҮҚиҰҒгҖӮеҗҺиҖ…йҖӮз”ЁдәҺжүҖжңүжҹҘиҜўпјҢж— и®әжҹҘиҜўдјҳеҢ–еҷЁиҪ¬жҚўжҳҜеҗҰеҗҜз”ЁгҖӮеҰӮжһңеҺҹе§ӢжҹҘиҜўеҢ…еҗ«д»ҘдёӢеҶ…е®№пјҢANSI\
