  raw: 'So the function returns a recursive sequence such as current value equals
    to sine of the sum of previous value and its index multiplied by 100 and rounded
    to integer. i-2 is used in the code because the elements indexed starting with
    zero.


    To highlight the recursive nature of the sequence, it also can be defined using
    the recursive function .


    ```

    create or replace function f(n in number) return numbers as

    result numbers;

    begin

    if n = 0 then return numbers(1);

    else

    result := f(n - 1);

    result.extend;

    result(n + 1) := round(100 * sin(result(n) + n - 1));

    return result;

    end if;

    end f;

    /

    ```


    Given that sine values fall in a range [-1; 1] and function values are multiplied
    by 100 and rounded to integers, itвҖҷs possible to generate all possible values
    for the sequenceВ вҖ“ range [-100; 100]. With this assumption the sequence can be
    generated using вҖңconnect by.вҖқ


    The query in Listing [5-5](#A455196_1_En_5_Chapter.html#Par41) generates only
    the first 14 values instead of 21 because the 14th row is identified as a cycle.


