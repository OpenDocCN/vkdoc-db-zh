    ```

    nvl2(tt2.name, 0, null) = nvl2(tt3.rowid(+), 0, 0)

    ```


    еӣ жӯӨпјҢиҜҘи°“иҜҚиЎЁжҳҺ `t3` жҳҜдёҺ `t2` иҝӣиЎҢеӨ–иҝһжҺҘзҡ„пјҢе№¶дё”еҰӮжһңвҖң`tt2.name`вҖңдёҚдёә nullпјҢеҲҷе®ғи®Ўз®—дёә TRUEгҖӮ


    иҖғиҷ‘еҲ°жҹҘиҜўзҡ„е…·дҪ“жғ…еҶөпјҢжҲ‘д»¬еҸҜд»Ҙе°ҶдёӢйқўзҡ„и°“иҜҚ


    ```

