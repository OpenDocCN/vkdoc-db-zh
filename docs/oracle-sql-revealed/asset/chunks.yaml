- fmt: '# Unnesting Collections and Correlated Queries


    ### Unnesting Collections


    LetвҖҷs consider a table containing a nested table column.


    ```sql

    create or replace type numbers as table of number

    /

    create table tc (id int, nums numbers) nested table nums store as nums_t

    /

    insert into tc

    select -1 id, numbers(null) nums from dual

    union all select 0 id, numbers() nums from dual

    union all select 1 id, numbers(1) nums from dual

    union all select 2 id, numbers(1,2) nums from dual;

    ```

    **Listing 1-43** Table with nested table column


    If we need to unnest a subtable if itвҖҷs not empty, then it could be done using
    one of the approaches below.


    ```sql

    select tc.id, x.column_value

    from tc, table(tc.nums) x -- 1

    --from tc, lateral(select * from table(tc.nums)) x -- 2

    --from tc cross apply (select * from table(tc.nums)) x -- 3

    --from tc cross join table(tc.nums) x -- 4

    ;

    ID COLUMN_VALUE

    ---------- ------------


    1            1

    2            1

    2            2

    ```

    **Listing 1-44** Unnesting nested table


    The second and third approaches work starting with Oracle 12c.


    LetвҖҷs make the logic a bit more complicated: we need to unnest the table and return
    even those rows where a nested table is empty.


    ```sql

    select tc.id, x.column_value

    from tc, table(tc.nums)(+) x -- 1

    --from tc, lateral(select * from table(tc.nums))(+) x -- 2

    --from tc cross apply (select * from table(tc.nums))(+) x -- 3

    --from tc outer apply (select * from table(tc.nums)) x -- 4

    --from tc, table(tc.nums) x where nvl2(x.column_value(+), 0, 0) = nvl2(tc.id,
    0, 0) -- 5

    --from tc left join table(tc.nums) x on nvl2(x.column_value, 0, 0) = nvl2(tc.id,
    0, 0) -- 6

    ;

    ID COLUMN_VALUE

    ---------- ------------


    1            1

    2            1

    2            2

    ```

    **Listing 1-45** Unnesting nested table preserving rows where itвҖҷs empty


    A couple of important notes about this approach:


    *   Mixed syntax of `cross apply` and `(+)` returns correct result but this is
    not documented and should be avoided.

    *   Always-true predicate containing two tables was used in options #5 and #6.
    Option #5 returned incorrect result because of bug on all versions up to Oracle
    12cR1 (row with `id = 0` is missing). On the Oracle 12cR2, all options return
    all rows from the original table along with unnested rows.


    If the nested table is not stored, then option #6 returns an incorrect result
    on all versions including Oracle 12cR2.


    ```sql

    with tc as

    (select -1 id, numbers(null) nums from dual

    union all select 0 id, numbers() nums from dual

    union all select 1 id, numbers(1) nums from dual

    union all select 2 id, numbers(1,2) nums from dual)

    select tc.id, x.column_value

    from tc left join table(tc.nums) x on nvl2(x.column_value, 0, 0) = nvl2(tc.id,
    0, 0);

    ID COLUMN_VALUE

    ---------- ------------


    1            1

    2            1

    2            2

    ```

    **Listing 1-46** Trying to unnest table using ANSI outer join


    One of the descriptions of this behavior is Bug 20363558 : WRONG RESULTS FOR ANSI
    JOIN ON NESTED TABLE.


    A possible workaround for ANSI syntax for pre 12c versions is below:


    ```sql

    select tc.id, x.column_value

    from tc cross join table(case when cardinality(tc.nums) = 0 then numbers(null)
    else tc.nums end) x

    ```

    **Listing 1-47** Unnesting table using ANSI syntax on pre 12c versions


    If we use a nested varray instead of a nested table table, for example:


    ```sql

    create or replace type num_array as varray(32767) of number

    /

    create table tc (id int, nums num_array)

    /

    ```

    **Listing 1-48** Nested varray


    The result will be incorrect for option #6 irrespective whether varray is stored
    or constructed on the fly.


    So the query returns a correct result if we use an outer correlated table operator
    вҖ“ `table(вҖҰ)(+)` or `apply` syntax for Oracle 12c. On the other hand, a query may
    return an incorrect result if we try to use outer join (both ANSI and native)
    and regardless of whether the nested table/varray is persisted or not.


    ### Correlated Inline Views and Subqueries


    It was already demonstrated several times how to implement correlated inline views
    by using keywords `lateral`/`apply`. Before 12c similar functionality could be
    achieved using a table operator and `cast` + `multiset`/`collect` (also undocumented
    option in Oracle 11g is `event 22829`). An obvious disadvantage of such approaches
    is necessity to create an SQL type for collection.


    If we need to generate the number of rows equals to `id` for each row, then we
    can use the approaches below for Oracle 12c.


    ```sql

    select t3.id, v.idx

    from t3,

    lateral (select rownum idx

    from dual

    where rownum <= t3.id

    connect by rownum <= t3.id)(+) v;

    select t3.id, v.idx

    from t3

    outer apply (select rownum idx

    from dual

    where rownum <= t3.id

    connect by rownum <= t3.id) v;

    ```

    **Listing 1-49** Correlated inline views, 12c


    Pre Oracle 12c it could be achieved as demonstrated in Listing 1-50.


    ```sql

    select t3.id, v.column_value idx

    from t3,

    table(cast(multiset (select rownum

    from dual

    where rownum <= t3.id

    connect by rownum <= t3.id) as sys.odcinumberlist))(+) v;

    select t3.id, v.column_value idx

    from t3,

    table (select cast(collect(rownum) as sys.odcinumberlist)

    from dual

    where rownum <= t3.id

    connect by rownum <= t3.id)(+) v;

    ```

    **Listing 1-50** Correlated inline views, 11g


    Option with `cast` + `multiset` is more preferable for performance reasons.


    In all cases, the result is the following:


    ```sql

    ID        IDX

    ---------- ----------


    1          1

    2          1

    2          2

    ```


    Strictly speaking, pre Oracle 12c we use an outer correlated table operator instead
    of an inline view.


    Yet another limitation for correlated subqueries (table operator and `cast` +
    `multiset`/`collect`) for pre Oracle 12c versions was visibility of correlation
    names only for one level deep. In the example below, `m2`, `m4`, `m5` can be calculated
    only in Oracle 12c (all expressions are logically equivalent).


    ```sql

    select id,

    greatest((select min(id) mid from t3 where t3.id > t.id), 1) m1,

    (select max(mid)

    from (select min(id) mid

    from t3

    where t3.id > t.id

    union

    select 1 from dual) z) m2,

    (select max(value(v))

    from table(cast(multiset (select min(id) mid

    from t3

    where t3.id > t.id

    union

    select 1 from dual) as sys.odcinumberlist)) v) m3,

    (select max(value(v))

    from table (select cast(collect(mid) as sys.odcinumberlist) col

    from (select min(id) mid

    from t3

    where t3.id > t.id

    union

    select 1 from dual) z) v) m4,

    (select value(v)

    from table(cast(multiset (select max(mid)

    from (select min(id) mid

    from t3

    where t3.id > t.id

    union

    select 1 from dual) z) as

    sys.odcinumberlist)) v) m5

    from t3 t

    where t.id = 1;

    ID        M1        M2        M3        M4        M5

    ---------- ---------- ---------- ---------- ---------- --------

    1         2         2         2         2         2

    ```

    **Listing 1-51** Visibility of columns from main table in table expression


    ItвҖҷs not always possible to simplify a (scalar) subquery so that it contains only
    one level deep; a possible workaround in such cases for pre Oracle 12 was encapsulating
    logic in UDF and then specifying it in a select list or rewriting the query to
    use explicit joins instead of (scalar) subqueries. In Oracle 12c scalar subqueries
    also should be used after careful consideration because sometimes they may be
    incorrectly or inefficiently transformed by the SQL engine.


    The last important point in this section - `lateral`/`apply` does not allow such
    a flexible correlation as `collect`/`multiset`. For example itвҖҷs not possible
    to specify the column from the main table to start with. The last query from Listing
    1-52 fails with вҖңORA-00904: "T1" . "ID": invalid identifierвҖқ if we uncomment вҖң`t1.id`вҖқ.


    ```sql

    select t1.*,

    l.*

    from t1,

    table(cast(multiset (select id

    from t3

    start with t3.id = t1.id

    connect by prior t3.id + 1 = t3.id) as numbers)) l;

    select t1.*, l.*

    from t1,

    table (select cast(collect(id) as numbers)

    from t3

    start with t3.id = t1.id

    connect by prior t3.id + 1 = t3.id) l;

    select t1.*, l.*

    from t1,

    lateral (select id

    from t3

    start with t3.id = 0 -- t1.id

    connect by prior t3.id + 1 = t3.id) l;

    ```

    **Listing 1-52** Visibility of columns from main table in table expression and
    lateral view'
