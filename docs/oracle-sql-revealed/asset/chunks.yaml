- fmt: '### Avoiding Multiple Sorts


    The second use case regarding analytic functions will be about ordering that is
    caused by analytics. Listing [11-10](#A455196_1_En_11_Chapter.html#Par65) shows
    a fact table with low cardinality dimensions.


    ```sql

    exec dbms_random.seed(1);

    create table fact_a as

    select date ''2010-01-01'' + level / (60 * 24) dt,

    trunc(3 * dbms_random.value()) dim_1_id,

    trunc(3 * dbms_random.value()) dim_2_id,

    trunc(1000 * dbms_random.value()) value

    from dual

    connect by level <= 3e6;

    exec dbms_stats.gather_table_stats(user, ''fact_a'');

    ```


    **Listing 11-10**

    Fact table with low cardinality dimensions


    The goal is to calculate a cumulative sum by each dimension and their combination
    - `dim_1_id`, `dim_2_id` with ordering by `dt`.


    ```sql

    select dt,

    dim_1_id,

    dim_2_id,

    value,

    sum(val) over(partition by dim_1_id order by dt) dim1_sum,

    sum(val) over(partition by dim_2_id order by dt) dim2_sum,

    sum(val) over(partition by dim_1_id, dim_2_id order by dt)

    dim1_dim2_sum

    from fact_a

    order by dt

    ```


    To minimize fetch letвҖҷs use the following query, which returns only a single row.


    ```sql

    select to_char(sum(dim1_sum), lpad(''9'', 20, ''9'')) d1,

    to_char(sum(dim2_sum), lpad(''9'', 20, ''9'')) d2,

    to_char(sum(dim1_dim2_sum), lpad(''9'', 20, ''9'')) d12

    from (select dt,

    dim_1_id,

    dim_2_id,

    value,

    sum(value) over(partition by dim_1_id order by dt) dim1_sum,

    sum(value) over(partition by dim_2_id order by dt) dim2_sum,

    sum(value) over(partition by dim_1_id, dim_2_id order by dt)

    dim1_dim2_sum

    from fact_a

    order by dt);

    D1                    D2                    D12

    ------------------- --------------------- ---------------------

    749461709848354       749461230723892       249821726573778

    ```


    There are three sorts in the query plan even though ordering always by `dt`. This
    is because the expression for partitioning differs.


    ```

    | Id | Operation                | Name   | Starts | E-Rows  | A-Rows  |   A-Time    |
    Buffers | Reads | Writes |

    |  0 | SELECT STATEMENT         |        |      1 |         |      1  | 00:01:21.85
    |    9272 | 96051 |  90717 |

    |  1 |  SORT AGGREGATE          |        |      1 |      1  |      1  | 00:01:21.85
    |    9272 | 96051 |  90717 |

    |  2 |   VIEW                   |        |      1 |   3000K |   3000K | 00:01:21.06
    |    9272 | 96051 |  90717 |

    |  3 |    SORT ORDER BY         |        |      1 |   3000K |   3000K | 00:01:20.05
    |    9272 | 96051 |  90717 |

    |  4 |     WINDOW SORT          |        |      1 |   3000K |   3000K | 00:01:11.46
    |    9267 | 82098 |  76764 |

    |  5 |      WINDOW SORT         |        |      1 |   3000K |   3000K | 00:00:42.91
    |    9257 | 48721 |  45685 |

    |  6 |       WINDOW SORT        |        |      1 |   3000K |   3000K | 00:00:20.28
    |    9249 | 21504 |  20284 |

    |  7 |        TABLE ACCESS FULL | FACT_A |      1 |   3000K |   3000K | 00:00:00.49
    |    9240 |     0 |      0 |

    ```


    Total execution time is approximately 1 minute and 20 seconds and as we see in
    columns `Reads`/`Writes`, all three sorts cause reads/writes from temporary tablespace.
    LetвҖҷs set the maximum possible memory for sort and re-run the query.


    ```sql

    alter session set workarea_size_policy = manual;

    alter session set sort_area_size = 2147483647;

    ```


    The elapsed time dropped four times and all the sorts have been performed in memory.


    ```

    | Id | Operation                | Name   | Starts | E-Rows  | A-Rows  |   A-Time    |
    Buffers |

    |  0 | SELECT STATEMENT         |        |      1 |         |      1  | 00:00:21.08
    |    9240 |

    |  1 |  SORT AGGREGATE          |        |      1 |      1  |      1  | 00:00:21.08
    |    9240 |

    |  2 |   VIEW                   |        |      1 |   3000K |   3000K | 00:00:20.41
    |    9240 |

    |  3 |    SORT ORDER BY         |        |      1 |   3000K |   3000K | 00:00:19.59
    |    9240 |

    |  4 |     WINDOW SORT          |        |      1 |   3000K |   3000K | 00:00:17.50
    |    9240 |

    |  5 |      WINDOW SORT         |        |      1 |   3000K |   3000K | 00:00:11.83
    |    9240 |

    |  6 |       WINDOW SORT        |        |      1 |   3000K |   3000K | 00:00:06.58
    |    9240 |

    |  7 |        TABLE ACCESS FULL | FACT_A |      1 |   3000K |   3000K | 00:00:00.47
    |    9240 |

    ```


    Taking into account the specifics of analytic widows in this query, we can implement
    the required logic using PL/SQL associative arrays and a cursor with a single
    `order by`. Listing [11-11](#A455196_1_En_11_Chapter.html#Par77) shows this approach
    and the required types.


    ```sql

    create or replace function f_fact_a return tt_fact_a

    pipelined is

    type tt1 is table of number index by pls_integer;

    type tt2 is table of tt1 index by pls_integer;

    l_dim1  tt1;

    l_dim2  tt1;

    l_dim12 tt2;

    begin

    for r in (select /*+ lvl 0 */

    dt, dim_1_id, dim_2_id, value

    from fact_a

    order by dt) loop

    -- NoFormat Start

    l_dim1(r.dim_1_id) := case

    when l_dim1.exists(r.dim_1_id)

    then l_dim1(r.dim_1_id)

    else 0

    end + r.value;

    l_dim2(r.dim_2_id) := case

    when l_dim2.exists(r.dim_2_id)

    then l_dim2(r.dim_2_id)

    else 0

    end + r.value;

    l_dim12(r.dim_1_id)(r.dim_2_id) :=

    case

    when l_dim12.exists(r.dim_1_id)

    and l_dim12(r.dim_1_id).exists(r.dim_2_id)

    then l_dim12(r.dim_1_id)(r.dim_2_id)

    else 0

    end + r.value ;

    -- NoFormat End

    pipe row(to_fact_a(r.dt,

    r.dim_1_id,

    r.dim_2_id,

    r.value,

    l_dim1(r.dim_1_id),

    l_dim2(r.dim_2_id),

    l_dim12(r.dim_1_id) (r.dim_2_id)));

    end loop;

    end;

    /


    create or replace type to_fact_a as object

    (

    dt            date,

    dim_1_id      number,

    dim_2_id      number,

    value         number,

    dim1_sum      number,

    dim2_sum      number,

    dim1_dim2_sum number

    )

    /


    create or replace type tt_fact_a as table of to_fact_a

    /

    ```


    **Listing 11-11**

    Avoiding multiple sort operations


    LetвҖҷs compile a function with disabled PL/SQL optimization.


    ```sql

    alter session set plsql_optimize_level = 0;

    alter function f_fact_a compile;

    set timing on

    select to_char(sum(dim1_sum), lpad(''9'', 20, ''9'')) d1,

    to_char(sum(dim2_sum), lpad(''9'', 20, ''9'')) d2,

    to_char(sum(dim1_dim2_sum), lpad(''9'', 20, ''9'')) d12

    from table(f_fact_a)

    order by dt;

    ```


    The average execution time is around 45 seconds, which is worse than an SQL approach.


    LetвҖҷs now change the parameter value `plsql_optimize_level` to 2 (this is default
    value) and compile the function after replacing `/*+ lvl 0 */` with `/*+ lvl 2
    */` in the code.


    The average execution time became 12-14 seconds, which is better than the SQL
    approach.


    The reason for such a significant improvement is that the fetch size for the default
    optimization level is 100 rows . You can easily check that in `v$sql` view.


    ```sql

    select regexp_substr(sql_text, ''/.*/'') hint,

    executions,

    fetches,

    rows_processed

    from v$sql s

    where sql_text like ''%FROM FACT_A%''

    and sql_text not like ''%v$sql%'';

    HINT            EXECUTIONS    FETCHES ROWS_PROCESSED

    --------------- ---------- ---------- --------------

    /*+ lvl 0 */             2    6000002        6000000

    /*+ lvl 2 */             2      60002        6000000

    ```


    So the PL/SQL approach is approximately 35% faster for this task, but for a larger
    number of cumulative sums the difference would be more substantial, and more importantly,
    itвҖҷs possible to increase the fetch size, which would make the PL/SQL approach
    several times faster. Additional information about that can be found in вҖңDoing
    SQL from PL/SQL: Best and Worst PracticesвҖқ [9].'
