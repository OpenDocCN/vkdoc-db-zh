    еңЁиҝҷдёӘи§ЈеҶіж–№жЎҲдёӯпјҢжҲ‘д»¬дҪҝз”ЁдәҶдёҖдёӘеёҰиҒҡеҗҲеҮҪж•°зҡ„жқЎд»¶ `sum(x) < 2 * first(x)` жқҘд»ЈжӣҝзҙҜз§ҜжұӮе’ҢгҖӮдёҖдёӘзӯүж•Ҳзҡ„гҖҒеҗҢж—¶дҪҝз”Ё `x` е’Ң `s`
    зҡ„жқЎд»¶жҳҜ `last(s) - first(s) < first(x)`гҖӮз„¶иҖҢпјҢеҰӮжһңдҪҝз”Ё `max(s) - min(s) < first(x)`пјҢжҹҘиҜўдјҡеӣ 
    ORA-03113 й”ҷиҜҜиҖҢеӨұиҙҘпјҲзүҲжң¬ 12.2.0.1.0, 12.1.0.2.0пјүгҖӮеңЁжЁЎејҸеҢ№й…ҚдёӯпјҢзү№е®ҡеҮҪж•° `first`/`last` жҜ”иҒҡеҗҲеҮҪж•° `min`/`max`
    жӣҙеҸҜеҸ–пјҢеӣ дёәжҲ‘д»¬зҹҘйҒ“ `s` жҳҜеҚ•и°ғйҖ’еўһзҡ„гҖӮ


    д№ҹеҸҜд»ҘдҪҝз”ЁеёҰжңү `min`/`max` зҡ„и§„еҲҷпјӣдҪҶеҰӮжһңжҲ‘д»¬дҪҝз”ЁжүҖжңүиЎҢпјҲ`all rows`пјүиҖҢдёҚжҳҜеҚ•иЎҢпјҲ`one row`пјүе№¶иҝӣиЎҢиҝҮж»ӨпјҢиҝҷжҳҫз„¶дјҡеј•е…ҘйўқеӨ–зҡ„жҲҗжң¬гҖӮ


    ```sql

    select *

    from (select h.*,

