- fmt: '# 7. `Model`


    One may say that the `model` clause is the most powerful SQL feature, meaning
    that it can be used to solve numerous tasks that otherwise would not be resolvable
    using SQL. This can be accomplished not only because the `model` clause considerably
    extends possibilities of declarative SQL, but in addition to that it introduces
    ability of iterative computations in SQL on top of a recordset. On the other hand,
    the `model` clause has some issues with scalability and, in general, a class of
    problems where the `model` shines is quite limited. In many cases PL/SQL is preferable
    even though a result can be achieved using a `model` clause, but first things
    first.


    A `model` clause allows you to treat a recordset as a multidimensional cube by
    mapping columns into three groups: partitions, dimensions, and measures.


    *   Partitions specify logical groups and rules of the `model` are applied to
    partitions independently. Specifying partitions may help to dramatically leverage
    power of parallel execution.

    *   Dimension columns are used to define a multidimensional cube and, by default,
    a combination of all the dimensions uniquely identifies cells in the cube. From
    another perspective we may say вҖ“ to uniquely identify a row in a spreadsheet or
    a value in a multidimensional array.

    *   Measures are values of multidimensional cubes that can be calculated using
    `model` rules. As a rule, measures are numeric values but, unlike many others
    tools for multidimensional analysis, Oracle supports dates and strings or even
    RAW values as measures.


    Partitions, dimensions, and measures can be specified not only as mappings to
    columns of the query but also as expressions.


    LetвҖҷs see how it works using an example from Listing 7-1.


    ```sql

    with t(id, value) as

    (

    select 1, 3 from dual

    union all select 2, 9 from dual

    union all select 3, 8 from dual

    union all select 5, 5 from dual

    union all select 10, 4 from dual

    )

    select * from t

    model

    -- return updated rows

    dimension by (id)

    measures (value, 0 result)

    -- rules

    (

    result[id >= 5] = sum(value)[id <= cv(id)],

    result[0] = value[10] + value[value[1]]

    );

    ID      VALUE     RESULT

    ---------- ---------- ----------

    1          3          0

    2          9          0

    3          8          0

    5          5         25

    10          4         29

    0                    12

    Listing 7-1

    Basic example of the model clause

    ```


    We defined a single dimension by `ID` column and two measures: one as mapped to
    a `value` column and another one as a zero.


    Rule `result[id >= 5] = sum(value)[id <= cv(id)]` is applied only to rows with
    dimension values greater or equal to 5, which means two rows in our example вҖ“
    with `ID = 5` and `ID = 10`. The value of the expression is a summarized measure
    for all the rows with dimension value equal or less than the current dimension
    value. The function `cv` is used on the right side of the rule to access current
    dimension value when multiple rows are referenced on the left side of the rule.


    ### Note


    You may also see function `currentv` in documentation for Oracle 10g Release 1,
    but it does not appear in documentation for later versions although it looks like
    it still works. Similarly `model` keyword is interchangeable with `spreadsheet`
    keyword but the latter is no longer documented.


    Rule `result[0] = value[10] + value[value[1]]` means that the measure value for
    a cell with dimension value 0 is a sum of measure value for `ID = 10` and `ID
    = value[1]`, which is 3. Please note that the cell with dimension value 0 did
    not exist in original recordset and was added during the `model` clause evaluation.
    As will be shown later, this behavior may be adjusted. `value[value[1]]` is an
    example of nested cell reference.


    So we can consider measures as values of multidimensional arrays and dimensions
    as indices to address the values; however, measure values also can be used to
    access the cells.


    If we uncomment the `return updated rows` in Listing 7-1, then the result will
    contain only rows with applied rules вҖ“ that is, with IDs 5, 10, and 0. The default
    value is `return for all rows`. The `rules` keyword is optional unless you want
    to specify iterations.


    There are two notations to address cells вҖ“ `symbolic dimension reference` and
    `positional dimension reference`. In case of a symbolic dimension reference, there
    must be a predicate containing the name of the dimension; otherwise the dimension
    reference is positional вҖ“ for example, constant value, expression, or even a `for`
    loop. Differences between the notations are important for the left side of the
    rule which identifies the cells that are updated with the values from the right
    side of the rule.


    The way how Oracle treats missing cells can be specified using keywords `update`/`upsert
    all`/`upsert`. `Update` only updates existing cells, `upsert` (default value)
    updates existing cells and creates missing cells in case of a positional reference
    while `upsert all` also creates missing cells for mixed references if the dimension
    values used in the symbolic reference existed in the original recordset. LetвҖҷs
    see how it works for specific example as shown in Listing 7-2.


    ```sql

    with t(dim1, dim2, value) as

    (

    select 0, 0, 1 from dual

    union all select 0, 1, 2 from dual

    union all select 1, 0, 3 from dual

    )

    select * from t

    model

    dimension by (dim1, dim2)

    measures (value, cast(null as number) result)

    rules upsert all

    (

    result[0, 0] = -1,

    result[dim1=1, dim2=0] = -3,

    result[-1, for dim2 in (select count(*) from dual)] = -4,

    result[-2, dim2=1] = -10,

    result[-3, dim2=-1] = -100,

    result[-4, -1] = -1000

    )

    order by dim1, dim2;

    DIM1       DIM2      VALUE     RESULT

    ---------- ---------- ---------- ----------

    -4         -1                 -1000

    -2          1                   -10

    -1          1                    -4

    0          0          1         -1

    0          1          2

    1          0          3         -3

    Listing 7-2

    Upsert all in action

    ```


    There are 3 original rows and 3 created ones in the query output from Listing
    7-2. Cells with values -4 and -1000 have been added because the positional notation
    was used for both dimensions. The cell with value -10 was added because the value
    for symbolic notation `dim2=1` existed in the original recordset even though the
    positional value for `dim1` did not exist. The measure with value -100 was not
    added because the value -1 used in symbolic notation for `dim2` did not exist.
    The measure value for cell `[0, 1]` is unknown because no rule was specified for
    it. And finally, the result for cells `[0, 0]` and `[dim1=1, dim2=0]` was calculated
    because they existed in the original recordset.


    If we specify `upsert` then measure -10 will be excluded from the result set,
    and if we specify `update` then cells with the result values -4 and -1000 will
    also disappear.


    Simply speaking, symbolic references are used when we aim to work with existing
    data only while positional references can be used if there may be a necessity
    to add new cells вҖ“ for example, in case of forecasting or interpolation. Mixed
    reference makes sense when some dimensions are supposed to be fixed while another
    can be extended with new members.


    If we want to reference all the members of the dimension then we can use the keyword
    `any` for positional reference or the `is any` predicate for symbolic reference.
    The behavior is the same in both cases вҖ“ the rule is applied to all the members
    of the dimension and new ones cannot be created.


    When the left side of the rule references multiple rows, the order may be very
    important as demonstrated in Listing 7-3.'
  raw: '# 7.В Model


    One may say that the model clause is the most powerful SQL feature, meaning that
    it can be used to solve numerous tasks that otherwise would not be resolvable
    using SQL. This can be accomplished not only because the model clause considerably
    extends possibilities of declarative SQL, but in addition to that it introduces
    ability of iterative computations in SQL on top of a recordset. On the other hand,
    the model clause has some issues with scalability and, in general, a class of
    problems where the model shines is quite limited. In many cases PL/SQL is preferable
    even though a result can be achieved using a model clause, but first things first.


    A model clause allows you to treat a recordset as a multidimensional cube by mapping
    columns into three groups: partitions, dimensions, and measures.


    *   Partitions specify logical groups and rules of the model are applied to partitions
    independently. Specifying partitions may help to dramatically leverage power of
    parallel execution.

    *   Dimension columns are used to define a multidimensional cube and, by default,
    a combination of all the dimensions uniquely identifies cells in the cube. From
    another perspective we may sayВ вҖ“ to uniquely identify a row in a spreadsheet or
    a value in a multidimensional array .

    *   Measures are values of multidimensional cubes that can be calculated using
    model rules. As a rule, measures are numeric values but, unlike many others tools
    for multidimensional analysis, Oracle supports dates and strings or even RAW values
    as measures.


    Partitions, dimensions, and measures can be specified not only as mappings to
    columns of the query but also as expressions.


    LetвҖҷs see how it works using an example from Listing [7-1](#A455196_1_En_7_Chapter.html#Par8).


    ```

    with t(id, value) as

    (

    select 1, 3 from dual

    union all select 2, 9 from dual

    union all select 3, 8 from dual

    union all select 5, 5 from dual

    union all select 10, 4 from dual

    )

    select * from t

    model

    -- return updated rows

    dimension by (id)

    measures (value, 0 result)

    -- rules

    (

    result[id >= 5] = sum(value)[id <= cv(id)],

    result[0] = value[10] + value[value[1]]

    );

    ID      VALUE     RESULT

    ---------- ---------- ----------

    1          3          0

    2          9          0

    3          8          0

    5          5         25

    10          4         29

    0                    12

    Listing 7-1

    Basic example of the model clause

    ```


    We defined a single dimension by ID column and two measures: one as mapped to
    a value column and another one as a zero.


    Rule `result[id >= 5] = sum(value)[id <= cv(id)]` is applied only to rows with
    dimension values greater or equal to 5, which means two rows in our exampleВ вҖ“
    with ID = 5 and ID = 10\. The value of the expression is a summarized measure
    for all the rows with dimension value equal or less than the current dimension
    value. The function `cv` is used on the right side of the rule to access current
    dimension value when multiple rows are referenced on the left side of the rule.


    Note


    You may also see function `currentv` in documentation for Oracle 10g Release 1,
    but it does not appear in documentation for later versions although it looks like
    it still works. Similarly `model` keyword is interchangeable with `spreadsheet`
    keyword but the latter is no longer documented.


    Rule `result[0] = value[10] + value[value[1]]` means that the measure value for
    a cell with dimension value 0 is a sum of measure value for ID = 10 and ID = value[1],
    which is 3\. Please note that the cell with dimension value 0 did not exist in
    original recordset and was added during the model clause evaluation. As will be
    shown later, this behavior may be adjusted. `value[value[1]]` is an example of
    nested cell reference.


    So we can consider measures as values of multidimensional arrays and dimensions
    as indices to address the values; however, measure values also can be used to
    access the cells.


    If we uncomment the `return updated rows` in Listing [7-1](#A455196_1_En_7_Chapter.html#Par8),
    then the result will contain only rows with applied rulesВ вҖ“ that is, with IDs
    5, 10, and 0\. The default value is `return for all rows`. The `rules` keyword
    is optional unless you want to specify iterations.


    There are two notations to address cellsВ вҖ“ symbolic dimension reference and positional
    dimension reference . In case of a symbolic dimension reference, there must be
    a predicate containing the name of the dimension; otherwise the dimension reference
    is positionalВ вҖ“ for example, constant value, expression, or even a for loop. Differences
    between the notations are important for the left side of the rule which identifies
    the cells that are updated with the values from the right side of the rule.


    The way how Oracle treats missing cells can be specified using keywords `update/upsert
    all/upsert. Update` only updates existing cells, `upsert` (default value) updates
    existing cells and creates missing cells in case of a positional reference while
    `upsert all` also creates missing cells for mixed references if the dimension
    values used in the symbolic reference existed in the original recordset. LetвҖҷs
    see how it works for specific example as shown in Listing [7-2](#A455196_1_En_7_Chapter.html#Par17).


    ```

    with t(dim1, dim2, value) as

    (

    select 0, 0, 1 from dual

    union all select 0, 1, 2 from dual

    union all select 1, 0, 3 from dual

    )

    select * from t

    model

    dimension by (dim1, dim2)

    measures (value, cast(null as number) result)

    rules upsert all

    (

    result[0, 0] = -1,

    result[dim1=1, dim2=0] = -3,

    result[-1, for dim2 in (select count(*) from dual)] = -4,

    result[-2, dim2=1] = -10,

    result[-3, dim2=-1] = -100,

    result[-4, -1] = -1000

    )

    order by dim1, dim2;

    DIM1       DIM2      VALUE     RESULT

    ---------- ---------- ---------- ----------

    -4         -1                 -1000

    -2          1                   -10

    -1          1                    -4

    0          0          1         -1

    0          1          2

    1          0          3         -3

    Listing 7-2

    Upsert all in action

    ```


    There are 3 original rows and 3 created ones in the query output from Listing
    [7-2](#A455196_1_En_7_Chapter.html#Par17). Cells with values -4 and -1000 have
    been added because the positional notation was used for both dimensions. The cell
    with value -10 was added because the value for symbolic notation dim2=1 existed
    in the original recordset even though the positional value for dim1 did not exist.
    The measure with value -100 was not added because the value -1 used in symbolic
    notation for dim2 did not exist. The measure value for cell [0, 1] is unknown
    because no rule was specified for it. And finally, the result for cells [0, 0]
    and [dim1=1, dim2=0] was calculated because they existed in the original recordset.


    If we specify `upsert` then measure -10 will be excluded from the result set,
    and if we specify `update` then cells with the result values -4 and -1000 will
    also disappear.


    Simply speaking, symbolic references are used when we aim to work with existing
    data only while positional references can be used if there may be a necessity
    to add new cellsВ вҖ“ for example, in case of forecasting or interpolation. Mixed
    reference makes sense when some dimensions are supposed to be fixed while another
    can be extended with new members.


    If we want to reference all the members of the dimension then we can use the keyword
    `any` for positional reference or the `is any` predicate for symbolic reference.
    The behavior is the same in both casesВ вҖ“ the rule is applied to all the members
    of the dimension and new ones cannot be created.


    When the left side of the rule references multiple rows, the order may be very
    important as demonstrated in Listing [7-3](#A455196_1_En_7_Chapter.html#Par23).'
  trans: '

    # 7. `Model`


    еҸҜд»ҘиҜҙпјҢ`model` еӯҗеҸҘжҳҜ SQL дёӯжңҖејәеӨ§зҡ„еҠҹиғҪпјҢиҝҷж„Ҹе‘ізқҖе®ғеҸҜд»Ҙз”ЁжқҘи§ЈеҶіи®ёеӨҡдҪҝз”Ё SQL еҺҹжң¬ж— жі•и§ЈеҶізҡ„д»»еҠЎгҖӮиҝҷдёҚд»…жҳҜеӣ дёә `model` еӯҗеҸҘжһҒеӨ§ең°жү©еұ•дәҶеЈ°жҳҺејҸ
    SQL зҡ„еҸҜиғҪжҖ§пјҢиҝҳеӣ дёәе®ғдёә SQL еңЁи®°еҪ•йӣҶд№ӢдёҠеј•е…ҘдәҶиҝӯд»Ји®Ўз®—зҡ„иғҪеҠӣгҖӮеҸҰдёҖж–№йқўпјҢ`model` еӯҗеҸҘеңЁеҸҜжү©еұ•жҖ§ж–№йқўеӯҳеңЁдёҖдәӣй—®йўҳпјҢиҖҢдё”жҖ»дҪ“дёҠпјҢ`model`
    еӯҗеҸҘеӨ§ж”ҫејӮеҪ©зҡ„й—®йўҳзұ»еҲ«жҳҜзӣёеҪ“жңүйҷҗзҡ„гҖӮеңЁи®ёеӨҡжғ…еҶөдёӢпјҢеҚідҪҝеҸҜд»ҘйҖҡиҝҮ `model` еӯҗеҸҘе®һзҺ°з»“жһңпјҢPL/SQL д№ҹеҫҖеҫҖжҳҜжӣҙдјҳзҡ„йҖүжӢ©пјҢдёҚиҝҮжҲ‘д»¬иҝҳжҳҜд»ҺеҹәзЎҖејҖе§Ӣи®Іиө·гҖӮ


    `model` еӯҗеҸҘе…Ғи®ёдҪ е°Ҷи®°еҪ•йӣҶи§ҶдёәдёҖдёӘеӨҡз»ҙз«Ӣж–№дҪ“пјҢйҖҡиҝҮе°ҶеҲ—жҳ е°„еҲ°дёүз»„пјҡеҲҶеҢәгҖҒз»ҙеәҰе’ҢеәҰйҮҸгҖӮ


    *   еҲҶеҢәжҢҮе®ҡдәҶйҖ»иҫ‘з»„пјҢ`model` и§„еҲҷдјҡзӢ¬з«Ӣең°еә”з”ЁдәҺеҗ„дёӘеҲҶеҢәгҖӮжҢҮе®ҡеҲҶеҢәеҸҜиғҪжңүеҠ©дәҺжҳҫи‘—жҸҗеҚҮе№¶иЎҢжү§иЎҢзҡ„иғҪеҠӣгҖӮ

    *   з»ҙеәҰеҲ—з”ЁдәҺе®ҡд№үеӨҡз»ҙз«Ӣж–№дҪ“пјҢй»ҳи®Өжғ…еҶөдёӢпјҢжүҖжңүз»ҙеәҰзҡ„з»„еҗҲе”ҜдёҖж ҮиҜҶз«Ӣж–№дҪ“дёӯзҡ„еҚ•е…ғж јгҖӮд»ҺеҸҰдёҖдёӘи§’еәҰзңӢпјҢжҲ‘д»¬еҸҜд»Ҙиҝҷд№ҲиҜҙвҖ”вҖ”з”ЁдәҺе”ҜдёҖж ҮиҜҶз”өеӯҗиЎЁж јдёӯзҡ„дёҖиЎҢжҲ–еӨҡз»ҙж•°з»„дёӯзҡ„дёҖдёӘеҖјгҖӮ

    *   еәҰйҮҸжҳҜеӨҡз»ҙз«Ӣж–№дҪ“зҡ„еҖјпјҢеҸҜд»ҘдҪҝз”Ё `model` и§„еҲҷиҝӣиЎҢи®Ўз®—гҖӮйҖҡеёёпјҢеәҰйҮҸжҳҜж•°еҖјпјҢдҪҶдёҺе…¶д»–и®ёеӨҡеӨҡз»ҙеҲҶжһҗе·Ҙе…·дёҚеҗҢпјҢOracle ж”ҜжҢҒж—ҘжңҹгҖҒеӯ—з¬ҰдёІз”ҡиҮі RAW
    еҖјдҪңдёәеәҰйҮҸгҖӮ


    еҲҶеҢәгҖҒз»ҙеәҰе’ҢеәҰйҮҸдёҚд»…еҸҜд»Ҙжҳ е°„еҲ°жҹҘиҜўзҡ„еҲ—пјҢд№ҹеҸҜд»ҘжҢҮе®ҡдёәиЎЁиҫҫејҸгҖӮ


    и®©жҲ‘д»¬йҖҡиҝҮжё…еҚ• 7-1 дёӯзҡ„дҫӢеӯҗжқҘзңӢзңӢе®ғжҳҜеҰӮдҪ•е·ҘдҪңзҡ„гҖӮ


    ```sql

    with t(id, value) as

    (

    select 1, 3 from dual

    union all select 2, 9 from dual

    union all select 3, 8 from dual

    union all select 5, 5 from dual

    union all select 10, 4 from dual

    )

    select * from t

    model

    -- иҝ”еӣһжӣҙж–°еҗҺзҡ„иЎҢ

    dimension by (id)

    measures (value, 0 result)

    -- и§„еҲҷ

    (

    result[id >= 5] = sum(value)[id <= cv(id)],

    result[0] = value[10] + value[value[1]]

    );

    ID      VALUE     RESULT

    ---------- ---------- ----------

    1          3          0

    2          9          0

    3          8          0

    5          5         25

    10          4         29

    0                    12

    жё…еҚ• 7-1

    model еӯҗеҸҘзҡ„еҹәжң¬зӨәдҫӢ

    ```


    жҲ‘д»¬йҖҡиҝҮ `ID` еҲ—е®ҡд№үдәҶдёҖдёӘз»ҙеәҰе’ҢдёӨдёӘеәҰйҮҸпјҡдёҖдёӘжҳ е°„еҲ° `value` еҲ—пјҢеҸҰдёҖдёӘеҲқе§ӢеҖјдёәйӣ¶гҖӮ


    и§„еҲҷ `result[id >= 5] = sum(value)[id <= cv(id)]` д»…еә”з”ЁдәҺз»ҙеәҰеҖјеӨ§дәҺжҲ–зӯүдәҺ 5 зҡ„иЎҢпјҢеңЁжҲ‘д»¬зҡ„дҫӢеӯҗдёӯж„Ҹе‘ізқҖдёӨиЎҢвҖ”вҖ”`ID
    = 5` е’Ң `ID = 10` зҡ„иЎҢгҖӮиЎЁиҫҫејҸзҡ„еҖјжҳҜз»ҙеәҰеҖје°ҸдәҺжҲ–зӯүдәҺеҪ“еүҚз»ҙеәҰеҖјзҡ„жүҖжңүиЎҢзҡ„еәҰйҮҸеҖјжҖ»е’ҢгҖӮеҪ“и§„еҲҷе·Ұдҫ§еј•з”ЁдәҶеӨҡиЎҢж—¶пјҢеҸідҫ§дҪҝз”Ё `cv` еҮҪж•°жқҘи®ҝй—®еҪ“еүҚзҡ„з»ҙеәҰеҖјгҖӮ


    ### жіЁж„Ҹ


    еңЁ Oracle 10g Release 1 зҡ„ж–ҮжЎЈдёӯпјҢдҪ еҸҜиғҪиҝҳдјҡзңӢеҲ° `currentv` еҮҪж•°пјҢдҪҶеңЁеҗҺз»ӯзүҲжң¬зҡ„ж–ҮжЎЈдёӯе®ғдёҚеҶҚеҮәзҺ°пјҢе°Ҫз®ЎзңӢиө·жқҘе®ғд»Қз„¶жңүж•ҲгҖӮзұ»дјјең°пјҢ`model`
    е…ій”®еӯ—еҸҜд»ҘдёҺ `spreadsheet` е…ій”®еӯ—дә’жҚўдҪҝз”ЁпјҢдҪҶеҗҺиҖ…е·ІдёҚеҶҚжңүж–ҮжЎЈи®°иҪҪгҖӮ


    и§„еҲҷ `result[0] = value[10] + value[value[1]]` иЎЁзӨәз»ҙеәҰеҖјдёә 0 зҡ„еҚ•е…ғж јзҡ„еәҰйҮҸеҖјжҳҜ `ID = 10` е’Ң `ID
    = value[1]`пјҲеҚі 3пјүзҡ„еәҰйҮҸеҖјд№Ӣе’ҢгҖӮиҜ·жіЁж„ҸпјҢз»ҙеәҰеҖјдёә 0 зҡ„еҚ•е…ғж јеңЁеҺҹе§Ӣи®°еҪ•йӣҶдёӯе№¶дёҚеӯҳеңЁпјҢиҖҢжҳҜеңЁ `model` еӯҗеҸҘжұӮеҖјжңҹй—ҙиў«ж·»еҠ зҡ„гҖӮзЁҚеҗҺе°Ҷеұ•зӨәпјҢиҝҷз§ҚиЎҢдёәжҳҜеҸҜд»Ҙи°ғж•ҙзҡ„гҖӮ`value[value[1]]`
    жҳҜеөҢеҘ—еҚ•е…ғж јеј•з”Ёзҡ„дёҖдёӘдҫӢеӯҗгҖӮ


    еӣ жӯӨпјҢжҲ‘д»¬еҸҜд»Ҙе°ҶеәҰйҮҸи§ҶдёәеӨҡз»ҙж•°з»„зҡ„еҖјпјҢиҖҢз»ҙеәҰжҳҜеҜ»еқҖиҝҷдәӣеҖјзҡ„зҙўеј•пјӣз„¶иҖҢпјҢеәҰйҮҸеҖјд№ҹеҸҜд»Ҙз”ЁдәҺи®ҝй—®еҚ•е…ғж јгҖӮ


    еҰӮжһңжҲ‘д»¬еҸ–ж¶Ҳжё…еҚ• 7-1 дёӯ `return updated rows` зҡ„жіЁйҮҠпјҢйӮЈд№Ҳз»“жһңе°ҶеҸӘеҢ…еҗ«еә”з”ЁдәҶи§„еҲҷзҡ„иЎҢвҖ”вҖ”еҚі ID дёә 5гҖҒ10 е’Ң 0 зҡ„иЎҢгҖӮй»ҳи®ӨеҖјжҳҜ
    `return for all rows`гҖӮ`rules` е…ій”®еӯ—жҳҜеҸҜйҖүзҡ„пјҢйҷӨйқһдҪ жғіжҢҮе®ҡиҝӯд»Јж¬Ўж•°гҖӮ


    жңүдёӨз§ҚиЎЁзӨәжі•жқҘеҜ»еқҖеҚ•е…ғж јвҖ”вҖ”`symbolic dimension reference`пјҲз¬ҰеҸ·з»ҙеәҰеј•з”Ёпјүе’Ң `positional dimension reference`пјҲдҪҚзҪ®з»ҙеәҰеј•з”ЁпјүгҖӮеңЁз¬ҰеҸ·з»ҙеәҰеј•з”Ёзҡ„жғ…еҶөдёӢпјҢеҝ…йЎ»еӯҳеңЁдёҖдёӘеҢ…еҗ«з»ҙеәҰеҗҚз§°зҡ„и°“иҜҚпјӣеҗҰеҲҷпјҢз»ҙеәҰеј•з”Ёе°ұжҳҜдҪҚзҪ®зҡ„вҖ”вҖ”дҫӢеҰӮпјҢеёёйҮҸеҖјгҖҒиЎЁиҫҫејҸз”ҡиҮіжҳҜ
    `for` еҫӘзҺҜгҖӮиҝҷдәӣиЎЁзӨәжі•д№Ӣй—ҙзҡ„е·®ејӮеҜ№дәҺи§„еҲҷзҡ„е·Ұдҫ§йқһеёёйҮҚиҰҒпјҢе·Ұдҫ§ж ҮиҜҶдәҶе°Ҷиў«еҸідҫ§еҖјжӣҙж–°зҡ„еҚ•е…ғж јгҖӮ


    еҸҜд»ҘдҪҝз”Ёе…ій”®еӯ— `update`/`upsert all`/`upsert` жқҘжҢҮе®ҡ Oracle еӨ„зҗҶзјәеӨұеҚ•е…ғж јзҡ„ж–№ејҸгҖӮ`Update` еҸӘжӣҙж–°зҺ°жңүеҚ•е…ғж јпјҢ`upsert`пјҲй»ҳи®ӨеҖјпјүжӣҙж–°зҺ°жңүеҚ•е…ғж јпјҢе№¶еңЁдҪҚзҪ®еј•з”Ёзҡ„жғ…еҶөдёӢеҲӣе»әзјәеӨұеҚ•е…ғж јпјҢиҖҢ
    `upsert all` еңЁз¬ҰеҸ·еј•з”ЁжүҖдҪҝз”Ёзҡ„з»ҙеәҰеҖјеӯҳеңЁдәҺеҺҹе§Ӣи®°еҪ•йӣҶдёӯж—¶пјҢд№ҹдјҡдёәж··еҗҲеј•з”ЁеҲӣе»әзјәеӨұеҚ•е…ғж јгҖӮи®©жҲ‘д»¬йҖҡиҝҮжё…еҚ• 7-2 жүҖзӨәзҡ„е…·дҪ“дҫӢеӯҗжқҘзңӢзңӢе®ғжҳҜеҰӮдҪ•е·ҘдҪңзҡ„гҖӮ


    ```sql

    with t(dim1, dim2, value) as

    (

    select 0, 0, 1 from dual

    union all select 0, 1, 2 from dual

    union all select 1, 0, 3 from dual

    )

    select * from t

    model

    dimension by (dim1, dim2)

    measures (value, cast(null as number) result)

    rules upsert all

    (

    result[0, 0] = -1,

    result[dim1=1, dim2=0] = -3,

    result[-1, for dim2 in (select count(*) from dual)] = -4,

    result[-2, dim2=1] = -10,

    result[-3, dim2=-1] = -100,

    result[-4, -1] = -1000

    )

    order by dim1, dim2;

    DIM1       DIM2      VALUE     RESULT

    ---------- ---------- ---------- ----------

    -4         -1                 -1000

    -2          1                   -10

    -1          1                    -4

    0          0          1         -1

    0          1          2

    1          0          3         -3

    жё…еҚ• 7-2

    Upsert all е®һжҲҳ

    ```


