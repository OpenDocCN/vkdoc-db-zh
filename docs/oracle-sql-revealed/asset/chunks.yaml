    \ num from t_num order by num)) loop\n    insert into tmp (lvl, x, num)\n    select\
    \ c.x, 0, tmp.num + c.num from tmp where tmp.x = c.x - 1;\n    commit;\nend loop;\n\
    end;\n/\nselect count(*) cnt, sum(num) sum_num from tmp where lvl != 0;\nCNT \
