    Missing numeric measures are treated as zeros instead of nulls when you specify
    `ignore nav`. All values for the `num` column would be nulls with the default
    behavior - `keep nav`.


    Analytic functions can be used in a model clause to implement advanced logic.
    Listing 7-12 demonstrates a usage example.


    ```sql

    with t(value) as

    (select column_value from table(sys.odcivarchar2list(''A'',''B'',''C'',''D'',''E'')))

    select *

    from t

    model

    ignore nav

    dimension by (row_number() over (order by value) id)

    measures (value, cast(null as varchar2(4000)) result, count(*) over () num)

    (

    result[mod(id, 2) = 1] = listagg(value, '', '') within group (order by id) over
    (),

    num[mod(id, 2) = 1] = count(*) over (order by id desc)

    )

    order by id;

    ID VALUE      RESULT            NUM

    ---------- ---------- ---------- ----------

    1 A          A, C, E             3

    2 B                              5

    3 C          A, C, E             2

    4 D                              5

    5 E          A, C, E             1

    Listing 7-12

    Analytic functions in model clause

    ```


    The same logic can be implemented using aggregate functions in the following way:


    ```sql

    result[mod(id, 2) = 1] = listagg(value, '', '') within group (order by null)[mod(id,
    2) = 1],

    num[mod(id, 2) = 1] = count(*)[mod(id, 2) = 1 and id >= cv(id)]

    ```


    The crucial difference between aggregate functions in a model clause and an regular
    aggregate functions is that aggregate functions in model clauses do not require
    grouping. Instead you need to specify the range of cells for the aggregate function.


    Aggregate functions allow flexible addressing of cellsвҖҷ ranges unlike analytic
    functions. But analytic functions accept both measures and dimensions as arguments
    while an aggregate function can be applied only to measures. Also itвҖҷs not possible
    to specify ordering on the left side of the rule when an analytic function is
    used. Rule 1 and rule 3 from Listing 7-13 demonstrate limitations of analytic
    and aggregate functions correspondingly.

