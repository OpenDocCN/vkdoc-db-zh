    1    1    1    2    2.83        2        2     2.83        0

    2    4    2    3    4.24        3        2     4.24     3.16

    3    9    0    2   10.95        2        1    10.95    13.45

    4   16    1    1    24.1        1        1     24.1    34.11

    5   25    2    1   46.13        1        1    46.13     70.2

    6   36    0    1   79.26        1        1    79.26   125.28

    6 rows selected.

    Listing 3-6

    Limitations of analytic functions

    ```


    So values cnt2 and dist2 cannot be calculated using analytic functions.


    Also itвҖҷs worth mentioning that if a type of the sort key does not support arithmetic
    operations then the logical offset (range) cannot be used. Obviously, there is
    no such limitation for physical offset (rows).


    Most analytic functions can also act as aggregate functions (if вҖңoverвҖқ is not
    specified); however some of them are purely analytic, for example, row_number
    or rank. As was mentioned previously, вҖңorder byвҖқ is mandatory for such functions.


    A special case of an analytic function is listagg. First, itвҖҷs not commutative,
    which means that concatenation of the first and second values is not the same
    as concatenation of the second and first, unlike sum or average, for example.
    Second, вҖңorder byвҖқ cannot be specified in analytic clause. Third, itвҖҷs not possible
    to use distinct keyword in a function. Some differences between listagg and UDF
    stragg (source code available on AskTom) are shown in Listing [3-7](#A455196_1_En_3_Chapter.html#Par30).


    ```

    with t as

    (select rownum id, column_value value

    from table(sys.odcinumberlist(2, 1, 1, 3, 1))),

    t0 as

    (select t.*, row_number() over(partition by value order by id) rn from t)

    select t1.*,

    (select listagg(value, '','') within group(order by value)

    from t t_in

    where t_in.id <= t1.id) cumul_ord

    from (select t0.*,

    listagg(value, '','') within group(order by value) over() list_ord,

    listagg(decode(rn, 1, value), '','') within group(order by value) over() dist_ord,

    stragg(value) over(order by id) cumul,

    stragg(distinct value) over() dist,

    stragg(decode(rn, 1, value)) over(order by id) cumul_dist

    from t0) t1

    order by id;

    ID VALUE  RN  LIST_ORD   DIST_ORD  CUMUL     DIST   CUMUL_DIST CUMUL_ORD

    ---- -----  --  ---------  --------  -------   -----  ---------- ---------

    1     2   1  1,1,1,2,3  1,2,3     2         1,2,3  2          2

    2     1   1  1,1,1,2,3  1,2,3     2,1       1,2,3  2,1        1,2

    3     1   2  1,1,1,2,3  1,2,3     2,1,1     1,2,3  2,1        1,1,2

    4     3   1  1,1,1,2,3  1,2,3     2,1,1,3   1,2,3  2,1,3      1,1,2,3

    5     1   3  1,1,1,2,3  1,2,3     2,1,1,3,1 1,2,3  2,1,3      1,1,1,2,3

    Listing 3-7

    Differences between listagg and stragg

    ```


    In short, itвҖҷs not possible to get cumulative concatenation with window ordering
    for listagg. On the other hand, window ordering can be specified for stragg, but
    in this case itвҖҷs not possible to specify a concatenation order for result.


    So if the goal is to concatenate values with window ordering and specify the order
    of the result itself, then it cannot be achieved using analytic functions and
    a single table scan. In the above example it was calculated using scalar subquery.


    The important point is that analytic functions is not a panacea. Sometimes it
    may be more efficient to use joins instead. LetвҖҷs consider the following case.
    Data batches identified by batch_id are written into a stream table with an index
    on batch_id. Our goal is to calculate the sum(value) for the last batch_id. See
    Listing [3-8](#A455196_1_En_3_Chapter.html#Par34).


    ```

