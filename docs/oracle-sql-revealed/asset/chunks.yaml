    You may note the `cycle` clause in the query. Even though cycle mark is zero for
    all the rows, without a `cycle` clause, the query fails with `ORA-32044: cycle
    detected while executing recursive WITH query`. This is not quite correct behavior
    and it will be discussed later on in the current chapter.


    Well, recursive subquery factoring helps to get a result in quite an efficient
    way on the last versions, but what if we need to implement more complex logic
    than the limit for the cumulative sum or we use the old version that does not
    support recursive subquery factoring. Listing 11-8 shows how logic can be encapsulated
    in a PL/SQL function as well as create statements for required types.


    ### Listing 11-8

    Types and function for limiting rows

    ```

    create or replace type to_id_value as object(id int, value number)

    /

    create or replace type tt_id_value as table of to_id_value

    /

    create or replace function f_transaction(p_limit in number)

    return tt_id_value

    pipelined is

    l_limit number := 0;

    begin

    for i in (select --+ index_desc(transaction idx_tran_id)

    *

    from transaction

    order by id desc) loop

    l_limit := l_limit + i.value;

    if l_limit <= 5000 then

    pipe row(to_id_value(i.id, i.value));

    else

    exit;

    end if;

    end loop;

    end f_transaction;

    /

    ```


    The average execution time is a two hundredth of a second.


    ### Listing 11-9

    Limiting rows with PL/SQL function

    ```

    select * from table(f_transaction(p_limit => 5000));

    ID      VALUE

    ---------- ----------

    3000000        875

    2999999        890

    2999998        266

    2999997        337

    2999996        570

    2999995        889

    2999994        425

    2999993         64

    2999992        140

    9 rows selected.

    Elapsed: 00:00:00.02

    ```


    LetвҖҷs add a unique combination of symbols into hint `--+ index_desc(transaction
    idx_tran_id) zzz` and recompile the function so that we can easily find details
    for the required statement in `v$sql`. After a couple of executions, the stats
    are the following.


    ```

    column sql_text format a50

    select executions, rows_processed, sql_text

    from v$sql v

    where sql_text like ''%index_desc(transaction idx_tran_id) zzz%''

    and sql_text not like ''%v$sql%'';

    EXECUTIONS ROWS_PROCESSED SQL_TEXT

    ---------- -------------- ------------------------------------

    2             20 SELECT --+ index_desc(transaction idx_tran_id) zzz

    * FROM TRANSACTION ORDER BY ID DESC

    ```


    Even though there is no filter in a query, only 20 rows have been processed (fetched),
    which means 10 rows per execution as expected.


    A similar approach can be implemented in a client application, but the ability
    to encapsulate the logic into a PL/SQL function is quite important.


    The last thing to note regarding queries with limits is that the so-called Top-N
    Queries have been introduced in Oracle 12c. No fundamental changes have been made
    in the SQL engine for this functionality, and if you have a look at the final
    query after transformation for Ton-N syntax, you will see analytic functions.
    So in a nutshell Top-N is just syntactic sugar and avoiding it makes it possible
    to write more efficient queries in many cases вҖ“ in particular, you can apply an
    optimization technique as shown in Listing 11-4. I suppose this functionality
    was introduced due to following reasons:


    *   Marketing reasons. Other RDBMSs have this feature and now itвҖҷs in Oracle as
    well;

    *   Simplifying migration from other RDBMSs;

    *   Simplicity to write ad hoc queries for non-expert database developers; Using
    this feature for complex performance-critical queries is not reasonable.'
