    йңҖиҰҒйўқеӨ–зҡ„ CPU иө„жәҗжқҘдёәжҜҸдёҖиЎҢжһ„йҖ еҜ№иұЎгҖӮжӯӨеӨ–пјҢеәҸеҲ—з”ҹжҲҗйңҖиҰҒ`sin`е’Ң`round`еҮҪж•°пјҢиҖҢжқЎд»¶иҝҗиЎҢжҖ»е’Ңзҡ„йҖ»иҫ‘дёӯеҸӘдҪҝз”ЁдәҶеҺҹе§Ӣж“ҚдҪңгҖӮйҖ»иҫ‘и¶ҠеӨҚжқӮпјҢдёәжҜҸиЎҢжһ„йҖ еҜ№иұЎзҡ„еҪұе“Қе°ұи¶Ҡе°ҸгҖӮ'
- fmt: 'Another key detail for parallel processing is partitioning. When we specify
    partitioning for a model clause, then data for them becomes completely isolated
    and rules are evaluated independently for each partition; but in case of a pipelined
    function there is no guarantee that there will be a single partition per slave
    so we need to keep that in mind when implementing the logic.


    The is one last detail to mention вҖ“ actual DOP was the same for both approaches,
    which is not surprising because DOP was specified in SQL queries and eventually
    the SQL engine is responsible for splitting data across slave sessions.


    ## Summary


    Model clause is the most powerful Oracle SQL feature. Theoretically iterative
    models allow us to implement an algorithm of any complexity (see Chapter 10, вҖңTuring
    CompletenessвҖқ). On the other hand, the model clause may cause excessive CPU and
    memory consumption, and it itвҖҷs not linearly scalable for tasks where some other
    approaches, including PL/SQL, demonstrate linear scalability depending on data
    volumes. However, itвҖҷs possible to leverage parallel execution for partitioned
    models, which makes SQL modeling a perfect instrument for some tasks.


    It makes sense to use a model for spreadsheet-like computations, allowing implementation
    of complicated rules while avoiding multiple joins. Also a model may be the right
    tool for implementing complex logic when itвҖҷs preferable to avoid using a procedural
    approach, especially if a model is used in materialized views so the response
    time is not critical.


    # 8. Row Pattern Matching: match_recognize


    The ability to find and analyze the patterns in the data was widely desired but
    not possible with SQL until Oracle 12c.


    This is required in many business areas, for example, security applications and
    fraud detection or financial applications and pricing analysis. Native pattern-matching
    capabilities in SQL help to avoid complex bespoke solutions on the client side
    or within the middle-tier application server and use easy-to-share SQL queries
    instead.


    This is the last one of OracleвҖҷs specific SQL features, but before diving into
    it, letвҖҷs briefly recall the evolution of SQL.


    Basic SQL вҖ“ the one that implements five main operations of relational algebra
    вҖ“ allows only row-level visibility.


    Aggregate functions introduce group-level visibility, but a group is defined by
    a specific expression that must be the same for all rows in the group and each
    row belongs to exactly one group .


    Analytic functions allow window-level visibility. The window definition is the
    same for all rows; however the `windowing_clause` adds some flexibility so that
    attributes of the current row may be specified as shift values by range/rows.


    Pattern matching is the next level of flexibility; to match a pattern across a
    recordset itвҖҷs treated as a sequence of rows вҖ“ the idea is similar to regular
    expressions when an input string is considered as a sequence of chars. Each row
    may belong to zero, one, or more matches.


    LetвҖҷs reuse the table `atm` from Listing 3-4. We can get all the rows where the
    amount equals to 5 using the query below.


    ```

    select * from atm where amount = 5

    ```


    The same can be achieved using `match_recognize`.


    ```

    select *

    from atm

    match_recognize

    ( all rows per match

    pattern (five)

    define

    five as five.amount = 5

    ) mr

    order by ts;

    TS            AMOUNT

    --------- ----------

    03-JUL-16          5

    03-JUL-16          5

    ```


    Obviously, pattern matching was not designed not for such kind of tasks and, for
    example, if there was an index for the amount column, Oracle would not use it
    (although the index can be used if you specify the pattern matching and where
    clauses together). The query plan looks as follows ( `FINITE AUTOMATON` was trimmed
    in the output of `dbms_xplan`).


    ```

    | Id  | Operation                                        | Name |

    |   0 | SELECT STATEMENT                                 |      |

    |   1 |  SORT ORDER BY                                   |      |

    |   2 |   VIEW                                           |      |

    |   3 |    MATCH RECOGNIZE BUFFER DETERMINISTIC FINITE AU|      |

    |   4 |     TABLE ACCESS FULL                            | ATM  |

    ```


    LetвҖҷs proceed to an example that is a bit more complex.


    ```

    alter session set NLS_DATE_FORMAT = ''mi'';

    Session altered.

    select *

    from atm

    match_recognize

    ( order by ts

    measures

    strt.amount start_amount,

    final last(up.amount) end_amount,

    running count(*) as cnt,

    match_number() as match,

    classifier() as cls

    all rows per match

    after match skip past last row

    pattern (strt down* up*)

    define

    down as down.amount  prev(up.amount)

    ) mr

    order by ts;

    TS START_AMOUNT END_AMOUNT        CNT      MATCH CLS            AMOUNT

    -- ------------ ---------- ---------- ---------- ---------- ----------

    01           85        100          1          1 STRT               85

    03           85        100          2          1 DOWN               15

    05           85        100          3          1 UP                100

    07           40         85          1          2 STRT               40

    09           40         85          2          2 DOWN               30

    11           40         85          3          2 UP                 50

    13           40         85          4          2 UP                 85

    15           60        100          1          3 STRT               60

    17           60        100          2          3 DOWN                5

    19           60        100          3          3 UP                100

    21           25         80          1          4 STRT               25

    23           25         80          2          4 UP                 30

    25           25         80          3          4 UP                 80

    27            5         35          1          5 STRT                5

    29            5         35          2          5 UP                 35

    ```


    Here a pattern is defined as one row with label `strt`, zero, or more rows with
    label `down` and zero or more rows with label `up`. Actually `strt`, `down,` and
    `up` are called pattern variables . A row is marked as `down` when an amount is
    less than in the previous row and correspondingly marked as `up` when an amount
    is greater than in the previous row. If we visualize the relation between an `amount`
    and `ts`, then each match will be V-shape or just an ascending or descending part
    of it if the other one is missing.


    `all rows per match` means every row that is matched is included in the pattern-match
    output. If you specify `one row per match` instead, then for every pattern match
    found, there will be one row in the resultset. In the first case, the way output
    is generated is similar to analytic functions while in the second case вҖ“ itвҖҷs
    similar to the aggregate ones.


    There are two specific built-in measures for pattern matching. `match_number`
    numbers matches starting with one and assigns the same number for all rows in
    a specific match. `classifier` shows which row mapped to which pattern variable.
    All the measures except `match_number` function are evaluated within the scope
    of a given match.


    Note


    You can define a union of pattern variables using the `subset` keyword to reference
    them in measures together. For example, `SUBSET STDN = (STRT, DOWN)`. These groupings
    also can be referenced in the `define` clause to specify definitions of other
    pattern variables. See Listing 8-3 for usage example.


    Expression `running count(*)` was used for row numbering within the matches. `final
    count(*)` can be used to show the total row count in the match. Similarly, the
    expression `final last(up.amount)` means that for all rows in the match we display
    the last (maximal) value mapped to the `up` pattern variable.'
  raw: 'Another key detail for parallel processing is partitioning. When we specify
    partitioning for a model clause, then data for them becomes completely isolated
    and rules are evaluated independently for each partition; but in case of a pipelined
    function there is no guarantee that there will be a single partition per slave
    so we need to keep that in mind when implementing the logic.


    The is one last detail to mentionВ вҖ“ actual DOP was the same for both approaches,
    which is not surprising because DOP was specified in SQL queries and eventually
    the SQL engine is responsible for splitting data across slave sessions.


    ## Summary


    Model clause is the most powerful Oracle SQL feature. Theoretically iterative
    models allow us to implement an algorithm of any complexity (see Chapter [10](#A455196_1_En_10_Chapter.html),
    вҖңTuring CompletenessвҖқ). On the other hand, the model clause may cause excessive
    CPU and memory consumption, and it itвҖҷs not linearly scalable for tasks where
    some other approaches, including PL/SQL, demonstrate linear scalability depending
    on data volumes. However, itвҖҷs possible to leverage parallel execution for partitioned
    models, which makes SQL modeling a perfect instrument for some tasks.


    It makes sense to use a model for spreadsheet-like computations, allowing implementation
    of complicated rules while avoiding multiple joins. Also a model may be the right
    tool for implementing complex logic when itвҖҷs preferable to avoid using a procedural
    approach, especially if a model is used in materialized views so the response
    time is not critical.


    # 8.В Row Pattern Matching: match_recognize


    The ability to find and analyze the patterns in the data was widely desired but
    not possible with SQL until Oracle 12c.


    This is required in many business areas, for example, security applications and
    fraud detection or financial applications and pricing analysis. Native pattern-matching
    capabilities in SQL help to avoid complex bespoke solutions on the client side
    or within the middle-tier application server and use easy-to-share SQL queries
    instead.


    This is the last one of OracleвҖҷs specific SQL features, but before diving into
    it, letвҖҷs briefly recall the evolution of SQL.


    Basic SQLВ вҖ“ the one that implements five main operations of relational algebraВ вҖ“
    allows only row-level visibility.


    Aggregate functions introduce group-level visibility, but a group is defined by
    a specific expression that must be the same for all rows in the group and each
    row belongs to exactly one group .


    Analytic functions allow window-level visibility. The window definition is the
    same for all rows; however the windowing_clause adds some flexibility so that
    attributes of the current row may be specified as shift values by range/rows.


    Pattern matching is the next level of flexibility; to match a pattern across a
    recordset itвҖҷs treated as a sequence of rowsВ вҖ“ the idea is similar to regular
    expressions when an input string is considered as a sequence of chars. Each row
    may belong to zero, one, or more matches.


    LetвҖҷs reuse the table `atm` from Listing [3-4](#A455196_1_En_3_Chapter.html#Par16).
    We can get all the rows where the amount equals to 5 using the query below.


    ```

    select * from atm where amount = 5

    ```


    The same can be achieved using match_recognize.


    ```

    select *

    from atm

    match_recognize

    ( all rows per match

    pattern (five)

    define

    five as five.amount = 5

    ) mr

    order by ts;

    TS            AMOUNT

    --------- ----------

    03-JUL-16          5

    03-JUL-16          5

    ```


    Obviously, pattern matching was not designed not for such kind of tasks and, for
    example, if there was an index for the amount column, Oracle would not use it
    (although the index can be used if you specify the pattern matching and where
    clauses together). The query plan looks as follows ( `FINITE AUTOMATON` was trimmed
    in the output of `dbms_xplan`).


    ```


    | Id  | Operation                                        | Name |


    |   0 | SELECT STATEMENT                                 |      |

    |   1 |  SORT ORDER BY                                   |      |

    |   2 |   VIEW                                           |      |

    |   3 |    MATCH RECOGNIZE BUFFER DETERMINISTIC FINITE AU|      |

    |   4 |     TABLE ACCESS FULL                            | ATM  |


    ```


    LetвҖҷs proceed to an example that is a bit more complex.


    ```

    alter session set NLS_DATE_FORMAT = ''mi'';

    Session altered.

    select *

    from atm

    match_recognize

    ( order by ts

    measures

    strt.amount start_amount,

    final last(up.amount) end_amount,

    running count(*) as cnt,

    match_number() as match,

    classifier() as cls

    all rows per match

    after match skip past last row

    pattern (strt down* up*)

    define

    down as down.amount  prev(up.amount)

    ) mr

    order by ts;

    TS START_AMOUNT END_AMOUNT        CNT      MATCH CLS            AMOUNT

    -- ------------ ---------- ---------- ---------- ---------- ----------

    01           85        100          1          1 STRT               85

    03           85        100          2          1 DOWN               15

    05           85        100          3          1 UP                100

    07           40         85          1          2 STRT               40

    09           40         85          2          2 DOWN               30

    11           40         85          3          2 UP                 50

    13           40         85          4          2 UP                 85

    15           60        100          1          3 STRT               60

    17           60        100          2          3 DOWN                5

    19           60        100          3          3 UP                100

    21           25         80          1          4 STRT               25

    23           25         80          2          4 UP                 30

    25           25         80          3          4 UP                 80

    27            5         35          1          5 STRT                5

    29            5         35          2          5 UP                 35

    ```


    Here a pattern is defined as one row with label `strt`, zero, or more rows with
    label `down` and zero or more rows with label `up`. Actually `strt`, `down,` and
    `up` are called pattern variables . A row is marked as `down` when an amount is
    less than in the previous row and correspondingly marked as `up` when an amount
    is greater than in the previous row. If we visualize the relation between an `amount`
    and `ts`, then each match will be V-shape or just an ascending or descending part
    of it if the other one is missing.


    `all rows per match` means every row that is matched is included in the pattern-match
    output. If you specify `one row per match` instead, then for every pattern match
    found, there will be one row in the resultset. In the first case, the way output
    is generated is similar to analytic functions while in the second caseВ вҖ“ itвҖҷs
    similar to the aggregate ones.


    There are two specific built-in measures for pattern matching. `match_number`
    numbers matches starting with one and assigns the same number for all rows in
    a specific match. `classifier` shows which row mapped to which pattern variable.
    All the measures except `match_number` function are evaluated within the scope
    of a given match.


    Note


    You can define a union of pattern variables using the subset keyword to reference
    them in measures together. For example, `SUBSET STDN = (STRT, DOWN)`. These groupings
    also can be referenced in the define clause to specify definitions of other pattern
    variables. See Listing [8-3](#A455196_1_En_8_Chapter.html#Par34) for usage example.


    Expression `running count(*)` was used for row numbering within the matches. `final
    count(*)` can be used to show the total row count in the match. Similarly, the
    expression `final last(up.amount)` means that for all rows in the match we display
    the last (maximal) value mapped to the `up` pattern variable.'
