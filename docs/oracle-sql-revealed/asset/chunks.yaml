- fmt: 'Obviously, a PL/SQL approach performs much better that an SQL for this task.
    PL/SQL code gives an impression that this logic can also be implemented using
    recursive subquery factoring. But there is one catch вҖ“ in a PL/SQL loop, we need
    an entire `tmp` table that contains data from all the iterations while recursive
    subquery factoring accesses data only from a previous iteration. We can use a
    trick with an additional join to add a recordset from a previous iteration to
    a recordset from the current iteration. This approach is shown in Listing 11-18.


    ```

    with

    r0(x, num) as

    (select rownum, num from (select num from t_num order by num)),

    rec(iter, lvl, x, num) as

    (select 1, 1, rownum, num from r0

    union all

    select rec.iter + 1,

    decode(z.id, 1, rec.lvl, rec.lvl + 1),

    decode(z.id, 1, rec.x, 0),

    decode(z.id, 1, rec.num, rec.num + r0.num)

    from rec

    join r0

    on rec.iter + 1 = r0.x

    join (select 1 id from dual union all select 2 id from dual) z

    on (z.id = 1 or rec.x < r0.x)

    where rec.iter < 15

    )

    select * from rec

    where iter = 15 and lvl = 1;

    Listing 11-18

    Recursive subquery factoring to get sums of all subsets

    ```


    Even though it works and produces a correct result, this approach is quite inefficient
    because on each iteration, we replicate all the data from previous iterations.
    If we set `sort_area_size` to the maximum value, then the elapsed time is around
    30 seconds but anyway this was demonstrated mainly for academic purposes to show
    that even a simple PL/SQL loop may not be efficiently re-implemented using recursive
    subquery factoring.


    If we change join order in the query, then it will fail with `ORA-32044: cycle
    detected while executing recursive WITH query` and to avoid that `cycle` clause
    is required even though this is a logically equivalent query and has the same
    plan as the query from Listing 11-18 even without a `cycle` clause.


    ```

    ...

    from rec

    cross join (select 1 id from dual union all select 2 id from dual) z

    join r0

    on rec.iter + 1 = r0.x

    where (z.id = 1 or rec.x < r0.x))

    cycle iter set c to 1 default 0

    ...

    ```


    Two tasks have been analyzed in this section; in the first case, iterations help
    to avoid scanning unnecessary data or to вҖңoptimize plan,вҖқ while the second task
    has an iterative nature itself.


    ## Specifics of Joins and Subqueries


    SQL was designed to work with recordsets and, in fact, there are only three join
    methods вҖ“ `HASH JOIN`, `NESTED LOOPS`, and `MERGE JOIN`. All of them have pros
    and cons and various scopes of application; `HASH JOIN` and `MERGE JOIN` cannot
    be used for any arbitrary predicate, unlike `NESTED LOOPS`.


    Speaking about subqueries, there are some limitations, for instance, a nesting
    limit for correlated subqueries that sometimes makes it impossible to implement
    complex logic in a subquery. These limitations, along with some other details
    and examples, will be considered in the following subsections.


    ### Specifics of Joins


    In this subsection we will consider a task when PL/SQL helps to implement a look-up
    in a more efficient way than SQL.


    Listing 11-19 shows a script to create a table with information about phone calls
    containing phone numbers and durations in minutes.


    ```

    create table phone_call (num varchar2(11), duration int);

    exec dbms_random.seed(1);

    insert --+ append

    into phone_call

    select ''01'' || to_char(trunc(1e9 * dbms_random.value), ''fm099999999''),

    trunc(dbms_random.value(1, 5 + 1))

    from dual

    connect by level <= 1e6;

    commit;

    exec dbms_stats.gather_table_stats(user, ''phone_call'');

    Listing 11-19

    Table with information about phone calls

    ```


    Listing 11-20 shows a script to create a table with a static list of phone codes
    for the United Kingdom. You can download this list using [http://вҖӢwww.вҖӢarea-codes.вҖӢorg.вҖӢuk/вҖӢuk-area-codes.вҖӢxlsx](http://www.area-codes.org.uk/uk-area-codes.xlsx)
    and import it manually if you do not have permission to get it via `httpuritype`
    in Oracle .


    ```

    create table phone_code as

    with tbl as

    (select regexp_substr(httpuritype(''http://www.area-codes.org.uk/full-uk-area-code-list.php'')

    .getclob(),

    ''.*?'',

    1,

    1,

    ''n'') c

    from dual)

    select *

    from xmltable(''/table/tr'' passing xmltype((select c from tbl))

    columns

    code varchar2(6) path ''/tr/td[1]'',

    area varchar2(50) path ''/tr/td[2]'')

    order by 1;

    exec dbms_stats.gather_table_stats(user, ''phone_call'');

    Listing 11-20

    Table containing a list of phone codes

    ```


    The goal is to calculate the total duration for each code.


    There are some specifics in pre-generated data:


    1.  For simplicity, phone numbers start with `01`, but in reality the two first
    digits can be `01`, `02`, `03`, `05`, `07`, `08`, and `09`.

    2.  Some phone numbers are incorrect, because codes for them do not exist: for
    example, `0119`. This is a side effect of generation and such calls will be excluded
    from the result.

    3.  Numbers are not unique, which can be easily checked with the query below .


    ```

    select count(*) cnt_all, count(distinct num) cnt_dist from phone_call;

    CNT_ALL   CNT_DIST

    ---------- ----------

    1000000     999490

    ```


    Speaking about phone codes, one code may be a prefix for another. In such cases,
    the longest code that is a prefix for the phone number is the actual code.


    ```

    select *

    from phone_code pc1

    join phone_code pc2

    on pc2.code like pc1.code || ''%''

    and pc2.code <> pc1.code

    order by 1, 3;

    CODE   AREA                        CODE   AREA

    ------ --------------------------- ------ --------------------

    01387  Dumfries                    013873 Langholm

    01524  Lancaster                   015242 Hornby

    01539  Kendal                      015394 Hawkshead

    01539  Kendal                      015395 Grange-Over-Sands

    01539  Kendal                      015396 Sedbergh

    01697  Brampton (6 figure numbers) 016973 Wigton

    01697  Brampton (6 figure numbers) 016974 Raughton Head

    01697  Brampton (6 figure numbers) 016977 Brampton (4 and 5 figure numbers)

    01768  Penrith                     017683 Appleby

    01768  Penrith                     017684 Pooley Bridge

    01768  Penrith                     017687 Keswick

    01946  Whitehaven                  019467 Gosforth

    12 rows selected.

    ```


    The possible length of the prefixes starting with `01` is 4, 5, and 6 digits .


    ```

    select length(code) l, count(*) cnt

    from phone_code

    where code like ''01%''

    group by length(code)

    order by 1;

    L        CNT

    ---------- ----------

    4         12

    5        582

    6         12

    ```


    For other countries, the range of code lengths may be much wider and the number
    of cases when one code is a prefix for another may be much greater.


    A straightforward solution is below:


    ```

    select code, sum(duration) s

    from (select ca.rowid,

    num,

    duration,

    max(code)

    keep(dense_rank first order by length(code) desc) code

    from phone_call ca

    left join phone_code co

    on ca.num like co.code || ''%''

    group by ca.rowid, num, duration)

    where code is not null

    group by code

    order by code;

    ```'
