    ## Ordering siblings


    ```

    ROOT     LVL ID    ----GRAND_PARENT PATH       IS_LEAF

    -------- --------------- -------------------------- ------

    10     1 11                 ->11                   0

    10     2    13           10 ->11->13               1

    10     2    12           10 ->11->12               1

    1     1 3                  ->3                    0

    1     2    4             1 ->3->4                 0

    1     3       5          3 ->3->4->5              1

    1     1 2                  ->2                    1

    ```


    If `connect by` is specified in the same query block as joins, then Oracle processes
    hierarchical queries as follows: joins (including those specified in where clause),
    `connect by`, all remaining where clause predicates.


    LetвҖҷs create the following tables for a demonstration:


    ```

    drop table tree;

    drop table nodes;

    create table tree(id, id_parent) as

    select rownum, rownum - 1 from dual connect by level <= 4;

    create table nodes(id, name, sign) as

    select rownum, ''name'' || rownum, decode(rownum, 3, 0, 1)

    from dual connect by rownum <= 4;

    ```


    In the second and third queries from Listing [5-3](#A455196_1_En_5_Chapter.html#Par17),
    the filter by `sign` was applied before building the hierarchy while in the first
    query it was applied after the hierarchy was built.


    ```

    select t.*, n.name

    from tree t, nodes n

    where t.id = n.id

    and n.sign = 1

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    4          3 name4

    select *

    from (select t.*, n.name

    from tree t, nodes n

    where t.id = n.id

    and n.sign = 1) t

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    select t.*, n.name

    from tree t

    join nodes n

    on t.id = n.id

    and n.sign = 1

    start with t.id_parent = 0

    connect by prior t.id = t.id_parent;

    ID  ID_PARENT NAME

    ---------- ---------- -----------------------------------------

    1          0 name1

    2          1 name2

    ```


    # Listing 5-3

    ## Connect by and joins


    The final query after transformations for the original query with an ANSI join
    contains a Cartesian join while join predicate moved to the вҖңstart withвҖқ and вҖңconnect
    byвҖқ clauses. However, more logically it would be to expect an inline view and
    `connect by` on to top it in the transformed query. So if you build a plan for
    a transformed query, it will differ from the original plan for an original query
    and the join type will be вҖңMERGE JOIN CARTESIAN.вҖқ


    ```

    select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

    from "TREE" "T", "NODES" "N"

    start with "T"."ID_PARENT" = 0

    and "T"."ID" = "N"."ID"

    and "N"."SIGN" = 1

    connect by "T"."ID_PARENT" = prior "T"."ID"

    and "T"."ID" = "N"."ID"

    and "N"."SIGN" = 1

    ```


    The transformed query for the first query from Listing [5-3](#A455196_1_En_5_Chapter.html#Par17)
    also looks a bit unexpected вҖ“ as you see the join condition moved from the where
    clause to вҖңstart withвҖқ and вҖңconnect by.вҖқ


    ```

    select "T"."ID" "ID", "T"."ID_PARENT" "ID_PARENT", "N"."NAME" "NAME"

    from "TREE" "T", "NODES" "N"

    where "N"."SIGN" = 1

    start with "T"."ID_PARENT" = 0

    and "T"."ID" = "N"."ID"

    connect by "T"."ID_PARENT" = prior "T"."ID"

    and "T"."ID" = "N"."ID"

    ```


    Let me emphasize again that plans for these transformed and original queries are
    different; and even though they are semantically equivalent, performance for queries
    with transformed text will be much worse because the hierarchy will be built on
    top of Cartesian joins.


    Speaking about outer joins, there is no difference whether they specified in вҖңjoinвҖқ
    or вҖңwhereвҖқ clause because the predicate containing `(+)` will be evaluated before
    building the hierarchy.


    Also itвҖҷs worth mentioning that if the goal is to get all the descendants up to
    a specific level, then it makes sense to specify a filter by `"level <= n"` in
    вҖңconnect byвҖқ condition instead of a where clause because in this case, building
    a hierarchy will stop at a specific level. Otherwise the hierarchy will be built
    for all levels and the where filter will be applied after that.


    Another important point is that the `connect by` condition evaluates only for
    nodes with a level greater than 1. A first level node must be filtered using a
    вҖңstart withвҖқ clause. For example, all first level nodes will be returned regardless
    of whether you specify `"level <= 1"` or `"level <= 0"` in the connect by condition.


    `Connect by` allows you to traverse directed graphs even if they contain cycles.
    See Figure [5-1](#A455196_1_En_5_Chapter.html#Fig1).


    ![A455196_1_En_5_Fig1_HTML.jpg](A455196_1_En_5_Fig1_HTML.jpg)


    Figure 5-1

    ## Directed graph


    ```

    with graph (id, id_parent) as

    (select 2, 1 from dual

    union all select 3, 1 from dual

    union all select 4, 3 from dual

    union all select 5, 4 from dual

    union all select 3, 5 from dual)

    select level lvl, graph.*, connect_by_iscycle cycle

    from graph

    start with id_parent = 1

    connect by nocycle prior id = id_parent;

    LVL         ID  ID_PARENT      CYCLE

    ---------- ---------- ---------- ----------

    1          2          1          0

    1          3          1          0

    2          4          3          0

    3          5          4          1

    ```


    Node with `id = 3` is a child node for node with `c id = 5` and it was already
    processed when we visited node with `id = 5`. In this case, building a hierarchy
    stops for the node and itвҖҷs marked as a cycle. In other words, `connect_by_iscycle`
    equals to 1 if the current row has a child that is also its ancestor.


    In general case, neither вҖңstart withвҖқ nor the `prior` operator is mandatory when
    using the вҖңconnect byвҖқ clause. This is often used to generate sequences. A few
    approaches are shown in Listing [5-4](#A455196_1_En_5_Chapter.html#Par30).


    ```

    select level id from dual connect by level <= 10;

    select rownum id from dual connect by rownum <= 10;

    select rownum id from (select * from dual connect by 1 = 1)

    where rownum <= 10;

    ```


    # Listing 5-4

    ## Generating sequences using connect by


    No cycles are identified for these queries because the parent record is not referred
    to in the connect by condition using the `prior` operator. So the cycle cannot
    exist when there is no parent-child relationship. Try to execute any of the queries
    from Listing [5-4](#A455196_1_En_5_Chapter.html#Par30) after adding the predicate
    `В«prior 1 = 1В»` to вҖңconnect byвҖқ condition.


    Documentation says that вҖңin a hierarchical query, one expression in [connect by]
    condition must be qualified with the PRIOR operator to refer to the parent row.вҖқ
    So if you want to refer to the parent row then you must use the `prior` operator
    but you are not forced to refer to it вҖ“ that is, `connect by` can be used not
    only to traverse hierarchies.


    The key point for the `prior` operator is that the value referenced in it must
    exist before building the hierarchy. Also when you use a `prior` operator you
    cannot refer columns calculated in a hierarchical query. This is saying that itвҖҷs
    not possible to calculate values for child nodes cumulatively. However, there
    is no such limitation for Recursive subquery factoring as will be shown in the
    next chapter.


    To demonstrate this limitation letвҖҷs consider a task when the goal is to generate
    the same sequence as function `f` returns (type `numbers` was defined in the section
    вҖңUnnesting CollectionsвҖқ).


    ```

    create or replace function f(n in number) return numbers as

    result numbers := numbers();

    begin

    result.extend(n + 1);

    result(1) := 1;

    for i in 2 .. n + 1 loop

    result(i) := round(100 * sin(result(i - 1) + i - 2));

    end loop;

    return result;

    end f;

    /

    ```'
