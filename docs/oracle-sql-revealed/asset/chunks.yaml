    ## Covering Ranges


    еҜ№дәҺеҢ…еҗ«д»Һ`a`еҲ°`b`зҡ„иҢғеӣҙзҡ„иЎЁпјҢж»Ўи¶і`b > a`дё”`a`жҳҜе”ҜдёҖзҡ„пјҡ


    ```sql

    create table t_range(a, b) as

    (select 1, 15 from dual

    union all select 3, 17 from dual

    union all select 6, 19 from dual

    union all select 10, 21 from dual

    union all select 17, 26 from dual

    union all select 18, 29 from dual

    union all select 20, 32 from dual

    union all select 24, 35 from dual

    union all select 28, 45 from dual

    union all select 30, 49 from dual);

    ```


    жҲ‘д»¬йңҖиҰҒиҝ”еӣһиҰҶзӣ–иҢғеӣҙ (1:15), (17:26), (28:45)пјҢд№ҹе°ұжҳҜиҜҙпјҢжҲ‘д»¬д»Һе…·жңүжңҖе°Ҹ`a`зҡ„иЎҢејҖе§ӢпјҢз„¶еҗҺжҢ‘йҖү`a`еӨ§дәҺеҪ“еүҚ`b`зҡ„жңҖе°Ҹ`a`зҡ„иЎҢпјҢдҫқжӯӨзұ»жҺЁгҖӮ


    ### Solution


    зӣёеҜ№з®ҖеҚ•пјҢеҸҜд»ҘдҪҝз”Ё`connect by`е’ҢеҲҶжһҗеҮҪж•°жқҘи§ЈеҶіпјҢдҪҶеңЁиҝҷз§Қжғ…еҶөдёӢжҖ§иғҪзӣёеҪ“дҪҺж•ҲгҖӮ


    ```sql

    select a, b

    from (select a,

    b,

    min(a) over(order by a range between b - a following

    and unbounded following) as next_a,

    min(a) over() start_a

    from t_range)

    start with a = start_a

    connect by prior next_a = a;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45


    select a, b

    from (select a, b, lag(a) over(order by a) as lag_a from t_range)

    start with lag_a is null

    connect by a >= prior b and lag_a < prior b;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

    ```


    дёҖдёӘйқһеёёдјҳйӣ…дё”й«ҳж•Ҳзҡ„и§ЈеҶіж–№жЎҲеҸҜд»ҘдҪҝз”ЁжЁЎејҸеҢ№й…ҚжқҘеұ•зӨәгҖӮ


    ```sql

    select *

    from t_range

    match_recognize

    (

    order by a

    all rows per match

    pattern((x|{-dummy-})+)

    define

    x as nvl(last(x.b, 1), 0) <= x.a

    ) mr;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

    ```


    жңүдёҖдәӣдҪҝз”Ё`model`еӯҗеҸҘзҡ„жӣҝд»Ји§ЈеҶіж–№жЎҲпјҢдҪҶе®ғд»¬зҡ„жҖ§иғҪжҜ”жЁЎејҸеҢ№й…Қи§ЈеҶіж–№жЎҲе·®гҖӮ


    ## Zeckendorf Representation


    Zeckendorfе®ҡзҗҶжҢҮеҮәпјҢжҜҸдёӘжӯЈж•ҙж•°йғҪеҸҜд»Ҙе”ҜдёҖең°иЎЁзӨәдёәдёҖдёӘжҲ–еӨҡдёӘдёҚиҝһз»ӯзҡ„ж–җжіўйӮЈеҘ‘ж•°д№Ӣе’ҢпјҢдё”иҜҘе’ҢдёҚеҢ…жӢ¬д»»дҪ•дёӨдёӘиҝһз»ӯзҡ„ж–җжіўйӮЈеҘ‘ж•°гҖӮ


    еҜ№дәҺд»»дҪ•з»ҷе®ҡзҡ„жӯЈж•ҙж•°пјҢеҸҜд»ҘдҪҝз”ЁиҙӘеҝғз®—жі•жүҫеҲ°ZeckendorfиЎЁзӨәпјҢеңЁжҜҸдёӘйҳ¶ж®өйҖүжӢ©жңҖеӨ§зҡ„еҸҜиғҪзҡ„ж–җжіўйӮЈеҘ‘ж•°гҖӮ


    жҲ‘д»¬зҡ„зӣ®ж ҮжҳҜдёәиЎЁ`n`дёӯзҡ„жүҖжңүж•°еӯ—жүҫеҲ°ж»Ўи¶іZeckendorfе®ҡзҗҶжқЎд»¶зҡ„иЎЁзӨәгҖӮ


    ```sql

    create table n(num) as select 222 from dual union all select 3690 from dual;

    ```


    йў„жңҹз»“жһңжҳҜпјҡ


    ```sql

    NUM PATH

    ---------- ------------------------------

    222 144+55+21+2

    3690 2584+987+89+21+8+1

    ```


    дёәз®ҖеҚ•иө·и§ҒпјҢеҒҮи®ҫжҲ‘д»¬жңүдёҖдёӘиЎЁ`fib(lvl, value)`пјҢе…¶дёӯеҢ…еҗ«еүҚ20дёӘж–җжіўйӮЈеҘ‘ж•°гҖӮж•°еӯ—еҸҜд»ҘдҪҝз”Ёжң¬д№ҰжҸҸиҝ°зҡ„дј—еӨҡж–№жі•д№ӢдёҖз”ҹжҲҗгҖӮ'
  raw: '### Solution


    A trivial solution is below:


    ```

    select *

    from (select * from t_id_value order by dbms_random.value)

    where rownum <= 10;

    ```


    In this case we generate dbms_random.value for all rows and then take the first
    10 rows with the lowest value.


    If the table is wideВ вҖ“ that is, contains many columns or some long strings, then
    we can optimize sort by ordering only rowids and introducing an additional join.


    ```

    select *

    from t_id_value

    where rowid in

    (select *

    from (select rowid from t_id_value order by dbms_random.value)

    where rownum <= 10);

    ```


    For the table introduced in this task, demonstrated optimization does not lead
    to noticeable improvement though.


    Given that all IDs start from 1 and there are no gaps, we can use the approach
    below with generating 10 random IDs.


    ```

    select *

    from t_id_value

    where id in (select trunc(dbms_random.value(1,

    (select max(id) from t_id_value) + 1))

    from dual

    connect by level <= 10);

    ```


    There is some chance though that we generate duplicates. For example, the query
    below returns 9 rows instead of 10:


    ```

    exec dbms_random.seed(48673);

    PL/SQL procedure successfully completed.

    select *

    from t_id_value

    where id in (select trunc(dbms_random.value(1,

    (select max(id) from t_id_value) + 1))

    from dual

    connect by level <= 10);

    ID VALUE

    ---------- --------------------------------------------

    564703 name564703

    917426 name917426

    1230672 name1230672

    1837951 name1837951

    1367140 name1367140

    248223 name248223

    873017 name873017

    581109 name581109

    1206874 name1206874

    9 rows selected.

    ```


    We can work around it by pre-generating a few reserve rows and by selecting k
    unique rows. However, to avoid even a theoretical chance of duplicates, we need
    to validate for the kth row whether all generated rows are unique. If not, then
    generate a new row and re-validate. This approach with referencing all generated
    rows can be implemented using a model clause or recursive subquery factoring.


    ```

    select *

    from t_id_value

    where id in

    (

    select distinct x

    from dual

    model return updated rows

    dimension by (0 id)

    measures(0 i, 0 x, (select max(id) from t_id_value) max_id)

    rules

    iterate (1e9) until i[0] = 10

    (

    x[iteration_number] = trunc(dbms_random.value(1, max_id[0] + 1)),

    i[0] = case when iteration_number < 10 - 1

    then 0 else count(distinct x)[any] end

    )

    );

    ```


    If we use В«`exec dbms_random.seed(48673)`В», then validation will be executed twice:
    after the 10th generated row and after the 11th, but in mostly all cases their
    validation will happen only once.


    A solution using recursive subquery factoring is below:


    ```

    with rec(lvl, batch)

    as (select 1,

    numbers(trunc(dbms_random.value(1, 2e6 + 1)))

    from dual

    union all

    select lvl + 1,

    batch multiset union all

    numbers(trunc(dbms_random.value(1, 2e6 + 1)))

    from rec

    where case when lvl < 10 then 0

    -- cardinality(set())

    -- does not work in recursive member

    else (select count(*) from table(set(rec.batch)))

    end < 10)

    select *

    from t_id_value

    where id in (select column_value

    from (select *

    from (select * from rec t order by lvl desc)

    where rownum = 1),

    table(batch));

    ```


    We accumulate generated values in a column batch that has data type numbers and
    check uniqueness starting from a k^(th) iteration, similarly to a model solution.
    For simplicity, the maximum value has been hard-coded instead of using a scalar
    subquery.


    The disadvantage of SQL approaches is that we need to scan all generated values
    to check uniqueness, which may be inefficient for large k. PL/SQL helps to avoid
    that if we use an associative array (this logic can be encapsulated in a pipelined
    function and used in SQL).


    ```

    declare

    type tp_arr is table of binary_integer index by binary_integer;

    arr tp_arr;

    i   int := 0;

    begin

    while true loop

    arr(trunc(dbms_random.value(1, 2e6 + 1))) := null;

    i := i + 1;

    if i >= 10 and arr.count = 10 then

    exit;

    end if;

    end loop;

    i := arr.first;

    while (i is not null) loop

    dbms_output.put_line(i);

    i := arr.next(i);

    end loop;

    end;

    /

    ```


    On the other hand, the more values we need to generate, the more preferable the
    first approach with ordering by random value. Also IвҖҷd like to highlight that
    all approaches that generate k unique values work only if there are no gaps. So
    if the primary key is varchar2, then we may need to read all the data and map
    all the rows to array or integers .


    ## Covering Ranges


    For the table containing ranges from a to b such as b > a and a is unique


    ```

    create table t_range(a, b) as

    (select 1, 15 from dual

    union all select 3, 17 from dual

    union all select 6, 19 from dual

    union all select 10, 21 from dual

    union all select 17, 26 from dual

    union all select 18, 29 from dual

    union all select 20, 32 from dual

    union all select 24, 35 from dual

    union all select 28, 45 from dual

    union all select 30, 49 from dual);

    ```


    we need to return covering ranges (1:15), (17:26), (28:45), that is, we start
    from the row with the minimal a and then pick up the row with the minimal a greater
    than the current b and so on.


    ### Solution


    Relatively simple, it can be solved using connect by and analytic functions, but
    performance is quite inefficient in this case.


    ```

    select a, b

    from (select a,

    b,

    min(a) over(order by a range between b - a following

    and unbounded following) as next_a,

    min(a) over() start_a

    from t_range)

    start with a = start_a

    connect by prior next_a = a;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

    select a, b

    from (select a, b, lag(a) over(order by a) as lag_a from t_range)

    start with lag_a is null

    connect by a >= prior b and lag_a < prior b;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

    ```


    A quite elegant and efficient solution can be demonstrated using pattern matching
    .


    ```

    select *

    from t_range

    match_recognize

    (

    order by a

    all rows per match

    pattern((x|{-dummy-})+)

    define

    x as nvl(last(x.b, 1), 0) <= x.a

    ) mr;

    A          B

    ---------- ----------

    1         15

    17         26

    28         45

    ```


    There are some alternative solutions using a model clause but their performance
    is worse than pattern-matching solutions.


    ## Zeckendorf Representation


    ZeckendorfвҖҷs theorem states that every positive integer can be represented uniquely
    as the sum of one or more distinct Fibonacci numbers in such a way that the sum
    does not include any two consecutive Fibonacci numbers.


    For any given positive integer, Zeckendorf representation can be found by using
    a greedy algorithm , choosing the largest possible Fibonacci number at each stage.


    Our goal is to find representation that satisfies the conditions of Zeckendorf''s
    theorem for all numbers from table n.


    ```

    create table n(num) as select 222 from dual union all select 3690 from dual;

    ```


    The expected result is


    ```

    NUM PATH

    ---------- ------------------------------

    222 144+55+21+2

    3690 2584+987+89+21+8+1

    ```


    For simplicity, letвҖҷs assume that we have a table fib(lvl, value) with the first
    20 Fibonacci numbers . Numbers can be generated using one of many ways described
    in this book.'
