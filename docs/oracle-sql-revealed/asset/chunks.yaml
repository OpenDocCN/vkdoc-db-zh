    \ t1.id + 1)(+) v;\n    Listing 1-28\n    Lateral view workaround for in-predicate\n\
    \    ```\n\nThe Oracle Optimizer team defines lateral view in the following way:\
    \ A lateral view is an inline view that contains a correlation referring to other\
    \ tables that precede it in the FROM clause. The ANSI syntax for cross join (cross\
