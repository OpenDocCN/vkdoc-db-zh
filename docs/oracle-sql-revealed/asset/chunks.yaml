- fmt: '## Summary


    Row pattern matching significantly extends capabilities of SQL for data analysis.
    This feature allows us to perform complex analysis that otherwise would require
    analytic and aggregate functions, joins, and subqueries. In some cases `match_recognize`
    is the only way to get a result using SQL in an efficient and scalable way. Even
    for cases when pattern matching can be rewritten using analytic functions, it
    shows better performance. An analogy could be drawn with `pivot/unpivot` operators
    that can be replaced with cross join/group by, but new capability performs a bit
    better than old-school methods.


    Regular expression-like syntax allows defining patterns in a concise way, which
    simplifies maintainability and improves readability. Eventually, pattern matching
    is a considerable breakthrough in SQL capabilities and definitely a useful feature.


    # 9. Logical Execution Order of Query Clauses


    Oracle allows the combining of various query clauses on the same layer of a single
    query, from basic features like joins, filtering, and grouping to advanced constructions
    like model clause or pattern matching. Sometimes itвҖҷs not possible to achieve
    the result using single `select ... from` query block so you may have to create
    additional inline views in the query вҖ“ for example, when you want to filter by
    the value of an analytic function. However, even if you can implement the entire
    logic using a single query block вҖ“ itвҖҷs not always necessary, because Oracle can
    eliminate inline views during the query transformations. Moreover, in some cases
    additional inline views may help to improve the performance as it will be shown
    in the end of the chapter.


    This chapter covers the execution order of query clauses in a query block from
    a logical point of view, which helps to implement complex logic in a concise way.


    LetвҖҷs assume we have one single `select` statement containing only one `select`
    keyword вҖ“ thus there are no subqueries or inline views. Basically the execution
    order is following:


    1. `from`, `join`, `where`

    2. `connect by`

    3. `group by`

    4. `having`

    5. analytic functions

    6. `select`-list (`distinct`, scalar subqueries etc)

    7. `order by`


    However this requires a number of clarifications.


    1. Specifics of the combination of `join`, `where,` and `connect by` was covered
    in Chapter [5](#A455196_1_En_5_Chapter.html), вҖңHierarchical queries: Connect by.вҖқ.
    In addition, as it was demonstrated in the section вҖңPseudocolumn Generation in
    Detail,вҖқ strictly speaking, itвҖҷs not correct to say that predicates in the `where
    clause` are executed either before or after `connect by`.

    2. Even though, logically post-join predicates are supposed to be evaluated after
    pre-join predicates, in fact they may be applied before if that leads to the plan
    with a lower cost.

    3. Query transformations may affect the actual execution order even for a single
    query block. For example, `distinct` may be applied before join if Distinct Placement
    transformation takes place вҖ“ technically Oracle creates additional inline view.

    4. An invaluable source of information about the execution order for a specific
    query is, of course, a query plan. It will show when predicates are applied, when
    aggregate and analytic functions are executed, and when various sorts are performed,
    if any, and much more.


    All the transformations and optimizations can take place only if this does not
    change the result, but what is more important, the actual execution order may
    change after CBO transformations вҖ“ a simple case is Distinct Placement transformation.


    Sometimes developers write a code, making wrong assumptions about execution order,
    which may be dangerous. Below are some caveats.


    1. You should not build the logic with an assumption that some filters will be
    applied before others in the same query block or rely on a specific plan. The
    example below demonstrates how a query may fail if the query plan changes.


    ```

    create table t01(id, value, constraint pk_t01 primary key(id)) as

    select 1, ''1'' from dual union all

    select 2, ''2'' from dual union all

    select 0, ''X'' from dual;

    create table t02(id, value) as

    select 1, 1 from dual union all

    select 2, 2 from dual;

    select

    * from t01 join t02 using (id, value);

    select *

    from table(dbms_xplan.display_cursor(format => ''basic predicate''));

    select --+ no_index(t01)

    * from t01 join t02 using (id, value);

    select *

    from table(dbms_xplan.display_cursor(format => ''basic predicate''));

    ```


    In the first case, Oracle does nested loops with an access by ID and applies a
    filter by value on top of a joined recordset, while in the second case there is
    a hash join and the query fails with `ORA-01722: invalid number` because of an
    implicit conversion when it tries to convert X into a number.'
  raw: "## Summary\n\nRow pattern matching significantly extends capabilities of SQL\
    \ for data analysis. This feature allows us to perform complex analysis that otherwise\
    \ would require analytic and aggregate functions, joins, and subqueries. In some\
    \ cases match_recognize is the only way to get a result using SQL in an efficient\
    \ and scalable way. Even for cases when pattern matching can be rewritten using\
    \ analytic functions, it shows better performance. An analogy could be drawn with\
    \ pivot/unpivot operators that can be replaced with cross join/group by, but new\
    \ capability performs a bit better than old-school methods.\n\nRegular expression-like\
    \ syntax allows defining patterns in a concise way, which simplifies maintainability\
    \ and improves readability. Eventually, pattern matching is a considerable breakthrough\
    \ in SQL capabilities and definitely a useful feature.\n\n# 9.В Logical Execution\
    \ Order of Query Clauses\n\nOracle allows the combining of various query clauses\
    \ on the same layer of a single query, from basic features like joins, filtering,\
    \ and grouping to advanced constructions like model clause or pattern matching.\
    \ Sometimes itвҖҷs not possible to achieve the result using single `select ... from`\
    \ query block so you may have to create additional inline views in the queryВ вҖ“\
    \ for example, when you want to filter by the value of an analytic function. However,\
    \ even if you can implement the entire logic using a single query blockВ вҖ“ itвҖҷs\
    \ not always necessary, because Oracle can eliminate inline views during the query\
    \ transformations. Moreover, in some cases additional inline views may help to\
    \ improve the performance as it will be shown in the end of the chapter.\n\nThis\
    \ chapter covers the execution order of query clauses in a query block from a\
    \ logical point of view, which helps to implement complex logic in a concise way.\n\
    \nLetвҖҷs assume we have one single `select` statement containing only one `select`\
    \ keywordВ вҖ“ thus there are no subqueries or inline views . Basically the execution\
    \ order is following:\n\n1.  from, join, where В \n2.  connect by В \n3.  group\
    \ by В \n4.  having В \n5.  analytic functions В \n6.  select-list (distinct, scalar\
    \ subqueries etc) В \n7.  order by\n\nHowever this requires a number of clarifications\
    \ .\n\n1.  Specifics of the combination of `join`, `where,` and `connect by` was\
    \ covered in Chapter [5](#A455196_1_En_5_Chapter.html), вҖңHierarchical queries:\
    \ Connect by.вҖқ. In addition, as it was demonstrated in the section вҖңPseudocolumn\
    \ Generation in Detail,вҖқ strictly speaking, itвҖҷs not correct to say that predicates\
    \ in the `where clause` are executed either before or after `connect by`. В \n\
    2.  Even though, logically post-join predicates are supposed to be evaluated after\
    \ pre-join predicates, in fact they may be applied before if that leads to the\
    \ plan with a lower cost. В \n3.  Query transformations may affect the actual execution\
    \ order even for a single query block. For example, `distinct` may be applied\
    \ before join if Distinct Placement transformation takes placeВ вҖ“ technically Oracle\
    \ creates additional inline view. В \n4.  An invaluable source of information about\
    \ the execution order for a specific query is, of course, a query plan. It will\
    \ show when predicates are applied, when aggregate and analytic functions are\
    \ executed, and when various sorts are performed, if any, and much more .\n\n\
    All the transformations and optimizations can take place only if this does not\
    \ change the result, but what is more important, the actual execution order may\
    \ change after CBO transformationsВ вҖ“ a simple case is Distinct Placement transformation.\n\
    \nSometimes developers write a code, making wrong assumptions about execution\
    \ order, which may be dangerous. Below are some caveats.\n\n1.  You should not\
    \ build the logic with an assumption that some filters will be applied before\
    \ others in the same query block or rely on a specific plan. The example below\
    \ demonstrates how a query may fail if the query plan changes.\n\n```\n    create\
    \ table t01(id, value, constraint pk_t01 primary key(id)) as\n    select 1, '1'\
    \ from dual union all\n    select 2, '2' from dual union all\n    select 0, 'X'\
    \ from dual;\n    create table t02(id, value) as\n    select 1, 1 from dual union\
    \ all\n    select 2, 2 from dual;\n    select\n    * from t01 join t02 using (id,\
    \ value);\n    select *\n    from table(dbms_xplan.display_cursor(format => 'basic\
    \ predicate'));\n    select --+ no_index(t01)\n    * from t01 join t02 using (id,\
    \ value);\n    select *\n    from table(dbms_xplan.display_cursor(format => 'basic\
    \ predicate'));\n    ```\n\nIn the first case , Oracle does nested loops with\
    \ an access by ID and applies a filter by value on top of a joined recordset,\
    \ while in the second case there is a hash join and the query fails with `ORA-01722:\
    \ invalid number` because of an implicit conversion when it tries to convert X\
    \ into a number."
