    from "T2" "T2"

    where "T2"."ID" = "T1"."ID"

    and "T2"."ID" = (select "from$_subquery$_003"."ID" "ID"

    from (select "T3"."ID" "ID"

    from "T3" "T3"

    where "T3"."ID" = :b1

