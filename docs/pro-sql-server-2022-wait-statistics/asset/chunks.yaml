    为了向您展示在我们的 `Ostress` 工作负载期间非聚集索引添加了另一个级别，我将使用 `INDEXPROPERTY` 函数来检索我们创建的非聚集索引的深度。


    首先，让我们使用 `TRUNCATE` 命令清空 `Insert_Test2` 表：


    ```sql

    TRUNCATE TABLE Insert_Test2;

    ```


    如果我们在该表的非聚集索引上使用 `INDEXPROPERTY` 函数，我们将看到 B-树的当前深度。接下来的查询展示了如何使用 `INDEXPROPERTY`
    函数来检索此信息：


    ```sql

    SELECT INDEXPROPERTY(OBJECT_ID(''Insert_Test2''), ''idx_ID'', ''indexDepth'');

    ```


    由于我们截断了表，且表中尚无行，因此索引深度应为 0。'
- fmt: 'We run the `Ostress` workload again, and after it has finished, review the
    index information again. Instead of using the `INDEXPROPERTY` function, we use
    the `sys.dm_db_index_physical_stats` DMF to return additional information about
    the number of index and data pages inside the index. This query returns such information:


    ```sql

    SELECT

    index_id,

    index_type_desc,

    index_depth,

    index_level,

    page_count,

    record_count

    FROM sys.dm_db_index_physical_stats

    (DB_ID(N''GalacticWorks''), OBJECT_ID(N''Insert_Test2''), NULL, NULL , ''DETAILED'');

    ```


    Figure [9-20](#340881_3_En_9_Chapter.xhtml#Fig20) shows the results of this query
    on my test SQL Server instance.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig20_HTML.png)


    A table has six columns titled `index_id`, `index_type_desc`, `index_depth`, `index_level`,
    `page_count`, and `record_count`, along with its corresponding entries in four
    rows.


    Figure 9-20


    `sys.dm_db_index_physical_stats` results


    As you see in this image, the non-clustered index now has three levels as indicated
    by the `index_depth` column. The `index_level` and `page_count` columns show how
    many pages exist on each level of the B-tree. The highest `index_level` number
    is the Root level, the lowest the Leaf level.


    While the new levels were created inside the B-tree, the concurrent insert queries
    had to wait before they could navigate the B-tree, resulting in the `LATCH_SH`
    waits.


    ### Lowering `LATCH_[xx]` Waits


    In the previous example, I presented a specific case of latch contention that
    occurs when index Root page splits occur so as to extend the B-tree structure.
    As I mentioned before, there are many more latch classes reported by the `LATCH_[xx]`
    wait type. This makes describing "one-size-fits-all" suggestions impossible. I
    can describe a general approach though, using the list here:


    *   Query `sys.dm_os_waiting_tasks` if `LATCH_[xx]` waits are occurring. The `resource_description`
    column shows additional information about the specific latch class. If you are
    in a situation where the `LATCH_[xx]` waits do not show in `sys.dm_os_waiting_tasks`
    but high wait times are visible in `sys.dm_os_wait_stats` DMV, the `sys.dm_os_latch_waits`
    DMV should be your starting point.


    *   Another helpful DMV can be the `sys.dm_exec_requests` DMV. Joined together
    with the `sys.dm_exec_sql_text` DMF, it may help you to find the query that is
    causing the `LATCH_[xx]` wait.


    *   Query `sys.dm_os_latch_waits` to see if this correlates with the latch class
    shown in the `resource_description` column of the `sys.dm_os_waiting_tasks` DMV.


    *   Check Books Online or Appendix III in this book for more information about
    the specific latch class.


    Thankfully, it is not very common to see consistent high wait times for the `LATCH_[xx]`
    wait type since the cases that can cause the `LATCH_[xx]` waits to occur are frequently
    related to specific workloads and database design.


    ### `LATCH_[xx]` Summary


    The `LATCH_[xx]` wait type represents waits encountered by a large selection of
    different, non-buffer-related latch classes inside SQL Server. These non-buffer-related
    latch classes have their own latch wait DMV, `sys.dm_os_latch_waits`, that returns
    the wait times of those latch classes. Troubleshooting `LATCH_[xx]` waits can
    be difficult since the latch classes that are associated with the wait type are
    minimally documented. Thankfully, it is not very common to see high wait times
    on the `LATCH_[xx]` wait type since they only occur for very specific situations
    and workloads.


    ## `PAGEIOLATCH_[xx]`


    The final latch-related wait type we will discuss in this chapter is the `PAGEIOLATCH_[xx]`
    wait type. The `PAGEIOLATCH_[xx]` wait type is by far the most common latch-related
    wait type and together with the `CXPACKET` wait type is the most common wait type
    to see on any SQL Server instance.


    Just like the two previous latch wait types we discussed, the `PAGEIOLATCH_[xx]`
    has different access modes that I replaced with `[xx]` in this chapter. Since
    we already described the different latch modes in the introduction, we won''t
    discuss them further in this chapter.


    The `PAGELATCH_[xx]` wait type is related to latches being placed on memory pages
    inside the buffer cache, and the `LATCH_[xx]` wait type is related to latches
    on non-buffer objects. The `PAGEIOLATCH_[xx]` wait type also indicates the use
    of latches on a specific area in SQL Server, in this case the IO latches.


    ### What Is the `PAGEIOLATCH_[xx]` Wait Type?


    Disk operations inside SQL Server are very expensive. Accessing the disk subsystem
    of your system requires extra resources and is always slower than accessing information
    inside the memory of your system. Because SQL Server is a database, and accessing
    and storing data inside the database is its primary function, the way SQL Server
    accesses data is extremely important. If data access is slow, SQL Server will
    perform slower as well, and this will result in noticeable performance degradation
    inside your queries or applications. To make IO interactions as efficient as possible,
    SQL Server uses a buffer cache to cache data pages previously accessed into the
    memory of your system. By caching data pages, SQL Server only has to access the
    disk subsystem once, when the first query requests those specific data pages.
    When later queries require the same data pages as the first query, SQL Server
    will detect those pages are already inside the buffer cache, through the Buffer
    Manager, and will access the data pages from inside the buffer cache instead of
    performing extra interactions with the disk subsystem. Figure [9-21](#340881_3_En_9_Chapter.xhtml#Fig21)
    shows the buffer cache behavior when a query requires data pages from the storage
    subsystem.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig21_HTML.png)


    A diagram depicts how the storage subsystem moves a page to the buffer cache in
    the SQL server from the buffer manager and responds to the query.


    Figure 9-21


    Moving a page from the storage subsystem to the buffer cache


    During the movement of data pages from the storage subsystem to the buffer cache,
    latches are used to "reserve" a buffer page for the data page on the storage subsystem.
    This makes sure no other concurrent transactions allocate the same buffer page
    or simultaneously attempt to transfer the same data page from the storage subsystem
    to the buffer cache.


    While SQL Server is transferring the data page from the storage subsystem into
    the buffer cache, an Exclusive latch will be placed on the buffer page. Because
    Exclusive latches are incompatible with almost every other latch mode (save for
    the Keep mode), it is guaranteed no other latch can access the buffer page while
    it is transferred. From the user perspective, a `PAGEIOLATCH_[xx]` wait will be
    recorded for the duration of the transfer of the data page. The mode of the latch
    depends on the action which initiated the movement of the data page from the storage
    subsystem to the buffer cache. A `PAGEIOLATCH_SH` will be recorded if the data
    is being moved for read access, and a `PAGEIOLATCH_UP` or `PAGEIOLATCH_EX` will
    be used if the data page is being moved for a modification. Figure [9-22](#340881_3_En_9_Chapter.xhtml#Fig22)
    shows the data page movement including latches and latch waits.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig22_HTML.png)


    A time plot depicts how the data page with latches from the storage subsystem
    is moved into the buffer cache in 5 steps: require data page, data page in buffer
    cache, allocate buffer page, move data page to buffer, and data page moved.


    Figure 9-22


    Movement of data page


    To summarize the preceding section, if you see `PAGEIOLATCH_[xx]` waits occurring,
    it means your SQL Server instance is reading data from your storage subsystem
    into your buffer cache. Because this is a very common operation to perform, it
    is easy to see why the `PAGEIOLATCH_[xx]` wait type is one of the most common
    wait types on any SQL Server instance.'
