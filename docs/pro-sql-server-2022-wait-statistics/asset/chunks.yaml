- fmt: '# 分析与优化 PAGEIOLATCH_[xx] 等待类型


    *   `PhysicalDisk\Disk Reads/sec` – 显示每秒的读取 IOPS（输入输出操作）。如果磁盘遇到容量问题，此信息会很有帮助。

    *   `PhysicalDisk\Disk Writes/sec` – 与 `PhysicalDisk\Disk Reads/sec` 类似，但显示的是每秒的写入
    IOPS。

    *   `PhysicalDisk\Disk Read Bytes/sec` – 此计数器显示每秒从磁盘读取的字节数。同样，此信息可用于检测可能的容量问题。

    *   `PhysicalDisk\Disk Write Bytes/sec` – 与 `PhysicalDisk\Disk Read Bytes/sec`
    相同，但此计数器显示每秒写入磁盘的字节数。


    利用这些 Perfmon 测量提供的信息，你应该能够识别可能的存储相关瓶颈。这些信息对存储管理员（如果有）也很有帮助，他们可以将这些测量结果与其管理的存储的测量结果进行比较。


    除了存储子系统的性能外，查询的行为也会影响 `PAGEIOLATCH_[xx]` 等待类型的等待时间。查询请求的数据越多（且这些数据不在缓冲区缓存中），就需要从存储子系统读取到缓冲区缓存的数据量就越大。例如，如果我们修改清单
    [9-3](#340881_3_En_9_Chapter.xhtml#PC23) 中的查询使其更具选择性，从而返回更少的数据，那么 `PAGEIOLATCH_[xx]`
    的等待时间也会减少。


    然而，你并不总是能奢侈地修改每个查询使其更具选择性。也许查询是由应用程序生成的，你无法修改它们，或者查询本身就需要大的结果集。幸运的是，作为 DBA，我们也可以通过执行数据库维护来帮助最小化
    `PAGEIOLATCH_[xx]` 等待时间。索引碎片和过时的统计信息也会急剧增加 `PAGEIOLATCH_[xx]` 等待时间。如果索引存在碎片，则需要执行更多的磁盘
    I/O 来检索请求的数据，这意味着 I/O 锁存需要保持更长时间，从而导致更高的 `PAGEIOLATCH_[xx]` 等待时间。过时的统计信息也可能导致更多的磁盘
    I/O，因为 SQL Server 预期返回的行数与实际行数不同。因此，请确保执行索引和统计信息维护，以尽可能限制磁盘交互量。


    影响 `PAGEIOLATCH_[xx]` 等待时间的最后领域是系统的内存。如果缓冲区缓存内的数据页在特定时间范围内未被访问，SQL Server 将会移除它们以释放缓冲区缓存内的空间。SQL
    Server 执行此清理的时间间隔取决于进入缓冲区缓存的数据量和缓冲区缓存内的可用空间量。如果对缓冲区缓存内数据页的请求非常高，SQL Server 将被迫交换最不常访问（或一段时间内未访问）的数据页以换入当前需要的页面。这种数据页在缓冲区缓存中进进出出的移动将导致更多的
    `PAGEIOLATCH_[xx]` 等待。在理想情况下，你的数据库应该完全适合 SQL Server 实例的缓冲区缓存。在这种情况下，SQL Server
    只需要将数据页从存储子系统移入缓冲区缓存一次，它们将一直保留在那里，直到 SQL Server 再次重启。尽管我们现在可以访问非常大量的 RAM，但在许多情况下，我们无法简单地将整个数据库放入
    SQL Server 实例的缓冲区缓存中，因此可以预期数据页会从缓冲区缓存换出回存储子系统。为系统增加更多 RAM 将增加缓冲区缓存存储的数据页数量，并有助于缓冲区缓存将这些页面在内存中保留更长时间。


    有两个 Perfmon 计数器可以帮助你深入了解缓冲区缓存的使用情况：`SQLServer:Buffer Manager\Buffer cache hit
    ratio` 和 `SQLServer:Buffer Manager\Page life expectancy`。`SQLServer:Buffer Manager\Buffer
    cache hit ratio` 将显示位于缓冲区缓存中且不需要在存储子系统上进行物理读取的页面百分比。`SQLServer:Buffer Manager\Page
    life expectancy` 计数器将显示数据页在缓冲区缓存中停留的秒数。如果你看到这两个计数器的值持续低于你的基线，则可能意味着 SQL Server
    遇到了内存压力，需要将数据页从缓冲区缓存移回磁盘以释放内存。


    然而，这两个计数器并不完美，关于它们的工作原理（特别是它们的理想值）有很多论述。与将这些值视为独立实体不同，我更喜欢将它们组合成我称之为“Buffer Pool
    IO Rate”的度量标准。这是衡量数据页在缓冲池中循环的指标。


    要获取 Buffer Pool IO Rate，请使用清单 [9-4](#340881_3_En_9_Chapter.xhtml#PC24) 中的代码。


    ```sql

    SELECT counter_name, (1.0*cntr_value/128) /

    (SELECT 1.0*cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Buffer Manager%''

    AND lower(counter_name) = ''Page life expectancy'')

    AS [BufferPoolRate]

    FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Buffer Manager%''

    AND counter_name = ''Target pages'';

    -- Listing 9-4

    -- Buffer Pool IO Rate

    ```


    无法告诉你一个确定的“良好”吞吐率，因为它取决于你的系统内存和工作负载。例如，一台服务器有 56GB 的 RAM 可用于缓冲池，如果你希望页面在池中保留大约一小时（3600
    秒），那么我们有 56000MB/3600秒，即大约 15.5 MB/秒作为目标吞吐率。


    这再次说明了基线的重要性。你需要经常测量 IO 速率并寻找峰值。


    ### PAGEIOLATCH_[xx] 摘要


    `PAGEIOLATCH_[xx]` 等待类型是迄今为止最常见的与锁存相关的等待类型。与 `CXPACKET` 等待类型一起，`PAGEIOLATCH_[xx]`
    等待类型可能是任何 SQL Server 实例上最常见的等待类型。`PAGEIOLATCH_[xx]` 等待类型与数据页从存储子系统移动到 SQL Server
    实例的缓冲区缓存内存直接相关。SQL Server 使用缓冲区缓存来最小化与（慢得多的）存储子系统的交互次数，从而最大化性能。每当一个数据页被读入缓冲区缓存时，`PAGEIOLATCH_[xx]`
    等待类型将记录为此所花费的时间。有许多方法可以减少 `PAGEIOLATCH_[xx]` 等待时间。经常被建议的“购买更快的存储”并不总是成立，尽管快速存储确实会直接影响
    `PAGEIOLATCH_[xx]` 等待时间。优化查询以减少需要移动到缓冲区缓存的数据页数量、对索引和统计信息执行维护以及分析内存性能都可能有助于减少 `PAGEIOLATCH_[xx]`
    等待时间。'
  raw: '*   **PhysicalDisk\Disk Reads/sec** – This shows the amount of read IOPS (Input
    Output Operations) per second. This information can be helpful if you are running
    into capacity issues on the disk.


    *   **PhysicalDisk\Disk Writes/sec** – The same as the PhysicalDisk\Disk Reads/sec,
    but this one shows the amount of write IOPS.


    *   **PhysicalDisk\Disk Read Bytes/sec** – This counter shows the amount of bytes
    read from the disk per second. Again, this information can be useful for detecting
    possible capacity problems.


    *   **PhysicalDisk\Disk Write Bytes/sec** – This is identical to the PhysicalDisk\Disk
    Read Bytes/sec, but this counter shows the amount of bytes written to disk per
    second.


    Using the information these Perfmon measurements provide, you should be able to
    identify possible storage-related bottlenecks. This information can also be helpful
    to the storage administrator (if there is one) who can compare these measurements
    to the measurements of the storage they manage.


    Next to the performance of your storage subsystem, the behavior of your queries
    will impact the wait times of the PAGEIOLATCH_[xx] wait type. The more data your
    queries are requesting (and not already in the buffer cache), the larger the amount
    of data to be read from the storage subsystem into the buffer cache. For instance,
    if we were to modify the query of Listing [9-3](#340881_3_En_9_Chapter.xhtml#PC23)
    to be more selective so less data is returned, the amount of PAGEIOLATCH_[xx]
    wait time would also be less.


    However, you don’t always have the luxury of being able to modify every query
    so it is more selective. Maybe the queries are generated by an application and
    you can’t modify them, or the queries simply need the large result set. Thankfully,
    as a DBA, we can also play a part in minimizing PAGEIOLATCH_[xx] wait times by
    performing database maintenance. Index fragmentation and out-of-date statistics
    also increase the PAGEIOLATCH_[xx] wait times drastically. If indexes are fragmented,
    more disk IOs need to take place to retrieve the data requested, which means IO
    latches will need to stay in place longer, which results in higher PAGEIOLATCH_[xx]
    wait times. Out-of-date statistics can also result in more disk IOs, because SQL
    Server expects a different number of rows to be returned instead of the actual
    number of rows. So, make sure you are performing index and statistics maintenance
    to limit the amount of disk interaction as small as possible.


    The final area impacting PAGEIOLATCH_[xx] wait time is the memory of your system.
    SQL Server will remove data pages from inside the buffer cache if they have not
    been accessed within a specific time frame to free up room inside the buffer cache.
    The interval at which SQL Server performs this cleanup depends on the amount of
    data coming into the buffer cache and the amount of free space inside the buffer
    cache. If the request for data pages inside the buffer cache is very high, SQL
    Server will be forced to swap data pages accessed the least (or haven’t been accessed
    for a while) for pages required now. This movement of data pages in and out of
    the buffer cache will result in more PAGEIOLATCH_[xx] waits. In an ideal world,
    your database would fit completely inside the buffer cache of your SQL Server
    instance. In this case, SQL Server will only need to move the data pages from
    the storage subsystem into the buffer cache once, where they will stay until SQL
    Server restarts again. Even though we do have access to very large amounts of
    RAM these days, in many cases we cannot simply fit our entire database into the
    buffer cache of our SQL Server instance, and some swapping of data pages from
    the buffer cache back to the storage subsystem can be expected. Adding more RAM
    to your system will increase the number of data pages the buffer cache stores
    and helps the buffer cache keep those pages in-memory longer.


    There are two Perfmon counters to help you get some insight into the buffer cache
    usage: **SQLServer:Buffer Manager\Buffer cache hit ratio** and **SQLServer:Buffer
    Manager\Page life expectancy**. The SQLServer:Buffer Manager\Buffer cache hit
    ratio will show you what percentage of pages are located in the buffer cache and
    do not require a physical read on the storage subsystem. The SQLServer:Buffer
    Manager\Page life expectancy counter will show you the number of seconds a data
    page stays inside the buffer cache. If you see continuously low values on both
    these counters, compared to your baseline, it could mean SQL Server is running
    into memory pressure and needs to move data pages from the buffer cache back to
    disk again to free up memory.


    These two counters are not perfect, though, and much has been written about their
    workings (and specifically their ideal values). Instead of viewing these values
    as separate entities, I prefer to combine them into what I call the “Buffer Pool
    IO Rate” metric. This is a measure of data pages being cycled through the buffer
    pool.


    To get the Buffer Pool IO Rate, use the following code in Listing [9-4](#340881_3_En_9_Chapter.xhtml#PC24).


    ```

    SELECT counter_name, (1.0*cntr_value/128) /

    (SELECT 1.0*cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Buffer Manager%''

    AND lower(counter_name) = ''Page life expectancy'')

    AS [BufferPoolRate]

    FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Buffer Manager%''

    AND counter_name = ''Target pages'';

    Listing 9-4

    Buffer Pool IO Rate

    ```


    It is not possible to tell you a defined “good” throughput rate, as it depends
    upon your system memory and workload. For example, a server with 56GB of RAM available
    for the buffer pool and if you want pages kept in the pool for an hour or so (3600
    seconds), then we have 56000MB/3600sec, or about 15.5 MB/sec as a target throughput.


    This is, again, why baselines are important. You will want to measure frequently
    for the IO rate and look for spikes.


    ### PAGEIOLATCH_[xx] Summary


    The PAGEIOLATCH_[xx] wait type is, by far, the most common latch-related wait
    type. Together with the CXPACKET wait type, the PAGEIOLATCH_[xx] wait type is
    probably the most common wait type on any SQL Server instance. The PAGEIOLATCH_[xx]
    wait type is directly related to the movement of data pages on the storage subsystem
    into the buffer cache memory of your SQL Server instance. SQL Server uses the
    buffer cache to minimize the number of interactions to the (much slower) storage
    subsystem so as to maximize performance. Whenever a data page is read into the
    buffer cache, the PAGEIOLATCH_[xx] wait type will be recorded for the time it
    took to do so. There are many methods available to lower the amount of PAGEIOLATCH_[xx]
    wait time. The frequently advised “get faster storage” doesn’t always hold true,
    even though fast storage will indeed directly influence the PAGEIOLATCH_[xx] wait
    times. Optimizing queries so they require fewer data pages to be moved to the
    buffer cache, performing maintenance on indexes and statistics, and analyzing
    memory performance could all lead to lower PAGEIOLATCH_[xx] wait times.'
