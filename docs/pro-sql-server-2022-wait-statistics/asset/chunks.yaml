  trans: '### 降低 HADR_SYNC_COMMIT 等待


    看到 `HADR_SYNC_COMMIT` 等待发生并不一定意味着存在问题。只要你的主副本上执行了数据修改，`HADR_SYNC_COMMIT` 等待就总是会发生。但如果等待时间远高于你的基线测量值，它们就可能指示存在问题。


    将 AlwaysOn 操作模式更改为异步复制将消除 `HADR_SYNC_COMMIT` 等待，但这会带来灾难发生时丢失数据的风险。此外，为了满足公司的灾难恢复或高可用性需求，你通常不能随意更改
    AlwaysOn 操作模式，因此我建议你不要仅仅为了降低 `HADR_SYNC_COMMIT` 等待时间而更改它。


    幸运的是，你可以使用多种不同的方法来监控 AlwaysOn 可用性组的性能，包括 AlwaysOn 仪表板、DMV 和 Perfmon 计数器。


    你可以通过右键单击 AlwaysOn 可用性组并选择“显示仪表板”选项来查看 AlwaysOn 仪表板。默认情况下，AlwaysOn 仪表板会提供一些关于
    AlwaysOn 可用性组的一般信息，例如可用性组内的服务器及其同步状态，如图 10-12 所示。


    ![](img/340881_3_En_10_Fig12_HTML.png)


    一张 AlwaysOn 仪表板的截图。页面标题显示了服务器名称和角色。可用性组状态显示了运行状况。可用性副本部分列出了实例名称、角色、可用性、故障转移和种子模式，以及同步状态和问题。


    图 10-12


    AlwaysOn 仪表板


    AlwaysOn 仪表板的默认视图并未提供太多用于故障排查的信息。幸运的是，你可以通过右键单击列标题并选择你感兴趣的信息来自定义视图，以满足自己的需求，如图
    10-13 所示。


    ![](img/340881_3_En_10_Fig13_HTML.png)


    一张显示可添加到 AlwaysOn 仪表板的 28 个选项列表的截图。已选选项包括名称、副本、同步状态、故障转移准备情况和问题。


    图 10-13


    AlwaysOn 添加列


    有很多有趣的列可用于故障排查同步问题，我建议花时间理解它们，以确定哪些列最适用于你的情况。


    AlwaysOn 仪表板显示的信息最初记录在各种与 AlwaysOn 相关的 DMV 中。这使得你自己查询这些信息成为可能。所有与 AlwaysOn 相关的
    DMV 在 DMV 名称中都带有 `dm_hadr` 前缀，例如 `sys.dm_hadr_database_replica_states` DMV 就包含了你能在
    AlwaysOn 仪表板中访问的大部分信息。


    除了 AlwaysOn 和与 AlwaysOn 相关的 DMV 外，还有用于 AlwaysOn 性能的 Perfmon 计数器。这些计数器在 Perfmon
    的 `SQLServer:Availability Replica` 和 `SQLServer:Database Replica` 组中进行分组。图 10-14
    显示了 `SQLServer:Database Replica` 组中可用计数器的一部分。


    ![](img/340881_3_En_10_Fig14_HTML.png)


    一张“添加计数器”窗口的截图。“可用计数器”部分列出了 Perfmon 计数器。“所选对象的实例”部分列出了实例。“添加的计数器”部分列出了计数器名称、父级、实例和计算机详细信息。


    图 10-14


    与 AlwaysOn 相关的 Perfmon 计数器


    正如你目前所读到的，有大量选项可供你用于分析副本之间的 AlwaysOn 性能。


    利用来自各种来源的信息，你可以检查 AlwaysOn 可用性组的整体运行状况。然后，你可以将此信息与其他指标相结合，以了解影响辅助副本性能的因素，例如存储子系统性能和网络连接性能。由于
    `HADR_SYNC_COMMIT` 等待类型与辅助副本紧密相关，因此你的分析应集中在托管辅助副本的 SQL Server 上。例如，如果你的存储子系统无法跟上需要在辅助副本上提交的事务数量，你将注意到这一点，表现为更高的
    `HADR_SYNC_COMMIT` 等待时间，以及 AlwaysOn 仪表板、DMV 或 Perfmon 中的各种计数器值变化。


    很难给出关于如何降低 `HADR_SYNC_COMMIT` 等待时间的通用建议，因为它们高度依赖于各种变量，并且也取决于你的工作负载。当你处理包含大量读取查询的工作负载时，你会发现比执行许多数据修改操作的工作负载更低的
    `HADR_SYNC_COMMIT` 等待时间。这意味着分析和优化你的查询工作负载也有助于降低 `HADR_SYNC_COMMIT` 等待时间。


    ### HADR_SYNC_COMMIT 总结


    `HADR_SYNC_COMMIT` 等待类型仅出现在配置为使用同步复制模式的副本所组成的 AlwaysOn 可用性组上。`HADR_SYNC_COMMIT`
    等待类型将让你了解辅助副本将事务提交到磁盘花费了多长时间。由于 `HADR_SYNC_COMMIT` 在同步复制中总是会记录等待时间，因此你只应在等待时间远高于预期时才需要关注。幸运的是，有各种方法可供你分析
    AlwaysOn 可用性组的性能，包括 AlwaysOn 仪表板、DMV 和 Perfmon 计数器。


    由于辅助副本的性能对 `HADR_SYNC_COMMIT` 等待时间影响最大，在排查此等待类型时，你的注意力应集中在辅助副本上。存储子系统和网络连接在辅助副本将日志记录写入其事务日志的速度方面都起着重要作用。你的工作负载也影响
    `HADR_SYNC_COMMIT` 等待时间，优化它以使数据修改更好地分散开，将会导致更低的 `HADR_SYNC_COMMIT` 等待时间。


    ### REDO_THREAD_PENDING_WORK


    本章最后一个等待类型是 `REDO_THREAD_PENDING_WORK` 等待类型。尽管它缺少标识 AlwaysOn 相关等待类型的特征性 `HADR_`
    前缀，但它与 AlwaysOn 有关。与 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型类似，`REDO_THREAD_PENDING_WORK`
    是一种在没有工作可做时随时间累积的等待类型。并且与 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型一样，在大多数情况下，它可以被忽略，因为它并不表示存在性能问题。


    尽管此等待类型在 99% 的情况下都可以安全忽略，但我仍想将其包含在本章中，原因有二。它通常是 AlwaysOn 可用性组辅助副本上排名靠前的等待类型之一，并且了解其与
    SQL Server 内部相关的进程将使你对 AlwaysOn 的内部工作机制有更好的理解。'
- fmt: '### What Is the REDO_THREAD_PENDING_WORK Wait Type?


    The `REDO_THREAD_PENDING_WORK` wait type is related to a process which occurs
    only on the secondary replica inside an AlwaysOn Availability Group, the Redo
    Thread.


    Up to this point in the chapter, we discussed how the secondary replica inside
    an AlwaysOn Availability Group processes log records, hardens them to its own
    transaction log, and sends a confirmation to the primary replica. When using synchronous
    replication, the primary replica will wait before sending a transaction complete
    message to the client which started the transaction, and when using asynchronous
    replication, the message is sent without waiting for the hardening on the secondary.
    But until now, we haven’t discussed the process of performing the modifications
    inside the secondary database described in the log records. This is where the
    Redo Thread on the secondary comes in. This thread is responsible for performing
    the data modifications recorded in the log records the primary replica sent. There
    is one important concept associated with the Redo Thread: it does not impact the
    commit confirmation from the secondary replica. This means the Redo Thread might
    be performing work long after the transaction has been communicated as committed
    to the client (both the primary and secondary replica have hardened the log record,
    and the AlwaysOn Availability Group has the synchronized status).


    This means even though your AlwaysOn Availability Group is synchronized, the data
    inside the secondary database is not necessarily identical to the primary database.
    This matters less than you might think, because the secondary hardened the log
    records to its own transaction log on disk, and it has all the information it
    needs to perform the redo operation. Transactions will not be lost if a failure
    occurs on the primary since the secondary has all the transactions performed in
    its own transaction log and can redo all the transactions. This works much the
    same as a standalone `SQL Server` instance where transactions are also hardened
    to disk first before data is actually changed. If `SQL Server` were to crash in
    this situation, `SQL Server` would use the transaction log to redo or undo the
    data modifications. Figure [10-15](#340881_3_En_10_Chapter.xhtml#Fig15) shows
    an example of synchronous replication together with the Redo Thread. Note that
    the Redo Thread is a separate operation and does not impact the duration of the
    transaction complete message.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig15_HTML.jpg)

    A diagram of a synchronous always-on group with a redo thread. Step 1, the transaction
    is made on the primary. Step 2, the redo thread uses the harden log in secondary.
    Step 3, the acknowledgment from the secondary is sent to the primary. Step 4,
    transaction confirmation from primary to client.

    **Figure 10-15**

    Synchronous AlwaysOn Availability Group and the Redo Thread


    While the Redo Thread is waiting for work to arrive, it will record the time it
    is inactive as wait time on the `REDO_THREAD_PENDING_WORK` wait type. This will
    occur on both synchronous and asynchronous-replication modes, but only on the
    secondary replica.


    Because the wait indicates the Redo Thread is not performing any work, it can,
    save for extremely rare cases, be safely ignored. And because the wait time for
    the `REDO_THREAD_PENDING_WORK` wait type will accumulate naturally when there
    is no work to be done, there is no need to write an example demonstrating the
    wait type. A simple query to retrieve `REDO_THREAD_PENDING_WORK` wait type information
    against the `sys.dm_os_wait_stats` DMV on a secondary replica will show you that
    the wait time increases, especially when there is no user activity against the
    AlwaysOn Availability Group, as shown in Figure [10-16](#340881_3_En_10_Chapter.xhtml#Fig16).


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig16_HTML.png)

    A screenshot of a S Q L server result window with 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with wait type as REDO underscore THREAD underscore PENDING underscore WORK
    and with values in the other 4 columns.

    **Figure 10-16**

    `REDO_THREAD_PENDING_WORK` wait information


    ### REDO_THREAD_PENDING_WORK Summary


    The `REDO_THREAD_PENDING_WORK` wait type is an AlwaysOn-related wait type which
    accumulates wait time naturally over time when there is no data modification activity
    against an AlwaysOn Availability Group. The `REDO_THREAD_PENDING_WORK` wait type
    is related to the Redo Thread on the secondary replica inside an AlwaysOn Availability
    Group, and it indicates that the Redo Thread is currently waiting for work. Since
    this wait type will occur on every secondary replica, especially when there is
    minimal to no user data modification occurring, it can safely be ignored.


    ## 11. Preemptive Wait Types


    In Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,” we
    reviewed `SQL Server`’s non-preemptive scheduling model used for thread scheduling
    and management. Unlike `SQL Server`, the Windows operating system uses *preemptive*
    scheduling to schedule and manage threads. Sometimes, `SQL Server` has to use
    Windows functions to perform specific actions through the operating system, for
    instance, when checking Active Directory permissions. When this occurs, `SQL Server`
    will ask for a thread from the Windows operating system, outside of `SQL Server`,
    thus making it impossible for `SQL Server` to manage that thread. While `SQL Server`
    is waiting for the preemptive thread inside the operating system to complete,
    `SQL Server` will record a wait on a preemptive wait type.


    There are many different preemptive wait types inside `SQL Server`; at the time
    of writing this book, `SQL Server` 2022 has 240 different preemptive wait types.
    The preemptive wait type recorded when a thread is requested outside `SQL Server`
    depends on the function the thread is accessing. Each of the preemptive wait types
    inside `SQL Server` represents a different Windows function (save for some exceptions
    which act as a catch-all wait type for different functions), and in many cases,
    the name of the wait type is identical to the name of the Windows function. This
    is helpful because you can search for the specific Windows function on `MSDN`
    and learn what the function does. If you know what the function does, you also
    know why, or on what, `SQL Server` is waiting. For example, if you notice high
    wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type, you can remove the
    `PREEMPTIVE_OS_` part and search `MSDN` for the `WRITEFILEGATHER` function. Figure
    [11-1](#340881_3_En_11_Chapter.xhtml#Fig1) shows the result for the `WRITEFILEGATHER`
    function.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig1_HTML.png)

    A screenshot of an article with header write file gather function, file a p i
    dot h. The text reads, retrieves data from an array of buffers, and writes the
    data to a file. The function starts writing data to the file at a position that
    is specified by an overlapped structure. The write file gather function operates
    asynchronously.

    **Figure 11-1**

    `WriteFileGather` Windows function


    By reading the article, we learn a lot about this function; apparently this function
    is used when writing data to a file and has to occur outside `SQL Server`. I won’t
    spoil anything else here, since we will go into more detail about the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type a bit further down in this chapter.


    I won’t describe every possible preemptive wait type in this chapter, since there
    are simply too many of them. Instead I have focused on the most common preemptive
    wait types. If you run into a preemptive wait type not discussed in detail in
    this chapter, I suggest you use the preceding method to find more information
    about the Windows function on `MSDN`. Hopefully, the information can help you
    figure out why the wait is occurring.'
  raw: '### What Is the REDO_THREAD_PENDING_WORK Wait Type?


    The REDO_THREAD_PENDING_WORK wait type is related to a process which occurs only
    on the secondary replica inside an AlwaysOn Availability Group, the Redo Thread.


    Up to this point in the chapter, we discussed how the secondary replica inside
    an AlwaysOn Availability Group processes log records, hardens them to its own
    transaction log, and sends a confirmation to the primary replica. When using synchronous
    replication, the primary replica will wait before sending a transaction complete
    message to the client which started the transaction, and when using asynchronous
    replication, the message is sent without waiting for the hardening on the secondary.
    But until now, we haven’t discussed the process of performing the modifications
    inside the secondary database described in the log records. This is where the
    Redo Thread on the secondary comes in. This thread is responsible for performing
    the data modifications recorded in the log records the primary replica sent. There
    is one important concept associated with the Redo Thread: it does not impact the
    commit confirmation from the secondary replica. This means the Redo Thread might
    be performing work long after the transaction has been communicated as committed
    to the client (both the primary and secondary replica have hardened the log record,
    and the AlwaysOn Availability Group has the synchronized status).


    This means even though your AlwaysOn Availability Group is synchronized, the data
    inside the secondary database is not necessarily identical to the primary database.
    This matters less than you might think, because the secondary hardened the log
    records to its own transaction log on disk, and it has all the information it
    needs to perform the redo operation. Transactions will not be lost if a failure
    occurs on the primary since the secondary has all the transactions performed in
    its own transaction log and can redo all the transactions. This works much the
    same as a standalone SQL Server instance where transactions are also hardened
    to disk first before data is actually changed. If SQL Server were to crash in
    this situation, SQL Server would use the transaction log to redo or undo the data
    modifications. Figure [10-15](#340881_3_En_10_Chapter.xhtml#Fig15) shows an example
    of synchronous replication together with the Redo Thread. Note that the Redo Thread
    is a separate operation and does not impact the duration of the transaction complete
    message.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig15_HTML.jpg)


    A diagram of a synchronous always-on group with a redo thread. Step 1, the transaction
    is made on the primary. Step 2, the redo thread uses the harden log in secondary.
    Step 3, the acknowledgment from the secondary is sent to the primary. Step 4,
    transaction confirmation from primary to client.


    ​​Figure 10-15


    Synchronous AlwaysOn Availability Group and the Redo Thread


    While the Redo Thread is waiting for work to arrive, it will record the time it
    is inactive as wait time on the REDO_THREAD_PENDING_WORK wait type. This will
    occur on both synchronous and asynchronous-replication modes, but only on the
    secondary replica.


    Because the wait indicates the Redo Thread is not performing any work, it can,
    save for extremely rare cases, be safely ignored. And because the wait time for
    the REDO_THREAD_PENDING_WORK wait type will accumulate naturally when there is
    no work to be done, there is no need to write an example demonstrating the wait
    type. A simple query to retrieve REDO_THREAD_PENDING_WORK wait type information
    against the sys.dm_os_wait_stats DMV on a secondary replica will show you that
    the wait time increases, especially when there is no user activity against the
    AlwaysOn Availability Group, as shown in Figure [10-16](#340881_3_En_10_Chapter.xhtml#Fig16).


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig16_HTML.png)


    A screenshot of a S Q L server result window with 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with wait type as REDO underscore THREAD underscore PENDING underscore WORK
    and with values in the other 4 columns.


    Figure 10-16


    REDO_THREAD_PENDING_WORK wait information


    ### REDO_THREAD_PENDING_WORK Summary


    The REDO_THREAD_PENDING_WORK wait type is an AlwaysOn-related wait type which
    accumulates wait time naturally over time when there is no data modification activity
    against an AlwaysOn Availability Group. The REDO_THREAD_PENDING_WORK wait type
    is related to the Redo Thread on the secondary replica inside an AlwaysOn Availability
    Group, and it indicates that the Redo Thread is currently waiting for work. Since
    this wait type will occur on every secondary replica, especially when there is
    minimal to no user data modification occurring, it can safely be ignored.


    # 11. Preemptive Wait Types


    In Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,” we
    reviewed SQL Server’s non-preemptive scheduling model used for thread scheduling
    and management. Unlike SQL Server, the Windows operating system uses *preemptive*
    scheduling to schedule and manage threads. Sometimes, SQL Server has to use Windows
    functions to perform specific actions through the operating system, for instance,
    when checking Active Directory permissions. When this occurs, SQL Server will
    ask for a thread from the Windows operating system, outside of SQL Server, thus
    making it impossible for SQL Server to manage that thread. While SQL Server is
    waiting for the preemptive thread inside the operating system to complete, SQL
    Server will record a wait on a preemptive wait type.


    There are many different preemptive wait types inside SQL Server; at the time
    of writing this book, SQL Server 2022 has 240 different preemptive wait types.
    The preemptive wait type recorded when a thread is requested outside SQL Server
    depends on the function the thread is accessing. Each of the preemptive wait types
    inside SQL Server represents a different Windows function (save for some exceptions
    which act as a catch-all wait type for different functions), and in many cases,
    the name of the wait type is identical to the name of the Windows function. This
    is helpful because you can search for the specific Windows function on MSDN and
    learn what the function does. If you know what the function does, you also know
    why, or on what, SQL Server is waiting. For example, if you notice high wait times
    on the PREEMPTIVE_OS_WRITEFILEGATHER wait type, you can remove the PREEMPTIVE_OS_
    part and search MSDN for the WRITEFILEGATHER function. Figure [11-1](#340881_3_En_11_Chapter.xhtml#Fig1)
    shows the result for the WRITEFILEGATHER function.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig1_HTML.png)


    A screenshot of an article with header write file gather function, file a p i
    dot h. The text reads, retrieves data from an array of buffers, and writes the
    data to a file. The function starts writing data to the file at a position that
    is specified by an overlapped structure. The write file gather function operates
    asynchronously.


    Figure 11-1


    WriteFileGather Windows function


    By reading the article, we learn a lot about this function; apparently this function
    is used when writing data to a file and has to occur outside SQL Server. I won’t
    spoil anything else here, since we will go into more detail about the PREEMPTIVE_OS_WRITEFILEGATHER
    wait type a bit further down in this chapter.


    I won’t describe every possible preemptive wait type in this chapter, since there
    are simply too many of them. Instead I have focused on the most common preemptive
    wait types. If you run into a preemptive wait type not discussed in detail in
    this chapter, I suggest you use the preceding method to find more information
    about the Windows function on MSDN. Hopefully, the information can help you figure
    out why the wait is occurring.'
  trans: '### 什么是 REDO_THREAD_PENDING_WORK 等待类型？


    `REDO_THREAD_PENDING_WORK` 等待类型与仅在 AlwaysOn 可用性组内的辅助副本上发生的一个进程相关，即重做线程。


    在本章前面的部分，我们讨论了 AlwaysOn 可用性组内的辅助副本如何处理日志记录，将其持久化到自己的事务日志，并向主副本发送确认。当使用同步复制时，主副本在向发起事务的客户端发送事务完成消息之前会等待；而当使用异步复制时，该消息会在不等待辅助副本持久化的情况下直接发送。但到目前为止，我们还没有讨论过在辅助数据库中执行日志记录所描述的修改的过程。这就是辅助副本上的重做线程发挥作用的地方。该线程负责执行主副本发送的日志记录中所记录的数据修改。与重做线程相关的一个重要概念是：它不影响来自辅助副本的提交确认。这意味着，即使事务已经向客户端报告为已提交（主副本和辅助副本都已将日志记录持久化，并且
    AlwaysOn 可用性组处于同步状态），重做线程可能仍在长时间地执行工作。


    这意味着即使你的 AlwaysOn 可用性组已同步，辅助数据库内的数据也不一定与主数据库完全相同。但这并不像你想的那么重要，因为辅助副本已将日志记录持久化到其磁盘上的事务日志中，并且它拥有执行重做操作所需的所有信息。如果主副本发生故障，事务不会丢失，因为辅助副本在其自己的事务日志中拥有所有已执行的事务，并且可以重做所有事务。这与独立的
    `SQL Server` 实例非常相似，在独立实例中，事务也会在数据实际更改之前先持久化到磁盘。如果 `SQL Server` 在此情况下崩溃，`SQL Server`
    将使用事务日志来重做或撤消数据修改。图 10-15 展示了一个同步复制与重做线程一起工作的示例。请注意，重做线程是一个独立的操作，不影响事务完成消息的持续时间。


    ![](img/340881_3_En_10_Fig15_HTML.jpg)

    一个带有重做线程的同步 AlwaysOn 组图表。步骤 1，事务在主副本上进行。步骤 2，重做线程在辅助副本上使用已持久化的日志。步骤 3，来自辅助副本的确认被发送到主副本。步骤
    4，主副本向客户端发送事务确认。

    **图 10-15**

    同步 AlwaysOn 可用性组和重做线程


    当重做线程等待工作到达时，它会将其不活动的时间记录为 `REDO_THREAD_PENDING_WORK` 等待类型的等待时间。这在同步和异步复制模式下都会发生，但只发生在辅助副本上。


    由于该等待表明重做线程没有执行任何工作，除了极少数情况外，它可以被安全地忽略。并且因为当没有工作要做时，`REDO_THREAD_PENDING_WORK`
    等待类型的等待时间会自然累积，所以不需要编写示例来演示该等待类型。在辅助副本上针对 `sys.dm_os_wait_stats` DMV 执行一个简单的查询来检索
    `REDO_THREAD_PENDING_WORK` 等待类型信息，你将看到等待时间在增加，尤其是在没有针对 AlwaysOn 可用性组的用户活动时，如图
    10-16 所示。


    ![](img/340881_3_En_10_Fig16_HTML.png)

    一个 SQL Server 结果窗口的截图，包含 5 列：等待类型、等待任务计数、等待时间（毫秒）、最大等待时间（毫秒）、信号等待时间（毫秒）。它有 1 行，等待类型为
    REDO_THREAD_PENDING_WORK，其他 4 列有对应的值。

    **图 10-16**

    `REDO_THREAD_PENDING_WORK` 等待信息


    ### REDO_THREAD_PENDING_WORK 总结


    `REDO_THREAD_PENDING_WORK` 等待类型是一种与 AlwaysOn 相关的等待类型，当 AlwaysOn 可用性组没有数据修改活动时，它会随时间自然累积等待时间。`REDO_THREAD_PENDING_WORK`
    等待类型与 AlwaysOn 可用性组内辅助副本上的重做线程相关，它表明重做线程当前正在等待工作。由于这种等待类型会出现在每个辅助副本上，尤其是在用户数据修改极少或没有发生时，它可以被安全地忽略。


    ## 11. 抢占式等待类型


    在第 1 章“等待统计信息内部原理”中，我们回顾了 `SQL Server` 用于线程调度和管理的非抢占式调度模型。与 `SQL Server` 不同，Windows
    操作系统使用 *抢占式* 调度来调度和管理线程。有时，`SQL Server` 必须使用 Windows 函数通过操作系统执行特定操作，例如检查 Active
    Directory 权限时。当这种情况发生时，`SQL Server` 会向 Windows 操作系统（在 `SQL Server` 之外）请求一个线程，这使得
    `SQL Server` 无法管理该线程。在 `SQL Server` 等待操作系统内的抢占式线程完成期间，`SQL Server` 会记录一个抢占式等待类型的等待。


    `SQL Server` 内部有许多不同的抢占式等待类型；在撰写本书时，`SQL Server` 2022 有 240 种不同的抢占式等待类型。当在 `SQL
    Server` 外部请求线程时记录的抢占式等待类型取决于该线程访问的函数。`SQL Server` 内部的每种抢占式等待类型都代表一个不同的 Windows
    函数（除了一些作为不同函数通用等待类型的例外情况），并且在许多情况下，等待类型的名称与 Windows 函数的名称相同。这很有帮助，因为你可以搜索特定的 Windows
    函数来了解其功能。如果你知道该函数的作用，你也就能知道 `SQL Server` 为何等待，或者在等待什么。例如，如果你注意到 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型的等待时间很长，你可以移除 `PREEMPTIVE_OS_` 部分，然后在 `MSDN` 上搜索 `WRITEFILEGATHER` 函数。图 11-1
    显示了 `WRITEFILEGATHER` 函数的搜索结果。


    ![](img/340881_3_En_11_Fig1_HTML.png)

    一篇文章的截图，标题为 write file gather 函数，位于 file api.h 中。文本内容为：从缓冲区数组中检索数据，并将数据写入文件。该函数从重叠结构指定的位置开始向文件写入数据。write
    file gather 函数以异步方式操作。

    **图 11-1**

    `WriteFileGather` Windows 函数


    通过阅读这篇文章，我们了解了很多关于这个函数的信息；显然，这个函数在向文件写入数据时使用，并且必须在 `SQL Server` 外部发生。我不会在这里透露更多内容，因为我们在本章后面会更详细地讨论
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型。


    在本章中，我不会描述每一个可能的抢占式等待类型，因为数量实在太多了。相反，我将重点介绍最常见的抢占式等待类型。如果你遇到了本章未详细讨论的抢占式等待类型，我建议你使用前面的方法在
    `MSDN` 上查找有关 Windows 函数的更多信息。希望这些信息能帮助你弄清楚等待发生的原因。'
- fmt: "## SQL Server on Linux\n\n从 SQL Server 2017 开始，SQL Server 不再局限于微软 Windows\
    \ 操作系统。在 2016 年 3 月的一次革命性宣布中，微软表示其下一版本的 SQL Server（2017）也将在 Linux 上可用。不用说，这个声明引起了相当大的震动，因为这是没人预料到会发生的事情。\n\
    \nSQL Server 支持 Linux 之所以重要，是因为 SQL Server 内部发生的抢占式等待是平台无关的。这意味着在查看 SQL-on-Linux\
    \ 实例的等待统计时，会记录对 Windows 操作系统中可用函数的调用。其原因与微软用于将 SQL Server 移植到 Linux 的底层技术息息相关。\n\
    \n为了使 SQL Server 能在 Linux 上运行，微软采用了一种称为`平台抽象层`（Platform Abstraction Layer，简称`PAL`）的概念。`PAL`\
    \ 的理念是将执行 SQL Server 所需的代码与与操作系统交互所需的代码分离开来。如果没有`PAL`，由于所有的操作系统依赖性，重写 SQL Server\
    \ 以使其在 Linux 上运行将耗费巨大的时间。因此，SQL Server 团队寻求不同的方法来解决这个问题，并在一个名为`Drawbridge`的微软研究项目中找到了答案。`Drawbridge`的定义可以在其项目页面\
    \ [`https://slrwnds.com/izvn8c`](https://slrwnds.com/izvn8c) 上找到，其描述如下：\n\n> *Drawbridge\
    \ 是一种用于应用程序沙盒化的新虚拟化形式的研究原型。Drawbridge 结合了两种核心技术：首先，是一个`picoprocess`，这是一个基于进程的隔离容器，具有最小的内核\
    \ API 表面。其次，是一个`library OS`，这是一个经过优化以便在 `picoprocess` 内高效运行的 Windows 版本。*\n\n\
    吸引 SQL Server 团队的主要部分是 `Drawbridge` 项目中的`Library OS`技术。该技术可以处理各种各样的 Windows 操作系统调用，并将其转换到宿主操作系统上，在本例中就是\
    \ Linux。不过，SQL Server 团队并没有原封不动地采用 `Drawbridge` 技术，因为该研究项目存在一些挑战。其中之一是该研究项目本身已正式完成，且不再提供支持。另一个原因是\
    \ SQL Server 操作系统（`SOS`）和 `Drawbridge` 在技术上有很大的重叠。两种解决方案都有自己的功能来处理内存管理和线程/调度。最终决定将\
    \ SQL Server OS 和 `Drawbridge` 合并为一个名为`SQLPAL`（SQL Platform Abstraction Layer）的新平台层。使用\
    \ `SQLPAL`，SQL Server 团队可以像往常一样进行开发，而将操作系统调用的翻译工作留给 `SQLPAL`。图 11-2 显示了在 Linux\
    \ 上运行 SQL Server 时各层之间的交互。\n\n> ![图 11-2](images/340881_3_En_11_Chapter/340881_3_En_11_Fig2_HTML.jpg)\n\
    > \n> 图 11-2：SQL Server on Linux 的层交互框图。SQL Server 向 SQLPAL 发出 1200 多个 Windows\
    \ 调用，SQLPAL 再向 Linux 宿主扩展发出 50 个 ABI 调用。宿主随后调用 Linux OS。\n> \n> **图 11-2**：SQL-on-Linux\
    \ 上的 PAL 层交互\n\n更多关于 `SQLPAL` 的功能和设计选择的信息可以在各种微软博客上找到。推荐一篇名为“SQL Server on Linux:\
    \ How? Introduction”的文章，链接为 [`https://slrwnds.com/8ldyuz`](https://slrwnds.com/8ldyuz)。\n\
    \n在本章的剩余部分，我将仅提及由 Windows 操作系统使用的函数。如果您在 Linux 上运行 SQL Server，请记住本章描述的功能在 Linux\
    \ 上由 `SQLPAL` 处理，但其功能与在 Windows 上相同。\n\n## PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE\n\
    \n本章的第一个抢占式等待类型是 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`。顾名思义，这些函数与通过操作系统加密或解密消息相关。\n\
    \n### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待类型是什么？\n\n\
    如前一节所述，`PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型与消息的加密和解密相关。更具体地说，它们与加密和解密进出\
    \ SQL Server 实例的网络流量相关。其中一个使用场景是当您使用证书连接到 SQL Server 实例以加密客户端和 SQL Server 实例之间发送的数据时。在这种情况下，SQL\
    \ Server 将访问 Windows 操作系统来执行发送给客户端的消息的加密，或解密从客户端接收的消息。这种加密和解密并不发生在 SQL Server\
    \ 内部，这与例如`透明数据加密`（Transparent Data Encryption, `TDE`）不同，后者加密/解密过程完全在 SQL Server\
    \ 内部进行。\n\n`PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 这两种等待类型不一定表示任何性能问题。它们只是表明正在使用加密功能，因此实际上不需要对这些等待类型进行故障排除。加密和解密消息的开销很小，很少会引起严重问题（我尚未遇到过因使用证书连接到\
    \ SQL Server 而导致性能问题的案例，但我想一切皆有可能）。"
  raw: '## SQL Server on Linux


    Starting with SQL Server 2017, SQL Server is no longer limited to the Microsoft
    Windows operating system. In a revolutionary announcement in March of 2016, Microsoft
    announced the next release of SQL Server (2017) would also be available on Linux.
    Needless to say, the announcement stirred up quite a bit of dust as it was something
    nobody would ever expect to happen.


    The reason why support of SQL Server on Linux is important are preemptive waits
    occuring inside SQL Server are platform independent. Meaning calls to functions
    available in the Windows operating system are recorded when looking at the wait
    statistics of a SQL-on-Linux instance. The reason why has everything to do with
    the underlying technology Microsoft used to bring SQL Server to Linux.


    To make SQL Server run on Linux, Microsoft adopted a concept called a Platform
    Abstraction Layer (or PAL for short). The idea of PAL is to separate the code
    needed to execute SQL Server with the code needed to interact with the operating
    system. Without PAL, rewriting SQL Server to run on Linux would take enormous
    amounts of time due to all the operating system dependencies. So the SQL Server
    team looked for different approaches to resolve this issue and found its answer
    in a Microsoft research project called Drawbridge. The definition of Drawbridge
    can be found on its project page at [`https://slrwnds.com/izvn8c`](https://slrwnds.com/izvn8c)
    and reads


    *   *Drawbridge is a research prototype of a new form of virtualization for application
    sandboxing. Drawbridge combines two core technologies: First, a picoprocess, which
    is a process-based isolation container with a minimal kernel API surface. Second,
    a library OS, which is a version of Windows enlightened to run efficiently within
    a picoprocess.*


    The main part which attracted the SQL Server team to the Drawbridge project was
    the Library OS technology. This technology could handle a wide variety of Windows
    operating system calls and translate them to the operating system of the host,
    which in this case is Linux. Now, the SQL Server team did not adapt the Drawbridge
    technology one-on-one as there were some challenges involved with the research
    project. One of them was the research project itself was officially completed,
    and there was no support on the project. Another one was a large overlap of technologies
    inside the SQL Server OS (SOS) and Drawbridge. Both solutions have their own functionalities
    to handle memory management and threading/scheduling. It was decided to merge
    the SQL Server OS and Drawbridge into a new platform layer called the SQLPAL (SQL
    Platform Abstraction Layer). Using SQLPAL, the SQL Server team can develop code
    as they have always done and leave the translation of operating system calls to
    SQLPAL. Figure [11-2](#340881_3_En_11_Chapter.xhtml#Fig2) shows the interaction
    between the various layers while running SQL Server on Linux.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig2_HTML.jpg)


    A block diagram of layer interaction for S Q L server on Linux. The S Q L server
    makes 1200 plus windows calls to S Q L P A L, which in turn makes 50 A B I calls
    to the Linux host extension. The host then calls the Linus O S.


    Figure 11-2


    PAL layer interaction on SQL-on-Linux


    More information is available on various Microsoft blogs covering the functionality
    and design choices of SQLPAL. A good recommendation is the “SQL Server on Linux:
    How? Introduction” article over at [`https://slrwnds.com/8ldyuz`](https://slrwnds.com/8ldyuz).


    For the remainder of this chapter, I will refer only to functions used by the
    Windows operating system. If you are running SQL Server on Linux, remember the
    functionality described in this chapter is handled by SQLPAL on Linux but has
    the same functionality as on Windows.


    ## PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE


    The first preemptive wait types in this chapter are PREEMPTIVE_OS_ENCRYPTMESSAGE
    and PREEMPTIVE_OS_DECRYPTMESSAGE. As you can probably guess from the names, the
    functions are related to either encrypting or decrypting messages through the
    operating system.


    ### What Are the PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE
    Wait Types?


    As noted in the previous section, the **PREEMPTIVE_OS_ENCRYPTMESSAGE** and **PREEMPTIVE_OS_DECRYPTMESSAGE**
    wait types are related to the encryption and decryption of messages. More specifically,
    they are related to encrypting and decrypting network traffic to and from the
    SQL Server instance. One case where this is used is when connecting to your SQL
    Server instance using certificates to encrypt data sent between the client and
    the SQL Server instance. In this case, SQL Server will access the Windows operating
    system to perform the encryption of the messages sent to the client or to decrypt
    the messages received from the client. This encryption and decryption does not
    happen inside SQL Server, unlike, for instance, Transparent Data Encryption (TDE),
    where the encryption/decryption process happens entirely inside SQL Server.


    Both the PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE wait types
    do not necessarily indicate any performance problems. They just show encryption
    is being used, so there is no real need to troubleshoot these wait types. The
    overhead of encrypting and decrypting messages is small and rarely causes any
    serious issues (I have yet to come across a case where using certificates to connect
    to SQL Server caused performance problems, but anything is possible I suppose).'
  trans: "## SQL Server on Linux\n\n自 SQL Server 2017 起，SQL Server 不再局限于微软 Windows\
    \ 操作系统。在 2016 年 3 月的一次革命性宣布中，微软表示其下一版本的 SQL Server（2017）也将在 Linux 上可用。不用说，这个声明引起了相当大的震动，因为这是没人预料到会发生的事情。\n\
    \nSQL Server 支持 Linux 之所以重要，是因为 SQL Server 内部发生的抢占式等待是平台无关的。这意味着在查看 SQL-on-Linux\
    \ 实例的等待统计时，会记录对 Windows 操作系统中可用函数的调用。其原因与微软用于将 SQL Server 移植到 Linux 的底层技术息息相关。\n\
    \n为了使 SQL Server 能在 Linux 上运行，微软采用了一种称为`平台抽象层`（Platform Abstraction Layer，简称`PAL`）的概念。`PAL`\
    \ 的理念是将执行 SQL Server 所需的代码与与操作系统交互所需的代码分离开来。如果没有`PAL`，由于所有的操作系统依赖性，重写 SQL Server\
    \ 以使其在 Linux 上运行将耗费巨大的时间。因此，SQL Server 团队寻求不同的方法来解决这个问题，并在一个名为`Drawbridge`的微软研究项目中找到了答案。`Drawbridge`的定义可以在其项目页面\
    \ [`https://slrwnds.com/izvn8c`](https://slrwnds.com/izvn8c) 上找到，其描述如下：\n\n> *Drawbridge\
    \ 是一种用于应用程序沙盒化的新虚拟化形式的研究原型。Drawbridge 结合了两种核心技术：首先，是一个`picoprocess`，这是一个基于进程的隔离容器，具有最小的内核\
    \ API 表面。其次，是一个`library OS`，这是一个经过优化以便在 `picoprocess` 内高效运行的 Windows 版本。*\n\n\
    吸引 SQL Server 团队的主要部分是 `Drawbridge` 项目中的`Library OS`技术。该技术可以处理各种各样的 Windows 操作系统调用，并将其转换到宿主操作系统上，在本例中就是\
    \ Linux。不过，SQL Server 团队并没有原封不动地采用 `Drawbridge` 技术，因为该研究项目存在一些挑战。其中之一是该研究项目本身已正式完成，且不再提供支持。另一个原因是\
    \ SQL Server 操作系统（`SOS`）和 `Drawbridge` 在技术上有很大的重叠。两种解决方案都有自己的功能来处理内存管理和线程/调度。最终决定将\
    \ SQL Server OS 和 `Drawbridge` 合并为一个名为`SQLPAL`（SQL Platform Abstraction Layer）的新平台层。使用\
    \ `SQLPAL`，SQL Server 团队可以像往常一样进行开发，而将操作系统调用的翻译工作留给 `SQLPAL`。图 11-2 显示了在 Linux\
    \ 上运行 SQL Server 时各层之间的交互。\n\n> ![图 11-2](img/340881_3_En_11_Fig2_HTML.jpg)\n\
    > \n> 图 11-2：SQL Server on Linux 的层交互框图。SQL Server 向 SQLPAL 发出 1200 多个 Windows\
    \ 调用，SQLPAL 再向 Linux 宿主扩展发出 50 个 ABI 调用。宿主随后调用 Linux OS。\n> \n> **图 11-2**：SQL-on-Linux\
    \ 上的 PAL 层交互\n\n更多关于 `SQLPAL` 的功能和设计选择的信息可以在各种微软博客上找到。推荐一篇名为“SQL Server on Linux:\
    \ How? Introduction”的文章，链接为 [`https://slrwnds.com/8ldyuz`](https://slrwnds.com/8ldyuz)。\n\
    \n在本章的剩余部分，我将仅提及由 Windows 操作系统使用的函数。如果您在 Linux 上运行 SQL Server，请记住本章描述的功能在 Linux\
    \ 上由 `SQLPAL` 处理，但其功能与在 Windows 上相同。\n\n## PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE\n\
    \n本章的第一个抢占式等待类型是 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`。顾名思义，这些函数与通过操作系统加密或解密消息相关。\n\
    \n### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待类型是什么？\n\n\
    如前一节所述，`PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型与消息的加密和解密相关。更具体地说，它们与加密和解密进出\
    \ SQL Server 实例的网络流量相关。其中一个使用场景是当您使用证书连接到 SQL Server 实例以加密客户端和 SQL Server 实例之间发送的数据时。在这种情况下，SQL\
    \ Server 将访问 Windows 操作系统来执行发送给客户端的消息的加密，或解密从客户端接收的消息。这种加密和解密并不发生在 SQL Server\
    \ 内部，这与例如`透明数据加密`（Transparent Data Encryption, `TDE`）不同，后者加密/解密过程完全在 SQL Server\
    \ 内部进行。\n\n`PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 这两种等待类型不一定表示任何性能问题。它们只是表明正在使用加密功能，因此实际上不需要对这些等待类型进行故障排除。加密和解密消息的开销很小，很少会引起严重问题（我尚未遇到过因使用证书连接到\
    \ SQL Server 而导致性能问题的案例，但我想一切皆有可能）。"
- fmt: '### PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Example


    To show an example of both the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types, we will configure a certificate for encrypting the connection to SQL
    Server. To make this example reproducible, I have included the steps for creating
    a self-signed certificate. Normally, in production environments, you will use
    a certificate issued by a certificate authority, but for testing purposes, a self-signed
    certificate is fine.


    The first step in this example is to install Internet Information Services (IIS)
    on my test virtual machine. IIS makes generating a self-signed certificate very
    simple.


    After the installation of IIS is completed, open the IIS Manager from Administrative
    Tools. Then click the name of your machine and select the Server Certificates
    option in the Features View, as shown in Figure [11-3](#340881_3_En_11_Chapter.xhtml#Fig3).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig3_HTML.png)


    A screenshot of an I I S manager window. It displays several icons under the I
    I S section, where the server certificate icon is selected. The management section
    with 3 icons is below,

    **Figure 11-3**

    Features View inside the IIS Manager


    This opens a new Server Certificates view inside the IIS Manager. Inside the Action
    Pane, click the Create Self-Signed Certificate option. We need a name for the
    certificate, so I filled in the name of my test virtual machine as you can see
    in Figure [11-4](#340881_3_En_11_Chapter.xhtml#Fig4).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig4_HTML.png)


    A screenshot of the create self-signed certificate window. A text box with a label,
    specify a friendly name for the certificate, has the text S Q L 2022. A dropdown
    box to select a certificate store for the new certificate has personal option
    chosen.

    **Figure 11-4**

    Create self-signed certificate


    Click OK, and the self-signed certificate is created and automatically placed
    inside the correct certificate store on my machine (Local Machine ➤ Personal Certificates).


    Now with the self-signed certificate inside the certificate store, we verify if
    the account the SQL Server service is running under has permissions to access
    the certificates. I open the Microsoft Management Console (`MMC`) by clicking
    Start ➤ Run, entering `MMC`, and pressing OK. With the `MMC` console open, add
    the Certificates snap-in by clicking File ➤ Add/Remove Snap-in, selecting the
    Certificates snap-in, and clicking Add. When prompted for the account I want to
    manage certificates, I select Computer account, as shown in Figure [11-5](#340881_3_En_11_Chapter.xhtml#Fig5),
    and click Next and Finish.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig5_HTML.png)


    A screenshot of a window labeled certificates snap-in. It has 3 options to manage
    the certificates, where the computer account radio button is selected and the
    next button below is highlighted. The other 2 options are my user account and
    service account.

    **Figure 11-5**

    Certificate account selection


    Inside the Certificates console, open the folder Certificates (Local Computer)
    ➤ Personal ➤ Certificates. If the generation of the self-signed certificate inside
    IIS was correct, I should see the certificate here. Figure [11-6](#340881_3_En_11_Chapter.xhtml#Fig6)
    shows the certificates on my test virtual machine.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig6_HTML.png)


    A screenshot of a list. It has 5 columns, issued to, issued by, expiration date,
    intended purposes, and friendly name. 2 rows have details filled under the columns.

    **Figure 11-6**

    Self-signed certificate


    Right-click the self-signed certificate and select All Tasks ➤ Manage Private
    Keys. A permissions dialog opens. Add the account under which the SQL Server service
    is running. If you run your SQL Server service under a different account, the
    account only needs read permission on the certificate, as shown in Figure [11-7](#340881_3_En_11_Chapter.xhtml#Fig7).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig7_HTML.png)


    A screenshot of a window labeled permissions for S Q L 2022 private keys. Under
    the Security tab, group or user names are listed where Francis is selected. The
    permissions section has 3 rows with checkboxes for columns allow and deny.

    **Figure 11-7**

    Self-signed certificate permissions


    After adding the account and selecting the right permission, click OK to close
    the dialog. With the permissions correct and the SQL Server service account being
    able to access the certificate, add the self-signed certificate to the network
    configuration of the SQL Server instance. Open the SQL Server Configuration Manager
    and click the SQL Server Network Configuration option. Right-click the SQL Server
    instance and select Properties. Next, open the Certificates tab and select the
    self-signed certificate created earlier. Figure [11-8](#340881_3_En_11_Chapter.xhtml#Fig8)
    shows the dialog on my test virtual machine.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig8_HTML.png)


    A screenshot of a window labeled protocols for R C 0 properties. Under the certificate
    tab, S Q L 2022 is selected with details below. Other tabs are flags and advanced.

    **Figure 11-8**

    Certificate selection


    After selecting the self-signed certificate, click OK to close the dialog. I am
    notified the certificate will become active after a restart of the SQL Server
    service, so we perform a restart of the SQL Server service.


    Right now SQL Server can use the self-signed certificate, but to make sure my
    network messages are encrypted, I must connect to the SQL Server instance and
    tell it I want to use encryption. For this example, I will use the SQL Server
    Management Studio (`SSMS`) on the same virtual machine as my SQL Server instance
    to connect to the SQL Server instance. If you connect to your SQL Server instance
    from another machine, you need to make sure the self-signed certificate is available
    on that machine. When the Connect to Server dialog appears inside `SSMS`, I click
    the Options button at the bottom right of the dialog. This opens up additional
    properties for the connection to my SQL Server instance. I select the Encrypt
    connection checkbox as shown in Figure [11-9](#340881_3_En_11_Chapter.xhtml#Fig9)
    and connect to my SQL Server instance.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig9_HTML.png)


    A screenshot of a window labeled connect to the server. Under the connection properties
    tab, an arrow indicates encrypt connection checkbox which is checked. The network
    and connection sections have options listed, along with a dropdown box labeled
    connect to database.

    **Figure 11-9**

    Connection properties in SQL Server Management Studio


    Right now we have configured everything I need to make sure SQL Server will use
    the self-signed certificate to encrypt messages between the SQL Server instance
    and `SSMS`, so we can finally take a look at the `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types!


    Generating the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    waits is very simple. Every query I execute from `SSMS` right now will be encrypted,
    even if I run `SSMS` on the same machine as the SQL Server instance. I use the
    query in Listing [11-1](#340881_3_En_11_Chapter.xhtml#PC1) to reset the `sys.dm_os_wait_stats`
    DMV, connect to the `GalacticWorks` database, perform a simple query, and then
    look at the waits occurring on the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE`
    wait types.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    USE GalacticWorks;

    SELECT *

    FROM Sales.SalesOrderDetail;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_ENCRYPTMESSAGE''

    OR wait_type = ''PREEMPTIVE_OS_DECRYPTMESSAGE'';

    ```

    **Listing 11-1** Select query using encrypted connection


    The results of these queries on my test SQL Server instance are shown in Figure
    [11-10](#340881_3_En_11_Chapter.xhtml#Fig10).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig10_HTML.png)'
