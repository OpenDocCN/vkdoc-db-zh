    # 使用扩展事件捕获等待统计信息


    SQL Server 中的大多数等待统计信息都是累计记录的，并且由于许多内部进程也会生成等待统计信息，因此很难检测单个查询的影响。借助扩展事件，可以捕获查询遇到的确切等待时间以及查询正在等待的等待类型。这些信息将帮助我们分析对系统影响最大的查询，从而优化查询性能，将其影响降至最低。或者，如果愿意，我们也可以捕获在执行时遇到特定等待类型的查询。


    扩展事件在 SQL Server 2008 中引入，用于替代 SQL Server Profiler 中的非安全事件。扩展事件比 Profiler 具有更强的可扩展性，并且随着
    SQL Server 每个版本的发布，扩展事件所包含的事件数量也在持续增长。


    **技术笔记**


    当 SQL Server 2008 引入扩展事件（用于非安全事件）和 SQL Server 审核（用于安全事件）时，人们认为 SQL Server Profiler
    的消亡已为期不远。在撰写本文的 2022 年，Profiler 依然健在，并且永远不会消亡。#TeamProfiler


    扩展事件向来以难以使用而闻名，这在 SQL Server 2008 中首次引入它们时尤为如此。从 SQL Server 2012 开始，首次可以使用 SSMS
    创建扩展事件会话，这使得使用扩展事件变得容易得多。


    使用扩展事件时，有许多不同的与等待相关的事件可用。我们可以通过查询 `sys.dm_xe_map_values` DMV 来查看这些事件，该 DMV 保存了所有不同扩展事件的事件类型：


    ```sql

    SELECT *

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types'';

    ```


    图 2-18 显示了此查询结果的一小部分。


    ![](img/340881_3_En_2_Fig18_HTML.png)


    部分结果的屏幕截图。表格输出包含 5 列和 16 行。列名称包括名称、对象、映射键和映射值。


    图 2-18


    `sys.dm_xe_map_values` 的部分结果


    在 SQL Server 2022 RC0 中，总共有大约 1500 个不同的等待统计信息相关事件可用。这些事件与不同的等待类型并非一一对应，在某些情况下，即使含义相同，等待类型的名称也可能与事件名称不匹配。例如，ASYNC_NETWORK_IO
    等待类型在扩展事件中被命名为 NETWORK_IO。虽然本书不会深入探讨扩展事件的细节，但我会向您展示如何在 SSMS 中使用扩展事件以及直接使用 T-SQL
    来捕获等待统计信息相关的信息。


    ## 为特定查询捕获等待统计信息


    让我们看看如何为捕获特定查询的等待统计信息配置扩展事件会话。我们将在特定会话上设置筛选器，然后执行要分析的查询。


    我们首先打开 SSMS 并连接到 SQL Server 实例（请注意，扩展事件是从 SQL Server 2012 开始的 SSMS 版本中添加的）。连接后，我们打开“管理”文件夹，然后选择“扩展事件”选项。我们右键单击“会话”文件夹并选择“新建会话”选项，如图
    2-19 所示。


    ![](img/340881_3_En_2_Fig19_HTML.jpg)


    新建扩展事件会话的屏幕截图。管理文件夹展开后显示扩展事件选项，其中包含会话文件夹。该文件夹的菜单中突出显示了“新建会话”选项。


    图 2-19


    添加新的扩展事件会话


    将出现“新建会话”对话框，我们在其中输入此扩展事件会话的名称并设置其他选项。我们现在将忽略这些选项，只需填写扩展事件会话的名称，如图 2-20 所示（注意顶部的错误消息；在添加要捕获的事件之前，这是预期的。）


    ![](img/340881_3_En_2_Fig20_HTML.png)


    新建会话对话框的屏幕截图。顶部文本显示“没有任何事件则无法创建会话”。左侧面板有一个用于选择页面的菜单，包括“常规”、“事件”、“数据存储”和“高级”。


    图 2-20


    配置等待统计信息扩展事件会话


    下一步是配置此扩展事件会话将监视的事件，我们通过选择“新建会话”对话框中的“事件”选项卡（图 2-21 中的标注号 1）来完成。


    由于我们对等待统计信息感兴趣，我在“事件库”中搜索了 `wait_info` 事件（图 2-21 中的标注号 2）并将其添加到“选定的事件”框中（图 2-21
    中的标注号 3），如下所示：


    ![](img/340881_3_En_2_Fig21_HTML.png)


    事件选择过程的屏幕截图。步骤如下：1. 从左菜单中选择事件。2. 在事件库中输入 wait_info。3. 选定的事件在右侧。


    图 2-21


    选择要监视的事件


    由于我们对特定查询相关的等待统计信息感兴趣，我们配置一个筛选器，仅返回特定会话的等待统计信息。为此，我们单击“新建会话”对话框中的“配置”按钮，该按钮打开一个新部分，我们在其中选择“全局字段”，这些字段将在触发
    `wait_info` 事件时记录额外信息。在这种情况下，我勾选了 `sql_text` 全局字段，如图 2-22 所示，这样当捕获事件时，我们将看到实际的查询。


    ![](img/340881_3_En_2_Fig22_HTML.png)


    所选事件的事件配置选项屏幕截图。事件 wait_info 在右侧打开一个全局字段列。名称 S Q L_text 被选中。


    图 2-22


    设置 `sql_text` 全局字段


    接下来是“筛选器（谓词）”选项卡。在这里，我们设置筛选器以仅捕获来自特定会话 ID 的事件。我们通过单击“字段”框内部并选择 `sqlserver.session_id`
    字段，然后将“值”设置为我们要监视的会话 ID 来实现。在这种情况下，我配置了筛选器以仅捕获会话 ID 为 76 的事件，如图 2-23 所示。


    ![](img/340881_3_En_2_Fig23_HTML.png)


    所选事件的筛选器选项屏幕截图。选定的事件位于中心，右侧的筛选器选项提供字段、运算符和值信息。


