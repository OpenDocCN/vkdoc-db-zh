    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig6_HTML.png)


    A screenshot of a window labeled metric: duration. It displays a bar graph of
    the total duration versus query i d. It is overlayed by a list under the metric,
    where wait time is selected.


    Figure 3-6


    Configuring the metric to Wait Time (ms)


    This changes the graph to return (by default) the top 25 queries ordered by the
    total wait time.


    After changing the metric, we mouseover on any of the columns shown in the graph
    to retrieve the wait category information, as shown in Figure [3-7](#340881_3_En_3_Chapter.xhtml#Fig7).


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig7_HTML.png)


    A screenshot of a window labeled metric: wait time. It displays a bar graph of
    the total wait time versus query i d. It is overlayed by a chart on bar 1, that
    lists the query i d details.


    Figure 3-7


    Wait categories exposed in the Query Store


    As you see from Figure [3-7](#340881_3_En_3_Chapter.xhtml#Fig7), this specific
    query ran into Lock, CPU, and Buffer Latch wait categories. We see the wait time
    per category and the total wait time across all of the categories, but as mentioned
    earlier, we have no idea about which exact wait types were encountered by the
    query.'
  trans: '

    ## 查询存储中如何处理等待统计信息


    在开始访问查询存储中记录的等待统计信息之前，我们将先研究查询存储如何处理等待统计信息，因为这与本书第 1 章“等待统计信息内部原理”中描述的过程不同。第 1
    章描述了 SQL Server 引擎跟踪查询在特定资源（即等待类型）上等待了多长时间。此信息是在细粒度级别记录的；例如，`PAGEIOLATCH_SH` 等待类型表示查询正在等待将数据页从磁盘读取到缓冲区缓存中，而
    `PAGEIOLATCH_EX` 表示查询正在等待将数据页移动到缓冲区缓存中进行修改。查询存储不是在详细级别记录等待时间，而是使用更高级别的等待类型概览，以最大程度地减少性能和资源利用率开销。查询存储将各种等待类型分组到类别中，并在类别级别记录等待时间，而不是在单个等待类型级别。


    这意味着无法在查询存储中搜索特定的等待类型，并且属于同一类别的等待类型之间无法区分。举个例子，`CMEMTHREAD` 和 `RESOURCE_SEMAPHORE`
    等待类型（你将在第 6 章“I/O 相关等待类型”中了解更多）在查询存储中都被记录在 `Memory` 类别下，尽管这两种等待类型指示不同的情况。


    表 3-1 显示了查询存储中使用的等待类型与等待类别之间的映射关系。此表绝非映射关系的完整概览，但应能让你很好地了解特定等待类型的归属。


    表 3-1


    等待类型与类别之间的映射


    | 等待类别 | 关联的等待类型 |

    | --- | --- |

    | `Unknown` | `Unknown` |

    | `CPU` | `SOS_SCHEDULER_YIELD` |

    | `Worker thread` | `THREADPOOL` |

    | `Lock` | `LCK_M_%` |

    | `Latch` | `LATCH_%` |

    | `Buffer latch` | `PAGELATCH_%` |

    | `Buffer IO` | `PAGEIOLATCH_%` |

    | `Compilation` | `RESOURCE_SEMAPHIRE_QUERY_COMPILE` |

    | `SQL CLR` | `CLR%`, `SQLCLR%` |

    | `Mirroring` | `DBMIRROR%` |

    | `Transaction` | `XACT%`, `DTC%`, `TRAN_MARKLATCH_%`, `MSQL_XACT_%`, `TRANSACTION_MUTEX`
    |

    | `Idle` | `SLEEP_%`, `LAZYWRITER_SLEEP`, `SQLTRACE_BUFFER_FLUSH`, `SQLTRACE_INCREMENTAL_FLUSH_SLEEP`,
    `SQLTRACE_WAIT_ENTRIES`, `FT_IFTS_SCHEDULER_IDLE_WAIT`, `XE_DISPATCHER_WAIT`,
    `REQUEST_FOR_DEADLOCK_SEARCH`, `LOGMGR_QUEUE`, `ONDEMAND_TASK_QUEUE`, `CHECKPOINT_QUEUE`,
    `XE_TIMER_EVENT` |

    | `Preemptive` | `PREEMPTIVE_%` |

    | `Service broker` | `BROKER_%` (但不包括 `BROKER_RECEIVE_WAITFOR`) |

    | `Tran Log IO` | `LOGMGR`, `LOGBUFFER`, `LOGMGR_RESERVE_APPEND`, `LOGMGR_FLUSH`,
    `LOGMGR_PMM_LOG`, `CHKPT`, `WRITELOG` |

    | `Network IO` | `ASYNC_NETWORK_IO`, `NET_WAITFOR_PACKET`, `PROXY_NETWORK_IO`,
    `EXTERNAL_SCRIPT_NETWORK_IOF` |

    | `Parallelism` | `CXPACKET`, `EXCHANGE`, `HT%`, `BMP%`, `BP%` |

    | `Memory` | `RESOURCE_SEMAPHORE`, `CMEMTHREAD`, `CMEMPARTITIONED`, `EE_PMOLOCK`,
    `MEMORY_ALLOCATION_EXT`, `RESERVED_MEMORY_ALLOCATION_EXT`, `MEMORY_GRANT_UPDATE`
    |

    | `User wait` | `WAITFOR`, `WAIT_FOR_RESULTS`, `BROKER_RECEIVE_WAITFOR` |

    | `Tracing` | `TRACEWRITE`, `SQLTRACE_LOCK`, `SQLTRACE_FILE_BUFFER`, `SQLTRACE_FILE_WRITE_IO_COMPLETION`,
    `SQLTRACE_FILE_READ_IO_COMPLETION`, `SQLTRACE_PENDING_BUFFER_WRITERS`, `SQLTRACE_SHUTDOWN`,
    `QUERY_TRACEOUT`, `TRACE_EVTNOTIFF` |

    | `Full text search` | `FT_RESTART_CRAWL`, `FULLTEXT GATHERER`, `MSSEARCH`, `FT_METADATA_MUTEX`,
    `FT_IFTSHC_MUTEX`, `FT_IFTSISM_MUTEX`, `FT_IFTS_RWLOCK`, `FT_COMPROWSET_RWLOCK`,
    `FT_MASTER_MERGE`, `FT_PROPERTYLIST_CACHE`, `FT_MASTER_MERGE_COORDINATOR`, `PWAIT_RESOURCE_SEMAPHIRE_FT_PARALLEL_QUERY_SYNC`
    |

    | `Other disk IO` | `ASYNC_IO_COMPLETION`, `IO_COMPLETION`, `BACKUPIO`, `WRITE_COMPLETION`,
    `IO_QUEUE_LIMIT`, `IO_RETRY` |

    | `Replication` | `SE_REPL_%`, `REPL_%`, `HADR_%` (但不包括 `HADR_THROTTLE_LOG_RATE_GOVERNOR`),
    `PWAIT_HADR_%`, `REPLICA_WRITES`, `FCB_REPLICA_WRITE`, `FCB_REPLICA_READ`, `PWAIT_HADRSIM`
    |

    | `Log rate governor` | `LOG_RATE_GOVERNOR`, `POOL_LOG_RATE_GOVERNOR`, `HADR_THROTTLE_LOG_RATE_GOVERNOR`,
    `INSTANCE_LOG_RATE_GOVERNOR` |


    ## 通过查询存储报告访问等待统计信息


    ### 查看内置报告


    查看查询存储中可用等待统计信息最用户友好的方式，是在数据库上启用查询存储功能后，使用 SSMS 中提供的内置报告。`图 3-4` 显示了截至本书撰写时可用的默认内置查询存储报告。


    ![](img/340881_3_En_3_Fig4_HTML.jpg)


    查询存储文件夹下的列表截图。其中包括：性能下降的查询、总体资源消耗、资源消耗最高的查询、具有强制计划的查询。


    图 3-4


    查询存储报告


    如 `图 3-4` 所示，有一个专门的等待统计信息报告，即 `query wait statistics`。你可以通过双击或右键单击并选择名称 `query
    wait statistics` 来查看此报告。报告将打开，其外观类似于 `图 3-5`。


    ![](img/340881_3_En_3_Fig5_HTML.png)


    一个窗口的截图，标签为：总等待时间。它显示了一个总等待时间与等待类别的柱状图。锁的等待时间较高，约为 22000。数据为近似值。


    图 3-5


    查询等待统计信息报告


    请注意，等待是按我们之前讨论的类别组织的。这里，大部分等待属于查询存储的 `Lock` 类别，它将所有 `LCK_M_%` 等待事件归为一组。


    ### 在其他报告中显示等待类别


    除了此报告，我们还可以通过在以下三个报告中特别选择 `等待时间 (ms)` 指标，来查看查询遇到的等待类别：


    *   性能下降的查询

    *   资源消耗最高的查询

    *   波动性大的查询


    要在上述任何报告中查看等待类别，你首先需要将指标配置为 `等待时间 (ms)`，如 `图 3-6` 所示。


    ![](img/340881_3_En_3_Fig6_HTML.png)


    一个窗口的截图，标签为：指标：持续时间。它显示了一个总持续时间与查询 ID 的柱状图。其上覆盖着一个指标下的列表，其中选择了“等待时间”。


    图 3-6


    将指标配置为“等待时间 (ms)”


    这会将图表更改为（默认）返回按总等待时间排序的前 25 个查询。


    更改指标后，我们将鼠标悬停在图表中显示的任何列上，以检索等待类别信息，如 `图 3-7` 所示。


    ![](img/340881_3_En_3_Fig7_HTML.png)


    一个窗口的截图，标签为：指标：等待时间。它显示了一个总等待时间与查询 ID 的柱状图。其上覆盖着一个在柱条 1 上的图表，列出了查询 ID 的详细信息。


    图 3-7


    查询存储中显示的等待类别


    从 `图 3-7` 可以看出，此特定查询遇到了 `Lock`、`CPU` 和 `Buffer Latch` 等待类别。我们看到了每个类别的等待时间以及所有类别的总等待时间，但如前所述，我们无法了解查询遇到的确切等待类型。

