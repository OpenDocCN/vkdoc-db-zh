    证书选择


    选择自签名证书后，点击“确定”关闭对话框。系统通知证书将在 SQL Server 服务重启后生效，因此我们执行 SQL Server 服务的重启。


    现在 SQL Server 可以使用自签名证书了，但为了确保我的网络消息是加密的，我必须连接到 SQL Server 实例并告诉它我要使用加密。对于本例，我将使用与
    SQL Server 实例同一虚拟机上的 SQL Server Management Studio (`SSMS`) 来连接到 SQL Server 实例。如果你从另一台机器连接到
    SQL Server 实例，你需要确保自签名证书在那台机器上可用。当 `SSMS` 中出现“连接到服务器”对话框时，我点击对话框右下角的“选项”按钮。这会打开与我的
    SQL Server 实例连接的附加属性。我选择“加密连接”复选框，如图 11-9 所示，然后连接到我的 SQL Server 实例。


    ![](img/340881_3_En_11_Fig9_HTML.png)


    一个标有“连接到服务器”的窗口截图。在“连接属性”选项卡下，一个箭头指示了已勾选的“加密连接”复选框。“网络”和“连接”部分列出了选项，以及一个标有“连接到数据库”的下拉框。

