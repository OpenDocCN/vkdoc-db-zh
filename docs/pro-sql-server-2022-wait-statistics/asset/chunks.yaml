  trans: '

    ## 等待统计


    到目前为止，我们已经深入探讨了为 SQL Server 执行调度的不同组件以及它们是如何相互关联的。现在，我们将注意力转向本书的主要主题：等待统计。


    在本章前面关于工作线程的部分，我描述了工作线程在调度程序上执行工作时所处的状态。当一个工作线程执行其工作时，它会在调度程序进程中经历三个不同的阶段（或队列）。根据工作线程所在的阶段（或队列），它会进入“运行中”、“可运行”或“已暂停”状态。图
    1-13 展示了一个调度程序及其不同阶段的抽象视图。


    ![](img/340881_3_En_1_Fig13_HTML.jpg)


    调度程序队列阶段的流程图有五个块：初始化、可运行、运行中、完成和等待中。


    图 1-13


    调度程序及其阶段和队列


    当一个工作线程获得访问调度程序的权限时，它通常会在等待者列表中启动，并被分配为“已暂停”状态。等待者列表（在图 1-13 中显示为 Waiting）是一个无序列表，包含所有处于“已暂停”状态并等待资源可用的工作线程。这里的资源是指系统上的任何东西，例如数据页或锁请求。当一个工作线程在等待者列表中时，`SQLOS`
    会记录它继续工作所需的资源类型（这就是等待类型），以及该特定资源变为可用之前它所花费的等待时间（这就是资源等待时间）。


    当一个工作线程获得所需资源的访问权限时，它将移动到可运行队列。这是一个先进先出的列表，包含所有已获得资源访问权限并准备好在处理器上运行的工作线程。工作线程在可运行队列中花费的时间被记录为信号等待时间。


    可运行队列顶部的工作线程将移动到“运行中”阶段，在此阶段它将获得处理器时间以执行其工作。它在处理器上花费的时间被记录为 CPU 时间。与此同时，可运行队列中的其他工作线程会向上移动，而已获得所需资源的工作线程则从等待者列表移入可运行队列。


    极客笔记


    可运行队列是一个先进先出的列表。如果不是这样，在繁忙的系统中，理论上一个任务可能永远无法从可运行状态转为运行中状态。然而，等待者列表不是先进先出的。


    当工作线程处于“运行中”阶段时，可能会发生三种情况：


    1.  工作线程需要额外的资源；在这种情况下，它从“运行中”阶段移动到等待者列表（即我们看到的“已暂停”状态）。

    2.  工作线程耗尽了其时间配额（固定值为 4 毫秒），因此必须让出处理器；该工作线程被移动到可运行队列的底部。

    3.  工作线程完成了其工作并离开调度程序。


    工作线程总是在三个不同的阶段中移动。一个工作线程循环多次直到所有工作完成是很常见的。


    了解请求在三个不同阶段之一所花费的不同时长，可以计算总的请求执行时间，以及请求为等待处理器时间或资源时间所花费的总时间。


    用数学公式表示，总的请求执行时间如下所示：

    `总请求执行时间 = 运行时间 + 可运行时间 + 暂停时间`


    也可以写成如下形式：

    `总请求执行时间 = CPU 时间 + 信号等待时间 + 资源等待时间`


    由于 SQL Server 中工作线程的调度涉及大量术语，让我们通过一个例子来说明工作线程是如何在调度程序中移动的。


    图 1-14 展示了一个等待队列、可运行队列和一个正在执行请求的处理器的抽象图。


    ![](img/340881_3_En_1_Fig14_HTML.jpg)


    调度程序及其请求的块图包含 3 个块。一个 C P U 1 块，其中 S P I D 77 请求正在运行。一个可运行队列块，包含 2 个请求。一个等待队列块，包含
    6 个请求。


    图 1-14


    带有请求的调度程序


    在此示例中，我们看到一个来自 `SPID 77` 的请求正在处理器上运行；该请求将处于“运行中”状态。等待队列中有等待资源的请求。我不会详细介绍列出的等待类型，因为我们将在本书的第二部分介绍等待类型。当这些会话在等待队列中时，SQL
    Server 会将花费的时间记录为等待时间，并且等待类型将被标记为代表它们正在等待的资源。如果我们查询有关这些线程的信息，它们将处于“已暂停”状态。`SPID
    81` 和 `SPID 91` 已准备好资源，正在可运行队列中等待 `SPID 77` 在处理器上完成其工作。当它们在可运行队列中等待时，SQL Server
    将它们在此处花费的时间记录为信号等待时间，并将此时间添加到总等待时间中。这些工作线程将处于“可运行”状态。


    在图 1-15 中，我们向前移动了几毫秒；注意调度程序和工作线程是如何在不同的阶段和队列中移动的。


    ![](img/340881_3_En_1_Fig15_HTML.png)


    几毫秒后调度程序的块图显示：C P U 1 块中 S P I D 77 仍在运行。可运行队列块从等待队列块接收了 S P I D 67 请求，现在有 3 个请求。等待队列块现在有
    5 个请求。


    图 1-15


    几毫秒后带有请求的调度程序


    `SPID 67` 已完成对 `PAGEIOLATCH_SH` 等待类型的等待，并已移动到可运行队列的底部。图 1-16 显示了接下来的几毫秒。


    ![](img/340881_3_En_1_Fig16_HTML.jpg)


    再过几毫秒后调度程序的块图。S P I D 77 请求从 C P U 1 块移动到等待队列块。等待队列现在有 6 个请求。可运行队列块有 3 个请求。C P
    U 1 块没有请求。


    图 1-16


    再过几毫秒


    `SPID 77` 需要额外的资源，并被放回等待队列。这里我选择将其放在图像的中间，以更好地表示等待队列不是先进先出队列。图 1-17 显示了接下来的几毫秒。


    ![](img/340881_3_En_1_Fig17_HTML.png)


    调度程序的块图。S P I D 81 请求从可运行队列移动到 C P U 1 块并正在运行。可运行队列块现在有 2 个请求。C P U 1 块现在有 1 个请求。等待队列有
    6 个请求。


    图 1-17


    再过几毫秒


    `SPID 81` 是可运行队列中的第一个工作线程，现在处理器空闲，它从可运行队列移动到处理器，状态从“可运行”变为“运行中”。


    这就是工作线程如何从“已暂停”到“可运行”再到“运行中”移动，直到请求完成并退出调度程序的。

    '
- fmt: '# 2. Querying SQL Server Wait Statistics


    ## Summary


    In this chapter, we reviewed the history of wait statistics throughout various
    versions of SQL Server. With the introduction of the SQLOS in SQL Server 2005,
    a lot changed in how SQL Server processed requests, introducing schedulers, worker
    threads, and tasks. All the information for the various parts are stored in Dynamic
    Management Views (DMVs) or Dynamic Management Functions (DMFs), which are easily
    queried and return a lot of information about the internals of SQL Server.


    Using these DMVs, we view the progress of requests while they are handled by a
    SQL Server scheduler and learn if they are waiting for any specific resources.
    The resources the requests are waiting for and the time they spend waiting for
    those resources are recorded as wait statistics, the main topic of this book.


    With the introduction of Dynamic Management Views (DMVs) and Dynamic Management
    Functions (DMFs) in SQL Server 2005, viewing and analyzing wait statistics became
    easier and less tedious. In SQL Server versions prior to SQL Server 2005, users
    were limited to the `DBCC SQLPERF(''WAITSSTATS'')` command to view wait statistics.
    Presently, there are a variety of DMVs which return wait statistics related information,
    and in this chapter, we will take a detailed look at four of the most useful DMVs:
    `sys.dm_os_wait_stats`, `sys.dm_os_waiting_tasks`, `sys.dm_exec_requests`, and
    `sys.dm_exec_session_wait_stats`.


    Viewing wait statistics information is not only limited to DMVs though. We can
    also use the Performance Monitor, or Perfmon, to view wait statistics information.


    SQL Server 2008 introduced yet another option to view wait statistics, Extended
    Events. Extended Events were difficult to work with in SQL Server 2008, (you had
    to write the entire Extended Event session in T-SQL), but Microsoft has drastically
    improved Extended Events in later versions making them more user-friendly and
    easier to use.


    SQL Server 2016 SP1 introduced two new methods to access wait statistics: through
    a new DMV called `sys.dm_exec_session_wait_stats` and by adding wait statistics
    information on a per-query basis inside execution plans.


    In SQL Server 2017, Microsoft took recording wait statistics another step forward
    by including them inside the Query Store. The Query Store is a feature introduced
    in SQL Server 2016 and acts like a flight recorder for your query workload, logging
    query statement, performance, and resource utilization.


    In this chapter, we will look at the sources which capture wait statistics mentioned
    in the previous paragraphs, starting with the DMVs. Because the Query Store feature
    has such a big impact on troubleshooting and analyzing query performance, including
    wait statistics, we will take a thorough look at it in Chapter [3](#340881_3_En_3_Chapter.xhtml),
    “The Query Store.”


    ### sys.dm_os_wait_stats


    The `sys.dm_os_wait_stats` DMV is one of the most important DMVs regarding wait
    statistics. This DMV is the replacement for the `DBCC SQLPERF(''WAITSTATS'')`
    command in use before SQL Server 2005. All the information returned from the `DBCC
    SQLPERF(''WAITSTATS'')` command is included in the `sys.dm_os_wait_stats` DMV,
    plus a little bit more.


    The `sys.dm_os_wait_stats` DMV shows the total amount of wait time for every wait
    type since the SQL Server instance was started. It is cumulative, adding wait
    time to the different wait types, resulting in an ever-increasing total. Querying
    the `sys.dm_os_wait_stats` DMV provides insight into what the query requests were
    waiting for. This is helpful if you are looking for the grand total of wait time
    for every wait type, but many times you are interested in the wait time for a
    specific time segment, or query. In this case, it is possible to reset the `sys.dm_os_wait_stats`
    DMV without having to restart SQL Server by using the following command:


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    ```


    This will reset wait statistics information back to 0 again, meaning you lose
    all information before the reset. In Chapter [4](#340881_3_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” we will examine a method which will not completely
    reset the `sys.dm_os_wait_stats` counters.


    As with every DMV in SQL Server, we execute a query against the `sys.dm_os_wait_stats`
    DMV as if it were a table, in this case:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats;

    ```


    The results of this query are shown in Figure [2-1](#340881_3_En_2_Chapter.xhtml#Fig1).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig1_HTML.png)


    Figure 2-1: sys.dm_os_wait_stats


    Following are the available columns in the `sys.dm_os_wait_stats` DMV, along with
    a description of what the column represents:


    *   `wait_type` – The name of the wait type. The `sys.dm_os_wait_stats` will return
    one row for every wait type possible for the specific SQL Server installation.

    *   `waiting_tasks_count` – The count of how many times a worker thread had to
    wait for that specific wait type.

    *   `wait_time_ms` – The total wait time in milliseconds for the specific wait
    type since the start of the SQL Server instance or a manual reset. This is the
    time a worker thread has spent in the Waiter List in the “SUSPENDED” state. It
    also includes the time the worker thread spent in the Runnable Queue in the “RUNNABLE”
    state while waiting for the scheduler to grant it processor time.

    *   `max_wait_time_ms` – The maximum wait time in milliseconds a worker thread
    waited on the specific wait type.

    *   `signal_wait_time_ms` – The amount of time in milliseconds the worker thread
    spent in Runnable Queue waiting for an available processor.


    **Nerd Note**


    Signal wait times are unavoidable and normal in systems where a large number of
    queries are being processed, all of them requesting time on the processor. The
    signal wait time is also an important metric for detecting CPU pressure. Generally
    speaking, depending on the hardware of your system, seeing signal wait time metrics
    higher than 15% of the total wait time **MIGHT** indicate CPU pressure, because
    the worker threads are waiting for a processor to become available.


    You may have noticed the `sys.dm_os_wait_stats` DMV does not return a column for
    the resource wait time. If we want to display the resource wait time as an additional
    column, we will need to calculate the value ourselves.


    Listing [2-1](#340881_3_En_2_Chapter.xhtml#PC3) shows a query to analyze the `sys.dm_os_wait_stats`
    DMV. Besides the regular columns, it will add two more columns for every wait
    type returned, the resource wait time and the average wait time.'
  raw: '### Summary


    In this chapter, we reviewed the history of wait statistics throughout various
    versions of SQL Server. With the introduction of the SQLOS in SQL Server 2005,
    a lot changed in how SQL Server processed requests, introducing schedulers, worker
    threads, and tasks. All the information for the various parts are stored in Dynamic
    Management Views (DMVs) or Dynamic Management Functions (DMFs), which are easily
    queried and return a lot of information about the internals of SQL Server.


    Using these DMVs, we view the progress of requests while they are handled by a
    SQL Server scheduler and learn if they are waiting for any specific resources.
    The resources the requests are waiting for and the time they spend waiting for
    those resources are recorded as wait statistics, the main topic of this book.


    # 2. Querying SQL Server Wait Statistics


    With the introduction of Dynamic Management Views (DMVs) and Dynamic Management
    Functions (DMFs) in SQL Server 2005, viewing and analyzing wait statistics became
    easier and less tedious. In SQL Server versions prior to SQL Server 2005, users
    were limited to the DBCC SQLPERF(''WAITSSTATS'') command to view wait statistics.
    Presently, there are a variety of DMVs which return wait statistics related information,
    and in this chapter, we will take a detailed look at four of the most useful DMVs:
    **sys.dm_os_wait_stats**, **sys.dm_os_waiting_tasks**, **sys.dm_exec_requests**,
    and **sys.dm_exec_session_wait_stats**.


    Viewing wait statistics information is not only limited to DMVs though. We can
    also use the Performance Monitor, or Perfmon, to view wait statistics information.


    SQL Server 2008 introduced yet another option to view wait statistics, Extended
    Events. Extended Events were difficult to work with in SQL Server 2008, (you had
    to write the entire Extended Event session in T-SQL), but Microsoft has drastically
    improved Extended Events in later versions making them more user-friendly and
    easier to use.


    SQL Server 2016 SP1 introduced two new methods to access wait statistics: through
    a new DMV called **sys.dm_exec_session_wait_stats** and by adding wait statistics
    information on a per-query basis inside execution plans.


    In SQL Server 2017, Microsoft took recording wait statistics another step forward
    by including them inside the Query Store. The Query Store is a feature introduced
    in SQL Server 2016 and acts like a flight recorder for your query workload, logging
    query statement, performance, and resource utilization.


    In this chapter, we will look at the sources which capture wait statistics mentioned
    in the previous paragraphs, starting with the DMVs. Because the Query Store feature
    has such a big impact on troubleshooting and analyzing query performance, including
    wait statistics, we will take a thorough look at it in Chapter [3](#340881_3_En_3_Chapter.xhtml),
    “The Query Store.”


    ## sys.dm_os_wait_stats


    The sys.dm_os_wait_stats DMV is one of the most important DMVs regarding wait
    statistics. This DMV is the replacement for the DBCC SQLPERF(''WAITSTATS'') command
    in use before SQL Server 2005\. All the information returned from the DBCC SQLPERF(''WAITSTATS'')
    command is included in the sys.dm_os_wait_stats DMV, plus a little bit more.


    The **sys.dm_os_wait_stats** DMV shows the total amount of wait time for every
    wait type since the SQL Server instance was started. It is cumulative, adding
    wait time to the different wait types, resulting in an ever-increasing total.
    Querying the sys.dm_os_wait_stats DMV provides insight into what the query requests
    were waiting for. This is helpful if you are looking for the grand total of wait
    time for every wait type, but many times you are interested in the wait time for
    a specific time segment, or query. In this case, it is possible to reset the sys.dm_os_wait_stats
    DMV without having to restart SQL Server by using the following command:


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    ```


    This will reset wait statistics information back to 0 again, meaning you lose
    all information before the reset. In Chapter [4](#340881_3_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” we will examine a method which will not completely
    reset the sys.dm_os_wait_stats counters.


    As with every DMV in SQL Server, we execute a query against the sys.dm_os_wait_stats
    DMV as if it were a table, in this case:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats;

    ```


    The results of this query are shown in Figure [2-1](#340881_3_En_2_Chapter.xhtml#Fig1).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig1_HTML.png)


    A screenshot of sys dot d m underscore o s underscore wait underscore stats query
    output. The tabular output has 6 columns and 12 rows. The columns list the wait
    type, tasks, and timings.


    Figure 2-1


    sys.dm_os_wait_stats


    Following are the available columns in the sys.dm_os_wait_stats DMV, along with
    a description of what the column represents:


    *   **wait_type** – The name of the wait type. The sys.dm_os_wait_stats will return
    one row for every wait type possible for the specific SQL Server installation.


    *   **waiting_tasks_count** – The count of how many times a worker thread had
    to wait for that specific wait type.


    *   **wait_time_ms** – The total wait time in milliseconds for the specific wait
    type since the start of the SQL Server instance or a manual reset. This is the
    time a worker thread has spent in the Waiter List in the “SUSPENDED” state. It
    also includes the time the worker thread spent in the Runnable Queue in the “RUNNABLE”
    state while waiting for the scheduler to grant it processor time.


    *   **max_wait_time_ms** – The maximum wait time in milliseconds a worker thread
    waited on the specific wait type.


    *   **signal_wait_time_ms** – The amount of time in milliseconds the worker thread
    spent in Runnable Queue waiting for an available processor.


    Nerd Note


    Signal wait times are unavoidable and normal in systems where a large number of
    queries are being processed, all of them requesting time on the processor. The
    signal wait time is also an important metric for detecting CPU pressure. Generally
    speaking, depending on the hardware of your system, seeing signal wait time metrics
    higher than 15% of the total wait time **MIGHT** indicate CPU pressure, because
    the worker threads are waiting for a processor to become available.


    You may have noticed the sys.dm_os_wait_stats DMV does not return a column for
    the resource wait time. If we want to display the resource wait time as an additional
    column, we will need to calculate the value ourselves.


    Listing [2-1](#340881_3_En_2_Chapter.xhtml#PC3) shows a query to analyze the sys.dm_os_wait_stats
    DMV. Besides the regular columns, it will add two more columns for every wait
    type returned, the resource wait time and the average wait time.'
  trans: '

    # 2. 查询 SQL Server 等待统计信息


    ## 摘要


    在本章中，我们回顾了不同版本 SQL Server 中等待统计信息的历史。随着 SQL Server 2005 中 SQLOS 的引入，SQL Server
    处理请求的方式发生了很大变化，引入了调度器、工作线程和任务。所有这些不同部分的信息都存储在动态管理视图（DMV）或动态管理函数（DMF）中，它们易于查询，并返回大量关于
    SQL Server 内部运行的信息。


    通过使用这些 DMV，我们可以查看请求在 SQL Server 调度器处理过程中的进度，并了解它们是否在等待任何特定资源。请求所等待的资源以及它们等待这些资源所花费的时间被记录为等待统计信息，这也是本书的主要主题。


    随着 SQL Server 2005 中动态管理视图（DMV）和动态管理函数（DMF）的引入，查看和分析等待统计信息变得更加容易和省力。在 SQL Server
    2005 之前的版本中，用户只能通过 `DBCC SQLPERF(''WAITSSTATS'')` 命令来查看等待统计信息。如今，有多种 DMV 可以返回与等待统计信息相关的信息，在本章中，我们将详细查看四个最有用的
    DMV：`sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests` 和
    `sys.dm_exec_session_wait_stats`。


    查看等待统计信息不仅限于 DMV。我们还可以使用性能监视器（Performance Monitor，或 Perfmon）来查看等待统计信息。


    SQL Server 2008 引入了另一个查看等待统计信息的选项：扩展事件（Extended Events）。在 SQL Server 2008 中，扩展事件使用起来很困难（您必须用
    T-SQL 编写整个扩展事件会话），但 Microsoft 在后续版本中极大地改进了扩展事件，使其更加用户友好且易于使用。


    SQL Server 2016 SP1 引入了两种访问等待统计信息的新方法：通过一个名为 `sys.dm_exec_session_wait_stats`
    的新 DMV，以及在执行计划中按查询为基础添加等待统计信息。


    在 SQL Server 2017 中，Microsoft 通过将等待统计信息包含在查询存储（Query Store）中，进一步推进了记录等待统计信息的功能。查询存储是
    SQL Server 2016 中引入的一项功能，它就像您查询工作负载的飞行记录器，记录查询语句、性能和资源利用情况。


    在本章中，我们将查看上文提到的捕获等待统计信息的来源，从 DMV 开始。由于查询存储功能对故障排除和分析查询性能（包括等待统计信息）有重大影响，我们将在第
    3 章“查询存储”中对其进行深入探讨。


    ### sys.dm_os_wait_stats


    `sys.dm_os_wait_stats` DMV 是关于等待统计信息最重要的 DMV 之一。这个 DMV 是 SQL Server 2005 之前使用的
    `DBCC SQLPERF(''WAITSTATS'')` 命令的替代品。`DBCC SQLPERF(''WAITSTATS'')` 命令返回的所有信息都包含在
    `sys.dm_os_wait_stats` DMV 中，甚至还多一些。


    `sys.dm_os_wait_stats` DMV 显示自 SQL Server 实例启动以来，每个等待类型的总等待时间。它是累积性的，将等待时间添加到不同的等待类型中，导致总数不断增加。查询
    `sys.dm_os_wait_stats` DMV 可以深入了解查询请求在等待什么。如果您想查看每个等待类型的总等待时间，这很有帮助，但很多时候您可能对特定时间段或查询的等待时间感兴趣。在这种情况下，可以使用以下命令重置
    `sys.dm_os_wait_stats` DMV，而无需重启 SQL Server：


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    ```


    这将把等待统计信息重置回 0，这意味着您会丢失重置之前的所有信息。在第 4 章“建立可靠的基线”中，我们将研究一种不会完全重置 `sys.dm_os_wait_stats`
    计数器的方法。


    与 SQL Server 中的每个 DMV 一样，我们像查询表一样对 `sys.dm_os_wait_stats` DMV 执行查询，例如：


    ```

    SELECT *

    FROM sys.dm_os_wait_stats;

    ```


    此查询的结果如图 2-1 所示。


    ![](img/340881_3_En_2_Fig1_HTML.png)


    图 2-1: sys.dm_os_wait_stats


    以下是 `sys.dm_os_wait_stats` DMV 中可用的列，以及每列所代表含义的描述：


    *   `wait_type` – 等待类型的名称。`sys.dm_os_wait_stats` 会为特定 SQL Server 安装中可能的每个等待类型返回一行。

    *   `waiting_tasks_count` – 工作线程必须等待该特定等待类型的次数计数。

    *   `wait_time_ms` – 自 SQL Server 实例启动或上次手动重置以来，该特定等待类型的总等待时间（以毫秒为单位）。这是工作线程在“SUSPENDED”状态（挂起状态）下处于等待者列表（Waiter
    List）中所花费的时间。它还包括工作线程在“RUNNABLE”状态（可运行状态）下处于可运行队列（Runnable Queue）中，等待调度器授予其处理器时间所花费的时间。

    *   `max_wait_time_ms` – 工作线程在该特定等待类型上等待的最长时间（以毫秒为单位）。

    *   `signal_wait_time_ms` – 工作线程在可运行队列中等待可用处理器所花费的时间（以毫秒为单位）。


    **极客注**


    在处理大量查询、所有查询都请求处理器时间的系统中，信号等待时间（Signal wait time）是不可避免且正常的。信号等待时间也是检测 CPU 压力的一个重要指标。一般来说，根据您系统的硬件情况，看到信号等待时间指标超过总等待时间的
    **15%** **可能**表明存在 CPU 压力，因为工作线程正在等待处理器变为可用状态。


    您可能已经注意到 `sys.dm_os_wait_stats` DMV 没有返回资源等待时间（resource wait time）的列。如果我们想将资源等待时间作为附加列显示，我们需要自己计算这个值。


    列表 2-1 展示了一个用于分析 `sys.dm_os_wait_stats` DMV 的查询。除了常规列之外，它还将为返回的每个等待类型添加两列：资源等待时间和平均等待时间。

    '
- fmt: "# 监控SQL Server等待统计信息\n\n## 列出等待统计信息\n\n查询`sys.dm_os_wait_stats`可获取更详细的等待信息：\n\
    \n```sql\nSELECT  wait_type AS 'Wait Type',\n        waiting_tasks_count AS 'Waiting\
    \ Tasks Count',\n        (wait_time_ms - signal_wait_time_ms) AS 'Resource Wait\
    \ Time',\n        signal_wait_time_ms AS 'Signal Wait Time',\n        wait_time_ms\
    \ AS 'Total Wait Time',\n        COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0),\
    \ 0) AS 'Average Wait Time'\nFROM sys.dm_os_wait_stats;\n```\n*Listing 2-1*\n\
    *sys.dm_os_wait_stats with additional information*\n\n此查询返回的结果类似于图2-2所示。\n\n![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig2_HTML.png)\n\
    *图 2-2*\n*sys.dm_os_wait_stats expanded with more wait information*\n\n通过同时获取特定等待类型的出现次数和总等待时间，可以计算平均等待时间（如图2-2中的`Average\
    \ Wait Time`列所示），计算方法是将`wait_time_ms`值除以`waiting_tasks_count`值。\n\n`sys.dm_os_wait_stats`是一个强大的DMV，包含关于不同等待类型的信息。它将作为第4章“构建可靠基线”中概述的等待统计信息基线方法的基础。\n\
    \n## sys.dm_os_waiting_tasks\n\n虽然`sys.dm_os_wait_stats` DMV提供累积的等待统计信息，但**sys.dm_os_waiting_tasks**\
    \ DMV提供有关SQL Server实例等待队列的信息。查询此DMV可以概览所有工作线程正在等待列表或可运行队列中等待资源或处理器时间的任务。\n\n###\
    \ 理解sys.dm_os_waiting_tasks\n\n由于`sys.dm_os_waiting_tasks` DMV显示当前正在等待的任务，因此它通常是审查SQL\
    \ Server实例性能的第一个DMV。它还提供了某些等待类型的附加信息，在故障排除时非常有用。\n\n图2-3显示了以下查询的结果：\n\n![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig3_HTML.png)\n\
    *图 2-3*\n*sys.dm_os_waiting_tasks*\n\n```sql\nSELECT *\nFROM sys.dm_os_waiting_tasks;\n\
    ```\n\n以下是`sys.dm_os_waiting_tasks` DMV返回的列列表及其返回信息的描述：\n\n*   `waiting_task_address`\
    \ – 当前等待的任务地址。\n*   `session_id` – 与特定任务关联的会话ID。\n*   `exec_context_id` – 执行上下文的ID。只有当任务使用并行性（任务使用多个线程而不是单个线程）执行时，此值才会从默认值0更改。\n\
    *   `wait_duration_ms` – 任务已等待的时间（毫秒）。与`sys.dm_os_wait_stats` DMV一样，此时间包括资源等待时间和信号等待时间。\n\
    *   `wait_type` – 任务当前正在等待的等待类型。\n*   `resource_address` – 有关我们当前正在等待的资源的内存地址信息。并非所有等待类型都会记录此内存地址，因此它经常作为`NULL`返回。\n\
    *   `blocking_task_address` – 当前阻塞等待任务的任务地址。当任务未被其他任务阻塞时，此列将返回`NULL`。\n*   `blocking_session_id`\
    \ – 当前阻塞任务的会话ID。与`blocking_task_address`一样，仅当此任务当前被另一个任务阻塞时才包含此信息。当没有阻塞或无法检索或识别阻塞任务的会话信息时，它将返回`NULL`。我们将在第8章“锁相关等待类型”讨论锁等待类型时解释阻塞和锁定。\n\
    *   `blocking_exec_context_id` – 另一个专门用于阻塞信息的列。在这种情况下，它将返回执行上下文的ID。仅当使用并行性执行任务且其中一个线程负责阻塞时，才会返回非`NULL`的结果。然后，`blocking_exec_context_id`可用于识别哪个线程负责阻塞。\n\
    *   `resource_description` – 有关任务正在等待的资源的附加信息。此列的等待类型不多——最常见的是并行性以及锁或闩锁相关的等待类型。在分析锁或闩锁相关的等待类型时，这是一个非常有用的列；在这些情况下，我们可以精确指出我们正在等待其可用性的数据库对象（数据页、行、表等）。本书后面的一些示例（最著名的是第8章“锁相关等待类型”和第9章“闩锁相关等待类型”）将使用此列来收集有关我们正在等待的资源的额外信息。"
  raw: '```

    SELECT  wait_type AS ''Wait Type'',

    waiting_tasks_count AS ''Waiting Tasks Count'',

    (wait_time_ms - signal_wait_time_ms) AS ''Resource Wait Time'',   signal_wait_time_ms
    AS ''Signal Wait Time'',

    wait_time_ms AS ''Total Wait Time'',

    COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0), 0) AS ''Average Wait Time''

    FROM sys.dm_os_wait_stats;

    Listing 2-1

    sys.dm_os_wait_stats with additional information

    ```


    This query will return results similar to what is shown in Figure [2-2](#340881_3_En_2_Chapter.xhtml#Fig2).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig2_HTML.png)


    A screenshot of sys dot d m underscore o s underscore wait underscore stats query
    output. The tabular output has 7 columns and 12 rows. The columns list the wait
    type, tasks, and various timings.


    Figure 2-2


    sys.dm_os_wait_stats expanded with more wait information


    Having both the number of occurrences of a specific wait type and the total wait
    time makes it possible to calculate an average wait time (represented by the Average
    Wait Time column in Figure [2-2](#340881_3_En_2_Chapter.xhtml#Fig2)) for the specific
    wait type by dividing the wait_time_ms value by the waiting_tasks_count value.


    The sys.dm_os_wait_stats is a powerful DMV containing information about the different
    wait types. It will serve as the basis for the wait statistics baseline methodology
    outlined in Chapter [4](#340881_3_En_4_Chapter.xhtml), “Building a Solid Baseline.”


    ## sys.dm_os_waiting_tasks


    While the sys.dm_os_wait_stats DMV provides cumulative wait statistics information,
    the **sys.dm_os_waiting_tasks** DMV provides information for the waiting queue
    of your SQL Server instance. Querying this DMV gives an overview of all tasks
    with worker threads waiting in either the Waiter List or Runnable Queue for either
    resource or processor time.


    ### Understanding sys.dm_os_waiting_tasks


    Because the sys.dm_os_waiting_tasks DMV shows tasks currently waiting, it is often
    the first DMV for reviewing the performance of your SQL Server instance. It also
    supplies additional information for certain wait types which are useful while
    troubleshooting.


    Figure [2-3](#340881_3_En_2_Chapter.xhtml#Fig3) shows the results of the following
    query:


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig3_HTML.png)


    A screenshot of sys dot d m underscore o s underscore waiting for underscore tasks
    query output. The tabular output has 8 columns and 12 rows. The last 2 address
    columns are shaded for null output.


    Figure 2-3


    sys.dm_os_waiting_tasks


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks;

    ```


    Following is a list of columns returned by the sys.dm_os_waiting_tasks DMV and
    a description of the information they return:


    *   **waiting_task_address** – The address of the task currently waiting.


    *   **session_id** – The ID of the session associated with the specific task.


    *   **exec_context_id** – The ID of the execution context. This value will only
    change from the default of 0 if the task is being performed using parallelism
    (the task is using multiple threads instead of a single thread).


    *   **wait_duration_ms** – The time in milliseconds the task has been waiting.
    Just like in the sys.dm_os_wait_stats DMV, this time includes both the resource
    wait time and the signal wait time.


    *   **wait_type** – The wait type the task is currently waiting on.


    *   **resource_address** – The memory address information about the resource we
    are currently waiting for. Not all wait types will log this memory address, so
    it will frequently be returned as NULL.


    *   **blocking_task_address** – The address of the task currently blocking the
    waiting task. When the task is not being blocked by another task, this column
    will return NULL.


    *   **blocking_session_id** – The session ID of the session currently blocking
    the task. Just like the blocking_task_address, this information is only included
    when this task is being currently blocked by another task. It will return NULL
    when there is no blocking or when the session information about the blocking task
    cannot be retrieved or identified. We will explain blocking and locking in Chapter
    [8](#340881_3_En_8_Chapter.xhtml), “Lock-Related Wait Types,” when we discuss
    lock wait types.


    *   **blocking_exec_context_id** – Another column dedicated to information regarding
    blocking. In this case, it will return the ID of the execution context. This will
    only return a result other than NULL when a task gets executed using parallelism
    and one of the threads is responsible for the block. The blocking_exec_context_id
    can then be used to identify which one of the threads is responsible for the block.


    *   **resource_description** – Additional information about the resource the task
    is waiting for. There aren’t many wait types for this column – most often parallelism
    and lock- or latch-related wait types. It is a very useful column when analyzing
    lock- or latch-related wait types; in those cases, we pinpoint the database object
    (data page, row, table, etc.) whose availability we are waiting for. Some of the
    examples later in this book (most notably Chapter [8](#340881_3_En_8_Chapter.xhtml),
    “Lock-Related Wait Types,” and Chapter [9](#340881_3_En_9_Chapter.xhtml), “Latch-Related
    Wait Types”) will make use of this column to gather extra information about the
    resource we are waiting for.'
  trans: "# 监控 SQL Server 等待统计信息\n\n## 列出等待统计信息\n\n查询`sys.dm_os_wait_stats`可获取更详细的等待信息：\n\
    \n```sql\nSELECT  wait_type AS 'Wait Type',\n        waiting_tasks_count AS 'Waiting\
    \ Tasks Count',\n        (wait_time_ms - signal_wait_time_ms) AS 'Resource Wait\
    \ Time',\n        signal_wait_time_ms AS 'Signal Wait Time',\n        wait_time_ms\
    \ AS 'Total Wait Time',\n        COALESCE(wait_time_ms / NULLIF(waiting_tasks_count,0),\
    \ 0) AS 'Average Wait Time'\nFROM sys.dm_os_wait_stats;\n```\n*清单 2-1*\n*包含附加信息的\
    \ sys.dm_os_wait_stats*\n\n此查询返回的结果类似于图 2-2 所示。\n\n![](img/340881_3_En_2_Fig2_HTML.png)\n\
    *图 2-2*\n*扩展了更多等待信息的 sys.dm_os_wait_stats*\n\n通过同时获取特定等待类型的出现次数和总等待时间，可以计算平均等待时间（如图\
    \ 2-2 中的`Average Wait Time`列所示），计算方法是将`wait_time_ms`值除以`waiting_tasks_count`值。\n\
    \n`sys.dm_os_wait_stats`是一个强大的 DMV，包含关于不同等待类型的信息。它将作为第 4 章“构建可靠基线”中概述的等待统计信息基线方法的基础。\n\
    \n## sys.dm_os_waiting_tasks\n\n虽然`sys.dm_os_wait_stats` DMV 提供累积的等待统计信息，但**sys.dm_os_waiting_tasks**\
    \ DMV 提供有关 SQL Server 实例等待队列的信息。查询此 DMV 可以概览所有工作线程正在等待列表或可运行队列中等待资源或处理器时间的任务。\n\
    \n### 理解 sys.dm_os_waiting_tasks\n\n由于`sys.dm_os_waiting_tasks` DMV 显示当前正在等待的任务，因此它通常是审查\
    \ SQL Server 实例性能的第一个 DMV。它还提供了某些等待类型的附加信息，在故障排除时非常有用。\n\n图 2-3 显示了以下查询的结果：\n\n\
    ![](img/340881_3_En_2_Fig3_HTML.png)\n*图 2-3*\n*sys.dm_os_waiting_tasks*\n\n```sql\n\
    SELECT *\nFROM sys.dm_os_waiting_tasks;\n```\n\n以下是`sys.dm_os_waiting_tasks` DMV\
    \ 返回的列列表及其返回信息的描述：\n\n*   `waiting_task_address` – 当前等待的任务地址。\n*   `session_id`\
    \ – 与特定任务关联的会话 ID。\n*   `exec_context_id` – 执行上下文的 ID。只有当任务使用并行性（任务使用多个线程而不是单个线程）执行时，此值才会从默认值\
    \ 0 更改。\n*   `wait_duration_ms` – 任务已等待的时间（毫秒）。与`sys.dm_os_wait_stats` DMV 一样，此时间包括资源等待时间和信号等待时间。\n\
    *   `wait_type` – 任务当前正在等待的等待类型。\n*   `resource_address` – 有关我们当前正在等待的资源的内存地址信息。并非所有等待类型都会记录此内存地址，因此它经常作为`NULL`返回。\n\
    *   `blocking_task_address` – 当前阻塞等待任务的任务地址。当任务未被其他任务阻塞时，此列将返回`NULL`。\n*   `blocking_session_id`\
    \ – 当前阻塞任务的会话 ID。与`blocking_task_address`一样，仅当此任务当前被另一个任务阻塞时才包含此信息。当没有阻塞或无法检索或识别阻塞任务的会话信息时，它将返回`NULL`。我们将在第\
    \ 8 章“锁相关等待类型”讨论锁等待类型时解释阻塞和锁定。\n*   `blocking_exec_context_id` – 另一个专门用于阻塞信息的列。在这种情况下，它将返回执行上下文的\
    \ ID。仅当使用并行性执行任务且其中一个线程负责阻塞时，才会返回非`NULL`的结果。然后，`blocking_exec_context_id`可用于识别哪个线程负责阻塞。\n\
    *   `resource_description` – 有关任务正在等待的资源的附加信息。此列的等待类型不多——最常见的是并行性以及锁或闩锁相关的等待类型。在分析锁或闩锁相关的等待类型时，这是一个非常有用的列；在这些情况下，我们可以精确指出我们正在等待其可用性的数据库对象（数据页、行、表等）。本书后面的一些示例（最著名的是第\
    \ 8 章“锁相关等待类型”和第 9 章“闩锁相关等待类型”）将使用此列来收集有关我们正在等待的资源的额外信息。"
- fmt: '### Querying `sys.dm_os_waiting_tasks`


    因为 `sys.dm_os_waiting_tasks` DMV 返回了丰富的信息，根据您想要分析或排查的问题，有各种不同的利用方式。


    互联网上的各种论坛中可以找到以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    此查询旨在过滤掉 SQL Server 内部会话 ID，并返回源自用户会话的等待任务。如第 [1](#340881_3_En_1_Chapter.xhtml)
    章“等待统计信息内幕”所述，我们了解到为了识别用户会话的目的，不应该通过 `session_id` 进行过滤。在我的测试 SQL Server 上，此查询的结果如图
    [2-4](#340881_3_En_2_Chapter.xhtml#Fig4) 所示。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig4_HTML.png)


    `sys.dm_os_waiting_tasks` 查询的输出截图。表格输出有 8 列和 1 行。对于会话 ID 54，等待任务地址被突出显示。


    图 2-4

    `sys.dm_os_waiting_tasks`，其中 `session_id` 大于 50


    虽然这种过滤掉 SQL Server 内部进程的方法对于许多等待类型似乎效果良好，并提高了可读性，但在运行此查询时，某些特定的等待类型不会被返回。


    一个例子是 `THREADPOOL` 等待类型，我们将在第 [5](#340881_3_En_5_Chapter.xhtml) 章“与 CPU 相关的等待类型”中讨论。这种等待类型通常对
    SQL Server 的性能有很大的负面影响，但如果您只过滤用户会话，它将不会被返回。这会影响您的分析，因为您会遗漏重要的事实！


    另一个不应该通过会话 ID 过滤的原因是对会话 ID 与会话是用户还是内部会话之间关系的误解。不能保证大于 50 的会话 ID 就是用户会话。SQL Server
    完全有可能拥有超过 50 个内部会话，在这种情况下，您有可能会误将内部会话当作用户会话。


    我认为查询 `sys.dm_os_waiting_tasks` DMV 的最佳方式是选择所有内容，并在查找特定等待类型或会话时应用过滤器。与过滤 `session_id`
    大于 50 相比，这将返回更多的行，如图 [2-5](#340881_3_En_2_Chapter.xhtml#Fig5) 所示，但它展示了完整的画面，并最大限度地降低了您可能错过重要等待类型的机会。一个好主意是按
    `session_id` 列排序，使结果更易读，同时也不会忽视内部会话。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig5_HTML.png)


    `sys.dm_os_waiting_tasks` 查询的输出截图。表格输出有 8 列和 12 行。最后 2 列中的 null 输出被突出显示。


    图 2-5

    `sys.dm_os_waiting_tasks`


    ## `sys.dm_exec_requests`


    `sys.dm_exec_requests` DMV 返回有关当前在 SQL Server 引擎内执行的每个请求的信息。


    ### Understanding `sys.dm_exec_requests`


    与之前的 DMV 类似，我们按如下方式查询 `sys.dm_exec_requests`：


    ```sql

    SELECT *

    FROM sys.dm_exec_requests;

    ```


    这将返回当前正在执行的每一个查询请求。图 [2-6](#340881_3_En_2_Chapter.xhtml#Fig6) 显示了我的测试 SQL Server
    上的部分结果。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig6_HTML.png)


    `sys.dm_exec_requests` 查询的输出截图。表格输出有 8 列和 13 行。最后 2 列中的 null 输出被突出显示。


    图 2-6

    `sys.dm_exec_requests`


    `sys.dm_exec_requests` DMV 返回的列比前面讨论的 `sys.dm_os_wait_stats` 或 `sys.dm_os_waiting_tasks`
    DMV 更多。为了保持可读性，我将只描述常用于等待统计信息分析的列。以下是我的列表：


    *   `session_id` – 此请求所属会话的 ID。

    *   `start_time` – 请求到达的日期和时间。对于长时间运行的查询，这可能与您查询 DMV 的时间不同。

    *   `command` – 请求正在执行的操作。最常见的命令与查询相关，如 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，但根据请求的不同，还有更多命令。

    *   `sql_handle` – 在请求中执行的批处理或存储过程的哈希值。并非所有请求都有句柄，通常只有当请求是由用户会话发起并且涉及查询时，您才会看到句柄。`sql_handle`
    哈希被用作 `sys.dm_exec_sql_text` 动态管理函数 (DMF) 的输入，以检索查询文本。

    *   `plan_handle` – 执行计划的哈希值。执行计划将向您展示 SQL Server 在执行查询时执行的操作，是查询执行信息的绝佳来源。我们使用
    `plan_handle` 的方式与 `sql_handle` 相同，作为 `sys.dm_exec_query_plan` DMF 的输入，以返回查询的执行计划。

    *   `wait_type` – 如果请求处于“SUSPENDED”或“RUNNABLE”状态，则为当前的等待类型。当请求当前正在运行（即未等待）时，此值将为
    `NULL`。

    *   `last_wait_type` – 如果请求在执行期间等待过，则为它遇到的上一个等待类型。

    *   `total_elapsed_time` – 自请求到达以来的总时间（毫秒）。


    此 DMV 中还有更多可用的列，并且都有各自的用途。完整的描述可在 Microsoft MSDN 页面 [`https://slrwnds.com/f6glon`](https://slrwnds.com/f6glon)
    上找到，我鼓励您阅读该文章。`sys.dm_exec_requests` DMV 是您 DBA 工具包中的一个很棒的工具，也是除了分析等待统计信息之外，您将经常用于各种目的的
    DMV 之一。'
  raw: '### Querying sys.dm_os_waiting_tasks


    Because the sys.dm_os_waiting_tasks DMV returns a wealth of information, there
    are various ways to utilize it depending on what you want to analyze or troubleshoot.


    One query found on various forums on the Internet is the following:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    This query intends to filter out SQL Server internal session IDs and return waiting
    tasks that originate from user sessions. As mentioned in Chapter [1](#340881_3_En_1_Chapter.xhtml),
    “Wait Statistics Internals,” we learned you should not filter by session_id for
    the purpose of identifying user sessions. The results of the query on my test
    SQL Server are shown in Figure [2-4](#340881_3_En_2_Chapter.xhtml#Fig4).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig4_HTML.png)


    A screenshot of the output for sys dot d m underscore o s underscore wait underscore
    tasks query. The tabular output has 8 columns and 1 row. The waiting task address
    is shaded for session I D 54.


    Figure 2-4


    sys.dm_os_waiting_tasks where session_id is greater than 50


    While the method of filtering out internal SQL Server processes appears to work
    fine for many wait types and improves readability, there are specific wait types
    which will not be returned when running this query.


    One example of this is the THREADPOOL wait type, which we will discuss in Chapter
    [5](#340881_3_En_5_Chapter.xhtml), “CPU-Related Wait Types.” This wait type often
    has a large negative impact on the performance of your SQL Server but is not returned
    if you filter for only user sessions. This will impact your analysis because you
    are missing important facts!


    Another reason to not filter on session IDs is the misconception about the relation
    of the session ID and whether or not the session ID is a user or internal session.
    There is no guarantee a session ID larger than 50 is a user session. It is possible
    for SQL Server to have more than 50 internal sessions, in which case there is
    a chance you will mistake an internal session for a user session.


    I believe the best way to query the sys.dm_os_waiting_tasks DMV is by selecting
    everything and applying a filter when looking for a specific wait type or session.
    This will return more rows than filtering by session IDs larger than 50, as you
    can see in Figure [2-5](#340881_3_En_2_Chapter.xhtml#Fig5), but it shows the complete
    picture and minimizes the chance you might miss important wait types. A good idea
    is to sort on the session_id column to make the results more readable without
    losing sight of the internal sessions.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig5_HTML.png)


    A screenshot of the output for sys dot d m underscore o s underscore wait underscore
    tasks query. The tabular output has 8 columns and 12 rows. The null outputs in
    the last 2 columns are shaded.


    Figure 2-5


    sys.dm_os_waiting_tasks


    ## sys.dm_exec_requests


    The **sys.dm_exec_requests** DMV returns information about each request currently
    executing inside the SQL Server engine.


    ### Understanding sys.dm_exec_requests


    Like the previous DMVs, we query **sys.dm_exec_requests** with the following:


    ```

    SELECT *

    FROM sys.dm_exec_requests;

    ```


    This returns every query request currently executing. Figure [2-6](#340881_3_En_2_Chapter.xhtml#Fig6)
    shows a small portion of the results on my test SQL Server.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig6_HTML.png)


    A screenshot of the output for sys dot d m underscore exec underscore requests
    query. The tabular output has 8 columns and 13 rows. The null outputs in the last
    2 columns are shaded.


    Figure 2-6


    sys.dm_exec_requests


    The sys.dm_exec_requests DMV returns more columns than the sys.dm_os_wait_stats
    or sys.dm_os_waiting_tasks DMVs discussed earlier. To keep things readable, I
    will describe only the columns frequently used for wait statistics analysis. Here
    is my list:


    *   **session_id** – The ID of the session this request is associated with.


    *   **start_time** – The date and time the request arrived. This can be different
    from when you query the DMV, especially with long-running queries.


    *   **command** – The action the request is performing. The most common commands
    are query related, like SELECT, INSERT, UPDATE, and DELETE, but there are more
    commands depending on the request.


    *   **sql_handle** – The hash value of the batch or stored procedure executed
    in the request. Not all requests have a handle, and generally you will only see
    a handle if the request was initiated by a user session and a query is involved.
    The sql_handle hash is used as input for the sys.dm_exec_sql_text Dynamic Management
    Function (DMF) to retrieve the query text.


    *   **plan_handle** – The hash value of the execution plan. An execution plan
    will show you the operations performed by SQL Server when executing the query
    and is a great source of query execution information. We use plan_handle the same
    way as the sql_handle, as input for the sys.dm_exec_query_plan DMF to return the
    execution plan of the query.


    *   **wait_type** – The current wait type if the request is in either the “SUSPENDED”
    or “RUNNABLE” state. This value will be NULL when the request is currently running
    (i.e., when it is not waiting).


    *   **last_wait_type** – The last wait type the request encountered if it waited
    during execution.


    *   **total_elapsed_time** – The total time, in milliseconds, since the request
    arrived.


    There are more columns available in this DMV, and all have their different uses.
    A complete description is available on the Microsoft MSDN page at [`https://slrwnds.com/f6glon`](https://slrwnds.com/f6glon),
    and I encourage you to read the article. The sys.dm_exec_requests DMV is a great
    tool in your DBA toolkit and is one of those DMVs you will use frequently for
    all kinds of purposes besides analyzing wait statistics.'
