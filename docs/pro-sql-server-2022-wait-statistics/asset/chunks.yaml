  trans: '

    # BACKUPBUFFER 摘要


    BACKUPBUFFER 等待通常在备份或还原操作期间发生，当备份/还原操作需要等待可用缓冲区再次变为可用时出现。由于这是正常现象，因此不必担心。我们确实有一些选项可以降低
    `BACKUPIO` 等待时间，这也将影响备份/还原操作的持续时间。不过，这些参数应进行彻底配置和测试，因为设置得过高可能导致内存不足错误。


    # BACKUPIO


    就像 `BACKUPBUFFER` 等待类型一样，`BACKUPIO` 等待类型在备份或还原操作的某部分遇到争用问题时发生。有趣的是，在联机丛书中，`BACKUPIO`
    等待类型的描述与 `BACKUPBUFFER` 完全相同：“在备份任务等待数据，或等待用于存储数据的缓冲区时发生。此类型并不常见，除非任务正在等待磁带装载。”
    相同的描述对应两个不同的等待事件，这**完全不会令人困惑**。同样，这种等待类型在执行备份或还原操作时很常见，即使备份目标或还原源不是磁带设备。


    ## 什么是 BACKUPIO 等待类型？


    为了更好地理解 `BACKUPIO` 等待是如何产生的，我们必须查看图 7-5（之前作为图 7-1 展示过）。


    ![一个缓冲操作示意图，包含源、读取器、已填充和空的缓冲区、写入器以及目标。](img/340881_3_En_7_Fig5_HTML.png)

    图 7-5：备份操作的内部原理


    在上一节讨论 `BACKUPBUFFER` 等待类型时，我们解释了 `BACKUPBUFFER` 等待类型发生在等待空闲（空）缓冲区变为可用时。在很大程度上，`BACKUPBUFFER`
    等待类型位于图 7-5 的左侧，即读取器处。而 `BACKUPIO` 等待类型主要发生在图 7-5 的右侧，即写入器部分。当 `BACKUPIO` 等待发生时，意味着写入器写入数据的时间出现了延迟。这种延迟可能由多种原因引起，例如，将备份写入慢速磁盘、将备份写入网络位置或正在还原数据库时。


    在执行数据库备份或还原时，`BACKUPIO` 等待类型通常会与 `ASYNC_IO_COMPLETION` 等待同时出现。


    ## BACKUPIO 示例


    我们将使用与演示 `BACKUPBUFFER` 等待类型时相同的示例。我修改了查询以返回 `BACKUPIO` 等待而非 `BACKUPBUFFER` 等待，并且在对
    `sys.dm_os_wait_stats` DMV 的查询结果中包含了 `ASYNC_IO_COMPLETION`。代码清单 7-4 显示了修改后的备份查询。


    ```sql

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 备份数据库

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'';

    -- 查询 BACKUPIO 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPIO''

    OR wait_type = ''ASYNC_IO_COMPLETION'';

    ```

    代码清单 7-4：生成 `BACKUPIO` 等待


    对 `sys.dm_os_wait_stats` DMV 的查询结果如图 7-6 所示。


    ![一个表格，包含五列：等待类型、等待任务数、等待时间(ms)、最大等待时间(ms) 和信号等待时间(ms)。它有两行：异步 I/O 完成和备份 I/O。](img/340881_3_En_7_Fig6_HTML.png)

    图 7-6：`ASYNC_IO_COMPLETION` 和 `BACKUPIO` 等待


    如图 7-6 所示，数据库备份导致产生了两种等待类型，大部分时间花费在 `ASYNC_IO_COMPLETION` 等待上，该等待负责读取需要写入备份文件的数据页。由于我的备份目标在
    SSD 磁盘上，因此我们没有遇到非常高的 `BACKUPIO` 等待时间。


    ## 降低 BACKUPIO 等待


    调整 `BUFFERCOUNT` 和 `MAXTRANSFERSIZE` 选项对 `BACKUPIO` 等待类型的影响，不如对 `BACKUPBUFFER`
    等待类型的影响那么大。当你看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，问题很可能与存储子系统或你正在写入/读取备份的网络位置的吞吐量有关。请务必检查这两个位置是否存在可能的性能问题，如高延迟或高网络利用率。


    另一个可以探索的可能选项是在多个文件上进行条带化备份。条带化备份文件可能会缩短备份操作的持续时间，但可能不会降低 `BACKUPIO` 等待的总时间。


    ## BACKUPIO 摘要


    与 `BACKUPBUFFER` 等待类型类似，`BACKUPIO` 等待类型在执行备份或还原操作时发生。虽然 `BACKUPBUFFER` 等待类型主要与备份操作访问备份缓冲区的速度有关，但
    `BACKUPIO` 等待类型则与这些备份缓冲区写入磁盘的速度有关。在执行完整数据库备份或还原时，`BACKUPIO` 等待经常与 `ASYNC_IO_COMPLETION`
    等待同时出现。当看到 `BACKUPIO` 等待类型的等待时间高于正常水平时，请检查你正在写入或读取备份文件的位置的性能指标。降低 `BACKUPIO` 等待时间不会影响系统的查询性能，但会帮助加速备份和还原操作。


    # BACKUPTHREAD


    `BACKUPTHREAD` 等待类型在执行数据库还原操作时常见，但在备份操作期间也会发生。它发生在另一个线程等待备份/还原操作完成以便继续处理时。


    ## 什么是 BACKUPTHREAD 等待类型？


    当你看到 `BACKUPTHREAD` 等待发生时，意味着另一个线程想要访问一个当前正被备份或还原操作占用的资源。在线程必须等待备份/还原完成期间，系统会记录
    `BACKUPTHREAD` 等待时间。这种等待的一个例子是：一个线程需要访问正在被还原的数据库数据文件，例如，正在将数据文件写入磁盘的 `ASYNC_IO_COMPLETION`
    等待类型。


    `BACKUPTHREAD` 等待通常不是引起担忧的原因。它们仅表示其他线程正在等待备份/还原操作完成，并且其持续时间通常与你的备份或还原完成所需的时间相同。然而，它们确实提示你，如果有其他等待的等待时间高于预期，可能值得调查。


    因为一图胜千言，图 7-7 展示了 `BACKUPTHREAD` 等待类型与还原操作及其他发生的等待之间的关系。


    ![一幅插图，展示了三个线程：一个还原线程、一个备份线程和其他线程。还原线程与一个文件相连。](img/340881_3_En_7_Fig7_HTML.jpg)

    图 7-7：`BACKUPTHREAD` 与其他线程的关系


    在图 7-7 中，你可以看到 `BACKUPTHREAD` 等待的发生是因为另一个线程也想要访问当前由还原操作拥有的资源。

    '
- fmt: '# BACKUPTHREAD 等待类型


    ## 示例


    演示 `BACKUPTHREAD` 等待的一个简单方法是执行还原操作。当你执行还原时，其他进程将需要访问数据库数据文件，以将备份文件中的信息写入数据库数据文件。


    清单 7-5 展示了一个用于还原我之前在测试 SQL Server 上为 GalacticWorks 数据库创建的备份文件的脚本。


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Restore database

    USE [master]

    RESTORE DATABASE [GalacticWorks]

    FROM DISK = N''C:\TeamData\GWorks.bak''

    WITH  FILE = 1, REPLACE;

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN (''BACKUPIO'',''BACKUPTHREAD'', ''PREEMPTIVE_OS_WRITEFILEGATHER'');

    ```


    如果我们在备份运行期间查看 `sys.dm_os_waiting_tasks` DMV，我们会看到发生的等待，如图 7-8 所示，该图显示了我的测试 SQL
    Server 上等待选择的截图。


    ```

    一张表有5列，分别是：wait_type，waiting_tasks_count，wait_time_ms，max_wait_time_ms，signal_wait_time_ms。

    它有3行数据，对应BACKUPIO，BACKUPTHREAD和PREEMPTIVE_OS_WRITEFILEGATHER。

    ```

    图 7-8

    `BACKUPTHREAD` 和其他等待


    正如你在图 7-8 中所看到的，`BACKUPTHREAD` 等待类型的等待时间接近于 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型。此等待类型负责将数据写入文件系统，我们将在第
    11 章“抢占式等待类型”中深入探讨这个特定的等待类型。


    ## 降低 BACKUPTHREAD 等待


    虽然 `BACKUPTHREAD` 等待类型本身并不表示任何问题，但它与其他等待类型的结合可能是进行一些额外研究的原因。基本上，你可以用来加速备份或恢复过程的任何方法都会影响
    `BACKUPTHREAD` 的等待时间。


    一些好的起点是你可以为 `BACKUP` 和 `RESTORE` T-SQL 命令指定的 `BufferCount` 和 `MaxTransferSize`
    选项。我们在讨论 `BACKUPBUFFER` 和 `BACKUPIO` 等待类型时提到过这些设置。调整这些设置可以使你的备份和还原花费更少的时间，从而导致更低的
    `BACKUPTHREAD` 等待时间。


    另一个可以显著改善备份和还原时间的设置是我们在第 6 章“与 IO 相关的等待类型”的 `ASYNC_IO_COMPLETION` 部分讨论过的即时文件初始化选项。


    ## 总结


    `BACKUPTHREAD` 等待时间并不表示对特定资源的访问，而是表示另一个进程正在等待备份或还原操作完成。看到这种等待类型非常常见，尤其是在还原操作期间。缩短备份和还原操作的持续时间也会反映在
    `BACKUPTHREAD` 等待类型的等待时间上。你可以用来降低 `BACKUPTHREAD` 等待时间的方法之一是检查是否启用了即时文件初始化。此设置不会直接影响
    `BACKUPTHREAD` 等待类型，但它会影响其他等待类型，进而影响 `BACKUPTHREAD` 等待时间。


    # 8. 与锁相关的等待类型


    锁定是每个关系数据库或关系数据库管理系统（`RDBMS`）的基本组成部分。`SQL Server` 基于关系数据库模型，因此在访问数据时会使用锁定。尽管我们经常将锁定与性能问题联系起来，但它在确保数据在并发工作负载期间的可靠性方面起着至关重要的作用。`SQL
    Server` 或任何其他 `RDBMS` 确保数据可靠性的方式是遵循“`ACID`”属性，这些属性最初由 `Jim Gray` 在 1970 年代定义，但在
    1983 年由 `Andreas Reuter` 和 `Theo Härder` 命名。这些 `ACID` 属性被强制实施于单个操作上，我们通常将其称为*事务*。缩写
    `ACID` 包含四个特征，它们保证了事务内部数据的可靠性。以下列表描述了这些特征中的每一个：


    *   `Atomicity` – 原子性特征要求事务被视为一个单一单元，该单元要么完全失败，要么完全成功。这意味着如果事务的一部分失败，则整个事务失败，并且事务内所做的每个更改都需要回滚到事务开始前的状态。

    *   `Consistency` – 一致性特征要求事务写入数据库的数据是有效的。这意味着数据必须排除非法或错误的输入。

    *   `Isolation` – 隔离性特征要求事务对其他并发事务是隐藏的。从事务的角度来看，这意味着并发事务使数据库处于与事务顺序运行相同的状态。

    *   `Durable` – 持久性特征要求每个已提交的事务即使在发生电源故障或灾难时也保持已提交状态。


    正如你从阅读不同的 `ACID` 属性中可能猜到的那样，`SQL Server` 中的锁定与隔离性特征密切相关。


    由于本章专门讨论与锁相关的等待类型，我们不会详细介绍除隔离性之外的 `ACID` 属性。如果你有兴趣了解更多关于 `ACID` 属性和数据库理论的信息，一个好的起点是
    `Andreas Reuter` 和 `Theo Harder` 的研究论文“事务型数据库恢复原理”，该论文详细描述了 `ACID` 属性。你可以在 [`https://slrwnds.com/ba7klg`](https://slrwnds.com/ba7klg)
    找到这篇论文。


    为了更好地理解隔离性特征的工作原理，我们需要理解事务。一个事务代表与数据库的一次交互，它可能由多个操作组成，并且独立于其他事务运行。


    为了确保我们的事务不与其他并发事务冲突，`SQL Server` 使用了*锁*。这些锁确保没有其他事务同时修改你的事务正在处理的数据。例如，如果你从银行账户中提取
    100 美元，你不会希望另一次并发提取修改该金额。其他交易将等待它们的取款，直到你的交易完成。在 `SQL Server` 内部，这个过程的工作方式相同。当你从数据库请求数据时，你希望得到你请求的数据，而没有数据在被请求和返回之间被修改的风险。


    当你运行事务时，它将受到 `SQL Server` 在你访问的对象上放置的锁的保护。如果另一个事务想要与同一个对象交互，则会发生阻塞。当这种阻塞发生时，后一个事务将不得不等待，直到对象上的锁被移除。然后，该事务可以在对象上放置自己的锁并开始其交互。'
  raw: '### BACKUPTHREAD Example


    An easy way to demonstrate BACKUPTHREAD waits is by performing a restore operation.
    When you perform a restore, other processes will need to access the database data
    files to write the information from the backup file to the database data files.


    Listing [7-5](#340881_3_En_7_Chapter.xhtml#PC5) shows a script to restore a backup
    file I made earlier of the GalacticWorks database on my test SQL Server.


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Restore database

    USE [master]

    RESTORE DATABASE [GalacticWorks]

    FROM DISK = N''C:\TeamData\GWorks.bak''

    WITH  FILE = 1, REPLACE;

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN (''BACKUPIO'',''BACKUPTHREAD'', ''PREEMPTIVE_OS_WRITEFILEGATHER'');

    Listing 7-5

    Restore AdventureWorks database

    ```


    If we were to look at the sys.dm_os_waiting_tasks DMV while the backup is running,
    we see the waits occurring as shown in Figure [7-8](#340881_3_En_7_Chapter.xhtml#Fig8),
    which shows a selection of waits on my test SQL Server.


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig8_HTML.png)


    A table has 5 columns colon wait type, waiting tasks count, wait time m s, max
    wait time m s, and signal wait time m s. It has 3 rows for backup I O, backup
    thread, and preemptive O S write file gather.


    Figure 7-8


    BACKUPTHREAD and other waits


    As you see in Figure [7-8](#340881_3_En_7_Chapter.xhtml#Fig8), the wait time of
    the BACKUPTHREAD wait type is close to the PREEMPTIVE_OS_WRITEFILEGATHER wait
    type. This wait type is responsible for writing data to the file system, and we
    will dive deeper into this specific wait type in Chapter [11](#340881_3_En_11_Chapter.xhtml),
    “Preemptive Wait Types.”


    ### Lowering BACKUPTHREAD Waits


    While the BACKUPTHREAD wait type itself doesn’t indicate any problems, its combination
    with other wait types can be a reason for some additional research. Basically,
    every method you can use to speed up your backup or recovery process will have
    an impact on the BACKUPTHREAD wait time.


    Some good pointers to start with are the BufferCount and MaxTransferSize options
    that you can specify on the BACKUP and RESTORE T-SQL commands. We touched upon
    these settings when we discussed the BACKUPBUFFER and BACKUPIO wait types. Tweaking
    these settings can make your backups and restores take less time, resulting in
    lower BACKUPTHREAD wait times.


    Another setting that can dramatically improve backup and restore times is the
    instant file initialization option that we discussed in Chapter [6](#340881_3_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” in the ASYNC_IO_COMPLETION section.


    ### BACKUPTHREAD Summary


    The BACKUPTHREAD wait time doesn’t indicate access to a specific resource but
    rather indicates that another process is waiting for a backup or restore operation
    to complete. It is very common to see this wait type, especially during restore
    operations. Lowering the duration of backup and restore operations will also be
    reflected in the wait times of the BACKUPTHREAD wait type. One of the methods
    you can use to lower BACKUPTHREAD wait times is checking whether instant file
    initialization is enabled. This setting does not directly impact the BACKUPTHREAD
    wait type, but it will impact other wait types, which will in turn impact the
    BACKUPTHREAD wait time.


    # 8. Lock-Related Wait Types


    ​​Locking is a fundamental part of every relational database or Relational Database
    Management System (RDBMS). SQL Server is based on the relational database model
    and therefore utilizes locking when data is accessed. Even though we frequently
    relate locking to performance problems, it plays a vital role in making sure your
    data is reliable during concurrent workloads. The way SQL Server, or any other
    RDBMS for that matter, ensures data reliability is by following the “ACID” properties,
    which were originally defined by Jim Gray in the 1970s but received their name
    in 1983 from Andreas Reuter and Theo Härder. These ACID properties are enforced
    upon single operations, which we commonly know as *transactions*. The acronym
    ACID consists of four characteristics which guarantee data reliability inside
    transactions. The following list describes each of these characteristics:


    *   **Atomicity** – The atomicity characteristic requires transactions to be considered
    a single unit, and the unit either fails or succeeds completely. This means if
    one part of the transaction fails, the complete transaction fails, and every change
    done inside the transaction needs to be changed back to the state before the transaction
    started.


    *   **Consistency** – The consistency characteristic requires data written to
    the database by the transaction is valid. This means the data must be stripped
    of illegal or bad input.


    *   **Isolation** – The isolation characteristic requires transactions are hidden
    from other concurrent transactions. From a transaction point of view, this means
    concurrent transactions leave the database in the same state as if the transactions
    ran sequentially.


    *   **Durable** – The durable characteristic requires every committed transaction
    remains committed, even in the event of a power failure or disaster.


    As you might have guessed from reading the different ACID properties, locking
    inside SQL Server is closely related to the isolation characteristic.


    Since this chapter is dedicated to lock-related wait types, we won’t go into detail
    about ACID properties besides isolation. If you are interested in learning more
    about the ACID properties and database theory, a good place to start would be
    the “Principles of Transaction-Oriented Database Recovery” research paper by Andreas
    Reuter and Theo Harder, which describes the ACID properties in detail. You can
    find the paper here [`https://slrwnds.com/ba7klg`](https://slrwnds.com/ba7klg).


    To get a better understanding of how the isolation characteristic works, we need
    to understand transactions. A transaction represents an interaction with the database,
    it may consist of multiple actions, and it operates separate from other transactions.


    To make sure our transactions do not conflict with other concurrent transactions,
    SQL Server uses **locks**. These locks make sure no other transaction will modify
    data your transaction is processing at the same time. For example, if you make
    a $100 withdrawal from your bank account, you do not want another concurrent withdrawal
    to modify the amount. Other transactions will wait for their withdrawals until
    your transaction is completed. Inside SQL Server, this process works the same
    way. When you request data from your database, you want the data you asked for,
    without running the risk the data was modified between the time it was requested
    and the time it was returned.


    When you run your transaction, it will be protected by a lock SQL Server places
    on the object you are accessing. If another transaction wants to interact with
    the same object, a block will occur. When this block occurs, the latter transaction
    will have to wait until the lock on the object is removed. The transaction can
    then place its own lock on the object and start its interaction.'
