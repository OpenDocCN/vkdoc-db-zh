    wait time m s, max wait time m s, and more.


    Figure 13-5


    WAIT_XTP_HOST_WAIT wait information after checkpoint


    As you see in Figure [13-5](#340881_3_En_13_Chapter.xhtml#Fig5), the wait time
    in the sys.dm_os_waiting_tasks DMV is small, but the wait time in the sys.dm_os_wait_stats
    DMV has increased. Because of this behavior, I believe the WAIT_XTP_HOST_WAIT
    wait type has something to do with the offline checkpoint process related to memory-optimized
    tables.


    We verify this by going to the location of the in-memory file created in Listing
    [13-1](#340881_3_En_13_Chapter.xhtml#PC1). The interesting thing about adding
    a file to an in-memory filegroup is it will create a directory, and inside this
    directory, there is a folder with a unique ID string. If you go further down the
    directory tree, you will end up in a folder with numbered files. Figure [13-6](#340881_3_En_13_Chapter.xhtml#Fig6)
    shows a part of the contents of this folder on my test machine.


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig6_HTML.png)


    A table has four columns for name, date modified, type, and size. It has 17 rows.


    Figure 13-6


    In-memory filegroup files


    As a matter of fact, the files you are seeing here are the data and delta files
    that are associated with the memory-optimized table we created earlier.


    Since I am guessing a checkpoint would create another CFP, I checked the number
    of files in the folder before executing a CHECKPOINT, which was 18 files. I then
    executed a CHECKPOINT command and looked at the number of files again, and it
    turned out there were now 21 files after the checkpoint.


    ### WAIT_XTP_HOST_WAIT Summary


    I believe the WAIT_XTP_HOST_WAIT wait type has a clear relation to the creation
    of new checkpoint file pairs. Running a manual CHECKPOINT statement will generate
    a new CFP for memory-optimized tables. Because the WAIT_XTP_HOST_WAIT wait type
    generates wait time constantly in the background and writes it to the sys.dm_os_wait_stats
    DMV, a new CFP was created (either by manual checkpoint, when an existing CFP
    was full, or when a Merge operation occurred), I believe the WAIT_XTP_HOST_WAIT
    wait type does not directly indicate performance problems. It mostly indicates
    a new CFP has been added to the in-memory filegroup. This does not mean this is
    the only process that generates WAIT_XTP_HOST_WAIT waits, though. There can be
    other processes that can also cause the waits, but so far they only occurred whenever
    a new CFP needed to be added.


    ## WAIT_XTP_CKPT_CLOSE


    As the name suggests, the **WAIT_XTP_CKPT_CLOSE** wait type seems to be related
    to the offline checkpoint process introduced with the In-Memory OLTP feature.


    ### What Is the WAIT_XTP_CKPT_CLOSE Wait Type?


    The WAIT_XTP_CKPT_CLOSE wait type seems to be related to the offline checkpoint
    process introduced with the release of In-Memory OLTP. Analyzing the behavior
    of this wait type shows it records wait time only when a checkpoint occurs, no
    matter if it is an automatic or manual checkpoint. The wait time WAIT_XTP_CKPT_CLOSE
    represents seems to be the time it takes for the checkpoint operation to complete.
    We verify this by executing a CHECKPOINT command against the database and table
    created earlier when we discussed the WAIT_XTP_HOST_WAIT wait type. The script
    in Listing [13-2](#340881_3_En_13_Chapter.xhtml#PC3) will clear the sys.dm_os_wait_stats
    DMV, insert a few rows inside the memory-optimized table, perform a CHECKPOINT
    operation, and then query the sys.dm_os_wait_stats DMV for WAIT_XTP_CKPT_CLOSE
    wait type information.


    ```

    USE [OLTP_Test];

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert some rows

    INSERT INTO OLTP

    (RandomData1,

    RandomData2,

    ID2)

    VALUES

    (CONVERT(VARCHAR(50), NEWID()),

    CONVERT(VARCHAR(50), NEWID()),

    NEWID())

    GO 1000

    -- Perform a CHECKPOINT

    CHECKPOINT;

    -- Query sys.dm_os_wait_stats for WAIT_XTP_CKPT_CLOSE waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_CKPT_CLOSE'';

    Listing 13-2

    Generate WAIT_XTP_CKPT_CLOSE waits

    ```


    The results are seen in Figure [13-7](#340881_3_En_13_Chapter.xhtml#Fig7).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig7_HTML.jpg)


    A row has five columns for wait type as wait X T P C K P T close, waiting tasks
    count as 2, wait time m s and max wait time m s as 896, and signal wait time m
    s as 0.


    Figure 13-7


    WAIT_XTP_CKPT_CLOSE waits


    I don’t believe seeing WAIT_XTP_CKPT_CLOSE waits occur is a direct cause for concern.
    They indicate checkpoints are being performed. I can imagine a sudden spike in
    wait times for the WAIT_XTP_CKPT_CLOSE could indicate a performance issue. As
    in the previous section, performing a checkpoint against a memory-optimized table
    will result in extra CFPs created. I am guessing if the allocation of CFPs takes
    a long time, the checkpoint operation will take longer to complete as well, resulting
    in higher WAIT_XTP_CKPT_CLOSE wait times. The amount of data a checkpoint has
    to process will probably also mean higher WAIT_XTP_CKPT_CLOSE wait times. Since
    the checkpoint writes data to the storage subsystem, the performance of your storage
    will probably also impact WAIT_XTP_CKPT_CLOSE wait times.


    ### WAIT_XTP_CKPT_CLOSE Summary


    The WAIT_XTP_CKPT_CLOSE wait type seems closely related to performing checkpoint
    operations. It indicates the time a checkpoint performed against a memory-optimized
    table took to complete. I don’t believe this directly indicates performance issues,
    since it just records the time it took for the checkpoint to complete. The amount
    of work a checkpoint has to process will probably result in higher WAIT_XTP_CKPT_CLOSE
    wait times. Storage subsystem performance will probably also impact WAIT_XTP_CKPT_CLOSE
    wait times.


    ## WAIT_XTP_OFFLINE_CKPT_NEW_LOG


    The final In-Memory OLTP related wait type in this chapter is the WAIT_XTP_OFFLINE_CKPT_NEW_LOG
    wait type. This is another wait type related to the offline checkpoint process.


    ### What Is the WAIT_XTP_OFFLINE_CKPT_NEW_LOG Wait Type?


    The **WAIT_XTP_OFFLINE_CKPT_NEW_LOG** wait type appears to be a benign wait type
    recording the length of time the offline checkpoint process is waiting for work.
    This is confirmed by Books Online, which has the following definition: “occurs
    when offline checkpoint is waiting for new log records to scan.”


    As we discussed earlier in this chapter, the offline checkpoint process monitors
    the transaction log for transactions impacting memory-optimized tables, so those
    transactions are recorded in the data and delta files. This is a constantly running
    process in the background of SQL Server, which means you will see an internal
    process with the WAIT_XTP_OFFLINE_CKPT_NEW_LOG wait type when you query the sys.dm_os_waiting_tasks
    DMV, as you can see in Figure [13-8](#340881_3_En_13_Chapter.xhtml#Fig8).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig8_HTML.png)


    A table has six columns for waiting task address, session i d, exec context i
    d, wait duration m s, wait type, and resource address, along with six rows. Wait
    x t p offline c k p t new log is highlighted within a box.


    Figure 13-8


    WAIT_XTP_OFFLINE_CKPT_NEW_LOG waits inside sys.dm_os_waiting_tasks


    Unlike the WAIT_XTP_HOST_WAIT wait type which only writes wait time information
    to the sys.dm_os_wait_stats DMV when specific conditions occur, the WAIT_XTP_OFFLINE_CKPT_NEW_LOG
    wait type appears to wait for around 5 seconds, adds the wait time to the sys.dm_os_wait_stats
    DMV, and then resets the wait time in the sys.dm_os_waiting_tasks DMV again. This
    suggests that the offline checkpoint process checks for new work at an interval
    of around 5 seconds.


    Seeing this behavior makes me believe the WAIT_XTP_OFFLINE_CKPT_NEW_LOG wait type
    is harmless. It just indicates that the offline checkpoint process is waiting
    for work to arrive.'
  trans: '

    # SQL Server 内存 OLTP 相关的等待类型


    ## 2 个用于等待 XTP 主机等待的表


    它包含等待任务地址、会话 ID、执行上下文 ID、等待持续时间（毫秒）、资源地址、等待任务数、等待时间（毫秒）、最大等待时间（毫秒）等信息。


    **图 13-5**


    **检查点后的 WAIT_XTP_HOST_WAIT 等待信息**


    如图 13-5 所示，`sys.dm_os_waiting_tasks` DMV 中的等待时间很小，但 `sys.dm_os_wait_stats` DMV
    中的等待时间却增加了。基于这种行为，我认为 `WAIT_XTP_HOST_WAIT` 等待类型与内存优化表相关的离线检查点进程有关。


    我们通过访问清单 13-1 中创建的内存中文件的位置来验证这一点。向内存优化文件组添加文件的一个有趣之处是，它会创建一个目录，在该目录内，有一个具有唯一 ID
    字符串的文件夹。如果你进一步深入目录树，最终会到达一个包含编号文件的文件夹。图 13-6 显示了在我的测试机上此文件夹的部分内容。


    ![](img/340881_3_En_13_Fig6_HTML.png)


    一个表格有四列，分别是名称、修改日期、类型和大小。它有 17 行。


    **图 13-6**


    **内存优化文件组文件**


    事实上，你在这里看到的文件是与我们之前创建的内存优化表相关联的数据和增量文件。


    由于我猜测检查点会创建另一个 `CFP`，我在执行 `CHECKPOINT` 之前检查了文件夹中的文件数量，当时是 18 个文件。然后我执行了 `CHECKPOINT`
    命令，并再次查看文件数量，结果发现检查点之后现在有 21 个文件。


    ### WAIT_XTP_HOST_WAIT 摘要


    我认为 `WAIT_XTP_HOST_WAIT` 等待类型与创建新的检查点文件对有明确的关系。运行手动 `CHECKPOINT` 语句将为内存优化表生成一个新的
    `CFP`。因为 `WAIT_XTP_HOST_WAIT` 等待类型在后台持续生成等待时间并将其写入 `sys.dm_os_wait_stats` DMV，一个新
    `CFP` 被创建（无论是通过手动检查点，当现有 `CFP` 已满时，还是当发生合并操作时），我认为 `WAIT_XTP_HOST_WAIT` 等待类型并不直接表示性能问题。它主要表示一个新的
    `CFP` 已被添加到内存优化文件组。然而，这并不意味着这是产生 `WAIT_XTP_HOST_WAIT` 等待的唯一进程。可能还有其他进程也会导致这种等待，但到目前为止，它们只在需要添加新
    `CFP` 时发生。


    ## WAIT_XTP_CKPT_CLOSE


    顾名思义，`WAIT_XTP_CKPT_CLOSE` 等待类型似乎与引入内存 OLTP 功能时带来的离线检查点进程有关。


    ### WAIT_XTP_CKPT_CLOSE 等待类型是什么？


    `WAIT_XTP_CKPT_CLOSE` 等待类型似乎与随内存 OLTP 发布而引入的离线检查点进程有关。分析此等待类型的行为表明，它仅在检查点发生时记录等待时间，无论是自动还是手动检查点。`WAIT_XTP_CKPT_CLOSE`
    所代表的等待时间似乎是检查点操作完成所需的时间。我们通过对之前讨论 `WAIT_XTP_HOST_WAIT` 等待类型时创建的数据库和表执行 `CHECKPOINT`
    命令来验证这一点。清单 13-2 中的脚本将清除 `sys.dm_os_wait_stats` DMV，在内存优化表中插入几行，执行 `CHECKPOINT`
    操作，然后查询 `sys.dm_os_wait_stats` DMV 获取 `WAIT_XTP_CKPT_CLOSE` 等待类型信息。


    ```sql

    USE [OLTP_Test];

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert some rows

    INSERT INTO OLTP

    (RandomData1,

    RandomData2,

    ID2)

    VALUES

    (CONVERT(VARCHAR(50), NEWID()),

    CONVERT(VARCHAR(50), NEWID()),

    NEWID())

    GO 1000

    -- Perform a CHECKPOINT

    CHECKPOINT;

    -- Query sys.dm_os_wait_stats for WAIT_XTP_CKPT_CLOSE waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_CKPT_CLOSE'';

    ```


    **清单 13-2** 生成 `WAIT_XTP_CKPT_CLOSE` 等待


    结果见图 13-7。


    ![](img/340881_3_En_13_Fig7_HTML.jpg)


    一行有五列：等待类型为 wait X T P C K P T close，等待任务数为 2，等待时间（毫秒）和最大等待时间（毫秒）均为 896，信号等待时间（毫秒）为
    0。


    **图 13-7**


    **WAIT_XTP_CKPT_CLOSE 等待**


    我不认为看到 `WAIT_XTP_CKPT_CLOSE` 等待发生是直接需要关注的原因。它们表明检查点正在被执行。我可以想象，`WAIT_XTP_CKPT_CLOSE`
    等待时间的突然激增可能表示性能问题。如前一节所述，对内存优化表执行检查点将导致创建额外的 `CFP`。我猜测，如果 `CFP` 的分配花费了很长时间，检查点操作完成的时间也会更长，从而导致更高的
    `WAIT_XTP_CKPT_CLOSE` 等待时间。检查点需要处理的数据量也可能意味着更高的 `WAIT_XTP_CKPT_CLOSE` 等待时间。由于检查点将数据写入存储子系统，你的存储性能也可能影响
    `WAIT_XTP_CKPT_CLOSE` 等待时间。


    ### WAIT_XTP_CKPT_CLOSE 摘要


    `WAIT_XTP_CKPT_CLOSE` 等待类型似乎与执行检查点操作密切相关。它表示针对内存优化表执行的检查点完成所需的时间。我不认为这直接表明性能问题，因为它只记录了检查点完成所需的时间。检查点需要处理的工作量可能会导致更高的
    `WAIT_XTP_CKPT_CLOSE` 等待时间。存储子系统的性能也可能影响 `WAIT_XTP_CKPT_CLOSE` 等待时间。


    ## WAIT_XTP_OFFLINE_CKPT_NEW_LOG


    本章最后一个与内存 OLTP 相关的等待类型是 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型。这是另一个与离线检查点进程相关的等待类型。


    ### WAIT_XTP_OFFLINE_CKPT_NEW_LOG 等待类型是什么？


    `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型似乎是一种无害的等待类型，记录了离线检查点进程等待工作的时间长度。这一点在联机丛书中得到了证实，其定义如下：“当离线检查点正在等待要扫描的新日志记录时发生。”


    正如本章前面所讨论的，离线检查点进程监视影响内存优化表的事务的日志，以便这些事务被记录在数据和增量文件中。这是 SQL Server 后台中一个持续运行的过程，这意味着当你查询
    `sys.dm_os_waiting_tasks` DMV 时，你会看到一个内部进程具有 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型，如图
    13-8 所示。


    ![](img/340881_3_En_13_Fig8_HTML.png)


    一个表格有六列：等待任务地址、会话 ID、执行上下文 ID、等待持续时间（毫秒）、等待类型和资源地址，以及六行。Wait x t p offline c k
    p t new log 在一个方框内高亮显示。


    **图 13-8**


    **sys.dm_os_waiting_tasks 内部的 WAIT_XTP_OFFLINE_CKPT_NEW_LOG 等待**


    与 `WAIT_XTP_HOST_WAIT` 等待类型仅在特定条件发生时将等待时间信息写入 `sys.dm_os_wait_stats` DMV 不同，`WAIT_XTP_OFFLINE_CKPT_NEW_LOG`
    等待类型似乎等待大约 5 秒钟，将等待时间添加到 `sys.dm_os_wait_stats` DMV，然后再次重置 `sys.dm_os_waiting_tasks`
    DMV 中的等待时间。这表明离线检查点进程以大约 5 秒的间隔检查新工作。


    看到这种行为让我相信 `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型是无害的。它只是表明离线检查点进程正在等待工作到达。

    '
- fmt: '### `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` Summary


    `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` 等待类型与离线检查点进程相关，表示该进程正在等待工作到达。因为此等待类型仅表示离线检查点进程在等待工作，我认为它不表示任何性能问题，可以安全地忽略。'
