    既然我们已经讨论了锁定和阻塞的许多方面，从锁模式和层次结构到分析锁和阻塞，我们应该准备好查看 SQL Server 内部与锁相关的等待类型了。请记住，这个关于锁定和阻塞的介绍远非该主题的完整指南，因为深入探讨
    SQL Server 内部锁定和并发的工作原理本身就可以写成一本书。


    ## LCK_M_S


    第一个与锁相关的等待类型是 `LCK_M_S` 等待类型。此等待类型表示一个任务正在等待在资源上放置共享锁。例如，如果该资源当前已有一个排他锁，则共享锁任务将等待。


    ### 什么是 LCK_M_S 等待类型？


    `LCK_M_S` 等待类型表明一个任务正在或曾经等待在资源上放置共享锁。如果一个任务正在等待放置锁，我们说该任务被另一个任务“阻塞”。更常用的术语是“阻塞”，阻塞是使用锁来确保
    ACID 属性得以维护的数据库系统中自然发生的现象。这对于每个与锁相关的等待类型都适用，因为它们只会在发生阻塞情况时被记录。


    由于 `LCK_M_S` 等待类型与共享锁相关，因此当读取操作必须等待，因为我们想要读取的资源上已存在一个不兼容的锁时，它就会发生。我们等待放置共享锁的时间被记录为
    `LCK_M_S` 等待类型。


    图 8-9 展示了一个导致 `LCK_M_S` 等待发生的常见情况。在此情况下，`T1` 在一个页面上放置了一个排他锁，表示数据修改。当 `T2` 想要从同一页读取数据时，它需要放置一个共享锁，但由于排他锁和共享锁不兼容，因此发生了
    `LCK_M_S` 等待。


    ![](img/340881_3_En_8_Fig9_HTML.jpg)


    一张图示，描绘了页面如何被 `T1` 以 `X` 锁定，以及等待如何在 `T2` 处以 `LCK_M_S` 发生。


    图 8-9


    `LCK_M_S` 等待发生'
- fmt: '### LCK_M_S Example


    Creating an example of a `LCK_M_S` wait occurring is not difficult; we will create
    a block situation between a data modification query and a data read query.


    For this example, we will run the query in Listing [8-1](#340881_3_En_8_Chapter.xhtml#PC5)
    against the `GalacticWorks` database. This query will begin a transaction and
    modify a few rows but will not commit or rollback the transaction. Since we explicitly
    indicated this transaction by supplying a `BEGIN TRAN`, SQL Server will keep the
    locks in place until we explicitly execute a `COMMIT` or `ROLLBACK` command.


    ```sql

    BEGIN TRAN

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''4E0A-4F89-AD''

    WHERE SalesOrderID = ''43661'';

    ```

    Listing 8-1

    Start a modification transaction


    When we execute the query, we receive a result very quickly; in my case, 15 rows
    were updated. But like I said before, the transaction is not yet finished (committed),
    so it will remain open, leaving locks on the objects it modified.


    So far we aren’t causing any blocking, since this is the test SQL Server and no
    other queries are running. Let’s change that and create a blocking situation.


    For this, we will open a second window in SQL Server Management Studio (`SSMS`)
    and execute the query seen in Listing [8-2](#340881_3_En_8_Chapter.xhtml#PC6).
    This will perform a `SELECT` against the `Sales.SalesOrderDetail` table, the same
    table in which we are currently modifying data.


    ```sql

    SELECT *

    FROM GalacticWorks.Sales.SalesOrderDetail;

    ```

    Listing 8-2

    Select data from a table where a modification is being performed


    As soon as we run this `SELECT` query, we notice no results are returned and the
    query will keep executing. This is a typical example of a blocking operation where
    a transaction is modifying data we want to read inside another transaction.


    If we query the `sys.dm_os_waiting_tasks` DMV, we will see the `LCK_M_S` wait
    type, as shown in Figure [8-10](#340881_3_En_8_Chapter.xhtml#Fig10).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig10_HTML.png)

    A table has 8 columns titled waiting task address, session i d, execution context
    i d, wait duration milliseconds, wait type, resource address, blocking task address,
    and blocking session i d. It has entries in one row.

    Figure 8-10

    LCK_M_S wait occurring


    The only way the `LCK_M_S` wait is resolved is when the incompatible lock is removed.
    In this case, we will roll back the modification transaction started in the first
    `SSMS` window. We do this by running the `ROLLBACK` command in the same session
    window. Immediately after performing the transaction rollback, we receive the
    results the `SELECT` query asked for. Querying the `sys.dm_os_waiting_tasks` also
    showed the `LCK_M_S` wait was resolved.


    ### Lowering LCK_M_S Waits


    Seeing `LCK_M_S` waits occur does not necessarily mean something is wrong. It
    does, however, indicate blocking is occurring. If you notice high wait times on
    the `LCK_M_S` wait type, it means a read transaction is running long to complete
    because it must wait to place the Shared lock. So the first step is to identify
    the query causing the block. We do this by using the `sys.dm_os_waiting_tasks`
    DMV and looking at the `blocking_session_id` column. This is relatively quick
    to do when there is a single block active but is complex when many concurrent
    queries are blocked by other transactions. In complex cases, we must follow the
    blocking chain until we find the head (also called the root or lead) blocker (which
    is the first lock on an object).


    After we isolate the query causing the blocking, we will analyze the query to
    see if it is a candidate for optimization. Maybe the query is requesting more
    locks than it needs and thus requires a long time to complete. One way to optimize
    the query would be to look at whether any indexes should be added, resulting in
    fewer rows required to be locked. Or maybe you could cut the single transaction
    into multiple transactions, each accessing fewer objects. Another possible issue
    causing more locking than necessary is out-of-date statistics. Statistics are
    used as input for a query plan, and if they do not accurately reflect the contents
    of the table or index, they can lead to a bad query plan, which in turn can lead
    to more locks than necessary.


    Another option would be to change the Isolation level of the read transactions,
    so no Shared locks are needed in order to read the data. For instance, setting
    the Isolation level to `Read Uncommitted` will not place Shared locks, and the
    read transaction will not be blocked. This does introduce another problem related
    to the Isolation level, dirty reads, which we discussed in the “Locking and Blocking
    Introduction” section of this chapter. Next to using `Read Uncommitted`, you could
    also use `snapshot isolation`, which will result in fewer Shared locks but will
    not cause dirty reads. Snapshot isolation does put more load on the `TempDB` database,
    since it must maintain versions of data if many concurrent transactions are modifying
    that data.


    ### LCK_M_S Summary


    The `LCK_M_S` wait type occurs when an incompatible lock exists on a resource
    and another transaction wants to place a Shared lock on the same resource. Seeing
    the `LCK_M_S` wait type means transactions are being blocked. You should try to
    identify which queries are causing the block to occur and see if these can be
    optimized to result in fewer locks or locks that have a shorter duration. As a
    final resort, you could choose to change the Isolation level of your read transactions,
    though this does introduce other side effects, like dirty reads or increased load
    inside `TempDB`.


    ### LCK_M_U


    `LCK_M_U` wait types are related to locks using the Update (`U`) mode. When a
    task wants to place an Update lock on a resource but an incompatible lock is already
    in place, `LCK_M_U` waits occur.'
