- fmt: '## Wait Statistics


    So far, we have gone deep into the different components which perform scheduling
    for SQL Server and how they are interconnected. Now we turn our attention to the
    main topic of this book: wait statistics.


    In the section on worker threads earlier in this chapter, I described the states
    a worker thread is in while performing work on a scheduler. When a worker thread
    is performing its work, it goes through three different phases (or queues) in
    the scheduler process. Depending on the phase (or queue) a worker thread is in,
    it will enter the “RUNNING,” “RUNNABLE,” or “SUSPENDED” state. Figure 1-13 shows
    an abstract view of a scheduler with the different phases.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig13_HTML.jpg)


    A flow diagram of phases of queues of a scheduler has five blocks init, runnable,
    running, done, and waiting.


    Figure 1-13


    Scheduler and its phases and queues


    When a worker thread obtains access to a scheduler, it will generally start in
    the Waiter List and be assigned the “SUSPENDED” state. The Waiter List (shown
    as Waiting in Figure 1-13) is an unordered list of worker threads with the “SUSPENDED”
    state and is waiting for resources to become available. Here, resources are anything
    on the system, such as data pages or maybe a lock request. While a worker thread
    is in the Waiter List, the `SQLOS` records the type of resource it needs to continue
    its work (this is the wait type) and the time it spends waiting before that specific
    resource becomes available (this is the resource wait time).


    When a worker thread receives access to the resources it needs, it will move to
    the Runnable Queue, a first-in-first-out list of all worker threads with access
    to their resources and ready to be run on a processor. The time a worker thread
    spends in the Runnable Queue is recorded as the signal wait time.


    The top worker thread in the Runnable Queue will move to the “RUNNING” phase,
    where it will receive processor time to perform its work. The time it spends on
    the processor is recorded as CPU time. In the meantime, the other worker threads
    in the Runnable Queue move up the list, and worker threads that have received
    their requested resources move from the Waiter List into the Runnable Queue.


    Nerd Note


    The Runnable Queue is a first-in-first-out list (FIFO). If this was not true,
    a task could theoretically never move from runnable to running on a busy system.
    The Waiter List, however, is not FIFO.


    While a worker thread is in the “RUNNING” phase, there are three scenarios that
    can happen:


    1.  The worker thread needs additional resources; in this case, it moves from
    the “RUNNING” phase to the Waiter List (what we see as SUSPENDED).

    2.  The worker thread spends its quantum (fixed value of 4 milliseconds) and therefore
    must yield; the worker thread is moved to the bottom of the Runnable Queue.

    3.  The worker thread is done with its work and will leave the scheduler.


    Worker threads move through the three different phases all the time. It is common
    for one worker thread to rotate through multiple times until all work is done.


    Knowing the different lengths of time a request spends in one of the three different
    phases makes it possible to calculate total request execution time and also the
    total time a request waits for either processor time or resource time.


    Expressed as a mathematical formula, the total request execution time would look
    like this:

    `TotalRequestExecutionTime = Running time + Runnable time + Suspended time`


    This can also be written as the following:

    `TotalRequestExecutionTime = CPU time + Signal wait time + Resource wait time`


    Since there is a lot of terminology involved in the scheduling of worker threads
    in SQL Server, let’s show an example on how worker threads move through a scheduler.


    Figure 1-14 shows you an abstract image of the Waiter Queue, the Runnable Queue,
    and a processor executing a request.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig14_HTML.jpg)


    A block diagram of a scheduler with requests has 3 blocks. C P U 1 block with
    S P I D 77 request running. Runnable queue block with 2 requests. Waiter queue
    block with 6 requests.


    Figure 1-14


    Scheduler with requests


    In this example, we see a request from `SPID 77` running on the processor; this
    request will have the state “RUNNING.” There are requests in the Waiter Queue
    waiting for resources. I won’t go into detail about the wait types listed since
    we will be covering wait types in Part II of this book. While these sessions are
    in the Waiter Queue SQL Server will record the time spent as wait time, and the
    wait type will be noted as the representation of the resource they are waiting
    for. If we query information about these threads, they will have the “SUSPENDED”
    state. `SPID 81` and `SPID 91` have their resources ready and are waiting in the
    Runnable Queue for `SPID 77` to complete its work on the processor. While they
    are waiting in the Runnable Queue, SQL Server records the time they spend there
    as signal wait time and adds this time to the total wait time. These worker threads
    will have the status of “RUNNABLE.”


    In Figure 1-15 we have moved a few milliseconds forward in time; notice how the
    scheduler and worker threads have moved through the different phases and queues.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig15_HTML.png)


    A block diagram of the scheduler after a few milliseconds has C P U 1 block with
    S P I D 77 running. The runnable queue block receives S P I D 67 request from
    the waiter queue block and now has 3 requests. The waiter queue block now has
    5 requests.


    Figure 1-15


    Scheduler with requests after a few milliseconds


    `SPID 67` is done waiting for the `PAGEIOLATCH_SH` wait type and has moved to
    the bottom of the Runnable Queue. Figure 1-16 shows the next few milliseconds
    in time.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig16_HTML.jpg)


    A block diagram of the scheduler after a few more milliseconds. The S P I D 77
    request moves from the C P U 1 block to the waiter queue block. The waiter queue
    now has 6 requests. The runnable queue block has 3 requests. The C P U 1 block
    has no requests.


    Figure 1-16


    A few milliseconds more


    `SPID 77` needs an additional resource and has been placed back into the waiting
    queue. Here I have chosen to place it in the middle of the image to better represent
    that the Waiter Queue is not a FIFO queue. Figure 1-17 shows the next few milliseconds.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig17_HTML.png)


    A block diagram of the scheduler. S P I D 81 request moves from runnable queue
    to C P U 1 block and is running. The runnable queue block now has 2 requests.
    The C P U 1 block now has 1 request. The waiter queue has 6 requests.


    Figure 1-17


    A few milliseconds more


    `SPID 81` was the first worker thread in the Runnable Queue, and now with the
    processor free it moves from the Runnable Queue to the processor, and the state
    changes from “RUNNABLE” to “RUNNING.”


    And that is how worker threads move from “SUSPENDED” to “RUNNABLE” to “RUNNING”
    until the request(s) are complete and they exit the scheduler.'
