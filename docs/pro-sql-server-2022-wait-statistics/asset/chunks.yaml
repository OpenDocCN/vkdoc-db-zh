    ## PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待


    一张 SQL Server 结果窗口的截图，包含 2 行 6 列。它列出了等待类型、等待任务计数、等待时间、最大等待时间和信号等待时间。其中，等待类型“preemptive
    OS decrypt message”被选中。


    图 11-10


    如你所见，`PREEMPTIVE_OS_ENCRYPTMESSAGE` 等待类型有更多的等待次数和等待时间与之关联。这是合理的，因为我执行了一个 `SELECT`
    查询，它需要解密来自客户端的确认网络消息。查询的结果由 SQL Server 加密，这导致了在 `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    等待类型上更高的等待。


    ### 降低 PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 等待


    在正常情况下，应该没有必要特意去关注降低 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE`
    等待类型。它们表明加密正在进行，这很可能是在配置 SQL Server 实例时做出的选择。禁用加密会降低 `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待时间，但代价是安全性的降低。


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 总结


    `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型表明在 SQL Server
    实例和客户端之间正在进行加密。这些等待类型通常可以忽略，因为它们并不直接指示性能问题。可以通过禁用加密的使用来降低它们，但这会牺牲安全性。


    ## PREEMPTIVE_OS_WRITEFILEGATHER


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型与存储交互相关，更具体地说是通过 Windows 操作系统写入文件。


    ### 什么是 PREEMPTIVE_OS_WRITEFILEGATHER 等待类型？


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型与 Windows 操作系统内部的 `WriteFileGather` 函数相关。根据
    Books Online 中对该函数的定义，“从缓冲区数组检索数据并将数据写入文件”，从这个描述来看，我们假设当 SQL Server 需要将数据写入文件时会调用此函数。然而，这并不涵盖
    SQL Server 内部的每一个存储子系统写入操作。通常，SQL Server 不需要离开其自身引擎去等待一个抢占式操作。然而，存在一些例外情况，这会导致
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待（取决于用于执行存储子系统交互的 Windows 函数）。SQL Server 内部的一个特定操作将始终导致
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待，那就是数据文件的增长。每当 SQL Server 需要增长数据文件时，它会在存储子系统上分配额外的空间并将新空间“清零”。额外空间的分配不是在
    SQL Server 引擎内部完成的；因此，发生了一个抢占式操作，这导致了对 `WriteFileGather` 函数的抢占式等待。


    ### PREEMPTIVE_OS_WRITEFILEGATHER 示例


    为了展示一个发生 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待的例子，让我们使用上一节描述的情况，即增长数据库数据文件。对于这个示例，我将还原
    `GalacticWorks` 数据库的备份，该数据库有一个大小为 194 MB 的数据库数据文件，如图 11-11 所示。


    ![](img/340881_3_En_11_Fig11_HTML.jpg)


    一个标有“数据库文件”的窗口截图，包含 2 行 5 列。它列出了数据库文件及其详细信息、逻辑名称、文件类型、文件组、大小、自动增长或最大大小。


    图 11-11


    GalacticWorks 的默认数据库文件配置


    我将把唯一的数据库数据文件增长到 10 GB 的大小。由于数据文件所需的额外空间分配是在 SQL Server 之外执行的，这应该会导致 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待。


    > **极客笔记**

    >

    > 此示例依赖于“即时文件初始化”选项被禁用。更多内容将在下一节介绍。但在尝试此示例之前，有必要在此提及。


    为了执行扩增数据库数据文件的操作，我使用了清单 11-2 中显示的脚本。此脚本将清除 `sys.dm_os_wait_stats` DMV，扩增 `GalacticWorks`
    数据文件，然后查询 `sys.dm_os_wait_stats` DMV 中的 `PREEMPTIVE_OS_WRITEFILEGATHER`。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    USE [master];

    ALTER DATABASE [GalacticWorks]

    MODIFY FILE

    (NAME = N''GalacticWorks_Data'',

    SIZE = 10240000KB);

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_WRITEFILEGATHER'';

    清单 11-2

    扩增 AdventureWorks 数据库数据文件

    ```


    在我的测试 SQL Server 实例上，清单 11-2 中的查询几乎瞬间完成；它的存储速度非常快，对于 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型，产生了如图 11-12 所示的等待信息。


    ![](img/340881_3_En_11_Fig12_HTML.jpg)


    一个 SQL Server 结果窗口截图，包含 6 列和 1 行。它列出的等待类型为 preemptive O S write file gather，等待任务计数为
    1，等待时间（毫秒）为 447，最大等待时间（毫秒）为 447，信号等待时间（毫秒）为 0。


    图 11-12


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待


    请注意，在 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型上只有一次等待，其持续时间实际上与执行数据文件扩增操作所花费的时间一样长。

