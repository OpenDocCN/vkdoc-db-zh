    ```


    Figure [12-2](#340881_3_En_12_Chapter.xhtml#Fig2) shows the results of the queries
    made against the sys.dm_os_wait_stats and sys.dm_os_waiting_tasks DMVs.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig2_HTML.png)


    Two-row diagram. Row 1 has five columns, and row 2 has 6, with the wait type as
    a checkpoint queue and row 2 with checkpoints.


    Figure 12-2


    CHECKPOINT_QUEUE waits


    As you can see, the manual checkpoint didn’t generate any waits inside the sys.dm_os_wait_stats
    DMV. Also, an automatic checkpoint didn’t occur, because inserting 100 rows generated
    too few log records to trigger an automatic checkpoint.


    If we insert more rows, we should be able to trigger an automatic checkpoint.
    In this case, I ran the following query to insert 100,000 rows into the table
    created in Listing [12-1](#340881_3_En_12_Chapter.xhtml#PC1). While the insert
    was running, I queried the sys.dm_os_wait_stats and sys.dm_os_waiting_tasks DMVs
    repeatedly to see if anything changed. See the following:


    ```

    INSERT INTO check_test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(varchar(50), NEWID()))

    GO 100000

    ```


    After a few seconds, I noticed that the wait time for the CHECKPOINT_QUEUE wait
    type was moved to the sys.dm_os_wait_stats DMV, as shown in Figure [12-3](#340881_3_En_12_Chapter.xhtml#Fig3).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig3_HTML.png)


    Two-row diagram. Row 1 has five columns, and row 2 has 6, with the wait type as
    a checkpoint queue. Row 1 has wait time m s and max wait time m s.


    Figure 12-3


    CHECKPOINT_QUEUE waits


    Apparently, we inserted enough log records to cause an automatic checkpoint to
    occur, and as you see from this example, only an automatic checkpoint will write
    the wait times of the CHECKPOINT_QUEUE to the sys.dm_os_wait_stats DMV.


    You should keep this behavior in mind when you notice sudden, very high wait time
    values inside the sys.dm_os_wait_stats DMV. This will normally only occur in SQL
    Server instances that either have a very small workload or have a workload mainly
    consisting of read operations instead of data modification operations.'
  trans: '# 12. 背景与杂项等待类型


    SQL Server 内部有不同的进程，到目前为止我们已经讨论了很多。其中一些内部进程在 SQL Server 内部持续运行，等待有工作分配给它们。当这些通常称为后台进程的进程在等待工作到来时，SQL
    Server 会将它们等待工作的时间记录为与这些后台进程相关的特定等待类型。虽然这些后台等待类型与性能问题没有直接关系，但它们通常具有最高的等待时间，并且当你按等待时间排序查询顶级等待类型时，它们会出现在列表顶部。


    通常，这些后台等待类型可以安全地忽略，因为它们仅仅表明一个内部进程正在等待工作到来。这个逻辑对于我们在本章中讨论的等待类型同样适用，但我不仅仅是告诉你在分析等待统计信息时可以忽略它们，我还想提供一些关于它们的背景信息，让你了解它们衡量的是什么以及为什么可以安全地忽略。请记住，我们这里谈论的是
    SQL Server，这意味着能否完全忽略这些后台等待类型“取决于”许多因素。你不会是第一个遇到性能问题，最后却发现是一个被忽略的后台进程导致了该问题的人。所以我的建议是：可以忽略，但不要忘记它们！


    除了后台等待类型，我还添加了一些杂项等待类型，这些类型很难归类到之前的章节中，因为它们不太符合该章节的等待类型类别。


    由于本章中的后台等待类型在其关联进程等待工作时会持续记录等待时间，因此我没有为这些等待类型包含示例部分或降低等待时间部分。


    ## CHECKPOINT_QUEUE


    本章的第一个等待类型是那些会随时间积累大量等待时间的后台等待类型之一。`CHECKPOINT_QUEUE` 等待类型（在许多情况下）可以安全地忽略，但了解它代表什么以及为什么它有如此高的等待时间总没有坏处。


    ### 什么是 CHECKPOINT_QUEUE 等待类型？


    `CHECKPOINT_QUEUE` 等待类型是一种与 SQL Server 中检查点进程相关的后台等待，该进程负责将“脏”（已修改的）数据页从缓冲区缓存写入磁盘上的数据文件。在第
    6 章 “与 IO 相关的等待类型” 中，我们在讨论 `SLEEP_BPOOL_FLUSH` 等待类型时回顾了检查点进程，因此这里不再重复所有信息。重要的是要了解，并且这也是该等待类型常被忽略的原因，即
    `CHECKPOINT_QUEUE` 等待类型表明检查点进程正在等待工作。这意味着 `CHECKPOINT_QUEUE` 等待类型上的等待时间并不表示任何性能问题；它们只是表明检查点进程在等待工作上花费的时间。在不是非常繁忙或没有太多数据修改操作的
    SQL Server 实例上，等待时间可能达到非常高的值。


    在 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV 中记录 `CHECKPOINT_QUEUE`
    等待时间的过程通过一个特定的内部例程进行，该例程可能返回意外的等待时间（例如基线内的突然峰值）。图 12-1 显示了在我的测试 SQL Server 实例上，针对
    `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV 查询 `CHECKPOINT_QUEUE` 等待类型信息的结果。


    ![](img/340881_3_En_12_Fig1_HTML.png)


    图 12-1: CHECKPOINT_QUEUE 等待


    这里有趣的是，`sys.dm_os_wait_stats` DMV 中的累积等待时间保持为 0，而 `sys.dm_os_waiting_tasks` DMV
    中的等待时间却非常高。我的测试 SQL Server 实例在后台没有执行太多工作，因此检查点进程大部分时间都在等待工作是合乎逻辑的。两个 DMV 之间等待时间差异的原因与
    SQL Server 执行检查点操作的方式有关。两个 DMV 中显示的等待时间都是由自动检查点进程记录的。手动检查点执行不影响等待时间。作为自动检查点过程的一部分，`sys.dm_os_waiting_tasks`
    DMV 的等待时间会被转移到 `sys.dm_os_wait_stats` DMV 并重置为 0。因此，如果你在 `sys.dm_os_waiting_tasks`
    中注意到非常高的 `CHECKPOINT_QUEUE` 等待时间，这意味着上一次自动检查点运行已经过去一段时间了。


    为了演示这种行为，创建一个表，重置 `sys.dm_os_wait_stats` DMV，向表中插入几行，执行手动检查点，然后查询 `sys.dm_os_wait_stats`
    和 `sys.dm_os_waiting_tasks` DMV，如清单 12-1 所示。


    ```

    -- 在 GalacticWorks 数据库中创建一个表

    USE [GalacticWorks];

    CREATE TABLE check_test

    (ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50));

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 向我们的表中插入几行数据

    INSERT INTO check_test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(varchar(50), NEWID()))

    GO 100

    CHECKPOINT 1;

    -- 查询等待统计信息

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    ```

    清单 12-1: CHECKPOINT_QUEUE 示例


    图 12-2 显示了针对 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV 查询的结果。


    ![](img/340881_3_En_12_Fig2_HTML.png)


    图 12-2: CHECKPOINT_QUEUE 等待


    如你所见，手动检查点没有在 `sys.dm_os_wait_stats` DMV 中产生任何等待。同时，自动检查点也没有发生，因为插入 100 行产生的日志记录太少，不足以触发自动检查点。


    如果我们插入更多行，应该能够触发自动检查点。在这种情况下，我运行了以下查询，向清单 12-1 中创建的表插入 100,000 行。在插入运行时，我反复查询
    `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks` DMV，看看是否有任何变化。请看：


    ```

    INSERT INTO check_test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(varchar(50), NEWID()))

    GO 100000

    ```


    几秒钟后，我注意到 `CHECKPOINT_QUEUE` 等待类型的等待时间被移到了 `sys.dm_os_wait_stats` DMV 中，如图 12-3
    所示。


    ![](img/340881_3_En_12_Fig3_HTML.png)


    图 12-3: CHECKPOINT_QUEUE 等待


    显然，我们插入了足够多的日志记录导致发生了自动检查点，并且从这个例子中你可以看到，只有自动检查点才会将 `CHECKPOINT_QUEUE` 的等待时间写入
    `sys.dm_os_wait_stats` DMV。


    当你在 `sys.dm_os_wait_stats` DMV 中注意到突然出现非常高的等待时间值时，你应该记住这种行为。这通常只会发生在工作负载非常小，或者工作负载主要由读取操作而非数据修改操作组成的
    SQL Server 实例中。'
- fmt: '### CHECKPOINT_QUEUE 概述


    `CHECKPOINT_QUEUE`等待类型与 SQL Server 内部的检查点操作相关。当 SQL Server 正在等待自动检查点操作发生时，就会记录`CHECKPOINT_QUEUE`等待类型的等待时间。这通常是您可以安全忽略的一种等待类型，因为它不表示存在任何性能问题。`CHECKPOINT_QUEUE`等待类型的等待时间在`sys.dm_os_wait_stats`和`sys.dm_os_waiting_tasks`这两个
    DMV 中的记录方式不同，这可能导致在查询`sys.dm_os_wait_stats` DMV 时出现突然的高等待时间。在注意到`sys.dm_os_wait_stats`
    DMV 中出现高`CHECKPOINT_QUEUE`等待时间时，请牢记此行为。


    ## DIRTY_PAGE_POLL


    **`DIRTY_PAGE_POLL`**等待类型是 SQL Server 2012 引入间接检查点功能时新增的，其行为与我们前面讨论的等待类型`CHECKPOINT_QUEUE`非常相似。虽然自动检查点进程以设定的
    1 分钟间隔运行，但间接检查点功能允许您为每个数据库配置特定的检查点间隔。即使您未使用间接检查点，`DIRTY_PAGE_POLL`等待类型仍会积累等待时间。


    ### 什么是 DIRTY_PAGE_POLL 等待类型？


    `DIRTY_PAGE_POLL`等待类型是另一种通常可以安全忽略的后台等待。`DIRTY_PAGE_POLL`与间接检查点功能使用的恢复写入器进程相关，该进程在
    SQL Server 实例的后台持续运行。由于这种关联，让我们回顾一下间接检查点是什么以及它们如何工作。


    SQL Server 内部的检查点进程负责将缓冲区缓存中修改过的数据页写入磁盘上的数据库数据文件。默认情况下，检查点进程每分钟自动运行一次，或者当生成了足够的日志记录时运行。检查点进程在
    SQL Server 数据库崩溃时的恢复持续时间中起着至关重要的作用。例如，想象以下场景：当您在 SQL Server 实例中对数据库执行大量修改时，发生崩溃。幸运的是，您能够简单地重新启动
    SQL Server 服务以使一切重新运行。SQL Server 将做的第一件事是启动一个恢复过程。恢复过程将检查事务日志中是否存在崩溃发生时未提交的任何事务，并对这些事务执行回滚。恢复过程还将检查已提交事务修改的任何数据页是否已在数据库数据文件中更新。


    如果发现任何这样的页面，SQL Server 将使用事务日志重做这些事务。现在想象一下，您有一个繁忙的 SQL Server 实例，每分钟执行数千次修改。这意味着存在大量未写入磁盘的脏页的可能性很高。如果您的
    SQL Server 随后崩溃（或者，例如，发生故障转移），恢复过程将需要更多时间来完成。间接检查点有助于尽可能缩短此恢复过程。通过配置此功能，我们告诉 SQL
    Server 更快地将修改的数据页写入磁盘，例如每 10 秒一次。图 [12-4](#340881_3_En_12_Chapter.xhtml#Fig4)
    显示了数据库属性中间接检查点功能的位置和名称。


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig4_HTML.png)


    图 12-4 间接检查点功能的位置和值


    默认情况下，“目标恢复时间（秒）”配置选项的值为 0。这意味着未使用间接检查点。如果将该值修改为 0 以外的任何值，则将在您指定的秒数间隔发生间接检查点。


    注意


    从 SQL Server 2016 开始，在 SQL Server 实例中创建新数据库时，会自动配置间接检查点。在这些情况下，“目标恢复时间（秒）”将设置为
    60 而不是 0。


    但是，在“目标恢复时间（秒）”选项中配置的时间并不意味着每 x 秒执行一次检查点进程。通过设置此值，SQL Server 将计算在需要写入数据库数据文件之前可以存在多少脏页，从而使恢复过程永远不会超过指定的时间。例如，如果您将“目标恢复时间（秒）”选项配置为
    15 秒，SQL Server 将以这样的间隔将脏页写入数据库数据文件，以便在 SQL Server 实例发生故障时，可以在 15 秒内恢复。


    为了监控缓冲区缓存中有多少脏页，以便 SQL Server 知道何时达到脏页阈值，引入了恢复写入器。即使您未配置“目标恢复时间（秒）”选项，`DIRTY_PAGE_POLL`等待仍然会发生，因为恢复写入器进程将轮询缓冲区缓存中的脏页数量，尽管不会对该数字采取任何操作。如图
    [12-5](#340881_3_En_12_Chapter.xhtml#Fig5) 所示，即使不使用间接检查点，等待时间也很容易达到很高的值。


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig5_HTML.png)


    图 12-5 `DIRTY_PAGE_POLL` 等待


    ```

    -- 查询等待统计信息

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DIRTY_PAGE_POLL'';

    ```


    间接检查点存在相关风险。将“目标恢复时间（秒）”选项配置为非常低的值可能导致存储子系统上的额外负载，因为脏页会持续写入磁盘。在生产 SQL Server 实例上配置此设置之前，请务必进行广泛测试。


    ### DIRTY_PAGE_POLL 概述


    `DIRTY_PAGE_POLL`等待类型是在 SQL Server 2012 中随着间接检查点功能的引入而出现的（该功能最终成为 SQL Server 2016
    或更高版本中创建的新数据库的默认设置）。即使您不使用间接检查点，由于新的恢复写入器进程，`DIRTY_PAGE_POLL`等待类型仍会积累等待时间。通常，`DIRTY_PAGE_POLL`等待类型不表示性能问题，因此在分析
    SQL Server 实例上的等待统计信息时可以安全地忽略它。


    ## LAZYWRITER_SLEEP


    **`LAZYWRITER_SLEEP`**等待类型，没错，与 SQL Server 内部的惰性写入器后台进程相关。惰性写入器进程与本章前面讨论的检查点进程有一些相似之处，因为它也从缓冲区缓存中将脏页写入数据库数据文件。但相似之处仅此而已，因为惰性写入器进程将这些页面写入数据库数据文件的原因与检查点进程完全不同。'
  raw: '### CHECKPOINT_QUEUE Summary


    The CHECKPOINT_QUEUE wait type is related to checkpoint operations inside SQL
    Server. Wait time on the CHECKPOINT_QUEUE wait type is recorded, while SQL Server
    is waiting for an automatic checkpoint operation to take place. This is one of
    the wait types you can normally safely ignore because it doesn’t indicate there
    are any performance issues. The wait times on the CHECKPOINT_QUEUE wait type are
    recorded differently between the sys.dm_os_wait_stats and sys.dm_os_waiting_tasks
    DMV, and this can cause sudden high wait times when querying the sys.dm_os_wait_stats
    DMV. Keep this behavior in mind when noticing high CHECKPOINT_QUEUE wait times
    inside the sys.dm_os_wait_stats DMV.


    ## DIRTY_PAGE_POLL


    The **DIRTY_PAGE_POLL** wait type was introduced in SQL Server 2012 with the indirect
    checkpoint feature and behaves a lot like the previous wait type we discussed,
    CHECKPOINT_QUEUE. While the automatic checkpoint process runs at a set interval
    of 1 minute, the indirect checkpoint feature allows you to configure a specific
    checkpoint interval on a per-database basis. Even if you are not using indirect
    checkpoint, the DIRTY_PAGE_POLL wait type will still accumulate wait time.


    ### What Is the DIRTY_PAGE_POLL Wait Type?


    The DIRTY_PAGE_POLL wait type is another background wait which is often safely
    ignored. The DIRTY_PAGE_POLL is related to the recovery writer process used by
    the indirect checkpoint feature running continuously in the background of your
    SQL Server instance. Because of this connection, let’s review what indirect checkpoints
    are and how they work.


    The checkpoint process inside SQL Server is responsible for writing modified data
    pages from the buffer cache to the database data file on disk. By default, the
    checkpoint process runs automatically every minute or when enough log records
    have been generated. The checkpoint process plays a vital part in the recovery
    duration of your SQL Server databases when a crash occurs. Take, for instance,
    the following scenario: while you are performing many modifications to a database
    in your SQL Server instance, a crash occurs. Luckily, you were able to simply
    restart the SQL Server service to get everything up and running again. The first
    thing SQL Server will do is start a recovery process. The recovery process will
    check the transaction log for any transactions not committed when the crash occurred
    and perform a rollback of those transactions. The recovery process will also check
    whether any data pages modified by a committed transaction received their modification
    inside the database data file.


    If any of those pages are found, SQL Server will use the transaction log to redo
    these transactions. Now imagine you have a busy SQL Server instance where thousands
    of modifications are performed every minute. This means the chance there is a
    high number of dirty pages not written to disk is pretty high. If your SQL Server
    then crashes (or, for instance, a failover occurs), the recovery process will
    take more time to complete. Indirect checkpoints help keep this recovery process
    as short as possible. By configuring this feature, we tell SQL Server to write
    modified data pages to disk faster, for instance, every 10 seconds. Figure [12-4](#340881_3_En_12_Chapter.xhtml#Fig4)
    shows the location and name of the indirect checkpoint feature inside the properties
    of a database.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig4_HTML.png)


    A screenshot of the database properties page has a tab for recovery on the right
    side. It highlights a target recovery time in seconds.


    Figure 12-4


    Indirect checkpoint feature location and value


    By default, the value of the Target Recovery Time (Seconds) configuration option
    is 0\. This means indirect checkpoints are not being used. If you modify the value
    to anything other than 0, an indirect checkpoint will occur at the interval in
    seconds you specified.


    Nerd Note


    Starting from SQL Server 2016, indirect checkpoints are automatically configured
    whenever you create a new database inside the SQL Server instance. In those cases,
    the Target Recovery Time (Seconds) will be set to a value of 60 instead of 0.


    The time you configure in the Target Recovery Time (Seconds) option does not mean
    that every x seconds the checkpoint process will be executed, however. By setting
    this value, SQL Server will calculate how many dirty pages can exist before they
    need to be written to the database data file, so the recovery process never takes
    longer than the time specified. So, for instance, if you configure the Target
    Recovery Time (Seconds) option to 15 seconds, SQL Server will write dirty pages
    to the database data file at such an interval that when the SQL Server instance
    fails, it can be recovered within 15 seconds.


    To monitor how many dirty pages are inside the buffer cache so SQL Server knows
    when the dirty-page threshold has been reached, the recovery writer was introduced.
    Even if you do not configure the Target Recovery Time (Seconds) option, DIRTY_PAGE_POLL
    waits will still occur because the recovery writer process will poll the number
    of dirty pages inside the buffer cache, even though no action is taken upon that
    number. As you can see in Figure [12-5](#340881_3_En_12_Chapter.xhtml#Fig5), the
    wait times can reach high values easily even when not using indirect checkpoints.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig5_HTML.png)


    A row has five columns for wait type as a dirty page poll, waiting tasks count
    as 16684, wait time m s as 1679414, max wait time m s as 104, and signal wait
    time m s as 80.


    Figure 12-5


    DIRTY_PAGE_POLL waits


    ```

    -- Query Wait Statistics

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DIRTY_PAGE_POLL'';

    ```


    Indirect checkpoints have a risk associated with them. Configuring the Target
    Recovery Time (Seconds) option to a very low value can lead to extra load on the
    storage subsystem because dirty pages are continuously written to disk. Be sure
    to test the setting extensively before configuring it on your production SQL Server
    instances.


    ### DIRTY_PAGE_POLL Summary


    The DIRTY_PAGE_POLL wait type was introduced in SQL Server 2012 with the introduction
    of the indirect checkpoint feature (which ended up being the default setting for
    new databases created in SQL Server 2016 or higher). Even if you do not use indirect
    checkpoints, the DIRTY_PAGE_POLL wait type will still accumulate wait time because
    of the new recovery writer process. Normally the DIRTY_PAGE_POLL wait type does
    not indicate a performance problem, and as such it can safely be ignored when
    analyzing wait statistics on your SQL Server instance.


    ## LAZYWRITER_SLEEP


    The **LAZYWRITER_SLEEP** wait type is, surprise, related to the SQL Server internal
    lazywriter background process. The lazywriter process shares some similarities
    with the checkpoint process discussed earlier in this chapter, as it also writes
    dirty pages from the buffer cache to the database data file. The similarities
    end here, though, because the reason why the lazywriter process writes these pages
    to the database data file is completely different than the checkpoint process.'
  trans: '

    ### CHECKPOINT_QUEUE 概述


    `CHECKPOINT_QUEUE` 等待类型与 SQL Server 内部的检查点操作相关。当 SQL Server 正在等待自动检查点操作发生时，就会记录`CHECKPOINT_QUEUE`等待类型的等待时间。这通常是您可以安全忽略的一种等待类型，因为它不表示存在任何性能问题。`CHECKPOINT_QUEUE`等待类型的等待时间在`sys.dm_os_wait_stats`和`sys.dm_os_waiting_tasks`这两个
    DMV 中的记录方式不同，这可能导致在查询`sys.dm_os_wait_stats` DMV 时出现突然的高等待时间。在注意到`sys.dm_os_wait_stats`
    DMV 中出现高`CHECKPOINT_QUEUE`等待时间时，请牢记此行为。


    ## DIRTY_PAGE_POLL


    **`DIRTY_PAGE_POLL`**等待类型是 SQL Server 2012 引入间接检查点功能时新增的，其行为与我们前面讨论的等待类型`CHECKPOINT_QUEUE`非常相似。虽然自动检查点进程以设定的
    1 分钟间隔运行，但间接检查点功能允许您为每个数据库配置特定的检查点间隔。即使您未使用间接检查点，`DIRTY_PAGE_POLL`等待类型仍会积累等待时间。


    ### 什么是 DIRTY_PAGE_POLL 等待类型？


    `DIRTY_PAGE_POLL`等待类型是另一种通常可以安全忽略的后台等待。`DIRTY_PAGE_POLL`与间接检查点功能使用的恢复写入器进程相关，该进程在
    SQL Server 实例的后台持续运行。由于这种关联，让我们回顾一下间接检查点是什么以及它们如何工作。


    SQL Server 内部的检查点进程负责将缓冲区缓存中修改过的数据页写入磁盘上的数据库数据文件。默认情况下，检查点进程每分钟自动运行一次，或者当生成了足够的日志记录时运行。检查点进程在
    SQL Server 数据库崩溃时的恢复持续时间中起着至关重要的作用。例如，想象以下场景：当您在 SQL Server 实例中对数据库执行大量修改时，发生崩溃。幸运的是，您能够简单地重新启动
    SQL Server 服务以使一切重新运行。SQL Server 将做的第一件事是启动一个恢复过程。恢复过程将检查事务日志中是否存在崩溃发生时未提交的任何事务，并对这些事务执行回滚。恢复过程还将检查已提交事务修改的任何数据页是否已在数据库数据文件中更新。


    如果发现任何这样的页面，SQL Server 将使用事务日志重做这些事务。现在想象一下，您有一个繁忙的 SQL Server 实例，每分钟执行数千次修改。这意味着存在大量未写入磁盘的脏页的可能性很高。如果您的
    SQL Server 随后崩溃（或者，例如，发生故障转移），恢复过程将需要更多时间来完成。间接检查点有助于尽可能缩短此恢复过程。通过配置此功能，我们告诉 SQL
    Server 更快地将修改的数据页写入磁盘，例如每 10 秒一次。图 12-4 显示了数据库属性中间接检查点功能的位置和名称。


    ![](img/340881_3_En_12_Fig4_HTML.png)


    图 12-4 间接检查点功能的位置和值


    默认情况下，“目标恢复时间（秒）”配置选项的值为 0。这意味着未使用间接检查点。如果将该值修改为 0 以外的任何值，则将在您指定的秒数间隔发生间接检查点。


    注意


    从 SQL Server 2016 开始，在 SQL Server 实例中创建新数据库时，会自动配置间接检查点。在这些情况下，“目标恢复时间（秒）”将设置为
    60 而不是 0。


    但是，在“目标恢复时间（秒）”选项中配置的时间并不意味着每 x 秒执行一次检查点进程。通过设置此值，SQL Server 将计算在需要写入数据库数据文件之前可以存在多少脏页，从而使恢复过程永远不会超过指定的时间。例如，如果您将“目标恢复时间（秒）”选项配置为
    15 秒，SQL Server 将以这样的间隔将脏页写入数据库数据文件，以便在 SQL Server 实例发生故障时，可以在 15 秒内恢复。


    为了监控缓冲区缓存中有多少脏页，以便 SQL Server 知道何时达到脏页阈值，引入了恢复写入器。即使您未配置“目标恢复时间（秒）”选项，`DIRTY_PAGE_POLL`等待仍然会发生，因为恢复写入器进程将轮询缓冲区缓存中的脏页数量，尽管不会对该数字采取任何操作。如图
    12-5 所示，即使不使用间接检查点，等待时间也很容易达到很高的值。


    ![](img/340881_3_En_12_Fig5_HTML.png)


    图 12-5 `DIRTY_PAGE_POLL` 等待


    ```

    -- 查询等待统计信息

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DIRTY_PAGE_POLL'';

    ```


    间接检查点存在相关风险。将“目标恢复时间（秒）”选项配置为非常低的值可能导致存储子系统上的额外负载，因为脏页会持续写入磁盘。在生产 SQL Server 实例上配置此设置之前，请务必进行广泛测试。


    ### DIRTY_PAGE_POLL 概述


    `DIRTY_PAGE_POLL`等待类型是在 SQL Server 2012 中随着间接检查点功能的引入而出现的（该功能最终成为 SQL Server 2016
    或更高版本中创建的新数据库的默认设置）。即使您不使用间接检查点，由于新的恢复写入器进程，`DIRTY_PAGE_POLL`等待类型仍会积累等待时间。通常，`DIRTY_PAGE_POLL`等待类型不表示性能问题，因此在分析
    SQL Server 实例上的等待统计信息时可以安全地忽略它。


    ## LAZYWRITER_SLEEP


    **`LAZYWRITER_SLEEP`**等待类型，没错，与 SQL Server 内部的惰性写入器后台进程相关。惰性写入器进程与本章前面讨论的检查点进程有一些相似之处，因为它也从缓冲区缓存中将脏页写入数据库数据文件。但相似之处仅此而已，因为惰性写入器进程将这些页面写入数据库数据文件的原因与检查点进程完全不同。

    '
- fmt: '# SQL Server 等待类型：LAZYWRITER_SLEEP、MSQL_XP 与 OLEDB


    ## LAZYWRITER_SLEEP 等待类型


    ### 什么是 LAZYWRITER_SLEEP 等待类型？


    与本章讨论的其他等待类型类似，`LAZYWRITER_SLEEP` 等待类型出现于一个内部 SQL Server 进程（此处是 `lazywriter` 进程）等待工作时。`lazywriter`
    进程是一个后台进程，会在特定的时间间隔变为活动状态。当它活动时，会扫描缓冲区缓存的大小，以确定其中是否有足够的空闲页。在缓冲区缓存中始终保持一定数量的空闲页非常重要，这样新的页请求可以直接分配空间，而无需先换出其他页。如果
    `lazywriter` 进程确定缓冲区缓存中有足够的空闲页，它将再次进入休眠状态，并在休眠期间记录 `LAZYWRITER_SLEEP` 等待类型。然而，如果缓冲区缓存中没有足够的空闲页，`lazywriter`
    进程将在检查点之间检测到哪些脏页在缓冲区缓存中一段时间未被访问，将它们写入数据库数据文件，然后从缓冲区缓存中清除它们。因此，如果缓冲区缓存中有远多于足够的空闲页，`lazywriter`
    进程就没有太多工作要做。如果您的 SQL Server 实例存在内存压力，在换出脏页和释放缓冲区缓存空间时，`lazywriter` 进程将繁忙得多。图 12-6
    通过流程图展示了检查点和 `lazywriter` 进程的关系。


    ![A diagram has a checkpoint on the left side and a flow chart for a lazy writer
    on the right.](images/340881_3_En_12_Chapter/340881_3_En_12_Fig6_HTML.jpg)

    **图 12-6** 检查点与 `lazywriter` 进程


    由于 `LAZYWRITER_SLEEP` 等待类型表示 `lazywriter` 进程休眠或等待工作的时间，它又属于那种您可以安全忽略的等待类型。但有一个需要注意的地方——如果
    `lazywriter` 进程持续工作，将脏页从缓冲区缓存移动到数据库数据文件，这可能表明您的 SQL Server 实例正经历内存压力。这对性能不利，因为每个页在读取或修改之前都必须先移动到缓冲区缓存。这种行为可能导致
    `LAZYWRITER_SLEEP` 等待类型的等待时间低于正常水平。


    ### LAZYWRITER_SLEEP 总结


    `LAZYWRITER_SLEEP` 等待类型与 SQL Server 内部的 `lazywriter` 进程相关。`lazywriter` 进程以固定的时间间隔启动，如果缓冲区缓存中没有足够的可用空闲页，则负责将脏数据页写入数据库数据文件。`LAZYWRITER_SLEEP`
    等待类型表明 `lazywriter` 进程当前未运行，或处于休眠状态，直到收到信号唤醒并检查缓冲区缓存。由于 `LAZYWRITER_SLEEP` 等待类型仅向我们显示
    `lazywriter` 进程处于非活动状态的时间，因此在大多数情况下可以忽略。


    ## MSQL_XP


    在第 11 章“抢占式等待类型”的最后一节中，我们讨论了 `PREEMPTIVE_GETPROCADDRESS` 等待类型。我们了解到 `PREEMPTIVE_GETPROCADDRESS`
    等待类型记录扩展存储过程的入口点时间。需要指出的一个重要点是，`PREEMPTIVE_GETPROCADDRESS` 等待类型不记录扩展存储过程的执行时间，只记录入口点加载。扩展存储过程的执行时间由另一个等待类型
    `MSQL_XP` 跟踪。


    ### 什么是 MSQL_XP 等待类型？


    `MSQL_XP` 等待类型记录 SQL Server 实例上扩展存储过程的执行时间。在使用多个活动结果集（MARS）时，`MSQL_XP` 等待类型也用于检测死锁情况。MARS
    是一项允许通过单个 SQL Server 连接执行多个（并发）批处理的功能。我们不会进一步详细介绍 MARS，但您可以在此处找到更多信息：`https://slrwnds.com/4y444e`。


    在 `MSQL_XP` 等待类型上看到高于正常等待时间的最常见原因是扩展存储过程的执行。只要扩展存储过程的执行时间保持不变，这并不一定意味着存在问题。但是，如果某个扩展存储过程花费的时间比预期的长，当您将等待时间与基线进行比较时，您肯定会注意到
    `MSQL_XP` 等待时间的增加。


    ### MSQL_XP 示例


    为了演示执行扩展存储过程时会发生 `MSQL_XP` 等待，请使用清单 12-2 中的脚本创建一个简单的示例。该脚本将重置 `sys.dm_os_wait_stats`
    DMV，执行一个扩展存储过程（此处是 `master` 数据库中的 `xp_dirtree` 扩展存储过程），并查询 `sys.dm_os_wait_stats`
    以获取 `MSQL_XP` 等待信息。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    EXEC master..xp_dirtree ''c:\windows'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''MSQL_XP'';

    ```

    **清单 12-2** `MSQL_XP` 示例


    在我的测试 SQL Server 实例上执行清单 12-2 中的查询结果如图 12-7 所示。顶部窗口显示了 `xp_dirtree` 的结果，底部窗口显示了对
    `sys.dm_os_waits_stats` DMV 的查询结果。


    ![A screenshot of a page has two columns for subdirectory and depth, and row 1
    A D F S is highlighted. The bottom side has a row with five columns and wait for
    type as M S Q L underscore X P.](images/340881_3_En_12_Chapter/340881_3_En_12_Fig7_HTML.png)

    **图 12-7** `MSQL_XP` 等待


    `sys.dm_os_wait_stats` DMV 中的信息显示，在 `MSQL_XP` 等待类型上发生了一次等待，等待时间为 28,159 毫秒。这几乎与执行清单
    12-2 中的查询所需时间相同，在我的测试 SQL Server 实例上大约是 28 秒。


    ### 降低 MSQL_XP 等待


    当注意到 `MSQL_XP` 等待类型的等待时间高于正常水平时，很可能是扩展存储过程完成的时间比平时长。您的首要行动点应该是识别正在使用哪些扩展存储过程以及原因。由于扩展存储过程也在
    SQL Server 之外执行任务，它们可能会遇到其他可能减慢它们速度的 Windows 进程。了解扩展存储过程函数的功能及其作用，将帮助您快速识别问题所在。


    如果您正在使用 MARS，您可能遇到了 MARS 连接死锁。已发布了各种 SQL Server 更新来减少 MARS 死锁发生的机会，因此请确保您的 SQL
    Server 实例已打好补丁。同时，请务必检查使用 MARS 执行查询的应用程序代码是否存在潜在问题。


    ### MSQL_XP 总结


    `MSQL_XP` 等待类型执行两项不同的工作：检测执行扩展存储过程所花费的时间，并充当 MARS 连接的死锁检测器。经常在 `MSQL_XP` 等待类型上看到高于正常的等待时间，表明某个扩展存储过程完成的时间比平时长。尝试检测正在执行哪个扩展存储过程及其功能，这将使排除扩展存储过程故障更容易。


    ## OLEDB


    每当 SQL Server 需要访问对象链接与嵌入数据库（OLEDB）客户端提供程序时，就会出现 `OLEDB` 等待类型。SQL Server 使用 OLEDB
    客户端提供程序的原因有多种，每当它这样做时，SQL Server 都会在 `OLEDB` 等待类型上记录等待时间。'
  raw: '### What Is the LAZYWRITER_SLEEP Wait Type?


    Just like with other wait types discussed so far in this chapter, the LAZYWRITER_SLEEP
    wait type occurs when an internal SQL Server process, in this case the lazywriter
    process, is waiting for work. The lazywriter process is a background process and
    will become active at a certain time interval. When it becomes active, it scans
    the size of the buffer cache to determine if there are enough free pages inside
    the buffer cache. It is important there are always a certain number of free pages
    inside the buffer cache, so new page requests can fit directly without first having
    to swap out other pages. If the lazywriter process determines there are enough
    free pages in the buffer cache, it will go back to sleep again and record the
    LAZYWRITER_SLEEP wait type while sleeping. However, if there are not enough free
    pages inside the buffer cache, the lazywriter process will detect, between checkpoints,
    which dirty pages in the buffer cache haven’t been accessed for a while, write
    them to the database data file, and then remove them from the buffer cache. So,
    if there are more than enough free pages inside the buffer cache, the lazywriter
    process doesn’t have much work to do. If your SQL Server instance is under memory
    pressure, the lazywriter process will be far busier while swapping out dirty pages
    and freeing up room inside the buffer cache. Figure [12-6](#340881_3_En_12_Chapter.xhtml#Fig6)
    shows the relationship of the checkpoint and lazywriter processes with a flowchart.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig6_HTML.jpg)


    A diagram has a checkpoint on the left side and a flow chart for a lazy writer
    on the right.


    Figure 12-6


    Checkpoint and lazywriter processes


    Because the LAZYWRITER_SLEEP wait type indicates the time the lazywriter process
    spends sleeping, or waiting for work, it is another one of those wait types you
    can safely ignore. There is a catch however – if the lazywriter process is constantly
    working to move dirty pages from the buffer cache to the database data file, it
    might indicate your SQL Server instance is experiencing memory pressure. This
    is bad for performance because every page has to be moved to the buffer cache
    before it can get read or modified. This behavior can potentially result in lower-than-normal
    wait times on the LAZYWRITER_SLEEP wait type.


    ### LAZYWRITER_SLEEP Summary


    The LAZYWRITER_SLEEP wait type is related to the lazywriter internal SQL Server
    process. The lazywriter process starts at a fixed time interval and is responsible
    for writing dirty data pages to the database data file if there are not enough
    free pages available inside the buffer cache. The LAZYWRITER_SLEEP wait type indicates
    that the lazywriter process is currently not running, or is sleeping, until it
    is signaled to wake up and check the buffer cache. Because the LAZYWRITER_SLEEP
    wait type only shows us how much time the lazywriter process spends being inactive,
    it can in most cases be ignored.


    ## MSQL_XP


    In the last section of Chapter [11](#340881_3_En_11_Chapter.xhtml), “Preemptive
    Wait Types,” we discussed the PREEMPTIVE_GETPROCADDRESS wait type. We learned
    the PREEMPTIVE_GETPROCADDRESS wait type records the entrypoint time of an extended
    stored procedure. One important thing noted was the PREEMPTIVE_GETPROCADDRESS
    wait type does not record the execution time of the extended stored procedure,
    only the entrypoint loading. The execution time of an extended stored procedure
    is tracked by another wait type, **MSQL_XP**.


    ### What Is the MSQL_XP Wait Type?


    The MSQL_XP wait type records the execution time of extended stored procedures
    on your SQL Server instance. The MSQL_XP wait type is also used to detect deadlock
    situations when using Multiple Active Result Sets (MARS). MARS is a feature which
    allows for the execution of multiple (concurrent) batches through a single SQL
    Server connection. We won’t go further into detail about MARS, but you can find
    some more information about it here [`https://slrwnds.com/4y444e`](https://slrwnds.com/4y444e).


    The most common reason for seeing higher-than-normal wait times on the MSQL_XP
    wait type is the execution of extended stored procedures. This does not necessarily
    mean there is a problem as long as the execution time of the extended stored procedures
    stays the same. However, if an extended stored procedure takes more time than
    expected, you are sure to notice it in the increase of the MSQL_XP wait time when
    comparing the wait time against a baseline.


    ### MSQL_XP Example


    To demonstrate MSQL_XP waits occur when extended stored procedures are executed,
    create a simple example using the script in Listing [12-2](#340881_3_En_12_Chapter.xhtml#PC4).
    The script will reset the sys.dm_os_wait_stats DMV, execute an extended stored
    procedure (in this case the xp_dirtree extended stored procedure inside the master
    database), and query the sys.dm_os_wait_stats for MSQL_XP wait information.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    EXEC master..xp_dirtree ''c:\windows'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''MSQL_XP'';

    Listing 12-2

    MSQL_XP example

    ```


    The results of the query in Listing [12-2](#340881_3_En_12_Chapter.xhtml#PC4)
    on my test SQL Server instance can be seen in Figure [12-7](#340881_3_En_12_Chapter.xhtml#Fig7).
    The top window shows the xp_dirtree results, the bottom window the results of
    the query against the sys.dm_os_waits_stats DMV.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig7_HTML.png)


    A screenshot of a page has two columns for subdirectory and depth, and row 1 A
    D F S is highlighted. The bottom side has a row with five columns and wait for
    type as M S Q L underscore X P.


    Figure 12-7


    MSQL_XP wait


    The information in the sys.dm_os_wait_stats DMV shows one wait occurred on the
    MSQL_XP wait type with a wait time of 28,159 milliseconds. This is almost identical
    to the time it took to execute the query in Listing [12-2](#340881_3_En_12_Chapter.xhtml#PC4),
    which was 28 seconds on my test SQL Server instance.


    ### Lowering MSQL_XP Waits


    When noticing higher-than-normal wait times for the MSQL_XP wait type, chances
    are extended stored procedures are taking longer than normal to complete. Your
    first point of action should be to identify which extended stored procedures are
    being used and why. Because extended stored procedures also perform tasks outside
    SQL Server, they can run into other Windows processes which can slow them down.
    Knowing what the extended stored procedure function is, and what it does, will
    help you quickly identify where it is running into issues.


    If you are using MARS, you are probably running into MARS-connection deadlocks.
    There have been various SQL Server updates to reduce the chances of MARS deadlocks
    occurring, so make sure your SQL Server instance is patched. Also make sure to
    check the application code which executes queries using MARS for potential issues.


    ### MSQL_XP Summary


    The MSQL_XP wait type does two different things: it detects the time it takes
    to execute extended stored procedures and serves as deadlock detection for MARS
    connections. Seeing higher-than-normal wait times on the MSQL_XP wait type frequently
    indicates an extended stored procedure is taking longer than normal to complete.
    Try to detect which extended stored procedure is being executed and what its function
    is, as this will make troubleshooting the extended stored procedure easier.


    ## OLEDB


    The **OLEDB** wait type occurs whenever SQL Server has to access the Object Linking
    and Embedding Database (OLEDB) Client Provider. There are various reasons why
    SQL Server will use the OLEDB Client Provider, and whenever it does SQL Server
    will record wait time on the OLEDB wait type.'
  trans: '

    # SQL Server 等待类型：LAZYWRITER_SLEEP、MSQL_XP 与 OLEDB


    ## LAZYWRITER_SLEEP 等待类型


    ### 什么是 LAZYWRITER_SLEEP 等待类型？


    与本章讨论的其他等待类型类似，`LAZYWRITER_SLEEP` 等待类型出现于一个内部 SQL Server 进程（此处是 `lazywriter` 进程）等待工作时。`lazywriter`
    进程是一个后台进程，会在特定的时间间隔变为活动状态。当它活动时，会扫描缓冲区缓存的大小，以确定其中是否有足够的空闲页。在缓冲区缓存中始终保持一定数量的空闲页非常重要，这样新的页请求可以直接分配空间，而无需先换出其他页。如果
    `lazywriter` 进程确定缓冲区缓存中有足够的空闲页，它将再次进入休眠状态，并在休眠期间记录 `LAZYWRITER_SLEEP` 等待类型。然而，如果缓冲区缓存中没有足够的空闲页，`lazywriter`
    进程将在检查点之间检测到哪些脏页在缓冲区缓存中一段时间未被访问，将它们写入数据库数据文件，然后从缓冲区缓存中清除它们。因此，如果缓冲区缓存中有远多于足够的空闲页，`lazywriter`
    进程就没有太多工作要做。如果您的 SQL Server 实例存在内存压力，在换出脏页和释放缓冲区缓存空间时，`lazywriter` 进程将繁忙得多。图 12-6
    通过流程图展示了检查点和 `lazywriter` 进程的关系。


    ![A diagram has a checkpoint on the left side and a flow chart for a lazy writer
    on the right.](img/340881_3_En_12_Fig6_HTML.jpg)

    **图 12-6** 检查点与 `lazywriter` 进程


    由于 `LAZYWRITER_SLEEP` 等待类型表示 `lazywriter` 进程休眠或等待工作的时间，它又属于那种您可以安全忽略的等待类型。但有一个需要注意的地方——如果
    `lazywriter` 进程持续工作，将脏页从缓冲区缓存移动到数据库数据文件，这可能表明您的 SQL Server 实例正经历内存压力。这对性能不利，因为每个页在读取或修改之前都必须先移动到缓冲区缓存。这种行为可能导致
    `LAZYWRITER_SLEEP` 等待类型的等待时间低于正常水平。


    ### LAZYWRITER_SLEEP 总结


    `LAZYWRITER_SLEEP` 等待类型与 SQL Server 内部的 `lazywriter` 进程相关。`lazywriter` 进程以固定的时间间隔启动，如果缓冲区缓存中没有足够的可用空闲页，则负责将脏数据页写入数据库数据文件。`LAZYWRITER_SLEEP`
    等待类型表明 `lazywriter` 进程当前未运行，或处于休眠状态，直到收到信号唤醒并检查缓冲区缓存。由于 `LAZYWRITER_SLEEP` 等待类型仅向我们显示
    `lazywriter` 进程处于非活动状态的时间，因此在大多数情况下可以忽略。


    ## MSQL_XP


    在第 11 章“抢占式等待类型”的最后一节中，我们讨论了 `PREEMPTIVE_GETPROCADDRESS` 等待类型。我们了解到 `PREEMPTIVE_GETPROCADDRESS`
    等待类型记录扩展存储过程的入口点时间。需要指出的一个重要点是，`PREEMPTIVE_GETPROCADDRESS` 等待类型不记录扩展存储过程的执行时间，只记录入口点加载。扩展存储过程的执行时间由另一个等待类型
    `MSQL_XP` 跟踪。


    ### 什么是 MSQL_XP 等待类型？


    `MSQL_XP` 等待类型记录 SQL Server 实例上扩展存储过程的执行时间。在使用多个活动结果集（MARS）时，`MSQL_XP` 等待类型也用于检测死锁情况。MARS
    是一项允许通过单个 SQL Server 连接执行多个（并发）批处理的功能。我们不会进一步详细介绍 MARS，但您可以在此处找到更多信息：`https://slrwnds.com/4y444e`。


    在 `MSQL_XP` 等待类型上看到高于正常等待时间的最常见原因是扩展存储过程的执行。只要扩展存储过程的执行时间保持不变，这并不一定意味着存在问题。但是，如果某个扩展存储过程花费的时间比预期的长，当您将等待时间与基线进行比较时，您肯定会注意到
    `MSQL_XP` 等待时间的增加。


    ### MSQL_XP 示例


    为了演示执行扩展存储过程时会发生 `MSQL_XP` 等待，请使用清单 12-2 中的脚本创建一个简单的示例。该脚本将重置 `sys.dm_os_wait_stats`
    DMV，执行一个扩展存储过程（此处是 `master` 数据库中的 `xp_dirtree` 扩展存储过程），并查询 `sys.dm_os_wait_stats`
    以获取 `MSQL_XP` 等待信息。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    EXEC master..xp_dirtree ''c:\windows'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''MSQL_XP'';

    ```

    **清单 12-2** `MSQL_XP` 示例


    在我的测试 SQL Server 实例上执行清单 12-2 中的查询结果如图 12-7 所示。顶部窗口显示了 `xp_dirtree` 的结果，底部窗口显示了对
    `sys.dm_os_waits_stats` DMV 的查询结果。


    ![A screenshot of a page has two columns for subdirectory and depth, and row 1
    A D F S is highlighted. The bottom side has a row with five columns and wait for
    type as M S Q L underscore X P.](img/340881_3_En_12_Fig7_HTML.png)

    **图 12-7** `MSQL_XP` 等待


    `sys.dm_os_wait_stats` DMV 中的信息显示，在 `MSQL_XP` 等待类型上发生了一次等待，等待时间为 28,159 毫秒。这几乎与执行清单
    12-2 中的查询所需时间相同，在我的测试 SQL Server 实例上大约是 28 秒。


    ### 降低 MSQL_XP 等待


    当注意到 `MSQL_XP` 等待类型的等待时间高于正常水平时，很可能是扩展存储过程完成的时间比平时长。您的首要行动点应该是识别正在使用哪些扩展存储过程以及原因。由于扩展存储过程也在
    SQL Server 之外执行任务，它们可能会遇到其他可能减慢它们速度的 Windows 进程。了解扩展存储过程函数的功能及其作用，将帮助您快速识别问题所在。


    如果您正在使用 MARS，您可能遇到了 MARS 连接死锁。已发布了各种 SQL Server 更新来减少 MARS 死锁发生的机会，因此请确保您的 SQL
    Server 实例已打好补丁。同时，请务必检查使用 MARS 执行查询的应用程序代码是否存在潜在问题。


    ### MSQL_XP 总结


    `MSQL_XP` 等待类型执行两项不同的工作：检测执行扩展存储过程所花费的时间，并充当 MARS 连接的死锁检测器。经常在 `MSQL_XP` 等待类型上看到高于正常的等待时间，表明某个扩展存储过程完成的时间比平时长。尝试检测正在执行哪个扩展存储过程及其功能，这将使排除扩展存储过程故障更容易。


    ## OLEDB


    每当 SQL Server 需要访问对象链接与嵌入数据库（OLEDB）客户端提供程序时，就会出现 `OLEDB` 等待类型。SQL Server 使用 OLEDB
    客户端提供程序的原因有多种，每当它这样做时，SQL Server 都会在 `OLEDB` 等待类型上记录等待时间。

