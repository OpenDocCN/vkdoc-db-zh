    ### Enable the Query Store Using SSMS


    As the Query Store is configured on a per-database level, to enable the Query
    Store, you will navigate to a database inside of SSMS and right-click to select
    “Properties” as shown in Figure [3-1](#340881_3_En_3_Chapter.xhtml#Fig1):


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig1_HTML.jpg)


    A screenshot of a menu under the galactic works, where the properties option is
    selected.


    Figure 3-1


    Selecting database properties inside SSMS


    Once selected, the Database Properties screen opens, and from there you will select
    the Query Store tab (shown as number 1 in Figure [3-2](#340881_3_En_3_Chapter.xhtml#Fig2))
    on the left. When the tab opens, you will select the Operation Mode (Requested)
    option and select Read Write shown as number 2 in Figure [3-2](#340881_3_En_3_Chapter.xhtml#Fig2):


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig2_HTML.png)


    A database properties galactic works window. It lists a menu, where the query
    stage is highlighted, and the operation mode under general is changed to off.
    It has 2 circles of data usage.


    Figure 3-2


    Setting the Query Store to Read Write


    Select OK and the Query Store will begin to collect information for query executions
    inside the database. For SQL Server 2022, the default maximum size for collecting
    this data is 1024 MB. If you hit the limit, Query Store will change to Read Only
    and stop collecting new data. You will want to monitor the space used inside Query
    Store on a regular basis.


    ### Enable the Query Store Using T-SQL


    Enabling the Query Store using T-SQL can be done with the following code as shown
    in Listing [3-1](#340881_3_En_3_Chapter.xhtml#PC1):


    ```

    ALTER DATABASE GalacticWorks

    SET QUERY_STORE = ON (OPERATION_MODE = READ_WRITE);

    Listing 3-1

    Enabling the Query Store using T-SQL

    ```


    Execute the statement and the Query Store will begin to collect information for
    query executions inside the database.


    The Query Store offers many advantages as well as configuration options. Since
    this is a book about wait statistics, I will not cover everything that the Query
    Store has to offer. For more in-depth details of the Query Store, you can review
    them here: [`https://slrwnds.com/bdsxgt`](https://slrwnds.com/bdsxgt).


    ## Query Store Architecture


    To give an idea on how the Query Store works, the image in Figure [3-3](#340881_3_En_3_Chapter.xhtml#Fig3)
    shows query runtime information recorded and stored inside the Query Store. This
    knowledge is important if you want to add the Query Store as a tool to analyze
    query performance and wait statistics.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig3_HTML.png)


    A process flow defines how the query splits into plan, text, and runtime and reaches
    the disk through the in-memory and async writer, along with their readings.


    Figure 3-3


    Query Store architecture


    As soon as a query starts execution, the Query Store splits the query runtime
    information into three parts: the query execution plan, the query text, and the
    runtime statistics of the query execution. Both the execution plan and the query
    text are immediately recorded in the Query Store during the compilation of the
    execution plan. The runtime statistics (including wait statistics information)
    are added to the Query Store after query execution is complete.


    All Query Store metrics are first stored inside a reserved memory area of SQL
    Server. This means the metrics are directly available through queries or the built-in
    reports but not hardened to disk yet (one exception is new execution plans; these
    are hardened directly). Based on a configurable setting inside the Query Store
    called the “Data flush interval,” you configure how fast the Query Store will
    harden the information to disk.


    We access all information in the Query Store through two methods: Query Store
    DMVs and the built-in Query Store reports. To expose the wait statistics inside
    the Query Store, we will use both options, though the DMV approach is more useful
    when looking at wait statistics data.'
  trans: '

    ## 什么是查询存储？


    查询存储（Query Store）功能最早在 SQL Server 2016 中发布，其目标是以一种可访问的方式公开并持久化查询性能信息。在查询存储出现之前，查询性能分析是一项具有挑战性且耗时的过程，需要对
    SQL Server 如何处理查询以及如何通过各种 DMV（动态管理视图）分析信息有透彻的了解。虽然查询执行的经验和知识仍然有帮助，但查询存储能帮助你保留必要的性能信息，而无需自己开发解决方案。


    查询存储直接集成在 SQL Server 引擎内部，在查询执行时捕获并分析它们。这是与通过其他方法（如执行计划缓存挖掘）进行查询分析的一个主要区别，后者只能在后期阶段获取查询运行时信息。查询存储的另一个优势是它将查询运行时信息持久化到磁盘。这允许你查看查询运行时指标的历史记录，以及比较历史和当前的运行时统计数据。这与
    DMV 不同，后者只在 SQL Server 运行期间记录信息，并在 SQL Server 重启时清除所有已记录的信息，这意味着所有计数器又从 0 开始。继续比较查询存储与
    DMV，虽然所有 DMV 都在 SQL Server 实例级别记录信息，但查询存储允许你基于每个数据库来捕获查询运行时指标。这使得分析包含多个数据库的实例中特定数据库的性能变得相当容易和快捷。


    ## 启用查询存储


    在 SQL Server 2022 中，新数据库默认启用查询存储（处于 `READ_WRITE` 模式）（新的 Azure SQL 数据库也默认启用）。对于更早版本的
    SQL Server，用户必须手动启用查询存储才能开始收集查询执行信息。启用查询存储可以通过两种方式完成：使用 SQL Server Management
    Studio（`SSMS`）和使用 T-SQL 语句。


    ### 使用 SSMS 启用查询存储


    由于查询存储是在每个数据库级别配置的，要启用查询存储，你需要导航到 `SSMS` 中的一个数据库，右键单击并选择 `属性`，如图 3-1 所示：


    ![](img/340881_3_En_3_Fig1_HTML.jpg)


    一个 Galactic Works 下的菜单截图，其中选择了属性选项。


    图 3-1


    在 `SSMS` 中选择数据库属性


    选择后，将打开“数据库属性”屏幕，从那里你将在左侧选择 `查询存储` 选项卡（在图 3-2 中显示为数字 1）。选项卡打开后，你将选择 `操作模式（请求）`
    选项，并选择 `读写`，如图 3-2 中的数字 2 所示：


    ![](img/340881_3_En_3_Fig2_HTML.png)


    一个数据库属性 Galactic Works 窗口。它列出了一个菜单，其中查询存储选项卡被高亮显示，常规下的操作模式被更改为关闭。它有 2 个数据使用圈。


    图 3-2


    将查询存储设置为 `读写`


    选择 `确定`，查询存储将开始收集数据库内查询执行的信息。对于 SQL Server 2022，收集此数据的默认最大大小为 1024 MB。如果达到限制，查询存储将更改为
    `只读` 并停止收集新数据。你需要定期监控查询存储中使用的空间。


    ### 使用 T-SQL 启用查询存储


    使用 T-SQL 启用查询存储可以通过清单 3-1 中所示的代码完成：


    ```

    ALTER DATABASE GalacticWorks

    SET QUERY_STORE = ON (OPERATION_MODE = READ_WRITE);

    清单 3-1

    使用 T-SQL 启用查询存储

    ```


    执行该语句，查询存储将开始收集数据库内查询执行的信息。


    查询存储提供了许多优势以及配置选项。由于这是一本关于等待统计信息的书，我不会涵盖查询存储提供的所有内容。有关查询存储更深入的细节，你可以在此处查看：[`slrwnds.com/bdsxgt`](https://slrwnds.com/bdsxgt)。


    ## 查询存储架构


    为了了解查询存储如何工作，图 3-3 中的图像显示了查询运行时信息被记录并存储在查询存储内部。如果你想将查询存储作为分析查询性能和等待统计信息的工具，这些知识很重要。


    ![](img/340881_3_En_3_Fig3_HTML.png)


    一个流程定义，说明查询如何拆分为计划、文本和运行时，并通过内存中和异步写入器到达磁盘，以及它们的读数。


    图 3-3


    查询存储架构


    查询一开始执行，查询存储就将查询运行时信息分成三个部分：查询执行计划、查询文本和查询执行的运行时统计信息。执行计划和查询文本都在编译执行计划期间立即记录到查询存储中。运行时统计信息（包括等待统计信息）在查询执行完成后添加到查询存储中。


    所有查询存储指标首先存储在 SQL Server 的保留内存区域中。这意味着这些指标可以通过查询或内置报告直接访问，但尚未固化到磁盘（一个例外是新的执行计划；这些会直接固化）。基于查询存储中一个名为
    `数据刷新间隔` 的可配置设置，你可以配置查询存储将信息固化到磁盘的速度。


    我们通过两种方法访问查询存储中的所有信息：查询存储 DMV 和内置查询存储报告。为了公开查询存储中的等待统计信息，我们将使用这两种选项，尽管在查看等待统计数据时
    DMV 方法更有用。

    '
- fmt: '## How Wait Statistics Are Processed in the Query Store


    Before we start accessing the wait statistics information recorded in the Query
    Store, we will examine how the Query Store processes wait statistics because it
    is different compared to the process described in Chapter [1](#340881_3_En_1_Chapter.xhtml),
    “Wait Statistics Internals,” of this book. Chapter [1](#340881_3_En_1_Chapter.xhtml)
    described the SQL Server engine tracking how long a query spends waiting on a
    specific resource, or wait type. This information is recorded at a granular level;
    for instance, the `PAGEIOLATCH_SH` wait type indicates the query is waiting for
    data pages to be read from disk to the buffer cache and a `PAGEIOLATCH_EX` for
    a query waiting for a data page to be moved to the buffer cache for modification.
    Instead of recording wait times on a detailed level, the Query Store uses a more
    high-level wait type overview to minimize performance and resource utilization
    overhead. The Query Store groups various wait types into categories and records
    wait times on the category level instead of individual wait types.


    This means searching for specific wait types inside the Query Store is not possible
    and wait types which share the same category cannot be distinguished from each
    other. To give you an example, both the `CMEMTHREAD` and the `RESOURCE_SEMAPHORE`
    wait types (of which you will learn more in Chapter [6](#340881_3_En_6_Chapter.xhtml),
    “IO-Related Wait Types”) are recorded inside the `Memory` category inside the
    Query Store, even though both wait types indicate different things.


    Table [3-1](#340881_3_En_3_Chapter.xhtml#Tab1) shows the mapping between wait
    types and wait categories used in the Query Store. The table is by no means a
    complete overview of the mappings but should give you a good idea where to expect
    a certain wait type.


    Table 3-1


    Mapping between wait types and categories


    | Wait category | Associated wait types |

    | --- | --- |

    | `Unknown` | `Unknown` |

    | `CPU` | `SOS_SCHEDULER_YIELD` |

    | `Worker thread` | `THREADPOOL` |

    | `Lock` | `LCK_M_%` |

    | `Latch` | `LATCH_%` |

    | `Buffer latch` | `PAGELATCH_%` |

    | `Buffer IO` | `PAGEIOLATCH_%` |

    | `Compilation` | `RESOURCE_SEMAPHORE_QUERY_COMPILE` |

    | `SQL CLR` | `CLR%`, `SQLCLR%` |

    | `Mirroring` | `DBMIRROR%` |

    | `Transaction` | `XACT%`, `DTC%`, `TRAN_MARKLATCH_%`, `MSQL_XACT_%`, `TRANSACTION_MUTEX`
    |

    | `Idle` | `SLEEP_%`, `LAZYWRITER_SLEEP`, `SQLTRACE_BUFFER_FLUSH`, `SQLTRACE_INCREMENTAL_FLUSH_SLEEP`,
    `SQLTRACE_WAIT_ENTRIES`, `FT_IFTS_SCHEDULER_IDLE_WAIT`, `XE_DISPATCHER_WAIT`,
    `REQUEST_FOR_DEADLOCK_SEARCH`, `LOGMGR_QUEUE`, `ONDEMAND_TASK_QUEUE`, `CHECKPOINT_QUEUE`,
    `XE_TIMER_EVENT` |

    | `Preemptive` | `PREEMPTIVE_%` |

    | `Service broker` | `BROKER_%` (but not `BROKER_RECEIVE_WAITFOR`) |

    | `Tran Log IO` | `LOGMGR`, `LOGBUFFER`, `LOGMGR_RESERVE_APPEND`, `LOGMGR_FLUSH`,
    `LOGMGR_PMM_LOG`, `CHKPT`, `WRITELOG` |

    | `Network IO` | `ASYNC_NETWORK_IO`, `NET_WAITFOR_PACKET`, `PROXY_NETWORK_IO`,
    `EXTERNAL_SCRIPT_NETWORK_IOF` |

    | `Parallelism` | `CXPACKET`, `EXCHANGE`, `HT%`, `BMP%`, `BP%` |

    | `Memory` | `RESOURCE_SEMAPHORE`, `CMEMTHREAD`, `CMEMPARTITIONED`, `EE_PMOLOCK`,
    `MEMORY_ALLOCATION_EXT`, `RESERVED_MEMORY_ALLOCATION_EXT`, `MEMORY_GRANT_UPDATE`
    |

    | `User wait` | `WAITFOR`, `WAIT_FOR_RESULTS`, `BROKER_RECEIVE_WAITFOR` |

    | `Tracing` | `TRACEWRITE`, `SQLTRACE_LOCK`, `SQLTRACE_FILE_BUFFER`, `SQLTRACE_FILE_WRITE_IO_COMPLETION`,
    `SQLTRACE_FILE_READ_IO_COMPLETION`, `SQLTRACE_PENDING_BUFFER_WRITERS`, `SQLTRACE_SHUTDOWN`,
    `QUERY_TRACEOUT`, `TRACE_EVTNOTIFF` |

    | `Full text search` | `FT_RESTART_CRAWL`, `FULLTEXT GATHERER`, `MSSEARCH`, `FT_METADATA_MUTEX`,
    `FT_IFTSHC_MUTEX`, `FT_IFTSISM_MUTEX`, `FT_IFTS_RWLOCK`, `FT_COMPROWSET_RWLOCK`,
    `FT_MASTER_MERGE`, `FT_PROPERTYLIST_CACHE`, `FT_MASTER_MERGE_COORDINATOR`, `PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC`
    |

    | `Other disk IO` | `ASYNC_IO_COMPLETION`, `IO_COMPLETION`, `BACKUPIO`, `WRITE_COMPLETION`,
    `IO_QUEUE_LIMIT`, `IO_RETRY` |

    | `Replication` | `SE_REPL_%`, `REPL_%`, `HADR_%` (but not `HADR_THROTTLE_LOG_RATE_GOVERNOR`),
    `PWAIT_HADR_%`, `REPLICA_WRITES`, `FCB_REPLICA_WRITE`, `FCB_REPLICA_READ`, `PWAIT_HADRSIM`
    |

    | `Log rate governor` | `LOG_RATE_GOVERNOR`, `POOL_LOG_RATE_GOVERNOR`, `HADR_THROTTLE_LOG_RATE_GOVERNOR`,
    `INSTANCE_LOG_RATE_GOVERNOR` |


    ## Accessing Wait Statistics Through Query Store Reports


    ### Viewing Built-in Reports


    The most user-friendly way to view the wait statistics that are available inside
    the Query Store is through the built-in reports available inside SSMS after you
    enable the Query Store feature on a database. `Figure 3-4` shows the default,
    built-in, Query Store reports that are available at the time of writing this book.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig4_HTML.jpg)


    A screenshot of a list under the query store folder. Some are regressed queries,
    overall resource consumption, top resource-consuming queries, and queries with
    forced plans.


    Figure 3-4


    Query Store reports


    As you can see in `Figure 3-4`, there is a dedicated wait statistics report, `query
    wait statistics`. You view this report with either a double-click or a right-click
    and selecting the name `query wait statistics`. The report will open and look
    like `Figure 3-5`.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig5_HTML.png)


    A screenshot of a window labeled based on: total wait time. It displays a bar
    graph of total wait time versus wait category. The lock is high at 22000\. Data
    is approximate.


    Figure 3-5


    Query wait statistics report


    Notice the waits are organized by categories, as we discussed earlier. Here, the
    majority of waits belong to the Query Store `Lock` category, which groups all
    `LCK_M_%` wait events together.


    ### Exposing Wait Categories in Other Reports


    In addition to this report, we can also view the wait categories as a query encountered
    by specifically selecting the `Wait Time (ms)` metric inside the following three
    reports:


    *   Regressed queries

    *   Top resource consuming queries

    *   Queries with high variation


    To view the wait categories in any of the preceding reports, you first need to
    configure the metric to `Wait Time (ms)`, as shown in `Figure 3-6`.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig6_HTML.png)


    A screenshot of a window labeled metric: duration. It displays a bar graph of
    the total duration versus query i d. It is overlayed by a list under the metric,
    where wait time is selected.


    Figure 3-6


    Configuring the metric to Wait Time (ms)


    This changes the graph to return (by default) the top 25 queries ordered by the
    total wait time.


    After changing the metric, we mouseover on any of the columns shown in the graph
    to retrieve the wait category information, as shown in `Figure 3-7`.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig7_HTML.png)


    A screenshot of a window labeled metric: wait time. It displays a bar graph of
    the total wait time versus query i d. It is overlayed by a chart on bar 1, that
    lists the query i d details.


    Figure 3-7


    Wait categories exposed in the Query Store


    As you see from `Figure 3-7`, this specific query ran into `Lock`, `CPU`, and
    `Buffer Latch` wait categories. We see the wait time per category and the total
    wait time across all of the categories, but as mentioned earlier, we have no idea
    about which exact wait types were encountered by the query.'
