    sequential value. It can also have consequences for your applications or queries
    if they need to be rewritten to accommodate the change in data type.


    Other factors to consider are indexing strategies, page fullness, and the number
    of concurrent connections to the database. Also, identifying and optimizing the
    access patterns to the data inside the database can help immensely. For instance,
    if you know your workload consists of many very small inserts against a single
    table, it might be worth taking the time to combine some of the small inserts
    into a larger batch, effectively lowering the number of latches needed.


    Another option for resolving latch contention is a method called hash partitioning.
    Hash partitioning splits up a table or index into various partitions based on
    a value generated with a computed column. Partitioning is a method that can minimize,
    or completely prevent, latch contention.


    Hash partitioning works by cutting up tables or indexes into partitions, with
    each partition holding a set of the data. Partitioning is frequently used for
    archiving data from inside a table to another filegroup residing on other (cheaper)
    storage, while the current data resides on fast storage. In the case of hash partitioning,
    we calculate a value for every row inside the table using a computed column. Based
    on the value, we move the row to a partition.


    The great advantage of using this method of partitioning indexes is every partition
    has its own index tree. So even though the insert statements will still occur
    on the last (right-most) page of the index, it will be spread across the partitions.
    If we look at Figure [9-11](#340881_3_En_9_Chapter.xhtml#Fig11), we see a case
    of last-page insert contention, where concurrent queries are trying to insert
    rows into an index as we discussed in the preceding example.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig11_HTML.png)


    A diagram depicts the root node divided into two intermediate levels. Each level
    has three data pages on the leaf level with exclusive page latches.


    Figure 9-11


    Last-page insert contention on the right-most data page of an index


    If we use partitioning to cut the index into multiple parts (three in this case),
    we would get the situation shown in Figure [9-12](#340881_3_En_9_Chapter.xhtml#Fig12),
    multiple B-trees, each spanning a part of the data.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig12_HTML.png)


    A tree diagram depicts how the index is divided into three parts. Each part has
    multiple data pages, where the last data page in each part is indicated by an
    arrow.


    Figure 9-12


    Last-page inserts spread across partitions


    Let’s look at the effects of hash partitioning when we run the workload to generate
    last-page insert contention, like we did in the example earlier in this chapter.


    The first thing we do is create a Partition function. This will map rows inside
    the table or index to partitions based on the value of a column. The following
    script will create a Partition function named LatchPartFunc that will divide rows
    into nine partitions based on the value of a column (which we will create a bit
    later). See the following:


    ```

    CREATE PARTITION FUNCTION [LatchPartFunc] (INT)

    AS RANGE LEFT FOR VALUES

    (0,1,2,3,4,5,6,7,8);

    ```


    The next step is to create a Partition scheme that will map the partitions to
    a filegroup:


    ```

    CREATE PARTITION SCHEME [LatchPartSchema]

    AS PARTITION [LatchPartFunc] ALL TO ([PRIMARY]);

    ```


    In this case, I used the PRIMARY filegroup, but you are free to create an additional
    filegroup to hold the partitions.


    Next up is creating a new table called Insert_Test3 using the query that follows.
    Notice the ID_Hash column. This is a computed column which will calculate a value
    between 0 and 8 based on the value of the ID column:


    ```

    CREATE TABLE Insert_Test3

    (ID INT IDENTITY(1,1),

    RandomData VARCHAR(50),

    ID_Hash AS (CONVERT(INT, abs(binary_checksum(ID) % (9)), (0))) PERSISTED);

    ```


    The last step is to create a clustered index and map it to the Partition scheme:


    ```

    CREATE UNIQUE CLUSTERED INDEX idx_ID

    ON Insert_Test3

    (ID ASC, ID_Hash)

    ON LatchPartSchema(ID_Hash);

    ```


    Now with our partitioned table in place, let’s repeat the Ostress workload which
    caused last-page insert contention in our previous example. I changed the target
    table for the inserts to our new, partitioned Insert_Test3 table.


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test3 (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    During both Ostress workloads, I used Perfmon to monitor the number of latch waits
    occurring every second. Figure [9-13](#340881_3_En_9_Chapter.xhtml#Fig13) shows
    the Perfmon graph for the first Ostress workload against a non-partitioned index
    and the second against the partitioned index we just created.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig13_HTML.png)'
  trans: '### 降低 PAGELATCH_[xx] 等待


    到目前为止，我们已经见过两个出现 `PAGELATCH_[xx]` 等待的例子：`tempdb` 数据库中的页闩锁争用和最后一页插入争用。还有另一种闩锁争用问题也会通过出现
    `PAGELATCH_[xx]` 等待来识别，但它同时也与 `LATCH_[xx]` 等待类型有关联。因此，我将关于这种特定闩锁争用案例的解释和示例留到本章下一节，届时我们会讨论
    `LATCH_[xx]` 等待类型。


    降低 `PAGELATCH_[xx]` 等待具有挑战性。通常，它们与您的数据库设计和工作负载有关，而在生产环境中这些往往难以更改。然而，有许多因素会导致闩锁争用，值得花时间检查一下。


    在拥有大量逻辑处理器（16 个以上）和高并发 OLTP 工作负载的系统上，常见到闩锁争用的发生。但是，逻辑处理器较少并不意味着不会发生闩锁争用。到目前为止展示的闩锁争用示例，都是在一个拥有四个逻辑处理器的虚拟机上生成的。拥有更多逻辑处理器意味着有更多线程可用于执行工作，这会导致放置更多并发闩锁，从而增加闩锁争用的机会。在遇到闩锁争用时增加逻辑处理器，在这种特定情况下，可能会导致更多的闩锁争用，而不是解决问题。减少逻辑处理器数量也不是一个可行的选项，因为这会减慢您所有其他工作负载的速度。


    解决闩锁争用的最佳方法是识别争用发生的位置以及您正在处理的是哪种类型的争用。


    如果您正在处理 PFS 页争用，一个好的第一步是检查您使用的是一个还是多个数据库数据文件。如果您使用一个数据库数据文件，第一步将是添加额外的、大小相同的数据文件，并测量这是否降低了发生的
    `PAGELATCH_[xx]` 等待的数量。如果您已经有多个数据库数据文件，您可以尝试添加更多，但要小心不要添加太多，因为这可能引入其他性能问题。您的目标应该是找到一个数据库数据文件的“最佳点”，在这个点上，您有足够多的数据库数据文件来最小化闩锁争用的影响，但又不至于多到导致开销过高。这完全取决于您的工作负载，因此无法给出通用的建议。


    在处理最后一页插入争用时，您可以考虑将索引键更改为其他内容，而不是像 `GUID` 这样顺序递增的值。使用 `GUID` 作为索引键会导致索引更大，因为 `GUID`
    需要更多字节。此外，由于 `GUID` 是完全随机的，保持索引有序需要比处理一个不断递增的序列值更多的工作。如果您的应用程序或查询需要重写以适应数据类型的更改，这也可能产生影响。


    其他需要考虑的因素包括索引策略、页满度以及数据库的并发连接数。此外，识别和优化对数据库内部数据的访问模式也会大有帮助。例如，如果您知道您的工作负载包含对单个表的许多非常小的插入操作，那么可能值得花时间将其中一些小插入操作合并成一个较大的批次，从而有效地减少所需的闩锁数量。


    解决闩锁争用的另一个选项是一种称为哈希分区的方法。哈希分区根据计算列生成的值，将表或索引拆分成多个分区。分区是一种可以最小化或完全防止闩锁争用的方法。


    哈希分区通过将表或索引切割成多个分区来工作，每个分区保存一部分数据。分区通常用于将数据从表内归档到驻留在其他（更便宜的）存储上的其他文件组，而当前数据则驻留在快速存储上。在哈希分区的情况下，我们使用计算列为表中的每一行计算一个值。根据该值，我们将行移动到某个分区。


    使用这种索引分区方法的巨大优势在于，每个分区都有自己的索引树。因此，即使插入语句仍然会发生在索引的最后（最右）一页上，它也会分布在各个分区上。如果我们看图
    9-11，我们看到一个最后一页插入争用的情况，并发查询正试图将行插入到索引中，正如我们在前面的例子中讨论的那样。


    ![图 9-11：索引最右侧数据页上的最后一页插入争用](img/340881_3_En_9_Fig11_HTML.png)


    如果我们使用分区将索引切割成多个部分（此例中是三个部分），我们会得到图 9-12 所示的情况，即多个 B 树，每个树跨越一部分数据。


    ![图 9-12：分散在分区上的最后一页插入](img/340881_3_En_9_Fig12_HTML.png)


    让我们看看，当我们运行工作负载来生成最后一页插入争用时，就像本章前面示例中所做的那样，哈希分区的效果如何。


    我们要做的第一件事是创建一个分区函数。这将根据某一列的值，将表或索引内的行映射到分区。以下脚本将创建一个名为 `LatchPartFunc` 的分区函数，它将基于一列（我们稍后会创建）的值将行分成九个分区。参见下面的代码：


    ```sql

    CREATE PARTITION FUNCTION [LatchPartFunc] (INT)

    AS RANGE LEFT FOR VALUES

    (0,1,2,3,4,5,6,7,8);

    ```


    下一步是创建一个分区方案，将分区映射到文件组：


    ```sql

    CREATE PARTITION SCHEME [LatchPartSchema]

    AS PARTITION [LatchPartFunc] ALL TO ([PRIMARY]);

    ```


    在这个例子中，我使用了 `PRIMARY` 文件组，但您可以自由创建额外的文件组来存放分区。


    接下来是使用下面的查询创建一个名为 `Insert_Test3` 的新表。注意 `ID_Hash` 列。这是一个计算列，它将基于 `ID` 列的值计算一个介于
    0 到 8 之间的值：


    ```sql

    CREATE TABLE Insert_Test3

    (ID INT IDENTITY(1,1),

    RandomData VARCHAR(50),

    ID_Hash AS (CONVERT(INT, abs(binary_checksum(ID) % (9)), (0))) PERSISTED);

    ```


    最后一步是创建一个聚集索引并将其映射到分区方案：


    ```sql

    CREATE UNIQUE CLUSTERED INDEX idx_ID

    ON Insert_Test3

    (ID ASC, ID_Hash)

    ON LatchPartSchema(ID_Hash);

    ```


    现在我们的分区表已经就绪，让我们重复之前示例中导致最后一页插入争用的 `Ostress` 工作负载。我将插入操作的目标表改为我们新的、分区的 `Insert_Test3`
    表。


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test3 (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    在两次 `Ostress` 工作负载运行期间，我使用 `Perfmon` 来监控每秒发生的闩锁等待次数。图 9-13 显示了第一次针对非分区索引的 `Ostress`
    工作负载和第二次针对我们刚创建的分区索引的 `Ostress` 工作负载的 `Perfmon` 图表。


    ![图 9-13](img/340881_3_En_9_Fig13_HTML.png)'
- fmt: 'A simulation graph plots the latches versus time. It plots two fluctuating
    curves that provide data for the non-partitioned index and partitioned index.
    The non partitioned index has higher values than partitioned index.


    Figure 9-13


    Latch waits/sec against both a non-partitioned and a partitioned index


    As you can see, the number of latch waits occurring dropped drastically after
    configuring hash partitioning! We can view the distribution of rows across the
    different partitions we created by running this query:


    ```sql

    SELECT *

    FROM sys.partitions

    WHERE object_id = OBJECT_ID(''Insert_Test3'');

    ```


    Figure [9-14](#340881_3_En_9_Chapter.xhtml#Fig14) shows the results of this query
    on my test SQL Server instance.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig14_HTML.png)


    A table has 9 columns titled partition i d, the object i d, the index i d, partition
    number, host id, rows, file stream file group i d, data compression, and data
    compression description. It has 10 rows of entries.


    Figure 9-14


    Rows distribution across partitions


    In Figure [9-14](#340881_3_En_9_Chapter.xhtml#Fig14), we see the nine partitions
    we created on the `Insert_Test3` table, numbered 1 to 9 by the `partition_number`
    column. The `rows` column shows the number of rows inside each partition, and
    as you can see, they are distributed very evenly across the nine partitions! The
    `hobt_id` returns the ID of the B-tree where two rows of this partition are stored;
    all the partitions have different IDs, meaning they each have their own B-tree
    structure.


    Even though partitioning is a great way to resolve latch contention issues, it
    does come with its own unique challenges and drawbacks. One such drawback is partitioning
    can impact the generation of query execution plans, resulting in a suboptimal
    plan. You will want to test thoroughly before implementing in production.


    One final option worth mentioning is the use of In-Memory OLTP as a possible remedy,
    if your workload and design allow for this feature.


    ## PAGELATCH_[xx] Summary


    The `PAGELATCH_[xx]` wait type indicates buffer latches, which are used to protect
    in-memory pages and are running into other, noncompatible, buffer latches. Just
    like locks, latches have different modes they use when protecting pages, and not
    all of these are compatible with each other. Seeing a large amount of `PAGELATCH_[xx]`
    waits occurring can indicate a case of latch contention. Resolving latch contention
    can be challenging and frequently requires making changes to the database design
    or queries.


    ## LATCH_[xx]


    Another latch-related wait type is the `LATCH_[xx]` wait type. Just like the `PAGELATCH_[xx]`
    wait type discussed in the previous section, `LATCH_[xx]` waits are related to
    a specific latch class. While the `PAGELATCH_[xx]` wait type is related to latches
    that protect data structures inside the buffer cache, the `LATCH_[xx]` wait type
    is related to latches which protect data structures outside of the buffer cache
    (but still inside the SQL Server memory).


    ### What Is the LATCH_[xx] Wait Type?


    When you see the `LATCH_[xx]` wait type occurring, a specific class of non-buffer
    latches is running into a wait. The `LATCH_[xx]` is a summary of the wait time
    of the different non-buffer latch classes and not a latch type of its own. All
    of the different non-buffer latch classes which add to the wait time shown by
    the `LATCH_[xx]` wait type are recorded inside their own DMV, `sys.dm_os_latch_stats`.
    There are many different latch classes that the `LATCH_[xx]` wait type represents,
    totaling 179 in SQL Server 2022. Figure [9-15](#340881_3_En_9_Chapter.xhtml#Fig15)
    shows the memory area where `LATCH_[xx]` waits can occur.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig15_HTML.png)


    A diagram depicts how the exclusive and shared latches wait in the non-buffer
    cache, which is inside the S Q L server memory, along with a buffer cache.


    Figure 9-15


    LATCH_SH waits


    Because the `LATCH_[xx]` wait type is a cumulative view of waits occurring on
    a specific latch class, you will need to look inside the `sys.dm_os_latch_stats`
    DMV to find the exact cause of the `LATCH_[xx]` wait. We described the inner workings
    and columns of the `sys.dm_os_latch_stats` DMV in the “Introduction to Latches”
    section at the start of this chapter.'
