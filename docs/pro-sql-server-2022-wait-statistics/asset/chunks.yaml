    ## 结合 DMV 检测当前发生的等待


    我们已经回顾了用于等待统计分析的重要的 DMV；现在，让我们看一个如何使用 DMV 找出 SQL Server 变慢原因的示例。收集这些信息不会立即解决您的所有问题，但它将提供一个线索，指明从何处开始寻找解决方案。


    **技术备注**

    等待和队列调优方法的核心思想是资源消耗，其中资源包括物理资源（`CPU`、`内存`、`磁盘 I/O`、`网络`）以及逻辑资源（`锁定/阻塞`）。因此，这里的诀窍在于，当涉及到调优资源消耗时，您只有两个选择：`用得更少`或`买得更多`。一旦理解了这一点，它就能指导您针对性能问题可能采取的行动和解决方案。


    考虑以下场景：您是一家大型公司的数据库管理员（DBA），该公司使用单个数据库存储所有销售信息。该数据库运行在一个 SQL Server 实例上，每天有几百名用户查询该数据库。


    通常，一切运行良好——用户能快速访问他们想要的信息，所有需要使用数据库的人也很满意。然而，今天对您这位 DBA 来说可不是个好日子。从上午 10 点开始电话就响个不停，一些用户聚集在您的办公室门口，眼神里充满愤怒——查询和插入销售信息的速度慢得令人难以置信。


    既然本书是关于等待统计的，让我们看看如何分析与场景中性能问题相关的等待统计信息。


    我们知道 `sys.dm_os_wait_stats` DMV 显示的是累积的等待统计信息，因此对于此场景帮助不大。一个好得多的起点是 `sys.dm_os_waiting_tasks`
    DMV，因为它会向我们显示当前所有正在等待的任务。


    我们针对 `sys.dm_os_waiting_tasks` DMV 运行以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    ORDER BY session_id DESC;

    ```


    在查看结果时，我们看到许多用户会话都有等待任务，如图 2-10 所示。


    ![](img/340881_3_En_2_Fig10_HTML.png)


    一个查询结果的截图。表格输出包含 8 列 14 行。最后 2 列的空值输出被阴影覆盖。


    **图 2-10** 针对 `sys.dm_os_waiting_tasks` DMV 查询的结果


    我们注意到会话 55、76 和 77 的等待时间似乎很高，并且我们还注意到它们都在以等待类型 `LCK_M_S` 等待。在不深入探讨这种特定等待类型的细节下（将在第
    8 章“与锁定相关的等待类型”中详细讨论），知道此等待类型与锁定相关就足够了。会话 52、56 和 57 正在等待获取锁，并被另一个在相同对象上持有锁的进程所阻塞。我们可以通过查看
    `blocking_columns` 从 `sys.dm_os_waiting_tasks` DMF 中提取锁定和阻塞信息。为了可读性，我修改了前面的查询，使其只从
    `sys.dm_os_waiting_tasks` DMV 返回阻塞信息。图 2-11 显示了这些列。


    ![](img/340881_3_En_2_Fig11_HTML.png)


    一个阻塞信息的截图。表格输出包含 6 列 7 行。它列出了会话 ID、等待类型和阻塞数据。


    **图 2-11** 来自 `sys.dm_os_waiting_tasks` DMV 的阻塞信息


    从我们这里看到的情况，会话 55 和 77 正在被会话 76 阻塞。然而，会话 76 却正在被会话 65 阻塞。我们在 `sys.dm_os_waiting_tasks`
    DMV 的返回结果中没有看到此会话 ID，这意味着该会话并未在等待任何资源。


    让我们检查另一个 DMV，`sys.dm_exec_requests`，以获取关于会话 65 的信息：


    ```sql

    SELECT *

    FROM sys.dm_exec_requests

    WHERE session_id = 65;

    ```


    图 2-12 显示了此查询的结果。

    '
- fmt: '![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig12_HTML.png)


    查询结果的屏幕截图。表格输出有10列和0行。其中一些列包括会话和请求ID、开始时间、状态和命令。


    图 2-12

    对 `sys.dm_exec_requests` 的查询结果


    还记得我写过 `sys.dm_exec_requests` DMV 返回当前正在处理的请求信息吗？显然，会话65没有未完成的请求，因为没有返回任何信息。


    如果我们想找出关于这个会话的更多信息，可以使用第1章“等待统计内部原理”中讨论的 `sys.dm_exec_sessions` DMV，执行以下查询：


    ```sql

    SELECT session_id,

    status,

    host_name,

    program_name,

    login_name,

    is_user_process,

    open_transaction_count

    FROM sys.dm_exec_sessions

    WHERE session_id = 65;

    ```


    此查询返回的结果如图[2-13](#340881_3_En_2_Chapter.xhtml#Fig13)所示。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig13_HTML.png)


    `sys.dm_exec_sessions` 结果的屏幕截图。表格有8列和1行。列出了会话65的信息。


    图 2-13

    `sys.dm_exec_sessions` 的结果


    因此，我们假设会话ID 65没有正在运行的请求，因为其状态为“sleeping”，这就是为什么对 `sys.dm_exec_requests` 的查询没有返回任何信息。如果我们查看
    `program_name` 列，可以看到这个会话是由 SQLRockstar 用户通过 Microsoft SQL Server Management Studio
    (SSMS) 程序发起的。


    我包含了 `is_user_process` 列以确认这是一个用户会话，而 `open_transaction_count` 列显示这个用户会话有一个未关闭的事务。


    我们现在掌握了足够的信息来采取纠正措施。我们知道是谁在阻塞其他任务，并决定给他们打电话询问他们正在运行（或没有运行）什么。然后我们可能会决定结束他们的会话。使用
    `KILL [session_id]` 命令结束用户会话应该是最后的手段，因为我们可能正在中断某些重要的事情。使用 `KILL` 命令结束会话将导致正在运行的事务回滚，撤销其执行的所有更改，这可能需要很长时间才能完成。在这种情况下，我接受回滚的风险，并将自己结束该会话：


    ```sql

    KILL 65;

    ```


    在我们终止会话65之后，用户立即报告他们的查询再次运行。如果我们查询 `sys.dm_os_waiting_tasks` DMV，那些会话ID不再存在，意味着它们不再被阻塞。


    > 极客笔记

    >

    > 这种问题在于锁定/阻塞，解决方案是终止特定用户会话的场景相当常见。不止一次，我作为生产数据库管理员在深夜被叫去解决性能问题，而根本原因是一个用户在意外的时间运行报告。能够快速诊断此类问题很有价值，但构建你的应用程序代码以避免此类问题则是无价的。


    希望这个例子让你深入了解了如何使用 SQL Server 中可用的各种 DMV 来收集关于当前等待任务的信息。在这个例子中，示例包含一个阻塞其他查询的事务，我们决定终止造成阻塞锁的用户会话。在许多情况下，解决方案并非如此简单，但收集等待统计信息以深入探究问题根源的方法几乎可以用于每个与性能相关的事件。


    正如我在本节开头提到的，仅仅查看等待统计本身在大多数情况下不会解决性能问题，但它是一个开始调查的良好起点。为了获得系统性能的完整图景，我们经常将等待统计信息与其他指标相结合，例如性能监视器、其他
    DMV 或特定于供应商的信息（如存储指标）的信息。


    图[2-14](#340881_3_En_2_Chapter.xhtml#Fig14) 展示了一个流程图，说明你如何使用等待统计信息来分析性能问题。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig14_HTML.png)


    问题解决的循环流程图。如果性能下降，运行命令列出等待类型，收集指标，并解决问题。检查等待时间并重复该过程。


    图 2-14

    等待统计流程图


    我们将在第4章“构建可靠基线”中扩展这个流程图，届时我们将基线引入等待统计分析方法。


    ## 使用 Perfmon 查看等待统计


    分析等待统计所需获取额外指标的工具之一是性能监视器（Performance Monitor），或称 Perfmon。Perfmon 可在 Windows 操作系统中使用，包含操作系统相关的指标，包括与
    SQL Server 相关的性能计数器。你可以通过从 Windows 运行对话框或命令行执行 `Perfmon` 命令来启动它。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig15_HTML.png)


    Perfmon 应用程序搜索过程的屏幕截图。底部的搜索栏中输入了 perfmon。屏幕将性能监视器应用列为最佳匹配并高亮显示。


    图 2-15

    从开始菜单执行 Perfmon


    除了提供有关系统性能的信息外，Perfmon 也显示等待统计。这些计数器位于 `SQLServer:Wait Statistics` 类别下，如图[2-16](#340881_3_En_2_Chapter.xhtml#Fig16)所示。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig16_HTML.png)


    添加计数器部分的屏幕截图。可以从左侧的下拉菜单中选择计算机的计数器，添加的计数器在右侧。


    图 2-16

    Perfmon 内的等待统计计数器


    在图[2-16](#340881_3_En_2_Chapter.xhtml#Fig16)中你会注意到，Perfmon 中的等待统计按类别分组。我们在这里找不到关于特定等待类型的信息，因此如果我们想使用
    Perfmon 分析等待统计，需要对特定等待类型在 Perfmon 中所属的类别有一个大致的了解。Perfmon 能够显示每个等待统计类别的平均等待时间、累计等待时间、当前总等待次数以及新启动的等待数量。如果我们对更高级别的视图感兴趣——例如，我们想知道有多少任务正在等待与锁相关的等待类型——我们可以使用
    Perfmon 来获取该信息。如果我们想了解特定任务的特定等待类型的详细信息，我们会使用前面讨论过的 `sys.dm_os_wait_stats` 或 `sys.dm_os_waiting_tasks`
    DMV。


    Perfmon 的一个很好的特性是它可以将测量结果直接转换为图形，为我们提供一种更直观的方式来查看信息，而无需自己创建图形。图[2-17](#340881_3_En_2_Chapter.xhtml#Fig17)
    是一个图形示例，其中显示了“Lock waits”类别的“平均等待时间”和“每秒启动的等待次数”。


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig17_HTML.png)


    Perfmon 应用程序中图表的屏幕截图。图表有彩色线条及其比例、计数器、实例、父级和对象的信息。


    图 2-17

    显示等待统计信息的 Perfmon 图表


    对于本书，我们将使用 Perfmon 来分析与特定等待类型相关的指标，例如 CPU 时间、磁盘延迟和内存使用情况。我们不会过多使用 Perfmon 内部的等待统计计数器，因为
    SQL Server DMV 提供了完整分析所需的详细级别。'
  raw: '![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig12_HTML.png)


    A screenshot of the results query output. The tabular output has 10 columns and
    0 rows. Some of them include a session and request I D, start time, status, and
    command.


    Figure 2-12


    Results of a query against sys.dm_exec_requests


    Remember when I wrote the sys.dm_exec_requests DMV returned information about
    requests currently being processed? Apparently, session 65 doesn’t have an outstanding
    request since no information is being returned.


    If we want to find out more information about this session, we can use the sys.dm_exec_sessions
    DMV discussed in Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,”
    by executing the following query:


    ```

    SELECT session_id,

    status,

    host_name,

    program_name,

    login_name,

    is_user_process,

    open_transaction_count

    FROM sys.dm_exec_sessions

    WHERE session_id = 65;

    ```


    This query returns the results shown in Figure [2-13](#340881_3_En_2_Chapter.xhtml#Fig13).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig13_HTML.png)


    A screenshot of results from sys dot d m underscore exec underscore sessions.
    The table has 8 columns and 1 row. The columns list the information for session
    65.


    Figure 2-13


    Results from sys.dm_exec_sessions


    We therefore assume session ID 65 has no running requests since its status is
    “sleeping,” which is why the query against the sys.dm_exec_requests returns no
    information. If we look at the program_name column, we can see that this session
    was initiated from the Microsoft SQL Server Management Studio (SSMS) program by
    the SQLRockstar user.


    I included the is_user_process column to make sure it is a user session, and the
    open_transaction_count column shows us that this user session has an open transaction.


    We now know enough information to take corrective actions. We know the user blocking
    other tasks, and we decide to give them a call to ask what they are running (or
    not running). We might then decide to end their session. Ending a user session
    by using the KILL [session_id] command should always be your last resort because
    we could be interrupting something important. Ending a session with the KILL command
    will result in a rollback of the running transaction, undoing all the changes
    it performed, which can take a long time to complete. In this case, I accept the
    risk of a rollback and will end the session myself:


    ```

    KILL 65;

    ```


    Immediately after we kill session 65, users report their queries are running again.
    If we query the sys.dm_os_waiting_tasks DMV, those session IDs are no longer there,
    meaning they are no longer being blocked.


    Nerd Note


    This scenario, where the issue is locking/blocking and the solution is to kill
    a specific user session, is quite common. More than once as a production DBA I
    was called late at night to solve performance issues where the root cause was
    a user running reports at an unexpected time of day. Being able to quickly diagnose
    such issues is valuable, but building your application code to avoid such issues
    is priceless.


    Hopefully, this example has given you insight into how to use the various DMVs
    available in SQL Server to gather information about currently waiting tasks. In
    this case, the example consisted of a transaction blocking other queries, and
    we decided to kill the user session responsible for the blocking lock. In many
    situations, the solution isn’t this relatively simple, but the method of gathering
    wait statistics information to drill down to the bottom of the problem can be
    used in almost every performance-related incident.


    As I noted in the beginning of this section, just looking at wait statistics alone
    will not, in most cases, solve a performance problem, but it is a good starting
    point to begin your investigation. To get a complete picture about the performance
    of your system, we will often combine the wait statistics information with other
    metrics, like those from the Performance Monitor, other DMVs, or vendor-specific
    information (like storage metrics).


    Figure [2-14](#340881_3_En_2_Chapter.xhtml#Fig14) shows a flowchart of how you
    might use wait statistics information to analyze a performance problem.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig14_HTML.png)


    A cyclic flow diagram of problem resolution. If performance degrades, run a command
    to list the wait types, gather metrics, and resolve the problem. Check for the
    wait time and repeat the process.


    Figure 2-14


    Wait statistics flowchart


    We will expand upon this flowchart in Chapter [4](#340881_3_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” when we introduce baselines to the wait statistics
    analysis method.


    ## Viewing Wait Statistics Using Perfmon


    One of the tools for accessing necessary extra metrics for analyzing wait statistics
    is Performance Monitor, or Perfmon. Perfmon is available in the Windows operating
    system and contains metrics for the operating system, including SQL Server–related
    performance counters. You start Perfmon by executing the Perfmon command from
    either a Windows Run dialog or the command line.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig15_HTML.png)


    A screenshot of the perfmon application search process. A search bar at the bottom
    has perfmon typed in it. The screen lists the performance monitor app as the best
    match and highlights it.


    Figure 2-15


    Executing Perfmon from the Start menu


    In addition to giving us information about the performance of our system, Perfmon
    also displays wait statistics. These counters are located under the SQLServer:Wait
    Statistics category, as shown in Figure [2-16](#340881_3_En_2_Chapter.xhtml#Fig16).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig16_HTML.png)


    A screenshot of the add counters section. The counters from the computer can be
    selected from the dropdown menu on the left and the added counters are on the
    right.


    Figure 2-16


    Wait statistics counters inside Perfmon


    One thing you’ll notice in Figure [2-16](#340881_3_En_2_Chapter.xhtml#Fig16) are
    the wait statistics inside Perfmon grouped inside categories. We won’t find information
    about specific wait types here, so if we want to use Perfmon to analyze wait statistics,
    we need a general idea of the category a specific wait type belongs to in Perfmon.
    Perfmon is able to display an average wait time, cumulative wait time, the current
    total number of waits, and the amount of new waits started for every wait statistics
    category. If we are interested in a higher-level view – for instance, we want
    to know how many tasks are waiting for lock-related wait types – we could use
    Perfmon to give us that information. If we want to have more detail about specific
    wait type information for a specific task, we would use the sys.dm_os_wait_stats
    or sys. dm_os_waiting_tasks DMVs we discussed earlier.


    One nice feature of Perfmon is that it can convert the measurements directly into
    graphs, giving us a more visual way to look at the information without having
    to create the graphs ourselves. Figure [2-17](#340881_3_En_2_Chapter.xhtml#Fig17)
    is an example of a graph where we are showing the “Average wait time” and “Waits
    started per second” for the Lock waits category.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig17_HTML.png)


    A screenshot of a graph on the perfmon application. The graph has colored lines
    and information on their scale, counter, instance, parent, and object.


    Figure 2-17


    Perfmon graph showing wait statistics information


    For this book, we will use Perfmon for analyzing metrics related to specific wait
    types, like CPU time, disk latency, and memory usage. We will not make much use
    of the wait statistics counters inside Perfmon, because the SQL Server DMVs supply
    the level of detail needed for a complete analysis.'
