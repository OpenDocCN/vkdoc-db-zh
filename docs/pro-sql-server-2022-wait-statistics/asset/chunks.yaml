    一个标有“证书管理单元”的窗口截图。它有 3 个选项来管理证书，其中“计算机帐户”单选按钮被选中，并且下方的“下一步”按钮高亮显示。其他 2 个选项是“我的用户帐户”和“服务帐户”。

    **图 11-5**

    证书帐户选择


    在“证书”控制台中，打开文件夹“证书（本地计算机）” ➤ “个人” ➤ “证书”。如果 IIS 中的自签名证书生成正确，我应该能在这里看到该证书。图 11-6
    显示了我的测试虚拟机上的证书。


