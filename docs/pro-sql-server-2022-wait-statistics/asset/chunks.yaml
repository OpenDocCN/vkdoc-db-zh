- fmt: '### What Is the OLEDB Wait Type?


    SQL Server uses the OLEDB Client Provider for many different actions inside SQL
    Server. For instance, linked server traffic will move through the OLEDB Client
    Provider and result in OLEDB waits. Other actions, especially when SQL Server
    has to retrieve data from an outside source, can also result in OLEDB Client Provider
    usage.


    Some actions inside SQL Server will also use the OLEDB Client Provider, even though
    they occur internally. One good example of this is the `DBCC` command, which I
    will demonstrate in the following example section.


    ### OLEDB Example


    One interesting process using the OLEDB Client Provider is the `DBCC` command
    inside SQL Server. Whenever you execute a `DBCC` command, you are bound to see
    OLEDB waits occur. Listing 12-3 shows an example of OLEDB waits occurring after
    a `DBCC CHECKDB`. The example script will clear the `sys.dm_os_wait_stats` DMV,
    perform a `CHECKDB` against the `GalacticWorks` database, and then query the `sys.dm_os_wait_stats`
    DMV for OLEDB waits.


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB(''GalacticWorks'');

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''OLEDB'';

    ```


    Listing 12-3 Generate OLEDB waits


    The results of the query in Listing 12-3 as performed against my test SQL Server
    instance can be seen in Figure 12-8.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig8_HTML.png)


    A row has five columns with wait type as `OLEDB`, waiting tasks count as `112345`,
    wait time ms as `3930`, max wait time ms as `27`, and signal wait time ms as `0`.


    Figure 12-8 OLEDB waits


    As you can see from Figure 12-8, performing a `DBCC CHECKDB` will lead to OLEDB
    waits.


    ### Lowering OLEDB Waits


    As you see in the previous example, performing a `DBCC CHECKDB` against a database
    will result in OLEDB waits. This doesn’t mean there is a problem related to the
    OLEDB Client Provider, however; rather, it just indicates the `DBCC CHECKDB` command
    makes use of the OLEDB Client Provider. Running `DBCC CHECKDB` is a vital part
    of making sure your databases are healthy. Avoiding consistency checks just to
    lower OLEDB wait times is bad practice, and I strongly advise against it. Seeing
    high OLEDB wait times occur outside `DBCC` commands can indicate there is a performance
    issue somewhere in your SQL Server environment. If you are dealing with remote
    sources, such as linked servers or Excel files, you are also affected by the performance
    of the remote source. For instance, if you are querying information from a linked
    server and the linked server is experiencing performance problems, it will probably
    also be reflected in the OLEDB wait time. Also, certain operations, like sorts,
    can also impact the query duration on the linked server. Network connections to
    the remote source can also play a role in higher-than-normal OLEDB wait times.
    If the network connection through which you are accessing your remote source experiences
    performance degradation, you will again notice this in the OLEDB wait times.


    Because the OLEDB wait can occur for various reasons, some of which are benign
    like `DBCC` commands, and some that can be related to performance issues, I advise
    you not to ignore the OLEDB wait type but rather to monitor it like other performance-indicating
    wait types.


    ### OLEDB Summary


    The OLEDB wait type can occur due to various sources using the Object Linking
    and Embedding Database (OLEDB) Client Provider. Most of the sources are related
    to remote data sources, like linked servers. Some internal processes also use
    the OLEDB Client Provider, most notably the `DBCC` command. Seeing higher-than-normal
    wait times on the OLEDB wait type doesn’t have to mean there is a performance
    problem, especially when they can be correlated to a planned `DBCC` command execution.
    Seeing higher-than-normal wait times outside `DBCC` command when you are using
    remote data sources like linked servers can mean that the remote data source is
    experiencing performance problems. In this case, focus on the data source; if
    the source has problems, it is bound to affect the OLEDB wait times as well.


    ### TRACEWRITE


    The `TRACEWRITE` wait type is a special wait type and only collects wait time
    when a trace is running, most commonly a SQL Server Profiler trace. A trace is
    a background process in SQL Server collecting various, often user-specified, information
    about the performance of a SQL Server instance. For example, it is possible to
    use SQL Server Profiler to capture currently executing queries, filtered against
    a single database, with runtime information. There are various trace methods available
    in SQL Server, but the most common one that affects the `TRACEWRITE` wait type
    is the SQL Server Profiler trace.


    SQL Server Profiler is an application and starting from SQL Server 2016 separate
    from the SQL Server Management Studio (`SSMS`) product, allowing users to create
    and monitor traces against SQL Server instances. SQL Server Profiler was announced
    as deprecated by Microsoft with the introduction of SQL Server 2012, and Microsoft
    recommends using Extended Events to capture traces. Even though the SQL Server
    Profiler is deprecated, it is still available in SQL Server 2022 and is installed
    whenever you deploy the separate `SSMS` product. Many people still rely on SQL
    Server Profiler traces instead of Extended Events to troubleshoot and monitor
    query performance.


    The bad news about using SQL Server Profiler is it can cause some performance
    overhead while a trace is being performed. Microsoft released an article which
    concluded running SQL Server Profiler traces on busy systems can have an impact
    of 10% on the amount of transactions per seconds; you can find the article at
    `https://slrwnds.com/j66us9`.


    Because SQL Server Profiler traces can have such a big impact on the performance
    of your system, I believe it is important to monitor the `TRACEWRITE` wait time.


    ### What Is the TRACEWRITE Wait Type?


    The `TRACEWRITE` wait type will show up on your system when traces are performed
    against your SQL Server instance. Because SQL Server Profiler traces can have
    such an impact on the performance of your SQL Server instance, it is advisable
    you monitor the wait type to detect if any SQL Server Profiler traces are being
    performed.


    There are a variety of reasons why you would want to run a SQL Server Profiler
    trace, for instance, if you want to troubleshoot a very specific query problem
    or when monitoring how many times a specific query gets executed. Even though
    there are alternatives to the SQL Server Profiler, like server-side traces and
    Extended Events, the SQL Server Profiler tool is very easy to use compared to
    the often complex Extended Events.'
