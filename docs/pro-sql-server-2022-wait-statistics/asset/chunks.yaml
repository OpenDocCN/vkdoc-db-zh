  trans: '

    ### 降低 LOGBUFFER 和 WRITELOG 等待


    通常，你可以采取两种方法来降低 `LOGBUFFER` 和 `WRITELOG` 等待，但请记住 `WRITELOG` 等待是正常现象，只有在等待时间远高于正常水平时才应引起关注。


    第一种方法是仔细检查你的事务执行方式。在前面的例子中，我们隐式地提交了每条 `INSERT` 语句。这意味着一旦 `INSERT` 语句的日志记录进入日志缓冲区，就需要立即刷新。如果我们显式地提交整个
    `WHILE` 循环，那么写入事务日志以进行刷新的数据块会更大，从而获得更好的性能。这是因为频繁写入小数据块通常比间隔较大地写入大数据块要慢。游标也可能产生与我们示例相同的效果，因此应尽量减少使用它们。


    另一种方法基于存储子系统。如果 SQL Server 无法足够快地写入日志记录，你可能会遇到 `LOGBUFFER` 和 `WRITELOG` 等待。作为最佳实践，请务必将事务日志文件和数据库数据文件放在不同的磁盘上，这样它们在高负载时不会相互影响。同时，使用
    Perfmon 中的磁盘性能计数器（如显示写入延迟的 `Avg. Disk sec/write` 和显示写入 IOPS 的 `Disk Writes/sec`）监控事务日志所在的磁盘，并检查这些值是否在可接受范围内。


    如果你的 SQL Server 实例运行的是 SQL Server 2014，你可以选择使用在 SQL Server 2014 中引入的 `延迟持久性` 选项。简而言之，启用此选项后，事务提交时不再立即将日志缓冲区内容刷新到磁盘，而是等待日志缓冲区已满（`60
    KB`）后再将内容刷新到事务日志。启用此选项会带来一定风险，即已提交但尚未写入事务日志的事务在发生故障时可能会丢失，因为它们只有在日志缓冲区已满时才会被写入事务日志。


    ### LOGBUFFER 和 WRITELOG 总结


    `LOGBUFFER` 和 `WRITELOG` 这两种等待类型都与 SQL Server 处理事务的方式有关。`WRITELOG` 等待类型在每次将日志记录写入事务日志时都会发生，通常无需担心。但当它与较高的
    `LOGBUFFER` 等待时间同时出现时，较高的 `WRITELOG` 等待时间可能表明存在事务日志压力。为了降低这些等待时间，尽量避免使用游标和 `WHILE`
    语句，因为游标或 `WHILE` 子句中的语句通常会被隐式提交，从而产生大量的小型写入操作。同时，检查你的存储配置，确保事务日志文件与数据库数据文件不在同一个驱动器上。如果仍然出现较高的等待时间，请分析事务日志所在磁盘的性能。


    ## RESOURCE_SEMAPHORE


    `RESOURCE_SEMAPHORE` 等待类型是一种与内存相关的等待类型，当查询的内存请求无法立即获得批准时就会发生。这类等待发生在经历内存压力的服务器上，或者当大量并发查询为排序或联接等昂贵操作请求内存时。


    ### 什么是 RESOURCE_SEMAPHORE 等待类型？


    在 SQL Server 中执行查询时，在实际执行之前会发生一系列步骤。第一步是生成已编译的计划。该计划包含完成查询请求所需的逻辑指令或操作。在生成已编译计划期间，会执行一个计算来确定执行该计划中所有查询操作所需的内存数量。一些需要内存的操作，如排序和联接，会将行数据临时存储在
    SQL Server 的内存中。执行这些排序或联接所需的最小内存量称为所需内存，没有它查询根本无法执行。例如，如果排序期间需要更多内存来存储内存中的行数据，则会被计算为额外内存。即使没有这部分额外内存，查询仍然可以执行，但临时行数据将被写入磁盘而非内存。


    执行查询时，会根据在已编译计划中计算出的所需内存和额外内存值来确定内存授予。这个内存授予是执行一个名为 `resource semaphore` 的内部对象的内存保留所必需的。`resource
    semaphore` 负责保留查询执行所需的内存，同时也在过多查询并发请求内存保留或内存不足时管理内存限制。它通过维护一个请求内存的查询队列来实现这一点。如果队列中没有查询并且有新查询请求内存，`resource
    semaphore` 会将其授予该查询（如果有足够的可用内存）。但是，如果存在队列，新查询将被置于队列末尾，必须等待轮到它才能获得内存授予。


    在 `resource semaphore` 将请求的内存授予查询之前，它会检查是否有足够的可用内存。如果由于某种原因可用内存量少于查询请求的量，该查询将被再次放入队列，直到有足够的内存可用。当查询在
    `resource semaphore` 队列中等待其请求的内存时，它在队列中花费的时间将被记录为 `RESOURCE_SEMAPHORE` 等待类型。


    `resource semaphore` 可使用的内存量有一个最大值，它从缓冲池中分配。`resource semaphore` 最多可以从缓冲池分配 75%
    的内存用于内存授予，但单个查询获得的内存永远不能超过该总量的 25%。例如，如果我们有一个缓冲池最大可增长到 `500 MB` 的 SQL Server，那么用于内存授予的最大内存量将是
    `375 MB`。在此示例中，单个查询最多只能获得 `93 MB`。可能授予查询如此多的内存可能会带来问题，因为这部分内存未被用于缓冲池，这意味着需要更多的
    IO 操作来从存储子系统中读取和写入数据页。

    '
- fmt: '# RESOURCE_SEMAPHORE Example


    For this example, we are going to execute a query against the `GalacticWorks`
    database that involves a sort operation. As I mentioned in the previous section,
    a query that involves a sort will request memory from the resource semaphore so
    as to perform the sort operation. We will also use the `Ostress` tool to create
    a situation where multiple queries are requesting memory, creating a queue at
    the resource semaphore.


    Let’s take a look at the query and the memory grant information that we will be
    executing in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11).


    ```sql

    SELECT

    SalesOrderID,

    SalesOrderDetailID,

    ProductID,

    CarrierTrackingNumber

    FROM

    Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber ASC

    Listing 6-10

    Sort query against the GalacticWorks database

    ```


    As you can see, this is a relatively simple query returning information from the
    `Sales.SalesOrderDetail` table, ordered by the `CarrierTrackingNumber`.


    If we enable the Include Actual Execution Plan option and execute the query, we
    find the amount of memory required to execute it. The results on my test SQL Server
    are shown in Figure [6-19](#340881_3_En_6_Chapter.xhtml#Fig19). You can access
    these properties by showing the Properties window (View ➤ Properties Window) or
    by pressing F4 and selecting the `SELECT` operator.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig19_HTML.jpg)


    A screenshot of a memory grant info table. Desired, granted, requested, and serial
    desired memories with values 13568, max query 545712, max used 8608, required
    and serial required 512, grant wait time 0.


    Figure 6-19


    MemoryGrantInfo inside the properties of the execution plan


    Because we requested the actual execution plan, we see the amount of memory granted
    to the query for execution. In this case, the query got 13,568 KB (13.5 MB) granted
    by the resource semaphore, as shown in the `GrantedMemory` property. The minimal
    amount of memory needed to execute the query, the required memory, was 512 KB,
    shown by the `RequiredMemory` property. The query asked for 13,568 KB, as shown
    in the `DesiredMemory` property, which is the sum of the required and additional
    memory. We can see the query received what it asked for, since both the `GrantedMemory`
    and `DesiredMemory` have the same value.


    There are two other properties in Figure [6-19](#340881_3_En_6_Chapter.xhtml#Fig19)
    I would like to point out, the `SerialDesiredMemory` and the `SerialRequiredMemory`
    properties. In the case of this query, both these properties have the same values
    as the `DesiredMemory` and `RequiredMemory` properties. This is because the query
    was performed without using parallelism. When you use parallelism in your queries,
    more memory is needed to perform the sort operation since work is split up among
    threads. Figure [6-20](#340881_3_En_6_Chapter.xhtml#Fig20) shows the `MemoryGrantInfo`
    properties when I forced the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11)
    to use parallelism, spreading the work among four threads.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig20_HTML.jpg)


    A screenshot of a memory grant info table. A few of them are desired, granted,
    and requested memory 14272, max query 535264, max used 8816, required memory 1216,
    and grant wait time 0.


    Figure 6-20


    MemoryGrantInfo properties when executing a parallel query


    As you can see, the `SerialRequiredMemory` has the same value as when we executed
    the query serially. The `RequiredMemory` and `RequestedMemory` have increased
    in size so that the sort operation can be completed using parallelism. You should
    keep this information in mind when you run into memory-related issues and when
    many of your queries involve sort and join operations that are performed using
    parallelism, since parallelism simply requires more memory.


    Now that we know how much memory is needed to execute the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11),
    let’s use `Ostress` to execute the query using multiple connections. Before I
    start `Ostress`, I will change the maximum server memory value to 512 MB using
    the following query:


    ```sql

    EXEC sys.sp_configure N''max server memory (MB)'', N''512''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ```


    I saved the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11) to a file
    named `resource_semaphore.sql` and executed `Ostress` using the following command
    line:


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\resource_semaphore.sql" -n200 -r1 -q

    ```


    This will execute the `resource_semaphore.sql` script against the `GalacticWorks`
    database with 200 concurrent connections, with each connection performing the
    query one time.


    While `Ostress` is running, I query the `sys.dm_os_waiting_tasks` DMV, looking
    for `RESOURCE_SEMAPHORE` waits; some of the results are shown in Figure [6-21](#340881_3_En_6_Chapter.xhtml#Fig21).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig21_HTML.png)


    A screenshot of a table of 9 rows and 5 columns. It lists the waiting task address,
    session i d, exec context i d, wait duration m s, and wait type. The file 0 x
    00000 230 E E 0 83468 is selected.


    Figure 6-21


    `RESOURCE_SEMAPHORE` waits in the `sys.dm_os_waiting_tasks` DMV


    Because we set our maximum server memory to 512 MB, and each query requests 13.25
    MB memory, we do not have enough memory free to grant all the memory requested.
    This will result in the `RESOURCE_SEMAPHORE` wait type you can see in Figure [6-21](#340881_3_En_6_Chapter.xhtml#Fig21).


    There are various other resources we can use to analyze `RESOURCE_SEMAPHORE` waits.
    The resource semaphores themselves have their own DMV, `sys.dm_exec_query_resource_semaphores`,
    which will return information about their memory consumption and outstanding and
    waiting grants. Figure [6-22](#340881_3_En_6_Chapter.xhtml#Fig22) shows the results
    of the query that follows against the `sys.dm_exec_query_resource_semaphores`
    DMV while running the `Ostress` workload:


    ```sql

    SELECT

    target_memory_kb,

    max_target_memory_kb,

    total_memory_kb,

    available_memory_kb,

    granted_memory_kb,

    grantee_count,

    waiter_count

    FROM sys.dm_exec_query_resource_semaphores

    WHERE pool_id = 2

    Listing 6-11

    Query the sys.dm_exec_query_resource_semaphores DMV

    ```


    I am filtering out `pool_id` 1 because this pool does not handle user queries.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig22_HTML.png)


    A table of 2 rows and 7 columns. It lists the target memory k b, max target memory
    k b, total memory k b, available memory k b, granted memory k b, grantee count,
    and waiter count.


    Figure 6-22


    `sys.dm_exec_query_resource_semaphores`


    As you might have noticed, two rows are returned. This is because there are two
    different resource semaphores. The top row is the “regular” resource semaphore.
    This will handle queries requesting more than 5 MB memory. The second row (identified
    by the `NULL` value of the `max_target_memory_kb` column) returns information
    for the “small” resource semaphore, which handles queries smaller than 5 MB. Because
    our query requested more than 5 MB of memory, we receive our memory grants from
    the regular resource semaphore.


    Let’s go through the various columns that are returned by the query against the
    `sys.dm_exec_query_resource_semaphore` DMV:


    *   The `target_memory_kb` column returns the amount of memory in KB that this
    resource semaphore plans to use as a maximum amount of memory it can grant to
    queries.


    *   The `max_target_memory_kb` column returns the maximum amount of memory this
    resource semaphore could grant.


    *   The `total_memory_kb` column returns the total memory held by the resource
    semaphore and is the sum of the `available_memory_kb` and the `granted_memory_kb`.


    *   The `granted_memory_kb` returns the amount of memory that is granted to queries
    at this time.'
  raw: '### RESOURCE_SEMAPHORE Example


    For this example, we are going to execute a query against the GalacticWorks database
    that involves a sort operation. As I mentioned in the previous section, a query
    that involves a sort will request memory from the resource semaphore so as to
    perform the sort operation. We will also use the Ostress tool to create a situation
    where multiple queries are requesting memory, creating a queue at the resource
    semaphore.


    Let’s take a look at the query and the memory grant information that we will be
    executing in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11).


    ```

    SELECT

    SalesOrderID,

    SalesOrderDetailID,

    ProductID,

    CarrierTrackingNumber

    FROM

    Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber ASC

    Listing 6-10

    Sort query against the GalacticWorks database

    ```


    As you can see, this is a relatively simple query returning information from the
    Sales.SalesOrderDetail table, ordered by the CarrierTrackingNumber.


    If we enable the Include Actual Execution Plan option and execute the query, we
    find the amount of memory required to execute it. The results on my test SQL Server
    are shown in Figure [6-19](#340881_3_En_6_Chapter.xhtml#Fig19). You can access
    these properties by showing the Properties window (View ➤ Properties Window) or
    by pressing F4 and selecting the SELECT operator.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig19_HTML.jpg)


    A screenshot of a memory grant info table. Desired, granted, requested, and serial
    desired memories with values 13568, max query 545712, max used 8608, required
    and serial required 512, grant wait time 0.


    Figure 6-19


    MemoryGrantInfo inside the properties of the execution plan


    Because we requested the actual execution plan, we see the amount of memory granted
    to the query for execution. In this case, the query got 13,568 KB (13.5 MB) granted
    by the resource semaphore, as shown in the GrantedMemory property. The minimal
    amount of memory needed to execute the query, the required memory, was 512 KB,
    shown by the RequiredMemory property. The query asked for 13,568 KB, as shown
    in the DesiredMemory property, which is the sum of the required and additional
    memory. We can see the query received what it asked for, since both the GrantedMemory
    and DesiredMemory have the same value.


    There are two other properties in Figure [6-19](#340881_3_En_6_Chapter.xhtml#Fig19)
    I would like to point out, the SerialDesiredMemory and the SerialRequiredMemory
    properties. In the case of this query, both these properties have the same values
    as the DesiredMemory and RequiredMemory properties. This is because the query
    was performed without using parallelism. When you use parallelism in your queries,
    more memory is needed to perform the sort operation since work is split up among
    threads. Figure [6-20](#340881_3_En_6_Chapter.xhtml#Fig20) shows the MemoryGrantInfo
    properties when I forced the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11)
    to use parallelism, spreading the work among four threads.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig20_HTML.jpg)


    A screenshot of a memory grant info table. A few of them are desired, granted,
    and requested memory 14272, max query 535264, max used 8816, required memory 1216,
    and grant wait time 0.


    Figure 6-20


    MemoryGrantInfo properties when executing a parallel query


    As you can see, the SerialRequiredMemory has the same value as when we executed
    the query serially. The RequiredMemory and RequestedMemory have increased in size
    so that the sort operation can be completed using parallelism. You should keep
    this information in mind when you run into memory-related issues and when many
    of your queries involve sort and join operations that are performed using parallelism,
    since parallelism simply requires more memory.


    Now that we know how much memory is needed to execute the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11),
    let’s use Ostress to execute the query using multiple connections. Before I start
    Ostress, I will change the maximum server memory value to 512 MB using the following
    query:


    ```

    EXEC sys.sp_configure N''max server memory (MB)'', N''512''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ```


    I saved the query in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11) to a file
    named resource_semaphore.sql and executed Ostress using the following command
    line:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\resource_semaphore.sql" -n200 -r1 -q

    ```


    This will execute the resource_semaphore.sql script against the GalacticWorks
    database with 200 concurrent connections, with each connection performing the
    query one time.


    While Ostress is running, I query the sys.dm_os_waiting_tasks DMV, looking for
    RESOURCE_SEMAPHORE waits; some of the results are shown in Figure [6-21](#340881_3_En_6_Chapter.xhtml#Fig21).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig21_HTML.png)


    A screenshot of a table of 9 rows and 5 columns. It lists the waiting task address,
    session i d, exec context i d, wait duration m s, and wait type. The file 0 x
    00000 230 E E 0 83468 is selected.


    Figure 6-21


    RESOURCE_SEMAPHORE waits in the sys.dm_os_waiting_tasks DMV


    Because we set our maximum server memory to 512 MB, and each query requests 13.25
    MB memory, we do not have enough memory free to grant all the memory requested.
    This will result in the RESOURCE_SEMAPHORE wait type you can see in Figure [6-21](#340881_3_En_6_Chapter.xhtml#Fig21).


    There are various other resources we can use to analyze RESOURCE_SEMAPHORE waits.
    The resource semaphores themselves have their own DMV, sys.dm_exec_query_resource_semaphores,
    which will return information about their memory consumption and outstanding and
    waiting grants. Figure [6-22](#340881_3_En_6_Chapter.xhtml#Fig22) shows the results
    of the query that follows against the sys.dm_exec_query_resource_semaphores DMV
    while running the Ostress workload:


    ```

    SELECT

    target_memory_kb,

    max_target_memory_kb,

    total_memory_kb,

    available_memory_kb,

    granted_memory_kb,

    grantee_count,

    waiter_count

    FROM sys.dm_exec_query_resource_semaphores

    WHERE pool_id = 2

    Listing 6-11

    Query the sys.dm_exec_query_resource_semaphores DMV

    ```


    I am filtering out pool_id 1 because this pool does not handle user queries.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig22_HTML.png)


    A table of 2 rows and 7 columns. It lists the target memory k b, max target memory
    k b, total memory k b, available memory k b, granted memory k b, grantee count,
    and waiter count.


    Figure 6-22


    sys.dm_exec_query_resource_semaphores


    As you might have noticed, two rows are returned. This is because there are two
    different resource semaphores. The top row is the “regular” resource semaphore.
    This will handle queries requesting more than 5 MB memory. The second row (identified
    by the NULL value of the max_target_memory_kb column) returns information for
    the “small” resource semaphore, which handles queries smaller than 5 MB. Because
    our query requested more than 5 MB of memory, we receive our memory grants from
    the regular resource semaphore.


    Let’s go through the various columns that are returned by the query against the
    sys.dm_exec_query_resource_semaphore DMV:


    *   The **target_memory_kb** column returns the amount of memory in KB that this
    resource semaphore plans to use as a maximum amount of memory it can grant to
    queries.


    *   The **max_target_memory_kb** column returns the maximum amount of memory this
    resource semaphore could grant.


    *   The **total_memory_kb** column returns the total memory held by the resource
    semaphore and is the sum of the **available_memory_kb** and the **granted_memory_kb**.


    *   The **granted_memory_kb** returns the amount of memory that is granted to
    queries at this time.'
