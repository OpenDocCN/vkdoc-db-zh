    ### 什么是 ASYNC_IO_COMPLETION 等待类型？


    如果我们在联机丛书（BOL）中查找 `ASYNC_IO_COMPLETION` 等待类型，会看到以下定义：“当任务正在等待异步非数据 I/O 完成时出现”。这是一个相当简短且模糊的定义，因此让我们补充更多细节。


    当任务等待与存储相关的操作完成时，就会发生 `ASYNC_IO_COMPLETION` 等待。该任务由 SQL Server 发起并监控。图 6-1 以视觉方式展示了这种等待类型。


    ![](img/340881_3_En_6_Fig1_HTML.jpg)


    一张展示异步 I/O 完成时数据如何流经 SQL Server 的示意图。图 6-1：正在发生的 ASYNC_IO_COMPLETION 等待


    只要与存储相关的操作正在运行，就会记录 `ASYNC_IO_COMPLETION` 等待时间。正如你所想，你的存储子系统（或网络带宽）越快，`ASYNC_IO_COMPLETION`
    等待时间就越低。这里需要提到的关键字是**异步**；任务被移交给操作系统，并将控制权返回给 SQL Server，这使得 SQL Server 可以自由执行其他逻辑，并在稍后检查
    I/O 请求是否完成。


    正如我之前所说，通常 `ASYNC_IO_COMPLETION` 等待无需担心。在许多需要访问存储子系统的 SQL Server 操作中，例如备份或创建新数据库，它们会正常发生。只有当与基线测量相比，等待时间高于预期时，才需要关注。


    ### ASYNC_IO_COMPLETION 示例


    让我们看一个产生 `ASYNC_IO_COMPLETION` 等待的例子。我们不需要任何额外工具；仅运行数据库备份就会触发 `ASYNC_IO_COMPLETION`
    等待。


    在这个例子中，我将在我的测试服务器上对 `GalacticWorks` 数据库执行备份。


    为了执行此操作，我将使用清单 6-1 中的查询。此查询将重置 `sys.dm_os_wait_stats` DMV，执行数据库备份，然后查询 `sys.dm_os_wait_stats`
    DMV 以获取 `ASYNC_IO_COMPLETION` 等待。


    ```sql

    USE [master];

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GalacticWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'',

    STATS = 2;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    ```


    清单 6-1：生成 `ASYNC_IO_COMPLETION` 等待


    在我的测试 SQL Server 实例上，备份操作耗时 <1 秒。图 6-2 展示了清单 6-1 中查询的结果。


    ![](img/340881_3_En_6_Fig2_HTML.png)


    一个有 5 列和 1 行的表格。它列出了异步 I/O 完成的等待类型，等待任务数为 4，等待时间（毫秒）为 863，最大等待时间（毫秒）为 862，信号等待时间（毫秒）为
    0。图 6-2：`ASYNC_IO_COMPLETION` 等待时间


    如你所见，在几乎整个数据库备份期间，都记录了 `ASYNC_IO_COMPLETION` 等待。


    ### 降低 ASYNC_IO_COMPLETION 等待


    正如你在示例中所见，`ASYNC_IO_COMPLETION` 等待时间过高的一个常见原因是数据库备份。如果你想知道你的 `ASYNC_IO_COMPLETION`
    等待是否因正在运行备份而发生，请查找同时发生的与备份相关的等待。


    如果我们修改清单 6-1 中的最后一个 `sys.dm_os_waiting_tasks` 查询，我们将看到 DMV 返回与备份相关的等待类型。


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN

    (

    ''ASYNC_IO_COMPLETION'',

    ''BACKUPIO'',

    ''BACKUPBUFFER''

    );

    ```


    清单 6-2：修改后的查询


    图 6-3 展示了清单 6-2 中查询的结果。


    ![](img/340881_3_En_6_Fig3_HTML.png)


    一个有 5 列和 3 行的表格。它列出了等待类型、等待任务数、等待时间（毫秒）、最大等待时间（毫秒）和信号等待时间（毫秒）。文件异步 I/O 完成被选中。图
    6-3：`ASYNC_IO_COMPLETION` 等待与备份相关等待同时出现


    如果你看到这两种等待同时发生，很可能是数据库备份导致了你的 `ASYNC_IO_COMPLETION` 等待。降低等待时间的一种方法是启用备份压缩。


    另一种降低 `ASYNC_IO_COMPLETION` 等待的方法是配置即时文件初始化。即时文件初始化在 Windows 2003 中引入，通过省去将文件清零（在使用文件前在文件内写入零）的需要，极大地加快了在磁盘上分配空间的过程。这不会影响备份速度，但在创建数据库、向数据库添加文件或还原数据库时会提高性能。默认情况下，除非你运行
    SQL Server 服务的账户具有本地管理员权限，否则不会启用即时文件初始化。从 SQL Server 2016 开始，Microsoft 在 SQL Server
    安装过程中添加了一个选项来启用即时文件初始化，如图 6-4 所示。


    ![](img/340881_3_En_6_Fig4_HTML.png)


    一个标有 SQL Server 2022 RC 0 安装的窗口。它在服务账户选项卡下显示服务器配置。列表下的选项“授予执行卷维护任务”被高亮显示。图 6-4：SQL
    Server 安装程序中的“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框


    **技术说明**


    使用即时文件初始化省去了数据页清零的步骤，以换取更快的文件创建速度。这是用速度和便利性换取安全性的经典例子。通过避免清零，你为数据泄露打开了可能性，允许访问磁盘上已删除的数据。虽然风险很小，但它仍然是一个风险，你应该与你的审计团队讨论。


    如果你在安装 SQL Server 时没有启用“授予 SQL Server 数据库引擎服务执行卷维护任务权限”复选框，你将必须在安装后手动配置即时文件初始化。配置即时文件初始化的方法是通过运行
    SQL Server 的计算机上的本地安全策略，将你的 SQL Server 服务运行所使用的账户添加进去。较大的组织可能会选择部署组策略对象（GPO）以确保为其所有
    SQL Server 实例自动配置此设置。


    你可以通过打开控制面板中“管理工具”下的本地安全策略 MMC 来找到此策略。打开“本地策略” ➤ “用户权限分配”文件夹，向下滚动到“执行卷维护任务”策略，如图
    6-5 所示。


    ![](img/340881_3_En_6_Fig5_HTML.png)


    一个标有本地安全策略的窗口。选中了用户权限分配，其中列出了该策略下的文件，并且选中了执行卷维护任务。图 6-5


    '
- fmt: '# Perform Volume Maintenance Task local policy


    双击策略以打开它，并添加你的 SQL Server 服务运行所使用的账户。最后一步是重启你的 SQL Server 服务。重启后，SQL Server 就可以使用即时文件初始化了。


    为了向你展示即时文件初始化的影响，我使用了清单 [6-3](#340881_3_En_6_Chapter.xhtml#PC3) 中的查询。这个查询清除了 `sys.dm_os_wait_stats`
    DMV，然后创建一个新的数据库，包含一个 500 MB 的数据文件和一个 100 MB 的日志文件。接着查询 `sys.dm_os_wait_stats`
    DMV 中的 `ASYNC_IO_COMPLETION` 等待类型。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    CREATE DATABASE [IO_test]

    ON  PRIMARY

    ( NAME = N''IO_test'', FILENAME = N''E:\Data\IO_test.mdf'' , SIZE = 512000KB ,
    FILEGROWTH = 10% )

    LOG ON

    ( NAME = N''IO_test_log'', FILENAME = N''E:\Log\IO_test_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10% );

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    ```

    清单 6-3

    测量即时文件初始化对 `ASYNC_IO_COMPLETION` 等待的影响


    图 [6-6](#340881_3_En_6_Chapter.xhtml#Fig6) 展示了配置即时文件初始化前后的等待统计信息。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig6_HTML.png)


    一个包含两个表格的屏幕截图。它列出了异步 I/O 完成的等待类型。之前的等待时间（毫秒）和最大等待时间（毫秒）为 2960，之后为 529，等待任务计数为
    1，信号等待时间（毫秒）为 0。


    图 6-6

    即时文件初始化对 `ASYNC_IO_COMPLETION` 等待的影响


    即使对于这个相对较小的数据库，使用即时文件初始化带来的提升也是相当大的，正如你在等待时间的差异中所见。启用即时文件初始化之前，清单 [6-3](#340881_3_En_6_Chapter.xhtml#PC3)
    中的查询需要 3 秒完成；更改后，它降到了半秒。


    如果你配置了即时文件初始化，并且同时检查到没有执行备份时却看到很高的 `ASYNC_IO_COMPLETION` 等待，那么问题可能出在你的存储子系统上。分析潜在存储问题的一种方法是使用
    `Perfmon` 来监控数据库所在磁盘上的 `Physical Disk Avg. Disk/sec Read` 和 `Avg. Disk/sec Write`
    计数器，如图 67 所示。这些计数器显示了你磁盘的读写延迟（以秒为单位）（这意味着值为 0.005 表示 5 毫秒）。SQL Server 在最大延迟为 5
    毫秒时性能最佳。延迟值越高，存储相关等待类型的等待时间就越长。


    **Nerd Note**


    这些 `Perfmon` 计数器返回的值显示了 SQL Server 等待读写操作完成的时间。这些值包括总往返时间，这意味着它们包含了网络延迟或过载的 VM
    内核所花费的时间，因此请注意检查 SQL Server 引擎与磁盘上存储的数据之间的所有基础设施层。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig7_HTML.png)


    一个标记为“添加计数器”的窗口。它显示了“可用计数器”、“实例”和“已添加计数器”下的选项，其中选择了“平均磁盘秒/读取”和“平均磁盘秒/写入”。


    图 6-7

    `Avg. Disk sec/Read` 和 `Avg. Disk sec/Write` `Perfmon` 计数器


    关于存储性能，不要急于下结论。在确定存储子系统是瓶颈之前，请务必与你的存储管理员（如果有）沟通，并向他们展示你的测量结果。存储是存储管理员的领域，他们可以帮助你分析和解决性能问题。


    ### ASYNC_IO_COMPLETION Summary


    `ASYNC_IO_COMPLETION` 等待类型发生在你从 SQL Server 实例执行与存储子系统相关的操作时，例如数据库备份和创建新数据库。虽然
    `ASYNC_IO_COMPLETION` 等待是完全正常的，但如果等待时间高于正常值，它们可能表明存在存储相关问题。在你跑去找存储管理员之前，请确保确实存在性能问题。一种可能的方法是检查你的存储延迟，因为高延迟值也会影响
    `ASYNC_IO_COMPLETION` 等待时间。同时检查较高的 `ASYNC_IO_COMPLETION` 等待时间是否与正在执行的数据库备份直接相关。降低
    `ASYNC_IO_COMPLETION` 等待时间的一个好方法是，通过将你的 SQL Server 服务账户添加到 `Perfmon Volume Maintenance
    Task` 本地策略来启用即时文件初始化。


    ## ASYNC_NETWORK_IO


    与 `ASYNC_IO_COMPLETION` 等待类型类似，`ASYNC_NETWORK_IO` 也与吞吐量有关。但它不是关于存储子系统的吞吐量，而是关于你的
    SQL Server 实例与客户端连接之间的网络连接。同样，看到这种特定等待类型的等待时间并不一定意味着存在网络相关问题，因为 `ASYNC_NETWORK_IO`
    等待总是会发生，即使你在 SQL Server 本身查询你的 SQL Server 实例。


    ### What Is the ASYNC_NETWORK_IO Wait Type?


    当客户端应用程序处理查询结果的速度不够快，或者存在网络相关的性能问题时，就会发生 `ASYNC_NETWORK_IO` 等待。前者最有可能，因为许多应用程序逐行处理
    SQL Server 结果，或者不正确处理返回的数据量。SQL Server 将等待客户端应用程序确认已收到当前结果集，然后才会发送额外的结果。在 SQL
    Server 等待发送请求的数据时，会记录 `ASYNC_NETWORK_IO` 等待类型。另一种可能发生 `ASYNC_NETWORK_IO` 等待的情况是，当你使用链接服务器查询远程数据库时。图
    [6-8](#340881_3_En_6_Chapter.xhtml#Fig8) 展示了这一过程的图形化表示。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig8_HTML.jpg)


    一个图形化的流程图定义了从异步网络 I/O 到本地数据库的数据流。


    图 6-8

    ASYNC_NETWORK_IO


    ### ASYNC_NETWORK_IO Example


    展示 `ASYNC_NETWORK_IO` 等待类型的示例并不需要一个复杂的测试环境。清单 [6-4](#340881_3_En_6_Chapter.xhtml#PC4)
    展示了一个查询，当我从另一台计算机使用 SQL Server Management Studio (`SSMS`) 针对我的测试 SQL Server 实例运行它时，它将生成
    `ASYNC_NETWORK_IO` 等待，这应该就足够了。该查询将清除 `sys.dm_os_wait_stats` DMV，然后针对 `GalacticWorks`
    数据库执行实际查询。最后一条语句将向我们展示 `ASYNC_NETWORK_IO` 等待类型的等待时间。


    ```sql

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```

    清单 6-4

    生成 `ASYNC_NETWORK_IO` 等待


    图 [6-9](#340881_3_En_6_Chapter.xhtml#Fig9) 显示了 `ASYNC_NETWORK_IO` 等待类型的等待时间。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig9_HTML.png)


    一个包含 5 列和 1 行的表格。它列出了异步网络 I/O 的等待类型，等待任务计数为 6332，等待时间（毫秒）为 999，最大等待时间（毫秒）为 45，信号等待时间（毫秒）为
    107。


    图 6-9

    ASYNC_NETWORK_IO 等待时间


    在这个例子中，针对 `GalacticWorks` 数据库的查询结果无法被 `SSMS` 应用程序处理得像 SQL Server 实例提供结果那样快，因此发生了
    `ASYNC_NETWORK_IO` 等待。


    **Nerd Note**


    在这个例子中，值得再次提到这是一个单服务器；因此，没有出站网络流量。然而，对 SQL Server 来说，它被认为是一个网络等待，因为即使 `SSMS` 安装在同一台机器上，`SSMS`
    也是数据库引擎的外部客户端。'
  raw: 'Perform Volume Maintenance Task local policy


    Double-click the policy to open it, and add the account your SQL Server service
    is running under. The last step is restarting your SQL Server service. After the
    restart, SQL Server can make use of instant file initialization.


    To show you the impact of instant file initialization, I used the query in Listing
    [6-3](#340881_3_En_6_Chapter.xhtml#PC3). This query clears the sys.dm_os_wait_stats
    DMV and then creates a new database with a 500 MB data file and a 100 MB log file.
    It then queries the sys.dm_os_wait_stats DMV for the ASYNC_IO_COMPLETION wait
    type.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    CREATE DATABASE [IO_test]

    ON  PRIMARY

    ( NAME = N''IO_test'', FILENAME = N''E:\Data\IO_test.mdf'' , SIZE = 512000KB ,
    FILEGROWTH = 10% )

    LOG ON

    ( NAME = N''IO_test_log'', FILENAME = N''E:\Log\IO_test_log.ldf'' , SIZE = 102400KB
    , FILEGROWTH = 10% );

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    Listing 6-3

    Measure the impact of instant file initialization on ASYNC_IO_COMPLETION waits

    ```


    Figure [6-6](#340881_3_En_6_Chapter.xhtml#Fig6) shows the wait statistics information
    both before and after configuring instant file initialization.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig6_HTML.png)


    A screenshot of 2 tables. It lists the wait type of async I O completion. The
    wait time m s and max wait time m s for before is 2960, and for after is 529 with
    waiting tasks count as 1 and signal wait time m s as 0.


    Figure 6-6


    Impact of instant file initialization on ASYNC_IO_COMPLETION waits


    Even for this relatively small database, the gain of using instant file initialization
    is pretty big, as you see in the difference in wait times. Before enabling instant
    file initialization, the query in Listing [6-3](#340881_3_En_6_Chapter.xhtml#PC3)
    took 3 seconds to complete; after the change it went down to half a second.


    If you configured instant file initialization and checked no backups are performed
    at the same time you see high ASYNC_IO_COMPLETION waits, the problem might be
    your storage subsystem. One method of analyzing potential storage problems is
    by using Perfmon to monitor the Physical Disk Avg. Disk/sec Read and Avg. Disk/sec
    Write counters on the disks on which your database resides, as shown in Figure
    67\. These counters show you the read and write latency to your disks in seconds
    (this means a value of 0.005 means 5 milliseconds). SQL Server performs optimally
    with a maximum latency of 5 milliseconds. The higher the latency value, the higher
    the wait time of storage-related wait types.


    Nerd Note


    These Perfmon counters are returning values showing how long SQL Server waited
    for the read or write operation to complete. These values include the total round
    trip time, which means they include time for network latency, or an overloaded
    VM kernel, so be advised to examine all layers of infrastructure between the SQL
    Server engine and the data stored on disk.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig7_HTML.png)


    A window labeled add counters. It displays the options under available counters,
    instances, and added counters, where the avg disk sec slash read and avg disk
    sec slash write are selected.


    Figure 6-7


    Avg. Disk sec/Read and Avg. Disk sec/Write Perfmon counters


    Be careful about jumping to conclusions regarding your storage performance. Always
    talk to your storage administrator (if you have one) and show them your measurements
    before you decide the storage subsystem is the bottleneck. Storage is the domain
    of the storage administrator, and they can help you analyze and resolve performance
    problems.


    ### ASYNC_IO_COMPLETION Summary


    The ASYNC_IO_COMPLETION wait type occurs when you perform actions related to the
    storage subsystem from your SQL Server instance, such as database backups and
    the creation of new databases. While ASYNC_IO_COMPLETION waits are completely
    normal, they can indicate storage-related problems if wait times are higher than
    normal. Before you run to your storage administrator, make sure there is actually
    a performance problem. One possible way to do this is by checking your storage
    latency, as high latency values will impact ASYNC_IO_COMPLETION wait times as
    well. Also check whether the higher ASYNC_IO_COMPLETION wait times are directly
    related to database backups being performed. One great method to lower ASYNC_IO_COMPLETION
    wait times is by enabling instant file initialization by adding your SQL Server
    service account to the Perfmon Volume Maintenance Task local policy.


    ## ASYNC_NETWORK_IO


    Just like the ASYNC_IO_COMPLETION wait type, **ASYNC_NETWORK_IO** is related to
    throughput. But instead of storage subsystem throughput, the ASYNC_NETWORK_IO
    wait type is related to the network connection between your SQL Server instance
    and your client connections. Again, seeing wait times for this specific wait type
    does not necessarily mean there is a network-related issue, since ASYNC_NETWORK_IO
    waits always occur, even if you query your SQL Server instance on the SQL Server
    itself.


    ### What Is the ASYNC_NETWORK_IO Wait Type?


    ASYNC_NETWORK_IO waits occur when client applications do not process the query
    results fast enough, or when you have a network-related performance problem. The
    former is most likely, since many applications process SQL Server results on a
    row-by-row basis or improperly handle the volume of data returned. SQL Server
    will wait for the client application to acknowledge it has received the current
    result set before it will send additional results. While SQL Server is waiting
    to send the requested data, the ASYNC_NETWORK_IO wait type is logged. Another
    situation in which ASYNC_NETWORK_IO waits can occur is when you are using a linked
    server to query remote databases. Figure [6-8](#340881_3_En_6_Chapter.xhtml#Fig8)
    shows a graphical representation of this.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig8_HTML.jpg)


    A graphical process flow defines the data flow from the async network I O to the
    local databases.


    Figure 6-8


    ASYNC_NETWORK_IO


    ### ASYNC_NETWORK_IO Example


    Showing an example of the ASYNC_NETWORK_IO wait type doesn’t require a complicated
    test environment. Listing [6-4](#340881_3_En_6_Chapter.xhtml#PC4) shows a query
    that will generate ASYNC_NETWORK_IO waits when run against my test SQL Server
    instance from another computer using SQL Server Management Studio (SSMS), which
    should be enough. The query is going to clear the sys.dm_os_wait_stats DMV and
    then perform the actual query against the GalacticWorks database. The last statement
    will show us the wait times of the ASYNC_NETWORK_IO wait type.


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    Listing 6-4

    Generate ASYNC_NETWORK_IO waits

    ```


    Figure [6-9](#340881_3_En_6_Chapter.xhtml#Fig9) shows the wait times for the ASYNC_NETWORK_IO
    wait type.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig9_HTML.png)


    A table of 5 columns and a row. It lists the wait type of an async network I O
    with waiting tasks count as 6332, wait time m s as 999, max wait time m s as 45,
    and signal wait time m s as 107.


    Figure 6-9


    ASYNC_NETWORK_IO wait times


    In this example, the results of the query against the GalacticWorks database couldn’t
    be processed by the SSMS application as fast as the SQL Server instance supplied
    the results, and ASYNC_NETWORK_IO waits occurred.


    Nerd Note


    In this example, it is worth mentioning again how this is a single server; therefore,
    there was no outbound network traffic. However, to SQL Server, it is considered
    a network wait, as SSMS is an external client to the database engine, even with
    SSMS installed on the same machine.'
