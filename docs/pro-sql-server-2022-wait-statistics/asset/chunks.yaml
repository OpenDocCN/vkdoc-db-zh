- fmt: '### Lowering `PREEMPTIVE_OS_WRITEFILEGATHER` Waits


    When you notice higher-than-normal wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type, it means a process from inside SQL Server is performing actions on
    the storage subsystem through the Windows operating system. The first matter of
    action should be to investigate what process initiated the action that resulted
    in `PREEMPTIVE_OS_WRITEFILEGATHER` waits. Very frequently, this will be the (automatic)
    growth of a database data or log file. If you allow the data or log files to grow
    automatically, you should expect to see `PREEMPTIVE_OS_WRITEFILEGATHER` waits
    occur whenever an auto-growth event occurs. This does not necessarily mean there
    is a problem, but if auto-growth events take a long time to complete because,
    for instance, the storage subsystem is experiencing performance problems, your
    queries might experience performance degradation as well.


    There is one Windows setting available I frequently see not configured, instant
    file initialization. We discussed this setting, and how you can enable it, already
    in Chapter 6, “IO-Related Wait Types,” under the `ASYNC_IO_COMPLETION` wait type,
    so I won’t go into detail on how to enable the setting again. Figure 11-13 shows
    the results of the query in Listing 11-2 with instant file initialization enabled,
    and as you can see, the amount of wait time spent on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait time disappeared completely.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig13_HTML.png)

    A screenshot of a S Q L server result window has 6 columns and 1 row. It lists
    the wait type as preemptive O S write file gather with waiting tasks count as
    0, wait time m s as 0, max wait time m s as 0, and signal wait time m s as 0.


    Figure 11-13

    `PREEMPTIVE_OS_WRITEFILEGATHER` waits with instant file initialization turned
    on


    Next to using instant file initialization, the performance of the storage subsystem
    plays a large part in the `PREEMPTIVE_OS_WRITEFILEGATHER` wait times. The better
    your storage subsystem performs, the lower the wait times on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type.


    Another SQL Server action that can cause higher-than-normal `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait times is performing database restores. Much like expending a data file, before
    SQL Server can restore a database, it needs to allocate free storage for it. This
    is also related to instant file initialization, which will also speed up database
    restores just like file enlargements.


    ### `PREEMPTIVE_OS_WRITEFILEGATHER` Summary


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type indicates SQL Server is asking the
    Windows operating system to perform an operation on the storage subsystem. Not
    all operations are handled from inside the SQL Server engine and actions; for
    example, the growing of a data file requires the execution of a Windows function
    to allocate the desired space on the storage subsystem. Instant file initialization
    is a setting in Windows which can lower the amount of `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait time drastically, but the performance of the storage subsystem itself also
    plays a large role in `PREEMPTIVE_OS_WRITEFILEGATHER` wait times.


    ## `PREEMPTIVE_OS_AUTHENTICATIONOPS`


    The `PREEMPTIVE_OS_AUTHENTICATIONOPS` is related to security interactions, waiting
    at OS level to authenticate a user or login.


    ### What Is the `PREEMPTIVE_OS_AUTHENTICATIONOPS` Wait Type?


    The `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type is recorded whenever SQL Server
    performs an account authentication, for instance, to authenticate the SQL Server
    Windows login when it connects to SQL Server. Seeing `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    waits occur is to be expected, especially when using mixed-mode authentication
    and Windows logins inside your SQL Server instance.


    One common misconception about the `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait type
    is `PREEMPTIVE_OS_AUTHENTICATIONOPS` is only related to SQL Server logins using
    Windows authentication inside a domain. This is not entirely correct. While it
    is true that `PREEMPTIVE_OS_AUTHENTICATIONOPS` wait times will frequently be higher
    when using Active Directory accounts to connect to SQL Server, `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    waits will also occur if the SQL Server instance is installed on a machine outside
    of a domain; the wait times will generally be lower though.


    Figure 11-14 shows a simplified image of how SQL Server connects to an Active
    Directory domain controller to validate the SQL Server Windows login. Keep in
    mind the Windows operating system takes care of the communication between the
    domain controller and the SQL Server, hence the preemptive wait type.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig14_HTML.png)

    A diagram depicts a domain inside which a user logs in to the A D server through
    a local server.


    Figure 11-14

    SQL Server Windows login authentication inside domain


    On a machine with a SQL Server instance installed but is not part of a domain,
    the authentication of the Windows login will occur on the machine itself (local
    accounts).


    Because it will generally take a longer time to authenticate a Windows login through
    a domain controller (the request has to travel across the network and authenticate
    on another machine), the wait times for the `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    wait type will generally be higher for a SQL Server instance inside a domain.'
  raw: '### Lowering PREEMPTIVE_OS_WRITEFILEGATHER Waits


    When you notice higher-than-normal wait times on the PREEMPTIVE_OS_WRITEFILEGATHER
    wait type, it means a process from inside SQL Server is performing actions on
    the storage subsystem through the Windows operating system. The first matter of
    action should be to investigate what process initiated the action that resulted
    in PREEMPTIVE_OS_WRITEFILEGATHER waits. Very frequently, this will be the (automatic)
    growth of a database data or log file. If you allow the data or log files to grow
    automatically, you should expect to see PREEMPTIVE_OS_WRITEFILEGATHER waits occur
    whenever an auto-growth event occurs. This does not necessarily mean there is
    a problem, but if auto-growth events take a long time to complete because, for
    instance, the storage subsystem is experiencing performance problems, your queries
    might experience performance degradation as well.


    There is one Windows setting available I frequently see not configured, instant
    file initialization. We discussed this setting, and how you can enable it, already
    in Chapter [6](#340881_3_En_6_Chapter.xhtml), “IO-Related Wait Types,” under the
    ASYNC_IO_COMPLETION wait type, so I won’t go into detail on how to enable the
    setting again. Figure [11-13](#340881_3_En_11_Chapter.xhtml#Fig13) shows the results
    of the query in Listing [11-2](#340881_3_En_11_Chapter.xhtml#PC2) with instant
    file initialization enabled, and as you can see, the amount of wait time spent
    on the PREEMPTIVE_OS_WRITEFILEGATHER wait time disappeared completely.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig13_HTML.png)


    A screenshot of a S Q L server result window has 6 columns and 1 row. It lists
    the wait type as preemptive O S write file gather with waiting tasks count as
    0, wait time m s as 0, max wait time m s as 0, and signal wait time m s as 0.


    Figure 11-13


    PREEMPTIVE_OS_WRITEFILEGATHER waits with instant file initialization turned on


    Next to using instant file initialization, the performance of the storage subsystem
    plays a large part in the PREEMPTIVE_OS_WRITEFILEGATHER wait times. The better
    your storage subsystem performs, the lower the wait times on the PREEMPTIVE_OS_WRITEFILEGATHER
    wait type.


    Another SQL Server action that can cause higher-than-normal PREEMPTIVE_OS_WRITEFILEGATHER
    wait times is performing database restores. Much like expending a data file, before
    SQL Server can restore a database, it needs to allocate free storage for it. This
    is also related to instant file initialization, which will also speed up database
    restores just like file enlargements.


    ### PREEMPTIVE_OS_WRITEFILEGATHER Summary


    The PREEMPTIVE_OS_WRITEFILEGATHER wait type indicates SQL Server is asking the
    Windows operating system to perform an operation on the storage subsystem. Not
    all operations are handled from inside the SQL Server engine and actions; for
    example, the growing of a data file requires the execution of a Windows function
    to allocate the desired space on the storage subsystem. Instant file initialization
    is a setting in Windows which can lower the amount of PREEMPTIVE_OS_WRITEFILEGATHER
    wait time drastically, but the performance of the storage subsystem itself also
    plays a large role in PREEMPTIVE_OS_WRITEFILEGATHER wait times.


    ## PREEMPTIVE_OS_AUTHENTICATIONOPS


    The PREEMPTIVE_OS_AUTHENTICATIONOPS is related to security interactions, waiting
    at OS level to authenticate a user or login.


    ### What Is the PREEMPTIVE_OS_AUTHENTICATIONOPS Wait Type?


    The **PREEMPTIVE_OS_AUTHENTICATIONOPS** wait type is recorded whenever SQL Server
    performs an account authentication, for instance, to authenticate the SQL Server
    Windows login when it connects to SQL Server. Seeing PREEMPTIVE_OS_AUTHENTICATIONOPS
    waits occur is to be expected, especially when using mixed-mode authentication
    and Windows logins inside your SQL Server instance.


    One common misconception about the PREEMPTIVE_OS_AUTHENTICATIONOPS wait type is
    PREEMPTIVE_OS_AUTHENTICATIONOPS is only related to SQL Server logins using Windows
    authentication inside a domain. This is not entirely correct. While it is true
    that PREEMPTIVE_OS_AUTHENTICATIONOPS wait times will frequently be higher when
    using Active Directory accounts to connect to SQL Server, PREEMPTIVE_OS_AUTHENTICATIONOPS
    waits will also occur if the SQL Server instance is installed on a machine outside
    of a domain; the wait times will generally be lower though.


    Figure [11-14](#340881_3_En_11_Chapter.xhtml#Fig14) shows a simplified image of
    how SQL Server connects to an Active Directory domain controller to validate the
    SQL Server Windows login. Keep in mind the Windows operating system takes care
    of the communication between the domain controller and the SQL Server, hence the
    preemptive wait type.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig14_HTML.png)


    A diagram depicts a domain inside which a user logs in to the A D server through
    a local server.


    Figure 11-14


    SQL Server Windows login authentication inside domain


    On a machine with a SQL Server instance installed but is not part of a domain,
    the authentication of the Windows login will occur on the machine itself (local
    accounts).


    Because it will generally take a longer time to authenticate a Windows login through
    a domain controller (the request has to travel across the network and authenticate
    on another machine), the wait times for the PREEMPTIVE_OS_AUTHENTICATIONOPS wait
    type will generally be higher for a SQL Server instance inside a domain.'
  trans: '

    ### 降低 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待


    当你发现 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型的等待时间高于正常水平时，这意味着 SQL Server 内部的一个进程正在通过
    Windows 操作系统对存储子系统执行操作。首要任务应是调查是什么进程发起了导致 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待的操作。很多时候，这可能是数据库数据文件或日志文件的（自动）增长。如果你允许数据或日志文件自动增长，那么你应该预计到每当发生自动增长事件时，就会出现
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待。这不一定意味着存在问题，但如果自动增长事件因为存储子系统出现性能问题等原因而需要很长时间才能完成，你的查询也可能经历性能下降。


    有一个 Windows 设置我经常看到未配置，那就是**即时文件初始化**。我们已经在第 6 章“与 I/O 相关的等待类型”中关于 `ASYNC_IO_COMPLETION`
    等待类型的部分讨论过这个设置以及如何启用它，因此这里不再赘述如何启用该设置的细节。图 11-13 展示了启用了即时文件初始化后，清单 11-2 中查询的结果。如你所见，花在
    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型上的等待时间完全消失了。


    ![](img/340881_3_En_11_Fig13_HTML.png)

    一张 SQL Server 结果窗口的截图，包含 6 列和 1 行。其中列出的等待类型为 preemptive O S write file gather，等待任务计数为
    0，等待时间毫秒为 0，最大等待时间毫秒为 0，信号等待时间毫秒为 0。


    图 11-13

    开启即时文件初始化后的 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待


    除了使用即时文件初始化，存储子系统的性能在 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待时间中也扮演着重要角色。你的存储子系统性能越好，`PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型的等待时间就越低。


    另一个可能导致 `PREEMPTIVE_OS_WRITEFILEGATHER` 等待时间高于正常水平的 SQL Server 操作是执行数据库还原。与扩展数据文件非常相似，在
    SQL Server 能够还原数据库之前，它需要为其分配可用存储空间。这也与即时文件初始化相关，后者将同样加快数据库还原的速度，就像加快文件扩展一样。


    ### `PREEMPTIVE_OS_WRITEFILEGATHER` 总结


    `PREEMPTIVE_OS_WRITEFILEGATHER` 等待类型表明 SQL Server 正在请求 Windows 操作系统对存储子系统执行一项操作。并非所有操作都在
    SQL Server 引擎和动作内部处理；例如，数据文件的增长需要执行一个 Windows 函数来在存储子系统上分配所需的空间。即时文件初始化是 Windows
    中的一个设置，可以大幅减少 `PREEMPTIVE_OS_WRITEFILEGATHER` 的等待时间，但存储子系统本身的性能在 `PREEMPTIVE_OS_WRITEFILEGATHER`
    等待时间中也起着重要作用。


    ## `PREEMPTIVE_OS_AUTHENTICATIONOPS`


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 与安全交互相关，在操作系统级别等待以验证用户或登录名。


    ### 什么是 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型？


    每当 SQL Server 执行账户验证时，例如当 Windows 登录名连接到 SQL Server 时验证该登录名，就会记录 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待类型。看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待发生是预料之中的事，尤其是在 SQL Server 实例中使用混合模式验证和
    Windows 登录名时。


    关于 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的一个常见误解是，它只与域内使用 Windows 身份验证的 SQL Server
    登录名有关。这并不完全正确。虽然当使用 Active Directory 账户连接到 SQL Server 时，`PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间确实通常会更高，但如果 SQL Server 实例安装在域外的机器上，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待也会发生；不过等待时间通常会低一些。


    图 11-14 展示了 SQL Server 如何连接到 Active Directory 域控制器来验证 SQL Server Windows 登录名的简化图示。请记住，是
    Windows 操作系统负责处理域控制器与 SQL Server 之间的通信，因此属于**抢占式**等待类型。


    ![](img/340881_3_En_11_Fig14_HTML.png)

    一张示意图描绘了一个域内用户通过本地服务器登录到 AD 服务器的过程。


    图 11-14

    域内的 SQL Server Windows 登录名验证


    在安装了 SQL Server 实例但不属于域的机器上，Windows 登录名的验证将在机器本身（本地账户）上进行。


    因为通常通过域控制器验证 Windows 登录名需要更长时间（请求需要通过网络传输并在另一台机器上进行验证），所以位于域内的 SQL Server 实例的
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的等待时间通常会更高。

    '
- fmt: '### PREEMPTIVE_OS_AUTHENTICATIONOPS 示例


    要生成一个 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待发生的示例，我们不需要执行任何复杂的操作。使用 Windows 身份验证打开一个到
    SQL Server 实例的新连接就足够了。一种便于测量的方法是使用 SQL Server Management Studio (SSMS) 通过 Windows
    身份验证连接到 SQL Server 实例。图 [11-15](#340881_3_En_11_Chapter.xhtml#Fig15) 显示了 SSMS
    连接到我的测试 SQL Server 实例的对话框。请注意，我的测试 SQL Server 实例不在域内，我使用的是本机的本地管理员账户进行连接。


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig15_HTML.png)


    一个标有“连接到服务器”的窗口截图。标题是 SQL Server，带有三个下拉框。服务器类型是数据库引擎，服务器名称是 `SQL 2022\RC0`，身份验证是
    Windows 身份验证。下面的用户名和密码框未激活。


    图 11-15


    使用本地 Windows 身份验证连接 SQL Server Management Studio


    我执行的下一步是在 SSMS 中打开一个新的查询窗口，并在清单 [11-3](#340881_3_En_11_Chapter.xhtml#PC3) 所示的查询中执行步骤。


    ```

    -- 步骤 1 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 步骤 2 在 SQL Server Management Studio 中打开一个新的查询窗口

    -- 步骤 3 回到此查询窗口并运行下面的查询

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_AUTHENTICATIONOPS'';

    ```

    清单 11-3

    生成 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如果你按照清单 [11-3](#340881_3_En_11_Chapter.xhtml#PC3) 脚本中注释的步骤操作，在运行步骤 3 中的查询后，你应该会看到
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待发生。图 [11-16](#340881_3_En_11_Chapter.xhtml#Fig16)
    显示了在我的测试机器上运行步骤 3 查询的结果。


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig16_HTML.png)


    一个 SQL Server 结果窗口截图，有 6 列和 1 行。其值为：等待类型 `preemptive_os_authentication_ops`，等待任务计数
    `12`，等待时间 `1` 毫秒，最大等待时间 `0` 毫秒，信号等待时间 `0` 毫秒。


    图 11-16


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如你所见，发生的等待次数及其等待时间都非常低。这个示例的重点不是向你展示非常高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，而是展示它们如何在连接到
    SQL Server 实例时自然发生。因为我在 SSMS 中打开了一个新的查询窗口，所以将使用我连接 SQL Server 实例所用的 Windows 登录账户建立一个到
    SQL Server 实例的新连接。由于这是一个新连接，用于连接的账户必须经过身份验证，从而导致了 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待。


    ### 降低 PREEMPTIVE_OS_AUTHENTICATIONOPS 等待


    在示例中，我们看到了每当连接到 SQL Server 实例时，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待是如何自然发生的。现在想象一种情况：你的
    SQL Server 实例是域环境的一部分，并且它使用 Windows 身份验证通过 Active Directory 对域用户（或组）进行身份验证。在这种情况下，你的身份验证请求将通过网络进行以执行登录账户的身份验证。有许多因素会影响身份验证请求的速度；例如，如果你的域控制器压力很大，执行身份验证可能需要更长时间，或者如果你的网络性能下降，也会影响身份验证请求。这些因素也会导致
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型，并可能导致更高的等待时间。


    我想向你描述一个我在客户那里遇到的涉及 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的案例，让你了解如何降低 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。


    在这个客户那里，他们使用一个应用程序，该应用程序使用运行该应用程序的计算机上登录的 Windows 账户连接到 SQL Server。这些计算机和 SQL
    Server 都是域的一部分。从安全角度来看，该应用程序设计良好，因为它不需要单独的 SQL Server 用户（这些用户需要数据库权限），也不使用通用账户连接到
    SQL Server 实例并执行查询。在内部，特定于数据库的对象（如表）也是基于域用户和组进行保护的。


    在将该应用程序部署到公司内每台（超过 3000 台）计算机后，客户端开始遇到服务器性能问题。客户的 DBA 没有发现任何问题，SQL Server 实例上没有基础设施相关的性能问题，在
    SQL Server 实例本身执行查询也未发现问题。当我们查看等待统计时，我们注意到最普遍的等待类型是 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待类型。我们还注意到，该应用程序会连接到 SQL Server 实例，运行一个查询，然后再次断开连接。由于如此多的并发用户在使用该应用程序，导致大量的 Windows
    身份验证请求，多到域控制器无法处理，从而导致身份验证请求处理变慢。


    在这个案例中，域控制器是一台虚拟机，在增加了更多处理器和内存资源后，它就能够跟上大量的身份验证请求。


    从这个例子可以看出，看到较高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间并不一定意味着你的 SQL Server 实例遇到了问题，尤其是在域环境中，因为域控制器的性能在
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间中也扮演着重要角色。


    这个故事的寓意是，如果你注意到高于正常水平的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，你需要调查的不仅仅是 SQL Server
    实例。如果你在域中使用 Windows 身份验证，请务必检查域控制器的性能。检查 SQL Server 实例和域控制器之间的每个基础设施部分，如网络交换机、防火墙等。所有这些基础设施部分都会为每个身份验证请求增加额外的延迟，这将导致更高的
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，使其成为一个难以排查的等待类型。


    ### PREEMPTIVE_OS_AUTHENTICATIONOPS 总结


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型与 Windows 操作系统执行身份验证请求有关。看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待发生是正常的，特别是当你的 SQL Server 实例是域的一部分并使用 Windows 身份验证对用户进行身份验证时。高于正常水平的等待时间可能表明身份验证请求完成所需的时间比正常情况长。这并不一定意味着你的
    SQL Server 实例遇到了性能问题。如果域控制器无法足够快地处理身份验证请求，将会导致更高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。到域控制器的网络连接缓慢、防火墙或交换机配置也会影响 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间。'
  raw: '### PREEMPTIVE_OS_AUTHENTICATIONOPS Example


    To generate an example of PREEMPTIVE_OS_AUTHENTICATIONOPS waits occurring, we
    do not need to perform any complex actions. Opening a new connection to the SQL
    Server instance using Windows authentication should be enough. One way to make
    this easy to measure is by connecting to the SQL Server instance with SQL Server
    Management Studio (SSMS), using Windows authentication. Figure [11-15](#340881_3_En_11_Chapter.xhtml#Fig15)
    shows the SSMS connect dialog to my test SQL Server instance. Note that my test
    SQL Server instance is not inside a domain and that I use the local administrator
    account on my machine to connect.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig15_HTML.png)


    A screenshot of a window labeled connect to the server. The heading is S Q L server
    with 3 dropdown boxes. The server type is database engine, the server name is
    S Q L 2022 backward slash R C 0 and authentication is windows authentication.
    The username and password boxes below are not activated.


    Figure 11-15


    Connect SQL Server Management Studio using local Windows authentication


    The next step I perform is opening a new Query Window inside SSMS and performing
    the steps inside the query shown in Listing [11-3](#340881_3_En_11_Chapter.xhtml#PC3).


    ```

    -- Step 1 Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Step 2 Open a new Query Window inside

    -- SQL Server Management Studio

    -- Step 3 go back to this Query Window

    -- and run the query below

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_AUTHENTICATIONOPS'';

    Listing 11-3

    Generate PREEMPTIVE_OS_AUTHENTICATIONOPS waits

    ```


    If you follow the steps commented inside the script in Listing [11-3](#340881_3_En_11_Chapter.xhtml#PC3),
    you should see PREEMPTIVE_OS_AUTHENTICATIONOPS waits occurring after running the
    query in step 3\. Figure [11-16](#340881_3_En_11_Chapter.xhtml#Fig16) shows the
    results of the query in step 3 on my test machine.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig16_HTML.png)


    A screenshot of a S Q L server results window has 6 columns and 1 row. It has
    values of wait type as preemptive O S authentication ops, waiting tasks count
    as 12, wait time m s as 1, max wait time m s as 0, and signal wait time m s as
    0.


    Figure 11-16


    PREEMPTIVE_OS_AUTHENTICATIONOPS waits


    As you see, the number of waits occurring and their wait times are very low. The
    point of this example is not to show you an example of very high PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait times but rather how they occur naturally when connecting to a SQL Server
    instance. Because I opened a new Query Window inside SSMS, a new connection to
    the SQL Server instance will be made using the Windows login I used to connect
    to my SQL Server instance. Because it is a new connection, the account I used
    to connect had to be authenticated, resulting in PREEMPTIVE_OS_AUTHENTICATIONOPS
    waits.


    ### Lowering PREEMPTIVE_OS_AUTHENTICATIONOPS Waits


    In the example, we saw how PREEMPTIVE_OS_AUTHENTICATIONOPS waits occur naturally
    whenever you connect to a SQL Server instance. Now imagine a situation where your
    SQL Server instance is part of a domain environment and it uses Windows authentication
    to authenticate domain users (or groups) against an Active Directory. In this
    case, your authentication request will travel across the network to perform the
    authentication of the login account. There are many factors involved which impact
    the speed of the authentication request; for instance, if your domain controller
    is under a lot of stress, it can take longer to perform the authentication, or
    if your network experiences performance degradation, it will also impact the authentication
    request. These factors also contribute to the PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait type and can result in higher wait times.


    I would like to describe to you a case I encountered at a client that involved
    the PREEMPTIVE_OS_AUTHENTICATIONOPS wait type to give you an idea of how you can
    lower PREEMPTIVE_OS_AUTHENTICATIONOPS wait times.


    At this client, they used an application which connected to SQL Server using the
    Windows account logged in on the computer which ran the application. The computers
    and the SQL Server were all part of a domain. From a security perspective, the
    application was well designed, as it did not require separate SQL Server users
    who needed permission on the database and also didn’t use a generic account to
    connect to the SQL Server instance and execute queries. Inside, the database-specific
    objects (like tables) were also secured based on domain users and groups.


    The client started to experience server performance problems inside the application
    after deploying it to every (3000+) computer inside the company. The DBA at the
    client couldn’t find any problems, there were no infrastructure-related performance
    problems on the SQL Server instance, and executing the queries on the SQL Server
    instance itself revealed no issues. When we looked at the wait statistics, we
    noticed that the most prevalent wait type was the PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait type. We also noticed that the application would connect to the SQL Server
    instance, run a query, and then disconnect again. Because so many concurrent users
    were using the application, it resulted in a high amount of Windows authentication
    requests, so many that the domain controller couldn’t handle them, resulting in
    the slower processing of authentication requests.


    In this case, the domain controller was a virtual machine, and after adding more
    processor and memory resources, it was able to keep up with the high amount of
    authentication requests.


    As you can see from this example, seeing high PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait times does not necessarily mean your SQL Server instance is running into
    problems, especially in a domain environment, as the performance of your domain
    controller also plays a large role in PREEMPTIVE_OS_AUTHENTICATIONOPS wait times.


    The moral of the story is, if you notice higher-than-normal PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait times, you will need to investigate more than just the SQL Server instance.
    Make sure to check the performance of your domain controllers if you are using
    Windows authentication inside a domain. Check every infrastructure part between
    your SQL Server instance and the domain controller, like network switches, firewalls,
    and so on. All of these infrastructure parts will add additional latency for each
    authentication request, which will result in higher PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait times, making it a difficult wait type to troubleshoot.


    ### PREEMPTIVE_OS_AUTHENTICATIONOPS Summary


    The PREEMPTIVE_OS_AUTHENTICATIONOPS wait type is related to performing authentication
    requests by the Windows operating system. It is normal to see PREEMPTIVE_OS_AUTHENTICATIONOPS
    waits occur, especially when your SQL Server instance is part of a domain and
    uses Windows authentication to authenticate users. Higher-than-normal wait times
    can indicate that authentication requests are taking longer than normal to complete.
    This does not necessarily mean that your SQL Server instance is running into a
    performance problem. If the domain controller cannot process the authentication
    requests fast enough, it will result in higher PREEMPTIVE_OS_AUTHENTICATIONOPS
    wait times. A slow network connection to the domain controller, firewall, or switch
    configurations can also impact PREEMPTIVE_OS_AUTHENTICATIONOPS wait times.'
  trans: '### PREEMPTIVE_OS_AUTHENTICATIONOPS 示例


    要生成一个 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待发生的示例，我们不需要执行任何复杂的操作。使用 Windows 身份验证打开一个到
    SQL Server 实例的新连接就足够了。一种便于测量的方法是使用 SQL Server Management Studio (SSMS) 通过 Windows
    身份验证连接到 SQL Server 实例。图 11-15 显示了 SSMS 连接到我的测试 SQL Server 实例的对话框。请注意，我的测试 SQL
    Server 实例不在域内，我使用的是本机的本地管理员账户进行连接。


    ![](img/340881_3_En_11_Fig15_HTML.png)


    一个标有“连接到服务器”的窗口截图。标题是 SQL Server，带有三个下拉框。服务器类型是数据库引擎，服务器名称是 `SQL 2022\RC0`，身份验证是
    Windows 身份验证。下面的用户名和密码框未激活。


    图 11-15


    使用本地 Windows 身份验证连接 SQL Server Management Studio


    我执行的下一步是在 SSMS 中打开一个新的查询窗口，并在清单 11-3 所示的查询中执行步骤。


    ```

    -- 步骤 1 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 步骤 2 在 SQL Server Management Studio 中打开一个新的查询窗口

    -- 步骤 3 回到此查询窗口并运行下面的查询

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_AUTHENTICATIONOPS'';

    ```

    清单 11-3

    生成 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如果你按照清单 11-3 脚本中注释的步骤操作，在运行步骤 3 中的查询后，你应该会看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待发生。图 11-16 显示了在我的测试机器上运行步骤 3 查询的结果。


    ![](img/340881_3_En_11_Fig16_HTML.png)


    一个 SQL Server 结果窗口截图，有 6 列和 1 行。其值为：等待类型 `preemptive_os_authentication_ops`，等待任务计数
    `12`，等待时间 `1` 毫秒，最大等待时间 `0` 毫秒，信号等待时间 `0` 毫秒。


    图 11-16


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待


    如你所见，发生的等待次数及其等待时间都非常低。这个示例的重点不是向你展示非常高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，而是展示它们如何在连接到
    SQL Server 实例时自然发生。因为我在 SSMS 中打开了一个新的查询窗口，所以将使用我连接 SQL Server 实例所用的 Windows 登录账户建立一个到
    SQL Server 实例的新连接。由于这是一个新连接，用于连接的账户必须经过身份验证，从而导致了 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待。


    ### 降低 PREEMPTIVE_OS_AUTHENTICATIONOPS 等待


    在示例中，我们看到了每当连接到 SQL Server 实例时，`PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待是如何自然发生的。现在想象一种情况：你的
    SQL Server 实例是域环境的一部分，并且它使用 Windows 身份验证通过 Active Directory 对域用户（或组）进行身份验证。在这种情况下，你的身份验证请求将通过网络进行以执行登录账户的身份验证。有许多因素会影响身份验证请求的速度；例如，如果你的域控制器压力很大，执行身份验证可能需要更长时间，或者如果你的网络性能下降，也会影响身份验证请求。这些因素也会导致
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型，并可能导致更高的等待时间。


    我想向你描述一个我在客户那里遇到的涉及 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型的案例，让你了解如何降低 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。


    在这个客户那里，他们使用一个应用程序，该应用程序使用运行该应用程序的计算机上登录的 Windows 账户连接到 SQL Server。这些计算机和 SQL
    Server 都是域的一部分。从安全角度来看，该应用程序设计良好，因为它不需要单独的 SQL Server 用户（这些用户需要数据库权限），也不使用通用账户连接到
    SQL Server 实例并执行查询。在内部，特定于数据库的对象（如表）也是基于域用户和组进行保护的。


    在将该应用程序部署到公司内每台（超过 3000 台）计算机后，客户端开始遇到服务器性能问题。客户的 DBA 没有发现任何问题，SQL Server 实例上没有基础设施相关的性能问题，在
    SQL Server 实例本身执行查询也未发现问题。当我们查看等待统计时，我们注意到最普遍的等待类型是 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待类型。我们还注意到，该应用程序会连接到 SQL Server 实例，运行一个查询，然后再次断开连接。由于如此多的并发用户在使用该应用程序，导致大量的 Windows
    身份验证请求，多到域控制器无法处理，从而导致身份验证请求处理变慢。


    在这个案例中，域控制器是一台虚拟机，在增加了更多处理器和内存资源后，它就能够跟上大量的身份验证请求。


    从这个例子可以看出，看到较高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间并不一定意味着你的 SQL Server 实例遇到了问题，尤其是在域环境中，因为域控制器的性能在
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间中也扮演着重要角色。


    这个故事的寓意是，如果你注意到高于正常水平的 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，你需要调查的不仅仅是 SQL Server
    实例。如果你在域中使用 Windows 身份验证，请务必检查域控制器的性能。检查 SQL Server 实例和域控制器之间的每个基础设施部分，如网络交换机、防火墙等。所有这些基础设施部分都会为每个身份验证请求增加额外的延迟，这将导致更高的
    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间，使其成为一个难以排查的等待类型。


    ### PREEMPTIVE_OS_AUTHENTICATIONOPS 总结


    `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待类型与 Windows 操作系统执行身份验证请求有关。看到 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待发生是正常的，特别是当你的 SQL Server 实例是域的一部分并使用 Windows 身份验证对用户进行身份验证时。高于正常水平的等待时间可能表明身份验证请求完成所需的时间比正常情况长。这并不一定意味着你的
    SQL Server 实例遇到了性能问题。如果域控制器无法足够快地处理身份验证请求，将会导致更高的 `PREEMPTIVE_OS_AUTHENTICATIONOPS`
    等待时间。到域控制器的网络连接缓慢、防火墙或交换机配置也会影响 `PREEMPTIVE_OS_AUTHENTICATIONOPS` 等待时间。'
- fmt: '# PREEMPTIVE_OS_GETPROCADDRESS


    本章最后一个等待类型是 **PREEMPTIVE_OS_GETPROCADDRESS**。`PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与
    SQL Server 内部执行扩展存储过程相关。


    扩展存储过程允许您使用 T-SQL 以外的语言（例如 C# 编程语言）创建外部例程。这些扩展存储过程使用 `.dll` 文件加载到 SQL Server 中，通过允许执行
    T-SQL 无法实现的操作（如读写 Windows 注册表项）来扩展 SQL Server 编程能力。


    自 SQL Server 2008 起，扩展存储过程已被标记为不推荐使用，应改用公共语言运行时（CLR）。然而，SQL Server 内部仍存在一些需要扩展存储过程的场景，并且一些第三方软件供应商仍然依赖它们。


    ## 什么是 PREEMPTIVE_OS_GETPROCADDRESS 等待类型？


    每当加载扩展存储过程内的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型。每当 SQL Server 加载或卸载扩展存储过程的
    `.dll` 文件时，都会调用该入口点。在正常情况下，入口点的加载应很快完成，导致 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间非常低。但是，根据扩展存储过程的不同（或与加载
    `.dll` 文件相关的问题），可能会观察到更高的等待时间。`PREEMPTIVE_OS_GETPROCADDRESS` 等待类型记录的是加载 `.dll`
    文件入口点所花费的时间，而不是扩展存储过程的执行时间。图 [11-17](#340881_3_En_11_Chapter.xhtml#Fig17) 展示了
    SQL Server 如何执行扩展存储过程的（简化）概览。


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig17_HTML.jpg)


    一个存储过程执行的流程图。用户向 SQL Server 引擎发送 TDS 信号，后者随后调用扩展存储过程 API 和 DLL。存储过程被执行，结果通过 SQL
    Server 引擎发送回用户。


    **图 11-17**


    执行扩展存储过程


    除了编写您自己的自定义扩展存储过程外，SQL Server 还附带了许多扩展存储过程。其中大多数可以通过扩展存储过程名称中的 `xp_` 前缀来识别，尽管并非所有都有此前缀。图
    [11-18](#340881_3_En_11_Chapter.xhtml#Fig18) 展示了在我的测试 SQL Server 2022 RC0 实例的
    `master` 数据库中，使用以下 T-SQL 查询到的 293 个扩展存储过程中的一部分：


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig18_HTML.png)


    一个 SQL Server 结果窗口的截图，包含一个名称列，其中有 23 行存储过程名称。其中一些是 `sp_drop_trusted_assembly`
    和 `sp_replsetsyncstatus`。


    **图 11-18**


    SQL Server 2022 RC0 `master` 数据库中的部分扩展存储过程


    ```sql

    SELECT name

    FROM master.dbo.sysobjects AS so

    WHERE so.type = ''X'';

    ```


    可能最臭名昭著的扩展存储过程是 `xp_cmdshell`。`xp_cmdshell` 扩展存储过程使得可以从 SQL Server 内部在 Windows
    命令 shell 中执行命令。如果您的 SQL Server 实例被入侵，这是一个巨大的安全风险，因为它提供了可能影响整个 Windows 操作系统的命令访问权限。幸运的是，默认情况下无法运行
    `xp_cmdshell` 扩展存储过程；您必须通过配置高级配置设置来特别允许其使用。


    ## PREEMPTIVE_OS_GETPROCADDRESS 示例


    在本例中，我们执行 SQL Server 中已存在的一个扩展存储过程 `xp_getnetname`，而不是编写一个自定义扩展存储过程（这超出了本书范围）。`xp_getnetname`
    是一个未公开的扩展存储过程，它返回托管您的 SQL Server 实例的机器的 NETBIOS 名称。在执行 `xp_getnetname` 扩展存储过程之前，我们先清除
    `sys.dm_os_wait_stats` DMV，执行后，我们查询该 DMV 以获取 `PREEMPTIVE_OS_GETPROCADDRESS` 等待信息。清单
    [11-4](#340881_3_En_11_Chapter.xhtml#PC5) 展示了我在测试 SQL Server 实例上执行的整个查询。


    ```sql

    USE [master];

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    ```


    **清单 11-4**

    执行 `xp_getnetname` 并查询等待统计信息


    清单 [11-4](#340881_3_En_11_Chapter.xhtml#PC5) 中查询的结果可以在图 [11-19](#340881_3_En_11_Chapter.xhtml#Fig19)
    中看到。


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig19_HTML.png)


    一个包含 2 个 SQL Server 结果窗口的截图。截图 1 有 1 列“server net name”，包含 1 行“SQL 2022”。截图 2
    包含 `wait_type` 值为 `PREEMPTIVE_OS_GETPROCADDRESS`，以及 `waiting_tasks_count` 值为 1，而
    `wait_time_ms`、`max_wait_time_ms` 和 `signal_wait_time_ms` 的值均为 0。


    **图 11-19**


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待


    结果并不惊人。显然，`xp_getnetname` 扩展存储过程在加载 `.dll` 入口点时没有引起任何问题，因为没有记录到等待时间。然而，等待仍然发生了；正如您在
    `waiting_tasks_count` 列中看到的，SQL Server 加载入口点花费的时间少于一毫秒。


    ## 降低 PREEMPTIVE_OS_GETPROCADDRESS 等待


    由于 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与执行扩展存储过程直接相关，您调查的第一步应该是检测是否正在执行扩展存储过程及其功能是什么。


    我曾见过 `PREEMPTIVE_OS_GETPROCADDRESS` 等待的发生，是因为一个第三方备份应用程序使用扩展存储过程来执行数据库备份，但高 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间还有许多其他可能的原因。了解正在执行哪个扩展存储过程可以帮助您追踪执行该过程的进程。


    在 SQL Server 2008 和 2008R2 中存在已知的错误，这些错误报告了高于正常的 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间，因为扩展存储过程的执行时间也被记录在等待时间中，而不仅仅是入口点加载。如果您仍在使用 SQL Server 2008 或 2008R2 并遇到非常高的
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 并检查 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间是否下降可能是值得的。或者更好的是，升级到更高版本的 SQL Server，因为 SQL Server 2008R2 已于 2019 年 7 月 9
    日终止生命周期。


    ## PREEMPTIVE_OS_GETPROCADDRESS 总结


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与扩展存储过程的执行直接相关。扩展存储过程可以用多种编程语言（如 C#）编写，并允许您执行原本在
    T-SQL 中不可能完成的操作。每当加载扩展存储过程 `.dll` 中的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型的等待时间。在正常情况下，`PREEMPTIVE_OS_GETPROCADDRESS`
    等待类型的等待时间非常低。观察到较高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能表明入口点加载遇到问题。在 SQL Server
    2008 和 2008R2 中，也存在与 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型计算相关的错误。如果您运行的是 SQL Server
    2008 或 2008R2 并遇到高 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 或迁移到更高版本的
    SQL Server 可能是值得的，因为 SQL Server 2008R2 已于 2019 年 7 月 9 日终止生命周期。'
  raw: '## PREEMPTIVE_OS_GETPROCADDRESS


    The final wait type in this chapter is the **PREEMPTIVE_OS_GETPROCADDRESS** wait
    type. The PREEMPTIVE_OS_GETPROCADDRESS wait type is related to the execution of
    extended stored procedures inside SQL Server.


    Extended stored procedures allow you to create external routines in a language
    other than T-SQL; for instance, using the C# programming language. These extended
    stored procedures are loaded into SQL Server using .dll files and expand the capabilities
    of SQL Server programming by allowing actions impossible in T-SQL, like reading/writing
    Windows Registry entries.


    Extended stored procedures are marked as deprecated since SQL Server 2008 and
    Common Language Runtime (CLR) should be used instead of them. However, there are
    still cases inside SQL Server which require extended stored procedures, and some
    third-party software vendors still rely on them.


    ### What Is the PREEMPTIVE_OS_GETPROCADDRESS Wait Type?


    The PREEMPTIVE_OS_GETPROCADDRESS wait type is recorded whenever the entrypoint
    inside an extended stored procedure is loaded. The entrypoint is called upon whenever
    SQL Server loads or unloads the extended stored procedure .dll file. Under normal
    conditions, the loading of the entrypoint should complete quickly, resulting in
    very low PREEMPTIVE_OS_GETPROCADDRESS wait times. However, depending on the extended
    stored procedure (or problems related to loading the .dll file), it is possible
    to notice higher wait times. The PREEMPTIVE_OS_GETPROCADDRESS wait type records
    the time it took to load the entrypoint of the .dll file, not the execution time
    of the extended stored procedure. Figure [11-17](#340881_3_En_11_Chapter.xhtml#Fig17)
    shows a (simplified) overview of how extended stored procedures are executed by
    SQL Server.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig17_HTML.jpg)


    A flow diagram of stored procedure execution. The user sends a T D S signal to
    a S Q L server engine, which in turn calls the extended stored procedure A P I
    and D L L. The stored procedure is executed and the result is sent back to the
    user through the S Q L server engine.


    Figure 11-17


    Executing an extended stored procedure


    In addition to writing your own custom extended stored procedures, SQL Server
    ships with many extended stored procedures. Most of these are recognized by the
    xp_ prefix in the extended stored procedure name, though not all of them have
    this prefix. Figure [11-18](#340881_3_En_11_Chapter.xhtml#Fig18) shows a selection
    of the 293 extended stored procedures inside the master database of my test SQL
    Server 2022 RC0 instance using the following T-SQL:


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig18_HTML.png)


    A screenshot of a S Q L server results window has a name column with 23 rows of
    stored procedure names. Some of them are s p underscore drop underscore trusted
    underscore assembly and s p underscore r e p l set sync status.


    Figure 11-18


    Selection of extended stored procedures inside the SQL Server 2022 RC0 master
    database


    ```

    SELECT name

    FROM master.dbo.sysobjects AS so

    WHERE so.type = ''X'';

    ```


    Probably the most notorious extended stored procedure is the xp_cmdshell extended
    stored procedure. The xp_cmdshell extended stored procedures makes it possible
    to execute a command inside a Windows command shell from within SQL Server. This
    is a huge security risk if your SQL Server instance is compromised, since it gives
    access to commands that can affect the entire Windows operating system. Thankfully,
    it is impossible to run the xp_cmdshell extended stored procedure by default;
    you have to specifically allow its use by configuring an advanced configuration
    setting.


    ### PREEMPTIVE_OS_GETPROCADDRESS Example


    For this example, we execute an extended stored procedure already present inside
    SQL Server, xp_getnetname, instead of writing a custom extended stored procedure,
    which is beyond the scope of this book. The xp_getnetname is an undocumented extended
    stored procedure which returns the NETBIOS name of the machine hosting your SQL
    Server instance. Before executing the xp_getnetname extended stored procedure,
    we clear the sys.dm_os_wait_stats DMV, and after the execution of xp_getnetname,
    we query the DMV for PREEMPTIVE_OS_GETPROCADDRESS wait information. Listing [11-4](#340881_3_En_11_Chapter.xhtml#PC5)
    shows the entire query I executed on my test SQL Server instance.


    ```

    USE [master];

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    Listing 11-4

    Execute xp_getnetname and query wait statistics

    ```


    The results of the query in Listing [11-4](#340881_3_En_11_Chapter.xhtml#PC5)
    can be seen in Figure [11-19](#340881_3_En_11_Chapter.xhtml#Fig19).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig19_HTML.png)


    A screenshot of 2 S Q L server result windows. Screenshot 1 has 1 column, server
    net name. with 1 row S Q L 2022\. Screenshot 2, has values of wait type as preemptive
    O S get proc address and waiting tasks count as 1 with wait time m s, max wait
    time m s, and signal wait time m s value as 0.


    Figure 11-19


    PREEMPTIVE_OS_GETPROCADDRESS wait


    The results aren’t spectacular. Apparently, the xp_getnetname extended stored
    procedure doesn’t cause any problems when loading the .dll entrypoint, since there
    is no wait time recorded. A wait still did occur though; as you can see in the
    waiting_tasks_count column, it just took SQL Server less than a millisecond to
    load the entrypoint.


    ### Lowering PREEMPTIVE_OS_GETPROCADDRESS Waits


    Since the PREEMPTIVE_OS_GETPROCADDRESS wait type is directly related to executing
    extended stored procedures, the first step in your investigation should be to
    detect if the extended stored procedure is being executed and what its function
    is.


    I have seen PREEMPTIVE_OS_GETPROCADDRESS waits occur because a third-party backup
    application used extended stored procedures to perform a database backup, but
    there are many more possible causes for high PREEMPTIVE_OS_GETPROCADDRESS wait
    times. Knowing which extended stored procedure is being executed can help you
    trace the process executing the extended stored procedure.


    There have been known bugs inside SQL Server 2008 and 2008R2 which reported higher-than-normal
    PREEMPTIVE_OS_GETPROCADDRESS wait times because the execution time of the extended
    stored procedure was also recorded in the wait times, instead of only the entrypoint
    loading. If you are still using SQL Server 2008 or 2008R2 and experience very
    high PREEMPTIVE_OS_GETPROCADDRESS wait times, it might be worth your while to
    upgrade to the latest Service Pack and check if the PREEMPTIVE_OS_GETPROCADDRESS
    wait times go down. Or even better, upgrade to a higher version of SQL Server
    since SQL Server 2008R2 is marked end-of-life as of July 9, 2019.


    ### PREEMPTIVE_OS_GETPROCADDRESS Summary


    The PREEMPTIVE_OS_GETPROCADDRESS wait type is directly related to the execution
    of extended stored procedures. Extended stored procedures can be written in a
    variety of programming languages like C# and allow you to perform actions that
    would otherwise be impossible in T-SQL. Wait time for the PREEMPTIVE_OS_GETPROCADDRESS
    wait type is recorded whenever the entrypoint inside an extended stored procedure
    .dll is loaded. In normal situations, wait times for the PREEMPTIVE_OS_GETPROCADDRESS
    wait type are very low. Seeing high PREEMPTIVE_OS_GETPROCADDRESS wait times can
    indicate that the entrypoint loading is running into problems. There have also
    been bugs related to the calculation of the PREEMPTIVE_OS_GETPROCADDRESS wait
    type inside SQL Server 2008 and 2008R2\. If you are running SQL Server 2008 or
    2008R2 and experience high PREEMPTIVE_OS_GETPROCADDRESS wait times, it might be
    worth your time to upgrade to the latest Service Pack or move to a higher version
    of SQL Server since SQL Server 2008R2 is marked end-of-life as of July 9, 2019.'
  trans: '

    # PREEMPTIVE_OS_GETPROCADDRESS


    本章最后一个等待类型是 **PREEMPTIVE_OS_GETPROCADDRESS**。`PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与
    SQL Server 内部执行扩展存储过程相关。


    扩展存储过程允许您使用 T-SQL 以外的语言（例如 C# 编程语言）创建外部例程。这些扩展存储过程使用 `.dll` 文件加载到 SQL Server 中，通过允许执行
    T-SQL 无法实现的操作（如读写 Windows 注册表项）来扩展 SQL Server 编程能力。


    自 SQL Server 2008 起，扩展存储过程已被标记为不推荐使用，应改用公共语言运行时（CLR）。然而，SQL Server 内部仍存在一些需要扩展存储过程的场景，并且一些第三方软件供应商仍然依赖它们。


    ## 什么是 PREEMPTIVE_OS_GETPROCADDRESS 等待类型？


    每当加载扩展存储过程内的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型。每当 SQL Server 加载或卸载扩展存储过程的
    `.dll` 文件时，都会调用该入口点。在正常情况下，入口点的加载应很快完成，导致 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间非常低。但是，根据扩展存储过程的不同（或与加载
    `.dll` 文件相关的问题），可能会观察到更高的等待时间。`PREEMPTIVE_OS_GETPROCADDRESS` 等待类型记录的是加载 `.dll`
    文件入口点所花费的时间，而不是扩展存储过程的执行时间。图 11-17 展示了 SQL Server 如何执行扩展存储过程的（简化）概览。


    ![](img/340881_3_En_11_Fig17_HTML.jpg)


    一个存储过程执行的流程图。用户向 SQL Server 引擎发送 TDS 信号，后者随后调用扩展存储过程 API 和 DLL。存储过程被执行，结果通过 SQL
    Server 引擎发送回用户。


    **图 11-17**


    执行扩展存储过程


    除了编写您自己的自定义扩展存储过程外，SQL Server 还附带了许多扩展存储过程。其中大多数可以通过扩展存储过程名称中的 `xp_` 前缀来识别，尽管并非所有都有此前缀。图
    11-18 展示了在我的测试 SQL Server 2022 RC0 实例的 `master` 数据库中，使用以下 T-SQL 查询到的 293 个扩展存储过程中的一部分：


    ![](img/340881_3_En_11_Fig18_HTML.png)


    一个 SQL Server 结果窗口的截图，包含一个名称列，其中有 23 行存储过程名称。其中一些是 `sp_drop_trusted_assembly`
    和 `sp_replsetsyncstatus`。


    **图 11-18**


    SQL Server 2022 RC0 `master` 数据库中的部分扩展存储过程


    ```sql

    SELECT name

    FROM master.dbo.sysobjects AS so

    WHERE so.type = ''X'';

    ```


    可能最臭名昭著的扩展存储过程是 `xp_cmdshell`。`xp_cmdshell` 扩展存储过程使得可以从 SQL Server 内部在 Windows
    命令 shell 中执行命令。如果您的 SQL Server 实例被入侵，这是一个巨大的安全风险，因为它提供了可能影响整个 Windows 操作系统的命令访问权限。幸运的是，默认情况下无法运行
    `xp_cmdshell` 扩展存储过程；您必须通过配置高级配置设置来特别允许其使用。


    ## PREEMPTIVE_OS_GETPROCADDRESS 示例


    在本例中，我们执行 SQL Server 中已存在的一个扩展存储过程 `xp_getnetname`，而不是编写一个自定义扩展存储过程（这超出了本书范围）。`xp_getnetname`
    是一个未公开的扩展存储过程，它返回托管您的 SQL Server 实例的机器的 NETBIOS 名称。在执行 `xp_getnetname` 扩展存储过程之前，我们先清除
    `sys.dm_os_wait_stats` DMV，执行后，我们查询该 DMV 以获取 `PREEMPTIVE_OS_GETPROCADDRESS` 等待信息。清单
    11-4 展示了我在测试 SQL Server 实例上执行的整个查询。


    ```sql

    USE [master];

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    exec xp_getnetname;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_GETPROCADDRESS'';

    ```


    **清单 11-4**

    执行 `xp_getnetname` 并查询等待统计信息


    清单 11-4 中查询的结果可以在图 11-19 中看到。


    ![](img/340881_3_En_11_Fig19_HTML.png)


    一个包含 2 个 SQL Server 结果窗口的截图。截图 1 有 1 列“server net name”，包含 1 行“SQL 2022”。截图 2
    包含 `wait_type` 值为 `PREEMPTIVE_OS_GETPROCADDRESS`，以及 `waiting_tasks_count` 值为 1，而
    `wait_time_ms`、`max_wait_time_ms` 和 `signal_wait_time_ms` 的值均为 0。


    **图 11-19**


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待


    结果并不惊人。显然，`xp_getnetname` 扩展存储过程在加载 `.dll` 入口点时没有引起任何问题，因为没有记录到等待时间。然而，等待仍然发生了；正如您在
    `waiting_tasks_count` 列中看到的，SQL Server 加载入口点花费的时间少于一毫秒。


    ## 降低 PREEMPTIVE_OS_GETPROCADDRESS 等待


    由于 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与执行扩展存储过程直接相关，您调查的第一步应该是检测是否正在执行扩展存储过程及其功能是什么。


    我曾见过 `PREEMPTIVE_OS_GETPROCADDRESS` 等待的发生，是因为一个第三方备份应用程序使用扩展存储过程来执行数据库备份，但高 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间还有许多其他可能的原因。了解正在执行哪个扩展存储过程可以帮助您追踪执行该过程的进程。


    在 SQL Server 2008 和 2008R2 中存在已知的错误，这些错误报告了高于正常的 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间，因为扩展存储过程的执行时间也被记录在等待时间中，而不仅仅是入口点加载。如果您仍在使用 SQL Server 2008 或 2008R2 并遇到非常高的
    `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 并检查 `PREEMPTIVE_OS_GETPROCADDRESS`
    等待时间是否下降可能是值得的。或者更好的是，升级到更高版本的 SQL Server，因为 SQL Server 2008R2 已于 2019 年 7 月 9
    日终止生命周期。


    ## PREEMPTIVE_OS_GETPROCADDRESS 总结


    `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型与扩展存储过程的执行直接相关。扩展存储过程可以用多种编程语言（如 C#）编写，并允许您执行原本在
    T-SQL 中不可能完成的操作。每当加载扩展存储过程 `.dll` 中的入口点时，就会记录 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型的等待时间。在正常情况下，`PREEMPTIVE_OS_GETPROCADDRESS`
    等待类型的等待时间非常低。观察到较高的 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间可能表明入口点加载遇到问题。在 SQL Server
    2008 和 2008R2 中，也存在与 `PREEMPTIVE_OS_GETPROCADDRESS` 等待类型计算相关的错误。如果您运行的是 SQL Server
    2008 或 2008R2 并遇到高 `PREEMPTIVE_OS_GETPROCADDRESS` 等待时间，升级到最新的 Service Pack 或迁移到更高版本的
    SQL Server 可能是值得的，因为 SQL Server 2008R2 已于 2019 年 7 月 9 日终止生命周期。

