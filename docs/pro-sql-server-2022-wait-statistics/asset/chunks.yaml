  trans: '

    为了说明高 CPU 使用率与`SOS_SCHEDULER_YIELD`等待类型相关，我们查看了累积等待统计信息 DMV——`sys.dm_os_wait_stats`。我们使用以下查询来显示按等待时间排序的前
    5 种等待类型，同时运行 Ostress 工具（在启动 Ostress 工具之前重置 DMV，以使数字保持较小）：


    ```sql

    SELECT TOP 5 *

    FROM sys.dm_os_wait_stats

    ORDER by wait_time_ms DESC;

    ```


    此查询的结果如`图 5-16`所示。


    ![](img/340881_3_En_5_Fig16_HTML.png)


    `图 5-16` - Ostress 执行期间的前 5 种等待类型


    如你所见，排名第一的等待类型是`SOS_SCHEDULER_YIELD`，其`waiting_tasks_count`和总`wait_time_ms`都很高。但在第二位，我们发现了`SOS_WORK_DISPATCHER`等待，这是
    SQL2019 引入的一种新等待。`SOS_WORK_DISPATCHER`等待记录的是线程处于空闲状态、等待分配工作的时间。


    如果你在生产环境 SQL Server 实例上遇到 CPU 问题，你可能首先要关注非常小、非常快的查询，就像本示例中执行的那些。如果这些查询的吞吐量增加，或者执行这些查询的
    SQL Server 的用户连接数增加，那么你可能会看到高 CPU 使用率。事务或用户连接的突然增长也可能导致高`SOS_SCHEDULER_YIELD`等待时间。


    导致高`SOS_SCHEDULER_YIELD`等待以及极高 CPU 使用率的另一个原因，可能是一种称为自旋锁争用的现象。自旋锁被定义为“用于保护数据结构访问的轻量级同步原语”，这是一个非常高级的主题。本书后面的附录二对自旋锁进行了更详细的介绍，供有兴趣了解更多的人参考。


    非常庞大、复杂的查询也可能导致更高的`SOS_SCHEDULER_YIELD`等待时间。尝试查找那些消耗大量 CPU 时间、内部包含复杂计算或数据类型转换的活动查询。我经常用来识别高
    CPU 消耗查询的一个查询如`清单 5-4`所示。


    ```sql

    SELECT TOP 10

    QText.TEXT AS ''Query'',

    QStats.execution_count AS ''Nr of Executions'',

    QStats.total_worker_time/1000 AS ''Total CPU Time (ms)'',

    QStats.last_worker_time/1000 AS ''Last CPU Time (ms)'',

    QStats.last_execution_time AS ''Last Execution'',

    QPlan.query_plan AS ''Query Plan''

    FROM sys.dm_exec_query_stats QStats

    CROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle) QText

    CROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan

    ORDER BY QStats.total_worker_time DESC;

    ```


    `清单 5-4` - 检测高 CPU 消耗的查询


    在我测试的 SQL Server 上执行`清单 5-3`中的查询结果如`图 5-17`所示。


    ![](img/340881_3_En_5_Fig17_HTML.png)


    `图 5-17` - 高 CPU 消耗的查询


    如你所见，与 Ostress 工具一起使用的查询是执行次数最多、消耗总 CPU 时间最高的查询。这个查询是调查的一个很好的起点。也许可以对这个查询进行优化或重写，使其不会消耗如此多的
    CPU 时间。


    另一种识别高 CPU 消耗查询的方法是使用查询存储。查询存储提供了一个名为“前 N 个资源消耗查询”的内置报告，允许你按 CPU 时间进行筛选，如`图 5-18`所示。


    ![](img/340881_3_En_5_Fig18_HTML.png)


    `图 5-18` - 通过查询存储可视化高 CPU 消耗的查询


    ### SOS_SCHEDULER_YIELD 总结


    `SOS_SCHEDULER_YIELD`等待类型将出现在每个 SQL Server 实例上，因为它与 SQL Server 用来授予工作线程访问处理器权限的调度模型直接相关。如果与基线测量相比，总等待时间或总等待任务数突然增加，则可能表明存在问题。大多数情况下，`SOS_SCHEDULER_YIELD`等待的大幅增加也意味着
    CPU 负载的增加。这种增加要么是由 SQL Server 进程本身引起的，要么是由 SQL Server 外部需要大量处理器时间、从而限制了 SQL Server
    访问处理器时间的另一个进程引起的。如果 CPU 负载的增加是由 SQL Server 进程负责的，你应该尝试将`SOS_SCHEDULER_YIELD`等待的增加与用户活动的增加关联起来。另一个选择是查询`sys.dm_exec_query_stats`
    DMV，如`清单 5-1`所示，或使用查询存储来找到那些需要最多处理器时间的查询，并专注于优化这些查询。


    ## THREADPOOL


    最臭名昭著的等待类型之一是`THREADPOOL`。与即使在你的 SQL Server 实例没有遇到任何问题时也会发生的`CXPACKET`和`SOS_SCHEDULER_YIELD`不同，高的`THREADPOOL`等待时间通常表示存在性能问题。就像前面讨论的其他两种与
    CPU 相关的等待类型一样，`THREADPOOL`等待类型与 SQL Server 调度的工作方式密切相关。

    '
- fmt: '### What Is the `THREADPOOL` Wait Type?


    If you see `THREADPOOL` waits on your system with longer wait times than normal,
    and your SQL Server is (almost) unresponsive, chances are you have an issue called
    **thread pool starvation**. Thread pool starvation occurs when there are no more
    free worker threads available to process requests. When this situation occurs,
    tasks currently waiting to be assigned to a worker thread will log the `THREADPOOL`
    wait type.


    SQL Server provides a number of worker threads to the schedulers with which to
    process requests. The number of worker threads available for your system depends
    on the number of processors and the processor architecture. Table 5-1 shows the
    maximum number of worker threads available for systems with up to 64 logical CPUs.


    **Table 5-1**

    Maximum number of worker threads


    | CPU number | 32-bit architecture | 64-bit architecture |

    | --- | --- | --- |

    | ≤4 | 256 | 512 |

    | 8 | 288 | 576 |

    | 16 | 352 | 704 |

    | 32 | 480 | 960 |

    | 64 | 736 | 1472 |


    You can also calculate the maximum number of worker threads available by using
    these formulas:


    32-bit with <= 4 logical processors: 256 worker threads

    32-bit with > 4 logical processors: `256 + ((number of logical processors − 4)
    × 8)`


    64-bit with <= 4 logical processors: 512 worker threads

    64-bit with > 4 logical processors: `512 + ((number of logical processors − 4)
    × 16)`


    Even though SQL Server calculates the maximum amount of available worker threads
    automatically (only once during startup), you can choose to overwrite the default
    by changing the `Maximum Worker Threads` option inside the Processors properties
    of your SQL Server instance, as shown in Figure 5-19. By default, the value of
    the `Maximum Worker Threads` option will be 0, which means SQL Server will calculate
    and assign the maximum amount of worker threads available using the preceding
    formulas.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig19_HTML.png)


    A screenshot of an S Q L server properties window. The processor option on the
    left opens the selectable options for processor affinity and I forward slash O
    affinity for all the processors.


    **Figure 5-19**

    Processors configuration of a SQL Server instance


    You can also query the number of worker threads assigned to your SQL Server instance
    by running the following query:

    ```sql

    SELECT max_workers_count

    FROM sys.dm_os_sys_info;

    ```

    For my 64-bit test SQL Server with 4 logical processors, I have 512 worker threads
    available, as you can see in Figure 5-20.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig20_HTML.jpg)


    A screenshot of maximum workers count. The count of 512 is highlighted.


    **Figure 5-20**

    Amount of worker threads on my test machine


    One piece of advice found on the Internet related to `THREADPOOL` waits is to
    change the `Maximum Worker Threads` option to a value higher than the default.
    I strongly advise against changing this option from its default value. Changing
    the setting to a higher value than the amount of worker threads may degrade the
    performance of your SQL Server because context switching occurs far more often.
    Another reason not to change the setting is that every worker thread requires
    a bit of memory to operate; for 32-bit systems, this is 512 KB per worker thread,
    and for 64-bit systems, it’s 2048 KB.


    ### `THREADPOOL` Example


    Let’s start with an example of `THREADPOOL` waits. Even though I have warned you
    multiple times already to not run any of the demo scripts in this book in a production
    environment, this one deserves a special reminder. Running the demo scripts in
    this section can cause your SQL Server to become completely unresponsive, not
    accepting any new connections, and can eventually require a restart of the SQL
    Server service! `Do not run this on a SQL Server that isn’t allowed to become
    unresponsive`!


    For this example, we use the `Ostress` utility again to simulate concurrency and
    load against the test SQL Server instance. First, we create another `.sql` file
    (`select_rnd.sql`) that holds the following query we will execute using `Ostress`:

    ```sql

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    OPTION (MAXDOP 1);

    ```

    This query will select one random row from the `Sales.SalesOrderDetail` table
    in the `GalacticWorks` database. There is a reason I included the query option
    to serially run this query, and I will explain later.


    Now, before we launch `Ostress` to execute the query, we are purposely going to
    lower the maximum amount of worker threads available on the test SQL Server. To
    do this, we execute this query:

    ```sql

    EXEC sp_configure ''show advanced options'', 1;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''max worker threads'', 128;

    GO

    RECONFIGURE

    GO

    ```

    This will set the maximum number of worker threads available to 128, the minimum
    value for a 64-bit SQL Server instance.


    Let’s fire up `Ostress` and execute the `.sql` script we created earlier:

    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```

    In this case, we start 150 different threads to execute the query in the `select_rnd.sql`
    file 10 times. The reason for spawning 150 threads is because 150 is now higher
    than the maximum number of worker threads available on the test SQL Server instance,
    but not so high that we cannot execute queries anymore.


    While the script is running, let’s take a look at the number of worker threads
    running and waiting using the `sys.dm_os_schedulers` DMV:

    ```sql

    SELECT scheduler_id,

    current_tasks_count,

    runnable_tasks_count,

    current_workers_count,

    active_workers_count,

    work_queue_count

    FROM sys.dm_os_schedulers

    WHERE status = ''VISIBLE ONLINE'';

    ```

    **Listing 5-5**

    Querying `sys.dm_os_schedulers`


    The results of this query are shown in Figure 5-21.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig21_HTML.png)


    A screenshot of query output. The output table has 7 columns and 4 rows. The scheduler
    I D 0 in row 1 is highlighted.


    **Figure 5-21**

    Tasks and worker threads per scheduler


    The most important columns here are the `current_workers_count`, `active_workers_count`,
    and `work_queue_count` columns. The `current_workers_count` column shows the number
    of worker threads associated with this scheduler; this number also includes worker
    threads that are not yet assigned to a task. The `active_workers_count` column
    returns the number of worker threads that are in the “RUNNING,” “RUNNABLE,” or
    “SUSPENDED” states. The big difference between the `current_workers_count` and
    the `active_workers_count` columns is that the `active_workers_count` is the number
    of worker threads that have been assigned to a task, while the `current_workers_count`
    returns all the worker threads. The `work_queue_count` column shows us the number
    of tasks that are currently waiting to get a worker thread assigned to them. If
    you see values higher than 0 in this column for a longer period and for all schedulers,
    you are experiencing thread pool starvation.


    Let’s check the `sys.dm_os_waiting_tasks` DMV for waiting tasks that originate
    from a user session. Notice that we filter out all the sessions that have a session
    ID lower than 50, even though I told you to not do this in Chapter 2, “Querying
    SQL Server Wait Statistics”:

    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```'
