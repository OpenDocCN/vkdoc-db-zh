    # Part IIWait Types


    # 5. CPU-Related Wait Types


    Processors have evolved enormously in the last few decades, and processor manufacturers
    manage to build faster processors on a yearly basis. And while the speed of processors
    is hitting a ceiling, the number of cores manufacturers manage to build inside
    their processors has grown. At the time of writing this book, you can buy a single
    processor with 64 cores inside to power your system. Processors are also one of
    the difficult parts of your system to replace. While expanding your system’s memory
    is relatively easy, replacing a processor for a faster one or more cores requires
    you to change the system’s motherboard due to CPU socket incompatibility. This
    means we are often stuck with the current processors until we replace the system
    altogether.


    Processors are important for SQL Server. Higher processor speeds will accelerate
    processor-related instructions, and more cores means more schedulers for SQL Server
    to use for request executions. But even these upgrades in speed and cores cannot
    prevent the fact we will sometimes wait on processor resources. In this chapter,
    we will look at some wait types with a relation with your system’s processor.


    ## CXPACKET


    By far the most common CPU-related wait type in SQL Server instances deployed
    uses default, out-of-the-box, configuration options. It is also one of the most
    misunderstood wait types and sometimes has little impact on your query performance.
    In fact, lowering CXPACKET wait times may degrade the performance of your query!
    If you are running SQL Server 2016 SP2 or later, there are changes in how to handle
    CXPACKET waits. We will discuss the impact of the changes, including the parallelism-related
    wait type CXCONSUMER, at the end of this section.'
  trans: '

    结合等待统计的基线信息和`Perfmon`指标，Jane 认为问题与存储有关，并联系了存储管理员。收集到的指标对存储管理员也有帮助，因为他们可以将自己存储相关的测量结果与
    Jane 提供的数据进行比较。存储管理员确认问题与销售数据库所在的磁盘有关，并通过更换磁盘阵列中的一个故障磁盘解决了问题。更换磁盘后，磁盘延迟恢复到平均 6
    毫秒，高延迟峰值消失。Jane 在磁盘更换后再次从`WaitStats`表中查询等待时间，注意到`PAGIOLATCH_SH`等待类型的等待时间又接近基线值。用户也告知
    Jane，报表运行再次正常。


    在这个例子中，Jane 完成了图 4-9 所示的等待统计性能分析流程图的所有步骤：


    1.  用户在运行报表时体验到性能下降。

    2.  Jane 查询`sys.dm_os_waiting_tasks` `DMV`，以找出是否存在高等待时间或频繁出现的等待类型。`PAGIOLATCH_SH`等待类型似乎频繁出现。

    3.  Jane 通过捕获今天的`PAGIOLATCH_SH`等待时间并与基线进行比较来收集指标，同时从`Perfmon`收集额外指标。

    4.  所有指标都显示问题很可能与存储有关，Jane 联系了存储管理员。

    5.  存储管理员更换了阵列中一个损坏的磁盘。存储延迟值降至 6 毫秒。

    6.  Jane 再次检查`PAGIOLATCH_SH`等待类型的等待时间，并确认它们已接近基线值。


    尽管这个例子看起来很简单，但它基于我在现实世界中遇到的一个性能问题。通过运用等待统计性能分析流程图中的步骤并结合基线指标，我能够快速识别并解决问题。


    **技术宅笔记**

    相关性并不意味着因果关系。虽然更换磁盘似乎解决了问题，但现实是你的基础架构很复杂。有可能真正的根本原因是别的，比如在`VM`主机上发生内核拥塞，当时显示为`PAGIOLATCH_SH`，并且大约在磁盘被更换的同时也得到了解决。


    在示例中，代码清单 4-6 中的查询为`PAGIOLATCH_SH`等待类型创建了基线。这个查询是你可以用于`WaitStats`表的一个示例。你应该根据自己的需要对其进行修改；例如，你可以选择不限制工作日的结果，而是显示特定日期捕获的平均等待时间。或者，你可以请求特定日期的实际等待时间。


    如果你要长时间捕获等待统计数据，将结果拆分到多个表中可能是一个好主意，以便于更快地进行查询。例如，你可以使用以下查询将三月份进行的所有等待统计测量插入到它们自己的表中：

    ```sql

    SELECT *

    INTO WaitStats_March

    FROM WaitStats

    WHERE ws_Month = 3;

    ```

    这也让我们能够通过将不同的表连接在一起来比较不同时间段的特定等待时间。


    **技术宅笔记**

    你可以用多种方式来分析和切片这些数据，例如使用窗口函数，或者使用`PowerBI`构建一个合适的仪表板。选择最适合你的方式。


    图 4-15 展示了我最终通常得到的基线数据库中的表，数据按月排序。


    ![](img/340881_3_En_4_Fig15_HTML.jpg)


    基线文件夹内的表截图包含四种类型的表：系统表、文件表、外部表和图形表。


    **图 4-15**

    按月拆分的等待统计测量


    你应该自己决定如何拆分测量数据；也许你想为每个使用的应用程序版本在单独的表中存储等待统计测量，或者将特定等待类型的所有测量存储在单独的表中。选择权在你。


    希望本章能给你一些关于如何存储等待统计测量并从这些测量创建基线的想法。我尽量避免确切地告诉你该做什么以及如何做，因为我相信单一的方法并不适合所有人。你需要编写并调整自己的查询来创建你感兴趣的基线，但我希望本章向你展示了可以进一步构建的基础。


    ## 总结

    在本章中，我们从理论和实践两个角度仔细研究了基线。基线对于你进行的任何类型的性能分析都极其重要。在等待统计的案例中，如果你想排查与`SQL Server`相关的性能问题，通常需要基线。由于等待统计对你的系统是唯一的，比较等待时间只有一种方法——那就是基线。


    我为你提供了一些示例和`T-SQL`脚本，来创建你自己的等待统计基线表，这样你现在就可以开始捕获等待统计信息了。我们还通过一个例子，介绍了如何查询基线信息并将其与实际测量值进行比较，以排查与性能相关的事件。


    # 第二部分 等待类型


    # 5. 与 CPU 相关的等待类型

    在过去的几十年里，处理器经历了巨大的发展，处理器制造商每年都能制造出更快的处理器。虽然处理器的速度正在触及天花板，但制造商在处理器内集成的内核数量却在增长。在撰写本书时，你可以购买一个内含
    64 核的单处理器来驱动你的系统。处理器也是系统中较难更换的部分之一。虽然扩展系统内存相对容易，但更换一个速度更快或内核更多的处理器通常需要你更换系统主板，因为`CPU`插槽不兼容。这意味着我们常常在更换整个系统之前，只能使用当前的处理器。


    处理器对`SQL Server`很重要。更高的处理器速度将加速处理器相关的指令，而更多的内核意味着`SQL Server`有更多的调度器可用于请求执行。但即使是速度和核心的升级，也无法避免我们有时会等待处理器资源。在本章中，我们将探讨一些与你的系统处理器相关的等待类型。


    ## CXPACKET

    在使用默认、开箱即用配置选项部署的`SQL Server`实例中，这是迄今为止最常见的与`CPU`相关的等待类型。它也是最容易被误解的等待类型之一，有时对你的查询性能影响很小。事实上，降低`CXPACKET`等待时间可能会降低查询性能！如果你运行的是`SQL
    Server 2016 SP2`或更高版本，处理`CXPACKET`等待的方式有所改变。我们将在本节末尾讨论这些更改的影响，包括与并行度相关的等待类型`CXCONSUMER`。

    '
- fmt: '# What Is the CXPACKET Wait Type?


    The `CXPACKET` wait type occurs when a query is executed in parallel (i.e., on
    multiple CPU cores) instead of serial (a single CPU core). Parallel execution
    of queries has a performance advantage compared to serial execution if the work
    is divided among multiple worker threads. This advantage would apply to queries
    returning large result sets; queries returning only a few rows benefit far less
    from parallelism, and in many cases parallelism slows down those queries. This
    doesn’t mean we turn off parallelism as I have yet to see a true OLTP database
    where every query only returns a handful of rows. Many systems have a mixed workload,
    dealing with short duration queries but also large, longer-running, reporting,
    and analytical queries.


    ## Parallel Query Execution and Thread Coordination


    Parallel queries use multiple worker threads to execute a request. Along with
    the worker threads created to perform the work requested, a parallel query will
    also use a control thread, also known as the `Thread 0`. This thread''s task is
    to coordinate the other worker threads. While `Thread 0` is waiting for the other
    worker threads to finish the work they were assigned to perform, it records total
    wait as the `CXPACKET` wait type. To understand this relation a little bit better,
    look at Figure 5-1.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig1_HTML.png)


    A line graph has threads versus time. 5 horizontal right arrows labeled thread
    0 to 4 are almost of equal lengths. Thread 0 at the top is a shaded dashed arrow.


    *Figure 5-1: Parallel query threading*


    As soon as the SQL Server Query Optimizer decides on an execution plan which uses
    parallelism, you will see `CXPACKET` waits occur. This is completely normal and
    nothing to worry about if you are expecting queries to run in parallel and they
    perform as expected. In those cases, you can ignore long wait times on the `CXPACKET`
    wait type. There are, however, cases where you don’t want to use parallelism or
    when parallelism is negatively impacting the performance of your queries because
    of skewed workloads.


    ## Configuring Parallelism Settings


    Because the `CXPACKET` wait type is directly related to the parallelism settings
    of your SQL Server instance, we can influence it by adjusting server configuration
    settings. We find the parallelism settings in the **Server Properties** ➤ **Advanced**
    ➤ **Parallelism** section of your SQL Server instance, as shown in Figure 5-2.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig2_HTML.png)


    A screenshot of server properties window for an S Q L server. The bounding boxes
    highlight the advanced option on the left menu and the parallelism section at
    the bottom.


    *Figure 5-2: Parallelism configuration for entire SQL Server instance*


    Of these settings, the `Cost Threshold for Parallelism` and `Max Degree of Parallelism`
    settings will have the most impact on parallel queries.


    ### Cost Threshold for Parallelism


    The `Cost Threshold for Parallelism` setting configures the cost threshold for
    a query executed in parallel by the Query Optimizer. If a query has a cost higher
    than the value configured in the `Cost Threshold for Parallelism`, the Query Optimizer
    might decide to generate a parallel plan instead of a serial one. By default,
    the setting has a value of 5 and can be configured to have a value between 0 and
    32,767.


    ### Max Degree of Parallelism


    The `Max Degree of Parallelism` setting configures the maximum number of schedulers
    used by each operator when executing a parallel plan. By default, this setting
    is configured to be 0, which means all available schedulers may be used when a
    parallel plan is executed.


    ## Database-Scoped Parallelism Configuration


    If you are running SQL Server 2016 or higher, you are also able to configure the
    `MAXDOP` parallelism settings on a database level through database scoped configuration
    items, as shown in Figure 5-3.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig3_HTML.png)


    A screenshot of database properties window for Galactic works. The bounding boxes
    highlight the options on the left menu and the database-scoped configurations
    section on the right.


    *Figure 5-3: Database scoped parallelism configuration*


    The introduction of database scoped configuration settings for parallelism is
    a welcome change. Consider, for instance, when you have multiple databases inside
    the same SQL Server instance. Ideally each of those databases will use configuration
    settings tuned for their specific workloads. Before SQL Server 2016, we couldn’t
    configure that on a per-database level, so generally you would stick with generalized
    configuration values. Now with database scoped configurations possible, it is
    easy to configure the optimal setting for each individual database.


    With the ability to add database scoped configuration values for parallelism settings,
    there is a difference in how the SQL Server engine processes these configurations:


    *   The database scoped configuration setting will overwrite the current instance
    setting only if the database scoped setting is set to a non-default value.

    *   If the database scoped configuration setting is set to its default value,
    the instance-wide configuration setting will be used.


    As an example, if the `Max Degree of Parallelism` setting is configured to be
    4 on the instance level and 0 (default) on the database level, queries executed
    in parallel may use four schedulers. If the database scoped setting is changed
    to be a value of 2, queries executed against the database may use a maximum of
    two schedulers overwriting the instance setting of 4.'
  raw: '### What Is the CXPACKET Wait Type?


    The CXPACKET wait type occurs when a query is executed in parallel (i.e., on multiple
    CPU cores) instead of serial (a single CPU core). Parallel execution of queries
    has a performance advantage compared to serial execution if the work is divided
    among multiple worker threads. This advantage would apply to queries returning
    large result sets; queries returning only a few rows benefit far less from parallelism,
    and in many cases parallelism slows down those queries. This doesn’t mean we turn
    off parallelism as I have yet to see a true OLTP database where every query only
    returns a handful of rows. Many systems have a mixed workload, dealing with short
    duration queries but also large, longer-running, reporting, and analytical queries.


    Parallel queries use multiple worker threads to execute a request. Along with
    the worker threads created to perform the work requested, a parallel query will
    also use a control thread, also known as the Thread 0\. This Thread’s 0 task is
    to coordinate the other worker threads. While the Thread 0 is waiting for the
    other worker threads to finish the work they were assigned to perform, it records
    total wait as the CXPACKET wait type. To understand this relation a little bit
    better, look at Figure [5-1](#340881_3_En_5_Chapter.xhtml#Fig1).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig1_HTML.png)


    A line graph has threads versus time. 5 horizontal right arrows labeled thread
    0 to 4 are almost of equal lengths. Thread 0 at the top is a shaded dashed arrow.


    Figure 5-1


    Parallel query threading


    As soon as the SQL Server Query Optimizer decides on an execution plan which uses
    parallelism, you will see CXPACKET waits occur. This is completely normal and
    nothing to worry about if you are expecting queries to run in parallel and they
    perform as expected. In those cases, you can ignore long wait times on the CXPACKET
    wait type. There are, however, cases where you don’t want to use parallelism or
    when parallelism is negatively impacting the performance of your queries because
    of skewed workloads.


    Because the CXPACKET wait type is directly related to the parallelism settings
    of your SQL Server instance, we can influence it by adjusting server configuration
    settings. We find the parallelism settings in the Server Properties ➤ Advanced
    ➤ Parallelism section of your SQL Server instance, as shown in Figure [5-2](#340881_3_En_5_Chapter.xhtml#Fig2).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig2_HTML.png)


    A screenshot of server properties window for an S Q L server. The bounding boxes
    highlight the advanced option on the left menu and the parallelism section at
    the bottom.


    Figure 5-2


    Parallelism configuration for entire SQL Server instance


    Of these settings, the Cost Threshold for Parallelism and Max Degree of Parallelism
    settings will have the most impact on parallel queries.


    The **Cost Threshold for Parallelism** setting configures the cost threshold for
    a query executed in parallel by the Query Optimizer. If a query has a cost higher
    than the value configured in the Cost Threshold for Parallelism, the Query Optimizer
    might decide to generate a parallel plan instead of a serial one. By default,
    the setting has a value of 5 and can be configured to have a value between 0 and
    32,767.


    The **Max Degree of Parallelism** setting configures the maximum number of schedulers
    used by each operator when executing a parallel plan. By default, this setting
    is configured to be 0, which means all available schedulers may be used when a
    parallel plan is executed.


    If you are running SQL Server 2016 or higher, you are also able to configure the
    MAXDOP parallelism settings on a database level through database scoped configuration
    items, as shown in Figure [5-3](#340881_3_En_5_Chapter.xhtml#Fig3).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig3_HTML.png)


    A screenshot of database properties window for Galactic works. The bounding boxes
    highlight the options on the left menu and the database-scoped configurations
    section on the right.


    Figure 5-3


    Database scoped parallelism configuration


    The introduction of database scoped configuration settings for parallelism is
    a welcome change. Consider, for instance, when you have multiple databases inside
    the same SQL Server instance. Ideally each of those databases will use configuration
    settings tuned for their specific workloads. Before SQL Server 2016, we couldn’t
    configure that on a per-database level, so generally you would stick with generalized
    configuration values. Now with database scoped configurations possible, it is
    easy to configure the optimal setting for each individual database.


    With the ability to add database scoped configuration values for parallelism settings,
    there is a difference in how the SQL Server engine processes these configurations:


    *   The database scoped configuration setting will overwrite the current instance
    setting only if the database scoped setting is set to a non-default value.


    *   If the database scoped configuration setting is set to its default value,
    the instance-wide configuration setting will be used.


    As an example, if the Max Degree of Parallelism setting is configured to be 4
    on the instance level and 0 (default) on the database level, queries executed
    in parallel may use four schedulers. If the database scoped setting is changed
    to be a value of 2, queries executed against the database may use a maximum of
    two schedulers overwriting the instance setting of 4.'
  trans: '# 什么是 CXPACKET 等待类型？


    当查询以并行方式（即在多个 CPU 核心上）而非串行方式（单个 CPU 核心）执行时，就会出现 `CXPACKET` 等待类型。如果工作被分配给多个工作线程执行，并行执行查询相比串行执行具有性能优势。这种优势适用于返回大型结果集的查询；仅返回少量行的查询从并行中获益甚微，在许多情况下，并行反而会减慢这些查询的执行速度。这并不意味着我们应该关闭并行，因为我尚未见过一个真正的
    OLTP 数据库，其中每个查询都只返回少量行。许多系统具有混合工作负载，既要处理短时间查询，也要处理大型、运行时间较长的报告和分析查询。


    ## 并行查询执行与线程协调


    并行查询使用多个工作线程来执行一个请求。除了为执行请求工作而创建的工作线程外，并行查询还会使用一个控制线程，也称为 `Thread 0`。该线程的任务是协调其他工作线程。当
    `Thread 0` 等待其他工作线程完成分配给他们的任务时，它会记录总的等待时间为 `CXPACKET` 等待类型。为了更好地理解这种关系，请参见图 5-1。


    ![](img/340881_3_En_5_Fig1_HTML.png)


    一条折线图，纵轴为线程，横轴为时间。五条指向右侧的水平箭头，标记为线程 0 到 4，长度几乎相等。最上方的线程 0 是一条带阴影的虚线箭头。


    *图 5-1：并行查询线程模型*


    一旦 SQL Server 查询优化器决定使用并行执行计划，你就会看到 `CXPACKET` 等待发生。如果你预期查询会并行运行并且其表现符合预期，这完全正常，无需担心。在这些情况下，你可以忽略
    `CXPACKET` 等待类型上的长时间等待。然而，在某些情况下，你可能不希望使用并行，或者由于工作负载分布不均，并行正在对查询性能产生负面影响。


    ## 配置并行设置


    由于 `CXPACKET` 等待类型与你的 SQL Server 实例的并行设置直接相关，我们可以通过调整服务器配置设置来影响它。在 SQL Server
    实例的 **服务器属性** ➤ **高级** ➤ **并行** 部分可以找到并行设置，如图 5-2 所示。


    ![](img/340881_3_En_5_Fig2_HTML.png)


    SQL Server 服务器属性窗口的截图。边框高亮了左侧菜单中的“高级”选项和底部的“并行”部分。


    *图 5-2：整个 SQL Server 实例的并行配置*


    在这些设置中，`并行的成本阈值` 和 `最大并行度` 设置对并行查询的影响最大。


    ### 并行的成本阈值


    `并行的成本阈值` 设置用于配置查询优化器决定并行执行查询的成本阈值。如果一个查询的成本高于 `并行的成本阈值` 中配置的值，查询优化器可能会决定生成并行计划而非串行计划。默认情况下，该设置的值为
    5，可配置为 0 到 32,767 之间的值。


    ### 最大并行度


    `最大并行度` 设置用于配置执行并行计划时每个运算符使用的最大调度器数量。默认情况下，此设置配置为 0，这意味着执行并行计划时可以使用所有可用的调度器。


    ## 数据库作用域的并行配置


    如果你运行的是 SQL Server 2016 或更高版本，还可以通过数据库作用域配置项在数据库级别配置 `MAXDOP` 并行设置，如图 5-3 所示。


    ![](img/340881_3_En_5_Fig3_HTML.png)


    Galactic works 数据库属性窗口的截图。边框高亮了左侧菜单中的选项和右侧的数据库作用域配置部分。


    *图 5-3：数据库作用域的并行配置*


    引入用于并行的数据库作用域配置设置是一个受欢迎的变化。例如，考虑你在一个 SQL Server 实例中有多个数据库的情况。理想情况下，这些数据库中的每一个都将使用为其特定工作负载调整的配置设置。在
    SQL Server 2016 之前，我们无法在每个数据库级别进行配置，因此通常你会坚持使用通用的配置值。现在，由于数据库作用域配置成为可能，为每个单独的数据库配置最佳设置变得很容易。


    随着能够为并行设置添加数据库作用域配置值，SQL Server 引擎处理这些配置的方式有所不同：


    *   仅当数据库作用域设置被设置为非默认值时，它才会覆盖当前的实例设置。

    *   如果数据库作用域配置设置为其默认值，则将使用实例范围的配置设置。


    例如，如果 `最大并行度` 设置在实例级别配置为 4，在数据库级别配置为 0（默认值），则并行执行的查询可能使用四个调度器。如果将数据库作用域设置更改为值
    2，则针对该数据库执行的查询最多可能使用两个调度器，从而覆盖实例设置的 4。'
- fmt: '### Lowering CXPACKET Wait Time by Tuning the Parallelism Configuration Options


    There are various methods you can use to lower CXPACKET wait times, but you must
    first determine if CXPACKET waits are causing your issue. Like I said earlier,
    CXPACKET waits are normal whenever parallelism is enabled for the SQL Server instance.
    One solution found on Internet forums is to disable parallelism by setting the
    `Max Degree of Parallelism` option to a value of 1. In most cases, this is not
    a good idea. Disabling parallelism will make the CXPACKET waits disappear, but
    some queries might perform worse since they cannot run in parallel anymore.


    A better approach to lowering CXPACKET waits is to tune the `Cost Threshold for
    Parallelism` and `Max Degree of Parallelism` options, so they match with your
    workload. This way only the queries which benefit the most from parallelism will
    be run in parallel. A way to find this parallelism sweet spot is by comparing
    the runtime of a query when it ran serially vs. in parallel. You should generally
    focus on queries that access a lot of information and have a longer runtime in
    general, as those will be the queries that benefit the most from parallelism.


    Consider this example where we have a query against our GalacticWorks database
    requesting information from the `Sales.SalesOrderDetail` table:


    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    ```


    To determine if this query is a candidate for parallel execution, we will check
    the estimated cost of the query. To view this information, we look at the estimated
    execution plan for if the query were executed serially. To make sure the query
    runs serially, we add the query option `MAXDOP 1`:


    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC

    OPTION (MAXDOP 1);

    ```


    We select the Display Estimated Execution Plan (or press `CTRL+L`) and hover over
    the `SELECT` icon in the execution plan window:


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig4_HTML.jpg)


    A screenshot of the execution plan for the `Sales.SalesOrderDetail` query with
    the `MAXDOP 1` option. The cursor points to the `SELECT` option in the plan which
    opens a properties menu.


    Figure 5-4: Estimated cost of query with `MAXDOP 1`


    In this case, the estimated cost is 10.4907. Because the `Cost Threshold for Parallelism`
    is still the default value of 5 for this instance, I am confident the query will
    run in parallel if I remove the `MAXDOP` query hint.


    Figure [5-5](#340881_3_En_5_Chapter.xhtml#Fig5) shows the actual execution plan
    after executing the query without the `MAXDOP 1` option.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig5_HTML.png)


    A screenshot of an execution plan for the `Sales.SalesOrderDetail` query. The
    events with cost % include clustered index scan, 14%. Sort, 66%. Parallelism,
    19%. Compute scalar, 0%. Select, 0%.


    Figure 5-5: Actual execution plan without `MAXDOP 1` option


    As you can see, the query ran using parallelism, just as we expected, since the
    estimated cost was higher than the value configured for the `Cost Threshold for
    Parallelism` option. If we look at the properties of the `SELECT` operation in
    the actual execution plan, we find additional information, as shown in Figure
    [5-6](#340881_3_En_5_Chapter.xhtml#Fig6).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig6_HTML.jpg)


    A screenshot of an execution plan. The cursor points to the `SELECT` operation
    which opens a properties menu. The menu has cached plan size and other estimated
    values.


    Figure 5-6: `SELECT` operation properties


    The properties of the `SELECT` operation show the query was executed using two
    threads and the estimated cost decreased to 7.08005.


    If we changed the `Cost Threshold for Parallelism` value to a higher number rather
    than the default of 5, queries like this example may not use parallelism, but
    larger cost reporting queries will. Remember, this option is for the entire instance
    and will affect queries in every database.


    Even though the estimated cost decreased, the improvement in execution time is
    small (about 300 ms) for this example query. You will want to consider the execution
    time (using `SET STATISTICS TIME`) when tuning for parallelism using the `Cost
    Threshold for Parallelism` option and decide if altering this setting is a benefit
    or not.


    #### Nerd Note


    The default `Cost Threshold for Parallelism` value of 5 is antiquated for modern
    database workloads. You will want to test to see what value is right for your
    specific system, but for most out-of-the-box installs, I recommend setting this
    value to a higher number, such as 50, and adjust as necessary from there.


    Another setting to keep in mind is the `Max Degree of Parallelism` option. When
    left at the default of 0, all available schedulers may be used when a query runs
    in parallel. But using more schedulers doesn’t necessarily mean the query executes
    faster. The benefits of using more schedulers decrease after using more than 8.
    Microsoft recommends the following configuration (from [https://slrwnds.com/xtvmvp](https://slrwnds.com/xtvmvp)):


    *   For servers with > 8 cores, set the `Max Degree of Parallelism` option to
    8.

    *   For servers with < 8 cores, set `MAXDOP` at or below the number of logical
    processors.


    This is a general recommendation, and your mileage will vary. The KB article also
    discusses the use of NUMA (Non-Uniform Memory Access) nodes, how SQL Server configures
    soft-NUMA nodes, and the recommended settings.


    #### Nerd Note


    In an ideal world, you would configure your SQL Server instance to run inside
    of a single NUMA node. This includes not only the number of logical processors
    assigned to each node but the amount of memory as well.


    The setting of both the `Cost Threshold for Parallelism` and `Max Degree of Parallelism`
    options depends on the workload of your system and requires careful testing to
    find out what works for you and what doesn’t. They will impact your CXPACKET wait
    time though, so compare the CXPACKET wait times against a baseline after changing
    the `Cost Threshold for Parallelism` or `Max Degree of Parallelism` options to
    measure the impact of the change.'
