- fmt: "# PAGELATCH_[xx] 示例\n\n在本章的引言中，我们查看了当许多并发查询在临时查询中加载数据时，`tempdb`数据库内部的页锁存争用情况。这不是\
    \ SQL Server 内部锁存争用的唯一形式。另一种锁存争用形式是“末页插入争用”。正如前面讨论的页锁存争用场景一样，末页插入争用是通过注意到大量的`PAGELATCH`等待来识别的。让我们通过一个末页插入争用的例子来说明。\n\
    \n很可能，也许在参加数据库设计课程时，你被告知每个表都应该有一个聚集索引。你也被告知聚集索引键的最佳候选者是一个窄的、唯一的、不断增长的值，也许是一个整数。虽然这些设计选项对许多场景很有用，但在某些情况下，这种设计会导致一个称为末页插入争用的性能问题。\n\
    \n末页插入争用将发生在对行相对较小的表进行大量插入工作负载的数据库上；例如，一个包含`ID`列（整数数据类型，自动增长）和`Name`列（`Varchar`数据类型）的表。从最佳实践的角度来看，我们会在`ID`列上创建聚集索引，因为它完美地符合良好索引键的描述。它是窄的，对每一行都是唯一的，并且总是在增长。但由于自动增长的不断增长的特性，每一个新添加的行都将被添加到聚集索引的末尾，从而为聚集索引的最后一个数据页创建了一个热点。\n\
    \n> **Nerd Note**\n> \n> 从 SQL Server 2019 开始，`CREATE INDEX`语句添加了一个新选项`OPTIMIZE_FOR_SEQUENTIAL_KEY`，它可以缓解（但不能消除）这里讨论的末页插入场景。你可以在\
    \ [`https://slrwnds.com/hn4nih`](https://slrwnds.com/hn4nih) 阅读更多关于此选项的信息。\n\n\
    图 9-7 展示了行插入聚集索引内部数据页的行为，以一种所谓的 B 树结构形式，这是 SQL Server 用于排序索引的数据结构。\n\n![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig7_HTML.png)\n\
    图 9-7：聚集索引末页上的末页插入争用\n\n即使当前数据页已满，并添加了一个新的数据页，插入的目标将更改为新页面，将热点切换到新的数据页。\n\n锁不会阻止这种争用的发生。默认情况下，SQL\
    \ Server 将使用独占行级锁来插入数据，而不是发出页级锁。你会记得，一个页面上可以存在多个独占行级锁。\n\n然而，对内存中页面的访问仍然需要串行发生，因此使用锁存器来确保在任何时间只有一个线程可以访问该页面。图\
    \ 9-8 展示了聚集索引叶级数据页在锁存在情况下的放大视图。\n\n![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig8_HTML.png)\n\
    图 9-8：存在锁的聚集索引叶页\n\n为了展示末页插入争用的例子，让我们使用下面的查询在`GalacticWorks`数据库中创建一个新表：\n\n```\n\
    CREATE TABLE Insert_Test\n(ID INT IDENTITY (1,1) PRIMARY KEY,\nRandomData VARCHAR(50));\n\
    ```\n\n如你所见，这是一个小表，包含一个`ID`列（对插入的每一新行自动增长）和一个`RandomData`列来保存一些数据。我指定`ID`列是该表的主键，这将自动使用`ID`列作为索引键创建聚集索引。\n\
    \n下一步是运行`Ostress`，使用一个高度并发的工作负载将新行插入到`Insert_Test`表中。这次我没有为`Ostress`创建`.sql`输入文件，而是在`Ostress`命令行中输入以下查询：\n\
    \n```\nINSERT INTO Insert_Test\n(RandomData)\nVALUES\n(CONVERT(varchar(50), NEWID()))\n\
    ```\n\n现在我们创建以下`Ostress`命令行，以连接到`GalacticWorks`数据库，并使用 500 个并发连接执行我们提供的查询，每个连接执行该查询\
    \ 100 次。这应该能创建足够的并发插入来演示末页插入争用：\n\n```\n\"C:\\Program Files\\Microsoft Corporation\\\
    RMLUtils\\ostress.exe\" -S.\\RC0 -E -dGalacticWorks -Q\"INSERT INTO Insert_Test\
    \ (RandomData) VALUES (CONVERT(varchar(50), NEWID()))\" -n500 -r100 -q\n```\n\n\
    当`Ostress`运行时，我查询`sys.dm_os_waiting_tasks` DMV：\n\n```\nSELECT\nsession_id,\n\
    wait_duration_ms,\nwait_type,\nresource_description\nFROM sys.dm_os_waiting_tasks;\n\
    ```\n\n此查询过滤掉了一些列，以便结果的屏幕截图能放在页面上。图 9-9 显示了部分结果。\n\n![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig9_HTML.png)\n\
    图 9-9：同一页上的`PAGELATCH_EX`等待\n\n正如预期的那样，插入工作负载导致聚集索引内部的一个页面上出现了热点，在这个例子中是页面 ID\
    \ 为`25848`的页面。图 9-9 中显示的所有任务（还有大约 200 个未显示）都在等待放置一个页锁存器（由`PAGELATCH_[XX]`等待类型指示），以便它们可以执行插入操作。\n\
    \n接下来，让我们使用未公开的`DBCC IND`命令来了解更多关于页面`25848`的信息。`DBCC IND`将为我们提供作为参数提供给`DBCC IND`的表相关联的每个页面返回一行，并且，除其他信息外，还将显示每个返回页面的页面类型。下表显示了`DBCC\
    \ IND`返回的页面类型：\n\n**表 9-2：`DBCC IND`返回的页面类型**\n\n| Page type | Page |\n| --- |\
    \ --- |\n| 1 | 数据页 |\n| 2 | 索引页 |\n| 3,4 | 文本页 |\n| 8 | GAM 页 |\n| 9 | SGAM 页\
    \ |\n| 10 | IAM 页 |\n| 11 | PFS 页 |\n\n运行以下命令将对`GalacticWorks`数据库的`Insert_Test`表执行`DBCC\
    \ IND`。在运行实际的`DBCC IND`命令之前，我们启用跟踪标志`3604`，以便`DBCC IND`命令的结果在 SQL Server Management\
    \ Studio (`SSMS`) 的结果选项卡中返回：\n\n```\nDBCC TRACEON (3604);\nDBCC IND (GalacticWorks,\
    \ Insert_Test, 1);\n```\n\n图 9-10 显示了`DBCC IND`命令的结果。突出显示的是页面`25848`，即在`Ostress`工作负载期间的插入热点页。\n\
    \n![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig10_HTML.png)\n图 9-10：`DBCC\
    \ IND`结果\n\n我们感兴趣的信息位于`IndexID`和`PageType`列中。`IndexID`列返回此页面关联的索引 ID。我们在`Insert_Test`表上只有一个索引，其\
    \ ID 为`1`。`PageType`列返回特定页面的页面类型。在这个例子中，页面`25848`的`PageType`是`2`，这表明该页面是一个索引页。\n\
    \n请记住，`DBCC IND`是一个未公开的 SQL Server 命令，我在此包含它是为了向你展示有关发生末页插入争用的页面的信息。我强烈建议不要在生产服务器上使用它。"
  raw: '### PAGELATCH_[xx] Example


    In the introduction to this chapter, we took a look at page-latch contention inside
    the tempdb database when many concurrent queries are loading data in temporary
    queries. This isn’t the only form of latch contention inside SQL Server. Another
    form of latch contention is “last-page insert contention.” Just like the page-latch
    contention scenario discussed earlier, last-page insert contention is identified
    by noticing a high number of PAGELATCH waits. Let’s go through an example of last-page
    insert contention.


    Chances are, perhaps while attending a database design class, you were told every
    table should have a clustered index. You also were told the best candidate for
    a clustered index key was a narrow, unique, ever-increasing value, perhaps an
    integer. While these design options are useful for many scenarios, there are cases
    where this design will cause a performance issue known as last-page insert contention.


    Last-page insert contention will occur on databases experiencing a heavy insert
    workload against a table with relatively small rows; for instance, a table with
    an ID column (Integer data type, auto increasing) and a Name column (Varchar data
    type). From a best-practice point of view, we would create a clustered index on
    the ID column since it fits the description of a good index key perfectly. It
    is narrow, unique for every row, and always increasing. But because of the ever-increasing
    nature of the auto increment, every newly added row will be added at the end of
    the clustered index, creating a hotspot for the last data page of the clustered
    index.


    Nerd Note


    Starting with SQL Server 2019, the CREATE INDEX statement added a new option called
    OPTIMIZE_FOR_SEQUENTIAL_KEY, which alleviates (but does not eliminate) the last-page
    insert scenario discussed here. You can read more about this option at [`https://slrwnds.com/hn4nih`](https://slrwnds.com/hn4nih).


    Figure [9-7](#340881_3_En_9_Chapter.xhtml#Fig7) shows the insert behavior of rows
    into data pages inside a clustered index, inside the form of a so-called B-tree
    structure, which is the data structure SQL Server uses to sort indexes.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig7_HTML.png)


    A diagram depicts the root node divided into two intermediate levels. Each level
    has three data pages on the leaf level with exclusive page latches.


    Figure 9-7


    Last-page insert contention on the last page in a clustered index


    Even if the current data page is full, and a new data page is added, the target
    of the inserts will change to the new page, switching the hotspot to the new data
    page.


    Locks will not prevent this contention from happening. By default, SQL Server
    will use Exclusive row-level locks to insert data, as opposed to issuing a page-level
    lock. And you will recall it is possible to have multiple Exclusive row-level
    locks on a page.


    However, access to the page in-memory still needs to occur serially, so latches
    are used to make sure only one thread has access to the page at any time. Figure
    [9-8](#340881_3_En_9_Chapter.xhtml#Fig8) shows an enlarged view of the data pages
    at the leaf level of the clustered index with locks in place.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig8_HTML.png)


    A diagram depicts the intermediate level, which has two data pages, and the clustered
    index on the leaf level with exclusive page latches and locks.


    Figure 9-8


    Leaf page of clustered index with locks in place


    To show an example of last-page insert contention, let’s create a new table inside
    the GalacticWorks database using the query that follows:


    ```

    CREATE TABLE Insert_Test

    (ID INT IDENTITY (1,1) PRIMARY KEY,

    RandomData VARCHAR(50));

    ```


    As you see, this is a small table with an ID column which automatically increases
    for every new row inserted and a RandomData column to hold some data. I indicate
    the ID column is the primary key of this table, which will automatically create
    a clustered index using the ID column as the index key.


    The next step is running Ostress with a highly concurrent workload that inserts
    new rows into the Insert_Test table. This time I don’t create a .sql input file
    for Ostress but rather enter the following query in the Ostress command line:


    ```

    INSERT INTO Insert_Test

    (RandomData)

    VALUES

    (CONVERT(varchar(50), NEWID()))

    ```


    Now we create the following Ostress command line to connect to the GalacticWorks
    database and execute the query we supplied using 500 concurrent connections, each
    connection performing the query 100 times. This should create enough concurrent
    inserts to demonstrate last-page insert contention:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    While Ostress is running, I query the sys.dm_os_waiting_tasks DMV:


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    This query filters out some columns, so a screenshot of the results will fit on
    the page. Figure [9-9](#340881_3_En_9_Chapter.xhtml#Fig9) shows a portion of the
    results.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig9_HTML.png)


    A table has four columns titled session i d, wait duration millisecond, wait type,
    and resource description, along with its corresponding parameters in 14 rows.


    Figure 9-9


    PAGELATCH_EX waits on the same page


    As expected, the insert workload caused a hotspot to appear on a page inside the
    clustered index, in this case the page with a page ID of 25848\. All of those
    tasks shown in Figure [9-9](#340881_3_En_9_Chapter.xhtml#Fig9) (and there were
    around 200 more not shown) are all waiting to place a page latch, indicated by
    the PAGELATCH_[XX] wait types, on the page so they can perform their insert operation.


    Next, let’s use the undocumented DBCC IND command to learn more about page 25848\.
    DBCC IND will return a row for every page associated with the table we supply
    as a parameter to DBCC IND and, among other things, will show us the page type
    of every page returned. The following table shows the page types returned by DBCC
    IND:


    Table 9-2


    Page types returned by DBCC IND


    | Page type | Page |

    | --- | --- |

    | 1 | Data page |

    | 2 | Index page |

    | 3,4 | Text pages |

    | 8 | GAM page |

    | 9 | SGAM page |

    | 10 | IAM page |

    | 11 | PFS page |


    Running the following command will execute DBCC IND against the GalacticWorks
    database’s Insert_Test table. Before we run the actual DBCC IND command, we enable
    traceflag 3604 so the results of the DBCC IND command are returned in the SQL
    Server Management Studio (SSMS) results tab:


    ```

    DBCC TRACEON (3604);

    DBCC IND (GalacticWorks, Insert_Test, 1);

    ```


    Figure [9-10](#340881_3_En_9_Chapter.xhtml#Fig10) shows the results of the DBCC
    IND command. Highlighted is page 25848, the insert hotspot page during the Ostress
    workload.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig10_HTML.png)


    A table has 10 columns titled Page F I D, Page P I D, I A M F I D, I A M P I D,
    Object I D, Index I D, Partition number, Partition I D, i am chain type, and Page
    Type.


    Figure 9-10


    DBCC IND results


    The information we are interested in resides in the IndexID and PageType columns.
    The IndexID column returns the Index ID this page is associated with. We only
    have one index on the Insert_Test table, and it has an ID of 1\. The PageType
    column returns the page type of the specific page. In this case, the PageType
    of page 25848 is 2, which indicates the page is an index page.


    Remember, DBCC IND is an undocumented SQL Server command, and I included it here
    to show you information about the page where the last-page insert contention was
    occurring. I strongly advise against using it on production servers.'
  trans: '

    # PAGELATCH_[xx] 示例


    在本章的引言中，我们探讨了当许多并发查询从临时数据库加载数据时，`tempdb`数据库内部发生的页锁存争用。这不是 SQL Server 内部唯一的锁存争用形式。另一种形式是“末页插入争用”。正如前面讨论的页锁存争用场景一样，末页插入争用是通过观察到大量的`PAGELATCH`等待来识别的。让我们通过一个末页插入争用的例子来说明。


    很可能，也许在参加数据库设计课程时，你被告知每个表都应该有一个聚集索引。你也被告知聚集索引键的最佳候选者是一个窄的、唯一的、不断增长的值，也许是一个整数。虽然这些设计选项对许多场景很有用，但在某些情况下，这种设计会导致一个称为末页插入争用的性能问题。


    末页插入争用将发生在对行相对较小的表进行大量插入工作负载的数据库上；例如，一个包含`ID`列（整数数据类型，自动增长）和`Name`列（`Varchar`数据类型）的表。从最佳实践的角度来看，我们会在`ID`列上创建聚集索引，因为它完美地符合良好索引键的描述。它是窄的，对每一行都是唯一的，并且总是在增长。但由于自动增长的持续特性，每一个新添加的行都将被添加到聚集索引的末尾，从而为聚集索引的最后一个数据页创建了一个热点。


    > **极客笔记**

    >

    > 从 SQL Server 2019 开始，`CREATE INDEX`语句添加了一个新选项`OPTIMIZE_FOR_SEQUENTIAL_KEY`，它可以缓解（但不能消除）这里讨论的末页插入场景。你可以在
    [`https://slrwnds.com/hn4nih`](https://slrwnds.com/hn4nih) 阅读更多关于此选项的信息。


    图 9-7 展示了行插入聚集索引内部数据页的行为，以一种所谓的 B 树结构形式，这是 SQL Server 用于排序索引的数据结构。


    ![](img/340881_3_En_9_Fig7_HTML.png)

    图 9-7：聚集索引末页上的末页插入争用


    即使当前数据页已满，并添加了一个新的数据页，插入的目标将更改为新页面，将热点切换到新的数据页。


    锁本身并不会阻止这种争用的发生。默认情况下，SQL Server 将使用独占行级锁来插入数据，而不是发出页级锁。你会记得，一个页面上可以存在多个独占行级锁。


    然而，对内存中页面的访问仍然需要串行发生，因此使用锁存器来确保在任何时间只有一个线程可以访问该页面。图 9-8 展示了存在锁存器时聚集索引叶级数据页的放大视图。


    ![](img/340881_3_En_9_Fig8_HTML.png)

    图 9-8：存在锁存器的聚集索引叶页


    为了展示末页插入争用的例子，让我们使用下面的查询在`GalacticWorks`数据库中创建一个新表：


    ```

    CREATE TABLE Insert_Test

    (ID INT IDENTITY (1,1) PRIMARY KEY,

    RandomData VARCHAR(50));

    ```


    如你所见，这是一个小表，包含一个`ID`列（对插入的每一新行自动增长）和一个`RandomData`列来保存一些数据。我指定`ID`列是该表的主键，这将自动使用`ID`列作为索引键创建聚集索引。


    下一步是运行`Ostress`，使用一个高度并发的工作负载将新行插入到`Insert_Test`表中。这次我没有为`Ostress`创建`.sql`输入文件，而是在`Ostress`命令行中输入以下查询：


    ```

    INSERT INTO Insert_Test

    (RandomData)

    VALUES

    (CONVERT(varchar(50), NEWID()))

    ```


    现在我们创建以下`Ostress`命令行，以连接到`GalacticWorks`数据库，并使用 500 个并发连接执行我们提供的查询，每个连接执行该查询 100
    次。这应该能创建足够的并发插入来演示末页插入争用：


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    当`Ostress`运行时，我查询`sys.dm_os_waiting_tasks` DMV：


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    此查询过滤掉了一些列，以便结果的屏幕截图能放在页面上。图 9-9 显示了部分结果。


    ![](img/340881_3_En_9_Fig9_HTML.png)

    图 9-9：同一页上的`PAGELATCH_EX`等待


    正如预期的那样，插入工作负载导致聚集索引内部的一个页面上出现了热点，在这个例子中是页面 ID 为`25848`的页面。图 9-9 中显示的所有任务（还有大约
    200 个未显示）都在等待放置一个页锁存器（由`PAGELATCH_[XX]`等待类型指示），以便它们可以执行插入操作。


    接下来，让我们使用未公开的`DBCC IND`命令来了解更多关于页面`25848`的信息。`DBCC IND`将为我们提供作为参数提供给`DBCC IND`的表相关联的每个页面返回一行，并且，除其他信息外，还将显示每个返回页面的页面类型。下表显示了`DBCC
    IND`返回的页面类型：


    **表 9-2：`DBCC IND`返回的页面类型**


    | 页面类型 | 页面 |

    | --- | --- |

    | 1 | 数据页 |

    | 2 | 索引页 |

    | 3,4 | 文本页 |

    | 8 | GAM 页 |

    | 9 | SGAM 页 |

    | 10 | IAM 页 |

    | 11 | PFS 页 |


    运行以下命令将对`GalacticWorks`数据库的`Insert_Test`表执行`DBCC IND`。在运行实际的`DBCC IND`命令之前，我们启用跟踪标志`3604`，以便`DBCC
    IND`命令的结果在 SQL Server Management Studio (`SSMS`) 的结果选项卡中返回：


    ```

    DBCC TRACEON (3604);

    DBCC IND (GalacticWorks, Insert_Test, 1);

    ```


    图 9-10 显示了`DBCC IND`命令的结果。突出显示的是页面`25848`，即在`Ostress`工作负载期间的插入热点页。


    ![](img/340881_3_En_9_Fig10_HTML.png)

    图 9-10：`DBCC IND`结果


    我们感兴趣的信息位于`IndexID`和`PageType`列中。`IndexID`列返回此页面关联的索引 ID。我们在`Insert_Test`表上只有一个索引，其
    ID 为`1`。`PageType`列返回特定页面的页面类型。在这个例子中，页面`25848`的`PageType`是`2`，这表明该页面是一个索引页。


    请记住，`DBCC IND`是一个未公开的 SQL Server 命令，我在此包含它是为了向你展示有关发生末页插入争用的页面的信息。我强烈建议不要在生产服务器上使用它。

    '
- fmt: '### Lowering PAGELATCH_[xx] Waits


    So far we have seen two examples where `PAGELATCH_[xx]` waits occur: page-latch
    contention in the `tempdb` database and last-page insert contention. There is
    another latch contention problem also identified by `PAGELATCH_[xx]` waits occurring,
    but it also has a connection with the `LATCH_[xx]` wait type. For this reason,
    I am saving the explanation and example of this specific case of latch contention
    for the next section of this chapter where we discuss the `LATCH_[xx]` wait type.


    Lowering `PAGELATCH_[xx]` waits is challenging. Frequently, they are related to
    the design of your database and your workload, and these are difficult to change
    in production environments. There are, however, a number of factors which contribute
    to latch contention and are worth taking the time to check.


    It is common to see latch contention occurring on systems with a large number
    of logical processors (16+) and high concurrent OLTP workloads. However, having
    fewer logical processors does not mean latch contention cannot occur. The examples
    of latch contention shown so far have all been generated on a virtual machine
    with four logical processors. Having more logical processors means there are more
    threads available to perform work, which results in more concurrent latches being
    placed, increasing the chances of latch contention. Adding logical processors
    when experiencing latch contention can, in this specific case, cause even more
    latch contention to occur instead of resolving it. Lowering the number of logical
    processors isn’t an option either, because this will slow down all your other
    workloads.


    The best way to resolve latch contention is by identifying where the contention
    is occurring and what type of contention you are dealing with.


    If you are dealing with PFS page contention, a good first step would be to check
    if you are using one or multiple database data files. If you are using one database
    data file, the first step would be to add additional, equally sized data files
    and measure if this lowers the amount of `PAGELATCH_[xx]` waits occurring. If
    you already have multiple database data files, you could try adding more, but
    be careful not to add too many, because having this can introduce other performance
    problems. Your goal should be to find a database data file "sweet spot" where
    you have enough database data files to minimize the impact of latch contention,
    but not so many as to cause the overhead to become too high. This depends entirely
    on your workload, so it is impossible to give a generalized recommendation.


    When dealing with last-page insert contention, you could consider changing the
    index key to something else instead of a sequentially increasing value, like a
    `GUID`. Using a `GUID` as an index key will result in a larger index because of
    the byte requirements of a `GUID`. Also, because `GUID`s are entirely random,
    keeping the index in order requires more work than when dealing with an ever-increasing,
    sequential value. It can also have consequences for your applications or queries
    if they need to be rewritten to accommodate the change in data type.


    Other factors to consider are indexing strategies, page fullness, and the number
    of concurrent connections to the database. Also, identifying and optimizing the
    access patterns to the data inside the database can help immensely. For instance,
    if you know your workload consists of many very small inserts against a single
    table, it might be worth taking the time to combine some of the small inserts
    into a larger batch, effectively lowering the number of latches needed.


    Another option for resolving latch contention is a method called hash partitioning.
    Hash partitioning splits up a table or index into various partitions based on
    a value generated with a computed column. Partitioning is a method that can minimize,
    or completely prevent, latch contention.


    Hash partitioning works by cutting up tables or indexes into partitions, with
    each partition holding a set of the data. Partitioning is frequently used for
    archiving data from inside a table to another filegroup residing on other (cheaper)
    storage, while the current data resides on fast storage. In the case of hash partitioning,
    we calculate a value for every row inside the table using a computed column. Based
    on the value, we move the row to a partition.


    The great advantage of using this method of partitioning indexes is every partition
    has its own index tree. So even though the insert statements will still occur
    on the last (right-most) page of the index, it will be spread across the partitions.
    If we look at Figure 9-11, we see a case of last-page insert contention, where
    concurrent queries are trying to insert rows into an index as we discussed in
    the preceding example.


    ![Figure 9-11: Last-page insert contention on the right-most data page of an index](images/340881_3_En_9_Chapter/340881_3_En_9_Fig11_HTML.png)


    If we use partitioning to cut the index into multiple parts (three in this case),
    we would get the situation shown in Figure 9-12, multiple B-trees, each spanning
    a part of the data.


    ![Figure 9-12: Last-page inserts spread across partitions](images/340881_3_En_9_Chapter/340881_3_En_9_Fig12_HTML.png)


    Let’s look at the effects of hash partitioning when we run the workload to generate
    last-page insert contention, like we did in the example earlier in this chapter.


    The first thing we do is create a Partition function. This will map rows inside
    the table or index to partitions based on the value of a column. The following
    script will create a Partition function named `LatchPartFunc` that will divide
    rows into nine partitions based on the value of a column (which we will create
    a bit later). See the following:


    ```sql

    CREATE PARTITION FUNCTION [LatchPartFunc] (INT)

    AS RANGE LEFT FOR VALUES

    (0,1,2,3,4,5,6,7,8);

    ```


    The next step is to create a Partition scheme that will map the partitions to
    a filegroup:


    ```sql

    CREATE PARTITION SCHEME [LatchPartSchema]

    AS PARTITION [LatchPartFunc] ALL TO ([PRIMARY]);

    ```


    In this case, I used the `PRIMARY` filegroup, but you are free to create an additional
    filegroup to hold the partitions.


    Next up is creating a new table called `Insert_Test3` using the query that follows.
    Notice the `ID_Hash` column. This is a computed column which will calculate a
    value between 0 and 8 based on the value of the `ID` column:


    ```sql

    CREATE TABLE Insert_Test3

    (ID INT IDENTITY(1,1),

    RandomData VARCHAR(50),

    ID_Hash AS (CONVERT(INT, abs(binary_checksum(ID) % (9)), (0))) PERSISTED);

    ```


    The last step is to create a clustered index and map it to the Partition scheme:


    ```sql

    CREATE UNIQUE CLUSTERED INDEX idx_ID

    ON Insert_Test3

    (ID ASC, ID_Hash)

    ON LatchPartSchema(ID_Hash);

    ```


    Now with our partitioned table in place, let’s repeat the `Ostress` workload which
    caused last-page insert contention in our previous example. I changed the target
    table for the inserts to our new, partitioned `Insert_Test3` table.


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test3 (RandomData) VALUES (CONVERT(varchar(50), NEWID()))"
    -n500 -r100 -q

    ```


    During both `Ostress` workloads, I used `Perfmon` to monitor the number of latch
    waits occurring every second. Figure 9-13 shows the `Perfmon` graph for the first
    `Ostress` workload against a non-partitioned index and the second against the
    partitioned index we just created.


    ![Figure 9-13](images/340881_3_En_9_Chapter/340881_3_En_9_Fig13_HTML.png)'
