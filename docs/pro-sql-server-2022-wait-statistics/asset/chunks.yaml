    query, multiple worker threads are used to perform the work needed. If you left
    the configuration options related to parallelism – Max Degree of Parallelism and
    Cost Threshold for Parallelism – at the default values, it might cause more queries
    to run in parallel than was intended. Depending on how many processors your SQL
    Server has access to, and the number of worker threads used during a parallel
    query, one single parallel query can require many worker threads.


    To show this behavior, I have modified the query we used to generate THREADPOOL
    waits so that it will execute using parallelism. In this case, I commented out
    the MAXDOP query option:


    ```

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    -- OPTION (MAXDOP 1)

    ```


    For this example, I also configured the Max Degree of Parallelism to its default
    value of 0 and set the Cost Threshold for Parallelism option to 1\. This way I
    am 100% sure the query will be run using parallelism. I left the Max Worker Threads
    option on a value of 128 as we configured earlier.


    We now repeat the same Ostress test we performed earlier in this chapter by executing
    the following command:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    If we query the sys.dm_os_waiting_tasks DMV, we should see THREADPOOL waits occur
    again, but this time, because our test query is executed in parallel, we will
    also find many CX* waits returned by the sys.dm_os_waiting_tasks DMV, as shown
    in Figure [5-27](#340881_3_En_5_Chapter.xhtml#Fig27).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig27_HTML.png)


    A screenshot of query output. The table has 7 columns and 8 rows. Column 6 lists
    the C X SYNC underscore PORT and thread pool waits.


    Figure 5-27


    CXSYNC_PORT and THREADPOOL waits


    If you see a combination of THREADPOOL and parallelism waits occurring on your
    SQL Server instance, it is worth the effort to check your parallelism configuration.
    The first section of this chapter discussed CXPACKET waits and how you can lower
    them. Another hint that might steer you in this direction is the CPU load during
    this particular case is higher than normal. In the case of my test SQL Server
    instance, all my CPUs went to 100%.'
  trans: '

    如果我们检查测试 SQL Server 实例上的结果，可能会得出没有任务正在等待的结论，如图 5-22 所示。然而，测试 SQL Server 的响应速度异常缓慢，查询任何内容都需要数秒钟。


    ![](img/340881_3_En_5_Fig22_HTML.png)


    查询输出的屏幕截图。输出表包含 8 列 0 行。


    图 5-22


    没有任务正在等待


    让我们在不筛选会话 ID 的情况下检查 `sys.dm_os_waiting_tasks` DMV：


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks;

    ```


    如图 5-23 所示，`THREADPOOL` 等待并未记录为用户会话，其会话 ID 为空。这是我总是建议不要在 `sys.dm_os_waiting_tasks`
    DMV 中按会话 ID 进行筛选的原因之一。


    ![](img/340881_3_En_5_Fig23_HTML.png)


    查询输出中线程池等待的屏幕截图。输出有 8 列。第三、第四、第七和第八列中的 null 输出带有阴影。


    图 5-23


    `THREADPOOL` 等待


    存在大量的 `THREADPOOL` 等待，其等待时间各不相同，有些甚至长达数秒。不过，情况比这更糟。图 5-24 显示了我在运行 Ostress 工具时尝试连接到我的测试
    SQL Server 实例时遇到的一个错误。


    ![](img/340881_3_En_5_Fig24_HTML.png)


    一个带有错误消息的窗口屏幕截图。标题为“连接到服务器”的窗口显示了错误消息“无法连接到 SQL Server”，并提供了附加信息。


    图 5-24


    发生超时且 SQL Server 无响应


    此错误是 SQL Server 无法处理任何额外登录请求的结果。


    现在我们已经看到了线程池匮乏可能引发的问题类型，接下来让我们看看如何降低甚至解决 `THREADPOOL` 等待。


    ## 在 `THREADPOOL` 等待期间访问我们的 SQL Server


    `THREADPOOL` 等待很难进行故障排查，主要是因为有多种可能导致你的 SQL Server 没有可用的空闲工作线程。此外，`THREADPOOL`
    等待可能完全锁定你的 SQL Server 实例，使得连接到它（并对其进行故障排查）几乎不可能，正如你在前面的例子中看到的那样。


    确保你不会陷入无法连接到 SQL Server 实例进行故障排查境地的第一步是启用专用管理员连接（或 DAC）。如果你还记得第 1 章“等待统计内部原理”中关于调度器的部分，你可能会想起一种为
    DAC 保留的特殊调度器类型。这个专用调度器（如图 5-25 所示）严格保留给 DAC 使用，并且可以访问其自己的工作线程。


    ![](img/340881_3_En_5_Fig25_HTML.png)


    一个 DAC 调度器的屏幕截图。该表有 9 列 12 行。列出了调度器地址、父节点 ID、调度器 ID、CPU ID、状态、在线、空闲和切换次数。


    图 5-25


    专用管理员连接调度器


    如果你通过 DAC 连接到 SQL Server 实例，你的会话将映射到 DAC 调度器。这使得即使所有其他调度器都有大量任务队列，也可以连接并执行查询。


    你可以通过执行以下查询来启用 DAC：


    ```

    sp_configure ''remote admin connections'', 1

    GO

    RECONFIGURE

    GO

    ```


    如果你想使用 DAC 连接到 SQL Server 实例，需要在要连接的服务器名称前添加 `ADMIN:` 前缀，如图 5-26 所示。只有在未连接到服务器的情况下，从
    SQL Server Management Studio 内部执行新查询时，才能使用 DAC 进行连接。


    ![](img/340881_3_En_5_Fig26_HTML.png)


    SQL Server 连接窗口的屏幕截图。该窗口有服务器类型、服务器名称、身份验证、用户名和密码的下拉菜单。服务器名称字段处于活动状态。


    图 5-26


    使用专用管理员连接进行连接


    你也可以使用 `SQLCMD` 通过 DAC 连接，可以在声明服务器实例名称时使用 `ADMIN:` 前缀，或使用 `-A` 参数标志。一旦你能够使用 DAC
    连接到 SQL Server 实例，你就始终有一条进入途径，即使 SQL Server 实例不接受任何新连接。


    启用 DAC 后，让我们讨论一下 `THREADPOOL` 等待的一些常见原因。


    ## 降低由并行度引起的 `THREADPOOL` 等待


    `THREADPOOL` 等待最常见的原因之一与查询执行期间广泛使用并行度有关。在并行查询执行期间，会使用多个工作线程来执行所需的工作。如果你将与并行度相关的配置选项——`最大并行度`
    和 `并行度的成本阈值`——保留为默认值，可能会导致比预期更多的查询并行运行。根据你的 SQL Server 可访问的处理器数量以及并行查询期间使用的工作线程数量，单个并行查询可能需要许多工作线程。


    为了展示这种行为，我修改了用于生成 `THREADPOOL` 等待的查询，使其使用并行度执行。在此情况下，我注释掉了 `MAXDOP` 查询选项：


    ```

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    -- OPTION (MAXDOP 1)

    ```


    对于此示例，我还将 `最大并行度` 配置为其默认值 `0`，并将 `并行度的成本阈值` 选项设置为 `1`。这样我百分百确定查询将使用并行度运行。我将 `最大工作线程数`
    选项保留为我们先前配置的值 `128`。


    现在，我们通过执行以下命令，重复本章前面执行的相同 `Ostress` 测试：


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，应该会再次看到 `THREADPOOL` 等待发生，但这一次，由于我们的测试查询是并行执行的，我们还会发现
    `sys.dm_os_waiting_tasks` DMV 返回了许多 `CX*` 等待，如图 5-27 所示。


    ![](img/340881_3_En_5_Fig27_HTML.png)


    查询输出的屏幕截图。该表有 7 列 8 行。第 6 列列出了 CX SYNC underscore PORT 和线程池等待。


    图 5-27


    `CXSYNC_PORT` 和 `THREADPOOL` 等待


    如果你在 SQL Server 实例上看到 `THREADPOOL` 和并行度等待同时出现，值得花时间检查你的并行度配置。本章第一节讨论了 `CXPACKET`
    等待以及如何降低它们。另一个可能引导你朝这个方向思考的线索是，在此特定情况下 CPU 负载高于正常水平。在我的测试 SQL Server 实例中，我的所有
    CPU 都达到了 100%。

