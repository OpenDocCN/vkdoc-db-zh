  trans: '## 等待统计基线分析


    当 SQL Server 代理作业收集了一段时间的等待统计指标后，我们就可以开始创建一些基线了。我们通过查询之前创建的 `WaitStats` 表来实现。我将给出一些用于创建基线以便进行对比的查询示例；不过，这些并非唯一可用的查询，我鼓励你尝试不同的查询，以返回你最感兴趣的信息。


    在开始构建基线之前，我想回到第 2 章“查询 SQL Server 等待统计”中的图 2-14。在该流程图中，我向你展示了分析当前发生的资源等待可以采取的步骤。既然我们现在可以访问基线，就可以在流程图中添加一个额外的步骤。图
    4-9 展示了如何完善该流程图，其中包含了基线对比步骤。


    ![](img/340881_3_En_4_Fig9_HTML.png)


    一个包含八个步骤的流程图，从性能下降开始，到检查等待时间是否下降结束。它将等待时间与基线进行对比。


    **图 4-9**

    **完整的等待统计性能分析流程图**


    基线是在调查性能问题时收集的额外指标输入。基线是非常有价值的输入，因为它们显示了在性能问题尚未发生期间的信息。


    让我们通过一个例子来走一遍流程，再次使用 DBA 简（Jane），我们将回顾图 4-9 中流程图的所有步骤。在这个例子中，我将展示针对 `WaitStats`
    表的查询，用于构建一个对性能分析过程有用的基线。


    星期二上午 9 点左右，简接到一个关于针对销售数据库的日常报告的电话；用户抱怨报告比平时慢。问题大约在上午 8 点开始，用户仍然遇到性能问题。这些报告是计划作业的一部分，每个工作日上午
    8 点开始运行。


    简做的第一件事是使用以下查询来查询 `sys.dm_os_waiting_tasks` DMV：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    简重点关注用户会话，但没有看到任何长时间的等待，如图 4-10 所示。


    ![](img/340881_3_En_4_Fig10_HTML.png)


    一个包含六列的表格，列名为等待任务地址、会话 ID、执行上下文 ID、等待持续时间（毫秒）、等待类型和资源地址。共有九行。


    **图 4-10**

    **`sys.dm_os_waiting_tasks`**


    在多次执行针对 `sys.dm_os_waiting_tasks` DMV 的查询后，简注意到每次查询该 DMV 时都会返回等待类型 `PAGEIOLATCH_SH`。每次返回的等待类型都对应不同的会话
    ID，但等待时间相对较短。


    简使用了相同的 T-SQL 脚本，将等待统计指标捕获到 `WaitStats` 表中，正如本章前面所讨论的。因为简可以访问历史等待统计信息，她为 `PAGEIOLATCH_SH`
    的等待时间创建了一个基线。


    第一步是查看今天的 `PAGEIOLATCH_SH` 等待时间，筛选并显示上午 8 点到 9 点之间捕获的测量值，使用如清单 4-5 所示的查询。


    ```sql

    -- PAGEIOLATCH_SH 等待，今天上午 8 点到 9 点之间

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

    ws_WaitTime AS ''等待时间''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) = CONVERT(VARCHAR(5), GETDATE(), 105);

    -- 清单 4-5

    -- 显示今天上午 8 点到 9 点之间 PAGEIOLATCH_SH 的等待时间

    ```


    该查询返回了如图 4-11 所示的结果。


    ![](img/340881_3_En_4_Fig11_HTML.jpg)


    一个包含两列（时间和等待时间）和四行的表格。时间为 8 的行具有最低的等待时间。


    **图 4-11**

    **今天的 PAGEIOLATCH_SH 等待时间**


    现在简已经获取了今天 `PAGEIOLATCH_SH` 等待类型的等待时间，下一步是利用 `PAGEIOLATCH_SH` 等待类型的历史测量值创建一个基线，以便将今天的测量值与基线进行比较。简使用清单
    4-6 所示的查询来构建基线。


    ```sql

    -- 工作日上午 8 点到 9 点的基线

    -- 不包括今天完成的测量值

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''时间'',

    AVG(ws_WaitTime) AS ''基线''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND ws_DayOfWeek IN (''Monday'', ''Tuesday'', ''Wednesday'', ''Thursday'',''Friday'')

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) < CONVERT(VARCHAR(5), GETDATE(), 105)

    GROUP BY CONVERT(VARCHAR(5), ws_DateTime, 108);

    -- 清单 4-6

    -- PAGEIOLATCH_SH 基线

    ```


    此查询构建的基线具有以下特征：返回在工作日上午 8 点到 9 点之间捕获的 `PAGEIOLATCH_SH` 等待类型的平均等待时间，但不包括今天的数据。我们排除今天的测量值，因为它们是在性能问题期间执行的，可能会影响平均值。另一个建议是仅筛选最近
    x 周内捕获的数据，以限制计算平均值所用的数据量。


    清单 4-6 所示查询的结果如图 4-12 所示。


    ![](img/340881_3_En_4_Fig12_HTML.jpg)


    一个包含两列（时间和基线）和四行的表格。时间为 8 的行具有最低的基线。


    **图 4-12**

    **PAGEIOLATCH_SH 基线**


    当你比较图 4-11 和 4-12 中的等待时间时，可以立即看出，今天进行的测量值远高于历史基线。为了更容易看出差异，我创建了两者的对比图，如图 4-13
    所示。


    ![](img/340881_3_En_4_Fig13_HTML.png)


    一个等待时间的图表，基线为递增的虚线，而 Pageiolatch S H 基线则呈现波动模式。


    **图 4-13**

    **PAGEIOLATCH_SH 等待类型的基线对比图**


    由于 `PAGEIOLATCH_SH` 等待类型的基线与今天的等待时间存在如此大的差异，简认为需要进一步调查 `PAGEIOLATCH_SH` 等待类型。


    ### 极客备注


    我们将在第 9 章“与闩锁相关的等待类型”中详细研究 `PAGEIOLATCH_SH` 等待类型，但（非常）简短地解释一下，长时间的 `PAGEIOLATCH_SH`
    等待可能表明存储存在问题。


    为了进一步调查，简启动了性能监视器，查看与存储子系统相关的指标，特别是磁盘延迟计数器。如图 4-14 所示，数据库数据文件所在磁盘的延迟峰值达到了非常高的数值，超过
    4000 毫秒！为了让 SQL Server 以最佳状态运行，磁盘延迟应尽可能低，理想情况下应小于 10 毫秒。


    ![](img/340881_3_En_4_Fig14_HTML.png)


    一个带有波动峰值图表的屏幕截图。底部显示了最后、平均、最大、最小和持续时间的详细信息。


    **图 4-14**

    **磁盘读取延迟**'
- fmt: 'With both the wait statistics baseline information and the `Perfmon` metrics,
    Jane believes the problem is storage related and contacts the storage administrator.
    The metrics collected also help the storage administrator, since they can compare
    their storage-related measurements against those Jane supplied. The storage administrator
    confirms there is a problem related to the disk that contains the sales database
    and solves the problem by replacing a faulty disk in the disk array. After the
    disk gets replaced, the disk latency returns to a 6 milliseconds average, and
    the high latency peaks disappear. Jane queries the wait times again from the `WaitStats`
    table after the disk is replaced and notices the wait times for the `PAGIOLATCH_SH`
    wait type are close to the baseline values again. Users also inform Jane the reports
    are running normally again.


    During this example, Jane went through all the steps of the wait statistics performance-analysis
    flowchart shown in Figure [4-9](#340881_3_En_4_Chapter.xhtml#Fig9):


    1. Users experience performance degradation while running reports.

    2. Jane queries the `sys.dm_os_waiting_tasks` `DMV` to find out if there are high
    wait times or frequently recurring wait types. The `PAGIOLATCH_SH` wait type seems
    to be recurring frequently.

    3. Jane gathers metrics by capturing the `PAGIOLATCH_SH` wait times of today and
    comparing them to the baseline and also gathers additional metrics from `Perfmon`.

    4. All the metrics show the problem is likely storage related, and Jane contacts
    the storage administrator.

    5. The storage administrator replaces a broken disk in the array. Storage latency
    values drop to 6 milliseconds.

    6. Jane checks the wait times of the `PAGIOLATCH_SH` wait type again and confirms
    that they are close to the baseline values.


    Even though this example might seem very simple, it is based on a performance
    problem I encountered in the real world. Using the steps from the wait statistics
    performance-analysis flowchart combined with the baseline metrics, I was able
    to identify and solve the problem very quickly.


    **Nerd Note**

    Correlation does not imply causation. While replacing the disk seems to have fixed
    the issue, the reality is your infrastructure architecture is complex. There’s
    a chance the true root cause was something else, perhaps a flooded kernel on a
    `VM` host which was showing as a `PAGIOLATCH_SH` at that moment in time and was
    also resolved around the same time the disk was replaced.


    In the example, the query in Listing [4-6](#340881_3_En_4_Chapter.xhtml#PC8) creates
    a baseline for the `PAGIOLATCH_SH` wait type. This query is an example of what
    you can use against the `WaitStats` table. You should modify it to suit your own
    needs; for instance, you could choose to not limit the results for weekdays and
    show average wait times captured on a specific day. Or you could request the actual
    wait times on a specific date.


    If you are capturing wait statistics measurements for a long period of time, it
    might be a good idea to split the results into multiple tables for easier and
    faster querying. For instance, you could use the following query to insert all
    the wait statistics measurements done in March into their own table:

    ```sql

    SELECT *

    INTO WaitStats_March

    FROM WaitStats

    WHERE ws_Month = 3;

    ```

    This also gives us options to compare specific wait times during different periods
    of time by joining the different tables together.


    **Nerd Note**

    There are many ways for you to slice and dice this data, such as the use of windowing
    functions, or perhaps use `PowerBI` and build yourself a proper dashboard. Use
    whatever works best for you.


    Figure [4-15](#340881_3_En_4_Chapter.xhtml#Fig15) shows the tables of my baseline
    database that I usually end up with, sorting the data per month.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig15_HTML.jpg)


    A screenshot of tables within the baseline folder has four types of tables, system,
    file, external, and graph tables.


    **Figure 4-15**

    Wait statistics measurement split per month


    You should decide how to split the measurements yourself; maybe you want to store
    the wait statistics measurements in a separate table for every application version
    you use or store all the measurements of a specific wait type in a separate table.
    The choice is yours.


    This chapter hopefully gave you some ideas on how to store wait statistics measurements
    and create baselines from those measurements. I tried to avoid telling you exactly
    what to do and how to do it, because I believe one single approach doesn’t work
    for everybody. You will need to write and adjust your own queries to create the
    baselines you are interested in, but I hope this chapter showed you the foundations
    to further build upon.


    ## Summary

    In this chapter, we took a close look at baselines from both a theoretical and
    a practical point of view. Baselines are incredibly important for any type of
    performance analysis you perform. In the case of wait statistics, baselines are
    frequently required if you want to troubleshoot `SQL Server`–related performance
    problems. Since wait statistics are unique for your system, there is only one
    method by which to compare wait times – baselines.


    I gave you some examples and `T-SQL` scripts to create your own wait statistics
    baseline table, so you can start capturing wait statistics information right now.
    We also went through an example of how you can query that baseline information
    and compare it to actual measurements to troubleshoot a performance-related incident.


    # Part II Wait Types


    # 5. CPU-Related Wait Types

    Processors have evolved enormously in the last few decades, and processor manufacturers
    manage to build faster processors on a yearly basis. And while the speed of processors
    is hitting a ceiling, the number of cores manufacturers manage to build inside
    their processors has grown. At the time of writing this book, you can buy a single
    processor with 64 cores inside to power your system. Processors are also one of
    the difficult parts of your system to replace. While expanding your system’s memory
    is relatively easy, replacing a processor for a faster one or more cores requires
    you to change the system’s motherboard due to `CPU` socket incompatibility. This
    means we are often stuck with the current processors until we replace the system
    altogether.


    Processors are important for `SQL Server`. Higher processor speeds will accelerate
    processor-related instructions, and more cores means more schedulers for `SQL
    Server` to use for request executions. But even these upgrades in speed and cores
    cannot prevent the fact we will sometimes wait on processor resources. In this
    chapter, we will look at some wait types with a relation with your system’s processor.


    ## CXPACKET

    By far the most common `CPU`-related wait type in `SQL Server` instances deployed
    uses default, out-of-the-box, configuration options. It is also one of the most
    misunderstood wait types and sometimes has little impact on your query performance.
    In fact, lowering `CXPACKET` wait times may degrade the performance of your query!
    If you are running `SQL Server 2016 SP2` or later, there are changes in how to
    handle `CXPACKET` waits. We will discuss the impact of the changes, including
    the parallelism-related wait type `CXCONSUMER`, at the end of this section.'
