    The **PREEMPTIVE_OS_WRITEFILEGATHER** wait type is related to storage interactions,
    more specifically writing of files through the Windows operating system.


    ### What Is the PREEMPTIVE_OS_WRITEFILEGATHER Wait Type?


    The PREEMPTIVE_OS_WRITEFILEGATHER wait type is related to the WriteFileGather
    function inside the Windows operating system. From the definition of this function
    on Books Online, “Retrieves data from an array of buffers and writes the data
