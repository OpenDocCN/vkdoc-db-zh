    现在，自签名证书已在证书存储中，我们需要验证运行 SQL Server 服务的帐户是否具有访问证书的权限。我通过点击“开始” ➤ “运行”，输入 `MMC`
    并点击“确定”来打开 Microsoft 管理控制台 (`MMC`)。在 `MMC` 控制台打开后，通过点击“文件” ➤ “添加/删除管理单元”，选择“证书”管理单元，然后点击“添加”来添加证书管理单元。当提示选择要管理证书的帐户时，我选择“计算机帐户”，如图
