    ![图 12-10：SQL Server Profiler 的"新建跟踪"选项](img/340881_3_En_12_Fig10_HTML.jpg)


    启动新跟踪时，你需要连接到要跟踪的 SQL Server 实例。在本例中，我连接到我的测试 SQL Server 实例。登录到 SQL Server 实例后，"跟踪属性"窗口将会打开。此窗口提供了多种选项来配置跟踪及其存储方式。在此示例中，我们不会更改"常规"选项卡中的任何内容，而是直接转到"事件选择"选项卡。在那里，我们选择要捕获的事件，并可选择为这些事件提供筛选器。


    对于此示例，我们选择 `SQL:BatchCompleted` 事件，如图 12-11 所示。这将记录针对测试 SQL Server 实例执行的所有 T-SQL
    语句，并捕获该事件的所有可用信息。


    ![图 12-11：选择了 SQL:BatchCompleted 事件](img/340881_3_En_12_Fig11_HTML.png)


    我们不会在事件上配置任何筛选器，因此将捕获针对 SQL Server 实例执行的每一条 T-SQL 语句。我们单击"运行"以启动跟踪，这将打开跟踪窗口，显示事件在我们的
    SQL Server 实例上发生的情况以及附加信息（例如查询信息）。


    现在我们的 SQL Server Profiler 跟踪正在运行，我们应该能够注意到 TRACEWRITE 等待的发生。我们在 SSMS 中针对 `sys.dm_os_waiting_tasks`
    DMV 执行以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    此查询的结果如图 12-12 所示。


    ![图 12-12：显示 TRACEWRITE 等待的查询结果](img/340881_3_En_12_Fig12_HTML.png)


    即使我们没有在测试 SQL Server 实例上运行任何工作负载，`TRACEWRITE` 等待类型仍然会被记录。这是正常的，因为只要 SQL Server
    Profiler 跟踪处于活动状态，`TRACEWRITE` 等待类型就会始终被记录。


    ### 降低 TRACEWRITE 等待


    如前所述，如果你注意到发生了 `TRACEWRITE` 等待，则意味着有人正在针对你的 SQL Server 实例运行 SQL Server Profiler
    跟踪。因为 SQL Server Profiler 跟踪可能会影响 SQL Server 实例的性能，所以了解谁在运行 SQL Server Profiler
    跟踪以及为何运行非常重要。


    幸运的是，我们可以查询一个目录视图来查看跟踪活动——`sys.traces` 视图。`sys.traces` 目录视图将为你提供针对 SQL Server
    实例活动或已暂停跟踪的概览。以下查询将检索 `sys.traces` 目录视图中的所有信息：


    ```sql

    SELECT *

    FROM sys.traces;

    ```


    在测试 SQL Server 实例上运行此查询将返回图 12-13 所示的信息（某些列未完全显示在图片中）。


    ![图 12-13：sys.traces 目录视图的查询结果](img/340881_3_En_12_Fig13_HTML.png)


    从 `sys.traces` 目录视图中需要重点注意的一些重要列是 `status` 和 `reader_spid` 列。`status` 列返回 `0`
    或 `1`，其中 `0` 表示跟踪已停止或暂停，`1` 表示跟踪当前正在运行。`reader_spid` 列返回启动跟踪的会话的会话 ID。我们可以使用此信息来检测谁正在运行跟踪。


    在我们的案例中，前面示例中启动的跟踪 ID 为 `2`，而 ID `1` 保留给后台 SQL Server 跟踪，该跟踪默认始终处于活动状态。此默认跟踪收集有关
    SQL Server 实例运行状况的特定信息，可在故障排除时使用。由于它是一个所谓的服务器端跟踪，因此在运行时不会记录 `TRACEWRITE` 等待时间。


    现在我们知道运行跟踪的用户是谁，如果该跟踪对 SQL Server 实例的性能产生负面影响，我们就可以采取行动。


    除了停止 SQL Server Profiler 跟踪以降低 `TRACEWRITE` 等待时间之外，如果你需要捕获针对 SQL Server 实例的跟踪，还有其他可用的方法。最合理的方法是在扩展事件会话中重建你的
    SQL Server Profiler 跟踪。扩展事件在捕获跟踪时允许更多的事件和选项。


    如果你仍然希望使用 SQL Server Profiler 来分析跟踪，一个好方法是将通常在 SQL Server Profiler 应用程序中运行的跟踪转换为服务器端跟踪。让我们将示例部分中创建的
    SQL Server Profiler 跟踪转换为服务器端跟踪，并监控其对 `TRACEWRITE` 等待类型的影响。


    将 SQL Server Profiler 跟踪转换为服务器端跟踪的最简单方法是在 SQL Server Profiler 应用程序中定义跟踪但不启动它。而是选择
    `文件 ➤ 导出 ➤ 脚本跟踪定义 ➤ 对于 SQL Server 2005 – SQL2019` 选项，如图 12-14 所示。


    ![图 12-14：导出 SQL Server Profiler 跟踪定义](img/340881_3_En_12_Fig14_HTML.png)


    单击 `文件 ➤ 导出 ➤ 脚本跟踪定义 ➤ 对于 SQL Server 2005 – SQL2019` 选项后，系统会要求我们保存一个 `.sql` 文件。整个跟踪定义将被编写到此
    `.sql` 文件中。然后我们在 SSMS 中打开此文件，修改脚本中的文件位置和其他一些选项，并执行它。这将返回我们刚创建的跟踪的 ID，并将跟踪信息保存到我们在脚本顶部指定的文件中。图
    12-15 显示了在测试 SQL Server 实例上导出的跟踪定义的一部分。


    ![图 12-15：导出的服务器端跟踪定义脚本片段](img/340881_3_En_12_Fig15_HTML.png)

