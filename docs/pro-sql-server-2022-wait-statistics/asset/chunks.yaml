  trans: '## 通过查询存储 DMV 访问等待统计信息


    虽然内置的查询存储报告在可视化识别具有高等待时间的查询方面无疑很有帮助，但使用 `sys.query_store_wait_stats` DMV 可以获取更多信息。此
    DMV 返回的列显示了与特定执行计划 ID 的等待类型或等待类别相关的各种统计信息。


    **极客备注**


    查询存储为其查询、执行计划和运行时时间间隔使用了自己独特的标识符。考虑到这一点，你可以通过查询存储查找 `Query ID` 来标识查询，或通过搜索 `plan
    ID` 来标识执行计划。


    图 3-8 显示了为每个执行计划 ID 记录的不同统计信息，按不同的等待类别进行了划分。


    ![](img/340881_3_En_3_Fig8_HTML.png)


    一个包含 12 行 9 列的表格。它列出了锁、缓冲区闩锁、缓冲区 I/O、事务日志 I/O、C P U、C P U、锁、内存、C P U、缓冲区闩锁、缓冲区
    I/O 和事务日志 I O 等等待类别。


    **图 3-8**


    `sys.query_store_wait_stats` 内的等待类别统计信息


    当我们查询 `sys.query_store_wait_stats` DMV 并查看每个或特定执行计划 ID 的各种统计信息时，将各种查询存储 DMV 连接在一起会获得更多信息。


    例如，以下查询连接了多个查询存储 DMV，以返回遭遇高总等待时间的查询概览。


    ```sql

    SELECT qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    ORDER BY qsws.total_query_wait_time_ms DESC;

    ```


    **代码清单 3-2**

    使用查询存储 DMV


    此查询的结果见图 3-9。


    ![](img/340881_3_En_3_Fig9_HTML.png)


    一个包含 14 行 7 列的表格。它列出了计划 i d、查询 i d、运行时统计信息间隔 i d、查询 s q l 文本、等待类别 d e s c 和总查询等待时间
    m s。


    **图 3-9**


    来自查询存储的等待统计信息


    通过修改查询，按 `Query ID` 进行筛选，我们可以专注于特定查询并分析其等待行为。以下是修改后的查询，你会看到我还添加了一些返回各种有用统计信息的额外列。


    ```sql

    SELECT qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms,

    qsws.avg_query_wait_time_ms,

    qsws.last_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    WHERE qsq.query_id = 8

    ORDER BY runtime_stats_interval_id ASC;

    ```


    在查询和查询结果中，有一个名为 `runtime_stats_interval_id` 的列。查询存储对运行时（和等待时间）指标进行分组的方式是基于时间间隔进行聚合。默认情况下，这些间隔是一小时的时间块，这意味着前面示例中为特定查询返回的等待统计信息是该间隔内一次或多次查询执行的聚合结果。虽然你可以通过设置查询存储属性中的
    `Statistics Collection Interval` 来将间隔降低到更小的时间段，但这将对 SQL Server 实例的性能产生负面影响，因此在更改此设置时要小心。


    我只展示了几个如何从查询存储内部检索等待统计信息相关指标的示例。凭借查询存储收集的所有信息，还有海量的其他信息可以与等待统计信息指标相结合。例如，按特定等待类别筛选，或检测生成不同执行计划的查询以及其对特定查询等待的影响。我建议所有使用
    SQL Server 2016 或更高版本的用户启用查询存储，并探索它收集的指标。


    **极客备注**


    虽然查询存储仅在 SQL Server 2016 及更高版本中可用，但 William Durkin（Twitter 账号 @sql_williamd）和
    Enrico van de Laar（@evdlaar）发布了一个名为 open Query Store 的项目，该项目为低于 2016 版本的 SQL Server
    模拟查询存储数据收集。该项目完全开源且免费，可通过其 GitHub 页面 `https://slrwnds.com/n4mudf` 获取。


    ## 总结


    在本章中，我们探讨了 SQL Server 2016 中引入的一项新的查询性能和分析功能：查询存储。我们了解了查询存储的底层工作原理，以及如何访问查询存储内置报告中的查询等待统计信息。


    最后，我们研究了如何使用新的查询存储 DMV 来访问查询存储等待统计信息，并展示了一些示例查询，以帮助你开始使用查询存储。'
- fmt: '# 4. Building a Solid Baseline


    In Chapter [2](#340881_3_En_2_Chapter.xhtml), “Querying SQL Server Wait Statistics,”
    we spent a great deal of time describing and using various methods of accessing
    `wait statistics` information. Most of those methods focused on using the information
    for detecting current performance problems. While it is possible to find the exact
    cause of a performance problem using these real-time methods, it requires a deep
    knowledge of the various `wait types` and – most important – experience in the
    performance of your specific SQL Server system.


    If you manage a single SQL Server instance, you fast become familiar with the
    way it reacts under different circumstances. If you manage hundreds of SQL Server
    instances, getting yourself familiar with the way they all perform is next to
    impossible. Because SQL Server `wait statistics` are largely based on the workload
    of the specific SQL Server instance, no two SQL Server instances will have the
    same `wait times` for the same `wait types`. This makes detecting possible problems
    difficult because we can’t just say “hey, the `CXPACKET` `wait type` has a `wait
    time` of 20,000 milliseconds, so we are having a problem.” It all depends on the
    configuration and workload of your system. One SQL Server instance can have 20,000
    milliseconds (20 seconds) of `wait time` every minute spent on the `CXPACKET`
    `wait type` and experience no performance problems, while another instance has
    1,000 milliseconds of `wait time` and users are constantly complaining about performance.


    If we want an in-depth analysis of `wait statistics`, or any `performance-related
    data`, we need a method of collecting `performance-related metrics` and giving
    them meaning. Just detecting 10,000 milliseconds waiting for resources doesn’t
    mean anything, since we do not know if it caused performance problems or not.
    Yes, maybe your users are complaining that performance is horrible while you notice
    the 10,000 milliseconds `wait`, but there is no way to be sure if the `wait` is
    explicitly causing the specific performance problems users are experiencing. Someone
    might take a guess and just assume the specific resource `wait` is the source
    of the performance problem. As a former production DBA, I can tell you DBAs do
    not like to take guesses at what’s slowing down our database servers. We want
    to be certain of the source of the performance problem. This is where `baselines`
    help.


    `Baselines` help give meaning to `performance metrics` by providing a definition
    of the normal state of your system. Without a `baseline`, we have no idea if the
    system or application is running optimally or terribly slow. `Baselines` are incredibly
    important; in fact, they are so important I decided to write a complete chapter
    about them in this book. Without a solid `baseline`, your measurements mean nothing!
    Even though this book focuses on `wait statistics`, `baselines` are useful for
    every `performance-related metric` you can capture on your system, giving you
    a valuable method of performance analysis.


    If you read through the previous chapter concerning the `Query Store`, you might
    be tempted to think the `Query Store` can handle all your `baselines`. While the
    `Query Store` is useful for capturing and monitoring the performance of a query
    inside one database, it doesn’t provide a performance overview of your entire
    SQL Server Instance. I personally consider the `Query Store` an addition to the
    regular process of capturing and monitoring `baselines`, not a replacement.


    ## What Are Baselines?


    If we look up “`baseline`” in the Oxford dictionary, we see the following definition:
    “A minimum or starting point used for comparisons.” This sentence captures the
    essence of a `baseline` perfectly by using the important words “starting point”
    and “comparisons.” A `baseline` is the starting point or, in our case, measurement,
    with which we compare later measurements against. Ideally, we capture the `baseline`
    measurement in a normal or standard situation. If we perform the same measurement
    again at a later point in time, we compare the measurement against the `baseline`.
    If our measurements are not the same during the comparison, something might have
    changed.


    Even if you do not use `baseline` comparisons when analyzing performance, you
    are still working with `baselines` whether you realize it or not. For instance,
    if you receive a salary every first day of the month, this is your normal situation
    or, in the context of this chapter, your `baseline`. If for some reason you didn’t
    receive your salary on the first day of the month, you would notice a deviation
    compared to the `baseline`. This might be a reason to investigate why you didn’t
    receive your salary on time. Maybe the day changed from the first to the fifth
    of the month, or, in the worst case, the company you work for can’t pay your salary
    anymore. In any of these cases, there are actions we can take: either accept the
    change, and by doing so create a new `baseline`, or revert the situation back
    to the `baseline` state again. Figure [4-1](#340881_3_En_4_Chapter.xhtml#Fig1)
    shows this process.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig1_HTML.png)


    *A flow diagram connects `baseline`, `change`, and the `new baseline` to accept
    the `new baseline` and undo the `change` to revert to the `baseline`.*


    *Figure 4-1 Changes impact `baseline`*


    Defining and maintaining `baselines` is an iterative process. Every `change` occurring
    on your system could impact your `baseline`. A new release of an application might
    change a number of queries, or your company might grant a new department access
    to the database, increasing the number of connections. In both these examples,
    we would make adjustments to the `baseline`, since the normal situation would
    have changed.


    All of these adjusting and measuring `baselines` with every `change` to the system
    sound like a lot of work, and sometimes it is. But believe me – the benefits of
    having a `baseline` far outweigh the costs. `Baselines` help you detect problems
    faster than just looking at a single measurement, and in the case of `wait statistics`,
    it is the only way to find a reliable, definitive answer to your problem. Let’s
    use a more technical example to illustrate this using DBA Jane.


    Jane maintains a SQL Server instance hosting a single-user database. This database
    is used by every sales person in the company and records every financial transaction
    between the company and its customers. Users access the database through `Application
    X`. `Application X` is running version 2.4 and is very stable. Performance is
    good, users are happy, and the money keeps rolling in. Everything is great until
    one day a consultant walks in and wants to upgrade `Application X` to the brand
    new 3.0 version. The update to version 3.0 was a breeze and completed without
    any problems, and all the users love the new features.


    Two days later the phone rings. Jane’s manager just received word from the sales
    team that the performance in version 3.0 is horrible and he demands it get resolved
    right away.'
