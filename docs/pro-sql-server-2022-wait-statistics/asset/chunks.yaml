    ## 内存中 OLTP 简介


    传统（基于磁盘）表与内存优化表之间的主要区别在于，内存优化表完全驻留在 SQL Server 实例的内存中。与传统表不同——传统表的数据页需要从磁盘移入内存，然后再移出——内存优化表在
    SQL Server 启动时便移入系统内存，并且永不离开内存（当然，除非该内存优化表被删除）。尽管这乍听起来可能有点吓人，但内存优化表默认是完全持久的。这意味着如果你的
    SQL Server 实例崩溃，内存优化表的数据不会丢失。当然，让整个表驻留在 SQL Server 实例的内存中也有缺点。你需要有足够的空闲内存来容纳整个内存优化表（以及一些额外的内存来容纳访问此类表时使用的行版本）。计算内存需求可能很困难，但以下文章会有所帮助：[`slrwnds.com/ecqxan`](https://slrwnds.com/ecqxan)。


    为内存优化表保留的内存由 SQL Server 声明，并且不会被清除；如果你的内存优化表使用了过多内存，你的 SQL Server 实例将遭遇内存不足问题，导致性能下降，或者在最坏的情况下，导致
    SQL Server 崩溃。这与例如缓冲池高速缓存是一个重大区别，在缓冲池中，当内存压力出现时，页会从内存中清除。另一个缺点是许多数据类型或 SQL Server
    功能不支持内存优化表。关于哪些能用、哪些不能用的完整列表可以在 [`slrwnds.com/939hqx`](https://slrwnds.com/939hqx)
    和 [`slrwnds.com/3cfwre`](https://slrwnds.com/3cfwre) 找到。随着 SQL Server 2016 的发布，一些主要的限制得到了解决，使得该功能更具吸引力，限制更少。


    让我们来看一下内存中 OLTP 的一些内部机制、它们如何工作，以及为什么它们比传统的基于磁盘的表性能更快。


    ### 检查点文件对 (CFPs)


    默认情况下，内存优化表是持久的（你可以选择创建一个非持久表，其内容在 SQL Server 服务重启时会被清除，但你必须显式指定）。实现持久性的方式是通过所谓的检查点文件对
    (CFPs)。CFP 由两个文件组成，一个数据文件和一个 Delta 文件，它们存在于为使用内存优化表的数据库创建的特殊内存优化文件组中。


    与将行数据存储在数据页内的传统表不同，CFP 数据文件存储**所有**内存优化表的行。我强调“所有”这个词，是因为一个数据文件可以容纳许多内存优化表的行，这与某些只为单个表存储行数据的数据页不同。数据文件内的行按照它们被插入内存优化表的时间顺序存储。这与数据页不同，数据页在传统表的区中保存行信息。由于行在数据文件中按顺序存储，因此在读取行时性能会有所提升，因为它消除了从传统表中读取行时发生的随机读取。图
    13-1 展示了数据文件及其所容纳行数据的抽象视图。


    ![](img/340881_3_En_13_Fig1_HTML.jpg)


    数据文件的示意图有四行。表 1 的行数据为 1 和 4，分别是 1023 和 1026。表 2 的行数据为 2 和 3，分别是 1024 和 1025。


    图 13-1


    内存优化表的数据文件


    内存优化文件组内总是有多个数据文件。当你首次创建内存优化文件组时，SQL Server 会自动在文件组的文件位置预分配一定数量的数据文件。数据文件的大小总是固定的，在内存大于
    16 GB 的系统上为 128 MB，在内存小于或等于 16 GB 的系统上为 16 MB。当一个数据文件写满时，会自动创建一个新的数据文件，新的行将被插入到新的数据文件中。重要的是要知道，数据文件根据将行插入数据文件的事务提交时间戳来跟踪行（如图
    13-1 中的数字所示）。即使添加了新的数据文件，并且行分布在多个数据文件上，数据文件也总是具有连续的事务范围。图 13-2 显示了多个数据文件以及与这些数据文件关联的事务提交时间戳。


    ![](img/340881_3_En_13_Fig2_HTML.png)


    3 个数据文件的示意图分别包含从 1023 到 1200、1201 到 1400 以及 1401 到无穷大的行数据。


    图 13-2


    数据文件和事务时间戳


    注意，在图 13-2 中，最后一个数据文件仍然有空间容纳新行——它没有一个表明文件已满的事务时间戳，因此新行将被添加到该文件中。


    数据文件的另一个重要特征是，删除的行不会直接从文件中移除。相反，它们由与数据文件关联的 Delta 文件跟踪。Delta 文件记录数据文件中发生的任何删除操作，并通过事务时间戳范围与数据文件相连。内存优化表的行更新被跟踪为一次删除和一次插入操作。


    数据和 Delta 文件的填充由一个后台线程执行——称为脱机检查点线程——它持续在 SQL Server 的后台运行。这与传统表使用的检查点进程不同，传统表的检查点进程是周期性地将页写入数据库数据文件。脱机检查点线程监视内存优化表上操作的事务日志，并直接写入数据和
    Delta 文件。


    随着时间的推移，当数据文件积累了更多已删除的行时，将发生合并操作，该操作会将多个数据文件合并成一个数据文件。合并操作将创建新的数据和 Delta 文件，并将一个或多个数据和
    Delta 文件的内容移动到新文件中，但它不会移动标记为已删除的行。新的数据和 Delta 文件中的事务提交时间戳将被调整，以匹配被合并文件的时间戳。图 13-3
    展示了数据文件级别合并操作的简化视图。请记住，合并操作也会影响 Delta 文件。


    ![](img/340881_3_En_13_Fig3_HTML.jpg)


    示意图显示 2 个数据文件合并为 1 个。A 的行数据从 1023 到 1200，B 从 1201 到 1400，C 的数据从 1023 到 1400。


    图 13-3


    合并操作

