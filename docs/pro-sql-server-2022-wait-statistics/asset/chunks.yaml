    另一个导致 WRITE_COMPLETION 等待时间较高的、远不常见的原因是当您在页面可用空间（PFS）页面上遇到页闩锁争用时。PFS 页面跟踪数据页中的可用空间量。如果一个进程需要非常频繁地修改
    PFS 页面，就有可能看到 WRITE_COMPLETION 等待与许多 `PAGELATCH_UP` 等待一起发生，我们将在第 9 章“与闩锁相关的等待类型”中讨论这一点。为了给您一个这种场景的示例，考虑大量并发查询都创建临时表、插入几行然后又删除临时表的情况。在这种情况下，`tempdb`
    数据库的 PFS 页面需要非常频繁地更新以反映临时表的创建和删除。


    ### WRITE_COMPLETION 总结


    `WRITE_COMPLETION` 等待类型，就像 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，与 SQL
    Server 执行的特定存储相关操作有关。看到 WRITE_COMPLETION 等待是非常正常的，在许多情况下不会引起担忧。`CHECKDB` 和数据库数据/日志文件增长等操作可能导致
    WRITE_COMPLETION 等待。


    ## 7. 备份相关等待类型


    备份是数据库管理中非常重要的一部分，对于您所在公司的生存至关重要。**数据是企业拥有的最关键资产**，如果灾难导致数据丢失，公司可能会损失大量资金甚至倒闭。


    在灾难期间最小化数据损失的方法有很多。我们可以使用 SAN 而不是直接连接存储，并可能利用 SAN 复制。或者我们可以使用云存储。也许我们创建一个 SQL
    Server Always On 可用性组将数据复制到数据中心和全球区域。但我们必须做的第一步，并且希望已经采取的，是定期备份 SQL Server 数据库中的数据。


    实施和安排 SQL Server 备份并不是一项非常困难的任务，没有理由不执行定期备份。备份类型和备份操作的间隔由您工作的组织的需求决定，并通常以“RTO”（恢复时间目标）和“RPO”（恢复点目标）时间表示。这些时间代表了从灾难中恢复所需的时间量，以及灾难发生时可接受的数据丢失量。这两个时间应该是您的
    SQL Server 备份策略的主要输入。


    注意


    我说的是“备份策略”，但实际上您首先要构建的是**恢复策略**。这就是 RTO 和 RPO 至关重要的地方。一旦您知道了恢复策略，然后才配置数据库备份。


    值得庆幸的是，SQL Server 开箱即有满足 RTO 和 RPO 要求的不同选项。我们可以使用 SQL Server 自己的备份机制来满足公司的 RTO
    和 RPO 时间；我们不依赖于第三方备份软件。由于 SQL Server 备份操作是一个内部过程，因此有与之关联的不同等待类型，在本章中，我们将了解与执行备份和还原直接相关的三种最常见的等待类型。


    注意到这些备份/还原相关等待类型的高等待时间，不太可能导致 SQL Server 实例的性能下降。但是，我们确实可以选择优化 SQL Server 备份过程，从而加快备份和还原速度。并且由于数据库的备份/还原对于公司的生存至关重要，优化备份和还原吞吐量非常值得付出努力。


    ### BACKUPBUFFER


    要讨论的第一个备份相关等待类型是 `BACKUPBUFFER`。如果我们在 Books Online 上查找此等待类型的定义，会得到以下文本：“当备份任务正在等待数据，或正在等待用于存储数据的缓冲区时发生。此类型不常见，除非任务正在等待磁带装入。”这种措辞听起来好像我们仅在将备份写入磁带设备时才会看到此事件，但事实并非如此。在备份操作期间，无论备份文件的目标是什么，都会记录
    BACKUPBUFFER 等待。原因在于 SQL Server 备份操作使用缓冲区从数据库读取数据并将其写入备份文件的方式。

    '
- fmt: '### 什么是 BACKUPBUFFER 等待类型？


    要理解 BACKUPBUFFER 等待是如何产生的，我们将深入了解 SQL Server 备份过程的内部机制。无论你使用哪种备份方法（即事务日志备份、差异备份或完整备份），这些内部机制基本相同，因此也会遇到相同的等待类型。


    SQL Server 为备份过程分配缓冲区。这些缓冲区将被你的数据库数据填满，并在写入备份文件的过程中移动（或者对于还原操作则相反）。缓冲区在系统内存中分配，但位于缓冲区缓存之外，以避免从缓冲区缓存中窃取内存。备份缓冲区的大小和数量由
    SQL Server 自动计算，但我们可以自己将这些值配置为备份/还原命令的参数。图 [7-1](#340881_3_En_7_Chapter.xhtml#Fig1)
    展示了这些备份缓冲区如何通过一个“读取器”（从你的数据库或备份文件读取数据到缓冲区）和一个“写入器”（将数据从缓冲区写入备份文件或数据库）进行排序和移动。


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig1_HTML.png)


    一个描述缓冲操作的图示，包含源、读取器、已填充和空的缓冲区、写入器以及目标。


    图 7-1

    通过读取器和写入器移动的备份缓冲区


    我们可以通过启用两个跟踪标志 3213 和 3605 来查看备份或还原操作期间有关缓冲区数量和大小的信息，这将把备份/还原信息输出到 SQL Server
    错误日志。清单 [7-1](#340881_3_En_7_Chapter.xhtml#PC1) 中的查询启用了这两个跟踪标志，并对我的测试 SQL Server
    上的 GalacticWorks 数据库执行了完整备份。


    ```sql

    -- 启用跟踪标志

    DBCC TRACEON (3213);

    DBCC TRACEON (3605);

    -- 备份数据库

    BACKUP DATABASE [GalacticWorks]

    TO  DISK = N''C:\TeamData\GWorks.bak''

    WITH NAME = N''GalacticWorks-Full Database Backup'';

    -- 禁用跟踪标志

    DBCC TRACEOFF (3213);

    DBCC TRACEOFF (3605);

    ```

    清单 7-1

    使用备份信息跟踪标志进行完整数据库备份


    请记住，SQL Server 中的跟踪标志应仅在 Microsoft 支持的指导下使用。我现在启用它们是为了在我的测试 SQL Server 上显示备份信息，但我建议不要在生产系统上使用它们。


    在 SQL Server 错误日志中，记录了我们刚刚执行的备份的附加信息，如图 [7-2](#340881_3_En_7_Chapter.xhtml#Fig2)
    所示。


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig2_HTML.png)


    SQL Server 日志信息的 20 行文本。从“媒体缓冲区大小”到“内存限制”的 13 行文本被标记。


    图 7-2

    附加的备份信息


    在这种情况下，备份操作创建了七个缓冲区（由 `Buffer count` 参数显示），每个缓冲区大小为 1024 KB（由 `Buffer size` 参数显示）。创建缓冲区所需的总内存量由
    `Total buffer space` 参数显示，为 7 MB（`Buffer count` * `Buffer size`）。另一个有趣的信息是内存限制。这显示了备份操作在缓冲区缓存之外可以访问的最大内存量。


    现在我们了解了 SQL Server 内部的备份过程是如何工作的，让我们看看 BACKUPBUFFER 等待类型出现在哪里。


    如前所述，SQL Server 备份过程使用缓冲区来存储需要写入备份文件的数据。每当没有直接可用的缓冲区时，就会发生 BACKUPBUFFER 等待，使该过程等待，直到一个完整的缓冲区被写入备份文件并再次变得可用。


    ### BACKUPBUFFER 示例


    产生 BACKUPBUFFER 等待非常简单——只需执行一个备份操作。对于本例，我运行了清单 [7-2](#340881_3_En_7_Chapter.xhtml#PC2)
    中所示的查询。该查询将首先重置 `sys.dm_os_wait_stats` DMV，然后对 GalacticWorks 数据库执行完整备份，最后返回 BACKUPBUFFER
    等待类型的等待统计信息。


    ```sql

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 备份数据库

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'';

    -- 查询 BACKUPBUFFER 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    ```

    清单 7-2

    产生 BACKUPBUFFER 等待


    对 `sys.dm_os_wait_stats` DMV 查询的结果如图 [7-3](#340881_3_En_7_Chapter.xhtml#Fig3)
    所示。


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig3_HTML.png)


    一行有五列：等待类型为 `BACKUPBUFFER`，等待任务计数为 376，等待时间（毫秒）为 890，最大等待时间（毫秒）为 19，信号等待时间（毫秒）为
    12。


    图 7-3

    BACKUPBUFFER 等待


    在我的测试 SQL Server 上，备份操作的总持续时间约为 1 秒。在这 1 秒中，有 890 毫秒花费在等待可用的备份缓冲区上。


    ### 降低 BACKUPBUFFER 等待


    正如本章引言所述，与备份相关的等待通常不是需要关注的原因，因为它们通常不会影响 SQL Server 实例的性能。然而，我们可以利用各种备份相关等待类型的等待统计信息来提高备份性能。


    降低 BACKUPBUFFER 等待时间的最常见方法之一是为备份操作添加更多缓冲区来使用，覆盖自动分配的缓冲区。我们通过在 `BACKUP` T-SQL 命令中指定
    `BUFFERCOUNT` 选项来实现这一点。然而，改变备份操作可以使用的缓冲区数量有一个注意事项。每个创建的缓冲区都会分配 `MAXTRANSFERSIZE`
    选项的值；该值由 SQL Server 自动计算或通过你自己在 `BACKUP` 命令中设置（最大为 4,194,304 字节）。由于备份操作在缓冲区缓存之外分配内存，使用过多或过大的缓冲区可能会导致内存不足的问题。因此，在测试你的
    SQL Server 实例的最佳值时要小心。


    清单 [7-3](#340881_3_En_7_Chapter.xhtml#PC3) 展示了对清单 [7-2](#340881_3_En_7_Chapter.xhtml#PC2)
    中查询的修改，我们用它来演示 BACKUPBUFFER 等待的发生。在这种情况下，我们添加了 `BUFFERCOUNT` 选项并将其配置为 200。


    ```sql

    -- 清除 sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 备份数据库

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'',

    BUFFERCOUNT = 200;

    -- 查询 BACKUPBUFFER 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    ```

    清单 7-3

    配置了 BUFFERCOUNT 的数据库备份


    对 `sys.dm_os_wait_stats` DMV 查询的结果如图 [7-4](#340881_3_En_7_Chapter.xhtml#Fig4)
    所示。


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig4_HTML.png)


    一行有五列：等待类型为 `BACKUPBUFFER`，等待任务计数为 2，等待时间（毫秒）、最大等待时间（毫秒）和信号等待时间（毫秒）均为 0。


    图 7-4

    BACKUPBUFFER 等待


    正如你所看到的，花费在 BACKUPBUFFER 等待上的时间减少到 0 毫秒，而我们未提供 `BUFFERCOUNT` 参数时花费了 890 毫秒。这是因为我们指定的缓冲区数量足以处理备份操作，而无需分配额外的缓冲区。由于不需要额外的缓冲区，我们不会花费时间等待它们的分配。


    另一个选项是在 `BACKUP` T-SQL 命令中配置 `MAXTRANSFERSIZE` 选项。这将允许缓冲区被更大的工作单元填充，最大可达 4,194,304
    字节，即 4 MB。同样，为缓冲区分配更多空间将导致保留更多的内存。'
  raw: '### What Is the BACKUPBUFFER Wait Type?


    To understand how BACKUPBUFFER waits are generated, we will dive into the internals
    of the SQL Server backup process. These internals are mostly the same regardless
    of the backup method you use (i.e., transaction log, differential or full backup),
    and as such, they will encounter the same wait types.


    SQL Server allocates buffers for the backup process. These buffers will be filled
    with data from your database and will be moved through the backup process as they
    are written to the backup file (or vice versa for a restore operation). The buffers
    are allocated inside the memory of your system but outside the buffer cache so
    as to avoid stealing memory from the buffer cache. The size and the amount of
    the backup buffers are automatically calculated by SQL Server, but we can configure
    these values ourselves as parameters of the backup/restore command. Figure [7-1](#340881_3_En_7_Chapter.xhtml#Fig1)
    shows how these backup buffers are ordered and moved through a “reader,” which
    reads the data from your database or backup file to a buffer, and a “writer,”
    which writes the data from the buffer to the backup file or database.


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig1_HTML.png)


    A diagram for the buffering action has a source, a reader, filled and empty buffers,
    a writer, and a target.


    Figure 7-1


    Backup buffers moving through reader and writer


    We can view information about the buffer amount and size during a backup or restore
    operation by enabling two trace flags, 3213 and 3605, which will output backup/restore
    information to the SQL Server error log. The query in Listing [7-1](#340881_3_En_7_Chapter.xhtml#PC1)
    enables both trace flags and performs a full database backup of the GalacticWorks
    database on my test SQL Server.


    ```

    -- enable trace flags

    DBCC TRACEON (3213);

    DBCC TRACEON (3605);

    -- backup database

    BACKUP DATABASE [GalacticWorks]

    TO  DISK = N''C:\TeamData\GWorks.bak''

    WITH NAME = N''GalacticWorks-Full Database Backup'';

    -- disable trace flags

    DBCC TRACEOFF (3213);

    DBCC TRACEOFF (3605);

    Listing 7-1

    Full database backup with backup-information trace flags

    ```


    Keep in mind that trace flags inside SQL Server should only be used under the
    guidance of Microsoft Support. I am enabling them now to show me backup information
    on my test SQL Server, but I would advise against using them on a production system.


    Inside the SQL Server error log, additional information about the backup we just
    performed is logged, as you can see in Figure [7-2](#340881_3_En_7_Chapter.xhtml#Fig2).


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig2_HTML.png)


    A 20 lines of text for the log information of the S Q L server. A 13 line text
    is marked from media buffer size to memory limit.


    Figure 7-2


    Additional backup information


    In this case, the backup operation created seven buffers, shown by the **Buffer
    count** parameter, with a size of 1024 KB each, as shown by the **Buffer size**
    parameter. The total memory needed to create the buffers is shown by the **Total
    buffer space** parameter, 7 MB (Buffer count * Buffer Size). Another interesting
    bit of information returned is the memory limit. This shows the maximum amount
    of memory outside of the buffer cache which the backup operation could access.


    Now we have an idea of how the backup process works inside SQL Server, let’s take
    a look where the BACKUPBUFFER wait type comes in.


    As we described earlier, the SQL Server backup process uses buffers to store data
    that needs to be written to the backup file. Whenever a buffer is not directly
    available, the BACKUPBUFFER wait will occur, making the process wait until a full
    buffer is written to the backup file and it becomes available again.


    ### BACKUPBUFFER Example


    Generating BACKUPBUFFER waits is very simple - just perform a backup operation.
    For this example, I ran the query shown in Listing [7-2](#340881_3_En_7_Chapter.xhtml#PC2).
    The query will first reset the sys.dm_os_wait_stats DMV, then perform a full backup
    of the GalacticWorks database, and finally will return the wait statistics information
    for the BACKUPBUFFER wait type.


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- backup database

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'';

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    Listing 7-2

    Generating BACKUPBUFFER waits

    ```


    The results of the query against the sys.dm_os_wait_stats DMV are shown in Figure
    [7-3](#340881_3_En_7_Chapter.xhtml#Fig3).


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig3_HTML.png)


    A row has five columns for the wait type as backup buffer, waiting tasks count
    as 376, wait time m s as 890, max wait time m s as 19, and signal wait time m
    s as 12.


    Figure 7-3


    BACKUPBUFFER waits


    The total duration of the backup operation was around 1 second on my test SQL
    Server. Of that 1 second, 890 milliseconds were spent waiting on free backup buffers.


    ### Lowering BACKUPBUFFER Waits


    As stated in the introduction of this chapter, backup-related waits aren’t normally
    a cause for concern since they typically don’t impact the performance of your
    SQL Server instance. However, we can improve backup performance by using the wait
    statistics information of the various backup-related wait types.


    One of the most common ways to lower BACKUPBUFFER wait times is by adding more
    buffers for the backup operation to use, overwriting the automatic allocation
    of buffers. We do this by specifying the BUFFERCOUNT option inside the BACKUP
    T-SQL command. There is, however, a catch to altering the number of buffers the
    backup operation can use. Every buffer created will allocate the value of the
    MAXTRANSFERSIZE option; this value is automatically calculated by SQL Server itself
    or by setting the value yourself inside the BACKUP command (up to a maximum of
    4,194,304 bytes). Since the backup operation allocates memory outside of the buffer
    cache, there is a chance that using too many or too large buffers can result in
    out-of-memory problems. So, be careful when testing what the optimal value for
    your SQL Server instance is.


    Listing [7-3](#340881_3_En_7_Chapter.xhtml#PC3) shows a modification of the query
    in Listing [7-2](#340881_3_En_7_Chapter.xhtml#PC2), which we used to demonstrate
    BACKUPBUFFER waits occurring. In this case, we added the BUFFERCOUNT option and
    configured it to a value of 200.


    ```

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- backup database

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'',

    BUFFERCOUNT = 200;

    -- Query BACKUPBUFFER waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPBUFFER'';

    Listing 7-3

    Database backup with BUFFERCOUNT configured

    ```


    The results of the query against the sys.dm_os_wait_stats DMV are shown in Figure
    [7-4](#340881_3_En_7_Chapter.xhtml#Fig4).


    ![](images/340881_3_En_7_Chapter/340881_3_En_7_Fig4_HTML.png)


    A row has five columns for wait type as a backup buffer, waiting tasks count as
    2, wait time m s, max wait time m s, and signal wait time m s as 0.


    Figure 7-4


    BACKUPBUFFER waits


    As you can see, the amount of time spent on the BACKUPBUFFER wait time went down
    to 0 milliseconds instead of the 890 milliseconds it spent when we did not supply
    the BUFFERCOUNT parameter. This happens because the number of buffers we specified
    was enough to process the backup operation without a need to allocate additional
    buffers. Since no additional buffers were required, we do not spend time waiting
    on their allocation.


    Another option is to configure the MAXTRANSFERSIZE option inside the BACKUP T-SQL
    command. This will allow buffers to be filled with larger units of work, up to
    a value of 4,194,304 bytes, or 4 MB. Again, allocating more space for the buffers
    will result in a larger reservation of memory.'
