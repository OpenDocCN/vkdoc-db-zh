  trans: '

    ### LCK_M_I[xx] 示例


    在本例中，我们将生成一个 `LCK_M_IX` 类型的等待。这意味着一个事务正在等待获取锁层次结构中更高级别的意向排他锁。


    我们将使用与 `LCK_M_X` 等待类型类似的示例，通过使用 `REPEATABLE READ` 隔离级别运行 `SELECT` 语句且不完成事务来演示。接下来的查询是我将针对
    GalacticWorks 数据库的 `Person.Address` 表运行的查询：


    ```

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRAN

    SELECT * FROM Person.Address;

    --COMMIT

    ```


    `COMMIT` 命令已被注释掉，以使事务保持打开状态。


    如果我们查看图 8-17 所示的 `sys.dm_tran_locks` DMV，会发现在查询运行时，当前只有一个活动的锁，即在 `OBJECT` 资源类型上的共享锁。这表明整个表已被锁定。由于此锁存在于如此高的级别，因此无需在层次结构的更下层放置其他共享锁。


    ![](img/340881_3_En_8_Fig17_HTML.png)


    *（图表描述：一个表格有 9 列，标题分别为 `resource type`、`resource subtype`、`resource database i
    d`、`resource description`、`resource associated entity i d`、`resource lock partition`、`request
    mode`、`request type` 和 `request status`。表中有一行条目。)*

    图 8-17

    表上的共享锁


    如果另一个事务想要更新同一表中的一行，它必须首先尝试在表级别和页面级别获取意向排他锁，然后才能在行级别获取排他锁。接下来的查询就是这样一个事务，在本例中，我们将尝试更新一行：


    ```

    UPDATE Person.Address

    SET AddressLine1 = ''1227 Shoe St.''

    WHERE AddressID = 5;

    ```


    你会注意到，只要 `SELECT` 查询仍持有其表上的共享锁，前面的查询就会“挂起”。尽管意向锁在大多数情况下与同一对象上的其他意向锁兼容，但在本例中，表级别上存在共享锁而试图在层次结构的更下层执行数据修改，将导致阻塞发生。共享锁与意向排他锁不兼容。


    如果我们查看 `sys.dm_os_waiting_tasks` DMV，将看到获取意向排他锁的任务正在等待，如图 8-18 所示。


    ![](img/340881_3_En_8_Fig18_HTML.png)


    *（图表描述：一个表格有 8 列，标题分别为 `waiting task address`、`session i d`、`execution context
    i d`、`wait duration milliseconds`、`wait type`、`resource address`、`blocking task
    address` 和 `blocking session i d`。表中有一行条目。)*

    图 8-18

    发生的 `LCK_M_IX` 等待


    ### 降低 `LCK_M_I[xx]` 等待


    与前面讨论的其他与锁相关的等待类型一样，要降低 `LCK_M_I[xx]` 等待时间，重点应放在导致阻塞的查询上。因为 `LCK_M_I[xx]` 等待仅在锁层次结构更高级别的对象上持有不兼容的锁时发生，所以值得花时间调查为什么这些锁会被放置在如此高的级别。锁升级可能导致这种情况发生。当
    SQL Server 在锁层次结构的更高级别放置单个锁比锁定下层多个对象更有效时，就会发生锁升级。例如，SQL Server 可以决定在表级别放置一个共享锁，而不是在行上放置数千个共享锁。这比维护数千个单独的锁所需的资源要少得多。事实上，这正是我在
    `LCK_M_IX` 等待类型示例中向您展示的情况。我们用 `SELECT` 查询的 `Person.Address` 表包含超过 19,000 行。当我们对表运行
    `SELECT *` 查询时，这意味着至少需要 19,000 个行锁。由于放置和持有如此多的锁会消耗大量资源，SQL Server 决定在表上放置一个共享锁，而不是在行上放置
    19,000 个锁。


    如果我们重写查询使其需要更少的锁，例如，只选择前 x 行而不是所有行，SQL Server 可能会选择再次锁定行，而不是锁定整个表。


    ### `LCK_M_I[xx]` 总结


    `LCK_M_I[xx]` 等待类型与意向锁相关，或者更确切地说，与另一个不兼容的锁阻止放置意向锁的情况相关。意向锁放置在更高级别的对象上，以指示在锁层次结构的更下层放置了锁。与之前讨论的仅代表一种锁类型的锁模式不同，意向锁可以代表锁层次结构更下层的不同锁模式。`LCK_M_I[xx]`
    等待类型高发的一个常见原因是 SQL Server 将较低级别的锁升级到较高级别锁的情况。在这种情况下，意向锁将被阻塞并无法获取。


    ## `LCK_M_SCH_S` 和 `LCK_M_SCH_M`


    本章最后两个与锁相关的等待类型是 `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型。这两种等待类型都与放置在表上的锁（即所谓的架构锁）有关。本章前面我们没有过多关注架构锁，但由于它们发生时对等待时间有很大影响，我想在此说明。


    ### 什么是 `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型？


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型都与架构锁相关。架构锁放置在表对象级别，以在查询访问表时保护表免受修改，或在表被修改时阻止查询访问表。架构锁有两种不同的类型：架构稳定性锁
    (`Sch-S`) 和架构修改锁 (`Sch-M`)。每种类型都有与之关联的不同等待类型。`LCK_M_SCH_S` 等待类型（表示读取表）在架构稳定性锁必须等待才能放置时记录，`LCK_M_SCH_M`
    等待类型（表示表架构将被更改）在架构修改锁等待放置时记录。


    两种架构锁都具有极高的兼容性。架构稳定性锁与除架构修改锁以外的所有其他锁类型兼容。另一方面，架构修改锁与所有其他锁类型（包括意向锁）都不兼容。


    使用架构稳定性锁时，在查询当前正在读取或写入表时，无法以任何方式修改或更改表。因为架构稳定性锁与除架构修改锁以外的所有锁模式兼容，所以例如在表级别看到一个架构稳定性锁与一个意向排他锁（表示表内更下层正在发生数据修改）同时存在是完全正常的。


    架构修改锁与架构稳定性锁相反，因为它们在表正在执行修改时阻止任何查询访问该表。

    '
- fmt: '## LCK_M_SCH_S 和 LCK_M_SCH_M 示例


    对于第一个示例，我将向现有表中添加一个新列。正如本章前面的示例一样，我将通过不提供 `COMMIT` 或 `ROLLBACK` 命令来保持事务处于打开状态。以下查询向
    `GalacticWorks` 数据库中的 `Person.Address` 表添加了一个额外的列，我将 `ROLLBACK` 命令注释掉了，以便锁保持原位：


    ```sql

    BEGIN TRAN

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    --ROLLBACK

    ```


    在 SSMS 的一个新窗口中，我将对 `Person.Address` 表执行一个 `SELECT` 查询，如下所示：


    ```sql

    SELECT *

    FROM Person.Address;

    ```


    如果在两个查询都在运行时查看 `sys.dm_tran_locks` DMV，我们应该能观察到是否有任何阻塞发生。图 [8-19](#340881_3_En_8_Chapter.xhtml#Fig19)
    展示了针对 `sys.dm_tran_locks` DMV 执行 `SELECT *` 查询输出的一部分。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig19_HTML.png)


    *图 8-19：Sch-M 和 Sch-S 锁*


    从图 [8-19](#340881_3_En_8_Chapter.xhtml#Fig19) 中可以看出，我们启动的第一个查询（旨在向 `Person.Address`
    表添加列）导致了该表上的 Sch-M 锁。第二个 `SELECT` 查询正在等待获取同一表上的 Sch-S 锁。


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，会看到一个任务正在等待 `LCK_M_SCH_S` 等待类型。图 [8-20](#340881_3_En_8_Chapter.xhtml#Fig20)
    展示了在两个查询都在运行时 `sys.dm_os_waiting_tasks` 的输出。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig20_HTML.png)


    *图 8-20：发生 LCK_M_SCH_S 等待*


    正如我们所料，`SELECT` 查询正在等待获取其架构稳定性锁。


    如果我们反转这个示例：先启动一个读取事务并保持其打开，然后尝试修改同一个表，我们应该会遇到 `LCK_M_SCH_M` 等待，因为我们只能在目标修改表中没有活动事务时获取架构修改锁。


    为了演示这种情况，我执行了以下查询。这启动了一个使用 `REPEATABLE READ` 隔离级别的 `SELECT` 查询，但我保持事务打开以便锁保持原位：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT * FROM

    Person.Address;

    -- COMMIT

    ```


    在 SSMS 的一个新窗口中，我将执行之前用于演示 `LCK_M_SCH_S` 等待类型的表修改查询，但这次不保持事务打开：


    ```sql

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    ```


    正如执行第二个查询时您可能会注意到的，没有任何结果返回，并且查询持续运行，这明显表明发生了阻塞。


    让我们再次查看 `sys.dm_tran_locks` DMV，看看能发现什么。图 [8-21](#340881_3_En_8_Chapter.xhtml#Fig21)
    展示了在我的测试 SQL Server 上的输出。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig21_HTML.png)


    *图 8-21：Sch-M 锁等待被获取*


    在这种情况下，该表上有一个来自 `SELECT` 查询的共享锁。因为我们正在从一个大表中选择信息，SQL Server 决定放置一个表锁，而不是在更低级别放置锁。由于架构修改锁与所有其他锁类型都不兼容，因此发生了阻塞，在能够执行表修改之前，我们将一直等待，直到共享锁消失。


    查看 `sys.dm_os_waiting_tasks` DMV 向我们展示了预期的结果：一个 `LCK_M_SCH_M` 等待，如图 [8-22](#340881_3_En_8_Chapter.xhtml#Fig22)
    所示。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig22_HTML.png)


    *图 8-22：发生 LCK_M_SCH_M 等待*


    ### 降低 LCK_M_SCH_S 和 LCK_M_SCH_M 等待


    当您看到 `LCK_M_SCH_S` 或 `LCK_M_SCH_M` 等待类型出现等待时，很可能是有一个事务正积极地想要修改表。如果在 `LCK_M_SCH_S`
    等待类型上出现高等待时间，表修改事务已经在运行；而看到 `LCK_M_SCH_M` 等待时，修改操作正在等待所有活动事务移除它们在该表上的锁。


    修改表并非在生产 SQL Server 实例上每天都会发生的事情（但愿如此）。修改大表尤其成问题，并且是导致高 `LCK_M_SCH_S` 等待时间的原因，而尝试查询被修改表的用户会注意到延迟。然而，如果您确实需要修改一个表，但同时有长时间运行的查询正在从该表中检索信息，那么您应该预期会出现
    `LCK_M_SCH_M` 等待。


    降低这两种等待类型的等待时间与对表执行修改操作直接相关。一个建议是在定义的维护窗口期间执行表修改，或者在尽可能少的并发事务访问该表时进行，而不是在针对该表有大量活动事务时执行修改。


    ### LCK_M_SCH_S 和 LCK_M_SCH_M 总结


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型是由架构稳定性锁或架构修改锁被其他锁阻塞所导致的。看到这两种等待类型的高等待时间表明，要么表修改正在等待该表上所有活动锁被移除，要么表修改当前正在运行并且其他事务正被其阻塞。


    # 9. Latch 相关等待类型


    在第 [8](#340881_3_En_8_Chapter.xhtml) 章“锁相关等待类型”中，我们回顾了 SQL Server 内部的锁定和阻塞，以及指示正在发生阻塞的不同等待类型。Latches
    看起来与我们之前讨论的锁非常相似；在某些情况下，它们似乎使用与第 [8](#340881_3_En_8_Chapter.xhtml) 章讨论的锁相同的模式。但请不要误解：*latches
    与锁不同*，尽管它们似乎共享一些特性。锁用于保证事务一致性，而 latches 用于保证内存中对象的一致性。


    Latches，就像锁定和阻塞一样，是 SQL Server 内部一个复杂的主题。Latches 甚至有自己的 latch 统计信息 DMV，记录了等待特定
    latch 类型所花费的时间。


    由于 latch 的复杂性及其在 SQL Server 内部的功能，我认为需要对其做一个介绍，以便更好地理解如何在本章后续部分对 latch 相关的等待类型进行故障排除。因此，我们将从介绍
    latch 开始本章，就像我们在第 [8](#340881_3_En_8_Chapter.xhtml) 章“锁相关等待类型”中从介绍锁定开始一样。'
  raw: '### LCK_M_SCH_S and LCK_M_SCH_M Example


    For the first example, I will add a new column to an existing table, and just
    as we did in the examples earlier in this chapter, I will keep the transaction
    open by not supplying a COMMIT or ROLLBACK command. The following query adds an
    extra column to the Person.Address table in the GalacticWorks database, and I
    left the ROLLBACK command commented so the locks stay in place:


    ```

    BEGIN TRAN

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    --ROLLBACK

    ```


    In a new window in SSMS, I will execute a SELECT query against the Person.Address
    table, like the one here:


    ```

    SELECT *

    FROM Person.Address;

    ```


    If we look at the sys.dm_tran_locks DMV while both queries are running, we should
    see if there is any blocking going on. Figure [8-19](#340881_3_En_8_Chapter.xhtml#Fig19)
    shows a part of the output of a SELECT * query against the sys.dm_tran_locks DMV.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig19_HTML.png)


    A table has 9 columns titled resource type, resource subtype, resource database
    i d, resource description, resource associated entity i d, resource lock partition,
    request mode, request type, and request status. It has entries in 2 rows.


    Figure 8-19


    Sch-M and Sch-S locks


    As you can see from Figure [8-19](#340881_3_En_8_Chapter.xhtml#Fig19), the first
    query we started, with the goal of adding a column to the Person.Address table,
    resulted in a Sch-M lock on the table. The second SELECT query is waiting to receive
    a Sch-S lock on the same table.


    If we query the sys.dm_os_waiting_tasks DMV, we see a task waiting on the LCK_M_SCH_S
    wait type. Figure [8-20](#340881_3_En_8_Chapter.xhtml#Fig20) shows the output
    of sys.dm_os_waiting_tasks, while both queries are running.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig20_HTML.png)


    A table has 8 columns titled waiting task address, session i d, execution context
    i d, wait duration milliseconds, wait type, resource address, blocking task address,
    and blocking session i d. It has entries in one row.


    Figure 8-20


    LCK_M_SCH_S wait occurring


    Just as we expected, the SELECT query is waiting to acquire its Schema Stability
    lock.


    If we were to reverse the example by starting a read transaction and leaving it
    open and then try to modify the same table, we should run into a LCK_M_SCH_M wait,
    since we can only acquire a Schema Modification lock when there are no active
    transactions inside the table we want to modify.


    To show this situation, I executed the following query. This starts a SELECT query
    with the Repeatable Read Isolation level, but I leave the transaction open so
    the locks stay in place:


    ```

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT * FROM

    Person.Address;

    -- COMMIT

    ```


    In a new window inside SSMS, I will execute the table modification query used
    earlier to demonstrate the LCK_M_SCH_S wait type, but without leaving the transaction
    open:


    ```

    ALTER TABLE Person.Address

    ADD

    Test VARCHAR(10);

    ```


    As you will probably notice when executing the second query, nothing is returned
    and the query keeps running, a clear indication of a block occurring.


    Let’s look at the sys.dm_tran_locks DMV again to see what we can find out. Figure
    [8-21](#340881_3_En_8_Chapter.xhtml#Fig21) shows the output on my test SQL Server.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig21_HTML.png)


    A table has 9 columns titled resource type, resource subtype, resource database
    i d, resource description, resource associated entity i d, resource lock partition,
    request mode, request type, and request status. It has entries in 2 rows.


    Figure 8-21


    Sch-M lock waiting to be acquired


    In this case, the table has a Shared lock on it from the SELECT query. Because
    we are selecting information from a large table, SQL Server decided to place a
    table lock instead of placing locks on a lower level. Because a Schema Modification
    lock is incompatible with every other lock type, a block occurs, and we will wait
    until the Shared lock is gone before we can perform our table modification.


    Looking at the sys.dm_os_waiting_tasks DMV shows us the results we are expecting,
    a LCK_M_SCH_M wait, as shown in Figure [8-22](#340881_3_En_8_Chapter.xhtml#Fig22).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig22_HTML.png)


    A table has 8 columns titled waiting task address, session i d, execution context
    i d, wait duration milliseconds, wait type, resource address, blocking task address,
    and blocking session i d. It has entries in one row.


    Figure 8-22


    LCK_M_SCH_M waits occurring


    ### Lowering LCK_M_SCH_S and LCK_M_SCH_M Waits


    When you see waits occurring for either the LCK_M_SCH_S or LCK_M_SCH_M wait type,
    there is probably a transaction actively wanting to modify the table. In the case
    of high wait times on the LCK_M_SCH_S wait type, the table modification transaction
    is already running; when seeing LCK_M_SCH_M waits, the modification is waiting
    for all active transactions to remove their locks on the table.


    Modifying a table is not something that happens every day on production SQL Server
    instances (hopefully). Changing large tables is especially problematic and a cause
    for high LCK_M_SCH_S wait times, and users trying to query the table being modified
    will notice delays. If, however, you absolutely need to modify a table, but there
    are long-running queries retrieving information from the table, you should expect
    LCK_M_SCH_M waits.


    Lowering the wait times of both wait types is directly related to performing modifications
    to tables. A suggestion would be to perform the table modification during a defined
    maintenance window, or when there are as few as possible concurrent transactions
    accessing the table, instead of doing the modification when there are many transactions
    active against the table.


    ### LCK_M_SCH_S and LCK_M_SCH_M Summary


    The LCK_M_SCH_S and LCK_M_SCH_M wait types are the result of Schema Stability
    or Schema Modification locks blocked by other locks. Seeing high wait times of
    either wait type indicates that either a table modification is waiting for all
    active locks on that table to be removed or a table modification is currently
    running and other transactions are being blocked by it.


    # 9. Latch-Related Wait Types


    In Chapter [8](#340881_3_En_8_Chapter.xhtml), “Lock-Related Wait Types,” we reviewed
    locking and blocking inside SQL Server, together with different wait types which
    indicate blocking is occurring. Latches look a lot like the locks we discussed
    earlier; in some cases, they appear to use the same modes as the locks discussed
    in Chapter [8](#340881_3_En_8_Chapter.xhtml). Make no mistake though; *latches
    are different from locks*, even though they seem to share some features. While
    locks are used to guarantee transactions consistency, latches are used to guarantee
    the consistency of in-memory objects.


    Latches, just like locking and blocking, are a complex subject inside SQL Server.
    Latches even have their own latch-statistics DMV which records how much time has
    been spent waiting on specific latch types.


    Because of the complexity of latches and their function inside SQL Server, I believe
    they require an introduction to better understand how to troubleshoot latch-related
    wait types later in this chapter. For this reason, we will start this chapter
    with an introduction to latches, just as we did with the introduction to locking
    inside Chapter [8](#340881_3_En_8_Chapter.xhtml), “Lock-Related Wait Types.”'
