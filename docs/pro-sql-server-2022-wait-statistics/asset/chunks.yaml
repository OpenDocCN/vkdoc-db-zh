    ## 隔离级别


    我们可以通过更改隔离级别来控制事务所放置锁的类型。隔离级别定义了并发操作期间事务相互隔离的程度。我们可以在连接或事务的基础上更改隔离级别。更改隔离级别只会改变共享锁的行为；数据修改所需的排他锁不受影响。更改隔离级别还会引入某些现象。这些现象会影响读取事务的结果，它们的发生是由于在事务期间共享锁的放置和持有方式发生了变化。接下来的列表显示了
    SQL Server 中可用的各种隔离级别（从最低的隔离形式到最高的），以及与之相关的现象：


    *   `未提交读`：此隔离级别允许在另一个事务对同一对象执行修改时进行读取。它不会等待对象上的排他锁被释放。这使得读取未提交的值（称为“脏读”）成为可能。脏读可能是有害的（如果你不期望它们发生），因为它们可能返回数据库中已不再存在的值。例如，如果有人将某个值从“A”更新为“B”，而同时其他用户在同一时间查询相同的数据，则可能得到旧值“A”而不是更新后的“B”值。


    *   `已提交读` – 这是 SQL Server 中的默认隔离级别。使用此隔离级别将使读取事务等待，直到并发的写入事务完成。将在行上放置一个共享锁，并在读取该行后立即释放。与此隔离级别相关的现象称为“不一致分析”。这意味着如果数据在两次读取事务之间被另一个事务修改，那么同一个读取查询可能会得到不同的结果。


    *   `可重复读` – 将隔离级别设置为 `可重复读` 将锁定事务正在读取的行。但是，`可重复读` 不会在读取行后释放其上的共享锁，而是会将该锁保持到整个事务完成。`可重复读`
    使得“幻读”可能发生。每当另一个事务添加或更改了尚未被读取事务锁定的数据时，就会发生幻读。


    *   `可序列化` – `可序列化` 隔离级别是你可以使用的最高隔离级别，它将放置最多的锁以确保你正在读取的数据在事务运行期间不会被修改。它通过锁定你所选择的数据的整个范围（例如，整个表）来实现这一点，从而使其无法进行更改。由于你所选择的数据范围在事务开始时就被锁定，因此不可能发生任何现象。


    SQL Server 2005 增加了另一种隔离事务的方法，称为行版本控制。行版本控制使用数据修改的版本，并将它们返回给读取查询，而不会导致阻塞。当一个事务修改数据时，更改将被记录为一个版本。当一个读取事务访问相同的数据时，它将收到在修改事务提交之前的更改版本。关于行版本控制的更多信息可以在在线手册中找到：`https://slrwnds.com/87n21i`。


    **极客笔记**


    `未提交读` 隔离级别通常通过使用 `NOLOCK` 查询提示来实现。许多开发人员错误地认为使用神奇的 `NOLOCK` 提示会使他们的查询运行得更快。这个误解不仅是错误的，而且对于依赖准确数据的重要查询来说，这是一种糟糕的做法。


    因为隔离级别及其锁行为可能很复杂，难以理解，我添加了图 8-3，它展示了各种隔离级别在读取操作期间实现锁定的方式。方框代表表中的行，带有锁的行表示该行上有一个活动的共享锁。


    ![](img/340881_3_En_8_Fig3_HTML.jpg)


    插图描绘了从 `未提交读`、`已提交读`、`可重复读` 到 `可序列化` 的不同类型隔离级别，其中 `可序列化` 具有高隔离级别。


    **图 8-3**


    隔离级别和锁行为


    有各种原因使你会选择使用不同于默认 `已提交读` 的隔离级别。在许多情况下，这些原因与你工作负载预期的锁/阻塞量，或者你的事务返回的数据应该有多“正确”有关。例如，在默认的
    `已提交读` 隔离级别下，你的事务运行期间数据可能被其他事务修改，这意味着事务结束时的结果与事务开始时的结果不同。为了确保在你的事务运行时数据不会改变，你可以使用
    `可序列化` 隔离级别，但这意味着需要放置和维护更多的锁，从而在并发的 SQL Server 环境中导致更多的阻塞。


    我们可以通过配置连接字符串中的不同隔离级别，或者通过提供表提示（快照隔离是一个例外，它是在数据库级别配置的）来更改默认的 `已提交读` 隔离级别。


    **极客笔记**


    `已提交读快照` 隔离级别（RCSI）是在数据库级别设置的，这意味着所有请求 `已提交读` 的事务将自动使用 RCSI。这种数据库级别的设置允许在不更改任何现有代码的情况下使用
    RCSI 的好处。


    例如，以下两个查询展示了使用 `未提交读` 隔离级别执行查询的两种不同方法。第一个查询为整个会话设置事务隔离级别：


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    ```


    另一种方法是使用表提示将隔离级别设置为 `未提交读`：


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    这两种方法都将达到相同的效果，但请记住，为会话设置隔离级别将导致在此特定会话中设置之后执行的所有查询都使用所选的隔离级别。

