- fmt: '# Capturing Wait Statistics Using Extended Events


    Most of the wait statistics information in SQL Server is recorded cumulatively,
    and because so many internal processes also generate wait statistics, it is difficult
    to detect the impact for a single query. With Extended Events, it is possible
    to capture the exact wait times a query encountered and on what wait types the
    query was waiting for. This information will help us analyze the queries with
    the largest impact on our system, allowing us to optimize query performance so
    the impact is minimized. Or, if preferred, we might capture queries encountering
    a specific wait type while executing.


    Extended Events were introduced in SQL Server 2008 and are a replacement for the
    non-security events found inside SQL Server Profiler. Extended Events are more
    extensible than Profiler, and the number of events included with Extended Events
    keeps growing with every release of SQL Server.


    **Nerd Note**


    The death of SQL Server Profiler was thought to be near in 2008 when SQL Server
    introduced Extended Events (for non-security events) and SQL Server Audit (for
    security events). At the time of this writing, the year is 2022 and Profiler is
    very much alive and will never die. #TeamProfiler


    Extended Events have a reputation of being difficult to work with, and this was
    especially true in SQL Server 2008 when they were first introduced. Working with
    Extended Events became a lot easier in SQL Server 2012 when it was first possible
    to create Extended Event sessions using SSMS.


    There are many different wait-related events available when working with Extended
    Events. We view these events by running a query against the `sys.dm_xe_map_values`
    DMV, which holds all the different Extended Events event types:


    ```sql

    SELECT *

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types'';

    ```


    Figure [2-18](#340881_3_En_2_Chapter.xhtml#Fig18) shows a small part of the results
    of this query.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig18_HTML.png)


    A screenshot of partial results. The tabular output has 5 columns and 16 rows.
    The columns lists names, objects, map keys, and map values.


    Figure 2-18


    Partial results of `sys.dm_xe_map_values`


    In total, there are about 1500 different wait statistics–related events available
    in SQL Server 2022 RC0. These events do not map one-on-one against the different
    wait types, and in some cases the names of the wait types do not match those of
    the events, even though they have the same meaning. An example of this is the
    ASYNC_NETWORK_IO wait type, which is named NETWORK_IO by Extended Events. While
    we won’t go into details about Extended Events in this book, I will show you how
    to use them to capture wait statistics–related information using Extended Events
    inside of SSMS as well as straight T-SQL.


    ## Capture Wait Statistics Information for a Specific Query


    Let’s look at how to configure an Extended Event session for capturing wait statistics
    information for a specific query. We will set a filter on a specific session and
    then execute the query we want to analyze.


    The first thing we do is open SSMS and connect to a SQL Server instance (keep
    in mind Extended Events was added to versions of SSMS starting with SQL Server
    2012). Once connected, we open the Management folder and then choose the Extended
    Events option. We right-click the Sessions folder and select the option New Session,
    as shown in Figure [2-19](#340881_3_En_2_Chapter.xhtml#Fig19).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig19_HTML.jpg)


    A screenshot of the new extended event session. The management folder opens the
    extended events option which has the session folder. The menu from that folder
    highlights the new session option.


    Figure 2-19


    Adding new Extended Event session


    The New Session dialog will appear where we enter a name for this Extended Event
    session and set additional options. We will ignore those options for now and just
    fill in the name of the Extended Event session, as shown in Figure [2-20](#340881_3_En_2_Chapter.xhtml#Fig20)
    (note the error message at the top; this is expected until we add events to capture.)


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig20_HTML.png)


    A screenshot of the new session dialogue box. The text at the top reads cannot
    create a session without any events. The left panel has a menu for selecting a
    page that includes general, events, data storage, and advanced.


    Figure 2-20


    Configuring wait statistics Extended Event session


    The next step is configuring the events this Extended Event session will monitor,
    which we do by selecting the Events tab (callout number 1 in Figure [2-21](#340881_3_En_2_Chapter.xhtml#Fig21))
    in the New Session dialog.


    Since we are interested in wait statistics information, I searched for the `wait_info`
    event in the Events Library (callout number 2 in Figure [2-21](#340881_3_En_2_Chapter.xhtml#Fig21))
    and added it to the Selected Events box (callout number 3 in Figure [2-21](#340881_3_En_2_Chapter.xhtml#Fig21))
    as shown here:


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig21_HTML.png)


    A screenshot of the event selection process. The steps are as follows. 1. Select
    events from the left menu. 2. Enter wait underscore info in the event library.
    3. The selected event is on the right.


    Figure 2-21


    Selecting an event to monitor


    Since we are interested in the wait statistics associated with a specific query,
    we configure a filter to only return wait statistics information for a specific
    session. To do this we click the Configure button in the New Session dialog, which
    opens a new section where we select Global Fields, which will record extra information
    when a `wait_info` event is triggered. In this case, I checked the `sql_text`
    global field, as shown in Figure [2-22](#340881_3_En_2_Chapter.xhtml#Fig22), so
    we will view the actual query when an event is captured.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig22_HTML.png)


    A screenshot of the event configuration options for the selected event. The event
    wait underscore info opens a column of global fields on the right. The name, S
    Q L underscore text is selected.


    Figure 2-22


    Setting the `sql_text` global field


    Next is the Filter (Predicate) tab. Here we set the filter to capture events from
    a specific session ID. We do this by clicking inside the Field box and selecting
    the `sqlserver.session_id` field and then setting the Value to the session ID
    we want to monitor. In this case, I configured the filter to only capture events
    for session ID 76, as shown in Figure [2-23](#340881_3_En_2_Chapter.xhtml#Fig23).


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig23_HTML.png)


    A screenshot of the filter option for the selected event. The selected event is
    at the center and the filter option on the right provides the field, operator,
    and value information.


    Figure 2-23'
