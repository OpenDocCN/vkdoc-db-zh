- fmt: "### Lowering CMEMTHREAD Waits\n\n由于 SQL Server 中存在许多可能产生 `CMEMTHREAD` 等待的不同内存对象，因此根据被访问的内存对象，降低\
    \ `CMEMTHREAD` 等待时间的可能解决方案也有很多。\n\n一个比较常见的发生 `CMEMTHREAD` 等待的情况是当执行大量短小的、并发的即席查询时。每次执行即席查询（无法参数化的查询）时，查询优化器都会为该查询生成一个新的执行计划。所有这些新的执行计划都会保存到计划缓存中，并且会访问一个用于分配缓存描述符的内存对象。由于该内存对象是线程安全的，如果插入速率足够高，就可能发生\
    \ `CMEMTHREAD` 等待。如果您怀疑即席查询可能导致 `CMEMTHREAD` 等待，一个很好的起点是查看过程缓存。清单 [6-6](#340881_3_En_6_Chapter.xhtml#PC6)\
    \ 中的查询将为您提供过程缓存中执行计划数量的信息。\n\n```sql\nSELECT  objtype,\n        COUNT_BIG (*)\
    \ AS 'Total Plans',\n        SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024\
    \ AS 'Size (MB)'\nFROM sys.dm_exec_cached_plans\nGROUP BY objtype;\n```\n**清单\
    \ 6-6** 查询过程缓存\n\n此查询的结果应如图 [6-14](#340881_3_En_6_Chapter.xhtml#Fig14) 所示，尽管您系统上的数字会有所不同。\n\
    \n![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig14_HTML.jpg)\n\n一个包含 4 列 6\
    \ 行的表格。它列出了对象类型、总计划数和大小。其中“对象类型”列下的“Prepared”被选中。\n\n**图 6-14** 查询过程缓存的结果\n\n\
    我们将重点关注即席执行计划的数量。如果您看到这个数字在快速增长，并且同时经历了 `CMEMTHREAD` 等待，那么值得花精力去分析这些即席查询。如果可能，尝试优化查询以使其生成可重用的计划。如果您的应用程序使用许多动态查询，那么请尝试使用\
    \ `sp_executesql` 系统存储过程，而不是 `EXECUTE (EXEC)` 命令。使用 `EXEC` 命令很可能导致只被使用一次的计划。\n\
    \nMicrosoft 在 SQL Server 2005 SP2 中发布了针对此问题的各种修复（最值得注意的是将某些内存对象跨 CPU 分区），使得这种情况在如今变得不那么常见。即使您使用的是比\
    \ SQL Server 2005 更新的版本，升级到最新的可用 Service Pack 可能也是一个好主意，因为每个 SQL Server 版本都包含了各种与内存相关的错误修复。\n\
    \n### CMEMTHREAD Summary\n\n`CMEMTHREAD` 等待类型是一种与内存相关的等待类型。当多个线程尝试访问一次只允许单个线程访问的内存对象时，就会发生\
    \ `CMEMTHREAD` 等待。其他线程在等待轮到自己访问内存对象所花费的时间被记录为 `CMEMTHREAD` 等待时间。发生 `CMEMTHREAD`\
    \ 等待的更常见情况之一是您的系统使用了大量即席查询。每次生成新的执行计划时，SQL Server 都会访问一个内存对象；如果生成了许多执行计划，这将导致线程排队等待访问该内存对象，从而导致\
    \ `CMEMTHREAD` 等待。\n\n## IO_COMPLETION\n\n就像 `ASYNC_IO_COMPLETION` 等待类型一样，`IO_COMPLETION`\
    \ 等待发生在 SQL Server 等待存储相关操作完成时。而且与 `ASYNC_IO_COMPLETION` 等待类型一样，看到 `IO_COMPLETION`\
    \ 等待类型的高等待时间并不一定意味着您的存储系统有问题。`IO_COMPLETION` 等待在您的 SQL Server 实例运行期间会正常发生，只有当等待时间远高于正常水平时才应引起关注。\n\
    \n### What Is the IO_COMPLETION Wait Type?\n\n`ASYNC_IO_COMPLETION` 等待类型在执行数据库相关操作（如数据库备份）时记录，而\
    \ `IO_COMPLETION` 等待则在涉及非数据页时发生，例如还原事务日志备份或访问位图分配页（如 GAM 页）。当执行对存储进行读取或写入操作的查询（如合并联接运算符）时，也可能发生\
    \ `IO_COMPLETION` 等待。\n\n### IO_COMPLETION Example\n\n让我们通过还原事务日志备份来生成一些 `IO_COMPLETION`\
    \ 等待。在此示例中，我们将再次使用 GalacticWorks 数据库。清单 [6-7](#340881_3_En_6_Chapter.xhtml#PC7)\
    \ 中的查询将执行 GalacticWorks 数据库的完整备份，进行一些更改，然后执行事务日志备份。完成后，我们将再次还原完整备份，清除 `sys.dm_os_wait_stats`\
    \ DMV，还原事务日志备份，并检查 `IO_COMPLETION` 等待。\n\n```sql\n-- 确保 GalacticWorks 处于完整恢复模式\n\
    ALTER DATABASE GalacticWorks SET RECOVERY FULL;\n-- 首先执行完整备份\n-- 否则完整恢复模式不会生效\n\
    BACKUP DATABASE [GalacticWorks]\nTO DISK = N'C:\\TeamData\\GalacticWorks.bak';\n\
    -- 对 AW 数据库进行一些更改\nUSE GalacticWorks;\nUPDATE Person.Address\nSET City = 'Portland'\n\
    WHERE City = 'Bothell'\n-- 备份事务日志\nBACKUP LOG [GalacticWorks]\nTO DISK = N'C:\\\
    TeamData\\GalacticWorks_Log.trn'\n-- 使用 NORECOVERY 还原之前的完整备份\nUSE [master];\n\
    RESTORE DATABASE [GalacticWorks]\nFROM DISK = N'C:\\TeamData\\GalacticWorks.bak'\n\
    WITH NORECOVERY, REPLACE;\n-- 清除 sys.dm_os_wait_stats\ndbcc sqlperf ('sys.dm_os_wait_stats',\
    \ CLEAR);\n-- 还原最后一个事务日志备份\nRESTORE LOG [GalacticWorks]\nFROM DISK = N'C:\\TeamData\\\
    GalacticWorks_Log.trn';\n-- 检查 IO_COMPLETION 等待\nSELECT *\nFROM sys.dm_os_wait_stats\n\
    WHERE wait_type = 'IO_COMPLETION'\n```\n**清单 6-7** 生成 IO_Completion 等待\n\n在我的测试系统上，针对\
    \ `sys.dm_os_wait_stats` DMV 的此查询结果如图 [6-15](#340881_3_En_6_Chapter.xhtml#Fig15)\
    \ 所示。\n\n![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig15_HTML.png)\n\n一个包含\
    \ 5 列 1 行的表格。它列出了等待类型为 I O completion，等待任务数为 535，等待时间毫秒为 13，最大等待时间毫秒为 0，信号等待时间毫秒为\
    \ 1。\n\n**图 6-15** IO_COMPLETION 等待\n\n我们使用清单 [6-7](#340881_3_En_6_Chapter.xhtml#PC7)\
    \ 中的查询只修改了少量记录，因此由于事务日志备份还原进行得很快，总等待时间很低。\n\n在 SQL Server 服务重启后启动数据库时，也会发生 `IO_COMPLETION`\
    \ 等待时间。这意味着在重启或故障转移后，您应该预期会有 `IO_COMPLETION` 等待；这些都是完全正常的。同样，当启用 `AUTO_CLOSE`\
    \ 并且数据库正在启动时，您也应该会经历 `IO_COMPLETION` 等待。\n\n### Lowering IO_COMPLETION Waits\n\
    \n大多数情况下，`IO_COMPLETION` 等待不应该引起关注。当它们远高于您基线中的等待时间时，您应该像我在“Lowering `ASYNC_IO_COMPLETION`”部分描述的那样分析存储子系统性能。虽然某些查询操作也可能导致\
    \ `IO_COMPLETION` 等待，但它们通常不是等待时间高于正常水平的原因。\n\n### IO_COMPLETION Summary\n\n就像\
    \ `ASYNC_IO_COMPLETION` 等待类型一样，`IO_COMPLETION` 等待发生在访问存储子系统时。当 SQL Server 等待非数据页操作（如事务日志还原操作或读取位图页（如\
    \ GAM 页））完成时，会发生 `IO_COMPLETION` 等待。看到 `IO_COMPLETION` 类型的等待发生是完全正常的，除非等待时间远高于您基线中的值，否则这些通常不需要更深入的分析。在那些情况下，首先关注您的存储子系统的性能（尤其是延迟）。\n\
    \n## LOGBUFFER and WRITELOG\n\n我将 `LOGBUFFER` 和 `WRITELOG` 合并在本节中。这是因为这两种等待类型彼此之间、与事务日志以及与存储子系统都有密切关系。"
  raw: '### Lowering CMEMTHREAD Waits


    Since there are many different memory objects present in SQL Server which could
    potentially generate CMEMTHREAD waits, there are many possible solutions to lowering
    CMEMTHREAD wait times depending on the memory object being accessed.


    One of the more common situations where CMEMTHREAD wait occurs is when large amounts
    of short, concurrent, ad hoc queries are executed. Every time an ad hoc query
    is executed (one which could not be parameterized), the Query Optimizer generates
    a new execution plan for the query. All these new execution plans are saved to
    the plan cache, and a memory object for allocating cache descriptors is accessed.
    Since the memory object is thread-safe, CMEMTHREAD waits can occur if the rate
    of insertion is high enough. A good place to start looking if you suspect CMEMTHREAD
    waits are going to occur because of ad hoc queries is the procedure cache. The
    query in Listing [6-6](#340881_3_En_6_Chapter.xhtml#PC6) will give you information
    about the number of execution plans in the procedure cache.


    ```

    SELECT  objtype,

    COUNT_BIG (*) AS ''Total Plans'',

    SUM(CAST(size_in_bytes AS DECIMAL(12,2)))/1024/1024 AS ''Size (MB)''

    FROM sys.dm_exec_cached_plans

    GROUP BY objtype;

    Listing 6-6

    Query procedure cache

    ```


    The results of this query should look like Figure [6-14](#340881_3_En_6_Chapter.xhtml#Fig14),
    though the numbers will be different on your system.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig14_HTML.jpg)


    A table of 4 columns and 6 rows. It lists the object type, total plans, and size.
    The prepared under column object type is selected.


    Figure 6-14


    Results of querying procedure cache


    We will focus on the number of ad hoc execution plans. If you see this number
    growing rapidly and experience CMEMTHREAD waits, it is worth the effort to analyze
    those ad hoc queries. If possible, try to optimize the queries so they generate
    a reusable plan. If your application uses many dynamic queries, then try to use
    the sp_executesql system stored procedure instead of the EXECUTE (EXEC) command.
    Using the EXEC command will most likely result in a plan that will only be used
    once.


    Microsoft has released various fixes (most notably the partitioning of certain
    memory objects across CPUs) for this problem in SQL Server 2005 SP2, making it
    less common these days. Even if you are using newer SQL Server editions than SQL
    Server 2005, it might be a good idea to upgrade to the latest available Service
    Pack since there have been various memory-related bug fixes in every SQL Server
    edition.


    ### CMEMTHREAD Summary


    The CMEMTHREAD wait type is a memory-related wait type. CMEMTHREAD waits occur
    when multiple threads try to access memory objects which are only accessed by
    a single thread at a time. The time other threads spend waiting for their turn
    to access the memory object is recorded as CMEMTHREAD wait time. One of the more
    common cases where CMEMTHREAD waits can occur is when your system uses a high
    amount of ad hoc queries. Every time a new execution plan is generated, SQL Server
    will access a memory object; if many execution plans are generated, this will
    lead to a queue of threads wanting access to the memory object, resulting in CMEMTHREAD
    waits.


    ## IO_COMPLETION


    Just like the ASYNC_IO_COMPLETION wait type, **IO_COMPLETION** waits occur when
    SQL Server is waiting for storage-related actions to complete. And just like the
    ASYNC_IO_COMPLETION wait type, seeing high wait times of the IO_COMPLETION wait
    type doesn’t necessarily mean there is something wrong with your storage system.
    IO_COMPLETION waits occur normally, while your SQL Server instance is running
    and should only be a concern if wait times are a lot higher than normal.


    ### What Is the IO_COMPLETION Wait Type?


    While the ASYNC_IO_COMPLETION wait type is recorded when database-related actions
    are performed, like a database backup, IO_COMPLETION waits occur when non-data
    pages are involved, like the restore of a transaction log backup or when bitmap
    allocation pages, like the GAM page, are accessed. IO_COMPLETION waits can also
    occur when queries are being executed that perform read or write operations to
    storage, like a Merge Join operator.


    ### IO_COMPLETION Example


    Let’s generate some IO_COMPLETION waits by restoring a transaction log backup.
    For this example, we will make use of the GalacticWorks database again. The query
    in Listing [6-7](#340881_3_En_6_Chapter.xhtml#PC7) will perform a full backup
    of the GalacticWorks database, make some changes, and perform a transaction log
    backup. When complete, we will restore the full backup again, clear the sys.dm_os_wait_stats
    DMV, restore the transaction log backup, and check for IO_COMPLETION waits.


    ```

    -- Make sure GalacticWorks is in Full recovery model

    ALTER DATABASE GalacticWorks SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GalacticWorks.bak'';

    -- Make some changes to AW database

    USE GalacticWorks;

    UPDATE Person.Address

    SET City = ''Portland''

    WHERE City = ''Bothell''

    -- Backup Transaction Log

    BACKUP LOG [GalacticWorks]

    TO DISK = N''C:\TeamData\GalacticWorks_Log.trn''

    -- Restore the previous full backup with NORECOVERY

    USE [master];

    RESTORE DATABASE [GalacticWorks]

    FROM DISK = N''C:\TeamData\GalacticWorks.bak''

    WITH NORECOVERY, REPLACE;

    -- Clear sys.dm_os_wait_stats

    dbcc sqlperf (''sys.dm_os_wait_stats'', CLEAR);

    -- Restore last Transaction Log backup

    RESTORE LOG [GalacticWorks]

    FROM DISK = N''C:\TeamData\GalacticWorks_Log.trn'';

    -- Check IO_COMPLETION waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''IO_COMPLETION''

    Listing 6-7

    Generate IO_Completion waits

    ```


    The results of this query against the sys.dm_os_wait_stats DMV on my test system
    can be seen in Figure [6-15](#340881_3_En_6_Chapter.xhtml#Fig15).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig15_HTML.png)


    A table of 5 columns and a row. It lists the wait type of I O completion with
    the waiting tasks count as 535, wait time m s as 13, max wait time m s as 0, and
    signal wait time m s as 1.


    Figure 6-15


    IO_COMPLETION waits


    We only modified a few records using the query in Listing [6-7](#340881_3_En_6_Chapter.xhtml#PC7),
    so the total wait time is low since the restore of the transaction log backup
    occurred fast.


    IO_COMPLETION wait times also occur when starting up your databases after a restart
    of the SQL Server service. This means you should expect IO_COMPLETION waits after
    a restart or a failover; these are completely normal. Also when AUTO_CLOSE is
    enabled and the database is starting, you should experience IO_COMPLETION waits.


    ### Lowering IO_COMPLETION Waits


    Most of the time, IO_COMPLETION waits shouldn’t be a cause for concern. When they
    are a lot higher than the wait times in your baseline, you should analyze the
    storage subsystem performance like I described in the “Lowering ASYNC_IO_COMPLETION”
    section. While certain query operations can also cause IO_COMPLETION waits, these
    are frequently not the cause for higher-than-normal wait times.


    ### IO_COMPLETION Summary


    Just like the ASYNC_IO_COMPLETION wait type, IO_COMPLETION waits occur when accessing
    your storage subsystem. IO_COMPLETION waits occur when SQL Server is waiting on
    non-data page operations to complete, like a transaction log restore operation
    or the reading of bitmap pages, like the GAM page. Seeing waits of the IO_COMPLETION
    type occur is completely normal, and these frequently do not require deeper analysis
    unless the wait times are a lot higher than the values in your baseline. In those
    cases, focus on the performance (and especially latency) of your storage subsystem
    first.


    ## LOGBUFFER and WRITELOG


    I have combined both LOGBUFFER and WRITELOG in this section. This is because both
    wait types have a close relation to each other, to the transaction log, and to
    the storage subsystem.'
