  trans: '

    # 4. 构建稳固的基准线


    在第 2 章“查询 SQL Server 等待统计信息”中，我们花了大量时间描述和使用各种访问 `等待统计` 信息的方法。这些方法大多侧重于利用这些信息来检测当前的性能问题。虽然使用这些实时方法可以找到性能问题的确切原因，但这需要深入了解各种
    `等待类型`，并且——最重要的是——对你特定的 SQL Server 系统的性能有经验。


    如果你管理一个 SQL Server 实例，你会很快熟悉它在不同情况下的反应方式。但如果你管理数百个 SQL Server 实例，要熟悉它们的所有性能表现几乎是不可能的。由于
    SQL Server `等待统计` 很大程度上取决于特定 SQL Server 实例的工作负载，没有两个 SQL Server 实例会针对相同的 `等待类型`
    有相同的 `等待时间`。这使得检测潜在问题变得困难，因为我们不能简单地说“嘿，`CXPACKET` `等待类型` 有 20,000 毫秒的 `等待时间`，所以我们出问题了。”这完全取决于你的系统配置和工作负载。一个
    SQL Server 实例每分钟可能有 20,000 毫秒（20 秒）花在 `CXPACKET` `等待类型` 上，却没有任何性能问题；而另一个实例只有 1,000
    毫秒的 `等待时间`，用户却持续抱怨性能不佳。


    如果我们想对 `等待统计` 或任何 `性能相关数据` 进行深入分析，我们需要一种收集 `性能相关指标` 并赋予其意义的方法。仅仅检测到 10,000 毫秒的等待资源没有任何意义，因为我们不知道它是否导致了性能问题。是的，也许你的用户正在抱怨性能糟糕，同时你注意到了这
    10,000 毫秒的 `等待`，但无法确定这个 `等待` 是否明确导致了用户遇到的特定性能问题。有人可能会猜测，并简单地假设特定的资源 `等待` 就是性能问题的根源。作为一名前生产环境
    DBA，我可以告诉你，DBA 不喜欢猜测是什么拖慢了我们的数据库服务器。我们想要确定性能问题的来源。这就是 `基准线` 能发挥作用的地方。


    `基准线` 通过提供系统正常状态的定义，帮助赋予 `性能指标` 意义。没有 `基准线`，我们无从知晓系统或应用程序是运行在最佳状态还是极其缓慢。`基准线`
    非常重要；事实上，它们如此重要，以至于我决定在本书中用一整章来讨论它们。没有稳固的 `基准线`，你的测量结果毫无意义！尽管本书侧重于 `等待统计`，但 `基准线`
    对于你可以在系统上捕获的每一个 `性能相关指标` 都很有用，为你提供了一种宝贵的性能分析方法。


    如果你阅读了上一章关于 `查询存储` 的内容，你可能会认为 `查询存储` 可以处理你所有的 `基准线`。虽然 `查询存储` 对于捕获和监控单个数据库内的查询性能很有用，但它并不提供整个
    SQL Server 实例的性能概览。我个人认为 `查询存储` 是捕获和监控 `基准线` 常规流程的一个补充，而非替代。


    ## 什么是基准线？


    如果我们查阅牛津词典中的“`基准线`”，会看到以下定义：“用于比较的最低点或起点。”这句话使用了关键词“起点”和“比较”，完美地抓住了 `基准线` 的本质。`基准线`
    是起点，或者在我们的情况下，是用于与后续测量结果进行比较的度量值。理想情况下，我们在正常或标准情况下捕获 `基准线` 测量值。如果我们在以后的某个时间点再次执行相同的测量，就会将测量结果与
    `基准线` 进行比较。如果在比较中我们的测量结果不同，则说明可能发生了变化。


    即使你在分析性能时不使用 `基准线` 比较，无论你是否意识到，你仍然在使用 `基准线`。例如，如果你每月第一天收到工资，这是你正常的情况，或者在本章的语境下，是你的
    `基准线`。如果由于某种原因，你在每月第一天没有收到工资，你会注意到与 `基准线` 的偏差。这可能成为调查你为何没有按时收到工资的原因。也许发薪日从 1 号改到了
    5 号，或者在最坏的情况下，你工作的公司无法再支付你的工资。在任何一种情况下，我们都可以采取行动：要么接受变化，并由此创建一个新的 `基准线`；要么将情况恢复回
    `基准线` 状态。图 4-1 展示了这个过程。


    ![](img/340881_3_En_4_Fig1_HTML.png)


    *一个流程图连接了 `基准线`、`变更` 和 `新基准线`，指向接受 `新基准线` 或撤销 `变更` 以恢复至 `基准线`。*


    *图 4-1 变更影响 `基准线`*


    定义和维护 `基准线` 是一个迭代过程。发生在你系统上的每一次 `变更` 都可能影响你的 `基准线`。应用程序的新版本可能会改变许多查询，或者你的公司可能授予新部门访问数据库的权限，从而增加了连接数。在这两个例子中，我们都会对
    `基准线` 进行调整，因为正常情况已经发生了变化。


    所有这些随着系统每次 `变更` 而调整和测量 `基准线` 的工作听起来很繁重，有时确实如此。但请相信我——拥有 `基准线` 的好处远远超过成本。`基准线`
    帮助你比仅仅查看单次测量结果更快地发现问题，而在 `等待统计` 的情况下，它是找到你问题可靠、明确答案的唯一途径。让我们使用一个更技术性的例子，通过 DBA
    简来说明这一点。


    简维护着一个托管单一用户数据库的 SQL Server 实例。该数据库供公司每一位销售人员使用，记录公司与客户之间的每一笔财务交易。用户通过 `应用程序 X`
    访问数据库。`应用程序 X` 运行的是 2.4 版本，非常稳定。性能良好，用户满意，资金持续流入。一切都很顺利，直到有一天一位顾问走进来，希望将 `应用程序
    X` 升级到全新的 3.0 版本。升级到 3.0 版本轻而易举，没有出现任何问题，所有用户都喜欢新功能。


    两天后电话响了。简的经理刚刚收到销售团队的消息，说 3.0 版本的性能非常糟糕，并要求立即解决。

    '
- fmt: 'Thankfully, Jane knew the importance of a baseline and created one before
    the upgrade to version 3.0\. Using the version 2.4 baseline, Jane compares the
    measurements in the baseline to the measurements done in version 3.0 and immediately
    spots a large difference in the `lock wait time` measurements. Since other measurements
    remain roughly the same compared to the 2.4 baseline, Jane focuses on long-running
    locks and identifies an update query that is locking a table. Jane rolls back
    the query, and the situation returns to normal. Jane then contacts the application’s
    vendor and learns this behavior was a result of a bug in the software.


    Now this example might sound a little far-fetched, but it is a simplified version
    of the method I use almost every day when measuring the impact of changes or analyzing
    performance problems. Without a baseline of the `lock wait time`, Jane wouldn’t
    know that the wait time had increased, since Jane had nothing to compare against.
    Jane might have chosen to look at other metrics instead of the `lock wait time`
    and would have wasted valuable time and money.


    The message here is simple: baselines will help you detect abnormal situations
    and resolve performance problems faster!


    ## Visualizing Your Baselines


    Baselines are frequently visualized through graphs. Graphs make it easier to detect
    measurements with the highest increase or decrease compared to your baseline.
    Also, visualizing data helps get your point across to prove if a specific configuration
    is impacting performance, for example, when you need to convince the storage administrator
    the change in the storage configuration has impacted performance. If you hand
    them a graph showing normal behavior compared to the behavior after the change,
    they might be more inclined to help. The graph in Figure [4-2](#340881_3_En_4_Chapter.xhtml#Fig2)
    shows the baseline measurements compared to the measurements done later.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig2_HTML.png)


    A graph of transactions per second has 2 fluctuating curves. The curve for baseline
    starts at 1800 and drops to 1750, and today starts and ends almost at 1750\. Values
    are approximated.


    **Figure 4-2** Example of a baseline graph


    As you can see in Figure [4-2](#340881_3_En_4_Chapter.xhtml#Fig2), you are able
    to identify the potential problem quickly. Apparently, between 08:00 and 12:00,
    the number of transactions per second is higher than the normal situation, and
    it might be worth taking the time to investigate.


    ## Baseline Types and Statistics


    We use different types of baselines depending on the information we collect. There
    isn’t one single baseline to fit all our needs, especially when using baselines
    for performance-troubleshooting purposes. For example, we could create a baseline
    for every single wait type, or we could choose to create only baselines for wait
    types which impact our system the most. We could also choose to create a baseline
    for specific days or time segments, like business hours, and create another for
    after business hours.


    Next after selecting the metrics we want baselines for, we then make choices on
    how to calculate the baselines. These choices involve some math and often require
    calculating aggregates such as averages. In many cases, a baseline consists of
    an average of many data points, depending on how many measurements performed in
    each time range. If you collect measurements for a long period of time and calculate
    the average value from those measurements, you create a more reliable baseline
    than only one day’s worth of measurements. But creating a baseline based on averages
    also has disadvantages, as averages are heavily influenced by skewed data. Without
    going too deep into statistical details, skewed data means very high or very low
    values will impact your average. Consider a group of students and exam scores.
    We evaluate how the group performed by calculating the average result of the exam
    (the students are rated between 1 and 10, 1 being very poor and 10 being excellent;
    a 6 or higher is required to pass the exam). Figure [4-3](#340881_3_En_4_Chapter.xhtml#Fig3)
    shows the exam results in a graph.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig3_HTML.png)


    A bar graph of exam results has bars for students 1 to 10\. The highest value
    is 10 for students 9 and 10\. The lowest value is 3 for student 1.


    **Figure 4-3** Exam results


    As you can see in Figure [4-3](#340881_3_En_4_Chapter.xhtml#Fig3), only four students
    scored higher than the required 6 to pass the exam. The rest of the group scored
    below the requirement. However, if we look at the average performance of the group,
    they scored a 6\. We could conclude the group is performing well enough with an
    average score of 6, but then we would miss how only four of ten students passed
    the exam. This information is important to keep in mind when you work with average
    baselines. If you see a spike in the average baseline, it is always something
    you should investigate, because it impacts your baseline.


    There are statistical methods available to deal with skewed data and averages,
    one being the trimmed (or truncated) mean. This method removes x percent of the
    highest and lowest measurements in your series, creating a more stable average.
    Reviewing all possible statistical methods available is beyond the scope of this
    book. Just be mindful about how the data is collected, if averages are being used
    and if outliers are possible causing skewness.


    ## Baseline Pitfalls


    Hopefully the previous section convinced you baselines are important, but before
    you go and capture every performance metric and convert them into a baseline measurement,
    there are some pitfalls to avoid.


    ### Too Much Information


    Even though you are free to baseline every possible metric in your environment,
    this is generally considered a bad idea. Gathering too much information can blind
    you in your search for answers. Comparing 100,000 different metrics against a
    baseline every time a performance problem occurs is a colossal waste of time.
    The advice here is to keep the number of metrics small, including only performance
    metrics which matter most for your system. For instance, you could include performance
    metrics related to Availability Groups, but if your system doesn’t use this feature,
    there is no use including them.


    ### Know Your Metrics


    Another important aspect in the selection of performance metrics is understanding
    what a performance metric represents. Without this knowledge, it is difficult
    to formulate a correct conclusion. For example, if you see a metric named `Locks`,
    you should know if this metric represents the total number of `Locks` or the number
    of `Locks` per second.


    ### Find the Big Measurement Changes


    When comparing measurements against a baseline, look for any big increases or
    decreases. Especially for wait statistics, very small increases in wait time (1–2%)
    aren’t a cause for concern. If one of your wait time measurements goes up 20%,
    that would be a good signal to start investigating.


    ### Use Fixed Intervals


    When capturing wait statistics information, you should use a fixed interval. If
    we were to capture wait times at random, it would be impossible to build a reliable
    baseline. One way to automate the capture of wait statistics information is by
    using the `SQL Server Agent` and setting a job schedule to a fixed interval, perhaps
    every 15 minutes.'
  raw: 'Thankfully, Jane knew the importance of a baseline and created one before
    the upgrade to version 3.0\. Using the version 2.4 baseline, Jane compares the
    measurements in the baseline to the measurements done in version 3.0 and immediately
    spots a large difference in the lock wait time measurements. Since other measurements
    remain roughly the same compared to the 2.4 baseline, Jane focuses on long-running
    locks and identifies an update query that is locking a table. Jane rolls back
    the query, and the situation returns to normal. Jane then contacts the application’s
    vendor and learns this behavior was a result of a bug in the software.


    Now this example might sound a little far-fetched, but it is a simplified version
    of the method I use almost every day when measuring the impact of changes or analyzing
    performance problems. Without a baseline of the lock wait time, Jane wouldn’t
    know that the wait time had increased, since Jane had nothing to compare against.
    Jane might have chosen to look at other metrics instead of the lock wait time
    and would have wasted valuable time and money.


    The message here is simple: baselines will help you detect abnormal situations
    and resolve performance problems faster!


    ## Visualizing Your Baselines


    Baselines are frequently visualized through graphs. Graphs make it easier to detect
    measurements with the highest increase or decrease compared to your baseline.
    Also, visualizing data helps get your point across to prove if a specific configuration
    is impacting performance, for example, when you need to convince the storage administrator
    the change in the storage configuration has impacted performance. If you hand
    them a graph showing normal behavior compared to the behavior after the change,
    they might be more inclined to help. The graph in Figure [4-2](#340881_3_En_4_Chapter.xhtml#Fig2)
    shows the baseline measurements compared to the measurements done later.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig2_HTML.png)


    A graph of transactions per second has 2 fluctuating curves. The curve for baseline
    starts at 1800 and drops to 1750, and today starts and ends almost at 1750\. Values
    are approximated.


    Figure 4-2


    Example of a baseline graph


    As you can see in Figure [4-2](#340881_3_En_4_Chapter.xhtml#Fig2), you are able
    to identify the potential problem quickly. Apparently, between 08:00 and 12:00,
    the number of transactions per second is higher than the normal situation, and
    it might be worth taking the time to investigate.


    ## Baseline Types and Statistics


    We use different types of baselines depending on the information we collect. There
    isn’t one single baseline to fit all our needs, especially when using baselines
    for performance-troubleshooting purposes. For example, we could create a baseline
    for every single wait type, or we could choose to create only baselines for wait
    types which impact our system the most. We could also choose to create a baseline
    for specific days or time segments, like business hours, and create another for
    after business hours.


    Next after selecting the metrics we want baselines for, we then make choices on
    how to calculate the baselines. These choices involve some math and often require
    calculating aggregates such as averages. In many cases, a baseline consists of
    an average of many data points, depending on how many measurements performed in
    each time range. If you collect measurements for a long period of time and calculate
    the average value from those measurements, you create a more reliable baseline
    than only one day’s worth of measurements. But creating a baseline based on averages
    also has disadvantages, as averages are heavily influenced by skewed data. Without
    going too deep into statistical details, skewed data means very high or very low
    values will impact your average. Consider a group of students and exam scores.
    We evaluate how the group performed by calculating the average result of the exam
    (the students are rated between 1 and 10, 1 being very poor and 10 being excellent;
    a 6 or higher is required to pass the exam). Figure [4-3](#340881_3_En_4_Chapter.xhtml#Fig3)
    shows the exam results in a graph.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig3_HTML.png)


    A bar graph of exam results has bars for students 1 to 10\. The highest value
    is 10 for students 9 and 10\. The lowest value is 3 for student 1.


    Figure 4-3


    Exam results


    As you can see in Figure [4-3](#340881_3_En_4_Chapter.xhtml#Fig3), only four students
    scored higher than the required 6 to pass the exam. The rest of the group scored
    below the requirement. However, if we look at the average performance of the group,
    they scored a 6\. We could conclude the group is performing well enough with an
    average score of 6, but then we would miss how only four of ten students passed
    the exam. This information is important to keep in mind when you work with average
    baselines. If you see a spike in the average baseline, it is always something
    you should investigate, because it impacts your baseline.


    There are statistical methods available to deal with skewed data and averages,
    one being the trimmed (or truncated) mean. This method removes x percent of the
    highest and lowest measurements in your series, creating a more stable average.
    Reviewing all possible statistical methods available is beyond the scope of this
    book. Just be mindful about how the data is collected, if averages are being used
    and if outliers are possible causing skewness.


    ## Baseline Pitfalls


    Hopefully the previous section convinced you baselines are important, but before
    you go and capture every performance metric and convert them into a baseline measurement,
    there are some pitfalls to avoid.


    ### Too Much Information


    Even though you are free to baseline every possible metric in your environment,
    this is generally considered a bad idea. Gathering too much information can blind
    you in your search for answers. Comparing 100,000 different metrics against a
    baseline every time a performance problem occurs is a colossal waste of time.
    The advice here is to keep the number of metrics small, including only performance
    metrics which matter most for your system. For instance, you could include performance
    metrics related to Availability Groups, but if your system doesn’t use this feature,
    there is no use including them.


    ### Know Your Metrics


    Another important aspect in the selection of performance metrics is understanding
    what a performance metric represents. Without this knowledge, it is difficult
    to formulate a correct conclusion. For example, if you see a metric named “Locks,”
    you should know if this metric represents the total number of Locks or the number
    of Locks per second.


    ### Find the Big Measurement Changes


    When comparing measurements against a baseline, look for any big increases or
    decreases. Especially for wait statistics, very small increases in wait time (1–2%)
    aren’t a cause for concern. If one of your wait time measurements goes up 20%,
    that would be a good signal to start investigating.


    ### Use Fixed Intervals


    When capturing wait statistics information, you should use a fixed interval. If
    we were to capture wait times at random, it would be impossible to build a reliable
    baseline. One way to automate the capture of wait statistics information is by
    using the SQL Server Agent and setting a job schedule to a fixed interval, perhaps
    every 15 minutes.'
  trans: '

    所幸，Jane 知道基线的重要性，并在升级到 3.0 版本之前创建了一个。使用 2.4 版本的基线，Jane 将基线中的测量值与 3.0 版本中进行的测量值进行比较，并立即发现了
    `锁等待时间` 测量值的巨大差异。由于其他测量值与 2.4 基线相比大致保持不变，Jane 将注意力集中在长时间运行的锁上，并识别出一个正在锁表的更新查询。Jane
    回滚了该查询，情况恢复正常。随后，Jane 联系了应用程序供应商，并了解到此行为是软件中的一个错误导致的。


    现在这个例子听起来可能有点牵强，但它是我几乎每天用来衡量变更影响或分析性能问题的方法的简化版本。如果没有 `锁等待时间` 的基线，Jane 就不会知道等待时间已经增加，因为
    Jane 没有可比较的对象。Jane 可能会选择查看其他指标而不是 `锁等待时间`，从而浪费宝贵的时间和金钱。


    这里的道理很简单：基线将帮助你更快地检测异常情况并解决性能问题！


    ## 可视化你的基线


    基线经常通过图表进行可视化。图表使得更容易检测到与你的基线相比增幅或降幅最大的测量值。此外，可视化数据有助于清晰地传达你的观点，以证明特定配置是否影响了性能，例如，当你需要说服存储管理员存储配置的变更已经影响了性能时。如果你递给他们一张显示正常行为与变更后行为对比的图表，他们可能会更愿意提供帮助。图
    4-2 中的图表显示了基线测量值与之后进行的测量值的对比。


    ![](img/340881_3_En_4_Fig2_HTML.png)


    一个每秒事务数的图表，有两条波动的曲线。基线的曲线起始于 1800，下降到 1750，而“今天”的曲线起始和结束几乎都在 1750。数值为近似值。


    **图 4-2** 基线图表示例


    如图 4-2 所示，你能够快速识别潜在问题。显然，在 08:00 到 12:00 之间，每秒事务数高于正常情况，这可能值得花时间进行调查。


    ## 基线类型与统计


    我们根据收集的信息使用不同类型的基线。没有一种基线能满足我们所有的需求，尤其是在将基线用于性能故障排查目的时。例如，我们可以为每种等待类型创建一个基线，或者我们选择只为对系统影响最大的等待类型创建基线。我们也可以选择为特定日期或时间段（如工作时间）创建基线，并为非工作时间创建另一个基线。


    在选择了想要创建基线的指标之后，我们接下来要决定如何计算基线。这些选择涉及一些数学计算，通常需要计算聚合值，如平均值。在许多情况下，基线由许多数据点的平均值组成，这取决于在每个时间范围内执行了多少次测量。如果你长时间收集测量值并根据这些测量值计算平均值，你创建的基线将比仅基于一天测量值的基线更可靠。但是，基于平均值创建基线也有缺点，因为平均值受偏斜数据的影响很大。在不深入探讨统计细节的情况下，偏斜数据意味着非常高或非常低的值会影响你的平均值。以一组学生和考试成绩为例。我们通过计算考试的平均成绩来评估小组的表现（学生评分在
    1 到 10 之间，1 表示很差，10 表示优秀；考试需要达到 6 分或以上才算通过）。图 4-3 在图表中显示了考试结果。


    ![](img/340881_3_En_4_Fig3_HTML.png)


    一个考试成绩的条形图，有学生 1 到 10 的条形。最高值是 10，对应学生 9 和 10。最低值是 3，对应学生 1。


    **图 4-3** 考试成绩


    如图 4-3 所示，只有四名学生的成绩高于通过考试所需的 6 分。小组中的其余成员成绩未达到要求。然而，如果我们看小组的平均表现，他们得了 6 分。我们可能会得出结论，小组的平均成绩为
    6 分，表现足够好，但那样我们就会忽略只有十分之四的学生通过考试这一事实。在使用平均基线时，记住这一点很重要。如果你看到平均基线出现激增，这总是值得你调查的事情，因为它影响了你的基线。


    有可用的统计方法来处理偏斜数据和平均值，其中一种是截尾（或截断）均值。这种方法移除序列中最高和最低测量值的 x 百分比，从而创建一个更稳定的平均值。回顾所有可用的统计方法超出了本书的范围。只需注意数据是如何收集的，是否使用了平均值，以及是否存在可能导致偏斜的异常值。


    ## 基线陷阱


    希望上一节已经让你相信基线的重要性，但在你开始捕获每一个性能指标并将其转换为基线测量值之前，有一些陷阱需要避免。


    ### 信息过载


    尽管你可以自由地为环境中的每一个可能的指标创建基线，但这通常被认为是个坏主意。收集过多信息可能会在你寻找答案时蒙蔽你的双眼。每次发生性能问题时，将 100,000
    个不同的指标与基线进行比较是巨大的时间浪费。这里的建议是保持指标数量较少，只包括对系统最重要的性能指标。例如，你可以包括与可用性组相关的性能指标，但如果你的系统不使用此功能，包含它们就没有用处。


    ### 了解你的指标


    选择性能指标的另一个重要方面是理解性能指标代表什么。没有这些知识，很难得出正确的结论。例如，如果你看到一个名为 `Locks` 的指标，你应该知道这个指标代表的是
    `锁` 的总数还是每秒的 `锁` 数。


    ### 关注测量值的重大变化


    当将测量值与基线进行比较时，寻找任何大的增长或减少。特别是对于等待统计，等待时间的非常小的增长（1-2%）不值得担忧。如果你的某项等待时间测量值上升了 20%，那将是一个开始调查的好信号。


    ### 使用固定间隔


    在捕获等待统计信息时，你应该使用固定间隔。如果我们随机捕获等待时间，就不可能建立可靠的基线。自动捕获等待统计信息的一种方法是使用 `SQL Server Agent`
    并将作业计划设置为固定间隔，例如每 15 分钟一次。

    '
- fmt: '## 为等待统计分析构建基线


    接下来，让我们开始工作，创建一个可用于等待统计分析的基线。正如我在本章开头提到的，基线对于使用等待统计信息分析性能问题至关重要。没有人的等待类型和等待时间与您的系统完全相同，因此您需要自己创建一个可供比较的基线。


    在本节中，我将向您展示一种创建、维护和比较基线与测量值的方法。这只是一个示例；您可能会发现其他更适合您需求的方法。


    我们将捕获 SQL Server 等待统计信息测量值，并将其存储在一个名为 `Baseline` 的数据库中，这样信息就不会丢失。由于等待统计信息是在 SQL
    Server 实例级别记录的，因此在每个 SQL Server 实例中创建一个单独的测量数据库是合理的。图 4-4 展示了我在 SSMS 中的 `Baseline`
    数据库。


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig4_HTML.jpg)


    对象资源管理器的屏幕截图，其中 SQL Server 代理选项卡被突出显示。


    图 4-4

    `Baseline` 数据库


    您可以使用清单 4-1 中的脚本自行创建该数据库，注意更改文件位置。创建时数据库数据文件将为 1.5 GB，这为捕获数周的等待统计信息提供了足够的可用空间。


    ```

    -- Create Baseline database

    CREATE DATABASE [Baseline]

    ON PRIMARY     (

    NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' ,

    SIZE = 1536000KB , FILEGROWTH = 10%    )

    LOG ON    (

    NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' ,

    SIZE = 102400KB , FILEGROWTH = 10%    )

    GO;

    ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

    GO;

    ```

    清单 4-1

    创建 `Baseline` 数据库


    我们使用 `sys.dm_os_wait_stats` DMV 作为测量值的来源，这意味着保存测量值的表必须能够处理从 DMV 返回的信息。我们将存储等待类型和等待时间，并添加额外的信息来丰富数据，这样我们就可以创建多个基线。


    清单 4-2 显示了一个创建名为 `WaitStats` 的表的查询，该表将用于保存我们将用于创建基线的等待统计信息。


    ```

    USE [BaseLine]

    GO

    CREATE TABLE WaitStats

    (ws_ID INT IDENTITY(1,1) PRIMARY KEY,

    ws_DateTime DATETIME,

    ws_Day INT,

    ws_Month INT,

    ws_Year INT,

    ws_Hour INT,

    ws_Minute INT,

    ws_DayOfWeek VARCHAR(15),

    ws_WaitType NVARCHAR(60),

    ws_WaitTime BIGINT,

    ws_WaitingTasks BIGINT,

    ws_SignalWaitTime BIGINT);

    ```

    清单 4-2

    创建等待统计信息表


    正如您在脚本中看到的，我们捕获了等待类型、等待时间、信号等待时间和等待任务数。我们还捕获了记录等待统计信息时的日期和时间。日期和时间被拆分到额外的列中，以便对数据进行分段，这样更容易基于特定的某天、小时、月份等构建特定的基线，而无需每次都转换
    `datetime` 数据类型。


    现在我们的表已经准备好了，是时候捕获一些等待统计信息并将它们插入到 `WaitStats` 表中。因为 `sys.dm_os_wait_stats` DMV
    返回的是累积等待时间，所以我们必须计算两个捕获时刻之间等待时间的差异。如果我们只是直接从 `sys.dm_os_wait_stats` DMV 捕获信息，我们将总是获得不断增加的等待时间，使得比较变得困难。有两种方法可以捕获两次测量之间等待时间的变化，它们各有优缺点。


    第一种方法，我称之为重置方法，它将从 `sys.dm_os_wait_stats` DMV 捕获等待统计信息，然后使用以下命令重置 DMV：


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    ```


    该方法的主要优点是使用简单，因为我们只需要捕获信息，然后再次重置它，并在下一次测量时启动相同的过程。不需要计算增量，因为在第一次测量之后，计数器被重置为 0。缺点是这个
    `DBCC` 命令会重置 `sys.dm_os_wait_stats` DMV 内部的信息。这意味着我们丢失了 DMV 内部的累积信息，这是我们不想丢失的信息。图
    4-5 说明了这种等待统计信息捕获方法。


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig5_HTML.png)


    一个流程图包含三个连接的块：捕获信息、将信息记录到表中、重置。


    图 4-5

    使用重置方法捕获等待统计信息


    第二种选择，称为增量方法，涉及计算两次测量之间等待时间的差值或增量。这种方法的优点是我们不会丢失 `sys.dm_os_wait_stats` DMV 内部的累积等待时间。缺点是计算增量比第一种方法更复杂。它通常还涉及在
    T-SQL 脚本中使用 `WAITFOR DELAY` 命令来设置间隔。这可能意味着，如果您计划使用 SQL Server 代理捕获等待统计信息，您最终可能会得到一个几乎持续运行的
    SQL Server 代理作业。图 4-6 说明了捕获等待统计信息的增量选项。


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig6_HTML.png)


    一个流程图包含六个连接的块：捕获信息、记录到临时表、等待延迟、捕获信息、计算等待时间增量、将信息记录到表中。


    图 4-6

    使用增量方法捕获等待统计信息


    > **书呆子注释**

    > 第三种选择是获取指标而不清除或手动计算增量。您将能够在以后执行任何必要的计算。或者可能只在每次插入时存储非零指标。或者只存储自上次收集以来发生更改的指标。使用最适合您和您的系统的任何选项或方法。


    还有更多方法可用于捕获等待统计信息，但我最常见到的是这两种，或它们的变体。您想使用哪种方法取决于您，因为最终两者都会返回相同的结果。


    ### 重置捕获方法


    重置捕获方法包含一个 T-SQL 脚本，用于从 `sys.dm_os_wait_stats` DMV 捕获信息，然后重置 DMV 内部的计数器。清单 4-3
    显示了用于填充我们之前创建的 `WaitStats` 表的 T-SQL 脚本。


    ```

    USE [Baseline]

    GO

    -- Insert Wait Stats into Baseline table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    wait_type AS ''WaitType'',

    wait_time_ms AS ''WaitTime'',

    waiting_tasks_count AS ''WaitingTasks'',

    signal_wait_time_ms AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats;

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

    GO

    ```

    清单 4-3

    重置捕获方法'
  raw: '## Building a Baseline for Wait Statistics Analysis


    Next, let’s get to work and create a baseline we can use for wait statistics analysis.
    As I mentioned at the beginning of this chapter, baselines are incredibly important
    for analyzing performance problems using wait statistics. Nobody has the same
    wait types and wait times compared to your system, so it’s up to you to create
    a baseline you can compare against.


    In this section, I will show you a method to create, maintain, and compare baselines
    and measurements. This is but one example; you could find other methods better
    suited to your needs.


    We will capture SQL Server wait statistics measurements and store them inside
    a database named “Baseline,” so information is not lost. Since wait statistics
    are logged at the SQL Server instance level, it makes sense to create a separate
    measurement database inside every SQL Server instance. Figure [4-4](#340881_3_En_4_Chapter.xhtml#Fig4)
    shows you my Baseline database inside SSMS.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig4_HTML.jpg)


    A screenshot of object explorer has the S Q L server agent tab highlighted.


    Figure 4-4


    Baseline database


    You can create the database yourself using the script in Listing [4-1](#340881_3_En_4_Chapter.xhtml#PC1),
    making sure to change the file locations. The database data file will be 1.5 GB
    when it gets created, which gives enough free space to capture weeks of wait statistics
    information.


    ```

    -- Create Baseline database

    CREATE DATABASE [Baseline]

    ON PRIMARY     (

    NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' ,

    SIZE = 1536000KB , FILEGROWTH = 10%    )

    LOG ON    (

    NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' ,

    SIZE = 102400KB , FILEGROWTH = 10%    )

    GO;

    ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

    GO;

    Listing 4-1

    Creating the Baseline database

    ```


    We use the sys.dm_os_wait_stats DMV as the source of our measurements, which means
    the table holding our measurements must be able to handle the information returned
    from the DMV. We will store the wait types and wait times and also add additional
    information to enrich the data, so we can create multiple baselines.


    Listing [4-2](#340881_3_En_4_Chapter.xhtml#PC2) shows a query to create a table,
    named WaitStats, to hold the wait statistics information we will use for creating
    our baselines.


    ```

    USE [BaseLine]

    GO

    CREATE TABLE WaitStats

    (ws_ID INT IDENTITY(1,1) PRIMARY KEY,

    ws_DateTime DATETIME,

    ws_Day INT,

    ws_Month INT,

    ws_Year INT,

    ws_Hour INT,

    ws_Minute INT,

    ws_DayOfWeek VARCHAR(15),

    ws_WaitType NVARCHAR(60),

    ws_WaitTime BIGINT,

    ws_WaitingTasks BIGINT,

    ws_SignalWaitTime BIGINT);

    Listing 4-2

    Create a wait statistics table

    ```


    As you see in the script, we capture the wait type, wait time, signal wait time,
    and the number of waiting tasks. We also capture the date and time when the wait
    statistics information is logged. The date and time is split into additional columns
    to segment the data, making it easier to build specific baselines based on a specific
    day, hour, month, and so forth, without having to convert the datetime data type
    every time.


    Now that we have our table ready, it is time to capture some wait statistics and
    insert them into the WaitStats table. Because the sys.dm_os_wait_stats DMV returns
    cumulative wait times, we must calculate the difference in wait time between the
    two capture moments. If we were to only capture the information directly from
    the sys.dm_os_wait_stats DMV, we would always receive ever-increasing wait times,
    making comparisons difficult. There are two ways to capture the change in wait
    time between two measurements, and both have their advantages and disadvantages.


    The first method, which I call the reset method, will capture the wait statistics
    information from the sys.dm_os_wait_stats DMV and then reset the DMV using the


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    ```


    command. The main advantage is this method is simple to use, as we only need to
    capture the information, reset it again, and start the same procedure at the next
    measurement. There is no need to calculate deltas, because after the first measurement,
    the counters are reset to 0\. The disadvantage is that the DBCC command resets
    the information inside the sys.dm_os_wait_stats DMV. This means we lose the cumulative
    information inside the DMV, information we do not want to lose. Figure [4-5](#340881_3_En_4_Chapter.xhtml#Fig5)
    illustrates this method of wait statistics capturing.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig5_HTML.png)


    A flow diagram has three connected blocks, capture information, log information
    to the table, and reset.


    Figure 4-5


    Capturing wait statistics using the reset method


    The second option, named the delta method, involves calculating the difference,
    or delta, in wait time between two measurements. The advantage of this method
    is we will not lose the cumulative wait times inside the sys.dm_os_wait_stats
    DMV. The disadvantage is calculating the deltas is more complex compared to the
    first method. It usually also involves a WAITFOR DELAY command inside the T-SQL
    script to set the interval. This might mean if you plan to capture wait statistics
    information using the SQL Server Agent, you could end up with a SQL Server Agent
    job that is running almost continuously. Figure [4-6](#340881_3_En_4_Chapter.xhtml#Fig6)
    illustrates the delta option of capture wait statistics.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig6_HTML.png)


    A flow diagram has six connected blocks, capture information, log into a temp
    table, wait for the delay, capture information, calculate wait time deltas, and
    log information to the table.


    Figure 4-6


    Capturing wait statistics using the delta method


    Nerd Note


    A third option would be to grab the metrics without clearing or manually calculating
    a delta. You would be able to perform any necessary calculations later. Or perhaps
    only store nonzero metrics on each insert. Or only store metrics if they have
    changed since the last collection. Use whatever option or method which works best
    for you and your systems.


    There are more methods available with which to capture wait statistics information,
    but I most frequently see these two, or variations of them. What method you want
    to use is up to you, as in the end both will return the same results.


    ### Reset Capture Method


    The reset capture method consists of a single T-SQL script to capture the information
    from the sys.dm_os_wait_stats DMV followed by a reset of the counters inside the
    DMV. Listing [4-3](#340881_3_En_4_Chapter.xhtml#PC4) shows the T-SQL script to
    fill the WaitStats table we created earlier.


    ```

    USE [Baseline]

    GO

    -- Insert Wait Stats into Baseline table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    wait_type AS ''WaitType'',

    wait_time_ms AS ''WaitTime'',

    waiting_tasks_count AS ''WaitingTasks'',

    signal_wait_time_ms AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats;

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

    GO

    Listing 4-3

    Reset capture method

    ```'
  trans: '

    ## 为等待统计分析构建基线


    接下来，让我们开始工作，创建一个可用于等待统计分析的基线。正如我在本章开头提到的，基线对于使用等待统计信息分析性能问题至关重要。没有人的等待类型和等待时间与您的系统完全相同，因此您需要自己创建一个可供比较的基线。


    在本节中，我将向您展示一种创建、维护和比较基线与测量值的方法。这只是一个示例；您可能会发现其他更适合您需求的方法。


    我们将捕获 SQL Server 等待统计信息测量值，并将其存储在一个名为 `Baseline` 的数据库中，这样信息就不会丢失。由于等待统计信息是在 SQL
    Server 实例级别记录的，因此在每个 SQL Server 实例中创建一个单独的测量数据库是合理的。图 4-4 展示了我在 SSMS 中的 `Baseline`
    数据库。


    ![](img/340881_3_En_4_Fig4_HTML.jpg)


    对象资源管理器的屏幕截图，其中 SQL Server 代理选项卡被突出显示。


    图 4-4

    `Baseline` 数据库


    您可以使用清单 4-1 中的脚本自行创建该数据库，注意更改文件位置。创建时数据库数据文件将为 1.5 GB，这为捕获数周的等待统计信息提供了足够的可用空间。


    ```

    -- Create Baseline database

    CREATE DATABASE [Baseline]

    ON PRIMARY     (

    NAME = N''Baseline'', FILENAME = N''E:\Data\baseline_data.mdf'' ,

    SIZE = 1536000KB , FILEGROWTH = 10%    )

    LOG ON    (

    NAME = N''Baseline_log'', FILENAME = N''E:\Log\baseline_log.ldf'' ,

    SIZE = 102400KB , FILEGROWTH = 10%    )

    GO;

    ALTER DATABASE [Baseline] SET RECOVERY SIMPLE

    GO;

    ```

    清单 4-1

    创建 `Baseline` 数据库


    我们使用 `sys.dm_os_wait_stats` DMV 作为测量值的来源，这意味着保存测量值的表必须能够处理从 DMV 返回的信息。我们将存储等待类型和等待时间，并添加额外的信息来丰富数据，这样我们就可以创建多个基线。


    清单 4-2 显示了一个创建名为 `WaitStats` 的表的查询，该表将用于保存我们将用于创建基线的等待统计信息。


    ```

    USE [BaseLine]

    GO

    CREATE TABLE WaitStats

    (ws_ID INT IDENTITY(1,1) PRIMARY KEY,

    ws_DateTime DATETIME,

    ws_Day INT,

    ws_Month INT,

    ws_Year INT,

    ws_Hour INT,

    ws_Minute INT,

    ws_DayOfWeek VARCHAR(15),

    ws_WaitType NVARCHAR(60),

    ws_WaitTime BIGINT,

    ws_WaitingTasks BIGINT,

    ws_SignalWaitTime BIGINT);

    ```

    清单 4-2

    创建等待统计信息表


    正如您在脚本中看到的，我们捕获了等待类型、等待时间、信号等待时间和等待任务数。我们还捕获了记录等待统计信息时的日期和时间。日期和时间被拆分到额外的列中，以便对数据进行分段，这样更容易基于特定的某天、小时、月份等构建特定的基线，而无需每次都转换
    `datetime` 数据类型。


    现在我们的表已经准备好了，是时候捕获一些等待统计信息并将它们插入到 `WaitStats` 表中。因为 `sys.dm_os_wait_stats` DMV
    返回的是累积等待时间，所以我们必须计算两个捕获时刻之间等待时间的差异。如果我们只是直接从 `sys.dm_os_wait_stats` DMV 捕获信息，我们将总是获得不断增加的等待时间，使得比较变得困难。有两种方法可以捕获两次测量之间等待时间的变化，它们各有优缺点。


    第一种方法，我称之为重置方法，它将从 `sys.dm_os_wait_stats` DMV 捕获等待统计信息，然后使用以下命令重置 DMV：


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    ```


    该方法的主要优点是使用简单，因为我们只需要捕获信息，然后再次重置它，并在下一次测量时启动相同的过程。不需要计算增量，因为在第一次测量之后，计数器被重置为 0。缺点是这个
    `DBCC` 命令会重置 `sys.dm_os_wait_stats` DMV 内部的信息。这意味着我们丢失了 DMV 内部的累积信息，这是我们不想丢失的信息。图
    4-5 说明了这种等待统计信息捕获方法。


    ![](img/340881_3_En_4_Fig5_HTML.png)


    一个流程图包含三个连接的块：捕获信息、将信息记录到表中、重置。


    图 4-5

    使用重置方法捕获等待统计信息


    第二种选择，称为增量方法，涉及计算两次测量之间等待时间的差值或增量。这种方法的优点是我们不会丢失 `sys.dm_os_wait_stats` DMV 内部的累积等待时间。缺点是计算增量比第一种方法更复杂。它通常还涉及在
    T-SQL 脚本中使用 `WAITFOR DELAY` 命令来设置间隔。这可能意味着，如果您计划使用 SQL Server 代理捕获等待统计信息，您最终可能会得到一个几乎持续运行的
    SQL Server 代理作业。图 4-6 说明了捕获等待统计信息的增量选项。


    ![](img/340881_3_En_4_Fig6_HTML.png)


    一个流程图包含六个连接的块：捕获信息、记录到临时表、等待延迟、捕获信息、计算等待时间增量、将信息记录到表中。


    图 4-6

    使用增量方法捕获等待统计信息


    > **书呆子注释**

    > 第三种选择是获取指标而不清除或手动计算增量。您将能够在以后执行任何必要的计算。或者可能只在每次插入时存储非零指标。或者只存储自上次收集以来发生更改的指标。使用最适合您和您的系统的任何选项或方法。


    还有更多方法可用于捕获等待统计信息，但我最常见到的是这两种，或它们的变体。您想使用哪种方法取决于您，因为最终两者都会返回相同的结果。


    ### 重置捕获方法


    重置捕获方法包含一个 T-SQL 脚本，用于从 `sys.dm_os_wait_stats` DMV 捕获信息，然后重置 DMV 内部的计数器。清单 4-3
    显示了用于填充我们之前创建的 `WaitStats` 表的 T-SQL 脚本。


    ```

    USE [Baseline]

    GO

    -- Insert Wait Stats into Baseline table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    wait_type AS ''WaitType'',

    wait_time_ms AS ''WaitTime'',

    waiting_tasks_count AS ''WaitingTasks'',

    signal_wait_time_ms AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats;

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF (''sys.dm_os_wait_stats'',CLEAR)

    GO

    ```

    清单 4-3

    重置捕获方法

    '
- fmt: '### Delta Capture Method


    The delta capture method also consists of a single `T-SQL` script, but it is more
    complex than the reset capture method. It uses a temporary table to store the
    first measurement, waits for 15 minutes, performs a second measurement, and calculates
    the deltas. The result is inserted into the `WaitStats` table. Listing [4-4](#340881_3_En_4_Chapter.xhtml#PC5)
    shows the `T-SQL` script you can use if you plan to use this method of collecting
    wait statistics metrics.


    ```

    USE [Baseline]

    GO

    -- Check if the temp table already exists -- if it does drop it.

    IF EXISTS

    (

    SELECT *

    FROM tempdb.dbo.sysobjects

    WHERE ID = OBJECT_ID(N''tempdb..#ws_Capture'')

    )

    DROP TABLE #ws_Capture;

    -- Create temp table to hold our first measurement

    CREATE TABLE #ws_Capture

    (  wst_WaitType NVARCHAR(60),

    wst_WaitTime BIGINT,

    wst_WaitingTasks BIGINT,

    wst_SignalWaitTime BIGINT   );

    -- Insert our first measurement into the temp table

    INSERT INTO #ws_Capture

    SELECT wait_type,

    wait_time_ms,

    waiting_tasks_count,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    -- Wait for the next measurement

    -- In this case we will wait 15 minutes

    WAITFOR DELAY ''00:15:00''

    -- Combine the first measurement with a new measurement and calculate the deltas

    -- Write the results into the WaitStats table

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    dm.wait_type AS ''WaitType'',

    dm.wait_time_ms - ws.wst_WaitTime AS ''WaitTime'',

    dm.waiting_tasks_count - ws.wst_WaitingTasks AS ''WaitingTasks'',

    dm.signal_wait_time_ms - ws.wst_SignalWaitTime AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats dm

    INNER JOIN #ws_Capture ws

    ON dm.wait_type = ws.wst_WaitType;

    -- Clean up the temp table

    DROP TABLE #ws_Capture;

    Listing 4-4

    Delta capture method

    ```


    ## Using SQL Server Agent to Schedule Measurements


    After selecting a capture method, we run a `T-SQL` script to fill our `WaitStats`
    table with wait statistics information. As described in the baseline pitfalls
    section earlier, it is very important to perform measurements at a fixed interval.
    This makes comparing measurements easier since you are comparing the same time
    segments. An easy way to do this is by using a `SQL Server Agent` job set to a
    fixed interval. The interval can be set to your choosing – the larger you set
    the interval, the smaller the number of time segments you can compare against.
    Setting the interval to be shorter will give you more time segments but will also
    mean an increase in data stored. I personally prefer to set my interval to 15
    minutes. This gives enough time segments to compare for most scenarios.


    I won’t go into details here about how to create a `SQL Server Agent` job to capture
    wait statistics information, but I do want to point out how my job looks as an
    example you can use. I usually end up with a `SQL Server Agent` job with just
    one `T-SQL` script step. In this step, I copy the capture script, depending on
    which method I want to use. Figure [4-7](#340881_3_En_4_Chapter.xhtml#Fig7) shows
    a screenshot of my `SQL Server Agent` job.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig7_HTML.png)


    A screenshot of the new job step page has the step name, type, database, and command
    on the right side.


    Figure 4-7


    Capturing `WaitStats` `SQL Server Agent` job step


    In this case, I used the reset capture method to capture the wait statistics in
    the `WaitStats` table.


    Figure [4-8](#340881_3_En_4_Chapter.xhtml#Fig8) shows the schedule used to capture
    wait statistics on a fixed interval.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig8_HTML.png)


    A screenshot of job schedule properties page with the name wait stats schedule,
    schedule type, frequency, duration, and summary.


    Figure 4-8


    `SQL Server Agent` job schedule


    As you can see, I have set it to every 15 minutes, every day.


    Again, you are free to choose your own capture interval, but make sure to always
    capture at the same interval length.


    After we have created a `SQL Server Agent` job to gather wait statistics information,
    we need to let it run for a while. The longer the job runs, the more information
    we gather, improving the quality of our baselines.'
