    In this chapter, we will look at some of the common wait types in HA/DR configurations.
    The main focus of the wait types inside this chapter are AlwaysOn Availability
    Groups, because Microsoft is deprecating many of the previous installments of
    features (such as database mirroring) which now fall under the name AlwaysOn Availability
    Groups. As an exception to this rule, I selected one mirroring-related wait type
    which is relatively common on highly used mirroring configurations. All the other
    wait types are related to AlwaysOn Availability Groups.


    For the examples inside this chapter, I used several virtual machines to create
    a mirroring and an AlwaysOn Availability Group configuration. The configuration
    of these VMs can be found in Appendix I, “Example SQL Server Machine Configurations.”


    ## DBMIRROR_SEND


    The first wait type in this chapter is the **DBMIRROR_SEND** wait type. As you
    might suspect from the name, DBMIRROR_SEND is related to database mirroring.


    Database mirroring is a feature introduced in SQL Server 2005 but was deprecated
    with SQL Server 2012\. This doesn’t mean you cannot use database mirroring in
    SQL Server, but it does mean it is scheduled for removal. The entire feature will
    be replaced with AlwaysOn Availability Group, which offers the same configuration
    options as database mirroring.


    Database mirroring is a solution which increases the availability of SQL Server
    databases, and unlike failover clustering, it can be configured on a per-database
    basis. Database mirroring works by redoing every data modification operation which
    occurs on the primary database (called the *principal* in database mirroring terms)
    on the mirror database. The redoing of every database modification operation is
    achieved by streaming active transaction log records to the mirror server, which
    perform the operations on the mirror database in the sequence in which they were
    inserted into the transaction log on the principal database.


    Database mirroring offers two different operating modes which impact the availability
    and performance of the mirror configuration: synchronous (or high-safety) mode
    and asynchronous (or high-performance) mode. Even though both modes perform identical
    actions to ensure data modification operations are also performed on the mirror
    database, there can be a large difference in performance and thus in waits occurring.


    The synchronous mirror mode makes sure every data modification action performed
    on the principal is also directly performed on the mirror. It does this by waiting
    on sending a transaction confirmation message to the client until the transaction
    is successfully written to disk on the mirror. Figure [10-1](#340881_3_En_10_Chapter.xhtml#Fig1)
    depicts synchronous mirroring.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig1_HTML.jpg)


    A flow diagram of synchronous mirroring. Step 1, a transaction is done on the
    principal. Step 2, the transaction is committed in the mirror. Step 3, acknowledgment
    from the mirror sent to the principal. Step 4, the transaction confirmation is
    sent to the client.


    Figure 10-1


    Synchronous mirroring


    Even though synchronous mirroring makes sure data on the principal and mirror
    are 100% identical, it comes with a few drawbacks. One of those is the performance
    of your database inside a synchronous mirroring configuration is highly dependent
    on the speed the mirror can process data modification operations, since every
    transaction has to be committed on the mirror first.


    The flow of a data modification transaction is described in the steps that follow:


    1.  When the transaction is received, the principal will write the transaction
    to the transaction log, but the transaction is not yet committed.


    2.  The principal will send the log record to the mirror.


    3.  The mirror will harden the log record to disk and send an acknowledgment to
    the principal.


    4.  After the principal receives the acknowledgment, it will send a confirmation
    message to the client showing the transaction was completed, and the transaction
    gets committed to the transaction log on the principal.


    The asynchronous mode works in much the same way; the exception is it will not
    wait on an acknowledgment message from the mirror before sending the transaction
    confirmation message to the client. This means transactions are committed to disk
    on the principal before they are written to disk on the mirror. Using asynchronous
    mirroring will improve mirror performance, since the latency overhead of synchronous
    mirroring is removed. The trade-off for this increase in performance is that asynchronous
    replication can lead to data loss in the case of a disaster, since it is possible
    that transactions were not yet committed on the mirror. Figure [10-2](#340881_3_En_10_Chapter.xhtml#Fig2)
    shows the transaction log flow on an asynchronous mirror; the dotted lines indicate
    the actions are not performed directly.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig2_HTML.jpg)


    A flow diagram of asynchronous mirroring. Step 1, a transaction is done on the
    principal. Step 2, the transaction confirmation is sent from the principal to
    the client. Step 3, the transaction is committed in the mirror. Step 4, acknowledgment
    from the mirror sent to the principal.


    Figure 10-2


    Asynchronous mirroring


    ### What Is the DBMIRROR_SEND Wait Type?


    The DBMIRROR_SEND wait type is most frequently related to synchronous mirroring
    configurations. The description of the DBMIRROR_SEND wait type on Books Online
    is “Occurs when a task is waiting for a communications backlog at the network
    layer to clear to be able to send messages. Indicates that the communications
    layer is starting to become overloaded and affect the database mirroring data
    throughput.” In this case, the Books Online definition is quite descriptive, but
    the network is not the only thing to impact DBMIRROR_SEND wait times. Having a
    slow disk subsystem connected to the mirror database will also lead to an increase
    in DBMIRROR_SEND wait times.


    Another important point to remember is high DBMIRROR_SEND wait times will frequently
    only be recorded on the mirror instance, and not on the principal. It is common
    to see waits occur on the DBMIRROR_SEND wait type on both the principal and the
    mirror, but these will normally be lower on the principal. They can still reach
    high values on the mirror since, generally, there is always some latency between
    both SQL Server instances. Because of expected latency, I advise you to use baseline
    measurements to identify higher-than-normal wait times for the DBMIRROR_SEND wait
    type.'
  trans: '# 10. 高可用性与灾难恢复等待类型


    SQL Server 为高可用性和灾难恢复提供了多种选项。就像执行定期数据库备份以确保在发生崩溃或数据损坏时可以回退到数据库的先前状态一样，规划和维护高可用的数据库环境也是数据库管理员（或站点可靠性工程师）工作的一部分。


    随着对高可用数据库服务器需求的增长，许多 DBA 发现他们需要在高可用性解决方案（如 AlwaysOn 可用性组）或灾难恢复配置（如日志传送）中管理 SQL
    Server 实例。伴随这些类型的 SQL Server 高可用性和灾难恢复配置而来的，是一组专门的等待类型，它们直接关系到您的高可用性和灾难恢复（HA/DR）配置的健康状况。


    在本章中，我们将探讨 HA/DR 配置中一些常见的等待类型。本章涉及的等待类型主要集中在 AlwaysOn 可用性组上，因为 Microsoft 正在弃用许多先前版本的功能（例如数据库镜像），这些功能现在统一归于
    AlwaysOn 可用性组的名下。作为此规则的一个例外，我选择了一个与镜像相关的等待类型，它在高度使用的镜像配置中相对常见。所有其他等待类型都与 AlwaysOn
    可用性组相关。


    对于本章中的示例，我使用了几台虚拟机来创建镜像和 AlwaysOn 可用性组配置。这些虚拟机的配置可以在附录 I “示例 SQL Server 机器配置”中找到。


    ## DBMIRROR_SEND


    本章的第一个等待类型是 `DBMIRROR_SEND` 等待类型。正如您可能从名称中推测的那样，`DBMIRROR_SEND` 与数据库镜像有关。


    数据库镜像是在 SQL Server 2005 中引入的功能，但在 SQL Server 2012 中被弃用。这并不意味着您不能在 SQL Server 中使用数据库镜像，但它确实意味着该功能计划在未来被移除。整个功能将被
    AlwaysOn 可用性组取代，后者提供了与数据库镜像相同的配置选项。


    数据库镜像是一种提高 SQL Server 数据库可用性的解决方案，与故障转移群集不同，它可以基于每个数据库进行配置。数据库镜像的工作原理是在镜像数据库上重做发生在主体数据库（在数据库镜像术语中称为
    *主体*）上的每一个数据修改操作。重做每一个数据库修改操作是通过将活动的事务日志记录流式传输到镜像服务器来实现的，镜像服务器按照这些记录插入到主体数据库事务日志中的顺序，在镜像数据库上执行这些操作。


    数据库镜像提供两种不同的操作模式，它们会影响镜像配置的可用性和性能：同步（或高安全）模式和异步（或高性能）模式。尽管两种模式执行相同的动作以确保数据修改操作也在镜像数据库上执行，但它们在性能以及由此产生的等待方面可能存在巨大差异。


    同步镜像模式确保在主体上执行的每个数据修改操作也直接在镜像上执行。它通过等待向客户端发送事务确认消息，直到事务成功写入镜像磁盘来实现这一点。图 10-1 描绘了同步镜像。


    ![](img/340881_3_En_10_Fig1_HTML.jpg)


    同步镜像流程图。步骤 1，在主体上执行一个事务。步骤 2，事务在镜像上提交。步骤 3，镜像向主体发送确认。步骤 4，向客户端发送事务确认。


    图 10-1


    同步镜像


    尽管同步镜像确保主体和镜像上的数据 100% 相同，但它有一些缺点。其中之一是，在同步镜像配置中，数据库的性能高度依赖于镜像处理数据修改操作的速度，因为每个事务必须先在镜像上提交。


    数据修改事务的流程描述如下：


    1.  当收到事务时，主体会将事务写入事务日志，但事务尚未提交。

    2.  主体将日志记录发送到镜像。

    3.  镜像将日志记录固化到磁盘，并向主体发送确认。

    4.  主体收到确认后，会向客户端发送一条确认消息，显示事务已完成，然后事务才在主体的事务日志中提交。


    异步模式的工作方式非常相似；不同之处在于，它在向客户端发送事务确认消息之前，不会等待来自镜像的确认消息。这意味着事务在写入镜像磁盘之前，已经在主体上提交到磁盘。使用异步镜像可以提高镜像性能，因为消除了同步镜像的延迟开销。这种性能提升的代价是，在发生灾难时，异步复制可能导致数据丢失，因为事务可能尚未在镜像上提交。图
    10-2 显示了异步镜像上的事务日志流程；虚线表示这些动作不是直接执行的。


    ![](img/340881_3_En_10_Fig2_HTML.jpg)


    异步镜像流程图。步骤 1，在主体上执行一个事务。步骤 2，主体向客户端发送事务确认。步骤 3，事务在镜像上提交。步骤 4，镜像向主体发送确认。


    图 10-2


    异步镜像


    ### 什么是 DBMIRROR_SEND 等待类型？


    `DBMIRROR_SEND` 等待类型最常出现在同步镜像配置中。在线丛书（Books Online）中对 `DBMIRROR_SEND` 等待类型的描述是：“当任务正在等待网络层的通信积压清除以便能够发送消息时发生。表明通信层开始变得过载并影响数据库镜像数据吞吐量。”
    在这个案例中，在线丛书的定义相当具有描述性，但网络并不是唯一影响 `DBMIRROR_SEND` 等待时间的因素。连接到镜像数据库的磁盘子系统速度缓慢也会导致
    `DBMIRROR_SEND` 等待时间增加。


    另一个需要记住的重要点是，高的 `DBMIRROR_SEND` 等待时间通常只记录在镜像实例上，而不会在主体上记录。通常在主体和镜像上都能看到 `DBMIRROR_SEND`
    等待类型的发生，但这些等待时间在主体上通常较低。由于两个 SQL Server 实例之间通常存在一定的延迟，因此它们在镜像上仍然可能达到较高的值。考虑到这种预期的延迟，我建议您使用基线测量来识别
    `DBMIRROR_SEND` 等待类型的异常高等待时间。'
- fmt: '### DBMIRROR_SEND 示例


    在本例中，我在两个测试 SQL Server 实例之间构建了一个同步镜像，使用 GalacticWorks 数据库作为两个实例之间镜像的数据库。


    在 GalacticWorks 数据库内部，我使用清单 [10-1] 中的脚本创建了一个简单的表。


    ```

    USE [GalacticWorks];

    CREATE TABLE Mirror_Test

    (ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50));

    Listing 10-1

    创建 Mirror_Test 表

    ```


    表创建完成后，我清除了 `sys.dm_os_wait_stats` DMV，并使用清单 [10-2] 中的查询向 `Mirror_Test` 表插入了 10,000
    行数据。在运行清单 [10-2] 中的脚本之前，我还确保在镜像服务器上也清除了 `sys.dm_os_wait_stats` DMV。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', ''CLEAR'');

    INSERT INTO Mirror_Test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(VARCHAR(50), NEWID()))

    GO 10000

    Listing 10-2

    向 Mirror_Test 表插入 10,000 行数据

    ```


    在脚本运行时，我使用以下查询查看镜像服务器和主体服务器上的 `DBMIRROR_SEND` 等待时间：


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DBMIRROR_SEND''

    ```


    此查询的结果见图 [10-3]，它显示了镜像服务器上的 `DBMIRROR_SEND` 等待时间。图 [10-4] 显示了主体服务器上的 `DBMIRROR_SEND`
    等待时间。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig4_HTML.png)


    图 10-4 主体服务器上的 DBMIRROR_SEND 等待时间


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig3_HTML.png)


    图 10-3 镜像服务器上的 DBMIRROR_SEND 等待时间


    如您所见，在镜像服务器上，我们在 `DBMIRROR_SEND` 等待类型上花费了相当多的时间，而在主体服务器上则没有 `DBMIRROR_SEND` 等待。


    ### 降低 DBMIRROR_SEND 等待时间


    关于降低 `DBMIRROR_SEND` 等待时间的一个常见建议是将镜像模式从同步（高安全性）更改为异步（高性能）。虽然这会降低 `DBMIRROR_SEND`
    等待时间，但也意味着当主体服务器发生灾难时可能会丢失数据。降低 `DBMIRROR_SEND` 等待类型的等待时间将对查询的持续时间产生积极影响。例如，在上一节的例子中，在我的测试
    SQL Server 镜像配置上插入 10,000 行数据大约花费了 30 秒。当我将镜像模式从同步更改为异步时，不仅 `DBMIRROR_SEND` 等待类型的等待时间下降了，而且
    10,000 次插入的总执行时间也下降到 3 秒。这几乎改善了 30 秒！


    虽然这种改进听起来很有吸引力，但更改镜像模式并不总是可行的选择。例如，您公司的灾难恢复策略可能要求同步镜像配置。在我看来，将镜像模式从同步更改为异步应该是最后的选择（如果是一个可行的选项的话）。还有其他资源会影响
    `DBMIRROR_SEND` 等待时间，例如镜像服务器上的存储配置或主体和镜像 SQL Server 实例之间的网络连接。这两种资源都充当实例之间的瓶颈，导致了
    `DBMIRROR_SEND` 等待时间。


    SQL Server 还提供了一个数据库镜像监视器，用于提供有关镜像配置的状态信息。您可以通过右键单击属于镜像一部分的数据库，选择“任务”➤“数据库镜像监视器”来找到数据库镜像监视器。图
    [10-5] 显示了针对我的测试镜像配置的监视器。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig5_HTML.png)


    图 10-5 数据库镜像监视器


    如您所见，数据库镜像监视器提供了一些非常有趣的附加信息，例如仍需要发送或恢复的日志记录量、镜像当前落后的程度以及发送和恢复速率。在我处理数据库镜像的许多情况中，当涉及镜像配置的性能问题时，数据库镜像监视器是我首先会检查的地方。


    ### DBMIRROR_SEND 总结


    `DBMIRROR_SEND` 等待类型与数据库镜像直接相关。在大多数镜像配置上看到 `DBMIRROR_SEND` 等待发生是非常正常的。这使得使用基线来识别等待时间峰值成为必需。镜像模式在
    `DBMIRROR_SEND` 等待时间中起着巨大作用。使用同步镜像时，`DBMIRROR_SEND` 等待时间通常会比使用异步镜像时更高。然而，不仅镜像模式会影响
    `DBMIRROR_SEND` 等待时间。镜像 SQL Server 实例上的存储子系统如果无法跟上负载，也会对 `DBMIRROR_SEND` 等待产生影响，主体和镜像之间的网络连接也是如此。


    ### HADR_LOGCAPTURE_WAIT 和 HADR_WORK_QUEUE


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都与 AlwaysOn 可用性组相关。所有与 AlwaysOn
    相关的等待类型都可以通过等待类型名称中的 `HADR_` 前缀轻松识别。AlwaysOn 可用性组在 SQL Server 2012 中引入，作为各种 SQL
    Server 高可用性和灾难恢复功能（如复制、日志传送和数据库镜像）的替代品。与 AlwaysOn 相关的等待类型有很多，在 SQL Server 2022
    中总共达到 70 个。并非所有这些都表明您的 AlwaysOn 配置中存在性能问题。`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE`
    都是良性的等待类型的完美例子，它们会随时间自然发生，并不直接表明存在性能问题。由于这两种等待类型在每个 AlwaysOn 配置上都有很高的等待时间，因此非常常见，我希望在本章中包含它们，以帮助您更好地理解它们的功能。'
  raw: '### DBMIRROR_SEND Example


    For this example, I have built a synchronous mirror between two of my test SQL
    Server instances, using the GalacticWorks database as the database mirrored between
    both instances.


    Inside the GalacticWorks database, I create a simple table using the script in
    Listing [10-1](#340881_3_En_10_Chapter.xhtml#PC1).


    ```

    USE [GalacticWorks];

    CREATE TABLE Mirror_Test

    (ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50));

    Listing 10-1

    Create the Mirror_Test table

    ```


    After the table is created, I clear the sys.dm_os_wait_stats DMV and insert 10,000
    rows into the Mirror_Test table using the query in Listing [10-2](#340881_3_En_10_Chapter.xhtml#PC2).
    I also make sure to clear the sys.dm_os_wait_stats DMV on the mirror as well before
    running the script in Listing [10-2](#340881_3_En_10_Chapter.xhtml#PC2).


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', ''CLEAR'');

    INSERT INTO Mirror_Test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(VARCHAR(50), NEWID()))

    GO 10000

    Listing 10-2

    Insert 10,000 rows into Mirror_Test table

    ```


    While the script is running, I look at the DBMIRROR_SEND wait times on both the
    mirror and the principal using the following query:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DBMIRROR_SEND''

    ```


    The results of this query can be seen in Figure [10-3](#340881_3_En_10_Chapter.xhtml#Fig3),
    which shows the DBMIRROR_SEND wait times on the mirror. Figure [10-4](#340881_3_En_10_Chapter.xhtml#Fig4)
    shows the DBMIRROR_SEND wait times on the principal server.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig4_HTML.png)


    A screenshot of a S Q L server result window has 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with wait type as d b mirror send and value 0 under the other 4 columns.
    The column names have underscore instead of space in between.


    Figure 10-4


    DBMIRROR_SEND wait times on the principal


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig3_HTML.png)


    A screenshot of a S Q L server result window has 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with wait type as d b mirror send and values under the other 4 columns.
    The column names have underscore instead of space in between.


    Figure 10-3


    DBMIRROR_SEND wait times on the mirror


    As you can see, we spend quite some time waiting on the DBMIRROR_SEND wait type
    on the mirror vs. no DBMIRROR_SEND waits on the principal.


    ### Lowering DBMIRROR_SEND Waits


    One common piece of advice for lowering DBMIRROR_SEND wait time is changing the
    mirror mode from synchronous (high-safety) to asynchronous (high-performance).
    While this will lower the DBMIRROR_SEND wait time, it also means you can potentially
    lose data when a disaster occurs on the principal. Lowering the wait time for
    the DBMIRROR_SEND wait type will have a positive effect on the duration of your
    queries. For instance, in the example in the previous section, the insert of 10,000
    rows took around 30 seconds on my test SQL Server mirror configuration. When I
    changed the mirror mode from synchronous to asynchronous, not only did the wait
    times on the DBMIRROR_SEND wait type go down, but the total execution time of
    10,000 inserts went down to 3 seconds. That’s an improvement of almost 30 seconds!


    While this improvement might sound attractive, changing the mirror mode is not
    always an option. For instance, your company’s disaster-recovery strategy can
    require a synchronous mirror configuration. Changing the mirror mode from synchronous
    to asynchronous should, in my opinion, be the last option (if it is a viable option).
    There are other resources which influence DBMIRROR_SEND wait times, like the storage
    configuration on the mirror or the network connection between the principal and
    mirror SQL Server instances. Both resources act like a bottleneck between instances,
    contributing to the DBMIRROR_SEND wait time.


    SQL Server also has a database mirroring monitor providing the status about the
    mirroring configuration. You can find the database mirroring monitor by right-clicking
    the database that is part of a mirror, selecting Tasks ➤ Database Mirroring Monitor.
    Figure [10-5](#340881_3_En_10_Chapter.xhtml#Fig5) shows the monitor against my
    test mirror configuration.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig5_HTML.png)


    A screenshot of the S Q L server database mirroring monitor window. The selected
    database is on the left panel. Under the status tab, the server instance, role,
    and mirroring state are listed. Principal and mirror log sections have various
    metrics. Mirror commit overhead and operating mode are below.


    Figure 10-5


    Database mirroring monitor


    As you see, the database mirroring monitor provides some very interesting additional
    information like the volume of log records still needing to be sent or restored,
    how far behind the mirror currently is, and the send and restore rates. In many
    of my dealings with database mirroring, the database mirroring monitor is the
    first place I’ll check when there are performance issues involving the mirror
    configuration.


    ### DBMIRROR_SEND Summary


    The DBMIRROR_SEND wait type is directly related to database mirroring. Seeing
    DBMIRROR_SEND waits occur is pretty normal on most mirror configurations. This
    makes using a baseline to identify wait time spikes a necessity. The mirroring
    mode plays a huge part in the DBMIRROR_SEND wait times. When using synchronous
    mirroring, DBMIRROR_SEND wait times will frequently be higher than when using
    asynchronous mirroring. Not only the mirroring mode influences DBMIRROR_SEND wait
    times, though. Having a storage subsystem on the mirror SQL Server instance which
    cannot keep up with the load will have an effect on DBMIRROR_SEND waits, just
    like the network connection between the principal and the mirror.


    ## HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE


    The **HADR_LOGCAPTURE_WAIT** and **HADR_WORK_QUEUE** wait types are both related
    to AlwaysOn Availability Groups. All wait types related to AlwaysOn can easily
    be identified by the HADR_ prefix in the wait type name. AlwaysOn Availability
    Groups were introduced in SQL Server 2012 as a replacement for various SQL Server
    high-availability and disaster-recovery features such as replication, log shipping,
    and database mirroring. There are quite a few different wait types associated
    with AlwaysOn, totaling 70 in SQL Server 2022\. Not all of them indicate performance
    problems somewhere in your AlwaysOn configuration. The HADR_LOGCAPTURE_WAIT and
    HADR_WORK_QUEUE are both perfect examples of benign wait types which occur naturally
    over time and do not directly indicate a performance problem. Since both these
    wait types have high wait times associated with them on every AlwaysOn configuration,
    and are thus very common, I wanted to include them in this chapter to help you
    better understand what function they have.'
  trans: '

    ### DBMIRROR_SEND 示例


    在本例中，我在两个测试 SQL Server 实例之间构建了一个同步镜像，使用 GalacticWorks 数据库作为两个实例之间镜像的数据库。


    在 GalacticWorks 数据库内部，我使用清单 [10-1] 中的脚本创建了一个简单的表。


    ```

    USE [GalacticWorks];

    CREATE TABLE Mirror_Test

    (ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50));

    Listing 10-1

    创建 Mirror_Test 表

    ```


    表创建完成后，我清除了 `sys.dm_os_wait_stats` DMV，并使用清单 [10-2] 中的查询向 `Mirror_Test` 表插入了 10,000
    行数据。在运行清单 [10-2] 中的脚本之前，我还确保在镜像服务器上也清除了 `sys.dm_os_wait_stats` DMV。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', ''CLEAR'');

    INSERT INTO Mirror_Test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(VARCHAR(50), NEWID()))

    GO 10000

    Listing 10-2

    向 Mirror_Test 表插入 10,000 行数据

    ```


    在脚本运行时，我使用以下查询查看镜像服务器和主体服务器上的 `DBMIRROR_SEND` 等待时间：


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''DBMIRROR_SEND''

    ```


    此查询的结果见图 [10-3]，它显示了镜像服务器上的 `DBMIRROR_SEND` 等待时间。图 [10-4] 显示了主体服务器上的 `DBMIRROR_SEND`
    等待时间。


    ![](img/340881_3_En_10_Fig4_HTML.png)


    图 10-4 主体服务器上的 DBMIRROR_SEND 等待时间


    ![](img/340881_3_En_10_Fig3_HTML.png)


    图 10-3 镜像服务器上的 DBMIRROR_SEND 等待时间


    如您所见，在镜像服务器上，我们在 `DBMIRROR_SEND` 等待类型上花费了相当多的时间，而在主体服务器上则没有 `DBMIRROR_SEND` 等待。


    ### 降低 DBMIRROR_SEND 等待时间


    关于降低 `DBMIRROR_SEND` 等待时间的一个常见建议是将镜像模式从同步（高安全性）更改为异步（高性能）。虽然这会降低 `DBMIRROR_SEND`
    等待时间，但也意味着当主体服务器发生灾难时可能会丢失数据。降低 `DBMIRROR_SEND` 等待类型的等待时间将对查询的持续时间产生积极影响。例如，在上一节的例子中，在我的测试
    SQL Server 镜像配置上插入 10,000 行数据大约花费了 30 秒。当我将镜像模式从同步更改为异步时，不仅 `DBMIRROR_SEND` 等待类型的等待时间下降了，而且
    10,000 次插入的总执行时间也下降到 3 秒。这几乎改善了 30 秒！


    虽然这种改进听起来很有吸引力，但更改镜像模式并不总是可行的选择。例如，您公司的灾难恢复策略可能要求同步镜像配置。在我看来，将镜像模式从同步更改为异步应该是最后的选择（如果是一个可行的选项的话）。还有其他资源会影响
    `DBMIRROR_SEND` 等待时间，例如镜像服务器上的存储配置或主体和镜像 SQL Server 实例之间的网络连接。这两种资源都充当实例之间的瓶颈，导致了
    `DBMIRROR_SEND` 等待时间。


    SQL Server 还提供了一个数据库镜像监视器，用于提供有关镜像配置的状态信息。您可以通过右键单击属于镜像一部分的数据库，选择“任务”➤“数据库镜像监视器”来找到数据库镜像监视器。图
    [10-5] 显示了针对我的测试镜像配置的监视器。


    ![](img/340881_3_En_10_Fig5_HTML.png)


    图 10-5 数据库镜像监视器


    如您所见，数据库镜像监视器提供了一些非常有趣的附加信息，例如仍需要发送或恢复的日志记录量、镜像当前落后的程度以及发送和恢复速率。在我处理数据库镜像的许多情况中，当涉及镜像配置的性能问题时，数据库镜像监视器是我首先会检查的地方。


    ### DBMIRROR_SEND 总结


    `DBMIRROR_SEND` 等待类型与数据库镜像直接相关。在大多数镜像配置上看到 `DBMIRROR_SEND` 等待发生是非常正常的。这使得使用基线来识别等待时间峰值成为必需。镜像模式在
    `DBMIRROR_SEND` 等待时间中起着巨大作用。使用同步镜像时，`DBMIRROR_SEND` 等待时间通常会比使用异步镜像时更高。然而，不仅镜像模式会影响
    `DBMIRROR_SEND` 等待时间。镜像 SQL Server 实例上的存储子系统如果无法跟上负载，也会对 `DBMIRROR_SEND` 等待产生影响，主体和镜像之间的网络连接也是如此。


    ### HADR_LOGCAPTURE_WAIT 和 HADR_WORK_QUEUE


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都与 AlwaysOn 可用性组相关。所有与 AlwaysOn
    相关的等待类型都可以通过等待类型名称中的 `HADR_` 前缀轻松识别。AlwaysOn 可用性组在 SQL Server 2012 中引入，作为各种 SQL
    Server 高可用性和灾难恢复功能（如复制、日志传送和数据库镜像）的替代品。与 AlwaysOn 相关的等待类型有很多，在 SQL Server 2022
    中总共达到 70 个。并非所有这些都表明您的 AlwaysOn 配置中存在性能问题。`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE`
    都是良性的等待类型的完美例子，它们会随时间自然发生，并不直接表明存在性能问题。由于这两种等待类型在每个 AlwaysOn 配置上都有很高的等待时间，因此非常常见，我希望在本章中包含它们，以帮助您更好地理解它们的功能。

    '
- fmt: '# HADR_LOGCAPTURE_WAIT、HADR_WORK_QUEUE 与 HADR_SYNC_COMMIT 等待类型详解


    ## HADR_LOGCAPTURE_WAIT 与 HADR_WORK_QUEUE 等待类型是什么？


    正如前一节所述，`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都出现在 AlwaysOn 配置中。它们出现在
    AlwaysOn 配置的不同位置，并且功能略有不同。


    根据 SQL Server 联机丛书（Books Online）的描述，`HADR_LOGCAPTURE_WAIT` 等待类型表明 SQL Server 正在“等待日志记录变得可用。可能发生在等待连接生成新日志记录时，或者在读取不在缓存中的日志时等待
    I/O 完成时。如果日志扫描已赶至日志末尾或正在从磁盘读取，则此等待是预期的。” `HADR_LOGCAPTURE_WAIT` 等待类型出现在托管 AlwaysOn
    可用性组中主数据库的 SQL Server 上。可以将主数据库视为数据库镜像配置中的主体。


    AlwaysOn 可用性组使用与数据库镜像类似的日志传送机制，并且也提供两种不同的模式（在 AlwaysOn 中称为可用性模式）：同步提交（Synchronous-commit）和异步提交（Asynchronous-commit）。这两种可用性模式的工作方式与本章前面讨论的数据库镜像对应模式完全相同。这意味着在同步提交模式下，主副本会等待，直到辅助副本完成自己的日志固化后才将事务提交到事务日志；而在异步提交模式下，主副本会直接将事务提交到事务日志，而不会等待辅助副本的确认。


    当主副本等待工作时，SQL Server 会将等待新事务可用所花费的时间记录为 `HADR_LOGCAPTURE_WAIT` 等待类型。`HADR_LOGCAPTURE_WAIT`
    等待类型的高等待时间意味着 SQL Server 正在等待新事务变得可用，以便将其传输到辅助副本。这与您为 AlwaysOn 可用性组配置的可用性模式无关。无论您的
    AlwaysOn 配置如何，`HADR_LOGCAPTURE_WAIT` 等待类型始终会出现。图 10-6 展示了一个 AlwaysOn 可用性组配置以及主副本上的
    `HADR_LOGCAPTURE_WAIT` 等待类型，该等待类型发生在等待新事务发送到辅助副本时。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig6_HTML.jpg)


    图 10-6：AlwaysOn 可用性组与 `HADR_LOGCAPTURE_WAIT` 等待类型


    尽管我在图 10-6 中将 `HADR_LOGCAPTURE_WAIT` 等待类型放在了主副本上，但它也会在辅助副本上记录 `HADR_LOGCAPTURE_WAIT`
    等待类型，尽管这些值通常远低于主副本上的值。


    `HADR_WORK_QUEUE` 等待类型在功能上几乎与 `HADR_LOGCAPTURE_WAIT` 等待类型相同。联机丛书对此等待类型的描述非常出色：“AlwaysOn
    可用性组的后台工作线程等待分配新工作。当有就绪的工作线程等待新工作时，这是预期的等待，这是正常状态。”这两种等待类型的主要区别在于，`HADR_LOGCAPTURE_WAIT`
    等待类型专用于等待新事务变得可用，而 `HADR_WORK_QUEUE` 则表示空闲线程等待工作。就像 `HADR_LOGCAPTURE_WAIT` 等待类型一样，`HADR_WORK_QUEUE`
    出现在主副本和辅助副本上，但 `HADR_WORK_QUEUE` 等待类型在这两个副本上都更为普遍。事实上，`HADR_WORK_QUEUE` 等待类型经常会成为
    AlwaysOn 可用性组中每个 SQL Server 上与 AlwaysOn 相关的首要等待类型，尤其是在工作负载较低的情况下。


    图 10-7 展示了一个类似于图 10-6 的 AlwaysOn 可用性组，但这次我在图像中添加了 `HADR_WORK_QUEUE` 等待类型。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig7_HTML.jpg)


    图 10-7：`HADR_LOGCAPTURE_WAIT` 与 `HADR_WORK_QUEUE` 等待类型


    由于 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都会随时间自然出现，因此我没有提供这两种等待类型的示例。此外，由于这两种等待类型与性能问题没有直接关系，因此包含关于如何降低这两种等待类型等待时间的部分是没有用的。


    ### HADR_LOGCAPTURE_WAIT 与 HADR_WORK_QUEUE 总结


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都是出现在每个作为 AlwaysOn 可用性组一部分的 SQL
    Server 上的良性等待类型。由于 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型与性能问题没有直接关系，因此无需直接关注降低它们，在大多数情况下可以安全地忽略它们。


    ## HADR_SYNC_COMMIT


    `HADR_SYNC_COMMIT` 等待类型是另一个与 AlwaysOn 相关的等待类型，在 SQL Server 2012 中引入。在许多方面，`HADR_SYNC_COMMIT`
    等待类型与本章前面讨论的 `DBMIRROR_SEND` 非常相似。然而，这两种等待类型之间存在一些差异，我们将在以下部分进行讨论。


    ### HADR_SYNC_COMMIT 等待类型是什么？


    `HADR_SYNC_COMMIT` 等待类型表示主副本等待辅助副本固化日志记录所花费的时间。`HADR_SYNC_COMMIT` 等待仅发生在主副本上，并且仅出现在同步复制
    AlwaysOn 可用性组中。一旦主副本接收到事务并将其发送到辅助副本进行固化，`HADR_SYNC_COMMIT` 等待时间就会开始记录。只有当辅助副本发送其确认写入辅助事务日志已完成时，`HADR_SYNC_COMMIT`
    等待时间才会停止记录。图 10-8 展示了时间线内的 `HADR_SYNC_COMMIT` 等待时间生成过程。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig8_HTML.png)


    图 10-8：`HADR_SYNC_COMMIT` 与同步复制


    由于 `HADR_SYNC_COMMIT` 等待类型在每个同步 AlwaysOn 可用性组中都会出现，因此预期一定量的等待时间是正常的。但就像 `DBMIRROR_SEND`
    等待类型一样，`HADR_SYNC_COMMIT` 等待类型的等待时间高度依赖于辅助副本处理日志记录的速度。这意味着两个副本之间缓慢的网络连接或辅助副本上存储子系统的性能会影响
    `HADR_SYNC_COMMIT` 等待时间。因此，了解您的 AlwaysOn 配置中 `HADR_SYNC_COMMIT` 等待类型的正常等待时间是多少非常重要，这样您才能轻松识别高于正常水平的等待时间。'
  raw: '### What Are the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE Wait Types?


    As I mentioned in the preceding section, both the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE
    wait types occur in AlwaysOn configurations. They occur in different places inside
    your AlwaysOn configuration and have slightly different functions.


    According to Books Online, the HADR_LOGCAPTURE_WAIT wait type indicates that SQL
    Server is “waiting for log records to become available. Can occur either when
    waiting for new log records to be generated by connections or for I/O completion
    when reading log not in the cache. This is an expected wait if the log scan is
    caught up to the end of log or is reading from disk.” The HADR_LOGCAPTURE_WAIT
    wait type occurs on the SQL Server hosting the primary database inside an AlwaysOn
    Availability Group. Think of the primary database as the principal inside a database
    mirroring configuration.


    AlwaysOn Availability uses a similar log transport mechanism as database mirroring
    and also provides two different modes (called Availability modes inside AlwaysOn):
    Synchronous-commit and Asynchronous-commit. Both these Availability modes work
    in the same way as their database mirroring counterparts we were discussing earlier
    in this chapter do. This means in Synchronous-commit mode, the primary replica
    waits to commit transactions to the transaction log until the secondary replica
    has completed its own log hardening, while in Asynchronous-commit mode, the primary
    replica will directly commit the transaction to the transaction log without waiting
    for a confirmation from the secondary replica.


    While the primary replica is waiting for work, SQL Server will record the time
    it has spent on waiting for new transactions to become available as the HADR_LOGCAPTURE_WAIT
    wait type. High wait times on the HADR_LOGCAPTURE_WAIT wait type means that SQL
    Server is waiting on new transactions to become available so they can be transferred
    to the secondary replica. This is not dependent on the Availability mode you configured
    for your AlwaysOn Availability Group. The HADR_LOGCAPTURE_WAIT wait type will
    always occur, no matter your AlwaysOn configuration. Figure [10-6](#340881_3_En_10_Chapter.xhtml#Fig6)
    shows an AlwaysOn Availability Group configuration together with the HADR_LOGCAPTURE_WAIT
    wait type on the primary replica, which occurs while waiting for new transactions
    to be sent to the secondary replica.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig6_HTML.jpg)


    A diagram of the always-on availability group with wait type, H A D R underscore
    LOGCAPTURE underscore WAIT in the primary and a secondary replica with no transactions.


    Figure 10-6


    AlwaysOn Availability Group and the HADR_LOGCAPTURE_WAIT wait type


    Even though I placed the HADR_LOGCAPTURE_WAIT wait type on the primary replica
    in Figure [10-6](#340881_3_En_10_Chapter.xhtml#Fig6), it will also log the HADR_LOGCAPTURE_WAIT
    wait type on the secondary replica, although those values will normally be much
    lower than on the primary replica.


    The HADR_WORK_QUEUE wait type is almost identical in function to the HADR_LOGCAPTURE_WAIT
    wait type. Books Online gives an excellent description of this wait type: “AlwaysOn
    Availability Groups’ background worker thread waiting for new work to be assigned.
    This is an expected wait when there are ready workers waiting for new work, which
    is the normal state.” The main difference between both wait types is the HADR_LOGCAPTURE_WAIT
    wait type is dedicated to waiting until new transactions become available, while
    the HADR_WORK_QUEUE indicates free threads waiting for work. Just like the HADR_LOGCAPTURE_WAIT
    wait type, the HADR_WORK_QUEUE occurs on both the primary and the secondary replicas,
    but the HADR_WORK_QUEUE wait type is much more prevalent on both replicas. As
    a matter of fact, the HADR_WORK_QUEUE wait type will frequently be the top AlwaysOn-related
    wait type on every SQL Server that is part of an AlwaysOn Availability Group,
    especially if the workload is low.


    Figure [10-7](#340881_3_En_10_Chapter.xhtml#Fig7) shows an AlwaysOn Availability
    Group like the one in Figure [10-6](#340881_3_En_10_Chapter.xhtml#Fig6), but this
    time I added the HADR_WORK_QUEUE wait type to the image as well.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig7_HTML.jpg)


    A diagram of the always-on availability group, which has a primary with wait types
    H A D R underscore LOGCAPTURE underscore WAIT and H A D R underscore WORK underscore
    QUEUE and a secondary replica with H A D R underscore WORK underscore QUEUE.


    Figure 10-7


    HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE wait types


    Since both the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE wait types occur naturally
    over time, I did not include an example of both the wait types. Also, because
    both these wait types are not directly related to performance problems, there
    is no use including a section on lowering the wait times of both these wait types.


    ### HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE Summary


    Both the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE wait types are benign wait types
    that occur on every SQL Server that is part of an AlwaysOn Availability Group.
    Because the HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE wait types are not directly
    related to performance problems, there is no direct need to focus attention on
    lowering them, and they can, in most cases, be safely ignored.


    ## HADR_SYNC_COMMIT


    The **HADR_SYNC_COMMIT** wait type is another AlwaysOn-related wait introduced
    with SQL Server 2012\. In many ways, the HADR_SYNC_COMMIT wait type closely resembles
    the DBMIRROR_SEND discussed earlier in this chapter. There are some differences,
    however, between both wait types, which we will discuss in the following section.


    ### What Is the HADR_SYNC_COMMIT Wait Type?


    The HADR_SYNC_COMMIT wait type indicates the time the primary replica spends waiting
    for a secondary replica to harden the log records. HADR_SYNC_COMMIT waits will
    only occur on the primary replica and only inside a synchronous-replication AlwaysOn
    Availability Group. As soon as a transaction is received by the primary replica
    and is sent to the secondary replica for hardening, the HADR_SYNC_COMMIT wait
    time will start recording. The HADR_SYNC_COMMIT wait time will only stop recording
    when the secondary replica has sent its confirmation the write to the secondary’s
    transaction log was completed. Figure [10-8](#340881_3_En_10_Chapter.xhtml#Fig8)
    shows the HADR_SYNC_COMMIT wait time generation inside a timeline.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig8_HTML.png)


    A timeline of the H A D R underscore SYNC underscore COMMIT wait time. The transaction
    originates from the primary. After the commit, the transaction is sent to the
    secondary, and then waits for H A D R synchronous commit to send confirmation
    back to the primary. The transaction is then completed.


    Figure 10-8


    HADR_SYNC_COMMIT and synchronous replication


    Since the HADR_SYNC_COMMIT wait type will always occur in every synchronous AlwaysOn
    Availability Group, it is normal to expect a certain amount of wait time. But
    just like the DBMIRROR_SEND wait type, the wait time of the HADR_SYNC_COMMIT wait
    type is highly dependent on the speed at which the secondary replica can process
    the log records. This means that a slow network connection between both replicas
    or the performance of the storage subsystem on the secondary replica can impact
    HADR_SYNC_COMMIT wait times. For this reason, it is important to understand what
    the normal wait times for the HADR_SYNC_COMMIT wait type are for your AlwaysOn
    configuration so you can identify higher-than-normal wait times easily.'
  trans: '

    # HADR_LOGCAPTURE_WAIT、HADR_WORK_QUEUE 与 HADR_SYNC_COMMIT 等待类型详解


    ## HADR_LOGCAPTURE_WAIT 与 HADR_WORK_QUEUE 等待类型是什么？


    正如前一节所述，`HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都出现在 AlwaysOn 配置中。它们出现在
    AlwaysOn 配置的不同位置，并且功能略有不同。


    根据 *SQL Server 联机丛书*（Books Online）的描述，`HADR_LOGCAPTURE_WAIT` 等待类型表明 SQL Server
    正在“等待日志记录变得可用。可能发生在等待连接生成新日志记录时，或者在读取不在缓存中的日志时等待 I/O 完成时。如果日志扫描已赶至日志末尾或正在从磁盘读取，则此等待是预期的。”
    `HADR_LOGCAPTURE_WAIT` 等待类型出现在托管 AlwaysOn 可用性组中主数据库的 SQL Server 上。可以将主数据库视为数据库镜像配置中的主体。


    AlwaysOn 可用性组使用与数据库镜像类似的日志传送机制，并且也提供两种不同的模式（在 AlwaysOn 中称为可用性模式）：同步提交（Synchronous-commit）和异步提交（Asynchronous-commit）。这两种可用性模式的工作方式与本章前面讨论的数据库镜像对应模式完全相同。这意味着在同步提交模式下，主副本会等待，直到辅助副本完成自己的日志固化后才将事务提交到事务日志；而在异步提交模式下，主副本会直接将事务提交到事务日志，而不会等待辅助副本的确认。


    当主副本等待工作时，SQL Server 会将等待新事务可用所花费的时间记录为 `HADR_LOGCAPTURE_WAIT` 等待类型。`HADR_LOGCAPTURE_WAIT`
    等待类型的高等待时间意味着 SQL Server 正在等待新事务变得可用，以便将其传输到辅助副本。这与您为 AlwaysOn 可用性组配置的可用性模式无关。无论您的
    AlwaysOn 配置如何，`HADR_LOGCAPTURE_WAIT` 等待类型始终会出现。图 10-6 展示了一个 AlwaysOn 可用性组配置以及主副本上的
    `HADR_LOGCAPTURE_WAIT` 等待类型，该等待类型发生在等待新事务发送到辅助副本时。


    ![](img/340881_3_En_10_Fig6_HTML.jpg)


    图 10-6：AlwaysOn 可用性组与 `HADR_LOGCAPTURE_WAIT` 等待类型


    尽管我在图 10-6 中将 `HADR_LOGCAPTURE_WAIT` 等待类型放在了主副本上，但它也会在辅助副本上记录 `HADR_LOGCAPTURE_WAIT`
    等待类型，尽管这些值通常远低于主副本上的值。


    `HADR_WORK_QUEUE` 等待类型在功能上几乎与 `HADR_LOGCAPTURE_WAIT` 等待类型相同。联机丛书对此等待类型的描述非常出色：“AlwaysOn
    可用性组的后台工作线程等待分配新工作。当有就绪的工作线程等待新工作时，这是预期的等待，这是正常状态。”这两种等待类型的主要区别在于，`HADR_LOGCAPTURE_WAIT`
    等待类型专用于等待新事务变得可用，而 `HADR_WORK_QUEUE` 则表示空闲线程等待工作。就像 `HADR_LOGCAPTURE_WAIT` 等待类型一样，`HADR_WORK_QUEUE`
    出现在主副本和辅助副本上，但 `HADR_WORK_QUEUE` 等待类型在这两个副本上都更为普遍。事实上，`HADR_WORK_QUEUE` 等待类型经常会成为
    AlwaysOn 可用性组中每个 SQL Server 上与 AlwaysOn 相关的首要等待类型，尤其是在工作负载较低的情况下。


    图 10-7 展示了一个类似于图 10-6 的 AlwaysOn 可用性组，但这次我在图像中添加了 `HADR_WORK_QUEUE` 等待类型。


    ![](img/340881_3_En_10_Fig7_HTML.jpg)


    图 10-7：`HADR_LOGCAPTURE_WAIT` 与 `HADR_WORK_QUEUE` 等待类型


    由于 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都会随时间自然出现，因此我没有提供这两种等待类型的示例。此外，由于这两种等待类型与性能问题没有直接关系，因此包含关于如何降低这两种等待类型等待时间的部分是没有用的。


    ### HADR_LOGCAPTURE_WAIT 与 HADR_WORK_QUEUE 总结


    `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型都是出现在每个作为 AlwaysOn 可用性组一部分的 SQL
    Server 上的良性等待类型。由于 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 等待类型与性能问题没有直接关系，因此无需直接关注降低它们，在大多数情况下可以安全地忽略它们。


    ## HADR_SYNC_COMMIT


    `HADR_SYNC_COMMIT` 等待类型是另一个与 AlwaysOn 相关的等待类型，在 SQL Server 2012 中引入。在许多方面，`HADR_SYNC_COMMIT`
    等待类型与本章前面讨论的 `DBMIRROR_SEND` 非常相似。然而，这两种等待类型之间存在一些差异，我们将在以下部分进行讨论。


    ### HADR_SYNC_COMMIT 等待类型是什么？


    `HADR_SYNC_COMMIT` 等待类型表示主副本等待辅助副本固化日志记录所花费的时间。`HADR_SYNC_COMMIT` 等待仅发生在主副本上，并且仅出现在同步复制
    AlwaysOn 可用性组中。一旦主副本接收到事务并将其发送到辅助副本进行固化，`HADR_SYNC_COMMIT` 等待时间就会开始记录。只有当辅助副本发送其确认写入辅助事务日志已完成时，`HADR_SYNC_COMMIT`
    等待时间才会停止记录。图 10-8 展示了时间线内的 `HADR_SYNC_COMMIT` 等待时间生成过程。


    ![](img/340881_3_En_10_Fig8_HTML.png)


    图 10-8：`HADR_SYNC_COMMIT` 与同步复制


    由于 `HADR_SYNC_COMMIT` 等待类型在每个同步 AlwaysOn 可用性组中都会出现，因此预期一定量的等待时间是正常的。但就像 `DBMIRROR_SEND`
    等待类型一样，`HADR_SYNC_COMMIT` 等待类型的等待时间高度依赖于辅助副本处理日志记录的速度。这意味着两个副本之间缓慢的网络连接或辅助副本上存储子系统的性能会影响
    `HADR_SYNC_COMMIT` 等待时间。因此，了解您的 AlwaysOn 配置中 `HADR_SYNC_COMMIT` 等待类型的正常等待时间是多少非常重要，这样您才能轻松识别高于正常水平的等待时间。

    '
- fmt: '### HADR_SYNC_COMMIT 示例


    对于这个示例，我构建了一个配置为使用同步复制的 AlwaysOn 可用性组。测试机器的配置信息可以在附录 I “示例 SQL Server 机器配置” 中找到。我不会详细介绍如何配置
    AlwaysOn 可用性组，因为互联网上有大量信息可以帮助你进行配置。一个好的起点是 Books Online 上的 “Getting Started with
    AlwaysOn Availability Groups” 文章，你可以在这里找到：`https://slrwnds.com/yowojf`。我使用 `GalacticWorks`
    数据库作为在我的 AlwaysOn 可用性组中进行复制的数据库。


    配置好 AlwaysOn 可用性组后，我使用清单 [10-3](#340881_3_En_10_Chapter.xhtml#PC4) 中的脚本向 `GalacticWorks`
    数据库添加了一个名为 `AO_Test` 的额外表。


    ```sql

    USE [GalacticWorks];

    CREATE TABLE AO_Test

    (ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50));

    ```


    清单 10-3

    创建 `AO_Test` 表


    表创建完成后，我先清除然后查询 `sys.dm_os_wait_stats` DMV，以检查主副本和辅助副本上 `HADR_SYNC_COMMIT` 等待时间的当前等待时间，使用以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''HADR_SYNC_COMMIT'';

    ```


    即使等待了几分钟，`HADR_SYNC_COMMIT` 等待类型的等待时间也保持为 0，如图 [10-9](#340881_3_En_10_Chapter.xhtml#Fig9)
    所示。这是我预期的，因为到目前为止我们还没有在主副本上执行任何数据修改。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig9_HTML.png)


    SQL Server 结果窗口的屏幕截图，有 5 列：等待类型、等待任务数、等待时间（毫秒）、最大等待时间（毫秒）和信号等待时间（毫秒）。它有 1 行，等待类型值为
    `HADR_SYNC_COMMIT`，其他 4 列的值均为 0。


    **图 10-9**


    在主副本和辅助副本都无活动期间的 `HADR_SYNC_COMMIT` 等待信息


    这与 `HADR_LOGCAPTURE_WAIT` 和 `HADR_WORK_QUEUE` 不同，后者即使在 AlwaysOn 可用性组内没有用户活动（或者正因为没有活动），也会累积等待时间。


    现在表已就位，让我们通过执行一些插入操作来生成一些事务。清单 [10-4](#340881_3_En_10_Chapter.xhtml#PC6) 中的脚本将向我们之前创建的
    `AO_Test` 表中插入 10,000 行。


    ```sql

    INSERT INTO AO_Test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(VARCHAR(50), NEWID()))

    GO 10000

    ```


    清单 10-4

    向 `AO_Test` 表插入 10,000 行


    当清单 [10-4](#340881_3_En_10_Chapter.xhtml#PC6) 中的脚本完成后，我再次在主副本和辅助副本上检查 `sys.dm_os_wait_stats`
    DMV 内的等待统计信息。图 [10-10](#340881_3_En_10_Chapter.xhtml#Fig10) 显示了主副本上此查询的结果，图 [10-11](#340881_3_En_10_Chapter.xhtml#Fig11)
    显示了辅助副本的结果。


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig11_HTML.png)


    SQL Server 结果窗口的屏幕截图，有 5 列：等待类型、等待任务数、等待时间（毫秒）、最大等待时间（毫秒）和信号等待时间（毫秒）。它有 1 行，等待类型值为
    `HADR_SYNC_COMMIT`，其他 4 列的值均为 0。


    **图 10-11**


    辅助副本上的 `HADR_SYNC_COMMIT` 等待


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig10_HTML.png)


    SQL Server 结果窗口的屏幕截图，有 5 列：等待类型、等待任务数、等待时间（毫秒）、最大等待时间（毫秒）和信号等待时间（毫秒）。它有 1 行，等待类型值为
    `HADR_SYNC_COMMIT`，其他 4 列的值分别为 10000、15695、7 和 156。


    **图 10-10**


    主副本上的 `HADR_SYNC_COMMIT` 等待


    当你查看这两个图时，首先会注意到 `HADR_SYNC_COMMIT` 等待只发生在主副本上，而不是辅助副本上，这是预期行为。第二个有趣的事情是等待次数。这恰好与插入的行数完全相同。同样，这是预期行为。因为我们执行了一次插入操作并重复了
    10,000 次，所以每次插入都生成了一个需要复制的事务日志记录。


    **技术说明**


    虽然我们执行了 10,000 次单行插入，但如果你重新创建这个演示，等待任务数可能少于 10,000，这是由于网络延迟和存储速度造成的。


    利用等待次数和等待时间，可以计算出平均每次插入操作在副本上提交所需的时间。在这个例子中，它是 1.57 毫秒（15695/10000），这是一个相当不错的值。'
  raw: '### HADR_SYNC_COMMIT Example


    For this example, I have built an AlwaysOn Availability Group configured to use
    synchronous replication. The configuration of the test machines is found in Appendix
    I, “Example SQL Server Machine Configuration.” I won’t go into detail on how to
    configure an AlwaysOn Availability Group, as there is plenty of information available
    on the Internet to help you configure AlwaysOn. A good starting point is the “Getting
    Started with AlwaysOn Availability Groups” article on Books Online, which you
    can find here: [`https://slrwnds.com/yowojf`](https://slrwnds.com/yowojf). I used
    the GalacticWorks database as the database replicated inside my AlwaysOn Availability
    Group.


    After configuring my AlwaysOn Availability Group, I added an extra table named
    AO_Test to the GalacticWorks database using the script in Listing [10-3](#340881_3_En_10_Chapter.xhtml#PC4).


    ```

    USE [GalacticWorks];

    CREATE TABLE AO_Test

    (ID UNIQUEIDENTIFIER PRIMARY KEY,

    RandomData VARCHAR(50));

    Listing 10-3

    Create AO_Test table

    ```


    After the table is created, I clear and then query the sys.dm_os_wait_stats DMV
    to check the current wait times on the HADR_SYNC_COMMIT wait time on both the
    primary and secondary replicas using the following query:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''HADR_SYNC_COMMIT'';

    ```


    Even after waiting for a couple of minutes, the wait time of the HADR_SYNC_COMMIT
    wait type stays 0, as you can see in Figure [10-9](#340881_3_En_10_Chapter.xhtml#Fig9).
    This is what I expected since we have not performed any data modifications on
    the primary replica so far.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig9_HTML.png)


    A screenshot of the S Q L server result window has 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with wait type value H A D R underscore SYNC underscore COMMIT and value
    0 in the other 4 columns.


    Figure 10-9


    HADR_SYNC_COMMIT wait information during no activity on both the primary and the
    secondary mode


    This is different compared to HADR_LOGCAPTURE_WAIT and HADR_WORK_QUEUE, which
    will accumulate wait times even though (or because) there is no user activity
    inside the AlwaysOn Availability Group.


    Now with the table in place, let’s generate some transactions by performing a
    number of inserts. The script in Listing [10-4](#340881_3_En_10_Chapter.xhtml#PC6)
    will insert 10,000 rows into the AO_Test table we created earlier.


    ```

    INSERT INTO AO_Test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(VARCHAR(50), NEWID()))

    GO 10000

    Listing 10-4

    Insert 10,000 rows into the AO_Test table

    ```


    When the script in Listing [10-4](#340881_3_En_10_Chapter.xhtml#PC6) has completed,
    I check the wait statistics information inside the sys.dm_os_wait_stats DMV again
    on both the primary and secondary replicas. Figure [10-10](#340881_3_En_10_Chapter.xhtml#Fig10)
    shows the results of this query on the primary, and Figure [10-11](#340881_3_En_10_Chapter.xhtml#Fig11)
    on the secondary.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig11_HTML.png)


    A screenshot of a S Q L server results window has 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with the wait type value as H A D R underscore SYNC underscore COMMIT and
    the other 4 column values as 0.


    Figure 10-11


    HADR_SYNC_COMMIT waits on the secondary replica


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig10_HTML.png)


    A screenshot of a S Q L server results window has 5 columns, wait type, waiting
    tasks count, wait time m s, max wait time m s, and signal wait time m s. It has
    1 row with the wait type value as H A D R underscore SYNC underscore COMMIT and
    the other 4 column values as 10000, 15695, 7, and 156, respectively.


    Figure 10-10


    HADR_SYNC_COMMIT waits on the primary replica


    The first thing you will notice when looking at both figures is the HADR_SYNC_COMMIT
    waits occur only on the primary replica and not on the secondary, which is expected
    behavior. The second interesting thing is the number of waits. This so happens
    to be the exact same amount as the number of rows inserted. Again, this is expected
    behavior. Since we performed a single insert and repeated it 10,000 times, every
    insert generated a single transaction log record to be replicated.


    Nerd Note


    While we did 10,000 single inserts, if you recreate the demo, it is possible to
    have less than 10,000 waiting tasks count due to network latency and storage speeds.


    Using the number of waits and the wait time, it is possible to calculate the average
    time it took for one insert operation to be committed on the replica. In this
    case, it is 1.57 milliseconds (15695/10000) which is a pretty decent value.'
