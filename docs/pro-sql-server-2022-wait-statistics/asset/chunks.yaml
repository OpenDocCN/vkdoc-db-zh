  trans: '### 什么是 OLEDB 等待类型？


    SQL Server 在其内部的许多操作中使用 OLEDB 客户端提供程序。例如，链接服务器的流量将通过 OLEDB 客户端提供程序传输，并导致 OLEDB
    等待。其他操作，尤其是当 SQL Server 必须从外部源检索数据时，也可能导致使用 OLEDB 客户端提供程序。


    SQL Server 内部的一些操作也会使用 OLEDB 客户端提供程序，即使它们是内部发生的。一个很好的例子就是 `DBCC` 命令，我将在下面的示例部分进行演示。


    ### OLEDB 示例


    使用 OLEDB 客户端提供程序的一个有趣过程是 SQL Server 内部的 `DBCC` 命令。每当您执行 `DBCC` 命令时，您都必定会看到 OLEDB
    等待发生。清单 12-3 展示了一个在执行 `DBCC CHECKDB` 后发生 OLEDB 等待的示例。示例脚本将清除 `sys.dm_os_wait_stats`
    DMV，对 `GalacticWorks` 数据库执行 `CHECKDB`，然后查询 `sys.dm_os_wait_stats` DMV 中的 OLEDB
    等待。


    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB(''GalacticWorks'');

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''OLEDB'';

    ```


    清单 12-3 生成 OLEDB 等待


    在我测试的 SQL Server 实例上执行清单 12-3 中的查询，结果如图 12-8 所示。


    ![](img/340881_3_En_12_Fig8_HTML.png)


    结果行包含五列，等待类型为 `OLEDB`，等待任务计数为 `112345`，等待时间（毫秒）为 `3930`，最大等待时间（毫秒）为 `27`，信号等待时间（毫秒）为
    `0`。


    图 12-8 OLEDB 等待


    如图 12-8 所示，执行 `DBCC CHECKDB` 将导致 OLEDB 等待。


    ### 降低 OLEDB 等待


    如前面的示例所示，对数据库执行 `DBCC CHECKDB` 会导致 OLEDB 等待。然而，这并不意味着存在与 OLEDB 客户端提供程序相关的问题；相反，它只是表明
    `DBCC CHECKDB` 命令利用了 OLEDB 客户端提供程序。运行 `DBCC CHECKDB` 是确保数据库健康的重要部分。为了避免一致性检查以降低
    OLEDB 等待时间是不良做法，我强烈建议不要这样做。在 `DBCC` 命令之外看到高 OLEDB 等待时间，可能表明您的 SQL Server 环境中某处存在性能问题。如果您正在处理远程源，例如链接服务器或
    Excel 文件，您也会受到远程源性能的影响。例如，如果您从链接服务器查询信息，而链接服务器正遇到性能问题，这也可能会反映在 OLEDB 等待时间中。此外，某些操作（如排序）也会影响链接服务器上的查询持续时间。到远程源的网络连接也可能在导致
    OLEDB 等待时间高于正常水平方面起到作用。如果您访问远程源所通过的网络连接出现性能下降，您将再次在 OLEDB 等待时间中注意到这一点。


    由于 OLEDB 等待可能因多种原因而发生，其中一些是良性的（如 `DBCC` 命令），而另一些可能与性能问题相关，我建议您不要忽略 OLEDB 等待类型，而应像其他指示性能的等待类型一样监控它。


    ### OLEDB 总结


    OLEDB 等待类型可能由于各种使用对象链接与嵌入数据库（OLEDB）客户端提供程序的源而发生。大多数源与远程数据源（如链接服务器）相关。一些内部进程也使用
    OLEDB 客户端提供程序，最显著的是 `DBCC` 命令。看到 OLEDB 等待类型的等待时间高于正常水平并不一定意味着存在性能问题，特别是当它们可以与计划的
    `DBCC` 命令执行相关联时。在使用链接服务器等远程数据源时，在 `DBCC` 命令之外看到高于正常水平的等待时间，可能意味着远程数据源正在经历性能问题。在这种情况下，应重点关注数据源；如果数据源有问题，它必然也会影响
    OLEDB 等待时间。


    ### TRACEWRITE


    `TRACEWRITE` 等待类型是一种特殊的等待类型，仅在跟踪运行时收集等待时间，最常见的是 SQL Server Profiler 跟踪。跟踪是 SQL
    Server 中的一个后台进程，收集关于 SQL Server 实例性能的各种（通常是用户指定的）信息。例如，可以使用 SQL Server Profiler
    捕获当前正在执行的查询，过滤到单个数据库，并包含运行时信息。SQL Server 中有多种跟踪方法可用，但最常见且影响 `TRACEWRITE` 等待类型的是
    SQL Server Profiler 跟踪。


    SQL Server Profiler 是一个应用程序，从 SQL Server 2016 开始，它与 SQL Server Management Studio
    (`SSMS`) 产品分开，允许用户针对 SQL Server 实例创建和监控跟踪。Microsoft 在引入 SQL Server 2012 时宣布 SQL
    Server Profiler 已弃用，并建议使用 Extended Events 来捕获跟踪。尽管 SQL Server Profiler 已弃用，但它在
    SQL Server 2022 中仍然可用，并且在您部署单独的 `SSMS` 产品时会随之安装。许多人仍然依赖 SQL Server Profiler 跟踪而不是
    Extended Events 来排查和监控查询性能。


    使用 SQL Server Profiler 的坏消息是，它在执行跟踪时可能会导致一些性能开销。Microsoft 发表的一篇文章得出结论，在繁忙的系统上运行
    SQL Server Profiler 跟踪可能对每秒事务量产生 10% 的影响；您可以在 `https://slrwnds.com/j66us9` 找到该文章。


    因为 SQL Server Profiler 跟踪可能对您的系统性能产生如此大的影响，我认为监控 `TRACEWRITE` 等待时间非常重要。


    ### 什么是 TRACEWRITE 等待类型？


    当对您的 SQL Server 实例执行跟踪时，`TRACEWRITE` 等待类型将出现在您的系统上。由于 SQL Server Profiler 跟踪可能对您的
    SQL Server 实例性能产生如此大的影响，因此建议您监控此等待类型以检测是否正在执行任何 SQL Server Profiler 跟踪。


    您想要运行 SQL Server Profiler 跟踪的原因多种多样，例如，如果您想排查一个非常具体的查询问题，或者监控某个特定查询被执行的次数。尽管存在
    SQL Server Profiler 的替代方案，如服务器端跟踪和 Extended Events，但与通常复杂的 Extended Events 相比，SQL
    Server Profiler 工具非常易于使用。'
- fmt: '### TRACEWRITE 示例


    为了展示 TRACEWRITE 等待的示例，我们将创建一个 SQL Server Profiler 跟踪。SQL Server Profiler 程序是“管理工具-完整”功能的一部分，在安装低于
    SQL Server 2016 的版本或向现有安装添加功能时可以选择此功能。如果安装独立的 SSMS 产品，Profiler 功能也会自动安装。图 12-9
    展示了此功能在 SQL Server 2012 安装程序中的位置。


    ![图 12-9：SQL Server 2012 安装程序中的“管理工具-完整”功能](images/340881_3_En_12_Chapter/340881_3_En_12_Fig9_HTML.png)


    安装“管理工具-完整”功能后，你可以在“开始”菜单下的 `SQL Server ➤ 性能工具` 文件夹中，或在 `C:\Program Files (x86)\Microsoft
    SQL Server\[版本号]\Tools\Binn` 文件夹中找到 SQL Server Profiler。


    如果安装的是独立的 SSMS 产品，则 Profiler 位于 `C:\Program Files (x86)\Microsoft SQL Server\140\Tools\Binn`
    文件夹中。


    启动 SQL Server Profiler 后，通过单击图 12-10 所示的“新建跟踪”按钮，或选择 `文件 ➤ 新建跟踪` 来启动新跟踪。


    ![图 12-10：SQL Server Profiler 的“新建跟踪”选项](images/340881_3_En_12_Chapter/340881_3_En_12_Fig10_HTML.jpg)


    启动新跟踪时，你需要连接到要跟踪的 SQL Server 实例。在本例中，我连接到我的测试 SQL Server 实例。登录到 SQL Server 实例后，“跟踪属性”窗口将会打开。此窗口提供了多种选项来配置跟踪及其存储方式。在此示例中，我们不会更改“常规”选项卡中的任何内容，而是直接转到“事件选择”选项卡。在那里，我们选择要捕获的事件，并可选择为这些事件提供筛选器。


    对于此示例，我们选择 `SQL:BatchCompleted` 事件，如图 12-11 所示。这将记录针对测试 SQL Server 实例执行的所有 T-SQL
    语句，并捕获该事件的所有可用信息。


    ![图 12-11：选择了 SQL:BatchCompleted 事件](images/340881_3_En_12_Chapter/340881_3_En_12_Fig11_HTML.png)


    我们不会在事件上配置任何筛选器，因此将捕获针对 SQL Server 实例执行的每一条 T-SQL 语句。我们单击“运行”以启动跟踪，这将打开跟踪窗口，显示事件在我们的
    SQL Server 实例上发生的情况以及附加信息（例如查询信息）。


    现在我们的 SQL Server Profiler 跟踪正在运行，我们应该能够注意到 TRACEWRITE 等待的发生。我们在 SSMS 中针对 `sys.dm_os_waiting_tasks`
    DMV 执行以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    此查询的结果如图 12-12 所示。


    ![图 12-12：显示 TRACEWRITE 等待的查询结果](images/340881_3_En_12_Chapter/340881_3_En_12_Fig12_HTML.png)


    即使我们没有在测试 SQL Server 实例上运行任何工作负载，`TRACEWRITE` 等待类型仍然会被记录。这是正常的，因为只要 SQL Server
    Profiler 跟踪处于活动状态，`TRACEWRITE` 等待类型就会始终被记录。


    ### 降低 TRACEWRITE 等待


    如前所述，如果你注意到发生了 `TRACEWRITE` 等待，则意味着有人正在针对你的 SQL Server 实例运行 SQL Server Profiler
    跟踪。因为 SQL Server Profiler 跟踪可能会影响 SQL Server 实例的性能，所以了解谁在运行 SQL Server Profiler
    跟踪以及为何运行非常重要。


    幸运的是，我们可以查询一个目录视图来查看跟踪活动——`sys.traces` 视图。`sys.traces` 目录视图将为你提供针对 SQL Server
    实例活动或已暂停跟踪的概览。以下查询将检索 `sys.traces` 目录视图中的所有信息：


    ```sql

    SELECT *

    FROM sys.traces;

    ```


    在测试 SQL Server 实例上运行此查询将返回图 12-13 所示的信息（某些列未完全显示在图片中）。


    ![图 12-13：sys.traces 目录视图的查询结果](images/340881_3_En_12_Chapter/340881_3_En_12_Fig13_HTML.png)


    从 `sys.traces` 目录视图中需要重点注意的一些重要列是 `status` 和 `reader_spid` 列。`status` 列返回 `0`
    或 `1`，其中 `0` 表示跟踪已停止或暂停，`1` 表示跟踪当前正在运行。`reader_spid` 列返回启动跟踪的会话的会话 ID。我们可以使用此信息来检测谁正在运行跟踪。


    在我们的案例中，前面示例中启动的跟踪 ID 为 `2`，而 ID `1` 保留给后台 SQL Server 跟踪，该跟踪默认始终处于活动状态。此默认跟踪收集有关
    SQL Server 实例运行状况的特定信息，可在故障排除时使用。由于它是一个所谓的服务器端跟踪，因此在运行时不会记录 `TRACEWRITE` 等待时间。


    现在我们知道运行跟踪的用户是谁，如果该跟踪对 SQL Server 实例的性能产生负面影响，我们就可以采取行动。


    除了停止 SQL Server Profiler 跟踪以降低 `TRACEWRITE` 等待时间之外，如果你需要捕获针对 SQL Server 实例的跟踪，还有其他可用的方法。最合理的方法是在扩展事件会话中重建你的
    SQL Server Profiler 跟踪。扩展事件在捕获跟踪时允许更多的事件和选项。


    如果你仍然希望使用 SQL Server Profiler 来分析跟踪，一个好方法是将通常在 SQL Server Profiler 应用程序中运行的跟踪转换为服务器端跟踪。让我们将示例部分中创建的
    SQL Server Profiler 跟踪转换为服务器端跟踪，并监控其对 `TRACEWRITE` 等待类型的影响。


    将 SQL Server Profiler 跟踪转换为服务器端跟踪的最简单方法是在 SQL Server Profiler 应用程序中定义跟踪但不启动它。而是选择
    `文件 ➤ 导出 ➤ 脚本跟踪定义 ➤ 对于 SQL Server 2005 – SQL2019` 选项，如图 12-14 所示。


    ![图 12-14：导出 SQL Server Profiler 跟踪定义](images/340881_3_En_12_Chapter/340881_3_En_12_Fig14_HTML.png)


    单击 `文件 ➤ 导出 ➤ 脚本跟踪定义 ➤ 对于 SQL Server 2005 – SQL2019` 选项后，系统会要求我们保存一个 `.sql` 文件。整个跟踪定义将被编写到此
    `.sql` 文件中。然后我们在 SSMS 中打开此文件，修改脚本中的文件位置和其他一些选项，并执行它。这将返回我们刚创建的跟踪的 ID，并将跟踪信息保存到我们在脚本顶部指定的文件中。图
    12-15 显示了在测试 SQL Server 实例上导出的跟踪定义的一部分。


    ![图 12-15：导出的服务器端跟踪定义脚本片段](images/340881_3_En_12_Chapter/340881_3_En_12_Fig15_HTML.png)'
  raw: '### TRACEWRITE Example


    To show you an example of TRACEWRITE waits, we will create a SQL Server Profiler
    trace. The SQL Server Profiler program is part of the Management Tools-Complete
    feature, which you can select when installing SQL Server versions lower than SQL
    Server 2016 or when adding features to an existing installation. If you install
    the separate SSMS product, the Profiler feature is automatically installed as
    well. Figure [12-9](#340881_3_En_12_Chapter.xhtml#Fig9) shows the feature inside
    the SQL Server 2012 setup.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig9_HTML.png)


    A screenshot of the feature selection page of the S Q L server 2012 setup. The
    tab for management tools is highlighted.


    Figure 12-9


    Management Tools-Complete feature in SQL Server 2012 setup


    When you have installed the Management Tools-Complete feature, you will find the
    SQL Server Profiler in the SQL Server ➤ Performance Tools folder underneath the
    Start menu or in the C:\Program Files (x86)\Microsoft SQL Server\[edition number]\Tools\Binn
    folder.


    If you installed the separate SSMS product the Profiler is found in the C:\Program
    Files (x86)\Microsoft SQL Server\140\Tools\Binn folder.


    After launching SQL Server Profiler, you start a new trace by clicking the New
    Trace button, shown in Figure [12-10](#340881_3_En_12_Chapter.xhtml#Fig10), or
    selecting File ➤ New Trace.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig10_HTML.jpg)


    A screenshot of the S Q L server profiler page has the file tab selected. It highlights
    the option of a new trace.


    Figure 12-10


    New SQL Server Profiler trace


    When you start a new trace, you will need to connect to the SQL Server instance
    you want to trace. In this case, I connected to my test SQL Server instance. After
    logging on to the SQL Server instance, the Trace Properties window will open.
    This window provides a variety of options with which to configure your trace and
    how to store your trace. In this example, we are not going to change anything
    in the General tab but instead will go directly to the Events Selection tab. There
    we select the events we want to capture and optionally supply filters for those
    events.


    For this example, we select the SQL:BatchCompleted event, as you can see in Figure
    [12-11](#340881_3_En_12_Chapter.xhtml#Fig11). This will record all the T-SQL statements
    that are executed against the test SQL Server instance and capture all the information
    available for the event.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig11_HTML.png)


    A screenshot of the trace properties page with the events selection tab highlighted.
    The S Q L batch completed option is selected.


    Figure 12-11


    SQL:BatchCompleted event selected


    We won’t configure any filters on the event, so we will capture every T-SQL statement
    we execute against the SQL Server instance. We press Run to start the trace, which
    opens the trace window to show us the events as they take place on our SQL Server
    instance along with additional information about, in this case, the query.


    Now that our SQL Server Profiler trace is running, we should be able to notice
    TRACEWRITE waits occurring. We execute the following query in SSMS against the
    sys.dm_os_waiting_tasks DMV:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''TRACEWRITE'';

    ```


    The results of this query are shown in Figure [12-12](#340881_3_En_12_Chapter.xhtml#Fig12).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig12_HTML.png)


    A row has six columns for waiting task address, session i d, exec context i d,
    wait duration m s, wait type as trace write, and resource address.


    Figure 12-12


    TRACEWRITE waits


    Even though we are not running any workload on the test SQL Server instance, the
    TRACEWRITE wait type will still be logged. This is normal since the TRACEWRITE
    wait type will always be recorded as long as a SQL Server Profiler trace is active.


    ### Lowering TRACEWRITE Waits


    As mentioned before, if you notice TRACEWRITE waits occurring, it means someone
    is running a SQL Server Profiler trace against your SQL Server instance. Because
    a SQL Server Profiler trace can impact the performance of your SQL Server instance,
    it is important to know who is running the SQL Server Profiler trace and why.


    Thankfully, there is a catalog view we can query to view trace activity – the
    sys.traces view. The sys.traces catalog view will give you an overview of traces
    that are either active or paused against the SQL Server instance. The following
    query will retrieve all the information inside the sys.traces catalog view:


    ```

    SELECT *

    FROM sys.traces;

    ```


    Running this query against my test SQL Server instance returns the information
    shown in Figure [12-13](#340881_3_En_12_Chapter.xhtml#Fig13) (some columns did
    not fit inside the image).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig13_HTML.png)


    A table has eight columns for i d, status, path, max size, stop time, max files,
    is rowset, and is rollover, and two rows.


    Figure 12-13


    sys.traces


    Some important columns to highlight from the sys.traces catalog view are the status
    and reader_spid columns. The status column returns either a 0 or a 1, where a
    0 indicates the trace is stopped or paused and a 1 indicates the trace is currently
    running. The reader_spid column returns the session ID of the session which started
    the trace. We can use this information to detect who is running the trace.


    In our case, the trace started in the earlier example has an ID of 2, while the
    ID of 1 is reserved for the background SQL Server trace which is, by default,
    always active. This default trace collects specific information about the health
    of the SQL Server instance and can be used when troubleshooting. Because it is
    a so-called server-side trace, it does not record TRACEWRITE wait time while it
    is running.


    Now we know the user running the trace, we can take action if the trace has a
    negative effect on the performance of your SQL Server instance.


    Other than stopping SQL Server Profiler traces to lower the TRACEWRITE wait time,
    there are other methods available if you need to capture traces against your SQL
    Server instance. The most logical one is recreating your SQL Server Profiler trace
    within an Extended Event session. Extended Events allow more events and options
    while capturing traces.


    If you still want to use SQL Server Profiler to analyze traces, it is a good idea
    to convert the trace you would normally run in the SQL Server Profiler application
    to a server-side trace. Let’s convert the SQL Server Profiler trace created in
    the example section to a server-side trace and monitor the effects on the TRACEWRITE
    wait type.


    The easiest way to convert a SQL Server Profiler trace is by defining the trace
    in the SQL Server Profiler application without starting it. Instead, select the
    File ➤ Export ➤ Script Trace Definition ➤ For SQL Server 2005 – SQL2019 option,
    as shown in Figure [12-14](#340881_3_En_12_Chapter.xhtml#Fig14).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig14_HTML.png)


    A screenshot of the S Q L server profiler page has the file option selected, followed
    by export, script trace definition, and for the S Q L server from 2005 to 2019.


    Figure 12-14


    Export SQL Server Profiler trace to trace definition


    After clicking the File ➤ Export ➤ Script Trace Definition ➤ For SQL Server 2005
    – SQL2019 option, we are asked to save a .sql file. The entire trace definition
    will be scripted inside this .sql file. We then open this file in SSMS, modify
    the file location and some other options inside the script, and execute it. This
    will return the ID of the trace we just created and save the trace information
    to a file we specified at the top of the script. Figure [12-15](#340881_3_En_12_Chapter.xhtml#Fig15)
    shows a part of the exported trace definition on our test SQL Server instance.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig15_HTML.png)'
  trans: '

    ### TRACEWRITE 示例


    为了演示 TRACEWRITE 等待的示例，我们将创建一个 SQL Server Profiler 跟踪。SQL Server Profiler 程序是"管理工具-完整"功能的一部分，在安装
    SQL Server 2016 之前的版本或向现有安装添加功能时可以选择此功能。如果安装独立的 SSMS 产品，Profiler 功能也会自动安装。图 12-9
    展示了此功能在 SQL Server 2012 安装程序中的位置。


    ![图 12-9：SQL Server 2012 安装程序中的"管理工具-完整"功能](img/340881_3_En_12_Fig9_HTML.png)


