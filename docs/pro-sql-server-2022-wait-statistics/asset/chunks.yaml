- fmt: '## Introduction to Latches


    Microsoft describes latches as “lightweight synchronization primitives that are
    used by the SQL Server engine to guarantee consistency of in-memory structures”
    on Books Online. This description is pretty vague, and there is a lot more depth
    to latches than the description would initially suggest.


    The first thing to understand about latches, which we touched upon in the introduction
    of this chapter, is how latches are different from locks. Latches, at first glance,
    do look similar to locks as regards their behavior and naming conventions within
    SQL Server. Just like locks, latches have various “modes,” and some of the acronyms
    to indicate the type of mode used are the same as for some lock modes. Another
    thing locks and latches have in common are both objects play a role in keeping
    SQL Server objects consistent, and the way they manage this seems identical. While
    locks are used to make sure transactions are consistent, protecting the transaction
    for the entire duration it is running, latches are only used for the duration
    they are necessary and are not bound to the duration of a transaction. During
    the duration of one transaction, many different latches will be acquired and released
    again. Figure [9-1](#340881_3_En_9_Chapter.xhtml#Fig1) visualizes this behavior.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig1_HTML.png)


    A time plot depicts the acquire and release actions of latches and locks during
    a transaction.


    Figure 9-1: Lock-and-latch behavior during transactions


    **Nerd Note**


    An easy way to consider latches in a logical fashion, SQL Server uses buffer latches
    to protect pages `already in the buffer pool` and IO latches to protect pages
    `not yet loaded into the buffer pool`. This distinction will help you understand
    the different latch wait types and where the latch is happening.


    Placing and maintaining locks on SQL Server objects is an expensive operation,
    as the locks need to stay in place during the entire transaction. Because latches
    are needed for specific operations and are released again, they are less costly
    to use than locks. This explains the “lightweight” part in the latch definition
    Microsoft uses.


    The second part of the latch definition, “synchronization primitives,” we discussed
    earlier in this book, but not under that exact name. If you have read through
    this book so far, you should have noticed, especially in Chapter [6](#340881_3_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” that SQL Server uses various methods to handle concurrent
    threads accessing objects. In Chapter [6](#340881_3_En_6_Chapter.xhtml), “IO-Related
    Wait Types,” we talked about mutual exclusion, which makes sure only one thread
    at a time can access a memory object. In the same chapter, we also discussed semaphores
    that implement gates to limit concurrent access to memory. Latches are another
    method to make sure concurrent threads do not threaten the consistency of in-memory
    objects, and it does this in a way that looks a lot like locking.


    ### Latch Modes


    Latches have five different modes available for accessing objects. The following
    list describes these five modes, some of which might look familiar:


    *   **SH** – The `SH` mode represents a Shared latch. This mode is used when the
    latch is reading page data.

    *   **UP** – The `UP` latch mode is used by Update latches that are used whenever
    a resource needs to be modified. By using the Update latch, the resource can still
    be read by other latches.

    *   **EX** – The `EX` latch mode, or Exclusive latch, is also used when resource
    modification occurs. Unlike the Update latch, the Exclusive latch does not allow
    read or write access by other latch modes.

    *   **KP** – The `KP` latch mode is used by Keep latches. Keep latches are used
    to protect the resource so it cannot be destroyed by the Destroy latch. They are
    compatible with every other latch mode except for the Destroy mode.

    *   **DT** – The `DT` latch mode indicates Destroy latches. Destroy latches are
    used when removing contents from memory; for instance, when SQL Server wants to
    free up a data page in-memory.


    As you see in this list, the first three modes look a lot like those used by locks
    and function more or less the same way. And just like lock modes, latch modes
    are compatible or incompatible with other latch modes. Table [9-1](#340881_3_En_9_Chapter.xhtml#Tab1)
    shows the latch compatibility matrix and whether the different modes are compatible
    with each other or not.


    Table 9-1: Latch compatibility matrix


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | **SH** | Yes | Yes | No | Yes | No |

    | **UP** | Yes | No | No | Yes | No |

    | **EX** | No | No | No | Yes | No |

    | **KP** | Yes | Yes | Yes | Yes | No |

    | **DT** | No | No | No | No | No |


    Unlike locks, which are partly controlled by Isolation levels and query hints,
    latches are completely controlled by the SQL Server engine. This means we cannot
    modify latch behavior like we can for locks.


    ### Latch Waits


    Whenever a latch has to wait because its request couldn’t be granted immediately,
    a latch wait occurs. These waits are tracked and recorded by SQL Server inside
    the `sys.dm_os_wait_stats` DMV and also inside a dedicated DMV recording specific
    latch wait times, `sys.dm_os_latch_waits`, which we will discuss in more detail
    later in this chapter.


    Figure [9-2](#340881_3_En_9_Chapter.xhtml#Fig2) shows a situation in which a latch
    wait occurs. In this example, we are waiting for a data page to be read from the
    storage subsystem into the buffer cache. Latches are used to make sure the same
    data page on the storage subsystem is not being read into the buffer cache by
    multiple threads. While the latch is waiting for the page to read into memory,
    the `PAGEIOLATCH_SH` wait type will be recorded.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig2_HTML.jpg)


    A diagram depicts how the PAGEIOLATCH subscript S H waits in the buffer cache.


    Figure 9-2: `PAGEIOLATCH_SH` occurring


    There are three different latch wait types defined in SQL Server which are accessed
    by querying the `sys.dm_os_wait_stats` DMV, and they are described in the following
    list:


    *   **Buffer latches** – Buffer latches are used to protect data pages inside
    the buffer cache. They are used not only for user-related data pages but also
    for system pages like the Page Free Space (PFS) page that tracks free space inside
    data pages. Inside the `sys.dm_os_wait_stats` DMV, they are indicated by the `PAGELATCH_[xx]`
    wait type, where the `[xx]` indicates the latch mode used.

    *   **Non-buffer latches** – These latches are used to protect data structures
    outside of the buffer cache. They are indicated by the `LATCH_[xx]` wait type
    inside the `sys.dm_os_wait_stats` DMV.

    *   **IO latches** – IO latches are used when data pages are read from the storage
    subsystem into the buffer cache. This type is indicated by the `PAGEIOLATCH_[xx]`
    wait type.


    Figure [9-3](#340881_3_En_9_Chapter.xhtml#Fig3) shows the number of different
    latch wait types recorded by the `sys.dm_os_wait_stats` DMV.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig3_HTML.png)


    A table has 5 columns titled wait type, waiting tasks count, wait time milliseconds,
    maximum wait time milliseconds, and signal wait time milliseconds in 16 rows.


    Figure 9-3: Latch wait types inside `sys.dm_os_wait_stats`


    Whenever you see the `LATCH_[xx]` wait type inside the `sys.dm_os_wait_stats`
    DMV, you are viewing a summary of the wait times for non-buffer latches. There
    are various non-buffer latch classes inside SQL Server, and to make it easier
    to analyze these non-buffer latch classes in more detail, the `sys.dm_os_latch_stats`
    DMV was added.'
  raw: '## Introduction to Latches


    Microsoft describes latches as “lightweight synchronization primitives that are
    used by the SQL Server engine to guarantee consistency of in-memory structures”
    on Books Online. This description is pretty vague, and there is a lot more depth
    to latches than the description would initially suggest.


    The first thing to understand about latches, which we touched upon in the introduction
    of this chapter, is how latches are different from locks. Latches, at first glance,
    do look similar to locks as regards their behavior and naming conventions within
    SQL Server. Just like locks, latches have various “modes,” and some of the acronyms
    to indicate the type of mode used are the same as for some lock modes. Another
    thing locks and latches have in common are both objects play a role in keeping
    SQL Server objects consistent, and the way they manage this seems identical. While
    locks are used to make sure transactions are consistent, protecting the transaction
    for the entire duration it is running, latches are only used for the duration
    they are necessary and are not bound to the duration of a transaction. During
    the duration of one transaction, many different latches will be acquired and released
    again. Figure [9-1](#340881_3_En_9_Chapter.xhtml#Fig1) visualizes this behavior.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig1_HTML.png)


    A time plot depicts the acquire and release actions of latches and locks during
    a transaction.


    Figure 9-1


    Lock-and-latch behavior during transactions


    Nerd Note


    An easy way to consider latches in a logical fashion, SQL Server uses buffer latches
    to protect pages *already in the buffer pool* and IO latches to protect pages
    *not yet loaded into the buffer pool*. This distinction will help you understand
    the different latch wait types and where the latch is happening.


    Placing and maintaining locks on SQL Server objects is an expensive operation,
    as the locks need to stay in place during the entire transaction. Because latches
    are needed for specific operations and are released again, they are less costly
    to use than locks. This explains the “lightweight” part in the latch definition
    Microsoft uses.


    The second part of the latch definition, “synchronization primitives,” we discussed
    earlier in this book, but not under that exact name. If you have read through
    this book so far, you should have noticed, especially in Chapter [6](#340881_3_En_6_Chapter.xhtml),
    “IO-Related Wait Types,” that SQL Server uses various methods to handle concurrent
    threads accessing objects. In Chapter [6](#340881_3_En_6_Chapter.xhtml), “IO-Related
    Wait Types,” we talked about mutual exclusion, which makes sure only one thread
    at a time can access a memory object. In the same chapter, we also discussed semaphores
    that implement gates to limit concurrent access to memory. Latches are another
    method to make sure concurrent threads do not threaten the consistency of in-memory
    objects, and it does this in a way that looks a lot like locking.


    ### Latch Modes


    Latches have five different modes available for accessing objects. The following
    list describes these five modes, some of which might look familiar:


    *   **SH** – The SH mode represents a Shared latch. This mode is used when the
    latch is reading page data.


    *   **UP** – The UP latch mode is used by Update latches that are used whenever
    a resource needs to be modified. By using the Update latch, the resource can still
    be read by other latches.


    *   **EX** – The EX latch mode, or Exclusive latch, is also used when resource
    modification occurs. Unlike the Update latch, the Exclusive latch does not allow
    read or write access by other latch modes.


    *   **KP** – The KP latch mode is used by Keep latches. Keep latches are used
    to protect the resource so it cannot be destroyed by the Destroy latch. They are
    compatible with every other latch mode except for the Destroy mode.


    *   **DT** – The DT latch mode indicates Destroy latches. Destroy latches are
    used when removing contents from memory; for instance, when SQL Server wants to
    free up a data page in-memory.


    As you see in this list, the first three modes look a lot like those used by locks
    and function more or less the same way. And just like lock modes, latch modes
    are compatible or incompatible with other latch modes. Table [9-1](#340881_3_En_9_Chapter.xhtml#Tab1)
    shows the latch compatibility matrix and whether the different modes are compatible
    with each other or not.


    Table 9-1


    Latch compatibility matrix


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | **SH** | Yes | Yes | No | Yes | No |

    | **UP** | Yes | No | No | Yes | No |

    | **EX** | No | No | No | Yes | No |

    | **KP** | Yes | Yes | Yes | Yes | No |

    | **DT** | No | No | No | No | No |


    Unlike locks, which are partly controlled by Isolation levels and query hints,
    latches are completely controlled by the SQL Server engine. This means we cannot
    modify latch behavior like we can for locks.


    ### Latch Waits


    Whenever a latch has to wait because its request couldn’t be granted immediately,
    a latch wait occurs. These waits are tracked and recorded by SQL Server inside
    the sys.dm_os_wait_stats DMV and also inside a dedicated DMV recording specific
    latch wait times, sys.dm_os_latch_waits, which we will discuss in more detail
    later in this chapter.


    Figure [9-2](#340881_3_En_9_Chapter.xhtml#Fig2) shows a situation in which a latch
    wait occurs. In this example, we are waiting for a data page to be read from the
    storage subsystem into the buffer cache. Latches are used to make sure the same
    data page on the storage subsystem is not being read into the buffer cache by
    multiple threads. While the latch is waiting for the page to read into memory,
    the PAGEIOLATCH_SH wait type will be recorded.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig2_HTML.jpg)


    A diagram depicts how the PAGEIOLATCH subscript S H waits in the buffer cache.


    Figure 9-2


    PAGEIOLATCH_SH occurring


    There are three different latch wait types defined in SQL Server which are accessed
    by querying the sys.dm_os_wait_stats DMV, and they are described in the following
    list:


    *   **Buffer latches** – Buffer latches are used to protect data pages inside
    the buffer cache. They are used not only for user-related data pages but also
    for system pages like the Page Free Space (PFS) page that tracks free space inside
    data pages. Inside the sys.dm_os_wait_stats DMV, they are indicated by the PAGELATCH_[xx]
    wait type, where the [xx] indicates the latch mode used.


    *   **Non-buffer** **latches** – These latches are used to protect data structures
    outside of the buffer cache. They are indicated by the LATCH_[xx] wait type inside
    the sys.dm_os_wait_stats DMV.


    *   **IO latches** – IO latches are used when data pages are read from the storage
    subsystem into the buffer cache. This type is indicated by the PAGEIOLATCH_[xx]
    wait type.


    Figure [9-3](#340881_3_En_9_Chapter.xhtml#Fig3) shows the number of different
    latch wait types recorded by the sys.dm_os_wait_stats DMV.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig3_HTML.png)


    A table has 5 columns titled wait type, waiting tasks count, wait time milliseconds,
    maximum wait time milliseconds, and signal wait time milliseconds in 16 rows.


    Figure 9-3


    Latch wait types inside sys.dm_os_wait_stats


    Whenever you see the LATCH_[xx] wait type inside the sys.dm_os_wait_stats DMV,
    you are viewing a summary of the wait times for non-buffer latches. There are
    various non-buffer latch classes inside SQL Server, and to make it easier to analyze
    these non-buffer latch classes in more detail, the sys.dm_os_latch_stats DMV was
    added.'
  trans: '

    ## 锁存器简介


    微软在联机丛书中将锁存器描述为“SQL Server 引擎用来保证内存中结构一致性的轻量级同步原语”。这个描述相当笼统，锁存器的内涵远比其初步描述所暗示的要丰富得多。


    关于锁存器，首先要理解的是它与锁的区别，我们在本章引言中已经提及。乍一看，锁存器在行为和 SQL Server 内部的命名约定上确实与锁相似。就像锁一样，锁存器有各种“模式”，并且一些表示模式类型的缩写与某些锁模式是相同的。锁与锁存器的另一个共同点是，两者都在保持
    SQL Server 对象一致性方面发挥作用，并且它们管理一致性的方式看似相同。虽然锁用于确保事务的一致性，在整个事务运行期间保护事务，但锁存器仅在必要时使用，其持续时间不与事务绑定。在一个事务期间，许多不同的锁存器会被获取和释放。图
    9-1 直观地展示了这种行为。


    ![](img/340881_3_En_9_Fig1_HTML.png)


    一个时间图描绘了事务期间锁存器和锁的获取与释放动作。


    图 9-1: 事务期间的锁与锁存器行为


    **技术要点**


    一种理解锁存器的简便逻辑方式是：SQL Server 使用缓冲区锁存器来保护`已在缓冲池中`的页面，使用 IO 锁存器来保护`尚未加载到缓冲池中`的页面。这种区分将有助于理解不同的锁存器等待类型以及锁存发生在何处。


    在 SQL Server 对象上放置和维护锁是一项开销较大的操作，因为锁需要在整个事务期间保持。由于锁存器是针对特定操作所需，并在操作后释放，因此它们的使用成本低于锁。这解释了微软对锁存器定义中“轻量级”这部分的含义。


    关于锁存器定义的第二部分——“同步原语”，我们之前在本书中讨论过，只是名称不完全相同。如果你已通读本书，你应该已经注意到，特别是在第 6 章“与 IO 相关的等待类型”中，SQL
    Server 使用了多种方法来处理并发线程访问对象。在第 6 章中，我们讨论了互斥体，它确保一次只有一个线程可以访问内存对象。在同一章中，我们还讨论了实现门以限制对内存并发访问的信号量。锁存器是确保并发线程不威胁内存中对象一致性的另一种方法，其实现方式与锁非常相似。


    ### 锁存器模式


    锁存器有五种不同的模式用于访问对象。以下列表描述了这五种模式，其中一些可能看起来很熟悉：


    *   **SH** – `SH`模式代表共享锁存器。当锁存器读取页面数据时使用此模式。

    *   **UP** – `UP`锁存器模式由更新锁存器使用，每当需要修改资源时就会使用。通过使用更新锁存器，其他锁存器仍然可以读取该资源。

    *   **EX** – `EX`锁存器模式，或称排他锁存器，也在发生资源修改时使用。与更新锁存器不同，排他锁存器不允许其他锁存器模式进行读或写访问。

    *   **KP** – `KP`锁存器模式由保持锁存器使用。保持锁存器用于保护资源，使其不会被销毁锁存器销毁。它们与除销毁模式外的所有其他锁存器模式兼容。

    *   **DT** – `DT`锁存器模式表示销毁锁存器。销毁锁存器用于从内存中移除内容；例如，当 SQL Server 想要释放内存中的数据页时。


    如你所见，前三种模式与锁使用的模式非常相似，功能也大致相同。并且，就像锁模式一样，锁存器模式彼此之间是兼容或不兼容的。表 9-1 显示了锁存器兼容性矩阵，以及不同模式彼此是否兼容。


    表 9-1: 锁存器兼容性矩阵


    |   | SH | UP | EX | KP | DT |

    | --- | --- | --- | --- | --- | --- |

    | **SH** | 是 | 是 | 否 | 是 | 否 |

    | **UP** | 是 | 否 | 否 | 是 | 否 |

    | **EX** | 否 | 否 | 否 | 是 | 否 |

    | **KP** | 是 | 是 | 是 | 是 | 否 |

    | **DT** | 否 | 否 | 否 | 否 | 否 |


    与部分由隔离级别和查询提示控制的锁不同，锁存器完全由 SQL Server 引擎控制。这意味着我们不能像修改锁那样修改锁存器行为。


    ### 锁存器等待


    每当锁存器因请求无法立即授予而必须等待时，就会发生锁存器等待。这些等待由 SQL Server 在`sys.dm_os_wait_stats` DMV 中跟踪和记录，同时也在一个专门的记录特定锁存器等待时间的
    DMV `sys.dm_os_latch_waits`中记录，我们将在本章后面更详细地讨论。


    图 9-2 展示了一个发生锁存器等待的情况。在此示例中，我们正在等待将数据页从存储子系统读取到缓冲区缓存中。使用锁存器是为了确保同一个存储子系统上的数据页不会被多个线程同时读入缓冲区缓存。当锁存器等待页面读入内存时，将记录`PAGEIOLATCH_SH`等待类型。


    ![](img/340881_3_En_9_Fig2_HTML.jpg)


    一个图表描绘了在缓冲区缓存中如何发生 PAGEIOLATCH subscript S H 等待。


    图 9-2: `PAGEIOLATCH_SH`的发生


    SQL Server 中定义了三种不同的锁存器等待类型，通过查询`sys.dm_os_wait_stats` DMV 可访问，它们在以下列表中描述：


    *   **缓冲区锁存器** – 缓冲区锁存器用于保护缓冲区缓存内的数据页。它们不仅用于用户相关的数据页，也用于系统页，如跟踪数据页内可用空间的页可用空间（PFS）页。在`sys.dm_os_wait_stats`
    DMV 中，它们由`PAGELATCH_[xx]`等待类型表示，其中`[xx]`表示所使用的锁存器模式。

    *   **非缓冲区锁存器** – 这些锁存器用于保护缓冲区缓存之外的数据结构。在`sys.dm_os_wait_stats` DMV 中，它们由`LATCH_[xx]`等待类型表示。

    *   **IO 锁存器** – 当数据页从存储子系统读取到缓冲区缓存时，会使用 IO 锁存器。此类型由`PAGEIOLATCH_[xx]`等待类型表示。


    图 9-3 显示了`sys.dm_os_wait_stats` DMV 记录的不同锁存器等待类型的数量。


    ![](img/340881_3_En_9_Fig3_HTML.png)


    一个表格有 5 列，标题为等待类型、等待任务计数、等待时间毫秒、最大等待时间毫秒和信号等待时间毫秒，共 16 行。


    图 9-3: `sys.dm_os_wait_stats`中的锁存器等待类型


    当你在`sys.dm_os_wait_stats` DMV 中看到`LATCH_[xx]`等待类型时，你正在查看非缓冲区锁存器等待时间的摘要。SQL Server
    内部有各种非缓冲区锁存器类，为了更便于详细分析这些非缓冲区锁存器类，新增了`sys.dm_os_latch_stats` DMV。

    '
- fmt: '## Page-Latch Contention


    One of the most common problems encountered regarding latches is page-latch contention.
    Page-latch contention occurs when concurrent latches try to acquire a latch, but
    there already is a latch in place with an incompatible mode, causing a latch wait.
    Because this problem can occur on every SQL Server instance subjected to concurrent
    workloads, I want to provide you with the knowledge needed to identify page-latch
    contention before we discuss the various latch-related wait types.


    There are a variety of scenarios which cause page-latch contention to occur, and
    even though we have little influence on the latch behavior (remember, latches
    are placed and held by an internal process inside the SQL Server engine), the
    design of our database will impact latch behavior. One common cause for latch
    contention is when concurrent queries access so-called hotspots inside your database.
    For example, a small table holding a few rows which need to be accessed by an
    application for configuration information can be a potential hotspot. If many
    concurrent requests need data from this table, latches will probably run into
    other, incompatible latches, causing latch waits to occur and slowing down the
    application’s performance. I have seen this problem occurring various times for
    different clients, making this a real-world scenario, and I will show you an example
    of page-latch contention based on one of those cases.


    In this case, the client ran an application and at specific times would select
    large amounts of data and place the results into temporary tables. The application
    used a large amount of concurrent connections to speed up the creation of these
    temporary tables. To show the effects of this example, I will reproduce the scenario
    using `Ostress` to select rows from a table and then insert them into a temporary
    table.


    As input for the `Ostress` utility, I save a `.sql` file named `latch_contention.sql`
    with the query shown in Listing 9-1.


    ```

    SELECT TOP (20000) *

    INTO #tmptable

    FROM Sales.SalesOrderDetail;

    Listing 9-1

    Select rows from Sales.SalesOrderDetail into a temporary table

    ```


    This query selects the top 20,000 rows from the `Sales.SalesOrderDetail` table
    inside the `GalacticWorks` database and inserts them into a temporary table (`#tmptable`).


    The next step is to use `Ostress` and execute the `latch_contention.sql` script
    with 300 concurrent connections. The `Ostress` command line I use is shown here:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\latch_contention.sql" -n300 -r1 -q

    ```


    While the `Ostress` utility is running, let’s look at the `sys.dm_os_waiting_tasks`
    DMV to see if anything is running into waits. Figure 9-5 shows a part of the results
    that are returned when the query that follows is executed:


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig5_HTML.png)


    A table has 4 columns titled session i d, wait duration milliseconds, wait type,
    and resource description, along with its corresponding parameters in 10 rows.


    Figure 9-5


    `PAGELATCH_[XX]` waits


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    We are running into a lot of `PAGELATCH_[XX]` waits, indicating a latch is waiting
    to update a page in-memory. The `resource_description` column is useful here since
    it indicates the page ID the latch wants to access. The first number represents
    the database ID, which is the `tempdb` database. The second number indicates the
    file ID (the `tempdb` database on my test system consists of multiple data files).
    Finally, the last number indicates the page ID.


    Because we are running inserts into a temporary table using many concurrent connections,
    we need to find, or allocate, data pages with free space to hold our rows inside
    the `tempdb`. All this space usage needs to be updated, and latches are used to
    make sure only one thread gets access at a time.


    This is a classic example of the page-latch contention inside the `tempdb` database
    which can occur when many concurrent queries are creating objects inside `tempdb`.
    One way to resolve this specific case of latch contention is by adding more (equally
    sized) `tempdb` data files. Fortunately, starting with SQL Server 2016, the installation
    included the ability to create multiple `tempdb` files during setup.


    Additional `tempdb` improvements since 2016 include the following:


    *   Adding trace flags `T1117` and `T1118` as default behavior (2016)

    *   Improvements to optimistic latching (2017)

    *   Use of round-robin for `PFS` pages (2017)

    *   Memory-optimized `tempdb` metadata (2019)

    *   Concurrent `PFS` updates (2019)

    *   System page-latch (`GAM`, `SGAM`) concurrent improvements (2022)


    Now that we have discussed what latches are and how they work and looked at an
    example of latch contention, let’s move on and look at latch-related wait types.


    ## PAGELATCH_[xx]


    The first latch-related wait type for review is the `PAGELATCH_[xx]` wait type,
    where the `[xx]` indicates the latch mode used (e.g., `SH` for Shared). Since
    we already discussed the various latch modes in the introduction of this chapter,
    we won’t describe them again in this chapter.


    ### What Is the PAGELATCH_[xx] Wait Type?


    `PAGELATCH_[xx]` waits occur whenever a latch must wait before it can access a
    page in-memory. The main cause for these waits are other latches already in place
    on the page and are incompatible with the latch mode of our request. Just like
    with locks, the latch will wait until the incompatible latch is removed from the
    page. As long as the incompatible latch is in place, our request will record `PAGELATCH_[xx]`
    wait time. Figure 9-6 shows a graphical representation of a `PAGELATCH_UP` wait
    occurring. I used a cogwheel icon to indicate a latch is already in place on the
    page to avoid confusion with SQL Server locks.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig6_HTML.jpg)


    A diagram depicts how the requests from the exclusive latch and the updated page
    latch wait on the buffer cache.


    Figure 9-6


    `PAGELATCH_UP` wait occurring


    It’s easy to confuse `PAGELATCH_[xx]` waits with `PAGEIOLATCH_[xx]` waits. Even
    though they look alike in name, they are completely different latch wait types.
    The former indicates access to pages already in-memory, while the latter indicates
    pages are being read from disk into memory. We will go into detail regarding the
    `PAGEIOLATCH_[xx]` wait type later in this chapter.


    ### sys.dm_os_latch_stats


    The `sys.dm_os_latch_stats` closely resembles the `sys.dm_os_wait_stats` DMV.
    The `sys.dm_os_latch_stats` DMV shows the number of times a wait inside the latch
    class occurred, the total wait time, and the maximum wait time. The only column
    missing compared to the `sys.dm_os_wait_stats` DMV is `signal_wait_time_ms`; this
    is missing because latches do not follow the same execution process (`RUNNING`,
    `SUSPENDED`, `RUNNABLE`) as requests do.


    Figure 9-4 shows a part of the `sys.dm_os_latch_stats` DMV. There are many more
    non-buffer latch classes, totaling 179, in SQL Server 2022.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig4_HTML.png)


    A table has 4 columns titled latch class, waiting requests count, wait time milliseconds,
    and max wait time milliseconds, along with its corresponding parameters in 16
    rows.


    Figure 9-4


    `sys.dm_os_latch_waits`


    Just like the `sys.dm_os_wait_stats` DMV, the `sys.dm_os_latch_stats` DMV is cumulative
    since the start of the SQL Server service. This means it is reset to 0 when your
    SQL Server service is restarted. We also use the `DBCC SQLPERF` command against
    the `sys.dm_os_latch_stats` DMV to reset the wait times manually by executing
    this command:


    ```

    DBCC SQLPERF(''sys.dm_os_latch_stats'', CLEAR)

    ```'
  raw: '### sys.dm_os_latch_stats


    The sys.dm_os_latch_stats closely resembles the sys.dm_os_wait_stats DMV. The
    sys.dm_os_latch_stats DMV shows the number of times a wait inside the latch class
    occurred, the total wait time, and the maximum wait time. The only column missing
    compared to the sys.dm_os_wait_stats DMV is signal_wait_time_ms; this is missing
    because latches do not follow the same execution process (RUNNING, SUSPENDED,
    RUNNABLE) as requests do.


    Figure [9-4](#340881_3_En_9_Chapter.xhtml#Fig4) shows a part of the sys.dm_os_latch_stats
    DMV. There are many more non-buffer latch classes, totaling 179, in SQL Server
    2022.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig4_HTML.png)


    A table has 4 columns titled latch class, waiting requests count, wait time milliseconds,
    and max wait time milliseconds, along with its corresponding parameters in 16
    rows.


    Figure 9-4


    sys.dm_os_latch_waits


    Just like the sys.dm_os_wait_stats DMV, the sys.dm_os_latch_stats DMV is cumulative
    since the start of the SQL Server service. This means it is reset to 0 when your
    SQL Server service is restarted. We also use the DBCC SQLPERF command against
    the sys.dm_os_latch_stats DMV to reset the wait times manually by executing this
    command:


    ```

    DBCC SQLPERF(''sys.dm_os_latch_stats'', CLEAR)

    ```


    ### Page-Latch Contention


    One of the most common problems encountered regarding latches is page-latch contention.
    Page-latch contention occurs when concurrent latches try to acquire a latch, but
    there already is a latch in place with an incompatible mode, causing a latch wait.
    Because this problem can occur on every SQL Server instance subjected to concurrent
    workloads, I want to provide you with the knowledge needed to identify page-latch
    contention before we discuss the various latch-related wait types.


    There are a variety of scenarios which cause page-latch contention to occur, and
    even though we have little influence on the latch behavior (remember, latches
    are placed and held by an internal process inside the SQL Server engine), the
    design of our database will impact latch behavior. One common cause for latch
    contention is when concurrent queries access so-called hotspots inside your database.
    For example, a small table holding a few rows which need to be accessed by an
    application for configuration information can be a potential hotspot. If many
    concurrent requests need data from this table, latches will probably run into
    other, incompatible latches, causing latch waits to occur and slowing down the
    application’s performance. I have seen this problem occurring various times for
    different clients, making this a real-world scenario, and I will show you an example
    of page-latch contention based on one of those cases.


    In this case, the client ran an application and at specific times would select
    large amounts of data and place the results into temporary tables. The application
    used a large amount of concurrent connections to speed up the creation of these
    temporary tables. To show the effects of this example, I will reproduce the scenario
    using Ostress to select rows from a table and then insert them into a temporary
    table.


    As input for the Ostress utility, I save a .sql file named latch_contention.sql
    with the query shown in Listing [9-1](#340881_3_En_9_Chapter.xhtml#PC2).


    ```

    SELECT TOP (20000) *

    INTO #tmptable

    FROM Sales.SalesOrderDetail;

    Listing 9-1

    Select rows from Sales.SalesOrderDetail into a temporary table

    ```


    This query selects the top 20,000 rows from the Sales.SalesOrderDetail table inside
    the GalacticWorks database and inserts them into a temporary table (#tmptable).


    The next step is to use Ostress and execute the latch_contention.sql script with
    300 concurrent connections. The Ostress command line I use is shown here:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\latch_contention.sql" -n300 -r1 -q

    ```


    While the Ostress utility is running, let’s look at the sys.dm_os_waiting_tasks
    DMV to see if anything is running into waits. Figure [9-5](#340881_3_En_9_Chapter.xhtml#Fig5)
    shows a part of the results that are returned when the query that follows is executed:


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig5_HTML.png)


    A table has 4 columns titled session i d, wait duration milliseconds, wait type,
    and resource description, along with its corresponding parameters in 10 rows.


    Figure 9-5


    PAGELATCH_[XX] waits


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    We are running into a lot of PAGELATCH_[XX] waits, indicating a latch is waiting
    to update a page in-memory. The resource_description column is useful here since
    it indicates the page ID the latch wants to access. The first number represents
    the database ID, which is the tempdb database. The second number indicates the
    file ID (the tempdb database on my test system consists of multiple data files).
    Finally, the last number indicates the page ID.


    Because we are running inserts into a temporary table using many concurrent connections,
    we need to find, or allocate, data pages with free space to hold our rows inside
    the tempdb. All this space usage needs to be updated, and latches are used to
    make sure only one thread gets access at a time.


    This is a classic example of the page-latch contention inside the tempdb database
    which can occur when many concurrent queries are creating objects inside tempdb.
    One way to resolve this specific case of latch contention is by adding more (equally
    sized) tempdb data files. Fortunately, starting with SQL Server 2016, the installation
    included the ability to create multiple tempdb files during setup.


    Additional tempdb improvements since 2016 include the following:


    *   Adding trace flags T1117 and T1118 as default behavior (2016)


    *   Improvements to optimistic latching (2017)


    *   Use of round-robin for PFS pages (2017)


    *   Memory-optimized tempdb metadata (2019)


    *   Concurrent PFS updates (2019)


    *   System page-latch (GAM, SGAM) concurrent improvements (2022)


    Now that we have discussed what latches are and how they work and looked at an
    example of latch contention, let’s move on and look at latch-related wait types.


    ## PAGELATCH_[xx]


    The first latch-related wait type for review is the **PAGELATCH_[xx]** wait type,
    where the [xx] indicates the latch mode used (e.g., SH for Shared). Since we already
    discussed the various latch modes in the introduction of this chapter, we won’t
    describe them again in this chapter.


    ### What Is the PAGELATCH_[xx] Wait Type?


    PAGELATCH_[xx] waits occur whenever a latch must wait before it can access a page
    in-memory. The main cause for these waits are other latches already in place on
    the page and are incompatible with the latch mode of our request. Just like with
    locks, the latch will wait until the incompatible latch is removed from the page.
    As long as the incompatible latch is in place, our request will record PAGELATCH_[xx]
    wait time. Figure [9-6](#340881_3_En_9_Chapter.xhtml#Fig6) shows a graphical representation
    of a PAGELATCH_UP wait occurring. I used a cogwheel icon to indicate a latch is
    already in place on the page to avoid confusion with SQL Server locks.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig6_HTML.jpg)


    A diagram depicts how the requests from the exclusive latch and the updated page
    latch wait on the buffer cache.


    Figure 9-6


    PAGELATCH_UP wait occurring


    It’s easy to confuse PAGELATCH_[xx] waits with PAGEIOLATCH_[xx] waits. Even though
    they look alike in name, they are completely different latch wait types. The former
    indicates access to pages already in-memory, while the latter indicates pages
    are being read from disk into memory. We will go into detail regarding the PAGEIOLATCH_[xx]
    wait type later in this chapter.'
  trans: '

    ## 页闩锁争用


    在讨论与闩锁相关的各种等待类型之前，我想先向您提供识别页闩锁争用所需的知识，因为这个问题可能出现在任何承受并发工作负载的 SQL Server 实例上，是有关闩锁时遇到的最常见问题之一。


    导致页闩锁争用发生的场景多种多样，尽管我们对闩锁行为的影响有限（请记住，闩锁是由 SQL Server 引擎内部进程放置和持有的），但我们的数据库设计会影响闩锁行为。闩锁争用的一个常见原因是并发查询访问数据库内部的所谓“热点”。例如，一个存储少量行、需要被应用程序访问以获取配置信息的小表，就可能是一个潜在的热点。如果许多并发请求需要来自该表的数据，闩锁很可能会遇到其他不兼容的闩锁，导致发生闩锁等待并减慢应用程序的性能。我已多次看到不同客户遇到这个问题，这是一个真实存在的场景。我将基于其中一个案例，向您展示一个页闩锁争用的示例。


    在这个案例中，客户运行一个应用程序，在特定时间会选取大量数据并将其放入临时表中。该应用程序使用了大量并发连接以加速这些临时表的创建。为了展示此示例的效果，我将使用
    `Ostress` 来重现该场景，从一个表中选择行，然后将它们插入到一个临时表中。


    作为 `Ostress` 实用程序的输入，我保存了一个名为 `latch_contention.sql` 的 `.sql` 文件，其中包含如清单 9-1 所示的查询。


    ```

    SELECT TOP (20000) *

    INTO #tmptable

    FROM Sales.SalesOrderDetail;

    清单 9-1

    从 Sales.SalesOrderDetail 中选择行插入临时表

    ```


    此查询从 `GalacticWorks` 数据库内的 `Sales.SalesOrderDetail` 表中选择前 20,000 行，并将它们插入到一个临时表
    (`#tmptable`) 中。


    下一步是使用 `Ostress`，并通过 300 个并发连接执行 `latch_contention.sql` 脚本。我使用的 `Ostress` 命令行如下所示：


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\latch_contention.sql" -n300 -r1 -q

    ```


    当 `Ostress` 实用程序运行时，让我们查看 `sys.dm_os_waiting_tasks` DMV，看看是否有任务正在等待。图 9-5 显示了执行以下查询时返回的部分结果：


    ![](img/340881_3_En_9_Fig5_HTML.png)


    一个表格有四列，标题为会话 i d、等待持续时间毫秒、等待类型和资源描述，以及其对应的 10 行参数。


    图 9-5


    `PAGELATCH_[XX]` 等待


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```


    我们遇到了大量的 `PAGELATCH_[XX]` 等待，这表明一个闩锁正在等待更新内存中的一个页面。`resource_description` 列在这里很有用，因为它指示了闩锁想要访问的页面
    ID。第一个数字代表数据库 ID，即 `tempdb` 数据库。第二个数字表示文件 ID（我的测试系统上的 `tempdb` 数据库由多个数据文件组成）。最后，最后一个数字表示页面
    ID。


    由于我们正在使用许多并发连接向临时表插入数据，我们需要在 `tempdb` 中找到或分配具有空闲空间的数据页面来容纳我们的行。所有这些空间使用情况都需要更新，并使用闩锁来确保一次只有一个线程能够访问。


    这是 `tempdb` 数据库中页闩锁争用的一个经典示例，当许多并发查询在 `tempdb` 内创建对象时可能发生。解决这种特定闩锁争用情况的一种方法是添加更多（大小相等的）`tempdb`
    数据文件。幸运的是，从 SQL Server 2016 开始，安装程序包含了在安装过程中创建多个 `tempdb` 文件的功能。


    自 2016 年以来，`tempdb` 的其他改进包括：


    *   将跟踪标志 `T1117` 和 `T1118` 添加为默认行为（2016）

    *   乐观闩锁的改进（2017）

    *   对 `PFS` 页面使用轮询机制（2017）

    *   内存优化的 `tempdb` 元数据（2019）

    *   并发 `PFS` 更新（2019）

    *   系统页闩锁（`GAM`、`SGAM`）并发改进（2022）


    既然我们已经讨论了什么是闩锁、它们如何工作，并查看了一个闩锁争用的示例，让我们继续探讨与闩锁相关的等待类型。


    ## PAGELATCH_[xx]


    第一个要回顾的与闩锁相关的等待类型是 `PAGELATCH_[xx]` 等待类型，其中 `[xx]` 表示使用的闩锁模式（例如，`SH` 表示共享模式）。由于我们已经在本章引言中讨论了各种闩锁模式，因此本章不再重复描述。


    ### 什么是 PAGELATCH_[xx] 等待类型？


    `PAGELATCH_[xx]` 等待发生在闩锁必须等待才能访问内存中的页面时。这些等待的主要原因是页面上已存在其他闩锁，并且这些闩锁与我们请求的闩锁模式不兼容。与锁类似，闩锁将一直等待，直到页面上的不兼容闩锁被移除。只要不兼容的闩锁存在，我们的请求就会记录
    `PAGELATCH_[xx]` 等待时间。图 9-6 显示了正在发生的 `PAGELATCH_UP` 等待的图形化表示。我使用齿轮图标表示页面上已经存在一个闩锁，以避免与
    SQL Server 锁混淆。


    ![](img/340881_3_En_9_Fig6_HTML.jpg)


    一个图表描绘了独占闩锁和更新页闩锁的请求如何在缓冲区缓存上等待。


    图 9-6


    `PAGELATCH_UP` 等待发生


    很容易将 `PAGELATCH_[xx]` 等待与 `PAGEIOLATCH_[xx]` 等待混淆。尽管它们的名称相似，但它们是完全不同的闩锁等待类型。前者表示访问已在内存中的页面，而后者表示正在将页面从磁盘读入内存。我们将在本章后面详细讨论
    `PAGEIOLATCH_[xx]` 等待类型。


    ### sys.dm_os_latch_stats


    `sys.dm_os_latch_stats` DMV 与 `sys.dm_os_wait_stats` DMV 非常相似。`sys.dm_os_latch_stats`
    DMV 显示了在闩锁类内发生等待的次数、总等待时间和最大等待时间。与 `sys.dm_os_wait_stats` DMV 相比，唯一缺少的列是 `signal_wait_time_ms`；之所以缺少，是因为闩锁不遵循与请求相同的执行过程（`RUNNING`、`SUSPENDED`、`RUNNABLE`）。


    图 9-4 显示了 `sys.dm_os_latch_stats` DMV 的一部分。在 SQL Server 2022 中，有更多非缓冲区闩锁类，总计 179
    个。


    ![](img/340881_3_En_9_Fig4_HTML.png)


    一个表格有四列，标题为闩锁类、等待请求计数、等待时间毫秒和最大等待时间毫秒，以及其对应的 16 行参数。


    图 9-4


    `sys.dm_os_latch_waits`


    与 `sys.dm_os_wait_stats` DMV 一样，`sys.dm_os_latch_stats` DMV 是自 SQL Server 服务启动以来累积的。这意味着当您的
    SQL Server 服务重新启动时，它会被重置为 0。我们也可以对 `sys.dm_os_latch_stats` DMV 使用 `DBCC SQLPERF`
    命令，通过执行以下命令手动重置等待时间：


    ```

    DBCC SQLPERF(''sys.dm_os_latch_stats'', CLEAR)

    ```

