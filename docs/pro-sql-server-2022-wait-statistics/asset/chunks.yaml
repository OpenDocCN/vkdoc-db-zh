- fmt: '### LATCH_[xx] 示例


    有一种锁存竞争情况会导致 `LATCH_[xx]` 等待。这个问题发生在具有浅层 B-树结构的小型表上（我们将在本节稍后详细解释 B-树结构），并伴随大量并发插入操作。此类表的典型用例可能是作为队列使用的消息表，在消息发送后会被截断。代码清单
    [9-2](#340881_3_En_9_Chapter.xhtml#PC16) 中的脚本将创建一个名为 `Insert_Test2` 的测试表，以及该表上的一个非聚集索引。


    ```sql

    -- 创建表

    CREATE TABLE Insert_Test2

    (ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50));

    -- 在ID列上创建非聚集索引

    CREATE NONCLUSTERED INDEX idx_ID

    ON Insert_Test2 (ID);

    ```

    *代码清单 9-2*

    *包含非聚集索引的竞争测试表*


    `ID` 列的数据类型为 `UNIQUEIDENTIFIER`，以确保生成随机、非连续的值。通过在此列上创建非聚集索引，插入操作将随机分布在与非聚集索引关联的
    B-树中。


    表创建完成后，我们启动 `Ostress`，其工作负载由向该表插入单行数据的查询组成。我们使用 500 个并发连接运行此工作负载，每个连接执行查询 5000
    次。接下来的命令展示了使用的 `Ostress` 命令：


    ```bash

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test2 (ID, RandomData) VALUES (NEWID(), CONVERT(varchar(50),
    NEWID()))" -n500 -r5000 -q

    ```


    在工作负载运行期间，我们使用以下查询查询 `sys.dm_os_waiting_tasks` DMV，以便 `resource_description` 列能够适应截图：


    ```sql

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    图 9-16 显示了我的测试 SQL Server 实例上此查询的部分结果。


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig16_HTML.png)


    *图 9-16*


    *LATCH_SH 等待*


    `sys.dm_os_waiting_tasks` DMV 的 `resource_description` 列有助于识别与 `LATCH_[xx]` 等待关联的锁存类。在本例中，我们遇到的是
    `ACCESS_METHODS_HOBT_VIRTUAL_ROOT` 锁存类。


    接下来，我们可以查询 `sys.dm_os_latch_stats` DMV，以找出此特定锁存类的等待次数和总等待时间，使用以下查询：


    ```sql

    SELECT *

    FROM sys.dm_os_latch_stats

    WHERE latch_class = ''ACCESS_METHODS_HOBT_VIRTUAL_ROOT'';

    ```


    图 [9-17](#340881_3_En_9_Chapter.xhtml#Fig17) 显示了在我的测试 SQL Server 实例上此查询的结果。


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig17_HTML.png)


    *图 9-17*


    *ACCESS_METHOD_HOBT_VIRTUAL_ROOT 锁存等待*


    识别出导致 `LATCH_SH` 等待的锁存类后，我们开始对其进行故障排除。根据联机丛书，`ACCESS_METHODS_HOBT_VIRTUAL_ROOT`
    锁存类用于“同步访问内部 B-树的根页抽象”。尽管描述相当有限，但它为故障排除此特定问题提供了从何处开始查找的思路。本书附录 III 中包含了联机丛书描述的不同锁存类列表，并在可能的情况下提供了额外信息。


    显然，与索引关联的 B-树结构发生了某些情况。由于我们在创建的表上只有一个非聚集索引 (`idx_ID`)，我们假设该索引的 B-树发生了某些情况。让我们通过查看图
    [9-18](#340881_3_En_9_Chapter.xhtml#Fig18) 来回顾一下 B-树索引结构的样子。


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig18_HTML.jpg)


    *图 9-18*


    *B-树索引结构*


    图 [9-18](#340881_3_En_9_Chapter.xhtml#Fig18) 中的 B-树结构是浅的，因为它只有三层。第一层是根节点（第 0 层），第二层是中间层（第
    1 层），最后在 B-树底部是保存索引键的数据页（或者对于聚集索引，是整行数据）。在图 [9-18](#340881_3_En_9_Chapter.xhtml#Fig18)
    中，我们有一层中间节点，但根据索引内的数据页数量，可能存在更多中间层。当表非常小时，数据页可能直接位于中间层，而不是 B-树中更靠下的层级。


    每当 SQL Server 需要遍历 B-树时，它都会从根节点内的根页开始。根页将帮助导航到中间层中保存其所需信息的索引页。如果该页不在中间层，而是在叶层，则中间页会将请求进一步向下发送到
    B-树。叶层是索引中的最后一级；它不能再向下导航。图 [9-19](#340881_3_En_9_Chapter.xhtml#Fig19) 显示了 SQL
    Server 如何遍历 B-树。本例中，我使用数字作为索引键以便更容易理解。


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig19_HTML.jpg)


    *图 9-19*


    *B-树导航*


    当数据添加到索引时，索引将在叶层分配新的数据页来保存索引键（请记住，聚集索引在叶层保存行）。每当插入足够的数据并且需要创建新的索引级别时，就会发生根页拆分，以便访问索引中的新级别。此根页拆分并不是将您的根页切成两个新的，始终只有一个根页，但它需要更新，以便我们可以使用它来遍历
    B-树以访问新数据。


    `ACCESS_METHODS_HOBT_VIRTUAL_ROOT` 锁存类是与在 B-树中创建另一个级别时发生的根页拆分相关联的锁存等待类。每当发生根页拆分时，B-树将获取一个排他锁存。所有想要向下遍历
    B-树的线程都必须等待根页拆分完成，因为它们使用与排他锁存不兼容的共享锁存。但是，在我们运行 `Ostress` 工作负载时，我们看到的是 `LATCH_SH`
    等待，而不是排他锁存，因为我们正在执行插入。原因很简单：在 SQL Server 知道在索引中放置新索引键的位置之前，它必须首先遍历 B-树以定位新索引键需要放置的位置，并且它在导航期间使用共享锁存。


    为了向您展示在我们的 `Ostress` 工作负载期间非聚集索引添加了另一个级别，我将使用 `INDEXPROPERTY` 函数来检索我们创建的非聚集索引的深度。


    首先，让我们使用 `TRUNCATE` 命令清空 `Insert_Test2` 表：


    ```sql

    TRUNCATE TABLE Insert_Test2;

    ```


    如果我们在该表的非聚集索引上使用 `INDEXPROPERTY` 函数，我们将看到 B-树的当前深度。接下来的查询展示了如何使用 `INDEXPROPERTY`
    函数来检索此信息：


    ```sql

    SELECT INDEXPROPERTY(OBJECT_ID(''Insert_Test2''), ''idx_ID'', ''indexDepth'');

    ```


    由于我们截断了表，且表中尚无行，因此索引深度应为 0。'
  raw: '### LATCH_[xx] Example


    There is one case of latch contention which will result in LATCH_[xx] waits. This
    problem occurs on small tables with a shallow B-tree structure (we will explain
    more about the B-tree structure a bit further down in this section) during a large
    volume of concurrent insert operations. A typical use case of such a table could
    be a messaging table acting as a queue and is truncated when messages are sent.
    The script in Listing [9-2](#340881_3_En_9_Chapter.xhtml#PC16) will create a test
    table, named Insert_Test2, together with a non-clustered index on the table.


    ```

    -- Create the table

    CREATE TABLE Insert_Test2

    (ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50));

    -- Create a non-clustered index on the ID column

    CREATE NONCLUSTERED INDEX idx_ID

    ON Insert_Test2 (ID);

    Listing 9-2

    Test contention table with non-clustered index

    ```


    The ID column has a data type of UNIQUEIDENTIFIER to make sure random, nonsequential
    values are generated. By creating a non-clustered index on this column, inserts
    will happen randomly across the B-tree associated with the non-clustered index.


    Once the table is created, we start Ostress with a workload consisting of a query
    which will insert a single row inside the table. We run the workload with 500
    concurrent connections, each connection executing the query 5000 times. The command
    that follows shows the Ostress command:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -Q"INSERT INTO Insert_Test2 (ID, RandomData) VALUES (NEWID(), CONVERT(varchar(50),
    NEWID()))" -n500 -r5000 -q

    ```


    While the workload is running, we query the sys.dm_os_waiting_tasks DMV using
    the following query, so the resource_description column will fit on the screenshot:


    ```

    SELECT

    session_id,

    wait_duration_ms,

    wait_type,

    resource_description

    FROM sys.dm_os_waiting_tasks;

    ```


    Figure 9-16 shows a part of the results of this query on my test SQL Server instance.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig16_HTML.png)


    A table has four columns titled session i d, wait duration milliseconds, wait
    type, and resource description, along with their corresponding entries in 11 rows.


    Figure 9-16


    LATCH_SH waits


    The resource_description column of the sys.dm_os_waiting_tasks DMV helps identify
    the latch class associated with the LATCH_[xx] wait. In this case, we are running
    into the ACCESS_METHODS_HOBT_VIRTUAL_ROOT latch class.


    Next we can query the sys.dm_os_latch_stats DMV to find out the number of waits
    and the total wait time for this specific latch class using the following query:


    ```

    SELECT *

    FROM sys.dm_os_latch_stats

    WHERE latch_class = ''ACCESS_METHODS_HOBT_VIRTUAL_ROOT'';

    ```


    Figure [9-17](#340881_3_En_9_Chapter.xhtml#Fig17) shows the results of this query
    on my test SQL Server instance.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig17_HTML.png)


    A table has four columns titled latch class, waiting requests count, wait time
    in milliseconds, and max wait time in milliseconds, along with its corresponding
    entries in a row.


    Figure 9-17


    ACCESS_METHOD_HOBT_VIRTUAL_ROOT latch wait


    With the identified latch class causing the LATCH_SH wait to occur, we start troubleshooting
    it. According to Books Online, the ACCESS_METHODS_HOBT_VIRTUAL_ROOT latch class
    is used to “synchronize access to the root page abstraction of an internal B-tree.”
    Even though the description is pretty limited, it gives an idea of where to start
    looking when troubleshooting this specific problem. I included a list of the different
    latch classes that are described on Books Online, including some extra information
    whenever possible, in Appendix III of this book.


    Apparently, something happened to the B-tree structures associated with indexes.
    Since we only have one non-clustered index on the table we created (idx_ID), we
    assume something happened to the B-tree of that index. Let’s refresh our memory
    a little bit about what a B-tree index structure looks like by looking at Figure
    [9-18](#340881_3_En_9_Chapter.xhtml#Fig18).


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig18_HTML.jpg)


    A diagram depicts the root node divided into two intermediate levels. Each level
    has three data pages on the leaf level.


    Figure 9-18


    B-tree index structure


    The B-tree structure we see in Figure [9-18](#340881_3_En_9_Chapter.xhtml#Fig18)
    is shallow, as it only has three levels. The first one is the Root Node (level
    0), the second is the Intermediate level (level 1), and finally at the bottom
    of the B-tree are the data pages holding the index keys (or in case of a clustered
    index, the entire row). In Figure [9-18](#340881_3_En_9_Chapter.xhtml#Fig18),
    we have one level of intermediate nodes, but depending on the number of data pages
    inside the index, it is possible to have more Intermediate levels. When the table
    is very small, it is possible to have the data pages inside the Intermediate level
    instead of a level further down the B-tree.


    Whenever SQL Server needs to navigate through the B-tree, it will start at the
    Root page inside the Root Node. The Root page will help navigate down to the index
    page which holds the information it needs inside the Intermediate level. In turn,
    the Intermediate page sends the request further down the B-tree if the page is
    not inside the Intermediate level but is rather at the Leaf level. The Leaf level
    is the last level in an index; it cannot navigate further down than that. Figure
    [9-19](#340881_3_En_9_Chapter.xhtml#Fig19) shows how SQL Server navigates through
    the B-tree. In this case, I used numbers as the index key to make it a bit easier.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig19_HTML.jpg)


    A diagram depicts how the root node with 120 index keys is divided into two intermediate
    levels. Each level has 60 index keys and is equally divided into three data pages.


    Figure 9-19


    B-tree navigation


    When data is added to the index, the index will allocate new data pages at the
    Leaf level to hold the index keys (remember, clustered indexes hold rows at the
    Leaf level). Whenever enough data is inserted and a new index level needs to be
    created, a Root page split occurs so the new level inside the index is accessed.
    This Root page split doesn’t cut your Root page into two new ones, there is always
    one Root page, but it needs to be updated so we can use it to navigate through
    the B-tree to the new data.


    The ACCESS_METHODS_HOBT_VIRTUAL_ROOT latch class is the latch wait class that
    is associated whenever a Root page split occurs in order to create another level
    inside the B-tree. Whenever a Root page split occurs, the B-tree will acquire
    an Exclusive latch. All threads wanting to navigate down the B-tree will have
    to wait for the Root page split to finish since they use Shared latches which
    are incompatible with the Exclusive latch. But we see LATCH_SH waits occurring
    when running our Ostress workload, instead of seeing Exclusive latches, since
    we are performing inserts. The reason why is pretty simple: before SQL Server
    knows where to place the new index key inside the index, it first has to navigate
    through the B-tree to locate where the new index key needs to be placed, and it
    uses Shared latches during its navigation.


    To show you another level was added to the non-clustered index during our Ostress
    workload, I will use the INDEXPROPERTY function to retrieve the depth of the non-clustered
    index we created.


    First, let’s empty our Insert_Test2 table using the TRUNCATE command:


    ```

    TRUNCATE TABLE Insert_Test2;

    ```


    If we use the INDEXPROPERTY function against the non-clustered index on this table,
    we see the current depth of the B-tree. The query which follows shows how to use
    the INDEXPROPERTY function to retrieve this information:


    ```

    SELECT INDEXPROPERTY(OBJECT_ID(''Insert_Test2''), ''idx_ID'', ''indexDepth'');

    ```


    Since we truncated the table, the index depth should be 0 as there are no rows
    inside the table yet.'
