  trans: '

    ### 请求


    请求是 SQL Server 执行引擎对由会话提交的查询的内部表示。同样，我们将使用一个 DMV（动态管理视图）来查询有关请求的信息；在本例中，我们查询 `sys.dm_exec_requests`
    DMV：


    ```

    SELECT *

    FROM sys.dm_exec_requests;

    ```


    图 1-7 显示了此查询结果的一部分。


    ![](img/340881_3_En_1_Fig7_HTML.png)


    SQL Server 2022 结果窗口的屏幕截图有 6 列：会话 ID、请求 ID、开始时间、状态、命令和 SQL 句柄。它有 15 行，会话 ID 为
    1 到 15。列名中使用下划线代替空格。


    图 1-7


    sys.dm_exec_requests 结果


    `sys.dm_exec_requests` DMV 是一个功能极其强大的工具，用于排查与性能相关的问题。此 DMV 包含大量关于当前查询的信息，并有助于相对快速地检测性能瓶颈。因为
    `sys.dm_exec_requests` DMV 也显示等待统计信息，我们将在第 2 章“查询 SQL Server 等待统计信息”中对它进行详细探讨。


    ### 任务


    任务代表 SQLOS（SQL 操作系统）要执行的工作，但任务本身并不执行任何工作。当 SQL Server 接收到一个请求时，会创建一个或多个任务来完成该请求。为一个请求生成的任务数量取决于查询请求是使用并行方式执行还是串行方式执行。


    我们将使用 `sys.dm_os_tasks` DMV 来查询任务信息：


    ```

    SELECT *

    FROM sys.dm_os_tasks;

    ```


    图 1-8 显示了此查询结果的一部分。


    ![](img/340881_3_En_1_Fig8_HTML.png)


    SQL Server 2022 结果窗口的屏幕截图有 7 列：任务地址、任务状态、上下文切换计数、挂起 I/O 计数、挂起 I/O 字节数、挂起 I/O 字节平均值和调度程序
    ID。它有 15 行，具有不同的任务地址。列名中使用下划线代替空格。


    图 1-8


    sys.dm_os_tasks 结果


    当您查询 `sys.dm_os_tasks` DMV 时，您会发现它返回很多结果，即使在用户活动很少的服务器上也是如此。这是因为 SQL Server 也为其自身进程使用任务。


    此 DMV 中有一些有趣的列值得探讨，以了解不同 DMV 之间的关系：


    *   `session_id` – 请求此任务的会话 ID。

    *   `worker_address` – 与此任务关联的工作线程的内存地址。

    *   `task_address` – 此任务的内存地址。

    *   `task_state` – 可能的值包括“挂起”、“可运行”、“运行中”、“已暂停”、“完成”和“自旋循环”。


    `task_state` 列最常见的值是“运行中”、“可运行”和“已暂停”。


    ### 工作线程


    创建的每个任务都会分配一个工作线程，然后工作线程执行任务请求的操作。


    极客备注


    工作线程本身并不执行工作；而是向 Windows 操作系统请求一个线程来执行工作。为了简单起见，并且由于 Windows 线程在 SQLOS 之外运行，我已将此步骤从图
    1-5 中省略了。如果您感兴趣，可以通过查询 `sys.dm_os_threads` 来访问有关 Windows 操作系统线程的信息。


    当任务请求工作线程时，SQL Server 将首先查找一个空闲的工作线程分配给该任务。如果未找到空闲工作线程，并且工作线程数已达到最大值，则该请求将进入队列，直到某个工作线程完成其当前工作并变得可用。


    SQL Server 可用于处理请求的工作线程数量是有限制的。此数量在启动期间由 SQL Server 自动计算和配置。我们可以使用以下公式自己计算最大工作线程数：


    | 32 位系统且逻辑处理器数 <= 4 | 256 个工作线程 |

    | --- | --- |

    | 32 位系统且逻辑处理器数 > 4 | 256 + ((逻辑处理器数 – 4) * 8) |

    | 64 位系统且逻辑处理器数 <= 4 | 512 个工作线程 |

    | 64 位系统且逻辑处理器数 > 4 | 512 + ((逻辑处理器数 – 4) * 16) |


    **示例**：对于一个有 16 个逻辑处理器的 64 位系统，我们使用前面的公式计算最大工作线程数：


    ```

    512 + ((# of logical processors – 4) * 16) =

    512 + ((16 – 4) * 16) =

    512 + (12 * 16) =

    512 + (192) = 704

    ```


    这将分配最多 704 个工作线程。


    工作线程数的默认值为 0，允许 SQL Server 在启动时使用前面的公式设置最大工作线程数。我们可以通过更改 SQL Server 属性中的 `最大工作线程数`
    选项来修改默认值，如图 1-9 所示。


    ![](img/340881_3_En_1_Fig9_HTML.png)


    SQL Server 属性窗口的屏幕截图，左侧窗格选中了“处理器”页，下方显示连接详细信息和属性。一个箭头指向“线程”部分下值为 0 的“最大工作线程数”框。


    图 1-9


    服务器属性中的处理器页


    一般来说，您不需要更改 `最大工作线程数` 选项，我的建议是保持原样，因为它只应在非常特殊的情况下更改（我将在第 5 章“与 CPU 相关的等待类型”中讨论一个潜在情况，届时我们将谈到
    `THREADPOOL` 等待）。


    需要记住的一点是，工作线程需要内存才能工作。对于 32 位系统，每个工作线程需要 512 KB；64 位系统则需要为每个工作线程分配 2048 KB。因此，更改工作线程数可能会影响
    SQL Server 的内存需求。这并不意味着您需要为工作线程准备大量内存——SQL Server 会在 15 分钟后或当 SQL Server 面临严重内存压力时自动销毁空闲的工作线程。


    SQL Server 提供了一个 DMV 供我们查询有关工作线程的信息，即 `sys.dm_os_workers`。图 1-10 显示了此查询的部分结果：


    ```

    SELECT *

    FROM sys.dm_os_workers;

    ```


    ![](img/340881_3_En_1_Fig10_HTML.png)


    SQL Server 2022 结果窗口的屏幕截图有 8 列：工作线程地址、状态、是否为抢占式、是否为纤程、是否异常、是否处于 C++ 异常中、是否为致命异常、是否在
    catch 块中。它有 16 行，具有不同的工作线程地址。列名中使用下划线代替空格。


    图 1-10


    查询 sys.dm_os_workers 的结果


    `sys.dm_os_workers` DMV 大而复杂，许多列被 Microsoft 标记为“仅限内部使用”。然而，`task_address` 和 `scheduler_address`
    这两列可用于连接我们迄今为止讨论的不同 DMV。


    工作线程在暴露于处理器时会经历不同的阶段，我们在检查 `sys.dm_os_workers` DMV 中的 `state` 列时可以观察到：


    *   `INIT` – 工作线程已由 SQLOS 初始化。

    *   `RUNNING` – 工作线程当前正在处理器上执行工作。

    *   `RUNNABLE` – 工作线程已准备好在处理器上运行。

    *   `SUSPENDED` – 工作线程正在等待某个资源。


    工作线程在执行工作时经历的状态是本书的主要关注点。每当工作线程不处于“运行中”状态时，它就必须等待，SQLOS 会记录这些信息，从而让我们深入了解工作线程一直在等待什么以及等待了多久。

