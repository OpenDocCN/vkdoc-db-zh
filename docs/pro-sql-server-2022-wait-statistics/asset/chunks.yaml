  trans: '

    ## 设置事件过滤器


    目前这就是我们需要配置的全部内容，因此我们单击“确定”关闭此对话框并保存 `Extended Event` 会话。


    默认情况下，这个新建的 `Extended Event` 会话在创建后不会自动启动。要启动会话，我们必须再次打开 `Sessions` 文件夹，方法是在 `SQL
    Server Management Studio` 中导航到 `Management` ➤ `Extended Events` 文件夹。我们右键单击刚刚创建的
    `Extended Event` 会话，然后选择 `Start Session` 选项，如图 2-24 所示。


    ![](img/340881_3_En_2_Fig24_HTML.jpg)


    启动会话选择路径的屏幕截图。Management 文件夹打开 Extended Event，其中包含 Session 文件夹。该文件夹中的“等待统计”菜单高亮显示了“启动会话”选项。


    图 2-24

    启动 `Extended Event` 会话


    启动 `Extended Event` 会话后，它将开始收集信息。我们通过选择 `Watch Live Data` 选项来查看此信息。这将在 `SQL Server
    Management Studio` 中打开一个新选项卡，我们可以在其中监视 `Extended Event` 会话。如果您担心查看实时数据的开销，可以选择将
    `Extended Event` 会话写入事件文件，方法是在 `Extended Event` 会话的 `Data Storage` 页面中添加文件位置。


    对于此示例，我对 `GalacticWorks` 数据库执行了一个简单的查询，以返回 `Person.Person` 表中的所有内容，如下所示：


    ```sql

    SELECT *

    FROM Person.Person;

    ```


    在设置 `Extended Event` 会话中的过滤器时，我非常注意使其与我在 `SQL Server Management Studio` 中执行查询的选项卡的
    `session ID` 相匹配。`session ID` 可以通过查看选项卡上括号内的数字找到。`Extended Events Live Data` 选项卡返回了如图
    2-25 所示的信息。


    ![](img/340881_3_En_2_Fig25_HTML.png)


    实时数据窗口的屏幕截图。上部区域显示事件，底部区域提供所选事件的信息。


    图 2-25

    来自 `Extended Event` 会话的实时等待统计信息


    如图 2-25 所示，我们的请求遇到了 `NETWORK_IO` 等待类型。这是 `Extended Events` 中的等待名称与等待统计 DMV 中的名称不匹配的一个例子。`NETWORK_IO`
    等待名称与 `SQLOS` 使用的 `ASYNC_NETWORK_IO` 等待类型相同。我们可以在 `sql_text` 字段中查看我们执行的查询。


    在 `Extended Event` 会话中，还有许多其他可以包含的全局字段可能值得捕获，例如 `Execution Plan` 句柄或 `Task Execution
    Time`。全局字段将在返回 `Extended Event` 会话信息时提供额外的详细信息，为您提供大量详尽的细节。


    如果出于某种原因，您不想使用 `SSMS` 来创建和运行 `Extended Event` 会话，或者您正在运行 `SQL Server 2008`，则可以使用
    `T-SQL` 来创建和配置一个。要使用 `T-SQL` 创建与上面相同的 `Extended Event` 会话，请执行清单 2-3 中的查询。


    ```sql

    CREATE EVENT SESSION [WaitStats Query] ON SERVER

    ADD EVENT sqlos.wait_info

    (

    ACTION(sqlserver.sql_text)

    WHERE ([sqlserver].[session_id]=(76))

    )

    ADD TARGET package0.event_file

    (

    SET filename = N''E:\Data\WaitStats_XE.xel'', metadatafile = N''E:\Data\WaitStats_XE.xem''

    );

    ```

    清单 2-3

    创建等待统计 `Extended Event` 会话


    ### 极客笔记


    我们在前面的脚本中通过设置 `metadatafile` 参数包含了元数据文件。如果您运行的是 `SQL Server 2012` 或更高版本，则不再需要此参数。


    记录 `Extended Event` 会话的最简单方法是将其保存到文件；在本例中，我的文件名是 `E:\Data\WaitStats_XE.xel`（`SQL
    Server` 会向文件名添加唯一的数字标识符；在本例中，实际文件名是 `WaitStats_XE_0_132969501905230000.xel`）。我还包含了对
    `session ID` `76` 的过滤器，以捕获该会话生成的等待统计信息。


    接下来我们要做的是启动 `Extended Event` 会话，我们通过执行 `ALTER EVENT SESSION` 命令来完成：


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = start;

    ```


    然后，我们在我们正在过滤的会话下执行与原始示例中相同的查询。让 `Extended Event` 会话运行一小段时间后，我们可以使用 `ALTER EVENT
    SESSION` 命令停止它：


    ```sql

    ALTER EVENT SESSION "WaitStats Query" ON SERVER STATE = stop;

    ```


    停止 `Extended Event` 会话后，我们接下来将文件中的信息（作为 `XML`）导入到一个表中，以查看会话捕获的内容；我们使用 `sys.fn_xe_file_target_read_file`
    函数来完成此操作。然后，我们解析 `XML` 信息，以更可读的格式返回结果。清单 2-4 中的查询可用于读取 `Extended Event` 文件，将其导入临时表，并将结果作为行返回。


    ```sql

    -- Check if temp table is present

    -- Drop if exist

    IF OBJECT_ID(''tempdb..#XE_Data'') IS NOT NULL

    DROP TABLE #XE_Data

    -- Create temp table to hold raw XE data

    CREATE TABLE #XE_Data

    (

    XE_Data XML

    );

    GO

    -- Write contents of the XE file

    -- into our table

    INSERT INTO #XE_Data

    (

    XE_Data

    )

    SELECT  CAST (event_data AS XML)

    FROM sys.fn_xe_file_target_read_file

    (

    ''E:\Data\WaitStats_XE_0_132969501905230000.xel'',   ''E:\Data\WaitStats_XE_0_132969501905230000.xem'',   null,   null   );

    GO

    -- Query information from our temp table

    SELECT

    XE_Data.value (''(/event/@timestamp)[1]'', ''DATETIME'') AS ''Date/Time'',

    XE_Data.value (''(/event/data[@name="opcode"]/text)[1]'', ''VARCHAR(100)'') AS
    ''Operation'',

    XE_Data.value (''(/event/data[@name="wait_type"]/text)[1]'',

    ''VARCHAR(100)'') AS ''Wait Type'',

    XE_Data.value (''(/event/data[@name="duration"]/value)[1]'', ''BIGINT'') AS ''Wait
    Time'',

    XE_Data.value (''(/event/data[@name="signal_duration"]/value)[1]'',

    ''BIGINT'') AS ''Signal Wait Time'',

    XE_Data.value (''(/event/action[@name="sql_text"]/value)[1]'', ''VARCHAR(100)'')
    AS ''Query''

    FROM #XE_Data

    ORDER BY ''Date/Time'' ASC;

    ```

    清单 2-4

    将扩展事件文件作为行返回


    清单 2-4 中的查询结果如图 2-26 所示。


    ![](img/340881_3_En_2_Fig26_HTML.png)


    扩展事件文件查询输出的屏幕截图。表格输出有 7 列和 14 行。这些列列出了日期和时间、操作、等待类型、等待时间、信号等待时间和查询。


    图 2-26

    清单 2-4 中查询的结果


    大多数列根据它们返回的行数据就不言自明。有两列值得额外解释：`Operation` 列和 `Wait Time` 列。`Operation` 列将向您显示等待事件的开始或结束。`Wait
    Time` 列将以毫秒为单位返回等待时间，但它只会在操作结束时被记录。

