    In the explanation of the RESOURCE_SEMAPHORE wait type, we discussed what resource
    semaphores are and what they do. For the explanation of the RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait type, we are going to dive a little deeper into the inner workings of the
    resource semaphore.


    You should think of resource semaphores as “gateways” that throttle direct access
    to memory resources, as there are different tasks a resource semaphore can perform.
    In the previous section, we discussed the resource semaphores are responsible
    for granting memory for certain operations, like sorts and joins. We also noted
    that there are two resource semaphores responsible for granting this memory –
    the regular resource semaphore handles queries requesting 5 MB or more memory,
    and the small resource semaphore handles memory grants for queries requesting
    less than 5 MB memory.


    The resource semaphores related to the RESOURCE_SEMAPHORE_QUERY_COMPILE wait type
    are responsible for memory grants needed during the compilation process of a query,
    *excluding* the memory needed for query execution. Just like the resource semaphores
    in the previous section, the ones responsible for memory grants during the compilation
    process have different gateways. Figure [6-24](#340881_3_En_6_Chapter.xhtml#Fig24)
    shows the different gateways for the compilation-memory resource semaphore.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig24_HTML.png)


    A pyramid illustration defines the increase in query compile memory with the number
    of concurrent compilations. It has 4 segments. From the top, big, medium, small,
    and no limit.


    Figure 6-24


    Compilation-memory resource semaphore


    By default there are three gateways: small, medium, and big. Depending on the
    amount of memory the compilation of a query needs, it is assigned to one of the
    three. If the amount of memory needed for compilation is less than the memory
    threshold for the small gateway, the query does not pass through a gateway. The
    amount of concurrent compilations, or queries, allowed to move through the gateway
    simultaneously is calculated by the number of logical processors available for
    your SQL Server instance. For example, if your SQL Server instance has 4 logical
    processors, the small gateway will allow 16 concurrent compilations and the medium
    gateway 4\. The big gateway will always allow only one query at a time to compile.


    The memory threshold for the small gateway is static, but for the medium and big
    gateways, the thresholds are dynamic. This means the compilation memory needed
    to reach the medium or big gateways will change during the runtime of your SQL
    Server instance.


    The whole purpose of these gateways is to ensure the need for compilation memory
    stays under control. This avoids out-of-memory situations in cases where many
    large compilation-memory requests would automatically be granted and would drain
    the SQL Server instance of its memory.


    Before we continue, let’s review an example of a query compilation.


    Say we have a query that needs 1560 KB of compilation memory. The query will start
    by requesting a gateway. Our small gateway has a threshold of 370 KB, and our
    medium gateway has a threshold of 5346 KB, so this query will end up in the small
    gateway. If there are any queries currently in a queue at the small gateway, the
    query will enter the queue and wait until its turn, all the time logging RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait time. While the query is compiled, the amount of memory used during the compilation
    is tracked; if the query ends up using more memory and reaches the threshold of
    the medium gateway, it is moved to the medium gateway. When the query compilation
    is finished, it is removed from the gateway.


    We can access information about the resource semaphore gateways from inside SQL
    Server by executing the DBCC MEMORYSTATUS command. Somewhere in the enormous amount
    of results, you will find the gateway information as shown in Figure [6-25](#340881_3_En_6_Chapter.xhtml#Fig25).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig25_HTML.png)


    A screenshot with 3 tables. It lists the small, medium, and big gateways along
    with the values. The configured units on each gateway are selected.


    Figure 6-25


    Gateway information returned by the DBCC MEMORYSTATUS command


    Let’s go through the results that are returned for the gateways.


    The Configured Units row returns the maximum amount of concurrent compilations
    allowed for this gateway. This is determined by the number of logical processors
    available for your SQL Server instance. Because my test SQL Server has 4 logical
    processors, I have 16 slots for the small gateway (4 × logical number of processors)
    and 4 for the medium gateway. The Available Units row shows the number of currently
    free slots for this gateway, while the Acquires row shows the slots currently
    taken by compilations. The number of queries that have to wait for a free slot
    is shown in the Waiters row. The Threshold value is the amount of memory in bytes
    that a query compilation would need in order to enter the gateway. For my test
    SQL Server system, the small gateway has a threshold of 380,000 bytes, or 371
    KB. As you might notice in Figure [6-25](#340881_3_En_6_Chapter.xhtml#Fig25),
    the medium gateway has a threshold of −1\. This is because of the dynamic nature
    of the thresholds of the medium and big gateways. Since there is no activity at
    the gateway below the medium one, there is no need to set a threshold yet.'
  trans: '### 什么是 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型？


    在解释 `RESOURCE_SEMAPHORE` 等待类型时，我们讨论了资源信号量是什么以及它们的作用。对于 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    等待类型的解释，我们将更深入地探讨资源信号量的内部工作原理。


    你应该将资源信号量视为限制对内存资源直接访问的“网关”，因为资源信号量可以执行不同的任务。在上一节中，我们讨论了资源信号量负责为某些操作（如排序和连接）授予内存。我们还指出，有两个资源信号量负责授予此内存——常规资源信号量处理请求
    `5 MB` 或更多内存的查询，而小型资源信号量处理请求少于 `5 MB` 内存的查询的内存授予。


    与 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型相关的资源信号量负责查询*编译*过程中所需的内存授予，*不包括*查询执行所需的内存。就像上一节中的资源信号量一样，负责编译过程中内存授予的信号量也有不同的网关。图
    6-24 显示了编译内存资源信号量的不同网关。


    ![](img/340881_3_En_6_Fig24_HTML.png)


    一个金字塔图示定义了查询编译内存随并发编译数的增加而增长。它分为 4 个部分。从顶部开始依次是：大、中、小、无限制。


    图 6-24


    编译内存资源信号量


    默认有三个网关：`small`、`medium` 和 `big`。根据查询编译所需的内存量，它会被分配到这三个网关之一。如果编译所需的内存量小于 `small`
    网关的内存阈值，则查询不通过任何网关。允许同时通过网关的并发编译（或查询）数量由你的 SQL Server 实例可用的 `逻辑处理器` 数量计算得出。例如，如果你的
    SQL Server 实例有 `4` 个逻辑处理器，则 `small` 网关将允许 `16` 个并发编译，`medium` 网关允许 `4` 个。`big`
    网关始终一次只允许一个查询进行编译。


    `small` 网关的内存阈值是静态的，但对于 `medium` 和 `big` 网关，阈值是动态的。这意味着达到 `medium` 或 `big` 网关所需的编译内存在你的
    SQL Server 实例运行期间会发生变化。


    这些网关的全部目的是确保对编译内存的需求得到控制。这可以避免在大量大型编译内存请求被自动授予并耗尽 SQL Server 实例内存的情况下，出现内存不足的情况。


    在继续之前，让我们回顾一个查询编译的例子。


    假设我们有一个查询需要 `1560 KB` 的编译内存。该查询将首先请求一个网关。我们的 `small` 网关阈值是 `370 KB`，`medium` 网关阈值是
    `5346 KB`，因此这个查询最终会进入 `small` 网关。如果当前 `small` 网关有任何查询正在排队，该查询将进入队列并等待轮到它，同时一直记录
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间。在查询编译期间，编译过程中使用的内存量会被跟踪；如果查询最终使用了更多内存并达到了
    `medium` 网关的阈值，它会被移动到 `medium` 网关。当查询编译完成时，它会从网关中移除。


    我们可以通过在 SQL Server 内部执行 `DBCC MEMORYSTATUS` 命令来访问有关资源信号量网关的信息。在大量的结果中某处，你将找到如图
    6-25 所示的网关信息。


    ![](img/340881_3_En_6_Fig25_HTML.png)


    一个包含 3 个表格的截图。它列出了小、中、大网关及其对应的值。每个网关的“已配置单元”被选中。


    图 6-25


    `DBCC MEMORYSTATUS` 命令返回的网关信息


    让我们看一下为网关返回的结果。


    `Configured Units` 行返回此网关允许的最大并发编译数。这由你的 SQL Server 实例可用的 `逻辑处理器` 数量决定。因为我的测试
    SQL Server 有 `4` 个逻辑处理器，所以我有 `16` 个 `small` 网关槽位（`4` × 逻辑处理器数量），`medium` 网关有 `4`
    个槽位。`Available Units` 行显示此网关当前空闲的槽位数，而 `Acquires` 行显示当前被编译占用的槽位数。必须等待空闲槽位的查询数量显示在
    `Waiters` 行。`Threshold` 值是以字节为单位的内存量，查询编译需要达到此值才能进入网关。对于我的测试 SQL Server 系统，`small`
    网关的阈值为 `380,000 字节` 或 `371 KB`。你可能注意到图 6-25 中，`medium` 网关的阈值为 `-1`。这是因为 `medium`
    和 `big` 网关的阈值是动态的。由于 `medium` 以下网关没有活动，因此暂时无需设置阈值。'
- fmt: '## RESOURCE_SEMAPHORE_QUERY_COMPILE Example


    To show you an example of `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits in action,
    I am going to execute the query in Listing 6-12 multiple times, using many concurrent
    connections. The query is a dynamic query that selects a random row from two joined
    tables inside the `AdventureWorks` database. In this case, it doesn’t matter if
    any results are returned or not – the thing we are trying to achieve here is the
    creation of compilation-memory contention.


    ```sql

    DECLARE @ID VARCHAR(250)

    DECLARE @SQL VarChar(MAX)

    SET @ID = FLOOR(RAND()*(20000-1)+1);

    SET @SQL =

    ''

    SELECT

    '' + @ID + '',

    SUM(soh.SubTotal),

    COUNT(soh.SubTotal)

    FROM sales.SalesOrderHeader soh

    INNER JOIN person.Person p

    ON soh.SalesPersonID = p.BusinessEntityID

    WHERE p.BusinessEntityID = '' + @ID + ''

    ''

    EXEC (@SQL)

    ```


    Listing 6-12: `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait query


    Before we execute the query with many concurrent connections, let’s check how
    much compilation memory would be needed. We can do this by executing the query
    in Listing 6-12 in `SQL Server Management Studio` and enabling the actual execution
    plan.


    After executing the query and opening the actual execution plan, we need to look
    at the `CompileMemory` property. You can access these properties by showing the
    Properties window (**View** ➤ **Properties Window**) or by pressing `F4` and selecting
    the `SELECT` operator. Figure 6-26 shows the actual execution plan properties
    on my test `SQL Server`.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig26_HTML.jpg)


    A screenshot of a misc table. It lists cached plain size, cardinality estimation
    models, compile memory, compile time, and more. Compile memory is selected.


    Figure 6-26: Miscellaneous execution plan properties


    The value returned by the `CompileMemory` property is the amount of compile memory
    needed expressed in `KB`. For this query, `464 KB` is needed for compilation.
    The threshold for the small gateway on my test `SQL Server` was `371 KB`, so I
    am pretty sure the query will access the small gateway.


    Again, we will use the `Ostress` utility to generate the needed concurrent connections
    to execute the query. I saved the query in Listing 6-12 to the `resource_semaphore_compile.sql`
    file and then used that file as input for the following `Ostress` command. Because
    the query is very fast, I let every connection execute it 100 times so that we
    have some time to look at the wait statistics.


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\resource_semaphore_compile.sql" -n200 -r100 -q

    ```


    After a few seconds, many `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits can be seen
    in the `sys.dm_os_waiting_tasks` DMV, as shown in Figure 6-27.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig27_HTML.png)


    A screenshot of a table with 10 rows and 5 columns. It lists the waiting task
    address, session i d, exec context i d, wait duration, and wait type. The file
    0 x 00000 20 E 9 B 6 E B C 28 is selected.


    Figure 6-27: `RESOURCE_SEMAPHORE_QUERY_COMPILE` waits


    If we now execute the `DBCC MEMORYSTATUS` command, we should be able to find out
    at what gateway the compilation contention is occurring. Figure 6-28 shows the
    gateway output of the `DBCC MEMORYSTATUS` command on my test `SQL Server`.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig28_HTML.jpg)


    A screenshot of 3 tables. It lists the small, medium, and big gateways along with
    the values. The configured units on each gateway are selected.


    Figure 6-28: `DBCC MEMORYSTATUS` during compilation contention


    As you can see in Figure 6-28, if we look at the number of `Available Units`,
    there are no available slots left for new compilation-memory requests. As a matter
    of fact, we have `50` compilation-memory requests waiting in the resource semaphore
    queue. Also note that the threshold of the medium gateway has now changed from
    `-1` to `14,022,656 bytes` (`13,694 KB`). Now that contention is occurring on
    a lower gateway, the threshold for the medium gateway is dynamically determined,
    even though there are no compilation-memory requests being processed by this gateway.


    ## Lowering `RESOURCE_SEMAPHORE_QUERY_COMPILE` Waits


    The methods you can use to lower the wait times of the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type are in many cases the same as those that you would use to lower or resolve
    `RESOURCE_SEMAPHORE` waits. Just like the `RESOURCE_SEMAPHORE` wait type, the
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait type is memory related, so if you can
    increase the total amount of memory available for query compilation, chances are
    you will lower or resolve `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait times.


    Because we can access very specific information about the gateways of the resource
    semaphore dealing with the compilation memory by using the `DBCC MEMORYSTATUS`
    command, a good first step is to analyze the usage patterns of the gateways. If
    you notice one specific gateway constantly has waiting memory requests, then the
    memory threshold of that gateway, or the maximum allowed amount of concurrent
    compilation-memory requests, should give you some hints about the root cause.
    For instance, if you notice many queued compilation-memory requests at the big
    gateway (which only allows one query at a time), the source of your `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait times may be the queries requesting a large amount of compilation memory.
    Another cause may be a large number of concurrent queries all needing access to
    the small gateway, which was the case in our example, causing a queue at the gateway.


    In these cases, you should find the specific queries causing the queues at the
    gateways and try to optimize them, either by lowering the amount of compilation
    memory or by making sure fewer compilations happen. The latter can be done by
    making sure your queries are being parameterized correctly. Queries that generate
    ad hoc plans every time they are executed can be a cause of `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits, especially if they are executed very frequently and concurrently.


    If your `SQL Server` is under memory pressure, it is also possible to see `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    waits occur. This happens because of the dynamic compilation-memory thresholds
    of the medium and big gateways. If `SQL Server` is under memory pressure, the
    thresholds of both these gateways will lower, giving more queries the chance to
    use the medium or big gateways. But because the medium and big gateways allow
    fewer concurrent compilations, in the small gateway, the available concurrent
    slots will be filled faster.


    Just as with the `RESOURCE_SEMAPHORE` wait type, you can use the resource governor
    to split workloads into specific resource pools. Each resource pool will have
    its own resource semaphores responsible for granting compilation memory, making
    it possible to split heavy compilation-memory usage across multiple resource pools.


    ## `RESOURCE_SEMAPHORE_QUERY_COMPILE` Summary


    Just like the resource semaphores that are needed to grant memory requests for
    specific query operations, resource semaphores exist for access to compilation
    memory. These resource semaphores throttle access to compilation memory through
    the usage of gateways. When a query is compiled, it will approach a gateway based
    on the amount of compilation memory it needs. The gateway can then grant the compilation
    memory requested or put the request in a queue if there are more requests that
    concurrently want to access the gateway. When a query is waiting inside one of
    these queues, the `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait type is recorded.


    Resolving or lowering `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait times is commonly
    achieved by either freeing up more memory or by lowering the compilation-memory
    needs of queries.'
  raw: '### RESOURCE_SEMAPHORE_QUERY_COMPILE Example


    To show you an example of RESOURCE_SEMAPHORE_QUERY_COMPILE waits in action, I
    am going to execute the query in Listing [6-12](#340881_3_En_6_Chapter.xhtml#PC15)
    multiple times, using many concurrent connections. The query is a dynamic query
    that selects a random row from two joined tables inside the AdventureWorks database.
    In this case, it doesn’t matter if any results are returned or not – the thing
    we are trying to achieve here is the creation of compilation-memory contention.


    ```

    DECLARE @ID VARCHAR(250)

    DECLARE @SQL VarChar(MAX)

    SET @ID = FLOOR(RAND()*(20000-1)+1);

    SET @SQL =

    ''

    SELECT

    '' + @ID + '',

    SUM(soh.SubTotal),

    COUNT(soh.SubTotal)

    FROM sales.SalesOrderHeader soh

    INNER JOIN person.Person p

    ON soh.SalesPersonID = p.BusinessEntityID

    WHERE p.BusinessEntityID = '' + @ID + ''

    ''

    EXEC (@SQL)

    Listing 6-12

    RESOURCE_SEMAPHORE_QUERY_COMPILE wait query

    ```


    Before we execute the query with many concurrent connections, let’s check how
    much compilation memory would be needed. We can do this by executing the query
    in Listing [6-12](#340881_3_En_6_Chapter.xhtml#PC15) in SQL Server Management
    Studio and enabling the actual execution plan.


    After executing the query and opening the actual execution plan, we need to look
    at the CompileMemory property. You can access these properties by showing the
    Properties window (View ➤ Properties Window) or by pressing F4 and selecting the
    SELECT operator. Figure [6-26](#340881_3_En_6_Chapter.xhtml#Fig26) shows the actual
    execution plan properties on my test SQL Server.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig26_HTML.jpg)


    A screenshot of a misc table. It lists cached plain size, cardinality estimation
    models, compile memory, compile time, and more. Compile memory is selected.


    Figure 6-26


    Miscellaneous execution plan properties


    The value returned by the CompileMemory property is the amount of compile memory
    needed expressed in KB. For this query, 464 KB is needed for compilation. The
    threshold for the small gateway on my test SQL Server was 371 KB, so I am pretty
    sure the query will access the small gateway.


    Again, we will use the Ostress utility to generate the needed concurrent connections
    to execute the query. I saved the query in Listing [6-12](#340881_3_En_6_Chapter.xhtml#PC15)
    to the resource_semaphore_compile.sql file and then used that file as input for
    the following Ostress command. Because the query is very fast, I let every connection
    execute it 100 times so that we have some time to look at the wait statistics.


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\resource_semaphore_compile.sql" -n200 -r100 -q

    ```


    After a few seconds, many RESOURCE_SEMAPHORE_QUERY_COMPILE waits can be seen in
    the sys.dm_os_waiting_tasks DMV, as shown in Figure [6-27](#340881_3_En_6_Chapter.xhtml#Fig27).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig27_HTML.png)


    A screenshot of a table with 10 rows and 5 columns. It lists the waiting task
    address, session i d, exec context i d, wait duration, and wait type. The file
    0 x 00000 20 E 9 B 6 E B C 28 is selected.


    Figure 6-27


    RESOURCE_SEMAPHORE_QUERY_COMPILE waits


    If we now execute the DBCC MEMORYSTATUS command, we should be able to find out
    at what gateway the compilation contention is occurring. Figure [6-28](#340881_3_En_6_Chapter.xhtml#Fig28)
    shows the gateway output of the DBCC MEMORYSTATUS command on my test SQL Server.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig28_HTML.jpg)


    A screenshot of 3 tables. It lists the small, medium, and big gateways along with
    the values. The configured units on each gateway are selected.


    Figure 6-28


    DBCC MEMORYSTATUS during compilation contention


    As you can see in Figure [6-28](#340881_3_En_6_Chapter.xhtml#Fig28), if we look
    at the number of Available Units, there are no available slots left for new compilation-memory
    requests. As a matter of fact, we have 50 compilation-memory requests waiting
    in the resource semaphore queue. Also note that the threshold of the medium gateway
    has now changed from −1 to 14,022,656 bytes (13,694 KB). Now that contention is
    occurring on a lower gateway, the threshold for the medium gateway is dynamically
    determined, even though there are no compilation-memory requests being processed
    by this gateway.


    ### Lowering RESOURCE_SEMAPHORE_QUERY_COMPILE Waits


    The methods you can use to lower the wait times of the RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait type are in many cases the same as those that you would use to lower or resolve
    RESOURCE_SEMAPHORE waits. Just like the RESOURCE_SEMAPHORE wait type, the RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait type is memory related, so if you can increase the total amount of memory
    available for query compilation, chances are you will lower or resolve RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait times.


    Because we can access very specific information about the gateways of the resource
    semaphore dealing with the compilation memory by using the DBCC MEMORYSTATUS command,
    a good first step is to analyze the usage patterns of the gateways. If you notice
    one specific gateway constantly has waiting memory requests, then the memory threshold
    of that gateway, or the maximum allowed amount of concurrent compilation-memory
    requests, should give you some hints about the root cause. For instance, if you
    notice many queued compilation-memory requests at the big gateway (which only
    allows one query at a time), the source of your RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait times may be the queries requesting a large amount of compilation memory.
    Another cause may be a large number of concurrent queries all needing access to
    the small gateway, which was the case in our example, causing a queue at the gateway.


    In these cases, you should find the specific queries causing the queues at the
    gateways and try to optimize them, either by lowering the amount of compilation
    memory or by making sure fewer compilations happen. The latter can be done by
    making sure your queries are being parameterized correctly. Queries that generate
    ad hoc plans every time they are executed can be a cause of RESOURCE_SEMAPHORE_QUERY_COMPILE
    waits, especially if they are executed very frequently and concurrently.


    If your SQL Server is under memory pressure, it is also possible to see RESOURCE_SEMAPHORE_QUERY_COMPILE
    waits occur. This happens because of the dynamic compilation-memory thresholds
    of the medium and big gateways. If SQL Server is under memory pressure, the thresholds
    of both these gateways will lower, giving more queries the chance to use the medium
    or big gateways. But because the medium and big gateways allow fewer concurrent
    compilations, in the small gateway, the available concurrent slots will be filled
    faster.


    Just as with the RESOURCE_SEMAPHORE wait type, you can use the resource governor
    to split workloads into specific resource pools. Each resource pool will have
    its own resource semaphores responsible for granting compilation memory, making
    it possible to split heavy compilation-memory usage across multiple resource pools.


    ### RESOURCE_SEMAPHORE_QUERY_COMPILE Summary


    Just like the resource semaphores that are needed to grant memory requests for
    specific query operations, resource semaphores exist for access to compilation
    memory. These resource semaphores throttle access to compilation memory through
    the usage of gateways. When a query is compiled, it will approach a gateway based
    on the amount of compilation memory it needs. The gateway can then grant the compilation
    memory requested or put the request in a queue if there are more requests that
    concurrently want to access the gateway. When a query is waiting inside one of
    these queues, the RESOURCE_SEMAPHORE_QUERY_COMPILE wait type is recorded.


    Resolving or lowering RESOURCE_SEMAPHORE_QUERY_COMPILE wait times is commonly
    achieved by either freeing up more memory or by lowering the compilation-memory
    needs of queries.'
  trans: '## RESOURCE_SEMAPHORE_QUERY_COMPILE 示例


    为了向你展示 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待在实际中的例子，我将使用许多并发连接多次执行清单 6-12 中的查询。该查询是一个动态查询，它从
    `AdventureWorks` 数据库中的两个连接表中随机选择一行。在这里，是否返回任何结果并不重要——我们这里试图实现的是制造编译内存争用。


    ```sql

    DECLARE @ID VARCHAR(250)

    DECLARE @SQL VarChar(MAX)

    SET @ID = FLOOR(RAND()*(20000-1)+1);

    SET @SQL =

    ''

    SELECT

    '' + @ID + '',

    SUM(soh.SubTotal),

    COUNT(soh.SubTotal)

    FROM sales.SalesOrderHeader soh

    INNER JOIN person.Person p

    ON soh.SalesPersonID = p.BusinessEntityID

    WHERE p.BusinessEntityID = '' + @ID + ''

    ''

    EXEC (@SQL)

    ```

    清单 6-12: `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待查询


    在我们使用许多并发连接执行该查询之前，让我们先检查一下需要多少编译内存。我们可以通过在 `SQL Server Management Studio` 中执行清单
    6-12 的查询并启用实际执行计划来实现这一点。


    执行查询并打开实际执行计划后，我们需要查看 `CompileMemory` 属性。你可以通过显示属性窗口（**视图** ➤ **属性窗口**）或按 `F4`
    并选择 `SELECT` 运算符来访问这些属性。图 6-26 显示了我的测试 `SQL Server` 上的实际执行计划属性。


    ![](img/340881_3_En_6_Fig26_HTML.jpg)


    一个杂项表的截图。它列出了缓存的平面大小、基数估计模型、编译内存、编译时间等。编译内存被选中。


    图 6-26: 杂项执行计划属性


    `CompileMemory` 属性返回的值是以 `KB` 表示所需的编译内存量。对于此查询，编译需要 `464 KB`。在我的测试 `SQL Server`
    上，小网关的阈值是 `371 KB`，所以我非常确定该查询将访问小网关。


    同样，我们将使用 `Ostress` 实用程序来生成所需的并发连接以执行查询。我将清单 6-12 中的查询保存到 `resource_semaphore_compile.sql`
    文件，然后将该文件用作以下 `Ostress` 命令的输入。因为查询非常快，我让每个连接执行它 100 次，这样我们就有一些时间来查看等待统计信息。


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\resource_semaphore_compile.sql" -n200 -r100 -q

    ```


    几秒钟后，在 `sys.dm_os_waiting_tasks` DMV 中可以看到许多 `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    等待，如图 6-27 所示。


    ![](img/340881_3_En_6_Fig27_HTML.png)


    一个包含 10 行 5 列的表格截图。它列出了等待任务地址、会话 ID、执行上下文 ID、等待持续时间和等待类型。文件 0 x 00000 20 E 9 B
    6 E B C 28 被选中。


    图 6-27: `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待


    如果我们现在执行 `DBCC MEMORYSTATUS` 命令，我们应该能够找出编译争用发生在哪个网关。图 6-28 显示了在我的测试 `SQL Server`
    上 `DBCC MEMORYSTATUS` 命令的网关输出。


    ![](img/340881_3_En_6_Fig28_HTML.jpg)


    3 个表格的截图。它列出了小、中、大网关及其值。每个网关上配置的单元被选中。


    图 6-28: 编译争用期间的 `DBCC MEMORYSTATUS`


    如图 6-28 所示，如果我们查看 `可用单元` 的数量，已经没有可用的插槽留给新的编译内存请求了。事实上，我们有 `50` 个编译内存请求在资源信号量队列中等待。另请注意，中网关的阈值现在已从
    `-1` 更改为 `14,022,656 字节` (`13,694 KB`)。既然争用发生在较低的网关上，中网关的阈值是动态确定的，即使该网关没有处理任何编译内存请求。


    ## 降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待


    你可以用来降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型等待时间的方法，通常与你用来降低或解决 `RESOURCE_SEMAPHORE`
    等待的方法相同。就像 `RESOURCE_SEMAPHORE` 等待类型一样，`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型与内存相关，因此如果你能增加可用于查询编译的总内存量，就有机会降低或解决
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间。


    由于我们可以使用 `DBCC MEMORYSTATUS` 命令访问有关处理编译内存的资源信号量网关的非常具体的信息，因此一个好的第一步是分析网关的使用模式。如果你注意到某个特定网关持续有等待的内存请求，那么该网关的内存阈值，或者允许的并发编译内存请求的最大数量，应该能为你提供有关根本原因的一些线索。例如，如果你注意到大网关（一次只允许一个查询）有许多排队的编译内存请求，那么你的
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间的来源可能是请求大量编译内存的查询。另一个原因可能是大量并发查询都需要访问小网关，这正是我们示例中的情况，导致在网关处出现排队。


    在这些情况下，你应该找到导致网关排队的特定查询，并尝试优化它们，要么通过减少编译内存量，要么通过确保减少编译次数。后者可以通过确保你的查询被正确参数化来实现。每次执行时都生成即席计划的查询可能是
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待的原因，特别是当它们被非常频繁地并发执行时。


    如果你的 `SQL Server` 处于内存压力之下，也可能看到 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待发生。这是因为中、大网关的编译内存阈值是动态的。如果
    `SQL Server` 处于内存压力之下，这两个网关的阈值都会降低，从而给更多查询使用中或大网关的机会。但由于中、大网关允许的并发编译较少，在小网关中，可用的并发插槽将更快被填满。


    就像 `RESOURCE_SEMAPHORE` 等待类型一样，你可以使用资源调控器将工作负载拆分到特定的资源池中。每个资源池将有自己的资源信号量，负责授予编译内存，从而可以将繁重的编译内存使用分散到多个资源池中。


    ## `RESOURCE_SEMAPHORE_QUERY_COMPILE` 总结


    就像用于为特定查询操作授予内存请求所需的资源信号量一样，也存在用于访问编译内存的资源信号量。这些资源信号量通过使用网关来调节对编译内存的访问。当查询被编译时，它会根据所需的编译内存量接近一个网关。然后网关可以授予所请求的编译内存，或者如果有更多请求想并发访问该网关，则将请求放入队列。当查询在其中一个队列中等待时，就会记录
    `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型。


    解决或降低 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待时间通常通过释放更多内存或降低查询的编译内存需求来实现。'
- fmt: "## SLEEP_BPOOL_FLUSH\n\nThe `SLEEP_BPOOL_FLUSH` wait type is directly related\
    \ to the checkpoint process inside SQL Server. The checkpoint process is responsible\
    \ for writing modified, or “dirty,” data pages from the buffer pool to the database\
    \ data file on disk. `SLEEP_BPOOL_FLUSH` waits also have a relationship with the\
    \ performance of your storage subsystem. If we search for the definition of the\
    \ `SLEEP_BPOOL_FLUSH` wait type on Books Online, Microsoft describes the wait\
    \ type as occurring “when a checkpoint is throttling the issuance of new I/Os\
    \ in order to avoid flooding the disk subsystem.”\n\nIt is pretty common to see\
    \ `SLEEP_BPOOL_FLUSH` waits occur, and frequently they will not indicate a problem.\
    \ There are, however, cases where `SLEEP_BPOOL_FLUSH` waits can indicate performance\
    \ problems that are related to either the checkpoint process or the storage subsystem.\n\
    \n### What Is the SLEEP_BPOOL_FLUSH Wait Type?\n\nTo get a better understanding\
    \ of how the `SLEEP_BPOOL_FLUSH` wait type gets recorded, we need to understand\
    \ how the checkpoint process works inside SQL Server.\n\nThe checkpoint process\
    \ is an internal SQL Server process responsible for writing modified (dirty) pages\
    \ from the buffer cache to the database data file. One of the main reasons for\
    \ the checkpoint is to speed up recovery of a database when an unexpected failure\
    \ occurs. When an unexpected failure occurs, SQL Server needs to revert to the\
    \ state which existed before the failure. It will do this by using the contents\
    \ of the transaction log to redo, or undo, changes made to data pages. If the\
    \ data page was modified, but the change was not yet written to the database data\
    \ file, SQL Server will need to redo the change to the data page. If a checkpoint\
    \ already wrote the changed data page to the database data file, this step is\
    \ not needed, which speeds up the recovery process for the database because SQL\
    \ Server knows the data was written to the database data file. Figure [6-29](#340881_3_En_6_Chapter.xhtml#Fig29)\
    \ shows the (simplified) process that happens when a data page gets modified.\n\
    \n![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig29_HTML.jpg)\n\nA graphical\
    \ process flow defines how the server sends data to the database data file via\
    \ buffer cache with a checkpoint, and to the transaction log.\nFigure 6-29: Data\
    \ modification process\n\nThe first thing that happens when a data page is modified\
    \ by a committed transaction is the change will be recorded in the transaction\
    \ log (first in the log buffer and then to disk as described in the `WRITELOG`\
    \ and `LOGBUFFER` wait types section). The modification of the data page will\
    \ happen in the buffer cache, and the data page will be marked as dirty (red page\
    \ icon). When a checkpoint occurs, which can be for multiple reasons as we will\
    \ discuss later, all of the data pages marked as dirty since the previous checkpoint\
    \ is written to the physical database data file on your storage subsystem, regardless\
    \ of the state of the transaction which created those dirty pages (green page\
    \ icon).\n\nThe checkpoint process is executed by SQL Server automatically roughly\
    \ once every minute, which is the default recovery time interval for versions\
    \ of SQL Server earlier than SQL Server 2016. This does not mean a checkpoint\
    \ will occur every minute exactly. The values you specify for the `recovery interval`\
    \ are the upper time limit at which a checkpoint should occur, the checkpoint\
    \ process analysis of the outstanding I/O requests, and latency; throttle checkpoint\
    \ operations to avoid overloading the storage subsystem.\n\nThe following list\
    \ will describe the various checkpoint types available in SQL Server:\n\n*   The\
    \ internal checkpoint type is not configurable and occurs automatically when certain\
    \ actions are performed, for instance, a database backup.\n*   **Automatic** –\
    \ These are the default checkpoints, on SQL Server version lower than 2016, which\
    \ occur roughly every minute when left at their default value of `0`. We can change\
    \ the interval of the checkpoint process by changing the `recovery interval` configuration\
    \ option under the Server Properties ➤ Database Settings page in SQL Server Management\
    \ Studio. We can only change it to a value in minutes, and it will be used for\
    \ all databases inside the SQL Server instance.\n*   **Manual** – You can manually\
    \ cause checkpoints to occur by issuing the `CHECKPOINT` T-SQL command. Optionally,\
    \ you can specify the time in seconds at which the checkpoint must be completed.\
    \ If you do issue a manual checkpoint, it will run in the context of the current\
    \ database. For example, executing `CHECKPOINT 10` in a query window will perform\
    \ a checkpoint within 10 seconds of the time you executed the query.\n*   **Indirect**\
    \ – SQL Server 2012 added an extra option to configure checkpoint intervals on\
    \ a per-database level. Configuring this option to a value greater than the default\
    \ `0` will overwrite the automatic checkpoint process for the specific database.\
    \ You can use indirect checkpoints for a specific database by using the following\
    \ command:\n    ```sql\n    ALTER DATABASE [db name] SET TARGET_RECOVERY_TIME\
    \ = [time in seconds or minutes]\n    ```\n    With the release of SQL Server\
    \ 2016, indirect checkpoint became the new default setting of the checkpoint process\
    \ (with the value of `60`).\n\nAs I mentioned before, SQL Server will attempt\
    \ to throttle the checkpoint process to avoid overloading the storage subsystem\
    \ if it believes this is necessary. It monitors the number of outstanding requests\
    \ to the storage subsystem and tries to detect if there is any latency. Using\
    \ this information, it will throttle the amount of IOs the checkpoint process\
    \ generates so as to avoid a too-heavy load on the storage subsystem. When the\
    \ checkpoint process is getting throttled, the `SLEEP_BPOOL_FLUSH` wait type will\
    \ be recorded."
  raw: '## SLEEP_BPOOL_FLUSH


    The **SLEEP_BPOOL_FLUSH** wait type is directly related to the checkpoint process
    inside SQL Server. The checkpoint process is responsible for writing modified,
    or “dirty,” data pages from the buffer pool to the database data file on disk.
    SLEEP_BPOOL_FLUSH waits also have a relationship with the performance of your
    storage subsystem. If we search for the definition of the SLEEP_BPOOL_FLUSH wait
    type on Books Online, Microsoft describes the wait type as occurring “when a checkpoint
    is throttling the issuance of new I/Os in order to avoid flooding the disk subsystem.”


    It is pretty common to see SLEEP_BPOOL_FLUSH waits occur, and frequently they
    will not indicate a problem. There are, however, cases where SLEEP_BPOOL_FLUSH
    waits can indicate performance problems that are related to either the checkpoint
    process or the storage subsystem.


    ### What Is the SLEEP_BPOOL_FLUSH Wait Type?


    To get a better understanding of how the SLEEP_BPOOL_FLUSH wait type gets recorded,
    we need to understand how the checkpoint process works inside SQL Server.


    The checkpoint process is an internal SQL Server process responsible for writing
    modified (dirty) pages from the buffer cache to the database data file. One of
    the main reasons for the checkpoint is to speed up recovery of a database when
    an unexpected failure occurs. When an unexpected failure occurs, SQL Server needs
    to revert to the state which existed before the failure. It will do this by using
    the contents of the transaction log to redo, or undo, changes made to data pages.
    If the data page was modified, but the change was not yet written to the database
    data file, SQL Server will need to redo the change to the data page. If a checkpoint
    already wrote the changed data page to the database data file, this step is not
    needed, which speeds up the recovery process for the database because SQL Server
    knows the data was written to the database data file. Figure [6-29](#340881_3_En_6_Chapter.xhtml#Fig29)
    shows the (simplified) process that happens when a data page gets modified.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig29_HTML.jpg)


    A graphical process flow defines how the server sends data to the database data
    file via buffer cache with a checkpoint, and to the transaction log.


    Figure 6-29


    Data modification process


    The first thing that happens when a data page is modified by a committed transaction
    is the change will be recorded in the transaction log (first in the log buffer
    and then to disk as described in the WRITELOG and LOGBUFFER wait types section).
    The modification of the data page will happen in the buffer cache, and the data
    page will be marked as dirty (red page icon). When a checkpoint occurs, which
    can be for multiple reasons as we will discuss later, all of the data pages marked
    as dirty since the previous checkpoint is written to the physical database data
    file on your storage subsystem, regardless of the state of the transaction which
    created those dirty pages (green page icon).


    The checkpoint process is executed by SQL Server automatically roughly once every
    minute, which is the default recovery time interval for versions of SQL Server
    earlier than SQL Server 2016\. This does not mean a checkpoint will occur every
    minute exactly. The values you specify for the recovery interval are the upper
    time limit at which a checkpoint should occur, the checkpoint process analysis
    of the outstanding I/O requests, and latency; throttle checkpoint operations to
    avoid overloading the storage subsystem.


    The following list will describe the various checkpoint types available in SQL
    Server:


    *   The internal checkpoint type is not configurable and occurs automatically
    when certain actions are performed, for instance, a database backup.


    *   **Automatic** – These are the default checkpoints, on SQL Server version lower
    than 2016, which occur roughly every minute when left at their default value of
    0\. We can change the interval of the checkpoint process by changing the recovery
    interval configuration option under the Server Properties ➤ Database Settings
    page in SQL Server Management Studio. We can only change it to a value in minutes,
    and it will be used for all databases inside the SQL Server instance.


    *   **Manual** – You can manually cause checkpoints to occur by issuing the CHECKPOINT
    T-SQL command. Optionally, you can specify the time in seconds at which the checkpoint
    must be completed. If you do issue a manual checkpoint, it will run in the context
    of the current database. For example, executing CHECKPOINT 10 in a query window
    will perform a checkpoint within 10 seconds of the time you executed the query.


    *   **Indirect** – SQL Server 2012 added an extra option to configure checkpoint
    intervals on a per-database level. Configuring this option to a value greater
    than the default 0 will overwrite the automatic checkpoint process for the specific
    database. You can use indirect checkpoints for a specific database by using the
    following command:


    *   `ALTER DATABASE [db name] SET TARGET_RECOVERY_TIME = [time in seconds or minutes]`


    *   With the release of SQL Server 2016, indirect checkpoint became the new default
    setting of the checkpoint process (with the value of 60).


    As I mentioned before, SQL Server will attempt to throttle the checkpoint process
    to avoid overloading the storage subsystem if it believes this is necessary. It
    monitors the number of outstanding requests to the storage subsystem and tries
    to detect if there is any latency. Using this information, it will throttle the
    amount of IOs the checkpoint process generates so as to avoid a too-heavy load
    on the storage subsystem. When the checkpoint process is getting throttled, the
    SLEEP_BPOOL_FLUSH wait type will be recorded.'
  trans: "\n## SLEEP_BPOOL_FLUSH\n\n`SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 内部的检查点进程直接相关。检查点进程负责将缓冲池中已修改的或“脏”数据页写入磁盘上的数据库数据文件。`SLEEP_BPOOL_FLUSH`\
    \ 等待也与存储子系统的性能有关。如果我们在 Books Online 上搜索 `SLEEP_BPOOL_FLUSH` 等待类型的定义，微软将其描述为“当检查点为了阻止淹没磁盘子系统而限制新\
    \ I/O 的发出时”发生。\n\n看到 `SLEEP_BPOOL_FLUSH` 等待发生是相当普遍的，并且通常它们并不表示存在问题。然而，在某些情况下，`SLEEP_BPOOL_FLUSH`\
    \ 等待可能表明与检查点进程或存储子系统相关的性能问题。\n\n### 什么是 SLEEP_BPOOL_FLUSH 等待类型？\n\n为了更好地理解 `SLEEP_BPOOL_FLUSH`\
    \ 等待类型是如何被记录的，我们需要了解 SQL Server 内部的检查点进程是如何工作的。\n\n检查点进程是一个 SQL Server 内部进程，负责将缓冲区缓存中已修改（脏）的页写入数据库数据文件。设置检查点的主要原因之一是为了在发生意外故障时加速数据库的恢复。当发生意外故障时，SQL\
    \ Server 需要恢复到故障发生前的状态。它将使用事务日志的内容来重做（redo）或撤消（undo）对数据页所做的更改。如果数据页已被修改，但更改尚未写入数据库数据文件，SQL\
    \ Server 将需要重做对该数据页的更改。如果检查点已经将更改的数据页写入了数据库数据文件，则不需要此步骤，这加快了数据库的恢复过程，因为 SQL Server\
    \ 知道数据已经写入了数据库数据文件。图 6-29 展示了当一个数据页被修改时发生的（简化的）过程。\n\n![](img/340881_3_En_6_Fig29_HTML.jpg)\n\
    \n一个图形化的流程图定义了服务器如何通过缓冲区缓存（经由检查点）和事务日志将数据发送到数据库数据文件。\n图 6-29：数据修改过程\n\n当一个提交的事务修改了一个数据页时，首先发生的事情是该更改会被记录在事务日志中（首先在日志缓冲区中，然后如\
    \ `WRITELOG` 和 `LOGBUFFER` 等待类型部分所述写入磁盘）。数据页的修改将发生在缓冲区缓存中，并且该数据页将被标记为脏（红色页面图标）。当发生检查点时（原因可能有多个，我们稍后会讨论），自上一个检查点以来所有标记为脏的数据页都会被写入到存储子系统上的物理数据库数据文件中，无论创建这些脏页的事务处于何种状态（绿色页面图标）。\n\
    \n检查点进程由 SQL Server 自动执行，大约每分钟一次，这是早于 SQL Server 2016 版本的默认恢复时间间隔。这并不意味着检查点会精确地每分钟发生一次。你为\
    \ `recovery interval` 指定的值是检查点应发生的时间上限，检查点进程会分析未完成的 I/O 请求和延迟；限制检查点操作以避免存储子系统过载。\n\
    \n以下列表描述了 SQL Server 中可用的各种检查点类型：\n\n*   **内部**检查点类型不可配置，在执行某些操作（例如数据库备份）时自动发生。\n\
    *   **自动 (Automatic)** – 在低于 2016 版本的 SQL Server 上，这些是默认检查点，当其默认值设为 `0` 时，大约每分钟发生一次。我们可以通过在\
    \ SQL Server Management Studio 的“服务器属性” ➤ “数据库设置”页面下更改 `recovery interval` 配置选项来修改检查点进程的间隔。我们只能将其更改为以分钟为单位的值，并且它将用于\
    \ SQL Server 实例内的所有数据库。\n*   **手动 (Manual)** – 你可以通过发出 `CHECKPOINT` T-SQL 命令手动触发检查点。可选地，你可以指定检查点必须完成的时间（以秒为单位）。如果你发出了手动检查点，它将在当前数据库的上下文中运行。例如，在查询窗口中执行\
    \ `CHECKPOINT 10` 将在你执行查询后的 10 秒内执行一次检查点。\n*   **间接 (Indirect)** – SQL Server\
    \ 2012 增加了一个额外选项来配置每个数据库级别的检查点间隔。将此选项配置为大于默认值 `0` 的值将覆盖特定数据库的自动检查点进程。你可以使用以下命令为特定数据库启用间接检查点：\n\
    \    ```sql\n    ALTER DATABASE [db name] SET TARGET_RECOVERY_TIME = [time in\
    \ seconds or minutes]\n    ```\n    随着 SQL Server 2016 的发布，间接检查点成为了检查点进程新的默认设置（值为\
    \ `60`）。\n\n正如我之前提到的，如果 SQL Server 认为有必要，它会尝试限制检查点进程以避免存储子系统过载。它会监视存储子系统的未完成请求数量，并尝试检测是否存在任何延迟。利用这些信息，它将限制检查点进程生成的\
    \ I/O 量，以避免对存储子系统造成过重的负载。当检查点进程被限制时，`SLEEP_BPOOL_FLUSH` 等待类型就会被记录下来。\n"
- fmt: '### SLEEP_BPOOL_FLUSH 示例


    以下示例展示了 `SLEEP_BPOOL_FLUSH` 等待类型在 SQL Server 2016 以下版本中的影响。如前所述，在 SQL Server 2016
    中，SQL Server 处理检查点进程的方式已经改变，这意味着在类似下面的示例中，该等待类型出现的可能性要小得多。


    生成 `SLEEP_BPOOL_FLUSH` 等待相对简单，清单 [6-13](#340881_3_En_6_Chapter.xhtml#PC17) 中的脚本（与我们用于
    `LOGBUFFER` 和 `WRITELOG` 等待类型的脚本几乎相同）将对检查点进程施加压力，从而导致 `SLEEP_BPOOL_FLUSH` 等待发生。


    ```sql

    USE TLog_demo;

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- Force a checkpoint to occur within 1 second

    CHECKPOINT 1

    END

    Listing 6-13

    Generate SLEEP_BPOOL_FLUSH waits

    ```


    由于我们也使用与 `LOGBUFFER` 和 `WRITELOG` 等待类型示例中相同的数据库，清单 [6-14](#340881_3_En_6_Chapter.xhtml#PC18)
    展示了在数据库不存在时创建它的脚本。


    ```sql

    USE master;

    -- Create demo database

    CREATE DATABASE [TLog_demo]

    ON PRIMARY  (

    NAME = N''TLog_demo'', FILENAME = N''C:\TeamData\TLog_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%)

    LOG ON  (  NAME = N''TLog_demo_log'', FILENAME = N''C:\TeamData\TLog_demo.ldf''
    , SIZE = 51200KB , FILEGROWTH = 10%);

    -- Make sure recovery model is set to full

    ALTER DATABASE [TLog_demo] SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [TLog_demo]

    TO  DISK = N''C:\TeamData\TLog_demo_Full.bak'';

    -- Create a simple test table

    USE TLog_demo;

    CREATE TABLE transactions  (

    t_guid VARCHAR(50) );

    Listing 6-14

    Create TLog_demo database

    ```


    清单 [6-13](#340881_3_En_6_Chapter.xhtml#PC17) 中的脚本将执行的操作是在一个执行 100 次的循环中，向 `transactions`
    表插入一个随机的 GUID。每次插入新的 GUID 时，它都会发出一个时间限制为 1 秒的 `CHECKPOINT` 命令。这会强制检查点进程在 1 秒的时间限制内执行一个检查点。


    在运行清单 [6-13](#340881_3_En_6_Chapter.xhtml#PC17) 中的脚本之前，我使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` 命令清除了 `sys.dm_os_wait_stats` DMV。


    在测试 SQL Server 上运行了近 70 秒后，脚本完成。然后我执行了以下查询来查看 `SLEEP_BPOOL_FLUSH` 等待时间：


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    查询结果如图 [6-30](#340881_3_En_6_Chapter.xhtml#Fig30) 所示。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig30_HTML.png)


    一个包含 5 列 1 行的表格。其中列出了等待类型为 sleep b pool flush，等待任务计数为 311，等待时间（毫秒）为 60415，最大等待时间（毫秒）为
    938，信号等待时间（毫秒）为 26。


    图 6-30


    `SLEEP_BPOOL_FLUSH` 等待


    如你所见，在运行清单 [6-10](#340881_3_En_6_Chapter.xhtml#PC11) 中的脚本后，`SLEEP_BPOOL_FLUSH`
    等待时间非常高。通常情况下，你期望这些等待时间要么非常低，要么接近于零。如果我们完全从脚本中移除 `CHECKPOINT` 命令，让 SQL Server
    自行决定何时运行检查点进程，我们不仅会得到完全不同的结果（如图 [6-31](#340881_3_En_6_Chapter.xhtml#Fig31) 所示），而且脚本的运行时间也会减少到仅仅几毫秒。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig31_HTML.png)


    一个包含 5 列和 1 行的表格。其中列出了等待类型为 sleep b pool flush，等待任务计数为 0，等待时间（毫秒）为 0，最大等待时间（毫秒）为
    0，信号等待时间（毫秒）为 0。


    图 6-31


    移除 `CHECKPOINT` 后的 `SLEEP_BPOOL_FLUSH` 等待时间


    ### 降低 SLEEP_BPOOL_FLUSH 等待


    尽管由于 `SLEEP_BPOOL_FLUSH` 等待类型导致的性能问题并不常见，但有多种方法可以降低等待时间。


    最明显的方法是检查我们之前讨论过的各种可用配置选项，以手动配置恢复间隔。恢复间隔的值越低，检查点进程发生的频率就越高，遇到 `SLEEP_BPOOL_FLUSH`
    等待的可能性就越大。此外，正如你在示例中所注意到的，在事务内执行频繁的 `CHECKPOINT` 命令可能导致 `SLEEP_BPOOL_FLUSH` 等待。


    另一个可能的原因是数据库数据文件所在的存储子系统。如前所述，检查点进程会分析存储子系统的负载，然后决定是否需要限制其吞吐量。如果因为存储子系统繁忙而频繁需要限制，你更有可能看到
    `SLEEP_BPOOL_FLUSH` 等待发生。


    如果你运行的是 SQL Server 2016，你很可能永远不会遇到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间，因为 SQL Server
    处理该进程的默认方式已经改变。


    ### SLEEP_BPOOL_FLUSH 总结


    `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 中的检查点进程密切相关。检查点进程负责将缓冲区缓存中已修改（或脏）的数据页写入数据库数据文件。检查点进程在将脏页写入磁盘之前会分析存储子系统的性能，如果存储子系统繁忙，检查点进程将限制其吞吐量，从而导致
    `SLEEP_BPOOL_FLUSH` 等待。虽然看到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间并不常见，但它们仍然可能影响性能。频繁执行
    `CHECKPOINT` T-SQL 命令的查询，或将恢复间隔配置为非常低的值，可能是看到 `SLEEP_BPOOL_FLUSH` 等待发生的可能原因。存储子系统的性能也可能影响检查点进程，如果它被迫限制其吞吐量。


    ## WRITE_COMPLETION


    与 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，`WRITE_COMPLETION` 等待类型与 SQL
    Server 在存储子系统上执行的特定操作有关。同样，在 SQL Server 实例上看到 `WRITE_COMPLETION` 等待是很正常的，只有当等待时间远高于正常水平时，才应该引起关注。


    ### 什么是 WRITE_COMPLETION 等待类型？


    `WRITE_COMPLETION` 等待类型是 `IO_COMPLETION` 等待类型的近亲。但是，`IO_COMPLETION` 等待类型是针对特定的读写操作记录的，而
    `WRITE_COMPLETION` 等待类型仅针对一些非常特定的写操作记录。其中一些写操作包括扩展数据或日志文件或执行 `DBCC CHECKDB` 命令。


    由于 `WRITE_COMPLETION` 等待类型与将 SQL Server 数据写入存储子系统有关，其性能会对等待时间产生影响。'
  raw: '### SLEEP_BPOOL_FLUSH Example


    The following example shows the impact of the SLEEP_BPOOL_FLUSH wait type on SQL
    Server versions lower than SQL Server 2016\. As mentioned earlier, in SQL Server
    2016, the way SQL Server handles the checkpoint process has changed which means
    it is far less likely for the wait type to show up in an example like the following.


    Generating SLEEP_BPOOL_FLUSH waits is relatively simple, and the script in Listing
    [6-13](#340881_3_En_6_Chapter.xhtml#PC17), which is almost the same one as we
    used for the LOGBUFFER and WRITELOG wait types, will put pressure on the checkpoint
    process such that SLEEP_BPOOL_FLUSH waits will occur.


    ```

    USE TLog_demo;

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- Force a checkpoint to occur within 1 second

    CHECKPOINT 1

    END

    Listing 6-13

    Generate SLEEP_BPOOL_FLUSH waits

    ```


    Since we are also using the same database as in the LOGBUFFER and WRITELOG wait
    types example, Listing [6-14](#340881_3_En_6_Chapter.xhtml#PC18) shows the script
    to create the database if it doesn’t exist already.


    ```

    USE master;

    -- Create demo database

    CREATE DATABASE [TLog_demo]

    ON PRIMARY  (

    NAME = N''TLog_demo'', FILENAME = N''C:\TeamData\TLog_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%)

    LOG ON  (  NAME = N''TLog_demo_log'', FILENAME = N''C:\TeamData\TLog_demo.ldf''
    , SIZE = 51200KB , FILEGROWTH = 10%);

    -- Make sure recovery model is set to full

    ALTER DATABASE [TLog_demo] SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [TLog_demo]

    TO  DISK = N''C:\TeamData\TLog_demo_Full.bak'';

    -- Create a simple test table

    USE TLog_demo;

    CREATE TABLE transactions  (

    t_guid VARCHAR(50) );

    Listing 6-14

    Create TLog_demo database

    ```


    What the script in Listing [6-13](#340881_3_En_6_Chapter.xhtml#PC17) will do is
    perform an insert of a random GUID into the transactions table inside a loop that
    is executed 100 times. Every time it enters a new GUID, it will issue a CHECKPOINT
    command with a time limit of 1 second. This forces the checkpoint process to perform
    a checkpoint within the 1-second time limit.


    Before running the script in Listing [6-13](#340881_3_En_6_Chapter.xhtml#PC17),
    I cleared the sys.dm_os_wait_stats DMV using the DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR) command.


    After almost 70 seconds, the script completed on my test SQL Server. I then executed
    the following query to take a look at the SLEEP_BPOOL_FLUSH wait times:


    ```

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    The results of the query can be seen in Figure [6-30](#340881_3_En_6_Chapter.xhtml#Fig30).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig30_HTML.png)


    A table of 5 columns and 1 row. It lists the wait type of sleep b pool flush with
    waiting tasks count as 311, wait time m s as 60415, max wait time m s as 938,
    and signal wait time m s as 26.


    Figure 6-30


    SLEEP_BPOOL_FLUSH waits


    As you can see, the SLEEP_BPOOL_FLUSH wait time has a very high amount of wait
    time after running the script in Listing [6-10](#340881_3_En_6_Chapter.xhtml#PC11).
    Normally you would expect those wait times to be either very low or close to zero.
    If we were to remove the CHECKPOINT command from the script completely and let
    SQL Server decide on when to run the checkpoint process, we not only get a completely
    different result, as shown in Figure [6-31](#340881_3_En_6_Chapter.xhtml#Fig31),
    but also the script’s runtime is decreased to just a few milliseconds.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig31_HTML.png)


    A table of 5 columns and a row. It lists the wait type of sleep b pool flush with
    waiting tasks count as 0, wait time m s as 0, max wait time m s as 0, and signal
    wait time m s as 0.


    Figure 6-31


    SLEEP_BPOOL_FLUSH wait times after removing CHECKPOINT


    ### Lowering SLEEP_BPOOL_FLUSH Waits


    Even though it is not very common to run into performance problems caused by the
    SLEEP_BPOOL_FLUSH wait type, there are various methods to lower the wait times.


    The most obvious one would be to check the various configuration options available
    to manually configure the recovery interval that we discussed earlier. The lower
    the value of the recovery interval, the more often checkpoint processes will take
    place, and the bigger the chance of running into SLEEP_BPOOL_FLUSH waits. Also,
    as you noticed in the example, performing frequent CHECKPOINT commands inside
    transactions can lead to SLEEP_BPOOL_FLUSH waits.


    Another possible cause can be the storage subsystem on which your database data
    file resides. As explained earlier, the checkpoint process calculates the load
    of the storage subsystem and then decides if throttling its throughput is needed.
    If there is a frequent need of throttling because your storage subsystem is busy,
    you are more likely to see SLEEP_BPOOL_FLUSH waits occur.


    If you are running SQL Server 2016, chances are you will never run into very high
    SLEEP_BPOOL_FLUSH wait times since the default way SQL Server handles the process
    has been changed.


    ### SLEEP_BPOOL_FLUSH Summary


    The SLEEP_BPOOL_FLUSH wait type is closely related to the checkpoint process in
    SQL Server. The checkpoint process is responsible for writing modified, or dirty,
    data pages from the buffer cache to the database data file. The checkpoint process
    analyzes the performance of the storage subsystem before it writes the dirty pages
    to disk, and if the storage subsystem is busy, the checkpoint process will throttle
    its throughput, resulting in SLEEP_BPOOL_FLUSH waits. It is not very common to
    see very high SLEEP_BPOOL_FLUSH wait times, but they can impact performance nonetheless.
    Queries that frequently execute the CHECKPOINT T-SQL command, or a recovery interval
    that is configured to a very low value, can be possible causes for seeing SLEEP_BPOOL_FLUSH
    waits occur. The performance of your storage subsystem can also impact the checkpoint
    process if it is forced to throttle its throughput.


    ## WRITE_COMPLETION


    As with the ASYNC_IO_COMPLETION and IO_COMPLETION wait types, the **WRITE_COMPLETION**
    wait type is related to specific actions SQL Server performs on the storage subsystem.
    Again, it is very normal to see WRITE_COMPLETION waits occur on your SQL Server
    instance, and they should only be a cause for concern if the wait times are way
    higher than normal.


    ### What Is the WRITE_COMPLETION Wait Type?


    The WRITE_COMPLETION wait type is a relative of the IO_COMPLETION wait type. But
    where the IO_COMPLETION wait type is logged for specific read and write operations,
    the WRITE_COMPLETION wait type is only logged for some very specific write operations.
    Some of these write operations are growing a data or log file or performing the
    DBCC CHECKDB command.


    Since the WRITE_COMPLETION wait type is related to writing SQL Server data to
    the storage subsystem, the performance of it can have an impact on the wait times.'
  trans: '

    ### SLEEP_BPOOL_FLUSH 示例


    以下示例展示了在低于 SQL Server 2016 的版本中，`SLEEP_BPOOL_FLUSH` 等待类型的影响。如前所述，在 SQL Server
    2016 中，处理检查点进程的方式已发生变化，这意味着在类似下文的示例中，该等待类型出现的可能性要小得多。


    生成 `SLEEP_BPOOL_FLUSH` 等待相对简单，清单 6-13 中的脚本（与我们用于 `LOGBUFFER` 和 `WRITELOG` 等待类型的脚本几乎相同）将对检查点进程施加压力，从而导致
    `SLEEP_BPOOL_FLUSH` 等待发生。


    ```sql

    USE TLog_demo;

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 100

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    -- Force a checkpoint to occur within 1 second

    CHECKPOINT 1

    END

    Listing 6-13

    Generate SLEEP_BPOOL_FLUSH waits

    ```


    由于我们也使用了与 `LOGBUFFER` 和 `WRITELOG` 等待类型示例中相同的数据库，清单 6-14 展示了在数据库不存在时创建它的脚本。


    ```sql

    USE master;

    -- Create demo database

    CREATE DATABASE [TLog_demo]

    ON PRIMARY  (

    NAME = N''TLog_demo'', FILENAME = N''C:\TeamData\TLog_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%)

    LOG ON  (  NAME = N''TLog_demo_log'', FILENAME = N''C:\TeamData\TLog_demo.ldf''
    , SIZE = 51200KB , FILEGROWTH = 10%);

    -- Make sure recovery model is set to full

    ALTER DATABASE [TLog_demo] SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [TLog_demo]

    TO  DISK = N''C:\TeamData\TLog_demo_Full.bak'';

    -- Create a simple test table

    USE TLog_demo;

    CREATE TABLE transactions  (

    t_guid VARCHAR(50) );

    Listing 6-14

    Create TLog_demo database

    ```


    清单 6-13 中的脚本将执行的操作是：在一个执行 100 次的循环中，向 `transactions` 表插入一个随机的 GUID。每次插入新的 GUID
    时，它都会发出一个时间限制为 1 秒的 `CHECKPOINT` 命令。这会强制检查点进程在 1 秒的时间限制内执行一个检查点。


    在运行清单 6-13 中的脚本之前，我使用了 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令来清除 `sys.dm_os_wait_stats`
    DMV。


    在测试 SQL Server 上运行了近 70 秒后，脚本完成。然后我执行了以下查询来查看 `SLEEP_BPOOL_FLUSH` 等待时间：


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SLEEP_BPOOL_FLUSH'';

    ```


    查询结果如图 6-30 所示。


    ![](img/340881_3_En_6_Fig30_HTML.png)


    一个包含 5 列 1 行的表格。其中列出了等待类型为 sleep b pool flush，等待任务计数为 311，等待时间（毫秒）为 60415，最大等待时间（毫秒）为
    938，信号等待时间（毫秒）为 26。


    图 6-30

    `SLEEP_BPOOL_FLUSH` 等待


    如你所见，在运行清单 6-10 中的脚本后，`SLEEP_BPOOL_FLUSH` 等待时间非常高。通常情况下，你期望这些等待时间要么非常低，要么接近于零。如果我们完全从脚本中移除
    `CHECKPOINT` 命令，让 SQL Server 自行决定何时运行检查点进程，我们不仅会得到完全不同的结果（如图 6-31 所示），而且脚本的运行时间也会减少到仅仅几毫秒。


    ![](img/340881_3_En_6_Fig31_HTML.png)


    一个包含 5 列和 1 行的表格。其中列出了等待类型为 sleep b pool flush，等待任务计数为 0，等待时间（毫秒）为 0，最大等待时间（毫秒）为
    0，信号等待时间（毫秒）为 0。


    图 6-31

    移除 `CHECKPOINT` 后的 `SLEEP_BPOOL_FLUSH` 等待时间


    ### 降低 SLEEP_BPOOL_FLUSH 等待


    尽管由于 `SLEEP_BPOOL_FLUSH` 等待类型导致的性能问题并不常见，但有多种方法可以降低等待时间。


    最明显的方法是检查我们之前讨论过的各种可用配置选项，以手动配置恢复间隔。恢复间隔的值越低，检查点进程发生的频率就越高，遇到 `SLEEP_BPOOL_FLUSH`
    等待的可能性就越大。此外，正如你在示例中所注意到的，在事务内执行频繁的 `CHECKPOINT` 命令可能导致 `SLEEP_BPOOL_FLUSH` 等待。


    另一个可能的原因是数据库数据文件所在的存储子系统。如前所述，检查点进程会分析存储子系统的负载，然后决定是否需要限制其吞吐量。如果因为存储子系统繁忙而频繁需要限制，你更有可能看到
    `SLEEP_BPOOL_FLUSH` 等待发生。


    如果你运行的是 SQL Server 2016，你很可能永远不会遇到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间，因为 SQL Server
    处理该进程的默认方式已经改变。


    ### SLEEP_BPOOL_FLUSH 总结


    `SLEEP_BPOOL_FLUSH` 等待类型与 SQL Server 中的检查点进程密切相关。检查点进程负责将缓冲区缓存中已修改（或脏）的数据页写入数据库数据文件。检查点进程在将脏页写入磁盘之前会分析存储子系统的性能，如果存储子系统繁忙，检查点进程将限制其吞吐量，从而导致
    `SLEEP_BPOOL_FLUSH` 等待。虽然看到非常高的 `SLEEP_BPOOL_FLUSH` 等待时间并不常见，但它们仍然可能影响性能。频繁执行
    `CHECKPOINT` T-SQL 命令的查询，或将恢复间隔配置为非常低的值，可能是看到 `SLEEP_BPOOL_FLUSH` 等待发生的可能原因。存储子系统的性能也可能影响检查点进程，如果它被迫限制其吞吐量。


    ## WRITE_COMPLETION


    与 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，`WRITE_COMPLETION` 等待类型与 SQL
    Server 在存储子系统上执行的特定操作有关。同样，在 SQL Server 实例上看到 `WRITE_COMPLETION` 等待是很正常的，只有当等待时间远高于正常水平时，才应该引起关注。


    ### 什么是 WRITE_COMPLETION 等待类型？


    `WRITE_COMPLETION` 等待类型是 `IO_COMPLETION` 等待类型的近亲。但是，`IO_COMPLETION` 等待类型是针对特定的读写操作记录的，而
    `WRITE_COMPLETION` 等待类型仅针对一些非常特定的写操作记录。其中一些写操作包括扩展数据或日志文件或执行 `DBCC CHECKDB` 命令。


    由于 `WRITE_COMPLETION` 等待类型与将 SQL Server 数据写入存储子系统有关，其性能会对等待时间产生影响。

    '
- fmt: '### WRITE_COMPLETION 示例


    为了向您展示一个 WRITE_COMPLETION 等待发生的例子，我将在执行 `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` 命令清除 `sys.dm_os_wait_stats` DMV 后，对 GalacticWorks 数据库执行一个 `CHECKDB`。


    请记住，这个例子是一个完全正常的情况，其中可能发生 WRITE_COMPLETION 等待，它不应该阻止您执行常规的数据库一致性检查！


    清单 [6-15](#340881_3_En_6_Chapter.xhtml#PC20) 显示了我执行以产生一些 WRITE_COMPLETION 等待的查询。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB (''GalacticWorks'');

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WRITE_COMPLETION'';

    ```

    清单 6-15

    生成 WRITE_COMPLETION 等待


    批次中最后一个查询的结果如图 [6-32](#340881_3_En_6_Chapter.xhtml#Fig32) 所示。


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig32_HTML.png)


    一个包含 5 列 1 行的表格。它列出了等待类型为 write completion，等待任务数为 2，等待时间（毫秒）为 3，最大等待时间（毫秒）为 2，信号等待时间（毫秒）为
    3。


    图 6-32

    WRITE_COMPLETION 等待


    正如您所看到的，等待时间非常短，不会引起任何担忧。这部分也是因为 GalacticWorks 数据库非常小，而且我的测试机器的存储性能非常快。对更大的数据库运行
    `CHECKDB` 可能会导致更高的等待时间。


    ### 降低 WRITE_COMPLETION 等待


    如果您看到较高的 WRITE_COMPLETION 等待时间，尝试找出是什么进程导致了这些等待。在许多情况下，这可能是由 `CHECKDB` 或数据库数据/日志文件增长引起的。


    一个值得检查的事情是本章前面 ASYNC_IO_COMPLETION 部分讨论的即时文件初始化选项。不使用此选项会影响 WRITE_COMPLETION 等待时间的持续时间。


    另一个导致 WRITE_COMPLETION 等待时间较高的、远不常见的原因是当您在页面可用空间（PFS）页面上遇到页闩锁争用时。PFS 页面跟踪数据页中的可用空间量。如果一个进程需要非常频繁地修改
    PFS 页面，就有可能看到 WRITE_COMPLETION 等待与许多 `PAGELATCH_UP` 等待一起发生，我们将在第 [9](#340881_3_En_9_Chapter.xhtml)
    章“与闩锁相关的等待类型”中讨论这一点。为了给您一个这种场景的示例，考虑大量并发查询都创建临时表、插入几行然后又删除临时表的情况。在这种情况下，`tempdb`
    数据库的 PFS 页面需要非常频繁地更新以反映临时表的创建和删除。


    ### WRITE_COMPLETION 总结


    `WRITE_COMPLETION` 等待类型，就像 `ASYNC_IO_COMPLETION` 和 `IO_COMPLETION` 等待类型一样，与 SQL
    Server 执行的特定存储相关操作有关。看到 WRITE_COMPLETION 等待是非常正常的，在许多情况下不会引起担忧。`CHECKDB` 和数据库数据/日志文件增长等操作可能导致
    WRITE_COMPLETION 等待。


    ## 7. 备份相关等待类型


    备份是数据库管理中非常重要的一部分，对于您所在公司的生存至关重要。**数据是企业拥有的最关键资产**，如果灾难导致数据丢失，公司可能会损失大量资金甚至倒闭。


    在灾难期间最小化数据损失的方法有很多。我们可以使用 SAN 而不是直接连接存储，并可能利用 SAN 复制。或者我们可以使用云存储。也许我们创建一个 SQL
    Server Always On 可用性组将数据复制到数据中心和全球区域。但我们必须做的第一步，并且希望已经采取的，是定期备份 SQL Server 数据库中的数据。


    实施和安排 SQL Server 备份并不是一项非常困难的任务，没有理由不执行定期备份。备份类型和备份操作的间隔由您工作的组织的需求决定，并通常以“RTO”（恢复时间目标）和“RPO”（恢复点目标）时间表示。这些时间代表了从灾难中恢复所需的时间量，以及灾难发生时可接受的数据丢失量。这两个时间应该是您的
    SQL Server 备份策略的主要输入。


    注意


    我说的是“备份策略”，但实际上您首先要构建的是**恢复策略**。这就是 RTO 和 RPO 至关重要的地方。一旦您知道了恢复策略，然后才配置数据库备份。


    值得庆幸的是，SQL Server 开箱即有满足 RTO 和 RPO 要求的不同选项。我们可以使用 SQL Server 自己的备份机制来满足公司的 RTO
    和 RPO 时间；我们不依赖于第三方备份软件。由于 SQL Server 备份操作是一个内部过程，因此有与之关联的不同等待类型，在本章中，我们将了解与执行备份和还原直接相关的三种最常见的等待类型。


    注意到这些备份/还原相关等待类型的高等待时间，不太可能导致 SQL Server 实例的性能下降。但是，我们确实可以选择优化 SQL Server 备份过程，从而加快备份和还原速度。并且由于数据库的备份/还原对于公司的生存至关重要，优化备份和还原吞吐量非常值得付出努力。


    ### BACKUPBUFFER


    要讨论的第一个备份相关等待类型是 `BACKUPBUFFER`。如果我们在 Books Online 上查找此等待类型的定义，会得到以下文本：“当备份任务正在等待数据，或正在等待用于存储数据的缓冲区时发生。此类型不常见，除非任务正在等待磁带装入。”这种措辞听起来好像我们仅在将备份写入磁带设备时才会看到此事件，但事实并非如此。在备份操作期间，无论备份文件的目标是什么，都会记录
    BACKUPBUFFER 等待。原因在于 SQL Server 备份操作使用缓冲区从数据库读取数据并将其写入备份文件的方式。'
  raw: '### WRITE_COMPLETION Example


    To show you an example of a WRITE_COMPLETION wait occurring, I am going to perform
    a CHECKDB against the GalacticWorks database after clearing the sys.dm_os_wait_stats
    DMV using the DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR) command.


    Keep in mind that this example is a completely normal situation in which WRITE_COMPLETION
    waits can occur, and it shouldn’t stop you from performing regular database consistency
    checks!


    Listing [6-15](#340881_3_En_6_Chapter.xhtml#PC20) shows the query I executed to
    generate a few WRITE_COMPLETION waits.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    DBCC CHECKDB (''GalacticWorks'');

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WRITE_COMPLETION'';

    Listing 6-15

    Generate WRITE_COMPLETION waits

    ```


    The results of the last query in the batch are shown in Figure [6-32](#340881_3_En_6_Chapter.xhtml#Fig32).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig32_HTML.png)


    A table of 5 columns and a row. It lists the wait type of write completion with
    waiting tasks count as 2, wait time m s as 3, max wait time m s as 2, and signal
    wait time m s as 3.


    Figure 6-32


    WRITE_COMPLETION waits


    As you can see, the amount of wait time is so low that it would not be a cause
    of any concern. This is also partly due to the fact that the GalacticWorks database
    is very small and the storage performance of my test machine is very fast. Running
    CHECKDB against larger databases can result in higher wait times.


    ### Lowering WRITE_COMPLETION Waits


    If you see high WRITE_COMPLETION wait times, try to find out what process is generating
    the waits. In many cases, it will be caused by a CHECKDB or database data or log
    file growth.


    One thing worth checking is the instant file initialization option discussed in
    the ASYNC_IO_COMPLETION section earlier in this chapter. Not using this option
    can impact the duration of the WRITE_COMPLETION wait time.


    Another, far less common cause for a higher WRITE_COMPLETION wait time is when
    you are experiencing page latch contention on your Page Free Space (PFS) page.
    The PFS page tracks the amount of free space in data pages. If a process needs
    to modify the PFS page very frequently, it is possible to see WRITE_COMPLETION
    waits occur along with many PAGELATCH_UP waits, which we will discuss in Chapter
    [9](#340881_3_En_9_Chapter.xhtml), “Latch-Related Wait Types.” To give you an
    example of such a scenario, consider a high amount of concurrent queries that
    all create a temporary table, insert a few rows, and remove the temporary table
    again. In this case, the PFS page of the tempdb database needs to get updates
    very frequently to reflect the creation and removal of the temporary tables.


    ### WRITE_COMPLETION Summary


    The WRITE_COMPLETION wait type, just like the ASYNC_IO_COMPLETION and IO_COMPLETION
    wait types, is related to specific storage-related actions performed by SQL Server.
    Seeing WRITE_COMPLETION waits is very normal and won’t be a cause for concern
    in many situations. Operations such as CHECKDB and database data or log file growth
    can cause WRITE_COMPLETION waits.


    # 7. Backup-Related Wait Types


    ​​Backups are a very important part of database administration, and they are essential
    for the survival of the company you work for. **Data is the most critical asset
    a business owns**, and if a disaster causes data to be lost, companies can lose
    large amounts of money or even go out of business.


    There are many possible methods to minimize data loss during a disaster. We could
    use a SAN instead of direct attached storage and perhaps leverage SAN replication.
    Or we could utilize cloud storage. Perhaps we create a SQL Server Always On Availability
    Group to replicate our data across datacenters and global regions. But the first
    step we must do, and hopefully have already taken, is performing regular backups
    of the data inside our SQL Server databases.


    Implementing and scheduling SQL Server backups is not a very difficult task, and
    there is no excuse not to perform regular backups. The type of backup and the
    interval of backup operations are dictated by the needs of the organization you
    work for and are frequently expressed in “RTO” (Recovery Time Objective) and “RPO”
    (Recovery Point Objective) times. These times represent the amount of time it
    should take to recover from a disaster and the amount of data loss that is acceptable
    when a disaster occurs. These two times should be the primary input for your SQL
    Server backup strategy.​


    Nerd Note


    I said “backup strategy,” but in reality what you want to build first is a **recovery
    strategy**. This is where RTO and RPO are vital. Once you know your recovery strategy,
    you then configure your database backups.


    Thankfully, SQL Server has different options available for meeting RTO and RPO
    requirements right out of the box. We can use SQL Server’s own backup mechanism
    to fulfill our company’s RTO and RPO times; we are not dependent on third-party
    backup software. Since the SQL Server backup operation is an internal process,
    there are different wait types associated with it, and in this chapter, we will
    take a look at three of the most common wait types directly related to performing
    backups and restores.


    Noticing high wait times on these backup-/restore-related wait types will not
    likely lead to a performance degradation of your SQL Server instance. However,
    we do have options to optimize the SQL Server backup process that can result in
    faster backup and restore times. And since backups/restores of your database(s)
    are vital for the survival of your company, optimizing backup and restore throughput
    is well worth the effort.


    ## BACKUPBUFFER


    The first backup-related wait type to discuss is **BACKUPBUFFER**. If we look
    up the definition of this wait type on Books Online, we get the following text:
    “Occurs when a backup task is waiting for data, or is waiting for a buffer in
    which to store data. This type is not typical, except when a task is waiting for
    a tape mount.” The way this is worded sounds as if we would only see this event
    when writing our backups to a tape device, which is not true. BACKUPBUFFER waits
    will always be logged during a backup operation, no matter the destination of
    the backup file. The reason for this is in the way the SQL Server backup operation
    uses buffers to read data from the database and write it to the backup file.'
