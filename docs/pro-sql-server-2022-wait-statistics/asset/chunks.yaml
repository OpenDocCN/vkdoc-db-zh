  trans: '

    我们再次运行 `Ostress` 工作负载，待其完成后，重新检查索引信息。这次，我们不使用 `INDEXPROPERTY` 函数，而是使用 `sys.dm_db_index_physical_stats`
    DMF 来返回关于索引内部索引页和数据页数量的额外信息。此查询返回如下信息：


    ```sql

    SELECT

    index_id,

    index_type_desc,

    index_depth,

    index_level,

    page_count,

    record_count

    FROM sys.dm_db_index_physical_stats

    (DB_ID(N''GalacticWorks''), OBJECT_ID(N''Insert_Test2''), NULL, NULL , ''DETAILED'');

    ```


    图 9-20 展示了在我测试的 SQL Server 实例上执行此查询的结果。


    ![](img/340881_3_En_9_Fig20_HTML.png)


    一个包含六列、名为 `index_id`、`index_type_desc`、`index_depth`、`index_level`、`page_count`
    和 `record_count` 的表格，以及其在四行中的相应条目。


    图 9-20


    `sys.dm_db_index_physical_stats` 结果


    如图中所示，非聚集索引现在具有三个级别，由 `index_depth` 列指示。`index_level` 和 `page_count` 列显示了 B 树的每个级别存在多少页。最高的
    `index_level` 数字是根级别，最低的是叶级别。


    虽然 B 树内部创建了新的级别，但并发的插入查询在能够导航 B 树之前必须等待，从而导致了 `LATCH_SH` 等待。


    ### 降低 `LATCH_[xx]` 等待


    在前面的例子中，我介绍了一个特定的锁存争用情况，当索引根页拆分以扩展 B 树结构时会发生这种情况。正如我之前提到的，`LATCH_[xx]` 等待类型报告的锁存类别还有很多。这使得描述“一刀切”的建议变得不可能。不过，我可以描述一个通用的方法，使用这里的列表：


    *   如果发生 `LATCH_[xx]` 等待，请查询 `sys.dm_os_waiting_tasks`。`resource_description`
    列显示了有关特定锁存类别的附加信息。如果你遇到 `LATCH_[xx]` 等待没有在 `sys.dm_os_waiting_tasks` 中显示，但在 `sys.dm_os_wait_stats`
    DMV 中可以看到高等待时间的情况，那么 `sys.dm_os_latch_waits` DMV 应该是你的起点。


    *   另一个有用的 DMV 可能是 `sys.dm_exec_requests` DMV。与 `sys.dm_exec_sql_text` DMF 连接在一起，它可能帮助你找到导致
    `LATCH_[xx]` 等待的查询。


    *   查询 `sys.dm_os_latch_waits`，查看这是否与 `sys.dm_os_waiting_tasks` DMV 的 `resource_description`
    列中显示的锁存类别相关。


    *   查阅《联机丛书》或本书附录 III 以获取有关特定锁存类别的更多信息。


    值得庆幸的是，看到 `LATCH_[xx]` 等待类型持续的高等待时间并不常见，因为可能导致 `LATCH_[xx]` 等待发生的情况通常与特定的工作负载和数据库设计有关。


    ### `LATCH_[xx]` 总结


    `LATCH_[xx]` 等待类型代表了 SQL Server 内部大量不同的、与缓冲区无关的锁存类别所遇到的等待。这些与缓冲区无关的锁存类别有自己的锁存等待
    DMV `sys.dm_os_latch_waits`，它返回这些锁存类别的等待时间。故障排除 `LATCH_[xx]` 等待可能很困难，因为与该等待类型相关的锁存类别文档很少。值得庆幸的是，看到
    `LATCH_[xx]` 等待类型出现高等待时间并不常见，因为它们只发生在非常特定的情况和工作负载下。


    ## `PAGEIOLATCH_[xx]`


    本章我们将讨论的最后一种与锁存相关的等待类型是 `PAGEIOLATCH_[xx]` 等待类型。`PAGEIOLATCH_[xx]` 等待类型是迄今为止最常见的锁存相关等待类型，它与
    `CXPACKET` 等待类型并列，是任何 SQL Server 实例上最常见的等待类型。


    就像我们之前讨论的两种锁存等待类型一样，`PAGEIOLATCH_[xx]` 有不同的访问模式，我在本章中用 `[xx]` 替换了它们。由于我们已经在引言中描述了不同的锁存模式，本章将不再进一步讨论它们。


    `PAGELATCH_[xx]` 等待类型与放置在缓冲区缓存内内存页面上的锁存有关，而 `LATCH_[xx]` 等待类型与非缓冲区对象上的锁存有关。`PAGEIOLATCH_[xx]`
    等待类型也指示了在 SQL Server 特定区域使用锁存，这里是 IO 锁存。


    ### 什么是 `PAGEIOLATCH_[xx]` 等待类型？


    SQL Server 内部的磁盘操作开销非常大。访问系统的磁盘子系统需要额外的资源，并且总是比访问系统内部内存中的信息慢。因为 SQL Server 是一个数据库，其主要功能是访问和存储数据，所以
    SQL Server 访问数据的方式极其重要。如果数据访问速度慢，SQL Server 的性能也会随之下降，这将导致查询或应用程序中出现明显的性能下降。为了使
    IO 交互尽可能高效，SQL Server 使用缓冲区缓存将之前访问过的数据页缓存到系统的内存中。通过缓存数据页，SQL Server 只需在第一次查询请求这些特定数据页时访问一次磁盘子系统。当后续查询需要与第一个查询相同的数据页时，SQL
    Server 通过缓冲区管理器检测到这些页已经在缓冲区缓存中，就会从缓冲区缓存内部访问这些数据页，而不是与磁盘子系统进行额外的交互。图 9-21 展示了当查询需要来自存储子系统的数据页时，缓冲区缓存的行为。


    ![](img/340881_3_En_9_Fig21_HTML.png)


    一个图表描绘了存储子系统如何将页从 SQL 服务器中的缓冲区管理器移动到缓冲区缓存并响应查询。


    图 9-21


    将页从存储子系统移动到缓冲区缓存


    在数据页从存储子系统移动到缓冲区缓存的过程中，使用锁存来为存储子系统上的数据页“预留”一个缓冲区页。这确保没有其他并发事务分配相同的缓冲区页或同时尝试将相同的数据页从存储子系统传输到缓冲区缓存。


    当 SQL Server 正在将数据页从存储子系统传输到缓冲区缓存时，将在缓冲区页上放置一个独占锁存。因为独占锁存几乎与所有其他锁存模式都不兼容（保持模式除外），所以保证在传输过程中没有其他锁存可以访问该缓冲区页。从用户的角度来看，在数据页传输期间将记录一个
    `PAGEIOLATCH_[xx]` 等待。锁存的模式取决于启动数据页从存储子系统移动到缓冲区缓存的操作。如果数据是为了读取访问而移动的，将记录一个 `PAGEIOLATCH_SH`；如果数据页是为了修改而移动的，则将使用
    `PAGEIOLATCH_UP` 或 `PAGEIOLATCH_EX`。图 9-22 展示了包括锁存和锁存等待在内的数据页移动过程。


    ![](img/340881_3_En_9_Fig22_HTML.png)


    一个时间图描绘了带有锁存的数据页如何从存储子系统分 5 步移动到 SQL 服务器的缓冲区缓存中：需要数据页、数据页在缓冲区缓存中、分配缓冲区页、将数据页移动到缓冲区、数据页已移动。


    图 9-22


    数据页移动


    总结前面的部分，如果你看到发生 `PAGEIOLATCH_[xx]` 等待，这意味着你的 SQL Server 实例正在将数据从存储子系统读取到你的缓冲区缓存中。因为这是一个非常常见的操作，所以很容易理解为什么
    `PAGEIOLATCH_[xx]` 等待类型是任何 SQL Server 实例上最常见的等待类型之一。

    '
- fmt: "### PAGEIOLATCH_[xx] 示例\n\n为 PAGEIOLATCH_[xx] 等待创建一个示例非常简单——只需在刚重启的 SQL Server\
    \ 实例上运行一个 `SELECT` 查询。重启 SQL Server 服务将清空所有数据页的缓冲区缓存。这样，缓冲区缓存中就不会有任何用户数据。然而，还有一种方法无需重启\
    \ SQL Server 服务即可清空缓冲区缓存。运行 `DBCC DROPCLEANBUFFERS` 命令将从缓冲区缓存中移除所有未修改的数据页。将其与\
    \ `CHECKPOINT` 命令结合使用，可以确保修改过的页也被写入磁盘，从而留下一个空的或“冷的”缓冲区缓存。\n\n代码清单 [9-3](#340881_3_En_9_Chapter.xhtml#PC23)\
    \ 中的查询将执行一个 `CHECKPOINT`，然后是 `DBCC DROPCLEANBUFFERS`。接着，它将重置 `sys.dm_os_wait_stats`\
    \ DMV 并对 `GalacticWorks` 数据库运行查询。在对 `GalacticWorks` 数据库中的某些表进行查询后，我们将查询 `sys.dm_os_wait_stats`\
    \ DMV 以查看 PAGEIOLATCH_[xx] 等待。\n\n```\nCHECKPOINT 1;\nDBCC DROPCLEANBUFFERS;\n\
    DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR);\nSELECT\n    SOD.SalesOrderID,\n\
    \    SOD.CarrierTrackingNumber,\n    SOH.CustomerID,\n    C.AccountNumber,\n \
    \   SOH.OrderDate,\n    SOH.DueDate\nFROM Sales.SalesOrderDetail SOD\nINNER JOIN\
    \ Sales.SalesOrderHeader SOH\n    ON SOD.SalesOrderID = SOH.SalesOrderID\nINNER\
    \ JOIN Sales.Customer C\n    ON SOH.CustomerID = C.CustomerID;\nSELECT *\nFROM\
    \ sys.dm_os_wait_stats\nWHERE wait_type LIKE 'PAGEIOLATCH_%';\n```\n**代码清单 9-3**\
    \ 生成 PAGEIOLATCH_SH 等待\n\n![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig23_HTML.png)\n\
    \n**图 9-23** PAGEIOLATCH_SH 等待时间信息\n\n在测试 SQL Server 实例上对 `sys.dm_os_wait_stats`\
    \ DMV 进行最后一次查询的结果如图 [9-23](#340881_3_En_9_Chapter.xhtml#Fig23) 所示。表中有 5 列，标题分别为\
    \ wait type、waiting tasks count、wait time milliseconds、max wait time milliseconds\
    \ 和 signal wait time milliseconds，以及其对应的 6 行条目。\n\n只看到记录了 PAGEIOLATCH_SH 等待是有道理的，因为我们执行的是\
    \ `SELECT` 查询而不是数据修改。如果我们对行执行某种形式的数据修改，我们将在结果中看到 PAGEIOLATCH_EX 等待。\n\n### 降低\
    \ PAGEIOLATCH_[xx] 等待\n\n如果你阅读了上一节，你就会明白 PAGEIOLATCH_[xx] 等待在 SQL Server 内部是完全正常的行为。在许多情况下，你的数据库大小超过了系统中可用的\
    \ RAM 量，与存储子系统发生一些交互是预料之中的。即使你的数据库小于系统中的 RAM 量，并且可以完全放入缓冲区缓存，你仍然会在 SQL Server\
    \ 启动期间注意到 PAGEIOLATCH_[xx] 等待的发生，因为这是 SQL Server 开始将数据页从存储子系统移动到缓冲区缓存的时间（如果有任何查询活动，SQL\
    \ Server 不会自行将数据从存储子系统移入缓冲区缓存）。\n\n由于看到 PAGEIOLATCH_[xx] 等待发生在每个 SQL Server 实例中都是完全正常的，因此为等待时间维护一个基线非常重要（第\
    \ [4](#340881_3_En_4_Chapter.xhtml) 章“构建可靠的基线”可以帮到你）。当等待时间保持在该等待类型的基线值范围内时，就不应该有任何值得担忧的原因。如果等待时间比你预期的高得多，可能需要调查高于正常等待时间的原因。导致\
    \ PAGEIOLATCH_[xx] 等待时间高于正常水平的原因有很多，我将描述一些比较常见的原因。\n\n当注意到 PAGEIOLATCH_[xx] 等待时间高于正常水平时，我首先查看\
    \ SQL Server 日志，以查明 SQL Server 是否已重启。SQL Server 可能因崩溃而重启，也可能在发生故障转移时重启。这些事件将导致高\
    \ PAGEIOLATCH_[xx] 等待时间，这可能不会反映在你的基线中，特别是因为 SQL Server 重启并不经常发生。由于我们的基线测量是使用平均值计算的，当更多测量值被纳入平均基线时，SQL\
    \ Server 启动期间的 PAGEIOLATCH_[xx] 等待时间会更低。如果你在特定时间范围内创建的基线测量值，并且在此期间 SQL Server\
    \ 没有重启，那么你的基线测量值也会相当低。正如我们在示例部分所读到的，`DBCC DROPCLEANBUFFERS` 也会从缓冲区缓存中移除数据页，导致命令完成后\
    \ PAGEIOLATCH_[xx] 等待时间更高。\n\n> **Nerd Note**\n> 遗憾的是，与 `DBCC FREEPROCCACHE` 命令不同，`DBCC\
    \ DROPCLEANBUFFERS` 命令的执行不会记录在 SQL Server 日志中。\n\n我看到的关于降低 PAGEIOLATCH_[xx] 等待时间的一个常见建议是将注意力集中在存储子系统上。由于\
    \ PAGEIOLATCH_[xx] 等待类型表示数据从存储子系统移动到缓冲区缓存，因此存储子系统在等待时间中起着至关重要的作用是符合逻辑的，但不要自动假设这是根本原因！如果你确实存在与存储相关的问题，这可能会在\
    \ PAGEIOLATCH_[xx] 等待时间中体现出来，因此检查存储子系统的性能是值得的。\n\n开始监控存储性能的一个好地方是 Perfmon。Perfmon\
    \ 有各种计数器，可以显示存储子系统的当前性能。以下列表中的计数器是我在监控存储性能时最常用的：\n\n*   `PhysicalDisk\\Avg. Disk\
    \ sec/Read` – 这将显示你正在监控的磁盘的平均读取延迟。延迟越低越好，作为一般准则，延迟值应低于 20 毫秒（在 Perfmon 中为 0.020，因为它以秒为单位报告延迟）。\n\
    *   `PhysicalDisk\\Avg. Disk sec/Write` – 这将返回你正在监控的磁盘的平均写入延迟。与读取延迟一样，写入延迟作为一般准则应低于\
    \ 20 毫秒。"
  raw: '### PAGEIOLATCH_[xx] Example


    Creating an example for PAGEIOLATCH_[xx] waits is extremely easy – just run a
    SELECT query against a freshly restarted SQL Server instance. A restart of the
    SQL Server service will empty the buffer cache of all data pages. This will leave
    you with a buffer cache without any user data inside it. There is, however, another
    way to clear the buffer cache without needing to restart the SQL Server service.
    Running the DBCC DROPCLEANBUFFERS command will remove all the unmodified data
    pages from the buffer cache. Combining it with the CHECKPOINT command will ensure
    the modified pages are also written to disk, leaving you with an empty, or “cold,”
    buffer cache.


    The query in Listing [9-3](#340881_3_En_9_Chapter.xhtml#PC23) will perform a CHECKPOINT,
    followed by a DBCC DROPCLEANBUFFERS. It will then reset the sys.dm_os_wait_stats
    DMV and run a query against the GalacticWorks database. After the query against
    some of the tables inside the GalacticWorks database, we will query the sys.dm_os_wait_stats
    DMV for PAGEIOLATCH_[xx] waits.


    ```

    CHECKPOINT 1;

    DBCC DROPCLEANBUFFERS;

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    SELECT

    SOD.SalesOrderID,

    SOD.CarrierTrackingNumber,

    SOH.CustomerID,

    C.AccountNumber,

    SOH.OrderDate,

    SOH.DueDate

    FROM Sales.SalesOrderDetail SOD

    INNER JOIN Sales.SalesOrderHeader SOH

    ON SOD.SalesOrderID = SOH.SalesOrderID

    INNER JOIN Sales.Customer C

    ON SOH.CustomerID = C.CustomerID;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''PAGEIOLATCH_%'';

    Listing 9-3

    Generate PAGEIOLATCH_SH waits

    ```


    Figure [9-23](#340881_3_En_9_Chapter.xhtml#Fig23) shows the results of the last
    query against the sys.dm_os_wait_stats DMV on my test SQL Server instance.


    ![](images/340881_3_En_9_Chapter/340881_3_En_9_Fig23_HTML.png)


    A table has 5 columns titled wait type, waiting tasks count, wait time milliseconds,
    max wait time milliseconds, and signal wait time milliseconds, along with its
    corresponding entries in 6 rows.


    Figure 9-23


    PAGEIOLATCH_SH wait time information


    It makes sense to see only PAGEIOLATCH_SH waits recorded, since we are executing
    a SELECT query instead of performing data modification. If we were to perform
    some form of data modification against the rows, we would see PAGEIOLATCH_EX waits
    in the results.


    ### Lowering PAGEIOLATCH_[xx] Waits


    If you read the previous section, you would understand PAGEIOLATCH_[xx] waits
    are completely normal behavior inside SQL Server. In many cases, your databases
    are larger in size than the available amount of RAM inside your system, and some
    interaction with the storage subsystem is to be expected. Even if your databases
    are smaller than the amount of RAM in your system, and they can fit entirely inside
    the buffer cache, you will still notice PAGEIOLATCH_[xx] waits occurring during
    the startup of SQL Server, since this is the time SQL Server will start moving
    data pages from the storage subsystem into the buffer cache (if there is any query
    activity, SQL Server won’t move data from the storage subsystem into the buffer
    cache by itself).


    Since seeing PAGEIOLATCH_[xx] waits occur is completely normal for every SQL Server
    instance, it is important to maintain a baseline of the wait times (Chapter [4](#340881_3_En_4_Chapter.xhtml),
    “Building a Solid Baseline,” can help you with that). When the wait times stay
    within the range of the baseline values for this wait type, there shouldn’t be
    any cause for concern. If wait times are much higher than you expect them to be,
    investigation into the source of the higher-than-normal wait times might be necessary.
    There are quite a few possible causes for seeing higher-than-normal PAGEIOLATCH_[xx]
    wait times, and I will describe some of the more common ones.


    The first place I look when noticing higher-than-normal PAGEIOLATCH_[xx] wait
    times is the SQL Server log to find out if SQL Server was restarted. SQL Server
    can restart due to a crash but also when a failover occurs. These events will
    cause high PAGEIOLATCH_[xx] wait times which might not be reflected in your baseline,
    especially since SQL Server restarts do not frequently occur. Since our baseline’s
    measurements are calculated using average values, the PAGEIOLATCH_[xx] wait times
    during SQL Server startup are lower when more measurements are taken inside the
    average baseline. If you create your baseline on measurements taken between a
    specific time range, and SQL Server hasn’t had a restart during the time range,
    your baseline measurements will also be considerably lower. As we read in the
    example section, a DBCC DROPCLEANBUFFERS will also remove data pages from the
    buffer cache, resulting in higher PAGEIOLATCH_[xx] wait times after the command
    completes.


    Nerd Note


    Sadly, unlike the DBCC FREEPROCCACHE command, the execution of the DBCC DROPCLEANBUFFERS
    command is not recorded in the SQL Server log.


    One common piece of advice I see about lowering PAGEIOLATCH_[xx] wait times is
    to focus attention on the storage subsystem. Since the PAGEIOLATCH_[xx] wait type
    indicates data movement from your storage subsystem to your buffer cache, it is
    logical the storage subsystem plays a vital role in the wait times, but do not
    automatically assume this is the root cause! If you do have storage-related problems,
    this can show in the PAGEIOLATCH_[xx] wait time, so checking the performance of
    your storage subsystem is worth the effort.


    A good place to start for monitoring storage performance is Perfmon. Perfmon has
    a variety of counters that will show you the current performance of your storage
    subsystem. Those in the following list are the ones I use the most when monitoring
    storage performance:


    *   **PhysicalDisk\Avg. Disk sec/Read** – This will show you the average read
    latency on the disk you are monitoring. Less latency is better, and as a general
    guideline, latency values should be below 20 milliseconds (0.020 within Perfmon,
    as it reports the latency in seconds).


    *   **PhysicalDisk\Avg. Disk sec/Write** – This will return the average write
    latency on the disk you are monitoring. Just like the read latency, write latency
    should, as a general guideline, be below 20 milliseconds.'
