- fmt: '# Analyzing Wait Statistics on a Per-Query Basis Using Execution Plans


    So far, we have looked at aggregated wait times generated by either various background
    processes or by the queries we executed ourselves. Since I was the only one executing
    queries against my test machine, it is easy to correlate wait times to specific
    queries. Unfortunately, on busy systems where many queries are constantly executed
    by many concurrent sessions, the various wait statistics DMVs were difficult for
    analyzing wait types and wait times for specific queries.


    Thankfully, the release of SQL Server 2016 SP1 introduced wait statistics captured
    inside query execution plans. This allows anyone to see the wait types and wait
    times a query encountered while running. Even though it might seem obvious, this
    also means per-query wait statistics are only available when looking at the actual
    execution plan, not the estimated execution plan.


    ## Nerd Note


    The actual execution plan is the execution plan used during the execution of the
    query. There is an option in SSMS to view the estimated execution plan. When used,
    the SQL Server engine compiles the execution plan *most likely to be used* during
    the query’s execution; however, it does not execute the query itself. Since there
    is no query execution, there are also no wait statistics to record while compiling
    the estimated execution plan.


    The easiest way to expose per-query wait statistics is by enabling the `Include
    Actual Execution Plan` option, shown in Figure 2-27, by clicking the “Query –
    Include Actual Execution Plan” menu item or by using the key combination `CTRL_M`
    and then executing your query.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig27_HTML.png)


    A screenshot of the execution menu bar. The cursor points to the highlighted icon
    to include the actual execution plan.


    Figure 2-27

    Include Actual Execution Plan option


    When you execute a query with the `Include Actual Execution Plan` option enabled,
    the query results return with an additional tab called `Execution plan`. Clicking
    the tab will return the visual representation of the execution plan used while
    executing your query. Figure 2-28 shows an example of an actual execution plan.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig28_HTML.png)


    A screenshot of the execution plan tab. The execution pathway for the selected
    query is as follows. Clustered index scan with 100% cost points to select with
    0% cost from right to left.


    Figure 2-28

    Execution plan


    With the `Execution plan` tab opened, we access the per-query wait statistics
    by right-clicking the first operator (which in the case of Figure 2-29 is the
    `SELECT` operator) and selecting `Properties`. This opens up the execution plan
    properties window inside SSMS and reveals a wealth of information, like the degree
    of parallelism used or the number of rows processed, for the query execution and
    the various properties of the operator we selected.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig29_HTML.png)


    A screenshot of the properties dialogue box. The cached plan size in the miscellaneous
    section is selected.


    Figure 2-29

    Execution plan properties


    The `WaitStats` properties are located at the bottom of the properties window.
    When expanding the `WaitStats` properties, you find all of the wait types and
    wait times this specific query experienced while executing. Figure 2-30 shows
    the per-query wait statistics for this specific example query.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig30_HTML.jpg)


    A screenshot of the wait stats window. It has 2 columns and lists the wait count
    and the wait time for 3 wait types.


    Figure 2-30

    Per-query wait statistics in the execution plan properties


    In this case, our query encountered three different wait types while executing:
    `PAGEIOLATCH_SH`, `MEMORY_ALLOCATION_EXT`, and `ASYNC_NETWORK_IO`. For each wait
    type, we see how much time was spent waiting and how many times we waited on the
    wait type. This information is useful when looking at what an individual query
    encounters in terms of wait statistics during its execution and, perhaps, can
    give insight for tuning the performance of the query. For instance, if you see
    a query frequently runs into storage-related wait statistics, it might be worth
    investigating how to minimize storage access for the specific query so it will
    execute faster.


    One thing that I like to point out again is that the per-query wait statistics
    are only recorded in the actual execution plan. The reason why I mention this
    again is the actual execution plan is only available by enabling it before execution
    of a query. There is no other way to access an actual execution plan, not even
    through the Query Store as we will see in the next chapter. As a matter of fact,
    the execution plans stored in the plan cache of SQL Server are the estimated execution
    plans and not the actual plans. This means that if you are expecting to retrieve
    per-query wait statistics through the plan cache, you are going to be disappointed.


    Thankfully, even though the Query Store feature does not record the actual execution
    plan, it does (with the release of SQL Server 2017) record wait statistics, and
    other query runtime information, together with the estimated execution plan. Mixing
    that information together means that through the Query Store we can look back
    in time and see what queries encountered in terms of wait statistics!


    ## Summary


    In this chapter, we reviewed the various ways we can access information about
    wait statistics. We took an in-depth look at some of the most important DMVs regarding
    wait statistics – `sys.dm_os_wait_stats`, `sys.dm_os_waiting_tasks`, `sys.dm_exec_requests`,
    and `sys.dm_exec_session_wait_stats` – described their functions and the data
    they returned, and gave you some example queries you can use against those DMVs.
    We also went through an example scenario where we combined some of the DMVs to
    analyze what was slowing down the SQL Server in the example. The steps shown in
    the example are a good way to analyze performance problems on your system when
    they are occurring. Briefly, we looked at the Performance Monitor, or Perfmon,
    and how you can access wait statistics information from inside it. After that,
    we took a good look at Extended Events and how you can use them to capture wait-related
    information for specific queries or sessions using the Extended Events GUI or
    T-SQL. We ended the chapter by looking at the execution plan recorded wait statistics.


    # 3. The Query Store


    With the release of SQL Server 2016, Microsoft introduced a new method to analyze
    and troubleshoot query performance: the Query Store. The Query Store is often
    called the “flight recorder” of SQL Server because it provides insights into when
    queries were executed, how well they performed, and the execution plan used during
    execution. While the Query Store did not initially expose wait statistics, the
    release of SQL Server 2017 included that much awaited addition.


    Since the Query Store is valuable in terms of query performance analysis and tuning,
    I believe it deserves some additional attention in order to maximize the benefit
    of this feature.'
  raw: '## Analyzing Wait Statistics on a Per-Query Basis Using Execution Plans


    So far, we have looked at aggregated wait times generated by either various background
    processes or by the queries we executed ourselves. Since I was the only one executing
    queries against my test machine, it is easy to correlate wait times to specific
    queries. Unfortunately, on busy systems where many queries are constantly executed
    by many concurrent sessions, the various wait statistics DMVs were difficult for
    analyzing wait types and wait times for specific queries.


    Thankfully, the release of SQL Server 2016 SP1 introduced wait statistics captured
    inside query execution plans. This allows anyone to see the wait types and wait
    times a query encountered while running. Even though it might seem obvious, this
    also means per-query wait statistics are only available when looking at the actual
    execution plan, not the estimated execution plan.


    Nerd Note


    The actual execution plan is the execution plan used during the execution of the
    query. There is an option in SSMS to view the estimated execution plan. When used,
    the SQL Server engine compiles the execution plan *most likely to be used* during
    the query’s execution; however, it does not execute the query itself. Since there
    is no query execution, there are also no wait statistics to record while compiling
    the estimated execution plan.


    The easiest way to expose per-query wait statistics is by enabling the Include
    Actual Execution Plan option, shown in Figure [2-27](#340881_3_En_2_Chapter.xhtml#Fig27),
    by clicking the “Query – Include Actual Execution Plan” menu item or by using
    the key combination CTRL_M and then executing your query.


