- fmt: '## Accessing Wait Statistics Through Query Store DMVs


    While the built-in Query Store reports are definitely helpful in visibly identifying
    queries with high wait times, there is far more information available using the
    `sys.query_store_wait_stats` DMV. The columns returned by this DMV show various
    statistics related to the wait types of the wait categories for a specific execution
    plan ID.


    Nerd Note


    The Query Store uses its own unique identifiers for queries, execution plans,
    and runtime intervals. With that in mind, you identify queries by looking up the
    `Query ID` inside the Query Store or execution plans by searching on the `plan
    ID`.


    Figure 3-8 shows the different statistics recorded for each execution plan ID,
    split into the different wait categories.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig8_HTML.png)


    A table of 12 rows and 9 columns. It lists the wait categories of lock, buffer
    latch, buffer I O, Tran lag I O, C P U, C P U, lock, memory, C P U, buffer latch,
    buffer I O, and Tran log I O.


    Figure 3-8


    Wait categories statistics inside `sys.query_store_wait_stats`


    While we query the `sys.query_store_wait_stats` DMV and look at the various statistics
    for each, or a specific, execution plan ID, we get more information when joining
    the various Query Store DMVs together.


    As an example, the following query joins various Query Store DMVs to return an
    overview of queries that encounter high total wait times.


    ```sql

    SELECT qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    ORDER BY qsws.total_query_wait_time_ms DESC;

    ```


    Listing 3-2

    Using a Query Store DMV


    The results of this query can be seen in Figure 3-9.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig9_HTML.png)


    A table of 14 rows and 7 columns. It lists the plan i d, query i d, runtime statistics
    interval i d, query s q l text, wait category d e s c, and total query wait time
    m s.


    Figure 3-9


    Wait statistics information from the Query Store


    Modifying the query by filtering on `Query ID` allows us to focus on a specific
    query and analyze its wait behavior. Following is the modified query, and you’ll
    see that I also added some additional columns returning various useful statistics.


    ```sql

    SELECT qsws.plan_id,

    qsq.query_id,

    qsws.runtime_stats_interval_id,

    qsqt.query_sql_text,

    qsws.wait_category_desc,

    qsws.total_query_wait_time_ms,

    qsws.avg_query_wait_time_ms,

    qsws.last_query_wait_time_ms

    FROM sys.query_store_wait_stats qsws

    INNER JOIN sys.query_store_plan qsp

    ON qsws.plan_id = qsp.plan_id

    INNER JOIN sys.query_store_query qsq

    ON qsp.query_id = qsq.query_id

    INNER JOIN sys.query_store_query_text qsqt

    ON qsq.query_text_id = qsqt.query_text_id

    WHERE qsq.query_id = 8

    ORDER BY runtime_stats_interval_id ASC;

    ```


    In the query and the query results, there is a column called `runtime_stats_interval_id`.
    The way in which the Query Store groups runtime (and wait time) metrics is by
    aggregating based on intervals. By default, these intervals are one-hour blocks,
    meaning the wait statistics returned for our specific query in the preceding example
    are the aggregated results of one, or multiple, query executions inside the interval.
    While you can lower the intervals to smaller time segments by setting the `Statistics
    Collection Interval` setting inside the Query Store properties, this will have
    a negative impact on the performance of your SQL Server Instance, so be careful
    when changing this setting.


    I have only shown a few examples of how to retrieve wait statistics–related metrics
    from inside the Query Store. With all the information the Query Store collects,
    there is a whole ocean full of other information to combine with the wait statistics
    metrics. For instance, filtering on specific wait categories, or detecting queries
    which generate different execution plans and the impact is on the waits for the
    specific query. I recommend everyone using SQL Server 2016 or higher to enable
    the Query Store and explore the metrics it collects.


    Nerd Note


    While the Query Store is only available from SQL Server 2016 and higher, William
    Durkin (@sql_williamd on Twitter) and Enrico van de Laar (@evdlaar) released a
    project called open Query Store which emulates Query Store data collection for
    SQL Server versions lower than 2016. The project is completely open source and
    free and available through the project’s GitHub page at `https://slrwnds.com/n4mudf`.


    ## Summary


    In this chapter, we looked at a new query performance and analysis feature introduced
    in SQL Server 2016: the Query Store. We looked at how the Query Store works underneath
    the covers and how we can access query wait statistics information in the built-in
    reports of the Query Store.


    Finally, we looked at accessing Query Store wait statistics using the new Query
    Store DMVs and showed some example queries that can help you get started on querying
    the Query Store.'
