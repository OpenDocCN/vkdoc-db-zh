    Figure 5-8


    Parallel thread distribution


    In this example, we see the clustered index scan returned 121317 rows that were
    distributed among two threads (notice that Thread 0, the coordination thread,
    doesn’t process any rows). The distribution of the number of rows is relatively
    even in this case, so we probably aren’t running into a skewed workload problem.


    Skewed workloads are often caused by outdated statistics. If the Query Optimizer
    believes there are fewer (or more rows) in the table than the true amount, it
    might distribute the work unevenly across the threads. Make sure to regularly
    perform maintenance on your statistics to prevent skewed workloads.


    ### Introduction of the CXCONSUMER Wait Type


    As described earlier, parallelism consists of two parts: producers and consumers.
    The easiest way to understand this is to consider the Thread 0 as a producer.
    It is the job of Thread 0 to distribute work to all available parallel worker
    threads. Those worker threads are consumers and perform the actual work the producers
    send to them.


    With the release of SQL Server 2017 CU3 (and later SQL Server 2016 SP2), Microsoft
    changed how parallelism waits are recorded. The main goal was to make the CXPACKET
    parallelism wait more actionable.


    Before SQL Server 2017 CU3 and SQL Server 2016 SP2, there was no way to distinguish
    if consumers were spending time waiting on producers to send work to them. Everything
    was recorded as CXPACKET wait time internally. The SQL Server development team
    split up the wait times for parallelism into two different categories: **CXPACKET**
    and **CXCONSUMER**. With this change, the meaning of those two wait types also
    changed compared to earlier SQL Server releases.


    CXCONSUMER waits will occur whenever a consumer thread is waiting for a producer
    thread to send rows. This is expected behavior and in many cases safely ignored
    when analyzing wait statistics information.


    CXPACKET waits are now recorded without the CXCONSUMER wait time, meaning CXPACKET
    wait times not only indicate parallelism occurring but also indicate an issue
    regarding parallelism operations (for instance, threads are running into issues
    with required buffer or thread synchronization). Effectively, this means if you
    are running SQL Server 2017 CU3 or SQL Server SP2 or higher, the CXPACKET wait
    indicates parallelism issues better than lower SQL Server versions, thus making
    the CXPACKET wait type more actionable as the development team intended. The advice
    in dealing with high parallelism wait times described earlier in this chapter
    is still valid, though it now has a more direct impact on CXPACKET wait times.


    ### CXPACKET Summary


    The CXPACKET wait type is directly related to the usage of parallelism during
    query execution. If queries are executed with parallelism, you will always see
    CXPACKET waits. Normally this is nothing to worry about, so avoid the knee-jerk
    reaction to turn off parallelism completely. Instead, focus on tuning the Max
    Degree of Parallelism and Cost Threshold for Parallelism options so that the thresholds
    are high enough that your large queries can benefit from using parallelism but
    your small queries do not experience a negative impact. Also, avoid skewed workloads
    by making sure your statistics are up-to-date.


    If you are running SQL Server 2017 CU3 or SQL Server 2016 SP2 (or higher), the
    CXPACKET wait time meaning has changed a bit resulting in that CXPACKET waits
    are far more likely to indicate a parallelism issue occurring than in SQL Server
    versions that are lower than those mentioned.


    ## SOS_SCHEDULER_YIELD


    Just like CXPACKET, the **SOS_SCHEDULER_YIELD** is a wait type that will frequently
    show up in the top 10 of total wait time on your system. And just like the CXPACKET
    wait types, SOS_SCHEDULER_YIELD wait times do not necessarily indicate there is
    a problem with your SQL Server instance. SOS_SCHEDULER_YIELD waits occur as soon
    as queries execute on your SQL Server instance and are closely related to SQL
    Server scheduling.'
  trans: '

    ### 通过解决倾斜的工作负载来降低 CXPACKET 等待时间


    倾斜的工作负载是指并行工作线程执行的工作量不均等的情况。这并非理想状态，因为`Thread 0`将等待运行时间最长的工作线程完成，并在此期间记录`CXPACKET`等待。图
    5-7 展示了一个倾斜工作负载的抽象示例。


    ![](img/340881_3_En_5_Fig7_HTML.png)


    一张线程与时间关系的折线图。从上到下有 5 条长度不等、向右的水平箭头，标记为线程 0 至 4。线程 0 是一条带阴影的虚线箭头。


    **图 5-7** 倾斜的并行查询线程


    如果我们将`Thread 2`的部分工作分配给`Thread 3`，查询将执行得更快，并导致更低的`CXPACKET`等待时间。


    我们在实际执行计划中并行操作的“实际行数”属性中查看线程分布。图 5-8 展示了一个使用并行处理执行的聚集索引扫描的属性。该操作是在前一节我们对`Sales.SalesOrderDetail`表使用的示例查询中发生的。


    ![](img/340881_3_En_5_Fig8_HTML.jpg)


    聚集索引扫描属性窗口的屏幕截图。其中“实际行数”选项被高亮显示。


    **图 5-8** 并行线程分布


    在这个示例中，我们看到聚集索引扫描返回了 121317 行，分布在两个线程之间（注意`Thread 0`，即协调线程，不处理任何行）。在这种情况下，行数分布相对均匀，因此我们可能没有遇到倾斜的工作负载问题。


    倾斜的工作负载通常由过时的统计信息引起。如果查询优化器认为表中的行数少于（或多于）实际数量，它可能会不均衡地将工作分配到各个线程。务必定期维护统计信息，以防止工作负载倾斜。


    ### CXCONSUMER 等待类型的引入


    如前所述，并行处理包含两部分：生产者和消费者。理解这一点最简单的方式是将`Thread 0`视为生产者。`Thread 0`的职责是将工作分配给所有可用的并行工作线程。那些工作线程是消费者，执行生产者发送给它们的实际工作。


    随着`SQL Server 2017 CU3`（及后续的`SQL Server 2016 SP2`）的发布，微软更改了并行等待的记录方式。主要目标是让`CXPACKET`并行等待更具可操作性。


    在`SQL Server 2017 CU3`和`SQL Server 2016 SP2`之前，无法区分消费者是否在等待生产者发送工作。在内部，所有这些都被记录为`CXPACKET`等待时间。SQL
    Server 开发团队将并行等待时间拆分为两个不同的类别：`CXPACKET`和`CXCONSUMER`。通过此更改，这两种等待类型的含义也与早期的 SQL
    Server 版本相比发生了变化。


    当消费者线程等待生产者线程发送行时，就会发生`CXCONSUMER`等待。这是预期行为，在许多情况下分析等待统计信息时可以安全地忽略。


    现在记录的`CXPACKET`等待时间不包含`CXCONSUMER`等待时间，这意味着`CXPACKET`等待时间不仅表示发生了并行处理，还表明并行操作存在问题（例如，线程遇到所需缓冲区或线程同步问题）。实际上，这意味着如果你运行的是`SQL
    Server 2017 CU3`或`SQL Server SP2`或更高版本，`CXPACKET`等待比低版本的 SQL Server 更能指示并行问题，从而使得`CXPACKET`等待类型如开发团队所期望的那样更具可操作性。本章前面描述的处理高并行等待时间的建议仍然有效，尽管它现在对`CXPACKET`等待时间有更直接的影响。


    ### CXPACKET 总结


    `CXPACKET`等待类型与查询执行期间并行处理的使用直接相关。如果查询以并行方式执行，你将始终看到`CXPACKET`等待。通常这没什么好担心的，因此避免下意识地完全关闭并行处理。相反，应专注于调整`最大并行度`和`并行的成本阈值`选项，使得阈值足够高，以便你的大型查询可以从并行处理中受益，而你的小型查询不会受到负面影响。同时，通过确保统计信息是最新的，避免倾斜的工作负载。


    如果你运行的是`SQL Server 2017 CU3`或`SQL Server 2016 SP2`（或更高版本），`CXPACKET`等待时间的含义略有改变，导致`CXPACKET`等待比低于这些版本的
    SQL Server 版本更可能表明发生了并行问题。


    ## SOS_SCHEDULER_YIELD


    与`CXPACKET`类似，`SOS_SCHEDULER_YIELD`是一个等待类型，它会经常出现在你系统总等待时间的前 10 位中。也与`CXPACKET`等待类型一样，`SOS_SCHEDULER_YIELD`等待时间不一定表明你的
    SQL Server 实例存在问题。只要查询在你的 SQL Server 实例上执行，`SOS_SCHEDULER_YIELD`等待就会发生，并且与 SQL
    Server 调度密切相关。

    '
- fmt: '## What Is the SOS_SCHEDULER_YIELD Wait Type?


    Before we answer what the `SOS_SCHEDULER_YIELD` wait type means, we have to go
    back to Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,”
    where we discussed SQL Server scheduling. Remember how the `SQLOS` uses its own
    cooperative non-preemptive scheduling model to make sure Microsoft Windows processes
    do not interrupt SQL Server’s own processes. The `SOS_SCHEDULER_YIELD` wait type
    has a direct relation with the `SQLOS`’s cooperative, non-preemptive scheduling
    model. To make it easier to understand, I have included Figure [5-9](#340881_3_En_5_Chapter.xhtml#Fig9),
    which should be familiar to you as it represents a scheduler that we discussed
    in Chapter [1](#340881_3_En_1_Chapter.xhtml).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig9_HTML.jpg)


    An illustration of a scheduling model. 3 boxes contain data related to C P U 1,
    runnable queue, and waiter queue.


    Figure 5-9 Scheduler and its phases and queues


    If you remember from Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics
    Internals,” worker threads move through the different phases and queues in a fixed
    order. Generally, a worker thread starts on the Waiter List while it waits for
    resources, and it then moves to the Runnable Queue waiting for its turn to be
    run on the processor and finally receives processor time to execute its request,
    receiving the “RUNNING” state. If the worker thread needs additional resources
    while it is in the “RUNNING” state, the worker thread moves back to the Waiter
    Queue list and starts a new trip through the different queues and phases.


    There is one exception to this behavior, and it occurs when a worker thread is
    in the “RUNNING” state and doesn’t need additional resources to complete its work.
    If the `SQLOS` allowed for a worker thread to stay on the processor for as long
    as it didn’t need any additional resources, the processor could be “hijacked”
    by one single worker thread for an infinite amount of time. To make sure a situation
    like this cannot occur, the scheduler gives every worker thread a specific slice
    of time in which they need to perform their work. We call this slice of time a
    `quantum`, and it is a fixed, unchangeable, 4 milliseconds. If a worker thread
    spends its quantum, it must yield the processor, and it moves back to the bottom
    of the Runnable Queue. It will skip the Waiter List because the worker thread
    doesn’t need additional resources. While the worker thread is waiting to move
    back to the processor again, the `SOS_SCHEDULER_YIELD` wait type is recorded.
    Figure [5-10](#340881_3_En_5_Chapter.xhtml#Fig10) shows this behavior.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig10_HTML.jpg)


    An illustration of a scheduler''s operation. An arrow from the C P U 1 with struck-through
    data points to the runnable queue with highlighted data at the bottom. The waiter
    queue is on the right.


    Figure 5-10 Worker thread voluntarily yielding the processor


    As you can probably guess, worker threads are voluntarily yielding all the time,
    especially on long-running queries where there is no need for additional resources.
    But keep in mind wait times for the `SOS_SCHEDULER_YIELD` wait type are only logged
    when the worker thread was in the Runnable Queue. If there is no other worker
    thread in front of the yielding worker thread, it will move directly back to the
    processor without waiting (it will still move through the Runnable Queue though).
    To show you an example of this, I executed the following queries against the `GalacticWorks`
    database on my test SQL Server, where there is no concurrency whatsoever:


    ```

    -- Clear Wait Stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Simple select

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- Check for SOS_SCHEDULER_YIELD waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    ```


    Listing 5-1 Sample queries to show `SOS_SCHEDULER_YIELD` waits


    Figure [5-11](#340881_3_En_5_Chapter.xhtml#Fig11) shows the results of this query
    against the `sys.dm_os_wait_stats` DMV.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig11_HTML.png)


    A screenshot of a tabular represention of wait type, count, and time among other
    columns. It has 6 columns and 1 row for the wait type S O S underscore scheduler
    underscore yield.


    Figure 5-11 `SOS_SCHEDULER_YIELD` waits


    As you can see in Figure [5-11](#340881_3_En_5_Chapter.xhtml#Fig11), the query
    encountered the `SOS_SCHEDULER_YIELD` wait type 30 times during execution. It
    did not spend any time waiting for another worker thread in the Runnable Queue
    since this was the only query executing at the time. If it spent any time waiting
    for another worker thread, the `wait_time_ms` column would have returned a value
    higher than 0.


    As I said at the start of this section, the `SOS_SCHEDULER_YIELD` wait type is
    generally not a cause for concern. If, however, the wait times are significantly
    higher than those in your baseline, it can be a reason to perform some additional
    research. There are basically three situations you can encounter when dealing
    with `SOS_SCHEDULER_YIELD` waits, as shown in Figure [5-12](#340881_3_En_5_Chapter.xhtml#Fig12).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig12_HTML.jpg)


    A graph for S O S underscore scheduler underscore yield wait type. It plots wait
    time versus waiting tasks. The features of worker threads are positioned in 4
    quadrants.


    Figure 5-12 `SOS_SCHEDULER_YIELD` situations


    Let’s look at how we can analyze and resolve the SQL Server CPU pressure problem.'
  raw: '### What Is the SOS_SCHEDULER_YIELD Wait Type?


    Before we answer what the SOS_SCHEDULER_YIELD wait type means, we have to go back
    to Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,” where
    we discussed SQL Server scheduling. Remember how the SQLOS uses its own cooperative
    non-preemptive scheduling model to make sure Microsoft Windows processes do not
    interrupt SQL Server’s own processes. The SOS_SCHEDULER_YIELD wait type has a
    direct relation with the SQLOS’s cooperative, non-preemptive scheduling model.
    To make it easier to understand, I have included Figure [5-9](#340881_3_En_5_Chapter.xhtml#Fig9),
    which should be familiar to you as it represents a scheduler that we discussed
    in Chapter [1](#340881_3_En_1_Chapter.xhtml).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig9_HTML.jpg)


    An illustration of a scheduling model. 3 boxes contain data related to C P U 1,
    runnable queue, and waiter queue.


    Figure 5-9


    Scheduler and its phases and queues


    If you remember from Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics
    Internals,” worker threads move through the different phases and queues in a fixed
    order. Generally, a worker thread starts on the Waiter List while it waits for
    resources, and it then moves to the Runnable Queue waiting for its turn to be
    run on the processor and finally receives processor time to execute its request,
    receiving the “RUNNING” state. If the worker thread needs additional resources
    while it is in the “RUNNING” state, the worker thread moves back to the Waiter
    Queue list and starts a new trip through the different queues and phases.


    There is one exception to this behavior, and it occurs when a worker thread is
    in the “RUNNING” state and doesn’t need additional resources to complete its work.
    If the SQLOS allowed for a worker thread to stay on the processor for as long
    as it didn’t need any additional resources, the processor could be “hijacked”
    by one single worker thread for an infinite amount of time. To make sure a situation
    like this cannot occur, the scheduler gives every worker thread a specific slice
    of time in which they need to perform their work. We call this slice of time a
    **quantum**, and it is a fixed, unchangeable, 4 milliseconds. If a worker thread
    spends its quantum, it must yield the processor, and it moves back to the bottom
    of the Runnable Queue. It will skip the Waiter List because the worker thread
    doesn’t need additional resources. While the worker thread is waiting to move
    back to the processor again, the SOS_SCHEDULER_ YIELD wait type is recorded. Figure
    [5-10](#340881_3_En_5_Chapter.xhtml#Fig10) shows this behavior.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig10_HTML.jpg)


    An illustration of a scheduler''s operation. An arrow from the C P U 1 with struck-through
    data points to the runnable queue with highlighted data at the bottom. The waiter
    queue is on the right.


    Figure 5-10


    Worker thread voluntarily yielding the processor


    As you can probably guess, worker threads are voluntarily yielding all the time,
    especially on long-running queries where there is no need for additional resources.
    But keep in mind wait times for the SOS_SCHEDULER_YIELD wait type are only logged
    when the worker thread was in the Runnable Queue. If there is no other worker
    thread in front of the yielding worker thread, it will move directly back to the
    processor without waiting (it will still move through the Runnable Queue though).
    To show you an example of this, I executed the following queries against the GalacticWorks
    database on my test SQL Server, where there is no concurrency whatsoever:


    ```

    -- Clear Wait Stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Simple select

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- Check for SOS_SCHEDULER_YIELD waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    Listing 5-1

    Sample queries to show SOS_SCHEDULER_YIELD waits

    ```


    Figure [5-11](#340881_3_En_5_Chapter.xhtml#Fig11) shows the results of this query
    against the sys.dm_os_wait_stats DMV.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig11_HTML.png)


    A screenshot of a tabular represention of wait type, count, and time among other
    columns. It has 6 columns and 1 row for the wait type S O S underscore scheduler
    underscore yield.


    Figure 5-11


    SOS_SCHEDULER_YIELD waits


    As you can see in Figure [5-11](#340881_3_En_5_Chapter.xhtml#Fig11), the query
    encountered the SOS_SCHEDULER_YIELD wait type 30 times during execution. It did
    not spend any time waiting for another worker thread in the Runnable Queue since
    this was the only query executing at the time. If it spent any time waiting for
    another worker thread, the wait_time_ms column would have returned a value higher
    than 0.


    As I said at the start of this section, the SOS_SCHEDULER_YIELD wait type is generally
    not a cause for concern. If, however, the wait times are significantly higher
    than those in your baseline, it can be a reason to perform some additional research.
    There are basically three situations you can encounter when dealing with SOS_SCHEDULER_YIELD
    waits, as shown in Figure [5-12](#340881_3_En_5_Chapter.xhtml#Fig12).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig12_HTML.jpg)


    A graph for S O S underscore scheduler underscore yield wait type. It plots wait
    time versus waiting tasks. The features of worker threads are positioned in 4
    quadrants.


    Figure 5-12


    SOS_SCHEDULER_YIELD situations


    Let’s look at how we can analyze and resolve the SQL Server CPU pressure problem.'
  trans: '## 什么是 SOS_SCHEDULER_YIELD 等待类型？


    在我们回答 `SOS_SCHEDULER_YIELD` 等待类型意味着什么之前，我们必须回到第 1 章“等待统计信息内部原理”，在那里我们讨论了 SQL Server
    调度。还记得 `SQLOS` 如何使用其自己的协作式非抢占调度模型来确保 Microsoft Windows 进程不会中断 SQL Server 自身的进程吗？`SOS_SCHEDULER_YIELD`
    等待类型与 `SQLOS` 的协作式非抢占调度模型直接相关。为了便于理解，我加入了图 5-9，您应该对它很熟悉，因为它代表了我们在第 1 章讨论过的调度器。


    ![](img/340881_3_En_5_Fig9_HTML.jpg)


    一个调度模型的示意图。3 个方框包含与 CPU 1、可运行队列和等待队列相关的数据。


    图 5-9 调度器及其阶段和队列


    如果您还记得第 1 章“等待统计信息内部原理”，工作线程会以固定顺序在不同阶段和队列中移动。通常，工作线程在等待资源时始于等待者列表（Waiter List），然后移动到可运行队列（Runnable
    Queue）等待在处理器上运行的轮次，最后获得处理器时间来执行其请求，进入“运行中”（RUNNING）状态。如果工作线程在“运行中”状态下需要额外资源，它会移回等待队列（Waiter
    Queue）列表，并开始在不同队列和阶段中的新一轮循环。


    这种行为有一个例外，它发生在一个工作线程处于“运行中”状态且不需要额外资源来完成工作时。如果 `SQLOS` 允许一个工作线程只要不需要额外资源就一直占用处理器，那么处理器可能会被一个工作线程无限期地“劫持”。为了确保这种情况不会发生，调度器会给每个工作线程一个特定的时间片，它们需要在此时间内完成工作。我们称这个时间为片为
    `quantum`（量程），它是一个固定不变的 4 毫秒。如果一个工作线程用完了它的量程，它必须让出处理器，并移回可运行队列的底部。它将跳过等待者列表，因为该工作线程不需要额外资源。当工作线程等待再次移动到处理器时，会记录
    `SOS_SCHEDULER_YIELD` 等待类型。图 5-10 展示了这种行为。


    ![](img/340881_3_En_5_Fig10_HTML.jpg)


    调度器操作的示意图。一个箭头从带有被划掉数据的 CPU 1 指向底部带有高亮数据的可运行队列。等待队列在右侧。


    图 5-10 工作线程主动让出处理器


    正如您可能猜到的那样，工作线程一直在主动让出处理器，特别是在不需要额外资源的长时间运行查询中。但请记住，只有在工作线程位于可运行队列中时，才会记录 `SOS_SCHEDULER_YIELD`
    等待类型的等待时间。如果在让出处理器的工作线程前面没有其他工作线程，它将直接移回处理器而无需等待（尽管它仍会经过可运行队列）。为了向您展示一个例子，我在测试
    SQL Server 上对 `GalacticWorks` 数据库执行了以下查询，其中没有任何并发：


    ```

    -- 清除等待统计信息

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- 简单的 select 查询

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    -- 检查 SOS_SCHEDULER_YIELD 等待

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''SOS_SCHEDULER_YIELD'';

    ```


    代码清单 5-1 用于显示 `SOS_SCHEDULER_YIELD` 等待的示例查询


    图 5-11 显示了针对 `sys.dm_os_wait_stats` DMV 执行此查询的结果。


    ![](img/340881_3_En_5_Fig11_HTML.png)


    一个表格表示的截图，包含等待类型、计数、时间等列。它有 6 列和 1 行，等待类型是 S O S_scheduler_yield。


    图 5-11 `SOS_SCHEDULER_YIELD` 等待


    正如您在图 5-11 中看到的，查询在执行过程中遇到了 30 次 `SOS_SCHEDULER_YIELD` 等待类型。由于当时这是唯一执行的查询，它没有花费任何时间在可运行队列中等待另一个工作线程。如果它花费了任何时间等待另一个工作线程，`wait_time_ms`
    列将返回一个大于 0 的值。


    正如我在本节开头所说的，`SOS_SCHEDULER_YIELD` 等待类型通常无需担心。然而，如果等待时间明显高于您的基线值，它可能成为进行一些额外研究的原因。处理
    `SOS_SCHEDULER_YIELD` 等待时，基本上会遇到三种情况，如图 5-12 所示。


    ![](img/340881_3_En_5_Fig12_HTML.jpg)


    一张关于 S O S_scheduler_yield 等待类型的图表。它绘制了等待时间与等待任务的关系图。工作线程的特征分布在 4 个象限中。


    图 5-12 `SOS_SCHEDULER_YIELD` 情况


    让我们看看如何分析和解决 SQL Server CPU 压力问题。'
- fmt: '### Lowering `SOS_SCHEDULER_YIELD` Waits


    If you are experiencing higher-than-normal `SOS_SCHEDULER_YIELD` wait times along
    with a large number of waits overall, you could, potentially, have a CPU-related
    problem on your system. To lower the `SOS_SCHEDULER_YIELD` waits, we will focus
    on the top-right section of Figure [5-12](#340881_3_En_5_Chapter.xhtml#Fig12),
    where there are a high number of waiting tasks and high wait times.


    If you are experiencing high wait times for the `SOS_SCHEDULER_YIELD` wait type
    together with a high number of waiting tasks, you probably have a very busy SQL
    Server instance. Worker threads will yield, but it takes a long time to get back
    on the processor again because there are many other threads waiting in the Runnable
    Queue. As we discussed earlier in Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait
    Statistics Internals,” the Runnable Queue is a first-in-first-out list, meaning
    the more worker threads waiting inside the Runnable Queue, the longer it takes
    for worker threads to move through it. You will usually see a high CPU usage on
    the system by the `sqlservr` process.


    To show an example of this problem, we will use the `Ostress` utility to execute
    a specific query simultaneously from a number of threads. The `Ostress` utility
    is part of the RML utilities for SQL Server, which are available here [https://​slrwnds.​com/​ixhxj4](https://slrwnds.com/ixhxj4).


    After the utilities are installed, we start by saving a script to a local file.
    In this case, we save to a folder `C:\TeamData\sos_scheduler_yield.sql` on the
    test server:


    ```

    WHILE (1=1)

    BEGIN

    SELECT COUNT(*)

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 45125 AND 44185

    END;

    ```


    Listing 5-2

    Sample Ostress script


    This query counts the number of rows between two `SalesOrderID`s in the `Sales.SalesOrderDetail`
    table of the `GalacticWorks` database. It will do this in an endless loop. After
    saving the query to a local file, we start the `Ostress` utility using the following
    command as shown in Listing [5-3](#340881_3_En_5_Chapter.xhtml#PC5) and Figure
    [5-13](#340881_3_En_5_Chapter.xhtml#Fig13):


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig13_HTML.png)


    A screenshot of a window for Ostress code execution. The window displays the command
    for the execution.


    Figure 5-13


    Ostress sample code executed using Command Prompt


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\sos_scheduler_yield.sql" -n20 -r1 -q

    ```


    Listing 5-3

    Ostress sample code


    This starts the `Ostress` utility, which connects to the `GalacticWorks` database
    and executes the `sos_scheduler_yield.sql` script using 20 threads.


    As soon as we start `Ostress`, the CPU of the test SQL Server hits 100%, as shown
    in Figure [5-14](#340881_3_En_5_Chapter.xhtml#Fig14).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig14_HTML.png)


    A screenshot of performance monitor graph. The graph has 2 shaded lines and provides
    information on scale, color, counter, instance, parent, object, and computer.


    Figure 5-14


    Impact of Ostress on the CPU


    As you see in Figure [5-14](#340881_3_En_5_Chapter.xhtml#Fig14), the CPU load
    is generated from the `sqlservr` process, which is the SQL Server instance we
    are running the `Ostress` query against. If we query the `sys.dm_os_waiting_tasks`
    DMV to check if the `SOS_SCHEDULER_YIELD` wait type is responsible for the CPU
    usage, we would be in for a surprise, as you can see in Figure [5-15](#340881_3_En_5_Chapter.xhtml#Fig15).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig15_HTML.png)


    A screenshot of sys dot d m underscore o s underscore waiting underscore tasks
    query output. The output table for the S O S underscore scheduler underscore yield
    has 11 columns and 0 rows.


    Figure 5-15


    No `SOS_SCHEDULER_YIELD` waits occurring


    This is the tricky part of the `SOS_SCHEDULER_YIELD` wait type, as it frequently
    won’t get returned by the `sys.dm_os_waiting_tasks` DMV – another reason to capture
    and use that wait statistics baseline!'
