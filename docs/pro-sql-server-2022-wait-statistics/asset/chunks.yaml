- fmt: '### Querying Lock Information


    To take a look at currently placed locks, we can use the `sys.dm_tran_locks` DMV.
    This DMV will return a row for every active lock inside the SQL Server instance,
    along with information like the type of lock, the resource type, the session ID
    that placed the lock, and whether the lock is granted or is waiting to be placed.
    Figure [8-4](#340881_3_En_8_Chapter.xhtml#Fig4) shows a (small) portion of the
    output of the DMV on my test SQL Server machine.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig4_HTML.png)


    A table has 9 columns titled resource type, resource subtype, resource database
    i d, resource description, resource associated entity i d, resource lock partition,
    request mode, request type, and request status. It has 10 rows of entries.


    Figure 8-4


    `sys.dm_tran_locks` output


    If we look at Figure [8-4](#340881_3_En_8_Chapter.xhtml#Fig4), we see a number
    of Exclusive locks (`X`) granted and placed at the Key lock level. This means
    a transaction is currently modifying data inside a clustered index. There is also
    an Intent Exclusive lock on the Page level, which is above the Key lock level,
    indicating there is an Exclusive lock lower down in the hierarchy. Also note a
    Shared lock is currently waiting to get placed on the same data page (`1:20432`).
    The lock cannot be granted just yet, as there is an incompatible Intent Exclusive
    lock in place.


    Since the Shared lock has to wait before it can be placed on the data page, we
    can view the time it has been waiting by looking at the wait statistics. Figure
    [8-5](#340881_3_En_8_Chapter.xhtml#Fig5) shows a part of the results of a query
    against the `sys.dm_os_waiting_tasks` DMV.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig5_HTML.png)


    A table has 7 columns titled waiting task address, session i d, execution content
    i d, wait duration milliseconds, wait type, resource address, and blocking task
    address.


    Figure 8-5


    Lock information inside `sys.dm_os_waiting_tasks`


    By using the `sys.dm_os_waiting_tasks` DMV, we see session ID 55 is currently
    waiting on a resource named `LCK_M_S`. This represents a Shared lock resource
    type. Session ID 55 is currently blocked by session ID 53, which happens to be
    the same session with the Exclusive and Intent Exclusive locks placed on the objects
    session ID 55 is trying to query. The `sys.dm_os_waiting_tasks` DMV will also
    return information we can use as input for the `sys.dm_tran_locks` DMV. This information
    will be available in the `resource_description` column of the `sys.dm_os_waiting_tasks`
    DMV, as shown in Figure [8-6](#340881_3_En_8_Chapter.xhtml#Fig6).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig6_HTML.png)


    A table has three columns titled blocking session i d, blocking executive context
    i d, and resource description, along with its corresponding entries in 6 rows.


    Figure 8-6


    `resource_description` column of the `sys.dm_os_waiting_tasks` DMV during a block


    If we copy the `associatedObjectID` and use it as input in the `WHERE` clause
    against the `sys.dm_tran_locks` DMV, we receive more information about why, and
    on what, this task is waiting. The following query will retrieve all the rows
    inside the `sys.dm_tran_locks` DMV with a `resource_associated_entity_id` of `72057594045333504`:


    ```

    SELECT *

    FROM sys.dm_tran_locks

    WHERE resource_associated_entity_id = '' 72057594045333504'';

    ```


    On my test SQL Server, the query returned 32 locks, 26 of which are Exclusive
    locks on rows inside a clustered index; there are also a number of Intent Exclusive
    locks on data pages and one Shared lock that is waiting to be placed on a page.
    The waiting Shared lock is the one returned by the `sys.dm_os_waiting_tasks` DMV.
    A portion of the results is displayed in Figure [8-7](#340881_3_En_8_Chapter.xhtml#Fig7).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig7_HTML.png)


    A table has 9 columns titled resource type, resource subtype, resource database
    i d, resource description, resource associated entity i d, resource lock partition,
    request mode, request type, and request status.


    Figure 8-7


    Lock information from `sys.dm_tran_locks`


    Finding lock information and figuring out who is blocking whom by querying the
    `sys.dm_tran_locks` DMV can be a challenge on systems where you have many locks
    and blocks occurring, since the DMV will return a row for every lock placed. An
    easy way to get these details is to enable and use the blocked process report
    ([`https://slrwnds.com/emsjqo`](https://slrwnds.com/emsjqo)). To do this, you
    must first enable the `blocked process threshold` in the configuration options
    for SQL Server. You do this with the following code:


    ```

    sp_configure ''show advanced options'', 1 ;

    RECONFIGURE

    GO

    sp_configure ''blocked process threshold'', 20 ;

    RECONFIGURE

    GO

    ```


    The threshold is set to seconds, and the minimum you can report on are blocked
    sessions for five seconds. Once you have configured the instance, you then capture
    details using SQL Trace; the easiest way to do this is with SQL Profiler. You
    will find the blocked process report inside the “Errors and Warnings” event:


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig8_HTML.png)


    A screenshot of a trace properties window that has a table under events selection
    with the headers: application name, binary data, C P U, client process I D, and
    column permissions. Row headers have drop down boxes. The drop down box of errors
    and warnings is opened in which blocked process report is highlighted.


    Figure 8-8


    Blocked process report


    The trace will return details in XML format, including details for blocked process
    and blocking process.


    Another simple way to discover blocking is to query the `sys.dm_os_waiting_tasks`
    DMV and examine the `blocking_session_id` column.


    Now that we have discussed many aspects of locking and blocking, from lock modes
    and hierarchies to analyzing locks and blocks, we should be ready to take a look
    at the lock-related wait types inside SQL Server. Keep in mind that this introduction
    to locking and blocking is far from a complete guide to the topic, as going into
    more detail on how locking and concurrency works inside SQL Server would fill
    a book by itself.


    ## LCK_M_S


    The first lock-related wait type is the `LCK_M_S` wait type. This wait type represents
    a task waiting to place a Shared lock on a resource. For example, if the resource
    currently has an Exclusive lock, the Shared lock task will wait.


    ### What Is the LCK_M_S Wait Type?


    The `LCK_M_S` wait type indicates a task is, or was, waiting to place a Shared
    lock on a resource. If a task is waiting to place a lock, we say the task is “blocked”
    by another task. The more common term used is “blocking,” and blocking is a natural
    occurrence in database systems which use locking to ensure ACID properties are
    maintained. This is true for every lock-related wait type, as they will only get
    recorded when there is a blocking situation.


    Since the `LCK_M_S` wait type is related to Shared locks, it will occur when a
    read action must wait because an incompatible lock is already in place on the
    resource we want to read. The time we are waiting to place the Shared lock is
    recorded as the `LCK_M_S` wait type.


    Figure [8-9](#340881_3_En_8_Chapter.xhtml#Fig9) shows a common situation resulting
    in `LCK_M_S` waits occurring. In this case, an Exclusive lock was placed on a
    page by `T1`, indicating a data modification. When `T2` wants to read data from
    the same page, it will need to place a Shared lock, but since Exclusive and Shared
    locks are incompatible, the `LCK_M_S` wait occurs.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig9_HTML.jpg)


    A diagram depicts how the page is locked with `X` by `T1` and the wait occurs
    in `LCK_M_S` with `T2`.


    Figure 8-9


    `LCK_M_S` wait occurring'
