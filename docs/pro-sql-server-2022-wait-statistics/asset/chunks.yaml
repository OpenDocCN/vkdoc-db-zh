- fmt: '# 10. High-Availability and Disaster-Recovery Wait Types


    SQL Server has provided several options for high availability and disaster recovery.
    Just like with performing regular database backups to ensure you can revert to
    a previous state of your database should a crash or data corruption occur, planning
    and maintaining highly available database environments is part of the job of a
    database administrator (or site reliability engineer).


    As the need for highly available database servers grows, many DBAs find themselves
    managing SQL Server instances inside a high-availability solution, like AlwaysOn
    Availability Groups, or a disaster-recovery configuration, like log shipping.
    With these types of SQL Server high-availability and disaster-recovery configurations
    comes a group of dedicated wait types directly related to the health of your high-availability
    and disaster-recovery (HA/DR) configuration.


    In this chapter, we will look at some of the common wait types in HA/DR configurations.
    The main focus of the wait types inside this chapter are AlwaysOn Availability
    Groups, because Microsoft is deprecating many of the previous installments of
    features (such as database mirroring) which now fall under the name AlwaysOn Availability
    Groups. As an exception to this rule, I selected one mirroring-related wait type
    which is relatively common on highly used mirroring configurations. All the other
    wait types are related to AlwaysOn Availability Groups.


    For the examples inside this chapter, I used several virtual machines to create
    a mirroring and an AlwaysOn Availability Group configuration. The configuration
    of these VMs can be found in Appendix I, "Example SQL Server Machine Configurations."


    ## DBMIRROR_SEND


    The first wait type in this chapter is the `DBMIRROR_SEND` wait type. As you might
    suspect from the name, `DBMIRROR_SEND` is related to database mirroring.


    Database mirroring is a feature introduced in SQL Server 2005 but was deprecated
    with SQL Server 2012. This doesn’t mean you cannot use database mirroring in SQL
    Server, but it does mean it is scheduled for removal. The entire feature will
    be replaced with AlwaysOn Availability Group, which offers the same configuration
    options as database mirroring.


    Database mirroring is a solution which increases the availability of SQL Server
    databases, and unlike failover clustering, it can be configured on a per-database
    basis. Database mirroring works by redoing every data modification operation which
    occurs on the primary database (called the *principal* in database mirroring terms)
    on the mirror database. The redoing of every database modification operation is
    achieved by streaming active transaction log records to the mirror server, which
    perform the operations on the mirror database in the sequence in which they were
    inserted into the transaction log on the principal database.


    Database mirroring offers two different operating modes which impact the availability
    and performance of the mirror configuration: synchronous (or high-safety) mode
    and asynchronous (or high-performance) mode. Even though both modes perform identical
    actions to ensure data modification operations are also performed on the mirror
    database, there can be a large difference in performance and thus in waits occurring.


    The synchronous mirror mode makes sure every data modification action performed
    on the principal is also directly performed on the mirror. It does this by waiting
    on sending a transaction confirmation message to the client until the transaction
    is successfully written to disk on the mirror. Figure [10-1](#340881_3_En_10_Chapter.xhtml#Fig1)
    depicts synchronous mirroring.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig1_HTML.jpg)


    A flow diagram of synchronous mirroring. Step 1, a transaction is done on the
    principal. Step 2, the transaction is committed in the mirror. Step 3, acknowledgment
    from the mirror sent to the principal. Step 4, the transaction confirmation is
    sent to the client.


    Figure 10-1


    Synchronous mirroring


    Even though synchronous mirroring makes sure data on the principal and mirror
    are 100% identical, it comes with a few drawbacks. One of those is the performance
    of your database inside a synchronous mirroring configuration is highly dependent
    on the speed the mirror can process data modification operations, since every
    transaction has to be committed on the mirror first.


    The flow of a data modification transaction is described in the steps that follow:


    1.  When the transaction is received, the principal will write the transaction
    to the transaction log, but the transaction is not yet committed.

    2.  The principal will send the log record to the mirror.

    3.  The mirror will harden the log record to disk and send an acknowledgment to
    the principal.

    4.  After the principal receives the acknowledgment, it will send a confirmation
    message to the client showing the transaction was completed, and the transaction
    gets committed to the transaction log on the principal.


    The asynchronous mode works in much the same way; the exception is it will not
    wait on an acknowledgment message from the mirror before sending the transaction
    confirmation message to the client. This means transactions are committed to disk
    on the principal before they are written to disk on the mirror. Using asynchronous
    mirroring will improve mirror performance, since the latency overhead of synchronous
    mirroring is removed. The trade-off for this increase in performance is that asynchronous
    replication can lead to data loss in the case of a disaster, since it is possible
    that transactions were not yet committed on the mirror. Figure [10-2](#340881_3_En_10_Chapter.xhtml#Fig2)
    shows the transaction log flow on an asynchronous mirror; the dotted lines indicate
    the actions are not performed directly.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig2_HTML.jpg)


    A flow diagram of asynchronous mirroring. Step 1, a transaction is done on the
    principal. Step 2, the transaction confirmation is sent from the principal to
    the client. Step 3, the transaction is committed in the mirror. Step 4, acknowledgment
    from the mirror sent to the principal.


    Figure 10-2


    Asynchronous mirroring


    ### What Is the DBMIRROR_SEND Wait Type?


    The `DBMIRROR_SEND` wait type is most frequently related to synchronous mirroring
    configurations. The description of the `DBMIRROR_SEND` wait type on Books Online
    is "Occurs when a task is waiting for a communications backlog at the network
    layer to clear to be able to send messages. Indicates that the communications
    layer is starting to become overloaded and affect the database mirroring data
    throughput." In this case, the Books Online definition is quite descriptive, but
    the network is not the only thing to impact `DBMIRROR_SEND` wait times. Having
    a slow disk subsystem connected to the mirror database will also lead to an increase
    in `DBMIRROR_SEND` wait times.


    Another important point to remember is high `DBMIRROR_SEND` wait times will frequently
    only be recorded on the mirror instance, and not on the principal. It is common
    to see waits occur on the `DBMIRROR_SEND` wait type on both the principal and
    the mirror, but these will normally be lower on the principal. They can still
    reach high values on the mirror since, generally, there is always some latency
    between both SQL Server instances. Because of expected latency, I advise you to
    use baseline measurements to identify higher-than-normal wait times for the `DBMIRROR_SEND`
    wait type.'
