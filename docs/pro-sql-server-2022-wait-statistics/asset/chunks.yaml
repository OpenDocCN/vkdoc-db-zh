  trans: '

    ### 查询 `sys.dm_exec_requests`


    `sys.dm_exec_requests` 动态管理视图通过返回 `sql` 和 `plan` 句柄，提供了访问查询语句及其对应执行计划的途径。如果你对此信息感兴趣——大多数情况下你确实会感兴趣——必须将
    `sql_handle` 和 `plan_handle` 传递给各自的动态管理函数，以便将哈希值转换为人类可以阅读和理解的形式。


    `清单 2-2` 展示了一个针对 `sys.dm_exec_requests` 动态管理视图的查询，该查询同时检索查询语句和执行计划。为了保持此示例的结果集较小，我排除了当前的会话
    ID，并忽略了小于 50 的会话 ID。


    ```sql

    SELECT

    r.session_id AS ''Session ID'',

    r.start_time AS ''Request Start'',

    r.[status] AS ''Current State'',

    r.[command] AS ''Request Command'',

    t.[text] AS ''Query'',

    p.query_plan AS ''Execution Plan''

    FROM sys.dm_exec_requests r

    OUTER APPLY sys.dm_exec_sql_text(r.sql_handle) AS t

    OUTER APPLY sys.dm_exec_query_plan(r.plan_handle) p

    WHERE r.session_id > 50

    AND r.session_id <> @@SPID;

    ```


    在我的系统上，结果显示在 `图 2-7` 中。


    ![](img/340881_3_En_2_Fig7_HTML.png)


    清单查询结果的截图。表格输出有 7 列和 5 行。最后一行中 select 查询的执行计划被高亮显示。


    `图 2-7` `清单 2-2` 的结果


    使用 `清单 2-2` 中的查询，我们立即看到会话 ID 64 正在执行一个 `SELECT` 查询，并且“查询”列显示了执行的完整语句。“执行计划”列以
    XML 格式返回了执行计划。我们可以点击 XML 链接来查看图形化的执行计划，如 `图 2-8` 所示。


    ![](img/340881_3_En_2_Fig8_HTML.png)


    一个 select 查询执行计划的流程图。事件按以下顺序列出。聚集索引扫描，成本 28%和 54%。计算标量，成本 0%和 1%。合并，成本 17%。从右到左选择，成本
    0%。


    `图 2-8` 执行计划


    利用执行计划，我们可以深入了解查询是如何被 SQL Server 引擎执行的。本书不会深入探讨执行计划的细节，但在优化查询性能时，你会频繁使用它们，因此了解如何从
    `sys.dm_exec_requests` 动态管理视图访问它们是很重要的。


    **技术说明**


    执行查询时，SQL Server 引擎利用查询优化器来确定返回结果的最高效方式。查询优化器的输出称为查询执行计划，有时也称为查询计划或执行计划。我们将在本章后面简要讨论执行计划，但如果你想了解更多关于执行计划以及如何利用它们进行性能调优的细节，请查阅
    Grant Fritchey 的系列书籍。


    ## `sys.dm_exec_session_wait_stats`


    与等待统计信息相关的动态管理视图中，较新的成员之一是 `sys.dm_exec_session_wait_stats` 动态管理视图。它在 SQL Server
    2016 SP1 中引入，返回**每个会话级别**的等待统计信息。如果你还记得`第 1 章`“等待统计信息内部原理”中的内容，会话是用户或进程与 SQL Server
    之间的一个活动连接。一个会话可以有多个请求，而这些请求又可以有多个任务来执行查询所需的操作。


    `图 2-9` 展示了该动态管理视图的列，以及来自我测试系统的一些等待统计信息。


    ![](img/340881_3_En_2_Fig9_HTML.png)


    `sys.dm_exec_session_wait_stats` 查询输出的截图。表格输出有 7 列和 14 行。它列出了会话 ID、等待类型、任务和计时。


    `图 2-9` `sys.dm_exec_session_wait_stats`


    前面的图看起来眼熟吗？可能确实如此，因为它实际上与 `sys.dm_os_wait_stats` 动态管理视图几乎完全相同，只是多了一个 `session_id`
    列。


    但不仅仅多了一个列。通过 `sys.dm_exec_session_wait_stats` 记录的等待统计信息是**某个特定会话在处于活动状态期间所执行的所有请求的累计值**。例如，如果你在一个会话内执行了十个不同的查询，该动态管理视图返回的等待时间是这十个查询的总等待时间。这意味着理解会话生命周期内发生了什么非常重要。也许该会话执行了大批量的查询，或者只执行了一个查询语句。在使用此动态管理视图分析会话等待统计信息之前，了解其工作负载是很重要的。


    此外，会话 ID 在会话关闭后会被重用，这意味着你会看到新会话和旧会话混合在一起的等待统计信息。当会话 ID 被重用（或在连接池中被重置）时，该动态管理视图中特定会话的等待统计信息也会被重置。


    考虑到以上信息，我们得出结论：当报告性能缓慢时，此动态管理视图并不能直接作为“首先查看的地方”。不过，它仍然有其用武之地，特别是当你能用涉及多个查询的特定操作重现某个特定的性能问题时。在这种情况下，你可以聚焦于特定的会话
    ID 并重现问题，捕获查询执行期间发生的所有事件的等待统计信息。

    '
- fmt: '## Combining DMVs to Detect Waits Happening Now


    We have reviewed the important DMVs for wait statistics analysis; now, let’s see
    an example of how to use DMVs to find out what is slowing down your SQL Server.
    Gathering this information will not solve all your problems immediately, but it
    will provide a clue as to where to start looking for a solution.


    Nerd Note

    The waits and queue tuning methodology is centered on the idea of resource consumption,
    where the resources are physical (`CPU`, `memory`, `disk I/O`, `network`) as well
    as logical (`locking/blocking`). As such, the trick here is to understand when
    it comes to tuning resource consumption you have only two options: `use less`
    or `buy more`. Once you understand this, it helps guide the actions and solutions
    possible for your performance issue.


    Consider the following scenario: you are the database administrator (DBA) for
    a large company using a single database to store all sales information. The database
    is running on a SQL Server instance, and every day, a few hundred users query
    the database.


    Normally everything is running fine – users quickly access the information they
    want, and everyone who needs to work with the database is happy. Today, however,
    is not a good day for you as the DBA. The phone hasn’t stopped ringing since 10
    a.m., and some users are gathering at the door of your office with an angry look
    in their eyes – querying and inserting sales information is incredibly slow.


    Since this book is about wait statistics, let’s look at how we analyze wait statistics
    information regarding the performance problem in the scenario.


    We know the `sys.dm_os_wait_stats` DMV shows cumulative wait statistics information,
    so for this scenario it wouldn’t be much help. A much better starting place would
    be the `sys.dm_os_waiting_tasks` DMV, since it will show us all the tasks that
    are waiting right now.


    We run the following query against the `sys.dm_os_waiting_tasks` DMV:


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    ORDER BY session_id DESC;

    ```


    While reviewing the results, we see many user sessions with waiting tasks, as
    shown in Figure 2-10.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig10_HTML.png)


    A screenshot of the results of a query. The tabular output has 8 columns and 14
    rows. The null outputs in the last 2 columns are shaded.


    **Figure 2-10** Results of a query against the `sys.dm_os_waiting_tasks` DMV


    We notice that the wait times for sessions 55, 76, and 77 seem high, and we also
    notice they are all waiting with a wait type `LCK_M_S`. Without going into too
    many details about this specific wait type (it will be discussed in detail in
    Chapter 8, “Lock-Related Wait Types”) it is enough to know this wait type is related
    to locking. Sessions 52, 56, and 57 are waiting to place a lock and are blocked
    by another process with a lock on the same object. We can extract locking and
    blocking information from the `sys.dm_os_waiting_tasks` DMF by looking at `blocking_columns`.
    For readability reasons, I modified the preceding query to return only blocking
    information from the `sys.dm_os_waiting_tasks` DMV. Figure 2-11 shows those columns.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig11_HTML.png)


    A screenshot of blocking information. The tabular output has 6 columns and 7 rows.
    It lists the session I D, the wait types, and blocking data.


    **Figure 2-11** Blocking information from the `sys.dm_os_waiting_tasks` DMV


    From what we see here, sessions 55 and 77 are blocked by session 76. Session 76,
    however, is blocked by session 65. We don’t see this session ID returned in the
    `sys.dm_os_waiting_tasks` DMV, which means the session is not waiting on any resources.


    Let’s check another DMV, `sys.dm_exec_requests`, to get information about session
    65:


    ```sql

    SELECT *

    FROM sys.dm_exec_requests

    WHERE session_id = 65;

    ```


    Figure 2-12 shows the results of this query.'
