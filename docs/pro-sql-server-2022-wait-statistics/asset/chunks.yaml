    除了存储子系统的性能外，查询的行为也会影响 `PAGEIOLATCH_[xx]` 等待类型的等待时间。查询请求的数据越多（且这些数据不在缓冲区缓存中），需要从存储子系统读取到缓冲区缓存的数据量就越大。例如，如果我们修改清单
