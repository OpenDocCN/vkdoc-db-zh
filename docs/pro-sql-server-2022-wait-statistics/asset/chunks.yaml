    The test SQL Server is responding incredibly slowly though, and querying anything
    requires multiple seconds.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig22_HTML.png)


    A screenshot of query output. The output table has 8 columns and 0 rows.


    Figure 5-22


    No tasks are waiting


    Let’s check the `sys.dm_os_waiting_tasks` DMV without filtering out session IDs:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks;

    ```


    As you see in Figure [5-23](#340881_3_En_5_Chapter.xhtml#Fig23), `THREADPOOL`
    waits are not logged as user sessions but have an empty session ID. This is one
    reason I always recommend to not filter the `sys.dm_os_waiting_tasks` DMV on session
    ID numbers.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig23_HTML.png)


    A screenshot of the thread pool waits in the query output. The output has 8 columns.
    The null outputs in the third, fourth, seventh, and eighth columns are shaded.


    Figure 5-23


    `THREADPOOL` waits


    There are quite a lot of `THREADPOOL` waits, with various wait times, some running
    into seconds of wait time. Things get worse than this though. Figure [5-24](#340881_3_En_5_Chapter.xhtml#Fig24)
    shows an error I encountered when I tried to connect to my test SQL Server instance
    while running the Ostress tool.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig24_HTML.png)


    A window screenshot with an error message. The window titled connect to server
    displays the error message that reads cannot connect to S Q L server and also
    provides additional information.


    Figure 5-24


    Timeouts are occurring and SQL Server is unresponsive


    This error is the result of SQL Server unable to handle any additional login requests.


    Now that we have seen the kind of problems thread pool starvation can create,
    let’s look at how we can lower, or even resolve, `THREADPOOL` waits.


    ## Gaining Access to Our SQL Server During `THREADPOOL` Waits


    `THREADPOOL` waits are difficult to troubleshoot, mostly because there are many
    possible reasons why your SQL Server doesn’t have any free worker threads available.
    Also, `THREADPOOL` waits can completely lock down your SQL Server instance, making
    connections to it (and troubleshooting it) almost impossible, as you have seen
    in the earlier example.


    The first step is to make sure you do not get into a situation where you cannot
    connect to your SQL Server instance for troubleshooting is to enable the Dedicated
    Administrator Connection (or DAC). If you remember the section about schedulers
    in Chapter [1](#340881_3_En_1_Chapter.xhtml), “Wait Statistics Internals,” you
    might recall a special type of scheduler reserved for the DAC. This dedicated
    scheduler, shown in Figure [5-25](#340881_3_En_5_Chapter.xhtml#Fig25), is strictly
    reserved for the DAC and has access to its own worker threads.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig25_HTML.png)


    A screenshot of a D A C scheduler. The table has 9 columns and 12 rows. The columns
    list the scheduler address, parent node I D, scheduler I D, C P U, I D, status,
    online, idle, and switches count.


    Figure 5-25


    Dedicated Administrator Connection scheduler


    If you connect through the DAC to your SQL Server instance, your session will
    be mapped to the DAC scheduler. This makes it possible to connect and execute
    queries even if all the other schedulers have massive task queues.


    You can enable the DAC by executing the following query:


    ```

    sp_configure ''remote admin connections'', 1

    GO

    RECONFIGURE

    GO

    ```


    If you want to connect to your SQL Server instance using DAC, you need to add
    the `ADMIN:` prefix to the server name you are connecting to, as shown in Figure
    [5-26](#340881_3_En_5_Chapter.xhtml#Fig26). You can only connect using the DAC
    when you execute a new query from inside SQL Server Management Studio without
    being connected to the server.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig26_HTML.png)


    A screenshot of the S Q L server connection window. The window has a dropdown
    menu for server type, server name, authentication, and user name with password.
    The field for the server name is active.


    Figure 5-26


    Connect using the Dedicated Administrator Connection


    You can also connect using DAC with `SQLCMD`, either by using the `ADMIN:` prefix
    when declaring the server instance name or with the `-A` parameter flag. Once
    you are able to connect to your SQL Server instances using the DAC, you always
    have a way in, even when the SQL Server instance won’t accept any new connections.


    With the DAC enabled, let’s discuss some common causes for `THREADPOOL` waits.


    ## Lowering `THREADPOOL` Waits Caused by Parallelism


    One of the most common causes for `THREADPOOL` waits is related to the extensive
    use of parallelism during query execution. During the execution of a parallel
    query, multiple worker threads are used to perform the work needed. If you left
    the configuration options related to parallelism – `Max Degree of Parallelism`
    and `Cost Threshold for Parallelism` – at the default values, it might cause more
    queries to run in parallel than was intended. Depending on how many processors
    your SQL Server has access to, and the number of worker threads used during a
    parallel query, one single parallel query can require many worker threads.


    To show this behavior, I have modified the query we used to generate `THREADPOOL`
    waits so that it will execute using parallelism. In this case, I commented out
    the `MAXDOP` query option:


    ```

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    -- OPTION (MAXDOP 1)

    ```


    For this example, I also configured the `Max Degree of Parallelism` to its default
    value of `0` and set the `Cost Threshold for Parallelism` option to `1`. This
    way I am 100% sure the query will be run using parallelism. I left the `Max Worker
    Threads` option on a value of `128` as we configured earlier.


    We now repeat the same `Ostress` test we performed earlier in this chapter by
    executing the following command:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    If we query the `sys.dm_os_waiting_tasks` DMV, we should see `THREADPOOL` waits
    occur again, but this time, because our test query is executed in parallel, we
    will also find many `CX*` waits returned by the `sys.dm_os_waiting_tasks` DMV,
    as shown in Figure [5-27](#340881_3_En_5_Chapter.xhtml#Fig27).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig27_HTML.png)


    A screenshot of query output. The table has 7 columns and 8 rows. Column 6 lists
    the C X SYNC underscore PORT and thread pool waits.


    Figure 5-27


    `CXSYNC_PORT` and `THREADPOOL` waits


    If you see a combination of `THREADPOOL` and parallelism waits occurring on your
    SQL Server instance, it is worth the effort to check your parallelism configuration.
    The first section of this chapter discussed `CXPACKET` waits and how you can lower
    them. Another hint that might steer you in this direction is the CPU load during
    this particular case is higher than normal. In the case of my test SQL Server
    instance, all my CPUs went to 100%.'
