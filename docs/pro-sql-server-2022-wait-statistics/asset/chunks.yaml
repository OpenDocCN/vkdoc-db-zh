- fmt: '## PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Waits


    A screenshot of a SQL Server result window has 2 rows and 6 columns. It lists
    the wait type, waiting tasks count, wait time, max wait time, and signal wait
    time. The wait type, preemptive OS decrypt message is selected.


    Figure 11-10


    As you see, the `PREEMPTIVE_OS_ENCRYPTMESSAGE` wait time has more waits and wait
    time associated with it. This is logical since I performed a select query and
    it had to decrypt the acknowledgement network messages from the client. The results
    of the query are encrypted by SQL Server, which leads to higher waits on the `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    wait type.


    ### Lowering PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Waits


    Under normal circumstances, there should be no need to focus attention on lowering
    the `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types.
    They indicate encryption is occurring, which is probably a choice made when configuring
    the SQL Server instance. Disabling encryption will lower the `PREEMPTIVE_OS_ENCRYPTMESSAGE`
    and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait times, but at the cost of security.


    ### PREEMPTIVE_OS_ENCRYPTMESSAGE and PREEMPTIVE_OS_DECRYPTMESSAGE Summary


    The `PREEMPTIVE_OS_ENCRYPTMESSAGE` and `PREEMPTIVE_OS_DECRYPTMESSAGE` wait types
    indicate encryption is occurring between the SQL Server instance and a client.
    These wait types can generally be ignored since they do not directly indicate
    a performance problem. Lowering them can be achieved by disabling the use of encryption,
    but this comes at the cost of security.


    ## PREEMPTIVE_OS_WRITEFILEGATHER


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type is related to storage interactions,
    more specifically writing of files through the Windows operating system.


    ### What Is the PREEMPTIVE_OS_WRITEFILEGATHER Wait Type?


    The `PREEMPTIVE_OS_WRITEFILEGATHER` wait type is related to the `WriteFileGather`
    function inside the Windows operating system. From the definition of this function
    on Books Online, “Retrieves data from an array of buffers and writes the data
    to a file,” from this description, we assume the function is called when SQL Server
    needs to write data to a file. This does not count for every storage subsystem
    write operation inside SQL Server, however. Generally there is no need for SQL
    Server to move outside its own engine to wait for a preemptive operation. There
    are some exceptions, however, which result in `PREEMPTIVE_OS_WRITEFILEGATHER`
    waits (depending on the Windows function used to perform the storage subsystem
    interaction). One specific operation inside SQL Server which will always result
    in `PREEMPTIVE_OS_WRITEFILEGATHER` waits is the growing of data files. Whenever
    SQL Server needs to grow a data file, it will allocate extra space on the storage
    subsystem and “zero out” the new space. The allocation of the extra space does
    not happen inside the SQL Server engine; thus, a preemptive operation takes place,
    which leads to preemptive waits on the `WriteFileGather` function.


    ### PREEMPTIVE_OS_WRITEFILEGATHER Example


    To show an example of `PREEMPTIVE_OS_WRITEFILEGATHER` waits occurring, let’s use
    the situation described in the previous section, growing a database data file.
    For this example, I will restore a backup of the `GalacticWorks` database, which
    has a single database data file with a size of 194 MB, as shown in Figure [11-11](#340881_3_En_11_Chapter.xhtml#Fig11).


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig11_HTML.jpg)


    A screenshot of a window labeled database files has 2 rows and 5 columns. It lists
    the database files with the details, logical names, file types, file group, size,
    and auto growth or max size.


    Figure 11-11


    Default database file configuration of GalacticWorks


    I will grow the single database data file to a size of 10 GB. Because the allocation
    of the extra space needed for the data file is performed outside SQL Server, this
    should result in `PREEMPTIVE_OS_WRITEFILEGATHER` waits.


    > **Nerd Note**

    >

    > This example relies on the Instant File Initialization option disabled. More
    on that in the next section. But it warrants mentioning here, before you attempt
    this example.


    To perform the action of enlarging the database data file, I used the script shown
    in Listing [11-2](#340881_3_En_11_Chapter.xhtml#PC2). This script will clear the
    `sys.dm_os_wait_stats` DMV, enlarge the `GalacticWorks` data file, and then query
    the `sys.dm_os_wait_stats` DMV for `PREEMPTIVE_OS_WRITEFILEGATHER`.


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    USE [master];

    ALTER DATABASE [GalacticWorks]

    MODIFY FILE

    (NAME = N''GalacticWorks_Data'',

    SIZE = 10240000KB);

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_WRITEFILEGATHER'';

    Listing 11-2

    Enlarge AdventureWorks database data file

    ```


    The query in Listing [11-2](#340881_3_En_11_Chapter.xhtml#PC2) is almost instantly
    completed on my test SQL Server instance; it has very fast storage and results
    in the wait information shown in Figure [11-12](#340881_3_En_11_Chapter.xhtml#Fig12)
    for the `PREEMPTIVE_OS_WRITEFILEGATHER` wait type.


    ![](images/340881_3_En_11_Chapter/340881_3_En_11_Fig12_HTML.jpg)


    A screenshot of a SQL Server result window has 6 columns and a row. It lists the
    wait type as preemptive O S write file gather with waiting tasks count as 1, wait
    time m s as 447, max wait time m s as 447, and signal wait time m s as 0.


    Figure 11-12


    `PREEMPTIVE_OS_WRITEFILEGATHER` waits


    Notice that there was only one single wait on the `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type, and the duration was practically as long as it took to perform the
    enlargement of the data file.'
