- fmt: '### Lowering ASYNC_NETWORK_IO Waits


    One way to lower ASYNC_NETWORK_IO waits is to identify queries returning a large
    result set back to the application. A common example is a query using `SELECT
    *` and returns all columns from a wide table where only a few columns were needed.
    In our example, if we modify the query to return only the first 100 rows, `SSMS`
    might be able to keep up with the information returned.


    ```sql

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT TOP 100 *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```

    Listing 6-5

    Limit to 100 rows


    The resulting wait times after this modification can be seen in Figure [6-10](#340881_3_En_6_Chapter.xhtml#Fig10).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig10_HTML.png)

    Figure 6-10

    ASYNC_NETWORK_IO wait times after modifying the query


    As you can see, we have less `ASYNC_NETWORK_IO` waits. `SSMS` was able to keep
    up with the results returned, so the SQL Server instance did not delay sending
    the results back to the client.


    Another way to limit results returned is by filtering out information using `WHERE`
    clauses. Smaller results will result in lower `ASYNC_NETWORK_IO` wait times.


    If you believe that `ASYNC_NETWORK_IO` waits are not caused by large results being
    returned to an application, or by the speed at which an application can process
    the results, there is a possibility the network configuration is slowing you down.
    In this case, you should first check your network utilization. Sadly, there isn’t
    a counter in `Perfmon` that directly shows the network utilization without having
    you perform some math to calculate it. Instead, use the `Networking` tab of the
    `Task Manager` to view your network-card utilization, as shown in Figure [6-11](#340881_3_En_6_Chapter.xhtml#Fig11).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig11_HTML.png)

    Figure 6-11

    Task Manager network utilization


    If you notice that the network utilization is high while also experiencing higher
    than normal `ASYNC_NETWORK_IO` wait times, it is possible the network is slowing
    you down. In this case, it is a good idea to talk to your network administrator.
    Usually a network configuration consists of many parts, like switches, routers,
    firewalls, network cables, drivers, firmware, potential virtualization of the
    operating system, and so on. All of these parts can slow down your network throughput
    and can be a potential cause of `ASYNC_NETWORK_IO` waits.


    ### ASYNC_NETWORK_IO Summary


    The `ASYNC_NETWORK_IO` wait type occurs whenever an application requests query
    results from a SQL Server instance over the network and does not process the returned
    results fast enough. Seeing `ASYNC_NETWORK_IO` waits occur is completely normal,
    but higher than normal wait times can be caused by changes in the returned query
    results or network-related problems. Lowering `ASYNC_NETWORK_IO` wait times that
    are application related can be achieved by decreasing the number of rows and/or
    columns returned to the application.


    ## CMEMTHREAD


    Waits of the `CMEMTHREAD` wait type indicate a pressure on SQL Server–related
    memory objects. These memory objects allocate memory for the various parts of
    SQL Server like both the buffer and procedure cache. Whenever `CMEMTHREAD` waits
    occur, it means multiple threads are trying to access the same memory object at
    the same time.


    ### What Is the CMEMTHREAD Wait Type?


    To explain how `CMEMTHREAD` wait type generation works, we have to dig a little
    deeper inside some programming terminology, specifically the terms `critical sections`,
    `mutual exclusions`, and `thread safety`. These three concepts play a direct role
    in the `CMEMTHREAD` wait type generation.


    A `critical section` consists of a piece of code accessing a shared resource which
    can only be accessed by one thread at a time. In our case, the shared resource
    would be a SQL Server memory object (perhaps a data page). SQL Server memory objects
    are accessed by a single thread at a time to minimize the risk of corruption to
    the memory object. Because there are many threads wanting to access memory objects,
    we use a method to allow only one thread access at a time. This method is called
    `mutual exclusion (mutex)`. SQL Server uses a `mutex` object to make sure concurrent
    threads are not in their critical sections at the same time when accessing the
    memory object. A `mutex` does this by serializing the thread access to the memory
    object. Only a single thread can be the owner of a `mutex` object, and while a
    thread has ownership, it can access the shared resource. When the thread is done,
    the `mutex` object will move to the next thread in line. By using these objects,
    we have created `thread-safe` code, where multiple threads do not have concurrent
    access to memory objects. Figure [6-12](#340881_3_En_6_Chapter.xhtml#Fig12) shows
    this situation.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig12_HTML.png)

    Figure 6-12

    Thread waiting for a mutex object to access a shared resource


    A simplified example of this behavior is when you and a large group of other people
    are waiting for a single ticket dispenser to buy a ticket to see your favorite
    rock band. In this case, the ticket dispenser is the shared resource, and only
    a single person can access the ticket dispenser at a time. When we reach the ticket
    dispenser, we can get a ticket, and the people behind us have to wait until we
    are done. After we have bought a ticket, the next person in line gets access to
    the ticket dispenser.


    We can also view this behavior in SQL Server, but to do this we have to make use
    of a debugger (like `WinDbg`). Figure [6-13](#340881_3_En_6_Chapter.xhtml#Fig13)
    shows how a thread in SQL server waits for a `mutex` since access to the memory
    object was granted to another thread. To capture this image, I used an `Extended
    Event` session which created a SQL Server mini-dump when a `CMEMTHREAD` wait occurred.
    I then used `WinDbg` to open the mini-dump and returned the stack. For details
    on how to use `SqlDumper`, go to `https://slrwnds.com/32n2up`.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig13_HTML.png)

    Figure 6-13

    Example of a CMEMTHREAD wait occurring in a mini-dump


    The important line here is the `SOS_UnfairMutexPair::LongWait`, which generates
    the `CMEMTHREAD` wait because the thread we are monitoring has to wait for another
    thread which currently has access to the memory object. The line after that, `SOS_UnfairMutexPair::AcquirePair`,
    means the thread received the mutex, followed by access to the memory object represented
    by `CMemThread<CmemObj>::Alloc`.'
