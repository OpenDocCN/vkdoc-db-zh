    `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型了！


    生成 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待非常简单。我现在从
    `SSMS` 执行的每个查询都将被加密，即使我在与 SQL Server 实例相同的机器上运行 `SSMS`。我使用清单 11-1 中的查询来重置 `sys.dm_os_wait_stats`
    DMV，连接到 `GalacticWorks` 数据库，执行一个简单查询，然后查看发生在 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和
    `PREEMPTIVE_OS_DECRYPTMESSAGE` 等待类型上的等待。


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    USE GalacticWorks;

    SELECT *

    FROM Sales.SalesOrderDetail;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''PREEMPTIVE_OS_ENCRYPTMESSAGE''

    OR wait_type = ''PREEMPTIVE_OS_DECRYPTMESSAGE'';

    ```

