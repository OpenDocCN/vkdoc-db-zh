- fmt: '# 1. Wait Statistics Internals


    SQL Server wait statistics are an important tool for analyzing performance-related
    problems and optimizing SQL Server performance. However, they are not always known
    to many database administrators or developers. I believe this has to do with their
    relatively complex nature, the sheer volume of different types available, and
    the lack of documentation for many types of wait statistics. Wait statistics are
    also directly tied to the specific SQL Server on which they occur, meaning it
    is impossible to compare wait statistics of Server A to wait statistics of Server
    B, even with identical hardware and database configuration. Every configuration
    option, from the hardware firmware level to the configuration of the SQL Server
    Native Client on the client computers, will impact the wait statistics!


    Therefore, we will start this book with a review of SQL Server internals pertaining
    to wait statistics. We will discuss how wait events are generated, how to view
    wait events, and how to analyze them as part of a proper performance tuning methodology.
    Then in Part II of this book, we will explore and examine specific wait events.


    This chapter will look at the history of wait statistics through the various versions
    of SQL Server. Next, we will review the SQL Operating System, or SQLOS. The architecture
    of the SQLOS is closely tied to wait statistics and to performance troubleshooting
    in general. The rest of this chapter is dedicated to one of the most important
    aspects of wait statistics: thread scheduling.


    Before we begin, I want to mention a few things related to the terminology used
    when discussing wait statistics. In the introduction of this book and the preceding
    paragraphs, I mentioned the term wait statistics. The sentence “compare wait statistics
    of Server A to wait statistics of Server B” is technically wrong, since we compare
    the *wait time* (the total time we have been waiting on a resource) of a *specific
    wait type* (the specific wait type related to the resource we are waiting on).
    From this point on, when I use the term wait statistics, I mean the concept of
    wait statistics, and I will use the correct terms wait time and wait type where
    appropriate.


    ## A Brief History of Wait Statistics


    SQL Server has been around for quite some time now. The first release of SQL Server
    dates back to 1989 and was released for the OS/2 platform. Until SQL Server 6.0,
    released in 1995, Microsoft worked together with Sybase to develop SQL Server.
    In 1995, however, Microsoft and Sybase went their separate ways. Both Microsoft
    and Sybase stayed active in the database world (SAP acquired Sybase in 2010).
    In 2022, Microsoft will release SQL Server 2022, while SAP released SAP Sybase
    ASE 16 in 2014 (but is still maintained today), both relational enterprise-level
    database systems.


    Between SQL Server 6.0 and SQL Server 2022, many things have changed, and it is
    difficult to compare any two versions alongside one another. One thing which has
    not changed through the years is the concept of wait statistics. Each version
    of SQL Server stores information about its internal processes. Even though the
    way we access such information has changed over the years, wait statistics remain
    an important part of the internal logging process.


    In early versions of SQL Server, access to wait statistics required the use of
    undocumented commands. Figure [1-1](#340881_3_En_1_Chapter.xhtml#Fig1) shows how
    to query wait statistics information in SQL Server 6.5 using the `DBCC` command.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig1_HTML.png)


    A screenshot of the S Q L Server 6.5 result page has two columns, wait statistic
    and value with 21 rows. The text below reads, D B C C execution completed. D B
    and queries dropdown boxes are on top.


    Figure 1-1


    SQL Server wait statistics for SQL Server 6.5


    One of the big changes introduced with SQL Server 2005 was the conversion of many
    internal functions and commands into Dynamic Management Views (`DMVs`) and Dynamic
    Management Functions (`DMFs`). This made it easier to query and analyze the information
    returned by functions and commands, including wait statistics information. A new
    way of performance analysis was born with the release of the SQL Server 2005 Microsoft
    whitepaper `SQL Server 2005 Waits and Queues` by Tom Davidson.


    In the subsequent releases of SQL Server, the volume of new and different wait
    types grew exponentially whenever new features or configuration options were introduced.
    If you look at Figure [1-1](#340881_3_En_1_Chapter.xhtml#Fig1), you will notice
    that 21 different wait types were returned. Figure [1-2](#340881_3_En_1_Chapter.xhtml#Fig2)
    shows the amount of wait types, as the number of rows returned, available in SQL
    Server 2022.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig2_HTML.png)


    A screenshot of the S Q L Server 2022 window has a query and its results below
    with 5 columns, wait type, waiting tasks count, wait time m s, max wait time m
    s, and signal wait time m s. The column names have underscore instead of spaces
    in between. The bottom bar has the count of rows as 1334.


    Figure 1-2


    SQL Server wait statistics in SQL Server 2022


    With the release of SQL Server 2022 RC0, the number of wait types increased to
    more than 1,300 different wait types! The number of wait types will likely continue
    to grow in future SQL Server releases, as new features are introduced or existing
    features are changed. Thankfully there is a lot more information available about
    wait statistics now than there was in SQL Server 6.5!'
  raw: '# 1. Wait Statistics Internals


    SQL Server wait statistics are an important tool for analyzing performance-related
    problems and optimizing SQL Server performance. However, they are not always known
    to many database administrators or developers. I believe this has to do with their
    relatively complex nature, the sheer volume of different types available, and
    the lack of documentation for many types of wait statistics. Wait statistics are
    also directly tied to the specific SQL Server on which they occur, meaning it
    is impossible to compare wait statistics of Server A to wait statistics of Server
    B, even with identical hardware and database configuration. Every configuration
    option, from the hardware firmware level to the configuration of the SQL Server
    Native Client on the client computers, will impact the wait statistics!


    Therefore, we will start this book with a review of SQL Server internals pertaining
    to wait statistics. We will discuss how wait events are generated, how to view
    wait events, and how to analyze them as part of a proper performance tuning methodology.
    Then in Part II of this book, we will explore and examine specific wait events.


    This chapter will look at the history of wait statistics through the various versions
    of SQL Server. Next, we will review the SQL Operating System, or SQLOS. The architecture
    of the SQLOS is closely tied to wait statistics and to performance troubleshooting
    in general. The rest of this chapter is dedicated to one of the most important
    aspects of wait statistics: thread scheduling.


    Before we begin, I want to mention a few things related to the terminology used
    when discussing wait statistics. In the introduction of this book and the preceding
    paragraphs, I mentioned the term wait statistics. The sentence “compare wait statistics
    of Server A to wait statistics of Server B” is technically wrong, since we compare
    the *wait time* (the total time we have been waiting on a resource) of a *specific
    wait type* (the specific wait type related to the resource we are waiting on).
    From this point on, when I use the term wait statistics, I mean the concept of
    wait statistics, and I will use the correct terms wait time and wait type where
    appropriate.


    ## A Brief History of Wait Statistics


    SQL Server has been around for quite some time now. The first release of SQL Server
    dates back to 1989 and was released for the OS/2 platform. Until SQL Server 6.0,
    released in 1995, Microsoft worked together with Sybase to develop SQL Server.
    In 1995, however, Microsoft and Sybase went their separate ways. Both Microsoft
    and Sybase stayed active in the database world (SAP acquired Sybase in 2010).
    In 2022, Microsoft will release SQL Server 2022, while SAP released SAP Sybase
    ASE 16 in 2014 (but is still maintained today), both relational enterprise-level
    database systems.


    Between SQL Server 6.0 and SQL Server 2022, many things have changed, and it is
    difficult to compare any two versions alongside one another. One thing which has
    not changed through the years is the concept of wait statistics. Each version
    of SQL Server stores information about its internal processes. Even though the
    way we access such information has changed over the years, wait statistics remain
    an important part of the internal logging process.


    In early versions of SQL Server, access to wait statistics required the use of
    undocumented commands. Figure [1-1](#340881_3_En_1_Chapter.xhtml#Fig1) shows how
    to query wait statistics information in SQL Server 6.5 using the DBCC command.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig1_HTML.png)


    A screenshot of the S Q L Server 6.5 result page has two columns, wait statistic
    and value with 21 rows. The text below reads, D B C C execution completed. D B
    and queries dropdown boxes are on top.


    Figure 1-1


    SQL Server wait statistics for SQL Server 6.5


    One of the big changes introduced with SQL Server 2005 was the conversion of many
    internal functions and commands into Dynamic Management Views (DMVs) and Dynamic
    Management Functions (DMFs). This made it easier to query and analyze the information
    returned by functions and commands, including wait statistics information. A new
    way of performance analysis was born with the release of the SQL Server 2005 Microsoft
    whitepaper *SQL Server 2005 Waits and Queues* by Tom Davidson.


    In the subsequent releases of SQL Server, the volume of new and different wait
    types grew exponentially whenever new features or configuration options were introduced.
    If you look at Figure [1-1](#340881_3_En_1_Chapter.xhtml#Fig1), you will notice
    that 21 different wait types were returned. Figure [1-2](#340881_3_En_1_Chapter.xhtml#Fig2)
    shows the amount of wait types, as the number of rows returned, available in SQL
    Server 2022.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig2_HTML.png)


    A screenshot of the S Q L Server 2022 window has a query and its results below
    with 5 columns, wait type, waiting tasks count, wait time m s, max wait time m
    s, and signal wait time m s. The column names have underscore instead of spaces
    in between. The bottom bar has the count of rows as 1334.


    Figure 1-2


    SQL Server wait statistics in SQL Server 2022


    With the release of SQL Server 2022 RC0, the number of wait types increased to
    more than 1,300 different wait types! The number of wait types will likely continue
    to grow in future SQL Server releases, as new features are introduced or existing
    features are changed. Thankfully there is a lot more information available about
    wait statistics now than there was in SQL Server 6.5!'
  trans: '# 1. 等待统计内部机制


    SQL Server 等待统计是分析性能相关问题、优化 SQL Server 性能的重要工具。然而，许多数据库管理员或开发人员对其并不十分了解。我认为这与其相对复杂的性质、数量庞大的不同类型，以及许多等待统计缺乏文档说明有关。等待统计还直接与其发生的特定
    SQL Server 实例绑定，这意味着即使硬件和数据库配置完全相同，也无法将服务器 A 的等待统计与服务器 B 的等待统计进行比较。从硬件固件级别到客户端计算机上
    SQL Server Native Client 的配置，每一个配置选项都会影响等待统计！


    因此，本书将首先回顾与等待统计相关的 SQL Server 内部机制。我们将讨论等待事件如何生成、如何查看等待事件，以及如何将其作为正确性能调优方法的一部分进行分析。然后在本书的第二部分，我们将探索和研究具体的等待事件。


    本章将回顾等待统计在不同 SQL Server 版本中的历史。接下来，我们将审视 SQL 操作系统，即 SQLOS。SQLOS 的架构与等待统计以及整体性能故障排除密切相关。本章的其余部分将致力于讨论等待统计最重要的一个方面：**线程调度**。


    在开始之前，我想提一下与讨论等待统计时所用术语相关的几点。在本书的介绍和前面的段落中，我提到了“等待统计”这个术语。“比较服务器 A 的等待统计与服务器 B
    的等待统计”这句话在技术上是错误的，因为我们实际上是比较我们正在等待的资源的*特定等待类型*的*等待时间*（我们等待资源所花费的总时间）。从现在开始，当我使用“等待统计”这个术语时，我指的是等待统计的概念，我将在适当的地方使用正确的术语“等待时间”和“等待类型”。


    ## 等待统计简史


    SQL Server 已经存在相当长一段时间了。SQL Server 的第一个版本可以追溯到 1989 年，当时是为 OS/2 平台发布的。直到 1995
    年发布的 SQL Server 6.0，Microsoft 一直与 Sybase 合作开发 SQL Server。然而，在 1995 年，Microsoft
    和 Sybase 分道扬镳。两家公司都继续活跃在数据库领域（SAP 于 2010 年收购了 Sybase）。2022 年，Microsoft 发布了 SQL
    Server 2022，而 SAP 则在 2014 年发布了 SAP Sybase ASE 16（但至今仍在维护），两者都是关系型企业级数据库系统。


    在 SQL Server 6.0 到 SQL Server 2022 之间，许多事情发生了变化，很难将任何两个版本进行直接比较。但多年来唯一不变的是等待统计的概念。每个版本的
    SQL Server 都会存储其内部进程的信息。尽管我们访问此类信息的方式多年来发生了变化，但等待统计仍然是内部日志记录过程的重要组成部分。


    在早期版本的 SQL Server 中，访问等待统计需要使用未公开的命令。图 1-1 展示了如何在 SQL Server 6.5 中使用 `DBCC` 命令查询等待统计信息。


    ![](img/340881_3_En_1_Fig1_HTML.png)


    SQL Server 6.5 结果页面截图有两个列，分别是“等待统计”和“值”，共 21 行。下方文字显示，“DBCC 执行完成”。顶部有“DB”和“查询”下拉框。


    图 1-1


    SQL Server 6.5 的等待统计


    SQL Server 2005 的一个重大变化是将许多内部函数和命令转换为**动态管理视图** (`DMVs`) 和**动态管理函数** (`DMFs`)。这使得查询和分析函数及命令返回的信息（包括等待统计信息）变得更加容易。随着
    Tom Davidson 撰写的 Microsoft 白皮书 `SQL Server 2005 Waits and Queues` 的发布，一种新的性能分析方法诞生了。


    在随后的 SQL Server 版本中，每当引入新功能或配置选项时，新的、不同的等待类型数量便呈指数级增长。如果你查看图 1-1，会注意到返回了 21 种不同的等待类型。图
    1-2 显示了在 SQL Server 2022 中可用的等待类型数量，即返回的行数。


    ![](img/340881_3_En_1_Fig2_HTML.png)


    SQL Server 2022 窗口截图，包含一个查询及其下方结果，结果有 5 列：`wait_type`, `waiting_tasks_count`,
    `wait_time_ms`, `max_wait_time_ms`, `signal_wait_time_ms`。列名之间用下划线代替空格。底部状态栏显示行数为
    1334。


    图 1-2


    SQL Server 2022 中的等待统计


    随着 SQL Server 2022 RC0 的发布，等待类型数量增加到了超过 1300 种不同的类型！随着新功能的引入或现有功能的更改，等待类型的数量在未来的
    SQL Server 版本中很可能继续增长。值得庆幸的是，现在关于等待统计的信息比在 SQL Server 6.5 时代要多得多！'
- fmt: '## The SQLOS


    计算机硬件世界日新月异。几乎每年，甚至每月，我们都会在处理器中塞入更多核心，提高主板的内存容量，或引入如基于 PCI 的持久化闪存存储等全新硬件概念。数据库管理系统（DBMSs）渴望利用新的硬件趋势。由于硬件变化迅速且需要在新硬件选项可用时立即加以利用，SQL
    Server 团队决定从 SQL Server 2005 开始改变 SQL Server 平台层。


    在 SQL Server 2005 之前，SQL Server 的平台层受到限制，许多操作由操作系统自身执行。这意味着 SQL Server 难以跟上快速变化的服务器硬件世界，因为为了利用更快的硬件或新的硬件特性而改变一个完整的操作系统，是一项耗时且复杂的操作。


    图 1-3 展示了在 SQL Server 2005 中引入 SQLOS 之前 SQL Server 的（简化）架构。


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig3_HTML.png)


    > 一张 SQL Server 在 SQLOS 之前的软件架构图，包含用户模式调度器、关系引擎、存储引擎和一个输入输出管理器。


    **图 1-3**

    引入 SQLOS 之前的 SQL Server 架构


    SQL Server 2005 引入了迄今为止所见到的 SQL Server 引擎的最大变革之一，即 SQLOS。这是一个全新的平台层，功能上相当于一个用户级操作系统。SQLOS
    使得充分利用当前和未来的硬件成为可能，并实现了诸如高级并行化等特性。SQLOS 高度可配置，能根据其运行所在的硬件进行自我调整，因此无论是对高端还是低端系统都具有完美的可扩展性。


    图 1-4 展示了包含 SQLOS 层的 SQL Server 2005 的（简化）架构。


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig4_HTML.png)


    > 一张 SQL Server 2005 的软件架构图，包含 3 层：关系引擎、存储引擎和 SQLOS。每层下都有其组件。


    **图 1-4**

    SQL Server 2005 架构


    SQLOS 通过引入调度器（schedulers）、任务（tasks）和工作线程（worker threads），改变了 SQL Server 访问处理器资源的方式。这使得
    SQLOS 能更好地控制应如何由处理器完成工作。Windows 操作系统使用抢占式调度（preemptive scheduling）方法。这意味着 Windows
    会给每个需要处理器时间的进程分配一个优先级和固定的时间片（或称量程 quantum）。这个进程优先级是根据许多变量计算得出的，如资源使用情况、预期运行时间、当前活动等。通过使用抢占式调度，Windows
    操作系统可以选择在更高优先级的进程需要处理器时间时中断当前进程。这种调度方式可能对 SQL Server 生成的进程产生负面影响，因为这些进程很容易被更高优先级的进程（包括其他应用程序的进程）中断。因此，SQLOS
    使用自己的（协作式 cooperative）非抢占式调度机制，确保 Windows 进程无法中断 SQLOS 进程。


    **Nerd Note**

    SQL Server 7 和 SQL Server 2000 也使用用户模式调度（UMS）进行非抢占式调度。SQLOS 将更多的系统组件更紧密地结合在一起，从而实现了更好的性能和可扩展性。


    存在一些 SQLOS 无法使用非抢占式调度的例外情况，例如当 SQLOS 需要通过 Windows 操作系统访问资源时。我们将在本书后面的第 11 章“抢占式等待类型”中讨论这些例外情况。


    ## Schedulers, Tasks, and Worker Threads


    因为 SQLOS 使用与 Windows 操作系统不同的方法来执行请求，SQL Server 引入了一种使用调度器、任务和工作线程来调度处理器时间的不同方式。图
    1-5 展示了 SQL Server 调度的不同部分及其相互关系。


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig5_HTML.png)


    > 一张 SQL Server 调度流程图，从会话开始，接着是请求、任务、工作线程，最后以调度器结束，该调度器将调度时间发送给处理器。


    **图 1-5**

    SQL Server 调度


    ### Sessions


    会话（session）是客户端成功通过身份验证后与 SQL Server 建立的连接。我们可以通过查询 `sys.dm_exec_sessions` DMV
    来访问会话信息，使用以下查询：


    ```sql

    SELECT *

    FROM sys.dm_exec_sessions;

    ```


    在旧版本的 SQL Server 中，用户会话的 `session_id` 大于 50；小于 50 的保留给内部 SQL Server 进程。然而，在非常繁忙的服务器上，SQL
    Server 有可能需要使用大于 50 的 `session_id`。如果您只对用户启动的会话信息感兴趣，最好使用 `is_user_process` 列来过滤
    `sys.dm_exec_sessions` DMV 的结果，而不是过滤 `session_id` 大于 50。以下查询将只返回用户会话，并过滤掉内部系统会话：


    ```sql

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    图 1-6 展示了此查询结果的一小部分。


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig6_HTML.png)


    > 一张 SQL Server 2022 结果窗口的截图，包含 6 列：session id, login time, host name, program
    name, host process id, client version。有 4 行，对应 4 个不同的 session id。列名中的空格用下划线代替。


    **图 1-6**

    `sys.dm_exec_sessions` 结果


    `sys.dm_exec_sessions` DMV 返回许多列，提供有关每个会话的信息。一些比较有趣的列包括：


    *   `host_process_id` – 连接到 SQL Server 的客户端程序的进程 ID（PID）。对于内部会话将显示 `NULL`。

    *   `cpu_time` – 自会话首次建立以来已使用的处理器时间（毫秒）。

    *   `memory_usage` – 自会话首次建立以来使用的内存量（8k 页数）。

    *   `reads` – 自会话首次建立以来执行的读取次数。

    *   `writes` – 自会话首次建立以来执行的写入次数。

    *   `row_count` – 到目前为止为此会话返回的行数。

    *   `status` – 可能的值包括 `running`、`sleeping`、`dormant` 和 `preconnect`。


    `status` 列最常见的值是 `running`（表示当前正在从此会话处理一个或多个请求）和 `sleeping`（表示当前没有从此会话处理任何请求）。'
  raw: '## The SQLOS


    The world of computer hardware changes constantly. Every year, or in some cases
    every month, we stuff more cores inside of processors, increase the memory capacity
    of mainboards, or introduce entirely new hardware concepts like PCI-based persistent
    flash storage. Database Management Systems (or DBMSs) are eager to take advantage
    of new hardware trends. Because of the fast-changing nature of hardware and the
    need to utilize new hardware options as soon as they become available, the SQL
    Server team decided to change the SQL Server platform layer starting with SQL
    Server 2005.


    Before SQL Server 2005, the platform layer of SQL Server was restricted, with
    many operations performed by the operating system itself. This meant it was difficult
    for SQL Server to keep up with the fast-changing world of server hardware, as
    changing a complete operating system in order to utilize faster hardware or new
    hardware features is a time-consuming and complex operation.


    Figure [1-3](#340881_3_En_1_Chapter.xhtml#Fig3) shows the (simplified) architecture
    of SQL Server before the introduction of the SQLOS in SQL Server 2005.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig3_HTML.png)


    A software architectural diagram of the S Q L server before S Q L O S has a user
    mode scheduler, relational engine, storage engine, and an input-output manager.


    Figure 1-3


    SQL Server architecture before the introduction of SQLOS


    SQL Server 2005 introduced one of the biggest changes to the SQL Server engine
    seen to this day, the SQLOS. This is a completely new platform layer functioning
    as a user-level operating system. The SQLOS has made it possible to fully utilize
    current and future hardware and has enabled features like advanced parallelism.
    The SQLOS is highly configurable and adjusts itself to the hardware it is running
    on, thus making it perfectly scalable for high-end or low-end systems alike.


    Figure [1-4](#340881_3_En_1_Chapter.xhtml#Fig4) shows the (simplified) architecture
    of SQL Server 2005, including the SQLOS layer.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig4_HTML.png)


    A software architectural diagram of S Q L server 2005 has 3 layers, relational
    engine, storage engine and S Q L O S. Each has components under it.


    Figure 1-4


    SQL Server 2005 architecture


    The SQLOS changed the way SQL Server accesses processor resources by introducing
    schedulers, tasks, and worker threads. This gives the SQLOS greater control of
    how work should be completed by the processors. The Windows operating system uses
    a preemptive scheduling approach. This means that Windows will give every process
    that needs processor time a priority and fixed slice of time, or a quantum. This
    process priority is calculated from a number of variables like resource usage,
    expected runtime, current activity, and so forth. By using preemptive scheduling,
    the Windows operating system can choose to interrupt a process when a process
    with a higher priority needs processor time. This way of scheduling can have a
    negative impact on processes generated by SQL Server, since those processes could
    easily be interrupted by higher priority ones, including those of other applications.
    For this reason, the SQLOS uses its own (cooperative) non-preemptive scheduling
    mechanism, making sure that Windows processes cannot interrupt SQLOS processes.


    Nerd Note


    SQL Server 7 and SQL Server 2000 also used non-preemptive scheduling using User
    Mode Scheduling (UMS). SQLOS brought many more system components closer together,
    thus enabling better performance and scalability.


    There are some exceptions when the SQLOS cannot use non-preemptive scheduling,
    for instance, when the SQLOS needs to access a resource through the Windows operating
    system. We will discuss these exceptions later in this book in Chapter [11](#340881_3_En_11_Chapter.xhtml),
    “Preemptive Wait Types.”


    ## Schedulers, Tasks, and Worker Threads


    Because SQLOS uses a different method to execute requests than the Windows operating
    system uses, SQL Server introduced a different way to schedule processor time
    using schedulers, tasks, and worker threads. Figure [1-5](#340881_3_En_1_Chapter.xhtml#Fig5)
    shows the different parts of SQL Server scheduling and how they relate to each
    other.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig5_HTML.png)


    A flow diagram of S Q L server scheduling starts with a session, followed by a
    request, task, worker thread, and ends with a scheduler that sends the scheduled
    time to a processor.


    Figure 1-5


    SQL Server scheduling


    ### Sessions


    A session is the connection a client has to SQL Server after it has been successfully
    authenticated. We can access session information by querying the **sys.dm_exec_sessions**
    DMV using the following query:


    ```

    SELECT *

    FROM sys.dm_exec_sessions;

    ```


    In older versions of SQL Server, user sessions had a session_id greater than 50;
    everything lower was reserved for internal SQL Server processes. However, on very
    busy servers, there was a possibility SQL Server needed to use a session_id greater
    than 50\. If you are only interested in information about user-initiated sessions,
    it is better to filter the results of the sys.dm_exec_sessions DMV using the is_user_process
    column instead of filtering on a session_id greater than 50\. The following query
    will only return user sessions and will filter out the internal system sessions:


    ```

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    Figure [1-6](#340881_3_En_1_Chapter.xhtml#Fig6) shows a small part of the results
    of this query.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig6_HTML.png)


    A screenshot of the S Q L server 2022 results window has 6 columns, session id,
    login time, host name, program name, host process id, and client version. It has
    4 rows with 4 different session ids. The column names have underscore instead
    of space in between


    Figure 1-6


    sys.dm_exec_sessions results


    There are many columns returned by the sys.dm_exec_sessions DMV that provide information
    about each session. Some of the more interesting columns include the following:


    *   **host_process_id** – The process ID or (PID) of the client program connected
    to SQL Server will show NULL for internal sessions.


    *   **cpu_time** – The amount of processor time (in milliseconds) the session
    has used since it was first established.


    *   **memory_usage** – The amount of memory (8k pages) used by the session since
    it was first established.


    *   **reads** – Number of reads performed by this session since it was first established.


    *   **writes** – Number of writes performed by this session since it was first
    established.


    *   **row_count** – Number of rows returned for this session up to this point.


    *   **status** – Possible values include “running,” “sleeping,” “dormant,” and
    “preconnect.”


    The most common values of the status column are “running,” which indicates that
    one or more requests are currently being processed from this session, and “sleeping,”
    which means no requests are currently being processed from this session.'
  trans: '

    ## SQLOS


    计算机硬件世界日新月异。几乎每年，甚至每月，我们都会在处理器中集成更多核心，提升主板的内存容量，或引入如基于 PCI 的持久化闪存存储等全新的硬件概念。数据库管理系统（DBMSs）渴望利用新的硬件趋势。由于硬件变化迅速且需要在新硬件选项可用时立即加以利用，SQL
    Server 团队决定从 SQL Server 2005 开始改变 SQL Server 的平台层。


    在 SQL Server 2005 之前，SQL Server 的平台层受到限制，许多操作由操作系统自身执行。这意味着 SQL Server 难以跟上快速变化的服务器硬件世界，因为为了利用更快的硬件或新的硬件特性而改变一个完整的操作系统，是一项耗时且复杂的操作。


    图 1-3 展示了在 SQL Server 2005 中引入 SQLOS 之前 SQL Server 的（简化）架构。


    ![](img/340881_3_En_1_Fig3_HTML.png)


    > 一张展示 SQLOS 引入前 SQL Server 软件架构的图，包含用户模式调度器、关系引擎、存储引擎和一个输入输出管理器。


    **图 1-3**

    引入 SQLOS 之前的 SQL Server 架构


    SQL Server 2005 引入了其所见过的 SQL Server 引擎的最大变革之一，即 SQLOS。这是一个全新的平台层，功能上相当于一个用户级操作系统。SQLOS
    使得充分利用当前和未来的硬件成为可能，并实现了诸如高级并行化等特性。SQLOS 高度可配置，能根据其运行所在的硬件进行自我调整，因此无论是对高端还是低端系统都具有完美的可扩展性。


    图 1-4 展示了包含 SQLOS 层的 SQL Server 2005 的（简化）架构。


    ![](img/340881_3_En_1_Fig4_HTML.png)


    > 一张展示 SQL Server 2005 软件架构的图，包含 3 层：关系引擎、存储引擎和 SQLOS。每层下都有其组件。


    **图 1-4**

    SQL Server 2005 架构


    SQLOS 通过引入调度器（schedulers）、任务（tasks）和工作线程（worker threads），改变了 SQL Server 访问处理器资源的方式。这使得
    SQLOS 能更好地控制应如何由处理器完成工作。Windows 操作系统使用抢占式调度（preemptive scheduling）方法。这意味着 Windows
    会给每个需要处理器时间的进程分配一个优先级和固定的时间片（或称量程 quantum）。这个进程优先级是根据许多变量计算得出的，如资源使用情况、预期运行时间、当前活动等。通过使用抢占式调度，Windows
    操作系统可以选择在更高优先级的进程需要处理器时间时中断当前进程。这种调度方式可能对 SQL Server 生成的进程产生负面影响，因为这些进程很容易被更高优先级的进程（包括其他应用程序的进程）中断。因此，SQLOS
    使用自己的（协作式 cooperative）非抢占式调度机制，确保 Windows 进程无法中断 SQLOS 进程。


    **Nerd Note**

    SQL Server 7 和 SQL Server 2000 也使用用户模式调度（UMS）进行非抢占式调度。SQLOS 将更多的系统组件更紧密地结合在一起，从而实现了更好的性能和可扩展性。


    存在一些 SQLOS 无法使用非抢占式调度的例外情况，例如当 SQLOS 需要通过 Windows 操作系统访问资源时。我们将在本书后面的第 11 章“抢占式等待类型”中讨论这些例外情况。


    ## 调度器、任务与工作线程


    因为 SQLOS 使用与 Windows 操作系统不同的方法来执行请求，SQL Server 引入了一种使用调度器、任务和工作线程来调度处理器时间的不同方式。图
    1-5 展示了 SQL Server 调度的不同部分及其相互关系。


    ![](img/340881_3_En_1_Fig5_HTML.png)


    > 一张 SQL Server 调度流程图，从会话开始，接着是请求、任务、工作线程，最后以调度器结束，该调度器将调度时间发送给处理器。


    **图 1-5**

    SQL Server 调度


    ### 会话


    会话（session）是客户端成功通过身份验证后与 SQL Server 建立的连接。我们可以通过查询 `sys.dm_exec_sessions` DMV
    来访问会话信息，使用以下查询：


    ```sql

    SELECT *

    FROM sys.dm_exec_sessions;

    ```


    在旧版本的 SQL Server 中，用户会话的 `session_id` 大于 50；小于 50 的保留给内部 SQL Server 进程。然而，在非常繁忙的服务器上，SQL
    Server 有可能需要使用大于 50 的 `session_id`。如果您只对用户启动的会话信息感兴趣，最好使用 `is_user_process` 列来过滤
    `sys.dm_exec_sessions` DMV 的结果，而不是过滤 `session_id` 大于 50。以下查询将只返回用户会话，并过滤掉内部系统会话：


    ```sql

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    图 1-6 展示了此查询结果的一小部分。


    ![](img/340881_3_En_1_Fig6_HTML.png)


    > 一张 SQL Server 2022 结果窗口的截图，包含 6 列：会话 ID、登录时间、主机名、程序名、主机进程 ID、客户端版本。有 4 行，对应
    4 个不同的会话 ID。列名中的空格用下划线代替。


    **图 1-6**

    `sys.dm_exec_sessions` 结果


    `sys.dm_exec_sessions` DMV 返回许多列，提供有关每个会话的信息。一些比较有趣的列包括：


    *   `host_process_id` – 连接到 SQL Server 的客户端程序的进程 ID（PID）。对于内部会话将显示 `NULL`。

    *   `cpu_time` – 自会话首次建立以来已使用的处理器时间（毫秒）。

    *   `memory_usage` – 自会话首次建立以来使用的内存量（8k 页数）。

    *   `reads` – 自会话首次建立以来执行的读取次数。

    *   `writes` – 自会话首次建立以来执行的写入次数。

    *   `row_count` – 到目前为止为此会话返回的行数。

    *   `status` – 可能的值包括 `running`、`sleeping`、`dormant` 和 `preconnect`。


    `status`列最常见的值是 `running`（表示当前正在从此会话处理一个或多个请求）和 `sleeping`（表示当前没有从此会话处理任何请求）。

    '
- fmt: '### Requests


    A request is the SQL Server execution engine’s representation of a query submitted
    by a session. Again, we will use a DMV to query information about a request; in
    this case, we query the `sys.dm_exec_requests` DMV:


    ```

    SELECT *

    FROM sys.dm_exec_requests;

    ```


    Figure [1-7](#340881_3_En_1_Chapter.xhtml#Fig7) shows a portion of the results
    of this query.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig7_HTML.png)


    A screenshot of the S Q L server 2022 results window has 6 columns, session id,
    request id, start time, status, command, and s q l handle. It has 15 rows with
    session ids 1 through 15\. The column names have underscore instead of space in
    between.


    Figure 1-7


    sys.dm_exec_requests results


    The `sys.dm_exec_requests` DMV is an incredibly powerful tool for troubleshooting
    performance-related issues. This DMV has a lot of information about current queries
    and helps detect performance bottlenecks relatively quickly. Because the `sys.dm_exec_requests`
    DMV also displays wait statistics–related information, we will take a thorough
    look at it in Chapter [2](#340881_3_En_2_Chapter.xhtml), “Querying SQL Server
    Wait Statistics.”


    ### Tasks


    Tasks represent the work to be performed by the SQLOS, but tasks do not perform
    any work themselves. When a request is received by SQL Server, one or more tasks
    are created to fulfill the request. The number of tasks generated for a request
    depends on if the query request is being performed using parallelism or if it’s
    being run serially.


    We will use the `sys.dm_os_tasks` DMV to query the task information:


    ```

    SELECT *

    FROM sys.dm_os_tasks;

    ```


    Figure [1-8](#340881_3_En_1_Chapter.xhtml#Fig8) shows a part of the results of
    the query.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig8_HTML.png)


    A screenshot of the S Q L server 2022 results window has 7 columns, task address,
    task state, context switches count, pending i o count, pending i o byte count,
    pending i o byte average, and scheduler i d. It has 15 rows with different task
    addresses. The column names have underscore instead of space in between


    Figure 1-8


    sys.dm_os_tasks results


    When you query the `sys.dm_os_tasks` DMV, you will discover it returns many results,
    even on servers with little user activity. This is because SQL Server uses tasks
    for its own processes as well.


    There are some interesting columns in this DMV worth exploring to see the relations
    between different DMVs:


    *   `session_id` – The ID of the session which requested this task.

    *   `worker_address` – The memory address of the worker thread associated with
    this task.

    *   `task_address` – The memory address of this task.

    *   `task_state` – Possible values include “pending,” “runnable,” “running,” “suspended,”
    “done,” and “spinloop.”


    The most common values of the `task_state` column are “running,” “runnable,” and
    “suspended.”


    ### Worker Threads


    Every task created has a worker thread assigned, and the worker thread then performs
    the actions requested by the task.


    Nerd Note


    A worker thread does not perform the work itself; instead it requests a thread
    from the Windows operating system to perform the work. For the sake of simplicity,
    and the fact the Windows thread runs outside the SQLOS, I have left this step
    out of Figure [1-5](#340881_3_En_1_Chapter.xhtml#Fig5). You can access information
    about the Windows operating system threads by querying `sys.dm_os_threads` if
    you are interested.


    When a task requests a worker thread, SQL Server will first look for an idle worker
    thread to assign to the task. In the case when no idle worker thread is located
    and the maximum number of worker threads has been reached, the request is queued
    until a worker thread finishes its current work and becomes available.


    There is a limit to the number of worker threads SQL Server has available for
    processing requests. This number is automatically calculated and configured by
    SQL Server during startup. We calculate the maximum number of worker threads ourselves
    using these formulas:


    | 32-bit system with <= 4 logical processors | 256 worker threads |

    | --- | --- |

    | 32-bit system with > 4 logical processors | 256 + ((# of logical processors
    – 4) * 8) |

    | 64-bit system with <= 4 logical processors | 512 worker threads |

    | 64-bit system with > 4 logical processors | 512 + ((# of logical processors
    – 4) * 16) |


    **Example**: For a 64-bit system with 16 logical processors, we calculate the
    maximum number of worker threads using the preceding formula:


    ```

    512 + ((# of logical processors – 4) * 16) =

    512 + ((16 – 4) * 16) =

    512 + (12 * 16) =

    512 + (192) = 704

    ```


    which would assign a maximum of 704 worker threads.


    The number of worker threads has a default of 0, allowing SQL Server to set the
    number of max worker threads using the preceding formulas when it starts. We alter
    the default by changing the `max worker threads` options in SQL Server’s properties,
    as illustrated by Figure [1-9](#340881_3_En_1_Chapter.xhtml#Fig9).


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig9_HTML.png)


    A screenshot of the S Q L server properties window has processors page selected
    from options on the left pane, with connection details and properties below. An
    arrow indicates the maximum worker threads box with the value 0, under the threads
    section on the right.


    Figure 1-9


    Processors page in the Server Properties


    Generally speaking, you should not need to change the `max worker threads` option,
    and my advice is to leave the setting alone, as it should only be changed in very
    specific cases (I will discuss one of those potential cases in Chapter [5](#340881_3_En_5_Chapter.xhtml),
    “CPU-Related Wait Types,” when we talk about `THREADPOOL` waits).


    One thing to keep in mind is worker threads require memory to work. For 32-bit
    systems, this is 512 KB for every worker thread; 64-bit systems will need 2048
    KB for every worker thread. Thus, changing the number of worker threads can potentially
    impact the memory requirements of SQL Server. This does not mean you need a massive
    amount of memory just for your worker threads – SQL Server will automatically
    destroy idle worker threads after 15 minutes or if SQL Server is under heavy memory
    pressure.


    SQL Server supplies us with a DMV to query information about the worker threads,
    `sys.dm_os_workers`. Figure [1-10](#340881_3_En_1_Chapter.xhtml#Fig10) shows some
    of the results of this query:


    ```

    SELECT *

    FROM sys.dm_os_workers;

    ```


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig10_HTML.png)


    A screenshot S Q L server 2022 results window has 8 columns, worker address, status,
    is preemptive, is fiber, is sick, is in c c exception, is fatal exception, and
    is inside catch. It has 16 rows with different worker addresses. The column names
    have underscore instead of space in between.


    Figure 1-10


    Results of querying sys.dm_os_workers


    The `sys.dm_os_workers` DMV is large and complex with many columns marked as “Internal
    use only” by Microsoft. However, the columns `task_address` and `scheduler_address`
    are available to link together the different DMVs we have discussed so far.


    Worker threads iterate through different phases while exposed to the processor,
    which we observe when we examine the `state` column in the `sys.dm_os_workers`
    DMV:


    *   `INIT` – The worker thread is initialized by the SQLOS.

    *   `RUNNING` – The worker thread is currently performing work on a processor.

    *   `RUNNABLE` – The worker thread is ready to run on a processor.

    *   `SUSPENDED` – The worker thread is waiting for a resource.


    The states the worker threads go through while performing work is the main focus
    of this book. Every time a worker thread is not in the “RUNNING” state, it has
    to wait, and the SQLOS records this information giving us valuable insight into
    what the worker thread has been waiting on and how long it has been waiting.'
