  trans: '### LOGBUFFER 与 WRITELOG 等待类型是什么？


    要理解 `LOGBUFFER` 和 `WRITELOG` 等待类型代表什么，我们需要对 SQL Server 如何写入事务日志有所了解。简而言之，每当我们在数据库内部更改或添加数据时，会发生以下事件：


    1.  数据页在缓冲区缓存中被修改；如果该页尚未在缓冲区缓存中，则会先被读入缓冲区缓存。

    2.  该数据页在缓冲区缓存中被标记为“脏”。

    3.  表示此修改的日志记录被保存到日志缓冲区。

    4.  发生日志刷新（我们稍后将详细讨论），将日志记录从日志缓冲区写入事务日志。

    5.  脏数据页被写入数据文件。


    为了展示此行为，我包含了图 6-16。


    ![](img/340881_3_En_6_Fig16_HTML.png)


    缓冲区缓存如何通过脏页与数据文件交互，以及日志缓冲区如何与事务日志交互的示意图。


    **图 6-16**

    事务如何移动


    表示脏数据页移动的动作和将日志记录写入事务日志的动作以虚线显示。我特意这样做是为了说明这些动作不一定直接发生。


    脏数据页首先在缓冲区缓存中更新，并在发生检查点操作时写入数据文件。因此，即使在事务提交后，脏页也可能保留在内存（即缓冲区缓存）中。


    对于日志缓冲区内的日志记录，情况则不同。一旦事务提交，并且该事务在日志缓冲区中有活动的日志记录，日志缓冲区内的所有日志记录都会被写入（或 `刷新`）到磁盘上的事务日志。但日志刷新也会以另一种方式被触发。日志缓冲区有固定的
    60 KB 大小，一旦日志缓冲区已满，它将把其中的所有记录刷新到事务日志。


    由于本节是关于 `WRITELOG` 和 `LOGBUFFER` 的，现在正是将它们引入这个故事的好时机。`WRITELOG` 等待类型在 SQL Server
    正在将日志缓冲区的内容刷新到磁盘上的事务日志时发生。`LOGBUFFER` 等待类型在 SQL Server 必须等待日志缓冲区中有空闲空间来插入日志记录时发生。我已在图
    6-17 中它们可能发生的位置添加了这两种等待类型。


    ![](img/340881_3_En_6_Fig17_HTML.png)


    缓冲区缓存如何通过脏页与数据文件交互，以及日志缓冲区如何通过写日志与事务日志交互的示意图。


    **图 6-17**

    事务移动以及 LOGBUFFER 和 WRITELOG 等待类型


    这就是为什么我说这些等待类型是相关的。每当发生 `WRITELOG` 等待时，如果将日志记录刷新到事务日志的进程无法跟上新日志记录进入日志缓冲区的速度，你很可能也会发现
    `LOGBUFFER` 等待。


    这种情况经常发生在高并发数据修改量的系统上，导致需要写入磁盘的事务。另一个常见原因是事务日志文件所在存储子系统的性能。如果存储子系统的性能不理想，你的 `WRITELOG`
    等待时间会增加，如果事务量足够大，则有可能发生 `LOGBUFFER` 等待。


    事务日志的性能对整个数据库的性能至关重要。事务日志性能缓慢将影响你在数据库内执行的每一项更改，因为每一次修改都必须先写入事务日志才能提交。


    ### LOGBUFFER 与 WRITELOG 示例


    为了给你一个 `LOGBUFFER` 和 `WRITELOG` 等待发生的例子，我使用清单 6-8 中的脚本创建一个新的数据库。


    ```sql

    USE master;

    -- Create demo database

    CREATE DATABASE [TLog_demo]

    ON PRIMARY  (

    NAME = N''TLog_demo'', FILENAME = N''C:\TeamData\TLog_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%)

    LOG ON  (  NAME = N''TLog_demo_log'', FILENAME = N''C:\TeamData\TLog_demo.ldf''
    , SIZE = 51200KB , FILEGROWTH = 10%);

    -- Make sure recovery model is set to full

    ALTER DATABASE [TLog_demo] SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [TLog_demo]

    TO  DISK = N''C:\TeamData\TLog_demo_Full.bak'';

    -- Create a simple test table

    USE TLog_demo;

    CREATE TABLE transactions  (

    t_guid VARCHAR(50) );

    ```


    **清单 6-8**

    创建 TLog_demo 数据库


    既然我们已经创建了一个全新的数据库，我将使用 Ostress 工具对 `TLog_demo` 数据库生成负载。我将执行清单 6-9 中的查询（已保存到 `logbuffer_impl.sql`
    文件），使用以下命令通过 200 个并发连接运行：


    ```sql

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 10000

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    END

    ```


    **清单 6-9**

    在 TLog_demo 数据库中插入行


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dTLog_demo
    -i"C:\TeamData\logbuffer_impl.sql" -n200 -r1 -q

    ```


    在启动 Ostress 工具之前，我清除了 `sys.dm_os_wait_stats` DMV。


    在我的测试 SQL Server 上大约运行 1 分钟后，Ostress 工具执行完了工作负载。如果我查询 `sys.dm_os_wait_stats` DMV
    并查看 `LOGBUFFER` 和 `WRITELOG` 等待类型，会得到如图 6-18 所示的结果。


    ![](img/340881_3_En_6_Fig18_HTML.png)


    一个 5 列 2 行的表格。它列出了文件 write log 和 log buffer 的等待类型、等待任务数、等待时间毫秒、最大等待时间毫秒和信号等待时间毫秒。Write
    log 被选中。


    **图 6-18**

    WRITELOG 和 LOGBUFFER 等待'
- fmt: '### Lowering LOGBUFFER and WRITELOG Waits


    There are generally two approaches you can take to lowering `LOGBUFFER` and `WRITELOG`
    waits, keeping in mind `WRITELOG` waits occur normally and this wait time should
    only be a cause for concern if it is a lot higher than normal.


    The first approach is to take a good look at how your transactions are being executed.
    In the preceding example, we implicitly committed every `INSERT` statement. This
    means that as soon as the log record for the `INSERT` statement entered the log
    buffer, it needed to be flushed again. If we would explicitly commit the whole
    `WHILE` loop, we would have larger writes to flush to the transaction log, resulting
    in better performance. This is because writing small blocks frequently is generally
    slower than writing large blocks at a larger interval. Cursors can also have the
    same effect as the example we used, so use them as little as possible.


    The other approach is based on the storage subsystem. If SQL Server cannot write
    the log records fast enough, you can encounter `LOGBUFFER` and `WRITELOG` waits.
    As a best practice, make sure to split your transaction log and database data
    files on separate disks, so they do not impact each other in times of heavy load.
    Also monitor the disk the transaction log is located on using the disk-performance
    counters in Perfmon, like `Avg. Disk sec/write`, to show you the write latency,
    and `Disk Writes/sec`, to show the write IOPS and check if the values are inside
    the acceptable range.


    If your SQL Server instance is running SQL Server 2014, you could choose to make
    use of the `Delayed Durability` option, which was introduced in SQL Server 2014.
    In short, enabling this option will no longer flush the log buffer content to
    disk when a transaction commits but rather will wait until the log buffer is full
    (`60 KB`) before flushing the contents to the transaction log. By enabling this
    option, you are running a risk that committed transactions not yet written to
    the transaction log will be lost during a failure since they are written only
    to the transaction log when the log buffer is full.


    ### LOGBUFFER and WRITELOG Summary


    Both the `LOGBUFFER` and `WRITELOG` wait types are related to the way SQL Server
    processes transactions. The `WRITELOG` wait type occurs every time a log record
    is written to the transaction log and generally isn’t a cause for concern. When
    paired with high `LOGBUFFER` wait times, high `WRITELOG` wait times can indicate
    transaction log pressure. To lower those wait times, try to avoid cursor and `WHILE`
    statements, since the statements inside the cursor or `WHILE` clauses will often
    get implicitly committed, creating a large amount of small writes. Also check
    your storage configuration to make sure the transaction log isn’t on the same
    drive as the database data file. If high wait times still occur, analyze the performance
    of the disk on which your transaction log is located.


    ## RESOURCE_SEMAPHORE


    The `RESOURCE_SEMAPHORE` wait type is a memory-related wait type which occurs
    when a query memory request cannot be granted immediately. These waits occur on
    servers experiencing memory pressure, or when a large number of concurrent queries
    request memory for expensive operations like sorts or joins.


    ### What Is the RESOURCE_SEMAPHORE Wait Type?


    When a query is executed in SQL Server, a series of steps occur before the actual
    execution. The first step is a compiled plan is generated. This plan contains
    the logical instructions, or operations, needed to fulfill the query requests.
    During the generation of the compiled plan, a calculation is performed to determine
    the amount of memory needed to execute all the query operations in the compiled
    plan. Some of the operations requiring memory are sorts and joins, which temporarily
    store row data in the memory of the SQL Server. The minimum amount of memory needed
    to perform these sorts or joins is known as the required memory, without which
    the query simply cannot get executed. If more memory is needed to store row data
    in-memory during a sort, for instance, it will be calculated as additional memory.
    Without this additional memory, a query can still get executed, but instead of
    writing the temporary row data to memory, it will write it to disk.


    When the query is executed, a memory grant is determined based on the required
    and additional memory values calculated in the compiled plan. This memory grant
    is needed to perform a memory reservation of an internal object called the `resource
    semaphore`. The `resource semaphore` is responsible for reserving the memory a
    query needs for execution, but it also manages memory throttling when too many
    queries concurrently ask for memory reservations or when there is not enough memory
    available. It does this by maintaining a queue of the queries requesting memory.
    If there are no queries inside the queue and a new query requests memory, the
    `resource semaphore` grants it to the query (if enough free memory is available).
    However, if there is a queue, the new query will be put at the end of the queue,
    and it has to wait for its turn to receive a memory grant.


    Before the `resource semaphore` will grant the requested memory to a query, it
    will check whether there is enough free memory available. If, for some reason,
    there is less memory available than the amount requested by the query, the query
    will be put in the queue again until enough memory is available. When a query
    is inside the `resource semaphore` queue waiting for its requested memory, the
    time it spends inside the queue will be recorded as the `RESOURCE_SEMAPHORE` wait
    type.


    There is a maximum amount of memory available for the `resource semaphore` to
    use, and it is allocated from the buffer cache. The `resource semaphore` can allocate
    up to 75% of the memory from the buffer cache for memory grants, but a single
    query can never get more than 25% of that amount. For instance, if we have a SQL
    Server with a buffer cache that can grow to `500 MB`, we would have a maximum
    of `375 MB` for memory grants. A single query in this example can never receive
    more than `93 MB`. Having so much memory being possibly granted to queries can
    be problematic, since the memory is not being used for the buffer cache, meaning
    more IOs to the storage subsystem are needed to retrieve and write data pages.'
  raw: '### Lowering LOGBUFFER and WRITELOG Waits


    There are generally two approaches you can take to lowering LOGBUFFER and WRITELOG
    waits, keeping in mind WRITELOG waits occur normally and this wait time should
    only be a cause for concern if it is a lot higher than normal.


    The first approach is to take a good look at how your transactions are being executed.
    In the preceding example, we implicitly committed every INSERT statement. This
    means that as soon as the log record for the INSERT statement entered the log
    buffer, it needed to be flushed again. If we would explicitly commit the whole
    WHILE loop, we would have larger writes to flush to the transaction log, resulting
    in better performance. This is because writing small blocks frequently is generally
    slower than writing large blocks at a larger interval. Cursors can also have the
    same effect as the example we used, so use them as little as possible.


    The other approach is based on the storage subsystem. If SQL Server cannot write
    the log records fast enough, you can encounter LOGBUFFER and WRITELOG waits. As
    a best practice, make sure to split your transaction log and database data files
    on separate disks, so they do not impact each other in times of heavy load. Also
    monitor the disk the transaction log is located on using the disk-performance
    counters in Perfmon, like Avg. Disk sec/write, to show you the write latency,
    and Disk Writes/sec, to show the write IOPS and check if the values are inside
    the acceptable range.


    If your SQL Server instance is running SQL Server 2014, you could choose to make
    use of the Delayed Durability option, which was introduced in SQL Server 2014\.
    In short, enabling this option will no longer flush the log buffer content to
    disk when a transaction commits but rather will wait until the log buffer is full
    (60 KB) before flushing the contents to the transaction log. By enabling this
    option, you are running a risk that committed transactions not yet written to
    the transaction log will be lost during a failure since they are written only
    to the transaction log when the log buffer is full.


