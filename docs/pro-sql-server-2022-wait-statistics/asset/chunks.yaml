    ### 降低 ASYNC_NETWORK_IO 等待


    降低 ASYNC_NETWORK_IO 等待的一种方法是识别那些将大量结果集返回给应用程序的查询。一个常见的例子是使用 `SELECT *` 的查询，它从一个宽表中返回所有列，而实际上只需要其中几列。在我们的例子中，如果我们修改查询只返回前
    100 行，`SSMS` 也许就能跟上返回信息的速度。


    ```sql

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT TOP 100 *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```

    代码清单 6-5

    限制为 100 行


    此修改后的等待时间可以在图 6-10 中看到。


    ![](img/340881_3_En_6_Fig10_HTML.png)

    图 6-10

    修改查询后的 ASYNC_NETWORK_IO 等待时间


    如你所见，`ASYNC_NETWORK_IO` 等待减少了。`SSMS` 能够跟上返回的结果，因此 SQL Server 实例没有延迟将结果发送回客户端。


    另一种限制返回结果的方法是使用 `WHERE` 子句过滤信息。结果集越小，`ASYNC_NETWORK_IO` 等待时间就越短。


    如果你认为 `ASYNC_NETWORK_IO` 等待不是由返回给应用程序的大量结果或应用程序处理结果的速度引起的，那么可能是网络配置拖慢了你。在这种情况下，你应该首先检查你的网络利用率。遗憾的是，`Perfmon`
    中并没有一个计数器可以直接显示网络利用率，而无需你进行一些计算。相反，你可以使用 `任务管理器` 的 `联网` 选项卡来查看你的网卡利用率，如图 6-11
    所示。


    ![](img/340881_3_En_6_Fig11_HTML.png)

    图 6-11

    任务管理器网络利用率


    如果你发现网络利用率很高，同时 `ASYNC_NETWORK_IO` 等待时间也高于正常水平，那么可能是网络拖慢了你。在这种情况下，最好与你的网络管理员沟通。通常，一个网络配置包含许多部分，如交换机、路由器、防火墙、网线、驱动程序、固件、操作系统的潜在虚拟化等等。所有这些部分都可能减慢你的网络吞吐量，并可能是
    `ASYNC_NETWORK_IO` 等待的潜在原因。


    ### ASYNC_NETWORK_IO 总结


    `ASYNC_NETWORK_IO` 等待类型发生在应用程序通过网络从 SQL Server 实例请求查询结果，但处理返回结果的速度不够快时。看到 `ASYNC_NETWORK_IO`
    等待发生是完全正常的，但高于正常水平的等待时间可能是由返回的查询结果发生变化或网络相关问题引起的。降低与应用程序相关的 `ASYNC_NETWORK_IO`
    等待时间，可以通过减少返回给应用程序的行数和/或列数来实现。


    ## CMEMTHREAD


    `CMEMTHREAD` 等待类型表明 SQL Server 相关的内存对象存在压力。这些内存对象为 SQL Server 的各个部分（如缓冲区和过程缓存）分配内存。每当发生
    `CMEMTHREAD` 等待时，意味着多个线程试图同时访问同一个内存对象。


    ### 什么是 CMEMTHREAD 等待类型？


    为了解释 `CMEMTHREAD` 等待类型的产生机制，我们需要深入一些编程术语，特别是 `临界区`、`互斥` 和 `线程安全` 这几个术语。这三个概念在
    `CMEMTHREAD` 等待类型的产生中起着直接作用。


    一个 `临界区` 包含一段访问共享资源的代码，该资源一次只能由一个线程访问。在我们的例子中，共享资源将是 SQL Server 的一个内存对象（可能是一个数据页）。SQL
    Server 的内存对象一次只允许一个线程访问，以最小化内存对象损坏的风险。因为有许多线程想要访问内存对象，所以我们使用一种方法来确保一次只允许一个线程访问。这种方法叫做
    `互斥`。SQL Server 使用一个 `互斥` 对象来确保并发线程在访问内存对象时不会同时处于其临界区内。`互斥` 通过将线程对内存对象的访问序列化来实现这一点。只有一个线程可以是一个
    `互斥` 对象的所有者，当一个线程拥有该对象时，它才能访问共享资源。当该线程完成操作后，`互斥` 对象会移交给队列中的下一个线程。通过使用这些对象，我们创建了
    `线程安全` 代码，即多个线程不会并发访问内存对象。图 6-12 展示了这种情况。


    ![](img/340881_3_En_6_Fig12_HTML.png)

    图 6-12

    线程等待互斥对象以访问共享资源


    这种行为的一个简化例子是，你和一大群人正在排队等待使用一台单独的售票机购买摇滚乐队演唱会的门票。在这个例子中，售票机是共享资源，一次只有一个人可以使用售票机。当我们到达售票机时，我们可以买到一张票，而排在我们后面的人必须等我们买完。我们买完票后，队列中的下一个人获得使用售票机的权利。


    我们也可以在 SQL Server 中观察到这种行为，但为此我们需要使用一个调试器（如 `WinDbg`）。图 6-13 展示了 SQL Server 中的一个线程如何因为访问内存对象的权限被授予了另一个线程而等待
    `互斥`。为了捕获此图，我使用了一个 `扩展事件` 会话，在发生 `CMEMTHREAD` 等待时创建了一个 SQL Server 迷你转储。然后我使用 `WinDbg`
    打开该迷你转储并返回了调用栈。有关如何使用 `SqlDumper` 的详细信息，请访问 `https://slrwnds.com/32n2up`。


    ![](img/340881_3_En_6_Fig13_HTML.png)

    图 6-13

    迷你转储中发生 CMEMTHREAD 等待的示例


    这里重要的一行是 `SOS_UnfairMutexPair::LongWait`，它产生了 `CMEMTHREAD` 等待，因为我们监控的线程必须等待另一个当前拥有内存对象访问权限的线程。紧接着的下一行
    `SOS_UnfairMutexPair::AcquirePair` 表示该线程获得了互斥锁，随后便通过 `CMemThread<CmemObj>::Alloc`
    访问了内存对象。

