  raw: '### Isolation


    Concurrent access to memory-optimized tables is handled through snapshot-based
    transaction isolation. This isolation level shares many characteristics with the
    snapshot isolation we use on disk-based tables, but there are some differences
    so as to optimize throughput. First of all, the snapshot-based transaction isolation
    uses row versions when concurrent transactions want to access the same row. Instead
    of storing the row versions in the TempDB database like regular snapshot isolation,
    the row versions for memory-optimized tables are stored in-line in the data files
    itself.


    Another difference is the snapshot-based transaction isolation uses an optimistic
    concurrency control. This means SQL Server assumes no transaction conflict will
    occur when concurrent transactions access the same data. Because of this assumption,
    there is no need for locks or latches to protect the memory-optimized table data.
    There is a form of conflict detection active, however, and when it detects a conflict
    has occurred, it will end one of the transactions, and the transaction will need
    to be retried.


    Not having to place and maintain locks and latches is another major contribution
    to the performance of In-Memory OLTP.


    ### Transaction Log Changes


    The final difference to discuss is the modifications to the behavior of the transaction
    log regarding memory-optimized tables. For traditional tables, a log record will
    be generated when a transaction starts whether it gets committed or not. For memory-optimized
    tables, the log record is generated when a transaction begins to commit processing.
    This means no information for transactions rolled back is recorded. This minimizes
    interaction with the transaction log on disk, thus improving performance.


    Another modification is changes to indexes on memory-optimized tables are not
    logged in the transaction log. Since indexes created on memory-optimized tables
    are also maintained entirely in-memory, there is no need to record changes. Indexes
    on memory-optimized tables are regenerated on the start of the SQL Server service.


    The final difference I want to mention is the grouping of multiple transactions
    into one log record. For traditional tables, every transaction will result in
    at least one log record. Transactions against memory-optimized tables are grouped
    together and then written as one log record (with a current maximum size of 24
    KB). For instance, if you have 200 inserts against a traditional table, at least
    200 log records would be generated. If we could fit 100 inserts into one log record
    for the memory-optimized table, we would only have two log records instead of
    at least 200\. Again, this improves throughput for memory-optimized tables.


    Now with a (simplified and short) look at some of the inner workings of memory-optimized
    tables, let’s review some of the wait types related to In-Memory OLTP. Most of
    the wait types in this chapter are related, one way or another, to the new offline
    checkpoint process introduced with In-Memory OLTP.


    ## WAIT_XTP_HOST_WAIT


    The first wait type in this chapter is **WAIT_XTP_HOST_WAIT**. This wait type
    shares some characteristics with the CHECKPOINT_QUEUE wait type discussed in Chapter
    [12](#340881_3_En_12_Chapter.xhtml), “Background and Miscellaneous Wait Types,”
    as it seems to be running continuously but only writes wait information to sys.dm_os_wait_stats
    at specific conditions.


    ### What Is the WAIT_XTP_HOST_WAIT Wait Type?


    If we look up information on the WAIT_XTP_HOST_WAIT wait type on Books Online,
    we get a not-so-helpful definition: “Occurs when waits are triggered by the database
    engine and implemented by the host.” This doesn’t give us a lot of clues about
    the processes related to the WAIT_XTP_HOST_WAIT wait type, which means we have
    to do a little bit of digging ourselves.


    Before we can start investigating the WAIT_XTP_HOST_WAIT wait type, we need to
    create a memory-optimized table. I used the script in Listing [13-1](#340881_3_En_13_Chapter.xhtml#PC1)
    to create a new database with a single memory-optimized table. There are some
    path references in this script you will need to change to make sure the database
    data and log files are created in the right location.


    ```

    -- Create database

    -- Make sure to change the file locations if needed

    USE [master];

    CREATE DATABASE [OLTP_Test] CONTAINMENT = NONE

    ON PRIMARY

    (NAME = N''OLTP_Test'', FILENAME = N''E:\Data\OLTP_Test_Data.mdf'' ,

    SIZE = 51200KB , FILEGROWTH = 10%)

    LOG ON

    (NAME = N''OLTP_Test_log'', FILENAME = N''E:\Log\OLTP_Test_Log.ldf'' ,

    SIZE = 10240KB , FILEGROWTH = 10%);

    -- Add the Memory-Optimized Filegroup

    ALTER DATABASE OLTP_Test

    ADD FILEGROUP OLTP_MO CONTAINS MEMORY_OPTIMIZED_DATA;

    -- Add a file to the newly created Filegroup.

    -- Change drive/folder location if needed.

    ALTER DATABASE OLTP_Test

    ADD FILE (name=''OLTP_mo_01'', filename=''E:\data\OLTP_Test_mo_01.ndf'')

    TO FILEGROUP OLTP_MO;

    -- Create our test table

    USE [OLTP_Test];

    CREATE TABLE OLTP

    (ID INT IDENTITY (1,1) PRIMARY KEY NONCLUSTERED,

    RandomData1 VARCHAR(50),

    RandomData2 VARCHAR(50),

    ID2 UNIQUEIDENTIFIER)

    WITH (MEMORY_OPTIMIZED=ON);

    Listing 13-1

    Create test database and memory-optimized table

    ```


    Now with a memory-optimized table for testing, let’s look at the WAIT_XTP_HOST_WAIT
    wait type in the sys.dm_os_wait_stats and sys.dm_os_waiting_tasks DMV using the
    following query:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    ```


    The results of this query on my test SQL Server instance can be seen in Figure
    [13-4](#340881_3_En_13_Chapter.xhtml#Fig4).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig4_HTML.png)


    2 tables for wait X T P host wait. It has waiting task address, session i d, exec
    context i d, wait duration m s, resource address, waiting tasks count, wait time,
    max wait time, and more.


    Figure 13-4


    WAIT_XTP_HOST_WAIT waits


    The first thing to notice is the WAIT_XTP_HOST_WAIT wait type is constantly showing
    up in the sys.dm_os_waiting_tasks DMV, and over time the wait time increases.
    Also, the session_id related to the WAIT_XTP_HOST_WAIT wait type indicates it
    is an internal SQL Server thread recording the wait. From this information, we
    can already formulate some conclusions about the WAIT_XTP_HOST_WAIT wait type:
    it is related to an internal background process which continuously runs. What’s
    also interesting is if I run the query a second time, the wait time in the sys.dm_os_waiting_tasks
    DMV increases but the wait time in the sys.dm_os_wait_stats remains the same.
    So far we have run into one other wait type sharing this characteristic, the CHECKPOINT_QUEUE
    wait time, which we discussed in Chapter [12](#340881_3_En_12_Chapter.xhtml),
    “Background and Miscellaneous Wait Types.”


    Since the CHECKPOINT_QUEUE wait type has interesting behavior in it only writes
    the accumulated wait time of the sys.dm_os_waiting_tasks DMV to the sys.dm_os_wait_stats
    DMV when an automatic checkpoint occurs, I decide to simply run a checkpoint command
    against the OLTP_Test database using Listing [13-1](#340881_3_En_13_Chapter.xhtml#PC1)
    and then query both the DMVs again. The impact on the wait times of the WAIT_XTP_HOST_WAIT
    wait type can be seen in Figure [13-5](#340881_3_En_13_Chapter.xhtml#Fig5).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig5_HTML.png)'
  trans: '## 内存中 OLTP


    ### 隔离


    并发访问内存优化表通过基于快照的事务隔离来处理。这个隔离级别与我们用于磁盘上表的快照隔离有许多共同特征，但也存在一些差异以优化吞吐量。首先，基于快照的事务隔离在并发事务想要访问同一行时使用行版本。与常规快照隔离将行版本存储在
    `TempDB` 数据库中不同，内存优化表的行版本内联存储在数据文件本身中。


    另一个不同之处是，基于快照的事务隔离使用乐观并发控制。这意味着当并发事务访问相同数据时，`SQL Server` 假设不会发生事务冲突。由于这个假设，不需要锁或闩锁来保护内存优化表数据。然而，存在一种冲突检测机制，当它检测到冲突发生时，将结束其中一个事务，该事务需要被重试。


    无需放置和维护锁与闩锁，是内存中 `OLTP` 性能表现优异的另一个主要贡献因素。


    ### 事务日志更改


    最后一个要讨论的不同点是，关于内存优化表的事务日志行为发生了修改。对于传统表，无论事务是否提交，都会在事务开始时生成日志记录。对于内存优化表，日志记录是在事务开始提交处理时生成的。这意味着回滚的事务信息不会被记录。这最小化了与磁盘上事务日志的交互，从而提高了性能。


    另一项修改是，内存优化表上的索引更改不会记录在事务日志中。由于在内存优化表上创建的索引也完全维护在内存中，因此无需记录更改。内存优化表上的索引在 `SQL
    Server` 服务启动时重新生成。


    我要提到的最后一个不同点是，将多个事务分组到一个日志记录中。对于传统表，每个事务将至少产生一个日志记录。针对内存优化表的事务被分组在一起，然后作为一个日志记录写入（当前最大尺寸为
    24 KB）。例如，如果你对传统表有 200 次插入操作，将至少生成 200 个日志记录。如果我们可以将 100 次插入操作放入内存优化表的一个日志记录中，那么我们将只有两个日志记录，而不是至少
    200 个。同样，这提高了内存优化表的吞吐量。


    现在，在（简化且简短地）了解了内存优化表的一些内部工作原理后，让我们回顾一下与内存中 `OLTP` 相关的一些等待类型。本章中的大多数等待类型都与内存中 `OLTP`
    引入的新脱机检查点进程有关，只是关联方式不同。


    ## WAIT_XTP_HOST_WAIT


    本章的第一个等待类型是 `WAIT_XTP_HOST_WAIT`。这个等待类型与第 12 章“后台和杂项等待类型”中讨论的 `CHECKPOINT_QUEUE`
    等待类型共享一些特征，因为它看起来一直在运行，但只在特定条件下将等待信息写入 `sys.dm_os_wait_stats`。


    ### WAIT_XTP_HOST_WAIT 等待类型是什么？


    如果我们在 `Books Online` 上查询 `WAIT_XTP_HOST_WAIT` 等待类型的信息，会得到一个不太有用的定义：“当等待由数据库引擎触发并由主机实现时发生。”这并没有为我们提供太多关于与
    `WAIT_XTP_HOST_WAIT` 等待类型相关进程的线索，这意味着我们需要自己做一些挖掘工作。


    在我们开始研究 `WAIT_XTP_HOST_WAIT` 等待类型之前，我们需要创建一个内存优化表。我使用清单 13-1 中的脚本创建了一个包含单个内存优化表的新数据库。在此脚本中有一些路径引用，您需要更改它们以确保数据库数据和日志文件创建在正确的位置。


    ```sql

    -- 创建数据库

    -- 如果需要，请确保更改文件位置

    USE [master];

    CREATE DATABASE [OLTP_Test] CONTAINMENT = NONE

    ON PRIMARY

    (NAME = N''OLTP_Test'', FILENAME = N''E:\Data\OLTP_Test_Data.mdf'' ,

    SIZE = 51200KB , FILEGROWTH = 10%)

    LOG ON

    (NAME = N''OLTP_Test_log'', FILENAME = N''E:\Log\OLTP_Test_Log.ldf'' ,

    SIZE = 10240KB , FILEGROWTH = 10%);

    -- 添加内存优化文件组

    ALTER DATABASE OLTP_Test

    ADD FILEGROUP OLTP_MO CONTAINS MEMORY_OPTIMIZED_DATA;

    -- 向新创建的文件组添加文件。

    -- 如果需要，请更改驱动器/文件夹位置。

    ALTER DATABASE OLTP_Test

    ADD FILE (name=''OLTP_mo_01'', filename=''E:\data\OLTP_Test_mo_01.ndf'')

    TO FILEGROUP OLTP_MO;

    -- 创建我们的测试表

    USE [OLTP_Test];

    CREATE TABLE OLTP

    (ID INT IDENTITY (1,1) PRIMARY KEY NONCLUSTERED,

    RandomData1 VARCHAR(50),

    RandomData2 VARCHAR(50),

    ID2 UNIQUEIDENTIFIER)

    WITH (MEMORY_OPTIMIZED=ON);

    ```


    **清单 13-1** 创建测试数据库和内存优化表


    现在有了用于测试的内存优化表，让我们使用以下查询查看 `sys.dm_os_wait_stats` 和 `sys.dm_os_waiting_tasks`
    DMV 中的 `WAIT_XTP_HOST_WAIT` 等待类型：


    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_HOST_WAIT'';

    ```


    在我的测试 `SQL Server` 实例上执行此查询的结果如图 13-4 所示。


    ![](img/340881_3_En_13_Fig4_HTML.png)


    **图 13-4** WAIT_XTP_HOST_WAIT 等待


    首先需要注意的是，`WAIT_XTP_HOST_WAIT` 等待类型不断出现在 `sys.dm_os_waiting_tasks` DMV 中，并且随着时间的推移等待时间增加。此外，与
    `WAIT_XTP_HOST_WAIT` 等待类型相关的 `session_id` 表明这是一个内部 `SQL Server` 线程在记录等待。从这些信息中，我们已经可以对
    `WAIT_XTP_HOST_WAIT` 等待类型得出一些结论：它与一个持续运行的内部后台进程相关。同样有趣的是，如果我第二次运行查询，`sys.dm_os_waiting_tasks`
    DMV 中的等待时间会增加，但 `sys.dm_os_wait_stats` 中的等待时间保持不变。到目前为止，我们遇到的另一种具有此特性的等待类型是 `CHECKPOINT_QUEUE`
    等待时间，我们在第 12 章“后台和杂项等待类型”中讨论过。


    由于 `CHECKPOINT_QUEUE` 等待类型的有趣行为在于，它仅在发生自动检查点时，才将 `sys.dm_os_waiting_tasks` DMV
    中累积的等待时间写入 `sys.dm_os_wait_stats` DMV，我决定使用清单 13-1 简单地对 `OLTP_Test` 数据库运行一个 `checkpoint`
    命令，然后再次查询两个 DMV。对 `WAIT_XTP_HOST_WAIT` 等待类型等待时间的影响如图 13-5 所示。


    ![](img/340881_3_En_13_Fig5_HTML.png)'
- fmt: '# SQL Server 内存 OLTP 相关的等待类型


    ## 2 tables for wait X T P host wait


    It has waiting task address, session i d, exec context i d, wait duration m s,
    resource address, waiting tasks count, wait time m s, max wait time m s, and more.


    **Figure 13-5**


    **WAIT_XTP_HOST_WAIT wait information after checkpoint**


    As you see in [Figure 13-5](#340881_3_En_13_Chapter.xhtml#Fig5), the wait time
    in the `sys.dm_os_waiting_tasks` DMV is small, but the wait time in the `sys.dm_os_wait_stats`
    DMV has increased. Because of this behavior, I believe the `WAIT_XTP_HOST_WAIT`
    wait type has something to do with the offline checkpoint process related to memory-optimized
    tables.


    We verify this by going to the location of the in-memory file created in [Listing
    13-1](#340881_3_En_13_Chapter.xhtml#PC1). The interesting thing about adding a
    file to an in-memory filegroup is it will create a directory, and inside this
    directory, there is a folder with a unique ID string. If you go further down the
    directory tree, you will end up in a folder with numbered files. [Figure 13-6](#340881_3_En_13_Chapter.xhtml#Fig6)
    shows a part of the contents of this folder on my test machine.


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig6_HTML.png)


    A table has four columns for name, date modified, type, and size. It has 17 rows.


    **Figure 13-6**


    **In-memory filegroup files**


    As a matter of fact, the files you are seeing here are the data and delta files
    that are associated with the memory-optimized table we created earlier.


    Since I am guessing a checkpoint would create another `CFP`, I checked the number
    of files in the folder before executing a `CHECKPOINT`, which was 18 files. I
    then executed a `CHECKPOINT` command and looked at the number of files again,
    and it turned out there were now 21 files after the checkpoint.


    ### WAIT_XTP_HOST_WAIT Summary


    I believe the `WAIT_XTP_HOST_WAIT` wait type has a clear relation to the creation
    of new checkpoint file pairs. Running a manual `CHECKPOINT` statement will generate
    a new `CFP` for memory-optimized tables. Because the `WAIT_XTP_HOST_WAIT` wait
    type generates wait time constantly in the background and writes it to the `sys.dm_os_wait_stats`
    DMV, a new `CFP` was created (either by manual checkpoint, when an existing `CFP`
    was full, or when a Merge operation occurred), I believe the `WAIT_XTP_HOST_WAIT`
    wait type does not directly indicate performance problems. It mostly indicates
    a new `CFP` has been added to the in-memory filegroup. This does not mean this
    is the only process that generates `WAIT_XTP_HOST_WAIT` waits, though. There can
    be other processes that can also cause the waits, but so far they only occurred
    whenever a new `CFP` needed to be added.


    ## WAIT_XTP_CKPT_CLOSE


    As the name suggests, the `WAIT_XTP_CKPT_CLOSE` wait type seems to be related
    to the offline checkpoint process introduced with the In-Memory OLTP feature.


    ### What Is the WAIT_XTP_CKPT_CLOSE Wait Type?


    The `WAIT_XTP_CKPT_CLOSE` wait type seems to be related to the offline checkpoint
    process introduced with the release of In-Memory OLTP. Analyzing the behavior
    of this wait type shows it records wait time only when a checkpoint occurs, no
    matter if it is an automatic or manual checkpoint. The wait time `WAIT_XTP_CKPT_CLOSE`
    represents seems to be the time it takes for the checkpoint operation to complete.
    We verify this by executing a `CHECKPOINT` command against the database and table
    created earlier when we discussed the `WAIT_XTP_HOST_WAIT` wait type. The script
    in [Listing 13-2](#340881_3_En_13_Chapter.xhtml#PC3) will clear the `sys.dm_os_wait_stats`
    DMV, insert a few rows inside the memory-optimized table, perform a `CHECKPOINT`
    operation, and then query the `sys.dm_os_wait_stats` DMV for `WAIT_XTP_CKPT_CLOSE`
    wait type information.


    ```sql

    USE [OLTP_Test];

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert some rows

    INSERT INTO OLTP

    (RandomData1,

    RandomData2,

    ID2)

    VALUES

    (CONVERT(VARCHAR(50), NEWID()),

    CONVERT(VARCHAR(50), NEWID()),

    NEWID())

    GO 1000

    -- Perform a CHECKPOINT

    CHECKPOINT;

    -- Query sys.dm_os_wait_stats for WAIT_XTP_CKPT_CLOSE waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAIT_XTP_CKPT_CLOSE'';

    ```


    **Listing 13-2** Generate `WAIT_XTP_CKPT_CLOSE` waits


    The results are seen in [Figure 13-7](#340881_3_En_13_Chapter.xhtml#Fig7).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig7_HTML.jpg)


    A row has five columns for wait type as wait X T P C K P T close, waiting tasks
    count as 2, wait time m s and max wait time m s as 896, and signal wait time m
    s as 0.


    **Figure 13-7**


    **WAIT_XTP_CKPT_CLOSE waits**


    I don’t believe seeing `WAIT_XTP_CKPT_CLOSE` waits occur is a direct cause for
    concern. They indicate checkpoints are being performed. I can imagine a sudden
    spike in wait times for the `WAIT_XTP_CKPT_CLOSE` could indicate a performance
    issue. As in the previous section, performing a checkpoint against a memory-optimized
    table will result in extra `CFPs` created. I am guessing if the allocation of
    `CFPs` takes a long time, the checkpoint operation will take longer to complete
    as well, resulting in higher `WAIT_XTP_CKPT_CLOSE` wait times. The amount of data
    a checkpoint has to process will probably also mean higher `WAIT_XTP_CKPT_CLOSE`
    wait times. Since the checkpoint writes data to the storage subsystem, the performance
    of your storage will probably also impact `WAIT_XTP_CKPT_CLOSE` wait times.


    ### WAIT_XTP_CKPT_CLOSE Summary


    The `WAIT_XTP_CKPT_CLOSE` wait type seems closely related to performing checkpoint
    operations. It indicates the time a checkpoint performed against a memory-optimized
    table took to complete. I don’t believe this directly indicates performance issues,
    since it just records the time it took for the checkpoint to complete. The amount
    of work a checkpoint has to process will probably result in higher `WAIT_XTP_CKPT_CLOSE`
    wait times. Storage subsystem performance will probably also impact `WAIT_XTP_CKPT_CLOSE`
    wait times.


    ## WAIT_XTP_OFFLINE_CKPT_NEW_LOG


    The final In-Memory OLTP related wait type in this chapter is the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`
    wait type. This is another wait type related to the offline checkpoint process.


    ### What Is the WAIT_XTP_OFFLINE_CKPT_NEW_LOG Wait Type?


    The `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type appears to be a benign wait type
    recording the length of time the offline checkpoint process is waiting for work.
    This is confirmed by Books Online, which has the following definition: “occurs
    when offline checkpoint is waiting for new log records to scan.”


    As we discussed earlier in this chapter, the offline checkpoint process monitors
    the transaction log for transactions impacting memory-optimized tables, so those
    transactions are recorded in the data and delta files. This is a constantly running
    process in the background of SQL Server, which means you will see an internal
    process with the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait type when you query the
    `sys.dm_os_waiting_tasks` DMV, as you can see in [Figure 13-8](#340881_3_En_13_Chapter.xhtml#Fig8).


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig8_HTML.png)


    A table has six columns for waiting task address, session i d, exec context i
    d, wait duration m s, wait type, and resource address, along with six rows. Wait
    x t p offline c k p t new log is highlighted within a box.


    **Figure 13-8**


    **WAIT_XTP_OFFLINE_CKPT_NEW_LOG waits inside sys.dm_os_waiting_tasks**


    Unlike the `WAIT_XTP_HOST_WAIT` wait type which only writes wait time information
    to the `sys.dm_os_wait_stats` DMV when specific conditions occur, the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG`
    wait type appears to wait for around 5 seconds, adds the wait time to the `sys.dm_os_wait_stats`
    DMV, and then resets the wait time in the `sys.dm_os_waiting_tasks` DMV again.
    This suggests that the offline checkpoint process checks for new work at an interval
    of around 5 seconds.


    Seeing this behavior makes me believe the `WAIT_XTP_OFFLINE_CKPT_NEW_LOG` wait
    type is harmless. It just indicates that the offline checkpoint process is waiting
    for work to arrive.'
