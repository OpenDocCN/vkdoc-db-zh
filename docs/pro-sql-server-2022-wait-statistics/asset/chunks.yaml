    If we assign some of Thread 2’s work to Thread 3, the query would perform faster
    and result in lower CXPACKET wait times.


    We view the thread distribution in the actual number of rows property of the parallel
    operation inside the actual execution plan. Figure [5-8](#340881_3_En_5_Chapter.xhtml#Fig8)
    shows the properties of a clustered index scan that has been performed using parallelism.
