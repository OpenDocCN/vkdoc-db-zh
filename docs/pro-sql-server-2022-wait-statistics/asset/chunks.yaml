    ### 降低由用户连接引起的 THREADPOOL 等待


    THREADPOOL 等待的另一个常见原因是用户连接和针对您的 SQL Server 实例执行查询的数量突然增加。例如，如果连接到 SQL Server 实例的应用程序使用多个连接，就可能出现此问题。这里的主要问题是这些连接保持活动状态并不断获取工作线程。


    为了举例说明这个问题，我们将再次使用 Ostress 连接到我的测试 SQL Server 实例并执行查询。这次，我们将使用一个不同的 `.sql` 文件（保存为
    `wait.sql`）作为 Ostress 的输入，其中包含以下查询：


    ```sql

    WAITFOR DELAY ''00:05:00''

    ```


    此查询唯一的作用就是等待 5 分钟。5 分钟后，查询将结束，连接将断开。让我们使用 `wait.sql` 文件运行 Ostress：


    ```shell

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\wait.sql" -n140 -r1 -q

    ```


    我们将 Ostress 生成的线程数更改为 140，并再次将“最大工作线程数”选项保留设置为 128 个工作线程。


    当我们使用以下查询查询 `sys.dm_exec_sessions` DMV 时，可以看到许多由 Ostress 工具生成的新用户会话处于活动状态，如图 5-28
    所示。


    ![](img/340881_3_En_5_Fig28_HTML.png)


    `sys.dm_exec_sessions` 查询输出的截图。输出表有 5 列和 16 行。列列出了会话 ID、登录时间、主机名和程序名。


    图 5-28


    Ostress 用户会话


    ```sql

    SELECT *

    FROM sys.dm_exec_sessions

    WHERE is_user_process = 1;

    ```


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，也会看到 THREADPOOL 等待正在发生，如图 5-29 所示。


    ![](img/340881_3_En_5_Fig29_HTML.png)


    查询输出的截图。输出表有 8 列和 2 行。第 6 列列出了线程池等待。


    图 5-29


    `sys.dm_os_waiting_tasks` DMV 内部的 THREADPOOL 等待


    由过度并行化引起的 THREADPOOL 等待与用户连接增加引起的等待之间的最大区别在于，在后一种情况下，我的测试 SQL Server 实例的 CPU 保持较低水平，如图
    5-30 所示。


    ![](img/340881_3_En_5_Fig30_HTML.png)


    两张图表说明了 CPU 利用率。线条几乎直线移动，带有尖锐的峰值，并显示了 60 秒内的利用率百分比。两张图的右端都标记为 100%。


    图 5-30


    CPU 使用率


    CPU 使用率历史记录图中的小尖峰是由启动 Ostress 工具引起的。之后，CPU 保持在恒定的低使用率百分比。


    解决由用户连接增加引起的 THREADPOOL 等待应从源头开始。分析用户连接来自哪里，并查看这些连接正在执行的查询。我见过一些情况，应用程序在更新后突然使用了数百个活动用户连接，而
    SQL Server 实例并未设计为处理如此大量的并发活动连接，从而导致出现 THREADPOOL 等待。


    请记住，用户连接只有在执行查询时才应引起 THREADPOOL 等待。连接到 SQL Server 实例但未执行任何操作的用户连接不应成为 THREADPOOL
    等待的原因。


    此外，针对数据库的大量不同用户活动连接可能会在行或表上产生许多锁。如果您在注意到与锁相关的高等待时间的同时还存在 THREADPOOL 等待，问题可能是正在发生的大量锁和阻塞。在这种情况下，您应尝试找出导致锁等待的查询，并查看是否可以对其进行优化。我们将在第
    7 章“与锁相关的等待类型”中讨论与锁相关的等待类型以及您可以采取的措施。


    ### THREADPOOL 总结


    THREADPOOL 等待是在 SQL Server 实例上看到的最令人担忧的等待类型之一。它们的发生是因为没有足够的空闲工作线程来处理请求，因此请求工作线程的任务必须等到新的工作线程可用。值得庆幸的是，THREADPOOL
    等待并不常见，因为它们有可能完全阻止您连接到 SQL Server 实例。在这种情况下，唯一的连接方式是使用专用管理员连接（或 DAC），我强烈建议您在所有
    SQL Server 实例上启用此功能。


    过度使用并行化和活动用户连接的大幅增加是 THREADPOOL 等待最常见的两个原因。前者与我们之前讨论的 `CXPACKET` 等待类型直接相关，因此解决
    `CXPACKET` 等待类型的方法也有助于解决 THREADPOOL 等待。后者需要深入调查活动用户连接数量突然增加的原因。也许它们是应用程序连接到 SQL
    Server 实例时存在错误的结果。我们还简要提到了锁和阻塞行为作为 THREADPOOL 等待的可能原因。我们将在第 7 章“与锁相关的等待类型”中更深入地探讨如何解决与锁相关的等待。


    # 6. 与 IO 相关的等待类型


    在本章中，我们将从最广泛的意义上研究与 IO 相关的等待类型。我说“最广泛”是因为所选的等待类型也与您系统中的存储、内存或网络组件相关。可以说大多数等待类型可以归入多个类别，您是对的，但我需要防止本章涵盖
    90% 的可用等待类型。


    我认为本章中的等待类型与存储、内存或网络有直接关系，但与 SQL Server 中的功能或概念没有直接关系。例如，`PAGEIOLATCH_xx` 等待类型经常与存储相关，但它们未包含在本章中。原因是它们也是一种自旋锁（latch）等待类型，我认为自旋锁等待类型由于其
    SQL Server 中的功能值得单独成章。


    与 IO 相关的组件的性能对 SQL Server 极其重要。SQL Server 的几乎所有部分都以某种方式与 IO 组件交互，无论是需要从磁盘读取到内存中的数据页，还是需要通过网络传输到最终用户的查询结果。如果这些组件之一无法处理
    SQL Server 实例上生成的工作负载或配置不当，您的性能将会下降。


    本章中的等待类型将帮助您追踪是哪个 IO 组件导致了速度下降，以便您可以采取适当措施预防或解决与性能相关的事件。


    ## ASYNC_IO_COMPLETION


    `ASYNC_IO_COMPLETION` 等待类型是一种常见类型，当 SQL Server 在存储子系统上执行文件相关操作并等待操作完成时发生。当您执行与存储子系统交互的操作（如数据库备份、镜像或日志传送）时，会看到此等待类型。与大多数等待类型一样，如果您看到此等待类型出现，并不一定表示您的存储子系统存在问题。只有当等待时间比您根据基准值（我们在第
    4 章“构建可靠的基准”中讨论过）预期的要长时，它才是一个问题。

