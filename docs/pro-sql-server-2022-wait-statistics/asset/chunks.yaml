    SQL Server 配置管理器，点击“SQL Server 网络配置”选项。右键单击 SQL Server 实例并选择“属性”。接着，打开“证书”选项卡并选择之前创建的自签名证书。图
    11-8 显示了我测试虚拟机上的对话框。


    ![](img/340881_3_En_11_Fig8_HTML.png)


    一个标有“RC0 的协议属性”的窗口截图。在证书选项卡下，选择了“SQL 2022”，下方有详细信息。其他选项卡是“标志”和“高级”。

