- fmt: 'To show the high CPU usage is related to the `SOS_SCHEDULER_YIELD` wait type,
    we look at the cumulative wait statistics DMV, `sys.dm_os_wait_stats`. We use
    the following query to show the top 5 wait types ordered by wait time, while we
    run the Ostress utility (reset the DMV before starting the Ostress utility to
    keep the numbers small):


    ```sql

    SELECT TOP 5 *

    FROM sys.dm_os_wait_stats

    ORDER by wait_time_ms DESC;

    ```


    The results of this query are shown in `Figure 5-16`.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig16_HTML.png)


    `Figure 5-16` - Top 5 wait types during Ostress execution


    As you see, the number 1 wait type is `SOS_SCHEDULER_YIELD` with a high amount
    of `waiting_tasks_count` and total `wait_time_ms`. But in second place, we find
    the `SOS_WORK_DISPATCHER` wait, a new wait introduced with SQL2019. The `SOS_WORK_DISPATCHER`
    wait is recorded for the time a thread is idle, waiting for work to be assigned.


    If you experience a CPU problem with a production SQL Server instance, you might
    first focus on very small, very quick queries like the ones we executed in this
    example. If the volume of those queries increased, or if the number of user connections
    to the SQL Server executing those queries increased, then you could see high CPU
    usage. Sudden growth in transactions or user connections can also lead to high
    `SOS_SCHEDULER_YIELD` wait times.


    Another cause of high `SOS_SCHEDULER_YIELD` waits, together with very high CPU
    usage, can be a phenomenon called spinlock contention. Spinlocks are defined as
    “lightweight synchronization primitives which are used to protect access to data
    structures” and are a very advanced topic. Appendix II, at the back of this book,
    goes into a little bit more detail about spinlocks for those who are interested
    in learning more about them.


    Very large, complex queries may also lead to higher `SOS_SCHEDULER_YIELD` wait
    times. Try looking for active queries consuming a lot of CPU time and have complex
    calculations or data type conversions inside them. One query I use frequently
    to identify CPU-heavy queries is the one in `Listing 5-4`.


    ```sql

    SELECT TOP 10

    QText.TEXT AS ''Query'',

    QStats.execution_count AS ''Nr of Executions'',

    QStats.total_worker_time/1000 AS ''Total CPU Time (ms)'',

    QStats.last_worker_time/1000 AS ''Last CPU Time (ms)'',

    QStats.last_execution_time AS ''Last Execution'',

    QPlan.query_plan AS ''Query Plan''

    FROM sys.dm_exec_query_stats QStats

    CROSS APPLY sys.dm_exec_sql_text(QStats.sql_handle) QText

    CROSS APPLY sys.dm_exec_query_plan(QStats.plan_handle) QPlan

    ORDER BY QStats.total_worker_time DESC;

    ```


    `Listing 5-4` - Detecting expensive CPU queries


    The results of the query in `Listing 5-3` on my test SQL Server can be seen in
    `Figure 5-17`.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig17_HTML.png)


    `Figure 5-17` - Expensive CPU queries


    As you see, the query used with the Ostress tool is the query that executed the
    most and took the highest total CPU time. This query is a good starting point
    for an investigation. Maybe the query can be optimized or rewritten, so it doesn’t
    consume as much CPU time.


    Another method to identify expensive CPU queries is with the Query Store. The
    Query Store offers a built-in report called “Top Resource Consuming Queries” allowing
    you to filter on CPU time, as shown in `Figure 5-18`.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig18_HTML.png)


    `Figure 5-18` - Visualizing expensive CPU queries through the Query Store


    ### SOS_SCHEDULER_YIELD Summary


    The `SOS_SCHEDULER_YIELD` wait type will occur on every SQL Server instance since
    it is directly related to the scheduling model that SQL Server uses to grant worker
    threads access to the processor. It might indicate a problem if the total wait
    time or total amount of waiting tasks suddenly increases compared to your baseline
    measurements. Most of the time a large increase in `SOS_SCHEDULER_YIELD` waits
    also means an increase in the CPU load. This increase is caused either by the
    SQL Server process itself or by another process outside of SQL Server that requires
    a large amount of processor time, limiting the time SQL Server can access the
    processor. If the SQL Server process is responsible for the increase in CPU load,
    you should try to correlate the increase in `SOS_SCHEDULER_YIELD` waits with an
    increase in user activity. Another option is to query the `sys.dm_exec_query_stats`
    DMV, as shown in `Listing 5-1`, or use the Query Store to find the queries that
    require the most processor time and focus on optimizing those queries.


    ## THREADPOOL


    One of the most notorious wait types is `THREADPOOL`. Unlike `CXPACKET` and `SOS_SCHEDULER_YIELD`
    which occur even when your SQL Server instance isn’t experiencing any issues,
    high `THREADPOOL` wait times frequently indicate a performance problem. Just as
    with the other two CPU-related wait types discussed earlier, the `THREADPOOL`
    wait type is closely related to the way SQL Server scheduling works.'
