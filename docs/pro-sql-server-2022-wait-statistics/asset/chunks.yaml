    *This book is dedicated to all the accidental database administrators, developers,
    and anyone who has written a database query and wondered “what the hell is taking
    so long?”*

    *Also, for Roy, Moss, and anyone else who decided to turn it off and back on again.*


    # Introduction


    “Write the book you wish someone else would have written and handed to you when
    you were starting as a DBA.”

    Those words were spoken to me by my friend and mentor, Kevin Kline, roughly 13
    years ago. At the time I was writing my first book, `DBA Survivor`, and I asked
    Kevin for advice on how to approach the project. His answer gave me clarity, and
    I’ve used the same approach for this book you are now reading.


    At the time I started as a junior DBA, Tom Davidson’s well-known `SQL Server 2005
    Waits and Queues` whitepaper was years away from publication. What I knew about
    waits I would find using `DBCC` statements against (the artist formally known
    as) Sybase ASE and SQL Server 2000 instances.

    In other words, I didn’t know much.


    With the release of SQL Server 2005 and the publication of the Davidson whitepaper,
    wait statistics became a viable tuning methodology. Administrators and developers
    could now use waits and queues to understand exactly why a query was running longer
    than expected. Overnight our team transitioned from **reacting** to query performance
    issues to being **proactive** in understanding which resources the overall database
    workload needed most.


    Every request sent to a database server has the same constraints: memory, processing,
    disk, network, and locking/blocking. It doesn’t matter if you want to rely solely
    on execution plans for query tuning; the physical and logical constraints for
    the query remain the same: they are just presented differently in an execution
    plan. **The waits and queue tuning methodology reduces the complexity and time
    necessary for query performance tuning by an order of magnitude**.


    Once you understand how the database engine processes requests, how waits happen,
    and how to track them, you are well on your way to being an expert in query performance
    tuning.


    And that’s the goal of this book. When you are done reading, I want you to have
    all the skills necessary to be an expert in query performance tuning. That’s the
    book I wish someone would have written and handed to me when I was first starting
    as a DBA.


    To reach the goal, this book has been split into two unequal parts. Part I, “Foundations
    of Wait Statistics Analysis,” provides details on how the database engine processes
    a query (officially called a `request`, which is sent by a `session`, after a
    `connection` to the instance is established) followed by information on how to
    query wait statistics information through various SQL Server `dynamic management
    views (DMVs)`. Part I finishes with an overview of the `Query Store` feature and
    guidance on how to create and gather metrics to build your own baselines.


    Part II, “Wait Types,” dives into specific waits, the causes, some examples, and
    possible resolutions. The chapters are divided by wait categories, which is a
    bit tricky as some waits (such as `PAGEIOLATCH`) have overlap between more than
    one possible constraint (memory and disk). Therefore, the chapters break down
    specific waits into categories by CPU, IO, backups, locks, latches, high-availability
    and disaster-recovery, preemptive, background and miscellaneous, and In-Memory
    OLTP.


    Yes, waits for background and miscellaneous are included, despite their being
    benign for query performance. It’s important for you to know why (and when) these
    waits happen and when they are safe to ignore (they usually are, but not always).


    One thing to note, the examples in this book use a database named `GalacticWorks`.
    This is a modified version of `AdventureWorks` I use for a variety of demos when
    teaching my classes. The examples in the book will work with `AdventureWorks`,
    so don’t panic about not having `GalacticWorks`; you’ll be fine with most versions
    of `AdventureWorks`.


    When you finish this book, I want you to have the confidence to tackle any query
    performance tuning problem. You’ll have the details, information, and knowledge
    necessary to be an expert. And maybe soon enough, you’ll be teaching others and
    maybe someday write your own book, too.


    # Acknowledgments


    There are many people to acknowledge and thank for helping me with this book.
    I’ll do my best to include as many as I can, but please don’t be offended if I
    forget you; it’s not on purpose.


    I’ll start with my wife, Suzanne, for her patience as I spent many off-hours completing
    this book. Oh, and for all the time I’ve spent away from home for the past 15
    years.


    Thanks to Bob Ward of Microsoft for helping uncover new SQL 2022 features, as
    well as your willingness to share your knowledge on SQL Server for the past 25
    years. And thanks for your time in Barcelona in 2006 when you inspired me to want
    to learn more about SQL Server.


    Thanks to my partner in `#TeamData`, Karen Lopez, for your help, support, and
    friendship for many years. I became a better technical writer and presenter by
    learning from you.


    Thanks to Kevin Kline for your guidance and support as I left my career as a production
    DBA to become a Technical Advocate and for providing an example of what proper
    community leadership looks like.


    To Buck Woody, for your support in helping me understand my strengths and your
    guidance in career opportunities through the years.


    To Craig and Vinny, for giving me the opportunity to fail as a DBA, and to Frank
    and Lori for not letting it happen as much as it should have.


    To Rie, Betsy, Rochelle, and everyone on the Microsoft Community team for awarding
    me the Microsoft MVP status all these years.


    Finally, to Jonathan, for thinking of me when it came time to update this book
    for SQL 2022. Thank you for the opportunity to write another book for you, 12
    years later.


