    pressure. To lower those wait times, try to avoid cursor and WHILE statements,
    since the statements inside the cursor or WHILE clauses will often get implicitly
    committed, creating a large amount of small writes. Also check your storage configuration
    to make sure the transaction log isn’t on the same drive as the database data
    file. If high wait times still occur, analyze the performance of the disk on which
