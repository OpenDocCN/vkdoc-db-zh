    SQL Server\[版本号]\Tools\Binn` 文件夹中找到 SQL Server Profiler。


    如果安装的是独立的 SSMS 产品，则 Profiler 位于 `C:\Program Files (x86)\Microsoft SQL Server\140\Tools\Binn`
    文件夹中。


