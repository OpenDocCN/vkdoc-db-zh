  trans: '### 增量捕获方法


    增量捕获方法同样包含一个单独的 `T-SQL` 脚本，但它比重置捕获方法更为复杂。它使用一个临时表来存储第一次测量结果，等待 15 分钟后进行第二次测量，并计算差值。结果会被插入到
    `WaitStats` 表中。清单 4-4 显示了如果您计划使用这种收集等待统计指标的方法时可以使用的 `T-SQL` 脚本。


    ```

    USE [Baseline]

    GO

    -- 检查临时表是否已存在，如果存在则删除它。

    IF EXISTS

    (

    SELECT *

    FROM tempdb.dbo.sysobjects

    WHERE ID = OBJECT_ID(N''tempdb..#ws_Capture'')

    )

    DROP TABLE #ws_Capture;

    -- 创建临时表以保存我们的第一次测量

    CREATE TABLE #ws_Capture

    (  wst_WaitType NVARCHAR(60),

    wst_WaitTime BIGINT,

    wst_WaitingTasks BIGINT,

    wst_SignalWaitTime BIGINT   );

    -- 将我们的第一次测量结果插入临时表

    INSERT INTO #ws_Capture

    SELECT wait_type,

    wait_time_ms,

    waiting_tasks_count,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    -- 等待下一次测量

    -- 在此例中，我们将等待 15 分钟

    WAITFOR DELAY ''00:15:00''

    -- 将第一次测量结果与新测量结果结合并计算差值

    -- 将结果写入 WaitStats 表

    INSERT INTO WaitStats

    SELECT

    GETDATE() AS ''DateTime'',

    DATEPART(DAY,GETDATE()) AS ''Day'',

    DATEPART(MONTH,GETDATE()) AS ''Month'',

    DATEPART(YEAR,GETDATE()) AS ''Year'',

    DATEPART(HOUR, GETDATE()) AS ''Hour'',

    DATEPART(MINUTE, GETDATE()) AS ''Minute'',

    DATENAME(DW, GETDATE()) AS ''DayOfWeek'',

    dm.wait_type AS ''WaitType'',

    dm.wait_time_ms - ws.wst_WaitTime AS ''WaitTime'',

    dm.waiting_tasks_count - ws.wst_WaitingTasks AS ''WaitingTasks'',

    dm.signal_wait_time_ms - ws.wst_SignalWaitTime AS ''SignalWaitTime''

    FROM sys.dm_os_wait_stats dm

    INNER JOIN #ws_Capture ws

    ON dm.wait_type = ws.wst_WaitType;

    -- 清理临时表

    DROP TABLE #ws_Capture;

    清单 4-4

    增量捕获方法

    ```


    ## 使用 SQL Server 代理安排测量


    在选择了捕获方法后，我们运行一个 `T-SQL` 脚本，用等待统计信息填充我们的 `WaitStats` 表。如前面基线陷阱部分所述，以固定间隔执行测量非常重要。这使得比较测量结果更容易，因为您比较的是相同的时间段。实现这一点的一个简单方法是使用设置为固定间隔的
    `SQL Server 代理` 作业。间隔可以根据您的选择来设置——设置的间隔越大，您可以比较的时间段数量就越少。将间隔设置得更短会提供更多的时间段，但同时也意味着存储的数据量会增加。我个人倾向于将间隔设置为
    15 分钟。对于大多数场景来说，这提供了足够的时间段进行比较。


    这里我不详细介绍如何创建 `SQL Server 代理` 作业来捕获等待统计信息，但我想指出我的作业示例作为您可以参考的例子。我通常最终会创建一个只包含一个
    `T-SQL` 脚本步骤的 `SQL Server 代理` 作业。在此步骤中，我根据想要使用的方法复制捕获脚本。图 4-7 显示了我的 `SQL Server
    代理` 作业的截图。


    ![](img/340881_3_En_4_Fig7_HTML.png)


    新建作业步骤页面的右侧显示了步骤名称、类型、数据库和命令。


    图 4-7


    捕获 `WaitStats` 的 `SQL Server 代理` 作业步骤


    在此例中，我使用了重置捕获方法来将等待统计信息捕获到 `WaitStats` 表中。


    图 4-8 显示了用于按固定间隔捕获等待统计信息的计划。


    ![](img/340881_3_En_4_Fig8_HTML.png)


    作业计划属性页面的截图，包含名称“等待统计计划”、计划类型、频率、持续时间和摘要。


    图 4-8


    `SQL Server 代理` 作业计划


    如您所见，我将其设置为每 15 分钟运行一次，每天如此。


    同样，您可以自由选择自己的捕获间隔，但请确保始终以相同的间隔长度进行捕获。


    在我们创建了 `SQL Server 代理` 作业来收集等待统计信息后，我们需要让它运行一段时间。作业运行的时间越长，我们收集到的信息就越多，从而提高了我们基线的质量。'
- fmt: '## Wait Statistics Baseline Analysis


    After the SQL Server Agent job collects wait statistics metrics for a while, we
    are ready to create some baselines. We do this by querying the `WaitStats` table
    created earlier. I will give examples of queries to create a baseline you can
    compare against; these are not the only queries you can run, however, and I encourage
    you to experiment with different queries to return the information you are most
    interested in.


    Before we get started with building the baseline, I want to return to Figure 2-14
    in Chapter 2, “Querying SQL Server Wait Statistics.” In this flowchart, I showed
    you steps you can take to analyze resource waits that occur right now. Since we
    now have access to a baseline, we can add an extra step to the flowchart. Figure
    4-9 shows how to complete the flowchart, including the baseline comparison step.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig9_HTML.png)


    A flow chart has eight steps that start with performance degradation to check
    if wait time goes down. It compares wait time against the baseline.


    Figure 4-9


    Complete wait statistics performance-analysis flowchart


    The baselines are an extra input to the metrics gathered when researching a performance
    problem. Baselines are a valuable input because they show information about the
    period where the performance problem did not exist.


    Let’s go through an example, using DBA Jane again, where we review all the steps
    of the flowchart shown in Figure 4-9. In this example, I will show queries against
    the `WaitStats` table for building a baseline useful for the performance-analysis
    process.


    Tuesday, around 9 a.m., Jane receives a phone call regarding the daily reporting
    against the sales database; users complain reports are slower than normal. The
    problem started around 8 a.m., and users are still experiencing performance problems.
    The reports are part of a scheduled job that runs every workday, starting at 8
    a.m.


    The first thing Jane does is query the `sys.dm_os_waiting_tasks` DMV using the
    following query:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    ORDER BY session_id ASC;

    ```


    Jane focuses on user sessions but does not see any long wait times as shown in
    Figure 4-10.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig10_HTML.png)


    A table has six columns for waiting task address, session i d, exec context i
    d, wait duration m s, wait type, and resource address. It has nine rows.


    Figure 4-10


    `sys.dm_os_waiting_tasks`


    After executing the query against the `sys.dm_os_waiting_tasks` DMV multiple times,
    Jane notices that the wait type `PAGEIOLATCH_SH` is returned every time she queries
    the DMV. Each time, the wait type is returned with a different session ID but
    with relatively low wait times.


    Jane uses the same T-SQL script to capture wait statistics metrics into the `WaitStats`
    table, as we discussed earlier in this chapter. Because Jane has access to historic
    wait statistics information, she creates a baseline of the `PAGEIOLATCH_SH` wait
    times.


    The first step is to view the `PAGEIOLATCH_SH` wait times of today, filtered to
    show measurements captured between 8 and 9 in the morning, using the query shown
    in Listing 4-5.


    ```

    -- PAGEIOLATCH_SH waits, today between 8 and 9 AM

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''Time'',

    ws_WaitTime AS ''Wait Time''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) = CONVERT(VARCHAR(5), GETDATE(), 105);

    Listing 4-5

    Show wait times for PAGEIOLATCH_SH between 8 and 9 a.m. today

    ```


    The query returned the results shown in Figure 4-11.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig11_HTML.jpg)


    A table has two columns for time and wait time and four rows. Row 1 with time
    8 has the lowest wait time.


    Figure 4-11


    `PAGEIOLATCH_SH` wait times of today


    Now that Jane has the wait times for today of the `PAGEIOLATCH_SH` wait type,
    the next step is to create a baseline from the historic measurements of the `PAGEIOLATCH_SH`
    wait type to compare today’s measurements against the baseline. Jane uses the
    query shown in Listing 4-6 to build his baseline.


    ```

    -- Baseline between 8 and 9 on workdays

    -- Not including measurements done today

    SELECT

    CONVERT(VARCHAR(5), ws_DateTime, 108) AS ''Time'',

    AVG(ws_WaitTime) AS ''Baseline''

    FROM WaitStats

    WHERE ws_WaitType = ''PAGEIOLATCH_SH''

    AND ws_DayOfWeek IN (''Monday'', ''Tuesday'', ''Wednesday'', ''Thursday'',''Friday'')

    AND (ws_Hour >= 8 AND ws_Hour < 9)

    AND CONVERT(VARCHAR(5), ws_DateTime, 105) < CONVERT(VARCHAR(5), GETDATE(), 105)

    GROUP BY CONVERT(VARCHAR(5), ws_DateTime, 108);

    Listing 4-6

    PAGEIOLATCH_SH baseline

    ```


    This query builds a baseline with the following characteristics: return the average
    wait time of `PAGEIOLATCH_SH` wait type captured on a workday between 8 a.m. and
    9 a.m., excluding today. We exclude today’s measurements because they were performed
    during the performance problem, which might impact the average. Another suggestion
    would be to filter only data captured in the last x weeks to limit the amount
    of data calculated in the average.


    The results of the query shown in Listing 4-6 can be seen in Figure 4-12.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig12_HTML.jpg)


    A table has two columns for time and baseline and four rows. Row 1 with time 8
    has the lowest baseline.


    Figure 4-12


    `PAGEIOLATCH_SH` baseline


    As you can immediately see when you compare the wait times in Figures 4-11 and
    4-12, the measurements done today are a lot higher than those in the historic
    baseline. To make it a little easier to see the difference, I created a graph
    of both measurements, as shown in Figure 4-13.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig13_HTML.png)


    A graph for wait time has an increasing dotted line for the baseline and a wave
    pattern for the Pageiolatch S H baseline.


    Figure 4-13


    Baseline comparison graph for the `PAGEIOLATCH_SH` wait type


    Because there is such a difference in wait times for the `PAGEIOLATCH_SH` wait
    type between the baseline and today, Jane believes the `PAGEIOLATCH_SH` wait type
    needs further investigation.


    ### Nerd Note


    We will take a detailed look at the `PAGEIOLATCH_SH` wait type in Chapter 9, “Latch-Related
    Wait Types,” but to give you a (very) short explanation, long `PAGEIOLATCH_SH`
    waits can indicate storage problems.


    To investigate further, Jane starts the Performance Monitor to look at metrics
    related to the storage subsystem and in particular the disk latency counters.
    As you can see in Figure 4-14, the latency on the disk where the database data
    file resides peaks to very high values, more than 4,000 milliseconds! For SQL
    Server to perform optimally, the disk latency should be as low as possible, ideally
    less than 10ms.


    ![](images/340881_3_En_4_Chapter/340881_3_En_4_Fig14_HTML.png)


    A screenshot has a graph with fluctuating peaks. It has details of the last, average,
    maximum, minimum, and duration on the bottom.


    Figure 4-14


    Disk read latency'
