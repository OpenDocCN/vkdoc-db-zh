- fmt: '# BACKUPBUFFER Summary


    BACKUPBUFFER waits occur normally during backup or restore operations when the
    backup/restore operation has to wait for free buffers to become available again.
    Because they occur normally, they shouldn’t be a cause for concern. We do have
    some options for lowering `BACKUPBUFFER` wait times which will also impact the
    duration of the backup/restore operation. They should be configured and tested
    thoroughly though, because setting those parameters too high can result in out-of-memory
    errors.


    # BACKUPIO


    Just like the `BACKUPBUFFER` wait type, the `BACKUPIO` wait type occurs when a
    part of the backup or restore operation runs into contention problems. Interestingly
    enough, the description of the `BACKUPIO` wait type is identical to `BACKUPBUFFER`
    in Books Online: “Occurs when a backup task is waiting for data, or is waiting
    for a buffer in which to store data. This type is not typical, except when a task
    is waiting for a tape mount.” The same description, but for two different wait
    events, is not confusing at all. Again, this wait type is common when performing
    a backup or restore operation, even when the backup target, or restore source,
    is not a tape device.


    ## What Is the BACKUPIO Wait Type?


    To better understand how `BACKUPIO` waits are generated, we have to take a look
    at Figure 7-5, which we showed earlier as Figure 7-1.


    ![A diagram for the buffering action has a source, a reader, filled and empty
    buffers, a writer, and a target.](images/340881_3_En_7_Chapter/340881_3_En_7_Fig5_HTML.png)


    Figure 7-5: Internals of a backup operation


    In the previous section where we discussed the `BACKUPBUFFER` wait type, we explained
    the `BACKUPBUFFER` wait type occurs when waiting for a free (empty) buffer to
    become available. For the most part, the `BACKUPBUFFER` wait type is situated
    on the left side of Figure 7-5, at the reader. The `BACKUPIO` wait type occurs
    for the most part on the right side of Figure 7-5, at the writer section. When
    `BACKUPIO` waits occur, there is a delay in the time the writer is writing data.
    This delay can be caused by many different things, for instance, when writing
    a backup to a slow disk, when writing a backup to a network location, or when
    restoring a database.


    The `BACKUPIO` wait type will frequently be accompanied by `ASYNC_IO_COMPLETION`
    waits when a database backup or restore is performed.


    ## BACKUPIO Example


    We will make use of the same example used to demonstrate the `BACKUPBUFFER` wait
    type. I did modify the query to return `BACKUPIO` waits instead of `BACKUPBUFFER`
    waits, and I also included the `ASYNC_IO_COMPLETION` in the results of the query
    against the `sys.dm_os_wait_stats` DMV. Listing 7-4 shows the modified backup
    query.


    ```sql

    -- clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- backup database

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'';

    -- Query BACKUPIO waits

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''BACKUPIO''

    OR wait_type = ''ASYNC_IO_COMPLETION'';

    ```


    Listing 7-4: Generating `BACKUPIO` waits


    The results of the query against the `sys.dm_os_wait_stats` DMV can be seen in
    Figure 7-6.


    ![A table has five columns for wait type, waiting tasks count, wait time m s,
    max wait time m s, and signal wait time m s. It has two rows for async I O completion
    and backup I O.](images/340881_3_En_7_Chapter/340881_3_En_7_Fig6_HTML.png)


    Figure 7-6: `ASYNC_IO_COMPLETION` and `BACKUPIO` waits


    As you can see in Figure 7-6, the database backup caused both wait types to be
    generated, and the most time has been spent on the `ASYNC_IO_COMPLETION` wait,
    which is responsible for reading the data pages that need to be written to the
    backup file. Since my backup destination is on an SSD disk, we didn’t encounter
    very high `BACKUPIO` wait times.


    ## Lowering BACKUPIO Waits


    Tweaking the `BUFFERCOUNT` and `MAXTRANSFERSIZE` options does not have as much
    impact on the `BACKUPIO` wait type as they did on the `BACKUPBUFFER` wait type.
    When you see higher than normal wait times on the `BACKUPIO` wait type, the problem
    is most likely related to the throughput of either your storage subsystem or network
    location you are writing or reading your backup to/from. Make sure to check both
    locations for possible performance problems like high latency or network utilization.


    Another possible option to explore is the use of striping backups across multiple
    files. Striping backup files will likely lower the duration of the backup operations,
    but may not lower the overall amount of `BACKUPIO` wait time.


    ## BACKUPIO Summary


    Just like the `BACKUPBUFFER` wait type, the `BACKUPIO` wait type occurs when a
    backup or restore operation is being performed. While the `BACKUPBUFFER` wait
    type is mostly related to the speed at which the backup operation can access the
    backup buffers, the `BACKUPIO` wait type is related to the speed at which those
    backup buffers can be written to disk. `BACKUPIO` waits frequently occur together
    with `ASYNC_IO_COMPLETION` waits when performing full database backups or restores.
    When seeing higher than normal wait times for the `BACKUPIO` wait type, check
    the performance metric of the location you are writing or reading the backup file
    to or from. Lowering `BACKUPIO` wait times will not have an impact on the query
    performance of your system but will help speed up backup and restore operations.


    # BACKUPTHREAD


    The `BACKUPTHREAD` wait type is frequently seen when performing restore operations
    on a database but also occurs during a backup operation. It occurs when another
    thread is waiting for the backup/restore operation to finish so it can continue
    processing.


    ## What Is the BACKUPTHREAD Wait Type?


    When you see `BACKUPTHREAD` waits occurring, it means another thread wants to
    access a resource currently being accessed by a backup or restore operation. During
    the time the thread has to wait for the backup/restore to complete, `BACKUPTHREAD`
    wait time is recorded. An example of this type of wait would be a thread needing
    to access the database data file while it is being restored, for instance, the
    `ASYNC_IO_COMPLETION` wait type that is writing the data file to disk.


    `BACKUPTHREAD` waits are not usually a cause for concern. They only indicate other
    threads are waiting for the backup/restore operation to complete, and they frequently
    have the same duration as the time it took for your backup or restore to complete.
    They do, however, give you a hint there are other waits occurring which might
    deserve investigation if the wait times are higher than expected.


    Because a picture says more than a thousand words, Figure 7-7 shows the relation
    of the `BACKUPTHREAD` wait type with a restore operation and other waits occurring.


    ![An illustration has three threads, a restore, a backup, and other thread. The
    former has a file linked to it.](images/340881_3_En_7_Chapter/340881_3_En_7_Fig7_HTML.jpg)


    Figure 7-7: `BACKUPTHREAD` relation to other threads


    In Figure 7-7, you see the `BACKUPTHREAD` wait is occurring because another thread
    also wanted to access a resource that was currently owned by the restore operation.'
