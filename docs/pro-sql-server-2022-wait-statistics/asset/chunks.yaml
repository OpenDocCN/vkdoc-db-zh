    ### Lowering RESOURCE_SEMAPHORE Waits


    There are various possible methods you can use to lower, or resolve, the wait
    times of the RESOURCE_SEMAPHORE wait type. The most obvious one would be adding
    more memory, but this might be an expensive solution, while other less expensive
    options exist.


    The first possible solution would be to look at the queries requesting large amounts
    of memory for their execution. You should focus on the queries performing large
    sorts or joins (especially hash joins) and check whether you can lower the number
    of rows needing to be sorted or joined or avoid the sort or join completely. One
    way to avoid a sort operation is to add an index to the table where the sort is
    performed. If the order of values inside the index is the same as the sort operation,
    a sort operation would no longer be necessary, since the index would already have
    ordered the results.


    Another solution involves parallelism. If queries use parallelism during sort
    or join operations, more memory is requested than when the query is executed serially.
    Modifying queries so they don’t use parallelism, by either using query hints or
    changing the parallelism configuration for the whole SQL Server instance, will
    result in lower amounts of memory being required to execute the queries.


    Another possible solution is the use of the MAX_GRANT_PERCENT query hint, limiting
    the amount of memory a query is granted as a percent of the configured maximum
    for the instance.


    Starting with SQL Server 2017+, the Enterprise Edition has a memory grant feedback
    feature which recalculates the memory required for a query and then updates the
    grant value for the cached plan. The next time the query is executed, the revised
    memory grant size is used.


    Finally, if you are running an Enterprise Edition of SQL Server, you could use
    the resource governor feature to configure the memory usage of each resource pool.
    By configuring the amount of memory a certain resource pool can use, you can also
    set the amount of memory a resource semaphore can grant. We won’t go into detail
    about the resource governor feature in this book, but more information can be
    found on the MSDN page of the resource governor here [`https://slrwnds.com/lc8dmc`](https://slrwnds.com/lc8dmc).


    ### RESOURCE_SEMAPHORE Summary


    The RESOURCE_SEMAPHORE wait type is related to the amount of memory a query needs
    to perform certain operations, like sorts and joins. An object, named a resource
    semaphore, is responsible for managing and throttling the memory requests of queries.
    If a query requests more memory than the resource semaphore can grant, the memory
    request will be moved into the resource semaphore queue. While the memory request
    is inside the resource semaphore queue, RESOURCE_SEMAPHORE wait times are recorded.
    There are various methods to lower or resolve RESOURCE_SEMAPHORE waits. You can
    choose to add more memory to the SQL Server instance or optimize the queries,
    so sorts and joins do not require as much memory. Another option is using the
    resource governor, where you define resource pools so as to minimize the impact
    of large memory requests.


    ## RESOURCE_SEMAPHORE_QUERY_COMPILE


    In the previous section, we discussed the RESOURCE_SEMAPHORE wait type, which
    indicates there is not enough free memory available for certain query operations
    like sorts and joins. Just like the RESOURCE_SEMAPHORE wait type, the **RESOURCE_SEMAPHORE_QUERY_COMPILE**
    wait type is also related to the memory of your SQL Server instance. But instead
    of indicating a shortage in query memory, the RESOURCE_SEMAPHORE_QUERY_COMPILE
    wait type indicates a memory shortage during the compilation process of the query.'
  trans: '# RESOURCE_SEMAPHORE


    *   `grantee_count` 和 `waiter_count` 列返回当前已满足或正在资源信号量队列中等待的授权数量。


    从这些信息中，我们看到 `granted_memory_kb` 列返回的信息是正确的，并且我们的测试查询正在请求内存授权。根据执行计划，我们知道测试查询将请求
    13,568 KB。由于 `grantee_count` 列显示有两个内存请求被授予，我们可以将每个查询的内存量乘以内存请求数量（20 × 13,568 KB），结果为
    271,360 KB，这与图 6-22 中的已授予内存量一致。


    我们还可以使用 Perfmon 通过查看 `SQLServer:Memory Manage\Granted Workspace Memory (KB)` 计数器来监控已授予内存的总量，如图
    6-23 所示。


    ![](img/340881_3_En_6_Fig23_HTML.png)


    图 6-23


    已授予工作区内存（KB）Perfmon 计数器


    请注意图 6-23 中的峰值，它发生在执行 `Ostress` 工作负载时，并且与图 6-22 的结果一致，授予的内存量为 271,360 KB。


    ## 降低 RESOURCE_SEMAPHORE 等待


    有多种可能的方法可以用来降低或解决 `RESOURCE_SEMAPHORE` 等待类型的等待时间。最显而易见的方法是增加内存，但这可能是一个昂贵的解决方案，同时还存在其他成本较低的选项。


    第一个可能的解决方案是查看那些请求大量内存来执行的查询。您应该重点关注执行大型排序或连接（特别是哈希连接）的查询，并检查是否可以减少需要排序或连接的行数，或者完全避免排序或连接。避免排序操作的一种方法是在执行排序的表上添加索引。如果索引内的值顺序与排序操作相同，则不再需要排序操作，因为索引已经对结果进行了排序。


    另一个解决方案涉及并行度。如果查询在排序或连接操作期间使用了并行度，则会比串行执行查询时请求更多的内存。通过使用查询提示或更改整个 SQL Server 实例的并行度配置来修改查询使其不使用并行度，将导致执行查询所需的内存量减少。


    另一个可能的解决方案是使用 `MAX_GRANT_PERCENT` 查询提示，该提示将授予查询的内存量限制为实例配置最大值的一个百分比。


    从 SQL Server 2017+ 开始，企业版具有内存授予反馈功能，该功能会重新计算查询所需的内存，然后更新缓存计划的授权值。下次执行查询时，将使用修订后的内存授予大小。


    最后，如果您运行的是企业版的 SQL Server，则可以使用资源调控器功能来配置每个资源池的内存使用情况。通过配置某个资源池可以使用的内存量，您还可以设置资源信号量可以授予的内存量。本书不会详细介绍资源调控器功能，但可以在资源调控器的
    MSDN 页面 [`https://slrwnds.com/lc8dmc`](https://slrwnds.com/lc8dmc) 上找到更多信息。


    ### RESOURCE_SEMAPHORE 总结


    `RESOURCE_SEMAPHORE` 等待类型与查询执行某些操作（如排序和连接）所需的内存量有关。一个名为资源信号量的对象负责管理和限制查询的内存请求。如果查询请求的内存量超过了资源信号量可以授予的量，该内存请求将被移入资源信号量队列。当内存请求位于资源信号量队列中时，会记录
    `RESOURCE_SEMAPHORE` 等待时间。有多种方法可以降低或解决 `RESOURCE_SEMAPHORE` 等待。您可以选择为 SQL Server
    实例增加更多内存，或者优化查询，使排序和连接不需要那么多内存。另一个选项是使用资源调控器，您可以定义资源池以最小化大型内存请求的影响。


    # RESOURCE_SEMAPHORE_QUERY_COMPILE


    在上一节中，我们讨论了 `RESOURCE_SEMAPHORE` 等待类型，它表示某些查询操作（如排序和连接）没有足够的可用内存。与 `RESOURCE_SEMAPHORE`
    等待类型类似，`RESOURCE_SEMAPHORE_QUERY_COMPILE` 等待类型也与 SQL Server 实例的内存有关。但它不是表示查询内存的短缺，而是指示在查询编译过程中的内存短缺。'
- fmt: '### What Is the `RESOURCE_SEMAPHORE_QUERY_COMPILE` Wait Type?


    In the explanation of the `RESOURCE_SEMAPHORE` wait type, we discussed what resource
    semaphores are and what they do. For the explanation of the `RESOURCE_SEMAPHORE_QUERY_COMPILE`
    wait type, we are going to dive a little deeper into the inner workings of the
    resource semaphore.


    You should think of resource semaphores as “gateways” that throttle direct access
    to memory resources, as there are different tasks a resource semaphore can perform.
    In the previous section, we discussed the resource semaphores are responsible
    for granting memory for certain operations, like sorts and joins. We also noted
    that there are two resource semaphores responsible for granting this memory –
    the regular resource semaphore handles queries requesting `5 MB` or more memory,
    and the small resource semaphore handles memory grants for queries requesting
    less than `5 MB` memory.


    The resource semaphores related to the `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait
    type are responsible for memory grants needed during the compilation process of
    a query, *excluding* the memory needed for query execution. Just like the resource
    semaphores in the previous section, the ones responsible for memory grants during
    the compilation process have different gateways. Figure 6-24 shows the different
    gateways for the compilation-memory resource semaphore.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig24_HTML.png)


    A pyramid illustration defines the increase in query compile memory with the number
    of concurrent compilations. It has 4 segments. From the top, big, medium, small,
    and no limit.


    Figure 6-24


    Compilation-memory resource semaphore


    By default there are three gateways: `small`, `medium`, and `big`. Depending on
    the amount of memory the compilation of a query needs, it is assigned to one of
    the three. If the amount of memory needed for compilation is less than the memory
    threshold for the `small` gateway, the query does not pass through a gateway.
    The amount of concurrent compilations, or queries, allowed to move through the
    gateway simultaneously is calculated by the number of `logical processors` available
    for your SQL Server instance. For example, if your SQL Server instance has `4`
    logical processors, the `small` gateway will allow `16` concurrent compilations
    and the `medium` gateway `4`. The `big` gateway will always allow only one query
    at a time to compile.


    The memory threshold for the `small` gateway is static, but for the `medium` and
    `big` gateways, the thresholds are dynamic. This means the compilation memory
    needed to reach the `medium` or `big` gateways will change during the runtime
    of your SQL Server instance.


    The whole purpose of these gateways is to ensure the need for compilation memory
    stays under control. This avoids out-of-memory situations in cases where many
    large compilation-memory requests would automatically be granted and would drain
    the SQL Server instance of its memory.


    Before we continue, let’s review an example of a query compilation.


    Say we have a query that needs `1560 KB` of compilation memory. The query will
    start by requesting a gateway. Our `small` gateway has a threshold of `370 KB`,
    and our `medium` gateway has a threshold of `5346 KB`, so this query will end
    up in the `small` gateway. If there are any queries currently in a queue at the
    `small` gateway, the query will enter the queue and wait until its turn, all the
    time logging `RESOURCE_SEMAPHORE_QUERY_COMPILE` wait time. While the query is
    compiled, the amount of memory used during the compilation is tracked; if the
    query ends up using more memory and reaches the threshold of the `medium` gateway,
    it is moved to the `medium` gateway. When the query compilation is finished, it
    is removed from the gateway.


    We can access information about the resource semaphore gateways from inside SQL
    Server by executing the `DBCC MEMORYSTATUS` command. Somewhere in the enormous
    amount of results, you will find the gateway information as shown in Figure 6-25.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig25_HTML.png)


    A screenshot with 3 tables. It lists the small, medium, and big gateways along
    with the values. The configured units on each gateway are selected.


    Figure 6-25


    Gateway information returned by the `DBCC MEMORYSTATUS` command


    Let’s go through the results that are returned for the gateways.


    The `Configured Units` row returns the maximum amount of concurrent compilations
    allowed for this gateway. This is determined by the number of `logical processors`
    available for your SQL Server instance. Because my test SQL Server has `4` logical
    processors, I have `16` slots for the `small` gateway (`4` × logical number of
    processors) and `4` for the `medium` gateway. The `Available Units` row shows
    the number of currently free slots for this gateway, while the `Acquires` row
    shows the slots currently taken by compilations. The number of queries that have
    to wait for a free slot is shown in the `Waiters` row. The `Threshold` value is
    the amount of memory in bytes that a query compilation would need in order to
    enter the gateway. For my test SQL Server system, the `small` gateway has a threshold
    of `380,000 bytes`, or `371 KB`. As you might notice in Figure 6-25, the `medium`
    gateway has a threshold of `-1`. This is because of the dynamic nature of the
    thresholds of the `medium` and `big` gateways. Since there is no activity at the
    gateway below the `medium` one, there is no need to set a threshold yet.'
