    SQL Server 自动计算，但我们可以自己将这些值配置为备份/还原命令的参数。图 7-1 展示了这些备份缓冲区如何通过一个“读取器”（从你的数据库或备份文件读取数据到缓冲区）和一个“写入器”（将数据从缓冲区写入备份文件或数据库）进行排序和移动。


    ![](img/340881_3_En_7_Fig1_HTML.png)


