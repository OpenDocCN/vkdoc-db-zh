  trans: '### PREEMPTIVE_OS_ENCRYPTMESSAGE 和 PREEMPTIVE_OS_DECRYPTMESSAGE 示例


    为了展示 `PREEMPTIVE_OS_ENCRYPTMESSAGE` 和 `PREEMPTIVE_OS_DECRYPTMESSAGE` 这两种等待类型的示例，我们将配置一个证书，用于加密到
    SQL Server 的连接。为了使这个示例可复现，我包含了创建自签名证书的步骤。通常，在生产环境中，你会使用由证书颁发机构签发的证书，但对于测试目的，自签名证书是可以的。


    本例的第一步是在我的测试虚拟机上安装 Internet 信息服务 (IIS)。IIS 使得生成自签名证书变得非常简单。


    IIS 安装完成后，从管理工具中打开 IIS 管理器。然后点击你的机器名称，并在功能视图中选择“服务器证书”选项，如图 11-3 所示。


    ![](img/340881_3_En_11_Fig3_HTML.png)


    一个 IIS 管理器窗口的截图。它在 IIS 部分下显示了多个图标，其中服务器证书图标被选中。下方是包含 3 个图标的管理部分。

    **图 11-3**

    IIS 管理器内的功能视图


    这会在 IIS 管理器内打开一个新的“服务器证书”视图。在操作窗格中，点击“创建自签名证书”选项。我们需要为证书命名，因此我填写了我的测试虚拟机名称，如图
    11-4 所示。


    ![](img/340881_3_En_11_Fig4_HTML.png)


    一个创建自签名证书窗口的截图。一个标签为“为此证书指定一个友好名称”的文本框中填写了文本“SQL 2022”。一个用于为新证书选择证书存储的下拉框选择了“个人”选项。

    **图 11-4**

    创建自签名证书


