  trans: '

    一张模拟图绘制了锁存器随时间变化的曲线。它绘制了两条波动曲线，分别为**非分区索引**和**分区索引**提供数据。非分区索引的值高于分区索引。


    图 9-13


    非分区索引与分区索引的每秒锁存器等待次数对比


    如你所见，配置哈希分区后，发生的锁存器等待次数急剧下降！我们可以通过运行以下查询来查看行在所创建的不同分区之间的分布情况：


    ```sql

    SELECT *

    FROM sys.partitions

    WHERE object_id = OBJECT_ID(''Insert_Test3'');

    ```


    图 9-14 显示了我的测试 SQL Server 实例上此查询的结果。


    ![](img/340881_3_En_9_Fig14_HTML.png)


    一张表格有 9 列，标题为分区 i d、对象 i d、索引 i d、分区号、主机 i d、行数、文件流文件组 i d、数据压缩和数据压缩描述。它有 10 行记录。


    图 9-14


    跨分区的行分布


    在图 9-14 中，我们看到在 `Insert_Test3` 表上创建的九个分区，由 `partition_number` 列编号为 1 到 9。`rows`
    列显示每个分区内的行数，如你所见，它们非常均匀地分布在九个分区中！`hobt_id` 返回存储此分区行的 B 树的 ID；所有分区具有不同的 ID，意味着它们各自拥有独立的
    B 树结构。


    尽管分区是解决锁存器争用问题的好方法，但它确实有其独特的挑战和缺点。其中一个缺点是分区可能会影响查询执行计划的生成，导致产生次优计划。在生产环境中实施前，你需要进行彻底的测试。


    最后值得一提的一个选项是，如果您的业务负载和设计允许，可以使用内存中 OLTP 作为可能的补救措施。


    ## PAGELATCH_[xx] 总结


    `PAGELATCH_[xx]` 等待类型指示缓冲区锁存器，这些锁存器用于保护内存中的页，并遇到了其他不兼容的缓冲区锁存器。就像锁一样，锁存器在保护页时使用不同的模式，并非所有模式都相互兼容。看到大量的
    `PAGELATCH_[xx]` 等待发生可能表明存在锁存器争用情况。解决锁存器争用可能具有挑战性，通常需要更改数据库设计或查询。


    ## LATCH_[xx]


    另一种与锁存器相关的等待类型是 `LATCH_[xx]` 等待类型。正如前一节讨论的 `PAGELATCH_[xx]` 等待类型一样，`LATCH_[xx]`
    等待与特定的锁存器类别相关。`PAGELATCH_[xx]` 等待类型与保护缓冲区缓存内部数据结构的锁存器有关，而 `LATCH_[xx]` 等待类型则与保护缓冲区缓存外部（但仍位于
    SQL Server 内存中）数据结构的锁存器有关。


    ### 什么是 LATCH_[xx] 等待类型？


    当您看到 `LATCH_[xx]` 等待类型发生时，表明某一特定类别的非缓冲区锁存器正在等待。`LATCH_[xx]` 是不同非缓冲区锁存器类别等待时间的汇总，其本身并非一种锁存器类型。所有导致
    `LATCH_[xx]` 等待类型所显示等待时间的不同非缓冲区锁存器类别都记录在它们自己的 DMV `sys.dm_os_latch_stats` 中。`LATCH_[xx]`
    等待类型所代表的锁存器类别有很多种，在 SQL Server 2022 中总计有 179 种。图 9-15 显示了可能发生 `LATCH_[xx]` 等待的内存区域。


    ![](img/340881_3_En_9_Fig15_HTML.png)


    一张示意图描绘了排他锁存器和共享锁存器如何在 SQL Server 内存中的非缓冲区缓存（以及缓冲区缓存旁边）中等待。


    图 9-15


    LATCH_SH 等待


    由于 `LATCH_[xx]` 等待类型是在特定锁存器类别上发生的等待的累积视图，您需要查看 `sys.dm_os_latch_stats` DMV 内部以找出
    `LATCH_[xx]` 等待的确切原因。我们在本章开头的“锁存器简介”部分描述了 `sys.dm_os_latch_stats` DMV 的内部工作原理和列。

