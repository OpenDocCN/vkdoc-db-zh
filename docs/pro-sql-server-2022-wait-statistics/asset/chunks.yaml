- fmt: 'A few lines of code for the definition of trace. It includes code to create
    a queue, exec, and set the events.


    Figure 12-15


    Trace definition


    After executing the script to create a server-side trace, we received a trace
    ID of `2`. The trace ID is very important because it is the only way to either
    start or stop the server-side trace. After creation, the server-side trace is
    automatically started. If we query the `sys.traces` catalog view, we can see the
    server-side trace that was just created, as shown in Figure [12-16](#340881_3_En_12_Chapter.xhtml#Fig16).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig16_HTML.png)


    A table has eight columns for `i d`, `status`, `path`, `max size`, `stop time`,
    `max files`, `is rowset`, and `is rollover`, and two rows.


    Figure 12-16


    `sys.traces`


    The only way to interact with the server-side trace created is to execute the
    `sp_trace_setstatus` stored procedure and supply the trace ID and a status ID.
    For instance, executing the query that follows will stop the server-side trace
    with a trace ID of `2`:

    ```sql

    EXEC sp_trace_setstatus 2, 0

    ```

    To start it again, we can execute this command:

    ```sql

    EXEC sp_trace_setstatus 2, 1

    ```

    And finally, to close the trace entirely, we can execute the following command:

    ```sql

    EXEC sp_trace_setstatus 2, 3

    ```

    This does not delete the server-side trace though. As a matter of fact, server-side
    traces are only removed by a restart of the SQL Server service.


    Because a server-side trace can only output to a trace file, you must navigate
    to the file you supplied in the server-side trace definition and open the file
    in SQL Server Profiler. Thus, you can capture the same information as by using
    the SQL Server Profiler application but at a much lower performance price.


    ## TRACEWRITE Summary


    The `TRACEWRITE` wait type indicates a SQL Server Profiler trace is currently
    being performed against the SQL Server instance. SQL Server Profiler traces can
    have a pretty big impact on the performance of your SQL Server instance, and for
    this reason, it is important to monitor the number of traces running against your
    SQL Server instance. Thankfully, there are some alternatives to SQL Server Profiler
    traces. You can either choose to convert your SQL Server Profiler trace to an
    Extended Events session or execute the SQL Server Profiler trace using server-side
    tracing.


    ## WAITFOR


    The final wait type in this chapter is one of the few wait types directly related
    to a T-SQL command. The `WAITFOR` wait type doesn’t indicate performance problems,
    though it definitely has an impact on the duration of the query executing the
    related `WAITFOR` T-SQL command.


    ### What Is the WAITFOR Wait Type?


    The `WAITFOR` wait type is recorded whenever a query is executed using the `WAITFOR`
    command. The `WAITFOR` T-SQL command will stop the execution of the query until
    a specific amount of time has passed or a specific point in time has been reached.
    When this happens, the query execution will continue. The `WAITFOR` command is
    frequently used inside queries or scripts to force a pause inside the query execution.
    For instance, in Chapter [4](#340881_3_En_4_Chapter.xhtml), “Building a Solid
    Baseline,” we used the `WAITFOR` command to wait a specific amount of time to
    compare two measurements taken 15 minutes apart.


    While pausing the query execution using the `WAITFOR` command, the transaction
    holding the `WAITFOR` command will remain open until the entire transaction has
    completed. This means threads held by the transaction cannot be used for other
    processes. SQL Server also reserves a dedicated thread just for the `WAITFOR`
    command; if too many threads are associated with `WAITFOR` commands and thread
    starvation occurs, SQL Server will select random `WAITFOR` threads and terminate
    them to free up more threads.


    In many cases, the `WAITFOR` command is explicitly used by the person who wrote
    the query or script and in this sense only impacts the specific query or script;
    thus, there is no reason to be alarmed when seeing high `WAITFOR` wait times occur.
    It just indicates that queries are using the `WAITFOR` command.


    ### WAITFOR Example


    To show a quick example of the `WAITFOR` wait type, execute the query in Listing
    [12-4](#340881_3_En_12_Chapter.xhtml#PC11). The query will reset the `sys.dm_os_wait_stats`
    DMV, execute a `WAITFOR DELAY` statement which causes the script execution to
    wait for 30 seconds, and then query the `sys.dm_os_wait_stats` DMV for `WAITFOR`
    waits.

    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    WAITFOR DELAY ''00:00:30'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAITFOR'';

    ```

    Listing 12-4

    `WAITFOR` waits


    When the query in Listing [12-4](#340881_3_En_12_Chapter.xhtml#PC11) finishes,
    you should see one `WAITFOR` wait occurred, having a total wait time of roughly
    30 seconds, as you see in Figure [12-17](#340881_3_En_12_Chapter.xhtml#Fig17).


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig17_HTML.png)


    A row has five columns for `wait type` as `wait for`, `waiting tasks count` as
    1, `wait time m s` and `max wait time m s` as 30000, and `signal wait time m s`
    as 0.


    Figure 12-17


    `WAITFOR` wait


    ### WAITFOR Summary


    The `WAITFOR` wait type is one of the few background wait types directly related
    to the execution of a T-SQL command, in this case `WAITFOR`. The `WAITFOR` wait
    type doesn’t indicate any performance problems with your SQL Server instance;
    it just indicates the `WAITFOR` command is being used by a query or script. The
    `WAITFOR` T-SQL command will only impact the execution time of the query or script
    that uses it; therefore, the only way to lower `WAITFOR` wait times is by removing
    the `WAITFOR` command inside queries.


    # 13. In-Memory OLTP–Related Wait Types


    With the release of SQL Server 2014, Microsoft introduced a brand new SQL Server
    feature called In-Memory OLTP (codename Hekaton). In-Memory OLTP is a memory-optimized
    database engine directly integrated into the SQL Server engine. In-Memory OLTP
    is designed to improve performance – up to 20 times, according to Microsoft –
    by loading tables entirely into the memory of your SQL Server instance. These
    memory-optimized tables are fully durable and use lock-and-latch free structures
    to optimize concurrency control.


    With the introduction of In-Memory OLTP, various new wait types have been added
    to SQL Server. Most of these are recognizable by the `_XTP_` (or eXtreme Transaction
    Processing) section in the wait type name. In this chapter, we will review these
    In-Memory OLTP–related wait types.


    Before we dive into the wait types though, let’s first take a (simplified and
    short) look at what In-Memory OLTP is and how it works. I will focus on memory-optimized
    tables in this chapter. In-Memory OLTP also introduced other features, like natively
    compiled stored procedures and hash indexes, but these are beyond the scope of
    this chapter.'
