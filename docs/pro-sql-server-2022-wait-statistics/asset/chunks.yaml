  trans: '

    ### 通过调整并行配置选项来降低 CXPACKET 等待时间


    有多种方法可用于降低 CXPACKET 等待时间，但你必须首先确定 CXPACKET 等待是否是导致问题的原因。正如我之前所说，只要为 SQL Server
    实例启用了并行，CXPACKET 等待就是正常的。互联网论坛上找到的一个解决方案是通过将 `最大并行度` 选项设置为 1 来禁用并行。在大多数情况下，这不是一个好主意。禁用并行会使
    CXPACKET 等待消失，但某些查询的性能可能会变差，因为它们无法再并行运行。


    降低 CXPACKET 等待的一个更好方法是调整 `并行开销阈值` 和 `最大并行度` 选项，使其与你的工作负载相匹配。这样，只有那些从并行中受益最大的查询才会并行运行。找到并行最佳平衡点的一个方法是比较查询在串行运行与并行运行时的执行时间。你通常应该关注那些访问大量信息且通常运行时间较长的查询，因为这些查询将从并行中受益最大。


    考虑以下示例，我们有一个针对 GalacticWorks 数据库的查询，请求 `Sales.SalesOrderDetail` 表中的信息：


    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC;

    ```


    要确定此查询是否适合并行执行，我们将检查查询的估计开销。要查看此信息，我们需要查看如果查询串行执行时的估计执行计划。为确保查询串行运行，我们添加查询选项 `MAXDOP
    1`：


    ```sql

    SELECT *

    FROM Sales.SalesOrderDetail

    ORDER BY CarrierTrackingNumber DESC

    OPTION (MAXDOP 1);

    ```


    我们选择“显示估计的执行计划”（或按 `CTRL+L`），然后在执行计划窗口中将鼠标悬停在 `SELECT` 图标上：


    ![](img/340881_3_En_5_Fig4_HTML.jpg)


    一张带有 `MAXDOP 1` 选项的 `Sales.SalesOrderDetail` 查询执行计划的截图。光标指向计划中的 `SELECT` 选项，打开一个属性菜单。


    图 5-4：使用 `MAXDOP 1` 的查询估计开销


    在本例中，估计开销为 10.4907。因为此实例的 `并行开销阈值` 仍为默认值 5，我确信如果移除 `MAXDOP` 查询提示，该查询将并行运行。


    图 5-5 显示了在不使用 `MAXDOP 1` 选项执行查询后的实际执行计划。


    ![](img/340881_3_En_5_Fig5_HTML.png)


    一张 `Sales.SalesOrderDetail` 查询的执行计划截图。带有开销百分比的事件包括：聚集索引扫描，14%；排序，66%；并行，19%；计算标量，0%；选择，0%。


    图 5-5：不带 `MAXDOP 1` 选项的实际执行计划


    如你所见，查询按预期使用了并行执行，因为其估计开销高于为 `并行开销阈值` 选项配置的值。如果我们查看实际执行计划中 `SELECT` 操作的属性，我们会发现更多信息，如图
    5-6 所示。


    ![](img/340881_3_En_5_Fig6_HTML.jpg)


    一张执行计划的截图。光标指向 `SELECT` 操作，打开一个属性菜单。菜单中有缓存计划大小和其他估计值。


    图 5-6：`SELECT` 操作属性


    `SELECT` 操作的属性显示该查询使用了两个线程执行，并且估计开销降低到了 7.08005。


    如果我们把 `并行开销阈值` 的值改为比默认值 5 更高的数字，那么像本例中的查询可能不会使用并行，但那些报告开销更大的查询将会使用并行。请记住，此选项适用于整个实例，会影响每个数据库中的查询。


    尽管估计开销降低了，但对于此示例查询，执行时间的改进很小（大约 300 毫秒）。当你使用 `并行开销阈值` 选项调整并行设置时，需要考虑执行时间（使用 `SET
    STATISTICS TIME`），并判断更改此设置是否有益。


    #### 极客提示


    默认值为 5 的 `并行开销阈值` 对于现代数据库工作负载来说已经过时。你需要测试以确定适合你特定系统的值，但对于大多数全新安装，我建议将此值设置为更高的数字，例如
    50，然后根据需要进行调整。


    另一个需要记住的设置是 `最大并行度` 选项。当保持默认值 0 时，查询并行运行时可以使用所有可用的调度器。但使用更多调度器并不一定意味着查询执行得更快。使用超过
    8 个调度器后，其收益会递减。微软推荐以下配置（来自 [`slrwnds.com/xtvmvp`](https://slrwnds.com/xtvmvp)）：


    *   对于核心数 > 8 的服务器，将 `最大并行度` 选项设置为 8。

    *   对于核心数 < 8 的服务器，将 `MAXDOP` 设置为等于或小于逻辑处理器的数量。


    这是一个通用建议，实际效果可能因情况而异。知识库文章还讨论了 NUMA（非统一内存访问）节点的使用、SQL Server 如何配置软 NUMA 节点以及推荐的设置。


    #### 极客提示


    在理想情况下，你应该将 SQL Server 实例配置为在单个 NUMA 节点内运行。这不仅包括分配给每个节点的逻辑处理器数量，还包括内存量。


    `并行开销阈值` 和 `最大并行度` 这两个选项的设置取决于你系统的工作负载，需要仔细测试以找出哪些设置有效，哪些无效。不过，它们会影响你的 CXPACKET
    等待时间，因此在更改 `并行开销阈值` 或 `最大并行度` 选项后，请将 CXPACKET 等待时间与基线进行比较，以衡量更改的影响。

    '
- fmt: '### Lowering CXPACKET Wait Time by Resolving Skewed Workloads


    A skewed workload is a workload where the parallel worker threads do not receive
    the same amount of work to perform. This is not an optimal situation, as the `Thread
    0` will wait for the longest-running worker thread to complete, logging `CXPACKET`
    waits while waiting. Figure 5-7 shows an abstract example of a skewed workload.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig7_HTML.png)


    A line graph has threads versus time. 5 horizontal right arrows of unequal lengths
    are labeled Threads 0 to 4 from top to bottom. Thread 0 is a shaded dashed arrow.


    **Figure 5-7** Skewed parallel query threading


    If we assign some of `Thread 2`’s work to `Thread 3`, the query would perform
    faster and result in lower `CXPACKET` wait times.


    We view the thread distribution in the actual number of rows property of the parallel
    operation inside the actual execution plan. Figure 5-8 shows the properties of
    a clustered index scan that has been performed using parallelism. The operation
    occurred in the example query we used in the previous section against the `Sales.SalesOrderDetail`
    table.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig8_HTML.jpg)


    A screenshot of properties window for a clustered index scan. The option for the
    actual number of rows is highlighted.


    **Figure 5-8** Parallel thread distribution


    In this example, we see the clustered index scan returned 121317 rows that were
    distributed among two threads (notice that `Thread 0`, the coordination thread,
    doesn’t process any rows). The distribution of the number of rows is relatively
    even in this case, so we probably aren’t running into a skewed workload problem.


    Skewed workloads are often caused by outdated statistics. If the Query Optimizer
    believes there are fewer (or more rows) in the table than the true amount, it
    might distribute the work unevenly across the threads. Make sure to regularly
    perform maintenance on your statistics to prevent skewed workloads.


    ### Introduction of the CXCONSUMER Wait Type


    As described earlier, parallelism consists of two parts: producers and consumers.
    The easiest way to understand this is to consider the `Thread 0` as a producer.
    It is the job of `Thread 0` to distribute work to all available parallel worker
    threads. Those worker threads are consumers and perform the actual work the producers
    send to them.


    With the release of `SQL Server 2017 CU3` (and later `SQL Server 2016 SP2`), Microsoft
    changed how parallelism waits are recorded. The main goal was to make the `CXPACKET`
    parallelism wait more actionable.


    Before `SQL Server 2017 CU3` and `SQL Server 2016 SP2`, there was no way to distinguish
    if consumers were spending time waiting on producers to send work to them. Everything
    was recorded as `CXPACKET` wait time internally. The SQL Server development team
    split up the wait times for parallelism into two different categories: `CXPACKET`
    and `CXCONSUMER`. With this change, the meaning of those two wait types also changed
    compared to earlier SQL Server releases.


    `CXCONSUMER` waits will occur whenever a consumer thread is waiting for a producer
    thread to send rows. This is expected behavior and in many cases safely ignored
    when analyzing wait statistics information.


    `CXPACKET` waits are now recorded without the `CXCONSUMER` wait time, meaning
    `CXPACKET` wait times not only indicate parallelism occurring but also indicate
    an issue regarding parallelism operations (for instance, threads are running into
    issues with required buffer or thread synchronization). Effectively, this means
    if you are running `SQL Server 2017 CU3` or `SQL Server SP2` or higher, the `CXPACKET`
    wait indicates parallelism issues better than lower SQL Server versions, thus
    making the `CXPACKET` wait type more actionable as the development team intended.
    The advice in dealing with high parallelism wait times described earlier in this
    chapter is still valid, though it now has a more direct impact on `CXPACKET` wait
    times.


    ### CXPACKET Summary


    The `CXPACKET` wait type is directly related to the usage of parallelism during
    query execution. If queries are executed with parallelism, you will always see
    `CXPACKET` waits. Normally this is nothing to worry about, so avoid the knee-jerk
    reaction to turn off parallelism completely. Instead, focus on tuning the `Max
    Degree of Parallelism` and `Cost Threshold for Parallelism` options so that the
    thresholds are high enough that your large queries can benefit from using parallelism
    but your small queries do not experience a negative impact. Also, avoid skewed
    workloads by making sure your statistics are up-to-date.


    If you are running `SQL Server 2017 CU3` or `SQL Server 2016 SP2` (or higher),
    the `CXPACKET` wait time meaning has changed a bit resulting in that `CXPACKET`
    waits are far more likely to indicate a parallelism issue occurring than in SQL
    Server versions that are lower than those mentioned.


    ## SOS_SCHEDULER_YIELD


    Just like `CXPACKET`, the `SOS_SCHEDULER_YIELD` is a wait type that will frequently
    show up in the top 10 of total wait time on your system. And just like the `CXPACKET`
    wait types, `SOS_SCHEDULER_YIELD` wait times do not necessarily indicate there
    is a problem with your SQL Server instance. `SOS_SCHEDULER_YIELD` waits occur
    as soon as queries execute on your SQL Server instance and are closely related
    to SQL Server scheduling.'
