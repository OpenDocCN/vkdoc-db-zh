  trans: '# 通过执行计划按查询分析等待统计信息


    到目前为止，我们已经查看了由各种后台进程或我们自己执行的查询所产生的聚合等待时间。由于我是唯一在测试机器上执行查询的人，因此很容易将等待时间与特定查询关联起来。不幸的是，在繁忙的系统中，许多会话并发地不断执行各种查询，各类等待统计信息
    DMV 很难用于分析特定查询的等待类型和等待时间。


    值得庆幸的是，SQL Server 2016 SP1 的发布引入了在查询执行计划内部捕获的等待统计信息。这使得任何人都能看到查询在运行时遇到的等待类型和等待时间。尽管这看起来显而易见，但这也意味着，只有在查看**实际执行计划**而非**估计执行计划**时，才能获得按查询统计的等待信息。


    ## 技术说明


    实际执行计划是查询执行期间实际使用的执行计划。SSMS 中有一个选项可以查看估计执行计划。使用该选项时，SQL Server 引擎会编译在查询执行期间*最可能被使用*的执行计划；但是，它并不实际执行查询本身。由于没有查询执行，因此在编译估计执行计划时也没有等待统计信息可供记录。


    公开按查询统计的等待信息最简单的方法是启用 `包含实际执行计划` 选项（如图 2-27 所示），可通过点击 “查询 – 包含实际执行计划” 菜单项或使用快捷键组合
    `CTRL_M` 来实现，然后再执行您的查询。


    ![](img/340881_3_En_2_Fig27_HTML.png)


    执行菜单栏的截图。光标指向已高亮显示的“包含实际执行计划”图标。


    图 2-27

    包含实际执行计划选项


    当您启用了 `包含实际执行计划` 选项来执行查询时，查询结果会返回一个名为 `执行计划` 的额外选项卡。点击该选项卡将显示执行查询时所用执行计划的可视化表示。图
    2-28 展示了一个实际执行计划的示例。


    ![](img/340881_3_En_2_Fig28_HTML.png)


    “执行计划”选项卡的截图。所选查询的执行路径如下：从右到左，聚簇索引扫描成本占 100% 指向 SELECT 操作成本占 0%。


    图 2-28

    执行计划


    打开 `执行计划` 选项卡后，我们可以通过右键单击第一个运算符（在图 2-29 的例子中是 `SELECT` 运算符）并选择 `属性` 来访问按查询统计的等待信息。这将在
    SSMS 中打开执行计划属性窗口，并揭示大量信息，例如查询执行时使用的并行度或处理的行数，以及我们所选运算符的各种属性。


    ![](img/340881_3_En_2_Fig29_HTML.png)


    属性对话框的截图。在“杂项”部分中，“缓存的计划大小”被选中。


    图 2-29

    执行计划属性


    `WaitStats` 属性位于属性窗口的底部。展开 `WaitStats` 属性后，您将找到此特定查询在执行过程中经历的所有等待类型和等待时间。图 2-30
    显示了此特定示例查询的按查询统计的等待信息。


    ![](img/340881_3_En_2_Fig30_HTML.jpg)


    等待统计信息窗口的截图。它有 2 列，列出了 3 种等待类型的等待计数和等待时间。


    图 2-30

    执行计划属性中的按查询统计等待信息


    在本例中，我们的查询在执行时遇到了三种不同的等待类型：`PAGEIOLATCH_SH`、`MEMORY_ALLOCATION_EXT` 和 `ASYNC_NETWORK_IO`。对于每种等待类型，我们都能看到花费了多少等待时间以及等待该类型的次数。此信息在查看单个查询在执行期间遇到的等待统计信息时非常有用，并且或许能为调整查询性能提供思路。例如，如果您看到查询经常遇到与存储相关的等待统计信息，那么研究如何最小化该特定查询的存储访问以使其执行更快可能是值得的。


    我想再次指出的一点是，按查询统计的等待信息只记录在实际执行计划中。我再次提及的原因是，实际执行计划只能通过**在查询执行前启用该选项**来获得。没有其他方法可以访问实际执行计划，即使通过查询存储也不行，我们将在下一章看到。事实上，存储在
    SQL Server 计划缓存中的执行计划是估计执行计划，而不是实际计划。这意味着，如果您期望通过计划缓存检索按查询统计的等待信息，您将会失望。


    值得庆幸的是，尽管查询存储功能不记录实际执行计划，但它（随着 SQL Server 2017 的发布）确实会记录等待统计信息和其他查询运行时信息，并与估计执行计划一同存储。将这些信息混合在一起意味着，通过查询存储，我们可以回溯历史，查看查询遇到了哪些等待统计信息！


    ## 本章小结


    在本章中，我们回顾了访问等待统计信息的多种方法。我们深入探讨了关于等待统计信息的一些最重要的 DMV —— `sys.dm_os_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_exec_requests`
    和 `sys.dm_exec_session_wait_stats` —— 描述了它们的功能和返回的数据，并为您提供了一些可用于查询这些 DMV 的示例。我们还经历了一个示例场景，其中我们组合使用了部分
    DMV 来分析示例中是什么拖慢了 SQL Server。示例中展示的步骤是在性能问题发生时分析系统问题的绝佳方法。简要地，我们查看了性能监视器（Perfmon），以及如何从其内部获取等待统计信息。之后，我们仔细研究了扩展事件，以及如何使用扩展事件
    GUI 或 T-SQL 来捕获特定查询或会话的等待相关信息。最后，我们探讨了执行计划中记录的等待统计信息。


    # 3. 查询存储


    随着 SQL Server 2016 的发布，微软引入了一种分析和排查查询性能的新方法：查询存储。查询存储通常被称为 SQL Server 的“飞行记录仪”，因为它提供了查询何时执行、执行性能如何以及执行期间使用的执行计划等方面的洞察。虽然查询存储最初并未公开等待统计信息，但
    SQL Server 2017 的发布包含了这一备受期待的补充功能。


    由于查询存储在查询性能分析和调优方面极具价值，我认为为了最大化此功能的效益，值得对其给予一些额外的关注。'
- fmt: '## What Is the Query Store?


    The Query Store feature was first released in SQL Server 2016 and had a goal of
    exposing and persisting query performance information in an accessible way. Before
    the Query Store, query performance analysis was a challenging and time-consuming
    process that required thorough knowledge of how SQL Server processes queries and
    how to analyze information through the various DMVs. While experience and knowledge
    of query execution is still helpful, the Query Store helps you retain the necessary
    performance information without having to roll your own solution.


    The Query Store is integrated directly inside the SQL Server engine, capturing
    and analyzing query executions as they happen. This is a major difference compared
    to query analysis through other methods, like execution plan cache mining, where
    query runtime information is only available at a later stage. Another advantage
    of the Query Store is it persists query runtime information to disk. This allows
    for a history of runtime metrics for your queries as well as comparison between
    historic and current runtime statistics. This is a difference compared to the
    DMVs, which only record information while SQL Server is running and flushes all
    recorded information at a restart of SQL Server, meaning you start back with all
    the counters at 0 again. To continue the comparison of the Query Store vs. DMVs,
    while all the DMVs record information on the entire SQL Server Instance level,
    the Query Store allows you to capture query runtime metrics on a per-database
    basis. This makes analyzing performance for a specific database inside an Instance
    with multiple databases considerably easier and quicker.


    ## Enabling the Query Store


    The Query Store is enabled by default (in `READ_WRITE` mode) for new databases
    inside SQL Server 2022 (and is also enabled by default for new Azure SQL Databases).
    For prior versions of SQL Server, users must manually enable the Query Store to
    begin collecting information on query executions. Enabling the Query Store can
    be done in two ways, through the use of SQL Server Management Studio (`SSMS`)
    and with T-SQL statements.


    ### Enable the Query Store Using SSMS


    As the Query Store is configured on a per-database level, to enable the Query
    Store, you will navigate to a database inside of `SSMS` and right-click to select
    `Properties` as shown in Figure [3-1](#340881_3_En_3_Chapter.xhtml#Fig1):


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig1_HTML.jpg)


    A screenshot of a menu under the galactic works, where the properties option is
    selected.


    Figure 3-1


    Selecting database properties inside `SSMS`


    Once selected, the Database Properties screen opens, and from there you will select
    the `Query Store` tab (shown as number 1 in Figure [3-2](#340881_3_En_3_Chapter.xhtml#Fig2))
    on the left. When the tab opens, you will select the `Operation Mode (Requested)`
    option and select `Read Write` shown as number 2 in Figure [3-2](#340881_3_En_3_Chapter.xhtml#Fig2):


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig2_HTML.png)


    A database properties galactic works window. It lists a menu, where the query
    stage is highlighted, and the operation mode under general is changed to off.
    It has 2 circles of data usage.


    Figure 3-2


    Setting the Query Store to `Read Write`


    Select `OK` and the Query Store will begin to collect information for query executions
    inside the database. For SQL Server 2022, the default maximum size for collecting
    this data is 1024 MB. If you hit the limit, Query Store will change to `Read Only`
    and stop collecting new data. You will want to monitor the space used inside Query
    Store on a regular basis.


    ### Enable the Query Store Using T-SQL


    Enabling the Query Store using T-SQL can be done with the following code as shown
    in Listing [3-1](#340881_3_En_3_Chapter.xhtml#PC1):


    ```

    ALTER DATABASE GalacticWorks

    SET QUERY_STORE = ON (OPERATION_MODE = READ_WRITE);

    Listing 3-1

    Enabling the Query Store using T-SQL

    ```


    Execute the statement and the Query Store will begin to collect information for
    query executions inside the database.


    The Query Store offers many advantages as well as configuration options. Since
    this is a book about wait statistics, I will not cover everything that the Query
    Store has to offer. For more in-depth details of the Query Store, you can review
    them here: [https://slrwnds.com/bdsxgt](https://slrwnds.com/bdsxgt).


    ## Query Store Architecture


    To give an idea on how the Query Store works, the image in Figure [3-3](#340881_3_En_3_Chapter.xhtml#Fig3)
    shows query runtime information recorded and stored inside the Query Store. This
    knowledge is important if you want to add the Query Store as a tool to analyze
    query performance and wait statistics.


    ![](images/340881_3_En_3_Chapter/340881_3_En_3_Fig3_HTML.png)


    A process flow defines how the query splits into plan, text, and runtime and reaches
    the disk through the in-memory and async writer, along with their readings.


    Figure 3-3


    Query Store architecture


    As soon as a query starts execution, the Query Store splits the query runtime
    information into three parts: the query execution plan, the query text, and the
    runtime statistics of the query execution. Both the execution plan and the query
    text are immediately recorded in the Query Store during the compilation of the
    execution plan. The runtime statistics (including wait statistics information)
    are added to the Query Store after query execution is complete.


    All Query Store metrics are first stored inside a reserved memory area of SQL
    Server. This means the metrics are directly available through queries or the built-in
    reports but not hardened to disk yet (one exception is new execution plans; these
    are hardened directly). Based on a configurable setting inside the Query Store
    called the `Data flush interval`, you configure how fast the Query Store will
    harden the information to disk.


    We access all information in the Query Store through two methods: Query Store
    DMVs and the built-in Query Store reports. To expose the wait statistics inside
    the Query Store, we will use both options, though the DMV approach is more useful
    when looking at wait statistics data.'
