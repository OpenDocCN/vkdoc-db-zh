    \ `IO_COMPLETION` 等待。\n\n### IO_COMPLETION 示例\n\n让我们通过还原事务日志备份来生成一些 `IO_COMPLETION`\
    \ 等待。在此示例中，我们将再次使用 GalacticWorks 数据库。清单 6-7 中的查询将执行 GalacticWorks 数据库的完整备份，进行一些更改，然后执行事务日志备份。完成后，我们将再次还原完整备份，清除\
    \ `sys.dm_os_wait_stats` DMV，还原事务日志备份，并检查 `IO_COMPLETION` 等待。\n\n```sql\n-- 确保\
    \ GalacticWorks 处于完整恢复模式\nALTER DATABASE GalacticWorks SET RECOVERY FULL;\n--\
    \ 首先执行完整备份\n-- 否则完整恢复模式不会生效\nBACKUP DATABASE [GalacticWorks]\nTO DISK = N'C:\\\
    TeamData\\GalacticWorks.bak';\n-- 对 AW 数据库进行一些更改\nUSE GalacticWorks;\nUPDATE Person.Address\n\
    SET City = 'Portland'\nWHERE City = 'Bothell'\n-- 备份事务日志\nBACKUP LOG [GalacticWorks]\n\
    TO DISK = N'C:\\TeamData\\GalacticWorks_Log.trn'\n-- 使用 NORECOVERY 还原之前的完整备份\n\
    USE [master];\nRESTORE DATABASE [GalacticWorks]\nFROM DISK = N'C:\\TeamData\\\
    GalacticWorks.bak'\nWITH NORECOVERY, REPLACE;\n-- 清除 sys.dm_os_wait_stats\ndbcc\
    \ sqlperf ('sys.dm_os_wait_stats', CLEAR);\n-- 还原最后一个事务日志备份\nRESTORE LOG [GalacticWorks]\n\
    FROM DISK = N'C:\\TeamData\\GalacticWorks_Log.trn';\n-- 检查 IO_COMPLETION 等待\n\
    SELECT *\nFROM sys.dm_os_wait_stats\nWHERE wait_type = 'IO_COMPLETION'\n```\n\
    **清单 6-7** 生成 IO_Completion 等待\n\n在我的测试系统上，针对 `sys.dm_os_wait_stats` DMV 的此查询结果如图\
    \ 6-15 所示。\n\n![](img/340881_3_En_6_Fig15_HTML.png)\n\n一个包含 5 列 1 行的表格。它列出了等待类型为\
    \ I O completion，等待任务数为 535，等待时间毫秒为 13，最大等待时间毫秒为 0，信号等待时间毫秒为 1。\n\n**图 6-15**\
    \ IO_COMPLETION 等待\n\n我们使用清单 6-7 中的查询只修改了少量记录，因此由于事务日志备份还原进行得很快，总等待时间很低。\n\n在\
    \ SQL Server 服务重启后启动数据库时，也会发生 `IO_COMPLETION` 等待时间。这意味着在重启或故障转移后，您应该预期会有 `IO_COMPLETION`\
    \ 等待；这些都是完全正常的。同样，当启用 `AUTO_CLOSE` 并且数据库正在启动时，您也应该会经历 `IO_COMPLETION` 等待。\n\n\
    ### 降低 IO_COMPLETION 等待\n\n大多数情况下，`IO_COMPLETION` 等待不应该引起关注。当它们远高于您基线中的等待时间时，您应该像我在“降低\
    \ `ASYNC_IO_COMPLETION`”部分描述的那样分析存储子系统性能。虽然某些查询操作也可能导致 `IO_COMPLETION` 等待，但它们通常不是等待时间高于正常水平的原因。\n\
    \n### IO_COMPLETION 总结\n\n就像 `ASYNC_IO_COMPLETION` 等待类型一样，`IO_COMPLETION` 等待发生在访问存储子系统时。当\
    \ SQL Server 等待非数据页操作（如事务日志还原操作或读取位图页（如 GAM 页））完成时，会发生 `IO_COMPLETION` 等待。看到 `IO_COMPLETION`\
    \ 类型的等待发生是完全正常的，除非等待时间远高于您基线中的值，否则这些通常不需要更深入的分析。在那些情况下，首先关注您的存储子系统的性能（尤其是延迟）。\n\
    \n## LOGBUFFER 和 WRITELOG\n\n我将 `LOGBUFFER` 和 `WRITELOG` 合并在本节中。这是因为这两种等待类型彼此之间、与事务日志以及与存储子系统都有密切关系。\n"
- fmt: '### What Are the LOGBUFFER and WRITELOG Wait Types?


    To understand what the `LOGBUFFER` and `WRITELOG` wait types represent, we need
    to have some understanding of how SQL Server writes to the transaction log. In
    short, the following events happen whenever we change or add data inside a database:


    1.  Data page is modified in the buffer cache; if the page wasn’t already in the
    buffer cache, it is read into the buffer cache first.

    2.  The data page is marked as “dirty” inside the buffer cache.

    3.  The log records which represent the modification are saved to the log buffer.

    4.  A log flush (we will discuss in more detail later) occurs, writing the log
    records from the log buffer to the transaction log.

    5.  The dirty data page is written to the data file.


    To show this behavior, I have included Figure [6-16](#340881_3_En_6_Chapter.xhtml#Fig16).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig16_HTML.png)


    An illustration of how the buffer cache transacts via the dirty page to the data
    file and the log buffer to the transaction log.


    **Figure 6-16**

    How a transaction moves


    The action representing the movement of a dirty data page and the action of writing
    the log records to the transaction log are shown as dashed lines. I did this on
    purpose to illustrate how these actions do not necessarily happen directly.


    Dirty data pages are updated inside the buffer cache first and are written to
    the data file when a checkpoint operation occurs. Therefore, a dirty page can
    stay inside memory (i.e., buffer cache) even after the transaction is committed.


    This is not true for the log records inside the log buffer. As soon as the transaction
    commits, and the transaction has an active log record in the log buffer, all the
    log records inside the log buffer are written (or `flushed`) to the transaction
    log on disk. But a log flush is also triggered in a different way. The log buffer
    has a fixed size of 60 KB, and as soon as the log buffer is full, it will flush
    all the records inside to the transaction log.


    Since this section is about `WRITELOG` and `LOGBUFFER`, now is a good time to
    bring them into this story. The `WRITELOG` wait type occurs when SQL Server is
    flushing the contents of the log buffer to the transaction log on disk. The `LOGBUFFER`
    wait type occurs when SQL Server has to wait for free space inside the log buffer
    to insert the log record. I have added both the wait types at the parts where
    they can get generated in Figure [6-17](#340881_3_En_6_Chapter.xhtml#Fig17).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig17_HTML.png)


    A illustration of how the buffer cache transacts via the dirty page to the data
    file, and the log buffer to the transaction log via the write log.


    **Figure 6-17**

    Transaction movement and the LOGBUFFER and WRITELOG wait types


    This is why I said these wait types are related. Whenever `WRITELOG` waits occur,
    chances are you will also find `LOGBUFFER` waits if the process flushing the log
    records to the transaction log cannot process them as fast as new log records
    are entering the log buffer.


    This situation frequently occurs on systems with a high volume of concurrent data
    modifications, resulting in transactions which are written to disk. Another common
    cause is the performance of the storage subsystem where the transaction log file
    resides. If the storage subsystem has suboptimal performance, your `WRITELOG`
    wait times will increase, with the possibility existing that `LOGBUFFER` waits
    can occur if the volume of transactions is high enough.


    The performance of your transaction log is critical for the performance of your
    entire database. Slow transaction log performance will have an impact on every
    change you perform inside your database, as every modification has to be written
    to the transaction log before it can get committed.


    ### LOGBUFFER and WRITELOG Example


    To give you an example of `LOGBUFFER` and `WRITELOG` waits occurring, I am creating
    a new database using the script in Listing [6-8](#340881_3_En_6_Chapter.xhtml#PC8).


    ```sql

    USE master;

    -- Create demo database

    CREATE DATABASE [TLog_demo]

    ON PRIMARY  (

    NAME = N''TLog_demo'', FILENAME = N''C:\TeamData\TLog_demo.mdf'' , SIZE = 153600KB
    , FILEGROWTH = 10%)

    LOG ON  (  NAME = N''TLog_demo_log'', FILENAME = N''C:\TeamData\TLog_demo.ldf''
    , SIZE = 51200KB , FILEGROWTH = 10%);

    -- Make sure recovery model is set to full

    ALTER DATABASE [TLog_demo] SET RECOVERY FULL;

    -- Perform full backup first

    -- Otherwise FULL recovery model will not be affected

    BACKUP DATABASE [TLog_demo]

    TO  DISK = N''C:\TeamData\TLog_demo_Full.bak'';

    -- Create a simple test table

    USE TLog_demo;

    CREATE TABLE transactions  (

    t_guid VARCHAR(50) );

    ```


    **Listing 6-8**

    Create TLog_demo database


    Now that we have created a brand new database, I will use the Ostress utility
    to generate load against the `TLog_demo` database. I will execute the query in
    Listing [6-9](#340881_3_En_6_Chapter.xhtml#PC10), which I saved to the `logbuffer_impl.sql`
    file, with 200 concurrent connections using the following command:


    ```sql

    DECLARE @i INT

    SET @i = 1

    WHILE @i < 10000

    BEGIN

    INSERT INTO transactions

    (t_guid)

    VALUES

    (newid())

    SET @i = @i + 1

    END

    ```


    **Listing 6-9**

    Insert rows inside the TLog_demo database


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dTLog_demo
    -i"C:\TeamData\logbuffer_impl.sql" -n200 -r1 -q

    ```


    Before I started the Ostress utility, I cleared the `sys.dm_os_wait_stats` DMV.


    After about 1 minute on my test SQL Server, the Ostress utility finished executing
    the workload. If I query the `sys.dm_os_wait_stats` DMV and look for the `LOGBUFFER`
    and `WRITELOG` wait types, I get the results shown in Figure [6-18](#340881_3_En_6_Chapter.xhtml#Fig18).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig18_HTML.png)


    A table of 5 columns and 2 rows. It lists the wait type, waiting tasks count,
    wait time m s, max wait time m s, and signal wait time m s of the files write
    log and log buffer. Write log is selected.


    **Figure 6-18**

    WRITELOG and LOGBUFFER waits'
