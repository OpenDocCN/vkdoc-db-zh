- fmt: '# 12. Background and Miscellaneous Wait Types


    SQL Server has different internal processes, and so far we have discussed quite
    a few of them. Some of these internal processes are constantly running inside
    SQL Server, waiting until there is work for them to do. While these processes,
    frequently called background processes, are waiting for work to arrive, SQL Server
    will record the time they are waiting for work as specific wait types related
    to these background processes. While these background wait types are not directly
    related to performance problems, they frequently have the highest wait time and
    will show up at the top of the list when you query for top wait types ordered
    by wait time.


    Frequently these background wait types can safely be ignored because they simply
    indicate an internal process is waiting for work to arrive. This logic is also
    true for the wait types we discuss in this chapter, but instead of just telling
    you to ignore them when analyzing wait statistics, I want to give some background
    information about them so you know what they measure and why it is safe to ignore
    them. Keep in mind we are still talking about SQL Server here, which means “it
    depends” on many factors as to whether you can completely ignore these background
    wait types. You wouldn’t be the first person to run into a performance problem
    only to find out an ignored background process was actually the cause of the issue.
    So my advice is to ignore but to not forget about them!


    Next to the background wait types I also added a number of miscellaneous wait
    types difficult to place in an earlier chapter because they didn’t quite fit in
    with the chapter’s wait type category.


    Since the background wait types inside this chapter record wait time constantly
    when their associated processes are waiting for work to do, I did not include
    an example section or a lowering wait time section for these wait types.


    ## CHECKPOINT_QUEUE


    The first wait type in this chapter is one of those background wait types which
    accumulate large amounts of wait time over time. The `CHECKPOINT_QUEUE` wait type
    can (in many cases) be safely ignored, but understanding what the wait type stands
    for and why it has such high wait times won’t hurt.


    ### What Is the CHECKPOINT_QUEUE Wait Type?


    The `CHECKPOINT_QUEUE` wait type is a background wait related to the checkpoint
    process in SQL Server responsible for writing “dirty” (modified) data pages from
    the buffer cache to the data file on disk. In Chapter 6, “IO-Related Wait Types,”
    we reviewed the checkpoint process when we discussed the `SLEEP_BPOOL_FLUSH` wait
    type, so I won’t repeat all the information again here. What is important to know,
    and the reason why this wait type is often ignored, is the `CHECKPOINT_QUEUE`
    wait type indicates the checkpoint process is waiting for work. This means wait
    times on the `CHECKPOINT_QUEUE` wait type don’t indicate any performance issues;
    they just indicate the time the checkpoint processes spent waiting on work. On
    SQL Server instances which aren’t very busy, or don’t see many data modification
    operations, the wait time can reach very high values.


    The recording of `CHECKPOINT_QUEUE` wait times inside the `sys.dm_os_wait_stats`
    and `sys.dm_os_waiting_tasks` DMVs goes through a specific internal routine which
    might return unexpected wait times (like sudden spikes inside your baseline).
    Figure 12-1 shows the results of queries against the `sys.dm_os_wait_stats` and
    `sys.dm_os_waiting_tasks` DMVs for wait information of the `CHECKPOINT_QUEUE`
    wait type on my test SQL Server instance.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig1_HTML.png)


    Figure 12-1: CHECKPOINT_QUEUE waits


    What is interesting to notice here is the cumulative wait times inside the `sys.dm_os_wait_stats`
    DMV stay at 0, while the wait times inside the `sys.dm_os_waiting_tasks` DMV have
    a very high value. My test SQL Server instance doesn’t perform much work in the
    background, so it is logical the checkpoint process spends most of its time waiting
    for work. The reason for the difference in wait times between both DMVs is related
    to the way SQL Server executes checkpoint operations. The wait times shown in
    both the DMVs are recorded by the automatic checkpoint process. A manual checkpoint
    execution does not impact the wait times. As part of the automatic checkpoint
    process, the wait times of the `sys.dm_os_waiting_tasks` DMV are moved to the
    `sys.dm_os_wait_stats` DMV and reset to 0. So, if you notice very high `CHECKPOINT_QUEUE`
    wait times inside the `sys.dm_os_waiting_tasks`, it means it was some time ago
    when the automatic checkpoint process last ran.


    To show a simple demonstration of this behavior, create a table, reset the `sys.dm_os_wait_stats`
    DMV, insert a few rows inside the table, perform a manual checkpoint, and query
    the `sys.dm_os_wait_stats` and `sys.dm_os_waiting_tasks` DMV, as shown in Listing
    12-1.


    ```

    -- Create a table in the GalacticWorks database

    USE [GalacticWorks];

    CREATE TABLE check_test

    (ID UNIQUEIDENTIFIER,

    RandomData VARCHAR(50));

    -- Clear sys.dm_os_wait_stats

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    -- Insert a few rows into our table

    INSERT INTO check_test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(varchar(50), NEWID()))

    GO 100

    CHECKPOINT 1;

    -- Query Wait Statistics

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE wait_type = ''CHECKPOINT_QUEUE'';

    ```

    Listing 12-1: CHECKPOINT_QUEUE example


    Figure 12-2 shows the results of the queries made against the `sys.dm_os_wait_stats`
    and `sys.dm_os_waiting_tasks` DMVs.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig2_HTML.png)


    Figure 12-2: CHECKPOINT_QUEUE waits


    As you can see, the manual checkpoint didn’t generate any waits inside the `sys.dm_os_wait_stats`
    DMV. Also, an automatic checkpoint didn’t occur, because inserting 100 rows generated
    too few log records to trigger an automatic checkpoint.


    If we insert more rows, we should be able to trigger an automatic checkpoint.
    In this case, I ran the following query to insert 100,000 rows into the table
    created in Listing 12-1. While the insert was running, I queried the `sys.dm_os_wait_stats`
    and `sys.dm_os_waiting_tasks` DMVs repeatedly to see if anything changed. See
    the following:


    ```

    INSERT INTO check_test

    (ID,

    RandomData)

    VALUES

    (NEWID(),

    CONVERT(varchar(50), NEWID()))

    GO 100000

    ```


    After a few seconds, I noticed that the wait time for the `CHECKPOINT_QUEUE` wait
    type was moved to the `sys.dm_os_wait_stats` DMV, as shown in Figure 12-3.


    ![](images/340881_3_En_12_Chapter/340881_3_En_12_Fig3_HTML.png)


    Figure 12-3: CHECKPOINT_QUEUE waits


    Apparently, we inserted enough log records to cause an automatic checkpoint to
    occur, and as you see from this example, only an automatic checkpoint will write
    the wait times of the `CHECKPOINT_QUEUE` to the `sys.dm_os_wait_stats` DMV.


    You should keep this behavior in mind when you notice sudden, very high wait time
    values inside the `sys.dm_os_wait_stats` DMV. This will normally only occur in
    SQL Server instances that either have a very small workload or have a workload
    mainly consisting of read operations instead of data modification operations.'
