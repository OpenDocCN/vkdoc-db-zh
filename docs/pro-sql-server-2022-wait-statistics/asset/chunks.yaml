    为了确保我们的事务不与其他并发事务冲突，`SQL Server` 使用了*锁*。这些锁确保没有其他事务同时修改你的事务正在处理的数据。例如，如果你从银行账户中提取
    100 美元，你不会希望另一次并发提取修改该金额。其他交易将等待它们的取款，直到你的交易完成。在 `SQL Server` 内部，这个过程的工作方式相同。当你从数据库请求数据时，你希望得到你请求的数据，而没有数据在被请求和返回之间被修改的风险。


    当你运行事务时，它将受到 `SQL Server` 在你访问的对象上放置的锁的保护。如果另一个事务想要与同一个对象交互，则会发生阻塞。当这种阻塞发生时，后一个事务将不得不等待，直到对象上的锁被移除。然后，该事务可以在对象上放置自己的锁并开始其交互。'
- fmt: 'There are many options available to us within SQL Server to control the behavior
    of locking, and most are related to changing the isolation level of specific or
    all transactions against a database. There is a lot of information we can access
    inside SQL Server about locking and blocking, not the least of these are inside
    wait statistics. The time a transaction is waiting to access a locked object is
    recorded as wait time for specific, lock-related wait types (depending on the
    type of lock the transaction intends to place).


    In this chapter, we will discuss the various wait types related to locking and
    blocking and how we can lower or even resolve them. This requires some knowledge
    of how SQL Server uses locks, and for this reason I included a section to familiarize
    ourselves with locking and blocking before we dive into the lock wait types.


    ## Introduction to Locking and Blocking


    As we just discussed, SQL Server uses locks to isolate different concurrent transactions
    from each other, so data is only accessed or modified by one transaction at a
    time. There are different lock types, or lock modes, SQL Server can use, and there
    are various object levels SQL Server can place locks on. To make it even more
    complex, different lock modes are not necessarily compatible with each other,
    and when two incompatible locks meet, a block occurs.


    ### Lock Modes and Compatibility


    To start off, let’s get ourselves familiar with the different types of locks,
    or lock modes, inside SQL Server. The following list describes the most common
    lock modes. There are more lock modes inside SQL Server, but those only occur
    when you perform very specific actions. A complete list of the different lock
    modes can be found here [`https://slrwnds.com/m664d1`](https://slrwnds.com/m664d1).


    SQL Server uses acronyms to indicate which lock mode is being used inside SQL
    Server. These acronyms are shown in parentheses:


    *   **Shared (S)** – A Shared lock will be placed on a resource when a query is
    reading data from that resource. For instance, a `SELECT * FROM [table]`.

    *   **Update (U)** – The Update lock mode is used when a query wants to modify
    a resource. It was introduced to prevent “deadlocks,” a situation where locks
    are waiting on each other to release in concurrent transactions which need to
    modify the same resource.

    *   **Exclusive (X)** – An Exclusive lock is placed when a transaction is modifying
    the resource. When an Exclusive lock is in place, no other transactions can modify
    the resource. For instance, `INSERT`, `UPDATE`, or `DELETE` T-SQL statements will
    result in Exclusive locks.

    *   **Schema (Sch)** – Schema locks are used when a table is being modified. An
    example of this would be adding a column to a table.

    *   **Intent (I)** – Intent locks are used to indicate locks placed at a lower
    level in the locking hierarchy. We will go into more detail on the lock hierarchy
    later.


    When different locks need to interact with each other, SQL Server performs a lock
    compatibility check on the different lock modes involved. Not all of the lock
    modes are compatible with each other, which means when two different transactions
    are not able to access the resource at the same time because of incompatible locks,
    a block will occur. For instance, when a Shared lock is placed to read from a
    row, and another transaction wants to modify the row by placing an Exclusive lock,
    the Exclusive lock will have to wait until the Shared lock is removed. Table 8-1
    shows the lock mode compatibility for the Shared, Update, and Exclusive lock modes.


    Table 8-1

    Lock compatibility


    | Lock mode | Shared | Update | Exclusive |

    | --- | --- | --- | --- |

    | **Shared** | Yes | Yes | No |

    | **Update** | Yes | No | No |

    | **Exclusive** | No | No | No |


    Let’s go through an example to illustrate lock compatibility. Say you want to
    read from a row inside a table by executing a `SELECT` statement against the table.
    When you execute your query, SQL Server will check if there is an existing lock
    already in place on the row you want to access and if it is compatible with the
    lock you want to place on the row. Let’s assume there isn’t a lock in place when
    you run your query. In this case, a Shared lock will be placed on the row, indicating
    your query is reading data from that row. Right after you execute your query,
    another transaction is issued by another user who wants to modify data inside
    the row you are accessing. SQL Server will detect there is a Shared lock in place
    on the row, making the second transaction wait before placing its Exclusive lock,
    since Shared and Exclusive locks are incompatible. The user who ran the second
    transaction might experience a delay, since the transaction is waiting for the
    Shared lock to be removed before its Exclusive lock can be placed. If a third
    transaction is started which wants to read the same row as your transaction, no
    lock conflict will occur. Shared locks are compatible with other Shared locks,
    meaning the third transaction does not have to wait to place its lock, and it
    directly receives the results it asked for.


    Figure 8-1 shows the example where the dotted line indicates an incompatible lock
    which has to wait.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig1_HTML.jpg)


    A diagram depicts how the S Q L detects the transaction of T superscript 1 and
    T superscript 3 that have shared locks, while T superscript 2 has no lock and
    causes conflict.


    Figure 8-1

    Concurrent lock situation


    ### Locking Hierarchy


    SQL Server uses multi-granular locking to allow different locks for different-level
    objects. It does this to minimize the overhead cost of locking. The lowest possible
    object where a lock can be placed is a row, and the largest is the database. There
    are many levels between those two granularity levels, and SQL Server automatically
    decides on what level the lock should be placed to minimize locking overhead.
    The following list shows the most common lock levels, ordered from the highest
    granularity to the smallest:


    *   Database

    *   Database file

    *   Table/object

    *   Extent

    *   Page

    *   RID (row inside a heap)/KEY (row inside a clustered index)


    The Intent locks we discussed earlier play an important part in the placement
    of locks upon the different granularity levels. SQL Server will place Intent locks
    on objects on a higher granularity to indicate a lock has been placed at a lower
    level. This protects the lower-level locks from changes on objects at a higher
    granularity level. All the Intent locks placed, from the highest granularity level
    to the actual lock on an object, when looked at together are called the locking
    hierarchy.


    Figure 8-2 shows a graphical representation of a locking hierarchy for the modification
    of data inside a row, which will require an Exclusive lock on the row and Intent
    Exclusive locks higher in the hierarchy.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig2_HTML.jpg)


    A diagram depicts the lock hierarchy with shared, intent-exclusive, and exclusive
    locks from the database, table, page, and row, respectively.


    Figure 8-2

    Lock hierarchy example


    Note the Shared lock on the database level. Every request will always place one
    to protect changes to the database, while transactions are active. This makes
    sure that, for instance, you cannot delete a database, while transactions are
    still active. Also note the Intent locks will use the same lock mode on the lowest
    object, in this case Intent Exclusive (`IX`). If a Shared lock was placed, the
    lock mode of the Intent lock would change as well, in this case to Intent Shared
    (`IS`). We will go a little deeper into Intent locks a bit further on in this
    chapter.'
