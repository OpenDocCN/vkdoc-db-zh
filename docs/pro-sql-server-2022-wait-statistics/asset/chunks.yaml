- fmt: '### Lowering HADR_SYNC_COMMIT Waits


    Seeing `HADR_SYNC_COMMIT` waits occur does not necessarily mean there is a problem.
    `HADR_SYNC_COMMIT` waits will always occur whenever there are data modifications
    performed on your primary replica. They can indicate a problem if the wait times
    are much higher than your baseline measurements.


    Changing the AlwaysOn operation mode to asynchronous replication will remove `HADR_SYNC_COMMIT`
    waits, but at the risk of losing data when a disaster occurs. Also, to reach your
    company’s disaster-recovery or high-availability needs, you frequently do not
    have the luxury of just changing the AlwaysOn operating mode, and I advise you
    not to change it just to lower `HADR_SYNC_COMMIT` wait times.


    Thankfully, there are many different methods you can use to monitor the performance
    of your AlwaysOn Availability Group, including the AlwaysOn Dashboard, DMVs, and
    Perfmon counters.


    You view the AlwaysOn Dashboard by right-clicking your AlwaysOn Availability Group
    and selecting the “Show Dashboard” option. The AlwaysOn Dashboard, by default,
    gives you some general information, like the servers inside the Availability Group
    and the synchronization state, about your AlwaysOn Availability Group, as shown
    in Figure [10-12](#340881_3_En_10_Chapter.xhtml#Fig12).


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig12_HTML.png)


    A screenshot of always-on dashboard. The page header has the server''s name and
    role. The availability group state has health status. The availability replica
    section lists the instance names, role, availability, failover, and seeding modes
    along with synchronization state and issues.


    Figure 10-12


    AlwaysOn Dashboard


    The default view of the AlwaysOn Dashboard doesn’t provide much information for
    troubleshooting. Thankfully, you are able to configure the view to suit your own
    needs by right-clicking the column bars and selecting the information you are
    interested in, as shown in Figure [10-13](#340881_3_En_10_Chapter.xhtml#Fig13).


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig13_HTML.png)


    A screenshot of the list of 28 options that can be displayed in the always-on
    dashboard. The selected options are name, replica, synchronization state, failover
    readiness, and issues.


    Figure 10-13


    AlwaysOn adding columns


    There are many interesting columns for troubleshooting synchronization issues,
    and I recommend taking the time to understand them to determine which columns
    are most applicable to your situation.


    The information shown by the AlwaysOn Dashboard is originally recorded inside
    various AlwaysOn-related DMVs. This makes it possible to query this information
    yourself. All of the AlwaysOn-related DMVs are identified by the `dm_hadr` prefix
    in the DMV name, like the `sys.dm_hadr_database_replica_states` DMV contains a
    large part of the information you can access inside the AlwaysOn Dashboard.


    Next to the AlwaysOn and DMVs that are related to AlwaysOn, there are Perfmon
    counters for AlwaysOn performance. These counters are grouped in the Perfmon `SQLServer:Availability
    Replica` and `SQLServer:Database Replica` groups. Figure [10-14](#340881_3_En_10_Chapter.xhtml#Fig14)
    shows a part of the counters available in the `SQLServer:Database Replica` group.


    ![](images/340881_3_En_10_Chapter/340881_3_En_10_Fig14_HTML.png)


    A screenshot of the add counters window. The available counters section has a
    list of perfmon counters. The instances of selected objects section has the list
    of instances. The added counters section has the counter name, parent, instance,
    and computer details listed.


    Figure 10-14


    Perfmon counters related to AlwaysOn


    As you have read so far, there are plenty of options available to you for analyzing
    the AlwaysOn performance between replicas.


    Using the information from the various sources, you can check the general health
    of your AlwaysOn Availability Group. You then combine this information with other
    metrics for things impacting the performance of your secondary replica, like the
    performance of your storage subsystem and your network connection. Since the `HADR_SYNC_COMMIT`
    wait type is strictly related to the secondary replica, you should focus your
    analysis on the SQL Server hosting the secondary replica. For instance, if your
    storage subsystem cannot keep up with the number of transactions that need to
    be committed on the secondary replica, you will notice this in higher `HADR_SYNC_COMMIT`
    wait times and also in the various counters inside the AlwaysOn Dashboard, DMVs,
    or Perfmon.


    It is difficult to give a general recommendation on how to lower `HADR_SYNC_COMMIT`
    wait times since they are highly dependent on variables and also depend on your
    workload. When you have a workload consisting of a large number of read queries,
    you will notice lower `HADR_SYNC_COMMIT` wait times than workloads performing
    many data modification operations. This means analyzing and optimizing your query
    workload can also contribute to the lowering of `HADR_SYNC_COMMIT` wait times.


    ### HADR_SYNC_COMMIT Summary


    The `HADR_SYNC_COMMIT` wait type will only occur on AlwaysOn Availability Groups
    consisting of replicas configured to use the synchronous-replication mode. The
    `HADR_SYNC_COMMIT` wait type will give you insight on how long it took for the
    secondary replica to commit the transaction to disk. Since the `HADR_SYNC_COMMIT`
    will always record wait times inside synchronous replication, you should only
    worry about the wait times when they are far higher than expected. Thankfully,
    there are various methods available to you to analyze the performance of your
    AlwaysOn Availability Group, including an AlwaysOn Dashboard, DMVs, and Perfmon
    counters.


    Since the performance of the secondary replica has the largest impact on the `HADR_SYNC_COMMIT`
    wait times, your attention should focus on the secondary replica when troubleshooting
    this wait type. The storage subsystem and network connection both play a large
    role in the speed at which the secondary replica can write log records to its
    transaction log. Your workload also impacts `HADR_SYNC_COMMIT` wait times, and
    optimizing it so data modifications are better spread out will result in lower
    `HADR_SYNC_COMMIT` wait times.


    ### REDO_THREAD_PENDING_WORK


    The last wait type in this chapter is the `REDO_THREAD_PENDING_WORK` wait type.
    And even though it misses the characteristic `HADR_` prefix identifying AlwaysOn-related
    wait types, it is related to AlwaysOn. The `REDO_THREAD_PENDING_WORK` wait type
    is, just like the `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types, a wait
    type accumulating over time when there is no work to be done. And just like the
    `HADR_LOGCAPTURE_WAIT` and `HADR_WORK_QUEUE` wait types, in most cases, it can
    be ignored since it does not indicate a performance problem.


    Even though this is a wait type safely ignored in 99% of the cases, I wanted to
    include it in this chapter for two reasons. It is usually one of the top wait
    types on an AlwaysOn Availability Group secondary replica, and understanding its
    related process inside SQL Server will give you a better understanding of the
    inner workings of AlwaysOn.'
  raw: '### Lowering HADR_SYNC_COMMIT Waits


    Seeing HADR_SYNC_COMMIT waits occur does not necessarily mean there is a problem.
    HADR_SYNC_COMMIT waits will always occur whenever there are data modifications
    performed on your primary replica. They can indicate a problem if the wait times
    are much higher than your baseline measurements.


    Changing the AlwaysOn operation mode to asynchronous replication will remove HADR_SYNC_COMMIT
    waits, but at the risk of losing data when a disaster occurs. Also, to reach your
    company’s disaster-recovery or high-availability needs, you frequently do not
    have the luxury of just changing the AlwaysOn operating mode, and I advise you
    not to change it just to lower HADR_SYNC_COMMIT wait times.


    Thankfully, there are many different methods you can use to monitor the performance
    of your AlwaysOn Availability Group, including the AlwaysOn Dashboard, DMVs, and
    Perfmon counters.


