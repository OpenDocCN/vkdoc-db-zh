  trans: '

    ### 降低 `SOS_SCHEDULER_YIELD` 等待


    如果您遇到异常高的 `SOS_SCHEDULER_YIELD` 等待时间，并且总体等待次数也很多，那么您的系统可能存在**与 CPU 相关的问题**。要降低
    `SOS_SCHEDULER_YIELD` 等待，我们将重点关注图 5-12 右上角的部分，那里显示了大量的等待任务和很长的等待时间。


    如果您遇到 `SOS_SCHEDULER_YIELD` 等待类型的高等待时间，同时伴有大量等待任务，那么您的 SQL Server 实例可能非常繁忙。工作线程会让出处理器，但需要很长时间才能重新回到处理器上，因为可运行队列中有许多其他线程在等待。正如我们在第
    1 章“等待统计信息内部原理”中讨论的，可运行队列是一个先进先出（FIFO）列表，这意味着在可运行队列中等待的工作线程越多，工作线程通过队列所需的时间就越长。您通常会在系统上看到
    `sqlservr` 进程导致很高的 CPU 使用率。


    为了演示这个问题，我们将使用 `Ostress` 实用程序从多个线程同时执行一个特定查询。`Ostress` 实用程序是 SQL Server 的 RML
    实用程序的一部分，可在此处获取：[`​slrwnds.​com/​ixhxj4`](https://slrwnds.com/ixhxj4)。


    安装好实用程序后，我们首先将一个脚本保存到本地文件。在此例中，我们将其保存到测试服务器上的文件夹 `C:\TeamData\sos_scheduler_yield.sql`：


    ```

    WHILE (1=1)

    BEGIN

    SELECT COUNT(*)

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 45125 AND 44185

    END;

    ```


    代码清单 5-2

    Ostress 脚本示例


    此查询统计 `GalacticWorks` 数据库中 `Sales.SalesOrderDetail` 表里两个 `SalesOrderID` 之间的行数。它将在一个无限循环中执行此操作。将查询保存到本地文件后，我们使用如下命令启动
    `Ostress` 实用程序，如代码清单 5-3 和图 5-13 所示：


    ![](img/340881_3_En_5_Fig13_HTML.png)


    一个用于 Ostress 代码执行的窗口屏幕截图。该窗口显示了执行命令。


    图 5-13


    使用命令提示符执行的 Ostress 示例代码


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\TeamData\sos_scheduler_yield.sql" -n20 -r1 -q

    ```


    代码清单 5-3

    Ostress 示例代码


    这会启动 `Ostress` 实用程序，该程序连接到 `GalacticWorks` 数据库并使用 20 个线程执行 `sos_scheduler_yield.sql`
    脚本。


    一旦我们启动 `Ostress`，测试 SQL Server 的 CPU 使用率立刻飙升到 100%，如图 5-14 所示。


    ![](img/340881_3_En_5_Fig14_HTML.png)


    性能监视器图表的屏幕截图。该图表有两条阴影线，并提供了有关比例、颜色、计数器、实例、父项、对象和计算机的信息。


    图 5-14


    Ostress 对 CPU 的影响


    如您在图 5-14 中所见，CPU 负载是由 `sqlservr` 进程产生的，这正是我们运行 `Ostress` 查询所针对的 SQL Server 实例。如果我们查询
    `sys.dm_os_waiting_tasks` DMV 以检查 `SOS_SCHEDULER_YIELD` 等待类型是否是导致高 CPU 使用率的原因，结果可能会出乎意料，如图
    5-15 所示。


    ![](img/340881_3_En_5_Fig15_HTML.png)


    sys.dm_os_waiting_tasks 查询输出的屏幕截图。SOS_SCHEDULER_YIELD 的输出表有 11 列和 0 行。


    图 5-15


    未发生 `SOS_SCHEDULER_YIELD` 等待


    这正是 `SOS_SCHEDULER_YIELD` 等待类型的棘手之处，因为它通常不会被 `sys.dm_os_waiting_tasks` DMV 返回——这也是需要捕获并使用等待统计信息基线的又一个原因！

