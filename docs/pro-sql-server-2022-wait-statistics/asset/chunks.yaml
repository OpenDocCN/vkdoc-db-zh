    自签名证书


    右键单击自签名证书并选择“所有任务” ➤ “管理私钥”。将打开一个权限对话框。添加运行 SQL Server 服务所使用的帐户。如果你的 SQL Server
    服务在另一个帐户下运行，该帐户只需要对证书具有读取权限，如图 11-7 所示。


    ![](img/340881_3_En_11_Fig7_HTML.png)


    一个标有“SQL 2022 私钥的权限”的窗口截图。在“安全”选项卡下，列出了组或用户名称，其中 Francis 被选中。“权限”部分有 3 行，每行有用于“允许”和“拒绝”列的复选框。

