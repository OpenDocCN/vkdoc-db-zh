    ![](img/340881_3_En_6_Fig7_HTML.png)


    一个标记为“添加计数器”的窗口。它显示了“可用计数器”、“实例”和“已添加计数器”下的选项，其中选择了“平均磁盘秒/读取”和“平均磁盘秒/写入”。


    图 6-7

    `Avg. Disk sec/Read` 和 `Avg. Disk sec/Write` `Perfmon` 计数器


    关于存储性能，不要急于下结论。在确定存储子系统是瓶颈之前，请务必与你的存储管理员（如果有）沟通，并向他们展示你的测量结果。存储是存储管理员的领域，他们可以帮助你分析和解决性能问题。


    ### ASYNC_IO_COMPLETION 总结


    `ASYNC_IO_COMPLETION` 等待类型发生在你从 SQL Server 实例执行与存储子系统相关的操作时，例如数据库备份和创建新数据库。虽然
    `ASYNC_IO_COMPLETION` 等待是完全正常的，但如果等待时间高于正常值，它们可能表明存在存储相关问题。在你跑去找存储管理员之前，请确保确实存在性能问题。一种可能的方法是检查你的存储延迟，因为高延迟值也会影响
    `ASYNC_IO_COMPLETION` 等待时间。同时检查较高的 `ASYNC_IO_COMPLETION` 等待时间是否与正在执行的数据库备份直接相关。降低
    `ASYNC_IO_COMPLETION` 等待时间的一个好方法是，通过将你的 SQL Server 服务账户添加到 `Perfmon 卷维护任务` 本地策略来启用即时文件初始化。


    ## ASYNC_NETWORK_IO


    与 `ASYNC_IO_COMPLETION` 等待类型类似，`ASYNC_NETWORK_IO` 也与吞吐量有关。但它不是关于存储子系统的吞吐量，而是关于你的
    SQL Server 实例与客户端连接之间的网络连接。同样，看到这种特定等待类型的等待时间并不一定意味着存在网络相关问题，因为 `ASYNC_NETWORK_IO`
    等待总是会发生，即使你在 SQL Server 本身查询你的 SQL Server 实例。


    ### 什么是 ASYNC_NETWORK_IO 等待类型？


    当客户端应用程序处理查询结果的速度不够快，或者存在网络相关的性能问题时，就会发生 `ASYNC_NETWORK_IO` 等待。前者最有可能，因为许多应用程序逐行处理
    SQL Server 结果，或者不正确处理返回的数据量。SQL Server 将等待客户端应用程序确认已收到当前结果集，然后才会发送额外的结果。在 SQL
    Server 等待发送请求的数据时，会记录 `ASYNC_NETWORK_IO` 等待类型。另一种可能发生 `ASYNC_NETWORK_IO` 等待的情况是，当你使用链接服务器查询远程数据库时。图
    6-8 展示了这一过程的图形化表示。


    ![](img/340881_3_En_6_Fig8_HTML.jpg)


    一个图形化的流程图定义了从异步网络 I/O 到本地数据库的数据流。


    图 6-8

    ASYNC_NETWORK_IO


    ### ASYNC_NETWORK_IO 示例


    展示 `ASYNC_NETWORK_IO` 等待类型的示例并不需要一个复杂的测试环境。清单 6-4 展示了一个查询，当我从另一台计算机使用 SQL Server
    Management Studio (`SSMS`) 针对我的测试 SQL Server 实例运行它时，它将生成 `ASYNC_NETWORK_IO` 等待，这应该就足够了。该查询将清除
    `sys.dm_os_wait_stats` DMV，然后针对 `GalacticWorks` 数据库执行实际查询。最后一条语句将向我们展示 `ASYNC_NETWORK_IO`
    等待类型的等待时间。


    ```sql

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR);

    SELECT *

    FROM Person.Person;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_NETWORK_IO'';

    ```

    清单 6-4

    生成 `ASYNC_NETWORK_IO` 等待


    图 6-9 显示了 `ASYNC_NETWORK_IO` 等待类型的等待时间。


    ![](img/340881_3_En_6_Fig9_HTML.png)


    一个包含 5 列和 1 行的表格。它列出了异步网络 I/O 的等待类型，等待任务计数为 6332，等待时间（毫秒）为 999，最大等待时间（毫秒）为 45，信号等待时间（毫秒）为
    107。


    图 6-9

    ASYNC_NETWORK_IO 等待时间


    在这个例子中，针对 `GalacticWorks` 数据库的查询结果无法被 `SSMS` 应用程序处理得像 SQL Server 实例提供结果那样快，因此发生了
    `ASYNC_NETWORK_IO` 等待。


    **技术说明**


    在这个例子中，值得再次提到这是一个单服务器；因此，没有出站网络流量。然而，对 SQL Server 来说，它被认为是一个网络等待，因为即使 `SSMS` 安装在同一台机器上，`SSMS`
    也是数据库引擎的外部客户端。

