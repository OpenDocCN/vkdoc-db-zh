- fmt: '# A


    ## AlwaysOn Availability Groups

    `ASYNC_IO_COMPLETION` 等待类型与备份操作相关。根据 Books Online (BOL) 的定义，降低此类等待涉及备份相关等待、即时文件初始化、本地策略修改、Perfmon
    计数器、服务器配置、卷维护任务、存储子系统的可视化表示。


    ## ASYNC_NETWORK_IO Wait Type

    此等待类型与应用请求、客户端应用相关。可视化表示显示，降低查询、修改网络连接、网络选项卡、网络利用率、SQL Server 实例等可以改善此等待。


    # B


    ## Background Wait Types

    后台等待类型包括 `CHECKPOINT_QUEUE`、`DIRTY_PAGE_POLL` 等待类型（与内部进程相关）、`LAZYWRITER_SLEEP`
    等待类型（与杂项相关）、`MSQL_XP` 等待类型、`OLEDB` 等待类型、`TRACEWRITE` 等待类型、`WAITFOR` 等待类型。


    ## BACKUPBUFFER Wait Types

    此等待类型提供额外信息。涉及缓冲区缓存、缓冲区计数/大小参数、代码生成、数据库备份定义、GalacticWorks 数据库内部机制、降低查询、`MAXTRANSFERSIZE`
    选项、读取器和写入器缓冲区、`sys.dm_os_wait_stats` DMV。


    ## BACKUPIO Wait Type

    此等待类型与数据库选项、相同任务、内部机制修改、结果、存储子系统/网络位置、条带化备份文件相关。


    ## Backup-related Wait Types

    备份相关等待类型包括 `BACKUPBUFFER`、`BACKUPIO`、备份操作、备份策略、`BACKUPTHREAD`（性能下降）、RTO/RPO 要求、`BACKUPTHREAD`
    等待类型。涉及 AdventureWorks 数据库、`BufferCount/MaxTransferSize` 选项、数据库数据文件、即时文件初始化、关系、还原操作、`sys.dm_os_waiting_tasks`
    DMV。


    ## Baselines

    基线的好处包括大型测量、比较、`CXPACKET` 等待类型定义、磁盘读取延迟、金融交易、收集信息、影响流程、深入分析、间隔、迭代过程、测量、测量拆分、指标表示、`PAGEIOLATCH_SH`、性能分析流程图、性能分析过程、性能问题、统计方法、`sys.dm_os_waiting_tasks`
    类型/统计、可视化、等待统计分析（优缺点）。


    # C


    ## Central Processing Unit (CPU)

    CPU。


    ## Checkpoint File Pairs (CFPs)

    检查点文件对包括数据和增量文件、数据文件、数据文件/事务时间戳、内存优化表、合并操作、离线检查点线程、事务提交时间戳。


    ## CHECKPOINT_QUEUE Wait Types

    自动检查点操作、检查点进程定义、`sys.dm_os_wait_stats/sys.dm_os_waiting_tasks`。


    ## CMEMTHREAD Wait Types

    临界区、`EXECUTE (EXEC)` 命令、降低对象、内存对象、互斥（mutex）、查询过程缓存、SqlDumper 线程安全、票证分配器。


    ## Common Language Runtime (CLR)

    CLR。


    ## CPU-related Wait Type

    `CXCONSUMER` Wait Type。


    ## CXPACKET Wait Type

    `CXPACKET` 等待类型的优点、配置设置、`CXCONSUMER` Wait Type、数据库作用域配置、`MAXDOP`、并行度设置、并行配置选项、并行查询线程、并行线程分发、`SELECT`
    操作属性、服务器配置设置、偏斜工作负载、`SOS_SCHEDULER_YIELD`、`THREADPOOL`。


    # D


    ## Database Administrator (DBAs)

    DBA。


    ## Database Management Systems (DBMSs)

    DBMS。


    ## DBMIRROR_SEND Wait Type

    异步模式、通信积压、数据库镜像、数据库镜像监视器、数据修改事务、GalacticWorks 数据库、降低模式、镜像、镜像配置、`Mirror_Test` 表、主体服务器、同步/异步模式、事务日志记录。


    ## Dedicated Administrator Connection (DAC)

    调度器。


    ## DIRTY_PAGE_POLL Wait Type

    检查点进程、脏页、间接检查点、修改恢复过程、目标恢复时间。


    ## Drawbridge Project

    Drawbridge 项目。


    ## Dynamic Management Functions (DMFs)

    DMF。


    ## Dynamic Management Views (DMVs)

    阻塞信息、阻塞锁、数据库管理员（DBA）、流程图、`KILL` 命令、查询调度信息、查询存储指标修改结果、`runtime_stats_interval_id`、源代码、`sys.query_store_wait_stats`、等待类别、请求结果信息、审查结果、调度器、会话信息、SSMS
    程序、`sys.dm_exec_requests`、`sys.dm_exec_session_wait_stats`、`sys.dm_os_waiting_tasks`、`sys.dm_os_wait_stats`、任务、工作线程。


    # E


    ## Extended Events

    `ALTER EVENT SESSION` 命令、配置、事件类型、筛选设置、GalacticWorks 数据库、库选择、实时数据选项卡、非安全事件、输出信息、会话文件夹、`sql_text`
    全局字段、`sys.dm_xe_map_values`、T-SQL 执行、XML 信息。


    ## eXtreme Transaction Processing (XTP)

    XTP。


    # F, G


    ## First-in-First-out List (FIFO)

    FIFO。


    # H


    ## HADR_LOGCAPTURE_WAIT/HADR_WORK_QUEUE Wait Types

