    of the table or index, they can lead to a bad query plan, which in turn can lead
    to more locks than necessary.


    Another option would be to change the Isolation level of the read transactions,
    so no Shared locks are needed in order to read the data. For instance, setting
    the Isolation level to Read Uncommitted will not place Shared locks, and the read
    transaction will not be blocked. This does introduce another problem related to
    the Isolation level, dirty reads, which we discussed in the “Locking and Blocking
    Introduction” section of this chapter. Next to using Read Uncommitted, you could
    also use snapshot isolation, which will result in fewer Shared locks but will
    not cause dirty reads. Snapshot isolation does put more load on the TempDB database,
    since it must maintain versions of data if many concurrent transactions are modifying
    that data.


    ### LCK_M_S Summary


    The LCK_M_S wait type occurs when an incompatible lock exists on a resource and
    another transaction wants to place a Shared lock on the same resource. Seeing
    the LCK_M_S wait type means transactions are being blocked. You should try to
    identify which queries are causing the block to occur and see if these can be
    optimized to result in fewer locks or locks that have a shorter duration. As a
    final resort, you could choose to change the Isolation level of your read transactions,
    though this does introduce other side effects, like dirty reads or increased load
    inside TempDB.


    ## LCK_M_U


    **LCK_M_U** wait types are related to locks using the Update (U) mode. When a
    task wants to place an Update lock on a resource but an incompatible lock is already
    in place, LCK_M_U waits occur.'
  trans: '### LCK_M_S 示例


    创建一个 `LCK_M_S` 等待发生的示例并不困难；我们将在数据修改查询和数据读取查询之间制造一个阻塞情况。


    在这个示例中，我们将针对 `GalacticWorks` 数据库运行清单 8-1 中的查询。该查询将启动一个事务并修改几行数据，但不会提交或回滚该事务。由于我们通过提供
    `BEGIN TRAN` 显式指定了此事务，SQL Server 将保持锁定，直到我们显式执行 `COMMIT` 或 `ROLLBACK` 命令。


    ```sql

    BEGIN TRAN

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''4E0A-4F89-AD''

    WHERE SalesOrderID = ''43661'';

    ```

    清单 8-1

    启动一个修改事务


    当我们执行此查询时，很快会得到结果；在我的例子中，有 15 行被更新。但正如我之前所说，事务尚未完成（提交），因此它将保持打开状态，并在其修改的对象上保留锁。


    到目前为止，我们并没有引起任何阻塞，因为这是测试用的 SQL Server，没有其他查询在运行。让我们改变这一点，创建一个阻塞情况。


    为此，我们将在 SQL Server Management Studio (`SSMS`) 中打开第二个窗口，并执行清单 8-2 中的查询。这将对 `Sales.SalesOrderDetail`
    表执行 `SELECT` 操作，这正是我们当前正在修改数据的同一张表。


    ```sql

    SELECT *

    FROM GalacticWorks.Sales.SalesOrderDetail;

    ```

    清单 8-2

    从正在执行修改操作的表中选择数据


    一旦我们运行这个 `SELECT` 查询，就会注意到没有返回结果，并且查询将一直执行下去。这是一个典型的阻塞操作示例，其中一个事务正在修改我们想在另一个事务中读取的数据。


    如果我们查询 `sys.dm_os_waiting_tasks` DMV，我们将看到 `LCK_M_S` 等待类型，如图 8-10 所示。


    ![](img/340881_3_En_8_Fig10_HTML.png)

    一个表格有 8 列，标题分别为等待任务地址、会话 i d、执行上下文 i d、等待持续时间毫秒、等待类型、资源地址、阻塞任务地址和阻塞会话 i d。其中有一行条目。

    图 8-10

    发生 LCK_M_S 等待


    `LCK_M_S` 等待被解决的唯一方式是移除不兼容的锁。在这种情况下，我们将回滚在第一个 `SSMS` 窗口中启动的修改事务。我们通过在同一会话窗口中运行
    `ROLLBACK` 命令来执行此操作。在执行事务回滚后，我们立即收到了 `SELECT` 查询请求的结果。查询 `sys.dm_os_waiting_tasks`
    也显示 `LCK_M_S` 等待已被解决。


    ### 降低 LCK_M_S 等待


    看到 `LCK_M_S` 等待发生并不一定意味着出现了问题。但是，它确实表明发生了阻塞。如果您注意到 `LCK_M_S` 等待类型的等待时间很长，这意味着一个读取事务运行很长时间才能完成，因为它必须等待放置共享锁。因此，第一步是识别导致阻塞的查询。我们通过使用
    `sys.dm_os_waiting_tasks` DMV 并查看 `blocking_session_id` 列来实现这一点。当只有一个活动阻塞时，这相对容易完成，但当许多并发查询被其他事务阻塞时，情况就变得复杂了。在复杂情况下，我们必须沿着阻塞链追溯，直到找到头部（也称为根或主导）阻塞者（即对象上的第一个锁）。


    在隔离出导致阻塞的查询后，我们将分析该查询，看它是否是一个优化的候选对象。也许该查询请求了比它需要的更多的锁，因此需要很长时间才能完成。一种优化查询的方法是检查是否应添加任何索引，从而减少需要锁定的行数。或者，您可以将单个事务拆分为多个事务，每个事务访问更少的对象。导致锁比必要更多的另一个可能问题是过时的统计信息。统计信息用作查询计划的输入，如果它们不能准确反映表或索引的内容，可能会导致不良的查询计划，进而可能导致更多的锁。


    另一种选择是更改读取事务的隔离级别，这样就不需要共享锁来读取数据。例如，将隔离级别设置为 `Read Uncommitted` 将不会放置共享锁，读取事务也不会被阻塞。这确实引入了另一个与隔离级别相关的问题，即脏读，我们在本章的“锁和阻塞介绍”一节中讨论过。除了使用
    `Read Uncommitted`，您还可以使用 `快照隔离`，这将导致更少的共享锁，但不会引起脏读。快照隔离确实会给 `TempDB` 数据库带来更大的负载，因为如果许多并发事务正在修改该数据，它必须维护数据的版本。


    ### LCK_M_S 总结


    `LCK_M_S` 等待类型发生在资源上存在不兼容的锁，而另一个事务希望在同一资源上放置共享锁时。看到 `LCK_M_S` 等待类型意味着事务正在被阻塞。您应该尝试识别哪些查询导致了阻塞的发生，并查看是否可以对这些查询进行优化，以产生更少的锁或持续时间更短的锁。作为最后的手段，您可以选择更改读取事务的隔离级别，尽管这确实会带来其他副作用，例如脏读或增加
    `TempDB` 内部的负载。


    ### LCK_M_U


    `LCK_M_U` 等待类型与使用更新 (`U`) 模式的锁相关。当一个任务希望在资源上放置更新锁，但该资源上已经存在不兼容的锁时，就会发生 `LCK_M_U`
    等待。'
- fmt: '### What Is the LCK_M_U Wait Type?


    The Update lock type is a special type of lock mode indicating a data modification
    is about to occur. Even though its name might suggest it is only related to UPDATE
    queries, Update locks also appear when performing INSERT or DELETE statements.


    Update locks primarily exist to minimize deadlocks from occurring. Deadlocks indicate
    two transactions needing to modify the same resource are waiting indefinitely
    on each other to acquire an Exclusive lock on the resource. To understand how
    a deadlock situation occurs, and how Update locks help prevent deadlocks, let’s
    review the following scenario when no Update locks are used.


    When two concurrent transactions want to perform a modification on the same resource,
    both transactions would first place a Shared lock on the resource, while the data
    they intended to modify was located. Since Shared locks are compatible with other
    Shared locks, the transactions would not block each other. When one of the two
    transactions found the data it needed to modify, it would convert its Shared lock
    to an Exclusive lock, and now we have a problem. Since Shared locks are incompatible
    with Exclusive locks, and since the other transaction would also have a Shared
    lock on the resource, the conversion from Shared lock to Exclusive lock could
    not occur. The transaction would need to wait until the Shared lock of the other
    transaction was removed before it could convert its own Shared lock to an Exclusive
    lock, but since the other transaction also wants to convert its Shared lock to
    an Exclusive lock, both transactions would end up waiting on each other, and a
    deadlock would occur. SQL Server will automatically detect deadlock situations
    and choose one of the deadlocked transactions as a victim and perform a rollback
    of that transaction, ending the deadlock situation. Figure [8-11](#340881_3_En_8_Chapter.xhtml#Fig11)
    shows a graphical representation of that situation.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig11_HTML.jpg)


    A diagram depicts how the page is locked with shared keys of X by both T superscript
    1 and T superscript 2 during the lock conversion.


    Figure 8-11: Deadlock during lock conversion


    When Update locks are used inside SQL Server, deadlock situations are minimized.
    Update locks are compatible with Shared locks, but not with Exclusive or other
    Update locks. In the preceding scenario, the first transaction would not directly
    convert to an Exclusive lock but rather would convert to an Update lock first.
    Since Update and Shared locks are compatible, there would be no problem converting
    to an Update lock, even though there was a Shared lock in place from the other
    transaction. The Update lock would then get converted to an Exclusive lock so
    the data modification could occur. Figure [8-12](#340881_3_En_8_Chapter.xhtml#Fig12)
    shows this lock behavior.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig12_HTML.png)


    A time plot depicts how the T superscript 1 lock is released when the updated
    lock is converted into an exclusive lock, and T superscript 2 has a data modification
    found before updating the lock.


    Figure 8-12: Update locks during concurrent data modifications


    When a transaction wants to place an Update lock but there is an incompatible
    lock already in place on the object, for instance, an Exclusive lock, the `LCK_M_U`
    wait type will be recorded.


    ### LCK_M_U Example


    To show an example of `LCK_M_U` waits occurring, we will create a situation where
    concurrent transactions want to modify the same resource. For this we will make
    use of the `Ostress` utility to execute an identical query using multiple connections.
    The query is in Listing [8-3](#340881_3_En_8_Chapter.xhtml#PC7). This will perform
    an UPDATE against the `Person.Address` table inside the `GalacticWorks` database.
    I saved the query inside a `.sql` file named `LCK_M_U.sql`.


    ```sql

    UPDATE Person.Address

    SET City = ''Los Angeles''

    WHERE StateProvinceID = 9;

    ```

    Listing 8-3: Modify the Person.Address table


    After saving the file, I run the `Ostress` utility using the following command:


    ```cmd

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\SQL2022 -E -dGalacticWorks
    -i"C:\TeamData\lck_m_u.sql" -n150 -r5 -q

    ```


    This will create 150 concurrent connections, each one executing the query in Listing
    [8-3](#340881_3_En_8_Chapter.xhtml#PC7) 5 times. This should be enough to create
    some blocking.


    While the `Ostress` utility is running, I query the `sys.dm_os_waiting_tasks`
    DMV to find out what tasks are waiting. A small portion of the results are shown
    in Figure [8-13](#340881_3_En_8_Chapter.xhtml#Fig13).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig13_HTML.png)


    A table has 8 columns titled waiting task address, session i d, execution context
    i d, wait duration milliseconds, wait type, resource address, blocking task address,
    and blocking session i d. It has entries in 10 rows.


    Figure 8-13: LCK_M_U waits occurring


    As you can see in Figure [8-13](#340881_3_En_8_Chapter.xhtml#Fig13), many different
    sessions are waiting to acquire an Update lock but are blocked by session ID 169.
    If we query the `sys.dm_tran_locks` DMV for lock information about this session,
    we can see it is granted an incompatible Intent Exclusive lock, as shown in Figure
    [8-14](#340881_3_En_8_Chapter.xhtml#Fig14).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig14_HTML.png)


    A table has 6 columns titled request mode, request type, request status, request
    reference count, request lifetime, and request session i d. It has entries in
    4 rows.


    Figure 8-14: Session ID 169 holding an Intent Exclusive lock


    All the other sessions will have to wait until the Intent Exclusive lock of session
    ID 161 is removed. Then one of those sessions will acquire the Update lock it
    is requesting, convert it into an Exclusive lock, and perform its modification.
    That cycle will repeat until all the sessions are done with their modifications.


    ### Lowering LCK_M_U Waits


    Lowering `LCK_M_U` waits uses the same approach as lowering `LCK_M_S` wait types:
    try to identify the transaction causing the blocking to occur and optimize its
    locking behavior.


    Changing the Isolation level will have little effect on `LCK_M_U` wait times since
    other Isolation levels have the most impact on transactions that perform reads.
    This makes optimizing your queries and/or indexes the way to go if you need to
    lower higher-than-normal wait times on the `LCK_M_U` wait type.


    ### LCK_M_U Summary


    The `LCK_M_U` wait type is related to locks using the Update lock mode. Update
    locks are used to prevent deadlocks from occurring when concurrent transactions
    try to convert their Shared locks to Exclusive locks. Lowering `LCK_M_U` wait
    times is primarily achieved by optimizing potential blocking queries or indexes.


    ## LCK_M_X


    Another common lock-related wait type is the `LCK_M_X` wait type. Just like both
    lock-related wait types already discussed, the `LCK_M_X` wait type is related
    to a specific lock type, in this case the Exclusive lock. And just like the other
    lock-related wait types, seeing this wait type means there is some form of blocking
    occurring.


    ### What Is the LCK_M_X Wait Type?


    The `LCK_M_X` wait type occurs when a task is waiting to place an Exclusive lock
    on a resource. Since Exclusive locks are not compatible with just about every
    other lock mode, including other Exclusive locks, seeing blocking occur when there
    are many concurrent modifications is pretty common. This means seeing `LCK_M_X`
    waits is pretty common, especially in systems with a high amount of concurrent
    transactions.'
