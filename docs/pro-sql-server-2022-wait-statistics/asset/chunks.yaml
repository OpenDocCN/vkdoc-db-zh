  trans: '

    在 SQL Server 中，我们有许多选项可用于控制锁定的行为，其中大多数与更改针对数据库的特定或所有事务的隔离级别有关。在 SQL Server 内部，我们可以访问大量关于锁定和阻塞的信息，其中非常重要的一部分就隐藏在等待统计信息之中。事务等待访问被锁定对象的时间会被记录为特定的、与锁相关的等待类型的等待时间（具体取决于事务打算放置的锁类型）。


    在本章中，我们将讨论与锁定和阻塞相关的各种等待类型，以及如何降低甚至解决它们。这需要一些关于 SQL Server 如何使用锁的知识，因此，我专门安排了一节内容来让我们熟悉锁定和阻塞，然后再深入探讨锁等待类型。


    ## 锁定与阻塞简介


    正如我们刚才所讨论的，SQL Server 使用锁来将不同的并发事务彼此隔离，因此数据一次只能由一个事务访问或修改。SQL Server 可以使用不同类型的锁或锁模式，并且可以在各种对象级别上放置锁。更复杂的是，不同的锁模式彼此之间不一定兼容，当两个不兼容的锁相遇时，就会发生阻塞。


    ### 锁模式与兼容性


    首先，让我们熟悉一下 SQL Server 内部的不同类型的锁或锁模式。以下列表描述了最常见的锁模式。SQL Server 内部还有更多的锁模式，但它们只在执行非常特定的操作时才会出现。不同锁模式的完整列表可以在这里找到
    [`https://slrwnds.com/m664d1`](https://slrwnds.com/m664d1)。


    SQL Server 使用缩写来指示内部使用的锁模式。这些缩写显示在括号中：


    *   **共享锁 (S)** – 当查询从某个资源读取数据时，会将共享锁放置在该资源上。例如，`SELECT * FROM [table]`。

    *   **更新锁 (U)** – 当查询想要修改资源时，会使用更新锁模式。引入更新锁是为了防止“死锁”，即并发事务中需要修改同一资源的锁彼此等待释放的情况。

    *   **排他锁 (X)** – 当事务正在修改资源时，会放置排他锁。当存在排他锁时，其他事务无法修改该资源。例如，`INSERT`、`UPDATE` 或
    `DELETE` T-SQL 语句将导致排他锁。

    *   **架构锁 (Sch)** – 当表正在被修改时，会使用架构锁。一个例子是向表中添加列。

    *   **意向锁 (I)** – 意向锁用于指示在锁定层次结构较低级别放置的锁。我们稍后将更详细地讨论锁层次结构。


    当不同的锁需要相互交互时，SQL Server 会对涉及的不同锁模式执行锁兼容性检查。并非所有的锁模式都彼此兼容，这意味着当两个不同的事务由于锁不兼容而无法同时访问资源时，就会发生阻塞。例如，当放置共享锁来读取某一行时，另一个事务想通过放置排他锁来修改该行，那么排他锁将不得不等待，直到共享锁被移除。表
    8-1 显示了共享锁、更新锁和排他锁模式的锁兼容性。


    表 8-1

    锁兼容性


    | 锁模式 | 共享 | 更新 | 排他 |

    | --- | --- | --- | --- |

    | **共享** | 是 | 是 | 否 |

    | **更新** | 是 | 否 | 否 |

    | **排他** | 否 | 否 | 否 |


    让我们通过一个例子来说明锁兼容性。假设你想通过针对表执行 `SELECT` 语句来读取表中的一行。当你执行查询时，SQL Server 会检查你想要访问的行上是否已存在锁，以及该锁是否与你想要在该行上放置的锁兼容。让我们假设在你运行查询时没有锁存在。这种情况下，会在该行上放置一个共享锁，表明你的查询正在从该行读取数据。就在你执行查询之后，另一个用户发起了一个事务，想要修改你正在访问的行中的数据。SQL
    Server 将检测到该行上存在一个共享锁，使得第二个事务在放置其排他锁之前必须等待，因为共享锁和排他锁不兼容。运行第二个事务的用户可能会遇到延迟，因为该事务正在等待共享锁被移除，然后才能放置其排他锁。如果启动了第三个事务，它想要读取与你的事务相同的行，则不会发生锁冲突。共享锁与其他共享锁是兼容的，这意味着第三个事务不必等待放置其锁，它可以直接获取它请求的结果。


    图 8-1 显示了这个例子，其中虚线表示必须等待的不兼容锁。


    ![](img/340881_3_En_8_Fig1_HTML.jpg)


    图表描绘了 S Q L 如何检测 T¹ 和 T³ 事务具有共享锁，而 T² 没有锁并导致冲突。


    图 8-1

    并发锁情况


    ### 锁层次结构


    SQL Server 使用多粒度锁来允许对不同级别的对象使用不同的锁。这样做是为了最小化锁定的开销成本。可以放置锁的最低可能对象是行，最大的是数据库。在这两个粒度级别之间有许多级别，SQL
    Server 自动决定应在哪个级别放置锁以最小化锁定开销。以下列表显示了最常见的锁级别，按从最高粒度到最小粒度排序：


    *   数据库

    *   数据库文件

    *   表/对象

    *   区

    *   页

    *   RID（堆中的行）/ KEY（聚集索引中的行）


    我们之前讨论的意向锁在不同粒度级别上放置锁起着重要作用。SQL Server 会在更高粒度的对象上放置意向锁，以指示在较低级别已放置了锁。这保护了较低级别的锁免受更高粒度级别上对象更改的影响。从最高粒度级别到对象上的实际锁，所有放置的意向锁一起查看时称为锁层次结构。


    图 8-2 显示了一个锁层次结构的图形化表示，用于修改行内的数据，这将需要在该行上放置排他锁，并在层次结构中更高的级别放置意向排他锁。


    ![](img/340881_3_En_8_Fig2_HTML.jpg)


    图表描绘了锁层次结构，分别在数据库、表、页和行级别具有共享锁、意向排他锁和排他锁。


    图 8-2

    锁层次结构示例


    请注意数据库级别的共享锁。每个请求总是会放置一个共享锁，以在事务活动时保护对数据库的更改。这确保了，例如，在事务仍然活动时无法删除数据库。另请注意，意向锁将在最低级别的对象上使用相同的锁模式，在本例中是意向排他锁
    (`IX`)。如果放置的是共享锁，意向锁的锁模式也会相应改变，在本例中是意向共享锁 (`IS`)。我们将在本章后面更深入地探讨意向锁。

    '
- fmt: '## 隔离级别


    我们可以通过更改隔离级别来控制事务放置的锁的类型。隔离级别定义了在并发操作期间事务彼此隔离的程度。我们可以在连接或事务的基础上更改隔离级别。更改隔离级别只会改变共享锁的行为；数据修改所需的排他锁不受影响。更改隔离级别还会引入某些现象。这些现象会影响读取事务的结果，它们的发生是由于在事务期间共享锁的放置和持有方式发生了变化。接下来的列表显示了
    SQL Server 中可用的各种隔离级别（从最低的隔离形式到最高的），以及与之相关的现象：


    *   `Read Uncommitted`：此隔离级别允许在另一个事务对同一对象执行修改时进行读取。它不会等待对象上的排他锁被释放。这使得读取未提交的值（称为“脏读”）成为可能。脏读可能是有害的（如果你不期望它们发生），因为它们可能返回数据库中已不再存在的值。例如，如果有人将某个值从“A”更新为“B”，而同时其他用户在同一时间查询相同的数据，则可能得到旧值“A”而不是更新后的“B”值。


    *   `Read Committed` – 这是 SQL Server 中的默认隔离级别。使用此隔离级别将使读取事务等待，直到并发的写入事务完成。将在行上放置一个共享锁，并在读取该行后立即释放。与此隔离级别相关的现象称为“不一致分析”。这意味着如果数据在两次读取事务之间被另一个事务修改，那么同一个读取查询可能会得到不同的结果。


    *   `Repeatable Read` – 将隔离级别设置为 `Repeatable Read` 将锁定事务正在读取的行。但是，`Repeatable
    Read` 不会在读取行后释放其上的共享锁，而是会将该锁保持到整个事务完成。`Repeatable Read` 使得“幻读”可能发生。每当另一个事务添加或更改了尚未被读取事务锁定的数据时，就会发生幻读。


    *   `Serializable` – `Serializable` 隔离级别是你可以使用的最高隔离级别，它将放置最多的锁以确保你正在读取的数据在事务运行期间不会被修改。它通过锁定你所选择的数据的整个范围（例如，整个表）来实现这一点，从而使其无法进行更改。由于你所选择的数据范围在事务开始时就被锁定，因此不可能发生任何现象。


    SQL Server 2005 增加了另一种隔离事务的方法，称为行版本控制。行版本控制使用数据修改的版本，并将它们返回给读取查询，而不会导致阻塞。当一个事务修改数据时，更改将被记录为一个版本。当一个读取事务访问相同的数据时，它将收到在修改事务提交之前的更改版本。关于行版本控制的更多信息可以在在线手册中找到：`https://slrwnds.com/87n21i`。


    **Nerd Note**


    `READ UNCOMMITTED` 隔离级别通常通过使用 `NOLOCK` 查询提示来实现。许多开发人员错误地认为使用神奇的 `NOLOCK` 提示会使他们的查询运行得更快。这个误解不仅是错误的，而且对于依赖准确数据的重要查询来说，这是一种糟糕的做法。


    因为隔离级别及其锁行为可能很复杂，难以理解，我添加了图 [8-3](#340881_3_En_8_Chapter.xhtml#Fig3)，它展示了各种隔离级别在读取操作期间实现锁定的方式。方框代表表中的行，带有锁的行表示该行上有一个活动的共享锁。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig3_HTML.jpg)


    插图描绘了从 `read uncommitted`、`read committed`、`repeatable read` 到 `serializable`
    的不同类型隔离级别，其中 `serializable` 具有高隔离级别。


    **图 8-3**


    隔离级别和锁行为


    有各种原因使你会选择使用不同于默认 `Read Committed` 的隔离级别。在许多情况下，这些原因与你工作负载预期的锁/阻塞量，或者你的事务返回的数据应该有多“正确”有关。例如，在默认的
    `Read Committed` 隔离级别下，你的事务运行期间数据可能被其他事务修改，这意味着事务结束时的结果与事务开始时的结果不同。为了确保在你的事务运行时数据不会改变，你可以使用
    `Serializable` 隔离级别，但这意味着需要放置和维护更多的锁，从而在并发的 SQL Server 环境中导致更多的阻塞。


    我们可以通过配置连接字符串中的不同隔离级别，或者通过提供表提示（快照隔离是一个例外，它是在数据库级别配置的）来更改默认的 `Read Committed`
    隔离级别。


    **Nerd Note**


    `READ COMMITTED SNAPSHOT` 隔离级别（RCSI）是在数据库级别设置的，这意味着所有请求 `READ COMMITTED` 的事务将自动使用
    RCSI。这种数据库级别的设置允许在不更改任何现有代码的情况下使用 RCSI 的好处。


    例如，以下两个查询展示了使用 `Read Uncommitted` 隔离级别执行查询的两种不同方法。第一个查询为整个会话设置事务隔离级别：


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    ```


    另一种方法是使用表提示将隔离级别设置为 `Read Uncommitted`：


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    这两种方法都将达到相同的效果，但请记住，为会话设置隔离级别将导致在此特定会话中设置之后执行的所有查询都使用所选的隔离级别。'
  raw: '### Isolation Levels


    We can exercise a certain level of control over what locks are placed by a transaction
    by changing the Isolation level. The Isolation level defines the degree to which
    transactions are isolated from each other during concurrent operations. We can
    change the Isolation level on either a connection or a transaction basis. Changing
    the Isolation level will only change the behavior of Shared locks; Exclusive locks
    needed for data modification are not affected. Changing the Isolation level will
    also introduce certain phenomena. These phenomena have an impact on the results
    of your read transaction and occur because of the changes to how Shared locks
    are placed and held during the transaction. The list that follows shows the various
    Isolation levels, from the lowest form of Isolation to the highest, available
    in SQL Server and the phenomena related to them:


    *   **Read Uncommitted**: This Isolation level will allow reads to occur while
    another transaction is performing modifications on the same object. It will not
    wait until the Exclusive lock on the object is released. This makes it possible
    to read uncommitted values called “dirty reads.” Dirty reads can be bad (if you
    do not expect them) because they can return a value no longer in the database.
    For instance, if someone is updating a value to “B” while it was “A” at the start
    of the transaction, other users querying the same data at the same time can get
    the old value of “A” back instead of the updated “B” value.


    *   **Read Committed** – This is the default Isolation level in SQL Server. Using
    this Isolation level will make read transactions wait until concurrent write transactions
    are completed. A Shared lock will be placed on a row and will be released right
    after the row has been read. The phenomenon associated with this Isolation level
    is called “inconsistent analysis.” This means it is possible to receive different
    results from the same read query if the data were modified by another transaction
    in the time between both read transactions.


    *   **Repeatable Read** – Setting the Isolation level to Repeatable Read will
    lock rows being read by a transaction. But instead of releasing the Shared lock
    on the row after it has been read, Repeatable Read will keep the lock in place
    until the entire transaction is completed. A Repeatable Read makes it possible
    for “phantom reads” to occur. Phantom reads occur whenever data is added or changed
    by another transaction which has not yet been locked by the read transaction.


    *   **Serializable** – The Serializable Isolation level is the highest possible
    Isolation level you can use, and it will place the most locks to ensure the data
    you are reading is not modified during the time the transaction is running. It
    does this by locking the entire range of data (for instance, an entire table)
    you are selecting, making it impossible to make changes. Since the entire range
    of data you are selecting is being locked right at the start of the transaction,
    there are no phenomena possible.


    SQL Server 2005 added another method for isolating transactions called Row Versioning.
    Row Versioning uses versions of data modification and returns them to read queries
    without causing blocking. When a transaction modifies data, the change will be
    recorded as a version. When a read transaction accesses the same data, it will
    receive the version of the change before the modification transaction is committed.
    More information about Row Versioning can be found on Books Online at [`https://slrwnds.com/87n21i`](https://slrwnds.com/87n21i).


    Nerd Note


    The READ UNCOMMITTED Isolation level is often achieved through the use of the
    NOLOCK query hint. Many developers have made the mistake of thinking their queries
    will run faster with the use of the magical NOLOCK hint. Not only is this myth
    wrong, but it is a bad practice for important queries which rely upon accurate
    data.


    Because Isolation levels, and their locking behavior, can be complex to understand,
    I added Figure [8-3](#340881_3_En_8_Chapter.xhtml#Fig3), which shows the way the
    various Isolation levels implement locking during a read operation. The boxes
    represent rows inside a table, and a row with a lock means a Shared lock is active
    on that row.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig3_HTML.jpg)


    An illustration depicts the different types of isolation levels between read uncommitted,
    read committed, repeatable read, and serializable, while serializable has high
    isolation levels.


    Figure 8-3


    Isolation levels and locking behavior


    There are various reasons why you would use a different Isolation level than the
    default of Read Committed. In many cases, these reasons are related to the amount
    of locking/blocking you expect with your workload or how “correct” the data returned
    by your transaction should be. For instance, with the default Isolation level
    of Read Committed, it is possible that data is modified by other transactions,
    while your transaction is running, which means that the results at the end of
    the transaction are not the same as they were at the start of your transaction.
    To make sure no data can change while your transaction is running, you could use
    the Serializable Isolation level, but this means more locks need to be placed
    and maintained, resulting in more blocking in concurrent SQL Server environments.


    We change the default Isolation level of Read Committed by either configuring
    a different Isolation level in the connection string or by supplying a table hint
    (an exception is snapshot isolation, which is configured at the database level).


    Nerd Note


    The READ COMMITTED SNAPSHOT Isolation level (RCSI) is set at the database level,
    which means all transactions requesting READ COMMITTED will automatically use
    RCSI. This database level setting allows for the benefits of RCSI to be used without
    needing to make any changes to existing code.


    For instance, the two queries that follow show two different methods of executing
    a query using the Read Uncommitted Isolation level. The first query sets the transaction
    Isolation level for the entire session:


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    BEGIN TRANSACTION

    SELECT *

    FROM Person.Person

    COMMIT TRANSACTION;

    ```


    Another method is to use a table hint to set the Isolation level to Read Uncommitted:


    ```

    SELECT *

    FROM Person.Person

    WITH (READUNCOMMITTED);

    ```


    Both of these methods will achieve the same effect, but keep in mind setting the
    Isolation level for the session will result in using the selected Isolation level
    for all the queries that are being executed in this specific session after setting
    it.'
