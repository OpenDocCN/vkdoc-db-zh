  trans: '以下是对给定英文文本的中文翻译：



    定义跟踪的几行代码。它包括创建队列、执行和设置事件的代码。


    图 12-15

    跟踪定义


    执行创建服务器端跟踪的脚本后，我们收到了一个跟踪 ID `2`。这个跟踪 ID 非常重要，因为它是启动或停止服务器端跟踪的唯一方式。创建后，服务器端跟踪会自动启动。如果我们查询
    `sys.traces` 目录视图，可以看到刚刚创建的服务器端跟踪，如图 12-16 所示。


    ![](img/340881_3_En_12_Fig16_HTML.png)


    该表有八列，分别为 `i d`、`status`、`path`、`max size`、`stop time`、`max files`、`is rowset`
    和 `is rollover`，以及两行数据。


    图 12-16

    `sys.traces`


    与创建的服务器端跟踪交互的唯一方式是执行 `sp_trace_setstatus` 存储过程，并提供跟踪 ID 和状态 ID。例如，执行以下查询将停止跟踪
    ID 为 `2` 的服务器端跟踪：

    ```sql

    EXEC sp_trace_setstatus 2, 0

    ```

    要再次启动它，我们可以执行这个命令：

    ```sql

    EXEC sp_trace_setstatus 2, 1

    ```

    最后，要完全关闭跟踪，我们可以执行以下命令：

    ```sql

    EXEC sp_trace_setstatus 2, 3

    ```

    但这并不会删除服务器端跟踪。实际上，服务器端跟踪只能通过重启 SQL Server 服务来移除。


    由于服务器端跟踪只能输出到跟踪文件，你必须导航到在服务器端跟踪定义中提供的文件，并在 SQL Server Profiler 中打开该文件。这样，你就可以捕获与使用
    SQL Server Profiler 应用程序相同的信息，但性能开销要低得多。


    ## TRACEWRITE 摘要


    `TRACEWRITE` 等待类型表示当前正在对 SQL Server 实例执行 SQL Server Profiler 跟踪。SQL Server Profiler
    跟踪可能对 SQL Server 实例的性能产生相当大的影响，因此，监控运行在你的 SQL Server 实例上的跟踪数量非常重要。值得庆幸的是，有一些 SQL
    Server Profiler 跟踪的替代方案。你可以选择将 SQL Server Profiler 跟踪转换为扩展事件会话，或者使用服务器端跟踪来执行 SQL
    Server Profiler 跟踪。


    ## WAITFOR


    本章的最后一个等待类型是少数与 T-SQL 命令直接相关的等待类型之一。`WAITFOR` 等待类型并不表示性能问题，但它确实对执行相关 `WAITFOR`
    T-SQL 命令的查询的持续时间有影响。


    ### 什么是 WAITFOR 等待类型？


    每当使用 `WAITFOR` 命令执行查询时，就会记录 `WAITFOR` 等待类型。`WAITFOR` T-SQL 命令会停止查询的执行，直到经过特定的时间量或达到特定的时间点。当条件满足时，查询执行将继续。`WAITFOR`
    命令经常在查询或脚本中使用，以强制查询执行暂停。例如，在第 4 章“建立可靠的基线”中，我们使用了 `WAITFOR` 命令来等待特定时间，以比较相隔 15
    分钟进行的两次测量。


    在使用 `WAITFOR` 命令暂停查询执行时，持有 `WAITFOR` 命令的事务将保持打开状态，直到整个事务完成。这意味着事务持有的线程不能被其他进程使用。SQL
    Server 还会为 `WAITFOR` 命令保留一个专用线程；如果有太多线程与 `WAITFOR` 命令关联并发生线程饥饿，SQL Server 将随机选择
    `WAITFOR` 线程并终止它们以释放更多线程。


    在许多情况下，`WAITFOR` 命令是由编写查询或脚本的人明确使用的，在这个意义上，它只影响特定的查询或脚本；因此，当看到较高的 `WAITFOR` 等待时间时，没有理由感到惊慌。这只是表明查询正在使用
    `WAITFOR` 命令。


    ### WAITFOR 示例


    为了展示 `WAITFOR` 等待类型的一个简单示例，请执行清单 12-4 中的查询。该查询将重置 `sys.dm_os_wait_stats` DMV，执行一个
    `WAITFOR DELAY` 语句导致脚本执行等待 30 秒，然后查询 `sys.dm_os_wait_stats` DMV 中的 `WAITFOR` 等待。

    ```sql

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    WAITFOR DELAY ''00:00:30'';

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''WAITFOR'';

    ```

    清单 12-4

    `WAITFOR` 等待


    当清单 12-4 中的查询完成时，你应该会看到发生了一个 `WAITFOR` 等待，总等待时间大约为 30 秒，如图 12-17 所示。


    ![](img/340881_3_En_12_Fig17_HTML.png)


    该行有五列，`wait type` 为 `wait for`，`waiting tasks count` 为 1，`wait time m s` 和 `max
    wait time m s` 为 30000，`signal wait time m s` 为 0。


    图 12-17

    `WAITFOR` 等待


    ### WAITFOR 摘要


    `WAITFOR` 等待类型是少数与 T-SQL 命令执行直接相关的后台等待类型之一，这里特指 `WAITFOR`。`WAITFOR` 等待类型并不表示你的
    SQL Server 实例存在任何性能问题；它只是表明某个查询或脚本正在使用 `WAITFOR` 命令。`WAITFOR` T-SQL 命令只会影响使用它的查询或脚本的执行时间；因此，降低
    `WAITFOR` 等待时间的唯一方法是移除查询中的 `WAITFOR` 命令。


    # 13. 与内存 OLTP 相关的等待类型


    随着 SQL Server 2014 的发布，微软引入了一个全新的 SQL Server 功能，称为内存 OLTP（代号 Hekaton）。内存 OLTP
    是一个内存优化的数据库引擎，直接集成到 SQL Server 引擎中。内存 OLTP 旨在通过将表完全加载到 SQL Server 实例的内存中来提高性能（据微软称，性能提升可达
    20 倍）。这些内存优化表是完全持久的，并使用无锁和无闩锁的结构来优化并发控制。


    随着内存 OLTP 的引入，SQL Server 中增加了各种新的等待类型。其中大多数可以通过等待类型名称中的 `_XTP_`（或 eXtreme Transaction
    Processing）部分来识别。在本章中，我们将回顾这些与内存 OLTP 相关的等待类型。


    在深入探讨等待类型之前，让我们先（简化且简要地）了解一下内存 OLTP 是什么以及它是如何工作的。本章将重点关注内存优化表。内存 OLTP 还引入了其他功能，如本机编译存储过程和哈希索引，但这些超出了本章的范围。

    '
- fmt: '## Introduction to In-Memory OLTP


    The main difference between traditional (disk-based) tables and memory-optimized
    tables is that memory-optimized tables reside completely in the memory of your
    SQL Server instance. Unlike traditional tables, where data pages from the table
    are moved from disk into memory and back out again, memory-optimized tables are
    moved to your system’s memory at SQL Server startup and never leave the memory
    (unless the memory-optimized table is removed, of course). While this might sound
    a bit scary at first, memory-optimized tables are, by default, fully durable.
    This means if your SQL Server instance crashes, memory-optimized table data is
    not lost. Of course, having an entire table reside in the memory of your SQL Server
    instance also has disadvantages. You need enough free memory to accommodate the
    entire memory-optimized table (and some extra memory to accommodate row versions
    used when accessing such tables). Calculating the memory requirements can be difficult,
    but the following article will help: [https://slrwnds.com/ecqxan](https://slrwnds.com/ecqxan).


    The memory reserved for memory-optimized tables is claimed by SQL Server and will
    not be wiped out; if your memory-optimized tables use too much memory, your SQL
    Server instance will run into memory starvation issues and cause performance degradation
    or, worst case, cause SQL Server to crash. This is a major difference compared
    to, for instance, the buffer cache, where pages are wiped out of memory when memory
    pressure occurs. Another disadvantage is many data types or SQL Server features
    are not supported for memory-optimized tables. The complete list of what can and
    cannot be used can be found at [https://slrwnds.com/939hqx](https://slrwnds.com/939hqx)
    and [https://slrwnds.com/3cfwre](https://slrwnds.com/3cfwre). With the release
    of SQL Server 2016, some of the major limitations were resolved, making the feature
    more attractive and less restrictive.


    Let’s take a look at some of the internals of In-Memory OLTP, how they work, and
    why they perform faster than traditional disk-based tables.


    ### Checkpoint File Pairs (CFPs)


    By default, memory-optimized tables are durable (you can choose to create a nondurable
    table with the contents cleared on a SQL Server service restart, but you must
    explicitly specify this). The way durability is achieved is through so-called
    checkpoint file pairs (CFPs). CFPs consist of two files, a data and a delta file,
    which exist inside a special memory-optimized filegroup created for the database
    where you use memory-optimized tables.


    Unlike traditional tables which store row data inside data pages, CFP data files
    store the rows of **all** memory-optimized tables. I emphasize the word all because
    a single data file can hold the rows of many memory-optimized tables, unlike some
    data pages which store row data for a single table. The rows inside a data file
    are stored sequentially based on the time they were inserted into a memory-optimized
    table. This is different than with data pages, which hold row information inside
    extents for traditional tables. Because rows are stored sequentially inside the
    data files, there is a performance increase when reading rows since it eliminates
    the random reads which occur when reading rows from traditional tables. Figure
    13-1 shows an abstract view of a data file and the row data it holds.


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig1_HTML.jpg)


    A schematic representation of the data file has four rows. 1 and 4 for table 1
    have row data, 1023 and 1026\. 2 and 3 for table 2 have row data, 1024 and 1025.


    Figure 13-1


    Memory-optimized table’s data file


    There are always multiple data files inside a memory-optimized filegroup. When
    you first create the memory-optimized filegroup, SQL Server automatically pre-allocates
    a number of data files in the file location of the memory-optimized filegroup.
    The data files will always have a fixed file size, either 128 MB on systems with
    more than 16 GB memory or 16 MB when there is less than or equal to 16 GB memory.
    When a data file is full, a new data file will automatically be created, and new
    rows will be inserted into the new data file. It is important to know that the
    data file keeps track of rows based on the transaction-commit timestamp which
    inserted the row into the data file (shown by the number inside Figure 13-1).
    Even if new data files are added and rows are spread across multiple data files,
    the data files will always have a contiguous range of transactions. Figure 13-2
    shows multiple data files and the transaction-commit timestamps associated with
    those data files.


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig2_HTML.png)


    A schematic representation of 3 data files has row data from 1023 to 1200, 1201
    to 1400, and 1401 to infinity, respectively.


    Figure 13-2


    Data files and transaction timestamps


    Notice in Figure 13-2 the last data file still has room for new rows – it doesn’t
    have a transaction timestamp to indicate the file is full, so new rows will be
    added to that file.


    Another important characteristic of the data file is the deleted rows are not
    directly removed from the file. Instead, they are tracked by the delta file associated
    with the data file. The delta file logs any deletes made in the data file and
    is connected to the data file by the transaction timestamp range. Row updates
    for memory-optimized tables are tracked as a delete and insert operation.


    The population of the data and delta files is performed by a background thread
    – called the offline checkpoint thread – which runs constantly in the background
    of SQL Server. This is different from the checkpoint process used for traditional
    tables where pages are written to the database data files at intervals. The offline
    checkpoint thread monitors the transaction log for operations performed on memory-optimized
    tables and directly writes to the data and delta files.


    Over time, when data files accumulate more deleted rows, a merge operation will
    take place which will merge multiple data files together into one data file. The
    merge operation will create new data and delta files and move the contents of
    one or more data and delta files into the new files, but it will not move the
    rows marked as deleted. The transaction-commit timestamps will be adjusted in
    the new data and delta files, so they match the timestamps of the files that were
    merged. Figure 13-3 shows a simplified view of a merge operation on a data file
    level. Keep in mind that a merge will also impact the delta file.


    ![](images/340881_3_En_13_Chapter/340881_3_En_13_Fig3_HTML.jpg)


    A schematic representation has 2 data files merged into 1\. A has row data from
    1023 to 1200, B from 1201 to 1400, and C has data from 1023 to 1400.


    Figure 13-3


    Merge operation'
  raw: '## Introduction to In-Memory OLTP


    The main difference between traditional (disk-based) tables and memory-optimized
    tables is that memory-optimized tables reside completely in the memory of your
    SQL Server instance. Unlike traditional tables, where data pages from the table
    are moved from disk into memory and back out again, memory-optimized tables are
    moved to your system’s memory at SQL Server startup and never leave the memory
    (unless the memory-optimized table is removed, of course). While this might sound
    a bit scary at first, memory-optimized tables are, by default, fully durable.
    This means if your SQL Server instance crashes, memory-optimized table data is
    not lost. Of course, having an entire table reside in the memory of your SQL Server
    instance also has disadvantages. You need enough free memory to accommodate the
    entire memory-optimized table (and some extra memory to accommodate row versions
    used when accessing such tables). Calculating the memory requirements can be difficult,
    but the following article will help: [`https://slrwnds.com/ecqxan`](https://slrwnds.com/ecqxan).


    The memory reserved for memory-optimized tables is claimed by SQL Server and will
    not be wiped out; if your memory-optimized tables use too much memory, your SQL
    Server instance will run into memory starvation issues and cause performance degradation
    or, worst case, cause SQL Server to crash. This is a major difference compared
    to, for instance, the buffer cache, where pages are wiped out of memory when memory
    pressure occurs. Another disadvantage is many data types or SQL Server features
    are not supported for memory-optimized tables. The complete list of what can and
