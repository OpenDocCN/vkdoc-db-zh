- fmt: "### Schedulers\n\n调度器组件的主要任务是——毫不意外地——在物理处理器上以任务的形式安排工作。当一个任务请求处理器时间时，正是调度器将工作线程分配给该任务，以便请求得到处理。调度器还负责确保工作线程相互协作，并在它们的时间片（或量子）到期时让出处理器。我们称之为协作式或非抢占式调度。工作线程需要在处理器时间到期时让出的原因是，调度器一次只允许一个工作线程在处理器上运行。如果工作线程无需让出，一个工作线程可能会在处理器上停留无限长的时间，从而阻塞该处理器的所有使用。\n\
    \n处理器和调度器之间是一一对应的关系。如果你的系统有两个处理器，每个处理器有四个核心，那么将会有八个调度器可供 SQLOS 用于处理用户请求，每个调度器映射到一个逻辑处理器。\n\
    \n我们可以通过查询 **sys.dm_os_schedulers** DMV 来获取有关调度器的信息：\n\n```sql\nSELECT *\nFROM\
    \ sys.dm_os_schedulers;\n```\n\n查询结果如图 [1-11](#340881_3_En_1_Chapter.xhtml#Fig11)\
    \ 所示。\n\n![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig11_HTML.png)\n\n图 1-11：`sys.dm_os_schedulers`\
    \ 查询结果\n\n我运行此查询的 SQL Server 有两个双核处理器，这意味着应该有四个调度器来处理用户请求。然而，如果我们查看图 [1-11](#340881_3_En_1_Chapter.xhtml#Fig11)，会注意到查询返回的调度器多于四个。SQL\
    \ Server 使用自己的调度器来执行内部任务，这些调度器被 DMV 返回并在 `status` 列中标记为“HIDDEN ONLINE”。可用于用户请求的调度器被标记为“VISIBLE\
    \ ONLINE”。还有一种特殊类型的调度器，其状态为“VISIBLE ONLINE (DAC)”。这是专用于专用管理员连接（DAC）的调度器。当 SQL\
    \ Server 无响应时（例如，处理用户请求的调度器上没有空闲的工作线程），此调度器使得连接成为可能。\n\n我们可以通过查看 `current_workers_count`\
    \ 列来查看调度器关联的工作线程数。此数字还包括未执行任何工作的工作线程。`active_workers_count` 向我们显示特定调度器上处于活动状态的工作线程。这并不意味着它们正在处理器上运行，因为状态为“RUNNING”、“RUNNABLE”和“SUSPENDED”的工作线程也计入此数字。`work_queue_count`\
    \ 也是一个有趣的列，因为它提供了有多少任务正在等待空闲工作线程的洞察。如果你在此列中看到很高的数字，可能意味着你遇到了 CPU 压力。\n\n### Putting\
    \ It All Together\n\n上面讨论的所有 SQL Server 调度部件都是相互连接的，因为每个连接、会话和查询请求都通过这些相同的组件进行处理。以下文本是一个查询请求如何被处理的示例：\n\
    \n*   用户通过应用程序连接到 SQL Server。\n*   ↓\n*   登录过程成功完成后，SQL Server 创建一个会话。\n*   ↓\n\
    *   当用户向 SQL Server 发送查询时，会创建一个任务和一个请求来表示需要完成的工作单元。\n*   ↓\n*   调度器将分配工作线程给任务，以便任务能够完成。\n\
    \n要在 SQL Server 中查看此信息，我们需要连接一些讨论过的 DMV。清单 [1-1](#340881_3_En_1_Chapter.xhtml#PC8)\
    \ 中的查询将向你展示如何组合不同的 DMV 来获取特定会话（本例中 ID 为 55 的会话）的调度信息。\n\n```sql\nSELECT\n    r.session_id\
    \ AS 'Session ID',\n    r.command AS 'Type of Request',\n    qt.[text] AS 'Query\
    \ Text',\n    t.task_address AS 'Task Address',\n    t.task_state AS 'Task State',\n\
    \    w.worker_address AS 'Worker Address',\n    w.[state] AS 'Worker State',\n\
    \    s.scheduler_address AS 'Scheduler Address',\n    s.[status] AS 'Scheduler\
    \ State'\nFROM sys.dm_exec_requests r\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle)\
    \ qt\nINNER JOIN sys.dm_os_tasks t\n    ON r.task_address = t.task_address\nINNER\
    \ JOIN sys.dm_os_workers w\n    ON t.worker_address = w.worker_address\nINNER\
    \ JOIN sys.dm_os_schedulers s\n    ON w.scheduler_address = s.scheduler_address\n\
    WHERE r.session_id = 70;\n```\n\n清单 1-1：连接不同的 DMV 以查询调度信息\n\n图 [1-12](#340881_3_En_1_Chapter.xhtml#Fig12)\
    \ 显示了在我的测试 SQL Server 上该查询返回的信息。为了保持结果可读，我只从 DMV 中选择了部分列以显示它们之间的关系。\n\n![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig12_HTML.png)\n\
    \n图 1-12：清单 [1-1](#340881_3_En_1_Chapter.xhtml#PC8) 查询的结果\n\n在结果中，我们看到会话 ID 70\
    \ 发出了一个 SELECT 查询请求。在清单 [1-1](#340881_3_En_1_Chapter.xhtml#PC8) 的查询中，我们使用交叉应用（`CROSS\
    \ APPLY`）和 `sys.dm_exec_sql_text` 动态管理函数获取了查询请求的文本。然后，该请求被映射到一个任务，该任务开始运行。接着，该任务被映射到一个工作线程，并且该任务现在处于运行状态。这意味着查询开始在处理器上进行处理。`Scheduler\
    \ Address` 列显示了我们的工作线程是在哪个具体的调度器上运行的。"
  raw: '### Schedulers


    The scheduler component’s main task is to – surprise – schedule work in the form
    of tasks on a physical processor(s). When a task requests processor time, it is
    the scheduler that assigns worker threads to the task, so the request is processed.
    The scheduler is also responsible for making sure worker threads cooperate with
    each other and yield the processor when their slice of time, or quantum, has expired.
    We call this cooperative, or non-preemptive, scheduling. The need for worker threads
    to yield when their processor time has expired comes from the fact that a scheduler
    allows only one worker thread to run on a processor at a time. If the worker threads
    didn’t need to yield, a worker thread might stay on the processor for an infinite
    amount of time, blocking all usage of that processor.


    There is a one-on-one relation between processors and schedulers. If your system
    has two processors, each with four cores, there will be eight schedulers that
    the SQLOS can use to process user requests, each of them mapped to one of the
    logical processors.


    We can access information about the schedulers by running a query against the
    **sys.dm_os_schedulers** DMV:


    ```

    SELECT *

    FROM sys.dm_os_schedulers;

    ```


    The results of the query are shown in Figure [1-11](#340881_3_En_1_Chapter.xhtml#Fig11).


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig11_HTML.png)


    A screenshot S Q L server 2022 results window has 8 columns, scheduler address,
    parent node i d, scheduler i d, c p u i d, status, is online, is idle, and preemptive
    switches count. It has 12 rows with different scheduler addresses. The column
    names have underscore instead of space in between.


    Figure 1-11


    sys.dm_os_schedulers query results


    The SQL Server on which I ran this query has two processors with two cores, which
    means there should be four schedulers to process user requests. If we look at
    Figure [1-11](#340881_3_En_1_Chapter.xhtml#Fig11), however, we notice there are
    more than four schedulers returned by the query. SQL Server uses its own schedulers
    to perform internal tasks, and those schedulers are returned by the DMV and marked
    “HIDDEN ONLINE” in the status column. The schedulers available for user requests
    are marked as “VISIBLE ONLINE.” There is also a special type of scheduler with
    the status “VISIBLE ONLINE (DAC).” This is a scheduler dedicated for use with
    the Dedicated Administrator Connection (DAC). This scheduler makes it possible
    to connect to SQL Server in situations where it is unresponsive, for instance,
    when there are no free worker threads available on the schedulers processing user
    requests.


    We view the number of worker threads a scheduler has associated with it by looking
    at the current_workers_count column. This number also includes worker threads
    not performing any work. The active_workers_count shows us the worker threads
    that are active on the specific scheduler. This doesn’t mean they are running
    on the processor, as worker threads with states of “RUNNING,” “RUNNABLE,” and
    “SUSPENDED” also count toward this number. The work_queue_count is also an interesting
    column as it provides insight into how many tasks are waiting for a free worker
    thread. If you see high numbers in this column, it might mean you are experiencing
    CPU pressure.


    ### Putting It All Together


    All SQL Server scheduling parts discussed above are connected to each other, as
    every connection, session, and query request passes through these same components.
    The following text is an example of how a query request would get processed:


    *   A user connects to the SQL Server through an application.


    *   ↓


    *   SQL Server creates a session after the login process is completed successfully.


    *   ↓


    *   When the user sends a query to the SQL Server, a task and a request are created
    to represent the unit of work that needs to be done.


    *   ↓


    *   The scheduler will assign worker threads to the task so it can be completed.


    To see this information in SQL Server, we join some of the DMVs discussed. The
    query in Listing [1-1](#340881_3_En_1_Chapter.xhtml#PC8) will show you an example
    of how to combine different DMVs to get scheduling information about a specific
    session (in this case a session with an ID of 55).


    ```

    SELECT

    r.session_id AS ''Session ID'',

    r.command AS ''Type of Request'',

    qt.[text] AS ''Query Text'',

    t.task_address AS ''Task Address'',

    t.task_state AS ''Task State'',

    w.worker_address AS ''Worker Address'',

    w.[state] AS ''Worker State'',

    s.scheduler_address AS ''Scheduler Address'',

    s.[status] AS ''Scheduler State''

    FROM sys.dm_exec_requests r

    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) qt

    INNER JOIN sys.dm_os_tasks t

    ON r.task_address = t.task_address

    INNER JOIN sys.dm_os_workers w

    ON t.worker_address = w.worker_address

    INNER JOIN sys.dm_os_schedulers s

    ON w.scheduler_address = s.scheduler_address

    WHERE r.session_id = 70;

    Listing 1-1

    Join the different DMVs together to query scheduling information

    ```


    Figure [1-12](#340881_3_En_1_Chapter.xhtml#Fig12) shows the information that the
    query returned on my test SQL Server. To keep the results readable, I only selected
    columns from the DMVs to show the relation between them.


    ![](images/340881_3_En_1_Chapter/340881_3_En_1_Fig12_HTML.png)


    A screenshot S Q L server 2022 results window has 9 columns, session i d, type
    of request, query text, task address, task state, worker address, worker state,
    scheduler address, and scheduler state. It has 1 row with a select query displayed
    under the query text column. The column names have underscore instead of space
    in between.


    Figure 1-12


    Results of the query from Listing [1-1](#340881_3_En_1_Chapter.xhtml#PC8)


    In the results, we see Session ID 70 made a SELECT query request. In the query
    from Listing [1-1](#340881_3_En_1_Chapter.xhtml#PC8), we obtain the text of the
    query request using a cross apply with the sys.dm_exec_sql_text Dynamic Management
    Function. The request was then mapped to a task, and the task began running. The
    task was then mapped to a worker thread, and the task was now in a running state.
    This meant the query began processing on a processor. The Scheduler Address column
    shows on which specific scheduler our worker thread was run.'
