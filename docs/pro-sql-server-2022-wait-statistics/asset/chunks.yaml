- fmt: '### What Is the ASYNC_IO_COMPLETION Wait Type?


    If we look up the `ASYNC_IO_COMPLETION` wait type in Books Online (BOL), we will
    see the following definition: “Occurs when a task is waiting for asynchronous
    non-data I/Os to finish.” This is a rather short and vague definition, so let’s
    add a little more detail.


    `ASYNC_IO_COMPLETION` waits occur when a task is waiting for a storage-related
    action to finish. The task is initiated and monitored by SQL Server. Figure [6-1](#340881_3_En_6_Chapter.xhtml#Fig1)
    shows this as a visual representation of the wait type.


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig1_HTML.jpg)


    An illustration of how the data flows through the SQL server with async I/O completion.
    Figure 6-1: ASYNC_IO_COMPLETION wait occurring


    As long as the storage-related action is running, the `ASYNC_IO_COMPLETION` wait
    time is logged. As you can imagine, the faster your storage subsystem (or larger
    your network bandwidth), the lower your `ASYNC_IO_COMPLETION` wait times will
    be. It warrants mentioning here the key word is asynchronous; the task is handed
    off to the operating system and returns control to SQL Server, allowing SQL Server
    to be free to execute other logic and come back later to check if the I/O request
    is complete.


    As I said earlier, usually `ASYNC_IO_COMPLETION` waits are no cause for concern.
    They will happen normally during many SQL Server operations which need access
    to the storage subsystem, like backups or the creation of a new database. It is
    a cause for concern if the wait times are higher than expected when compared to
    baseline measurements.


    ### ASYNC_IO_COMPLETION Example


    Let’s go through an example which generates `ASYNC_IO_COMPLETION` waits. We won’t
    need any extra utilities for this; just running a database backup will trigger
    `ASYNC_IO_COMPLETION` waits.


    In this case, I will perform a backup of the `GalacticWorks` database on my test
    server.


    To perform this action, I will use the query in Listing [6-1](#340881_3_En_6_Chapter.xhtml#PC1).
    This query will reset the `sys.dm_os_wait_stats` DMV, perform the database backup,
    and then query the `sys.dm_os_wait_stats` DMV for the `ASYNC_IO_COMPLETION` waits.


    ```sql

    USE [master];

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);

    BACKUP DATABASE [GalacticWorks]

    TO DISK = N''C:\TeamData\GalacticWorks.bak''

    WITH

    NAME = N''GalacticWorks-Full Database Backup'',

    STATS = 2;

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type = ''ASYNC_IO_COMPLETION'';

    ```


    Listing 6-1: Generate `ASYNC_IO_COMPLETION` waits


    The backup operation took <1 second on my test SQL Server instance. Figure [6-2](#340881_3_En_6_Chapter.xhtml#Fig2)
    shows the results of the query in Listing [6-1](#340881_3_En_6_Chapter.xhtml#PC1).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig2_HTML.png)


    A table of 5 columns and a row. It lists the wait type of async I/O completion,
    with waiting tasks count as 4, wait time ms as 863, max wait time ms as 862, and
    signal wait time ms as 0. Figure 6-2: `ASYNC_IO_COMPLETION` wait time


    As you can see, for almost the entire duration of the database backup, `ASYNC_IO_COMPLETION`
    waits were logged.


    ### Lowering ASYNC_IO_COMPLETION Waits


    A common cause of high `ASYNC_IO_COMPLETION` wait times is database backups, as
    you just saw in the example. If you want to know if your `ASYNC_IO_COMPLETION`
    waits are occurring because backups are running, look for backup-related waits
    occurring at the same time.


    If we modify the last `sys.dm_os_waiting_tasks` query in Listing [6-1](#340881_3_En_6_Chapter.xhtml#PC1),
    we would see backup-related wait types being returned by the DMV.


    ```sql

    SELECT *

    FROM sys.dm_os_wait_stats

    WHERE wait_type IN

    (

    ''ASYNC_IO_COMPLETION'',

    ''BACKUPIO'',

    ''BACKUPBUFFER''

    );

    ```


    Listing 6-2: Modified query


    Figure [6-3](#340881_3_En_6_Chapter.xhtml#Fig3) shows the result of the query
    in Listing [6-2](#340881_3_En_6_Chapter.xhtml#PC2).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig3_HTML.png)


    A table of 5 columns and 3 rows. It lists the wait type, waiting tasks count,
    wait time ms, max wait time ms, and signal wait time ms. The file async I/O completion
    is selected. Figure 6-3: `ASYNC_IO_COMPLETION` waits together with backup-related
    waits


    If you see both waits occurring at the same time, chances are a database backup
    is causing your `ASYNC_IO_COMPLETION` waits. One way to lower the wait times is
    to enable backup compression.


    Another method of lowering `ASYNC_IO_COMPLETION` waits is by configuring instant
    file initialization. Instant file initialization was introduced in Windows 2003
    and speeds up the process of allocating space on a disk tremendously by removing
    the need to zero out files (writing zeros inside files before the files are used).
    This does not affect the speed of your backup but will give increased performance
    when creating a database, adding files to a database, or restoring a database.
    Instant file initialization is not enabled by default, unless you are running
    your SQL Server service under an account that has local administrator privileges.
    Starting with SQL Server 2016, Microsoft added an option to enable instant file
    initialization during SQL Server setup, as shown in Figure [6-4](#340881_3_En_6_Chapter.xhtml#Fig4).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig4_HTML.png)


    A window labeled SQL server 2022 R C 0 setup. It displays the server configuration
    under the service accounts tab. The option under the list grant perform volume
    maintenance tasks is highlighted. Figure 6-4: Grant Perform Volume Maintenance
    Task privilege to the SQL Server Database Engine Service checkbox in SQL Server
    setup


    **Nerd Note**


    The use of instant file initialization removes the zeroing out of data pages in
    exchange for faster file creation. This is a classic example of trading speed
    and convenience for security. By avoiding the zeroing out, you open up the possibility
    for data leakage by allowing deleted data on disk to be accessed. While the risk
    is minimal, it is still a risk and one you should discuss with your audit team.


    If you did not enable the Grant Perform Volume Maintenance Task privilege to the
    SQL Server Database Engine Service checkbox during the installation of SQL Server,
    you will have to configure instant file initialization manually after installation.
    The way to configure instant file initialization is through a local security policy
    on the machine SQL Server is running on by adding the account your SQL Server
    service is running under. Larger organizations may choose to deploy a Group Policy
    Object to ensure this setting is automatically configured for all their SQL Server
    instances.


    You can find this policy by opening the local security policy MMC under Administrative
    Tools in the Configuration Panel. Open up the Local Policies ➤ User Rights Assignment
    folder and scroll down to the “Perform Volume Maintenance Task” policy, as shown
    in Figure [6-5](#340881_3_En_6_Chapter.xhtml#Fig5).


    ![](images/340881_3_En_6_Chapter/340881_3_En_6_Fig5_HTML.png)


    A window labeled local security policy. The user rights assignment is selected,
    which lists the files under the policy, and the perform volume maintenance tasks
    is selected. Figure 6-5'
