    错误日志。清单 7-1 中的查询启用了这两个跟踪标志，并对我的测试 SQL Server 上的 GalacticWorks 数据库执行了完整备份。


    ```sql

    -- 启用跟踪标志

    DBCC TRACEON (3213);

