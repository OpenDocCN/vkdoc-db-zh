  trans: '### LCK_M_U 等待类型是什么？


    更新锁类型是一种特殊的锁模式，表示即将发生数据修改。尽管其名称可能暗示它只与 UPDATE 查询相关，但在执行 INSERT 或 DELETE 语句时也会出现更新锁。


    更新锁的主要存在目的是为了最大限度地减少死锁的发生。死锁是指两个需要修改同一资源的事务无限期地等待对方获取该资源的排他锁。要理解死锁情况如何发生，以及更新锁如何帮助防止死锁，让我们回顾一下在没有使用更新锁的情况下可能发生的情景。


    当两个并发事务想要对同一资源执行修改时，两个事务会首先在它们要修改的数据所在的位置放置一个共享锁。由于共享锁与其他共享锁兼容，事务之间不会相互阻塞。当其中一个事务找到需要修改的数据时，它会将共享锁转换为排他锁，现在问题就来了。由于共享锁与排他锁不兼容，而且另一个事务也在该资源上持有共享锁，因此从共享锁到排他锁的转换无法发生。该事务需要等待另一个事务的共享锁被释放，然后才能将自己的共享锁转换为排他锁，但另一个事务也想将自己的共享锁转换为排他锁，因此两个事务最终都会互相等待，从而发生死锁。SQL
    Server 会自动检测死锁情况，并选择其中一个死锁事务作为牺牲品，回滚该事务，从而结束死锁情况。图 8-11 以图形方式展示了这种情况。


    ![](img/340881_3_En_8_Fig11_HTML.jpg)


    一个图表描绘了在锁转换期间，页面如何被 T<sup>1</sup> 和 T<sup>2</sup> 以共享键 X 锁定。


    图 8-11：锁转换期间的死锁


    当在 SQL Server 中使用更新锁时，死锁情况会大大减少。更新锁与共享锁兼容，但与排他锁或其他更新锁不兼容。在前面的情景中，第一个事务不会直接转换为排他锁，而是首先转换为更新锁。由于更新锁和共享锁兼容，因此即使另一个事务已经持有共享锁，转换为更新锁也不会有问题。然后，更新锁会转换为排他锁，以便可以进行数据修改。图
    8-12 展示了这种锁行为。


    ![](img/340881_3_En_8_Fig12_HTML.png)


    一个时间图描绘了当更新锁转换为排他锁时 T<sup>1</sup> 锁被释放，而 T<sup>2</sup> 在更新锁之前找到了数据修改。


    图 8-12：并发数据修改期间的更新锁


    当一个事务想要放置更新锁，但对象上已经存在不兼容的锁时（例如，一个排他锁），就会记录 `LCK_M_U` 等待类型。


    ### LCK_M_U 示例


    为了展示一个 `LCK_M_U` 等待发生的示例，我们将创建一个并发事务想要修改同一资源的情况。为此，我们将使用 `Ostress` 实用工具通过多个连接执行相同的查询。查询位于代码清单
    8-3 中。这将对 `GalacticWorks` 数据库中的 `Person.Address` 表执行 UPDATE 操作。我将查询保存在一个名为 `LCK_M_U.sql`
    的 `.sql` 文件中。


    ```sql

    UPDATE Person.Address

    SET City = ''Los Angeles''

    WHERE StateProvinceID = 9;

    ```

    代码清单 8-3：修改 Person.Address 表


    保存文件后，我使用以下命令运行 `Ostress` 实用工具：


    ```cmd

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\SQL2022 -E -dGalacticWorks
    -i"C:\TeamData\lck_m_u.sql" -n150 -r5 -q

    ```


    这将创建 150 个并发连接，每个连接执行代码清单 8-3 中的查询 5 次。这应该足以造成一些阻塞。


    当 `Ostress` 实用工具运行时，我查询 `sys.dm_os_waiting_tasks` DMV 以找出哪些任务正在等待。图 8-13 显示了结果的一小部分。


    ![](img/340881_3_En_8_Fig13_HTML.png)


    一个表格有 8 列，标题为等待任务地址、会话 ID、执行上下文 ID、等待持续时间（毫秒）、等待类型、资源地址、阻塞任务地址和阻塞会话 ID。它有 10 行条目。


    图 8-13：正在发生的 LCK_M_U 等待


    如图 8-13 所示，许多不同的会话正在等待获取更新锁，但被会话 ID 169 阻塞。如果我们查询 `sys.dm_tran_locks` DMV 以获取有关此会话的锁信息，可以看到它被授予了一个不兼容的意向排他锁，如图
    8-14 所示。


    ![](img/340881_3_En_8_Fig14_HTML.png)


    一个表格有 6 列，标题为请求模式、请求类型、请求状态、请求引用计数、请求生存期和请求会话 ID。它有 4 行条目。


    图 8-14：持有意向排他锁的会话 ID 169


    所有其他会话将不得不等待，直到会话 ID 161 的意向排他锁被移除。然后，其中一个会话将获取其正在请求的更新锁，将其转换为排他锁，并执行其修改。该循环将重复，直到所有会话都完成其修改。


    ### 降低 LCK_M_U 等待


    降低 `LCK_M_U` 等待的方法与降低 `LCK_M_S` 等待类型的方法相同：尝试识别导致阻塞发生的事务并优化其锁行为。


    更改隔离级别对 `LCK_M_U` 等待时间影响很小，因为其他隔离级别主要影响执行读取的事务。这使得如果你需要降低 `LCK_M_U` 等待类型高于正常水平的等待时间，优化你的查询和/或索引是可行的方法。


    ### LCK_M_U 总结


    `LCK_M_U` 等待类型与使用更新锁模式的锁相关。更新锁用于防止在并发事务试图将其共享锁转换为排他锁时发生死锁。降低 `LCK_M_U` 等待时间主要通过优化可能造成阻塞的查询或索引来实现。


    ## LCK_M_X


    另一种常见的与锁相关的等待类型是 `LCK_M_X` 等待类型。就像已经讨论过的两种与锁相关的等待类型一样，`LCK_M_X` 等待类型与特定的锁类型相关，在本例中是排他锁。而且就像其他与锁相关的等待类型一样，看到这种等待类型就意味着正在发生某种形式的阻塞。


    ### LCK_M_X 等待类型是什么？


    当任务等待在资源上放置排他锁时，就会发生 `LCK_M_X` 等待类型。由于排他锁几乎与所有其他锁模式都不兼容，包括其他排他锁，因此在存在大量并发修改时看到阻塞发生是很常见的。这意味着看到
    `LCK_M_X` 等待是很常见的，尤其是在具有高并发事务量的系统中。'
- fmt: '### LCK_M_X 示例


    为了演示`LCK_M_X`等待，我们将执行一条`SELECT`语句且不提交它。在执行`SELECT`之前，我们将把隔离级别设置为`Repeatable Read`。这样做可确保在事务仍在运行时，共享锁不会被移除。由于我们不提交事务，锁将保留在对象上，直到我们终止事务或执行`COMMIT`或`ROLLBACK`。清单[8-4](#340881_3_En_8_Chapter.xhtml#PC9)中的查询展示了我们将对`GalacticWorks`数据库执行的`SELECT`语句：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT *

    FROM HumanResources.Employee;

    -- COMMIT

    ```


    清单 8-4

    在`HumanResources.Employee`表上开始事务


    注意，我们注释掉了`COMMIT`部分以确保锁保持在位。执行查询后很快返回了结果；仅仅1秒后，我就收到了`HumanResources.Employee`的所有行。如果我们查询`sys.dm_tran_locks`动态管理视图（DMV），应该能看到所有共享锁仍然在位，如图[8-15](#340881_3_En_8_Chapter.xhtml#Fig15)所示。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig15_HTML.png)


    一个表格有7列，标题分别为资源类型、资源子类型、资源数据库ID、资源描述、资源关联实体ID、资源锁分区、请求模式和请求类型。它有9行条目。


    图 8-15

    共享锁仍然在位


    当锁仍然在位时，我们在SSMS的一个新窗口中运行另一个查询。清单[8-5](#340881_3_En_8_Chapter.xhtml#PC10)中的查询将对同一个`HumanResources.Employee`表中的一行执行`UPDATE`操作：


    ```sql

    UPDATE HumanResources.Employee

    SET JobTitle = ''Tester''

    WHERE BusinessEntityID = 5;

    ```


    清单 8-5

    更新`HumanResources.Employee`表


    一旦我们执行上述查询，就会注意到发生了阻塞，因为查询持续运行且不返回任何结果。这是预期的，因为该行（更具体地说是索引键）上存在共享锁，阻止我们更新它。


    当我们查看`sys.dm_os_waiting_tasks` DMV时，如图[8-16](#340881_3_En_8_Chapter.xhtml#Fig16)所示，会注意到第二个窗口中的查询正在等待放置排他锁，这由`LCK_M_X`等待类型指示。


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig16_HTML.png)


    一个表格有8列，标题分别为等待任务地址、会话ID、执行上下文ID、等待持续时间（毫秒）、等待类型、资源地址、阻塞任务地址和阻塞会话ID。它有一行条目。


    图 8-16

    发生`LCK_M_X`等待


    如果我们结束`SELECT`查询（通过执行`COMMIT`语句或关闭SSMS中的窗口），共享锁将被移除，第二个查询将能够执行其`UPDATE`命令，从而结束`LCK_M_X`等待。


    ### 降低 LCK_M_X 等待


    要降低`LCK_M_X`等待时间，请使用与其他锁相关等待类型相同的方法。识别导致阻塞的查询，并查看是否可以优化它们以减少阻塞。


    ### LCK_M_X 总结


    `LCK_M_X`等待类型与排他锁被同一资源上已存在的其他锁阻塞有关。由于排他锁几乎与所有其他锁类型都不兼容，因此对于经历并发查询执行的SQL Server实例来说，看到`LCK_M_X`等待发生并不罕见。


    ## LCK_M_I[xx]


    看到**`LCK_M_I[xx]`**等待类型意味着任务在放置意向锁时被阻塞。由于我们已经在本章前面讨论了对象上的各种锁模式，在讨论此等待类型时，我将用于意向锁的锁模式替换为`[xx]`。`[xx]`可以被多种不同的锁模式替换；例如，意向共享锁上的阻塞将表示为`LCK_M_IS`等待类型，而意向排他锁上的阻塞将显示为`LCK_M_IX`。


    ### 什么是 LCK_M_I[xx] 等待类型？


    `LCK_M_I[xx]`等待类型表示任务正在等待在资源上放置意向锁。正如我们从本章开头的“锁和阻塞介绍”部分所学，意向锁表示在锁层次结构中更低级别的对象上放置了相同类型的锁。这并不意味着意向锁仅仅是为了警告SQL
    Server在层次结构更下方存在锁。意向锁的行为就像任何其他锁一样，并且完全有可能一个意向锁阻塞另一个不兼容的意向锁。意向锁在与其他不兼容的意向锁方面确实具有更大的灵活性。例如，两个意向排他锁可以存在于同一页资源上，表示将修改不同的行。在一页资源上同时存在意向共享锁和意向排他锁也是可能的，因为这两种锁都可以读取和/或修改不同的行。


    除了指示存在于锁层次结构更下方的锁类型之外，意向锁还有一些其他锁模式所没有的“特殊”模式。意向锁可以表示锁层次结构更下方级别的多种锁模式。以下列表描述了这三种意向锁模式：


    *   **共享意向排他锁（SIX）** – 此锁模式表示在更低级别的所有对象上存在共享锁，而在其中一些对象上存在意向排他锁。这些锁由一个希望读取数据并同时计划修改其他数据的事务获取。当任务在尝试放置`SIX`锁时被阻塞，它将被`LCK_M_SIX`等待类型记录。

    *   **共享意向更新锁（SIU）** – 此锁模式是共享锁和意向更新锁的组合。同样，单个事务有可能在同一时间在更下方级别获取并持有这两种锁模式。如果在尝试放置此锁时发生阻塞，则将使用`LCK_M_SIU`等待类型来记录等待时间。

    *   **更新意向排他锁（UIX）** – 此锁模式是另外两种锁模式（更新锁和意向排他锁）的组合。此锁模式上的阻塞将由`LCK_M_UIX`等待类型表示。


    在意向锁上看到高等待时间并不常见，因为意向锁在彼此不兼容性方面更灵活。通常在意向级别的阻塞少于锁层次结构更下方的级别。'
  raw: '### LCK_M_X Example


    To demonstrate LCK_M_X waits, we will execute a SELECT statement without committing
    it. Before we run the SELECT, we will set the Isolation level to Repeatable Read.
    Doing so makes sure the Shared locks are not removed while the transaction is
    still running. Since we do not commit the transaction, the locks will remain on
    the objects until we either kill the transaction or perform a COMMIT or ROLLBACK.
    The query in Listing [8-4](#340881_3_En_8_Chapter.xhtml#PC9) shows the SELECT
    statement we will execute against the GalacticWorks database:


    ```

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ

    BEGIN TRANSACTION

    SELECT *

    FROM HumanResources.Employee;

    -- COMMIT

    Listing 8-4

    Begin transaction on the HumanResources.Employee table

    ```


    Notice we commented out the COMMIT section to make sure the locks remain in place.
    Executing the query returns results quickly; after just 1 second, I got all the
    rows of the HumanResources.Employee returned. If we query the sys.dm_tran_locks
    DMV, we should see that all the Shared locks are still in place, as shown in Figure
    [8-15](#340881_3_En_8_Chapter.xhtml#Fig15).


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig15_HTML.png)


    A table has 7 columns titled resource type, resource subtype, resource database
    i d, resource description, resource associated entity i d, resource lock partition,
    request mode, and request type. It has entries in 9 rows.


    Figure 8-15


    Shared locks still in place


    While the locks are still in place, we run another query inside a new window in
    SSMS. The query in Listing [8-5](#340881_3_En_8_Chapter.xhtml#PC10) will perform
    an UPDATE on a single row inside the same HumanResources.Employee table:


    ```

    UPDATE HumanResources.Employee

    SET JobTitle = ''Tester''

    WHERE BusinessEntityID = 5;

    Listing 8-5

    Updating the HumanResources.Employee table

    ```


    As soon as we execute the preceding query, we’ll notice a block occurring since
    the query keeps running without returning any results. This is as expected since
    there is a Shared lock in place on the row, or specifically the index key, preventing
    us from updating it.


    When we look at the sys.dm_os_waiting_tasks DMV, shown in Figure [8-16](#340881_3_En_8_Chapter.xhtml#Fig16),
    we will notice the query in the second window is waiting to place an Exclusive
    lock, indicated by the LCK_M_X wait type.


    ![](images/340881_3_En_8_Chapter/340881_3_En_8_Fig16_HTML.png)


    A table has 8 columns titled waiting task address, session i d, execution context
    i d, wait duration milliseconds, wait type, resource address, blocking task address,
    and blocking session i d. It has entries in one row.


    Figure 8-16


    LCK_M_X waits occurring


    If we end the SELECT query, by either executing the COMMIT statement or by closing
    the windows inside SSMS, the Shared locks are removed and the second query will
    be able to execute its UPDATE command, ending the LCK_M_X wait.


    ### Lowering LCK_M_X Waits


    To lower LCK_M_X wait times, use the same approach as for lowering other lock-related
    wait types. Identify queries causing the blocking and see if you can optimize
    them so they cause less blocking.


    ### LCK_M_X Summary


    The LCK_M_X wait type is related to Exclusive locks being blocked by other locks
    already in place on the same resource. Since Exclusive locks are incompatible
    with just about every other lock type, seeing LCK_M_X waits occurring is not uncommon
    for SQL Server instances that experience concurrent query execution.


    ## LCK_M_I[xx]


    Seeing the **LCK_M_I[xx]** wait type means a task is blocked when placing an Intent
    lock. Since we already discussed the various lock modes on objects, I replaced
    the lock mode used for the Intent lock as [xx] when discussing this wait type.
    The [xx] can be replaced by a variety of different lock modes; for instance, a
    block on an Intent Shared lock would be represented by the LCK_M_IS wait type,
    while a block on an Intent Exclusive lock would be shown as LCK_M_IX.


    ### What Is the LCK_M_I[xx] Wait Type?


    LCK_M_I[xx] wait types indicate a task is waiting to place an Intent lock on a
    resource. As we learned from the “Introduction to Locking and Blocking” section
    at the start of this chapter, Intent locks indicate a lock of the same type is
    placed on an object lower down in the locking hierarchy. This doesn’t mean Intent
    locks are only there to warn SQL Server there is a lock further down the hierarchy.
    Intent locks behave just like any other lock, and it is entirely possible one
    Intent lock can block another, incompatible, Intent lock. Intent locks do have
    more flexibility regarding other incompatible Intent locks. For instance, it is
    possible for two Intent Exclusive locks to exist on the same page resource, indicating
    a row will be modified. It is also possible to have an Intent Shared lock on a
    page resource together with an Intent Exclusive, because both of the locks can
    read and/or modify different rows.


    Next to indicating the type of lock which exists lower down in the locking hierarchy,
    Intent locks have a few “special” modes the other lock modes do not have. It is
    possible for Intent locks to represent more than one lock mode on lower levels
    of the locking hierarchy. The list that follows describes these three Intent lock
    modes:


    *   **Shared with Intent Exclusive (SIX)** – This lock mode represents there are
    Shared locks on all objects at a lower level and Intent Exclusive locks on some
    of these objects. These locks are acquired by one transaction which wants to read
    data and plans to modify other data at the same time. When a task is blocked while
    trying to place the SIX lock, it will be recorded by the LCK_M_SIX wait type.


    *   **Shared Intent Update (SIU)** – This lock mode is a combination of Shared
    and Intent Update locks. Again, it is possible for a single transaction to acquire,
    and hold, both these lock modes at the same time at a lower level. If a block
    occurs while trying to place this lock, the LCK_M_SIU wait type will be used to
    record the wait time.


    *   **Update Intent Exclusive (UIX)** – This lock mode is another combination
    of two other lock modes, Update and Intent Exclusive. Blocks on this lock mode
    will be represented by the LCK_M_UIX wait type.


    Seeing high wait times on Intent locks is not very common, since Intent locks
    are more flexible regarding their incompatibility with each other. There is generally
    less blocking on the Intent level than there is further down the locking hierarchy.'
