    by changing the Maximum Worker Threads option inside the Processors properties
    of your SQL Server instance, as shown in Figure [5-19](#340881_3_En_5_Chapter.xhtml#Fig19).
    By default, the value of the Maximum Worker Threads option will be 0, which means
    SQL Server will calculate and assign the maximum amount of worker threads available
    using the preceding formulas.


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig19_HTML.png)


    A screenshot of an S Q L server properties window. The processor option on the
    left opens the selectable options for processor affinity and I forward slash O
    affinity for all the processors.


    Figure 5-19


    Processors configuration of a SQL Server instance


    You can also query the number of worker threads assigned to your SQL Server instance
    by running the following query:


    ```

    SELECT max_workers_count

    FROM sys.dm_os_sys_info;

    ```


    For my 64-bit test SQL Server with 4 logical processors, I have 512 worker threads
    available, as you can see in Figure [5-20](#340881_3_En_5_Chapter.xhtml#Fig20).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig20_HTML.jpg)


    A screenshot of maximum workers count. The count of 512 is highlighted.


    Figure 5-20


    Amount of worker threads on my test machine


    One piece of advice found on the Internet related to THREADPOOL waits is to change
    the Maximum Worker Threads option to a value higher than the default. I strongly
    advise against changing this option from its default value. Changing the setting
    to a higher value than the amount of worker threads may degrade the performance
    of your SQL Server because context switching occurs far more often. Another reason
    not to change the setting is that every worker thread requires a bit of memory
    to operate; for 32-bit systems, this is 512 KB per worker thread, and for 64-bit
    systems, it’s 2048 KB.


    ### THREADPOOL Example


    Let’s start with an example of THREADPOOL waits. Even though I have warned you
    multiple times already to not run any of the demo scripts in this book in a production
    environment, this one deserves a special reminder. Running the demo scripts in
    this section can cause your SQL Server to become completely unresponsive, not
    accepting any new connections, and can eventually require a restart of the SQL
    Server service! **Do not run this on a SQL Server that isn’t allowed to become
    unresponsive**!


    For this example, we use the Ostress utility again to simulate concurrency and
    load against the test SQL Server instance. First, we create another .sql file
    (select_rnd.sql) that holds the following query we will execute using Ostress:


    ```

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    OPTION (MAXDOP 1);

    ```


    This query will select one random row from the Sales.SalesOrderDetail table in
    the GalacticWorks database. There is a reason I included the query option to serially
    run this query, and I will explain later.


    Now, before we launch Ostress to execute the query, we are purposely going to
    lower the maximum amount of worker threads available on the test SQL Server. To
    do this, we execute this query:


    ```

    EXEC sp_configure ''show advanced options'', 1;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''max worker threads'', 128;

    GO

    RECONFIGURE

    GO

    ```


    This will set the maximum number of worker threads available to 128, the minimum
    value for a 64-bit SQL Server instance.


    Let’s fire up Ostress and execute the .sql script we created earlier:


    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```


    In this case, we start 150 different threads to execute the query in the select_rnd.sql
    file 10 times. The reason for spawning 150 threads is because 150 is now higher
    than the maximum number of worker threads available on the test SQL Server instance,
    but not so high that we cannot execute queries anymore.


    While the script is running, let’s take a look at the number of worker threads
    running and waiting using the sys.dm_os_schedulers DMV:


    ```

    SELECT scheduler_id,

    current_tasks_count,

    runnable_tasks_count,

    current_workers_count,

    active_workers_count,

    work_queue_count

    FROM sys.dm_os_schedulers

    WHERE status = ''VISIBLE ONLINE'';

    Listing 5-5

    Querying sys.dm_os_schedulers

    ```


    The results of this query are shown in Figure [5-21](#340881_3_En_5_Chapter.xhtml#Fig21).


    ![](images/340881_3_En_5_Chapter/340881_3_En_5_Fig21_HTML.png)


    A screenshot of query output. The output table has 7 columns and 4 rows. The scheduler
    I D 0 in row 1 is highlighted.


    Figure 5-21


    Tasks and worker threads per scheduler


    The most important columns here are the current_workers_count, active_ workers_count,
    and work_queue_count columns. The current_workers_count column shows the number
    of worker threads associated with this scheduler; this number also includes worker
    threads that are not yet assigned to a task. The active_workers_count column returns
    the number of worker threads that are in the “RUNNING,” “RUNNABLE,” or “SUSPENDED”
    states. The big difference between the current_workers_count and the active_workers_count
    columns is that the active_workers_count is the number of worker threads that
    have been assigned to a task, while the current_workers_count returns all the
    worker threads. The work_queue_count column shows us the number of tasks that
    are currently waiting to get a worker thread assigned to them. If you see values
    higher than 0 in this column for a longer period and for all schedulers, you are
    experiencing thread pool starvation.


    Let’s check the sys.dm_os_waiting_tasks DMV for waiting tasks that originate from
    a user session. Notice that we filter out all the sessions that have a session
    ID lower than 50, even though I told you to not do this in Chapter [2](#340881_3_En_2_Chapter.xhtml),
    “Querying SQL Server Wait Statistics”:


    ```

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```'
  trans: '### 什么是 `THREADPOOL` 等待类型？


    如果你在系统上看到 `THREADPOOL` 等待，并且等待时间比平时更长，同时你的 SQL Server (几乎) 无响应，那么你很可能遇到了一个称为 **线程池饥饿**
    的问题。线程池饥饿发生在没有空闲的工作线程来处理请求时。当这种情况发生时，当前等待被分配到工作线程的任务将记录 `THREADPOOL` 等待类型。


    SQL Server 为调度程序提供一定数量的工作线程来处理请求。系统可用的工作线程数量取决于处理器数量和处理器架构。表 5-1 显示了最多具有 64 个逻辑
    CPU 的系统的最大可用工作线程数量。


    **表 5-1**

    最大工作线程数


    | CPU 数量 | 32 位架构 | 64 位架构 |

    | --- | --- | --- |

    | ≤4 | 256 | 512 |

    | 8 | 288 | 576 |

    | 16 | 352 | 704 |

    | 32 | 480 | 960 |

    | 64 | 736 | 1472 |


    你也可以使用以下公式计算可用的最大工作线程数：


    32 位架构，逻辑处理器 <= 4：256 个工作线程

    32 位架构，逻辑处理器 > 4：`256 + ((逻辑处理器数量 − 4) × 8)`


    64 位架构，逻辑处理器 <= 4：512 个工作线程

    64 位架构，逻辑处理器 > 4：`512 + ((逻辑处理器数量 − 4) × 16)`


    尽管 SQL Server 会自动计算可用的最大工作线程数（仅在启动期间计算一次），但你可以选择通过更改 SQL Server 实例的“处理器”属性中的 `最大工作线程数`
    选项来覆盖默认值，如图 5-19 所示。默认情况下，`最大工作线程数` 选项的值为 0，这意味着 SQL Server 将使用前述公式计算并分配可用的最大工作线程数。


    ![](img/340881_3_En_5_Fig19_HTML.png)


    一个 S Q L Server 属性窗口的截图。左侧的处理器选项打开了所有处理器的处理器关联性和 I/O 关联性的可选设置。


    **图 5-19**

    SQL Server 实例的处理器配置


    你也可以通过运行以下查询来查询分配给你的 SQL Server 实例的工作线程数量：

    ```sql

    SELECT max_workers_count

    FROM sys.dm_os_sys_info;

    ```

    对于我的具有 4 个逻辑处理器的 64 位测试 SQL Server，我有 512 个工作线程可用，如图 5-20 所示。


    ![](img/340881_3_En_5_Fig20_HTML.jpg)


    一个最大工作线程数的截图。数量 512 被突出显示。


    **图 5-20**

    我的测试机上的工作线程数量


    互联网上关于 `THREADPOOL` 等待的一条建议是，将 `最大工作线程数` 选项更改为高于默认值的某个值。我强烈建议不要将此选项从其默认值更改。将该设置更改为高于工作线程数量的值可能会降低
    SQL Server 的性能，因为上下文切换会更频繁地发生。另一个不要更改此设置的原因是，每个工作线程都需要一点内存来运行；对于 32 位系统，每个工作线程是
    512 KB，对于 64 位系统，则是 2048 KB。


    ### `THREADPOOL` 示例


    让我们从一个 `THREADPOOL` 等待的示例开始。尽管我已经多次警告你不要在本书中将任何演示脚本运行在生产环境中，但这个例子值得特别提醒。运行本节中的演示脚本可能导致你的
    SQL Server 完全无响应，不接受任何新连接，并最终可能需要重启 SQL Server 服务！`请勿在不允许变得无响应的 SQL Server 上运行此脚本`！


    在这个例子中，我们再次使用 `Ostress` 实用工具来模拟对测试 SQL Server 实例的并发和负载。首先，我们创建另一个 `.sql` 文件 (`select_rnd.sql`)，其中包含我们将使用
    `Ostress` 执行的以下查询：

    ```sql

    SELECT TOP 1 *

    FROM Sales.SalesOrderDetail

    ORDER BY NEWID()

    OPTION (MAXDOP 1);

    ```

    此查询将从 `GalacticWorks` 数据库的 `Sales.SalesOrderDetail` 表中随机选择一行。我包含这个查询选项以串行运行此查询是有原因的，稍后我会解释。


    现在，在我们启动 `Ostress` 执行查询之前，我们特意要降低测试 SQL Server 上可用的最大工作线程数。为此，我们执行此查询：

    ```sql

    EXEC sp_configure ''show advanced options'', 1;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''max worker threads'', 128;

    GO

    RECONFIGURE

    GO

    ```

    这将设置可用的最大工作线程数为 128，这是 64 位 SQL Server 实例的最小值。


    让我们启动 `Ostress` 并执行我们之前创建的 `.sql` 脚本：

    ```

    "C:\Program Files\Microsoft Corporation\RMLUtils\ostress.exe" -S.\RC0 -E -dGalacticWorks
    -i"C:\select_rnd.sql" -n150 -r10 -q

    ```

    在这个案例中，我们启动 150 个不同的线程来执行 `select_rnd.sql` 文件中的查询 10 次。生成 150 个线程的原因是因为 150 现在高于测试
    SQL Server 实例上可用的最大工作线程数，但又不至于高到让我们无法再执行查询。


    当脚本正在运行时，让我们使用 `sys.dm_os_schedulers` DMV 查看正在运行和等待的工作线程数量：

    ```sql

    SELECT scheduler_id,

    current_tasks_count,

    runnable_tasks_count,

    current_workers_count,

    active_workers_count,

    work_queue_count

    FROM sys.dm_os_schedulers

    WHERE status = ''VISIBLE ONLINE'';

    ```

    **代码清单 5-5**

    查询 `sys.dm_os_schedulers`


    此查询的结果如图 5-21 所示。


    ![](img/340881_3_En_5_Fig21_HTML.png)


    一个查询输出的截图。输出表有 7 列和 4 行。第 1 行中的调度程序 I D 0 被突出显示。


    **图 5-21**

    每个调度程序的任务和工作线程


    这里最重要的列是 `current_workers_count`、`active_workers_count` 和 `work_queue_count` 列。`current_workers_count`
    列显示与此调度程序关联的工作线程数；此数字还包括尚未分配给任务的工作线程。`active_workers_count` 列返回处于“RUNNING”、“RUNNABLE”或“SUSPENDED”状态的工作线程数。`current_workers_count`
    和 `active_workers_count` 列之间的巨大区别在于，`active_workers_count` 是已分配给任务的工作线程数，而 `current_workers_count`
    返回所有工作线程。`work_queue_count` 列向我们显示当前等待分配工作线程的任务数量。如果你在所有调度程序的此列中看到值长时间高于 0，那么你正在经历线程池饥饿。


    让我们检查 `sys.dm_os_waiting_tasks` DMV，查找源自用户会话的等待任务。注意，我们过滤掉了所有会话 ID 小于 50 的会话，尽管我在第
    2 章“查询 SQL Server 等待统计信息”中告诉过你不要这样做：

    ```sql

    SELECT *

    FROM sys.dm_os_waiting_tasks

    WHERE session_id > 50;

    ```'
