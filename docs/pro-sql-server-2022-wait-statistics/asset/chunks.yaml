    *   `sql_handle` – 在请求中执行的批处理或存储过程的哈希值。并非所有请求都有句柄，通常只有当请求是由用户会话发起并且涉及查询时，您才会看到句柄。`sql_handle`
    哈希被用作 `sys.dm_exec_sql_text` 动态管理函数 (DMF) 的输入，以检索查询文本。

    *   `plan_handle` – 执行计划的哈希值。执行计划将向您展示 SQL Server 在执行查询时执行的操作，是查询执行信息的绝佳来源。我们使用
    `plan_handle` 的方式与 `sql_handle` 相同，作为 `sys.dm_exec_query_plan` DMF 的输入，以返回查询的执行计划。

    *   `wait_type` – 如果请求处于“SUSPENDED”或“RUNNABLE”状态，则为当前的等待类型。当请求当前正在运行（即未等待）时，此值将为
    `NULL`。

    *   `last_wait_type` – 如果请求在执行期间等待过，则为它遇到的上一个等待类型。

    *   `total_elapsed_time` – 自请求到达以来的总时间（毫秒）。


    此 DMV 中还有更多可用的列，并且都有各自的用途。完整的描述可在 Microsoft MSDN 页面 [`https://slrwnds.com/f6glon`](https://slrwnds.com/f6glon)
    上找到，我鼓励您阅读该文章。`sys.dm_exec_requests` DMV 是您 DBA 工具包中的一个很棒的工具，也是除了分析等待统计信息之外，您将经常用于各种目的的
    DMV 之一。

    '
- fmt: '### Querying `sys.dm_exec_requests`


    The `sys.dm_exec_requests` DMV gives access to query statements and corresponding
    execution plans by returning the `sql` and `plan` handles. If you are interested
    in this information, and most of the time you probably are, you must pass the
    `sql_handle` and `plan_handle` to their respective DMFs so the hashes turn into
    something humans can read and understand.


    `Listing 2-2` shows a query against the `sys.dm_exec_requests` DMV and also retrieves
    the query statements and execution plans. I am excluding my current session ID
    and ignoring session IDs lower than 50 to keep the result set small for this example.


    ```sql

    SELECT

    r.session_id AS ''Session ID'',

    r.start_time AS ''Request Start'',

    r.[status] AS ''Current State'',

    r.[command] AS ''Request Command'',

    t.[text] AS ''Query'',

    p.query_plan AS ''Execution Plan''

    FROM sys.dm_exec_requests r

    OUTER APPLY sys.dm_exec_sql_text(r.sql_handle) AS t

    OUTER APPLY sys.dm_exec_query_plan(r.plan_handle) p

    WHERE r.session_id > 50

    AND r.session_id <> @@SPID;

    ```


    From my system, the results are shown in `Figure 2-7`.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig7_HTML.png)


    A screenshot of the results of the listing. The tabular output has 7 columns and
    5 rows. The execution plan for the select query in the last row is highlighted.


    `Figure 2-7` Results of `Listing 2-2`


    Using the query in `Listing 2-2`, we immediately see session ID 64 is performing
    a `SELECT` query, and the query column shows the complete statement executed.
    The Execution Plan column returns the execution plan in an XML format. We can
    click the XML link to view the graphical execution plan, as shown in `Figure 2-8`.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig8_HTML.png)


    A flow diagram of an execution plan for a select query. The events are listed
    in the following order. Clustered index scan at 28% and 54 % cost. Compute scalar
    at 0% and 1% cost. Merge at 17% cost. Select 0% cost from the right to left.


    `Figure 2-8` Execution plan


    Using the execution plan, we get insight into how the query is executed by the
    SQL Server engine. We won’t get into the details about execution plans in this
    book, but you will be using them frequently when you are optimizing query performance,
    so it is good to know how to access them from the `sys.dm_exec_requests` DMV.


    Nerd Note


    When executing a query, the SQL Server engine utilizes the Query Optimizer to
    determine the most efficient way to return the results. The output of the Query
    Optimizer is called a query execution plan, sometimes called a query plan, or
    an execution plan. We discuss execution plans briefly later in this chapter, but
    if you want more details on execution plans and how to leverage them for performance
    tuning, check out the series of books by Grant Fritchey.


    ## `sys.dm_exec_session_wait_stats`


    One of the latest additions to the wait statistics–related DMVs is the `sys.dm_exec_session_wait_stats`
    DMV. It was introduced in SQL Server 2016 SP1 and returns wait statistics information
    on a per-session level. If you remember from `Chapter 1`, “Wait Statistics Internals,”
    a session is an active connection a user or process has with SQL Server. A session
    could have multiple requests, which in turn could have multiple tasks performing
    the actions required to execute a query.


    `Figure 2-9` shows the columns of the DMV as well as some wait statistics information
    from my test system.


    ![](images/340881_3_En_2_Chapter/340881_3_En_2_Fig9_HTML.png)


    A screenshot of `sys.dm_exec_session_wait_stats` query output. The tabular output
    has 7 columns and 14 rows. It lists the session I D, the wait type, tasks, and
    timings.


    `Figure 2-9` `sys.dm_exec_session_wait_stats`


    Does the preceding figure look familiar? It probably does since it is practically
    identical to the `sys.dm_os_wait_stats` DMV but with an additional column for
    the `session_id`.


    But there is more than an additional column. The wait statistics information recorded
    through `sys.dm_exec_session_wait_stats` is cumulative *for all requests a specific
    session performed while it was active*. For instance, if you execute ten different
    queries inside a single session, the wait times returned by the DMV is the total
    wait time for those ten queries. This means it is very important to understand
    what happened during the lifetime of the session. Perhaps the session was executing
    large batches of queries, or it executed a single query statement. Knowing the
    workload is important before using this DMV to analyze session wait statistics.


    Also, session IDs are reused after a session is closed, meaning you will see commingled
    wait statistics for both the new session and the old session. When a session ID
    is reused (or reset when using connection pooling), the wait statistics information
    inside this DMV for the specific session is reset as well.


    With the preceding information in mind, we conclude this DMV is not directly useful
    as a “first-place-to-look” when performance is reported to be slow. The DMV still
    has its place though, especially if you reproduce a specific performance issue
    with a specific action where multiple queries are involved. In this situation,
    you can zoom in on a specific session ID and reproduce the issue, capturing wait
    statistics for everything that happens during the execution of the queries.'
