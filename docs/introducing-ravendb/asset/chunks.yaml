  trans: '## 变更单元与一致性单元


    聚合是一个*变更单元*，也是一个*一致性单元*。


    一个*变更单元*将是你数据库模型中能够处理所有请求的变更，而无需访问其他文档的每一个实体。换句话说，我们所做的变更都在一个聚合内部传播。


    回到我们文档良好建模的三个属性，我们可以看到聚合符合以下要求：


    *   独立且内聚——它们是相关对象的集合，在一个 `Document` 中组合在一起。这些对象包含完整且全面的信息，可以作为一个独立的单元存在。我们可以在无需查看相关聚合的情况下理解一个聚合。

    *   隔离——作为一个变更单元，聚合可以独立于其他文档进行修改。


    聚合的第二个重要属性是它们代表一个*一致性单元*。一个一致的数据库在任何时间点都只包含有效数据。存储在数据库中的所有信息都将符合所有业务规则、约束和验证检查。无论我们对聚合应用什么变更，如果我们使用了验证规则，它们在保存到数据库时将保持有效。


    回到我们通用的 `Order` 示例，如果我们在 `Lines` 集合中再添加一行，我们还需要通过重新计算 `Order` 的新总值来更新 `Total`
    属性。如果它包含更多属性，比如 `VAT` 或运输成本，它们也需要更新。我们构建的系统可能会有一些更高级的规则——例如，我们可能为海外运输提供批量折扣。在这种情况下，仅仅添加一行订单就会触发一系列更新、规则检查、验证检查以及各种计算带来的一些额外更新。在应用所有更新之后，我们将以原子方式将
    `Order` 持久化到数据库中；我们的 `Order` 聚合包含了一组同时更改的单元。这个变更集已经过验证，符合所有业务和其他验证规则。我们现在可以确信，我们的数据库中保存的
    `Order` 只包含有效数据。


    ## 分布式系统


    然而，数据库只是我们正在构建的软件系统的一个组成部分。从更宏观的视角来看，我们会发现现代应用程序是复杂的。它们由许多组件组成，形式多样——从工具类、进程内服务，到物理分离的服务，并在互联机器的网络上执行。服务之间通过同步或异步方式进行通信。


    举个例子，看一个简单的网店。客户可以将产品添加到购物车并完成 `Order`。`Order` 被保存在网店应用程序中，发送确认邮件，并被推送到作为运营核心的
    `ERP` 系统。即使在这个小系统中，我们也能看到三个主要的分离组件：


    *   网店应用程序

    *   邮件服务器

    *   ERP 系统


    这是三个存在于分离机器上、通过网络通信的隔离组件。以这种方式构成的系统被称为*分布式系统*。


    从业务逻辑的角度来看，发送确认邮件、创建新的 `Order` 并将其推送到 `ERP` 系统是一个事务性操作。然而，在像这样的分布式系统中，你所习惯的标准事务概念不再适用。例如，当你尝试发送新的
    `Order` 时，如果 `ERP` 系统不可用，会发生什么？我们应该放弃它吗？在这种情况下，我们将在何时发送确认邮件？


    分布式系统之所以具有挑战性，是因为它们很复杂，并且因为你通常所做的许多假设不再成立。之前你作为同步执行的操作，在分布式系统中可能是异步的。每次通过网络通信时，你都必须为通信失败的场景提供回退方案。在分布式组件之间发送的消息有时会被排队，并在你最初发送后的几十秒、甚至几分钟后才送达。


    因此，在大多数情况下，在分布式系统中，你将无法依赖应用程序的事务特性。分布式系统具有*最终一致性*的概念。你的业务事务最终会完成，但无法保证你发出的变更需要多长时间才能被系统组件传递和接受。在这个传播过程结束时，你的分布式系统将变得一致，但这个事实是你必须时刻意识到的。


    ## 分布式系统中的聚合


    在分布式系统的背景下重新审视*聚合*的概念，揭示了其对聚合边界设计的重大影响。具体来说，聚合边界的范围将决定哪些数据单元成为其一部分。回到聚合是*变更单元*和*一致性单元*这一事实，我们可以得出结论：修改聚合并将其保存到数据库将代表一个*事务*。


    什么是事务？事务代表一个单独的、不可分割的操作，它要么作为一个完整的单元成功，要么失败。事务的部分完成是不可能的，并且当事务处理完成后，你将获得关于结果的精确而可靠的反馈。这个特性通常被称为*原子性*，正是因为事务的不可分割性。


    为什么原子性很重要？事务通常代表一组紧密耦合的操作。仅执行其中一部分可能会使你的数据陷入不一致和损坏的状态。举个例子，想象一下向 `Order` 添加一个新产品。你将：


    *   创建一个包含该产品的新订单行。

    *   重新计算订单总额以包含新订单行的金额。


    如果这两个操作只执行了一个，会发生什么？你要么收取了一个未包含在 `Order` 中的产品的费用，要么产品在 `Order` 中但没有增加 `Total`。换句话说，你要么给自己，要么给客户造成了财务损失。


    因此，很明显，我们需要将这两个操作视为一个原子单元。结果，它们要么都成功（创建了新的订单行并且 `Total` 被正确更新），要么都失败（订单总额保持不变，因为没有添加新的订单行）。事务失败本身并不严重。你可以通过几种标准方式处理它，包括在显示错误消息之前重试它。然而，关键的是，在成功或不成功的两种情况下，你的数据都将保持一致的状态。'
- fmt: '# Aggregates as Transaction Boundaries


    We can conclude that aggregates are supporting transactions. We will load a `Document`
    that represents aggregate, update it, and save it back to the database in a transactional
    manner on a database level, which results in a guarantee of consistency of our
    `Document`.


    You can ask yourself – why can we not update two documents in one transaction?
    This is possible indeed. As we already mentioned, modeling is a subtle intellectual
    activity. There are no complex rules, and everything you read so far is a recommendation
    based on best practices learned through the practical application of these principles.
    So, updating two aggregate documents in one transaction is possible. However,
    recommended approach would be to group things that change together transactionally
    into one aggregate and then propagate changes through the rest of the system in
    an eventually consistent manner. Also, on many occasions, you will be forced by
    the nature of your distributed system to go with eventual consistency.


    One typical example would be a separation of your application into microservices.
    Every microservice will usually have its database. Transactions that are spanning
    two or more aggregates hosted within different databases are unviable and hard.
    This approach will create more problems than benefits for you as you develop,
    maintain, and evolve such application.


    Hence, it would help if you looked at the boundaries of your aggregate as transactional
    boundaries. For most of the changes in your application, you will have to load,
    change, and save just one `Document` – a document that represents your aggregate.


    Everything else that happens in your system will not be transactional but eventually
    consistent. You should take this into account and implement error handling mechanisms.
    Also, you should carefully approach every single business scenario in your application
    and determine when synchronous communication is a must and when you can use asynchronous
    communication.


    # Modeling in RavenDB


    This section will show how `RavenDB` handles documents and how you can create
    and inspect documents. Also, we will take a look at identifiers assigned to each
    `RavenDB` document.


    ## Documents


    `RavenDB` is storing documents in `JSON` format, and they are almost unlimited
    in size – they can grow up to `2Gb`. However, you should limit the size of your
    documents to be no bigger than a couple of megabytes. `JSON` larger than that
    is cumbersome to load and save back into the database and is a usually strong
    signal that your model is suboptimal.


    In the previous chapter, we created an empty database and seeded it with some
    sample data. In Figure [2-3](#514303_1_En_2_Chapter.xhtml#Fig3), you can see one
    `Order` document from the `Orders` collection.


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig3_HTML.png)


    A screenshot of 34 lines of code to create an order document, with options to
    save, clone and delete.


    Figure 2-3


    Order Document in RavenDB


    This document consists of two main elements:


    *   Identifier `orders/830-A`


    *   `JSON` body


    These two are mandatory. Every `RavenDB` `Document` must have a unique identifier
    and non-empty `JSON` content.


    Let’s create our first `Document`. For the beginning, create a new empty database
    following directions from the previous chapter. After a database is successfully
    created, you will see a screen, as shown in Figure [2-4](#514303_1_En_2_Chapter.xhtml#Fig4).


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig4_HTML.png)


    A screenshot of an empty database of Raven D B. It has 2 sections. Under the documents
    section, the icons of recent, patch, query, conflicts, and compare exchange are
    listed. The other section is a table of 4 columns with headers listed as I d,
    change vector, last modified, and collection.


    Figure 2-4


    Empty RavenDB Database


    To create a new document , you need to click on a `New document` button, which
    will open the screen shown in Figure [2-5](#514303_1_En_2_Chapter.xhtml#Fig5).


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig5_HTML.png)


    A screenshot of the creation of a new document with written codes.


    Figure 2-5


    Creation of New Document


    Populate `ID` field with `users/`, and for the value of field `Name` in `JSON`
    body, you can fill in the arbitrary string, as shown in Figure [2-6](#514303_1_En_2_Chapter.xhtml#Fig6).


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig6_HTML.png)


    A screenshot of the new document population. An arbitrary string of 4 lines indicates
    the user name and the I D field is populated with users forward slash.


    Figure 2-6


    Populating New Document


    After you click on the `Save` button, your `Document` will be created, and you
    will see details of this new `Document` , like in Figure [2-7](#514303_1_En_2_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig7_HTML.jpg)


    A screenshot depicts new document content. The screen indicates the users details
    after the document is saved.


    Figure 2-7


    Content of a New Document


    There are few interesting things to notice here, so let’s go over each of them.


    Above `Save`, `Clone,` and `Delete` buttons , value `users/0000000000000000001-A`
    is the `ID` that was generated for you. As you remember, you populated `users/`
    in the `ID` field. `RavenDB` took this value as a prefix of future `ID`, generated
    unique suffix `0000000000000000001-A`, and appended it to your prefix. Once assigned,
    `ID` cannot be changed – it is a unique identifier for this `Document`.


    You will also notice your prefix `users/` appearing in two more places. One is
    the left column, where you can see that the new collection `Users` was created,
    and your newly created `Document` is placed in it. But, where is this collection
    affiliation stored? The answer lies within the `@metadata` property :


    ```json

    "@metadata": {

    "@collection": "Users"

    }

    ```


    As you can see, `@metadata` is essentially just one more `JSON` property. The
    only difference from other properties is that `@metadata` is a reserved name.
    All `RavenDB` system names start with `@` sign, so they will not clash with your
    properties. Within `@metadata` , property `@collection` contains the name of the
    collection.


    Figure [2-5](#514303_1_En_2_Chapter.xhtml#Fig5) is showing just a partial view
    of `JSON` that represents your `Document`. However, `RavenDB` Studio has functionality
    that you can use to inspect raw and complete `JSON`. As shown in Figure [2-8](#514303_1_En_2_Chapter.xhtml#Fig8),
    in the area above your document content, there is a `Show raw output` icon .


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig8_HTML.jpg)


    A screenshot depicts the icon of show raw output, of a document that was modified
    in less than a minute.


    Figure 2-8


    Show Raw Output Icon


    Clicking on this icon will open new browser tab, showing complete raw `JSON` of
    your `Document`:


    ```json

    {

    Name: "John",

    @metadata: {

    @collection: "Users",

    @change-vector: "A:1-4Ocnef4WVEaQ9NeWn3Yhig",

    @id: "users/0000000000000000001-A",

    @last-modified: "2021-05-05T20:05:53.1467758Z"

    }

    }

    ```


    You are now able to see all system properties that `@metadata` contains :


    *   `@collection` - the name of the collection where your `Document` will be placed
    in.


    *   `@change-vector` – change vector. This is a more advanced concept, but we
    will briefly mention that change vector provides means to partially order changes
    of the same `Document` across multiple nodes in a database cluster.


    *   `@id` – identifier of your `Document`.


    *   `@last-modified` – `UTC` timestamp of the last change to `Document`.'
