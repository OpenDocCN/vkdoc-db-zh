    "Company": "ACME",

    "Total": 496,

    "Lines": [

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    },

    {

    "ProductName": "Aniseed Syrup",

    "PricePerUnit": 10,

    "Quantity": 4

    }

    ]

    }

    ```


