- fmt: '## Static MapReduce Indexes


    The previous chapter introduced the concept of static Map indexes. They are a
    natural extension of Map indexes, providing a way to map documents and then specify
    how to aggregate those maps. It is also possible to write static MapReduce indexes.
    This section will recreate a static version of automatic index `Auto/Orders/ByCountReducedByShipTo.Country`.


    Start by creating map index, as shown in Listing [6-3](#514303_1_En_6_Chapter.xhtml#PC8):


    ```

    map("Orders", order => {

    return {

    Country: order.ShipTo.Country

    }

    })

    Listing 6-3

    Orders/ByCountry map index

    ```


    This index is not much different from the `Employees/ByFirstName` index in the
    previous chapter – for every order document, RavenDB will create one indexing
    entry with `Country` value.


    Final goal of this static index is to count totals, so let’s expand mapping with
    numbers that you will aggregate later on, as in Listing [6-4](#514303_1_En_6_Chapter.xhtml#PC9):


    ```

    map("Orders", order => {

    return {

    Country: order.ShipTo.Country,

    Count: 1

    }

    })

    Listing 6-4

    Expanding Orders/ByCountry map index with count

    ```


    Raw indexing entries for such expanded map index can be found in Figure [6-9](#514303_1_En_6_Chapter.xhtml#Fig9).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig9_HTML.png)


    A snapshot of the index orders by countries.


    Figure 6-9


    Raw Indexing Entries for Expanded Map Index `Orders/ByCountry`


    This index is now performing the same task that you would do manually – going
    one by one order and writing down every occurrence of each country from `ShipTo.Country`
    field. After writing down marks of this kind for all orders, you would go back
    and sum it up. And that is precisely what the reduction phase of the MapReduce
    index does.


    To add reduction script, open index for editing and click on Add Reduction button.
    New panel will open and you can add JS code for reducing all mappings that are
    emitted by map function. Code for this is visible in Listing [6-5](#514303_1_En_6_Chapter.xhtml#PC10):


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    var country = group.key;

    var count = 0;

    group.values.forEach(el => {

    count += el.Count;

    })

    return {

    Country: country,

    Count: count

    }

    })

    Listing 6-5

    Reduction code for index Orders/ByCountry

    ```


    Figure [6-10](#514303_1_En_6_Chapter.xhtml#Fig10) shows the final form of the
    Orders/ByCountry MapReduce index.


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig10_HTML.png)


    A snapshot of the code for the orders by country.


    Figure 6-10


    MapReduce Index `Orders/ByCountry`


    Reduce script from Listing [6-5](#514303_1_En_6_Chapter.xhtml#PC10) can be refactored.
    Refactoring is the process of changing implementation without changing behavior.
    Let’s reorganize the code to make it more concise.


    First, you can replace imperative `forEach` loop defined in Listing [6-8](#514303_1_En_6_Chapter.xhtml#PC26)
    with functional equivalent based on `reduce` function:


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    var country = group.key;

    var count = group.values.reduce((res, el) => res + el.Count, 0);

    return {

    Country: country,

    Count: count

    }

    })

    ```


    Reduce method may look strange, but it is the declarative equivalent of an imperative
    `for loop`. It operates on arrays in JavaScript and has the following form:


    ```

    array.reduce(reducer, initialValue);

    ```


    Reduce method starts with `initialValue` (in our case, zero) and then applies
    `reducer` action over all elements of an array. You can think of a reducer this
    way:


    ```

    reducer(result_from_previous_call, arrayElement) => new_result

    ```


    In the first application, there is no result from the previous call, so that `initialValue`
    will be used, and the first element of the array will be consumed, resulting in


    ```

    var res0 = reducer(0, arr[0])

    ```


    After that, the next array element will be processed:


    ```

    var res1 = reducer(res0, arr[1])

    ```


    This process will continue until all array elements are processed. Hence, we iterated
    over all array elements in a recursive declarative way.


    Reducer function itself is simple addition of two arguments:


    ```

    reducer(accumulatedValue, el) = accumulatedValue + el.Count

    ```


    As a second and final step in refactoring of reduction phase of our index, you
    can inline `country` and `count` variables:


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Count: group.values.reduce((res, el) => res + el.Count, 0)

    }

    })

    ```


    At this point, the automatic index `Auto/Orders/ByCountReducedByShipTo.Country`
    is replicated with static index `Orders/ByCountry`, so you can find out how many
    shipments went for Finland:


    ```

    from index ''Orders/ByCountry''

    where ''Country'' = ''finland''

    ```


    or to get a listing of all countries with more than 80 orders shipped to


    ```

    from index ''Orders/ByCountry''

    where ''Count'' > 80

    ```


    ## Static Versus Automatic Indexes


    You just spent some effort implementing a static alternative to the index that
    was created automatically by RavenDB, and you may ask yourself, “why?” Indeed,
    if RavenDB can do the work on its own, what is the point?


    There are several reasons why you would want to take control over index creation
    and its definition. Two of the most important reasons are discussed in the following
    sections.


    ### Moment of Initial Indexing


    Upon creating an index (both automatic and static), initial indexing will be performed.
    All documents will be fetched from the disk and processed by the index. If the
    indexed collection is empty, the newly created index will be ready immediately.
    However, if the collection is not empty, processing all documents will take a
    certain amount of time.


    Executing query from Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3) will trigger
    the creation of an automatic index, and depending on the number of orders in the
    database, the initial indexing process may take a significant amount of time.
    While the indexing process is underway, the index will be `stale`. This means
    that the index contains many indexing entries, but this set is still incomplete.
    As a result, queries executed over the stale index may also return an incomplete
    result set. For example, following query


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```


    might omit some countries because not all orders have been processed yet. In this
    situation, RavenDB may wait up to 15 seconds for the index to become nonstale.
    After 15 seconds, if the index is still stale, you will get partial results set,
    and indexing will continue in the background. The reasoning behind this decision
    is simple – instead of reporting an error, RavenDB will return a potentially incomplete
    result set with notification that some of the results might be missing.


    In the production environment, you usually want to deploy or create indexes on
    live databases, wait for indexing processes to complete, and then deploy code
    using these new indexes.


    With static indexes, you take more control over this process. Unlike automatic
    ones created on the first query, static indexes are explicitly defined. Hence,
    the indexing process will start after saving the static index definition. Overall,
    static indexes are more explicit and predictable, and you will create them intentionally
    before querying the database.'
