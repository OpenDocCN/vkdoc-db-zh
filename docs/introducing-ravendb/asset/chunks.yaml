- fmt: '## A Brief History of Databases


    Since the first days of computing, machines have produced computation results
    and persisted them. Over time, different solutions for storing data emerged. Still,
    all these systems were tightly coupled to hardware and operating system to maximize
    the speed at the expense of flexibility and standardization. As hardware continued
    to evolve, this compromise was increasingly unnecessary, and many general-purpose
    DBMS emerged. One of the first such systems, Integrated Data Store (IDS), was
    developed by Charles Bachman in the early 1960s, using the `Navigational Database
    Model`.


    In June of 1970, Edgar F. Codd published the seminal paper “A Relational Model
    of Data for Large Shared Data Banks,” where he introduced the `Relational Database
    Management System` (`RDBMS`). The importance of his groundbreaking idea lies in
    the concept of describing data only with its natural structure, avoiding the need
    to superimpose any additional structures for low-level machine representation.
    This high level of data representation provides a basis for high-level data language,
    giving such programs independence from low-level details of machine representation
    and `RDBMS` internal data organization.


    Unlike the navigational approach that required programs to loop to collect records,
    Codd’s solution provided set-oriented declarative language. This approach led
    to the birth of `Structured Query Language` - `SQL` - in 1974. Following this
    standardization, Oracle released the first commercial implementation of `SQL`
    in 1979.


    A landmark year for the relational model was 1980 when IBM released their product
    for mainframes, and smaller vendors began selling second-generation relational
    systems with great commercial success. During the 1980s, `RDBMS`es finally came
    of age and established themselves as the first choice for large datasets typically
    present in government agencies and financial institutions. Furthermore, relational
    persistence became a default pick by developers around the world.


    ### Problems with Relational DBMS


    However, as is the case with any technology, there is no such thing as a “silver
    bullet.” Various problems are calling for different solutions. Non-relational
    databases, which existed before relational databases became dominant persistence
    solutions, continued to live. Since the late 1960s, hierarchical, graph, and object-oriented
    databases have been around. The reason for this is that `RDBMS` has several challenges:


    *   Relational databases work best with structured data stored in well-organized
    tables. For unstructured data, tables with fixed predefined schema are not the
    best choice.

    *   Users can scale a relational database by running it on more powerful (and
    expensive) servers. This approach is “scaling up” and is feasible up to a certain
    point. After that, a database must be distributed across multiple servers – “scaling
    out.” Relational databases are inherently single-server databases, and distributed
    solutions are not elegant and seamless.

    *   Relational databases do not natively support data partitioning and distributed
    setup. `ACID` transactions that are the basis of `RDBMS` are fundamentally clashing
    with distributed computing.


    ### Impedance Mismatch


    When developing computer software, developers are modeling data structures that
    represent an abstraction of the real-life domain. These models (which are part
    of objects in object-oriented languages) are nonlinear and almost always contain
    complex constructs like collections of primitive values or nested objects containing
    other primitive values. On the other hand, many popular relational databases cannot
    store anything beyond scalar values (like numbers and strings). As a result, relational
    databases cannot directly store and manipulate your objects and data structures.
    This incompatibility is a very well-known phenomenon and has been named `impedance
    mismatch`.


    Before you can store your objects into a relational database, you need to transform
    them into a set of structures matching your `RDBMS` schema. And the other way
    around - data in tables and rows need to be manipulated and reshaped to populate
    objects. So, storing things into a relational database and fetching them again
    require a process of two-way translation.


    This translation occurs between two models - your (usually object-oriented) domain
    model and tabular model intended for saving into your database.


    Hence, developers need to create an additional data model and provide a bidirectional
    translation service. Also, every time they make corrections or changes to their
    primary domain model, they need to update this translation logic. Modeling twice
    and maintaining translation service are a nontrivial task that will make changes
    harder, and that will make you move slower in the face of ever-coming change requests
    from your customers.


    ### Object-Relational Mappers


    `Object-relational mapper` (`ORM`) is a tool that can automate this tedious task
    of translating the data from its relational representation into the object model
    used by the application. However, as every developer using many of numerous `ORM`s
    like `Hibernate` or `Entity Framework` knows, there are many downsides to these
    libraries:


    *   `ORM` is abstracting away `RDBMS` details, so over time developer inevitably
    starts thinking about the database as a collection of data in memory.

    *   Generated `SQL` statements are inferior to handwritten `SQL`.

    *   There is an inevitable overhead of `ORM`.

    *   Initial configuration of `ORM` can be complicated.


    In his 2006 blog post “The Vietnam of Computer Science,” Ted Neward wrote


    > `Object/Relational Mapping` is the Vietnam of Computer Science. It represents
    a quagmire which starts well, gets more complicated as time passes, and before
    long entraps its users in a commitment that has no clear demarcation point, no
    clear win conditions, and no clear exit strategy


    Indeed, over time as your application grows and expands, `ORM` usage will lead
    to the accumulation of antipatterns.


    `Select N+1` is just one of those antipatterns. Your code will first fetch `N`
    entities from the database, then iterate over this collection, making additional
    calls for every object to bring other referenced things. A typical example would
    be a web page where you are rendering the list of articles. Each of these articles
    has comments, and you need to make an additional call to the database to fetch
    the latest comment to show along with each piece. Furthermore, you would like
    to display the location of the comment author. As you can see, there is a cascading
    set of parent-child relations, and in every step, you are accessing the next level,
    descending hierarchy, and making more and more calls.'
