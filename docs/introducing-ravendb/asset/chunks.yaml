  trans: '

    # 如何开始？


    开始使用 RavenDB 最简单的方式是打开浏览器并访问 [`http://live-test.ravendb.net/`](http://live-test.ravendb.net/)。展现在你面前的将是
    RavenDB Studio。


    ![](img/514303_1_En_1_Fig1_HTML.png)


    一张 Raven D B Studio 的截图，左侧显示 5 个标签页，右侧显示 5 个小窗口。窗口标题分别为：流量、数据库、C P U 和内存、索引以及存储。标签页包括：数据库、服务器仪表板、集群仪表板、管理服务器和关于。


    图 1-1


    RavenDB 游乐场服务器 Studio


    你在图 1-1 中看到的就是 RavenDB Studio，这是一个用于管理你的 RavenDB 服务器的 Web 应用程序。如你所见，无需安装任何东西——你的服务器为你提供了一个可通过所有主流
    Web 浏览器访问的 Web 应用程序。


    游乐场服务器是 RavenDB 的一个公共实例，无需认证即可供所有人使用。你可以创建新的数据库，随意操作，并评估 RavenDB 的工作方式。


    注意


    请勿将游乐场服务器用于除评估 RavenDB 之外的任何目的。请勿在任何数据库中存储任何敏感数据。这些数据库未受保护，世界各地任何人都可以访问、查看所有数据库以及读取和修改数据。此外，所有数据库会定期清除。


    在你的机器上运行 RavenDB 最简单的方式是使用 Docker。如果你的机器上已经安装了 Docker，你只需运行以下命令：


    ```

    docker run -d -p 8080:8080 -p 38888:38888 -e RAVEN_ARGS="--Setup.Mode=None --License.Eula.Accepted=true"
    ravendb/ravendb

    ```


    Docker 将获取最新的 RavenDB 镜像，并启动一个新容器来运行此镜像。现在，如果你打开 `http://127.0.0.1:8080/`，你将在浏览器中看到
    Studio。


    注意


    你现在正以开发人员模式运行 RavenDB。此模式下未强制执行任何身份验证或授权。开发人员模式是 RavenDB 唯一允许未经验证访问的情况。


    你也可以在 Windows、Linux、OSX 甚至 Raspberry Pi 上原生运行 RavenDB。


    例如，要在 Windows 机器上设置 RavenDB，请访问 [`https://ravendb.net/download`](https://ravendb.net/download)，选择“Windows
    64”平台，并下载 zip 压缩包。解压后，执行 `run.ps1` 文件，你将启动 RavenDB。


    ![](img/514303_1_En_1_Fig2_HTML.png)


    一张 Windows PowerShell 的截图，显示 Raven D B 控制台。其中有多行文本，显示构建版本和规格。


    图 1-2


    Windows 中的 RavenDB PowerShell 控制台


    如图 1-2 所示，服务器将在 IP 地址 `127.0.0.1` 上运行，并且默认浏览器将打开并显示 RavenDB 最终用户许可协议。


    ![](img/514303_1_En_1_Fig3_HTML.png)


    一张窗口截图，显示在安装 Raven D B 软件过程中的最终用户许可协议。右下角有一个接受按钮，用于完成安装。


    图 1-3


    默认浏览器中的 RavenDB 许可协议


    接受图 1-3 所示的许可协议后，你将看到安装向导的第一步。


    ![](img/514303_1_En_1_Fig4_HTML.png)


    一张 Raven D B 安装向导窗口的截图。它显示了两种设置安全选项，每种选项都有详细说明。


    图 1-4


    RavenDB 安装向导，第一步


    由于你将出于开发目的运行本地实例，你可以选择“不安全”模式，如图 1-4 所示。这将引导你进入安装向导的第二步——不安全模式设置。


    ![](img/514303_1_En_1_Fig5_HTML.png)


    一张 Raven D B 安装向导、不安全模式设置页面的截图。它有 3 个文本框，标签分别为：H T T P 端口、T C P 端口和 I P 地址。下方有一个创建新集群的选项，底部有
    2 个按钮，分别标为“上一步”和“下一步”。


    图 1-5


    RavenDB 安装向导，第二步


    接受图 1-5 所示的默认选项，并点击 `下一步`，将带你进入设置过程的第三步，也是最后一步。


    ![](img/514303_1_En_1_Fig6_HTML.png)


    一张 Raven D B 安装向导第三步的截图，显示已完成的配置，以及一个重启服务器或返回的选项。


    图 1-6


    RavenDB 安装向导，第三步也是最后一步


    在你能够开始在 Windows 下使用本地 RavenDB 实例之前，只需再完成一步，如图 1-6 所示。点击 `重启服务器` 按钮将重启服务器并重新加载你的浏览器窗口。最后，`http://127.0.0.1:8080/studio/index.html`
    将会打开，你将看到与图 1-1 相同的屏幕。

