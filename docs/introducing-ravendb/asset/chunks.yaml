  trans: '

    ### 规范化


    `规范化`是一种建模技术，是 Codd 关系数据库模型的核心组成部分。20 世纪 70 年代初，存储成本高昂，消除数据冗余是数据库系统设计者的关键设计考量。


    Codd 定义了第一（`1NF`）、第二（`2NF`）和第三（`3NF`）`范式`，作为数据建模最佳实践的理论基础。通过应用`3NF`原则，你可以通过将记录分解到最原子化的形式、将这些片段存储在不同的表中、然后通过`外键`（`FK`）将它们关联起来，从而消除冗余。


    `FK`不过是一个指针。例如，在`Customers`表中存储客户信息时，你会将他们的地址分离出来并保存在`Address`表中。然后，你会创建一个`FK`来连接这两个表，以建立`Customers`表中的行与包含客户地址的`Address`表中的行之间的关系。


    在发展出消除数据冗余的规范化概念后，Codd 构建了规范化的数学理论，并提供了关于`3NF`能够保证数据一致性以及在插入、更新和删除行时防止异常的理论保证。


    如今，存储成本低廉。不仅如此，你的服务器 RAM 很可能拥有数十 GB 的可用内存，通常与你的数据库大小相当。优秀的`DBMS`会检测到这一点，并通过将数据库的大部分加载到工作内存中来进行优化。因此，随着时间的推移，作为规范化动机的冗余逐渐消失，如今你只会听到关系数据库支持者在讨论数据库一致性时才会提及`3NF`。


    然而，规范化会导致几个问题，其中有两个是主要问题。


    第一个挑战与`投影`有关。每次你需要显示一个包含复杂数据的网页时，你都必须创建一个投影——即来自不同表的行的组合。例如，要显示一张发票，你将需要合并来自多个表的数据，包括`Invoices`、`Customers`、`Addresses`、`Products`和`Employees`。连接五个表并不是一个繁重的操作。但是，一旦你的数据库加载了数万张发票，并且你开始创建用于回答诸如“我们出口最多的前
    5 个国家是哪些”这类问题的聚合查询时，你将会注意到`RDBMS`的性能下降。因此，关系数据库中的投影给开发者和数据库本身都带来了负担。


    规范化的第二个主要问题是`时间快照`。正如我们已经提到的，`RDBMS`以其坚实的理论背景为傲，这保证了数据不会被破坏。然而，一个简单的例子将向你展示，在数据随时间变化的情况下，规范化是多么脆弱。回到用规范化方法建模的发票故事，我们可以看到`Invoices`存在于一个表中，指向`Companies`表。此外，`Companies`与包含所有国家列表的`Countries`表相关联。这样，`Invoices`通过`Companies`与`Countries`建立关系。现在，想象一下`Company`从伦敦搬迁到柏林——你需要进入`Companies`表，并将与`Countries`表相关的`FK`更改为指向包含德国的行。


    这个简单的更改本不应产生严重的后果。然而，由于规范化的建模方式，你刚刚执行的修改会产生连锁反应。虽然你在这个过程中没有触及`Invoices`，但它们受到了影响，因为它们与更改了地址的`Company`相关联。结果，下次你重复那个聚合查询“我们出口最多的前
    5 个国家是哪些”时，你可能会发现英国不再位列其中。换句话说——通过简单地更改一个`Company`的地址，你在历史数据层面引入了数据损坏。


    规范化无法对此类时间依赖性进行建模。要存储发票的快照，你将不得不应用反规范化过程。最终，我们可以得出结论：规范化非但没有带来承诺的数据一致性和有效性，反而会破坏你的历史数据。


    ### 现代 Web 应用程序


    在 20 世纪 70 年代和 80 年代，到达你应用程序的数据是可预测且高度结构化的。随着互联网的出现和用户群的全球化，事物开始更快地发展。今天，现代互联网应用程序服务于广泛的用户群体，提供多种服务并快速发展。拥有数百个并发用户的应用程序已不足为奇。


    二三十年前，你只有在部署到大型企业的应用程序中才会体验到这种情况。三十年前，你会收到一份`需求规格说明书`，其中精确定义了需要存储在关系数据库中的数据模式。然后你会应用瀑布模型，花费数月时间来实现它，最终发布。今天，你在为期
    2 周的冲刺中工作，变更请求在交付可工作功能后几天内就会到来。


    关系数据库在本质上是为写入数据而优化的。读取数据是次要优先级。现代 Web 应用程序通常会存储一次数据，然后在进行下一次写入之前请求它数十次或数百次。在写入过程中被拆解成原子单元并存储在数十个表中的数据，现在需要重新组装，以生成用于在网页上呈现信息的模型。而且这不仅仅发生一次。成千上万的
    Web 应用程序访问者将触发许多这样的调用。


    渲染现代网页会产生许多对数据库的请求。这些请求页面的用户也会与你的应用程序交互并生成需要存储的新数据。想想二十年前的一家小型夫妻店——他们运行一个`POS`系统，交易数量受到物理因素的限制——顾客排队，一次只能服务一个顾客。小店设法生存并扩展，现在它已上线。不再有物理性质的限制；它们现在处于一个虚拟世界中，50
    个顾客可以在 3 分钟内完成购买。


    关系数据库模型构思于不同时期——读取请求较少，用户不那么频繁，数据高度结构化，应用程序变更节奏缓慢。可以说，现状恰恰相反。


    ## NoSQL


    我们刚才描述的问题随着时间的推移只会变得更加棘手。随着变更请求的节奏加快，随着用户数量和数据量的指数级增长，很明显我们需要一些替代方案。显而易见，`RDBMS`并非在所有情况下都是最合适的解决方案，一些系统需要不同的数据存储和查询方法。


    本节将探讨在 20 世纪 90 年代和 21 世纪初兴起的演变，这种演变导致了`NoSQL`运动的产生。我们将审视`NoSQL`作为一个术语的起源、此类数据库的优势和挑战，以及最终，这场运动对整个行业的更广泛影响。

    '
- fmt: '### Origins of “NoSQL” Name


    `NoSQL` databases are a further evolution of databases. You could say that databases
    you can characterize as “non-relational” existed before the invention of `RDBMS`.
    However, the NoSQL movement is not returning to these historical solutions; they
    represent further advancement in data persistence solutions.


    Ironically, the NoSQL acronym was first used as a name of Relational Database
    Management System built by Carlo Strozzi in 1998\. NoSQL name was inspired by
    the fact that this system was not a database but rather a shell-level tool, with
    data in regular `UNIX` ASCII files that various `UNIX` utilities and editors could
    manipulate. Hence, the intentional lack of support for `SQL` as a query language
    was an inspiration for the name.


    Johan Oskarsson was the first to use “NoSQL” that we recognize today. He was seeking
    a name for a meetup he organized in San Francisco in June 2009\. This meetup showcased
    a number of non-relational distributed databases. In subsequent months and years,
    the term “NoSQL ” was adopted, but it was never standardized or defined precisely,
    so we can only discuss some general characteristics exposed by the databases belonging
    to this broad category.


    ### Why NoSQL?


    As we will see, NoSQL represents a broad category of heterogeneous approaches
    to solving problems that emerged in the late 2000s. During that period


    *   Web applications emerged, and data started arriving in all forms and shapes
    - structured, semi-structured, unstructured, and polymorphic. Defining comprehensive
    schema upfront became almost impossible, or in the best case, such attempts resulted
    in solutions that were cumbersome to work with and hard for maintenance over the
    long run.

    *   The cost of storage dramatically decreased. Data duplication on the database
    level was no longer a determining factor for creating complex and complicated
    data models. Rather than disk storage, developers and their valuable time became
    the primary cost factor of software development. Optimizing for productivity instead
    of storage space was the main driving factor.

    *   Cloud computing rose in popularity in the late 2000s and became a legitimate
    choice for hosting applications and data. As developers started distributing data
    across multiple servers, they needed a way to scale out instead of scale-up, make
    their applications resilient, and geo-distribute data in the proximity of their
    users.

    *   Agile Manifesto was gaining traction, and rapidly changing requirements were
    looked upon not as a disturbing factor but as a fact of the developer’s life that
    needs to be accepted, embraced, and incorporated into the development cycle. Software
    engineers worldwide started recognizing a need to change their code quickly, and
    reshaping of persisted data was an integral part of that effort. NoSQL databases
    found their place in this puzzle as a flexible solution that could provide less
    painful pivot and remodeling on the fly.


    ### Characteristics


    The term `NoSQL` today describes a variety of database technologies that emerged
    to cater demands of modern applications . They all share some common traits:


    *   The first and most obvious point is the negation in the name - NoSQL databases
    are not using `SQL`, in the sense of being non-relational.

    *   NoSQL databases emerged from the open source community. Although today you
    can find NoSQL solutions coming from closed-source producers like `IBM`, `Oracle`,
    and `Amazon`, in general, NoSQL databases are primarily open source projects.

    *   Most NoSQL databases are supporting cluster setup, which has a significant
    impact on their approach to consistency and data modeling.

    *   NoSQL databases do not have a mandatory schema, so fields in records can be
    added and removed without a need to define changes in the structures first.

    *   They are based on the needs of modern web applications, where a massive number
    of concurrent users can store a humongous amount of data that can have different
    shapes and form.


    These are broad characteristics, and due to the heterogeneous nature of these
    databases, there is a low chance we will ever have a definitive coherent definition.


    ### Additional Advantages


    Besides solving problems we already described, NoSQL databases are also offering
    some additional advantages :


    *   `Scaling out` - buying more powerful servers as database load increases –
    known as `scaling up` - has been a standard approach with relational databases
    over the years. However, as transaction rates and availability requirements increase,
    NoSQL databases offer a different solution. `Scaling out` is the approach of distributing
    databases across multiple servers or virtualized environments. Most `RDBMS` requests
    specialized or expensive hardware to scale up, while NoSQL databases can scale
    out cheap commodity hardware.

    *   `Economics` – traditionally , `RDBMS` has been relying on expensive proprietary
    servers and storage systems. Most NoSQL databases are open source licensed. Combined
    with the already mentioned ability to run on cheap commodity servers, even toy
    machines like `Raspberry Pi`, the total cost of ownership and cost per gigabyte
    or transactions per second are much lower with NoSQL DBMS.

    *   `Big data` - over the last decade , modern applications increased the volume
    of persisted data immensely. `RDBMS` capacity has been growing to match this demand,
    but constraints of specific relational systems became the limiting factor for
    enterprises. Presently, the capacity of “big data” NoSQL solutions like `Hadoop`
    surpasses the capabilities of the most significant `RDBMS` systems.

    *   `Administration` - NoSQL databases are, in most cases, designed from the ground
    up with clear intention to require less attention and administration compared
    to relational ones. Simpler data models, automatic maintenance, data distribution,
    and internal reconfiguration based on the environmental factors eliminate the
    need for a dedicated full-time `DBA` (Database Administrator). Despite numerous
    improvements in the manageability of relational systems, organizations using `RDBMS`
    still need the expertise of specialized personnel who will install, design, and
    maintain `RDBMS`. Of course, NoSQL databases are still requesting a certain level
    of knowledge from their users. Still, they eliminate mandatory expertise for someone
    to be able to run an efficient database-powered system.'
