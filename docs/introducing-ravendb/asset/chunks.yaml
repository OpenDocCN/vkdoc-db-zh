    inspect their documents.


    ## Summary


    In this chapter, we briefly covered the history of relational databases and their
    inception, advantages, and some shortcomings of these systems. As a next step
    in the evolution of data persistence, NoSQL databases emerged. We went over the
    motivation for creating this new class of databases, some problems they are solving,
    and their main categories. RavenDB was introduced, and we covered installation
    steps, creation of your first database, an overview of the sample dataset, and
    the very concept of JSON documents.


    In the next chapter, we will show the data modeling approach with NoSQL document
    databases, explaining how you can apply them in RavenDB. Additionally, we will
    also cover techniques for modeling NoSQL document relationships.


    # 2. Document Modeling


    Modeling is the critical process at the heart of every application development.
    We could easily dedicate a whole book to this topic, so devoting just one chapter
    to this topic inevitably leads to many omissions. However, our goal here is to
    give you a brief introduction to the process of modeling and factors affecting
    it and to explain a document-based approach.


    In this chapter, we will first look into the conceptual overview of modeling.
    After that, we will remind ourselves how we model data in relational databases,
    what affects this process, and what limitations are. Next, we will look into the
    document-based modeling approach, the ideas behind this concept, and its main
    characteristics. After that, we will address some common doubts you might have
    during a transition period from relational modeling to document-based modeling.
    Finally, you will see standard techniques to model relationships between documents
    in the NoSQL database.


    ## Abstraction and Generalization


    The British statistician George E. P. Box famously said, “All models are wrong,
    but some are useful.” This statement is true not only for mathematics and statistics
    but in every situation where we need to describe reality. From building mental
    models for understanding life events to writing invoice-processing applications
    in C#, you will always need to create a representation of reality.


    Software developers are writing computer programs that describe a particular domain
    of life and enable users to track real-life entities, their relations, and various
    ways in which these entities are affecting each other. In reality, environments
    are not *simple* (consisting of few objects) but usually *complex* (many components).


    Also, the reality is not intuitive (easy to grasp) but *complicated*. In such
    systems, connections and interactions between objects are not obvious. Many moving
    parts are highly interconnected. Consequentially, every change that happens to
    one or more entities affects them and is also propagating through the rest of
    the system. This rippling effect is hard to grasp, and those unforeseen consequences
    of changes are hard to understand and tame and describe in a programming language.


    Luckily, software developers are not helpless when faced with these challenges,
    and there are many tools and approaches we developed over the years. One of the
    most important ones is an *abstraction* . We will narrow our scope to the subdomain
    that only covers entities we are interested in when modeling. Furthermore, we
    will look at the properties of these entities and isolate major ones, ignoring
    all details which are not contributing to the representation of our subdomain.
    This process is at the heart of *abstraction* – removing various information that
    are not contributing to our understanding of the subdomain we are modeling. We
    can say that this is very similar to the process of *generalization* – selecting
    a specific group of objects, observing their common or shared properties, and
    then using these properties to describe them.


    For example, imagine that we are building an application for a small neighborhood
    bookstore. The bookstore owner intends to create a members club for customers.
    They could join in, populate their areas of interest and basic personal information,
    and receive weekly reading recommendations, exclusive discounts, and alerts about
    new arrivals of interest. Faced with the challenge of building such a service,
    you would first understand the domain, users, interactions between them, and outcomes
    your application would have to produce. Next, you would approach modeling of all
    identified entities in the system.


    Looking at just one of these entities – customer – reveals an almost endless set
    of details about them. Customers have first and last names, email addresses, and
    dates of birth. But they also have eye color, favorite perfume, and favorite restaurant.
    Coming back to our goal, which is building a book recommendation service, will
    reveal which of these customer attributes are helpful for our effort and which
    ones we can ignore. After a short conversation with a bookstore owner, we conclude
    that eye color, perfume, and restaurant choice are not affecting book choice,
    and we decide to omit them from our model.


    We can repeatedly apply this mental process to remove one by one any attributes
    irrelevant to our goal. Any model property that is not contributing to our intention
    will be removed, resulting in the simplification of our model. This way, our application
    will contain only relevant data, which will have a narrow scope. Less data means
    a simpler (less complex) model, and it will result in less complicated processes
    we need to implement. Interestingly, when modeling, we will reach a better outcome
    if we ignore the attributes of entities. Hence, a less precise and less comprehensive
    model will be better in describing our domain and serving the needs of our application.'
