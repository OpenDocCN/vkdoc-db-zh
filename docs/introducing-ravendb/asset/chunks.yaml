  trans: '

    ## 人工文档


    除了计算聚合结果并将其存储在索引中，你还可以将此类索引条目具体化（materialize）为称为 `人工文档` 的文档。它们将驻留在一个任意命名的集合中；每次索引更新时，此集合也会随之更新。本节将展示何时需要创建人工文档，介绍其配置过程，并了解如何对它们执行索引。


    查询列表 6-8 中的索引会得到如图 6-12 所示的原始索引结果。


    ![](img/514303_1_En_6_Fig12_HTML.jpg)

    *国家、公司和供应商列表的快照。*

    **图 6-12**

    `Countries/Business` 索引的原始索引条目


    现在，你可以使用索引的这两个字段，根据我们与之有业务往来的公司数量对国家进行排序：

    ```sql

    from index ''Countries/Business''

    order by Companies as long desc

    ```

    以及根据供应商数量排序：

    ```sql

    from index ''Countries/Business''

    order by Suppliers as long desc

    ```

    但是，如果我们想查看总数呢？如果你要出差，哪个城市会是你的首选？在哪个地方，你有机会拜访到最多与你公司有业务往来的实体？


    解决这个问题的一种方法是扩展索引，增加一个 `Total` 字段，用于汇总 `Companies` 和 `Businesses`，如列表 6-9 所示。

    ```javascript

    map("Companies", company => {

    return {

    Country: company.Address.Country,

    Companies: 1,

    Suppliers: 0,

    Total: 1

    }

    })

    map("Suppliers", company => {

    return {

    Country: company.Address.Country,

    Companies: 0,

    Suppliers: 1,

    Total: 1

    }

    })

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Companies: group.values.reduce((res, el) => res + el.Companies, 0),

    Suppliers: group.values.reduce((res, el) => res + el.Suppliers, 0),

    Total: group.values.reduce((res, el) => res + el.Total, 0)

    }

    })

    ```

    **列表 6-9**

    扩展了 `Total` 字段的 Countries/Business 索引


    有了扩展后的索引，你现在可以查询：

    ```sql

    from index ''Countries/Business''

    order by Total as long desc

    ```

    来获取所需的信息。


    除了扩展索引，你可能还想使用列表 6-10 中显示的查询。

    ```sql

    from index ''Countries/Business''

    order by (Companies + Suppliers) as long desc

    ```

    **列表 6-10**

    使用计算字段查询索引


    执行此查询将导致错误。


    在第 4 章中，我们讨论了 RavenDB 的索引方法——你所有的查询始终针对索引执行，并且使用预先计算好的索引条目来提供闪电般快速的数据库响应。在任何情况下，查询都不能包含任何计算。所有此类计算都必须在查询发生之前，在索引本身内部完成。正是出于这个原因，列表
    6-10 中的查询会导致错误——我们试图将 `Companies` 和 `Suppliers` 相加，然后根据该标准对国家进行排序。重新审视列表 6-9 中的扩展索引，你可以看到我们确实在索引阶段进行了总数求和。


    检查扩展前索引的原始索引条目（如图 6-12 所示），揭示了一种适合编写简单映射索引的数据结构。不幸的是，RavenDB 索引只能操作文档，不能操作其他索引中的原始索引条目。


    不过，RavenDB 提供了一种方法，可以将原始索引条目具体化为实际的文档，这样你就可以查询甚至索引它们。在下一节中，我们将展示如何实现这一点。


    ### 创建人工文档


    首先，将索引 `Countries/Business` 恢复到列表 6-8 中的状态，即在用 `Total` 字段扩展它之前的状态。当你打开索引进行编辑时，在
    `Reduce` 脚本区域的下方，有一个 `Output Reduce Results to Collection`（将 Reduce 结果输出到集合）选项，如图
    6-13 所示。


    ![](img/514303_1_En_6_Fig13_HTML.jpg)

    *公司和供应商分组值代码的快照。*

    **图 6-13**

    将索引 Reduce 结果输出到 `CountriesBusiness` 人工集合


    结果，原始索引条目（与你能在图 6-12 中看到的相同）将被提取并加载到正确的 JSON 文档中。如果你检查集合列表，你会注意到那里出现了一个新的集合——`CountriesBusiness`——如图
    6-14 所示。


    ![](img/514303_1_En_6_Fig14_HTML.png)

    *文档 ID、公司、供应商和国家列表的快照。*

    **图 6-14**

    人工集合 CountriesBusiness 中的文档


    这个集合被称为 `人工集合`，属于此集合的文档是 `人工文档`。打开其中一份文档将揭示如列表 6-11 所示的结构。

    ```json

    {

    "Country": "Finland",

    "Companies": 2,

    "Suppliers": 1,

    "@metadata": {

    "@collection": "CountriesBusiness",

    "@flags": "Artificial, FromIndex"

    }

    }

    ```

    **列表 6-11**

    一份人工文档的结构


    人工文档可以从包含索引条目的 MapReduce 或 MultiMapReduce 索引创建。如果你将图 6-12 中的原始索引条目与生成的人工集合内容进行比较，你会看到人工集合代表了索引的一个转储。人工文档将包含所有索引字段作为其属性，其元数据属性将有一个
    `flag` 标记，标明它是 `Artificial, FromIndex`（人工，来自索引）。


    每次创建新订单或更新/删除现有订单时，所有索引订单的索引都会被更新。`Countries/Business` 索引也会发生同样的情况，其聚合条目将被增量更新以考虑最新的更改。此外，由于
    `Countries/Business` 定义了输出集合，这个人工集合也将被更新。


    除了由 RavenDB 自动创建外，人工文档是完全正常的文档。因此，你可以运行如下查询：

    ```sql

    from ''CountriesBusiness''

    where Country = ''UK''

    ```

    以获取来自英国的公司和供应商数量，以及：

    ```sql

    from ''CountriesBusiness''

    where Companies > 1 and Suppliers > 1

    select Country

    ```

    以获取至少有一个公司和供应商的国家列表。


    ### 索引人工文档


    执行上一节中的两个查询后，你会发现 RavenDB 创建了自动索引 `Auto/CountriesBusiness/ByCompaniesAndCountryAndSuppliers`，这是数据库的预期行为。


    人工文档是完全常规的文档，因此也可以编写 Map 甚至 MapReduce 索引，以便在需要时处理和聚合它们。因此，为了回答我们最初关于寻找供应商和公司最多的国家的问题，我们可以首先定义映射索引
    `CountriesBusiness/Totals`，如列表 6-12 所示。

    ```javascript

    map("CountriesBusiness", entry => {

    return {

    Country: entry.Country,

    Total: entry.Companies + entry.Suppliers

    }

    })

    ```

    **列表 6-12**

    CountriesBusiness/Totals 索引


    现在，你终于可以执行一个查询，该查询将生成一个国家列表，并按业务活动数量降序排列：

    ```sql

    from index ''CountriesBusiness/Totals''

    order by Total as long desc

    select Country

    ```

    很容易看出，你下一个出差目的地应该是美国、德国和法国。

    '
- fmt: '## Summary


    本章介绍了MapReduce和MultiMapReduce索引，用于对数据进行分组和聚合。我们介绍了编写这些索引的静态版本的技术，以及将它们的内容具体化为人工文档的方法。下一章将展示如何使用RavenDB对数据进行全文搜索。


    # 7. 全文搜索


    我们在第3章已经提到过RavenDB的全文搜索功能，本章将对该章引入的概念进行扩展。我们将展示基本的搜索功能，包括运算符、通配符和排名。您将了解RavenDB索引在内部如何处理文本以提供所有这些能力。最后，我们将演示如何通过静态索引对索引过程获得更多控制并应用高级技术。


    ## 全文搜索基础


    观察现代应用程序中的标准功能，您会很快发现执行全文搜索的能力在此列表中排名很高。几乎每个应用程序都需要它。在数据量庞大的情况下，搜索能力变得至关重要；无法轻松检索的信息基本上是无用的。


    在前面的章节中，我们看到了如何基于精确匹配执行过滤——您指定属性名和值，数据库将返回具有该属性值的一个或多个文档。


    全文搜索的美妙之处在于部分匹配——您可以搜索作为文本一部分的特定术语。例如，您可以找到所有标题包含“London”的书籍，或者所有名称中包含“chocolate”的产品。您还可以指定前缀或后缀，并获取所有匹配的文档。可以传递多个术语，数据库将返回包含其中任何一个术语的文档的并集。


    让我们看看使用RavenDB搜索文本的各种方式。


    ### 单一术语


    如图7-1所示，示例数据库中产品的名称由一个或多个单词组成。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig1_HTML.jpg)


    一个包含11个产品名称和标识的表格。产品ID分别为77-A, 76-A, 75-A, 74-A, 73-A, 72-A, 71-A, 70-A, 69-A,
    68-A和67-A。


    图7-1


    产品名称


    您可以搜索豆腐产品：


    ```rql

    from "Products"

    where search(Name, ''Tofu'')

    ```


    这个查询将返回名称为`*Tofu*`和`*Longlife Tofu*`的产品。您搜索的术语可以位于产品名称的开头、结尾或任何位置；RavenDB可以轻松匹配任何位置。


    请注意，以下查询将产生相同的结果。


    ```rql

    from "Products"

    where search(Name, ''tofu'')

    ```


    在默认设置下，RavenDB中的全文搜索功能不区分大小写。


    在执行搜索之前，RavenDB会通过删除特殊字符和标点符号来规范化术语。因此，所有这些术语都将产生相同的结果：


    *   "tofu"

    *   " tofu "

    *   "-tofu,"


    ### 多个术语


    您可以搜索多个术语：


    ```rql

    from "Products"

    where search(Name, ''tofu vegie'')

    ```


    这个查询将产生如图7-2所示的结果。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig2_HTML.png)


    一个针对术语`tofu vegie`的结果表格。标记的索引列为预览、标识、名称、供应商、类别和每单位质量。


    图7-2


    术语“tofu vegie”的搜索结果


    这个查询将返回所有在名称中包含“tofu”或“vegie”的产品。您可以进一步扩展，添加更多术语：


    ```rql

    from "Products"

    where search(Name, ''tofu vegie chocolade'')

    ```


    从而，包括在`Name`属性中包含这些术语中任何一个的产品。


    ### 对复杂对象进行搜索


    RavenDB不仅可以对简单的文本字段进行搜索，还可以对复合字段进行搜索。员工地址的结构是JSON，如清单7-1所示。


    ```json

    "Address": {

    "Line1": "4726 - 11th Ave. N.E.",

    "Line2": null,

    "City": "Seattle",

    "Region": "WA",

    "PostalCode": "98105",

    "Country": "USA",

    "Location": {

    "Latitude": 47.66416419999999,

    "Longitude": -122.3160148

    }

    }

    ```

    清单7-1

    Employee文档的Address属性的嵌套结构


    您可以按员工的地址属性进行搜索，以获取所有居住在西雅图的员工：


    ```rql

    from Employees where search(Address, "Seattle")

    ```


    在这种情况下，RavenDB通过扁平化并索引来自不同级别的所有属性，正确处理了复杂的嵌套结构。


    也支持对集合进行搜索。示例数据库中的订单包含订单行集合。您可以使用以下查询搜索所有包含油炸产品的订单：


    ```rql

    from Orders

    where search(Lines.ProductName, "Fried")

    ```


    ### 通配符


    全文搜索的部分匹配提供了一种指定单词以在文本中搜索的方法。通配符可以增强部分搜索的能力——当搜索词的开头或结尾未知时，您可以替换一个或多个字母。


    因此，与其搜索所有名为`*Anne*`的员工


    ```rql

    from "Employees"

    where search(FirstName, ''Anne'')

    ```


    您可以使用通配符仅指定搜索词的一部分。以下查询将搜索任何以`*An*`为前缀的名字。


    ```rql

    from "Employees"

    where search(FirstName, ''An*'')

    ```


    执行此查询将返回`*Andrew*`和`*Anne*`。


    同样，您可以执行后缀搜索：


    ```rql

    from "Employees"

    where search(LastName, ''*an'')

    ```


    此查询将从我们的示例数据集中返回Steven Buchanan和Laura Callahan。


    最后，结合前两种方法，我们可以执行中缀搜索：


    ```rql

    from "Employees"

    where search(FirstName, ''*an*'')

    ```


    这种中缀全文搜索将返回`*Anne*`、`*Nancy*`、`*Andrew*`和`*Janet*`。


    使用通配符时，另一个需要考虑的关键因素是性能。使用前导通配符会显著降低搜索速度。当然，在小型数据集（如我们当前使用的示例数据集）上，这种减速可能并不明显。但是，随着数据库中文档数量的增加，它可能成为一个因素。因此，您应牢记这一点，并评估每个后缀全文搜索场景的理由及其潜在的负面影响。


    如果您确定应用程序需要此类搜索，有几种替代方法：


    *   创建一个静态索引，其中对文本进行反向索引，从而将前导通配符搜索（按后缀搜索）转换为尾随通配符搜索（按前缀搜索）。

    *   创建一个使用非默认分析器的静态索引。


    本章稍后将介绍第二种技术。


    ### 建议


    有时，搜索不会返回任何结果。例如，没有产品名称包含单词“chaig”，这可以通过执行以下查询来验证：


    ```rql

    from Products

    where search(''Name'', ''chaig'')

    ```


    在这种情况下，RavenDB提供了`*suggest*`功能。您可以通过调用`suggest()`函数来使用它，如清单7-2所示。


    ```rql

    from Products

    select suggest(''Name'', ''chaig'')

    ```

    清单7-2

    选择建议


    执行此查询将返回如图7-3所示的建议。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig3_HTML.png)


    一个算法图示了针对术语''chai''和''chang''的搜索结果和建议。标记的索引列为预览和名称。


    图7-3


    针对单词“chaig”的建议


    建议功能将根据计算出的距离算法值，找到与传递的术语相似的单词。如果您想实现类似Google的“您是不是要找？”建议，这非常方便。'
  raw: '## Summary


    This chapter introduced MapReduce and MultiMapReduce indexes to group and aggregate
    data. We introduced techniques for writing static versions of these indexes, along
    with a way to materialize their content into artificial documents. The next chapter
    will show how you can use RavenDB for full-text searching of your data.


    # 7. Full-Text Search


    We already mentioned the full-text search capabilities of RavenDB in Chapter [3](#514303_1_En_3_Chapter.xhtml),
    and this chapter will expand on the concepts introduced there. We will show basic
    search capabilities, including operators, wildcards, and ranking. You will learn
    what lies under the hood and how RavenDB indexes process text internally to provide
    all these capabilities. Finally, we will demonstrate how you can take more control
    over the indexing process and apply advanced techniques with static indexes.


    ## Basics of Full-Text Search


    Looking at standard features in modern applications, you will quickly realize
    that ability to perform a full-text search is high on this list. Almost every
    application needs it. With a large amount of data, the ability to search becomes
    crucial; information that is not readily retrievable is essentially unusable.


    In previous chapters, we saw how to perform filtering based on the exact match
    – you would specify the property name and value, and the database would return
    one or more documents where a property has that value.


    The beauty of full-text search is partial matching – you can search for a particular
    term that is part of a text. For example, you can locate all books with a title
    containing “London” or all products with “chocolate” in the name. You can also
    specify prefixes or suffixes and get all matching documents. It is possible to
    pass multiple terms, and the database will return a union of documents containing
    any of those terms.


    Let’s look at various ways you can search text with RavenDB.


    ### Single Term


    As you can see in Figure [7-1](#514303_1_En_7_Chapter.xhtml#Fig1), sample database
    products’ names consist of one or more words .


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig1_HTML.jpg)


    A table of 11 product names and identification. The products I D are 77-A, 76-A,75-A,
    74-A, 73-A, 72-A, 71-A, 70-A, 69-A, 68-A, and 67-A.


    Figure 7-1


    Names of Products


    You can search for tofu products:


    ```

    from "Products"

    where search(Name, ''Tofu'')

    ```


    This query will return products with the names *Tofu* and *Longlife Tofu*. A term
    you search for can be at the beginning, the end, or anywhere inside the product
    name; RavenDB will easily match any position.


    Note that the following query will produce identical results.


    ```

    from "Products"

    where search(Name, ''tofu'')

    ```


    With default settings, the full-text search feature in RavenDB is case insensitive.


    Before performing a search, RavenDB will normalize the term by removing special
    and interpunction characters. As a result, all of these terms will produce identical
    results:


    *   “tofu”


    *   “ tofu “


    *   “-tofu,”


    ### Multiple Terms


    You can search for multiple terms :


    ```

    from "Products"

    where search(Name, ''tofu vegie'')

    ```


    This query will produce results you can see in Figure [7-2](#514303_1_En_7_Chapter.xhtml#Fig2).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig2_HTML.png)


    A table of the results of the term tofu vegie. The labeled index are preview,
    identification, name, supplier, category, and quality per unit.


    Figure 7-2


    Search Results for the Terms “tofu vegie”


    This query will return all products with “tofu” or “vegie” in the name. You can
    expand this further, adding additional terms:


    ```

    from "Products"

    where search(Name, ''tofu vegie chocolade'')

    ```


    thus, including products containing any of these terms in the Name property .


    ### Searching over Complex Objects


    RavenDB can search not just over simple text fields but also over compound ones.
    The structure of an employee address is JSON, like the one in Listing [7-1](#514303_1_En_7_Chapter.xhtml#PC5).


    ```

    "Address": {

    "Line1": "4726 - 11th Ave. N.E.",

    "Line2": null,

    "City": "Seattle",

    "Region": "WA",

    "PostalCode": "98105",

    "Country": "USA",

    "Location": {

    "Latitude": 47.66416419999999,

    "Longitude": -122.3160148

    }

    }

    Listing 7-1

    A nested structure of Address property of Employee document

    ```


    You can search by Employee’s address property to get everyone who is living in
    Seattle:


    ```

    from Employees where search(Address, "Seattle")

    ```


    In this case, RavenDB correctly processed complex nested structures by flattening
    them and indexing all properties from various levels.


    Searching over collections is supported as well. Orders in our sample database
    contain a collection of order lines. You can search for all orders containing
    fried products with the following query:


    ```

    from Orders

    where search(Lines.ProductName, "Fried")

    ```


    ### Wildcards


    Partial matching of full-text search provides a way to specify a word for searching
    within the text. Wildcards can increase the power of partial searching – you can
    replace one or more letters in situations where the beginning or end of a search
    term is unknown.


    Hence, instead of searching for all employees named *Anne*


    ```

    from "Employees"

    where search(FirstName, ''Anne'')

    ```


    you can use a wildcard to specify just a portion of the search term. The following
    query will search for any first names with *An* prefix .


    ```

    from "Employees"

    where search(FirstName, ''An*'')

    ```


    Executing this query will return *Andrew* and *Anne*.


    Accordingly, you can perform a suffix search:


    ```

    from "Employees"

    where search(LastName, ''*an'')

    ```


    This query will return Steven Buchanan and Laura Callahan from our sample dataset.


    Finally, combining the previous two approaches, we can execute an infix search
    :


    ```

    from "Employees"

    where search(FirstName, ''*an*'')

    ```


    This infix full-text search will return *Anne*, *Nancy*, *Andrew*, and *Janet*.


    When using wildcards, one more critical factor to consider is performance. Using
    a leading wildcard drastically slows down searching. Of course, this slowdown
    will not be significant on small datasets (like the current sample dataset we
    are using). Still, it may become a factor as the number of documents in your database
    increases. Hence, you should bear that in mind and evaluate every suffix full-text
    search scenario, both for justification and for potential negative impact .


    If you nevertheless determine that your application needs this type of searching,
    there are a couple of alternatives:


    *   Create a static index where you would index reversed text, thus transforming
    leading wildcard searches (search by suffix) into trailing wildcard searches (search
    by prefix).


    *   Create a static index with a non-default analyzer.


    Later in this chapter, we will cover the second technique .


    ### Suggestions


    Sometimes, the search will return no results. For example, none of the products
    contain the word “chaig” in the name, which can be verified by executing the following
    query:


    ```

    from Products

    where search(''Name'', ''chaig'')

    ```


    In such situations, RavenDB offers *suggest* feature. You can use it by calling
    `suggest()` function, like in Listing [7-2](#514303_1_En_7_Chapter.xhtml#PC13).


    ```

    from Products

    select suggest(''Name'', ''chaig'')

    Listing 7-2

    Selecting suggestions

    ```


    Executing this query will return suggestions shown in Figure [7-3](#514303_1_En_7_Chapter.xhtml#Fig3).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig3_HTML.png)


    An algorithm depicts the results and searches the suggestion for the term ''chai'',
    and ''chang''. The labeled indexes are preview and name.


    Figure 7-3


    Suggestions for the Word “chaig”


    Suggest function will find words similar to the term passed, based on the calculated
    distance algorithm value. This is handy if you want to implement Google-style
    “Did you mean?” suggestions.'
