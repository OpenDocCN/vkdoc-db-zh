    and have completely different philosophies.


    If you fail to follow this advice, you will end up with an inappropriate and suboptimal
    model. That can make your life harder and make you fight your database even with
    simple tasks. However, you should treat your database not as your enemy. It would
    help if you treated it as your ally and friend. And friends are there to help.


    ### JSON Documents


    The first essential characteristic of NoSQL document databases is the format in
    which they are storing documents. For most NoSQL databases, JSON is either a native
    or supported format. Specified in the early 2000s by Douglas Crockford, JSON stands
    for JavaScript Object Notation . This format is textual, standardized by ECMA,
    and even though it is a subset of JavaScript, JSON is language-independent.


    Returning to our example of Order with Order Lines, we can represent it in JSON
    format in the following way:


    ```

    {

    "Company": "ACME",

    "Total": 496,

    "Lines": [

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    },

    {

    "ProductName": "Aniseed Syrup",

    "PricePerUnit": 10,

    "Quantity": 4

    }

    ]

    }

    ```


    Unlike relational databases, we do not have technical limitations forcing us to
    split this Order into multiple entities. Furthermore, JSON is an industry-standard
