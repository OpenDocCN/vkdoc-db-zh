    Figure 1-15


    JSON Document


    If you have been working with relational databases, this is not a familiar sight.
    There are no columns. The whole document is one JSON structure. *Lines* property
    is an array consisting of JSON objects. Scroll down, and you will see the *ShipTo*
    property, which contains a complex nested JSON structure.


    Comparing this document to the usual RDBMS modeling, you will find out that we
    did not have to split it into several pieces to satisfy the tabular nature of
    relational databases. *Company* and *Employee* properties, for example, are references
    to other documents in this database, but they are not special properties – they
    are just simple strings.


    Document-based modeling is an important topic which we will cover in more detail
