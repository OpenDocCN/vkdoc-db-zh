  trans: '

    ### “NoSQL”名称的由来


    `NoSQL` 数据库是数据库的进一步演进。可以说，在`RDBMS`发明之前，就已经存在可以定性为“非关系型”的数据库。然而，NoSQL 运动并非回归这些历史解决方案；它们代表了数据持久化解决方案的进一步发展。


    颇具讽刺意味的是，NoSQL 这个缩写词最初是用作卡洛·斯特罗齐于 1998 年构建的一个关系数据库管理系统的名称。NoSQL 这个名称的灵感来源于该系统并非传统数据库，而是一个
    Shell 层级的工具，数据以常规的`UNIX` ASCII 文件形式存储，可以使用各种`UNIX`实用程序和编辑器进行操作。因此，其刻意不支持`SQL`作为查询语言，便成了命名的灵感来源。


    约翰·奥斯卡松是首位使用我们今天所认可的“NoSQL”一词的人。他当时在为 2009 年 6 月在旧金山组织的一个聚会寻求一个名称。该聚会展示了多种非关系型分布式数据库。在随后的几个月和几年里，“NoSQL”一词被广泛采用，但它从未被标准化或精确定义，因此我们只能讨论属于这一广泛类别的数据库所表现出的一些普遍特征。


    ### 为何需要 NoSQL？


    正如我们将看到的，NoSQL 代表了解决 2000 年代末期出现问题的一系列广泛的异构方法。在那段时期：


    *   Web 应用兴起，数据开始以各种形式和样貌涌现——结构化、半结构化、非结构化和多态。预先定义全面的模式变得几乎不可能，或者往好了说，这类尝试最终产生的解决方案操作繁琐且长期维护困难。

    *   存储成本急剧下降。在数据库层面进行数据重复不再是创建复杂数据模型的决定性因素。开发人员及其宝贵时间，而非磁盘存储，成为了软件开发的主要成本因素。以提升生产力而非节省存储空间为目标进行优化，成为了主要的驱动因素。

    *   云计算在 2000 年代末期日益普及，并成为托管应用和数据的合理选择。随着开发人员开始将数据分布到多个服务器上，他们需要一种能够**横向扩展**而非**纵向扩展**的方式，使其应用具备弹性，并将数据**地理分布式**地部署在用户附近。

    *   《敏捷宣言》获得了广泛认可，快速变化的需求不再被视为干扰因素，而是被视为开发人员生活中需要接受、拥抱并纳入开发周期的事实。全球的软件工程师开始认识到需要快速修改代码，而重塑持久化数据是其中不可或缺的一部分。NoSQL
    数据库作为一种灵活的解决方案，在这个难题中找到了自己的位置，它可以提供更少痛苦的即时转向和建模调整能力。


    ### 特征


    `NoSQL`一词如今描述的是为满足现代应用需求而出现的各种数据库技术。它们都具有一些共同特征：


    *   首先也是最明显的一点是名称中的否定含义——NoSQL 数据库不使用`SQL`，即属于非关系型。

    *   NoSQL 数据库源于开源社区。尽管如今你也能找到像`IBM`、`Oracle`和`Amazon`这样的闭源厂商提供的 NoSQL 解决方案，但总体而言，NoSQL
    数据库主要仍是开源项目。

    *   大多数 NoSQL 数据库支持集群设置，这对它们的一致性处理和数据建模方式产生了重大影响。

    *   NoSQL 数据库没有强制性的模式，因此记录中的字段可以在无需先定义结构变更的情况下进行添加和删除。

    *   它们基于现代 Web 应用的需求而构建，在这类应用中，海量并发用户可以存储形态各异的海量数据。


    这些是宽泛的特征，并且由于这些数据库的异构性质，我们很可能永远无法得到一个明确、连贯的定义。


    ### 额外优势


    除了上述已描述的问题外，NoSQL 数据库还提供了一些额外优势：


    *   **横向扩展**——随着数据库负载增加而购买更强大的服务器（即所谓的**纵向扩展**）多年来一直是关系型数据库的标准做法。然而，随着事务速率和可用性要求的提高，NoSQL
    数据库提供了一种不同的解决方案。**横向扩展**是将数据库分布在多个服务器或虚拟化环境中的方法。大多数`RDBMS`需要专门或昂贵的硬件来纵向扩展，而 NoSQL
    数据库则可以在廉价的商用硬件上横向扩展。

    *   **经济性**——传统上，`RDBMS`依赖于昂贵的专有服务器和存储系统。大多数 NoSQL 数据库采用开源许可。结合前述的在廉价商用服务器（甚至像`Raspberry
    Pi`这样的玩具机器）上运行的能力，NoSQL 数据库管理系统的总拥有成本以及每 GB 或每秒事务的成本都要低得多。

    *   **大数据**——在过去十年中，现代应用极大地增加了持久化数据的体量。`RDBMS`的容量一直在增长以满足这一需求，但特定关系系统的限制成为了企业的制约因素。目前，像`Hadoop`这样的“大数据”NoSQL
    解决方案的容量已经超过了最大型`RDBMS`系统的能力。

    *   **管理**——NoSQL 数据库在大多数情况下从设计之初就明确旨在比关系型数据库需要更少的关注和管理。更简单的数据模型、自动维护、数据分发以及基于环境因素的内部重新配置，消除了对专职`DBA`（数据库管理员）的需求。尽管关系系统在可管理性方面有了诸多改进，但使用`RDBMS`的组织仍然需要专业人员的专门知识来安装、设计和维护`RDBMS`。当然，NoSQL
    数据库仍然要求用户具备一定程度的知识，但它们消除了能够运行一个高效的数据库驱动系统所必需的强制性专业知识。

    '
- fmt: '### Challenges


    No technology is a silver bullet, and the adoption of any new technological paradigm
    has other aspects. Here are some challenges related to the adoption of NoSQL databases:


    *   *Maturity* - RDBMS has been around for over four decades now. They are well
    developed, mature, and stable, reassuring for most of the users. The mentality
    of the expression “nobody ever got fired for buying `IBM`” from the 1970s lives
    up to this day - RDBMS is perceived as a “safe choice,” and NoSQL is looked upon
    as gambling with new “cool” technology. From the perspective of many companies,
    NoSQL is a unique, young technology, cutting edge that may be exciting for developers,
    but a big unknown in production.


    *   *Support* - in case of a system failure, competent and timely support is vital
    for every organization’s business continuity plan. All RDBMS vendors go to great
    lengths to provide such support. On the other hand, many NoSQL products are open
    source and lack business entities that offer support options. When they exist,
    these companies are small startups without global presence, support resources,
    or credibility of an `IBM`, `Oracle`, or `Microsoft`.


    *   *Analytics and business intelligence* - data presents a valuable resource
    for every Company. They are analyzing data, mining, and making conclusions that
    improve their decision-making processes, efficiency, and, as a result, profitability
    in the market. Business intelligence (BI) is a strategic area for most companies.
    Over the years, the primary functionality of RDBMS has been augmented by a rich
    ecosystem of products offering additional BI services for analysis of the data.
    It is only recently that NoSQL DBMS started to catch up, offering similar solutions.


    ### Outcome


    The emergence of NoSQL databases did not eliminate the need for relational databases.
    Instead, it helped us reach a nondogmatic and balanced standpoint that there are
    other legitimate and reliable choices for data persistence.


    This mental liberation started in 2006 when Neal Ford coined the term `Polyglot
    Programming`. This idea promotes implementing applications in multiple languages,
    understanding that specific problems could be solved in more straightforward and
    more convenient ways via different languages. Simply said - different programming
    languages are more suitable than others in solving particular problems.


    `Polyglot persistence` is a concept that follows the same philosophy. Different
    situations and circumstances may call for other ways to model and store persisted
    data. Also, very often, one business domain can be split into multiple subdomains.
    Various data models might be the best representation of different subdomains.
    Polyglot persistence philosophy acknowledges this and eliminates compromising
    on data models to squeeze them all inside just one database.


    So, instead of selecting a relational database for your next project as a default
    solution without too much thinking, you need to consider the nature of the data,
    business scenarios, and how you plan to manipulate data and then consider the
    best match among various technologies for persisting data. Consequently, organizations
    are moving from the concept of the database as an integration point and coming
    toward application databases, ending up with a mix of technologies that are serving
    different needs by different applications.


    This mental liberation further flourished with the emergence of domain-driven
    design and microservices, where one solution consists of several databases, which
    can be a mix of persistence technologies. That way, databases are encapsulating
    data within applications, and services are performing integration.


    ### NoSQL Database Types


    As we already mentioned, various non-relational databases are using different
    approaches to solving needs for storing and querying data. There are four main
    types of NoSQL databases, with each type solving a problem that relational databases
    can’t address adequately.


    #### Key-Value Stores (KVS)


    Prominent examples: `Redis`, `Memcached`, and `CosmosDB`


    In some scenarios, using a full-blown database with powerful indexing and data
    retrieval would be overkill. You are looking for a quick and easy way to take
    an arbitrary piece of information, label it with a key, and store it in the database.
    Later, when you present a key, the database will deliver you associated value.


    `Key-value stores` are databases, but highly specialized ones, built with just
    one purpose and deliberately constrained in design and functionality. Some are
    intentionally minimal, like `Memcached`, which is not even storing data on a disk.
    Others, like `CosmosDB`, added more features over time but are still based around
    the key-value paradigm.


    Overall, key-value stores are intended for elementary tasks like caching or sharing
    common data between application services. Many relational databases can be used
    as a key-value store, but they would consume lots of resources and be more inefficient
    than specialized solutions. You would be overprovisioning resources and power
    in the same way if you would use an 18-wheeler for grocery shopping.


    #### Document Stores (DS)


    Prominent examples: `MongoDB`, `RavenDB`, `Couchbase`, and `DocumentDB`


    Expanding on the capabilities provided by key-value stores, document stores can
    not only persist and retrieve information but also comprehend its structure. In
    the terminology of DS, documents are semi-structured data that are representing
    your business objects. You can index, manage, and manipulate documents based on
    their internal structure.


    DS is aware of your documents’ internal structure, so you can query your business
    partners by the address city, while KVS would provide just a way to store and
    retrieve them.


    Relational databases force you to artificially split your objects into multiple
    sub-entities, which are then stored in tables and rows. DS can accept your documents
    in their natural form, index them, and provide you with means of creating projections
    producing the same results as `JOIN`s in RDBMS but much more efficiently.


    Before storing, your objects will be serialized to some standard format or encoding.
    Common encodings include `JSON`, `XML`, `YAML`, as well as a binary format like
    `BSON`.


    #### Graph Databases (GD)


    Prominent examples: `Neo4j`, `OrientDB`, `TigerGraph`, and `ArangoDB`


    A `graph` is a mathematical structure representing a set of objects in which pairs
    of objects are related. Graph databases are implementing this concept, treating
    relationships between entities equally important as entities themself. Hence,
    GD is suitable for all those business domains where relationships are the crux
    of your model.


    Graph databases are highly specialized NoSQL databases. You could say that they
    are building on the basis established by relational databases, bringing connections
    and relations between them to the status of full citizenship in the world of databases.
    Hence, besides data, GD contains metadata, or “data about data,” and this metadata
    often matters more than the data itself.


    With GD, independently of the total size of your dataset, you can efficiently
    explore highly connected data, perform searches based on patterns, and isolate
    your interactions with the data to just a tiny subset.


    #### Wide-Column Stores (WCS)


    Prominent examples: `Bigtable`, `DynamoDB`, `Cassandra`, `ScyllaDB`, and `HBase`


    This category is also known under the name `extensible record stores`. Similar
    to relational databases, WCS is using tables, rows, and columns. However, columns
    are not fixed, and records can have billions of columns if needed. From the perspective
    of the key-value store, you could say that WCS is a two-dimensional KVS.'
  raw: '### Challenges


