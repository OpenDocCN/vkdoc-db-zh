    save button, search, settings drop-down box with 2 enabled among 4 toggle buttons,
    play, and delete documents button.


    Figure 5-1


    Content of Automatic Index


    You can create a static index with the same content from Figure [5-1](#514303_1_En_5_Chapter.xhtml#Fig1).
    Select the *List of Indexes* option in the left column, and then click on the
    *New index* button. You are now looking at a screen where you can define a new
    index, shown in Figure [5-2](#514303_1_En_5_Chapter.xhtml#Fig2).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig2_HTML.jpg)


    A screenshot displays a dialog box with save and cancel buttons at the top, a
    text box for index name, a drop-down button for deployment mode, and a list box
    for maps placed at the bottom.


    Figure 5-2


    Create a New Index Dialog


    You first need to select a name for the new index. A convention is to go with
    the names of the form


    ```

    [COLLECTION]/By[FIELD]

    ```


    and you can already see it with `Auto/Employees/ByFirstName`.


    Hence, use `Employees/ByFirstName` for the name.


    Content of Map Index is a JavaScript function `map` that will take documents from
    the collection and return an object for every document; these objects will be
    index entries. Accordingly, the name `map`, since we are mapping documents to
    index entries . Listing [5-2](#514303_1_En_5_Chapter.xhtml#PC5) shows such mapping
    function.


    ```

    map("Employees", function(emp) {

    return {

    FirstName: emp.FirstName

    }

    })

    Listing 5-2

    Content of Employees/ByFirstName index

    ```


    Clicking the *Save* button will create a new index, and it will be listed along
    with other automatic and static ones, as shown in Figure [5-3](#514303_1_En_5_Chapter.xhtml#Fig3).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig3_HTML.png)


    A screenshot of the indexes list with 2 sections, companies with 141 entries and
    employees with 9 entries on 2 sublists, query search, drop-down menu for index
    status, delete, play, lock, and add new index buttons.


    Figure 5-3


    List of Indexes


    You can see that the automatic index `Auto/Employees/ByFirstName` contains nine
    entries, the same as the `Employees/ByFirstName` you just created. And if you
    query it


    ```

    from index ''Employees/ByFirstName'' where FirstName = ''Nancy''

    ```


    you will get identical results.


    ### Static Index Analysis


    Let’s analyze all elements of an index from Listing [5-2](#514303_1_En_5_Chapter.xhtml#PC5).
    Looking at the top-level structure, you can see this map index has the following
    form:


    ```

    map("[COLLECTION]", function(doc) {...})

    ```


    The first argument is a collection name. One by one, the document will be fetched
    from that collection and passed to the JavaScript function, which is the second
    argument.


    Looking at the function itself


    ```

    function(emp) {

    return {

    FirstName: emp.FirstName

    }

    }

    ```


    you can see it accepts a document from the collection and returns JavaScript *object
    literal:*


    ```

    {

    FirstName: emp.FirstName

    }

    ```


    This object literal will be indexing entry.


    Index can be somewhat simplified if we replace traditional function expression
    with a compact alternative called *arrow function expression* as shown in Listing
    [5-3](#514303_1_En_5_Chapter.xhtml#PC10).


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName

    }

    })

    Listing 5-3

    A simplified version of the Employees/ByFirstName index

    ```


    ### Expanding Map Index


    The structure of the index entries will limit fields we can filter. Attempting
    to execute the following query


    ```

    from index ''Employees/ByFirstName'' where LastName = ''Davolio''

    ```


    will result in an error:


    ```

    The field ''LastName'' is not indexed, cannot query/sort on fields that are not
    indexed

    ```


    Your first reaction might be to create new *Employees/ByLastName* index, as shown
    in Listing [5-4](#514303_1_En_5_Chapter.xhtml#PC13).


    ```

    map("Employees", emp => {

    return {

    LastName: emp.LastName

    }

    })

    Listing 5-4

    Employees/ByLastName index

    ```


    This index now can be queried


    ```

    from index ''Employees/ByLastName'' where LastName = ''Davolio''

    ```


    and will produce results .


    However, instead of adding one more index, we can expand *Employees/ByFirstName*
    index with LastName field. Following conventions we previously introduced, we
    can name it *Employees/ByFirstNameByLastName* and define its content as shown
    in Listing [5-5](#514303_1_En_5_Chapter.xhtml#PC15).


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName,

    LastName: emp.LastName

    }

    })

    Listing 5-5

    Employees/ByFirstNameByLastName index

    ```


    Inspecting raw content of this index reveals FirstName and LastName indexed for
    ID of every document, as visible in Figure [5-4](#514303_1_En_5_Chapter.xhtml#Fig4).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig4_HTML.png)


    A screenshot of the index employees slash by first name by last name index displays
    a table of raw index entries with 4 columns and tabs on top namely delete documents,
    statistics, and export as C S V.


    Figure 5-4


    Raw Content of Index Employees/ByFirstNameByLastName


    You can query this new index both on the *FirstName* field


    ```

    from index ''Employees/ByFirstNameByLastName'' where FirstName = ''Nancy''

    ```


    and on *LastName* field:


    ```

    from index ''Employees/ByFirstNameByLastName'' where LastName = ''Davolio''.

    ```


    This way, you can use just one index to cover multiple fields of documents in
    one collection.'
  trans: '### 静态映射索引


    你可以通过编写查询来检查 `Auto/Employees/ByFirstName` 自动索引的内容：


    ```

    from index ''Auto/Employees/ByFirstName''

    ```


    然后选择 *设置 ➤ 显示原始索引条目而非匹配文档*，如图 5-1 所示。


    ![](img/514303_1_En_5_Fig1_HTML.png)


    图 5-1：自动索引的内容


    你可以根据图 5-1 的内容创建一个静态索引。在左侧栏选择 *索引列表* 选项，然后点击 *新建索引* 按钮。你现在将看到一个用于定义新索引的屏幕，如图 5-2
    所示。


    ![](img/514303_1_En_5_Fig2_HTML.jpg)


    图 5-2：创建新索引对话框


    首先，你需要为新索引选择一个名称。通常采用以下格式的名称：


    ```

    [COLLECTION]/By[FIELD]

    ```


    例如，`Auto/Employees/ByFirstName` 已经采用了这种格式。


    因此，使用 `Employees/ByFirstName` 作为名称。


    映射索引的内容是一个 JavaScript 函数 `map`，它将接收集合并为每个文档返回一个对象；这些对象将成为索引项。因此，该函数名为 `map`，因为它将文档映射到索引项。代码清单
    5-2 展示了这样的映射函数。


    ```

    map("Employees", function(emp) {

    return {

    FirstName: emp.FirstName

    }

    })

    ```


    代码清单 5-2：`Employees/ByFirstName` 索引的内容


    点击 *保存* 按钮将创建一个新索引，它将与其他自动和静态索引一起列出，如图 5-3 所示。


    ![](img/514303_1_En_5_Fig3_HTML.png)


    图 5-3：索引列表


    你可以看到，自动索引 `Auto/Employees/ByFirstName` 包含九个条目，与你刚刚创建的 `Employees/ByFirstName`
    相同。如果你查询它：


    ```

    from index ''Employees/ByFirstName'' where FirstName = ''Nancy''

    ```


    你将得到相同的结果。


    ### 静态索引分析


    让我们分析代码清单 5-2 中索引的所有元素。从顶层结构来看，你可以看到这个映射索引具有以下形式：


    ```

    map("[COLLECTION]", function(doc) {...})

    ```


    第一个参数是集合名称。文档将从该集合中逐一获取，并传递给 JavaScript 函数，即第二个参数。


    观察函数本身：


    ```

    function(emp) {

    return {

    FirstName: emp.FirstName

    }

    }

    ```


    你可以看到它接收来自集合中的一个文档，并返回 JavaScript *对象字面量*：


    ```

    {

    FirstName: emp.FirstName

    }

    ```


    这个对象字面量将成为索引项。


    如果我们用紧凑的 *箭头函数表达式* 替换传统的函数表达式，索引可以被稍微简化，如代码清单 5-3 所示。


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName

    }

    })

    ```


    代码清单 5-3：`Employees/ByFirstName` 索引的简化版本


    ### 扩展映射索引


    索引项的结构将限制我们可以过滤的字段。尝试执行以下查询：


    ```

    from index ''Employees/ByFirstName'' where LastName = ''Davolio''

    ```


    将会导致错误：


    ```

    The field ''LastName'' is not indexed, cannot query/sort on fields that are not
    indexed

    ```


    你的第一反应可能是创建一个新的 *Employees/ByLastName* 索引，如代码清单 5-4 所示。


    ```

    map("Employees", emp => {

    return {

    LastName: emp.LastName

    }

    })

    ```


    代码清单 5-4：`Employees/ByLastName` 索引


    这个索引现在可以被查询：


    ```

    from index ''Employees/ByLastName'' where LastName = ''Davolio''

    ```


    并产生结果。


    然而，与其增加一个索引，我们不如将 *Employees/ByFirstName* 索引扩展，包含 `LastName` 字段。遵循我们之前介绍的约定，可以将其命名为
    *Employees/ByFirstNameByLastName*，并定义其内容如代码清单 5-5 所示。


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName,

    LastName: emp.LastName

    }

    })

    ```


    代码清单 5-5：`Employees/ByFirstNameByLastName` 索引


    检查此索引的原始内容，可以发现每个文档的 `FirstName` 和 `LastName` 都被索引，如图 5-4 所示。


    ![](img/514303_1_En_5_Fig4_HTML.png)


    图 5-4：索引 `Employees/ByFirstNameByLastName` 的原始内容


    你可以在这个新索引上查询 *FirstName* 字段：


    ```

    from index ''Employees/ByFirstNameByLastName'' where FirstName = ''Nancy''

    ```


    也可以查询 *LastName* 字段：


    ```

    from index ''Employees/ByFirstNameByLastName'' where LastName = ''Davolio''.

    ```


    这样，你就可以仅用一个索引来覆盖一个集合中文档的多个字段。'
- fmt: '## Stored Fields


    In the previous chapter, we introduced different types of indexes: nonclustered
    (holding only references to documents), clustered (storing whole documents), and
    covering ones (including a selected collection of fields). Static indexes we developed
    so far in this chapter are nonclustered. You can easily inspect that by running
    the following query:


    ```

    from index ''Employees/ByFirstNameByLastName''

    ```


    After getting employee documents, click on `Settings` and select the option `Show
    stored index fields only`. You will get a result shown in Figure [5-6](#514303_1_En_5_Chapter.xhtml#Fig6).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig6_HTML.png)


    A screenshot displays a query, a settings menu with 2 enabled among 3 toggle buttons,
    search query, and save and play buttons. The results panel displays no data during
    the preview of stored index fields.


    **Figure 5-6**


    No Stored Fields for Index `Employees/ByFirstNameByLastName`


    As you can see, an index does not contain any stored fields. So, when you run
    the query with a projection


    ```

    from index ''Employees/ByFirstNameByLastName''

    where FirstName = ''Nancy''

    select FirstName, LastName

    ```


    the database engine will first perform filtering based on an index, which will
    result in single ID `employees/1-A`. After that, the engine will make one more
    round trip to the storage to fetch this document and read its `FirstName` and
    `LastName` properties.


    You can convert your nonclustered index into covering one by instructing RavenDB
    to store specific fields. Going back to the Index edit form and looking at the
    bottom of the screen, you can see the `Fields` tab in Figure [5-7](#514303_1_En_5_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig7_HTML.png)


    A screenshot with 2 sections, maps with 6 lines of syntax and buttons add map
    and add reduction and reduce with 4 tabs and buttons add field and add default
    field options in the fields tab.


    **Figure 5-7**


    Fields Tab on Edit Index Page


    This tab shows no fields added to the index. Add fields `FirstName` and `LastName`
    by clicking on `Add field` button, and populate both of their names, and select
    value `Yes` in the `Store` option, as shown in Figure [5-8](#514303_1_En_5_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig8_HTML.png)


    A screenshot with 4 tabs namely fields, configuration, additional assemblies,
    and additional sources. The fields tab has 2 buttons, add field and add default
    field options, to add details under last name and first name.


    **Figure 5-8**


    Adding `FirstName` and `LastName` as Stored Fields in the Index


    After saving the changed index definition, repeating the query from Figure [5-6](#514303_1_En_5_Chapter.xhtml#Fig6)
    will reveal stored fields of the `Employees/ByFirstNameByLastName` index, as presented
    in Figure [5-9](#514303_1_En_5_Chapter.xhtml#Fig9).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig9_HTML.png)


    A screenshot displays a query, settings drop-down box with 2 enabled among 3 toggle
    buttons, search query, save, play, and delete documents buttons. The results panel
    displays a table with 4 columns.


    **Figure 5-9**


    Stored Fields for Index `Employees/ByFirstNameByLastName`


    As a result of the change you just made, the database engine will be able to create
    projections consisting of `FirstName` and `LastName` with just one trip to the
    storage. Index entry fetched via filtering operation will contain these two fields,
    which will be available immediately.


    We already mentioned that covering indexes are a good compromise since they require
    fewer round trips to produce results but, at the same time, are not storing the
    complete document. With RavenDB Studio, you can now inspect actual allocated storage
    for all of your indexes and collections. By clicking on the `Stats` icon on the
    left edge and then selecting `Storage report`, you will be able to inspect allocation
    details, as shown in Figure [5-10](#514303_1_En_5_Chapter.xhtml#Fig10).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig10_HTML.png)


    A screenshot of the storage report displays the allocation details and various
    fields of the index storage when the icon Stats is clicked.


    **Figure 5-10**


    Storage Report


    You can add or remove various fields from the index storage and check the impact
    of your changes in the `Storage report`.'
