    # RavenDB 中的引用完整性


    正如你在上一节看到的，在 RavenDB 文档中建立引用非常简单。你只需引入一个具有明确名称的属性，并填入被引用文档的 ID。从 RavenDB 的角度来看，这个属性并无特殊之处，它只是另一个值为字符串的属性。因此，对于数据库引擎而言，这两个属性在结构和功能上是等同的：


    ```

    Resume: "resumes/1",

    Name: "John Doe",

    ```


    RavenDB 不会检查 Id 为 `resumes/1` 的 `Resume` 是否存在。同样，你可以给你的 `Employee` 分配任意名称，也可以为
    `Resume` 引用设置随机值：


    ```

    Resume: "resumes/000",

    Name: "Random Randomsson",

    ```


    在这个例子中，我们创建了一个指向不存在的 `Resume` 的引用。在数据库层面，并没有机制能防止我们引入数据损坏。因此，很自然会产生疑问——关系数据库能在数据库层面保护我们免受数据损坏，RavenDB
    暴露的这种行为是否是一种退步？我为什么要使用一个不能防止我犯下破坏数据错误的数据库？


    此外，由于 `JSON` 格式的限制，你无法为特定属性指定具体类型。因此，如果你有一个整数类型的“age”属性，RavenDB 不会阻止你向其中存储“John”。而在关系数据库中，这样的尝试会导致错误。那么，该如何解释这一点？你为什么要选择一个会让你的应用可靠性降低、更容易出错的数据库？一个允许你向数据中引入损坏的数据库？


    ## 与关系数据库的比较


    是的，如果将数据库视为系统中孤立的部分来看，这确实是真的。像 `SQL Server` 或 `PostgreSQL` 这样的关系数据库，会为你提供强类型列和检查引用完整性的方式，防止你建立指向不存在实体的引用。然而，在数据持久化这一更广阔的背景下观察数据库，则会带来一个显著不同的视角。


    ## 领域驱动建模


    与 20 世纪 80 和 90 年代不同，当今的建模方法（如领域驱动设计）不再将数据库作为建模过程的起点。相反，它们推荐在编程语言中对业务领域进行建模，然后将领域实体持久化到数据库中。过去，大多数规划会议都始于白板前，开发人员会在上面绘制关系数据库表、字段以及大量用于建立它们之间关系的
    `外键`。这个过程看起来与构建 `UML` 图非常相似，只不过数据库是“世界的中心”，整个系统的规划都始于数据库建模。遵循持久化模型，再对编程语言中的实体以及用于管理这些实体的
    `CRUD` 操作进行建模。


    从数据库“中心主义”的角度来看，将验证逻辑下推到数据库是很自然的追求。然而，随着领域建模技术的进步和发展，我们达到了今天这样在概念层面使用 `聚合`、`实体`
    和 `值对象` 进行建模的阶段。我们分析流程，将企业项目划分为子域，并在 `子域` 范围内进行建模。进行这项活动的目的是纯粹地审视我们子域的业务和流程方面，同时记住这个活动的产物最终需要被持久化。尽管如此，持久化只是一个次要的考虑因素，而非主要的。


    每个子域通常都有其特有的实体。不仅如此——每个子域都有其自己的一套业务规则，实体应根据这些业务约束进行验证。一个经验法则是，精心设计的业务领域应能防止无效对象的实例化。一个好的规则是“不可能的状态应该不可表示”这一原则。换句话说，你可以将某人的年龄声明为整数，并将检查工作下推给数据库，但从业务领域的角度来看，允许创建并存储一个年龄为
    -50 或 0 的 `Employee` 是正确的吗？关系数据库提供的数据完整性机制只能覆盖你数据整体业务有效性中的一小部分。完整的验证和数据完整性规则集合是庞大的。它通常包含各种静态和动态约束，常常涉及处于不同状态的多个不同实体。例如，未成年人不应能够将啤酒添加到购物车中。


    ## 数据库的角色


    审视数据库的主要角色，我们可以得出结论：当你将实体存储到其中时，数据库应该提供一种可靠的机制，以逐字且健全的方式持久化内存中的对象。因此，你可以将数据库视为一种将对象图从内存镜像到持久化媒介（通常是硬盘）的方式。


    所以，透过狭隘的视角来看，关系数据库确实能够执行类型级别和引用完整性检查，在尝试存储无效数据时抛出错误，这一点是正确的。然而，在每个可靠的应用程序中，都应该存在高层次业务规则和检查机制的多层结构。采用良好的软件开发方法，你将永远不会让你的对象处于无效状态。


    因此，在应用开发过程中，数据库应被置于适当的位置——不再是中心，而是一种持久化机制。其角色应该是可靠地存储已验证的对象，并提供快速可靠的手段来索引和查询这些数据。

    '
- fmt: '### One-to-Many Relationship


    对于这种关系类型，我们将再次以订单（`Orders`）为例，但这次我们将观察它们与公司（`Companies`）的关系。每个公司都可以有一个或多个订单。此外，我们将考虑每种建模方式的优点和约束条件。


    回顾*独立性*、*隔离性*和*一致性*的原则，我们可以看到公司和订单应该被建模为单独的文档。将所有订单嵌入到公司文档中的选择是糟糕的——不仅因为公司和订单拥有独立的存在且彼此独立变化——而且随着时间的推移，订单数量的增长将导致公司文档变得异常庞大。此外，在一个文档中存在多个订单会引入并发问题；同时编辑现有订单和创建新订单会引发乐观并发冲突。正如你所见，这个内省过程给了我们足够的论据来高度确定地判定嵌入是一个次优选择。因此，很明显公司和订单应该是分开的文档。


    下一步是决定如何在它们之间建立关系。回顾一对一建模，我们可以看到有两种选择。第一种选择如清单[2-7](#514303_1_En_2_Chapter.xhtml#PC18)所示，展示了一个公司持有订单文档ID列表的模型。


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08",

    Orders: [

    "orders/1",

    "orders/2",

    "orders/3"

    ]

    }

    Listing 2-7

    一个带订单ID列表的员工

    ```


    `Orders`属性包含属于该公司的订单ID列表。将此作为建立公司和订单之间关系的可能解决方案，会暴露出几个弱点：


    *   我们放弃嵌入式设计的原因之一，是我们预见到订单数量会随时间增长。本质上，我们在这里面临同样的问题。想象一下公司可能拥有数百甚至数千个订单。这会导致`Orders`属性显著增长。操作订单列表将变得笨拙，并且随着时间的推移越来越困难。

    *   加载公司的订单需要先加载公司文档，处理其`Orders`属性，然后通过获得的ID获取订单。这不是一个决定性的障碍，但它在我们的代码和逻辑中引入了不必要的复杂性，产生了额外的数据库请求。

    *   随着公司订单数量的增长，对公司文档的读写操作也在不断增加。随着时间的推移，乐观并发冲突的可能性会成比例地增长。


    你可以看到我们使用排除法得出了最后一个建模选项，如清单[2-8](#514303_1_En_2_Chapter.xhtml#PC19)所示。


    ```

    Id: orders/1

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/2

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/3

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Listing 2-8

    指向公司的订单

    ```


    这个模型在订单侧实现了引用。每个订单都有一个`Company`属性，其中包含其所属公司的ID。现在让我们对这个模型进行一系列检查：


    *   公司和订单是两个独立的集合。它们各自有自己的标识，并且遵守隔离和独立的原则。

    *   随着月份或年份推移，订单数量的增长不会影响文档的大小。

    *   执行查询以获取特定公司的所有订单，不需要我们先加载公司文档。


    正如你所见，我们得到的模型通过了我们的检查。我们可以得出结论，我们成功地在公司和订单之间建立了一个关系，它能够支持我们可预见的操作。


    在这个例子中，我们发现了一对多建模的一个既定原则。它俗称为“较小侧引用”，指的是应该存储ID引用的关系一方。作为通用的最佳实践，你应该始终从这样一个模型开始：多个文档持有对单个文档的一个引用，而不是让一个文档持有一个指向多个文档的长ID列表。


    典型的例子包括：


    *   我们刚才观察的公司和订单

    *   教授和学生，学生指向教授

    *   公司和产品，产品指向公司

    *   出版商和书籍，书籍指向出版商


    当然，每种情况都是特定的。从“较小侧”方法出发，我们还应该考虑各种当前和未来的场景。一些可能的例外情况示例如下：


    *   父母和子女，其中父母可能持有对所有子女的引用

    *   所有者和公司，所有者指向公司

    *   团队和球员，团队持有对球员的引用


    与关系数据库相比，我们没有技术限制——我们的关系可以双向指向。这取决于我们需要什么方向。我们可以通过将事物置于情境中、思考我们正在建模的内容，并投入同等甚至更多的精力来规划我们应用程序和数据库的未来增长，从而实现这一点。


    ### Many-to-Many Relationship


    一旦你理解了一对多关系的本质，扩展到多对多关系就很容易了。让我们看一些多对多关系的现实例子。


    *   社区（`Communities`）和成员（`Members`）——每个社区可以有多个成员，并且每个人可以属于多个社区。

    *   祖父母（`Grandparents`）和孙辈（`Grandchildren`）——祖父母可以有多个孙辈，每个孙辈也有多个祖父母。

    *   学生（`Students`）和课程（`Courses`）——学生可以注册多门课程，每门课程也有许多学生参与者。

    *   书籍（`Books`）和作者（`Authors`）——一本书可以有多个作者，每位作者也可以写一本或多本书。


    所有这些关系的建模方式与我们建模一对多关系的方式相同：我们将在较小的一方保持一个ID列表。因此：


    *   成员将持有一个他的社区ID列表，因为社区可以有成千上万的成员。

    *   一个孩子可能拥有的祖父母数量少于祖父母拥有的孙辈数量，因此我们将在孩子文档上保持一个关联列表。

    *   课程可能有数百名学生，因此我们将在学生文档中扩展出一个课程列表。

    *   多产的作者可以写几十本书，而书籍通常只有几位作者，因此我们将在书籍文档上建模一个作者ID列表作为属性。


    现在我们知道如何建模存储在RavenDB数据库中的文档并建立它们之间的关系，下一章将展示如何查询这些文档。


    ## Summary


    在本章中，我们介绍了NoSQL文档数据库中的通用建模原则。在比较了NoSQL和SQL方法之后，我们介绍了JSON文档的基础知识、聚合、良好建模文档的属性以及分布式系统中最终一致性的概念。最后，我们研究了RavenDB建模的具体内容，展示了标识符、关系以及引用完整性的一种方法。


    在下一章中，我们将重点关注现代应用程序中最常见的操作——查询。你将学习执行过滤、排序和分页等基本功能。我们还将介绍更高级的主题，包括投影、聚合和解除关系引用。


    # 3. Querying


    大多数现代Web应用程序执行的写操作相对较少，但读操作却非常频繁。本章将探讨你的应用程序将执行的最常见活动，以及RavenDB如何支持它。我们将学习Raven查询语言的基础知识以及使用它进行查询的基本方法。'
  raw: '### One-to-Many Relationship


    For this type of relationship, we will again turn to Orders, but this time, we
    will observe how they relate to Companies. Every Company can have one or more
    orders. Furthermore, we will consider modeling possibilities with benefits and
    constraints for every approach.


    Revisiting principles of *independence*, *isolation,* and *coherence*, we can
    see that Company and Order should be modeled as separate documents. Choice of
    embedding all orders within Company would be a poor one – not only that Company
    and Order have a separate existence and change independently of each other – but
    growing number of orders as time goes by would mean that Company document would
    grow to be a huge one. Also, the existence of multiple orders in one Document
    would introduce concurrency problems ; editing existing orders simultaneously
    with a creation of new one would introduce an optimistic concurrency violation
    problem. As you can see, this introspection process gave us enough arguments to
    determine with high security that embedding is a suboptimal choice. Hence, it
    is clear that Company and Order should be separate documents.


    The next step is deciding how to establish a relationship between them. Looking
    back at one-to-one modeling, we can see there are two options. The first one,
    shown in Listing [2-7](#514303_1_En_2_Chapter.xhtml#PC18), shows a model where
    the Company holds a list of IDs of Order documents.


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08",

    Orders: [

    "orders/1",

    "orders/2",

    "orders/3"

    ]

    }

    Listing 2-7

    An employee with a list of order IDs

    ```


    `Orders` property contains a list of IDs of orders that belong to the Company.
    Considering this as a possible solution for establishing a relationship between
    Company and Orders reveals several weak points :


    *   We gave up on embedding, among other reasons, because we envisioned a growing
    number of orders over time. Essentially, we have the same issue here. Imagine
    hundreds, if not thousands, of orders that the Company might have. That would
    cause `Orders` property to grow significantly. Manipulating a list of orders would
    be cumbersome and more and more difficult as time goes by.


    *   Loading orders for a Company would require first loading Company, process
    its Orders property, and fetch orders by obtained IDs. This is not a deal-breaker,
    but it represents unwanted complexity in our code and logic, generating additional
    database requests.


    *   As the number of orders for a Company grows, there is an ever-increasing number
    of reads and writes to a Company document. Over time, chances of optimistic concurrency
    violations grow proportionally.


    You can see that we used a method of elimination to reach one last modeling option
    shown in Listing [2-8](#514303_1_En_2_Chapter.xhtml#PC19).


    ```

    Id: orders/1

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/2

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/3

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Listing 2-8

    Orders pointing to a Company

    ```


    This model implements references on the side of orders. Every Order has a `Company`
    property that contains the ID of the parent Company. Let’s now perform series
    of checks of this model:


    *   Companies and Orders are two separate collections. Each of them has their
    own identity, and they respect principles of isolation and independence.


    *   As the number of Orders grows over months or years, this will not affect the
    size of the documents.


    *   Performing queries to fetch all orders for a specific company does not require
    us to load Company document first.


    As you can see, a model we reached is passing our checks. We can conclude we managed
    to establish a relationship between Companies and Orders that will support operations
    we can foresee.


    In this example, we discovered one of the established principles of one-to-many
    modeling. It is colloquially called “smaller side reference ,” denoting the side
    of the relationship where ID references should be stored. As a general best practice
    , you should always start with a model where many documents will hold one reference
    to a single document, instead of going with one Document holding a long list of
    IDs to many documents.


    Typical examples of this would be the following:


    *   Companies and Orders we just observed


    *   Professors and Students, with Students pointing to Professor


    *   Companies and Products, with Products pointing to Company


    *   Publishers and Books, with Books pointing to Publisher


    Of course, every single situation is specific. Starting with the “smaller side”
    approach, we should also consider various present and future scenarios. Some possible
    examples of exceptions could be the following:


    *   Parents and children, where Parent might hold references to all Children


    *   Owner and Companies, with Owner pointing to Companies


    *   Team and Players, with Team having references to Players


    Compared to relational databases , we do not have technical limitations – our
    relationships can point both ways. It is up to us to determine what direction
    we need. We can achieve this by putting things into context, thinking about what
    we are modeling, and also investing equal or maybe even more energy into projecting
    future growth of our application and databases.


    ### Many-to-Many Relationship


    Once you understand the nature of the one-to-many relationship , expanding to
    many-to-many is easy. Let’s look at some real-life examples of many-to-many relationships.


    *   Communities and Members – each Community can have many Members, and each person
    can belong to many Communities.


    *   Grandparents and Grandchildren – Grandparent can have several Grandchildren,
    and each Grandchild has many Grandparents.


    *   Students and Courses – Students can enroll in many Courses, and each Course
    has many Students participants.


    *   Books and Authors – a Book can have many Authors, and each Author can write
    one or more Books.


    All these relationships are modeled in the same way we modeled one-to-many: we
    will keep a list of IDs on the smaller side. Hence


    *   Member will have a list of his Community IDs since Communities can have thousands
    of Members.


    *   A child is likely to have fewer Grandparents than Grandparents grandchildren
    so that we will keep a list of associations on the child document.


    *   Courses can have hundreds of students, so we will expand Student to have a
    list of courses.


    *   Prolific authors can write dozens of books, while books usually have a few
    authors so that we will model a list of Author IDs as a property on a book document.


    Now that we know how to model documents stored in a RavenDB database and establish
    relationships between them, the next chapter will show how we can query these
    documents.


    ## Summary


    In this chapter, we introduced general modeling principles in NoSQL document databases.
    After comparing NoSQL and SQL approaches, we covered the basics of JSON documents,
    aggregates, properties of well-modeled documents, and the concept of eventual
    consistency in distributed systems. Finally, specifics of RavenDB modeling were
    examined, showcasing identifiers, relationships, and an approach to referential
    integrity.


    In the next chapter, we will focus on the most common operation in modern applications
    - querying. You will learn to perform essential functions like filtering, ordering,
    and paging. We will also cover more advanced topics, including projections, aggregations,
    and dereferencing relations.


    # 3. Querying


    Most modern web applications perform a relatively small number of writes but a
    large number of reads. This chapter will look into the most common activity your
    application will perform and how RavenDB supports it. We will learn the basics
    of Raven Query Language and the basics of querying using it.'
  trans: '


    ### 一对多关系


    对于这种关系类型，我们将再次以订单（`Orders`）为例，但这次我们将观察它们与公司（`Companies`）的关系。每个公司都可以有一个或多个订单。此外，我们将考虑每种建模方式的优点和约束条件。


    回顾*独立性*、*隔离性*和*一致性*的原则，我们可以看到公司和订单应该被建模为单独的文档。将所有订单嵌入到公司文档中的选择是糟糕的——不仅因为公司和订单拥有独立的存在且彼此独立变化——而且随着时间的推移，订单数量的增长将导致公司文档变得异常庞大。此外，在一个文档中存在多个订单会引入并发问题；同时编辑现有订单和创建新订单会引发乐观并发冲突。正如你所见，这个内省过程给了我们足够的论据来高度确定地判定嵌入是一个次优选择。因此，很明显公司和订单应该是分开的文档。


    下一步是决定如何在它们之间建立关系。回顾一对一建模，我们可以看到有两种选择。第一种选择如清单 2-7 所示，展示了一个公司持有订单文档 ID 列表的模型。


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08",

    Orders: [

    "orders/1",

    "orders/2",

    "orders/3"

    ]

    }

    ```

    **清单 2-7**

    一个带订单 ID 列表的员工


    `Orders`属性包含属于该公司的订单 ID 列表。将此作为建立公司和订单之间关系的可能解决方案，会暴露出几个弱点：


    *   我们放弃嵌入式设计的原因之一，是我们预见到订单数量会随时间增长。本质上，我们在这里面临同样的问题。想象一下公司可能拥有数百甚至数千个订单。这会导致`Orders`属性显著增长。操作订单列表将变得笨拙，并且随着时间的推移越来越困难。

    *   加载公司的订单需要先加载公司文档，处理其`Orders`属性，然后通过获得的 ID 获取订单。这不是一个决定性的障碍，但它在我们的代码和逻辑中引入了不必要的复杂性，产生了额外的数据库请求。

    *   随着公司订单数量的增长，对公司文档的读写操作也在不断增加。随着时间的推移，乐观并发冲突的可能性会成比例地增长。


    你可以看到我们使用排除法得出了最后一个建模选项，如清单 2-8 所示。


    ```

    Id: orders/1

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/2

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    Id: orders/3

    {

    "Company": "companies/1",

    "ShippingAddress": {

    ...

    }

    }

    ```

    **清单 2-8**

    指向公司的订单


    这个模型在订单侧实现了引用。每个订单都有一个`Company`属性，其中包含其所属公司的 ID。现在让我们对这个模型进行一系列检查：


    *   公司和订单是两个独立的集合。它们各自有自己的标识，并且遵守隔离和独立的原则。

    *   随着月份或年份推移，订单数量的增长不会影响文档的大小。

    *   执行查询以获取特定公司的所有订单，不需要我们先加载公司文档。


    正如你所见，我们得到的模型通过了我们的检查。我们可以得出结论，我们成功地在公司和订单之间建立了一个关系，它能够支持我们可预见的操作。


    在这个例子中，我们发现了一对多建模的一个既定原则。它俗称为“较小侧引用”，指的是应该存储 ID 引用的关系一方。作为通用的最佳实践，你应该始终从这样一个模型开始：多个文档持有对单个文档的一个引用，而不是让一个文档持有一个指向多个文档的长
    ID 列表。


    典型的例子包括：


    *   我们刚才观察的公司和订单

    *   教授和学生，学生指向教授

    *   公司和产品，产品指向公司

    *   出版商和书籍，书籍指向出版商


    当然，每种情况都是特定的。从“较小侧”方法出发，我们还应该考虑各种当前和未来的场景。一些可能的例外情况示例如下：


    *   父母和子女，其中父母可能持有对所有子女的引用

    *   所有者和公司，所有者指向公司

    *   团队和球员，团队持有对球员的引用


    与关系数据库相比，我们没有技术限制——我们的关系可以双向指向。这取决于我们需要什么方向。我们可以通过将事物置于情境中、思考我们正在建模的内容，并投入同等甚至更多的精力来规划我们应用程序和数据库的未来增长，从而实现这一点。


    ### 多对多关系


    一旦你理解了一对多关系的本质，扩展到多对多关系就很容易了。让我们看一些多对多关系的现实例子。


    *   社区（`Communities`）和成员（`Members`）——每个社区可以有多个成员，并且每个人可以属于多个社区。

    *   祖父母（`Grandparents`）和孙辈（`Grandchildren`）——祖父母可以有多个孙辈，每个孙辈也有多个祖父母。

    *   学生（`Students`）和课程（`Courses`）——学生可以注册多门课程，每门课程也有许多学生参与者。

    *   书籍（`Books`）和作者（`Authors`）——一本书可以有多个作者，每位作者也可以写一本或多本书。


    所有这些关系的建模方式与我们建模一对多关系的方式相同：我们将在较小的一方保持一个 ID 列表。因此：


    *   成员将持有一个他的社区 ID 列表，因为社区可以有成千上万的成员。

    *   一个孩子可能拥有的祖父母数量少于祖父母拥有的孙辈数量，因此我们将在孩子文档上保持一个关联列表。

    *   课程可能有数百名学生，因此我们将在学生文档中扩展出一个课程列表。

    *   多产的作者可以写几十本书，而书籍通常只有几位作者，因此我们将在书籍文档上建模一个作者 ID 列表作为属性。


    现在我们知道如何建模存储在 RavenDB 数据库中的文档并建立它们之间的关系，下一章将展示如何查询这些文档。


    ## 总结


    在本章中，我们介绍了 NoSQL 文档数据库中的通用建模原则。在比较了 NoSQL 和 SQL 方法之后，我们介绍了 JSON 文档的基础知识、聚合、良好建模文档的属性以及分布式系统中最终一致性的概念。最后，我们研究了
    RavenDB 建模的具体内容，展示了标识符、关系以及引用完整性的一种方法。


    在下一章中，我们将重点关注现代应用程序中最常见的操作——查询。你将学习执行过滤、排序和分页等基本功能。我们还将介绍更高级的主题，包括投影、聚合和解除关系引用。


    # 3. 查询


    大多数现代 Web 应用程序执行的写操作相对较少，但读操作却非常频繁。本章将探讨你的应用程序将执行的最常见活动，以及 RavenDB 如何支持它。我们将学习
    Raven 查询语言的基础知识以及使用它进行查询的基本方法。


    '
- fmt: '## Querying in RavenDB Studio


    RavenDB Studio has a dedicated panel for running queries. To reach it, open `Documents`
    area where all collections are listed. Below them, as visible in Figure [3-1](#514303_1_En_3_Chapter.xhtml#Fig1),
    there are additional options. You will find `Query` as the second one.


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig1_HTML.png)

    A screenshot of the documents page of the Raven D B studio. A list of collections
    and tabs labelled patch and query are on the left, and a number of documents are
    listed on the right.

    Figure 3-1: Query Option Below List of Collections


    After you click on this menu option, you will be presented with a panel for running
    queries within Studio, shown in Figure [3-2](#514303_1_En_3_Chapter.xhtml#Fig2).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig2_HTML.png)

    A screenshot of the query page has 2 panels. The top panel depicts a text box
    to enter the query. The bottom panel depicts space to display the results. To
    the right of the top panel is a play button, and 3 more buttons at the top.

    Figure 3-2: Query Panel in RavenDB Studio


    As you can see, this panel has two fields – the upper one where you write your
    queries and the lower one where the result of the query execution is displayed.


    After you write a query, you can run it by pressing `ctrl+enter` on your keyboard
    or clicking on the `Play` button to the right.


    The following section will look into the basics of querying with Raven Query Language.


    ## RavenDB Query Language Basics


    Raven Query Language or `RQL` is a SQL-like query language of RavenDB. Chapter
    [1](#514303_1_En_1_Chapter.xhtml) mentioned that relational databases share a
    standardized query language called Structured Query Language - `SQL`. This common
    declarative language was one of the significant success factors for RDBMS.


    Compared to that, NoSQL databases do not have standardized query language. Considering
    the dynamic and decentralized nature of the NoSQL ecosystem, there is a low chance
    any standard will ever emerge. Hence, every time a new NoSQL database is incepted,
    authors have the tedious task of coming up with a query language for their database.
    And this assignment brings a heavy burden – once you decide and create language,
    developers will start using it to build applications. From that point onward,
    changes you can make to your query language are limited – any significant design
    change will break backward compatibility and annoy your users.


    The team behind RavenDB faced the very same challenge. In the end, a decision
    was made to use `SQL` as a basis but to make several extensions and modifications
    that would make `RQL` a powerful language. That way, developers familiar with
    relational databases and `SQL` would recognize similar concepts and learn the
    basics of `RQL` quickly. Let us not forget – querying is the main activity we
    perform in applications, and fast queries directly contribute to the perception
    of your application speed.


    Let’s start with the most straightforward possible query, which I show in Listing
    [3-1](#514303_1_En_3_Chapter.xhtml#PC1).


    ```

    from Employees

    Listing 3-1: Keyword “from”

    ```


    When executed, this query will return all documents from `Employees` collection,
    as shown in Figure [3-3](#514303_1_En_3_Chapter.xhtml#Fig3).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig3_HTML.png)

    A screenshot of the query page has 2 panels. The text typed on the top panel reads
    from employees. The results panel at the bottom depicts 9 documents under the
    label employees, which are listed under 11 columns.

    Figure 3-3: Selecting All Documents from Employees Collection


    You can see results in a table, but this is just a visual presentation. Each row
    is showing one JSON document from the `Employees` collection, with their properties
    displayed in cells. By clicking on a `Display` button, as visible in Figure [3-4](#514303_1_En_3_Chapter.xhtml#Fig4),
    you can show or hide specific properties.


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig4_HTML.png)

    A screenshot of the result panel has 5 options at the top that are, delete documents,
    statistics, export as C S V, display, and expand result, in which display is selected.
    The selected options in the display are I d, last name, first name, title, address,
    and hired at.

    Figure 3-4: Adjusting Visibility of Employee Properties


    The initial configuration of visible properties will show you only some of them.
    If you would like to preview the whole document, there is a `Preview` icon in
    the first column of the table. Click on it, and you will get a complete JSON preview
    for a specific document.


    ### Filtering


    In the previous section, we learned `from`, first, and essential `RQL` keyword.
    It will be a part of every `RQL` query you make. We saw it used with a collection
    name, `from Employees`, to return all nine `Employee` documents.


    However, this is a trivial example exercised on sample data. In real-life applications,
    you will rarely have unbounded queries of this kind. Imagine a company with 10,000
    employees – not only that it would take a long time to fetch all of them, but
    you would be able to show just a few of them listed on a screen. What we usually
    want to do in applications is fetching and showing a specific subset of collection
    documents. Looking again at the structure of an `Employee` with an id `employees/2-A`


    ```

    {

    "LastName": "Fuller",

    "FirstName": "Andrew",

    ...

    }

    ```


    We can see that it contains the `LastName` property with the value `Fuller`. Let’s
    see a list of all employee with that same last name using the query in Listing
    [3-2](#514303_1_En_3_Chapter.xhtml#PC3).


    ```

    from Employees where LastName = ''Fuller''

    Listing 3-2: Keyword “where”

    ```


    Executing this query will show that Andrew is the only employee of Northwind traders
    with this last name, as shown in Figure [3-5](#514303_1_En_3_Chapter.xhtml#Fig5).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig5_HTML.png)

    A screenshot of the query page has 2 panels. The text in the top query panel reads,
    from employees where last name equals fuller. The results panel at the bottom
    depicts a document in which the last name is fuller.

    Figure 3-5: Filtering Employees by the Value of LastName Property


    Compared with Listing [3-1](#514303_1_En_3_Chapter.xhtml#PC1), we took `from Employees`
    and added `where LastName = ''Fuller''`. Keyword `where` is used for filtering,
    i.e., selecting all documents by a certain condition. In this case, the filtering
    condition is expressed in the form `[propertyName]=''[value]''`. Following this
    pattern, we can fetch all employees with the first name Andrew using the query
    in Listing [3-3](#514303_1_En_3_Chapter.xhtml#PC4).


    ```

    from Employees where FirstName = ''Andrew''

    Listing 3-3: Filtering all Employees with the first name Andrew

    ```


    Executing this query will produce the same result of just one document – Andrew
    Fuller has a unique first and last name on the company level.


    In our examples, the string value that we use for filtering is surrounded by apostrophes,
    but we can use quotation marks as well:


    ```

    from Employees where FirstName = "Andrew"

    ```


    which will produce the same result.'
