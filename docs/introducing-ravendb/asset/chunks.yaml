- fmt: '## Query by Nonexistent Property


    What happens if we attempt to filter by nonexistent property, as in Listing [3-4](#514303_1_En_3_Chapter.xhtml#PC6)?


    ```rql

    from Employees where FistName = ''Andrew''

    ```


    Listing 3-4: Filtering all Employees by absent property


    In Listing [3-4](#514303_1_En_3_Chapter.xhtml#PC6), we made an intentional typo
    – `FistName`. If you are a developer accustomed to relational databases, you will
    expect to receive an error upon executing this query.


    However, in RavenDB, an attempt to filter a collection by the nonexistent property
    name will not produce any errors. You will get an empty result set. Why is that?
    If you recall, RavenDB is a schemaless database. In relational databases, a schema
    is a set of mandatory fields for each table. The schemaless nature of RavenDB
    collections means the absence of any compulsory structure imposed upon documents
    belonging to the same collection. There is no such thing as a set of mandatory
    properties such documents must have. Hence, filtering by any property name you
    can think of will not produce an error – it may only make an unexpected empty
    result set.


    ## Query by Non-string Properties


    Besides filtering by string values, you can also filter by the property containing
    a numerical value:


    ```rql

    from Orders where Freight = 8.53

    ```


    or by the property that holds a Boolean value


    ```rql

    from Products where Discontinued = true

    ```


    ## Filtering by Complex Properties


    In the previous section, we filtered documents by the value of various properties.
    All these properties were simple ones, located at the first level of the document.
    Coming back to the Employee document, shown in Listing [3-5](#514303_1_En_3_Chapter.xhtml#PC9),
    and looking at the `Address` property.


    ```json

    {

    "LastName": "Fuller",

    "FirstName": "Andrew",

    "Title": "Vice President, Sales",

    "Address": {

    "Line1": "908 W. Capital Way",

    "Line2": null,

    "City": "Tacoma",

    "Region": "WA",

    "PostalCode": "98401",

    "Country": "USA",

    "Location": {

    "Latitude": 47.614329,

    "Longitude": -122.3251939

    }

    }

    }

    ```


    Listing 3-5: Structure of Employee JSON Document


    We can see it is complex, consisting of nested properties on several levels. RavenDB
    enables querying over such properties as well, like in Listing [3-6](#514303_1_En_3_Chapter.xhtml#PC10).


    ```rql

    from Employees where Address.Country = ''USA''

    ```


    Listing 3-6: Filtering all Employees by nested property


    Query from Listing [3-6](#514303_1_En_3_Chapter.xhtml#PC10) will select all employees
    living in the United States. Pay attention to the format of the property name
    `Address.Country` – looking at the JSON from Listing [3-5](#514303_1_En_3_Chapter.xhtml#PC9),
    you will observe that `Country` is a nested property within `Address` property.


    Transforming the nested structure of JSON properties into a linear form suitable
    for filtering queries is straightforward. You will write parent property on the
    first level (in this case, `Address`), and then add desired property from the
    second level (in this case, `Country`), separated by a dot.


    The same approach is applied with properties on deeper levels. Hence, to filter
    by `Latitude` property visible in Listing [3-5](#514303_1_En_3_Chapter.xhtml#PC9),
    we will first state top-level ancestor `Address` and then descend over `Location`
    to the `Latitude`. Every time we go one level deeper, we will add a dot as a separator
    between property names. Hence, our final flattened form is `Address.Location.Latitude`.
    When reading this concatenated property from left to right, you descend one level
    every time you run into a dot.


    Finally, our filtering query accessing the property on a third level looks like
    this:


    ```rql

    from Employees where Address.Location.Latitude = 47.614329

    ```


    and will return all employees living along specified `Latitude`.


    ## Filtering by Id


    Following the convention for querying the property name, we might think that filtering
    by identifier follows the same pattern. However, an attempt to execute


    ```rql

    from Employees where id = ''employees/2-A''

    ```


    will return an empty result set, even though we can inspect that employee with
    id `employees/2-A` exists.


    Why is this the case? As we saw in the previous chapter, an *identifier* is a
    unique property called `@id` located within `@metadata`. However, this is a default
    location of an identifier which is also configurable. Because of this, you need
    to use function `id()` that will return the name of the property holding the document
    identifier.


    Aware of this, we can rewrite the previous query as


    ```rql

    from Employees where id() = ''employees/2-A''

    ```


    and results will show this is our old friend, Andrew Fuller.


    ## Cross-Collection Query


    In Listing [3-3](#514303_1_En_3_Chapter.xhtml#PC4), we demonstrated how to query
    all Employees by their first name. It is also possible to query all documents
    that contain a specific property with a specified value. RavenDb offers `@all_docs`
    keyword, which denotes all documents in all collections within your database.
    Hence


    ```rql

    from @all_docs where FirstName = ''Andrew''

    ```


    will find all documents across all collections with a `FirstName` property containing
    value `Andrew`. This query result is the same as Listing [3-3](#514303_1_En_3_Chapter.xhtml#PC4),
    where we specified the collection name. The reason for this is apparent – only
    Employee documents have `FirstName` property.


    However, if we query by a property that is present in various collections


    ```rql

    from @all_docs where Address.Country = ''USA''

    ```


    we will get a result set consisting of documents from various collections, as
    can be seen in Figure [3-6](#514303_1_En_3_Chapter.xhtml#Fig6).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig6_HTML.png)


    Figure 3-6: Result of a Query Across All Collections


    This query returned 22 documents in total from Suppliers, Companies, and Employees
    collection. All these documents represent business entities located in the United
    States.


    It is also possible to write a query that will check which documents from all
    collections or specific one contain a particular property. Following a query


    ```rql

    from @all_docs where exists(Address.Country)

    ```


    will return a total of 129 documents that contain `Country` property within `Address`
    property. However, pay attention that this will also return those documents containing
    a `null` value for a specific property. From the perspective of RavenDB, nothing
    is distinguishing `null` – it is a regular value property can have. Hence, `exists()`
    will check the presence of a specified property, ignoring its content.


    ## Inequality Query


    With inequality operator `!=` we can express filtering condition that is the opposite
    of equality operator `=` usage. For example, executing query


    ```rql

    from Employees where FirstName != ''Andrew''

    ```


    will select all Employees where the first name is not Andrew.


    There is one more way to write this query; you can use `<>` operator, which is
    a synonym for `!=` operator:


    ```rql

    from Employees where FirstName <> ''Andrew''

    ```'
