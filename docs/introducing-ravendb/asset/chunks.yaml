- fmt: "### Properties of Well-Modeled Documents\n\nThere is no algorithm you could\
    \ apply to reach a perfect model. Modeling skills are gained through experience\
    \ over many projects. You will attempt to produce a model, implement it, and then\
    \ evaluate it over time, as your application is working and as change requests\
    \ are arriving. Also, there is never just one way to model things. There are many\
    \ variants, and you can never label any of the variants as “proper,” “best,” “most\
    \ appropriate,” or “by the book.” Many factors will affect this process – you\
    \ will have to think about performance, storage allocation, type of queries, business\
    \ rules, and directions. Your application will most likely evolve.\n\nHowever,\
    \ even though we cannot develop strict rules and recipes for shaping and structuring\
    \ documents, we can observe some good properties of well-modeled documents. Years\
    \ of modeling experience taught us what desired properties are:\n\n*   *Independent*:\
    \ Document should have its separate existence from any other documents.\n*   *Isolated*:\
    \ Document should be able to change independently from other documents.\n*   *Coherent*:\
    \ Document should be legible on its own without referencing other documents.\n\
    \nThe benefits of these desired outcomes can be easiest explained by showing the\
    \ consequences of modeling, which would not respect these principles. Let’s look\
    \ one more time (in Listing 2-1) at our JSON model from the previous section.\n\
    \n```json\n{\n  \"Company\": \"ACME\",\n  \"Total\": 496,\n  \"Lines\": [\n  \
    \  {\n      \"ProductName\": \"Chang\",\n      \"PricePerUnit\": 19,\n      \"\
    Quantity\": 24\n    },\n    {\n      \"ProductName\": \"Aniseed Syrup\",\n   \
    \   \"PricePerUnit\": 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n```\n**Listing\
    \ 2-1** JSON Order Document\n\nListing 2-1 shows the JSON representation of an\
    \ order. As you can see, this order has two order lines. Observe the first one:\n\
    \n```json\n{\n  \"ProductName\": \"Chang\",\n  \"PricePerUnit\": 19,\n  \"Quantity\"\
    : 24\n}\n```\n\nNow, let us consider if we can model this order line as a separate\
    \ document from the perspective of our first goal – *independence*. Is this order\
    \ line independent? Can it have meaningful existence? Thinking further, have you\
    \ ever seen an order line printed on paper, without any more details? The answer\
    \ is clear – the order line cannot have an independent existence; it does not\
    \ have a meaning outside of the scope of its parent Order. We were modeling Order\
    \ Line as a separate document that would result in JSON depleted of the substance.\n\
    \nNext, let us examine the level of isolation our Order has compared to other\
    \ documents in the system. The Document is not *isolated* if updating it also\
    \ means you need to update any other documents in your database. So we can ask\
    \ a question - are any changes in the content of this Order affecting products\
    \ or the Company? The answer is not. Hence, we validated that our model for the\
    \ order respects principle of *isolation*. Approaching this from the perspective\
    \ of negating this principle, here would be an example of the Order model that\
    \ would not be isolated:\n\n```json\n{\n  \"Company\": {\n    \"Name\": \"ACME\"\
    ,\n    \"TotalOrders\": 1,\n  },\n  \"Total\": 496,\n  \"Lines\": [\n    {\n \
    \     \"ProductName\": \"Chang\",\n      \"PricePerUnit\": 19,\n      \"Quantity\"\
    : 24\n    },\n    {\n      \"ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\"\
    : 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n```\n\nIn this example, we decided\
    \ to expand company info to keep track of total orders. Consequently, every time\
    \ we create a new Order, we need to update all existing orders for the same Company\
    \ and increase `TotalOrders` value by one. Such an expanded model is not isolated\
    \ anymore. Changes we make within one Document’s scope generate the ripple effect,\
    \ resulting in a mandatory change to one or more other documents.\n\nFinally,\
    \ if the Document is not *coherent*, it would not be possible to establish its\
    \ meaning based solely on the information it contains. Examining our Order, we\
    \ can conclude that we have all information we need: Acme Company made an Order\
    \ of multiple quantities of two products; we can see what prices we promised to\
    \ them and the total value of this Order. However, upon closer examination, we\
    \ realize that we do not know where to deliver ordered goods. We need to reach\
    \ one more Document containing the Acme address, to gain complete information\
    \ about this Order. Here is how we can expand our Order model to make it coherent:\n\
    \n```json\n{\n  \"Company\": \"ACME\",\n  \"ShippingAddress\": {\n    \"City\"\
    : \"Albuquerque\",\n    \"Country\": \"USA\",\n    \"Line1\": \"2817 Milton Dr.\"\
    \n  },\n  \"Total\": 496,\n  \"Lines\": [\n    {\n      \"ProductName\": \"Chang\"\
    ,\n      \"PricePerUnit\": 19,\n      \"Quantity\": 24\n    },\n    {\n      \"\
    ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\": 10,\n      \"Quantity\"\
    : 4\n    }\n  ]\n}\n```\n\nIn this section, we learned what the three properties\
    \ of well-modeled documents are. After that, we checked our initial Order model\
    \ against these principles and finally corrected our initial model into the final\
    \ version. This final Order document holds complete information about the Order\
    \ (*coherence*), and any changes we make to it will not force us to update other\
    \ documents (*isolation*). Also, the *independent* nature of this model provides\
    \ us with the freedom to produce a paper version and send it within the envelope\
    \ – the recipient will be able to examine and understand it without the need to\
    \ ask additional questions.\n\nWe managed to achieve one more aspect with this\
    \ modeling – we created a *temporal snapshot* model. Our Document captures all\
    \ relevant information as they were at the time of document creation. For example,\
    \ we recorded prices for both of the products – if these products become cheaper\
    \ or more expensive after the creation of the Order, that change will not affect\
    \ our Document. Also, the shipment address is verified to be a valid one. If it\
    \ changes in the future, e.g., if Company relocates, we will have a precise record\
    \ that the shipment went to Albuquerque, USA, and not some other city or country.\
    \ The importance of this data corruption prevention cannot be understated.\n\n\
    In the next section, we will see that besides these properties of quality models,\
    \ we also have one more powerful mental model for the development of document\
    \ models.\n\n### Aggregates\n\nAs we saw in the previous chapter, the NoSQL ecosystem\
    \ has many different flavors and approaches implemented by various databases.\
    \ However, three categories – key-value, document, and column-family store – share\
    \ a common approach by providing you with the ability to define *aggregates*.\n\
    \n*Aggregate* is a term originating in domain-driven design (DDD), where it represents\
    \ a collection of related objects treated as one single unit. Suppose you think\
    \ about the separation of your paper document into information pieces as an act\
    \ of normalization. In that case, Aggregate orientation represents the opposite\
    \ process - *denormalization* - deciding which of these separated chunks of data\
    \ belong together and bringing them together into one unit.\n\nA natural question\
    \ that follows is “how big and comprehensive this unit should be”? If the third\
    \ normal form is one extreme, shall we go to the other extreme and model the whole\
    \ domain as one large unit? To answer this question, we need to look into the\
    \ gist of what aggregate as a unit represents."
  raw: '### Properties of Well-Modeled Documents


    There is no algorithm you could apply to reach a perfect model. Modeling skills
    are gained through experience over many projects. You will attempt to produce
    a model, implement it, and then evaluate it over time, as your application is
    working and as change requests are arriving. Also, there is never just one way
    to model things. There are many variants, and you can never label any of the variants
    as “proper,” “best,” “most appropriate,” or “by the book.” Many factors will affect
    this process – you will have to think about performance, storage allocation, type
    of queries, business rules, and directions. Your application will most likely
    evolve.


    However, even though we cannot develop strict rules and recipes for shaping and
    structuring documents, we can observe some good properties of well-modeled documents.
    Years of modeling experience taught us what desired properties are:


    *   *Independent*: Document should have its separate existence from any other
    documents.


    *   *Isolated*: Document should be able to change independently from other documents.


    *   *Coherent*: Document should be legible on its own without referencing other
    documents.


    The benefits of these desired outcomes can be easiest explained by showing the
    consequences of modeling, which would not respect these principles. Let’s look
    one more time (in Listing [2-1](#514303_1_En_2_Chapter.xhtml#PC2)) at our JSON
    model from the previous section.


    ```

    {

    "Company": "ACME",

    "Total": 496,

    "Lines": [

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    },

    {

    "ProductName": "Aniseed Syrup",

    "PricePerUnit": 10,

    "Quantity": 4

    }

    ]

    }

    Listing 2-1

    JSON Order Document

    ```


    Listing [2-1](#514303_1_En_2_Chapter.xhtml#PC2) shows the JSON representation
    of an order. As you can see, this order has two order lines. Observe the first
    one:


    ```

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    }

    ```


    Now, let us consider if we can model this order line as a separate document from
    the perspective of our first goal – *independence* . Is this order line independent?
    Can it have meaningful existence? Thinking further, have you ever seen an order
    line printed on paper, without any more details? The answer is clear – the order
    line cannot have an independent existence; it does not have a meaning outside
    of the scope of its parent Order. We were modeling Order Line as a separate document
    that would result in JSON depleted of the substance.


    Next, let us examine the level of isolation our Order has compared to other documents
    in the system. The Document is not *isolated* if updating it also means you need
    to update any other documents in your database. So we can ask a question - are
    any changes in the content of this Order affecting products or the Company? The
    answer is not. Hence, we validated that our model for the order respects principle
    of *isolation*. Approaching this from the perspective of negating this principle,
    here would be an example of the Order model that would not be isolated:


    ```

    {

    "Company": {

    "Name": "ACME",

    "TotalOrders": 1,

    }

    "Total": 496,

    "Lines": [

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    },

    {

    "ProductName": "Aniseed Syrup",

    "PricePerUnit": 10,

    "Quantity": 4

    }

    ]

    }

    ```


    In this example, we decided to expand company info to keep track of total orders.
    Consequently, every time we create a new Order, we need to update all existing
    orders for the same Company and increase `TotalOrders` value by one. Such an expanded
    model is not isolated anymore. Changes we make within one Document’s scope generate
    the ripple effect, resulting in a mandatory change to one or more other documents.


    Finally, if the Document is not *coherent* , it would not be possible to establish
    its meaning based solely on the information it contains. Examining our Order,
    we can conclude that we have all information we need: Acme Company made an Order
    of multiple quantities of two products; we can see what prices we promised to
    them and the total value of this Order. However, upon closer examination, we realize
    that we do not know where to deliver ordered goods. We need to reach one more
    Document containing the Acme address, to gain complete information about this
    Order. Here is how we can expand our Order model to make it coherent :


    ```

    {

    "Company": "ACME",

    "ShippingAddress": {

    "City": "Albuquerque",

    "Country": "USA",

    "Line1": "2817 Milton Dr."

    },

    "Total": 496,

    "Lines": [

    {

    "ProductName": "Chang",

    "PricePerUnit": 19,

    "Quantity": 24

    },

    {

    "ProductName": "Aniseed Syrup",

    "PricePerUnit": 10,

    "Quantity": 4

    }

    ]

    }

    ```


    In this section, we learned what the three properties of well-modeled documents
    are. After that, we checked our initial Order model against these principles and
    finally corrected our initial model into the final version. This final Order document
    holds complete information about the Order (*coherence*), and any changes we make
    to it will not force us to update other documents (*isolation*). Also, the *independent*
    nature of this model provides us with the freedom to produce a paper version and
    send it within the envelope – the recipient will be able to examine and understand
    it without the need to ask additional questions.


    We managed to achieve one more aspect with this modeling – we created a *temporal
    snapshot* model . Our Document captures all relevant information as they were
    at the time of document creation. For example, we recorded prices for both of
    the products – if these products become cheaper or more expensive after the creation
    of the Order, that change will not affect our Document. Also, the shipment address
    is verified to be a valid one. If it changes in the future, e.g., if Company relocates,
    we will have a precise record that the shipment went to Albuquerque, USA, and
    not some other city or country. The importance of this data corruption prevention
    cannot be understated.


    In the next section, we will see that besides these properties of quality models,
    we also have one more powerful mental model for the development of document models.


    ### Aggregates


    As we saw in the previous chapter, the NoSQL ecosystem has many different flavors
    and approaches implemented by various databases. However, three categories – key-value,
    document, and column-family store – share a common approach by providing you with
    the ability to define *aggregates*.


    *Aggregate* is a term originating in domain-driven design (DDD) , where it represents
    a collection of related objects treated as one single unit. Suppose you think
    about the separation of your paper document into information pieces as an act
    of normalization. In that case, Aggregate orientation represents the opposite
    process - *denormalization* - deciding which of these separated chunks of data
    belong together and bringing them together into one unit.


    A natural question that follows is “how big and comprehensive this unit should
    be”? If the third normal form is one extreme, shall we go to the other extreme
    and model the whole domain as one large unit? To answer this question, we need
    to look into the gist of what aggregate as a unit represents.'
  trans: "### 建模良好文档的特性\n\n没有一种算法可以确保达到完美模型。建模技巧是通过多个项目的经验积累获得的。你会尝试构建一个模型，实施它，然后随着应用程序的运行和变更请求的到来，随时间推移对其进行评估。此外，建模事物的方式永远不止一种。存在许多变体，你无法将任何变体标记为“恰当的”、“最佳的”、“最合适的”或“符合规范的”。许多因素将影响这一过程——你需要考虑性能、存储分配、查询类型、业务规则和方向。你的应用程序极有可能会不断演进。\n\
    \n然而，尽管我们无法制定严格的规则和配方来塑造和构建文档，但我们可以观察建模良好的文档所具有的一些良好特性。多年的建模经验告诉我们所需的特性是：\n\n\
    *   *独立性*：文档应该独立于任何其他文档而存在。\n*   *隔离性*：文档应该能够独立于其他文档进行更改。\n*   *一致性*：文档应该无需参考其他文档即可自行理解。\n\
    \n这些理想结果的好处，可以通过展示不遵循这些原则的建模后果来最轻松地解释。让我们再次查看上一节中的 JSON 模型（如清单 2-1 所示）。\n\n```json\n\
    {\n  \"Company\": \"ACME\",\n  \"Total\": 496,\n  \"Lines\": [\n    {\n      \"\
    ProductName\": \"Chang\",\n      \"PricePerUnit\": 19,\n      \"Quantity\": 24\n\
    \    },\n    {\n      \"ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\"\
    : 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n```\n**清单 2-1** JSON 订单文档\n\n清单 2-1\
    \ 展示了一个订单的 JSON 表示。如你所见，此订单有两个订单行。观察第一个：\n\n```json\n{\n  \"ProductName\": \"\
    Chang\",\n  \"PricePerUnit\": 19,\n  \"Quantity\": 24\n}\n```\n\n现在，让我们从第一个目标——*独立性*的角度考虑，我们是否可以将这个订单行建模为一个单独的文档。这个订单行是独立的吗？它能有意义地存在吗？进一步想想，你是否见过一张只印有订单行、没有更多细节的纸？答案很明确——订单行无法独立存在；在其父订单的范围之外，它没有意义。我们将订单行建模为单独的文档将导致\
    \ JSON 失去实质内容。\n\n接下来，让我们检查我们的订单与系统中其他文档相比的隔离程度。如果更新一个文档也意味着你需要更新数据库中的任何其他文档，那么该文档就不是*隔离*的。所以我们可以问一个问题——此订单内容的任何更改是否会影响产品或公司？答案是否定的。因此，我们验证了订单模型符合*隔离性*原则。从否定该原则的角度来看，这里有一个不具备隔离性的订单模型示例：\n\
    \n```json\n{\n  \"Company\": {\n    \"Name\": \"ACME\",\n    \"TotalOrders\":\
    \ 1,\n  },\n  \"Total\": 496,\n  \"Lines\": [\n    {\n      \"ProductName\": \"\
    Chang\",\n      \"PricePerUnit\": 19,\n      \"Quantity\": 24\n    },\n    {\n\
    \      \"ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\": 10,\n    \
    \  \"Quantity\": 4\n    }\n  ]\n}\n```\n\n在这个例子中，我们决定扩展公司信息以跟踪总订单数。因此，每当我们创建一个新订单时，都需要更新同一公司的所有现有订单，并将\
    \ `TotalOrders` 值加一。这样一个扩展后的模型就不再具有隔离性了。我们在一个文档范围内所做的更改会产生连锁反应，导致必须更改一个或多个其他文档。\n\
    \n最后，如果文档不具备*一致性*，就无法仅凭其包含的信息确定其含义。审视我们的订单，我们可以得出结论，我们拥有所有需要的信息：Acme 公司下了一个包含两种产品各多个数量的订单；我们可以看到我们承诺给他们的价格以及此订单的总价值。然而，仔细检查后，我们发现不知道将订购的货物送到哪里。我们需要查阅另一个包含\
    \ Acme 地址的文档，才能获得关于此订单的完整信息。以下是我们可以如何扩展订单模型以使其一致：\n\n```json\n{\n  \"Company\"\
    : \"ACME\",\n  \"ShippingAddress\": {\n    \"City\": \"Albuquerque\",\n    \"\
    Country\": \"USA\",\n    \"Line1\": \"2817 Milton Dr.\"\n  },\n  \"Total\": 496,\n\
    \  \"Lines\": [\n    {\n      \"ProductName\": \"Chang\",\n      \"PricePerUnit\"\
    : 19,\n      \"Quantity\": 24\n    },\n    {\n      \"ProductName\": \"Aniseed\
    \ Syrup\",\n      \"PricePerUnit\": 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n\
    ```\n\n在本节中，我们了解了建模良好的文档所具有的三个特性。之后，我们依据这些原则检查了我们最初的订单模型，并最终将初始模型修正为最终版本。这个最终的订单文档包含了关于订单的完整信息（*一致性*），我们对它所做的任何更改都不会迫使我们更新其他文档（*隔离性*）。此外，该模型的*独立*性质使我们能够自由地制作纸质版本并放入信封邮寄——收件人能够检查并理解它，无需提出额外问题。\n\
    \n通过这种建模，我们还成功地实现了另一个方面——我们创建了一个*时间快照*模型。我们的文档捕获了文档创建时所有相关信息的状态。例如，我们记录了两种产品的价格——如果这些产品在订单创建后降价或涨价，该变化将不会影响我们的文档。此外，配送地址经过验证是有效的。如果它在未来发生变化，例如公司搬迁，我们将有一个精确的记录表明货物是送往美国阿尔伯克基，而不是其他城市或国家。这种防止数据损坏的重要性不容小觑。\n\
    \n在下一节中，我们将看到，除了这些优质模型的特性外，我们还有一个更强大的心智模型用于开发文档模型。\n\n### 聚合\n\n正如我们在前一章所见，NoSQL\
    \ 生态系统拥有由不同数据库实现的多种不同风格和方法。然而，键值存储、文档存储和列族存储这三类数据库共享一种共同的方法，即为你提供定义*聚合*的能力。\n\n\
    *聚合*是一个源自域驱动设计（DDD）的术语，它代表被视为一个单一单元的一组相关对象。假设你将纸质文档拆分为信息片段视为规范化过程。那么，聚合导向则代表相反的过程——*反规范化*——决定这些分离的数据块中哪些属于一起，并将它们汇集到一个单元中。\n\
    \n随之而来的自然问题是“这个单元应该多大、多全面”？如果第三范式是一个极端，我们是否应该走向另一个极端，将整个域建模为一个大的单元？要回答这个问题，我们需要深入探究聚合这个单元所代表的本质。"
- fmt: '## Unit of Change and Unit of Consistency


    An aggregate is a *unit of change* and a *unit of consistency*.


    A *unit of change* will be every entity in your database model that can handle
    all requested changes without a need to go to other documents. In other words,
    changes we make are propagating within one aggregate.


    Going back to our three properties of well-modeled documents, we can see that
    aggregates are as follows:


    *   Independent and coherent – they are a collection of related objects joined
    together in one `Document`. These objects are containing complete and rounded
    information and can exist as a separate unit. We can understand an aggregate without
    a need to look into related aggregates.


    *   Isolated – as a unit of change, aggregates can be modified independently of
    other documents.


    The second important property of an aggregate is that they represent a *unit of
    consistency*. A consistent database will, at any point in time, contain only valid
    data. All information stored in a database will conform to all business rules,
    constraints, and validation checks. No matter what changes we apply to our aggregates,
    if we use our validation rules, they will remain valid when saved to the database.


    Going back to our ubiquitous `Order` example, if we add one more line to the `Lines`
    collection, we also need to update the `Total` property by recalculating the new
    total value of our `Order`. If it contains some more properties, like `VAT` or
    shipping costs, they will need to be updated. The system we are building can have
    some more advanced rules – e.g., we might offer a volume discount for shipping
    overseas. In that case, adding just one more order line will trigger a set of
    updates, rule checks, validation checks, and some more updates resulting from
    various calculations. After applying all updates, we will persist `Order` in the
    database in an atomic manner; our `Order` aggregate contains a set of units that
    changed together. This changeset was validated to conform to all business and
    other validation rules. We are now sure that our database holds `Order` that contains
    only valid data.


    ## Distributed Systems


    However, a database is just one component of the software system we are building.
    Taking a broader look, we will see that modern applications are complex. They
    consist of many components, coming in various forms – from utility classes, over
    in-process services to physically separated services and executing across a network
    of interconnected machines. Services are communicating synchronously or asynchronously.


    As an example, look at a simple webshop. Customers can add products to the shopping
    cart and complete `Order`s. `Order` is saved in the webshop application, a confirmation
    email is sent, and the `Order` is pushed to the `ERP` system at the core of operations.
    Even with this small system, we can see three major separated components:


    *   Webshop application


    *   Email server


    *   ERP system


    These are three isolated components existing on separated machines, communicating
    over the network. A system composed in this way is considered to be a *distributed
    system*.


    Sending confirmation email, creating a new `Order`, and pushing it into the `ERP`
    system are one transactional operation from the perspective of your business logic.
    However, in a distributed system like this one is, the standard notion of transaction
    you are used to does not apply anymore. For example, what happens if the `ERP`
    system is not available when you try to send it new `Order`? Shall you abandon
    it? In that scenario, when will we send a confirmation email?


    Distributed systems are challenging because they are complex and because many
    assumptions you usually make do not hold anymore. Operations you were executing
    as synchronous ones before might be asynchronous in the distributed system. Each
    time you communicate over the network, you must provide a fallback for the scenario
    of communication failure. Messages sent between distributed components will sometimes
    be queued and delivered dozens of seconds, maybe even minutes after you initially
    send them.


    As a result, in most cases, in distributed systems, you will not be able to count
    on the transactional nature of your applications. Distributed systems have a notion
    of *eventual consistency*. Your business transaction will eventually complete,
    but there are no guarantees how long it will take for changes you ordered to be
    delivered and accepted by the components of the system. At the end of this propagation
    process, your distributed system will become consistent, but this fact is something
    that you must be aware of all the time.


    ## Aggregates in the Distributed System


    Revisiting the notion of the *aggregate* in the context of distributed systems
    reveals a significant impact on the design of aggregate boundaries. Namely, the
    scope of aggregate boundaries will determine units of data that will be part of
    it. Coming back to the fact that an aggregate is a *unit of change* and a *unit
    of consistency*, we can conclude that modifying and saving aggregate into the
    database will represent one *transaction*.


    What is a transaction? The transaction represents an individual indivisible operation
    that either succeeds or fails as a complete unit. Partial completeness of the
    transaction is not possible, and when transaction processing is finished, you
    will have precise and reliable feedback about the outcome. This property is usually
    called *atomicity*, precisely because of the indivisible nature of the transaction.


    Why is atomicity important? The transaction usually represents a group of tightly
    coupled operations. Executing only some of them might bring your data into an
    inconsistent and corrupted state. As an example, imagine adding a new product
    to the `Order`. You will


    *   Create a new order line with a product.


    *   Recalculate order total to include the amount of new order line.


    What would happen if just one of these two operations is executed? You would either
    charge for a product that would not be included in the `Order` or have the product
    in the `Order` without increasing the `Total`. In other words, you would either
    create financial damage to yourself or your customer.


    Hence, it is clear that we need to treat both of these operations as one atomic
    unit. As a result, both of them will succeed (new order line is created and `Total`
    is correctly updated), or both fail (order total remains the same since no new
    order lines were added). Transaction failure is nothing dramatic per se. You can
    handle it in several standard ways, including retrying it, before showing an error
    message. However, what is essential is that in both cases of successful or unsuccessful
    outcomes, your data will remain in a consistent state.'
