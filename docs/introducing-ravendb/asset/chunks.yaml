  trans: '

    ### 逻辑运算符


    逻辑运算符返回布尔值 `true` 和 `false`。回顾清单 3-6 中的查询：


    ```js

    from Employees where Address.Country = ''USA''

    ```


    我们能够选择所有居住在美国的员工。但如果我们想获取所有居住在美国 **和** 英国的员工呢？为此，我们可以使用 `or` 运算符：


    ```js

    from Employees where Address.Country = ''USA''

    or Address.Country = ''UK''

    ```


    执行此查询将产生一个联合结果——来自这两个国家的员工合并列表。然而，查看前一个查询，很明显添加更多国家将需要输入大量文本来生成一连串的条件。对于这种情况，我们可以使用
    `IN` 运算符，以更短的查询实现相同的结果：


    ```js

    from Employees where Address.Country IN (''USA'', ''UK'')

    ```


    `IN` 运算符接受一个值列表，如果指定的属性具有列表中的任何一个值，则将返回 `true`。


    与 `or` 运算符类似，`and` 将筛选出满足所有指定条件的文档：


    ```js

    from Products where PricePerUnit = 14 and UnitsInStock = 16

    ```


    此查询将返回两个产品，`products/34-A` 和 `products/67-A`，它们各有 16 个库存单位，单价为 14。


    遵循 `or`/`IN` 组合背后的逻辑，很自然地会问——是否存在类似于 `IN` 但用于 `and` 运算符的东西。仔细查看适用的案例，我们会采用如下查询：


    ```js

    from Companies where Address.City = ''London'' and Address.City = ''New York''

    ```


    并将其缩短。然而，像这样的查询将始终返回空结果集——你无法让一个属性同时拥有两个值。确实，简单属性的单个值不能，但包含多个值的复杂属性可以。


    图 3-7 展示了一个 `regions/1-A` 文档，它有一个 `Territories` 属性，这是一个区域的集合。


    ![](img/514303_1_En_3_Fig7_HTML.png)


    一张截图描绘了一个标题为“regions slash 1 A”的文档。标题下方的选项是：保存、克隆和删除。该文档包含 19 行代码。

    **图 3-7. 区域文档**


    借助 `Territories` 属性，我们现在可以构建一个包含 `and` 条件的查询：


    ```js

    from Regions where Territories[].Name = ''Wilton'' and Territories[].Name = ''Neward''.

    ```


    此查询将返回所有在 Territories 属性中同时包含 Wilton 和 Neward 的区域。我们可以将其简写为：


    ```js

    from Regions where Territories[].Name ALL IN (''Wilton'', ''Neward'').

    ```


    我们可以观察到两个有趣的特性。第一个是 `ALL IN` 运算符，它提供了一种将多个值与数组进行匹配的方法。第二个是表达式 `Territories[].Name`，它获取
    `Territories` 集合的所有元素，并从每个元素中提取 `Name` 属性。


    `ALL IN` 运算符的一个典型用例是选择所有被指定标签集标记的文档。


    ### 范围查询


    到目前为止，我们一直使用相等和不等运算符通过精确匹配进行筛选。也可以使用其他运算符来创建范围查询。


    以下查询：


    ```js

    from Products where UnitsInStock > 26

    ```


    将返回库存单位多于 26 的所有产品，而：


    ```js

    from Products where UnitsInStock >= 26

    ```


    将列出库存单位大于或等于 26 的所有产品。我们将类似运算符 `<` 和 `<=` 的使用留作练习。


    我们可以组合这些运算符，因此以下查询：


    ```js

    from Products where UnitsInStock > 1 and UnitsInStock < 3

    ```


    将返回库存单位为 2 的所有产品（因为整数条件），而：


    ```js

    from Products where UnitsInStock >= 1 and UnitsInStock <= 3

    ```


    则列出库存单位为 1、2 或 3 的所有产品。


    我们可以缩短最后一个查询——秉承 `IN` 和 `ALL IN` 运算符的精神，RavenDB 还提供了 `BETWEEN` 运算符，因此我们可以将之前的查询重写为：


    ```js

    from Products where UnitsInStock BETWEEN 1 and 3

    ```


    请注意，`BETWEEN` 在区间的下限和上限都是**包含**的。


    ### 大小写


    重新审视清单 3-3 中我们熟悉的例子，我们可以像这样修改它：


    ```js

    from Employees where FirstName = ''ANDREW''

    ```


    尽管你可能预期没有结果（因为我们将名字全部大写了），但此查询将返回 Andrew Fuller 作为唯一结果。为什么会这样？


    RavenDB 在查询中默认进行**不区分大小写**的匹配。在这种情况下，筛选条件的值与文档中的实际属性值不同，但 `Andrew` 和 `ANDREW`
    匹配了，因为 RavenDB 忽略了大小写差异。这种不区分大小写的处理是一个有意识的决定，因为在大多数场景下，字符串的不区分大小写比较会按照你的期望产生结果。


    然而，在某些特定情况下，比如匹配 BASE64 编码的字符串时，你需要精确匹配。RavenDB 通过 `exact()` 方法支持这一点，以下查询将返回空结果列表：


    ```js

    from Employees where exact(FirstName = ''ANDREW'')

    ```

    '
- fmt: '### 全文搜索


    对数据进行全文搜索是现代应用程序的标准功能之一。随着时间的推移，您将构建的大多数应用程序中都不可避免地会存在此类搜索。幸运的是，这是RavenDB擅长的领域之一。我们将在后续章节提供更多信息，但目前可以这么说，RavenDB内部使用Lucene.net进行索引。Lucene是当今可用的最佳索引引擎之一，多年来它已确立了自己作为可靠、标准解决方案的地位。作为基础设施的一部分，它已出现在多个知名品牌产品中，例如Solr和Elastic
    Search。因此，RavenDB可以为您提供一流的全文搜索功能，并消除对任何额外解决方案的需求。


    此类搜索的一个例子是按员工名字的通用前缀查询所有员工：


    ```

    from Employees where StartsWith(FirstName, ''an'')

    ```


    此查询使用 `StartsWith()` 函数，该函数将每个员工的 `FirstName` 属性内容与前缀 `an` 进行匹配。执行后，您将获得结果，如图
    [3-8](#514303_1_En_3_Chapter.xhtml#Fig8) 所示。


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig8_HTML.jpg)


    查询窗口结果面板的截图显示，在标签“index auto slash employees slash by first name”下有2份文档。这两份文档中的名字分别是Anne和Andrew。


    **图 3-8**


    按 `FirstName` 前缀搜索员工


    我们得到了两个结果，两名员工，他们的名字都以“an”开头。请注意，在这种情况下，我们的查询也是不区分大小写的。


    除了按前缀搜索外，还可以搜索字段内任意位置的术语。例如，如果我们想搜索名称中包含单词 `stop` 的所有公司，我们会编写以下查询：


    ```

    from Companies where Search(Name, ''stop'')

    ```


    执行时，此查询将返回两家公司：“Let’s Stop N Shop”和“QUICK-Stop”，如图 [3-9](#514303_1_En_3_Chapter.xhtml#Fig9)
    所示。


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig9_HTML.jpg)


    查询窗口结果面板的截图显示，在标签“index auto slash companies slash by search name”下有2份文档。这两份文档中的名字分别是let’s
    stop N shop和quick stop。


    **图 3-9**


    按名称内容搜索公司


    这两家公司的名称中都包含单词“stop”。


    当我们执行相等过滤（进行精确匹配）时，情况很清楚，但在这种可以发生任意位置部分匹配的情况下，幕后发生了什么？为了提供此功能，RavenDB将获取公司的 `Name`
    并应用*分词*：名称将被拆分为单词，每个这样的单词都将被索引。例如，公司名称“Let’s Stop N Shop”将被分成四个标记：“Let”、“Stop”、“N”、“Shop”。执行全文搜索查询后，RavenDB会将您的搜索术语与一组标记进行匹配并显示结果。因此，可以说全文搜索仍然是精确匹配，但不是针对完整的属性值——而是匹配组件（标记）。


    我们也可以按多个术语进行搜索。 following query


    ```

    from Companies where Search(Name, "monde cheese")

    ```


    将搜索名称中包含“monde”或“cheese”的所有公司，返回包含三家公司的结果集，如图 [3-10](#514303_1_En_3_Chapter.xhtml#Fig10)
    所示。


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig10_HTML.png)


    查询窗口结果面板的截图显示，在标签“index auto slash companies slash by search name”下有3份文档。这三份文档中的名字分别是spécialités
    du monde、Du monde entire和the big cheese。


    **图 3-10**


    使用多个术语按名称内容搜索公司


    对于不是简单属性而是复杂属性的情况呢？ `Address` 是这种嵌套属性的一个常见例子。


    ```

    "Address": {

    "Line1": "87 Polk St. Suite 5",

    "Line2": null,

    "City": "San Francisco",

    "Region": "CA",

    "PostalCode": "94117",

    "Country": "USA",

    "Location": {

    "Latitude": 37.7774357,

    "Longitude": -122.4180503

    }

    }

    ```


    RavenDB也会对嵌套属性应用分词过程；首先，它会将复杂属性分离为一组嵌套属性。之后，每个嵌套属性将被分词——分离为简单组件——并被索引。结果，当您执行查询


    ```

    from Companies where Search(Address, "London Sweden")

    ```


    时，您将获得位于伦敦或瑞典的公司列表。如您所见，`Address` 的所有属性都被索引了，因此全文搜索会同时检查 `City` 和 `Country` 字段。


    ### 排序


    重新审视我们第一个查询示例，来自清单 [3-1](#514303_1_En_3_Chapter.xhtml#PC1)


    ```

    from Employees

    ```


    执行后，您将获得如图 [3-11](#514303_1_En_3_Chapter.xhtml#Fig11) 所示的结果。


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig11_HTML.png)


    查询窗口结果面板的截图显示，在标签“employees”下有9份文档。文档列在列标签下：preview, I d, last name, first name,
    title, address, and hired at。


    **图 3-11**


    所有员工的未排序列表


    如您所见，我们获得了所有员工，但他们的顺序是任意的；他们是未排序的。RavenDB提供 `order by` 子句对结果进行排序；因此


    ```

    from Employees order by LastName asc

    ```


    将按员工姓氏的升序对员工进行排序。您也可以指定多个字段进行排序，所以


    ```

    from Employees order by LastName asc, FirstName asc

    ```


    将在两名员工姓氏相同的情况下，应用按名字的二级排序。


    也可以在数字字段上进行排序：


    ```

    from Products order by PricePerUnit desc

    ```


    执行此查询将导致产品排序，如图 [3-12](#514303_1_En_3_Chapter.xhtml#Fig12) 所示。


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig12_HTML.png)


    查询窗口结果面板的截图显示了一个文档列表。文档列在列标签下：preview, I d, name, supplier, category, quantity
    per unit, and price per unit。


    **图 3-12**


    所有产品的排序列表


    然而，仔细观察 `PricePerUnit` 列，会发现它并非如我们所期望的那样按降序排序。为什么会发生这种情况，以及如何正确地按此列对 `Products`
    进行排序？


    原因在于RavenDB处理存储数据的方式。字段没有类型，在我们没有表达意图的情况下，RavenDB默认采用词法顺序，即字段默认被当作字符串处理。使用降序词法顺序时，81会排在9之前，这就解释了我们得到的排序顺序。


    幸运的是，我们可以快速修复此问题。我们需要告诉RavenDB应用哪种排序顺序：


    ```

    from Products order by PricePerUnit as double desc

    ```


    此查询将通过将字段视为 `double` 类型的值来应用排序。我们也可以应用 `as long` 来截断任何小数部分，并将这些截断后的值作为整数进行比较：


    ```

    from Products order by PricePerUnit as long desc。

    ```'
  raw: '### Full-Text Searching


    The ability to perform a full-text search over data is one of the standard features
    in modern applications. This kind of search will inevitably be present in most
    of the applications you will be building over time. Fortunately, this is one of
    the areas where RavenDB excels. We will provide more information in chapters to
    come, but for now, let’s just say that RavenDB uses Lucene.net internally for
    indexing purposes. Lucene is one of the best indexing engines available today,
    and over the years, it has established itself as a reliable and standard solution.
    As a part of an infrastructure, it has been present in several brand-name products,
    like Solr and Elastic Search. So, RavenDB can provide you with first-class full-text
    searching capabilities and eliminate a need for any additional solution that would
    provide you with this.


    An example of this type of search would be querying all employees for a common
    prefix of their first name :


    ```

    from Employees where StartsWith(FirstName, ''an'')

    ```


    This query uses the `StartsWith()` function that will match the content of the
    `FirstName` property of every employee with the prefix *an*. After executing it,
    you will get results, as shown in Figure [3-8](#514303_1_En_3_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig8_HTML.jpg)


    A screenshot of the results panel in the query window has 2 documents under the
    label, index auto slash employees slash by first name. The first names in the
    2 documents are Anne and Andrew, respectively.


    Figure 3-8


    Searching Employees by the Prefix of FirstName


    We got two results, two employees, both having first names that start with “an.”
    Note that in this case, we have a case-insensitive query as well.


    Besides searching by prefix, it is also possible to search for a term at any position
    within a field. For example, if we want to search for all companies that contain
    word *stop* within the name, we would write the following query :


    ```

    from Companies where Search(Name, ''stop'')

    ```


    When executed, this query will return two companies, “Let’s Stop N Shop” and “QUICK-Stop”
    as shown in Figure [3-9](#514303_1_En_3_Chapter.xhtml#Fig9).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig9_HTML.jpg)


    A screenshot of the results panel in the query window has 2 documents under the
    label, index auto slash companies slash by search name. The names in the 2 documents
    are let’s stop N shop and quick stop respectively.


    Figure 3-9


    Searching Companies by the Name Content


    Both of these companies contain the word “stop” as a part of their name .


    It is clear what happens when we perform equality filtering, where exact matching
    is done, but what happens behind the scene in this case, where partial matching
    on the arbitrary position can happen? To provide this functionality, RavenDB will
    take the `Name` of the company and apply *tokenization*: the name will be split
    into words, and every such word will be indexed. As an example, the company name
    “Let’s Stop N Shop” would be divided into four tokens: “Let”, “Stop”, “N”, “Shop”.
    After you execute a full-text search query, RavenDB will match your search term
    against a set of tokens and show you results. So, you could say that full-text
    search is still exact matching, but not against full property value – instead,
    components (tokens) are matched.


    We can also search by more than one term. Following query


    ```

    from Companies where Search(Name, "monde cheese")

    ```


    will search for all companies that contain “monde” or “cheese” in their name,
    returning three companies as a result set, as shown in Figure [3-10](#514303_1_En_3_Chapter.xhtml#Fig10).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig10_HTML.png)


    A screenshot of the results panel in the query window depicts 3 documents under
    the label, index auto slash companies slash by search name. The names in the 3
    documents are spécialités du monde, Du monde entire, and the big cheese respectively.


    Figure 3-10


    Searching Companies by the Name Content with Multiple Terms


    What about properties which are not simple, but complex instead? Address is a
    familiar example of such nested property


    ```

    "Address": {

    "Line1": "87 Polk St. Suite 5",

    "Line2": null,

    "City": "San Francisco",

    "Region": "CA",

    "PostalCode": "94117",

    "Country": "USA",

    "Location": {

    "Latitude": 37.7774357,

    "Longitude": -122.4180503

    }

    }

    ```


    RavenDB will apply a tokenization process with nested properties as well; first,
    it will separate complex property into a set of nested properties. After that,
    every nested property will be tokenized – separated into simple components – and
    indexed. As a result, when you execute a query


    ```

    from Companies where Search(Address, "London Sweden")

    ```


    you will get a list of companies located in London or Sweden. As you can see,
    all properties of the `Address` are indexed, so the full-text search is simultaneously
    checking both City and Country fields .


    ### Sorting


    Revisiting our first example query from Listing [3-1](#514303_1_En_3_Chapter.xhtml#PC1)


    ```

    from Employees

    ```


    After executing it, you will get a result as shown in Figure [3-11](#514303_1_En_3_Chapter.xhtml#Fig11).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig11_HTML.png)


    A screenshot of the results panel in the query window has 9 documents under the
    label, employees. The documents are listed under the column labels: preview, I
    d, last name, first name, title, address, and hired at.


    Figure 3-11


    Unsorted Listing of All Employees


    As you can see, we got all employees, but their order is arbitrary; they are unsorted.
    RavenDB provides `order by` clause for sorting results; hence


    ```

    from Employees order by LastName asc

    ```


    will sort employees by the last name in ascending order. You can also specify
    more than one field for sorting, so


    ```

    from Employees order by LastName asc, FirstName asc

    ```


    will apply secondary sorting by the first name in all those cases when two employees
    have the same last name.


    Sorting is also possible on numeric fields:


    ```

    from Products order by PricePerUnit desc

    ```


    Executing this query results in sorted products, as shown in Figure [3-12](#514303_1_En_3_Chapter.xhtml#Fig12)
    .


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig12_HTML.png)


    A screenshot of the results panel in the query window has a list of documents.
    The documents are listed under the column labels: preview, I d, name, supplier,
    category, quantity per unit, and price per unit.


    Figure 3-12


    Sorted Listing of All Products


    However, looking closely at the column PricePerUnit reveals it is not sorted in
    the descending order as we expect. Why is this happening , and how to correctly
    sort Products by this column?


    The cause of this lies in the way that RavenDB treats stored data. Fields are
    not typed, and without us expressing intention, RavenDB will default to lexical
    ordering, i.e., fields are treated as strings by default. With descending lexical
    ordering, 81 will come before 9, and that explains the sorting order we got.


    Luckily, we can quickly fix this. We need to tell RavenDB which sorting order
    to apply :


    ```

    from Products order by PricePerUnit as double desc

    ```


    This query will use ordering by treating the field as values of type *double*.
    We can also apply `as long` to truncate any decimal parts and to compare such
    truncated values as integers


    ```

    from Products order by PricePerUnit as long desc.

    ```'
  trans: '### 全文搜索


    对数据进行全文搜索是现代应用程序的标准功能之一。随着时间的推移，您将构建的大多数应用程序中都不可避免地会存在此类搜索。幸运的是，这是 RavenDB 擅长的领域之一。我们将在后续章节提供更多信息，但目前可以这么说，RavenDB
    内部使用 Lucene.net 进行索引。Lucene 是当今可用的最佳索引引擎之一，多年来它已确立了自己作为可靠、标准解决方案的地位。作为基础设施的一部分，它已出现在多个知名品牌产品中，例如
    Solr 和 Elastic Search。因此，RavenDB 可以为您提供一流的全文搜索功能，并消除对任何额外解决方案的需求。


    此类搜索的一个例子是按员工名字的通用前缀查询所有员工：


    ```

    from Employees where StartsWith(FirstName, ''an'')

    ```


    此查询使用 `StartsWith()` 函数，该函数将每个员工的 `FirstName` 属性内容与前缀 `an` 进行匹配。执行后，您将获得结果，如图
    3-8 所示。


    ![](img/514303_1_En_3_Fig8_HTML.jpg)


    查询窗口结果面板的截图显示，在标签“索引 自动/雇员/按名字”下有 2 份文档。这两份文档中的名字分别是 Anne 和 Andrew。


    **图 3-8**


    按 `FirstName` 前缀搜索员工


    我们得到了两个结果，两名员工，他们的名字都以“an”开头。请注意，在这种情况下，我们的查询也是不区分大小写的。


    除了按前缀搜索外，还可以搜索字段内任意位置的术语。例如，如果我们想搜索名称中包含单词 `stop` 的所有公司，我们会编写以下查询：


    ```

    from Companies where Search(Name, ''stop'')

    ```


    执行时，此查询将返回两家公司：“Let’s Stop N Shop”和“QUICK-Stop”，如图 3-9 所示。


    ![](img/514303_1_En_3_Fig9_HTML.jpg)


    查询窗口结果面板的截图显示，在标签“索引 自动/公司/按搜索名称”下有 2 份文档。这两份文档中的名字分别是 let’s stop N shop 和 quick
    stop。


    **图 3-9**


    按名称内容搜索公司


    这两家公司的名称中都包含单词“stop”。


    当我们执行相等过滤（进行精确匹配）时，情况很清楚，但在这种可以发生任意位置部分匹配的情况下，幕后发生了什么？为了提供此功能，RavenDB 将获取公司的 `Name`
    并应用*分词*：名称将被拆分为单词，每个这样的单词都将被索引。例如，公司名称“Let’s Stop N Shop”将被分成四个标记：“Let”、“Stop”、“N”、“Shop”。执行全文搜索查询后，RavenDB
    会将您的搜索术语与一组标记进行匹配并显示结果。因此，可以说全文搜索仍然是精确匹配，但不是针对完整的属性值——而是匹配组件（标记）。


    我们也可以按多个术语进行搜索。 following query


    ```

    from Companies where Search(Name, "monde cheese")

    ```


    将搜索名称中包含“monde”或“cheese”的所有公司，返回包含三家公司的结果集，如图 3-10 所示。


    ![](img/514303_1_En_3_Fig10_HTML.png)


    查询窗口结果面板的截图显示，在标签“索引 自动/公司/按搜索名称”下有 3 份文档。这三份文档中的名字分别是 spécialités du monde、Du
    monde entire 和 the big cheese。


    **图 3-10**


    使用多个术语按名称内容搜索公司


    对于不是简单属性而是复杂属性的情况呢？ `Address` 是这种嵌套属性的一个常见例子。


    ```

    "Address": {

    "Line1": "87 Polk St. Suite 5",

    "Line2": null,

    "City": "San Francisco",

    "Region": "CA",

    "PostalCode": "94117",

    "Country": "USA",

    "Location": {

    "Latitude": 37.7774357,

    "Longitude": -122.4180503

    }

    }

    ```


    RavenDB 也会对嵌套属性应用分词过程；首先，它会将复杂属性分离为一组嵌套属性。之后，每个嵌套属性将被分词——分离为简单组件——并被索引。结果，当您执行查询


    ```

    from Companies where Search(Address, "London Sweden")

    ```


    时，您将获得位于伦敦或瑞典的公司列表。如您所见，`Address` 的所有属性都被索引了，因此全文搜索会同时检查 `City` 和 `Country` 字段。


    ### 排序


    重新审视我们第一个查询示例，来自清单 3-1


    ```

    from Employees

    ```


    执行后，您将获得如图 3-11 所示的结果。


    ![](img/514303_1_En_3_Fig11_HTML.png)


    查询窗口结果面板的截图显示，在标签“employees”下有 9 份文档。文档列在列标签下：preview, I d, last name, first name,
    title, address, and hired at。


    **图 3-11**


    所有员工的未排序列表


    如您所见，我们获得了所有员工，但他们的顺序是任意的；他们是未排序的。RavenDB 提供 `order by` 子句对结果进行排序；因此


    ```

    from Employees order by LastName asc

    ```


    将按员工姓氏的升序对员工进行排序。您也可以指定多个字段进行排序，所以


    ```

    from Employees order by LastName asc, FirstName asc

    ```


    将在两名员工姓氏相同的情况下，应用按名字的二级排序。


    也可以在数字字段上进行排序：


    ```

    from Products order by PricePerUnit desc

    ```


    执行此查询将导致产品排序，如图 3-12 所示。


    ![](img/514303_1_En_3_Fig12_HTML.png)


    查询窗口结果面板的截图显示了一个文档列表。文档列在列标签下：preview, I d, name, supplier, category, quantity
    per unit, and price per unit。


    **图 3-12**


    所有产品的排序列表


    然而，仔细观察 `PricePerUnit` 列，会发现它并非如我们所期望的那样按降序排序。为什么会发生这种情况，以及如何正确地按此列对 `Products`
    进行排序？


    原因在于 RavenDB 处理存储数据的方式。字段没有类型，在我们没有表达意图的情况下，RavenDB 默认采用词法顺序，即字段默认被当作字符串处理。使用降序词法顺序时，81
    会排在 9 之前，这就解释了我们得到的排序顺序。


    幸运的是，我们可以快速修复此问题。我们需要告诉 RavenDB 应用哪种排序顺序：


    ```

    from Products order by PricePerUnit as double desc

    ```


    此查询将通过将字段视为 `double` 类型的值来应用排序。我们也可以应用 `as long` 来截断任何小数部分，并将这些截断后的值作为整数进行比较：


    ```

    from Products order by PricePerUnit as long desc。

    ```'
- fmt: '### Paging


    Paging is a common feature in most business applications. Every time you need
    to show results listing that is longer than the size of the screen, you will most
    likely use paging. RavenDB natively supports paging with a syntax that looks like
    this:


    ```

    from Companies limit 10, 5

    ```


    This query will skip the first ten results and return the next five. Of course,
    paging can be combined with other features, so query


    ```

    from Companies where Address.Country = ''USA'' order by Name asc limit 5, 5

    ```


    will filter companies from the United States, order them by name in ascending
    order, skip the first five, and take the next five.


    ## Advanced Querying


    In the previous section, we saw an introduction to RQL and basic filtering, ordering,
    and paging operations. Now we will look into advanced functions – projections,
    aggregations, and includes.


    ## Projecting Results


    So far, all of our queries were returning complete documents. For example


    ```

    from Employees order by LastName asc

    ```


    will sort employees by the last name and return all of them as full documents.
    However, when building applications, you will rarely need whole documents. You
    will usually display a subset of document fields. For example, we might want to
    show just the first and last name of each employee. RavenDB has a dedicated keyword
    `select` that is used precisely for this purpose and works similarly to SQL equivalent,
    as shown in Listing 3-7.


    ```

    from Employees order by LastName asc

    select FirstName, LastName

    ```


    Listing 3-7

    Usage of `select` keyword


    Executing this query will produce results as shown in Figure 3-13.


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig13_HTML.png)


    A screenshot of the results panel in the query window has 9 documents under the
    label, index auto slash employees slash by last name. The last names in the list
    of documents are in ascending order.


    Figure 3-13


    Results of Using `select` Keyword


    As you can see, `select` is very similar to the SQL variant – it will select and
    return only a subset of fields.


    You can rename returned fields by using aliases with `select` statements. Hence,
    query


    ```

    from Employees

    select FirstName as Name, Address.City as City

    ```


    will return a list of documents with the following structure:


    ```

    {

    "Name": "Andrew",

    "City": "Tacoma",

    }

    ```


    Projections can also operate on values that are not simple. In the following example,
    we are using projection on the object and an array:


    ```

    from Orders

    select ShipTo, Lines[].ProductName as Products

    ```


    Executing this query will return documents with the following structure:


    ```

    {

    "ShipTo": {

    "City": "Reims",

    "Country": "France",

    "Line1": "59 rue de l''Abbaye",

    "Line2": null,

    "Location": {

    "Latitude": 49.25595819999999,

    "Longitude": 4.1547448

    },

    "PostalCode": "51100",

    "Region": null

    },

    "Products": [

    "Queso Cabrales",

    "Singaporean Hokkien Fried Mee",

    "Mozzarella di Giovanni"

    ]

    }

    ```


    `ShipTo` object is selected as it is, and `Products` property contains projection
    composed of product name selected from all order lines.


    ### Projecting with Object Literals


    The projections we saw so far were simple, flat, and linear. They essentially
    mimicked SQL projections, where you would select a subset of properties to return
    as a simple collection of linear values. RQL can do much more – you can project
    a complex result using `object literal` syntax, like in Listing 3-8.


    ```

    from Orders as o

    select {

    Country: o.ShipTo.Country,

    FirstProduct: o.Lines[0].ProductName,

    LastProduct:  o.Lines[o.Lines.length - 1].ProductName

    }

    ```


    Listing 3-8

    Projecting with object literal


    When executed, this query returns a set of projections. For document `orders/1-A`,
    it looks like this:


    ```

    {

    "Country": "France",

    "FirstProduct": "Queso Cabrales",

    "LastProduct": "Mozzarella di Giovanni",

    "@metadata": {

    "@id": "orders/1-A"

    }

    }

    ```


    As you can see, we used a simple path to select shipping country and complex expressions
    to perform a deep selection of first and last product from order lines collection.
    Notice that in Listing 3-8, we had to use an alias `as o` to be able to reference
    `o` in complex projection expressions.


    What is also essential about Listing 3-8 is that `object literal` is not JSON
    expression – it is JavaScript literal, and any valid JavaScript expression will
    be executed. As an example of this, we can look into the `HiredAt` property of
    an Employee document:


    ```

    "HiredAt": "1994-03-05T00:00:00.0000000"

    ```


    This string represents a date in ISO 8601 format, and with object literal, it
    is possible to write JavaScript, like one in Listing 3-9, that will process this
    date and extract the year.


    ```

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: e.FirstName + " " + e.LastName

    }

    ```


    Listing 3-9

    Projecting with JavaScript within object literal


    will return a set of documents with the following structure:


    ```

    {

    "Id": "employees/9-A",

    "Year": 1994,

    "Fullname": "Anne Dodsworth"

    }

    ```


    Query in Listing 3-9 is using JavaScript to populate all three fields:


    *   `Id` – calling function `id()` that is taking document as an argument and
    determines its identifier.

    *   `Year` – calling JS constructor for `Date` object with ISO 8601 string as
    an argument. After that, method `Date.getFullYear()` returns year.

    *   `Fullname` – concatenates two properties of the document with a separator.


    ### Declaring Functions in Queries


    With RQL, you can extract JavaScript code into functions that you can call from
    object literals, as we did in Listing 3-10.


    ```

    declare function getFullName(e)

    {

    return e.FirstName + " " + e.LastName;

    }

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: getFullName(e)

    }

    ```


    Listing 3-10

    Calling JavaScript function from object literal


    In this example, we extracted code that was joining first and last name into function
    `getFullName()`, which is then called from object literal.


    You can have several of these functions. Their limitations are standard limitations
    of JavaScript with additional constraints from the nature of their usage. If JavaScript
    code takes 5 seconds to execute, your query will be additionally 5 seconds longer.
    Taking all of this into account, you can produce arbitrary complex functionality,
    demonstrated in an example from Listing 3-11.


    ```

    declare function lineItemPrice(l) {

    return l.PricePerUnit * l.Quantity * (1 - l.Discount);

    }

    from Orders as o

    select {

    TopProducts: o.Lines

    .sort((a, b) => lineItemPrice(b) - lineItemPrice(a) )

    .map(x => x.ProductName)

    .slice(0,2),

    Total: o.Lines.reduce((acc, l) => acc + lineItemPrice(l), 0)

    }

    ```


    Listing 3-11

    Example of complex JavaScript code in object literal


    When executed, code from Listing 3-11 will produce a list of documents with a
    total value of the order and two most expensive products from each order, e.g.


    ```

    {

    "TopProducts": [

    "Mozzarella di Giovanni",

    "Queso Cabrales"

    ],

    "Total": 440

    }

    ```'
  raw: '### Paging


    Paging is a common feature in most business applications. Every time you need
    to show results listing that is longer than the size of the screen, you will most
    likely use paging. RavenDB natively supports paging with a syntax that looks like
    this:


    ```

    from Companies limit 10, 5

    ```


    This query will skip the first ten results and return the next five. Of course,
    paging can be combined with other features, so query


    ```

    from Companies where Address.Country = ''USA'' order by Name asc limit 5, 5

    ```


    will filter companies from the United States, order them by name in ascending
    order, skip the first five, and take the next five .


    ## Advanced Querying


    In the previous section, we saw an introduction to RQL and basic filtering, ordering,
    and paging operations. Now we will look into advanced functions – projections,
    aggregations, and includes.


    ### Projecting Results


    So far, all of our queries were returning complete documents. For example


    ```

    from Employees order by LastName asc

    ```


    will sort employees by the last name and return all of them as full documents.
    However, when building applications, you will rarely need whole documents. You
    will usually display a subset of document fields. For example, we might want to
    show just the first and last name of each employee. RavenDB has a dedicated keyword
    `select` that is used precisely for this purpose and works similarly to SQL equivalent,
    as shown in Listing [3-7](#514303_1_En_3_Chapter.xhtml#PC47).


    ```

    from Employees order by LastName asc

    select FirstName, LastName

    Listing 3-7

    Usage of select keyword

    ```


    Executing this query will produce results as shown in Figure [3-13](#514303_1_En_3_Chapter.xhtml#Fig13).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig13_HTML.png)


    A screenshot of the results panel in the query window has 9 documents under the
    label, index auto slash employees slash by last name. The last names in the list
    of documents are in ascending order.


    Figure 3-13


    Results of Using Select Keyword


    As you can see , `select` is very similar to the SQL variant – it will select
    and return only a subset of fields.


    You can rename returned fields by using aliases with select statements. Hence,
    query


    ```

    from Employees

    select FirstName as Name, Address.City as City

    ```


    will return a list of documents with the following structure:


    ```

    {

    "Name": "Andrew",

    "City": "Tacoma",

    }

    ```


    Projections can also operate on values that are not simple. In the following example,
    we are using projection on the object and an array:


    ```

    from Orders

    select ShipTo, Lines[].ProductName as Products

    ```


    Executing this query will return documents with the following structure :


    ```

    {

    "ShipTo": {

    "City": "Reims",

    "Country": "France",

    "Line1": "59 rue de l''Abbaye",

    "Line2": null,

    "Location": {

    "Latitude": 49.25595819999999,

    "Longitude": 4.1547448

    },

    "PostalCode": "51100",

    "Region": null

    },

    "Products": [

    "Queso Cabrales",

    "Singaporean Hokkien Fried Mee",

    "Mozzarella di Giovanni"

    ]

    }

    ```


    `ShipTo` object is selected as it is, and `Products` property contains projection
    composed of product name selected from all order lines.


    #### Projecting with Object Literals


    The projections we saw so far were simple, flat, and linear. They essentially
    mimicked SQL projections, where you would select a subset of properties to return
    as a simple collection of linear values. RQL can do much more – you can project
    a complex result using *object literal* syntax, like in Listing [3-8](#514303_1_En_3_Chapter.xhtml#PC52).


    ```

    from Orders as o

    select {

    Country: o.ShipTo.Country,

    FirstProduct: o.Lines[0].ProductName,

    LastProduct:  o.Lines[o.Lines.length - 1].ProductName

    }

    Listing 3-8

    Projecting with object literal

    ```


    When executed, this query returns a set of projections. For document `orders/1-A`,
    it looks like this:


    ```

    {

    "Country": "France",

    "FirstProduct": "Queso Cabrales",

    "LastProduct": "Mozzarella di Giovanni",

    "@metadata": {

    "@id": "orders/1-A"

    }

    }

    ```


    As you can see, we used a simple path to select shipping country and complex expressions
    to perform a deep selection of first and last product from order lines collection.
    Notice that in Listing [3-8](#514303_1_En_3_Chapter.xhtml#PC52), we had to use
    an alias `as o` to be able to reference `o` in complex projection expressions.


    What is also essential about Listing [3-8](#514303_1_En_3_Chapter.xhtml#PC52)
    is that object literal is not JSON expression – it is JavaScript literal, and
    any valid JavaScript expression will be executed. As an example of this, we can
    look into the `HiredAt` property of an Employee document:


    ```

    "HiredAt": "1994-03-05T00:00:00.0000000"

    ```


    This string represents a date in ISO 8601 format, and with object literal, it
    is possible to write JavaScript, like one in Listing [3-9](#514303_1_En_3_Chapter.xhtml#PC55),
    that will process this date and extract the year.


    ```

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: e.FirstName + " " + e.LastName

    }

    Listing 3-9

    Projecting with JavaScript within object literal

    ```


    will return a set of documents with the following structure:


    ```

    {

    "Id": "employees/9-A",

    "Year": 1994,

    "Fullname": "Anne Dodsworth"

    }

    ```


    Query in Listing [3-9](#514303_1_En_3_Chapter.xhtml#PC55) is using JavaScript
    to populate all three fields :


    *   Id – calling function id() that is taking document as an argument and determines
    its identifier.


    *   Year – calling JS constructor for Date object with ISO 8601 string as an argument.
    After that, method Date.getFullYear() returns year.


    *   Fullname – concatenates two properties of the document with a separator.


    #### Declaring Functions in Queries


    With RQL, you can extract JavaScript code into functions that you can call from
    object literals , as we did in Listing [3-10](#514303_1_En_3_Chapter.xhtml#PC57).


    ```

    declare function getFullName(e)

    {

    return e.FirstName + " " + e.LastName;

    }

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: getFullName(e)

    }

    Listing 3-10

    Calling JavaScript function from object literal

    ```


    In this example, we extracted code that was joining first and last name into function
    `getFullname()` , which is then called from object literal .


    You can have several of these functions. Their limitations are standard limitations
    of JavaScript with additional constraints from the nature of their usage. If JavaScript
    code takes 5 seconds to execute, your query will be additionally 5 seconds longer.
    Taking all of this into account, you can produce arbitrary complex functionality,
    demonstrated in an example from Listing [3-11](#514303_1_En_3_Chapter.xhtml#PC58).


    ```

    declare function lineItemPrice(l) {

    return l.PricePerUnit * l.Quantity * (1 - l.Discount);

    }

    from Orders as o

    select {

    TopProducts: o.Lines

    .sort((a, b) => lineItemPrice(b) - lineItemPrice(a) )

    .map(x => x.ProductName)

    .slice(0,2),

    Total: o.Lines.reduce((acc, l) => acc + lineItemPrice(l), 0)

    }

    Listing 3-11

    Example of complex JavaScript code in object literal

    ```


    When executed, code from Listing [3-11](#514303_1_En_3_Chapter.xhtml#PC58) will
    produce a list of documents with a total value of the order and two most expensive
    products from each order, e.g .


    ```

    {

    "TopProducts": [

    "Mozzarella di Giovanni",

    "Queso Cabrales"

    ],

    "Total": 440

    }

    ```'
  trans: '

    ### 分页


    分页是大多数业务应用程序中的常见功能。每次你需要展示长于屏幕尺寸的结果列表时，很可能就需要使用分页。RavenDB 原生支持分页，其语法如下所示：


    ```

    from Companies limit 10, 5

    ```


    此查询将跳过前十个结果，并返回接下来的五个。当然，分页可以与其他功能结合使用，因此查询


    ```

    from Companies where Address.Country = ''USA'' order by Name asc limit 5, 5

    ```


    将筛选出来自美国的公司，按名称升序排序，跳过前五个，并获取接下来的五个。


    ## 高级查询


    在上一节中，我们介绍了 RQL 以及基础的筛选、排序和分页操作。现在我们将探讨高级功能——投影、聚合和包含。


    ## 投影结果


    到目前为止，我们所有的查询都是返回完整的文档。例如


    ```

    from Employees order by LastName asc

    ```


    将按姓氏对员工进行排序，并将他们作为完整文档返回。然而，在构建应用程序时，你很少会需要整个文档。你通常只会展示文档字段的一个子集。例如，我们可能只想显示每位员工的名和姓。RavenDB
    有一个专用的关键字 `select`，正是用于此目的，其工作方式与 SQL 中的类似，如清单 3-7 所示。


    ```

    from Employees order by LastName asc

    select FirstName, LastName

    ```


    清单 3-7

    `select` 关键字的用法


    执行此查询将产生如图 3-13 所示的结果。


    ![](img/514303_1_En_3_Fig13_HTML.png)


    查询窗口结果面板的截图，标签“index auto slash employees slash by last name”下有 9 个文档。文档列表中的姓氏按升序排列。


    图 3-13


    使用 `select` 关键字的结果


    如你所见，`select` 与 SQL 中的变体非常相似——它将选择并仅返回字段的一个子集。


    你可以通过使用 `select` 语句的别名来重命名返回的字段。因此，查询


    ```

    from Employees

    select FirstName as Name, Address.City as City

    ```


    将返回具有以下结构的文档列表：


    ```

    {

    "Name": "Andrew",

    "City": "Tacoma",

    }

    ```


    投影也可以操作不简单的值。在下面的例子中，我们对对象和数组使用投影：


    ```

    from Orders

    select ShipTo, Lines[].ProductName as Products

    ```


    执行此查询将返回具有以下结构的文档：


    ```

    {

    "ShipTo": {

    "City": "Reims",

    "Country": "France",

    "Line1": "59 rue de l''Abbaye",

    "Line2": null,

    "Location": {

    "Latitude": 49.25595819999999,

    "Longitude": 4.1547448

    },

    "PostalCode": "51100",

    "Region": null

    },

    "Products": [

    "Queso Cabrales",

    "Singaporean Hokkien Fried Mee",

    "Mozzarella di Giovanni"

    ]

    }

    ```


    `ShipTo` 对象被按原样选中，`Products` 属性包含从所有订单行中选择的产品名称组成的投影。


    ### 使用对象字面量进行投影


    我们目前看到的投影都是简单、扁平且线性的。它们本质上是模仿 SQL 投影，你选择要返回的属性子集作为线性值的简单集合。RQL 可以做得更多——你可以使用 `对象字面量`
    语法投影出复杂的结果，如清单 3-8 所示。


    ```

    from Orders as o

    select {

    Country: o.ShipTo.Country,

    FirstProduct: o.Lines[0].ProductName,

    LastProduct:  o.Lines[o.Lines.length - 1].ProductName

    }

    ```


    清单 3-8

    使用对象字面量进行投影


    执行时，此查询会返回一组投影。对于文档 `orders/1-A`，它看起来像这样：


    ```

    {

    "Country": "France",

    "FirstProduct": "Queso Cabrales",

    "LastProduct": "Mozzarella di Giovanni",

    "@metadata": {

    "@id": "orders/1-A"

    }

    }

    ```


    如你所见，我们使用了简单的路径来选择收货国家，并使用复杂的表达式来深入选择订单行集合中的第一个和最后一个产品。请注意，在清单 3-8 中，我们必须使用别名
    `as o`，以便能够在复杂的投影表达式中引用 `o`。


    清单 3-8 的另一个要点是，`对象字面量` 不是 JSON 表达式——它是 JavaScript 字面量，任何有效的 JavaScript 表达式都会被执行。作为一个例子，我们可以查看员工文档的
    `HiredAt` 属性：


    ```

    "HiredAt": "1994-03-05T00:00:00.0000000"

    ```


    此字符串表示 ISO 8601 格式的日期，使用对象字面量，可以编写如清单 3-9 所示的 JavaScript 来处理此日期并提取年份。


    ```

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: e.FirstName + " " + e.LastName

    }

    ```


    清单 3-9

    在对象字面量中使用 JavaScript 进行投影


    将返回具有以下结构的文档集合：


    ```

    {

    "Id": "employees/9-A",

    "Year": 1994,

    "Fullname": "Anne Dodsworth"

    }

    ```


    清单 3-9 中的查询使用 JavaScript 来填充所有三个字段：


    *   `Id` —— 调用函数 `id()`，该函数以文档作为参数并确定其标识符。

    *   `Year` —— 调用 `Date` 对象的 JS 构造函数，参数为 ISO 8601 字符串。之后，`Date.getFullYear()` 方法返回年份。

    *   `Fullname` —— 用分隔符连接文档的两个属性。


    ### 在查询中声明函数


    使用 RQL，你可以将 JavaScript 代码提取为函数，然后从对象字面量中调用，如我们在清单 3-10 中所做的那样。


    ```

    declare function getFullName(e)

    {

    return e.FirstName + " " + e.LastName;

    }

    from Employees as e

    select {

    Id: id(e),

    Year: new Date(e.HiredAt).getFullYear(),

    Fullname: getFullName(e)

    }

    ```


    清单 3-10

    从对象字面量调用 JavaScript 函数


    在此示例中，我们将连接名和姓的代码提取到函数 `getFullName()` 中，然后从对象字面量中调用它。


    你可以拥有多个这样的函数。它们的限制是 JavaScript 的标准限制，外加其使用性质带来的额外约束。如果 JavaScript 代码需要 5 秒执行，你的查询就会额外增加
    5 秒。考虑到所有这些，你可以生成任意复杂的功能，如清单 3-11 中的示例所示。


    ```

    declare function lineItemPrice(l) {

    return l.PricePerUnit * l.Quantity * (1 - l.Discount);

    }

    from Orders as o

    select {

    TopProducts: o.Lines

    .sort((a, b) => lineItemPrice(b) - lineItemPrice(a) )

    .map(x => x.ProductName)

    .slice(0,2),

    Total: o.Lines.reduce((acc, l) => acc + lineItemPrice(l), 0)

    }

    ```


    清单 3-11

    对象字面量中复杂 JavaScript 代码的示例


    执行时，清单 3-11 中的代码将生成一个文档列表，其中包含订单的总价值和每个订单中最贵的两个产品，例如：


    ```

    {

    "TopProducts": [

    "Mozzarella di Giovanni",

    "Queso Cabrales"

    ],

    "Total": 440

    }

    ```

