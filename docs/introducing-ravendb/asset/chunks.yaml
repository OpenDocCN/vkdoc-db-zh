- fmt: "### Aggregation\n\n聚合是数据分组的过程。本节我们将探讨 RQL 如何提供数据聚合功能，使你能够以多种方式汇总文档数据。\n\n\
    回想一下，每个订单都有一个包含公司标识符的 `Company` 属性，如图 [3-14](#514303_1_En_3_Chapter.xhtml#Fig14)\
    \ 所示。\n\n![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig14_HTML.png)\n\n一张包含\
    \ 5 列 10 行的表格截图。列标签为 Id、company、employee、freight 和 ordered at。\n\n**图 3-14**\n\
    订单包含带有公司标识符的 Company 属性\n\n让我们查找数据库中每个公司拥有的订单数量，如代码清单 [3-12](#514303_1_En_3_Chapter.xhtml#PC60)\
    \ 所示。\n\n```\nfrom Orders\ngroup by Company\nselect Company, count()\n```\n\n\
    **代码清单 3-12**\n按公司对订单进行分组\n\n正如你可能预期的那样，用于此操作的合适关键字确实是 `group by`。执行此查询后，我们将得到如图\
    \ [3-15](#514303_1_En_3_Chapter.xhtml#Fig15) 所示的结果。\n\n![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig15_HTML.jpg)\n\
    \n查询窗口结果面板的截图，在标签“index auto slash orders slash by count reduced by company”下有\
    \ 7 个文档。文档列在列标签 preview、company 和 count 下。\n\n**图 3-15**\n按公司分组的订单\n\n我们分析的下一步将是对此列表进行降序排序：\n\
    \n```\nfrom Orders\ngroup by Company\norder by count() as long desc\nselect Company,\
    \ count()\n```\n\n然后，仅筛选出订单数超过 20 个的公司：\n\n```\nfrom Orders\ngroup by Company\n\
    where count() > 20\norder by count() as long desc\nselect Company, count()\n```\n\
    \n我们应始终将查询视为为在应用程序屏幕上显示而提取数据的一种方式。从这个角度来看，很容易看出向用户显示诸如 \"companies/71-A\"、\"companies/20-A\"\
    \ 和 \"companies/63-A\" 这样的公司标识符并不太友好。因此，在这个简要分析的最后一步，我们将用实际的公司名称替换公司标识符：\n\n```\n\
    from Orders\ngroup by Company\nwhere count() > 20\norder by count() as long desc\n\
    load Company as c\nselect c.Name, count()\n```\n\n与之前的查询相比，你会注意到新增了一行 `load Company\
    \ as c`。`load` 命令将指示 RQL 加载 `Company` 属性中包含的 id 所对应的文档，并为其分配别名 `c`。完成此操作后，我们可以在最后一行通过引用\
    \ `c.Name` 来访问公司名称。最后，我们可以向用户显示“Save-a-lot Markets”、“Ernst Handel”和“QUICK-Stop”是订单数超过\
    \ 20 的 3 家公司。\n\n在大多数应用程序中，聚合查询是从数据库中获取有用信息的主要工具。我们刚刚演示的 RQL 聚合基础是汇总数据的一种方式。RavenDB\
    \ 还有另一种更强大的机制，将在后续章节中介绍。\n\n### Handling Relationships\n\n在上一章关于建模的内容中，我们学习了能生成具有平衡的独立性、隔离性和一致性级别的文档的合适建模原则。然而，即使是这样的文档，你仍然需要将它们组合成视图模型，这些模型将来自两个或多个文档的属性组合成适合可视化表示的形式。让我们看看\
    \ RavenDB 如何在此类场景中为你提供支持。\n\n#### Accessing Related Documents\n\n在上一节的最后，我们使用了\
    \ `load()` 来访问相关文档。在一个不简单的应用程序中，你的模型将由引用其他文档的聚合组成。让我们看一个这样的文档，id 为 `orders/830-A`\
    \ 的订单：\n\n```\n{\n  \"Company\": \"companies/65-A\",\n  \"Employee\": \"employees/1-A\"\
    ,\n  \"Freight\": 8.53,\n  \"Lines\": [\n    ...\n```\n\n以这种形式向用户展示订单并无太大价值——用户必须手动检查\
    \ id `companies/65-A` 背后是哪家公司。\n\n为了在屏幕上显示包含完整信息的订单，我们需要再对数据库进行两次调用以加载引用的公司和员工。为了优化这一点，RQL\
    \ 为你提供了 `load()` 函数，该函数接受文档引用并返回引用的文档。这样，我们可以仅进行一次数据库调用，而不是三次，来获取此订单的完整信息，如代码清单\
    \ [3-13](#514303_1_En_3_Chapter.xhtml#PC65) 所示。\n\n```\nfrom Orders as o\nwhere\
    \ id() = 'orders/830-A'\nload o.Company as c, o.Employee as e\nselect {\n  CompanyName:\
    \ c.Name,\n  EmployeeName: e.FirstName + \" \" + e.LastName\n}\n```\n\n**代码清单\
    \ 3-13**\n加载引用的 Company 和 Employee\n\n执行时，此查询将返回以下投影结果：\n\n```\n{\n  \"CompanyName\"\
    : \"Rattlesnake Canyon Grocery\",\n  \"EmployeeName\": \"Nancy Davolio\"\n}\n\
    ```\n\n如代码清单 [3-13](#514303_1_En_3_Chapter.xhtml#PC65) 所示，我们为 `load` 提供了引用列表以及用于解引用文档的别名。之后，在\
    \ `select` 投影中，我们可以使用文档 `c` 和 `e`。\n\n这里需要注意的一个重要事项是执行顺序。回顾代码清单 [3-13](#514303_1_En_3_Chapter.xhtml#PC65)\
    \ 中的关键字，顺序如下：\n\n*   From\n*   Where\n*   Load\n*   Select\n\nRavenDB 将获取查询的 `from`-`where`\
    \ 部分并运行它，产生中间结果。之后，RavenDB 将执行 `load()` 以从中间结果获取引用的文档。最后，`select` 将创建投影，作为此查询的最终结果集。注意这里的顺序至关重要——`load`\
    \ 是在最后应用的，在结果被过滤、获取以及基本查询执行完成之后。因此，`load()` 不影响查询的代价。\n\n如果你将此与关系型数据库进行比较，你会发现执行顺序有很大不同。你会编写一个首先执行\
    \ *连接* 的查询，该连接提供对引用行的访问，然后对连接后的表应用过滤。然而，请注意，我们会连接这些表中的所有行，然后才执行过滤。换句话说，RDBMS 引擎会花费资源连接行，然后只在应用过滤后丢弃它们。RavenDB\
    \ 不仅在此方面，而且在许多其他方面都进行了优化。因此，你的应用程序将更快，并且相同查询所需的工作量将更低。\n\n你也可以直接在投影或 JavaScript\
    \ 函数中使用 `load()`，如下例所示：\n\n```\ndeclare function getFullName(empId)\n{\n  var\
    \ e = load(empId);\n  return e.FirstName + \" \" + e.LastName;\n}\nfrom Orders\
    \ as o\nwhere id() = 'orders/830-A'\nselect {\n  CompanyName: load(o.Company).Name,\n\
    \  EmployeeName: getFullName(o.Employee)\n}\n```"
  raw: '### Aggregation


    Aggregation is the process of grouping data. In this section, we will examine
    how RQL can provide data aggregations and enable you to sum up your documents
    in various ways.


    If you recall, every order has Company property that contains the Id of the company,
    as shown in Figure [3-14](#514303_1_En_3_Chapter.xhtml#Fig14).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig14_HTML.png)


    A screenshot of a table has 5 columns and 10 rows. The column labels are I d,
    company, employee, freight, and ordered at.


    Figure 3-14


    Orders have Company Property with Company Identifier


    Let’s find the number of the orders every company has in our database, shown in
    Listing [3-12](#514303_1_En_3_Chapter.xhtml#PC60) .


    ```

    from Orders

    group by Company

    select Company, count()

    Listing 3-12

    Grouping orders by companies

    ```


    As you might have expected, an appropriate keyword for this is `group` indeed.
    After executing this query, we will get results as shown in Figure [3-15](#514303_1_En_3_Chapter.xhtml#Fig15).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig15_HTML.jpg)


    A screenshot of the results panel in the query window has 7 documents under the
    label, index auto slash orders slash by count reduced by company. The documents
    are listed under the column labels: preview, company, and count.


    Figure 3-15


    Orders Grouped by the Company


    The next step in our analysis would be sorting this list in descending order:


    ```

    from Orders

    group by Company

    order by count() as long desc

    select Company, count()

    ```


    and after that, filtering only those with more than 20 orders


    ```

    from Orders

    group by Company

    where count() > 20

    order by count() as long desc

    select Company, count()

    ```


    We should always think of queries as a way to extract data for displaying on the
    application screen. From that perspective, it is easy to see that informing users
    about companies “companies/71-A,” “companies/20-A,” and “companies/63-A” is not
    too user-friendly. So, as the last step in this brief analysis, we will replace
    company identifiers with the actual name of the company:


    ```

    from Orders

    group by Company

    where count() > 20

    order by count() as long desc

    load Company as c

    select c.Name, count()

    ```


    Compared with the previous query, you will notice a new line `load Company as
    c`. `Load` command will instruct RQL to load the document with id contained in
    property `Company` and assign it alias `c`. After this is done, we can access
    the company’s name in the last line by referencing `c.Name`. Finally, we can show
    our users that “Save-a-lot Markets,” “Ernst Handel,” and “QUICK-Stop” are 3 companies
    with more than 20 orders.


    In most applications, aggregation queries are the primary tool for fetching helpful
    information from the database. RQL aggregating basics we just demonstrated are
    one way of summing up data. RavenDB has another much more powerful mechanism,
    which will be covered in chapters to come .


    ### Handling Relationships


    In the previous chapter on Modeling, we learned about suitable and appropriate
    modeling principles that will result in documents with a balanced level of independency,
    isolation, and coherency. However, even with such documents, you will still need
    to combine them into view models that combine properties from two or more documents
    into a form suitable for visual representation . Let’s look at how RavenDB can
    support you in such scenarios.


    #### Accessing Related Documents


    At the end of a previous section, we used `Load()` to access related documents.
    In a nontrivial application, your model will consist of aggregates referencing
    other documents. Let’s look at one such document, order with id `orders/830-A:`


    ```

    {

    "Company": "companies/65-A",

    "Employee": "employees/1-A",

    "Freight": 8.53,

    "Lines": [

    ...

    ```


    Displaying the order in this form to the user does not bring too much value –
    the user would have to check which company hides behind id companies/65-A manually.


    To show this order on the screen with complete information, we would have to make
    two more calls to the database to load referenced company and employee. To optimize
    this, RQL provides you with a `Load()` function that accepts a reference to the
    document and returns referenced document. This way, instead of three calls to
    the database, we can perform just one call and fetch complete information about
    this order, as demonstrated in Listing [3-13](#514303_1_En_3_Chapter.xhtml#PC65).


    ```

    from Orders as o

    where id() = ''orders/830-A''

    load o.Company as c, o.Employee as e

    select {

    CompanyName: c.Name,

    EmployeeName: e.FirstName + " " + e.LastName

    }

    Listing 3-13

    Loading reference Company and Employee

    ```


    When executed, this query will return the following projection:


    ```

    {

    "CompanyName": "Rattlesnake Canyon Grocery",

    "EmployeeName": "Nancy Davolio"

    }

    ```


    As you can see in Listing [3-13](#514303_1_En_3_Chapter.xhtml#PC65), we provided
    `load` with a list of references and aliases for dereferenced documents. After
    that, in `select` projection, we can use documents `c` and `e`.


    An important thing to notice here is the order of the execution. Going over keywords
    in Listing [3-13](#514303_1_En_3_Chapter.xhtml#PC65), there is the following order
    :


    *   From


    *   Where


    *   Load


    *   Select


    RavenDB will take the `from`-`where` part of the query and run it, producing interim
    results. After that, RavenDB will execute `load()` to fetch documents referenced
    from interim results. Finally, select will create a projection that is the final
    result set of this query. It is essential to note the order here – load is applied
    in the end, after results have been filtered and fetched and basic query execution
    completes. Because of this, `load()` does not impact the cost of the query.


    If you compare this with relational databases, you will see that the order of
    execution is significantly different. You would write a query that would first
    perform *join* that would provide access to referenced rows and then apply filtering
    on joined tables. However, please pay attention that we would join all rows from
    these tables and then perform filtering. In other words, the RDBMS engine would
    spend cycles joining rows, only to discard them after filtering is applied. RavenDB
    optimizes not only on this but also on many other things. As a result, your applications
    will be faster, and the amount of work for the same queries will be lower.


    You can also use `load()` directly in projections or in JavaScript functions,
    as can be seen in the following example:


    ```

    declare function getFullName(empId)

    {

    var e = load(empId);

    return e.FirstName + " " + e.LastName;

    }

    from Orders as o

    where id() = ''orders/830-A''

    select {

    CompanyName: load(o.Company).Name,

    EmployeeName: getFullName(o.Employee)

    }

    ```'
  trans: "\n### 聚合\n\n聚合是数据分组的过程。本节我们将探讨 RQL 如何提供数据聚合功能，使你能够以多种方式汇总文档数据。\n\n回想一下，每个订单都有一个包含公司标识符的\
    \ `Company` 属性，如图 3-14 所示。\n\n![](img/514303_1_En_3_Fig14_HTML.png)\n\n一张包含 5\
    \ 列 10 行的表格截图。列标签为 Id、company、employee、freight 和 ordered at。\n\n**图 3-14**\n订单包含带有公司标识符的\
    \ Company 属性\n\n让我们查找数据库中每个公司拥有的订单数量，如代码清单 3-12 所示。\n\n```\nfrom Orders\ngroup\
    \ by Company\nselect Company, count()\n```\n\n**代码清单 3-12**\n按公司对订单进行分组\n\n正如你可能预期的那样，用于此操作的合适关键字确实是\
    \ `group by`。执行此查询后，我们将得到如图 3-15 所示的结果。\n\n![](img/514303_1_En_3_Fig15_HTML.jpg)\n\
    \n查询窗口结果面板的截图，在标签“index auto slash orders slash by count reduced by company”下有\
    \ 7 个文档。文档列在列标签 preview、company 和 count 下。\n\n**图 3-15**\n按公司分组的订单\n\n我们分析的下一步将是对此列表进行降序排序：\n\
    \n```\nfrom Orders\ngroup by Company\norder by count() as long desc\nselect Company,\
    \ count()\n```\n\n然后，仅筛选出订单数超过 20 个的公司：\n\n```\nfrom Orders\ngroup by Company\n\
    where count() > 20\norder by count() as long desc\nselect Company, count()\n```\n\
    \n我们应始终将查询视为为在应用程序屏幕上显示而提取数据的一种方式。从这个角度来看，很容易看出向用户显示诸如 \"companies/71-A\"、\"companies/20-A\"\
    \ 和 \"companies/63-A\" 这样的公司标识符并不太友好。因此，在这个简要分析的最后一步，我们将用实际的公司名称替换公司标识符：\n\n```\n\
    from Orders\ngroup by Company\nwhere count() > 20\norder by count() as long desc\n\
    load Company as c\nselect c.Name, count()\n```\n\n与之前的查询相比，你会注意到新增了一行 `load Company\
    \ as c`。`load` 命令将指示 RQL 加载 `Company` 属性中包含的 id 所对应的文档，并为其分配别名 `c`。完成此操作后，我们可以在最后一行通过引用\
    \ `c.Name` 来访问公司名称。最后，我们可以向用户显示“Save-a-lot Markets”、“Ernst Handel”和“QUICK-Stop”是订单数超过\
    \ 20 的 3 家公司。\n\n在大多数应用程序中，聚合查询是从数据库中获取有用信息的主要工具。我们刚刚演示的 RQL 聚合基础是汇总数据的一种方式。RavenDB\
    \ 还有另一种更强大的机制，将在后续章节中介绍。\n\n### 处理关系\n\n在上一章关于建模的内容中，我们学习了能生成具有平衡的独立性、隔离性和一致性级别的文档的合适建模原则。然而，即使是这样的文档，你仍然需要将它们组合成视图模型，这些模型将来自两个或多个文档的属性组合成适合可视化表示的形式。让我们看看\
    \ RavenDB 如何在此类场景中为你提供支持。\n\n#### 访问相关文档\n\n在上一节的最后，我们使用了 `load()` 来访问相关文档。在一个不简单的应用程序中，你的模型将由引用其他文档的聚合组成。让我们看一个这样的文档，id\
    \ 为 `orders/830-A` 的订单：\n\n```\n{\n  \"Company\": \"companies/65-A\",\n  \"Employee\"\
    : \"employees/1-A\",\n  \"Freight\": 8.53,\n  \"Lines\": \n    ...\n```\n\n以这种形式向用户展示订单并无太大价值——用户必须手动检查\
    \ id `companies/65-A` 背后是哪家公司。\n\n为了在屏幕上显示包含完整信息的订单，我们需要再对数据库进行两次调用以加载引用的公司和员工。为了优化这一点，RQL\
    \ 为你提供了 `load()` 函数，该函数接受文档引用并返回引用的文档。这样，我们可以仅进行一次数据库调用，而不是三次，来获取此订单的完整信息，如代码清单\
    \ [3-13 所示。\n\n```\nfrom Orders as o\nwhere id() = 'orders/830-A'\nload o.Company\
    \ as c, o.Employee as e\nselect {\n  CompanyName: c.Name,\n  EmployeeName: e.FirstName\
    \ + \" \" + e.LastName\n}\n```\n\n**代码清单 3-13**\n加载引用的 Company 和 Employee\n\n\
    执行时，此查询将返回以下投影结果：\n\n```\n{\n  \"CompanyName\": \"Rattlesnake Canyon Grocery\"\
    ,\n  \"EmployeeName\": \"Nancy Davolio\"\n}\n```\n\n如代码清单 3-13 所示，我们为 `load` 提供了引用列表以及用于解引用文档的别名。之后，在\
    \ `select` 投影中，我们可以使用文档 `c` 和 `e`。\n\n这里需要注意的一个重要事项是执行顺序。回顾代码清单 3-13 中的关键字，顺序如下：\n\
    \n*   From\n*   Where\n*   Load\n*   Select\n\nRavenDB 将获取查询的 `from`-`where` 部分并运行它，产生中间结果。之后，RavenDB\
    \ 将执行 `load()` 以从中间结果获取引用的文档。最后，`select` 将创建投影，作为此查询的最终结果集。注意这里的顺序至关重要——`load`\
    \ 是在最后应用的，在结果被过滤、获取以及基本查询执行完成之后。因此，`load()` 不影响查询的代价。\n\n如果你将此与关系型数据库进行比较，你会发现执行顺序有很大不同。你会编写一个首先执行\
    \ *连接* 的查询，该连接提供对引用行的访问，然后对连接后的表应用过滤。然而，请注意，我们会连接这些表中的所有行，然后才执行过滤。换句话说，RDBMS 引擎会花费资源连接行，然后只在应用过滤后丢弃它们。RavenDB\
    \ 不仅在此方面，而且在许多其他方面都进行了优化。因此，你的应用程序将更快，并且相同查询所需的工作量将更低。\n\n你也可以直接在投影或 JavaScript\
    \ 函数中使用 `load()`，如下例所示：\n\n```\ndeclare function getFullName(empId)\n{\n  var\
    \ e = load(empId);\n  return e.FirstName + \" \" + e.LastName;\n}\nfrom Orders\
    \ as o\nwhere id() = 'orders/830-A'\nselect {\n  CompanyName: load(o.Company).Name,\n\
    \  EmployeeName: getFullName(o.Employee)\n}\n```\n"
- fmt: '## Include


    Besides using projections, there is one more way to access related documents.
    RQL provides `include`, which is another way to reduce the number of round trips
    you need to make to fetch complete information:


    ```

    from Orders

    where id() = ''orders/830-A''

    include Company, Employee

    ```


    This query will return a complete order document, but also, in the same round
    trip to the database, it will produce two additional collections, as shown in
    Figure [3-16](#514303_1_En_3_Chapter.xhtml#Fig16).


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig16_HTML.png)


    A screenshot of the results panel in the query window has a document under the
    label, orders. The document is listed under the column labels: preview, I d, company,
    employee, freight, and lines.


    Figure 3-16


    Order with Included Company and Employee


    At the bottom of Figure [3-16](#514303_1_En_3_Chapter.xhtml#Fig16), you can see
    two more result sets. Since we have just one order returned, these two collections
    contain just one company and just one employee.


    Include syntax is intended to be used when you want to fetch the complete document
    from the database and pull along all related documents in the same round trip
    to the database. You will then perform some additional operations on these documents
    without being forced to make any more requests to the database.


    ## Summary


    In this chapter, we covered writing queries in RavenDB. Besides filtering, querying,
    and paging, we also covered advanced topics - projections, aggregations, and dereferencing
    relations.


    In the next chapter, we will introduce indexes, a crucial data structure all databases
    use to optimize and speed up queries.


    # 4. Indexes


    In the previous chapter, we saw how to run queries that will return data that
    you need. This chapter will cover what happens behind the scenes when you run
    such queries and how the database executes them. We will also show some challenges
    database needs to solve and how databases are coping with ever-growing data. This
    chapter will present some possible optimization solutions. Finally, we will show
    how RavenDB prevents common problems with queries.


    ## Queries from the Perspective of a Database


    As users and developers, we execute queries against the database to get results
    back. This action is so standard that we do not think about underlying mechanisms
    and tools that deliver results. Additionally, working with a relational database,
    you probably use Object-Relational Mapper, representing an additional layer of
    abstraction between your code and a database. Over time, as we work with databases,
    we tend to forget what happens behind the scene.


    ### Unbounded Queries


    The first important notion is the concept of the unbounded query. Such queries
    will return whole collections without any limitations. When executed, they will
    return all documents from a collection, no matter how many you have. Even if you
    have one million employees, you will get them all back. Listing [4-1](#514303_1_En_4_Chapter.xhtml#PC1)
    shows a simple unbounded query.


    ```

    from Employees

    Listing 4-1

    Unbounded query over Employees collection

    ```


    The database engine will fetch all employees from the disk and return them. Unbounded
    queries can be dangerous, as things are not under your control. Results of execution
    are not deterministic, but they depend on the number of documents. If we are processing
    employees, we do not know if we will iterate over 10 or 10,000 employees. Furthermore,
    for all visual representations of our company employees, we will rarely need all
    of them.


    ### Paging


    Usually, we want to present paged list or some variant of paging (e.g., fetching
    batches as the user scrolls down the list). As shown in the previous chapter,
    RavenDB has built-in support for paging in the following form:


    ```

    from [Collection] limit [skip], [take]

    ```


    so query `from Employees limit 0, 2` will return first two employees.


    However, besides paged result set, it is also possible to get a total number of
    documents in a collection in the same round trip to the database. As shown in
    Figure [4-1](#514303_1_En_4_Chapter.xhtml#Fig1), there is a chain icon next to
    the Results heading.


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig1_HTML.jpg)


    A screenshot of the results panel with a chain icon and a text box next to it
    has text show raw output. A table with 3 columns, preview, I d, and lastname is
    listed under the index employees.


    Figure 4-1


    Show Raw Output Icon


    Clicking on this icon will display raw JSON that RavenDB Server returns:


    ```

    {

    TotalResults: 9,

    LongTotalResults: 9,

    CappedMaxResults: 2,

    ...

    ```


    The client interprets this response, in this case, RavenDB Studio, to show you
    query results. Not all properties of returned JSON are rendered in Studio – as
    you can see, the first property contains a total number of results. So, you can
    display the total number of results in paged query with just one request to the
    server.


    ### Filtering


    However, this simple request is what we rarely need – we usually want to filter
    out employees by a specific field. So, let’s see which one of these nine employees
    in our database live and work in London, as defined in the query in Listing [4-2](#514303_1_En_4_Chapter.xhtml#PC4).


    ```

    from Employees

    where Address.City = ''London''

    Listing 4-2

    The query for employees living in London

    ```


    Figure [4-2](#514303_1_En_4_Chapter.xhtml#Fig2) shows the result of executing
    this query.


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig2_HTML.jpg)


    A screenshot of the results panel in the query window under index auto slash employees
    slash by address dot city. A table is listed with the columns, preview, I d, last
    name, and first name.


    Figure 4-2


    Employees Living in London


    As you can see, the engine managed to find those living in London. So, if you
    had to perform the same task, how would you do it?


    Let’s imagine that you have nine papers representing each of the employees. Taking
    one by one, you would look at the Address, checking if City is London. If this
    is the case, you will stack paper to the right. Otherwise, you would put it to
    the left. After you process all documents, the stack to the right will contain
    all four employees living in London.


    What you just did is very similar to what a database engine might do in some cases,
    and it is called sequential scan or full table scan. It might seem like a logical
    move at first sight. However, what happens as the number of employees grows in
    your database? Or, if you filter orders in a retail operation, you have thousands
    and thousands of orders after a couple of years. How long will it take to filter
    orders by some of their properties? No matter how fast the disk or CPU, your application
    will start suffering from a full table scan sooner or later.


    In algorithmic complexity terms, this operation has O(n) complexity – if you increase
    the amount of data ten times, filtering will take ten times longer. It is evident
    that this approach is not a sustainable one and that we need a different one.
    However, no matter what method we use, the database engine still needs to visit
    every employee to check the living city.'
