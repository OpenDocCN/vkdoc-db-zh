    database modeling techniques to NoSQL.” Relational and Document databases are
    two different worlds. They apply different paradigms, have different approaches,
    and have completely different philosophies.


    If you fail to follow this advice, you will end up with an inappropriate and suboptimal
    model. That can make your life harder and make you fight your database even with
    simple tasks. However, you should treat your database not as your enemy. It would
    help if you treated it as your ally and friend. And friends are there to help.


