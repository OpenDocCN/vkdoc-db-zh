  raw: 'Also, we must be aware that the software we are building and the models we
    are creating are not the goals by themselves. Models are means for supporting
    our users. Hence, as real life and circumstances are evolving, we should also
    develop, modify, and expand our applications to support these changes. Our models
    should describe the present state and support processes occurring at the initial
    phase of building application. Still, they must also be sustainable to modifications
    to support changes with reasonable effort from our side. Domains will expand,
    unexpected things will happen in life, and our model will inevitably evolve with
    it to keep these changes.


    ## Modeling in Relational Databases


    A data model is a collection of structures and shapes to describe and manipulate
    our data. During the dominance of relational databases , the dominant data model
    was the relational data model (RDM) . It consists of a set of tables, with each
    table holding a collection of rows. Every row represents an entity that is composed
    of columns (cells). A column may contain a reference to a row in the same or some
    other table, implementing the concept of the relationship between two entities.


    Let’s look at a straightforward example of data model. Figure [2-1](#514303_1_En_2_Chapter.xhtml#Fig1)
    shows a purchase order document .


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig1_HTML.png)


    A screenshot of the purchase order for the rattlesnake grocery. The labels listed
    are vendor, and ship to, and a table of 4 columns indicates the description, quantity,
    unit price, and total.


    Figure 2-1


    Purchase Order Document


    Figure [2-2](#514303_1_En_2_Chapter.xhtml#Fig2) is showing a typical relational
    data model. There are two entities which can translate to tables. The `orders`
    entity contains one row per order, and the `order_lines` entity holds one row
    per line item.


    ![](images/514303_1_En_2_Chapter/514303_1_En_2_Fig2_HTML.jpg)


    An illustration depicts a model of relational data. 2 tables with titles, the
    order lines, and orders are listed.


    Figure 2-2


    Relational Database Model for Order


    As you can see, this relational database model provides us with the means to store
    order documents. Every row is a collection of simple values. Rows are incapable
    of representing anything complex – you cannot store lists or nested structures.
    For that reason, we could not keep order lines which are an integral part of the
    Order. In order words, lack of advanced capabilities forced us to split complex
    entities like Order into two tables: orders and order_lines.


    As we have just seen, RDBMS tables are very similar to Excel sheets – row after
    row of cells, containing simple linear information – like the number, string,
    or date. Order row cannot persist the list of Order Lines, so we had to introduce
    one more table to hold Order Lines and establish a relationship between these
    two tables to denote parent-child connection.


    Looking at the modeling exercise on this ordinary document revealed three things
    that we had to do:


    1.  Create table orders.


    2.  Create table order_lines.


    3.  Define ownership connection between these two tables.


    We started with a document that exists as a single sheet of paper in real life.
    To model this paper document in our relational database, we have to create two
    entities and establish a connection. This separation of Order from its Lines is
    forced upon us by the technical limitations of the RDBMS itself.


    ## Data Encapsulation Challenge


    One of the practices with relational databases is their overexposure to direct
    access. The database should be looked upon as a way to persist entities from memory.
    A thick domain layer should shield the database from direct access. That domain
    can and should implement domain rules, both static and dynamic ones. Database
    structure should not be exposed and available to the clients using your application.
    The integrity of your persisted data has many levels, and they are checked by
    your domain business logic, implemented in your programming language.


    ## Modeling in NoSQL Databases


    This section will look at the genesis of the modeling approach with NoSQL databases,
    techniques that can represent your data, and some of the best practices.


    Looking at programming languages, you can express your ideas in any language –
    it is possible, indeed, to develop an ERP system in assembly. But assembly is
    not the best tool for that task – as years passed, our industry developed better
    tools for developing business applications.


    The same goes with databases – you can model the same domain in relational databases
    and NoSQL/document databases. There are no technical limitations. However, many
    developers will find document-oriented modeling as more natural compared to relational
    modeling. Document-oriented models are closer to real-life documents that are
    modeled, and you need to make fewer adjustments than dictated by the technical
    aspects of your database.


    Your habits will be the single biggest obstacle when working with document databases.
    Over the years, if not decades, you were doing things in one manner, and now,
    all of a sudden, you need to give up, forget about all the best practices, and
    start following a new set of best practices in a leap of faith.


    Relational databases are based on tables and relationships between them. And,
    when modeling for RDBMS, you are following that. We can model everything as a
    set of tables in a relational database, but that same thing can also be modeled
    as a document in the NoSQL database. The real challenge is creating a model that
    would enable you to leverage features offered by the concrete database you are
    using. A suitable and appropriate document data model can make your life easier
    and make you almost completely forget about the database – your database can become
    a “boring” component of your development cycle.


    So, the first rule of good document-oriented modeling is “Do not apply relational
    database modeling techniques to NoSQL.” Relational and Document databases are
