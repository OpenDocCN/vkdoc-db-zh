    一张截图展示了 `auto/employees/by address.city` 的索引项，包含 **ID** 和 **Address.City** 两个部分，显示了四个城市：Kirkland、London、Redmond
    和 Tacoma。


    ## 图 4-8：基于索引项进行查询


    执行查询


    ```

    from index ''Auto/Employees/ByAddress.City''

    where ''Address.City'' = ''london''

    ```


    的结果如图 4-9 所示。


    ![](img/514303_1_En_4_Fig9_HTML.png)


    查询窗口的截图描绘了两个面板、搜索查询、设置菜单以及保存和运行按钮。一条查询语句读作 `auto/employees/by address.city where
    address.city equals London`。底部的结果面板包含一个有 11 列的表格。


    ### 图 4-9：在索引上执行查询的结果


    如图 4-9 所示，我们现在直接查询索引，结果与我们从清单 4-2 执行查询时相同。这是符合预期的，因为当我们直接查询集合时，使用的是同一个索引。


    Studio 还提供了一种查看此索引内容的方法。点击 `Settings`，然后开启 `Show the raw index entries instead
    of matching documents`，将可以深入了解此索引的内部数据结构，如图 4-10 所示。


    ![](img/514303_1_En_4_Fig10_HTML.png)


    查询窗口的截图描绘了两个面板、包含 4 个切换按钮的设置下拉菜单、搜索查询、保存、运行和删除按钮。顶部面板包含一条查询语句，底部的结果面板有一个包含 3 列的表格。


    ### 图 4-10：原始索引项


    再次查看表 4-1，我们可以看到这正是“London”的那一组条目。修改此查询并针对图 4-8 中的其余城市运行它，将返回表 4-1 中的剩余条目。


    尝试再次运行 `from Employees where Address.City = ''London''` 查询。你会得到预期的结果集，但这里关键的是执行时间，如图
    4-11 所示。


    ![](img/514303_1_En_4_Fig11_HTML.jpg)


    查询窗口结果面板的截图，带有一个链条图标，显示下拉菜单中索引 `auto/employees/by address.city` 的执行时间为 0 毫秒。


    ### 图 4-11：查询执行时间


    我们之前没有提到，但这个 `Query execution time` 测量的是服务器端的执行时间。即使你经历了一段漫长的等待才在浏览器中看到结果，你等待的是结果集传输到你的浏览器。此处显示的测量值是数据库实际生成这些结果所花费的时间。


    将此次尝试的查询耗时与图 4-3 中的前一次进行比较，你可以看到这次我们快了很多。在第一次运行时，在未能找到合适的索引后，RavenDB 不得不创建一个。这个操作花费了一些时间——数据库必须从磁盘获取所有九名员工，处理他们的
    `Address.City` 字段，提取值，并根据这些值构建索引。


    在我们刚刚进行的第二次运行中，系统立即检测到并使用了一个合适的索引来交付结果。在任何后续运行中都会发生同样的情况——将从磁盘读取预计算好的值并返回。


    ## 总结


    在本章中，我们介绍了索引的概念，它是一种专门的数据结构。索引是数据库内与你的数据并排放置的元数据，是加速查询的可能解决方案之一。我们展示了 RavenDB
    的设计方法如何帮助你避免索引的常见问题。


    在下一章中，我们将展示如何控制索引创建并自行定义，而不是让 RavenDB 自动创建它们。


    # 5. 映射索引


    上一章介绍了索引，几乎所有数据库都使用它来加速和优化查询。在本章中，我们将展示如何掌控索引。你可以明确地将它们指定为“静态”索引，而不是依赖 RavenDB
    自动创建它们。除了对一个或多个集合进行索引的方法外，你还将学习如何处理引用文档以及创建存储字段、动态字段和计算字段。最后，我们将介绍索引数据库中分层数据模型的技术。


    ## 静态索引


    在上一章中，我们看到 RavenDB 不允许对原始数据进行查询。查询总是在索引上执行，如果你没有索引，RavenDB 的 `查询优化器` 会为你创建一个。


    执行查询


    ```

    from Employees where FirstName = ''Nancy''

    ```


    将触发 `Auto/Employees/ByFirstName` 自动索引的创建。一旦创建，此索引将在查询结果生成后保持活动状态，RavenDB 将把它用于未来所有针对相同字段的筛选和排序查询。


    Raven 查询语言允许你直接查询索引，如清单 5-1 所示


    ```

    from index ''Auto/Employees/ByFirstName'' where FirstName = ''Nancy''

    清单 5-1

    直接查询索引

    ```


    这样的查询将产生与之前查询相同的结果。


    因此，你可以使用 `from [集合]` 形式让查询优化器为你选择，或者使用 `from index ''[索引名称]''` 形式来掌控用于交付结果的索引选择。


    你可以更进一步掌控。不依赖查询优化器来创建索引，你可以自己定义它。这样的索引被称为 `静态索引`。

    '
- fmt: '### Static Map Index


    你可以通过编写查询来检查 `Auto/Employees/ByFirstName` 自动索引的内容：


    ```

    from index ''Auto/Employees/ByFirstName''

    ```


    然后选择 *Settings ➤ Show raw index entries instead of matching documents*，如图 [5-1](#514303_1_En_5_Chapter.xhtml#Fig1)
    所示。


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig1_HTML.png)


    图 5-1：自动索引的内容


    你可以根据图 [5-1](#514303_1_En_5_Chapter.xhtml#Fig1) 的内容创建一个静态索引。在左侧栏选择 *List of Indexes*
    选项，然后点击 *New index* 按钮。你现在将看到一个用于定义新索引的屏幕，如图 [5-2](#514303_1_En_5_Chapter.xhtml#Fig2)
    所示。


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig2_HTML.jpg)


    图 5-2：创建新索引对话框


    首先，你需要为新索引选择一个名称。通常采用以下格式的名称：


    ```

    [COLLECTION]/By[FIELD]

    ```


    例如，`Auto/Employees/ByFirstName` 已经采用了这种格式。


    因此，使用 `Employees/ByFirstName` 作为名称。


    Map 索引的内容是一个 JavaScript 函数 `map`，它将接收集合并为每个文档返回一个对象；这些对象将成为索引项。因此，该函数名为 `map`，因为它将文档映射到索引项。代码清单
    [5-2](#514303_1_En_5_Chapter.xhtml#PC5) 展示了这样的映射函数。


    ```

    map("Employees", function(emp) {

    return {

    FirstName: emp.FirstName

    }

    })

    ```


    Listing 5-2：`Employees/ByFirstName` 索引的内容


    点击 *Save* 按钮将创建一个新索引，它将与其他自动和静态索引一起列出，如图 [5-3](#514303_1_En_5_Chapter.xhtml#Fig3)
    所示。


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig3_HTML.png)


    图 5-3：索引列表


    你可以看到，自动索引 `Auto/Employees/ByFirstName` 包含九个条目，与你刚刚创建的 `Employees/ByFirstName`
    相同。如果你查询它：


    ```

    from index ''Employees/ByFirstName'' where FirstName = ''Nancy''

    ```


    你将得到相同的结果。


    ### Static Index Analysis


    让我们分析代码清单 [5-2](#514303_1_En_5_Chapter.xhtml#PC5) 中索引的所有元素。从顶层结构来看，你可以看到这个 map
    索引具有以下形式：


    ```

    map("[COLLECTION]", function(doc) {...})

    ```


    第一个参数是集合名称。文档将从该集合中逐一获取，并传递给 JavaScript 函数，即第二个参数。


    观察函数本身：


    ```

    function(emp) {

    return {

    FirstName: emp.FirstName

    }

    }

    ```


    你可以看到它接收来自集合中的一个文档，并返回 JavaScript *对象字面量*：


    ```

    {

    FirstName: emp.FirstName

    }

    ```


    这个对象字面量将成为索引项。


    如果我们用紧凑的 *箭头函数表达式* 替换传统的函数表达式，索引可以被稍微简化，如代码清单 [5-3](#514303_1_En_5_Chapter.xhtml#PC10)
    所示。


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName

    }

    })

    ```


    Listing 5-3：`Employees/ByFirstName` 索引的简化版本


    ### Expanding Map Index


    索引项的结构将限制我们可以过滤的字段。尝试执行以下查询：


    ```

    from index ''Employees/ByFirstName'' where LastName = ''Davolio''

    ```


    将会导致错误：


    ```

    The field ''LastName'' is not indexed, cannot query/sort on fields that are not
    indexed

    ```


    你的第一反应可能是创建一个新的 *Employees/ByLastName* 索引，如代码清单 [5-4](#514303_1_En_5_Chapter.xhtml#PC13)
    所示。


    ```

    map("Employees", emp => {

    return {

    LastName: emp.LastName

    }

    })

    ```


    Listing 5-4：`Employees/ByLastName` 索引


    这个索引现在可以被查询：


    ```

    from index ''Employees/ByLastName'' where LastName = ''Davolio''

    ```


    并产生结果。


    然而，与其增加一个索引，我们不如将 *Employees/ByFirstName* 索引扩展，包含 `LastName` 字段。遵循我们之前介绍的约定，可以将其命名为
    *Employees/ByFirstNameByLastName*，并定义其内容如代码清单 [5-5](#514303_1_En_5_Chapter.xhtml#PC15)
    所示。


    ```

    map("Employees", emp => {

    return {

    FirstName: emp.FirstName,

    LastName: emp.LastName

    }

    })

    ```


    Listing 5-5：`Employees/ByFirstNameByLastName` 索引


    检查此索引的原始内容，可以发现每个文档的 `FirstName` 和 `LastName` 都被索引，如图 [5-4](#514303_1_En_5_Chapter.xhtml#Fig4)
    所示。


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig4_HTML.png)


    图 5-4：索引 `Employees/ByFirstNameByLastName` 的原始内容


    你可以在这个新索引上查询 *FirstName* 字段：


    ```

    from index ''Employees/ByFirstNameByLastName'' where FirstName = ''Nancy''

    ```


    也可以查询 *LastName* 字段：


    ```

    from index ''Employees/ByFirstNameByLastName'' where LastName = ''Davolio''.

    ```


    这样，你就可以仅用一个索引来覆盖一个集合中文档的多个字段。'
  raw: '### Static Map Index


    You can inspect the content of the `Auto/Employees/ByFirstName` automatic index
    by writing a query:


    ```

    from index ''Auto/Employees/ByFirstName''

    ```


    and then selecting *Settings ➤ Show raw index entries instead of matching documents*
    as visible in Figure [5-1](#514303_1_En_5_Chapter.xhtml#Fig1).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig1_HTML.png)


