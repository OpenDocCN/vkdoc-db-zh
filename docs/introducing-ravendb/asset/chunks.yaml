    name, and first name.


    Figure 4-2


    Employees Living in London


    As you can see, the engine managed to find those living in London. So, if you
    had to perform the same task, how would you do it?


    Let’s imagine that you have nine papers representing each of the employees. Taking
    one by one, you would look at the Address, checking if City is London. If this
    is the case, you will stack paper to the right. Otherwise, you would put it to
    the left. After you process all documents, the stack to the right will contain
    all four employees living in London.


    What you just did is very similar to what a database engine might do in some cases,
    and it is called *sequential scan* or *full table scan*. It might seem like a
    logical move at first sight. However, what happens as the number of employees
    grows in your database? Or, if you filter orders in a retail operation, you have
    thousands and thousands of orders after a couple of years. How long will it take
    to filter orders by some of their properties? No matter how fast the disk or CPU,
    your application will start suffering from a full table scan sooner or later.


    In algorithmic complexity terms, this operation has O(n) complexity – if you increase
    the amount of data ten times, filtering will take ten times longer. It is evident
    that this approach is not a sustainable one and that we need a different one.
    However, no matter what method we use, the database engine still needs to visit
    every employee to check the living city .'
  trans: '

    ## Include（包含）


    除了使用投影（projections），还有另一种方法可以访问相关文档。RQL 提供了 `include` 子句，这是减少获取完整信息所需往返次数的另一种方式：


    ```

    from Orders

    where id() = ''orders/830-A''

    include Company, Employee

    ```


    此查询将返回一个完整的订单文档，但同样在单次往返数据库的过程中，它还会生成两个额外的集合，如图 3-16 所示。


    ![](img/514303_1_En_3_Fig16_HTML.png)


    查询窗口结果面板的截图显示，在"orders"标签下有一个文档。该文档按以下列标签列出：preview、I d、company、employee、freight
    和 lines。


    图 3-16


    包含关联公司和员工的订单


    在图 3-16 的底部，你可以看到另外两个结果集。由于我们只返回了一个订单，这两个集合各自只包含一个公司和一个员工。


    Include 语法旨在用于当你想从数据库获取完整文档，并在同一次数据库往返中一并拉取所有相关文档的场景。然后，你可以在这些文档上执行一些额外的操作，而无需被迫向数据库发出更多请求。


    ## Summary（总结）


    在本章中，我们介绍了如何在 RavenDB 中编写查询。除了过滤、查询和分页，我们还涵盖了高级主题——投影、聚合和解引用关系。


    在下一章中，我们将介绍索引（indexes），这是所有数据库用来优化和加速查询的关键数据结构。


    # 4. Indexes（索引）


    在上一章中，我们了解了如何运行查询以返回所需的数据。本章将介绍当你运行此类查询时背后发生了什么，以及数据库如何执行它们。我们还将展示数据库需要解决的一些挑战，以及数据库如何应对不断增长的数据。本章将提出一些可能的优化解决方案。最后，我们将展示
    RavenDB 如何防止查询中的常见问题。


    ## Queries from the Perspective of a Database（从数据库角度看查询）


    作为用户和开发人员，我们针对数据库执行查询以获取结果。这个操作如此标准，以至于我们很少去思考提供结果的底层机制和工具。此外，在使用关系型数据库时，你很可能使用对象关系映射器（Object-Relational
    Mapper），这代表了你的代码和数据库之间的一个额外的抽象层。随着时间的推移，在我们与数据库打交道的过程中，我们往往会忘记背后发生的事情。


    ### Unbounded Queries（无界查询）


    第一个重要的概念是无界查询的概念。此类查询将返回整个集合，没有任何限制。执行时，它们将返回集合中的所有文档，无论你拥有多少。即使你有一百万名员工，你也会全部获取回来。清单
    4-1 展示了一个简单的无界查询。


    ```

    from Employees

    Listing 4-1

    对 Employees 集合的无界查询

    ```


    数据库引擎将从磁盘获取所有员工并返回。无界查询可能是危险的，因为情况不在你的控制之下。执行结果是非确定性的，它取决于文档的数量。如果我们正在处理员工，我们不知道我们会迭代
    10 个还是 10,000 个员工。此外，对于公司员工的所有可视化展示，我们很少需要全部数据。


    ### Paging（分页）


    通常，我们希望呈现分页列表或某种分页的变体（例如，当用户向下滚动列表时获取批次数据）。如前一章所示，RavenDB 内置了对分页的支持，形式如下：


    ```

    from [Collection] limit [skip], [take]

    ```


    因此，查询 `from Employees limit 0, 2` 将返回前两名员工。


    然而，除了分页结果集，还可以在同一次数据库往返中获取集合中的文档总数。如图 4-1 所示，在"Results"标题旁边有一个链接图标。


    ![](img/514303_1_En_4_Fig1_HTML.jpg)


    结果面板的截图，显示了一个链接图标及其旁边的文本框，文本框显示"show raw output"。在索引"employees"下，列出了一个包含三列的表格：preview、I
    d 和 lastname。


    图 4-1


    "显示原始输出"图标


    点击此图标将显示 RavenDB 服务器返回的原始 JSON：


    ```

    {

    TotalResults: 9,

    LongTotalResults: 9,

    CappedMaxResults: 2,

    ...

    ```


    客户端（在本例中是 RavenDB Studio）会解析此响应以向你展示查询结果。并非所有返回 JSON 的属性都会在 Studio 中渲染——如你所见，第一个属性包含了结果总数。因此，只需一次服务器请求，你就可以在分页查询中显示结果总数。


    ### Filtering（过滤）


    然而，这个简单的请求很少是我们真正需要的——我们通常希望根据特定字段过滤员工。那么，让我们看看我们数据库中的这九名员工，哪些人居住和工作在伦敦，如清单 4-2
    中的查询所定义。


    ```

    from Employees

    where Address.City = ''London''

    Listing 4-2

    查询居住在伦敦的员工

    ```


    图 4-2 显示了执行此查询的结果。


    ![](img/514303_1_En_4_Fig2_HTML.jpg)


    查询窗口结果面板的截图，索引为"auto/employees/by-address.city"。列出了一个表格，包含以下列：preview、I d、last
    name 和 first name。


    图 4-2


    居住在伦敦的员工


    如你所见，引擎成功找到了那些居住在伦敦的员工。那么，如果你必须执行相同的任务，你会怎么做？


    想象一下，你有九份文件，分别代表每位员工。你逐一查看，检查地址（Address），确认城市（City）是否是伦敦。如果是，你就把文件放到右边的一叠。否则，你就把它放到左边。处理完所有文件后，右边的那叠文件将包含所有四名居住在伦敦的员工。


    你刚刚所做的非常类似于数据库引擎在某些情况下可能做的事情，这被称为顺序扫描（sequential scan）或全表扫描（full table scan）。乍一看，这似乎是一个合乎逻辑的做法。然而，随着数据库中员工数量的增长，会发生什么？或者，如果你在零售业务中过滤订单，几年后你会有成千上万的订单。根据某些属性过滤订单需要多长时间？无论磁盘或
    CPU 多快，你的应用程序迟早会因全表扫描而开始受影响。


    用算法复杂度的术语来说，此操作具有 O(n) 复杂度——如果你将数据量增加十倍，过滤将花费十倍的时间。显然，这种方法不是可持续的，我们需要不同的方法。然而，无论我们使用什么方法，数据库引擎仍然需要访问每位员工以检查居住城市。

