    time – the database had to fetch all nine employees from the disk, process their
    `Address.City` field, extract values, and form an index out of those values.


    On the second run that we just did, a suitable index was detected right away and
    used to deliver results. The same scenario will happen on any subsequent run –
    precomputed values will be read from the disk and returned.


    ## Summary


    In this chapter, we introduced the concept of an index as a specialized data structure.
    An index is metadata placed side by side with your data inside a database, and
    it is one of the possible solutions for speeding up queries. We showed how RavenDB’s
    design approach would help you prevent common problems with indexes.


    In the next chapter, we will show how you can control index creation and define
    it yourself instead of letting RavenDB create them automatically.


    # 5. Map Indexes


    The previous chapter introduced the index, which almost all databases use to speed
    up and optimize queries. In this chapter, we will show how to take control of
    indexes. Instead of relying on RavenDB to create them automatically, you can specify
    them explicitly as “static” indexes. Along with ways to index one or multiple
    collections, you will also learn how to handle referenced documents and create
    stored, dynamic, and computed fields. Finally, we will cover techniques to index
    hierarchical data models in your database.


    ## Static Indexes


    In the previous chapter, we saw how RavenDB does not allow queries against raw
    data. Queries are always executed over indexes, and if you do not have one, RavenDB’s
    `query optimizer` will create one for you.


    Executing query


    ```

    from Employees where FirstName = ''Nancy''

    ```


    will trigger the creation of the `Auto/Employees/ByFirstName` automatic index.
    Once created, this index will remain active after the query results are generated,
    and RavenDB will use it for all future filtering and ordering queries over the
    same field.


    Raven Query Language allows you to query indexes directly, as shown in Listing
    [5-1](#514303_1_En_5_Chapter.xhtml#PC2)


    ```

    from index ''Auto/Employees/ByFirstName'' where FirstName = ''Nancy''

    Listing 5-1

    Querying index directly

    ```


    Such query will produce the same result as a previous query.


    Hence, you can either use `from [Collection]` form and let the query optimizer
    choose for you or go with `from index ''[Index_name]''` and take control over
    the selection of the index used to deliver results.


    You can take control even further. Instead of relying on a query optimizer to
    create indexes, you can define it yourself. Such indexes are called `static indexes`.'
