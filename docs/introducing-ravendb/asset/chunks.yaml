  trans: '# 静态索引：不同的分析器


    在之前的一个章节中，我们提到过使用通配符前缀可能对性能产生显著影响。静态索引为我们提供了完全的灵活性，因此我们可以配置索引过程来克服此类挑战。


    一种可能的解决方案是改变索引项的计算方式。我们可以更改分词方式 — 不使用 `标准分析器`，而是使用 `NGram 分析器`。


    但是 `NGram` 这个词是什么意思呢？`NGram` 是一个滑动窗口，它在文本上移动并生成指定长度的分词。例如，单词 "brown" 可以被拆分为以下
    3-gram：`[bro], [row], [own]`。类似地，对 "jumps" 应用 2-grams 分词会得到分词流 `[ju], [um], [mp],
    [ps]`。


    RavenDB 中可用的 `NGram` 分词器将滑动大小为 2、3、4、5 和 6 的窗口以生成各种大小的分词。与此分词器一起，`NGram 分析器` 将使用
    `停用词` 和 `小写化` 过滤器。


    例如，对于句子：


    *The quick brown fox jumped over the lazy dogs.*


    `NGram 分析器` 将生成以下 3-grams：


    ```

    [azy] [bro] [dog] [fox] [ick] [jum] [laz] [mpe] [ogs] [ove] [own] [ped] [qui]
    [row] [uic] [ump] [ver]

    ```


    `停用词` 过滤器将消除两个 "the" 实例和句号。


    你现在可以打开在上一节中定义的索引 `Products/ByName` 并更改此索引的分析器。向下滚动到字段部分，找到 `Name` 字段的设置。点击 `标准分析器`，你将看到一个预定义的分析器列表，如图
    7-13 所示。


    ![](img/514303_1_En_7_Fig13_HTML.jpg)


    一张示意图，展示了更改索引分析器的操作。标注的分析器有：关键字、小写空白、N-gram、简单、标准、停用词和空白分析器。


    **图 7-13：更改索引分析器**


    选择 `NGram 分析器` 后，保存重新定义的索引。


    由于你更改了索引的定义，RavenDB 将通过读取 `Products` 集合中的所有文档，将它们通过 `NGram 分析器` 处理，并填充索引项来从头构建它。图
    7-14 显示了索引项现在的样子。


    ![](img/514303_1_En_7_Fig14_HTML.png)


    一个展示了产品及其名称的 N-gram 索引项的表格。共有 16 个已标注的项。


    **图 7-14：NGram 索引项**


    这些索引项与由 `标准分析器` 生成的分词不同。`NGram 分析器` 产生的索引项是产品名称上 2-grams、3-grams、4-grams、5-grams
    和 6-grams 的并集。


    最后，使用更新后的 `Products/ByName` 索引，我们可以将通配符查询：


    ```

    from index ''Products/ByName''

    where search(Name, ''*late*'')

    ```


    替换为无通配符的变体


    ```

    from index ''Products/ByName''

    where search(Name, ''late'')

    ```


    这将返回相同的结果集，但不会带来任何性能损失。


    # 静态索引：多字段


    在前两节中，我们定义并配置了一个仅覆盖单个字段的索引。本节将展示如何将其扩展为处理来自一个或多个集合的文档的多个字段。


    ## 索引来自多个集合的属性


    我们可以将 `Products/ByName` 扩展为一个索引，该索引不仅可以按名称搜索产品，还可以按名称搜索 `供应商` 和 `公司`。这样，我们将创建一个索引来覆盖来自三个集合的文档内容。


    首先克隆 `Products/ByName` 索引 — 点击 `克隆` 按钮并将名称更改为 `Search/ByName`。


    添加以下两个映射：


    ```

    map("Companies", function(company) {

    return {

    Name: company.Name

    }

    })

    ```


    和


    ```

    map("Suppliers", function(supplier) {

    return {

    Name: supplier.Name

    }

    })

    ```


    完成后，索引定义将如图 7-15 所示。


    ![](img/514303_1_En_7_Fig15_HTML.png)


    三个算法示意图描绘了产品、公司和供应商的索引定义。标注的字段有：索引名称、search/by name、部署模式和映射。


    **图 7-15：Search/ByName 索引**


    由于我们是从克隆现有索引 `Products/ByName` 开始的，因此你新创建的索引开箱即用地支持对 `Name` 字段的全文索引。


    现在，你可以执行跨越三个集合内容的搜索查询。


    搜索


    ```

    from index ''Search/ByName''

    where search(Name, "cho")

    ```


    将返回在 `Name` 中包含 `cho` 三连音的产品和公司，如图 7-16 所示。


    ![](img/514303_1_En_7_Fig16_HTML.png)


    一个表格展示了由产品和公司组成的搜索结果。标注的列有：预览、标识、名称、供应商、类别和单位质量。


    **图 7-16：由产品和公司组成的搜索结果**


    类似地，以下查询


    ```

    from index ''Search/ByName''

    where search(Name, "ost")

    ```


    将返回在 `Name` 字段中包含三连音 `ost` 的产品、公司和供应商。


    ## 索引来自单个集合的多个字段


    提供一种索引（并随后搜索）来自同一集合的文档的多个属性可能非常方便。在编写静态索引时，你可以构造一个包含多个值的数组。RavenDB 将正确处理此类数组，为每个文档创建多个索引项。


    清单 7-8 展示了这样一个索引的实现。别忘了将 `Query` 字段配置为全文搜索字段。


    ```

    map("Employees", function(employee) {

    return {

    Query: [employee.FirstName, employee.LastName]

    }

    })

    ```


    **清单 7-8：`Employees/ByFirstNameByLastName` 索引**


    图 7-17 显示，名字和姓氏被提取出来并作为索引项插入。


    ![](img/514303_1_En_7_Fig17_HTML.png)


    一个表格展示了员工的名字和姓氏被提取出来并作为索引项插入。


    **图 7-17：由员工名字和姓氏组成的索引项**


    有了这个索引，你现在可以按名字搜索：


    ```

    from index ''Employees/ByFirstNameByLastName''

    where search(Query, "Andrew")

    ```


    或按姓氏搜索。


    ```

    from index ''Employees/ByFirstNameByLastName''

    where search(Query, "fuller")

    ```'
- fmt: "### Indexing Multiple Fields from Multiple Collections\n\nThe approach demonstrated\
    \ in the previous section can be expanded further. Since you can load referenced\
    \ documents during the indexing process, you can collect information from different\
    \ collections to offer Omni search capabilities.\n\nWe could use arrays here to\
    \ pack multiple properties together, but we will show an alternative approach,\
    \ where we declare a JavaScript array and populate it from the code. Listing 7-9\
    \ shows the definition of the `Orders/Search` index. Create it in your database,\
    \ and do not forget to mark the `Query` field as a full-text search field.\n\n\
    ```javascript\nmap(\"Orders\", function(order) {\n    var query = [];\n    var\
    \ company = load(order.Company, 'Companies');\n    query.push(company.Name);\n\
    \    var employee = load(order.Employee, 'Employees');\n    query.push(employee.FirstName,\
    \ employee.LastName);\n    order.Lines.forEach (line => {\n        var product\
    \ = load(line.Product, 'Products');\n        query.push(product.Name)\n      \
    \  var supplier = load(product.Supplier, 'Suppliers');\n        query.push(supplier.Name);\n\
    \    })\n    return { Query: query }\n})\n```\nListing 7-9. `Orders/Search` index\n\
    \nLet’s analyze this index.\n\nThe first line specifies the collection that will\
    \ be processed – `Orders`. In the second line of the index definition, we are\
    \ declaring an empty array:\n```javascript\nvar query = [];\n```\nwhich will be\
    \ populated by the code. In the very end, our JavaScript code will return a field\
    \ `Query` with this very same array as content:\n```javascript\nreturn { Query:\
    \ query }\n```\nFurthermore, the referenced company is loaded for every order\
    \ processed, and its name is added to the `query` array – same for referenced\
    \ employees, considering they have first and last names. Finally, we iterate over\
    \ order lines, fetch their product, and load a supplier for every product, adding\
    \ their names to an array.\n\nSo, looking at the nesting of indexing levels, we\
    \ have the following structure:\n*   Order\n    *   Company\n    *   Employee\n\
    \    *   OrderLine\n        *   Product\n        *   Supplier\n\nWe are descending\
    \ three levels of references, loading referenced documents, and indexing their\
    \ properties. Indexing terms will include names of companies, employees, products,\
    \ and suppliers. With this index, you can search orders by various criteria.\n\
    \nFor example, you can search for all orders created by Nancy:\n```sql\nfrom index\
    \ 'Orders/Search'\nwhere search(Query, \"nancy\")\n```\nAll orders containing\
    \ *tofu* can be fetched by executing the following query:\n```sql\nfrom index\
    \ 'Orders/Search'\nwhere search(Query, \"tofu\")\n```\nTo see all orders related\
    \ to a supplier *Lyngbysild*:\n```sql\nfrom index 'Orders/Search'\nwhere search(Query,\
    \ \"Lyngbysild\")\n```\nHence, you now have a single index that can serve queries\
    \ by various criteria.\n\n## Summary\n\nIn this chapter, we covered the full-text\
    \ search features of RavenDB. Besides introducing essential elements, we explained\
    \ the inner workings of full-text search indexes. Finally, you learned about advanced\
    \ indexing options and how to take more control over indexing with manually written\
    \ static indexes.\n\nIndex\nA Abstraction Administration Advanced quering aggregation\
