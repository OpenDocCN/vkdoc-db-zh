    the creation of an automatic index, and depending on the number of orders in the
    database , the initial indexing process may take a significant amount of time.
    While the indexing process is underway, the index will be *stale*. This means
    that the index contains many indexing entries, but this set is still incomplete.
    As a result, queries executed over the stale index may also return an incomplete
    result set. For example, following query


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```


    might omit some countries because not all orders have been processed yet. In this
    situation, RavenDB may wait up to 15 seconds for the index to become nonstale.
    After 15 seconds, if the index is still stale, you will get partial results set,
    and indexing will continue in the background. The reasoning behind this decision
    is simple – instead of reporting an error, RavenDB will return a potentially incomplete
    result set with notification that some of the results might be missing.


    In the production environment, you usually want to deploy or create indexes on
    live databases, wait for indexing processes to complete, and then deploy code
    using these new indexes.


    With static indexes, you take more control over this process. Unlike automatic
    ones created on the first query, static indexes are explicitly defined. Hence,
    the indexing process will start after saving the static index definition. Overall,
    static indexes are more explicit and predictable, and you will create them intentionally
    before querying the database .'
  trans: '

    ## 静态 MapReduce 索引


    上一章介绍了静态 Map 索引的概念。它们是 Map 索引的自然延伸，提供了一种映射文档并随后指定如何聚合这些映射的方法。同样，也可以编写静态 MapReduce
    索引。本节将重新创建自动索引 `Auto/Orders/ByCountReducedByShipTo.Country` 的静态版本。


    首先创建一个映射索引，如清单 6-3 所示：


    ```

    map("Orders", order => {

    return {

    Country: order.ShipTo.Country

    }

    })

    Listing 6-3

    Orders/ByCountry 映射索引

    ```


    这个索引与前一章的 `Employees/ByFirstName` 索引没有太大区别——对于每个订单文档，RavenDB 将创建一个带有 `Country`
    值的索引条目。


    此静态索引的最终目标是统计总数，因此让我们扩展映射，添加你稍后要聚合的数字，如清单 6-4 所示：


    ```

    map("Orders", order => {

    return {

    Country: order.ShipTo.Country,

    Count: 1

    }

    })

    Listing 6-4

    用计数扩展 Orders/ByCountry 映射索引


    ```


    此类扩展映射索引的原始索引条目可在图 6-9 中找到。


    ![](img/514303_1_En_6_Fig9_HTML.png)


    按国家排序的订单索引快照。


    图 6-9

    扩展映射索引 `Orders/ByCountry` 的原始索引条目


    该索引现在执行的就是你手动会做的任务——逐一遍历每个订单，并记录下每个 `ShipTo.Country` 字段中出现的国家。在记录完所有订单的此类标记后，你会返回并进行汇总。这正是
    MapReduce 索引的归约阶段所做的事情。


    要添加归约脚本，请打开索引进行编辑，然后单击“添加归约”按钮。将打开一个新面板，你可以在其中添加用于归约映射函数发出的所有映射的 JS 代码。清单 6-5
    中显示了此代码：


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    var country = group.key;

    var count = 0;

    group.values.forEach(el => {

    count += el.Count;

    })

    return {

    Country: country,

    Count: count

    }

    })

    Listing 6-5

    索引 Orders/ByCountry 的归约代码

    ```


    图 6-10 显示了 Orders/ByCountry MapReduce 索引的最终形式。


    ![](img/514303_1_En_6_Fig10_HTML.png)


    按国家排序的订单代码快照。


    图 6-10

    MapReduce 索引 `Orders/ByCountry`


    清单 6-5 中的归约脚本可以重构。重构是在不改变行为的情况下更改实现的过程。让我们重新组织代码，使其更加简洁。


    首先，你可以用基于 `reduce` 函数的函数式等价项替换清单 6-8 中定义的命令式 `forEach` 循环：


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    var country = group.key;

    var count = group.values.reduce((res, el) => res + el.Count, 0);

    return {

    Country: country,

    Count: count

    }

    })

    ```


    Reduce 方法可能看起来很奇怪，但它是命令式 `for` 循环的声明式等价物。它在 JavaScript 中对数组进行操作，形式如下：


    ```

    array.reduce(reducer, initialValue);

    ```


    Reduce 方法从 `initialValue`（在我们的例子中为零）开始，然后对数组的所有元素应用 `reducer` 操作。你可以这样理解归约器：


    ```

    reducer(result_from_previous_call, arrayElement) => new_result

    ```


    在第一次应用时，没有前一次调用的结果，因此将使用 `initialValue`，并消耗数组的第一个元素，结果为


    ```

    var res0 = reducer(0, arr[0])

    ```


    之后，将处理下一个数组元素：


    ```

    var res1 = reducer(res0, arr[1])

    ```


    此过程将继续，直到所有数组元素都被处理完毕。因此，我们以递归声明的方式迭代了所有数组元素。


    归约器函数本身是对两个参数的简单相加：


    ```

    reducer(accumulatedValue, el) = accumulatedValue + el.Count

    ```


    作为我们索引归约阶段重构的第二步也是最后一步，你可以内联 `country` 和 `count` 变量：


    ```

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Count: group.values.reduce((res, el) => res + el.Count, 0)

    }

    })

    ```


    此时，自动索引 `Auto/Orders/ByCountReducedByShipTo.Country` 已通过静态索引 `Orders/ByCountry`
    复制完成，因此你可以找出有多少货物发往芬兰：


    ```

    from index ''Orders/ByCountry''

    where ''Country'' = ''finland''

    ```


    或者获取所有发货量超过 80 笔的国家列表：


    ```

    from index ''Orders/ByCountry''

    where ''Count'' > 80

    ```


    ## 静态索引与自动索引


    你刚刚花费了一些精力来实现一个由 RavenDB 自动创建的索引的静态替代方案，你可能会问自己，“为什么？” 确实，如果 RavenDB 可以自行完成工作，那么意义何在？


    你想要控制索引的创建及其定义有多个原因。其中最重要的两个原因将在以下部分中讨论。


    ### 初始索引时刻


    创建索引（无论是自动的还是静态的）后，将执行初始索引。所有文档都将从磁盘中获取并由索引处理。如果被索引的集合为空，则新创建的索引将立即准备就绪。然而，如果集合不为空，处理所有文档将需要一定的时间。


    执行清单 6-1 中的查询将触发自动索引的创建，根据数据库中订单的数量，初始索引过程可能需要相当长的时间。在索引过程进行期间，索引将处于 `过时` 状态。这意味着索引包含许多索引条目，但此集合仍不完整。因此，在过时索引上执行的查询也可能返回不完整的结果集。例如，以下查询


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```


    可能会忽略一些国家，因为并非所有订单都已被处理。在这种情况下，RavenDB 可能会等待最多 15 秒，直到索引变为非过时状态。15 秒后，如果索引仍然过时，你将获得部分结果集，索引将在后台继续进行。此决策背后的推理很简单——RavenDB
    不是报告错误，而是返回可能不完整的结果集，并附带通知，说明某些结果可能缺失。


    在生产环境中，你通常希望在实时数据库上部署或创建索引，等待索引过程完成，然后部署使用这些新索引的代码。


    使用静态索引，你可以更好地控制此过程。与在首次查询时创建的自动索引不同，静态索引是显式定义的。因此，索引过程将在保存静态索引定义后开始。总体而言，静态索引更明确且可预测，你将在查询数据库之前有意地创建它们。

