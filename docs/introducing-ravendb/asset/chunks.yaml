- fmt: '## Indexes


    So, if we cannot eliminate this sequential scan, one conceptual solution would
    be to perform it once and save results for subsequent calls. This approach is
    how all modern databases are solving this challenge. You can specify a field,
    and the engine will go over all documents looking at the content of this field.
    Discovered values will be stored in a particular data structure called `Index`.
    An index is an additional data structure (`metadata`, or "data about your data")
    stored along with your documents. The database will derive the content of the
    index from your content, and it will never alter it.


    In our example, we would define index over `Address.City` field of an `Employee`
    document, and we would say that this field is *indexed*. When computing the content
    of this index, the database would extract all distinct values (all cities) and
    store them in a specialized data structure. Various indexing structures were developed
    over the years, but all of them have a clear purpose – to provide a fast way to
    fetch documents based on some criteria.


    After forming `Employee.Address.City` index and populating it with all cities
    where employees live, the database engine will be able to answer our queries swiftly,
    whatever value may be. When we execute the quest for all London employees, the
    engine will not go over documents. Instead, it will consult the index. There it
    will find entries shown in Table 4-1.


    **Table 4-1**


    Content of `Employee.Address.City` Index


    | Address.City | ID |

    | --- | --- |

    | Kirkland | employees/3-A |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A |

    | Redmond | employees/4-A |

    | Seattle | employees/1-Aemployees/8-A |

    | Tacoma | employees/2-A |


    Obtaining a list of all employees from London is now easy. Their identifiers will
    be collected, and those documents will be fetched from the disk and delivered.
    You could say that we prepared ahead of time for all possible `Address.City` queries.
    We precomputed results and stored them side-by-side with documents. As a result,
    our queries will be fast. There are no more table scans: no more need to go over
    documents and load them to check if they should be included in the result set.
    We have a list of IDs that can be read directly from the disk, with certainty
    that this is a complete result set.


    ### Types of Indexes


    If a computation is inevitable, there is no way to avoid performing it. However,
    you can do it just once and save results to a disk ahead of query time. Indexes
    are precomputed answers stored in a specialized data structure that provides a
    fast way to fetch results.


    In Table 4-1, we presented an index that contains document IDs. Such an index
    is called the `secondary index`.


    When a `secondary index` is used to service a query, one more step is needed before
    the list of employees is returned to you. The database needs to use IDs obtained
    from the `secondary index` to fetch complete employee documents. This operation
    needs to be efficient, so the database will maintain one more index that tracks
    the exact storage position of each document based on its identifier. This index
    is called the `key-value index`, and if you have been working with relational
    databases, you will recognize a similar internal data structure as the `primary
    index`.


    Overall, a query like the following will require a database to perform two operations.
    First, taking the value of an indexed property, a `secondary index` will be consulted
    to obtain a list of identifiers. Second, the `primary index` will be used to fetch
    employee documents from database storage efficiently.


    ```

    from Employees

    where Address.City = ''London''

    select FirstName

    ```


    However, in certain situations, this can be reduced to just one operation. Namely,
    you can expand the index to contain the whole document instead of just an identifier.
    Such index is called `clustered index`, and you can see its structure in Table
    4-2.


    **Table 4-2**


    Content of Clustered Index


    | City | ID | Document |

    | --- | --- | --- |

    | Kirkland | employees/3-A | {id: "employees/3-A", "FirstName": "Janet"..} |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | {id: "employees/9-A",
    "FirstName": "Anne"..}{id: "employees/5-A", "FirstName": "Steven"..}{id: "employees/6-A",
    "FirstName": "Michael"..}{id: "employees/7-A", "FirstName": "Robert"..} |

    | Redmond | employees/4-A | {id: "employees/4-A", "FirstName": "Margaret"..} |

    | Seattle | employees/1-Aemployees/8-A | {id: "employees/1-A", "FirstName": "Nancy"..}{id:
    "employees/8-A", "FirstName": "Laura"..} |

    | Tacoma | employees/2-A | {id: "employees/2-A", "FirstName": "Andrew"..} |


    The database engine can fetch the list of employee documents with just one round
    trip to the storage with a `clustered index`. Unfortunately, such an index is
    expensive storage-wise since it will essentially duplicate all records from the
    primary data storage into metadata structure. Various relational databases are
    using different approaches to overcome this challenge. SQL Server allows just
    one `clustered index` per table; MySQL is implementing `primary index` as clustered,
    with `secondary index` entries pointing to primary keys.


    Midway between nonclustered index (storing only references) and clustered one
    (storing complete data) is `covering index`, also known as an *index with included
    columns*. Let''s observe the following query:


    ```

    from Employees

    where Address.City = ''London''

    select FirstName

    ```


    In this case, we are not asking for a complete employee document. We are interested
    in the first name of employees from London. Names are usually small pieces of
    data, and we can expand the nonclustered `secondary index` from Table 4-1 into
    the form shown in Table 4-3.


    **Table 4-3**


    Content of Covering Index


    | Address.City | ID | FirstName |

    | --- | --- | --- |

    | Kirkland | employees/3-A | Janet |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | AnneStevenMichaelRobert
    |

    | Redmond | employees/4-A | Margaret |

    | Seattle | employees/1-Aemployees/8-A | NancyLaura |

    | Tacoma | employees/2-A | Andrew |


    `Covering index` is a compromise that enables the database to answer some of the
    queries using index alone (hence the term *covered*, since such index covers some
    of the queries) without allocating too much space.'
