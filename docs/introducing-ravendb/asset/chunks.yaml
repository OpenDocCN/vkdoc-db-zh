  trans: '# 聚合作为事务边界


    我们可以得出结论，聚合是支持事务的。我们将加载一个代表聚合的 `Document`，在数据库层面以事务方式更新它并将其保存回数据库，从而保证我们 `Document`
    的一致性。


    你可以自问——为什么我们不能在一个事务中更新两个文档？这确实是可能的。正如我们已经提到的，建模是一项微妙的智力活动。没有复杂的规则，到目前为止你所读到的一切都是基于这些原则实际应用中学到的最佳实践建议。因此，在一个事务中更新两个聚合文档是可能的。然而，推荐的方法是将那些需要在事务中一起更改的事物分组到一个聚合中，然后以最终一致的方式将更改传播到系统的其余部分。此外，在很多情况下，你将受限于分布式系统的性质而不得不采用最终一致性。


    一个典型的例子是将你的应用程序分离为微服务。每个微服务通常会有自己的数据库。跨越驻留在不同数据库中的两个或多个聚合的事务是不可行且困难的。在开发、维护和演进这样的应用程序时，这种方法带来的问题将多于好处。


    因此，你应该将聚合的边界视为事务边界。对于应用程序中的大多数更改，你将只需要加载、更改和保存一个 `Document`——一个代表你聚合的文档。


    系统中发生的其他一切将不是事务性的，而是最终一致的。你应该考虑到这一点并实现错误处理机制。此外，你应该仔细处理应用程序中的每一个业务场景，确定何时同步通信是必须的，何时可以使用异步通信。


    # RavenDB 中的建模


    本节将展示 `RavenDB` 如何处理文档，以及你如何创建和检查文档。同时，我们也将了解分配给每个 `RavenDB` 文档的标识符。


    ## 文档


    `RavenDB` 以 `JSON` 格式存储文档，它们的大小几乎是无限的——最大可达 `2Gb`。但是，你应该将文档的大小限制在不超过几兆字节。大于此大小的
    `JSON` 加载和保存回数据库会很麻烦，并且这通常是你的模型并非最优的强烈信号。


    在上一章中，我们创建了一个空数据库并用一些示例数据对其进行了初始化。在图 2-3 中，你可以看到来自 `Orders` 集合的一个 `Order` 文档。


    ![](img/514303_1_En_2_Fig3_HTML.png)


    一张包含 34 行代码的截图，用于创建订单文档，具有保存、克隆和删除选项。


    图 2-3


    RavenDB 中的订单文档


    此文档包含两个主要元素：


    *   标识符 `orders/830-A`


    *   `JSON` 主体


    这两个是必需的。每个 `RavenDB` `Document` 必须有一个唯一的标识符和非空的 `JSON` 内容。


    让我们创建我们的第一个 `Document`。首先，按照上一章的指示创建一个新的空数据库。数据库成功创建后，你将看到一个如图 2-4 所示的屏幕。


    ![](img/514303_1_En_2_Fig4_HTML.png)


    一张空的 Raven D B 数据库截图。它有 2 个部分。在文档部分下，列出了最近、补丁、查询、冲突和比较交换的图标。另一个部分是一个包含 4 列的表格，标题为：I
    d，变更向量，最后修改时间和集合。


    图 2-4


    空的 RavenDB 数据库


    要创建一个新文档，你需要点击 `New document` 按钮，这将打开如图 2-5 所示的屏幕。


    ![](img/514303_1_En_2_Fig5_HTML.png)


    一张创建新文档并写有代码的截图。


    图 2-5


    创建新文档


    在 `ID` 字段中填入 `users/`，对于 `JSON` 主体中 `Name` 字段的值，你可以填入任意字符串，如图 2-6 所示。


    ![](img/514303_1_En_2_Fig6_HTML.png)


    一张填充新文档的截图。一个四行的任意字符串指示了用户名称，I D 字段填充为 users 斜杠。


    图 2-6


    填充新文档


    在你点击 `Save` 按钮后，你的 `Document` 将被创建，你将看到这个新 `Document` 的详细信息，如图 2-7 所示。


    ![](img/514303_1_En_2_Fig7_HTML.jpg)


    一张截图描绘了新文档内容。屏幕在文档保存后显示了用户详细信息。


    图 2-7


    新文档的内容


    这里有几件有趣的事情需要注意，让我们逐一回顾。


    在 `Save`、`Clone` 和 `Delete` 按钮上方，值 `users/0000000000000000001-A` 是为你生成的 `ID`。你记得，你在
    `ID` 字段中填入了 `users/`。`RavenDB` 将此值作为未来 `ID` 的前缀，生成了唯一的后缀 `0000000000000000001-A`，并将其附加到你的前缀后。一旦分配，`ID`
    就无法更改——它是这个 `Document` 的唯一标识符。


    你还会注意到你的前缀 `users/` 在另外两个地方出现。一个是在左列，你可以看到创建了新的集合 `Users`，而你新创建的 `Document` 被放在其中。但是，这种集合关联性存储在哪里呢？答案在于
    `@metadata` 属性：


    ```json

    "@metadata": {

    "@collection": "Users"

    }

    ```


    如你所见，`@metadata` 本质上只是另一个 `JSON` 属性。与其他属性的唯一区别在于 `@metadata` 是一个保留名称。所有 `RavenDB`
    系统名称都以 `@` 符号开头，因此它们不会与你的属性冲突。在 `@metadata` 内，属性 `@collection` 包含了集合的名称。


    图 2-5 仅显示了代表你 `Document` 的 `JSON` 的部分视图。然而，`RavenDB` Studio 具有你可以用来检查原始和完整 `JSON`
    的功能。如图 2-8 所示，在文档内容上方的区域，有一个 `Show raw output` 图标。


    ![](img/514303_1_En_2_Fig8_HTML.jpg)


    一张截图描绘了显示原始输出的图标，该文档在不到一分钟前被修改过。


    图 2-8


    显示原始输出图标


    点击此图标将打开一个新的浏览器标签页，显示你 `Document` 的完整原始 `JSON`：


    ```json

    {

    Name: "John",

    @metadata: {

    @collection: "Users",

    @change-vector: "A:1-4Ocnef4WVEaQ9NeWn3Yhig",

    @id: "users/0000000000000000001-A",

    @last-modified: "2021-05-05T20:05:53.1467758Z"

    }

    }

    ```


    你现在能够看到 `@metadata` 包含的所有系统属性：


    *   `@collection` - 你的 `Document` 将被放置的集合名称。


    *   `@change-vector` – 变更向量。这是一个更高级的概念，但我们简要提及，变更向量提供了在数据库集群的多个节点上对同一 `Document`
    的变更进行部分排序的方法。


    *   `@id` – 你的 `Document` 的标识符。


    *   `@last-modified` – `Document` 最后一次更改的 `UTC` 时间戳。'
- fmt: "## Identifiers\n\nThe identifier is a mandatory part of every RavenDB document.\
    \ Once assigned, an identifier cannot be modified. As long as the Document exists,\
    \ the Document will have the same identifier assigned to it at the moment of creation.\
    \ Also, RavenDB will ensure that every Document has a unique identifier on the\
    \ database level.\n\nRevisiting `@metadata` property from the previous section,\
    \ we can see that `@id` is a string:\n\n```\n@id: \"users/0000000000000000001-A\"\
    \n```\n\nWhen you create a new document, you can pass various string values for\
    \ id, and RavenDB will react in different ways:\n\n*   Empty string – when you\
    \ pass an empty string as `id`, RavenDB will generate a GUID and assign it as\
    \ `id`.\n*   `Collection_name/` – an arbitrary string followed by a forward slash.\
    \ Passing `users/` would be an example. The string `users` will be the name of\
    \ the collection, and the slash will be a signal to RavenDB to generate a unique\
    \ identifier for a document. This identifier will be generated as a number prepended\
    \ with zeros, with the addition of the node name. For example. passing `users/`\
    \ as an Id for a document will result in RavenDB assigning `users/0000000000000000001-A`\
    \ as the unique identifier.\n*   `Collection_name|` - arbitrary string followed\
    \ by a pipe character. The arbitrary string will be taken as a name of a collection,\
    \ and the pipe character will trigger cluster-wide coordination to produce a unique\
    \ number on the cluster level. So, passing `users|` as an Id for a document will\
    \ result in RavenDB assigning `users/1.`\n*   In all other cases, when a string\
    \ is not empty and does not contain slash nor pipe character, RavenDB will accept\
    \ it and, without modifying, assign as an id of your new Document.\n\nIf you do\
    \ not have a strong reason for your IDs, it is best to let RavenDB generate IDs.\
    \ Going with `collection_name/` will produce unique identifiers that will also\
    \ be sortable, enabling RavenDB to store them optimally for searching and fetching.\
    \ If you, for some reason, need to generate your identifiers, it is recommended\
    \ to find a library that can produce lexicographically sortable identifiers.\n\
    \n## Modeling Document Relationships\n\nThe fact that you are using a database\
    \ that does not contain a `relation` in its name does not mean you will be incapable\
    \ of modeling relationships between aggregates represented by documents. This\
    \ section will examine possible types of relationships between documents in RavenDB,\
    \ various approaches to modeling them, and how to validate stronger and weaker\
    \ aspects of possible solutions.\n\nWhile the previous section concentrated on\
    \ the JSON content of RavenDB documents, this section is focusing on connections\
    \ between those documents. These relations are not the actual data but meta-data,\
    \ and the gist of modeling relations is how to expand documents to contain that\
    \ additional information.\n\nEven though there are many ways entities can be interconnected,\
    \ we will look at the three most common and basic ones: one-to-one, one-to-many,\
    \ and many-to-many.\n\n### One-to-One Relationship\n\nWe are mentioning this type\
    \ of relationship for the first time, but you already had a chance to observe\
    \ it. Let’s revisit our favorite example of Order with `shipping address`:\n\n\
    ```\nId: orders/1\n{\n  \"Company\": \"ACME\",\n  \"ShippingAddress\": {\n   \
    \ \"City\": \"Albuquerque\",\n    \"Country\": \"USA\",\n    \"Line1\": \"2817\
    \ Milton Dr.\"\n  }\n}\n```\n\nAn order has its physical identity (usually coming\
    \ in the form of a paper document) and its unique identifier `orders/1`. This\
    \ unique identifier provides us with a means of recognizing multiple instances\
    \ of the same orders – comparing two Orders comes down to comparing their Id values.\n\
    \nOn the other hand, if we examine `ShippingAddress`, we will realize that it\
    \ does not have an identity in the sense of distinguished unique existence. Every\
    \ Order is unique, while we can have multiple shipments addressed for dispatch\
    \ to the same address. To determine if two shipments are going to the exact location,\
    \ we must compare all three components of our address: `City`, `Country`, `Line1`.\
    \ Hence, we can conclude that its value represents the identity of the address.\
    \ These objects are labeled as `Value Objects` in domain-driven design.\n\n`Value\
    \ Object`’s existence is tightly coupled with their parent document. It is the\
    \ only context of the entity where they are embedded, giving complete meaning\
    \ to a `Value Object`. Let’s observe one more example of a `Value Object`:\n\n\
    ```\nId: users/1\n{\n  \"Name\": \"John\",\n  \"Age\": 63\n}\n```\n\nImagine being\
    \ presented with the number `63`. What does this number represent? Someone’s weight?\
    \ Temperature? Hours? Price? You simply cannot tell – `63` can be so many things\
    \ on its own, even a random number that does not represent anything.\n\nNow, augmenting\
    \ it with the property name, `\"Age\": 63`, we can understand it represents age.\
    \ But we cannot tell who has 63 years? Maybe it’s the age of a bridge or a building?\
    \ Unfortunately, we lack context again.\n\nFinally, observing this property within\
    \ the entity it belongs to, we have a complete picture – John has 63 years.\n\n\
    This mental exercise gives us a simple recipe for recognizing `Value Objects`.\
    \ Whenever you need a context to determine the precise meaning of the information,\
    \ you will detect `Value Object (VO)`. As you saw, `VO` can be as simple as a\
    \ number or complex structure like a `shipping address`, and they are fundamental\
    \ building blocks of entities.\n\n#### Embedding\n\nWith both `age` and `shipping\
    \ address`, we applied a technique called `embedding`. Their separate existence\
    \ was not justified in both cases, and we inserted these small documents inside\
    \ bigger documents representing entities."
  raw: '### Identifiers


    The identifier is a mandatory part of every RavenDB document. Once assigned, an
    identifier cannot be modified. As long as the Document exists, the Document will
    have the same identifier assigned to it at the moment of creation. Also, RavenDB
    will ensure that every Document has a unique identifier on the database level.


    Revisiting `@metadata` property from the previous section, we can see that `@id`
    is a string:


    ```

    @id: "users/0000000000000000001-A"

    ```


    When you create a new document, you can pass various string values for id, and
    RavenDB will react in different ways:


    *   Empty string – when you pass an empty string as id, RavenDB will generate
    a GUID and assign it as id.


    *   `Collection_name/` – an arbitrary string followed by a forward slash. Passing
    `users/` would be an example. The string `users` will be the name of the collection,
    and the slash will be a signal to RavenDB to generate a unique identifier for
    a document. This identifier will be generated as a number prepended with zeros,
    with the addition of the node name. For example. passing `users/` as an Id for
    a document will result in RavenDB assigning `users/0000000000000000001-A` as the
    unique identifier.


    *   `Collection_name|` - arbitrary string followed by a pipe character. The arbitrary
    string will be taken as a name of a collection, and the pipe character will trigger
    cluster-wide coordination to produce a unique number on the cluster level. So,
    passing `users|` as an Id for a document will result in RavenDB assigning `users/1.`


    *   In all other cases, when a string is not empty and does not contain slash
    nor pipe character, RavenDB will accept it and, without modifying, assign as an
    id of your new Document .


    If you do not have a strong reason for your IDs, it is best to let RavenDB generate
    IDs. Going with `collection_name/` will produce unique identifiers that will also
    be sortable, enabling RavenDB to store them optimally for searching and fetching.
    If you, for some reason, need to generate your identifiers, it is recommended
    to find a library that can produce lexicographically sortable identifiers.


    ## Modeling Document Relationships


    The fact that you are using a database that does not contain a *relation* in its
    name does not mean you will be incapable of modeling relationships between aggregates
    represented by documents. This section will examine possible types of relationships
    between documents in RavenDB, various approaches to modeling them, and how to
    validate stronger and weaker aspects of possible solutions.


    While the previous section concentrated on the JSON content of RavenDB documents,
    this section is focusing on connections between those documents. These relations
    are not the actual data but meta-data, and the gist of modeling relations is how
    to expand documents to contain that additional information.


    Even though there are many ways entities can be interconnected , we will look
    at the three most common and basic ones: one-to-one, one-to-many, and many-to-many.


    ### One-to-One Relationship


    We are mentioning this type of relationship for the first time, but you already
    had a chance to observe it. Let’s revisit our favorite example of Order with shipping
    address :


    ```

    Id: orders/1

    {

    "Company": "ACME",

    "ShippingAddress": {

    "City": "Albuquerque",

    "Country": "USA",

    "Line1": "2817 Milton Dr."

    }

    }

    ```


    An order has its physical identity (usually coming in the form of a paper document)
    and its unique identifier `orders/1`. This unique identifier provides us with
    a means of recognizing multiple instances of the same orders – comparing two Orders
    comes down to comparing their Id values.


    On the other hand, if we examine `ShippingAddress` , we will realize that it does
    not have an identity in the sense of distinguished unique existence. Every Order
    is unique, while we can have multiple shipments addressed for dispatch to the
    same address. To determine if two shipments are going to the exact location, we
    must compare all three components of our address: City, Country, Line1\. Hence,
    we can conclude that its value represents the identity of the address. These objects
    are labeled as *Value Objects* in domain-driven design.


    Value Object’s existence is tightly coupled with their parent document. It is
    the only context of the entity where they are embedded, giving complete meaning
    to a Value Object. Let’s observe one more example of a Value Object :


    ```

    Id: users/1

    {

    "Name": "John",

    "Age": 63

    }

    ```


    Imagine being presented with the number `63`. What does this number represent?
    Someone’s weight? Temperature? Hours? Price? You simply cannot tell – 63 can be
    so many things on its own, even a random number that does not represent anything.


    Now, augmenting it with the property name, `"Age": 63`, we can understand it represents
    age. But we cannot tell who has 63 years? Maybe it’s the age of a bridge or a
    building? Unfortunately, we lack context again.


    Finally, observing this property within the entity it belongs to, we have a complete
    picture – John has 63 years.


    This mental exercise gives us a simple recipe for recognizing Value Objects. Whenever
    you need a context to determine the precise meaning of the information, you will
    detect *Value Object (VO)*. As you saw, VO can be as simple as a number or complex
    structure like a shipping address, and they are fundamental building blocks of
    entities.


    #### Embedding


    With both *age* and *shipping address*, we applied a technique called *embedding*
    . Their separate existence was not justified in both cases, and we inserted these
    small documents inside bigger documents representing entities.'
  trans: "## 标识符\n\n标识符是每个 RavenDB 文档的必需部分。一旦分配，标识符就无法修改。只要文档存在，它就将拥有在创建时分配给它的相同标识符。此外，RavenDB\
    \ 将确保每个文档在数据库级别都有一个唯一的标识符。\n\n重新审视上一节中的 `@metadata` 属性，我们可以看到 `@id` 是一个字符串：\n\n\
    ```\n@id: \"users/0000000000000000001-A\"\n```\n\n当你创建一个新文档时，你可以为 id 传递各种字符串值，RavenDB\
    \ 会以不同的方式做出反应：\n\n*   空字符串 – 当你传递一个空字符串作为 `id` 时，RavenDB 将生成一个 GUID 并将其分配为 `id`。\n\
    *   `集合名称/` – 一个任意字符串后跟一个正斜杠。传递 `users/` 就是一个例子。字符串 `users` 将是集合的名称，而斜杠将向 RavenDB\
    \ 发出信号，为文档生成一个唯一的标识符。此标识符将被生成为一个前面补零的数字，并加上节点名称。例如，将 `users/` 作为文档的 Id 传递，将导致\
    \ RavenDB 分配 `users/0000000000000000001-A` 作为唯一标识符。\n*   `集合名称|` - 任意字符串后跟一个管道字符。任意字符串将被视为集合的名称，而管道字符将触发集群范围内的协调，以在集群级别生成一个唯一的数字。因此，将\
    \ `users|` 作为文档的 Id 传递，将导致 RavenDB 分配 `users/1`。\n*   在所有其他情况下，当字符串非空且不包含斜杠或管道字符时，RavenDB\
    \ 将接受它并不加修改地分配为你新文档的 id。\n\n如果你的 ID 没有很强的理由，最好让 RavenDB 生成 ID。采用 `集合名称/` 将产生唯一的标识符，这些标识符也将是可排序的，使\
    \ RavenDB 能够为搜索和提取进行优化存储。如果你出于某些原因需要生成自己的标识符，建议找到一个可以生成词法可排序标识符的库。\n\n## 文档关系建模\n\
    \n你使用的数据库名称中不包含 `关系` 这个词，并不意味着你无法对文档所代表的聚合之间的关系进行建模。本节将探讨 RavenDB 中文档之间可能的关系类型、建模它们的各种方法，以及如何验证可能解决方案的强项和弱项。\n\
    \n上一节重点介绍了 RavenDB 文档的 JSON 内容，而本节则侧重于这些文档之间的连接。这些关系不是实际数据，而是元数据，关系建模的要点是如何扩展文档以包含这些额外信息。\n\
    \n尽管实体之间可以通过多种方式互连，但我们将研究三种最常见和基本的方式：一对一、一对多和多对多。\n\n### 一对一关系\n\n这是我们第一次提到这种类型的关系，但你之前已经有机会观察到它了。让我们重新审视我们最喜欢的带有\
    \ `收货地址` 的订单示例：\n\n```\nId: orders/1\n{\n  \"Company\": \"ACME\",\n  \"ShippingAddress\"\
    : {\n    \"City\": \"Albuquerque\",\n    \"Country\": \"USA\",\n    \"Line1\"\
    : \"2817 Milton Dr.\"\n  }\n}\n```\n\n一个订单有其物理身份（通常以纸质文档的形式出现）及其唯一标识符 `orders/1`。这个唯一标识符为我们提供了一种识别同一订单的多个实例的方法——比较两个订单归结为比较它们的\
    \ Id 值。\n\n另一方面，如果我们检查 `ShippingAddress`，我们会意识到它没有在独特的、可区分的存在意义上的身份。每个订单都是唯一的，而我们可以有多个运往同一地址的货件。要确定两个货件是否发往完全相同的地点，我们必须比较地址的三个组成部分：`City`、`Country`、`Line1`。因此，我们可以得出结论，它的值代表了地址的身份。在领域驱动设计中，这些对象被标记为\
    \ `值对象`。\n\n`值对象`的存在与其父文档紧密耦合。它们是嵌入其中的实体所具有的唯一上下文，这赋予了 `值对象` 完整的意义。让我们再观察一个 `值对象`\
    \ 的例子：\n\n```\nId: users/1\n{\n  \"Name\": \"John\",\n  \"Age\": 63\n}\n```\n\n\
    想象一下，给你看一个数字 `63`。这个数字代表什么？某人的体重？温度？小时？价格？你根本无法判断——`63` 本身可以代表太多事物，甚至可能是一个不代表任何东西的随机数字。\n\
    \n现在，用属性名称来补充它，`\"Age\": 63`，我们可以理解它表示年龄。但我们无法知道谁是 63 岁？也许是一座桥或一栋建筑的年龄？不幸的是，我们再次缺乏上下文。\n\
    \n最后，在观察它所属实体内的这个属性时，我们有了完整的图景——约翰是 63 岁。\n\n这个思维练习为我们提供了一个识别 `值对象` 的简单方法。每当你需要上下文来确定信息的精确含义时，你就会发现\
    \ `值对象`。正如你所见，`值对象` 可以像一个数字那样简单，也可以像 `收货地址` 那样复杂的结构，它们是实体的基本构建块。\n\n#### 嵌入\n\n\
    对于 `年龄` 和 `收货地址`，我们都应用了一种称为 `嵌入` 的技术。在这两种情况下，它们单独存在的理由都不充分，因此我们将这些小文档插入到代表实体的大文档中。"
- fmt: '## Referencing


    然而，存在一些情况，我们会注意到两个文档，它们各自拥有独立的标识和存在的理由——并且它们处于一种一对一的关系中。例如，想象一个包含组织内所有员工信息的人力资源管理系统。除其他事项外，我们为每个
    `Employee` 保存一份 `Resume`——它是在候选人申请职位时输入到 HRM 系统中的。当她接受工作邀请后，我们将此候选人晋升为全职 `Employee`。观察
    `Employee` 和 `Resume`，我们可以看到它们都具有物理存在和自己的身份。同时，它们具有清晰的一对一关系：每个 `Employee` 恰好有一份
    `Resume`，而对于每份 `Resume`，我们都可以确定是哪个 `Employee` 提交了它。然而，在我们决定如何建立关系之前，首先需要进行一些初步建模。清单
    [2-2] 展示了 `Employee` 实体的一个模型。


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    ```

    清单 2-2 Employee 文档模型


    接下来，我们为 `Resume` 建模，如清单 [2-3] 所示。


    ```

    Id: resumes/1

    {

    Employee: "employees/1",

    Education: "Yale",

    Specialty: "IT"

    }

    ```

    清单 2-3 Resume 文档模型


    这两个模型是简化的，但它们展示了基本信息。仔细观察 `Resume` 模型，我们可以看到属性 `Employee: "employees/1"` 直接将 `Resume`
    链接到一个 `Employee`。


    这就是一个**引用**。RavenDB 中的引用只不过是包含其他文档字符串 ID 的属性。


    由于 `Resume` 通过引用指向 `Employee`，我们可以说这个链接代表“由...拥有”——`Resume` 被一个 `Employee` 拥有。我们可以反转这个关系，如清单
    [2-4] 所示。


    ```

    Id: employees/1

    {

    Resume: "resumes/1"

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    Id: resumes/1

    {

    Education: "Yale",

    Specialty: "IT"

    }

    ```

    清单 2-4 具有反转引用的 Employee 和 Resume 文档


    我们现在拥有的是 `Employee` 持有一个指向 `Resume` 的引用：`Resume: "resumes/1"`。这个引用可以解读为“拥有”——`Employee`
    拥有一个 `Resume`。


    当然，你也可以建立双向的一对一关系，如清单 [2-5] 所示。


    ```

    Id: employees/1

    {

    Resume: "resumes/1",

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    Id: resumes/1

    {

    Employee: "employees/1",

    Education: "Yale",

    Specialty: "IT"

    }

    ```

    清单 2-5 具有相互引用的 Employee 和 Resume 文档


    `Employee` 和 `Resume` 现在通过包含对方文档 ID 的属性相互指向。在一个显示 `Employee` 详细信息的屏幕中，我们可以轻松地提供
    `Resume` 屏幕，因为 `Employee` 持有对其简历的引用。同样，显示 `Resume` 的屏幕可以提供一个指向相关 `Employee` 的链接，因为我们可以轻松访问
    `Employee` 属性中的引用。


    正如我们已经提到的，建模不是一个有严格规则的精确过程。我们对 `Employee` 和 `Resume` 所做的是：首先发现它们是相关的，然后确定这是一对一关系，最后应用了这种关系的三种可能实现方式：


    1.  单向：`Resume` 指向 `Employee`。

    2.  单向：`Employee` 指向 `Resume`。

    3.  双向：`Employee` 和 `Resume` 都持有指向对方的引用。


    然而，由于在数据库层面没有技术限制，我们还可以应用另一种方法——**嵌入**。我们已经提到 `Employee` 和 `Resume` 之间的关系是一对一，但也谈到了所有权。`Employee`
    拥有 `Resume`，而 `Resume` 被一个 `Employee` 所拥有。这种“拥有”的措辞是嵌入的一个清晰方向，如清单 [2-6] 所示。


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08",

    Resume: {

    Education: "Yale",

    Specialty: "IT"

    }

    }

    ```

    清单 2-6 带有嵌入式 Resume 的员工


    在这种情况下，我们嵌入的不是一个没有身份的**值对象**，而是一个具有清晰身份的**实体**。这之所以可能，是因为存在清晰的所有权情况——`Employee`
    恰好有一个 `Resume`，并且每个 `Resume` 属于一个特定的 `Employee`。


    这种建模**一对一**关系的第四种方法是完全合理的。这取决于你来审视所有可能的方向，思考你应用程序中的流程和工作流，并确定可接受的建模解决方案。


    此外，你还应该考虑未来。你的应用程序可能以哪些方式演进？你的用户可能会提出什么请求？随着数据量增长或文档变大，会发生什么？


    考虑到这一点，让我们观察清单 [2-5] 中呈现的 `Employee` 建模变体。为了简单起见，我们有意使 `Employee` 和 `Resume` 都人为地过度简化。然而，如果你回想现实中的简历可能相当大，有时是三到四页，你就会意识到你将嵌入一个相当大的文档。不仅如此，在
    `Resume` 包含员工参与项目列表的场景中，你会看到 `Resume` 随着月份和年份而增长。如果你需要加载、操作并将 `Employee` 保存到数据库，那就意味着
    `Employee` 文档的大小会随着时间的推移而增长。


    此外，假设你决定应用相同的技术，以同样方式嵌入更多文档。在这种情况下，你不可避免地会看到你的 `Employee` 文档变得非常庞大且操作起来非常笨重。


    最后，如果需求发生变化，公司管理层决定为每个 `Employee` 引入不止一份简历——即公司申请合同，并且作为投标活动的一部分，为所有项目成员生成定制简历的场景，会发生什么？这将打破你的一对一建模，转变为**一对多**（一个
    `Employee` 可以有多份 `Resume`）。修改数据库模型和你的代码以适应这个变更请求需要付出多少努力？像“我们想在数据库中支持一个 Employee
    拥有多份 Resume”这样直接的句子，是否会导致工作量大得不成比例？


    所有这些都表明建模是复杂的。你永远不会处于完成模型并宣布其为“最佳可能”的情况。因此，你永远不应追求完美和“唯一正确的方式”。同时，你也不应该试图预测未来，然后将你所有能预见到的变体都作为领域模型的一部分构建起来。相反，你应该做的是创建一个尽可能简单的模型，它既覆盖当前需求，又不会阻碍那些将成为你应用程序生命周期中正常且可预期的变更请求。'
  raw: '#### Referencing


    However, there are situations where we will notice two documents, both with their
    own identity and justification for separate existence – and they will be in a
    one-to-one relationship. For example, imagine human resources management system
    with information about all employees within an organization. Among other things,
    we are keeping a Resume for every Employee – it was entered into the HRM system
    when the candidate applied for a position. After she accepted the offer workplace,
    we promoted this candidate into full-time Employee. Observing both Employee and
    Resume, we can see that they both have physical existence and their own identity.
    Also, they have a clear one-to-one relationship: every Employee has exactly one
    Resume, and for every Resume, we can determine an Employee who submitted it. However,
    before we decide how to establish a relationship, we first need to do some initial
    modeling. Listing [2-2](#514303_1_En_2_Chapter.xhtml#PC11) shows a model for the
    Employee entity .


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    Listing 2-2

    Employee document model

    ```


    Next, we model Resume , as shown in Listing [2-3](#514303_1_En_2_Chapter.xhtml#PC12).


    ```

    Id: resumes/1

    {

    Employee: "employees/1",

    Education: "Yale",

    Specialty: "IT"

    }

    Listing 2-3

    Resume document model

    ```


    These two models are simplified, but they are showing basic info. Looking closely
    at the Resume model, we can see property Employee: “employees/1” directly linking
    Resume to an Employee.


    This is a *reference*. References in RavenDB are nothing more than properties
    containing the string ID of some other document.


    Since Resume is pointing to Employee with a reference, we can say this link represents
    *owned by* – Resume is owned by an Employee. We can reverse this relationship
    , as can be seen in Listing [2-4](#514303_1_En_2_Chapter.xhtml#PC13).


    ```

    Id: employees/1

    {

    Resume: "resumes/1"

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    Id: resumes/1

    {

    Education: "Yale",

    Specialty: "IT"

    }

    Listing 2-4

    Employee and Resume documents with reversed reference

    ```


    What we now have is Employee holding a reference to a Resume: `Resume: "resumes/1"`.
    This reference can be read as *owns* – Employee owns a Resume.


    Of course, you can also establish a two-way one-to-one relationship, as shown
    in Listing [2-5](#514303_1_En_2_Chapter.xhtml#PC14).


    ```

    Id: employees/1

    {

    Resume: "resumes/1",

    Name: "John Doe",

    DateOfBirth: "1958/05/08"

    }

    Id: resumes/1

    {

    Employee: "employees/1",

    Education: "Yale",

    Specialty: "IT"

    }

    Listing 2-5

    Employee and Resume documents with mutual references

    ```


    Employee and Resume are now pointing at each other via properties containing the
    other Document’s ID. In an application displaying a screen with Employee details,
    we can easily offer the Resume screen because Employee holds a reference to his
    CV. Similarly, the screen showing Resume can offer a link leading to an accompanied
    Employee since we can easily access reference from the `Employee` property.


    As we already mentioned, modeling is not an exact process with strict rules. What
    we did with Employee and Resume is that we first detected that they are related,
    then determined this is one-to-one relationship, and then applied three possible
    implementations of this relationship:


    1.  Unidirectional: Resume pointing to Employee.


    2.  Unidirectional: Employee pointing to Resume.


    3.  Bidirectional: Both Employee and Resume hold a reference to the other one.


    However, due to the absence of technical limitations on the database level, we
    can also apply one more approach – embedding . We already mentioned that the relationship
    between Employee and Resume is one-to-one, but we also spoke about ownership.
    The Employee owns Resume, and Resume is owned by an Employee. This “owning” verbiage
    is a clear direction for embedding, as shown in Listing [2-6](#514303_1_En_2_Chapter.xhtml#PC15).


    ```

    Id: employees/1

    {

    Name: "John Doe",

    DateOfBirth: "1958/05/08",

    Resume: {

    Education: "Yale",

    Specialty: "IT"

    }

    }

    Listing 2-6

    An employee with embedded Resume

    ```


    In this case, we embedded not a Value Object without identity but an Entity with
    a clear identity. This is possible due to a clear ownership situation – Employee
    has exactly one Resume, and every Resume belongs to a specific Employee.


    This fourth approach to modeling *one-to-one* relationships is entirely legitimate.
    It is up to you to examine all possible directions, think about processes and
    workflows in your application, and determine acceptable modeling solutions.


    Also, it would be best if you thought about the future. What will be possible
    ways your application will evolve? What might be requests coming from your users?
    What will happen as the amount of data grows or if your documents are growing?


    With this in mind, let’s observe the modeling variant of Employee presented in
    Listing [2-5](#514303_1_En_2_Chapter.xhtml#PC14). For simplicity purposes, we
    intentionally made both Employee and Resume artificially oversimplified. However,
    if you recall that real-life Resumes can be pretty big, sometimes three or four
    pages, you will realize that you will embed a substantially extensive Document.
    Not only that, in the scenario where Resume contains a list of projects Employee
    participated in, you will see Resume growing over months and years. If you need
    to load, manipulate, and save Employee to the database, that means that the size
    of the Employee document will grow over time.


    Furthermore, suppose you decide to apply same technique and embed some more documents
    in the same manner. In that case, you will inevitably see your Employee document
    becoming very large and very cumbersome to manipulate.


    Finally, what will happen if requirements change and company management decided
    to introduce more than one Resume for every Employee – scenario where the Company
    applies for contracts and, as a part of a bid campaign, generates custom-tailored
    Resume of all project members. This will break your one-to-one modeling, which
    will transform into one-to-many (one Employee can have many Resumes). How much
    effort will it take to modify the database model and your code to accommodate
    this change request? Will a straightforward sentence like “we want to enable one
    Employee to have more than one Resume in our database” result in an inappropriately
    large amount of work?


    All of this is showing that modeling is intricate. You will never be in a situation
    where you complete the model and declare it as “best possible.” Hence, you should
    never strive for perfection and “one right way.” Also, it would help if you never
    tried to anticipate the future and then build all variants you can foresee as
    a part of your domain model. What you should do instead is to make the simplest
    possible model that is covering present needs but also does not obstruct change
    requests that will be a normal and expected part of your application life cycle.'
