    Management System (RDBMS) . The importance of his groundbreaking idea lies in
    the concept of describing data only with its natural structure, avoiding the need
    to superimpose any additional structures for low-level machine representation.
    This high level of data representation provides a basis for high-level data language,
    giving such programs independence from low-level details of machine representation
    and RDBMS internal data organization.


    Unlike the navigational approach that required programs to loop to collect records,
    Codd’s solution provided set-oriented declarative language. This approach led
    to the birth of Structured Query Language - SQL - in 1974\. Following this standardization,
    Oracle released the first commercial implementation of SQL in 1979.


    A landmark year for the relational model was 1980 when IBM released their product
    for mainframes, and smaller vendors began selling second-generation relational
    systems with great commercial success. During the 1980s, RDBMSes finally came
    of age and established themselves as the first choice for large datasets typically
    present in government agencies and financial institutions. Furthermore, relational
    persistence became a default pick by developers around the world.


    ### Problems with Relational DBMS


    However, as is the case with any technology , there is no such thing as a “silver
    bullet.” Various problems are calling for different solutions. Non-relational
    databases, which existed before relational databases became dominant persistence
    solutions, continued to live. Since the late 1960s, hierarchical, graph, and object-oriented
    databases have been around. The reason for this is that RDBMS has several challenges:


    *   Relational databases work best with structured data stored in well-organized
    tables. For unstructured data, tables with fixed predefined schema are not the
    best choice.


    *   Users can scale a relational database by running it on more powerful (and
    expensive) servers. This approach is “scaling up” and is feasible up to a certain
    point. After that, a database must be distributed across multiple servers – “scaling
    out.” Relational databases are inherently single-server databases, and distributed
    solutions are not elegant and seamless.


    *   Relational databases do not natively support data partitioning and distributed
    setup. ACID transactions that are the basis of RDBMS are fundamentally clashing
    with distributed computing.


    ### Impedance Mismatch


    When developing computer software , developers are modeling data structures that
    represent an abstraction of the real-life domain. These models (which are part
    of objects in object-oriented languages) are nonlinear and almost always contain
    complex constructs like collections of primitive values or nested objects containing
    other primitive values. On the other hand, many popular relational databases cannot
    store anything beyond scalar values (like numbers and strings). As a result, relational
    databases cannot directly store and manipulate your objects and data structures.
    This incompatibility is a very well-known phenomenon and has been named *impedance
    mismatch* .


    Before you can store your objects into a relational database, you need to transform
    them into a set of structures matching your RDBMS schema. And the other way around
    - data in tables and rows need to be manipulated and reshaped to populate objects.
    So, storing things into a relational database and fetching them again require
    a process of two-way translation.


    This translation occurs between two models - your (usually object-oriented) domain
    model and tabular model intended for saving into your database.


    Hence, developers need to create an additional data model and provide a bidirectional
    translation service. Also, every time they make corrections or changes to their
    primary domain model, they need to update this translation logic. Modeling twice
    and maintaining translation service are a nontrivial task that will make changes
    harder, and that will make you move slower in the face of ever-coming change requests
    from your customers.


    ### Object-Relational Mappers


    *Object-relational mapper* (ORM) is a tool that can automate this tedious task
    of translating the data from its relational representation into the object model
    used by the application. However, as every developer using many of numerous ORMS
    like Hibernate or Entity Framework knows, there are many downsides to these libraries:


    *   ORM is abstracting away RDBMS details, so over time developer inevitably starts
    thinking about the database as a collection of data in memory.


    *   Generated SQL statements are inferior to handwritten SQL.


    *   There is an inevitable overhead of ORM.


    *   Initial configuration of ORM can be complicated.


    In his 2006 blog post “The Vietnam of Computer Science,” Ted Neward wrote


    > *Object/Relational Mapping* *is the Vietnam of Computer Science. It represents
    a quagmire which starts well, gets more complicated as time passes, and before
    long entraps its users in a commitment that has no clear demarcation point, no
    clear win conditions, and no clear exit strategy*


    Indeed, over time as your application grows and expands, ORM usage will lead to
    the accumulation of antipatterns.


    *Select N+1* is just one of those antipatterns. Your code will first fetch N entities
    from the database, then iterate over this collection, making additional calls
    for every object to bring other referenced things. A typical example would be
    a web page where you are rendering the list of articles. Each of these articles
    has comments, and you need to make an additional call to the database to fetch
    the latest comment to show along with each piece. Furthermore, you would like
    to display the location of the comment author. As you can see, there is a cascading
    set of parent-child relations, and in every step, you are accessing the next level,
    descending hierarchy, and making more and more calls.'
  trans: '## 数据库简史


    自计算诞生之初，机器就在产生计算结果并将其持久化存储。随着时间的推移，出现了不同的数据存储解决方案。然而，为了最大化速度，所有这些系统都与硬件和操作系统紧密耦合，牺牲了灵活性和标准化。随着硬件持续发展，这种妥协变得越来越没有必要，于是许多通用数据库管理系统应运而生。最早的一批此类系统中，**集成数据存储**
    是由查尔斯·巴赫曼在 20 世纪 60 年代初开发的，它采用了 `导航数据库模型`。


    1970 年 6 月，埃德加·F·科德发表了开创性论文“大型共享数据库的关系模型”，其中介绍了 `关系型数据库管理系统` (`RDBMS`)。他突破性思想的重要性在于，它提出了仅使用数据的自然结构来描述数据的概念，避免了为低层次机器表示而强加任何额外结构的需要。这种高层次的数据表示为高级数据语言提供了基础，使此类程序独立于机器表示的低级细节和
    `RDBMS` 的内部数据组织。


    与需要程序循环遍历来收集记录的导航式方法不同，科德的解决方案提供了面向集合的声明式语言。这种方法催生了 1974 年 `结构化查询语言` (`SQL`) 的诞生。在这一标准化之后，Oracle
    于 1979 年发布了首个 `SQL` 的商业实现。


    对于关系模型而言，1980 年是具有里程碑意义的一年。IBM 为其大型机发布了相关产品，而规模较小的供应商也开始销售第二代关系系统，并取得了巨大的商业成功。在整个
    20 世纪 80 年代，`RDBMS` 最终成熟，并确立了自己作为政府机构和金融机构中常见的大型数据集的首选存储方案。此外，关系型持久化也成为了全球开发者的默认选择。


    ### 关系型数据库管理系统的问题


    然而，正如任何技术一样，并不存在所谓的“银弹”。不同的问题呼唤不同的解决方案。在关系型数据库成为主流持久化解决方案之前就已存在的非关系型数据库，依然继续存在。自
    20 世纪 60 年代末以来，层次型、图数据库和面向对象的数据库就一直存在。其原因在于 `RDBMS` 面临几个挑战：


    *   关系型数据库最适合处理存储在结构化表中的**结构化数据**。对于非结构化数据，具有固定预定义模式的表格并非最佳选择。

    *   用户可以通过在更强大（也更昂贵）的服务器上运行关系型数据库来进行**扩展**。这种方法称为“纵向扩展”，在一定范围内是可行的。超过这个范围后，数据库就必须分布在多个服务器上——即“横向扩展”。关系型数据库本质上是单服务器数据库，其分布式解决方案并不优雅且难以无缝衔接。

    *   关系型数据库原生不支持数据分区和分布式设置。作为 `RDBMS` 基石的 `ACID` 事务，与分布式计算存在根本性的冲突。


    ### 阻抗失配


    在开发计算机软件时，开发者会为真实领域建模数据结构。这些模型（是面向对象语言中对象的一部分）是非线性的，几乎总是包含复杂的结构，比如原始值的集合或包含其他原始值的嵌套对象。另一方面，许多流行的关系型数据库除了标量值（如数字和字符串）外无法存储任何东西。因此，关系型数据库无法直接存储和操作您的对象和数据结构。这种不兼容性是一个众所周知的现象，被命名为
    `阻抗失配`。


    在将对象存入关系型数据库之前，需要将它们转换为符合 `RDBMS` 模式的一组结构。反之亦然——表中的数据需要被操作和重塑以填充对象。因此，向关系型数据库存储数据并再次取出它们，需要一个双向转换的过程。


    这种转换发生在两个模型之间——您的（通常是面向对象的）领域模型和用于保存到数据库的表模型。


    因此，开发者需要创建一个额外的数据模型，并提供双向翻译服务。此外，每次对主要领域模型进行更正或更改时，他们都必须更新这个转换逻辑。建模两次并维护翻译服务是一项复杂的任务，会让变更变得更加困难，并且在面对客户不断涌来的变更请求时，开发进度会变慢。


    ### 对象关系映射器


    `对象关系映射器` (`ORM`) 是一种工具，可以自动完成将数据从关系表示形式转换为应用程序所用对象模型这一繁琐的任务。然而，正如许多使用 `Hibernate`
    或 `Entity Framework` 等众多 `ORM` 的开发者所知，这些库存在许多缺点：


    *   `ORM` 抽象掉了 `RDBMS` 的细节，因此随着时间的推移，开发者不可避免地开始将数据库视为内存中的数据集合。

    *   生成的 `SQL` 语句不如手写的 `SQL`。

    *   `ORM` 会带来不可避免的性能开销。

    *   `ORM` 的初始配置可能很复杂。


    泰德·纽阿德在其 2006 年的博客文章《计算机科学的越南》中写道：


    > `对象/关系映射` 是计算机科学的越南。它代表了一个泥潭，开始时很顺利，但随着时间推移变得越来越复杂，不久就将用户困在一个承诺中，这个承诺没有明确的界点，没有明确的胜利条件，也没有明确的退出策略。


    的确，随着应用程序的成长和扩展，`ORM` 的使用将导致反模式的积累。


    `Select N+1` 问题只是这些反模式之一。您的代码会先从数据库获取 `N` 个实体，然后遍历这个集合，对每个对象进行额外调用以获取其他引用的对象。一个典型的例子是一个渲染文章列表的网页。每篇文章都有评论，您需要额外调用数据库以获取最新的评论，并随每篇文章一起显示。此外，您还想显示评论作者的位置。如您所见，这是一系列级联的父子关系，在每一步中，您都在访问下一层级，深入层级结构，并进行越来越多的调用。'
- fmt: '### Normalization


    `Normalization` is a modeling technique that is an essential part of Codd’s model
    of relational databases. In the early 1970s, storage was expensive, and eliminating
    data redundancy was a critical design factor for a database system designer.


    Codd defined first (`1NF`), second (`2NF`), and third (`3NF`) `normal forms` as
    a theoretical basis for best practices of data modeling. With the application
    of `3NF` principles, you will eliminate redundancy by breaking records into their
    most atomic form, store those pieces in separate tables, and then relate them
    via `Foreign Keys` (`FK`).


    `FK` is nothing more than a pointer. For example, when storing customers in the
    `Customers` table, you would separate their address and keep it in the `Address`
    table. Then, you would create `FK` to connect these two tables to establish a
    relationship between the row in the `Customers` table and the row in `Address`
    table containing the customer’s address.


    After developing a concept of normalization to eliminate data redundancy, Codd
    constructed a mathematical theory of normalization and provided theoretical guarantees
    about `3NF` providing data consistency and preventing anomalies when inserting,
    updating, and deleting rows.


    Today, storage is cheap. Not only that, your server’s RAM will most likely have
    dozens of gigabytes at your disposal, usually in the range of your database size.
    Good `DBMS` will detect this and optimize it by loading large parts of your database
    to working memory. So, over time, redundancy faded away as a motivation for normalization,
    and today you will hear relational database proponents speaking about `3NF` only
    in the context of database consistency.


    However, normalization leads to several problems, and two of them are major ones.


    The first challenge is related to `projections`. Every time you need to display
    a web page that contains complex data, you will have to create a projection –
    a combination of rows from different tables. For example, to show an invoice,
    you will have to combine data from several tables, including `Invoices`, `Customers`,
    `Addresses`, `Products`, and `Employees`. Joining five tables is not a demanding
    operation. Still, once you load your database with tens of thousands of invoices
    and when you start creating aggregations that are answering questions like “what
    are the top 5 countries where we export to,” you will notice performance degradation
    of your `RDBMS`. Hence, projections in relational databases are putting a load
    on the developer and on the database itself.


    A second major problem of normalization is `temporal snapshots`. As we already
    mentioned, `RDBMS` are priding themselves with a solid theoretical background
    that guarantees that data will not be corrupted. However, a straightforward example
    will show you how normalization is fragile in the light of changes that your data
    undergo over time. Returning to the story of invoices modeled with a normalized
    approach, we can see that `Invoices` are residing in one table, pointing to the
    `Companies` table. Further, `Companies` are related to the `Countries` table that
    contains a list of all countries. This way, `Invoices` are related to `Countries`
    via `Companies`. Now, imagine that `Company` relocates from London to Berlin –
    you will go into the `Companies` table and change `FK` related to the `Countries`
    table to point to the row containing Germany.


    This simple change should not have dramatic consequences. However, due to normalized
    modeling, the modification you just performed has a rippling effect. Although
    you did not touch `Invoices` in this process, they are affected since they are
    related to the `Company` that changed address. As a result, next time you repeat
    that aggregation, “what are the top 5 countries where we export to,” you may discover
    that the United Kingdom is not there anymore. In other words – by making a simple
    change to the address of one `Company`, you introduced data corruption on a historical
    level.


    Normalization is incapable of modeling temporal dependencies of this kind. To
    store a snapshot of your invoice, you will have to apply the denormalization process.
    Finally, we can conclude that, instead of bringing promised consistency and validity
    of your data, normalization will corrupt your historical data.


    ### Modern Web Applications


    In the 1970s and 1980s, data arriving at your application was predictable and
    highly structured. With the emergence of the Internet and the globalization of
    your user base, things started developing more rapidly. Today, modern Internet
    applications serve a wide variety of users, offering many services and evolving
    rapidly. Having hundreds of concurrent users of your application is nothing strange.


    Twenty or 30 years ago, you would experience this only with applications deployed
    to large enterprises. Thirty years ago, you would receive a `Requirements Specification`
    document with a precisely defined schema of the data you need to store in the
    relational database. Then you would apply waterfall methodology, spend months
    implementing it, and finally release it. Today, you are working in 2-week sprints,
    with change requests coming merely days after delivering working functionality.


    Relational databases, in their nature, were optimized for writing data. Reading
    data was a secondary priority. Modern web applications will commonly store data
    once and then request it dozens or hundreds of times before making another write.
    Data that was disassembled into atomic units and stored over dozens of tables
    during the writing process now needs to be reassembled again to produce a model
    for rendering information on a web page. And this is not happening just once.
    Thousands of visitors to your web application will trigger many such calls.


    Rendering modern web pages will generate many requests to the database. These
    same users who are requesting pages will also interact with your application and
    generate new data that will be stored. Think about a small mom-and-pop shop two
    decades ago – they are running one `POS`, with a number of transactions limited
    by the physical factors – customers standing in line, one customer at a time.
    Small shop managed to survive and expand, and it is now online. There are no more
    limitations of physical nature; they are now in a virtual world where 50 customers
    can purchase within 3 minutes.


    The relational database model was conceived at different times – fewer read requests,
    more occasional users, highly structured data, and slow pace of changes to your
    application. You could say that the present situation is the opposite.


    ## NoSQL


    Problems we just described grew only more painful over time. As the pace of change
    requests sped up, as the number of users and amount of data grew exponentially,
    it was clear that we needed some alternatives. It was evident that `RDBMS` were
    not the most suitable solution in all cases and that some systems required different
    approaches for storing and querying data.


    This section will look into the evolution that emerged in the 1990s and 2000s
    and lead to creating the `NoSQL` movement. We will examine the origins of `NoSQL`
    as a term, the advantages and challenges of such a database, and, finally, the
    broader impact of this movement on the whole industry.'
