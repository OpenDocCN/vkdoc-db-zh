    这两个查询将返回按国家分组的公司和按国家分组的供应商。此外，这两个查询将产生两个自动索引。手动聚合这两个结果集将回答 Northwind Traders 与哪些国家业务往来最多的问题。\n\
    \n在上一章中，我们介绍了多地图索引的主题，这些索引同时操作多个集合。为了编写一个静态索引来替换两个自动索引，我们可以以多地图索引为基础，然后对生成的投影应用归约阶段。这样的索引被称为\
    \ **多地图归约索引**。\n\n您首先定义多地图索引 `Countries/Business` 的两个映射阶段，如清单 [6-7] 所示。\n\n```csharp\n\
    map(\"Companies\", company => {\n    return {\n        Country: company.Address.Country,\n\
    \        Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company\
    \ => {\n    return {\n        Country: company.Address.Country,\n        Companies:\
    \ 0,\n        Suppliers: 1\n    }\n})\n```\n\n清单 6-7：多地图索引 `Countries/Business`\n\
    \n如果您将此清单与清单 [6-4] 进行比较，您会发现我们再次进行计数，但这次略有修改。我们需要为每个公司出现计一次，但同时，我们还需要计算供应商的事件。\n\
    \nRavenDB 要求在一个索引中定义的所有映射函数具有相同的输出。因此，在计算公司数量时，您还需要返回供应商数量，反之亦然。为了符合这一点，您可以使用一个简单的方法——返回您感兴趣的数据，对于所有其他字段，返回零值。这将产生如图\
    \ [6-11] 所示的索引条目。\n\n公司、供应商和国家列表的快照。\n![Figure 6-11](img/514303_1_En_6_Fig11_HTML.png)\n\
    \n多地图索引 `Countries/Business` 的原始索引条目。\n\n如您所见，对于正在处理的每个公司和供应商文档，索引将提取其国家，并在相应的属性中计数为一。\n\
    \n现在剩下的就是添加聚合。因此，我们使用归约阶段扩展索引，这给了我们如清单 [6-8] 所示的最终形式。\n\n```csharp\nmap(\"Companies\"\
    , company => {\n    return {\n        Country: company.Address.Country,\n    \
    \    Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company\
    \ => {\n    return {\n        Country: company.Address.Country,\n        Companies:\
    \ 0,\n        Suppliers: 1\n    }\n})\ngroupBy(map => map.Country)\n.aggregate(group\
    \ => {\n    return {\n        Country: group.key,\n        Companies: group.values.reduce((res,\
    \ el) => res + el.Companies, 0),\n        Suppliers: group.values.reduce((res,\
    \ el) => res + el.Suppliers, 0)\n    }\n})\n```\n\n清单 6-8：多地图归约索引 `Countries/Business`\n\
    \n最后，您可以运行查询：\n\n```text\nfrom index 'Countries/Business'\n```\n\n以获取包含公司和供应商数量的国家列表。\n"
- fmt: '## Artificial Documents


    In addition to computing aggregations and storing them in an index, you can also
    materialize such indexing entries into documents called `artificial documents`.
    They will reside in a collection with an arbitrary name; every time the index
    is updated, this collection is also updated. This section will show scenarios
    when you want to create an artificial document, a walkthrough of their configuration,
    and to know how to perform indexing on them.


    Querying index from Listing [6-8](#514303_1_En_6_Chapter.xhtml#PC26) will give
    raw indexing result as shown in Figure [6-12](#514303_1_En_6_Chapter.xhtml#Fig12).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig12_HTML.jpg)

    *A snapshot of the country, company, and suppliers list.*

    **Figure 6-12**

    Raw Indexing Entries of `Countries/Business` Index


    You can now use these two fields of the index to order countries by the number
    of companies we do business with:

    ```sql

    from index ''Countries/Business''

    order by Companies as long desc

    ```

    and by number of suppliers

    ```sql

    from index ''Countries/Business''

    order by Suppliers as long desc

    ```

    However, what if we want to see totals? If you are making a business trip, which
    city would be your first choice? At which location would you have a chance to
    visit the most significant number of business entities your company is doing business
    with?


    One way to solve this would be to expand index with additional field `Total` that
    would summarize `Companies` and `Businesses`, as shown in Listing [6-9](#514303_1_En_6_Chapter.xhtml#PC30).

    ```javascript

    map("Companies", company => {

    return {

    Country: company.Address.Country,

    Companies: 1,

    Suppliers: 0,

    Total: 1

    }

    })

    map("Suppliers", company => {

    return {

    Country: company.Address.Country,

    Companies: 0,

    Suppliers: 1,

    Total: 1

    }

    })

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Companies: group.values.reduce((res, el) => res + el.Companies, 0),

    Suppliers: group.values.reduce((res, el) => res + el.Suppliers, 0),

    Total: group.values.reduce((res, el) => res + el.Total, 0)

    }

    })

    ```

    **Listing 6-9**

    Countries/Business Index Expanded with `Total`


    With an expanded index, you can now query:

    ```sql

    from index ''Countries/Business''

    order by Total as long desc

    ```

    to get desired information.


    Instead of expanding the index, you might want to go with a query shown in Listing
    [6-10](#514303_1_En_6_Chapter.xhtml#PC32).

    ```sql

    from index ''Countries/Business''

    order by (Companies + Suppliers) as long desc

    ```

    **Listing 6-10**

    Querying index with a computed field


    Executing this query will result in an error.


    In Chapter [4](#514303_1_En_4_Chapter.xhtml), we talked about RavenDB’s approach
    to indexing – all of your queries are always executed against indexes, and precomputed
    index entries are used to provide blazingly fast responses from the database.
    Under no circumstances can queries contain any computation. All such calculations
    must be done within the index itself, ahead of query time. Precisely for this
    reason, a query from Listing [6-10](#514303_1_En_6_Chapter.xhtml#PC32) will result
    in an error – we attempted to sum up `Companies` and `Suppliers` and then order
    countries based on that criterion. Revisiting the expanded index from Listing
    [6-9](#514303_1_En_6_Chapter.xhtml#PC30), you can see that we are performing totals
    summing in the indexing phase indeed.


    Inspecting raw indexing entries of the index before expansion, shown in Figure
    [6-12](#514303_1_En_6_Chapter.xhtml#Fig12), reveals a data structure that would
    be appropriate for writing a simple map index. Unfortunately, RavenDB indexes
    can operate only on documents, not on raw indexing entries within other indexes.


    However, RavenDB provides a way to materialize raw indexing entries into actual
    documents, so you can query or even index them. In the next section, we will show
    how to achieve this.


    ### Creating Artificial Documents


    Start by returning index `Countries/Business` to the state from Listing [6-8](#514303_1_En_6_Chapter.xhtml#PC26)
    before expanding it with field `Total`. When you open the index for editing, right
    below `Reduce` script area, there is an `Output Reduce Results to Collection`
    option, as shown in Figure [6-13](#514303_1_En_6_Chapter.xhtml#Fig13).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig13_HTML.jpg)

    *A snapshot of the company and supplier group value code.*

    **Figure 6-13**

    Outputting Index Reduce Results to `CountriesBusiness` Artificial Collection


    As a result, raw index entries, the same one you can see in Figure [6-12](#514303_1_En_6_Chapter.xhtml#Fig12),
    will be extracted and loaded into proper JSON documents. If you check the list
    of collections, you will notice a new one there – `CountriesBusiness` – as shown
    in Figure [6-14](#514303_1_En_6_Chapter.xhtml#Fig14).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig14_HTML.png)

    *A snapshot of the document id, company, supplier, and country list.*

    **Figure 6-14**

    Documents in the Artificial Collection CountriesBusiness


    This collection is called the `artificial collection`, and documents belonging
    to this collection are `artificial documents`. Opening one of these documents
    will reveal structure like one shown in Listing [6-11](#514303_1_En_6_Chapter.xhtml#PC33).

    ```json

    {

    "Country": "Finland",

    "Companies": 2,

    "Suppliers": 1,

    "@metadata": {

    "@collection": "CountriesBusiness",

    "@flags": "Artificial, FromIndex"

    }

    }

    ```

    **Listing 6-11**

    Structure of one artificial document


    Artificial documents can be created from MapReduce or MultiMapReduce indexes,
    containing indexing entries. If you compare raw indexing entries from Figure [6-12](#514303_1_En_6_Chapter.xhtml#Fig12)
    with the content of the generated artificial collection, you will see that artificial
    collection represents a dump of an index. Artificial documents will contain all
    index fields as properties, and its metadata property will have a `flag` marking
    it as `Artificial, FromIndex`.


    Every time a new order is created or an existing one is updated/deleted, all indexes
    indexing orders will be updated. The same thing will happen with the `Countries/Business`
    index, and its aggregated entries will be incrementally updated to take into account
    the latest changes. Additionally, since `Countries/Business` has output collection
    defined, this artificial collection will be updated.


    Besides being automatically created by RavenDB, artificial documents are completely
    normal documents. Hence, you can run queries like

    ```sql

    from ''CountriesBusiness''

    where Country = ''UK''

    ```

    to get number of companies and suppliers from the United Kingdom and

    ```sql

    from ''CountriesBusiness''

    where Companies > 1 and Suppliers > 1

    select Country

    ```

    to get a list of countries with at least one Company and Supplier.


    ### Indexing Artificial Documents


    After executing two queries from the previous section, you will discover that
    RavenDB created automatic index `Auto/CountriesBusiness/ByCompaniesAndCountryAndSuppliers`,
    which is expected behavior from your database.


    Artificial documents are completely regular documents, so it is also possible
    to write Map or even MapReduce indexes which would process and aggregate them
    if needed. Hence to answer our original quest of finding countries with most suppliers
    and companies, we can first start by defining Map index `CountriesBusiness/Totals`,
    as shown in Listing [6-12](#514303_1_En_6_Chapter.xhtml#PC36).

    ```javascript

    map("CountriesBusiness", entry => {

    return {

    Country: entry.Country,

    Total: entry.Companies + entry.Suppliers

    }

    })

    ```

    **Listing 6-12**

    CountriesBusiness/Totals index


    You can now finally execute a query that will produce a list of countries, ordered
    by business activities in descending order:

    ```sql

    from index ''CountriesBusiness/Totals''

    order by Total as long desc

    select Country

    ```

    It is easy to see that your next business trip should be to the United States,
    Germany, and France.'
