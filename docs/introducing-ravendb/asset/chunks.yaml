  trans: "\n\n## 计算字段\n\n到目前为止，你已经创建了几个包含字段值的静态索引。在某些情况下，比如 `Employees/ByFirstName`\
    \ 索引，字段值是直接从已处理的文档中读取的。而在其他情况下，比如 `Orders/ByEmployeeName`，会加载被引用的文档，然后索引其字段的内容。\n\
    \n然而，也可以创建包含不存在于任何文档中的值的索引字段。这样的字段被称为**计算字段**。我们通常基于一个或多个其他字段来计算它们的值。\n\n清单 5-9\
    \ 展示了一个包含计算字段的索引示例。\n\n```javascript\nmap(\"Orders\", order => {\n    var employee\
    \ = load(order.Employee, 'Employees');\n    var total = 0;\n    for (var i = 0;\
    \ i < order.Lines.length; i++) {\n        var line = order.Lines[i];\n       \
    \ total += line.Quantity * line.PricePerUnit * (1 - line.Discount);\n    }\n \
    \   return {\n        EmployeeName: employee.FirstName,\n        Total: total\n\
    \    }\n})\n```\n清单 5-9\n包含计算字段 `Total` 的索引 `Orders/ByEmployeeNameByTotal`\n\n\
    清单 5-9 中定义的索引基于 `Orders/ByEmployeeName`，但扩展了字段 `Total`。它的值代表订单的总货币价值，计算方式如下：\n\
    \n```javascript\nvar total = 0;\nfor (var i = 0; i < order.Lines.length; i++)\
    \ {\n    var line = order.Lines[i];\n    total += line.Quantity * line.PricePerUnit\
    \ * (1 - line.Discount);\n}\n```\n\n这是一段相对标准的命令式 JavaScript 代码。它遍历 `order.Lines`\
    \ 数组，对于每一行，其小计为 `quantity * price * (1 – discount)`。行小计被累加起来，在处理完所有行后，变量 `total`\
    \ 就保存了该订单的计算总额。\n\n你可以使用 JavaScript 语言的所有特性，比如循环、函数等。你甚至可以将代码提取到 JS 函数中，从索引的 `map`\
    \ 函数调用，如清单 5-10 所示。\n\n```javascript\nfunction GetTotal(order) {\n    var total\
    \ = 0;\n    for (var i = 0; i < order.Lines.length; i++) {\n        var line =\
    \ order.Lines[i];\n        total += line.Quantity * line.PricePerUnit * (1 - line.Discount);\n\
    \    }\n    return total;\n}\n\nmap(\"Orders\", order => {\n    var employee =\
    \ load(order.Employee, 'Employees');\n    return {\n        EmployeeName: employee.FirstName,\n\
    \        Total: GetTotal(order)\n    }\n})\n```\n清单 5-10\n功能被提取到 JS 函数中的索引 `Orders/ByEmployeeNameByTotal`\n\
    \n也可以使用 JavaScript 的声明式风格，如清单 5-11 所示。\n\n```javascript\nfunction GetTotal(order)\
    \ {\n    return order.Lines.reduce((partial_sum, l) => partial_sum + (l.Quantity\
    \ * l.PricePerUnit) * (1 - l.Discount), 0)\n}\n\nmap(\"Orders\", order => {\n\
    \    var employee = load(order.Employee, 'Employees');\n    return {\n       \
    \ EmployeeName: employee.FirstName,\n        Total: GetTotal(order)\n    }\n})\n\
    ```\n清单 5-11\n使用声明式 JS 函数的索引 `Orders/ByEmployeeNameByTotal`\n\n还可以将你领域的业务逻辑和业务规则嵌入到索引中。清单\
    \ 5-12 给出了一个这样的例子。\n\n```javascript\nfunction GetTotal(order) {\n    var total\
    \ = 0;\n    for (var i = 0; i < order.Lines.length; i++) {\n        var line =\
    \ order.Lines[i];\n        var discount = line.Discount;\n        // 为波兰订单额外应用\
    \ 10% 的折扣\n        if (order.ShipTo.Country === \"Poland\") {\n            discount\
    \ += 0.1;\n        }\n        total += line.Quantity * line.PricePerUnit * (1\
    \ - discount);\n    }\n    return total;\n}\n\nmap(\"Orders\", order => {\n  \
    \  var employee = load(order.Employee, 'Employees');\n    return {\n        EmployeeName:\
    \ employee.FirstName,\n        Total: GetTotal(order)\n    }\n})\n```\n清单 5-12\n\
    扩展了业务规则的索引 `Orders/ByEmployeeNameByTotal`\n\n我们为运往波兰的订单提供了 10% 的折扣，这条规则作为计算字段计算的一部分被嵌入到索引中。\n\
    \n因此，现在你可以执行一个查询：\n\n```javascript\nfrom index 'Orders/ByEmployeeNameByTotal'\n\
    where Total > 15000\n```\n\n来获取所有总货币价值超过 15,000 的订单。\n\n所以，利用计算字段，你可以基于现有属性，通过应用可能非常复杂的逻辑，创建新的计算属性。如果需要，你可以将大部分业务逻辑卸载到数据库中。\n\
    \n## 动态字段\n\n正如我们之前提到的，RavenDB 是一个**无模式数据库**。你无需预先定义模式，就能够接受各种半结构化甚至非结构化的数据。项目开始时正是你对领域了解最少的时候。能够推迟关于将使用何种数据结构的决策是一个显著优势。它不仅能加快开发速度，还能在实现过程中以及产品上线后，不可避免地出现更多需求时，提供急需的灵活性。\n\
    \n在其他情况下，你有非常明确的需求，但需要存储在数据库中的数据本质上是异构的。一个典型情况是应用全球化的需求。将业务扩展到世界新的地区，通常意味着需要了解你之前忘记涵盖的概念，并修改你的应用和数据库以考虑它们。\n\
    \n以地址的概念为例。世界各地不同的国家有不同的地址方式。只需阅读全球各国不同的行政区划术语——州、郡、省、区、府、酋长国、州、市、道、县、州——就能理解对这种异构数据建模的完全复杂性。\n\
    \nRavenDB 中文档的无模式 JSON 数据格式，将为你存储的实体提供急需的灵活性以进行扩展。然而，你需要将这些更改传播到查询和应用本身。并且，由于查询使用索引，你也不得不扩展\
    \ RavenDB 索引定义。一旦它被更改，这将触发整个索引的重新计算，这可能既计算密集又耗时。\n\nRavenDB 为这种情况提供了一个方便的解决方案，即**动态字段**。你可以以编程方式定义字段，而不是显式声明字段名称及其值。这样的索引可以适应不同的文档结构。此外，当带有新字段的文档到达数据库时，动态字段将防止索引的完全重新计算。清单\
    \ 5-13 展示了一个为员工地址生成的包含动态字段的索引。\n\n```javascript\nfunction CreateDynamicFields(addr)\
    \ {\n    var ret = [];\n    for (const property in addr) {\n        ret.push(createField(property,\
    \ addr[property], { indexing: 'Exact', storage: false, termVector: null }))\n\
    \    }\n    return ret;\n}\n\nmap(\"Employees\", emp => {\n    return {\n    \
    \    _: CreateDynamicFields(emp.Address)\n    }\n})\n```\n清单 5-13\n`Employees/DynamicFields`\
    \ 索引\n\n从 `map` 定义可以看出，这个索引处理所有员工，并将为他们的地址创建动态字段。清单 5-14 展示了一个示例地址。\n\n```json\n\
    {\n    \"Line1\": \"4726 - 11th Ave. N.E.\",\n    \"Line2\": null,\n    \"City\"\
    : \"Seattle\",\n    \"Region\": \"WA\",\n    \"PostalCode\": \"98105\",\n    \"\
    Country\": \"USA\",\n    \"Location\": {\n        \"Latitude\": 47.66416419999999,\n\
    \        \"Longitude\": -122.3160148\n    }\n}\n```\n清单 5-14\nemployees/8-A 的地址字面量\n\
    \n图 5-11 显示了这种形式地址的索引项集合。\n\n![](img/514303_1_En_5_Fig11_HTML.png)\n图 5-11\n`Employees/DynamicFields`\
    \ 索引的索引项\n\n地址的每个属性（如 `Line1`、`Line2`、`City` 等）都是一个项的集合。该集合中的值是从任何员工文档上该属性的所有出现位置中提取出来的。\n\
    \n让我们看看索引的定义。你可以看到动态字段的定义有一个特殊的形式：\n\n```javascript\n_: CreateDynamicFields(emp.Address)\n\
    ```\n"
- fmt: '## Dynamic Fields


    Underscore as an object literal name is just a convention. Figure [5-11](#514303_1_En_5_Chapter.xhtml#Fig11)
    shows that a collection with the name `_` will be created, but it does not have
    content.


    Function that generates set of dynamic fields has the following definition:


    ```javascript

    function CreateDynamicFields(addr) {

    var ret = [];

    for (const property in addr) {

    ret.push(createField(property, addr[property], { indexing: ''Exact'', storage:
    false, termVector: null }))

    }

    return ret;

    }

    ```


    An empty array is defined. The indexing engine will iterate over all address’s
    properties and add a new dynamic field for every one of them.


    RavenDB has built-in JS function:


    ```javascript

    createField(name, value, {options}).

    ```


    You can use it to create a dynamic field `name:property`.


    Note that the `CreateDynamicFields` function is entirely generic – no exact field
    names are stated. It can process any object literal passed to it, extract all
    property names and their values, and create dynamic fields for every property
    it finds.


    Furthermore, modifying employee documents will trigger an index update, and a
    new field will be added to the indexing terms. As an exercise, open employee with
    id `employees/8-A` and expand its Address with the following property:


    ```json

    "Continent": "North America"

    ```


    After saving changes, verify that a new index term collection with the name `Continent`
    has been created.


    Overall, dynamic fields are a tool for creating flexible indexes which can process
    heterogeneous data and, at the same time, adapt to future changes your domain
    model might introduce.


    ## Fanout Index


    Indexes we created so far were processing documents and were creating one indexing
    entry per document. For example, index `Employees/ByFirstName` will take all nine
    employee documents, read their first name, and output one index entry per document.
    Figure [5-12](#514303_1_En_5_Chapter.xhtml#Fig12) shows a summary for this index.


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig12_HTML.png)


    A screenshot of the index employees with a checkbox, employees slash by first
    name, displays 9 entries up to date with normal state, normal priority, and unlocked
    mode.


    Figure 5-12


    Summary for Index `Employees/ByFirstName`


    Summary shows nine entries, one per document. The number of index entries equals
    number of documents in the collection.


    It is possible to write an index which would output not one but multiple entries
    per processed documents. Such index is called *fanout index*. Listing [5-15](#514303_1_En_5_Chapter.xhtml#PC38)
    shows an example of such index.


    ```javascript

    map(''Orders'', order => {

    var res = [];

    order.Lines.forEach(l => {

    res.push({

    ProductName: l.ProductName

    })

    });

    return res;

    })

    Listing 5-15

    Orders/ByProductName index

    ```


    Fanout indexes can produce dozens, even hundreds, of entries per document. Index
    in Listing [5-15](#514303_1_En_5_Chapter.xhtml#PC38) iterates over all lines in
    every order and creates one indexing entry for each line. Every such entry contains
    a product name. Hence, for every order document, the index will create as many
    entries as there are order lines.


    You are now able to find all orders containing the line with a specified product
    name:


    ```rql

    from index ''Orders/ByProductName'' where ProductName = ''chocolade''

    ```


    Figure [5-13](#514303_1_En_5_Chapter.xhtml#Fig13) shows that inspecting indexing
    entries for a specific order can reveal all of its entries and help you understand
    the fanout principle.


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig13_HTML.png)


    A screenshot displays a query from index orders slash by product name where i
    d = orders slash 154-a. The results panel has a table with 3 columns namely preview,
    product name, and i d and delete documents button.


    Figure 5-13


    Indexing Entries for `Orders/154-a`


    Going back to the index overview, you will see that this index contains 2,155
    entries for 830 processed orders.


    In the same manner, you can index all documents with embedded values.


    ## Multi-Map Index


    Up to this point, all indexes we defined were processing a single collection,
    loading properties of its documents, and extracting their values into indexing
    entries. However, it is not uncommon for documents in different collections to
    have the same properties. A typical example of this would be an address – in our
    sample dataset, `Employees`, `Companies`, and `Suppliers` all have this property.


    Both `Companies` and `Suppliers` are legal entities, and it is not hard to imagine
    a business scenario where you would like to search both of them by city. One possible
    solution would to create `Companies/ByCity` and `Suppliers/ByCity` indexes. However,
    you would have to perform two searches to get total results:


    ```rql

    from index ''Companies/ByCity'' where City = ''paris''

    from index ''Suppliers/ByCity'' where City = ''paris''

    ```


    RavenDB provides a way to merge these two indexes into one. Such an index is called
    the *multi-map index*.


    For our scenario, defining such an index is not harder than defining a single-map
    index. First, you need to choose a name. Since two collections are scanned, you
    can go with a name that uses business functionality description instead of collection
    names, such as `Search/ByCity`. Listing [5-16](#514303_1_En_5_Chapter.xhtml#PC41)
    shows the definition of this index.


    ```javascript

    map("Companies", company => {

    return {

    City: company.Address.City

    }

    })

    map("Suppliers", supplier => {

    return {

    City: supplier.Address.City

    }

    })

    Listing 5-16

    Search/ByCity Index

    ```


    You will add the first map as you usually do. Then, click on Add map button. One
    more text area will open so that you can add a second map definition. Your multi-map
    index is ready for querying, as shown in Figure [5-14](#514303_1_En_5_Chapter.xhtml#Fig14).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig14_HTML.png)


    A screenshot displays a query from index search slash by city where city = paris.
    The results panel has a table with 7 columns, preview, i d, name, external I d,
    contact, address, and phone number, and delete documents button.


    Figure 5-14


    Querying Multi-Map `Search/ByCity` Index


    The results you got are all companies and suppliers located in Paris.


    You can expand this index with one more map that would process `Employees`. We
    will leave this as an exercise for you.'
