  trans: '

    ## 排名


    为了让全文搜索结果对用户有帮助，并让应用程序的用户满意，最相关的结果应排在最前面，其次是相关性较低的结果。RavenDB 是如何确定相关性的呢？


    让我们看一些例子。


    运行查询


    ```ravendb

    from Employees where search(Address, "Seattle Redmond")

    select Address.City

    ```


    你会看到，来自西雅图的两名员工排在最前面，然后是一名来自雷德蒙德的员工。如果我们改变城市顺序为：


    ```ravendb

    from Employees where search(Address, "Redmond Seattle")

    select Address.City

    ```


    你会注意到结果与前一个查询相比排序相反，遵循了搜索词的顺序——首先是来自雷德蒙德的员工，然后是来自西雅图的两名员工。


    如你所见，这种排序并非随机。RavenDB 根据相关性对搜索结果进行排序，因此用户更有可能在列表顶部看到更相关的结果。当搜索“Redmond Seattle”时，RavenDB
    会认为第一个搜索词比第二个更重要，因此来自雷德蒙德的员工会排在来自西雅图的员工之前。你可以像在代码清单 7-3 中那样，引入额外的搜索词。


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    select Address.City

    ```

    代码清单 7-3

    搜索多个词


    此查询将把伦敦的员工排在最前，然后是西雅图的员工，最后任何雷德蒙德的员工将位于列表底部。


    对于每一个全文搜索匹配项，RavenDB 都会计算索引评分，并用它来确定结果的排名。该评分包含在每个搜索结果 `@metadata` 中的 `@index-score`
    属性里。你可以通过预览代码清单 7-3 中查询的任意结果来检查它，如图 7-4 所示。`@index-score` 是 `@metadata` 的最后一个属性。


    ![](img/514303_1_En_7_Fig4_HTML.png)


    用于计算文档 employee/4-A 的索引评分的算法。标记的查询包括 address city、metadata、flags、identification、last-modified、change-vector、projection
    和 index-score。


    图 7-4

    位于元数据内的索引评分


    `@index-score` 值越大，结果的相关性就越强。索引评分通过 `score()` 函数暴露出来。因此，代码清单 7-3 中的查询在功能上等同于以下查询：


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    order by score() desc

    select Address.City

    ```


    如果需要，你可以使用 `score()` 函数来反转排名，先显示最不相关的结果：


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    order by score() asc

    select Address.City

    ```


    RavenDB 还可以向你详细解释它是如何计算评分的。在查询中包含 `explanations()` 函数，如下所示：


    ```ravendb

    from Employees where search(Address, "Redmond Seattle")

    select Address.City

    include explanations()

    ```


    这次，查询结果会伴随着排名评分显示在一个额外的选项卡中，如图 7-5 所示。


    ![](img/514303_1_En_7_Fig5_HTML.png)


    用于计算员工排名评分的算法。标记的索引包括 show、identification 和 explanation。ID 分别为 employees/4-A、employees/8-A
    和 employees/1-A。


    图 7-5

    包含排名评分的“解释”列


    点击 *Show* 图标将为你提供索引评分如何计算的详细解释，如图 7-6 所示。


    ![](img/514303_1_En_7_Fig6_HTML.jpg)


    一个描绘了 employees/4-A 索引评分详细解释的算法图。


    图 7-6

    索引评分的详细解释


    这种分解有助于你确定特定结果排序方式的原因。

    '
- fmt: '## Boosting


    并非所有搜索词都生而平等。有时，你希望赋予特定搜索词比其他词更高的权重。提升（Boosting）是一个改变权重因子的过程，使你能够使某些搜索词相比其他词更具相关性。正如我们在前一节看到的，RavenDB
    会为每个词分配一个权重因子，并用它来计算每个匹配文档的索引分数。


    每个搜索词也可以关联一个提升因子（boosting factor）。提升因子越高，搜索词的相关性就越强。此功能可以提高结果的准确性，对文档进行排序，使更相关的文档位于结果列表的顶部。


    例如，你可能搜索巴黎、伦敦或西雅图的公司，但优先考虑巴黎，然后是伦敦，最后是西雅图。要编写这样的查询，你可以利用`boost()`函数，它接受提升因子作为第二个参数，如代码清单
    [7-4](#514303_1_En_7_Chapter.xhtml#PC27) 所示。


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    Listing 7-4

    应用了 boost() 函数的全文搜索查询

    ```


    执行代码清单 [7-4](#514303_1_En_7_Chapter.xhtml#PC27) 中的查询后，RavenDB 将返回来自这三个城市的公司，排序如图
    [7-7](#514303_1_En_7_Chapter.xhtml#Fig7) 所示。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig7_HTML.jpg)


    一个包含9家公司的结果表格。标签列是预览、标识和地址/城市。这些公司和地址是：57-A、74-A 为巴黎；4-A、11-A、16-A、19-A、53-A、72-A
    为伦敦；89-A 为西雅图。


    图 7-7


    使用`boost()`函数修改的结果排序


    你可以扩展代码清单 [7-4](#514303_1_En_7_Chapter.xhtml#PC27) 中的查询，加入解释说明，如代码清单 [7-5](#514303_1_En_7_Chapter.xhtml#PC28)
    所示。


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    include explanations()

    Listing 7-5

    包含解释说明的提升查询

    ```


    通过这样一个扩展查询，你将能够看到分数概览，如图 [7-8](#514303_1_En_7_Chapter.xhtml#Fig8) 所示。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig8_HTML.png)


    一个展示了9家公司计算分数的解释选项卡的图示。标签列显示索引、标识和解释。


    图 7-8


    带有计算分数的解释选项卡


    你可以点击“显示”图标，进一步查看这些分数是如何计算出来的。


    利用提升的另一种可能性是使特定字段更具相关性。例如，我们可能需要定位所有具有管理能力的员工。一个很好的搜索候选是 `Title` 和 `Notes` 字段。然而，这两个字段有本质的不同——`Title`
    包含当前在公司的职位，而 `Notes` 包含员工的描述，可能提及各种技能和之前的工作。当前担任管理职位的员工比过去有行政职能的员工更相关。


    因此，我们可以在代码清单 [7-6](#514303_1_En_7_Chapter.xhtml#PC29) 的查询中表达这一点。


    ```

    from "Employees"

    where boost(search(Title, ''manager''), 2)

    or search(Notes, ''manager'')

    Listing 7-6

    Title 字段相对于 Notes 字段的提升

    ```


    执行结果如图 [7-9](#514303_1_En_7_Chapter.xhtml#Fig9) 所示。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig9_HTML.jpg)


    一个展示了员工查询执行结果的图示。标签列是预览、标识、姓氏、名字、职称和备注。


    图 7-9


    提升 Title 字段 over Notes 字段的结果


    如你所见，Steven 的排名高于 Andrew，因为他的 `Title` 字段中有 Manager 这个词。使用这种方法，你可以微调排名并提供更好的准确性。


    ## Static Index: One Field


    通过从自动索引切换到静态索引，我们可以更深入地控制索引过程。你已经在第 [5](#514303_1_En_5_Chapter.xhtml) 章和第 [6](#514303_1_En_6_Chapter.xhtml)
    章学习了如何创建静态索引。代码清单 [7-7](#514303_1_En_7_Chapter.xhtml#PC30) 展示了一个用于搜索产品名称的简单索引。


    ```

    map("Products", function(product) {

    return {

    Name: product.Name

    }

    })

    Listing 7-7

    Products/ByName 索引

    ```


    在保存此新索引的定义之前，你还需要执行一个步骤——指定 `Name` 不是一个普通字段，而是一个全文搜索字段。你需要将索引字段 `Name` 标记为将被视为全文搜索字段的字段。


    点击 `Add field` 按钮。字段定义面板将打开。在名称栏填写 `Name`，并将 `Full-Text Search` 属性切换到 `Yes`。如你在图
    [7-10](#514303_1_En_7_Chapter.xhtml#Fig10) 中所见，在高级选项中，有一个 Analyzer 属性，其中包含 `Standard
    Analyzer` 作为全文搜索字段的默认分析器。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig10_HTML.png)


    一个字段选项表格。标签列是名称、存储、高亮显示、空间、高级、词向量、分析器、全文搜索、建议和索引。


    图 7-10


    字段选项


    保存此新索引的定义后，RavenDB 将处理 `Products` 集合中的所有文档，提取其 `Name` 属性的值，并应用 `Standard Analyzer`
    对产品名称进行分词。你可以在图 [7-11](#514303_1_En_7_Chapter.xhtml#Fig11) 中看到索引项。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig11_HTML.png)


    一个展示了产品和名称的标准分析器索引项的表格。该索引处理了16个产品。


    图 7-11


    标准分析器索引项


    查看产品的原始索引条目，你可以观察到标准分析器为每个产品生成的标记数组，如图 [7-12](#514303_1_En_7_Chapter.xhtml#Fig12)
    所示。


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig12_HTML.png)


    一个展示了原始索引条目的图示。标签列是缓存已启用、不创建新的自动索引、仅显示已存储的索引字段、显示原始索引条目而非匹配文档，以及忽略索引查询大小限制。


    图 7-12


    原始索引条目


    我们现在可以搜索所有拉格啤酒：


    ```

    from index ''Products/ByName''

    where search(Name, "lager")

    ```


    所有以 `cha` 开头的产品名称


    ```

    from index ''Products/ByName''

    where search(Name, "cha*")

    ```


    或名称中任何单词以 `ra` 结尾的产品


    ```

    from index ''Products/ByName''

    where search(Name, "*ra")

    ```'
  raw: '## Boosting


    Not all search terms are created equal. Sometimes, you would like to value specific
    search terms more than others. Boosting is a process of altering weight factors
    – so you will be able to make some search terms more relevant compared to others.
    As we saw in a previous section, RavenDB will assign a weight factor to each word
    and use it to calculate the index score for every matched document.


    Each search term can also be associated with a boosting factor. The higher the
    boost factor, the more relevant the search term will be. This feature can improve
    the accuracy of the results, ordering documents so that more relevant ones are
    at the top of the result list.


    For example, you might search for companies in Paris, London, or Seattle but prioritize
    Paris over two other cities and London over Seattle. To write such a query, you
    can leverage the `boost()` function , which accepts boosting factor as a second
    argument, as shown in Listing [7-4](#514303_1_En_7_Chapter.xhtml#PC27).


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    Listing 7-4

    Full-text search query with boost() function applied

    ```


    After executing the query from Listing [7-4](#514303_1_En_7_Chapter.xhtml#PC27),
    RavenDB will return companies from these three cities, ranking as in Figure [7-7](#514303_1_En_7_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig7_HTML.jpg)


    A table of results for the 9 companies. The labeled index is the preview, identification,
    and address/city. The companies and addresses are 57-A, 74-A as Paris, 4-A,11-A,
    16-A,19-A, 53-A, and 72-A as London, and 89-A as Seattle.


    Figure 7-7


    Result Ordering Modified with boost() Function


    You can expand the query from Listing [7-4](#514303_1_En_7_Chapter.xhtml#PC27)
    with explanations, as shown in Listing [7-5](#514303_1_En_7_Chapter.xhtml#PC28).


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    include explanations()

    Listing 7-5

    Boosting query with included explanations

    ```


    With such an expanded query, you will have an overview of scores visible in Figure
    [7-8](#514303_1_En_7_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig8_HTML.png)


    An algorithm depicts the explanation tab with computed scores for 9 companies.
    The labeled index are show, identification, and explanation.


    Figure 7-8


    Explanation Tab with Computed Scores


    You can click on the Show icon for a further breakdown of how these scores were
    calculated .


    One more possibility to leverage boosting is to make specific fields more relevant.
    For example, we might need to locate all employees with managerial capabilities.
    A good candidate for searching is *Title* and *Notes* field. However, these two
    fields are substantially different – while Title contains a current position with
    the company, Notes contains an employee’s description that may mention various
    skills and previous jobs. Employees in current managerial positions are more relevant
    than those with administrative functions in the past .


    Hence, we can express that in a query from Listing [7-6](#514303_1_En_7_Chapter.xhtml#PC29).


    ```

    from "Employees"

    where boost(search(Title, ''manager''), 2)

    or search(Notes, ''manager'')

    Listing 7-6

    Boosting of Title over Notes

    ```


    Results of execution are visible in Figure [7-9](#514303_1_En_7_Chapter.xhtml#Fig9).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig9_HTML.jpg)


    An algorithm depicts the results of the execution of employees. The labeled index
    are preview, identification, last name, first name, title, and notes.


    Figure 7-9


    Results of Boosting Title over Notes


    As you can see, Steven is ranked higher than Andrew since he has the word Manager
    in the Title field. Using this approach, you can fine-tune ranking and provide
    better accuracy.


    ## Static Index: One Field


    We can take more control over the indexing process by switching from automatic
    indexes to static ones. You already learned how to create static indexes in Chapters
    [5](#514303_1_En_5_Chapter.xhtml) and [6](#514303_1_En_6_Chapter.xhtml). Listing
    [7-7](#514303_1_En_7_Chapter.xhtml#PC30) shows a simple index for searching over
    product names.


    ```

    map("Products", function(product) {

    return {

    Name: product.Name

    }

    })

    Listing 7-7

    Products/ByName index

    ```


    Before saving the definition of this new index, there is one more step you need
    to take – specifying that Name is not an ordinary field but a full-text search
    field. You need to mark the index field *Name* as a field that will be treated
    as a full-text search field.


    Click on the *Add field* button. The field definition panel will open. Populate
    *Name* as the name on the field, and switch the *Full-Text Search* property to
    *Yes*. As you can see in Figure [7-10](#514303_1_En_7_Chapter.xhtml#Fig10), among
    Advanced options, there is an Analyzer property that contains *Standard Analyzer*
    as a default analyzer for full-text search fields .


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig10_HTML.png)


    A table of field options. The labeled field is name, store, highlighting, spatial,
    advanced, term vector, analyzer, full-text search, suggestions, and indexing.


    Figure 7-10


    Field Options


    After saving the definition of this new index, RavenDB will process all documents
    from the Products collection, extract the value of their Name property, and apply
    Standard Analyzer to tokenize product names. You can see index terms in Figure
    [7-11](#514303_1_En_7_Chapter.xhtml#Fig11).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig11_HTML.png)


    A table of the standard analyzer index terms for products and names. The index
    process 16 products.


    Figure 7-11


    Standard Analyzer Index Terms


    Looking at raw index entries for products, you can observe an array of tokens
    generated for every product by Standard Analyzer, as shown in Figure [7-12](#514303_1_En_7_Chapter.xhtml#Fig12).


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig12_HTML.png)


    An algorithm depicts raw index entries. The labeled entries are cache enabled,
    don''t create a new auto-index, show stored index field only, show raw index entries
    instead of matching documents, and ignore the index query size limit.


    Figure 7-12


    Raw Index Entries


    We can now search for all lager beers:


    ```

    from index ''Products/ByName''

    where search(Name, "lager")

    ```


    all product names starting with *cha*


    ```

    from index ''Products/ByName''

    where search(Name, "cha*")

    ```


    or product names where any of the words end up with *ra*


    ```

    from index ''Products/ByName''

    where search(Name, "*ra")

    ```'
  trans: '

    ## 权重提升


    并非所有搜索词都生而平等。有时，你希望赋予特定搜索词比其他词更高的权重。**权重提升**是一个改变权重因子的过程，使你能够使某些搜索词相比其他词更具相关性。正如我们在前一节看到的，RavenDB
    会为每个词分配一个权重因子，并用它来计算每个匹配文档的索引分数。


    每个搜索词也可以关联一个**提升因子**。提升因子越高，搜索词的相关性就越强。此功能可以提高结果的准确性，对文档进行排序，使更相关的文档位于结果列表的顶部。


    例如，你可能搜索巴黎、伦敦或西雅图的公司，但优先考虑巴黎，然后是伦敦，最后是西雅图。要编写这样的查询，你可以利用`boost()`函数，它接受提升因子作为第二个参数，如代码清单
    7-4 所示。


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    Listing 7-4

    应用了 boost() 函数的全文搜索查询

    ```


    执行代码清单 7-4 中的查询后，RavenDB 将返回来自这三个城市的公司，排序如图 7-7 所示。


    ![](img/514303_1_En_7_Fig7_HTML.jpg)


    一个包含 9 家公司的结果表格。标签列是预览、标识和地址/城市。这些公司和地址是：57-A、74-A 为巴黎；4-A、11-A、16-A、19-A、53-A、72-A
    为伦敦；89-A 为西雅图。


    图 7-7


    使用`boost()`函数修改的结果排序


    你可以扩展代码清单 7-4 中的查询，加入解释说明，如代码清单 7-5 所示。


    ```

    from Companies

    where

    boost(search(Address.City, ''paris''), 15) or

    boost(search(Address.City, ''london''), 10) or

    boost(search(Address.City, ''seattle''), 5)

    select Address.City

    include explanations()

    Listing 7-5

    包含解释说明的提升查询

    ```


    通过这样一个扩展查询，你将能够看到分数概览，如图 7-8 所示。


    ![](img/514303_1_En_7_Fig8_HTML.png)


    一个展示了 9 家公司计算分数的解释选项卡的图示。标签列显示索引、标识和解释。


    图 7-8


    带有计算分数的解释选项卡


    你可以点击“显示”图标，进一步查看这些分数是如何计算出来的。


    利用提升的另一种可能性是使特定字段更具相关性。例如，我们可能需要定位所有具有管理能力的员工。一个很好的搜索候选是 `Title` 和 `Notes` 字段。然而，这两个字段有本质的不同——`Title`
    包含当前在公司的职位，而 `Notes` 包含员工的描述，可能提及各种技能和之前的工作。当前担任管理职位的员工比过去有行政职能的员工更相关。


    因此，我们可以在代码清单 7-6 的查询中表达这一点。


    ```

    from "Employees"

    where boost(search(Title, ''manager''), 2)

    or search(Notes, ''manager'')

    Listing 7-6

    Title 字段相对于 Notes 字段的提升

    ```


    执行结果如图 7-9 所示。


    ![](img/514303_1_En_7_Fig9_HTML.jpg)


    一个展示了员工查询执行结果的图示。标签列是预览、标识、姓氏、名字、职称和备注。


    图 7-9


    提升 Title 字段 over Notes 字段的结果


    如你所见，Steven 的排名高于 Andrew，因为他的 `Title` 字段中有 Manager 这个词。使用这种方法，你可以微调排名并提供更好的准确性。


    ## 静态索引：单字段


    通过从自动索引切换到静态索引，我们可以更深入地控制索引过程。你已经在第 5 章和第 6 章学习了如何创建静态索引。代码清单 7-7 展示了一个用于搜索产品名称的简单索引。


    ```

    map("Products", function(product) {

    return {

    Name: product.Name

    }

    })

    Listing 7-7

    Products/ByName 索引

    ```


    在保存此新索引的定义之前，你还需要执行一个步骤——指定 `Name` 不是一个普通字段，而是一个全文搜索字段。你需要将索引字段 `Name` 标记为将被视为全文搜索字段的字段。


    点击 `Add field` 按钮。字段定义面板将打开。在名称栏填写 `Name`，并将 `Full-Text Search` 属性切换到 `Yes`。如你在图
    7-10 中所见，在高级选项中，有一个 Analyzer 属性，其中包含 `Standard Analyzer` 作为全文搜索字段的默认分析器。


    ![](img/514303_1_En_7_Fig10_HTML.png)


    一个字段选项表格。标签列是名称、存储、高亮显示、空间、高级、词向量、分析器、全文搜索、建议和索引。


    图 7-10


    字段选项


    保存此新索引的定义后，RavenDB 将处理 `Products` 集合中的所有文档，提取其 `Name` 属性的值，并应用 `Standard Analyzer`
    对产品名称进行分词。你可以在图 7-11 中看到索引项。


    ![](img/514303_1_En_7_Fig11_HTML.png)


    一个展示了产品和名称的标准分析器索引项的表格。该索引处理了 16 个产品。


    图 7-11


    标准分析器索引项


    查看产品的原始索引条目，你可以观察到标准分析器为每个产品生成的标记数组，如图 7-12 所示。


    ![](img/514303_1_En_7_Fig12_HTML.png)


    一个展示了原始索引条目的图示。标签列是缓存已启用、不创建新的自动索引、仅显示已存储的索引字段、显示原始索引条目而非匹配文档，以及忽略索引查询大小限制。


    图 7-12


    原始索引条目


    我们现在可以搜索所有拉格啤酒：


    ```

    from index ''Products/ByName''

    where search(Name, "lager")

    ```


    所有以 `cha` 开头的产品名称


    ```

    from index ''Products/ByName''

    where search(Name, "cha*")

    ```


    或名称中任何单词以 `ra` 结尾的产品


    ```

    from index ''Products/ByName''

    where search(Name, "*ra")

    ```

    '
- fmt: '# Static Index: Different Analyzers


    In one of the previous sections, we mentioned that using wildcard prefixes can
    have a significant impact on performance. The static index gives us total flexibility,
    so we can configure the indexing process to overcome challenges like this.


    One possible solution would be to alter the way index terms are calculated. We
    can change tokenization - instead of `Standard Analyzer`, we can use `NGram Analyzer`.


    But what does the word `NGram` means? `NGram` is a sliding window that moves across
    the text and produces tokens of the specified length. For example, word "brown"
    can be split into the following 3-grams: `[bro], [row], [own]`. Similarly, applying
    2-grams tokenization to "jumps" results in stream `[ju], [um], [mp], [ps]`.


    `NGram` tokenizer available in RavenDB will slide windows of sizes 2, 3, 4, 5,
    and 6 to produce tokens of various sizes. Along with this tokenizer, the `NGram
    analyzer` will use `StopWords` and `Lowercase` filters.


    For example, for sentence:


    *The quick brown fox jumped over the lazy dogs.*


    `NGram analyzer` will produce the following 3-grams:


    ```

    [azy] [bro] [dog] [fox] [ick] [jum] [laz] [mpe] [ogs] [ove] [own] [ped] [qui]
    [row] [uic] [ump] [ver]

    ```


    The `StopWords` filter will eliminate two occurrences of "the" and the full stop.


    You can now open the index `Products/ByName` defined in the previous section and
    change this index’s analyzer. Scroll down to Fields and locate settings for the
    `Name` field. Click on `Standard Analyzer`, and you will be presented with a predefined
    list of analyzers, as shown in Figure 7-13.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig13_HTML.jpg)


    An index depicts changing index analyzer. The labeled analyzer are keyword, lowercase
    whitespace, N-gram, simple, standard, stop, and whitespace analyzer.


    **Figure 7-13: Changing Index Analyzer**


    After selecting `NGram Analyzer`, save redefined index.


    Since you changed the definition of the index, RavenDB will build it from scratch
    by reading all documents from the `Products` collection, passing them through
    `NGram Analyzer`, and populating index terms. Figure 7-14 shows how index terms
    look now.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig14_HTML.png)


    A table of the N-gram index terms for the products and names. There are 16 labeled
    terms.


    **Figure 7-14: NGram Index Terms**


    These index terms are different compared with tokens generated by `Standard Analyzer`.
    Index terms produced by the `NGram analyzer` are the union of 2-grams, 3-grams,
    4-grams, 5-grams, and 6-grams over product names.


    Finally, with the updated version of the `Products/ByName` index, we can replace
    the wildcard query:


    ```

    from index ''Products/ByName''

    where search(Name, ''*late*'')

    ```


    with wildcard-free variant


    ```

    from index ''Products/ByName''

    where search(Name, ''late'')

    ```


    which will return the same result set but without any performance penalties.


    # Static Index: Multiple Fields


    We defined and configured an index covering just one field in the previous two
    sections. This section will show how you can expand it to process multiple fields
    from documents belonging to one or more collections.


    ## Indexing Property from Multiple Collections


    We can expand `Products/ByName` into an index that will provide a way to search
    not only products by name but also `Suppliers` and `Companies` by name. This way,
    we will create one index that will cover the content of the documents from three
    collections.


    Start by cloning the `Products/ByName` index – click the `Clone` button and change
    the name to `Search/ByName`.


    Add the following two maps:


    ```

    map("Companies", function(company) {

    return {

    Name: company.Name

    }

    })

    ```


    and


    ```

    map("Suppliers", function(supplier) {

    return {

    Name: supplier.Name

    }

    })

    ```


    After you are done, the index definition will look as in Figure 7-15.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig15_HTML.png)


    Three algorithms depict the index definition of the product, companies, and suppliers.
    The labeled fields are index name, search/by name, deployment mode, and maps.


    **Figure 7-15: Search/ByName Index**


    Since we started by cloning the existing index `Products/ByName`, your newly created
    index supports full-text indexing on the `Name` field out of the box.


    Now you can execute search queries that will span content from three collections.


    Searching for


    ```

    from index ''Search/ByName''

    where search(Name, "cho")

    ```


    will return products and companies with `cho` trigram in the `Name`, as shown
    in Figure 7-16.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig16_HTML.png)


    A table depicts the search results consisting of products and companies. The labeled
    index are preview, identification, name, supplier, category, and quality per unit.


    **Figure 7-16: Search Results Consisting of Products and Companies**


    Similarly, the following query


    ```

    from index ''Search/ByName''

    where search(Name, "ost")

    ```


    will return products, companies, and suppliers with 3-gram `ost` in the `Name`
    field.


    ## Indexing Multiple Fields from a Single Collection


    It can be handy to provide a way to index (and later search) multiple properties
    of the documents from the same collection. When coding static indexes, you can
    construct an array that will hold several values. RavenDB will correctly process
    such arrays, creating multiple index terms per document.


    Listing 7-8 shows an implementation of one such index. Do not forget to configure
    the `Query` field as a full-text search field.


    ```

    map("Employees", function(employee) {

    return {

    Query: [employee.FirstName, employee.LastName]

    }

    })

    ```


    **Listing 7-8: `Employees/ByFirstNameByLastName` index**


    Figure 7-17 shows that first and last names are extracted and inserted as index
    terms.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig17_HTML.png)


    A table of the first and last names is extracted and inserted as index terms of
    the employees.


    **Figure 7-17: Indexing Terms Consisting of First and Last Names of Employees**


    With this index, you are now able to search by the first name:


    ```

    from index ''Employees/ByFirstNameByLastName''

    where search(Query, "Andrew")

    ```


    or by the last name.


    ```

    from index ''Employees/ByFirstNameByLastName''

    where search(Query, "fuller")

    ```'
