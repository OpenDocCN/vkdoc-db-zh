  trans: '## 存储字段


    在前一章中，我们介绍了不同类型的索引：非聚集索引（仅保存文档引用）、聚集索引（存储整个文档）和覆盖索引（包含一组选定的字段）。到目前为止，本章中我们开发的静态索引都是非聚集索引。你可以通过运行以下查询轻松检查到这一点：


    ```

    from index ''Employees/ByFirstNameByLastName''

    ```


    获取员工文档后，点击 `Settings` 并选择选项 `Show stored index fields only`。你将得到如图 5-6 所示的结果。


    ![](img/514303_1_En_5_Fig6_HTML.png)


    一张截图展示了一个查询、一个包含 3 个切换按钮中启用了 2 个的设置菜单、搜索查询以及保存和播放按钮。结果面板在预览存储的索引字段时显示无数据。


    **图 5-6**


    索引 `Employees/ByFirstNameByLastName` 无存储字段


    如你所见，索引不包含任何存储字段。因此，当你运行带有投影的查询时


    ```

    from index ''Employees/ByFirstNameByLastName''

    where FirstName = ''Nancy''

    select FirstName, LastName

    ```


    数据库引擎将首先根据索引执行过滤，得到单个 ID `employees/1-A`。之后，引擎将再进行一次存储往返以获取该文档并读取其 `FirstName`
    和 `LastName` 属性。


    你可以通过指示 RavenDB 存储特定字段，将非聚集索引转换为覆盖索引。返回索引编辑表单并查看屏幕底部，你可以在图 5-7 中看到 `Fields` 选项卡。


    ![](img/514303_1_En_5_Fig7_HTML.png)


    一张包含 2 个部分的截图：包含 6 行语法和按钮“添加映射”以及“添加归约”的映射部分；包含 4 个选项卡和“添加字段”、“添加默认字段”按钮的归约部分（位于“字段”选项卡中）。


    **图 5-7**


    编辑索引页面上的字段选项卡


    此选项卡显示没有字段添加到索引。通过点击 `Add field` 按钮添加字段 `FirstName` 和 `LastName`，填入它们的名称，并在 `Store`
    选项中选择值 `Yes`，如图 5-8 所示。


    ![](img/514303_1_En_5_Fig8_HTML.png)


    一张包含 4 个选项卡的截图，分别是字段、配置、附加程序集和附加源。“字段”选项卡有 2 个按钮：“添加字段”和“添加默认字段选项”，用于在姓氏和名字下添加详情。


    **图 5-8**


    在索引中添加 `FirstName` 和 `LastName` 作为存储字段


    保存更改后的索引定义后，重复图 5-6 中的查询将显示索引 `Employees/ByFirstNameByLastName` 的存储字段，如图 5-9 所示。


    ![](img/514303_1_En_5_Fig9_HTML.png)


    一张截图展示了一个查询、一个包含 3 个切换按钮中启用了 2 个的设置下拉框、搜索查询、保存、播放和删除文档按钮。结果面板显示了一个包含 4 列的表格。


    **图 5-9**


    索引 `Employees/ByFirstNameByLastName` 的存储字段


    由于你刚刚所做的更改，数据库引擎将能够仅通过一次存储往返就创建出由 `FirstName` 和 `LastName` 组成的投影。通过过滤操作获取的索引条目将包含这两个字段，并且这些字段将立即可用。


    我们已经提到，覆盖索引是一个很好的折中方案，因为它们产生结果所需的往返次数更少，但同时又不存储完整的文档。借助 RavenDB Studio，你现在可以检查所有索引和集合的实际分配存储。通过点击左侧边缘的
    `Stats` 图标，然后选择 `Storage report`，你将能够检查分配详情，如图 5-10 所示。


    ![](img/514303_1_En_5_Fig10_HTML.png)


    存储报告的截图，显示了点击统计信息图标时索引存储的分配详情和各个字段。


    **图 5-10**


    存储报告


    你可以向索引存储中添加或移除各种字段，并在 `Storage report` 中检查你更改的影响。'
- fmt: "## Computed Fields\n\nSo far, you have created several static indexes that\
    \ include the value of the fields. In some cases, like the `Employees/ByFirstName`\
    \ index, the field value is read directly from processed documents. In others,\
    \ like `Orders/ByEmployeeName`, a referenced document was loaded, and then the\
    \ content of its field was indexed.\n\nHowever, it is also possible to create\
    \ index fields containing a value that does not exist in any documents. Such fields\
    \ are called computed fields. We usually calculate their value based on one or\
    \ more other fields.\n\nExample of an index with computed field is shown in Listing\
    \ 5-9.\n\n```javascript\nmap(\"Orders\", order => {\n    var employee = load(order.Employee,\
    \ 'Employees');\n    var total = 0;\n    for (var i = 0; i < order.Lines.length;\
    \ i++) {\n        var line = order.Lines[i];\n        total += line.Quantity *\
    \ line.PricePerUnit * (1 - line.Discount);\n    }\n    return {\n        EmployeeName:\
    \ employee.FirstName,\n        Total: total\n    }\n})\n```\nListing 5-9\nIndex\
    \ `Orders/ByEmployeeNameByTotal` with Computed Field `Total`\n\nIndex defined\
    \ in Listing 5-9 is based on `Orders/ByEmployeeName` but expanded with field `Total`.\
    \ Its value represents total monetary value of the order, and it is computed in\
    \ the following way :\n\n```javascript\nvar total = 0;\nfor (var i = 0; i < order.Lines.length;\
    \ i++) {\n    var line = order.Lines[i];\n    total += line.Quantity * line.PricePerUnit\
    \ * (1 - line.Discount);\n}\n```\n\nThis is a relatively standard piece of imperative\
    \ JS code. It iterates over `order.Lines` array, and for every line, the total\
    \ is `quantity * price * (1 – discount)`. Line totals are accumulated, and after\
    \ lines are processed, variable `total` holds calculated total for Order.\n\n\
    You can use all features of JavaScript languages, like loops, functions, etc.\
    \ You can even extract code into JS functions that will be called from the `map`\
    \ function of an index, as shown in Listing 5-10.\n\n```javascript\nfunction GetTotal(order)\
    \ {\n    var total = 0;\n    for (var i = 0; i < order.Lines.length; i++) {\n\
    \        var line = order.Lines[i];\n        total += line.Quantity * line.PricePerUnit\
    \ * (1 - line.Discount);\n    }\n    return total;\n}\n\nmap(\"Orders\", order\
    \ => {\n    var employee = load(order.Employee, 'Employees');\n    return {\n\
    \        EmployeeName: employee.FirstName,\n        Total: GetTotal(order)\n \
    \   }\n})\n```\nListing 5-10\nIndex `Orders/ByEmployeeNameByTotal` with functionality\
    \ extracted into JS function\n\nIt is also possible to use declarative style of\
    \ JS, as shown in Listing 5-11.\n\n```javascript\nfunction GetTotal(order) {\n\
    \    return order.Lines.reduce((partial_sum, l) => partial_sum + (l.Quantity *\
    \ l.PricePerUnit) * (1 - l.Discount), 0)\n}\n\nmap(\"Orders\", order => {\n  \
    \  var employee = load(order.Employee, 'Employees');\n    return {\n        EmployeeName:\
    \ employee.FirstName,\n        Total: GetTotal(order)\n    }\n})\n```\nListing\
    \ 5-11\nIndex `Orders/ByEmployeeNameByTotal` with declarative-style JS function\n\
    \nIt is also possible to embed business logic and business rules of your domain\
    \ into index. Listing 5-12 gives one such example .\n\n```javascript\nfunction\
    \ GetTotal(order) {\n    var total = 0;\n    for (var i = 0; i < order.Lines.length;\
    \ i++) {\n        var line = order.Lines[i];\n        var discount = line.Discount;\n\
    \        // Apply an extra 10% discount for Poland\n        if (order.ShipTo.Country\
    \ === \"Poland\") {\n            discount += 0.1;\n        }\n        total +=\
    \ line.Quantity * line.PricePerUnit * (1 - discount);\n    }\n    return total;\n\
    }\n\nmap(\"Orders\", order => {\n    var employee = load(order.Employee, 'Employees');\n\
    \    return {\n        EmployeeName: employee.FirstName,\n        Total: GetTotal(order)\n\
    \    }\n})\n```\nListing 5-12\nIndex `Orders/ByEmployeeNameByTotal` expanded with\
    \ business rules\n\nWe are giving a 10% discount to orders shipped to Poland,\
    \ and that rule is embedded into the index as part of a computed field calculation\
    \ .\n\nHence, now you can execute a query:\n\n```javascript\nfrom index 'Orders/ByEmployeeNameByTotal'\n\
    where Total > 15000\n```\n\nto get all orders with a total monetary value of over\
    \ 15,000.\n\nSo, with computed fields, you can create new properties calculated\
    \ on existing properties with the application of possibly very complex logic.\
    \ You can offload a significant portion of your business logic to a database if\
    \ needed .\n\n## Dynamic Fields\n\nAs we mentioned earlier, RavenDB is a schemaless\
    \ database. You do not have to define schema upfront, and you will be able to\
    \ accept various semi-structured or even unstructured data. The moment you know\
    \ least about your domain is the very moment when the project starts. The ability\
    \ to postpone decisions about data structures you will use is a significant advantage.\
    \ It will not just speed up development, but it will also provide much-needed\
    \ flexibility as additional requirements arrive along the way of implementation\
    \ and inevitably after you launch your product .\n\nIn other cases, you have very\
    \ well-defined requirements, but the data you need to store inside a database\
    \ is inherently heterogeneous. A typical situation is a need for globalization\
    \ of your application. Expanding your business to a new part of the world often\
    \ means learning about concepts you forgot to cover and modifying your application\
    \ and database to take them into account.\n\nTake the concept of an address as\
    \ an example. Various countries around the world have different ways of addressing\
    \ locations. It is enough to read multiple administrative division terms for countries\
    \ worldwide – state, county, province, district, prefecture, emirate, canton,\
    \ municipality, circuit, raion , oblast – to comprehend the full complexity of\
    \ modeling such heterogeneous data.\n\nSchemaless JSON as a data format for your\
    \ documents in RavenDB will provide you with much-needed flexibility for expanding\
    \ entities that you store. However, you need to propagate these changes to queries\
    \ and the application itself. And, since queries are using indexes, you will also\
    \ have to expand the RavenDB index definition. Once it’s changed, this will trigger\
    \ recomputation of the whole index, which can be both computation-heavy and time-consuming.\n\
    \nRavenDB provides a handy solution for situations like this one in the form of\
    \ dynamic fields . Instead of explicitly stating field names and their values,\
    \ you can programmatically define them. Such an index can accommodate different\
    \ document structures. Also, dynamic fields will prevent complete recalculation\
    \ of the index when a document with new fields arrives at the database. Listing\
    \ 5-13 shows an index with dynamic fields generated for the employee’s address.\n\
    \n```javascript\nfunction CreateDynamicFields(addr) {\n    var ret = [];\n   \
    \ for (const property in addr) {\n        ret.push(createField(property, addr[property],\
    \ { indexing: 'Exact', storage: false, termVector: null }))\n    }\n    return\
    \ ret;\n}\n\nmap(\"Employees\", emp => {\n    return {\n        _: CreateDynamicFields(emp.Address)\n\
    \    }\n})\n```\nListing 5-13\n`Employees/DynamicFields` index\n\nAs you can see\
    \ from the `map` definition, this index is processing all employees and will create\
    \ dynamic fields for their addresses . Listing 5-14 presents one sample address.\n\
    \n```json\n{\n    \"Line1\": \"4726 - 11th Ave. N.E.\",\n    \"Line2\": null,\n\
    \    \"City\": \"Seattle\",\n    \"Region\": \"WA\",\n    \"PostalCode\": \"98105\"\
    ,\n    \"Country\": \"USA\",\n    \"Location\": {\n        \"Latitude\": 47.66416419999999,\n\
    \        \"Longitude\": -122.3160148\n    }\n}\n```\nListing 5-14\nAddress literal\
    \ of employees/8-A\n\nFigure 5-11 shows collections of index terms for addresses\
    \ of this form.\n\n![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig11_HTML.png)\n\
    Figure 5-11\nIndex Terms for `Employees/DynamicFields` Index\n\nEach property\
    \ of the address (like `Line1`, `Line2`, `City`, etc.) is one collection of terms.\
    \ Values of such group are extracted from all occurrences of that property on\
    \ any of the employee documents.\n\nLet’s look at the definition of the index.\
    \ You can see that definition of the dynamic field has a peculiar form:\n\n```javascript\n\
    _: CreateDynamicFields(emp.Address)\n```"
  raw: '## Computed Fields


    So far, you have created several static indexes that include the value of the
    fields. In some cases, like the *Employees/ByFirstName* index, the field value
    is read directly from processed documents. In others, like Orders/ByEmployeeName,
    a referenced document was loaded, and then the content of its field was indexed.


    However, it is also possible to create index fields containing a value that does
    not exist in any documents. Such fields are called *computed fields*. We usually
    calculate their value based on one or more other fields.


    Example of an index with computed field is shown in Listing [5-9](#514303_1_En_5_Chapter.xhtml#PC26).


    ```

    map("Orders", order => {

    var employee = load(order.Employee, ''Employees'');

    var total = 0;

    for (var i = 0; i < order.Lines.length; i++) {

    var line = order.Lines[i];

    total += line.Quantity * line.PricePerUnit * (1 - line.Discount);

    }

    return {

    EmployeeName: employee.FirstName,

    Total: total

    }

    })

    Listing 5-9

    Index Orders/ByEmployeeNameByTotal with Computed Field Total

    ```


    Index defined in Listing [5-9](#514303_1_En_5_Chapter.xhtml#PC26) is based on
    *Orders/ByEmployeeName* but expanded with field *Total*. Its value represents
    total monetary value of the order, and it is computed in the following way :


    ```

    var total = 0;

    for (var i = 0; i < order.Lines.length; i++) {

    var line = order.Lines[i];

    total += line.Quantity * line.PricePerUnit * (1 - line.Discount);

    }

    ```


    This is a relatively standard piece of imperative JS code. It iterates over *Order.Lines*
    array, and for every line, the total is `quantity * price * (1 – discount)`. Line
    totals are accumulated, and after lines are processed, variable *total* holds
    calculated total for Order.


    You can use all features of JavaScript languages, like loops, functions, etc.
    You can even extract code into JS functions that will be called from the *map*
    function of an index, as shown in Listing [5-10](#514303_1_En_5_Chapter.xhtml#PC28).


    ```

    function GetTotal(order) {

    var total = 0;

    for (var i = 0; i  {

    var employee = load(order.Employee, ''Employees'');

    return {

    EmployeeName: employee.FirstName,

    Total: GetTotal(order)

    }

    })

    Listing 5-10

    Index Orders/ByEmployeeNameByTotal with functionality extracted into JS function

    ```


    It is also possible to use declarative style of JS, as shown in Listing [5-11](#514303_1_En_5_Chapter.xhtml#PC29).


    ```

    function GetTotal(order) {

    return order.Lines.reduce((partial_sum, l) => partial_sum + (l.Quantity * l.PricePerUnit)
    * (1 - l.Discount), 0)

    }

    map("Orders", order => {

    var employee = load(order.Employee, ''Employees'');

    return {

    EmployeeName: employee.FirstName,

    Total: GetTotal(order)

    }

    })

    Listing 5-11

    Index Orders/ByEmployeeNameByTotal with declarative-style JS function

    ```


    It is also possible to embed business logic and business rules of your domain
    into index. Listing [5-12](#514303_1_En_5_Chapter.xhtml#PC30) gives one such example
    .


    ```

    function GetTotal(order) {

    var total = 0;

    for (var i = 0; i  {

    var employee = load(order.Employee, ''Employees'');

    return {

    EmployeeName: employee.FirstName,

    Total: GetTotal(order)

    }

    })

    Listing 5-12

    Index Orders/ByEmployeeNameByTotal expanded with business rules

    ```


    We are giving a 10% discount to orders shipped to Poland, and that rule is embedded
    into the index as part of a computed field calculation .


    Hence, now you can execute a query:


    ```

    from index ''Orders/ByEmployeeNameByTotal''

    where Total > 15000

    ```


    to get all orders with a total monetary value of over 15,000.


    So, with computed fields, you can create new properties calculated on existing
    properties with the application of possibly very complex logic. You can offload
    a significant portion of your business logic to a database if needed .


    ## Dynamic Fields


    As we mentioned earlier, RavenDB is a schemaless database. You do not have to
    define schema upfront, and you will be able to accept various semi-structured
    or even unstructured data. The moment you know least about your domain is the
    very moment when the project starts. The ability to postpone decisions about data
    structures you will use is a significant advantage. It will not just speed up
    development, but it will also provide much-needed flexibility as additional requirements
    arrive along the way of implementation and inevitably after you launch your product
    .


    In other cases, you have very well-defined requirements, but the data you need
    to store inside a database is inherently heterogeneous. A typical situation is
    a need for globalization of your application. Expanding your business to a new
    part of the world often means learning about concepts you forgot to cover and
    modifying your application and database to take them into account.


    Take the concept of an address as an example. Various countries around the world
    have different ways of addressing locations. It is enough to read multiple administrative
    division terms for countries worldwide – state, county, province, district, prefecture,
    emirate, canton, municipality, circuit, raion , oblast – to comprehend the full
    complexity of modeling such heterogeneous data.


    Schemaless JSON as a data format for your documents in RavenDB will provide you
    with much-needed flexibility for expanding entities that you store. However, you
    need to propagate these changes to queries and the application itself. And, since
    queries are using indexes, you will also have to expand the RavenDB index definition.
    Once it’s changed, this will trigger recomputation of the whole index, which can
    be both computation-heavy and time-consuming.


    RavenDB provides a handy solution for situations like this one in the form of
    *dynamic fields* . Instead of explicitly stating field names and their values,
    you can programmatically define them. Such an index can accommodate different
    document structures. Also, dynamic fields will prevent complete recalculation
    of the index when a document with new fields arrives at the database. Listing
    [5-13](#514303_1_En_5_Chapter.xhtml#PC32) shows an index with dynamic fields generated
    for the employee’s address.


    ```

    function CreateDynamicFields(addr) {

    var ret = [];

    for (const property in addr) {

    ret.push(createField(property, addr[property], { indexing: ''Exact'', storage:
    false, termVector: null }))

    }

    return ret;

    }

    map("Employees", emp => {

    return {

    _: CreateDynamicFields(emp.Address)

    }

    })

    Listing 5-13

    Employees/DynamicFields index

    ```


    As you can see from the *map* definition, this index is processing all employees
    and will create dynamic fields for their addresses . Listing [5-14](#514303_1_En_5_Chapter.xhtml#PC33)
    presents one sample address.


    ```

    {

    "Line1": "4726 - 11th Ave. N.E.",

    "Line2": null,

    "City": "Seattle",

    "Region": "WA",

    "PostalCode": "98105",

    "Country": "USA",

    "Location": {

    "Latitude": 47.66416419999999,

    "Longitude": -122.3160148

    }

    }

    Listing 5-14

    Address literal of employees/8-A

    ```


    Figure [5-11](#514303_1_En_5_Chapter.xhtml#Fig11) shows collections of index terms
    for addresses of this form.


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig11_HTML.png)


    A screenshot of index terms for employees slash dynamic fields namely i d with
    9 loaded data, line 1, line 2, city with 5 loaded data, region, postal code with
    9 loaded data, country, and location.


    Figure 5-11


    Index Terms for Employees/DynamicFields Index


    Each property of the address (like Line1, Line2, City, etc.) is one collection
    of terms. Values of such group are extracted from all occurrences of that property
    on any of the employee documents.


    Let’s look at the definition of the index. You can see that definition of the
    dynamic field has a peculiar form:


    ```

    _: CreateDynamicFields(emp.Address)

