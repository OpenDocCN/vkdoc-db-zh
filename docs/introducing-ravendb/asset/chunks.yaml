  trans: '## 按不存在的属性查询


    如果我们尝试按不存在的属性进行筛选，如代码清单 3-4 所示，会发生什么？


    ```rql

    from Employees where FistName = ''Andrew''

    ```


    代码清单 3-4: 通过不存在的属性筛选所有员工


    在代码清单 3-4 中，我们故意打错了字——`FistName`。如果您是习惯关系型数据库的开发者，执行此查询时会预期收到错误。


    然而，在 RavenDB 中，尝试通过不存在的属性名称来筛选集合**不会**产生任何错误。您将得到一个空的结果集。为什么会这样？如果您还记得，RavenDB
    是一个无模式数据库。在关系型数据库中，模式是每个表的一组强制性字段。RavenDB 集合的无模式特性意味着，对属于同一集合的文档**没有**施加任何强制性结构。不存在这样一组文档必须拥有的强制性属性。因此，按您能想到的任何属性名称进行筛选都不会产生错误——它可能只会导致一个意外的空结果集。


    ## 按非字符串属性查询


    除了按字符串值筛选，您还可以按包含数值的属性进行筛选：


    ```rql

    from Orders where Freight = 8.53

    ```


    或按包含布尔值的属性进行筛选：


    ```rql

    from Products where Discontinued = true

    ```


    ## 按复杂属性筛选


    在上一节中，我们根据各种属性的值来筛选文档。所有这些属性都是简单属性，位于文档的第一层。回到员工文档，如代码清单 3-5 所示，并查看 `Address`
    属性。


    ```json

    {

    "LastName": "Fuller",

    "FirstName": "Andrew",

    "Title": "Vice President, Sales",

    "Address": {

    "Line1": "908 W. Capital Way",

    "Line2": null,

    "City": "Tacoma",

    "Region": "WA",

    "PostalCode": "98401",

    "Country": "USA",

    "Location": {

    "Latitude": 47.614329,

    "Longitude": -122.3251939

    }

    }

    }

    ```


    代码清单 3-5: 员工 JSON 文档结构


    我们可以看到它很复杂，由多层的嵌套属性组成。RavenDB 也支持对此类属性进行查询，如代码清单 3-6 所示。


    ```rql

    from Employees where Address.Country = ''USA''

    ```


    代码清单 3-6: 通过嵌套属性筛选所有员工


    代码清单 3-6 中的查询将选择所有居住在美国的员工。请注意属性名称 `Address.Country` 的格式——查看代码清单 3-5 中的 JSON，您会观察到
    `Country` 是 `Address` 属性内的一个嵌套属性。


    将 JSON 属性的嵌套结构转换为适合筛选查询的线性形式是直截了当的。您将父属性写在第一层（本例中为 `Address`），然后添加第二层中所需的属性（本例中为
    `Country`），并用点号分隔。


    同样的方法也适用于更深层级的属性。因此，要按代码清单 3-5 中可见的 `Latitude` 属性进行筛选，我们将首先说明顶层祖先 `Address`，然后通过
    `Location` 下降到 `Latitude`。每当我们下降一层，就会在属性名称之间添加一个点号作为分隔符。因此，我们最终的扁平化形式是 `Address.Location.Latitude`。从左到右读取这个连接的属性时，每遇到一个点号，你就下降一层。


    最终，我们访问第三层属性的筛选查询如下所示：


    ```rql

    from Employees where Address.Location.Latitude = 47.614329

    ```


    它将返回所有居住在指定 `纬度` 的员工。


    ## 按 Id 筛选


    遵循查询属性名称的约定，我们可能认为按标识符筛选遵循相同的模式。然而，尝试执行


    ```rql

    from Employees where id = ''employees/2-A''

    ```


    将返回一个空的结果集，尽管我们可以检查到 ID 为 `employees/2-A` 的员工是存在的。


    为什么会这样？正如我们在前一章中看到的，*标识符* 是位于 `@metadata` 中的一个名为 `@id` 的唯一属性。然而，这是标识符的默认位置，它也是可配置的。因此，您需要使用函数
    `id()`，它将返回保存文档标识符的属性名称。


    了解这一点后，我们可以将之前的查询重写为


    ```rql

    from Employees where id() = ''employees/2-A''

    ```


    结果将显示这是我们老朋友，Andrew Fuller。


    ## 跨集合查询


    在代码清单 3-3 中，我们演示了如何按名字查询所有员工。也可以查询所有包含具有特定值的特定属性的文档。RavenDB 提供了 `@all_docs` 关键字，它表示您数据库中所有集合的所有文档。因此


    ```rql

    from @all_docs where FirstName = ''Andrew''

    ```


    将找到所有集合中所有具有值为 `Andrew` 的 `FirstName` 属性的文档。此查询结果与代码清单 3-3 相同，在那里我们指定了集合名称。原因很明显——只有员工文档具有
    `FirstName` 属性。


    但是，如果我们按一个存在于不同集合中的属性进行查询


    ```rql

    from @all_docs where Address.Country = ''USA''

    ```


    我们将得到一个由来自不同集合的文档组成的结果集，如图 3-6 所示。


    ![](img/514303_1_En_3_Fig6_HTML.png)


    图 3-6: 跨所有集合的查询结果


    此查询总共返回了来自供应商、公司和员工集合的 22 个文档。所有这些文档都代表位于美国的商业实体。


    也可以编写一个查询，检查所有文档或特定集合中的哪些文档包含特定属性。如下查询


    ```rql

    from @all_docs where exists(Address.Country)

    ```


    将总共返回 129 个在 `Address` 属性中包含 `Country` 属性的文档。但是，请注意，这也会返回那些特定属性值为 `null` 的文档。从
    RavenDB 的角度来看，`null` 没有什么不同——它是属性可以拥有的常规值。因此，`exists()` 将检查指定属性是否存在，而忽略其内容。


    ## 不等式查询


    使用不等式运算符 `!=`，我们可以表达与等于运算符 `=` 相反的筛选条件。例如，执行查询


    ```rql

    from Employees where FirstName != ''Andrew''

    ```


    将选择所有名字不是 Andrew 的员工。


    还有另一种编写此查询的方法；您可以使用 `<>` 运算符，它是 `!=` 运算符的同义词：


    ```rql

    from Employees where FirstName <> ''Andrew''

    ```'
- fmt: '### Logical Operators


    Logical operators are returning Boolean values `true` and `false`. Recalling query
    from Listing [3-6](#514303_1_En_3_Chapter.xhtml#PC10)


    ```js

    from Employees where Address.Country = ''USA''

    ```


    we were able to select all employees living in the United States. But what if
    we want to get all employees living in the United States and United Kingdom? For
    that purpose, we can use `or` operator:


    ```js

    from Employees where Address.Country = ''USA''

    or Address.Country = ''UK''

    ```


    Executing this query will result in a union - joint list of employees from one
    and the other country. However, looking at the previous query, it is obvious that
    adding additional countries would require lots of typing to produce a chain of
    conditions. For those cases, we can use `IN` operator to achieve the same results
    with a shorter query:


    ```js

    from Employees where Address.Country IN (''USA'', ''UK'')

    ```


    `IN` operator accepts a list of values and will return `true` if the stated property
    has any of the values from the list.


    Similar to `or` operator, `and` will filter out documents satisfying all stated
    conditions:


    ```js

    from Products where PricePerUnit = 14 and UnitsInStock = 16

    ```


    This query will return two products, `products/34-A` and `products/67-A`, which
    have 16 units in stock and cost 14 per unit.


    Following the logic behind `or`/`IN` pair, it is logical to ask – is there anything
    similar to `IN`, but for `and` operator. Looking more closely for the applicable
    case, we would take query like this :


    ```js

    from Companies where Address.City = ''London'' and Address.City = ''New York''

    ```


    and shorten it. However, a query like this will always return an empty result
    set – you cannot have a property with two values at once. And, indeed, the single
    value of a simple property cannot, but complex property that contains multiple
    values can.


    Figure [3-7](#514303_1_En_3_Chapter.xhtml#Fig7) shows `regions/1-A` document with
    a `Territories` property which is a collection of territories.


    ![](images/514303_1_En_3_Chapter/514303_1_En_3_Fig7_HTML.png)


    A screenshot depicts a document titled regions slash 1 A. The options below the
    title are, save, clone, and delete. The document depicts 19 lines of code.

    **Figure 3-7. Region Document**


    With `Territories` property, we can now formulate a query that contains `and`
    condition


    ```js

    from Regions where Territories[].Name = ''Wilton'' and Territories[].Name = ''Neward''.

    ```


    This query will return all Regions that have both Wilton and Neward in Territories
    property. We can shorten it to


    ```js

    from Regions where Territories[].Name ALL IN (''Wilton'', ''Neward'').

    ```


    We can observe two interesting features here. The first one is `ALL IN` operator
    that provides a way to match multiple values against an array. The second one
    is the expression `Territories[].Name` which is taking all elements of `Territories`
    collection and extracting `Name` property from every element.


    A typical use case of the `ALL IN` operator is selecting all documents tagged
    with a specified set of tags .


    ### Range Queries


    So far, we have been using equality and inequality operator to filter by exact
    matches. It is also possible to use additional operators to create range queries
    .


    Following query


    ```js

    from Products where UnitsInStock > 26

    ```


    will return all products with more than 26 units in stock while


    ```js

    from Products where UnitsInStock >= 26

    ```


    will list all products with 26 or more units in stock. We will leave as an exercise
    usage of analogous operators `<` and `<=`.


    We can combine these operators, so the following query


    ```js

    from Products where UnitsInStock > 1 and UnitsInStock < 3

    ```


    will return all products with two units in stock, while


    ```js

    from Products where UnitsInStock >= 1 and UnitsInStock <= 3

    ```


    lists all products that have one, two, or three units in stock.


    We can shorten the last query – in the spirit of `IN` and `ALL IN` operators,
    RavenDB also has `BETWEEN` operator so that we can rewrite the previous query
    to


    ```js

    from Products where UnitsInStock BETWEEN 1 and 3

    ```


    Note that `BETWEEN` is inclusive on the lower and higher end of an interval .


    ### Casing


    Revisiting our familiar example from Listing [3-3](#514303_1_En_3_Chapter.xhtml#PC4),
    we can modify it like this :


    ```js

    from Employees where FirstName = ''ANDREW''

    ```


    Even though you might expect no results, since we capitalized all letters in the
    name, this query will return Andrew Fuller as the only result. Why is that?


    RavenDB defaults to case-insensitive matching in queries. In this case, the value
    of the filtering condition was different from the actual property in the document,
    but `Andrew` and `ANDREW` matched since RavenDB ignores casing differences. This
    case insensitivity was a conscious decision since, in most scenarios, case-insensitive
    comparison of strings will produce results as you desire.


    However, in some specific cases, like matching BASE64 encoded strings, you need
    exact matching. RavenDB supports that via the `exact()` method, and the following
    query will return an empty list of results :


    ```js

    from Employees where exact(FirstName = ''ANDREW'')

    ```'
