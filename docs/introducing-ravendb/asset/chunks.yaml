  trans: '## 索引


    因此，如果我们无法消除这种顺序扫描，一个概念性的解决方案是只执行一次，并将结果保存起来供后续查询使用。所有现代数据库解决这一挑战的方式正是如此。你可以指定一个字段，然后引擎会遍历所有文档，检查该字段的内容。发现的值将被存储在一个称为
    `索引` 的特定数据结构中。索引是随文档一起存储的一个附加数据结构（`元数据`，即“关于你的数据的数据”）。数据库会从你的内容中派生出索引的内容，并且它永远不会改变你的原始内容。


    在我们的例子中，我们会在 `Employee` 文档的 `Address.City` 字段上定义一个索引，并称这个字段是 *已索引的*。在计算此索引的内容时，数据库会提取所有不同的值（所有城市），并将它们存储在一个专门的数据结构中。多年来已经开发了各种索引结构，但它们都有一个明确的目的——提供一种基于某些条件快速获取文档的方式。


    在形成 `Employee.Address.City` 索引并用员工居住的所有城市填充它之后，无论查询什么值，数据库引擎都能快速回答我们的问题。当我们执行查询所有伦敦员工的请求时，引擎将不再遍历文档。相反，它会查阅索引。在那里，它将找到表
    4-1 所示的条目。


    **表 4-1**


    `Employee.Address.City` 索引的内容


    | Address.City | ID |

    | --- | --- |

    | Kirkland | employees/3-A |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A |

    | Redmond | employees/4-A |

    | Seattle | employees/1-Aemployees/8-A |

    | Tacoma | employees/2-A |


    现在获取所有来自伦敦的员工列表变得轻而易举。他们的标识符将被收集起来，然后从磁盘获取并返回这些文档。可以说，我们已经为所有可能的 `Address.City`
    查询提前做好了准备。我们预计算了结果，并将它们与文档一起存储。因此，我们的查询会很快。不再需要表扫描：不再需要遍历文档并加载它们来检查是否应该包含在结果集中。我们有了一个可以直接从磁盘读取的
    ID 列表，并且可以确信这是一个完整的结果集。


    ### 索引类型


    如果某种计算是不可避免的，那么就没有办法避免执行它。但是，你可以只执行一次，并在查询执行前将结果保存到磁盘。索引就是以专门数据结构存储的预计算结果，它提供了一种快速获取结果的方式。


    在表 4-1 中，我们展示了一个包含文档 ID 的索引。这样的索引被称为 `二级索引`。


    当使用 `二级索引` 来服务查询时，在将员工列表返回给你之前还需要一个额外的步骤。数据库需要使用从 `二级索引` 获取的 ID 来获取完整的员工文档。这个操作需要是高效的，因此数据库会维护另一个索引，该索引根据标识符跟踪每个文档的确切存储位置。这个索引被称为
    `键值索引`，如果你曾使用过关系型数据库，你会认出类似的内部数据结构——`主索引`。


    总的来说，像下面这样的查询将要求数据库执行两个操作。首先，获取已索引属性的值，然后查阅 `二级索引` 以获取标识符列表。其次，使用 `主索引` 从数据库存储中高效地获取员工文档。


    ```

    from Employees

    where Address.City = ''London''

    select FirstName

    ```


    然而，在某些情况下，这可以减少到仅一次操作。即，你可以扩展索引以包含整个文档，而不仅仅是一个标识符。这样的索引称为 `聚簇索引`，你可以在表 4-2 中看到其结构。


    **表 4-2**


    聚簇索引的内容


    | City | ID | Document |

    | --- | --- | --- |

    | Kirkland | employees/3-A | {id: "employees/3-A", "FirstName": "Janet"..} |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | {id: "employees/9-A",
    "FirstName": "Anne"..}{id: "employees/5-A", "FirstName": "Steven"..}{id: "employees/6-A",
    "FirstName": "Michael"..}{id: "employees/7-A", "FirstName": "Robert"..} |

    | Redmond | employees/4-A | {id: "employees/4-A", "FirstName": "Margaret"..} |

    | Seattle | employees/1-Aemployees/8-A | {id: "employees/1-A", "FirstName": "Nancy"..}{id:
    "employees/8-A", "FirstName": "Laura"..} |

    | Tacoma | employees/2-A | {id: "employees/2-A", "FirstName": "Andrew"..} |


    有了 `聚簇索引`，数据库引擎只需一次存储访问就能获取员工文档列表。不幸的是，这种索引在存储方面开销很大，因为它本质上会将主数据存储中的所有记录复制到元数据结构中。各种关系型数据库使用不同的方法来克服这一挑战。SQL
    Server 每个表只允许一个 `聚簇索引`；MySQL 将 `主索引` 实现为聚簇索引，而 `二级索引` 条目则指向主键。


    介于非聚簇索引（仅存储引用）和聚簇索引（存储完整数据）之间的是 `覆盖索引`，也称为 *包含列的索引*。让我们观察以下查询：


    ```

    from Employees

    where Address.City = ''London''

    select FirstName

    ```


    在这种情况下，我们并非要求获取完整的员工文档。我们感兴趣的是伦敦员工的名字。名字通常是数据的小片段，我们可以将表 4-1 中的非聚簇 `二级索引` 扩展为表
    4-3 所示的形式。


    **表 4-3**


    覆盖索引的内容


    | Address.City | ID | FirstName |

    | --- | --- | --- |

    | Kirkland | employees/3-A | Janet |

    | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | AnneStevenMichaelRobert
    |

    | Redmond | employees/4-A | Margaret |

    | Seattle | employees/1-Aemployees/8-A | NancyLaura |

    | Tacoma | employees/2-A | Andrew |


    `覆盖索引` 是一种折中方案，它使得数据库能够仅使用索引本身来回答某些查询（因此术语 *覆盖*，因为此类索引覆盖了一些查询），而无需分配过多的空间。'
- fmt: '# 索引的缺点


    索引听起来是个好主意，但也有其缺点。在磁盘上存储额外的数据结构必然会占用额外空间。在我们的示例中，我们只为 `Employee` 文档的一个字段定义了索引。如果我们想为用户在其他字段（如
    `FirstName` 或 `LastName`）上提供高效过滤，就必须用这两个字段的条目来扩展 `EmployeeIndex`。随着时间的推移，当你定义新索引、用额外字段扩展现有索引，并且数据库中的文档数量增加时，索引的总大小将不可避免地增长，为这些元数据分配越来越多的空间。


    然而，还有另一个更具挑战性的任务——索引维护。每当我们更新员工的居住城市或任何其他被索引的字段时，我们都需要更新索引。每当我们数据库中创建一个新员工时，索引也需要更新。结果就是，每次数据库写入都会伴随一次或多次额外的索引更新操作。写入数据和索引更新这两者将一起执行，从而使你的写入操作变慢。


    这导致了一个有趣的权衡：我们引入索引来加速查询，但这会拖慢写入速度。我们想要快速的查询，但同时又不想减慢写入速度。因此，我们应该根据应用程序的使用模式，仔细选择应该对哪些字段建立索引。这种权衡解释了为什么数据库默认不会索引所有内容——这种方法会引入不必要的开销。


    尽管通过索引查询（相对于查询原始数据）是每个开发者都应该做的事情，但缺少索引可能是程序员中最常见的反模式。导致这一可悲事实的因素有很多，但需要手动创建索引是最主要的一个。即使你知情并意识到这一点，也很容易忘记或遗漏。此外，这个错误通常在少量数据的情况下隐藏得很好。开发者在小数据集上测试应用程序时，不会体验到全表扫描的可怕后果。如果没有进行负载测试，开发者就会将没有索引的数据库部署到生产环境中。


    最终，缺少索引将导致应用程序显著且令人恼火地变慢。当数据库中的数据量较小时，应用程序速度会很快，但随着时间的推移，随着数据量的增长，性能将开始线性下降。这种逐渐的性能下降是应用程序扩展的严重障碍，并将迫使你回头修复性能问题，这会消耗你的时间和金钱。


    # RavenDB 的索引哲学


    RavenDB 作为数据库的设计哲学，其核心不是帮助你解决问题和挑战，而是预防它们。这种方法具有独特的后果——你的数据库会使坏事无法发生，或者当你有所疏漏时，RavenDB
    会做出反应并纠正你的操作。


    作为这种预防哲学的一部分，在 RavenDB 中，所有查询总是通过索引执行。从技术上讲，查询不可能绕过索引执行。这样，手动的遗漏就不可能发生，所有的过滤查询都会是高效的。


    那么，当我们尝试运行清单 [4-2](#514303_1_En_4_Chapter.xhtml#PC4) 中的查询而没有预先定义索引时，会发生什么？我们会得到错误还是警告？图
    [4-3](#514303_1_En_4_Chapter.xhtml#Fig3) 显示了查询执行的结果。


    ![查询窗口的截图，包含保存按钮、搜索框和设置下拉列表。一个查询从 employees 中读取，条件是 address.city 等于 London。结果面板有一个包含
    8 列的表格。](images/514303_1_En_4_Chapter/514303_1_En_4_Fig3_HTML.png)


    图 4-3

    结果面板


    不仅没有显示错误，我们还得到了实际的结果集。这是怎么回事？


    仔细观察结果面板的左上角，你可以看到 RavenDB Studio 指示了用于处理此查询的索引名称。图 [4-4](#514303_1_En_4_Chapter.xhtml#Fig4)
    屏幕这部分的特写显示了索引名称和执行时间。


    ![索引 `auto/Employees/ByAddress.City` 的结果面板截图，执行时间为 62 毫秒。表格只有 4 个列标题：preview、I
    d、last name 和 first name。](images/514303_1_En_4_Chapter/514303_1_En_4_Fig4_HTML.jpg)


    图 4-4

    索引详情


    使用了名为 `Auto/Employees/ByAddress.City` 的索引，获取结果耗时 62 毫秒。我们可以通过展开下拉菜单并选择第一个选项 `View
    Index` 来检查此索引，如图 [4-5](#514303_1_En_4_Chapter.xhtml#Fig5) 所示。


    ![查询窗口结果面板的截图，下拉菜单中有 5 个选项，包括索引 `auto/Employees/ByAddress.City`。一个包含 4 列的表格在 62
    毫秒内列出。](images/514303_1_En_4_Chapter/514303_1_En_4_Fig5_HTML.jpg)


    图 4-5

    查看索引选项


    你现在可以看到映射结构——`Employees` 集合中的文档被处理，并且从 `Address.City` 字段中提取值。图 [4-6](#514303_1_En_4_Chapter.xhtml#Fig6)
    显示了此索引的结构。


    ![一张截图，显示索引为 `auto/Employees/ByAddress.City`，集合为 `Employees`，字段名为 `Address.City`，并提供查询搜索、术语和删除按钮等选项。](images/514303_1_En_4_Chapter/514303_1_En_4_Fig6_HTML.png)


    图 4-6

    索引结构


    RavenDB Studio 提供了一种检查此索引内容的方法。如果你点击右上角的 `Terms` 按钮，将会显示 `Index terms`，如图 [4-7](#514303_1_En_4_Chapter.xhtml#Fig7)
    所示。


    ![一张截图，展示了 `auto/Employees/ByAddress.City` 的索引术语，包含 `address.city` 和 `i d` 两个部分。](images/514303_1_En_4_Chapter/514303_1_En_4_Fig7_HTML.jpg)


    图 4-7

    索引术语


    展开 `Address.City` 和 `id()` 部分将显示从这些字段中提取的值。很容易看出，九名员工有唯一的标识符（因此我们有九个标识符），但有些人住在同一个城市，因为我们有五个不同的城市。我们可以将鼠标悬停在任何字段上并点击放大镜图标来针对此索引执行过滤查询，如图
    [4-8](#514303_1_En_4_Chapter.xhtml#Fig8) 所示。


    ![一张截图](images/514303_1_En_4_Chapter/514303_1_En_4_Fig8_HTML.jpg)'
  raw: '### Downsides of Indexing


    Indexes sound like a great idea, but there are also downsides. Storing additional
    data structures on the disk will inevitably take extra space. In our example,
    we defined the index on just one field of the Employee document. If we wanted
    to provide users with efficient filtering on other fields like FirstName or LastName,
    we would have to expand EmployeeIndex with entries for these two fields. Over
    time, as you define new indexes, expand existing ones with additional fields,
    and increase the number of documents in your database, the total size of indexes
    will inevitably grow, allocating more and more space for this metadata.


    However, there is another much more challenging task – index maintenance. Every
    time we update an employee’s city of living or any other indexed field, we need
    to update the Index. Every time we create a new employee in the database, the
    Index needs to be updated. As a result, each write to a database will be accompanied
    by additional one or more index update operations. Both of them, writing data
    and index updates, will be performed together, making your writing operation slower.


    This results in an interesting trade-off: we will introduce indexes to speed up
    queries , but these will slow down writes. We want to have fast queries, but at
    the same time, we do not want to slow down writes. Hence, we should carefully
    select which fields should be indexed based on the applications’ usage patterns.
    This trade-off explains why databases are not indexing everything by default –
    this approach would introduce unnecessary overhead.


    Even though querying via indexes (opposed to querying raw data) is what every
    developer should be doing, a lack of indexes is probably the most common anti-pattern
    among programmers. There are various contributing factors to this sad fact, but
    the need for the manual creation of indexes is the most significant one. It is
    easy to forget about it or make an omission, even when you are informed and aware.
    Additionally , this mistake is usually well-hidden in a small amount of data.
    Developers testing an application on a small dataset will not experience the dreadful
    consequences of a full table scan. Without load testing, a developer will deliver
    the database without indexes to production.


    Eventually, a lack of indexes will result in a significant and annoying slow-up
    of the application. With the small amount of data in the database, the application
    will be fast, but over time, as the amount of data grows, performance will start
    to degrade linearly. This gradual degradation is a severe obstacle to the scaling
    of your application and will make you go back and fix performance problems, which
    will cost you both time and money .


    ## RavenDB’s Indexing Philosophy


    The general philosophy of RavenDB design as a database is not to help you solve
    problems and challenges but to prevent them. This approach has unique consequences
    – your database will make bad things impossible, or when you make an omission,
    RavenDB will react and correct your actions.


    As a part of this prevention philosophy, in RavenDB, all queries are always executed
    via indexes. It is technically impossible for a query to avoid execution via index.
    This way, the manual omission is not possible, and all filtering queries will
    be efficient.


    So, what happens when we attempt to run a query from Listing [4-2](#514303_1_En_4_Chapter.xhtml#PC4)
    without defining the index upfront? Will we get an error or warning? Figure [4-3](#514303_1_En_4_Chapter.xhtml#Fig3)
    shows the result of query execution .


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig3_HTML.png)


    A screenshot of the query window with a save button, search box, and settings
    drop-down list. A query reads from employees where address dot city equals London.
    The results panel has a table with 8 columns.


    Figure 4-3


    Results Panel


    Not only that an error was not displayed, but we also got the actual result set.
    How come?


    Looking closer at the top left corner of the Results panel, you can see that RavenDB
    Studio indicates the name of the index used to serve this query. Figure [4-4](#514303_1_En_4_Chapter.xhtml#Fig4)
    shows a close-up of this part of the screen with the index name and execution
    time .


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig4_HTML.jpg)


    A screenshot of the results panel for index auto slash employees slash by address
    dot city with the execution time of 62 milliseconds. A table has 4 column headings
    only namely preview, I d, last name, and first name.


    Figure 4-4


    Index Details


    Index with the name *Auto/Employees/ByAddress.City* was used, and it took 62ms
    to get results. We can inspect this index by expanding the dropdown and selecting
    the first option, *View Index*, as shown in Figure [4-5](#514303_1_En_4_Chapter.xhtml#Fig5).


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig5_HTML.jpg)


    A screenshot of the results panel in the query window with index auto slash employees
    slash by address dot city in the drop-down menu of 5 options. A table with 4 columns
    is listed in 62 milliseconds.


    Figure 4-5


    View Index Option


    You can now see mapping structure – documents from Employees collection are processed,
    and values are extracted from *Address.City* field. Figure [4-6](#514303_1_En_4_Chapter.xhtml#Fig6)
    shows the structure of this index.


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig6_HTML.png)


    A screenshot with data auto slash employees slash by address dot city on index,
    employees on collection field, and address dot city on field name with options
    query search, terms, and delete button.


    Figure 4-6


    Structure of Index


    RavenDB studio provides a way to inspect the content of this index. If you click
    on the *Terms* button in the upper right corner, you will be presented with *Index
    terms*, as shown in Figure [4-7](#514303_1_En_4_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig7_HTML.jpg)


    A screenshot depicts the index terms for auto slash employees slash by address
    dot city with 2 sections namely address dot city and i d.


    Figure 4-7


    Index Terms


    Expanding both *Address.City* and *id()* sections will reveal extracted values
    from those fields. It is easy to see that nine employees have unique identifiers
    (hence we have nine identifiers), but some live in the same city since we have
    five different cities. We can execute a filtering query against this index by
    hovering over any of the fields and clicking on magnifying glass icon, as shown
    in Figure [4-8](#514303_1_En_4_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_4_Chapter/514303_1_En_4_Fig8_HTML.jpg)'
