    "PostalCode": "98105",

    "Country": "USA",

    "Location": {

    "Latitude": 47.66416419999999,

    "Longitude": -122.3160148

    }

    }

    ```

    清单 7-1

    Employee 文档的 Address 属性的嵌套结构


    您可以按员工的地址属性进行搜索，以获取所有居住在西雅图的员工：


    ```rql

    from Employees where search(Address, "Seattle")

    ```


    在这种情况下，RavenDB 通过扁平化并索引来自不同级别的所有属性，正确处理了复杂的嵌套结构。


    也支持对集合进行搜索。示例数据库中的订单包含订单行集合。您可以使用以下查询搜索所有包含油炸产品的订单：


    ```rql

    from Orders

    where search(Lines.ProductName, "Fried")

    ```


    ### 通配符


    全文搜索的部分匹配提供了一种指定单词以在文本中搜索的方法。通配符可以增强部分搜索的能力——当搜索词的开头或结尾未知时，您可以替换一个或多个字母。


    因此，与其搜索所有名为`*Anne*`的员工


    ```rql

    from "Employees"

    where search(FirstName, ''Anne'')

    ```


    您可以使用通配符仅指定搜索词的一部分。以下查询将搜索任何以`*An*`为前缀的名字。


    ```rql

    from "Employees"

    where search(FirstName, ''An*'')

    ```


    执行此查询将返回`*Andrew*`和`*Anne*`。


    同样，您可以执行后缀搜索：


    ```rql

    from "Employees"

    where search(LastName, ''*an'')

    ```


    此查询将从我们的示例数据集中返回 Steven Buchanan 和 Laura Callahan。


    最后，结合前两种方法，我们可以执行中缀搜索：


    ```rql

    from "Employees"

    where search(FirstName, ''*an*'')

    ```


    这种中缀全文搜索将返回`*Anne*`、`*Nancy*`、`*Andrew*`和`*Janet*`。


    使用通配符时，另一个需要考虑的关键因素是性能。使用前导通配符会显著降低搜索速度。当然，在小型数据集（如我们当前使用的示例数据集）上，这种减速可能并不明显。但是，随着数据库中文档数量的增加，它可能成为一个因素。因此，您应牢记这一点，并评估每个后缀全文搜索场景的理由及其潜在的负面影响。


    如果您确定应用程序需要此类搜索，有几种替代方法：


    *   创建一个静态索引，其中对文本进行反向索引，从而将前导通配符搜索（按后缀搜索）转换为尾随通配符搜索（按前缀搜索）。

    *   创建一个使用非默认分析器的静态索引。


    本章稍后将介绍第二种技术。


    ### 建议


    有时，搜索不会返回任何结果。例如，没有产品名称包含单词“chaig”，这可以通过执行以下查询来验证：


    ```rql

    from Products

    where search(''Name'', ''chaig'')

    ```


    在这种情况下，RavenDB 提供了`*suggest*`功能。您可以通过调用`suggest()`函数来使用它，如清单 7-2 所示。


    ```rql

    from Products

    select suggest(''Name'', ''chaig'')

    ```

    清单 7-2

    选择建议


    执行此查询将返回如图 7-3 所示的建议。


    ![](img/514303_1_En_7_Fig3_HTML.png)


    一个算法图示了针对术语''chai''和''chang''的搜索结果和建议。标记的索引列为预览和名称。


    图 7-3


    针对单词“chaig”的建议


    建议功能将根据计算出的距离算法值，找到与传递的术语相似的单词。如果您想实现类似 Google 的“您是不是要找？”建议，这非常方便。'
- fmt: '### Operators


    我们已经展示了你可以为全文搜索使用多个术语，并且你会获得满足其中任何一个条件的所有文档。本质上，RavenDB会隐式地应用`or`逻辑操作符。这意味着查询


    ```

    from Employees where search(Address, "Seattle London")

    ```


    等价于


    ```

    from Employees where search(Address, "Seattle London", or)

    ```


    并将返回所有居住在西雅图或伦敦的员工。


    应用`and`操作符


    ```

    from Employees where search(Address, "Seattle London", and)

    ```


    将不返回任何结果，因为没有地址中同时包含这两个城市的员工。


    你可以进一步组合这些操作符：


    ```

    from ''Employees''

    where search(Notes, "Spanish Portuguese", and)

    or search(Notes, "Manager")

    ```


    此查询将返回要么是经理，要么同时会说西班牙语和葡萄牙语的员工。


    ## 内部发生了什么？


    查看上一节展示的多种执行部分搜索的方法，可能会让你认为背后发生了许多复杂的事情。尽管全文搜索并非一个简单的机制，但大多数内部实现概念相对简单。正如我们在过滤、排序和聚合中已经看到的——一切都归结为使用合适的数据结构。其次，为了避免在查询时进行计算（这总是危险的，因为查询执行时间取决于数据集的大小），RavenDB会提前准备索引条目。因此，全文搜索既高效又快速。一定量的工作是不可避免的，但最多只做一次，提前完成并存储结果以供重用，是实现高性能查询的关键。


    ### 文本分析


    在索引期间，RavenDB将使用分析器（analyzer）将文本分割成片段。这些片段被称为`token`，它们将构成索引术语（index terms）。之后，当你执行全文搜索时，你的搜索术语会与索引中包含的`token`进行匹配。因此，这种方法会将搜索术语对文本的部分匹配，转化为对文本分析过程中产生的`token`集合的精确匹配。当然，这句话简化了整个过程，但从概念上很好地描述了匹配机制。


    分析器主要执行文本的`tokenization`（分词）。分词将文本分解为词法单元，也称为`token`。`token`是最小的可搜索单位，分词过程将输入文本转换为令牌流。


    此外，由分词器（tokenizer）产生的`token`会通过一个或多个`filter`。过滤器将检查令牌流，并可能保持`token`不变、修改它们、丢弃它们，甚至创建新的。修改可能包括将字符规范化为全小写或不带变音符号的版本。标点符号和停用词（stop
    words）如`the`和`is`通常会被移除，其他可能影响搜索质量的无用`token`也是如此。


    分词器和过滤器通常组合成一个管道（pipeline，有时也称为chain），其中一个的输出是另一个的输入。分析器（analyzer）就是一个分词器和过滤器序列的术语，它以文本作为输入并产生一组`token`。


    ### 标准分析器


    RavenDB附带了多个分析器，其中`Standard Analyzer`是默认的。标准分析器由`Standard Tokenizer`和两个过滤器组成——`LowercaseToken
    Filter`和`StopToken Filter`。


    `Standard Tokenizer`会通过将空格、换行、标点和其他特殊字符视为`token`边界来对文本进行分段。这样生成的`token`流会通过`LowercaseToken
    Filter`，将其规范化为全小写字母。最后，`StopToken Filter`将从令牌流中移除英文`stop words`。例如`a`、`the`和`is`——这些是所谓的`function
    words`，在全文搜索的上下文中是模糊的或几乎没有词汇意义。


    例如，以下句子


    ```

    A quick Fox jumps over the lazy Dog!

    ```


    通过标准分析器后将被转换为`token`流：


    ```

    [quick], [fox], [jumps], [over], [lazy], [dog]

    ```


    这个过程会移除感叹号和常见单词如`a`和`the`。此外，所有`token`都被转换为小写。


    正如我们在前几章所见，运行各种查询会触发RavenDB创建相应的索引以高效地服务于这些查询。同样，当你运行全文搜索查询时，RavenDB会创建一个自动的全文搜索索引。标准分析器将应用于一个或多个被搜索的字段。它们的内容将被分词，并生成一组索引条目。


    一个有趣的事实是，分析器不仅在索引期间应用于输入文本，也会应用于搜索术语。因此，在执行查询


    ```

    from "Employees"

    where search(FirstName, ''Andrew Anne'')

    ```


    时，RavenDB会将标准分析器应用于字符串`"Andrew Anne"`，将其转换为令牌流`[andrew], [anne]`，然后才执行这些`token`与索引术语的实际匹配。这条规则有一个例外——如果搜索术语包含通配符（wildcard），它将被保留。分析器不会应用于包含通配符的搜索术语。


    除了标准分析器，RavenDB还附带了其他分析器：


    *   关键词分析器

    *   小写空白分析器

    *   N元语法分析器

    *   简单分析器

    *   停用词分析器

    *   空白分析器


    你可以使用其中一些来为你的全文搜索索引填充不同形态的`token`。我们将在本章后面介绍一个这样的案例。


    最后，RavenDB支持自定义分析器。根据具体情况，你可能对分词和过滤有特定需求。在这种情况下，你可以编写自己的自定义分析器并提供给RavenDB。一个典型的例子是分析不同语言的内容。你可能已经猜到，`stop
    words`的集合是依赖于语言的。例如，英文单词`car`在法语中是`stop words`之一。自定义分析器超出了本书的范围，但了解RavenDB高度可定制的特性是很好的。'
  raw: '### Operators


    We already showed that you could use more than one term for a full-text search,
    and you will get all documents satisfying one or the other. Essentially, RavenDB
    will implicitly apply the *or* logical operator. This means that query


    ```

    from Employees where search(Address, "Seattle London")

    ```


    is equivalent to


    ```

    from Employees where search(Address, "Seattle London", or)

    ```


    and will return all employees living either in Seattle or London.


    Applying *and* operator


    ```

    from Employees where search(Address, "Seattle London", and)

    ```


    will return no results since there is no Employee with both cites in the address.


    You can combine these operators further :


    ```

    from ''Employees''

    where search(Notes, "Spanish Portuguese", and)

    or search(Notes, "Manager")

    ```


    This query will return employees who either are managers or speak both Spanish
    and Portuguese languages.


    ## What Happens Inside?


    Looking at various ways to perform partial searching demonstrated in the previous
    section may lead you to think many complex things are going on. And even though
    the full-text search is not a simple mechanism, most of the inner implementation
    concepts are relatively simple. As we already saw with filtering, ordering, and
    aggregations - it all comes down to using appropriate data structures. Next, to
    avoid computation during query time, which is always dangerous since the query’s
    execution time depends on the dataset’s size, RavenDb will prepare index entries
    upfront. As a result, full-text search is efficient and fast. A certain amount
    of work is imminent, but doing it at most once, ahead of time, and storing the
    outcome for reuse is the key to performant queries.


    ### Text Analysis


    During indexing , RavenDB will use an analyzer to separate text into segments.
    These segments are called *tokens*, and they will form index terms. Later, when
    you perform a full-text search, your search term is matched against tokens contained
    in an index. Hence, this approach will transform a partial match of a search term
    against text into an exact match against the collection of tokens produced during
    the analysis of the text. Of course, this statement simplifies the whole process
    but conceptually describes the matching mechanism well.


    Primarily, the analyzer performs *tokenization* of the text. Tokenization breaks
    text into lexical units, also called tokens. Tokens are the shortest searchable
    units, and the tokenization process converts input text into a token stream.


    Additionally , tokens produced by a tokenizer are passed through one or more *filters*.
    Filters will examine the token stream and may leave tokens intact, modify them,
    discard them, or even create new ones. Alterations may include normalizing characters
    to all lower case or a version without diacritics. Punctuation and stop words
    like *the* and *is* are often removed, as are other unhelpful tokens that might
    impact the search quality.


    Tokenizers and filters are usually combined into a pipeline (also called chain
    sometimes) where the output of one is input for another. The analyzer is simply
    a term for a sequence of tokenizers and filters that take text as input and produce
    a set of tokens.


    ### Standard Analyzer


    RavenDB comes with several analyzers, with *Standard Analyzer* as a default one.
    Standard Analyzer consists of *Standard Tokenizer* and two filters – *LowercaseToken
    Filter* and *StopToken Filter*.


    Standard Tokenizer will perform segmentation of text by treating whitespaces,
    newlines, interpunction, and other special characters as token boundaries. Such
    generated stream of tokens is passed through LowercaseToken Filter, which will
    normalize them to all small letters. Finally, StopToken Filter will remove English
    *stop words* from the token stream. Examples are *a*, *the*, and *is* – these
    are so-called *function words* , which are ambiguous or have little lexical meaning
    in the context of full-text search.


    As an example, the following sentence


    ```

    A quick Fox jumps over the lazy Dog!

    ```


    passed through Standard Analyzer will be transformed into a stream of tokens:


    ```

    [quick], [fox], [jumps], [over], [lazy], [dog]

    ```


    This process will remove exclamation marks and common words like *a* and *the*.
    Additionally, all tokens are lowercased.


    As we have seen in previous chapters, running various queries will trigger RavenDB
    to create appropriate indexes to serve those queries efficiently. Likewise, RavenDB
    will create an automatic full-text search index when you run a full-text search
    query. Standard Analyzer will be applied to one or more searched fields. Their
    content will be tokenized, and a set of index entries will be generated.


    An interesting fact is that Analyzer will not only be applied to input text during
    indexing but also to search terms. So, when executing a query


    ```

    from "Employees"

    where search(FirstName, ''Andrew Anne'')

    ```


    RavenDB will apply Standard Analyzer to string “Andrew Anne” transforming it into
    a token stream `[andrew], [anne]` and only then perform actual matching of these
    tokens to indexing terms. This rule has one exception – if a search term contains
    a wildcard, it will remain. An analyzer is not applied to search terms containing
    wildcards .


    Besides Standard, RavenDB comes with additional analyzers:


    *   Keyword Analyzer


    *   LowerCase Whitespace Analyzer


    *   NGram Analyzer


    *   Simple Analyzer


    *   Stop Analyzer


    *   Whitespace Analyzer


    You can use some of these to populate your full-text search index with differently
    shaped tokens. We will cover one such case later in this chapter.


    Finally, RavenDB supports custom analyzers. Depending on the circumstances, you
    may have specific needs for tokenization and filtering. In such situations, you
    can write your custom analyzer and supply it to RavenDB. A typical example is
    the analysis of content in different languages. You can already guess that set
    of stop words is language-dependent. For example, the English word *car* is among
    the stop words in the French language. Custom analyzers are out of the scope of
    this book, but it is good to be aware of the highly customizable nature of RavenDB.'
