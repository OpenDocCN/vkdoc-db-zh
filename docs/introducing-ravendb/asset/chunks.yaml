  trans: '


    ## 在 RavenDB Studio 中查询


    RavenDB Studio 有一个专门用于运行查询的面板。要打开它，请打开 `文档` 区域，其中列出了所有集合。在它们下方，如图 3-1 所示，有一些附加选项。`查询`
    是其中的第二个选项。


    ![](img/514303_1_En_3_Fig1_HTML.png)

    RavenDB Studio 文档页面的截图。左侧是集合列表和标有“补丁”与“查询”的选项卡，右侧列出了多个文档。

    图 3-1：集合列表下方的查询选项


    点击此菜单选项后，你将看到一个用于在 Studio 中运行查询的面板，如图 3-2 所示。


    ![](img/514303_1_En_3_Fig2_HTML.png)

    查询页面的截图包含两个面板。上面的面板描绘了一个用于输入查询的文本框。下面的面板描绘了用于显示结果的空间。顶部面板的右侧是一个播放按钮，顶部还有另外三个按钮。

    图 3-2：RavenDB Studio 中的查询面板


    如你所见，此面板有两个字段——上方用于编写查询，下方用于显示查询执行的结果。


    编写查询后，你可以通过在键盘上按下 `ctrl+enter` 或点击右侧的 `播放` 按钮来运行它。


    下一节将探讨使用 Raven 查询语言进行查询的基础知识。


    ## Raven 查询语言基础


    Raven 查询语言或 `RQL` 是 RavenDB 的类 SQL 查询语言。第 1 章提到关系数据库共享一种称为结构化查询语言 - `SQL` 的标准化查询语言。这种通用的声明式语言是关系数据库管理系统（RDBMS）取得重大成功的因素之一。


    与此相比，NoSQL 数据库没有标准化的查询语言。考虑到 NoSQL 生态系统的动态和分散特性，任何标准出现的可能性都很低。因此，每当一个新的 NoSQL
    数据库诞生时，其作者都面临为其数据库设计查询语言这一繁琐任务。而这个任务带来沉重的负担——一旦你确定并创建了语言，开发者就会开始用它来构建应用程序。从那时起，你能对查询语言所做的修改就变得有限——任何重大的设计更改都会破坏向后兼容性并惹恼你的用户。


    RavenDB 背后的团队面临着同样的挑战。最终，决定以 `SQL` 为基础，但进行若干扩展和修改，使 `RQL` 成为一种强大的语言。这样，熟悉关系数据库和
    `SQL` 的开发者会认识到类似的概念，并快速掌握 `RQL` 的基础。我们不要忘记——查询是我们应用程序中执行的主要活动，快速的查询直接有助于提升用户对你应用程序速度的感知。


    让我们从最直接的查询开始，我在代码清单 3-1 中展示。


    ```

    from Employees

    代码清单 3-1：关键词 “from”

    ```


    执行时，此查询将返回 `Employees` 集合中的所有文档，如图 3-3 所示。


    ![](img/514303_1_En_3_Fig3_HTML.png)

    查询页面的截图包含两个面板。顶部面板键入的文本是 from employees。底部的结果面板显示了标有“employees”的 9 个文档，这些文档列在
    11 个列下。

    图 3-3：从 Employees 集合中选择所有文档


    你可以以表格形式查看结果，但这只是一种可视化呈现。每一行显示 `Employees` 集合中的一个 JSON 文档，其属性显示在单元格中。通过点击如图 3-4
    所示的 `显示` 按钮，你可以显示或隐藏特定属性。


    ![](img/514303_1_En_3_Fig4_HTML.png)

    结果面板的截图顶部有 5 个选项，分别是：删除文档、统计信息、导出为 CSV、显示和展开结果，其中“显示”被选中。“显示”中的选定选项是：id、姓氏、名字、职位、地址和雇用时间。

    图 3-4：调整员工属性的可见性


    可见属性的初始配置将只显示其中一部分。如果你想预览整个文档，表格的第一列中有一个 `预览` 图标。点击它，你将获得特定文档的完整 JSON 预览。


    ### 过滤


    在上一节中，我们学习了 `from`，这是第一个也是基础的 `RQL` 关键词。它将是你编写的每个 `RQL` 查询的一部分。我们看到它与集合名称一起使用，`from
    Employees`，以返回所有九个 `Employee` 文档。


    然而，这只是在示例数据上进行的一个简单演示。在实际应用中，你很少会进行这种无限制的查询。想象一家拥有 10,000 名员工的公司——不仅获取所有员工需要很长时间，而且你只能在屏幕上显示其中的几个。我们在应用程序中通常想要做的是获取并显示集合文档的一个特定子集。再次查看
    ID 为 `employees/2-A` 的 `Employee` 结构


    ```

    {

    "LastName": "Fuller",

    "FirstName": "Andrew",

    ...

    }

    ```


    我们可以看到它包含值为 `Fuller` 的 `LastName` 属性。让我们使用代码清单 3-2 中的查询来查看所有具有该姓氏的员工列表。


    ```

    from Employees where LastName = ''Fuller''

    代码清单 3-2：关键词 “where”

    ```


    执行此查询将显示 Andrew 是 Northwind 贸易公司中唯一具有此姓氏的员工，如图 3-5 所示。


    ![](img/514303_1_En_3_Fig5_HTML.png)

    查询页面的截图包含两个面板。顶部查询面板中的文本是：from employees where last name equals fuller。底部的结果面板显示了一个文档，其中姓氏是
    fuller。

    图 3-5：根据 LastName 属性值过滤员工


    与代码清单 3-1 相比，我们在 `from Employees` 的基础上添加了 `where LastName = ''Fuller''`。关键词 `where`
    用于过滤，即根据特定条件选择所有文档。在本例中，过滤条件以 `[propertyName]=''[value]''` 的形式表示。遵循此模式，我们可以使用代码清单
    3-3 中的查询获取所有名字为 Andrew 的员工。


    ```

    from Employees where FirstName = ''Andrew''

    代码清单 3-3：过滤所有名字为 Andrew 的员工

    ```


    执行此查询将产生相同的结果——只有一个文档——Andrew Fuller 在公司范围内拥有独特的名字和姓氏。


    在我们的示例中，用于过滤的字符串值被撇号包围，但我们也可以使用引号：


    ```

    from Employees where FirstName = "Andrew"

    ```


    这将产生相同的结果。


