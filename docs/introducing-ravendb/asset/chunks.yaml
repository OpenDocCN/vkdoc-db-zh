    ## *To Filip, Olivera, and Renata.*


    ## Introduction


    When was the last time you paid attention to the windows in your home? Probably
    when they were dirty and needed cleaning, or if one of them got broken and needed
    replacement. But, if everything is okay with them, you will not pay attention.


    A good database is like a window. It “just works.” It is fast and reliable without
    needing you to be a database expert. In the ideal scenario, you will not pay attention
    to it - you will concentrate on doing your business, and a database is there to
    support you.


    For the past 40+ years, we have been using relational databases. It would be natural
    to think that we mastered them to the extent that an average developer can build
    applications that scale as the organization grows, supporting ever-increasing
    traffic volume and data volume. Additionally, with the emergence of web applications
    in the 1990s, we have a potentially unbounded audience, and terabytes are new
    gigabytes.


    Even if you have years of experience with relational databases, you already know
    what awaits you at the very start of the project: queries that join multiple tables
    (sometimes up to seven or eight of them), caching layer to compensate for slow
    queries, numerous performance problems as the amount of data in the database grows
    over time, the additional layer of data persistence modeling.


    It is not uncommon even for application developers with 20+ years of experience
    to run into 20% of requests which are permanently slow because of a relational
    database. And then, they live the Pareto principle - spending 80% of maintenance
    time nurturing that 20% of code not working fast enough. Over time, this grows
    into insecurity and chronic imposter syndrome.


    If only you were an expert, it would be much easier! But you are not an expert.
    You do not have months to spend digging deep into the internals of the database.
    You do not want to work on optimizing the database. You want to work on developing
    your application.


    `RavenDB` is a database created with this goal – to empower you to produce outstanding
    results without needing to become an expert in databases. Expert knowledge is
    embedded, so the database will assist you, advise you, and safeguard you as you
    develop your application. Most common antipatterns (like full table scans) are
    actively prevented.


    I encountered `RavenDB` a decade ago and fell in love with it over the years.
    I discovered that `RavenDB` is suitable for small projects, fast prototyping,
    and scaling to enterprise-grade `Domain-Driven Design` projects.


    This book is a gentle introduction to `NoSQL` concepts. Starting from zero, you
    will learn the basics of `RavenDB`, the `NoSQL` document database, its query language,
    and the indexing engine. You will also discover how `RavenDB` reacts to your operational
    behavior, protecting and guiding you. After completing this book, you will be
    capable of installing `RavenDB` and using it for efficiently storing and querying
    data.


    To follow the content of this book, you do not need anything but modern web browsers
    and elementary knowledge of `JavaScript`. You will grasp `NoSQL` principles (like
    `map/reduce`) and comprehend `RavenDB` mechanisms. After you finish it, you can
    easily apply this knowledge to building applications in any modern programming
    language.


    So, let’s dive into the fantastic world of `RavenDB` together!


    ## Acknowledgments


    I want to express my gratitude to Jonathan Gennick and Jill Balzano from `Apress`
    for approaching me with the idea of writing this book and supporting me patiently
    along the way, which was not always smooth.


    My most profound appreciation goes to `Oren Eini`, `Paweł Pekról`, and `Arkadiusz
    Paliński`.


    Through numerous discussions, `Marcin Lewandowski`, `Danielle Greenberg`, `Grzegorz
    Lachowski`, and `Igal Merhavia` answered all my questions and helped me clarify
    concepts and ideas.


    Discussions with `Đorđe Đukić`, `Aleksandar Sabo`, `Shahar Erez`, and `Federico
    Lois` have been illuminating.


    `Christopher Balnave`, `Igor Ivanović`, and `David Ben Horin` read early drafts;
    their remarks were helpful.


    This book wouldn’t have been possible without support from my family: my wife
    Renata, my daughter Olivera, and my son Filip, who have supported and encouraged
    me.


    ## About the Author About the Technical Reviewer


    # 1. Getting Started with RavenDB


    In the narrow sense of the word, a *database* is a collection of information.
    In a broader meaning of that term, *database management system (`DBMS`)* is what
    we usually think about when we talk about “database ” - a system providing means
    for manipulating databases to define, store, manage, and retrieve data.


    Although many developers still consider relational database to be the “golden
    standard,” they are just one phase in the history of data persistence solutions.
    This chapter will go over a brief historical overview of `DBMS` and their origins,
    development, and produced solutions. As you will see, relational databases emerged
    as a solution to one set of problems. In the same way, engineers created `NoSQL`
    databases to solve the next-generation set of challenges.


    Finally, we will introduce `RavenDB` as a second-generation `NoSQL` database and
    look at its origins, history, and some of the features that make `RavenDB` an
    excellent choice both for small projects and large enterprise systems.'
