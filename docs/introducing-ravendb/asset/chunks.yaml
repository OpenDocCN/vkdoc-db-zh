- fmt: '# How to Start?


    The easiest way to start working with RavenDB is to open your browser and access
    [`http://live-test.ravendb.net/`](http://live-test.ravendb.net/). What will open
    for you is RavenDB studio.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig1_HTML.png)


    A screenshot of the Raven D B studio displays 5 tabs on the left and 5 small windows
    on the right. The windows are titled, traffic, databases, C P U, and memory, indexing,
    and storage. The tabs include databases, server dashboard, cluster dashboard,
    manage server, and about.


    Figure 1-1


    RavenDB Playground Server Studio


    What you are now looking at in Figure [1-1](#514303_1_En_1_Chapter.xhtml#Fig1)
    is RavenDB studio, a web application for managing your RavenDB server. As you
    can see, there is no need to install anything – your server is providing you with
    a web application accessible from all major web browsers.


    Playground Server is a public instance of RavenDB, open for everyone without a
    need to authenticate. You can create new databases, play around with them, and
    evaluate how RavenDB works.


    Caution


    Do not use Playground Server for anything but evaluation of RavenDB. Do not store
    any sensitive data in any of the databases. They are unprotected and open for
    anyone in the world to access, see all the databases, and read and modify data.
    Also, all databases are wiped out periodically.


    The easiest way to run RavenDB from your machine is Docker. If you already have
    it on your machine, all you have to do is to run the following command:


    ```

    docker run -d -p 8080:8080 -p 38888:38888 -e RAVEN_ARGS="--Setup.Mode=None --License.Eula.Accepted=true"
    ravendb/ravendb

    ```


    Docker will fetch the latest RavenDB image and will spin up a new container to
    run this image. Now, if you open `http://127.0.0.1:8080/`, you will see Studio
    in your browser.


    Note


    You are now running RavenDB in developer mode. There is no authentication nor
    authorization enforced. Developer mode is the only situation when RavenDB will
    allow unauthenticated access.


    You can also run RavenDB natively on Windows, Linux, OSX, and even Raspberry Pi.


    For example, to set up RavenDB on a Windows machine, go to [`https://ravendb.net/download`](https://ravendb.net/download),
    select “Windows 64” platform, and download zip archive. After unpacking an archive,
    execute `run.ps1` file and you will start RavenDB.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig2_HTML.png)


    A screenshot of the windows power shell displays the Raven D B console. It has
    lines of text which display the build version and specification.


    Figure 1-2


    RavenDB PowerShell Console in Windows


    As shown in Figure [1-2](#514303_1_En_1_Chapter.xhtml#Fig2), the server will run
    on IP address `127.0.0.1`, and the default browser will open with RavenDB End-User
    License Agreement.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig3_HTML.png)


    A screenshot of a window displays the end-user license agreement during the installation
    process for Raven D B software. There is an accept button at the bottom right
    corner, to complete the installation.


    Figure 1-3


    RavenDB License Agreement in a Default Browser


    After accepting License Agreement visible in Figure [1-3](#514303_1_En_1_Chapter.xhtml#Fig3),
    you will be presented with the first step of setup wizard.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig4_HTML.png)


    A screenshot of the Raven D B setup wizard window. It displays two types of security
    options for the setup, with details for each option.


    Figure 1-4


    RavenDB Setup Wizard, the First Step


    Since you will be running a local instance for development purposes, you can select
    “Unsecure” mode, as shown in Figure [1-4](#514303_1_En_1_Chapter.xhtml#Fig4).
    This will lead you to the second step of the setup wizard – Unsecure Mode Setup.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig5_HTML.png)


    A screenshot of the Raven D B setup wizard, unsecured mode setup page. It has
    3 text boxes labelled, H T T P port, T C P port, and I P address. It has an option
    below to create a new cluster and 2 buttons labelled back and next respectively
    are at the bottom.


    Figure 1-5


    RavenDB Setup Wizard, the Second Step


    Accepting default options shown in Figure [1-5](#514303_1_En_1_Chapter.xhtml#Fig5),
    and clicking on `Next` will bring you to the third and final step of the setup
    procedure.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig6_HTML.png)


    A screenshot of the third step in the Raven D B setup wizard, which displays the
    completed configuration and an option to restart the server or to go back.


    Figure 1-6


    RavenDB Setup Wizard, the Third and Final Step


    There is just one step, shown in Figure [1-6](#514303_1_En_1_Chapter.xhtml#Fig6),
    needed before you can start working with your local instance of RavenDB under
    Windows. Clicking on the `Restart server` button will restart the server and reload
    your browser window. Finally, `http://127.0.0.1:8080/studio/index.html` will open,
    and you will see the same screen from Figure [1-1](#514303_1_En_1_Chapter.xhtml#Fig1).'
