  trans: '

    ## 动态字段


    使用下划线 `_` 作为对象字面量名称只是一种约定。图 5-11 显示，将创建一个名为 `_` 的集合，但它没有内容。


    生成动态字段集合的函数定义如下：


    ```javascript

    function CreateDynamicFields(addr) {

    var ret = [];

    for (const property in addr) {

    ret.push(createField(property, addr[property], { indexing: ''Exact'', storage:
    false, termVector: null }))

    }

    return ret;

    }

    ```


    首先定义一个空数组。索引引擎将遍历地址的所有属性，并为每个属性添加一个新的动态字段。


    RavenDB 内置了以下 JS 函数：


    ```javascript

    createField(name, value, {options}).

    ```


    你可以使用它来创建一个动态字段 `name:property`。


    请注意，`CreateDynamicFields` 函数是完全通用的——没有指定确切的字段名。它可以处理传递给它的任何对象字面量，提取所有属性名称及其值，并为找到的每个属性创建动态字段。


    此外，修改员工文档将触发索引更新，并向索引词条中添加一个新字段。作为一个练习，请打开 ID 为 `employees/8-A` 的员工，并使用以下属性扩展其
    Address：


    ```json

    "Continent": "North America"

    ```


    保存更改后，验证是否已创建一个名为 `Continent` 的新索引词条集合。


    总的来说，动态字段是创建灵活索引的工具，这些索引可以处理异构数据，同时还能适应你的领域模型可能引入的未来变更。


    ## 扇出索引


    到目前为止，我们创建的索引都是处理文档的，并且为每个文档创建一个索引条目。例如，索引 `Employees/ByFirstName` 将获取所有九份员工文档，读取他们的名字，并为每个文档输出一个索引条目。图
    5-12 显示了此索引的摘要。


    ![](img/514303_1_En_5_Fig12_HTML.png)


    一张截图显示了名为 employees 的索引，带有一个复选框，显示“employees slash by first name”，共显示 9 个条目，状态为“up
    to date”，模式为“normal”，优先级为“normal”，锁定状态为“unlocked”。


    图 5-12


    索引 `Employees/ByFirstName` 的摘要


    摘要显示九个条目，每个文档一个。索引条目数等于集合中的文档数。


    可以编写一个索引，使其对每个处理的文档输出不止一个而是多个条目。这样的索引称为 *扇出索引*。代码清单 5-15 展示了这样一个索引的示例。


    ```javascript

    map(''Orders'', order => {

    var res = [];

    order.Lines.forEach(l => {

    res.push({

    ProductName: l.ProductName

    })

    });

    return res;

    })

    代码清单 5-15

    Orders/ByProductName 索引

    ```


    扇出索引可以为每个文档产生数十甚至数百个条目。代码清单 5-15 中的索引遍历每个订单中的所有订单项，并为每个订单项创建一个索引条目。每个这样的条目都包含一个产品名称。因此，对于每个订单文档，该索引将创建与订单项数量一样多的条目。


    现在，你可以查找所有包含指定产品名称订单项的订单：


    ```rql

    from index ''Orders/ByProductName'' where ProductName = ''chocolade''

    ```


    图 5-13 显示，检查特定订单的索引条目可以揭示其所有条目，并帮助你理解扇出原理。


    ![](img/514303_1_En_5_Fig13_HTML.png)


    一张截图显示了从索引 orders slash by product name 中查询 where i d = orders slash 154-a 的结果。结果面板中有一个包含
    3 列的表格，分别是预览、产品名称和 i d，以及一个删除文档按钮。


    图 5-13


    `Orders/154-a` 的索引条目


    回到索引概览，你会看到该索引包含 2,155 个条目，处理了 830 个订单。


    同样地，你可以为所有带有嵌入值的文档建立索引。


    ## 多地图索引


    到目前为止，我们定义的所有索引都是处理单个集合，加载其文档的属性，并将它们的值提取到索引条目中。然而，不同集合中的文档拥有相同属性的情况并不少见。一个典型的例子就是地址——在我们的示例数据集中，`Employees`、`Companies`
    和 `Suppliers` 都拥有这个属性。


    `Companies` 和 `Suppliers` 都是法人实体，不难想象在某些业务场景下，你希望按城市搜索这两者。一个可能的解决方案是创建 `Companies/ByCity`
    和 `Suppliers/ByCity` 索引。但是，你需要执行两次搜索才能得到完整结果：


    ```rql

    from index ''Companies/ByCity'' where City = ''paris''

    from index ''Suppliers/ByCity'' where City = ''paris''

    ```


    RavenDB 提供了一种将这两个索引合并为一个的方法。这种索引称为 *多地图索引*。


    对于我们的场景，定义这样一个索引并不比定义单地图索引更困难。首先，你需要选择一个名称。由于扫描了两个集合，你可以使用一个描述业务功能而非集合名称的名字，例如
    `Search/ByCity`。代码清单 5-16 展示了这个索引的定义。


    ```javascript

    map("Companies", company => {

    return {

    City: company.Address.City

    }

    })

    map("Suppliers", supplier => {

    return {

    City: supplier.Address.City

    }

    })

    代码清单 5-16

    Search/ByCity 索引

    ```


    你像往常一样添加第一个地图。然后，点击“添加地图”按钮。将会再打开一个文本区域，以便你添加第二个地图定义。你的多地图索引已准备好进行查询，如图 5-14 所示。


    ![](img/514303_1_En_5_Fig14_HTML.png)


    一张截图显示了从索引 search slash by city 中查询 where city = paris 的结果。结果面板中有一个包含 7 列的表格，分别是预览、i
    d、名称、外部 I d、联系人、地址和电话号码，以及一个删除文档按钮。


    图 5-14


    查询多地图 `Search/ByCity` 索引


    你得到的结果是所有位于巴黎的公司和供应商。


    你可以用另一个处理 `Employees` 的地图来扩展这个索引。我们将其留作你的练习。

    '
- fmt: '## Indexing Hierarchical Data


    Besides simple linear relations, your applications will inevitably need to represent
    and store more complex setups. One such structure is the hierarchy – chain of
    documents pointing to the next one sequentially. Typical representatives of hierarchical
    data are genealogical trees or threads of comments on a blog post.


    Our sample database contains one example of hierarchical data, as shown in Listing
    [5-17](#514303_1_En_5_Chapter.xhtml#PC42).


    ```

    {

    "LastName": "Dodsworth",

    "FirstName": "Anne",

    ...

    "ReportsTo": "employees/5-A",

    ...

    ```


    Listing 5-17

    `ReportsTo` property of `employees/9-A` document


    Every employee has `ReportsTo` property that contains the identifier of another
    employee. In this chapter, you already saw examples of how to index related documents,
    so it is easy to come up with an index presented in Listing [5-18](#514303_1_En_5_Chapter.xhtml#PC43).


    ```

    map("Employees", emp => {

    return {

    Manager : load(emp.ReportsTo, "Employees").FirstName

    }

    })

    ```


    Listing 5-18

    `Employees/ByReportsToFirstName` index


    Looking at index terms for this index, you can see it contains just two names:
    Andrew and Steven. Querying index for both of these names


    ```

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Andrew''

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Steven''

    ```


    will reveal the structure of Northwind Traders company: Anne, Michael, and Robert
    report directly to Steven. Everyone else, including Steven, reports directly to
    Andrew. This hierarchy is also revealing itself in employee titles. Andrew is
    “Vice President, Sales” and Steven is “Sales Manager.” All other employees bear
    “Sales Representative” and “Inside Sales Coordinator.”


    An important thing to notice here is Andrew’s `ReportsTo` property:


    ```

    "ReportsTo": null

    ```


    This property is null, and `Employees/ByReportsToFirstName` will execute the following
    line:


    ```

    load(null, "Employees").FirstName

    ```


    However, unlike most programming languages, the null reference here will not create
    any problems. RavenDB will recognize an attempt to load a nonexisting document
    and handle that gracefully – it will not generate any indexing entries for Andrew.
    If you check the overview for this index, you will see that it has eight entries
    for nine processed employees.


    The hierarchy we just computed is not a complete one – just direct superiors were
    fetched. After fetching a direct manager for every employee, we can continue climbing
    up the hierarchy tree until we reach the topmost manager in the hierarchy. Listing
    [5-19](#514303_1_En_5_Chapter.xhtml#PC47) defines an index that collects every
    employee’s direct and indirect managers.


    ```

    map("Employees", empl => {

    if (empl.ReportsTo == null) return null;

    var managerNames = [];

    while (true) {

    empl = load(empl.ReportsTo, "Employees");

    if (empl == null)

    break;

    managerNames.push(empl.FirstName);

    }

    return {

    Manager: managerNames

    }

    })

    ```


    Listing 5-19

    `Employees/ByManagers` index


    This index contains the same terms as a previous one (`Employees/ByReportsToFirstName`),
    but indexing entries are different, as shown in Figure [5-15](#514303_1_En_5_Chapter.xhtml#Fig15).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig15_HTML.png)


    A screenshot displays a query from index `employees slash by managers where manager
    = steven`. The results panel has a table with 3 columns, preview, manager, and
    i d, statistics tab, and delete documents button.


    Figure 5-15

    Indexing Entries for `Employees/ByManagers` Index


    As you can see, we queried for all employees where a manager is Steven, and we
    got all three of them. However, index entries for these employees contain both
    Steven and Andrew – as we were looping up the hierarchy in Listing [5-19](#514303_1_En_5_Chapter.xhtml#PC47),
    Steven was added to an array, followed by Andrew, loaded as Steven’s reporting
    officer.


    Recursive nature of this index can be expressed in a declarative manner. RavenDB
    provides JS function `recurse` of the form


    ```

    recurse(start_document, func(doc) -> doc)

    ```


    which will start from a specified document and apply a `func` in a recursive way
    – returned document will be fed as an input to `func`. This chain of calls, defined
    in Listing [5-20](#514303_1_En_5_Chapter.xhtml#PC49), will continue up to the
    point when `func` returns null.


    ```

    map("Employees", empl => {

    var reportsTo = load(empl.ReportsTo, "Employees");

    return recurse(reportsTo, x => load(x.ReportsTo, "Employees"))

    .map(boss => {

    return { Managers: boss.FirstName };

    });

    })

    ```


    Listing 5-20

    Recursive version of `Employees/ByManagers` index


    Both imperative and declarative versions of this index are equal in the result.
    You will be able to query hierarchy by any of the values in the chain.


    ## Summary


    In this chapter, we introduced static indexes to define an index explicitly. You
    saw ways to index one or multiple collections and specify dynamic fields, stored
    fields, and computed fields of such index. We presented techniques for indexing
    references to other documents and approaches to handle hierarchical data structures.


    The next chapter will show how to create indexes performing data aggregations.


    ## 6. MapReduce Indexes


    The previous chapter demonstrated complete control over an index’s definition
    and life cycle. Map and MultiMap indexes were introduced, along with various ways
    to compute fields that can be used to filter and sort documents. This chapter
    will show how to perform grouping and aggregation in RavenDB. Concepts of MapReduce
    and MultiMapReduce indexes will be introduced, along with a way to materialize
    the content of the index into a new collection.


    ### Grouping


    Queries executed in the previous chapter were about filtering. The filtering condition
    was defined, and the database returned all documents that matched it. Typical
    queries of this kind look like this:


    ```

    from index ''Auto/Employees/ByFirstName''

    where FirstName = ''Nancy''

    ```


    or


    ```

    from index ''Orders/ByEmployeeNameByTotal''

    where Total > 15000

    ```


    Besides filtering documents, RavenDB is also capable of grouping data. Let’s say
    that we would like to analyze Orders by the shipping country. You can achieve
    that by running the query shown in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3).


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country

    ```


    Listing 6-1

    Grouping orders by the country of shipment


    This query will result in a list of 21 different countries Northwind Traders sent
    orders to, as shown in Figure [6-1](#514303_1_En_6_Chapter.xhtml#Fig1).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig1_HTML.png)


    A snapshot of the query result of a list of 21 countries. France, Germany, Belgium,
    Brazil are some of the countries in the list.


    Figure 6-1

    Shipping Countries for Orders


    As with all previous queries you saw, this one also uses an index to return results.
    Since we did not define static one upfront, RavenDB created the automatic index
    `Auto/OrdersReducedByShipTo.Country` which is visible in the listing of all indexes
    for your database. Clicking on it will reveal index details shown in Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig2_HTML.png)


    A snapshot of all indexes database for the country available in the database.


    Figure 6-2

    Structure of Auto Index `Auto/OrdersReducedByShipTo.Country`


    Documents from `Orders` collection were processed, their `ShipTo.Country` values
    were extracted, and IDs of orders with the same values were stored in index entries.
    RavenDB uses a specific programming model we will examine in the next section
    for processing grouping tasks.'
  raw: '## Indexing Hierarchical Data


    Besides simple linear relations, your applications will inevitably need to represent
    and store more complex setups. One such structure is the hierarchy – chain of
    documents pointing to the next one sequentially. Typical representatives of hierarchical
    data are genealogical trees or threads of comments on a blog post.


    Our sample database contains one example of hierarchical data, as shown in Listing
    [5-17](#514303_1_En_5_Chapter.xhtml#PC42).


    ```

    {

    "LastName": "Dodsworth",

    "FirstName": "Anne",

    ...

    "ReportsTo": "employees/5-A",

    ...

    Listing 5-17

    ReportsTo property of employees/9-A document

    ```


    Every employee has *ReportsTo* property that contains the identifier of another
    employee. In this chapter, you already saw examples of how to index related documents,
    so it is easy to come up with an index presented in Listing [5-18](#514303_1_En_5_Chapter.xhtml#PC43).


    ```

    map("Employees", emp => {

    return {

    Manager : load(emp.ReportsTo, "Employees").FirstName

    }

    })

    Listing 5-18

    Employees/ByReportsToFirstName index

    ```


    Looking at index terms for this index, you can see it contains just two names:
    Andrew and Steven. Querying index for both of these names


    ```

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Andrew''

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Steven''

    ```


    will reveal the structure of Northwind Traders company: Anne, Michael, and Robert
    report directly to Steven. Everyone else, including Steven, reports directly to
    Andrew. This hierarchy is also revealing itself in employee titles. Andrew is
    “Vice President, Sales” and Steven is “Sales Manager.” All other employees bear
    “Sales Representative” and “Inside Sales Coordinator.”


    An important thing to notice here is Andrew’s *ReportsTo* property:


    ```

    "ReportsTo": null

    ```


    This property is null, and *Employees/ByReportsToFirstName* will execute the following
    line:


    ```

    load(null, "Employees").FirstName

    ```


    However, unlike most programming languages, the null reference here will not create
    any problems. RavenDB will recognize an attempt to load a nonexisting document
    and handle that gracefully – it will not generate any indexing entries for Andrew.
    If you check the overview for this index, you will see that it has eight entries
    for nine processed employees.


    The hierarchy we just computed is not a complete one – just direct superiors were
    fetched. After fetching a direct manager for every employee, we can continue climbing
    up the hierarchy tree until we reach the topmost manager in the hierarchy. Listing
    [5-19](#514303_1_En_5_Chapter.xhtml#PC47) defines an index that collects every
    employee’s direct and indirect managers .


    ```

    map("Employees", empl => {

    if (empl.ReportsTo == null) return null;

    var managerNames = [];

    while (true) {

    empl = load(empl.ReportsTo, "Employees");

    if (empl == null)

    break;

    managerNames.push(empl.FirstName);

    }

    return {

    Manager: managerNames

    }

    })

    Listing 5-19

    Employees/ByManagers index

    ```


    This index contains the same terms as a previous one (*Employees/ByReportsToFirstName*),
    but indexing entries are different, as shown in Figure [5-15](#514303_1_En_5_Chapter.xhtml#Fig15).


    ![](images/514303_1_En_5_Chapter/514303_1_En_5_Fig15_HTML.png)


    A screenshot displays a query from index employees slash by managers where manager
    = steven. The results panel has a table with 3 columns, preview, manager, and
    i d, statistics tab, and delete documents button.


    Figure 5-15


    Indexing Entries for Employees/ByManagers Index


    As you can see, we queried for all employees where a manager is Steven, and we
    got all three of them. However, index entries for these employees contain both
    Steven and Andrew – as we were looping up the hierarchy in Listing [5-19](#514303_1_En_5_Chapter.xhtml#PC47),
    Steven was added to an array , followed by Andrew, loaded as Steven’s reporting
    officer.


    Recursive nature of this index can be expressed in a declarative manner. RavenDB
    provides JS function `recurse` of the form


    ```

    recurse(start_document, func(doc) -> doc)

    ```


    which will start from a specified document and apply a `func` in a recursive way
    – returned document will be fed as an input to `func`. This chain of calls, defined
    in Listing [5-20](#514303_1_En_5_Chapter.xhtml#PC49), will continue up to the
    point when `func` returns null.


    ```

    map("Employees", empl => {

    var reportsTo = load(empl.ReportsTo, "Employees");

    return recurse(reportsTo, x => load(x.ReportsTo, "Employees"))

    .map(boss => {

    return { Managers: boss.FirstName };

    });

    })

    Listing 5-20

    Recursive version of Employees/ByManagers index

    ```


    Both imperative and declarative versions of this index are equal in the result.
    You will be able to query hierarchy by any of the values in the chain .


    ## Summary


    In this chapter, we introduced static indexes to define an index explicitly. You
    saw ways to index one or multiple collections and specify dynamic fields, stored
    fields, and computed fields of such index. We presented techniques for indexing
    references to other documents and approaches to handle hierarchical data structures.


    The next chapter will show how to create indexes performing data aggregations.


    # 6. MapReduce Indexes


    The previous chapter demonstrated complete control over an index’s definition
    and life cycle. Map and MultiMap indexes were introduced, along with various ways
    to compute fields that can be used to filter and sort documents. This chapter
    will show how to perform grouping and aggregation in RavenDB. Concepts of MapReduce
    and MultiMapReduce indexes will be introduced, along with a way to materialize
    the content of the index into a new collection.


    ## Grouping


    Queries executed in the previous chapter were about filtering. The filtering condition
    was defined, and the database returned all documents that matched it. Typical
    queries of this kind look like this:


    ```

    from index ''Auto/Employees/ByFirstName''

    where FirstName = ''Nancy''

    ```


    or


    ```

    from index ''Orders/ByEmployeeNameByTotal''

    where Total > 15000

    ```


    Besides filtering documents, RavenDB is also capable of grouping data . Let’s
    say that we would like to analyze Orders by the shipping country. You can achieve
    that by running the query shown in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3).


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country

    Listing 6-1

    Grouping orders by the country of shipment

    ```


    This query will result in a list of 21 different countries Northwind Traders sent
    orders to, as shown in Figure [6-1](#514303_1_En_6_Chapter.xhtml#Fig1).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig1_HTML.png)


    A snapshot of the query result of a list of 21 countries. France, Germany, Belgium,
    Brazil are some of the countries in the list.


    Figure 6-1


    Shipping Countries for Orders


    As with all previous queries you saw, this one also uses an index to return results.
    Since we did not define static one upfront, RavenDB created the automatic index
    *Auto/OrdersReducedByShipTo.Country* which is visible in the listing of all indexes
    for your database. Clicking on it will reveal index details shown in Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig2_HTML.png)


    A snapshot of all indexes database for the country available in the database.


    Figure 6-2


    Structure of Auto Index `Auto/OrdersReducedByShipTo.Country`


    Documents from Orders collection were processed, their *ShipTo.Country* values
    were extracted, and IDs of orders with the same values were stored in index entries.
    RavenDB uses a specific programming model we will examine in the next section
    for processing grouping tasks .'
  trans: '## 索引层次结构数据


    除了简单的线性关系外，你的应用程序不可避免地需要表示和存储更复杂的结构。其中一种结构是层次结构——一系列按顺序指向下一个文档的链。层次数据的典型代表是家谱树或博客文章的评论线程。


    我们的示例数据库包含一个层次数据的例子，如代码清单 5-17 所示。


    ```

    {

    "LastName": "Dodsworth",

    "FirstName": "Anne",

    ...

    "ReportsTo": "employees/5-A",

    ...

    ```


    代码清单 5-17

    `employees/9-A` 文档的 `ReportsTo` 属性


    每位员工都有一个 `ReportsTo` 属性，其中包含另一名员工的标识符。在本章中，你已经看到了如何索引相关文档的示例，因此很容易想到代码清单 5-18
    中展示的索引。


    ```

    map("Employees", emp => {

    return {

    Manager : load(emp.ReportsTo, "Employees").FirstName

    }

    })

    ```


    代码清单 5-18

    `Employees/ByReportsToFirstName` 索引


    查看此索引的索引项，你会看到它只包含两个名字：Andrew 和 Steven。查询索引获取这两个名字


    ```

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Andrew''

    from index ''Employees/ByReportsToFirstName'' where Manager = ''Steven''

    ```


    将揭示 Northwind Traders 公司的结构：Anne、Michael 和 Robert 直接向 Steven 汇报。其他所有人，包括 Steven，都直接向
    Andrew 汇报。这个层次结构也体现在员工的职称上。Andrew 是“销售副总裁”，Steven 是“销售经理”。所有其他员工则担任“销售代表”和“内部销售协调员”。


    这里需要注意的一个重要事项是 Andrew 的 `ReportsTo` 属性：


    ```

    "ReportsTo": null

    ```


    此属性为 null，`Employees/ByReportsToFirstName` 将执行以下行：


    ```

    load(null, "Employees").FirstName

    ```


    然而，与大多数编程语言不同，这里的 null 引用不会造成任何问题。RavenDB 会识别尝试加载不存在文档的操作，并优雅地处理——它不会为 Andrew
    生成任何索引条目。如果你检查此索引的概述，你会看到它针对九名已处理员工只有八个条目。


    我们刚才计算的层次结构并不完整——只获取了直接上级。在为每位员工获取了直接经理后，我们可以继续沿着层次树向上攀升，直到到达层次结构中的最高层经理。代码清单
    5-19 定义了一个索引，用于收集每位员工的直接和间接经理。


    ```

    map("Employees", empl => {

    if (empl.ReportsTo == null) return null;

    var managerNames = [];

    while (true) {

    empl = load(empl.ReportsTo, "Employees");

    if (empl == null)

    break;

    managerNames.push(empl.FirstName);

    }

    return {

    Manager: managerNames

    }

    })

    ```


    代码清单 5-19

    `Employees/ByManagers` 索引


    此索引包含的索引项与上一个索引（`Employees/ByReportsToFirstName`）相同，但索引条目不同，如图 5-15 所示。


    ![](img/514303_1_En_5_Fig15_HTML.png)


    屏幕截图显示了对索引 `employees slash by managers where manager = steven` 的查询。结果面板包含一个有
    3 列（预览、经理和 i d）的表格、统计信息选项卡和删除文档按钮。


    图 5-15

    `Employees/ByManagers` 索引的索引条目


    如你所见，我们查询了经理是 Steven 的所有员工，并且我们得到了所有三个人。然而，这些员工的索引条目同时包含了 Steven 和 Andrew——正如我们在代码清单
    5-19 中循环向上遍历层次结构时，Steven 被添加到数组中，然后是作为 Steven 上级官员被加载的 Andrew。


    此索引的递归性质可以用声明性的方式表达。RavenDB 提供了 JS 函数 `recurse`，形式如下：


    ```

    recurse(start_document, func(doc) -> doc)

    ```


    它将从指定的文档开始，以递归方式应用 `func`——返回的文档将作为输入传递给 `func`。如代码清单 5-20 中定义的调用链将持续进行，直到 `func`
    返回 null。


    ```

    map("Employees", empl => {

    var reportsTo = load(empl.ReportsTo, "Employees");

    return recurse(reportsTo, x => load(x.ReportsTo, "Employees"))

    .map(boss => {

    return { Managers: boss.FirstName };

    });

    })

    ```


    代码清单 5-20

    `Employees/ByManagers` 索引的递归版本


    此索引的命令式和声明式版本在结果上是等价的。你将能够通过链中的任何值查询层次结构。


    ## 总结


    在本章中，我们介绍了静态索引以显式定义索引。你了解了索引单个或多个集合的方法，并指定了此类索引的动态字段、存储字段和计算字段。我们介绍了索引对其他文档引用的技术，以及处理层次数据结构的方法。


    下一章将展示如何创建执行数据聚合的索引。


    ## 6. MapReduce 索引


    上一章展示了对索引定义和生命周期的完全控制。介绍了 Map 和 MultiMap 索引，以及各种可用于过滤和排序文档的计算字段的方法。本章将展示如何在 RavenDB
    中执行分组和聚合。将介绍 MapReduce 和 MultiMapReduce 索引的概念，以及将索引内容具体化到新集合的方法。


    ### 分组


    上一章执行的查询是关于过滤的。定义了过滤条件，数据库返回所有匹配的文档。这类典型查询如下所示：


    ```

    from index ''Auto/Employees/ByFirstName''

    where FirstName = ''Nancy''

    ```


    或


    ```

    from index ''Orders/ByEmployeeNameByTotal''

    where Total > 15000

    ```


    除了过滤文档，RavenDB 还能够对数据进行分组。假设我们想按发货国家/地区分析订单。你可以通过运行代码清单 6-1 所示的查询来实现。


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country

    ```


    代码清单 6-1

    按发货国家/地区对订单进行分组


    此查询将生成一个包含 Northwind Traders 发送订单的 21 个不同国家/地区的列表，如图 6-1 所示。


    ![](img/514303_1_En_6_Fig1_HTML.png)


    查询结果快照，显示一个包含 21 个国家/地区的列表。法国、德国、比利时、巴西是列表中的一些国家/地区。


    图 6-1

    订单的发货国家/地区


    与你之前看到的所有查询一样，此查询也使用索引来返回结果。由于我们没有预先定义静态索引，RavenDB 创建了自动索引 `Auto/OrdersReducedByShipTo.Country`，该索引在数据库的所有索引列表中可见。单击它将显示如图
    6-2 所示的索引详细信息。


    ![](img/514303_1_En_6_Fig2_HTML.png)


    数据库中所有索引的快照，按国家/地区分类。


    图 6-2

    自动索引 `Auto/OrdersReducedByShipTo.Country` 的结构


    处理了来自 `Orders` 集合的文档，提取了它们的 `ShipTo.Country` 值，并将具有相同值的订单 ID 存储在索引条目中。RavenDB
    使用一种特定的编程模型来处理分组任务，我们将在下一节中研究它。'
- fmt: '## MapReduce


    Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2) displays a visualization of the
    data grouping pipeline in an index. At the top of this diagram, you will see the
    `Map-Reduce` heading, denoting this index type. Alternatively spelled as `MapReduce`,
    this technique popularized by Google is used for the parallel processing of data
    across many machines. In a typical setup, data is first split into batches. Every
    batch is sent to a different device, which will use the `map` function to transform
    all entries in the received collection. Mapped entries are then combined via `reduce`
    function to produce the final result set.


    The previous chapter saw examples of automatic and static indexes implementing
    map functions to transform documents into indexing entries. MapReduce index will
    take such mapped entries and apply reduce function to them, emitting grouped entries.
    RavenDB is using a variant of this programming model.


    Unlike original MapReduce used at companies like Google, where data batches are
    distributed across hundreds and thousands of machines, RavenDB performs this process
    on a single machine. Multiple threads will receive packs, apply map function to
    emit projections first, and then apply reduce function to these projections.


    RavenDB has a MapReduce visualizer that can help you examine MapReduce indexes.
    You can open it by clicking on the Indexes option in a sidebar, then the Map-Reduce
    Visualizer option, as shown in Figure [6-3](#514303_1_En_6_Chapter.xhtml#Fig3).
    Understanding this process can be a bit tedious if this is the first time you
    are working with MapReduce or when you want to debug results over a large amount
    of data.


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig3_HTML.png)


    A snapshot of the selecting index, entering documents, area of interest, and map-reduce
    details options for the map-reduce menu.


    Figure 6-3


    Map-Reduce Visualizer Initial Screen


    On this screen , you can select the index your query created a moment ago, `Auto/OrdersReducedByShipTo.Country`,
    and select documents to present visualization for. Selecting `orders/1-a` and
    `orders/103-a` will generate representation as in Figure [6-4](#514303_1_En_6_Chapter.xhtml#Fig4).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig4_HTML.jpg)


    A snapshot of the orders being ready to ship to France.


    Figure 6-4


    Map-Reduce Visualization of Auto/OrdersReducedByShipTo.Country Index for orders/1-a
    and orders/103-a


    Map phase of the index extracted `ShipTo.Country`, while Reduce phase collected
    all orders with same shipping country. In Figure [6-4](#514303_1_En_6_Chapter.xhtml#Fig4),
    you can see that the reduction phase gathered these two orders together since
    their shipping countries match. If you check the documents for these two orders,
    you will know that they went to France.


    Clicking on the reduction box will expand the tree’s root, as shown in Figure
    [6-5](#514303_1_En_6_Chapter.xhtml#Fig5).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig5_HTML.png)


    A snapshot of the tree roots expansion for the two orders.


    Figure 6-5


    Reduction Outcome Details


    You can see that the reduction phase grouped numerous orders shipped to France
    and that the two orders we selected are just two of many such orders. Clicking
    on the reduction box will show a scrollable listing of all these orders, as shown
    in Figure [6-6](#514303_1_En_6_Chapter.xhtml#Fig6).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig6_HTML.png)


    A snapshot of the scrollable listing of all the orders.


    Figure 6-6


    Reducing Orders Shipped to France


    The ability for a database to perform groupings like this one is nice, but it
    is not too valuable. The full power of grouping comes with aggregation, which
    we will cover in the next section.


    ## Aggregation


    We started this chapter with a query shown in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3).
    When executed, it will produce a list of shipping countries. However, we would
    like to see how many orders are shipped to these countries. Query returning that
    info is shown in Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4).


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country, count()

    ```


    Listing 6-2

    Grouping and counting orders by the country of shipment


    If you compare Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4) with the previous
    query in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3), you can see that we
    expanded the select statement with `count()`. This query expansion will result
    in the addition of results, as shown in Figure [6-7](#514303_1_En_6_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig7_HTML.png)


    A snapshot of the shipping countries and their order counts.


    Figure 6-7


    Shipping Countries for Orders Expanded with Count


    Counts shown are calculated by applying the process of `aggregation` – calculating
    combined values for a group of results. In this case, RavenDB counted one for
    every order in a `country group` and came up with a total sum. Finally, we can
    execute this query:


    ```

    from Orders as o

    group by o.ShipTo.Country

    order by count() as long desc

    select o.ShipTo.Country, count()

    ```


    and obtain a piece of useful information regarding the “Northwind Traders” business
    – most of their orders, 122, were delivered to customers in the United States
    and Germany.


    As you can see, this query created the new automatic index `Auto/Orders/ByCountReducedByShipTo.Country`,
    and clicking on its name in the list of all indexes will reveal its internal structure,
    as shown in Figure [6-8](#514303_1_En_6_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig8_HTML.png)


    A snapshot of the collection, group by, and result of the orders reduced.


    Figure 6-8


    Structure of `Auto/Orders/ByCountReducedByShipTo.Country`


    If you compare this with Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2), you
    can see that the original automatic index was augmented with `count` operation
    in the aggregation phase.


    Examining indexing terms for this index reveals fields with names `Count` and
    `ShipTo.Country`. These two aggregation categories provide us with a way to find
    out how many shipments went to Finland:


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''ShipTo.Country'' = ''finland''

    ```


    or to get a listing of all countries with more than 80 orders shipped to


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```'
  raw: '## MapReduce


    Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2) displays a visualization of the
    data grouping pipeline in an index. At the top of this diagram, you will see the
    *Map-Reduce* heading, denoting this index type. Alternatively spelled as *MapReduce*,
    this technique popularized by Google is used for the parallel processing of data
    across many machines. In a typical setup, data is first split into batches. Every
    batch is sent to a different device, which will use the *map* function to transform
    all entries in the received collection. Mapped entries are then combined via *reduce*
    function to produce the final result set.


    The previous chapter saw examples of automatic and static indexes implementing
    map functions to transform documents into indexing entries. MapReduce index will
    take such mapped entries and apply reduce function to them, emitting grouped entries.
    RavenDB is using a variant of this programming model.


    Unlike original MapReduce used at companies like Google, where data batches are
    distributed across hundreds and thousands of machines, RavenDB performs this process
    on a single machine. Multiple threads will receive packs, apply map function to
    emit projections first, and then apply reduce function to these projections.


    RavenDB has a MapReduce visualizer that can help you examine MapReduce indexes.
    You can open it by clicking on the Indexes option in a sidebar, then the Map-Reduce
    Visualizer option, as shown in Figure [6-3](#514303_1_En_6_Chapter.xhtml#Fig3).
    Understanding this process can be a bit tedious if this is the first time you
    are working with MapReduce or when you want to debug results over a large amount
    of data.


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig3_HTML.png)


    A snapshot of the selecting index, entering documents, area of interest, and map-reduce
    details options for the map-reduce menu.


    Figure 6-3


    Map-Reduce Visualizer Initial Screen


    On this screen , you can select the index your query created a moment ago, *Auto/OrdersReducedByShipTo.Country*,
    and select documents to present visualization for. Selecting orders/1-a and orders/103-a
    will generate representation as in Figure [6-4](#514303_1_En_6_Chapter.xhtml#Fig4).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig4_HTML.jpg)


    A snapshot of the orders being ready to ship to France.


    Figure 6-4


    Map-Reduce Visualization of Auto/OrdersReducedByShipTo.Country Index for orders/1-a
    and orders/103-a


    Map phase of the index extracted ShipTo.Country, while Reduce phase collected
    all orders with same shipping country. In Figure [6-4](#514303_1_En_6_Chapter.xhtml#Fig4),
    you can see that the reduction phase gathered these two orders together since
    their shipping countries match. If you check the documents for these two orders,
    you will know that they went to France.


    Clicking on the reduction box will expand the tree’s root, as shown in Figure
    [6-5](#514303_1_En_6_Chapter.xhtml#Fig5).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig5_HTML.png)


    A snapshot of the tree roots expansion for the two orders.


    Figure 6-5


    Reduction Outcome Details


    You can see that the reduction phase grouped numerous orders shipped to France
    and that the two orders we selected are just two of many such orders. Clicking
    on the reduction box will show a scrollable listing of all these orders, as shown
    in Figure [6-6](#514303_1_En_6_Chapter.xhtml#Fig6).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig6_HTML.png)


    A snapshot of the scrollable listing of all the orders.


    Figure 6-6


    Reducing Orders Shipped to France


    The ability for a database to perform groupings like this one is nice, but it
    is not too valuable. The full power of grouping comes with aggregation, which
    we will cover in the next section.


    ## Aggregation


    We started this chapter with a query shown in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3).
    When executed, it will produce a list of shipping countries. However, we would
    like to see how many orders are shipped to these countries. Query returning that
    info is shown in Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4).


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country, count()

    Listing 6-2

    Grouping and counting orders by the country of shipment

    ```


    If you compare Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4) with the previous
    query in Listing [6-1](#514303_1_En_6_Chapter.xhtml#PC3), you can see that we
    expanded the select statement with *count()*. This query expansion will result
    in the addition of results, as shown in Figure [6-7](#514303_1_En_6_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig7_HTML.png)


    A snapshot of the shipping countries and their order counts.


    Figure 6-7


    Shipping Countries for Orders Expanded with Count


    Counts shown are calculated by applying the process of *aggregation* – calculating
    combined values for a group of results. In this case, RavenDB counted one for
    every order in a *country group* and came up with a total sum. Finally, we can
    execute this query:


    ```

    from Orders as o

    group by o.ShipTo.Country

    order by count() as long desc

    select o.ShipTo.Country, count()

    ```


    and obtain a piece of useful information regarding the “Northwind Traders” business
    – most of their orders, 122, were delivered to customers in the United States
    and Germany.


    As you can see, this query created the new automatic index `Auto/Orders/ByCountReducedByShipTo.Country`,
    and clicking on its name in the list of all indexes will reveal its internal structure,
    as shown in Figure [6-8](#514303_1_En_6_Chapter.xhtml#Fig8).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig8_HTML.png)


    A snapshot of the collection, group by, and result of the orders reduced.


    Figure 6-8


    Structure of `Auto/Orders/ByCountReducedByShipTo.Country`


    If you compare this with Figure [6-2](#514303_1_En_6_Chapter.xhtml#Fig2), you
    can see that the original automatic index was augmented with count operation in
    the aggregation phase.


    Examining indexing terms for this index reveals fields with names `Count` and
    `ShipTo.Country`. These two aggregation categories provide us with a way to find
    out how many shipments went to Finland :


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''ShipTo.Country'' = ''finland''

    ```


    or to get a listing of all countries with more than 80 orders shipped to


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```'
  trans: '

    ## MapReduce


    图 6-2 展示了索引中数据分组管道的可视化。在此图的顶部，你会看到 `Map-Reduce` 标题，表示此索引类型。这种由 Google 推广的技术，其另一种拼写为
    `MapReduce`，用于跨多台机器并行处理数据。在典型设置中，数据首先被拆分成批次。每个批次被发送到不同的设备，该设备将使用 `map` 函数转换接收到的集合中的所有条目。然后，映射后的条目通过
    `reduce` 函数组合，产生最终结果集。


    上一章介绍了自动和静态索引的示例，它们实现了映射函数来将文档转换为索引条目。MapReduce 索引将获取此类映射条目，并对其应用归约函数，输出分组后的条目。RavenDB
    使用了这种编程模型的一个变体。


    与 Google 等公司使用的原始 MapReduce 不同（其数据批次分布在成百上千台机器上），RavenDB 在单台机器上执行此过程。多个线程将接收数据包，首先应用映射函数以输出投影，然后对这些投影应用归约函数。


    RavenDB 有一个 MapReduce 可视化器，可以帮助你检查 MapReduce 索引。你可以通过点击侧边栏中的“索引”选项，然后点击“Map-Reduce
    Visualizer”选项来打开它，如图 6-3 所示。如果你是第一次使用 MapReduce，或者需要在大数据集上调试结果，理解这个过程可能会有点繁琐。


    ![](img/514303_1_En_6_Fig3_HTML.png)


    Map-Reduce 菜单中选择索引、输入文档、兴趣区域以及 map-reduce 详细信息选项的截图。


    图 6-3


    Map-Reduce 可视化器初始屏幕


    在此屏幕上，你可以选择你刚才查询创建的索引，`Auto/OrdersReducedByShipTo.Country`，并选择文档以展示可视化效果。选择 `orders/1-a`
    和 `orders/103-a` 将生成如图 6-4 所示的表示。


    ![](img/514303_1_En_6_Fig4_HTML.jpg)


    准备发往法国的订单截图。


    图 6-4


    Auto/OrdersReducedByShipTo.Country 索引对于 orders/1-a 和 orders/103-a 的 Map-Reduce
    可视化


    索引的映射阶段提取了 `ShipTo.Country`，而归约阶段收集了所有具有相同发货国家的订单。在图 6-4 中，你可以看到归约阶段将这两个订单收集在一起，因为它们的发货国家匹配。如果你查看这两个订单的文档，你会知道它们被发往了法国。


    点击归约框将展开树的根节点，如图 6-5 所示。


    ![](img/514303_1_En_6_Fig5_HTML.png)


    两个订单的树根扩展截图。


    图 6-5


    归约结果详情


    你可以看到归约阶段将发往法国的众多订单分组，而我们选择的两个订单只是众多订单中的两个。点击归约框将显示所有这些订单的可滚动列表，如图 6-6 所示。


    ![](img/514303_1_En_6_Fig6_HTML.png)


    所有订单的可滚动列表截图。


    图 6-6


    归并发往法国的订单


    数据库能够执行此类分组固然不错，但其价值并不太大。分组能力的真正威力在于聚合，我们将在下一节中介绍。


    ## 聚合


    我们以清单 6-1 所示的查询开始了本章。执行时，它将产生一个发货国家列表。然而，我们想看到有多少订单被发往了这些国家。显示该信息的查询如清单 6-2 所示。


    ```

    from Orders as o

    group by o.ShipTo.Country

    select o.ShipTo.Country, count()

    ```


    清单 6-2

    按发货国家对订单进行分组和计数


    如果你将清单 6-2 与清单 6-1 中的前一个查询进行比较，可以看到我们用 `count()` 扩展了 select 语句。此查询扩展将导致结果的增加，如图
    6-7 所示。


    ![](img/514303_1_En_6_Fig7_HTML.png)


    发货国家及其订单数量截图。


    图 6-7


    扩展了计数的订单发货国家


    显示的计数是通过应用 `aggregation`（聚合）过程计算的——即为一组结果计算合并值。在此情况下，RavenDB 为 `国家组` 中的每个订单计数为一，并计算出总和。最后，我们可以执行此查询：


    ```

    from Orders as o

    group by o.ShipTo.Country

    order by count() as long desc

    select o.ShipTo.Country, count()

    ```


    并获得关于“Northwind Traders”业务的一些有用信息——其大部分订单（122 个）被交付给了美国和德国的客户。


    如你所见，此查询创建了新的自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`，在索引列表中点击其名称将揭示其内部结构，如图
    6-8 所示。


    ![](img/514303_1_En_6_Fig8_HTML.png)


    订单的集合、分组依据和归约结果的截图。


    图 6-8


    `Auto/Orders/ByCountReducedByShipTo.Country` 的结构


    如果你将此与图 6-2 进行比较，可以看到原始的自动索引在聚合阶段增加了 `count` 操作。


    检查此索引的索引项，会发现名为 `Count` 和 `ShipTo.Country` 的字段。这两个聚合类别为我们提供了一种方法来找出有多少批货发往了芬兰：


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''ShipTo.Country'' = ''finland''

    ```


    或者获取所有订单发货数量超过 80 的国家列表：


    ```

    from index ''Auto/Orders/ByCountReducedByShipTo.Country''

    where ''Count'' > 80

    ```

