    indeed. Relational databases like SQL Server or PostgreSQL will provide you with
    a way to strongly type columns and to check referential integrity, preventing
    you from establishing a reference to a nonexistent entity. However, observing
    databases in the broader context of data persistence gives a significantly different
    angle.


    Unlike the 1980s and 1990s, today’s modeling methodologies (such as domain-driven
    design) are not centered around databases as a starting point in the modeling
    process. Instead, they recommend modeling the business domain in the programming
    language and then persisting domain entities into the database. In the past, most
    planning meetings were starting in front of the whiteboard, where developers would
    draw relational database tables, fields, and lots of Foreign Keys establishing
    relationships between them. This process looked very similar to UML diagrams construction,
    except that the database was “center of the world” and whole systems planning
    started with modeling a database. Following persistence model, entities in the
    programming language were modeled, along with CRUD operations to manage these
    entities.


    From the perspective of database “centrism ,” offloading validation to the database
    is something you are naturally striving for. However, as domain modeling techniques
    advanced and developed, we reached the present day where modeling is done at the
    conceptual level of Aggregates, Entities, and Value Objects. We perform analysis
    of the processes, divide enterprise projects into subdomains, and conduct modeling
    at the scope of a subdomain. This activity is performed to look purely at the
    business and process aspect of our subdomain, keeping in mind that artifacts of
    this activity will have to be eventually persisted. Nevertheless, persistence
    is a minor consideration, not a major one.


    Every subdomain usually has its entities. And not only that – every subdomain
    has its own set of business rules, and entities should be validated according
    to these business constraints. As a general rule of thumb, a carefully crafted
    business domain should prevent the instantiation of invalid objects. One of the
    good rules is a principle that “impossible states should be irrepresentable.”
    In other words, you can declare someone’s age as an integer and offload that check
    to the database, but would it be correct from the perspective of the business
    domain to allow the creation and storing of an Employee with age -50 or zero?
    Data integrity mechanisms exposed by the relational database can cover just one
    minor part of the overall business validity of your data. A complete set of validation
    and data integrity rules is a vast one. It usually contains various static and
    dynamic constraints, often encompassing multiple different entities in various
    states. For example, a minor shopper should not be able to add a beer to a shopping
    cart.


    Examining the primary role of a database , we can conclude that when you are storing
    entities into it, the database should provide a reliable mechanism to persist
    in-memory objects in a verbatim and sound way. Hence, you can look at the database
    as a way to mirror your object graph from memory into persistent media (usually
    a hard drive).


    So, looking through narrow lenses, it is true that relational database is indeed
    capable of performing type-level and reference integrity checks, throwing errors
    at attempts to store invalid data. However, layers of business rules and checking
    mechanisms of high-level rules should be present in every reliable application.
    With a good software development approach, you will never let your objects exist
    in an invalid state.


    Hence, the database should be placed at the proper position during application
    development – not in the center anymore, but as a persistence mechanism. Its role
    should be to store validated objects reliably and provide fast and reliable means
    to index and query such data.'
