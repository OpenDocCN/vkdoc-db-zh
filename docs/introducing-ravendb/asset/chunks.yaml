- fmt: "### Creating Your First Database\n\nNow that you have the RavenDB server up\
    \ and running, it is time to create your first database. First, click on the `Databases`\
    \ option in the left column of Studio. You will see a notification that there\
    \ are no databases, along with a call to action to create one. You can also create\
    \ a new database by clicking on a `New database` in the upper right corner, visible\
    \ in Figure [1-7](#514303_1_En_1_Chapter.xhtml#Fig7).\n\n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig7_HTML.png)\n\
    \nA screenshot of the Raven D B studio displays 5 tabs on the left in which the\
    \ databases tab is selected. The main page displays a text, that reads no databases\
    \ have been created.\n\nFigure 1-7\n\nCreating New Database\n\nThis will bring\
    \ up the `New database` dialog.\n\n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig8_HTML.png)\n\
    \nA screenshot of a window titled new database displays a filled text box labelled\
    \ name and 3 options below it with radio buttons. The options include encryption,\
    \ replication, and path, in which replication is selected. The replication factor\
    \ on the main page is set to 1.\n\nFigure 1-8\n\nNew Database Dialog\n\nAt this\
    \ point, as shown in Figure [1-8](#514303_1_En_1_Chapter.xhtml#Fig8), all you\
    \ need to do is to enter the name of the new database and click on the `Create`\
    \ button. Name your new database Northwind, accept all defaults, and a new empty\
    \ database will be created.\n\nYou are now back to the same `Databases` screen\
    \ you started from, but this time, you can see the Northwind database you just\
    \ created, as shown in Figure [1-9](#514303_1_En_1_Chapter.xhtml#Fig9).\n\n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig9_HTML.png)\n\
    \nA screenshot of the window of Raven D B studio displays a database named North\
    \ wind. The related information about the database is depicted below it, with\
    \ settings on the right.\n\nFigure 1-9\n\nListing of the Databases\n\nLooking\
    \ more closely at Figure [1-10](#514303_1_En_1_Chapter.xhtml#Fig10), you can see\
    \ basic information about your new database:\n\n*   Residing on Node A.\n*   It\
    \ allocates 65.54 MB on the hard drive.\n*   Contains zero documents and zero\
    \ indexes.\n*   Uptime is \"few seconds.\"\n*   Has never been backed up.\n\n\
    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig10_HTML.jpg)\n\nA screenshot\
    \ displays information about the database as follows. It resides on node A, allocated\
    \ 65.54 M B, 0 documents, 0 indexes, a few seconds of uptime, and has never been\
    \ backed up.\n\nFigure 1-10\n\nBasic Database Info\n\nClicking on a database name\
    \ `Northwind` opens a list of documents, and you will see that your database is\
    \ empty indeed, as visible on Figure [1-11](#514303_1_En_1_Chapter.xhtml#Fig11).\n\
    \n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig11_HTML.png)\n\nA window of\
    \ a Raven D B studio displays the documents page of the North wind database. There\
    \ are no documents in the database. The column labels of the documents table include\
    \ I d, change vector, last modified, collection, and a flag symbol.\n\nFigure\
    \ 1-11\n\nAn Empty List of Documents in the Database\n\n### Seeding Sample Data\n\
    \nIt is not much you can do with an empty database. RavenDB can create sample\
    \ data for you. Click on the `Tasks` icon on the left edge of the screen, and\
    \ then select the `Create Sample Data` option, visible on Figure [1-12](#514303_1_En_1_Chapter.xhtml#Fig12).\n\
    \n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig12_HTML.png)\n\nA window of\
    \ a Raven D B studio displays 5 tasks on the left, in which create sample data\
    \ is selected. The selected tab depicts a page of sample data with a button labeled\
    \ create on it.\n\nFigure 1-12\n\nSeeding Sample Data into Empty Database\n\n\
    > **Tip**\n> \n> Seeding sample data will only work on a completely empty database.\
    \ If you have even a single document, RavenDB will disable the `Create` button.\n\
    \n### Northwind Database\n\nGoing back to the `Documents` menu item reveals documents\
    \ and collections, as you can see in Figure [1-13](#514303_1_En_1_Chapter.xhtml#Fig13).\n\
    \n![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig13_HTML.png)\n\nA window of\
    \ a Raven D B studio depicts the documents page of the database. The list of documents\
    \ is depicted under the column labels I d, change vector, last modified, collection,\
    \ and a flag symbol. The collection list and the number of documents in each of\
    \ them are depicted on the left.\n\nFigure 1-13\n\nCollections and Documents in\
    \ the Northwind Database\n\nCollections are one of the basic concepts in RavenDB.\
    \ They contain documents and are very similar to tables in relational databases.\
    \ However, there are no requirements for documents in one collection to have identical\
    \ structures or any schema. Every document belongs to exactly one collection,\
    \ and you will usually group similar documents in one collection.\n\nThe database\
    \ in front of you is `Northwind`. It is one of the sample databases Microsoft\
    \ is shipping with Access and SQL Server applications. Since 1994, it has been\
    \ used as a basis for tutorials and demonstrations of various features in various\
    \ database products. The wider community accepted it as an excellent tutorial\
    \ schema for a small business ERP, and it has been ported to a variety of non-Microsoft\
    \ databases, including PostgreSQL. Hence, the choice of this data as a sample\
    \ in RavenDB was a logical one. There is a high probability that an average user\
    \ is already familiar with a relational version.\n\nThe Northwind database contains\
    \ the sales data for a fictitious company called \"Northwind Traders,\" which\
    \ imports and exports specialty foods worldwide.\n\nThe dataset includes sample\
    \ data for the following:\n\n*   `Categories` (8 documents): Product categories\n\
    *   `Companies` (91): Customers who buy products from Northwind\n*   `Employees`\
    \ (9): Employee details of Northwind traders\n*   `Orders` (830): Sales order\
    \ transactions taking place between the customers and the Northwind Traders Company\n\
    *   `Products` (77): Product information\n*   `Regions` (4): List of cities divided\
    \ into four regions\n*   `Shippers` (3): The details of the shippers who ship\
    \ the products from the traders to the end-customer Companies\n*   `Suppliers`\
    \ (29): Suppliers and vendors of Northwind Traders\n\nComparing this list with\
    \ collections in RavenDB studio, you will notice that one of them is missing from\
    \ this list: `@hilo`. This collection is a system one, created and maintained\
    \ by the database. Even though it is publicly exposed, you will rarely inspect\
    \ its content. Documents you can see inside are used to create unique identifiers\
    \ for documents in your collections. Also, pay attention to a specific prefix\
    \ of this collection; its name starts with the \"at\" sign. This prefix is a standard\
    \ convention for all properties and names used internally by RavenDB. Even though\
    \ nothing stops you from naming your properties using the same prefix, we recommend\
    \ you avoid this to prevent any conflict with system names."
  raw: '### Creating Your First Database


    Now that you have the RavenDB server up and running, it is time to create your
    first database. First, click on the *Databases* option in the left column of Studio.
    You will see a notification that there are no databases, along with a call to
    action to create one. You can also create a new database by clicking on a *New
    database* in the upper right corner, visible in Figure [1-7](#514303_1_En_1_Chapter.xhtml#Fig7).


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig7_HTML.png)


    A screenshot of the Raven D B studio displays 5 tabs on the left in which the
    databases tab is selected. The main page displays a text, that reads no databases
    have been created.


    Figure 1-7


    Creating New Database


    This will bring up *New database* dialog .


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig8_HTML.png)


    A screenshot of a window titled new database displays a filled text box labelled
    name and 3 options below it with radio buttons. The options include encryption,
    replication, and path, in which replication is selected. The replication factor
    on the main page is set to 1.


    Figure 1-8


    New Database Dialog


    At this point, as shown in Figure [1-8](#514303_1_En_1_Chapter.xhtml#Fig8), all
    you need to do is to enter the name of the new database and click on *Create*
    button. Name your new database Northwind, accept all defaults, and new empty database
    will be created.


    You are now back to the same Databases screen you started from, but this time,
    you can see the Northwind database you just created, as shown in Figure [1-9](#514303_1_En_1_Chapter.xhtml#Fig9).


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig9_HTML.png)


    A screenshot of the window of Raven D B studio displays a database named North
    wind. The related information about the database is depicted below it, with settings
    on the right.


    Figure 1-9


    Listing of the Databases


    Looking more closely at Figure [1-10](#514303_1_En_1_Chapter.xhtml#Fig10), you
    can see basic information about your new database :


    *   Residing on Node A.


    *   It allocates 65.54 MB on the hard drive.


    *   Contains zero documents and zero indexes.


    *   Uptime is “few seconds.”


    *   Has never been backed up.


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig10_HTML.jpg)


    A screenshot displays information about the database as follows. It resides on
    node A, allocated 65.54 M B, 0 documents, 0 indexes, a few seconds of uptime,
    and has never been backed up.


    Figure 1-10


    Basic Database Info


    Clicking on a database name *Northwind* opens a list of documents , and you will
    see that your database is empty indeed, as visible on Figure [1-11](#514303_1_En_1_Chapter.xhtml#Fig11).


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig11_HTML.png)


    A window of a Raven D B studio displays the documents page of the North wind database.
    There are no documents in the database. The column labels of the documents table
    include I d, change vector, last modified, collection, and a flag symbol.


    Figure 1-11


    An Empty List of Documents in the Database


    ### Seeding Sample Data


    It is not much you can do with an empty database. RavenDB can create sample data
    for you. Click on the *Tasks* icon on the left edge of the screen, and then select
    *Create Sample Data* option, visible on Figure [1-12](#514303_1_En_1_Chapter.xhtml#Fig12).


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig12_HTML.png)


    A window of a Raven D B studio displays 5 tasks on the left, in which create sample
    data is selected. The selected tab depicts a page of sample data with a button
    labeled create on it.


    Figure 1-12


    Seeding Sample Data into Empty Database


    Tip


    Seeding sample data will only work on completely empty database. If you have even
    a single document, RavenDB will disable *Create* button.


    ### Northwind Database


    Going back to the Documents menu item reveals documents and collections , as you
    can see in Figure [1-13](#514303_1_En_1_Chapter.xhtml#Fig13).


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig13_HTML.png)


    A window of a Raven D B studio depicts the documents page of the database. The
    list of documents is depicted under the column labels I d, change vector, last
    modified, collection, and a flag symbol. The collection list and the number of
    documents in each of them are depicted on the left.


    Figure 1-13


    Collections and Documents in the Northwind Database


    Collections are one of the basic concepts in RavenDB. They contain documents and
    are very similar to tables in relational databases. However, there are no requirements
    for documents in one collection to have identical structures or any schema. Every
    document belongs to exactly one collection, and you will usually group similar
    documents in one collection.


    The database in front of you is *Northwind*. It is one of the sample databases
    Microsoft is shipping with Access and SQL Server applications. Since 1994, it
    has been used as a basis for tutorials and demonstrations of various features
    in various database products. The wider community accepted it as an excellent
    tutorial schema for a small business ERP, and it has been ported to a variety
    of non-Microsoft databases, including PostgreSQL. Hence, the choice of this data
    as a sample in RavenDB was a logical one. There is a high probability that an
    average user is already familiar with a relational version.


    The Northwind database contains the sales data for a fictitious company called
    “Northwind Traders ,” which imports and exports specialty foods worldwide.


    The dataset includes sample data for the following:


    *   *Categories* (8 documents): Product categories


    *   *Companies* (91): Customers who buy products from Northwind


    *   *Employees* (9): Employee details of Northwind traders


    *   *Orders* (830): Sales order transactions taking place between the customers
    and the Northwind Traders Company


    *   *Products* (77): Product information


    *   *Regions* (4): List of cities divided into four regions


    *   *Shippers* (3): The details of the shippers who ship the products from the
    traders to the end-customer Companies


    *   *Suppliers* (29): Suppliers and vendors of Northwind Traders


    Comparing this list with collections in RavenDB studio, you will notice that one
    of them is missing from this list: `@hilo`. This collection is a system one, created
    and maintained by the database. Even though it is publicly exposed, you will rarely
    inspect its content. Documents you can see inside are used to create unique identifiers
    for documents in your collections. Also, pay attention to a specific prefix of
    this collection; its name starts with the “at” sign. This prefix is a standard
    convention for all properties and names used internally by RavenDB. Even though
    nothing stops you from naming your properties using the same prefix, we recommend
    you avoid this to prevent any conflict with system names.'
  trans: '

    ### 创建你的第一个数据库


    现在你已经启动并运行了 RavenDB 服务器，是时候创建你的第一个数据库了。首先，点击 Studio 左侧栏中的 `Databases` 选项。你会看到一个提示，显示没有数据库，并附带一个创建数据库的行动号召。你也可以通过点击右上角的
    `New database` 来创建新数据库，如图 1-7 所示。


    ![](img/514303_1_En_1_Fig7_HTML.png)


    图 1-7：RavenDB Studio 截图，显示左侧 5 个选项卡，其中“数据库”选项卡被选中。主页面显示文本：“尚未创建任何数据库”。


    创建新数据库


    这将打开 `New database` 对话框。


    ![](img/514303_1_En_1_Fig8_HTML.png)


    图 1-8：“新建数据库”对话框截图，显示一个已填充的“名称”文本框，其下方有三个带单选按钮的选项，包括加密、复制和路径，其中“复制”被选中。主页面上的复制因子设置为
    1。


    此时，如图 1-8 所示，你只需输入新数据库的名称并点击 `Create` 按钮。将你的新数据库命名为 Northwind，接受所有默认设置，一个新的空数据库将被创建。


    现在你回到了最初看到的同一个 `Databases` 屏幕，但这次你可以看到刚刚创建的 Northwind 数据库，如图 1-9 所示。


    ![](img/514303_1_En_1_Fig9_HTML.png)


    图 1-9：RavenDB Studio 窗口截图，显示名为 Northwind 的数据库。其下方描绘了数据库的相关信息，右侧是设置项。


    数据库列表


    更仔细地观察图 1-10，你可以看到关于新数据库的基本信息：

    *   驻留在节点 A 上。

    *   在硬盘上分配了 65.54 MB 空间。

    *   包含 0 个文档和 0 个索引。

    *   运行时间是“几秒钟”。

    *   从未备份过。


    ![](img/514303_1_En_1_Fig10_HTML.jpg)


    图 1-10：截图显示数据库信息如下：驻留在节点 A，分配 65.54 MB，0 个文档，0 个索引，运行时间几秒钟，且从未备份。


    点击数据库名称 `Northwind` 会打开文档列表，你会看到你的数据库确实是空的，如图 1-11 所示。


    ![](img/514303_1_En_1_Fig11_HTML.png)


    图 1-11：RavenDB Studio 窗口显示 Northwind 数据库的文档页面。数据库中没有文档。文档表格的列标签包括：ID、变更向量、最后修改时间、集合和一个旗标符号。


    ### 填充示例数据


    一个空数据库能做的不多。RavenDB 可以为你创建示例数据。点击屏幕左边缘的 `Tasks` 图标，然后选择 `Create Sample Data` 选项，如图
    1-12 所示。


    ![](img/514303_1_En_1_Fig12_HTML.png)


    图 1-12：RavenDB Studio 窗口显示左侧 5 个任务，其中“创建示例数据”被选中。选中的选项卡描绘了一个示例数据页面，上面有一个标有“创建”的按钮。


    向空数据库填充示例数据


    > **提示**

    >

    > 填充示例数据仅适用于完全空的数据库。即使你只有一个文档，RavenDB 也会禁用 `Create` 按钮。


    ### Northwind 数据库


    回到 `Documents` 菜单项会显示文档和集合，如图 1-13 所示。


    ![](img/514303_1_En_1_Fig13_HTML.png)


    图 1-13：RavenDB Studio 窗口描绘了数据库的文档页面。文档列表在列标签 ID、变更向量、最后修改时间、集合和一个旗标符号下描绘。集合列表及每个集合中的文档数量显示在左侧。


    集合是 RavenDB 中的基本概念之一。它们包含文档，与关系数据库中的表非常相似。但是，一个集合中的文档不要求结构相同或遵循任何模式。每个文档只属于一个集合，你通常会将类似的文档分组到一个集合中。


    你面前的数据库是 `Northwind`。这是 Microsoft 随 Access 和 SQL Server 应用程序一起发布的示例数据库之一。自 1994
    年以来，它一直被用作各种数据库产品中各种功能的教程和演示基础。更广泛的社区接受它作为小型企业 ERP 的优秀教程模式，并且它已被移植到多种非 Microsoft
    数据库，包括 PostgreSQL。因此，在 RavenDB 中选择此数据作为示例是合乎逻辑的。普通用户很有可能已经熟悉其关系版本。


    Northwind 数据库包含一个名为“Northwind Traders”的虚构公司的销售数据，该公司在全球范围内进口和出口特色食品。


    该数据集包含以下示例数据：

    *   `Categories`（8 个文档）：产品类别

    *   `Companies`（91 个）：从 Northwind 购买产品的客户

    *   `Employees`（9 个）：Northwind Traders 的员工详细信息

    *   `Orders`（830 个）：客户与 Northwind Traders 公司之间发生的销售订单交易

    *   `Products`（77 个）：产品信息

    *   `Regions`（4 个）：划分为四个区域的城市列表

    *   `Shippers`（3 个）：将货物从贸易商运送给最终客户公司的承运商详细信息

    *   `Suppliers`（29 个）：Northwind Traders 的供应商和卖主


    将此列表与 RavenDB Studio 中的集合进行比较，你会注意到其中一个集合不在此列表中：`@hilo`。这个集合是一个系统集合，由数据库创建和维护。尽管它是公开可见的，但你很少会去检查其内容。你在其中看到的文档用于为你的集合中的文档创建唯一标识符。此外，请注意这个集合名称的特定前缀；它的名称以“at”符号开头。这个前缀是
    RavenDB 内部使用的所有属性和名称的标准约定。尽管没有什么能阻止你使用相同的前缀来命名你的属性，但我们建议你避免这样做，以防止与系统名称发生任何冲突。

    '
- fmt: '## Documents


    点击 *Orders* 集合，你将看到此集合中所有文档的列表。现在，按照图 [1-14](#514303_1_En_1_Chapter.xhtml#Fig14)，点击
    *Id* `orders/830-A` 来打开你的第一个 RavenDB 文档。


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig14_HTML.png)


    A screenshot depicts the documents page of Raven D B studio. The page depicts
    a list of collections on the left, in which orders are selected. In the documents
    list, orders slash 830 A is selected.


    图 1-14


    Orders 集合中的文档


    你现在看到的是存储在 Northwind 数据库中的 JSON 文档，如图 [1-15](#514303_1_En_1_Chapter.xhtml#Fig15)
    所示。


    ![](images/514303_1_En_1_Chapter/514303_1_En_1_Fig15_HTML.png)


    A screenshot depicts a document titled orders slash 830 A. The buttons under the
    title are labelled save, clone, and delete. The document depicts 33 lines of code
    in the J S O N structure.


    图 1-15


    JSON 文档


    如果你之前使用的是关系型数据库，这景象并不熟悉。没有列。整个文档就是一个 JSON 结构。*Lines* 属性是一个由 JSON 对象组成的数组。向下滚动，你会看到
    *ShipTo* 属性，它包含一个复杂的嵌套 JSON 结构。


    将这个文档与通常的 RDBMS 建模进行比较，你会发现我们不必为了满足关系型数据库的表状特性而将其拆分成多个部分。例如，*Company* 和 *Employee*
    属性是对该数据库中其他文档的引用，但它们并不是特殊属性——它们只是简单的字符串。


    基于文档的建模是一个重要主题，我们将在后续章节中更详细地介绍。现在，请随意点击其他集合并检查它们的文档。


    ## Summary


    在本章中，我们简要介绍了关系型数据库的历史及其诞生、优点以及这些系统的一些缺点。作为数据持久化演化的下一步，NoSQL 数据库应运而生。我们探讨了创建这类新数据库的动机、它们解决的一些问题及其主要类别。我们介绍了
    RavenDB，并涵盖了安装步骤、创建你的第一个数据库、示例数据集概述以及 JSON 文档的基本概念。


    在下一章中，我们将展示使用 NoSQL 文档数据库进行数据建模的方法，解释如何在 RavenDB 中应用它们。此外，我们还将介绍为 NoSQL 文档关系建模的技术。


    # 2. Document Modeling


    建模是每个应用程序开发核心的关键过程。我们可以很容易地为这个主题专门写一整本书，因此仅用一章来讨论这个主题不可避免地会导致许多遗漏。然而，我们的目标是向你简要介绍建模过程及其影响因素，并解释基于文档的方法。


    在本章中，我们将首先探讨建模的概念概述。之后，我们将回顾如何在关系型数据库中建模数据、影响此过程的因素以及存在的局限性。接下来，我们将研究基于文档的建模方法、这一概念背后的思想及其主要特征。之后，我们将讨论你在从关系型建模过渡到基于文档的建模期间可能有的一些常见疑虑。最后，你将看到在
    NoSQL 数据库中为文档间关系建模的标准技术。


    ## Abstraction and Generalization


    英国统计学家 George E. P. Box 有一句名言：“所有模型都是错的，但有些是有用的。” 这句话不仅适用于数学和统计学，也适用于任何需要描述现实的情况。从构建心理模型来理解生活事件，到用
    C# 编写发票处理应用程序，你总是需要创建现实的表示。


    软件开发者编写计算机程序来描述特定的生活领域，并使用户能够跟踪现实世界的实体、它们的关系以及这些实体相互影响的各种方式。实际上，环境并非 *简单*（由少数对象组成），而通常是
    *复杂*（许多组件）的。


    此外，现实并非直观（易于理解），而是 *复杂* 的。在这样的系统中，对象之间的连接和交互并不明显。许多活动部分高度相互关联。因此，一个或多个实体发生的任何变化不仅会影响它们自身，还会传播到系统的其余部分。这种涟漪效应难以把握，那些变化带来的不可预见的后果也难以理解、控制和用编程语言描述。


    幸运的是，软件开发者在面对这些挑战时并非束手无策，多年来我们开发了许多工具和方法。其中最重要的之一是 *抽象*（abstraction）。在建模时，我们将范围缩小到只涵盖我们感兴趣的实体的子领域。此外，我们将审视这些实体的属性，并隔离主要的属性，忽略所有对构建我们子领域的表示没有贡献的细节。这个过程是
    *抽象* 的核心——移除各种对理解我们正在建模的子领域没有贡献的信息。我们可以说这与 *泛化*（generalization）的过程非常相似——选择一组特定的对象，观察它们的共同或共享属性，然后使用这些属性来描述它们。


    例如，假设我们正在为一个小区书店构建一个应用程序。书店老板打算为顾客创建一个会员俱乐部。他们可以加入，填写他们的兴趣领域和个人基本信息，并接收每周阅读推荐、独家折扣以及感兴趣的新书到货通知。面对构建这样一项服务的挑战，你首先需要理解领域、用户、他们之间的交互以及你的应用程序需要产生的结果。接下来，你将着手为系统中所有识别出的实体建模。


    仅看其中一个实体——顾客——就会揭示几乎无穷无尽的细节。顾客有名字、姓氏、电子邮件地址和出生日期。但他们也有眼睛颜色、最喜欢的香水和最喜欢的餐厅。回到我们的目标，即构建一个图书推荐服务，将揭示这些客户属性中哪些对我们的努力有帮助，哪些我们可以忽略。在与书店老板进行简短交谈后，我们得出结论，眼睛颜色、香水和餐厅选择并不影响图书选择，我们决定将它们从模型中省略。


    我们可以重复应用这个心理过程，逐一移除与我们目标无关的任何属性。任何对我们的意图没有贡献的模型属性都将被移除，从而简化我们的模型。这样，我们的应用程序将只包含相关数据，这些数据将具有狭窄的范围。更少的数据意味着更简单（复杂度更低）的模型，并且将导致我们需要实现的更不复杂的过程。有趣的是，在建模时，如果我们忽略实体的属性，我们将获得更好的结果。因此，一个不那么精确和不那么全面的模型在描述我们的领域和满足应用程序需求方面会更好。'
