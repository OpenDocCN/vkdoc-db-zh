- fmt: "### 聚合的复杂性\n\nListing [6-2] 中创建了自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`，它通过对具有相同运输国家的订单出现次数进行求和来执行聚合。遗憾的是，这种简单的聚合是自动\
    \ MapReduce 索引的极限。对于任何更高级的操作，您都必须编写静态 MapReduce 索引。\n\n例如，我们可以跟进对各国订单数量的初步分析，按运输国家分析订单的总价值。然而，检查示例数据库中的任何订单，您会发现它们缺少总货币价值的属性。我们无需计算此值并修补订单文档，而是可以计算它并将其作为索引的一部分存储，如\
    \ Listing [6-6] 所示：\n\n```csharp\nmap(\"Orders\", order => {\n    return {\n \
    \       Country: order.ShipTo.Country,\n        Total: order.Lines.reduce((total,\
    \ line) => (line.Quantity * line.PricePerUnit) * (1 - line.Discount), 0)\n   \
    \ }\n})\ngroupBy(map => map.Country)\n.aggregate(group => {\n    return {\n  \
    \      Country: group.key,\n        Total: group.values.reduce((res, el) => res\
    \ + el.Total, 0)\n    }\n})\n```\n\nListing 6-6：`Orders/ByCountryTotals` 索引\n\n\
    此索引的映射阶段处理订单行，考虑行折扣以计算每个订单的总值。之后，这些总值会按运输国家相同的订单组进行求和。\n\n您现在可以执行如下分析：\n\n```text\n\
    from index 'Orders/ByCountryTotals'\nwhere Total > 50000\n```\n\n在此示例中，我们应用了复杂的聚合，并将其结果用作数据模型的一部分，而无需更改数据库中的文档。\n\
    \n### 多地图归约索引\n\n观察我们销售对象的公司和我们采购对象的供应商，您可以执行以下两种聚合。在 Listing [6-2] 中，我们按运输国家分析了订单。让我们继续检查我们的数据集以探索最活跃的国家。\n\
    \n我们销售到的国家：\n\n```text\nfrom \"Companies\" as c\ngroup by c.Address.Country\n\
    select c.Address.Country, count()\n```\n\n我们从其采购的国家：\n\n```text\nfrom \"Suppliers\"\
    \ as s\ngroup by s.Address.Country\nselect s.Address.Country, count()\n```\n\n\
    这两个查询将返回按国家分组的公司和按国家分组的供应商。此外，这两个查询将产生两个自动索引。手动聚合这两个结果集将回答 Northwind Traders 与哪些国家业务往来最多的问题。\n\
    \n在上一章中，我们介绍了多地图索引的主题，这些索引同时操作多个集合。为了编写一个静态索引来替换两个自动索引，我们可以以多地图索引为基础，然后对生成的投影应用归约阶段。这样的索引被称为\
    \ **多地图归约索引**。\n\n您首先定义多地图索引 `Countries/Business` 的两个映射阶段，如 Listing [6-7] 所示。\n\
    \n```csharp\nmap(\"Companies\", company => {\n    return {\n        Country: company.Address.Country,\n\
    \        Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company\
    \ => {\n    return {\n        Country: company.Address.Country,\n        Companies:\
    \ 0,\n        Suppliers: 1\n    }\n})\n```\n\nListing 6-7：多地图索引 `Countries/Business`\n\
    \n如果您将此清单与 Listing [6-4] 进行比较，您会发现我们再次进行计数，但这次略有修改。我们需要为每个公司出现计一次，但同时，我们还需要计算供应商的事件。\n\
    \nRavenDB 要求在一个索引中定义的所有映射函数具有相同的输出。因此，在计算公司数量时，您还需要返回供应商数量，反之亦然。为了符合这一点，您可以使用一个简单的方法——返回您感兴趣的数据，对于所有其他字段，返回零值。这将产生如\
    \ Figure [6-11] 所示的索引条目。\n\n公司、供应商和国家列表的快照。\n![Figure 6-11](images/514303_1_En_6_Chapter/514303_1_En_6_Fig11_HTML.png)\n\
    \n多地图索引 `Countries/Business` 的原始索引条目。\n\n如您所见，对于正在处理的每个公司和供应商文档，索引将提取其国家，并在相应的属性中计数为一。\n\
    \n现在剩下的就是添加聚合。因此，我们使用归约阶段扩展索引，这给了我们如 Listing [6-8] 所示的最终形式。\n\n```csharp\nmap(\"\
    Companies\", company => {\n    return {\n        Country: company.Address.Country,\n\
    \        Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company\
    \ => {\n    return {\n        Country: company.Address.Country,\n        Companies:\
    \ 0,\n        Suppliers: 1\n    }\n})\ngroupBy(map => map.Country)\n.aggregate(group\
    \ => {\n    return {\n        Country: group.key,\n        Companies: group.values.reduce((res,\
    \ el) => res + el.Companies, 0),\n        Suppliers: group.values.reduce((res,\
    \ el) => res + el.Suppliers, 0)\n    }\n})\n```\n\nListing 6-8：多地图归约索引 `Countries/Business`\n\
    \n最后，您可以运行查询：\n\n```text\nfrom index 'Countries/Business'\n```\n\n以获取包含公司和供应商数量的国家列表。"
  raw: '### Aggregation Complexity


    Query from Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4) that created automatic
    index `Auto/Orders/ByCountReducedByShipTo.Country` is doing aggregation by summing
    occurrences of orders with the same shipping country. Unfortunately, this simple
    aggregation is the limit of automatic MapReduce indexes. You will have to write
    a static MapReduce index for anything more advanced.


    For example, we can follow up on the initial analysis of the count of orders by
    country and analyze the total value of the order by the country of shipment. However,
    by checking any of the orders in our sample database, you will see they are missing
    property with total monetary value. Instead of calculating this value and patching
    order documents, we can calculate it and store it as a part of an index, as shown
    in Listing [6-6](#514303_1_En_6_Chapter.xhtml#PC21) :


    ```

    map("Orders", order => {

    return {

    Country: order.ShipTo.Country,

    Total: order.Lines.reduce((total, line) => (line.Quantity * line.PricePerUnit)
    * (1 - line.Discount), 0)

    }

    })

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Total: group.values.reduce((res, el) => res + el.Total, 0)

    }

    })

    Listing 6-6

    Orders/ByCountryTotals index

    ```


    The mapping phase of this index is processing order lines, taking into account
    line discount to compute the total value of each order. After that, these totals
    are summed up for a group of orders with the same shipping country .


    You can now perform analysis like this one:


    ```

    from index ''Orders/ByCountryTotals''

    where Total > 50000

    ```


    In this example, we applied complex aggregation and used its result as a part
    of our data model without altering documents in the database.


    ## MultiMapReduce Indexes


    Looking at companies we sell to and suppliers we buy from, you can perform the
    following two aggregations. In Listing [6-2](#514303_1_En_6_Chapter.xhtml#PC4),
    we analyzed orders by the country of shipping. Let’s continue examining our dataset
    to explore the most active countries.


    Countries where we sell


    ```

    from "Companies" as c

    group by c.Address.Country

    select c.Address.Country, count()

    ```


    Countries we buy from


    ```

    from "Suppliers" as s

    group by s.Address.Country

    select s.Address.Country, count()

    ```


    These two queries will return companies aggregated by countries and suppliers
    aggregated by countries. Additionally, these two queries will produce two automatic
    indexes. Manual aggregation of these two result sets will answer which countries
    Northwind Traders do the most business.


    In the previous chapter, we covered the topic of MultiMap indexes , which are
    operating on more than one collection simultaneously. To write one static index
    that would replace two automatic ones, we can take MultiMap as a basis and then
    apply the reduction phase against generated projections. Such an index is called
    the *MultiMapReduce* index .


    You start by defining two mapping phases of multi-map index `Countries/Business`
    as shown in Listing [6-7](#514303_1_En_6_Chapter.xhtml#PC25).


    ```

    map("Companies", company => {

    return {

    Country: company.Address.Country,

    Companies: 1,

    Suppliers: 0

    }

    })

    map("Suppliers", company => {

    return {

    Country: company.Address.Country,

    Companies: 0,

    Suppliers: 1

    }

    })

    Listing 6-7

    MultiMap index Countries/Business

    ```


    If you compare this listing with Listing [6-4](#514303_1_En_6_Chapter.xhtml#PC9),
    you can see that we are counting again, but this time slightly modified. We need
    to count one for every company occurrence, but at the same time, we need to count
    events of suppliers as well.


    RavenDB mandates all map functions you define within one index to have the same
    output. Hence, when counting companies, you also need to return suppliers and
    vice versa. To comply with this, you can use a simple approach – return data you
    are interested in, and for all other fields, return zero value. This will produce
    indexing entries, as shown in Figure [6-11](#514303_1_En_6_Chapter.xhtml#Fig11).


    ![](images/514303_1_En_6_Chapter/514303_1_En_6_Fig11_HTML.png)


    A snapshot of the company, suppliers, and country lists.


    Figure 6-11


    Raw Indexing Entries of MultiMap Index `Countries/Business`


    As you can see, for every company and supplier document being processed, the index
    will extract its country, along with a count of one in an appropriate property.


    All that is left to do now is to add aggregation. Hence, we expand the index with
    the reduction phase, which gives us the final form as shown in Listing [6-8](#514303_1_En_6_Chapter.xhtml#PC26)
    .


    ```

    map("Companies", company => {

    return {

    Country: company.Address.Country,

    Companies: 1,

    Suppliers: 0

    }

    })

    map("Suppliers", company => {

    return {

    Country: company.Address.Country,

    Companies: 0,

    Suppliers: 1

    }

    })

    groupBy(map => map.Country)

    .aggregate(group => {

    return {

    Country: group.key,

    Companies: group.values.reduce((res, el) => res + el.Companies, 0),

    Suppliers: group.values.reduce((res, el) => res + el.Suppliers, 0)

    }

    })

    Listing 6-8

    MultiMapReduce index Countries/Business

    ```


    Finally, you can run the query:


    ```

    from index ''Countries/Business''

    ```


    to get a listing of countries with the number of companies and suppliers .'
