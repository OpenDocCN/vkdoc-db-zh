  trans: '### 挑战


    没有任何技术是万能的银弹，采用任何新的技术范式都有其他方面的考量。以下是一些与采用 NoSQL 数据库相关的挑战：


    *   *成熟度* - 关系数据库管理系统（RDBMS）已存在超过四十年。它们发展完善、成熟且稳定，对大多数用户而言是可靠的保障。那句源自 1970 年代的“购买`IBM`从来不会让人丢掉饭碗”的心态一直延续至今——RDBMS
    被视为“安全的选择”，而 NoSQL 则被看作是在用新的“酷”技术进行赌博。从许多公司的角度来看，NoSQL 是一项独特、年轻、前沿的技术，对开发者来说可能令人兴奋，但在生产环境中却是一个巨大的未知数。


    *   *技术支持* - 在系统故障的情况下，及时而专业的技术支持对于每个组织的业务连续性计划都至关重要。所有 RDBMS 供应商都竭尽全力提供此类支持。另一方面，许多
    NoSQL 产品是开源的，缺乏提供支持选项的商业实体。即使存在，这些公司也往往是小型初创企业，没有全球影响力、支持资源，也不具备`IBM`、`Oracle`或`Microsoft`那样的可信度。


    *   *分析与商业智能* - 数据是每家公司的宝贵资源。他们分析数据、进行数据挖掘并得出结论，从而改进决策流程、提高效率，并最终提升市场盈利能力。商业智能（BI）是大多数公司的战略领域。多年来，RDBMS
    的核心功能因一个丰富的产品生态系统而得到增强，这些产品为数据分析提供了额外的 BI 服务。直到最近，NoSQL DBMS 才开始迎头赶上，提供类似的解决方案。


    ### 结论


    NoSQL 数据库的出现并未消除对关系数据库的需求。相反，它帮助我们达到了一种不教条、更平衡的立场：即数据持久化还有其他合法且可靠的选择。


    这种思想上的解放始于 2006 年，当时 Neal Ford 创造了`多语言编程`（Polyglot Programming）一词。这个理念提倡使用多种语言实现应用程序，认识到特定问题可以通过不同的语言以更直接、更便捷的方式解决。简单来说——不同的编程语言在解决特定问题时各有优劣。


    `多语言持久化`（Polyglot persistence）是一个遵循相同哲学的理念。不同的情况和环境可能需要不同的方式来建模和存储持久化数据。此外，一个业务领域常常可以划分为多个子领域。不同的数据模型可能是不同子领域的最佳表示。多语言持久化的理念承认这一点，并避免了为了将所有数据模型都塞进一个数据库而做出妥协。


    因此，在开始下一个项目时，你不应该不假思索地默认选择关系数据库作为解决方案，而需要考虑数据的性质、业务场景以及你计划如何操作数据，然后在各种持久化数据的技术中考虑最佳匹配。因此，组织正在从将数据库视为集成点的概念，转向应用程序数据库，最终形成一种由不同应用程序通过不同技术满足不同需求的混合模式。


    这种思想上的解放随着领域驱动设计和微服务的兴起而进一步发展，其中一个解决方案由多个数据库组成，可以是持久化技术的混合体。这样，数据库将数据封装在应用程序内部，而服务则负责执行集成。


    ### NoSQL 数据库类型


    如前所述，各种非关系型数据库采用不同的方法来满足存储和查询数据的需求。NoSQL 数据库主要有四种类型，每种类型都解决了关系数据库无法充分解决的问题。


    #### 键值存储


    著名示例：`Redis`、`Memcached`和`CosmosDB`


    在某些场景下，使用功能强大、索引完善且数据检索能力强的全功能数据库可能是杀鸡用牛刀。你需要的是一种快速简便的方法，将任意信息片段用键标记并存储在数据库中。之后，当你提供键时，数据库就会返回关联的值。


    `键值存储`是数据库，但高度专业化，其构建目的单一，且在设计和功能上刻意做了限制。有些是极简主义的，例如`Memcached`，它甚至不将数据存储在磁盘上。其他的，如`CosmosDB`，虽然随着时间的推移添加了更多功能，但仍然基于键值范式。


    总体而言，键值存储旨在用于缓存或在应用程序服务之间共享通用数据等基础任务。许多关系数据库也可用作键值存储，但它们会消耗大量资源，且效率低于专业解决方案。如果你用一辆
    18 轮大卡车去超市购物，同样会造成资源和能力的过度配置。


    #### 文档存储


    著名示例：`MongoDB`、`RavenDB`、`Couchbase`和`DocumentDB`


    文档存储扩展了键值存储提供的功能，不仅能持久化和检索信息，还能理解信息的结构。在文档存储的术语中，文档是表示业务对象的半结构化数据。你可以根据文档的内部结构对其进行索引、管理和操作。


    文档存储了解文档的内部结构，因此你可以按地址城市查询业务合作伙伴，而键值存储只能提供存储和检索它们的方法。


    关系数据库迫使你人为地将对象拆分为多个子实体，然后存储在表和行中。文档存储可以接受自然形式的文档，对它们进行索引，并为你提供创建投影的方法，其效果与关系数据库中的`JOIN`相同，但效率要高得多。


    在存储之前，你的对象会被序列化为某种标准格式或编码。常见的编码包括`JSON`、`XML`、`YAML`以及二进制格式如`BSON`。


    #### 图数据库


    著名示例：`Neo4j`、`OrientDB`、`TigerGraph`和`ArangoDB`


    `图`是一种数学结构，用于表示一组对象，其中成对的对象相互关联。图数据库实现了这一概念，将实体之间的关系视为与实体本身同等重要。因此，图数据库适用于所有那些关系是模型核心的业务领域。


    图数据库是高度专业化的 NoSQL 数据库。可以说，它们建立在关系数据库奠定的基础上，将连接和关系提升到了数据库世界中的“一等公民”地位。因此，除了数据，图数据库还包含元数据或“关于数据的数据”，而这些元数据往往比数据本身更重要。


    使用图数据库，无论数据集总规模大小，你都可以高效地探索高度连接的数据、基于模式进行搜索，并将与数据的交互隔离在一个极小的子集内。


    #### 宽列存储


    著名示例：`Bigtable`、`DynamoDB`、`Cassandra`、`ScyllaDB`和`HBase`


    此类别也被称为`可扩展记录存储`。与关系数据库类似，宽列存储使用表、行和列。然而，列不是固定的，如果需要，记录可以拥有数十亿列。从键值存储的角度来看，可以说宽列存储是一个二维的键值存储。'
- fmt: '### Multi-Model Databases


    Multi-model databases are not the fifth category of NoSQL databases, but an emerging
    trend first mentioned in 2012 by Luca Garulli. Starting from Polyglot persistence,
    he envisioned a second generation of NoSQL databases, where one product supports
    different data models. This approach would combine the NoSQL ideal of selecting
    the most appropriate persistence for each subdomain of your application without
    having several different databases. Hence, you would not compromise in modeling
    and would end up with just one database to learn and manage.


    Database choice is fraught with difficulty and risk since this choice is committed
    to a particular model upfront. Considering the fast pace of changes modern applications
    must support, this choice can be easily invalidated by unpredictable future changes.


    Going with a multi-model database means that database choice can be less risky.
    Your database will be able to support you in various circumstances as your data
    model evolves under the stream of change requests you receive from your customers
    over time.


    ## RavenDB


    In this section, we will introduce `RavenDB`, a second-generation NoSQL database.
    You will learn about its history, why `RavenDB` is a good choice of data persistence
    for your applications, as well as how to start working with `RavenDB` in no time.


    ### History


    `RavenDB` was created by Oren Eini, a developer from Israel. In the late 2000s,
    he was an active contributor on the `NHibernate` project, .Net port of famous
    Hibernate ORM, one of the most popular mappers used by developers worldwide. Besides
    being involved in the open source community, Oren worked as a consultant for companies
    using relational databases. Being a prolific blogger under the pseudonym Ayende
    Rahien at `https://ayende.com`, he recorded various experiences with companies
    he was helping. It felt like one long Groundhog Day – they all had problems with
    applications, and canonical `RDBMS` caused all these problems most of us experienced
    – lack of indexes, `Select N+1`, projections that `JOIN`ed seven or eight tables…
    Could it be that so many developers were using relational databases in the wrong
    way? Or is there something inherently problematic with them? Do you need to be
    an expert in databases to develop your application swiftly and produce a solution
    that will be long-lasting and reliable?


    It is not uncommon for software developers to observe problems over time, think
    about them, and become passionate about solving them. You could say that `RavenDB`
    was born equal parts from frustration with the present state of database landscape
    and passion for creating an elegant solution to practical problems.


    In May 2010, Oren released version 1.0 of `RavenDB`. In October, the first commercial
    installation was secured, and after that, `RavenDB` started gaining popularity
    – up to the point when 1 million developers’ downloads were reached in September
    2015.


    Today, `RavenDB` is a mature and reliable database, battle-proven from installations
    on small machines like `Raspberry Pi` up to clusters consisting of over a million
    nodes. Let’s look at some reasons that helped `RavenDB` become such a versatile
    database.


    ### Advantages of RavenDB


    Along with all the advantages `RavenDB` has as a Document NoSQL database, which
    we discussed in previous sections, some specifics make it stand out.


    #### Extreme Performance


    `RavenDB` is highly optimized. Even on toy machines like `Raspberry Pi 400`, you
    will be able to serve over 2.000 concurrent read requests per second. Commodity
    hardware will bring you to 150.000 writes/s and 1.000.000 reads/s, and all of
    that with low latency. Furthermore, your queries will continuously operate over
    precomputed indexes so that you will get your results blazingly fast.


    #### Fully Transactional


    Since the very beginning, `RavenDB` is offering fully transactional `ACID` guarantees.
    Multi-document and multicollection transactions are supported as well, along with
    cluster-wide transactions. We will cover `ACID` in later chapters, but now, let’s
    say – `ACID` is a bare minimum that any database should guarantee. It will ensure
    that your data is not lost and that your database maintains its consistency despite
    all challenges.


    #### Auto Tuning


    `RavenDB` is a grown-up database that knows how to take care of itself. If you
    try to execute a query without an index that will support it, `RavenDB` will create
    an index for you. If one node of your cluster gets slower for some reason, traffic
    will be redirected to the fastest node dynamically. Your cluster is on constant
    and ongoing self-monitoring mode. It will track vital parameters like `CPU` usage
    or memory utilization and act upon them. Overall, `RavenDB` is observing its environment
    and reacting intelligently.


    #### Safe by Default


    Being safe by default has many aspects, and `RavenDB` prides itself on state-of-the-art
    technical solutions and a set of defaults that will enable you to get up and to
    run in a matter of minutes. It is not only what you have to do but also a list
    of things you are not forced to do to produce safe applications. Here is the subset
    of these features:


    *   `Encryption` - default encryption in transit and optional encryption at rest
    mean that your data will never be exposed in plain text form to anyone who might
    listen to the traffic between your application and `RavenDB`.

    *   `Authentication` – `X.509` digital certificates are used for access control
    as well as a basis for `HTTPS` access to the `RavenDB` cluster.

    *   `Limiting the number of database calls per session` – too many requests per
    single database session is dangerous. If developers are not careful, antipatterns
    like `Select N+1` can result in dozens, even hundreds, of calls for fetch data
    to render just one web page. `RavenDB` client will try to batch multiple calls
    whenever possible and throw an exception if you cross the default threshold of
    30 calls per single session. However, as you will see later, you can reduce the
    number of calls to one or two in most cases. This is a significant speedup for
    your application, and it is lowering the load on your database.


    #### High Availability


    `RavenDB` is an inherently distributed database. Even if you are running just
    one node, it will be treated as a cluster of one node. Clusters usually consist
    of several nodes, most commonly three. Such a multi-node setup will provide several
    exact copies of your database, and as long as just one node is up and running,
    your data will be available.


    #### Topologies


    `RavenDB` clusters can scale from one node to several million nodes. Your setup
    can include cloud hosting, local machines, and all kinds of heterogeneous arrangements.
    Finally, various star-shaped topologies are supported with a central location
    performing two-way complete or filtered replication with millions of edge locations.'
  raw: '### Multi-Model Databases


    Multi-model databases are not the fifth category of NoSQL databases, but an emerging
    trend first mentioned in 2012 by Luca Garulli. Starting from Polyglot persistence,
    he envisioned a second generation of NoSQL databases, where one product supports
    different data models. This approach would combine the NoSQL ideal of selecting
    the most appropriate persistence for each subdomain of your application without
    having several different databases. Hence, you would not compromise in modeling
    and would end up with just one database to learn and manage.


    Database choice is fraught with difficulty and risk since this choice is committed
    to a particular model upfront. Considering the fast pace of changes modern applications
    must support, this choice can be easily invalidated by unpredictable future changes.


    Going with a multi-model database means that database choice can be less risky.
    Your database will be able to support you in various circumstances as your data
    model evolves under the stream of change requests you receive from your customers
    over time.


    ## RavenDB


    In this section, we will introduce RavenDB, a second-generation NoSQL database.
    You will learn about its history, why RavenDB is a good choice of data persistence
    for your applications, as well as how to start working with RavenDB in no time.


    ### History


    RavenDB was created by Oren Eini, a developer from Israel. In the late 2000s,
    he was an active contributor on the NHibernate project, .Net port of famous Hibernate
    ORM, one of the most popular mappers used by developers worldwide. Besides being
    involved in the open source community, Oren worked as a consultant for companies
    using relational databases. Being a prolific blogger under the pseudonym Ayende
    Rahien at [`https://ayende.com`](https://ayende.com/) , he recorded various experiences
    with companies he was helping. It felt like one long Groundhog Day – they all
    had problems with applications, and canonical RDBMS caused all these problems
    most of us experienced – lack of indexes, Select N+1, projections that *JOIN*ed
    seven or eight tables… Could it be that so many developers were using relational
    databases in the wrong way? Or is there something inherently problematic with
    them? Do you need to be an expert in databases to develop your application swiftly
    and produce a solution that will be long-lasting and reliable?


    It is not uncommon for software developers to observe problems over time, think
    about them, and become passionate about solving them. You could say that RavenDB
    was born equal parts from frustration with the present state of database landscape
    and passion for creating an elegant solution to practical problems.


    In May 2010, Oren released version 1.0 of RavenDB . In October, the first commercial
    installation was secured, and after that, RavenDB started gaining popularity –
    up to the point when 1 million developers’ downloads were reached in September
    2015.


    Today, RavenDB is a mature and reliable database, battle-proven from installations
    on small machines like Raspberry Pi up to clusters consisting of over a million
    nodes. Let’s look at some reasons that helped RavenDB become such a versatile
    database.


    ### Advantages of RavenDB


    Along with all the advantages RavenDB has as a Document NoSQL database, which
    we discussed in previous sections, some specifics make it stand out.


    #### Extreme Performance


    RavenDB is highly optimized. Even on toy machines like Raspberry Pi 400, you will
    be able to serve over 2.000 concurrent read requests per second. Commodity hardware
    will bring you to 150.000 writes/s and 1.000.000 reads/s, and all of that with
    low latency. Furthermore, your queries will continuously operate over precomputed
    indexes so that you will get your results blazingly fast.


    #### Fully Transactional


    Since the very beginning, RavenDB is offering fully transactional ACID guarantees.
    Multi-document and multicollection transactions are supported as well, along with
    cluster-wide transactions. We will cover ACID in later chapters, but now, let’s
    say – ACID is a bare minimum that any database should guarantee. It will ensure
    that your data is not lost and that your database maintains its consistency despite
    all challenges.


    #### Auto Tuning


    RavenDB is a grown-up database that knows how to take care of itself. If you try
    to execute a query without an index that will support it, RavenDB will create
    an index for you. If one node of your cluster gets slower for some reason, traffic
    will be redirected to the fastest node dynamically. Your cluster is on constant
    and ongoing self-monitoring mode. It will track vital parameters like CPU usage
    or memory utilization and act upon them. Overall, RavenDB is observing its environment
    and reacting intelligently.


    #### Safe by Default


    Being safe by default has many aspects, and RavenDB prides itself on state-of-the-art
    technical solutions and a set of defaults that will enable you to get up and to
    run in a matter of minutes. It is not only what you have to do but also a list
    of things you are not forced to do to produce safe applications. Here is the subset
    of these features:


    *   *Encryption* - default encryption in transit and optional encryption at rest
    mean that your data will never be exposed in plain text form to anyone who might
    listen to the traffic between your application and RavenDB.


    *   *Authentication* – X.509 digital certificates are used for access control
    as well as a basis for HTTPS access to the RavenDB cluster.


    *   *Limiting the number of database calls per session* – too many requests per
    single database session is dangerous. If developers are not careful, antipatterns
    like Select N+1 can result in dozens, even hundreds, of calls for fetch data to
    render just one web page. RavenDB client will try to batch multiple calls whenever
    possible and throw an exception if you cross the default threshold of 30 calls
    per single session. However, as you will see later, you can reduce the number
    of calls to one or two in most cases. This is a significant speedup for your application,
    and it is lowering the load on your database.


    #### High Availability


    RavenDB is an inherently distributed database. Even if you are running just one
    node, it will be treated as a cluster of one node. Clusters usually consist of
    several nodes, most commonly three. Such a multi-node setup will provide several
    exact copies of your database , and as long as just one node is up and running,
    your data will be available.


    #### Topologies


    RavenDB clusters can scale from one node to several million nodes. Your setup
    can include cloud hosting, local machines, and all kinds of heterogeneous arrangements.
    Finally, various star-shaped topologies are supported with a central location
    performing two-way complete or filtered replication with millions of edge locations.'
  trans: '

    ### 多模型数据库


    多模型数据库并非 NoSQL 数据库的第五个类别，而是一个新兴趋势，最早由卢卡·加里于 2012 年提出。他从多语言持久化（Polyglot persistence）的概念出发，设想了第二代
    NoSQL 数据库，即一个产品能够支持不同的数据模型。这种方法将结合 NoSQL 的理想——为应用的每个子领域选择最合适的持久化方式，而无需使用多个不同的数据库。因此，你无需在建模上做出妥协，最终只需学习和管理一个数据库即可。


    数据库的选择充满困难和风险，因为这个选择需要预先承诺一个特定的模型。考虑到现代应用程序必须支持的快速变化节奏，这个选择很容易因不可预测的未来变化而失效。


    采用多模型数据库意味着数据库选择的风险可以降低。随着你从客户那里收到的需求变更流不断演进你的数据模型，你的数据库能够在各种情况下为你提供支持。


    ## RavenDB


    在本节中，我们将介绍 `RavenDB`，一个第二代 NoSQL 数据库。你将了解它的历史、为什么 `RavenDB` 是应用程序数据持久化的良好选择，以及如何立即开始使用
    `RavenDB`。


    ### 历史


    `RavenDB` 由以色列开发者奥伦·艾尼创建。在 2000 年代末，他是 `NHibernate` 项目的活跃贡献者，这是著名的 Hibernate ORM
    的 .Net 移植版本，也是全球开发者最常用的映射器之一。除了参与开源社区，奥伦还为使用关系型数据库的公司担任顾问。他以 Ayende Rahien 的笔名在
    `https://ayende.com` 上 prolific 地撰写博客，记录了他帮助各种公司的经历。这感觉就像是一个漫长的“土拨鼠日”——他们都遇到了应用程序的问题，而典型的
    `RDBMS` 导致了我们大多数人都经历过的这些问题——缺少索引、`Select N+1`、连接了七、八个表的投影……难道这么多开发者都在错误地使用关系型数据库吗？还是说它们本身存在一些固有的问题？你是否需要成为数据库专家才能快速开发应用程序并产生一个持久可靠的解决方案？


    软件开发者随时间推移观察到问题、思考它们并热衷于解决它们，这并不罕见。你可以说 `RavenDB` 的诞生，一半源于对数据库现状的挫折，一半源于对解决实际问题、创造优雅方案的
    passion。


    2010 年 5 月，奥伦发布了 `RavenDB` 的 1.0 版本。10 月，第一个商业安装获得成功，此后，`RavenDB` 开始获得普及——直到 2015
    年 9 月达到了 100 万开发者的下载量。


    如今，`RavenDB` 是一个成熟可靠的数据库，从在 `Raspberry Pi` 这样的小型机器上的安装，到包含超过一百万节点的集群，都经历了实战考验。让我们来看看一些帮助
    `RavenDB` 成为如此通用数据库的原因。


    ### RavenDB 的优势


    除了 `RavenDB` 作为文档型 NoSQL 数据库所具备的所有优势（我们在前面章节已讨论过）之外，一些具体特性使其脱颖而出。


    #### 极致性能


    `RavenDB` 高度优化。即使在像 `Raspberry Pi 400` 这样的玩具机器上，你也能够每秒处理超过 2,000 个并发读取请求。商用硬件将使你达到
    150,000 次写入/秒和 1,000,000 次读取/秒，而且所有这些都具有低延迟。此外，你的查询将持续在预计算的索引上运行，因此你将能极快地获得结果。


    #### 完全事务性


    从最初开始，`RavenDB` 就提供完全事务性的 `ACID` 保证。同时也支持多文档和多集合事务，以及集群范围的事务。我们将在后面的章节中介绍 `ACID`，但现在可以说——`ACID`
    是任何数据库都应保证的最低要求。它将确保你的数据不会丢失，并且你的数据库在面对所有挑战时保持一致性。


    #### 自动调优


    `RavenDB` 是一个成熟的数据库，懂得如何自我管理。如果你尝试执行一个没有索引支持的查询，`RavenDB` 会为你创建一个索引。如果由于某种原因你的集群中某个节点变慢，流量将被动态重定向到最快的节点。你的集群处于持续进行的自我监控模式。它会跟踪关键参数，如
    `CPU` 使用率或内存利用率，并据此采取行动。总的来说，`RavenDB` 会观察其环境并智能地做出反应。


    #### 默认安全


    默认安全包含许多方面，`RavenDB` 以其尖端的技术解决方案和一组默认设置为荣，这些将使你能在几分钟内启动并运行。这不仅包括你必须做的事情，还包括你不被强制要求去做也能产生安全应用程序的事项列表。以下是这些功能的子集：


    *   `加密` - 默认的传输中加密和可选的静态加密意味着你的数据永远不会以明文形式暴露给任何可能监听应用程序与 `RavenDB` 之间流量的人。

    *   `身份验证` – 使用 `X.509` 数字证书进行访问控制，以及作为通过 `HTTPS` 访问 `RavenDB` 集群的基础。

    *   `限制每个会话的数据库调用次数` – 单个数据库会话中请求过多是危险的。如果开发者不小心，像 `Select N+1` 这样的反模式可能导致获取数据以呈现一个网页时进行数十甚至数百次调用。`RavenDB`
    客户端将尽可能批处理多个调用，如果你超过了每个会话 30 次调用的默认阈值，它将引发异常。然而，正如你稍后将看到的，在大多数情况下，你可以将调用次数减少到一两次。这对你的应用程序是一个显著的加速，并降低了数据库的负载。


    #### 高可用性


    `RavenDB` 是一个本质上分布式的数据库。即使你只运行一个节点，它也会被视为一个单节点集群。集群通常由多个节点组成，最常见的是三个。这种多节点设置将提供数据库的多个精确副本，只要有一个节点正常运行，你的数据就是可用的。


    #### 拓扑结构


    `RavenDB` 集群可以从一个节点扩展到数百万个节点。你的设置可以包括云托管、本地机器和各种异构安排。最后，支持各种星型拓扑，中心位置与数百万边缘位置进行双向的完整或过滤复制。

