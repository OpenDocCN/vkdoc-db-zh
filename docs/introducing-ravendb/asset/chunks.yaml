    developed, mature, and stable, reassuring for most of the users. The mentality
    of the expression “nobody ever got fired for buying IBM” from the 1970s lives
    up to this day - RDBMS is perceived as a “safe choice,” and NoSQL is looked upon
    as gambling with new “cool” technology. From the perspective of many companies,
    NoSQL is a unique, young technology, cutting edge that may be exciting for developers,
    but a big unknown in production.


    *   *Support* - in case of a system failure, competent and timely support is vital
    for every organization’s business continuity plan. All RDBMS vendors go to great
    lengths to provide such support. On the other hand, many NoSQL products are open
    source and lack business entities that offer support options. When they exist,
    these companies are small startups without global presence, support resources,
    or credibility of an IBM, Oracle, or Microsoft.


    *   *Analytics and business intelligence* - data presents a valuable resource
    for every Company. They are analyzing data, mining, and making conclusions that
    improve their decision-making processes, efficiency, and, as a result, profitability
    in the market. Business intelligence (BI) is a strategic area for most companies.
