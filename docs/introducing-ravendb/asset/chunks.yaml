- fmt: '## Ranking


    For full-text search results to be helpful and for users of your application to
    be satisfied, most relevant results should be ranked at the top, followed by less
    relevant results. How does RavenDB determine relevancy?


    Let’s look at some examples.


    Running query


    ```ravendb

    from Employees where search(Address, "Seattle Redmond")

    select Address.City

    ```


    you will see that two employees from Seattle are positioned first, followed by
    a single one from Redmond. If we change the order of cities to


    ```ravendb

    from Employees where search(Address, "Redmond Seattle")

    select Address.City

    ```


    you will notice results are sorted in reverse order compared to the previous query,
    following the order of search terms – first employee from Redmond and then two
    from Seattle.


    As you can observe, this ordering is not a random one. RavenDB orders search results
    based on relevancy, so users are more likely to see more relevant results at the
    top of the list. When searching for “Redmond Seattle,” RavenDB will consider the
    first search term more important than the second one, so employees from Redmond
    will be ranked before employees from Seattle. You can introduce additional search
    terms as we did in Listing 7-3.


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    select Address.City

    ```

    Listing 7-3

    Searching for multiple terms


    This query will rank London employees first and then Seattle employees, and finally,
    any Redmond employees will be at the bottom of the list.


    For every full-text search match, RavenDB computes the indexing score and uses
    it to determine the ranking of the results. This score is contained in the `@index-score`
    property within the `@metadata` of every search result. You can inspect it by
    previewing any results from a query from Listing 7-3, as shown in Figure 7-4.
    `@index-score` is the last property of `@metadata`.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig4_HTML.png)


    An algorithm for the index score of document employee/4-A. The labeled query is
    address city, metadata, flags, identification, last-modified, change-vector, projection,
    and index-score.


    Figure 7-4

    The Indexing Score Located Within the Metadata


    The larger the `@index-score` is, the more relevant result will be. Indexing score
    is exposed via `score()` function. Hence, a query from Listing 7-3 is functionally
    equivalent to the following query:


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    order by score() desc

    select Address.City

    ```


    You can use the `score()` function to reverse ranking and show the least relevant
    results first if you need:


    ```ravendb

    from Employees where search(Address, "London Seattle Redmond")

    order by score() asc

    select Address.City

    ```


    RavenDB can also give you a detailed explanation of how it calculates the score.
    Along with the query, include the `explanations()` function, like in the following
    query:


    ```ravendb

    from Employees where search(Address, "Redmond Seattle")

    select Address.City

    include explanations()

    ```


    This time, query results are accompanied by ranking scores in an additional tab,
    as shown in Figure 7-5.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig5_HTML.png)


    An algorithm for the ranking scores of employees. The labeled index are show,
    identification, and explanation. The I D are employees/4-A, employees/8-A, and
    employees/1-A.


    Figure 7-5

    Explanation Column with Ranking Scores


    Clicking on the *Show* icon will give you a detailed explanation of how the indexing
    score was computed, as shown in Figure 7-6.


    ![](images/514303_1_En_7_Chapter/514303_1_En_7_Fig6_HTML.jpg)


    An algorithm depicts the detailed explanation of the index scoring for employees/4-A.


    Figure 7-6

    A Detailed Explanation of the Indexing Score


    This decomposition can help you determine why specific results ordering is the
    way it is.'
