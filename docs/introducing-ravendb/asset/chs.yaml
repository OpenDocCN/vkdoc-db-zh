  ## 总结


  在本章中，我们介绍了索引的概念，它是一种专门的数据结构。索引是数据库内与你的数据并排放置的元数据，是加速查询的可能解决方案之一。我们展示了 RavenDB 的设计方法如何帮助你避免索引的常见问题。


  在下一章中，我们将展示如何控制索引创建并自行定义，而不是让 RavenDB 自动创建它们。


  '
- "# 5. 映射索引\n\n上一章介绍了索引，几乎所有数据库都使用它来加速和优化查询。在本章中，我们将展示如何掌控索引。你可以明确地将它们指定为“静态”索引，而不是依赖\
  \ RavenDB 自动创建它们。除了对一个或多个集合进行索引的方法外，你还将学习如何处理引用文档以及创建存储字段、动态字段和计算字段。最后，我们将介绍索引数据库中分层数据模型的技术。\n\
  \n## 静态索引\n\n在上一章中，我们看到 RavenDB 不允许对原始数据进行查询。查询总是在索引上执行，如果你没有索引，RavenDB 的 `查询优化器`\
  \ 会为你创建一个。\n\n执行查询\n\n```\nfrom Employees where FirstName = 'Nancy'\n```\n\n将触发\
  \ `Auto/Employees/ByFirstName` 自动索引的创建。一旦创建，此索引将在查询结果生成后保持活动状态，RavenDB 将把它用于未来所有针对相同字段的筛选和排序查询。\n\
  \nRaven 查询语言允许你直接查询索引，如清单 5-1 所示\n\n```\nfrom index 'Auto/Employees/ByFirstName'\
  \ where FirstName = 'Nancy'\n清单 5-1\n直接查询索引\n```\n\n这样的查询将产生与之前查询相同的结果。\n\n因此，你可以使用\
  \ `from [集合]` 形式让查询优化器为你选择，或者使用 `from index '[索引名称]'` 形式来掌控用于交付结果的索引选择。\n\n你可以更进一步掌控。不依赖查询优化器来创建索引，你可以自己定义它。这样的索引被称为\
  \ `静态索引`。\n\n\n### 静态映射索引\n\n你可以通过编写查询来检查 `Auto/Employees/ByFirstName` 自动索引的内容：\n\
  \n```\nfrom index 'Auto/Employees/ByFirstName'\n```\n\n然后选择 *设置 ➤ 显示原始索引条目而非匹配文档*，如图\
  \ 5-1 所示。\n\n![](img/514303_1_En_5_Fig1_HTML.png)\n\n图 5-1：自动索引的内容\n\n你可以根据图 5-1\
  \ 的内容创建一个静态索引。在左侧栏选择 *索引列表* 选项，然后点击 *新建索引* 按钮。你现在将看到一个用于定义新索引的屏幕，如图 5-2 所示。\n\n\
  ![](img/514303_1_En_5_Fig2_HTML.jpg)\n\n图 5-2：创建新索引对话框\n\n首先，你需要为新索引选择一个名称。通常采用以下格式的名称：\n\
  \n```\n[COLLECTION]/By[FIELD]\n```\n\n例如，`Auto/Employees/ByFirstName` 已经采用了这种格式。\n\
  \n因此，使用 `Employees/ByFirstName` 作为名称。\n\n映射索引的内容是一个 JavaScript 函数 `map`，它将接收集合并为每个文档返回一个对象；这些对象将成为索引项。因此，该函数名为\
  \ `map`，因为它将文档映射到索引项。代码清单 5-2 展示了这样的映射函数。\n\n```\nmap(\"Employees\", function(emp)\
  \ {\nreturn {\nFirstName: emp.FirstName\n}\n})\n```\n\n代码清单 5-2：`Employees/ByFirstName`\
  \ 索引的内容\n\n点击 *保存* 按钮将创建一个新索引，它将与其他自动和静态索引一起列出，如图 5-3 所示。\n\n![](img/514303_1_En_5_Fig3_HTML.png)\n\
  \n图 5-3：索引列表\n\n你可以看到，自动索引 `Auto/Employees/ByFirstName` 包含九个条目，与你刚刚创建的 `Employees/ByFirstName`\
  \ 相同。如果你查询它：\n\n```\nfrom index 'Employees/ByFirstName' where FirstName = 'Nancy'\n\
  ```\n\n你将得到相同的结果。\n\n### 静态索引分析\n\n让我们分析代码清单 5-2 中索引的所有元素。从顶层结构来看，你可以看到这个映射索引具有以下形式：\n\
  \n```\nmap(\"[COLLECTION]\", function(doc) {...})\n```\n\n第一个参数是集合名称。文档将从该集合中逐一获取，并传递给\
  \ JavaScript 函数，即第二个参数。\n\n观察函数本身：\n\n```\nfunction(emp) {\nreturn {\nFirstName:\
  \ emp.FirstName\n}\n}\n```\n\n你可以看到它接收来自集合中的一个文档，并返回 JavaScript *对象字面量*：\n\n```\n\
  {\nFirstName: emp.FirstName\n}\n```\n\n这个对象字面量将成为索引项。\n\n如果我们用紧凑的 *箭头函数表达式* 替换传统的函数表达式，索引可以被稍微简化，如代码清单\
  \ 5-3 所示。\n\n```\nmap(\"Employees\", emp => {\nreturn {\nFirstName: emp.FirstName\n\
  }\n})\n```\n\n代码清单 5-3：`Employees/ByFirstName` 索引的简化版本\n\n### 扩展映射索引\n\n索引项的结构将限制我们可以过滤的字段。尝试执行以下查询：\n\
  \n```\nfrom index 'Employees/ByFirstName' where LastName = 'Davolio'\n```\n\n将会导致错误：\n\
  \n```\nThe field 'LastName' is not indexed, cannot query/sort on fields that are\
  \ not indexed\n```\n\n你的第一反应可能是创建一个新的 *Employees/ByLastName* 索引，如代码清单 5-4 所示。\n\n\
  ```\nmap(\"Employees\", emp => {\nreturn {\nLastName: emp.LastName\n}\n})\n```\n\
  \n代码清单 5-4：`Employees/ByLastName` 索引\n\n这个索引现在可以被查询：\n\n```\nfrom index 'Employees/ByLastName'\
  \ where LastName = 'Davolio'\n```\n\n并产生结果。\n\n然而，与其增加一个索引，我们不如将 *Employees/ByFirstName*\
  \ 索引扩展，包含 `LastName` 字段。遵循我们之前介绍的约定，可以将其命名为 *Employees/ByFirstNameByLastName*，并定义其内容如代码清单\
  \ 5-5 所示。\n\n```\nmap(\"Employees\", emp => {\nreturn {\nFirstName: emp.FirstName,\n\
  LastName: emp.LastName\n}\n})\n```\n\n代码清单 5-5：`Employees/ByFirstNameByLastName`\
  \ 索引\n\n检查此索引的原始内容，可以发现每个文档的 `FirstName` 和 `LastName` 都被索引，如图 5-4 所示。\n\n![](img/514303_1_En_5_Fig4_HTML.png)\n\
  \n图 5-4：索引 `Employees/ByFirstNameByLastName` 的原始内容\n\n你可以在这个新索引上查询 *FirstName* 字段：\n\
  \n```\nfrom index 'Employees/ByFirstNameByLastName' where FirstName = 'Nancy'\n\
  ```\n\n也可以查询 *LastName* 字段：\n\n```\nfrom index 'Employees/ByFirstNameByLastName'\
  \ where LastName = 'Davolio'.\n```\n\n这样，你就可以仅用一个索引来覆盖一个集合中文档的多个字段。\n\n## 存储字段\n\
  \n在前一章中，我们介绍了不同类型的索引：非聚集索引（仅保存文档引用）、聚集索引（存储整个文档）和覆盖索引（包含一组选定的字段）。到目前为止，本章中我们开发的静态索引都是非聚集索引。你可以通过运行以下查询轻松检查到这一点：\n\
  \n```\nfrom index 'Employees/ByFirstNameByLastName'\n```\n\n获取员工文档后，点击 `Settings`\
  \ 并选择选项 `Show stored index fields only`。你将得到如图 5-6 所示的结果。\n\n![](img/514303_1_En_5_Fig6_HTML.png)\n\
  \n一张截图展示了一个查询、一个包含 3 个切换按钮中启用了 2 个的设置菜单、搜索查询以及保存和播放按钮。结果面板在预览存储的索引字段时显示无数据。\n\n\
  **图 5-6**\n\n索引 `Employees/ByFirstNameByLastName` 无存储字段\n\n如你所见，索引不包含任何存储字段。因此，当你运行带有投影的查询时\n\
  \n```\nfrom index 'Employees/ByFirstNameByLastName'\nwhere FirstName = 'Nancy'\n\
  select FirstName, LastName\n```\n\n数据库引擎将首先根据索引执行过滤，得到单个 ID `employees/1-A`。之后，引擎将再进行一次存储往返以获取该文档并读取其\
  \ `FirstName` 和 `LastName` 属性。\n\n你可以通过指示 RavenDB 存储特定字段，将非聚集索引转换为覆盖索引。返回索引编辑表单并查看屏幕底部，你可以在图\
  \ 5-7 中看到 `Fields` 选项卡。\n\n![](img/514303_1_En_5_Fig7_HTML.png)\n\n一张包含 2 个部分的截图：包含\
  \ 6 行语法和按钮“添加映射”以及“添加归约”的映射部分；包含 4 个选项卡和“添加字段”、“添加默认字段”按钮的归约部分（位于“字段”选项卡中）。\n\n\
  **图 5-7**\n\n编辑索引页面上的字段选项卡\n\n此选项卡显示没有字段添加到索引。通过点击 `Add field` 按钮添加字段 `FirstName`\
  \ 和 `LastName`，填入它们的名称，并在 `Store` 选项中选择值 `Yes`，如图 5-8 所示。\n\n![](img/514303_1_En_5_Fig8_HTML.png)\n\
  \n一张包含 4 个选项卡的截图，分别是字段、配置、附加程序集和附加源。“字段”选项卡有 2 个按钮：“添加字段”和“添加默认字段选项”，用于在姓氏和名字下添加详情。\n\
  \n**图 5-8**\n\n在索引中添加 `FirstName` 和 `LastName` 作为存储字段\n\n保存更改后的索引定义后，重复图 5-6 中的查询将显示索引\
  \ `Employees/ByFirstNameByLastName` 的存储字段，如图 5-9 所示。\n\n![](img/514303_1_En_5_Fig9_HTML.png)\n\
  \n一张截图展示了一个查询、一个包含 3 个切换按钮中启用了 2 个的设置下拉框、搜索查询、保存、播放和删除文档按钮。结果面板显示了一个包含 4 列的表格。\n\
  \n**图 5-9**\n\n索引 `Employees/ByFirstNameByLastName` 的存储字段\n\n由于你刚刚所做的更改，数据库引擎将能够仅通过一次存储往返就创建出由\
  \ `FirstName` 和 `LastName` 组成的投影。通过过滤操作获取的索引条目将包含这两个字段，并且这些字段将立即可用。\n\n我们已经提到，覆盖索引是一个很好的折中方案，因为它们产生结果所需的往返次数更少，但同时又不存储完整的文档。借助\
  \ RavenDB Studio，你现在可以检查所有索引和集合的实际分配存储。通过点击左侧边缘的 `Stats` 图标，然后选择 `Storage report`，你将能够检查分配详情，如图\
  \ 5-10 所示。\n\n![](img/514303_1_En_5_Fig10_HTML.png)\n\n存储报告的截图，显示了点击统计信息图标时索引存储的分配详情和各个字段。\n\
  \n**图 5-10**\n\n存储报告\n\n你可以向索引存储中添加或移除各种字段，并在 `Storage report` 中检查你更改的影响。\n\n\n\n\
  ## 计算字段\n\n到目前为止，你已经创建了几个包含字段值的静态索引。在某些情况下，比如 `Employees/ByFirstName` 索引，字段值是直接从已处理的文档中读取的。而在其他情况下，比如\
  \ `Orders/ByEmployeeName`，会加载被引用的文档，然后索引其字段的内容。\n\n然而，也可以创建包含不存在于任何文档中的值的索引字段。这样的字段被称为**计算字段**。我们通常基于一个或多个其他字段来计算它们的值。\n\
  \n清单 5-9 展示了一个包含计算字段的索引示例。\n\n```javascript\nmap(\"Orders\", order => {\n    var\
  \ employee = load(order.Employee, 'Employees');\n    var total = 0;\n    for (var\
  \ i = 0; i < order.Lines.length; i++) {\n        var line = order.Lines[i];\n  \
  \      total += line.Quantity * line.PricePerUnit * (1 - line.Discount);\n    }\n\
  \    return {\n        EmployeeName: employee.FirstName,\n        Total: total\n\
  \    }\n})\n```\n清单 5-9\n包含计算字段 `Total` 的索引 `Orders/ByEmployeeNameByTotal`\n\n清单\
  \ 5-9 中定义的索引基于 `Orders/ByEmployeeName`，但扩展了字段 `Total`。它的值代表订单的总货币价值，计算方式如下：\n\n\
  ```javascript\nvar total = 0;\nfor (var i = 0; i < order.Lines.length; i++) {\n\
  \    var line = order.Lines[i];\n    total += line.Quantity * line.PricePerUnit\
  \ * (1 - line.Discount);\n}\n```\n\n这是一段相对标准的命令式 JavaScript 代码。它遍历 `order.Lines`\
  \ 数组，对于每一行，其小计为 `quantity * price * (1 – discount)`。行小计被累加起来，在处理完所有行后，变量 `total`\
  \ 就保存了该订单的计算总额。\n\n你可以使用 JavaScript 语言的所有特性，比如循环、函数等。你甚至可以将代码提取到 JS 函数中，从索引的 `map`\
  \ 函数调用，如清单 5-10 所示。\n\n```javascript\nfunction GetTotal(order) {\n    var total\
  \ = 0;\n    for (var i = 0; i < order.Lines.length; i++) {\n        var line = order.Lines[i];\n\
  \        total += line.Quantity * line.PricePerUnit * (1 - line.Discount);\n   \
  \ }\n    return total;\n}\n\nmap(\"Orders\", order => {\n    var employee = load(order.Employee,\
  \ 'Employees');\n    return {\n        EmployeeName: employee.FirstName,\n     \
  \   Total: GetTotal(order)\n    }\n})\n```\n清单 5-10\n功能被提取到 JS 函数中的索引 `Orders/ByEmployeeNameByTotal`\n\
  \n也可以使用 JavaScript 的声明式风格，如清单 5-11 所示。\n\n```javascript\nfunction GetTotal(order)\
  \ {\n    return order.Lines.reduce((partial_sum, l) => partial_sum + (l.Quantity\
  \ * l.PricePerUnit) * (1 - l.Discount), 0)\n}\n\nmap(\"Orders\", order => {\n  \
  \  var employee = load(order.Employee, 'Employees');\n    return {\n        EmployeeName:\
  \ employee.FirstName,\n        Total: GetTotal(order)\n    }\n})\n```\n清单 5-11\n\
  使用声明式 JS 函数的索引 `Orders/ByEmployeeNameByTotal`\n\n还可以将你领域的业务逻辑和业务规则嵌入到索引中。清单 5-12\
  \ 给出了一个这样的例子。\n\n```javascript\nfunction GetTotal(order) {\n    var total = 0;\n\
  \    for (var i = 0; i < order.Lines.length; i++) {\n        var line = order.Lines[i];\n\
  \        var discount = line.Discount;\n        // 为波兰订单额外应用 10% 的折扣\n        if\
  \ (order.ShipTo.Country === \"Poland\") {\n            discount += 0.1;\n      \
  \  }\n        total += line.Quantity * line.PricePerUnit * (1 - discount);\n   \
  \ }\n    return total;\n}\n\nmap(\"Orders\", order => {\n    var employee = load(order.Employee,\
  \ 'Employees');\n    return {\n        EmployeeName: employee.FirstName,\n     \
  \   Total: GetTotal(order)\n    }\n})\n```\n清单 5-12\n扩展了业务规则的索引 `Orders/ByEmployeeNameByTotal`\n\
  \n我们为运往波兰的订单提供了 10% 的折扣，这条规则作为计算字段计算的一部分被嵌入到索引中。\n\n因此，现在你可以执行一个查询：\n\n```javascript\n\
  from index 'Orders/ByEmployeeNameByTotal'\nwhere Total > 15000\n```\n\n来获取所有总货币价值超过\
  \ 15,000 的订单。\n\n所以，利用计算字段，你可以基于现有属性，通过应用可能非常复杂的逻辑，创建新的计算属性。如果需要，你可以将大部分业务逻辑卸载到数据库中。\n\
  \n## 动态字段\n\n正如我们之前提到的，RavenDB 是一个**无模式数据库**。你无需预先定义模式，就能够接受各种半结构化甚至非结构化的数据。项目开始时正是你对领域了解最少的时候。能够推迟关于将使用何种数据结构的决策是一个显著优势。它不仅能加快开发速度，还能在实现过程中以及产品上线后，不可避免地出现更多需求时，提供急需的灵活性。\n\
  \n在其他情况下，你有非常明确的需求，但需要存储在数据库中的数据本质上是异构的。一个典型情况是应用全球化的需求。将业务扩展到世界新的地区，通常意味着需要了解你之前忘记涵盖的概念，并修改你的应用和数据库以考虑它们。\n\
  \n以地址的概念为例。世界各地不同的国家有不同的地址方式。只需阅读全球各国不同的行政区划术语——州、郡、省、区、府、酋长国、州、市、道、县、州——就能理解对这种异构数据建模的完全复杂性。\n\
  \nRavenDB 中文档的无模式 JSON 数据格式，将为你存储的实体提供急需的灵活性以进行扩展。然而，你需要将这些更改传播到查询和应用本身。并且，由于查询使用索引，你也不得不扩展\
  \ RavenDB 索引定义。一旦它被更改，这将触发整个索引的重新计算，这可能既计算密集又耗时。\n\nRavenDB 为这种情况提供了一个方便的解决方案，即**动态字段**。你可以以编程方式定义字段，而不是显式声明字段名称及其值。这样的索引可以适应不同的文档结构。此外，当带有新字段的文档到达数据库时，动态字段将防止索引的完全重新计算。清单\
  \ 5-13 展示了一个为员工地址生成的包含动态字段的索引。\n\n```javascript\nfunction CreateDynamicFields(addr)\
  \ {\n    var ret = [];\n    for (const property in addr) {\n        ret.push(createField(property,\
  \ addr[property], { indexing: 'Exact', storage: false, termVector: null }))\n  \
  \  }\n    return ret;\n}\n\nmap(\"Employees\", emp => {\n    return {\n        _:\
  \ CreateDynamicFields(emp.Address)\n    }\n})\n```\n清单 5-13\n`Employees/DynamicFields`\
  \ 索引\n\n从 `map` 定义可以看出，这个索引处理所有员工，并将为他们的地址创建动态字段。清单 5-14 展示了一个示例地址。\n\n```json\n\
  {\n    \"Line1\": \"4726 - 11th Ave. N.E.\",\n    \"Line2\": null,\n    \"City\"\
  : \"Seattle\",\n    \"Region\": \"WA\",\n    \"PostalCode\": \"98105\",\n    \"\
  Country\": \"USA\",\n    \"Location\": {\n        \"Latitude\": 47.66416419999999,\n\
  \        \"Longitude\": -122.3160148\n    }\n}\n```\n清单 5-14\nemployees/8-A 的地址字面量\n\
  \n图 5-11 显示了这种形式地址的索引项集合。\n\n![](img/514303_1_En_5_Fig11_HTML.png)\n图 5-11\n`Employees/DynamicFields`\
  \ 索引的索引项\n\n地址的每个属性（如 `Line1`、`Line2`、`City` 等）都是一个项的集合。该集合中的值是从任何员工文档上该属性的所有出现位置中提取出来的。\n\
  \n让我们看看索引的定义。你可以看到动态字段的定义有一个特殊的形式：\n\n```javascript\n_: CreateDynamicFields(emp.Address)\n\
  ```\n\n\n\n## 动态字段\n\n使用下划线 `_` 作为对象字面量名称只是一种约定。图 5-11 显示，将创建一个名为 `_` 的集合，但它没有内容。\n\
  \n生成动态字段集合的函数定义如下：\n\n```javascript\nfunction CreateDynamicFields(addr) {\nvar ret\
  \ = [];\nfor (const property in addr) {\nret.push(createField(property, addr[property],\
  \ { indexing: 'Exact', storage: false, termVector: null }))\n}\nreturn ret;\n}\n\
  ```\n\n首先定义一个空数组。索引引擎将遍历地址的所有属性，并为每个属性添加一个新的动态字段。\n\nRavenDB 内置了以下 JS 函数：\n\n```javascript\n\
  createField(name, value, {options}).\n```\n\n你可以使用它来创建一个动态字段 `name:property`。\n\n\
  请注意，`CreateDynamicFields` 函数是完全通用的——没有指定确切的字段名。它可以处理传递给它的任何对象字面量，提取所有属性名称及其值，并为找到的每个属性创建动态字段。\n\
  \n此外，修改员工文档将触发索引更新，并向索引词条中添加一个新字段。作为一个练习，请打开 ID 为 `employees/8-A` 的员工，并使用以下属性扩展其\
  \ Address：\n\n```json\n\"Continent\": \"North America\"\n```\n\n保存更改后，验证是否已创建一个名为\
  \ `Continent` 的新索引词条集合。\n\n总的来说，动态字段是创建灵活索引的工具，这些索引可以处理异构数据，同时还能适应你的领域模型可能引入的未来变更。\n\
  \n## 扇出索引\n\n到目前为止，我们创建的索引都是处理文档的，并且为每个文档创建一个索引条目。例如，索引 `Employees/ByFirstName`\
  \ 将获取所有九份员工文档，读取他们的名字，并为每个文档输出一个索引条目。图 5-12 显示了此索引的摘要。\n\n![](img/514303_1_En_5_Fig12_HTML.png)\n\
  \n一张截图显示了名为 employees 的索引，带有一个复选框，显示“employees slash by first name”，共显示 9 个条目，状态为“up\
  \ to date”，模式为“normal”，优先级为“normal”，锁定状态为“unlocked”。\n\n图 5-12\n\n索引 `Employees/ByFirstName`\
  \ 的摘要\n\n摘要显示九个条目，每个文档一个。索引条目数等于集合中的文档数。\n\n可以编写一个索引，使其对每个处理的文档输出不止一个而是多个条目。这样的索引称为\
  \ *扇出索引*。代码清单 5-15 展示了这样一个索引的示例。\n\n```javascript\nmap('Orders', order => {\nvar\
  \ res = [];\norder.Lines.forEach(l => {\nres.push({\nProductName: l.ProductName\n\
  })\n});\nreturn res;\n})\n代码清单 5-15\nOrders/ByProductName 索引\n```\n\n扇出索引可以为每个文档产生数十甚至数百个条目。代码清单\
  \ 5-15 中的索引遍历每个订单中的所有订单项，并为每个订单项创建一个索引条目。每个这样的条目都包含一个产品名称。因此，对于每个订单文档，该索引将创建与订单项数量一样多的条目。\n\
  \n现在，你可以查找所有包含指定产品名称订单项的订单：\n\n```rql\nfrom index 'Orders/ByProductName' where ProductName\
  \ = 'chocolade'\n```\n\n图 5-13 显示，检查特定订单的索引条目可以揭示其所有条目，并帮助你理解扇出原理。\n\n![](img/514303_1_En_5_Fig13_HTML.png)\n\
  \n一张截图显示了从索引 orders slash by product name 中查询 where i d = orders slash 154-a 的结果。结果面板中有一个包含\
  \ 3 列的表格，分别是预览、产品名称和 i d，以及一个删除文档按钮。\n\n图 5-13\n\n`Orders/154-a` 的索引条目\n\n回到索引概览，你会看到该索引包含\
  \ 2,155 个条目，处理了 830 个订单。\n\n同样地，你可以为所有带有嵌入值的文档建立索引。\n\n## 多地图索引\n\n到目前为止，我们定义的所有索引都是处理单个集合，加载其文档的属性，并将它们的值提取到索引条目中。然而，不同集合中的文档拥有相同属性的情况并不少见。一个典型的例子就是地址——在我们的示例数据集中，`Employees`、`Companies`\
  \ 和 `Suppliers` 都拥有这个属性。\n\n`Companies` 和 `Suppliers` 都是法人实体，不难想象在某些业务场景下，你希望按城市搜索这两者。一个可能的解决方案是创建\
  \ `Companies/ByCity` 和 `Suppliers/ByCity` 索引。但是，你需要执行两次搜索才能得到完整结果：\n\n```rql\nfrom\
  \ index 'Companies/ByCity' where City = 'paris'\nfrom index 'Suppliers/ByCity' where\
  \ City = 'paris'\n```\n\nRavenDB 提供了一种将这两个索引合并为一个的方法。这种索引称为 *多地图索引*。\n\n对于我们的场景，定义这样一个索引并不比定义单地图索引更困难。首先，你需要选择一个名称。由于扫描了两个集合，你可以使用一个描述业务功能而非集合名称的名字，例如\
  \ `Search/ByCity`。代码清单 5-16 展示了这个索引的定义。\n\n```javascript\nmap(\"Companies\", company\
  \ => {\nreturn {\nCity: company.Address.City\n}\n})\nmap(\"Suppliers\", supplier\
  \ => {\nreturn {\nCity: supplier.Address.City\n}\n})\n代码清单 5-16\nSearch/ByCity 索引\n\
  ```\n\n你像往常一样添加第一个地图。然后，点击“添加地图”按钮。将会再打开一个文本区域，以便你添加第二个地图定义。你的多地图索引已准备好进行查询，如图 5-14\
  \ 所示。\n\n![](img/514303_1_En_5_Fig14_HTML.png)\n\n一张截图显示了从索引 search slash by city\
  \ 中查询 where city = paris 的结果。结果面板中有一个包含 7 列的表格，分别是预览、i d、名称、外部 I d、联系人、地址和电话号码，以及一个删除文档按钮。\n\
  \n图 5-14\n\n查询多地图 `Search/ByCity` 索引\n\n你得到的结果是所有位于巴黎的公司和供应商。\n\n你可以用另一个处理 `Employees`\
  \ 的地图来扩展这个索引。我们将其留作你的练习。\n\n\n## 索引层次结构数据\n\n除了简单的线性关系外，你的应用程序不可避免地需要表示和存储更复杂的结构。其中一种结构是层次结构——一系列按顺序指向下一个文档的链。层次数据的典型代表是家谱树或博客文章的评论线程。\n\
  \n我们的示例数据库包含一个层次数据的例子，如代码清单 5-17 所示。\n\n```\n{\n\"LastName\": \"Dodsworth\",\n\"\
  FirstName\": \"Anne\",\n...\n\"ReportsTo\": \"employees/5-A\",\n...\n```\n\n代码清单\
  \ 5-17\n`employees/9-A` 文档的 `ReportsTo` 属性\n\n每位员工都有一个 `ReportsTo` 属性，其中包含另一名员工的标识符。在本章中，你已经看到了如何索引相关文档的示例，因此很容易想到代码清单\
  \ 5-18 中展示的索引。\n\n```\nmap(\"Employees\", emp => {\nreturn {\nManager : load(emp.ReportsTo,\
  \ \"Employees\").FirstName\n}\n})\n```\n\n代码清单 5-18\n`Employees/ByReportsToFirstName`\
  \ 索引\n\n查看此索引的索引项，你会看到它只包含两个名字：Andrew 和 Steven。查询索引获取这两个名字\n\n```\nfrom index 'Employees/ByReportsToFirstName'\
  \ where Manager = 'Andrew'\nfrom index 'Employees/ByReportsToFirstName' where Manager\
  \ = 'Steven'\n```\n\n将揭示 Northwind Traders 公司的结构：Anne、Michael 和 Robert 直接向 Steven\
  \ 汇报。其他所有人，包括 Steven，都直接向 Andrew 汇报。这个层次结构也体现在员工的职称上。Andrew 是“销售副总裁”，Steven 是“销售经理”。所有其他员工则担任“销售代表”和“内部销售协调员”。\n\
  \n这里需要注意的一个重要事项是 Andrew 的 `ReportsTo` 属性：\n\n```\n\"ReportsTo\": null\n```\n\n此属性为\
  \ null，`Employees/ByReportsToFirstName` 将执行以下行：\n\n```\nload(null, \"Employees\"\
  ).FirstName\n```\n\n然而，与大多数编程语言不同，这里的 null 引用不会造成任何问题。RavenDB 会识别尝试加载不存在文档的操作，并优雅地处理——它不会为\
  \ Andrew 生成任何索引条目。如果你检查此索引的概述，你会看到它针对九名已处理员工只有八个条目。\n\n我们刚才计算的层次结构并不完整——只获取了直接上级。在为每位员工获取了直接经理后，我们可以继续沿着层次树向上攀升，直到到达层次结构中的最高层经理。代码清单\
  \ 5-19 定义了一个索引，用于收集每位员工的直接和间接经理。\n\n```\nmap(\"Employees\", empl => {\nif (empl.ReportsTo\
  \ == null) return null;\nvar managerNames = [];\nwhile (true) {\nempl = load(empl.ReportsTo,\
  \ \"Employees\");\nif (empl == null)\nbreak;\nmanagerNames.push(empl.FirstName);\n\
  }\nreturn {\nManager: managerNames\n}\n})\n```\n\n代码清单 5-19\n`Employees/ByManagers`\
  \ 索引\n\n此索引包含的索引项与上一个索引（`Employees/ByReportsToFirstName`）相同，但索引条目不同，如图 5-15 所示。\n\
  \n![](img/514303_1_En_5_Fig15_HTML.png)\n\n屏幕截图显示了对索引 `employees slash by managers\
  \ where manager = steven` 的查询。结果面板包含一个有 3 列（预览、经理和 i d）的表格、统计信息选项卡和删除文档按钮。\n\n图\
  \ 5-15\n`Employees/ByManagers` 索引的索引条目\n\n如你所见，我们查询了经理是 Steven 的所有员工，并且我们得到了所有三个人。然而，这些员工的索引条目同时包含了\
  \ Steven 和 Andrew——正如我们在代码清单 5-19 中循环向上遍历层次结构时，Steven 被添加到数组中，然后是作为 Steven 上级官员被加载的\
  \ Andrew。\n\n此索引的递归性质可以用声明性的方式表达。RavenDB 提供了 JS 函数 `recurse`，形式如下：\n\n```\nrecurse(start_document,\
  \ func(doc) -> doc)\n```\n\n它将从指定的文档开始，以递归方式应用 `func`——返回的文档将作为输入传递给 `func`。如代码清单\
  \ 5-20 中定义的调用链将持续进行，直到 `func` 返回 null。\n\n```\nmap(\"Employees\", empl => {\nvar\
  \ reportsTo = load(empl.ReportsTo, \"Employees\");\nreturn recurse(reportsTo, x\
  \ => load(x.ReportsTo, \"Employees\"))\n.map(boss => {\nreturn { Managers: boss.FirstName\
  \ };\n});\n})\n```\n\n代码清单 5-20\n`Employees/ByManagers` 索引的递归版本\n\n此索引的命令式和声明式版本在结果上是等价的。你将能够通过链中的任何值查询层次结构。\n\
  \n## 总结\n\n在本章中，我们介绍了静态索引以显式定义索引。你了解了索引单个或多个集合的方法，并指定了此类索引的动态字段、存储字段和计算字段。我们介绍了索引对其他文档引用的技术，以及处理层次数据结构的方法。\n\
  \n下一章将展示如何创建执行数据聚合的索引。\n\n"
- "# 6. MapReduce 索引\n\n上一章展示了对索引定义和生命周期的完全控制。介绍了 Map 和 MultiMap 索引，以及各种可用于过滤和排序文档的计算字段的方法。本章将展示如何在\
  \ RavenDB 中执行分组和聚合。将介绍 MapReduce 和 MultiMapReduce 索引的概念，以及将索引内容具体化到新集合的方法。\n\n##\
  \ 分组\n\n上一章执行的查询是关于过滤的。定义了过滤条件，数据库返回所有匹配的文档。这类典型查询如下所示：\n\n```\nfrom index 'Auto/Employees/ByFirstName'\n\
  where FirstName = 'Nancy'\n```\n\n或\n\n```\nfrom index 'Orders/ByEmployeeNameByTotal'\n\
  where Total > 15000\n```\n\n除了过滤文档，RavenDB 还能够对数据进行分组。假设我们想按发货国家/地区分析订单。你可以通过运行代码清单\
  \ 6-1 所示的查询来实现。\n\n```\nfrom Orders as o\ngroup by o.ShipTo.Country\nselect o.ShipTo.Country\n\
  ```\n\n代码清单 6-1\n按发货国家/地区对订单进行分组\n\n此查询将生成一个包含 Northwind Traders 发送订单的 21 个不同国家/地区的列表，如图\
  \ 6-1 所示。\n\n![](img/514303_1_En_6_Fig1_HTML.png)\n\n查询结果快照，显示一个包含 21 个国家/地区的列表。法国、德国、比利时、巴西是列表中的一些国家/地区。\n\
  \n图 6-1\n订单的发货国家/地区\n\n与你之前看到的所有查询一样，此查询也使用索引来返回结果。由于我们没有预先定义静态索引，RavenDB 创建了自动索引\
  \ `Auto/OrdersReducedByShipTo.Country`，该索引在数据库的所有索引列表中可见。单击它将显示如图 6-2 所示的索引详细信息。\n\
  \n![](img/514303_1_En_6_Fig2_HTML.png)\n\n数据库中所有索引的快照，按国家/地区分类。\n\n图 6-2\n自动索引 `Auto/OrdersReducedByShipTo.Country`\
  \ 的结构\n\n处理了来自 `Orders` 集合的文档，提取了它们的 `ShipTo.Country` 值，并将具有相同值的订单 ID 存储在索引条目中。RavenDB\
  \ 使用一种特定的编程模型来处理分组任务，我们将在下一节中研究它。\n\n\n## MapReduce\n\n图 6-2 展示了索引中数据分组管道的可视化。在此图的顶部，你会看到\
  \ `Map-Reduce` 标题，表示此索引类型。这种由 Google 推广的技术，其另一种拼写为 `MapReduce`，用于跨多台机器并行处理数据。在典型设置中，数据首先被拆分成批次。每个批次被发送到不同的设备，该设备将使用\
  \ `map` 函数转换接收到的集合中的所有条目。然后，映射后的条目通过 `reduce` 函数组合，产生最终结果集。\n\n上一章介绍了自动和静态索引的示例，它们实现了映射函数来将文档转换为索引条目。MapReduce\
  \ 索引将获取此类映射条目，并对其应用归约函数，输出分组后的条目。RavenDB 使用了这种编程模型的一个变体。\n\n与 Google 等公司使用的原始 MapReduce\
  \ 不同（其数据批次分布在成百上千台机器上），RavenDB 在单台机器上执行此过程。多个线程将接收数据包，首先应用映射函数以输出投影，然后对这些投影应用归约函数。\n\
  \nRavenDB 有一个 MapReduce 可视化器，可以帮助你检查 MapReduce 索引。你可以通过点击侧边栏中的“索引”选项，然后点击“Map-Reduce\
  \ Visualizer”选项来打开它，如图 6-3 所示。如果你是第一次使用 MapReduce，或者需要在大数据集上调试结果，理解这个过程可能会有点繁琐。\n\
  \n![](img/514303_1_En_6_Fig3_HTML.png)\n\nMap-Reduce 菜单中选择索引、输入文档、兴趣区域以及 map-reduce\
  \ 详细信息选项的截图。\n\n图 6-3\n\nMap-Reduce 可视化器初始屏幕\n\n在此屏幕上，你可以选择你刚才查询创建的索引，`Auto/OrdersReducedByShipTo.Country`，并选择文档以展示可视化效果。选择\
  \ `orders/1-a` 和 `orders/103-a` 将生成如图 6-4 所示的表示。\n\n![](img/514303_1_En_6_Fig4_HTML.jpg)\n\
  \n准备发往法国的订单截图。\n\n图 6-4\n\nAuto/OrdersReducedByShipTo.Country 索引对于 orders/1-a 和\
  \ orders/103-a 的 Map-Reduce 可视化\n\n索引的映射阶段提取了 `ShipTo.Country`，而归约阶段收集了所有具有相同发货国家的订单。在图\
  \ 6-4 中，你可以看到归约阶段将这两个订单收集在一起，因为它们的发货国家匹配。如果你查看这两个订单的文档，你会知道它们被发往了法国。\n\n点击归约框将展开树的根节点，如图\
  \ 6-5 所示。\n\n![](img/514303_1_En_6_Fig5_HTML.png)\n\n两个订单的树根扩展截图。\n\n图 6-5\n\n归约结果详情\n\
  \n你可以看到归约阶段将发往法国的众多订单分组，而我们选择的两个订单只是众多订单中的两个。点击归约框将显示所有这些订单的可滚动列表，如图 6-6 所示。\n\n\
  ![](img/514303_1_En_6_Fig6_HTML.png)\n\n所有订单的可滚动列表截图。\n\n图 6-6\n\n归并发往法国的订单\n\n\
  数据库能够执行此类分组固然不错，但其价值并不太大。分组能力的真正威力在于聚合，我们将在下一节中介绍。\n\n## 聚合\n\n我们以清单 6-1 所示的查询开始了本章。执行时，它将产生一个发货国家列表。然而，我们想看到有多少订单被发往了这些国家。显示该信息的查询如清单\
  \ 6-2 所示。\n\n```\nfrom Orders as o\ngroup by o.ShipTo.Country\nselect o.ShipTo.Country,\
  \ count()\n```\n\n清单 6-2\n按发货国家对订单进行分组和计数\n\n如果你将清单 6-2 与清单 6-1 中的前一个查询进行比较，可以看到我们用\
  \ `count()` 扩展了 select 语句。此查询扩展将导致结果的增加，如图 6-7 所示。\n\n![](img/514303_1_En_6_Fig7_HTML.png)\n\
  \n发货国家及其订单数量截图。\n\n图 6-7\n\n扩展了计数的订单发货国家\n\n显示的计数是通过应用 `aggregation`（聚合）过程计算的——即为一组结果计算合并值。在此情况下，RavenDB\
  \ 为 `国家组` 中的每个订单计数为一，并计算出总和。最后，我们可以执行此查询：\n\n```\nfrom Orders as o\ngroup by o.ShipTo.Country\n\
  order by count() as long desc\nselect o.ShipTo.Country, count()\n```\n\n并获得关于“Northwind\
  \ Traders”业务的一些有用信息——其大部分订单（122 个）被交付给了美国和德国的客户。\n\n如你所见，此查询创建了新的自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`，在索引列表中点击其名称将揭示其内部结构，如图\
  \ 6-8 所示。\n\n![](img/514303_1_En_6_Fig8_HTML.png)\n\n订单的集合、分组依据和归约结果的截图。\n\n图 6-8\n\
  \n`Auto/Orders/ByCountReducedByShipTo.Country` 的结构\n\n如果你将此与图 6-2 进行比较，可以看到原始的自动索引在聚合阶段增加了\
  \ `count` 操作。\n\n检查此索引的索引项，会发现名为 `Count` 和 `ShipTo.Country` 的字段。这两个聚合类别为我们提供了一种方法来找出有多少批货发往了芬兰：\n\
  \n```\nfrom index 'Auto/Orders/ByCountReducedByShipTo.Country'\nwhere 'ShipTo.Country'\
  \ = 'finland'\n```\n\n或者获取所有订单发货数量超过 80 的国家列表：\n\n```\nfrom index 'Auto/Orders/ByCountReducedByShipTo.Country'\n\
  where 'Count' > 80\n```\n\n\n\n## 静态 MapReduce 索引\n\n上一章介绍了静态 Map 索引的概念。它们是 Map\
  \ 索引的自然延伸，提供了一种映射文档并随后指定如何聚合这些映射的方法。同样，也可以编写静态 MapReduce 索引。本节将重新创建自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`\
  \ 的静态版本。\n\n首先创建一个映射索引，如清单 6-3 所示：\n\n```\nmap(\"Orders\", order => {\nreturn {\n\
  Country: order.ShipTo.Country\n}\n})\nListing 6-3\nOrders/ByCountry 映射索引\n```\n\n\
  这个索引与前一章的 `Employees/ByFirstName` 索引没有太大区别——对于每个订单文档，RavenDB 将创建一个带有 `Country` 值的索引条目。\n\
  \n此静态索引的最终目标是统计总数，因此让我们扩展映射，添加你稍后要聚合的数字，如清单 6-4 所示：\n\n```\nmap(\"Orders\", order\
  \ => {\nreturn {\nCountry: order.ShipTo.Country,\nCount: 1\n}\n})\nListing 6-4\n\
  用计数扩展 Orders/ByCountry 映射索引\n\n```\n\n此类扩展映射索引的原始索引条目可在图 6-9 中找到。\n\n![](img/514303_1_En_6_Fig9_HTML.png)\n\
  \n按国家排序的订单索引快照。\n\n图 6-9\n扩展映射索引 `Orders/ByCountry` 的原始索引条目\n\n该索引现在执行的就是你手动会做的任务——逐一遍历每个订单，并记录下每个\
  \ `ShipTo.Country` 字段中出现的国家。在记录完所有订单的此类标记后，你会返回并进行汇总。这正是 MapReduce 索引的归约阶段所做的事情。\n\
  \n要添加归约脚本，请打开索引进行编辑，然后单击“添加归约”按钮。将打开一个新面板，你可以在其中添加用于归约映射函数发出的所有映射的 JS 代码。清单 6-5\
  \ 中显示了此代码：\n\n```\ngroupBy(map => map.Country)\n.aggregate(group => {\nvar country\
  \ = group.key;\nvar count = 0;\ngroup.values.forEach(el => {\ncount += el.Count;\n\
  })\nreturn {\nCountry: country,\nCount: count\n}\n})\nListing 6-5\n索引 Orders/ByCountry\
  \ 的归约代码\n```\n\n图 6-10 显示了 Orders/ByCountry MapReduce 索引的最终形式。\n\n![](img/514303_1_En_6_Fig10_HTML.png)\n\
  \n按国家排序的订单代码快照。\n\n图 6-10\nMapReduce 索引 `Orders/ByCountry`\n\n清单 6-5 中的归约脚本可以重构。重构是在不改变行为的情况下更改实现的过程。让我们重新组织代码，使其更加简洁。\n\
  \n首先，你可以用基于 `reduce` 函数的函数式等价项替换清单 6-8 中定义的命令式 `forEach` 循环：\n\n```\ngroupBy(map\
  \ => map.Country)\n.aggregate(group => {\nvar country = group.key;\nvar count =\
  \ group.values.reduce((res, el) => res + el.Count, 0);\nreturn {\nCountry: country,\n\
  Count: count\n}\n})\n```\n\nReduce 方法可能看起来很奇怪，但它是命令式 `for` 循环的声明式等价物。它在 JavaScript\
  \ 中对数组进行操作，形式如下：\n\n```\narray.reduce(reducer, initialValue);\n```\n\nReduce 方法从\
  \ `initialValue`（在我们的例子中为零）开始，然后对数组的所有元素应用 `reducer` 操作。你可以这样理解归约器：\n\n```\nreducer(result_from_previous_call,\
  \ arrayElement) => new_result\n```\n\n在第一次应用时，没有前一次调用的结果，因此将使用 `initialValue`，并消耗数组的第一个元素，结果为\n\
  \n```\nvar res0 = reducer(0, arr[0])\n```\n\n之后，将处理下一个数组元素：\n\n```\nvar res1 = reducer(res0,\
  \ arr[1])\n```\n\n此过程将继续，直到所有数组元素都被处理完毕。因此，我们以递归声明的方式迭代了所有数组元素。\n\n归约器函数本身是对两个参数的简单相加：\n\
  \n```\nreducer(accumulatedValue, el) = accumulatedValue + el.Count\n```\n\n作为我们索引归约阶段重构的第二步也是最后一步，你可以内联\
  \ `country` 和 `count` 变量：\n\n```\ngroupBy(map => map.Country)\n.aggregate(group\
  \ => {\nreturn {\nCountry: group.key,\nCount: group.values.reduce((res, el) => res\
  \ + el.Count, 0)\n}\n})\n```\n\n此时，自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`\
  \ 已通过静态索引 `Orders/ByCountry` 复制完成，因此你可以找出有多少货物发往芬兰：\n\n```\nfrom index 'Orders/ByCountry'\n\
  where 'Country' = 'finland'\n```\n\n或者获取所有发货量超过 80 笔的国家列表：\n\n```\nfrom index 'Orders/ByCountry'\n\
  where 'Count' > 80\n```\n\n## 静态索引与自动索引\n\n你刚刚花费了一些精力来实现一个由 RavenDB 自动创建的索引的静态替代方案，你可能会问自己，“为什么？”\
  \ 确实，如果 RavenDB 可以自行完成工作，那么意义何在？\n\n你想要控制索引的创建及其定义有多个原因。其中最重要的两个原因将在以下部分中讨论。\n\n\
  ### 初始索引时刻\n\n创建索引（无论是自动的还是静态的）后，将执行初始索引。所有文档都将从磁盘中获取并由索引处理。如果被索引的集合为空，则新创建的索引将立即准备就绪。然而，如果集合不为空，处理所有文档将需要一定的时间。\n\
  \n执行清单 6-1 中的查询将触发自动索引的创建，根据数据库中订单的数量，初始索引过程可能需要相当长的时间。在索引过程进行期间，索引将处于 `过时` 状态。这意味着索引包含许多索引条目，但此集合仍不完整。因此，在过时索引上执行的查询也可能返回不完整的结果集。例如，以下查询\n\
  \n```\nfrom index 'Auto/Orders/ByCountReducedByShipTo.Country'\nwhere 'Count' >\
  \ 80\n```\n\n可能会忽略一些国家，因为并非所有订单都已被处理。在这种情况下，RavenDB 可能会等待最多 15 秒，直到索引变为非过时状态。15\
  \ 秒后，如果索引仍然过时，你将获得部分结果集，索引将在后台继续进行。此决策背后的推理很简单——RavenDB 不是报告错误，而是返回可能不完整的结果集，并附带通知，说明某些结果可能缺失。\n\
  \n在生产环境中，你通常希望在实时数据库上部署或创建索引，等待索引过程完成，然后部署使用这些新索引的代码。\n\n使用静态索引，你可以更好地控制此过程。与在首次查询时创建的自动索引不同，静态索引是显式定义的。因此，索引过程将在保存静态索引定义后开始。总体而言，静态索引更明确且可预测，你将在查询数据库之前有意地创建它们。\n\
  \n\n\n### 聚合的复杂性\n\n清单 [6-2] 中创建了自动索引 `Auto/Orders/ByCountReducedByShipTo.Country`，它通过对具有相同运输国家的订单出现次数进行求和来执行聚合。遗憾的是，这种简单的聚合是自动\
  \ MapReduce 索引的极限。对于任何更高级的操作，您都必须编写静态 MapReduce 索引。\n\n例如，我们可以跟进对各国订单数量的初步分析，按运输国家分析订单的总价值。然而，检查示例数据库中的任何订单，您会发现它们缺少总货币价值的属性。我们无需计算此值并修补订单文档，而是可以计算它并将其作为索引的一部分存储，如清单\
  \ [6-6] 所示：\n\n```csharp\nmap(\"Orders\", order => {\n    return {\n        Country:\
  \ order.ShipTo.Country,\n        Total: order.Lines.reduce((total, line) => (line.Quantity\
  \ * line.PricePerUnit) * (1 - line.Discount), 0)\n    }\n})\ngroupBy(map => map.Country)\n\
  .aggregate(group => {\n    return {\n        Country: group.key,\n        Total:\
  \ group.values.reduce((res, el) => res + el.Total, 0)\n    }\n})\n```\n\n清单 6-6：`Orders/ByCountryTotals`\
  \ 索引\n\n此索引的映射阶段处理订单行，考虑行折扣以计算每个订单的总值。之后，这些总值会按运输国家相同的订单组进行求和。\n\n您现在可以执行如下分析：\n\
  \n```text\nfrom index 'Orders/ByCountryTotals'\nwhere Total > 50000\n```\n\n在此示例中，我们应用了复杂的聚合，并将其结果用作数据模型的一部分，而无需更改数据库中的文档。\n\
  \n### 多地图归约索引\n\n观察我们销售对象的公司和我们采购对象的供应商，您可以执行以下两种聚合。在清单 [6-2] 中，我们按运输国家分析了订单。让我们继续检查我们的数据集以探索最活跃的国家。\n\
  \n我们销售到的国家：\n\n```text\nfrom \"Companies\" as c\ngroup by c.Address.Country\nselect\
  \ c.Address.Country, count()\n```\n\n我们从其采购的国家：\n\n```text\nfrom \"Suppliers\" as\
  \ s\ngroup by s.Address.Country\nselect s.Address.Country, count()\n```\n\n这两个查询将返回按国家分组的公司和按国家分组的供应商。此外，这两个查询将产生两个自动索引。手动聚合这两个结果集将回答\
  \ Northwind Traders 与哪些国家业务往来最多的问题。\n\n在上一章中，我们介绍了多地图索引的主题，这些索引同时操作多个集合。为了编写一个静态索引来替换两个自动索引，我们可以以多地图索引为基础，然后对生成的投影应用归约阶段。这样的索引被称为\
  \ **多地图归约索引**。\n\n您首先定义多地图索引 `Countries/Business` 的两个映射阶段，如清单 [6-7] 所示。\n\n```csharp\n\
  map(\"Companies\", company => {\n    return {\n        Country: company.Address.Country,\n\
  \        Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company\
  \ => {\n    return {\n        Country: company.Address.Country,\n        Companies:\
  \ 0,\n        Suppliers: 1\n    }\n})\n```\n\n清单 6-7：多地图索引 `Countries/Business`\n\
  \n如果您将此清单与清单 [6-4] 进行比较，您会发现我们再次进行计数，但这次略有修改。我们需要为每个公司出现计一次，但同时，我们还需要计算供应商的事件。\n\
  \nRavenDB 要求在一个索引中定义的所有映射函数具有相同的输出。因此，在计算公司数量时，您还需要返回供应商数量，反之亦然。为了符合这一点，您可以使用一个简单的方法——返回您感兴趣的数据，对于所有其他字段，返回零值。这将产生如图\
  \ [6-11] 所示的索引条目。\n\n公司、供应商和国家列表的快照。\n![Figure 6-11](img/514303_1_En_6_Fig11_HTML.png)\n\
  \n多地图索引 `Countries/Business` 的原始索引条目。\n\n如您所见，对于正在处理的每个公司和供应商文档，索引将提取其国家，并在相应的属性中计数为一。\n\
  \n现在剩下的就是添加聚合。因此，我们使用归约阶段扩展索引，这给了我们如清单 [6-8] 所示的最终形式。\n\n```csharp\nmap(\"Companies\"\
  , company => {\n    return {\n        Country: company.Address.Country,\n      \
  \  Companies: 1,\n        Suppliers: 0\n    }\n})\nmap(\"Suppliers\", company =>\
  \ {\n    return {\n        Country: company.Address.Country,\n        Companies:\
  \ 0,\n        Suppliers: 1\n    }\n})\ngroupBy(map => map.Country)\n.aggregate(group\
  \ => {\n    return {\n        Country: group.key,\n        Companies: group.values.reduce((res,\
  \ el) => res + el.Companies, 0),\n        Suppliers: group.values.reduce((res, el)\
  \ => res + el.Suppliers, 0)\n    }\n})\n```\n\n清单 6-8：多地图归约索引 `Countries/Business`\n\
  \n最后，您可以运行查询：\n\n```text\nfrom index 'Countries/Business'\n```\n\n以获取包含公司和供应商数量的国家列表。\n\
  \n\n\n## 人工文档\n\n除了计算聚合结果并将其存储在索引中，你还可以将此类索引条目具体化（materialize）为称为 `人工文档` 的文档。它们将驻留在一个任意命名的集合中；每次索引更新时，此集合也会随之更新。本节将展示何时需要创建人工文档，介绍其配置过程，并了解如何对它们执行索引。\n\
  \n查询列表 6-8 中的索引会得到如图 6-12 所示的原始索引结果。\n\n![](img/514303_1_En_6_Fig12_HTML.jpg)\n\
  *国家、公司和供应商列表的快照。*\n**图 6-12**\n`Countries/Business` 索引的原始索引条目\n\n现在，你可以使用索引的这两个字段，根据我们与之有业务往来的公司数量对国家进行排序：\n\
  ```sql\nfrom index 'Countries/Business'\norder by Companies as long desc\n```\n\
  以及根据供应商数量排序：\n```sql\nfrom index 'Countries/Business'\norder by Suppliers as long\
  \ desc\n```\n但是，如果我们想查看总数呢？如果你要出差，哪个城市会是你的首选？在哪个地方，你有机会拜访到最多与你公司有业务往来的实体？\n\n解决这个问题的一种方法是扩展索引，增加一个\
  \ `Total` 字段，用于汇总 `Companies` 和 `Businesses`，如列表 6-9 所示。\n```javascript\nmap(\"\
  Companies\", company => {\nreturn {\nCountry: company.Address.Country,\nCompanies:\
  \ 1,\nSuppliers: 0,\nTotal: 1\n}\n})\nmap(\"Suppliers\", company => {\nreturn {\n\
  Country: company.Address.Country,\nCompanies: 0,\nSuppliers: 1,\nTotal: 1\n}\n})\n\
  groupBy(map => map.Country)\n.aggregate(group => {\nreturn {\nCountry: group.key,\n\
  Companies: group.values.reduce((res, el) => res + el.Companies, 0),\nSuppliers:\
  \ group.values.reduce((res, el) => res + el.Suppliers, 0),\nTotal: group.values.reduce((res,\
  \ el) => res + el.Total, 0)\n}\n})\n```\n**列表 6-9**\n扩展了 `Total` 字段的 Countries/Business\
  \ 索引\n\n有了扩展后的索引，你现在可以查询：\n```sql\nfrom index 'Countries/Business'\norder by Total\
  \ as long desc\n```\n来获取所需的信息。\n\n除了扩展索引，你可能还想使用列表 6-10 中显示的查询。\n```sql\nfrom index\
  \ 'Countries/Business'\norder by (Companies + Suppliers) as long desc\n```\n**列表\
  \ 6-10**\n使用计算字段查询索引\n\n执行此查询将导致错误。\n\n在第 4 章中，我们讨论了 RavenDB 的索引方法——你所有的查询始终针对索引执行，并且使用预先计算好的索引条目来提供闪电般快速的数据库响应。在任何情况下，查询都不能包含任何计算。所有此类计算都必须在查询发生之前，在索引本身内部完成。正是出于这个原因，列表\
  \ 6-10 中的查询会导致错误——我们试图将 `Companies` 和 `Suppliers` 相加，然后根据该标准对国家进行排序。重新审视列表 6-9 中的扩展索引，你可以看到我们确实在索引阶段进行了总数求和。\n\
  \n检查扩展前索引的原始索引条目（如图 6-12 所示），揭示了一种适合编写简单映射索引的数据结构。不幸的是，RavenDB 索引只能操作文档，不能操作其他索引中的原始索引条目。\n\
  \n不过，RavenDB 提供了一种方法，可以将原始索引条目具体化为实际的文档，这样你就可以查询甚至索引它们。在下一节中，我们将展示如何实现这一点。\n\n###\
  \ 创建人工文档\n\n首先，将索引 `Countries/Business` 恢复到列表 6-8 中的状态，即在用 `Total` 字段扩展它之前的状态。当你打开索引进行编辑时，在\
  \ `Reduce` 脚本区域的下方，有一个 `Output Reduce Results to Collection`（将 Reduce 结果输出到集合）选项，如图\
  \ 6-13 所示。\n\n![](img/514303_1_En_6_Fig13_HTML.jpg)\n*公司和供应商分组值代码的快照。*\n**图 6-13**\n\
  将索引 Reduce 结果输出到 `CountriesBusiness` 人工集合\n\n结果，原始索引条目（与你能在图 6-12 中看到的相同）将被提取并加载到正确的\
  \ JSON 文档中。如果你检查集合列表，你会注意到那里出现了一个新的集合——`CountriesBusiness`——如图 6-14 所示。\n\n![](img/514303_1_En_6_Fig14_HTML.png)\n\
  *文档 ID、公司、供应商和国家列表的快照。*\n**图 6-14**\n人工集合 CountriesBusiness 中的文档\n\n这个集合被称为 `人工集合`，属于此集合的文档是\
  \ `人工文档`。打开其中一份文档将揭示如列表 6-11 所示的结构。\n```json\n{\n\"Country\": \"Finland\",\n\"Companies\"\
  : 2,\n\"Suppliers\": 1,\n\"@metadata\": {\n\"@collection\": \"CountriesBusiness\"\
  ,\n\"@flags\": \"Artificial, FromIndex\"\n}\n}\n```\n**列表 6-11**\n一份人工文档的结构\n\n\
  人工文档可以从包含索引条目的 MapReduce 或 MultiMapReduce 索引创建。如果你将图 6-12 中的原始索引条目与生成的人工集合内容进行比较，你会看到人工集合代表了索引的一个转储。人工文档将包含所有索引字段作为其属性，其元数据属性将有一个\
  \ `flag` 标记，标明它是 `Artificial, FromIndex`（人工，来自索引）。\n\n每次创建新订单或更新/删除现有订单时，所有索引订单的索引都会被更新。`Countries/Business`\
  \ 索引也会发生同样的情况，其聚合条目将被增量更新以考虑最新的更改。此外，由于 `Countries/Business` 定义了输出集合，这个人工集合也将被更新。\n\
  \n除了由 RavenDB 自动创建外，人工文档是完全正常的文档。因此，你可以运行如下查询：\n```sql\nfrom 'CountriesBusiness'\n\
  where Country = 'UK'\n```\n以获取来自英国的公司和供应商数量，以及：\n```sql\nfrom 'CountriesBusiness'\n\
  where Companies > 1 and Suppliers > 1\nselect Country\n```\n以获取至少有一个公司和供应商的国家列表。\n\
  \n### 索引人工文档\n\n执行上一节中的两个查询后，你会发现 RavenDB 创建了自动索引 `Auto/CountriesBusiness/ByCompaniesAndCountryAndSuppliers`，这是数据库的预期行为。\n\
  \n人工文档是完全常规的文档，因此也可以编写 Map 甚至 MapReduce 索引，以便在需要时处理和聚合它们。因此，为了回答我们最初关于寻找供应商和公司最多的国家的问题，我们可以首先定义映射索引\
  \ `CountriesBusiness/Totals`，如列表 6-12 所示。\n```javascript\nmap(\"CountriesBusiness\"\
  , entry => {\nreturn {\nCountry: entry.Country,\nTotal: entry.Companies + entry.Suppliers\n\
  }\n})\n```\n**列表 6-12**\nCountriesBusiness/Totals 索引\n\n现在，你终于可以执行一个查询，该查询将生成一个国家列表，并按业务活动数量降序排列：\n\
  ```sql\nfrom index 'CountriesBusiness/Totals'\norder by Total as long desc\nselect\
  \ Country\n```\n很容易看出，你下一个出差目的地应该是美国、德国和法国。\n\n\n## 概要\n\n本章介绍了 MapReduce 和 MultiMapReduce\
  \ 索引，用于对数据进行分组和聚合。我们介绍了编写这些索引的静态版本的技术，以及将它们的内容具体化为人工文档的方法。下一章将展示如何使用 RavenDB 对数据进行全文搜索。\n\
  \n"
- "# 7. 全文搜索\n\n我们在第 3 章已经提到过 RavenDB 的全文搜索功能，本章将对该章引入的概念进行扩展。我们将展示基本的搜索功能，包括运算符、通配符和排名。您将了解\
  \ RavenDB 索引在内部如何处理文本以提供所有这些能力。最后，我们将演示如何通过静态索引对索引过程获得更多控制并应用高级技术。\n\n## 全文搜索基础\n\
  \n观察现代应用程序中的标准功能，您会很快发现执行全文搜索的能力在此列表中排名很高。几乎每个应用程序都需要它。在数据量庞大的情况下，搜索能力变得至关重要；无法轻松检索的信息基本上是无用的。\n\
  \n在前面的章节中，我们看到了如何基于精确匹配执行过滤——您指定属性名和值，数据库将返回具有该属性值的一个或多个文档。\n\n全文搜索的美妙之处在于部分匹配——您可以搜索作为文本一部分的特定术语。例如，您可以找到所有标题包含“London”的书籍，或者所有名称中包含“chocolate”的产品。您还可以指定前缀或后缀，并获取所有匹配的文档。可以传递多个术语，数据库将返回包含其中任何一个术语的文档的并集。\n\
  \n让我们看看使用 RavenDB 搜索文本的各种方式。\n\n### 单一术语\n\n如图 7-1 所示，示例数据库中产品的名称由一个或多个单词组成。\n\n\
  ![](img/514303_1_En_7_Fig1_HTML.jpg)\n\n一个包含 11 个产品名称和标识的表格。产品 ID 分别为 77-A, 76-A,\
  \ 75-A, 74-A, 73-A, 72-A, 71-A, 70-A, 69-A, 68-A 和 67-A。\n\n图 7-1\n\n产品名称\n\n您可以搜索豆腐产品：\n\
  \n```rql\nfrom \"Products\"\nwhere search(Name, 'Tofu')\n```\n\n这个查询将返回名称为`*Tofu*`和`*Longlife\
  \ Tofu*`的产品。您搜索的术语可以位于产品名称的开头、结尾或任何位置；RavenDB 可以轻松匹配任何位置。\n\n请注意，以下查询将产生相同的结果。\n\
  \n```rql\nfrom \"Products\"\nwhere search(Name, 'tofu')\n```\n\n在默认设置下，RavenDB 中的全文搜索功能不区分大小写。\n\
  \n在执行搜索之前，RavenDB 会通过删除特殊字符和标点符号来规范化术语。因此，所有这些术语都将产生相同的结果：\n\n*   \"tofu\"\n*  \
  \ \" tofu \"\n*   \"-tofu,\"\n\n### 多个术语\n\n您可以搜索多个术语：\n\n```rql\nfrom \"Products\"\
  \nwhere search(Name, 'tofu vegie')\n```\n\n这个查询将产生如图 7-2 所示的结果。\n\n![](img/514303_1_En_7_Fig2_HTML.png)\n\
  \n一个针对术语`tofu vegie`的结果表格。标记的索引列为预览、标识、名称、供应商、类别和每单位质量。\n\n图 7-2\n\n术语“tofu vegie”的搜索结果\n\
  \n这个查询将返回所有在名称中包含“tofu”或“vegie”的产品。您可以进一步扩展，添加更多术语：\n\n```rql\nfrom \"Products\"\
  \nwhere search(Name, 'tofu vegie chocolade')\n```\n\n从而，包括在`Name`属性中包含这些术语中任何一个的产品。\n\
  \n### 对复杂对象进行搜索\n\nRavenDB 不仅可以对简单的文本字段进行搜索，还可以对复合字段进行搜索。员工地址的结构是 JSON，如清单 7-1 所示。\n\
  \n```json\n\"Address\": {\n\"Line1\": \"4726 - 11th Ave. N.E.\",\n\"Line2\": null,\n\
  \"City\": \"Seattle\",\n\"Region\": \"WA\",\n\"PostalCode\": \"98105\",\n\"Country\"\
  : \"USA\",\n\"Location\": {\n\"Latitude\": 47.66416419999999,\n\"Longitude\": -122.3160148\n\
  }\n}\n```\n清单 7-1\nEmployee 文档的 Address 属性的嵌套结构\n\n您可以按员工的地址属性进行搜索，以获取所有居住在西雅图的员工：\n\
  \n```rql\nfrom Employees where search(Address, \"Seattle\")\n```\n\n在这种情况下，RavenDB\
  \ 通过扁平化并索引来自不同级别的所有属性，正确处理了复杂的嵌套结构。\n\n也支持对集合进行搜索。示例数据库中的订单包含订单行集合。您可以使用以下查询搜索所有包含油炸产品的订单：\n\
  \n```rql\nfrom Orders\nwhere search(Lines.ProductName, \"Fried\")\n```\n\n### 通配符\n\
  \n全文搜索的部分匹配提供了一种指定单词以在文本中搜索的方法。通配符可以增强部分搜索的能力——当搜索词的开头或结尾未知时，您可以替换一个或多个字母。\n\n因此，与其搜索所有名为`*Anne*`的员工\n\
  \n```rql\nfrom \"Employees\"\nwhere search(FirstName, 'Anne')\n```\n\n您可以使用通配符仅指定搜索词的一部分。以下查询将搜索任何以`*An*`为前缀的名字。\n\
  \n```rql\nfrom \"Employees\"\nwhere search(FirstName, 'An*')\n```\n\n执行此查询将返回`*Andrew*`和`*Anne*`。\n\
  \n同样，您可以执行后缀搜索：\n\n```rql\nfrom \"Employees\"\nwhere search(LastName, '*an')\n```\n\
  \n此查询将从我们的示例数据集中返回 Steven Buchanan 和 Laura Callahan。\n\n最后，结合前两种方法，我们可以执行中缀搜索：\n\
  \n```rql\nfrom \"Employees\"\nwhere search(FirstName, '*an*')\n```\n\n这种中缀全文搜索将返回`*Anne*`、`*Nancy*`、`*Andrew*`和`*Janet*`。\n\
  \n使用通配符时，另一个需要考虑的关键因素是性能。使用前导通配符会显著降低搜索速度。当然，在小型数据集（如我们当前使用的示例数据集）上，这种减速可能并不明显。但是，随着数据库中文档数量的增加，它可能成为一个因素。因此，您应牢记这一点，并评估每个后缀全文搜索场景的理由及其潜在的负面影响。\n\
  \n如果您确定应用程序需要此类搜索，有几种替代方法：\n\n*   创建一个静态索引，其中对文本进行反向索引，从而将前导通配符搜索（按后缀搜索）转换为尾随通配符搜索（按前缀搜索）。\n\
  *   创建一个使用非默认分析器的静态索引。\n\n本章稍后将介绍第二种技术。\n\n### 建议\n\n有时，搜索不会返回任何结果。例如，没有产品名称包含单词“chaig”，这可以通过执行以下查询来验证：\n\
  \n```rql\nfrom Products\nwhere search('Name', 'chaig')\n```\n\n在这种情况下，RavenDB 提供了`*suggest*`功能。您可以通过调用`suggest()`函数来使用它，如清单\
  \ 7-2 所示。\n\n```rql\nfrom Products\nselect suggest('Name', 'chaig')\n```\n清单 7-2\n\
  选择建议\n\n执行此查询将返回如图 7-3 所示的建议。\n\n![](img/514303_1_En_7_Fig3_HTML.png)\n\n一个算法图示了针对术语'chai'和'chang'的搜索结果和建议。标记的索引列为预览和名称。\n\
  \n图 7-3\n\n针对单词“chaig”的建议\n\n建议功能将根据计算出的距离算法值，找到与传递的术语相似的单词。如果您想实现类似 Google 的“您是不是要找？”建议，这非常方便。\n\
  \n\n### 操作符\n\n我们已经展示了你可以为全文搜索使用多个术语，并且你会获得满足其中任何一个条件的所有文档。本质上，RavenDB 会隐式地应用 `or`\
  \ 逻辑操作符。这意味着查询\n\n```\nfrom Employees where search(Address, \"Seattle London\")\n\
  ```\n\n等价于\n\n```\nfrom Employees where search(Address, \"Seattle London\", or)\n\
  ```\n\n并将返回所有居住在西雅图或伦敦的员工。\n\n应用 `and` 操作符\n\n```\nfrom Employees where search(Address,\
  \ \"Seattle London\", and)\n```\n\n将不返回任何结果，因为没有地址中同时包含这两个城市的员工。\n\n你可以进一步组合这些操作符：\n\
  \n```\nfrom 'Employees'\nwhere search(Notes, \"Spanish Portuguese\", and)\nor search(Notes,\
  \ \"Manager\")\n```\n\n此查询将返回要么是经理，要么同时会说西班牙语和葡萄牙语的员工。\n\n## 内部发生了什么？\n\n查看上一节展示的多种执行部分搜索的方法，可能会让你认为背后发生了许多复杂的事情。尽管全文搜索并非一个简单的机制，但大多数内部实现概念相对简单。正如我们在过滤、排序和聚合中已经看到的——一切都归结为使用合适的数据结构。其次，为了避免在查询时进行计算（这总是危险的，因为查询执行时间取决于数据集的大小），RavenDB\
  \ 会提前准备索引条目。因此，全文搜索既高效又快速。一定量的工作是不可避免的，但最多只做一次，提前完成并存储结果以供重用，是实现高性能查询的关键。\n\n###\
  \ 文本分析\n\n在索引期间，RavenDB 将使用分析器（analyzer）将文本分割成片段。这些片段被称为 `令牌`，它们将构成索引术语（index terms）。之后，当你执行全文搜索时，你的搜索术语会与索引中包含的\
  \ `令牌` 进行匹配。因此，这种方法会将搜索术语对文本的部分匹配，转化为对文本分析过程中产生的 `令牌` 集合的精确匹配。当然，这句话简化了整个过程，但从概念上很好地描述了匹配机制。\n\
  \n分析器主要执行文本的 `令牌化`。令牌化将文本分解为词法单元，也称为 `令牌`。`令牌` 是最小的可搜索单位，令牌化过程将输入文本转换为令牌流。\n\n此外，由分词器（tokenizer）产生的\
  \ `令牌` 会通过一个或多个 `过滤器`。过滤器将检查令牌流，并可能保持 `令牌` 不变、修改它们、丢弃它们，甚至创建新的。修改可能包括将字符规范化为全小写或不带变音符号的版本。标点符号和停用词（stop\
  \ words）如 `the` 和 `is` 通常会被移除，其他可能影响搜索质量的无用 `令牌` 也是如此。\n\n分词器和过滤器通常组合成一个管道（pipeline，有时也称为\
  \ chain），其中一个的输出是另一个的输入。分析器（analyzer）就是一个分词器和过滤器序列的术语，它以文本作为输入并产生一组 `令牌`。\n\n###\
  \ 标准分析器\n\nRavenDB 附带了多个分析器，其中 `标准分析器` 是默认的。标准分析器由 `标准分词器` 和两个过滤器组成——`小写令牌过滤器` 和\
  \ `停用词过滤器`。\n\n`标准分词器` 会通过将空格、换行、标点和其他特殊字符视为 `令牌` 边界来对文本进行分段。这样生成的令牌流会通过 `小写令牌过滤器`，将其规范化为全小写字母。最后，`停用词过滤器`\
  \ 将从令牌流中移除英文 `停用词`。例如 `a`、`the` 和 `is`——这些是所谓的 `功能词`，在全文搜索的上下文中是模糊的或几乎没有词汇意义。\n\n\
  例如，以下句子\n\n```\nA quick Fox jumps over the lazy Dog!\n```\n\n通过标准分析器后将被转换为令牌流：\n\
  \n```\n[quick], [fox], [jumps], [over], [lazy], [dog]\n```\n\n这个过程会移除感叹号和常见单词如 `a`\
  \ 和 `the`。此外，所有 `令牌` 都被转换为小写。\n\n正如我们在前几章所见，运行各种查询会触发 RavenDB 创建相应的索引以高效地服务于这些查询。同样，当你运行全文搜索查询时，RavenDB\
  \ 会创建一个自动的全文搜索索引。标准分析器将应用于一个或多个被搜索的字段。它们的内容将被令牌化，并生成一组索引条目。\n\n一个有趣的事实是，分析器不仅在索引期间应用于输入文本，也会应用于搜索术语。因此，在执行查询\n\
  \n```\nfrom \"Employees\"\nwhere search(FirstName, 'Andrew Anne')\n```\n\n时，RavenDB\
  \ 会将标准分析器应用于字符串 `\"Andrew Anne\"`，将其转换为令牌流 `[andrew], [anne]`，然后才执行这些 `令牌` 与索引术语的实际匹配。这条规则有一个例外——如果搜索术语包含通配符（wildcard），它将被保留。分析器不会应用于包含通配符的搜索术语。\n\
  \n除了标准分析器，RavenDB 还附带了其他分析器：\n\n*   关键词分析器\n*   小写空白分析器\n*   N 元语法分析器\n*   简单分析器\n\
  *   停用词分析器\n*   空白分析器\n\n你可以使用其中一些来为你的全文搜索索引填充不同形态的 `令牌`。我们将在本章后面介绍一个这样的案例。\n\n\
  最后，RavenDB 支持自定义分析器。根据具体情况，你可能对令牌化和过滤有特定需求。在这种情况下，你可以编写自己的自定义分析器并提供给 RavenDB。一个典型的例子是分析不同语言的内容。你可能已经猜到，`停用词`\
  \ 的集合是依赖于语言的。例如，英文单词 `car` 在法语中是 `停用词` 之一。自定义分析器超出了本书的范围，但了解 RavenDB 高度可定制的特性是很好的。\n\
  \n\n\n## 排名\n\n为了让全文搜索结果对用户有帮助，并让应用程序的用户满意，最相关的结果应排在最前面，其次是相关性较低的结果。RavenDB 是如何确定相关性的呢？\n\
  \n让我们看一些例子。\n\n运行查询\n\n```ravendb\nfrom Employees where search(Address, \"Seattle\
  \ Redmond\")\nselect Address.City\n```\n\n你会看到，来自西雅图的两名员工排在最前面，然后是一名来自雷德蒙德的员工。如果我们改变城市顺序为：\n\
  \n```ravendb\nfrom Employees where search(Address, \"Redmond Seattle\")\nselect\
  \ Address.City\n```\n\n你会注意到结果与前一个查询相比排序相反，遵循了搜索词的顺序——首先是来自雷德蒙德的员工，然后是来自西雅图的两名员工。\n\
  \n如你所见，这种排序并非随机。RavenDB 根据相关性对搜索结果进行排序，因此用户更有可能在列表顶部看到更相关的结果。当搜索“Redmond Seattle”时，RavenDB\
  \ 会认为第一个搜索词比第二个更重要，因此来自雷德蒙德的员工会排在来自西雅图的员工之前。你可以像在代码清单 7-3 中那样，引入额外的搜索词。\n\n```ravendb\n\
  from Employees where search(Address, \"London Seattle Redmond\")\nselect Address.City\n\
  ```\n代码清单 7-3\n搜索多个词\n\n此查询将把伦敦的员工排在最前，然后是西雅图的员工，最后任何雷德蒙德的员工将位于列表底部。\n\n对于每一个全文搜索匹配项，RavenDB\
  \ 都会计算索引评分，并用它来确定结果的排名。该评分包含在每个搜索结果 `@metadata` 中的 `@index-score` 属性里。你可以通过预览代码清单\
  \ 7-3 中查询的任意结果来检查它，如图 7-4 所示。`@index-score` 是 `@metadata` 的最后一个属性。\n\n![](img/514303_1_En_7_Fig4_HTML.png)\n\
  \n用于计算文档 employee/4-A 的索引评分的算法。标记的查询包括 address city、metadata、flags、identification、last-modified、change-vector、projection\
  \ 和 index-score。\n\n图 7-4\n位于元数据内的索引评分\n\n`@index-score` 值越大，结果的相关性就越强。索引评分通过 `score()`\
  \ 函数暴露出来。因此，代码清单 7-3 中的查询在功能上等同于以下查询：\n\n```ravendb\nfrom Employees where search(Address,\
  \ \"London Seattle Redmond\")\norder by score() desc\nselect Address.City\n```\n\
  \n如果需要，你可以使用 `score()` 函数来反转排名，先显示最不相关的结果：\n\n```ravendb\nfrom Employees where search(Address,\
  \ \"London Seattle Redmond\")\norder by score() asc\nselect Address.City\n```\n\n\
  RavenDB 还可以向你详细解释它是如何计算评分的。在查询中包含 `explanations()` 函数，如下所示：\n\n```ravendb\nfrom\
  \ Employees where search(Address, \"Redmond Seattle\")\nselect Address.City\ninclude\
  \ explanations()\n```\n\n这次，查询结果会伴随着排名评分显示在一个额外的选项卡中，如图 7-5 所示。\n\n![](img/514303_1_En_7_Fig5_HTML.png)\n\
  \n用于计算员工排名评分的算法。标记的索引包括 show、identification 和 explanation。ID 分别为 employees/4-A、employees/8-A\
  \ 和 employees/1-A。\n\n图 7-5\n包含排名评分的“解释”列\n\n点击 *Show* 图标将为你提供索引评分如何计算的详细解释，如图 7-6\
  \ 所示。\n\n![](img/514303_1_En_7_Fig6_HTML.jpg)\n\n一个描绘了 employees/4-A 索引评分详细解释的算法图。\n\
  \n图 7-6\n索引评分的详细解释\n\n这种分解有助于你确定特定结果排序方式的原因。\n\n\n\n## 权重提升\n\n并非所有搜索词都生而平等。有时，你希望赋予特定搜索词比其他词更高的权重。**权重提升**是一个改变权重因子的过程，使你能够使某些搜索词相比其他词更具相关性。正如我们在前一节看到的，RavenDB\
  \ 会为每个词分配一个权重因子，并用它来计算每个匹配文档的索引分数。\n\n每个搜索词也可以关联一个**提升因子**。提升因子越高，搜索词的相关性就越强。此功能可以提高结果的准确性，对文档进行排序，使更相关的文档位于结果列表的顶部。\n\
  \n例如，你可能搜索巴黎、伦敦或西雅图的公司，但优先考虑巴黎，然后是伦敦，最后是西雅图。要编写这样的查询，你可以利用`boost()`函数，它接受提升因子作为第二个参数，如代码清单\
  \ 7-4 所示。\n\n```\nfrom Companies\nwhere\nboost(search(Address.City, 'paris'), 15)\
  \ or\nboost(search(Address.City, 'london'), 10) or\nboost(search(Address.City, 'seattle'),\
  \ 5)\nselect Address.City\nListing 7-4\n应用了 boost() 函数的全文搜索查询\n```\n\n执行代码清单 7-4\
  \ 中的查询后，RavenDB 将返回来自这三个城市的公司，排序如图 7-7 所示。\n\n![](img/514303_1_En_7_Fig7_HTML.jpg)\n\
  \n一个包含 9 家公司的结果表格。标签列是预览、标识和地址/城市。这些公司和地址是：57-A、74-A 为巴黎；4-A、11-A、16-A、19-A、53-A、72-A\
  \ 为伦敦；89-A 为西雅图。\n\n图 7-7\n\n使用`boost()`函数修改的结果排序\n\n你可以扩展代码清单 7-4 中的查询，加入解释说明，如代码清单\
  \ 7-5 所示。\n\n```\nfrom Companies\nwhere\nboost(search(Address.City, 'paris'), 15)\
  \ or\nboost(search(Address.City, 'london'), 10) or\nboost(search(Address.City, 'seattle'),\
  \ 5)\nselect Address.City\ninclude explanations()\nListing 7-5\n包含解释说明的提升查询\n```\n\
  \n通过这样一个扩展查询，你将能够看到分数概览，如图 7-8 所示。\n\n![](img/514303_1_En_7_Fig8_HTML.png)\n\n一个展示了\
  \ 9 家公司计算分数的解释选项卡的图示。标签列显示索引、标识和解释。\n\n图 7-8\n\n带有计算分数的解释选项卡\n\n你可以点击“显示”图标，进一步查看这些分数是如何计算出来的。\n\
  \n利用提升的另一种可能性是使特定字段更具相关性。例如，我们可能需要定位所有具有管理能力的员工。一个很好的搜索候选是 `Title` 和 `Notes` 字段。然而，这两个字段有本质的不同——`Title`\
  \ 包含当前在公司的职位，而 `Notes` 包含员工的描述，可能提及各种技能和之前的工作。当前担任管理职位的员工比过去有行政职能的员工更相关。\n\n因此，我们可以在代码清单\
  \ 7-6 的查询中表达这一点。\n\n```\nfrom \"Employees\"\nwhere boost(search(Title, 'manager'),\
  \ 2)\nor search(Notes, 'manager')\nListing 7-6\nTitle 字段相对于 Notes 字段的提升\n```\n\n\
  执行结果如图 7-9 所示。\n\n![](img/514303_1_En_7_Fig9_HTML.jpg)\n\n一个展示了员工查询执行结果的图示。标签列是预览、标识、姓氏、名字、职称和备注。\n\
  \n图 7-9\n\n提升 Title 字段 over Notes 字段的结果\n\n如你所见，Steven 的排名高于 Andrew，因为他的 `Title`\
  \ 字段中有 Manager 这个词。使用这种方法，你可以微调排名并提供更好的准确性。\n\n## 静态索引：单字段\n\n通过从自动索引切换到静态索引，我们可以更深入地控制索引过程。你已经在第\
  \ 5 章和第 6 章学习了如何创建静态索引。代码清单 7-7 展示了一个用于搜索产品名称的简单索引。\n\n```\nmap(\"Products\", function(product)\
  \ {\nreturn {\nName: product.Name\n}\n})\nListing 7-7\nProducts/ByName 索引\n```\n\
  \n在保存此新索引的定义之前，你还需要执行一个步骤——指定 `Name` 不是一个普通字段，而是一个全文搜索字段。你需要将索引字段 `Name` 标记为将被视为全文搜索字段的字段。\n\
  \n点击 `Add field` 按钮。字段定义面板将打开。在名称栏填写 `Name`，并将 `Full-Text Search` 属性切换到 `Yes`。如你在图\
  \ 7-10 中所见，在高级选项中，有一个 Analyzer 属性，其中包含 `Standard Analyzer` 作为全文搜索字段的默认分析器。\n\n![](img/514303_1_En_7_Fig10_HTML.png)\n\
  \n一个字段选项表格。标签列是名称、存储、高亮显示、空间、高级、词向量、分析器、全文搜索、建议和索引。\n\n图 7-10\n\n字段选项\n\n保存此新索引的定义后，RavenDB\
  \ 将处理 `Products` 集合中的所有文档，提取其 `Name` 属性的值，并应用 `Standard Analyzer` 对产品名称进行分词。你可以在图\
  \ 7-11 中看到索引项。\n\n![](img/514303_1_En_7_Fig11_HTML.png)\n\n一个展示了产品和名称的标准分析器索引项的表格。该索引处理了\
  \ 16 个产品。\n\n图 7-11\n\n标准分析器索引项\n\n查看产品的原始索引条目，你可以观察到标准分析器为每个产品生成的标记数组，如图 7-12 所示。\n\
  \n![](img/514303_1_En_7_Fig12_HTML.png)\n\n一个展示了原始索引条目的图示。标签列是缓存已启用、不创建新的自动索引、仅显示已存储的索引字段、显示原始索引条目而非匹配文档，以及忽略索引查询大小限制。\n\
  \n图 7-12\n\n原始索引条目\n\n我们现在可以搜索所有拉格啤酒：\n\n```\nfrom index 'Products/ByName'\nwhere\
  \ search(Name, \"lager\")\n```\n\n所有以 `cha` 开头的产品名称\n\n```\nfrom index 'Products/ByName'\n\
  where search(Name, \"cha*\")\n```\n\n或名称中任何单词以 `ra` 结尾的产品\n\n```\nfrom index 'Products/ByName'\n\
  where search(Name, \"*ra\")\n```\n\n\n## 静态索引：不同的分析器\n\n在之前的一个章节中，我们提到过使用通配符前缀可能对性能产生显著影响。静态索引为我们提供了完全的灵活性，因此我们可以配置索引过程来克服此类挑战。\n\
  \n一种可能的解决方案是改变索引项的计算方式。我们可以更改分词方式 — 不使用 `标准分析器`，而是使用 `NGram 分析器`。\n\n但是 `NGram`\
  \ 这个词是什么意思呢？`NGram` 是一个滑动窗口，它在文本上移动并生成指定长度的分词。例如，单词 \"brown\" 可以被拆分为以下 3-gram：`[bro],\
  \ [row], [own]`。类似地，对 \"jumps\" 应用 2-grams 分词会得到分词流 `[ju], [um], [mp], [ps]`。\n\n\
  RavenDB 中可用的 `NGram` 分词器将滑动大小为 2、3、4、5 和 6 的窗口以生成各种大小的分词。与此分词器一起，`NGram 分析器` 将使用\
  \ `停用词` 和 `小写化` 过滤器。\n\n例如，对于句子：\n\n*The quick brown fox jumped over the lazy dogs.*\n\
  \n`NGram 分析器` 将生成以下 3-grams：\n\n```\n[azy] [bro] [dog] [fox] [ick] [jum] [laz] [mpe]\
  \ [ogs] [ove] [own] [ped] [qui] [row] [uic] [ump] [ver]\n```\n\n`停用词` 过滤器将消除两个 \"\
  the\" 实例和句号。\n\n你现在可以打开在上一节中定义的索引 `Products/ByName` 并更改此索引的分析器。向下滚动到字段部分，找到 `Name`\
  \ 字段的设置。点击 `标准分析器`，你将看到一个预定义的分析器列表，如图 7-13 所示。\n\n![](img/514303_1_En_7_Fig13_HTML.jpg)\n\
  \n一张示意图，展示了更改索引分析器的操作。标注的分析器有：关键字、小写空白、N-gram、简单、标准、停用词和空白分析器。\n\n**图 7-13：更改索引分析器**\n\
  \n选择 `NGram 分析器` 后，保存重新定义的索引。\n\n由于你更改了索引的定义，RavenDB 将通过读取 `Products` 集合中的所有文档，将它们通过\
  \ `NGram 分析器` 处理，并填充索引项来从头构建它。图 7-14 显示了索引项现在的样子。\n\n![](img/514303_1_En_7_Fig14_HTML.png)\n\
  \n一个展示了产品及其名称的 N-gram 索引项的表格。共有 16 个已标注的项。\n\n**图 7-14：NGram 索引项**\n\n这些索引项与由 `标准分析器`\
  \ 生成的分词不同。`NGram 分析器` 产生的索引项是产品名称上 2-grams、3-grams、4-grams、5-grams 和 6-grams 的并集。\n\
  \n最后，使用更新后的 `Products/ByName` 索引，我们可以将通配符查询：\n\n```\nfrom index 'Products/ByName'\n\
  where search(Name, '*late*')\n```\n\n替换为无通配符的变体\n\n```\nfrom index 'Products/ByName'\n\
  where search(Name, 'late')\n```\n\n这将返回相同的结果集，但不会带来任何性能损失。\n\n## 静态索引：多字段\n\n在前两节中，我们定义并配置了一个仅覆盖单个字段的索引。本节将展示如何将其扩展为处理来自一个或多个集合的文档的多个字段。\n\
  \n## 索引来自多个集合的属性\n\n我们可以将 `Products/ByName` 扩展为一个索引，该索引不仅可以按名称搜索产品，还可以按名称搜索 `供应商`\
  \ 和 `公司`。这样，我们将创建一个索引来覆盖来自三个集合的文档内容。\n\n首先克隆 `Products/ByName` 索引 — 点击 `克隆` 按钮并将名称更改为\
  \ `Search/ByName`。\n\n添加以下两个映射：\n\n```\nmap(\"Companies\", function(company) {\n\
  return {\nName: company.Name\n}\n})\n```\n\n和\n\n```\nmap(\"Suppliers\", function(supplier)\
  \ {\nreturn {\nName: supplier.Name\n}\n})\n```\n\n完成后，索引定义将如图 7-15 所示。\n\n![](img/514303_1_En_7_Fig15_HTML.png)\n\
  \n三个算法示意图描绘了产品、公司和供应商的索引定义。标注的字段有：索引名称、search/by name、部署模式和映射。\n\n**图 7-15：Search/ByName\
  \ 索引**\n\n由于我们是从克隆现有索引 `Products/ByName` 开始的，因此你新创建的索引开箱即用地支持对 `Name` 字段的全文索引。\n\
  \n现在，你可以执行跨越三个集合内容的搜索查询。\n\n搜索\n\n```\nfrom index 'Search/ByName'\nwhere search(Name,\
  \ \"cho\")\n```\n\n将返回在 `Name` 中包含 `cho` 三连音的产品和公司，如图 7-16 所示。\n\n![](img/514303_1_En_7_Fig16_HTML.png)\n\
  \n一个表格展示了由产品和公司组成的搜索结果。标注的列有：预览、标识、名称、供应商、类别和单位质量。\n\n**图 7-16：由产品和公司组成的搜索结果**\n\
  \n类似地，以下查询\n\n```\nfrom index 'Search/ByName'\nwhere search(Name, \"ost\")\n```\n\
  \n将返回在 `Name` 字段中包含三连音 `ost` 的产品、公司和供应商。\n\n## 索引来自单个集合的多个字段\n\n提供一种索引（并随后搜索）来自同一集合的文档的多个属性可能非常方便。在编写静态索引时，你可以构造一个包含多个值的数组。RavenDB\
  \ 将正确处理此类数组，为每个文档创建多个索引项。\n\n清单 7-8 展示了这样一个索引的实现。别忘了将 `Query` 字段配置为全文搜索字段。\n\n```\n\
  map(\"Employees\", function(employee) {\nreturn {\nQuery: [employee.FirstName, employee.LastName]\n\
  }\n})\n```\n\n**清单 7-8：`Employees/ByFirstNameByLastName` 索引**\n\n图 7-17 显示，名字和姓氏被提取出来并作为索引项插入。\n\
  \n![](img/514303_1_En_7_Fig17_HTML.png)\n\n一个表格展示了员工的名字和姓氏被提取出来并作为索引项插入。\n\n**图\
  \ 7-17：由员工名字和姓氏组成的索引项**\n\n有了这个索引，你现在可以按名字搜索：\n\n```\nfrom index 'Employees/ByFirstNameByLastName'\n\
  where search(Query, \"Andrew\")\n```\n\n或按姓氏搜索。\n\n```\nfrom index 'Employees/ByFirstNameByLastName'\n\
  where search(Query, \"fuller\")\n```\n\n### 从多个集合索引多个字段\n\n上一节演示的方法可以进一步扩展。由于你可以在索引过程中加载被引用的文档，因此可以从不同集合收集信息，以提供\
  \ Omni 搜索功能。\n\n这里我们可以使用数组将多个属性打包在一起，但我们将展示另一种方法：声明一个 JavaScript 数组并用代码填充它。清单 7-9\
  \ 展示了`Orders/Search`索引的定义。请在你的数据库中创建它，并且不要忘记将`Query`字段标记为全文搜索字段。\n\n```javascript\n\
  map(\"Orders\", function(order) {\n    var query = [];\n    var company = load(order.Company,\
  \ 'Companies');\n    query.push(company.Name);\n    var employee = load(order.Employee,\
  \ 'Employees');\n    query.push(employee.FirstName, employee.LastName);\n    order.Lines.forEach\
  \ (line => {\n        var product = load(line.Product, 'Products');\n        query.push(product.Name)\n\
  \        var supplier = load(product.Supplier, 'Suppliers');\n        query.push(supplier.Name);\n\
  \    })\n    return { Query: query }\n})\n```\n清单 7-9. `Orders/Search` 索引\n\n我们来分析这个索引。\n\
  \n第一行指定了要处理的集合——`Orders`。在索引定义的第二行，我们声明了一个空数组：\n```javascript\nvar query = [];\n\
  ```\n它将由代码填充。在最后，我们的 JavaScript 代码将返回一个名为`Query`的字段，其内容正是这个数组：\n```javascript\n\
  return { Query: query }\n```\n此外，对于每个被处理的订单，都会加载其引用的公司，并将其名称添加到`query`数组中——对于引用的员工也是如此，考虑到他们有名字和姓氏。最后，我们遍历订单行，获取其产品，并为每个产品加载供应商，将其名称添加到数组中。\n\
  \n因此，查看索引层级的嵌套结构，我们有以下结构：\n*   订单\n    *   公司\n    *   员工\n    *   订单行\n       \
  \ *   产品\n        *   供应商\n\n我们向下遍历了三层引用，加载被引用的文档并索引它们的属性。索引项将包括公司、员工、产品和供应商的名称。有了这个索引，你就可以根据各种条件搜索订单。\n\
  \n例如，你可以搜索由 Nancy 创建的所有订单：\n```sql\nfrom index 'Orders/Search'\nwhere search(Query,\
  \ \"nancy\")\n```\n所有包含*tofu*的订单可以通过执行以下查询获取：\n```sql\nfrom index 'Orders/Search'\n\
  where search(Query, \"tofu\")\n```\n要查看与供应商*Lyngbysild*相关的所有订单：\n```sql\nfrom index\
  \ 'Orders/Search'\nwhere search(Query, \"Lyngbysild\")\n```\n因此，你现在拥有一个单一索引，可以服务于各种条件的查询。\n\
  \n## 总结\n\n在本章中，我们介绍了 RavenDB 的全文搜索功能。除了介绍基本要素外，我们还解释了全文搜索索引的内部工作原理。最后，你了解了高级索引选项，以及如何通过手动编写的静态索引来更精细地控制索引过程。\n\
