  你在图 1-1 中看到的就是 RavenDB Studio，这是一个用于管理你的 RavenDB 服务器的 Web 应用程序。如你所见，无需安装任何东西——你的服务器为你提供了一个可通过所有主流
  Web 浏览器访问的 Web 应用程序。


  游乐场服务器是 RavenDB 的一个公共实例，无需认证即可供所有人使用。你可以创建新的数据库，随意操作，并评估 RavenDB 的工作方式。


  注意


  请勿将游乐场服务器用于除评估 RavenDB 之外的任何目的。请勿在任何数据库中存储任何敏感数据。这些数据库未受保护，世界各地任何人都可以访问、查看所有数据库以及读取和修改数据。此外，所有数据库会定期清除。


  在你的机器上运行 RavenDB 最简单的方式是使用 Docker。如果你的机器上已经安装了 Docker，你只需运行以下命令：


  ```

  docker run -d -p 8080:8080 -p 38888:38888 -e RAVEN_ARGS="--Setup.Mode=None --License.Eula.Accepted=true"
  ravendb/ravendb

  ```


  Docker 将获取最新的 RavenDB 镜像，并启动一个新容器来运行此镜像。现在，如果你打开 `http://127.0.0.1:8080/`，你将在浏览器中看到
  Studio。


  注意


  你现在正以开发人员模式运行 RavenDB。此模式下未强制执行任何身份验证或授权。开发人员模式是 RavenDB 唯一允许未经验证访问的情况。


  你也可以在 Windows、Linux、OSX 甚至 Raspberry Pi 上原生运行 RavenDB。


  例如，要在 Windows 机器上设置 RavenDB，请访问 [`https://ravendb.net/download`](https://ravendb.net/download)，选择“Windows
  64”平台，并下载 zip 压缩包。解压后，执行 `run.ps1` 文件，你将启动 RavenDB。


