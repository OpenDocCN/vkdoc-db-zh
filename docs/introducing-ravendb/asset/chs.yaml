  ## 本章小结


  在本章中，我们简要介绍了关系型数据库的历史及其诞生、优点以及这些系统的一些缺点。作为数据持久化演化的下一步，NoSQL 数据库应运而生。我们探讨了创建这类新数据库的动机、它们解决的一些问题及其主要类别。我们介绍了
  RavenDB，并涵盖了安装步骤、创建你的第一个数据库、示例数据集概述以及 JSON 文档的基本概念。


  在下一章中，我们将展示使用 NoSQL 文档数据库进行数据建模的方法，解释如何在 RavenDB 中应用它们。此外，我们还将介绍为 NoSQL 文档间关系建模的技术。


  '
- "# 2. 文档建模\n\n建模是每个应用程序开发核心的关键过程。我们可以很容易地为这个主题专门写一整本书，因此仅用一章来讨论这个主题不可避免地会导致许多遗漏。然而，我们的目标是向你简要介绍建模过程及其影响因素，并解释基于文档的方法。\n\
  \n在本章中，我们将首先探讨建模的概念概述。之后，我们将回顾如何在关系型数据库中建模数据、影响此过程的因素以及存在的局限性。接下来，我们将研究基于文档的建模方法、这一概念背后的思想及其主要特征。之后，我们将讨论你在从关系型建模过渡到基于文档的建模期间可能有的一些常见疑虑。最后，你将看到在\
  \ NoSQL 数据库中为文档间关系建模的标准技术。\n\n## 抽象与泛化\n\n英国统计学家 George E. P. Box 有一句名言：“所有模型都是错的，但有些是有用的。”\
  \ 这句话不仅适用于数学和统计学，也适用于任何需要描述现实的情况。从构建心理模型来理解生活事件，到用 C# 编写发票处理应用程序，你总是需要创建现实的表示。\n\
  \n软件开发者编写计算机程序来描述特定的生活领域，并使用户能够跟踪现实世界的实体、它们的关系以及这些实体相互影响的各种方式。实际上，环境并非 *简单*（由少数对象组成），而通常是\
  \ *复杂*（许多组件）的。\n\n此外，现实并非直观（易于理解），而是 *复杂* 的。在这样的系统中，对象之间的连接和交互并不明显。许多活动部分高度相互关联。因此，一个或多个实体发生的任何变化不仅会影响它们自身，还会传播到系统的其余部分。这种涟漪效应难以把握，那些变化带来的不可预见的后果也难以理解、控制和用编程语言描述。\n\
  \n幸运的是，软件开发者在面对这些挑战时并非束手无策，多年来我们开发了许多工具和方法。其中最重要的之一是 *抽象*（abstraction）。在建模时，我们将范围缩小到只涵盖我们感兴趣的实体的子领域。此外，我们将审视这些实体的属性，并隔离主要的属性，忽略所有对构建我们子领域的表示没有贡献的细节。这个过程是\
  \ *抽象* 的核心——移除各种对理解我们正在建模的子领域没有贡献的信息。我们可以说这与 *泛化*（generalization）的过程非常相似——选择一组特定的对象，观察它们的共同或共享属性，然后使用这些属性来描述它们。\n\
  \n例如，假设我们正在为一个小区书店构建一个应用程序。书店老板打算为顾客创建一个会员俱乐部。他们可以加入，填写他们的兴趣领域和个人基本信息，并接收每周阅读推荐、独家折扣以及感兴趣的新书到货通知。面对构建这样一项服务的挑战，你首先需要理解领域、用户、他们之间的交互以及你的应用程序需要产生的结果。接下来，你将着手为系统中所有识别出的实体建模。\n\
  \n仅看其中一个实体——顾客——就会揭示几乎无穷无尽的细节。顾客有名字、姓氏、电子邮件地址和出生日期。但他们也有眼睛颜色、最喜欢的香水和最喜欢的餐厅。回到我们的目标，即构建一个图书推荐服务，将揭示这些客户属性中哪些对我们的努力有帮助，哪些我们可以忽略。在与书店老板进行简短交谈后，我们得出结论，眼睛颜色、香水和餐厅选择并不影响图书选择，我们决定将它们从模型中省略。\n\
  \n我们可以重复应用这个心理过程，逐一移除与我们目标无关的任何属性。任何对我们的意图没有贡献的模型属性都将被移除，从而简化我们的模型。这样，我们的应用程序将只包含相关数据，这些数据将具有狭窄的范围。更少的数据意味着更简单（复杂度更低）的模型，并且将导致我们需要实现的更不复杂的过程。有趣的是，在建模时，如果我们忽略实体的属性，我们将获得更好的结果。因此，一个不那么精确和不那么全面的模型在描述我们的领域和满足应用程序需求方面会更好。\n\
  \n\n\n此外，我们必须意识到，我们正在构建的软件和创建的模型本身并非目标。模型是支持我们用户的手段。因此，随着现实生活和环境的演变，我们也应该开发、修改和扩展我们的应用程序以支持这些变化。我们的模型应该描述当前状态，并支持构建应用程序初始阶段发生的过程。同时，它们还必须能够承受修改，以便以我们合理的努力来支持变化。领域会扩展，生活中会出现意想不到的事情，我们的模型也将不可避免地随之演进，以跟上这些变化。\n\
  \n## 关系数据库中的建模\n\n数据模型是描述和操作我们数据的结构与形状的集合。在关系数据库占主导地位的时期，主导的数据模型是关系数据模型（`RDM`）。它由一组表组成，每个表包含一系列行。每一行代表一个实体，由列（单元格）构成。一列可能包含对同一表或另一表中某一行的引用，从而实现实体之间关系的概念。\n\
  \n让我们看一个简单的数据模型示例。图 2-1 展示了一份采购订单文档。\n\n![](img/514303_1_En_2_Fig1_HTML.png)\n\n\
  响尾蛇杂货店采购订单的截图。列出的标签有供应商和收货方，一个包含 4 列的表格指示了描述、数量、单价和总价。\n\n图 2-1\n\n采购订单文档\n\n图 2-2\
  \ 展示了一个典型的关系数据模型。有两个实体，可以转化为表。`orders` 实体每个订单包含一行，而 `order_lines` 实体每个订单行项目包含一行。\n\
  \n![](img/514303_1_En_2_Fig2_HTML.jpg)\n\n一幅插图描绘了关系数据模型。列出了两个带有标题的表：订单行和订单。\n\n\
  图 2-2\n\n订单的关系数据库模型\n\n如您所见，这种关系数据库模型为我们提供了存储订单文档的方法。每一行都是简单值的集合。行无法表示任何复杂的东西——您无法存储列表或嵌套结构。因此，我们无法保存作为订单组成部分的订单行。换句话说，缺乏高级功能迫使我们将像订单这样的复杂实体拆分为两个表：`orders`\
  \ 和 `order_lines`。\n\n正如我们刚才看到的，`RDBMS` 表与 Excel 工作表非常相似——一行接一行的单元格，包含简单的线性信息——如数字、字符串或日期。订单行无法持久保存订单行列表，因此我们不得不引入另一个表来保存订单行，并在这两个表之间建立关系以表示父子连接。\n\
  \n审视这份普通文档的建模练习，揭示了我们必须做的三件事：\n\n1.  创建 `orders` 表。\n\n2.  创建 `order_lines` 表。\n\
  \n3.  定义这两个表之间的所有权连接。\n\n我们从一个在现实生活中作为单张纸存在的文档开始。为了在关系数据库中为这份纸质文档建模，我们必须创建两个实体并建立连接。这种将订单与其行项目分离的做法，是由于\
  \ `RDBMS` 本身的技术限制而强加给我们的。\n\n## 数据封装挑战\n\n关系数据库的一个常见做法是它们过度暴露于直接访问。数据库应被视为一种持久化内存中实体的方式。一个厚实的领域层应该将数据库屏蔽起来，防止直接访问。该领域可以并且应该实现领域规则，包括静态和动态的。数据库结构不应暴露给使用您应用程序的客户端。您持久化数据的完整性有多个层面，它们应由您的领域业务逻辑（用您的编程语言实现）来检查。\n\
  \n## NoSQL 数据库中的建模\n\n本节将探讨 NoSQL 数据库建模方法的起源、可以表示数据的技术以及一些最佳实践。\n\n看看编程语言，您可以用任何语言表达您的想法——确实，用汇编语言开发\
  \ ERP 系统是可能的。但汇编并不是完成该任务的最佳工具——随着岁月的流逝，我们的行业为开发业务应用程序开发了更好的工具。\n\n数据库也是如此——您可以在关系数据库和\
  \ NoSQL/文档数据库中为相同的领域建模。没有技术限制。然而，与关系建模相比，许多开发人员会发现面向文档的建模更加自然。面向文档的模型更接近被建模的真实生活文档，并且您需要做的调整比数据库技术方面所要求的要少。\n\
  \n当使用文档数据库时，您最大的障碍将是您的习惯。多年来，甚至几十年来，您一直以一种方式做事，而现在，突然之间，您需要放弃，忘记所有最佳实践，并开始遵循一套新的最佳实践，这需要一次信念的飞跃。\n\
  \n关系数据库基于表及其之间的关系。当为 `RDBMS` 建模时，您遵循这一点。我们可以在关系数据库中将所有东西建模为一组表，但同样的东西也可以在 NoSQL\
  \ 数据库中建模为一个文档。真正的挑战是创建一个模型，使您能够利用所使用的特定数据库提供的功能。一个合适且恰当的文档数据模型可以让您的生活更轻松，并让您几乎完全忘记数据库——您的数据库可以成为开发周期中一个“无聊”的组件。\n\
  \n因此，良好面向文档建模的第一条规则是“不要将关系数据库建模技术应用于 NoSQL”。关系数据库和文档数据库是两个不同的世界。它们应用不同的范式，具有不同的方法，并且有着完全不同的理念。\n\
  \n如果您未能遵循这个建议，您最终将得到一个不恰当且非最优的模型。这会使您的生活更加艰难，即使执行简单的任务，您也可能要与数据库“斗争”。但是，您不应该将数据库视为敌人。您应该将其视为盟友和朋友。而朋友就是用来帮助的。\n\
  \n### JSON 文档\n\nNoSQL 文档数据库的第一个基本特征是它们存储文档的格式。对于大多数 NoSQL 数据库，`JSON` 是原生或支持的格式。`JSON`\
  \ 由 Douglas Crockford 在 21 世纪初定义，代表 JavaScript 对象表示法。这种格式是文本化的，由 `ECMA` 标准化，尽管它是\
  \ JavaScript 的一个子集，但 `JSON` 是语言无关的。\n\n回到我们包含订单行的订单示例，我们可以用 `JSON` 格式表示它，如下所示：\n\
  \n```json\n{\n\"Company\": \"ACME\",\n\"Total\": 496,\n\"Lines\": [\n{\n\"ProductName\"\
  : \"Chang\",\n\"PricePerUnit\": 19,\n\"Quantity\": 24\n},\n{\n\"ProductName\": \"\
  Aniseed Syrup\",\n\"PricePerUnit\": 10,\n\"Quantity\": 4\n}\n]\n}\n```\n\n与关系数据库不同，我们没有技术限制迫使我们将这个订单拆分为多个实体。此外，`JSON`\
  \ 是数据交换的行业标准格式。所有主要语言，如 `C#`、`Java` 或 `Python`，都支持将对象序列化为 `JSON` 格式以及从 `JSON` 反序列化回对象。\n\
  \n因此，在为 NoSQL 数据库建模数据领域时，我们的目标是开发一组描述我们子领域的 `JSON` 文档。在下一节中，我们将看到如何处理这项非同寻常的任务。\n\
  \n\n### 建模良好文档的特性\n\n没有一种算法可以确保达到完美模型。建模技巧是通过多个项目的经验积累获得的。你会尝试构建一个模型，实施它，然后随着应用程序的运行和变更请求的到来，随时间推移对其进行评估。此外，建模事物的方式永远不止一种。存在许多变体，你无法将任何变体标记为“恰当的”、“最佳的”、“最合适的”或“符合规范的”。许多因素将影响这一过程——你需要考虑性能、存储分配、查询类型、业务规则和方向。你的应用程序极有可能会不断演进。\n\
  \n然而，尽管我们无法制定严格的规则和配方来塑造和构建文档，但我们可以观察建模良好的文档所具有的一些良好特性。多年的建模经验告诉我们所需的特性是：\n\n* \
  \  *独立性*：文档应该独立于任何其他文档而存在。\n*   *隔离性*：文档应该能够独立于其他文档进行更改。\n*   *一致性*：文档应该无需参考其他文档即可自行理解。\n\
  \n这些理想结果的好处，可以通过展示不遵循这些原则的建模后果来最轻松地解释。让我们再次查看上一节中的 JSON 模型（如清单 2-1 所示）。\n\n```json\n\
  {\n  \"Company\": \"ACME\",\n  \"Total\": 496,\n  \"Lines\": [\n    {\n      \"\
  ProductName\": \"Chang\",\n      \"PricePerUnit\": 19,\n      \"Quantity\": 24\n\
  \    },\n    {\n      \"ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\"\
  : 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n```\n**清单 2-1** JSON 订单文档\n\n清单 2-1\
  \ 展示了一个订单的 JSON 表示。如你所见，此订单有两个订单行。观察第一个：\n\n```json\n{\n  \"ProductName\": \"Chang\"\
  ,\n  \"PricePerUnit\": 19,\n  \"Quantity\": 24\n}\n```\n\n现在，让我们从第一个目标——*独立性*的角度考虑，我们是否可以将这个订单行建模为一个单独的文档。这个订单行是独立的吗？它能有意义地存在吗？进一步想想，你是否见过一张只印有订单行、没有更多细节的纸？答案很明确——订单行无法独立存在；在其父订单的范围之外，它没有意义。我们将订单行建模为单独的文档将导致\
  \ JSON 失去实质内容。\n\n接下来，让我们检查我们的订单与系统中其他文档相比的隔离程度。如果更新一个文档也意味着你需要更新数据库中的任何其他文档，那么该文档就不是*隔离*的。所以我们可以问一个问题——此订单内容的任何更改是否会影响产品或公司？答案是否定的。因此，我们验证了订单模型符合*隔离性*原则。从否定该原则的角度来看，这里有一个不具备隔离性的订单模型示例：\n\
  \n```json\n{\n  \"Company\": {\n    \"Name\": \"ACME\",\n    \"TotalOrders\": 1,\n\
  \  },\n  \"Total\": 496,\n  \"Lines\": [\n    {\n      \"ProductName\": \"Chang\"\
  ,\n      \"PricePerUnit\": 19,\n      \"Quantity\": 24\n    },\n    {\n      \"\
  ProductName\": \"Aniseed Syrup\",\n      \"PricePerUnit\": 10,\n      \"Quantity\"\
  : 4\n    }\n  ]\n}\n```\n\n在这个例子中，我们决定扩展公司信息以跟踪总订单数。因此，每当我们创建一个新订单时，都需要更新同一公司的所有现有订单，并将\
  \ `TotalOrders` 值加一。这样一个扩展后的模型就不再具有隔离性了。我们在一个文档范围内所做的更改会产生连锁反应，导致必须更改一个或多个其他文档。\n\
  \n最后，如果文档不具备*一致性*，就无法仅凭其包含的信息确定其含义。审视我们的订单，我们可以得出结论，我们拥有所有需要的信息：Acme 公司下了一个包含两种产品各多个数量的订单；我们可以看到我们承诺给他们的价格以及此订单的总价值。然而，仔细检查后，我们发现不知道将订购的货物送到哪里。我们需要查阅另一个包含\
  \ Acme 地址的文档，才能获得关于此订单的完整信息。以下是我们可以如何扩展订单模型以使其一致：\n\n```json\n{\n  \"Company\":\
  \ \"ACME\",\n  \"ShippingAddress\": {\n    \"City\": \"Albuquerque\",\n    \"Country\"\
  : \"USA\",\n    \"Line1\": \"2817 Milton Dr.\"\n  },\n  \"Total\": 496,\n  \"Lines\"\
  : [\n    {\n      \"ProductName\": \"Chang\",\n      \"PricePerUnit\": 19,\n   \
  \   \"Quantity\": 24\n    },\n    {\n      \"ProductName\": \"Aniseed Syrup\",\n\
  \      \"PricePerUnit\": 10,\n      \"Quantity\": 4\n    }\n  ]\n}\n```\n\n在本节中，我们了解了建模良好的文档所具有的三个特性。之后，我们依据这些原则检查了我们最初的订单模型，并最终将初始模型修正为最终版本。这个最终的订单文档包含了关于订单的完整信息（*一致性*），我们对它所做的任何更改都不会迫使我们更新其他文档（*隔离性*）。此外，该模型的*独立*性质使我们能够自由地制作纸质版本并放入信封邮寄——收件人能够检查并理解它，无需提出额外问题。\n\
  \n通过这种建模，我们还成功地实现了另一个方面——我们创建了一个*时间快照*模型。我们的文档捕获了文档创建时所有相关信息的状态。例如，我们记录了两种产品的价格——如果这些产品在订单创建后降价或涨价，该变化将不会影响我们的文档。此外，配送地址经过验证是有效的。如果它在未来发生变化，例如公司搬迁，我们将有一个精确的记录表明货物是送往美国阿尔伯克基，而不是其他城市或国家。这种防止数据损坏的重要性不容小觑。\n\
  \n在下一节中，我们将看到，除了这些优质模型的特性外，我们还有一个更强大的心智模型用于开发文档模型。\n\n## 聚合\n\n正如我们在前一章所见，NoSQL\
  \ 生态系统拥有由不同数据库实现的多种不同风格和方法。然而，键值存储、文档存储和列族存储这三类数据库共享一种共同的方法，即为你提供定义*聚合*的能力。\n\n\
  *聚合*是一个源自域驱动设计（DDD）的术语，它代表被视为一个单一单元的一组相关对象。假设你将纸质文档拆分为信息片段视为规范化过程。那么，聚合导向则代表相反的过程——*反规范化*——决定这些分离的数据块中哪些属于一起，并将它们汇集到一个单元中。\n\
  \n随之而来的自然问题是“这个单元应该多大、多全面”？如果第三范式是一个极端，我们是否应该走向另一个极端，将整个域建模为一个大的单元？要回答这个问题，我们需要深入探究聚合这个单元所代表的本质。\n\
  \n## 变更单元与一致性单元\n\n聚合是一个*变更单元*，也是一个*一致性单元*。\n\n一个*变更单元*将是你数据库模型中能够处理所有请求的变更，而无需访问其他文档的每一个实体。换句话说，我们所做的变更都在一个聚合内部传播。\n\
  \n回到我们文档良好建模的三个属性，我们可以看到聚合符合以下要求：\n\n*   独立且内聚——它们是相关对象的集合，在一个 `Document` 中组合在一起。这些对象包含完整且全面的信息，可以作为一个独立的单元存在。我们可以在无需查看相关聚合的情况下理解一个聚合。\n\
  *   隔离——作为一个变更单元，聚合可以独立于其他文档进行修改。\n\n聚合的第二个重要属性是它们代表一个*一致性单元*。一个一致的数据库在任何时间点都只包含有效数据。存储在数据库中的所有信息都将符合所有业务规则、约束和验证检查。无论我们对聚合应用什么变更，如果我们使用了验证规则，它们在保存到数据库时将保持有效。\n\
  \n回到我们通用的 `Order` 示例，如果我们在 `Lines` 集合中再添加一行，我们还需要通过重新计算 `Order` 的新总值来更新 `Total`\
  \ 属性。如果它包含更多属性，比如 `VAT` 或运输成本，它们也需要更新。我们构建的系统可能会有一些更高级的规则——例如，我们可能为海外运输提供批量折扣。在这种情况下，仅仅添加一行订单就会触发一系列更新、规则检查、验证检查以及各种计算带来的一些额外更新。在应用所有更新之后，我们将以原子方式将\
  \ `Order` 持久化到数据库中；我们的 `Order` 聚合包含了一组同时更改的单元。这个变更集已经过验证，符合所有业务和其他验证规则。我们现在可以确信，我们的数据库中保存的\
  \ `Order` 只包含有效数据。\n\n## 分布式系统\n\n然而，数据库只是我们正在构建的软件系统的一个组成部分。从更宏观的视角来看，我们会发现现代应用程序是复杂的。它们由许多组件组成，形式多样——从工具类、进程内服务，到物理分离的服务，并在互联机器的网络上执行。服务之间通过同步或异步方式进行通信。\n\
  \n举个例子，看一个简单的网店。客户可以将产品添加到购物车并完成 `Order`。`Order` 被保存在网店应用程序中，发送确认邮件，并被推送到作为运营核心的\
  \ `ERP` 系统。即使在这个小系统中，我们也能看到三个主要的分离组件：\n\n*   网店应用程序\n*   邮件服务器\n*   ERP 系统\n\n这是三个存在于分离机器上、通过网络通信的隔离组件。以这种方式构成的系统被称为*分布式系统*。\n\
  \n从业务逻辑的角度来看，发送确认邮件、创建新的 `Order` 并将其推送到 `ERP` 系统是一个事务性操作。然而，在像这样的分布式系统中，你所习惯的标准事务概念不再适用。例如，当你尝试发送新的\
  \ `Order` 时，如果 `ERP` 系统不可用，会发生什么？我们应该放弃它吗？在这种情况下，我们将在何时发送确认邮件？\n\n分布式系统之所以具有挑战性，是因为它们很复杂，并且因为你通常所做的许多假设不再成立。之前你作为同步执行的操作，在分布式系统中可能是异步的。每次通过网络通信时，你都必须为通信失败的场景提供回退方案。在分布式组件之间发送的消息有时会被排队，并在你最初发送后的几十秒、甚至几分钟后才送达。\n\
  \n因此，在大多数情况下，在分布式系统中，你将无法依赖应用程序的事务特性。分布式系统具有*最终一致性*的概念。你的业务事务最终会完成，但无法保证你发出的变更需要多长时间才能被系统组件传递和接受。在这个传播过程结束时，你的分布式系统将变得一致，但这个事实是你必须时刻意识到的。\n\
  \n## 分布式系统中的聚合\n\n在分布式系统的背景下重新审视*聚合*的概念，揭示了其对聚合边界设计的重大影响。具体来说，聚合边界的范围将决定哪些数据单元成为其一部分。回到聚合是*变更单元*和*一致性单元*这一事实，我们可以得出结论：修改聚合并将其保存到数据库将代表一个*事务*。\n\
  \n什么是事务？事务代表一个单独的、不可分割的操作，它要么作为一个完整的单元成功，要么失败。事务的部分完成是不可能的，并且当事务处理完成后，你将获得关于结果的精确而可靠的反馈。这个特性通常被称为*原子性*，正是因为事务的不可分割性。\n\
  \n为什么原子性很重要？事务通常代表一组紧密耦合的操作。仅执行其中一部分可能会使你的数据陷入不一致和损坏的状态。举个例子，想象一下向 `Order` 添加一个新产品。你将：\n\
  \n*   创建一个包含该产品的新订单行。\n*   重新计算订单总额以包含新订单行的金额。\n\n如果这两个操作只执行了一个，会发生什么？你要么收取了一个未包含在\
  \ `Order` 中的产品的费用，要么产品在 `Order` 中但没有增加 `Total`。换句话说，你要么给自己，要么给客户造成了财务损失。\n\n因此，很明显，我们需要将这两个操作视为一个原子单元。结果，它们要么都成功（创建了新的订单行并且\
  \ `Total` 被正确更新），要么都失败（订单总额保持不变，因为没有添加新的订单行）。事务失败本身并不严重。你可以通过几种标准方式处理它，包括在显示错误消息之前重试它。然而，关键的是，在成功或不成功的两种情况下，你的数据都将保持一致的状态。\n\
  \n## 聚合作为事务边界\n\n我们可以得出结论，聚合是支持事务的。我们将加载一个代表聚合的 `Document`，在数据库层面以事务方式更新它并将其保存回数据库，从而保证我们\
  \ `Document` 的一致性。\n\n你可以自问——为什么我们不能在一个事务中更新两个文档？这确实是可能的。正如我们已经提到的，建模是一项微妙的智力活动。没有复杂的规则，到目前为止你所读到的一切都是基于这些原则实际应用中学到的最佳实践建议。因此，在一个事务中更新两个聚合文档是可能的。然而，推荐的方法是将那些需要在事务中一起更改的事物分组到一个聚合中，然后以最终一致的方式将更改传播到系统的其余部分。此外，在很多情况下，你将受限于分布式系统的性质而不得不采用最终一致性。\n\
  \n一个典型的例子是将你的应用程序分离为微服务。每个微服务通常会有自己的数据库。跨越驻留在不同数据库中的两个或多个聚合的事务是不可行且困难的。在开发、维护和演进这样的应用程序时，这种方法带来的问题将多于好处。\n\
  \n因此，你应该将聚合的边界视为事务边界。对于应用程序中的大多数更改，你将只需要加载、更改和保存一个 `Document`——一个代表你聚合的文档。\n\n系统中发生的其他一切将不是事务性的，而是最终一致的。你应该考虑到这一点并实现错误处理机制。此外，你应该仔细处理应用程序中的每一个业务场景，确定何时同步通信是必须的，何时可以使用异步通信。\n\
  \n## RavenDB 中的建模\n\n本节将展示 `RavenDB` 如何处理文档，以及你如何创建和检查文档。同时，我们也将了解分配给每个 `RavenDB`\
  \ 文档的标识符。\n\n### 文档\n\n`RavenDB` 以 `JSON` 格式存储文档，它们的大小几乎是无限的——最大可达 `2Gb`。但是，你应该将文档的大小限制在不超过几兆字节。大于此大小的\
  \ `JSON` 加载和保存回数据库会很麻烦，并且这通常是你的模型并非最优的强烈信号。\n\n在上一章中，我们创建了一个空数据库并用一些示例数据对其进行了初始化。在图\
  \ 2-3 中，你可以看到来自 `Orders` 集合的一个 `Order` 文档。\n\n![](img/514303_1_En_2_Fig3_HTML.png)\n\
  \n一张包含 34 行代码的截图，用于创建订单文档，具有保存、克隆和删除选项。\n\n图 2-3\n\nRavenDB 中的订单文档\n\n此文档包含两个主要元素：\n\
  \n*   标识符 `orders/830-A`\n\n*   `JSON` 主体\n\n这两个是必需的。每个 `RavenDB` `Document` 必须有一个唯一的标识符和非空的\
  \ `JSON` 内容。\n\n让我们创建我们的第一个 `Document`。首先，按照上一章的指示创建一个新的空数据库。数据库成功创建后，你将看到一个如图 2-4\
  \ 所示的屏幕。\n\n![](img/514303_1_En_2_Fig4_HTML.png)\n\n一张空的 Raven D B 数据库截图。它有 2 个部分。在文档部分下，列出了最近、补丁、查询、冲突和比较交换的图标。另一个部分是一个包含\
  \ 4 列的表格，标题为：I d，变更向量，最后修改时间和集合。\n\n图 2-4\n\n空的 RavenDB 数据库\n\n要创建一个新文档，你需要点击 `New\
  \ document` 按钮，这将打开如图 2-5 所示的屏幕。\n\n![](img/514303_1_En_2_Fig5_HTML.png)\n\n一张创建新文档并写有代码的截图。\n\
  \n图 2-5\n\n创建新文档\n\n在 `ID` 字段中填入 `users/`，对于 `JSON` 主体中 `Name` 字段的值，你可以填入任意字符串，如图\
  \ 2-6 所示。\n\n![](img/514303_1_En_2_Fig6_HTML.png)\n\n一张填充新文档的截图。一个四行的任意字符串指示了用户名称，I\
  \ D 字段填充为 users 斜杠。\n\n图 2-6\n\n填充新文档\n\n在你点击 `Save` 按钮后，你的 `Document` 将被创建，你将看到这个新\
  \ `Document` 的详细信息，如图 2-7 所示。\n\n![](img/514303_1_En_2_Fig7_HTML.jpg)\n\n一张截图描绘了新文档内容。屏幕在文档保存后显示了用户详细信息。\n\
  \n图 2-7\n\n新文档的内容\n\n这里有几件有趣的事情需要注意，让我们逐一回顾。\n\n在 `Save`、`Clone` 和 `Delete` 按钮上方，值\
  \ `users/0000000000000000001-A` 是为你生成的 `ID`。你记得，你在 `ID` 字段中填入了 `users/`。`RavenDB`\
  \ 将此值作为未来 `ID` 的前缀，生成了唯一的后缀 `0000000000000000001-A`，并将其附加到你的前缀后。一旦分配，`ID` 就无法更改——它是这个\
  \ `Document` 的唯一标识符。\n\n你还会注意到你的前缀 `users/` 在另外两个地方出现。一个是在左列，你可以看到创建了新的集合 `Users`，而你新创建的\
  \ `Document` 被放在其中。但是，这种集合关联性存储在哪里呢？答案在于 `@metadata` 属性：\n\n```json\n\"@metadata\"\
  : {\n\"@collection\": \"Users\"\n}\n```\n\n如你所见，`@metadata` 本质上只是另一个 `JSON` 属性。与其他属性的唯一区别在于\
  \ `@metadata` 是一个保留名称。所有 `RavenDB` 系统名称都以 `@` 符号开头，因此它们不会与你的属性冲突。在 `@metadata` 内，属性\
  \ `@collection` 包含了集合的名称。\n\n图 2-5 仅显示了代表你 `Document` 的 `JSON` 的部分视图。然而，`RavenDB`\
  \ Studio 具有你可以用来检查原始和完整 `JSON` 的功能。如图 2-8 所示，在文档内容上方的区域，有一个 `Show raw output` 图标。\n\
  \n![](img/514303_1_En_2_Fig8_HTML.jpg)\n\n一张截图描绘了显示原始输出的图标，该文档在不到一分钟前被修改过。\n\n图\
  \ 2-8\n\n显示原始输出图标\n\n点击此图标将打开一个新的浏览器标签页，显示你 `Document` 的完整原始 `JSON`：\n\n```json\n\
  {\nName: \"John\",\n@metadata: {\n@collection: \"Users\",\n@change-vector: \"A:1-4Ocnef4WVEaQ9NeWn3Yhig\"\
  ,\n@id: \"users/0000000000000000001-A\",\n@last-modified: \"2021-05-05T20:05:53.1467758Z\"\
  \n}\n}\n```\n\n你现在能够看到 `@metadata` 包含的所有系统属性：\n\n*   `@collection` - 你的 `Document`\
  \ 将被放置的集合名称。\n\n*   `@change-vector` – 变更向量。这是一个更高级的概念，但我们简要提及，变更向量提供了在数据库集群的多个节点上对同一\
  \ `Document` 的变更进行部分排序的方法。\n\n*   `@id` – 你的 `Document` 的标识符。\n\n*   `@last-modified`\
  \ – `Document` 最后一次更改的 `UTC` 时间戳。\n\n### 标识符\n\n标识符是每个 RavenDB 文档的必需部分。一旦分配，标识符就无法修改。只要文档存在，它就将拥有在创建时分配给它的相同标识符。此外，RavenDB\
  \ 将确保每个文档在数据库级别都有一个唯一的标识符。\n\n重新审视上一节中的 `@metadata` 属性，我们可以看到 `@id` 是一个字符串：\n\n\
  ```\n@id: \"users/0000000000000000001-A\"\n```\n\n当你创建一个新文档时，你可以为 id 传递各种字符串值，RavenDB\
  \ 会以不同的方式做出反应：\n\n*   空字符串 – 当你传递一个空字符串作为 `id` 时，RavenDB 将生成一个 GUID 并将其分配为 `id`。\n\
  *   `集合名称/` – 一个任意字符串后跟一个正斜杠。传递 `users/` 就是一个例子。字符串 `users` 将是集合的名称，而斜杠将向 RavenDB\
  \ 发出信号，为文档生成一个唯一的标识符。此标识符将被生成为一个前面补零的数字，并加上节点名称。例如，将 `users/` 作为文档的 Id 传递，将导致 RavenDB\
  \ 分配 `users/0000000000000000001-A` 作为唯一标识符。\n*   `集合名称|` - 任意字符串后跟一个管道字符。任意字符串将被视为集合的名称，而管道字符将触发集群范围内的协调，以在集群级别生成一个唯一的数字。因此，将\
  \ `users|` 作为文档的 Id 传递，将导致 RavenDB 分配 `users/1`。\n*   在所有其他情况下，当字符串非空且不包含斜杠或管道字符时，RavenDB\
  \ 将接受它并不加修改地分配为你新文档的 id。\n\n如果你的 ID 没有很强的理由，最好让 RavenDB 生成 ID。采用 `集合名称/` 将产生唯一的标识符，这些标识符也将是可排序的，使\
  \ RavenDB 能够为搜索和提取进行优化存储。如果你出于某些原因需要生成自己的标识符，建议找到一个可以生成词法可排序标识符的库。\n\n### 文档关系建模\n\
  \n你使用的数据库名称中不包含 `关系` 这个词，并不意味着你无法对文档所代表的聚合之间的关系进行建模。本节将探讨 RavenDB 中文档之间可能的关系类型、建模它们的各种方法，以及如何验证可能解决方案的强项和弱项。\n\
  \n上一节重点介绍了 RavenDB 文档的 JSON 内容，而本节则侧重于这些文档之间的连接。这些关系不是实际数据，而是元数据，关系建模的要点是如何扩展文档以包含这些额外信息。\n\
  \n尽管实体之间可以通过多种方式互连，但我们将研究三种最常见和基本的方式：一对一、一对多和多对多。\n\n#### 一对一关系\n\n这是我们第一次提到这种类型的关系，但你之前已经有机会观察到它了。让我们重新审视我们最喜欢的带有\
  \ `收货地址` 的订单示例：\n\n```\nId: orders/1\n{\n  \"Company\": \"ACME\",\n  \"ShippingAddress\"\
  : {\n    \"City\": \"Albuquerque\",\n    \"Country\": \"USA\",\n    \"Line1\": \"\
  2817 Milton Dr.\"\n  }\n}\n```\n\n一个订单有其物理身份（通常以纸质文档的形式出现）及其唯一标识符 `orders/1`。这个唯一标识符为我们提供了一种识别同一订单的多个实例的方法——比较两个订单归结为比较它们的\
  \ Id 值。\n\n另一方面，如果我们检查 `ShippingAddress`，我们会意识到它没有在独特的、可区分的存在意义上的身份。每个订单都是唯一的，而我们可以有多个运往同一地址的货件。要确定两个货件是否发往完全相同的地点，我们必须比较地址的三个组成部分：`City`、`Country`、`Line1`。因此，我们可以得出结论，它的值代表了地址的身份。在领域驱动设计中，这些对象被标记为\
  \ `值对象`。\n\n`值对象`的存在与其父文档紧密耦合。它们是嵌入其中的实体所具有的唯一上下文，这赋予了 `值对象` 完整的意义。让我们再观察一个 `值对象`\
  \ 的例子：\n\n```\nId: users/1\n{\n  \"Name\": \"John\",\n  \"Age\": 63\n}\n```\n\n\
  想象一下，给你看一个数字 `63`。这个数字代表什么？某人的体重？温度？小时？价格？你根本无法判断——`63` 本身可以代表太多事物，甚至可能是一个不代表任何东西的随机数字。\n\
  \n现在，用属性名称来补充它，`\"Age\": 63`，我们可以理解它表示年龄。但我们无法知道谁是 63 岁？也许是一座桥或一栋建筑的年龄？不幸的是，我们再次缺乏上下文。\n\
  \n最后，在观察它所属实体内的这个属性时，我们有了完整的图景——约翰是 63 岁。\n\n这个思维练习为我们提供了一个识别 `值对象` 的简单方法。每当你需要上下文来确定信息的精确含义时，你就会发现\
  \ `值对象`。正如你所见，`值对象` 可以像一个数字那样简单，也可以像 `收货地址` 那样复杂的结构，它们是实体的基本构建块。\n\n##### 嵌入\n\n\
  对于 `年龄` 和 `收货地址`，我们都应用了一种称为 `嵌入` 的技术。在这两种情况下，它们单独存在的理由都不充分，因此我们将这些小文档插入到代表实体的大文档中。\n\
  \n\n##### 引用\n\n然而，存在一些情况，我们会注意到两个文档，它们各自拥有独立的标识和存在的理由——并且它们处于一种一对一的关系中。例如，想象一个包含组织内所有员工信息的人力资源管理系统。除其他事项外，我们为每个\
  \ `Employee` 保存一份 `Resume`——它是在候选人申请职位时输入到 HRM 系统中的。当她接受工作邀请后，我们将此候选人晋升为全职 `Employee`。观察\
  \ `Employee` 和 `Resume`，我们可以看到它们都具有物理存在和自己的身份。同时，它们具有清晰的一对一关系：每个 `Employee` 恰好有一份\
  \ `Resume`，而对于每份 `Resume`，我们都可以确定是哪个 `Employee` 提交了它。然而，在我们决定如何建立关系之前，首先需要进行一些初步建模。清单\
  \ [2-2] 展示了 `Employee` 实体的一个模型。\n\n```\nId: employees/1\n{\nName: \"John Doe\",\n\
  DateOfBirth: \"1958/05/08\"\n}\n```\n清单 2-2 Employee 文档模型\n\n接下来，我们为 `Resume` 建模，如清单\
  \ [2-3] 所示。\n\n```\nId: resumes/1\n{\nEmployee: \"employees/1\",\nEducation: \"\
  Yale\",\nSpecialty: \"IT\"\n}\n```\n清单 2-3 Resume 文档模型\n\n这两个模型是简化的，但它们展示了基本信息。仔细观察\
  \ `Resume` 模型，我们可以看到属性 `Employee: \"employees/1\"` 直接将 `Resume` 链接到一个 `Employee`。\n\
  \n这就是一个**引用**。RavenDB 中的引用只不过是包含其他文档字符串 ID 的属性。\n\n由于 `Resume` 通过引用指向 `Employee`，我们可以说这个链接代表“由...拥有”——`Resume`\
  \ 被一个 `Employee` 拥有。我们可以反转这个关系，如清单 [2-4] 所示。\n\n```\nId: employees/1\n{\nResume:\
  \ \"resumes/1\"\nName: \"John Doe\",\nDateOfBirth: \"1958/05/08\"\n}\nId: resumes/1\n\
  {\nEducation: \"Yale\",\nSpecialty: \"IT\"\n}\n```\n清单 2-4 具有反转引用的 Employee 和 Resume\
  \ 文档\n\n我们现在拥有的是 `Employee` 持有一个指向 `Resume` 的引用：`Resume: \"resumes/1\"`。这个引用可以解读为“拥有”——`Employee`\
  \ 拥有一个 `Resume`。\n\n当然，你也可以建立双向的一对一关系，如清单 [2-5] 所示。\n\n```\nId: employees/1\n{\n\
  Resume: \"resumes/1\",\nName: \"John Doe\",\nDateOfBirth: \"1958/05/08\"\n}\nId:\
  \ resumes/1\n{\nEmployee: \"employees/1\",\nEducation: \"Yale\",\nSpecialty: \"\
  IT\"\n}\n```\n清单 2-5 具有相互引用的 Employee 和 Resume 文档\n\n`Employee` 和 `Resume` 现在通过包含对方文档\
  \ ID 的属性相互指向。在一个显示 `Employee` 详细信息的屏幕中，我们可以轻松地提供 `Resume` 屏幕，因为 `Employee` 持有对其简历的引用。同样，显示\
  \ `Resume` 的屏幕可以提供一个指向相关 `Employee` 的链接，因为我们可以轻松访问 `Employee` 属性中的引用。\n\n正如我们已经提到的，建模不是一个有严格规则的精确过程。我们对\
  \ `Employee` 和 `Resume` 所做的是：首先发现它们是相关的，然后确定这是一对一关系，最后应用了这种关系的三种可能实现方式：\n\n1.  单向：`Resume`\
  \ 指向 `Employee`。\n2.  单向：`Employee` 指向 `Resume`。\n3.  双向：`Employee` 和 `Resume` 都持有指向对方的引用。\n\
  \n然而，由于在数据库层面没有技术限制，我们还可以应用另一种方法——**嵌入**。我们已经提到 `Employee` 和 `Resume` 之间的关系是一对一，但也谈到了所有权。`Employee`\
  \ 拥有 `Resume`，而 `Resume` 被一个 `Employee` 所拥有。这种“拥有”的措辞是嵌入的一个清晰方向，如清单 [2-6] 所示。\n\n\
  ```\nId: employees/1\n{\nName: \"John Doe\",\nDateOfBirth: \"1958/05/08\",\nResume:\
  \ {\nEducation: \"Yale\",\nSpecialty: \"IT\"\n}\n}\n```\n清单 2-6 带有嵌入式 Resume 的员工\n\
  \n在这种情况下，我们嵌入的不是一个没有身份的**值对象**，而是一个具有清晰身份的**实体**。这之所以可能，是因为存在清晰的所有权情况——`Employee`\
  \ 恰好有一个 `Resume`，并且每个 `Resume` 属于一个特定的 `Employee`。\n\n这种建模**一对一**关系的第四种方法是完全合理的。这取决于你来审视所有可能的方向，思考你应用程序中的流程和工作流，并确定可接受的建模解决方案。\n\
  \n此外，你还应该考虑未来。你的应用程序可能以哪些方式演进？你的用户可能会提出什么请求？随着数据量增长或文档变大，会发生什么？\n\n考虑到这一点，让我们观察清单\
  \ [2-5] 中呈现的 `Employee` 建模变体。为了简单起见，我们有意使 `Employee` 和 `Resume` 都人为地过度简化。然而，如果你回想现实中的简历可能相当大，有时是三到四页，你就会意识到你将嵌入一个相当大的文档。不仅如此，在\
  \ `Resume` 包含员工参与项目列表的场景中，你会看到 `Resume` 随着月份和年份而增长。如果你需要加载、操作并将 `Employee` 保存到数据库，那就意味着\
  \ `Employee` 文档的大小会随着时间的推移而增长。\n\n此外，假设你决定应用相同的技术，以同样方式嵌入更多文档。在这种情况下，你不可避免地会看到你的\
  \ `Employee` 文档变得非常庞大且操作起来非常笨重。\n\n最后，如果需求发生变化，公司管理层决定为每个 `Employee` 引入不止一份简历——即公司申请合同，并且作为投标活动的一部分，为所有项目成员生成定制简历的场景，会发生什么？这将打破你的一对一建模，转变为**一对多**（一个\
  \ `Employee` 可以有多份 `Resume`）。修改数据库模型和你的代码以适应这个变更请求需要付出多少努力？像“我们想在数据库中支持一个 Employee\
  \ 拥有多份 Resume”这样直接的句子，是否会导致工作量大得不成比例？\n\n所有这些都表明建模是复杂的。你永远不会处于完成模型并宣布其为“最佳可能”的情况。因此，你永远不应追求完美和“唯一正确的方式”。同时，你也不应该试图预测未来，然后将你所有能预见到的变体都作为领域模型的一部分构建起来。相反，你应该做的是创建一个尽可能简单的模型，它既覆盖当前需求，又不会阻碍那些将成为你应用程序生命周期中正常且可预期的变更请求。\n\
  \n\n\n## RavenDB 中的引用完整性\n\n正如你在上一节看到的，在 RavenDB 文档中建立引用非常简单。你只需引入一个具有明确名称的属性，并填入被引用文档的\
  \ ID。从 RavenDB 的角度来看，这个属性并无特殊之处，它只是另一个值为字符串的属性。因此，对于数据库引擎而言，这两个属性在结构和功能上是等同的：\n\n\
  ```\nResume: \"resumes/1\",\nName: \"John Doe\",\n```\n\nRavenDB 不会检查 Id 为 `resumes/1`\
  \ 的 `Resume` 是否存在。同样，你可以给你的 `Employee` 分配任意名称，也可以为 `Resume` 引用设置随机值：\n\n```\nResume:\
  \ \"resumes/000\",\nName: \"Random Randomsson\",\n```\n\n在这个例子中，我们创建了一个指向不存在的 `Resume`\
  \ 的引用。在数据库层面，并没有机制能防止我们引入数据损坏。因此，很自然会产生疑问——关系数据库能在数据库层面保护我们免受数据损坏，RavenDB 暴露的这种行为是否是一种退步？我为什么要使用一个不能防止我犯下破坏数据错误的数据库？\n\
  \n此外，由于 `JSON` 格式的限制，你无法为特定属性指定具体类型。因此，如果你有一个整数类型的“age”属性，RavenDB 不会阻止你向其中存储“John”。而在关系数据库中，这样的尝试会导致错误。那么，该如何解释这一点？你为什么要选择一个会让你的应用可靠性降低、更容易出错的数据库？一个允许你向数据中引入损坏的数据库？\n\
  \n## 与关系数据库的比较\n\n是的，如果将数据库视为系统中孤立的部分来看，这确实是真的。像 `SQL Server` 或 `PostgreSQL` 这样的关系数据库，会为你提供强类型列和检查引用完整性的方式，防止你建立指向不存在实体的引用。然而，在数据持久化这一更广阔的背景下观察数据库，则会带来一个显著不同的视角。\n\
  \n## 领域驱动建模\n\n与 20 世纪 80 和 90 年代不同，当今的建模方法（如领域驱动设计）不再将数据库作为建模过程的起点。相反，它们推荐在编程语言中对业务领域进行建模，然后将领域实体持久化到数据库中。过去，大多数规划会议都始于白板前，开发人员会在上面绘制关系数据库表、字段以及大量用于建立它们之间关系的\
  \ `外键`。这个过程看起来与构建 `UML` 图非常相似，只不过数据库是“世界的中心”，整个系统的规划都始于数据库建模。遵循持久化模型，再对编程语言中的实体以及用于管理这些实体的\
  \ `CRUD` 操作进行建模。\n\n从数据库“中心主义”的角度来看，将验证逻辑下推到数据库是很自然的追求。然而，随着领域建模技术的进步和发展，我们达到了今天这样在概念层面使用\
  \ `聚合`、`实体` 和 `值对象` 进行建模的阶段。我们分析流程，将企业项目划分为子域，并在 `子域` 范围内进行建模。进行这项活动的目的是纯粹地审视我们子域的业务和流程方面，同时记住这个活动的产物最终需要被持久化。尽管如此，持久化只是一个次要的考虑因素，而非主要的。\n\
  \n每个子域通常都有其特有的实体。不仅如此——每个子域都有其自己的一套业务规则，实体应根据这些业务约束进行验证。一个经验法则是，精心设计的业务领域应能防止无效对象的实例化。一个好的规则是“不可能的状态应该不可表示”这一原则。换句话说，你可以将某人的年龄声明为整数，并将检查工作下推给数据库，但从业务领域的角度来看，允许创建并存储一个年龄为\
  \ -50 或 0 的 `Employee` 是正确的吗？关系数据库提供的数据完整性机制只能覆盖你数据整体业务有效性中的一小部分。完整的验证和数据完整性规则集合是庞大的。它通常包含各种静态和动态约束，常常涉及处于不同状态的多个不同实体。例如，未成年人不应能够将啤酒添加到购物车中。\n\
  \n## 数据库的角色\n\n审视数据库的主要角色，我们可以得出结论：当你将实体存储到其中时，数据库应该提供一种可靠的机制，以逐字且健全的方式持久化内存中的对象。因此，你可以将数据库视为一种将对象图从内存镜像到持久化媒介（通常是硬盘）的方式。\n\
  \n所以，透过狭隘的视角来看，关系数据库确实能够执行类型级别和引用完整性检查，在尝试存储无效数据时抛出错误，这一点是正确的。然而，在每个可靠的应用程序中，都应该存在高层次业务规则和检查机制的多层结构。采用良好的软件开发方法，你将永远不会让你的对象处于无效状态。\n\
  \n因此，在应用开发过程中，数据库应被置于适当的位置——不再是中心，而是一种持久化机制。其角色应该是可靠地存储已验证的对象，并提供快速可靠的手段来索引和查询这些数据。\n\
  \n\n\n\n### 一对多关系\n\n对于这种关系类型，我们将再次以订单（`Orders`）为例，但这次我们将观察它们与公司（`Companies`）的关系。每个公司都可以有一个或多个订单。此外，我们将考虑每种建模方式的优点和约束条件。\n\
  \n回顾*独立性*、*隔离性*和*一致性*的原则，我们可以看到公司和订单应该被建模为单独的文档。将所有订单嵌入到公司文档中的选择是糟糕的——不仅因为公司和订单拥有独立的存在且彼此独立变化——而且随着时间的推移，订单数量的增长将导致公司文档变得异常庞大。此外，在一个文档中存在多个订单会引入并发问题；同时编辑现有订单和创建新订单会引发乐观并发冲突。正如你所见，这个内省过程给了我们足够的论据来高度确定地判定嵌入是一个次优选择。因此，很明显公司和订单应该是分开的文档。\n\
  \n下一步是决定如何在它们之间建立关系。回顾一对一建模，我们可以看到有两种选择。第一种选择如清单 2-7 所示，展示了一个公司持有订单文档 ID 列表的模型。\n\
  \n```\nId: employees/1\n{\nName: \"John Doe\",\nDateOfBirth: \"1958/05/08\",\nOrders:\
  \ [\n\"orders/1\",\n\"orders/2\",\n\"orders/3\"\n]\n}\n```\n**清单 2-7**\n一个带订单 ID\
  \ 列表的员工\n\n`Orders`属性包含属于该公司的订单 ID 列表。将此作为建立公司和订单之间关系的可能解决方案，会暴露出几个弱点：\n\n*   我们放弃嵌入式设计的原因之一，是我们预见到订单数量会随时间增长。本质上，我们在这里面临同样的问题。想象一下公司可能拥有数百甚至数千个订单。这会导致`Orders`属性显著增长。操作订单列表将变得笨拙，并且随着时间的推移越来越困难。\n\
  *   加载公司的订单需要先加载公司文档，处理其`Orders`属性，然后通过获得的 ID 获取订单。这不是一个决定性的障碍，但它在我们的代码和逻辑中引入了不必要的复杂性，产生了额外的数据库请求。\n\
  *   随着公司订单数量的增长，对公司文档的读写操作也在不断增加。随着时间的推移，乐观并发冲突的可能性会成比例地增长。\n\n你可以看到我们使用排除法得出了最后一个建模选项，如清单\
  \ 2-8 所示。\n\n```\nId: orders/1\n{\n\"Company\": \"companies/1\",\n\"ShippingAddress\"\
  : {\n...\n}\n}\nId: orders/2\n{\n\"Company\": \"companies/1\",\n\"ShippingAddress\"\
  : {\n...\n}\n}\nId: orders/3\n{\n\"Company\": \"companies/1\",\n\"ShippingAddress\"\
  : {\n...\n}\n}\n```\n**清单 2-8**\n指向公司的订单\n\n这个模型在订单侧实现了引用。每个订单都有一个`Company`属性，其中包含其所属公司的\
  \ ID。现在让我们对这个模型进行一系列检查：\n\n*   公司和订单是两个独立的集合。它们各自有自己的标识，并且遵守隔离和独立的原则。\n*   随着月份或年份推移，订单数量的增长不会影响文档的大小。\n\
  *   执行查询以获取特定公司的所有订单，不需要我们先加载公司文档。\n\n正如你所见，我们得到的模型通过了我们的检查。我们可以得出结论，我们成功地在公司和订单之间建立了一个关系，它能够支持我们可预见的操作。\n\
  \n在这个例子中，我们发现了一对多建模的一个既定原则。它俗称为“较小侧引用”，指的是应该存储 ID 引用的关系一方。作为通用的最佳实践，你应该始终从这样一个模型开始：多个文档持有对单个文档的一个引用，而不是让一个文档持有一个指向多个文档的长\
  \ ID 列表。\n\n典型的例子包括：\n\n*   我们刚才观察的公司和订单\n*   教授和学生，学生指向教授\n*   公司和产品，产品指向公司\n*\
  \   出版商和书籍，书籍指向出版商\n\n当然，每种情况都是特定的。从“较小侧”方法出发，我们还应该考虑各种当前和未来的场景。一些可能的例外情况示例如下：\n\
  \n*   父母和子女，其中父母可能持有对所有子女的引用\n*   所有者和公司，所有者指向公司\n*   团队和球员，团队持有对球员的引用\n\n与关系数据库相比，我们没有技术限制——我们的关系可以双向指向。这取决于我们需要什么方向。我们可以通过将事物置于情境中、思考我们正在建模的内容，并投入同等甚至更多的精力来规划我们应用程序和数据库的未来增长，从而实现这一点。\n\
  \n### 多对多关系\n\n一旦你理解了一对多关系的本质，扩展到多对多关系就很容易了。让我们看一些多对多关系的现实例子。\n\n*   社区（`Communities`）和成员（`Members`）——每个社区可以有多个成员，并且每个人可以属于多个社区。\n\
  *   祖父母（`Grandparents`）和孙辈（`Grandchildren`）——祖父母可以有多个孙辈，每个孙辈也有多个祖父母。\n*   学生（`Students`）和课程（`Courses`）——学生可以注册多门课程，每门课程也有许多学生参与者。\n\
  *   书籍（`Books`）和作者（`Authors`）——一本书可以有多个作者，每位作者也可以写一本或多本书。\n\n所有这些关系的建模方式与我们建模一对多关系的方式相同：我们将在较小的一方保持一个\
  \ ID 列表。因此：\n\n*   成员将持有一个他的社区 ID 列表，因为社区可以有成千上万的成员。\n*   一个孩子可能拥有的祖父母数量少于祖父母拥有的孙辈数量，因此我们将在孩子文档上保持一个关联列表。\n\
  *   课程可能有数百名学生，因此我们将在学生文档中扩展出一个课程列表。\n*   多产的作者可以写几十本书，而书籍通常只有几位作者，因此我们将在书籍文档上建模一个作者\
  \ ID 列表作为属性。\n\n现在我们知道如何建模存储在 RavenDB 数据库中的文档并建立它们之间的关系，下一章将展示如何查询这些文档。\n\n## 总结\n\
  \n在本章中，我们介绍了 NoSQL 文档数据库中的通用建模原则。在比较了 NoSQL 和 SQL 方法之后，我们介绍了 JSON 文档的基础知识、聚合、良好建模文档的属性以及分布式系统中最终一致性的概念。最后，我们研究了\
  \ RavenDB 建模的具体内容，展示了标识符、关系以及引用完整性的一种方法。\n\n在下一章中，我们将重点关注现代应用程序中最常见的操作——查询。你将学习执行过滤、排序和分页等基本功能。我们还将介绍更高级的主题，包括投影、聚合和解除关系引用。\n\
  \n"
- "# 3. 查询\n\n大多数现代 Web 应用程序执行的写操作相对较少，但读操作却非常频繁。本章将探讨你的应用程序将执行的最常见活动，以及 RavenDB 如何支持它。我们将学习\
  \ Raven 查询语言的基础知识以及使用它进行查询的基本方法。\n\n\n\n\n\n## 在 RavenDB Studio 中查询\n\nRavenDB Studio\
  \ 有一个专门用于运行查询的面板。要打开它，请打开 `文档` 区域，其中列出了所有集合。在它们下方，如图 3-1 所示，有一些附加选项。`查询` 是其中的第二个选项。\n\
  \n![](img/514303_1_En_3_Fig1_HTML.png)\nRavenDB Studio 文档页面的截图。左侧是集合列表和标有“补丁”与“查询”的选项卡，右侧列出了多个文档。\n\
  图 3-1：集合列表下方的查询选项\n\n点击此菜单选项后，你将看到一个用于在 Studio 中运行查询的面板，如图 3-2 所示。\n\n![](img/514303_1_En_3_Fig2_HTML.png)\n\
  查询页面的截图包含两个面板。上面的面板描绘了一个用于输入查询的文本框。下面的面板描绘了用于显示结果的空间。顶部面板的右侧是一个播放按钮，顶部还有另外三个按钮。\n\
  图 3-2：RavenDB Studio 中的查询面板\n\n如你所见，此面板有两个字段——上方用于编写查询，下方用于显示查询执行的结果。\n\n编写查询后，你可以通过在键盘上按下\
  \ `ctrl+enter` 或点击右侧的 `播放` 按钮来运行它。\n\n下一节将探讨使用 Raven 查询语言进行查询的基础知识。\n\n## Raven\
  \ 查询语言基础\n\nRaven 查询语言或 `RQL` 是 RavenDB 的类 SQL 查询语言。第 1 章提到关系数据库共享一种称为结构化查询语言 -\
  \ `SQL` 的标准化查询语言。这种通用的声明式语言是关系数据库管理系统（RDBMS）取得重大成功的因素之一。\n\n与此相比，NoSQL 数据库没有标准化的查询语言。考虑到\
  \ NoSQL 生态系统的动态和分散特性，任何标准出现的可能性都很低。因此，每当一个新的 NoSQL 数据库诞生时，其作者都面临为其数据库设计查询语言这一繁琐任务。而这个任务带来沉重的负担——一旦你确定并创建了语言，开发者就会开始用它来构建应用程序。从那时起，你能对查询语言所做的修改就变得有限——任何重大的设计更改都会破坏向后兼容性并惹恼你的用户。\n\
  \nRavenDB 背后的团队面临着同样的挑战。最终，决定以 `SQL` 为基础，但进行若干扩展和修改，使 `RQL` 成为一种强大的语言。这样，熟悉关系数据库和\
  \ `SQL` 的开发者会认识到类似的概念，并快速掌握 `RQL` 的基础。我们不要忘记——查询是我们应用程序中执行的主要活动，快速的查询直接有助于提升用户对你应用程序速度的感知。\n\
  \n让我们从最直接的查询开始，我在代码清单 3-1 中展示。\n\n```\nfrom Employees\n代码清单 3-1：关键词 “from”\n```\n\
  \n执行时，此查询将返回 `Employees` 集合中的所有文档，如图 3-3 所示。\n\n![](img/514303_1_En_3_Fig3_HTML.png)\n\
  查询页面的截图包含两个面板。顶部面板键入的文本是 from employees。底部的结果面板显示了标有“employees”的 9 个文档，这些文档列在 11\
  \ 个列下。\n图 3-3：从 Employees 集合中选择所有文档\n\n你可以以表格形式查看结果，但这只是一种可视化呈现。每一行显示 `Employees`\
  \ 集合中的一个 JSON 文档，其属性显示在单元格中。通过点击如图 3-4 所示的 `显示` 按钮，你可以显示或隐藏特定属性。\n\n![](img/514303_1_En_3_Fig4_HTML.png)\n\
  结果面板的截图顶部有 5 个选项，分别是：删除文档、统计信息、导出为 CSV、显示和展开结果，其中“显示”被选中。“显示”中的选定选项是：id、姓氏、名字、职位、地址和雇用时间。\n\
  图 3-4：调整员工属性的可见性\n\n可见属性的初始配置将只显示其中一部分。如果你想预览整个文档，表格的第一列中有一个 `预览` 图标。点击它，你将获得特定文档的完整\
  \ JSON 预览。\n\n### 过滤\n\n在上一节中，我们学习了 `from`，这是第一个也是基础的 `RQL` 关键词。它将是你编写的每个 `RQL`\
  \ 查询的一部分。我们看到它与集合名称一起使用，`from Employees`，以返回所有九个 `Employee` 文档。\n\n然而，这只是在示例数据上进行的一个简单演示。在实际应用中，你很少会进行这种无限制的查询。想象一家拥有\
  \ 10,000 名员工的公司——不仅获取所有员工需要很长时间，而且你只能在屏幕上显示其中的几个。我们在应用程序中通常想要做的是获取并显示集合文档的一个特定子集。再次查看\
  \ ID 为 `employees/2-A` 的 `Employee` 结构\n\n```\n{\n\"LastName\": \"Fuller\",\n\"\
  FirstName\": \"Andrew\",\n...\n}\n```\n\n我们可以看到它包含值为 `Fuller` 的 `LastName` 属性。让我们使用代码清单\
  \ 3-2 中的查询来查看所有具有该姓氏的员工列表。\n\n```\nfrom Employees where LastName = 'Fuller'\n代码清单\
  \ 3-2：关键词 “where”\n```\n\n执行此查询将显示 Andrew 是 Northwind 贸易公司中唯一具有此姓氏的员工，如图 3-5 所示。\n\
  \n![](img/514303_1_En_3_Fig5_HTML.png)\n查询页面的截图包含两个面板。顶部查询面板中的文本是：from employees\
  \ where last name equals fuller。底部的结果面板显示了一个文档，其中姓氏是 fuller。\n图 3-5：根据 LastName\
  \ 属性值过滤员工\n\n与代码清单 3-1 相比，我们在 `from Employees` 的基础上添加了 `where LastName = 'Fuller'`。关键词\
  \ `where` 用于过滤，即根据特定条件选择所有文档。在本例中，过滤条件以 `[propertyName]='[value]'` 的形式表示。遵循此模式，我们可以使用代码清单\
  \ 3-3 中的查询获取所有名字为 Andrew 的员工。\n\n```\nfrom Employees where FirstName = 'Andrew'\n\
  代码清单 3-3：过滤所有名字为 Andrew 的员工\n```\n\n执行此查询将产生相同的结果——只有一个文档——Andrew Fuller 在公司范围内拥有独特的名字和姓氏。\n\
  \n在我们的示例中，用于过滤的字符串值被撇号包围，但我们也可以使用引号：\n\n```\nfrom Employees where FirstName = \"\
  Andrew\"\n```\n\n这将产生相同的结果。\n\n\n\n## 按不存在的属性查询\n\n如果我们尝试按不存在的属性进行筛选，如代码清单 3-4 所示，会发生什么？\n\
  \n```rql\nfrom Employees where FistName = 'Andrew'\n```\n\n代码清单 3-4: 通过不存在的属性筛选所有员工\n\
  \n在代码清单 3-4 中，我们故意打错了字——`FistName`。如果您是习惯关系型数据库的开发者，执行此查询时会预期收到错误。\n\n然而，在 RavenDB\
  \ 中，尝试通过不存在的属性名称来筛选集合**不会**产生任何错误。您将得到一个空的结果集。为什么会这样？如果您还记得，RavenDB 是一个无模式数据库。在关系型数据库中，模式是每个表的一组强制性字段。RavenDB\
  \ 集合的无模式特性意味着，对属于同一集合的文档**没有**施加任何强制性结构。不存在这样一组文档必须拥有的强制性属性。因此，按您能想到的任何属性名称进行筛选都不会产生错误——它可能只会导致一个意外的空结果集。\n\
  \n## 按非字符串属性查询\n\n除了按字符串值筛选，您还可以按包含数值的属性进行筛选：\n\n```rql\nfrom Orders where Freight\
  \ = 8.53\n```\n\n或按包含布尔值的属性进行筛选：\n\n```rql\nfrom Products where Discontinued = true\n\
  ```\n\n## 按复杂属性筛选\n\n在上一节中，我们根据各种属性的值来筛选文档。所有这些属性都是简单属性，位于文档的第一层。回到员工文档，如代码清单 3-5\
  \ 所示，并查看 `Address` 属性。\n\n```json\n{\n\"LastName\": \"Fuller\",\n\"FirstName\":\
  \ \"Andrew\",\n\"Title\": \"Vice President, Sales\",\n\"Address\": {\n\"Line1\"\
  : \"908 W. Capital Way\",\n\"Line2\": null,\n\"City\": \"Tacoma\",\n\"Region\":\
  \ \"WA\",\n\"PostalCode\": \"98401\",\n\"Country\": \"USA\",\n\"Location\": {\n\"\
  Latitude\": 47.614329,\n\"Longitude\": -122.3251939\n}\n}\n}\n```\n\n代码清单 3-5: 员工\
  \ JSON 文档结构\n\n我们可以看到它很复杂，由多层的嵌套属性组成。RavenDB 也支持对此类属性进行查询，如代码清单 3-6 所示。\n\n```rql\n\
  from Employees where Address.Country = 'USA'\n```\n\n代码清单 3-6: 通过嵌套属性筛选所有员工\n\n\
  代码清单 3-6 中的查询将选择所有居住在美国的员工。请注意属性名称 `Address.Country` 的格式——查看代码清单 3-5 中的 JSON，您会观察到\
  \ `Country` 是 `Address` 属性内的一个嵌套属性。\n\n将 JSON 属性的嵌套结构转换为适合筛选查询的线性形式是直截了当的。您将父属性写在第一层（本例中为\
  \ `Address`），然后添加第二层中所需的属性（本例中为 `Country`），并用点号分隔。\n\n同样的方法也适用于更深层级的属性。因此，要按代码清单\
  \ 3-5 中可见的 `Latitude` 属性进行筛选，我们将首先说明顶层祖先 `Address`，然后通过 `Location` 下降到 `Latitude`。每当我们下降一层，就会在属性名称之间添加一个点号作为分隔符。因此，我们最终的扁平化形式是\
  \ `Address.Location.Latitude`。从左到右读取这个连接的属性时，每遇到一个点号，你就下降一层。\n\n最终，我们访问第三层属性的筛选查询如下所示：\n\
  \n```rql\nfrom Employees where Address.Location.Latitude = 47.614329\n```\n\n它将返回所有居住在指定\
  \ `纬度` 的员工。\n\n## 按 Id 筛选\n\n遵循查询属性名称的约定，我们可能认为按标识符筛选遵循相同的模式。然而，尝试执行\n\n```rql\n\
  from Employees where id = 'employees/2-A'\n```\n\n将返回一个空的结果集，尽管我们可以检查到 ID 为 `employees/2-A`\
  \ 的员工是存在的。\n\n为什么会这样？正如我们在前一章中看到的，*标识符* 是位于 `@metadata` 中的一个名为 `@id` 的唯一属性。然而，这是标识符的默认位置，它也是可配置的。因此，您需要使用函数\
  \ `id()`，它将返回保存文档标识符的属性名称。\n\n了解这一点后，我们可以将之前的查询重写为\n\n```rql\nfrom Employees where\
  \ id() = 'employees/2-A'\n```\n\n结果将显示这是我们老朋友，Andrew Fuller。\n\n## 跨集合查询\n\n在代码清单\
  \ 3-3 中，我们演示了如何按名字查询所有员工。也可以查询所有包含具有特定值的特定属性的文档。RavenDB 提供了 `@all_docs` 关键字，它表示您数据库中所有集合的所有文档。因此\n\
  \n```rql\nfrom @all_docs where FirstName = 'Andrew'\n```\n\n将找到所有集合中所有具有值为 `Andrew`\
  \ 的 `FirstName` 属性的文档。此查询结果与代码清单 3-3 相同，在那里我们指定了集合名称。原因很明显——只有员工文档具有 `FirstName`\
  \ 属性。\n\n但是，如果我们按一个存在于不同集合中的属性进行查询\n\n```rql\nfrom @all_docs where Address.Country\
  \ = 'USA'\n```\n\n我们将得到一个由来自不同集合的文档组成的结果集，如图 3-6 所示。\n\n![](img/514303_1_En_3_Fig6_HTML.png)\n\
  \n图 3-6: 跨所有集合的查询结果\n\n此查询总共返回了来自供应商、公司和员工集合的 22 个文档。所有这些文档都代表位于美国的商业实体。\n\n也可以编写一个查询，检查所有文档或特定集合中的哪些文档包含特定属性。如下查询\n\
  \n```rql\nfrom @all_docs where exists(Address.Country)\n```\n\n将总共返回 129 个在 `Address`\
  \ 属性中包含 `Country` 属性的文档。但是，请注意，这也会返回那些特定属性值为 `null` 的文档。从 RavenDB 的角度来看，`null` 没有什么不同——它是属性可以拥有的常规值。因此，`exists()`\
  \ 将检查指定属性是否存在，而忽略其内容。\n\n## 不等式查询\n\n使用不等式运算符 `!=`，我们可以表达与等于运算符 `=` 相反的筛选条件。例如，执行查询\n\
  \n```rql\nfrom Employees where FirstName != 'Andrew'\n```\n\n将选择所有名字不是 Andrew 的员工。\n\
  \n还有另一种编写此查询的方法；您可以使用 `<>` 运算符，它是 `!=` 运算符的同义词：\n\n```rql\nfrom Employees where\
  \ FirstName <> 'Andrew'\n```\n\n\n### 逻辑运算符\n\n逻辑运算符返回布尔值 `true` 和 `false`。回顾清单\
  \ 3-6 中的查询：\n\n```js\nfrom Employees where Address.Country = 'USA'\n```\n\n我们能够选择所有居住在美国的员工。但如果我们想获取所有居住在美国\
  \ **和** 英国的员工呢？为此，我们可以使用 `or` 运算符：\n\n```js\nfrom Employees where Address.Country\
  \ = 'USA'\nor Address.Country = 'UK'\n```\n\n执行此查询将产生一个联合结果——来自这两个国家的员工合并列表。然而，查看前一个查询，很明显添加更多国家将需要输入大量文本来生成一连串的条件。对于这种情况，我们可以使用\
  \ `IN` 运算符，以更短的查询实现相同的结果：\n\n```js\nfrom Employees where Address.Country IN ('USA',\
  \ 'UK')\n```\n\n`IN` 运算符接受一个值列表，如果指定的属性具有列表中的任何一个值，则将返回 `true`。\n\n与 `or` 运算符类似，`and`\
  \ 将筛选出满足所有指定条件的文档：\n\n```js\nfrom Products where PricePerUnit = 14 and UnitsInStock\
  \ = 16\n```\n\n此查询将返回两个产品，`products/34-A` 和 `products/67-A`，它们各有 16 个库存单位，单价为 14。\n\
  \n遵循 `or`/`IN` 组合背后的逻辑，很自然地会问——是否存在类似于 `IN` 但用于 `and` 运算符的东西。仔细查看适用的案例，我们会采用如下查询：\n\
  \n```js\nfrom Companies where Address.City = 'London' and Address.City = 'New York'\n\
  ```\n\n并将其缩短。然而，像这样的查询将始终返回空结果集——你无法让一个属性同时拥有两个值。确实，简单属性的单个值不能，但包含多个值的复杂属性可以。\n\n\
  图 3-7 展示了一个 `regions/1-A` 文档，它有一个 `Territories` 属性，这是一个区域的集合。\n\n![](img/514303_1_En_3_Fig7_HTML.png)\n\
  \n一张截图描绘了一个标题为“regions slash 1 A”的文档。标题下方的选项是：保存、克隆和删除。该文档包含 19 行代码。\n**图 3-7. 区域文档**\n\
  \n借助 `Territories` 属性，我们现在可以构建一个包含 `and` 条件的查询：\n\n```js\nfrom Regions where Territories[].Name\
  \ = 'Wilton' and Territories[].Name = 'Neward'.\n```\n\n此查询将返回所有在 Territories 属性中同时包含\
  \ Wilton 和 Neward 的区域。我们可以将其简写为：\n\n```js\nfrom Regions where Territories[].Name\
  \ ALL IN ('Wilton', 'Neward').\n```\n\n我们可以观察到两个有趣的特性。第一个是 `ALL IN` 运算符，它提供了一种将多个值与数组进行匹配的方法。第二个是表达式\
  \ `Territories[].Name`，它获取 `Territories` 集合的所有元素，并从每个元素中提取 `Name` 属性。\n\n`ALL IN`\
  \ 运算符的一个典型用例是选择所有被指定标签集标记的文档。\n\n### 范围查询\n\n到目前为止，我们一直使用相等和不等运算符通过精确匹配进行筛选。也可以使用其他运算符来创建范围查询。\n\
  \n以下查询：\n\n```js\nfrom Products where UnitsInStock > 26\n```\n\n将返回库存单位多于 26 的所有产品，而：\n\
  \n```js\nfrom Products where UnitsInStock >= 26\n```\n\n将列出库存单位大于或等于 26 的所有产品。我们将类似运算符\
  \ `<` 和 `<=` 的使用留作练习。\n\n我们可以组合这些运算符，因此以下查询：\n\n```js\nfrom Products where UnitsInStock\
  \ > 1 and UnitsInStock < 3\n```\n\n将返回库存单位为 2 的所有产品（因为整数条件），而：\n\n```js\nfrom Products\
  \ where UnitsInStock >= 1 and UnitsInStock <= 3\n```\n\n则列出库存单位为 1、2 或 3 的所有产品。\n\
  \n我们可以缩短最后一个查询——秉承 `IN` 和 `ALL IN` 运算符的精神，RavenDB 还提供了 `BETWEEN` 运算符，因此我们可以将之前的查询重写为：\n\
  \n```js\nfrom Products where UnitsInStock BETWEEN 1 and 3\n```\n\n请注意，`BETWEEN`\
  \ 在区间的下限和上限都是**包含**的。\n\n### 大小写\n\n重新审视清单 3-3 中我们熟悉的例子，我们可以像这样修改它：\n\n```js\nfrom\
  \ Employees where FirstName = 'ANDREW'\n```\n\n尽管你可能预期没有结果（因为我们将名字全部大写了），但此查询将返回\
  \ Andrew Fuller 作为唯一结果。为什么会这样？\n\nRavenDB 在查询中默认进行**不区分大小写**的匹配。在这种情况下，筛选条件的值与文档中的实际属性值不同，但\
  \ `Andrew` 和 `ANDREW` 匹配了，因为 RavenDB 忽略了大小写差异。这种不区分大小写的处理是一个有意识的决定，因为在大多数场景下，字符串的不区分大小写比较会按照你的期望产生结果。\n\
  \n然而，在某些特定情况下，比如匹配 BASE64 编码的字符串时，你需要精确匹配。RavenDB 通过 `exact()` 方法支持这一点，以下查询将返回空结果列表：\n\
  \n```js\nfrom Employees where exact(FirstName = 'ANDREW')\n```\n\n\n### 全文搜索\n\n\
  对数据进行全文搜索是现代应用程序的标准功能之一。随着时间的推移，您将构建的大多数应用程序中都不可避免地会存在此类搜索。幸运的是，这是 RavenDB 擅长的领域之一。我们将在后续章节提供更多信息，但目前可以这么说，RavenDB\
  \ 内部使用 Lucene.net 进行索引。Lucene 是当今可用的最佳索引引擎之一，多年来它已确立了自己作为可靠、标准解决方案的地位。作为基础设施的一部分，它已出现在多个知名品牌产品中，例如\
  \ Solr 和 Elastic Search。因此，RavenDB 可以为您提供一流的全文搜索功能，并消除对任何额外解决方案的需求。\n\n此类搜索的一个例子是按员工名字的通用前缀查询所有员工：\n\
  \n```\nfrom Employees where StartsWith(FirstName, 'an')\n```\n\n此查询使用 `StartsWith()`\
  \ 函数，该函数将每个员工的 `FirstName` 属性内容与前缀 `an` 进行匹配。执行后，您将获得结果，如图 3-8 所示。\n\n![](img/514303_1_En_3_Fig8_HTML.jpg)\n\
  \n查询窗口结果面板的截图显示，在标签“索引 自动/雇员/按名字”下有 2 份文档。这两份文档中的名字分别是 Anne 和 Andrew。\n\n**图 3-8**\n\
  \n按 `FirstName` 前缀搜索员工\n\n我们得到了两个结果，两名员工，他们的名字都以“an”开头。请注意，在这种情况下，我们的查询也是不区分大小写的。\n\
  \n除了按前缀搜索外，还可以搜索字段内任意位置的术语。例如，如果我们想搜索名称中包含单词 `stop` 的所有公司，我们会编写以下查询：\n\n```\nfrom\
  \ Companies where Search(Name, 'stop')\n```\n\n执行时，此查询将返回两家公司：“Let’s Stop N Shop”和“QUICK-Stop”，如图\
  \ 3-9 所示。\n\n![](img/514303_1_En_3_Fig9_HTML.jpg)\n\n查询窗口结果面板的截图显示，在标签“索引 自动/公司/按搜索名称”下有\
  \ 2 份文档。这两份文档中的名字分别是 let’s stop N shop 和 quick stop。\n\n**图 3-9**\n\n按名称内容搜索公司\n\
  \n这两家公司的名称中都包含单词“stop”。\n\n当我们执行相等过滤（进行精确匹配）时，情况很清楚，但在这种可以发生任意位置部分匹配的情况下，幕后发生了什么？为了提供此功能，RavenDB\
  \ 将获取公司的 `Name` 并应用*分词*：名称将被拆分为单词，每个这样的单词都将被索引。例如，公司名称“Let’s Stop N Shop”将被分成四个标记：“Let”、“Stop”、“N”、“Shop”。执行全文搜索查询后，RavenDB\
  \ 会将您的搜索术语与一组标记进行匹配并显示结果。因此，可以说全文搜索仍然是精确匹配，但不是针对完整的属性值——而是匹配组件（标记）。\n\n我们也可以按多个术语进行搜索。\
  \ following query\n\n```\nfrom Companies where Search(Name, \"monde cheese\")\n\
  ```\n\n将搜索名称中包含“monde”或“cheese”的所有公司，返回包含三家公司的结果集，如图 3-10 所示。\n\n![](img/514303_1_En_3_Fig10_HTML.png)\n\
  \n查询窗口结果面板的截图显示，在标签“索引 自动/公司/按搜索名称”下有 3 份文档。这三份文档中的名字分别是 spécialités du monde、Du\
  \ monde entire 和 the big cheese。\n\n**图 3-10**\n\n使用多个术语按名称内容搜索公司\n\n对于不是简单属性而是复杂属性的情况呢？\
  \ `Address` 是这种嵌套属性的一个常见例子。\n\n```\n\"Address\": {\n\"Line1\": \"87 Polk St. Suite\
  \ 5\",\n\"Line2\": null,\n\"City\": \"San Francisco\",\n\"Region\": \"CA\",\n\"\
  PostalCode\": \"94117\",\n\"Country\": \"USA\",\n\"Location\": {\n\"Latitude\":\
  \ 37.7774357,\n\"Longitude\": -122.4180503\n}\n}\n```\n\nRavenDB 也会对嵌套属性应用分词过程；首先，它会将复杂属性分离为一组嵌套属性。之后，每个嵌套属性将被分词——分离为简单组件——并被索引。结果，当您执行查询\n\
  \n```\nfrom Companies where Search(Address, \"London Sweden\")\n```\n\n时，您将获得位于伦敦或瑞典的公司列表。如您所见，`Address`\
  \ 的所有属性都被索引了，因此全文搜索会同时检查 `City` 和 `Country` 字段。\n\n### 排序\n\n重新审视我们第一个查询示例，来自清单\
  \ 3-1\n\n```\nfrom Employees\n```\n\n执行后，您将获得如图 3-11 所示的结果。\n\n![](img/514303_1_En_3_Fig11_HTML.png)\n\
  \n查询窗口结果面板的截图显示，在标签“employees”下有 9 份文档。文档列在列标签下：preview, I d, last name, first name,\
  \ title, address, and hired at。\n\n**图 3-11**\n\n所有员工的未排序列表\n\n如您所见，我们获得了所有员工，但他们的顺序是任意的；他们是未排序的。RavenDB\
  \ 提供 `order by` 子句对结果进行排序；因此\n\n```\nfrom Employees order by LastName asc\n```\n\
  \n将按员工姓氏的升序对员工进行排序。您也可以指定多个字段进行排序，所以\n\n```\nfrom Employees order by LastName asc,\
  \ FirstName asc\n```\n\n将在两名员工姓氏相同的情况下，应用按名字的二级排序。\n\n也可以在数字字段上进行排序：\n\n```\nfrom\
  \ Products order by PricePerUnit desc\n```\n\n执行此查询将导致产品排序，如图 3-12 所示。\n\n![](img/514303_1_En_3_Fig12_HTML.png)\n\
  \n查询窗口结果面板的截图显示了一个文档列表。文档列在列标签下：preview, I d, name, supplier, category, quantity\
  \ per unit, and price per unit。\n\n**图 3-12**\n\n所有产品的排序列表\n\n然而，仔细观察 `PricePerUnit`\
  \ 列，会发现它并非如我们所期望的那样按降序排序。为什么会发生这种情况，以及如何正确地按此列对 `Products` 进行排序？\n\n原因在于 RavenDB\
  \ 处理存储数据的方式。字段没有类型，在我们没有表达意图的情况下，RavenDB 默认采用词法顺序，即字段默认被当作字符串处理。使用降序词法顺序时，81 会排在\
  \ 9 之前，这就解释了我们得到的排序顺序。\n\n幸运的是，我们可以快速修复此问题。我们需要告诉 RavenDB 应用哪种排序顺序：\n\n```\nfrom\
  \ Products order by PricePerUnit as double desc\n```\n\n此查询将通过将字段视为 `double` 类型的值来应用排序。我们也可以应用\
  \ `as long` 来截断任何小数部分，并将这些截断后的值作为整数进行比较：\n\n```\nfrom Products order by PricePerUnit\
  \ as long desc。\n```\n\n\n### 分页\n\n分页是大多数业务应用程序中的常见功能。每次你需要展示长于屏幕尺寸的结果列表时，很可能就需要使用分页。RavenDB\
  \ 原生支持分页，其语法如下所示：\n\n```\nfrom Companies limit 10, 5\n```\n\n此查询将跳过前十个结果，并返回接下来的五个。当然，分页可以与其他功能结合使用，因此查询\n\
  \n```\nfrom Companies where Address.Country = 'USA' order by Name asc limit 5, 5\n\
  ```\n\n将筛选出来自美国的公司，按名称升序排序，跳过前五个，并获取接下来的五个。\n\n## 高级查询\n\n在上一节中，我们介绍了 RQL 以及基础的筛选、排序和分页操作。现在我们将探讨高级功能——投影、聚合和包含。\n\
  \n## 投影结果\n\n到目前为止，我们所有的查询都是返回完整的文档。例如\n\n```\nfrom Employees order by LastName\
  \ asc\n```\n\n将按姓氏对员工进行排序，并将他们作为完整文档返回。然而，在构建应用程序时，你很少会需要整个文档。你通常只会展示文档字段的一个子集。例如，我们可能只想显示每位员工的名和姓。RavenDB\
  \ 有一个专用的关键字 `select`，正是用于此目的，其工作方式与 SQL 中的类似，如清单 3-7 所示。\n\n```\nfrom Employees\
  \ order by LastName asc\nselect FirstName, LastName\n```\n\n清单 3-7\n`select` 关键字的用法\n\
  \n执行此查询将产生如图 3-13 所示的结果。\n\n![](img/514303_1_En_3_Fig13_HTML.png)\n\n查询窗口结果面板的截图，标签“index\
  \ auto slash employees slash by last name”下有 9 个文档。文档列表中的姓氏按升序排列。\n\n图 3-13\n\n\
  使用 `select` 关键字的结果\n\n如你所见，`select` 与 SQL 中的变体非常相似——它将选择并仅返回字段的一个子集。\n\n你可以通过使用\
  \ `select` 语句的别名来重命名返回的字段。因此，查询\n\n```\nfrom Employees\nselect FirstName as Name,\
  \ Address.City as City\n```\n\n将返回具有以下结构的文档列表：\n\n```\n{\n\"Name\": \"Andrew\",\n\
  \"City\": \"Tacoma\",\n}\n```\n\n投影也可以操作不简单的值。在下面的例子中，我们对对象和数组使用投影：\n\n```\nfrom\
  \ Orders\nselect ShipTo, Lines[].ProductName as Products\n```\n\n执行此查询将返回具有以下结构的文档：\n\
  \n```\n{\n\"ShipTo\": {\n\"City\": \"Reims\",\n\"Country\": \"France\",\n\"Line1\"\
  : \"59 rue de l'Abbaye\",\n\"Line2\": null,\n\"Location\": {\n\"Latitude\": 49.25595819999999,\n\
  \"Longitude\": 4.1547448\n},\n\"PostalCode\": \"51100\",\n\"Region\": null\n},\n\
  \"Products\": [\n\"Queso Cabrales\",\n\"Singaporean Hokkien Fried Mee\",\n\"Mozzarella\
  \ di Giovanni\"\n]\n}\n```\n\n`ShipTo` 对象被按原样选中，`Products` 属性包含从所有订单行中选择的产品名称组成的投影。\n\
  \n### 使用对象字面量进行投影\n\n我们目前看到的投影都是简单、扁平且线性的。它们本质上是模仿 SQL 投影，你选择要返回的属性子集作为线性值的简单集合。RQL\
  \ 可以做得更多——你可以使用 `对象字面量` 语法投影出复杂的结果，如清单 3-8 所示。\n\n```\nfrom Orders as o\nselect\
  \ {\nCountry: o.ShipTo.Country,\nFirstProduct: o.Lines[0].ProductName,\nLastProduct:\
  \  o.Lines[o.Lines.length - 1].ProductName\n}\n```\n\n清单 3-8\n使用对象字面量进行投影\n\n执行时，此查询会返回一组投影。对于文档\
  \ `orders/1-A`，它看起来像这样：\n\n```\n{\n\"Country\": \"France\",\n\"FirstProduct\": \"\
  Queso Cabrales\",\n\"LastProduct\": \"Mozzarella di Giovanni\",\n\"@metadata\":\
  \ {\n\"@id\": \"orders/1-A\"\n}\n}\n```\n\n如你所见，我们使用了简单的路径来选择收货国家，并使用复杂的表达式来深入选择订单行集合中的第一个和最后一个产品。请注意，在清单\
  \ 3-8 中，我们必须使用别名 `as o`，以便能够在复杂的投影表达式中引用 `o`。\n\n清单 3-8 的另一个要点是，`对象字面量` 不是 JSON\
  \ 表达式——它是 JavaScript 字面量，任何有效的 JavaScript 表达式都会被执行。作为一个例子，我们可以查看员工文档的 `HiredAt`\
  \ 属性：\n\n```\n\"HiredAt\": \"1994-03-05T00:00:00.0000000\"\n```\n\n此字符串表示 ISO 8601\
  \ 格式的日期，使用对象字面量，可以编写如清单 3-9 所示的 JavaScript 来处理此日期并提取年份。\n\n```\nfrom Employees as\
  \ e\nselect {\nId: id(e),\nYear: new Date(e.HiredAt).getFullYear(),\nFullname: e.FirstName\
  \ + \" \" + e.LastName\n}\n```\n\n清单 3-9\n在对象字面量中使用 JavaScript 进行投影\n\n将返回具有以下结构的文档集合：\n\
  \n```\n{\n\"Id\": \"employees/9-A\",\n\"Year\": 1994,\n\"Fullname\": \"Anne Dodsworth\"\
  \n}\n```\n\n清单 3-9 中的查询使用 JavaScript 来填充所有三个字段：\n\n*   `Id` —— 调用函数 `id()`，该函数以文档作为参数并确定其标识符。\n\
  *   `Year` —— 调用 `Date` 对象的 JS 构造函数，参数为 ISO 8601 字符串。之后，`Date.getFullYear()` 方法返回年份。\n\
  *   `Fullname` —— 用分隔符连接文档的两个属性。\n\n### 在查询中声明函数\n\n使用 RQL，你可以将 JavaScript 代码提取为函数，然后从对象字面量中调用，如我们在清单\
  \ 3-10 中所做的那样。\n\n```\ndeclare function getFullName(e)\n{\nreturn e.FirstName +\
  \ \" \" + e.LastName;\n}\nfrom Employees as e\nselect {\nId: id(e),\nYear: new Date(e.HiredAt).getFullYear(),\n\
  Fullname: getFullName(e)\n}\n```\n\n清单 3-10\n从对象字面量调用 JavaScript 函数\n\n在此示例中，我们将连接名和姓的代码提取到函数\
  \ `getFullName()` 中，然后从对象字面量中调用它。\n\n你可以拥有多个这样的函数。它们的限制是 JavaScript 的标准限制，外加其使用性质带来的额外约束。如果\
  \ JavaScript 代码需要 5 秒执行，你的查询就会额外增加 5 秒。考虑到所有这些，你可以生成任意复杂的功能，如清单 3-11 中的示例所示。\n\n\
  ```\ndeclare function lineItemPrice(l) {\nreturn l.PricePerUnit * l.Quantity * (1\
  \ - l.Discount);\n}\nfrom Orders as o\nselect {\nTopProducts: o.Lines\n.sort((a,\
  \ b) => lineItemPrice(b) - lineItemPrice(a) )\n.map(x => x.ProductName)\n.slice(0,2),\n\
  Total: o.Lines.reduce((acc, l) => acc + lineItemPrice(l), 0)\n}\n```\n\n清单 3-11\n\
  对象字面量中复杂 JavaScript 代码的示例\n\n执行时，清单 3-11 中的代码将生成一个文档列表，其中包含订单的总价值和每个订单中最贵的两个产品，例如：\n\
  \n```\n{\n\"TopProducts\": [\n\"Mozzarella di Giovanni\",\n\"Queso Cabrales\"\n\
  ],\n\"Total\": 440\n}\n```\n\n\n\n## 聚合\n\n聚合是数据分组的过程。本节我们将探讨 RQL 如何提供数据聚合功能，使你能够以多种方式汇总文档数据。\n\
  \n回想一下，每个订单都有一个包含公司标识符的 `Company` 属性，如图 3-14 所示。\n\n![](img/514303_1_En_3_Fig14_HTML.png)\n\
  \n一张包含 5 列 10 行的表格截图。列标签为 Id、company、employee、freight 和 ordered at。\n\n**图 3-14**\n\
  订单包含带有公司标识符的 Company 属性\n\n让我们查找数据库中每个公司拥有的订单数量，如代码清单 3-12 所示。\n\n```\nfrom Orders\n\
  group by Company\nselect Company, count()\n```\n\n**代码清单 3-12**\n按公司对订单进行分组\n\n\
  正如你可能预期的那样，用于此操作的合适关键字确实是 `group by`。执行此查询后，我们将得到如图 3-15 所示的结果。\n\n![](img/514303_1_En_3_Fig15_HTML.jpg)\n\
  \n查询窗口结果面板的截图，在标签“index auto slash orders slash by count reduced by company”下有 7\
  \ 个文档。文档列在列标签 preview、company 和 count 下。\n\n**图 3-15**\n按公司分组的订单\n\n我们分析的下一步将是对此列表进行降序排序：\n\
  \n```\nfrom Orders\ngroup by Company\norder by count() as long desc\nselect Company,\
  \ count()\n```\n\n然后，仅筛选出订单数超过 20 个的公司：\n\n```\nfrom Orders\ngroup by Company\n\
  where count() > 20\norder by count() as long desc\nselect Company, count()\n```\n\
  \n我们应始终将查询视为为在应用程序屏幕上显示而提取数据的一种方式。从这个角度来看，很容易看出向用户显示诸如 \"companies/71-A\"、\"companies/20-A\"\
  \ 和 \"companies/63-A\" 这样的公司标识符并不太友好。因此，在这个简要分析的最后一步，我们将用实际的公司名称替换公司标识符：\n\n```\n\
  from Orders\ngroup by Company\nwhere count() > 20\norder by count() as long desc\n\
  load Company as c\nselect c.Name, count()\n```\n\n与之前的查询相比，你会注意到新增了一行 `load Company\
  \ as c`。`load` 命令将指示 RQL 加载 `Company` 属性中包含的 id 所对应的文档，并为其分配别名 `c`。完成此操作后，我们可以在最后一行通过引用\
  \ `c.Name` 来访问公司名称。最后，我们可以向用户显示“Save-a-lot Markets”、“Ernst Handel”和“QUICK-Stop”是订单数超过\
  \ 20 的 3 家公司。\n\n在大多数应用程序中，聚合查询是从数据库中获取有用信息的主要工具。我们刚刚演示的 RQL 聚合基础是汇总数据的一种方式。RavenDB\
  \ 还有另一种更强大的机制，将在后续章节中介绍。\n\n### 处理关系\n\n在上一章关于建模的内容中，我们学习了能生成具有平衡的独立性、隔离性和一致性级别的文档的合适建模原则。然而，即使是这样的文档，你仍然需要将它们组合成视图模型，这些模型将来自两个或多个文档的属性组合成适合可视化表示的形式。让我们看看\
  \ RavenDB 如何在此类场景中为你提供支持。\n\n#### 访问相关文档\n\n在上一节的最后，我们使用了 `load()` 来访问相关文档。在一个不简单的应用程序中，你的模型将由引用其他文档的聚合组成。让我们看一个这样的文档，id\
  \ 为 `orders/830-A` 的订单：\n\n```\n{\n  \"Company\": \"companies/65-A\",\n  \"Employee\"\
  : \"employees/1-A\",\n  \"Freight\": 8.53,\n  \"Lines\": \n    ...\n```\n\n以这种形式向用户展示订单并无太大价值——用户必须手动检查\
  \ id `companies/65-A` 背后是哪家公司。\n\n为了在屏幕上显示包含完整信息的订单，我们需要再对数据库进行两次调用以加载引用的公司和员工。为了优化这一点，RQL\
  \ 为你提供了 `load()` 函数，该函数接受文档引用并返回引用的文档。这样，我们可以仅进行一次数据库调用，而不是三次，来获取此订单的完整信息，如代码清单\
  \ [3-13 所示。\n\n```\nfrom Orders as o\nwhere id() = 'orders/830-A'\nload o.Company\
  \ as c, o.Employee as e\nselect {\n  CompanyName: c.Name,\n  EmployeeName: e.FirstName\
  \ + \" \" + e.LastName\n}\n```\n\n**代码清单 3-13**\n加载引用的 Company 和 Employee\n\n执行时，此查询将返回以下投影结果：\n\
  \n```\n{\n  \"CompanyName\": \"Rattlesnake Canyon Grocery\",\n  \"EmployeeName\"\
  : \"Nancy Davolio\"\n}\n```\n\n如代码清单 3-13 所示，我们为 `load` 提供了引用列表以及用于解引用文档的别名。之后，在\
  \ `select` 投影中，我们可以使用文档 `c` 和 `e`。\n\n这里需要注意的一个重要事项是执行顺序。回顾代码清单 3-13 中的关键字，顺序如下：\n\
  \n*   From\n*   Where\n*   Load\n*   Select\n\nRavenDB 将获取查询的 `from`-`where` 部分并运行它，产生中间结果。之后，RavenDB\
  \ 将执行 `load()` 以从中间结果获取引用的文档。最后，`select` 将创建投影，作为此查询的最终结果集。注意这里的顺序至关重要——`load` 是在最后应用的，在结果被过滤、获取以及基本查询执行完成之后。因此，`load()`\
  \ 不影响查询的代价。\n\n如果你将此与关系型数据库进行比较，你会发现执行顺序有很大不同。你会编写一个首先执行 *连接* 的查询，该连接提供对引用行的访问，然后对连接后的表应用过滤。然而，请注意，我们会连接这些表中的所有行，然后才执行过滤。换句话说，RDBMS\
  \ 引擎会花费资源连接行，然后只在应用过滤后丢弃它们。RavenDB 不仅在此方面，而且在许多其他方面都进行了优化。因此，你的应用程序将更快，并且相同查询所需的工作量将更低。\n\
  \n你也可以直接在投影或 JavaScript 函数中使用 `load()`，如下例所示：\n\n```\ndeclare function getFullName(empId)\n\
  {\n  var e = load(empId);\n  return e.FirstName + \" \" + e.LastName;\n}\nfrom Orders\
  \ as o\nwhere id() = 'orders/830-A'\nselect {\n  CompanyName: load(o.Company).Name,\n\
  \  EmployeeName: getFullName(o.Employee)\n}\n```\n\n\n\n## Include（包含）\n\n除了使用投影（projections），还有另一种方法可以访问相关文档。RQL\
  \ 提供了 `include` 子句，这是减少获取完整信息所需往返次数的另一种方式：\n\n```\nfrom Orders\nwhere id() = 'orders/830-A'\n\
  include Company, Employee\n```\n\n此查询将返回一个完整的订单文档，但同样在单次往返数据库的过程中，它还会生成两个额外的集合，如图\
  \ 3-16 所示。\n\n![](img/514303_1_En_3_Fig16_HTML.png)\n\n查询窗口结果面板的截图显示，在\"orders\"\
  标签下有一个文档。该文档按以下列标签列出：preview、I d、company、employee、freight 和 lines。\n\n图 3-16\n\n\
  包含关联公司和员工的订单\n\n在图 3-16 的底部，你可以看到另外两个结果集。由于我们只返回了一个订单，这两个集合各自只包含一个公司和一个员工。\n\nInclude\
  \ 语法旨在用于当你想从数据库获取完整文档，并在同一次数据库往返中一并拉取所有相关文档的场景。然后，你可以在这些文档上执行一些额外的操作，而无需被迫向数据库发出更多请求。\n\
  \n## Summary（总结）\n\n在本章中，我们介绍了如何在 RavenDB 中编写查询。除了过滤、查询和分页，我们还涵盖了高级主题——投影、聚合和解引用关系。\n\
  \n在下一章中，我们将介绍索引（indexes），这是所有数据库用来优化和加速查询的关键数据结构。\n\n"
- '# 4. Indexes（索引）


  在上一章中，我们了解了如何运行查询以返回所需的数据。本章将介绍当你运行此类查询时背后发生了什么，以及数据库如何执行它们。我们还将展示数据库需要解决的一些挑战，以及数据库如何应对不断增长的数据。本章将提出一些可能的优化解决方案。最后，我们将展示
  RavenDB 如何防止查询中的常见问题。


  ## Queries from the Perspective of a Database（从数据库角度看查询）


  作为用户和开发人员，我们针对数据库执行查询以获取结果。这个操作如此标准，以至于我们很少去思考提供结果的底层机制和工具。此外，在使用关系型数据库时，你很可能使用对象关系映射器（Object-Relational
  Mapper），这代表了你的代码和数据库之间的一个额外的抽象层。随着时间的推移，在我们与数据库打交道的过程中，我们往往会忘记背后发生的事情。


  ### Unbounded Queries（无界查询）


  第一个重要的概念是无界查询的概念。此类查询将返回整个集合，没有任何限制。执行时，它们将返回集合中的所有文档，无论你拥有多少。即使你有一百万名员工，你也会全部获取回来。清单
  4-1 展示了一个简单的无界查询。


  ```

  from Employees

  Listing 4-1

  对 Employees 集合的无界查询

  ```


  数据库引擎将从磁盘获取所有员工并返回。无界查询可能是危险的，因为情况不在你的控制之下。执行结果是非确定性的，它取决于文档的数量。如果我们正在处理员工，我们不知道我们会迭代
  10 个还是 10,000 个员工。此外，对于公司员工的所有可视化展示，我们很少需要全部数据。


  ### Paging（分页）


  通常，我们希望呈现分页列表或某种分页的变体（例如，当用户向下滚动列表时获取批次数据）。如前一章所示，RavenDB 内置了对分页的支持，形式如下：


  ```

  from [Collection] limit [skip], [take]

  ```


  因此，查询 `from Employees limit 0, 2` 将返回前两名员工。


  然而，除了分页结果集，还可以在同一次数据库往返中获取集合中的文档总数。如图 4-1 所示，在"Results"标题旁边有一个链接图标。


  ![](img/514303_1_En_4_Fig1_HTML.jpg)


  结果面板的截图，显示了一个链接图标及其旁边的文本框，文本框显示"show raw output"。在索引"employees"下，列出了一个包含三列的表格：preview、I
  d 和 lastname。


  图 4-1


  "显示原始输出"图标


  点击此图标将显示 RavenDB 服务器返回的原始 JSON：


  ```

  {

  TotalResults: 9,

  LongTotalResults: 9,

  CappedMaxResults: 2,

  ...

  ```


  客户端（在本例中是 RavenDB Studio）会解析此响应以向你展示查询结果。并非所有返回 JSON 的属性都会在 Studio 中渲染——如你所见，第一个属性包含了结果总数。因此，只需一次服务器请求，你就可以在分页查询中显示结果总数。


  ### Filtering（过滤）


  然而，这个简单的请求很少是我们真正需要的——我们通常希望根据特定字段过滤员工。那么，让我们看看我们数据库中的这九名员工，哪些人居住和工作在伦敦，如清单 4-2
  中的查询所定义。


  ```

  from Employees

  where Address.City = ''London''

  Listing 4-2

  查询居住在伦敦的员工

  ```


  图 4-2 显示了执行此查询的结果。


  ![](img/514303_1_En_4_Fig2_HTML.jpg)


  查询窗口结果面板的截图，索引为"auto/employees/by-address.city"。列出了一个表格，包含以下列：preview、I d、last name
  和 first name。


  图 4-2


  居住在伦敦的员工


  如你所见，引擎成功找到了那些居住在伦敦的员工。那么，如果你必须执行相同的任务，你会怎么做？


  想象一下，你有九份文件，分别代表每位员工。你逐一查看，检查地址（Address），确认城市（City）是否是伦敦。如果是，你就把文件放到右边的一叠。否则，你就把它放到左边。处理完所有文件后，右边的那叠文件将包含所有四名居住在伦敦的员工。


  你刚刚所做的非常类似于数据库引擎在某些情况下可能做的事情，这被称为顺序扫描（sequential scan）或全表扫描（full table scan）。乍一看，这似乎是一个合乎逻辑的做法。然而，随着数据库中员工数量的增长，会发生什么？或者，如果你在零售业务中过滤订单，几年后你会有成千上万的订单。根据某些属性过滤订单需要多长时间？无论磁盘或
  CPU 多快，你的应用程序迟早会因全表扫描而开始受影响。


  用算法复杂度的术语来说，此操作具有 O(n) 复杂度——如果你将数据量增加十倍，过滤将花费十倍的时间。显然，这种方法不是可持续的，我们需要不同的方法。然而，无论我们使用什么方法，数据库引擎仍然需要访问每位员工以检查居住城市。



  ## 索引


  因此，如果我们无法消除这种顺序扫描，一个概念性的解决方案是只执行一次，并将结果保存起来供后续查询使用。所有现代数据库解决这一挑战的方式正是如此。你可以指定一个字段，然后引擎会遍历所有文档，检查该字段的内容。发现的值将被存储在一个称为
  `索引` 的特定数据结构中。索引是随文档一起存储的一个附加数据结构（`元数据`，即“关于你的数据的数据”）。数据库会从你的内容中派生出索引的内容，并且它永远不会改变你的原始内容。


  在我们的例子中，我们会在 `Employee` 文档的 `Address.City` 字段上定义一个索引，并称这个字段是 *已索引的*。在计算此索引的内容时，数据库会提取所有不同的值（所有城市），并将它们存储在一个专门的数据结构中。多年来已经开发了各种索引结构，但它们都有一个明确的目的——提供一种基于某些条件快速获取文档的方式。


  在形成 `Employee.Address.City` 索引并用员工居住的所有城市填充它之后，无论查询什么值，数据库引擎都能快速回答我们的问题。当我们执行查询所有伦敦员工的请求时，引擎将不再遍历文档。相反，它会查阅索引。在那里，它将找到表
  4-1 所示的条目。


  **表 4-1**


  `Employee.Address.City` 索引的内容


  | Address.City | ID |

  | --- | --- |

  | Kirkland | employees/3-A |

  | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A |

  | Redmond | employees/4-A |

  | Seattle | employees/1-Aemployees/8-A |

  | Tacoma | employees/2-A |


  现在获取所有来自伦敦的员工列表变得轻而易举。他们的标识符将被收集起来，然后从磁盘获取并返回这些文档。可以说，我们已经为所有可能的 `Address.City`
  查询提前做好了准备。我们预计算了结果，并将它们与文档一起存储。因此，我们的查询会很快。不再需要表扫描：不再需要遍历文档并加载它们来检查是否应该包含在结果集中。我们有了一个可以直接从磁盘读取的
  ID 列表，并且可以确信这是一个完整的结果集。


  ### 索引类型


  如果某种计算是不可避免的，那么就没有办法避免执行它。但是，你可以只执行一次，并在查询执行前将结果保存到磁盘。索引就是以专门数据结构存储的预计算结果，它提供了一种快速获取结果的方式。


  在表 4-1 中，我们展示了一个包含文档 ID 的索引。这样的索引被称为 `二级索引`。


  当使用 `二级索引` 来服务查询时，在将员工列表返回给你之前还需要一个额外的步骤。数据库需要使用从 `二级索引` 获取的 ID 来获取完整的员工文档。这个操作需要是高效的，因此数据库会维护另一个索引，该索引根据标识符跟踪每个文档的确切存储位置。这个索引被称为
  `键值索引`，如果你曾使用过关系型数据库，你会认出类似的内部数据结构——`主索引`。


  总的来说，像下面这样的查询将要求数据库执行两个操作。首先，获取已索引属性的值，然后查阅 `二级索引` 以获取标识符列表。其次，使用 `主索引` 从数据库存储中高效地获取员工文档。


  ```

  from Employees

  where Address.City = ''London''

  select FirstName

  ```


  然而，在某些情况下，这可以减少到仅一次操作。即，你可以扩展索引以包含整个文档，而不仅仅是一个标识符。这样的索引称为 `聚簇索引`，你可以在表 4-2 中看到其结构。


  **表 4-2**


  聚簇索引的内容


  | City | ID | Document |

  | --- | --- | --- |

  | Kirkland | employees/3-A | {id: "employees/3-A", "FirstName": "Janet"..} |

  | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | {id: "employees/9-A",
  "FirstName": "Anne"..}{id: "employees/5-A", "FirstName": "Steven"..}{id: "employees/6-A",
  "FirstName": "Michael"..}{id: "employees/7-A", "FirstName": "Robert"..} |

  | Redmond | employees/4-A | {id: "employees/4-A", "FirstName": "Margaret"..} |

  | Seattle | employees/1-Aemployees/8-A | {id: "employees/1-A", "FirstName": "Nancy"..}{id:
  "employees/8-A", "FirstName": "Laura"..} |

  | Tacoma | employees/2-A | {id: "employees/2-A", "FirstName": "Andrew"..} |


  有了 `聚簇索引`，数据库引擎只需一次存储访问就能获取员工文档列表。不幸的是，这种索引在存储方面开销很大，因为它本质上会将主数据存储中的所有记录复制到元数据结构中。各种关系型数据库使用不同的方法来克服这一挑战。SQL
  Server 每个表只允许一个 `聚簇索引`；MySQL 将 `主索引` 实现为聚簇索引，而 `二级索引` 条目则指向主键。


  介于非聚簇索引（仅存储引用）和聚簇索引（存储完整数据）之间的是 `覆盖索引`，也称为 *包含列的索引*。让我们观察以下查询：


  ```

  from Employees

  where Address.City = ''London''

  select FirstName

  ```


  在这种情况下，我们并非要求获取完整的员工文档。我们感兴趣的是伦敦员工的名字。名字通常是数据的小片段，我们可以将表 4-1 中的非聚簇 `二级索引` 扩展为表 4-3
  所示的形式。


  **表 4-3**


  覆盖索引的内容


  | Address.City | ID | FirstName |

  | --- | --- | --- |

  | Kirkland | employees/3-A | Janet |

  | London | employees/9-Aemployees/5-Aemployees/6-Aemployees/7-A | AnneStevenMichaelRobert
  |

  | Redmond | employees/4-A | Margaret |

  | Seattle | employees/1-Aemployees/8-A | NancyLaura |

  | Tacoma | employees/2-A | Andrew |


  `覆盖索引` 是一种折中方案，它使得数据库能够仅使用索引本身来回答某些查询（因此术语 *覆盖*，因为此类索引覆盖了一些查询），而无需分配过多的空间。



  ## 索引的缺点


  索引听起来是个好主意，但也有其缺点。在磁盘上存储额外的数据结构必然会占用额外空间。在我们的示例中，我们只为 `Employee` 文档的一个字段定义了索引。如果我们想为用户在其他字段（如
  `FirstName` 或 `LastName`）上提供高效过滤，就必须用这两个字段的条目来扩展 `EmployeeIndex`。随着时间的推移，当你定义新索引、用额外字段扩展现有索引，并且数据库中的文档数量增加时，索引的总大小将不可避免地增长，为这些元数据分配越来越多的空间。


  然而，还有另一个更具挑战性的任务——索引维护。每当我们更新员工的居住城市或任何其他被索引的字段时，我们都需要更新索引。每当我们数据库中创建一个新员工时，索引也需要更新。结果就是，每次数据库写入都会伴随一次或多次额外的索引更新操作。写入数据和索引更新这两者将一起执行，从而使你的写入操作变慢。


  这导致了一个有趣的权衡：我们引入索引来加速查询，但这会拖慢写入速度。我们想要快速的查询，但同时又不想减慢写入速度。因此，我们应该根据应用程序的使用模式，仔细选择应该对哪些字段建立索引。这种权衡解释了为什么数据库默认不会索引所有内容——这种方法会引入不必要的开销。


  尽管通过索引查询（相对于查询原始数据）是每个开发者都应该做的事情，但缺少索引可能是程序员中最常见的反模式。导致这一可悲事实的因素有很多，但需要手动创建索引是最主要的一个。即使你知情并意识到这一点，也很容易忘记或遗漏。此外，这个错误通常在少量数据的情况下隐藏得很好。开发者在小数据集上测试应用程序时，不会体验到全表扫描的可怕后果。如果没有进行负载测试，开发者就会将没有索引的数据库部署到生产环境中。


  最终，缺少索引将导致应用程序显著且令人恼火地变慢。当数据库中的数据量较小时，应用程序速度会很快，但随着时间的推移，随着数据量的增长，性能将开始线性下降。这种逐渐的性能下降是应用程序扩展的严重障碍，并将迫使你回头修复性能问题，这会消耗你的时间和金钱。


  ## RavenDB 的索引哲学


  RavenDB 作为数据库的设计哲学，其核心不是帮助你解决问题和挑战，而是预防它们。这种方法具有独特的后果——你的数据库会使坏事无法发生，或者当你有所疏漏时，RavenDB
  会做出反应并纠正你的操作。


  作为这种预防哲学的一部分，在 RavenDB 中，所有查询总是通过索引执行。从技术上讲，查询不可能绕过索引执行。这样，手动的遗漏就不可能发生，所有的过滤查询都会是高效的。


  那么，当我们尝试运行清单 4-2 中的查询而没有预先定义索引时，会发生什么？我们会得到错误还是警告？图 4-3 显示了查询执行的结果。


