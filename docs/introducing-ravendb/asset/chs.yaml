  集合是 RavenDB 中的基本概念之一。它们包含文档，与关系数据库中的表非常相似。但是，一个集合中的文档不要求结构相同或遵循任何模式。每个文档只属于一个集合，你通常会将类似的文档分组到一个集合中。


  你面前的数据库是 `Northwind`。这是 Microsoft 随 Access 和 SQL Server 应用程序一起发布的示例数据库之一。自 1994
  年以来，它一直被用作各种数据库产品中各种功能的教程和演示基础。更广泛的社区接受它作为小型企业 ERP 的优秀教程模式，并且它已被移植到多种非 Microsoft
  数据库，包括 PostgreSQL。因此，在 RavenDB 中选择此数据作为示例是合乎逻辑的。普通用户很有可能已经熟悉其关系版本。


  Northwind 数据库包含一个名为“Northwind Traders”的虚构公司的销售数据，该公司在全球范围内进口和出口特色食品。


  该数据集包含以下示例数据：

  *   `Categories`（8 个文档）：产品类别

  *   `Companies`（91 个）：从 Northwind 购买产品的客户

  *   `Employees`（9 个）：Northwind Traders 的员工详细信息

  *   `Orders`（830 个）：客户与 Northwind Traders 公司之间发生的销售订单交易

  *   `Products`（77 个）：产品信息

  *   `Regions`（4 个）：划分为四个区域的城市列表

  *   `Shippers`（3 个）：将货物从贸易商运送给最终客户公司的承运商详细信息

  *   `Suppliers`（29 个）：Northwind Traders 的供应商和卖主


  将此列表与 RavenDB Studio 中的集合进行比较，你会注意到其中一个集合不在此列表中：`@hilo`。这个集合是一个系统集合，由数据库创建和维护。尽管它是公开可见的，但你很少会去检查其内容。你在其中看到的文档用于为你的集合中的文档创建唯一标识符。此外，请注意这个集合名称的特定前缀；它的名称以“at”符号开头。这个前缀是
  RavenDB 内部使用的所有属性和名称的标准约定。尽管没有什么能阻止你使用相同的前缀来命名你的属性，但我们建议你避免这样做，以防止与系统名称发生任何冲突。




