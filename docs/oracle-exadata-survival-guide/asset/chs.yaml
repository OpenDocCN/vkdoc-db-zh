  既然你知道在哪里可以找到有用的性能指标和等待统计信息，下一步就是知道如何以及何时使用它们来诊断性能问题。尽管有大量可用的统计信息和指标可用于深入挖掘性能问题，但性能评估和调优的主要关注点和驱动力仍然是时间。用户通过任务从开始到完成所需的时间来衡量性能，世界上所有的\
  \ I/O 统计信息对大多数用户来说意义不大。性能之旅的第一站是查看相关时间段的 AWR 报告。AWR 提供了查找问题和开始诊断过程所需的信息。\n\n## AWR\
  \ 报告分析与性能调优\n\nAWR 报告基于对性能指标和等待事件计时的定期快照生成。这种方式能够基于快照之间记录的变化来生成报告。利用 AWR 报告提供的信息，可以找出运行时间长的\
  \ SQL 语句及其关联的 `SQL_id`，从而生成并分析执行计划。此外，可以使用 `V$SESSTAT`、`V$SYSTEM_EVENT` 和 `V$SYSTAT`\
  \ 视图深入分析等待事件和指标，以期发现性能下降的根本原因。查看“`SQL Ordered by Elapsed Time`”报告有助于发现问题语句和查询。这不仅仅是耗时的问题，还涉及到耗时和执行次数的关系，因为较长的总耗时如果伴随着高执行次数，会导致每次执行的平均时间很短。例如，如果总耗时为\
  \ 7734.27 秒，执行次数为 1281，那么每次执行的平均耗时约为 6 秒，这在大多数标准下是合理的。另一方面，如果总耗时为 3329.17 秒，执行次数仅为\
  \ 3，那么每次执行的平均耗时约为 1110 秒。如此量级的单次执行耗时值得更仔细的检查。这正是 `V$SESSTAT`、`V$SYSTEM_EVENT` 和\
  \ `V$SYSTAT` 视图能够提供更详细信息的地方。\n\n另一个很好的性能信息来源是 10046 跟踪；可以是其原始形式，也可以是由 `tkprof` 工具格式化的报告。我们通常更喜欢\
  \ `tkprof` 格式的输出，因为它提供了执行计划以及相关的等待事件和时间。\n\n![image](img/sq.jpg) **注意** 仅当 10046\
  \ 跟踪事件设置在级别 8 或更高时，`tkprof` 报告中才会提供等待信息。较低的级别不会捕获等待统计信息。\n\n查看提供了等待信息的 `tkprof`\
  \ 格式化跟踪文件的一部分，可以获得以下数据：\n\n```\n********************************************************************************\n\
  \nSQL ID: 23bfbq45y94fk Plan Hash: 2983102491\n\nDELETE FROM APP_RULE_TMP_STAGE\n\
  WHERE\n TMP_RULE_NAME = :B1\n\ncall     count       cpu    elapsed       disk  \
  \    query    current        rows\n------- ------  -------- ---------- ----------\
