  \    2138112         176     104\n         DBM     4294967294      0       376832\
  \          25674712        181405\nCellCLI>\n\n默认情况下，`LIST FLASHCACHECONTENT` 命令会报告\
  \ `dbID`、`tableSpaceNumber` 和 `objectNumber`。若要返回其他属性，需要使用 `attributes` 子句在命令中列出它们，如本例所示。\n\
  \n请注意，在存储单元级可用的所有属性中，对象名称并不在其中。这可以通过在数据库服务器上查询 `DBA_OBJECTS` 来轻松报告，使用 `CellCLI`\
  \ 报告的 `objectNumber`，该编号映射到 `DATA_OBJECT_ID` 列：\n\nSQL> select owner,  object_type,\
  \ object_name\n  2  from dba_objects\n  3  where data_object_id = 5888;\n\nOWNER\
  \                OBJECT_TYPE         OBJECT_NAME\n-------------------- -------------------\
  \ --------------------------------\nSYS                  INDEX               WRI$_ADV_MSG_GRPS_IDX_01\n\
  SQL>\n\n可以编写一个脚本来生成 `LIST FLASHCACHECONTENT` 命令的输出，并将其放入数据库服务器上的文本文件中，例如：\n\n```\n\
  /usr/bin/ssh celladmin@myexa1cel01-priv.7-11.com  \"cellcli -e list flashcachecontent\
  \ where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
  \n/usr/bin/ssh celladmin@myexa1cel02-priv.7-11.com  \"cellcli -e list flashcachecontent\
  \ where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
  \n/usr/bin/ssh celladmin@myexa1cel03-priv.7-11.com  \"cellcli -e list flashcachecontent\
  \ where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
  \n```\n\n可以使用第二个脚本来执行第一个脚本并将输出发送到文件：\n\n```\n/home/oracle/bin/cellcli_flashcache_mon_nohdrs.sh\
  \ $1 > /home/oracle/ext_tbls/flash_mon.txt\n```\n\n感兴趣的数据库名称通过命令行传递给第二个脚本。生成的文件随后可用于创建外部表，该表可与\
  \ `DBA_OBJECTS` 视图关联，以按对象名称报告智能闪存缓存活动。例如：\n\nSQL> create or replace directory admin_dat_dir\
  \ as '/home/oracle/ext_tbls';\n\n目录已创建。\n\nSQL> create or replace directory admin_log_dir\
  \ as '/home/oracle/logs';\n\n目录已创建。\n\nSQL> create or replace directory admin_bad_dir\
  \ as '/home/oracle/bad';\n\n目录已创建。\n\nSQL>\nSQL> CREATE TABLE flashmon_ext\n  2\
  \                      (db_name     varchar2(12),\n  3                       object_id\
  \   number,\n  4                       hitct       number,\n  5                \
  \       missct      number,\n  6                       cachesz     number\n  7 \
  \                     )\n        ORGANIZATION EXTERNAL\n        (\n          TYPE\
  \ ORACLE_LOADER\n          DEFAULT DIRECTORY admin_dat_dir\n          ACCESS PARAMETERS\n\
  \          (\n            records delimited by newline\n            badfile admin_bad_dir:'flashmon_ext%a_%p.bad'\n\
  \            logfile admin_log_dir:'flashmon_ext%a_%p.log'\n            fields terminated\
  \ by whitespace\n            missing field values are null\n            ( db_name,\
  \ object_id, hitct, missct, cachesz\n            )\n          )\n          LOCATION\
  \ ('flash_mon.txt')\n        )\n        PARALLEL\n        REJECT LIMIT UNLIMITED;\n\
  \n表已创建。\n\nSQL>\n\n第一个目录包含从 `CellCLI` 和 `LIST FLASHCACHECONTENT` 命令生成的文本文件。接下来的两个目录用于日志文件和坏文件，这些文件可能由\
  \ `SQL*Loader` 生成。最后，我们创建外部表。由于文本文件不应更改名称或位置，生成新文件不会导致外部表失效。因此，数据可以随时刷新，而外部表仍然可用。\n\
  \n创建外部表后，编写查询以将 `object_name` 映射到 `object_id` 是一项简单的任务：\n\nSQL> select f.db_name,\
  \ o.object_name, f.hitct, f.missct, f.cachesz\n  2  from flashmon_ext f left outer\
  \ join dba_objects o on (o.data_object_id = f.object_id);\n\n\n\n### 示例输出\n\n```\n\
  DB_NAME      OBJECT_NAME                              HITCT     MISSCT    CACHESZ\n\
  ------------ ----------------------------------- ---------- ---------- ----------\n\
  DBM          ICOL$                                    407479       9163   40828928\n\
  DBM          ICOL$                                    425912      11731   59179008\n\
