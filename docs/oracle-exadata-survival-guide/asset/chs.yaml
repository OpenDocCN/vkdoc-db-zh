  \n\n\n## Exadata 智能扫描监控与故障处理\n\n### 监控指标\n\n当监控到增量中的多个 0 值时，应检查查询是否符合 **智能扫描** 条件，并检查存储单元是否存在可能影响\
  \ **智能扫描** 性能的告警。我们遇到过因固件版本不匹配导致访问受影响磁盘时出现 **智能扫描** 问题的情况，升级固件解决了这些 **智能扫描** 问题。\n\
  \n在存储单元级别监控 **智能 I/O** 时，我们使用以下指标：\n\n```\nSize of IO avoided due to storage index\
  \ (KB)                    0      123950808\nCurrent smart IO to be issued (KB) \
  \                         10208          28576\nTotal smart IO read from hard disk\
  \ (KB)                   2642312     6292747248\nNumber of smart IO requests < 512KB\
  \                          52         128995\nNumber of smart IO requests >= 512KB\
  \ and < 1MB               260         604218\nNumber of smart IO requests >= 1MB\
  \ and < 2MB                  0             35\nNumber of smart IO requests >= 2MB\
  \ and < 4MB                286         697848\nNumber of smart IO requests >= 4MB\
  \ and < 8MB                299         723438\nNumber of smart IO requests >= 8MB\
  \                           0              0\n```\n\n### 监控指标解释\n\n`Size of IO avoided\
  \ due to storage index (KB)` 指标提供了另一种检查 **智能扫描** 期间是否使用存储索引的方法。你可以看到与上两次快照之间的当前增量以及报告的累计节省量。`Current\
  \ smart IO to be issued (KB)` 报告了在当前快照时符合 **智能扫描** 处理条件的 **KB** 数据量，这表明 **智能扫描**\
  \ 处于活动状态。`Total smart IO read from hard disk` 指标报告了由 **智能扫描** 处理、从磁盘而非缓存读取的数据量。`Number\
  \ of smart IO requests` 指标让我们能够了解这些扫描请求的数据大小范围，以及给定范围内生成了多少请求，从而提供了另一种衡量 **智能扫描**\
  \ 性能的方法。\n\n### 执行计划隔离\n\n有时执行计划会被 **Exadata** 隔离。这通常是由于操作系统级故障报告的 `ORA-07445` 错误导致的。此外，受影响的磁盘存储区域也可能被隔离，这会禁用该区域的\
  \ **智能扫描**，以及任何使用被隔离计划的查询。告警历史会报告此类错误，以下是一个告警示例：\n\n```\nalertMessage: \"ORA-7445:\
  \ exception encountered: core dump\n[kdzsBufferCUPiece()+35] [11] [0x000000000]\
  \ [] [] []\"\n```\n\n告警历史中包含一个类似于以下内容的条目：\n\n```\nalertMessage: \"A SQL PLAN quarantine\
  \ has been added. As a result,\nSmart Scan is disabled for SQL statements with the\
  \ quarantined SQL plan.\nQuarantine id : 1 Quarantine type : SQL PLAN Quarantine\
  \ reason :\n  : 1dx1zzf5bwd07 SQL Plan details : {SQL_PLAN_HASH_VALUE=2181142203,\n\
  PLAN_LINE_ID=19} In addition, the following disk region has been\nquarantined, and\
  \ Smart Scan will be disabled for this region: Disk Region :\n```\n\n需要解决此类错误，但即使在纠正后，受影响的计划仍可能处于隔离状态。要查看哪些计划被隔离，可以使用\
  \ `cellcli` 的 `LIST QUARANTINE` 语句。该命令将显示每个被隔离计划的以下属性：\n\n```\nname\ncellsrvChecksum\n\
  clientPID\ncomment                 modifiable\ncrashReason\ncreationTime\ndbUniqueID\n\
  dbUniqueName\nincidentID\nioBytes\nioGridDisk\nioOffset\nplanLineID\nquarantineReason\n\
  quarantineType\nremoteHostName\nrpmVersion\nsqlID\nsqlPlanHashValue\n```\n\n要清除隔离，可以使用\
  \ `drop quarantine` 命令。如果导致计划被隔离的所有问题尚未完全解决，也可以只删除原因已纠正的被隔离计划。这可以使用 `drop quarantine\
  \ [name, name, name, name, ...]` 语法，仅删除列出的命名隔离。一旦隔离被删除，你应该能看到曾经受影响的计划的 **智能扫描**\
  \ 性能得以恢复。\n\n### 监控工具\n\n最好定期使用两个账户来监控存储单元：使用 `cellmonitor` 处理日常任务，并在 `cellmonitor`\
  \ 脚本提供的输出表明可能存在潜在问题时使用 `celladmin`。从数据库服务器上的脚本向存储服务器提交 `cellcli` 和 `cellsrvstat`\
  \ 命令是一项简单的任务。对于 `cellcli`：\n\n```\ncellcli -e \"command\"\n```\n\n示例：\n\n```\n[celladmin@myexa1celMyexa1cel05\
  \ ∼]$ cellcli -e \"list flashcache detail\"\n         name:                   myexa1celMyexa1cel05_FLASHCACHE\n\
  \         cellDisk:               FD_11_myexa1celMyexa1cel05,FD_03_myexa1celMyexa1cel05,FD_15_myexa1celMyexa1cel05,FD_13_myexa1cel\n\
  Myexa1cel05,FD_08_myexa1celMyexa1cel05,FD_10_myexa1celMyexa1cel05,FD_00_myexa1celMyexa1cel05,FD_\n\
  14_myexa1celMyexa1cel05,FD_04_myexa1celMyexa1cel05,FD_06_myexa1celMyexa1cel05,FD_07_myexa1celMy\n\
  exa1cel05,FD_05_myexa1celMyexa1cel05,FD_12_myexa1celMyexa1cel05,FD_09_myexa1celMyexa1cel05,FD_02_\n\
  myexa1celMyexa1cel05,FD_01_myexa1celMyexa1cel05\n         creationTime:        \
  \   2013-07-09T17:33:53-05:00\n         degradedCelldisks:\n         effectiveCacheSize:\
  \     1488.75G\n         id:                     8a380bf9-06c3-445e-8081-cff72d49bfe6\n\
  \         size:                   1488.75G\n         status:                 normal\n\
  [celladmin@myexa1celMyexa1cel05 ∼]$\n```\n\n你无需进入 `cellcli` 交互界面即可从 `cellcli` 返回数据。`cellsrvstat`\
  \ 工具的操作方式类似，如下例所示：\n\n```\n[celladmin@myexa1celMyexa1cel05 ∼]$ cellsrvstat -stat_group=smartio\
  \ -interval=1 -count=10\n```\n\n\n\n... \n== SmartIO 相关统计 ==\n活动 Smart IO 会话数  \
  \                                              0              2\nSmart IO 会话高水位标记\
