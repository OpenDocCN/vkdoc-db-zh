- "# 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 智能扫描与卸载\n\nExadata 提供的增强功能之一是**智能扫描**，这是一种可以将部分查询**卸载**或移交到存储服务器进行处理的机制。这种\"\
  分而治之\"的方法是 Exadata 能够提供如此卓越性能的原因之一。这是通过 Exadata 的配置实现的，其中数据库服务器和存储单元提供计算能力和处理查询的能力，这要归功于在存储单元上运行的独特存储服务器软件。\n\
  \n## 智能扫描\n\n并非每个查询都能进行智能扫描，因为必须满足某些条件。这些条件如下：\n* 必须使用全表扫描或全索引扫描，此外还需要直接路径读取。\n\
  * 必须使用以下一个或多个简单的比较运算符：\n  * =\n  * <\n  * >\n  * >=\n  * =<\n  * BETWEEN\n  * IN\n\
  \  * IS NULL\n  * IS NOT NULL\n\n当并行运行查询时，智能扫描也将可用，因为并行查询从属进程默认执行直接路径读取。当然，其他条件也必须满足：并行执行仅确保使用直接路径读取。智能扫描如何提升性能？它减少了数据库服务器为返回结果而必须处理的数据量。卸载过程将工作负载分配到计算节点和存储单元之间，涉及更多的\
  \ CPU 资源，并将更小的数据集返回给接收进程。\n\n卸载不是读取 10,000 个数据块来返回 1,000 行数据，而是允许存储单元利用访问和过滤谓词执行部分工作，并仅发回符合所提供条件的行。与并行查询从属进程的操作类似，卸载过程将工作分配到可用的存储单元，每个单元返回存储在该特定磁盘子集中的任何符合条件的行。并且，与并行查询类似，这些\"\
  片段\"结果被合并成最终的结果集。卸载还减少了节点之间的实例间传输，从而减少了**闩锁**和**全局锁**。闩锁尤其消耗 CPU 周期。更少的闩锁等同于进一步减少\
  \ CPU 周期，从而提升性能。CPU 工作和执行时间的净\"节省\"可能是相当可观的；在非 Exadata 系统上需要数分钟执行的查询，使用智能扫描后有时可以在数秒内完成。\n\
  \n## 执行计划与指标\n\n\n\n### 执行计划中的 Smart Scan 活动报告与验证\n\n如果执行计划是优化器在运行时生成的实际计划，那么它们可以报告\
  \ Smart Scan 活动。符合条件的执行计划可以在 `V$SQL_PLAN` 和 `DBA_HIST_SQL_PLAN` 视图中找到；当使用 `ON` 选项时，`autotrace`\
  \ 会生成这些计划；或者也可以通过启用 `10046` 跟踪并使用 `tkprof` 处理生成的跟踪文件来找到它们。使用 `EXPLAIN` 模式的 `autotrace`\
  \ 可能无法提供与运行时生成的计划相同的计划，因为它仍然可能使用基于规则的优化器决策来生成计划。`EXPLAIN PLAN` 也是如此。（我们见过 `EXPLAIN\
  \ PLAN` 和 `10046` 跟踪报告不同执行计划的情况。）`tkprof` 工具也提供了 `explain` 模式，它同样可能提供误导性的计划。默认情况下，`tkprof`\
  \ 提供执行中的实际计划，因此使用命令行的 `explain` 选项是不必要的。\n\n### 识别执行计划中的 Smart Scan 操作\n\n在执行计划中，可以通过以下三种方式之一识别\
  \ Smart Scan：\n\n*   `TABLE ACCESS STORAGE FULL`\n*   `INDEX STORAGE FULL SCAN`\n\
  *   `INDEX STORAGE FAST FULL SCAN`\n\n出现一个或多个这样的操作并不意味着实际发生了 Smart Scan；应使用其他指标来验证\
  \ Smart Scan 的执行。\n\n## 使用视图列验证 Smart Scan\n\n`V$SQL` 视图（对于 RAC 数据库，是 `GV$SQL`）有两个列提供了关于单元格卸载执行的更多信息：`io_cell_offload_eligible_bytes`\
  \ 和 `io_cell_offload_returned_bytes`。如果确实执行了 Smart Scan，这些列将填充有关给定 `sql_id` 的单元格卸载活动的相关信息。\n\
  \n`io_cell_offload_eligible_bytes` 列报告符合卸载条件的数据字节数。这是在查询执行期间可以卸载到存储单元的数据量。`io_cell_offload_returned_bytes`\
  \ 列报告通过常规 I/O 路径返回的字节数。这些是未被卸载到单元格的字节。这两个值之间的差值提供了查询执行期间实际卸载的字节数。如果没有使用 Smart Scan，这两个列的值都将为\
  \ 0。有些情况下，`io_cell_offload_eligible_bytes` 列的值会等于 0，但 `io_cell_offload_returned_bytes`\
  \ 列的值不为 0。这种情况通常（但不总是）出现在引用固定视图（如 `GV$SESSION_WAIT`）或其他数据字典视图（例如 `V$TEMPSEG_USAGE`）时。此类查询不被视为符合卸载条件。（这些视图不可卸载，因为它们可能暴露驻留在数据库计算节点上的内存结构，但这并不表示它们不符合\
  \ Smart Scan 的条件【该视图的一个或多个基础表可能符合条件】。）`V$SQL_PLAN`/`GV$SQL_PLAN` 中存在投影数据就足以证明执行了\
  \ Smart Scan。\n\n### 查询示例\n\n查看一个执行了 Smart Scan 的查询示例，使用 `smart_scan_ex.sql` 脚本，我们可以看到：\n\
  \n```\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME \
  \                                             DEPTNO\n---------- ----------------------------------------\
  \ ----------\n      7934 Smorthorper7934                                       \
  \  15\n\nElapsed: 00:00:00.21\n\nExecution Plan\n----------------------------------------------------------\n\
  Plan hash value: 3956160932\n\n| Id  | Operation                 | Name | Rows \
  \ | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT          |     \
  \ |     1 |    28 |  6361   (1)| 00:00:01 |\n|*  1 |  TABLE ACCESS STORAGE FULL|\
  \ EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n---------------------------------------------------\n   1 -\
  \ storage(\"EMPID\"=7934)\n       filter(\"EMPID\"=7934)\n\nStatistics\n----------------------------------------------------------\n\
  \          1  recursive calls\n          1  db block gets\n      40185  consistent\
  \ gets\n      22594  physical reads\n        168  redo size\n        680  bytes\
  \ sent via SQL*Net to client\n        524  bytes received via SQL*Net from client\n\
  \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n \
  \         0  sorts (disk)\n          1  rows processed\n\nSQL>\n```\n\n请注意，执行计划通过\
  \ `TABLE ACCESS STORAGE FULL` 操作报告正在使用 Smart Scan。通过快速查询 `V$SQL` 来验证这一点，我们看到：\n\n\
  ```\nSQL> select sql_text,\n  2         io_cell_offload_eligible_bytes,\n  3   \
  \      io_cell_offload_returned_bytes\n  4  from v$sql\n  5  where sql_id = '...';\n\
  \nSQL_TEXT                     IO_CELL_OFFLOAD_ELIGIBLE_BYTES IO_CELL_OFFLOAD_RETURNED_BYTES\n\
  ---------------------------- ----------------------------- -----------------------------\n\
  select * from emp where ...                        1835008                     \
  \      183508\n\nSQL>\n```\n\n\n\n## Smart Scan 性能测试与优化\n\n### 性能测试\n\n以下查询用于分析智能扫描（Smart\
  \ Scan）节省的 I/O 比例：\n\n```sql\nSQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes\
  \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
  \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
  \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
  \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
  ```\n\n查询结果如下：\n\n```text\nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n\
  ------------- ---------- ---------- ------------ -------------------------------------\n\
  gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid =\
  \ 7934\n```\n\n根据结果，I/O 节省百分比为`22.97%`，这意味着 Oracle 处理的数据量比未执行智能扫描时减少了近 23%。\n\n\
  ### 禁用 Smart Scan\n\n在会话中设置`cell_offload_processing=false`，使用`no_smart_scan_ex.sql`脚本重新执行查询：\n\
  \n```sql\nSQL> alter session set cell_offload_processing=false;\n\nSession altered.\n\
  \nElapsed: 00:00:00.00\nSQL>\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\
  \nEMPID EMPNAME                                             DEPTNO\n---------- ----------------------------------------\
  \ ----------\n     7934 Smorthorper7934                                        \
  \ 15\n\nElapsed: 00:00:03.73\n\nExecution Plan\n\nPlan hash value: 3956160932\n\n\
  | Id  | Operation                 | Name | Rows  | Bytes | Cost (%CPU)| Time   \
  \  |\n\n|   0 | SELECT STATEMENT          |      |     1 |    28 |  6361   (1)|\
  \ 00:00:01 |\n|*  1 |  TABLE ACCESS STORAGE FULL| EMP  |     1 |    28 |  6361 \
  \  (1)| 00:00:01 |\n\nPredicate Information (identified by operation id):\n\n1 -\
  \ filter(\"EMPID\"=7934)\n\nStatistics\n\n1  recursive calls\n          1  db block\
  \ gets\n      45227  consistent gets\n      22593  physical reads\n          0 \
  \ redo size\n        680  bytes sent via SQL*Net to client\n        524  bytes received\
  \ via SQL*Net from client\n          2  SQL*Net roundtrips to/from client\n    \
  \      0  sorts (memory)\n          0  sorts (disk)\n          1  rows processed\n\
  \nSQL>\nSQL> set autotrace off timing off\nSQL>\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
  \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
  \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
  \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
  \ > 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
  \nno rows selected\n\nSQL>\n```\n\n没有智能扫描时，查询耗时`3.73`秒，处理了全部`185081856`字节的数据。由于禁用了卸载处理，存储单元未提供任何查询处理协助。有趣的是，执行计划报告了`TABLE\
  \ ACCESS STORAGE FULL`，这通常与智能扫描相关。缺少谓词信息以及卸载字节查询的“no rows selected”结果证明，智能扫描并未执行。禁用单元卸载处理造成了明显的执行时间差异，这证明了智能扫描的威力。\n\
  \n对于更大数据量，智能扫描的性能也可能优于索引，它允许 Oracle 在返回满足查询条件的行时，将 I/O 减少数 GB 甚至数 TB。然而，在某些情况下，智能扫描并非最佳选择；例如为表添加索引后，第三次执行相同的查询集（再次使用`smart_scan_ex.sql`脚本）：\n\
  \n### 使用索引\n\n```sql\nSQL> create index empid_idx on emp(empid);\n\nIndex created.\n\
  \nSQL>\nSQL> set autotrace on timing on\nSQL>\nSQL> select *\n  2  from emp\n  3\
  \  where empid = 7934;\n\nEMPID EMPNAME                                        \
  \     DEPTNO\n---------- ---------------------------------------- ----------\n \
  \    7934 Smorthorper7934                                         15\n\nElapsed:\
  \ 00:00:00.01\n\nExecution Plan\n\nPlan hash value: 1109982043\n\n| Id | Operation\
  \                   | Name      | Rows  | Bytes | Cost(%CPU)| Time    |\n\n|  0\
  \ | SELECT STATEMENT            |           |     1 |    28 |     4  (0)| 00:00:01|\n\
  |  1 |  TABLE ACCESS BY INDEX ROWID| EMP       |     1 |    28 |     4  (0)| 00:00:01|\n\
  |* 2 |   INDEX RANGE SCAN          | EMPID_IDX |     1 |       |     3  (0)| 00:00:01|\n\
  \nPredicate Information (identified by operation id):\n\n2 - access(\"EMPID\"=7934)\n\
  \nStatistics\n\n1  recursive calls\n  0  db block gets\n  5  consistent gets\n \
  \ 2  physical reads\n148  redo size\n684  bytes sent via SQL*Net to client\n524\
  \  bytes received via SQL*Net from client\n  2  SQL*Net roundtrips to/from client\n\
  \  0  sorts (memory)\n  0  sorts (disk)\n  1  rows processed\nSQL>\nSQL> set autotrace\
  \ off timing off\nSQL>\nSQL>select sql_id,\n  2  io_cell_offload_eligible_bytes\
  \ qualifying,\n  3  io_cell_offload_returned_bytes actual,\n  4  round(((io_cell_offload_eligible_bytes\
  \ - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,\n\
  \  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes> 0\n\
  \  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\n\
  no rows selected\n\nSQL>\n```\n\n请注意，优化器选择了索引范围扫描，而不是将谓词卸载到存储单元。索引范围扫描的耗时远少于智能扫描的耗时，因此，在某些情况下，智能扫描可能并非访问数据的最有效路径。这也说明了现有索引可能带来的问题，即优化器可能选择使执行路径更糟的索引，这解释了为什么一些\
  \ Exadata 资料建议删除索引以提高性能。虽然最终可能决定删除索引对于查询或查询组的整体性能是最佳选择，但此处不提供此类建议，因为每种情况都不同，需要根据具体情况评估；对一个\
  \ Exadata 系统和应用程序有益的做法，可能对另一个并非如此。唯一能够相对确定是否要删除某个索引的方法，是在尽可能接近生产的环境中进行测试并评估结果。\n\
  \n### Smart Scan 优化\n\n智能扫描使用各种优化来完成任务。它实现了三项主要优化：列投影、谓词过滤和存储索引。由于存储索引将在下一章详细讨论，本节将重点讨论前两项优化。目前只需了解，存储索引不同于常规索引，它们告知\
  \ Exadata *不要*在何处查找数据。这一点现在可能令人困惑，但稍后将深入探讨。接下来章节的主要焦点将是列投影和谓词过滤。\n\n#### 列投影\n\n\
  什么是列投影？它是 Exadata 仅返回查询所需列的能力。在使用通用硬件的传统系统中，Oracle 会从存储单元完整获取感兴趣的数据块，将它们加载到缓冲区缓存中。然后，Oracle\
  \ 从这些块中提取列，最后进行过滤以仅返回选择列表中的列。因此，整行数据都会返回，以便在显示最终结果之前进行进一步处理。列投影在数据到达数据库服务器*之前*进行过滤，仅返回选择列表中的列，以及（如果适用）连接操作所需的列。Exadata\
  \ 不是返回整个数据块或行，而是仅返回完成查询操作所需的数据。这可以显著减少数据库服务器处理的数据量。\n\n\n\n以包含 45 列的表和包含其中 7 列的选择列表为例。列投影仅返回这\
  \ 7 列，而不是全部 45 列，从而显著减轻数据库服务器的工作负载。假设在查询中添加一个两列的连接条件，并从另一个包含 71 列的表中选择另外两列；列投影将返回选择列表中的\
  \ 9 列和连接条件中的 4 列（假设连接列不在选择列表中）。13 列的数据量远小于 116 列（第一个表的 45 列加上第二个表的 71 列），这是智能扫描能够如此快速的原因之一。列投影信息可从`V$SQL_PLAN`的`PROJECTION`列或`DBMS_XPLAN`包中获取，因此你可以选择两者中更容易使用的一个；仅当向`DISPLAY_CURSOR`函数传递了“+projection”参数时（如本例所示，来自`smart_scan_ex.sql`），才会返回投影信息，该示例同时使用了两种检索列投影数据的方法：\n\
  \n```\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME \
  \                                     DEPTNO\n---------- ----------------------------------------\
  \ ----------\n      7934 Smorthorper7934                                  15\n\n\
  Elapsed: 00:00:00.16\n\nSQL> select sql_id,\n  2         projection\n  3  from v$sql_plan\n\
  \  4  where sql_id = 'gfjb8dpxvpuv6';\n\nSQL_ID        PROJECTION\n-------------\
  \ ----------------------------------------------------------------------------\n\
  gfjb8dpxvpuv6 \"EMPID\"[NUMBER,22], \"EMP\".\"EMPNAME\"[VARCHAR2,40], \"EMP\".\"\
  DEPTNO\"[NUMBER,22]\n\nSQL>\nSQL> select *\n  2  from table(dbms_xplan.display_cursor('&sql_id','&child_no',\
  \ '+projection'));\nEnter value for sql_id: gfjb8dpxvpuv6\nEnter value for child_no:\n\
  \nPLAN_TABLE_OUTPUT\n-------------------------------------------------------------------------------------------SQL_ID\
  \  gfjb8dpxvpuv6, child number 0\n\nselect * from emp where empid = 7934\n\nPlan\
  \ hash value: 3956160932\n\n| Id  | Operation                 | Name | Rows  | Bytes\
  \ | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT          |      |      \
  \ |       |  6361 (100)|          |\n|*  1 |  TABLE ACCESS STORAGE FULL| EMP  |\
  \     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information (identified by\
  \ operation id):\n\n1 - storage(\"EMPID\"=7934)\n       filter(\"EMPID\"=7934)\n\
  \nColumn Projection Information (identified by operation id):\n\n1 - \"EMPID\"[NUMBER,22],\
  \ \"EMP\".\"EMPNAME\"[VARCHAR2,40],\n    \"EMP\".\"DEPTNO\"[NUMBER,22]\n\n29 rows\
  \ selected.\n\nSQL>\n```\n\n由于只请求了三列，因此存储服务器仅返回了这三列（由自动跟踪报告的列投影信息部分证明），这使得查询执行效率更高。数据库服务器无需过滤结果集行来仅返回所需的列。\n\
  \n#### 谓词过滤\n\n列投影仅从选择列表或连接条件中返回感兴趣的列，而谓词过滤则是 Exadata 用来仅返回感兴趣行的机制。这种过滤发生在存储单元，从而减少了数据库服务器必须处理的数据量。在智能扫描执行过程中，谓词信息会传递给存储服务器，因此在存储服务器级别执行过滤操作是一个合乎逻辑的选择。由于传输到数据库服务器的数据量减少，数据库服务器\
  \ CPU 的负载也随之降低。前面的示例同时使用了列投影和谓词过滤来快速返回结果集；结合使用这两种功能是一个强大的组合，这是由不匹配的独立组件配置的系统所无法提供的。\n\
  \n#### 基本连接\n\n根据查询的不同，连接处理也可以被下推到存储服务器执行，这些连接使用一种称为**bloom filter**的有趣结构进行处理。它们并非新技术，也非\
  \ Exadata 独有，因为 Oracle 从 Oracle 数据库 10g 第 2 版开始就在查询处理中使用它们，主要用于减少并行查询服务进程之间的流量。什么是\
  \ bloom filter？它以 Burton Howard Bloom 的名字命名，他在 20 世纪 70 年代提出了这个概念，是一种高效的数据结构，用于快速确定一个元素是否有可能属于给定集合。它基于一个位数组，可以进行快速搜索，并返回两种结果之一：元素可能在集合中（可能产生假阳性），或者元素肯定不在集合中。过滤器不会产生假阴性，假阳性的发生率相对较低。bloom\
  \ filter 的另一个优势是它们相对于用于类似目的的其他数据结构（自平衡二叉搜索树、哈希表或链表）体积较小。假阳性的可能性需要添加另一个过滤器来从结果中消除它们，但这样的过滤器不会显著增加处理时间，因此相对而言不引人注意。\n\
  \n当在 Exadata 系统上对查询使用 bloom filter 时，过滤器谓词**和**存储谓词都会列出被调用的`SYS_OP_BLOOM_FILTER`函数。该函数包含用于消除可能返回的假阳性的额外过滤器。正是存储谓词提供了\
  \ Exadata 上 bloom filter 的真正威力。使用 bloom filter 在存储服务器级别对表进行预连接，减少了数据库服务器需要处理的数据量，并且可以显著减少给定查询的执行时间。\n\
  \n下面是 bloom filter 实际应用的一个示例；此输出由执行`bloom_fltr_ex.sql`脚本生成。\n\n```\nSQL> --\nSQL>\
  \ -- 创建示例表\nSQL> --\nSQL> -- 并行创建它们，这是对这些表进行智能扫描所必需的\nSQL> --\nSQL> create table\
  \ emp(\n  2     empid   number,\n  3     empnmvarchar2(40),\n  4     empsal  number,\n\
  \  5     empssn  varchar2(12),\n  6     constraint emp_pk primary key (empid)\n\
  \  7  ) parallel 4;\n\nTable created.\n\nSQL>\nSQL> create table emp_dept(\n  2\
  \     empid   number,\n  3     empdept number,\n  4     emploc  varchar2(60),\n\
  \  5    constraint emp_dept_pk primary key(empid)\n  6  ) parallel 4;\n\nTable created.\n\
  \nSQL>\nSQL> create table dept_info(\n  2     deptnum number,\n  3     deptnm  varchar2(25),\n\
  \  4    constraint dept_info_pk primary key(deptnum)\n  5  ) parallel 4;\n\nTable\
  \ created.\nSQL>\nSQL> --\nSQL> -- 向示例表中加载数据\nSQL> --\nSQL> begin\n  2         \
  \ for i in 1..2000000 loop\n  4                  insert into emp\n  5          \
  \        values(i, 'Fnarm'||i, (mod(i, 7)+1)*1000, mod(i,10)||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||mod(i,10)||mod(i,10));\n\
  \  6                  insert into emp_dept\n  7             values(i, (mod(i,8)+1)*10,\
  \ 'Zanzwalla'||(mod(i,8)+1)*10);\n  8                   commit;\n  9          end\
  \ loop;\n 10          insert into dept_info\n 11          select distinct empdept,\
  \ case when empdept = 10 then 'SALES'\n 12                                 when\
  \ empdept = 20 then 'PROCUREMENT'\n 13                                 when empdept\
  \ = 30 then 'HR'\n 14                                 when empdept = 40 then 'RESEARCH'\n\
  \ 15                                 when empdept = 50 then 'DEVELOPMENT'\n 16 \
  \                                when empdept = 60 then 'EMPLOYEE RELATIONS'\n 17\
  \                                 when empdept = 70 then 'FACILITIES'\n 18     \
  \                            when empdept = 80 then 'FINANCE' end\n 19         \
  \ from emp_dept;\n\n20  end;\n 21  /\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n\n\n## SQL 查询性能分析：布隆过滤器与 Exadata 卸载\n\n### 运行使用布隆过滤器的连接查询\n执行以下 SQL 查询来生成执行计划，以验证布隆过滤器的使用情况，并报告查询执行时间。\n\
  \n```sql\nSQL> set autotrace on\nSQL> set timing on\n\nSQL> select /*+ bloom join\
  \ 2 parallel 2 use_hash(empemp_dept) */ e.empid, e.empnm, d.deptnm, e.empsal\n \
  \ 2  from emp e join emp_depted on (ed.empid = e.empid) join dept_info d on (ed.empdept\
  \ = d.deptnum)\n  3  where ed.empdept = 20;\n\nEMPID EMPNM                     DEPTNM\
  \                       EMPSAL\n---------- ---------------------- -------------------------\
  \ ----------\n    904505 Fnarm904505           PROCUREMENT                    1000\n\
  \    907769 Fnarm907769           PROCUREMENT                    3000\n    ...\n\
  250000 rows selected.\n\nElapsed: 00:00:14.27\n\nExecution Plan\nPlan hash value:\
  \ 2643012915\nPredicate Information (identified by operation id):\n3 - access(\"\
  ED\".\"EMPID\"=\"E\".\"EMPID\")\n11 - access(\"D\".\"DEPTNUM\"=20)\n13 - storage(\"\
  ED\".\"EMPDEPT\"=20)\n     filter(\"ED\".\"EMPDEPT\"=20)\n15 - storage(SYS_OP_BLOOM_FILTER(:BF0000,\"\
  E\".\"EMPID\"))\n     filter(SYS_OP_BLOOM_FILTER(:BF0000,\"E\".\"EMPID\"))\nNote\n\
  - dynamic sampling used for this statement (level=2)\nStatistics\n60  recursive\
