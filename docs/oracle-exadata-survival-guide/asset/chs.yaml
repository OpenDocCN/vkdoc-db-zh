  \ `FC_BYKEEP_USED` | \"FlashCache 上用于‘keep’对象的已用兆字节数\" |\n| `FC_BY_USED` | \"FlashCache\
  \ 上的已用兆字节数\" |\n| `FC_IO_BYKEEP_R` | \"从 FlashCache 为‘keep’对象读取的兆字节数\" |\n| `FC_IO_BYKEEP_R_SEC`\
