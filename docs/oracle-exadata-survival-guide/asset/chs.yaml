  \nElapsed: 00:00:00.11\nSQL>\nSQL> --\nSQL> -- 执行第二次更新\nSQL> --\nSQL> -- 注意耗时\n\
  SQL> --\nSQL> update emp set sal=sal*1.08 where empno > 7350;\n\n14680064 rows updated.\n\
  \nElapsed: 00:02:23.52\nSQL>\nSQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.02\n\
  SQL>\nSQL> --\nSQL> -- 第二次更新后的当前存储消耗\nSQL> --\nSQL> select table_name, compression,\
  \ compress_for\n  2  from user_tables;\n\nTABLE_NAME                     COMPRESS\
  \ COMPRESS_FOR\n------------------------------ -------- ------------\nDEPT     \
  \                      DISABLED\nBONUS                          DISABLED\nSALGRADE\
  \                       DISABLED\nDUMMY                          DISABLED\nEMP \
  \                           ENABLED  ARCHIVE HIGH\n\nElapsed: 00:00:00.06\nSQL>\n\
  SQL> select segment_name, sum(bytes) total_space\n  2  from user_segments\n  3 \
  \ group by segment_name;\n\nSEGMENT_NAME                    TOTAL_SPACE\n--------------------------------\
  \ -----------\nDEPT                                  65536\nDUMMY              \
  \                   65536\nEMP                              452984832\nEMP_IDX \
  \                         679477248\nSALGRADE                            65536\n\
  \nElapsed: 00:00:03.00\nSQL>\n```\n\n使用 `ARCHIVE HIGH` 所有的空间节省都丧失了，经过相同的更新后，表回到了\
  \ OLTP 压缩的范围。请注意，与 `QUERY` 压缩表相比，第一次更新多消耗了大约五分钟的耗时。\n\n### ARCHIVE LOW 压缩更新测试\n\n\
  为了完成使用 HCC 在活动表上可能预期的空间变化，我们对为 `ARCHIVE LOW` 压缩的 `EMP` 表执行了相同的更新，如下所示：\n\n```\n\
