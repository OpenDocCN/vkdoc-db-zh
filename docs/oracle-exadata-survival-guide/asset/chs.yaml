  \ Read\n\n此事件在 Exadata 系统上被重命名，因为非 Exadata 事件被命名为 `db file scattered read`，这个名称有描述性但不完全准确，因为读取的块可能不是分散的而是连续的。Oracle\
  \ 11.2 在非 Exadata 系统上仍然使用 `db file scattered read` 事件报告多块读取，无论它们读取的是连续块还是分散块。对于\
  \ Exadata 系统，此事件记录连续多块读取的时间。\n\n触发此等待事件的操作的部分列表如下：\n\n![image](img/Table7-3.jpg)\n\
