  \              TOTAL_SPACE\n----------------------------------- -----------\nDEPT\
  \                                     65536\nDUMMY                             \
  \       65536\nEMP                                  184549376\nEMP_IDX         \
  \                     260046848\nSALGRADE                                 65536\n\
  \nElapsed: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- 对压缩数据执行一次更新操作\nSQL> --\nSQL> -- 注意完成耗时\n\
  SQL> --\nSQL> update emp set sal=sal*1.08 where empno > 7350;\n\n14680064 rows updated.\n\
  \nElapsed: 00:14:25.18\nSQL>\nSQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.00\n\
  SQL>\nSQL> --\nSQL> -- 数据字典中的压缩类型没有改变\nSQL> -- 但占用的空间已经超过了表的原始大小\nSQL> --\nSQL>\
