  ### 可卸载函数列表\n\n由于 Oracle 数据库中有许多函数，哪些函数可以被卸载呢？Oracle 提供了一个数据字典视图 `V$SQLFN_METADATA`，它正好回答了这个问题。该视图中有一个名为\
  \ `OFFLOADABLE` 的列，它针对数据库中的每一个 Oracle 自带函数，指明其是否可以被卸载。正如您可能猜到的那样，最好在运行 Exadata 的\
