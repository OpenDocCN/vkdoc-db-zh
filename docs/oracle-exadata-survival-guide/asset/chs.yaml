  \ id: 401\nNumber of plan statistics captured: 1\n\nRows (1st) Rows (avg) Rows (max)\
  \  Row Source Operation\n---------- ---------- ----------  ---------------------------------------------------\n\
  \     41609      41609      41609  FIXED TABLE FULL X$KCFISOSSN (cr=0 pr=0 pw=0\
  \ time=116083 us cost=0\n                                  size=676 card=1)\n\n\
  Elapsed times include waiting on following events:\n  Event waited on          \
  \                   Times   Max. Wait  Total Waited\n  ----------------------------------------\
  \   Waited  ----------  ------------\n  SQL*Net message to client              \
  \      2775        0.00          0.00\n  cell statistics gather                \
  \         66        0.00          0.02\n  SQL*Net message from client          \
  \        2775        2.63         12.53\n  row cache lock                      \
  \             9        0.00          0.00\n  library cache lock                \
  \               2        0.00          0.00\n  library cache pin               \
  \                 2        0.00          0.00\n********************************************************************************\n\
  ```\n\n## 系统 I/O 等待事件\n\n在此等待类别中有五个特定于单元的事件，其中三个很少积累显著的时间。两个备份事件在备份和恢复操作期间确实会积累时间，它们之所以有趣，不仅在于哪些操作记录了时间，还在于你认为应该记录时间但实际上没有记录的操作。我们在表\
  \ 7-2 中列出了非备份事件。\n\n表 7-2。单元启动和关闭等待事件\n\n| 事件 | 描述 |\n| --- | --- |\n| Cell manager\
  \ closing cell | 此事件是单元关闭事件，记录单元关闭操作的时间。唯一传回的参数是单元哈希值（`cellhash#`）。 |\n| Cell manager\
  \ opening cell | 此事件是单元启动事件。唯一传回的参数同样是单元哈希值（`cellhash#`）。 |\n| Cell manager discovering\
  \ disks | 这是另一个单元启动事件，传回单元哈希值（`cellhash#`）。与其他两个事件一样，不提供其他参数。 |\n\n## 等待事件：Cell\
  \ Smart Incremental Backup\n\nExadata 通过允许将 RMAN（恢复管理器）增量备份卸载到存储层，优化了此类备份。因此，此事件会为增量级别\
  \ 1 备份积累等待时间，其中处理已卸载到存储层。在 Exadata 上，更改在块级别进行跟踪，从而可以更快地备份自上次增量级别 0 备份以来更改的块。存储层特别适合此类处理，因此需要这个新的等待事件。\n\
  \n并非每个增量备份都会触发此等待事件。增量级别 0 备份不会触发，因为它们本质上是完整备份，不依赖于块更改跟踪。它们是任何使用增量备份的恢复操作的起点，这就是为什么在执行恢复时，如果没有`RECOVER\
  \ ... UNTIL ...`子句或`SET UNTIL TIME`语句，最近的增量级别 0 备份会取代任何先前的增量级别 0 备份。\n\n此事件仅填充单元哈希值（`cellhash#`）。通常，Oracle\
  \ 会重置或清除当前等待事件未传递的任何参数，但有时，先前等待事件填充的值会残留下来。`obj#`参数就是其中一个可能在记录此事件的 10046 跟踪文件中被填充的参数。在这种情况下，非负的`obj#`是没有意义的。Oracle\
  \ 会用-1 填充`obj#`，以显示它是从先前的事件中清除的。\n\n## 等待事件：Cell Smart Restore from Backup\n\n此事件记录使用\
  \ RMAN 进行还原所花费的等待时间。就像前一个事件一样，Exadata 将此处理卸载到存储单元，这些单元再次因其直接访问存储而特别适合此类操作。\n\n此事件实际上与`cell\
  \ smart file creation`事件相关；两个事件都记录格式化空数据块和与文件创建相关的初始化操作的时间。\n\n\n## 空闲类/其他类\n\n\
  在一个正常运行的 Exadata 系统中，这两类中的五个等待事件很少被使用。我们在所管理的系统上未曾发现过它们，您很可能也不会遇到。但有一个例外，即 `cell\
  \ flash unkeep` 事件，该事件将在其专属章节中进行介绍。其余的这些事件，对于 `V$SESSION_WAIT` 视图中提供的 P1、P2 和 P3\
  \ 参数值而言，都缺乏信息量。表 7-3 列出了您不太可能看到的事件及其提供给 Oracle 的参数的基本描述。\n\n表 7-3. 极少报告的单元等待事件\n\
  \n| 事件 | 描述 |\n| --- | --- |\n| 单元管理器取消工作请求 | 此事件提供的信息很稀疏，因为可提供的参数在 `V$SESSION_WAIT`\
  \ 中均未填充。我们尚未在 `10046` 跟踪中看到此事件。 |\n| 单元工作进程联机完成 | 这似乎是一个单元启动事件。提供的唯一参数是单元哈希（在 `10046`\
  \ 跟踪中为 `cellhash#`，在 `V$SESSION_WAIT` 视图中为 P1）。这是另一个我们未见报告的等待事件。 |\n| 单元工作进程重试 |\
  \ 另一个仅填充单元哈希 (`cellhash#`) 而无其他信息的等待事件。 |\n| 单元工作进程空闲 | 此事件不提供任何参数，并且我们在所管理的任何系统上均未见其报告。\
  \ |\n\n## 单元智能闪存解保持\n\n此事件记录 Oracle 将数据块从智能闪存缓存中刷出时的等待时间，但它不会为使用默认 FIFO 方式的智能闪存缓存的对象触发。此事件跟踪那些旨在保留在智能闪存缓存中的对象（使用\
  \ `STORAGE(FLASH_CACHE KEEP)` 参数）的等待时间。会触发此事件的操作包括表的 `DROP` 和 `TRUNCATE`。与此等待相关联的另一个事件是\
  \ `enq: RO fast object reuse`，因为触发此事件的操作也会触发缓冲区缓存清理。截断或删除表还需要移除该对象的任何缓存数据，并且在 Exadata\
  \ 上，有两个独立的缓存需要维护。\n\n此事件提供的唯一参数是单元哈希 (`cellhash#`)，用于标识是哪个单元为截断或删除操作提供了服务。在 `10046`\
  \ 跟踪的 `WAIT` 事件或 `V$SESSION_WAIT` 视图中，没有其他参数被填充。\n\n## 需要了解的事项\n\n等待接口在过去几个 Oracle\
  \ 版本中已经得到了扩展，在 Exadata 上它又经历了一次扩展：增加了特定于单元的事件，这些事件在某些情况下取代了非 Exadata 系统上已有的事件。同时还添加了新的事件来监控\
  \ Exadata 特有的新机制。\n\n`cell smart table scan` 事件记录了智能扫描所花费的时间，使得该事件对于使用 Exadata 或\
  \ Exadata 存储的系统至关重要。此事件通常取代了 `direct path read` 事件，尽管当查询不符合智能扫描条件时，您仍然可以在 Exadata\
  \ 系统上找到直接路径读等待。\n\n`cell smart index scan` 事件报告索引快速全扫描的等待时间；没有其他索引访问路径会触发此等待。\n\n\
  `cell single block physical read` 事件等同于非 Exadata 系统上的 `db file sequential read`\
  \ 事件。它最常与索引访问操作和通过索引行 ID 访问表的操作相关联，但任何单块访问操作都可能触发此等待。我们认为，它的命名比其非 Exadata 对应项更准确，因为读取的数据块是单块，而不一定是顺序的。\n\
  \n`cell multiblock physical read` 事件收集顺序多块读的时间，是 `db file scattered read` 事件的替代者。同样，我们认为\
  \ Exadata 事件的命名更好，因为它表明读取的是顺序排列的数据块集合。`db file scattered read` 事件在非 Exadata 系统中记录顺序和非顺序读的时间，所以其名称有些令人困惑。\n\
  \nExadata 提供了一个新事件 `cell list of blocks read`，用于记录非顺序或分散的数据块读取的时间。此事件也可以替代 `db file\
  \ scattered read` 事件，因为如前所述，旧事件记录所有多块读的时间，无论是否顺序。\n\n在 Exadata 中，数据块准备工作被下推到存储单元执行，因此增加了一个名为\
  \ `cell smart file creation` 的新事件。这个名称有点用词不当，因为它不一定是指文件创建（尽管那是可以触发此等待的操作之一），而通常是收集数据块格式化/重新格式化以准备新数据所花费的时间。触发此事件的操作包括删除、更新、数据库文件创建和文件自动扩展。\n\
  \n`cell statistics gather` 事件被我们归类错误，因为它与磁盘 I/O 操作无关。它记录访问各种 `V$` 和 `X$` 表/视图的时间，更准确地说，可以被视为系统\
  \ I/O 或其他等待类事件。\n\nRMAN 也有特定于 Exadata 的等待，因为某些 RMAN 操作被下推到存储单元执行。`cell smart incremental\
  \ backup` 事件记录了增量级别 1 备份所经历的等待时间。因为增量级别 0 备份实际上是完整备份，也是下一系列级别 1 增量备份的起点，所以它不会触发此事件。\n\
  \n`cell smart restore from backup` 事件收集 RMAN 在执行数据库恢复时经历的等待时间，因为与此等待相关的操作被下推到存储单元执行。由于存储单元是\
  \ Exadata 系统中唯一能直接访问存储的服务器，下推这两个 RMAN 操作是合理的。\n\nExadata 作为性能增强功能之一，拥有智能闪存缓存。当使用\
  \ `STORAGE(FLASH_CACHE KEEP)` 指令创建表/索引时，截断或删除这些对象会触发 `cell smart flash unkeep` 事件。这些操作也会触发缓冲区缓存清理，因此报告此事件的跟踪文件通常也会报告\
  \ `enq: RO fast object reuse` 等待。\n\n"
- "# 第 8 章 性能测量\n\n![image](img/frontdot.jpg)\n\n在架构方面，Exadata 是一次巨大的飞跃。与传统的商用硬件配置不同，Exadata\
  \ 提供了一套软硬件匹配的解决方案。然而，它运行的是与您可以在任何非 Exadata 平台上安装的相同的 Oracle `11.2.0.3`。因此，相同的基本性能规则仍然适用；不同之处在于增加了智能扫描、智能闪存缓存和功能下推等功能。由于本书的目的是让您熟悉\
  \ Exadata 并具备相关的专业知识，我们将重点介绍 Exadata 特有的性能指标。此外，我们还将探讨与 Exadata 相关的性能主题及其内部机制。\n\
  \n\n\nExadata 提供了大量可供使用的性能指标。这是个好消息。不幸的是，这也意味着要面对海量的数据。在追求性能的道路上，拥有大量的指标可供检查是好事；但缺点是你可能在浩瀚的数据中迷失方向，忘记了自己的初衷。知道要查找什么、如何判断情况良好，更重要的是，如何判断情况糟糕，可能很困难。性能监控的关键不在于查看每一个可用的指标，而在于明智地选择指标。你为何选择特定指标以及你应该看到什么值，这些远比指标本身重要。\n\
  \n最终用户并不关心 Exadata 每秒能提供多少次 I/O；她衡量性能的标准是响应时间。基本上，事情进展得越快，最终用户就越满意。处理性能问题应该是一个监控和优化响应时间的过程。这正是\
  \ Oracle 等待接口成为非常有用的工具的地方。这些等待事件在第 7 章中有讨论。Exadata 还提供了其他指标，以提供额外的信息，帮助你进一步提升性能。诸如智能扫描节省的字节数、通过存储索引避免的\
  \ I/O，以及智能闪存缓存统计信息等数据，都是提升性能的关键。本章将讨论此类指标、如何获取数据以及这些数字的含义。我们还将讨论如何使用这些信息来监控和排查 Exadata\
  \ 性能问题。\n\n## 三思而后行\n\n在深入探讨 Exadata 性能指标之前，我们必须回顾一下 Exadata 系统的一些关键部分。无论查询或语句是否使用智能扫描，数据库服务器都会要求存储单元实际检索所需的数据。当使用智能扫描时，存储单元还会通过列投影和谓词过滤协助处理数据。这些过程涉及单元读取数据或索引块、过滤所需的行并仅提取感兴趣的列。存储索引也通过允许存储单元绕过不包含感兴趣列值的\
  \ 1MB 数据单元来为此过程做出贡献。从数据库服务器的角度来看，存储单元是分发所需数据的“黑盒子”。这些“黑盒子”也会向数据库服务器传回记录存储单元执行了多少工作的指标。存储单元本身提供了丰富的性能指标，其中许多不会传回数据库服务器。不过，你会发现从存储单元获得的信息足以在数据库服务器级别排查许多性能问题。\n\
  \n智能扫描是 Exadata 的命脉；它们是实现超越普通商用硬件配置性能水平的关键。理解智能扫描的性能指标非常重要，基于此，我们将再次讨论它们的一些方面。\n\
  \n## 智能扫描再探\n\n在第 2 章中，我们详细讨论了智能扫描和下推；本章不再重复那么详细的内容。我们将讨论你应该了解的重要方面，以便正确分析提供的指标，从而对性能问题做出合理的诊断。\n\
  \n智能扫描需要直接路径读取和全表扫描、索引快速全扫描或索引全扫描。排查与智能扫描相关的性能问题的第一步是查看是否使用了符合条件的扫描。执行计划会给你这个信息，因此它是合乎逻辑的起点。回到之前的一个例子，我们可以在以下计划中看到符合条件的步骤：\n\
  \n```sql\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME                                      DEPTNO\n\
  ---------- ---------------------------------------- ----------\n      7934 Smorthorper7934                                  15\n\
  \nElapsed: 00:00:00.21\n\nExecution Plan\n\nPlan hash value: 3956160932\n\n| Id  |\
  \ Operation                 | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n\
  |   0 | SELECT STATEMENT          |      |     1 |    28 |  6361   (1)| 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS STORAGE FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01\
  \ |\n\nPredicate Information (identified by operation id):\n\n1 - storage(\"EMPID\"\
  =7934)\n       filter(\"EMPID\"=7934)\n\nStatistics\n\n1  recursive calls\n    1  db\
  \ block gets\n40185  consistent gets\n22594  physical reads\n  168  redo size\n\
    680  bytes sent via SQL*Net to client\n  524  bytes received via SQL*Net from\
  \ client\n    2  SQL*Net roundtrips to/from client\n    0  sorts (memory)\n    0  sorts\
  \ (disk)\n    1  rows processed\n\nSQL>\n```\n\n正如我们在第 2 章中所说，仅仅因为计划步骤中有`STORAGE`，并不能保证执行了智能扫描。你必须深入查看，确认是否使用了直接路径读取。在判断是否使用了智能扫描之前，还适用其他标准，例如计划输出中存在列投影数据。谓词过滤也可以在智能扫描中进行。存储索引也可以提供好处，允许\
  \ Oracle 绕过不包含感兴趣列值的 1MB 数据段。请注意，在提供的计划中，全扫描步骤包含关键字`STORAGE`，并且谓词信息包含一个`storage()`条目。再次强调，这些并不能保证执行了智能扫描，只表明该语句*符合*智能扫描执行的条件。然而，查询计划中缺少这些项，确实表明不可能发生智能扫描。你可能还会看到一些计划，其中`STORAGE`关键字存在但缺少`storage()`谓词信息，这表明没有执行谓词下推。在这种情况下，你可能会发现查询仍然从列投影中受益。\n\
  \n即使执行计划中存在所有上述标准，仍然有可能不执行智能扫描。为什么？记住，智能扫描需要直接路径读取；如果没有执行直接路径读取，那么就不会执行智能扫描。任何时候使用并行执行时都会发生直接路径读取，但也可以串行发生，特别是当`_serial_direct_read`参数设置为`TRUE`时。在调查智能扫描性能时，必须检查执行计划以及任何表明可能使用了直接路径读取的指标。此类指标在第\
  \ 2 章中讨论过，相关的等待事件在第 6 章中讨论。这两个信息源都将用于排查智能扫描性能问题。\n\n## 性能计数器与指标\n\n`V$SQL`和`GV$SQL`视图提供了两个我们用于证明智能扫描执行的指标：`io_cell_offload_eligible_bytes`和`io_cell_offload_returned_bytes`。它们用于计算因执行智能扫描而未读取的数据百分比。我们在第\
  \ 2 章中提供了这个脚本，但再次查看并理解它报告的内容是有益的：\n\n```sql\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
  \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
  \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
  \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
  \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
  \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
  \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6  185081856  \
  \ 42510928        22.97 select * from emp where empid = 7934\n\nSQL>\n```\n\n\n\n\
  作为回顾，`io_cell_offload_eligible_bytes`列报告了查询执行期间可以卸载到存储单元的数据字节数。`io_cell_offload_returned_bytes`列报告了通过常规\
  \ I/O 路径返回的字节数。这两个值之间的差值反映了查询执行期间实际卸载的字节数。利用这两个指标可以证明智能扫描的执行情况。\n\n另外两个列也能提供关于智能扫描和存储索引使用情况的信息：`cell\
  \ physical IO bytes saved by storage index`和`cell physical IO interconnect bytes\
  \ returned by smart scan`。正如第 3 章所述，`cell physical IO bytes saved by storage index`报告的内容如其名称所示，即由于智能扫描期间存储索引允许\
  \ Oracle 绕过某些 1MB 块，从而未被读取的总字节数。以下是第 3 章中的一个示例，供复习参考：\n\n```sql\nSQL> select *\n\
  \  2  from v$mystat\n  3  where statistic# = (select statistic# from v$statname\
  \ where name = 'cell physical IO bytes saved by storage index');\n\nSID STATISTIC#\
  \      VALUE\n---------- ---------- ----------\n      1107        247 1201201152\n\
  \nSQL>\n```\n\n该值在会话级别通过 `V$MYSTAT` 报告。需要记住的是，此统计信息在会话持续期间是累积的。在查询执行前后查询 `V$MYSTAT`\
  \ 并计算差值，即可显示该特定查询所节省的字节数。\n\n`cell physical IO interconnect bytes returned by smart\
  \ scan`报告通过智能扫描操作返回的实际字节数。`V$SQLSTATS` 会报告此值，以及另外两个值 `physical_read_bytes` 和 `physical_write_bytes`。这些值可用于评估智能扫描的“效率”（为方便表述而称）。此主题在第\
  \ 10 章中有更深入的介绍，但需要注意，当查询使用不符合智能扫描执行条件的排序或索引访问路径时，这种“效率”可能超过 100%。\n\n了解语句等待的内容也能提供关于智能扫描执行的信息。直接路径读通常表示智能扫描活动，但并非总是如此。LOB、索引组织表、非全扫描或快速全扫描的索引扫描，以及通过\
  \ `rowid` 取表数据，也可能使用直接路径读，但不符合智能扫描的条件。因此，即使在执行计划中已注意到存储访问并记录了直接路径读等待，Oracle 在处理查询或语句时也可能并未使用智能扫描。\n\
  \n表明未使用智能扫描的 Exadata 等待事件是 `cell multiblock physical read` 和 `cell single-block\
  \ physical read`。`cell multiblock physical read` 等待不仅适用于表，也适用于块大小大于数据库块大小的 LOB 以及安全文件读。当块大小小于或等于数据库块大小时，将使用\
  \ `cell single block physical read`。如第 7 章所述，`cell single block physical read` 可应用于索引访问路径，但由于此类等待在索引全扫描和索引快速全扫描期间不会发生，因此可以判断未执行智能扫描。\n\
  \n用户关心时间，特别是响应时间，因此性能调整的第一步应该是审视 Exadata 等待接口。观察查询和语句的时间花费在哪里，可以帮助定位性能不佳的领域。了解时间消耗在何处，为您解决此类性能问题提供了初步方向，并可能证明数据库并非故障所在。\n\
  \n## 动态计数器\n\n`V$SYSSTAT` 和 `V$SESSTAT` 视图提供了丰富的动态性能计数器，可帮助您诊断性能问题。根据会话花费时间的位置，这些视图可以帮助定位可能需要关注的领域。例如，如果\
  \ Oracle 使用了大量 CPU 资源，一个可能的排查途径是查看给定会话的逻辑读计数如何增加。`V$SYSSTAT` 提供了以下与读相关的计数器列表：\n\n\
