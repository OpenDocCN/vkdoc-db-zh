  \                                 0              0\n正在闪存中缓存的 Smart IO 总计（KB）   \
  \                              0              0\n当前已完成 IO 的 Smart IO（KB）       \
  \                              0              0\n已完成 IO 的 Smart IO 总计（KB）      \
  \                         2643304    13375830376\n当前正在过滤的 Smart IO（KB）         \
  \                              0              0\n正在过滤的 Smart IO 总计（KB）         \
  \                        2643304    13375830376\n当前过滤已完成的 Smart IO（KB）         \
  \                          1024           1024\n过滤已完成的 Smart IO 总计（KB）         \
  \                      2643304    13375830232\n当前 Smart IO 过滤后大小（KB）           \
  \                            1              1\n已过滤的 Smart IO 总计（KB）            \
