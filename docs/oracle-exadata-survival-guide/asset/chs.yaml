  \ sleeptime/senderid=268566527 passes=1 p3=7325501352 obj#=133235 tim=1371608209720974\n\
  WAIT #46969064935512: nam='cell smart table scan' ela= 132 cellhash#=2520626383\
  \ p2=0 p3=0 obj#=133235 tim=1371608209721594\nWAIT #46969064935512: nam='cell smart\
  \ table scan' ela= 9462 cellhash#=2520626383 p2=0 p3=0 obj#=133235 tim=1371608209731125\n\
