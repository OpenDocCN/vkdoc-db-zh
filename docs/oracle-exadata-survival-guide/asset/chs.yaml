  绕过 FlashCache 的读 I/O 请求数\" |\n| `FC_IO_RQ_R_SKIP_SEC` | \"每秒绕过 FlashCache 的读 I/O\
  \ 请求数\" |\n| `FC_IO_RQ_W` | \"导致用数据填充 FlashCache 的 I/O 请求数\" |\n| `FC_IO_RQ_W_SEC`\
  \ | \"每秒导致用数据填充 FlashCache 的 I/O 请求数\" |\n\n### 查看当前指标\n\n这些指标是自 `CELLSRV` 启动以来的累计值。要列出一个或多个指标的当前值，需要使用\
