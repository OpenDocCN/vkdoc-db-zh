  \    - 自动 `DOP`：计算得出的并行度为 2\n\n自动 `DOP` 和 `智能扫描` 使得查询时间与未压缩数据相比基本没有变差，这证明了 `Exadata`\
  \ 的这两项特性。`智能扫描` 还从存储单元提供了额外的 CPU 周期，因为数据是在存储单元解压缩的，而不是在数据库服务器上。\n\n##### 当你执行更新时\n\
  \n更新会对 `基本级压缩` 带来一个问题，因为数据必须被解压缩，并且在更新后保持解压缩状态。\n\n```\nSQL> update emp set sal=sal*1.10\
  \ where empno = 7566;\n\n1048576 rows updated.\n\nSQL> select segment_name, bytes\n\
  \  2  from user_segments;\n\nSEGMENT_NAME                             BYTES\n-----------------------------------\
  \ ----------\nDEPT                                     65536\nSALGRADE         \
  \                        65536\nDUMMY                                    65536\n\
  EMP                                  243269632\n\nSQL>\n```\n\n请注意，`EMP` 表占用的总字节数在更新完成后增加了。后续的更新将导致表的大小继续增长，因为数据块会被处理。必须再次压缩表才能恢复最初节省的空间，如下所示：\n\
  \n```\nSQL> alter table emp move compress;\n\nTable altered.\n\nSQL> select segment_name,\
  \ bytes\n  2  from user_segments;\n\nSEGMENT_NAME                             BYTES\n\
  ----------------------------------- ----------\nDEPT                           \
  \          65536\nSALGRADE                                 65536\nDUMMY        \
  \                            65536\nEMP                                  184549376\n\
  \nSQL>\n```\n\n目前没有提供在更新后自动重新压缩的功能。尽管 `基本压缩` 无需额外许可即可使用，但它的使用范围可能仅限于不更新或更新不频繁的表。\n\
  \n对压缩表的更新也比对未压缩表花费更长时间，因为受更新影响的数据块必须先解压缩，更新才能进行。使用 `基本压缩` 压缩的表进行批量更新的耗时如下：\n\n```\n\
  SQL> update emp set sal=sal*1.10 where empno = 7566;\n\n1048576 rows updated.\n\n\
  Elapsed: 00:01:05.85\nSQL>\n```\n\n这是在无负载且只有一个连接用户的系统上执行的。在负载更重的系统上，耗时可能会更长，并且有趣的是，如果批量更新影响了表数据的很大一部分，表的大小可能会增长到超过原始大小。\n\
  \n```\nSQL>\nSQL> --\nSQL> -- `EMP` 表当前的存储情况\nSQL> -- （此表仅为本示例的测试表）\nSQL> --\nSQL>\
  \ select segment_name, sum(bytes) total_space\n  2  from user_segments\n  3  group\
  \ by segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                     65536\nDUMMY           \
  \                         65536\nEMP                                  713031680\n\
  EMP_IDX                              469762048\nSALGRADE                       \
  \          65536\n\nElapsed: 00:00:01.46\nSQL>\nSQL> --\nSQL> -- 使用基本压缩对表进行压缩\n\
  SQL> --\nSQL> -- 注意压缩操作的耗时\nSQL> --\nSQL> alter table emp move compress;\n\nTable\
  \ altered.\n\nElapsed: 00:00:15.57\nSQL>\nSQL> --\nSQL> -- 索引现在无效了\nSQL> --\nSQL>\
  \ -- 必须重建才能使其可用\nSQL> --\nSQL> -- 注意耗时\nSQL> --\nSQL> alter index emp_idx rebuild;\n\
  \nIndex altered.\n\nElapsed: 00:00:53.01\nSQL>\nSQL> --\nSQL> -- 启用压缩后，表/索引的当前压缩类型和存储空间\n\
  SQL> --\nSQL> select table_name, compression, compress_for\n  2  from user_tables;\n\
  \nTABLE_NAME                     COMPRESS COMPRESS_FOR\n------------------------------\
  \ -------- ------------\nDEPT                           DISABLED\nBONUS        \
