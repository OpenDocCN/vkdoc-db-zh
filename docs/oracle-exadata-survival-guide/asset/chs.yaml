  SALGRADE                            65536\n\nElapsed: 00:00:00.02\nSQL>\nSQL> --\n\
  SQL> -- 执行第二次更新\nSQL> --\nSQL> -- 注意耗时\nSQL> --\nSQL> update emp set sal=sal*1.08\
