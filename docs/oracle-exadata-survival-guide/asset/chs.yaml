  ## 引言


  本书源于我们在将数据库和应用程序管理、配置及迁移到 Exadata 平台方面的个人经验。在此过程中，我们记录了笔记，尝试了各种方法，最终理解了 Exadata
  能做什么以及它是如何运作的。我们没有深入探讨系统的内部工作机制（Kerry Osborne、Randy Johnson 和 Tanel Pöder 已经在那个层面提供了出色的著作），而是选择为忙碌的
  DBA 提供一本指南，他们可能没有时间通读并消化一本“细节”书籍。因此，本书旨在引领 DBA 了解我们认为最重要的 Exadata 方面和概念，而不会陷入细节的泥潭。我们建议使用一台
  Exadata 机器，以便您可以尝试提供的脚本、查询和命令，并亲眼看到结果。我们相信，与 Exadata 的互动体验会让一些概念更容易理解。


  我们编写本书的目标是为经验丰富的 Oracle DBA 提供工具和知识，以驾驭 Exadata，希望他们不再心怀畏惧。本书无意解释 Oracle 的工作原理——这不是一本“通过实践学习
  Oracle”的教材。我们的意图是利用那些经过实战检验和时间考验的 Oracle 专业人士的现有知识，使他们能够成功地将已知内容适配到 Exadata 平台上。


