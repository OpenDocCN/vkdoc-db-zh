  \          FLASHCACHE      2,927 IO/秒\n         FC_IO_RQ_R_SKIP         FLASHCACHE\
  \      1,010,251,273 IO 请求\n         FC_IO_RQ_R_SKIP_SEC     FLASHCACHE      19.4\
  \ IO/秒\n         FC_IO_RQ_W              FLASHCACHE      1,096,966,059 IO 请求\n \
  \        FC_IO_RQ_W_SEC          FLASHCACHE      170 IO/秒\nCellCLI>\n\n对于智能闪存缓存，收集的不仅仅是性能指标。您可以使用\
  \ `LIST FLASHCACHECONTENT` 命令查看缓存中的内容。若要查看可用的属性或用于筛选输出的属性，可以描述 `FLASHCACHECONTENT`\
  \ 对象：\n\nCellCLI> describe flashcachecontent\n        cachedKeepSize\n        cachedSize\n\
  \        dbID\n        dbUniqueName\n        hitCount\n        hoursToExpiration\n\
  \        missCount\n        objectNumber\n        tableSpaceNumber\n\n可以通过 `dbUniqueName`\
  \ 或 `dbID` 来指定特定的数据库。`objectNumber` 和 `tableSpaceNumber` 属性是特定于某个 `dbUniqueName`/`dbID`\
  \ 的，因此应与 `dbUniqueName` 或 `dbID` 结合使用。例如，要查看 `DBM` 数据库对象的唯一数据库名称、对象编号、KEEP 大小、缓存大小、命中次数和未命中次数，可以使用以下命令：\n\
  \nCellCLI> list flashcachecontent where dbUniqueName = 'DBM' and hitcount > 99 attributes\
  \ dbUniqueName, objectNumber, cachedKeepSize, cachedSize, hitcount, misscount\n\
