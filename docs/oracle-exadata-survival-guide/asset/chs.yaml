  \            Yes\n\n2621440 rows selected.\n\nSQL> select *\n  2  from v$mystat\n\
  \  3  where statistic# = (select statistic# from v$statname where name = 'cell physical\n\
  \      IO bytes saved by storage index');\n\nSID STATISTIC#      VALUE\n----------\
  \ ---------- ----------\n      1107        247 2281971712\n\nSQL>\n```\n\n对于第一个查询，大约跳过了\
  \ 1GB 的数据来提供记录计数；第二个查询额外跳过了 1GB 的表数据。从所示输出中并不明显，因为如前所述，显示的值是累积结果。您可能不需要知道每个查询跳过的字节数，因此累积计数可能正是您想要的。但是，对于未执行智能扫描的查询，累积计数也将保持不变，因此必须仔细关注`V$MYSTAT`查询的输出。如果您确实需要单独的节省数据，那么也可以生成这些结果；在这种情况下，不符合智能扫描条件的查询将返回\
  \ 0 字节总计。如前所述，脚本在查询之间重新连接；这产生了更好地说明存储索引在每个查询基础上提供的 I/O 节省的结果：\n\n```\nSQL> connect\
  \ bing/#######\nConnected.\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3 \
  \ from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\nSQL>\
  \ select *\n  2  from v$mystat\n  3  where statistic# = (select statistic# from\
  \ v$statname where name = 'cell physical\n      IO bytes saved by storage index');\n\
  \nSID STATISTIC#      VALUE\n---------- ---------- ----------\n      1233      \
  \  247 1080770560\n\nSQL> connect bing/#######\nConnected.\nSQL> select /*+ parallel(4)\
  \ */\n  2  chicken_id, chicken_name, suitable_for_frying\n  3  from chicken_hr_tab\n\
  \  4  where suitable_for_frying = 'Yes';\n\nCHICKEN_ID CHICKEN_NAME         SUI\n\
  ---------- -------------------- ---\n  38719703 Frieda               Yes\n  38719704\
  \ Edie                 Yes\n...\n  37973451 Eunice               Yes\n  37973452\
