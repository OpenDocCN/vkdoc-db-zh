  \ 247\n         DBM     227     0       1081344         173     77\n         DBM\
  \     268     0       1859584         770     25\n         DBM     271     0   \
  \    65536           298     5\n         DBM     272     0       65536         \
  \  383     4\n         DBM     421     0       2064384         8120    772\n   \
  \      DBM     424     0       589824          2391    63\n         DBM     425\
  \     0       122880          372     17\n         DBM     466     0       196608\
  \          612     37\n         DBM     469     0       131072          462    \
  \ 4\n         ...\n         DBM     48306   0       32768           242     120\n\
  \         DBM     48406   0       196608          102     12\n         DBM     48464\
  \   0       237568          116     110\n         DBM     48466   0       1220608\
  \         247     104\n         DBM     48663   0       802816          142    \
  \ 52\n         DBM     48705   0       917504          101     20\n         DBM\
