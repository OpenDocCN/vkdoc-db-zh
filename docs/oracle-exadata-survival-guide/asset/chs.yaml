  \n### ARCHIVE\n\n`HCC`压缩类型`ARCHIVE`无疑是在节省空间方面最激进的，但它也是为那些被指定为只读并被归档以供偶尔使用的数据而设计的。它当然不适用于频繁更新的表；因为空间节省会被为允许更新而解压数据以及在较低的`OLTP`级别重新压缩所抵消。我们将对标准`EMP`表进行`ARCHIVE\
  \ HIGH`压缩，看看能产生多少空间节省：\n\n```sql\nSQL> --\nSQL> -- Current storage for the EMP table\n\
  SQL> -- (this is simply a test table for this example)\nSQL> --\nSQL> select segment_name,\
  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  \nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                      65536\nDUMMY          \
  \                           65536\nEMP                                  713031680\n\
  EMP_IDX                             478150656\nSALGRADE                        \
  \        65536\n\nElapsed: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- Compress the table\
