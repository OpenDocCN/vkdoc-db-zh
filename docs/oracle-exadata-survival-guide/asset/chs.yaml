  数据加载的方式设定了`TALENT_CD`的最小值和最大值，导致存储索引无法忽略任何数据块，即使其中一些段并不包含目标值。\n\n为索引段存储的最小值和最大值并不保证目标值一定存在，仅表示该值在关联的表段中存在的概率很高。\n\
  \n尽管本例是特意构造以提供这种条件，但在生产系统中也可能发生，因为正常的数据变化（通过插入、更新和删除）可能会造成同样的情况。\n\n### 或许并非如此\n\
  \n数据聚簇对存储索引是否能提供任何益处有很大影响。在前面的例子中，我们非常小心地以一种使存储索引对查询有益的方式加载数据。感兴趣的`WHERE`子句中的值被加载，使得存储索引所操作的\
  \ 1MB 表段中的一个或多个可以被跳过。在下一个例子中，数据以相当快速和便捷的方式加载；初始的表填充导致包含感兴趣值（`SUITABLE_FOR_FRYING`为`'Yes'`）的行分散在整个表中，因此出现在每个\
  \ 1MB 的存储索引段中。随后使用简单的“`insert into . . . select from . . .`”语法加载数据，保留了这种分散性，使得存储索引对于给定查询基本上无用。（当“`cell\
  \ physical IO bytes saved by storage index`”统计值为 0 时，通常认为存储索引“未使用”，但这并不准确。存储索引确实被使用了；这一点毫无疑问，但它未能以减少\
  \ I/O 的形式提供任何益处，因为 Oracle 在搜索目标行时无法跳过任何 1MB 的数据段。）观察存储索引“键”数据分散在整个表的那次运行，可以看到以下结果：\n\
  \n```\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n\
  \  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\nSQL>\nSQL> select *\n  2\
  \  from v$mystat\n  3  where statistic# = (select statistic# from v$statname where\
  \ name = 'cell physical\n      IO bytes saved by storage index');\n\nSID STATISTIC#\
  \      VALUE\n---------- ---------- ----------\n      1304        247          0\n\
  \nSQL> select /*+ parallel(4) */\n  2  chicken_id, chicken_name, suitable_for_frying\n\
  \  3  from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCHICKEN_ID\
  \ CHICKEN_NAME         SUI\n---------- -------------------- ---\n  38699068 Pickles\
  \              Yes\n  38699070 Frieda               Yes\n  ...\n  10116134 Pickles\
  \              Yes\n  10116136 Frieda               Yes\n\n已选择 2621440 行。\n\nSQL>\n\
  SQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic# from\
  \ v$statname where name = 'cell physical\n      IO bytes saved by storage index');\n\
  \nSID STATISTIC#      VALUE\n---------- ---------- ----------\n      1304      \
  \  247          0\n\nSQL> select /*+ parallel(4) */\n  2  h.chicken_name, t.talent,\
  \ h.suitable_for_frying\n  3  from chicken_hr_tab h join chicken_talent_tab t on\
  \ (t.talent_cd = h.talent_cd)\n  4  where h.talent_cd = 5;\n\nCHICKEN_NAME     \
  \    TALENT                                   SUI\n-------------------- ----------------------------------------\
  \ ---\nCat                  Accountant                               No\nCat   \
  \               Accountant                               No\nCat               \
  \   Accountant                               No\nCat                  Accountant\
  \                               No\n...\nCat                  Accountant       \
  \                        No\nCat                  Accountant                   \
  \            No\n\n已选择 524288 行。\n\nSQL>\nSQL> select *\n  2  from v$mystat\n  3\
  \  where statistic# = (select statistic# from v$statname where name = 'cell physical\n\
  \     IO bytes saved by storage index');\n\nSID STATISTIC#      VALUE\n----------\
  \ ---------- ----------\n      1304        247          0\n\nSQL>\n```\n\n由于没有一个\
  \ 1MB 的段不包含被搜索的值，存储索引无法通知 Oracle 跳过其中任何一个，这反映在`V$MYSTAT`中“`cell physical IO bytes\
  \ saved by storage index`”统计信息的`VALUE`列上。（在 11.2.0.3 中，此事件的统计编号是 247，但最好还是直接按统计名称查询，因为\
  \ Oracle 可以也已经在新版本中为现有统计信息重新分配过统计编号。）再次强调，这并不意味着该存储索引未被使用；它确实被使用了；这一点毫无疑问，但它未能以减少\
  \ I/O 的形式提供任何益处。\n\n### 执行计划无法知晓\n\n执行计划不会报告存储索引的使用情况，因为坦白说，优化器不知道对于给定的查询是否会使用智能扫描。除了在`CELLSRV`级别启用跟踪之外，唯一确定的监控方法是通过“`cell\
  \ physical IO bytes saved by storage index`”统计信息。第 9 章将介绍如何启用`CELLSRV`跟踪；启动`CELLSRV`跟踪需要重启单元，这会导致存储索引段被丢弃。\n\
  \n回顾前面的查询，它们显示（和未显示）了存储索引节省的 I/O，将执行计划添加到生成的输出中可以验证优化器不会报告有关正在使用的存储索引的任何信息：\n\n\
  ```\nSQL> set autotrace on\nSQL>\nSQL> select /*+ parallel(4) */\n  2  h.chicken_name,\
  \ t.talent, h.suitable_for_frying\n  3  from chicken_hr_tab h join chicken_talent_tab\
  \ t on (t.talent_cd = h.talent_cd)\n  4  where h.talent_cd = 5;\n```\n\n\n\n## 存储索引使用分析\n\
