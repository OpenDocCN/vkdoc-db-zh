  DBM          I_USER1                                       33          4      32768\n\
  DBM          CON$                                         159         60      32768\n\
  DBM          CON$                                         447         67      98304\n\
  DBM          UNDO$                                         49          2      32768\n\
  DBM          C_COBJ#                                      4782        572    2129920\n\
  DBM          C_COBJ#                                      9077        984    3178496\n\
  DBM          C_COBJ#                                      8120        968    4358144\n\
  DBM          I_OBJ#                                       2320         65     557056\n\
  DBM          I_OBJ#                                       1323         17     327680\n\
  DBM          I_OBJ#                                       1742         30     327680\n\
  DBM          I_IND1                                        280         19     458752\n\
  DBM          I_IND1                                       1160         44     196608\n\
  DBM          I_IND1                                       1405         35     131072\n\
  DBM          I_CDEF2                                      6150        516     425984\n\
  DBM          I_CDEF2                                      1332         78     720896\n\
  DBM          I_CDEF2                                      3483        210    2031616\n\
  DBM          I_OBJ5                                      49088       2555    9732096\n\
  DBM          I_OBJ5                                      16742       1144    8192000\n\
  ...\n```\n\n在此示例中，`flashmon_ext` 表包含 16,202 行，因为数据是在所有三个可用的存储单元上收集的。这解释了输出中对象名称明显重复的原因；每个存储单元可以同时缓存相同的对象。即使对象名称可能重复，缓存大小、命中次数和未命中次数通常也是不同的。\n\
  \n发现 `object_id` 值在四十亿范围内并不罕见，而且这些 `object_ids` 不会与 `DBA_OBJECTS` 中的任何对象匹配。`object_ids`\
  \ 处于该范围的一个来源是 `V$FIXED_TABLE` 和 `GV$FIXED_TABLE` 视图；然而，`flashmon_ext` 表中列出的处于该范围的\
  \ `object_id` 值没有一个与这些对象中的任何一个匹配。在没有全局临时表的情况下，有问题的对象是撤销段。\n\n## 数据库服务器工具\n\n遗憾的是，在数据库层面没有太多可查看的内容。一个统计信息，“`cell\
  \ flash cache read hits`”，是唯一可用的。与其他指标一样，这是自实例在 `V$SYSSTAT` 中报告的启动以来以及当前会话在 `V$MYSTAT`\
  \ 中的持续时间内的累积值。衡量 SQL 语句的智能闪存缓存活动最简单的方法是在语句执行前后查询 `V$MYSTAT`。在 SQL*Plus 中执行此操作提供了将查询结果保存到变量中以供语句完成后使用的能力，如下所示：\n\
  \n```\nSQL> select statistic#, value\n  2  from v$mystat\n  3  where statistic#\
  \ in (select statistic# from v$statname where name = 'cell flash cache read hits');\n\
  \nSTATISTIC#      VALUE\n---------- ----------\n       605          1\n\nSQL>\n\
  SQL> select count(*)\n  2  from emp;\n\nCOUNT(*)\n--------\n       14\n\nSQL>\n\
  SQL> column   val new_value beginval\nSQL>\nSQL> select statistic#, value val\n\
  \  2  from v$mystat\n  3  where statistic# in (select statistic# from v$statname\
  \ where name = 'cell flash cache read hits');\n\nSTATISTIC#        VAL\n----------\
  \ ----------\n       605        855\n\nSQL>\nSQL> select count(*)\n  2  from emp;\n\
  \nCOUNT(*)\n--------\n       14\n\nSQL>\nSQL> column   val new_value endval\nSQL>\n\
  SQL> select statistic#, value val\n  2  from v$mystat\n  3  where statistic# in\
  \ (select statistic# from v$statname where name = 'cell flash cache read hits');\n\
  \nSTATISTIC#        VAL\n---------- ----------\n       605        857\n\nSQL>\n\
  SQL>\nSQL> select &endval - &beginval flash_hits\n  2  from dual;\n\nFLASH_HITS\n\
  ----------\n         2\n\nSQL>\n```\n\n### 性能表现\n\n作为平衡 I/O 子系统的一部分，智能闪存缓存提供了比非\
  \ Exadata 系统可衡量的性能改进。单元单块读取时间可以定期降至 1 毫秒或更低，这比使用固态硬盘 (SSD) 的非 Exadata 系统表现更为出色。主要区别在于\
  \ Exadata 处理更大 I/O 负载并维持此性能水平的能力。由于 Exadata 是一个平衡的系统，拥有匹配且经过调优的组件，在达到 CPU 和/或内存的物理极限之前，性能不会受到影响。\n\
  \n## 注意事项\n\n智能闪存缓存通过缓存频繁访问的表和索引块，提供了高 I/O 每秒速率的能力，允许直接从闪存中读取它们。\n\n智能闪存缓存由每个存储单元的\
  \ 4 个 Sun Flash PCIe 卡组成，每个卡具有 96GB 的闪存存储。对于具有 3 个存储单元的 Exadata 系统，可用的总闪存存储为 1.125TB。这些\
  \ PCIe 卡的预期寿命为两年，因为存储电容器会随时间推移而失去保持电荷的能力。根据 Sun 的说法，可以在不关闭存储单元的情况下单独更换这些卡。然而，Oracle\
  \ 建议在维护前关闭存储单元电源。\n\n智能闪存缓存是一种按单元缓存机制，针对频繁访问的数据进行了优化。对象是否将被考虑用于智能闪存缓存使用，部分取决于创建该对象时设置的\
  \ `CELL_FLASH_CACHE` 存储参数。\n\n写入操作不受此缓存影响。`CELLSRV` 执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后智能闪存缓存决定数据是否要被缓存，使磁盘写入与数据缓存过程无关。\n\
  \n维护了一个已缓存数据的内存中哈希表，因此 Oracle 可以快速确定所需的块是否可以在那里找到。该哈希表列出了未标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。\n\
  \n当源块自缓存数据写入后已更改、需要空间用于当前事务的 I/O、块被标记为 `KEEP` 但已超过额外的 `KEEP` 阈值而未使用，或者它们的生命周期已超过标准\
  \ LRU 阈值时，可能会驱逐缓存的块。\n\n每个配置的闪存磁盘有 32MB 的存储配置为智能闪存日志 (Smart Flash Log)；这总计每个存储单元\
  \ 512MB 的智能闪存日志存储。重做日志写入同时发送到磁盘和智能闪存日志。一旦日志写入器进程 (`LGWR`) 收到写入完成（无论是到重做日志还是智能闪存日志区域）的确认，事务处理就会继续。\n\
  \n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组；这样做需要调整现有智能闪存缓存的大小。可以通过重新配置一个、两个或所有可用存储服务器上的智能闪存缓存来创建一个或多个闪存磁盘集。选择的冗余级别将决定可用的存储空间；最大值为总可用空间的一半，最小值为总可用空间的三分之一。\n\
  \n从存储单元监控智能闪存缓存提供了比从数据库服务器监控更广的指标范围。一个指标，“`cell flash cache read hits`”，是数据库层闪存缓存活动的唯一指标。存储单元提供了\
  \ 30 多个记录智能闪存缓存活动的指标，但遗憾的是，每个单元都必须单独监控。可以编写存储单元监控脚本并在数据库中填充一个外部表，以便可以使用对象名称（而不是对象\
  \ ID）来识别缓存的段。\n\n\n\n# 第 5 章\n\n## 并行查询\n\n![image](img/frontdot.jpg)\n\n与 Exadata\
  \ 的其他领域不同，并行查询执行使用的是与非 Exadata 系统相同的 Oracle 11.2 版本功能。由于 Exadata 本质上是一个数据仓库系统，高效处理和加工数据仓库工作负载是其主要设计目标之一，并行查询处理因此成为一项重要特性。请记住，**智能扫描**和**下载处理**依赖于直接路径读取，这与并行查询从属进程使用的读取功能相同。在\
  \ 11.2 版本中，Oracle 对早期控制并行执行的尝试提供了三项改进。这些改进，结合 Exadata 的处理能力，使得此特性比早期数据库版本更易于管理、更具可扩展性，并且更不容易使服务器资源（如内存和\
  \ CPU）达到饱和。我们将讨论的第一项改进是并行语句排队。\n\n## 进入队列\n\n并行查询自 Oracle 第 7 版起就已可用，若谨慎使用，可显著提升语句性能。另一方面，若过度使用，它可能会让数据库服务器不堪重负。多个用户若都选择并行执行，会使\
  \ CPU 资源达到饱和，并行查询的优势便会成为并行查询的诅咒。直到 11.2 版本之前，都没有办法在同一系统上控制多用户的并行执行。随着并行语句排队的引入，这一状况得以改变。之所以实现这一功能，是因为\
  \ Exadata 是一个为处理混合工作负载而设计的系统，允许数据仓库和在线事务处理应用程序同时运行，并确保两者不会因对方而受损。通过并行语句排队，Exadata\
  \ 能够区分不同类型的工作负载，并且“约束”那些在多用户系统中原本会消耗过多资源的并行语句。\n\n### 传统方式\n\n为了说明并行语句排队如何改进了并行查询性能，有必要审视\
  \ Oracle 在早期版本中提供的用于管理此功能的工具。`parallel_adaptive_multi_user` 参数是一个相当强大的工具，但它会在运行时决定是否对语句进行并行化，从而导致性能波动。它还决定应为并行化查询启用多少个从属进程。在这种机制下，并行度可能会急剧下降，这取决于做出决定（即执行开始时）那一刻的系统资源使用情况。\n\
  \n一个语句上次执行时可能拥有 16 个或更多并行从属进程，而下次执行时可能一个都没有。请记住，一旦确定了并行度 (`DOP`)，它就无法更改；语句必须在分配的\
  \ `DOP`（可能为 1）下运行至完成。该语句也无法利用其执行期间释放的资源；如果在该语句串行执行期间有十个并行查询从属进程变为可用，它们也无法被重新利用以提供更高的\
  \ `DOP`，从而无法缩短执行时间。\n\n举个例子，假设你有一个语句，上次运行时被分配了 24 个并行查询从属进程，执行时间为 1 分钟。当下一次执行此语句时，活动出现短暂峰值，将其降级为串行操作。几秒钟后，峰值结束；该语句却卡住了，可能串行执行\
  \ 24 分钟或更长时间。从用户的角度看，这种看似不稳定的行为似乎毫无规律或原因，如此不一致的性能会导致用户不满，也会让开发者非常困惑和不快。\n\n### 新方法\n\
  \n并行自适应多用户是基于可用资源控制并行执行的一个良好开端，但 11.2 版本引入了并行语句排队，允许在资源不足时将并行执行挂起，直到有足够资源可用。\n\n\
  ![image](img/sq.jpg) **注意** 最好将 `parallel_adaptive_multi_user` 设置为 `FALSE`，以防止这两个功能相互冲突。当两者都启用时，我们观察到并行查询的执行时间会大大延长。\n\
  \n其工作原理其实很简单。通过将 `parallel_degree_policy` 设置为 `AUTO` 来启用此功能。接着，将 `parallel_servers_target`\
  \ 设置为你想要的并行从属进程数。简单之处在于，你只需运行查询；Oracle 会为你处理剩下的事。基本上，如果一个语句所需的并行从属进程数超过当前可用数量，它将被放入队列。一旦所需数量的从属进程被释放，该语句就会执行。\n\
  \n`V$SQL_MONITOR` 和 `GV$SQL_MONITOR` 视图报告已提交语句的执行状态；这些视图主要报告语句是 `DONE`（以某种形式）、`EXECUTING`，或者如果启用了并行语句排队，则是\
  \ `QUEUED`。有了这些信息，不难看出哪些语句在并行语句队列中等待。我们使用了来自 `demobld.sql` 脚本的标准 `EMP` 表，尽管它加载了非常大量的记录：\n\
  \n```\nSQL> select count(*)\n  2  from emp;\n\nCOUNT(*)\n\nSQL>\n```\n\n我们选择从 12\
  \ 个不同的会话中，对我们这个大型 `EMP` 表求平均薪资。然后，我们查询 `V$SQL_MONITOR`，以查看这些会话中有多少最终进入了队列。该查询产生以下输出：\n\
  \n```\nSQL> select sid, sql_id, sql_exec_id, sql_text\n  2  from v$sql_monitor monitor\n\
  \  3  where status = 'QUEUED'\n  4  order by 3;\n\nSID SQL_ID        SQL_EXEC_ID\
  \ SQL_TEXT\n---------- ------------- ----------- ------------------------------------\n\
  \      1532 5du23va3p3ad0    16777216 select avg(sal) from emp\n      1059 5du23va3p3ad0\
  \    16777217 select avg(sal) from emp\n      1628 5du23va3p3ad0    16777218 select\
  \ avg(sal) from emp\n       865 5du23va3p3ad0    16777219 select avg(sal) from emp\n\
  \       205 5du23va3p3ad0    16777220 select avg(sal) from emp\n      2199 5du23va3p3ad0\
  \    16777221 select avg(sal) from emp\n      1542 5du23va3p3ad0    16777222 select\
  \ avg(sal) from emp\n       159 5du23va3p3ad0    16777223 select avg(sal) from emp\n\
  \      1888 5du23va3p3ad0    16777224 select avg(sal) from emp\n      1234 5du23va3p3ad0\
  \    16777225 select avg(sal) from emp\n       705 5du23va3p3ad0    16777226 select\
  \ avg(sal) from emp\n\n11 rows selected.\n\nSQL>\n```\n\n`sql_exec_id` 基本上是一个运行编号，指示语句在队列中的位置。对于所有排队语句，`sql_exec_id`\
  \ 也可能相同（表示同时执行），前提是执行所需的并行资源总和不超过数据库可用的最大值。\n\n### 控制问题\n\n有时你可能希望对并行语句排队的行为进行一些控制。如果你只是将其打开并让它运行，它是一个先进先出\
  \ (`FIFO`) 队列。可以使用提示 (`hint`) 绕过队列。即使数据库级别未启用该功能，也仍然可以使用并行语句排队。\n\n有两个可用参数可以影响并行语句排队，其中最重要的是\
  \ `parallel_servers_target`。此参数的值设置了 Oracle 在将语句放入队列之前可以运行的并行服务器进程数。计算默认值的公式如下：\n\
  \n```\n((4*cpu_count)*parallel_threads_per_cpu)*活动实例数\n```\n\n给定一台 Exadata X3-2，其设置如下：\n\
  \n`cpu_count` 24\n\n`parallel_threads_per_cpu` 4\n\n以及两个活动实例，默认设置将计算如下：\n\n```\n\
  ((4*24)*4)*2 = 768\n```\n\n\n\n## Oracle 并行查询执行：参数与自动并行度（Auto DOP）\n\n这个值通常远高于您实际想要设置的值；按此计算，其意图是为并行查询进程利用所有可用资源。此外，过高的设置会严重影响\
  \ OLTP 事务，因为如果一个运行时间长、资源消耗大的并行查询占用了可用的 CPU 和内存，这些事务可能会因资源匮乏而无法进行。\n\n与 `pga_aggregate_target`\
  \ 类似，此参数设置的是一个目标值，而非硬性限制。实际运行的并行服务器进程数量可能会超过该参数的初始配置值。这是因为分配给一条语句的并行从属进程数量可能高达 DOP（并行度）设置的**两倍**。例如，假设一个系统的\
  \ `parallel_servers_target` 设置为 4，而自动并行度（Auto DOP）计算出的并行度也为 4。那么，该语句可能最多有 8 个并行查询进程为其服务，这超过了目标设定值。并行查询进程的分配部分取决于可用资源，因此偶尔超过\
  \ `parallel_servers_target` 设置值并不是问题。该语句最终可能会进入并行语句队列，但它不会运行失败，因为它使用的并行查询从属进程数量虽然超过了\
  \ `parallel_servers_target` 参数所暗示的允许值。\n\n影响并行语句排队的第二个参数是一个隐藏参数：`_parallel_statement_queuing`。该参数的值为\
  \ `TRUE` 或 `FALSE`，当 `parallel_degree_policy` 设置为 `AUTO` 时，默认值为 `TRUE`。它可以独立于 `parallel_degree_policy`\
  \ 进行设置，以启用或禁用此功能。\n\n即使启用了并行语句排队，也可以通过一个提示（hint）完全绕过队列。`NO_STATEMENT_QUEUING` 提示允许您立即执行那些原本会被放入队列的并行查询。检查队列寻找它们是徒劳的，因为它们不会以“排队”状态出现。查询与\
  \ `V$SESSION`/`GV$SESSION` 相关联的 `V$SQL`/`GV$SQL` 将揭示它们确实正在运行。它们不仅跳过了队列，而且还能产生超过\
  \ `parallel_servers_target` 设置值的并行查询从属进程。\n\n如果您没有启用并行语句排队，仍然可以使用另一个提示来启用它：`STATEMENT_QUEUING`。如果在语句开始执行时并行资源稀缺，该提示会将语句放入队列。\n\
  \n### 必要设置\n\n除了我们刚刚介绍的并行语句排队功能，Oracle 还提供了自动并行度（Auto DOP）和内存中并行执行功能。当 `parallel_degree_policy`\
  \ 设置为 `AUTO` 时，这三项功能将全部启用。自动并行度允许数据库基于逐个查询来计算并行度；我们将在单独的章节中更详细地讨论这一点。这是需要稍加努力才能启动的功能，因为如果未对\
  \ I/O 系统进行校准，Oracle 将不会激活此功能。\n\n我们将在本章后面更详细地讨论 I/O 校准。现在您需要知道，这不是一项应在业务执行时段运行的任务。\n\
  \nI/O 校准只是并行查询处理配置的一部分；有几个数据库初始化参数控制着并行查询执行的某些方面。这些参数、其设置以及它们影响的功能或并行查询执行的方面列于表\
  \ 5-1 中。\n\n**表 5-1.** 影响并行查询执行的参数\n\n| 名称 | 默认值 | 描述 |\n| --- | --- | --- |\n|\
  \ `parallel_adaptive_multi_user` | `TRUE` | 为多用户流启用自适应并行度设置。 |\n| `parallel_automatic_tuning`\
  \ | `FALSE` | 为并行执行参数启用智能默认值。 |\n| `parallel_degree_limit` | `CPU` | 对并行度的限制。取值范围包括\
  \ CPU、I/O 和大于等于 2 的整数值。 |\n| `parallel_degree_policy` | `MANUAL` | 用于计算并行度的策略（MANUAL/LIMITED/AUTO）。\
  \ |\n| `parallel_execution_message_size` | `16384` | 并行执行的消息缓冲区大小。 |\n| `parallel_force_local`\
  \ | `FALSE` | 强制在单实例上执行。 |\n| `parallel_instance_group` |  | 用于所有并行操作的实例组。可以将并行操作限制在可用\
  \ RAC 实例的一个子集中。 |\n| `parallel_io_cap_enabled` | `FALSE` | 启用基于 I/O 带宽的 DOP 上限。\
  \ |\n| `parallel_max_servers` | `240` | 每个实例的最大并行查询服务器数。 |\n| `parallel_min_percent`\
  \ | `0` | 并行查询所需的最小线程百分比。 |\n| `parallel_min_servers` |  | 每个实例的最小并行查询服务器数。 |\n\
  | `parallel_min_time_threshold` | `AUTO` | 超过此阈值的执行计划有资格被并行化（以秒为单位）。也可以设置为数值，包括\
  \ 0。 |\n| `parallel_servers_target` | `240` | 实例目标（以并行服务器数量计）。 |\n| `parallel_threads_per_cpu`\
  \ | `2` | 每个 CPU 的并行执行线程数。用于各种并行查询计算。 |\n\n并行语句排队和内存中并行执行依赖于 `parallel_servers_target`\
  \ 和 `parallel_min_time_threshold` 参数设置。我们在本章开头已经讨论了并行语句排队；内存中并行执行将在其专门章节中讨论。\n\n\
  ### 我的朋友“自动”（Auto）\n\n自动并行度（Auto DOP）是 Oracle 11.2 版本中引入的并行操作方面的一个变革。在之前的数据库版本中，并行操作依赖于查询级别的提示或所用对象的\
  \ `DEGREE` 和 `INSTANCES` 设置。一个不幸的现实是，对于一个给定对象，单一的 DOP 设置几乎不可能在所有时间都适用于所有查询。要找出使查询执行比串行执行更高效、且不会对其他查询和语句产生不利影响的实用\
  \ DOP 值，是一个耗时的试错过程。这要求开发团队了解所使用的平台以及语句执行时系统将承受的工作负载。DOP 的另一个问题是：它无法在语句执行期间更改。自动并行度正是为了克服此类问题而设计的，并且它出色地完成了任务。\n\
  \n### 校准我\n\n当启用并激活后，自动并行度会使 Oracle 评估每条语句，以确定是否应并行运行。一旦做出该决定，便会设定 DOP。\n\n![image](img/sq.jpg)\
  \ **注意** 必须注意，仅仅启用自动并行度并不会使其工作；它需要通过在每个您希望自动并行度可用的数据库中运行 I/O 校准来激活。\n\n优化器会评估串行执行时间，通常情况下，如果该估算时间超过了\
  \ `parallel_min_time_threshold` 的设置值，语句将被并行执行。默认情况下，此参数设置为 `AUTO`，提供 10 秒的阈值。可以在系统级别或会话级别更改此参数，以实现更低或更高的并行触发阈值。\n\
  \n\n一个提供的包 `DBMS_RESOURCE_MANAGER` 包含了 `CALIBRATE_IO` 过程，该过程用于在集群上的所有 RAC 实例中生成随机的只读工作负载。此过程接受五个参数：两个输入值（磁盘数量和预估的最大磁盘延迟）以及三个输出变量，用于接收计算得出的最大每秒\
  \ I/O 次数、最大每秒兆字节数和计算出的延迟。可以使用匿名 PL/SQL 块来调用此过程并返回计算得到的指标，如下所示：\n\n```\nSet serveroutput\
  \ on size 1000000\nDeclare\n        Calc_lat        number;\n        Calc_iops \
  \      number;\n        Calc_mbps       number;\nBegin\n        Dbms_resource_manager.calibrate_io(&dsks,&maxlat,\
  \ Calc_iops, Calc_mbps, Calc_lat);\n        Dbms_output.put_line('Max IOPS     \
  \     : '||Calc_iops);\n        Dbms_output.put_line('Max mbytes-per-sec: '||Calc_mbps);\n\
  \        Dbms_output.put_line('Calc. latency     : '||Calc_lat);\nEnd;\n/\n```\n\
  \n如本章前面所述，在激活自动 DOP 之前，必须校准 I/O 系统。对于在 Exadata 系统上运行的每个不同数据库，都必须执行此操作。\n\n![image](img/sq.jpg)\
  \ **注意** 再怎么强调都不为过：I/O 校准是一项资源密集型操作，不应在正经历高负载的系统上运行。这是一项“下班后”操作，运行大约需要 15 分钟或更长时间。当自动\
  \ DOP 功能生效时，你的耐心将会得到回报。\n\n### 检查校准状态\n\n视图 `V$IO_CALIBRATION_STATUS` 会报告此校准是否已经运行。需要校准的数据库在查询\
  \ `V$IO_CALIBRATION_STATUS` 时将显示以下结果：\n\n```\nSQL> select *\n  2  from v$io_calibration_status;\n\
  \nSTATUS        CALIBRATION_TIME\n------------- -----------------------------------------------------------\n\
  NOT AVAILABLE\n\nSQL>\n```\n\n在未运行 I/O 校准的数据库上，本应并行执行的查询将会串行执行。当启用 autotrace 时，执行计划会立即返回一条关于自动\
  \ DOP 计算的信息性消息，在查询执行后可见：\n\n```\nSQL> select count(*)\n  2  from dba_objects\n \
