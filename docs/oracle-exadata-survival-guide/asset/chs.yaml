  \          0          0           0\n------- ------  -------- ---------- ----------\
  \ ---------- ----------  ----------\ntotal        2      0.01       0.00       \
  \   0          1          0           0\n\nMisses in library cache during parse:\
  \ 1\nOptimizer mode: ALL_ROWS\nParsing user id: SYS   (recursive depth: 1)\nNumber\
  \ of plan statistics captured: 1\n\nRows (1st) Rows (avg) Rows (max)  Row Source\
  \ Operation\n---------- ---------- ----------  ---------------------------------------------------\n\
  \         0          0          0  DELETE  RESOURCE_IO_CALIBRATE$ (cr=1 pr=0 pw=0\
  \ time=26 us)\n         0          0          0  TABLE ACCESS FULL RESOURCE_IO_CALIBRATE$\
  \ (cr=1 pr=0 pw=0 time=21 \n                                  us cost=2 size=0 card=1)\
  \ \n********************************************************************************\n\
  ```\n\n## 实现它\n\nI/O 校准并非启用自动 DOP 的唯一因素，因为参数 `parallel_degree_policy` 必须设置为 `AUTO`\
  \ 或 `LIMITED`。默认情况下，它被设置为 `MANUAL`，这会禁用 Oracle 11.2 版本的三个并行功能：自动 DOP、并行语句排队和内存中并行执行。这三个可用的设置及其对这些功能的影响列在表\
  \ 5-2 中。\n\n表 5-2. `parallel_degree_policy` 设置如何影响并行执行\n\n| 设置 | 影响 |\n| --- | ---\
  \ |\n| `MANUAL` | 禁用所有三个新的并行查询功能。导致并行处理回退到先前版本的行为，仅当语句有提示或被查询的对象是创建时或被更改为具有大于默认值\
  \ 1 的 `DEGREE` 时，才会并行化语句。 |\n| `LIMITED` | 仅启用自动 DOP；其余两个新的并行功能被禁用。在此设置下，只有针对与 `DEGREE`\
  \ 为 `DEFAULT` 相关联的对象的查询才会被考虑。 |\n| `AUTO` | 所有三个新的并行功能都被启用。无论访问的对象上的 `DEGREE` 设置如何，查询和语句都将被评估是否进行并行执行。\
  \ |\n\n另一个影响其中一个新功能的“隐藏”参数是 `_parallel_statement_queueing`。当设置为 `TRUE`（默认值）时，排队功能被启用，这允许\
  \ Oracle 在运行时决定并行语句是否可以执行，或者是否需要等待队列中直到有足够资源可用。还有一个“隐藏”参数 `_parallel_cluster_cache_policy`，它控制内存中并行执行是否可用。设置为\
  \ `cached` 会启用此功能。在 Exadata 上，此功能可能不太有用；当它启用时，扫描缓冲区缓存时将无法使用 Smart Scan 优化。这是一个选择：是对缓冲区缓存使用\
  \ Smart Scan 的全部功能，还是使用内存中并行执行。这主要适用于数据仓库工作负载，因为 OLTP 处理很少需要并行处理。但您应该意识到，当配置了内存中并行执行时，访问缓冲区缓存的\
  \ Smart Scan 可能会受到影响。\n\n当 `parallel_degree_policy` 设置为 `AUTO` 时，对象是否以大于 1 的 `DEGREE`\
  \ 创建就不重要了，因为数据库决定哪些语句并行运行、使用多少并行从属进程执行，甚至决定涉及多少个 RAC 节点参与该过程。这就是自动 DOP 的魅力和强大之处。\n\
  \n### 在内存中执行\n\n第三个并行功能，内存中并行执行，可以在不使用 Smart Scan 时提高查询性能。它设计为使用缓冲区缓存，具有集群感知能力，并且可以利用所有可用的\
  \ RAC 节点。当 `parallel_degree_policy` 设置为 `AUTO` 时，它即被启用。其他可以影响内存中并行执行的参数有 `parallel_servers_target`、`parallel_min_time_threshold`、`parallel_degree_limit`\
  \ 和 `parallel_degree_policy`。`parallel_servers_target`、`parallel_degree_limit` 和\
  \ `parallel_min_time_threshold` 的较低值会使内存中更有可能运行并行执行。此外，可以将 `parallel_force_local`\
  \ 参数设置为 `TRUE`，将可用的并行资源限制在本地服务器上，这也有利于内存中并行执行。影响此改进的非并行参数是 `sga_max_size` 和 `sga_target`，它们控制着缓冲区缓存大小以及\
  \ SGA 的其他区域。更大的缓存大小可以在内存中容纳更大的表，这也使得此功能更有可能运行。将这些参数设置为较低值不能保证此功能会运行，但如果缩减这些设置，您使用它的机会可能会更大。\n\
  \n虽然内存确实比磁盘快得多，但 Smart Scan 旨在快速高效地访问磁盘上的数据。列投影和谓词过滤大大减少了数据库层处理的数据量，从而加快了查询速度。但如果所有数据都能在内存中加载和处理，那么处理相同数据量所需的时间将只是从磁盘读取处理时间的一小部分。\n\
  \n内存中并行执行有其好处。\n\n\n## Oracle Exadata 并行查询处理特性详解\n\n### 内存并行执行的优缺点与考量\n\n*   物理\
  \ I/O 实际上被消除。\n*   数据库服务器与存储单元之间的流量被消除。\n*   与磁盘或闪存存储相比，内存访问的延迟要低得多。\n\n然而，这些益处不能孤立看待，因为必须考虑可用的\
  \ CPU 和内存资源。在智能扫描执行期间，本应卸载到存储单元的功能（数据过滤和数据解压缩）现在需要由数据库服务器来执行。这可能增加处理数据所需的 CPU 周期，并且如果没有存储服务器额外的\
  \ CPU 和内存，可能会给数据库服务器性能带来压力。你有可能拥有这些富余资源，也同样有可能没有。是否使用此功能是一个只有你在仔细考虑所有事实后才能做出的决定。\n\
  \n我们处理过的所有 Exadata 系统均未使用内存并行执行。这很可能是一件好事，如果大多数查询都使用智能扫描，因为如前所述，所有智能扫描优化都不可用。是的，它会消除磁盘\
  \ I/O，但它也消除了存储服务器本可提供的、用于数据过滤、解压缩和其他操作的额外 CPU。尽管理念上看起来不错，但在 Exadata 系统上，使用内存并行执行可能比使用智能扫描效率更低，因为在智能扫描中，存储服务器分担工作负载并减少了数据库层处理的数据量。此外，能从中获益最大的查询，恰恰是那些通常不会使用存储索引的查询，它们会将整张表放入内存。在大量查询和语句不使用智能扫描、且表的大小足以完全放入缓冲区缓存的\
  \ Exadata 系统上，内存并行执行可以通过消除磁盘 I/O（以物理读的形式）并转为内存访问（通过逻辑读）来提升性能。\n\n### 如何禁用内存并行执行\n\
  \n如前所述，当 `parallel_degree_policy` 设置为 `AUTO` 时，所有三项并行功能都将启用。如果你想禁用内存并行执行，可以通过以下两种方式之一完成：要么将\
  \ `parallel_degree_policy` 设置为 `MANUAL`（此设置将禁用所有功能），要么将隐藏参数 `_parallel_cluster_cache_policy`\
  \ 设置为 `ADAPTIVE`，后者会保留自动并行度和并行语句排队功能的可用性。当自动并行度激活时，`_parallel_cluster_cache_policy`\
  \ 将被设置为 `CACHED`。\n\n### 在 Exadata 上实施的挑战\n\n内存并行执行并非在 Exadata 上最容易实现的功能。我们尚未在我们的系统上成功启用它，即使将\
  \ `parallel_min_time_threshold`、`parallel_servers_target` 和 `parallel_degree_limit`\
  \ 设置为异常低的阈值。它还要求整张表必须能放入缓冲区缓存，这并非易事。此外，数据库服务器在没有智能扫描协助的情况下执行所有工作，无法消除可能的数据大容量，因此智能扫描可能是一条更好的路径。再次强调，这是一个只有你在考虑了智能扫描和内存并行执行的所有方面，以及系统当前工作负载后，才能做出的决定。\n\
  \n## 注意事项\n\n并行查询处理并非 Exadata 独有；它使用的是任何 Oracle 11.2 安装都可用的相同功能。它对 Exadata 特别有益的原因在于，Exadata\
  \ 从一开始就是为数据仓库而设计的，而并行处理在数据仓库中被频繁使用。\n\n并行查询处理有三个改变其性能的新特性。它们是自动并行度、并行语句排队和内存并行处理。其中，前两项对\
  \ Exadata 提供了最大的益处。\n\n### 自动并行度\n\n自动并行度正如其名：它根据可用资源和系统负载自动计算并行度。默认情况下不启用。必须将初始化参数\
  \ `parallel_degree_policy` 设置为 `AUTO` 或 `LIMITED` 才能启用自动并行度。默认情况下，此参数设置为 `MANUAL`。当此参数设置为\
  \ `AUTO` 时，所有三项新的并行查询特性都将被启用。\n\nI/O 校准是使自动并行度正常工作的必要条件，使用提供的过程 `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`\
  \ 来生成和记录校准数据。尽管执行起来相当简单，但它是一项耗时且资源密集型的操作，不应在负载重的系统上尝试。\n\nI/O 校准结果可在 `V$IO_CALIBRATION_STATUS`\
  \ 和 `DBA_RSRC_IO_CALIBRATE` 视图中查看。结果存储在 `RESOURCE_IO_CALIBRATE$` 表中。当查询 `V$IO_CALIBRATION_STATUS`\
  \ 返回状态为 `NOT AVAILABLE` 时，表明尚未运行 I/O 校准。状态为 `COMPLETED` 以及完成日期则证明存在有效的校准数据。\n\n\
  启用自动并行度后可能会出现性能问题，例如查询整体完成时间变长。可以通过从 `RESOURCE_IO_CALIBRATE$` 表中删除来清除 I/O 校准统计信息。这并不像乍看起来那么激烈，因为\
  \ `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 过程在生成新校准数据之前会先执行此删除操作。\n\n### 并行语句排队\n\n\
  并行语句排队通过以下初始化参数启用：\n\n```\nparallel_degree_policy\nparallel_servers_target\n```\n\
  \n请记住，将 `parallel_degree_policy` 设置为 `AUTO` 会启用所有三项新的并行查询功能，这是启用并行语句排队的唯一方式。`parallel_servers_target`\
  \ 应设置为允许的并行从属进程的期望数量。然而，它并非硬性限制，因为在某些情况下可能会超过此设置，因为自动并行度可以设置分配的 DOP 两倍的并行从属进程数。这种情况并不常见，所以即使发生也不是问题。\n\
  \n`V$SQL_MONITOR` 和 `GV$SQL_MONITOR` 视图记录哪些语句处于并行语句队列中。状态为 `QUEUED` 表示哪些语句正在队列中等待。除了报告队列中的语句外，这些视图还记录了\
  \ `SQL_EXEC_ID`，它指示了排队语句的执行顺序。通常，这是顺序分配的，但如果几个排队的语句可以并行同时执行，`SQL_EXEC_ID` 可能对多个条目显示相同的值。\n\
  \n可以控制并行语句排队。更改 `parallel_servers_target` 的值会影响语句何时进入队列。较低的 `parallel_servers_target`\
  \ 值可能导致更多语句排队，因为可用的并行查询资源减少了。增加此值可以在队列填满之前允许更多语句处理。另一种控制排队的方法是通过提示。如果使用 `NO_STATEMENT_QUEUING`\
  \ 提示，则可以绕过该语句的并行语句排队。如果可用资源低到足以使该语句被放入队列，那么带有此提示的语句将绕过语句队列，并立即以计算出的 DOP 运行。这是 `parallel_servers_target`\
  \ 的值可能被超过的一种情况。\n\n# 第 6 章 压缩\n\n如果未启用并行语句排队（通过将 `parallel_degree_policy` 设置为 `LIMITED`\
  \ 或 `MANUAL`，或者将隐藏参数 `_parallel_statement_queuing` 设置为 `FALSE`），仍可使用 `STATEMENT_QUEUING`\
  \ 提示对选定的语句进行排队。使用此提示会使 Oracle 的行为如同启用了并行语句排队，但仅影响使用此提示的语句。当你只想为你选择的、其并行执行可能阻碍更重要的业务语句处理的语句启用并行语句排队时，这非常有用。\n\
  \n内存中并行执行是第三个新特性，它可能不是大多数在 Exadata 上运行的查询会利用的功能。该特性有其优点和缺点。优点是消除了磁盘 I/O、数据库服务器与存储单元之间的通信流量，并且内存的延迟远低于磁盘或闪存存储。在\
  \ Exadata 上的缺点是，由于消除了磁盘 I/O，Smart Scan 优化不再可用，数据库服务器必须承担所有数据过滤和解压缩的工作，并且由于存储服务器不再参与查询处理，可用的\
  \ CPU 数量也减少了。\n\n可以通过将另一个隐藏参数 `_parallel_cluster_cache_policy` 设置为 `ADAPTIVE`，或者将\
  \ `parallel_degree_policy` 设置为 `MANUAL` 来禁用内存中并行执行，后者会关闭所有新的并行查询特性。\n\n内存中并行执行在\
  \ Exadata 系统中很少见。可能存在某个查询从内存中并行执行中获益比使用 Smart Scan 更多的情况，但在我们支持的 Exadata 系统上尚未遇到过。\n\
  \n![image](img/frontdot.jpg)\n\nOracle 11.2 版本提供了高级压缩，这是一种通过使用令牌（可代表更长字符串和值的助记符）压缩常见值和字符串来减少数据总体大小的方法。在不使用\
  \ Exadata 类型存储的系统上提供两种压缩类型：基础压缩和 OLTP 压缩。基础压缩无需高级压缩许可即可使用。第三种压缩选项，混合列压缩（HCC），可在\
  \ Exadata 系统和使用 Exadata 类型存储的非 Exadata 系统上使用。它提供两个基本级别：QUERY 和 ARCHIVE。\n\n这些压缩选项可节省空间，将表大小压缩到几乎未压缩大小的一半。当然，这些特性并非没有代价，其行为也可能不如预期。谨慎使用时，可以减少存储需求，有时效果显著。正是知道何时使用压缩以及实现哪个压缩级别，才使得这项功能既实用又有价值。\n\
  \n## 我可以如何压缩你\n\n压缩有三个通用级别：基础压缩、OLTP 压缩和混合列压缩（我们将之称为 HCC，适用于 Exadata）。到目前为止，其中最激进的是\
  \ HCC，但它可能会给初学者带来一些意外。另外请注意，对于非分区表，一次只能使用一种高级压缩选项；可以是 OLTP 压缩或 HCC，但不能同时使用两者。分区表的不同之处在于每个分区可以使用不同的压缩方法。例如，按日期分区的当前分区可以使用\
  \ OLTP 压缩以使更新和插入更省时；未来六个月的分区可以使用 QUERY LOW 压缩；而存档分区（超过六个月的分区）可以使用 ARCHIVE HIGH 压缩，以便为不再更新的分区节省空间。\n\
  \n### 基础压缩\n\n基础压缩名副其实；它简单且相当快速地压缩表数据，从而显著节省空间：\n\n```sql\nSQL> select segment_name,\
  \ bytes\n  2  from user_segments;\n\nSEGMENT_NAME                              \
  \ BYTES\n----------------------------------- ----------\nDEPT                  \
  \                     65536\nSALGRADE                                   65536\n\
  DUMMY                                      65536\nEMP                          \
  \        713031680\n\nSQL> alter table emp move compress;\n\nTable altered.\n\n\
  SQL> select segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME      \
  \                         BYTES\n----------------------------------- ----------\n\
  DEPT                                       65536\nSALGRADE                     \
  \              65536\nDUMMY                                      65536\nEMP    \
  \                              184549376\n```\n\n要影响当前数据以及未来的插入和更新，我们必须移动表并对其进行压缩。一个简单的\
  \ `alter table emp compress;` 命令会将表设置为压缩，但当前数据将保持不变，无法立即节省空间。移动操作使 Oracle 能够压缩表中的现有数据。\n\
  \n##### OLTP 压缩\n\nOLTP 压缩是需要单独许可才能使用的高级压缩选项之一。与基础压缩不同，OLTP 压缩确实能在更新后自动进行压缩；但是，它是以逐块（block-by-block）的批量类型操作执行的。它同样能在存储层上提供可观的节省：\n\
  \n```sql\nSQL> select segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME\
  \                               BYTES\n----------------------------------- ----------\n\
  EMP                                  721420288\nDEPT                           \
  \            65536\nSALGRADE                                   65536\nDUMMY    \
  \                                  65536\n\nSQL> alter table emp move compress for\
  \ oltp;\n\nTable altered.\n\nSQL> select segment_name, bytes\n  2  from user_segments;\n\
  \nSEGMENT_NAME                               BYTES\n-----------------------------------\
  \ ----------\nEMP                                  201326592\nDEPT             \
  \                          65536\nSALGRADE                                   65536\n\
  DUMMY                                      65536\n\nSQL>\n```\n\n使用 OLTP 压缩后的大小比基础压缩稍大，但你可以获得更新块填满后最终重新压缩的额外好处。当更新的块达到压缩阈值时，它们会使用\
  \ OLTP 算法进行压缩，因此无需手动重新压缩表。这当然会使更新后的表处于压缩块和未压缩块的*混合状态*，但一旦达到压缩条件，未压缩的块将返回到压缩状态。\n\
  \n### 混合列压缩 (HCC)\n\n混合列压缩是一种仅适用于驻留在 Exadata 存储上的表的压缩选项。（除了 Exadata，还包括 Axiom、SPARC\
  \ SuperCluster 和 Sun ZFS Storage Appliance。）如果你在任何其他系统上尝试此操作，将收到以下信息性消息：\n\n```sql\n\
  SQL> alter table emp move compress for query high;\nalter table emp move compress\
  \ for query high\n            *\nERROR at line 1:\nORA-64307: hybrid columnar compression\
  \ is not supported for tablespaces on this storage type\n\nSQL>\n```\n\n短语 `this\
  \ storage type` 指的是本节开头所列存储类型之外的任何存储。考虑到这一点，我们要提到，当目标数据库不在 Exadata 上或未使用 Exadata\
  \ 存储时，HCC 可能会成为 Data Guard 的*障碍*。受影响的 Data Guard 实例中的表在事务应用之前将需要解压缩，因此所有节省的空间都将丢失。对于启用了\
  \ HCC 的数据库备份也是如此。将使用 HCC 压缩的备份恢复到非 Exadata 系统时，将需要解压缩这些表。如果存储需求是根据 Exadata 端确定的，这很容易导致在解压缩所有表之前存储空间就已耗尽。\n\
  \n# HCC\n\nHCC 的工作原理与本章前面提到的两种选项不同，因为它会将数据重新组织为压缩单元（`CU`）。其工作原理将在下一节讨论。目前，我们将专注于实现\
  \ HCC 的四种形式以及它们之间的差异。HCC 标志下有两种基本类型：`QUERY`和`ARCHIVE`，每种类型都有`HIGH`和`LOW`选项。我们将首先讨论属于`QUERY`类型的第一组\
  \ HCC 选项，然后讨论`ARCHIVE`类型。\n\n### QUERY\n\n这种类型不如`ARCHIVE`激进，但它最初压缩数据的程度仍然高于`OLTP`压缩。我们首先对`EMP`表进行`QUERY\
  \ HIGH`压缩：\n\n```sql\nSQL>\nSQL> --\nSQL> -- Current storage for the EMP table\n\
  SQL> -- (this is simply a test table for this example)\nSQL> --\nSQL> select segment_name,\
  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  \nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                      65536\nDUMMY          \
  \                           65536\nEMP                                  713031680\n\
  EMP_IDX                             478150656\nSALGRADE                        \
  \        65536\n\nElapsed: 00:00:00.82\nSQL>\nSQL> --\nSQL> -- Compress the table\
  \ for query high (use HCC)\nSQL> --\nSQL> -- Note elapsed time to compress\nSQL>\
  \ --\nSQL> alter table emp move compress for query high;\n\nTable altered.\n\nElapsed:\
  \ 00:00:35.65\nSQL>\nSQL> --\nSQL> -- Index is now invalid\nSQL> --\nSQL> -- Must\
  \ rebuild to make it usable\nSQL> --\nSQL> -- Note elapsed time\nSQL> --\nSQL> alter\
  \ index emp_idx rebuild;\n\nIndex altered.\n\nElapsed: 00:01:13.70\nSQL>\nSQL> --\n\
  SQL> -- Current compression type, storage for table/index\nSQL> -- initially after\
  \ compression is enabled\nSQL> --\nSQL> select table_name, compression, compress_for\n\
  \  2  from user_tables;\n\nTABLE_NAME                   COMPRESS COMPRESS_FOR\n\
  ------------------------------ -------- ------------\nDEPT                     \
  \    DISABLED\nBONUS                        DISABLED\nSALGRADE                 \
  \    DISABLED\nDUMMY                        DISABLED\nEMP                      \
  \    ENABLED  QUERY HIGH\n\nElapsed: 00:00:00.20\nSQL>\nSQL> select segment_name,\
  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  \nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                      65536\nDUMMY          \
  \                           65536\nEMP                                    8388608\n\
  EMP_IDX                             260046848\nSALGRADE                        \
  \        65536\n\nElapsed: 00:00:00.03\nSQL>\n```\n\n结果大小比`Basic`或`OLTP`压缩选项都要小得多。即使在`QUERY\
  \ LOW`压缩率下，其大小仍然小于`OLTP`压缩所能提供的：\n\n```sql\nSQL>\nSQL> --\nSQL> -- Initial storage\n\
  SQL> --\nSQL> select segment_name, sum(bytes) total_space\n  2  from user_segments\n\
  \  3  group by segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n\
