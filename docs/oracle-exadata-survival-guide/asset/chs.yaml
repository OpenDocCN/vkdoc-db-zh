  \ SQL 语句列表中，并未包含此查询文本。\n\n### NULL 值优化\n\n在 Exadata 中，对`NULL`值的搜索处理方式略有不同，但效率更高。与非`NULL`的表数据（通过列出列的最小值和最大值建立索引）不同，`NULL`值的存在是通过存储索引中为每个列设置的一个位来标记的。包含索引列为`NULL`的存储区域会设置此位，这使得查找`NULL`值成为一个非常快的操作，因为\
  \ Oracle 只需要搜索`NULL`指示位显示存在`NULL`值的段。同样，避免`NULL`值的效率也很高，因为 Oracle 只需要读取`NULL`指示位未设置的表段。\n\
  \n通过另一个示例来证明这一点，它沿用之前的数据加载策略，将期望值聚集在一起，以从存储索引中获得最大的“性价比”。在数据中加入了`NULL`值，使得`SUITABLE_FOR_FRYING`列现在存在三个值。已启用计时以显示每次查询执行的耗时，因此可以记录每个查询的总时间，并通过在查询之间重新连接来重置会话级统计信息，从而更容易地看到每个搜索条件跳过了多少字节：\n\
  \n```sql\nSQL>\nSQL> connect bing/#########\nConnected.\nSQL>\nSQL> set timing on\n\
  SQL>\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n\
  \  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\n已用时间: 00:00:00.80\nSQL>\n\
  SQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic# from\
  \ v$statname where name = 'cell physical IO bytes saved by storage index');\n\n\
  SID      STATISTIC#           VALUE\n--------------- --------------- ---------------\n\
  \           1111             247       566501376\n\n已用时间: 00:00:00.00\nSQL>\nSQL>\
  \ connect bing/#########\nConnected.\nSQL>\nSQL> set timing on\nSQL>\nSQL> select\
  \ /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n  4  where suitable_for_frying\
  \ is null;\n\nCOUNT(*)\n\n已用时间: 00:00:00.23\nSQL>\nSQL> select *\n  2  from v$mystat\n\
  \  3  where statistic# = (select statistic# from v$statname where name = 'cell physical\
  \ IO bytes saved by storage index');\n\nSID      STATISTIC#           VALUE\n---------------\
  \ --------------- ---------------\n           1111             247      1141440512\n\
  \n已用时间: 00:00:00.00\nSQL>\n```\n\n`IS NULL`查询的执行时间不到查找准备好“下锅”的员工的查询所需时间的三分之一，并且跳过的字节数几乎是后者的两倍，因为很少有表段包含`NULL`值。同样，这种速度部分归因于无需检查指定列的最小值和最大值。使用这种策略，不会出现“误报”，因为\
  \ Oracle 不会标记*可能*包含`NULL`的段，只会标记实际存在`NULL`值的段。\n\n### 索引重建\n\n需要“重建”吗？\n\n存储索引是驻留在内存中的结构。只要存储单元有电，这些索引就保持有效。当然，使用内存而非更持久的物理介质使得这些索引具有临时性，会受到维护窗口、断电和内存卡故障的影响。没有方法可以备份存储索引，而且考虑到构建存储索引只需要很少的时间，也确实没有必要这样做。如前所述，构建过程不像构建“永久”索引那样是资源密集型操作。在我们看来，用*重建*一词来替代丢失的存储索引是不准确的，因为没有脚本来构建它们，并且存储单元重启后构建的存储索引很可能与故障前的存储索引不匹配。\n\
  \n由于存储索引是建立在存储于 1MB 段中的数据之上，扫描该表段以找到索引列包含的最小值和最大值，并记录是否存在`NULL`值，并不需要很长时间。故障后构建存储索引与创建更永久索引那种资源密集型操作不同。例如，构建或重建一个\
  \ B 树索引可能需要数小时，并且会明显消耗 CPU 和磁盘资源，而构建存储索引在日常操作过程中几乎难以察觉，在构建时不会妨碍其他会话，并且完成时间仅为前者的一小部分。确实，存储索引中的信息与\
  \ B 树索引的完全不同，但为了实现其预期目的，也无需相同。\n\n每个存储服务器（或单元）都有自己的存储索引，因此丢失一个单元不会删除其余单元中的索引，这意味着只需要重新创建问题单元中的存储索引。存储索引的一个优点是，每个\
  \ 1MB 段的索引不需要与其他表段所代表的索引匹配。因为表在磁盘组中是跨磁盘条带化的，所以表数据分布在所有存储单元上，因此每个表在每个存储单元中都会有存储索引段。一个单元的问题不会导致完全没有存储索引，因此查询仍然可以从未受影响的单元中的索引段受益。此外，ASM\
  \ 中的冗余将冗余数据放在与主源不同的存储单元上。这使得 Exadata 能够丢失一个存储单元或以滚动方式应用补丁，而不会失去对数据的访问。\n\n\n\n###\
  \ 存储索引\n\n打补丁和软件升级可能是触发存储索引重建的最常见原因，因为在开始某些打补丁操作或软件升级之前，需要停止 `CELLSRV` 服务。打补丁或升级的规模和范围将决定存储索引的命运：数据库服务器的补丁/升级不会触及存储节点，因此存储索引将保持完整；而涉及存储层或整个\
  \ Exadata 机器的补丁/升级则会导致存储索引被清除。影响物理磁盘的固件问题也会导致存储索引的“重建”，因为存储节点本身（包括操作系统）将需要重启。诚然，存储固件问题和\
  \ Exadata 升级并不常发生，但它们确实可能发生，因此需要记住的是：无论是作为存储维护的一部分，还是作为整个 Exadata 补丁/升级的一部分，一旦存储固件打了补丁或存储服务器完成了升级，并且存储节点已经重启，存储索引就必须重新构建。\n\
  \n存储索引需要重建的另一个原因涉及闪存缓存硬件（Sun 闪存 PCIe 卡）的维护。每个存储服务器中安装了四张这样的卡，提供 384GB 的闪存存储。偶尔，这些单元需要维护或更换，这会导致受影响的存储节点被断电。尽管这与存储没有直接关系，但它们是存储节点架构的一部分，应该注意的是，闪存缓存问题可能需要停机才能解决。\n\
  \n请记住，即使没有存储索引存在，也可以发生智能扫描。在存储索引因维护窗口或断电而丢失期间，只要它们在重新创建，就不会对性能产生显著影响。它们缺失的时间也会很短暂，因为当存储节点再次启动并运行后，第一个可下推的查询就会重新启动构建过程，随后的每个下推查询都会为这些索引做出贡献，直到它们完成。对于运行查询的最终用户来说，这甚至可能是难以察觉的，因为与之前存储索引可用时的运行时间相比，时间差异可能很小。\n\
  \n### 须知事项\n\n存储索引是驻留在内存中的结构，而非永久性的数据库对象。当谓词被下推到存储节点时，它们会被动态构建或修改。每个索引段最多可以索引八列，外加\
  \ NULL 值的存在指示，并且索引的数据段大小为 1MB。索引段的构建遵循先到先得的原则；下推的谓词会被添加到索引中，直到达到每个段八列的限制。多个查询可以为同一张表的存储索引添加列。索引段包含列名、该段的最小值、最大值，以及该段是否包含所包含列的\
  \ NULL 值（通过段结构中的一个位来指示）。当存储索引存在时，智能扫描总是会使用它们；然而，并非每个查询都能从存储索引中受益，因为值可能分散在各个表段中，导致\
  \ Oracle 读取每个段。存储索引就像一个概率矩阵，仅指示某个值存在于被索引表段中的可能性，因此，可能会发生“误判”。这种“误判”发生在索引段中某列的最小值和最大值区间包含了目标值，但目标值实际上并不在该段中时，它也会导致\
  \ Oracle 读取每一个表段，无法节省任何字节的 I/O。\n\n存储索引不像传统的 B-tree 索引：它不是用来定位数据在哪里；而是用来了解数据**不在**哪里。扫描给定存储段中某列的最小值和最大值，可以使\
  \ Oracle 排除需要搜索的位置。由于每个存储索引段索引的是表中一个 1MB 的存储“块”，因此创建存储索引是一个相当快速的操作，是在查询处理过程中“即时”完成的。此外，排除表中\
  \ 1MB 的数据块可以快速提升查询速度：Oracle 需要筛选的数据越少，结果集返回就越快。在某些方面，存储索引实际上是一种反向索引，因为它用于排除搜索位置，而不是精确定位所需数据的确切位置。\n\
  \nNULL 值的处理方式与非 NULL 搜索条件不同且更高效，因为 Oracle 只需读取索引中的 NULL 位。这可以通过比评估最小值-最大值对更快地排除存储段来加速查询。使用\
  \ `IS NULL` 和 `IS NOT NULL` 比较运算符的查询，其返回速度通常比使用实际数据值的查询快得多。\n\n数据加载到表中的方式也会影响存储索引的效率和速度。相似值聚集在一起的表，比数据值分散在整个表中的情况，能够排除更多的存储段。包含目标值的存储段越少，Oracle\
  \ 就能排除越多的存储段不进行读取，从而比随机数据加载情况下更快地返回结果。当然，不可能为存储索引可能包含的每一个列都进行优化，就像不可能为针对表创建的每一个\
  \ B-tree 索引都生成最优的聚簇因子一样。\n\n大小在存储索引的创建中扮演着重要角色，特别是分区表，如果被查询的分区相对于整个表的大小较小，可能无法从存储索引中获得任何好处。如果不使用分区裁剪而查询整张表，则可以从使用存储索引中获益。\n\
  \n从数据库服务器监控存储索引的效益是一项简单的任务。`V$SESSTAT` 和 `V$MYSTAT` 视图中一个名为 `cell physical IO bytes\
  \ saved by storage index` 的统计信息，以累积方式记录节省的字节数：在 `V$SESSTAT` 中是针对每个会话，在 `V$MYSTAT`\
  \ 中是针对当前会话。注销后重新登录，或使用 connect 命令建立新会话，会将此统计信息重置为 0。这可以作为一种有用的技术，通过在每次连接后执行单个查询，来精确报告某个特定查询节省了多少字节。它也可用于确定使用存储索引是否带来了任何好处。有些查询不会受益，因为它们不是可下推的，或者相关表的数据分散在每一个存储段中。\n\
  \n存储索引可能需要在若干原因下被重建。打补丁、软件和/或硬件维护以及断电是导致这种情况发生的主要原因。一个不太常见的原因是 PCIe 闪存存储卡的维护或更换，因为该维护需要将受影响的存储节点断电。由于它们是基础索引，只包含最少量的信息，因此易于快速创建，对系统造成的负载很小。只有受影响的存储节点会丢失存储索引，因此如果只有一个节点宕机，则只需重建那些索引。\n\
  \n"
- "# 第四章\n\n![image](img/frontdot.jpg)\n\n## 智能闪存缓存\n\n\n\n## 智能闪存缓存\n\n## 闪存登场\n\n\
  智能闪存缓存通过缓存频繁访问的数据，并允许直接从闪存而非磁盘或内存中读取，为 Exadata 提供了实现高 IOPS（每秒输入输出操作次数）的能力。它通过缓存常用的表和索引块以备后用，从而吸收重复读取可能产生的负载。控制文件的读写以及文件头的读写也会被缓存。不过，与传统系统不同，此闪存缓存是智能化的，不会缓存为\
  \ ASM 冗余而写入的重复块，也不会缓存与备份过程和数据泵导出相关的 I/O。\n\n智能闪存缓存表现得像磁盘，但它并非磁盘。每个存储单元包含 4 块 Sun\
  \ Flash PCIe 卡，每卡配备 96GB 闪存，因此智能闪存缓存总可用空间为 384GB。对于 X3 八分之一机架配置，总闪存存储为 4.8TB；对于四分之一机架配置，可用总闪存存储为\
  \ 2.4TB。X3 半机架拥有 11.2TB 闪存，而全机架则提供 22.4TB。作为比较，X2 Exadata 四分之一机架配置拥有 1.1TB 可用闪存，半机架为\
  \ 2.6TB，全机架为 5.3TB。其中一块卡的基本框图如 图 4-1 所示。\n\n![9781430260103_Fig04-01.jpg](img/9781430260103_Fig04-01.jpg)\n\
  \n图 4-1. Sun Flash Accelerator F20 PCIe 卡框图\n\n在安装时，Exadata 系统将几乎所有的 PCIe 闪存存储配置为闪存缓存，其中一小部分配置为闪存日志。DBA\
  \ 可以相当轻松地通过调整大小、重建或创建可供 ASM 访问的闪存“磁盘”来重新配置闪存缓存。智能闪存缓存构建在闪存磁盘之上，这与 DBA 可创建的、用于提供可由\
  \ ASM 使用的闪存存储的虚拟闪存磁盘不同。连接到存储单元并使用 `CellCLI` 查看闪存缓存详细信息，可显示已配置闪存缓存的组成：\n\n```\nCellCLI>\
  \ list flashcache detail\n         name:                   myexa1cel01_FLASHCACHE\n\
           cellDisk:               FD_07_myexa1cel01,FD_12_myexa1cel01,FD_15_myexa1cel01,FD_13_myexa1cel01,FD_04_myexa1cel01,FD_14_myexa1cel01,FD_00_myexa1cel01,FD_10_myexa1cel01,FD_03_myexa1cel01,FD_09_myexa1cel01,FD_08_myexa1cel01,FD_02_myexa1cel01,FD_01_myexa1cel01,FD_11_myexa1cel01,FD_05_myexa1cel01,FD_06_myexa1cel01\n\
           creationTime:           2013-03-16T12:16:39-05:00\n         degradedCelldisks:\n\
           effectiveCacheSize:     364.75G\n         id:                     3dfc24a5-2591-43d3-aa34-72379abdf3b3\n\
           size:                   364.75G\n         status:                 normal\n\
  \nCellCLI>\n```\n\n每个存储单元使用 16 个磁盘来构建智能闪存缓存。每块 Sun PCIe 卡有 4 个这样的磁盘，每个磁盘大小为 32GB，其中\
  \ 24GB 为可寻址的非易失性存储。尽管总共有 384GB 闪存存储，但请注意，其中 19.25GB 保留给闪存日志和其他用途，因此可用于创建闪存缓存的闪存存储为\
  \ 22.875GB。每块卡还包含 64MB DRAM，用于缓冲写入非易失性存储器的数据，以及一个能量存储模块（ESM）。该模块实际上是一个电容器，在发生断电时，它能提供足够的电力将数据从缓冲区刷新到非易失性存储器中。如果\
  \ ESM 发生故障，将绕过易失性缓冲区，允许直接写入非易失性存储器。只要闪存磁盘配置为智能闪存缓存，失去 ESM 不会带来写入惩罚；存储软件将智能闪存缓存视为直写缓存，会绕过它直接写入磁盘。如果闪存磁盘被配置为闪存磁盘组，则失去\
  \ ESM 将产生写入惩罚，因为动态缓存不再可用。\n\n这些 PCIe 卡的预期寿命为两年，因为 ESM 将失去其充电能力。Sun 文档声明这些卡可以在不关闭系统的情况下更换；而\
  \ Oracle Exadata 文档建议在开始此类维护之前，将受影响的存储服务器断电。请记住，ASM 故障组的配置确保了一个存储单元的丢失不会影响运行中的数据库。\n\
  \n使用 `create flashcache all` 命令为存储单元重建闪存缓存，将创建与 Exadata 安装后相同的存储分布；DBA 可以通过指定 `size`\
  \ 参数在存储单元上创建一个较小的智能闪存缓存，但不能创建更大的。\n\n## 工作原理\n\n智能闪存缓存是一种针对频繁访问数据进行优化的、基于每个单元的缓存机制。一个对象是否会被考虑用于智能闪存缓存，部分取决于对象创建时设置的\
  \ `CELL_FLASH_CACHE` 存储参数。看一下 `EMP` 演示表的 `CREATE TABLE` 语句：\n\n```\nCREATE TABLE\
  \ \"BING\".\"EMP\"\n  (    \"EMPNO\" NUMBER(4,0) NOT NULL ENABLE,\n       \"ENAME\"\
  \ VARCHAR2(10),\n       \"JOB\" VARCHAR2(9),\n       \"MGR\" NUMBER(4,0),\n      \
  \ \"HIREDATE\" DATE,\n       \"SAL\" NUMBER(7,2),\n       \"COMM\" NUMBER(7,2),\n\
         \"DEPTNO\" NUMBER(2,0)\n  ) SEGMENT CREATION IMMEDIATE\n  PCTFREE 10 PCTUSED\
  \ 40 INITRANS 1 MAXTRANS 255\n NOCOMPRESS LOGGING\n  STORAGE(INITIAL 65536 NEXT\
  \ 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645\n  PCTINCREASE 0 FREELISTS 1 FREELIST\
  \ GROUPS 1\n  BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)\n\
    TABLESPACE \"USERS\" ROWDEPENDENCIES\n```\n\n此存储参数有三个可能的值，`DEFAULT` 顺理成章地成为默认值。此设置告知\
  \ Oracle 以正常模式利用智能闪存缓存，根据提供的缓存标准缓存数据，并根据适当的保留策略淘汰缓存数据。对于 `DEFAULT` 设置，这将使用一种优先级的最近最少使用（LRU）算法（最旧的数据最先被淘汰，这是常见的\
  \ LRU 配置）。此存储参数还可以设置为另外两个值：`KEEP` 和 `NONE`。`KEEP` 设置通过尽可能长时间地将数据保留在缓存中来改变 LRU 算法，但是，为防止\
  \ `KEEP` 数据占用缓存，最多只有 80% 的已配置缓存可用于标记为 `KEEP` 的数据。超过附加淘汰策略的未使用 `KEEP` 块将被清除。将 `CELL_FLASH_CACHE`\
  \ 设置为 `NONE` 会为该对象禁用智能闪存缓存。\n\n每次读或写操作都关联以下附加信息：\n\n*   相关对象的 `CELL_FLASH_CACHE`\
  \ 设置\n*   基于请求目的的缓存提示。可用的提示有：\n\n\n\n*   `CACHE`，这会导致块被缓存。索引查找的 I/O 就是一种会被缓存的请求类型。\n\
  *   `NOCACHE`，这将应用于来自 ASM 的镜像块、日志写入，或者简单来说就是太大而无法放入缓存的请求。无论`CELL_FLASH_CACHE`设置为`DEFAULT`还是`KEEP`，此提示都会被设置。\n\
  *   `EVICT`，用于从缓存中移除数据。使用此提示的活动将是 ASM 再平衡操作（这会导致块从一个磁盘移动到另一个磁盘，从而使缓存的条目失效，因为它们引用的是原始物理位置）以及查找已超过\
  \ LRU 算法阈值的缓存数据。\n\n智能闪存缓存在决定如何以及处理什么时，除了考虑`CELL_FLASH_CACHE`设置和提供的提示外，还会考虑 I/O\
  \ 大小、类型和当前的缓存负载。非常大的 I/O 请求不会被缓存，任何可能对吞吐量产生负面影响的 I/O 请求也不会被缓存，因为缓存可能非常繁忙。\n\n被缓存的写操作不受此缓存的影响，因为写入性能既不会提高也不会降低。`CELLSRV`执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后，智能闪存缓存决定数据是否要被缓存，使得磁盘写入独立于数据缓存过程。\n\
  \n读取事务是智能闪存缓存的受益者。对于读取操作，`CELLSRV`会确定数据是否已在智能闪存缓存中；它维护了一个缓存数据的内存散列表，以便 Oracle 可以快速确定所需的块是否可以在那里找到。该散列表列出了未被标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。在以下情况下，缓存块可能会被驱逐：源块自缓存数据写入后已更改、当前事务的\
  \ I/O 需要空间且这些块位于 LRU 列表的顶部、块被标记为`KEEP`但已超出额外的`KEEP`阈值而未使用，或者它们的寿命已超过标准 LRU 阈值。\n\
  \n也可以使用`ALTER TABLE <TABLE_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])`和`ALTER\
  \ INDEX <INDEX_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])`命令手动将表或索引放入智能闪存缓存。指定`NONE`会阻止表或索引使用智能闪存缓存。`DEFAULT`设置智能闪存缓存的正常行为，并且在创建表或索引时默认设置为此值；`KEEP`会将表或索引放入智能闪存缓存（前提是空间足够），并且不会将其换出。不加区别地使用`KEEP`选项可能会填满智能闪存缓存，而没有空间留给`FLASH_CACHE`设置为`DEFAULT`的对象。`KEEP`设置应用于小表（例如，较小的查找表）或索引，以允许更大的表/索引（其`FLASH_CACHE`存储参数设置为`DEFAULT`）使用智能闪存缓存。\n\
  \n## 日志记录\n\n每个单元上配置的闪存存储并非仅用于智能闪存缓存，因为 Exadata 还提供了智能闪存日志作为重做日志写入的额外机制。每个配置的闪存磁盘都有\
  \ 32MB 的存储空间被配置为智能闪存日志；每个存储单元总共 512MB 的智能闪存日志存储。使用智能闪存日志可以加速事务处理，因为第一个报告完成的写入会触发数据库层继续进行事务处理。\n\
  \n重做日志写入被同时发送到磁盘和智能闪存日志。一旦日志写入器进程（`LGWR`）收到写入完成的确认，事务处理就会继续。无论是智能闪存日志还是磁盘上的写入先完成都不重要；是确认信号触发了数据库服务器允许处理继续进行。请放心，所有写入智能闪存日志的数据也会被写入磁盘。智能闪存日志先完成并不会阻止`LGWR`完成其磁盘写入。从概念上讲，智能闪存日志与使用多路复用重做日志非常相似，因为所有配置的日志都会被写入，无论哪个日志先完成写入。\n\
  \n## 它是磁盘\n\n智能闪存磁盘并不仅限于智能闪存缓存和智能闪存日志使用。可以将这些设备配置为 ASM 识别的闪存磁盘，以创建闪存磁盘组。\n\n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组，但这需要调整现有智能闪存缓存的大小。在开始此过程之前，应决定这些闪存磁盘的大小，因为创建此类磁盘并非易事，因为第一步是删除现有的闪存缓存：\n\
  \n```\nCellCLI> drop flashcache\nFlash cache myexa1cel01_flashcache successfully\
  \ dropped\n```\n\n一旦闪存缓存被删除，就可以用新的大小创建它。要创建一个 100GB 的闪存缓存：\n\n```\nCellCLI> create\
  \ flashcache all size=100G\nFlash cache myexa1cel01_flashcache successfully created\n\
  ```\n\n可用于 ASM 的闪存磁盘将使用剩余的可用闪存存储（264.75GB）创建，因此不需要使用大小参数：\n\n```\nCellCLI> create\
  \ griddisk all flashdisk prefix=flash\nGridDisk flash_FD_00_myexa1cel01 successfully\
  \ created\nGridDisk flash_FD_01_myexa1cel01 successfully created\n...\nGridDisk\
  \ flash_FD_15_myexa1cel01 successfully created\n\nCellCLI> list griddisk\n...\n\
  \         flash_FD_00_myexa1cel01 active\n         flash_FD_01_myexa1cel01 active\n\
  \         ...\n         flash_FD_15_myexa1cel01 active\nCellCLI>\n```\n\n可以选择创建一组或多组闪存磁盘，方法是仅在一个存储单元、两个存储单元甚至所有可用存储服务器上重新配置智能闪存缓存。在存储服务器之间使用相同的前缀允许将所有闪存磁盘分配给一个磁盘组，无论涉及哪个存储单元。也可以通过使前缀特定于单元来创建单独的闪存磁盘集，这样，只需在`CREATE\
  \ DISKGROUP`命令中指定前缀名称，就可以创建多个基于闪存的磁盘组。\n\n创建闪存磁盘组并不困难；但是，如果使用多个闪存磁盘前缀，则需要仔细注意细节，以便将正确的闪存磁盘集分配给正确的磁盘组。命令语法很简单，但是，首先必须设置数据库服务器上的环境才能访问\
  \ ASM 实例。以下脚本`sid`是设置环境的好方法：\n\n```\n#################################################################\n\
  # Oracle sid selection script\n#\n# 13-May-2012 - Mary Mikell Spence\n#        \
  \       Infocrossing\n#################################################################\n\
  \nORASID=$ORACLE_SID\n\nif [ -f /etc/oratab ]\nthen\n   export ORATAB=/etc/oratab\n\
  else\n   export ORATAB=/var/opt/oracle/oratab\nfi\n\nunset ORACLE_BASE\n\necho;\n\
  I=1\nfor SHOW_DB in `cat $ORATAB | grep -v \"#\" |  grep -v '*' | cut -f 1 -d :`\n\
  do\n   OHOME=`grep -v '#' $ORATAB | grep -v '*' | grep \"^$SHOW_DB:\" | cut -d:\
  \ -f 2`\n   echo \"$I - $SHOW_DB - $OHOME\"\n   I=`expr $I + 1`\ndone\necho;\n```\n\
  \n\n\nGOOD_NAME=false\nwhile [ \"${GOOD_NAME}\" = \"false\" ]\ndo\n  echo \"请通过编号或名称进行选择\
  \ [$ORASID]: \"\n  read CHOICE\n  if [ \"$CHOICE\" = \"\" ]\n  then\n    GOOD_NAME=true\n\
  \    CHOICE=$ORASID\n  else\n    I=1\n    for DB_NAME in `cat $ORATAB | grep -v\
  \ \"#\" |  grep -v '*' | cut -f 1 -d :`\n    do\n      if [ \"$DB_NAME\" = \"$CHOICE\"\
  \ -o \"$I\" = \"$CHOICE\" ]\n      then\n        GOOD_NAME=true\n        CHOICE=$DB_NAME\n\
  \      fi\n      I=`expr $I + 1`\n    done\n  fi\ndone\n\nORAENV_ASK=NO\nORACLE_SID=$CHOICE\n\
  \n. oraenv > /dev/null\n\necho; echo;\necho \"*************************************************\"\
  \necho \"ORACLE_BASE...$ORACLE_BASE\"\necho \"ORACLE_HOME...$ORACLE_HOME\"\necho\
  \ \"ORACLE_SID....$ORACLE_SID\"\necho \"*************************************************\"\
  \necho;\n\nunset ORATAB\nunset GOOD_NAME\nunset I\nunset SHOW_DB\nunset CHOICE\n\
  unset DB_NAME\nunset OHOME\nunset ORASID\n```\n\n现在，您已经掌握了设置环境的方法，接下来就为创建基于闪存的磁盘组做好了准备：\n\
  \n```\n[oracle@myexa1db01 dbm1 ∼]$ . sid\n\n1 - +ASM1 - /u01/app/11.2.0.3/grid\n\
  2 - dbm1 - /u01/app/oracle/product/11.2.0.3/dbhome_1\n3 - client - /u01/app/oracle/product/11.2.0/client_1\n\
  \n请通过编号或名称进行选择 [dbm1]:\n\n*******************************************************\n\
  ORACLE_BASE.../u01/app/oracle\nORACLE_HOME.../u01/app/11.2.0.3/grid\nORACLE_SID....+ASM1\n\
  *******************************************************\n\n[oracle@myexa1db01 +ASM1\
  \ ∼]$ sqlplus / as sysasm\n\nSQL*Plus: Release 11.2.0.3.0 Production on Tue Apr\
  \ 30 10:11:09 2013\n\nCopyright (c) 1982, 2011, Oracle.  All rights reserved.\n\n\
  Connected to:\nOracle Database 11g Enterprise Edition Release 11.2.0.3.0 - 64bit\
  \ Production\nWith the Real Application Clusters and Automatic Storage Management\
  \ options\n\nSYS@+ASM1> col path format a45\nSYS@+ASM1> select path, header_status\n\
  \  2  from v$asm_disk\n  3  where path like 'o/%/flash%'\n  4  /\n\nPATH       \
  \                                   HEADER_STATU\n---------------------------------------------\
  \ ------------\no/192.168.10.5/flash_FD_00_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_01_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_02_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_03_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_04_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_05_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_06_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_07_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_08_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_08_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_10_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_11_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_12_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_13_myexa1cel01\
  \        CANDIDATE\no/192.168.10.5/flash_FD_14_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_15_myexa1cel01\
  \        CANDIDATE\n\n16 rows selected.\n\nSYS@+ASM1> create diskgroup flash_dg\
  \ redundancy normal\n  2  disk 'o/%/flash%'\n  3  attribute 'compatible.rdbms' =\
  \ '11.2.0.0.0',\n  4  'compatible.asm' = '11.2.0.0.0',\n  5  'cell.smart.scan.capable'\
  \ = 'TRUE',\n  6  'au_size' = '4M'\n  7   /\n\nDiskgroup created.\n\nSYS@+ASM1>\n\
  ```\n\n一个基于闪存的磁盘组现在可供使用了。根据所使用的冗余级别（NORMAL，提供数据的一份副本；或 HIGH，提供数据的两份副本），数据可用的存储空间将是总可用空间的一半到三分之一。这使得基于闪存的磁盘组比基于磁盘的对应磁盘组要小得多。在本例中，请记住总可用闪存空间为\
  \ 264.75GB。由于指定了 NORMAL 冗余，因此该闪存磁盘组大约有 132GB 可用。如果使用 HIGH 冗余，总可用空间将约为 88GB。\n\n\
  监控\n\n监控数据库服务器上的**智能闪存缓存**与监控来自它们的**智能扫描**非常相似，同样受限，因为从`V$SYSSTAT`中只有一项记录闪存缓存活动的指标可用：“cell\
  \ flash cache read hits”。另一方面，从存储服务器监控智能闪存缓存则提供了更详细的数据和诊断信息，尽管无法从单一位置监控整个存储层；因此，这些统计信息仅针对给定存储服务器上总闪存缓存的一部分。\n\
  \n存储服务器工具\n\n通过`CellCLI`实用程序，可以使用许多统计信息来监控闪存缓存的使用情况。您可以使用`LIST METRICDEFINITION`命令查看指标及其描述。要返回闪存缓存指标及其描述，可以使用以下命令：\n\
  \n```\nCellCLI> list metricdefinition attributes name, description where objectType\
  \ = 'FLASHCACHE'\n```\n\n这些指标及其描述列于表 4-1 中。\n\n表 4-1. 存储单元闪存缓存指标及其描述\n\n\n\n## FlashCache\
  \ 性能指标\n\n| `FC_BYKEEP_OVERWR` | \"由于‘keep’对象的空间限制而从 FlashCache 中推出（换出）的兆字节数\" |\n\
