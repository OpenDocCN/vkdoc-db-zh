  \ via SQL*Net from client\n  16668  SQL*Net roundtrips to/from client\n      6 \
  \ sorts (memory)\n      0  sorts (disk)\n 250000  rows processed\n```\n\n在不到 15\
  \ 秒的时间内，从超过 400 万行数据的三表连接查询中返回了 25 万行数据。布隆过滤器显著改变了该查询的处理方式，并在处理如此大量数据时提供了卓越的性能。即使关闭卸载处理，布隆过滤器仍然会在数据库层被使用。\n\
  \n```sql\nSQL> select /*+ bloom join 2 parallel 2 use_hash(empemp_dept) */ e.empid,\
  \ e.empnm, d.deptnm, e.empsal\n  2  from emp e join emp_depted on (ed.empid = e.empid)\
  \ join dept_info d on (ed.empdept = d.deptnum)\n  3  where ed.empdept = 20;\n...\n\
  Elapsed: 00:00:16.60\n\nStatistics\n33  recursive calls\n        171  db block gets\n\
  \      40049  consistent gets\n      17657  physical reads\n          0  redo size\n\
  \    9437503  bytes sent via SQL*Net to client\n     183850  bytes received via\
  \ SQL*Net from client\n      16668  SQL*Net roundtrips to/from client\n        \
  \  5  sorts (memory)\n          0  sorts (disk)\n     250000  rows processed\n```\n\
  \n如果没有在存储层执行布隆过滤器，查询执行时间增加了 2.33 秒，增幅达 16.3%。对于执行时间更长的查询，这种差异可能非常显著。赋予 Exadata 强大连接处理能力的并非布隆过滤器本身，而是\
  \ Exadata 能够在数据库层和存储层执行它，这是普通硬件配置无法做到的。\n\n### 卸载功能\n关于 Exadata 的智能扫描功能，函数的卸载是一个有趣的话题。Oracle\
  \ 实现了两种基本类型的函数：单行函数（如`TO_CHAR()`、`TO_NUMBER()`、`CHR()`、`LPAD()`）和多行函数（如`AVG()`、`LAG()`、`LEAD()`、`MIN()`、`MAX()`等）。分析函数属于第二种类型。单行函数有资格被卸载，从而使查询符合智能扫描的条件，因为它们可以在存储服务器之间分配来处理数据。而多行函数（如`AVG()`、`MIN()`和`MAX()`）必须能够访问整个表数据集，这在\
  \ Exadata 的存储架构下通过智能扫描是无法实现的。最小的 Exadata 配置中至少有三台存储服务器，数据相对均匀地分布在它们之间，这使得单台存储服务器无法访问全部磁盘。因此，大多数多行函数无法被卸载到存储层；然而，执行这些函数的查询仍然可能进行智能扫描，即使函数本身无法被卸载，如下所示（仅显示相关输出）。\n\
  \n```sql\nSQL> select avg(sal)\n  2  from emp;\n\nAVG(SAL)\n----------\n2500000.5\n\
  \nElapsed: 00:00:00.49\n\nExecution Plan\nPlan hash value: 2083865914\n| Id  | Operation\
