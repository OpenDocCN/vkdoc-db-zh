- '# ERP 设置——实用指南


  本章旨在为读者提供设置 Oracle ERP（11i 或 R12）环境的指南。这里找到的大部分内容不一定特定于 Exadata，而是适用于任何 Linux RAC
  环境。然而，Exadata 被描述为“盒子里的 RAC”，因此，挑战将始终存在于 Exadata 中。因此，这里似乎是解决这些问题的好地方。


  Oracle 的 ERP 标准是每个数据库从自己的 Oracle Home 运行，并且该数据库的侦听器具有唯一的、专用的 SQLNet 端口。因此，我们的第一个挑战是为每个
  ERP 数据库创建一个新的 Oracle Home。Exadata 通常附带一个准备就绪的 Oracle Home 和数据库。最简单的做法是简单地在每个节点上克隆该
  Oracle Home。但是，如果您安装的数据库版本与 Exadata 机器附带的版本完全不同，您可以暂时跳过本节。但是，如果您发现将来必须克隆该 Home，不要感到惊讶。无论如何，克隆
  Oracle Home 是 ERP DBA 的常见做法。


  ## 克隆 Oracle Home


  除了 Grid Infrastructure Oracle Home（即您的 ASM 主目录）之外，您的 Exadata 集群将附带一个标准数据库 Oracle
  Home（在每个节点上）以及一个使用该 Home 创建的数据库。实际上，您应该将此 Home 和数据库保持原样——至少可以作为参考点。特别是在开发/测试集群上，您可能需要为各种目的（开发、测试、UAT
  等）创建多个 Oracle Home。使用这个“种子” Oracle Home 作为您的第一个 ERP Oracle Home 的源，然后使用 ERP 肯定需要的额外数据库补丁对其进行修补。然后，您可以继续为可能需要的任何其他
  ERP 环境克隆此 Home。


  除非您已向 Oracle 支持另外指定，否则“种子”数据库很可能名为 DBM。在我们的示例中，其 Oracle Home 是 `/u01/app/oracle/product/11.2.0.3/dbhome_1`。我们的新数据库将称为
  ERPDEV。以 `root` 身份，在集群中的所有节点上执行以下操作：


  ```

  $ mkdir /u01/app/oracle/product/11.2.0.3/erpdevdb

  $ cd /u01/app/oracle/product/11.2.0.3/dbhome_1

  $ cp -r * /u01/app/oracle/product/11.2.0.3/erpdevdb/.

  $ chown -R oracle:oinstall /u01/app/oracle/product/11.2.0.3/erpdevdb

  ```


  以 Oracle 软件所有者身份登录，并在两个节点上执行以下操作——也在两个节点上。在每个节点上重复该过程时，请确保相应地设置 `LOCAL_NODE`，如下所示：


  ```

  $ cd /u01/app/oracle/product/11.2.0.3/erpdevdb/clone/bin


  $ perl clone.pl ORACLE_BASE=$ORACLE_BASE \

  ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb \

  ORACLE_HOME_NAME=OraDb11g_ERPDEV \

  ''-O"CLUSTER_NODES={exadb01,exadb02}"'' \

  ''-O"LOCAL_NODE=exadb01"''

  ```




  '
- "# SCAN 监听器与数据库创建指南\n\n## Oracle Home 的注册与补丁应用\n\n前述命令将确保 `Oracle Home` 被注册到中央 `inventory`\
  \ 中。正确执行克隆操作非常重要，因为它会对后续应用数据库补丁（特别是季度捆绑补丁）产生重大影响。如果 `Oracle Home` 未注册，你将无法为其应用补丁。\n\
  \n很可能需要在此基础版本之上安装额外的数据库补丁。一旦有额外的补丁应用到这个 `Oracle Home`，它就可以作为后续克隆操作的源。\n\n## SCAN\
  \ 监听器\n\n虽然 `ERP 11i` 和 `R12` 都可以利用单客户端访问名称 (`SCAN`) 监听器，但其使用是可选的。在撰写本文时，所有的 `EBS`\
  \ 客户端版本都低于 11.2；因此，`EBS` 无法充分利用 `SCAN` 监听器。如果你运行的是 `11i`，那么你可能会被建议不要为你的 `ERP` 数据库使用\
  \ `SCAN` 监听器，因为 `Autoconfig` 不支持它——尽管有手动设置步骤。此外，如果你正在搭建一个包含多个不同数据库的开发/测试环境，你将需要设置多个监听器——每个环境一个。也许你正在将一个\
  \ `11i` 数据库从其他平台迁移过来，而 1521 端口（用 `Oracle ERP` 的术语说，即端口池零）已经使用了多年，因此可能难以更改。无论如何，你可能会发现自己处于一种不希望\
  \ `SCAN` 监听器运行在默认 1521 端口上的情况。在这种情况下，你将不得不重新配置 `SCAN` 监听器以使其在另一个端口上运行。具体选择哪个端口其实并不太重要，但为了保持相当简单，我们将使用\
  \ `1523`。\n\n“My Oracle Support”上有一份说明也概述了相关步骤 (`How to Modify SCAN Setting or SCAN\
  \ Listener Port after Installation [ID 972500.1]`)。以该说明为指导，我们执行以下操作：\n\n首先，修改任何现有的非\
  \ `ERP` 数据库的 `remote_listener` 和 `local_listener` 参数。在每个这样的数据库上，以 `SYS` 身份执行以下命令：\n\
  \n```sql\nSQL> alter system set remote_listener='exacluster-scan:1523' scope=spfile\
  \ sid='*' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
  \   scope=spfile sid='dbm1' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa02-vip)(PORT=1523))))'\n\
  \   scope=spfile sid='dbm2' ;\n```\n\n设置 `Grid Oracle Home` 的环境，并为 `ASM` 执行相同的操作。注意，`ASM`\
  \ 没有 `remote_listener`：\n\n```sql\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
  \   scope=spfile sid='+ASM1' ;\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
  \   scope=spfile sid='+ASM2' ;\n```\n\n关闭所有数据库。\n\n```bash\n$ srvctl stop database\
  \ -d dbm\n```\n\n现在，我们将设置 `Grid Oracle Home` 的环境并更改监听器端口，如下所示：\n\n```bash\n$ srvctl\
  \ modify listener -l LISTENER -p \"TCP:1523\"\n$ srvctl modify scan_listener -p\
  \ 1523\n$ srvctl stop scan_listener\n$ srvctl start scan_listener\n```\n\n重启数据库，应该就全部完成了。\n\
  \n```bash\n$ srvctl start database –d dbm\n```\n\n## 创建数据库\n\n无论是执行全新安装还是从其他服务器迁移，你都必须为你未来的完整\
  \ `ERP` 环境创建一个空数据库。实际上，这与在任何使用 `Oracle Managed Files` 的 `RAC` 环境中创建数据库并无区别。有趣的部分将在下一节讨论设置监听器时到来。然而，为了文档的完整性，我们必须提及，是的，需要创建一个数据库。\n\
  \n最简单的方法是使用 `dbca`。设置 `ORACLE_HOME` 并相应地修改 `PATH`，如下所示：\n\n```bash\n$ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb\n\
  $ export PATH=$PATH:$ORACLE_HOME/bin\n$ dbca\n```\n\n\n\n运行 `dbca` 的步骤已有详尽文档，因此这里不再赘述。请按常规选择用于\
  \ Oracle 托管文件的磁盘组、使用的字符集以及各项内存配置选项。完成后，你可能仍需调整重做日志大小以及表空间（`SYSTEM`、`UNDOTBS1` 和\
  \ `UNDOTBS2`、`TEMP`、`USERS` 等）的存储参数。\n\n数据库创建完成后，请将该实例（数据库本身应已被添加）添加到集群中每个节点的 `oratab`\
  \ 文件中，并使用 Oracle 的 `oraenv` 实用程序来设置环境。节点 1 上的 `oratab` 文件应类似于以下内容：\n```\n+ASM1:/u01/app/11.2.0.3/grid:N\n\
  agent11g:/u01/app/oracle/GCAgents/oracle/MW/agent11g:N\ndbm1:/u01/app/oracle/product/11.2.0.3/dbhome_1:N\n\
  erpdev1:/u01/app/oracle/product/11.2.0.3/erpdevdb:N\ndbm:/u01/app/oracle/product/11.2.0.3/dbhome_1:N\
  \           # line added by Agent\nerpdev:/u01/app/oracle/product/11.2.0.3/erpdevdb:N\
  \        # line added by Agent\n```\n节点 2 的 `oratab` 文件将类似，区别在于会列出本地属于该节点的实例（`dbm2`、`erpdev2`\
  \ 等）。\n\n## 设置监听器\n之前，我们将 SCAN 监听器移到了 `1523` 端口。因为 `1521` 端口现在空闲，如果我们愿意，可以创建一个使用该端口的新监听器。此监听器将专用于我们的\
  \ `ERPDEV` 数据库。无论你使用哪个端口，都必须遵循这些步骤来为你的新数据库创建专用监听器。关键点是不能使用 SCAN 监听器正在使用的端口。\n\n\
  关闭新创建的 `ERPDEV` 数据库：\n```\n$ srvctl stop database -d erpdev\n```\n在 `$ORACLE_HOME/network/admin`\
  \ 目录下，创建一个新的 `tnsnames.ora` 文件，其中包含以下条目：\n```\nerpdev=\n        (DESCRIPTION=\n\
  \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n         \
  \       (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n            (LOAD_BALANCE\
  \ = yes)\n            (CONNECT_DATA=\n                (SERVER=DEDICATED)\n     \
  \           (SERVICE_NAME=erpdev)\n            )\n        )\n\nerpdev1_LOCAL=\n\
  \        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n\
  \        )\n\nerpdev2_LOCAL=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n\
  \        )\n\nerpdev_REMOTE=\n        (DESCRIPTION=\n            (ADDRESS_LIST=\n\
  \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n         \
  \       (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1523))\n\
  \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1523))\n         \
  \   )\n        )\n```\n注意 `erpdev_REMOTE` 条目中的 `1523` 端口引用。这些地址条目也会导致数据库服务向默认监听器注册。如果将来任何时候需要为此数据库运行\
  \ `dbca`，则数据库必须向默认监听器注册。你可能需要运行 `dbca` 的原因多种多样，例如配置 Database Vault 或 Oracle Internet\
  \ Directory。\n\n接下来，创建监听器并将其关联到此 Oracle Home。\n```\n$ srvctl add listener -l erpdev\
  \ -o $ORACLE_HOME -p 1521\n$ srvctl setenv listener -l erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n\
  $ srvctl setenv database -d erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n```\n\
  启动数据库并更改其监听器参数。\n```\n$ srvctl start database -d erpdev\n\nSQL> alter system set\
  \ local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521)))'\n\
  \   sid='erpdev1' ;\n\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521)))'\n\
  \   sid='erpdev2' ;\n\nSQL> alter system set remote_listener='erpdev_REMOTE' ;\n\
  ```\n如果你还希望将数据库注册到 SCAN 监听器，可以按如下方式设置 `remote_listener` 参数：\n```\nSQL> alter system\
  \ set remote_listener='erpdev_REMOTE','exacluster-scan:1523' ;\n```\n\n## 数据迁移\n\
  至此，我们有了一个空数据库和该数据库的监听器。除非这是 Oracle ERP 的全新安装，否则下一个（也是最耗时的）步骤是将现有数据库迁移到我们崭新、闪亮的 Exadata\
  \ 数据库。迁移步骤因源平台、ERP 版本和许多其他因素而异。简而言之，你需要熟悉大量的“My Oracle Support”说明，才能将你的数据库从 A 点转移到\
  \ Exadata。我们无法在此尝试涵盖该领域。因此，我们将在导入完成且已运行 Autoconfig 的时刻继续。请参阅本章末尾的 MOS 说明列表，这应为你顺利完成任务提供一个良好的基础。\n\
  \n## 环境配置\n在传统的单节点 ERP 数据库环境中，SQLNet 配置文件存储在 `$ORACLE_HOME/network/admin/<context>`\
  \ 下，其中 `<context>` 是 `instance_server`。是 Autoconfig 创建了这些文件。同时，它创建的 `env` 文件会将 `TNS_ADMIN`\
  \ 设置为相同的 `$ORACLE_HOME/network/admin/<context>` 位置。然而，在 RAC 环境中，我们希望使用 `srvctl`\
  \ 来管理环境（即启动和停止数据库及监听器）。既然如此，我们就不能以这种方式设置 `TNS_ADMIN`，因为显然它在每个节点上都必须不同，因为实例名称会变化。\n\
  \n传统的单节点设置：\n```\nTNS_ADMIN=$ORACLE_HOME/network/admin/erpdev_dbsrvr\n$ORACLE_HOME/network/admin/erpdev_dbsrvr/tnsnames.ora\n\
  $ORACLE_HOME/network/admin/erpdev_dbsrvr/listener.ora\n```\n此外，还会有一个 `ifile` 参数指向另一个可用于自定义设置的文件。在\
  \ Exadata (RAC) 上，我们将反转这种做法。尤其要注意，我们根本不会使用 Autoconfig 生成的 `listener.ora`，因为它的条目不适用于\
  \ RAC。\n\n请注意，Autoconfig 创建的 `tnsnames.ora` 文件通常就 RAC 所需而言充满了错误。应审查该文件并进行调整。我们之前创建的\
  \ `tnsnames.ora` 文件可以用作此文件的模型。然后，我们要避免这些更改因后续运行 Autoconfig 而被覆盖。\n\n管理此问题有几种选择。\n\
  1.  将文件复制到 `$ORACLE_HOME/network/admin/tnsnames.ora` 上，即：\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
  \    $ cp tnsnames.ora ../.\n```\n2.  重命名原始文件并向 `$ORACLE_HOME/network/admin/tnsnames.ora`\
  \ 添加一个 `ifile` 条目，该条目将指向它。\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
  \    $ cp tnsnames.ora tnsnames.ora.erpdev\n    $ vi $ORACLE_HOME/network/admin/tnsnames.ora\n\
  \    添加 ➔ ifile=<ORACLE_HOME>/network/admin/erpdev1_exadb01/tnsnames.ora.erpdev\n\
  ```\n因为 Autoconfig 自然地将其活动限制在 `$ORACLE_HOME/network/admin/<context>` 目录内，所以此选项效果很好。`$ORACLE_HOME/network/admin`\
  \ 下的文件不会受到影响。无论你选择做什么，都必须完全告知将来可能在这些服务器上运行 Autoconfig 或向远程数据库添加条目到 `tnsnames.ora`\
  \ 的任何人。\n\n![image](img/sq.jpg) **注意** `ifile` 条目必须包含完整路径。`$ORACLE_HOME` 在此处无效。确保在两个节点上都使用完整路径。\n\
  \n### 设置环境\n\n\n\n"
- "# 第十四章\n\n## 最终思考\n\n你现在读到了本书的最后一章，到目前为止已经阅读和学习了很多内容。本书涵盖了许多材料，你对 Exadata 是什么以及它能做什么有了更好的认识。你也对该系统及其管理方式有了扎实的操作知识。起初这可能是一项令人望而生畏的任务，但通过阅读本书并运行示例，你已经获得了对\
  \ Exadata 的理解，这将为你继续作为 Exadata DBA 或 DMA 的职业生涯提供良好的服务。\n\n## 你已走得很远，朝圣者\n\n当你开始阅读时，你可能刚刚被告知\
  \ Exadata 即将到来，并且你将与之合作。很可能你对 Exadata 如何配置或它如何提供大家都在谈论的卓越性能并没有真正的概念。存储索引和智能扫描是陌生的概念，该系统的架构也是你前所未见的。从那时起，你已经走了很长的路。\n\
  \n让我们回顾一下我们涵盖的领域，并重点介绍我们介绍过的一些材料。\n\n![image](img/sq.jpg) **注意** 这不会是我们之前章节中所呈现的所有主题和材料的详尽列表。某些领域的信息可能比其他领域更详细，但请了解本章并非对全文的全面总结。\n\
  \n我们很恰当地从开头开始，讨论了 Exadata 系统的各种配置。我们这样做是为了向你介绍当前可用各系统上的硬件，并让你熟悉每种配置上的可用资源。我们还简要介绍了\
  \ Exadata 的历史，以及它如何发展以应对不同类型的工作负载，包括 OLTP。\n\n这段旅程的下一站将你带到了智能扫描和卸载，这是 Exadata 两个非常重要的方面。\n\
  \n有人说智能扫描是 Exadata 的命脉，我们同意。正如你所了解到的，智能扫描提供了一种“分而治之”的方法来处理查询和语句，它允许存储单元执行在传统硬件配置中必须由数据库服务器执行的任务。你还了解到，卸载提供了更强大的工具，使数据处理更加高效。列投影和谓词过滤通过将数据块处理转移到存储层，使存储单元仅返回查询请求的数据。回想一下，列投影允许\
  \ Exadata 仅返回选择列表中请求的列以及连接条件中指定的任何列。这通过消除数据库服务器执行传统数据块处理和过滤的需要，大大减少了工作量。这也减少了传输到数据库服务器的数据量，这是\
  \ Exadata 比传统配置系统更高效的一种方式。\n\n### 须知事项\n\n每个 ERP 数据库都必须从自己的 Oracle Home 运行。不允许在\
  \ ERP 数据库之间共享 Oracle Home。这是一项长期的 Oracle 标准。此外，每个数据库都必须有一个专用的监听器。\n\n监听器的问题可能是最具挑战性的。首先，你必须决定\
  \ SCAN 监听器是否可以简单地留在 1521 端口，还是必须移动。虽然你可以使用 SCAN 监听器，但在开发/测试集群上这样做并不实际，因为你很可能运行着多个\
  \ ERP 数据库。每个数据库将需要自己的监听器端口，因此也需要自己的监听器。为了保持一致，我们发现最好不要让任何数据库使用 SCAN 监听器作为主监听器。\n\
  \n尽管如此，你仍然必须将数据库注册到本地监听器，以便 `dbca` 能够工作。如果它没有在本地监听器中注册，当你尝试运行 `dbca` 时会收到错误。实际上，每个数据库都应该用为该数据库唯一的命名监听器和端口以及默认监听器进行注册。请记住，`dbca`\
  \ 用于多种用途，包括向数据库添加实例、向 Grid Control OMS 注册数据库以及配置 Database Vault——仅举几例。\n\n务必配置你的\
  \ `$ORACLE_HOME/network/admin`，使得后续在数据库层运行 Autoconfig 不会损害你的 `TNS` 配置。务必将配置充分告知任何可能运行\
  \ Autoconfig 的人。\n\n设置环境时，切勿使用 Autoconfig 生成的 `TNS_ADMIN` 设置。Autoconfig 生成的 `env`\
  \ 文件没问题，但 `TNS_ADMIN` 变量必须被取消设置（unset）。\n\n正确克隆每个 `ORACLE_HOME`，使其在中央清单中注册。如果不遵循克隆过程，那么\
  \ Home 将不会被注册，你将无法为其应用季度补丁包。\n\n有经验的 ERP DBA 知道 Autoconfig 会在 `$ORACLE_HOME` 下创建一个名为\
  \ `<context>.env` 的 `env` 文件。使用我们一直使用的名称，在节点 1 上我们会有 `erpdev1_exadb01.env`，在节点 2\
  \ 上是 `erpdev2_exadb02.env`，等等。然而，`env` 文件会将 `TNS_ADMIN` 设置为 `$ORACLE_HOME/network/admin/<context>`——出于我们先前讨论的原因，我们不使用它。你必须通过从\
  \ Autoconfig 生成的 `env` 文件中注释掉该行，或者通过创建另一个 `env` 文件来调用该文件并在其中包含 `unset TNS_ADMIN`\
  \ 语句，来做出调整。我建议不要修改生成的 `env` 文件，因为它会在任何 Autoconfig 运行时被覆盖，因此你每次都需要记住进行调整。\n\n创建一个名为\
  \ `<db>.env` 的文件，并将其放在路径中的某个目录下，例如 `/usr/local/bin`。我们的数据库名称是 `erpdev`，所以我们会是\n\n\
  ```\n$ cat erpdev.env\n.  /u01/app/oracle/product/11.2.0.3/erpdevdb/erpdev1_exadb01.env\n\
  unset TNS_ADMIN\necho;\necho \"********************************************************\"\
  \necho \"ORACLE_HOME...$ORACLE_HOME\"\necho \"ORACLE_SID....$ORACLE_SID\"\necho\
  \ \"********************************************************\"\necho;\n```\n\n然后，为了进一步简化操作，在\
  \ `.bash_profile` 中添加一个别名定义：\n\n```\nalias erpdev='. /usr/local/bin/erpdev.env'\n\
  ```\n\n然后，为某个数据库设置环境就变得轻而易举了。\n\n```\n$ erpdev\n\n********************************************************\n\
  ORACLE_HOME... /u01/app/oracle/product/11.2.0.3/erpdevdb\nORACLE_SID....erpdev1\n\
  ********************************************************\n```\n\n## “我的 Oracle 支持”说明\n\
  \n任何使用过 Oracle 产品的人都应该熟悉“My Oracle Support”，这是 Oracle 的网站，包含其知识库、补丁下载和服务请求系统。你也可能听到它被称为\
  \ `Metalink`，因为那是它多年来的名字。现在，人们通常称其为“MOS”。无论你怎么称呼它，它都是一个宝贵的资源。\n\n以下是可以在那里找到的相关说明列表。只需搜索参考\
  \ ID，该说明就应该在搜索结果中排名第一。\n\n*   将 Oracle 11g Release 2 真正应用集群与 Oracle 电子商务套件 Release\
  \ 11i 配合使用 [ID 823586.1]\n*   关于应用程序 11i 数据库 11g 的导出/导入说明 [ID 557738.1]\n*   Oracle\
  \ EBS 11i 与 Oracle 数据库 11gR2 (11.2.0) 的互操作性说明 [ID 881505.1]\n*   安装后如何修改 SCAN 设置或\
  \ SCAN 监听器端口 [ID 972500.1]\n\n![image](img/frontdot.jpg)\n\n\n\n谓词过滤通过仅返回基于所提供谓词感兴趣行的数据，进一步提升了此性能。执行智能扫描所需的其他条件，包括直接路径读取以及全表或索引扫描，之前已经介绍过。执行计划也得到了解释，以便您了解哪些信息能表明确实使用了智能扫描，同时还提供了其他指标以进一步证明智能扫描的使用。这些额外指标包括谓词信息中的\
  \ `storage` 关键字，以及 `V$SQL`/`GV$SQL` 视图对中的两列：`io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`。以下示例（首次出现在第\
  \ 2 章）展示了这些列值如何提供智能扫描执行信息。\n\n```sql\nSQL>select  sql_id,\n  2         io_cell_offload_eligible_bytes\
  \ qualifying,\n  3         io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
  \ actual,\n  4         round(((io_cell_offload_eligible_bytes -\nio_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
  \ 2) io_saved_pct,\n  5         sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
  \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
  \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
  \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6 \
  \ 185081856   42510928        22.97 select * from emp where empid = 7934\n\nSQL>\n\
  ```\n\n我们还讨论了 Bloom 过滤器及其在 Exadata 中如何改进连接处理。Bloom 过滤器是限定连接卸载过程的一部分，其使用使连接更加高效。您可以通过合格查询的执行计划看到\
  \ Bloom 过滤器正在使用，如下例所示（同样首次在第 2 章中提供）。\n\n```sql\nExecution Plan\n\nPlan hash value:\
  \ 2313925751\n\nPredicate Information (identified by operation id):\n\n7 - access(\"\
  ED\".\"EMPID\"=\"E\".\"EMPID\")\n  15 - access(\"D\".\"DEPTNUM\"=20)\n  17 - storage(\"\
  ED\".\"EMPDEPT\"=20)\n       filter(\"ED\".\"EMPDEPT\"=20)\n  19 - storage(SYS_OP_BLOOM_FILTER(:BF0000,\"\
  E\".\"EMPID\"))\n       filter(SYS_OP_BLOOM_FILTER(:BF0000,\"E\".\"EMPID\"))\n\n\
  Note\n\n- dynamic sampling used for this statement (level=2)\n\nStatistics\n\n60\
  \  recursive calls\n    174  db block gets\n  40753  consistent gets\n  17710  physical\
  \ reads\n   2128  redo size\n9437983  bytes sent via SQL*Net to client\n 183850\
  \  bytes received via SQL*Net from client\n  16668  SQL*Net roundtrips to/from client\n\
  \      6  sorts (memory)\n      0  sorts (disk)\n 250000  rows processed\n\nSQL>\n\
  ```\n\n执行计划输出中存在 `SYS_OP_BLOOM_FILTER` 函数表明该连接已被卸载。\n\n如果函数在 `V$SQLFN_METADATA`\
  \ 视图中找到，它们也可以被卸载；未在此列表中找到的函数将使查询或语句无法执行智能扫描。虚拟列也可以被卸载，这使得定义了虚拟列的表有资格执行智能扫描。\n\n\
  存储索引在第 3 章中讨论过，它们可能是 Exadata 中最令人困惑的方面，因为这种索引用于告诉 Oracle *不要* 在哪里查找数据。存储索引旨在辅助卸载处理，通过消除表的\
  \ 1MB 数据段，可以显著减少 Oracle 读取的数据量。您了解到存储索引包含最少量的数据。您还了解到，尽管存储索引很小，但它无疑非常强大。它用于跳过未找到所需数据的\
  \ 1MB 段，由此产生的节省可能是巨大的。当然，有其利也有其弊，存储索引可能提供误报，导致 Oracle 读取它不需要的 1MB 段，因为所需值落在存储索引记录的最小/最大范围内，即使该值实际上并不在该表的\
  \ 1MB 段中。为了刷新您的记忆，以下示例说明了这一点。\n\n```sql\nSQL> insert /*+ append */\n  2  into chicken_hr_tab\
  \ (chicken_name, talent_cd, retired, retire_dt, suitable_for_frying, fry_dt)\n \
  \ 3  select\n  4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,\
  \ fry_dt from chicken_hr_tab2\n  5  where talent_cd in (3,5);\n\n1048576 rows created.\n\
  \nElapsed: 00:01:05.10\nSQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.01\n\
  SQL> insert /*+ append */\n  2  into chicken_hr_tab (chicken_name, talent_cd, retired,\
  \ retire_dt, suitable_for_frying, fry_dt)\n  3  select\n  4  chicken_name, talent_cd,\
  \ retired, retire_dt, suitable_for_frying, fry_dt from chicken_hr_tab2\n  5  where\
  \ talent_cd not in (3,5);\n\n37748736 rows created.\n\nElapsed: 00:38:09.12\nSQL>\
  \ commit;\n\nCommit complete.\n\nElapsed: 00:00:00.00\nSQL>\nSQL> exec dbms_stats.gather_table_stats(user,\
  \ 'CHICKEN_TALENT_TAB', cascade=>true, estimate_percent=>null);\n\nPL/SQL procedure\
  \ successfully completed.\n\nElapsed: 00:00:00.46\nSQL> exec dbms_stats.gather_table_stats(user,\
  \ 'CHICKEN_HR_TAB', cascade=>true, estimate_percent=>null);\n\nPL/SQL procedure\
  \ successfully completed.\n\nElapsed: 00:00:31.66\nSQL>\nSQL> set timing on\nSQL>\n\
  SQL> connect bing/#########\nConnected.\nSQL> alter session set parallel_force_local=true;\n\
  \nSession altered.\n\nElapsed: 00:00:00.00\nSQL> alter session set parallel_min_time_threshold=2;\n\
  \nSession altered.\n\nElapsed: 00:00:00.00\nSQL> alter session set parallel_degree_policy=manual;\n\
  \nSession altered.\n\nElapsed: 00:00:00.00\nSQL>\nSQL>\nSQL> set timing on\nSQL>\n\
  SQL> select /*+ parallel(4) */\n  2  chicken_id\n  3  from chicken_hr_tab\n  4 \
  \ where talent_cd = 4;\n\nCHICKEN_ID\n\n...\n\n4718592 rows selected.\n\nElapsed:\
  \ 00:03:17.92\nSQL>\nSQL> select *\n  2  from v$mystat\n  3  where statistic# =\
  \ (select statistic# from v$statname where name = 'cell physical IO bytes saved\
  \ by storage index');\n\nSID      STATISTIC#           VALUE\n--------------- ---------------\
  \ ---------------\n            915             247               0\n\nElapsed: 00:00:00.01\n\
  SQL>\n```\n\n我们认为，为了如此高的效率，这是一个很小的代价。\n\n第 4 章将我们引向智能闪存缓存，它是 Exadata 一个非常多功能的特性，因为它可以用作直读缓存、写回缓存，甚至可以配置为\
  \ ASM 可用的闪存盘。除了此功能范围外，智能闪存缓存还有一部分配置为智能闪存日志，以使重做日志处理更加高效。日志写入既通过日志组写入磁盘，也写入智能闪存日志，首先完成的写入会向\
  \ Oracle 发出信号，表明日志处理已成功完成。这使得 Oracle 能够以比单独使用重做日志更快的速率继续事务处理。\n\n\n## 第 5 章\n\n\
  第 5 章 带我们进入了并行处理的领域，在传统配置的系统中，这一领域可能既有益处也有阻碍。Oracle 11.2.0.x 在并行语句的实现和执行方面提供了改进，这些改进适用于运行此\
  \ Oracle 版本的任何 Exadata 或非 Exadata 配置。正是 Exadata 最初是为数据仓库工作负载而设计这一事实——这类工作负载依赖于并行处理来加速工作流程——使得它成为并行处理的理想选择。\n\
  \n需要某些配置设置才能启用自动并行处理功能，而 Exadata 要实际根据这些配置设置采取行动，一项非常重要的任务——I/O 校准——是必需的。I/O 校准是一个资源密集型过程，不应在系统高负载期间运行。为此提供了一个打包过程\
  \ `dbms_resource_manager.calibrate_io`。一旦 I/O 校准完成，您将需要验证表 5-1 和表 5-2 中的参数和设置。\n\
  \n一旦您将所有设置就绪，就让 Oracle 接管控制权；然后用户就能享受到这一改进的并行处理功能带来的好处。其中一个好处是并行语句排队，Oracle 会推迟执行并行化语句，直到有足够的资源可用。查询\
  \ `V$SQL_MONITOR` 视图（或 `GV$SQL_MONITOR` 以查看集群中所有节点的语句），其状态为 `QUEUED`，将提供一个列表，显示那些正在等待执行完毕的并行语句释放出足够资源的语句。只要您正确设置了资源限制，这就能防止系统过载，相比早期的并行自适应多用户机制是一个巨大的进步。\n\
  \n另一个好处是，Oracle 将根据可用资源动态设置并行度（DOP）。需要注意的一个重要事项是，一旦 DOP 由 Oracle 设置，在执行期间就无法更改，即使有额外的资源变得可用也不行。DOP\
  \ 是基于给定语句的估计串行执行时间来计算的。参数 `parallel_min_time_threshold` 设置了串行执行时间的阈值，这将成为决定是否进行并行执行的关键因素。请记住，您可以通过将隐藏参数\
  \ `_parallel_statement_queuing` 设置为 FALSE 来控制是否启用排队。\n\n并行执行的另一个方面是内存中并行执行。一方面，这可能是理想的行为，因为它消除了磁\
  \ I/O 和数据库服务器与存储单元之间的流量，并且内存的延迟远低于磁盘访问。另一方面，当此功能激活时，智能扫描优化不再可用，因为磁 I/O 被消除了。由于智能扫描优化被消除，数据库服务器必须执行所有存储单元本应执行的读取处理，这增加了\
  \ CPU 使用率。我们还注意到，在我们管理过的任何 Exadata 系统上，我们尚未经历过内存中并行执行。\n\n## 第 6 章\n\n接下来是第 6 章关于压缩的内容。Exadata\
  \ 提供了在任何非 Exadata 平台上都不可用的压缩选项，特别是混合列压缩（HCC）选项。这些选项包括 QUERY HIGH、QUERY LOW、ARCHIVE\
  \ HIGH 和 ARCHIVE LOW。这些选项可以显著减小所选表的大小；然而，压缩表应该处于非活动状态，或者在正常工作时间之外进行批处理，包括重新压缩。如果\
  \ HCC 用于频繁更新的表，压缩级别会自动更改为 OLTP，原本节省的空间就丢失了。使用 HCC 的另一个方面是灾难恢复。如果恢复方法只是将最后一个良好的备份恢复到非\
  \ Exadata 服务器或不使用 Exadata 存储的服务器，则恢复完成后数据库可能无法使用，因为 HCC 在非 Exadata 存储上不受支持。这种情况可以通过解压缩表来纠正，但纠正时，如果目标服务器的表空间是基于\
  \ Exadata 数据库的压缩大小创建的，您可能会遇到空间问题。\n\n第 6 章中的表 6-3 和表 6-4 列出了各种压缩方法（包括 OLTP）的估计和实际压缩比率。这些表格不会在此处重现，但如果您正在考虑使用某种压缩方法来节省空间，再次查看它们是个好主意。\n\
  \n## 第 7 章\n\n第 7 章涵盖了 Exadata 特有的等待事件。这些等待事件报告与单元相关的等待信息。其中七个等待事件在 I/O 等待类别下收集等待数据，而\
  \ `cell statistics gather` 事件似乎被错误地包含在此类别中。`cell single block physical read` 和 `cell\
  \ multiblock physical read` 事件基本上分别取代了旧的 `db file sequential read` 和 `db file scattered\
  \ read` 事件。\n\nRMAN 也有 Exadata 特定的等待事件：`cell smart incremental backup` 和 `cell smart\
  \ restore from backup`。第一个等待事件针对增量 Level 1 备份收集时间，第二个则累积 RMAN 恢复过程中经历的等待时间。由于 Level\
  \ 0 增量本质上是一个完整备份，这些备份经历的等待时间不会被记录。\n\n## 第 8 章\n\n第 8 章涵盖了 Exadata 特有的性能计数器和指标。该章的目的是概述有哪些指标和计数器可用、它们的含义以及您应该在何时考虑使用它们。\n\
  \n单元指标提供了对语句性能以及 Exadata 如何执行语句的洞察。动态计数器如 `cell blocks processed by data layer`\
  \ 和 `cell blocks processed by index layer` 显示了存储单元在处理过程中的效率。每次存储单元能够在无需将数据传回数据库层的情况下完成数据层和索引层处理时，这些计数器就会增加。存储单元将数据传回数据库服务器的两个原因是：需要撤销块的一致性读处理（常规块\
  \ I/O）以及跨存储单元的链式行处理。虽然第一个条件无法完全控制（事务可能非常大，超过了自动块清理的阈值），但第二个问题，链式行，是可以解决并可能纠正的。\n\
  \n\n`cell num fast response sessions` 和 `cell num fast response sessions continuing\
  \ to smart scan` 这两个计数器揭示了 Oracle 选择推迟智能扫描而转为常规块 I/O 的次数，这是为了以最少的操作返回所请求的数据（第一个列出的计数器），以及在快速响应会话未能返回所需数据后，Oracle\
  \ 实际上启动智能扫描的次数。通过展示因为小型常规块 I/O 操作返回了所请求数据而避免智能扫描的频率，这些计数器可以帮助您洞察提交到 Exadata 数据库的语句的性质。\n\
  \n`V$SQL` 也提供了可用于确定语句效率的数据，体现在 `IO_CELL_OFFLOAD_ELIGIBLE_BYTES` 和 `IO_CELL_OFFLOAD_RETURNED_BYTES`\
  \ 这两列中。这两列可用于计算给定查询通过智能扫描实现的节省百分比。\n\n第 9 章 深入探讨了存储单元监控，这是 Exadata 非常重要的一个方面，因为某些指标不会传回数据库服务器。除了\
  \ “root” 账户外，还有两个可用账户，即 `cellmonitor` 和 `celladmin`。使用哪一个取决于需要完成的任务。\n\n`cellmonitor`\
  \ 账户可以访问单元指标和计数器，并能生成监控报告。它在操作系统（O/S）级别的访问权限有限，无法执行来自 `cellcli`（单元命令行界面）的任何管理命令或功能。基本上，`LIST`\
  \ 命令对 `cellmonitor` 是可用的，这些命令足以监控单元并验证其运行正常。\n\n正如您所预期的那样，`celladmin` 账户拥有更大的权限。除了能像\
  \ `cellmonitor` 一样生成报告外，它还能够执行一系列 `ALTER`、`ASSIGN`、`DROP`、`EXPORT` 和 `IMPORT` 命令。\n\
  \n除了 `cellcli`，还可以使用 `cellsrvstat` 以及从集群中任何节点使用 `dcli` 来监控存储单元。`cellcli` 工具也可以直接从命令行运行，只需将希望执行的命令传递给它即可，如下例所示。\n\
  \n```\n[celladmin@myexa1cel03 ∼]$ cellcli -e \"list flashcache detail\"\n        \
  \ name:                   myexa1cel03_FLASHCACHE\n         cellDisk:              \
