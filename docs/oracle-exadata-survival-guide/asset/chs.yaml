  \ ROWS)\n\n25 rows selected.\nSQL>\n```\n\n### 卸载效率分析\n有 25 个会话正在运行相同的语句，每个会话都有不同的监控信息。对于\
  \ Exadata，关键信息之一是 `IO_INTERCONNECT_BYTES`，它间接报告了卸载效率。如果 `PHYSICAL_READ_BYTES` 和\
  \ `PHYSICAL_WRITE_BYTES` 的总和等于 `IO_INTERCONNECT_BYTES` 中的值，则表明该查询或语句完全得益于卸载，效率为\
  \ 100%。正如我们之前指出的，比率和效率是相对数字。但这个比率确实能让你大致了解有多少数据是由卸载处理的，从而节省了数据库层的处理时间。请注意，结果中的每一行\
  \ `offload_pct` 都是 100。你不会总是看到 100% 的卸载效率，因为多部分查询可能包含会卸载和不会卸载的部分，如下列输出所示。\n\n```\n\
  INST   SID  PLAN_HASH ELAPSED   CPU_TM FETCH IO_ICON_BYT TL_BYT_PRC OFFLD_PCT STATUS\n\
  ---- ----- ---------- ------- -------- ----- ----------- ---------- --------- ---------------\n\
