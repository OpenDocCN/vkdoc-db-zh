  \ 72.222222 DONE (ALL ROWS)\n```\n\n来自这两个会话的语句的大部分输出都卸载了，但仍有一部分没有卸载，可能是因为它需要在数据库层进行传统的一致性读处理。也有可能得到高于\
  \ 100% 的百分比。\n\n```\nINST   SID SQL_ID          PLAN_HASH  ELAPSED   CPU_TM FETCH\
  \ IO_ICON_BYT TL_BYT_PRC OFFLD_PCT STATUS\n---- ----- -------------  --------- --------\
  \ -------- ----- ----------- ---------- --------- ------\n   2  1619 192t67rtdqrf8\
