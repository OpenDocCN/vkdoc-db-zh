  \ `'PX Deq: Execution Msg'` 事件，这证明了查询执行期间使用了并行处理。\n\n该事件提供的参数仅包括对象 id (`obj#`) 和单元哈希号\
  \ (`cellhash#`)。参数 `P2` 和 `P3` 未使用。相比之下，直接路径读取事件提供了 `object_id`、文件号、文件中的偏移量（第一个\
  \ dba）以及读取的连续块数（块计数），如下所示：\n\n\n\n### Cell Smart Index Scan\n\n与 `cell smart table\
  \ scan` 类似，`cell smart index scan` 记录了被下推到存储单元执行的快速全索引扫描的时间，唯一的真正区别在于被扫描的对象类型。\n\
  \n在其中一个最活跃的系统中，我们在 `DBA_HIST_ACTIVE_SESS_HISTORY` 中总共记录了 1184 次 `cell smart table\
  \ scan`，而在同一时间段内，只报告了 8 次 `cell smart index scan`。这可能是由于 Oracle 11.2 在串行表扫描时倾向于执行直接路径读取。有一个隐藏参数\
  \ `_serial_direct_read`，通常设置为 `FALSE`，可以设置为 `TRUE` 以促进这种活动。设置此事件可能会在重度使用的生产系统中引发性能问题，因此最好在尽可能接近生产环境的非生产系统上进行测试。请注意，该参数仅指定串行直接读，而不指定这些读操作所操作的对象，因此索引也可以利用这种串行读机制。由于索引往往比它们索引的表小，它们较小的尺寸很可能排除了使用\
  \ `cell smart index scan` 事件的可能性。此外，只有快速全索引扫描有资格进行 `cell smart index scan`；索引范围扫描和索引全扫描不符合条件。\n\
  \n与 `cell smart table scan` 事件类似，`cell smart index scan` 事件没有提供太多信息；在 10046 跟踪文件中只能找到单元哈希号（`cellhash#`）和对象\
  \ ID（`obj#`），参数 `P2` 和 `P3` 同样未被使用。\n\n```\nWAIT #46969064936345: nam='cell smart\
  \ index scan' ela= 178 cellhash#=2520626383 p2=0 p3=0 obj#=448299 tim=1371608209741332\n\
  WAIT #46969064936345: nam='cell smart index scan' ela= 462 cellhash#=2520626383\
  \ p2=0 p3=0 obj#=448299 tim=1371608209752118\n```\n\n### Cell Single-Block Physical\
  \ Read\n\n此事件是 Exadata 系统上非 Exadata 系统中 `db file sequential read` 事件的等价物。这通常表示索引访问操作，包括索引块读取和通过索引查找提供的\
  \ `rowid` 进行的表块读取，但其他操作在访问单个块时也可以使用此事件。\n\n产生 `cell single block physical read`\
  \ 事件的操作可能有很多，如下列来自 `DBA_HIST_ACTIVE_SESS_HISTORY` 的输出所示：\n\n![image](img/Table7-2.jpg)\n\
  \n上述列表中最常见的事件是索引访问，占所列条目中的 11 个。再加上这些事件的总发生次数，就更明显地表明，最有可能标记此事件时间的操作是索引访问。\n\n此事件比迄今为止讨论的其他事件提供了更多信息，报告了单元哈希号（`cellhash#`）、磁盘哈希号（`diskhash#`）、操作期间传递的总字节数（`bytes`）和对象\
  \ ID（`obj#`）。通过此事件，您不仅知道访问了哪个对象，还知道从哪个磁盘、哪个单元读取以及读取了多少字节。以下是在 10046 跟踪文件上使用 `grep`\
  \ 命令输出的一小部分，展示了这些报告的值：\n\n```\nWAIT #47185678513912: nam='cell single block physical\
