  ## 关于作者


  ![image](img/9781430260103_unFM-01.jpg)


  **David Fitzjarrell** 是一位居住在科罗拉多州丹佛/博尔德地区的资深 Oracle 数据库管理员。他在各行各业拥有超过 24 年的经验，目前在大型
  `OLTP` 和 ERP 零售环境中从事 Exadata 相关工作。他从 Oracle 6.0 版本开始接触 Oracle，此后几乎使用过每一个版本，专注于物理管理和性能调优领域。他曾担任落基山
  Oracle 用户组的社交媒体总监，每月为 `databasejournal.com` 撰稿，参与各种 Oracle 论坛和新闻组，并在 `http://dfitzjarrell.wordpress.com`
  撰写专注于 Oracle 技术的博客。


  **Mary Mikell Spence** 是一位居住在佐治亚州亚特兰大都市区的资深 Oracle 数据库管理员，自 1983 年从佐治亚理工学院毕业后一直从事
  IT 领域工作。她从应用程序开发员开始职业生涯，自 1991 年起便与 Oracle 打交道。她的 Oracle 经验涵盖从数据库设计和架构到备份与恢复的方方面面。2000
  年，在一个大型迁移和升级项目中，她开始作为 ERP 数据库管理员使用 Oracle 电子商务套件 11i；过去几年，她参与了一个类似的项目——这次是在 Exadata
  上操作一个多 TB 的 ERP 数据库。可以通过 `http://www.linkedin.com/in/mmspence` 在 LinkedIn 上找到 Mary。


