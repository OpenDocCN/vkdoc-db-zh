  \ |\n\n已选择 58 行。\n\n### 使用 `V$SYSSTAT` 与 `V$SESSTAT`\n\n`V$SYSSTAT` 提供了系统范围的统计信息视图，因此使用此视图来精确定位特定会话的问题将很困难。`V$SESSTAT`\
