  \ 中一个受欢迎的新增功能。它们允许表包含基于同一表中其他列计算得出的值。一个例子是包含工资（`salary`）和佣金（`commission`）之和的 `TOTAL_COMP`\
  \ 列。这些列值不物理存储在表中，因此，例如，更新计算所依据的基础列，将改变虚拟列返回的结果值。与表中的任何其他列一样，虚拟列可以用作分区键、用于约束或索引，并且也可以对其收集统计信息。尽管虚拟列中包含的值不随表的其他数据一起存储，但它们（或者更准确地说，用于生成它们的计算）可以被卸载，因此可以实现智能扫描（Smart\
  \ Scans）。这一点可以通过运行 `smart_scan_virt_ex.sql` 来说明。以下是有所简略的输出。\n\n```\nSQL> create\
  \ table emp (empid number not null,\n  2                    empname varchar2(40),\n\
  \  3                    deptno        number,\n  4                    sal      \
  \     number,\n  5                    comm          number,\n  6               \
  \     ttl_comp      number generated always as (sal + nvl(comm, 0)) virtual );\n\
  \n表已创建。\n\nSQL>\nSQL> begin\n  2          for i in 1..5000000 loop\n  3        \
  \          insert into emp(empid, empname, deptno, sal, comm)\n  4             \
  \     values (i, 'Smorthorper'||i, mod(i, 40)+1, 900*(mod(i,4)+1), 200*mod(i,9));\n\
  \  5          end loop;\n  6          commit;\n  7  end;\n  8  /\n  9  /\n\nPL/SQL\
  \ 过程已成功完成。\n\nSQL>\nSQL> set echo on\nSQL>\nSQL> exec dbms_stats.gather_schema_stats('BING')\n\
  \nPL/SQL 过程已成功完成。\n\nSQL>\nSQL> set autotrace on timing on\nSQL>\nSQL> select *\n\
  \  2  from emp\n  3  where ttl_comp > 5000;\n\nEMPID EMPNAME                   \
  \                   DEPTNO        SAL       COMM   TTL_COMP\n---------- ----------------------------------------\
  \ ---------- ---------- ---------- ----------\n     12131 Smorthorper12131     \
  \                            12       3600       1600       5200\n     12167 Smorthorper12167\
  \                                  8       3600       1600       5200\n     12203\
  \ Smorthorper12203                                  4       3600       1600    \
  \   5200\n     12239 Smorthorper12239                                 40       3600\
  \       1600       5200\n     12275 Smorthorper12275                           \
  \      36       3600       1600       5200\n...\n   4063355 Smorthorper4063355 \
  \                              36       3600       1600       5200\n   4063391 Smorthorper4063391\
  \                               32       3600       1600       5200\n   4063427\
  \ Smorthorper4063427                               28       3600       1600    \
