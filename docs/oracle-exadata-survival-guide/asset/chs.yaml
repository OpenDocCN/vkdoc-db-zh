  \ us)\n     44721      44721      44721   INDEX RANGE SCAN APP_RULE_TMP_STG_IDX2\
  \ (cr=377 pr=353 pw=0 time=1603541 us cost=36 size=7291405 card=3583)(object id\
  \ 196496)\n\nElapsed times include waiting on following events:\n  Event waited\
  \ on                             Times   Max. Wait  Total Waited\n  ----------------------------------------\
  \   Waited  ----------  ------------\n  library cache lock                     \
  \         1        0.00          0.00\n  row cache lock                        \
  \         18        0.00          0.00\n  library cache pin                    \
  \           1        0.00          0.00\n  Disk file operations I/O            \
  \            6        0.00          0.00\n  cell single block physical read    \
  \         25783        1.30        114.29\n  gc cr grant 2-way                 \
  \           1587        0.00          0.18\n  gc current grant 2-way           \
  \           14205        0.00          1.53\n  gc current grant congested      \
  \               69        0.00          0.00\n  gc cr grant congested          \
  \                14        0.00          0.00\n  cell list of blocks physical read\
  \              20        0.31          0.48\n  gc current multi block request  \
  \               12        0.00          0.00\n  log buffer space               \
  \                 2        0.83          0.86\n********************************************************************************\n\
  ```\n\n在这个语句中，值得关注的等待是 `cell single block physical read`，鉴于其总耗时（以秒为单位报告）。执行计划给了我们一个线索，这可能是一个需要与\
  \ `INDEX RANGE SCAN` 步骤一起考虑的等待。请记住，使用 `INDEX RANGE SCAN` 会使该语句不符合 Smart Scan 执行的条件。另请注意，这里没有使用并行执行。考虑到该语句的总耗时，它本应符合自动并行度（Auto\
  \ Degree of Parallelism）的条件。使用并行执行很可能通过将 I/O 分布到多个并行查询从属进程上来改善该语句的性能，从而减少总的等待时间。\n\
  \n### 补充说明\n\n我们已经在第 2 章中介绍了与 Smart Scan 相关的查询计划。回顾那部分内容总是有帮助的。\n\n有三个计划步骤可以指示可能的\
  \ Smart Scan 活动：\n\n*   `TABLE ACCESS STORAGE FULL`\n*   `INDEX STORAGE FULL SCAN`\n\
  *   `INDEX STORAGE FAST FULL SCAN`\n\n在本章前面，我们提到过，计划步骤中的 `STORAGE` 一词仅表示可能发生 Smart\
  \ Scan 执行，因为没有直接路径读取（direct-path reads），就不会触发 Smart Scan。然而，执行计划可以为性能调优提供一个良好的起点。执行计划步骤中缺少\
  \ `STORAGE` 则表明 Smart Scan *没有*发生。如果你检查某个给定语句的计划并在某个表或索引访问步骤中找到了 `STORAGE` 关键字，你可以使用\
  \ `V$SQL` 和 `GV$SQL` 中的数据来验证 Smart Scan 的执行情况。如第 2 章所述，这些视图中至少有两列提供了关于 Smart Scan\
  \ 对查询或语句有多大益处的信息。我们介绍过的两列是 `io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`。我们还提供了一个可以计算实现的\
  \ I/O 节省百分比的查询，这在本章前面的“性能计数器和指标”部分也再次说明过。\n\n### 性能计数器参考\n\nExadata 更新了许多计数器，但这里不会讨论完整的列表。我们选择描述那些我们认为在性能和故障排除方面最“有趣”的计数器。很可能你不需要深入钻研这些来解决大多数性能问题，因为下一节讨论的等待接口和\
  \ SQL 监控通常已经是足够的诊断工具。了解这些计数器是好的，这就是我们提供它们的原因。我们将按名称列出它们，描述它们的目的及其背后的机制，以便让你深入了解\
  \ Exadata 是如何工作的。\n\n`cell blocks helped by commit cache`\n\n\n#### 一致读机制概述\n\n\
  提交缓存是 Oracle 多年来使用的一致读机制的一部分，区别在于其实现于存储单元层面而非数据库服务器层面。回顾一下，在非 Exadata 硬件的标准 Oracle\
  \ 数据库中，一致读涉及根据查询开始时间，利用可用的 Undo 数据，基于锁字节是否被设置来重构该时间点的行数据。在一致读处理期间可能出现两种条件。\n\n####\
  \ 提交 SCN 与快照 SCN 的比较\n\n第一种条件是提交 SCN 低于快照 SCN（在查询开始时建立）。此时，Oracle 可以判定块中的数据无需重构，并可继续处理其他块。\n\
  \n第二种条件是提交 SCN 大于快照 SCN。此时，Oracle 知道需要回滚以返回一致数据，并且在非 Exadata 系统上，它通过可用的 Undo 记录来完成此操作。更复杂的是，提交并不总是清理其触及的每个块；会设置一个阈值以限制提交后立即发生的块清理活动。（此限制为块缓冲区缓存的\
  \ 10%；超过此限制的任何块必须等待下一个触及它们的事务来进行清理。）\n\n#### 延迟块清理问题\n\n这导致数据块处于必须确定事务状态的状态。通常在非\
  \ Exadata 系统上，数据库层执行此处理。想象一下，需要将这些块从存储单元发送回数据库层，以通过 Undo 记录执行标准的一致读处理。对于少数块，这在 Exadata\
  \ 上可能可行，但存在需要以这种方式处理的块数量极大的可能性。性能会很慢，从而剥夺了 Exadata 的一个关键特性。由于 Undo 数据对存储单元不可用（存储单元无法访问数据库缓冲区缓存），且任何存储单元不与其他存储单元通信，因此必须采用另一种机制。\n\
  \n#### 提交缓存优化\n\nExadata 采用一种优化，以最小化数据库层处理一致读请求的需要。它被称为提交缓存。提交缓存跟踪哪些事务 ID 已提交，哪些未提交。通过从数据块中的感兴趣事务列表（ITL）中提取事务\
  \ ID，存储单元可以访问此提交缓存并查看引用的事务是否已提交。如果该特定事务 ID 的信息在提交缓存中不可用，存储单元会向数据库层请求其状态。收到后，它会将其添加到提交缓存中，因此其余存储单元无需再次发出请求。\n\
  \n每次存储单元在提交缓存中找到其所需的事务信息时，`cell blocks helped by commit cache` 计数器会增加 1。在事务活动频繁期间监控此计数器，当等待接口和\
  \ SQL 监视器未提供足够数据来诊断性能问题时，会非常有帮助。在 Smart Scan 期间看到此计数器增加，表明单元正在执行延迟块清理，这是因为插入、更新或删除的数据量大于清理阈值所要求的。提交缓存正是为此目的而设计，并阻止存储单元持续与数据库层通信。它还显著减少了\
  \ Smart Scan 期间数据库层的逻辑 I/O。\n\n#### 最小活动 SCN 优化\n\n**受 minscn 优化帮助的存储单元块**\n\n另一个\
  \ Exadata 特有的一致读优化是最小活动 SCN 优化，它跟踪仍处于活动状态的事务的最低 SCN。这通过允许 Exadata 将来自 ITL 的事务 SCN\
  \ 与数据库中最旧仍活动事务的最低 SCN 进行比较，来提高一致读性能。数据库层在 Smart Scan 操作开始时将此信息发送到单元。当提交 SCN 低于传递给单元的最小活动\
  \ SCN 时，可以避免数据库层与单元之间不必要的通信。在块 ITL 中找到的任何低于最小活动 SCN 的事务 SCN，存储单元都已知其已提交。每个从此机制受益的块都会递增\
  \ `cell blocks helped by minscn optimization` 计数器。在性能方面，此优化也减少了对前面讨论的提交缓存的检查。因为这是\
  \ Exadata，很可能运行在其上的数据库是 RAC 数据库，所以最小活动 SCN 是 RAC 感知的。实际上称为全局最小 SCN，每个实例中的 MMON 进程跟踪此\
  \ SCN 并更新每个节点的 SGA。`X$TUMASCN` 表包含 RAC 集群的当前全局最小 SCN，如下所示：\n\n```\nSQL> select min_act_scn\n\
  \  2  from x$ktumascn;\n\nMIN_ACT_SCN\n-----------\n    12345678\nSQL>\n```\n\n\
  `cell blocks helped by minscn optimization` 计数器不是您会经常使用的（如果有的话）。但是，当 Smart Scan\
  \ 因频繁回退到块 I/O 以从数据库层获取事务信息而中断时，这是一个很好的起点。\n\n#### 存储单元提交缓存查询计数器\n\n**存储单元提交缓存查询**\n\
  \n每次 Smart Scan 查询单元提交缓存以获取事务状态时，此计数器会递增。对于在块中找到的每个未提交事务，当 MinActiveSCN 优化不适用于其事务\
  \ SCN（意味着事务 SCN 大于或等于最小活动 SCN）时，会执行此操作。此计数器与 `cell blocks helped by minscn` 计数器密切相关。\n\
  \n#### 存储单元缓存层处理计数器\n\n**由缓存层处理的存储单元块**\n\n这是 Exadata 收集的四个“层”统计信息之一，报告所列处理层的活动。此特定统计信息报告为\
  \ Smart Scan 操作由存储单元实际处理的块数。当单元将块传回数据库服务器（块 I/O 模式）时，此统计信息不会递增。当单元在 Smart Scan 期间实际处理块时，它会递增。当单元为一致读打开块时，会检查块缓存头，以确保正在读取正确的块，并且该块有效且未损坏。缓存层进程（内核缓存缓冲区管理，或\
  \ KCB）执行这些功能并将 `cell blocks processed by cache layer` 计数报告回数据库。\n\n当数据库层处理常规块 I/O\
  \ 时，可能会更新两个统计信息之一：`consistent gets from cache` 或 `consistent gets from cache (fastpath)`。存储单元通过\
  \ CELLSRV 仅执行一致读取，而非当前模式读取。记录在 `db block gets from cache` 或 `db block gets from\
  \ cache (fastpath)` 中的所有当前模式读取均来自数据库层。`cell blocks processed by cache layer` 计数器中记录的任何计数都提供了有关存储单元执行了多少逻辑读取的数据，无论是从\
  \ `V$SYSSTAT` 的系统范围数据，还是通过 `V$SESSTAT` 的会话级别数据。\n\n在查询执行计划中同时发现数据库层和单元层处理并不罕见。较小的表不太可能符合\
  \ Smart Scan 的条件，因此将由数据库服务器处理。使用小型查找表和大型处理表的多表连接可能会产生此类计划。\n\n#### 存储单元数据层处理\n\n\
  **由数据层处理的存储单元块**\n\n\n\n## 数据库性能统计指标详解\n\n### 概述\n上一个计数器记录了单元格缓存读取活动，而本统计信息则记录从表或物化视图中读取的物理块。数据层模块的内核数据扫描（KDS）从数据块中提取行和列，传递给谓词过滤和列投影处理。当存储单元格无需数据库块\
  \ I/O 即可完成所有必要工作时，此计数器会递增。\n\n### 统计指标关联分析\n当会话级的本统计信息计数与会话级的 `cell blocks processed\
  \ by index layer` 计数相加时，可以确定存储单元格是否完成了所有一致性读取。如果每个处理块都在存储层读取，则这些计数器的总和将等于会话级的 `cell\
  \ blocks processed by cache layer` 计数器计数。如果总和较小，则表示数据库层执行了常规块 I/O 处理。其差值应为数据库服务器处理的块数。\n\
  \n#### cell blocks processed by index layer\n存储单元格可以以类似方式处理索引块与表和物化视图块。此统计信息记录通过智能扫描处理\
  \ B*树和位图索引段的索引块数量。\n\n#### cell blocks processed by txn layer\n由于此计数器记录事务层处理的块数，了解该层的内部操作将很有帮助。回顾智能扫描处理一致性读取的基本说明，我们来看一下在此过程中会发生什么。\n\
  \n缓存层通过 KCB 打开块，然后检查头部、最后修改的 SCN 和清理状态。如果最后修改的 SCN 不大于快照 SCN（因为自查询开始后未被修改），事务层将获取此块。如果最后修改的\
  \ SCN 大于快照 SCN，则表明块自查询开始后已被修改，需要回滚到快照 SCN。这会导致块被传递回数据库层进行块 I/O 处理。\n\n如果块通过第一次测试，它将被传递到事务层，由内核事务读一致性进程（KTR）处理，该进程使用最小活动\
  \ SCN 和提交缓存，减少与数据库层的通信量。然后事务层执行数据块处理以提取请求的信息，与数据层和索引层协同工作，在存储单元格级别执行一致性读取。\n\n####\
  \ cell flash cache read hits\n此计数器在第 4 章中已讨论过，这里仅简要提及。这是另一个累积指标，存在于会话级和实例级。监控此指标的最简单方法是使用我们在第\
  \ 4 章中提供的脚本。我们也在此提供，因为监控智能闪存缓存是性能故障排除的关键部分。\n\n```sql\nSQL> select statistic#, value\n\
  \  2  from v$mystat\n  3  where statistic# in (select statistic# from v$statname\
  \ where name = 'cell flash cache read hits');\n\nSTATISTIC#      VALUE\n----------\
  \ ----------\n       605          1\n\nSQL>\nSQL> select count(*)\n  2  from emp;\n\
  \nCOUNT(*)\n\nSQL>\nSQL> column   val new_value endval\nSQL>\nSQL> select statistic#,\
  \ value val\n  2  from v$mystat\n  3  where statistic# in (select statistic# from\
  \ v$statname where name = 'cell flash cache read hits');\n\nSTATISTIC#        VAL\n\
  ---------- ----------\n       605        857\n\nSQL>\nSQL>\nSQL> select &endval\
  \ - &beginval flash_hits\n  2  from dual;\n\nFLASH_HITS\n\nSQL>\n```\n\n此计数器还提供物理\
  \ I/O 请求的数量，因为访问智能闪存缓存是物理 I/O 而非逻辑 I/O。\n\n#### cell index scans\n每次在 B*树或位图索引段上启动智能扫描时，此计数器都会递增。由于这需要执行计划中的索引快速全扫描步骤，并且还必须使用直接路径读取，因此必须同时满足这两个条件才能使此计数器递增。\n\
  \n智能扫描是段级操作，因此在非分区索引上串行运行的查询将对每个访问的索引段递增一次。对于并行访问的分区索引段，每个并行查询从进程访问每个分区段时，此计数器可能递增一次。由于分区段的大小可能不同，对于给定的分区索引，可以通过不同方法访问这些段。较大的段可能通过直接路径读取访问，因此此计数器将递增。较小的分区可能不会触发直接路径读取，在这种情况下，不会执行智能扫描，计数器值也不会增加。\n\
  \n#### cell IO uncompressed bytes\n如果不使用压缩，您将不会看到此统计信息发生变化，因为它仅在智能扫描压缩卸载发生时递增。此统计信息报告压缩数据的实际未压缩大小。例如，如果有\
  \ 10MB 的压缩数据，解压缩后为 20MB，则在该数据卸载时，`cell IO uncompressed bytes` 计数器将增加 20MB。`physical\
  \ read total bytes` 计数器将增加 10MB，因为这是段大小。看到 `cell IO uncompressed bytes` 计数器比 `physical\
  \ read total bytes counter` 增长更快不是问题，因为如前所述，`physical read total bytes` 计数器根据读取的段大小递增，而\
  \ `cell IO uncompressed bytes` 计数器报告处理的未压缩总字节数。\n\n#### cell num fast response sessions\n\
  Oracle 可以选择延迟完整智能扫描执行，首先执行少量块 I/O 操作，尝试满足查询。`FIRST_ROWS`、`FIRST_ROWS_n` 和 `where\
  \ rownum` 查询会触发此行为，当 Oracle 决定不立即执行智能扫描时，此计数器会递增。为了提高查询效率和速度，Oracle 可以避免设置智能扫描，转而执行少量块\
  \ I/O 操作来满足查询。此计数器报告自实例启动以来 Oracle 执行此操作的次数。此计数器递增并不意味着未执行完整的智能扫描，只是 Oracle 尝试尽可能少地工作来返回所需结果。\n\
  \n#### cell num fast response sessions continuing to smart scan\n在 Oracle 决定延迟运行智能扫描以减少可能的工作量后，可能认为必须执行智能扫描才能向调用会话返回正确结果。当做出此切换时，此计数器会递增。由于这发生在\
  \ Oracle 最初决定不运行完整智能扫描之后，因此适用相同的触发条件——正在运行 `FIRST_ROWS`、`FIRST_ROWS_n` 和 `where\
  \ rownum` 查询。此外，当此统计信息递增时，您可能会注意到一些 `db file sequential read` 等待。尽管大多数此类读取报告为 `cell\
  \ single block physical read` 等待事件，但较旧命名的事件在 Exadata 上仍可能递增。\n\n#### cell num smart\
  \ IO sessions using passthru mode due to _______\n\n\n"
- "# 第九章\n\n![image](img/frontdot.jpg)\n\n## 存储单元监控\n\n这里有三个这样的计数器，其中 `______` 可以是\
  \ `user`、`CELLSRV` 或时区。这些计数器指示了启动智能扫描但转换为常规块 I/O 模式的次数。当这种情况发生时，块会传递到数据库服务器，并绕过单元处理。智能扫描实际上是在读取块，但没有在本地单元上进行任何处理，而是将它们发送到数据库服务器进行处理。除非存储单元上存在内存问题，否则您不应该看到这些计数器增加，因为直通处理不应该发生。如果这些计数器开始递增，这是一个很好的迹象，表明存在需要调查的存储单元级别的问题。\n\
  \n## 单元指标\n\n**直接发送到数据库节点以平衡 CPU 使用率的 cell 物理 IO 字节数**\n\n该计数器记录了 cell CPU 使用率过高导致\
  \ Oracle 选择回退到直通模式的次数，这使得数据库服务器执行常规块 I/O 以减轻存储单元的 CPU 负载。通常，您不应该看到此计数器增加。同样，如果它开始递增，则表明存在需要诊断的存储单元级别的问题。在旧版本的\
  \ Exadata 中，此计数器的名称为 `cell physical IO bytes pushed back due to excessive CPU on\
  \ cell`。\n\n**由单元处理的链接行**\n\n链接行在任何数据库中都可能是个问题，在 Exadata 中尤其如此，因为磁盘组跨所有可用磁盘条带化，并由每个可用存储单元访问。在未使用\
  \ ASM 的非 Exadata 数据库中，链接或延续行将位于另一个块中，但很可能与链头在同一个磁盘上。使用 ASM 和 Exadata 时，行的下一个片段可能位于另一个存储单元访问的另一个磁盘上。请记住，存储单元之间不通信，因此当\
  \ Oracle 遇到链接行时，智能扫描将在数据库层回退到常规块 I/O，以便处理该链接行。这对于链接行处理效率更高，但它确实会减慢智能扫描速度。链接行越多，智能扫描就越慢。如果智能扫描可以从行头片段获取所需的数据，那么智能扫描不会损失任何速度，并且处理将像往常一样流畅进行。如果\
  \ Oracle 需要访问该链接行的任何其他片段，则需要常规块 I/O，从而减慢智能扫描速度。\n\n此统计信息 `chained rows processed\
  \ by cell` 报告在存储单元内处理的链接行，即行片段（或至少是 Oracle 需要返回结果的那些片段）位于给定存储单元访问的存储范围内。这被称为块内链接，即行片段位于与行头相同的数据块中。这是行链接的一种特殊情况，适用于超过\
  \ 255 列的行。下一个片段与行头在同一个块中，无需额外操作即可获取。\n\n**由单元拒绝的链接行**\n\n该计数器记录了链接行的下一个片段不在同一个块或单元中的情况，如前一节所述。此统计信息在特殊情况下递增，因为在我们管理的系统中，我们不经常看到它递增。当此计数器递增时，智能扫描会回退到常规块\
  \ I/O 来处理该行。\n\n**由单元跳过的链接行**\n\n这是当智能扫描必须恢复为常规块 I/O 时最常递增的统计信息。同样，当找到链接行且剩余片段驻跨整个存储条带（跨越多个存储单元）时，它会递增。目前尚不清楚在此类情况下前一个计数器或此计数器何时应递增。我们发现，当智能扫描回退到常规块\
  \ I/O 来处理链接行时，此计数器最常递增。\n\n## SQL 语句性能\n\n了解 SQL 语句在执行期间的时间花费非常重要。`V$SQL`、`V$SQL_MONITOR`、`V$SQL_PLAN_MONITOR`\
  \ 和 `V$ACTIVE_SESSION_HISTORY` 是用于分析 SQL 语句性能的优秀视图。以下是使用 `V$SQL` 的示例，展示了查询如何受益于智能扫描优化：\n\
  \n```\nSQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes qualifying,\n  3\
  \  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,\n  4\
  \  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
  \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
  \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
  \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
  \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6 \
  \ 185081856   42510928        22.97 select * from emp where empid = 7934\n\nSQL>\n\
  ```\n\n请注意 `V$SQL` 中使用的以下列：\n\n*   `io_cell_offload_eligible_bytes`\n*   `io_cell_offload_returned_bytes`\n\
  \n这两列告诉您有多少字节符合条件可以卸载，以及作为智能扫描卸载的结果实际返回了多少字节。提供的查询计算了节省的 I/O 字节占总符合条件字节的百分比，因此您可以看到智能扫描执行对所讨论查询的效率。\n\
  \n## 需知事项\n\n本章的目的并非提供关于 Exadata 的详尽性能调优参考，而是概述可用的指标和计数器、它们的含义以及何时应考虑使用它们。\n\n`cell`\
  \ 指标提供了对语句性能以及 Exadata 如何执行语句的洞察。像 `cell blocks processed by data layer` 和 `cell\
  \ blocks processed by index layer` 这样的动态计数器显示了存储单元在处理过程中的效率。每当存储单元能够完成数据层和索引层处理而无需将数据传回数据库层时，这些计数器就会递增。存储单元将数据传回数据库服务器的两个原因是一致性读处理需要撤销块（常规块\
  \ I/O）和链接行处理中链接片段跨越存储单元的情况。虽然第一个条件无法完全控制（事务可能非常大，超过自动块清除阈值），但第二个问题，即链接行，是可以解决并可能纠正的。\n\
  \n`cell num fast response sessions` 和 `cell num fast response sessions continuing\
  \ to smart scan` 计数器揭示了 Oracle 选择推迟智能扫描而改用常规块 I/O 的次数，这是试图以最少的工作量返回请求的数据（列出的第一个计数器），以及当快速响应会话未能返回请求的数据后，Oracle\
  \ 实际启动智能扫描的次数。通过显示由于小型常规块 I/O 操作返回了请求的数据而避免智能扫描的频率，这些计数器可以让您洞察提交到 Exadata 数据库的语句的性质。\n\
  \n`V$SQL` 也提供了可用于确定语句效率的数据，位于 `io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`\
  \ 列中。这两列可用于计算智能扫描为给定查询实现的节省百分比。\n\n\n## 管理和监控 Exadata 存储单元\n\n### 存储单元概述\n到目前为止，我们已经介绍了足够的\
  \ Exadata 架构知识，您已经了解到存储单元独立于数据库服务器，并提供自己的指标和计数器。由于数据库服务器不直接与存储通信，因此由存储单元负责向数据库服务器提供请求的数据。为了协助完成此任务，存储单元拥有自己的\
  \ CPU 和内存，这些资源可提供额外的处理能力。它们还拥有自己的操作系统级用户账户，本章我们将关注其中的两个。\n\n感兴趣的账户是 `celladmin`\
  \ 和 `cellmonitor`，具体使用哪个账户取决于任务的性质。您可能已经猜到，`cellmonitor` 账户可以访问计数器和指标，但不能执行任何管理任务。`celladmin`\
  \ 账户也可以访问指标和计数器，但还拥有启动和停止所有单元服务的管理权限。访问存储单元是真正监控单元性能并诊断与单元相关的性能问题的唯一方法。\n\n### 与存储单元通信\n\
  与存储单元通信需要登录到存储单元，Exadata 为此提供了两个专用账户。我们讨论的第一个账户是 `cellmonitor`，这是一个能够访问单元性能指标和计数器的账户。`cellmonitor`\
  \ 账户是存储服务器上的受限账户，仅能访问其主目录和有限的命令。我们将介绍的第二个账户是 `celladmin`，这是一个管理账户，在操作系统级别拥有更多的特权和对存储单元的访问权限。虽然数据库服务器不直接与存储设备通信，但可以使用\
  \ `ssh` 从 Exadata 系统中的任何数据库服务器登录到每个可用的存储单元，以检查性能指标。\n\n![image](img/sq.jpg) **注意**\
  \ 由于存储服务器运行的是 Linux 内核，因此“root”账户也存在于每个可用的存储单元上，并且为该账户在 Exadata 系统中的所有服务器配置了用户等效性（无需密码即可登录）。除非您是数据库机器管理员\
  \ (DMA)，否则您不太可能被授予“root”权限。在“root”访问权限与系统管理员 (SA) 关联的企业中，DBA 通常可以访问 `celladmin`\
  \ 和 `cellmonitor` 用户账户及其密码。本章我们将遵循基本的 SA/DBA 职责分离原则进行介绍。\n\n### 查找存储单元\n可用存储服务器的名称和\
  \ IP 地址可以在 Exadata 系统中任何数据库服务器的 `/etc/hosts` 文件中找到。以下示例展示了这些条目在 `/etc/hosts` 文件中的样子。\n\
  \n```\n#### CELL Node Private Interface details\n123.456.789.3    myexa1cel01-priv.mydomain.com      \
  \ myexa1cel01-priv\n123.456.789.4    myexa1cel02-priv.mydomain.com       myexa1cel02-priv\n\
  123.456.789.5    myexa1cel03-priv.mydomain.com       myexa1cel03-priv\n123.456.789.6    myexa1cel04-priv.mydomain.com      \
  \ myexa1cel04-priv\n123.456.789.7    myexa1cel05-priv.mydomain.com       myexa1cel05-priv\n\
  123.456.789.8    myexa1cel06-priv.mydomain.com       myexa1cel06-priv\n123.456.789.9    myexa1cel07-priv.mydomain.com      \
  \ myexa1cel07-priv\n```\n\n一个简单的 `ssh` 命令即可让您以 `cellmonitor` 身份连接到其中一个可用的存储单元。\n\
  \n```\nssh cellmonitor@myexa1cel04-priv.mydomain.com\n```\n\n除非您配置了无密码 `ssh`，否则将需要输入密码。\n\
  \n```\ncellmonitor@myexa1cel04-priv.mydomain.com's password:\n[cellmonitor@myexa1cel04\
  \ ∼]$\n```\n\n您现在已使用 `cellmonitor` 账户连接到存储单元 4。连接到其余存储单元使用相同的过程，只是单元名称不同。所有存储单元上的可用命令都是相同的，但为了避免混淆，我们将仅提供一个单元的示例。\n\
  \n### 监控目标\n目标是监控和管理存储单元，确保诸如智能闪存缓存和智能扫描等区域正常运行。检查两个账户均可访问的指标对于确保 Exadata 以最佳性能运行，并且没有硬件/固件/配置错误给最终用户带来问题至关重要。\n\
  \n### 指标名称\n`cellsrvstat` 报告的单元指标名称相当详细，因此应该不难理解。例如，在我们看来，智能 I/O 指标的名称清晰且具有描述性。\n\
  \n```\n活动智能 I/O 会话数\n智能 I/O 会话数高水位线\n已完成的智能 I/O 会话数\n智能 I/O 卸载效率（百分比）\n因存储索引而避免的\
  \ IO 大小（KB）\n当前待发出的智能 I/O（KB）\n待发出的智能 I/O 总量（KB）\n当前正在执行 IO 的智能 I/O（KB）\n正在执行 IO\
  \ 的智能 I/O 总量（KB）\n当前正在闪存中缓存的智能 I/O（KB）\n正在闪存中缓存的智能 I/O 总量（KB）\n当前已完成 IO 的智能 I/O（KB）\n\
  已完成 IO 的智能 I/O 总量（KB）\n当前正在过滤的智能 I/O（KB）\n正在过滤的智能 I/O 总量（KB）\n当前已完成过滤的智能 I/O（KB）\n\
  已完成过滤的智能 I/O 总量（KB）\n当前已过滤的智能 I/O 大小（KB）\n已过滤的智能 I/O 总量（KB）\nCPU 直通输出 IO 总量（KB）\n\
  直通输出 IO 总量（KB）\n当前结果正在发送的智能 I/O（KB）\n结果正在发送的智能 I/O 总量（KB）\n当前正在发送中被过滤的智能 I/O（KB）\n\
  发送中被过滤的智能 I/O 总量（KB）\n从闪存读取的智能 I/O 总量（KB）\n由智能 I/O 发起的闪存填充总量（KB）\n从硬盘读取的智能 I/O 总量（KB）\n\
  写入硬盘的智能 I/O（fcre）总量（KB）\n小于 512KB 的智能 I/O 请求数\n大于等于 512KB 且小于 1MB 的智能 I/O 请求数\n\
  大于等于 1MB 且小于 2MB 的智能 I/O 请求数\n大于等于 2MB 且小于 4MB 的智能 I/O 请求数\n大于等于 4MB 且小于 8MB 的智能\
  \ I/O 请求数\n大于等于 8MB 的智能 I/O 请求数\n智能 I/O 缓冲区预留失败次数\n智能 I/O 请求未命中的次数\n智能 IO 因不允许而未能发出的次数\n\
  达到智能 I/O 预取限制的次数\n智能扫描使用非优化模式的次数\n智能 fcre 使用非优化模式的次数\n智能备份使用非优化模式的次数\n```\n\n这样的指标使得评估（例如）智能\
  \ I/O 性能变得容易，因为没有指标使用不清晰的缩写或可能无法准确反映所报告统计性质的名称。\n\n如果没有 `DETAIL` 关键字，`cellcli` 接口的输出可能难以阅读。这就是我们更喜欢使用\
  \ `DETAIL` 的原因，除非我们正在查找特定指标并希望获得属性的简短列表。下一节将提供 `cellcli` 生成的两种版本的输出。\n\n### 基础监控：作为\
  \ cellmonitor\n当以 `cellmonitor` 身份连接时，您可以使用 CellCLI，这是用于监控存储单元的命令行界面。在 `CellCLI>`\
  \ 提示符下键入 `help` 可以生成完整的命令列表。\n\n```\n[cellmonitor@myexa1cel04 ∼]$ cellcli\nCellCLI:\
  \ Release 11.2.3.2.1 - Production on Wed Aug 07 13:19:59 CDT 2013\n\nCopyright (c)\
  \ 2007, 2012, Oracle.  All rights reserved.\nCell Efficiency Ratio: 234\n\nCellCLI>\
  \ help\n```\n\n\n\n## 帮助 [主题]\n\n### 可用主题：\n`ALTER`\n`ALTER ALERTHISTORY`\n`ALTER\
  \ CELL`\n`ALTER CELLDISK`\n`ALTER GRIDDISK`\n`ALTER IBPORT`\n`ALTER IORMPLAN`\n\
  `ALTER LUN`\n`ALTER PHYSICALDISK`\n`ALTER QUARANTINE`\n`ALTER THRESHOLD`\n`ASSIGN\
  \ KEY`\n`CALIBRATE`\n`CREATE`\n`CREATE CELL`\n`CREATE CELLDISK`\n`CREATE FLASHCACHE`\n\
  `CREATE FLASHLOG`\n`CREATE GRIDDISK`\n`CREATE KEY`\n`CREATE QUARANTINE`\n`CREATE\
  \ THRESHOLD`\n`DESCRIBE`\n`DROP`\n`DROP ALERTHISTORY`\n`DROP CELL`\n`DROP CELLDISK`\n\
  `DROP FLASHCACHE`\n`DROP FLASHLOG`\n`DROP GRIDDISK`\n`DROP QUARANTINE`\n`DROP THRESHOLD`\n\
  `EXPORT CELLDISK`\n`IMPORT CELLDISK`\n`LIST`\n`LIST ACTIVEREQUEST`\n`LIST ALERTDEFINITION`\n\
  `LIST ALERTHISTORY`\n`LIST CELL`\n`LIST CELLDISK`\n`LIST FLASHCACHE`\n`LIST FLASHCACHECONTENT`\n\
  `LIST FLASHLOG`\n`LIST GRIDDISK`\n`LIST IBPORT`\n`LIST IORMPLAN`\n`LIST KEY`\n`LIST\
  \ LUN`\n`LIST METRICCURRENT`\n`LIST METRICDEFINITION`\n`LIST METRICHISTORY`\n`LIST\
  \ PHYSICALDISK`\n`LIST QUARANTINE`\n`LIST THRESHOLD`\n`SET`\n`SPOOL`\n`START`\n\n\
  `CellCLI>`\n\n由于您以 `cellmonitor` 身份连接，诸如 `ALTER`、`ASSIGN`、`CALIBRATE`、`DROP`、`EXPORT`\
  \ 和 `IMPORT` 等管理命令不可用。这些命令是为 `celladmin` 用户账户保留的。`DESCRIBE`、`LIST` 和 `SET` 是可用的，`SPOOL`\
  \ 命令也可用，用于将输出发送到文件。\n\n那么，作为 `cellmonitor` 你能做什么呢？您可以执行监控任务以确保存储单元正常运行。注意这里长长的 `LIST`\
  \ 命令列表。它们用于报告存储单元操作的重要领域，包括智能闪存缓存。我们将从查看智能闪存缓存开始。\n\n```\nCellCLI> list flashcache\
  \ attributes all\n         myexa1cel04_FLASHCACHE  FD_08_myexa1cel04,FD_10_myexa1cel04,FD_00_myexa1cel04,FD_12_myexa1cel04,FD_03_myexa1cel04,FD_02_\n\
  myexa1cel04,FD_05_myexa1cel04,FD_01_myexa1cel04,FD_13_myexa1cel04,FD_04_myexa1cel04,FD_11_myexa1\n\
  cel04,FD_15_myexa1cel04,FD_07_myexa1cel04,FD_14_myexa1cel04,FD_09_myexa1cel04,FD_06_myexa1cel04\
  \     2013-07-09T17:33:53-05:00               1488.75G        7af2354f-1e3b-4932-b2be-4c57a1c03f33\
  \     \n1488.75G        normal\n\nCellCLI>\n```\n\n`LIST FLASHCACHE ATTRIBUTES ALL`\
  \ 命令会返回所有可用属性的值，但输出格式可能难以阅读。您可以缩小列表范围，仅报告选定的属性。\n\n```\nCellCLI> list flashcache\
  \ attributes name, degradedCelldisks, effectiveCacheSize\n         myexa1cel04_FLASHCACHE\
  \          1488.75G\n\nCellCLI>\n```\n\n请注意，任何 `LIST FLASHCACHE ATTRIBUTES` 语句的输出中都不包含属性名称。您可以使用\
  \ `DESCRIBE` 命令来提供属性名称，如下所示：\n\n```\nCellCLI> describe flashcache\n        name\n\
  \        cellDisk\n        creationTime\n        degradedCelldisks\n        effectiveCacheSize\n\
  \        id\n        size\n        status\n\nCellCLI>\n```\n\n您也可以使用 `LIST FLASHCACHE\
  \ DETAIL` 命令来获取更用户友好的输出，如下所示：\n\n```\nCellCLI> list flashcache detail\n        \
  \ name:                   myexa1cel04_FLASHCACHE\n         cellDisk:           \
  \    FD_08_myexa1cel04,FD_10_myexa1cel04,FD_00_myexa1cel04,FD_12_myexa1cel04,FD_03_myexa1cel04,FD_02_\n\
  myexa1cel04,FD_05_myexa1cel04,FD_01_myexa1cel04,FD_13_myexa1cel04,FD_04_myexa1cel04,FD_11_myexa1\n\
  cel04,FD_15_myexa1cel04,FD_07_myexa1cel04,FD_14_myexa1cel04,FD_09_myexa1cel04,FD_06_myexa1cel04\n\
  \         creationTime:           2013-07-09T17:33:53-05:00\n         degradedCelldisks:\n\
  \         effectiveCacheSize:     1488.75G\n         id:                     7af2354f-1e3b-4932-b2be-4c57a1c03f33\n\
  \         size:                   1488.75G\n         status:                 normal\n\
  CellCLI>\n```\n\n输出按每个属性一行进行格式化，并提供了名称，因此您知道哪个属性对应哪个值。查看属性，报告的大小小于智能闪存缓存总共的 1600GB。这不是问题，因为闪存日志也是从智能闪存缓存存储中配置的，并消耗了总缓存大小的\
  \ 512MB。闪存日志使 Oracle 能够同时将重做日志写入重做日志文件和闪存存储，以加速事务处理。首先完成的写入会通知 Oracle 事务已成功记录在重做流中。这允许更快的事务时间和更高的吞吐量，因为\
  \ Oracle 不需要等待重做日志写入。您可以像报告闪存缓存一样报告闪存日志。\n\n```\nCellCLI> list flashlog detail\n\
  \         name:                   myexa1cel04_FLASHLOG\n         cellDisk:     \
  \          FD_14_myexa1cel04,FD_05_myexa1cel04,FD_00_myexa1cel04,FD_01_myexa1cel04,FD_04_myexa1cel04,FD_07_\n\
  myexa1cel04,FD_09_odevx1cel04,FD_02_myexa1cel04,FD_08_myexa1cel04,FD_03_myexa1cel04,FD_15_\n\
  myexa1cel04,FD_12_myexa1cel04,FD_11_myexa1cel04,FD_06_myexa1cel04,FD_10_myexa1cel\
  \ 04,FD_13_\nmyexa1cel04\n         creationTime:           2013-07-09T17:33:31-05:00\n\
  \         degradedCelldisks:\n         effectiveSize:          512M\n         efficiency:\
  \             100.0\n         id:                     7eb480f9-b94a-4493-bfca-3ba00b6618bb\n\
  \         size:                   512M\n         status:                 normal\n\
  \nCellCLI>\n```\n\n该存储单元的智能闪存缓存和闪存日志报告的总大小为 1489.25GB，仍然小于分配给缓存的 1600GB。与物理磁盘一样，智能闪存缓存中使用的“磁盘”也需要为操作系统管理任务（如\
  \ inode 列表等）预留空间。无需担心，因为分配的空间足以让智能闪存缓存提供出色的性能。如果大小小于 1488.75GB，则表明一个或多个闪存磁盘存在问题。我们将在后面的章节中使用\
  \ `celladmin` 账户来介绍该问题。\n\n您还可以列出有关网格磁盘（配置在存储层中的物理驱动器）的详细信息。`LIST GRIDDISK ATTRIBUTES\
  \ name, size` 报告以下输出：\n\n```\nCellCLI> list griddisk attributes name, size;\n  \
  \       DATA_MYEXA1_CD_00_Myexa1cel04   2208G\n         DATA_MYEXA1_CD_01_Myexa1cel04\
  \   2208G\n         DATA_MYEXA1_CD_02_Myexa1cel04   2208G\n...\n         DBFS_DG_CD_02_Myexa1cel04\
  \       33.796875G\n         DBFS_DG_CD_03_Myexa1cel04       33.796875G\n      \
  \   DBFS_DG_CD_04_Myexa1cel04       33.796875G\n...\n         RECO_MYEXA1_CD_00_Myexa1cel04\
  \   552.109375G\n         RECO_MYEXA1_CD_01_Myexa1cel04   552.109375G\n        \
  \ RECO_MYEXA1_CD_02_Myexa1cel04   552.109375G\n...\n         RECO_MYEXA1_CD_11_Myexa1cel04\
  \   552.109375G\n\nCellCLI>\n```\n\n磁盘组名称是磁盘名称的一部分，这使得很容易查看每个磁盘组中每个磁盘的空间。使用 `LIST\
  \ GRIDDISK DETAIL` 可以获得更详细的信息；部分报告如下：\n\n```\nCellCLI> list griddisk detail\n  \
  \       name:                   DATA_MYEXA1_CD_00_Myexa1cel04\n         asmDiskgroupName:\
  \       DATA_MYEXA1\n         asmDiskName:            DATA_MYEXA1_CD_00_MYEXA1CEL04\n\
  \         asmFailGroupName:       MYEXA1CEL04\n         availableTo:\n         cachingPolicy:\
  \          default\n         cellDisk:               CD_00_Myexa1cel04\n       \
  \  comment:\n         creationTime:           2013-07-09T17:36:41-05:00\n      \
  \   diskType:               HardDisk\n         errorCount:             0\n     \
  \    id:                     aa946f1e-f7c4-4fee-8660-4c69c830ef59\n         offset:\
  \                 32M\n         size:                   2208G\n         status:\
  \                 active\n```\n\n\n\n## 监控网格磁盘与存储单元\n\n### 使用 LIST 命令查看信息\n\n通过\
  \ `LIST` 命令的 `DETAIL` 选项可以查看完整的属性列表，其输出格式为 `属性: 值`。某些 `LIST` 命令（例如 `LIST GRIDDISK\
  \ DETAIL`）会产生较长的输出，您可以等待滚动停止后再记录可用的属性。掌握属性列表后，就可以查询感兴趣的特定属性。\n\n例如，使用 `LIST GRIDDISK\
  \ ATTRIBUTES name, celldisk, offset, size, status` 命令可以生成更易于管理的可读报告。\n\n```\nCellCLI>\
  \ LIST GRIDDISK ATTRIBUTES name, celldisk, offset, size, status\n         DATA_MYEXA1_CD_00_myexa1celMyexa1cel04\
  \   CD_00_myexa1celMyexa1cel04       32M             2208G           active\n  \
  \       DATA_MYEXA1_CD_01_myexa1celMyexa1cel04   CD_01_myexa1celMyexa1cel04    \
  \   32M             2208G           active\nmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
  \         DBFS_DG_CD_03_myexa1celMyexa1cel04       CD_03_myexa1celMyexa1cel04  \
  \     2760.15625G      33.796875G      active\n         DBFS_DG_CD_04_myexa1celMyexa1cel04\
  \       CD_04_myexa1celMyexa1cel04       2760.15625G      33.796875G      active\n\
  \         DBFS_DG_CD_05_myexa1celMyexa1cel04       CD_05_myexa1celMyexa1cel04  \
  \     2760.15625G      33.796875G      active\nmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
  \         RECO_MYEXA1_CD_00_myexa1celMyexa1cel04   CD_00_myexa1celMyexa1cel04  \
  \     2208.046875G     552.109375G     active\n         RECO_MYEXA1_CD_01_myexa1celMyexa1cel04\
  \   CD_01_myexa1celMyexa1cel04       2208.046875G     552.109375G     active\n \
  \        RECO_MYEXA1_CD_02_myexa1celMyexa1cel04   CD_02_myexa1celMyexa1cel04   \
  \    2208.046875G     552.109375G     active\nmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
  \nCellCLI>\n```\n\n### 磁盘配置说明\n\n在 Exadata 配置期间，磁盘根据 `/opt/oracle.SupportTools/onecommand/onecommand.params`\
  \ 文件中的数据被划分为多个切片。默认情况下，`SizeArr` 变量设置为 2208GB，这是为数据磁盘组分配的切片大小。其他切片大小均由此初始设置衍生而来。（可以更改磁盘分配；该过程将在\
  \ 第 11 章 中讨论。）每个磁盘有 32MB 用于管理进程和数据，这解释了 ASM 可用的第一个磁盘切片的偏移量。在上面的示例中，第一个切片分配给了 `DATA_MYEXA1`\
  \ 磁盘组，大小为 2208GB。下一个可用切片用于恢复磁盘组，大小为 565360MB。最后一个切片用于 DBFS 磁盘组，提供 34608MB 的存储空间。初始\
  \ 32MB 之后的每个偏移量都是 32MB 加上已配置切片的大小；它为磁盘上配置的 ASM 存储的每个区域提供了“起始点”。\n\n### 存储单元账户与权限\n\
  \n`cellmonitor` 账户是在服务器级别查看存储单元的一个良好起点，但它功能受限，因为它只是一个监控账户，无法管理存储单元。要更深入地研究存储单元并获取额外的统计信息和指标，您必须使用\
  \ `celladmin` 账户。\n\n以 `celladmin` 身份连接到存储单元与以 `cellmonitor` 身份连接没有区别；但是，`celladmin`\
  \ 提供了更多的功能和指标访问权限。除了 `cellcli`，`celladmin` 账户还可以访问 `cellsrvstat`，它可以提供 `cellcli`\
  \ 未报告的额外统计信息和指标。\n\n当以 `celladmin` 身份连接时，`cellcli` 接口提供了本章前面列出的全部函数列表。由于这是一个管理员账户，您可以执行\
  \ `cellmonitor` 无法完成的以下操作：\n\n```\nALTER ALERTHISTORY\nALTER CELL\nALTER CELLDISK\n\
  ALTER GRIDDISK\nALTER IBPORT\nALTER IORMPLAN\nALTER LUN\nALTER PHYSICALDISK\nALTER\
  \ QUARANTINE\nALTER THRESHOLD\nASSIGN KEY\nCREATE CELL\nCREATE CELLDISK\nCREATE\
  \ FLASHCACHE\nCREATE FLASHLOG\nCREATE GRIDDISK\nCREATE KEY\nCREATE QUARANTINE\n\
  CREATE THRESHOLD\nDESCRIBE\nDROP ALERTHISTORY\nDROP CELL\nDROP CELLDISK\nDROP FLASHCACHE\n\
  DROP FLASHLOG\nDROP GRIDDISK\nDROP QUARANTINE\nDROP THRESHOLD\nEXPORT CELLDISK\n\
  IMPORT CELLDISK\n```\n\n### 查看告警历史\n\n在存储单元的可用指标中，告警历史是开始查找潜在问题的好地方。查看 `LIST ALERTHISTORY\
  \ DETAIL` 的输出，我们看到以下信息：\n\n```\nCellCLI> list alerthistory detail\n         name:\
  \                   1_1\n         alertMessage:           \"Cell configuration checkdiscovered\
  \ the following problems:\nCheck Exadata configuration via ipconf utility Verifying\
  \ of Exadata configuration file /opt/oracle.cellos/cell.conf Error. Exadata configuration\
  \ file not found /opt/oracle.cellos/cell.conf [INFO] The ipconf check may generate\
  \ a failure for temporary inability to reach NTP or DNS server. You may ignore this\
  \ alert, if the NTP or DNS servers are valid and available. [INFO] You may ignore\
  \ this alert, if the NTP or DNS servers are valid and available. [INFO] As root\
  \ user run /usr/local/bin/ipconf -verify -semantic to verify consistent network\
  \ configurations.\"\n         alertSequenceID:        1\n         alertShortName:\
  \         Software\n         alertType:              Stateful\n         beginTime:\
  \              2013-05-14T22:31:59-05:00\n         endTime:                2013-06-20T11:36:18-05:00\n\
  \         examinedBy:\n         metricObjectName:       checkconfig\n         notificationState:\
  \      0\n         sequenceBeginTime:      2013-05-14T22:31:59-05:00\n         severity:\
  \               critical\n         alertAction:            \"Correct the configuration\
  \ problems. Then run cellcli command:\nALTER CELL VALIDATE CONFIGURATION   Verify\
  \ that the new configuration is correct.\"\n\nmyexa1celmyexa1cel....\n\nname:  \
  \                 4_1\n         alertMessage:           \"The disk controller battery\
  \ is executing a learn cycle and may\ntemporarily enter WriteThrough Caching mode\
  \ as part of the learn cycle. Disk write throughput\nmight be temporarily lower\
  \ during this time. The flash drives are not affected. The battery\nlearn cycle\
  \ is a normal maintenance activity that occurs quarterly and runs for approximately\
  \ 1\nto 12 hours.  Note that many learn cycles do not require entering WriteThrough\
  \ caching mode.\nWhen the disk controller cache returns to the normal WriteBack\
  \ caching mode, an additional\ninformational alert will be sent.  Battery Serial\
  \ Number : 6360  Battery Type          : iBBU08\nBattery Temperature   : 35 C  Full\
  \ Charge Capacity  : 1342 mAh  Relative Charge       : 97 %\nAmbient Temperature\
  \   : 22 C\"\n         alertSequenceID:        4\n         alertShortName:     \
  \    Hardware\n         alertType:              Stateful\n         beginTime:  \
  \            2013-07-17T04:00:56-05:00\n         endTime:                2013-07-17T10:09:16-05:00\n\
  \         examinedBy:\n         metricObjectName:       LUN_LEARN_CYCLE_ALERT\n\
  \         notificationState:      0\n         sequenceBeginTime:      2013-07-17T04:00:56-05:00\n\
  \         severity:               info\n         alertAction:            Informational.\n\
  ```\n\n\n## Exadata 警报管理与系统监控\n\n### 1. 警报属性示例\n\n以下是名为 `4_2` 的警报详细信息示例：\n```\n\
  name:                   4_2\n         alertMessage:           \"All disk drives\
  \ are in WriteBack caching mode.  Battery Serial\nNumber : 6360  Battery Type          :\
  \ iBBU08  Battery Temperature   : 39 C  Full Charge\nCapacity  : 1345 mAh  Relative\
  \ Charge       : 52 %  Ambient Temperature   : 21 C\"\n         alertSequenceID:        4\n\
           alertShortName:         Hardware\n         alertType:              Stateful\n\
           beginTime:              2013-07-17T10:09:16-05:00\n         endTime:                2013-07-17T10:09:16-05:00\n\
           examinedBy:\n         metricObjectName:       LUN_LEARN_CYCLE_ALERT\n        \
  \ notificationState:      0\n         sequenceBeginTime:      2013-07-17T04:00:56-05:00\n\
           severity:               clear\n         alertAction:            Informational.\n\
  \nCellCLI>\n```\n\n### 2. `examinedBy` 属性的使用\n\n在这里，您可以看到警报的名称（`name`）、消息（`alertMessage`）、时间范围（`beginTime`,\
  \ `endTime`）、严重程度（`severity`）以及处理操作（`alertAction`）等属性。同时，请注意 `examinedBy` 属性。该属性报告了检查此警报的数据库管理员（DBA）或数据库管理助理（DMA）的用户\
  \ ID 或别名。在阅读警报历史后设置此属性是一个很好的做法，因为它能让系统上其他活跃的 DBA 或 DMA 知道这些警报已被查阅。这个任务相当容易完成，因为它可以针对历史中的所有警报执行，也可以仅对满足特定条件的警报执行，例如\
  \ `alertType='Stateful'` 或 `alertShortName='Software'`。您可以使用以下命令为历史中的所有警报设置 `examinedBy`：\n\
  \n```\nCellCLI> alter alerthistory all examinedBy=dfitzj01\nAlert 1_1 successfully\
  \ altered\nAlert 1_2 successfully altered\nAlert 2 successfully altered\nAlert 3_1\
  \ successfully altered\nAlert 3_2 successfully altered\nAlert 4_1 successfully altered\n\
  Alert 4_2 successfully altered\n\nCellCLI>\n```\n\n如果存在已确认（acknowledged）和未确认（unacknowledged）的警报，您将不得不按名称为未确认的警报设置\
  \ `examinedBy`；`WHERE` 子句仅对 `LIST` 命令可用。您可以使用以下命令找到未确认的警报：\n\n```\nCellCLI> list\
  \ alerthistory attributes name where examinedBy = ''\n         1_1\n         1_2\n\
  \n3_1\n         3_2\n         4_1\n         4_2\n\nCellCLI>\n```\n\n这将为您提供所有未确认警报的名称。您现在可以按名称更新它们，如下所示：\n\
  \n```\nCellCLI> alter alerthistory 1_1,1_2,2,3_1,3_2,4_1,4_2 examinedBy=dfitzj01\n\
  Alert 1_1 successfully altered\nAlert 1_2 successfully altered\nAlert 2 successfully\
  \ altered\nAlert 3_1 successfully altered\nAlert 3_2 successfully altered\nAlert\
  \ 4_1 successfully altered\nAlert 4_2 successfully altered\n\nCellCLI>\n```\n\n\
  在此示例中，所有警报都是未确认的，但使用 `ALL` 将导致您丢失已为已确认警报设置的任何 `examinedBy` 值。您应该养成在阅读警报时就为其设置 `examinedBy`\
  \ 的习惯，因为 `exachk`（Exadata 系统验证实用程序）会检查未审阅的警报。\n\n### 3. 警报类型与处理\n\n一些警报通知您必须采取的操作，例如存储服务器的固件修订。另一些则通知您\
  \ Oracle 需要处理的支持问题，例如故障磁盘和 PCIe 卡。这些警报是信息性的，让您知道需要做什么，以便您决定由谁来完成工作。实际的硬件问题属于 Oracle\
  \ 客户支持（OCS）的范畴，而诸如固件升级等问题可以由 DBA 和/或系统管理员（SA）在现场完成。\n\n### 4. 使用 `cellsrvstat` 工具监控\n\
