  \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n \
  \         0  sorts (disk)\n          1  rows processed\n\nSQL>\n```\n\n### 运行校准过程\n\
  \n运行校准过程简单直接，我们将磁盘数量和预期延迟 10 传递给脚本。该过程会返回实际延迟，以及存储系统可以支持的最大 IOPS 和最大每秒兆字节数：\n\n\
  ```\nSQL> @calibrate_io\nEnter value for dsks: 36\nEnter value for maxlat: 10\n\
  old   7:    dbms_resource_manager.calibrate_io (&dsks, &maxlat, Calc_iops, Calc_mbps,\
  \ Calc_lat);\nnew   7:    dbms_resource_manager.calibrate_io (36, 10, Calc_iops,\
  \ Calc_mbps, Calc_lat);\nMax IOPS          : 1022\nMax mbytes-per-sec: 2885\nCalc.\
  \ latency     : 11\n\nPL/SQL procedure successfully completed.\n\nElapsed: 00:07:10.57\n\
  SQL>\n```\n\n### 查看校准结果\n\n一旦校准完成，查询 `V$IO_CALIBRATION_STATUS` 会报告与之前不同的结果：\n\n\
  ```\nSQL> select *\n  2  from v$io_calibration_status;\n\nSTATUS        CALIBRATION_TIME\n\
  ------------- -----------------------------------------------------------\nREADY\
  \         08-APR-13 11.24.49.977 AM\n\nSQL>\n```\n\n如果您在 I/O 校准运行期间查询 `V$IO_CALIBRATION_STATUS`，该视图将报告类似于以下输出的结果：\n\
  \n```\nSQL> select *\n  2  from v$io_calibration_status;\n\nSTATUS        CALIBRATION_TIME\n\
  ------------- -----------------------------------------------------------\nIN PROGRESS\
  \   01-APR-12 09.34.13.083 AM\n\nSQL>\n```\n\n报告的 `CALIBRATION_TIME` 值将来自上一次运行；正是\
  \ `IN PROGRESS` 状态让您知道 I/O 校准正在运行。\n\n查询 `DBA_RSRC_IO_CALIBRATE` 会显示完成运行后记录的所有当前校准统计数据：\n\
  \n```\nSQL> select num_physical_disks, max_iops, max_mbps, max_pmbps, latency\n\
  \  2  from dba_rsrc_io_calibrate;\n\nNUM_PHYSICAL_DISKS    MAX_IOPS    MAX_MBPS\
  \   MAX_PMBPS     LATENCY\n-------------------- ---------- ---------- ----------\
  \ ----------\n                  36       1022       2885       2885         11\n\
  \nSQL>\n```\n\n\n```\n"
- "# 第五章标题\n\nNUM_PHYSICAL_DISKS   MAX_IOPS   MAX_MBPS  MAX_PMBPS    LATENCY\n------------------\
  \ ---------- ---------- ---------- ----------\n                36       1022   \
  \    2885        289         11\n\n```\n\n成功完成 I/O 校准后，如果查询或语句达到或超过了 `parallel_min_time_threshold`\
  \ 参数所表示的串行执行时间阈值，那么自动 DOP 将设置并行度，而不管是否有对象被显式设置为并行执行。您可能会发现，一旦 I/O 校准完成，某些任务可能需要更长时间才能完成，因为它们被放入了队列。这可能是因为分配的并行资源可能不足以满足所有符合并行执行条件的查询和语句。有一份\
  \ Metalink Note，文档 ID 1393405.1，解释了如何删除 I/O 校准统计信息。简而言之，这两个视图都基于一个单一的表：`RESOURCE_IO_CALIBRATE$`。从该表中删除数据会清除\
  \ I/O 校准统计信息，从而使自动 DOP 不再起作用。在统计信息被删除时处于队列中的语句将保留在队列中直到被执行；在 I/O 校准统计信息被删除后，不会有额外的语句被加入队列。这并不像乍看起来那样是一种激烈的措施，因为\
  \ `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 在使用相同的语句生成当前统计信息之前，会删除任何现有的 I/O 校准值，正如部分\
  \ tkprof 输出所示：\n\n```\nSQL ID: bzhku92rujah0 Plan Hash: 256968859\n\ndelete from\
  \ resource_io_calibrate$\n\ncall     count       cpu    elapsed       disk     \
  \ query    current        rows\n------- ------  -------- ---------- ---------- ----------\
