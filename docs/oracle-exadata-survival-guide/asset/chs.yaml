  EMP                                  956301312\nEMP_IDX                        \
  \      260046848\nSALGRADE                                 65536\n\nElapsed: 00:00:00.01\n\
  SQL>\nSQL> --\nSQL> -- 执行第二次更新\nSQL> --\nSQL> -- 注意耗时\nSQL> --\nSQL> update emp\
  \ set sal=sal*1.08 where empno > 7350;\n\n14680064 rows updated.\n\nElapsed: 00:03:48.95\n\
  SQL>\nSQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.01\nSQL>\nSQL> --\n\
