  \n使用 `dcli`，您可以将输出重定向到一个文件。设置一个脚本来定期执行此监控，并将输出写入带日期的日志文件，是通过 `cron` 调度此监控的好方法。\n\
  \n延续监控的主题，第 10 章 讨论了在数据库级别和存储单元级别监控 Exadata 的各种方法，并包括了实时 SQL 监控的讨论。涵盖了 GUI 和脚本方法。\n\
  \n建立基线是必须的，以确保您实施的任何监控过程都能提供有用且可用的信息。没有基线，您充其量只是在试图击中一个移动的目标。基线不需要在性能“良好”时建立；它只需要被创建，为所有后续的监控数据提供一个参考点。\n\
  \n在我们看来，Exadata 的首选 GUI 是 Oracle Enterprise Manager 12c (OEM12c)，并安装了 Diagnostic\
  \ and Tuning Pack。以这种方式配置的 OEM12c 可以生成实时 SQL 监控报告。Oracle 将自动监控并行运行的 SQL 语句，也会监控合并\
  \ I/O 和 CPU 时间超过五秒的序列化语句。\n\nOracle 提供了 `GV$SQL`、`GV$SQLSTATS` 和 `GV$SQL_MONITOR`\
  \ 视图（以及其他视图），允许您从 SQL*Plus 内部生成实时 SQL 监控报告。还提供了 `DBMS_SQLTUNE.REPORT_SQL_MONITOR`\
  \ 过程，该过程可以为给定的 `sql_id` 生成 HTML 报告。下面是如何调用此过程的示例。\n\n```\nselect dbms_sqltune.report_sql_monitor(session_id=>&sessid,\
  \ report_level=>'ALL',type=>'HTML') from dual;\n```\n\n`TYPE` 参数可以有三个值之一：TEXT、HTML，或者，如果您的服务器上有活动的互联网连接，则可以是\
  \ ACTIVE。第三个值生成的 HTML 报告与 OEM12c 中的屏幕非常相似。\n\n您可以安装 Exadata Storage Server 的 System\
  \ Monitoring 插件，该插件配置 OEM12c 访问存储单元，返回指标数据，以便可以从与数据库服务器相同的位置进行监控。如果您无法访问 OEM12c，或者未安装\
  \ Exadata 存储插件，您仍然可以从命令行监控存储单元。第 9 章 和 第 10 章 都提供了使用命令行实用程序监控存储单元的方法。请参考这些章节以获取更多详细信息和示例。\n\
  \n第 11 章 介绍了存储重新配置，我们认为无论您是否需要在两个主要磁盘组之间重新分配存储，都需要讨论这个主题。正如所讨论的，只需要三个步骤即可删除现有的存储配置。重建该配置则需要一个包含磁盘分区、用户帐户创建、grid\
  \ disk 创建以及在存储单元和数据库服务器上重新创建存储单元初始化文件的 26 步过程。\n\n准备工作是成功更改 `+DATA_<system name>`\
  \ 和 `+RECO_<system name>` 磁盘组之间存储分布的关键。作为此过程的一部分，“oracle” 操作系统账户在集群中所有可用的数据库服务器上被删除并重新创建。作为删除\
  \ “oracle” 操作系统账户的一部分，“oracle” 在所有可用数据库服务器上的操作系统主目录将被删除并重新创建。在执行任何实际的存储重新配置步骤之前，保留这些主目录是必要的。\n\
  \n一旦存储重新配置步骤成功完成，就需要恢复 “oracle” 操作系统用户主目录，并重新安装和重新配置在重新配置过程中可能丢失的任何 OEM 代理。如果您已将\
  \ SCAN 监听器的端口从默认值更改，则可能还需要重新配置它。\n\n理解您需要将数据库迁移到 Exadata 平台，第 12 章 通过提供物理和逻辑迁移方法来解决该任务。请记住，并非所有系统在内存值的写入方式上都是相同的。一些被认为是大端（big-endian），另一些是小端（little-endian）。一个操作系统是其中之一；没有其他选择。\n\
  \n物理方法包括 RMAN、物理备用数据库和可传输表空间。RMAN 可以通过将数据文件转换为正确的字节序格式，让您从不同的平台迁移数据库。当操作系统的字节序设计不同时，RMAN\
  \ 也与可传输表空间方法一起使用。\n\n逻辑方法包括导出和导入、数据库链接以及复制，无论是使用 Streams 还是使用 Golden Gate。请记住，复制对要迁移的数据类型施加了一些限制。物理迁移方法可能是最佳的。\n\
  \n对象在迁移过程中可能会失效。在检查目标数据库中的无效对象时，生成源数据库中无效对象的列表作为参考是一个好习惯。应在迁移后运行 `$ORACLE_HOME/rdbms/admin/utlrp.sql`\
  \ 脚本以编译无效对象。\n\n将 Oracle ERP 数据库迁移到 Exadata 可能带来独特的问题。第 13 章 讨论了这些迁移。每个 ERP 数据库必须在其自己的\
  \ `Oracle Home` 中运行。不允许 ERP 数据库之间共享 `Oracle Home`。这是一项长期存在的 Oracle 标准。此外，每个数据库都必须有一个专用的监听器。\n\
  \n\n\n## 监听器问题可能是最具挑战性的。\n\n首先，你必须决定 SCAN 监听器是继续使用 1521 端口还是必须更换。虽然你可以使用 SCAN 监听器，但在开发/测试集群上这样做并不实际，因为那里很可能运行着多个\
  \ ERP 数据库。每个数据库都需要自己的监听器端口，因此也需要自己的监听器。为了保持一致，我们发现最好的做法是不让任何数据库将 SCAN 监听器作为主监听器。\n\
  \n你需要将数据库注册到 SCAN 监听器，这样 `dbca` 命令才能工作。每个 ERP 数据库既会注册到一个专属于该数据库的唯一监听器和端口，也会注册到 SCAN\
  \ 监听器本身。请记住，`dbca` 用途广泛，包括向数据库添加实例、向 Grid Control OMS 注册数据库以及配置 Database Vault 等等——仅举几例。\n\
  \n务必配置好你的 `$ORACLE_HOME/network/admin`，以确保后续在数据库层运行 Autoconfig 时不会破坏你的 TNS 配置。请将配置详情充分告知任何可能运行\
  \ Autoconfig 的人。\n\n正确克隆每个 `ORACLE_HOME`，使其在中央清单中注册。如果未遵循克隆流程，该 Home 将不会被注册，你也无法为其应用季度补丁包。\n\
  \n## 成为 DMA 与否\n\nExadata 是一种供 DBA 管理的不同系统。在此环境中，某些任务（例如运行 `exachk` 脚本）需要 root 操作系统权限。该脚本可以由系统管理员运行，如果你作为\
  \ DBA 管理 Exadata，情况通常如此。然而，相对于 Exadata 出现了一个新的角色，即数据库机器管理员，或 DMA。让我们看看成为 DMA 的真正含义。\n\
  \n除了通常的 DBA 技能外，DMA 还必须熟悉并能够理解在指定系统上的以下管理和监控命令。\n\n在计算节点（数据库节点）上：\n\n*   Linux:\
  \ `top`, `mpstat`, `vmstat`, `iostat`, `fdisk`, `ustat`, `sar`, `sysinfo`\n*   Exadata:\
  \ `dcli`\n*   ASM: `asmcmd`, `asmca`\n*   Clusterware: `crsctl`, `srvctl`\n\n在存储服务器/Cell\
  \ 上：\n\n*   Linux: `top`, `mpstat`, `vmstat`, `iostat`, `fdisk`, `ustat`, `sar`,\
  \ `sysinfo`\n*   Cell 管理: `cellcli`, `cellsrvstat`\n\n成为 DMA 还包括一些与成为 DBA 无关的其他职责领域。表\
  \ 14-1 总结了 DMA 的职责领域。\n\n**表 14-1. DMA 职责**\n\n| 技能 | 百分比 |\n| --- | --- |\n| 系统管理员\
  \ | 15 |\n| 存储管理员 |   0 |\n| 网络管理员 |   5 |\n| 数据库管理员 | 60 |\n| Cell 管理员 | 20 |\n\
  \n“百分比”列表示整个 Exadata 系统需要此知识的比例，如你所见，如果你曾是 11g RAC 管理员，那么你已具备成为 DMA 所需技能的 60%。成为\
  \ DMA 所需的其余技能并不难以学习和掌握。我们已经介绍了你需要的 Cell 管理员命令（`cellcli`、`dcli`），这为你提供了 80% 的技能集。你可能需要的网络命令包括\
  \ `ifconfig`、`iwconfig`、`netstat`、`ping`、`traceroute` 和 `tracepath`。在某些时候，你可能还需要\
  \ `ifup` 和 `ifdown` 来启用或禁用网络接口，尽管使用这些命令不会是常规操作。以下示例展示了如何启用 `eth0` 接口。\n\n```\n#\
  \ ifup eth0\n```\n\n成为一名 DMA 似乎是一项艰巨的任务，但实际上并没有那么难。这确实需要一种稍微不同的心态，因为你现在审视和管理的是整个系统，而不仅仅是数据库。你的\
  \ Exadata 系统仍然需要专门的系统管理员和网络管理员，因为作为 DMA，你不会负责这些资源的配置，也不会负责打补丁和固件升级。DMA 本质上是通过承担这些资源日常提供的任务来协助这些专门的管理员。\n\
  \n## 不懂，可以查\n\nIT 世界变化非常迅速，因此不能期望你无所不知。然而，你可以知道在哪里找到所需的信息。以下资源可协助你作为 DBA 或 DMA 在\
  \ Exadata 上的旅程。\n\n*   `http://tahiti.oracle.com`—在线 Oracle 文档站点\n*   `www.oracle.com/us/products/database/exadata/overview/index.html`—Oracle\
  \ 技术网站 Exadata 资源\n*   `www.tldp.org/LDP/GNU-Linux-Tools-Summary/html/c8319.htm`—Linux\
  \ 网络命令参考\n*   `www.yolinux.com/TUTORIALS/LinuxTutorialSysAdmin.html`—Linux 系统管理教程\n\
  *   `https://support.oracle.com`—My Oracle Support 网站\n*   `http://blog.tanelpoder.com/category/exadata/`—Tanel\
  \ Poder 的 Exadata 博客，来自 Exadata 性能调优专家\n*   `http://kevinclosson.wordpress.com/kevin-closson-index/exadata-posts/`—Kevin\
  \ Closson 的 Exadata 文章，关于存储层的绝佳资源\n*   `http://arup.blogspot.com/`—Arup Nanda 的博客，你可以在其中搜索与\
  \ Exadata 相关的文章\n*   `www.enkitec.com/`—Enkitec 博客，来自一家专注于 Exadata 并主办年度 Exadata\
  \ 主题会议的公司\n*   `http://jonathanlewis.wordpress.com/?s=exadata`—Jonathan Lewis 的优秀\
  \ Exadata 文章\n\n这些是我们遇到问题时经常查阅的资源。你可能会找到其他你喜欢的，但这些是很好的起点。\n\n## 需知事项\n\n本章并非 Exadata\
  \ 的速成课程；其目的是回顾我们已涵盖的领域，为你这段旅程带来一些视角。当你开始这段探索之旅时，Exadata 可能只是一个笼罩在神秘面纱中、被人们以敬畏语气提及的名字。随着你通读本书，你迈出的每一步都将\
  \ Exadata 带出迷雾，并希望通过事实和实例取代炒作和谣言，使其变得清晰，以便你现在能更好地承担起 Exadata DBA 或 DMA 的职责。\n\n"
