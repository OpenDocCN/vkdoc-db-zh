  SQL>\nSQL> select segment_name, sum(bytes) total_space\n  2  from user_segments\n\
  \  3  group by segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n\
  ----------------------------------- -----------\nDEPT                          \
  \            65536\nDUMMY                                     65536\nEMP       \
  \                           511705088\nEMP_IDX                              260046848\n\
  SALGRADE                                 65536\n\n已用时间: 00:00:00.01\nSQL>\n```\n\
  \n### 压缩行为分析\n\n表的整体大小仍然小于原始大小。部分填充的数据块仍处于未压缩状态，这导致了大小的增加。随着这些数据块被填满，它们将以批处理方式自动压缩，从而进一步减小表的大小。\n\
  \n对使用 HCC 压缩的数据进行更新，会表现出您在阅读本章提供的示例后所预期的行为。然而，在此场景中，由于更新操作，压缩算法发生了变化。数据最初以 `QUERY\
  \ HIGH` 压缩，在更新后，压缩变为 `OLTP`，并保持此状态直到您进行修改。数据字典仍然报告 HCC 处于有效状态，它也确实如此，但由于更新，Oracle\
  \ 现在将此数据视为使用 `OLTP` 压缩方案压缩的数据。我们将使用为 `QUERY HIGH` 压缩的 `EMP` 表，然后是为 `QUERY LOW` 压缩的表来更新数据，以说明此行为。\n\
  \n### QUERY HIGH 压缩下的更新\n\n```\nSQL> --\nSQL> -- 在压缩数据上执行更新\nSQL> --\nSQL> -- 注意完成所需的已用时间\n\
  SQL> --\nSQL> update emp set sal=sal*1.08 where empno > 7350;\n\n14680064 行已更新。\n\
  \n已用时间: 00:42:34.40\nSQL>\nSQL> commit;\n\n提交完成。\n\n已用时间: 00:00:00.03\nSQL>\nSQL>\
  \ --\nSQL> -- 数据字典中的压缩类型没有改变，\nSQL> -- 但消耗的空间已增加到最初为 OLTP 压缩的表的水平\nSQL> --\nSQL>\
  \ select table_name, compression, compress_for\n  2  from user_tables;\n\nTABLE_NAME\
  \                     COMPRESS COMPRESS_FOR\n------------------------------ --------\
  \ ------------\nDEPT                           DISABLED\nBONUS                 \
  \         DISABLED\nSALGRADE                       DISABLED\nDUMMY             \
  \             DISABLED\nEMP                            ENABLED  QUERY HIGH\n\n已用时间:\
  \ 00:00:00.03\nSQL>\nSQL> select segment_name, sum(bytes) total_space\n  2  from\
  \ user_segments\n  3  group by segment_name;\n\nSEGMENT_NAME                   \
  \     TOTAL_SPACE\n----------------------------------- -----------\nDEPT       \
  \                               65536\nDUMMY                                   \
  \  65536\nEMP                                  226492416\nEMP_IDX              \
  \                721420288\nSALGRADE                                 65536\n\n已用时间:\
  \ 00:00:00.33\nSQL>\nSQL> --\nSQL> -- 执行第二次更新\nSQL> --\nSQL> -- 注意已用时间\nSQL> --\n\
  SQL> update emp set sal=sal*1.08 where empno > 7350;\n\n14680064 行已更新。\n\n已用时间:\
  \ 00:03:15.00\nSQL>\nSQL> commit;\n\n提交完成。\n\n已用时间: 00:00:00.02\nSQL>\nSQL> --\n\
  SQL> -- 第二次更新后当前的存储消耗情况\nSQL> --\nSQL> select table_name, compression, compress_for\n\
  \  2  from user_tables;\n\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
  ------------------------------ -------- ------------\nDEPT                     \
  \      DISABLED\nBONUS                          DISABLED\nSALGRADE             \
  \          DISABLED\nDUMMY                          DISABLED\nEMP              \
  \              ENABLED  QUERY HIGH\n\n已用时间: 00:00:00.02\nSQL>\nSQL> select segment_name,\
  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  \nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                      65536\nDUMMY          \
  \                           65536\nEMP                                  452984832\n\
  EMP_IDX                              721420288\nSALGRADE                       \
  \          65536\n\n已用时间: 00:00:00.21\nSQL>\n```\n\n请注意，与表关联的索引在第一次更新后大小也会增加，并在随后的表更新期间保持该大小。我们现在将对为\
  \ `QUERY LOW` 压缩的 `EMP` 表执行相同的更新，如下所示：\n\n### QUERY LOW 压缩下的更新\n\n```\nSQL> --\n\
  SQL> -- 执行更新\nSQL> --\nSQL> -- 注意已用时间（少于之前的压缩更新）\nSQL> --\nSQL> update emp set sal=sal*1.08\
  \ where empno > 7350;\n\n14680064 行已更新。\n\n已用时间: 00:47:52.75\nSQL>\nSQL> commit;\n\
  \n提交完成。\n\n已用时间: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- 当前的压缩级别和存储情况\nSQL> --\nSQL>\
  \ -- 看起来像是 HCC 压缩数据第二次更新后的存储情况\nSQL> --\nSQL> select table_name, compression, compress_for\n\
  \  2  from user_tables;\n\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
  ------------------------------ -------- ------------\nDEPT                     \
  \      DISABLED\nBONUS                          DISABLED\nSALGRADE             \
  \          DISABLED\nDUMMY                          DISABLED\nEMP              \
  \              ENABLED  QUERY LOW\n\n已用时间: 00:00:00.03\nSQL>\nSQL> select segment_name,\
  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  ```\n\n\n\n请注意 `QUERY HIGH` 和 `QUERY LOW` 压缩更新后结果之间的细微大小差异。真正的差异体现在完成所需更新的总耗时上。对表的第一次更新耗时最长，因为需要完全解压缩数据以完成事务。第二次更新比未压缩表耗时更长，但仍比初始更新耗时少得多。这是在活动表上使用压缩的问题之一。\n\
  \n使用两种 `ARCHIVE` 压缩类型时，情况并无不同。由于 `ARCHIVE` 级别提供了最佳的初始压缩率，可以预期对以这两种方式之一压缩的表进行更新将需要更长时间完成，尤其是在压缩完成后第一次更新时。我们对这两个压缩级别执行了与其他级别相同的更新，并报告了结果。\n\
  \n### ARCHIVE HIGH 压缩更新测试\n\n首先，对于 `ARCHIVE HIGH`：\n\n```\nSQL> --\nSQL> -- 对压缩数据执行更新\n\
  SQL> --\nSQL> -- 注意完成耗时\nSQL> --\nSQL> update emp set sal=sal*1.08 where empno >\
  \ 7350;\n\n14680064 rows updated.\n\nElapsed: 00:50:36.26\nSQL>\nSQL> commit;\n\n\
  Commit complete.\n\nElapsed: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- 数据字典中的压缩类型未变，\n\
