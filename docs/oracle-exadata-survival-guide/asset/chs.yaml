  \ 的函数。此函数返回一个数字，表示给定表正在使用的压缩类型和级别。我们有一个查询可以报告给定表的所有者、表名、数字压缩 ID 和类型名称。我们将所有者和表名作为输入传入。\n\
  ```\nset verify off\nselect distinct\n        '&&owner' owner,\n        '&&tabname'\
  \ table_name,\n        dbms_compression.get_compression_type('&&owner','&&tabname',\
  \ rowid) comp_typ,\n        decode(dbms_compression.get_compression_type('&&owner','&&tabname',\
  \ rowid),\n               1, 'NONE',\n               2, 'OLTP',\n              \
  \ 4, 'QUERY HIGH',\n               8, 'QUERY LOW',\n              16, 'ARCHIVE HIGH',\n\
  \              32, 'ARCHIVE LOW') type_name\nfrom\n        &&owner..&&tabname\n\
  /\n\nUndefine owner\nUndefine tabname\n```\n输出如下：\n```\nSQL> @get_compression_type.sql\n\
  Enter value for owner: BING\nEnter value for tabname: EMP\n\nOWNE TABL   COMP_TYP\
  \ TYPE_NAME\n---- ---- ---------- ------------\nBING EMP           8 QUERY LOW\n\
  \nSQL>\n```\n\n### 压缩技术详解\n\n#### HCC 的基本原理\n\n使用 HCC 会改变 Oracle 存储表数据的方式，将存储格式从通常的堆式块填充改为以列为中心的格式，仍然使用数据块，但称为压缩单元或\
  \ `CU`。这是一个逻辑上的改变，因为压缩单元由多个具有独特布局的 Oracle 块组成。首先，Oracle 为压缩单元收集大量相似的行，并以列式格式组织它们，类似于图\
  \ 6-1。\n\n![9781430260103_Fig06-01.jpg](img/9781430260103_Fig06-01.jpg)\n图 6-1 HCC\
  \ 压缩单元的初始数据组织\n\n收集相似数据的行使得使用 HCC 压缩数据更容易，因为可以替换为标记的公共元素被 *colocated* 在同一个压缩单元中。Oracle\
  \ 设计上是一个以行为中心的 DBMS，因此这个中间结构会转换回行格式，类似于图 6-2。\n\n![9781430260103_Fig06-02.jpg](img/9781430260103_Fig06-02.jpg)\n\
  图 6-2 HCC 压缩单元布局\n\n在此示例中，使用五个数据块来存储数据，每列是块中的一行。有些列无法放入单个块中，因此它们会跨多个块链接，如图所示。块头显示为红色；压缩单元头位于压缩单元的第一个块中，压缩单元位图也在此处，显示行的位置。数据列紧随块\
  \ 1 中的 `CU` 头和 `CU` 位图行之后，列 1 数据从块的第三行开始。\n\n如前所述，如果列无法完全放入单个块中，则会链接到压缩单元中的下一个块。此策略会持续进行，直到所有列都存储完毕。因为相似的数据存储在一起，与基本压缩或\
  \ OLTP 压缩相比，HCC 可以提供极高的压缩比。此外，以这种方式创建压缩单元可以防止单行被拆分到多个 `CU` 中，因此可以从单个 `CU` 中读取整行。\n\
  \n#### 性能影响\n\n根据您是插入、更新还是查询数据，压缩表的性能可能不如预期。查询数据通常是一个快速的操作。除了 OLTP 压缩外，插入操作都需要并行或直接路径加载插入，以便新插入的行被压缩。更新操作耗时更长，因为数据在更新前必须被解压缩。在决定使用压缩之前，请仔细分析表的使用方式；频繁更新的表更适合使用\
  \ OLTP 压缩，而不是 HCC 压缩类型。请记住，工程通常被描述为进行 *权衡* 的艺术。鱼与熊掌不可兼得。\n\n##### 加载数据的影响\n\n向压缩表中加载数据，除了\
  \ OLTP 压缩这个唯一的例外，都需要并行或直接路径插入。当然，向压缩表中加载数据可能比对未压缩表进行相同的过程花费更长时间。我们使用各种压缩方法创建了空表，并从我们在前面示例中填充的\
  \ `EMP` 表中加载数据。这些加载的结果以及所需时间如下例所示：\n```\nSQL>\nSQL> --\nSQL> -- Build compressed\
  \ tables, keep them empty\nSQL> --\nSQL>\nSQL> create table emp_arch_low as select\
