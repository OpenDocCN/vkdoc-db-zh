  \                  392        1999241\n从闪存读取的 Smart IO 总计（KB）                  \
  \                   0              0\nSmart IO 发起的闪存填充总计（KB）                   \
  \                 0              0\n从硬盘读取的 Smart IO 总计（KB）                     \
  \          2642312    13236089072\nSmart IO 写入（fcre）硬盘总计（KB）                   \
  \                0              0\nSmart IO 请求数 < 512KB                        \
  \                   52         265049\nSmart IO 请求数 >= 512KB 且 < 1MB           \
  \                      260        1284245\nSmart IO 请求数 >= 1MB 且 < 2MB         \
  \                            0             82\nSmart IO 请求数 >= 2MB 且 < 4MB     \
  \                              286        1446473\nSmart IO 请求数 >= 4MB 且 < 8MB \
  \                                  299        1510123\nSmart IO 请求数 >= 8MB     \
  \                                         0              0\n...\n\n此示例还说明，`cellsrvstat`\
  \ 能够在几秒钟内自动生成指定运行次数和指定间隔的数据。从数据库服务器自动化这些命令需要使用 `ssh` 登录到存储单元，并将所需命令传递到命令提示符。以下是\
  \ `cellsrvstat` 的示例：\n\n```\necho \"==========================================================================================\"\
  \necho \"======================================= Cell 1 ===========================================\"\
  \necho \"==========================================================================================\"\
  \n/usr/bin/ssh celladmin@mytexa1cel01-priv.mydomain.com   \"cellsrvstat -stat_group=smartio\
  \ -interval=$1 -count=$2\"\necho \"==========================================================================================\"\
  \necho \"======================================= Cell 2\" ===========================================\n\
  echo \"==========================================================================================\"\
  \n/usr/bin/ssh celladmin@myexa1cel02-priv.mydomain.com  \"cellsrvstat -stat_group=smartio\
  \ -interval=$1 -count=$2\"\necho \"==========================================================================================\"\
  \necho \"======================================= Cell 3\" ===========================================\n\
  echo \"==========================================================================================\"\
  \n/usr/bin/ssh celladmin@myexa1cel03-priv.mydomain.com  \"cellsrvstat -stat_group=smartio\
  \ -interval=$1 -count=$2\"\n```\n\n![image](img/sq.jpg) **注意**   此脚本依赖于 `celladmin`\
  \ 到各个存储单元的无密码登录，因此可以从 cron 任务中运行。如果未配置无密码登录，则可以从命令提示符手动运行该脚本，它会在继续前要求输入密码。由于有许多资源描述了如何跨服务器设置无密码访问，我们在此不再讨论。\n\
  \n一旦编写了这样的脚本，在数据库服务器上生成输出的日志文件就同样简单了。只需创建另一个脚本调用此脚本，提供所需参数，并将输出重定向到本地文件，如下所示：\n\n\
  ```\n/home/oracle/bin/cellsrvstat_smartio.sh 5 100 > /home/oracle/mydb/logs/cellsrvstat_smartio_`date\
  \ '+%m%d%Y%H%M%S'`.log\n```\n\n输出将被定向到数据库服务器上指定的日志文件，因此您可以无需直接访问存储单元即可检查输出。\n\n\
  您还可以使用数据库服务器上的 `dcli` 工具执行类似操作。使用 `-c` 选项可以指定一个以逗号分隔的存储单元名称列表，`dcli` 将连接到这些单元。您希望执行的整个命令，包括任何提供的参数，都必须用单引号括起来。以下是在存储单元\
  \ 4 和 5 上生成类似报告的示例。\n\n![image](img/Table9-1a.jpg)![image](img/Table9-1b.jpg)\n\n\
  将显示存储单元名称，以及每个报告间隔的 `cellsrvstat` 报告数据。这也依赖于对存储单元的无密码 `ssh` 访问；如果未建立此访问，则需要为列表中的每个单元输入密码才能连接。\n\
  \n使用 cron 设置这样的存储单元监控非常值得投入时间和少量精力，因为从长远来看会有回报。通过拥有当前性能的基线，可以更轻松地排查 Smart Scan 和\
  \ Smart Flash Cache 问题。差异和偏差将更容易发现和解决，从而缩短故障排除时间并加快问题解决速度。\n\n### 须知事项\n\n作为 DBA，您应该了解存储单元的两个账户：`cellmonitor`\
  \ 和 `celladmin`。`cellmonitor` 账户严格用于监控登录，对存储单元目录结构的访问受限。`celladmin` 账户拥有更多的访问权限和特权，旨在用于管理职责。\n\
  \n可以通过 `ssh` 访问存储单元；可用存储单元的地址可在 Exadata 系统中所有可用数据库服务器的 `/etc/hosts` 文件中找到。\n\n\n"
- "# 第 10 章：监控 Exadata\n\n![image](img/frontdot.jpg)\n\n## 引言\n\nExadata 是一个由相互关联的组件组成的复杂系统；有效监控它们既是一门艺术，也是一门科学。在本书中，我们已经讨论了\
  \ Exadata 各个领域的监控选项。在本章中，我们将进一步探讨此主题，并提供跨数据库节点和存储单元监控 Exadata 的方法。我们将了解如何使用 `V$SQL`\
  \ 和 `V$SQLSTATS` 来监控 SQL 语句性能，并提供关于智能扫描活动的信息。我们还将再次审视存储单元，比较命令行接口和 Oracle 企业管理器（OEM）的监控功能。我们并非承诺让你成为爱因斯坦和伦勃朗的结合体，但我们将帮助你理解可用的工具和技术，以便你能智能地监控你的系统。\n\
  \n## 存储单元监控实用程序\n\n存在两种用于监控和管理存储单元的实用程序：`cellcli` 和 `cellsrvstat`。`cellcli` 实用程序可供\
  \ `cellmonitor` 和 `celladmin` 用户使用，其中 `cellmonitor` 拥有一组受限的可用指令。`cellmonitor` 帐户旨在用于常规监控，使用\
  \ `LIST` 命令集，该命令集输出存储单元各个区域的统计数据和度量指标。`celladmin` 帐户旨在允许 DBA 处理由 `cellmonitor` 输出报告的问题。\n\
  \n`cellcli` 和 `cellsrvstat` 命令都可以在命令行上传递，并且 `cellsrvstat` 命令可以通过提供以秒为单位的间隔和要运行的给定命令的执行计数，在某种程度上实现自动化。你还可以通过使用\
  \ `-stat_group` 参数指定要监控的一个或多个组来限制 `cellsrvstat` 的输出。可用的组有 `smartio`、`io`、`mem`、`exec`\
  \ 和 `net`。\n\n从数据库服务器监控存储单元可以通过使用无密码登录到存储单元和脚本来自动化，使用 `ssh` 连接到每个存储单元，并将 `cellcli`\
  \ 或 `cellsrvstat` 命令传递给你连接到的单元。通过编写所谓的“包装器”脚本来重定向输出，输出也可以被重定向到数据库服务器上的日志文件。当输出指示可能的问\n\
  \n题区域时，这可以建立一个用于比较的性能基线。\n\n## 数据库层\n\n这是用户将访问的层，因此我们认为这是讨论监控的合理起点。我们已经在第 7 章中讨论了等待接口，在第\
  \ 8 章中讨论了性能。现在是时候将它们结合起来并制定监控策略了。\n\nExadata 的一大卖点是智能扫描，了解哪些查询有资格、哪些没有资格进行智能扫描非常重要。我们在第\
  \ 2 章中介绍了这些内容，同时介绍了一些监控步骤，以查看是否执行了智能扫描。我们将在下一节中使用 `V$SQL` 和 `V$SQLSTATS` 视图重新审视该主题。\n\
  \n### 我们到了吗？（进度如何？）\n\nExadata 提供了丰富的度量、计数器和统计信息，旨在报告系统在给定任务中的行为。仅仅因为这些度量存在，并不意味着你应该报告\
  \ Exadata 记录的所有内容。监控 Exadata 需要有目的和方向。没有目的和方向，你很可能会被引向错误的道路，去解决错误的“问题”。请记住，监控应旨在建立初始基线，以便为比较提供坚实的基础。随后的监控数据应相对于该基线提供一个窗口，显示性能随时间和数据变化的情况。如果可以避免，你不会想追逐一个移动的目标。没有明确的起点只会使故障排除和问题解决更加困难。\n\
  \n要设计和实施有效的监控策略，你需要从 DBA 的常规角色中抽身出来，从用户的角度审视系统。是的，你可以深入研究各种度量、统计信息、等待事件和计时器，但最终用户其实并不关心这些。他们主要关心的是他们的流程或查询需要多长时间完成。如果一个流程花费的时间比用户认为应该的时间长，系统就是慢的，需要调优。是的，很可能正是他们的查询需要注意，但对用户来说，是数据库导致了问题，而数据库是你的专业领域。用户不想知道是\
  \ `ORDERS` 表第 32 行第 58 位出了问题。他们只希望看到问题得到纠正，响应时间缩短。了解这一点就为你的监控过程提供了方向和目的，这是有效监控系统所需的两个要素。\n\
  \n当然，不仅仅是用户声称的性能不满意在起作用；还涉及什么是可接受和不可接受的性能。仅仅因为监控脚本或工具报告了“过高的 CPU 使用率”并不意味着性能不可接受。你必须考虑到当时有多少会话处于活动状态以及这些会话正在做什么。许多工具为此类警报/报告设置了默认阈值，而这些阈值可能不适合你的系统，因此请检查这些阈值，并根据你的硬件、软件和用户负载将其设置为合理的值。在监控方面，并非放之四海而皆准。\n\
  \n### 实时 SQL 监控报告\n\n迄今为止，监控 SQL 性能最简单的方法是通过安装了诊断和调优包的 Oracle 企业管理器 12c（OEM 12c）。Oracle\
  \ 会自动监控并行运行的 SQL 语句以及累计 I/O 和 CPU 时间达到或超过五秒的序列化语句。也可以使用 `/*+ MONITOR */` 提示来监控 SQL\
  \ 语句。查看 图 10-1 中 OEM 12c 性能窗口的截图，你可以看到所呈现的信息级别。\n\n![9781430260103_Fig10-01.jpg](img/9781430260103_Fig10-01.jpg)\n\
  \n**图 10-1.** OEM 12c SQL 监控面板\n\n呈现的详细信息包括持续时间、SQL ID、运行该语句的会话 ID、并行执行的并行度，以及数据库时间的条形图，该条形图按记录时间的三个类别\
  \ `CPU`、`用户 I/O` 和 `其他` 进行分解。绿色报告 `CPU` 时间占总时间的百分比，蓝色报告 `用户 I/O` 占总时间的百分比，橙色报告记录为\
  \ `其他` 的时间（同样占总时间的百分比）。只需单击该 SQL ID，即可从报告中“深入查看”特定 SQL ID 的详细信息，如 图 10-2 所示。\n\n\
  ![9781430260103_Fig10-02.jpg](img/9781430260103_Fig10-02.jpg)\n\n**图 10-2.** OEM\
  \ 12c 中的 SQL ID 时间与等待窗口\n\n\n### 引言：执行计划的增强信息与统计\n\n除了增强的执行计划（提供时间线以及常规信息）外，计划上方还有两个部分，分别提供时间和等待统计信息，以及\
  \ I/O 统计信息。这对于在单条语句级别诊断和排除性能问题非常有帮助。它不仅显示了“墙上时钟”时间（以 `Duration` 条显示），还将时间分解为各个组成部分，因此你可以看到执行语句时时间都花在了哪里。请注意，数据库时间、PL/SQL\
  \ 和 Java 时间，以及等待活动，都在“时间和等待统计”窗口中报告。从显示的 `Database Time` 条来看，时间被分解为四个等待类别：用户 I/O（蓝色）、CPU（绿色）、集群（白色）和应用程序（红色）。将光标悬停在这些区域上，会报告所代表的类别及其占数据库总时间的百分比。这种分解对于确定时间花费在何处以及可能实施哪些改进非常有帮助。同样地，将光标悬停在\
  \ I/O 统计信息窗口中的条上，会报告相应的数据。图 10-3 展示了“时间和等待统计”的示例。\n\n![9781430260103_Fig10-03.jpg](img/9781430260103_Fig10-03.jpg)\n\
  \n图 10-3. 时间与等待统计分解\n\n图 10-4 展示了 I/O 窗口的类似行为。\n\n![9781430260103_Fig10-04.jpg](img/9781430260103_Fig10-04.jpg)\n\
  \n图 10-4. I/O 统计分解\n\n通过执行计划上方的选项卡，你可以将并行等待统计信息（对于使用并行执行的语句）视为条形图，将其他各种指标视为折线图，后者如\
  \ 图 10-5 所示。\n\n![9781430260103_Fig10-05.jpg](img/9781430260103_Fig10-05.jpg)\n\n\
  图 10-5. OEM 12c 中的 SQL ID 指标图\n\n我们使用 `Duration` 列来引导我们找到可能有问题的语句，这些语句可以被隔离并调查以确认它们是否真的存在问题。如果一个语句在过去一小时内的\
  \ `Duration` 为 993 秒，但执行了 1233 次，那么每次执行的时间不到 1 秒，这是可以接受的性能。另一方面，如果一个语句在过去一小时内的 `Duration`\
  \ 为 79 秒，但只执行了 1 次，那么这个 `SQL ID` 就值得进一步调查。`Duration` 列报告的值很大，这一事实本身意义不大。你必须进一步调查，以准确判断它是否是个问题。\n\
  \n图形界面很好用，也相当容易上手，但它们并非监控 Exadata 所绝对必需的。如果你无法访问 OEM 12c（无论是未安装还是停止工作），也并非无计可施。你可以从\
  \ `SQL*Plus` 生成实时 SQL 监控报告。\n\n### 使用 GV$SQL 和 GV$SQLSTATS（不仅如此）\n\n通过 `SQL*Plus`\
  \ 生成实时监控报告并不像看起来那么困难，因为 Oracle 提供了多个视图，包括 `GV$SQL` 和 `GV$SQLSTATS`，以及一个包函数 (`DBMS_SQLTUNE.REPORT_SQL_MONITOR`)\
  \ 来提供这些信息。\n\n在深入探讨 `GV$SQL` 和 `GV$SQLSTATS` 之前，我们将先看看 `GV$SQL_MONITOR`，它为集群中所有可用实例提供会话级执行监控数据。鉴于\
  \ Exadata 是一个 RAC 环境，来自应用程序的多个连接可能会“循环”连接到可用节点。因此，同一个 `SQL ID` 可能同时存在于两个或更多节点上。在\
  \ `SQL ID` 级别监控执行时，确保你始终在查看你开始监控的同一个会话非常重要。这时会话 `SID`、实例 ID 和状态就很有用了。会话 `SID` 和实例\
  \ ID 允许你隔离节点上的某个会话进行进一步监控。如果目标是检查当前正在运行的语句，请确保报告的 `STATUS` 为 `EXECUTING`，这样随时间进行的监控将提供你可能需要用于故障排除的信息。另一个值得注意的视图是\
  \ `GV$SQL_PLAN_MONITOR`。该视图使用计划级监控数据进行实时更新。\n\n查看一些使用 `GV$SQL_MONITOR`、`GV$SQL_PLAN_MONITOR`、`GV$SQL`\
  \ 和 `GV$SQLSTATS` 的示例，应该有助于你理解这些视图的强大功能以及它们能提供的信息。我们从 `GV$SQL_MONITOR` 开始，搜索一个特定的\
  \ `SQL_ID`，如下所示：\n\n```sql\nSQL> select inst_id inst, sid, sql_plan_hash_value plan_hash,\
  \ elapsed_time elapsed, cpu_time cpu_tm, fetches fetch, io_interconnect_bytes io_icon_byt,\
  \ physical_read_bytes + physical_write_bytes tl_byt_proc, ((physical_read_bytes+physical_write_bytes)/io_interconnect_bytes)*100\
  \ offld_pct, status\n  2  from gv$sql_monitor\n  3  where status <> 'DONE'\n  4\
  \  and sql_id = 'b1x37zg5a1ygr'\n  5  and io_interconnect_bytes > 0\n  6  /\n```\n\
  \n\n\n## 查询性能监控\n\n### 执行统计信息\n以下是包含 25 行的查询执行统计信息，所有行的 `OFFLD_PCT` 均为 100%。\n\n\
