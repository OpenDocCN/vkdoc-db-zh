  SQL>\n```\n\n### 压缩比率分析\n\n表 6-3 总结了各种压缩类型的估计压缩比率。\n\n**表 6-3. 估计的压缩比率**\n\n| 压缩类型\
  \ | 估计比率 |\n| --- | --- |\n| OLTP | 3.5 |\n| Query Low | 51.1 |\n| Query High |\
  \ 183.9 |\n| Archive Low | 183.9 |\n| Archive High | 189.8 |\n\n#### 实际结果与差异\n\n\
  我们的 `EMP` 表中的数据非常易于压缩（简单来说，就是同样的 14 行数据被反复加载，以达到目标大小和行数），因此压缩比率非常可观。你的数据可能没那么容易压缩（很可能不会），所以你的估计值和实际比率可能会有所不同。我们数据的实际比率与估计值相当吻合；表\
  \ 6-4 总结了这些结果。\n\n**表 6-4. 实际观察到的压缩比率**\n\n| 压缩类型 | 实际比率 |\n| --- | --- |\n| OLTP\
  \ | 3.5 |\n| Query Low | 48.6 |\n| Query High | 85.0 |\n| Archive Low | 85.0 |\n\
  | Archive High | 170.0 |\n\n你的结果可能不同，但在列出的五种压缩类型中，Oracle 在三种类型的压缩比率估计上做得非常好。需要注意的是，Oracle\
  \ 报告的比率可能与实际使用中获得的不完全一致。\n\n### 压缩技术细节\n\n有三个通用的压缩级别，其中两个需要额外的许可证：`Basic`、`OLTP`\
  \ 和 `Hybrid Columnar Compression` (`HCC`)。\n\n`HCC` 有两种类型（`QUERY` 和 `ARCHIVE`），每种类型又有两个子类型（`HIGH`\
  \ 和 `LOW`），从而提供了四个不同的 `HCC` 级别。通常，`QUERY` 类型的压缩适用于 somewhat active 的数据，而 `ARCHIVE`\
  \ 压缩则适用于查询频率相当低且不会更新的数据。\n\n`HCC` 通过收集具有相似数据的行并将它们压缩到一个压缩单元（`Compression Unit`,\
  \ `CU`）中来实现其功能。每个单元由多个数据块组成，这些数据块包含了整个 `CU` 中的完整行数据。这使得 Oracle 返回数据变得更容易、更高效，因为只需要访问一个\
  \ `CU` 就能返回完整的行。\n\n压缩级别因压缩类型而异。`Basic` 提供的压缩比最低，而 `ARCHIVE HIGH` 在压缩时提供最大的空间节省。\n\
  \n将数据加载到压缩表中通常需要并行处理和/或直接路径加载（后者由 `SQL*Loader` 提供）。`/*+ append */` 提示可以使插入操作并行化，允许它们在插入时被压缩。加载压缩表可能比加载未压缩表花费更长的时间。\n\
  \n在执行时间方面，查询是一个混合体，因为 `Smart Scans` 可以通过将解压缩活动卸载到存储单元来加快对压缩数据的查询。不使用 `Smart Scans`\
  \ 的对压缩数据的查询可能比对相同未压缩数据的查询运行时间更长（而且很可能确实如此）。\n\n对压缩表的更新会导致表的大小增加。`Basic` 压缩没有自动重新压缩的机制，因此使用此方法的表如果频繁更新，将需要定期重新压缩。`OLTP`\
  \ 压缩会自动重新压缩已满的数据块，为更多未压缩数据腾出空间。`HCC` 压缩在数据更新后会静默地回退到 `OLTP`，因此原始压缩级别会丢失，但 `OLTP`\
  \ 级别的压缩仍然保留，包括对满数据块的自动压缩。\n\n压缩比率可以通过 `DBMS_COMPRESSION.GET_COMPRESSION_RATIO` 过程进行估计，在许多情况下，它与用户数据上观察到的压缩比率一致。高度可压缩的数据可能会在估计和实际压缩比率之间显示出巨大差异，因此如果没有得到\
  \ Oracle 预测的确切结果，也不必惊慌。\n\n"
- "# 第 7 章\n\n![image](img/frontdot.jpg)\n\n## Exadata 单元等待事件\n\nOracle 等待接口首次在 Oracle\
  \ 8.1.x 版本中扩展，以提供了解 Oracle 性能的窗口。在后续版本中，此接口不断改进和扩展，使 Oracle 成为一个监控非常完善的数据库。通过跟踪\
  \ Oracle 在何处花费时间以及每个事件消耗多少时间，等待接口是数据库管理员（`DBA`）诊断性能问题的宝贵工具。对于 `Exadata`，此等待接口已进一步扩展，包括了支持此系统特有操作的\
  \ `Exadata` 特定等待事件。本章将介绍这些事件以及它们监视的实际操作。我们还将介绍适用于 `Exadata` 操作的现有非 `Exadata` 等待事件。\n\
  \n什么是*等待事件*？它是数据库正在等待的事件，例如磁盘读取，该事件被计时并赋予一个名称。在 11.2.0.3 版本中，`V$EVENT_NAME` 视图中列出了\
  \ 1150 个命名的等待事件，其中 23 个引用了 `Exadata` 特定的操作。其中，17 个特定于存储单元。这些就是我们将在本章中介绍的事件。\n\n\
  ### 独家可用\n\n因为 `Exadata` 使用的是与非 `Exadata` 系统上相同的 Oracle 软件，所以无论你是否使用 `Exadata`，等待事件的列表都是相同的。区别在于其中一些事件只会在\
  \ `Exadata` 系统上填充，这是它们独家可用的唯一原因。\n\n### 单元事件\n\n显然，单元事件是不会在非 `Exadata` 系统或未使用 `Exadata`\
  \ 存储的系统上填充的事件。在 `V$EVENT_NAME` 中有 17 个与单元相关的事件。这些事件列于 表 7-1。\n\n**表 7-1. 单元等待事件及其类别**\n\
  \n| 等待事件 | 类别 |\n| --- | --- |\n| Cell worker idle | Idle |\n| Cell manager cancel\
  \ work request | Other |\n| Cell smart flash unkeep | Other |\n| Cell worker online\
  \ completion | Other |\n| Cell worker retry | Other |\n| Cell manager closing cell\
  \ | System I/O |\n| Cell manager discovering disks | System I/O |\n| Cell manager\
  \ opening cell | System I/O |\n| Cell smart incremental backup | System I/O |\n\
  | Cell smart restore from backup | System I/O |\n| Cell list of blocks physical\
  \ read | User I/O |\n| Cell multiblock physical read | User I/O |\n| Cell single\
  \ block physical read | User I/O |\n| Cell smart file creation | User I/O |\n| Cell\
  \ smart index scan | User I/O |\n| Cell smart table scan | User I/O |\n| Cell statistics\
  \ gather | User I/O |\n\n这些事件将在本章后面的章节中详细讨论。\n\n## 触发事件\n\n\n\n观察哪些操作会触发不同的单元等待事件是很有趣的。这些信息可以从\
  \ `DBA_HIST_ACTIVE_SESS_HISTORY` 视图以及 `V$SYSTEM_EVENT` 中获取。很可能并非表 7-1 中列出的每个事件都会在\
  \ `DBA_HIST_ACTIVE_SESS_HISTORY` 中被报告；然而，一个事件可能由多个计划操作触发。我们用来生成事件及相关操作列表的查询如下：\n\
  \n```\nSQL> select event , non_exa_event, operation ,count(*)\n  2  from\n  3  (select\
  \ event,\n  4          decode(event, 'cell smart table scan','',\n  5  'cell smart\
  \ index scan','',\n  6  'cell statistics gather','',\n  7  'cell smart incremental\
  \ backup','',\n  8  'cell smart file creation','',\n  9  'cell smart restore from\
  \ backup','',\n 10  'cell single block physical read','db file sequential read',\n\
  \ 11  'cell multiblock physical read','db file scattered read',\n 12  'cell list\
  \ of blocks physical read','db file parallel read',\n 13  'cell manager opening\
  \ cell','',\n 14  'cell manager closing cell','',\n 15  'cell manager discovering\
  \ disks','',\n 16  'cell worker idle','',\n 17  'cell smart flash unkeep','',\n\
  \ 18  'cell worker online completion','',\n 19  'cell worker retry','',\n 20  'cell\
  \ manager cancel work request','') non_Exa_event,\n 21          sql_plan_operation||'\
  \ '||sql_plan_options operation\n 22  from dba_hist_active_sess_history\n 23  where\
  \ event like 'cell%')\n 24  where operation <> ' '\n 25  group by event, non_exa_event,\
  \ operation\n 26  order by 1\n 27  /\n```\n\n![image](img/Table7-1.jpg)\n\n该列表还包含等效的非\
  \ Exadata 事件（如果存在）。在接下来的章节中，将讨论这些事件、它们等效的非 Exadata 事件、描述以及它们提供的各种参数。\n\n## 用户 I/O\
  \ 事件\n\n每个事件都与一个等待类相关联；单元事件有四个不同的等待类。单元事件中最主要的等待类是用户 I/O 类，十七个事件中有七个属于该类。我们将在本节中查看该类中的每个事件，并了解它报告了什么。\n\
  \n## 单元智能表扫描\n\n`cell smart table scan` 事件记录因全表扫描卸载到存储单元而产生的等待时间。因为它可用于确定某个语句是否利用了智能扫描，并因此受益于卸载，所以它可能是\
  \ Exadata 系统中最重要的等待事件。请记住，卸载只发生在直接路径读取期间，因此该事件通常会取代 `direct path read` 事件。这并不是说你在\
  \ Exadata 系统上看不到 `direct path read` 事件，但更有可能看到时间被记录在 `cell smart table scan` 事件上。由于这是直接路径读取，它直接将数据返回给请求它的用户进程的程序全局区\
  \ (PGA)，这包括并行从属进程。\n\n与非 Exadata 系统相比，InfiniBand 网络的使用改变了直接路径读取的实际机制。对存储单元的每个直接路径读取请求还包含对选择列表、连接谓词（如果存在）和查询谓词的引用。这允许存储服务器在“移交”结果给数据库服务器之前过滤数据并执行列投影。智能扫描处理的每个数据块都应用了这些优化；请求它的数据库服务器进程处理这些数据。数据还可以访问\
  \ ASM 区图，因此它们可以从每个存储单元请求必要的分配单元 (AU)。然后存储单元按请求顺序读取这些分配单元，并对每个 AU 应用智能扫描优化，返回满足所提供过滤条件的行的投影列。正如预期的那样，当执行大型扫描时，该事件会反复出现。\n\
  \n10046 跟踪是查看此事件被记录的一个很好来源。我们提供了一个大型表并行扫描的一小部分，如下所示：\n\n```\nWAIT #46969064935512:\
