  \ `V$SQLSTATS` 在对 SQL 语句进行基础、例行的监控方面表现出色，并且在数据库活动繁忙期间提供的开销较低。\n\n## 存储单元\n\n存储单元管理已在第\
  \ 9 章中介绍，但我们将在此回顾其中的部分信息。\n\n### 命令行\n\n我们认为在这里回顾一下命令行接口是个好主意。请记住，存储单元提供了 `CellCLI`\
  \ 和 `cellsrvstat` 来监控存储单元，并有两个账户 `cellmonitor` 和 `celladmin` 来执行这些任务。对于常规监控，通过 `CellCLI`\
  \ 接口，`cellmonitor` 账户应能提供您所需的信息。\n\nExadata 的一个常见监控区域是智能闪存缓存。要全面监控此区域，必须连接到每个可用的存储单元并生成报告。可以通过脚本将此操作发送到存储单元，并将输出记录到数据库服务器，这在第\
  \ 9 章中有说明。以下是针对存储单元 4 的此类报告示例。\n\n```\nCellCLI> list flashlog detail\n         name:\
  \                   myexa1cel04_FLASHLOG\n         cellDisk:               FD_14_myexa1cel04,FD_05_myexa1cel04,FD_00_myexa1cel04,FD_01_myexa1cel04,FD_04_myexa1cel04,\n\
  \                                 FD_07_myexa1cel04,FD_09_myexa1cel04,FD_02_myexa1cel04,FD_08_myexa1cel04,FD_03_myexa1cel04,\n\
  \                                 FD_15_myexa1cel04,FD_12_myexa1cel04,FD_11_myexa1cel04,FD_06_myexa1cel04,FD_10_myexa1cel04,\n\
  \                                 FD_13_myexa1cel04\n         creationTime:    \
  \       2013-07-09T17:33:31-05:00\n         degradedCelldisks:\n         effectiveSize:\
  \          512M\n         efficiency:             100.0\n         id:          \
  \           7eb480f9-b94a-4493-bfca-3ba00b6618bb\n         size:               \
  \    512M\n         status:                 normal\n\nCellCLI>\n```\n\n以下是一个在存储单元上运行的命令行示例，列出了相同的输出，但避免了使用命令行界面。\n\
  \n```\n[celladmin@myexa1cel05 ∼]$ cellcli -e \"list flashcache detail\"\n      \
  \   name:                   myexa1cel05_FLASHCACHE\n         cellDisk:         \
  \      FD_11_myexa1cel05,FD_03_myexa1cel05,FD_15_myexa1cel05,FD_13_myexa1cel05,FD_08_myexa1cel05,\n\
  \                                 FD_10_myexa1cel05,FD_00_myexa1cel05,FD_14_myexa1cel05,FD_04_myexa1cel05,FD_06_myexa1cel05,\n\
  \                                 FD_07_myexa1cel05,FD_05_myexa1cel05,FD_12_myexa1cel05,FD_09_myexa1cel05,FD_02_myexa1cel05,\n\
  \                                 FD_01_myexa1cel05\n         creationTime:    \
  \       2013-07-09T17:33:53-05:00\n         degradedCelldisks:\n         effectiveCacheSize:\
  \     1488.75G\n         id:                     8a380bf9-06c3-445e-8081-cff72d49bfe6\n\
  \         size:                   1488.75G\n         status:                 normal\n\
  [celladmin@myexa1cel05 ∼]$\n```\n\n如第 9 章所述，如果您在数据库服务器和存储单元之间设置了无密码 `ssh` 连接，您可以从数据库服务器命令提示符运行这些命令，并将结果写入本地日志文件。\n\
  \n一个值得注意的实用 `CellCLI` 命令是 `LIST METRICHISTORY`。顾名思义，此命令列出存储单元中所有已知指标的指标历史记录，以及收集值的时间戳。输出列表可能会非常长，正如您在以下简化的输出中所见。\n\
  \n\n\nCellCLI> list metrichistory attributes name, collectionTime, metricType, metricValue,\
  \ metricValueAvg where metricObjectName = 'DBFS_DG_CD_02_myexa1cel04'\n...\nGD_BY_FC_DIRTY\
  \          2013-08-24T19:50:42-05:00       瞬时值          0.000 MB\nGD_IO_BY_R_LG\
  \           2013-08-24T19:50:42-05:00       累积值          2,656 MB\nGD_IO_BY_R_LG_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.000 MB/秒\nGD_IO_BY_R_SM\
  \           2013-08-24T19:50:42-05:00       累积值          207 MB\nGD_IO_BY_R_SM_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.000 MB/秒\nGD_IO_BY_W_LG\
  \           2013-08-24T19:50:42-05:00       累积值          8,378 MB\nGD_IO_BY_W_LG_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.000 MB/秒\nGD_IO_BY_W_SM\
  \           2013-08-24T19:50:42-05:00       累积值          60.191 MB\nGD_IO_BY_W_SM_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.000 MB/秒\nGD_IO_ERRS   \
  \           2013-08-24T19:50:42-05:00       累积值          0\nGD_IO_ERRS_MIN     \
  \     2013-08-24T19:50:42-05:00       速率            0.0 /分钟\nGD_IO_RQ_R_LG     \
  \      2013-08-24T19:50:42-05:00       累积值          2,656 次 IO 请求\nGD_IO_RQ_R_LG_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.0 次 IO/秒\nGD_IO_RQ_R_SM\
  \           2013-08-24T19:50:42-05:00       累积值          4,086 次 IO 请求\nGD_IO_RQ_R_SM_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.0 次 IO/秒\nGD_IO_RQ_W_LG\
  \           2013-08-24T19:50:42-05:00       累积值          8,781 次 IO 请求\nGD_IO_RQ_W_LG_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.0 次 IO/秒\nGD_IO_RQ_W_SM\
  \           2013-08-24T19:50:42-05:00       累积值          1,326 次 IO 请求\nGD_IO_RQ_W_SM_SEC\
  \       2013-08-24T19:50:42-05:00       速率            0.0 次 IO/秒\n...\n\n上表所列的指标可能仅凭名称中的缩写并不完全清晰。以下是每个名称及其含义的列表。\n\
  \nGD_BY_FC_DIRTY          网格磁盘缓存的脏数据 MB 数\nGD_IO_BY_R_LG           网格磁盘大读取产生的 I/O，单位为\
  \ MB\nGD_IO_BY_R_LG_SEC       网格磁盘大读取产生的每秒 I/O，单位为 MB\nGD_IO_BY_R_SM           网格磁盘小读取产生的\
  \ I/O，单位为 MB\nGD_IO_BY_R_SM_SEC       网格磁盘小读取产生的每秒 I/O，单位为 MB\nGD_IO_BY_W_LG   \
  \        网格磁盘大写入产生的 I/O，单位为 MB\nGD_IO_BY_W_LG_SEC       网格磁盘大写入产生的每秒 I/O，单位为 MB\n\
  GD_IO_BY_W_SM           网格磁盘小写入产生的 I/O，单位为 MB\nGD_IO_BY_W_SM_SEC       网格磁盘小写入产生的每秒\
  \ I/O，单位为 MB\nGD_IO_ERRS              网格磁盘 I/O 错误数\nGD_IO_ERRS_MIN          网格磁盘每分钟\
  \ I/O 错误数\nGD_IO_RQ_R_LG           网格磁盘大 I/O 读取请求数\nGD_IO_RQ_R_LG_SEC       网格磁盘大\
  \ I/O 读取请求每秒数\nGD_IO_RQ_R_SM           网格磁盘小 I/O 读取请求数\nGD_IO_RQ_R_SM_SEC      \
  \ 网格磁盘小 I/O 读取请求每秒数\nGD_IO_RQ_W_LG           网格磁盘大 I/O 写入请求数\nGD_IO_RQ_W_LG_SEC\
  \       网格磁盘大 I/O 写入请求每秒数\nGD_IO_RQ_W_SM           网格磁盘小 I/O 写入请求数\nGD_IO_RQ_W_SM_SEC\
  \       网格磁盘小 I/O 写入请求每秒数\n\n在该列表中，唯一报告为瞬时值的是 `GD_BY_FC_DIRTY`，它报告了网格磁盘当前缓存脏数据块的\
  \ MB 数。以下指标报告自 `cellsrv` 启动以来的累积值：\n\n`GD_IO_BY_R_LG`\n`GD_IO_BY_R_SM`\n`GD_IO_BY_W_LG`\n\
  `GD_IO_BY_W_SM`\n`GD_IO_ERRS`\n`GD_IO_RQ_R_LG`\n`GD_IO_RQ_R_SM`\n`GD_IO_RQ_W_LG`\n\
  `GD_IO_RQ_W_SM`\n\n前四个指标以 MB 为单位报告；其余指标仅为所列指标的简单累积计数。此外，还有报告速率的指标，如下所示：\n\n`GD_IO_BY_R_LG_SEC`\n\
  `GD_IO_BY_R_SM_SEC`\n`GD_IO_BY_W_LG_SEC`\n`GD_IO_BY_W_SM_SEC`\n`GD_IO_ERRS_MIN`\n\
  `GD_IO_RQ_R_LG_SEC`\n`GD_IO_RQ_R_SM_SEC`\n`GD_IO_RQ_W_LG_SEC`\n`GD_IO_RQ_W_SM_SEC`\n\
  \n除了报告每分钟 I/O 错误生成速率的 `GD_IO_ERRS_MIN` 外，这些指标均报告每秒速率。这些是当前速率，在指标报告时更新。读取和写入请求以及实际产生的\
  \ I/O 都将以每秒为基础发生。如果系统运行正常，产生 I/O 错误应该是不寻常的。请注意，这个特定单元的错误指标报告总错误数为 0，每分钟错误数为 0.0。即将发生的磁盘故障或固件不匹配可能会导致\
  \ I/O 错误，但你应该通过监控告警历史（我们在第 9 章已介绍）被告知此类即将发生的故障。\n\n采集间隔为一分钟，使得长期运行后的数据量非常庞大。通配符语法在\
  \ `collectionTime` 属性上不起作用，因此你无法为特定的时间窗口生成报告。不过，如果你愿意，可以限制输出到特定的某一分钟，如下所示：\n\nCellCLI>\
  \ list metrichistory attributes name, collectionTime, metricType, metricValue, metricValueAvg\
  \ where metricObjectName = 'DBFS_DG_CD_02_myexa1cel04' and collectionTime like\n\
  '2013-08-24T19:57:42-05:00'\nGD_BY_FC_DIRTY          2013-08-24T19:57:42-05:00 \
  \      瞬时值          0.000 MB\nGD_IO_BY_R_LG           2013-08-24T19:57:42-05:00\
  \       累积值          2,656 MB\nGD_IO_BY_R_LG_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.000 MB/秒\nGD_IO_BY_R_SM           2013-08-24T19:57:42-05:00\
  \       累积值          207 MB\nGD_IO_BY_R_SM_SEC       2013-08-24T19:57:42-05:00 \
  \      速率            0.000 MB/秒\nGD_IO_BY_W_LG           2013-08-24T19:57:42-05:00\
  \       累积值          8,378 MB\nGD_IO_BY_W_LG_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.000 MB/秒\nGD_IO_BY_W_SM           2013-08-24T19:57:42-05:00\
  \       累积值          60.191 MB\nGD_IO_BY_W_SM_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.000 MB/秒\nGD_IO_ERRS              2013-08-24T19:57:42-05:00\
  \       累积值          0\nGD_IO_ERRS_MIN          2013-08-24T19:57:42-05:00      \
  \ 速率            0.0 /分钟\nGD_IO_RQ_R_LG           2013-08-24T19:57:42-05:00     \
  \  累积值          2,656 次 IO 请求\nGD_IO_RQ_R_LG_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.0 次 IO/秒\nGD_IO_RQ_R_SM           2013-08-24T19:57:42-05:00\
  \       累积值          4,086 次 IO 请求\nGD_IO_RQ_R_SM_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.0 次 IO/秒\nGD_IO_RQ_W_LG           2013-08-24T19:57:42-05:00\
  \       累积值          8,781 次 IO 请求\nGD_IO_RQ_W_LG_SEC       2013-08-24T19:57:42-05:00\
  \       速率            0.0 次 IO/秒\nGD_IO_RQ_W_SM           2013-08-24T19:57:42-05:00\
