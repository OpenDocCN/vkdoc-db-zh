  \ sum(bytes) total_space\n  2  from user_segments\n  3  group by segment_name;\n\
  \nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                     65536\nDUMMY           \
  \                         65536\nEMP                                  956301312\n\
  EMP_IDX                              260046848\nSALGRADE                       \
  \          65536\n\nElapsed: 00:00:00.01\nSQL>\n```\n\n由于使用 `基本压缩` 算法更新了压缩数据，表的大小已经增长。这种行为使得\
  \ `基本压缩` 对于频繁更新的表来说不是一个可行的选择。\n\n##### OLTP 压缩\n\n`OLTP 压缩` 可以更容易地保留初始压缩所生成的相当一部分空间节省，尽管这可能无法立即实现，因为并非所有更新后的数据块都会被填满。以下示例说明了这一点：\n\
  \n```\nSQL>\nSQL> --\nSQL> -- 初始存储空间\nSQL> --\nSQL> select segment_name, sum(bytes)\
  \ total_space\n  2  from user_segments\n  3  group by segment_name;\n```\n\n\n##\
  \ Oracle 表压缩操作与性能观察\n\n### 初始状态与 OLTP 压缩\n\n执行以下命令以观察初始段大小，并将 `emp` 表移动为 OLTP 压缩格式。\n\
  \n```\nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
  \ -----------\nDEPT                                      65536\nDUMMY          \
  \                           65536\nEMP                                  713031680\n\
  EMP_IDX                              478150656\nSALGRADE                       \
  \          65536\n\n已用时间: 00:00:00.03\nSQL>\nSQL> --\nSQL> -- 压缩为 OLTP 而非 QUERY\
  \ HIGH\nSQL> --\nSQL> -- 注意已用时间\nSQL> --\nSQL> alter table emp move compress for\
  \ oltp;\n\n表已更改。\n\n已用时间: 00:00:19.36\nSQL>\nSQL> alter index emp_idx rebuild;\n\
  \n索引已更改。\n\n已用时间: 00:00:52.12\nSQL>\nSQL> --\nSQL> -- 这些数字与 HCC 压缩数据首次更新后生成的数字相同\n\
  SQL> --\nSQL> select table_name, compression, compress_for\n  2  from user_tables;\n\
  \nTABLE_NAME                     COMPRESS COMPRESS_FOR\n------------------------------\
  \ -------- ------------\nDEPT                           DISABLED\nBONUS        \
  \                  DISABLED\nSALGRADE                       DISABLED\nDUMMY    \
  \                      DISABLED\nEMP                            ENABLED  OLTP\n\n\
  已用时间: 00:00:00.04\nSQL>\nSQL> select segment_name, sum(bytes) total_space\n  2 \
  \ from user_segments\n  3  group by segment_name;\n\nSEGMENT_NAME              \
  \          TOTAL_SPACE\n----------------------------------- -----------\nDEPT  \
  \                                    65536\nDUMMY                              \
  \       65536\nEMP                                  201326592\nEMP_IDX         \
  \                     260046848\nSALGRADE                                 65536\n\
  \n已用时间: 00:00:00.01\nSQL>\nSQL> --\nSQL> -- 执行一次更新\nSQL> --\nSQL> -- 注意已用时间（少于之前的压缩更新）\n\
  SQL> --\nSQL> update emp set sal=sal*1.08 where empno > 7350;\n\n14680064 行已更新。\n\
  \n已用时间: 00:20:40.64\nSQL>\nSQL> commit;\n\n提交完成。\n\n已用时间: 00:00:00.01\nSQL>\nSQL>\
  \ --\nSQL> -- 当前的压缩级别和存储情况\nSQL> --\nSQL> -- 看起来像是 HCC 压缩数据第二次更新后的存储情况\nSQL> --\n\
  SQL> select table_name, compression, compress_for\n  2  from user_tables;\n\nTABLE_NAME\
  \                     COMPRESS COMPRESS_FOR\n------------------------------ --------\
  \ ------------\nDEPT                           DISABLED\nBONUS                 \
  \         DISABLED\nSALGRADE                       DISABLED\nDUMMY             \
