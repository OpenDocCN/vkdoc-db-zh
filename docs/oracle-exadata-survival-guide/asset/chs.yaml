  PARSING_SCHEMA_ID              NUMBER                                  22\nPARSING_SCHEMA_NAME\
  \            VARCHAR2                                30\nKEPT_VERSIONS         \
  \         NUMBER                                  22\nADDRESS                  \
  \      RAW                                      8\nTYPE_CHK_HEAP               \
