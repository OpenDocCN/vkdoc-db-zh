  \ ID（`obj#`）。\n\n## 单元物理读取的块列表\n\n该事件原名为`db file parallel read`，在 Exadata 系统上被重命名，以更准确地反映触发它的操作。然而，在非\
  \ Exadata 系统上，记录时间的仍然是原名事件。有趣的是，此事件与并行数据操作语言（DML）操作*无关*。\n\n此事件记录当块*不*连续时的多块读取时间。这使得它更容易与连续的多块读取区分开来。同样，许多执行计划操作都可以触发此事件，如下列表所示：\n\
  \n![image](img/Table7-4.jpg)\n\n在我们一个数据库上，按频率排序，最“受欢迎”的四种执行计划操作是`TABLE ACCESS BY\
  \ INDEX ROWID`（通过索引 ROWID 访问表）、`INDEX RANGE SCAN`（索引范围扫描）、`INDEX UNIQUE SCAN`（索引唯一扫描）和`TABLE\
  \ ACCESS STORAGE FULL`（全表存储访问）。\n\n再次查看 10046 跟踪文件，可以从以下`grep`命令的输出中看到此事件是如何被报告的：\n\
