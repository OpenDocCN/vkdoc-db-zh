  \n![image](img/Table10-5a.jpg)![image](img/Table10-5b.jpg)\n\n这两份报告都很有用，因为它们报告了不同的监控数据集，在深入排查某些性能问题或错误时可能非常有用。\n\
  \nCPU 报告的格式、显示的列及其含义，请参见表 10-1。\n\n表 10-1. `Iostat` 在 CPU 格式中报告的值\n\n| %user | 显示在用户级别（应用程序）执行时发生的\
  \ CPU 利用率百分比。 |\n| %nice | 显示在用户级别以 nice 优先级执行时发生的 CPU 利用率百分比。 |\n| %system | 显示在系统级别（内核）执行时发生的\
  \ CPU 利用率百分比。 |\n| %iowait | 显示 CPU 或 CPU 空闲且系统有待处理的磁盘 I/O 请求的时间百分比。 |\n| %steal\
  \ | 显示虚拟 CPU 或 CPU 在虚拟机管理程序为其他虚拟处理器提供服务时处于非自愿等待状态的时间百分比。 |\n| %idle | 显示 CPU 或 CPU\
  \ 空闲且系统没有待处理的磁盘 I/O 请求的时间百分比。 |\n\n设备报告格式如表 10-2 所示。\n\n表 10-2. `Iostat` 在设备格式中报告的值\n\
  \n\n| 设备： | 此列给出设备（或分区）名称。在 2.2 内核中显示为 `hdiskn`，其中 n 是设备序号。在 2.4 内核中显示为 `devm-n`，其中\
  \ m 是设备的主编号，n 是一个区分编号。在更新的内核中，显示为 `/dev` 目录下列出的设备名称。 |\n| --- | --- |\n| `tps` |\
  \ 表示每秒向设备发出的传输（transfer）次数。一次传输是针对设备的一个 I/O 请求。多个逻辑请求可以组合成一个针对设备的单次 I/O 请求。传输的大小是不确定的。\
  \ |\n| `Blk_read/s` | 表示从设备读取的数据量，以每秒块数为单位。在 2.4 及更新的内核中，块（block）等同于扇区（sector），因此大小为\
  \ 512 字节。在旧内核中，块的大小是不确定的。 |\n| `Blk_wrtn/s` | 表示写入设备的数据量，以每秒块数为单位。 |\n| `Blk_read`\
  \ | 读取的总块数。 |\n| `Blk_wrtn` | 写入的总块数。 |\n| `kB_read/s` | 表示从设备读取的数据量，以每秒千字节数为单位。\
  \ |\n| `kB_wrtn/s` | 表示写入设备的数据量，以每秒千字节数为单位。 |\n| `kB_read` | 读取的总千字节数。 |\n| `kB_wrtn`\
  \ | 写入的总千字节数。 |\n| `MB_read/s` | 表示从设备读取的数据量，以每秒兆字节数为单位。 |\n| `MB_wrtn/s` | 表示写入设备的数据量，以每秒兆字节数为单位。\
  \ |\n| `MB_read` | 读取的总兆字节数。 |\n| `MB_wrtn` | 写入的总兆字节数。 |\n| `rrqm/s` | 每秒合并到设备队列中的读请求数量。\
  \ |\n| `wrqm/s` | 每秒合并到设备队列中的写请求数量。 |\n| `r/s` | 每秒向设备发出的读请求数量。 |\n| `w/s` | 每秒向设备发出的写请求数量。\
  \ |\n| `rsec/s` | 每秒从设备读取的扇区数量。 |\n| `wsec/s` | 每秒写入设备的扇区数量。 |\n| `rkB/s` | 每秒从设备读取的千字节数。\
  \ |\n| `wkB/s` | 每秒写入设备的千字节数。 |\n| `rMB/s` | 每秒从设备读取的兆字节数。 |\n| `wMB/s` | 每秒写入设备的兆字节数。\
  \ |\n| `avgrq-sz` | 向设备发出的请求的平均大小（以扇区为单位）。 |\n| `avgqu-sz` | 向设备发出的请求的平均队列长度。 |\n\
  | `await` | 向设备发出的 I/O 请求的平均服务时间（以毫秒为单位）。这包括请求在队列中等待的时间和服务所花费的时间。 |\n| `svctm` |\
  \ 向设备发出的 I/O 请求的平均服务时间（以毫秒为单位）。 |\n| `%util` | 发出设备 I/O 请求的 CPU 时间百分比（设备的带宽利用率）。当此值接近\
  \ 100% 时，表明设备达到饱和。 |\n| `ops/s` | 表示每秒向挂载点发出的操作数。 |\n| `rops/s` | 表示每秒向挂载点发出的读操作数。\
  \ |\n| `wops/s` | 表示每秒向挂载点发出的写操作数。 |\n\n基础的设备报告提供 `tps`、`Blk_read/s`、`Blk_wrtn/s`、`Blk_read`\
  \ 和 `Blk_wrtn` 值。表 10-2 中的其余列表项显示在扩展设备报告中。对于正常运行的 Exadata 系统，您不应该看到很大的 `await` 时间。在我们管理的系统上，对于物理磁盘，看到的最大\
  \ `await` 时间大约是 20 到 25 毫秒，对于闪存磁盘则小于 1 毫秒。如果您在某个磁盘上经常看到数百毫秒或更长的 `await` 时间，则需要进行进一步调查，因为该单元可能存在固件不匹配或设备即将故障的问题。\n\
  \n由于数据库服务器不直接访问存储介质，运行 `iostat` 设备报告来诊断磁盘读/写问题不会提供有关 ASM 存储的任何有用信息。但是，不要忘记数据库服务器为所有事务利用\
  \ CPU，因此在为存储单元生成 CPU 报告时，也应生成 `iostat` CPU 报告。这样做可以最大程度地减少错过可能仅在数据库服务器上发生的 CPU 相关问题的风险。\n\
  \n`iostat` 报告的设备名称是在被监控服务器的 `/dev` 目录层次结构中找到的名称。哪个单元磁盘映射到哪个设备由 CellCLI 命令 `list\
  \ celldisk` 报告，该命令指定 `name` 和 `deviceName` 属性，如下所示：\n\n```\nCellCLI> list celldisk\
  \ attributes name, deviceName\n         CD_00_myexa1cel04       /dev/sda\n     \
  \    CD_01_myexa1cel04       /dev/sdb\n         CD_02_myexa1cel04       /dev/sdc\n\
  \         CD_03_myexa1cel04       /dev/sdd\n         CD_04_myexa1cel04       /dev/sde\n\
  \         CD_05_myexa1cel04       /dev/sdf\n         CD_06_myexa1cel04       /dev/sdg\n\
  \         CD_07_myexa1cel04       /dev/sdh\n         CD_08_myexa1cel04       /dev/sdi\n\
  \         CD_09_myexa1cel04       /dev/sdj\n         CD_10_myexa1cel04       /dev/sdk\n\
  \         CD_11_myexa1cel04       /dev/sdl\n         FD_00_myexa1cel04       /dev/sdv\n\
  \         FD_01_myexa1cel04       /dev/sdw\n         FD_02_myexa1cel04       /dev/sdx\n\
  \         FD_03_myexa1cel04       /dev/sdy\n         FD_04_myexa1cel04       /dev/sdz\n\
  \         FD_05_myexa1cel04       /dev/sdaa\n         FD_06_myexa1cel04       /dev/sdab\n\
  \         FD_07_myexa1cel04       /dev/sdac\n         FD_08_myexa1cel04       /dev/sdr\n\
  \         FD_09_myexa1cel04       /dev/sds\n         FD_10_myexa1cel04       /dev/sdt\n\
  \         FD_11_myexa1cel04       /dev/sdu\n         FD_12_myexa1cel04       /dev/sdn\n\
  \         FD_13_myexa1cel04       /dev/sdo\n         FD_14_myexa1cel04       /dev/sdp\n\
  \         FD_15_myexa1cel04       /dev/sdq\n\nCellCLI>\n```\n\n所示的报告应该在 Exadata\
  \ 系统上的每个存储单元运行一次，前提是您不将其升级到下一个可用配置，或者您的 Exadata 系统是全机架（Full Rack）。从四分之一机架（Quarter\
  \ Rack）升级到半机架（Half Rack）或从半机架升级到全机架的系统升级将要求您再次运行该报告，以便可以看到新的设备映射。\n\n了解这些信息可以更轻松地将\
  \ `iostat -d` 报告的设备统计信息与 ASM 磁盘和闪存磁盘关联起来。您可能遇到的底层 I/O 问题现在可以通过结合两个实用程序的输出来进行跟踪和诊断。\n\
  \n## 注意事项\n\nExadata 在数据库层和存储层都提供了良好的监控，提供了大量可用指标，报告系统的许多方面。选择报告哪些指标是一项重要的任务，可以防止您在数据洪流中迷失方向。\n\
  \n为了使监控有效，必须建立一个基线，这样您就有了一个已知的参考点来与后续的监控运行进行比较。与基线进行比较提供了一个坚实的起点，用于衡量性能改进和问题。没有这样的基线，每次分析都是针对一个移动的目标，使得任务比原本需要的更加困难。\n\
  \n\n\nOracle Enterprise Manager 可用于生成报表和图表，以展示随时间变化的性能指标。您仍然需要一个起始基线，而这个基线并非必须是完美性能的状态。请记住：您衡量的是相对于此基线的性能变化。您可能会发现，当性能提升时，您会将那个提升点作为新的基线。\n\
  \n如果安装了 Exadata 存储服务器的系统监控插件，OEM 还能监控存储单元。此插件可能不提供命令行工具的所有指标，但它可以展示存储统计信息和指标随时间的变化情况。\n\
  \n监控也可以通过 Oracle Enterprise Manager 之外的脚本和命令行实用程序来执行，以返回所需数据。存储单元提供了 `cellcli` 和\
  \ `cellsrvadmin` 实用程序，可报告存储单元的各个区域。\n\n无论 Oracle 的监测机制多么完善，它都不会报告低级别的 I/O 统计信息，因此需要到操作系统层面去获取这些信息。`iostat`\
  \ 实用程序可以提供对这种低级别 CPU 和设备活动的洞察。可以生成两份独立的报告，一份针对 CPU，一份针对设备；或者通过调用不带任何命令行参数的 `iostat`\
  \ 将两份报告合并输出。\n\n`cellcli` 实用程序可以通过 `celldisk` 命令报告哪个单元磁盘映射到哪个硬件设备。值得关注的属性是 name\
  \ 和 deviceName。了解此映射关系后，您就可以“翻译” `iostat` 设备报告的输出，从而监控 ASM 磁盘，并查看哪些磁盘（如果有的话）可能出现问题。\n\
  \n"
- "# 存储重新配置\n\n![image](img/frontdot.jpg)\n\n默认情况下，Exadata 系统会在 `+DATA_MYEXA1` 和 `+RECO_MYEXA1`\
  \ 磁盘组之间预先分配大部分物理存储，并且采用 80/20 的拆分比例。在购买的预安装阶段，Oracle 会向 DBA、网络管理员和系统管理员提供一份工作表。每个小组为配置过程提供信息，其中\
  \ DBA 和网络管理员提供大部分数据。工作表完成后，会进行讨论以澄清任何模糊的设置，并确定存储将如何划分。可能并不明显需要调整默认设置，因此系统按标准的 80/20\
  \ 分配进行配置。还会提供第三个磁盘组 `DBFS_DG`，其空间约为 32GB，且此磁盘组的大小不会改变。\n\n在配置完成后，可以更改这些分配，但这是一个破坏性的过程，需要仔细考虑。我们曾在一台将用于生产的\
  \ Exadata 系统上执行过此操作，但那是在任何生产数据库创建之前很久进行的。该操作也是在 Oracle 高级客户支持的协助下完成的，尽管我们会提供执行此重新配置的步骤，但我们强烈建议您让\
  \ Oracle 高级客户支持参与此过程。我们将讨论实际步骤，以便您理解从头到尾的整个过程。本章的目标是提供有关存储重新配置过程的实用知识。如果您对执行此类操作感到不太放心，最好的方法可能是安排\
  \ Oracle 高级客户支持在需要时为您执行此操作。即使您不亲自执行，了解将运行哪些任务以及最终结果会是什么样也会很有帮助。考虑到这一点，我们将继续下去。\n\
  \n## 我希望我们能有更多...\n\n在配置完成后，但在创建任何数据库（除了安装时提供的默认数据库 DBM）之前，您可能会发现，例如，您希望或需要比最初分配更多的恢复存储。或者，您可能不使用恢复区域（不太可能），并希望使数据磁盘组稍大一些，作为另一个例子。有一种方法可以在创建任何重要内容之前完成此操作。我们再次声明，重新配置存储分配是一个破坏性的过程，需要在执行前很久就进行规划。我们将演示一个在\
  \ `+DATA_MYEXA1` 和 `+RECO_MYEXA1` 磁盘组之间更均匀分配存储的过程，再次提醒，**适当的规划绝对必要**，并且应让 Oracle\
  \ 高级客户支持参与。\n\n## 重新分配资源\n\nExadata 系统中的每个磁盘在逻辑上划分为有时称为分区的区域，这些区域包含在配置时确定的固定存储量。查看标准\
  \ Exadata 安装上单个磁盘的配置方式，以下输出显示了各种分区的分配情况：\n\n```\nCellCLI> list griddisk attributes\
  \ name, size, offset where name like '.*CD_11.*'\n         DATA_MYEXA1_CD_11_myexa1cel05\
  \   2208G           32M\n         DBFS_DG_CD_11_myexa1cel05       33.796875G   \
  \   2760.15625G\n         RECO_MYEXA1_CD_11_myexa1cel05   552.109375G     2208.046875G\n\
  \nCellCLI>\n```\n\n![image](img/sq.jpg) **注意** 对于 UNIX/Linux 系统，slice 和 partition\
  \ 这两个术语在某些资料中互换使用。两者都用于指示物理磁盘的逻辑划分。在本文中，我们将使用术语 **partition**，因为它是最准确的术语。\n\n请注意，对于给定的磁盘，有三个\
  \ ASM 可以看到并使用的分区。还要注意，对于给定的分区，其大小加上偏移量给出了下一个分区的起始“点”。不幸的是，CellCLI 的输出无法按照您希望的方式排序。在此示例中，默认排序方式是按名称。\n\
  \n从提供的输出看，第一个分区被分配为 `+DATA_MYEXA1` 存储分区，从存储的前 32MB 之后开始。那 32MB 保留给操作系统进行磁盘管理。下一个可供\
  \ ASM 使用的分区被分配给 `+RECO_MYEXA1` 磁盘组，第三个分区被分配给 `+DBFS_DG` 磁盘组。磁盘组的大小取决于您选择的存储类型以及您订购的\
  \ Exadata 机架大小。本章图示的系统使用高容量磁盘，每块磁盘提供 3TB 存储。高速磁盘每块提供 600GB 存储。配置过程根据 `/opt/oracle.SupportTools/onecommand/onecommand.param`\
  \ 文件中名为 `SizeArr` 的参数，为数据和恢复磁盘组配置分区。两个系统都采用 `+DATA_MYEXA1` 和 `+RECO_MYEXA1` 之间的默认存储划分进行配置。这导致这两个磁盘组之间采用\
  \ 80/20 的分配。如前所述，提供的输出是针对标准 Exadata 配置的。\n\n要改变 ASM 看到存储的方式，第一步将是删除原始配置，以便可以在物理磁盘上创建新的分区。下一个基本步骤是创建新分区，然后配置\
  \ ASM 磁盘组。由于第一步是删除所有已配置的分区，因此当 Exadata 系统上已创建开发、测试或生产数据库时，**不建议**执行此过程。我们再次声明，此过程是**破坏性的**，在删除原始逻辑磁盘配置的初始步骤完成后，**将没有任何数据库保留**。GRID\
  \ 基础架构也会被删除；它将作为定义新逻辑存储分区的 26 个步骤之一被重新创建。\n\n\n\n### 准备\n\n不仅逻辑存储区域被重新定义，“Oracle”操作系统的用户主目录也会被重新创建，因此在执行此过程之前，必须保留对该位置所做的任何更改。这需要在您的\
  \ Exadata 系统中所有可用的数据库服务器上执行，即使您让 Oracle 高级客户支持执行实际的存储工作也是如此。因此，执行的第一步是使用 `tar`（最初是\
  \ *Tape ARchiver* 的首字母缩写，因为在旧时代，唯一可用的介质是磁带）或 `cpio`（*CoPy In/Out* 的首字母缩写，一个相对于 `tar`\
  \ “较新”的实用程序，设计为不仅可以在磁带上操作，还可以在磁盘驱动器等块设备上操作）来保留“Oracle”用户主目录。这两个实用程序在操作系统级别提供。如果您选择\
  \ `tar`，以下命令将保留“Oracle”操作系统用户的主目录：\n\n```\n$ tar cvf /tmp/oraclehome.tar ./*\n```\n\
  \n如果您不熟悉 `tar` 命令，提供的选项执行以下操作：\n\n```\nc -- 创建归档文件\nv -- 使用详细模式。这将显示所有处理的目录和文件及其关联路径\n\
  f -- 用于归档的文件名\n```\n\n使用 `./*` 语法指定要归档的文件，可以更轻松地将文件恢复到您选择的任何基本目录。“Oracle”操作系统用户主目录不太可能更改名称。了解此语法会很有帮助，如果您想将完整的目录树复制到另一个位置，这是我们通常调用\
  \ `tar` 来复制文件和目录的方式。\n\n使用 `tar` 不是强制性的；您也可以使用 `cpio`。如果您更习惯使用 `cpio` 实用程序，以下命令将归档“Oracle”操作系统用户主目录：\n\
  \n```\n$ find . -depth -print | cpio -ov > /tmp/oraclehome.cpio\n```\n\n提供的选项执行以下操作：\n\
  \n```\no -- 复制输出到列出的归档文件\nv -- 详细输出，列出处理的文件和路径\n```\n\n我们建议在开始任何存储重新配置之前保留“Oracle”用户主目录，因为它将被重新配置过程覆盖。在所有可用的数据库服务器上保留现有的“Oracle”操作系统用户主目录，因为所有“Oracle”操作系统用户主目录都将被重建。此外，“Oracle”操作系统用户密码将被重置为其原始值，该值在交付、安装和初始配置之前填写的\
  \ Exadata 工作表中列出。\n\n用于 Exadata 配置的文件仅允许您指定数据磁盘组分区的大小。恢复磁盘组分区的大小源自为调整数据磁盘组大小而提供的值。DBFS_DG\
  \ 的大小不受更改此值的影响。在删除原始存储配置之前，无法修改此文件。\n\n![image](img/sq.jpg) **注意** 列出的存储重新配置命令必须以“root”用户身份运行。由于此用户在操作系统级别拥有无限权力，因此在执行这些命令时必须格外谨慎，这一点再怎么强调也不为过。如果您不习惯使用“root”帐户，最好与\
  \ Oracle 高级客户支持安排，将存储重新配置到您所需的级别。\n\n您应该对存储重新配置在 +DATA_MYEXA1 磁盘组和 +RECO_MYEXA1\
  \ 磁盘组大小方面希望提供的内容有很好的了解，并且您应该已经使用 `tar` 或 `cpio` 保留了“Oracle”操作系统用户主目录。我们现在继续进行实际的存储重新配置过程。\n\
  \n此时的其他任务包括了解安装了哪些 OEM 代理，并记录 SCAN 监听器是否使用默认端口。如有必要，重新安装 OEM 代理和为非默认端口重新配置 SCAN\
  \ 监听器，将不得不在恢复步骤中作为存储重新配置完成和“Oracle”操作系统用户主目录恢复后的一部分来完成。本章将不涵盖重新安装 OEM 代理和重新配置 SCAN\
  \ 监听器的步骤，但了解可能需要执行这些操作是好的。\n\n### 执行\n\n您应该充分准备好开始实际的重新配置过程。第一步是删除原始存储配置，包括存储单元的配置。让我们开始。\n\
  \n## 步骤 1\n\n以“root”用户身份连接到数据库服务器 1。您应该在 shell 提示符中看到 `#`，表示登录/su 过程成功。您现在必须将目录更改为\
  \ `/opt/oracle.SupportTools/onecommand`。这是完成此操作所需的脚本和配置文件所在的位置。了解您可以执行哪些命令来进行此重新配置是一个好主意，该信息可以通过使用列出的参数执行以下脚本来找到：\n\
  \n```\n./deploy11203.sh -a -l\n```\n\n将显示以下列表：\n\n```\nStep  0 = CleanworkTmp\n\
  Step  1 = DropUsersGroups\nStep  2 = CreateUsers\nStep  3 = ValidateGridDiskSizes\n\
  Step  4 = CreateOCRVoteGD\nStep  5 = TestGetErrNode\nStep  6 = DeinstallGI\nStep\
  \  7 = DropCellDisk\nStep  8 = DropUsersGroups\nStep  9 = CheckCssd\nStep 10 = testfn\n\
  Step 11 = FixAsmAudit\nStep 12 = DropExpCellDisk\nStep 13 = testHash\nStep 14 =\
  \ DeconfigGI\nStep 15 = GetVIPInterface\nStep 16 = DeleteDB\nStep 17 = ApplyBP3\n\
  Step 18 = CopyCrspatchpm\nStep 19 = SetupMultipath\nStep 20 = RemovePartitions\n\
  Step 21 = SetupPartitions\nStep 22 = ResetMultipath\nStep 23 = DoT4Copy\nStep 24\
  \ = DoAlltest\nStep 25 = ApplyBPtoGridHome\nStep 26 = Apply112CRSBPToRDBMS\nStep\
  \ 27 = RelinkRDSGI\nStep 28 = RunConfigAssistV2\nStep 29 = NewCreateCellCommands\n\
  Step 30 = GetPrivIpArray\nStep 31 = SetASMDefaults\nStep 32 = GetVIPInterface\n\
  Step 33 = Mychknode\nStep 34 = UpdateOPatch\nStep 35 = GetGroupHash\nStep 36 = HugePages\n\
  Step 37 = ResetPermissions\nStep 38 = CreateGroups\nStep 39 = FixCcompiler\nStep\
  \ 40 = CollectLogFiles\nStep 41 = OcrVoteRelocate\nStep 42 = OcrVoteRelocate\nStep\
  \ 43 = FixOSWonCells\nStep 44 = Dbcanew\nStep 45 = testgetcl\nStep 46 = setupASR\n\
  Step 47 = CrossCheckCellConf\nStep 48 = SetupCoreControl\nStep 49 = dropExtraCellDisks\n\
  Step 50 = CreateCellCommands\n```\n\n对于此重新配置步骤，有三个感兴趣的命令：\n\n```\nStep  6 = DeinstallGI\n\
  Step  7 = DropCellDisk\nStep  8 = DropUsersGroups\n```\n\n这些是将执行以“清除”现有存储配置并为下一步做准备的命令。每个命令都从\
  \ `deploy11203.sh` 脚本单独运行。您必须按列出的顺序运行这些步骤，以确保完全删除现有配置。实际的命令如下：\n\n```\n./deploy11203.sh\
  \ -a -s 6\n./deploy11203.sh -a -s 7\n./deploy11203.sh -a -s 8\n```\n\n查看 `V$ASM_DISKGROUP`\
  \ 的输出，您可以看到原始的存储分配。以下输出说明了这一点：\n\n```\nSQL> select name, free_mb, usable_file_mb\n\
  \  2  from v$asm_diskgroup\n  3  where name like '%MYEXA%';\n\nNAME            \
  \               FREE_MB USABLE_FILE_MB\n------------------------------  ---------\
  \ --------------\nDATA_MYEXA1                   81050256       26959176\nRECO_MYEXA1\
  \                   20324596        6770138\n\nSQL>\n```\n\n您将看到，当此过程完成时，所示查询的输出将报告不同的值，这些值是新存储设置的结果。您应该在过程开始前和过程结束后运行此查询，以记录原始存储和新配置的存储。\n\
  \n考虑到这些注意事项，我们继续进行重新配置存储所需的步骤。\n\n\n\n### 概述\n\n在八分之一机架或四分之一机架配置上运行这些步骤大约需要一个小时，输出将显示在屏幕上，描述待处理和已完成的任务。我们建议您运行每个命令并观察输出。这些流程不应产生任何错误；然而，我们认为通过观察进度来确保安全是最佳做法。\n\
  \n这些步骤的作用是什么？第 6 步移除了 GRID 基础设施，这基本上是 ASM（以及 RAC，但我们在此操作中关心的是它与 ASM 的链接）的核心。一旦该基础设施消失，我们就可以自由运行第\
  \ 7 步来删除已创建的网格磁盘，然后删除 ASM 用于识别和访问存储的分区定义。最后是删除访问这些分区和网格磁盘的用户和组。这里会删除“oracle”用户账户及其操作系统主目录。请注意，只需\
  \ 3 个步骤即可删除现有的存储配置，但需要 26 个步骤才能重新创建它。\n\n#### Act 2\n\n一旦这些操作完成，就该修改存储阵列参数以提供所需的存储划分。要编辑的配置文件是`/opt/oracle.SupportTools/onecommand/onecommand.params`。我们使用`vi`来编辑此类文件，但您可能希望改用\
  \ emacs。使用您习惯的任何编辑器。要更改的参数值名为`SizeArr`。对于标准默认安装，此行应如下所示：\n\n```\nSizeArr=2208G\n\
  ```\n\n了解使用什么值来获得所需的存储划分是很有用的。表 11-1 显示了几个`SizeArr`值以及创建的大约存储划分。\n\n##### 表 11-1.\
  \ 某些 SizeArr 值及生成的存储分配\n\n| SizeArr 设置 | 数据磁盘组百分比 | 恢复磁盘组百分比 |\n| --- | --- | ---\
  \ |\n| 2208 | 80 | 20 |\n| 1932 | 70 | 30 |\n| 1656 | 60 | 40 |\n| 1487 | 55 | 45\
  \ |\n| 1380 | 50 | 50 |\n\n请记住，这些百分比是基于默认 80/20 存储分配的近似值。我们建议您使用标准 shell 脚本注释字符`#`来注释该行，以便保留原始设置。您现在可以复制注释的行，或者在其正下方打开一个新行并提供以下文本：\n\
  \n```\nSizeArr=<您选择的值>G\n```\n例如，如果您希望对可用存储配置 55/45 的划分，基于表 11-1 中的信息，新行将如下所示：\n\
  \n```\nSizeArr=1487G\n```\n编辑完成后，应该有两行列出了`SizeArr`，如下所示：\n\n```\n###### SizeArr=2208G\n\
  SizeArr=1487G\n```\n这是您需要对此参数文件进行的唯一更改，因此请保存您的工作并退出编辑器。您现在已准备好建立新的存储配置。\n\n####\
  \ Act 3\n\n与之前的操作一样，将使用`deploy11203.sh`脚本，尽管步骤数量更多。以下是此过程此部分可用的完整步骤列表：\n\n```\n\
  Step  0 = ValidateEnv\nStep  1 = CreateWorkDir\nStep  2 = UnzipFiles\nStep  3 =\
  \ setupSSHroot\nStep  4 = UpdateEtcHosts\nStep  5 = CreateCellipinitora\nStep  6\
  \ = ValidateIB\nStep  7 = ValidateCell\nStep  8 = PingRdsCheck\nStep  9 = RunCalibrate\n\
  Step 10 = CreateUsers\nStep 11 = SetupSSHusers\nStep 12 = CreateGridDisks\nStep\
  \ 13 = GridSwInstall\nStep 14 = PatchGridHome\nStep 15 = RelinkRDSGI\nStep 16 =\
  \ GridRootScripts\nStep 17 = DbSwInstall\nStep 18 = PatchDBHomes\nStep 19 = CreateASMDiskgroups\n\
  Step 20 = DbcaDB\nStep 21 = DoUnlock\nStep 22 = RelinkRDSDb\nStep 23 = LockUpGI\n\
  Step 24 = ApplySecurityFixes\nStep 25 = setupASR\nStep 26 = SetupCellEmailAlerts\n\
  Step 27 = ResecureMachine\n```\n与第一个列表不同，这里只显示了 28 个步骤。由于这是一个现有的 Exadata 安装，验证环境的第\
  \ 0 步和保护机器的第 27 步将不会运行。剩下的 26 步将用于重新配置存储和存储单元。以下命令将用于完成此过程的存储重新配置部分：\n\n```\n./deploy11203.sh\
  \ -r 1-26\n```\n`-r`选项按顺序执行提供的步骤，只要没有步骤产生错误。如果某个步骤确实产生错误，它将停在该步骤；应采取任何纠正措施，然后使用修改后的步骤列表重新启动`deploy11203.sh`脚本。例如，如果执行因错误停在第\
  \ 21 步，并且错误原因已纠正，以下命令将从生成错误的点重新启动重新配置：\n\n```\n./deploy11203.sh -r 21-26\n```\n\
  如果在执行中途出现问题，则无需从头开始整个过程。\n\n对于八分之一机架或四分之一机架 Exadata 配置，最后执行的`deploy11203.sh`脚本将运行一个半到两个小时。对于更大的\
  \ Exadata 配置，这将运行更长时间，因为磁盘数量更多。脚本将为每个执行的步骤提供反馈。\n\n在“干净”的系统上——即仍处于原始配置且没有任何新数据库的系统——我们在重新配置存储时没有遇到任何错误或困难。这是一个耗时的过程，但它应该可以毫无问题地执行。\n\
  \n![image](img/sq.jpg) **注意** 我们在新配置的 Exadata 系统上执行过此操作，并且运行没有困难。如果您计划在已创建其他数据库、存在其他`ORACLE_HOME`位置的系统上执行此操作，请注意此处提供的步骤可能会遇到与这些更改相关的问题。包含的数据库（通常名为`DBM`）将在重新配置过程中从脚本重新创建。请注意，恢复在初始配置完成后创建的数据库可能会因为重新分配的存储而导致错误，特别是如果`+DATA_MYEXA1`磁盘组已变小。在这种情况下，最好联系\
  \ Oracle 高级客户支持。\n\n##### 步骤详解\n\n让我们看看每个步骤在基础层面上完成了什么。步骤 1 和 2 是基本的“内务处理”操作，创建临时工作目录并将软件档案解压缩到该临时工作区。步骤\
  \ 3 开始了此操作的重要方面，它为“root”账户设置用户等效性（意味着无密码的`ssh`访问）到所有服务器和交换机。这是必需的，以便后续步骤无需询问密码即可继续。步骤\
  \ 4 更新了`/etc/hosts`文件，其中包含 Exadata 系统的预配置存储单元 IP 地址和服务器名称。这使得通过使用服务器名称而不是 IP 地址来连接系统中的其他服务器更加容易。\n\
  \n下一步，步骤 5，在可用的存储单元上创建`cellinit.ora`文件。`cellinit.ora`包含的内容示例（实际 IP 地址和端口号已遮蔽）如下。\n\
  \n```\n#CELL Initialization Parameters\nversion=0.0\nHTTP_PORT=####\nbbuChargeThreshold=800\n\
  SSL_PORT=#####\nRMI_PORT=#####\nipaddress1=###.###.###.###/##\nbbuTempThreshold=60\n\
  DEPLOYED=TRUE\nJMS_PORT=###\nBMC_SNMP_PORT=###\n```\n此步骤还在可用的数据库服务器上创建`cellip.ora`文件。示例内容如下。\n\
  \n```\ncell=\"XXX.XXX.XXX.3\"\ncell=\"XXX.XXX.XXX.4\"\ncell=\"XXX.XXX.XXX.5\"\n\
  cell=\"XXX.XXX.XXX.6\"\ncell=\"XXX.XXX.XXX.7\"\n```\n此文件告知 ASM 集群中可用的存储单元。\n\n\n\
  \n步骤 6、7 和 8 执行必要的 InfiniBand 连通性、存储单元配置以及数据库服务器与存储单元之间的 InfiniBand 进程间通信（`IPC`）验证。步骤\
  \ 8 通过检查`oracle`可执行文件的链接方式来执行此验证。`InfiniBand`上的`IPC`是通过使用`ipc_rds`选项链接`oracle`内核来设置的，如果缺少此选项，`IPC`将通过非`InfiniBand`网络层进行。不幸的是，大多数重新链接内核的数据库补丁并不包含此参数，我猜测是因为它们主要面向非\
  \ Exadata 系统。因此，为`oracle`软件打补丁可能导致此连接性丢失，进而因使用速度慢得多的网络连接进行`IPC`而引发性能问题。通过使用`ipc_rds`选项重新链接`oracle`内核可以轻松解决此问题。确保这一点的一种方法是编辑打补丁集中的脚本，该脚本用于重新链接`oracle`内核。另一种选择是在将数据库发布给用户之前，简单地使用`ipc_rds`选项再执行一次重新链接。从数据库服务器命令行复制而来的具体语句如下：\n\
  \n```\n$ make -f $ORACLE_HOME/rdbms/lib/ins_rdbms.mk ipc_rds\n```\n\n这也是`exachk`脚本执行的一项检查，该报告的输出会列出那些未链接以提供`InfiniBand`上`RDS`连接性的`oracle`内核。\n\
  \n步骤 9 校准存储，这是一个非常重要的步骤。每个可用的存储单元都会运行此操作。首先，关闭`CELLSRV`，然后运行`calibrate`过程。将生成类似于以下内容的输出：\n\
  \n```\nCellCLI> calibrate;\nCalibration will take a few minutes...\nAggregate random\
  \ read throughput across all hard disk luns: 137 MBPS\nAggregate random read throughput\
  \ across all flash disk luns: 2811.35 MBPS\nAggregate random read IOs per second\
  \ (IOPS) across all hard disk luns: 1152\nAggregate random read IOs per second (IOPS)\
  \ across all flash disk luns: 143248\nController read throughput: 5477.08 MBPS\n\
  Calibrating hard disks (read only) ...\nCalibrating flash disks (read only, note\
  \ that writes will be significantly slower) ...\n...\n```\n\n一旦所有存储单元的`calibrate`步骤完成，就可以创建单元磁盘和网格磁盘，即步骤\
  \ 12。在此之前，步骤 10 和 11 会创建`oracle`操作系统用户，并建立关联的免密`ssh`访问。这些步骤完成后，在步骤 12 中创建网格磁盘分区，以便`ASM`可以识别它们。这是您的新设置生效的地方，并建立了`+DATA_MYEXA1`和`+RECO_MYEXA1`之间所需的比例。\n\
  \n接下来是设置`GRID`主目录，通过安装`GRID`软件（步骤 13）、修补`GRID`主目录（步骤 14）、重新链接`GRID` `oracle`可执行文件以提供`InfiniBand`上的`IPC`（步骤\
  \ 15）以及运行`GRID`的`root.sh`脚本（步骤 16）。除了步骤 15，这些操作与您在任何其他`GRID`安装中执行的操作相同。安装和配置`GRID`软件后，安装并修补数据库软件（步骤\
  \ 17 和 18）。同样，这些步骤是您在安装和修补`Oracle`数据库软件时，在任何系统上都会执行的步骤。\n\n由于网格磁盘现已创建，让`ASM`识别它们并在步骤\
  \ 19 中创建`+DATA_MYEXA1`、`+RECO_MYEXA1`和`+DBFS_DG`磁盘组就是一项简单的任务。这为在步骤 20 中创建`DBM`集群数据库铺平了道路，这是`裸机`Exadata\
  \ 安装附带的默认数据库。可以在配置工作表中更改此数据库名称，但我们尚未见过任何安装中`DBM`不是可用数据库的情况。创建`DBM`数据库后，会解锁选定的账户（步骤\
  \ 21），并执行`DBM` `oracle`可执行文件的最终重新链接，以确保`InfiniBand`上的`IPC`功能正常（步骤 22）。步骤 23 中`GRID`基础设施被“锁定”以防止任何配置更改，然后，在步骤\
  \ 24 中，任何安全修复/补丁都会应用于数据库主目录。\n\n步骤 25 可能会也可能不会执行，这取决于您的企业是否决定允许`Oracle`通过自动服务请求（`ASR`）服务器直接访问\
  \ Exadata。这需要配置一个单独的服务器与 Exadata 通信以监控系统，并将发现的任何问题自动报告回`Oracle`，自动生成服务请求来解决问题。此类问题可能是实际或即将发生的硬件故障（磁盘驱动器、Sun\
  \ PCIe 卡、内存）。服务请求会生成零件订单并派遣服务技术员安装故障或即将故障的零件。如果您没有为此配置服务器，该步骤将运行然后成功终止，不执行任何操作。如果您确实需要此服务并已安装所需的额外服务器，此步骤会使用提供的\
  \ My `Oracle` Support 凭据配置服务，并进行测试以确保凭据有效。\n\n步骤 26 通过电子邮件设置任何所需的单元警报。它需要一个有效的电子邮件地址，该地址会被使用和验证。将单元警报通过电子邮件发送给您很方便；您无需连接到各个单元来列出警报历史记录，因此节省时间。这也是一个可选步骤；您不必配置将单元警报通过电子邮件发送给您，但建议这样做。\n\
  \n至此，您的 Exadata 系统已恢复到安装时的状态，但您修改的存储百分比除外。现在是恢复在此过程开始之前拥有的`oracle`操作系统用户主目录的时候了。\n\
  \n### 恢复\n\n既然存储已经重新配置，现在该解决重新创建的`oracle`操作系统用户主目录和重置的`oracle`操作系统密码了。请记住，在清除旧存储配置的最后一步中删除了`oracle`操作系统用户。假设您仍然以`root`身份连接，那么在每个数据库服务器的\
  \ shell 提示符下，您将键入以下内容：\n\n```\n# passwd oracle\n```\n\n这将提示您输入新的`oracle`操作系统用户密码，需要输入两次进行确认。由于已为`root`账户配置了免密`ssh`访问，您可以从节点\
  \ 1 上的“基地”使用`ssh`连接到所有其他数据库服务器。对于不熟悉`ssh`的用户，以下命令将连接到数据库服务器 2：\n\n```\n# ssh myexa1db02\n\
  ```\n\n更改目标服务器名称以连接到其余的数据库服务器。\n\n现在该恢复之前的`oracle`操作系统用户主目录文件和配置了。使用`su`以`oracle`身份连接。这也会将您置于用户的主目录中。如果您使用`tar`来归档目录及其内容，以下命令将恢复归档的项目：\n\
  \n```\n$ tar xvf /tmp/oraclehome.tar . | tee oraclehome_restore.log\n```\n\n\n\n"
- "# 第 12 章\n\n![image](img/frontdot.jpg)\n\n## 将数据库迁移到 Exadata\n\n一个新安装和配置好的 Exadata\
  \ 系统只有一个数据库，通常命名为 DBM。正如您可能预料的那样，它是一个 RAC 数据库，因此存在于所有可用的数据库服务器上。Exadata 可以运行多个数据库（无论是集群的还是非集群的），这正是您最初购买该系统的原因。如果您以前构建过\
  \ RAC 数据库，那么创建新数据库并不困难；如果您没有经验，我们将在本章提供说明和指导来帮助您。然而，您不会总是构建真正“新”的数据库，因为您的目标是将现有的应用程序数据库迁移到\
  \ Exadata。有多种方法可以完成此任务。其中一些方法，例如逻辑方法，需要一个空数据库来操作，而另一些方法（物理方法）则只需要一个 `init.ora` 文件和控制文件就可以开始整个过程。本章的目标是让将数据库迁移到\
  \ Exadata 的任务尽可能轻松。\n\n## 物理迁移方法\n\n在本节中，我们将讨论三种将数据库物理迁移到 Exadata 的选项：备份、可传输表空间和备用数据库。每种方法都有其优点和缺点。您选择哪种方法取决于必须使用的迁移策略。并非所有平台都是相同的。有些是“大端”（big-endian），即数据“字”的最高有效字节写入内存的最低地址，而另一些是“小端”（little-endian），即数据“字”的最低有效字节写入内存的最低地址。\n\
  \n## 第四阶段\n\n恭喜，您已完成 Exadata 系统的存储重新配置。如果您在示例中使用了 `SizeArr` 设置，查看 `V$ASM_DISKGROUP`\
  \ 时，您应该会看到类似以下的输出：\n\n```\nSYS> select name, free_mb, usable_file_mb\n  2  from\
  \ v$asm_diskgroup\n  3  where name like '%MYEXA%';\n\nNAME                     \
  \         FREE_MB USABLE_FILE_MB\n------------------------------ ---------- --------------\n\
  DATA_MYEXA1                      52375300       17051522\nRECO_MYEXA1          \
  \            46920568       15638300\n\nSYS>\n```\n\n值得关注的值是 `USABLE_FILE_MB` 列中的数值。根据本章前面的内容，对原始存储分配执行该查询的输出如下。\n\
  \n```\nSQL> select name, free_mb, usable_file_mb\n  2  from v$asm_diskgroup\n  3\
  \  where name like '%MYEXA%';\n\nNAME                              FREE_MB USABLE_FILE_MB\n\
  ------------------------------  --------- --------------\nDATA_MYEXA1          \
  \            81050256       26959176\nRECO_MYEXA1                      20324596\
  \        6770138\n\nSQL>\n```\n\n根据 Exadata 系统的配置方式，您可能还需要执行其他任务，包括重新安装任何正在运行的 OEM\
  \ 代理，以及如果它未使用默认端口，则重新配置 SCAN 监听器。此类步骤是重新配置前准备阶段的一部分，应在开始任何存储重新分配之前予以记录。\n\n## 注意事项\n\
  \n在 Exadata 上重新配置存储分配是可能的，但这是一个破坏性的过程，需要在执行前进行规划。\n\n必须使用 `/opt/oracle.SupportTools/onecommand/deploy11203.sh`\
  \ 脚本删除现有的存储配置。该脚本也将使用不同的参数来创建新的存储配置。\n\n删除现有存储配置分三步执行：删除 GRID Infrastructure、删除单元磁盘，然后删除相关的用户帐户和组。由于在此过程中将删除\
  \ “oracle” 操作系统用户，因此有必要在 Exadata 系统中所有可用的数据库服务器上保留现有的操作系统用户主目录。这可以使用 `tar` 或 `cpio`\
  \ 来创建这些位置中目录和文件的存档。\n\n在 `/opt/oracle.SupportTools/onecommand` 下有一个名为 `onecommand.params`\
  \ 的配置文件。必须编辑此文件以提供新的存储阵列大小。此文件中提供的大小是针对 +DATA 磁盘组的（+DATA 和 +RECO 磁盘组名称通常包含 Exadata\
  \ 机器名称，例如，对于名为 MYEXA1 的 Exadata 机器，有 +DATA_MYEXA1 和 +RECO_MYEXA1）；恢复磁盘组的大小由此参数的值推导而来。\n\
  \n实际的重新配置再次使用 `/opt/oracle.SupportTools/onecommand/deploy11203.sh` 脚本进行，包含 26 个独立步骤。这些步骤重新建立用户帐户、连接性、软件安装、磁盘分区创建、网格磁盘和\
  \ ASM 磁盘组的创建、默认 DBM 数据库的创建，以及在各个主目录（homes）上应用数据库和安全补丁。此过程的一部分还确保进程间通信 (`IPC`) 使用\
  \ InfiniBand 而非标准网络，以避免性能问题。\n\n您必须执行的下一步是恢复 “oracle” 操作系统用户主目录中除 `.ssh` 目录外的所有内容。由于重新配置过程已建立了无密码\
  \ `ssh` 连接，覆盖这些文件将使该功能失效。\n\n最后，您必须以 “oracle” 用户身份连接（最好使用额外的会话），以验证您在重新配置前建立的所有功能是否按预期工作。\n\
  \n您可能需要执行的其他任务包括重新安装 OEM 代理以及，如果您将其更改为使用非默认端口，则重新配置 SCAN 监听器。\n\n系统可能会提示您覆盖现有文件。除了\
  \ `.ssh` 目录外，您应该这样做，因为您正在恢复的文件是您在存储重新分配之前配置的文件。请记住，此过程为 “oracle” 重新建立了无密码 `ssh`\
  \ 连接，使用重新配置前保存的内容替换 `.ssh` 目录内容可能会使无密码 `ssh` 失效，因为保存的 authorized_keys 文件中的签名与当前值不匹配。检查日志文件中是否有您可能错过的错误，因为详细的输出可能滚动太快而没被注意到，并纠正列出的错误。再次使用\
  \ `tar` 来恢复因现已纠正的错误而未能创建的文件或目录。如果需要第二次使用 `tar`，请在提示时*不要*替换现有文件。\n\n如果您使用 `cpio`\
  \ 来归档目录及其内容，以下命令将恢复归档的项目：\n\n```\n$ cpio -ivf ./.ssh < /tmp/oraclehome.cpio | tee\
  \ oraclehome_restore.log\n```\n\n`cpio` 实用程序读取指定的存档；提取除 `.ssh` 目录外的文件和目录；并将它们放在当前位置。如\
  \ `tar` 示例中所述，您不想覆盖 `.ssh` 目录内容，因为重新配置过程已为 “oracle” 重新建立了无密码 `ssh` 连接，覆盖这些当前文件将使该配置失效。归档恢复完成后，您需要检查日志文件中的错误。假设没有错误，您应该恢复到在更改存储分配之前建立的\
  \ “oracle” 操作系统用户配置。如果您确实在恢复中发现了错误，请纠正导致这些错误的状况，然后再次使用 `cpio` 来恢复由于错误而未能创建的文件或目录。\n\
  \n打开另一个会话并以 “oracle” 身份登录，以查看所有恢复的设置是否按预期功能运行。如果您已配置了设置各种 ORACLE_HOME 环境的方法，则应测试该方法，以确保在\
  \ “oracle” 操作系统用户主目录的存档或这些归档文件和目录的恢复过程中没有遗漏任何内容。\n\n\n\n"
- "# 数据库迁移至 Exadata：方法、字节序与实践\n\n## 内存存储与字节序基础\n\n如果对这些概念不熟悉，可以思考数据在内存中是如何存储的。存储的最小单位是比特（bit），其值只能是\
  \ 0 或 1。字节（Byte）是下一个更大的存储单位，由 8 个比特组成。每个数据字节既可以用组成它的比特的二进制值表示，也可以用代表相同值的十六进制数字表示。因此，字符\
  \ “w” 可以用十六进制数字 `6F` 或二进制值 `01101111` 表示。在当今大多数通用计算机中，字（word）的长度为 4 字节（32 位），尽管有些硬件架构使用不同长度的字（例如\
  \ 64 位）。\n\n每个内存地址可以存储 1 字节，因此每个 32 位的字被划分为四个单字节值。操作系统的**字节序**（endian-ness）决定了字节写入内存的顺序。只有两种顺序可选：大端序（big-endian）或小端序（little-endian）。为了说明这一行为，单词\
  \ `word` 由以下十六进制数字组成，按字母出现的顺序列出：\n\n```\n6F 77 64 72\n```\n\n在大端序系统中，字节将按如下顺序写入：\n\
  \n```\n6F 77 64 72\n```\n\n在小端序系统中，字节顺序将被反转，如下所示：\n\n```\n72 64 77 6F\n```\n\n如果源系统是大端序，那么将数据文件直接复制到小端序系统将导致数据无法读取，因为目标操作系统会以“错误”的顺序读取字节。Exadata\
  \ 运行的是 Linux，这是一个小端序操作系统。从大端序操作系统（例如 AIX 或 Solaris）迁移是可能的，但需要使用 RMAN，无论是作为主要迁移工具还是额外实用程序，来将数据文件从大端序格式转换为小端序格式。\n\
  \n## 迁移方法概述\n\n无论源系统的字节序如何，RMAN 都是一个极佳的迁移工具选择，特别是因为可以利用已有的数据库备份过程来生成迁移所需的备份集。将数据库从大端序系统迁移到\
  \ Exadata 需要进行一些流程上的更改，以便 RMAN 能够将数据文件转换为小端序格式。这些步骤将在本章后面提供。使用 RMAN 在 Exadata 上实质上克隆源数据库相对较快，并且会迁移所有内部数据库对象，而不考虑数据类型。可能会有一些\
  \ RMAN 无法传输的对象，例如 `BFILES` 和目录（directories），并且有办法报告这些对象。可以执行本章后面讨论的附加步骤，以确保这些对象也能被迁移。\n\
  \n当只需要迁移特定模式时，可传输表空间（Transportable tablespaces）也是一个选项。其流程为：确定表空间依赖关系；准备所需和依赖的表空间；导出元数据；传输表空间文件；将表空间元数据导入\
  \ Exadata。使用此方法需要在 Exadata 上创建一个空数据库，数据库配置助手（Database Configuration Assistant）可以执行此任务。这些通用步骤将在另一节中详细讨论。\n\
  \n物理备用数据库也可用于将源数据库迁移到 Exadata。基本上使用与标准 RMAN 数据库克隆相同的过程，但需要执行一些用于备用配置和操作的额外步骤。此方法允许您将数据库迁移到\
  \ Exadata，并使其与源数据库保持同步，直到期望的切换日期，届时备用数据库将转换为主数据库，所有用户流量将被重定向到 Exadata。此方法也将在本章后面更详细地介绍。\n\
  \n根据要迁移的表空间数量，使用可传输表空间可能不是合适的方法。在我们看来，RMAN 将是物理迁移方法的首选，而数据泵（data pump）则是用于逻辑数据传输的方法。为了辅助此次迁移，Oracle\
  \ 提供了一个视图 `V$TRANSPORTABLE_PLATFORM`，它列出了 RMAN 可以转换数据文件的操作系统及其字节序。在下一节中，我们将介绍此视图以及如何使用它，通过\
  \ RMAN 将数据库从具有不同字节序的系统迁移到运行 Linux 的 Exadata。\n\n## 使用备份进行迁移\n\n可能最简单的方法是利用现有的数据库备份将数据库重新定位到\
  \ Exadata，因为备份策略已经就位，并且经过测试可提供可靠的结果。这与使用 RMAN 克隆数据库的过程相同，因此它是可靠且可重复的。\n\n> **注意**\
  \ 我们发现有必要为备份片（backup pieces）提供外部存储。特别是当您将数据库从大端序平台迁移到 Exadata（一个小端序平台）并使用可传输表空间或\
  \ RMAN 时。\n\n查看使用 RMAN 备份将数据库迁移到 Exadata 所涉及的步骤，该过程是直接的。如果源服务器和 Exadata 目标之间可以共用一个通用存储设备，则会更容易，因为无需传输备份片。由于我们为了测试和开发目的克隆数据库，因此可以访问一个外部存储阵列，我们用它来备份所需的数据库。我们将基于此配置进行讨论，除了必须将备份片从源机器复制到\
  \ Exadata 之外，其余步骤是相同的。\n\n> **注意** 本节概述的步骤将把数据库迁移到 Exadata 上的单实例数据库。如果您希望迁移后的数据库是集群数据库，则需要执行额外的步骤。这些步骤将在本节末尾介绍，并适用于所描述的两种\
  \ RMAN 方法。\n\n在开始之前，需要源数据库的近期备份。此过程还应备份控制文件，并在数据库备份完成后进行。这是必要的，以便在备份后恢复的控制文件中能找到刚进行的备份。您将使用这些控制文件来启动在\
  \ Exadata 上的数据库恢复和还原。此外，还需要源数据库的 `init.ora` 或 spfile 的当前副本，以及任何必要的目录组件，例如为源数据库定义的诊断目标（diagnostic\
  \ destination）。对于正在迁移的 RAC 数据库，必须将每个节点的 `init.ora` 或 spfile 复制到其在 Exadata 系统上的相应位置。我们建议您使用\
  \ `tar` 或 `cpio` 来归档源数据库的诊断目标，并将该归档文件传输到 Exadata 进行恢复。可能在某些情况下，无法在 Exadata 系统上复制诊断目标的完整路径。在这种情况下，更改为\
  \ `init.ora` 文件中列为 `diagnostic_dest` 的目录，并从该点开始归档。以下是一个名为 TEST 的数据库使用 `tar` 的示例：\n\
  \n```\n$ cd /u01/oracle/11.2.0.3\n$ tar cvf /obkups/diag_dest.tar ./diag/rdbms/test\n\
  ```\n\n创建的 `tar` 归档文件将被传输到 Exadata 系统。更改为 DBM 数据库（因为这很可能是您用于传输数据库的 `ORACLE_HOME`）所列出的\
  \ `diagnostic_dest`，并恢复 `tar` 归档文件，如下所示：\n\n```\n$ cd /u01/oracle/11.2.0\n$ tar\
  \ xvf /obkups/diag_dest.tar\n```\n\n\n\n### Oracle 数据库迁移至 Exadata：诊断目录与恢复方法\n\n\
  #### 诊断目录结构恢复\n此步骤将恢复迁移数据库的`diag`目录结构至 Exadata 系统。剩余工作是将已复制的`init.ora`或 spfile 中的`diagnostic_dest`、`background_dump_dest`、`core_dump_dest`和`user_dump_dest`值更改为新创建的路径。在此过程中，还必须创建本地归档日志目标，并且对该位置字符串的任何必要更改也必须在`init.ora`或\
  \ spfile 中完成。\n\n如果迁移的是 RAC 数据库，这些步骤必须在该数据库将运行实例的所有节点上执行。为了更好地说明，假设此 TEST 数据库是一个双节点\
  \ RAC 数据库。在数据库节点 1 和数据库节点 2 上，都必须归档`diag`目标。然后，节点 1 的`tar`归档文件将被复制到 Exadata 数据库节点\
  \ 1，节点 2 的`tar`归档文件将被复制到 Exadata 数据库节点 2。每个节点都需要运行恢复步骤，并且每个`init.ora`或 spfile 副本都必须修改以反映任何位置变更。\n\
  \n#### 恢复至 Exadata 的两种方式\n恢复数据库至 Exadata 可以通过两种方式完成：一是使用最近备份的备份片进行简单的还原与恢复会话；二是使用`duplicate\
  \ database`命令，这需要作为辅助实例连接到源数据库。我们假设，如果您能将备份片从源服务器复制到 Exadata，那么您也拥有一个有效的 SQL*Net\
  \ 连接到源数据库。我们将从一个基本的还原与恢复场景开始。\n\n##### 方法一：备份还原与恢复\n如前所述，第一步是确保备份片的可用性。假设它们已在 Exadata\
  \ 系统上可用。准备好`init.ora`或 spfile 后，有必要从当前备份中还原控制文件。记下控制文件备份片的名称，然后执行以下命令：\n\n```sql\n\
  RMAN> restore controlfile from '<backup piece name>';\n```\n\n您应看到以下输出：\n\n```\n\
  Starting restore at 27-JUL-13\n using channel ORA_DISK_1\n\nchannel ORA_DISK_1:\
  \ restoring control file\n channel ORA_DISK_1: restore complete, elapsed time: 00:00:02\n\
   Finished restore at 27-JUL-13\n```\n\n现在，您可以启动并装载数据库，为还原和恢复做准备。如果源数据库是 RAC 数据库，则需要在开始还原和恢复之前将`cluster_database`参数设置为`false`。这是因为数据库必须以独占模式装载才能成功还原。从这一步开始，就是一个标准的还原与恢复场景，假设`init.ora`或\
  \ spfile 中的所有配置参数都列出了 Exadata 系统上的正确位置，那么应该可以顺利完成。如果您在迁移前将`cluster_database`设置为`false`，那么在恢复完成后需要将其设置回`true`。\n\
  \n##### 方法二：从源库克隆\n您可以选择从源数据库克隆数据库。`init.ora`或 spfile 必须从源数据库复制，以便数据库可以在 Exadata\
  \ 系统上以`nomount`模式启动。同样，如果迁移的是 RAC 数据库，`cluster_database`参数必须在开始克隆前设置为`false`。\n\n\
  克隆过程使用 RMAN 的`duplicate database`命令。以下示例命令展示了如何将远程服务器上的 mytest 数据库复制到 Exadata 上名为\
  \ test 的数据库（两个数据库都使用 ASM）：\n\n```sql\nconnect target sys/<password>@mytest\nconnect\
  \ auxiliary /\nrun {\n  sql 'alter session set optimizer_mode=rule';\n  allocate\
  \ auxiliary channel c1 type disk ;\n  allocate auxiliary channel c2 type disk ;\n\
    allocate auxiliary channel c3 type disk ;\n  allocate auxiliary channel c4 type\
  \ disk ;\n  allocate auxiliary channel c5 type disk ;\n  allocate auxiliary channel\
  \ c6 type disk ;\n  duplicate target database to 'test'\n        db_file_name_convert=('+DATA','+DATA_MYEXA1')\n\
          logfile\n           GROUP 11 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n\
             GROUP 12 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n           GROUP\
  \ 13 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n           GROUP 14 ( '+DATA_MYEXA1','+RECO_MYEXA1'\
  \ ) SIZE 512M ;\n}\n```\n\n#### 监控与进度查看\n也可以编写一个 Shell 脚本来完成此操作，使其更容易从单个会话中运行和监控进度。Shell\
  \ 脚本示例如下：\n\n```bash\nexport NLS_DATE_FORMAT='Mon DD YYYY HH24:MI:SS'\nDATESTAMP=`date\
  \ '+%y%m%d%H%M'`\nMSGLOG=/home/oracle/clone/logs/dup_mytest_${DATESTAMP}.log\n\n\
  $ORACLE_HOME/bin/rman msglog $MSGLOG append << EOF\nconnect target sys/<password>@mytest\n\
  connect auxiliary /\nrun {\n  sql 'alter session set optimizer_mode=rule';\n  allocate\
  \ auxiliary channel c1 type disk ;\n  allocate auxiliary channel c2 type disk ;\n\
    allocate auxiliary channel c3 type disk ;\n  allocate auxiliary channel c4 type\
  \ disk ;\n  allocate auxiliary channel c5 type disk ;\n  allocate auxiliary channel\
  \ c6 type disk ;\n  duplicate target database to 'test'\n        db_file_name_convert=('+DATA','+DATA_MYEXA1')\n\
          logfile\n           GROUP 11 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n\
             GROUP 12 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n           GROUP\
  \ 13 ( '+DATA_MYEXA1','+RECO_MYEXA1' ) SIZE 512M,\n           GROUP 14 ( '+DATA_MYEXA1','+RECO_MYEXA1'\
  \ ) SIZE 512M ;\n}\nEOF\n```\n\n此脚本将在目标数据库已启动至`nomount`状态后运行，并以后台的“不挂断”模式运行。如果此脚本被命名为`clone_test_from_mytest.sh`并位于`/home/oracle/clone`目录中，那么运行它的命令如下：\n\
  \n```bash\n$ nohup $HOME/clone/clone_test_from_mytest.sh &\n```\n\n克隆过程现在将在后台运行，控制权将返回到\
  \ Shell 提示符，因此您可以通过生成的日志文件监控进度。可以通过以下命令完成：\n\n```bash\n$ cd $HOME/clone/logs\n$\
  \ ls -ltr *mytest*\n...\ndup_mytest_201307271343.log\n$ tail -f dup_mytest_201307271343.log\n\
  ```\n\n`tail -f`命令用于持续读取正在被写入的文件内容，以便您可以实时查看新条目。所说明的脚本也可用于刷新现有的目标数据库。如果使用 Oracle\
  \ 托管文件（在 Exadata 上即如此），则需要在开始克隆之前删除目标数据库的现有文件，因为复制过程不会覆盖数据文件。所有其他步骤将如本节前面所述执行。\n\
  \n#### 使用 RMAN 迁移的优势\n使用 RMAN 将数据库迁移至 Exadata 的一个很好的理由是，您可以在需要时更改数据文件的“字节序”。Exadata\
  \ 使用 Linux，一个小端操作系统，但您可能正从 AIX（一个大端系统）迁移。这将要求更改数据文件格式，而 RMAN 可以为您完成此任务。您将需要可用的外部存储来存放从源数据库转换出的数据文件，因为\
  \ Exadata 上没有足够的文件系统存储空间。此过程的第一步是查看支持哪些平台，`V$TRANSPORTABLE_PLATFORM`视图提供了此信息，如下所示：\n\
  \n```sql\nSQL> select platform_name, endian_format\n  2  from v$transportable_platform;\n\
  ```\n\n\n\n### 数据库跨平台迁移操作指南\n\n#### 支持平台与字节序格式\n\n下表列出了 `RMAN` 支持的数据文件传输平台及其字节序格式。\n\
  \n平台名称                                 字节序格式\n---------------------------------------------\
  \ --------------\nSolaris[tm] OE (32 位)                       大端\nSolaris[tm] OE\
  \ (64 位)                       大端\nMicrosoft Windows IA (32 位)                 小端\n\
  Linux IA (32 位)                             小端\nAIX-Based Systems (64 位)       \
  \             大端\nHP-UX (64 位)                                大端\nHP Tru64 UNIX\
  \                               小端\nHP-UX IA (64 位)                            \
  \ 大端\nLinux IA (64 位)                             小端\nHP Open VMS              \
  \                   小端\nMicrosoft Windows IA (64 位)                 小端\n\n平台名称 \
  \                                字节序格式\n---------------------------------------------\
  \ --------------\nIBM zSeries Based Linux                     大端\nLinux x86 64 位\
  \                              小端\nApple Mac OS                                大端\n\
  Microsoft Windows x86 64 位                  小端\nSolaris Operating System (x86) \
  \             小端\nIBM Power Based Linux                       大端\nHP IA Open VMS\
  \                              小端\nSolaris Operating System (x86-64)           小端\n\
  Apple Mac OS (x86-64)                       小端\n\n已选择 20 行。\n\nSQL>\n\n#### 检查无法传输的对象\n\
  \n`RMAN` 可以在列表中的任意平台之间传输数据文件，从 `AIX` 迁移到 `Linux` 是可行的。下一步是检查 `RMAN` 无法传输的数据库对象，例如目录、`BFILES`\
  \ 和外部表。以下 `PL/SQL` 块将显示这些对象：\n\n```sql\nSQL> set serveroutput on\nSQL> declare\n\
  \  2    x boolean;\n  3  begin\n  4    x := sys.dbms_tdb.check_external;\n  5  end;\n\
  \  6  /\nThe following directories exist in the database:\nSYS.ADMIN_BAD_DIR, SYS.ADMIN_LOG_DIR,\
  \ SYS.ADMIN_DAT_DIR, SYS.XMLDIR, SYS.DATA_PUMP_DIR, SYS.ORACLE_OCM_CONFIG_DIR\n\n\
  PL/SQL procedure successfully completed.\n\nSQL>\n```\n\n注意，此 `PL/SQL` 报告了六个目录，这些目录在数据库迁移到\
  \ `Exadata` 后必须重新创建。这些目录在迁移到 `Exadata` 后很可能有新的位置，因此不仅数据库中的目录位置需要更改，目录本身也必须在 `Exadata`\
  \ 系统上创建。一个简单的查询可以生成必要的 `CREATE DIRECTORY` 语句，如下所示：\n\n```sql\nSQL> column cr_dir\
  \ format a132\nSQL>\nSQL> select 'create or replace directory '||directory_name||'\
  \ as '''||directory_path||''';' cr_dir\n  2  from dba_directories;\n\nCR_DIR\n\n\
  create or replace directory ADMIN_LOG_DIR as '/u01/oracle/directories/log';\ncreate\
  \ or replace directory ADMIN_BAD_DIR as '/u01/oracle/directories/bad';\ncreate or\
  \ replace directory XMLDIR as '/u01/oracle/directories/rdbms/xml';\ncreate or replace\
  \ directory ADMIN_DAT_DIR as '/u01/oracle/directories/dat';\ncreate or replace directory\
  \ DATA_PUMP_DIR as '/u01/oracle/admin/mydb/dpdump/';\ncreate or replace directory\
  \ ORACLE_OCM_CONFIG_DIR as '/u01/oracle/directories/ccr/state';\n\n已选择 6 行。\n\n\
  SQL>\n```\n\n将此输出假脱机到一个文件，并编辑目标文本以指向 `Exadata` 上新创建的位置。然后，在迁移后的数据库中运行生成的脚本来重新创建这些目录就是一项简单的任务。\n\
  \n#### 转换数据库文件\n\n你必须在可用的外部存储上为转换后的数据库文件创建一个目标位置。在本例中，我们将使用 `/obkups/db_convert`\
  \ 作为这些文件的目标目录。获取源数据库的当前备份，然后关闭源数据库并以只读模式启动。将 `RMAN` 连接到目标数据库并执行 `CONVERT DATABASE`\
  \ 命令，如下所示：\n\n```\nCONVERT DATABASE NEW DATABASE 'mydb'\n          TRANSPORT SCRIPT\
  \ '/obkups/db_convert/migratedb.sql'\n          TO PLATFORM 'Linux IA (64-bit)'\n\
  \          DB_FILE_NAME_CONVERT = ('/home/oracle/dbs','/obkups/db_convert');\n```\n\
  \n`RMAN` 将转换数据库文件并将其放置在 `/obkups/db_convert` 目录中，同时生成一个 `pfile` 副本和迁移脚本。如果外部存储并非两台服务器共享，则必须将这些文件传输到\
  \ `Exadata` 系统。一旦所有生成的文件传输完毕，你将需要编辑迁移脚本以启用受限会话。一个包含编辑内容的示例迁移脚本如下：\n\n```\n-- 以下命令将创建一个控制文件并用它\n\
  -- 来打开数据库。\n-- 恢复管理器使用的数据将丢失。\n-- 联机日志的内容将丢失，所有备份将\n-- 失效。仅当联机日志损坏时使用此脚本。\n\n--\
  \ 挂载创建的控制文件后，以下 SQL\n-- 语句将数据库置于适当的\n-- 保护模式：\n--  ALTER DATABASE SET STANDBY DATABASE\
  \ TO MAXIMIZE PERFORMANCE\n\nSTARTUP NOMOUNT PFILE='init_00bz4glk_1_0.ora'\nCREATE\
  \ CONTROLFILE REUSE SET DATABASE \"MYDB\" RESETLOGS  NOARCHIVELOG\n    MAXLOGFILES\
  \ 32\n    MAXLOGMEMBERS 2\n    MAXDATAFILES 32\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
  \ 226\nLOGFILE\n  GROUP 1 '/obkups/db_convert/archlog1'  SIZE 25M,\n  GROUP 2 '/obkups/db_convert/archlog2'\
  \  SIZE 25M\nDATAFILE\n  '/obkups/db_convert/system01.dbf',\n  '/obkups/db_convert/sysaux01.dbf',\n\
  \  '/obkups/db_convert/mydatatbs01.dbf',\n  '/obkups/db_convert/mydatatbs02.dbf',\n\
  \  '/obkups/db_convert/mydatatbs03.dbf'\nCHARACTER SET AL32UTF8\n;\n\n-- 添加了 ALTER\
  \ SYSTEM 语句以启用受限会话。\n\nALTER SYSTEM ENABLE RESTRICTED SESSION;\n\n-- 现在可以通过清零联机日志来打开数据库。\n\
  ALTER DATABASE OPEN RESETLOGS;\n\n-- 未找到要添加的临时文件条目。\n--\n\nset echo off\nprompt\
  \ ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\nprompt *\
  \ 你的数据库已成功创建！\nprompt * 对于新数据库有许多需要考虑的事项。以下\nprompt * 是一份检查清单，帮助你保持正轨：\nprompt *\
  \ 1. 你可能需要重新定义目录对象的位置。\nprompt * 2. 你可能需要更改此数据库的内部数据库标识符 (DBID)\nprompt *    或全局数据库名称。请使用\n\
  prompt *    NEWDBID 实用程序 (nid)。\nprompt ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n\
  \nSHUTDOWN IMMEDIATE\n-- UPGRADE 选项设置受限会话\nSTARTUP UPGRADE PFILE='init_00bz4glk_1_0.ora'\n\
  @@ ?/rdbms/admin/utlirp.sql\nSHUTDOWN IMMEDIATE\n-- 注意：下面的启动命令生成时没有 RESTRICT 子句。\n\
  -- 添加 RESTRICT 子句。\nSTARTUP RESTRICT PFILE='init_00bz4glk_1_0.ora'\n-- 以下步骤将重新编译所有\
  \ PL/SQL 模块。\n-- 可能需要几个小时才能完成。\n@@ ?/rdbms/admin/utlrp.sql\nset feedback 6;\n```\n\
  \n#### 将数据文件移动到 ASM 磁盘组\n\n此时数据库应使用文件系统创建，而非 `ASM`，因此现在需要将数据文件移动到正确的 `ASM` 磁盘组中。复制由前述\
  \ `RMAN CONVERT` 过程生成的 `pfile`。使用 `RMAN`，你将需要进行另一次备份，这次使用类似于以下示例的脚本：\n\n```\nRUN\n\
  {\n  ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev2 DEVICE TYPE\
  \ DISK;\n  ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev4 DEVICE\
  \ TYPE DISK;\n  BACKUP AS COPY\n    INCREMENTAL LEVEL 0\n    DATABASE\n    FORMAT\
  \ '+DATA_MYEXA1'\n    TAG 'ASM_DB_MIG';\n}\n```\n\n这将把文件系统的数据库文件放入 `+DATA_MYEXA1`\
  \ 磁盘组。通过 `RMAN` 归档当前日志，如下所示：\n\n```sql\nSQL \"ALTER SYSTEM ARCHIVE LOG CURRENT\"\
  ;\n```\n\n你正在使用 `pfile`，因此有必要在 `ASM` 磁盘组中创建一个 `spfile`。使用以下示例创建新的 `spfile`：\n\n\
  ```\nCREATE SPFILE='+DATA_MYEXA1/spfile<sid>.ora'\nFROM PFILE='/obkups/db_convert/'init_00bz4glk_1_0.ora';\n\
  ```\n\n现在可以干净地关闭数据库了。在 `$ORACLE_HOME/dbs` 目录中创建一个新的 `init<sid>.ora` 文件，内容如下：\n\n\
  ```\nSPFILE='+DATA_MYEXA1/spfile<sid>.ora'\n```\n\n\n\n您需要将以下示例中列出的 `spfile` 参数设置为\
  \ ASM 位置，如下所示：\n\n```\nSTARTUP FORCE NOMOUNT;\nALTER SYSTEM SET DB_CREATE_FILE_DEST='+DATA_MYEXA1'\
  \ SID='*';\nALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE=100G SID='*';\nALTER SYSTEM\
  \ SET DB_RECOVERY_FILE_DEST='+RECO_MYEXA1' SID='*';\nALTER SYSTEM SET CONTROL_FILES='+DATA_MYEXA1','+RECO_MYEXA1'\
  \ SCOPE=SPFILE SID='*';\n```\n\n现在您可以切换到 RMAN，将控制文件迁移到 ASM 中（如下所示），并挂载数据库。\n\n```\n\
  RMAN> STARTUP FORCE NOMOUNT;\nRMAN> RESTORE CONTROLFILE FROM '<original control\
  \ file name and path>';\nRMAN> ALTER DATABASE MOUNT;\n```\n\n使用 RMAN，切换到已迁移的数据文件（如下所示），并恢复数据库。\n\
  \n```\nSWITCH DATABASE TO COPY;\nRUN\n{\n  ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;\n\
  \  ALLOCATE CHANNEL dev2 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev3 DEVICE TYPE\
  \ DISK;\n  ALLOCATE CHANNEL dev4 DEVICE TYPE DISK;\n  RECOVER DATABASE;\n}\n```\n\
  \n数据库恢复完成后，您可以退出 RMAN，使用 `SQL*Plus` 连接，并打开数据库。此时，您的数据库应已成功迁移到 Exadata 和 ASM。接下来的步骤是删除旧的临时文件并在\
  \ ASM 中重新创建它们，如下所示：\n\n```\nSQL> ALTER DATABASE TEMPFILE '<existing tempfile name>'\
  \ DROP;\nSQL> ALTER TABLESPACE temp_tbs_name ADD TEMPFILE;\n```\n\n您必须逐个删除每个临时文件。如果您愿意，可以编写脚本来自动生成用于删除所有临时文件的\
  \ `ALTER DATABASE` 语句。新的临时文件将是 Oracle 托管文件，这使得 `ADD TEMPFILE` 语句成为一条您可以根据需要执行任意多次的单一命令，以提供所需的临时空间。最后，您必须将重做日志组迁移到\
  \ ASM 并删除旧的重做日志组。完成后，干净地关闭并重新启动数据库，以确保存储或 ASM 没有问题。\n\nExadata 在设计时就考虑了 RAC。此时，您迁移的数据库（无论是通过直接从备份克隆还是从不同平台迁移而来）是一个单实例数据库。可以通过以下步骤将其转换为\
  \ RAC。要开始此过程，需要对 `spfile` 进行一些更改。必须设置 `cluster_database`、`cluster_database_instances`\
  \ 和 `instance_number` 参数，如下所示：\n\n```\nALTER SYSTEM SET CLUSTER_DATABASE='TRUE'\
  \ SID='*' SCOPE=SPFILE;\nALTER SYSTEM SET CLUSTER_DATABASE_INSTANCES=<number of\
  \ instances> SID='*' SCOPE=SPFILE;\n```\n\n以下语句需要针对集群中的每个实例进行编辑和运行：\n\n```\nALTER\
  \ SYSTEM SET INSTANCE_NUMBER=<instance number> SID='<instance_name>' SCOPE=SPFILE;\n\
  ```\n\n干净地关闭本地实例。在所有将运行此数据库实例的节点上，您必须放置一份您刚刚创建的 `init.ora` 文件副本，并修改文件名以反映本地实例的 `SID`。下一步是使用\
  \ `srvctl` 实用程序向集群服务注册数据库。`db_unique_name`、Oracle 主目录、实例名称和 `spfile` 是必需的参数。以下示例演示了为数据库节点\
  \ `myexa1db01` 添加数据库 `mydb` 和实例 `mydb1`：\n\n```\nsrvctl add database -d mydb -i\
  \ mydb1 -o /u01/oracle/product/11.2.0/dbhome_1 -p /u01/oracle/product/11.2.0/dbhome_1/dbs/initmydb1.ora\n\
  ```\n\n对于集群中将运行此数据库实例的每个节点，都需要重复上述步骤，并相应地更改实例名称和 `pfile` 文件名。接下来，需要启用数据库，如下所示：\n\
  \n```\nsrvctl enable database -d mydb\n```\n\n现在，您应该能够使用 `srvctl` 启动集群数据库，如下所示：\n\
  \n```\nsrvctl start database -d mydb\n```\n\n数据库应成功在所有节点上启动。您现在已将数据库迁移到 Exadata\
  \ 并将其转换为 RAC。通过使用 `lsnrctl status` 命令，确保监听器和 SCAN 监听器已注册这个新数据库，该命令可以报告常规 `TNS` 监听器和本地\
  \ `SCAN` 地址的可用状态和服务。以下示例展示了如何返回在双节点 `RAC` 集群数据库上注册到 `SCAN` 监听器地址 `LISTENER_SCAN2`\
  \ 的数据库服务。\n\n```\n$ lsnrctl status listener_scan2\n\nLSNRCTL for Linux: Version\
  \ 11.2.0.3.0 - Production on 04-OCT-2013 14:58:55\n\nCopyright (c) 1991, 2011, Oracle.\
  \  All rights reserved.\n\nConnecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=LISTENER_SCAN2)))\n\
  STATUS of the LISTENER\n\nAlias                     LISTENER_SCAN2\nVersion    \
  \               TNSLSNR for Linux: Version 11.2.0.3.0 - Production\nStart Date \
  \               03-OCT-2013 15:25:02\nUptime                    0 days 23 hr. 33\
  \ min. 53 sec\nTrace Level               off\nSecurity                  ON: Local\
  \ OS Authentication\nSNMP                      OFF\nListener Parameter File   /u01/11.2.0/grid/network/admin/listener.ora\n\
  Listener Log File         /u01/11.2.0/grid/log/diag/tnslsnr/myexa1db01/listener_scan2/alert/log.xml\n\
  Listening Endpoints Summary...\n  (DESCRIPTION=(ADDRESS=(PROTOCOL=ipc)(KEY=LISTENER_SCAN2)))\n\
  \  (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=XXX.XXX.XXX.XXX)(PORT=1523)))\nServices\
  \ Summary...\nService \"dbm\" has 2 instance(s).\n  Instance \"dbm1\", status READY,\
  \ has 2 handler(s) for this service...\n  Instance \"dbm2\", status READY, has 1\
  \ handler(s) for this service...\nService \"mydb\" has 2 instance(s).\n  Instance\
  \ \"mydb1\", status READY, has 1 handler(s) for this service...\n  Instance \"mydb2\"\
  , status READY, has 1 handler(s) for this service...\nThe command completed successfully\n\
  $\n```\n\n`mydb` 集群数据库已成功注册到 `SCAN` 监听器，并且可以远程访问。\n\n**传输表空间**\n\n可传输表空间对于迁移特定模式或数据子集的数据非常有用，甚至可以跨不同的操作系统平台。但是，要跨平台迁移，还必须使用\
  \ RMAN 将数据文件转换为正确的字节序格式。\n\n可传输表空间的过程并不复杂，但在移动之前确实涉及几项检查。第一项检查确定目标表空间中的对象是否是自包含的，意思是说在其他未被考虑为目标表空间中不存在依赖关系。Oracle\
  \ 提供了一个打包过程 `DBMS_TTS.TRANSPORT_SET_CHECK` 来报告此信息。例如，`RETAIL_1` 和 `RETAIL_2` 表空间需要迁移到\
  \ Exadata。要确定此表空间集是否存在任何其他依赖关系，您需要执行以下语句：\n\n```\nEXECUTE DBMS_TTS.TRANSPORT_SET_CHECK('retail_1,retail_2',\
  \ TRUE);\n```\n\n查询 `TRANSPORT_SET_VIOLATIONS` 视图将报告此表空间集的任何问题。\n\n```\nSQL> SELECT\
  \ * FROM TRANSPORT_SET_VIOLATIONS;\n\nVIOLATIONS\n\nConstraint SALES_FK between\
  \ table STORES.SALES in tablespace RETAIL_1 and table\nSTORES.UNIT in tablespace\
  \ UNITLOC\nPartitioned table STORES.MON_SALES is partialy contained in the transportable\
  \ set\n```\n\n输出报告指出 `UNITLOC` 表空间也必须包含在表空间集中，并且需要进行一些调查以找到包含 `STORES.MON_SALES`\
  \ 表分区的所有表空间。第二次尝试，在传输集中包含了 `UNITLOC` 以及 `SALESPART_1`、`SALESPART_2` 和 `SALESPART_3`\
  \ 表空间，成功了，如下例所示：\n\n```\nEXEC DBMS_TTS.TRANSPORT_SET_CHECK('retail_1,retail_2,unitloc,salespart_1,salespart_2,salespart_3',\
  \ TRUE);\n\nPL/SQL procedure successfully completed.\n\nSQL> SELECT * FROM TRANSPORT_SET_VIOLATIONS;\n\
  \nno rows selected\n```\n\n\n### 数据库迁移至 Exadata 的步骤与注意事项\n\n#### 可传输表空间设置与导出\n\n\
  现在您拥有一个完整的可传输表空间集，确保所有数据和约束都将被传输到目标数据库。下一步是确保无法再针对源数据执行事务，方法是通过以下语句将所需的表空间设置为只读：\n\
  \n```\nalter tablespace retail_1 read only;\nalter tablespace retail_2 read only;\n\
  alter tablespace unitloc read only;\nalter tablespace salespart_1 read only;\nalter\
  \ tablespace salespart_2 read only;\nalter tablespace salespart_3 read only;\n```\n\
  \n现在可以导出表空间元数据以备导入目标数据库。在源系统上使用`expdp`生成此元数据导出，并使用`TRANSPORT_TABLESPACES`选项，如下所示：\n\
  \n```\nexpdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir\ntransport_tablespaces\
  \ = retail_1,retail_2,unitloc,salespart_1,salespart_2,salespart_3\ntransport_full_check=y\n\
  ```\n\n使用`TRANSPORT_FULL_CHECK=Y`选项会验证您之前进行的表空间检查。如果可传输表空间检查因任何原因失败，导出将终止并不成功。尽管如果您没有从`DBMS_TTS.TRANSPORT_SET_CHECK`过程获得任何输出，这不应该发生，但这是在传输表空间时执行的非常好的二次检查，以确保表空间迁移到\
  \ Exadata 后不会出现问题。对于本示例，`TSTRANS_DIR`位置指向`/obkups/tablespaces`，该目录将用作文件传输到 Exadata\
  \ 的源目录。\n\n#### 复制表空间文件到 Exadata\n\n如果源系统和目标系统具有相同的字节顺序（endian-ness），那么就可以将表空间文件和元数据导出文件复制到\
  \ Exadata 了。如果源表空间使用 ASM，则必须将它们从 ASM 复制到文件系统以便传输。这与我们之前提供的将数据迁入 ASM 的步骤相反。示例如下：\n\
  \n```\nRUN\n{\n  ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev2\
  \ DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL\
  \ dev4 DEVICE TYPE DISK;\n  BACKUP AS COPY\n    INCREMENTAL LEVEL 0\n    DATAFILE\
  \ file1,file2,...\n    FORMAT '/obkups/tablespaces/'\n    TAG 'FS_TBLSPC_MIG';\n\
  }\n```\n\n您需要生成所需数据文件的列表，以便修改提供的示例来复制所需的数据文件。执行修改后的语句以将 ASM 数据文件复制到所需目录。在本示例中，用于传输的目录是`/obkups/tablespaces`。现在，您应该拥有将表空间传输到\
  \ Exadata 所需的所有文件。使用`scp`将`/obkups/tablespaces`的内容复制到连接到 Exadata 系统的外部位置。使用与您将数据文件移出\
  \ ASM 时相同的基本命令，将传输过来的数据文件复制到 ASM 中，但将目标更改为您想要的 Exadata ASM 磁盘组。您需要一份刚刚复制到 ASM 的数据文件的当前列表，以便元数据导入能够成功完成。获得该列表后，修改以下示例，并使用`impdp`导入元数据：\n\
  \n```\nimpdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir\nTRANSPORT_DATAFILES=\n\
  \   +DATA_MYEXA1/file1,\n   +DATA_MYEXA1/file2,\n...\n```\n\n期望的情况是，您已在目标数据库中创建了源数据库的必要用户账户，包括所有必要的权限。`impdp`实用程序不会创建这些账户，因此在执行导入之前它们必须存在。导入成功完成后，您需要将表空间设置回读/写模式，如下所示：\n\
  \n```\nalter tablespace retail_1 read write;\nalter tablespace retail_2 read write;\n\
  alter tablespace unitloc read write;\nalter tablespace salespart_1 read write;\n\
  alter tablespace salespart_2 read write;\nalter tablespace salespart_3 read write;\n\
  ```\n\n### 使用物理备数据库进行迁移\n\n物理备数据库是一个很好的迁移策略选择，如果数据库需要在应用程序迁移日期之前迁移到新系统。使用备数据库可以在旧生产系统和新生产系统之间保持数据同步，并允许在最终迁移之前进行连接测试。创建备数据库的过程基本上与本章前面提供的使用\
  \ RMAN 的过程相同。需要额外的步骤来配置辅助归档日志目的地、备用重做日志和重做传输。这些步骤在此不作讨论，因为它们在[Oracle 在线文档](https://docs.oracle.com)中可用。\n\
  \n使用 Oracle 11.2.0.3，可以通过执行切换（switchover）来测试新数据库而不影响备数据库配置。这暂时允许备数据库承担主数据库的角色，提供了一个测试配置并在最终迁移发生前对环境进行必要调整的机会。这还允许您切换回主数据库而无需重建数据库。\n\
  \n在切换日期，将需要故障转移（failover）到备用位置，将备用数据库转换为主数据库。这将是一个“单向”移动，因为源数据库将不再使用，并且不需要重建。\n\n\
  ## 迁移后任务\n\n包、过程和视图可能因迁移而失效，因此需要重新编译这些对象并纠正可能出现的任何问题。最好在迁移之前生成源数据库中无效对象的列表。这将使您更容易知道何时成功从源数据库还原了所有有效的已迁移对象。以下脚本将生成该列表：\n\
  \n```\nselect owner, object_name, object_type, status\nfrom dba_objects\nwhere status\
  \ <> 'VALID';\n```\n\n将输出假脱机到文件以供稍后参考，并将该文件传输到 Exadata。在迁移后的数据库上再次运行相同的查询，并执行`$ORACLE_HOME/rdbms/admin/utlrp.sql`以重新编译数据库对象，纠正任何问题，直到最终的`INVALID`对象列表与从源数据库生成的列表匹配。\n\
  \n如果您使用物理备数据库将数据库迁移到 Exadata，则必须删除为建立备数据库所必需的`spfile`参数，并可能调整控制文件位置以引用多个副本。（通常，备数据库使用单个备用控制文件。）将现有控制文件复制到这些附加位置。\n\
  \n已弃用的`init.ora`参数也可能是个问题，因为源数据库可能是 11.2.0.3 之前的版本（Exadata 上的当前版本）。警报日志是查找此类参数的好地方，以便可以相应地处理它们。\n\
  \n尽管`BFILE`列将被复制，但它们指向的源文件不会被复制。这些文件将必须复制到 Exadata 系统，并且一旦数据库可以访问它们，`BFILE`定位器将必须根据新位置重新分配。\n\
  \n您可能会发现可能需要其他管理任务，例如调整 extent 大小、对大表进行分区或压缩表（例如存档表或存档分区）。这些任务也是迁移后列表的一部分。调整 extent\
  \ 大小和创建分区可能需要相当长的时间，特别是对于大型数据库。在规划数据库迁移到 Exadata 时，请考虑此类任务，以便最终用户能够意识到在实际物理迁移之后，数据库可用之前可能仍存在一些任务。\n\
  \n## 逻辑迁移选项\n\n逻辑迁移也是迁移至 Exadata 的一种选择。此类迁移将涉及导出和导入、复制或数据库链接。以下部分将介绍这些选项。\n\n###\
  \ 导出和导入\n\n\n### Oracle 数据库迁移至 Exadata：逻辑迁移方法\n\n#### 导出与导入工具的选择\n\n可用的导出和导入工具取决于您迁移的\
  \ Oracle 版本。对于 10.1 之前的版本，可以使用传统的导出和导入实用程序（`exp` 和 `imp`）。这些工具在所有当前的 Oracle 版本中都提供，以保持向后兼容性。对于\
  \ 10.1 及之后的版本，应使用较新的数据泵实用程序（`expdp` 和 `impdp`）。\n\n采用导出-导入策略需要在 Exadata 系统上创建一个空数据库。这可以通过数据库配置助手（`DBCA`）来完成，该工具可以创建单实例和集群数据库。我们建议创建一个新的集群数据库，因为\
  \ Exadata 是为`RAC`构建的。我们不会详细介绍如何使用`DBCA`创建数据库，因为过程很直接，且图形用户界面（`GUI`）很直观。\n\n当使用 `exp`\
  \ 和 `imp` 工具迁移较旧的数据库时，必须在导入任何表和数据之前，在新的 Exadata 数据库中创建用户账户。如果您能使用 `expdp` 和 `impdp`\
  \ 工具，则不需要此步骤，因为导出用户时会导出创建该用户的命令，这些命令将在导入过程中执行。\n\n旧版导出-导入工具的兼容性矩阵如 表 12-1 所示。\n\n\
  **表 12-1。`exp` 和 `imp` 工具的兼容性矩阵**\n\n| 目标版本 | 源版本 |\n| --- | --- |\n|  | &#124;  7\
  \ &#124; 8i &#124; 9i &#124; 10g &#124; 11g |\n| 7 | &#124;yes &#124; no &#124;\
  \ no &#124; no  &#124; no |\n| 8i | &#124;yes &#124;yes &#124; no &#124; no  &#124;\
  \ no |\n| 9i | &#124;yes &#124;yes &#124;yes &#124; no  &#124; no |\n| 10g | &#124;yes\
  \ &#124;yes &#124;yes &#124; yes &#124; no |\n| 11g | &#124;yes &#124;yes &#124;yes\
  \ &#124; yes &#124; yes |\n\n正如预期的那样，旧版本不具备向前兼容性，因此无法将 8i 数据库的导出文件导入到使用版本 7 的数据库中。但是，您始终可以使用最旧版本的\
  \ `exp` 和 `imp` 工具，后续版本将能够读取和处理生成的转储文件。\n\n表 12-2 列出了 `expdp` 和 `impdp` 工具的兼容性矩阵。\n\
  \n**表 12-2。`expdp` 和 `impdp` 工具的兼容性矩阵**\n\n![image](img/Table12-2.jpg)\n\n在规划使用导出和导入工具进行逻辑迁移时，请参考这些矩阵，以避免导出和导入过程中出现问题。\n\
  \n#### 导出策略与注意事项\n\n如果您使用导出-导入策略，很可能只传输数据库数据和表的一个子集。建议按模式或用户导出，而不是按表名导出，因为导出特定用户会捕获该账户拥有的所有内部对象。正如本章前面讨论的，可能需要重新创建目录并将`BFILES`传输到\
  \ Exadata 系统，因为这些对象不会在导入时创建。对于目录，创建目录的`DDL`语句*会被捕获*。但该`DDL`中引用的位置在 Exadata 上将不存在，这些位置必须在导入完成后创建。如果您无法在\
  \ Exadata 上创建与源服务器相同的位置，则必须创建新位置，然后重新创建这些目录以指向新目录。\n\n对于给定的用户账户，可能存在跨模式依赖关系。如果是这种情况，某些对象（如视图和完整性约束）将无法编译并变为无效。`DBA_DEPENDENCIES`视图对于查找此类依赖关系非常有用，这样您就可以导出必要的用户，以保持迁移后模式中对象的有效性。可以通过以下查询生成被给定用户引用的对象的所有者列表：\n\
  \n```sql\nselect distinct referenced_owner\nfrom dba_dependencies\nwhere owner =\
  \ '<user account>'\nand referenced_owner <> '<user account>';\n```\n\n如果您更希望获得对象列表以减小导出文件的大小，可以使用以下查询：\n\
  \n```sql\nselect referenced_owner, referenced_name, referenced_type\nfrom dba_dependencies\n\
  where owner = '<user account>'\nand referenced_owner <> '<user account>';\n```\n\
  \n这将生成对象名称、对象类型和所有者的列表，因此只有这些对象会包含在导出文件中。请记住，如果您只导出选定的对象列表，则必须在原始用户导出之后执行额外的导出操作，以将应用程序表和数据传输到\
  \ Exadata。以下示例针对 11.2.0.3 数据库说明了这一概念：\n\n```bash\n#\n##### 导出应用程序用户\n#\nexpdp directory=dbmig_dir\
  \ schemas=$1 dumpfile=\"$1\"_mig.dmp logfile=\"$1\"_mig.log\n\n#\n##### 导出不被应用程序用户拥有的依赖对象\n\
  #\nexpdp directory=dbmig.dir dumpfile=\"$1\"_\"$2\".dmp logfile=\"$1\"_\"$2\".log\
  \ tables=\"$3\"\n```\n\n此示例接受三个参数：两个用户名和一个逗号分隔的表列表，并假定该表列表相当短。例如，如果只需要排除少量表，命令可以这样编写：\n\
  \n```bash\nexpdp directory=dbmig.dir schemas=$2 dumpfile=\"$1\"_\"$2\".dmp logfile=\"\
  $1\"_\"$2\".log exclude=\"$3\"\n```\n\n现在，表列表是一个排除列表，参数 2 中指定用户的所有表都将被导出，除了提供的列表中的表。转储文件应按相反顺序导入，即先导入依赖表所属的用户，再导入应用程序用户。这将允许导入过程为应用程序用户创建并验证约束和视图，而不会出错。\n\
  \n### 复制\n\n复制是将数据库逻辑迁移到 Exadata 的另一种方法，我们推荐使用`Streams`或`Golden Gate`进行此类迁移。由于`Golden\
  \ Gate`内置了所有`Streams`功能，它是更健壮的工具。我们不会详细介绍`Golden Gate`迁移场景，但会提及这种迁移类型需要注意的几个方面。\n\
  \n`Golden Gate`和`Streams`都对可复制到目标服务器的数据类型施加了限制。以下类型将不会被复制：\n\n```text\nBFILE\nROWID\n\
  用户定义的类型（包括对象类型、REF、varrays 和嵌套表）\n以关系形式或二进制 XML 存储的 XMLType\n以下 Oracle 提供的类型：Any\
  \ 类型、URI 类型、空间类型和媒体类型\n```\n\n如果您的数据包含此类类型，使用物理迁移方法可能更好，这样无论何种数据类型都能被复制。如前所述，`BFILE`定位器引用的文件不会被复制，在源文件复制完成后，必须修改这些定位器。\n\
  \n在 Exadata 系统上也必须重新创建目录。如果目录引用的位置发生变化，则必须替换目录条目。这在介绍物理迁移方法时已经提到，但我们认为它非常重要，值得在此重复强调。\n\
  \n### 使用数据库链接\n\n数据库链接可以在两个数据库之间传输数据，如果网络带宽充足，这种方式相当高效。您无法获得物理迁移的速度（数据库恢复可以相对快速地运行），但您不需要外部存储来存放传输的文件。\n\
  \n我们建议使用以下两种方法之一通过数据库链接传输数据：\n\n```sql\nINSERT\nCOPY\n```\n\n\n\n## 引言\n\n由于通过 `CREATE\
  \ TABLE ... AS SELECT ...` 语句无法在远程数据库上执行 DDL 操作，因此在数据迁移之前，目标表必须在 Exadata 数据库中预先创建。此外，无法通过数据库链接访问\
  \ LOB 数据。包含 LOB 列的表不适合通过 `COPY` 命令迁移，可能更适合通过物理方法进行迁移。\n\n迁移完成后，需要执行“迁移后事项”部分以解决因数据缺失（如\
  \ BFILES 和目录）导致的任何问题。\n\n## 需知事项\n\n可以使用物理和逻辑方法将数据库迁移到 Exadata。具体使用哪种方法取决于外部存储的可用性以及必须迁移的数据类型。\n\
  \n包含 LOB 数据或 BFILE 的数据库最好使用物理方法迁移，因为 Golden Gate 和 Streams 等逻辑方法对其可以复制的数据类型有限制。此外，物理方法提供了从大端平台（如\
  \ AIX 或 Solaris）迁移到 Linux（一个小端平台）的可能性。\n\n大端平台在字符串中先写入最高有效字节，而小端平台先写入最低有效字节。例如，单词\
  \ `word` 的十六进制字符将以 `w` 作为第一个字节写入。小端平台会以相反的顺序存储该单词，将 `d` 放在首字节位置。\n\n描述了三种物理方法：RMAN\
  \ 备份、可传输表空间和物理备用数据库。每种方法都有其优点，选择特定方法的决定应基于迁移时间表和需要迁移的数据量。\n\nRMAN 备份会将整个数据库迁移到 Exadata。RMAN\
  \ 还可用于通过将源数据文件转换为与 Linux 兼容的 endian 格式，来促进从不同平台的迁移。\n\n可传输表空间可用于迁移源数据库的数据子集。必须在\
  \ Exadata 系统上存在一个空数据库。如果表空间来自大端系统，则还需要使用 RMAN 将数据文件转换为小端格式。\n\n物理备用数据库使得在应用程序迁移之前就可以迁移数据库。使用备用数据库可在应用程序迁移进行期间，使目标数据库与源数据库保持同步。最终切换时，必须执行故障切换以将备用数据库转换为主数据库。\n\
  \n也可以使用逻辑方法，包括使用导出和导入、通过 Streams 或 Golden Gate 进行复制以及数据库链接。所有逻辑方法都对无法迁移的数据类型有限制，如果被迁移的数据库使用了无法复制的数据类型，建议采用其中一种物理方法。\n\
  \n导出和导入依赖于源数据库的版本。必须使用最低 Oracle 版本的导出实用程序才能成功执行逻辑迁移。\n\n使用 Golden Gate 或 Streams\
  \ 进行复制不会复制 BFILE、用户定义类型或 `rowid` 列等。在选择方法之前，您应该了解被迁移数据库中使用的数据类型。\n\n可以使用数据库链接。`COPY`\
  \ 命令是此类迁移的首选实用程序，但 LOB 无法通过数据库链接传输。选择最终迁移策略前，请仔细考虑源数据。\n\n无论选择何种方法，诸如 BFILE 和目录之类的对象都必须在初始迁移完成后进行处理。源\
  \ BFILE 定位符引用的文件必须复制到 Exadata，并且必须使用新的文件位置重新创建 BFILE 定位符。必须在操作系统级别创建目录，并且必须使用新的目录位置替换\
  \ Oracle 中的目录对象。\n\n迁移可能导致对象失效，因此在检查目标数据库中因迁移而失效的对象时，最好生成源数据库中失效对象的列表作为参考。迁移后应运行\
  \ `$ORACLE_HOME/rdbms/admin/utlrp.sql` 脚本以编译失效的对象。\n\n---\n\n"
