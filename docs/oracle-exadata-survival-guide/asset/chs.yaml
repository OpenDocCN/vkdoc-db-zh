  EMP\n              \".\"DEPTNO\"[NUMBER,22], \"SAL\"[NUMBER,22], \"COMM\"[NUMBER,22]\n\
  ```\n\n\n## Exadata 存储索引\n\n存储索引是动态为给定表创建的，以 1MB 分段的形式存储在内存中，并基于卸载的谓词构建。每个分段最多可索引\
  \ 8 列，每个分段记录列名、该分段的最小值、最大值以及该 1MB“块”中是否存在任何`NULL`值。\n\n列的索引遵循先到先得的原则；例如，Exadata\
  \ 不会索引表中的前八列，而是根据它们在查询谓词中出现的顺序进行索引。对于同一个表，其每个 1MB 分段所索引的列也可能不同。更常见（尽管不保证）的情况是，许多已索引的分段包含相同的列列表。\n\
  \n这些索引也可以从多组查询谓词中构建。如果一个查询的`WHERE`子句中有四列，并且被查询的表尚不存在存储索引，那么这四列将创建索引。如果另一个查询将同一个表的另外五列卸载到存储单元，则前四列将补全所访问表分段的存储索引。第二个查询也可能比前一个查询访问更多的表分段；如果这些额外的分段中没有索引，则所有五列都将被索引。这个过程可以持续进行，直到所有\
  \ 1MB 的表分段都关联了一个存储索引，每个索引最多包含八列。这些索引将驻留在内存中，直到`CELLSRV`重启或存储单元本身重新启动。重新启动或重启会清除它们，整个过程重新开始，随着存储单元接收到卸载的谓词信息而动态构建存储索引。\n\
  \n这也是为什么在运行大量即席查询的系统中，在`CELLSRV`重启后创建的存储索引可能与存储单元关闭前使用的索引不完全相同的一个原因。此类存储索引的重建可能导致轻微的性能变化，这应是预期行为。运行预打包应用程序（如\
  \ ERP 系统）的 Exadata 系统更有可能重新创建与存储层重启前相同的存储索引，因为绝大多数卸载到存储单元的查询都卸载相同的谓词，且顺序相同，无论它们何时执行（这是“罐装”查询的优点）。这并不意味着预打包应用程序在存储单元重启后总会创建相同的存储索引，只是这种可能性要大得多。\n\
  \n存储索引看起来不像你以前遇到过的任何索引，其行为也不同。一个简化的可视化效果可能类似于图 3-1（图片由 Richard Foote 提供，他对 Oracle\
  \ 索引有丰富的知识）。\n\n![9781430260103_Fig03-01.jpg](img/9781430260103_Fig03-01.jpg)\n\n\
  **图 3-1. 存储索引结构**\n\n表的每个存储段在每个存储单元中都关联一个内存区域；每个内存区域包含其所映射的表存储段的索引数据。当 Oracle 处理`Smart\
  \ Scan`时，它也会扫描这些索引区域，寻找可能的匹配项（可能包含所需值的分段），同时跳过可以忽略的分段（那些不可能包含所需值的分段）。正是这种跳过读取“不必要”数据段（即找不到所需数据的段）的能力，赋予了存储索引强大的功能。\n\
  \n有了这个虽然长但很精彩的描述，就不难理解为什么存储索引会让人困惑了。但它们其实不必如此。\n\n### “不要看这里”\n\n与旨在告诉 Oracle 数据“在哪里”的\
  \ B-tree 索引不同，存储索引旨在允许 Oracle 跳过或绕过存储段，基本上是告诉 Oracle 数据“不在哪里”。进一步解释，B-tree 索引包含索引的确切值以及表中每一行的`rowid`。`rowid`的存在精确定位了特定索引键的位置，使\
  \ Oracle 能够直接找到所需键的确切位置。因此，B-tree 索引报告了每个索引键的确切位置。存储索引则不存储确切的位置。\n\n对于每个卸载的查询，`Smart\
  \ Scan`将使用存储索引（如果有的话）。请记住：这些索引是在谓词卸载到存储单元时动态创建的，因此某些表可能尚未创建存储索引。当存在存储索引时，Oracle\
  \ 将通过存储单元扫描它，并查看感兴趣的列是否存在，以及所需的值是否落在该列在给定分段中记录的最小/最大范围内。如果该列已被索引且所需值落在记录的范围之外，则该\
  \ 1MB 分段将被跳过，从而立即节省 I/O。\n\n`IS NULL`和`IS NOT NULL`谓词也会使用存储索引，因为索引段中有一个位用于指示`NULL`值的存在。根据数据的不同，查询在寻找或避免`NULL`值时，可以绕过大部分表数据，使得结果集的返回速度比在传统配置的系统上快得多。查询必须符合`Smart\
  \ Scan`的条件才会使用存储索引；因此，它必须满足`Smart Scan`执行的所有标准。这些条件已在上一章列出，此处不再重复。\n\n存储索引的一个有趣方面是它的有效性，这取决于表中键数据的位置。对于传统的\
  \ B-tree 索引，这被称为聚类因子（Clustering Factor），它衡量 Oracle 在表中“移动”多远才能到达索引中下一个键的位置。正如人们所料，聚类因子值相当低是件好事；不幸的是，这只有在表数据按索引键排序时才能保证。为一个索引对数据进行排序以改进其聚类因子，通常会使其他索引的聚类因子变得更差。同样，存储索引有一个伪“聚类因子”，因为索引键值的位置会影响存储索引的使用效果以及它是否能提供真正的\
  \ I/O 节省。与 B-tree 索引不同，在表中将键聚集在一起可以增强性能，并且由于每个表只有一个存储索引，因此不利影响很少。当然，在堆表初始数据加载后，不能保证排序会被保留，因为插入和删除可能会将数据键移出期望的分组。尽管如此，需要大量的插入和删除才能完全消除最初建立的键聚集。\n\
  \n\n请记住，单元维护会导致存储索引段丢失，迫使单元重新上线后，必须根据卸载的谓词重新创建存储索引。如果这些谓词创建的存储索引段与丢失的不同，那么最初建立的键聚类可能不再有利。当`搜索键`分散在整个表中时，查询可能无法节省任何字节（0\
  \ 字节节省），因为在指定范围内可能不存在不包含所需值的段。相对于`搜索键`聚类的表数据，可以提供不同程度的 I/O 减少，具体取决于搜索键的分组紧密程度。低基数列（例如包含`True`、`False`、`Yes`、`No`或有限范围数值的列）在聚类时比具有广泛取值范围的列或强制执行`Unique`和`Primary\
  \ Key`约束的列表现更好。接下来两节中的示例使用一个低基数列（`SUITABLE_FOR_FRYING`），该列包含“Yes”和“No”两个值之一，来阐释两种情况。\n\
  \n### 我使用了它\n\n要了解存储索引是否为查询提供了任何益处，一个统计信息`cell physical IO bytes saved by storage\
  \ index`将记录存储索引允许 Oracle 跳过的字节数。这是一个累积指标，意味着每当存储索引允许 Oracle 跳过读取当前连接会话（由`V$MYSTAT`报告）或给定会话（在`GV$SESSTAT`中）的数据段时，前值就会增加。（创建新会话或重新建立连接[在`SQL>`提示符下使用`connect\
  \ <user>/<pass>`]将重置会话级计数器。）\n\n为了说明这一点，在一些初始设置（示例中未显示）之后，将执行两个查询，以展示存储索引允许 Oracle\
  \ 跳过数据读取，并且 Oracle 报告的字节节省值确实是累积的。使用`storage_index_ex.sql`脚本生成此输出，在您自己的系统上运行此脚本将显示此处所示的设置和输出，以及由于篇幅而被编辑掉的部分。此脚本生成的日志文件非常大；它确实包含了两组示例，并且只需要一次执行即可提供整套结果。第二个示例在第一个示例之后立即运行，并以重新连接为\
  \ schema 所有者开始，执行相同的两个查询。两个语句之间将重新建立连接，这将显示每个查询的实际节省量。\n\n创建并填充了两个表，然后运行查询；以下是第一次运行的结果：\n\
  \n```\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n\
  \  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\nSQL> select *\n  2  from\
  \ v$mystat\n  3  where statistic# = (select statistic# from v$statname where name\
  \ = 'cell physical\n      IO bytes saved by storage index');\n\nSID STATISTIC# \
