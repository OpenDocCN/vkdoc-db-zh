  \n![image](img/Table10-4.jpg)\n\n与我们之前讨论的 OEM 报告类似，`HTML`版本允许您将鼠标指针悬停在数据条上，查看 I/O\
  \ 请求、数据库时间和等待活动的细分情况，如图 10-7 所示。\n\n![9781430260103_Fig10-07.jpg](img/9781430260103_Fig10-07.jpg)\n\
  \n图 10-7. `DBMS_SQLTUNE.REPORT_SQL_MONITOR` HTML 报告中的时间细分\n\n如果您的 Exadata 系统可以访问互联网，并且您正在运行\
  \ Oracle 11.2.0.x，那么您可以为`type`参数使用第三个选项，即`'ACTIVE'`，它会生成一个带有活动内容的 HTML 类型报告，其外观类似于\
  \ OEM 的屏幕界面。图 10-8 展示了这种报告的显示效果。\n\n![9781430260103_Fig10-08.jpg](img/9781430260103_Fig10-08.jpg)\n\
  \n图 10-8. 活动的`DBMS_SQLTUNE.REPORT_SQL_MONITOR`报告\n\n尽管通过 SQL 监控、AWR、ASH（活动会话历史）和`DBMS_SQLTUNE`生成的报告功能强大，但其有效性存在局限。根据设计，SQL\
  \ 监控仅在 I/O 时间、CPU 时间或两者合计超过五秒的限制后才开始记录数据；这通常意味着只有运行时间较长的查询和语句才会被监控，即使您使用了`/*+ MONITOR\
  \ */`提示。这又回到了数据库的监控脚本和操作，在那些场景下，AWR、Statspack 和 ASH 并不可用。这些脚本和查询在 Exadata 环境中仍然可能很有用，特别是在检查短时间运行的查询时，这些查询通常使用`V$SQL`，以及在较新的实现中使用`V$SQLSTATS`。\n\
  \n多年来，DBA 们一直依赖`V$SQL`来报告诸如执行次数、缓冲区获取、磁盘读取或解析调用等数据。查看`V$SQL`的定义，我们可以发现其中包含了大量可用数据。\n\
