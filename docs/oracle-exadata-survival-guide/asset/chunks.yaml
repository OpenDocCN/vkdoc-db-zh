    Things to Know


    Smart Scans are the lifeblood of Exadata. They provide processing speed unmatched
    by commodity hardware. Queries are eligible for Smart Scan processing if they
    execute full table or full index scans, include offloadable comparison operators,
    and utilize direct reads.


    Smart Scan activity is indicated by three operations in a query plan: TABLE ACCESS
    STORAGE FULL, INDEX STORAGE FULL SCAN, and INDEX STORAGE FAST FULL SCAN. Additionally,
    two metrics from V$SQL/GV$SQL (io_cell_offload_eligible_bytes, io_cell_offload_returned_bytes)
    indicate that a Smart Scan has been executed. The plan steps alone cannot provide
    proof of Smart Scan activity; the V$SQL/GV$SQL metrics must also be non-zero to
    know that a Smart Scan was active.


    Exadata provides the exceptional processing power of Smart Scans through the use
    of Predicate Filtering, Column Projection, and storage indexes (a topic discussed
    solely in [Chapter 3](#9781430260103_Ch03.xhtml)). Predicate Filtering is the
    ability of Exadata to return only the rows of interest to the database servers.
    Column Projection returns only the columns of interest, those in the select list,
    and those in a join predicate. Both of these optimizations reduce the data the
    database servers must process to return the final results. Also of interest is
    offloading, the process whereby Exadata offloads, or passes off, parts of the
    query to the storage servers, allowing them to do a large part of the work in
    query processing. Because the storage cells have their own CPUs, this also reduces
    the CPU usage on the database servers, the one point of contact between Exadata
    and the users.


    Joins “join” in on the Exadata performance enhancements, as Exadata utilizes bloom
    filters to pre-process qualifying joins to return the results from large table
    joins in far less time than either a hash join or nested loop join could provide.


    Some functions are also offloadable to the storage cells, but owing to the nature
    of the storage cell configuration, generally, only single-row functions are eligible.
    A function not being offloadable does not disqualify a query from executing a
    Smart Scan, and you will find that queries using some functions, such as AVG()
    and COUNT(), will report Smart Scan activity. In Oracle Release 11.2.0.3, there
    are 393 functions that qualify as offloadable. The V$SQLFN_METADATA view indicates
    offloadable functions through the OFFLOADABLE column, populated with YES for qualifying
    functions.


    Virtual columns—columns where the values are computed from other columns in the
    same table—are also offloadable, even though the values in those columns are dynamically
    generated at query time, so tables that have them are still eligible for Smart
    Scans.


    CHAPTER 3


    ![image](images/frontdot.jpg)


    Storage Indexes


    Storage indexes may be the most misunderstood and confusing part of Exadata. The
    name conjures images of conventional index structures, such as the B-tree index,
    bitmap index, LOB index, and others, but this is a far different construct, with
    a very different purpose, from any index you may have seen outside of Exadata.
    Designed and implemented in a unique fashion, with a purpose that is very different
    from any conventional index, a storage index catalogs data in uniform pieces and
    records the barest minimum of information an index could contain. Although the
    data is minimal, the storage index could be one of the most powerful pieces of
    Exadata.


    An Index That Isn’t'
