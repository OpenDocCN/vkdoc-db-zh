    For general monitoring tasks, those columns aren’t necessary. If you do need to
    dig deeper into a problem, then you may need to use `V$SQL` to access memory,
    latch, or optimizer data for the query in question. We find that `V$SQLSTATS`
    does a good job for basic, routine monitoring of SQL statements and that it provides
    a lower overhead during busy periods of database activity.


    The Storage Cells


    Storage cell management was covered in [Chapter 9](#9781430260103_Ch09.xhtml),
    but we’ll review some of that information here.


    The Command Line


    We feel that it’s a good idea to review the command-line interfaces here. Remember
    that the storage cells offer both CellCLI and `cellsrvstat` to monitor the storage
    cells, and two accounts, `cellmonitor` and `celladmin`, to perform those tasks.
    For general monitoring, the `cellmonitor` account should provide the information
    you need through the CellCLI interface.


    A common monitoring area for Exadata is the Smart Flash Cache. To fully monitor
    this area, it is necessary to connect to every available storage cell and generate
    a report. It’s possible to send this to the storage cells via a script and have
    the output logged to the database server, which was illustrated in [Chapter 9](#9781430260103_Ch09.xhtml).
    An example of such a report, for storage cell 4, follows.


    ```

    CellCLI> list flashlog detail

             name:                   myexa1cel04_FLASHLOG

             cellDisk:               FD_14_myexa1cel04,FD_05_myexa1cel04,FD_00_myexa1cel04,FD_01_myexa1cel04,FD_04_myexa1cel04,

    FD_07_myexa1cel04,FD_09_ode vx1cel04,FD_02_myexa1cel04,FD_08_myexa1cel04,FD_03_myexa1cel04,

    FD_15_myexa1cel04,FD_12_myexa1cel04,FD_11_myexa1cel04,FD_06_myexa1cel04,FD_10_myexa1cel
    04,

    FD_13_myexa1cel04

             creationTime:           2013-07-09T17:33:31-05:00

             degradedCelldisks:

             effectiveSize:          512M

             efficiency:             100.0

             id:                     7eb480f9-b94a-4493-bfca-3ba00b6618bb

             size:                   512M

             status:                 normal


    CellCLI>

    ```


    A command-line example, run on the storage cell, lists the same output but avoids
    using the command-line interface.


    ```

    [celladmin@myexa1cel05 ∼]$ cellcli -e "list flashcache detail"

             name:                   myexa1cel05_FLASHCACHE

             cellDisk:               FD_11_myexa1cel05,FD_03_myexa1cel05,FD_15_myexa1cel05,FD_13_myexa1cel05,FD_08_myexa1cel05,

    FD_10_myexa1cel05,FD_00_myexa1cel05,FD_14_myexa1cel05,FD_04_myexa1cel05,FD_06_myexa1cel05,

    FD_07_myexa1cel05,FD_05_myexa1cel05,FD_12_myexa1cel05,FD_09_myexa1cel05,FD_02_myexa1cel05,

    FD_01_myexa1cel05

             creationTime:           2013-07-09T17:33:53-05:00

             degradedCelldisks:

             effectiveCacheSize:     1488.75G

             id:                     8a380bf9-06c3-445e-8081-cff72d49bfe6

             size:                   1488.75G

             status:                 normal

    [celladmin@myexa1cel05 ∼]$

    ```


    As stated in [Chapter 9](#9781430260103_Ch09.xhtml), if you set up passwordless
    `ssh` connectivity between the database servers and the storage cells, you can
    run these commands from the database server command prompt and write a local logfile
    of the results.


    One good CellCLI command worth noting is `LIST METRICHISTORY`. This command does
    just what you would think, listing the metric history for all known metrics in
    the storage cell, along with the time stamp indicating when the values were collected.
    The output will likely be a very long list, as you can see in the following abbreviated
    output:


    ```'
