    SQL> -- initially after compression is enabled

    SQL> --

    SQL> select table_name, compression, compress_for

      2  from user_tables;


    TABLE_NAME                     COMPRESS COMPRESS_FOR

    ------------------------------ -------- ------------

    DEPT                           DISABLED

    BONUS                          DISABLED

    SALGRADE                       DISABLED

    DUMMY                          DISABLED

    EMP                            ENABLED  QUERY HIGH


    Elapsed: 00:00:00.20

    SQL>

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                     8388608

    EMP_IDX                               260046848

    SALGRADE                                  65536


    Elapsed: 00:00:00.03

    SQL>

    ```


    The resulting size is much smaller than either of the Basic or OLTP compression
    options. Even at the QUERY LOW compression rate, the size is still less than OLTP
    compression can provide:


    ```

    SQL>

    SQL> --

    SQL> -- Initial storage

    SQL> --

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                   713031680

    EMP_IDX                               478150656

    SALGRADE                                  65536


    Elapsed: 00:00:00.25

    SQL>

    SQL> --

    SQL> -- Compress for QUERY LOW

    SQL> --

    SQL> -- Note elapsed time

    SQL> --

    SQL> alter table emp move compress for query low;


    Table altered.


    Elapsed: 00:00:16.16

    SQL>

    SQL> alter index emp_idx rebuild;


    Index altered.


    Elapsed: 00:00:43.08

    SQL>

    SQL> --

    SQL> -- These figures are the same as those generated

    SQL> -- AFTER the HCC compressed data was updated the first time

    SQL> --

    SQL> select table_name, compression, compress_for

      2  from user_tables;


    TABLE_NAME                     COMPRESS COMPRESS_FOR

    ------------------------------ -------- ------------

    DEPT                           DISABLED

