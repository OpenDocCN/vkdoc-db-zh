    \ ela= 256 cellhash#=0 p2=0 p3=0 obj#=384 tim=1372568877855930\nWAIT #47971177959976:\
    \ nam='cell statistics gather' ela= 280 cellhash#=0 p2=0 p3=0 obj#=384 tim=1372568877882687\n\
    WAIT #47971177959976: nam='cell statistics gather' ela= 276 cellhash#=0 p2=0 p3=0\
    \ obj#=384 tim=1372568877902691\nWAIT #47971177959976: nam='cell statistics gather'\
    \ ela= 256 cellhash#=0 p2=0 p3=0 obj#=384 tim=1372568877921221\nWAIT #47971177959976:\
    \ nam='cell statistics gather' ela= 318 cellhash#=0 p2=0 p3=0 obj#=384 tim=1372568877940424\n\
    ```\n\n这些等待是针对`AUD$`表的（在我们的数据库中，`object_id`和`data_object_id`为384）。此跟踪文件中执行的查询并非针对`AUD$`，而是针对`V$CELL`和`V$CELL_THREAD_HISTORY`。由`tkprof`格式化输出的、针对`V$CELL_THREAD_HISTORY`查询生成的跟踪文件内容如下：\n\
    \n```\nSQL ID: fqv4mmcqsysbp Plan Hash: 3553215696\n\nselect *\nFrom\n v$cell_thread_history\n\
