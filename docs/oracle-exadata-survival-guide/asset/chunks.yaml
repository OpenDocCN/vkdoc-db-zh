    `V$SQLSTATS` doesn’t include the parsing user id, so you will need to use another
    method to isolate information you want to see. A possible rewrite of the `V$SQL`
    query used in [Chapter 2](#9781430260103_Ch02.xhtml) follows.


    ```

    SQL> select       sql_id,

      2          io_cell_offload_eligible_bytes qualifying,

      3          io_cell_offload_eligible_bytes -

    io_cell_offload_returned_bytes actual,

      4          round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,
    2) io_saved_pct,

      5          sql_text

      6          from v$sqlstats

      7          where io_cell_offload_returned_bytes > 0

      8          and io_cell_offload_eligible_bytes > 0

      9          and instr(sql_text, ''emp'') > 0;


    SQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT

    ------------- ---------- ---------- ------------ ---------------------------------------------

    gfjb8dpxvpuv6  185081856  185053096        99.98 select * from emp where empid
    = 7934

    dayy30naa1z2p  184819712     948048          .51 select /*+ cache */ * from emp


    SQL>

    ```


    Since there could be a number of queries with “emp” as a substring, some of which
    don’t qualify for a Smart Scan, it was necessary to include a condition that the
    `io_cell_offload_eligible_bytes` be greater than 0\. Without that condition, the
    query generates a “divisor is equal to 0” error, which doesn’t occur with the
    `V$SQL` version of the query.


    There are some pieces of information not available in `V$SQLSTATS`.'
  trans: "# V$SQLSTATS 视图\n\n不幸的是，在查询`V$SQL`视图时，如果不提供`SQL_ID`，会遇到 latch 争用问题。因此，如果同时有多个查询活动于此视图，性能可能会很慢。在\
    \ 10gR2 版本中，引入了`V$SQLSTATS`视图，它记录了与`V$SQL`大致相同的信息，但存储在不会与未限定查询产生 latch 争用的内存位置和格式中。既然`V$SQLSTATS`视图在我们看来是更佳的选择，我们将在此讨论它。请记住，应用于`V$SQLSTATS`的基本查询类型同样可以应用于`V$SQL`。\n\
    \n在第 2 章中，我们讨论了智能扫描以及如何验证其是否生效，并使用了`V$SQL`视图。现在，我们将使用`V$SQLSTATS`来返回类似的信息。\n\n\
    查看`V$SQLSTATS`的定义，我们看到其包含的信息与`V$SQL`中可用的大部分相同。\n\n```\nSQL> desc v$sqlstats\n\
    \ Name                                              Null?    Type\n -------------------------------------------------\
    \ -------- ------------------\n SQL_TEXT                                     \
    \              VARCHAR2(1000)\n SQL_FULLTEXT                                 \
    \              CLOB\n SQL_ID                                                 \
    \    VARCHAR2(13)\n LAST_ACTIVE_TIME                                         \
    \  DATE\n LAST_ACTIVE_CHILD_ADDRESS                                  RAW(8)\n\
    \ PLAN_HASH_VALUE                                            NUMBER\n PARSE_CALLS\
    \                                                NUMBER\n DISK_READS         \
    \                                        NUMBER\n DIRECT_WRITES              \
    \                                NUMBER\n BUFFER_GETS                        \
    \                        NUMBER\n ROWS_PROCESSED                             \
    \                NUMBER\n SERIALIZABLE_ABORTS                                \
    \        NUMBER\n FETCHES                                                    NUMBER\n\
    \ EXECUTIONS                                                 NUMBER\n END_OF_FETCH_COUNT\
    \                                         NUMBER\n LOADS                     \
    \                                 NUMBER\n VERSION_COUNT                     \
    \                         NUMBER\n INVALIDATIONS                             \
    \                 NUMBER\n PX_SERVERS_EXECUTIONS                             \
    \         NUMBER\n CPU_TIME                                                  \
    \ NUMBER\n ELAPSED_TIME                                               NUMBER\n\
    \ AVG_HARD_PARSE_TIME                                        NUMBER\n APPLICATION_WAIT_TIME\
    \                                      NUMBER\n CONCURRENCY_WAIT_TIME        \
    \                              NUMBER\n CLUSTER_WAIT_TIME                    \
    \                      NUMBER\n USER_IO_WAIT_TIME                            \
    \              NUMBER\n PLSQL_EXEC_TIME                                      \
    \      NUMBER\n JAVA_EXEC_TIME                                             NUMBER\n\
    \ SORTS                                                      NUMBER\n SHARABLE_MEM\
    \                                               NUMBER\n TOTAL_SHARABLE_MEM  \
    \                                       NUMBER\n TYPECHECK_MEM               \
    \                               NUMBER\n IO_CELL_OFFLOAD_ELIGIBLE_BYTES      \
    \                       NUMBER\n IO_INTERCONNECT_BYTES                       \
    \               NUMBER\n PHYSICAL_READ_REQUESTS                              \
    \       NUMBER\n PHYSICAL_READ_BYTES                                        NUMBER\n\
    \ PHYSICAL_WRITE_REQUESTS                                    NUMBER\n PHYSICAL_WRITE_BYTES\
    \                                       NUMBER\n EXACT_MATCHING_SIGNATURE    \
    \                               NUMBER\n FORCE_MATCHING_SIGNATURE            \
    \                       NUMBER\n IO_CELL_UNCOMPRESSED_BYTES                  \
    \               NUMBER\n IO_CELL_OFFLOAD_RETURNED_BYTES                      \
    \       NUMBER\n\nSQL>\n```\n\n`V$SQLSTATS`不包含解析用户 ID，因此你需要使用其他方法来隔离你想查看的信息。以下是对第\
    \ 2 章中使用的`V$SQL`查询可能的一个改写。\n\n```\nSQL> select       sql_id,\n  2          io_cell_offload_eligible_bytes\
    \ qualifying,\n  3          io_cell_offload_eligible_bytes -\nio_cell_offload_returned_bytes\
    \ actual,\n  4          round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5          sql_text\n  6          from v$sqlstats\n  7 \
    \         where io_cell_offload_returned_bytes > 0\n  8          and io_cell_offload_eligible_bytes\
    \ > 0\n  9          and instr(sql_text, 'emp') > 0;\n\nSQL_ID        QUALIFYING\
    \     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ---------- ---------- ------------\
    \ ---------------------------------------------\ngfjb8dpxvpuv6  185081856  185053096\
    \        99.98 select * from emp where empid = 7934\ndayy30naa1z2p  184819712\
    \     948048          .51 select /*+ cache */ * from emp\n\nSQL>\n```\n\n由于可能有许多查询以“emp”作为子字符串，其中一些并不符合智能扫描的条件，因此有必要包含一个条件，即`io_cell_offload_eligible_bytes`大于\
    \ 0。如果没有这个条件，查询会产生“除数为 0”的错误，这在`V$SQL`版本的查询中不会发生。\n\n`V$SQLSTATS`中缺少一些`V$SQL`所提供的信息片段。"
