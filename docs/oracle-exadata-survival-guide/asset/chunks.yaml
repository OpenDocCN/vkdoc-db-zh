    ```\n\n## Make It So\n\nI/O calibration isn’t the only factor in enabling Auto\
    \ DOP, as the parameter `parallel_degree_policy` must be set to `AUTO` or `LIMITED`.\
    \ By default, it is set to `MANUAL`, which disables the three parallel features\
    \ of Oracle Release 11.2: Auto DOP, parallel statement queuing, and in-memory\
    \ parallel execution. The three available settings, and their effects on these\
    \ features, are listed in [Table 5-2](#9781430260103_Ch05.xhtml#Tab2).\n\n[Table\
    \ 5-2](#9781430260103_Ch05.xhtml#_Tab2). How `parallel_degree_policy` Settings\
    \ Affect Parallel Execution\n\n| Setting | Effect |\n| --- | --- |\n| `MANUAL`\
    \ | Disables all three new parallel query features. Causes parallel processing\
    \ reverts to the behavior of prior releases, parallelizing statements only if\
    \ they are hinted or the object being queried is created with or altered to have\
    \ a `DEGREE` greater than the default of 1. |\n| `LIMITED` | Only Auto DOP is\
    \ enabled with this setting; the remaining two new parallel features are disabled.\
    \ With this setting, only queries against objects associated with a `DEGREE` of\
    \ `DEFAULT` will be considered. |\n| `AUTO` | All three new parallel features\
    \ are enabled. Queries and statements will be evaluated for parallel execution,\
    \ regardless of the `DEGREE` setting on the object or objects accessed. |\n\n\
    Another parameter, this one “hidden,” that affects one of the new features is\
    \ `_parallel_statement_queueing`. When set to `TRUE` (the default), queuing is\
    \ enabled, which allows Oracle to decide if a parallel statement can be executed\
    \ at runtime or if it needs to wait in the queue until sufficient resources are\
    \ available. And yet another “hidden” parameter, `_parallel_cluster_cache_policy`,\
    \ controls whether in-memory parallel execution is available or not. A setting\
    \ of `cached` enables this feature. On Exadata, this feature can be less useful;\
    \ when it is enabled, the Smart Scan optimizations will not be available when\
    \ the buffer cache is scanned. It’s a choice of whether to use the full power\
    \ of Smart Scans against the buffer cache or use in-memory parallel execution.\
    \ This primarily applies to data warehouse workloads, as OLTP processes rarely\
    \ require parallel processing. You should be aware, though, that Smart Scans accessing\
    \ the buffer cache can be affected when in-memory parallel execution is configured.\n\
    \nWith `parallel_degree_policy` set to `AUTO`, it doesn’t matter if objects are\
    \ created with a `DEGREE` greater than one, as the database decides which statements\
    \ to run in parallel, how many parallel slaves to execute, and even how many RAC\
    \ nodes to involve in the process. This is the beauty and power of Auto DOP.\n\
    \n## Do It in Memory\n\nThe third parallel feature, in-memory parallel execution,\
    \ can improve query performance when Smart Scans are not used. It is designed\
    \ to use the buffer cache, is cluster aware, and can utilize all available RAC\
    \ nodes. It is enabled when `parallel_degree_policy` is set to `AUTO`. Other parameters\
    \ that can affect In-memory parallel execution are `parallel_servers_target`,\
    \ `parallel_min_time_threshold`, `parallel_degree_limit`, and `parallel_degree_policy`.\
    \ Low values for `parallel_servers_target`, `parallel_degree_limit`, and `parallel_min_time_threshold`\
    \ make it more likely for in-memory parallel execution to run. Additionally, the\
    \ `parallel_force_local` parameter can be set to `TRUE` to reduce the available\
    \ parallel resources to only those on the local server that can also favor in-memory\
    \ parallel execution. Non-parallel parameters that affect this improvement are\
    \ `sga_max_size` and `sga_target`, which control the buffer cache size, among\
    \ other areas of the SGA. Larger cache sizes can accommodate larger tables in\
    \ memory, which can also make it more likely for this feature to run. Setting\
    \ these parameters to low values can’t guarantee that this feature will run, but\
    \ you may have a better chance of using it, if you scale back these settings.\n\
    \nWhile it is true that memory is much faster than disk, a Smart Scan is designed\
    \ to be fast and efficient when accessing data on disk. Column Projection and\
    \ Predicate Filtering greatly reduce the volume of data processed by the database\
    \ tier, speeding the query along. But if all of the data could be loaded and processed\
    \ in memory, the execution time would be a fraction of the time it would take\
    \ to process the same volume of data read from disk.\n\nThere are benefits to\
    \ in-memory parallel execution.\n```"
