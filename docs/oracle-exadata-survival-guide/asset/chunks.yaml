      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID      STATISTIC#           VALUE

    --------------- --------------- ---------------

               1111             247       566501376


    Elapsed: 00:00:00.00

    SQL>

    SQL> connect bing/#########

    Connected.

    SQL>

    SQL> set timing on

    SQL>

    SQL> select /*+ parallel(4) */

      2  count(*)

      3  from chicken_hr_tab

      4  where suitable_for_frying is null;


    COUNT(*)


    Elapsed: 00:00:00.23

    SQL>

    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID      STATISTIC#           VALUE

    --------------- --------------- ---------------

               1111             247      1141440512


    Elapsed: 00:00:00.00

    SQL>

    ```


    The IS NULL query executed in less than one-third of the time required for the
    query searching for “employees” ready to be sent to the fryer and skipped almost
    twice the number of bytes, because very few of the table segments contain NULL
    values. Again, this speed is partly due to not having to check minimum and maximum
    values for the specified column. Using this strategy, “false positives” won’t
    occur, as Oracle doesn’t flag segments that *may* have NULLs, only those segments
    where NULLs are actually present.


    Needing to “Rebuild”


    Storage indexes are memory-resident structures. As long as there is power to the
    storage cells, those indexes remain valid. Of course, using memory instead of
    more permanent physical media makes these indexes transient and subject to maintenance
    windows, power outages, and memory-card failures. There is no method to back up
    a storage index, and there really is no need to do so, given that storage indexes
    take very little time to build. The build process is not, as mentioned previously,
    the resource-intensive operation that building a “permanent” index would be. Using
    the term *rebuild* to replace dropped storage indexes is, to our minds, a misnomer,
    as there is no script to build them, and it’s just as likely that the storage
    indexes built after a restart of the storage cells will not match the storage
    indexes in place prior to the outage.


    Because storage indexes are built on data stored in 1MB segments, it doesn’t take
    long to scan that segment of the table to find the minimum and maximum values
    an indexed column contains and note whether NULL values can or do exist. Building
    storage indexes after an outage is not the same resource-intensive operation that
    creating more permanent indexes can be. Building or rebuilding a B-tree index,
    for example, can take hours and can noticeably consume CPU and disk resources,
    whereas building a storage index is hardly noticeable during the course of day-to-day
    operations, doesn’t hamper other sessions while it is being built, and completes
    in a mere fraction of the time. True, the information in a storage index is nothing
    like that of a B-tree index, but it doesn’t need to be to serve its intended purpose.


    Each storage server, or cell, has its own storage indexes, so losing one cell
    won’t drop the indexes in the remaining cells, which means that only the storage
    indexes found in the problem cell will have to be created again. One of the good
    aspects of a storage index is that the index for each 1MB segment does not need
    to match the indexes representing the other table segments. Because tables are
    striped across the disks in a disk group, the table data is spread across all
    of the storage cells and, as a result, each table will have storage index segments
    in each of the storage cells. Issues with one cell won’t create a situation where
    no storage indexes exist, so queries can still benefit from the index segments
    in the unaffected cells. In addition, the redundancy in ASM places the redundant
    data on a different storage cell from the primary source. This allows Exadata
    to lose a storage cell or apply patches in a rolling manner and not lose access
    to data.'
