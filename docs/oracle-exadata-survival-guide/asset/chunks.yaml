    Cell Multiblock Physical Read


    This event was renamed for Exadata systems, as the non-Exadata event is named
    `db file scattered read` , which is descriptive but not entirely accurate, as
    the blocks read may not be scattered but contiguous. Oracle 11.2 still reports
    multiblock reads using the `db file scattered read` event on non-Exadata systems,
    regardless of whether they are reading contiguous or scattered blocks. For Exadata
    systems, this event records time for contiguous multiblock reads.


