  raw: 'Predicate Filtering improves this performance even further, by returning data
    from only the rows of interest, based on the predicates provided. Other conditions
    necessary for Smart Scan execution were covered, including direct-path reads and
    full-table or index scans. Execution plans were explained, so that you would know
    what information to look for to indicate that Smart Scans were, indeed, being
    used, and other metrics were provided to further prove Smart Scan use. These additional
    metrics include the `storage` keyword in the Predicate information and two columns
    from the `V$SQL/GV$SQL` pair of views, `io_cell_offload_eligible_bytes` and `io_cell_offload_returned_bytes`.
    The following example, first offered in [Chapter 2](#9781430260103_Ch02.xhtml),
    shows how these column values provide Smart Scan execution information.


    ```

    SQL>select  sql_id,

      2         io_cell_offload_eligible_bytes qualifying,

      3         io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,

      4         round(((io_cell_offload_eligible_bytes -

    io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,

      5         sql_text

      6  from v$sql

      7  where io_cell_offload_returned_bytes> 0

      8  and instr(sql_text, ''emp'') > 0

      9  and parsing_schema_name = ''BING'';


    SQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT

    ------------- ---------- ---------- ------------ -------------------------------------

    gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid
    = 7934


    SQL>

    ```


    We also covered Bloom filters and how Exadata uses them to improve join processing.
    Bloom filters are part of the offloading process for qualifying joins, and their
    use makes joins more efficient. You can see that Bloom filters are in use through
    the execution plan for a qualifying query, as the following example, again first
    provided in [Chapter 2](#9781430260103_Ch02.xhtml), illustrates.


    ```

    Execution Plan


    Plan hash value: 2313925751


    Predicate Information (identified by operation id):


    7 - access("ED"."EMPID"="E"."EMPID")

      15 - access("D"."DEPTNUM"=20)

      17 - storage("ED"."EMPDEPT"=20)

           filter("ED"."EMPDEPT"=20)

      19 - storage(SYS_OP_BLOOM_FILTER(:BF0000,"E"."EMPID"))

           filter(SYS_OP_BLOOM_FILTER(:BF0000,"E"."EMPID"))


    Note


    - dynamic sampling used for this statement (level=2)


    Statistics


    60  recursive calls

        174  db block gets

      40753  consistent gets

      17710  physical reads

       2128  redo size

    9437983  bytes sent via SQL*Net to client

     183850  bytes received via SQL*Net from client

      16668  SQL*Net roundtrips to/from client

          6  sorts (memory)

          0  sorts (disk)

     250000  rows processed


    SQL>

    ```


    The presence of the `SYS_OP_BLOOM_FILTER` function in the plan output indicates
    the join was offloaded.


    Functions can also be offloaded if they are found in the `V$SQLFN_METADATA` view;
    functions not found in this list will disqualify a query or statement from Smart
    Scan execution. Virtual columns can also be offloaded, which qualifies tables
    defined with virtual columns for Smart Scan execution.


    Storage indexes were discussed in [Chapter 3](#9781430260103_Ch03.xhtml), and
    they are probably the most confusing aspect of Exadata, because this type of index
    is used to tell Oracle where *not* to look for data. Designed to assist in offload
    processing, storage indexes can significantly reduce the volume of data Oracle
    reads, by eliminating 1MB sections of table data. You learned that a storage index
    contains the barest minimum of data. You also learned that even though a storage
    index is small, it is undeniably mighty. Used to skip over 1MB sections where
    the desired data is *not* found, the resulting savings can be great. Of course,
    the good also comes with the bad, as a storage index can provide false positives,
    so that Oracle reads 1MB sections it doesn’t need to, because the desired value
    falls within the minimum/maximum range recorded in the storage index, even though
    the actual value doesn’t exist in that 1MB section of the table. To refresh your
    memory, the following example illustrates this.


    ```

    SQL> insert /*+ append */

      2  into chicken_hr_tab (chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,
    fry_dt)

      3  select

      4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying, fry_dt
    from chicken_hr_tab2

      5  where talent_cd in (3,5);


    1048576 rows created.


    Elapsed: 00:01:05.10

    SQL> commit;


    Commit complete.


    Elapsed: 00:00:00.01

    SQL> insert /*+ append */

      2  into chicken_hr_tab (chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,
    fry_dt)

      3  select

      4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying, fry_dt
    from chicken_hr_tab2

      5  where talent_cd not in (3,5);


    37748736 rows created.


    Elapsed: 00:38:09.12

    SQL> commit;


    Commit complete.


    Elapsed: 00:00:00.00

    SQL>

    SQL> exec dbms_stats.gather_table_stats(user, ''CHICKEN_TALENT_TAB'', cascade=>true,
    estimate_percent=>null);


    PL/SQL procedure successfully completed.


    Elapsed: 00:00:00.46

    SQL> exec dbms_stats.gather_table_stats(user, ''CHICKEN_HR_TAB'', cascade=>true,
    estimate_percent=>null);


    PL/SQL procedure successfully completed.


    Elapsed: 00:00:31.66

    SQL>

    SQL> set timing on

    SQL>

    SQL> connect bing/#########

    Connected.

    SQL> alter session set parallel_force_local=true;


    Session altered.


    Elapsed: 00:00:00.00

    SQL> alter session set parallel_min_time_threshold=2;


    Session altered.


    Elapsed: 00:00:00.00

    SQL> alter session set parallel_degree_policy=manual;


    Session altered.


    Elapsed: 00:00:00.00

    SQL>

    SQL>

    SQL> set timing on

    SQL>

    SQL> select /*+ parallel(4) */

      2  chicken_id

      3  from chicken_hr_tab

      4  where talent_cd = 4;


    CHICKEN_ID


    ...


    4718592 rows selected.


    Elapsed: 00:03:17.92

    SQL>

    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical IO bytes saved by storage index'');


    SID      STATISTIC#           VALUE

    --------------- --------------- ---------------

                915             247               0


    Elapsed: 00:00:00.01

    SQL>

    ```


    We feel this is a small price to pay for such efficiency.


    [Chapter 4](#9781430260103_Ch04.xhtml) brought us to the Smart Flash Cache, a
    very versatile feature of Exadata, as it can be used as a read-through cache,
    a write-back cache, and even configured as flash disk usable by ASM. In addition
    to this functionality range, the Smart Flash Cache also has a portion configured
    as Smart Flash Log to make redo log processing more efficient. Log writes are
    processed both to disk, via the log groups, and to the Smart Flash Log, and the
    writes that finish first signal to Oracle that log processing has successfully
    completed. This allows Oracle to continue transaction processing at a potentially
    faster rate than using redo logs alone.'
  trans: "\n谓词过滤通过仅返回基于所提供谓词感兴趣行的数据，进一步提升了此性能。执行智能扫描所需的其他条件，包括直接路径读取以及全表或索引扫描，之前已经介绍过。执行计划也得到了解释，以便您了解哪些信息能表明确实使用了智能扫描，同时还提供了其他指标以进一步证明智能扫描的使用。这些额外指标包括谓词信息中的\
    \ `storage` 关键字，以及 `V$SQL`/`GV$SQL` 视图对中的两列：`io_cell_offload_eligible_bytes` 和\
    \ `io_cell_offload_returned_bytes`。以下示例（首次出现在第 2 章）展示了这些列值如何提供智能扫描执行信息。\n\n```sql\n\
    SQL>select  sql_id,\n  2         io_cell_offload_eligible_bytes qualifying,\n\
    \  3         io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,\n\
    \  4         round(((io_cell_offload_eligible_bytes -\nio_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5         sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
    \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6\
    \  185081856   42510928        22.97 select * from emp where empid = 7934\n\n\
    SQL>\n```\n\n我们还讨论了 Bloom 过滤器及其在 Exadata 中如何改进连接处理。Bloom 过滤器是限定连接卸载过程的一部分，其使用使连接更加高效。您可以通过合格查询的执行计划看到\
    \ Bloom 过滤器正在使用，如下例所示（同样首次在第 2 章中提供）。\n\n```sql\nExecution Plan\n\nPlan hash value:\
    \ 2313925751\n\nPredicate Information (identified by operation id):\n\n7 - access(\"\
    ED\".\"EMPID\"=\"E\".\"EMPID\")\n  15 - access(\"D\".\"DEPTNUM\"=20)\n  17 - storage(\"\
    ED\".\"EMPDEPT\"=20)\n       filter(\"ED\".\"EMPDEPT\"=20)\n  19 - storage(SYS_OP_BLOOM_FILTER(:BF0000,\"\
    E\".\"EMPID\"))\n       filter(SYS_OP_BLOOM_FILTER(:BF0000,\"E\".\"EMPID\"))\n\
    \nNote\n\n- dynamic sampling used for this statement (level=2)\n\nStatistics\n\
    \n60  recursive calls\n    174  db block gets\n  40753  consistent gets\n  17710\
    \  physical reads\n   2128  redo size\n9437983  bytes sent via SQL*Net to client\n\
    \ 183850  bytes received via SQL*Net from client\n  16668  SQL*Net roundtrips\
    \ to/from client\n      6  sorts (memory)\n      0  sorts (disk)\n 250000  rows\
    \ processed\n\nSQL>\n```\n\n执行计划输出中存在 `SYS_OP_BLOOM_FILTER` 函数表明该连接已被卸载。\n\n如果函数在\
    \ `V$SQLFN_METADATA` 视图中找到，它们也可以被卸载；未在此列表中找到的函数将使查询或语句无法执行智能扫描。虚拟列也可以被卸载，这使得定义了虚拟列的表有资格执行智能扫描。\n\
    \n存储索引在第 3 章中讨论过，它们可能是 Exadata 中最令人困惑的方面，因为这种索引用于告诉 Oracle *不要* 在哪里查找数据。存储索引旨在辅助卸载处理，通过消除表的\
    \ 1MB 数据段，可以显著减少 Oracle 读取的数据量。您了解到存储索引包含最少量的数据。您还了解到，尽管存储索引很小，但它无疑非常强大。它用于跳过未找到所需数据的\
    \ 1MB 段，由此产生的节省可能是巨大的。当然，有其利也有其弊，存储索引可能提供误报，导致 Oracle 读取它不需要的 1MB 段，因为所需值落在存储索引记录的最小/最大范围内，即使该值实际上并不在该表的\
    \ 1MB 段中。为了刷新您的记忆，以下示例说明了这一点。\n\n```sql\nSQL> insert /*+ append */\n  2  into\
    \ chicken_hr_tab (chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,\
    \ fry_dt)\n  3  select\n  4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,\
    \ fry_dt from chicken_hr_tab2\n  5  where talent_cd in (3,5);\n\n1048576 rows\
    \ created.\n\nElapsed: 00:01:05.10\nSQL> commit;\n\nCommit complete.\n\nElapsed:\
    \ 00:00:00.01\nSQL> insert /*+ append */\n  2  into chicken_hr_tab (chicken_name,\
    \ talent_cd, retired, retire_dt, suitable_for_frying, fry_dt)\n  3  select\n \
    \ 4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying, fry_dt\
    \ from chicken_hr_tab2\n  5  where talent_cd not in (3,5);\n\n37748736 rows created.\n\
    \nElapsed: 00:38:09.12\nSQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.00\n\
    SQL>\nSQL> exec dbms_stats.gather_table_stats(user, 'CHICKEN_TALENT_TAB', cascade=>true,\
    \ estimate_percent=>null);\n\nPL/SQL procedure successfully completed.\n\nElapsed:\
    \ 00:00:00.46\nSQL> exec dbms_stats.gather_table_stats(user, 'CHICKEN_HR_TAB',\
    \ cascade=>true, estimate_percent=>null);\n\nPL/SQL procedure successfully completed.\n\
    \nElapsed: 00:00:31.66\nSQL>\nSQL> set timing on\nSQL>\nSQL> connect bing/#########\n\
    Connected.\nSQL> alter session set parallel_force_local=true;\n\nSession altered.\n\
    \nElapsed: 00:00:00.00\nSQL> alter session set parallel_min_time_threshold=2;\n\
    \nSession altered.\n\nElapsed: 00:00:00.00\nSQL> alter session set parallel_degree_policy=manual;\n\
    \nSession altered.\n\nElapsed: 00:00:00.00\nSQL>\nSQL>\nSQL> set timing on\nSQL>\n\
    SQL> select /*+ parallel(4) */\n  2  chicken_id\n  3  from chicken_hr_tab\n  4\
    \  where talent_cd = 4;\n\nCHICKEN_ID\n\n...\n\n4718592 rows selected.\n\nElapsed:\
    \ 00:03:17.92\nSQL>\nSQL> select *\n  2  from v$mystat\n  3  where statistic#\
    \ = (select statistic# from v$statname where name = 'cell physical IO bytes saved\
    \ by storage index');\n\nSID      STATISTIC#           VALUE\n---------------\
    \ --------------- ---------------\n            915             247           \
    \    0\n\nElapsed: 00:00:00.01\nSQL>\n```\n\n我们认为，为了如此高的效率，这是一个很小的代价。\n\n第 4 章将我们引向智能闪存缓存，它是\
    \ Exadata 一个非常多功能的特性，因为它可以用作直读缓存、写回缓存，甚至可以配置为 ASM 可用的闪存盘。除了此功能范围外，智能闪存缓存还有一部分配置为智能闪存日志，以使重做日志处理更加高效。日志写入既通过日志组写入磁盘，也写入智能闪存日志，首先完成的写入会向\
    \ Oracle 发出信号，表明日志处理已成功完成。这使得 Oracle 能够以比单独使用重做日志更快的速率继续事务处理。\n"
- fmt: '## Chapter 5


    [Chapter 5](#9781430260103_Ch05.xhtml) brought us to parallel processing, an area
    that in conventionally configured systems can be both a help and a hindrance.
    Oracle 11.2.0.x provides improvements in the implementation and execution of parallel
    statements, which are available on any Exadata or non-Exadata configuration running
    this release of Oracle. It is the fact that Exadata was originally designed for
    data warehouse workloads, workloads that rely on parallel processing to speed
    the workflow, that makes it the ideal choice for parallel processing.


    Certain configuration settings are necessary to enable the automatic parallel
    processing functionality, and a very important task, I/O calibration, is necessary
    for Exadata to actually act on these configuration settings. I/O calibration is
    a resource-intensive process and should not be run on systems during periods of
    heavy workloads. A packaged procedure, `dbms_resource_manager.calibrate_io` is
    provided to perform this task. Once the I/O calibration is complete, you will
    have to verify the parameters and settings found in Table 5-1 and Table 5-2.


    Once you have everything set, you let Oracle take the reins; the users then reap
    the benefits of this improved parallel processing functionality. One of those
    benefits is parallel statement queuing, where Oracle will defer execution of a
    parallelized statement until sufficient resources are available. Querying the
    `V$SQL_MONITOR` view (or `GV$SQL_MONITOR`, to examine statements from all nodes
    in the cluster), where the status is `QUEUED`, will provide a list of statements
    waiting for sufficient resources to be released by parallel statements that finish
    execution. Provided you have set the resource limits correctly, this prevents
    the system from being overloaded, a vast improvement over the earlier parallel
    adaptive multiuser mechanism.


    Another benefit is that Oracle will dynamically set the degree of parallelism
    (DOP) based on the available resources. One important item to note is that once
    the DOP is set by Oracle, it cannot be changed during execution, even if additional
    resources become available. The DOP is computed based on the estimated serial
    execution time for the given statement. A parameter, `parallel_min_time_threshold`,
    sets the threshold for serial execution time that will be the deciding factor
    for parallel execution. Remember that you can control whether queuing is enabled
    by setting the hidden parameter `_parallel_statement_queuing` to FALSE.


    Another aspect of parallel execution is in-memory parallel execution. On the one
    hand, this can be desirable behavior, as disk I/O and traffic between the database
    servers and storage cells is eliminated, and the latency of memory is far lower
    than that for disk access. On the other hand, when this is active, Smart Scan
    optimizations are no longer available, because disk I/O is eliminated. Because
    the Smart Scan optimizations are eliminated, the database servers must perform
    all of the read processing that the storage cells would do, which increases the
    CPU usage. We also noted that we have not experienced in-memory parallel execution
    on any Exadata systems we’ve managed.


    ## Chapter 6


    On to compression in [Chapter 6](#9781430260103_Ch06.xhtml). Exadata offers compression
    options not available on any non-Exadata platform, notably the Hybrid Columnar
    Compression (HCC) options. Those options are QUERY HIGH, QUERY LOW, ARCHIVE HIGH,
    and ARCHIVE LOW. These can significantly reduce the size of the selected tables;
    however, the compressed tables should be either inactive or subject to batch processing,
    including recompression, outside of the normal work hours. If HCC is used on actively
    updated tables, the compression level is silently changed to OLTP, and the original
    space savings are lost. Another aspect of using HCC is with respect to disaster
    recovery. If the recovery method is to simply restore the last good backup to
    a non-Exadata server or a server not using Exadata storage, the database could
    be unusable after the restore completes, because HCC isn’t supported on non-Exadata
    storage. This is a situation correctable by uncompressing the tables, but by correcting
    it, you may run into space issues, if the destination server tablespaces were
    created based on the compressed size of the Exadata database.


    [Table 6-3](#9781430260103_Ch06.xhtml#Tab3) and [Table 6-4](#9781430260103_Ch06.xhtml#Tab4)
    in [Chapter 6](#9781430260103_Ch06.xhtml) list the estimated and actual compression
    ratios for the various compression methods, including OLTP. Those tables will
    not be reproduced here, but it is a good idea to look at them again, if you are
    contemplating using a compression method to save space.


    ## Chapter 7


    Wait events specific to Exadata were covered in [Chapter 7](#9781430260103_Ch07.xhtml).
    These wait events report on cell-related wait information. Seven of these wait
    events collect wait data under the I/O wait category, and the `cell statistics
    gather` event seems to be incorrectly included in this category. The `cell single
    block physical read` and `cell multiblock physical read` events essentially replace
    the older `db file sequential read` and `db file scattered read events`, respectively.


    RMAN has Exadata-specific waits as well: `cell smart incremental backup` and `cell
    smart restore from backup`. The first wait collects time against incremental Level
    1 backups and the second accrues wait time experienced by an RMAN restore. Because
    a Level 0 incremental is, essentially, a full backup, wait times experienced for
    those backups is not recorded.


    ## Chapter 8


    Performance counters and metrics specific to Exadata were covered in [Chapter
    8](#9781430260103_Ch08.xhtml). The intent of that chapter was to provide an overview
    of what metrics and counters are available, what they mean, and when you should
    consider using them.


    The cell metrics provide insight into statement performance and how Exadata executes
    statements. Dynamic counters such as `cell blocks processed by data layer` and
    `cell blocks processed by index layer` show how efficient the storage cells are
    in their processing. These counters are incremented every time a storage cell
    can complete data-layer and index-layer processing without passing data back to
    the database layer. Two reasons for the cells to pass data back to the database
    servers are consistent-read processing requiring undo blocks (regular block I/O)
    and chained-row processing where the chained pieces span storage cells. While
    the first condition can’t be controlled entirely (transactions can be so large
    as to exceed the automatic block-cleaning threshold), the second, chained rows,
    can be addressed and possibly corrected.'
