  trans: "\n# SQL 查询性能分析：布隆过滤器与 Exadata 卸载\n\n## 运行使用布隆过滤器的连接查询\n执行以下 SQL 查询来生成执行计划，以验证布隆过滤器的使用情况，并报告查询执行时间。\n\
    \n```sql\nSQL> set autotrace on\nSQL> set timing on\n\nSQL> select /*+ bloom join\
    \ 2 parallel 2 use_hash(empemp_dept) */ e.empid, e.empnm, d.deptnm, e.empsal\n\
    \  2  from emp e join emp_depted on (ed.empid = e.empid) join dept_info d on (ed.empdept\
    \ = d.deptnum)\n  3  where ed.empdept = 20;\n\nEMPID EMPNM                   \
    \  DEPTNM                       EMPSAL\n---------- ---------------------- -------------------------\
    \ ----------\n    904505 Fnarm904505           PROCUREMENT                   \
    \ 1000\n    907769 Fnarm907769           PROCUREMENT                    3000\n\
    \    ...\n250000 rows selected.\n\nElapsed: 00:00:14.27\n\nExecution Plan\nPlan\
    \ hash value: 2643012915\nPredicate Information (identified by operation id):\n\
    3 - access(\"ED\".\"EMPID\"=\"E\".\"EMPID\")\n11 - access(\"D\".\"DEPTNUM\"=20)\n\
    13 - storage(\"ED\".\"EMPDEPT\"=20)\n     filter(\"ED\".\"EMPDEPT\"=20)\n15 -\
    \ storage(SYS_OP_BLOOM_FILTER(:BF0000,\"E\".\"EMPID\"))\n     filter(SYS_OP_BLOOM_FILTER(:BF0000,\"\
    E\".\"EMPID\"))\nNote\n- dynamic sampling used for this statement (level=2)\n\
    Statistics\n60  recursive calls\n    174  db block gets\n 40753  consistent gets\n\
    \  17710  physical reads\n   2128  redo size\n9437983  bytes sent via SQL*Net\
    \ to client\n 183850  bytes received via SQL*Net from client\n  16668  SQL*Net\
    \ roundtrips to/from client\n      6  sorts (memory)\n      0  sorts (disk)\n\
    \ 250000  rows processed\n```\n\n在不到 15 秒的时间内，从超过 400 万行数据的三表连接查询中返回了 25 万行数据。布隆过滤器显著改变了该查询的处理方式，并在处理如此大量数据时提供了卓越的性能。即使关闭卸载处理，布隆过滤器仍然会在数据库层被使用。\n\
    \n```sql\nSQL> select /*+ bloom join 2 parallel 2 use_hash(empemp_dept) */ e.empid,\
    \ e.empnm, d.deptnm, e.empsal\n  2  from emp e join emp_depted on (ed.empid =\
    \ e.empid) join dept_info d on (ed.empdept = d.deptnum)\n  3  where ed.empdept\
    \ = 20;\n...\nElapsed: 00:00:16.60\n\nStatistics\n33  recursive calls\n      \
    \  171  db block gets\n      40049  consistent gets\n      17657  physical reads\n\
    \          0  redo size\n    9437503  bytes sent via SQL*Net to client\n     183850\
    \  bytes received via SQL*Net from client\n      16668  SQL*Net roundtrips to/from\
    \ client\n          5  sorts (memory)\n          0  sorts (disk)\n     250000\
    \  rows processed\n```\n\n如果没有在存储层执行布隆过滤器，查询执行时间增加了 2.33 秒，增幅达 16.3%。对于执行时间更长的查询，这种差异可能非常显著。赋予\
    \ Exadata 强大连接处理能力的并非布隆过滤器本身，而是 Exadata 能够在数据库层和存储层执行它，这是普通硬件配置无法做到的。\n\n## 卸载功能\n\
    关于 Exadata 的智能扫描功能，函数的卸载是一个有趣的话题。Oracle 实现了两种基本类型的函数：单行函数（如`TO_CHAR()`、`TO_NUMBER()`、`CHR()`、`LPAD()`）和多行函数（如`AVG()`、`LAG()`、`LEAD()`、`MIN()`、`MAX()`等）。分析函数属于第二种类型。单行函数有资格被卸载，从而使查询符合智能扫描的条件，因为它们可以在存储服务器之间分配来处理数据。而多行函数（如`AVG()`、`MIN()`和`MAX()`）必须能够访问整个表数据集，这在\
    \ Exadata 的存储架构下通过智能扫描是无法实现的。最小的 Exadata 配置中至少有三台存储服务器，数据相对均匀地分布在它们之间，这使得单台存储服务器无法访问全部磁盘。因此，大多数多行函数无法被卸载到存储层；然而，执行这些函数的查询仍然可能进行智能扫描，即使函数本身无法被卸载，如下所示（仅显示相关输出）。\n\
    \n```sql\nSQL> select avg(sal)\n  2  from emp;\n\nAVG(SAL)\n----------\n2500000.5\n\
    \nElapsed: 00:00:00.49\n\nExecution Plan\nPlan hash value: 2083865914\n| Id  |\
    \ Operation                  | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    |   0 | SELECT STATEMENT           |      |     1 |     6 |  7468   (1)| 00:00:01\
    \ |\n|   1 |  SORT AGGREGATE            |      |     1 |     6 |            |\
    \          |\n|   2 |   TABLE ACCESS STORAGE FULL| EMP  |  5000K|    28M|  7468\
    \   (1)| 00:00:01 |\n\nStatistics\n1  recursive calls\n         1  db block gets\n\
    \      45123  consistent gets\n      26673  physical reads\n          0  redo\
    \ size\n        530  bytes sent via SQL*Net to client\n        524  bytes received\
    \ via SQL*Net from client\n          2  SQL*Net roundtrips to/from client\n  \
    \        0  sorts (memory)\n          0  sorts (disk)\n          1  rows processed\n\
    \nSQL>\nSQL> set autotrace off timing off\nSQL>\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
    \ > 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ ---------------------------------------------\n2cqn6rjvp8qm7\
    \  218505216   54685152        22.82 select avg(sal) from emp\n>\nSQL>\n```\n"
- fmt: "# Smart Scan 数据节省示例\n\n## AVG() 查询\n\n一次 Smart Scan 向数据库服务器返回的数据减少了近 23%，从而减轻了服务器的工作负担。由于\
    \ `AVG()` 函数不可卸载，且查询中没有 `WHERE` 子句，节省的开销来自于列投影（Column Projection），因此 Oracle 只返回了计算平均值所需的数据（`SAL`\
    \ 列的值）。\n\n## COUNT() 查询\n\n`COUNT()` 同样是一个不可卸载的函数，但使用 `COUNT()` 的查询也可以执行 Smart\
    \ Scan，如下面的示例所示（同样来自 `agg_smart_scan_ex.sql`）。\n\n```sql\nSQL> select count(*)\n\
    \  2  from emp;\n\nCOUNT(*)\n\nElapsed: 00:00:00.34\n\nExecution Plan\n\nPlan\
    \ hash value: 2083865914\n\n| Id  | Operation                   | Name | Rows\
    \  | Cost (%CPU)| Time     |\n|   0 | SELECT STATEMENT            |      |   \
    \  1 |  7460   (1)| 00:00:01 |\n|   1 |  SORT AGGREGATE             |      | \
    \    1 |            |          |\n|   2 |   TABLE ACCESS STORAGE FULL | EMP  |\
    \  5000K|  7460   (1)| 00:00:01 |\n\nStatistics\n\n          1  recursive calls\n\
    \          1  db block gets\n      26881  consistent gets\n      26673  physical\
    \ reads\n          0  redo size\n        526  bytes sent via SQL*Net to client\n\
    \        524  bytes received via SQL*Net from client\n          2  SQL*Net roundtrips\
    \ to/from client\n          0  sorts (memory)\n          0  sorts (disk)\n   \
    \       1  rows processed\n\nSQL>\nSQL> set autotrace off timing off\nSQL>\nSQL>\
    \ select sql_id,\n  2  io_cell_offload_eligible_bytes qualifying,\n  3  io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes actual,\n  4  round(((io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,\n\
    \  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes > 0\n\
    \  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ ---------------------------------------------\n6tds0512tv661\
    \  218505216  160899016        73.64 select count(*) from emp\n\nSQL>\nSQL> select\
    \ sql_id,\n  2         projection\n  3  from v$sql_plan\n  4  where sql_id = '&sql_id';\n\
    Enter value for sql_id: 6tds0512tv661\nold   4: where sql_id = '&sql_id'\nnew\
    \   4: where sql_id = '6tds0512tv661'\n\nSQL_ID        PROJECTION\n-------------\
    \ ------------------------------------------------------------\n6tds0512tv661\
    \ (#keys=0) COUNT(*)[22]\n\nSQL>\nSQL> select *\n  2  from table(dbms_xplan.display_cursor('&sql_id','&child_no',\
    \ '+projection'));\nEnter value for sql_id: 6tds0512tv661\nEnter value for child_no:\
    \ 0\nold   2: from table(dbms_xplan.display_cursor('&sql_id','&child_no', '+projection'))\n\
    new   2: from table(dbms_xplan.display_cursor('6tds0512tv661','0', '+projection'))\n\
    \nPLAN_TABLE_OUTPUT\n\nSQL_ID  6tds0512tv661, child number 0\n\nselect count(*)\
    \ from emp\n\nPlan hash value: 2083865914\n\n| Id  | Operation               \
    \    | Name | Rows  | Cost (%CPU)| Time     |\n|   0 | SELECT STATEMENT      \
    \      |      |       |  7460 (100)|          |\n|   1 |  SORT AGGREGATE     \
    \        |      |     1 |            |          |\n|   2 |   TABLE ACCESS STORAGE\
    \ FULL | EMP  |  5000K|  7460   (1)| 00:00:01 |\n\nColumn Projection Information\
    \ (identified by operation id):\n\n1 - (#keys=0) COUNT(*)[22]\n\n23 rows selected.\n\
    \nSQL>\n```\n\n`COUNT()` 查询从 Smart Scan 中获得的节省非常显著。Oracle 只需处理传统配置系统将返回的数据量的大约四分之一。\n\
    \n## 可卸载函数列表\n\n由于 Oracle 数据库中有许多函数，哪些函数可以被卸载呢？Oracle 提供了一个数据字典视图 `V$SQLFN_METADATA`，它正好回答了这个问题。该视图中有一个名为\
    \ `OFFLOADABLE` 的列，它针对数据库中的每一个 Oracle 自带函数，指明其是否可以被卸载。正如您可能猜到的那样，最好在运行 Exadata\
    \ 的 Oracle 新版本或补丁级别上查阅此视图。对于版本 11.2.0.3，有 393 个函数是可卸载的，这个列表无论如何都相当长。以下是 `offloadable_fn_tbl.sql`\
    \ 脚本生成的完整列表的表格输出。"
