  trans: "一个提供的包 `DBMS_RESOURCE_MANAGER` 包含了 `CALIBRATE_IO` 过程，该过程用于在集群上的所有 RAC 实例中生成随机的只读工作负载。此过程接受五个参数：两个输入值（磁盘数量和预估的最大磁盘延迟）以及三个输出变量，用于接收计算得出的最大每秒\
    \ I/O 次数、最大每秒兆字节数和计算出的延迟。可以使用匿名 PL/SQL 块来调用此过程并返回计算得到的指标，如下所示：\n\n```\nSet serveroutput\
    \ on size 1000000\nDeclare\n        Calc_lat        number;\n        Calc_iops\
    \       number;\n        Calc_mbps       number;\nBegin\n        Dbms_resource_manager.calibrate_io(&dsks,&maxlat,\
    \ Calc_iops, Calc_mbps, Calc_lat);\n        Dbms_output.put_line('Max IOPS   \
    \       : '||Calc_iops);\n        Dbms_output.put_line('Max mbytes-per-sec: '||Calc_mbps);\n\
    \        Dbms_output.put_line('Calc. latency     : '||Calc_lat);\nEnd;\n/\n```\n\
    \n如本章前面所述，在激活自动 DOP 之前，必须校准 I/O 系统。对于在 Exadata 系统上运行的每个不同数据库，都必须执行此操作。\n\n![image](img/sq.jpg)\
    \ **注意** 再怎么强调都不为过：I/O 校准是一项资源密集型操作，不应在正经历高负载的系统上运行。这是一项“下班后”操作，运行大约需要 15 分钟或更长时间。当自动\
    \ DOP 功能生效时，你的耐心将会得到回报。\n\n## 检查校准状态\n\n视图 `V$IO_CALIBRATION_STATUS` 会报告此校准是否已经运行。需要校准的数据库在查询\
    \ `V$IO_CALIBRATION_STATUS` 时将显示以下结果：\n\n```\nSQL> select *\n  2  from v$io_calibration_status;\n\
    \nSTATUS        CALIBRATION_TIME\n------------- -----------------------------------------------------------\n\
    NOT AVAILABLE\n\nSQL>\n```\n\n在未运行 I/O 校准的数据库上，本应并行执行的查询将会串行执行。当启用 autotrace 时，执行计划会立即返回一条关于自动\
    \ DOP 计算的信息性消息，在查询执行后可见：\n\n```\nSQL> select count(*)\n  2  from dba_objects\n\
    \  3  /\n\nCOUNT(*)\n-------------------\n51085\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 3660875064\n\nPredicate Information (identified by operation\
    \ id):\n---------------------------------------------------\n   4 - filter(\"\
    O\".\"TYPE#\"<>4 AND \"O\".\"TYPE#\"<>5 AND \"O\".\"TYPE#\"<>7 AND \"O\".\"TYPE#\"\
    <>8\n           AND \"O\".\"TYPE#\"<>9 AND \"O\".\"TYPE#\"<>11 AND \"O\".\"TYPE#\"\
    <>12 AND \"O\".\"TYPE#\"<>13 AND\n           \"O\".\"TYPE#\"<>14 AND \"O\".\"\
    TYPE#\"<>22 AND \"O\".\"TYPE#\"<>87 AND \"O\".\"TYPE#\"<>88 OR\n           BITAND(\"\
