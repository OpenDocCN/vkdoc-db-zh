    Database Server Tools


    There isn’t much to see at the database layer, unfortunately. A single statistic,
    “cell flash cache read hits,” is all that is available. As with the other metrics,
    this is cumulative, because the instance started as reported in V$SYSSTAT and
    for the duration of the current session in V$MYSTAT. The easiest way to measure
    the Smart Flash Cache activity for a SQL statement is to query V$MYSTAT before
    and after the statement is executed. Doing this in SQL*Plus offers the ability
    to save the query results in variables for use after the statement has completed,
    as follows:


