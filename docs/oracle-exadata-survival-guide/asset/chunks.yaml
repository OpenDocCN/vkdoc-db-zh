  raw: '**Arup Nanda** has been an Oracle DBA for more than 18 years (and counting),
    working on all aspects of Oracle database, from modeling, performance tuning,
    backup, and disaster recovery to security and, more recently, Exadata. Currently,
    he is the global database lead at a major multinational corporation near New York,
    managing, among other things, several Exadata installations. Arup has coauthored
    five books, published more than 500 articles on *Oracle Magazine, Oracle Technology
    Network*, and in other publications; presented about 300 sessions at various Oracle
    technology conferences all over the world; and delivered 30 Oracle Celebrity Seminar
    series courses. He is an editor for *SELECT Journal*—the IOUG publication, a member
    of the Board of Directors of the Exadata SIG, an Oracle ACE Director, and a member
    of the Oak Table Network. Acknowledging his professional expertise and involvement
    in the user community, Oracle awarded him the “DBA of the Year” title in 2003
    and “Architect of the Year” in 2012.


    Acknowledgments


    Successes are never the result of a single person’s actions; many seen, and unseen,
    individuals contribute in many ways to ensure completion of a project. With that
    thought in mind, I express my heartfelt gratitude to those who helped me start
    and finish this book. First and foremost, I thank my loving wife, Shari, for giving
    me confidence, feedback, and several severe kicks in the pants to keep me on schedule.
    I wasn’t the most pleasant person to deal with when deadlines loomed and the words
    sometimes wouldn’t flow; she stuck with me and kept me going like no one else
    possibly could. Next are our two wonderful children, Gabi and Zachary, who understood
    that Daddy had more work to do long after the normal workday was over. I know
    it was hard on them to muster the patience they so bravely displayed, especially
    since they were 11 and 8, respectively, when this whole project started. They
    are truly awesome. My coconspirator, Mary, was also a trouper, providing not only
    insight but a much-needed second opinion, which helped tremendously when something
    that made perfect sense to me didn’t quite turn the light on with her. This made
    me step back and seek a different perspective on my work. I think it has made
    for a more focused text, clearing up any ambiguities my tunnel vision might have
    created. Then there’s Kellyn Pot’Vin, who hauled me on to the Board of Directors
    of the Rocky Mountain Oracle Users Group (RMOUG) and sentenced me to be the Social
    Media Director for a year, an honor which caused my wife to laugh. (“You?!? You’re
    not very social.” “Remember, these are Oracle nerds.” “Oh, then you actually stand
    a chance.”) Kellyn’s insistence and persistence paid off handsomely; I have met
    wonderful members of the Oracle community who have been so supportive of this
    effort, including Amy Caldwell, Sarah Cleaver, Rebecca Mitchell, Jeff Smith, and
    Leighton Nelson. To these people, I am deeply and profoundly indebted.


    —David Fitzjarrell


    Introduction


    This book was borne from our personal experiences with managing, configuring,
    and migrating databases and applications to the Exadata platform. Along the way,
    we took notes, tried this, tried that, and eventually came to an understanding
    of what Exadata could do and how it does it. We didn’t go into great detail on
    the inner workings of the system (Kerry Osborne, Randy Johnson, and Tanel Pöder
    have already provided an excellent text at that level), opting instead to provide
    a guide for the working DBA who may not have time to read through and digest a
    “nuts and bolts” book. Thus, this book is designed to lead the DBA through what
    we feel are the most important aspects and concepts of Exadata, without getting
    bogged down in details. We recommend having access to an Exadata machine, so you
    can try the scripts, queries, and commands provided and see the results firsthand.
    Having an interactive experience with Exadata will, we think, make some of the
    concepts easier to understand.


    Our goal in writing this book was to provide experienced Oracle DBAs with the
    tools and knowledge to take on Exadata, hopefully without fear. No attempt is
    made to explain how Oracle works—this is not a “learn Oracle by doing” text. Our
    intent is to leverage the existing knowledge of field-proven and time-tested Oracle
    professionals, so that they can successfully adapt what they already know to the
    Exadata platform.


    CHAPTER 1


    ![image](images/frontdot.jpg)


    Exadata Basics


    Since its introduction in September 2008, Exadata has fast become both a familiar
    term and a familiar presence in the IT/database realm. The system has undergone
    several changes in its short history, from storage solution to complete database
    appliance. Although it is not yet a household name, the number of Exadata installations
    has increased to the point where it will soon become commonplace in data centers
    across the country. So, what *is* Exadata? It might be better to begin by stating
    what Exadata isn’t. Exadata is not


    *   the greatest thing since sliced bread;

    *   the only database machine that can single-handedly eliminate every occurrence
    of contention in your application;

    *   the long-awaited silver bullet to solve all of your other database performance
    problems;

    *   a black box, constructed by the wizards of Middle Earth, understandable only
    to the anointed few.


    What *Is* Exadata?


    Now that you know what Exadata isn’t, let’s discuss what it is. Exadata is a system,
    composed of matched and tuned components providing enhancements available with
    no other configuration, that can improve the performance of the database tier.
    This system includes database servers, storage servers, an internal InfiniBand
    network with switches, and storage devices (disks), all configured by Oracle Advanced
    Customer Support personnel to meet the customer’s requirements. (Changes to that
    configuration, including changing the default storage allocations between the
    data and recovery disk groups, can be made with assistance from Oracle Advanced
    Customer Support.) [Figure 1-1](#9781430260103_Ch01.xhtml#Fig1) illustrates the
    general layout of an Exadata system.


    ![9781430260103_Fig01-01.jpg](images/9781430260103_Fig01-01.jpg)


    [Figure 1-1](#9781430260103_Ch01.xhtml#_Fig1). General layout of an Exadata system


    Can Exadata improve every situation? No, but it wasn’t designed to. Originally
    designed as a data warehouse/business intelligence appliance, the releases from
    V2 on have added Online Transaction Processing (OLTP) applications. Yet not every
    feature of Exadata is applicable to every query, application, or situation that
    may arise. Chances are good that if your application is not suffering from contention
    issues, Exadata may provide reduced response time and better throughput than systems
    using off-the-shelf components.


    Exadata did not start out being what it is today; originally, it was conceived
    as an open-source storage solution for RAC (Real Application Clusters) installations,
    intended to address the problem of transferring large volumes of data across the
    grid infrastructure, known internally within Oracle as SAGE (Storage Appliance
    for Grid Environments). In September 2008, Oracle unveiled the HP Oracle Database
    Machine, spotlighting the Exadata Storage Servers. At that time, Exadata referred
    only to the storage server components, although the HP Oracle Database Machine
    included all of the components found in later releases of the Exadata product.'
