    ![image](images/Table10-5a.jpg)![image](images/Table10-5b.jpg)


    Both reports are beneficial, as they report different sets of monitoring data
    that can be very useful when digging into some performance issues or bugs.


    The CPU report format, showing the columns and their meanings, is found in [Table
    10-1](#9781430260103_Ch10_1.xhtml#Tab1).


    [Table 10-1](#9781430260103_Ch10_1.xhtml#_Tab1). `Iostat` Values Reported in CPU
    Format


    | %user | Shows the percentage of CPU utilization that occurred while executing
    at the user level (application). |

    | %nice | Shows the percentage of CPU utilization that occurred while executing
    at the user level with nice priority. |

    | %system | Shows the percentage of CPU utilization that occurred while executing
    at the system level (kernel). |

    | %iowait | Shows the percentage of time that the CPU or CPUs were idle during
    which the system had an outstanding disk I/O request. |

    | %steal | Shows the percentage of time spent in involuntary wait by the virtual
    CPU or CPUs while the hypervisor was servicing another virtual processor. |

    | %idle | Shows the percentage of time that the CPU or CPUs were idle and the
    system did not have an outstanding disk I/O request. |


    The device report format is shown in [Table 10-2](#9781430260103_Ch10_1.xhtml#Tab2).


