    ## Cell List of Blocks Physically Read


    Originally called `db file parallel read`, on Exadata systems it was renamed to
    more accurately reflect the operations that trigger it. However, on non-Exadata
    systems, the originally named event is the one to which time is recorded. Interestingly,
    this event has nothing to do with parallel data manipulation language (DML) operations.


    This event records time for multi-block reads when the blocks are *not* contiguous.
    This makes it easier to distinguish from contiguous multiblock reads. Again, a
    number of plan operations can trigger this event, as the following list shows:


