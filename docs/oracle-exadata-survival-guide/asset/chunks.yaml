    \  RECOVER DATABASE;\n}\n```\n\nOnce the database is recovered, you can exit RMAN,\
    \ connect with `SQL*Plus`, and open the database. You should now have your database\
    \ migrated to Exadata and ASM. The next step is to drop the old tempfiles and\
    \ re-create them in ASM, as follows:\n\n```\nSQL> ALTER DATABASE TEMPFILE '<existing\
    \ tempfile name>' DROP;\nSQL> ALTER TABLESPACE temp_tbs_name ADD TEMPFILE;\n```\n\
    \nYou will have to drop each tempfile individually. You may script this, if you\
