  trans: "\n请注意 `QUERY HIGH` 和 `QUERY LOW` 压缩更新后结果之间的细微大小差异。真正的差异体现在完成所需更新的总耗时上。对表的第一次更新耗时最长，因为需要完全解压缩数据以完成事务。第二次更新比未压缩表耗时更长，但仍比初始更新耗时少得多。这是在活动表上使用压缩的问题之一。\n\
