    ![image](images/sq.jpg) **Note**  The manner in which the data was loaded set
    the minimum and maximum values for TALENT_CD such that the storage index could
    not ignore any of the blocks, even though there are segments that do not contain
    the desired value.


    The minimum and maximum values stored for an indexed segment don’t guarantee that
    the desired value will be found, just that there is a high probability that the
    value exists in the associated table segment.


    Even though this example was intentionally created to provide such a condition,
    it is also likely that this could occur in a production system, as normally occurring
    data changes (through inserts, updates, and deletes) could create this same sort
    of situation.


    Or Maybe I Didn’t


    Data clustering plays a big part in whether a storage index provides any benefit.
    In the preceding example, great care was taken to load the data in a manner that
    would make a storage index beneficial to the query. Values of interest (those
    in the WHERE clause) were loaded, so that one or more of the 1MB table segments
    storage indexes operate upon contained values that could be skipped. In the next
    example, data was loaded in a fairly fast and convenient manner; the initial table
    population resulted in rows containing the value of interest (SUITABLE_FOR_FRYING
    is ''Yes'') being scattered across the table and thus being found in every 1MB
    storage index segment. Subsequent loading of the data, using a simple “insert
    into . . . select from . . .” syntax, preserved that scattering and rendered the
    storage index basically useless for the given query. (It is a common practice
    to consider that a storage index was “not used” when the “cell physical IO bytes
    saved by storage index” statistic is 0, which isn’t true. The storage index was
    used; there is no question about that, but it provided no benefit in the form
    of reduced I/O, as Oracle could not skip any of the 1MB data segments in its search
    for the desired rows.) Looking at the run where the storage index “key” data was
    scattered across the entire table, the following results were seen:


    ```

