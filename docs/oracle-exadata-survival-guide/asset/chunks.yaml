    \                              260046848\nSALGRADE                           \
    \      65536\n\nElapsed: 00:00:00.01\nSQL>\n```\n\n## 压缩行为分析\n\nThe overall table\
    \ size is still less than it was originally. The partially filled data blocks\
    \ are still in an uncompressed state, contributing to the size increase. As these\
