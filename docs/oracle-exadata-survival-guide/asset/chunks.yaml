  trans: "\n请记住，单元维护会导致存储索引段丢失，迫使单元重新上线后，必须根据卸载的谓词重新创建存储索引。如果这些谓词创建的存储索引段与丢失的不同，那么最初建立的键聚类可能不再有利。当`搜索键`分散在整个表中时，查询可能无法节省任何字节（0\
    \ 字节节省），因为在指定范围内可能不存在不包含所需值的段。相对于`搜索键`聚类的表数据，可以提供不同程度的 I/O 减少，具体取决于搜索键的分组紧密程度。低基数列（例如包含`True`、`False`、`Yes`、`No`或有限范围数值的列）在聚类时比具有广泛取值范围的列或强制执行`Unique`和`Primary\
    \ Key`约束的列表现更好。接下来两节中的示例使用一个低基数列（`SUITABLE_FOR_FRYING`），该列包含“Yes”和“No”两个值之一，来阐释两种情况。\n\
    \n## 我使用了它\n\n要了解存储索引是否为查询提供了任何益处，一个统计信息`cell physical IO bytes saved by storage\
    \ index`将记录存储索引允许 Oracle 跳过的字节数。这是一个累积指标，意味着每当存储索引允许 Oracle 跳过读取当前连接会话（由`V$MYSTAT`报告）或给定会话（在`GV$SESSTAT`中）的数据段时，前值就会增加。（创建新会话或重新建立连接[在`SQL>`提示符下使用`connect\
    \ <user>/<pass>`]将重置会话级计数器。）\n\n为了说明这一点，在一些初始设置（示例中未显示）之后，将执行两个查询，以展示存储索引允许 Oracle\
    \ 跳过数据读取，并且 Oracle 报告的字节节省值确实是累积的。使用`storage_index_ex.sql`脚本生成此输出，在您自己的系统上运行此脚本将显示此处所示的设置和输出，以及由于篇幅而被编辑掉的部分。此脚本生成的日志文件非常大；它确实包含了两组示例，并且只需要一次执行即可提供整套结果。第二个示例在第一个示例之后立即运行，并以重新连接为\
    \ schema 所有者开始，执行相同的两个查询。两个语句之间将重新建立连接，这将显示每个查询的实际节省量。\n\n创建并填充了两个表，然后运行查询；以下是第一次运行的结果：\n\
    \n```\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n\
    \  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\nSQL> select *\n  2  from\
    \ v$mystat\n  3  where statistic# = (select statistic# from v$statname where name\
    \ = 'cell physical\n      IO bytes saved by storage index');\n\nSID STATISTIC#\
    \      VALUE\n---------- ---------- ----------\n      1107        247 1201201152\n\
    \nSQL> select /*+ parallel(4) */\n  2  chicken_id, chicken_name, suitable_for_frying\n\
    \  3  from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCHICKEN_ID\
    \ CHICKEN_NAME         SUI\n---------- -------------------- ---\n  38719703 Frieda\
    \               Yes\n  38719704 Edie                 Yes\n  38719705 Eunice  \
    \             Yes\n...\n  37973451 Eunice               Yes\n  37973452 Fran \
    \                Yes\n\n2621440 rows selected.\n\nSQL> select *\n  2  from v$mystat\n\
    \  3  where statistic# = (select statistic# from v$statname where name = 'cell\
    \ physical\n      IO bytes saved by storage index');\n\nSID STATISTIC#      VALUE\n\
    ---------- ---------- ----------\n      1107        247 2281971712\n\nSQL>\n```\n\
    \n对于第一个查询，大约跳过了 1GB 的数据来提供记录计数；第二个查询额外跳过了 1GB 的表数据。从所示输出中并不明显，因为如前所述，显示的值是累积结果。您可能不需要知道每个查询跳过的字节数，因此累积计数可能正是您想要的。但是，对于未执行智能扫描的查询，累积计数也将保持不变，因此必须仔细关注`V$MYSTAT`查询的输出。如果您确实需要单独的节省数据，那么也可以生成这些结果；在这种情况下，不符合智能扫描条件的查询将返回\
    \ 0 字节总计。如前所述，脚本在查询之间重新连接；这产生了更好地说明存储索引在每个查询基础上提供的 I/O 节省的结果：\n\n```\nSQL> connect\
    \ bing/#######\nConnected.\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3\
    \  from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\n\
    SQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic#\
    \ from v$statname where name = 'cell physical\n      IO bytes saved by storage\
    \ index');\n\nSID STATISTIC#      VALUE\n---------- ---------- ----------\n  \
    \    1233        247 1080770560\n\nSQL> connect bing/#######\nConnected.\nSQL>\
    \ select /*+ parallel(4) */\n  2  chicken_id, chicken_name, suitable_for_frying\n\
    \  3  from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCHICKEN_ID\
    \ CHICKEN_NAME         SUI\n---------- -------------------- ---\n  38719703 Frieda\
    \               Yes\n  38719704 Edie                 Yes\n...\n  37973451 Eunice\
    \               Yes\n  37973452 Fran                 Yes\n\n2621440 rows selected.\n\
    \nSQL>\nSQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic#\
    \ from v$statname where name = 'cell physical\n      IO bytes saved by storage\
    \ index');\n\nSID STATISTIC#      VALUE\n---------- ---------- ----------\n  \
    \    1233        247 1080770560\n\nSQL>\n```\n\n现在，每个查询跳过了多少数据就显而易见了。对于初始运行，加载数据时也跳过了\
    \ 120,430,592 字节。（执行了初始`insert`语句后，使用了一系列“`insert into . . . select . . . from\
    \ . . .`”语句来进一步填充表。）第二次运行显示了存储索引为每个查询提供的实际节省量。\n\nOracle 可以根据存储索引提供的信息跳过表段，但由于索引数据非常基础，可能会出现一些“误报”。Oracle\
    \ 可能发现某个段满足搜索条件，因为搜索值落在该段记录的最小值和最大值之间，但实际上，最小值和最大值掩盖了所需的实际值在该特定段中并不存在的事实。\n\n\
    在这种情况下，Oracle 会读取该段，但最终空手而归，因为没有找到符合确切查询条件的行，尽管存储索引表明可能有。根据表中键的分组紧密程度，可能比预期读取更多的段，这些段不产生任何结果，因为索引值“错误地”表明可能存在一行或多行。在下一个示例中，需要统计`TALENT_CD`为`4`的记录数。数据加载时，将`TALENT_CD`值`3`和`5`放在相同的表段中，其余`TALENT_CD`值加载到剩余段中。这将为从存储索引创建“误报”结果提供条件：\n\
    \n```\nSQL> insert /*+ append */\n  2  into chicken_hr_tab (chicken_name, talent_cd,\
    \ retired, retire_dt, suitable_for_frying, fry_dt)\n  3  select\n  4  chicken_name,\
    \ talent_cd, retired, retire_dt, suitable_for_frying, fry_dt from chicken_hr_tab2\n\
    \  5  where talent_cd in (3,5);\n\n1048576 rows created.\n\nElapsed: 00:01:05.10\n\
    SQL> commit;\n\nCommit complete.\n```\n"
