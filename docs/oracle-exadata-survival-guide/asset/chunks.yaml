    Because you are connected as `cellmonitor`, administrative commands such as `ALTER`,
    `ASSIGN`, `CALIBRATE`, `DROP`, `EXPORT`, and `IMPORT` are not available. These
    are reserved for the `celladmin` user account. `DESCRIBE`, `LIST`, and `SET` are
    available, as well as `SPOOL`, to send output to a file.


    So what can you do as `cellmonitor`? You can perform monitoring tasks to ensure
    the cell is functioning properly. Note the long list of `LIST` commands. They
    are there to report on the important areas of storage cell operation, including
    the Smart Flash Cache. We’ll start out by looking at the Smart Flash Cache.


    ```

    CellCLI> list flashcache attributes all

