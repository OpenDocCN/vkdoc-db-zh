    In the absence of a Smart Scan, the query executed in 3.73 seconds and processed
    the entire 185081856 bytes of data. Because offload processing was disabled, the
    storage cells provided no assistance with the query processing. It is interesting
    to note that the execution plan reports TABLE ACCESS STORAGE FULL, a step usually
    associated with a Smart Scan. The absence of predicate information and the “no
    rows selected” result for the offload bytes query prove that a Smart Scan was
    not executed. Disabling cell offload processing created a noticeable difference
    in execution time, proving the power of a Smart Scan.


    Smart Scan performance can also outshine the performance provided by an index
    for larger volumes of data by allowing Oracle to reduce the I/O by gigabytes,
    or even terabytes, of data when returning rows satisfying the query criteria.  There
    are also cases where a Smart Scan is not the best performer; an index is added
    to the table and the same set of queries is executed a third time, again using
    the smart_scan_ex.sql script:


    ```

    SQL> create index empid_idx on emp(empid);


    Index created.


    SQL>

    SQL> set autotrace on timing on

    SQL>

    SQL> select *

      2  from emp

      3  where empid = 7934;


    EMPID EMPNAME                                      DEPTNO

    ---------- ---------------------------------------- ----------

          7934 Smorthorper7934                                  15


    Elapsed: 00:00:00.01


    Execution Plan


    Plan hash value: 1109982043


    | Id | Operation                   | Name      | Rows  | Bytes | Cost(%CPU)| Time    |


    |  0 | SELECT STATEMENT            |           |     1 |    28 |     4  (0)| 00:00:01|

    |  1 |  TABLE ACCESS BY INDEX ROWID| EMP       |     1 |    28 |     4  (0)| 00:00:01|

    |* 2 |   INDEX RANGE SCAN          | EMPID_IDX |     1 |       |     3  (0)| 00:00:01|


    Predicate Information (identified by operation id):


    2 - access("EMPID"=7934)


    Statistics


    1  recursive calls

      0  db block gets

      5  consistent gets

      2  physical reads

    148  redo size

    684  bytes sent via SQL*Net to client

    524  bytes received via SQL*Net from client

      2  SQL*Net roundtrips to/from client

      0  sorts (memory)

      0  sorts (disk)

      1  rows processed

    SQL>

    SQL> set autotrace off timing off

    SQL>

    SQL>select sql_id,

      2  io_cell_offload_eligible_bytes qualifying,

      3  io_cell_offload_returned_bytes actual,

      4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,
    2) io_saved_pct,

      5  sql_text

      6  from v$sql

      7  where io_cell_offload_returned_bytes> 0

      8  and instr(sql_text, ''emp'') > 0

      9  and parsing_schema_name = ''BING'';


    no rows selected


    SQL>

    ```


    Notice that an index range scan was chosen by the optimizer, rather than offloading
    the predicates to the storage cells. The elapsed time for the index-range scan
    was considerably less than the elapsed time for the Smart Scan, so, in some cases,
    a Smart Scan may not be the most efficient path to the data. This also illustrates
    an issue with existing indexes, as the optimizer may select an index that makes
    the execution path worse, which explains why some Exadata sources recommend dropping
    indexes to improve performance. Although it may eventually be decided that dropping
    an index is best for the overall performance of a query or group of queries, no
    such recommendation is offered here, as each situation is different and needs
    to be evaluated on a case-by-case basis; what’s good for one Exadata system and
    application may not be good for another. The only way to know, with any level
    of certainty, whether or not to drop a particular index is to test and evaluate
    the results in an environment as close to production as possible.


    Smart Scan Optimizations


    A Smart Scan uses various optimizations to accomplish its task. There are three
    major optimizations a Smart Scan implements: Column Projection, Predicate Filtering,
    and storage indexes. Because storage indexes will be covered in detail in the
    next chapter, this discussion will concentrate on the first two optimizations.
    Suffice it to say, for now, that storage indexes are not like conventional indexes,
    in that they inform Exadata where ***not*** to look for data. That may be confusing
    at this point, but it will be covered in depth later. The primary focus of the
    next sections will be Column Projection and Predicate Filtering.


    Column Projection


    What is Column Projection? It’s Exadata’s ability to return only the columns requested
    by the query. In conventional systems using commodity hardware, Oracle will fetch
    the data blocks of interest in their entirety from the storage cells, loading
    them into the buffer cache. Oracle then extracts the columns from these blocks,
    filtering them at the end to return only the columns in the select list. Thus,
    the entire rows of data are returned to be further processed before displaying
    the final results. Column Projection does the filtering *before* it gets to the
    database server, returning only columns in the select list and, if applicable,
    those columns necessary for join operations. Rather than return the entire data
    block or row, Exadata returns only what it needs to complete the query operation.
    This can considerably reduce the data processed by the database servers.'
  trans: "\n# Smart Scan 性能测试与优化\n\n## 性能测试\n\n以下查询用于分析智能扫描（Smart Scan）节省的 I/O 比例：\n\
    \n```sql\nSQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes qualifying,\n\
    \  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,\n\
    \  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
    \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    ```\n\n查询结果如下：\n\n```text\nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n\
    ------------- ---------- ---------- ------------ -------------------------------------\n\
    gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid\
    \ = 7934\n```\n\n根据结果，I/O 节省百分比为`22.97%`，这意味着 Oracle 处理的数据量比未执行智能扫描时减少了近 23%。\n\
    \n## 禁用 Smart Scan\n\n在会话中设置`cell_offload_processing=false`，使用`no_smart_scan_ex.sql`脚本重新执行查询：\n\
    \n```sql\nSQL> alter session set cell_offload_processing=false;\n\nSession altered.\n\
    \nElapsed: 00:00:00.00\nSQL>\nSQL> select *\n  2  from emp\n  3  where empid =\
    \ 7934;\n\nEMPID EMPNAME                                             DEPTNO\n\
    ---------- ---------------------------------------- ----------\n     7934 Smorthorper7934\
    \                                         15\n\nElapsed: 00:00:03.73\n\nExecution\
    \ Plan\n\nPlan hash value: 3956160932\n\n| Id  | Operation                 | Name\
    \ | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT      \
    \    |      |     1 |    28 |  6361   (1)| 00:00:01 |\n|*  1 |  TABLE ACCESS STORAGE\
    \ FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n\n1 - filter(\"EMPID\"=7934)\n\nStatistics\n\n\
    1  recursive calls\n          1  db block gets\n      45227  consistent gets\n\
    \      22593  physical reads\n          0  redo size\n        680  bytes sent\
    \ via SQL*Net to client\n        524  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n\nSQL>\nSQL> set autotrace\
    \ off timing off\nSQL>\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
    \ > 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nno rows selected\n\nSQL>\n```\n\n没有智能扫描时，查询耗时`3.73`秒，处理了全部`185081856`字节的数据。由于禁用了卸载处理，存储单元未提供任何查询处理协助。有趣的是，执行计划报告了`TABLE\
    \ ACCESS STORAGE FULL`，这通常与智能扫描相关。缺少谓词信息以及卸载字节查询的“no rows selected”结果证明，智能扫描并未执行。禁用单元卸载处理造成了明显的执行时间差异，这证明了智能扫描的威力。\n\
    \n对于更大数据量，智能扫描的性能也可能优于索引，它允许 Oracle 在返回满足查询条件的行时，将 I/O 减少数 GB 甚至数 TB。然而，在某些情况下，智能扫描并非最佳选择；例如为表添加索引后，第三次执行相同的查询集（再次使用`smart_scan_ex.sql`脚本）：\n\
    \n## 使用索引\n\n```sql\nSQL> create index empid_idx on emp(empid);\n\nIndex created.\n\
    \nSQL>\nSQL> set autotrace on timing on\nSQL>\nSQL> select *\n  2  from emp\n\
    \  3  where empid = 7934;\n\nEMPID EMPNAME                                   \
    \          DEPTNO\n---------- ---------------------------------------- ----------\n\
    \     7934 Smorthorper7934                                         15\n\nElapsed:\
    \ 00:00:00.01\n\nExecution Plan\n\nPlan hash value: 1109982043\n\n| Id | Operation\
    \                   | Name      | Rows  | Bytes | Cost(%CPU)| Time    |\n\n| \
    \ 0 | SELECT STATEMENT            |           |     1 |    28 |     4  (0)| 00:00:01|\n\
    |  1 |  TABLE ACCESS BY INDEX ROWID| EMP       |     1 |    28 |     4  (0)| 00:00:01|\n\
    |* 2 |   INDEX RANGE SCAN          | EMPID_IDX |     1 |       |     3  (0)| 00:00:01|\n\
    \nPredicate Information (identified by operation id):\n\n2 - access(\"EMPID\"\
    =7934)\n\nStatistics\n\n1  recursive calls\n  0  db block gets\n  5  consistent\
    \ gets\n  2  physical reads\n148  redo size\n684  bytes sent via SQL*Net to client\n\
    524  bytes received via SQL*Net from client\n  2  SQL*Net roundtrips to/from client\n\
    \  0  sorts (memory)\n  0  sorts (disk)\n  1  rows processed\nSQL>\nSQL> set autotrace\
    \ off timing off\nSQL>\nSQL>select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_returned_bytes actual,\n  4  round(((io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,\n\
    \  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes> 0\n\
    \  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nno rows selected\n\nSQL>\n```\n\n请注意，优化器选择了索引范围扫描，而不是将谓词卸载到存储单元。索引范围扫描的耗时远少于智能扫描的耗时，因此，在某些情况下，智能扫描可能并非访问数据的最有效路径。这也说明了现有索引可能带来的问题，即优化器可能选择使执行路径更糟的索引，这解释了为什么一些\
    \ Exadata 资料建议删除索引以提高性能。虽然最终可能决定删除索引对于查询或查询组的整体性能是最佳选择，但此处不提供此类建议，因为每种情况都不同，需要根据具体情况评估；对一个\
    \ Exadata 系统和应用程序有益的做法，可能对另一个并非如此。唯一能够相对确定是否要删除某个索引的方法，是在尽可能接近生产的环境中进行测试并评估结果。\n\
    \n## Smart Scan 优化\n\n智能扫描使用各种优化来完成任务。它实现了三项主要优化：列投影、谓词过滤和存储索引。由于存储索引将在下一章详细讨论，本节将重点讨论前两项优化。目前只需了解，存储索引不同于常规索引，它们告知\
    \ Exadata *不要*在何处查找数据。这一点现在可能令人困惑，但稍后将深入探讨。接下来章节的主要焦点将是列投影和谓词过滤。\n\n### 列投影\n\n\
    什么是列投影？它是 Exadata 仅返回查询所需列的能力。在使用通用硬件的传统系统中，Oracle 会从存储单元完整获取感兴趣的数据块，将它们加载到缓冲区缓存中。然后，Oracle\
    \ 从这些块中提取列，最后进行过滤以仅返回选择列表中的列。因此，整行数据都会返回，以便在显示最终结果之前进行进一步处理。列投影在数据到达数据库服务器*之前*进行过滤，仅返回选择列表中的列，以及（如果适用）连接操作所需的列。Exadata\
    \ 不是返回整个数据块或行，而是仅返回完成查询操作所需的数据。这可以显著减少数据库服务器处理的数据量。\n"
- fmt: "以包含45列的表和包含其中7列的选择列表为例。列投影仅返回这7列，而不是全部45列，从而显著减轻数据库服务器的工作负载。假设在查询中添加一个两列的连接条件，并从另一个包含71列的表中选择另外两列；列投影将返回选择列表中的9列和连接条件中的4列（假设连接列不在选择列表中）。13列的数据量远小于116列（第一个表的45列加上第二个表的71列），这是智能扫描能够如此快速的原因之一。列投影信息可从`V$SQL_PLAN`的`PROJECTION`列或`DBMS_XPLAN`包中获取，因此你可以选择两者中更容易使用的一个；仅当向`DISPLAY_CURSOR`函数传递了“+projection”参数时（如本例所示，来自`smart_scan_ex.sql`），才会返回投影信息，该示例同时使用了两种检索列投影数据的方法：\n\
    \n```\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME\
    \                                      DEPTNO\n---------- ----------------------------------------\
    \ ----------\n      7934 Smorthorper7934                                  15\n\
    \nElapsed: 00:00:00.16\n\nSQL> select sql_id,\n  2         projection\n  3  from\
    \ v$sql_plan\n  4  where sql_id = 'gfjb8dpxvpuv6';\n\nSQL_ID        PROJECTION\n\
    ------------- ----------------------------------------------------------------------------\n\
    gfjb8dpxvpuv6 \"EMPID\"[NUMBER,22], \"EMP\".\"EMPNAME\"[VARCHAR2,40], \"EMP\"\
    .\"DEPTNO\"[NUMBER,22]\n\nSQL>\nSQL> select *\n  2  from table(dbms_xplan.display_cursor('&sql_id','&child_no',\
    \ '+projection'));\nEnter value for sql_id: gfjb8dpxvpuv6\nEnter value for child_no:\n\
    \nPLAN_TABLE_OUTPUT\n-------------------------------------------------------------------------------------------SQL_ID\
    \  gfjb8dpxvpuv6, child number 0\n\nselect * from emp where empid = 7934\n\nPlan\
    \ hash value: 3956160932\n\n| Id  | Operation                 | Name | Rows  |\
    \ Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT          |     \
    \ |       |       |  6361 (100)|          |\n|*  1 |  TABLE ACCESS STORAGE FULL|\
    \ EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - storage(\"EMPID\"=7934)\n       filter(\"EMPID\"=7934)\n\
    \nColumn Projection Information (identified by operation id):\n\n1 - \"EMPID\"\
    [NUMBER,22], \"EMP\".\"EMPNAME\"[VARCHAR2,40],\n    \"EMP\".\"DEPTNO\"[NUMBER,22]\n\
    \n29 rows selected.\n\nSQL>\n```\n\n由于只请求了三列，因此存储服务器仅返回了这三列（由自动跟踪报告的列投影信息部分证明），这使得查询执行效率更高。数据库服务器无需过滤结果集行来仅返回所需的列。\n\
    \n## 谓词过滤\n\n列投影仅从选择列表或连接条件中返回感兴趣的列，而谓词过滤则是Exadata用来仅返回感兴趣行的机制。这种过滤发生在存储单元，从而减少了数据库服务器必须处理的数据量。在智能扫描执行过程中，谓词信息会传递给存储服务器，因此在存储服务器级别执行过滤操作是一个合乎逻辑的选择。由于传输到数据库服务器的数据量减少，数据库服务器CPU的负载也随之降低。前面的示例同时使用了列投影和谓词过滤来快速返回结果集；结合使用这两种功能是一个强大的组合，这是由不匹配的独立组件配置的系统所无法提供的。\n\
    \n## 基本连接\n\n根据查询的不同，连接处理也可以被下推到存储服务器执行，这些连接使用一种称为**bloom filter**的有趣结构进行处理。它们并非新技术，也非Exadata独有，因为Oracle从Oracle数据库10g第2版开始就在查询处理中使用它们，主要用于减少并行查询服务进程之间的流量。什么是bloom\
    \ filter？它以Burton Howard Bloom的名字命名，他在20世纪70年代提出了这个概念，是一种高效的数据结构，用于快速确定一个元素是否有可能属于给定集合。它基于一个位数组，可以进行快速搜索，并返回两种结果之一：元素可能在集合中（可能产生假阳性），或者元素肯定不在集合中。过滤器不会产生假阴性，假阳性的发生率相对较低。bloom\
    \ filter的另一个优势是它们相对于用于类似目的的其他数据结构（自平衡二叉搜索树、哈希表或链表）体积较小。假阳性的可能性需要添加另一个过滤器来从结果中消除它们，但这样的过滤器不会显著增加处理时间，因此相对而言不引人注意。\n\
    \n当在Exadata系统上对查询使用bloom filter时，过滤器谓词**和**存储谓词都会列出被调用的`SYS_OP_BLOOM_FILTER`函数。该函数包含用于消除可能返回的假阳性的额外过滤器。正是存储谓词提供了Exadata上bloom\
    \ filter的真正威力。使用bloom filter在存储服务器级别对表进行预连接，减少了数据库服务器需要处理的数据量，并且可以显著减少给定查询的执行时间。\n\
    \n下面是bloom filter实际应用的一个示例；此输出由执行`bloom_fltr_ex.sql`脚本生成。\n\n```\nSQL> --\nSQL>\
    \ -- 创建示例表\nSQL> --\nSQL> -- 并行创建它们，这是对这些表进行智能扫描所必需的\nSQL> --\nSQL> create table\
    \ emp(\n  2     empid   number,\n  3     empnmvarchar2(40),\n  4     empsal  number,\n\
    \  5     empssn  varchar2(12),\n  6     constraint emp_pk primary key (empid)\n\
    \  7  ) parallel 4;\n\nTable created.\n\nSQL>\nSQL> create table emp_dept(\n \
    \ 2     empid   number,\n  3     empdept number,\n  4     emploc  varchar2(60),\n\
    \  5    constraint emp_dept_pk primary key(empid)\n  6  ) parallel 4;\n\nTable\
    \ created.\n\nSQL>\nSQL> create table dept_info(\n  2     deptnum number,\n  3\
    \     deptnm  varchar2(25),\n  4    constraint dept_info_pk primary key(deptnum)\n\
    \  5  ) parallel 4;\n\nTable created.\nSQL>\nSQL> --\nSQL> -- 向示例表中加载数据\nSQL>\
    \ --\nSQL> begin\n  2          for i in 1..2000000 loop\n  4                 \
    \ insert into emp\n  5                  values(i, 'Fnarm'||i, (mod(i, 7)+1)*1000,\
    \ mod(i,10)||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||mod(i,10)||mod(i,10));\n\
    \  6                  insert into emp_dept\n  7             values(i, (mod(i,8)+1)*10,\
    \ 'Zanzwalla'||(mod(i,8)+1)*10);\n  8                   commit;\n  9         \
    \ end loop;\n 10          insert into dept_info\n 11          select distinct\
    \ empdept, case when empdept = 10 then 'SALES'\n 12                          \
    \       when empdept = 20 then 'PROCUREMENT'\n 13                            \
    \     when empdept = 30 then 'HR'\n 14                                 when empdept\
    \ = 40 then 'RESEARCH'\n 15                                 when empdept = 50\
    \ then 'DEVELOPMENT'\n 16                                 when empdept = 60 then\
    \ 'EMPLOYEE RELATIONS'\n 17                                 when empdept = 70\
    \ then 'FACILITIES'\n 18                                 when empdept = 80 then\
    \ 'FINANCE' end\n 19          from emp_dept;\n\n20  end;\n 21  /\n\nPL/SQL procedure\
    \ successfully completed.\n```"
  raw: 'Take, as an example, a table with 45 columns and a select list that contains
    7 of those columns. Column Projection will return only those 7 columns, rather
    than the entire 45, reducing the database server workload appreciably. Let’s add
    a two-column join condition to the query and another two columns from another
    table with 71 columns; Column Projection will return the nine columns from the
    select list and the four columns in the join condition (presuming the join columns
    are not in the select list). Thirteen columns are much less data than 116 columns
    (the 45 from the first table and the 71 from the second), which is one reason
    Smart Scans can be so fast. Column Projection information is available from either
    the PROJECTION column from V$SQL_PLAN or from the DBMS_XPLAN package, so you can
    choose which of the two is easier for you to use; the projection information is
    returned only if the “+projection” parameter is passed to the DISPLAY_CURSOR function,
    as was done in this example (again from smart_scan_ex.sql), which makes use of
    both methods of retrieving the Column Projection data:


    ```

    SQL> select *

      2  from emp

      3  where empid = 7934;


    EMPID EMPNAME                                      DEPTNO

    ---------- ---------------------------------------- ----------

          7934 Smorthorper7934                                  15


    Elapsed: 00:00:00.16


    SQL> select sql_id,

      2         projection

      3  from v$sql_plan

      4  where sql_id = ''gfjb8dpxvpuv6'';


    SQL_ID        PROJECTION

    ------------- ----------------------------------------------------------------------------

    gfjb8dpxvpuv6 "EMPID"[NUMBER,22], "EMP"."EMPNAME"[VARCHAR2,40], "EMP"."DEPTNO"[NUMBER,22]


    SQL>

    SQL> select *

      2  from table(dbms_xplan.display_cursor(''&sql_id'',''&child_no'', ''+projection''));

    Enter value for sql_id: gfjb8dpxvpuv6

    Enter value for child_no:


    PLAN_TABLE_OUTPUT

    -------------------------------------------------------------------------------------------SQL_ID  gfjb8dpxvpuv6,
    child number 0


