    \nSTATISTIC#        VAL\n---------- ----------\n       605        857\n\nSQL>\n\
    SQL>\nSQL> select &endval - &beginval flash_hits\n  2  from dual;\n\nFLASH_HITS\n\
    ----------\n         2\n\nSQL>\n```\n\n## 性能表现\n\n作为平衡 I/O 子系统的一部分，智能闪存缓存提供了比非\
    \ Exadata 系统可衡量的性能改进。单元单块读取时间可以定期降至 1 毫秒或更低，这比使用固态硬盘 (SSD) 的非 Exadata 系统表现更为出色。主要区别在于\
    \ Exadata 处理更大 I/O 负载并维持此性能水平的能力。由于 Exadata 是一个平衡的系统，拥有匹配且经过调优的组件，在达到 CPU 和/或内存的物理极限之前，性能不会受到影响。\n\
    \n## 注意事项\n\n智能闪存缓存通过缓存频繁访问的表和索引块，提供了高 I/O 每秒速率的能力，允许直接从闪存中读取它们。\n\n智能闪存缓存由每个存储单元的\
    \ 4 个 Sun Flash PCIe 卡组成，每个卡具有 96GB 的闪存存储。对于具有 3 个存储单元的 Exadata 系统，可用的总闪存存储为 1.125TB。这些\
    \ PCIe 卡的预期寿命为两年，因为存储电容器会随时间推移而失去保持电荷的能力。根据 Sun 的说法，可以在不关闭存储单元的情况下单独更换这些卡。然而，Oracle\
    \ 建议在维护前关闭存储单元电源。\n\n智能闪存缓存是一种按单元缓存机制，针对频繁访问的数据进行了优化。对象是否将被考虑用于智能闪存缓存使用，部分取决于创建该对象时设置的\
    \ `CELL_FLASH_CACHE` 存储参数。\n\n写入操作不受此缓存影响。`CELLSRV` 执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后智能闪存缓存决定数据是否要被缓存，使磁盘写入与数据缓存过程无关。\n\
    \n维护了一个已缓存数据的内存中哈希表，因此 Oracle 可以快速确定所需的块是否可以在那里找到。该哈希表列出了未标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。\n\
    \n当源块自缓存数据写入后已更改、需要空间用于当前事务的 I/O、块被标记为 `KEEP` 但已超过额外的 `KEEP` 阈值而未使用，或者它们的生命周期已超过标准\
    \ LRU 阈值时，可能会驱逐缓存的块。\n\n每个配置的闪存磁盘有 32MB 的存储配置为智能闪存日志 (Smart Flash Log)；这总计每个存储单元\
    \ 512MB 的智能闪存日志存储。重做日志写入同时发送到磁盘和智能闪存日志。一旦日志写入器进程 (`LGWR`) 收到写入完成（无论是到重做日志还是智能闪存日志区域）的确认，事务处理就会继续。\n\
    \n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组；这样做需要调整现有智能闪存缓存的大小。可以通过重新配置一个、两个或所有可用存储服务器上的智能闪存缓存来创建一个或多个闪存磁盘集。选择的冗余级别将决定可用的存储空间；最大值为总可用空间的一半，最小值为总可用空间的三分之一。\n\
    \n从存储单元监控智能闪存缓存提供了比从数据库服务器监控更广的指标范围。一个指标，“`cell flash cache read hits`”，是数据库层闪存缓存活动的唯一指标。存储单元提供了\
    \ 30 多个记录智能闪存缓存活动的指标，但遗憾的是，每个单元都必须单独监控。可以编写存储单元监控脚本并在数据库中填充一个外部表，以便可以使用对象名称（而不是对象\
    \ ID）来识别缓存的段。\n"
- fmt: "# CHAPTER 5\n\n## Parallel Query\n\n![image](images/frontdot.jpg)\n\nUnlike\
    \ other areas of Exadata, parallel query execution uses the same Oracle Release\
    \ 11.2 functionality as non-Exadata systems. Because Exadata is, at its heart,\
    \ a data-warehousing system, and efficient handling and processing of data-warehouse\
    \ workloads was a primary design goal, parallel query processing is an important\
    \ feature. Remember that Smart Scans and offloading rely on direct-path reads,\
    \ the same read functionality that is used by parallel query slaves. In Release\
    \ 11.2, Oracle has provided three improvements to the earlier attempts at controlling\
    \ parallel execution. These improvements, along with the processing power of Exadata,\
    \ make this feature more manageable, more scalable, and less likely to saturate\
    \ server resources, such as memory and CPU, than earlier releases of the database.\
    \ The first of those improvements that we will discuss is parallel statement queuing.\n\
    \n### Getting into the Queue\n\nParallel query has been available in Oracle releases\
    \ since version 7, and, when used with care, can significantly improve statement\
    \ performance. On the other hand, when overused, it can bring the database server\
    \ to its knees. Multiple users, all choosing parallel execution, can saturate\
    \ CPU resources to the point that the benefits of parallel query become the curse\
    \ of parallel query. Until Release 11.2, there was no way to control parallel\
    \ execution by multiple users on the same system. That changed with parallel statement\
    \ queuing. This was implemented because Exadata is a system designed to handle\
    \ mixed workloads, allowing both data-warehouse and Online Transaction Processing\
    \ applications to run and ensuring that neither suffers at the hands of the other.\
    \ With parallel statement queuing, Exadata has a way to both separate the different\
    \ types of workloads and also “rein in” parallel statements that otherwise would\
    \ be too resource-intensive for a multiuser system.\n\n### Old School\n\nTo give\
    \ some perspective on how parallel statement queuing has improved parallel query\
    \ performance, it is necessary to examine the tool Oracle provided to manage this\
    \ feature in earlier releases. The `parallel_adaptive_multi_user` parameter is\
    \ quite a powerful tool, but it can create varying performance by deciding, at\
    \ runtime, whether to parallelize a statement or not. It also determines how many\
    \ slaves should be employed for a parallelized query. With this mechanism, the\
    \ parallelism can go down dramatically, depending on the system resources in use\
    \ at the moment the decision is made, which is the time the execution starts.\n\
    \nStatements can go from having 16 or more parallel slaves for one execution to\
    \ having absolutely none the next time the same statement is executed. Remember\
    \ that once the degree of parallelism (`DOP`) is set, it cannot be altered; the\
    \ statement must run to completion at the assigned `DOP`, which may be one. The\
    \ statement also cannot benefit from resources freed during its execution; if\
    \ ten parallel query slaves become available during the serial execution of that\
    \ statement, they cannot be repurposed to provide a higher `DOP` and, as a result,\
    \ a shorter execution time.\n\nAs an example, you have a statement that was assigned\
    \ 24 parallel query slaves the last time it was run, with a resulting execution\
    \ time of 1 minute. A short spike in activity occurs at the time this statement\
    \ starts its next execution, downgrading it to a serial operation. Several seconds\
    \ later, this spike is over; the statement is stuck, executing serially for possibly\
    \ 24 minutes or longer. With no apparent rhyme or reason for this seemingly erratic\
    \ behavior (from the user’s perspective), such inconsistent performance can make\
    \ for unhappy users and very confused, unhappy developers.\n\n### The New Method\n\
    \nParallel adaptive multi user was a good start at controlling parallel execution,\
    \ based on available resources, but version 11.2 introduces parallel statement\
    \ queuing to the mix, allowing parallel execution to be placed on hold, until\
    \ sufficient resources become available.\n\n![image](images/sq.jpg) **Note** It\
    \ is best to set `parallel_adaptive_multi_user` to `FALSE` to prevent these two\
    \ features from conflicting with each other. When both are enabled, we have seen\
    \ parallel queries take much longer to execute.\n\nHow it works is simple, really.\
    \ Enable the feature by setting `parallel_degree_policy` to `AUTO`. Next, set\
    \ `parallel_servers_target` to the number of parallel slaves you want. The easy\
    \ part is that you run your queries; Oracle takes care of the rest for you. In\
    \ basic terms, a statement will be queued if it will require more parallel slaves\
    \ than there are currently available. Once the required number of slaves are freed,\
    \ the statement executes.\n\nThe `V$SQL_MONITOR` and `GV$SQL_MONITOR` views report\
    \ on the execute status of submitted statements; basically, these views report\
    \ that a statement is `DONE` (in some form), `EXECUTING`, or, if parallel statement\
    \ queuing is enabled, `QUEUED`. Given that information, it isn’t difficult to\
    \ see which statements are waiting in the parallel statement queue. The standard\
    \ `EMP` table from the `demobld.sql` script was used, although it was loaded with\
    \ a very large number of records:\n\n```\nSQL> select count(*)\n  2  from emp;\n\
    \nCOUNT(*)\n\nSQL>\n```\n\nWe chose to select the average salary from our large\
    \ version of the `EMP` table from 12 different sessions. We then queried `V$SQL_MONITOR`\
    \ to see how many of those sessions ended up in the queue. The query produced\
    \ the following output:\n\n```\nSQL> select sid, sql_id, sql_exec_id, sql_text\n\
    \  2  from v$sql_monitor monitor\n  3  where status = 'QUEUED'\n  4  order by\
    \ 3;\n\nSID SQL_ID        SQL_EXEC_ID SQL_TEXT\n---------- ------------- -----------\
    \ ------------------------------------\n      1532 5du23va3p3ad0    16777216 select\
    \ avg(sal) from emp\n      1059 5du23va3p3ad0    16777217 select avg(sal) from\
    \ emp\n      1628 5du23va3p3ad0    16777218 select avg(sal) from emp\n       865\
    \ 5du23va3p3ad0    16777219 select avg(sal) from emp\n       205 5du23va3p3ad0\
    \    16777220 select avg(sal) from emp\n      2199 5du23va3p3ad0    16777221 select\
    \ avg(sal) from emp\n      1542 5du23va3p3ad0    16777222 select avg(sal) from\
    \ emp\n       159 5du23va3p3ad0    16777223 select avg(sal) from emp\n      1888\
    \ 5du23va3p3ad0    16777224 select avg(sal) from emp\n      1234 5du23va3p3ad0\
    \    16777225 select avg(sal) from emp\n       705 5du23va3p3ad0    16777226 select\
    \ avg(sal) from emp\n\n11 rows selected.\n\nSQL>\n```\n\nThe `sql_exec_id` is,\
    \ basically, a run number indicating the statement’s position in the queue. It\
    \ is also possible for the `sql_exec_id` to be the same for all queued statements\
    \ (indicating simultaneous execution), if the sum of the parallel resources required\
    \ for execution doesn’t exceed the maximum available for the database.\n\n###\
    \ Control Issues\n\nThere may be times when you want to have some control over\
    \ parallel statement queuing behavior. If you simply turn it on and let it run,\
    \ it’s a first-in, first-out (`FIFO`) queue. It’s possible to bypass the queue\
    \ using a hint. It’s also possible to use parallel statement queuing, even if\
    \ the feature isn’t enabled at the database level.\n\nTwo parameters are available\
    \ that can affect parallel statement queuing, and the foremost of those is `parallel_servers_target`.\
    \ The value for this parameter sets the number of parallel server processes Oracle\
    \ can run before placing statements in the queue. There is a formula for computing\
    \ the default value, as follows:\n\n```\n((4*cpu_count)*parallel_threads_per_cpu)*active\
    \ number of instances\n```\n\nGiven an Exadata X3-2 with the following settings:\n\
    \n`cpu_count` 24\n\n`parallel_threads_per_cpu` 4\n\nand two active instances,\
    \ the default setting would be computed as follows:\n\n```\n((4*24)*4)*2 = 768\n\
    ```"
