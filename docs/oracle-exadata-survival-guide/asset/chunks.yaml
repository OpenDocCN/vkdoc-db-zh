    Exadata Cell Wait Events


    The Oracle wait interface was first expanded in Oracle Release 8.1.x, to provide
    a window into Oracle performance. In subsequent releases, this interface has been
    improved and expanded, making Oracle a very well-instrumented database. Keeping
    tabs on where Oracle spends its time and how much time it consumes per event,
    the wait interface is an invaluable tool with which the database administrator
    (DBA) can diagnose performance issues. With Exadata, this wait interface has been
    expanded even further to include Exadata-specific wait events in support of the
    operations unique to this system. These events, and the actual operations they
    monitor, will be covered in this chapter. We will also cover existing, non-Exadata
    wait events that apply to Exadata operations.


    What is a *wait event* ? It is an event the database is waiting on, such as a
    disk read, that is timed and given a name. In release 11.2.0.3, there are 1150
    named wait events listed in the `V$EVENT_NAME` view, 23 of which reference Exadata-specific
    operations. Of those, 17 are specific to the storage cells. These are the events
    we will cover in this chapter.


    Available Nowhere Else


    Because Exadata is using the same Oracle software available on non-Exadata systems,
    the list of wait events is the same, whether or not you’re using Exadata. The
    difference is that some of these events are populated only on Exadata systems,
    which is the only reason they are available nowhere else.


    Cell Events


    Cell events are, obviously, events that will not be populated on non-Exadata systems
    or systems not using Exadata storage. There are 17 cell-related events in `V$EVENT_NAME`.
