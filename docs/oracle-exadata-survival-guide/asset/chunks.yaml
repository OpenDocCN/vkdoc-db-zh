    Using `dcli`, you can redirect the output to a file. Setting up a script to perform
    this monitoring on a regular basis, writing the output to a dated log file, would
    be a good way to schedule this monitoring through cron.


    Continuing with the monitoring theme, [Chapter 10](#9781430260103_Ch10.xhtml)
    discusses various ways to monitor Exadata at both the database level and the storage
    cell level and includes a discussion on real-time SQL monitoring. Both GUI and
    scripting methods are covered.


    Establishing a baseline is a must, to ensure that any monitoring process you implement
    provides useful and usable information. Without a baseline, you are, at best,
    trying to hit a moving target. The baseline does not need to be established when
    performance is “good”; it simply has to be created to provide a point of reference
    for all subsequent monitoring data.


    The GUI of choice for Exadata, in our view, is Oracle Enterprise Manager 12c (OEM12c),
    with the Diagnostic and Tuning Pack installed. With OEM12c configured in this
    manner, real-time SQL monitoring reports can be generated. Oracle will automatically
    monitor SQL statements run in parallel and also monitor serialized statements
    consuming five seconds or more of combined I/O and CPU time.


    Oracle provides the `GV$SQL`, `GV$SQLSTATS`, and `GV$SQL_MONITOR` views (among
    others), which allow you to generate real-time SQL monitoring reports from within
    SQL*Plus. Also provided is the `DBMS_SQLTUNE.REPORT_SQL_MONITOR` procedure, which
    can generate HTML reports for a given `sql_id`. An example of how to call this
    procedure follows.


    ```

    select dbms_sqltune.report_sql_monitor(session_id=>&sessid, report_level=>''ALL'',type=>''HTML'')
    from dual;

    ```


    The `TYPE` parameter can have one of three values: TEXT, HTML, or, if you have
    an active Internet connection on the server, ACTIVE. The third value generates
    an HTML report that is very similar to the screens in OEM12c.


    You can install the System Monitoring plug-in for Exadata Storage Server that
    configures OEM12c to access the storage cells, returning metric data, so they
    can be monitored from the same place as the database servers. If you do not have
    access to OEM12c, or if the Exadata storage plug-in is not installed, you can
    still monitor the storage cells from the command line. Both [Chapter 9](#9781430260103_Ch09.xhtml)
    and [Chapter 10](#9781430260103_Ch10.xhtml) provide ways to monitor the storage
    cells using command-line utilities. Reference those chapters for more detail and
    examples.


    [Chapter 11](#9781430260103_Ch11.xhtml) introduced storage reconfiguration, a
    topic we felt needed to be discussed, regardless of whether you are or are not
    in need of reallocating your storage between the two major disk groups. As discussed,
    only three steps are necessary to drop the existing storage configuration. It’s
    the rebuilding of that configuration that requires a 26-step process that includes
    disk partitioning, user account creation, grid disk creation, and re-creation
    of the storage cell initialization files on both the storage cells and the database
    servers.


    Preparation is key to successfully changing the storage distribution between the
    `+DATA_<system name>` and `+RECO_<system name>` disk groups. As part of the process,
    the “oracle” O/S account is dropped and re-created on all available database servers
    in the cluster. As part of dropping the “oracle” O/S account, the O/S home directories
    for “oracle” on all available database servers are removed and re-created. Preserving
    those home directories is necessary before any of the actual storage reconfiguration
    steps are executed.


    Once the storage reconfiguration steps have completed successfully, restoring
    the “oracle” O/S user homes is done, as well as reinstalling and reconfiguring
    any OEM agents that may have been lost during the reconfiguration process. The
    SCAN listener may also have to be reconfigured, if you have changed the port it
    is using from the default.


    It is understood that you will need to migrate databases to the Exadata platform,
    and [Chapter 12](#9781430260103_Ch12.xhtml) addressed that task by providing both
    physical and logical methods of migration. Remember that not all systems are the
    same in terms of how memory values are written. Some are considered big-endian
    and others are little-endian. An operating system is one or the other; there is
    no other choice.


    Physical methods include RMAN, physical standby databases, and transportable tablespaces.
    RMAN can allow you to migrate databases from a different platform, by converting
    the data files to the proper endian format. RMAN is also used with the transportable
    tablespace method when the operating systems are of different endian design.


    Logical methods include export and import, database links, and replication, either
    with Streams or by using Golden Gate. Remember that replication imposes some restrictions
    on data types that will migrate. Physical methods of migration may be best.


    Objects can be invalidated during migration. It is a good practice to generate,
    as a reference, a list of invalid objects in the source database, when checking
    the destination database for invalid objects. The `$ORACLE_HOME/rdbms/admin/utlrp.sql`
    script should be run post-migration, to compile invalidated objects.


    Migrating Oracle ERP databases to Exadata can pose unique problems. [Chapter 13](#9781430260103_Ch13.xhtml)
    discusses these migrations. Every ERP database must run from its own Oracle Home.
    Sharing of Oracle Homes between ERP databases is not allowed. This is a long-standing
    Oracle standard. In addition, each of the databases must have a dedicated listener.'
