    Like the OEM reports we discussed earlier, the `HTML` version allows you to hover\
    \ the cursor over a data bar and see the breakdown of I/O requests, database time,\
    \ and wait activity, as shown in [Figure 10-7](#9781430260103_Ch10.xhtml#Fig7).\n\
    \n![9781430260103_Fig10-07.jpg](images/9781430260103_Fig10-07.jpg)\n\n[Figure\
    \ 10-7](#9781430260103_Ch10.xhtml#_Fig7). Time breakdown from `DBMS_SQLTUNE.REPORT_SQL_MONITOR`\
    \ HTML report\n\nIf your Exadata system has Internet access and you are running\
    \ Oracle 11.2.0.x, you can use a third option for the `type` parameter, `'ACTIVE'`,\
    \ which generates an HTML-type report with active content that looks like the\
    \ screens from OEM. [Figure 10-8](#9781430260103_Ch10.xhtml#Fig8) illustrates\
    \ how this type of report appears.\n\n![9781430260103_Fig10-08.jpg](images/9781430260103_Fig10-08.jpg)\n\
    \n[Figure 10-8](#9781430260103_Ch10.xhtml#_Fig8). Active `DBMS_SQLTUNE.REPORT_SQL_MONITOR`\
    \ report\n\nAs good as the reports generated with SQL Monitoring, AWR, ASH (Active\
    \ Session History), and `DBMS_SQLTUNE` are, there is a limit to their effectiveness.\
    \ By design, SQL Monitoring starts recording data after the I/O time, CPU time,\
    \ or both combined exceed a five second limit; this usually means that only the\
    \ longer-running queries and statements get monitored, even when you use the `/*+\
    \ MONITOR */` hint. This leads back to the monitoring scripts and actions for\
    \ databases, where AWR, Statspack, and ASH are not available. Those scripts and\
    \ queries can still be useful with Exadata, especially when short-running queries\
    \ are being examined, and those queries usually use `V$SQL` and, in more recent\
    \ implementations, `V$SQLSTATS`.\n\nFor years, DBAs have relied on `V$SQL` to\
    \ report data such as number of executions, buffer gets, disk reads, or parse\
    \ calls. Looking at the definition of `V$SQL`, we find a wealth of data available.\n\
