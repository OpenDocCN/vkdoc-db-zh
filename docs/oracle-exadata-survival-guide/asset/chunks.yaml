- fmt: "作为回顾，`io_cell_offload_eligible_bytes`列报告了在查询执行期间可以卸载到存储单元的数据字节数。`io_cell_offload_returned_bytes`列报告了通过常规I/O路径返回的字节数。这两个值之间的差值提供了查询执行期间实际卸载的字节数。使用这两个指标可以证明执行了智能扫描。\n\
    \n另外两个列也可以提供关于智能扫描和存储索引使用情况的信息：`cell physical IO bytes saved by storage index`和`cell\
    \ physical IO interconnect bytes returned by smart scan`。正如[第3章](#9781430260103_Ch03.xhtml)所述，`cell\
    \ physical IO bytes saved by storage index`报告的内容如其名称所示，即因为在智能扫描期间存储索引允许Oracle绕过那些1MB块而未被读取的总字节数。以下是[第3章](#9781430260103_Ch03.xhtml)中的一个示例，供复习参考：\n\
    \n```sql\nSQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic#\
    \ from v$statname where name = 'cell physical IO bytes saved by storage index');\n\
    \nSID STATISTIC#      VALUE\n---------- ---------- ----------\n      1107    \
    \    247 1201201152\n\nSQL>\n```\n\n该值是在会话级别从`V$MYSTAT`报告的，需要记住此统计信息在会话持续期间是累积的。在查询执行前后查询`V$MYSTAT`将提供一个差值，显示该特定查询节省的字节数。\n\
    \n`cell physical IO interconnect bytes returned by smart scan`报告从智能扫描操作返回的实际字节数。`V$SQLSTATS`报告此值，以及另外两个值`physical_read_bytes`和`physical_write_bytes`，它们可用于提供智能扫描的“效率”（为了方便表述）。此主题在[第10章](#9781430260103_Ch10.xhtml)中有更深入的介绍，但需要注意的是，当使用不符合智能扫描执行条件的排序或索引访问路径时，这种“效率”可能超过100%。\n\
    \n了解语句等待的内容也能提供关于智能扫描执行的信息。直接路径读通常表示智能扫描活动，但并非总是如此。LOB、索引组织表、非全扫描或快速全扫描的索引扫描，以及通过`rowid`取表，也可能使用直接路径读，但不符合智能扫描的条件。因此，即使在执行计划中已注意到存储访问并记录了直接路径读等待，Oracle处理查询或语句时也可能并未使用智能扫描。\n\
    \n表明未使用智能扫描的Exadata等待事件是`cell multiblock physical read`和`cell single-block physical\
    \ read`。`cell multiblock physical read`等待不仅适用于表，也适用于块大小大于数据库块大小的LOB以及安全文件读。当块大小小于或等于数据库块大小时，将使用`cell\
    \ single block physical read`。如[第7章](#9781430260103_Ch07.xhtml)所述，`cell single\
    \ block physical read`可应用于索引访问路径，但由于此类等待在索引全扫描和索引快速全扫描期间不会发生，因此未执行智能扫描。\n\n用户关心时间，特别是响应时间，因此性能调整的第一步应该是Exadata等待接口。观察查询和语句的时间花费在哪里，可以帮助定位性能不佳的领域。了解时间消耗在哪里，为您解决此类性能问题提供了初步方向，并可能证明数据库并非故障所在。\n\
    \n## 动态计数器\n\n`V$SYSSTAT`和`V$SESSTAT`视图提供了丰富的动态性能计数器，可帮助您诊断性能问题。根据会话花费时间的位置，这些视图可以帮助定位可能需要注意的领域。例如，如果Oracle使用了大量CPU资源，一个可能的攻击途径是查看给定会话的逻辑读计数如何增加。`V$SYSSTAT`提供了以下与读相关的计数器列表：\n\
    \n```sql\nSQL> select name, value\n  2  from v$sysstat\n  3  where name like '%read%'\n\
    \  4  /\n```"
  raw: 'As a review, the `io_cell_offload_eligible_bytes` column reports the bytes
    of data that *can* be offloaded to the storage cells during query execution. The
    `io_cell_offload_returned_bytes` column reports the number of bytes returned by
    the regular I/O path. The difference between these two values provides the bytes
    actually offloaded during query execution. Using these two metrics can prove that
    a Smart Scan was executed. Two other columns can also provide information on Smart
    Scan and storage index usage. These are `cell physical IO bytes` `saved by storage
    index` and `cell physical IO interconnect bytes returned by smart scan`. Covered
    in [Chapter 3](#9781430260103_Ch03.xhtml), `cell physical IO bytes saved by storage
    index` reports exactly what it says, the total bytes that weren’t read during
    a Smart Scan because the storage index allowed Oracle to bypass those 1MB blocks.
    An example from [Chapter 3](#9781430260103_Ch03.xhtml) follows as a refresher:


    ```

    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical IO bytes saved by storage index'');


    SID STATISTIC#      VALUE

    ---------- ---------- ----------

          1107        247 1201201152


    SQL>

    ```


    This value is reported at the session level from `V$MYSTAT`, and it’s necessary
    to remember that this statistic is cumulative for the duration of the session.
    Querying `V$MYSTAT` before and after query execution will provide a delta showing
    the bytes saved for that particular query.


    The `cell physical IO interconnect bytes returned by smart scan` reports the actual
    bytes returned from a Smart Scan operation. `V$SQLSTATS` reports this value, along
    with two other values, `physical_read_bytes` and `physical_write_bytes`, which
    can be used to provide a Smart Scan “efficiency,” for want of a better term. This
    topic is covered in more depth in [Chapter 10](#9781430260103_Ch10.xhtml), but
    be aware that this “efficiency” can exceed 100 percent when sorts or index access
    paths that don’t qualify for Smart Scan execution are used.


    Knowing what the statement was waiting on also provides information on Smart Scan
    execution. Direct-path reads usually indicate Smart Scan activity, but not always.
    LOBs, index-organized tables, index scans that are not full or fast full scans,
    along with table fetch by rowid, may also use direct-path reads but do not qualify
    for Smart Scans. Thus, even though storage access has been noted in the execution
    plan and direct-path read waits have been recorded, a Smart Scan may not be the
    access method used by Oracle to process the query or statement.


    Exadata wait events that signal that Smart Scans were not used are cell multiblock
    physical read and cell single-block physical read. The cell multiblock physical
    read wait applies not only to tables but to LOBs where the chunk size is greater
    than the database block size and Securefile reads. When the chunk size is less
    than or equal to the database block size, cell single block physical reads will
    be used. As discussed in [Chapter 7](#9781430260103_Ch07.xhtml), the cell single
    block physical read can apply to index access paths, but because such waits do
    not occur during index full scans and index fast full scans, a Smart Scan was
    not executed.


    Users care about time, with respect to response time, so the first area where
    performance tuning should begin is the Exadata wait interface. Seeing where time
    is being spent by queries and statements can help pinpoint areas of poor performance.
    Knowing where the time sinks are gives you initial direction in addressing such
    performance problems and can possibly prove that the database is not at fault.


    Dynamic Counters


    The `V$SYSSTAT` and `V$SESSTAT` views provide a wealth of dynamic performance
    counters to aid you in diagnosing performance issues. Depending on where the session
    is spending its time, these views can help pinpoint areas that may require attention.
    As an example, if Oracle is using considerable CPU resources, one possible avenue
    of attack would be to see how the logical reads count increases for a given session.
    `V$SYSSTAT` provides the following list of read-related counters:


    ```

    SQL> select name, value

      2  from v$sysstat

      3  where name like ''%read%''

      4  /'
