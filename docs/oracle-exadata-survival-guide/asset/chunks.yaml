    There are 25 sessions running that same statement, all with different monitoring
    information. For Exadata, one of the key pieces of information is the `IO_INTERCONNECT_BYTES`,
    which indirectly reports the offload efficiency. If the sum of `PHYSICAL_READ_BYTES`
    and `PHYSICAL_WRITE_BYTES` equals the value in `IO_INTERCONNECT_BYTES`, the query
    or statement reaped the benefits of offloading with an efficiency of 100 percent.
    As we’ve pointed out before, ratios and efficiencies are relative numbers. But
    this ratio does give you a reasonable idea how much of the data was handled by
    offloading, which saves the database layer processing time. Notice that for every
    row in the results, the offload_pct is 100\. You won’t always see 100 percent
    offload efficiency, as multipart queries may have sections that will offload and
    sections that won’t, as the following output illustrates.


    ```

    INST   SID  PLAN_HASH ELAPSED   CPU_TM FETCH IO_ICON_BYT TL_BYT_PRC OFFLD_PCT
    STATUS

