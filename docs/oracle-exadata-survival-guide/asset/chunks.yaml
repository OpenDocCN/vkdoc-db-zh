    \         FC_IO_RQ_R_SKIP         FLASHCACHE      1,010,251,273 IO requests\n\
    \         FC_IO_RQ_R_SKIP_SEC     FLASHCACHE      19.4 IO/sec\n         FC_IO_RQ_W\
    \              FLASHCACHE      1,096,966,059 IO requests\n         FC_IO_RQ_W_SEC\
    \          FLASHCACHE      170 IO/sec\nCellCLI>\n\n对于智能闪存缓存，收集的不仅仅是性能指标。您可以使用\
    \ `LIST FLASHCACHECONTENT` 命令查看缓存中的内容。若要查看可用的属性或用于筛选输出的属性，可以描述 `FLASHCACHECONTENT`\
    \ 对象：\n\nCellCLI> describe flashcachecontent\n        cachedKeepSize\n       \
    \ cachedSize\n        dbID\n        dbUniqueName\n        hitCount\n        hoursToExpiration\n\
    \        missCount\n        objectNumber\n        tableSpaceNumber\n\n可以通过 `dbUniqueName`\
    \ 或 `dbID` 来指定特定的数据库。`objectNumber` 和 `tableSpaceNumber` 属性是特定于某个 `dbUniqueName`/`dbID`\
    \ 的，因此应与 `dbUniqueName` 或 `dbID` 结合使用。例如，要查看 `DBM` 数据库对象的唯一数据库名称、对象编号、KEEP大小、缓存大小、命中次数和未命中次数，可以使用以下命令：\n\
    \nCellCLI> list flashcachecontent where dbUniqueName = 'DBM' and hitcount > 99\
    \ attributes dbUniqueName, objectNumber, cachedKeepSize, cachedSize, hitcount,\
    \ misscount\n         DBM     2       0       172032          1889    350\n  \
    \       DBM     8       0       81920           168     7\n         DBM     104\
    \     0       622592          170     48\n         DBM     225     0       2654208\
    \         382     247\n         DBM     227     0       1081344         173  \
    \   77\n         DBM     268     0       1859584         770     25\n        \
    \ DBM     271     0       65536           298     5\n         DBM     272    \
    \ 0       65536           383     4\n         DBM     421     0       2064384\
    \         8120    772\n         DBM     424     0       589824          2391 \
    \   63\n         DBM     425     0       122880          372     17\n        \
    \ DBM     466     0       196608          612     37\n         DBM     469   \
    \  0       131072          462     4\n         ...\n         DBM     48306   0\
    \       32768           242     120\n         DBM     48406   0       196608 \
    \         102     12\n         DBM     48464   0       237568          116   \
    \  110\n         DBM     48466   0       1220608         247     104\n       \
    \  DBM     48663   0       802816          142     52\n         DBM     48705\
    \   0       917504          101     20\n         DBM     48840   0       2334720\
    \         170     31\n         DBM     48972   0       2138112         176   \
    \  104\n         DBM     4294967294      0       376832          25674712    \
    \    181405\nCellCLI>\n\n默认情况下，`LIST FLASHCACHECONTENT` 命令会报告 `dbID`、`tableSpaceNumber`\
    \ 和 `objectNumber`。若要返回其他属性，需要使用 `attributes` 子句在命令中列出它们，如本例所示。\n\n请注意，在存储单元级可用的所有属性中，对象名称并不在其中。这可以通过在数据库服务器上查询\
    \ `DBA_OBJECTS` 来轻松报告，使用 `CellCLI` 报告的 `objectNumber`，该编号映射到 `DATA_OBJECT_ID`\
    \ 列：\n\nSQL> select owner,  object_type, object_name\n  2  from dba_objects\n\
    \  3  where data_object_id = 5888;\n\nOWNER                OBJECT_TYPE       \
    \  OBJECT_NAME\n-------------------- ------------------- --------------------------------\n\
    SYS                  INDEX               WRI$_ADV_MSG_GRPS_IDX_01\nSQL>\n\n可以编写一个脚本来生成\
    \ `LIST FLASHCACHECONTENT` 命令的输出，并将其放入数据库服务器上的文本文件中，例如：\n\n```\n/usr/bin/ssh celladmin@myexa1cel01-priv.7-11.com\
    \  \"cellcli -e list flashcachecontent where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
    \n/usr/bin/ssh celladmin@myexa1cel02-priv.7-11.com  \"cellcli -e list flashcachecontent\
    \ where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
    \n/usr/bin/ssh celladmin@myexa1cel03-priv.7-11.com  \"cellcli -e list flashcachecontent\
    \ where dbUniqueName = '$1' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize\"\
    \n```\n\n可以使用第二个脚本来执行第一个脚本并将输出发送到文件：\n\n```\n/home/oracle/bin/cellcli_flashcache_mon_nohdrs.sh\
    \ $1 > /home/oracle/ext_tbls/flash_mon.txt\n```\n\n感兴趣的数据库名称通过命令行传递给第二个脚本。生成的文件随后可用于创建外部表，该表可与\
    \ `DBA_OBJECTS` 视图关联，以按对象名称报告智能闪存缓存活动。例如：\n\nSQL> create or replace directory\
    \ admin_dat_dir as '/home/oracle/ext_tbls';\n\nDirectory created.\n\nSQL> create\
    \ or replace directory admin_log_dir as '/home/oracle/logs';\n\nDirectory created.\n\
    \nSQL> create or replace directory admin_bad_dir as '/home/oracle/bad';\n\nDirectory\
    \ created.\n\nSQL>\nSQL> CREATE TABLE flashmon_ext\n  2                      (db_name\
    \     varchar2(12),\n  3                       object_id   number,\n  4      \
    \                 hitct       number,\n  5                       missct      number,\n\
    \  6                       cachesz     number\n  7                      )\n  \
    \      ORGANIZATION EXTERNAL\n        (\n          TYPE ORACLE_LOADER\n      \
    \    DEFAULT DIRECTORY admin_dat_dir\n          ACCESS PARAMETERS\n          (\n\
    \            records delimited by newline\n            badfile admin_bad_dir:'flashmon_ext%a_%p.bad'\n\
    \            logfile admin_log_dir:'flashmon_ext%a_%p.log'\n            fields\
    \ terminated by whitespace\n            missing field values are null\n      \
    \      ( db_name, object_id, hitct, missct, cachesz\n            )\n         \
    \ )\n          LOCATION ('flash_mon.txt')\n        )\n        PARALLEL\n     \
    \   REJECT LIMIT UNLIMITED;\n\nTable created.\n\nSQL>\n\n第一个目录包含从 `CellCLI` 和\
    \ `LIST FLASHCACHECONTENT` 命令生成的文本文件。接下来的两个目录用于日志文件和坏文件，这些文件可能由 `SQL*Loader` 生成。最后，我们创建外部表。由于文本文件不应更改名称或位置，生成新文件不会导致外部表失效。因此，数据可以随时刷新，而外部表仍然可用。\n\
    \n创建外部表后，编写查询以将 `object_name` 映射到 `object_id` 是一项简单的任务：\n\nSQL> select f.db_name,\
    \ o.object_name, f.hitct, f.missct, f.cachesz\n  2  from flashmon_ext f left outer\
    \ join dba_objects o on (o.data_object_id = f.object_id);"
