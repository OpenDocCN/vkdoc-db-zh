    report


    As good as the reports generated with SQL Monitoring, AWR, ASH (Active Session
    History), and `DBMS_SQLTUNE` are, there is a limit to their effectiveness. By
    design, SQL Monitoring starts recording data after the I/O time, CPU time, or
    both combined exceed a five second limit; this usually means that only the longer-running
    queries and statements get monitored, even when you use the `/*+ MONITOR */` hint.
    This leads back to the monitoring scripts and actions for databases, where AWR,
    Statspack, and ASH are not available. Those scripts and queries can still be useful
    with Exadata, especially when short-running queries are being examined, and those
    queries usually use `V$SQL` and, in more recent implementations, `V$SQLSTATS`.


    For years, DBAs have relied on `V$SQL` to report data such as number of executions,
    buffer gets, disk reads, or parse calls. Looking at the definition of `V$SQL`,
    we find a wealth of data available.


