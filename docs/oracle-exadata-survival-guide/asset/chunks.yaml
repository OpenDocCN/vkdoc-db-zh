    SQL> -- update to the HCC compressed data\nSQL> --\nSQL> select table_name, compression,\
    \ compress_for\n  2  from user_tables;\n\nTABLE_NAME                     COMPRESS\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nDEPT   \
