    \n## 第四阶段\n\n恭喜，您已完成 Exadata 系统的存储重新配置。如果您在示例中使用了 `SizeArr` 设置，查看 `V$ASM_DISKGROUP`\
    \ 时，您应该会看到类似以下的输出：\n\n```\nSYS> select name, free_mb, usable_file_mb\n  2  from\
