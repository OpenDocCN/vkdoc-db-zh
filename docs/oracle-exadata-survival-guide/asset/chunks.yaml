    \                 FLASHCACHE      12,592,252 MB\n   FC_IO_BY_R_MISS_SEC      \
    \       FLASHCACHE      0.891 MB/sec\n   FC_IO_BY_R_SEC                  FLASHCACHE\
    \      21.193 MB/sec\n   FC_IO_BY_R_SKIP                 FLASHCACHE      567,179,945\
    \ MB\n   FC_IO_BY_R_SKIP_SEC             FLASHCACHE      3.681 MB/sec\n   FC_IO_BY_W\
    \                      FLASHCACHE      22,170,046 MB\n   FC_IO_BY_W_SEC      \
    \            FLASHCACHE      4.028 MB/sec\n   FC_IO_ERRS                     \
    \ FLASHCACHE      0\n   FC_IO_RQKEEP_R                  FLASHCACHE      0 IO requests\n\
    \   FC_IO_RQKEEP_R_MISS             FLASHCACHE      0 IO requests\n   FC_IO_RQKEEP_R_MISS_SEC\
    \         FLASHCACHE      0.0 IO/sec\n   FC_IO_RQKEEP_R_SEC              FLASHCACHE\
