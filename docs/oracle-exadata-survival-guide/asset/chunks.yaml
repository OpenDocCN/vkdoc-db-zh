    Virtual Columns


    Virtual columns are a welcome addition to Oracle. They allow tables to contain
    values calculated from other columns in the same table. An example would be a
    TOTAL_COMP column made up of the sum of salary and commission. These column values
    are not stored physically in the table, so an update to a base column of the sum,
    for example, would change the resulting value the virtual column returns. As with
    any other column in a table, a virtual column can be used as a partition key,
    used in constraints, or used in an index, and statistics can also be gathered
    on them. Even though the values contained in a virtual column aren’t stored with
    the rest of the table data, they (or, rather, the calculations used to generate
    them) can be offloaded, so Smart Scans are possible. This is illustrated by running
    smart_scan_virt_ex.sql. The following is the somewhat abbreviated output.


