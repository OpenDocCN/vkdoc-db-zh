    使用 `dcli`，您可以将输出重定向到一个文件。设置一个脚本来定期执行此监控，并将输出写入带日期的日志文件，是通过 `cron` 调度此监控的好方法。


    延续监控的主题，[第 10 章](#9781430260103_Ch10.xhtml) 讨论了在数据库级别和存储单元级别监控 Exadata 的各种方法，并包括了实时
    SQL 监控的讨论。涵盖了 GUI 和脚本方法。


    建立基线是必须的，以确保您实施的任何监控过程都能提供有用且可用的信息。没有基线，您充其量只是在试图击中一个移动的目标。基线不需要在性能“良好”时建立；它只需要被创建，为所有后续的监控数据提供一个参考点。


    在我们看来，Exadata 的首选 GUI 是 Oracle Enterprise Manager 12c (OEM12c)，并安装了 Diagnostic
    and Tuning Pack。以这种方式配置的 OEM12c 可以生成实时 SQL 监控报告。Oracle 将自动监控并行运行的 SQL 语句，也会监控合并
    I/O 和 CPU 时间超过五秒的序列化语句。


    Oracle 提供了 `GV$SQL`、`GV$SQLSTATS` 和 `GV$SQL_MONITOR` 视图（以及其他视图），允许您从 SQL*Plus
    内部生成实时 SQL 监控报告。还提供了 `DBMS_SQLTUNE.REPORT_SQL_MONITOR` 过程，该过程可以为给定的 `sql_id` 生成
    HTML 报告。下面是如何调用此过程的示例。


    ```

    select dbms_sqltune.report_sql_monitor(session_id=>&sessid, report_level=>''ALL'',type=>''HTML'')
    from dual;

    ```


    `TYPE` 参数可以有三个值之一：TEXT、HTML，或者，如果您的服务器上有活动的互联网连接，则可以是 ACTIVE。第三个值生成的 HTML 报告与
    OEM12c 中的屏幕非常相似。


    您可以安装 Exadata Storage Server 的 System Monitoring 插件，该插件配置 OEM12c 访问存储单元，返回指标数据，以便可以从与数据库服务器相同的位置进行监控。如果您无法访问
    OEM12c，或者未安装 Exadata 存储插件，您仍然可以从命令行监控存储单元。[第 9 章](#9781430260103_Ch09.xhtml) 和
    [第 10 章](#9781430260103_Ch10.xhtml) 都提供了使用命令行实用程序监控存储单元的方法。请参考这些章节以获取更多详细信息和示例。


    [第 11 章](#9781430260103_Ch11.xhtml) 介绍了存储重新配置，我们认为无论您是否需要在两个主要磁盘组之间重新分配存储，都需要讨论这个主题。正如所讨论的，只需要三个步骤即可删除现有的存储配置。重建该配置则需要一个包含磁盘分区、用户帐户创建、grid
    disk 创建以及在存储单元和数据库服务器上重新创建存储单元初始化文件的 26 步过程。


    准备工作是成功更改 `+DATA_<system name>` 和 `+RECO_<system name>` 磁盘组之间存储分布的关键。作为此过程的一部分，“oracle”
    操作系统账户在集群中所有可用的数据库服务器上被删除并重新创建。作为删除 “oracle” 操作系统账户的一部分，“oracle” 在所有可用数据库服务器上的操作系统主目录将被删除并重新创建。在执行任何实际的存储重新配置步骤之前，保留这些主目录是必要的。


    一旦存储重新配置步骤成功完成，就需要恢复 “oracle” 操作系统用户主目录，并重新安装和重新配置在重新配置过程中可能丢失的任何 OEM 代理。如果您已将
    SCAN 监听器的端口从默认值更改，则可能还需要重新配置它。


    理解您需要将数据库迁移到 Exadata 平台，[第 12 章](#9781430260103_Ch12.xhtml) 通过提供物理和逻辑迁移方法来解决该任务。请记住，并非所有系统在内存值的写入方式上都是相同的。一些被认为是大端（big-endian），另一些是小端（little-endian）。一个操作系统是其中之一；没有其他选择。


    物理方法包括 RMAN、物理备用数据库和可传输表空间。RMAN 可以通过将数据文件转换为正确的字节序格式，让您从不同的平台迁移数据库。当操作系统的字节序设计不同时，RMAN
    也与可传输表空间方法一起使用。


    逻辑方法包括导出和导入、数据库链接以及复制，无论是使用 Streams 还是使用 Golden Gate。请记住，复制对要迁移的数据类型施加了一些限制。物理迁移方法可能是最佳的。


    对象在迁移过程中可能会失效。在检查目标数据库中的无效对象时，生成源数据库中无效对象的列表作为参考是一个好习惯。应在迁移后运行 `$ORACLE_HOME/rdbms/admin/utlrp.sql`
    脚本以编译无效对象。


    将 Oracle ERP 数据库迁移到 Exadata 可能带来独特的问题。[第 13 章](#9781430260103_Ch13.xhtml) 讨论了这些迁移。每个
    ERP 数据库必须在其自己的 `Oracle Home` 中运行。不允许 ERP 数据库之间共享 `Oracle Home`。这是一项长期存在的 Oracle
    标准。此外，每个数据库都必须有一个专用的监听器。'
