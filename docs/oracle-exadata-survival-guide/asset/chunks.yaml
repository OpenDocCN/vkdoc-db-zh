- fmt: '# Oracle数据库迁移至Exadata：诊断目录与恢复方法


    ## 诊断目录结构恢复

    这将恢复迁移数据库的`diag`目录结构至Exadata系统。剩下的工作是将已复制的`init.ora`或spfile中的`diagnostic_dest`、`background_dump_dest`、`core_dump_dest`和`user_dump_dest`值更改为新创建的路径。在此过程中，还必须创建本地归档日志目标，并且对该位置字符串的任何必要更改也必须在`init.ora`或spfile中完成。


    如果迁移的是RAC数据库，这些步骤必须在该数据库将运行实例的所有节点上执行。为了更好地说明，假设此TEST数据库是一个双节点RAC数据库。在数据库节点1和数据库节点2上，都必须归档`diag`目标。然后，节点1的`tar`归档文件将被复制到Exadata数据库节点1，节点2的`tar`归档文件将被复制到Exadata数据库节点2。每个节点都需要运行恢复步骤，并且每个`init.ora`或spfile副本都必须修改以反映任何位置变更。


    ## 恢复至Exadata的两种方式

    恢复数据库至Exadata可以通过两种方式完成：一是使用最近备份的备份片进行简单的还原与恢复会话；二是使用`duplicate database`命令，这需要作为辅助实例连接到源数据库。我们假设，如果您能将备份片从源服务器复制到Exadata，那么您也拥有一个有效的SQL*Net连接到源数据库。我们将从一个基本的还原与恢复场景开始。


    ### 方法一：备份还原与恢复

    如前所述，第一步是确保备份片的可用性。假设它们已在Exadata系统上可用。准备好`init.ora`或spfile后，有必要从当前备份中还原控制文件。记下控制文件备份片的名称，然后执行以下命令：


    ```sql

    RMAN> restore controlfile from ''<backup piece name>'';

    ```


    您应看到以下输出：


    ```

    Starting restore at 27-JUL-13

     using channel ORA_DISK_1


    channel ORA_DISK_1: restoring control file

     channel ORA_DISK_1: restore complete, elapsed time: 00:00:02

     Finished restore at 27-JUL-13

    ```


    现在，您可以启动并装载数据库，为还原和恢复做准备。如果源数据库是RAC数据库，则需要在开始还原和恢复之前将`cluster_database`参数设置为`false`。这是因为数据库必须以独占模式装载才能成功还原。从这一步开始，就是一个标准的还原与恢复场景，假设`init.ora`或spfile中的所有配置参数都列出了Exadata系统上的正确位置，那么应该可以顺利完成。如果您在迁移前将`cluster_database`设置为`false`，那么在恢复完成后需要将其设置回`true`。


    ### 方法二：从源库克隆

    您可以选择从源数据库克隆数据库。`init.ora`或spfile必须从源数据库复制，以便数据库可以在Exadata系统上以`nomount`模式启动。同样，如果迁移的是RAC数据库，`cluster_database`参数必须在开始克隆前设置为`false`。


    克隆过程使用RMAN的`duplicate database`命令。以下示例命令展示了如何将远程服务器上的mytest数据库复制到Exadata上名为test的数据库（两个数据库都使用ASM）：


    ```sql

    connect target sys/<password>@mytest

    connect auxiliary /

    run {

      sql ''alter session set optimizer_mode=rule'';

      allocate auxiliary channel c1 type disk ;

      allocate auxiliary channel c2 type disk ;

      allocate auxiliary channel c3 type disk ;

      allocate auxiliary channel c4 type disk ;

      allocate auxiliary channel c5 type disk ;

      allocate auxiliary channel c6 type disk ;

      duplicate target database to ''test''

            db_file_name_convert=(''+DATA'',''+DATA_MYEXA1'')

            logfile

               GROUP 11 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 12 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 13 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 14 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M ;

    }

    ```


    ## 监控与进度查看

    也可以编写一个Shell脚本来完成此操作，使其更容易从单个会话中运行和监控进度。Shell脚本示例如下：


    ```bash

    export NLS_DATE_FORMAT=''Mon DD YYYY HH24:MI:SS''

    DATESTAMP=`date ''+%y%m%d%H%M''`

    MSGLOG=/home/oracle/clone/logs/dup_mytest_${DATESTAMP}.log


    $ORACLE_HOME/bin/rman msglog $MSGLOG append << EOF

    connect target sys/<password>@mytest

    connect auxiliary /

    run {

      sql ''alter session set optimizer_mode=rule'';

      allocate auxiliary channel c1 type disk ;

      allocate auxiliary channel c2 type disk ;

      allocate auxiliary channel c3 type disk ;

      allocate auxiliary channel c4 type disk ;

      allocate auxiliary channel c5 type disk ;

      allocate auxiliary channel c6 type disk ;

      duplicate target database to ''test''

            db_file_name_convert=(''+DATA'',''+DATA_MYEXA1'')

            logfile

               GROUP 11 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 12 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 13 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 14 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M ;

    }

    EOF

    ```


    此脚本将在目标数据库已启动至`nomount`状态后运行，并以后台的“不挂断”模式运行。如果此脚本被命名为`clone_test_from_mytest.sh`并位于`/home/oracle/clone`目录中，那么运行它的命令如下：


    ```bash

    $ nohup $HOME/clone/clone_test_from_mytest.sh &

    ```


    克隆过程现在将在后台运行，控制权将返回到Shell提示符，因此您可以通过生成的日志文件监控进度。可以通过以下命令完成：


    ```bash

    $ cd $HOME/clone/logs

    $ ls -ltr *mytest*

    ...

    dup_mytest_201307271343.log

    $ tail -f dup_mytest_201307271343.log

    ```


    `tail -f`命令用于持续读取正在被写入的文件内容，以便您可以实时查看新条目。所说明的脚本也可用于刷新现有的目标数据库。如果使用Oracle托管文件（在Exadata上即如此），则需要在开始克隆之前删除目标数据库的现有文件，因为复制过程不会覆盖数据文件。所有其他步骤将如本节前面所述执行。


    ## 使用RMAN迁移的优势

    使用RMAN将数据库迁移至Exadata的一个很好的理由是，您可以在需要时更改数据文件的“字节序”。Exadata使用Linux，一个小端操作系统，但您可能正从AIX（一个大端系统）迁移。这将要求更改数据文件格式，而RMAN可以为您完成此任务。您将需要可用的外部存储来存放从源数据库转换出的数据文件，因为Exadata上没有足够的文件系统存储空间。此过程的第一步是查看支持哪些平台，`V$TRANSPORTABLE_PLATFORM`视图提供了此信息，如下所示：


    ```sql

    SQL> select platform_name, endian_format

      2  from v$transportable_platform;

    ```'
  raw: 'This will restore the `diag` directory structure for the migrated database
    to the Exadata system. All that remains is to change the `diagnostic_dest`, `background_dump_dest`,
    `core_dump_dest`, and `user_dump_dest` values to the newly created location in
    the copied `init.ora` or spfile. During this process, the local archivelog destination
    also has to be created, and any necessary changes to that location string have
    to be made to the `init.ora` or spfile. If this is a RAC database being migrated,
    these steps will have to be performed on all nodes where this database will have
    running instances. To better explain this, presume this TEST database is a two-node
    RAC database. On database node 1 and on database node 2, the `diag` destination
    will have to be archived. Then the `tar` archive for node 1 will be copied to
    Exadata database node 1, and the `tar` archive for node 2 will be copied to Exadata
    database node 2\. Each node will require the restore step to be run, and each
    copy of the `init.ora` or spfile will have to be modified to reflect any location
    changes.


    Restoring the database to Exadata can be accomplished in two ways: by a simple
    restore-and-recovery session using only the backup pieces from the most recent
    backup, or by using the `duplicate database` command, which requires connecting
    to the source database as the auxiliary. We will presume that if you are able
    to copy the backup pieces from the source server to Exadata, you also have a valid
    SQL*Net connection to the source database. We will begin with a basic restore-and-recover
    scenario.


    As mentioned previously, the first step is to ensure the availability of the backup
    pieces. It is presumed they are available on the Exadata system. With the `init.ora`
    or spfile in place, it is necessary to restore the control files from the current
    backup. Make note of the control file backup piece name, then issue the following
    command:


    ```

    RMAN> restore controlfile from ''<backup piece name>'';

    ```


    You should see the following output:


    ```

    Starting restore at 27-JUL-13

     using channel ORA_DISK_1


    channel ORA_DISK_1: restoring control file

     channel ORA_DISK_1: restore complete, elapsed time: 00:00:02

     Finished restore at 27-JUL-13

    ```


    Now you can start and mount the database in preparation for the restore and recovery.
    If the source database is a RAC database, it will be necessary to set the `cluster_database`
    parameter to `false` before starting the restore and recovery. This is because
    the database must be mounted exclusive for the restore to be successful. From
    this point, it is a standard restore-and-recovery scenario, which should complete
    without error, presuming all of the configuration parameters in the `init.ora`
    or spfile are listing the correct locations on the Exadata system. If you set
    `cluster_database` to `false` before beginning the migration, you will have to
    set it back to `true` once the recovery is complete.


    You may choose to clone the database from the source. The `init.ora` or spfile
    will have to be copied from the source database, so that the database can be started
    nomount on the Exadata system. Again, if this is a RAC database being migrated,
    the `cluster_database` parameter has to be set to `false` before starting the
    clone.


    The clone process uses the `duplicate database` command to RMAN. Example commands
    for this process to duplicate the mytest database on a remote server to a database
    named test on Exadata follow (both databases use ASM):


    ```

    connect target sys/<password>@mytest

    connect auxiliary /

    run {

      sql ''alter session set optimizer_mode=rule'';

      allocate auxiliary channel c1 type disk ;

      allocate auxiliary channel c2 type disk ;

      allocate auxiliary channel c3 type disk ;

      allocate auxiliary channel c4 type disk ;

      allocate auxiliary channel c5 type disk ;

      allocate auxiliary channel c6 type disk ;

      duplicate target database to ''test''

            db_file_name_convert=(''+DATA'',''+DATA_MYEXA1'')

            logfile

               GROUP 11 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 12 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 13 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 14 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M ;

    }

    ```


    A shell script can also be written for this, making it easier to run and monitor
    the progress from a single session. The shell script would appear as in the following
    example:


    ```

    export NLS_DATE_FORMAT=''Mon DD YYYY HH24:MI:SS''

    DATESTAMP=`date ''+%y%m%d%H%M''`

    MSGLOG=/home/oracle/clone/logs/dup_mytest_${DATESTAMP}.log


    $ORACLE_HOME/bin/rman msglog $MSGLOG append << EOF

    connect target sys/<password>@mytest

    connect auxiliary /

    run {

      sql ''alter session set optimizer_mode=rule'';

      allocate auxiliary channel c1 type disk ;

      allocate auxiliary channel c2 type disk ;

      allocate auxiliary channel c3 type disk ;

      allocate auxiliary channel c4 type disk ;

      allocate auxiliary channel c5 type disk ;

      allocate auxiliary channel c6 type disk ;

      duplicate target database to ''test''

            db_file_name_convert=(''+DATA'',''+DATA_MYEXA1'')

            logfile

               GROUP 11 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 12 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 13 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M,

               GROUP 14 ( ''+DATA_MYEXA1'',''+RECO_MYEXA1'' ) SIZE 512M ;

    }

    EOF

    ```


    This script would be run after the destination database has been started nomount
    and would be run in the background in no-hang-up mode. If this script were named
    `clone_test_from_mytest.sh` and located in the `/home/oracle/clone` directory,
    the command to do this would be as follows:


    ```

    $ nohup $HOME/clone/clone_test_from_mytest.sh &

    ```


    The duplicate process will now be running, and control will return to the shell
    prompt, so you can monitor the progress through the generated log file. This would
    be done with the following commands:


    ```

    $ cd $HOME/clone/logs

    $ ls -ltr *mytest*

    ...

    dup_mytest_201307271343.log

    $ tail -f dup_mytest_201307271343.log

    ```


    The `tail -f` command is used to continually read the contents of a file that
    is actively being written, so you can see the entries as they occur. The script
    illustrated can also be used to refresh an existing destination database. If Oracle
    Managed Files are being used (they are on Exadata), it will be necessary to delete
    the existing files for the destination database before beginning the clone, because
    the data files won’t be overwritten by the duplication process. All other steps
    will be executed as described previously in this section.


    One good reason for using RMAN to migrate databases to Exadata is the fact that
    you can change the “endian-ness” of the data files if you need to. Exadata is
    using Linux, a little-endian operating system, but you may be migrating from AIX,
    a big-endian system. This will require that the data-file format be changed, and
    RMAN can do this task for you. You will need external storage available for the
    converted data files from the source database, because there isn’t sufficient
    file-system storage available on Exadata. The first step in this process is to
    see which platforms are supported, and the `V$TRANSPORTABLE_PLATFORM` view provides
    this information, as follows:


    ```

    SQL> select platform_name, endian_format

      2  from v$transportable_platform;'
