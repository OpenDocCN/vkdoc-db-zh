    \nExadata在数据库层和存储层都提供了良好的监控，提供了大量可用指标，报告系统的许多方面。选择报告哪些指标是一项重要的任务，可以防止您在数据洪流中迷失方向。\n\
    \n为了使监控有效，必须建立一个基线，这样您就有了一个已知的参考点来与后续的监控运行进行比较。与基线进行比较提供了一个坚实的起点，用于衡量性能改进和问题。没有这样的基线，每次分析都是针对一个移动的目标，使得任务比原本需要的更加困难。"
  raw: '| Device: | This column gives the device (or partition) name, which is displayed
    as hdiskn, with 2.2 kernels, for the nth device. It is displayed as devm-n, with
    2.4 kernels, where m is the major number of the device and n a distinctive number.
    With newer kernels, the device name as listed in the /dev directory is displayed.
    |

    | tps | Indicates the number of transfers per second that were issued to the device.
    A transfer is an I/O request to the device. Multiple logical requests can be combined
    into a single I/O request to the device. A transfer is of indeterminate size.
    |

    | Blk_read/s | Indicates the amount of data read from the device expressed in
    a number of blocks per second. Blocks are equivalent to sectors with 2.4 kernels
    and newer and, therefore, have a size of 512 bytes. With older kernels, a block
    is of indeterminate size. |

    | Blk_wrtn/s | Indicates the amount of data written to the device, expressed in
    a number of blocks per second. |

    | Blk_read | The total number of blocks read. |

    | Blk_wrtn | The total number of blocks written. |

    | kB_read/s | Indicates the amount of data read from the device, expressed in
    kilobytes per second. |

    | kB_wrtn/s | Indicates the amount of data written to the device, expressed in
    kilobytes per second. |

    | kB_read | The total number of kilobytes read. |

    | kB_wrtn | The total number of kilobytes written. |

    | MB_read/s | Indicates the amount of data read from the device, expressed in
    megabytes per second. |

    | MB_wrtn/s | Indicate the amount of data written to the device expressed in megabytes
    per second. |

    | MB_read | The total number of megabytes read. |

    | MB_wrtn | The total number of megabytes written. |

    | rrqm/s | The number of read requests merged per second that were queued to the
    device. |

    | wrqm/s | The number of write requests merged per second that were queued to
    the device. |

    | r/s | The number of read requests that were issued to the device per second.
    |

    | w/s | The number of write requests that were issued to the device per second.
    |

    | rsec/s | The number of sectors read from the device per second. |

    | wsec/s | The number of sectors written to the device per second. |

    | rkB/s | The number of kilobytes read from the device per second. |

    | wkB/s | The number of kilobytes written to the device per second. |

    | rMB/s | The number of megabytes read from the device per second. |

    | wMB/s | The number of megabytes written to the device per second. |

    | avgrq-sz | The average size (in sectors) of the requests that were issued to
    the device. |

    | avgqu-sz | The average queue length of the requests that were issued to the
    device. |

    | await | The average time (in milliseconds) for I/O requests issued to the device
    to be served. This includes the time spent by the requests in queue and the time
    spent servicing them. |

    | svctm | The average service time (in milliseconds) for I/O requests that were
    issued to the device. |

    | %util | Percentage of CPU time during which I/O requests were issued to the
    device (bandwidth utilization for the device). Device saturation occurs when this
    value is close to 100 percent. |

    | ops/s | Indicates the number of operations that were issued to the mount point
    per second. |

    | rops/s | Indicates the number of read operations that were issued to the mount
    point per second. |

    | wops/s | Indicates the number of write operations that were issued to the mount
    point per second. |


    The basic device report provides the tps, Blk_read/s, Blk_wrtn/s, Blk_read, and
    the Blk_wrt values. The remainder of the list in [Table 10-2](#9781430260103_Ch10_1.xhtml#Tab2)
    is displayed in the extended device report. You should not be seeing large await
    times with a properly functioning Exadata system. On systems we manage, the largest
    await times we see are about 20 to 25 milliseconds for the physical disks and
    less than 1 millisecond for the flash disks. If you’re seeing await times in the
    hundreds of milliseconds or longer on a regular basis for a given disk, further
    investigation is warranted, as the unit might be suffering from a firmware mismatch
    or impending device failure.


    Because the database servers don’t directly access the storage media, running
    an `iostat` device report to diagnose disk read/write issues won’t provide any
    useful information regarding the ASM storage. However, don’t forget that the database
    servers utilize CPU for all transactions, so an `iostat` CPU report should be
    generated when you generate a CPU report for the storage cells. By doing so, you
    minimize the chances of missing CPU-related issues that may occur only on the
    database server.


    The device names reported by `iostat` are those found in the /dev hierarchy of
    directories on the server being monitored. Which cell disk is mapped to which
    device is reported by the CellCLI command list cell disk, specifying the name
    and deviceName attributes, as follows:


    ```

    CellCLI> list celldisk attributes name, deviceName

             CD_00_myexa1cel04       /dev/sda

             CD_01_myexa1cel04       /dev/sdb

             CD_02_myexa1cel04       /dev/sdc

             CD_03_myexa1cel04       /dev/sdd

             CD_04_myexa1cel04       /dev/sde

             CD_05_myexa1cel04       /dev/sdf

             CD_06_myexa1cel04       /dev/sdg

             CD_07_myexa1cel04       /dev/sdh

             CD_08_myexa1cel04       /dev/sdi

             CD_09_myexa1cel04       /dev/sdj

             CD_10_myexa1cel04       /dev/sdk

             CD_11_myexa1cel04       /dev/sdl

             FD_00_myexa1cel04       /dev/sdv

             FD_01_myexa1cel04       /dev/sdw

             FD_02_myexa1cel04       /dev/sdx

             FD_03_myexa1cel04       /dev/sdy

             FD_04_myexa1cel04       /dev/sdz

             FD_05_myexa1cel04       /dev/sdaa

             FD_06_myexa1cel04       /dev/sdab

             FD_07_myexa1cel04       /dev/sdac

             FD_08_myexa1cel04       /dev/sdr

             FD_09_myexa1cel04       /dev/sds

             FD_10_myexa1cel04       /dev/sdt

             FD_11_myexa1cel04       /dev/sdu

             FD_12_myexa1cel04       /dev/sdn

             FD_13_myexa1cel04       /dev/sdo

             FD_14_myexa1cel04       /dev/sdp

             FD_15_myexa1cel04       /dev/sdq


    CellCLI>

    ```


    The report shown should only have to be run once per storage cell on your Exadata
    system, provided you don’t upgrade it to the next available configuration or if
    your Exadata system is a Full Rack. System upgrades, from Quarter Rack to Half
    Rack or Half Rack to Full Rack, will require you to run the report again, so that
    the new device mappings can be seen.


    Knowing this information makes it easier to associate the device statistics reported
    by `iostat -d` to ASM disks and flash disks. Low-level I/O problems you might
    encounter can now be tracked and diagnosed by combining the output from the two
    utilities.


    Things to Know


    Exadata is well-instrumented across both the database and storage tiers, offering
    a large number of available metrics reporting on many aspects of the system. Choosing
    which metrics to report is an important task to prevent you from getting lost
    in an avalanche of data.


    For monitoring to be effective, a baseline must be established, so that you have
    a known reference point to compare subsequent monitoring runs to. Comparing to
    a baseline provides a solid starting point from which to measure performance improvements
    and problems. Without such a baseline, every analysis is against a moving target,
    making the task much harder than it needs to be.'
