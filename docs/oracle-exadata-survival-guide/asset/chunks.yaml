    ## 压缩技术细节


    有三个通用的压缩级别，其中两个需要额外的许可证：`Basic`、`OLTP` 和 `Hybrid Columnar Compression` (`HCC`)。


    `HCC` 有两种类型（`QUERY` 和 `ARCHIVE`），每种类型又有两个子类型（`HIGH` 和 `LOW`），从而提供了四个不同的 `HCC`
    级别。通常，`QUERY` 类型的压缩适用于 somewhat active 的数据，而 `ARCHIVE` 压缩则适用于查询频率相当低且不会更新的数据。


    `HCC` 通过收集具有相似数据的行并将它们压缩到一个压缩单元（`Compression Unit`, `CU`）中来实现其功能。每个单元由多个数据块组成，这些数据块包含了整个
    `CU` 中的完整行数据。这使得 Oracle 返回数据变得更容易、更高效，因为只需要访问一个 `CU` 就能返回完整的行。


    压缩级别因压缩类型而异。`Basic` 提供的压缩比最低，而 `ARCHIVE HIGH` 在压缩时提供最大的空间节省。


    将数据加载到压缩表中通常需要并行处理和/或直接路径加载（后者由 `SQL*Loader` 提供）。`/*+ append */` 提示可以使插入操作并行化，允许它们在插入时被压缩。加载压缩表可能比加载未压缩表花费更长的时间。


    在执行时间方面，查询是一个混合体，因为 `Smart Scans` 可以通过将解压缩活动卸载到存储单元来加快对压缩数据的查询。不使用 `Smart Scans`
    的对压缩数据的查询可能比对相同未压缩数据的查询运行时间更长（而且很可能确实如此）。


    对压缩表的更新会导致表的大小增加。`Basic` 压缩没有自动重新压缩的机制，因此使用此方法的表如果频繁更新，将需要定期重新压缩。`OLTP` 压缩会自动重新压缩已满的数据块，为更多未压缩数据腾出空间。`HCC`
    压缩在数据更新后会静默地回退到 `OLTP`，因此原始压缩级别会丢失，但 `OLTP` 级别的压缩仍然保留，包括对满数据块的自动压缩。


    压缩比率可以通过 `DBMS_COMPRESSION.GET_COMPRESSION_RATIO` 过程进行估计，在许多情况下，它与用户数据上观察到的压缩比率一致。高度可压缩的数据可能会在估计和实际压缩比率之间显示出巨大差异，因此如果没有得到
    Oracle 预测的确切结果，也不必惊慌。


