- fmt: "# CHAPTER 9\n\n![image](images/frontdot.jpg)\n\n## Storage Cell Monitoring\n\
    \nThere are three of these counters, where `______` can be either `user`, `CELLSRV`,\
    \ or time zone. These counters indicate how many times a Smart Scan was initiated\
    \ but converted to regular block I/O mode. When this happens, the blocks are passed\
    \ through to the database servers and bypass cell processing. Smart Scan is actually\
    \ reading the blocks but doing no local cell processing on them, sending them\
    \ on to the database server for processing. Unless there are memory issues on\
    \ the cells, you shouldn’t see these counters increase, as pass-through processing\
    \ shouldn’t be occurring. If these counters start incrementing, it is a good sign\
    \ that there are issues at the storage-cell level that need to be investigated.\n\
    \n## Cell Metrics\n\n**cell physical IO bytes sent directly to DB node to balance\
    \ CPU usage**\n\nThis counter records how many times the cell CPU usage was so\
    \ high that Oracle chose to fall back to pass-through mode, making the database\
    \ servers perform regular block I/O to reduce the CPU load on the storage cells.\
    \ Normally, you shouldn’t see this counter increase. Again, if it does start incrementing,\
    \ it’s a sign of problems at the storage-cell level that have to be diagnosed.\
    \ In older versions of Exadata, this counter was named `cell physical IO bytes\
    \ pushed back due to excessive CPU on cell`.\n\n**chained rows processed by cell**\n\
    \nChained rows can be a problem in any database but especially so in Exadata,\
    \ where disk groups are striped across all available disks and accessed by every\
    \ available storage cell. In a non-Exadata database not using ASM, a chained or\
    \ continued row will be in another block but will likely be on the same disk as\
    \ the head of the chain. With ASM, and Exadata, the next piece of the row could\
    \ be on another disk accessed by another storage cell. Remember that the storage\
    \ cells do not communicate with each other, so when Oracle encounters a chained\
    \ row, a Smart Scan will fall back to regular block I/O at the database layer,\
    \ so the chained row can be processed. This is more efficient for chained-row\
    \ processing, but it does slow down Smart Scans. The more chained rows there are,\
    \ the slower the Smart Scan will be. If a Smart Scan can get the data it needs\
    \ from the head row piece, then the Smart Scan won’t lose any speed, and processing\
    \ will appear to flow as it normally does. Should Oracle need to access any other\
    \ piece of that chained row, then regular block I/O will be necessary, slowing\
    \ down the Smart Scan.\n\nThis statistic, `chained rows processed by cell`, reports\
    \ on the chained rows that were processed within a storage cell, that is, where\
    \ the row pieces (or at least the ones Oracle needed to return results) are located\
    \ within the storage accessed by a given storage cell. This is known as inter-block\
    \ chaining, where the row piece is located in the same data block as the head\
    \ row. This is a special case of row chaining for rows with more than 255 columns.\
    \ The next piece is in the same block as the head and can be fetched with no additional\
    \ effort.\n\n**chained rows rejected by cell**\n\nThis counter records the chained\
    \ rows where the next piece is not in the same block or cell, as described in\
    \ the previous section. This statistic is incremented in, apparently, special\
    \ cases, as we have not seen it incremented very often in the systems we manage.\
    \ When this is incremented, the Smart Scan falls back to regular block I/O to\
    \ process the row.\n\n**chained rows skipped by cell**\n\nThis is the statistic\
    \ most often incremented when a Smart Scan has to revert to regular block I/O.\
    \ Again, it’s incremented when a chained row is found and the remaining pieces\
    \ reside across the entire storage stripe, spanning storage cells in the process.\
    \ It isn’t clear when the previous counter or this counter should be incremented\
    \ in such situations. We have found that this counter is most often incremented\
    \ when Smart Scans revert to regular block I/O to process chained rows.\n\n##\
    \ SQL Statement Performance\n\nIt is important to know where an SQL statement\
    \ spends its time during execution. `V$SQL`, `V$SQL_MONITOR`, `V$SQL_PLAN_MONITOR`,\
    \ and `V$ACTIVE_SESSION_HISTORY` are good views to use to analyze SQL statement\
    \ performance. An example using `V$SQL` follows, showing how the query benefited\
    \ from Smart Scan optimizations:\n\n```\nSQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
    \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6\
    \  185081856   42510928        22.97 select * from emp where empid = 7934\n\n\
    SQL>\n```\n\nNote the following columns used from `V$SQL`:\n\n*   `io_cell_offload_eligible_bytes`\n\
    *   `io_cell_offload_returned_bytes`\n\nThese two columns tell you how many bytes\
    \ qualified for offload and how many bytes were actually returned as a result\
    \ of Smart Scan offloading. The query provided computes the I/O bytes saved as\
    \ a percentage of the total eligible bytes, so you can see how efficient the Smart\
    \ Scan execution was for the query in question.\n\n## Things to Know\n\nThe intent\
    \ of this chapter was not an exhaustive performance-tuning reference for Exadata,\
    \ but, rather, an overview of what metrics and counters are available, what they\
    \ mean, and when you should consider using them.\n\nThe `cell` metrics provide\
    \ insight into statement performance and how Exadata executes statements. Dynamic\
    \ counters such as `cell blocks processed by data layer` and `cell blocks processed\
    \ by index layer` show how efficient the storage cells are in their processing.\
    \ These counters are incremented every time a storage cell can complete data-layer\
    \ and index-layer processing without passing data back to the database layer.\
    \ Two reasons for the cells to pass data back to the database servers are consistent-read\
    \ processing requiring undo blocks (regular block I/O) and chained-row processing\
    \ where the chained pieces span storage cells. While the first condition can’t\
    \ be controlled entirely (transactions can be so large as to exceed the automatic\
    \ block-cleaning threshold), the second, chained rows, can be addressed and possibly\
    \ corrected.\n\nThe `cell num fast response sessions` and `cell num fast response\
    \ sessions continuing to smart scan` counters reveal the number of times Oracle\
    \ chose to defer a Smart Scan in favor of regular block I/O as an attempt to return\
    \ the requested data with a minimum of work (the first listed counter) and how\
    \ many times Oracle actually started a Smart Scan after the fast response session\
    \ failed to return the requested data. These can give you insight into the nature\
    \ of the statements submitted to your Exadata databases, by showing how often\
    \ Smart Scans were averted because a small regular block I/O operation returned\
    \ the requested data.\n\n`V$SQL` also provides data that can be used to determine\
    \ statement efficiency in the `io_cell_offload_eligible_bytes` and `io_cell_offload_returned_bytes`\
    \ columns. These two columns can be used to calculate the percentage savings effected\
    \ by a Smart Scan for a given query."
