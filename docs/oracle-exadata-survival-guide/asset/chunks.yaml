    \                  FLASHCACHE      326 IO/sec\n```\n\n可以筛选并报告 `CELL_FLASH_CACHE`\
    \ 存储子句设置为 `KEEP` 的对象的指标，例如：\n\n```\nCellCLI> list metriccurrent where objectType\
    \ = 'FLASHCACHE' and name like '.*KEEP.*'\n         FC_BYKEEP_OVERWR         \
