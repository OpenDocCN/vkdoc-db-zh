    ********************************************************************************\n\
    ```\n\n在这个语句中，值得关注的等待是 `cell single block physical read`，鉴于其总耗时（以秒为单位报告）。执行计划给了我们一个线索，这可能是一个需要与\
    \ `INDEX RANGE SCAN` 步骤一起考虑的等待。请记住，使用 `INDEX RANGE SCAN` 会使该语句不符合 Smart Scan 执行的条件。另请注意，这里没有使用并行执行。考虑到该语句的总耗时，它本应符合自动并行度（Auto\
    \ Degree of Parallelism）的条件。使用并行执行很可能通过将 I/O 分布到多个并行查询从属进程上来改善该语句的性能，从而减少总的等待时间。\n\
    \n## 补充说明\n\n我们已经在第 2 章中介绍了与 Smart Scan 相关的查询计划。回顾那部分内容总是有帮助的。\n\n有三个计划步骤可以指示可能的\
    \ Smart Scan 活动：\n\n*   `TABLE ACCESS STORAGE FULL`\n*   `INDEX STORAGE FULL SCAN`\n\
    *   `INDEX STORAGE FAST FULL SCAN`\n\n在本章前面，我们提到过，计划步骤中的 `STORAGE` 一词仅表示可能发生 Smart\
    \ Scan 执行，因为没有直接路径读取（direct-path reads），就不会触发 Smart Scan。然而，执行计划可以为性能调优提供一个良好的起点。执行计划步骤中缺少\
    \ `STORAGE` 则表明 Smart Scan *没有*发生。如果你检查某个给定语句的计划并在某个表或索引访问步骤中找到了 `STORAGE` 关键字，你可以使用\
    \ `V$SQL` 和 `GV$SQL` 中的数据来验证 Smart Scan 的执行情况。如第 2 章所述，这些视图中至少有两列提供了关于 Smart Scan\
    \ 对查询或语句有多大益处的信息。我们介绍过的两列是 `io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`。我们还提供了一个可以计算实现的\
    \ I/O 节省百分比的查询，这在本章前面的“性能计数器和指标”部分也再次说明过。\n\n## 性能计数器参考\n\nExadata 更新了许多计数器，但这里不会讨论完整的列表。我们选择描述那些我们认为在性能和故障排除方面最“有趣”的计数器。很可能你不需要深入钻研这些来解决大多数性能问题，因为下一节讨论的等待接口和\
    \ SQL 监控通常已经是足够的诊断工具。了解这些计数器是好的，这就是我们提供它们的原因。我们将按名称列出它们，描述它们的目的及其背后的机制，以便让你深入了解\
    \ Exadata 是如何工作的。\n\n`cell blocks helped by commit cache`"
- fmt: "## 一致读机制概述\n\n提交缓存是 Oracle 多年来使用的一致读机制的一部分，区别在于其实现于存储单元层面而非数据库服务器层面。回顾一下，在非\
    \ Exadata 硬件的标准 Oracle 数据库中，一致读涉及根据查询开始时间，利用可用的 Undo 数据，基于锁字节是否被设置来重构该时间点的行数据。在一致读处理期间可能出现两种条件。\n\
    \n## 提交 SCN 与快照 SCN 的比较\n\n第一种条件是提交 SCN 低于快照 SCN（在查询开始时建立）。此时，Oracle 可以判定块中的数据无需重构，并可继续处理其他块。\n\
    \n第二种条件是提交 SCN 大于快照 SCN。此时，Oracle 知道需要回滚以返回一致数据，并且在非 Exadata 系统上，它通过可用的 Undo 记录来完成此操作。更复杂的是，提交并不总是清理其触及的每个块；会设置一个阈值以限制提交后立即发生的块清理活动。（此限制为块缓冲区缓存的\
    \ 10%；超过此限制的任何块必须等待下一个触及它们的事务来进行清理。）\n\n## 延迟块清理问题\n\n这导致数据块处于必须确定事务状态的状态。通常在非\
    \ Exadata 系统上，数据库层执行此处理。想象一下，需要将这些块从存储单元发送回数据库层，以通过 Undo 记录执行标准的一致读处理。对于少数块，这在\
    \ Exadata 上可能可行，但存在需要以这种方式处理的块数量极大的可能性。性能会很慢，从而剥夺了 Exadata 的一个关键特性。由于 Undo 数据对存储单元不可用（存储单元无法访问数据库缓冲区缓存），且任何存储单元不与其他存储单元通信，因此必须采用另一种机制。\n\
    \n## 提交缓存优化\n\nExadata 采用一种优化，以最小化数据库层处理一致读请求的需要。它被称为提交缓存。提交缓存跟踪哪些事务 ID 已提交，哪些未提交。通过从数据块中的感兴趣事务列表（ITL）中提取事务\
    \ ID，存储单元可以访问此提交缓存并查看引用的事务是否已提交。如果该特定事务 ID 的信息在提交缓存中不可用，存储单元会向数据库层请求其状态。收到后，它会将其添加到提交缓存中，因此其余存储单元无需再次发出请求。\n\
    \n每次存储单元在提交缓存中找到其所需的事务信息时，`cell blocks helped by commit cache` 计数器会增加 1。在事务活动频繁期间监控此计数器，当等待接口和\
    \ SQL 监视器未提供足够数据来诊断性能问题时，会非常有帮助。在 Smart Scan 期间看到此计数器增加，表明单元正在执行延迟块清理，这是因为插入、更新或删除的数据量大于清理阈值所要求的。提交缓存正是为此目的而设计，并阻止存储单元持续与数据库层通信。它还显著减少了\
    \ Smart Scan 期间数据库层的逻辑 I/O。\n\n## 最小活动 SCN 优化\n\n**cell blocks helped by minscn\
    \ optimization**\n\n另一个 Exadata 特有的一致读优化是最小活动 SCN 优化，它跟踪仍处于活动状态的事务的最低 SCN。这通过允许\
    \ Exadata 将来自 ITL 的事务 SCN 与数据库中最旧仍活动事务的最低 SCN 进行比较，来提高一致读性能。数据库层在 Smart Scan 操作开始时将此信息发送到单元。当提交\
    \ SCN 低于传递给单元的最小活动 SCN 时，可以避免数据库层与单元之间不必要的通信。在块 ITL 中找到的任何低于最小活动 SCN 的事务 SCN，存储单元都已知其已提交。每个从此机制受益的块都会递增\
    \ `cell blocks helped by minscn optimization` 计数器。在性能方面，此优化也减少了对前面讨论的提交缓存的检查。因为这是\
    \ Exadata，很可能运行在其上的数据库是 RAC 数据库，所以最小活动 SCN 是 RAC 感知的。实际上称为全局最小 SCN，每个实例中的 MMON\
    \ 进程跟踪此 SCN 并更新每个节点的 SGA。`X$TUMASCN` 表包含 RAC 集群的当前全局最小 SCN，如下所示：\n\n```\nSQL>\
    \ select min_act_scn\n  2  from x$ktumascn;\n\nMIN_ACT_SCN\n-----------\n    12345678\n\
    SQL>\n```\n\n`cell blocks helped by minscn optimization` 计数器不是您会经常使用的（如果有的话）。但是，当\
    \ Smart Scan 因频繁回退到块 I/O 以从数据库层获取事务信息而中断时，这是一个很好的起点。\n\n## 存储单元提交缓存查询计数器\n\n**cell\
    \ commit cache queries**\n\n每次 Smart Scan 查询单元提交缓存以获取事务状态时，此计数器会递增。对于在块中找到的每个未提交事务，当\
    \ MinActiveSCN 优化不适用于其事务 SCN（意味着事务 SCN 大于或等于最小活动 SCN）时，会执行此操作。此计数器与 `cell blocks\
    \ helped by minscn` 计数器密切相关。\n\n## 存储单元缓存层处理计数器\n\n**cell blocks processed by\
    \ cache layer**\n\n这是 Exadata 收集的四个“层”统计信息之一，报告所列处理层的活动。此特定统计信息报告为 Smart Scan\
    \ 操作由存储单元实际处理的块数。当单元将块传回数据库服务器（块 I/O 模式）时，此统计信息不会递增。当单元在 Smart Scan 期间实际处理块时，它会递增。当单元为一致读打开块时，会检查块缓存头，以确保正在读取正确的块，并且该块有效且未损坏。缓存层进程（内核缓存缓冲区管理，或\
    \ KCB）执行这些功能并将 `cell blocks processed by cache layer` 计数报告回数据库。\n\n当数据库层处理常规块\
    \ I/O 时，可能会更新两个统计信息之一：`consistent gets from cache` 或 `consistent gets from cache\
    \ (fastpath)`。存储单元通过 CELLSRV 仅执行一致读取，而非当前模式读取。记录在 `db block gets from cache` 或\
    \ `db block gets from cache (fastpath)` 中的所有当前模式读取均来自数据库层。`cell blocks processed\
    \ by cache layer` 计数器中记录的任何计数都提供了有关存储单元执行了多少逻辑读取的数据，无论是从 `V$SYSSTAT` 的系统范围数据，还是通过\
    \ `V$SESSTAT` 的会话级别数据。\n\n在查询执行计划中同时发现数据库层和单元层处理并不罕见。较小的表不太可能符合 Smart Scan 的条件，因此将由数据库服务器处理。使用小型查找表和大型处理表的多表连接可能会产生此类计划。\n\
    \n## 存储单元数据层处理\n\n**cell blocks processed by data layer**"
  raw: 'The commit cache is part of the consistent-read mechanism Oracle has used
    for years, except that this is implemented at the storage-cell level rather than
    the database-server level. As a review, consistent reads in a standard Oracle
    database on non-Exadata hardware involve reconstructing the row as of the time
    the query began, by using available undo data, based on the lock byte being set.
    Two conditions are possible during consistent-read processing, the first being
    that the commit SCN is lower than the snapshot SCN (established at the start time
    of the query). In this case, Oracle can determine that the data in the block needs
    no reconstruction and can continue processing other blocks.


    The second condition is that the commit SCN is greater than the snapshot SCN,
    and in this case, Oracle knows a rollback is necessary to return consistent data
    and, on non-Exadata systems, does this through the available undo records. To
    complicate matters further, commits don’t always clean out every block that they
    touch; a threshold is set to limit block cleanout activity immediately after a
    commit. (This limit is 10 percent of the block buffer cache; any blocks in excess
    of that limit must wait for the next transaction that touches them to get cleaned
    out.)


    This leaves data blocks in a state where the status of the transaction has to
    be established. Normally on non-Exadata systems, the database layer performs this
    processing. Imagine having to send these blocks back from the storage cells to
    the database layer to perform standard consistent-read processing via the undo
    records. For a few blocks, this might work on Exadata, but the possibility exists
    that an extremely large number of blocks would have to be processed in this manner.
    Performance would be slow, robbing Exadata of one of its key features. Because
    the undo data is not available to the storage cells (the storage cells have no
    access to the database buffer cache) and no storage cell communicates with any
    of the other storage cells, another mechanism has to be employed.


    Exadata employs an optimization where the need for the database layer to process
    consistent-read requests is minimized. It is called the commit cache. The commit
    cache keeps track of which transaction ids have committed and which have not.
    By extracting the transaction id from the Interested Transaction List (ITL) in
    the data block, the storage cells can access this commit cache and see whether
    or not the referenced transaction has been committed. If information for that
    particular transaction id is not available in the commit cache, the storage cell
    requests that status from the database layer. Once received, it adds it to the
    commit cache, so the remaining storage cells need not make the request again.


    Each time a storage cell finds transaction information it needs in the commit
    cache, the `cell blocks helped by commit cache` counter is increased by 1\. Monitoring
    this counter during periods of high transactional activity can be very helpful
    when the wait interface and SQL monitor don’t provide enough data to diagnose
    a performance problem. Seeing this counter increase during Smart Scans indicates
    that delayed block cleanout is being performed by the cells, required because
    the volume of data in an insert, update, or delete is greater than the cleanout
    threshold. The commit cache was designed for this very purpose and keeps the storage
    cells from continuously communicating with the database layer. It also significantly
    reduces the logical I/O at the database layer during Smart Scans.


    cell blocks helped by minscn optimization


    Another Exadata-specific consistent-read optimization is the Minimum Active SCN
    optimization, which keeps track of the lowest SCN for still-active transactions.
    This improves consistent-read performance by allowing Exadata to compare the transaction
    SCNs from the ITL with the lowest SCN of the oldest still-active transaction in
    the database. The database layer sends this information to the cell at the start
    of a Smart Scan operation. When the commit SCN is lower than the Minimum Active
    SCN passed to the cells, unnecessary communication between the database layer
    and the cells is avoided. Any transaction SCN found in the block’s ITL that is
    lower than the Minimum Active SCN is known by the storage cell to be committed.
    Each block that gets helped by this mechanism increments the `cell blocks helped
    by minscn optimization` counter. With reference to performance, this optimization
    also reduces checks to the commit cache discussed previously. Because this is
    Exadata, and most likely the databases run on it are RAC databases, the Minimum
    Active SCN is RAC-aware. Actually known as the Global Minimum SCN, the MMON processes
    in each instance keep track of this SCN and update each node’s SGA. The `X$TUMASCN`
    table contains the current Global Minimum SCN for the RAC cluster, as follows:


    ```

    SQL> select min_act_scn

      2  from x$ktumascn;


    MIN_ACT_SCN


    SQL>

    ```


    The `cell blocks helped by minscn optimization` counter isn’t one you will use
    on a regular basis, if at all. However, it is a good place to start looking when
    Smart Scans are interrupted by frequently reverting to block I/O to get transaction
    information from the database layer.


    cell commit cache queries


    This counter is incremented each time a Smart Scan queries the cell commit cache
    for a transaction status. This is done once for each uncommitted transaction found
    per block when the MinActiveSCN optimization didn’t apply to the transaction SCN,
    meaning the transaction SCN was greater than or equal to the Minimum Active SCN.
    This counter and the `cell blocks helped by minscn` counter are closely related.


    cell blocks processed by cache layer


    This is one of four “layer” statistics collected by Exadata, reporting on the
    activity of the listed layer of processing. This particular statistic reports
    on the number of blocks actually processed by the storage cells for Smart Scan
    operations. When the cells pass back blocks to the database servers (block I/O
    mode), this statistic doesn’t get incremented. It does get incremented when the
    cells actually process the blocks during Smart Scans. When a cell opens a block
    for a consistent read, the block cache header is checked, to ensure that the correct
    block is being read and that it is valid and not corrupted. The cache-layer process
    (Kernel Cache Buffer management, or KCB) performs these functions and reports
    the `cell blocks processed by cache layer` count back to the database.


    When the database layer processes regular block I/O, one of two statistics, consistent
    gets from cache and consistent gets from cache `(fastpath)`, can be updated. The
    storage cells, through CELLSRV, perform only consistent gets, not current mode
    gets. All current mode gets that are recorded in the `db block gets from cache`
    or the `db block gets from cache (fastpath)` come from the database layer. Any
    counts recorded in the `cell blocks processed by cache layer` counter provide
    data on how many logical reads the storage cells performed, either system-wide
    from `V$SYSSTAT` or at the session level through `V$SESSTAT`.


    It is not unusual to find both database-layer and cell-layer processing in a query-execution
    plan. Smaller tables won’t likely qualify for a Smart Scan and, thus, will be
    processed by the database server. Multi-table joins using both small lookup tables
    and large processing tables can produce such plans.


    cell blocks processed by data layer'
