- fmt: 'Remember that cell maintenance will cause storage index segments to be lost,
    forcing storage index creation from offloaded predicates once the cell or cells
    are back online. If those predicates create storage index segments different from
    those that were lost, the originally established key clustering may no longer
    be beneficial. Situations wherein the `search key` is scattered across the entire
    table can result in a 0 byte savings for the query, as there may be no segment
    that does not contain the desired value within the specified range. Table data
    relatively clustered with respect to the `search key` provides varying degrees
    of I/O reduction, depending on how closely the search keys are grouped. Low cardinality
    columns, those containing values such as `True`, `False`, `Yes`, `No`, or limited-range
    numeric values fare better when clustered than columns having a wide range of
    values or columns enforcing `Unique` and `Primary Key` constraints. Examples in
    the next two sections use a low cardinality column (`SUITABLE_FOR_FRYING`) containing
    one of two values, “Yes” and “No,” to illustrate both conditions.


    ## I Used It


    To know if a storage index has provided any benefit to a query, a statistic, `cell
    physical IO bytes saved by storage index`, will record the bytes the storage index
    allowed Oracle to bypass. This is a cumulative metric, meaning that the prior
    value is incremented each time the storage index allowed Oracle to skip reading
    data segments in the currently connected session (as reported by `V$MYSTAT`) or
    for a given session (in `GV$SESSTAT`). (Creating a new session or reestablishing
    a connection [using `connect <user>/<pass>` at the `SQL>` prompt] will reset the
    session-level counter.)


    To illustrate this, two queries will be executed, after some initial setup not
    shown in the examples, that illustrate that a storage index allowed Oracle to
    skip reading data and that the byte savings value reported by Oracle is, indeed,
    cumulative. The `storage_index_ex.sql` script was used to generate this output,
    and running this on your own system will display the setup as well as the output
    shown here, plus the parts that were edited owing to their size. The log file
    this script generates is extremely large; it does include both sets of examples,
    however, and requires only a single execution to provide the entire set of results.
    The second example, run immediately after the first and starting with reconnecting
    as the schema owner, executes the same two queries. The connections will be reestablished
    between the two statements, which will show the actual savings for each query.


    Two tables are created and populated, then the queries are run; the following
    shows the results of that first run:


    ```

    SQL> select /*+ parallel(4) */

      2  count(*)

      3  from chicken_hr_tab

      4  where suitable_for_frying = ''Yes'';


    COUNT(*)


    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID STATISTIC#      VALUE

    ---------- ---------- ----------

          1107        247 1201201152


    SQL> select /*+ parallel(4) */

      2  chicken_id, chicken_name, suitable_for_frying

      3  from chicken_hr_tab

      4  where suitable_for_frying = ''Yes'';


    CHICKEN_ID CHICKEN_NAME         SUI

    ---------- -------------------- ---

      38719703 Frieda               Yes

      38719704 Edie                 Yes

      38719705 Eunice               Yes

    ...

      37973451 Eunice               Yes

      37973452 Fran                 Yes


    2621440 rows selected.


    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID STATISTIC#      VALUE

    ---------- ---------- ----------

          1107        247 2281971712


    SQL>

    ```


    For the first query, approximately 1GB of data was bypassed to provide the record
    count; the second query skipped an additional 1GB of table data. That isn’t obvious
    from the output shown, as the value displayed is, as noted before, the cumulative
    result. You may not need to know the bytes skipped by each query, so the cumulative
    count could be exactly what you want. The cumulative count, though, will also
    display unchanged for queries that do not execute a Smart Scan, so careful attention
    must be paid to the output of the `V$MYSTAT` query. If you do want individual
    savings figures, then you can produce those results as well; in this case, queries
    that do not meet Smart Scan criteria will return a 0 byte total. As noted previously,
    the script reconnects between queries; this produces results that better illustrate
    the I/O savings the storage index provides on a per-query basis:


    ```

    SQL> connect bing/#######

    Connected.

    SQL> select /*+ parallel(4) */

      2  count(*)

      3  from chicken_hr_tab

      4  where suitable_for_frying = ''Yes'';


    COUNT(*)


    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID STATISTIC#      VALUE

    ---------- ---------- ----------

          1233        247 1080770560


    SQL> connect bing/#######

    Connected.

    SQL> select /*+ parallel(4) */

      2  chicken_id, chicken_name, suitable_for_frying

      3  from chicken_hr_tab

      4  where suitable_for_frying = ''Yes'';


    CHICKEN_ID CHICKEN_NAME         SUI

    ---------- -------------------- ---

      38719703 Frieda               Yes

      38719704 Edie                 Yes

    ...

      37973451 Eunice               Yes

      37973452 Fran                 Yes


    2621440 rows selected.


    SQL>

    SQL> select *

      2  from v$mystat

      3  where statistic# = (select statistic# from v$statname where name = ''cell
    physical

          IO bytes saved by storage index'');


    SID STATISTIC#      VALUE

    ---------- ---------- ----------

          1233        247 1080770560


    SQL>

    ```


    Now it’s obvious how much data was skipped for each query. For the initial run,
    there were also 120,430,592 bytes skipped when loading the data. (After the initial
    `insert` statements were executed, a series of “`insert into . . . select . .
    . from . . .`” statements were used to further populate the table.) The second
    run shows the actual savings the storage index provided for each query.


    Oracle can skip table segments based on information the storage index provides,
    but because the index data is very basic, some “false positives” can occur. Oracle
    may find that a given segment satisfies the search criteria, because the searched-for
    value falls between the minimum and maximum values recorded for that segment,
    but, in reality, the minimum and maximum values hide the fact that the actual
    desired value does not exist in that particular segment.


    In such cases, Oracle reads through the segment and comes up empty-handed, as
    no rows meeting the exact query criteria were found, even though the storage index
    indicated otherwise. Depending on how well grouped the keys are in the table,
    more segments than one would expect could be read, segments that produce no results,
    because the indexed values “falsely” indicate that a row or rows may exist. In
    this next example, a count of records having a `TALENT_CD` of `4` is desired.
    The data is loaded so that `TALENT_CD` values `3` and `5` are placed in the same
    table segments, and the rest of the `TALENT_CD` values are loaded into the remaining
    segments. This will provide the conditions to create a “false positive” result
    from the storage index:


    ```

    SQL> insert /*+ append */

      2  into chicken_hr_tab (chicken_name, talent_cd, retired, retire_dt, suitable_for_frying,
    fry_dt)

      3  select

      4  chicken_name, talent_cd, retired, retire_dt, suitable_for_frying, fry_dt
    from chicken_hr_tab2

      5  where talent_cd in (3,5);


    1048576 rows created.


    Elapsed: 00:01:05.10

    SQL> commit;


    Commit complete.

    ```'
