    \n# 虚拟列\n\n虚拟列是 Oracle 中一个受欢迎的新增功能。它们允许表包含基于同一表中其他列计算得出的值。一个例子是包含工资（`salary`）和佣金（`commission`）之和的\
    \ `TOTAL_COMP` 列。这些列值不物理存储在表中，因此，例如，更新计算所依据的基础列，将改变虚拟列返回的结果值。与表中的任何其他列一样，虚拟列可以用作分区键、用于约束或索引，并且也可以对其收集统计信息。尽管虚拟列中包含的值不随表的其他数据一起存储，但它们（或者更准确地说，用于生成它们的计算）可以被卸载，因此可以实现智能扫描（Smart\
    \ Scans）。这一点可以通过运行 `smart_scan_virt_ex.sql` 来说明。以下是有所简略的输出。\n\n```\nSQL> create\
    \ table emp (empid number not null,\n  2                    empname varchar2(40),\n\
