    The Nuts and Bolts of HCC


    Using HCC causes some changes in how Oracle stores table data, altering the storage
    format from the usual heap-style block population to a column-centric format,
    still using data blocks, called Compression Units, or CUs. This is a logical change,
    as Compression Units consist of multiple Oracle blocks with a unique layout. First,
    Oracle collects a number of similar rows for a Compression Unit and organizes
    them in a columnar format, similar to [Figure 6-1](#9781430260103_Ch06.xhtml#Fig1).


    ![9781430260103_Fig06-01.jpg](images/9781430260103_Fig06-01.jpg)


    [Figure 6-1](#9781430260103_Ch06.xhtml#_Fig1). Initial data organization for HCC
    Compression Unit


    Collecting rows of similar data makes it easier to compress the data using HCC,
    as common elements that can be replaced with tokens are colocated in the same
    Compression Unit. Oracle, by design, is a row-centric DBMS, so this interim structure
    is converted back to a row format, similar to [Figure 6-2](#9781430260103_Ch06.xhtml#Fig2).


    ![9781430260103_Fig06-02.jpg](images/9781430260103_Fig06-02.jpg)


    [Figure 6-2](#9781430260103_Ch06.xhtml#_Fig2). HCC Compression Unit layout


    Five data blocks are used to store the data from this example, with each column
    being a row in the block. Some columns won’t fit into a single block, so they
    are chained across multiple blocks, as illustrated. The block header is shown
    in red; the CU header is in the first block of the Compression Unit, as is the
    Compression Unit bitmap, showing where the rows are located. The data columns
    follow the CU Header and CU Bitmap rows in block 1, with Column 1 data starting
    at the third row of the block.


    As mentioned previously, if a column won’t fit entirely in a single block, it
    is chained across to the next block in the Compression Unit. This strategy continues
    until all the columns are stored. Because like data is stored together, HCC can
    provide exceptionally high compression ratios, as compared to either Basic or
    OLTP compression. Also, creating Compression Units in this fashion prevents rows
    from being split across CUs, so that an entire row can be read from a single CU.


    Performance


    Depending on whether you are inserting, updating, or querying data, the performance
    of compressed tables may not be what you would expect. Querying data is usually
    a fast operation. Inserting for all but OLTP compression requires parallel or
    direct load inserts, so that the newly inserted rows are compressed. Updates take
    longer, as the data has to be uncompressed before it can be updated. Carefully
    analyze how a table is used before deciding on compression; heavily updated tables
    are better served with OLTP compression than either of the HCC compression types.
    Remember that engineering is often described as the art of making tradeoffs. You
    can’t have your cake and eat it too.


    When You Load


    Loading data into compressed tables, with the lone exception of OLTP compression,
    requires parallel or direct-path inserts. Of course, loading into compressed tables
    can take longer than the same process for noncompressed tables. We created empty
    tables using the various compression methods and loaded them from the EMP table
    we populated in earlier examples. The results of those loads, and the times required
    for those loads, are shown in the following example:


