    the step shown will have to be repeated, changing the instance name and pfile
    name accordingly. Next, it will be necessary to enable the database, as follows:


    ```

    srvctl enable database -d mydb

    ```


    You should now be able to start the cluster database using `srvctl`, as follows:


    ```

    srvctl start database -d mydb

    ```


