    1488.75G        normal


    CellCLI>

    ```


    The `LIST FLASHCACHE ATTRIBUTES ALL` command returns values for all of the available
    attributes but puts the output in a form that can be difficult to read. You can
    narrow down the list and only report on selected attributes.


    ```

    CellCLI> list flashcache attributes name, degradedCelldisks, effectiveCacheSize

             myexa1cel04_FLASHCACHE          1488.75G


    CellCLI>

    ```


    Notice that the attribute names are not included in the output for any of the
    `LIST FLASHCACHE ATTRIBUTES` statements. You can use the `DESCRIBE` command to
    provide the attribute names, as follows:


    ```

    CellCLI> describe flashcache

            name

            cellDisk

            creationTime

            degradedCelldisks

            effectiveCacheSize

            id

            size

            status


    CellCLI>

    ```


    You can also get a more user-friendly output by using the `LIST FLASHCACHE DETAIL`
    command, as follows:


    ```

    CellCLI> list flashcache detail

