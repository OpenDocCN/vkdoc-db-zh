    \n将显示存储单元名称，以及每个报告间隔的 `cellsrvstat` 报告数据。这也依赖于对存储单元的无密码 `ssh` 访问；如果未建立此访问，则需要为列表中的每个单元输入密码才能连接。\n\
    \n使用 cron 设置这样的存储单元监控非常值得投入时间和少量精力，因为从长远来看会有回报。通过拥有当前性能的基线，可以更轻松地排查 Smart Scan\
    \ 和 Smart Flash Cache 问题。差异和偏差将更容易发现和解决，从而缩短故障排除时间并加快问题解决速度。\n\n## 须知事项\n\n作为\
    \ DBA，您应该了解存储单元的两个账户：`cellmonitor` 和 `celladmin`。`cellmonitor` 账户严格用于监控登录，对存储单元目录结构的访问受限。`celladmin`\
    \ 账户拥有更多的访问权限和特权，旨在用于管理职责。\n\n可以通过 `ssh` 访问存储单元；可用存储单元的地址可在 Exadata 系统中所有可用数据库服务器的\
    \ `/etc/hosts` 文件中找到。\n"
- fmt: '# Chapter 10: Monitoring Exadata


    ![image](images/frontdot.jpg)


    ## Introduction


    Exadata is a complex system of interrelated components; monitoring them effectively
    is both an art and a science. Throughout this book, we have discussed monitoring
    options for various areas of Exadata. In this chapter, we will take this topic
    further and provide ways to monitor Exadata across both the database nodes and
    the storage cells. We will see how `V$SQL` and `V$SQLSTATS` can be used to monitor
    SQL statement performance and provide information on Smart Scan activity. We’ll
    also look at the storage cells again, comparing the monitoring capabilities of
    the command-line interfaces and those of Oracle Enterprise Manager (OEM). We’re
    not promising to make you a combination of Einstein and Rembrandt, but we will
    help you understand the available tools and techniques, so you can intelligently
    monitor your system.


    ## Storage Cell Monitoring Utilities


    Two utilities exist for monitoring and managing the storage cells, `cellcli` and
    `cellsrvstat`. The `cellcli` utility is available to both `cellmonitor` and `celladmin`,
    with `cellmonitor` having a restricted set of available instructions. The `cellmonitor`
    account is intended for regular monitoring, using the `LIST` command set, which
    outputs statistics and metrics for various areas of the storage cell. The `celladmin`
    account is intended to allow the DBA to address issues reported by output generated
    by `cellmonitor`.


    Both `cellcli` and `cellsrvstat` commands can be passed on the command line and
    `cellsrvstat` commands can be automated, in a way, by providing an interval, in
    seconds, and a count of executions to run of the given command. You can also restrict
    the output of `cellsrvstat` by using the `-stat_group` parameter to specify which
    group, or groups, you want to monitor. The available groups are `smartio`, `io`,
    `mem`, `exec`, and `net`.


    Storage cell monitoring from the database server can be automated by using passwordless
    login to the storage cells and scripts, using `ssh` to connect to each storage
    cell and pass either `cellcli` or `cellsrvstat` commands to the cell you are connected
    to. The output can also be redirected to a logfile on the database server, by
    writing what is known as a “wrapper” script to redirect the output. This can establish
    a performance baseline for comparison, when the output indicates possible problem
    areas.


    ## The Database Layer


    This is the layer the users will access, so we feel it’s a logical starting point
    for a discussion on monitoring. We’ve discussed the wait interface in [Chapter
    7](#9781430260103_Ch07.xhtml) and performance in [Chapter 8](#9781430260103_Ch08.xhtml).
    Now it’s time to put them together and formulate a monitoring strategy.


    Exadata’s big selling point is the Smart Scan, and knowing what queries will and
    won’t qualify for a Smart Scan is important. We covered these in [Chapter 2](#9781430260103_Ch02.xhtml),
    along with some monitoring steps, to see if Smart Scans were being executed. We
    will revisit that topic in the next section, using the `V$SQL` and `V$SQLSTATS`
    views.


    ### Are We There Yet?


    Exadata provides a wealth of metrics, counters, and statistics designed to report
    on what the system is doing for a given task. Simply because these metrics exist
    doesn’t mean you should report everything Exadata records. You need a purpose
    and a direction when monitoring Exadata. Without purpose and direction, it’s entirely
    possible you can be led down the wrong path, to solve the wrong “problem.” Remember
    that monitoring should be designed to set an initial baseline, so that there is
    a solid foundation for comparison. Subsequent monitoring data should provide a
    window, relative to that baseline, showing how performance fares over time and
    data changes. You don’t want to be chasing a moving target, if you can avoid it.
    Having no clear starting point only makes troubleshooting and problem resolution
    more difficult.


    To design and implement an effective monitoring strategy, you need to step away
    from your normal role as DBA and look at the system from the user’s perspective.
    Yes, you can drill down into the various metrics and statistics, wait events,
    and timers, but the end users don’t care about that, really. Their main concern
    is how long their process or query takes to complete. If a process takes longer
    than the user thinks it should, the system is slow and needs tuning. Yes, it could
    very well be their query that needs attention, but to the user, it’s the database
    causing the problem, and the database is your area of expertise. Users don’t want
    to know that it’s the 58th bit in the 32nd row of the `ORDERS` table that’s at
    fault. They only want to see the problem corrected and response time reduced.
    Knowing that gives your monitoring process direction and purpose, the two items
    you need to effectively monitor the system.


    Of course it’s not just the user’s claim of unsatisfactory performance that comes
    into play; it’s also a matter of what acceptable and unacceptable performance
    may be. Simply because a monitoring script or tool reported “overly high CPU usage”
    doesn’t mean the performance was unacceptable. You have to take into consideration
    how many sessions were active at the time and what those sessions were doing.
    Many tools set default thresholds for such alarms/reports, and those thresholds
    may not be appropriate for your system, so check these and set them to reasonable
    values, given your hardware, software, and user load. One size does not fit all,
    when it comes to monitoring.


    ### Real-Time SQL Monitoring Reports


    By far, the easiest way to monitor SQL performance is through Oracle Enterprise
    Manager 12c (OEM 12c), with the Diagnostic and Tuning Pack installed. Oracle will
    automatically monitor SQL statements run in parallel and serialized statements
    consuming five seconds or more of combined I/O and CPU time. It’s also possible
    to monitor SQL statements with the `/*+ MONITOR */` hint. Looking at a screenshot
    of the Performance window in OEM 12c in [Figure 10-1](#9781430260103_Ch10.xhtml#Fig1),
    you can see the level of information presented.


    ![9781430260103_Fig10-01.jpg](images/9781430260103_Fig10-01.jpg)


    **Figure 10-1.** OEM 12c SQL monitoring pane


    Among the details presented are the duration, the SQL ID, the session ID that
    ran the statement, the degree of parallelism for parallel execution, and a bar
    graph of the database time, broken down into the three categories for which time
    was recorded, `CPU`, `User I/O`, and `Other`. Green reports `CPU` time as a percentage
    of the total, blue the `User I/O` as a percentage, and orange the time (again
    as a percentage of the whole) recorded as `Other`. It’s possible to “drill down”
    into the details for a specific SQL ID from the report by simply clicking on that
    SQL ID, shown in [Figure 10-2](#9781430260103_Ch10.xhtml#Fig2).


    ![9781430260103_Fig10-02.jpg](images/9781430260103_Fig10-02.jpg)


    **Figure 10-2.** SQL ID Time & Wait window in OEM 12c'
