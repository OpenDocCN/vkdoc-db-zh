    speed to a query: the less data Oracle needs to sift through, the faster the result
    set will be returned. In some ways, a storage index is really an anti-index,  since
    it’s used to eliminate locations to search, rather than pinpoint exactly where
    the desired data resides.


    NULL values are treated differently, and more efficiently, than non-NULL search
    criteria, as Oracle only needs to read the NULL bit in the index. This can speed
    up queries by eliminating storage segments much faster than assessing minimum
    and maximum value pairs. Queries using the IS NULL and IS NOT NULL comparison
    operators can often return in a fraction of the time of queries where actual data
    values are used.


    How data is loaded into a table also affects how efficient and fast a storage
    index can be. Tables where like values are clustered together can eliminate more
    storage segments than if the data values of interest are scattered across the
    entire table. The fewer storage segments that contain the value or values of interest
    allow Oracle to eliminate more storage segments from being read, returning the
    results much faster than would be possible with random data loading. Of course
    it’s not possible to optimize storage indexes for every column they may contain,
    just as it isn’t possible to generate the optimal Clustering Factor for every
    B-tree index created against a table.


    Size can play a big part in the creation of storage indexes, and partitioned tables,
    in particular, can suffer from realizing no benefit from a storage index, if the
    partition or partitions being queried are small with respect to the overall table
    size. Querying the entire table without using partition pruning would realize
    savings from the use of the storage index.


    Monitoring storage index benefits from the database server is an easy task. A
    single statistic named “cell physical IO bytes saved by storage index” in the
    V$SESSTAT and V$MYSTAT views records the bytes saved in a cumulative fashion,
    for each session in V$SESSTAT and for the current session in V$MYSTAT. Logging
    out and logging in again, or using connect to establish a new session, will reset
    this statistic to 0\. This can be a useful technique to report exactly how many
    bytes were saved for a particular query by executing a single query after each
    connect is made. It’s also useful to determine if any benefit was realized by
    using the storage index. Some queries won’t benefit, because they aren’t offloadable
    or the data was spread across every storage segment for the table or tables of
    interest.


    Replacing storage indexes can be necessary for several reasons. Patching, software
    and/or hardware maintenance, and power outages are the major causes for this to
    occur. A less common cause for this is PCIe flash storage card maintenance or
    replacement, as that maintenance requires that the affected storage cell be powered
    down. Because they are basic indexes, containing a bare minimum of information,
    they are easy and fast to create and place very little load on the system. Only
    the affected storage cells will lose storage indexes, so if only one cell goes
    down, only those indexes will have to be built again.


