- fmt: "# SQL查询示例\n\n```sql\nSQL>\nSQL> select  sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
    \ > 0\n  8  and instr(sql_text, 'suitable_for_frying') > 0\n  9  and parsing_schema_name\
    \ = 'BING';\n\nSQL_ID             QUALIFYING          ACTUAL    IO_SAVED_PCT\n\
    ------------- --------------- --------------- ---------------\nSQL_TEXT\n\n8hgwndn3tj7xg\
    \       315211776       223167616            70.8\nselect /*+ parallel(4) */ chicken_id,\
    \ chicken_name, suitable_for_frying from chicken_hr_tab where suitable_for_frying\
    \ = 'Yes'\n\nc1486fx9pv44n       315211776       230036536           72.98\nselect\
    \ /*+ parallel(4) */ count(*) from chicken_hr_tab where suitable_for_frying =\
    \ 'Yes'\n\n9u65az96tvhj5        62242816        26925984           43.26\nselect\
    \ /*+ parallel(4) */ h.chicken_name, t.talent, h.suitable_for_frying from chicken_hr_tab\
    \ h join chicken_talent_tab t on (t.talent_cd = h.talent_cd) where h.talent_cd\
    \ = 5\n\nSQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic#\
    \ from v$statname where name = 'cell physical IO bytes saved by storage index');\n\
    \nSID      STATISTIC#           VALUE\n--------------- --------------- ---------------\n\
    \           1434             247               0\n\nSQL>\n```\n\n`No benefit`\
    \ was realized from a storage index for the last query, because it didn’t execute\
    \ a Smart Scan; the partitions are too small, individually, to trigger Smart Scan\
    \ execution. Also, the first query computing the sum was not offloaded. This is\
    \ proven by the fact that the query text is not listed among the SQL statements\
    \ that were offloaded at one time or another, using another incarnation of the\
    \ table and data.\n\n# NULL值优化\n\n`NULL` searches are treated in a slightly different\
    \ yet more efficient manner in Exadata. Unlike non-`NULL` table data, which is\
    \ indexed by the minimum and maximum values for the listed column, the presence\
    \ of `NULL`s is flagged by a bit for each column present in the storage index.\
    \ Storage regions containing `NULL`s for the indexed columns have this bit set,\
    \ which makes searching for `NULL`s a very fast operation, as Oracle only need\
    \ search for segments where this `NULL` indicator bit shows that `NULL`s are present.\
    \ Avoiding `NULL`s is also just as efficient, as Oracle only needs to read table\
    \ segments where the `NULL` indicator bit is not set.\n\nProving this is another\
    \ example, utilizing the previous data-loading strategy, clustering the desired\
    \ values together to get the most “bang for the buck” out of the storage index.\
    \ `NULL` values were added to the mix, so that three values now exist for the\
    \ `SUITABLE_FOR_FRYING` column. Timing has been enabled to show the elapsed time\
    \ for each query execution, so the total time for each query can be noted, and\
    \ the session-level statistics were reset by reconnecting between queries, so\
    \ it’s easier to see how many bytes the storage index skipped for each search\
    \ condition:\n\n```sql\nSQL>\nSQL> connect bing/#########\nConnected.\nSQL>\n\
    SQL> set timing on\nSQL>\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3 \
    \ from chicken_hr_tab\n  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\n\
    Elapsed: 00:00:00.80\nSQL>\nSQL> select *\n  2  from v$mystat\n  3  where statistic#\
    \ = (select statistic# from v$statname where name = 'cell physical IO bytes saved\
    \ by storage index');\n\nSID      STATISTIC#           VALUE\n---------------\
    \ --------------- ---------------\n           1111             247       566501376\n\
    \nElapsed: 00:00:00.00\nSQL>\nSQL> connect bing/#########\nConnected.\nSQL>\n\
    SQL> set timing on\nSQL>\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3 \
    \ from chicken_hr_tab\n  4  where suitable_for_frying is null;\n\nCOUNT(*)\n\n\
    Elapsed: 00:00:00.23\nSQL>\nSQL> select *\n  2  from v$mystat\n  3  where statistic#\
    \ = (select statistic# from v$statname where name = 'cell physical IO bytes saved\
    \ by storage index');\n\nSID      STATISTIC#           VALUE\n---------------\
    \ --------------- ---------------\n           1111             247      1141440512\n\
    \nElapsed: 00:00:00.00\nSQL>\n```\n\nThe `IS NULL` query executed in less than\
    \ one-third of the time required for the query searching for “employees” ready\
    \ to be sent to the fryer and skipped almost twice the number of bytes, because\
    \ very few of the table segments contain `NULL` values. Again, this speed is partly\
    \ due to not having to check minimum and maximum values for the specified column.\
    \ Using this strategy, “false positives” won’t occur, as Oracle doesn’t flag segments\
    \ that *may* have `NULL`s, only those segments where `NULL`s are actually present.\n\
    \n# 索引重建\n\nNeeding to “Rebuild”\n\nStorage indexes are memory-resident structures.\
    \ As long as there is power to the storage cells, those indexes remain valid.\
    \ Of course, using memory instead of more permanent physical media makes these\
    \ indexes transient and subject to maintenance windows, power outages, and memory-card\
    \ failures. There is no method to back up a storage index, and there really is\
    \ no need to do so, given that storage indexes take very little time to build.\
    \ The build process is not, as mentioned previously, the resource-intensive operation\
    \ that building a “permanent” index would be. Using the term *rebuild* to replace\
    \ dropped storage indexes is, to our minds, a misnomer, as there is no script\
    \ to build them, and it’s just as likely that the storage indexes built after\
    \ a restart of the storage cells will not match the storage indexes in place prior\
    \ to the outage.\n\nBecause storage indexes are built on data stored in 1MB segments,\
    \ it doesn’t take long to scan that segment of the table to find the minimum and\
    \ maximum values an indexed column contains and note whether `NULL` values can\
    \ or do exist. Building storage indexes after an outage is not the same resource-intensive\
    \ operation that creating more permanent indexes can be. Building or rebuilding\
    \ a B-tree index, for example, can take hours and can noticeably consume CPU and\
    \ disk resources, whereas building a storage index is hardly noticeable during\
    \ the course of day-to-day operations, doesn’t hamper other sessions while it\
    \ is being built, and completes in a mere fraction of the time. True, the information\
    \ in a storage index is nothing like that of a B-tree index, but it doesn’t need\
    \ to be to serve its intended purpose.\n\nEach storage server, or cell, has its\
    \ own storage indexes, so losing one cell won’t drop the indexes in the remaining\
    \ cells, which means that only the storage indexes found in the problem cell will\
    \ have to be created again. One of the good aspects of a storage index is that\
    \ the index for each 1MB segment does not need to match the indexes representing\
    \ the other table segments. Because tables are striped across the disks in a disk\
    \ group, the table data is spread across all of the storage cells and, as a result,\
    \ each table will have storage index segments in each of the storage cells. Issues\
    \ with one cell won’t create a situation where no storage indexes exist, so queries\
    \ can still benefit from the index segments in the unaffected cells. In addition,\
    \ the redundancy in ASM places the redundant data on a different storage cell\
    \ from the primary source. This allows Exadata to lose a storage cell or apply\
    \ patches in a rolling manner and not lose access to data."
