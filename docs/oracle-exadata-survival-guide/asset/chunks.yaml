    ```


    Unfortunately, `V$SQL` suffers from latch contention when queried without providing
    a SQL_ID, so if there are several queries active against this view, performance
    can be slow. In 10gR2, the `V$SQLSTATS` view was introduced, recording much of
    the same information as `V$SQL` but in a memory location and format that doesn’t
    create latch contention with unqualified queries. Since `V$SQLSTATS` is, in our
    opinion, the view to use, we will discuss that here. Remember that the same basic
    type of queries used against `V$SQLSTATS` can also be used against `V$SQL`.


    In [Chapter 2](#9781430260103_Ch02.xhtml), we discussed Smart Scans and how to
    prove they are working, and we used `V$SQL` to do that. We’ll now use `V$SQLSTATS`
    to return similar information.


    Looking at the definition for `V$SQLSTATS`, we see much of the same information
    that is available in `V$SQL`.


    ```

    SQL> desc v$sqlstats

     Name                                    Null?    Type

