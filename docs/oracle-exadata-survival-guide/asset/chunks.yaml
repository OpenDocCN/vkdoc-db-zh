- fmt: '## Available Configurations


    The X3 series of Exadata machines, which replaced the X2 series, is available
    in the following five configurations:


    *   `X3-2 Eighth Rack`: Two database servers, each with two eight-core Xeon processors
    with eight cores enabled and 256GB of RAM, three storage servers, and thirty-six
    disk drives

    *   `X3-2 Quarter Rack`: Two database servers, each with two eight-core Xeon processors
    and 256GB of RAM, three storage servers, and thirty-six disk drives

    *   `X3-2 Half Rack`: Four database servers, each with two eight-core Xeon processors
    and 256GB of RAM, seven storage servers, eighty-four disk drives, and a spine
    switch for expansion

    *   `X3-2 Full Rack`: Eight database servers, each with two eight-core Xeon processors
    and 256GB of RAM, fourteen storage servers, one hundred sixty-eight disk drives,
    and a spine switch for expansion

    *   `X3-8 Full Rack`: Two database servers, each with eight ten-core Xeon processors
    and 2TB of RAM, fourteen storage servers, one hundred sixty-eight disk drives,
    a spine switch for expansion, and no keyboard/video/mouse module


    In general, the X3 series of Exadata machines is twice as powerful as the discontinued
    X2 series on a “like for like” comparison. As mentioned earlier, in the `X3-2`
    series, there is a new `Eighth Rack` configuration that provides slightly less
    computing power (a total of sixteen processor cores, eight of which are enabled)
    than the `X2-2 Quarter Rack` (which offered a total of twelve processor cores,
    all of which were enabled). This reduces the licensing costs as compared to the
    `X3-2 Quarter Rack`, making the `Eighth Rack` a very suitable and cost-effective
    `X3-2` entry point into the Exadata arena.


    ## Storage


    How much raw storage you have depends on whether you choose High Capacity or High
    Performance drives—High Capacity `Serial Attached SCSI (SAS)` drives have 3TB
    each of raw storage running at 7,200RPM and the High Performance drives have 600GB
    each running at 15,000RPM. For a `Quarter Rack` configuration with High Capacity
    disks, 108TB of total raw storage is provided, with roughly 40TB available for
    data after normal Automatic Storage Management (`ASM`) redundancy is configured.
    Using High Performance disks, the total raw storage for a `Quarter Rack` machine
    is 21.1TB, with approximately 8.4TB of usable data storage with normal `ASM` redundancy.
    High redundancy reduces the storage by roughly another third on both configurations;
    the tradeoff is the additional `ASM` mirror in case of disk failure, as high redundancy
    provides two copies of the data. Normal redundancy provides one copy.


    The disks are accessed through the storage servers (or cells), running their own
    version of Linux with a subset of the Oracle kernel built in. It is interesting
    to note that there is no direct access to the storage from the database servers;
    the only way they can “see” the disks is through `ASM`. In the `X3-2 Quarter Rack`
    and `Eighth Rack` configurations, there are three storage cells, with each storage
    cell controlling twelve disks. Each storage server provides two six-core Xeon
    processors and 24GB of RAM. Between the various configurations of Exadata, the
    differences become the number of database servers (often referred to as `compute
    nodes`) and the number of storage servers or cells—the greater the number of storage
    cells, the more storage the Exadata machine can control internally. As previously
    noted, the storage servers also run an integrated Oracle kernel. This allows the
    database servers to “pass off” (or offload) parts of qualifying queries, so that
    the database servers only have to handle the reduced data volume of the result
    sets, rather than scanning every data or index block for the objects of interest.
    This is known as a `Smart Scan`. How `Smart Scan`s work and what triggers them
    are covered in [Chapter 2](#9781430260103_Ch02.xhtml).


    ## Smart Flash Cache


    Another part of the Exadata performance package is the `Smart Flash Cache`, 384GB
    of solid-state flash storage for each storage cell, configured across four `Sun
    Flash Accelerator F20 PCIe cards`. With a `Quarter Rack` configuration (three
    storage servers/cells), 1.1TB of flash storage is available; a `Full Rack` provides
    5.3TB of flash storage. The flash cache is usable as a smart cache to service
    large volumes of random reads, or it can be configured as flash disk devices and
    mounted as an `ASM` disk group. That topic will be covered in greater depth in
    [Chapter 4](#9781430260103_Ch04.xhtml).


    ## Even More Storage


    Expansion racks consist of both storage servers and disk drives. There are three
    different configurations available: `Quarter Rack`, `Half Rack`, and `Full Rack`,
    any of which can connect to any Oracle Exadata machine. For the `Quarter Rack`
    configuration, an additional spine switch will be necessary; the IP address for
    the spine switch is left unassigned during configuration, so that if one is installed,
    the address will be available, with no need to reconfigure the machine.


    Besides adding storage, these racks also add computing power for `Smart Scan`
    operations, with the smallest expansion rack containing four storage servers and
    forty-eight disk drives, adding eight six-core CPUs to the mix. The largest expansion
    rack provides 18 storage servers with 216 disk drives. Actual storage will depend
    on whether the system is using High Capacity or High Performance disk drives;
    the drive types cannot be mixed in a single Exadata machine/expansion rack configuration,
    so if the Exadata system is using High Capacity drives, the expansion rack must
    also contain High Capacity disks, if those disks are being added to existing disk
    groups.


    One reason for this requirement is that `ASM` stripes the data across the total
    number of drives in a disk group, thus the size and geometry of the disk units
    must be uniform across the storage tier. It is not necessary for the disks of
    the expansion rack to be added to an existing disk group; a completely separate
    disk group can be created from that storage. You cannot mix storage types within
    the expansion rack, but the disk type does not need to match that of the host
    system, if a separate disk group is to be created from that storage. The beauty
    of these expansion racks is that they integrate seamlessly with the existing storage
    on the host Exadata system. If these disks are added to existing disk groups,
    `ASM` automatically triggers a rebalance to evenly distribute the extents across
    the total number of available disks.


    ## Things to Know


    The system was marketed as a data warehouse solution. Then, a year later, `Exadata
    V2` was released, this time marketed as a complete and integrated database appliance,
    including database servers, storage servers, an internal InfiniBand network, and
    software designed so the components worked in concert as a unified whole. Oracle
    marketed this appliance as the first database machine for OLTP, so now `Exadata`
    was the machine of choice for both data warehousing and OLTP systems. The following
    year (2010) saw the release of `Exadata X2`, which continued the improvements
    by adding a second configuration (`X2-8`) to the mix. This provided customers
    with two options for a full-rack implementation. And in September 2012, `Exadata
    X3` hit the market, improving performance yet again and offering a fifth configuration
    option, the `Eighth Rack`.'
