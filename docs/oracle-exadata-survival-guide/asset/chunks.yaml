    statement a single command that you will execute as many times as necessary to
    provide the desired temp space. Lastly, you will have to migrate the redo log
    groups to ASM and drop the old redo log groups. After that is complete, shut down
    the database cleanly and restart, to ensure there are no issues with the storage
    or ASM.


    Exadata is designed with RAC in mind. At this point, the database you’ve migrated,
    either through a direct clone from a backup or from a different platform, is a
