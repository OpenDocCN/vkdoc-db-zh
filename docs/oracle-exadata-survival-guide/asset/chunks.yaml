    提交完成。\n\n已用时间: 00:00:00.03\nSQL>\nSQL> --\nSQL> -- 数据字典中的压缩类型没有改变，\nSQL> -- 但消耗的空间已增加到最初为\
    \ OLTP 压缩的表的水平\nSQL> --\nSQL> select table_name, compression, compress_for\n \
    \ 2  from user_tables;\n\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
    ------------------------------ -------- ------------\nDEPT                   \
    \        DISABLED\nBONUS                          DISABLED\nSALGRADE         \
    \              DISABLED\nDUMMY                          DISABLED\nEMP        \
    \                    ENABLED  QUERY HIGH\n\n已用时间: 00:00:00.03\nSQL>\nSQL> select\
    \ segment_name, sum(bytes) total_space\n  2  from user_segments\n  3  group by\
    \ segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
    \ -----------\nDEPT                                      65536\nDUMMY        \
    \                             65536\nEMP                                  226492416\n\
    EMP_IDX                              721420288\nSALGRADE                     \
    \            65536\n\n已用时间: 00:00:00.33\nSQL>\nSQL> --\nSQL> -- 执行第二次更新\nSQL>\
    \ --\nSQL> -- 注意已用时间\nSQL> --\nSQL> update emp set sal=sal*1.08 where empno >\
    \ 7350;\n\n14680064 行已更新。\n\n已用时间: 00:03:15.00\nSQL>\nSQL> commit;\n\n提交完成。\n\n\
    已用时间: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- 第二次更新后当前的存储消耗情况\nSQL> --\nSQL> select\
    \ table_name, compression, compress_for\n  2  from user_tables;\n\nTABLE_NAME\
    \                     COMPRESS COMPRESS_FOR\n------------------------------ --------\
    \ ------------\nDEPT                           DISABLED\nBONUS               \
    \           DISABLED\nSALGRADE                       DISABLED\nDUMMY         \
    \                 DISABLED\nEMP                            ENABLED  QUERY HIGH\n\
    \n已用时间: 00:00:00.02\nSQL>\nSQL> select segment_name, sum(bytes) total_space\n\
    \  2  from user_segments\n  3  group by segment_name;\n\nSEGMENT_NAME        \
    \                TOTAL_SPACE\n----------------------------------- -----------\n\
    DEPT                                      65536\nDUMMY                       \
    \              65536\nEMP                                  452984832\nEMP_IDX\
    \                              721420288\nSALGRADE                           \
    \      65536\n\n已用时间: 00:00:00.21\nSQL>\n```\n\n请注意，与表关联的索引在第一次更新后大小也会增加，并在随后的表更新期间保持该大小。我们现在将对为\
    \ `QUERY LOW` 压缩的 `EMP` 表执行相同的更新，如下所示：\n\n## QUERY LOW 压缩下的更新\n\n```\nSQL> --\n\
    SQL> -- 执行更新\nSQL> --\nSQL> -- 注意已用时间（少于之前的压缩更新）\nSQL> --\nSQL> update emp set\
    \ sal=sal*1.08 where empno > 7350;\n\n14680064 行已更新。\n\n已用时间: 00:47:52.75\nSQL>\n\
    SQL> commit;\n\n提交完成。\n\n已用时间: 00:00:00.02\nSQL>\nSQL> --\nSQL> -- 当前的压缩级别和存储情况\n\
