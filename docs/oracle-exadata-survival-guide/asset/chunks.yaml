    \ 和 `UNDOTBS2`、`TEMP`、`USERS` 等）的存储参数。\n\n数据库创建完成后，请将该实例（数据库本身应已被添加）添加到集群中每个节点的\
    \ `oratab` 文件中，并使用 Oracle 的 `oraenv` 实用程序来设置环境。节点 1 上的 `oratab` 文件应类似于以下内容：\n\
    ```\n+ASM1:/u01/app/11.2.0.3/grid:N\nagent11g:/u01/app/oracle/GCAgents/oracle/MW/agent11g:N\n\
    dbm1:/u01/app/oracle/product/11.2.0.3/dbhome_1:N\nerpdev1:/u01/app/oracle/product/11.2.0.3/erpdevdb:N\n\
    dbm:/u01/app/oracle/product/11.2.0.3/dbhome_1:N           # line added by Agent\n\
    erpdev:/u01/app/oracle/product/11.2.0.3/erpdevdb:N        # line added by Agent\n\
    ```\n节点 2 的 `oratab` 文件将类似，区别在于会列出本地属于该节点的实例（`dbm2`、`erpdev2` 等）。\n\n## 设置监听器\n\
    之前，我们将 SCAN 监听器移到了 `1523` 端口。因为 `1521` 端口现在空闲，如果我们愿意，可以创建一个使用该端口的新监听器。此监听器将专用于我们的\
    \ `ERPDEV` 数据库。无论你使用哪个端口，都必须遵循这些步骤来为你的新数据库创建专用监听器。关键点是不能使用 SCAN 监听器正在使用的端口。\n\n\
    关闭新创建的 `ERPDEV` 数据库：\n```\n$ srvctl stop database -d erpdev\n```\n在 `$ORACLE_HOME/network/admin`\
    \ 目录下，创建一个新的 `tnsnames.ora` 文件，其中包含以下条目：\n```\nerpdev=\n        (DESCRIPTION=\n\
    \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n       \
    \         (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n            (LOAD_BALANCE\
    \ = yes)\n            (CONNECT_DATA=\n                (SERVER=DEDICATED)\n   \
    \             (SERVICE_NAME=erpdev)\n            )\n        )\n\nerpdev1_LOCAL=\n\
    \        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n\
    \        )\n\nerpdev2_LOCAL=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n\
    \        )\n\nerpdev_REMOTE=\n        (DESCRIPTION=\n            (ADDRESS_LIST=\n\
    \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n       \
    \         (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n              \
    \  (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1523))\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1523))\n\
    \            )\n        )\n```\n注意 `erpdev_REMOTE` 条目中的 `1523` 端口引用。这些地址条目也会导致数据库服务向默认监听器注册。如果将来任何时候需要为此数据库运行\
    \ `dbca`，则数据库必须向默认监听器注册。你可能需要运行 `dbca` 的原因多种多样，例如配置 Database Vault 或 Oracle Internet\
    \ Directory。\n\n接下来，创建监听器并将其关联到此 Oracle Home。\n```\n$ srvctl add listener -l erpdev\
    \ -o $ORACLE_HOME -p 1521\n$ srvctl setenv listener -l erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n\
    $ srvctl setenv database -d erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n```\n\
    启动数据库并更改其监听器参数。\n```\n$ srvctl start database -d erpdev\n\nSQL> alter system set\
    \ local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521)))'\n\
    \   sid='erpdev1' ;\n\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521)))'\n\
    \   sid='erpdev2' ;\n\nSQL> alter system set remote_listener='erpdev_REMOTE' ;\n\
    ```\n如果你还希望将数据库注册到 SCAN 监听器，可以按如下方式设置 `remote_listener` 参数：\n```\nSQL> alter system\
    \ set remote_listener='erpdev_REMOTE','exacluster-scan:1523' ;\n```\n\n## 数据迁移\n\
    至此，我们有了一个空数据库和该数据库的监听器。除非这是 Oracle ERP 的全新安装，否则下一个（也是最耗时的）步骤是将现有数据库迁移到我们崭新、闪亮的\
    \ Exadata 数据库。迁移步骤因源平台、ERP 版本和许多其他因素而异。简而言之，你需要熟悉大量的“My Oracle Support”说明，才能将你的数据库从\
    \ A 点转移到 Exadata。我们无法在此尝试涵盖该领域。因此，我们将在导入完成且已运行 Autoconfig 的时刻继续。请参阅本章末尾的 MOS 说明列表，这应为你顺利完成任务提供一个良好的基础。\n\
    \n## 环境配置\n在传统的单节点 ERP 数据库环境中，SQLNet 配置文件存储在 `$ORACLE_HOME/network/admin/<context>`\
    \ 下，其中 `<context>` 是 `instance_server`。是 Autoconfig 创建了这些文件。同时，它创建的 `env` 文件会将\
    \ `TNS_ADMIN` 设置为相同的 `$ORACLE_HOME/network/admin/<context>` 位置。然而，在 RAC 环境中，我们希望使用\
    \ `srvctl` 来管理环境（即启动和停止数据库及监听器）。既然如此，我们就不能以这种方式设置 `TNS_ADMIN`，因为显然它在每个节点上都必须不同，因为实例名称会变化。\n\
    \n传统的单节点设置：\n```\nTNS_ADMIN=$ORACLE_HOME/network/admin/erpdev_dbsrvr\n$ORACLE_HOME/network/admin/erpdev_dbsrvr/tnsnames.ora\n\
    $ORACLE_HOME/network/admin/erpdev_dbsrvr/listener.ora\n```\n此外，还会有一个 `ifile` 参数指向另一个可用于自定义设置的文件。在\
    \ Exadata (RAC) 上，我们将反转这种做法。尤其要注意，我们根本不会使用 Autoconfig 生成的 `listener.ora`，因为它的条目不适用于\
    \ RAC。\n\n请注意，Autoconfig 创建的 `tnsnames.ora` 文件通常就 RAC 所需而言充满了错误。应审查该文件并进行调整。我们之前创建的\
    \ `tnsnames.ora` 文件可以用作此文件的模型。然后，我们要避免这些更改因后续运行 Autoconfig 而被覆盖。\n\n管理此问题有几种选择。\n\
    1.  将文件复制到 `$ORACLE_HOME/network/admin/tnsnames.ora` 上，即：\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
    \    $ cp tnsnames.ora ../.\n```\n2.  重命名原始文件并向 `$ORACLE_HOME/network/admin/tnsnames.ora`\
    \ 添加一个 `ifile` 条目，该条目将指向它。\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
    \    $ cp tnsnames.ora tnsnames.ora.erpdev\n    $ vi $ORACLE_HOME/network/admin/tnsnames.ora\n\
    \    添加 ➔ ifile=<ORACLE_HOME>/network/admin/erpdev1_exadb01/tnsnames.ora.erpdev\n\
    ```\n因为 Autoconfig 自然地将其活动限制在 `$ORACLE_HOME/network/admin/<context>` 目录内，所以此选项效果很好。`$ORACLE_HOME/network/admin`\
    \ 下的文件不会受到影响。无论你选择做什么，都必须完全告知将来可能在这些服务器上运行 Autoconfig 或向远程数据库添加条目到 `tnsnames.ora`\
    \ 的任何人。\n\n![image](img/sq.jpg) **注意** `ifile` 条目必须包含完整路径。`$ORACLE_HOME` 在此处无效。确保在两个节点上都使用完整路径。\n\
    \n## 设置环境\n"
- fmt: '# CHAPTER 14


    ## Final Thoughts


    You’re here, at the final chapter of the book, and you’ve read and learned much
    by now. A lot of material has been covered, and you have a better idea of what
    Exadata is and what it can do. You also have a good working knowledge of the system
    and how to manage it. It was probably a daunting task at first, but, through reading
    this book and running the examples, you’ve gained an understanding of Exadata
    that will serve you well as you continue your career as an Exadata DBA or DMA.


    ## You’ve Come Far, Pilgrim


    When you started reading, you had probably just been told that Exadata was on
    its way and that you would be working with it. It’s also likely that you had no
    real idea of how Exadata is configured or how it provided the exceptional performance
    everyone was talking about. Storage indexes and Smart Scans were foreign concepts,
    and the architecture of the system was like nothing you had seen before. You have
    come a long way since then.


    Let us take a walk through the areas we have covered and highlight some of the
    material we have presented.


    ![image](images/sq.jpg) **Note** This will not be a comprehensive list of all
    of the topics and material we have presented in previous chapters. Information
    on some areas may be more detailed than others, but know this chapter is not a
    comprehensive summary of the text.


    We started, appropriately enough, at the beginning, and discussed the various
    configurations of an Exadata system. We did this to get you introduced to the
    hardware available on each of the currently available systems and to familiarize
    you with the resources available on each configuration. We also presented a short
    history of Exadata and how it has evolved to address different types of workloads,
    including OLTP.


    The next stop on this journey took you to Smart Scans and offloading, two very
    important aspects of Exadata.


    It has been said that Smart Scans are the lifeblood of Exadata, and we would agree.
    Smart Scans, as you learned, provide a “divide and conquer” approach to query
    and statement processing, by allowing the storage cells to perform tasks that,
    in conventional hardware configurations, the database server would have to perform.
    You also learned that offloading provides even more powerful tools to make data
    processing more efficient. Column Projection and Predicate Filtering allow the
    storage cells to return only the data requested by the query, by moving the data
    block processing to the storage layer. Column Projection, as you recall, allows
    Exadata to return only the columns requested in the select list and any columns
    specified in join conditions. This reduces the workload considerably, by eliminating
    the need for the database servers to perform conventional data block processing
    and filtering. This also reduces the volume of data transferred to the database
    servers, which is one way Exadata is more efficient than conventionally configured
    systems.


    ## Things to Know


    Every ERP database must run from its own Oracle Home. Sharing of Oracle Homes
    between ERP databases is not allowed. This is a long-standing Oracle standard.
    In addition, each of the databases must have a dedicated listener.


    The issue of the listener can be the most challenging. First, you must decide
    if the SCAN listener can simply stay on port 1521 or if it has to move. While
    you can use the SCAN listener, it is not practical to do so on a dev/test cluster,
    where you most likely will have multiple ERP databases running. Each of the databases
    will require its own listener port and, hence, its own listener. For the sake
    of consistency, we have found it best to have none of the databases use the SCAN
    listener as primary.


    All that said, you still must have the database registered with the local listener,
    so that `dbca` will work. If it is not registered with the local listener, you
    will receive an error when you do try to run `dbca`. In fact, each database should
    be registered with both a named listener and port unique to that database and
    with the default listener. Remember that `dbca` is used for a variety of things,
    including adding instances to the database, registering the database with a Grid
    Control OMS, and configuring Database Vault—just to name a few.


    Be sure to configure your `$ORACLE_HOME/network/admin` in such a way that subsequent
    runs of Autoconfig on the database tier do not compromise your `TNS` configuration.
    Fully communicate the configuration to anyone who may be running Autoconfig.


    When setting your environment, be sure not to use the Autoconfig-generated `TNS_ADMIN`
    setting. The `env` file that Autoconfig generates is fine, but then the `TNS_ADMIN`
    variable must be unset.


    Properly clone each `ORACLE_HOME`, so that it is registered with the central inventory.
    If the clone process is not followed, then the Home will not be registered, and
    you will not be able to apply quarterly patch bundles to it.


    Experienced ERP DBAs know that Autoconfig creates an `env` file under `$ORACLE_HOME`
    called `<context>.env`. Using the names we have been using throughout, we would
    have `erpdev1_exadb01.env` on node 1, `erpdev2_exadb02.env` on node 2, etc. However,
    the `env` file will have `TNS_ADMIN` set to `$ORACLE_HOME/network/admin/<context>`—which
    we are not using for the reasons previously discussed. You have to make accommodations
    for that by either commenting that out of the Autoconfig-generated `env` file
    or by creating another `env` file that calls that one and that has an `unset TNS_ADMIN`
    statement in it. I would recommend not modifying the generated `env` file, as
    it will get overwritten any time Autoconfig gets run, so you would have to remember
    to do the adjustment every time.


    Create a file called `<db>.env` and put it in some directory in the path, such
    as `/usr/local/bin`. Our database name is `erpdev`, so we would have


    ```

    $ cat erpdev.env

    .  /u01/app/oracle/product/11.2.0.3/erpdevdb/erpdev1_exadb01.env

    unset TNS_ADMIN

    echo;

    echo "********************************************************"

    echo "ORACLE_HOME...$ORACLE_HOME"

    echo "ORACLE_SID....$ORACLE_SID"

    echo "********************************************************"

    echo;

    ```


    Then, to simplify things further, add an alias definition in the `.bash_profile`:


    ```

    alias erpdev=''. /usr/local/bin/erpdev.env''

    ```


    Then, setting the environment for one database or another is a snap.


    ```

    $ erpdev


    ********************************************************

    ORACLE_HOME... /u01/app/oracle/product/11.2.0.3/erpdevdb

    ORACLE_SID....erpdev1

    ********************************************************

    ```


    ## “My Oracle Support” Notes


    Anyone who has worked with Oracle products should be familiar with “My Oracle
    Support,” Oracle’s site containing its knowledge base, patch downloads, and service-request
    system. You may also hear it referred to as `Metalink`, as that was its name for
    many years. Now, one often sees it referred to as “MOS.” Whatever you call it,
    it is an invaluable resource.


    The following is a list of pertinent notes that can be found there. Simply search
    on the reference ID, and the note should be first in the search results.


    *   Using Oracle 11g Release 2 Real Application Clusters with Oracle E-Business
    Suite Release 11i [ID 823586.1]

    *   Export/import notes on Applications 11i Database 11g [ID 557738.1]

    *   Interoperability Notes Oracle EBS 11i with Oracle Database 11gR2 (11.2.0)
    [ID 881505.1]

    *   How to Modify SCAN Setting or SCAN Listener Port after Installation [ID 972500.1]


    ![image](images/frontdot.jpg)'
