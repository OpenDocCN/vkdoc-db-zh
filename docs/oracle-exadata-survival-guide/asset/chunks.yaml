    ```


    RMAN can transport data files between any of the listed platforms, and the AIX
    to Linux migration is possible. The next step is to check for database objects
    that won’t be transported by RMAN, such as directories, BFILES, and external tables.
    The following PL/SQL block will display these objects:


    ```

    SQL> set serveroutput on

    SQL> declare

      2    x boolean;

      3  begin

      4    x := sys.dbms_tdb.check_external;

      5  end;

      6  /

    The following directories exist in the database:

    SYS.ADMIN_BAD_DIR, SYS.ADMIN_LOG_DIR, SYS.ADMIN_DAT_DIR, SYS.XMLDIR, SYS.DATA_PUMP_DIR,
    SYS.ORACLE_OCM_CONFIG_DIR


    PL/SQL procedure successfully completed.


    SQL>

    ```


    Notice that the PL/SQL reports six directories that will have to be re-created
    once the database is migrated to Exadata. It is very likely that these directories
    will have new locations after the move to Exadata, so not only will the database
    locations have to change, but the directories themselves will have to be created
    on the Exadata system. A simple query can generate the necessary `CREATE DIRECTORY`
    statements, as follows:


    ```

    SQL> column cr_dir format a132

    SQL>

    SQL> select ''create or replace directory ''||directory_name||'' as ''''''||directory_path||'''''';''
    cr_dir

      2  from dba_directories;


    CR_DIR


    create or replace directory ADMIN_LOG_DIR as ''/u01/oracle/directories/log'';

    create or replace directory ADMIN_BAD_DIR as ''/u01/oracle/directories/bad'';

    create or replace directory XMLDIR as ''/u01/oracle/directories/rdbms/xml'';

    create or replace directory ADMIN_DAT_DIR as ''/u01/oracle/directories/dat'';

    create or replace directory DATA_PUMP_DIR as ''/u01/oracle/admin/mydb/dpdump/'';

    create or replace directory ORACLE_OCM_CONFIG_DIR as ''/u01/oracle/directories/ccr/state'';


    6 rows selected.


    SQL>

    ```


    Spool this output to a file and edit the destination text to point to the newly
    created locations on Exadata. It is then a simple task of running the generated
    script in the migrated database to re-create these directories.


    You will have to create a destination for the converted database files on the
    available external storage. In this example, we will use `/obkups/db_convert`
    as the destination for those files. Take a current backup of the source database,
    then shut down and start the source database in read-only mode. Connect RMAN to
    the target database and execute the `CONVERT DATABASE` command, as follows:


    ```

    CONVERT DATABASE NEW DATABASE ''mydb''

              TRANSPORT SCRIPT ''/obkups/db_convert/migratedb.sql''

              TO PLATFORM ''Linux IA (64-bit)''

              DB_FILE_NAME_CONVERT = (''/home/oracle/dbs'',''/obkups/db_convert'');

    ```


    RMAN will convert the database files and place them in the `/obkups/db_convert`
    directory, along with a copy of the pfile and the migration script. These files
    will have to be transferred to the Exadata system, if the external storage is
    not common to both servers. Once all of the generated files are transferred, you
    will have to edit the migration script, to enable restricted session. A sample
    migration script, including the edits, follows:


    ```

    -- The following commands will create a control file and use it

    -- to open the database.

    -- Data used by Recovery Manager will be lost.

    -- The contents of online logs will be lost and all backups will

    -- be invalidated. Use this only if online logs are damaged.


    -- After mounting the created controlfile, the following SQL

    -- statement will place the database in the appropriate

    -- protection mode:

    --  ALTER DATABASE SET STANDBY DATABASE TO MAXIMIZE PERFORMANCE


    STARTUP NOMOUNT PFILE=''init_00bz4glk_1_0.ora''

    CREATE CONTROLFILE REUSE SET DATABASE "MYDB" RESETLOGS  NOARCHIVELOG

        MAXLOGFILES 32

        MAXLOGMEMBERS 2

        MAXDATAFILES 32

        MAXINSTANCES 1

        MAXLOGHISTORY 226

    LOGFILE

      GROUP 1 ''/obkups/db_convert/archlog1''  SIZE 25M,

      GROUP 2 ''/obkups/db_convert/archlog2''  SIZE 25M

    DATAFILE

      ''/obkups/db_convert/system01.dbf'',

      ''/obkups/db_convert/sysaux01.dbf'',

      ''/obkups/db_convert/mydatatbs01.dbf'',

      ''/obkups/db_convert/mydatatbs02.dbf'',

      ''/obkups/db_convert/mydatatbs03.dbf''

    CHARACTER SET AL32UTF8

    ;


    -- ALTER SYSTEM statement added to enable restricted session.


    ALTER SYSTEM ENABLE RESTRICTED SESSION;


    -- Database can now be opened zeroing the online logs.

    ALTER DATABASE OPEN RESETLOGS;


    -- No tempfile entries found to add.

    --


    set echo off

    prompt ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼

    prompt * Your database has been created successfully!

    prompt * There are many things to think about for the new database. Here

    prompt * is a checklist to help you stay on track:

    prompt * 1\. You may want to redefine the location of the directory objects.

    prompt * 2\. You may want to change the internal database identifier (DBID)

    prompt *    or the global database name for this database. Use the

    prompt *    NEWDBID Utility (nid).

    prompt ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼


    SHUTDOWN IMMEDIATE

    -- UPGRADE option sets restricted session

    STARTUP UPGRADE PFILE=''init_00bz4glk_1_0.ora''

    @@ ?/rdbms/admin/utlirp.sql

    SHUTDOWN IMMEDIATE

    -- NOTE: The startup below is generated without the RESTRICT clause.

    -- Add the RESTRICT clause.

    STARTUP RESTRICT PFILE=''init_00bz4glk_1_0.ora''

    -- The following step will recompile all PL/SQL modules.

    -- It may take serveral hours to complete.

    @@ ?/rdbms/admin/utlrp.sql

    set feedback 6;

    ```


    The database should now be created using the filesystem, instead of ASM, so now
    it’s time to move the data files into the proper ASM disk groups. Make a copy
    of the pfile generated by the `RMAN CONVERT` process described earlier. Using
    RMAN, you will have to make another backup, this time using a script similar to
    the example that follows:


    ```

    RUN

    {

      ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev2 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev4 DEVICE TYPE DISK;

      BACKUP AS COPY

        INCREMENTAL LEVEL 0

        DATABASE

        FORMAT ''+DATA_MYEXA1''

        TAG ''ASM_DB_MIG'';

    }

    ```


    This puts the filesystem database files into the `+DATA_MYEXA1` disk group. Archive
    the current log through RMAN, as follows:


    ```

    SQL "ALTER SYSTEM ARCHIVE LOG CURRENT";

    ```


    You are using a pfile, so it will be necessary to create an spfile in the ASM
    disk group. Use the following example to create the new spfile:


    ```

    CREATE SPFILE=''+DATA_MYEXA1/spfile<sid>.ora''

    FROM PFILE=''/obkups/db_convert/''init_00bz4glk_1_0.ora'';

    ```


    You are now ready to shut down the database cleanly. Create a new `init<sid>.ora`
    file in the `$ORACLE_HOME/dbs` directory with the following entry:


    ```

    SPFILE=''+DATA_MYEXA1/spfile<sid>.ora''

    ```'
