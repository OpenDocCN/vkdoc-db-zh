  trans: '

    # 空闲类/其他类


    在一个正常运行的 Exadata 系统中，这两类中的五个等待事件很少被使用。我们在所管理的系统上未曾发现过它们，您很可能也不会遇到。但有一个例外，即 `cell
    flash unkeep` 事件，该事件将在其专属章节中进行介绍。其余的这些事件，对于 `V$SESSION_WAIT` 视图中提供的 P1、P2 和 P3
    参数值而言，都缺乏信息量。表 7-3 列出了您不太可能看到的事件及其提供给 Oracle 的参数的基本描述。


    表 7-3. 极少报告的单元等待事件


    | 事件 | 描述 |

    | --- | --- |

    | 单元管理器取消工作请求 | 此事件提供的信息很稀疏，因为可提供的参数在 `V$SESSION_WAIT` 中均未填充。我们尚未在 `10046` 跟踪中看到此事件。
    |

    | 单元工作进程联机完成 | 这似乎是一个单元启动事件。提供的唯一参数是单元哈希（在 `10046` 跟踪中为 `cellhash#`，在 `V$SESSION_WAIT`
    视图中为 P1）。这是另一个我们未见报告的等待事件。 |

    | 单元工作进程重试 | 另一个仅填充单元哈希 (`cellhash#`) 而无其他信息的等待事件。 |

    | 单元工作进程空闲 | 此事件不提供任何参数，并且我们在所管理的任何系统上均未见其报告。 |


    ## 单元智能闪存解保持


    此事件记录 Oracle 将数据块从智能闪存缓存中刷出时的等待时间，但它不会为使用默认 FIFO 方式的智能闪存缓存的对象触发。此事件跟踪那些旨在保留在智能闪存缓存中的对象（使用
    `STORAGE(FLASH_CACHE KEEP)` 参数）的等待时间。会触发此事件的操作包括表的 `DROP` 和 `TRUNCATE`。与此等待相关联的另一个事件是
    `enq: RO fast object reuse`，因为触发此事件的操作也会触发缓冲区缓存清理。截断或删除表还需要移除该对象的任何缓存数据，并且在 Exadata
    上，有两个独立的缓存需要维护。


    此事件提供的唯一参数是单元哈希 (`cellhash#`)，用于标识是哪个单元为截断或删除操作提供了服务。在 `10046` 跟踪的 `WAIT` 事件或
    `V$SESSION_WAIT` 视图中，没有其他参数被填充。


    ## 需要了解的事项


    等待接口在过去几个 Oracle 版本中已经得到了扩展，在 Exadata 上它又经历了一次扩展：增加了特定于单元的事件，这些事件在某些情况下取代了非 Exadata
    系统上已有的事件。同时还添加了新的事件来监控 Exadata 特有的新机制。


    `cell smart table scan` 事件记录了智能扫描所花费的时间，使得该事件对于使用 Exadata 或 Exadata 存储的系统至关重要。此事件通常取代了
    `direct path read` 事件，尽管当查询不符合智能扫描条件时，您仍然可以在 Exadata 系统上找到直接路径读等待。


    `cell smart index scan` 事件报告索引快速全扫描的等待时间；没有其他索引访问路径会触发此等待。


    `cell single block physical read` 事件等同于非 Exadata 系统上的 `db file sequential read`
    事件。它最常与索引访问操作和通过索引行 ID 访问表的操作相关联，但任何单块访问操作都可能触发此等待。我们认为，它的命名比其非 Exadata 对应项更准确，因为读取的数据块是单块，而不一定是顺序的。


    `cell multiblock physical read` 事件收集顺序多块读的时间，是 `db file scattered read` 事件的替代者。同样，我们认为
    Exadata 事件的命名更好，因为它表明读取的是顺序排列的数据块集合。`db file scattered read` 事件在非 Exadata 系统中记录顺序和非顺序读的时间，所以其名称有些令人困惑。


    Exadata 提供了一个新事件 `cell list of blocks read`，用于记录非顺序或分散的数据块读取的时间。此事件也可以替代 `db file
    scattered read` 事件，因为如前所述，旧事件记录所有多块读的时间，无论是否顺序。


    在 Exadata 中，数据块准备工作被下推到存储单元执行，因此增加了一个名为 `cell smart file creation` 的新事件。这个名称有点用词不当，因为它不一定是指文件创建（尽管那是可以触发此等待的操作之一），而通常是收集数据块格式化/重新格式化以准备新数据所花费的时间。触发此事件的操作包括删除、更新、数据库文件创建和文件自动扩展。


    `cell statistics gather` 事件被我们归类错误，因为它与磁盘 I/O 操作无关。它记录访问各种 `V$` 和 `X$` 表/视图的时间，更准确地说，可以被视为系统
    I/O 或其他等待类事件。


    RMAN 也有特定于 Exadata 的等待，因为某些 RMAN 操作被下推到存储单元执行。`cell smart incremental backup`
    事件记录了增量级别 1 备份所经历的等待时间。因为增量级别 0 备份实际上是完整备份，也是下一系列级别 1 增量备份的起点，所以它不会触发此事件。


    `cell smart restore from backup` 事件收集 RMAN 在执行数据库恢复时经历的等待时间，因为与此等待相关的操作被下推到存储单元执行。由于存储单元是
    Exadata 系统中唯一能直接访问存储的服务器，下推这两个 RMAN 操作是合理的。


    Exadata 作为性能增强功能之一，拥有智能闪存缓存。当使用 `STORAGE(FLASH_CACHE KEEP)` 指令创建表/索引时，截断或删除这些对象会触发
    `cell smart flash unkeep` 事件。这些操作也会触发缓冲区缓存清理，因此报告此事件的跟踪文件通常也会报告 `enq: RO fast
    object reuse` 等待。


    # 第 8 章 性能测量


    ![image](img/frontdot.jpg)


    在架构方面，Exadata 是一次巨大的飞跃。与传统的商用硬件配置不同，Exadata 提供了一套软硬件匹配的解决方案。然而，它运行的是与您可以在任何非 Exadata
    平台上安装的相同的 Oracle `11.2.0.3`。因此，相同的基本性能规则仍然适用；不同之处在于增加了智能扫描、智能闪存缓存和功能下推等功能。由于本书的目的是让您熟悉
    Exadata 并具备相关的专业知识，我们将重点介绍 Exadata 特有的性能指标。此外，我们还将探讨与 Exadata 相关的性能主题及其内部机制。

    '
- fmt: 'Exadata 提供了大量可供使用的性能指标。这是个好消息。不幸的是，这也意味着要面对海量的数据。在追求性能的道路上，拥有大量的指标可供检查是好事；但缺点是你可能在浩瀚的数据中迷失方向，忘记了自己的初衷。知道要查找什么、如何判断情况良好，更重要的是，如何判断情况糟糕，可能很困难。性能监控的关键不在于查看每一个可用的指标，而在于明智地选择指标。你为何选择特定指标以及你应该看到什么值，这些远比指标本身重要。


    最终用户并不关心 Exadata 每秒能提供多少次 I/O；她衡量性能的标准是响应时间。基本上，事情进展得越快，最终用户就越满意。处理性能问题应该是一个监控和优化响应时间的过程。这正是
    Oracle 等待接口成为非常有用的工具的地方。这些等待事件在[第7章](#9781430260103_Ch07.xhtml)中有讨论。Exadata 还提供了其他指标，以提供额外的信息，帮助你进一步提升性能。诸如智能扫描节省的字节数、通过存储索引避免的
    I/O，以及智能闪存缓存统计信息等数据，都是提升性能的关键。本章将讨论此类指标、如何获取数据以及这些数字的含义。我们还将讨论如何使用这些信息来监控和排查 Exadata
    性能问题。


    ## Measure Twice, Cut Once


    在深入探讨 Exadata 性能指标之前，我们必须回顾一下 Exadata 系统的一些关键部分。无论查询或语句是否使用智能扫描，数据库服务器都会要求存储单元实际检索所需的数据。当使用智能扫描时，存储单元还会通过列投影和谓词过滤协助处理数据。这些过程涉及单元读取数据或索引块、过滤所需的行并仅提取感兴趣的列。存储索引也通过允许存储单元绕过不包含感兴趣列值的
    1MB 数据单元来为此过程做出贡献。从数据库服务器的角度来看，存储单元是分发所需数据的“黑盒子”。这些“黑盒子”也会向数据库服务器传回记录存储单元执行了多少工作的指标。存储单元本身提供了丰富的性能指标，其中许多不会传回数据库服务器。不过，你会发现从存储单元获得的信息足以在数据库服务器级别排查许多性能问题。


    智能扫描是 Exadata 的命脉；它们是实现超越普通商用硬件配置性能水平的关键。理解智能扫描的性能指标非常重要，基于此，我们将再次讨论它们的一些方面。


    ## Smart Scans, Again


    在[第2章](#9781430260103_Ch02.xhtml)中，我们详细讨论了智能扫描和下推；本章不再重复那么详细的内容。我们将讨论你应该了解的重要方面，以便正确分析提供的指标，从而对性能问题做出合理的诊断。


    智能扫描需要直接路径读取和全表扫描、索引快速全扫描或索引全扫描。排查与智能扫描相关的性能问题的第一步是查看是否使用了符合条件的扫描。执行计划会给你这个信息，因此它是合乎逻辑的起点。回到之前的一个例子，我们可以在以下计划中看到符合条件的步骤：


    ```sql

    SQL> select *

      2  from emp

      3  where empid = 7934;


    EMPID EMPNAME                                      DEPTNO

    ---------- ---------------------------------------- ----------

          7934 Smorthorper7934                                  15


    Elapsed: 00:00:00.21


    Execution Plan


    Plan hash value: 3956160932


    | Id  | Operation                 | Name | Rows  | Bytes | Cost (%CPU)| Time    
    |


    |   0 | SELECT STATEMENT          |      |     1 |    28 |  6361   (1)| 00:00:01
    |

    |*  1 |  TABLE ACCESS STORAGE FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01
    |


    Predicate Information (identified by operation id):


    1 - storage("EMPID"=7934)

           filter("EMPID"=7934)


    Statistics


    1  recursive calls

        1  db block gets

    40185  consistent gets

    22594  physical reads

      168  redo size

      680  bytes sent via SQL*Net to client

      524  bytes received via SQL*Net from client

        2  SQL*Net roundtrips to/from client

        0  sorts (memory)

        0  sorts (disk)

        1  rows processed


    SQL>

    ```


    正如我们在[第2章](#9781430260103_Ch02.xhtml)中所说，仅仅因为计划步骤中有`STORAGE`，并不能保证执行了智能扫描。你必须深入查看，确认是否使用了直接路径读取。在判断是否使用了智能扫描之前，还适用其他标准，例如计划输出中存在列投影数据。谓词过滤也可以在智能扫描中进行。存储索引也可以提供好处，允许
    Oracle 绕过不包含感兴趣列值的 1MB 数据段。请注意，在提供的计划中，全扫描步骤包含关键字`STORAGE`，并且谓词信息包含一个`storage()`条目。再次强调，这些并不能保证执行了智能扫描，只表明该语句*符合*智能扫描执行的条件。然而，查询计划中缺少这些项，确实表明不可能发生智能扫描。你可能还会看到一些计划，其中`STORAGE`关键字存在但缺少`storage()`谓词信息，这表明没有执行谓词下推。在这种情况下，你可能会发现查询仍然从列投影中受益。


    即使执行计划中存在所有上述标准，仍然有可能不执行智能扫描。为什么？记住，智能扫描需要直接路径读取；如果没有执行直接路径读取，那么就不会执行智能扫描。任何时候使用并行执行时都会发生直接路径读取，但也可以串行发生，特别是当`_serial_direct_read`参数设置为`TRUE`时。在调查智能扫描性能时，必须检查执行计划以及任何表明可能使用了直接路径读取的指标。此类指标在[第2章](#9781430260103_Ch02.xhtml)中讨论过，相关的等待事件在[第6章](#9781430260103_Ch06.xhtml)中讨论。这两个信息源都将用于排查智能扫描性能问题。


    ## Performance Counters and Metrics


    `V$SQL`和`GV$SQL`视图提供了两个我们用于证明智能扫描执行的指标：`io_cell_offload_eligible_bytes`和`io_cell_offload_returned_bytes`。它们用于计算因执行智能扫描而未读取的数据百分比。我们在[第2章](#9781430260103_Ch02.xhtml)中提供了这个脚本，但再次查看并理解它报告的内容是有益的：


    ```sql

    SQL> select sql_id,

      2  io_cell_offload_eligible_bytes qualifying,

      3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,

      4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,
    2) io_saved_pct,

      5  sql_text

      6  from v$sql

      7  where io_cell_offload_returned_bytes> 0

      8  and instr(sql_text, ''emp'') > 0

      9  and parsing_schema_name = ''BING'';


    SQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT

    ------------- ---------- ---------- ------------ -------------------------------------

    gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid
    = 7934


    SQL>

    ```'
  raw: 'Exadata provides plenty of performance metrics to use. That’s the good news.
    Unfortunately, Exadata provides plenty of performance metrics to use. That’s the
    bad news. It is good to have a vast array of metrics to examine in the quest for
    performance; the downside of that is you can get so lost in the wealth of performance
    data, you forget what you are looking for. Knowing what to look for, how to tell
    when things are good, and, more important, when things are bad can be difficult.
    The key to monitoring performance is not looking at every metric available but
    choosing metrics wisely. Why you are choosing specific metrics and what values
    you should be seeing are much more important.


    The end user doesn’t care how many I/Os per second Exadata can provide; she measures
    performance in terms of response time. Basically speaking, the faster things go,
    the happier the end user will be. Addressing performance issues should be a process
    of monitoring and optimizing the response time. This is where the Oracle Wait
    interface becomes a very useful tool. These wait events are discussed in [Chapter
    7](#9781430260103_Ch07.xhtml). Exadata also supplies other metrics to provide
    additional information that can allow you to further enhance performance. Data
    such as the number of bytes saved by a Smart Scan, the I/O avoided by use of a
    storage index, and Smart Flash Cache statistics provide keys to improving performance.
    This chapter will discuss such metrics, how to get the data, and what the numbers
    mean. We will also discuss monitoring and troubleshooting Exadata performance
    problems using this information.


    Measure Twice, Cut Once


    Before we dive into the Exadata performance metrics, we have to review some key
    pieces of the Exadata system. Whether or not a query or statement uses a Smart
    Scan, the database servers ask the storage cells to actually retrieve the requested
    data. When a Smart Scan is in use, the storage cells also assist in processing
    that data through column projection and predicate filtering. These processes involve
    the cells reading the data or index blocks, filtering the desired rows, and extracting
    only the columns of interest. Storage indexes also contribute to this process,
    by allowing the storage cells to bypass 1MB units of data that do not contain
    the column values of interest. From the database server perspective, the storage
    cells are black boxes from which the desired data is dispensed. These “black boxes”
    also pass back to the database servers metrics that record how much work those
    storage cells have performed. The storage cells themselves provide a rich palette
    of performance metrics, many of which are not passed back to the database servers.
    However, you will find sufficient information from the storage cells available
    at the database server level to troubleshoot many performance issues.


    Smart Scans are the lifeblood of Exadata; they are key to achieving performance
    levels beyond common commodity hardware configurations. It is important that you
    understand the performance metrics for Smart Scans, and with that thought in mind,
    we will discuss, again, some aspects of them.


    Smart Scans, Again


    In [Chapter 2](#9781430260103_Ch02.xhtml) we discussed Smart Scans and offloading
    at length; we won’t go into that level of detail in this chapter. We will discuss
    important aspects you should know, in order to properly analyze the supplied metrics
    to make an informed diagnosis of performance issues.


    Smart Scans require direct-path reads and full-table scans, index fast full scans
    or index full scans. The first step in troubleshooting performance issues regarding
    Smart Scans is to see if one of the qualifying full scans was used. The execution
    plan will give you that information, so it’s the logical place to begin. Going
    back to a previous example, we can see the qualifying step in the following plan:


    ```

    SQL> select *

      2  from emp

      3  where empid = 7934;


    EMPID EMPNAME                                      DEPTNO

    ---------- ---------------------------------------- ----------

          7934 Smorthorper7934                                  15


    Elapsed: 00:00:00.21


    Execution Plan


    Plan hash value: 3956160932


    | Id  | Operation                 | Name | Rows  | Bytes | Cost (%CPU)| Time    
    |


    |   0 | SELECT STATEMENT          |      |     1 |    28 |  6361   (1)| 00:00:01
    |

    |*  1 |  TABLE ACCESS STORAGE FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01
    |


    Predicate Information (identified by operation id):


    1 - storage("EMPID"=7934)

           filter("EMPID"=7934)


    Statistics


    1  recursive calls

        1  db block gets

    40185  consistent gets

    22594  physical reads

      168  redo size

      680  bytes sent via SQL*Net to client

      524  bytes received via SQL*Net from client

        2  SQL*Net roundtrips to/from client

        0  sorts (memory)

        0  sorts (disk)

        1  rows processed


    SQL>

    ```


    As we stated in [Chapter 2](#9781430260103_Ch02.xhtml), simply because `STORAGE`
    is in the plan step, that is not a guarantee that a Smart Scan was executed. You
    have to dig deeper and see if direct-path reads were used. Other criteria also
    apply before it can be determined if a Smart Scan was used, such as the presence
    of column-projection data in the plan output. Predicate filtering also can take
    place with a Smart Scan. Storage indexes can also provide benefit, by allowing
    Oracle to bypass 1MB data segments that do not contain the column values of interest.
    Notice in the supplied plan that the full-scan step includes the keyword `STORAGE`
    and that the predicate information includes a `storage()` entry. Again, these
    do not guarantee that a Smart Scan was executed, only that the statement *qualifies*
    for Smart Scan execution. The absence of these items in a query plan does, however,
    indicate that a Smart Scan cannot occur. You may also see plans where the `STORAGE`
    keyword is present but the `storage()` predicate information is missing, indicating
    that no predicate offload was executed. In such cases, you may find that the query
    still benefited from column projection.


    It is possible to have all of the previously mentioned criteria in an execution
    plan and still not execute a Smart Scan. Why? Remember that Smart Scans require
    direct-path reads; if no direct-path reads are executed, then no Smart Scan will
    be executed. Direct-path reads occur any time parallel execution is used but can
    also occur serially, especially if the `_serial_direct_read` parameter is set
    to `TRUE`. It is necessary when investigating Smart Scan performance to check
    the execution plan and any metrics indicating direct-path reads may have been
    used. Such metrics were discussed in [Chapter 2](#9781430260103_Ch02.xhtml), and
    the associated wait events were discussed in [Chapter 6](#9781430260103_Ch06.xhtml).
    Both sources of information will be used to troubleshoot Smart Scan performance.


    Performance Counters and Metrics


    The `V$SQL` and `GV$SQL` views provide two metrics we have used to prove Smart
    Scan execution, `io_cell_offload_eligible_bytes`, and `io_cell_offload_returned_bytes`.
    These are used to compute the percentage of data not read because a Smart Scan
    was executed. We provided this script in [Chapter 2](#9781430260103_Ch02.xhtml),
    but it is good to look at it again and understand what it reports:


    ```

    SQL> select sql_id,

      2  io_cell_offload_eligible_bytes qualifying,

      3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,

      4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,
    2) io_saved_pct,

      5  sql_text

      6  from v$sql

      7  where io_cell_offload_returned_bytes> 0

      8  and instr(sql_text, ''emp'') > 0

      9  and parsing_schema_name = ''BING'';


    SQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT

    ------------- ---------- ---------- ------------ -------------------------------------

    gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid
    = 7934


    SQL>

    ```'
  trans: '

    Exadata 提供了大量可供使用的性能指标。这是个好消息。不幸的是，这也意味着要面对海量的数据。在追求性能的道路上，拥有大量的指标可供检查是好事；但缺点是你可能在浩瀚的数据中迷失方向，忘记了自己的初衷。知道要查找什么、如何判断情况良好，更重要的是，如何判断情况糟糕，可能很困难。性能监控的关键不在于查看每一个可用的指标，而在于明智地选择指标。你为何选择特定指标以及你应该看到什么值，这些远比指标本身重要。


    最终用户并不关心 Exadata 每秒能提供多少次 I/O；她衡量性能的标准是响应时间。基本上，事情进展得越快，最终用户就越满意。处理性能问题应该是一个监控和优化响应时间的过程。这正是
    Oracle 等待接口成为非常有用的工具的地方。这些等待事件在第 7 章中有讨论。Exadata 还提供了其他指标，以提供额外的信息，帮助你进一步提升性能。诸如智能扫描节省的字节数、通过存储索引避免的
    I/O，以及智能闪存缓存统计信息等数据，都是提升性能的关键。本章将讨论此类指标、如何获取数据以及这些数字的含义。我们还将讨论如何使用这些信息来监控和排查 Exadata
    性能问题。


