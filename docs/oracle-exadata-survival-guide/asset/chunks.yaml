    This example also illustrates that `cellsrvstat` can in seconds automatically
    generate data for a specified number of runs at a specified interval. Automating
    these commands from the database servers uses `ssh` to log in to the storage cell
    and pass the desired command to the command prompt. An example for `cellsrvstat`
    follows:


    ```

    echo "=========================================================================================="

    echo "======================================= Cell 1 ==========================================="

    echo "=========================================================================================="

    /usr/bin/ssh celladmin@mytexa1cel01-priv.mydomain.com   "cellsrvstat -stat_group=smartio
    -interval=$1 -count=$2"

    echo "=========================================================================================="

    echo "======================================= Cell 2" ===========================================

    echo "=========================================================================================="

    /usr/bin/ssh celladmin@myexa1cel02-priv.mydomain.com  "cellsrvstat -stat_group=smartio
    -interval=$1 -count=$2"

    echo "=========================================================================================="

    echo "======================================= Cell 3" ===========================================

    echo "=========================================================================================="

    /usr/bin/ssh celladmin@myexa1cel03-priv.mydomain.com  "cellsrvstat -stat_group=smartio
    -interval=$1 -count=$2"

    ```


    ![image](images/sq.jpg) **Note**  This script relies on passwordless login for
    `celladmin` to the various storage cells and, because of this, can run from cron.
    If passwordless login is not configured, the script can be run manually from the
    command prompt, and it will ask for the password before continuing. Since there
    are numerous resources describing how to set up passwordless access across servers,
    we won’t discuss that here.


    Once you have such a script written, it’s another easy task to generate a logfile
    of the output on the database server. Simply create another script which calls
    this one, providing the desired parameters, and redirect the output to a local
    file, as follows:


    ```

    /home/oracle/bin/cellsrvstat_smartio.sh 5 100 > /home/oracle/mydb/logs/cellsrvstat_smartio_`date
    ''+%m%d%Y%H%M%S''`.log

    ```


    The output will be directed to the specified logfile on the database server, so
    you can examine the output without having to visit the storage cells directly.


    You can also perform a similar operation using the dcli utility from the database
    server. Using the –c option allows you to specify a comma-delimited list of storage
    cell names dcli is to connect to. The entire command you want executed, including
    any supplied parameters, must be enclosed in single quotes. An example of generating
    a similar report on storage cells 4 and 5 follows.


    ![image](images/Table9-1a.jpg)![image](images/Table9-1b.jpg)


    The storage cell name is displayed, as well as the `cellsrvstat` report data for
    each interval reported. This also relies on passwordless `ssh` access to the storage
    cells; if that isn’t established, it will be necessary to enter a password to
    connect to each cell in the list.


    It is well worth the time and slight amount of effort to set up such monitoring
    of the storage cells using cron, as it will pay off in the long run. Troubleshooting
    Smart Scan and Smart Flash Cache issues can be made easier by having a baseline
    for current performance. Differences and deviations will be easier to spot and
    address, making troubleshooting time shorter and problem resolution faster.


    Things to Know


    There are two accounts you, as a DBA, should be aware of for the storage cells:
    `cellmonitor` and `celladmin`. The `cellmonitor` account is strictly a monitoring
    login and has restricted access to the storage cell directory structure.The `celladmin`
    account has far more access and privilege and is intended to be used for administrative
    duties.


    The storage cells can be accessed by `ssh`; the addresses for the available storage
    cells are available in the `/etc/hosts` files on all available database servers
    in the Exadata system.'
