    create or replace directory ADMIN_BAD_DIR as '/u01/oracle/directories/bad';\n\
    create or replace directory XMLDIR as '/u01/oracle/directories/rdbms/xml';\ncreate\
    \ or replace directory ADMIN_DAT_DIR as '/u01/oracle/directories/dat';\ncreate\
    \ or replace directory DATA_PUMP_DIR as '/u01/oracle/admin/mydb/dpdump/';\ncreate\
    \ or replace directory ORACLE_OCM_CONFIG_DIR as '/u01/oracle/directories/ccr/state';\n\
    \n6 rows selected.\n\nSQL>\n```\n\n将此输出假脱机到一个文件，并编辑目标文本以指向 `Exadata` 上新创建的位置。然后，在迁移后的数据库中运行生成的脚本来重新创建这些目录就是一项简单的任务。\n\
    \n## 转换数据库文件\n\n你必须在可用的外部存储上为转换后的数据库文件创建一个目标位置。在本例中，我们将使用 `/obkups/db_convert`\
    \ 作为这些文件的目标目录。获取源数据库的当前备份，然后关闭源数据库并以只读模式启动。将 `RMAN` 连接到目标数据库并执行 `CONVERT DATABASE`\
    \ 命令，如下所示：\n\n```\nCONVERT DATABASE NEW DATABASE 'mydb'\n          TRANSPORT SCRIPT\
    \ '/obkups/db_convert/migratedb.sql'\n          TO PLATFORM 'Linux IA (64-bit)'\n\
    \          DB_FILE_NAME_CONVERT = ('/home/oracle/dbs','/obkups/db_convert');\n\
    ```\n\n`RMAN` 将转换数据库文件并将其放置在 `/obkups/db_convert` 目录中，同时生成一个 `pfile` 副本和迁移脚本。如果外部存储并非两台服务器共享，则必须将这些文件传输到\
    \ `Exadata` 系统。一旦所有生成的文件传输完毕，你将需要编辑迁移脚本以启用受限会话。一个包含编辑内容的示例迁移脚本如下：\n\n```\n-- The\
    \ following commands will create a control file and use it\n-- to open the database.\n\
    -- Data used by Recovery Manager will be lost.\n-- The contents of online logs\
    \ will be lost and all backups will\n-- be invalidated. Use this only if online\
    \ logs are damaged.\n\n-- After mounting the created controlfile, the following\
    \ SQL\n-- statement will place the database in the appropriate\n-- protection\
    \ mode:\n--  ALTER DATABASE SET STANDBY DATABASE TO MAXIMIZE PERFORMANCE\n\nSTARTUP\
    \ NOMOUNT PFILE='init_00bz4glk_1_0.ora'\nCREATE CONTROLFILE REUSE SET DATABASE\
    \ \"MYDB\" RESETLOGS  NOARCHIVELOG\n    MAXLOGFILES 32\n    MAXLOGMEMBERS 2\n\
    \    MAXDATAFILES 32\n    MAXINSTANCES 1\n    MAXLOGHISTORY 226\nLOGFILE\n  GROUP\
    \ 1 '/obkups/db_convert/archlog1'  SIZE 25M,\n  GROUP 2 '/obkups/db_convert/archlog2'\
    \  SIZE 25M\nDATAFILE\n  '/obkups/db_convert/system01.dbf',\n  '/obkups/db_convert/sysaux01.dbf',\n\
    \  '/obkups/db_convert/mydatatbs01.dbf',\n  '/obkups/db_convert/mydatatbs02.dbf',\n\
    \  '/obkups/db_convert/mydatatbs03.dbf'\nCHARACTER SET AL32UTF8\n;\n\n-- ALTER\
    \ SYSTEM statement added to enable restricted session.\n\nALTER SYSTEM ENABLE\
    \ RESTRICTED SESSION;\n\n-- Database can now be opened zeroing the online logs.\n\
    ALTER DATABASE OPEN RESETLOGS;\n\n-- No tempfile entries found to add.\n--\n\n\
    set echo off\nprompt ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n\
    prompt * Your database has been created successfully!\nprompt * There are many\
    \ things to think about for the new database. Here\nprompt * is a checklist to\
    \ help you stay on track:\nprompt * 1. You may want to redefine the location of\
    \ the directory objects.\nprompt * 2. You may want to change the internal database\
    \ identifier (DBID)\nprompt *    or the global database name for this database.\
    \ Use the\nprompt *    NEWDBID Utility (nid).\nprompt ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n\
    \nSHUTDOWN IMMEDIATE\n-- UPGRADE option sets restricted session\nSTARTUP UPGRADE\
    \ PFILE='init_00bz4glk_1_0.ora'\n@@ ?/rdbms/admin/utlirp.sql\nSHUTDOWN IMMEDIATE\n\
    -- NOTE: The startup below is generated without the RESTRICT clause.\n-- Add the\
    \ RESTRICT clause.\nSTARTUP RESTRICT PFILE='init_00bz4glk_1_0.ora'\n-- The following\
    \ step will recompile all PL/SQL modules.\n-- It may take serveral hours to complete.\n\
    @@ ?/rdbms/admin/utlrp.sql\nset feedback 6;\n```\n\n## 将数据文件移动到 ASM 磁盘组\n\n此时数据库应使用文件系统创建，而非\
    \ `ASM`，因此现在需要将数据文件移动到正确的 `ASM` 磁盘组中。复制由前述 `RMAN CONVERT` 过程生成的 `pfile`。使用 `RMAN`，你将需要进行另一次备份，这次使用类似于以下示例的脚本：\n\
    \n```\nRUN\n{\n  ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev2\
    \ DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL\
    \ dev4 DEVICE TYPE DISK;\n  BACKUP AS COPY\n    INCREMENTAL LEVEL 0\n    DATABASE\n\
    \    FORMAT '+DATA_MYEXA1'\n    TAG 'ASM_DB_MIG';\n}\n```\n\n这将把文件系统的数据库文件放入 `+DATA_MYEXA1`\
    \ 磁盘组。通过 `RMAN` 归档当前日志，如下所示：\n\n```sql\nSQL \"ALTER SYSTEM ARCHIVE LOG CURRENT\"\
    ;\n```\n\n你正在使用 `pfile`，因此有必要在 `ASM` 磁盘组中创建一个 `spfile`。使用以下示例创建新的 `spfile`：\n\n\
    ```\nCREATE SPFILE='+DATA_MYEXA1/spfile<sid>.ora'\nFROM PFILE='/obkups/db_convert/'init_00bz4glk_1_0.ora';\n\
    ```\n\n现在可以干净地关闭数据库了。在 `$ORACLE_HOME/dbs` 目录中创建一个新的 `init<sid>.ora` 文件，内容如下：\n\
    \n```\nSPFILE='+DATA_MYEXA1/spfile<sid>.ora'\n```"
