    Performance metrics aren’t the only values collected for the Smart Flash Cache.
    You can see what is in the cache, using the LIST FLASHCACHECONTENT command. To
    see which attributes are available to view or that can be used to filter the output,
    the FLASHCACHECONTENT object can be described:


    ```

    CellCLI> describe flashcachecontent

            cachedKeepSize

            cachedSize

            dbID

            dbUniqueName

            hitCount

            hoursToExpiration

            missCount

            objectNumber

            tableSpaceNumber

    ```


    A specific database can be targeted using either dbUniqueName or dbID. The objectNumber
    and tableSpaceNumber attributes are specific to a given dbUniqueName/dbID, so
    they should be used in conjunction with either dbUniqueName or dbID. To view the
    unique database name, the object number, the KEEP size, the cache size, the hit
    count, and miss count for objects from the DBM database, the command would be
    as follows:


    ```

    CellCLI> list flashcachecontent where dbUniqueName = ''DBM'' and hitcount > 99
    attributes dbUniqueName, objectNumber, cachedKeepSize, cachedSize, hitcount, misscount

             DBM     2       0       172032          1889    350

             DBM     8       0       81920           168     7

             DBM     104     0       622592          170     48

             DBM     225     0       2654208         382     247

             DBM     227     0       1081344         173     77

             DBM     268     0       1859584         770     25

             DBM     271     0       65536           298     5

             DBM     272     0       65536           383     4

             DBM     421     0       2064384         8120    772

             DBM     424     0       589824          2391    63

             DBM     425     0       122880          372     17

             DBM     466     0       196608          612     37

             DBM     469     0       131072          462     4

             ...

             DBM     48306   0       32768           242     120

             DBM     48406   0       196608          102     12

             DBM     48464   0       237568          116     110

             DBM     48466   0       1220608         247     104

             DBM     48663   0       802816          142     52

             DBM     48705   0       917504          101     20

             DBM     48840   0       2334720         170     31

