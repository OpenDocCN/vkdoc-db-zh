    \n并非每个增量备份都会触发此等待事件。增量级别 0 备份不会触发，因为它们本质上是完整备份，不依赖于块更改跟踪。它们是任何使用增量备份的恢复操作的起点，这就是为什么在执行恢复时，如果没有`RECOVER\
    \ ... UNTIL ...`子句或`SET UNTIL TIME`语句，最近的增量级别 0 备份会取代任何先前的增量级别 0 备份。\n\n此事件仅填充单元哈希值（`cellhash#`）。通常，Oracle\
    \ 会重置或清除当前等待事件未传递的任何参数，但有时，先前等待事件填充的值会残留下来。`obj#`参数就是其中一个可能在记录此事件的 10046 跟踪文件中被填充的参数。在这种情况下，非负的`obj#`是没有意义的。Oracle\
    \ 会用-1 填充`obj#`，以显示它是从先前的事件中清除的。\n\n## 等待事件：Cell Smart Restore from Backup\n\n\
    此事件记录使用 RMAN 进行还原所花费的等待时间。就像前一个事件一样，Exadata 将此处理卸载到存储单元，这些单元再次因其直接访问存储而特别适合此类操作。\n\
    \n此事件实际上与`cell smart file creation`事件相关；两个事件都记录格式化空数据块和与文件创建相关的初始化操作的时间。"
- fmt: '# Idle Class/Other Class


    The five wait events in these classes are rarely used in a properly operating
    Exadata system. We haven’t found them on the systems we manage, and it’s likely
    you won’t either. There is one exception to this, the `cell flash unkeep` event,
    which will be covered in its own section. The remainder of these events are uninformative
    with respect to the P1, P2, and P3 values provided in the `V$SESSION_WAIT` view.
    Table 7-3 lists the events you’re not likely to see and a basic description of
    the parameters supplied to Oracle.


    Table 7-3. Rarely Reported Cell Wait Events


    | Event | Description |

    | --- | --- |

    | Cell manager cancel work request | The information provided by this event is
    Sparse, as none of the parameters that could be supplied are populated in `V$SESSION_WAIT`.
    We have yet to see this event in a `10046` Trace. |

    | Cell worker online completion | This appears to be a cell startup event. The
    only parameter supplied is cell hash (`cellhash#` in a `10046` trace, P1 in the
    `V$SESSION_WAIT` view). This is another wait event that we haven’t seen reported.
    |

    | Cell worker retry | Another wait event that populates only the cell hash (`cellhash#`)
    and nothing else. |

    | Cell worker idle | No parameters are supplied by this event, and we have not
    seen it reported on any of the systems we manage. |


    ## Cell Smart Flash Unkeep


    This event logs time waiting while Oracle flushes blocks out of the Smart Flash
    Cache, but it doesn’t get triggered for objects using the Smart Flash Cache in
    the default FIFO manner. This event tracks wait time for objects intended to be
    kept in the Smart Flash Cache (using the `STORAGE(FLASH_CACHE KEEP)` parameter).
    Operations that trigger this event would be table drops and truncates. An additional
    event associated with this wait is `enq: RO fast object reuse`, as the operation
    that triggers this event also triggers the buffer cache cleanout. Truncating or
    dropping a table also requires removal of any cached data from that object, and,
    on Exadata, there are two separate caches to be maintained.


    The only parameter supplied by this event is the cell hash (`cellhash#`), to identify
    which cell was accessed for the truncated or dropped operation. No other parameters
    in the `WAIT` event in a `10046` trace, or in the `V$SESSION_WAIT` view, are populated.


    ## Things to Know


    The wait interface, which has already been expanded over the last few Oracle releases,
    experiences another expansion with Exadata: the addition of cell-specific events,
    which, in some cases, replace existing events found on non-Exadata systems. New
    events have also been added to monitor new mechanisms specific to Exadata.


    The `cell smart table scan` event records time against Smart Scans, making this
    event an important one with respect to Exadata or systems using Exadata storage.
    This event usually replaces the `direct path read` event, although you can still
    find direct-path read waits on an Exadata system when queries do not qualify for
    a Smart Scan.


    The `cell smart index scan` event reports time waited for index fast full scans;
    no other index access path triggers this wait.


    The `cell single block physical read` event is the Exadata equivalent of the `db
    file sequential read` event on non-Exadata systems. It is most often associated
    with index access operations and table access by index rowid operations, but any
    single-block access operation can trigger this wait. It is, in our opinion, more
    accurately named than its non-Exadata equivalent, as the blocks read are single
    blocks and not necessarily sequential.


    The `cell multiblock physical read` event collects time for sequential multiblock
    reads and is the replacement for the `db file scattered read` event. Again, we
    feel the Exadata event is better named, as it indicates that sequential collections
    of data blocks are read. The `db file scattered read` event records time against
    both sequential and nonsequential reads in non-Exadata systems, so its name is
    somewhat confusing.


    Exadata provides a new event, `cell list of blocks read`, to record time against
    nonsequential, or scattered, block reads. This event can also replace the `db
    file scattered read` event, because the old event, as mentioned previously, records
    time against all multiblock reads, sequential or not.


    Data block preparation is offloaded to the storage cells in Exadata and, because
    of this, a new event, named `cell smart file creation`, has been added. The name
    is somewhat of a misnomer, as it doesn’t necessarily refer to file creation (although
    that is one operation that can trigger this wait), but usually collects time against
    data block formatting/reformatting, to prepare for new data. Operations that trigger
    this event include deletes, updates, database file creation, and file autoextension.


    The `cell statistics gather` event is one that we feel is miscategorized, as it
    has nothing to do with disk I/O operations. Recording time against access of various
    `V$` and `X$` tables/views, it may be more accurately considered a System I/O
    or other wait-class event.


    RMAN also has waits specific to Exadata, as some of the RMAN operations are offloaded
    to the storage cells. The `cell smart incremental backup` event records wait time
    experienced by Incremental Level 1 backups. Because an Incremental Level 0 backup
    is actually a full backup and starting point for the next series of Level 1 incremental
    backups, it is not a backup that triggers this event.


    The `cell smart restore from backup` event collects wait times experienced by
    RMAN when performing a database restore, as operations specific to this wait are
    offloaded to the storage cells. Because the storage cells are the only servers
    in an Exadata system having direct access to the storage, it makes sense to offload
    these two RMAN operations.


    Exadata has, as one of the performance enhancements, the Smart Flash Cache. When
    tables/indexes are created with the `STORAGE(FLASH_CACHE KEEP)` directive, the
    `cell smart flash unkeep` event can be triggered when these objects are truncated
    or dropped. These operations also trigger buffer cache cleanup, so trace files
    reporting this event usually report the `enq: RO fast object reuse` wait as well.


    # Chapter 8 Measuring Performance


    ![image](images/frontdot.jpg)


    Exadata is a huge leap forward, with respect to its architecture. Unlike traditional
    commodity hardware configurations, Exadata provides a matched set of hardware
    and software. However, it is running the same Oracle `11.2.0.3` you can install
    on any non-Exadata platform. Thus, the same basic performance rules apply; the
    difference is the additional functionality of Smart Scans, the Smart Flash Cache,
    and offloading, to name a few. Because the purpose of this book is to make you
    familiar with, and work knowledgeably on, Exadata, it is the Exadata-specific
    performance metrics we will be covering. Additionally, we will cover Exadata-related
    performance topics and relevant internals.'
