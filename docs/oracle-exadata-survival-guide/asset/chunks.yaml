    \     2013-07-09T17:33:53-05:00               1488.75G        7af2354f-1e3b-4932-b2be-4c57a1c03f33\
    \     \n1488.75G        normal\n\nCellCLI>\n```\n\n`LIST FLASHCACHE ATTRIBUTES\
    \ ALL` 命令会返回所有可用属性的值，但输出格式可能难以阅读。您可以缩小列表范围，仅报告选定的属性。\n\n```\nCellCLI> list flashcache\
    \ attributes name, degradedCelldisks, effectiveCacheSize\n         myexa1cel04_FLASHCACHE\
    \          1488.75G\n\nCellCLI>\n```\n\n请注意，任何 `LIST FLASHCACHE ATTRIBUTES` 语句的输出中都不包含属性名称。您可以使用\
    \ `DESCRIBE` 命令来提供属性名称，如下所示：\n\n```\nCellCLI> describe flashcache\n        name\n\
    \        cellDisk\n        creationTime\n        degradedCelldisks\n        effectiveCacheSize\n\
    \        id\n        size\n        status\n\nCellCLI>\n```\n\n您也可以使用 `LIST FLASHCACHE\
