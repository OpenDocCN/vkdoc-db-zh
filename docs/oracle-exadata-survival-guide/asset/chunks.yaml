             3        247   92028928


    SQL>

    ```


    The only evidence of storage index usage is the output from the final query in
    this example. No mention of storage indexes appears in the execution plan output.


    The More, the Merrier


    Data distribution plays a large part in storage index performance, but that’s
    not the only data-related area that can impact Smart Scan execution and, as a
    result, storage index usage. Table size can also determine whether a storage index
    can be utilized. Serial direct path reads are generally utilized for large objects;
    small tables rarely trigger Smart Scans. How big does a table have to be to trigger
    a Smart Scan, and thus use a storage index? For the scripts shown here, the smallest
    table size that would guarantee a Smart Scan generated 40 extents, consuming 335,544,320
    bytes. Smaller table sizes were tried, with no Smart Scans executed; however,
    with the loading method used, a smaller table size that would trigger a Smart
    Scan may not have been generated. Since exhaustive testing was not completed,
    there may be smaller tables that will trigger Smart Scan executions.


    Size isn’t the only factor in whether a Smart Scan will be triggered. Partitioned
    tables can create an interesting situation where the overall table size is sufficient
    to trigger a Smart Scan, but the sizes of the individual partitions aren’t. Such
    a situation is created by the storage_index_part_ex.sql script. Again, the initial
    setup isn’t shown, in order to concentrate on the end results. There are five
    partitions created and populated for this version of the table, with a deliberate
    attempt to evenly spread the data across all of the partitions. The names and
    row counts for each partition are shown as follows:


    ```

    SQL> select count(*) from chicken_hr_tab partition(chick1);

           COUNT(*)


    SQL> select count(*) from chicken_hr_tab partition(chick2);


    COUNT(*)


    SQL> select count(*) from chicken_hr_tab partition(chick3);


    COUNT(*)


    SQL> select count(*) from chicken_hr_tab partition(chick4);


    COUNT(*)


    SQL> select count(*) from chicken_hr_tab partition(chick5);


    COUNT(*)


    SQL>

    ```


    Overall, the table is large enough to ensure that a Smart Scan will be executed,
    and if the query involves a large percentage of the table data, a Smart Scan will,
    indeed, be run. It’s the relatively small sizes of the individual partitions that
    can cause them to not qualify for a Smart Scan. Now that the stage is properly
    set, the same queries from the previous example are executed, and the Smart Scan
    results are reported. The changes between the examples are the partitioned table
    and the partition key distribution, which make a marked difference in Smart Scan
    execution and the benefit a storage index provides. The results, as Exadata reports
    them, are as follows:


