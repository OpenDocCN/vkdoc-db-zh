  raw: 'It is interesting to see which operations trigger the various cell wait events.
    This information is available in the `DBA_HIST_ACTIVE_SESS_HISTORY` view, as well
    as in `V$SYSTEM_EVENT`. It is likely that not every event listed in [Table 7-1](#9781430260103_Ch07.xhtml#Tab1)
    will be reported in `DBA_HIST_ACTIVE_SESS_HISTORY`; however, one event may be
    triggered by a number of plan operations. The query we used to generate a list
    of events and associated operations follows:


    ```

    SQL> select event , non_exa_event, operation ,count(*)

      2  from

      3  (select event,

