    \  (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=XXX.XXX.XXX.XXX)(PORT=1523)))\nServices\
    \ Summary...\nService \"dbm\" has 2 instance(s).\n  Instance \"dbm1\", status\
    \ READY, has 2 handler(s) for this service...\n  Instance \"dbm2\", status READY,\
    \ has 1 handler(s) for this service...\nService \"mydb\" has 2 instance(s).\n\
    \  Instance \"mydb1\", status READY, has 1 handler(s) for this service...\n  Instance\
    \ \"mydb2\", status READY, has 1 handler(s) for this service...\nThe command completed\
    \ successfully\n$\n```\n\n`mydb` 集群数据库已成功注册到 `SCAN` 监听器，并且可以远程访问。\n\n**传输表空间**\n\
    \n可传输表空间对于迁移特定模式或数据子集的数据非常有用，甚至可以跨不同的操作系统平台。但是，要跨平台迁移，还必须使用 RMAN 将数据文件转换为正确的字节序格式。\n\
    \n可传输表空间的过程并不复杂，但在移动之前确实涉及几项检查。第一项检查确定目标表空间中的对象是否是自包含的，意思是说在其他未被考虑为目标表空间中不存在依赖关系。Oracle\
    \ 提供了一个打包过程 `DBMS_TTS.TRANSPORT_SET_CHECK` 来报告此信息。例如，`RETAIL_1` 和 `RETAIL_2` 表空间需要迁移到\
    \ Exadata。要确定此表空间集是否存在任何其他依赖关系，您需要执行以下语句：\n\n```\nEXECUTE DBMS_TTS.TRANSPORT_SET_CHECK('retail_1,retail_2',\
    \ TRUE);\n```\n\n查询 `TRANSPORT_SET_VIOLATIONS` 视图将报告此表空间集的任何问题。\n\n```\nSQL> SELECT\
    \ * FROM TRANSPORT_SET_VIOLATIONS;\n\nVIOLATIONS\n\nConstraint SALES_FK between\
    \ table STORES.SALES in tablespace RETAIL_1 and table\nSTORES.UNIT in tablespace\
    \ UNITLOC\nPartitioned table STORES.MON_SALES is partialy contained in the transportable\
    \ set\n```\n\n输出报告指出 `UNITLOC` 表空间也必须包含在表空间集中，并且需要进行一些调查以找到包含 `STORES.MON_SALES`\
    \ 表分区的所有表空间。第二次尝试，在传输集中包含了 `UNITLOC` 以及 `SALESPART_1`、`SALESPART_2` 和 `SALESPART_3`\
    \ 表空间，成功了，如下例所示：\n\n```\nEXEC DBMS_TTS.TRANSPORT_SET_CHECK('retail_1,retail_2,unitloc,salespart_1,salespart_2,salespart_3',\
    \ TRUE);\n\nPL/SQL procedure successfully completed.\n\nSQL> SELECT * FROM TRANSPORT_SET_VIOLATIONS;\n\
    \nno rows selected\n```\n"
- fmt: "# 数据库迁移至Exadata的步骤与注意事项\n\n## 可传输表空间设置与导出\n\n现在您拥有一个完整的可传输表空间集，确保所有数据和约束都将被传输到目标数据库。下一步是确保无法再针对源数据执行事务，方法是通过以下语句将所需的表空间设置为只读：\n\
    \n```\nalter tablespace retail_1 read only;\nalter tablespace retail_2 read only;\n\
    alter tablespace unitloc read only;\nalter tablespace salespart_1 read only;\n\
    alter tablespace salespart_2 read only;\nalter tablespace salespart_3 read only;\n\
    ```\n\n现在可以导出表空间元数据以备导入目标数据库。在源系统上使用`expdp`生成此元数据导出，并使用`TRANSPORT_TABLESPACES`选项，如下所示：\n\
    \n```\nexpdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir\n\
    transport_tablespaces = retail_1,retail_2,unitloc,salespart_1,salespart_2,salespart_3\n\
    transport_full_check=y\n```\n\n使用`TRANSPORT_FULL_CHECK=Y`选项会验证您之前进行的表空间检查。如果可传输表空间检查因任何原因失败，导出将终止并不成功。尽管如果您没有从`DBMS_TTS.TRANSPORT_SET_CHECK`过程获得任何输出，这不应该发生，但这是在传输表空间时执行的非常好的二次检查，以确保表空间迁移到Exadata后不会出现问题。对于本示例，`TSTRANS_DIR`位置指向`/obkups/tablespaces`，该目录将用作文件传输到Exadata的源目录。\n\
    \n## 复制表空间文件到Exadata\n\n如果源系统和目标系统具有相同的字节顺序（endian-ness），那么就可以将表空间文件和元数据导出文件复制到Exadata了。如果源表空间使用ASM，则必须将它们从ASM复制到文件系统以便传输。这与我们之前提供的将数据迁入ASM的步骤相反。示例如下：\n\
    \n```\nRUN\n{\n  ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev2\
    \ DEVICE TYPE DISK;\n  ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;\n  ALLOCATE CHANNEL\
    \ dev4 DEVICE TYPE DISK;\n  BACKUP AS COPY\n    INCREMENTAL LEVEL 0\n    DATAFILE\
    \ file1,file2,...\n    FORMAT '/obkups/tablespaces/'\n    TAG 'FS_TBLSPC_MIG';\n\
    }\n```\n\n您需要生成所需数据文件的列表，以便修改提供的示例来复制所需的数据文件。执行修改后的语句以将ASM数据文件复制到所需目录。在本示例中，用于传输的目录是`/obkups/tablespaces`。现在，您应该拥有将表空间传输到Exadata所需的所有文件。使用`scp`将`/obkups/tablespaces`的内容复制到连接到Exadata系统的外部位置。使用与您将数据文件移出ASM时相同的基本命令，将传输过来的数据文件复制到ASM中，但将目标更改为您想要的Exadata\
    \ ASM磁盘组。您需要一份刚刚复制到ASM的数据文件的当前列表，以便元数据导入能够成功完成。获得该列表后，修改以下示例，并使用`impdp`导入元数据：\n\
    \n```\nimpdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir\n\
    TRANSPORT_DATAFILES=\n   +DATA_MYEXA1/file1,\n   +DATA_MYEXA1/file2,\n...\n```\n\
    \n期望的情况是，您已在目标数据库中创建了源数据库的必要用户账户，包括所有必要的权限。`impdp`实用程序不会创建这些账户，因此在执行导入之前它们必须存在。导入成功完成后，您需要将表空间设置回读/写模式，如下所示：\n\
    \n```\nalter tablespace retail_1 read write;\nalter tablespace retail_2 read write;\n\
    alter tablespace unitloc read write;\nalter tablespace salespart_1 read write;\n\
    alter tablespace salespart_2 read write;\nalter tablespace salespart_3 read write;\n\
    ```\n\n## 使用物理备数据库进行迁移\n\n物理备数据库是一个很好的迁移策略选择，如果数据库需要在应用程序迁移日期之前迁移到新系统。使用备数据库可以在旧生产系统和新生产系统之间保持数据同步，并允许在最终迁移之前进行连接测试。创建备数据库的过程基本上与本章前面提供的使用RMAN的过程相同。需要额外的步骤来配置辅助归档日志目的地、备用重做日志和重做传输。这些步骤在此不作讨论，因为它们在Oracle在线文档中可用。\n\
    \n使用Oracle 11.2.0.3，可以通过执行切换（switchover）来测试新数据库而不影响备数据库配置。这暂时允许备数据库承担主数据库的角色，提供了一个测试配置并在最终迁移发生前对环境进行必要调整的机会。这还允许您切换回主数据库而无需重建数据库。\n\
    \n在切换日期，将需要故障转移（failover）到备用位置，将备用数据库转换为主数据库。这将是一个“单向”移动，因为源数据库将不再使用，并且不需要重建。\n\
    \n## 迁移后任务\n\n包、过程和视图可能因迁移而失效，因此需要重新编译这些对象并纠正可能出现的任何问题。最好在迁移之前生成源数据库中无效对象的列表。这将使您更容易知道何时成功从源数据库还原了所有有效的已迁移对象。以下脚本将生成该列表：\n\
    \n```\nselect owner, object_name, object_type, status\nfrom dba_objects\nwhere\
    \ status <> 'VALID';\n```\n\n将输出假脱机到文件以供稍后参考，并将该文件传输到Exadata。在迁移后的数据库上再次运行相同的查询，并执行`$ORACLE_HOME/rdbms/admin/utlrp.sql`以重新编译数据库对象，纠正任何问题，直到最终的`INVALID`对象列表与从源数据库生成的列表匹配。\n\
    \n如果您使用物理备数据库将数据库迁移到Exadata，则必须删除为建立备数据库所必需的`spfile`参数，并可能调整控制文件位置以引用多个副本。（通常，备数据库使用单个备用控制文件。）将现有控制文件复制到这些附加位置。\n\
    \n已弃用的`init.ora`参数也可能是个问题，因为源数据库可能是11.2.0.3之前的版本（Exadata上的当前版本）。警报日志是查找此类参数的好地方，以便可以相应地处理它们。\n\
    \n尽管`BFILE`列将被复制，但它们指向的源文件不会被复制。这些文件将必须复制到Exadata系统，并且一旦数据库可以访问它们，`BFILE`定位器将必须根据新位置重新分配。\n\
    \n您可能会发现可能需要其他管理任务，例如调整extent大小、对大表进行分区或压缩表（例如存档表或存档分区）。这些任务也是迁移后列表的一部分。调整extent大小和创建分区可能需要相当长的时间，特别是对于大型数据库。在规划数据库迁移到Exadata时，请考虑此类任务，以便最终用户能够意识到在实际物理迁移之后，数据库可用之前可能仍存在一些任务。\n\
    \n## 逻辑迁移选项\n\n逻辑迁移也是迁移至Exadata的一种选择。此类迁移将涉及导出和导入、复制或数据库链接。以下部分将介绍这些选项。\n\n###\
    \ 导出和导入"
  raw: 'You now have a complete transportable tablespace set, ensuring all of the
    data and constraints will be transferred to the destination database. The next
    step is to ensure that no transactions can be executed against the source data,
    by setting the desired tablespaces to read-only, using the following statements:


    ```

    alter tablespace retail_1 read only;

    alter tablespace retail_2 read only;

    alter tablespace unitloc read only;

    alter tablespace salespart_1 read only;

    alter tablespace salespart_2 read only;

    alter tablespace salespart_3 read only;

    ```


    You are now ready to export the tablespace metadata for import into the destination
    database. Use `expdp` on the source system to generate this metadata export, using
    the `TRANSPORT_TABLESPACES` option, as follows:


    ```

    expdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir

    transport_tablespaces = retail_1,retail_2,unitloc,salespart_1,salespart_2,salespart_3

    transport_full_check=y

    ```


    Using the `TRANSPORT_FULL_CHECK=Y` option verifies the tablespace check you made
    previously. If the transportable tablespace check fails for any reason, the export
    terminates unsuccessfully. Although this shouldn’t occur if you have no output
    from the `DBMS_TTS.TRANSPORT_SET_CHECK` procedure, it is a good second check to
    execute when transporting tablespaces, to ensure there will be no issues once
    the tablespaces are migrated to Exadata. The `TSTRANS_DIR` location is, for this
    example, pointing to `/obkups/tablespaces`, which will be used as the source directory
    for the file transfers to Exadata.


    If the source and destination systems have the same endian-ness, it’s time to
    copy the tablespace files and the metadata export to Exadata. If the source tablespaces
    are using ASM, they will have to be copied out of ASM to the filesystem for transfer.
    This is the reverse of the step we provided to migrate data into ASM. The following
    example is provided:


    ```

    RUN

    {

      ALLOCATE CHANNEL dev1 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev2 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev3 DEVICE TYPE DISK;

      ALLOCATE CHANNEL dev4 DEVICE TYPE DISK;

      BACKUP AS COPY

        INCREMENTAL LEVEL 0

        DATAFILE file1,file2,...

        FORMAT ''/obkups/tablespaces/''

        TAG ''FS_TBLSPC_MIG'';

    }

    ```


    You will have to generate a list of the required data files, so you can modify
    the provided example to copy the desired data files. Execute the modified statement
    to copy the ASM data files into the desired directory. In this example, that is
    `/obkups/tablespaces`, for transport. You should now have all of the files necessary
    to transport the tablespaces to Exadata. Use `scp` to copy the contents of `/obkups/tablespaces`
    to an external location connected to the Exadata system. Copy the transferred
    data files into ASM using the same basic command you used to get the data files
    out of ASM, changing the destination to the desired Exadata ASM disk group. You
    will need a current list of the data files you just copied into ASM, so the metadata
    import will complete successfully. When you have that list, modify the following
    example and import the metadata using impdp:


    ```

    impdp system/password DUMPFILE=retail_data.dmp DIRECTORY=tstrans_dir

    TRANSPORT_DATAFILES=

       +DATA_MYEXA1/file1,

       +DATA_MYEXA1/file2,

    ...

    ```


    The expectation is that you have created the necessary user accounts from the
    source database in the destination database, including all necessary privileges.
    The `impdp` utility will not create these accounts, so they must exist prior to
    executing the import. When the import has successfully completed, you will have
    to put the tablespaces back into read/write mode, as follows:


    ```

    alter tablespace retail_1 read write;

    alter tablespace retail_2 read write;

    alter tablespace unitloc read write;

    alter tablespace salespart_1 read write;

    alter tablespace salespart_2 read write;

    alter tablespace salespart_3 read write;

    ```


    Please Stand By


    A physical standby database is a good choice as a migration strategy, if the database
    has to be migrated to the new system at an earlier date than the application.
    Using a standby database keeps the data synchronized between the old production
    system and the new production system and allows for connectivity testing prior
    to the final move. The process to create a standby database is basically the same
    as the process provided earlier in this chapter that uses RMAN. Additional steps
    to configure a secondary archivelog destination, standby redo logs, and redo transport
    will be necessary. Those steps will not be discussed here, as they are available
    in the Oracle online documentation.


    Using Oracle 11.2.0.3 it’s possible to test the new database without affecting
    the standby configuration, by executing a switchover. This temporarily allows
    the standby to assume the primary role, providing an opportunity to test configurations
    and make necessary adjustments to the environment before the final move occurs.
    This also allows you to switch back to the primary without the necessity of a
    database rebuild.


    On the date of cutover, it will be necessary to failover to the standby location,
    converting the standby to being the primary database. This will be a “one-way”
    move, as the source database will no longer be used and will not have to be rebuilt.


    Post-migration Stuff


    Packages, procedures, and views can be invalidated, owing to the migration, so
    it will be necessary to recompile those objects and correct any issues that may
    arise. It is a good idea to generate a list of invalid objects in the source database
    prior to the move. This will make it easier to know when you have succeeded in
    restoring all of the valid migrated objects from the source database. The following
    script will produce that list:


    ```

    select owner, object_name, object_type, status

    from dba_objects

    where status <> ''VALID'';

    ```


    Spool the output to a file for later reference and transfer that file to Exadata.
    Run that same query again on the migrated database and execute `$ORACLE_HOME/rdbms/admin/utlrp.sql`
    to recompile the database objects, correcting any issues until the final list
    of `INVALID` objects matches the list generated from the source database.


    If you were using a physical standby to migrate a database to Exadata, you would
    have to remove the spfile parameters that were necessary to establish the standby
    and possibly adjust the control file locations to reference multiple copies. (Usually,
    a standby uses a single standby control file.) Copy the existing control file
    to these additional locations.


    Deprecated `init.ora` parameters could also be an issue, as the source database
    may be a release prior to 11.2.0.3 (the current release on Exadata). The alert
    log is a good place to find such parameters, so that they can be dealt with accordingly.


    Although the BFILE columns will be replicated, the source files they point to
    will not. These files will have to be copied over to the Exadata system, and,
    once they are accessible to the database, the BFILE locators will have to be reassigned,
    based on the new locations.


    You may find that other management tasks may be necessary, such as resizing extents,
    partitioning large tables, or compressing tables (such as archived tables or archived
    partitions). These tasks are also part of the post-migration list. Resizing extents
    and creating partitions can take a considerable amount of time, especially for
    large databases. Take such tasks into consideration when planning database migrations
    to Exadata, so that the end users will be aware that after the actual physical
    migration, tasks may still exist before the database can be made available for
    use.


    That’s Logical


    Logical migration is also an option to Exadata. Such a migration would involve
    export and import, replication, or database links. Each of these options will
    be covered in the following sections.


    Export and Import'
