    \n`cellmonitor` 账户是在服务器级别查看存储单元的一个良好起点，但它功能受限，因为它只是一个监控账户，无法管理存储单元。要更深入地研究存储单元并获取额外的统计信息和指标，您必须使用\
    \ `celladmin` 账户。\n\n以 `celladmin` 身份连接到存储单元与以 `cellmonitor` 身份连接没有区别；但是，`celladmin`\
    \ 提供了更多的功能和指标访问权限。除了 `cellcli`，`celladmin` 账户还可以访问 `cellsrvstat`，它可以提供 `cellcli`\
    \ 未报告的额外统计信息和指标。\n\n当以 `celladmin` 身份连接时，`cellcli` 接口提供了本章前面列出的全部函数列表。由于这是一个管理员账户，您可以执行\
    \ `cellmonitor` 无法完成的以下操作：\n\n```\nALTER ALERTHISTORY\nALTER CELL\nALTER CELLDISK\n\
    ALTER GRIDDISK\nALTER IBPORT\nALTER IORMPLAN\nALTER LUN\nALTER PHYSICALDISK\n\
    ALTER QUARANTINE\nALTER THRESHOLD\nASSIGN KEY\nCREATE CELL\nCREATE CELLDISK\n\
    CREATE FLASHCACHE\nCREATE FLASHLOG\nCREATE GRIDDISK\nCREATE KEY\nCREATE QUARANTINE\n\
    CREATE THRESHOLD\nDESCRIBE\nDROP ALERTHISTORY\nDROP CELL\nDROP CELLDISK\nDROP\
    \ FLASHCACHE\nDROP FLASHLOG\nDROP GRIDDISK\nDROP QUARANTINE\nDROP THRESHOLD\n\
    EXPORT CELLDISK\nIMPORT CELLDISK\n```\n\n## 查看告警历史\n\n在存储单元的可用指标中，告警历史是开始查找潜在问题的好地方。查看\
    \ `LIST ALERTHISTORY DETAIL` 的输出，我们看到以下信息：\n\n```\nCellCLI> list alerthistory\
    \ detail\n         name:                   1_1\n         alertMessage:       \
    \    \"Cell configuration checkdiscovered the following problems:\nCheck Exadata\
    \ configuration via ipconf utility Verifying of Exadata configuration file /opt/oracle.cellos/cell.conf\
    \ Error. Exadata configuration file not found /opt/oracle.cellos/cell.conf [INFO]\
    \ The ipconf check may generate a failure for temporary inability to reach NTP\
    \ or DNS server. You may ignore this alert, if the NTP or DNS servers are valid\
    \ and available. [INFO] You may ignore this alert, if the NTP or DNS servers are\
    \ valid and available. [INFO] As root user run /usr/local/bin/ipconf -verify -semantic\
    \ to verify consistent network configurations.\"\n         alertSequenceID:  \
    \      1\n         alertShortName:         Software\n         alertType:     \
    \         Stateful\n         beginTime:              2013-05-14T22:31:59-05:00\n\
    \         endTime:                2013-06-20T11:36:18-05:00\n         examinedBy:\n\
    \         metricObjectName:       checkconfig\n         notificationState:   \
    \   0\n         sequenceBeginTime:      2013-05-14T22:31:59-05:00\n         severity:\
    \               critical\n         alertAction:            \"Correct the configuration\
    \ problems. Then run cellcli command:\nALTER CELL VALIDATE CONFIGURATION   Verify\
    \ that the new configuration is correct.\"\n\nmyexa1celmyexa1cel....\n\nname:\
    \                   4_1\n         alertMessage:           \"The disk controller\
    \ battery is executing a learn cycle and may\ntemporarily enter WriteThrough Caching\
    \ mode as part of the learn cycle. Disk write throughput\nmight be temporarily\
    \ lower during this time. The flash drives are not affected. The battery\nlearn\
    \ cycle is a normal maintenance activity that occurs quarterly and runs for approximately\
    \ 1\nto 12 hours.  Note that many learn cycles do not require entering WriteThrough\
    \ caching mode.\nWhen the disk controller cache returns to the normal WriteBack\
    \ caching mode, an additional\ninformational alert will be sent.  Battery Serial\
    \ Number : 6360  Battery Type          : iBBU08\nBattery Temperature   : 35 C\
    \  Full Charge Capacity  : 1342 mAh  Relative Charge       : 97 %\nAmbient Temperature\
    \   : 22 C\"\n         alertSequenceID:        4\n         alertShortName:   \
    \      Hardware\n         alertType:              Stateful\n         beginTime:\
    \              2013-07-17T04:00:56-05:00\n         endTime:                2013-07-17T10:09:16-05:00\n\
    \         examinedBy:\n         metricObjectName:       LUN_LEARN_CYCLE_ALERT\n\
    \         notificationState:      0\n         sequenceBeginTime:      2013-07-17T04:00:56-05:00\n\
    \         severity:               info\n         alertAction:            Informational.\n\
    ```\n"
- fmt: '# Exadata警报管理与系统监控


    ## 1. 警报属性示例


    以下是名为 `4_2` 的警报详细信息示例：

    ```

    name:                   4_2

             alertMessage:           "All disk drives are in WriteBack caching mode.  Battery
    Serial

    Number : 6360  Battery Type          : iBBU08  Battery Temperature   : 39 C  Full
    Charge

    Capacity  : 1345 mAh  Relative Charge       : 52 %  Ambient Temperature   : 21
    C"

             alertSequenceID:        4

             alertShortName:         Hardware

             alertType:              Stateful

             beginTime:              2013-07-17T10:09:16-05:00

             endTime:                2013-07-17T10:09:16-05:00

             examinedBy:

             metricObjectName:       LUN_LEARN_CYCLE_ALERT

             notificationState:      0

             sequenceBeginTime:      2013-07-17T04:00:56-05:00

             severity:               clear

             alertAction:            Informational.


    CellCLI>

    ```


    ## 2. `examinedBy` 属性的使用


    在这里，您可以看到警报的名称（`name`）、消息（`alertMessage`）、时间范围（`beginTime`, `endTime`）、严重程度（`severity`）以及处理操作（`alertAction`）等属性。同时，请注意
    `examinedBy` 属性。该属性报告了检查此警报的数据库管理员（DBA）或数据库管理助理（DMA）的用户ID或别名。在阅读警报历史后设置此属性是一个很好的做法，因为它能让系统上其他活跃的DBA或DMA知道这些警报已被查阅。这个任务相当容易完成，因为它可以针对历史中的所有警报执行，也可以仅对满足特定条件的警报执行，例如
    `alertType=''Stateful''` 或 `alertShortName=''Software''`。您可以使用以下命令为历史中的所有警报设置
    `examinedBy`：


    ```

    CellCLI> alter alerthistory all examinedBy=dfitzj01

    Alert 1_1 successfully altered

    Alert 1_2 successfully altered

    Alert 2 successfully altered

    Alert 3_1 successfully altered

    Alert 3_2 successfully altered

    Alert 4_1 successfully altered

    Alert 4_2 successfully altered


    CellCLI>

    ```


    如果存在已确认（acknowledged）和未确认（unacknowledged）的警报，您将不得不按名称为未确认的警报设置 `examinedBy`；`WHERE`
    子句仅对 `LIST` 命令可用。您可以使用以下命令找到未确认的警报：


    ```

    CellCLI> list alerthistory attributes name where examinedBy = ''''

             1_1

             1_2


    3_1

             3_2

             4_1

             4_2


    CellCLI>

    ```


    这将为您提供所有未确认警报的名称。您现在可以按名称更新它们，如下所示：


    ```

    CellCLI> alter alerthistory 1_1,1_2,2,3_1,3_2,4_1,4_2 examinedBy=dfitzj01

    Alert 1_1 successfully altered

    Alert 1_2 successfully altered

    Alert 2 successfully altered

    Alert 3_1 successfully altered

    Alert 3_2 successfully altered

    Alert 4_1 successfully altered

    Alert 4_2 successfully altered


    CellCLI>

    ```


    在此示例中，所有警报都是未确认的，但使用 `ALL` 将导致您丢失已为已确认警报设置的任何 `examinedBy` 值。您应该养成在阅读警报时就为其设置
    `examinedBy` 的习惯，因为 `exachk`（Exadata系统验证实用程序）会检查未审阅的警报。


    ## 3. 警报类型与处理


    一些警报通知您必须采取的操作，例如存储服务器的固件修订。另一些则通知您Oracle需要处理的支持问题，例如故障磁盘和PCIe卡。这些警报是信息性的，让您知道需要做什么，以便您决定由谁来完成工作。实际的硬件问题属于Oracle客户支持（OCS）的范畴，而诸如固件升级等问题可以由DBA和/或系统管理员（SA）在现场完成。


    ## 4. 使用 `cellsrvstat` 工具监控


    `celladmin` 用户可用的其他度量是由 **`cellsrvstat`** 实用程序生成的。报告五类统计信息，包括累计值和当前增量值。只需在命令提示符下运行该实用程序，不带任何额外参数或限定符，即可产生以下输出：


    ```

    [celladmin@myexa1celMyexa1cel05 ∼]$ cellsrvstat

    ===Current Time===                                      Mon Aug 12 22:57:41 2013


    == Input/Output related stats ==

    Number of hard disk block IO read requests                      0      670402182

    Number of hard disk block IO write requests                     0      682463432

