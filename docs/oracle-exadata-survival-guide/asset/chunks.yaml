    Your results may differ, but for three out of the five listed compression types,
    Oracle did a very good job of estimating the compression ratios. Be aware that
    what Oracle reports may not be exactly what you get in actual use.


    Things to Know


    There are three general levels of compression, two of which require additional
    licensing: Basic, OLTP, and Hybrid Columnar Compression (HCC).


    HCC has two types (QUERY and ARCHIVE), and each of those has two subtypes (HIGH
    and LOW), to provide four distinct levels of HCC. In general, QUERY-type compression
    is intended for somewhat active data, whereas ARCHIVE compression is intended
    for data that will be queried fairly infrequently and will not be updated.


    HCC does its magic by collecting rows with similar data and compressing them into
    a Compression Unit (CU). Each unit is composed of multiple data blocks that contain
    entire rows of data across the CU. This makes it easier and more efficient for
    Oracle to return the data, because only one CU has to be accessed to return entire
    rows.


    Compression levels vary with the compression type. Basic provides the least compression,
    and ARCHIVE HIGH provides the greatest space savings at the time of compression.


    Loading data into compressed tables usually requires parallel processing and/or
    direct path loads (the latter supplied by SQL*Loader). The `/*+ append */` hint
    parallelizes the inserts, allowing them to be compressed on insert. It can take
    longer to load compressed tables than it can uncompressed tables.


    Queries are a mixed bag when it comes to execution times, as Smart Scans can make
    a query of compressed data run faster by offloading the uncompression activities
    to the storage cells. Queries of compressed data that don’t use Smart Scans can
    run longer (and most likely will) than the same query run against uncompressed
    data.


    Updates to compressed tables will cause the table to increase in size. Basic compression
    has no provision for automatic re-compression, so tables using this method will
    have to be periodically re-compressed if they are actively updated. OLTP compression
    will automatically re-compress data blocks that are full, making room for more
    uncompressed data. HCC compression silently reverts to OLTP after data is updated,
    so the original level of compression is lost, but the OLTP level of compression
    remains, including the automatic compression of full data blocks.


    Compression ratios can be estimated by the DBMS_COMPRESSION.GET_COMPRESSION_RATIO
    procedure, and in many cases, will agree with the observed compression ratios
    on user data. Highly compressible data can show large discrepancies between the
    estimated and actual compression ratios, so do not be alarmed if you don’t get
    exactly what Oracle predicts.


