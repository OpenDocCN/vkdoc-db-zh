    \ of instances> SID='*' SCOPE=SPFILE;\n```\n\nThe following statement needs to\
    \ be edited and run for each instance in the cluster:\n\n```\nALTER SYSTEM SET\
    \ INSTANCE_NUMBER=<instance number> SID='<instance_name>' SCOPE=SPFILE;\n```\n\
