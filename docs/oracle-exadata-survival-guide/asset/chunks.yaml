    \ ------------\no/192.168.10.5/flash_FD_00_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_01_myexa1cel01\
    \        CANDIDATE\no/192.168.10.5/flash_FD_02_myexa1cel01        CANDIDATE\n\
    o/192.168.10.5/flash_FD_03_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_04_myexa1cel01\
    \        CANDIDATE\no/192.168.10.5/flash_FD_05_myexa1cel01        CANDIDATE\n\
    o/192.168.10.5/flash_FD_06_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_07_myexa1cel01\
    \        CANDIDATE\no/192.168.10.5/flash_FD_08_myexa1cel01        CANDIDATE\n\
    o/192.168.10.5/flash_FD_08_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_10_myexa1cel01\
    \        CANDIDATE\no/192.168.10.5/flash_FD_11_myexa1cel01        CANDIDATE\n\
    o/192.168.10.5/flash_FD_12_myexa1cel01        CANDIDATE\no/192.168.10.5/flash_FD_13_myexa1cel01\
    \        CANDIDATE\no/192.168.10.5/flash_FD_14_myexa1cel01        CANDIDATE\n\
    o/192.168.10.5/flash_FD_15_myexa1cel01        CANDIDATE\n\n16 rows selected.\n\
    \nSYS@+ASM1> create diskgroup flash_dg redundancy normal\n  2  disk 'o/%/flash%'\n\
    \  3  attribute 'compatible.rdbms' = '11.2.0.0.0',\n  4  'compatible.asm' = '11.2.0.0.0',\n\
    \  5  'cell.smart.scan.capable' = 'TRUE',\n  6  'au_size' = '4M'\n  7   /\n\n\
    Diskgroup created.\n\nSYS@+ASM1>\n```\n\nA flash-based disk group is now available\
    \ for use. Depending on the redundancy level in use (NORMAL, providing one copy\
    \ of the data, or HIGH, providing two copies of the data), the useable storage\
    \ for data will be one-half to one-third of the total space available. This makes\
    \ flash-based disk groups considerably smaller than their disk-based counterparts.\
    \ For this example, remember that the total available flash space was 264.75GB.\
    \ NORMAL redundancy was specified, so this flash disk group has about 132GB available.\
    \ Using HIGH redundancy, the total available space would be about 88GB.\n\nMonitoring\n\
    \nMonitoring Smart Flash Cache on the database servers is very similar, and just\
    \ as limited, as monitoring Smart Scans from them, as only one metric is available\
    \ from `V$SYSSTAT` that records flash cache activity: “cell flash cache read hits.”\
    \ On the other hand, monitoring the Smart Flash Cache from the storage servers\
    \ provides more detail and diagnostic data, although there is no way to monitor\
    \ the full storage tier from a single location; thus, the statistics are for the\
    \ portion of the total flash cache on the given storage server.\n\nStorage Server\
    \ Tools\n\nThrough the `CellCLI` utility, a number of statistics are available\
    \ to monitor flash cache usage. You can view the metrics and their descriptions\
    \ using the `LIST METRICDEFINITION` command. To return the flash cache metrics\
