    \ `CellCLI` 接口，`cellmonitor` 账户应能提供您所需的信息。\n\nExadata 的一个常见监控区域是智能闪存缓存。要全面监控此区域，必须连接到每个可用的存储单元并生成报告。可以通过脚本将此操作发送到存储单元，并将输出记录到数据库服务器，这在第\
