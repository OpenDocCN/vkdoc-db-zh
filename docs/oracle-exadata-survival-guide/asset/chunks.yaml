    \ created ERPDEV database:\n\n```\n$ srvctl stop database -d erpdev\n```\n\nUnder\
    \ the `$ORACLE_HOME/network/admin` directory, create a new `tnsnames.ora` file\
    \ with the following entries:\n\n```\nerpdev=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n\
                    (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n            (LOAD_BALANCE\
    \ = yes)\n            (CONNECT_DATA=\n                (SERVER=DEDICATED)\n                (SERVICE_NAME=erpdev)\n\
                )\n        )\n\nerpdev1_LOCAL=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n\
            )\n\nerpdev2_LOCAL=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n\
            )\n\nerpdev_REMOTE=\n        (DESCRIPTION=\n            (ADDRESS_LIST=\n\
                    (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n\
                    (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1523))\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1523))\n\
                )\n        )\n```\n\nNote the port 1523 references in the `erpdev_REMOTE`\
    \ entry. These address entries will cause the database service to register with\
    \ the default listener as well. Having the database registered with the default\
    \ listener is required, if it becomes necessary to run `dbca` at any point in\
    \ the future for this database. There are a variety of reasons why you may need\
    \ to run `dbca`: to configure Database Vault or Oracle Internet Directory, for\
    \ example.\n\nNext, create the listener and tie it to this Oracle Home.\n\n```\n\
    $ srvctl add listener -l erpdev -o $ORACLE_HOME -p 1521\n$ srvctl setenv listener\
    \ -l erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n$ srvctl setenv database\
    \ -d erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n```\n\nStart up the database\
    \ and change its listener parameters.\n\n```\n$ srvctl start database -d erpdev\n\
    \nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521)))'\n\
       sid='erpdev1' ;\n\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521)))'\n\
       sid='erpdev2' ;\n\nSQL> alter system set remote_listener='erpdev_REMOTE' ;\n\
    ```\n\nIf you wish to also register the database with the SCAN listener, the remote_listener\
    \ parameter may be set as follows:\n\n```\nSQL> alter system set remote_listener='erpdev_REMOTE','exacluster-scan:1523'\
    \ ;\n```\n\nData Migration\n\nAt this point, we have an empty database and a listener\
    \ for that database. Unless this is a fresh install of Oracle ERP, the next (and\
    \ most time-consuming) step is the migration of the existing database to our new,\
    \ bright, shiny, Exadata database. The steps for migration are varied, based on\
    \ the source platform, ERP version, and a host of other factors. Suffice to say,\
    \ you will want to familiarize yourself with the copious “My Oracle Support” notes\
    \ to get your database from point A to point Exadata. We cannot begin to attempt\
    \ to cover that territory here. So, we will pick up at the point where the import\
    \ is complete and Autoconfig has been run. Please see the list of MOS notes at\
    \ the end of this chapter, which should provide a good basis for getting you through.\n\
    \nEnvironment Configuration\n\nIn a traditional, single-node ERP database environment,\
    \ the SQLNet configuration files are stored under `$ORACLE_HOME/network/admin/<context>`\
    \ where `<context>` is `instance_server`. It is Autoconfig that creates those\
    \ files. Also, the `env` file that it creates sets `TNS_ADMIN` to that same `$ORACLE_HOME/network/admin/<context>`\
    \ location. However, in a RAC environment, we want to use `srvctl` to manage the\
    \ environment (i.e., start and stop the databases and the listeners). That being\
    \ the case, we cannot have `TNS_ADMIN` set in such a way, as it would obviously\
    \ have to be different on each node as the instance name changes.\n\nTraditional\
    \ single-node set-up:\n\n```\nTNS_ADMIN=$ORACLE_HOME/network/admin/erpdev_dbsrvr\n\
    $ORACLE_HOME/network/admin/erpdev_dbsrvr/tnsnames.ora\n$ORACLE_HOME/network/admin/erpdev_dbsrvr/listener.ora\n\
    ```\n\nIn addition, there will be an ifile parameter pointing to another file\
    \ that can be used for custom settings. On Exadata (RAC), we are going to flip\
    \ that around. Note in particular that we will not use the Autoconfig-generated\
    \ `listener.ora` at all, as its entries are not applicable to RAC.\n\nBe aware\
    \ that the `tnsnames.ora` file that Autoconfig creates is generally full of errors\
    \ in terms of what is needed for RAC. That file should be reviewed and adjustments\
    \ made. The `tnsnames.ora` file that we created earlier can be used as a model\
    \ for this. We then want to avoid these changes being overwritten as a result\
    \ of subsequent runs of Autoconfig.\n\nThere are a few options for managing this.\n\
    \n1.  Copy the file over the `$ORACLE_HOME/network/admin/tnsnames.ora`, i.e.,\n\
    \n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n    $ cp tnsnames.ora\
    \ ../.\n    ```\n\n2.  Rename the original file and add an ifile entry to `$ORACLE_HOME/network/admin/tnsnames.ora`\
    \ that will point to it.\n\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
    \    $ cp tnsnames.ora tnsnames.ora.erpdev\n    $ vi $ORACLE_HOME/network/admin/tnsnames.ora\n\
    \    add ➔ ifile=<ORACLE_HOME>/network/admin/erpdev1_exadb01/tnsnames.ora.erpdev\n\
    \    ```\n\nBecause Autoconfig naturally restricts its activities to `$ORACLE_HOME/network/admin/<context>`\
    \ directory, this option works nicely. Files under `$ORACLE_HOME/network/admin`\
    \ will not be affected. Whatever you choose to do, this has to be communicated\
    \ fully to anyone who may be either running Autoconfig on these servers in the\
    \ future or adding entries to remote databases to the `tnsnames.ora`.\n\n![image](images/sq.jpg) **Note**  The\
    \ ifile entry has to have the full path. $ORACLE_HOME will not work there.  Ensure\
    \ use of the full path on both nodes.\n\nSetting the Environment"
