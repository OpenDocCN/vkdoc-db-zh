    SQL>\nSQL> --\nSQL> -- 使用基本压缩对表进行压缩\nSQL> --\nSQL> -- 注意压缩操作的耗时\nSQL> --\nSQL>\
    \ alter table emp move compress;\n\nTable altered.\n\nElapsed: 00:00:15.57\nSQL>\n\
