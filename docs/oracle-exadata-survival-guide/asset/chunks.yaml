    As only three columns were requested, only those three columns were returned by
    the storage servers (proven by the Column Projection Information section of the
    autotrace report), making the query execution much more efficient. The database
    servers had no need to filter the result set rows to return only the desired columns.


    Predicate Filtering


    Where Column Projection returns only the columns of interest from a select list
    or join condition, Predicate Filtering is the mechanism used by Exadata to return
    only the rows of interest. Such filtering occurs at the storage cells, which reduces
    the volume of data the database servers must process. The predicate information
    is passed on to the storage servers during the course of Smart Scan execution,
    so performing the filtering operation at the storage server level is a logical
    choice. Because the data volume to the database servers is reduced, so is the
    load on the database server CPUs. The preceding example used both Column Projection
    and Predicate Filtering to rapidly return the result set; using both is a powerful
    combination not available from systems configured from individual, unmatched components.


    Basic Joins


    Depending on the query, join processing can also be offloaded to the storage servers,
    and these are processed using an interesting construct known as a *bloom filter*
    . These are not new, nor are they exclusive to Exadata, as Oracle has used them
    in query processing since Oracle Database Version 10g Release 2, primarily to
    reduce traffic between parallel query slaves. What is a bloom filter? Named after
    Burton Howard Bloom, who came up with the concept in the 1970s, it’s an efficient
    data structure used to quickly determine if an element has a high probability
    of being a member of a given set. It’s based on a bit array that allows for rapid
    searches and returns one of two results: either the element is probably in the
    set (which can produce false positives) or the element is definitely not in the
    set. The filter cannot produce false negatives, and the incidence of false positives
    is relatively rare. Another advantage to bloom filters is their small size relative
    to other data structures used for similar purposes (self-balancing binary search
    trees, hash tables, or linked lists). The possibility of false positives necessitates
    the addition of another filter to eliminate them from the results, yet such a
    filter doesn’t add appreciably to the process time and, therefore, goes relatively
    unnoticed.


    When bloom filters are used for a query on an Exadata system, the filter predicate
    *and* the storage predicate will list the SYS_OP_BLOOM_FILTER function as being
    called. This function includes the additional filter to eliminate any false positives
    that could be returned. It’s the storage predicate that provides the real power
    of the bloom filter on Exadata. Using a bloom filter to pre-join the tables at
    the storage server level reduces the volume of data the database servers need
    to process and can significantly reduce the execution time of the given query.


    An example of bloom filters in action follows; the bloom_fltr_ex.sql script was
    executed to generate this output.


    ```

    SQL> --

    SQL> -- Create sample tables

    SQL> --

    SQL> -- Create them parallel, necessary

    SQL> -- to get a Smart Scan on these tables

    SQL> --

    SQL> create table emp(

      2     empid   number,

      3     empnmvarchar2(40),

      4     empsal  number,

      5     empssn  varchar2(12),

      6     constraint emp_pk primary key (empid)

      7  ) parallel 4;


    Table created.


    SQL>

    SQL> create table emp_dept(

      2     empid   number,

      3     empdept number,

      4     emploc  varchar2(60),

      5    constraint emp_dept_pk primary key(empid)

      6  ) parallel 4;


    Table created.


    SQL>

    SQL> create table dept_info(

      2     deptnum number,

      3     deptnm  varchar2(25),

      4    constraint dept_info_pk primary key(deptnum)

      5  ) parallel 4;


    Table created.

    SQL>

    SQL> --

    SQL> -- Load sample tables with data

    SQL> --

    SQL> begin

      2          for i in 1..2000000 loop

      3                  insert into emp

      4                  values(i, ''Fnarm''||i, (mod(i, 7)+1)*1000, mod(i,10)||mod(i,10)||mod(i,10)||''-''||mod(i,10)||mod(i,10)||''-''||mod(i,10)||mod(i,10)||mod(i,10)||mod(i,10));

      5                  insert into emp_dept

      6             values(i, (mod(i,8)+1)*10, ''Zanzwalla''||(mod(i,8)+1)*10);

      7                   commit;

      8          end loop;

      9          insert into dept_info

     10          select distinct empdept, case when empdept = 10 then ''SALES''

     11                                         when empdept = 20 then ''PROCUREMENT''

     12                                         when empdept = 30 then ''HR''

     13                                         when empdept = 40 then ''RESEARCH''

     14                                         when empdept = 50 then ''DEVELOPMENT''

     15                                         when empdept = 60 then ''EMPLOYEE
    RELATIONS''

     16                                         when empdept = 70 then ''FACILITIES''

     17                                         when empdept = 80 then ''FINANCE''
    end

     18          from emp_dept;


    20  end;

     21  /


    PL/SQL procedure successfully completed.'
  trans: "\n以包含 45 列的表和包含其中 7 列的选择列表为例。列投影仅返回这 7 列，而不是全部 45 列，从而显著减轻数据库服务器的工作负载。假设在查询中添加一个两列的连接条件，并从另一个包含\
    \ 71 列的表中选择另外两列；列投影将返回选择列表中的 9 列和连接条件中的 4 列（假设连接列不在选择列表中）。13 列的数据量远小于 116 列（第一个表的\
    \ 45 列加上第二个表的 71 列），这是智能扫描能够如此快速的原因之一。列投影信息可从`V$SQL_PLAN`的`PROJECTION`列或`DBMS_XPLAN`包中获取，因此你可以选择两者中更容易使用的一个；仅当向`DISPLAY_CURSOR`函数传递了“+projection”参数时（如本例所示，来自`smart_scan_ex.sql`），才会返回投影信息，该示例同时使用了两种检索列投影数据的方法：\n\
    \n```\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME\
    \                                      DEPTNO\n---------- ----------------------------------------\
    \ ----------\n      7934 Smorthorper7934                                  15\n\
    \nElapsed: 00:00:00.16\n\nSQL> select sql_id,\n  2         projection\n  3  from\
    \ v$sql_plan\n  4  where sql_id = 'gfjb8dpxvpuv6';\n\nSQL_ID        PROJECTION\n\
    ------------- ----------------------------------------------------------------------------\n\
    gfjb8dpxvpuv6 \"EMPID\"[NUMBER,22], \"EMP\".\"EMPNAME\"[VARCHAR2,40], \"EMP\"\
    .\"DEPTNO\"[NUMBER,22]\n\nSQL>\nSQL> select *\n  2  from table(dbms_xplan.display_cursor('&sql_id','&child_no',\
    \ '+projection'));\nEnter value for sql_id: gfjb8dpxvpuv6\nEnter value for child_no:\n\
    \nPLAN_TABLE_OUTPUT\n-------------------------------------------------------------------------------------------SQL_ID\
    \  gfjb8dpxvpuv6, child number 0\n\nselect * from emp where empid = 7934\n\nPlan\
    \ hash value: 3956160932\n\n| Id  | Operation                 | Name | Rows  |\
    \ Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT          |     \
    \ |       |       |  6361 (100)|          |\n|*  1 |  TABLE ACCESS STORAGE FULL|\
    \ EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - storage(\"EMPID\"=7934)\n       filter(\"EMPID\"=7934)\n\
    \nColumn Projection Information (identified by operation id):\n\n1 - \"EMPID\"\
    [NUMBER,22], \"EMP\".\"EMPNAME\"[VARCHAR2,40],\n    \"EMP\".\"DEPTNO\"[NUMBER,22]\n\
    \n29 rows selected.\n\nSQL>\n```\n\n由于只请求了三列，因此存储服务器仅返回了这三列（由自动跟踪报告的列投影信息部分证明），这使得查询执行效率更高。数据库服务器无需过滤结果集行来仅返回所需的列。\n\
    \n## 谓词过滤\n\n列投影仅从选择列表或连接条件中返回感兴趣的列，而谓词过滤则是 Exadata 用来仅返回感兴趣行的机制。这种过滤发生在存储单元，从而减少了数据库服务器必须处理的数据量。在智能扫描执行过程中，谓词信息会传递给存储服务器，因此在存储服务器级别执行过滤操作是一个合乎逻辑的选择。由于传输到数据库服务器的数据量减少，数据库服务器\
    \ CPU 的负载也随之降低。前面的示例同时使用了列投影和谓词过滤来快速返回结果集；结合使用这两种功能是一个强大的组合，这是由不匹配的独立组件配置的系统所无法提供的。\n\
    \n## 基本连接\n\n根据查询的不同，连接处理也可以被下推到存储服务器执行，这些连接使用一种称为**bloom filter**的有趣结构进行处理。它们并非新技术，也非\
    \ Exadata 独有，因为 Oracle 从 Oracle 数据库 10g 第 2 版开始就在查询处理中使用它们，主要用于减少并行查询服务进程之间的流量。什么是\
    \ bloom filter？它以 Burton Howard Bloom 的名字命名，他在 20 世纪 70 年代提出了这个概念，是一种高效的数据结构，用于快速确定一个元素是否有可能属于给定集合。它基于一个位数组，可以进行快速搜索，并返回两种结果之一：元素可能在集合中（可能产生假阳性），或者元素肯定不在集合中。过滤器不会产生假阴性，假阳性的发生率相对较低。bloom\
    \ filter 的另一个优势是它们相对于用于类似目的的其他数据结构（自平衡二叉搜索树、哈希表或链表）体积较小。假阳性的可能性需要添加另一个过滤器来从结果中消除它们，但这样的过滤器不会显著增加处理时间，因此相对而言不引人注意。\n\
    \n当在 Exadata 系统上对查询使用 bloom filter 时，过滤器谓词**和**存储谓词都会列出被调用的`SYS_OP_BLOOM_FILTER`函数。该函数包含用于消除可能返回的假阳性的额外过滤器。正是存储谓词提供了\
    \ Exadata 上 bloom filter 的真正威力。使用 bloom filter 在存储服务器级别对表进行预连接，减少了数据库服务器需要处理的数据量，并且可以显著减少给定查询的执行时间。\n\
    \n下面是 bloom filter 实际应用的一个示例；此输出由执行`bloom_fltr_ex.sql`脚本生成。\n\n```\nSQL> --\n\
    SQL> -- 创建示例表\nSQL> --\nSQL> -- 并行创建它们，这是对这些表进行智能扫描所必需的\nSQL> --\nSQL> create\
    \ table emp(\n  2     empid   number,\n  3     empnmvarchar2(40),\n  4     empsal\
    \  number,\n  5     empssn  varchar2(12),\n  6     constraint emp_pk primary key\
    \ (empid)\n  7  ) parallel 4;\n\nTable created.\n\nSQL>\nSQL> create table emp_dept(\n\
    \  2     empid   number,\n  3     empdept number,\n  4     emploc  varchar2(60),\n\
    \  5    constraint emp_dept_pk primary key(empid)\n  6  ) parallel 4;\n\nTable\
    \ created.\n\nSQL>\nSQL> create table dept_info(\n  2     deptnum number,\n  3\
    \     deptnm  varchar2(25),\n  4    constraint dept_info_pk primary key(deptnum)\n\
    \  5  ) parallel 4;\n\nTable created.\nSQL>\nSQL> --\nSQL> -- 向示例表中加载数据\nSQL>\
    \ --\nSQL> begin\n  2          for i in 1..2000000 loop\n  4                 \
    \ insert into emp\n  5                  values(i, 'Fnarm'||i, (mod(i, 7)+1)*1000,\
    \ mod(i,10)||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||'-'||mod(i,10)||mod(i,10)||mod(i,10)||mod(i,10));\n\
    \  6                  insert into emp_dept\n  7             values(i, (mod(i,8)+1)*10,\
    \ 'Zanzwalla'||(mod(i,8)+1)*10);\n  8                   commit;\n  9         \
    \ end loop;\n 10          insert into dept_info\n 11          select distinct\
    \ empdept, case when empdept = 10 then 'SALES'\n 12                          \
    \       when empdept = 20 then 'PROCUREMENT'\n 13                            \
    \     when empdept = 30 then 'HR'\n 14                                 when empdept\
    \ = 40 then 'RESEARCH'\n 15                                 when empdept = 50\
    \ then 'DEVELOPMENT'\n 16                                 when empdept = 60 then\
    \ 'EMPLOYEE RELATIONS'\n 17                                 when empdept = 70\
    \ then 'FACILITIES'\n 18                                 when empdept = 80 then\
    \ 'FINANCE' end\n 19          from emp_dept;\n\n20  end;\n 21  /\n\nPL/SQL procedure\
    \ successfully completed.\n```\n"
- fmt: "# SQL查询性能分析：Bloom Filter与Exadata卸载\n\n## 运行使用Bloom Filter的连接查询\n执行以下SQL查询来生成执行计划，以验证Bloom\
    \ Filter的使用情况，并报告查询执行时间。\n\n```sql\nSQL> set autotrace on\nSQL> set timing on\n\
    \nSQL> select /*+ bloom join 2 parallel 2 use_hash(empemp_dept) */ e.empid, e.empnm,\
    \ d.deptnm, e.empsal\n  2  from emp e join emp_depted on (ed.empid = e.empid)\
    \ join dept_info d on (ed.empdept = d.deptnum)\n  3  where ed.empdept = 20;\n\n\
    EMPID EMPNM                     DEPTNM                       EMPSAL\n----------\
    \ ---------------------- ------------------------- ----------\n    904505 Fnarm904505\
    \           PROCUREMENT                    1000\n    907769 Fnarm907769      \
    \     PROCUREMENT                    3000\n    ...\n250000 rows selected.\n\n\
    Elapsed: 00:00:14.27\n\nExecution Plan\nPlan hash value: 2643012915\nPredicate\
    \ Information (identified by operation id):\n3 - access(\"ED\".\"EMPID\"=\"E\"\
    .\"EMPID\")\n11 - access(\"D\".\"DEPTNUM\"=20)\n13 - storage(\"ED\".\"EMPDEPT\"\
    =20)\n     filter(\"ED\".\"EMPDEPT\"=20)\n15 - storage(SYS_OP_BLOOM_FILTER(:BF0000,\"\
    E\".\"EMPID\"))\n     filter(SYS_OP_BLOOM_FILTER(:BF0000,\"E\".\"EMPID\"))\nNote\n\
    - dynamic sampling used for this statement (level=2)\nStatistics\n60  recursive\
    \ calls\n    174  db block gets\n 40753  consistent gets\n  17710  physical reads\n\
    \   2128  redo size\n9437983  bytes sent via SQL*Net to client\n 183850  bytes\
    \ received via SQL*Net from client\n  16668  SQL*Net roundtrips to/from client\n\
    \      6  sorts (memory)\n      0  sorts (disk)\n 250000  rows processed\n```\n\
    \n在不到15秒的时间内，从超过400万行数据的三表连接查询中返回了25万行数据。Bloom Filter显著改变了该查询的处理方式，并在处理如此大量数据时提供了卓越的性能。即使关闭卸载处理，Bloom\
    \ Filter仍然会在数据库层被使用。\n\n```sql\nSQL> select /*+ bloom join 2 parallel 2 use_hash(empemp_dept)\
    \ */ e.empid, e.empnm, d.deptnm, e.empsal\n  2  from emp e join emp_depted on\
    \ (ed.empid = e.empid) join dept_info d on (ed.empdept = d.deptnum)\n  3  where\
    \ ed.empdept = 20;\n...\nElapsed: 00:00:16.60\n\nStatistics\n33  recursive calls\n\
    \        171  db block gets\n      40049  consistent gets\n      17657  physical\
    \ reads\n          0  redo size\n    9437503  bytes sent via SQL*Net to client\n\
    \     183850  bytes received via SQL*Net from client\n      16668  SQL*Net roundtrips\
    \ to/from client\n          5  sorts (memory)\n          0  sorts (disk)\n   \
    \  250000  rows processed\n```\n\n如果没有在存储层执行Bloom Filter，查询执行时间增加了2.33秒，增幅达16.3%。对于执行时间更长的查询，这种差异可能非常显著。赋予Exadata强大连接处理能力的并非Bloom\
    \ Filter本身，而是Exadata能够在数据库层和存储层执行它，这是普通硬件配置无法做到的。\n\n## 卸载功能\n关于Exadata的Smart\
    \ Scan功能，函数的卸载是一个有趣的话题。Oracle实现了两种基本类型的函数：单行函数（如`TO_CHAR()`、`TO_NUMBER()`、`CHR()`、`LPAD()`）和多行函数（如`AVG()`、`LAG()`、`LEAD()`、`MIN()`、`MAX()`等）。分析函数属于第二种类型。单行函数有资格被卸载，从而使查询符合Smart\
    \ Scan的条件，因为它们可以在存储服务器之间分配来处理数据。而多行函数（如`AVG()`、`MIN()`和`MAX()`）必须能够访问整个表数据集，这在Exadata的存储架构下通过Smart\
    \ Scan是无法实现的。最小的Exadata配置中至少有三台存储服务器，数据相对均匀地分布在它们之间，这使得单台存储服务器无法访问全部磁盘。因此，大多数多行函数无法被卸载到存储层；然而，执行这些函数的查询仍然可能进行Smart\
    \ Scan，即使函数本身无法被卸载，如下所示（仅显示相关输出）。\n\n```sql\nSQL> select avg(sal)\n  2  from emp;\n\
    \nAVG(SAL)\n----------\n2500000.5\n\nElapsed: 00:00:00.49\n\nExecution Plan\n\
    Plan hash value: 2083865914\n| Id  | Operation                  | Name | Rows\
    \  | Bytes | Cost (%CPU)| Time     |\n|   0 | SELECT STATEMENT           |   \
    \   |     1 |     6 |  7468   (1)| 00:00:01 |\n|   1 |  SORT AGGREGATE       \
    \     |      |     1 |     6 |            |          |\n|   2 |   TABLE ACCESS\
    \ STORAGE FULL| EMP  |  5000K|    28M|  7468   (1)| 00:00:01 |\n\nStatistics\n\
    1  recursive calls\n         1  db block gets\n      45123  consistent gets\n\
    \      26673  physical reads\n          0  redo size\n        530  bytes sent\
    \ via SQL*Net to client\n        524  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n\nSQL>\nSQL> set autotrace\
    \ off timing off\nSQL>\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
    \ > 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ ---------------------------------------------\n2cqn6rjvp8qm7\
    \  218505216   54685152        22.82 select avg(sal) from emp\n>\nSQL>\n```"
