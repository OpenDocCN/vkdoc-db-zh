    ```


    By default, the LIST FLASHCACHECONTENT command reports the dbID, tableSpaceNumber
    and objectNumber. To return other attributes, they need to be listed in the command,
    using the attributes clause, as was done in this example.


    Notice that among all of the attributes available at the storage-cell level, the
    object name is not one of them. This can easily be reported from the database
    servers by querying DBA_OBJECTS, using the objectNumber reported by CellCLI, which
    maps to the DATA_OBJECT_ID column:


    ```

    SQL> select owner,  object_type, object_name

      2  from dba_objects

      3  where data_object_id = 5888;


    OWNER                OBJECT_TYPE         OBJECT_NAME

    -------------------- ------------------- --------------------------------

    SYS                  INDEX               WRI$_ADV_MSG_GRPS_IDX_01


    SQL>

    ```


    A script can be written to generate the output from the LIST FLASHCACHECONTENT
    command and place it into a text file on the database server, for example:


    ```

    /usr/bin/ssh celladmin@myexa1cel01-priv.7-11.com  "cellcli -e list flashcachecontent
    where

    dbUniqueName = ''$1'' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize"

    /usr/bin/ssh celladmin@myexa1cel02-priv.7-11.com  "cellcli -e list flashcachecontent
    where

    dbUniqueName = ''$1'' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize"

    /usr/bin/ssh celladmin@myexa1cel03-priv.7-11.com  "cellcli -e list flashcachecontent
    where

    dbUniqueName = ''$1'' attributes dbUniquename,objectNumber,hitcount,misscount,cachedSize"

    ```


    A second script would be used to execute the first script and send the output
    to a file:


    ```

    /home/oracle/bin/cellcli_flashcache_mon_nohdrs.sh $1 > /home/oracle/ext_tbls/flash_mon.txt

    ```


    The database name of interest is passed to the second script on the command line.
    The generated file can then be used to create an external table, which can be
    joined to the DBA_OBJECTS view to report Smart Flash Cache activity by object
    name. As an example:


    ```

    SQL> create or replace directory admin_dat_dir as ''/home/oracle/ext_tbls'';


    Directory created.


    SQL> create or replace directory admin_log_dir as ''/home/oracle/logs'';


    Directory created.


    SQL> create or replace directory admin_bad_dir as ''/home/oracle/bad'';


    Directory created.


    SQL>

    SQL> CREATE TABLE flashmon_ext

      2                     (db_name     varchar2(12),

      3                      object_id   number,

      4                      hitct       number,

      5                      missct      number,

      6                      cachesz     number

      7                     )

      8       ORGANIZATION EXTERNAL

      9       (

     10         TYPE ORACLE_LOADER

     11         DEFAULT DIRECTORY admin_dat_dir

     12         ACCESS PARAMETERS

     13         (

     14           records delimited by newline

     15           badfile admin_bad_dir:''flashmon_ext%a_%p.bad''

     16           logfile admin_log_dir:''flashmon_ext%a_%p.log''

     17           fields terminated by whitespace

     18           missing field values are null

     19           ( db_name, object_id, hitct, missct, cachesz

     20           )

     21         )

     22         LOCATION (''flash_mon.txt'')

     23       )

     24       PARALLEL

     25       REJECT LIMIT UNLIMITED;


    Table created.


    SQL>

    ```


    The first directory contains the text file generated from CellCLI and the LIST
    FLASHCACHECONTENT command. The next two directories are for the logfile and badfile,
    which could be generated by SQL*Loader. Finally, we create the external table.
    Because the text file shouldn’t change names or locations, generating a new file
    won’t cause the external table to become invalid. Thus, the data can be refreshed
