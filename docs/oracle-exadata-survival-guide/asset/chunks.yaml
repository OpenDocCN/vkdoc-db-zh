    \n查询计划中的三个操作表明存在智能扫描活动：`TABLE ACCESS STORAGE FULL`、`INDEX STORAGE FULL SCAN` 和\
    \ `INDEX STORAGE FAST FULL SCAN`。此外，来自 `V$SQL`/`GV$SQL` 的两个指标 (`io_cell_offload_eligible_bytes`,\
    \ `io_cell_offload_returned_bytes`) 表明已执行智能扫描。仅凭计划步骤无法证明智能扫描活动；`V$SQL`/`GV$SQL`\
    \ 指标也必须非零才能确认智能扫描是活跃的。\n\nExadata 通过使用谓词过滤、列投影和存储索引（一个仅在第三章讨论的主题）来提供智能扫描的卓越处理能力。谓词过滤是\
    \ Exadata 仅将感兴趣的行返回给数据库服务器的能力。列投影仅返回感兴趣的列，即`select`列表中的列和连接谓词中的列。这两项优化都减少了数据库服务器为返回最终结果所需处理的数据量。同样值得关注的是卸载，这是\
    \ Exadata 将部分查询卸载或移交给存储服务器执行的过程，让它们在查询处理中承担大量工作。由于存储单元拥有自己的 CPU，这也降低了数据库服务器上的\
    \ CPU 使用率，而数据库服务器是 Exadata 与用户之间的唯一接触点。\n\n连接操作也“加入”了 Exadata 的性能增强阵营，因为 Exadata\
    \ 利用布隆过滤器来预处理符合条件的连接，从而在比哈希连接或嵌套循环连接短得多的时间内返回大型表连接的结果。\n\n有些函数也可以卸载到存储单元，但通常由于存储单元配置的性质，只有单行函数符合条件。函数不可卸载并不会使查询失去执行智能扫描的资格，你会发现使用某些函数（如`AVG()`和`COUNT()`）的查询也会报告智能扫描活动。在\
    \ Oracle 11.2.0.3 版本中，有 393 个函数符合卸载条件。`V$SQLFN_METADATA`视图通过`OFFLOADABLE`列指示可卸载函数，符合条件的函数该列值为`YES`。\n\
    \n虚拟列（其值从同一表中的其他列计算得出的列）也是可卸载的，即使这些列中的值是在查询时动态生成的，因此包含虚拟列的表仍然符合智能扫描的条件。\n\n# 存储索引\n\
    \n![image](img/frontdot.jpg)\n\n存储索引可能是 Exadata 中最被误解和令人困惑的部分。这个名称会让人联想到传统的索引结构，如\
