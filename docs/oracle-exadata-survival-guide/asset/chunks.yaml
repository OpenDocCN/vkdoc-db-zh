  raw: 'Execution plans can report Smart Scan activity, if they are the actual plans
    generated by the optimizer at runtime. Qualifying plans will be found in the V$SQL_PLAN
    and DBA_HIST_SQL_PLAN views and will be generated by autotrace, when the ON option
    is used, or can be found by enabling a 10046 trace and processing the resulting
    trace file through tkprof. Using autotrace in EXPLAIN mode may not provide the
    same plan as generated at runtime, because it can still use rule-based optimizer
    decisions to generate plans. The same holds true for EXPLAIN PLAN. (We have seen
    cases where EXPLAIN PLAN and a 10046 trace differed in the reported execution
    plan.) The tkprof utility also offers an explain mode, and it, too, can provide
    misleading plans. By default, tkprof provides the actual plan from the execution,
    so using the command-line explain option is unnecessary.


    Smart Scans are noted in the execution plan in one of three ways:


    *   TABLE ACCESS STORAGE FULL

    *   INDEX STORAGE FULL SCAN

    *   INDEX STORAGE FAST FULL SCAN


    The presence of one or more of these operations does not mean that a Smart Scan
    actually occurred; other metrics should be used to verify Smart Scan execution.
    The V$SQL view (and, for RAC databases, GV$SQL) has two columns that provide further
    information on cell offload execution, io_cell_offload_eligible_bytes and io_cell_offload_returned_bytes.
    These are populated with relevant information regarding cell offload activity
    for a given sql_id, provided a Smart Scan was actually executed.


    The io_cell_offload_eligible_bytes column reports the bytes of data that qualify
    for offload. This is the volume of data that can be offloaded to the storage cells
    during query execution. The io_cell_offload_returned_bytes column reports the
    number of bytes returned by the regular I/O path. These are the bytes that were
    not offloaded to the cells. The difference between these two values provides the
    bytes actually offloaded during query execution. If no Smart Scan were used, the
    values for both columns would be 0\. There will be cases where the column io_cell_offload_eligible_bytes
    will be equal to 0, but the column io_cell_offload_returned_bytes will not. Such
    cases will usually, but not always, be referencing either fixed views (such as
    GV$SESSION_WAIT) or other data dictionary views (V$TEMPSEG_USAGE, for example).
    Such queries are not considered eligible for offload. (The view isn’t offloadable,
    because it may expose memory structures resident on the database compute nodes,
    but that doesn’t indicate they don’t qualify for a Smart Scan [one or more of
    the base tables to that view might qualify].) The presence of projection data
    in V$SQL_PLAN/GV$SQL_PLAN is proof enough that a Smart Scan was executed.


    Looking at a query where a Smart Scan is executed, using the smart_scan_ex.sql
    script, we see


    ```

    SQL> select *

      2  from emp

      3  where empid = 7934;


    EMPID EMPNAME                                      DEPTNO

    ---------- ---------------------------------------- ----------

          7934 Smorthorper7934                                  15


    Elapsed: 00:00:00.21


    Execution Plan


    Plan hash value: 3956160932


    | Id  | Operation                 | Name | Rows  | Bytes | Cost (%CPU)| Time    
    |


    |   0 | SELECT STATEMENT          |      |     1 |    28 |  6361   (1)| 00:00:01
    |

    |*  1 |  TABLE ACCESS STORAGE FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01
    |


    Predicate Information (identified by operation id):


    1 - storage("EMPID"=7934)

           filter("EMPID"=7934)


    Statistics


    1  recursive calls

        1  db block gets

    40185  consistent gets

    22594  physical reads

      168  redo size

      680  bytes sent via SQL*Net to client

      524  bytes received via SQL*Net from client

        2  SQL*Net roundtrips to/from client

        0  sorts (memory)

        0  sorts (disk)

        1  rows processed


    SQL>

    ```


    Notice that the execution plan reports, via the TABLE ACCESS STORAGE FULL operation,
    that a Smart Scan is in use. Verifying that with a quick query to V$SQL we see


