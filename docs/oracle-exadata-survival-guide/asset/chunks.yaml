    \ memory                               180736\nsession uga memory max        \
    \                   180736\nuser calls                                       \
    \    2\n\n24 rows selected.\n\nSQL>\n```\n\n给定会话有更多可用的统计信息；该查询过滤掉了值为 0 的项。\n\n\
    ## 何时以及如何使用它们\n\n既然你知道在哪里可以找到有用的性能指标和等待统计信息，下一步就是知道如何以及何时使用它们来诊断性能问题。尽管有大量可用的统计信息和指标可用于深入挖掘性能问题，但性能评估和调优的主要关注点和驱动力仍然是时间。用户通过任务从开始到完成所需的时间来衡量性能，世界上所有的\
    \ I/O 统计信息对大多数用户来说意义不大。性能之旅的第一站是查看相关时间段的 AWR 报告。AWR 提供了查找问题和开始诊断过程所需的信息。"
- fmt: "# AWR 报告分析与性能调优\n\nAWR 报告基于对性能指标和等待事件计时的定期快照生成。这种方式能够基于快照之间记录的变化来生成报告。利用 AWR\
    \ 报告提供的信息，可以找出运行时间长的 SQL 语句及其关联的 `SQL_id`，从而生成并分析执行计划。此外，可以使用 `V$SESSTAT`、`V$SYSTEM_EVENT`\
    \ 和 `V$SYSTAT` 视图深入分析等待事件和指标，以期发现性能下降的根本原因。查看“`SQL Ordered by Elapsed Time`”报告有助于发现问题语句和查询。这不仅仅是耗时的问题，还涉及到耗时和执行次数的关系，因为较长的总耗时如果伴随着高执行次数，会导致每次执行的平均时间很短。例如，如果总耗时为\
    \ 7734.27 秒，执行次数为 1281，那么每次执行的平均耗时约为 6 秒，这在大多数标准下是合理的。另一方面，如果总耗时为 3329.17 秒，执行次数仅为\
    \ 3，那么每次执行的平均耗时约为 1110 秒。如此量级的单次执行耗时值得更仔细的检查。这正是 `V$SESSTAT`、`V$SYSTEM_EVENT`\
    \ 和 `V$SYSTAT` 视图能够提供更详细信息的地方。\n\n另一个很好的性能信息来源是 10046 跟踪；可以是其原始形式，也可以是由 `tkprof`\
    \ 工具格式化的报告。我们通常更喜欢 `tkprof` 格式的输出，因为它提供了执行计划以及相关的等待事件和时间。\n\n![image](images/sq.jpg)\
    \ **注意** 仅当 10046 跟踪事件设置在级别 8 或更高时，`tkprof` 报告中才会提供等待信息。较低的级别不会捕获等待统计信息。\n\n查看提供了等待信息的\
    \ `tkprof` 格式化跟踪文件的一部分，可以获得以下数据：\n\n```\n********************************************************************************\n\
    \nSQL ID: 23bfbq45y94fk Plan Hash: 2983102491\n\nDELETE FROM APP_RULE_TMP_STAGE\n\
    WHERE\n TMP_RULE_NAME = :B1\n\ncall     count       cpu    elapsed       disk\
    \      query    current        rows\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\nParse        1      0.00       0.00     \
    \     0          0          0           0\nExecute     22      9.38     125.83\
    \      25833       4732     493424      346425\nFetch        0      0.00     \
    \  0.00          0          0          0           0\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\ntotal       23    \
    \  9.38     125.83      25833       4732     493424      346425\n\nMisses in library\
    \ cache during parse: 1\nMisses in library cache during execute: 4\nOptimizer\
    \ mode: ALL_ROWS\nParsing user id: 113     (recursive depth: 1)\nNumber of plan\
    \ statistics captured: 1\n\nRows (1st) Rows (avg) Rows (max)  Row Source Operation\n\
    ---------- ---------- ----------  ---------------------------------------------------\n\
    \         0          0          0  DELETE  APP_RULE_TMP_STAGE (cr=420 pr=3692\
    \ pw=0 time=26339915 us)\n     44721      44721      44721   INDEX RANGE SCAN\
    \ APP_RULE_TMP_STG_IDX2 (cr=377 pr=353 pw=0 time=1603541 us cost=36 size=7291405\
    \ card=3583)(object id 196496)\n\nElapsed times include waiting on following events:\n\
    \  Event waited on                             Times   Max. Wait  Total Waited\n\
    \  ----------------------------------------   Waited  ----------  ------------\n\
    \  library cache lock                              1        0.00          0.00\n\
    \  row cache lock                                 18        0.00          0.00\n\
    \  library cache pin                               1        0.00          0.00\n\
    \  Disk file operations I/O                        6        0.00          0.00\n\
    \  cell single block physical read             25783        1.30        114.29\n\
    \  gc cr grant 2-way                            1587        0.00          0.18\n\
    \  gc current grant 2-way                      14205        0.00          1.53\n\
    \  gc current grant congested                     69        0.00          0.00\n\
    \  gc cr grant congested                          14        0.00          0.00\n\
    \  cell list of blocks physical read              20        0.31          0.48\n\
    \  gc current multi block request                 12        0.00          0.00\n\
    \  log buffer space                                2        0.83          0.86\n\
    ********************************************************************************\n\
    ```\n\n在这个语句中，值得关注的等待是 `cell single block physical read`，鉴于其总耗时（以秒为单位报告）。执行计划给了我们一个线索，这可能是一个需要与\
    \ `INDEX RANGE SCAN` 步骤一起考虑的等待。请记住，使用 `INDEX RANGE SCAN` 会使该语句不符合 Smart Scan 执行的条件。另请注意，这里没有使用并行执行。考虑到该语句的总耗时，它本应符合自动并行度（Auto\
    \ Degree of Parallelism）的条件。使用并行执行很可能通过将 I/O 分布到多个并行查询从属进程上来改善该语句的性能，从而减少总的等待时间。\n\
    \n## 补充说明\n\n我们已经在[第 2 章](#9781430260103_Ch02.xhtml)中介绍了与 Smart Scan 相关的查询计划。回顾那部分内容总是有帮助的。\n\
    \n有三个计划步骤可以指示可能的 Smart Scan 活动：\n\n*   `TABLE ACCESS STORAGE FULL`\n*   `INDEX\
    \ STORAGE FULL SCAN`\n*   `INDEX STORAGE FAST FULL SCAN`\n\n在本章前面，我们提到过，计划步骤中的\
    \ `STORAGE` 一词仅表示可能发生 Smart Scan 执行，因为没有直接路径读取（direct-path reads），就不会触发 Smart\
    \ Scan。然而，执行计划可以为性能调优提供一个良好的起点。执行计划步骤中缺少 `STORAGE` 则表明 Smart Scan *没有*发生。如果你检查某个给定语句的计划并在某个表或索引访问步骤中找到了\
    \ `STORAGE` 关键字，你可以使用 `V$SQL` 和 `GV$SQL` 中的数据来验证 Smart Scan 的执行情况。如[第 2 章](#9781430260103_Ch02.xhtml)所述，这些视图中至少有两列提供了关于\
    \ Smart Scan 对查询或语句有多大益处的信息。我们介绍过的两列是 `io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`。我们还提供了一个可以计算实现的\
    \ I/O 节省百分比的查询，这在本章前面的“性能计数器和指标”部分也再次说明过。\n\n## 性能计数器参考\n\nExadata 更新了许多计数器，但这里不会讨论完整的列表。我们选择描述那些我们认为在性能和故障排除方面最“有趣”的计数器。很可能你不需要深入钻研这些来解决大多数性能问题，因为下一节讨论的等待接口和\
    \ SQL 监控通常已经是足够的诊断工具。了解这些计数器是好的，这就是我们提供它们的原因。我们将按名称列出它们，描述它们的目的及其背后的机制，以便让你深入了解\
    \ Exadata 是如何工作的。\n\n`cell blocks helped by commit cache`"
  raw: 'AWR reports are generated from regularly occurring snapshots of performance
    metrics and wait-event timings. This provides a way to generate reports based
    on the changes recorded between snapshots. With the information provided in an
    AWR report, it’s possible to find long-running SQL statements, along with their
    associated SQL_id, so plans can be generated and analyzed. Additionally, the `V$SESSTAT`,
    `V$SYSTEM_EVENT`, and `V$SYSTAT` views can be used to drill down into the wait
    events and metrics to possibly uncover the underlying reason for the performance
    degradation. It’s good to look at the “SQL Ordered by Elapsed Time” report to
    see problem statements and queries. It’s not simply a matter of elapsed time but
    of elapsed time and number of executions, as long elapsed times, coupled with
    a high execution count, make the per-execution time small. For example, if the
    elapsed time is 7734.27 seconds and the number of executions is 1281, the average
    elapsed time per execution is around 6 seconds, a reasonable time by most standards.
    If, on the other hand, the elapsed time is 3329.17 and the number of executions
    is 3, then the average elapsed time per execution is approximately 1110 seconds.
    An elapsed time per execution of that magnitude is worthy of closer examination.
    This is where the `V$SESSTAT`, `V$SYSTEM_EVENT`, and `V$SYSTAT` views can provide
    additional detail.


    Another good source of performance information is the 10046 trace; either in its
    raw form or in a report formatted by the tkprof utility. We often prefer tkprof-formatted
    output, as it provides an execution plan and the relevant wait events and times.


    ![image](images/sq.jpg) **Note**  Wait information in a tkprof report is only
    provided when the 10046 trace event is set at level 8 or higher. Lower levels
    won’t capture the wait statistics.


    Looking at a portion of a tkprof-formatted trace file where waits were provided,
    the following data is available:


    ```

    ********************************************************************************


    SQL ID: 23bfbq45y94fk Plan Hash: 2983102491


    DELETE FROM APP_RULE_TMP_STAGE

    WHERE

     TMP_RULE_NAME = :B1


    call     count       cpu    elapsed       disk      query    current        rows

    ------- ------  -------- ---------- ---------- ---------- ----------  ----------

    Parse        1      0.00       0.00          0          0          0          
    0

    Execute     22      9.38     125.83      25833       4732     493424      346425

    Fetch        0      0.00       0.00          0          0          0          
    0

    ------- ------  -------- ---------- ---------- ---------- ----------  ----------

    total       23      9.38     125.83      25833       4732     493424      346425


    Misses in library cache during parse: 1

    Misses in library cache during execute: 4

    Optimizer mode: ALL_ROWS

    Parsing user id: 113     (recursive depth: 1)

    Number of plan statistics captured: 1


    Rows (1st) Rows (avg) Rows (max)  Row Source Operation

    ---------- ---------- ----------  ---------------------------------------------------

             0          0          0  DELETE  APP_RULE_TMP_STAGE (cr=420 pr=3692 pw=0
    time=26339915 us)

         44721      44721      44721   INDEX RANGE SCAN APP_RULE_TMP_STG_IDX2 (cr=377
    pr=353 pw=0 time=1603541 us cost=36 size=7291405 card=3583)(object id 196496)


    Elapsed times include waiting on following events:

      Event waited on                             Times   Max. Wait  Total Waited

      ----------------------------------------   Waited  ----------  ------------

      library cache lock                              1        0.00          0.00

      row cache lock                                 18        0.00          0.00

      library cache pin                               1        0.00          0.00

      Disk file operations I/O                        6        0.00          0.00

      cell single block physical read             25783        1.30        114.29

      gc cr grant 2-way                            1587        0.00          0.18

      gc current grant 2-way                      14205        0.00          1.53

      gc current grant congested                     69        0.00          0.00

      gc cr grant congested                          14        0.00          0.00

      cell list of blocks physical read              20        0.31          0.48

      gc current multi block request                 12        0.00          0.00

      log buffer space                                2        0.83          0.86

    ********************************************************************************

    ```


    The wait of interest in this statement is cell single block physical read, given
    its total elapsed time, which is reported in seconds. The execution plan gives
    us a clue that this could be a wait to consider with the INDEX RANGE SCAN step.
    Remember that using an INDEX RANGE SCAN disqualifies the statement for Smart Scan
    execution. Notice also that no parallel execution is used. Given the elapsed time
    for the statement, it would qualify for Auto Degree of Parallelism. Using parallel
    execution would likely have improved performance for this statement, by spreading
    out the I/O across multiple parallel query slaves, reducing the elapsed wait time.


    Let Me Explain


    We have covered query plans in relation to Smart Scans in [Chapter 2](#9781430260103_Ch02.xhtml).
    A review of that material can always be helpful.


    There are three plan steps that can indicate possible Smart Scan activity:


    *   TABLE ACCESS STORAGE FULL

    *   INDEX STORAGE FULL SCAN

    *   INDEX STORAGE FAST FULL SCAN


    Earlier in this chapter, we mentioned that the word *STORAGE* in a plan step only
    indicates the possibility of Smart Scan execution, because without direct-path
    reads, Smart Scans won’t be triggered. Execution plans, however, can give you
    a good starting point for performance tuning. The absence of STORAGE in execution
    plan steps indicates that Smart Scans did *not* occur. If you examine the plan
    for a given statement and find the keyword STORAGE in one of the table or index
    access steps, you can use data found in `V$SQL` and `GV$SQL` to verify Smart Scan
    execution. As mentioned in [Chapter 2](#9781430260103_Ch02.xhtml), there are at
    least two columns in these views providing information on how beneficial the Smart
    Scan was to the query or statement. The two columns we covered are `io_cell_offload_eligible_bytes`
    and `io_cell_offload_returned_bytes`. We also supplied a query that can generate
    the I/O savings percentage realized, which was illustrated again earlier in this
    chapter, in the section “Performance Counters and Metrics.”


    Performance Counter Reference


    There are many counters updated by Exadata, but the complete list will not be
    discussed here. We have chosen to describe those counters that we feel are the
    most “interesting” in terms of performance and troubleshooting. It is very likely
    that you won’t have to dig this deep to solve most performance issues, as the
    wait interface and the SQL monitor, discussed in the next section, are usually
    sufficient diagnostic tools. It is good to be aware of these counters, which is
    why we provide them. We will list them by name and describe their purpose and
    the mechanisms behind them, to give you some insight into how Exadata does what
    it does.


    cell blocks helped by commit cache'
