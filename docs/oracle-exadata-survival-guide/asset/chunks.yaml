    During Exadata configuration, the disks are divided into slices, based on data
    found in the /opt/oracle.SupportTools/onecommand/onecommand.params file. By default,
    the `SizeArr` variable is set to 2208GB, which is the size for the slice allocated
    for the data disk group. Other slice sizes are derived from that initial setting.
    (It is possible to change the disk allocations; that process will be discussed
    in [Chapter 11](#9781430260103_Ch11.xhtml).) Each disk has 32MB configured for
    management processes and data, which explains the offset for the first available
    disk slice ASM can use. In the posted example, that first slice is allocated for
    the `DATA_MYEXA1` disk group, and it’s 2208GB in size. The next available slice
    is for the recovery disk group, and it’s 565360MB in size. The final slice is
    for the DBFS disk group and provides 34608MB of storage. Each offset after the
    initial 32MB is the 32MB plus the size of the configured slice; it provides the
    “starting point” for each area of ASM configured storage on the disk.


    The `cellmonitor` account is a good starting point for looking at the storage
    cells at the server level, but it’s restricted, in that it’s simply a monitoring
    account and provides no access to managing the cells. To dig deeper into the cells
    and provide additional statistics and metrics, you will have to use the `celladmin`
    account.


    As celladmin


    Connecting to the cells as `celladmin` is no different from connecting as `cellmonitor`;
    however, `celladmin` provides much more access to functionality and metrics. In
    addition to `cellcli`, the `celladmin` account can also access `cellsrvstat` ,
    which can provide additional statistics and metrics not reported by `cellcli`.


    When connected as `celladmin`, the `cellcli` interface provides the full list
    of functions provided earlier in this chapter. Since it is an administrative account,
    you can perform the following actions that `cellmonitor` cannot:


    ```

    ALTER ALERTHISTORY

    ALTER CELL

    ALTER CELLDISK

    ALTER GRIDDISK

    ALTER IBPORT

    ALTER IORMPLAN

    ALTER LUN

    ALTER PHYSICALDISK

    ALTER QUARANTINE

    ALTER THRESHOLD

    ASSIGN KEY

    CREATE CELL

    CREATE CELLDISK

    CREATE FLASHCACHE

    CREATE FLASHLOG

    CREATE GRIDDISK

    CREATE KEY

    CREATE QUARANTINE

    CREATE THRESHOLD

    DESCRIBE

    DROP ALERTHISTORY

    DROP CELL

    DROP CELLDISK

    DROP FLASHCACHE

    DROP FLASHLOG

    DROP GRIDDISK

    DROP QUARANTINE

    DROP THRESHOLD

    EXPORT CELLDISK

    IMPORT CELLDISK

    ```


    Of the available metrics on the storage cells, the alert history is a good place
    to start looking for possible problems. Looking at the output from `LIST ALERTHISTORY
    DETAIL`, we see the following:


