    \ successfully\n$\n```\n\nThe `mydb` cluster database has successfully registered\
    \ with the `SCAN` listener and can be accessed remotely.\n\n**Transporting Tablespaces**\n\
    \nTransportable tablespaces are useful for migrating data for specific schemas\
