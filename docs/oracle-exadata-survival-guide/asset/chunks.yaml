    # 第 13 章


    ![image](images/frontdot.jpg)


    # ERP 设置——实用指南


    本章旨在为读者提供设置 Oracle ERP（11i 或 R12）环境的指南。这里找到的大部分内容不一定特定于 Exadata，而是适用于任何 Linux
    RAC 环境。然而，Exadata 被描述为“盒子里的 RAC”，因此，挑战将始终存在于 Exadata 中。因此，这里似乎是解决这些问题的好地方。


    Oracle 的 ERP 标准是每个数据库从自己的 Oracle Home 运行，并且该数据库的侦听器具有唯一的、专用的 SQLNet 端口。因此，我们的第一个挑战是为每个
    ERP 数据库创建一个新的 Oracle Home。Exadata 通常附带一个准备就绪的 Oracle Home 和数据库。最简单的做法是简单地在每个节点上克隆该
    Oracle Home。但是，如果您安装的数据库版本与 Exadata 机器附带的版本完全不同，您可以暂时跳过本节。但是，如果您发现将来必须克隆该 Home，不要感到惊讶。无论如何，克隆
    Oracle Home 是 ERP DBA 的常见做法。


    # 克隆 Oracle Home


    除了 Grid Infrastructure Oracle Home（即您的 ASM 主目录）之外，您的 Exadata 集群将附带一个标准数据库 Oracle
    Home（在每个节点上）以及一个使用该 Home 创建的数据库。实际上，您应该将此 Home 和数据库保持原样——至少可以作为参考点。特别是在开发/测试集群上，您可能需要为各种目的（开发、测试、UAT
    等）创建多个 Oracle Home。使用这个“种子” Oracle Home 作为您的第一个 ERP Oracle Home 的源，然后使用 ERP 肯定需要的额外数据库补丁对其进行修补。然后，您可以继续为可能需要的任何其他
    ERP 环境克隆此 Home。


    除非您已向 Oracle 支持另外指定，否则“种子”数据库很可能名为 DBM。在我们的示例中，其 Oracle Home 是 `/u01/app/oracle/product/11.2.0.3/dbhome_1`。我们的新数据库将称为
    ERPDEV。以 `root` 身份，在集群中的所有节点上执行以下操作：


    ```

    $ mkdir /u01/app/oracle/product/11.2.0.3/erpdevdb

    $ cd /u01/app/oracle/product/11.2.0.3/dbhome_1

    $ cp -r * /u01/app/oracle/product/11.2.0.3/erpdevdb/.

    $ chown -R oracle:oinstall /u01/app/oracle/product/11.2.0.3/erpdevdb

    ```


    以 Oracle 软件所有者身份登录，并在两个节点上执行以下操作——也在两个节点上。在每个节点上重复该过程时，请确保相应地设置 `LOCAL_NODE`，如下所示：


    ```

    $ cd /u01/app/oracle/product/11.2.0.3/erpdevdb/clone/bin


    $ perl clone.pl ORACLE_BASE=$ORACLE_BASE \

    ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb \

    ORACLE_HOME_NAME=OraDb11g_ERPDEV \

    ''-O"CLUSTER_NODES={exadb01,exadb02}"'' \

    ''-O"LOCAL_NODE=exadb01"''

    ```'
  raw: 'Because DDL is not allowed on remote databases through the `CREATE TABLE ...
    AS SELECT ...` statement, the destination tables will have to exist in the Exadata
    database prior to data migration. Also, LOB data is not accessible through a database
    link. Tables containing LOB columns are not eligible for migration through the
    `COPY` command and are probably best migrated through a physical method.


    After migration, it will be necessary to go through the “Post-migration Stuff”
    section to resolve any issues caused by missing data, such as BFILES and directories.


    Things to Know


    Physical and logical methods can be employed to migrate databases to Exadata.
    Which method you use depends on availability of external storage and on the data
    types that have to be migrated.


    Databases that include LOB data or BFILEs are best migrated using a physical methodology,
    as logical methods such as Golden Gate and Streams have restrictions on the data
    types they can replicate. Also, physical methods offer the possibility of migrating
    from a big-endian platform (such as AIX or Solaris) to Linux, a little-endian
    platform.


    Big-endian platforms write the most significant byte first in the string, and
    little-endian platforms write the least significant byte first in the string.
    For example, the hexadecimal characters for the word *word* would be written with
    the *w* as the first byte. Little-endian platforms would store the word in reverse
    order, with the *d* in the first-byte position.


    Three physical methods have been described: RMAN backups, transportable tablespaces,
    and physical standby databases. Each has its advantages, and the decision to select
    a particular method should be made based on the migration time line and the volume
    of data that has to be migrated.


    RMAN backups will migrate the entire database to Exadata. RMAN can also be used
    to facilitate migration from different platforms, by converting the source data
    files to an endian format compatible with Linux.


    Transportable tablespaces can be used to migrate subsets of data from the source
    database. An empty database will have to exist on the Exadata system. If the tablespaces
    are coming from a big-endian system, it will also be necessary to use RMAN to
    convert the data files to a little-endian format.


    Physical standby databases make it possible for the database to be migrated well
    before the application is migrated. Using a standby keeps the destination database
    synchronized with the source while the application migration is in progress. A
    failover will have to be executed to convert the standby to a primary database
    for the final cutover.


    Logical methods are also available, using export and import, replication via Streams
    or Golden Gate, and database links. All of the logical methods have restrictions
    on data types that will not migrate, and it is recommended that one of the physical
    methods be employed, if the database being migrated uses data types that won’t
    replicate.


    Export and import rely on the version of the source database. The export utility
    from the lowest Oracle release must be used to perform a successful logical migration.


    Replication using Golden Gate or Streams won’t copy BFILEs, user-defined types,
    or rowid columns, to name a few. You should be aware of the data types in use
    in the database being migrated, before choosing a method.


    Database links can be used. The `COPY` command is the utility of choice for such
    migrations, but LOBs are not transferrable over a database link. Carefully consider
    the source data before choosing a final migration strategy.


    Regardless of the method selected, objects such as BFILEs and directories will
    have to be addressed after the initial migration has completed. The files referenced
    by the source BFILE locators will have to be copied to Exadata, and the BFILE
    locators re-created using the new file locations. Directories will have to be
    created at the operating-system level, and the directory objects in Oracle will
    have to be replaced using the new directory locations.


    Objects can be invalidated by a migration, so it is good practice to generate
    a list of invalid objects in the source database as a reference, when checking
    the destination database for objects invalidated by the migration. The `$ORACLE_HOME/rdbms/admin/utlrp.sql`
    script should be run post-migration to compile invalidated objects.


    CHAPTER 13


    ![image](images/frontdot.jpg)


    ERP Setup—a Practical Guide


    The purpose of this chapter is to provide readers with guidelines for setting
    up Oracle ERP (11i or R12) environments. Most of what you will find here is not
    necessarily specific to Exadata but to any Linux RAC environment. Exadata, however,
    has been described as “RAC-in-a-box,” and as a result, the challenges will always
    be there with Exadata. Therefore, this seems like a good place to address these.


    Oracle’s standard for ERP is for each database to run from its own Oracle Home
    and for the listener for that database to have a dedicated, unique, SQLNet port.
    So, our first challenge comes with creating a new Oracle Home for each of the
    ERP databases. Exadata always comes with one Oracle Home and database ready to
    go. The simplest course of action is to simply clone that Oracle Home on each
    of the nodes. However, if you are installing a completely new version of the database
    compared to what was delivered with your Exadata machine, you can skip this section
    for the time being. But do not be surprised if you find that you have to clone
    that Home sometime in the future. In any event, cloning of Oracle Homes is a common
    practice for the ERP DBA.


    Cloning the Oracle Home


    In addition to the Grid Infrastructure Oracle Home (i.e., your ASM home), your
    Exadata cluster will be delivered with a standard database Oracle Home (on each
    node) and one database created using that Home. As a practical matter, you should
    leave this Home and database as is—for a reference point, if nothing else. Particularly
    on a dev/test cluster, you will likely need multiple Oracle Homes created for
    various purposes: dev, test, uat, etc. Use this “seeded” Oracle Home as the source
    for your first ERP Oracle Home and then patch it with the additional database
    patches that ERP is certainly going to need. You can then proceed to clone this
    Home for any additional ERP environments that you may require.


    Unless you have specified otherwise to Oracle support, the “seed” database will
    likely be called DBM. In our example, its Oracle Home is /u01/app/oracle/product/11.2.0.3/dbhome_1\.
    Our new database will be called ERPDEV. As root, do the following on all nodes
    in the cluster:


    ```

    $ mkdir /u01/app/oracle/product/11.2.0.3/erpdevdb

    $ cd /u01/app/oracle/product/11.2.0.3/dbhome_1

    $ cp -r * /u01/app/oracle/product/11.2.0.3/erpdevdb/.

    $ chown -R oracle:oinstall /u01/app/oracle/product/11.2.0.3/erpdevdb

    ```


    Log in as the Oracle software owner and do the following—also on both nodes. When
    repeating the process on each node, be sure to set the `LOCAL_NODE` appropriately,
    as follows:


    ```

    $ cd /u01/app/oracle/product/11.2.0.3/erpdevdb/clone/bin


    $ perl clone.pl ORACLE_BASE=$ORACLE_BASE \

    ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb \

    ORACLE_HOME_NAME=OraDb11g_ERPDEV \

    ''-O"CLUSTER_NODES={exadb01,exadb02}"'' \

    ''-O"LOCAL_NODE=exadb01"''

    ```'
