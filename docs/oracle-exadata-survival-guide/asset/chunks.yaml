    \ 中找到所有数据的读 I/O 请求数\" |\n| `FC_IO_RQKEEP_R_MISS_SEC` | \"每秒为‘keep’对象未在 FlashCache\
    \ 中找到所有数据的读 I/O 请求数\" |\n| `FC_IO_RQKEEP_R_SEC` | \"每秒为‘keep’对象满足的从 FlashCache\
    \ 的读 I/O 请求数\" |\n| `FC_IO_RQKEEP_R_SKIP` | \"为‘keep’对象绕过 FlashCache 的读 I/O 请求数\"\
    \ |\n| `FC_IO_RQKEEP_R_SKIP_SEC` | \"每秒为‘keep’对象绕过 FlashCache 的读 I/O 请求数\" |\n\
    | `FC_IO_RQKEEP_W` | \"导致用数据填充 FlashCache 的‘keep’对象 I/O 请求数\" |\n| `FC_IO_RQKEEP_W_SEC`\
    \ | \"每秒导致用数据填充 FlashCache 的‘keep’对象 I/O 请求数\" |\n| `FC_IO_RQ_R` | \"从 FlashCache\
    \ 满足的读 I/O 请求数\" |\n| `FC_IO_RQ_R_MISS` | \"未在 FlashCache 中找到所有数据的读 I/O 请求数\"\
    \ |\n| `FC_IO_RQ_R_MISS_SEC` | \"每秒未在 FlashCache 中找到所有数据的读 I/O 请求数\" |\n| `FC_IO_RQ_R_SEC`\
    \ | \"每秒从 FlashCache 满足的读 I/O 请求数\" |\n| `FC_IO_RQ_R_SKIP` | \"绕过 FlashCache 的读\
    \ I/O 请求数\" |\n| `FC_IO_RQ_R_SKIP_SEC` | \"每秒绕过 FlashCache 的读 I/O 请求数\" |\n| `FC_IO_RQ_W`\
    \ | \"导致用数据填充 FlashCache 的 I/O 请求数\" |\n| `FC_IO_RQ_W_SEC` | \"每秒导致用数据填充 FlashCache\
    \ 的 I/O 请求数\" |\n\n## 查看当前指标\n\n这些指标是自 `CELLSRV` 启动以来的累计值。要列出一个或多个指标的当前值，需要使用\
    \ `LIST METRICCURRENT` 语句。输出报告的是单个存储节点的累计统计信息；要监控整个 Smart Flash Cache 的活动，必须在所有剩余的存储节点上运行相同的命令。\n\
    \n使用 `LIST METRICCURRENT` 语句返回给定存储节点的 Smart Flash Cache 指标：\n\n```\nCellCLI> list\
    \ metriccurrent where objectType = 'FLASHCACHE'\n\nFC_BYKEEP_OVERWR          \
    \      FLASHCACHE      0.000 MB\n   FC_BYKEEP_OVERWR_SEC            FLASHCACHE\
