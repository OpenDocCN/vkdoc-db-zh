    One reason for this requirement is that ASM stripes the data across the total
    number of drives in a disk group, thus the size and geometry of the disk units
    must be uniform across the storage tier. It is not necessary for the disks of
    the expansion rack to be added to an existing disk group; a completely separate
    disk group can be created from that storage. You cannot mix storage types within
    the expansion rack, but the disk type does not need to match that of the host
    system, if a separate disk group is to be created from that storage. The beauty
    of these expansion racks is that they integrate seamlessly with the existing storage
    on the host Exadata system. If these disks are added to existing disk groups,
    ASM automatically triggers a rebalance to evenly distribute the extents across
    the total number of available disks.


    Things to Know'
  trans: '

    ## 可用配置


    取代 X2 系列的 X3 系列 Exadata 机器提供以下五种配置：


    *   `X3-2 八分之一机架`：两台数据库服务器，每台配备两颗八核至强处理器（启用八个核心）及 256GB 内存，三台存储服务器，以及三十六块磁盘驱动器。

    *   `X3-2 四分之一机架`：两台数据库服务器，每台配备两颗八核至强处理器及 256GB 内存，三台存储服务器，以及三十六块磁盘驱动器。

    *   `X3-2 半机架`：四台数据库服务器，每台配备两颗八核至强处理器及 256GB 内存，七台存储服务器，八十四块磁盘驱动器，以及一个用于扩展的脊柱交换机。

    *   `X3-2 全机架`：八台数据库服务器，每台配备两颗八核至强处理器及 256GB 内存，十四台存储服务器，一百六十八块磁盘驱动器，以及一个用于扩展的脊柱交换机。

    *   `X3-8 全机架`：两台数据库服务器，每台配备八颗十核至强处理器及 2TB 内存，十四台存储服务器，一百六十八块磁盘驱动器，一个用于扩展的脊柱交换机，并且不含键盘/视频/鼠标模块。


    总的来说，按“同类相比”，X3 系列 Exadata 机器的性能是已停产的 X2 系列的两倍。如前所述，在 `X3-2` 系列中，新增了 `八分之一机架`
    配置，其计算能力略低于 `X2-2 四分之一机架`（后者提供总共十二个处理器核心，全部启用），前者总共十六个处理器核心，其中八个启用）。与 `X3-2 四分之一机架`
    相比，这降低了许可成本，使得 `八分之一机架` 成为进入 Exadata 领域的非常合适且经济高效的 `X3-2` 入门点。


    ## 存储


    原始存储容量取决于您选择的是高容量还是高性能驱动器——高容量 `串行连接 SCSI (SAS)` 驯动器每块提供 3TB 原始存储，转速为 7,200RPM；而高性能驱动器每块提供
    600GB，转速为 15,000RPM。对于配置了高容量磁盘的 `四分之一机架`，可提供 108TB 的总原始存储，在配置了正常的自动存储管理 (`ASM`)
    冗余后，大约有 40TB 可用于数据。使用高性能磁盘时，`四分之一机架` 机器的总原始存储为 21.1TB，在正常的 `ASM` 冗余下，可用数据存储空间约为
    8.4TB。高冗余配置会使两种配置的存储空间再减少大约三分之一；其代价是在磁盘故障时增加了一个 `ASM` 镜像，因为高冗余提供两份数据副本。正常冗余则提供一份副本。


    磁盘通过存储服务器（或单元）访问，这些服务器运行自己的 Linux 版本，其中内嵌了 Oracle 内核的一个子集。有趣的是，数据库服务器无法直接访问存储；它们“看到”磁盘的唯一途径是通过
    `ASM`。在 `X3-2 四分之一机架` 和 `八分之一机架` 配置中，有三个存储单元，每个存储单元控制十二块磁盘。每台存储服务器提供两颗六核至强处理器和
    24GB 内存。在各种 Exadata 配置中，差异主要体现在数据库服务器（通常称为 `计算节点`）的数量以及存储服务器或单元的数量上——存储单元的数量越多，Exadata
    机器内部能控制的存储就越多。如前所述，存储服务器也运行集成的 Oracle 内核。这使得数据库服务器能够“移交”（或卸载）部分合格的查询，从而数据库服务器只需处理结果集的缩减数据量，而不必扫描目标对象的每个数据或索引块。这被称为
    `智能扫描`。`智能扫描` 的工作原理及其触发条件将在 第 2 章 中介绍。


    ## 智能闪存缓存


    Exadata 性能套件的另一部分是 `智能闪存缓存`，每个存储单元配备 384GB 固态闪存存储，配置在四个 `Sun Flash Accelerator
    F20 PCIe 卡` 上。采用 `四分之一机架` 配置（三台存储服务器/单元）时，可提供 1.1TB 闪存存储；`全机架` 则提供 5.3TB 闪存存储。闪存缓存可用作智能缓存来服务大量的随机读取，也可以配置为闪存磁盘设备并挂载为
    `ASM` 磁盘组。该主题将在 第 4 章 中深入探讨。


    ## 更多存储


    扩展机架包含存储服务器和磁盘驱动器。有三种不同的配置可供选择：`四分之一机架`、`半机架` 和 `全机架`，其中任何一种都可以连接到任何 Oracle Exadata
    机器。对于 `四分之一机架` 配置，将需要一个额外的脊柱交换机；该交换机的 IP 地址在配置时保留未分配，因此如果安装了交换机，该地址将可用，无需重新配置机器。


    除了增加存储，这些机架还为 `智能扫描` 操作增加了计算能力，最小的扩展机架包含四台存储服务器和四十八块磁盘驱动器，增加了八颗六核 CPU。最大的扩展机架提供
    18 台存储服务器和 216 块磁盘驱动器。实际存储容量取决于系统使用的是高容量还是高性能磁盘驱动器；在单个 Exadata 机器/扩展机架配置中不能混合使用驱动器类型，因此如果
    Exadata 系统使用高容量驱动器，并且这些磁盘要添加到现有的磁盘组中，那么扩展机架也必须包含高容量磁盘。


    此要求的一个原因是，`ASM` 会将数据条带化分布到磁盘组中的所有驱动器上，因此磁盘单元的容量和几何结构必须在存储层上保持一致。扩展机架的磁盘不一定需要添加到现有的磁盘组中；可以从中创建完全独立的磁盘组。您不能在扩展机架内混合存储类型，但如果要从该存储创建单独的磁盘组，则磁盘类型不需要与主机系统匹配。这些扩展机架的妙处在于它们能与主机
    Exadata 系统上的现有存储无缝集成。如果将这些磁盘添加到现有的磁盘组中，`ASM` 会自动触发重新平衡操作，以在所有可用磁盘上均匀分布数据区。


    ## 须知事项


    该系统最初是作为数据仓库解决方案进行营销的。一年后，`Exadata V2` 发布，这次被宣传为一个完整的集成数据库一体机，包括数据库服务器、存储服务器、内部
    InfiniBand 网络以及旨在使各组件协同工作作为统一整体的软件。Oracle 将该一体机宣传为第一台用于 OLTP 的数据库机器，因此现在 `Exadata`
    成为数据仓库和 OLTP 系统的首选机器。次年（2010 年）发布了 `Exadata X2`，通过增加第二种配置（`X2-8`）延续了改进。这为客户提供了两种全机架实施选项。2012
    年 9 月，`Exadata X3` 上市，再次提升了性能，并提供了第五种配置选项——`八分之一机架`。

    '
- fmt: "An Exadata system, available in four configurations, is a complex arrangement\
    \ of database servers, storage servers, disk drives, and an internal InfiniBand\
    \ network with modifications designed to address many performance issues in a\
    \ unique way. It’s the first system with a “divide-and-conquer” approach to query\
    \ processing that can dramatically improve performance and reduce query response\
    \ time. It also includes Smart Flash Cache, a write-back cache that can handle\
    \ large volumes of reads and is designed for Online Transaction Processing (OLTP)\
    \ systems. This cache can also be configured as flash disk devices. Additional\
    \ storage is available in the form of Exadata Expansion Racks, which can be added\
    \ to any Exadata configuration to extend the storage and add storage-cell computing\
    \ power. The storage in the expansion rack can be the same type (High Capacity,\
    \ High Performance) as in the Exadata Machine; however, in some cases, Oracle\
    \ recommends High Capacity drives for expansion racks, regardless of the storage\
    \ found in the host Exadata system.\n\nMoving on, we’ll discuss the various performance\
    \ enhancements Exadata provides and how, at least in a limited way, these enhancements\
    \ are implemented. This is not meant to be an exhaustive text but a “getting started”\
    \ guide to help lead you through the maze. There are other, more technical, texts\
    \ you can read to gain a deeper knowledge of the machine, but with this book’s\
    \ background in hand, it will be easier to understand what Exadata does that other\
    \ systems can’t.\n\n# CHAPTER 2\n\n![image](images/frontdot.jpg)\n\n## Smart Scans\
    \ and Offloading\n\nOne of the enhancements provided by Exadata is the Smart Scan,\
    \ a mechanism by which parts of a query can be offloaded, or handed off, to the\
    \ storage servers for processing. This “divide-and-conquer” approach is one reason\
    \ Exadata is able to provide such stellar performance. It’s accomplished by the\
    \ configuration of Exadata, where database servers and storage cells offer computing\
    \ power and the ability to process queries, owing to the unique storage server\
    \ software running on the storage cells.\n\n### Smart Scans\n\nNot every query\
    \ qualifies for a Smart Scan, as certain conditions must be met. Those conditions\
    \ are as follows:\n* A full table scan or full index scan must be used, in addition\
    \ to direct-path reads.\n* One or more of the following simple comparison operators\
    \ must be in use:\n  * =\n  * <\n  * >\n  * >=\n  * =<\n  * BETWEEN\n  * IN\n\
    \  * IS NULL\n  * IS NOT NULL\n\nSmart Scans will also be available when queries\
    \ are run in parallel, because direct-path reads are executed by default, by parallel\
    \ query slaves. Of course, the other conditions must also be met: parallel only\
    \ ensures that direct-path reads are used. What does a Smart Scan do to improve\
    \ performance? It reduces the amount of data the database servers must process\
    \ to return results. The offloading process divides the workload among the compute\
    \ nodes and the storage cells, involves more CPU resources, and returns smaller\
    \ sets of data to the receiving process.\n\nInstead of reading 10,000 blocks of\
    \ data to return 1,000 rows, offloading allows the storage cells to perform some\
    \ of the work with access and filter predicates and to send back only the rows\
    \ that meet the provided criteria. Similar in operation to parallel query slaves,\
    \ the offloading process divides the work among the available storage cells, and\
    \ each cell returns any qualifying rows stored in that particular subset of disks.\
    \ And, like parallel query, the result “pieces” are merged into the final result\
    \ set. Offloading also reduces inter-instance transfer between nodes, which, in\
    \ turn, reduces latching and global locking. Latching, in particular, consumes\
    \ CPU cycles. Less latching equates to a further reduction in CPU cycles, enhancing\
    \ performance. The net “savings” in CPU work and execution time can be substantial;\
    \ queries that take minutes to execute on non-Exadata systems can sometimes be\
    \ completed in seconds as a result of using Smart Scans.\n\n### Plans and Metrics"
  raw: 'An Exadata system, available in four configurations, is a complex arrangement
    of database servers, storage servers, disk drives, and an internal InfiniBand
    network with modifications designed to address many performance issues in a unique
    way. It’s the first system with a “divide-and-conquer” approach to query processing
    that can dramatically improve performance and reduce query response time. It also
    includes Smart Flash Cache, a write-back cache that can handle large volumes of
    reads and is designed for Online Transaction Processing (OLTP) systems. This cache
    can also be configured as flash disk devices. Additional storage is available
    in the form of Exadata Expansion Racks, which can be added to any Exadata configuration
    to extend the storage and add storage-cell computing power. The storage in the
    expansion rack can be the same type (High Capacity, High Performance) as in the
    Exadata Machine; however, in some cases, Oracle recommends High Capacity drives
    for expansion racks, regardless of the storage found in the host Exadata system.


    Moving on, we’ll discuss the various performance enhancements Exadata provides
    and how, at least in a limited way, these enhancements are implemented. This is
    not meant to be an exhaustive text but a “getting started” guide to help lead
    you through the maze. There are other, more technical, texts you can read to gain
    a deeper knowledge of the machine, but with this book’s background in hand, it
    will be easier to understand what Exadata does that other systems can’t.


    CHAPTER 2


    ![image](images/frontdot.jpg)


    Smart Scans and Offloading


    One of the enhancements provided by Exadata is the Smart Scan, a mechanism by
    which parts of a query can be offloaded, or handed off, to the storage servers
    for processing. This “divide-and-conquer” approach is one reason Exadata is able
    to provide such stellar performance. It’s accomplished by the configuration of
    Exadata, where database servers and storage cells offer computing power and the
    ability to process queries, owing to the unique storage server software running
    on the storage cells.


    Smart Scans


    Not every query qualifies for a Smart Scan, as certain conditions must be met.
    Those conditions are as follows:


    *   A full table scan or full index scan must be used, in addition to direct-path
    reads.

    *   One or more of the following simple comparison operators must be in use:


    *   =

    *   <

    *   >

    *   >=

    *   =<

    *   BETWEEN

    *   IN

    *   IS NULL

    *   IS NOT NULL


    Smart Scans will also be available when queries are run in parallel, because direct-path
    reads are executed by default, by parallel query slaves. Of course, the other
    conditions must also be met: parallel only ensures that direct-path reads are
    used. What does a Smart Scan do to improve performance? It reduces the amount
    of data the database servers must process to return results. The offloading process
    divides the workload among the compute nodes and the storage cells, involves more
    CPU resources, and returns smaller sets of data to the receiving process.


    Instead of reading 10,000 blocks of data to return 1,000 rows, offloading allows
    the storage cells to perform some of the work with access and filter predicates
    and to send back only the rows that meet the provided criteria. Similar in operation
    to parallel query slaves, the offloading process divides the work among the available
    storage cells, and each cell returns any qualifying rows stored in that particular
    subset of disks. And, like parallel query, the result “pieces” are merged into
    the final result set. Offloading also reduces inter-instance transfer between
    nodes, which, in turn, reduces latching and global locking. Latching, in particular,
    consumes CPU cycles. Less latching equates to a further reduction in CPU cycles,
    enhancing performance. The net “savings” in CPU work and execution time can be
    substantial; queries that take minutes to execute on non-Exadata systems can sometimes
    be completed in seconds as a result of using Smart Scans.


    Plans and Metrics'
  trans: "\nExadata 系统提供四种配置，它是一个由数据库服务器、存储服务器、磁盘驱动器以及内部 InfiniBand 网络组成的复杂架构，其经过修改的设计以独特的方式解决了许多性能问题。它是首个采用\"\
    分而治之\"方法进行查询处理的系统，能显著提升性能并缩短查询响应时间。它还包括**智能闪存缓存**，这是一种能够处理大量读取操作的写回缓存，专为在线事务处理系统设计。此缓存也可以配置为闪存磁盘设备。额外的存储可通过**Exadata\
    \ 扩展机架**的形式提供，它可以添加到任何 Exadata 配置中，以扩展存储容量并增加存储单元的计算能力。扩展机架中的存储可以与 Exadata 服务器中的类型相同；然而，在某些情况下，Oracle\
    \ 建议为扩展机架使用大容量硬盘，而不论主机 Exadata 系统中配置的是何种存储。\n\n接下来，我们将讨论 Exadata 提供的各种性能增强功能，以及这些功能至少在有限范围内是如何实现的。本书并非详尽无遗的专著，而是一本\"\
    入门\"指南，旨在帮助您理清头绪。您可以阅读其他更具技术性的书籍来深入了解这台机器，但有了本书的基础知识，您将更容易理解 Exadata 具备哪些其他系统所不具备的功能。\n\
    \n# 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 智能扫描与卸载\n\nExadata 提供的增强功能之一是**智能扫描**，这是一种可以将部分查询**卸载**或移交到存储服务器进行处理的机制。这种\"\
    分而治之\"的方法是 Exadata 能够提供如此卓越性能的原因之一。这是通过 Exadata 的配置实现的，其中数据库服务器和存储单元提供计算能力和处理查询的能力，这要归功于在存储单元上运行的独特存储服务器软件。\n\
    \n### 智能扫描\n\n并非每个查询都能进行智能扫描，因为必须满足某些条件。这些条件如下：\n* 必须使用全表扫描或全索引扫描，此外还需要直接路径读取。\n\
    * 必须使用以下一个或多个简单的比较运算符：\n  * =\n  * <\n  * >\n  * >=\n  * =<\n  * BETWEEN\n  *\
    \ IN\n  * IS NULL\n  * IS NOT NULL\n\n当并行运行查询时，智能扫描也将可用，因为并行查询从属进程默认执行直接路径读取。当然，其他条件也必须满足：并行执行仅确保使用直接路径读取。智能扫描如何提升性能？它减少了数据库服务器为返回结果而必须处理的数据量。卸载过程将工作负载分配到计算节点和存储单元之间，涉及更多的\
    \ CPU 资源，并将更小的数据集返回给接收进程。\n\n卸载不是读取 10,000 个数据块来返回 1,000 行数据，而是允许存储单元利用访问和过滤谓词执行部分工作，并仅发回符合所提供条件的行。与并行查询从属进程的操作类似，卸载过程将工作分配到可用的存储单元，每个单元返回存储在该特定磁盘子集中的任何符合条件的行。并且，与并行查询类似，这些\"\
    片段\"结果被合并成最终的结果集。卸载还减少了节点之间的实例间传输，从而减少了**闩锁**和**全局锁**。闩锁尤其消耗 CPU 周期。更少的闩锁等同于进一步减少\
    \ CPU 周期，从而提升性能。CPU 工作和执行时间的净\"节省\"可能是相当可观的；在非 Exadata 系统上需要数分钟执行的查询，使用智能扫描后有时可以在数秒内完成。\n\
    \n### 执行计划与指标\n"
- fmt: "# 执行计划中的 Smart Scan 活动报告与验证\n\nExecution plans can report Smart Scan activity,\
    \ if they are the actual plans generated by the optimizer at runtime. Qualifying\
    \ plans will be found in the `V$SQL_PLAN` and `DBA_HIST_SQL_PLAN` views and will\
    \ be generated by `autotrace`, when the `ON` option is used, or can be found by\
    \ enabling a `10046` trace and processing the resulting trace file through `tkprof`.\
    \ Using `autotrace` in `EXPLAIN` mode may not provide the same plan as generated\
    \ at runtime, because it can still use rule-based optimizer decisions to generate\
    \ plans. The same holds true for `EXPLAIN PLAN`. (We have seen cases where `EXPLAIN\
    \ PLAN` and a `10046` trace differed in the reported execution plan.) The `tkprof`\
    \ utility also offers an `explain` mode, and it, too, can provide misleading plans.\
    \ By default, `tkprof` provides the actual plan from the execution, so using the\
    \ command-line `explain` option is unnecessary.\n\n## 识别执行计划中的 Smart Scan 操作\n\
    \nSmart Scans are noted in the execution plan in one of three ways:\n\n*   `TABLE\
    \ ACCESS STORAGE FULL`\n*   `INDEX STORAGE FULL SCAN`\n*   `INDEX STORAGE FAST\
    \ FULL SCAN`\n\nThe presence of one or more of these operations does not mean\
    \ that a Smart Scan actually occurred; other metrics should be used to verify\
    \ Smart Scan execution.\n\n## 使用视图列验证 Smart Scan\n\nThe `V$SQL` view (and, for\
    \ RAC databases, `GV$SQL`) has two columns that provide further information on\
    \ cell offload execution, `io_cell_offload_eligible_bytes` and `io_cell_offload_returned_bytes`.\
    \ These are populated with relevant information regarding cell offload activity\
    \ for a given `sql_id`, provided a Smart Scan was actually executed.\n\nThe `io_cell_offload_eligible_bytes`\
    \ column reports the bytes of data that qualify for offload. This is the volume\
    \ of data that can be offloaded to the storage cells during query execution. The\
    \ `io_cell_offload_returned_bytes` column reports the number of bytes returned\
    \ by the regular I/O path. These are the bytes that were not offloaded to the\
    \ cells. The difference between these two values provides the bytes actually offloaded\
    \ during query execution. If no Smart Scan were used, the values for both columns\
    \ would be 0. There will be cases where the column `io_cell_offload_eligible_bytes`\
    \ will be equal to 0, but the column `io_cell_offload_returned_bytes` will not.\
    \ Such cases will usually, but not always, be referencing either fixed views (such\
    \ as `GV$SESSION_WAIT`) or other data dictionary views (`V$TEMPSEG_USAGE`, for\
    \ example). Such queries are not considered eligible for offload. (The view isn’t\
    \ offloadable, because it may expose memory structures resident on the database\
    \ compute nodes, but that doesn’t indicate they don’t qualify for a Smart Scan\
    \ [one or more of the base tables to that view might qualify].) The presence of\
    \ projection data in `V$SQL_PLAN`/`GV$SQL_PLAN` is proof enough that a Smart Scan\
    \ was executed.\n\n## 查询示例\n\nLooking at a query where a Smart Scan is executed,\
    \ using the `smart_scan_ex.sql` script, we see\n\n```\nSQL> select *\n  2  from\
    \ emp\n  3  where empid = 7934;\n\nEMPID EMPNAME                             \
    \                 DEPTNO\n---------- ----------------------------------------\
