    25 rows selected.\nSQL>\n```\n\n### 卸载效率分析\n有 25 个会话正在运行相同的语句，每个会话都有不同的监控信息。对于\
    \ Exadata，关键信息之一是 `IO_INTERCONNECT_BYTES`，它间接报告了卸载效率。如果 `PHYSICAL_READ_BYTES`\
    \ 和 `PHYSICAL_WRITE_BYTES` 的总和等于 `IO_INTERCONNECT_BYTES` 中的值，则表明该查询或语句完全得益于卸载，效率为\
    \ 100%。正如我们之前指出的，比率和效率是相对数字。但这个比率确实能让你大致了解有多少数据是由卸载处理的，从而节省了数据库层的处理时间。请注意，结果中的每一行\
    \ `offload_pct` 都是 100。你不会总是看到 100% 的卸载效率，因为多部分查询可能包含会卸载和不会卸载的部分，如下列输出所示。\n\n\
    ```\nINST   SID  PLAN_HASH ELAPSED   CPU_TM FETCH IO_ICON_BYT TL_BYT_PRC OFFLD_PCT\
    \ STATUS\n---- ----- ---------- ------- -------- ----- ----------- ----------\
    \ --------- ---------------\n   2   476 3140350437 7065006  2202665   142    85155840\
    \   83320832 97.845118 DONE (ALL ROWS)\n   1   869  484955222 6136552  5940097\
    \   127      147456     106496 72.222222 DONE (ALL ROWS)\n```\n\n来自这两个会话的语句的大部分输出都卸载了，但仍有一部分没有卸载，可能是因为它需要在数据库层进行传统的一致性读处理。也有可能得到高于\
    \ 100% 的百分比。\n\n```\nINST   SID SQL_ID          PLAN_HASH  ELAPSED   CPU_TM FETCH\
    \ IO_ICON_BYT TL_BYT_PRC OFFLD_PCT STATUS\n---- ----- -------------  ---------\
    \ -------- -------- ----- ----------- ---------- --------- ------\n   2  1619\
    \ 192t67rtdqrf8 4217233900 23380518   795879     2    61626560  127926272 207.58302\
    \ DONE (FIRST N ROWS)\n   2  1333 6m6y2y82sjpjx  627564094  4416403  1176820 \
    \    1    57162056   77930496 136.33256 DONE (ALL ROWS)\n   2  1619 192t67rtdqrf8\
    \ 4217233900 13716144   853870     2    63322304  129622016 204.70199 DONE (FIRST\
    \ N ROWS)\n```\n\n### ORDER BY 与索引访问的影响\n`ORDER BY` 子句可能导致这种行为，因为它最多可以使查询处理的读取字节数翻倍。\n\
    \n![image](img/Table10-1.jpg)\n\n索引访问也可能导致 `PHYSICAL_READ_BYTES` 的值高于 `IO_INTERCONNECT_BYTES`。`SQL_ID\
    \ 6m6y2y82sjpjx` 就是这种情况，执行计划显示了这一点。\n\n![image](img/Table10-2.jpg)\n\n由于索引访问路径不符合智能扫描的条件，它们增加了\
    \ `PHYSICAL_READ_BYTES`，但没有为 `IO_INTERCONNECT_BYTES` 增加相同的量。\n\n### 使用 DBMS_SQLTUNE.REPORT_SQL_MONITOR\n\
    在 Oracle 11.2 中，另一种生成监控数据的方法是使用 `DBMS_SQLTUNE.REPORT_SQL_MONITOR` 函数。\n\n```\n\
    select dbms_sqltune.report_sql_monitor(session_id=>&sessid, report_level=>'ALL',type=>'HTML')\
    \ from dual;\n```\n\n`TYPE` 参数可以是 `TEXT` 或 `HTML`。我们通常生成 `HTML` 报告，因为它们在 Web 浏览器中更易于导航和阅读，并且保留了可以通过右键单击数据项访问的上下文（钻取）信息。其中一份\
    \ `HTML` 报告的示例输出如图 10-6a、10-6b 和 10-6c 所示。\n\n![9781430260103_Fig10-06a.jpg](img/9781430260103_Fig10-06a.jpg)\n\
    图 10-6a. 来自 DBMS_SQLTUNE.REPORT_SQL_MONITOR 的全局信息输出\n\n![9781430260103_Fig10-06b.jpg](img/9781430260103_Fig10-06b.jpg)\n\
    图 10-6b. HTML 报告中的并行执行信息\n\n![9781430260103_Fig10-06c.jpg](img/9781430260103_Fig10-06c.jpg)\n\
    图 10-6c. HTML 报告中的 SQL 计划窗口\n\n相同 SID 的文本报告提供相同的信息。\n\n```\nSQL Monitoring Report\n\
    \nSQL Text\n\nselect policy_name, TO_CHAR(CAST(SYSDATE AS TIMESTAMP) , 'YYYY-MM-DD\
    \ HH24:MI:SS'\n) timestamp, sum(cnt) policy_changes_count from ( select (CASE\
    \ WHEN (INSTR(lower\n(obj_name),'realm')!=0) THEN 'Realms' WHEN (INSTR(lower(obj_name),'command')!=0)\n\
    \ THEN 'Command Rules' WHEN (INSTR(lower(obj_name),'role') !=0 ) THEN 'Secure\
    \ App\nlication Roles' WHEN (INSTR(lower(obj_name),'rule') !=0 ) THEN 'Rules'\
    \ ELSE 'Fac\ntors' END) policy_name,cnt from ( select obj_name,COUNT(*) cnt from\
    \ DBA_AUDIT_TR\nAIL where\nUPPER(owner) in ('DVSYS','DVF') and TIMESTAMP >= TO_DATE('2013-07-22\
    \ 16:40:12','\nYYYY-MM-DD HH24:MI:SS') and ( UPPER(action_name) LIKE 'INSERT%'\
    \ OR UPPER(action_\nname) LIKE 'UPDATE%' OR UPPER(action_name) LIKE 'DELETE%'\
    \ OR UPPER(action_name)\nLIKE 'MERGE%' OR UPPER(action_name) LIKE 'PURGE%' OR\
    \ UPPER(action_name) LIKE 'TR\nUNCATE%' OR UPPER(action_name) LIKE 'SESSION REC%')\
    \ group by obj_name ) ) group\nby policy_name order by policy_changes_count desc\n\
    \nGlobal Information\n```\n"
