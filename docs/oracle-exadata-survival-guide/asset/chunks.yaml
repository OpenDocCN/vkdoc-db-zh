    \ segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n-----------------------------------\
    \ -----------\nDEPT                                      65536\nDUMMY        \
    \                             65536\nEMP                                  226492416\n\
    EMP_IDX                              721420288\nSALGRADE                     \
    \            65536\n\nElapsed: 00:00:00.33\nSQL>\nSQL> --\nSQL> -- Perform a second\
    \ update\nSQL> --\nSQL> -- Note elapsed time\nSQL> --\nSQL> update emp set sal=sal*1.08\
    \ where empno > 7350;\n\n14680064 rows updated.\n\nElapsed: 00:03:15.00\nSQL>\n\
    SQL> commit;\n\nCommit complete.\n\nElapsed: 00:00:00.02\nSQL>\nSQL> --\nSQL>\
    \ -- Current storage consumed after second update\nSQL> --\nSQL> select table_name,\
    \ compression, compress_for\n  2  from user_tables;\n\nTABLE_NAME            \
    \         COMPRESS COMPRESS_FOR\n------------------------------ -------- ------------\n\
    DEPT                           DISABLED\nBONUS                          DISABLED\n\
    SALGRADE                       DISABLED\nDUMMY                          DISABLED\n\
    EMP                            ENABLED  QUERY HIGH\n\nElapsed: 00:00:00.02\nSQL>\n\
    SQL> select segment_name, sum(bytes) total_space\n  2  from user_segments\n  3\
    \  group by segment_name;\n\nSEGMENT_NAME                        TOTAL_SPACE\n\
    ----------------------------------- -----------\nDEPT                        \
    \              65536\nDUMMY                                     65536\nEMP   \
    \                               452984832\nEMP_IDX                           \
    \   721420288\nSALGRADE                                 65536\n\nElapsed: 00:00:00.21\n\
    SQL>\n```\n\nNote that the index associated with the table also increases in size\
    \ after the first update and remains at that size during subsequent updates to\
