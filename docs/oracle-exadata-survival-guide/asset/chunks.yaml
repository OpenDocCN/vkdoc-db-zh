    \ Frieda               Yes\n  ...\n  10116134 Pickles              Yes\n  10116136\
    \ Frieda               Yes\n\n2621440 rows selected.\n\nSQL>\nSQL> select *\n\
    \  2  from v$mystat\n  3  where statistic# = (select statistic# from v$statname\
    \ where name = 'cell physical\n      IO bytes saved by storage index');\n\nSID\
    \ STATISTIC#      VALUE\n---------- ---------- ----------\n      1304        247\
    \          0\n\nSQL> select /*+ parallel(4) */\n  2  h.chicken_name, t.talent,\
    \ h.suitable_for_frying\n  3  from chicken_hr_tab h join chicken_talent_tab t\
    \ on (t.talent_cd = h.talent_cd)\n  4  where h.talent_cd = 5;\n\nCHICKEN_NAME\
    \         TALENT                                   SUI\n-------------------- ----------------------------------------\
    \ ---\nCat                  Accountant                               No\nCat \
    \                 Accountant                               No\nCat           \
    \       Accountant                               No\nCat                  Accountant\
    \                               No\n...\nCat                  Accountant     \
    \                          No\nCat                  Accountant               \
    \                No\n\n524288 rows selected.\n\nSQL>\nSQL> select *\n  2  from\
    \ v$mystat\n  3  where statistic# = (select statistic# from v$statname where name\
    \ = 'cell physical\n     IO bytes saved by storage index');\n\nSID STATISTIC#\
    \      VALUE\n---------- ---------- ----------\n      1304        247        \
    \  0\n\nSQL>\n```\n\nSince there is no 1MB segment that does not contain the searched-for\
    \ value, the storage index cannot tell Oracle to skip any of them, which is reflected\
    \ in the `VALUE` column from `V$MYSTAT` for the “`cell physical IO bytes saved\
    \ by storage index`” statistic. (In 11.2.0.3, the statistic number for this event\
    \ is 247, but it’s best to actually query on the statistic name, as Oracle can,\
    \ and has, reassigned statistic numbers for existing statistics, as new ones are\
    \ added in newer versions.) Again, this does not mean that this storage index\
    \ was not used; it does mean that no I/O savings were realized by using it.\n\n\
    ## Execution Plan Doesn’t Know\n\nExecution plans won’t report storage index usage,\
    \ because, frankly, the optimizer doesn’t know whether a Smart Scan will or will\
    \ not be used for a given query. The only certain monitoring method, outside of\
    \ enabling tracing at the `CELLSRV` level, is through the “`cell physical IO bytes\
    \ saved by storage index`” statistic. [Chapter 9](#9781430260103_Ch09.xhtml) will\
    \ cover how to enable `CELLSRV` tracing; starting `CELLSRV` tracing requires a\
    \ restart of the cell, which causes the storage index segments to be dropped.\n\
    \nLooking at the previous queries, showing (and not showing) storage index savings\
    \ adding the execution plans to the generated output verifies that the optimizer\
    \ won’t report any information on the storage indexes in use:\n\n```\nSQL> set\
    \ autotrace on\nSQL>\nSQL> select /*+ parallel(4) */\n  2  h.chicken_name, t.talent,\
    \ h.suitable_for_frying\n  3  from chicken_hr_tab h join chicken_talent_tab t\
    \ on (t.talent_cd = h.talent_cd)\n  4  where h.talent_cd = 5;\n```"
