    # Cell Multiblock Physical Read


    此事件在Exadata系统上被重命名，因为非Exadata事件被命名为`db file scattered read`，这个名称有描述性但不完全准确，因为读取的块可能不是分散的而是连续的。Oracle
    11.2在非Exadata系统上仍然使用`db file scattered read`事件报告多块读取，无论它们读取的是连续块还是分散块。对于Exadata系统，此事件记录连续多块读取的时间。


