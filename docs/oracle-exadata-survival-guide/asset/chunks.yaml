    # 管理和监控 Exadata 存储单元


    ## 存储单元概述

    到目前为止，我们已经介绍了足够的 Exadata 架构知识，您已经了解到存储单元独立于数据库服务器，并提供自己的指标和计数器。由于数据库服务器不直接与存储通信，因此由存储单元负责向数据库服务器提供请求的数据。为了协助完成此任务，存储单元拥有自己的
    CPU 和内存，这些资源可提供额外的处理能力。它们还拥有自己的操作系统级用户账户，本章我们将关注其中的两个。


    感兴趣的账户是 `celladmin` 和 `cellmonitor`，具体使用哪个账户取决于任务的性质。您可能已经猜到，`cellmonitor` 账户可以访问计数器和指标，但不能执行任何管理任务。`celladmin`
    账户也可以访问指标和计数器，但还拥有启动和停止所有单元服务的管理权限。访问存储单元是真正监控单元性能并诊断与单元相关的性能问题的唯一方法。


    ## 与存储单元通信

    与存储单元通信需要登录到存储单元，Exadata 为此提供了两个专用账户。我们讨论的第一个账户是 `cellmonitor`，这是一个能够访问单元性能指标和计数器的账户。`cellmonitor`
    账户是存储服务器上的受限账户，仅能访问其主目录和有限的命令。我们将介绍的第二个账户是 `celladmin`，这是一个管理账户，在操作系统级别拥有更多的特权和对存储单元的访问权限。虽然数据库服务器不直接与存储设备通信，但可以使用
    `ssh` 从 Exadata 系统中的任何数据库服务器登录到每个可用的存储单元，以检查性能指标。


    ![image](img/sq.jpg) **注意** 由于存储服务器运行的是 Linux 内核，因此“root”账户也存在于每个可用的存储单元上，并且为该账户在
    Exadata 系统中的所有服务器配置了用户等效性（无需密码即可登录）。除非您是数据库机器管理员 (DMA)，否则您不太可能被授予“root”权限。在“root”访问权限与系统管理员
    (SA) 关联的企业中，DBA 通常可以访问 `celladmin` 和 `cellmonitor` 用户账户及其密码。本章我们将遵循基本的 SA/DBA
    职责分离原则进行介绍。


    ## 查找存储单元

    可用存储服务器的名称和 IP 地址可以在 Exadata 系统中任何数据库服务器的 `/etc/hosts` 文件中找到。以下示例展示了这些条目在 `/etc/hosts`
    文件中的样子。


    ```

    ### CELL Node Private Interface details

