  trans: '

    # Oracle 并行查询执行：参数与自动并行度（Auto DOP）


    这个值通常远高于您实际想要设置的值；按此计算，其意图是为并行查询进程利用所有可用资源。此外，过高的设置会严重影响 OLTP 事务，因为如果一个运行时间长、资源消耗大的并行查询占用了可用的
    CPU 和内存，这些事务可能会因资源匮乏而无法进行。


    与 `pga_aggregate_target` 类似，此参数设置的是一个目标值，而非硬性限制。实际运行的并行服务器进程数量可能会超过该参数的初始配置值。这是因为分配给一条语句的并行从属进程数量可能高达
    DOP（并行度）设置的**两倍**。例如，假设一个系统的 `parallel_servers_target` 设置为 4，而自动并行度（Auto DOP）计算出的并行度也为
    4。那么，该语句可能最多有 8 个并行查询进程为其服务，这超过了目标设定值。并行查询进程的分配部分取决于可用资源，因此偶尔超过 `parallel_servers_target`
    设置值并不是问题。该语句最终可能会进入并行语句队列，但它不会运行失败，因为它使用的并行查询从属进程数量虽然超过了 `parallel_servers_target`
    参数所暗示的允许值。


    影响并行语句排队的第二个参数是一个隐藏参数：`_parallel_statement_queuing`。该参数的值为 `TRUE` 或 `FALSE`，当
    `parallel_degree_policy` 设置为 `AUTO` 时，默认值为 `TRUE`。它可以独立于 `parallel_degree_policy`
    进行设置，以启用或禁用此功能。


    即使启用了并行语句排队，也可以通过一个提示（hint）完全绕过队列。`NO_STATEMENT_QUEUING` 提示允许您立即执行那些原本会被放入队列的并行查询。检查队列寻找它们是徒劳的，因为它们不会以“排队”状态出现。查询与
    `V$SESSION`/`GV$SESSION` 相关联的 `V$SQL`/`GV$SQL` 将揭示它们确实正在运行。它们不仅跳过了队列，而且还能产生超过
    `parallel_servers_target` 设置值的并行查询从属进程。


    如果您没有启用并行语句排队，仍然可以使用另一个提示来启用它：`STATEMENT_QUEUING`。如果在语句开始执行时并行资源稀缺，该提示会将语句放入队列。


    ## 必要设置


    除了我们刚刚介绍的并行语句排队功能，Oracle 还提供了自动并行度（Auto DOP）和内存中并行执行功能。当 `parallel_degree_policy`
    设置为 `AUTO` 时，这三项功能将全部启用。自动并行度允许数据库基于逐个查询来计算并行度；我们将在单独的章节中更详细地讨论这一点。这是需要稍加努力才能启动的功能，因为如果未对
    I/O 系统进行校准，Oracle 将不会激活此功能。


    我们将在本章后面更详细地讨论 I/O 校准。现在您需要知道，这不是一项应在业务执行时段运行的任务。


    I/O 校准只是并行查询处理配置的一部分；有几个数据库初始化参数控制着并行查询执行的某些方面。这些参数、其设置以及它们影响的功能或并行查询执行的方面列于表
    5-1 中。


    **表 5-1.** 影响并行查询执行的参数


    | 名称 | 默认值 | 描述 |

    | --- | --- | --- |

    | `parallel_adaptive_multi_user` | `TRUE` | 为多用户流启用自适应并行度设置。 |

    | `parallel_automatic_tuning` | `FALSE` | 为并行执行参数启用智能默认值。 |

    | `parallel_degree_limit` | `CPU` | 对并行度的限制。取值范围包括 CPU、I/O 和大于等于 2 的整数值。 |

    | `parallel_degree_policy` | `MANUAL` | 用于计算并行度的策略（MANUAL/LIMITED/AUTO）。 |

    | `parallel_execution_message_size` | `16384` | 并行执行的消息缓冲区大小。 |

    | `parallel_force_local` | `FALSE` | 强制在单实例上执行。 |

    | `parallel_instance_group` |  | 用于所有并行操作的实例组。可以将并行操作限制在可用 RAC 实例的一个子集中。 |

    | `parallel_io_cap_enabled` | `FALSE` | 启用基于 I/O 带宽的 DOP 上限。 |

    | `parallel_max_servers` | `240` | 每个实例的最大并行查询服务器数。 |

    | `parallel_min_percent` | `0` | 并行查询所需的最小线程百分比。 |

    | `parallel_min_servers` |  | 每个实例的最小并行查询服务器数。 |

    | `parallel_min_time_threshold` | `AUTO` | 超过此阈值的执行计划有资格被并行化（以秒为单位）。也可以设置为数值，包括
    0。 |

    | `parallel_servers_target` | `240` | 实例目标（以并行服务器数量计）。 |

    | `parallel_threads_per_cpu` | `2` | 每个 CPU 的并行执行线程数。用于各种并行查询计算。 |


    并行语句排队和内存中并行执行依赖于 `parallel_servers_target` 和 `parallel_min_time_threshold` 参数设置。我们在本章开头已经讨论了并行语句排队；内存中并行执行将在其专门章节中讨论。


    ## 我的朋友“自动”（Auto）


    自动并行度（Auto DOP）是 Oracle 11.2 版本中引入的并行操作方面的一个变革。在之前的数据库版本中，并行操作依赖于查询级别的提示或所用对象的
    `DEGREE` 和 `INSTANCES` 设置。一个不幸的现实是，对于一个给定对象，单一的 DOP 设置几乎不可能在所有时间都适用于所有查询。要找出使查询执行比串行执行更高效、且不会对其他查询和语句产生不利影响的实用
    DOP 值，是一个耗时的试错过程。这要求开发团队了解所使用的平台以及语句执行时系统将承受的工作负载。DOP 的另一个问题是：它无法在语句执行期间更改。自动并行度正是为了克服此类问题而设计的，并且它出色地完成了任务。


    ## 校准我


    当启用并激活后，自动并行度会使 Oracle 评估每条语句，以确定是否应并行运行。一旦做出该决定，便会设定 DOP。


    ![image](img/sq.jpg) **注意** 必须注意，仅仅启用自动并行度并不会使其工作；它需要通过在每个您希望自动并行度可用的数据库中运行 I/O
    校准来激活。


    优化器会评估串行执行时间，通常情况下，如果该估算时间超过了 `parallel_min_time_threshold` 的设置值，语句将被并行执行。默认情况下，此参数设置为
    `AUTO`，提供 10 秒的阈值。可以在系统级别或会话级别更改此参数，以实现更低或更高的并行触发阈值。

