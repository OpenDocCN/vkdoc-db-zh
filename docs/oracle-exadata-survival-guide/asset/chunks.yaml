    \n```sql\nSQL>\nSQL> connect bing/#########\nConnected.\nSQL>\nSQL> set timing\
    \ on\nSQL>\nSQL> select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n\
    \  4  where suitable_for_frying = 'Yes';\n\nCOUNT(*)\n\n已用时间: 00:00:00.80\nSQL>\n\
    SQL> select *\n  2  from v$mystat\n  3  where statistic# = (select statistic#\
    \ from v$statname where name = 'cell physical IO bytes saved by storage index');\n\
    \nSID      STATISTIC#           VALUE\n--------------- --------------- ---------------\n\
    \           1111             247       566501376\n\n已用时间: 00:00:00.00\nSQL>\n\
    SQL> connect bing/#########\nConnected.\nSQL>\nSQL> set timing on\nSQL>\nSQL>\
    \ select /*+ parallel(4) */\n  2  count(*)\n  3  from chicken_hr_tab\n  4  where\
    \ suitable_for_frying is null;\n\nCOUNT(*)\n\n已用时间: 00:00:00.23\nSQL>\nSQL> select\
    \ *\n  2  from v$mystat\n  3  where statistic# = (select statistic# from v$statname\
    \ where name = 'cell physical IO bytes saved by storage index');\n\nSID      STATISTIC#\
    \           VALUE\n--------------- --------------- ---------------\n         \
    \  1111             247      1141440512\n\n已用时间: 00:00:00.00\nSQL>\n```\n\n`IS\
    \ NULL`查询的执行时间不到查找准备好“下锅”的员工的查询所需时间的三分之一，并且跳过的字节数几乎是后者的两倍，因为很少有表段包含`NULL`值。同样，这种速度部分归因于无需检查指定列的最小值和最大值。使用这种策略，不会出现“误报”，因为\
    \ Oracle 不会标记*可能*包含`NULL`的段，只会标记实际存在`NULL`值的段。\n\n# 索引重建\n\n需要“重建”吗？\n\n存储索引是驻留在内存中的结构。只要存储单元有电，这些索引就保持有效。当然，使用内存而非更持久的物理介质使得这些索引具有临时性，会受到维护窗口、断电和内存卡故障的影响。没有方法可以备份存储索引，而且考虑到构建存储索引只需要很少的时间，也确实没有必要这样做。如前所述，构建过程不像构建“永久”索引那样是资源密集型操作。在我们看来，用*重建*一词来替代丢失的存储索引是不准确的，因为没有脚本来构建它们，并且存储单元重启后构建的存储索引很可能与故障前的存储索引不匹配。\n\
    \n由于存储索引是建立在存储于 1MB 段中的数据之上，扫描该表段以找到索引列包含的最小值和最大值，并记录是否存在`NULL`值，并不需要很长时间。故障后构建存储索引与创建更永久索引那种资源密集型操作不同。例如，构建或重建一个\
    \ B 树索引可能需要数小时，并且会明显消耗 CPU 和磁盘资源，而构建存储索引在日常操作过程中几乎难以察觉，在构建时不会妨碍其他会话，并且完成时间仅为前者的一小部分。确实，存储索引中的信息与\
    \ B 树索引的完全不同，但为了实现其预期目的，也无需相同。\n\n每个存储服务器（或单元）都有自己的存储索引，因此丢失一个单元不会删除其余单元中的索引，这意味着只需要重新创建问题单元中的存储索引。存储索引的一个优点是，每个\
    \ 1MB 段的索引不需要与其他表段所代表的索引匹配。因为表在磁盘组中是跨磁盘条带化的，所以表数据分布在所有存储单元上，因此每个表在每个存储单元中都会有存储索引段。一个单元的问题不会导致完全没有存储索引，因此查询仍然可以从未受影响的单元中的索引段受益。此外，ASM\
    \ 中的冗余将冗余数据放在与主源不同的存储单元上。这使得 Exadata 能够丢失一个存储单元或以滚动方式应用补丁，而不会失去对数据的访问。\n"
- fmt: '# 存储索引


    Patching and software upgrades are probably the most likely reasons for storage
    indexes to be built, as `CELLSRV` needs to be stopped before some patching operations
    or software upgrades can begin. The size and scope of patching or upgrades will
    determine the fate of the storage indexes: database server patching/upgrades won’t
    touch the storage cells, so storage indexes will remain intact, and patching/upgrades
    involving the storage tier or the entire Exadata machine will drop storage indexes.
    Firmware issues affecting physical disks will also cause storage index “rebuilds”
    as the storage cells themselves, including the operating system, will have to
    be restarted. True, storage firmware issues and Exadata upgrades are not common
    occurrences, but they can happen, so it’s good to remember that storage indexes
    will have to be built once the storage firmware has been patched or the storage
    servers have been upgraded, either as storage maintenance or as part of an entire
    Exadata patch/upgrade, and the storage cells have been rebooted.


    Another reason for storage indexes to be re-created involves maintenance on the
    flash cache hardware, the Sun flash PCIe cards. Four of these cards are installed
    into each storage server, providing 384GB of flash storage. Occasionally, these
    units need maintenance or replacement, which results in the affected storage cell
    being powered down. Although not directly related to the storage, they are part
    of the storage-cell architecture, and it should be noted that flash cache problems
    can require downtime to correct.


    Remember that a Smart Scan can occur without a storage index being present. Losing
    storage indexes to maintenance windows or power outages isn’t going to appreciably
    affect performance while they are being created. The time that they are missing
    will also be brief, as the first offloadable query after the storage cells are
    again up and running will start the build process all over again, and each subsequent
    offloaded query will contribute to those indexes until they are complete. It may
    not even be noticeable to the end users running queries, as time differences will
    likely be small in comparison to the previous runtimes when the storage indexes
    were available.


    ## Things to Know


    Storage indexes are memory-resident structures, not permanent database objects.
    They are built or modified dynamically when predicates are offloaded to the storage
    cells. Each index segment can index up to eight columns, plus the presence of
    NULLs, and index data segments that are 1MB in size. The index segments are built
    on a first-come, first-served basis; offloaded predicates are added to the index
    until the eight-column limit per segment is attained. More than one query can
    add columns to a storage index for a table. The index segments contain the column
    name, the minimum value for that segment, the maximum value for that segment,
    and whether or not that segment contains NULL values for the included column,
    indicated by a bit in the segment structure. When storage indexes exist, they
    are always used by Smart Scans; not every query can benefit from a storage index,
    though, as values may be scattered across the table segments, causing Oracle to
    read each segment. A storage index is like a probability matrix, indicating only
    the possibility that a value exists in the indexed table segment and, as such,
    “false positives” can occur. Such “false positives,” created when the minimum
    and maximum values for a column in an index segment bracket the desired value
    but the desired value is not actually present in that segment, can also cause
    Oracle to read every table segment and provide no byte savings.


    A storage index isn’t like a conventional B-tree index: it isn’t used to find
    where data is; it’s used to know where data isn''t. Scanning the minimum and maximum
    values for a column in a given storage segment can allow Oracle to eliminate locations
    to search. Since each storage index segment indexes a 1MB storage “chunk” of a
    table, creating a storage index is a fairly fast operation, done “on the fly”
    during query processing. Also, eliminating 1MB pieces of a table can quickly provide
    speed to a query: the less data Oracle needs to sift through, the faster the result
    set will be returned. In some ways, a storage index is really an anti-index, since
    it’s used to eliminate locations to search, rather than pinpoint exactly where
    the desired data resides.


    NULL values are treated differently, and more efficiently, than non-NULL search
    criteria, as Oracle only needs to read the NULL bit in the index. This can speed
    up queries by eliminating storage segments much faster than assessing minimum
    and maximum value pairs. Queries using the `IS NULL` and `IS NOT NULL` comparison
    operators can often return in a fraction of the time of queries where actual data
    values are used.


    How data is loaded into a table also affects how efficient and fast a storage
    index can be. Tables where like values are clustered together can eliminate more
    storage segments than if the data values of interest are scattered across the
    entire table. The fewer storage segments that contain the value or values of interest
    allow Oracle to eliminate more storage segments from being read, returning the
    results much faster than would be possible with random data loading. Of course
    it’s not possible to optimize storage indexes for every column they may contain,
    just as it isn’t possible to generate the optimal Clustering Factor for every
    B-tree index created against a table.


    Size can play a big part in the creation of storage indexes, and partitioned tables,
    in particular, can suffer from realizing no benefit from a storage index, if the
    partition or partitions being queried are small with respect to the overall table
    size. Querying the entire table without using partition pruning would realize
    savings from the use of the storage index.


    Monitoring storage index benefits from the database server is an easy task. A
    single statistic named `cell physical IO bytes saved by storage index` in the
    `V$SESSTAT` and `V$MYSTAT` views records the bytes saved in a cumulative fashion,
    for each session in `V$SESSTAT` and for the current session in `V$MYSTAT`. Logging
    out and logging in again, or using connect to establish a new session, will reset
    this statistic to 0. This can be a useful technique to report exactly how many
    bytes were saved for a particular query by executing a single query after each
    connect is made. It’s also useful to determine if any benefit was realized by
    using the storage index. Some queries won’t benefit, because they aren’t offloadable
    or the data was spread across every storage segment for the table or tables of
    interest.


    Replacing storage indexes can be necessary for several reasons. Patching, software
    and/or hardware maintenance, and power outages are the major causes for this to
    occur. A less common cause for this is PCIe flash storage card maintenance or
    replacement, as that maintenance requires that the affected storage cell be powered
    down. Because they are basic indexes, containing a bare minimum of information,
    they are easy and fast to create and place very little load on the system. Only
    the affected storage cells will lose storage indexes, so if only one cell goes
    down, only those indexes will have to be built again.


    # CHAPTER 4


    ![image](images/frontdot.jpg)


    # Smart Flash Cache'
