    \ SCAN 监听器的步骤，但了解可能需要执行这些操作是好的。\n\n# 执行\n\n您应该充分准备好开始实际的重新配置过程。第一步是删除原始存储配置，包括存储单元的配置。让我们开始。\n\
    \n## 步骤 1\n\n以“root”用户身份连接到数据库服务器 1。您应该在 shell 提示符中看到 `#`，表示登录/su 过程成功。您现在必须将目录更改为\
    \ `/opt/oracle.SupportTools/onecommand`。这是完成此操作所需的脚本和配置文件所在的位置。了解您可以执行哪些命令来进行此重新配置是一个好主意，该信息可以通过使用列出的参数执行以下脚本来找到：\n\
    \n```\n./deploy11203.sh -a -l\n```\n\n将显示以下列表：\n\n```\nStep  0 = CleanworkTmp\n\
    Step  1 = DropUsersGroups\nStep  2 = CreateUsers\nStep  3 = ValidateGridDiskSizes\n\
    Step  4 = CreateOCRVoteGD\nStep  5 = TestGetErrNode\nStep  6 = DeinstallGI\nStep\
    \  7 = DropCellDisk\nStep  8 = DropUsersGroups\nStep  9 = CheckCssd\nStep 10 =\
    \ testfn\nStep 11 = FixAsmAudit\nStep 12 = DropExpCellDisk\nStep 13 = testHash\n\
    Step 14 = DeconfigGI\nStep 15 = GetVIPInterface\nStep 16 = DeleteDB\nStep 17 =\
    \ ApplyBP3\nStep 18 = CopyCrspatchpm\nStep 19 = SetupMultipath\nStep 20 = RemovePartitions\n\
    Step 21 = SetupPartitions\nStep 22 = ResetMultipath\nStep 23 = DoT4Copy\nStep\
    \ 24 = DoAlltest\nStep 25 = ApplyBPtoGridHome\nStep 26 = Apply112CRSBPToRDBMS\n\
    Step 27 = RelinkRDSGI\nStep 28 = RunConfigAssistV2\nStep 29 = NewCreateCellCommands\n\
    Step 30 = GetPrivIpArray\nStep 31 = SetASMDefaults\nStep 32 = GetVIPInterface\n\
    Step 33 = Mychknode\nStep 34 = UpdateOPatch\nStep 35 = GetGroupHash\nStep 36 =\
    \ HugePages\nStep 37 = ResetPermissions\nStep 38 = CreateGroups\nStep 39 = FixCcompiler\n\
    Step 40 = CollectLogFiles\nStep 41 = OcrVoteRelocate\nStep 42 = OcrVoteRelocate\n\
    Step 43 = FixOSWonCells\nStep 44 = Dbcanew\nStep 45 = testgetcl\nStep 46 = setupASR\n\
    Step 47 = CrossCheckCellConf\nStep 48 = SetupCoreControl\nStep 49 = dropExtraCellDisks\n\
    Step 50 = CreateCellCommands\n```\n\n对于此重新配置步骤，有三个感兴趣的命令：\n\n```\nStep  6 = DeinstallGI\n\
    Step  7 = DropCellDisk\nStep  8 = DropUsersGroups\n```\n\n这些是将执行以“清除”现有存储配置并为下一步做准备的命令。每个命令都从\
    \ `deploy11203.sh` 脚本单独运行。您必须按列出的顺序运行这些步骤，以确保完全删除现有配置。实际的命令如下：\n\n```\n./deploy11203.sh\
    \ -a -s 6\n./deploy11203.sh -a -s 7\n./deploy11203.sh -a -s 8\n```\n\n查看 `V$ASM_DISKGROUP`\
    \ 的输出，您可以看到原始的存储分配。以下输出说明了这一点：\n\n```\nSQL> select name, free_mb, usable_file_mb\n\
    \  2  from v$asm_diskgroup\n  3  where name like '%MYEXA%';\n\nNAME          \
    \                 FREE_MB USABLE_FILE_MB\n------------------------------  ---------\
    \ --------------\nDATA_MYEXA1                   81050256       26959176\nRECO_MYEXA1\
    \                   20324596        6770138\n\nSQL>\n```\n\n您将看到，当此过程完成时，所示查询的输出将报告不同的值，这些值是新存储设置的结果。您应该在过程开始前和过程结束后运行此查询，以记录原始存储和新配置的存储。\n\
    \n考虑到这些注意事项，我们继续进行重新配置存储所需的步骤。\n"
- fmt: '# 概述


    这些步骤在八分之一机架或四分之一机架配置上运行大约需要一个小时，并将输出到屏幕，描述待处理和已完成的任务。我们建议您运行每个命令并观察提供的输出。这些流程不应产生任何错误；然而，我们认为通过观察进度来确保安全是最佳做法。


    这些步骤的作用是什么？第6步移除了 GRID Infrastructure，这基本上是 ASM（以及 RAC，但我们在此操作中关心的是它与 ASM 的链接）的核心。一旦该基础设施消失，我们就可以自由运行第7步来删除已创建的网格磁盘，然后删除
    ASM 用于识别和访问存储的分区定义。最后是删除访问这些分区和网格磁盘的用户和组。这里会删除“oracle”用户账户及其操作系统主目录。请注意，只需3个步骤即可删除现有的存储配置，但需要26个步骤才能重新创建它。


    ## Act 2


    一旦这些操作完成，就该修改存储阵列参数以提供所需的存储划分。要编辑的配置文件是`/opt/oracle.SupportTools/onecommand/onecommand.params`。我们使用`vi`来编辑此类文件，但您可能希望改用emacs。使用您习惯的任何编辑器。要更改的参数值名为`SizeArr`。对于标准默认安装，此行应如下所示：


    ```

    SizeArr=2208G

    ```


    了解使用什么值来获得所需的存储划分是很有用的。[表 11-1](#9781430260103_Ch11.xhtml#Tab1) 显示了几个`SizeArr`值以及创建的大约存储划分。


    ### 表 11-1. 某些 SizeArr 值及生成的存储分配


    | SizeArr 设置 | 数据磁盘组百分比 | 恢复磁盘组百分比 |

    | --- | --- | --- |

    | 2208 | 80 | 20 |

    | 1932 | 70 | 30 |

    | 1656 | 60 | 40 |

    | 1487 | 55 | 45 |

    | 1380 | 50 | 50 |


    请记住，这些百分比是基于默认80/20存储分配的近似值。我们建议您使用标准 shell 脚本注释字符`#`来注释该行，以便保留原始设置。您现在可以复制注释的行，或者在其正下方打开一个新行并提供以下文本：


    ```

    SizeArr=<您选择的值>G

    ```

    例如，如果您希望对可用存储配置55/45的划分，基于[表 11-1](#9781430260103_Ch11.xhtml#Tab1) 中的信息，新行将如下所示：


    ```

    SizeArr=1487G

    ```

    编辑完成后，应该有两行列出了`SizeArr`，如下所示：


    ```

    # SizeArr=2208G

    SizeArr=1487G

    ```

    这是您需要对此参数文件进行的唯一更改，因此请保存您的工作并退出编辑器。您现在已准备好建立新的存储配置。


    ## Act 3


    与之前的操作一样，将使用`deploy11203.sh`脚本，尽管步骤数量更多。以下是此过程此部分可用的完整步骤列表：


    ```

    Step  0 = ValidateEnv

    Step  1 = CreateWorkDir

    Step  2 = UnzipFiles

    Step  3 = setupSSHroot

    Step  4 = UpdateEtcHosts

    Step  5 = CreateCellipinitora

    Step  6 = ValidateIB

    Step  7 = ValidateCell

    Step  8 = PingRdsCheck

    Step  9 = RunCalibrate

    Step 10 = CreateUsers

    Step 11 = SetupSSHusers

    Step 12 = CreateGridDisks

    Step 13 = GridSwInstall

    Step 14 = PatchGridHome

    Step 15 = RelinkRDSGI

    Step 16 = GridRootScripts

    Step 17 = DbSwInstall

    Step 18 = PatchDBHomes

    Step 19 = CreateASMDiskgroups

    Step 20 = DbcaDB

    Step 21 = DoUnlock

    Step 22 = RelinkRDSDb

    Step 23 = LockUpGI

    Step 24 = ApplySecurityFixes

    Step 25 = setupASR

    Step 26 = SetupCellEmailAlerts

    Step 27 = ResecureMachine

    ```

    与第一个列表不同，这里只显示了28个步骤。由于这是一个现有的 Exadata 安装，验证环境的第0步和保护机器的第27步将不会运行。剩下的26步将用于重新配置存储和存储单元。以下命令将用于完成此过程的存储重新配置部分：


    ```

    ./deploy11203.sh -r 1-26

    ```

    `-r`选项按顺序执行提供的步骤，只要没有步骤产生错误。如果某个步骤确实产生错误，它将停在该步骤；应采取任何纠正措施，然后使用修改后的步骤列表重新启动`deploy11203.sh`脚本。例如，如果执行因错误停在第21步，并且错误原因已纠正，以下命令将从生成错误的点重新启动重新配置：


    ```

    ./deploy11203.sh -r 21-26

    ```

    如果在执行中途出现问题，则无需从头开始整个过程。


    对于八分之一机架或四分之一机架 Exadata 配置，最后执行的`deploy11203.sh`脚本将运行一个半到两个小时。对于更大的 Exadata 配置，这将运行更长时间，因为磁盘数量更多。脚本将为每个执行的步骤提供反馈。


    在“干净”的系统上——即仍处于原始配置且没有任何新数据库的系统——我们在重新配置存储时没有遇到任何错误或困难。这是一个耗时的过程，但它应该可以毫无问题地执行。


    ![image](images/sq.jpg) **注意** 我们在新配置的 Exadata 系统上执行过此操作，并且运行没有困难。如果您计划在已创建其他数据库、存在其他`ORACLE_HOME`位置的系统上执行此操作，请注意此处提供的步骤可能会遇到与这些更改相关的问题。包含的数据库（通常名为`DBM`）将在重新配置过程中从脚本重新创建。请注意，恢复在初始配置完成后创建的数据库可能会因为重新分配的存储而导致错误，特别是如果`+DATA_MYEXA1`磁盘组已变小。在这种情况下，最好联系
    Oracle 高级客户支持。


    ### 步骤详解


    让我们看看每个步骤在基础层面上完成了什么。步骤1和2是基本的“内务处理”操作，创建临时工作目录并将软件档案解压缩到该临时工作区。步骤3开始了此操作的重要方面，它为“root”账户设置用户等效性（意味着无密码的`ssh`访问）到所有服务器和交换机。这是必需的，以便后续步骤无需询问密码即可继续。步骤4更新了`/etc/hosts`文件，其中包含
    Exadata 系统的预配置存储单元 IP 地址和服务器名称。这使得通过使用服务器名称而不是 IP 地址来连接系统中的其他服务器更加容易。


    下一步，步骤5，在可用的存储单元上创建`cellinit.ora`文件。`cellinit.ora`包含的内容示例（实际 IP 地址和端口号已遮蔽）如下。


    ```

    #CELL Initialization Parameters

    version=0.0

    HTTP_PORT=####

    bbuChargeThreshold=800

    SSL_PORT=#####

    RMI_PORT=#####

    ipaddress1=###.###.###.###/##

    bbuTempThreshold=60

    DEPLOYED=TRUE

    JMS_PORT=###

    BMC_SNMP_PORT=###

    ```

    此步骤还在可用的数据库服务器上创建`cellip.ora`文件。示例内容如下。


    ```

    cell="XXX.XXX.XXX.3"

    cell="XXX.XXX.XXX.4"

    cell="XXX.XXX.XXX.5"

    cell="XXX.XXX.XXX.6"

    cell="XXX.XXX.XXX.7"

    ```

    此文件告知 ASM 集群中可用的存储单元。'
  raw: 'These steps will take approximately an hour to run on an Eighth Rack or Quarter
    Rack configuration and will provide output to the screen describing pending and
    completed tasks. We recommend that you run each command and watch the output provided.
    There should not be any errors generated from these processes; however, we feel
    it’s best to be safe by watching the progress.


    What do these steps do? Step 6 removes the GRID Infrastructure, basically the
    heart and soul of ASM (and RAC, but it’s the link to ASM that we are concerned
    with in this operation). Once that infrastructure is gone, we are free to run
    Step 7 to drop the created grid disks and then the definitions for the partitions
    that ASM uses to recognize and access the storage. Last is the removal of the
    users and groups that access these partitions and grid disks. This is where the
    “oracle” user account gets dropped, along with its O/S home. Notice that only
    3 steps are necessary to drop the existing storage configuration but 26 steps
    are necessary to re-create it.


    Act 2


    Once these operations have finished, it will be time to modify the storage array
    parameter to provide the storage division you want. The configuration file to
    edit is `/opt/oracle.SupportTools/onecommand/onecommand.params`. We use `vi` for
    editing such files, but you may wish to use emacs instead. Use whichever editor
    you are comfortable with. The parameter value to change is named `SizeArr`. For
    a standard default install, this line should look like the following entry:


    ```

    SizeArr=2208G

    ```


    It is good to know what value to use to obtain the desired storage division. [Table
    11-1](#9781430260103_Ch11.xhtml#Tab1) shows several `SizeArr` values and the approximate
    storage divisions created.


    [Table 11-1](#9781430260103_Ch11.xhtml#_Tab1). Some SizeArr Values and the Resulting
    Storage Allocations


    | SizeArr Setting | Data Disk Group pct | Recovery Disk Group pct |

    | --- | --- | --- |

    | 2208 | 80 | 20 |

    | 1932 | 70 | 30 |

    | 1656 | 60 | 40 |

    | 1487 | 55 | 45 |

    | 1380 | 50 | 50 |


    Remember that these percentages are approximations based on the default 80/20
    storage allocation. We recommend that you use the standard shell script comment
    character, `#`, and comment that line, so you can preserve the original setting.
    You can now either copy the commented line or open a new line just below it and
    provide the following text:


    ```

    SizeArr=<your chosen value>G

    ```


    As an example, if you want to configure a 55/45 split on the available storage,
    the new line, based on the information in [Table 11-1](#9781430260103_Ch11.xhtml#Tab1),
    would be as follows:


    ```

    SizeArr=1487G

    ```


    Once your edits are complete, there should be two lines listing `SizeArr`, as
    follows:


    ```

    # SizeArr=2208G

    SizeArr=1487G

    ```


    This is the only change you will need to make to this parameter file, so save
    your work and exit the editor. You are now prepared to establish a new storage
    configuration.


    Act 3


    As in the previous operation, the `deploy11203.sh` script will be used, although
    with a greater number of steps. The following is the complete list of available
    steps for this part of the process:


    ```

    Step  0 = ValidateEnv

    Step  1 = CreateWorkDir

    Step  2 = UnzipFiles

    Step  3 = setupSSHroot

    Step  4 = UpdateEtcHosts

    Step  5 = CreateCellipinitora

    Step  6 = ValidateIB

    Step  7 = ValidateCell

    Step  8 = PingRdsCheck

    Step  9 = RunCalibrate

    Step 10 = CreateUsers

    Step 11 = SetupSSHusers

    Step 12 = CreateGridDisks

    Step 13 = GridSwInstall

    Step 14 = PatchGridHome

    Step 15 = RelinkRDSGI

    Step 16 = GridRootScripts

    Step 17 = DbSwInstall

    Step 18 = PatchDBHomes

    Step 19 = CreateASMDiskgroups

    Step 20 = DbcaDB

    Step 21 = DoUnlock

    Step 22 = RelinkRDSDb

    Step 23 = LockUpGI

    Step 24 = ApplySecurityFixes

    Step 25 = setupASR

    Step 26 = SetupCellEmailAlerts

    Step 27 = ResecureMachine

    ```


    Unlike the first list, there are only 28 steps shown. As this is an existing Exadata
    installation, step 0, which validates the environment, and Step 27, which secures
    the machine, will not be run. This leaves the remaining 26 steps to reconfigure
    the storage and the storage cells. The following command will be used to complete
    the storage reconfiguration portion of this process:


    ```

    ./deploy11203.sh -r 1-26

    ```


    The `-r` option executes the provided steps in order, as long as no step generates
    an error. If a step does generate an error, it stops at that step; any corrective
    action should be taken, and the `deploy11203.sh` script restarted with a modified
    list of steps. For example, if the execution stopped at step 21 due to errors,
    and the cause of the errors is corrected, the following command would restart
    the reconfiguration at the point it generated the error, as follows:


    ```

    ./deploy11203.sh -r 21-26

    ```


    There should be no need to start the entire process from the beginning, should
    a problem arise midway through the execution.


    For an Eighth Rack or Quarter Rack Exadata configuration, this last execution
    of the `deploy11203.sh` script will run for one and one-half to two hours. For
    larger Exadata configurations, this will run longer, as there will be a greater
    number of disks. Feedback will be provided by the script for each of the steps
    executed.


    On a “clean” system—one that is still at the original configuration and without
    any new databases—we have experienced no errors or difficulties when reconfiguring
    the storage. It is a time-consuming process, but it should execute without issues.


    ![image](images/sq.jpg) **Note**  We have executed this on a newly configured
    Exadata system, and it ran without difficulties. If you are planning on doing
    this on a system where other databases have been created, where other ORACLE_HOME
    locations exist, be advised that the steps provided here may experience problems
    related to these changes. The included database, commonly named DBM, will be re-created
    from scripts during the reconfiguration process. Be aware that restoring databases
    that were created after initial configuration was completed may cause errors due
    to the reallocated storage, especially if the +DATA_MYEXA1 disk group has been
    made smaller. In this situation, it is best to involve Oracle Advanced Customer
    Support.


    Let’s look at what each step accomplishes, at a basic level. Steps 1 and 2 are
    basic “housekeeping” actions, creating a temporary work directory and unzipping
    the software archives into that temporary work area. Step 3 starts the important
    aspects of this operation, which sets user equivalence (meaning passwordless `ssh`
    access) to all servers and switches for the “root” account. This is required,
    so that the remaining steps proceed without having to ask for a password. Step
    4 updates the `/etc/hosts` file for the preconfigured storage cell IP addresses
    and server names for the Exadata system. This makes it easier to connect to other
    servers in the system, by using the server name rather than the IP address.


    The next step, Step 5, creates the `cellinit.ora` file on the available storage
    cells. A sample of what the `cellinit.ora` contains (with actual IP addresses
    and port numbers obscured) follows.


    ```

    #CELL Initialization Parameters

    version=0.0

    HTTP_PORT=####

    bbuChargeThreshold=800

    SSL_PORT=#####

    RMI_PORT=#####

    ipaddress1=###.###.###.###/##

    bbuTempThreshold=60

    DEPLOYED=TRUE

    JMS_PORT=###

    BMC_SNMP_PORT=###

    ```


    This step also creates the `cellip.ora` file on the available database servers.
    Sample contents follow.


    ```

    cell="XXX.XXX.XXX.3"

    cell="XXX.XXX.XXX.4"

    cell="XXX.XXX.XXX.5"

    cell="XXX.XXX.XXX.6"

    cell="XXX.XXX.XXX.7"

    ```


    This file informs ASM of the available storage cells in the cluster.'
