- fmt: "## 等待事件：数据块格式化与Exadata存储单元操作\n\n当创建或扩展数据文件时，必须格式化数据块。在非Exadata系统上，此任务由数据库服务器执行，`data\
    \ file init write`事件会记录此操作发生时的时间。Exadata的处理方式不同，它让存储单元执行此任务，因此，`cell smart file\
    \ creation`等待事件记录了格式化数据块时所花费的时间。请注意，文件不必添加到表空间中才会发生此等待；该事件实际记录的是数据块格式化操作的时间。\n\
    \n将此等待事件归类在用户I/O类别中可能显得奇怪，但很多时候，数据块格式化是由DML操作触发的，例如自动扩展数据文件或删除数据。其他可以触发此事件的操作包括更新、非唯一索引创建、直接路径加载以及使用`/*+\
    \ append */`提示的插入。\n\n更新和删除操作如何触发`cell smart file creation`等待事件？如前所述，该等待事件实际记录的是数据块格式化操作的时间，当数据块不再包含数据时，删除操作可能导致这些数据块被重新格式化以供重用。更新操作也可能触发此事件，因为如果发生行链接或行迁移，更新可能会触发数据文件扩展或使用新的数据块。\n\
    \n当此事件被触发时，只返回一个参数，即单元哈希值（`cellhash#`）；所有其他可能传递的参数都未被使用。\n\n## 等待事件：Cell Statistics\
    \ Gather\n\n我们认为这个等待事件被错误地归类为用户I/O，因为它不记录磁盘I/O操作的时间；相反，它记录的是从`V$CELL_THREAD_HISTORY`、`V$CELL_REQUEST_TOTALS`以及其他引用单元活动的X$表和V$视图，以及针对`AUD$`表的递归查询中读取数据所花费的时间。\n\
    \n生成10046跟踪文件并使用`grep`查找此事件会产生以下简化的输出：\n\n```\nWAIT #47971177959976: nam='cell\
