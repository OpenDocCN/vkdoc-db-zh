  trans: '# 第 10 章：监控 Exadata


    ![image](img/frontdot.jpg)


    ## 引言


    Exadata 是一个由相互关联的组件组成的复杂系统；有效监控它们既是一门艺术，也是一门科学。在本书中，我们已经讨论了 Exadata 各个领域的监控选项。在本章中，我们将进一步探讨此主题，并提供跨数据库节点和存储单元监控
    Exadata 的方法。我们将了解如何使用 `V$SQL` 和 `V$SQLSTATS` 来监控 SQL 语句性能，并提供关于智能扫描活动的信息。我们还将再次审视存储单元，比较命令行接口和
    Oracle 企业管理器（OEM）的监控功能。我们并非承诺让你成为爱因斯坦和伦勃朗的结合体，但我们将帮助你理解可用的工具和技术，以便你能智能地监控你的系统。


    ## 存储单元监控实用程序


    存在两种用于监控和管理存储单元的实用程序：`cellcli` 和 `cellsrvstat`。`cellcli` 实用程序可供 `cellmonitor`
    和 `celladmin` 用户使用，其中 `cellmonitor` 拥有一组受限的可用指令。`cellmonitor` 帐户旨在用于常规监控，使用 `LIST`
    命令集，该命令集输出存储单元各个区域的统计数据和度量指标。`celladmin` 帐户旨在允许 DBA 处理由 `cellmonitor` 输出报告的问题。


    `cellcli` 和 `cellsrvstat` 命令都可以在命令行上传递，并且 `cellsrvstat` 命令可以通过提供以秒为单位的间隔和要运行的给定命令的执行计数，在某种程度上实现自动化。你还可以通过使用
    `-stat_group` 参数指定要监控的一个或多个组来限制 `cellsrvstat` 的输出。可用的组有 `smartio`、`io`、`mem`、`exec`
    和 `net`。


    从数据库服务器监控存储单元可以通过使用无密码登录到存储单元和脚本来自动化，使用 `ssh` 连接到每个存储单元，并将 `cellcli` 或 `cellsrvstat`
    命令传递给你连接到的单元。通过编写所谓的“包装器”脚本来重定向输出，输出也可以被重定向到数据库服务器上的日志文件。当输出指示可能的问


    题区域时，这可以建立一个用于比较的性能基线。


    ## 数据库层


    这是用户将访问的层，因此我们认为这是讨论监控的合理起点。我们已经在第 7 章中讨论了等待接口，在第 8 章中讨论了性能。现在是时候将它们结合起来并制定监控策略了。


    Exadata 的一大卖点是智能扫描，了解哪些查询有资格、哪些没有资格进行智能扫描非常重要。我们在第 2 章中介绍了这些内容，同时介绍了一些监控步骤，以查看是否执行了智能扫描。我们将在下一节中使用
    `V$SQL` 和 `V$SQLSTATS` 视图重新审视该主题。


    ### 我们到了吗？（进度如何？）


    Exadata 提供了丰富的度量、计数器和统计信息，旨在报告系统在给定任务中的行为。仅仅因为这些度量存在，并不意味着你应该报告 Exadata 记录的所有内容。监控
    Exadata 需要有目的和方向。没有目的和方向，你很可能会被引向错误的道路，去解决错误的“问题”。请记住，监控应旨在建立初始基线，以便为比较提供坚实的基础。随后的监控数据应相对于该基线提供一个窗口，显示性能随时间和数据变化的情况。如果可以避免，你不会想追逐一个移动的目标。没有明确的起点只会使故障排除和问题解决更加困难。


    要设计和实施有效的监控策略，你需要从 DBA 的常规角色中抽身出来，从用户的角度审视系统。是的，你可以深入研究各种度量、统计信息、等待事件和计时器，但最终用户其实并不关心这些。他们主要关心的是他们的流程或查询需要多长时间完成。如果一个流程花费的时间比用户认为应该的时间长，系统就是慢的，需要调优。是的，很可能正是他们的查询需要注意，但对用户来说，是数据库导致了问题，而数据库是你的专业领域。用户不想知道是
    `ORDERS` 表第 32 行第 58 位出了问题。他们只希望看到问题得到纠正，响应时间缩短。了解这一点就为你的监控过程提供了方向和目的，这是有效监控系统所需的两个要素。


    当然，不仅仅是用户声称的性能不满意在起作用；还涉及什么是可接受和不可接受的性能。仅仅因为监控脚本或工具报告了“过高的 CPU 使用率”并不意味着性能不可接受。你必须考虑到当时有多少会话处于活动状态以及这些会话正在做什么。许多工具为此类警报/报告设置了默认阈值，而这些阈值可能不适合你的系统，因此请检查这些阈值，并根据你的硬件、软件和用户负载将其设置为合理的值。在监控方面，并非放之四海而皆准。


    ### 实时 SQL 监控报告


    迄今为止，监控 SQL 性能最简单的方法是通过安装了诊断和调优包的 Oracle 企业管理器 12c（OEM 12c）。Oracle 会自动监控并行运行的
    SQL 语句以及累计 I/O 和 CPU 时间达到或超过五秒的序列化语句。也可以使用 `/*+ MONITOR */` 提示来监控 SQL 语句。查看 图
    10-1 中 OEM 12c 性能窗口的截图，你可以看到所呈现的信息级别。


    ![9781430260103_Fig10-01.jpg](img/9781430260103_Fig10-01.jpg)


    **图 10-1.** OEM 12c SQL 监控面板


    呈现的详细信息包括持续时间、SQL ID、运行该语句的会话 ID、并行执行的并行度，以及数据库时间的条形图，该条形图按记录时间的三个类别 `CPU`、`用户
    I/O` 和 `其他` 进行分解。绿色报告 `CPU` 时间占总时间的百分比，蓝色报告 `用户 I/O` 占总时间的百分比，橙色报告记录为 `其他` 的时间（同样占总时间的百分比）。只需单击该
    SQL ID，即可从报告中“深入查看”特定 SQL ID 的详细信息，如 图 10-2 所示。


    ![9781430260103_Fig10-02.jpg](img/9781430260103_Fig10-02.jpg)


    **图 10-2.** OEM 12c 中的 SQL ID 时间与等待窗口'
- fmt: "## 引言：执行计划的增强信息与统计\n\n除了增强的执行计划（提供时间线以及常规信息）外，计划上方还有两个部分，分别提供时间和等待统计信息，以及\
    \ I/O 统计信息。这对于在单条语句级别诊断和排除性能问题非常有帮助。它不仅显示了“墙上时钟”时间（以 `Duration` 条显示），还将时间分解为各个组成部分，因此你可以看到执行语句时时间都花在了哪里。请注意，数据库时间、PL/SQL\
    \ 和 Java 时间，以及等待活动，都在“时间和等待统计”窗口中报告。从显示的 `Database Time` 条来看，时间被分解为四个等待类别：用户 I/O（蓝色）、CPU（绿色）、集群（白色）和应用程序（红色）。将光标悬停在这些区域上，会报告所代表的类别及其占数据库总时间的百分比。这种分解对于确定时间花费在何处以及可能实施哪些改进非常有帮助。同样地，将光标悬停在\
    \ I/O 统计信息窗口中的条上，会报告相应的数据。[图 10-3](#9781430260103_Ch10.xhtml#Fig3) 展示了“时间和等待统计”的示例。\n\
    \n![9781430260103_Fig10-03.jpg](images/9781430260103_Fig10-03.jpg)\n\n[图 10-3](#9781430260103_Ch10.xhtml#_Fig3).\
    \ 时间与等待统计分解\n\n[图 10-4](#9781430260103_Ch10.xhtml#Fig4) 展示了 I/O 窗口的类似行为。\n\n![9781430260103_Fig10-04.jpg](images/9781430260103_Fig10-04.jpg)\n\
    \n[图 10-4](#9781430260103_Ch10.xhtml#_Fig4). I/O 统计分解\n\n通过执行计划上方的选项卡，你可以将并行等待统计信息（对于使用并行执行的语句）视为条形图，将其他各种指标视为折线图，后者如\
    \ [图 10-5](#9781430260103_Ch10.xhtml#Fig5) 所示。\n\n![9781430260103_Fig10-05.jpg](images/9781430260103_Fig10-05.jpg)\n\
    \n[图 10-5](#9781430260103_Ch10.xhtml#_Fig5). OEM 12c 中的 SQL ID 指标图\n\n我们使用 `Duration`\
    \ 列来引导我们找到可能有问题的语句，这些语句可以被隔离并调查以确认它们是否真的存在问题。如果一个语句在过去一小时内的 `Duration` 为 993 秒，但执行了\
    \ 1233 次，那么每次执行的时间不到 1 秒，这是可以接受的性能。另一方面，如果一个语句在过去一小时内的 `Duration` 为 79 秒，但只执行了\
    \ 1 次，那么这个 `SQL ID` 就值得进一步调查。`Duration` 列报告的值很大，这一事实本身意义不大。你必须进一步调查，以准确判断它是否是个问题。\n\
    \n图形界面很好用，也相当容易上手，但它们并非监控 Exadata 所绝对必需的。如果你无法访问 OEM 12c（无论是未安装还是停止工作），也并非无计可施。你可以从\
    \ `SQL*Plus` 生成实时 SQL 监控报告。\n\n### 使用 GV$SQL 和 GV$SQLSTATS（不仅如此）\n\n通过 `SQL*Plus`\
    \ 生成实时监控报告并不像看起来那么困难，因为 Oracle 提供了多个视图，包括 `GV$SQL` 和 `GV$SQLSTATS`，以及一个包函数 (`DBMS_SQLTUNE.REPORT_SQL_MONITOR`)\
    \ 来提供这些信息。\n\n在深入探讨 `GV$SQL` 和 `GV$SQLSTATS` 之前，我们将先看看 `GV$SQL_MONITOR`，它为集群中所有可用实例提供会话级执行监控数据。鉴于\
    \ Exadata 是一个 RAC 环境，来自应用程序的多个连接可能会“循环”连接到可用节点。因此，同一个 `SQL ID` 可能同时存在于两个或更多节点上。在\
    \ `SQL ID` 级别监控执行时，确保你始终在查看你开始监控的同一个会话非常重要。这时会话 `SID`、实例 ID 和状态就很有用了。会话 `SID`\
    \ 和实例 ID 允许你隔离节点上的某个会话进行进一步监控。如果目标是检查当前正在运行的语句，请确保报告的 `STATUS` 为 `EXECUTING`，这样随时间进行的监控将提供你可能需要用于故障排除的信息。另一个值得注意的视图是\
    \ `GV$SQL_PLAN_MONITOR`。该视图使用计划级监控数据进行实时更新。\n\n查看一些使用 `GV$SQL_MONITOR`、`GV$SQL_PLAN_MONITOR`、`GV$SQL`\
    \ 和 `GV$SQLSTATS` 的示例，应该有助于你理解这些视图的强大功能以及它们能提供的信息。我们从 `GV$SQL_MONITOR` 开始，搜索一个特定的\
    \ `SQL_ID`，如下所示：\n\n```sql\nSQL> select inst_id inst, sid, sql_plan_hash_value\
    \ plan_hash, elapsed_time elapsed, cpu_time cpu_tm, fetches fetch, io_interconnect_bytes\
    \ io_icon_byt, physical_read_bytes + physical_write_bytes tl_byt_proc, ((physical_read_bytes+physical_write_bytes)/io_interconnect_bytes)*100\
    \ offld_pct, status\n  2  from gv$sql_monitor\n  3  where status <> 'DONE'\n \
    \ 4  and sql_id = 'b1x37zg5a1ygr'\n  5  and io_interconnect_bytes > 0\n  6  /\n\
    ```"
  raw: 'In addition to the enhanced execution plan (providing a time line, as well
    as the usual information), there are two sections above the plan providing time
    and wait statistics, along with I/O statistics. These are extremely helpful when
    diagnosing and troubleshooting performance issues on a per-statement basis. Not
    only is the “wall clock” time displayed (as the Duration bar), the time is broken
    down into its component pieces, so you can see where time was spent while executing
    the statement. Notice that Database Time, PL/SQL, and Java time, along with Wait
    Activity, are reported in the Time & Wait Statistics window. From the Database
    Time bar shown, the time is broken down into four wait categories: User I/O (blue),
    CPU (green), Cluster (white), and Application (red). Hovering the cursor over
    each of these areas reports what category is represented and the percentage of
    the total database time it represents. Such a breakdown is very helpful in determining
    where time is spent and, possibly, where improvements can be implemented. Likewise,
    hovering the cursor over the bars found in the I/O Statistics window reports the
    corresponding figures. [Figure 10-3](#9781430260103_Ch10.xhtml#Fig3) illustrates
    this for the Time & Wait Statistics.


    ![9781430260103_Fig10-03.jpg](images/9781430260103_Fig10-03.jpg)


    [Figure 10-3](#9781430260103_Ch10.xhtml#_Fig3). Time & Wait Statistics breakdown


    [Figure 10-4](#9781430260103_Ch10.xhtml#Fig4) shows this behavior for the I/O
    window.


    ![9781430260103_Fig10-04.jpg](images/9781430260103_Fig10-04.jpg)


    [Figure 10-4](#9781430260103_Ch10.xhtml#_Fig4). I/O Statistics breakdown


    Through the tabs above the execution plan, you can see parallel wait statistics
    (for statements using parallel execution) as bar graphs and various other metrics
    as line graphs, the latter shown in [Figure 10-5](#9781430260103_Ch10.xhtml#Fig5).


    ![9781430260103_Fig10-05.jpg](images/9781430260103_Fig10-05.jpg)


    [Figure 10-5](#9781430260103_Ch10.xhtml#_Fig5). SQL ID metric graphs from OEM
    12c


    We use the `Duration` column to direct us to possible problem statements, which
    can be isolated and investigated to see if they are, indeed, a problem. If a statement
    has a duration of 993 seconds in the last hour, but had 1233 executions, the per-execution
    time is less than 1 second, which is not unacceptable performance. If, on the
    other hand, a statement has a duration of 79 seconds during the last hour, and
    only 1 execution, this SQL ID warrants further investigation. That the value reported
    in the `Duration` column is large bears little weight by itself. You must investigate
    further, in order to accurately determine if it is a problem.


    Graphics are nice to have and fairly easy to use, but they aren’t absolutely necessary
    to monitor Exadata. If you don’t have access to OEM 12c, either because it isn’t
    installed or it has stopped working, all is not lost. You can generate real-time
    SQL monitoring reports from `SQL*Plus`.


    Using GV$SQL and GV$SQLSTATS (But That’s Not All)


    Generating real-time monitoring reports through `SQL*Plus` is not as difficult
    as it may seem, as Oracle provides several views, including `GV$SQL` and `GV$SQLSTATS`,
    and a packaged function (`DBMS_SQLTUNE.REPORT_SQL_MONITOR`), to provide this information.


    Before we get to `GV$SQL` and `GV$SQLSTATS`, we will look at `GV$SQL_MONITOR`,
    which provides session-level execution monitoring data for all available instances
    in the cluster. Given that Exadata is a RAC environment, it’s possible that multiple
    connections from an application may connect “round-robin” between the available
    nodes. Thus, the same SQL ID may exist on two or more nodes at the same time.
    It is important when monitoring execution at the SQL ID level to ensure you are
    always looking at the same session you started monitoring. This is where the session
    SID, the instance id, and the status are helpful. The session SID and the instance
    id allow you to isolate a session on a node for further monitoring. If the goal
    is to examine a currently running statement, ensure that the `STATUS` is reported
    as `EXECUTING`, so that monitoring over time will provide information you may
    need to troubleshoot a problem. Another view worth noting is `GV$SQL_PLAN_MONITOR`.
    This view is updated with plan-level monitoring data, updated in real time.


    Looking at some examples using `GV$SQL_MONITOR`, `GV$SQL_PLAN_MONITOR`, `GV$SQL`,
    and `GV$SQLSTATS` should help you understand the power of these views and the
    information they can provide. We begin with `GV$SQL_MONITOR` and search for a
    specific SQL_ID, as follows:


    ```

    SQL> select inst_id inst, sid, sql_plan_hash_value plan_hash, elapsed_time elapsed,
    cpu_time cpu_tm, fetches fetch, io_interconnect_bytes io_icon_byt, physical_read_bytes
    + physical_write_bytes tl_byt_proc, ((physical_read_bytes+physical_write_bytes)/io_interconnect_bytes)*100
    offld_pct, status

      2  from gv$sql_monitor

      3  where status <> ''DONE''

      4  and sql_id = ''b1x37zg5a1ygr''

      5  and io_interconnect_bytes > 0

      6  /'
  trans: "\n## 引言：执行计划的增强信息与统计\n\n除了增强的执行计划（提供时间线以及常规信息）外，计划上方还有两个部分，分别提供时间和等待统计信息，以及\
    \ I/O 统计信息。这对于在单条语句级别诊断和排除性能问题非常有帮助。它不仅显示了“墙上时钟”时间（以 `Duration` 条显示），还将时间分解为各个组成部分，因此你可以看到执行语句时时间都花在了哪里。请注意，数据库时间、PL/SQL\
    \ 和 Java 时间，以及等待活动，都在“时间和等待统计”窗口中报告。从显示的 `Database Time` 条来看，时间被分解为四个等待类别：用户 I/O（蓝色）、CPU（绿色）、集群（白色）和应用程序（红色）。将光标悬停在这些区域上，会报告所代表的类别及其占数据库总时间的百分比。这种分解对于确定时间花费在何处以及可能实施哪些改进非常有帮助。同样地，将光标悬停在\
    \ I/O 统计信息窗口中的条上，会报告相应的数据。图 10-3 展示了“时间和等待统计”的示例。\n\n![9781430260103_Fig10-03.jpg](img/9781430260103_Fig10-03.jpg)\n\
    \n图 10-3. 时间与等待统计分解\n\n图 10-4 展示了 I/O 窗口的类似行为。\n\n![9781430260103_Fig10-04.jpg](img/9781430260103_Fig10-04.jpg)\n\
    \n图 10-4. I/O 统计分解\n\n通过执行计划上方的选项卡，你可以将并行等待统计信息（对于使用并行执行的语句）视为条形图，将其他各种指标视为折线图，后者如\
    \ 图 10-5 所示。\n\n![9781430260103_Fig10-05.jpg](img/9781430260103_Fig10-05.jpg)\n\
    \n图 10-5. OEM 12c 中的 SQL ID 指标图\n\n我们使用 `Duration` 列来引导我们找到可能有问题的语句，这些语句可以被隔离并调查以确认它们是否真的存在问题。如果一个语句在过去一小时内的\
    \ `Duration` 为 993 秒，但执行了 1233 次，那么每次执行的时间不到 1 秒，这是可以接受的性能。另一方面，如果一个语句在过去一小时内的\
    \ `Duration` 为 79 秒，但只执行了 1 次，那么这个 `SQL ID` 就值得进一步调查。`Duration` 列报告的值很大，这一事实本身意义不大。你必须进一步调查，以准确判断它是否是个问题。\n\
    \n图形界面很好用，也相当容易上手，但它们并非监控 Exadata 所绝对必需的。如果你无法访问 OEM 12c（无论是未安装还是停止工作），也并非无计可施。你可以从\
    \ `SQL*Plus` 生成实时 SQL 监控报告。\n\n### 使用 GV$SQL 和 GV$SQLSTATS（不仅如此）\n\n通过 `SQL*Plus`\
    \ 生成实时监控报告并不像看起来那么困难，因为 Oracle 提供了多个视图，包括 `GV$SQL` 和 `GV$SQLSTATS`，以及一个包函数 (`DBMS_SQLTUNE.REPORT_SQL_MONITOR`)\
    \ 来提供这些信息。\n\n在深入探讨 `GV$SQL` 和 `GV$SQLSTATS` 之前，我们将先看看 `GV$SQL_MONITOR`，它为集群中所有可用实例提供会话级执行监控数据。鉴于\
    \ Exadata 是一个 RAC 环境，来自应用程序的多个连接可能会“循环”连接到可用节点。因此，同一个 `SQL ID` 可能同时存在于两个或更多节点上。在\
    \ `SQL ID` 级别监控执行时，确保你始终在查看你开始监控的同一个会话非常重要。这时会话 `SID`、实例 ID 和状态就很有用了。会话 `SID`\
    \ 和实例 ID 允许你隔离节点上的某个会话进行进一步监控。如果目标是检查当前正在运行的语句，请确保报告的 `STATUS` 为 `EXECUTING`，这样随时间进行的监控将提供你可能需要用于故障排除的信息。另一个值得注意的视图是\
    \ `GV$SQL_PLAN_MONITOR`。该视图使用计划级监控数据进行实时更新。\n\n查看一些使用 `GV$SQL_MONITOR`、`GV$SQL_PLAN_MONITOR`、`GV$SQL`\
    \ 和 `GV$SQLSTATS` 的示例，应该有助于你理解这些视图的强大功能以及它们能提供的信息。我们从 `GV$SQL_MONITOR` 开始，搜索一个特定的\
    \ `SQL_ID`，如下所示：\n\n```sql\nSQL> select inst_id inst, sid, sql_plan_hash_value\
    \ plan_hash, elapsed_time elapsed, cpu_time cpu_tm, fetches fetch, io_interconnect_bytes\
    \ io_icon_byt, physical_read_bytes + physical_write_bytes tl_byt_proc, ((physical_read_bytes+physical_write_bytes)/io_interconnect_bytes)*100\
    \ offld_pct, status\n  2  from gv$sql_monitor\n  3  where status <> 'DONE'\n \
    \ 4  and sql_id = 'b1x37zg5a1ygr'\n  5  and io_interconnect_bytes > 0\n  6  /\n\
    ```\n"
- fmt: "## 查询性能监控\n\n### 执行统计信息\n以下是包含 25 行的查询执行统计信息，所有行的 `OFFLD_PCT` 均为 100%。\n\n\
    ```\nINST   SID  PLAN_HASH ELAPSED   CPU_TM FETCH IO_ICON_BYT TL_BYT_PRC OFFLD_PCT\
    \ STATUS\n---- ----- ---------- ------- -------- ----- ----------- ----------\
    \ --------- ---------------\n   1     2 1747818060  329685    76988     0    \
    \ 8183808    8183808       100 DONE (ALL ROWS)\n   1  2222 1747818060  283095   100984    \
    \ 0     9199616    9199616       100 DONE (ALL ROWS)\n   1  1062 1747818060  240687    86987    \
    \ 0     9502720    9502720       100 DONE (ALL ROWS)\n   1  1810 1747818060  246776    85987    \
    \ 0     6201344    6201344       100 DONE (ALL ROWS)\n   1   201 1747818060  258911    46992    \
    \ 0     5505024    5505024       100 DONE (ALL ROWS)\n   1  1343 1747818060  232887    68989    \
    \ 0     7061504    7061504       100 DONE (ALL ROWS)\n   1   777 1747818060  280657    63990    \
    \ 0     6152192    6152192       100 DONE (ALL ROWS)\n   1  2094 1747818060  332745    54992    \
    \ 0     6520832    6520832       100 DONE (ALL ROWS)\n   1   966 1747818060  245549    79987    \
    \ 0     8028160    8028160       100 DONE (ALL ROWS)\n   1  1631 1747818060  273636    74988    \
    \ 0     9216000    9216000       100 DONE (ALL ROWS)\n   1  1530 1747818060  330327    89986    \
    \ 0     7454720    7454720       100 DONE (ALL ROWS)\n   1  1245 1747818060  239035    95985    \
    \ 0     8773632    8773632       100 DONE (ALL ROWS)\n   1   863 1747818060  288678    51992    \
    \ 0     6995968    6995968       100 DONE (ALL ROWS)\n   1  2004 1747818060  270000    41993    \
    \ 0     5562368    5562368       100 DONE (ALL ROWS)\n   1  1911 1747818060  258966    51992    \
    \ 0     6823936    6823936       100 DONE (ALL ROWS)\n   1   393 1747818060  323315    37993    \
    \ 0     4874240    4874240       100 DONE (ALL ROWS)\n   1  1724 1747818060  249028    72989    \
    \ 0     7421952    7421952       100 DONE (ALL ROWS)\n   1  1241 1747818060  \
    \ 36000    15998     1       40960      40960       100 DONE (ALL ROWS)\n   1  \
    \ 290 1747818060  234694    73989     0     6356992    6356992       100 DONE\
    \ (ALL ROWS)\n   1   387 1747818060  264108    75988     0     8454144    8454144      \
    \ 100 DONE (ALL ROWS)\n   1  1431 1747818060  246059    75989     0     8011776    8011776      \
    \ 100 DONE (ALL ROWS)\n   1   482 1747818060  279164    51991     0     6692864    6692864      \
    \ 100 DONE (ALL ROWS)\n   1   493 1747818060  272336    69990     0     8347648    8347648      \
    \ 100 DONE (ALL ROWS)\n   1  1156 1747818060  274823    97985     0    11042816  \
    \ 11042816       100 DONE (ALL ROWS)\n   1   110 1747818060  261317    61991    \
    \ 0     7708672    7708672       100 DONE (ALL ROWS)\n\n25 rows selected.\nSQL>\n\
    ```\n\n### 卸载效率分析\n有 25 个会话正在运行相同的语句，每个会话都有不同的监控信息。对于 Exadata，关键信息之一是 `IO_INTERCONNECT_BYTES`，它间接报告了卸载效率。如果\
    \ `PHYSICAL_READ_BYTES` 和 `PHYSICAL_WRITE_BYTES` 的总和等于 `IO_INTERCONNECT_BYTES`\
    \ 中的值，则表明该查询或语句完全得益于卸载，效率为 100%。正如我们之前指出的，比率和效率是相对数字。但这个比率确实能让你大致了解有多少数据是由卸载处理的，从而节省了数据库层的处理时间。请注意，结果中的每一行\
    \ `offload_pct` 都是 100。你不会总是看到 100% 的卸载效率，因为多部分查询可能包含会卸载和不会卸载的部分，如下列输出所示。\n\n\
    ```\nINST   SID  PLAN_HASH ELAPSED   CPU_TM FETCH IO_ICON_BYT TL_BYT_PRC OFFLD_PCT\
    \ STATUS\n---- ----- ---------- ------- -------- ----- ----------- ----------\
    \ --------- ---------------\n   2   476 3140350437 7065006  2202665   142    85155840  \
    \ 83320832 97.845118 DONE (ALL ROWS)\n   1   869  484955222 6136552  5940097  \
    \ 127      147456     106496 72.222222 DONE (ALL ROWS)\n```\n\n来自这两个会话的语句的大部分输出都卸载了，但仍有一部分没有卸载，可能是因为它需要在数据库层进行传统的一致性读处理。也有可能得到高于\
    \ 100% 的百分比。\n\n```\nINST   SID SQL_ID         PLAN_HASH  ELAPSED   CPU_TM FETCH\
    \ IO_ICON_BYT TL_BYT_PRC OFFLD_PCT STATUS\n---- ----- -------------  ---------\
    \ -------- -------- ----- ----------- ---------- --------- ------\n   2  1619\
    \ 192t67rtdqrf8 4217233900 23380518   795879     2    61626560  127926272 207.58302\
    \ DONE (FIRST N ROWS)\n   2  1333 6m6y2y82sjpjx  627564094  4416403  1176820    \
    \ 1    57162056   77930496 136.33256 DONE (ALL ROWS)\n   2  1619 192t67rtdqrf8\
    \ 4217233900 13716144   853870     2    63322304  129622016 204.70199 DONE (FIRST\
    \ N ROWS)\n```\n\n### ORDER BY 与索引访问的影响\n`ORDER BY` 子句可能导致这种行为，因为它最多可以使查询处理的读取字节数翻倍。\n\
    \n![image](images/Table10-1.jpg)\n\n索引访问也可能导致 `PHYSICAL_READ_BYTES` 的值高于 `IO_INTERCONNECT_BYTES`。`SQL_ID\
    \ 6m6y2y82sjpjx` 就是这种情况，执行计划显示了这一点。\n\n![image](images/Table10-2.jpg)\n\n由于索引访问路径不符合智能扫描的条件，它们增加了\
    \ `PHYSICAL_READ_BYTES`，但没有为 `IO_INTERCONNECT_BYTES` 增加相同的量。\n\n### 使用 DBMS_SQLTUNE.REPORT_SQL_MONITOR\n\
    在 Oracle 11.2 中，另一种生成监控数据的方法是使用 `DBMS_SQLTUNE.REPORT_SQL_MONITOR` 函数。\n\n```\n\
    select dbms_sqltune.report_sql_monitor(session_id=>&sessid, report_level=>'ALL',type=>'HTML')\
    \ from dual;\n```\n\n`TYPE` 参数可以是 `TEXT` 或 `HTML`。我们通常生成 `HTML` 报告，因为它们在 Web 浏览器中更易于导航和阅读，并且保留了可以通过右键单击数据项访问的上下文（钻取）信息。其中一份\
    \ `HTML` 报告的示例输出如图 [10-6a](#9781430260103_Ch10.xhtml#Fig6a)、[10-6b](#9781430260103_Ch10.xhtml#Fig6b)\
    \ 和 [10-6c](#9781430260103_Ch10.xhtml#Fig6c) 所示。\n\n![9781430260103_Fig10-06a.jpg](images/9781430260103_Fig10-06a.jpg)\n\
    [Figure 10-6a](#9781430260103_Ch10.xhtml#_Fig6a). 来自 DBMS_SQLTUNE.REPORT_SQL_MONITOR\
    \ 的全局信息输出\n\n![9781430260103_Fig10-06b.jpg](images/9781430260103_Fig10-06b.jpg)\n\
    [Figure 10-6b](#9781430260103_Ch10.xhtml#_Fig6b). HTML 报告中的并行执行信息\n\n![9781430260103_Fig10-06c.jpg](images/9781430260103_Fig10-06c.jpg)\n\
    [Figure 10-6c](#9781430260103_Ch10.xhtml#_Fig6c). HTML 报告中的 SQL 计划窗口\n\n相同 SID\
    \ 的文本报告提供相同的信息。\n\n```\nSQL Monitoring Report\n\nSQL Text\n\nselect policy_name,\
    \ TO_CHAR(CAST(SYSDATE AS TIMESTAMP) , 'YYYY-MM-DD HH24:MI:SS'\n) timestamp, sum(cnt)\
    \ policy_changes_count from ( select (CASE WHEN (INSTR(lower\n(obj_name),'realm')!=0)\
    \ THEN 'Realms' WHEN (INSTR(lower(obj_name),'command')!=0)\n THEN 'Command Rules'\
    \ WHEN (INSTR(lower(obj_name),'role') !=0 ) THEN 'Secure App\nlication Roles'\
    \ WHEN (INSTR(lower(obj_name),'rule') !=0 ) THEN 'Rules' ELSE 'Fac\ntors' END)\
    \ policy_name,cnt from ( select obj_name,COUNT(*) cnt from DBA_AUDIT_TR\nAIL where\n\
    UPPER(owner) in ('DVSYS','DVF') and TIMESTAMP >= TO_DATE('2013-07-22 16:40:12','\n\
    YYYY-MM-DD HH24:MI:SS') and ( UPPER(action_name) LIKE 'INSERT%' OR UPPER(action_\n\
    name) LIKE 'UPDATE%' OR UPPER(action_name) LIKE 'DELETE%' OR UPPER(action_name)\n\
    LIKE 'MERGE%' OR UPPER(action_name) LIKE 'PURGE%' OR UPPER(action_name) LIKE 'TR\n\
    UNCATE%' OR UPPER(action_name) LIKE 'SESSION REC%') group by obj_name ) ) group\n\
    by policy_name order by policy_changes_count desc\n\nGlobal Information\n```"
