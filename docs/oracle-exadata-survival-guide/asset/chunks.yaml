    System I/O Events


    There are five cell-specific events in this wait class, and three of these events
    rarely accumulate any appreciable time. The two backup events do accrue time during
    backup and recovery operations and are interesting not only for what operations
    have time recorded against them but also for the operations that you think would
    accrue time but do not. We list the non-backup events in [Table 7-2](#9781430260103_Ch07.xhtml#Tab2).


    [Table 7-2](#9781430260103_Ch07.xhtml#_Tab2). Cell Startup and Shutdown Wait Events


    | Event | Description |

    | --- | --- |

    | Cell manager closing cell | This event is a cell shutdown event, collecting
    time against cell shutdownoperations. The only parameter passedback is the cell
    hash (cellhash#). |

    | Cell manager opening cell | This is a cell startup event. The only parameter
    passed back is, again, the cell hash (cellhash#). |

    | Cell manager discovering disks | This is another cell startup event, passing
    back the cell hash (cellhash#). Like the other two events, no other parameters
    are provided. |


    Cell Smart Incremental Backup


    Exadata has optimized RMAN (Recovery Manager) incremental backups by allowing
    offloading to the storage tier. As such, this event accrues wait time for Incremental
    Level 1 backups, where the processing has been offloaded to the storage tier.
    With Exadata, changes are tracked at the block level, allowing for faster backups
    of blocks changed since the last Incremental Level 0 backup. The storage tier
    is especially suited for this type of processing, thus the need for this new wait
    event.


    Not every incremental backup triggers this wait event. Incremental Level 0 backups
    do not, as they are, essentially, full backups and don’t rely on block change
    tracking. They are the starting point for any recovery operation utilizing incremental
    backups, which is why the most recent Incremental Level 0 backup supersedes any
    prior Incremental Level 0 backup when performing a restore and recovery absent
    a `RECOVER ... UNTIL ...` clause or a `SET UNTIL TIME` statement.


    This event populates the cell hash (cellhash#) and nothing else. Normally, Oracle
    will reset or clear any parameters that are not passed by the current wait event,
    but, occasionally, values populated by prior wait events get through. The obj#
    parameter is one that could be populated in a 10046 trace file that records this
    event. In such cases, a non-negative obj# is meaningless. Oracle will populate
    the obj# with a -1, to show it was cleared from a prior event.


    Cell Smart Restore from Backup


    This event logs wait time spent doing a restore with RMAN. Just like the prior
    event, Exadata offloads this processing to the storage cells, which, again, are
    best suited for such operations, having direct access to the storage.


    This event actually relates to the `cell smart file creation` event; both events
    record time for formatting of empty data blocks and initialization operations
    related to file creation.'
