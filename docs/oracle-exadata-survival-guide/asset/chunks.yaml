    \ HIGH` 压缩，在更新后，压缩变为 `OLTP`，并保持此状态直到您进行修改。数据字典仍然报告 HCC 处于有效状态，它也确实如此，但由于更新，Oracle\
    \ 现在将此数据视为使用 `OLTP` 压缩方案压缩的数据。我们将使用为 `QUERY HIGH` 压缩的 `EMP` 表，然后是为 `QUERY LOW`\
    \ 压缩的表来更新数据，以说明此行为。\n\n## QUERY HIGH 压缩下的更新\n\n```\nSQL> --\nSQL> -- 在压缩数据上执行更新\n\
