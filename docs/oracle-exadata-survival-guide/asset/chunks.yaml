    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                   713031680

    EMP_IDX                               478150656

    SALGRADE                                  65536


    Elapsed: 00:00:00.02

    SQL>

    SQL> --

    SQL> -- Compress the table for archive high

    SQL> --

    SQL> -- Note elapsed time to compress

    SQL> --

    SQL> alter table emp move compress for archive high;


    Table altered.


    Elapsed: 00:00:38.55

    SQL>

    SQL> --

    SQL> -- Index is now invalid

    SQL> --

    SQL> -- Must rebuild to make it usable

    SQL> --

    SQL> -- Note elapsed time

    SQL> --

    SQL> alter index emp_idx rebuild;


    Index altered.


    Elapsed: 00:00:39.45

    SQL>

    SQL> --

    SQL> -- Current compression type, storage for table/index

    SQL> -- initially after compression is enabled

    SQL> --

    SQL> select table_name, compression, compress_for

      2  from user_tables;


    TABLE_NAME                     COMPRESS COMPRESS_FOR

    ------------------------------ -------- ------------

    DEPT                           DISABLED

    BONUS                          DISABLED

    SALGRADE                       DISABLED

    DUMMY                          DISABLED

    EMP                            ENABLED  ARCHIVE HIGH


    Elapsed: 00:00:00.02

    SQL>

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                     4194304

    EMP_IDX                               260046848

    SALGRADE                                  65536


    Elapsed: 00:00:00.01

    SQL>

    ```


    The space savings are substantial, taking the table from its original size of
    680 megabytes down to 4 megabytes, a savings of 99.41 percent. Using ARCHIVE LOW
    instead of ARCHIVE HIGH still produces impressive results:


    ```

    SQL> --

    SQL> -- Initial storage

    SQL> --

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                   713031680

    EMP_IDX                               478150656

    SALGRADE                                  65536'
