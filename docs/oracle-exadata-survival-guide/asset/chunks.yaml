    \ 机器名称，例如，对于名为 MYEXA1 的 Exadata 机器，有 +DATA_MYEXA1 和 +RECO_MYEXA1）；恢复磁盘组的大小由此参数的值推导而来。\n\
    \n实际的重新配置再次使用 `/opt/oracle.SupportTools/onecommand/deploy11203.sh` 脚本进行，包含 26\
    \ 个独立步骤。这些步骤重新建立用户帐户、连接性、软件安装、磁盘分区创建、网格磁盘和 ASM 磁盘组的创建、默认 DBM 数据库的创建，以及在各个主目录（homes）上应用数据库和安全补丁。此过程的一部分还确保进程间通信\
    \ (`IPC`) 使用 InfiniBand 而非标准网络，以避免性能问题。\n\n您必须执行的下一步是恢复 “oracle” 操作系统用户主目录中除 `.ssh`\
    \ 目录外的所有内容。由于重新配置过程已建立了无密码 `ssh` 连接，覆盖这些文件将使该功能失效。\n\n最后，您必须以 “oracle” 用户身份连接（最好使用额外的会话），以验证您在重新配置前建立的所有功能是否按预期工作。\n\
    \n您可能需要执行的其他任务包括重新安装 OEM 代理以及，如果您将其更改为使用非默认端口，则重新配置 SCAN 监听器。\n\n系统可能会提示您覆盖现有文件。除了\
    \ `.ssh` 目录外，您应该这样做，因为您正在恢复的文件是您在存储重新分配之前配置的文件。请记住，此过程为 “oracle” 重新建立了无密码 `ssh`\
    \ 连接，使用重新配置前保存的内容替换 `.ssh` 目录内容可能会使无密码 `ssh` 失效，因为保存的 authorized_keys 文件中的签名与当前值不匹配。检查日志文件中是否有您可能错过的错误，因为详细的输出可能滚动太快而没被注意到，并纠正列出的错误。再次使用\
    \ `tar` 来恢复因现已纠正的错误而未能创建的文件或目录。如果需要第二次使用 `tar`，请在提示时*不要*替换现有文件。\n\n如果您使用 `cpio`\
    \ 来归档目录及其内容，以下命令将恢复归档的项目：\n\n```\n$ cpio -ivf ./.ssh < /tmp/oraclehome.cpio |\
    \ tee oraclehome_restore.log\n```\n\n`cpio` 实用程序读取指定的存档；提取除 `.ssh` 目录外的文件和目录；并将它们放在当前位置。如\
    \ `tar` 示例中所述，您不想覆盖 `.ssh` 目录内容，因为重新配置过程已为 “oracle” 重新建立了无密码 `ssh` 连接，覆盖这些当前文件将使该配置失效。归档恢复完成后，您需要检查日志文件中的错误。假设没有错误，您应该恢复到在更改存储分配之前建立的\
    \ “oracle” 操作系统用户配置。如果您确实在恢复中发现了错误，请纠正导致这些错误的状况，然后再次使用 `cpio` 来恢复由于错误而未能创建的文件或目录。\n\
    \n打开另一个会话并以 “oracle” 身份登录，以查看所有恢复的设置是否按预期功能运行。如果您已配置了设置各种 ORACLE_HOME 环境的方法，则应测试该方法，以确保在\
    \ “oracle” 操作系统用户主目录的存档或这些归档文件和目录的恢复过程中没有遗漏任何内容。\n"
- fmt: '# 数据库迁移至 Exadata：方法、字节序与实践


    ## 内存存储与字节序基础


    如果对这些概念不熟悉，可以思考数据在内存中是如何存储的。存储的最小单位是比特（bit），其值只能是 0 或 1。字节（Byte）是下一个更大的存储单位，由
    8 个比特组成。每个数据字节既可以用组成它的比特的二进制值表示，也可以用代表相同值的十六进制数字表示。因此，字符 “w” 可以用十六进制数字 `6F` 或二进制值
    `01101111` 表示。在当今大多数通用计算机中，字（word）的长度为 4 字节（32 位），尽管有些硬件架构使用不同长度的字（例如 64 位）。


    每个内存地址可以存储 1 字节，因此每个 32 位的字被划分为四个单字节值。操作系统的字节序（endian-ness）决定了字节写入内存的顺序。只有两种顺序可选：大端序（big-endian）或小端序（little-endian）。为了说明这一行为，单词
    `word` 由以下十六进制数字组成，按字母出现的顺序列出：


    ```

    6F 77 64 72

    ```


    在大端序系统中，字节将按如下顺序写入：


    ```

    6F 77 64 72

    ```


    在小端序系统中，字节顺序将被反转，如下所示：


    ```

    72 64 77 6F

    ```


    如果源系统是大端序，那么将数据文件直接复制到小端序系统将导致数据无法读取，因为目标操作系统会以“错误”的顺序读取字节。Exadata 运行的是 Linux，这是一个小端序操作系统。从大端序操作系统（例如
    AIX 或 Solaris）迁移是可能的，但需要使用 RMAN，无论是作为主要迁移工具还是额外实用程序，来将数据文件从大端序格式转换为小端序格式。


    ## 迁移方法概述


    无论源系统的字节序如何，RMAN 都是一个极佳的迁移工具选择，特别是因为可以利用已有的数据库备份过程来生成迁移所需的备份集。将数据库从大端序系统迁移到 Exadata
    需要进行一些流程上的更改，以便 RMAN 能够将数据文件转换为小端序格式。这些步骤将在本章后面提供。使用 RMAN 在 Exadata 上实质上克隆源数据库相对较快，并且会迁移所有内部数据库对象，而不考虑数据类型。可能会有一些
    RMAN 无法传输的对象，例如 `BFILES` 和目录（directories），并且有办法报告这些对象。可以执行本章后面讨论的附加步骤，以确保这些对象也能被迁移。


    当只需要迁移特定模式时，可传输表空间（Transportable tablespaces）也是一个选项。其流程为：确定表空间依赖关系；准备所需和依赖的表空间；导出元数据；传输表空间文件；将表空间元数据导入
    Exadata。使用此方法需要在 Exadata 上创建一个空数据库，数据库配置助手（Database Configuration Assistant）可以执行此任务。这些通用步骤将在另一节中详细讨论。


    物理备用数据库也可用于将源数据库迁移到 Exadata。基本上使用与标准 RMAN 数据库克隆相同的过程，但需要执行一些用于备用配置和操作的额外步骤。此方法允许您将数据库迁移到
    Exadata，并使其与源数据库保持同步，直到期望的切换日期，届时备用数据库将转换为主数据库，所有用户流量将被重定向到 Exadata。此方法也将在本章后面更详细地介绍。


    根据要迁移的表空间数量，使用可传输表空间可能不是合适的方法。在我们看来，RMAN 将是物理迁移方法的首选，而数据泵（data pump）则是用于逻辑数据传输的方法。为了辅助此次迁移，Oracle
    提供了一个视图 `V$TRANSPORTABLE_PLATFORM`，它列出了 RMAN 可以转换数据文件的操作系统及其字节序。在下一节中，我们将介绍此视图以及如何使用它，通过
    RMAN 将数据库从具有不同字节序的系统迁移到运行 Linux 的 Exadata。


    ## 使用备份进行迁移


    可能最简单的方法是利用现有的数据库备份将数据库重新定位到 Exadata，因为备份策略已经就位，并且经过测试可提供可靠的结果。这与使用 RMAN 克隆数据库的过程相同，因此它是可靠且可重复的。


    > **注意** 我们发现有必要为备份片（backup pieces）提供外部存储。特别是当您将数据库从大端序平台迁移到 Exadata（一个小端序平台）并使用可传输表空间或
    RMAN 时。


    查看使用 RMAN 备份将数据库迁移到 Exadata 所涉及的步骤，该过程是直接的。如果源服务器和 Exadata 目标之间可以共用一个通用存储设备，则会更容易，因为无需传输备份片。由于我们为了测试和开发目的克隆数据库，因此可以访问一个外部存储阵列，我们用它来备份所需的数据库。我们将基于此配置进行讨论，除了必须将备份片从源机器复制到
    Exadata 之外，其余步骤是相同的。


    > **注意** 本节概述的步骤将把数据库迁移到 Exadata 上的单实例数据库。如果您希望迁移后的数据库是集群数据库，则需要执行额外的步骤。这些步骤将在本节末尾介绍，并适用于所描述的两种
    RMAN 方法。


    在开始之前，需要源数据库的近期备份。此过程还应备份控制文件，并在数据库备份完成后进行。这是必要的，以便在备份后恢复的控制文件中能找到刚进行的备份。您将使用这些控制文件来启动在
    Exadata 上的数据库恢复和还原。此外，还需要源数据库的 `init.ora` 或 spfile 的当前副本，以及任何必要的目录组件，例如为源数据库定义的诊断目标（diagnostic
    destination）。对于正在迁移的 RAC 数据库，必须将每个节点的 `init.ora` 或 spfile 复制到其在 Exadata 系统上的相应位置。我们建议您使用
    `tar` 或 `cpio` 来归档源数据库的诊断目标，并将该归档文件传输到 Exadata 进行恢复。可能在某些情况下，无法在 Exadata 系统上复制诊断目标的完整路径。在这种情况下，更改为
    `init.ora` 文件中列为 `diagnostic_dest` 的目录，并从该点开始归档。以下是一个名为 TEST 的数据库使用 `tar` 的示例：


    ```

    $ cd /u01/oracle/11.2.0.3

    $ tar cvf /obkups/diag_dest.tar ./diag/rdbms/test

    ```


    创建的 `tar` 归档文件将被传输到 Exadata 系统。更改为 DBM 数据库（因为这很可能是您用于传输数据库的 `ORACLE_HOME`）所列出的
    `diagnostic_dest`，并恢复 `tar` 归档文件，如下所示：


    ```

    $ cd /u01/oracle/11.2.0

    $ tar xvf /obkups/diag_dest.tar

    ```'
  raw: 'If these concepts are unfamiliar, consider how data is stored in memory. The
    smallest unit of storage is the bit, which can have the value of either 0 or 1\.
    Bytes, the next largest storage unit, are composed of 8 bits, and each byte of
    data can be represented either by the binary values of the bits of which it is
    composed or by hexadecimal digits that represent the same value. Thus the character
    “w” can be represented by the hexadecimal digits 6F or the binary value 01101111.
    In most of today’s general-purpose computers, words are 4 bytes (32 bits) long,
    although some hardware architectures use words of different lengths (such as 64
    bits).


    Each memory address can store 1 byte, so each 32-bit word is divided into four
    single-byte values. The endian-ness of an operating system determines in which
    order the bytes will be written to memory. There are only two orders to choose
    from: big-endian or little-endian. To illustrate this behavior, the word *word*
    is composed of the following hexadecimal digits, listed in the order in which
    the letters appear:


    ```

    6F


    ```


    In a big-endian system, the bytes would be written as follows:


    ```

    6F 77 64 72

    ```


    In a little-endian system, the bytes would be reversed, as follows:


    ```

    72 64 77 6F

    ```


    If a source system is big-endian, then copying the data files directly to a little-endian
    system would result in unreadable data, because the destination operating system
    would be reading the bytes in the “wrong” order. Exadata runs Linux, a little-endian
    operating system. Migrating from big-endian operating systems, such as AIX or
    Solaris, for example, is possible but requires RMAN, either as the primary migration
    tool or as an additional utility, to convert the data files from big-endian to
    little-endian format.


    Regardless of the endian-ness of the source system, RMAN is an excellent choice
    as a migration tool, especially because the database backup processes already
    in place can be used to generate the necessary backup set for migration. There
    are process changes you will have to make to migrate a database from a big-endian
    system to Exadata, so that RMAN can convert the data files to a little-endian
    format. These steps will be provided later in the chapter. Using RMAN to essentially
    clone the source database onto Exadata is relatively fast and brings over all
    of the internal database objects, regardless of data type. There will likely be
    objects that RMAN won’t transfer, such as BFILES and directories, and there is
    a way to report those objects. Additional steps, which are discussed later in
    this chapter, can be performed to ensure those objects also get migrated.


    Transportable tablespaces are also an option when only specific schemas have to
    be migrated. Tablespace dependencies are determined; the desired and dependent
    tablespaces are prepared; the metadata is exported; the tablespace files are transferred;
    and the tablespace metadata is imported into Exadata. Using this method requires
    that an empty database be created on Exadata, and the Database Configuration Assistant
    can perform that task. These general steps will be discussed in detail in another
    section.


    A physical standby database can also be used to migrate a source database to Exadata.
    Basically using the same process as a standard RMAN database clone, a few additional
    steps, required for standby configuration and operation, will have to be performed.
    This method allows you to migrate the database to Exadata and keep it synchronized
    with the source database until the desired cutover date, when the standby is converted
    to a primary and all user traffic is redirected to Exadata. This method will also
    be covered in more detail later in this chapter.


    Depending on the number of tablespaces to migrate, using transportable tablespaces
    might not be the method to use. RMAN, in our opinion, would be the physical method
    of choice, and data pump would be the method to use for a logical transfer of
    data. To aid in this migration, Oracle provides a view, `V$TRANSPORTABLE_PLATFORM`,
    that lists the operating systems RMAN can convert data files from and to and includes
    the endian-ness of that operating system. In the next section, we cover this view
    and how to use it to migrate a database from a system with different endian-ness
    to Exadata, running Linux, using RMAN.


    Using Backups


    Possibly the easiest method involves using the existing database backups to relocate
    a database to Exadata, because the backup strategy is already in place and has
    been tested to provide reliable results. This is the same procedure used to clone
    a database with RMAN, so it’s reliable and repeatable.


    ![image](images/sq.jpg) **Note**  We have found it necessary to have external
    storage available for the backup pieces. This is especially true if you are migrating
    a database from a big-endian platform to Exadata, a little-endian platform, and
    using either transportable tablespaces or RMAN.


    Looking at the steps involved to migrate a database to Exadata using RMAN backups,
    the procedure is straightforward. If a common storage device can be made available
    between the source server and the Exadata destination, it’s even easier, as no
    transfer of backup pieces is necessary. Because we clone databases for testing
    and development purposes, we have access to an external storage array, which we
    use for backups of the desired databases. We will proceed with this discussion
    based on this configuration, and apart from having to copy backup pieces from
    the source machine to Exadata, the steps are identical.


    ![image](images/sq.jpg) **Note**  The steps outlined in this section will migrate
    a database to a single-instance database on Exadata. There are additional steps
    to execute, should you want the migrated database to be a cluster database. Those
    steps will be covered at the end of this section and will apply to either of the
    RMAN methods described.


    A recent backup of the source database is required before you begin. This process
    should also back up the control files and do so after the database backup is complete.
    This is necessary so that the backup just taken is found in the control files
    that will be restored. It’s these control files you will use to start the database
    restore and recovery to Exadata. Additionally, a current copy of the `init.ora`
    or sp file from the source database is required, as are any necessary directory
    components, such as the diagnostic destination as defined for the source database.
    For a RAC database being migrated, the `init.ora` or spfile from each node will
    have to be copied to its respective location on the Exadata system. We recommend
    that you use `tar` or `cpio` to archive the diagnostic destination for the source
    database and transfer that archive to Exadata, where it can be restored. There
    may be situations where the full path for the diagnostic destination cannot be
    replicated on the Exadata system. In such cases, change directories to the directory
    listed in the `init.ora` file as the `diagnostic_dest` and archive from that point.
    An example for a database named TEST using `tar` follows:


    ```

    $ cd /u01/oracle/11.2.0.3

    $ tar cvf /obkups/diag_dest.tar ./diag/rdbms/test

    ```


    The `tar` archive created would be transferred to the Exadata system. Change directories
    to the `diagnostic_dest` listed for the DBM database (because this is the `ORACLE_HOME`
    you will likely use for your transferred database) and restore the `tar` archive,
    as follows:


    ```

    $ cd /u01/oracle/11.2.0

    $ tar xvf /obkups/diag_dest.tar

    ```'
