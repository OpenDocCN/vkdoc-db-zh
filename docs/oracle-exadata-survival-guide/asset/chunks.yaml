    \n## Things to Know\n\n智能闪存缓存通过缓存频繁访问的表和索引块，提供了高 I/O 每秒速率的能力，允许直接从闪存中读取它们。\n\n\
    智能闪存缓存由每个存储单元的 4 个 Sun Flash PCIe 卡组成，每个卡具有 96GB 的闪存存储。对于具有 3 个存储单元的 Exadata 系统，可用的总闪存存储为\
    \ 1.125TB。这些 PCIe 卡的预期寿命为两年，因为存储电容器会随时间推移而失去保持电荷的能力。根据 Sun 的说法，可以在不关闭存储单元的情况下单独更换这些卡。然而，Oracle\
    \ 建议在维护前关闭存储单元电源。\n\n智能闪存缓存是一种按单元缓存机制，针对频繁访问的数据进行了优化。对象是否将被考虑用于智能闪存缓存使用，部分取决于创建该对象时设置的\
    \ `CELL_FLASH_CACHE` 存储参数。\n\n写入操作不受此缓存影响。`CELLSRV` 执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后智能闪存缓存决定数据是否要被缓存，使磁盘写入与数据缓存过程无关。\n\
    \n维护了一个已缓存数据的内存中哈希表，因此 Oracle 可以快速确定所需的块是否可以在那里找到。该哈希表列出了未标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。\n\
    \n当源块自缓存数据写入后已更改、需要空间用于当前事务的 I/O、块被标记为 `KEEP` 但已超过额外的 `KEEP` 阈值而未使用，或者它们的生命周期已超过标准\
    \ LRU 阈值时，可能会驱逐缓存的块。\n\n每个配置的闪存磁盘有 32MB 的存储配置为智能闪存日志 (Smart Flash Log)；这总计每个存储单元\
    \ 512MB 的智能闪存日志存储。重做日志写入同时发送到磁盘和智能闪存日志。一旦日志写入器进程 (`LGWR`) 收到写入完成（无论是到重做日志还是智能闪存日志区域）的确认，事务处理就会继续。\n\
    \n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组；这样做需要调整现有智能闪存缓存的大小。可以通过重新配置一个、两个或所有可用存储服务器上的智能闪存缓存来创建一个或多个闪存磁盘集。选择的冗余级别将决定可用的存储空间；最大值为总可用空间的一半，最小值为总可用空间的三分之一。\n\
