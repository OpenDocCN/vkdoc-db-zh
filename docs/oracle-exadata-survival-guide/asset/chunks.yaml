    **Mary Mikell Spence** 是一位居住在佐治亚州亚特兰大都市区的资深 Oracle 数据库管理员，自 1983 年从佐治亚理工学院毕业后一直从事
    IT 领域工作。她从应用程序开发员开始职业生涯，自 1991 年起便与 Oracle 打交道。她的 Oracle 经验涵盖从数据库设计和架构到备份与恢复的方方面面。2000
    年，在一个大型迁移和升级项目中，她开始作为 ERP 数据库管理员使用 Oracle 电子商务套件 11i；过去几年，她参与了一个类似的项目——这次是在 Exadata
