    Without the storage level execution of the bloom filter, the query execution time
    increased by 2.33 seconds, a 16.3 percent increase. For longer execution times,
    this difference can be significant. It isn’t the bloom filter that gives Exadata
    such power with joins, it’s the fact that Exadata can execute it not only at the
    database level but also at the storage level, something commodity hardware configurations
    can’t do.


    Offloading Functions


    Functions are an interesting topic with Exadata, as far as Smart Scans are concerned.
    Oracle implements two basic types of functions: single-row functions, such as
    TO_CHAR(), TO_NUMBER(), CHR(), LPAD(), which operate on a single value and return
    a single result, and multi-row functions, such as AVG(), LAG(), LEAD(), MIN(),
    MAX(), and others, which operate on multiple rows and return either a single value
    or a set of values. Analytic functions are included in this second function type.
    The single-row functions are eligible to be offloaded and, thus, can qualify a
    query for a Smart Scan, because single-row functions can be divided among the
    storage servers to process data. Multi-row functions such as AVG(), MIN(), and
    MAX()must be able to access the entire set of table data, an action not possible
    by a Smart Scan with the storage architecture of an Exadata machine. The minimum
    number of storage servers in the smallest of Exadata configurations is three,
    and the storage is fairly evenly divided among these. This makes it impossible
    for one storage server to access the entire set of disks. Thus, the majority of
    multi-row functions cannot be offloaded to the storage tier; however, queries
    that utilize these functions may still execute a Smart Scan, even though the function
    cannot be offloaded, as displayed by executing the agg_smart_scan_ex.sql script;
    only the relevant output from that script is reproduced here.


    ```


