- fmt: '# Exadata存储索引


    存储索引是动态为给定表创建的，以1MB分段的形式存储在内存中，并基于卸载的谓词构建。每个分段最多可索引8列，每个分段记录列名、该分段的最小值、最大值以及该1MB“块”中是否存在任何`NULL`值。


    列的索引遵循先到先得的原则；例如，Exadata不会索引表中的前八列，而是根据它们在查询谓词中出现的顺序进行索引。对于同一个表，其每个1MB分段所索引的列也可能不同。更常见（尽管不保证）的情况是，许多已索引的分段包含相同的列列表。


    这些索引也可以从多组查询谓词中构建。如果一个查询的`WHERE`子句中有四列，并且被查询的表尚不存在存储索引，那么这四列将创建索引。如果另一个查询将同一个表的另外五列卸载到存储单元，则前四列将补全所访问表分段的存储索引。第二个查询也可能比前一个查询访问更多的表分段；如果这些额外的分段中没有索引，则所有五列都将被索引。这个过程可以持续进行，直到所有1MB的表分段都关联了一个存储索引，每个索引最多包含八列。这些索引将驻留在内存中，直到`CELLSRV`重启或存储单元本身重新启动。重新启动或重启会清除它们，整个过程重新开始，随着存储单元接收到卸载的谓词信息而动态构建存储索引。


    这也是为什么在运行大量即席查询的系统中，在`CELLSRV`重启后创建的存储索引可能与存储单元关闭前使用的索引不完全相同的一个原因。此类存储索引的重建可能导致轻微的性能变化，这应是预期行为。运行预打包应用程序（如ERP系统）的Exadata系统更有可能重新创建与存储层重启前相同的存储索引，因为绝大多数卸载到存储单元的查询都卸载相同的谓词，且顺序相同，无论它们何时执行（这是“罐装”查询的优点）。这并不意味着预打包应用程序在存储单元重启后总会创建相同的存储索引，只是这种可能性要大得多。


    存储索引看起来不像你以前遇到过的任何索引，其行为也不同。一个简化的可视化效果可能类似于[图 3-1](#9781430260103_Ch03.xhtml#Fig1)（图片由Richard
    Foote提供，他对Oracle索引有丰富的知识）。


    ![9781430260103_Fig03-01.jpg](images/9781430260103_Fig03-01.jpg)


    **[图 3-1](#9781430260103_Ch03.xhtml#_Fig1). 存储索引结构**


    表的每个存储段在每个存储单元中都关联一个内存区域；每个内存区域包含其所映射的表存储段的索引数据。当Oracle处理`Smart Scan`时，它也会扫描这些索引区域，寻找可能的匹配项（可能包含所需值的分段），同时跳过可以忽略的分段（那些不可能包含所需值的分段）。正是这种跳过读取“不必要”数据段（即找不到所需数据的段）的能力，赋予了存储索引强大的功能。


    有了这个虽然长但很精彩的描述，就不难理解为什么存储索引会让人困惑了。但它们其实不必如此。


    ## “不要看这里”


    与旨在告诉Oracle数据“在哪里”的B-tree索引不同，存储索引旨在允许Oracle跳过或绕过存储段，基本上是告诉Oracle数据“不在哪里”。进一步解释，B-tree索引包含索引的确切值以及表中每一行的`rowid`。`rowid`的存在精确定位了特定索引键的位置，使Oracle能够直接找到所需键的确切位置。因此，B-tree索引报告了每个索引键的确切位置。存储索引则不存储确切的位置。


    对于每个卸载的查询，`Smart Scan`将使用存储索引（如果有的话）。请记住：这些索引是在谓词卸载到存储单元时动态创建的，因此某些表可能尚未创建存储索引。当存在存储索引时，Oracle将通过存储单元扫描它，并查看感兴趣的列是否存在，以及所需的值是否落在该列在给定分段中记录的最小/最大范围内。如果该列已被索引且所需值落在记录的范围之外，则该1MB分段将被跳过，从而立即节省I/O。


    `IS NULL`和`IS NOT NULL`谓词也会使用存储索引，因为索引段中有一个位用于指示`NULL`值的存在。根据数据的不同，查询在寻找或避免`NULL`值时，可以绕过大部分表数据，使得结果集的返回速度比在传统配置的系统上快得多。查询必须符合`Smart
    Scan`的条件才会使用存储索引；因此，它必须满足`Smart Scan`执行的所有标准。这些条件已在上一章列出，此处不再重复。


    存储索引的一个有趣方面是它的有效性，这取决于表中键数据的位置。对于传统的B-tree索引，这被称为聚类因子（Clustering Factor），它衡量Oracle在表中“移动”多远才能到达索引中下一个键的位置。正如人们所料，聚类因子值相当低是件好事；不幸的是，这只有在表数据按索引键排序时才能保证。为一个索引对数据进行排序以改进其聚类因子，通常会使其他索引的聚类因子变得更差。同样，存储索引有一个伪“聚类因子”，因为索引键值的位置会影响存储索引的使用效果以及它是否能提供真正的I/O节省。与B-tree索引不同，在表中将键聚集在一起可以增强性能，并且由于每个表只有一个存储索引，因此不利影响很少。当然，在堆表初始数据加载后，不能保证排序会被保留，因为插入和删除可能会将数据键移出期望的分组。尽管如此，需要大量的插入和删除才能完全消除最初建立的键聚集。'
  raw: 'Storage indexes are dynamically created in 1MB segments for a given table,
    stored in memory, and built based on offloaded predicates. A maximum of eight
    columns per segment can be indexed, and each segment records the column name,
    the minimum value for that segment, the maximum value for that segment, and whether
    any NULL values exist in that 1MB “chunk.”


    Columns are indexed on a first-come, first-served basis; Exadata doesn’t take,
    for example, the first eight columns in the table and index those but indexes
    columns as they appear in the query predicates. It’s also possible that every
    1MB segment for a given table could have differing columns indexed. It’s more
    likely, although not guaranteed, that many of the indexed segments will contain
    the same column list.


    The indexes can also be built from multiple sets of query predicates. If a query
    has four columns in its `WHERE` clause and no storage index yet exists for the
    queried table, those four columns create it. If another query offloads five additional
    columns from that same table to the storage cells, the first four listed columns
    round out the storage index for the table segments accessed. The second query
    may also access more table segments than the previous query; if no index exists
    in those additional segments, all five columns are indexed. On and on this can
    go until all the 1MB table segments have a storage index associated with them,
    each consisting of the eight-column maximum. Those indexes will remain resident
    in memory until CELLSRV is restarted or the storage cell itself is rebooted. A
    reboot or restart erases them, and the whole process starts over again, dynamically
    building storage indexes as the storage cells receive offloaded predicate information.


    This is one reason why, in systems running a good number of ad hoc queries, the
    storage indexes created after a reboot or restart of CELLSRV may not be exactly
    the same as the ones that were in use before the storage cell was shut down. Slight
    changes in performance can result from such storage index rebuilds, which should
    be the expected behavior. Exadata systems running prepackaged applications, such
    as an ERP system, have a better chance of re-creating the same storage indexes
    that existed before the storage tier was restarted,  since the majority of the
    queries offloaded to the storage cells offload the same predicates, in the same
    order, regardless of when they are executed (the beauty of “canned” queries).
    This doesn’t mean that prepackaged applications will create the same storage indexes
    after a restart of the storage cells, just that the possibility is far more likely
    to occur.


    A storage index doesn’t look like any index you’ve encountered before, but it
    doesn’t behave like one either. A simplified visualization might look like [Figure
    3-1](#9781430260103_Ch03.xhtml#Fig1) (the image is courtesy of Richard Foote,
    who has a wealth of knowledge about Oracle indexes).


    ![9781430260103_Fig03-01.jpg](images/9781430260103_Fig03-01.jpg)


    [Figure 3-1](#9781430260103_Ch03.xhtml#_Fig1). Storage index structure


    Each storage segment for a table is associated with a memory region in each storage
    cell; each memory region contains the index data for the table storage segment
    it is mapped to. As Oracle processes a Smart Scan it also scans these index regions,
    looking for possible matches (segments that could contain the desired value or
    values) while skipping the segments it can ignore (those having no possibility
    of containing the desired value). It’s the ability to skip reading “unnecessary”
    data segments, segments where the desired data cannot be found, that gives storage
    indexes their power.


    Given that glorious, although long, description, it isn’t difficult to understand
    why storage indexes can be confusing. But they don’t need to be.


    Don’t Look Here


    Unlike a B-tree index, designed and implemented to tell Oracle where data *is*
    **,** a storage index is designed to allow Oracle to skip, or bypass, storage
    segments, basically telling Oracle where data *isn’t*. To explain further, a B-tree
    index contains the exact value or values indexed, plus the rowid for each row
    in the table. The presence of the rowid pinpoints where the particular index key
    is found, allowing Oracle to zero in on the precise location for the desired key
    or keys. Thus, a B-tree index reports the exact location for each index key. Storage
    indexes have no exact locations stored.


    For each offloaded query, a Smart Scan will use a storage index, provided one
    is available. Remember: These are dynamically created when predicates are offloaded
    to the storage cells, so some tables may not have a storage index created yet.
    When one exists, Oracle, through the storage cells, will scan a storage index
    and see if the column or columns of interest are present and whether the desired
    value falls within the minimum/maximum range recorded for the column or columns
    in a given segment. If the column is indexed and the desired value falls outside
    of the recorded range, that 1MB segment is skipped, creating instant I/O savings.


    A storage index will also be used by IS NULL and IS NOT NULL predicates, because
    there is a bit set to indicate the presence of NULL values in an index segment.
    Depending on the data, a query either looking for or avoiding NULL values could
    bypass most of the table data, making the result set return much more quickly
    than on a conventionally configured system. A query must qualify for a Smart Scan
    before it will use a storage index; thus, it must meet all of the criteria for
    Smart Scan execution. Those conditions are listed in the previous chapter, so
    they won’t be repeated here.


    An interesting aspect of a storage index is its effectiveness, which is based
    on the location of key data in the table. For a conventional B-tree index, this
    is called the Clustering Factor, a function of how far Oracle must “trave” in
    the table to arrive at the location of the next key in the index. As one would
    expect, a fairly low value for the Clustering Factor is a good thing; unfortunately,
    that can only be guaranteed if the table data is ordered by the index key. Ordering
    the data to improve the Clustering Factor for one index most often makes the Clustering
    Factors for any remaining indexes worse. Likewise, a storage index has a pseudo–“Clustering
    Factor” in that the location of indexed key values can affect how well a storage
    index is used and whether or not it provides real I/O savings. Unlike with a B-tree
    index, clustering the keys close to each other in the table enhances the performance,
    and since there is only one storage index per table, adverse effects are few.
    Of course, after the initial data loading of a heap table, there is no guarantee
    that the ordering will be preserved, as inserts and deletes can shift the data
    keys outside of the desired groupings. Still, it would take a tremendous volume
    of inserts and deletes to entirely undo the key clustering that was originally
    established.'
  trans: '# Exadata 存储索引


    存储索引是动态为给定表创建的，以 1MB 分段的形式存储在内存中，并基于卸载的谓词构建。每个分段最多可索引 8 列，每个分段记录列名、该分段的最小值、最大值以及该
    1MB“块”中是否存在任何`NULL`值。


    列的索引遵循先到先得的原则；例如，Exadata 不会索引表中的前八列，而是根据它们在查询谓词中出现的顺序进行索引。对于同一个表，其每个 1MB 分段所索引的列也可能不同。更常见（尽管不保证）的情况是，许多已索引的分段包含相同的列列表。


    这些索引也可以从多组查询谓词中构建。如果一个查询的`WHERE`子句中有四列，并且被查询的表尚不存在存储索引，那么这四列将创建索引。如果另一个查询将同一个表的另外五列卸载到存储单元，则前四列将补全所访问表分段的存储索引。第二个查询也可能比前一个查询访问更多的表分段；如果这些额外的分段中没有索引，则所有五列都将被索引。这个过程可以持续进行，直到所有
    1MB 的表分段都关联了一个存储索引，每个索引最多包含八列。这些索引将驻留在内存中，直到`CELLSRV`重启或存储单元本身重新启动。重新启动或重启会清除它们，整个过程重新开始，随着存储单元接收到卸载的谓词信息而动态构建存储索引。


    这也是为什么在运行大量即席查询的系统中，在`CELLSRV`重启后创建的存储索引可能与存储单元关闭前使用的索引不完全相同的一个原因。此类存储索引的重建可能导致轻微的性能变化，这应是预期行为。运行预打包应用程序（如
    ERP 系统）的 Exadata 系统更有可能重新创建与存储层重启前相同的存储索引，因为绝大多数卸载到存储单元的查询都卸载相同的谓词，且顺序相同，无论它们何时执行（这是“罐装”查询的优点）。这并不意味着预打包应用程序在存储单元重启后总会创建相同的存储索引，只是这种可能性要大得多。


    存储索引看起来不像你以前遇到过的任何索引，其行为也不同。一个简化的可视化效果可能类似于图 3-1（图片由 Richard Foote 提供，他对 Oracle
    索引有丰富的知识）。


    ![9781430260103_Fig03-01.jpg](img/9781430260103_Fig03-01.jpg)


    **图 3-1. 存储索引结构**


    表的每个存储段在每个存储单元中都关联一个内存区域；每个内存区域包含其所映射的表存储段的索引数据。当 Oracle 处理`Smart Scan`时，它也会扫描这些索引区域，寻找可能的匹配项（可能包含所需值的分段），同时跳过可以忽略的分段（那些不可能包含所需值的分段）。正是这种跳过读取“不必要”数据段（即找不到所需数据的段）的能力，赋予了存储索引强大的功能。


