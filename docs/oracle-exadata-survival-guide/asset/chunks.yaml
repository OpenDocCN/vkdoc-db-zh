  trans: '## 第 5 章


    第 5 章 带我们进入了并行处理的领域，在传统配置的系统中，这一领域可能既有益处也有阻碍。Oracle 11.2.0.x 在并行语句的实现和执行方面提供了改进，这些改进适用于运行此
    Oracle 版本的任何 Exadata 或非 Exadata 配置。正是 Exadata 最初是为数据仓库工作负载而设计这一事实——这类工作负载依赖于并行处理来加速工作流程——使得它成为并行处理的理想选择。


    需要某些配置设置才能启用自动并行处理功能，而 Exadata 要实际根据这些配置设置采取行动，一项非常重要的任务——I/O 校准——是必需的。I/O 校准是一个资源密集型过程，不应在系统高负载期间运行。为此提供了一个打包过程
    `dbms_resource_manager.calibrate_io`。一旦 I/O 校准完成，您将需要验证表 5-1 和表 5-2 中的参数和设置。


    一旦您将所有设置就绪，就让 Oracle 接管控制权；然后用户就能享受到这一改进的并行处理功能带来的好处。其中一个好处是并行语句排队，Oracle 会推迟执行并行化语句，直到有足够的资源可用。查询
    `V$SQL_MONITOR` 视图（或 `GV$SQL_MONITOR` 以查看集群中所有节点的语句），其状态为 `QUEUED`，将提供一个列表，显示那些正在等待执行完毕的并行语句释放出足够资源的语句。只要您正确设置了资源限制，这就能防止系统过载，相比早期的并行自适应多用户机制是一个巨大的进步。


    另一个好处是，Oracle 将根据可用资源动态设置并行度（DOP）。需要注意的一个重要事项是，一旦 DOP 由 Oracle 设置，在执行期间就无法更改，即使有额外的资源变得可用也不行。DOP
    是基于给定语句的估计串行执行时间来计算的。参数 `parallel_min_time_threshold` 设置了串行执行时间的阈值，这将成为决定是否进行并行执行的关键因素。请记住，您可以通过将隐藏参数
    `_parallel_statement_queuing` 设置为 FALSE 来控制是否启用排队。


    并行执行的另一个方面是内存中并行执行。一方面，这可能是理想的行为，因为它消除了磁 I/O 和数据库服务器与存储单元之间的流量，并且内存的延迟远低于磁盘访问。另一方面，当此功能激活时，智能扫描优化不再可用，因为磁
    I/O 被消除了。由于智能扫描优化被消除，数据库服务器必须执行所有存储单元本应执行的读取处理，这增加了 CPU 使用率。我们还注意到，在我们管理过的任何 Exadata
    系统上，我们尚未经历过内存中并行执行。


    ## 第 6 章


    接下来是第 6 章关于压缩的内容。Exadata 提供了在任何非 Exadata 平台上都不可用的压缩选项，特别是混合列压缩（HCC）选项。这些选项包括 QUERY
    HIGH、QUERY LOW、ARCHIVE HIGH 和 ARCHIVE LOW。这些选项可以显著减小所选表的大小；然而，压缩表应该处于非活动状态，或者在正常工作时间之外进行批处理，包括重新压缩。如果
    HCC 用于频繁更新的表，压缩级别会自动更改为 OLTP，原本节省的空间就丢失了。使用 HCC 的另一个方面是灾难恢复。如果恢复方法只是将最后一个良好的备份恢复到非
    Exadata 服务器或不使用 Exadata 存储的服务器，则恢复完成后数据库可能无法使用，因为 HCC 在非 Exadata 存储上不受支持。这种情况可以通过解压缩表来纠正，但纠正时，如果目标服务器的表空间是基于
    Exadata 数据库的压缩大小创建的，您可能会遇到空间问题。


    第 6 章中的表 6-3 和表 6-4 列出了各种压缩方法（包括 OLTP）的估计和实际压缩比率。这些表格不会在此处重现，但如果您正在考虑使用某种压缩方法来节省空间，再次查看它们是个好主意。


    ## 第 7 章


    第 7 章涵盖了 Exadata 特有的等待事件。这些等待事件报告与单元相关的等待信息。其中七个等待事件在 I/O 等待类别下收集等待数据，而 `cell
    statistics gather` 事件似乎被错误地包含在此类别中。`cell single block physical read` 和 `cell multiblock
    physical read` 事件基本上分别取代了旧的 `db file sequential read` 和 `db file scattered read`
    事件。


    RMAN 也有 Exadata 特定的等待事件：`cell smart incremental backup` 和 `cell smart restore
    from backup`。第一个等待事件针对增量 Level 1 备份收集时间，第二个则累积 RMAN 恢复过程中经历的等待时间。由于 Level 0 增量本质上是一个完整备份，这些备份经历的等待时间不会被记录。


    ## 第 8 章


    第 8 章涵盖了 Exadata 特有的性能计数器和指标。该章的目的是概述有哪些指标和计数器可用、它们的含义以及您应该在何时考虑使用它们。


    单元指标提供了对语句性能以及 Exadata 如何执行语句的洞察。动态计数器如 `cell blocks processed by data layer`
    和 `cell blocks processed by index layer` 显示了存储单元在处理过程中的效率。每次存储单元能够在无需将数据传回数据库层的情况下完成数据层和索引层处理时，这些计数器就会增加。存储单元将数据传回数据库服务器的两个原因是：需要撤销块的一致性读处理（常规块
    I/O）以及跨存储单元的链式行处理。虽然第一个条件无法完全控制（事务可能非常大，超过了自动块清理的阈值），但第二个问题，链式行，是可以解决并可能纠正的。'
- fmt: 'The `cell num fast response sessions` and `cell num fast response sessions
    continuing to smart scan` counters reveal the number of times Oracle chose to
    defer a Smart Scan in favor of regular block I/O, as an attempt to return the
    requested data with a minimum of work (the first listed counter), and how many
    times Oracle actually started a Smart Scan after the fast response session failed
    to return the requested data. These can give you insight into the nature of the
    statements submitted to your Exadata databases, by showing how often Smart Scans
    were averted because a small regular block I/O operation returned the requested
    data.


    `V$SQL` also provides data that can be used to determine statement efficiency
    in the `IO_CELL_OFFLOAD_ELIGIBLE_BYTES` and `IO_CELL_OFFLOAD_RETURNED_BYTES` columns.
    These two columns can be used to calculate a percentage savings effected by a
    Smart Scan for a given query.


    [Chapter 9](#9781430260103_Ch09.xhtml) went into storage cell monitoring, a very
    important aspect of Exadata, because some of the metrics are not passed back to
    the database servers. There are two accounts available outside of “root,” and
    those are `cellmonitor` and `celladmin`. Which one you use really depends on what
    tasks have to be accomplished.


    The `cellmonitor` account has access to the cell metrics and counters and can
    generate monitoring reports. It has limited access at the O/S level and cannot
    execute any of the administrative commands or functions from `cellcli`, the cell
    command-line interface. Basically speaking, the `LIST` commands are available
    to `cellmonitor`, and those are sufficient for monitoring the cells and verifying
    that they are functioning properly.


    The `celladmin` account, as you would expect, has more power. In addition to generating
    reports like `cellmonitor`, it has the ability to execute the series of `ALTER`,
    `ASSIGN`, `DROP`, `EXPORT`, and `IMPORT` commands.


    Besides `cellcli`, the storage cells can be monitored with `cellsrvstat` and,
    from any node in the cluster, `dcli`. The `cellcli` utility can also be run directly
    from the command line, by passing to it the command you wish to execute, as the
    following example illustrates.


    ```

    [celladmin@myexa1cel03 ∼]$ cellcli -e "list flashcache detail"

