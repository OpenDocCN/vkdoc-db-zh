- fmt: '## The issue of the listener can be the most challenging.


    First, you must decide if the SCAN listener can simply stay on port 1521 or if
    it has to move. While you can use the SCAN listener, it is not practical to do
    so on a dev/test cluster, where you most likely will have multiple ERP databases
    running. Each of the databases will require its own listener port and, hence,
    its own listener. For the sake of consistency, we have found it best to have none
    of the databases use the SCAN listener as primary.


    You will need to have the database registered with the SCAN listener, so that
    `dbca` will work. Each ERP database will be registered with both a listener and
    port unique to that database and with the SCAN listener itself. Remember that
    `dbca` is used for a variety of things, including adding instances to the database,
    registering the database with a Grid Control OMS, and configuring Database Vault—just
    to name a few.


    Be sure to configure your `$ORACLE_HOME/network/admin` in such a way as to ensure
    that subsequent runs of Autoconfig on the database tier do not compromise your
    TNS configuration. Fully communicate the configuration to anyone who may be running
    Autoconfig.


    Properly clone each `ORACLE_HOME` so that it is registered with the central inventory.
    If the clone process is not followed, then the Home will not be registered, and
    you will not be able to apply quarterly patch bundles to it.


    ## To DMA or Not to DMA


    Exadata is a different system for a DBA to administer. Some tasks in this environment,
    such as running the `exachk` script, require root O/S privileges. This script
    can be run by the system administrator, and this will be the case if you are managing
    Exadata as a DBA. However, a new role has emerged relative to Exadata, that of
    the Database Machine Administrator, or DMA. Let’s look at what being a DMA really
    means.


    In addition to the usual DBA skillset, the DMA must also be familiar with, and
    be able to understand, the following management and monitoring commands on the
    specified systems.


    On the compute nodes (database nodes):


    *   Linux: `top`, `mpstat`, `vmstat`, `iostat`, `fdisk`, `ustat`, `sar`, `sysinfo`

    *   Exadata: `dcli`

    *   ASM: `asmcmd`, `asmca`

    *   Clusterware: `crsctl`, `srvctl`


    On the storage servers/cells:


    *   Linux: `top`, `mpstat`, `vmstat`, `iostat`, `fdisk`, `ustat`, `sar`, `sysinfo`

    *   Cell management: `cellcli`, `cellsrvstat`


    Being a DMA also includes other areas of responsibility not associated with being
    a DBA. Table 14-1 summarizes the areas of responsibility for a DMA.


    **Table 14-1. DMA Responsibilities**


    | Skill | Percent |

    | --- | --- |

    | System Administrator | 15 |

    | Storage Administrator |   0 |

    | Network Administrator |   5 |

    | Database Administrator | 60 |

    | Cell Administrator | 20 |


    The “Percent” column indicates the percentage of the overall Exadata system requiring
    this knowledge, and as you can see if you’ve been an 11g RAC administrator, you
    have 60 percent of the skillset required to be a DMA. The remaining skills necessary
    to be a DMA are not difficult to learn and master. We have covered the Cell Administrator
    commands you will need (`cellcli`, `dcli`), which furnish you with 80 percent
    of the skillset. Networking commands that you may need are `ifconfig`, `iwconfig`,
    `netstat`, `ping`, `traceroute`, and `tracepath`. You may, at some time, also
    need `ifup` and `ifdown`, to bring up or bring down network interfaces, although
    using these commands will not be a regular occurrence. The following example shows
    how to bring up the `eth0` interface.


    ```

    # ifup eth0

    ```


    It seems like a daunting task, to become a DMA, but it really isn’t that difficult.
    It does require a slightly different mindset, as you are now looking at, and managing,
    the entire system, rather than just the database. There will still be a need for
    a dedicated System Administrator and Network Administrator for your Exadata system,
    because, as a DMA, you won’t be responsible for configuration of these resources,
    nor will you be responsible for patching and firmware upgrades. The DMA is, essentially,
    assisting these dedicated administrators by assuming the day-to-day tasks these
    resources would provide.


    ## What You Don’t Know, You Can Look Up


    The IT world changes very rapidly, so you can’t be expected to know it all. You
    can, however, know where to find information you need. The following resources
    are available to assist you in your journey through Exadata as a DBA or DMA.


    *   `http://tahiti.oracle.com`—The online Oracle documentation site

    *   `www.oracle.com/us/products/database/exadata/overview/index.html`—Oracle technology
    web site Exadata resources

    *   `www.tldp.org/LDP/GNU-Linux-Tools-Summary/html/c8319.htm`—Linux networking
    commands reference

    *   `www.yolinux.com/TUTORIALS/LinuxTutorialSysAdmin.html`—Linux system administration
    tutorial

    *   `https://support.oracle.com`—The My Oracle Support web site

    *   `http://blog.tanelpoder.com/category/exadata/`—Tanel Poder’s Exadata blog,
    from an expert in performance tuning on Exadata

    *   `http://kevinclosson.wordpress.com/kevin-closson-index/exadata-posts/`—Kevin
    Closson’s Exadata posts, an excellent resource for the storage tier

    *   `http://arup.blogspot.com/`—Arup Nanda’s blog, where you can search for Exadata-related
    posts

    *   `www.enkitec.com/`—The Enkitec blog, from a company specializing in Exadata
    and sponsoring yearly Exadata-centric conferences

    *   `http://jonathanlewis.wordpress.com/?s=exadata`—Jonathan Lewis’s excellent
    Exadata posts


    These are the resources we regularly consult when questions arise. You may find
    others you prefer, but these are excellent sites to start from.


    ## Things to Know


    This chapter is not designed to be a crash course in Exadata; rather, it’s intended
    to be a look back on areas we’ve covered, to bring a bit of perspective to your
    journey. When you began this odyssey, Exadata may have been just a name, shrouded
    in mystery and mentioned in reverent tones. As you progressed through this book,
    each step you took brought Exadata out of the fog and, hopefully, into focus,
    by replacing hype and rumor with fact and examples, so that you are now better
    prepared to assume the mantle of Exadata DBA or DMA.


