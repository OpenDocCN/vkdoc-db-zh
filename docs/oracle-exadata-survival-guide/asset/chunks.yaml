  trans: "# 第九章\n\n![image](img/frontdot.jpg)\n\n## 存储单元监控\n\n这里有三个这样的计数器，其中 `______`\
    \ 可以是 `user`、`CELLSRV` 或时区。这些计数器指示了启动智能扫描但转换为常规块 I/O 模式的次数。当这种情况发生时，块会传递到数据库服务器，并绕过单元处理。智能扫描实际上是在读取块，但没有在本地单元上进行任何处理，而是将它们发送到数据库服务器进行处理。除非存储单元上存在内存问题，否则您不应该看到这些计数器增加，因为直通处理不应该发生。如果这些计数器开始递增，这是一个很好的迹象，表明存在需要调查的存储单元级别的问题。\n\
    \n## 单元指标\n\n**直接发送到数据库节点以平衡 CPU 使用率的 cell 物理 IO 字节数**\n\n该计数器记录了 cell CPU 使用率过高导致\
    \ Oracle 选择回退到直通模式的次数，这使得数据库服务器执行常规块 I/O 以减轻存储单元的 CPU 负载。通常，您不应该看到此计数器增加。同样，如果它开始递增，则表明存在需要诊断的存储单元级别的问题。在旧版本的\
    \ Exadata 中，此计数器的名称为 `cell physical IO bytes pushed back due to excessive CPU\
    \ on cell`。\n\n**由单元处理的链接行**\n\n链接行在任何数据库中都可能是个问题，在 Exadata 中尤其如此，因为磁盘组跨所有可用磁盘条带化，并由每个可用存储单元访问。在未使用\
    \ ASM 的非 Exadata 数据库中，链接或延续行将位于另一个块中，但很可能与链头在同一个磁盘上。使用 ASM 和 Exadata 时，行的下一个片段可能位于另一个存储单元访问的另一个磁盘上。请记住，存储单元之间不通信，因此当\
    \ Oracle 遇到链接行时，智能扫描将在数据库层回退到常规块 I/O，以便处理该链接行。这对于链接行处理效率更高，但它确实会减慢智能扫描速度。链接行越多，智能扫描就越慢。如果智能扫描可以从行头片段获取所需的数据，那么智能扫描不会损失任何速度，并且处理将像往常一样流畅进行。如果\
    \ Oracle 需要访问该链接行的任何其他片段，则需要常规块 I/O，从而减慢智能扫描速度。\n\n此统计信息 `chained rows processed\
    \ by cell` 报告在存储单元内处理的链接行，即行片段（或至少是 Oracle 需要返回结果的那些片段）位于给定存储单元访问的存储范围内。这被称为块内链接，即行片段位于与行头相同的数据块中。这是行链接的一种特殊情况，适用于超过\
    \ 255 列的行。下一个片段与行头在同一个块中，无需额外操作即可获取。\n\n**由单元拒绝的链接行**\n\n该计数器记录了链接行的下一个片段不在同一个块或单元中的情况，如前一节所述。此统计信息在特殊情况下递增，因为在我们管理的系统中，我们不经常看到它递增。当此计数器递增时，智能扫描会回退到常规块\
    \ I/O 来处理该行。\n\n**由单元跳过的链接行**\n\n这是当智能扫描必须恢复为常规块 I/O 时最常递增的统计信息。同样，当找到链接行且剩余片段驻跨整个存储条带（跨越多个存储单元）时，它会递增。目前尚不清楚在此类情况下前一个计数器或此计数器何时应递增。我们发现，当智能扫描回退到常规块\
    \ I/O 来处理链接行时，此计数器最常递增。\n\n## SQL 语句性能\n\n了解 SQL 语句在执行期间的时间花费非常重要。`V$SQL`、`V$SQL_MONITOR`、`V$SQL_PLAN_MONITOR`\
    \ 和 `V$ACTIVE_SESSION_HISTORY` 是用于分析 SQL 语句性能的优秀视图。以下是使用 `V$SQL` 的示例，展示了查询如何受益于智能扫描优化：\n\
    \n```\nSQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes qualifying,\n\
    \  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes actual,\n\
    \  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes>\
    \ 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n------------- ----------\
    \ ---------- ------------ -------------------------------------\ngfjb8dpxvpuv6\
    \  185081856   42510928        22.97 select * from emp where empid = 7934\n\n\
    SQL>\n```\n\n请注意 `V$SQL` 中使用的以下列：\n\n*   `io_cell_offload_eligible_bytes`\n* \
    \  `io_cell_offload_returned_bytes`\n\n这两列告诉您有多少字节符合条件可以卸载，以及作为智能扫描卸载的结果实际返回了多少字节。提供的查询计算了节省的\
    \ I/O 字节占总符合条件字节的百分比，因此您可以看到智能扫描执行对所讨论查询的效率。\n\n## 需知事项\n\n本章的目的并非提供关于 Exadata\
    \ 的详尽性能调优参考，而是概述可用的指标和计数器、它们的含义以及何时应考虑使用它们。\n\n`cell` 指标提供了对语句性能以及 Exadata 如何执行语句的洞察。像\
    \ `cell blocks processed by data layer` 和 `cell blocks processed by index layer`\
    \ 这样的动态计数器显示了存储单元在处理过程中的效率。每当存储单元能够完成数据层和索引层处理而无需将数据传回数据库层时，这些计数器就会递增。存储单元将数据传回数据库服务器的两个原因是一致性读处理需要撤销块（常规块\
    \ I/O）和链接行处理中链接片段跨越存储单元的情况。虽然第一个条件无法完全控制（事务可能非常大，超过自动块清除阈值），但第二个问题，即链接行，是可以解决并可能纠正的。\n\
    \n`cell num fast response sessions` 和 `cell num fast response sessions continuing\
    \ to smart scan` 计数器揭示了 Oracle 选择推迟智能扫描而改用常规块 I/O 的次数，这是试图以最少的工作量返回请求的数据（列出的第一个计数器），以及当快速响应会话未能返回请求的数据后，Oracle\
    \ 实际启动智能扫描的次数。通过显示由于小型常规块 I/O 操作返回了请求的数据而避免智能扫描的频率，这些计数器可以让您洞察提交到 Exadata 数据库的语句的性质。\n\
    \n`V$SQL` 也提供了可用于确定语句效率的数据，位于 `io_cell_offload_eligible_bytes` 和 `io_cell_offload_returned_bytes`\
    \ 列中。这两列可用于计算智能扫描为给定查询实现的节省百分比。"
- fmt: '# 管理和监控 Exadata 存储单元


    ## 存储单元概述

    到目前为止，我们已经介绍了足够的 Exadata 架构知识，您已经了解到存储单元独立于数据库服务器，并提供自己的指标和计数器。由于数据库服务器不直接与存储通信，因此由存储单元负责向数据库服务器提供请求的数据。为了协助完成此任务，存储单元拥有自己的
    CPU 和内存，这些资源可提供额外的处理能力。它们还拥有自己的操作系统级用户账户，本章我们将关注其中的两个。


    感兴趣的账户是 `celladmin` 和 `cellmonitor`，具体使用哪个账户取决于任务的性质。您可能已经猜到，`cellmonitor` 账户可以访问计数器和指标，但不能执行任何管理任务。`celladmin`
    账户也可以访问指标和计数器，但还拥有启动和停止所有单元服务的管理权限。访问存储单元是真正监控单元性能并诊断与单元相关的性能问题的唯一方法。


    ## 与存储单元通信

    与存储单元通信需要登录到存储单元，Exadata 为此提供了两个专用账户。我们讨论的第一个账户是 `cellmonitor`，这是一个能够访问单元性能指标和计数器的账户。`cellmonitor`
    账户是存储服务器上的受限账户，仅能访问其主目录和有限的命令。我们将介绍的第二个账户是 `celladmin`，这是一个管理账户，在操作系统级别拥有更多的特权和对存储单元的访问权限。虽然数据库服务器不直接与存储设备通信，但可以使用
    `ssh` 从 Exadata 系统中的任何数据库服务器登录到每个可用的存储单元，以检查性能指标。


    ![image](images/sq.jpg) **Note** 由于存储服务器运行的是 Linux 内核，因此“root”账户也存在于每个可用的存储单元上，并且为该账户在
    Exadata 系统中的所有服务器配置了用户等效性（无需密码即可登录）。除非您是数据库机器管理员 (DMA)，否则您不太可能被授予“root”权限。在“root”访问权限与系统管理员
    (SA) 关联的企业中，DBA 通常可以访问 `celladmin` 和 `cellmonitor` 用户账户及其密码。本章我们将遵循基本的 SA/DBA
    职责分离原则进行介绍。


    ## 查找存储单元

    可用存储服务器的名称和 IP 地址可以在 Exadata 系统中任何数据库服务器的 `/etc/hosts` 文件中找到。以下示例展示了这些条目在 `/etc/hosts`
    文件中的样子。


    ```

    ### CELL Node Private Interface details

    123.456.789.3    myexa1cel01-priv.mydomain.com       myexa1cel01-priv

    123.456.789.4    myexa1cel02-priv.mydomain.com       myexa1cel02-priv

    123.456.789.5    myexa1cel03-priv.mydomain.com       myexa1cel03-priv

    123.456.789.6    myexa1cel04-priv.mydomain.com       myexa1cel04-priv

    123.456.789.7    myexa1cel05-priv.mydomain.com       myexa1cel05-priv

    123.456.789.8    myexa1cel06-priv.mydomain.com       myexa1cel06-priv

    123.456.789.9    myexa1cel07-priv.mydomain.com       myexa1cel07-priv

    ```


    一个简单的 `ssh` 命令即可让您以 `cellmonitor` 身份连接到其中一个可用的存储单元。


    ```

    ssh cellmonitor@myexa1cel04-priv.mydomain.com

    ```


    除非您配置了无密码 `ssh`，否则将需要输入密码。


    ```

    cellmonitor@myexa1cel04-priv.mydomain.com''s password:

    [cellmonitor@myexa1cel04 ∼]$

    ```


    您现在已使用 `cellmonitor` 账户连接到存储单元 4。连接到其余存储单元使用相同的过程，只是单元名称不同。所有存储单元上的可用命令都是相同的，但为了避免混淆，我们将仅提供一个单元的示例。


    ## 监控目标

    目标是监控和管理存储单元，确保诸如智能闪存缓存和智能扫描等区域正常运行。检查两个账户均可访问的指标对于确保 Exadata 以最佳性能运行，并且没有硬件/固件/配置错误给最终用户带来问题至关重要。


    ## 指标名称

    `cellsrvstat` 报告的单元指标名称相当详细，因此应该不难理解。例如，在我们看来，智能 I/O 指标的名称清晰且具有描述性。


    ```

    Number of active smart IO sessions

    High water mark of smart IO sessions

    Number of completed smart IO sessions

    Smart IO offload efficiency (percentage)

    Size of IO avoided due to storage index (KB)

    Current smart IO to be issued (KB)

    Total smart IO to be issued (KB)

    Current smart IO in IO (KB)

    Total smart IO in IO (KB)

    Current smart IO being cached in flash (KB)

    Total smart IO being cached in flash (KB)

    Current smart IO with IO completed (KB)

    Total smart IO with IO completed (KB)

    Current smart IO being filtered (KB)

    Total smart IO being filtered (KB)

    Current smart IO filtering completed (KB)

    Total smart IO filtering completed (KB)

    Current smart IO filtered size (KB)

    Total smart IO filtered (KB)

    Total cpu passthru output IO size (KB)

    Total passthru output IO size (KB)

    Current smart IO with results in send (KB)

    Total smart IO with results in send (KB)

    Current smart IO filtered in send (KB)

    Total smart IO filtered in send (KB)

    Total smart IO read from flash (KB)

    Total smart IO initiated flash population (KB)

    Total smart IO read from hard disk (KB)

    Total smart IO writes (fcre) to hard disk (KB)

    Number of smart IO requests < 512KB

    Number of smart IO requests >= 512KB and < 1MB

    Number of smart IO requests >= 1MB and < 2MB

    Number of smart IO requests >= 2MB and < 4MB

    Number of smart IO requests >= 4MB and < 8MB

    Number of smart IO requests >= 8MB

    Number of times smart IO buffer reserve failures

    Number of times smart IO request misses

    Number of times IO for smart IO not allowed to be issued

    Number of times smart IO prefetch limit was reached

    Number of times smart scan used unoptimized mode

    Number of times smart fcre used unoptimized mode

    Number of times smart backup used unoptimized mode

    ```


    这样的指标使得评估（例如）智能 I/O 性能变得容易，因为没有指标使用不清晰的缩写或可能无法准确反映所报告统计性质的名称。


    如果没有 `DETAIL` 关键字，`cellcli` 接口的输出可能难以阅读。这就是我们更喜欢使用 `DETAIL` 的原因，除非我们正在查找特定指标并希望获得属性的简短列表。下一节将提供
    `cellcli` 生成的两种版本的输出。


    ## 基础监控：作为 cellmonitor

    当以 `cellmonitor` 身份连接时，您可以使用 CellCLI，这是用于监控存储单元的命令行界面。在 `CellCLI>` 提示符下键入 `help`
    可以生成完整的命令列表。


    ```

    [cellmonitor@myexa1cel04 ∼]$ cellcli

    CellCLI: Release 11.2.3.2.1 - Production on Wed Aug 07 13:19:59 CDT 2013


    Copyright (c) 2007, 2012, Oracle.  All rights reserved.

    Cell Efficiency Ratio: 234


    CellCLI> help

    ```'
  raw: 'By now, we’ve covered Exadata architecture enough for you to know that the
    storage cells are independent of the database servers and provide their own metrics
    and counters. Since the database servers don’t directly communicate with the storage,
    it’s up to the storage cells to provide the database servers with the requested
    data. To help with that task, the storage cells have their own CPUs and memory,
    which provide additional resources to assist in the processing of data. They also
    have their own O/S-level user accounts, two of which we will concern ourselves
    with in this chapter.


    The accounts of interest are `celladmin` and `cellmonitor`, and the nature of
    the  task determines which of the two accounts you will use. As you could probably
    guess, the `cellmonitor` account can access the counters and metrics but cannot
    perform any administrative tasks. The `celladmin` account, too, can access the
    metrics and counters but also has administrative privileges to start and stop
    all cell services. Accessing the storage cells is the only way to truly monitor
    cell performance and diagnose cell-related performance issues.


    Talking to the Storage Cells


    Communicating with the storage cells will require logging in to the storage cells,
    and Exadata provides two specialized accounts for that purpose. The first account
    we will discuss is the `cellmonitor` account, an account capable of accessing
    cells’ performance metrics and counters. The `cellmonitor` account is a restricted
    account on the storage servers, having access only to its home directory and limited
    executable commands. The second account we will cover is `celladmin` , an administrative
    account with far more privilege and access to the storage cells at the operating-system
    level. Although the database servers do not directly communicate with the storage
    devices, it is possible to use `ssh` to log in to each available storage cell
    from any database server in the Exadata system, to check performance metrics.


    ![image](images/sq.jpg) **Note**  As the storage servers are running a Linux kernel,
    the “root” account also exists on each available storage cell, and user equivalence
    (the ability to log in without a password) is configured for all servers in the
    Exadata system for that account. Unless you are a database machine administrator
    (DMA), you won’t likely be granted “root” privileges. For enterprises where “root”
    access is associated with the system administrator (SA), the DBA will usually
    have access to both the `celladmin` and `cellmonitor` user accounts and their
    passwords. We will proceed with this chapter using the basic SA/DBA separation
    of duties.


    Where Shall I Go?


    The names and IP addresses of the available storage servers can be found in the
    `/etc/hosts` file on any of the database servers in the Exadata system. An example
    of how these entries would appear in the `/etc/hosts` file follows.


    ```

    ### CELL Node Private Interface details

    123.456.789.3    myexa1cel01-priv.mydomain.com       myexa1cel01-priv

    123.456.789.4    myexa1cel02-priv.mydomain.com       myexa1cel02-priv

    123.456.789.5    myexa1cel03-priv.mydomain.com       myexa1cel03-priv

    123.456.789.6    myexa1cel04-priv.mydomain.com       myexa1cel04-priv

    123.456.789.7    myexa1cel05-priv.mydomain.com       myexa1cel05-priv

    123.456.789.8    myexa1cel06-priv.mydomain.com       myexa1cel06-priv

    123.456.789.9    myexa1cel07-priv.mydomain.com       myexa1cel07-priv

    ```


    A simple `ssh` command connects you to one of the available storage cells as `cellmonitor`.


    ```

    ssh cellmonitor@myexa1cel04-priv.mydomain.com

    ```


    Unless you have passwordless `ssh` configured, a password will be required.


    ```

    cellmonitor@myexa1cel04-priv.mydomain.com''s password:

    [cellmonitor@myexa1cel04 ∼]$

    ```


    You are now connected to storage cell 4, using the `cellmonitor` account. Connecting
    to the remaining storage cells uses the same procedure, just a different cell
    name. The available commands are the same on all storage cells, but we will provide
    examples from only one cell, to avoid possible confusion.


    What Shall I Do?


    The goal is to monitor and manage the storage cells, so that areas such as the
    Smart Flash Cache and Smart Scans are functioning normally. Examining the metrics
    available to both accounts is necessary, to ensure that Exadata is performing
    at its peak and no hardware/firmware/configuration errors are causing problems
    for the end users.


    What’s in a Name?


    The cell metric names reported by `cellsrvstat` are fairly verbose, so they should
    not be difficult to understand. For example, the Smart I/O metrics have, in our
    estimation, clear and descriptive names.


    ```

    Number of active smart IO sessions

    High water mark of smart IO sessions

    Number of completed smart IO sessions

    Smart IO offload efficiency (percentage)

    Size of IO avoided due to storage index (KB)

    Current smart IO to be issued (KB)

    Total smart IO to be issued (KB)

    Current smart IO in IO (KB)

    Total smart IO in IO (KB)

    Current smart IO being cached in flash (KB)

    Total smart IO being cached in flash (KB)

    Current smart IO with IO completed (KB)

    Total smart IO with IO completed (KB)

    Current smart IO being filtered (KB)

    Total smart IO being filtered (KB)

    Current smart IO filtering completed (KB)

    Total smart IO filtering completed (KB)

    Current smart IO filtered size (KB)

    Total smart IO filtered (KB)

    Total cpu passthru output IO size (KB)

    Total passthru output IO size (KB)

    Current smart IO with results in send (KB)

    Total smart IO with results in send (KB)

    Current smart IO filtered in send (KB)

    Total smart IO filtered in send (KB)

    Total smart IO read from flash (KB)

    Total smart IO initiated flash population (KB)

    Total smart IO read from hard disk (KB)

    Total smart IO writes (fcre) to hard disk (KB)

    Number of smart IO requests < 512KB

    Number of smart IO requests >= 512KB and < 1MB

    Number of smart IO requests >= 1MB and < 2MB

    Number of smart IO requests >= 2MB and < 4MB

    Number of smart IO requests >= 4MB and < 8MB

    Number of smart IO requests >= 8MB

    Number of times smart IO buffer reserve failures

    Number of times smart IO request misses

    Number of times IO for smart IO not allowed to be issued

    Number of times smart IO prefetch limit was reached

    Number of times smart scan used unoptimized mode

    Number of times smart fcre used unoptimized mode

    Number of times smart backup used unoptimized mode

    ```


    Such metrics make it an easy task to evaluate, for example, Smart I/O performance,
    as none of the metrics uses unclear abbreviations or names that may not accurately
    reflect the nature of the statistics reported.


    Output from the `cellcli` interface can be difficult to read without the `DETAIL`
    keyword. This is why we prefer to use `DETAIL`, unless we are looking for specific
    metrics and want an abbreviated list of attributes. Both versions of the output
    produced from `cellcli` are provided in the next section.


    Monitoring Basics


    As cellmonitor


    Available to you when connected as `cellmonitor` is CellCLI, the command-line
    interface to monitor the storage cell. A complete list of commands can be generated
    by typing `help` at the `CellCLI>` prompt.


    ```

    [cellmonitor@myexa1cel04 ∼]$ cellcli

    CellCLI: Release 11.2.3.2.1 - Production on Wed Aug 07 13:19:59 CDT 2013


    Copyright (c) 2007, 2012, Oracle.  All rights reserved.

    Cell Efficiency Ratio: 234


    CellCLI> help'
