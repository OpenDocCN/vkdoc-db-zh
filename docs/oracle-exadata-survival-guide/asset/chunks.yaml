    \ I/O 校准统计信息，从而使自动 DOP 不再起作用。在统计信息被删除时处于队列中的语句将保留在队列中直到被执行；在 I/O 校准统计信息被删除后，不会有额外的语句被加入队列。这并不像乍看起来那样是一种激烈的措施，因为\
