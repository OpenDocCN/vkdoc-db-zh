- fmt: '# Smart Flash Cache


    ## Flash Me


    The Smart Flash Cache provides Exadata with the ability to deliver a high I/O-per-second
    (IOPS) rate, by caching frequently accessed data and allowing it to be read directly
    from flash memory, rather than from disk or RAM. It does this by caching frequently
    used table and index blocks for later use, thus absorbing the work repeated reads
    can create. Control file reads and writes, along with file header reads and writes,
    are also cached. Unlike conventional systems, though, the flash cache is smart
    and won’t cache duplicate blocks written for ASM redundancy, nor will it cache
    I/O related to backup processes and data-pump exports.


    The Smart Flash Cache behaves like a disk, but it isn’t one. Comprising 4 Sun
    Flash PCIe cards per storage cell, each with 96GB of flash storage, the Smart
    Flash Cache totals 384GB of available space. For the X3 Eighth Rack configuration,
    the total flash storage is 4.8TB, and for the Quarter Rack configuration, the
    total flash storage available is 2.4TB. An X3 Half Rack has 11.2TB of flash storage,
    and the Full Rack provides 22.4TB. By comparison, the X2 Exadata Quarter Rack
    configuration has 1.1TB of available flash storage, and the Half Rack has 2.6TB,
    with the Full Rack providing 5.3TB. A basic block diagram of one of the cards
    is shown in [Figure 4-1](#9781430260103_Ch04.xhtml#Fig1).


    ![9781430260103_Fig04-01.jpg](images/9781430260103_Fig04-01.jpg)


    [Figure 4-1](#9781430260103_Ch04.xhtml#_Fig1). Sun Flash Accelerator F20 PCIe
    Card block diagram


    At installation, the Exadata system is configured with almost all of the PCIe
    flash storage used as flash cache, with a small portion of this storage configured
    for flash logs. The DBA can, fairly easily, reconfigure the flash cache by resizing
    it, rebuilding it, or creating flash “disks” accessible to ASM. Smart Flash Cache
    is built on flash disks, which are not the same as the virtual flash disks a DBA
    can create to provide flash storage usable by ASM. Connecting to a storage cell
    and viewing the flash-cache detail using `CellCLI` shows the composition of the
    configured flash cache:


    ```

    CellCLI> list flashcache detail

             name:                   myexa1cel01_FLASHCACHE

             cellDisk:               FD_07_myexa1cel01,FD_12_myexa1cel01,FD_15_myexa1cel01,FD_13_myexa1cel01,FD_04_myexa1cel01,FD_14_myexa1cel01,FD_00_myexa1cel01,FD_10_myexa1cel01,FD_03_myexa1cel01,FD_09_myexa1cel01,FD_08_myexa1cel01,FD_02_myexa1cel01,FD_01_myexa1cel01,FD_11_myexa1cel01,FD_05_myexa1cel01,FD_06_myexa1cel01

             creationTime:           2013-03-16T12:16:39-05:00

             degradedCelldisks:

             effectiveCacheSize:     364.75G

             id:                     3dfc24a5-2591-43d3-aa34-72379abdf3b3

             size:                   364.75G

             status:                 normal


    CellCLI>

    ```


    Sixteen disks are used per storage cell, to build the Smart Flash Cache. Each
    Sun PCIe card has 4 such disks, each one 32GB in size, with 24GB of that as addressable,
    nonvolatile memory. Even though there is a total of 384GB of flash storage, notice
    that 19.25GB are reserved for flash log and other uses, which makes 22.875GB of
    flash storage available for flash-cache creation. Each card also contains 64MB
    of DRAM, used to buffer writes to the nonvolatile memory, and an Energy Storage
    Module (ESM). This module is actually a capacitor, which can provide enough power
    to flush data from the buffer to the nonvolatile memory, in the event of a power
    outage. Should the ESM fail, the volatile buffer area will be bypassed, allowing
    direct writes to the nonvolatile memory. As long as the flash disks are configured
    as Smart Flash Cache, losing the ESM poses no write penalties; the storage software
    treats Smart Flash Cache as a write-through cache, bypassing it and writing directly
    to disk. In the event that the flash disks are configured into a flash disk group,
    loss of the ESM will incur write penalties, as the dynamic cache is no longer
    available.


    The expected lifetime of these PCIe cards is two years, since the ESM will lose
    its ability to hold a charge. Sun documentation states that these cards can be
    replaced without shutting down the system; Oracle Exadata documentation recommends
    the affected storage servers be powered down before such maintenance begins. Remember
    that the ASM fail groups are configured so that loss of one storage cell doesn’t
    affect the running databases.


    Rebuilding the flash cache for a storage cell using the `create flashcache all`
    command creates the same storage distribution found after Exadata installation;
    the DBA can create a smaller Smart Flash Cache on a storage cell, by specifying
    the `size` parameter, but not a larger one.


    ## How It Works


    The Smart Flash Cache is a per-cell caching mechanism, optimized for frequently
    accessed data. Whether an object will be considered for Smart Flash Cache use
    is determined in part by the `CELL_FLASH_CACHE` storage parameter set at object
    creation. Look at the `CREATE TABLE` statement for the `EMP` demonstration table:


    ```

    CREATE TABLE "BING"."EMP"

      (    "EMPNO" NUMBER(4,0) NOT NULL ENABLE,

           "ENAME" VARCHAR2(10),

           "JOB" VARCHAR2(9),

           "MGR" NUMBER(4,0),

           "HIREDATE" DATE,

           "SAL" NUMBER(7,2),

           "COMM" NUMBER(7,2),

           "DEPTNO" NUMBER(2,0)

      ) SEGMENT CREATION IMMEDIATE

      PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

     NOCOMPRESS LOGGING

      STORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645

      PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1

      BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)

      TABLESPACE "USERS" ROWDEPENDENCIES

    ```


    There are three possible values for this storage parameter, with `DEFAULT` conveniently
    being the default. This setting tells Oracle to utilize the Smart Flash Cache
    in the normal mode, caching data using the provided caching criteria and aging
    out cached data in accordance with the appropriate retention policy. In the case
    of the `DEFAULT` setting, this would be using a prioritized Least-Recently-Used
    algorithm (the oldest data is aged out first, a common LRU configuration). There
    are two other settings to which this storage parameter may be set: `KEEP` and
    `NONE`. The `KEEP` setting changes the LRU algorithm by maintaining the data in
    the cache for as long as possible, but, to prevent `KEEP` data from hogging the
    cache, no more than 80 percent of the configured cache is available for data tagged
    as `KEEP`. Unused `KEEP` blocks that exceed the additional aging policy are purged.
    Setting `CELL_FLASH_CACHE` to `NONE` disables the use of the Smart Flash Cache
    for that object.


    Each read or write operation is associated with the following additional information:


    *   The `CELL_FLASH_CACHE` setting for the associated object

    *   A cache hint based on the purpose of the request. The available hints are:'
