- fmt: 'Steps 6, 7, and 8 perform necessary validation of the InfiniBand connectivity,
    storage cell configuration, and InfiniBand inter-process connectivity (`IPC`)
    between the database servers and the storage cells. Step 8 performs this validation
    by checking how the `oracle` executables are linked. `IPC` over `InfiniBand` is
    set by linking the `oracle` kernels with the `ipc_rds` option, and if this option
    is missing, `IPC` occurs over the non-`InfiniBand` network layer. Unfortunately,
    most database patches that relink the kernel do not include this parameter, because,
    I suspect, they are intended for non-Exadata systems. Thus, patching the `oracle`
    software can result in a loss of this connectivity, which can create performance
    issues by using a much slower network connection for `IPC`. The situation is easily
    rectified by relinking the `oracle` kernel with the `ipc_rds` option. One way
    to ensure that this occurs is to edit the script from the patchset where the `oracle`
    kernel is relinked. Another option is to simply perform another relink with the
    `ipc_rds` option before releasing the database to the users. The exact statement
    to use, copied from the command line on the database server, follows:


    ```

    $ make -f $ORACLE_HOME/rdbms/lib/ins_rdbms.mk ipc_rds

    ```


    This is also a check that the `exachk` script executes and output from that report
    lists the `oracle` kernels, which are not linked to provide `RDS` over `InfiniBand`
    connectivity.


    Step 9 calibrates the storage, and it is a very important step. Each available
    storage cell has this run. First, `CELLSRV` is shut down, then the `calibrate`
    process is run. Output similar to the following will be generated.


    ```

    CellCLI> calibrate;

    Calibration will take a few minutes...

    Aggregate random read throughput across all hard disk luns: 137 MBPS

    Aggregate random read throughput across all flash disk luns: 2811.35 MBPS

    Aggregate random read IOs per second (IOPS) across all hard disk luns: 1152

    Aggregate random read IOs per second (IOPS) across all flash disk luns: 143248

    Controller read throughput: 5477.08 MBPS

    Calibrating hard disks (read only) ...

    Calibrating flash disks (read only, note that writes will be significantly slower)
    ...

    ...

    ```


    Once the `calibrate` step is complete for all storage cells, the cell disks and
    grid disks can be created, which is Step 12. Before that, though, the `oracle`
    O/S user is created, and the associated passwordless `ssh` access is established
    with Steps 10 and 11. After these steps complete, the grid disk partitions are
    created in Step 12, so they can be recognized by `ASM`. This is where your new
    setting takes effect and the desired ratio between `+DATA_MYEXA1` and `+RECO_MYEXA1`
    is established.


    Next in line is setting up the `GRID` home by installing the `GRID` software (Step
    13), patching the `GRID` home (step 14), relinking the `GRID` `oracle` executable
    to provide `IPC` over `InfiniBand` (Step 15), and running the `GRID` `root.sh`
    scripts (Step 16). These are the same actions you would take (with the exception
    of Step 15) on any other `GRID` installation. After the `GRID` software is installed
    and configured, the database software is installed and patched (Steps 17 and 18).
    Again, these are steps you would take on any system when you install and patch
    `Oracle` database software.


    Since the grid disks are now created, it’s a simple task to get `ASM` to recognize
    them and create the `+DATA_MYEXA1`, `+RECO_MYEXA1`, and `+DBFS_DG` disk groups
    in Step 19. This paves the way for creation of the `DBM` cluster database in Step
    20, which is the default database provided with a `bare metal` Exadata installation.
    It is possible to change this database name in the configuration worksheet, but
    we haven’t seen any installations where `DBM` isn’t an available database. Once
    the `DBM` database is created, selected accounts are unlocked (Step 21), and a
    final relink of the `DBM` `oracle` executable, to ensure `IPC` over `InfiniBand`
    is functional, is executed (Step 22). The `GRID` Infrastructure is `locked` against
    any configuration changes in Step 23, then, in Step 24, any security fixes/patches
    are applied to the database home.


    Step 25 may or may not be executed, and that depends on whether your enterprise
    has decided to allow `Oracle` direct access to Exadata via the Auto Service Request
    (`ASR`) server. This requires that a separate server be configured to communicate
    with Exadata to monitor the system and report back to `Oracle` any issues it finds,
    automatically generating a service request to address the issue. Such issues would
    be actual or impending hardware failures (disk drives, Sun PCIe cards, memory).
    The service request generates a parts order and dispatches a service technician
    to install the failed or failing parts. If you don’t have a server configured
    for this, the step runs then terminates successfully, without performing any actions.
    If you do want this service and have the required additional server installed,
    this step configures the service with the supplied My `Oracle` Support credentials
    and tests to ensure the credentials are valid.


    Step 26 sets up any desired cell alerts via e-mail. It requires a valid e-mail
    address that it uses and verifies. Having cell alerts e-mailed to you is convenient;
    you won’t need to connect to the individual cells to list the alert history, so
    it saves time. This, too, is an optional step; you do not have to configure cell
    alerts to be e-mailed to you, but it is recommended.


    At this point, your Exadata system is back to the state it was when it was installed,
    with the exception of the storage percentages that you modified. It’s now time
    to restore the `oracle` O/S user home you had prior to starting this process.


    ## Restore


    Now that the storage has been reconfigured, it’s time to address the re-created
    `oracle` O/S user homes and the reset `oracle` O/S password. Remember that the
    `oracle` O/S user was dropped as the last step of clearing the old storage configuration.
    Presumably you are still connected as `root`, so at the shell prompt on each database
    server, you will type the following:


    ```

    # passwd oracle

    ```


    This will prompt you for the new `oracle` O/S user password, twice for confirmation.
    Because passwordless `ssh` access is configured for the `root` account, you can
    use `ssh` to connect to all other database servers from your `home base` on node
    1. For those not familiar with `ssh`, the following command will connect you to
    database server 2:


    ```

    # ssh myexa1db02

    ```


    Change the destination server name to connect to the remaining database servers.


    It is now time to restore the previous `oracle` O/S user home files and configuration.
    Use `su` to connect as `oracle`. This will also put you at the user’s home directory.
    If you used `tar` to archive the directory and its contents, the following command
    will restore the archived items:


    ```

    $ tar xvf /tmp/oraclehome.tar . | tee oraclehome_restore.log

    ```'
