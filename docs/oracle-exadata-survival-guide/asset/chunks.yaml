    只要安装了用于 Exadata 存储服务器的系统监控插件，也可以使用 OEM 12c 来监控存储单元。虽然它可能不提供命令行界面报告的所有指标，但它能以图形化的方式展示指标值随时间变化的情况。遗憾的是，我们无法访问安装了此插件的\
    \ OEM 环境。\n\n![image](img/sq.jpg) **注意** 由于我们无法使用该插件，我们的“选择”是命令行界面。其他人可能会选择 OEM\
    \ 以获得其提供的图形化展示。最终的选择权在您手中。作为老派的 DBA，我们更喜欢脚本而非“花哨”的图形工具。\n\n## 添加操作系统指标\n\nOracle\
    \ 在收集性能统计信息和指标方面做得相当不错，但有时，尤其是在遇到 Bug 情况时，Oracle 也可能出错。它在收集和报告底层 I/O 数据（例如操作系统层面提供的数据）方面也存在一些问题。在这些情况下，我们会求助于\
    \ `iostat`，这是一个操作系统级别的实用程序，可以报告 I/O 请求的等待时间和服务时间，而这是 Oracle 无法做到的。\n\n`iostat`\
    \ 实用程序可以生成两种类型的报告，一种是关于 CPU 利用率的，另一种是关于设备利用率的。当不带参数调用 `iostat` 时，这两种类型会合并到一个输出块中，示例如下。\n\
