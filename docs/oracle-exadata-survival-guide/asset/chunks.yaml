  trans: "\n观察哪些操作会触发不同的单元等待事件是很有趣的。这些信息可以从 `DBA_HIST_ACTIVE_SESS_HISTORY` 视图以及 `V$SYSTEM_EVENT`\
    \ 中获取。很可能并非表 7-1 中列出的每个事件都会在 `DBA_HIST_ACTIVE_SESS_HISTORY` 中被报告；然而，一个事件可能由多个计划操作触发。我们用来生成事件及相关操作列表的查询如下：\n\
    \n```\nSQL> select event , non_exa_event, operation ,count(*)\n  2  from\n  3\
    \  (select event,\n  4          decode(event, 'cell smart table scan','',\n  5\
    \  'cell smart index scan','',\n  6  'cell statistics gather','',\n  7  'cell\
    \ smart incremental backup','',\n  8  'cell smart file creation','',\n  9  'cell\
    \ smart restore from backup','',\n 10  'cell single block physical read','db file\
    \ sequential read',\n 11  'cell multiblock physical read','db file scattered read',\n\
    \ 12  'cell list of blocks physical read','db file parallel read',\n 13  'cell\
    \ manager opening cell','',\n 14  'cell manager closing cell','',\n 15  'cell\
    \ manager discovering disks','',\n 16  'cell worker idle','',\n 17  'cell smart\
    \ flash unkeep','',\n 18  'cell worker online completion','',\n 19  'cell worker\
    \ retry','',\n 20  'cell manager cancel work request','') non_Exa_event,\n 21\
    \          sql_plan_operation||' '||sql_plan_options operation\n 22  from dba_hist_active_sess_history\n\
    \ 23  where event like 'cell%')\n 24  where operation <> ' '\n 25  group by event,\
    \ non_exa_event, operation\n 26  order by 1\n 27  /\n```\n\n![image](img/Table7-1.jpg)\n\
    \n该列表还包含等效的非 Exadata 事件（如果存在）。在接下来的章节中，将讨论这些事件、它们等效的非 Exadata 事件、描述以及它们提供的各种参数。\n\
    \n# 用户 I/O 事件\n\n每个事件都与一个等待类相关联；单元事件有四个不同的等待类。单元事件中最主要的等待类是用户 I/O 类，十七个事件中有七个属于该类。我们将在本节中查看该类中的每个事件，并了解它报告了什么。\n\
    \n## 单元智能表扫描\n\n`cell smart table scan` 事件记录因全表扫描卸载到存储单元而产生的等待时间。因为它可用于确定某个语句是否利用了智能扫描，并因此受益于卸载，所以它可能是\
    \ Exadata 系统中最重要的等待事件。请记住，卸载只发生在直接路径读取期间，因此该事件通常会取代 `direct path read` 事件。这并不是说你在\
    \ Exadata 系统上看不到 `direct path read` 事件，但更有可能看到时间被记录在 `cell smart table scan` 事件上。由于这是直接路径读取，它直接将数据返回给请求它的用户进程的程序全局区\
    \ (PGA)，这包括并行从属进程。\n\n与非 Exadata 系统相比，InfiniBand 网络的使用改变了直接路径读取的实际机制。对存储单元的每个直接路径读取请求还包含对选择列表、连接谓词（如果存在）和查询谓词的引用。这允许存储服务器在“移交”结果给数据库服务器之前过滤数据并执行列投影。智能扫描处理的每个数据块都应用了这些优化；请求它的数据库服务器进程处理这些数据。数据还可以访问\
    \ ASM 区图，因此它们可以从每个存储单元请求必要的分配单元 (AU)。然后存储单元按请求顺序读取这些分配单元，并对每个 AU 应用智能扫描优化，返回满足所提供过滤条件的行的投影列。正如预期的那样，当执行大型扫描时，该事件会反复出现。\n\
    \n10046 跟踪是查看此事件被记录的一个很好来源。我们提供了一个大型表并行扫描的一小部分，如下所示：\n\n```\nWAIT #46969064935512:\
    \ nam='cell smart table scan' ela= 794053 cellhash#=88802347 p2=0 p3=0 obj#=133235\
    \ tim=1371608209311673\nWAIT #46969064935512: nam='cell smart table scan' ela=\
    \ 151 cellhash#=88802347 p2=0 p3=0 obj#=133235 tim=1371608209317400\nWAIT #46969064935512:\
    \ nam='PX Deq: Execution Msg' ela= 80 sleeptime/senderid=268566527 passes=1 p3=7325501352\
    \ obj#=133235 tim=1371608209321134\nWAIT #46969064935512: nam='cell smart table\
    \ scan' ela= 116 cellhash#=88802347 p2=0 p3=0 obj#=133235 tim=1371608209321618\n\
    WAIT #46969064935512: nam='cell smart table scan' ela= 39049 cellhash#=88802347\
    \ p2=0 p3=0 obj#=133235 tim=1371608209360713\nWAIT #46969064935512: nam='PX Deq:\
    \ Execution Msg' ela= 138 sleeptime/senderid=268566527 passes=1 p3=7325501352\
    \ obj#=133235 tim=1371608209361123\nWAIT #46969064935512: nam='cell smart table\
    \ scan' ela= 126 cellhash#=398250101 p2=0 p3=0 obj#=133235 tim=1371608209361740\n\
    WAIT #46969064935512: nam='cell smart table scan' ela= 39318 cellhash#=398250101\
    \ p2=0 p3=0 obj#=133235 tim=1371608209401129\nWAIT #46969064935512: nam='PX Deq:\
    \ Execution Msg' ela= 84 sleeptime/senderid=268566527 passes=1 p3=7325501352 obj#=133235\
    \ tim=1371608209401312\nWAIT #46969064935512: nam='cell smart table scan' ela=\
    \ 100 cellhash#=398250101 p2=0 p3=0 obj#=133235 tim=1371608209401875\nWAIT #46969064935512:\
    \ nam='cell smart table scan' ela= 44604 cellhash#=398250101 p2=0 p3=0 obj#=133235\
    \ tim=1371608209446549\nWAIT #46969064935512: nam='PX Deq: Execution Msg' ela=\
    \ 76 sleeptime/senderid=268566527 passes=1 p3=7325501352 obj#=133235 tim=1371608209446719\n\
    WAIT #46969064935512: nam='cell smart table scan' ela= 120 cellhash#=2520626383\
    \ p2=0 p3=0 obj#=133235 tim=1371608209447214\nWAIT #46969064935512: nam='cell\
    \ smart table scan' ela= 223022 cellhash#=2520626383 p2=0 p3=0 obj#=133235 tim=1371608209670288\n\
    WAIT #46969064935512: nam='PX Deq: Execution Msg' ela= 82 sleeptime/senderid=268566527\
    \ passes=1 p3=7325501352 obj#=133235 tim=1371608209670463\nWAIT #46969064935512:\
    \ nam='cell smart table scan' ela= 103 cellhash#=2520626383 p2=0 p3=0 obj#=133235\
    \ tim=1371608209670967\nWAIT #46969064935512: nam='cell smart table scan' ela=\
    \ 5520 cellhash#=2520626383 p2=0 p3=0 obj#=133235 tim=1371608209676590\nWAIT #46969064935512:\
    \ nam='PX Deq: Execution Msg' ela= 90 sleeptime/senderid=268566527 passes=1 p3=7325501352\
    \ obj#=133235 tim=1371608209676760\nWAIT #46969064935512: nam='cell smart table\
    \ scan' ela= 161 cellhash#=398250101 p2=0 p3=0 obj#=133235 tim=1371608209677348\n\
    WAIT #46969064935512: nam='cell smart table scan' ela= 43339 cellhash#=398250101\
    \ p2=0 p3=0 obj#=133235 tim=1371608209720745\nWAIT #46969064935512: nam='PX Deq:\
    \ Execution Msg' ela= 113 sleeptime/senderid=268566527 passes=1 p3=7325501352\
    \ obj#=133235 tim=1371608209720974\nWAIT #46969064935512: nam='cell smart table\
    \ scan' ela= 132 cellhash#=2520626383 p2=0 p3=0 obj#=133235 tim=1371608209721594\n\
    WAIT #46969064935512: nam='cell smart table scan' ela= 9462 cellhash#=2520626383\
    \ p2=0 p3=0 obj#=133235 tim=1371608209731125\nWAIT #46969064935512: nam='PX Deq:\
    \ Execution Msg' ela= 102 sleeptime/senderid=268566527 passes=1 p3=7325501352\
    \ obj#=133235 tim=1371608209731327\nWAIT #46969064935512: nam='cell smart table\
    \ scan' ela= 84 cellhash#=2520626383 p2=0 p3=0 obj#=133235 tim=1371608209732040\n\
