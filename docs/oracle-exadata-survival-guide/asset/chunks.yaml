    myexa1cel04,FD_05_myexa1cel04,FD_01_myexa1cel04,FD_13_myexa1cel04,FD_04_myexa1cel04,FD_11_myexa1

    cel04,FD_15_myexa1cel04,FD_07_myexa1cel04,FD_14_myexa1cel04,FD_09_myexa1cel04,FD_06_myexa1cel04

             creationTime:           2013-07-09T17:33:53-05:00

             degradedCelldisks:

             effectiveCacheSize:     1488.75G

             id:                     7af2354f-1e3b-4932-b2be-4c57a1c03f33

             size:                   1488.75G

             status:                 normal

    CellCLI>

    ```


    The output is formatted at one line per attribute, with the names provided, so
    you know which attribute has what value. Looking at the attributes, the size is
    reported, and it’s less than the 1600GB the Smart Flash Cache has in total. This
    is not a problem,  since Flash Log is also configured from the Smart Flash Cache
    storage and consumes 512MB of the total cache size. Flash Log enables Oracle to
    write redo to both the redo logfiles and the flash storage, to speed up transaction
    processing. The writes that complete first signal Oracle that the transaction
