  raw: 'HCC works differently than the two options mentioned earlier in this chapter,
    as it reorganizes data into Compression Units (CU). How it works will be discussed
    in the next section. For the moment, we will concentrate on implementing HCC in
    its four forms and on how those forms differ. There are two basic types under
    the HCC banner, QUERY and ARCHIVE, each having the options of HIGH and LOW. The
    first pair of HCC options we will discuss falls under the QUERY type. We will
    then discuss the ARCHIVE type.


    QUERY


    This type is less aggressive than ARCHIVE, but it still initially compresses data
    more than OLTP compression. We first compress our EMP table forQUERY HIGH:


    ```

    SQL>

    SQL> --

    SQL> -- Current storage for the EMP table

    SQL> -- (this is simply a test table for this example)

    SQL> --

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                   713031680

    EMP_IDX                               478150656

    SALGRADE                                  65536


    Elapsed: 00:00:00.82

    SQL>

    SQL> --

    SQL> -- Compress the table for query high (use HCC)

    SQL> --

    SQL> -- Note elapsed time to compress

    SQL> --

    SQL> alter table emp move compress for query high;


    Table altered.


    Elapsed: 00:00:35.65

    SQL>

