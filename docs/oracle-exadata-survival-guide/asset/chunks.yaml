- fmt: "A supplied package, `DBMS_RESOURCE_MANAGER`, provides the `CALIBRATE_IO` procedure\
    \ that is used to generate a random read-only workload across all RAC instances\
    \ on the cluster. The procedure takes five parameters, two input values (number\
    \ of disks and maximum estimated disk latency), and three output variables to\
    \ receive the computed values for maximum I/Os per second, the maximum megabytes\
    \ per second, and the calculated latency. An anonymous PL/SQL block can be used\
    \ to call the procedure and return the computed metrics, as follows:\n\n```\n\
    Set serveroutput on size 1000000\nDeclare\n        Calc_lat        number;\n \
    \       Calc_iops       number;\n        Calc_mbps       number;\nBegin\n    \
    \    Dbms_resource_manager.calibrate_io(&dsks,&maxlat, Calc_iops, Calc_mbps, Calc_lat);\n\
    \        Dbms_output.put_line('Max IOPS          : '||Calc_iops);\n        Dbms_output.put_line('Max\
    \ mbytes-per-sec: '||Calc_mbps);\n        Dbms_output.put_line('Calc. latency\
    \     : '||Calc_lat);\nEnd;\n/\n```\n\nAs stated earlier in the chapter, before\
    \ Auto DOP is activated, the I/O system has to be calibrated. This must be done\
    \ for each different database running on the Exadata system.\n\n![image](images/sq.jpg)\
    \ **Note** It cannot be stressed enough that I/O calibration is a resource-intensive\
    \ operation and should not be run on a system experiencing heavy workloads. This\
    \ is an “after-hours” operation that will take about 15 minutes or more to run.\
    \ Your patience will be rewarded when Auto DOP is functional.\n\n## Checking Calibration\
    \ Status\n\nA view, `V$IO_CALIBRATION_STATUS`, reports whether or not this calibration\
    \ has been run. A database in need of calibration will show these results when\
    \ `V$IO_CALIBRATION_STATUS` is queried:\n\n```\nSQL> select *\n  2  from v$io_calibration_status;\n\
    \nSTATUS        CALIBRATION_TIME\n------------- -----------------------------------------------------------\n\
    NOT AVAILABLE\n\nSQL>\n```\n\nQueries that would be executed in parallel on calibrated\
    \ systems run serially on databases that have not had I/O calibration run. The\
    \ execution plan returns an informative message about the Auto DOP calculations,\
    \ immediately visible after query execution when autotrace is enabled:\n\n```\n\
    SQL> select count(*)\n  2  from dba_objects\n  3  /\n\nCOUNT(*)\n-------------------\n\
    51085\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 3660875064\n\nPredicate Information (identified by operation\
    \ id):\n---------------------------------------------------\n   4 - filter(\"\
    O\".\"TYPE#\"<>4 AND \"O\".\"TYPE#\"<>5 AND \"O\".\"TYPE#\"<>7 AND \"O\".\"TYPE#\"\
    <>8\n           AND \"O\".\"TYPE#\"<>9 AND \"O\".\"TYPE#\"<>11 AND \"O\".\"TYPE#\"\
    <>12 AND \"O\".\"TYPE#\"<>13 AND\n           \"O\".\"TYPE#\"<>14 AND \"O\".\"\
    TYPE#\"<>22 AND \"O\".\"TYPE#\"<>87 AND \"O\".\"TYPE#\"<>88 OR\n           BITAND(\"\
    U\".\"SPARE1\",16)=0 OR (\"O\".\"TYPE#\"=4 OR \"O\".\"TYPE#\"=5 OR \"O\".\"TYPE#\"\
    =7 OR\n           \"O\".\"TYPE#\"=8 OR \"O\".\"TYPE#\"=9 OR \"O\".\"TYPE#\"=10\
    \ OR \"O\".\"TYPE#\"=11 OR \"O\".\"TYPE#\"=12\n           OR \"O\".\"TYPE#\"=13\
    \ OR \"O\".\"TYPE#\"=14 OR \"O\".\"TYPE#\"=22 OR \"O\".\"TYPE#\"=87) AND\n   \
    \        (\"U\".\"TYPE#\"<>2 AND SYS_CONTEXT('userenv','current_edition_name')='ORA$BASE'\
    \ OR\n           \"U\".\"TYPE#\"=2 AND \"U\".\"SPARE2\"=TO_NUMBER(SYS_CONTEXT('userenv','current_edition_id'))\n\
    \           OR  EXISTS (SELECT 0 FROM SYS.\"USER$\" \"U2\",SYS.\"OBJ$\" \"O2\"\
    \ WHERE \"O2\".\"TYPE#\"=88 AND\n           \"O2\".\"DATAOBJ#\"=:B1 AND \"U2\"\
    .\"TYPE#\"=2 AND \"O2\".\"OWNER#\"=\"U2\".\"USER#\" AND\n           \"U2\".\"\
    SPARE2\"=TO_NUMBER(SYS_CONTEXT('userenv','current_edition_id')))))\n   5 - access(\"\
    O\".\"SPARE3\"=\"U\".\"USER#\")\n   7 - access(\"O\".\"OWNER#\"=\"U\".\"USER#\"\
    )\n   9 - storage(\"O\".\"LINKNAME\" IS NULL AND \"O\".\"TYPE#\"<>10 AND\n   \
    \        BITAND(\"O\".\"FLAGS\",128)=0 AND \"O\".\"NAME\"<>'_NEXT_OBJECT' AND\n\
    \           \"O\".\"NAME\"<>'_default_auditing_options_')\n      filter(\"O\"\
    .\"LINKNAME\" IS NULL AND \"O\".\"TYPE#\"<>10 AND BITAND(\"O\".\"FLAGS\",128)=0\n\
    \           AND \"O\".\"NAME\"<>'_NEXT_OBJECT' AND \"O\".\"NAME\"<>'_default_auditing_options_')\n\
    \  11 - access(\"O2\".\"DATAOBJ#\"=:B1 AND \"O2\".\"TYPE#\"=88)\n  12 - access(\"\
    O2\".\"OWNER#\"=\"U2\".\"USER#\" AND \"U2\".\"TYPE#\"=2 AND\n           \"U2\"\
    .\"SPARE2\"=TO_NUMBER(SYS_CONTEXT('userenv','current_edition_id')))\n      filter(\"\
    U2\".\"SPARE2\"=TO_NUMBER(SYS_CONTEXT('userenv','current_edition_id')))\n  13\
    \ - access(\"L\".\"OWNER#\"=\"U\".\"USER#\")\n\nNote\n-----\n   - automatic DOP:\
    \ skipped because of IO calibrate statistics are missing\n\nStatistics\n----------------------------------------------------------\n\
    \         17  recursive calls\n          2  db block gets\n       4788  consistent\
    \ gets\n       4772  physical reads\n          0  redo size\n        528  bytes\
    \ sent via SQL*Net to client\n        524  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n\nSQL>\n```\n\n## Running\
    \ the Calibration Process\n\nRunning the calibration process is simple and straightforward,\
    \ and we pass to our script the number of disks and an expected latency of 10.\
    \ The procedure returns the actual latency, along with the maximum IOPs and the\
    \ maximum megabytes per second the storage system can support:\n\n```\nSQL> @calibrate_io\n\
    Enter value for dsks: 36\nEnter value for maxlat: 10\nold   7:    dbms_resource_manager.calibrate_io\
    \ (&dsks, &maxlat, Calc_iops, Calc_mbps, Calc_lat);\nnew   7:    dbms_resource_manager.calibrate_io\
    \ (36, 10, Calc_iops, Calc_mbps, Calc_lat);\nMax IOPS          : 1022\nMax mbytes-per-sec:\
    \ 2885\nCalc. latency     : 11\n\nPL/SQL procedure successfully completed.\n\n\
    Elapsed: 00:07:10.57\nSQL>\n```\n\n## Viewing Calibration Results\n\nOnce this\
    \ calibration has completed, a query of `V$IO_CALIBRATE_STATUS` reports a different\
    \ result than it did previously:\n\n```\nSQL> select *\n  2  from v$io_calibration_status;\n\
    \nSTATUS        CALIBRATION_TIME\n------------- -----------------------------------------------------------\n\
    READY         08-APR-13 11.24.49.977 AM\n\nSQL>\n```\n\nIf you query `V$IO_CALIBRATION_STATUS`\
    \ during an I/O calibration run, the view will report results similar to the following\
    \ output:\n\n```\nSQL> select *\n  2  from v$io_calibration_status;\n\nSTATUS\
    \        CALIBRATION_TIME\n------------- -----------------------------------------------------------\n\
    IN PROGRESS   01-APR-12 09.34.13.083 AM\n\nSQL>\n```\n\nThe `CALIBRATION_TIME`\
    \ value reported will be from the previous run; it’s the `IN PROGRESS` status\
    \ that lets you know that I/O calibration is running.\n\nQuerying `DBA_RSRC_IO_CALIBRATE`\
    \ reveals all the current calibration statistics recorded after a completed run:\n\
    \n```\nSQL> select num_physical_disks, max_iops, max_mbps, max_pmbps, latency\n\
    \  2  from dba_rsrc_io_calibrate;\n\nNUM_PHYSICAL_DISKS    MAX_IOPS    MAX_MBPS\
    \   MAX_PMBPS     LATENCY\n-------------------- ---------- ---------- ----------\
    \ ----------\n                  36       1022       2885       2885         11\n\
    \nSQL>\n```"
