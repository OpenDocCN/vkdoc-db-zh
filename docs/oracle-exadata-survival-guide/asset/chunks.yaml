    provided, so it’s not known which cell received and processed which request.


    Cell Smart Index Scan


    In the same manner as the `cell smart table scan`, the `cell smart index scan`
    records time against fast full-index scans that are offloaded to the storage cells,
    the only real difference being the object type being scanned.


    On one of the most active systems, we have a total of 1184 cell smart table scans
    recorded in `DBA_HIST_ACTIVE_SESS_HISTORY`, while during that same time period
    only 8 cell smart index scans were reported. This may be due to the propensity
    of Oracle 11.2 to perform direct-path reads on serial table scans. There is a
    hidden parameter, `_serial_direct_read`, normally set to FALSE, that can be set
    to TRUE to favor this activity. Setting this event may create performance issues
    in heavily used production systems, so it’s best to test this on a nonproduction
    system, using an environment as close to production as possible. Note that the
    parameter only specifies serial direct reads, not the object those reads operate
    upon, so indexes can also utilize this serial-read mechanism. Because indexes
    tend to be smaller than the tables they index, it’s a good possibility their smaller
    size precludes use of the `cell smart index scan` event. Also, only fast full-index
    scans are eligible for cell smart index scans; index range scans and index full
    scans do not qualify.


    In the same manner as the `cell smart table scan` event, the `cell smart index
    scan` event doesn’t provide much information; only the cell hash number (cellhash#)
    and the object_id (obj#) are found in a 10046 trace file, with parameters P2 and
    P3 again unused.


    ```

    WAIT #46969064936345: nam=''cell smart index scan'' ela= 178 cellhash#=2520626383
    p2=0 p3=0 obj#=448299 tim=1371608209741332

    WAIT #46969064936345: nam=''cell smart index scan'' ela= 462 cellhash#=2520626383
    p2=0 p3=0 obj#=448299 tim=1371608209752118

    ```


    Cell Single-Block Physical Read


    This event is the Exadata equivalent of the `db file sequential read` event on
    non-Exadata systems. These are usually indicative of index access operations,
    including index block reads and table block reads by rowids provided from the
    index lookups, but other operations can also use this event when accessing single
    blocks.


    Operations that generate the `cell single block physical read` event can be many,
    as shown by the following output from `DBA_HIST_ACTIVE_SESS_HISTORY`:


    ![image](images/Table7-2.jpg)


    The most common event in the preceding list is index access, accounting for 11
    of the listed entries. Add to that the total occurrences of these events, and
    it’s even more obvious that the most likely operation to mark time against this
    event is index access.


    This event provides more information than the other events discussed thus far,
    reporting the cell hash number (cellhash#), the disk hash number (diskhash#),
    the total bytes passed during the operation (bytes), and the object_id (obj#).
