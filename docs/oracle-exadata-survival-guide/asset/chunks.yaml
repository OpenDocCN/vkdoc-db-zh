  trans: "\n# 执行计划中的 Smart Scan 活动报告与验证\n\n如果执行计划是优化器在运行时生成的实际计划，那么它们可以报告 Smart Scan\
    \ 活动。符合条件的执行计划可以在 `V$SQL_PLAN` 和 `DBA_HIST_SQL_PLAN` 视图中找到；当使用 `ON` 选项时，`autotrace`\
    \ 会生成这些计划；或者也可以通过启用 `10046` 跟踪并使用 `tkprof` 处理生成的跟踪文件来找到它们。使用 `EXPLAIN` 模式的 `autotrace`\
    \ 可能无法提供与运行时生成的计划相同的计划，因为它仍然可能使用基于规则的优化器决策来生成计划。`EXPLAIN PLAN` 也是如此。（我们见过 `EXPLAIN\
    \ PLAN` 和 `10046` 跟踪报告不同执行计划的情况。）`tkprof` 工具也提供了 `explain` 模式，它同样可能提供误导性的计划。默认情况下，`tkprof`\
    \ 提供执行中的实际计划，因此使用命令行的 `explain` 选项是不必要的。\n\n## 识别执行计划中的 Smart Scan 操作\n\n在执行计划中，可以通过以下三种方式之一识别\
    \ Smart Scan：\n\n*   `TABLE ACCESS STORAGE FULL`\n*   `INDEX STORAGE FULL SCAN`\n\
    *   `INDEX STORAGE FAST FULL SCAN`\n\n出现一个或多个这样的操作并不意味着实际发生了 Smart Scan；应使用其他指标来验证\
    \ Smart Scan 的执行。\n\n## 使用视图列验证 Smart Scan\n\n`V$SQL` 视图（对于 RAC 数据库，是 `GV$SQL`）有两个列提供了关于单元格卸载执行的更多信息：`io_cell_offload_eligible_bytes`\
    \ 和 `io_cell_offload_returned_bytes`。如果确实执行了 Smart Scan，这些列将填充有关给定 `sql_id` 的单元格卸载活动的相关信息。\n\
    \n`io_cell_offload_eligible_bytes` 列报告符合卸载条件的数据字节数。这是在查询执行期间可以卸载到存储单元的数据量。`io_cell_offload_returned_bytes`\
    \ 列报告通过常规 I/O 路径返回的字节数。这些是未被卸载到单元格的字节。这两个值之间的差值提供了查询执行期间实际卸载的字节数。如果没有使用 Smart\
    \ Scan，这两个列的值都将为 0。有些情况下，`io_cell_offload_eligible_bytes` 列的值会等于 0，但 `io_cell_offload_returned_bytes`\
    \ 列的值不为 0。这种情况通常（但不总是）出现在引用固定视图（如 `GV$SESSION_WAIT`）或其他数据字典视图（例如 `V$TEMPSEG_USAGE`）时。此类查询不被视为符合卸载条件。（这些视图不可卸载，因为它们可能暴露驻留在数据库计算节点上的内存结构，但这并不表示它们不符合\
    \ Smart Scan 的条件【该视图的一个或多个基础表可能符合条件】。）`V$SQL_PLAN`/`GV$SQL_PLAN` 中存在投影数据就足以证明执行了\
    \ Smart Scan。\n\n## 查询示例\n\n查看一个执行了 Smart Scan 的查询示例，使用 `smart_scan_ex.sql` 脚本，我们可以看到：\n\
    \n```\nSQL> select *\n  2  from emp\n  3  where empid = 7934;\n\nEMPID EMPNAME\
    \                                              DEPTNO\n---------- ----------------------------------------\
    \ ----------\n      7934 Smorthorper7934                                     \
    \    15\n\nElapsed: 00:00:00.21\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 3956160932\n\n| Id  | Operation                 | Name | Rows\
    \  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT          |  \
    \    |     1 |    28 |  6361   (1)| 00:00:01 |\n|*  1 |  TABLE ACCESS STORAGE\
    \ FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n---------------------------------------------------\n\
    \   1 - storage(\"EMPID\"=7934)\n       filter(\"EMPID\"=7934)\n\nStatistics\n\
    ----------------------------------------------------------\n          1  recursive\
    \ calls\n          1  db block gets\n      40185  consistent gets\n      22594\
    \  physical reads\n        168  redo size\n        680  bytes sent via SQL*Net\
    \ to client\n        524  bytes received via SQL*Net from client\n          2\
    \  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n          0\
    \  sorts (disk)\n          1  rows processed\n\nSQL>\n```\n\n请注意，执行计划通过 `TABLE\
    \ ACCESS STORAGE FULL` 操作报告正在使用 Smart Scan。通过快速查询 `V$SQL` 来验证这一点，我们看到：\n\n```\n\
    SQL> select sql_text,\n  2         io_cell_offload_eligible_bytes,\n  3      \
    \   io_cell_offload_returned_bytes\n  4  from v$sql\n  5  where sql_id = '...';\n\
    \nSQL_TEXT                     IO_CELL_OFFLOAD_ELIGIBLE_BYTES IO_CELL_OFFLOAD_RETURNED_BYTES\n\
    ---------------------------- ----------------------------- -----------------------------\n\
    select * from emp where ...                        1835008                   \
    \        183508\n\nSQL>\n```\n"
- fmt: "# Smart Scan 性能测试与优化\n\n## 性能测试\n\n以下查询用于分析智能扫描（Smart Scan）节省的I/O比例：\n\n```sql\n\
    SQL>select  sql_id,\n  2  io_cell_offload_eligible_bytes qualifying,\n  3  io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes actual,\n  4  round(((io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,\n\
    \  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes> 0\n\
    \  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    ```\n\n查询结果如下：\n\n```text\nSQL_ID        QUALIFYING     ACTUAL IO_SAVED_PCT SQL_TEXT\n\
    ------------- ---------- ---------- ------------ -------------------------------------\n\
    gfjb8dpxvpuv6  185081856   42510928        22.97 select * from emp where empid\
    \ = 7934\n```\n\n根据结果，I/O节省百分比为`22.97%`，这意味着Oracle处理的数据量比未执行智能扫描时减少了近23%。\n\n\
    ## 禁用 Smart Scan\n\n在会话中设置`cell_offload_processing=false`，使用`no_smart_scan_ex.sql`脚本重新执行查询：\n\
    \n```sql\nSQL> alter session set cell_offload_processing=false;\n\nSession altered.\n\
    \nElapsed: 00:00:00.00\nSQL>\nSQL> select *\n  2  from emp\n  3  where empid =\
    \ 7934;\n\nEMPID EMPNAME                                             DEPTNO\n\
    ---------- ---------------------------------------- ----------\n     7934 Smorthorper7934\
    \                                         15\n\nElapsed: 00:00:03.73\n\nExecution\
    \ Plan\n\nPlan hash value: 3956160932\n\n| Id  | Operation                 | Name\
    \ | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT      \
    \    |      |     1 |    28 |  6361   (1)| 00:00:01 |\n|*  1 |  TABLE ACCESS STORAGE\
    \ FULL| EMP  |     1 |    28 |  6361   (1)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n\n1 - filter(\"EMPID\"=7934)\n\nStatistics\n\n\
    1  recursive calls\n          1  db block gets\n      45227  consistent gets\n\
    \      22593  physical reads\n          0  redo size\n        680  bytes sent\
    \ via SQL*Net to client\n        524  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n\nSQL>\nSQL> set autotrace\
    \ off timing off\nSQL>\nSQL> select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes\
    \ actual,\n  4  round(((io_cell_offload_eligible_bytes - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100,\
    \ 2) io_saved_pct,\n  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes\
    \ > 0\n  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nno rows selected\n\nSQL>\n```\n\n没有智能扫描时，查询耗时`3.73`秒，处理了全部`185081856`字节的数据。由于禁用了卸载处理，存储单元未提供任何查询处理协助。有趣的是，执行计划报告了`TABLE\
    \ ACCESS STORAGE FULL`，这通常与智能扫描相关。缺少谓词信息以及卸载字节查询的“no rows selected”结果证明，智能扫描并未执行。禁用单元卸载处理造成了明显的执行时间差异，这证明了智能扫描的威力。\n\
    \n对于更大数据量，智能扫描的性能也可能优于索引，它允许Oracle在返回满足查询条件的行时，将I/O减少数GB甚至数TB。然而，在某些情况下，智能扫描并非最佳选择；例如为表添加索引后，第三次执行相同的查询集（再次使用`smart_scan_ex.sql`脚本）：\n\
    \n## 使用索引\n\n```sql\nSQL> create index empid_idx on emp(empid);\n\nIndex created.\n\
    \nSQL>\nSQL> set autotrace on timing on\nSQL>\nSQL> select *\n  2  from emp\n\
    \  3  where empid = 7934;\n\nEMPID EMPNAME                                   \
    \          DEPTNO\n---------- ---------------------------------------- ----------\n\
    \     7934 Smorthorper7934                                         15\n\nElapsed:\
    \ 00:00:00.01\n\nExecution Plan\n\nPlan hash value: 1109982043\n\n| Id | Operation\
    \                   | Name      | Rows  | Bytes | Cost(%CPU)| Time    |\n\n| \
    \ 0 | SELECT STATEMENT            |           |     1 |    28 |     4  (0)| 00:00:01|\n\
    |  1 |  TABLE ACCESS BY INDEX ROWID| EMP       |     1 |    28 |     4  (0)| 00:00:01|\n\
    |* 2 |   INDEX RANGE SCAN          | EMPID_IDX |     1 |       |     3  (0)| 00:00:01|\n\
    \nPredicate Information (identified by operation id):\n\n2 - access(\"EMPID\"\
    =7934)\n\nStatistics\n\n1  recursive calls\n  0  db block gets\n  5  consistent\
    \ gets\n  2  physical reads\n148  redo size\n684  bytes sent via SQL*Net to client\n\
    524  bytes received via SQL*Net from client\n  2  SQL*Net roundtrips to/from client\n\
    \  0  sorts (memory)\n  0  sorts (disk)\n  1  rows processed\nSQL>\nSQL> set autotrace\
    \ off timing off\nSQL>\nSQL>select sql_id,\n  2  io_cell_offload_eligible_bytes\
    \ qualifying,\n  3  io_cell_offload_returned_bytes actual,\n  4  round(((io_cell_offload_eligible_bytes\
    \ - io_cell_offload_returned_bytes)/io_cell_offload_eligible_bytes)*100, 2) io_saved_pct,\n\
    \  5  sql_text\n  6  from v$sql\n  7  where io_cell_offload_returned_bytes> 0\n\
    \  8  and instr(sql_text, 'emp') > 0\n  9  and parsing_schema_name = 'BING';\n\
    \nno rows selected\n\nSQL>\n```\n\n请注意，优化器选择了索引范围扫描，而不是将谓词卸载到存储单元。索引范围扫描的耗时远少于智能扫描的耗时，因此，在某些情况下，智能扫描可能并非访问数据的最有效路径。这也说明了现有索引可能带来的问题，即优化器可能选择使执行路径更糟的索引，这解释了为什么一些Exadata资料建议删除索引以提高性能。虽然最终可能决定删除索引对于查询或查询组的整体性能是最佳选择，但此处不提供此类建议，因为每种情况都不同，需要根据具体情况评估；对一个Exadata系统和应用程序有益的做法，可能对另一个并非如此。唯一能够相对确定是否要删除某个索引的方法，是在尽可能接近生产的环境中进行测试并评估结果。\n\
    \n## Smart Scan 优化\n\n智能扫描使用各种优化来完成任务。它实现了三项主要优化：列投影、谓词过滤和存储索引。由于存储索引将在下一章详细讨论，本节将重点讨论前两项优化。目前只需了解，存储索引不同于常规索引，它们告知Exadata\
    \ *不要*在何处查找数据。这一点现在可能令人困惑，但稍后将深入探讨。接下来章节的主要焦点将是列投影和谓词过滤。\n\n### 列投影\n\n什么是列投影？它是Exadata仅返回查询所需列的能力。在使用通用硬件的传统系统中，Oracle会从存储单元完整获取感兴趣的数据块，将它们加载到缓冲区缓存中。然后，Oracle从这些块中提取列，最后进行过滤以仅返回选择列表中的列。因此，整行数据都会返回，以便在显示最终结果之前进行进一步处理。列投影在数据到达数据库服务器*之前*进行过滤，仅返回选择列表中的列，以及（如果适用）连接操作所需的列。Exadata不是返回整个数据块或行，而是仅返回完成查询操作所需的数据。这可以显著减少数据库服务器处理的数据量。"
