    What a Performer


    As part of the balanced I/O subsystem, the Smart Flash Cache provides measurable
    performance improvements over non-Exadata systems. Cell single-block read times
    can regularly fall into the 1 millisecond or less range, which compares favorably
    with non-Exadata systems using Solid State Disk (SSD). The major difference is
    Exadata’s ability to process larger I/O loads and maintain this level of performance.
    Because Exadata is a balanced system, with matched and tuned components, performance
    won’t suffer until the physical limits of CPU and/or memory are reached.


    Things to Know


    Smart Flash Cache provides the ability to deliver high I/O-per-second rates by
    caching frequently accessed table and index blocks, allowing them to be read directly
    from flash memory.


    The Smart Flash Cache is composed of 4 Sun Flash PCIe cards per storage cell,
    each with 96GB of flash storage. For an Exadata system with 3 storage cells, the
    total flash storage available is 1.125TB. The expected lifetime of these PCIe
    cards is two years, because the storage capacitor will lose its ability to hold
    a charge over time. According to Sun, the cards can be replaced individually,
    without shutting down the storage cell. Oracle, however, recommends a storage
    cell to be powered down before any maintenance.


    The Smart Flash Cache is a per-cell caching mechanism, optimized for frequently
    accessed data. Whether an object will be considered for Smart Flash Cache use
    is determined in part by the CELL_FLASH_CACHE storage parameter set when that
    object is created.


    Write operations are not affected by this caching. CELLSRV performs the disk writes,
    sending acknowledgment to the database tier, so transactions can continue without
    interruption. The Smart Flash Cache then determines if the data is to be cached
    or not, making the disk writes independent of the data-caching process.


    An in-memory hash table is maintained of the cached data, so Oracle can quickly
    determine if the desired blocks can be found there. The hash table lists the blocks
    not marked for eviction, so when a match is found, a cache lookup can be executed.


    Cached blocks may be evicted when the source blocks have changed since the cached
    data was written, space is needed for I/O from a current transaction, the blocks
    are tagged as KEEP but have remained unused beyond the additional KEEP threshold,
    or when their lifetime has exceeded the standard LRU thresholds.


    Each configured flash disk has 32MB of its storage configured as Smart Flash Log;
    this totals 512MB of Smart Flash Log storage per storage cell. Redo log writes
    are sent to both disk and the Smart Flash Log. Once the log writer process (LGWR)
    receives an acknowledgment that a write is completed, either to the redo log or
    the Smart Flash Log area, transaction processing continues.


    A flash disk group can be created using the flash disks on one or more storage
    cells; doing so requires resizing the existing Smart Flash Cache. One or more
    sets of flash disks can be created by reconfiguring the Smart Flash Cache on only
    one storage cell, two storage cells, or all of the available storage servers.
    The redundancy level chosen will determine the useable storage available; the
    maximum will be one-half the total space available, with the minimum being one-third
    of the total available space.


    Monitoring the Smart Flash Cache from the storage cells provides a greater range
    of metrics than monitoring it from the database servers. One metric, “cell flash
    cache read hits,” is the only indicator of flash cache activity on the database
    tier. The storage cells provide more than 30 metrics recording Smart Flash Cache
    activity, but, unfortunately, each cell has to be monitored individually. It’s
    possible to script the storage-cell monitoring and populate an external table
    in the database, so that object names, in place of object ids, can identify the
    cached segments.'
