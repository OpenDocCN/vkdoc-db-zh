             alertMessage:           "All disk drives are in WriteBack caching mode.  Battery
    Serial

    Number : 6360  Battery Type          : iBBU08  Battery Temperature   : 39 C  Full
    Charge

    Capacity  : 1345 mAh  Relative Charge       : 52 %  Ambient Temperature   : 21
    C"

             alertSequenceID:        4

             alertShortName:         Hardware

             alertType:              Stateful

             beginTime:              2013-07-17T10:09:16-05:00

             endTime:                2013-07-17T10:09:16-05:00

             examinedBy:

             metricObjectName:       LUN_LEARN_CYCLE_ALERT

             notificationState:      0

             sequenceBeginTime:      2013-07-17T04:00:56-05:00

             severity:               clear

             alertAction:            Informational.


    CellCLI>

    ```


    Here you can see the alert name, the message, the time frame for the alert, the
    severity, and the action, among other attributes. Notice, also, the `examinedBy`
    attribute. This reports the user id or alias of the DBA or DMA who examined the
    alert. Setting this attribute is a good idea, once the alert history has been
    read, as it allows other DBAs or DMAs active on the system to know these alerts
    have been read. This is a fairly easy task to complete, as it can be done for
    all alerts in the history or only on those that meet certain criteria, such as
    alertType=‘Stateful’ or alertShortName=‘Software’. You can set `examinedBy` for
    all alerts in the history, by using the following command:


    ```

    CellCLI> alter alerthistory all examinedBy=dfitzj01

    Alert 1_1 successfully altered

    Alert 1_2 successfully altered

    Alert 2 successfully altered

    Alert 3_1 successfully altered

    Alert 3_2 successfully altered

    Alert 4_1 successfully altered

    Alert 4_2 successfully altered


    CellCL>

    ```


    If there are acknowledged and unacknowledged alerts, you will have to set `examinedBy`
    for the unacknowledged alerts by name; the `WHERE` clause is only available for
    the `LIST` command. You can find the unacknowledged alerts using the following
    command:


    ```

    CellCLI> list alerthistory attributes name where examinedBy = ''''

             1_1

             1_2


    3_1

             3_2

             4_1

             4_2


    CellCLI>

    ```


    This gives you the names of all unacknowledged alerts. You can now update these
    by name, as follows:


    ```

    CellCLI> alter alerthistory 1_1,1_2,2,3_1,3_2,4_1,4_2 examinedBy=dfitzj01

    Alert 1_1 successfully altered

    Alert 1_2 successfully altered

    Alert 2 successfully altered

    Alert 3_1 successfully altered

    Alert 3_2 successfully altered

    Alert 4_1 successfully altered

    Alert 4_2 successfully altered


    CellCLI>

    ```


    In this case, all alerts were unacknowledged, but using `ALL` will cause you to
    lose any `examinedBy` values already set for acknowledged alerts. You should get
    into the habit of setting `examinedBy` for alerts as you read them, because `exachk`,
    the Exadata system validation utility, checks for unexamined alerts.


    Some alerts notify you of actions you must take, such as firmware revisions for
    the storage servers. Others notify you of support issues Oracle has to address,
    such as faulty disks and PCIe cards. These alerts are informative and let you
    know what needs to be done, so you can decide who is to do the work. Actual hardware
    issues fall into the realm of Oracle Customer Support (OCS), and issues such as
    firmware upgrades can be done on-site by the DBA and/or SA.


    Other metrics available to the `celladmin` user are generated by the **`cellsrvstat`**
    utility. Five categories of statistics are reported, with both cumulative and
    current delta values. Simply running the utility from the command prompt, without
    any additional parameters or qualifiers, produces the following output:


    ```

    [celladmin@myexa1celMyexa1cel05 ∼]$ cellsrvstat

    ===Current Time===                                      Mon Aug 12 22:57:41 2013


