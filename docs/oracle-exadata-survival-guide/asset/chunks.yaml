    以 Oracle 软件所有者身份登录，并在两个节点上执行以下操作——也在两个节点上。在每个节点上重复该过程时，请确保相应地设置 `LOCAL_NODE`，如下所示：


    ```

    $ cd /u01/app/oracle/product/11.2.0.3/erpdevdb/clone/bin


    $ perl clone.pl ORACLE_BASE=$ORACLE_BASE \

    ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb \

    ORACLE_HOME_NAME=OraDb11g_ERPDEV \

    ''-O"CLUSTER_NODES={exadb01,exadb02}"'' \

    ''-O"LOCAL_NODE=exadb01"''

    ```

    '
- fmt: "# The SCAN Listener and Database Creation Guide\n\n## Oracle Home Registration\
    \ and Patching\n\nThe preceding command will ensure that the `Oracle Home` is\
    \ registered in the central `inventory`. It is important to do the cloning properly,\
    \ as it will have a huge impact on things down the road when it comes time to\
    \ put in database patches, particularly the quarterly bundle patches. If the `Oracle\
    \ Home` is not registered, you will not be able to patch it.\n\nIt is likely that\
    \ additional database patches will have to be installed on top of this base version.\
    \ Once additional patches are applied to this `Oracle Home`, then this can be\
    \ the source for subsequent clones.\n\n## The SCAN Listener\n\nWhile both `ERP\
    \ 11i` and `R12` can take advantage of the Single Client Access Name (`SCAN`)\
    \ listener, its use is optional. At the time of this writing, all of the `EBS`\
    \ clients are pre-11.2; therefore, `EBS` cannot make full use of the `SCAN` listener.\
    \ If you are running `11i`, then you may be discouraged from using the `SCAN`\
    \ listener for your `ERP` database, because `Autoconfig` does not support it—although\
    \ there are manual steps for setting it up. Also, if you are setting up a dev/test\
    \ environment with several different databases, you will be setting up multiple\
    \ listeners—one for each environment. Perhaps you are migrating an `11i` database\
    \ from another platform where the `1521` port (port pool zero, in `Oracle ERP`\
    \ parlance) has been in use for many years and, therefore, may be difficult to\
    \ change. In any event, you may find yourself in a situation where you do not\
    \ want the `SCAN` listener running on the default `1521` port. In that case, you\
    \ will have to reconfigure the `SCAN` listener to run on a different port. It\
    \ does not really matter much which port you choose, but to keep things fairly\
    \ simple, we will go with `1523`.\n\nThere is a “My Oracle Support” note that\
    \ outlines the steps as well (`How to Modify SCAN Setting or SCAN Listener Port\
    \ after Installation [ID 972500.1]`). Using that note as a guide, we do the following:\n\
    \nFirst, modify the `remote_listener` and `local_listener` parameters for any\
    \ existing non-`ERP` databases. On each of these databases, as `SYS`, execute\
    \ the following:\n\n```sql\nSQL> alter system set remote_listener='exacluster-scan:1523'\
    \ scope=spfile sid='*' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='dbm1' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa02-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='dbm2' ;\n```\n\nSet the environment for the `Grid Oracle\
    \ Home` and do the same for `ASM`. Note that `ASM` does not have a `remote_listener`:\n\
    \n```sql\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='+ASM1' ;\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='+ASM2' ;\n```\n\nShut down all databases.\n\n```bash\n$\
    \ srvctl stop database -d dbm\n```\n\nNow, we will set the environment for the\
    \ `Grid Oracle Home` and change the listener port, as follows:\n\n```bash\n$ srvctl\
    \ modify listener -l LISTENER -p \"TCP:1523\"\n$ srvctl modify scan_listener -p\
    \ 1523\n$ srvctl stop scan_listener\n$ srvctl start scan_listener\n```\n\nRestart\
    \ the database(s), and that’s all there should be to it.\n\n```bash\n$ srvctl\
    \ start database –d dbm\n```\n\n## Creating a Database\n\nWhether performing a\
    \ fresh installation or migrating from another server, you will have to create\
    \ an empty database for your future full-blown `ERP` environment. In truth, this\
    \ does not really differ from creating a database in any `RAC` environment where\
    \ `Oracle Managed Files` are in use. The interesting part will come in the next\
    \ section, when we discuss setting up the listener. For the sake of completeness,\
    \ however, we must mention that, yes, a database gets created.\n\nThe simplest\
    \ method is just to use `dbca`. Set the `ORACLE_HOME` and modify the `PATH` appropriately,\
    \ as follows:\n\n```bash\n$ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb\n\
    $ export PATH=$PATH:$ORACLE_HOME/bin\n$ dbca\n```"
