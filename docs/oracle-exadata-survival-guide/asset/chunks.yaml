    \n## 存储单元缓存层处理计数器\n\n**由缓存层处理的存储单元块**\n\n这是 Exadata 收集的四个“层”统计信息之一，报告所列处理层的活动。此特定统计信息报告为\
    \ Smart Scan 操作由存储单元实际处理的块数。当单元将块传回数据库服务器（块 I/O 模式）时，此统计信息不会递增。当单元在 Smart Scan\
    \ 期间实际处理块时，它会递增。当单元为一致读打开块时，会检查块缓存头，以确保正在读取正确的块，并且该块有效且未损坏。缓存层进程（内核缓存缓冲区管理，或 KCB）执行这些功能并将\
    \ `cell blocks processed by cache layer` 计数报告回数据库。\n\n当数据库层处理常规块 I/O 时，可能会更新两个统计信息之一：`consistent\
    \ gets from cache` 或 `consistent gets from cache (fastpath)`。存储单元通过 CELLSRV 仅执行一致读取，而非当前模式读取。记录在\
    \ `db block gets from cache` 或 `db block gets from cache (fastpath)` 中的所有当前模式读取均来自数据库层。`cell\
    \ blocks processed by cache layer` 计数器中记录的任何计数都提供了有关存储单元执行了多少逻辑读取的数据，无论是从 `V$SYSSTAT`\
    \ 的系统范围数据，还是通过 `V$SESSTAT` 的会话级别数据。\n\n在查询执行计划中同时发现数据库层和单元层处理并不罕见。较小的表不太可能符合 Smart\
    \ Scan 的条件，因此将由数据库服务器处理。使用小型查找表和大型处理表的多表连接可能会产生此类计划。\n\n## 存储单元数据层处理\n\n**由数据层处理的存储单元块**\n"
- fmt: "# 数据库性能统计指标详解\n\n## 概述\n前一个计数器记录了单元格缓存读取活动，而本统计信息记录从表或物化视图中读取的物理块。数据层模块内核数据扫描（KDS）从数据块中提取行和列，传递给谓词过滤和列投影处理。当存储单元格无需数据库块I/O即可完成所有必要工作时，此计数器会递增。\n\
    \n## 统计指标关联分析\n当会话级的本统计信息计数与会话级的`cell blocks processed by index layer`计数相加时，可以确定存储单元格是否完成了所有一致性读取。如果每个处理块都在存储层读取，则这些计数器的总和将等于会话级的`cell\
    \ blocks processed by cache layer`计数器计数。如果总和较小，则表示数据库层执行了常规块I/O处理。其差值应为数据库服务器处理的块数。\n\
    \n## cell blocks processed by index layer\n存储单元格可以以类似方式处理索引块与表和物化视图块。此统计信息记录通过智能扫描处理B*树和位图索引段的索引块数量。\n\
    \n## cell blocks processed by txn layer\n由于此计数器记录事务层处理的块数，了解该层的内部操作将很有帮助。回顾智能扫描处理一致性读取的基本说明，我们来看一下在此过程中会发生什么。\n\
    \n缓存层通过KCB打开块，然后检查头部、最后修改的SCN和清理状态。如果最后修改的SCN不大于快照SCN（因为自查询开始后未被修改），事务层将获取此块。如果最后修改的SCN大于快照SCN，则表明块自查询开始后已被修改，需要回滚到快照SCN。这会导致块被传递回数据库层进行块I/O处理。\n\
    \n如果块通过第一次测试，它将被传递到事务层，由内核事务读一致性进程（KTR）处理，该进程使用最小活动SCN和提交缓存，减少与数据库层的通信量。然后事务层执行数据块处理以提取请求的信息，与数据层和索引层协同工作，在存储单元格级别执行一致性读取。\n\
    \n## cell flash cache read hits\n此计数器在第4章中已讨论过，这里仅简要提及。这是另一个累积指标，存在于会话级和实例级。监控此指标的最简单方法是使用我们在第4章中提供的脚本。我们也在此提供，因为监控智能闪存缓存是性能故障排除的关键部分。\n\
    \n```sql\nSQL> select statistic#, value\n  2  from v$mystat\n  3  where statistic#\
    \ in (select statistic# from v$statname where name = 'cell flash cache read hits');\n\
    \nSTATISTIC#      VALUE\n---------- ----------\n       605          1\n\nSQL>\n\
    SQL> select count(*)\n  2  from emp;\n\nCOUNT(*)\n\nSQL>\nSQL> column   val new_value\
    \ endval\nSQL>\nSQL> select statistic#, value val\n  2  from v$mystat\n  3  where\
    \ statistic# in (select statistic# from v$statname where name = 'cell flash cache\
    \ read hits');\n\nSTATISTIC#        VAL\n---------- ----------\n       605   \
    \     857\n\nSQL>\nSQL>\nSQL> select &endval - &beginval flash_hits\n  2  from\
    \ dual;\n\nFLASH_HITS\n\nSQL>\n```\n\n此计数器还提供物理I/O请求的数量，因为访问智能闪存缓存是物理I/O而非逻辑I/O。\n\
    \n## cell index scans\n每次在B*树或位图索引段上启动智能扫描时，此计数器都会递增。由于这需要执行计划中的索引快速全扫描步骤，并且还必须使用直接路径读取，因此必须同时满足这两个条件才能使此计数器递增。\n\
    \n智能扫描是段级操作，因此在非分区索引上串行运行的查询将对每个访问的索引段递增一次。对于并行访问的分区索引段，每个并行查询从进程访问每个分区段时，此计数器可能递增一次。由于分区段的大小可能不同，对于给定的分区索引，可以通过不同方法访问这些段。较大的段可能通过直接路径读取访问，因此此计数器将递增。较小的分区可能不会触发直接路径读取，在这种情况下，不会执行智能扫描，计数器值也不会增加。\n\
    \n## cell IO uncompressed bytes\n如果不使用压缩，您将不会看到此统计信息发生变化，因为它仅在智能扫描压缩卸载发生时递增。此统计信息报告压缩数据的实际未压缩大小。例如，如果有10MB的压缩数据，解压缩后为20MB，则在该数据卸载时，`cell\
    \ IO uncompressed bytes`计数器将增加20MB。`physical read total bytes`计数器将增加10MB，因为这是段大小。看到`cell\
    \ IO uncompressed bytes`计数器比`physical read total bytes counter`增长更快不是问题，因为如前所述，`physical\
    \ read total bytes`计数器根据读取的段大小递增，而`cell IO uncompressed bytes`计数器报告处理的未压缩总字节数。\n\
    \n## cell num fast response sessions\nOracle可以选择延迟完整智能扫描执行，首先执行少量块I/O操作，尝试满足查询。`FIRST_ROWS`、`FIRST_ROWS_n`和`where\
    \ rownum`查询会触发此行为，当Oracle决定不立即执行智能扫描时，此计数器会递增。为了提高查询效率和速度，Oracle可以避免设置智能扫描，转而执行少量块I/O操作来满足查询。此计数器报告自实例启动以来Oracle执行此操作的次数。此计数器递增并不意味着未执行完整的智能扫描，只是Oracle尝试尽可能少地工作来返回所需结果。\n\
    \n## cell num fast response sessions continuing to smart scan\n在Oracle决定延迟运行智能扫描以减少可能的工作量后，可能认为必须执行智能扫描才能向调用会话返回正确结果。当做出此切换时，此计数器会递增。由于这发生在Oracle最初决定不运行完整智能扫描之后，因此适用相同的触发条件——正在运行`FIRST_ROWS`、`FIRST_ROWS_n`和`where\
    \ rownum`查询。此外，当此统计信息递增时，您可能会注意到一些`db file sequential read`等待。尽管大多数此类读取报告为`cell\
    \ single block physical read`等待事件，但较旧命名的事件在Exadata上仍可能递增。\n\n## cell num smart\
    \ IO sessions using passthru mode due to _______"
  raw: 'While the previous counter registered cell cache read activity, this statistic
    records physical blocks read from tables or materialized views. The data layer
    module, Kernel Data Scan (KDS), extracts rows and columns from data blocks, passing
    them on for predicate filtering and column projection. When the storage cell can
    perform all of the necessary work without database block I/O, this counter is
    incremented.


    When the session-level count from this statistic is added to the session-level
    `cell blocks processed by index layer` count, you can determine if the storage
    cell did all of the consistent reads. The sum of those counters will equal the
    session-level count for the `cell blocks processed by cache layer` counter, if
    every block processed was read at the storage layer. If the sum is a lower number,
    then the database layer performed regular block I/O processing. The difference
    should be the number of blocks processed by the database servers.


    cell blocks processed by index layer


    The storage cells can process index blocks in a similar manner as table and materialized
    view blocks. This statistic records the number of index blocks processed by a
    Smart Scan of B*Tree and bitmap index segments.


    cell blocks processed by txn layer


    Because this counter records the number of blocks processed by the transaction
    layer, it will be beneficial to know what goes on in that layer. Looking at a
    basic explanation of how Smart Scans process consistent reads, let’s go through
    and see what occurs during this process.


    The cache layer, through KCB, opens the block and then checks the header, the
    SCN of the last modification, and the cleanout status. The transaction layer gets
    this block if the SCN of the last modification isn’t greater than the snapshot
    SCN, because it hasn’t been modified since the query started. If the SCN of the
    last modification is greater than the snapshot SCN, this indicates the block has
    been modified since the query started, requiring a rollback to the snapshot SCN.
    This causes the block to be passed back to the database layer for block I/O processing.


    Should the block pass the first test, it is passed to the transaction layer to
    be processed by the Kernel Transaction Read Consistency process (KTR), which uses
    the Minimum Active SCN and the commit cache, reducing the amount of communication
    with the database layer. The transaction layer then performs processing of the
    data block to extract the requested information, in concert with the data and
    index layers, which are used to perform the consistent reads at the storage-cell
    level.


    cell flash cache read hits


    This counter was discussed in [Chapter 4](#9781430260103_Ch04.xhtml), so we’ll
    only briefly mention it here. This is another cumulative metric, at both the session
    level and the instance level. The easiest way to monitor this is with a script
    we have provided in [Chapter 4](#9781430260103_Ch04.xhtml). We provide it here
    as well, as monitoring the Smart Flash Cache is a key part of performance troubleshooting.


    ```

    SQL> select statistic#, value

      2  from v$mystat

      3  where statistic# in (select statistic# from v$statname where name = ''cell
    flash cache read hits'');


    STATISTIC#      VALUE

    ---------- ----------

           605          1


    SQL>

    SQL> select count(*)

      2  from emp;


    COUNT(*)


    SQL>

    SQL> column   val new_value endval

    SQL>

    SQL> select statistic#, value val

      2  from v$mystat

      3  where statistic# in (select statistic# from v$statname where name = ''cell
    flash cache read hits'');


    STATISTIC#        VAL

    ---------- ----------

           605        857


    SQL>

    SQL>

    SQL> select &endval - &beginval flash_hits

      2  from dual;


    FLASH_HITS


    SQL>

    ```


    This counter also provides the number of physical I/O requests, because accessing
    the Smart Flash Cache is physical, not logical, I/O.


    cell index scans


    Each time a Smart Scan starts on a B*Tree or bitmap index segment, this counter
    is incremented. As this requires the use of the index fast full-scan step in the
    execution plan and also must use direct-path reads, both of these conditions must
    be met for this counter to be incremented.


    A Smart Scan is a segment-level operation, so a query running serially, on a non-partitioned
    index, will increment once for each of the index segments accessed. For partitioned
    index segments accessed in parallel, this counter can increase once for each partitioned
    segment accessed by each parallel query slave. Because partition segments can
    differ in size, it is possible that, for a given partitioned index, the segments
    can be accessed by different methods. Larger segments are likely to be accessed
    by direct-path reads, and, thus, this counter will be incremented. Smaller partitions
    may not trigger direct-path reads, and in those cases, Smart Scans won’t be executed
    and the counter value won’t increase.


    cell IO uncompressed bytes


    If you are not using compression, you won’t see this statistic change, as it’s
    only incremented when Smart Scan compression offloading occurs. This statistic
    reports the actual uncompressed size of the compressed data. If, for example,
    you have 10MB of compressed data that would be 20MB when uncompressed, the `cell
    IO uncompressed bytes` counter would increment by 20MB when that data is offloaded.
    The `physical read total bytes` counter would increment by 10MB, because that
    is the segment size. It isn’t a problem to see the `cell IO uncompressed bytes`
    counter increase at a faster rate than the `physical read total bytes counter`,
    because, as noted, the `physical read total bytes` counter increments according
    to the segment size read, and the `cell IO uncompressed bytes` counter reports
    the total uncompressed bytes processed.


    cell num fast response sessions


    Oracle can elect to defer a full Smart Scan execution by choosing to perform a
    few block I/O operations at the outset, in an attempt to satisfy a query. `FIRST_ROWS`,
    `FIRST_ROWS_n`, and `where rownum` queries trigger this behavior, and when Oracle
    decides to not immediately execute a Smart Scan, this counter is incremented.
    To improve the efficiency and speed of queries, Oracle can avoid setting up a
    Smart Scan, in favor of a few block I/O operations, to satisfy a query. This counter
    reports how many times Oracle has done that since the instance was started. Just
    because this counter was incremented doesn’t mean that a full Smart Scan wasn’t
    executed, simply that Oracle tried to do as little work as possible to return
    the desired results.


    cell num fast response sessions continuing to smart scan


    After Oracle decides to defer running a Smart Scan to reduce the possible work
    done, it may be decided that to return the correct results to the calling session,
    a Smart Scan must be executed. When that switch is made, this counter is incremented.
    Because this occurs after Oracle initially decides to not run a full Smart Scan,
    the same triggering conditions apply—`FIRST_ROWS`, `FIRST_ROWS_n`, and `where
    rownum` queries are being run. Also, when this statistic is incremented, you may
    notice some `db file sequential read` waits. Even though most reads of this nature
    are reported as `cell single block physical read` wait events, the older named
    event can still be incremented on Exadata.


    cell num smart IO sessions using passthru mode due to _______'
