    Suite Release 11i [ID 823586.1]

    *   Export/import notes on Applications 11i Database 11g [ID 557738.1]

    *   Interoperability Notes Oracle EBS 11i with Oracle Database 11gR2 (11.2.0)
    [ID 881505.1]

    *   How to Modify SCAN Setting or SCAN Listener Port after Installation [ID 972500.1]


    Things to Know


    Every ERP database must run from its own Oracle Home. Sharing of Oracle Homes
    between ERP databases is not allowed. This is a long-standing Oracle standard.
    In addition, each of the databases must have a dedicated listener.


    The issue of the listener can be the most challenging. First, you must decide
    if the SCAN listener can simply stay on port 1521 or if it has to move. While
    you can use the SCAN listener, it is not practical to do so on a dev/test cluster,
    where you most likely will have multiple ERP databases running. Each of the databases
    will require its own listener port and, hence, its own listener. For the sake
    of consistency, we have found it best to have none of the databases use the SCAN
    listener as primary.


    All that said, you still must have the database registered with the local listener,
    so that dbca will work. If it is  not registered with the local listener, you
    will receive an error when you do try to run dbca. In fact, each  database should
    be registered with both a named listener and port unique to that database and
    with the default  listener. Remember that dbca is used for a variety of things,
    including adding instances to the database, registering the database with a Grid
    Control OMS, and configuring Database Vault—just to name a few.


    Be sure to configure your `$ORACLE_HOME/network/admin` in such a way that subsequent
    runs of Autoconfig on the database tier do not compromise your TNS configuration.
    Fully communicate the configuration to anyone who may be running Autoconfig.


    When setting your environment, be sure not to use the Autoconfig-generated `TNS_ADMIN`
    setting. The `env` file that Autoconfig generates is fine, but then the `TNS_ADMIN`
    variable must be unset.


    Properly clone each `ORACLE_HOME`, so that it is registered with the central inventory.
    If the clone process is not followed, then the Home will not be registered, and
    you will not be able to apply quarterly patch bundles to it.


    CHAPTER 14


    ![image](images/frontdot.jpg)


    Final Thoughts


    You’re here, at the final chapter of the book, and you’ve read and learned much
    by now. A lot of material has been covered, and you have a better idea of what
    Exadata is and what it can do. You also have a good working knowledge of the system
    and how to manage it. It was probably a daunting task at first, but, through reading
    this book and running the examples, you’ve gained an understanding of Exadata
    that will serve you well as you continue your career as an Exadata DBA or DMA.


    You’ve Come Far, Pilgrim


    When you started reading, you had probably just been told that Exadata was on
    its way and that you would be working with it. It’s also likely that you had no
    real idea of how Exadata is configured or how it provided the exceptional performance
    everyone was talking about. Storage indexes and Smart Scans were foreign concepts,
    and the architecture of the system was like nothing you had seen before. You have
    come a long way since then.


    Let us take a walk through the areas we have covered and highlight some of the
    material we have presented.


    ![image](images/sq.jpg) **Note**  This will not be a comprehensive list of all
    of the topics and material we have presented in previous chapters. Information
    on some areas may be more detailed than others, but know this chapter is not a
    comprehensive summary of the text.


    We started, appropriately enough, at the beginning, and discussed the various
    configurations of an Exadata system. We did this to get you introduced to the
    hardware available on each of the currently available systems and to familiarize
    you with the resources available on each configuration. We also presented a short
    history of Exadata and how it has evolved to address different types of workloads,
    including OLTP.


    The next stop on this journey took you to Smart Scans and offloading, two very
    important aspects of Exadata.


    It has been said that Smart Scans are the lifeblood of Exadata, and we would agree.
    Smart Scans, as you learned, provide a “divide and conquer” approach to query
    and statement processing, by allowing the storage cells to perform tasks that,
    in conventional hardware configurations, the database server would have to perform.
    You also learned that offloading provides even more powerful tools to make data
    processing more efficient. Column Projection and Predicate Filtering allow the
    storage cells to return only the data requested by the query, by moving the data
    block processing to the storage layer. Column Projection, as you recall, allows
    Exadata to return only the columns requested in the select list and any columns
    specified in join conditions. This reduces the workload considerably, by eliminating
    the need for the database servers to perform conventional data block processing
    and filtering. This also reduces the volume of data transferred to the database
    servers, which is one way Exadata is more efficient than conventionally configured
    systems.'
