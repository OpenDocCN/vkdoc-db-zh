  trans: '

    # 智能闪存缓存


    ## 闪存登场


    智能闪存缓存通过缓存频繁访问的数据，并允许直接从闪存而非磁盘或内存中读取，为 Exadata 提供了实现高 IOPS（每秒输入输出操作次数）的能力。它通过缓存常用的表和索引块以备后用，从而吸收重复读取可能产生的负载。控制文件的读写以及文件头的读写也会被缓存。不过，与传统系统不同，此闪存缓存是智能化的，不会缓存为
    ASM 冗余而写入的重复块，也不会缓存与备份过程和数据泵导出相关的 I/O。


    智能闪存缓存表现得像磁盘，但它并非磁盘。每个存储单元包含 4 块 Sun Flash PCIe 卡，每卡配备 96GB 闪存，因此智能闪存缓存总可用空间为
    384GB。对于 X3 八分之一机架配置，总闪存存储为 4.8TB；对于四分之一机架配置，可用总闪存存储为 2.4TB。X3 半机架拥有 11.2TB 闪存，而全机架则提供
    22.4TB。作为比较，X2 Exadata 四分之一机架配置拥有 1.1TB 可用闪存，半机架为 2.6TB，全机架为 5.3TB。其中一块卡的基本框图如
    图 4-1 所示。


    ![9781430260103_Fig04-01.jpg](img/9781430260103_Fig04-01.jpg)


    图 4-1. Sun Flash Accelerator F20 PCIe 卡框图


    在安装时，Exadata 系统将几乎所有的 PCIe 闪存存储配置为闪存缓存，其中一小部分配置为闪存日志。DBA 可以相当轻松地通过调整大小、重建或创建可供
    ASM 访问的闪存“磁盘”来重新配置闪存缓存。智能闪存缓存构建在闪存磁盘之上，这与 DBA 可创建的、用于提供可由 ASM 使用的闪存存储的虚拟闪存磁盘不同。连接到存储单元并使用
    `CellCLI` 查看闪存缓存详细信息，可显示已配置闪存缓存的组成：


    ```

    CellCLI> list flashcache detail

             name:                   myexa1cel01_FLASHCACHE

             cellDisk:               FD_07_myexa1cel01,FD_12_myexa1cel01,FD_15_myexa1cel01,FD_13_myexa1cel01,FD_04_myexa1cel01,FD_14_myexa1cel01,FD_00_myexa1cel01,FD_10_myexa1cel01,FD_03_myexa1cel01,FD_09_myexa1cel01,FD_08_myexa1cel01,FD_02_myexa1cel01,FD_01_myexa1cel01,FD_11_myexa1cel01,FD_05_myexa1cel01,FD_06_myexa1cel01

             creationTime:           2013-03-16T12:16:39-05:00

             degradedCelldisks:

             effectiveCacheSize:     364.75G

             id:                     3dfc24a5-2591-43d3-aa34-72379abdf3b3

             size:                   364.75G

             status:                 normal


    CellCLI>

    ```


    每个存储单元使用 16 个磁盘来构建智能闪存缓存。每块 Sun PCIe 卡有 4 个这样的磁盘，每个磁盘大小为 32GB，其中 24GB 为可寻址的非易失性存储。尽管总共有
    384GB 闪存存储，但请注意，其中 19.25GB 保留给闪存日志和其他用途，因此可用于创建闪存缓存的闪存存储为 22.875GB。每块卡还包含 64MB
    DRAM，用于缓冲写入非易失性存储器的数据，以及一个能量存储模块（ESM）。该模块实际上是一个电容器，在发生断电时，它能提供足够的电力将数据从缓冲区刷新到非易失性存储器中。如果
    ESM 发生故障，将绕过易失性缓冲区，允许直接写入非易失性存储器。只要闪存磁盘配置为智能闪存缓存，失去 ESM 不会带来写入惩罚；存储软件将智能闪存缓存视为直写缓存，会绕过它直接写入磁盘。如果闪存磁盘被配置为闪存磁盘组，则失去
    ESM 将产生写入惩罚，因为动态缓存不再可用。


    这些 PCIe 卡的预期寿命为两年，因为 ESM 将失去其充电能力。Sun 文档声明这些卡可以在不关闭系统的情况下更换；而 Oracle Exadata 文档建议在开始此类维护之前，将受影响的存储服务器断电。请记住，ASM
    故障组的配置确保了一个存储单元的丢失不会影响运行中的数据库。


    使用 `create flashcache all` 命令为存储单元重建闪存缓存，将创建与 Exadata 安装后相同的存储分布；DBA 可以通过指定 `size`
    参数在存储单元上创建一个较小的智能闪存缓存，但不能创建更大的。


    ## 工作原理


    智能闪存缓存是一种针对频繁访问数据进行优化的、基于每个单元的缓存机制。一个对象是否会被考虑用于智能闪存缓存，部分取决于对象创建时设置的 `CELL_FLASH_CACHE`
    存储参数。看一下 `EMP` 演示表的 `CREATE TABLE` 语句：


    ```

    CREATE TABLE "BING"."EMP"

      (    "EMPNO" NUMBER(4,0) NOT NULL ENABLE,

           "ENAME" VARCHAR2(10),

           "JOB" VARCHAR2(9),

           "MGR" NUMBER(4,0),

           "HIREDATE" DATE,

           "SAL" NUMBER(7,2),

           "COMM" NUMBER(7,2),

           "DEPTNO" NUMBER(2,0)

      ) SEGMENT CREATION IMMEDIATE

      PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

     NOCOMPRESS LOGGING

      STORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645

      PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1

      BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)

      TABLESPACE "USERS" ROWDEPENDENCIES

    ```


    此存储参数有三个可能的值，`DEFAULT` 顺理成章地成为默认值。此设置告知 Oracle 以正常模式利用智能闪存缓存，根据提供的缓存标准缓存数据，并根据适当的保留策略淘汰缓存数据。对于
    `DEFAULT` 设置，这将使用一种优先级的最近最少使用（LRU）算法（最旧的数据最先被淘汰，这是常见的 LRU 配置）。此存储参数还可以设置为另外两个值：`KEEP`
    和 `NONE`。`KEEP` 设置通过尽可能长时间地将数据保留在缓存中来改变 LRU 算法，但是，为防止 `KEEP` 数据占用缓存，最多只有 80% 的已配置缓存可用于标记为
    `KEEP` 的数据。超过附加淘汰策略的未使用 `KEEP` 块将被清除。将 `CELL_FLASH_CACHE` 设置为 `NONE` 会为该对象禁用智能闪存缓存。


    每次读或写操作都关联以下附加信息：


    *   相关对象的 `CELL_FLASH_CACHE` 设置

    *   基于请求目的的缓存提示。可用的提示有：

    '
- fmt: "*   `CACHE`，这会导致块被缓存。索引查找的 I/O 就是一种会被缓存的请求类型。\n*   `NOCACHE`，这将应用于来自 ASM 的镜像块、日志写入，或者简单来说就是太大而无法放入缓存的请求。无论\
    \ `CELL_FLASH_CACHE` 设置为 `DEFAULT` 还是 `KEEP`，此提示都会被设置。\n*   `EVICT`，用于从缓存中移除数据。使用此提示的活动将是\
    \ ASM 再平衡操作（这会导致块从一个磁盘移动到另一个磁盘，从而使缓存的条目失效，因为它们引用的是原始物理位置）以及查找已超过 LRU 算法阈值的缓存数据。\n\
    \n智能闪存缓存（Smart Flash Cache）在决定如何以及处理什么时，除了考虑 `CELL_FLASH_CACHE` 设置和提供的提示外，还会考虑\
    \ I/O 大小、类型和当前的缓存负载。非常大的 I/O 请求不会被缓存，任何可能对吞吐量产生负面影响的 I/O 请求也不会被缓存，因为缓存可能非常繁忙。\n\
    \n被缓存的写操作不受此缓存的影响，因为写入性能既不会提高也不会降低。`CELLSRV` 执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后，智能闪存缓存决定数据是否要被缓存，使得磁盘写入独立于数据缓存过程。\n\
    \n读取事务是智能闪存缓存的受益者。对于读取操作，`CELLSRV` 会确定数据是否已在智能闪存缓存中；它维护了一个缓存数据的内存散列表，以便 Oracle\
    \ 可以快速确定所需的块是否可以在那里找到。该散列表列出了未被标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。在以下情况下，缓存块可能会被驱逐：源块自缓存数据写入后已更改、当前事务的\
    \ I/O 需要空间且这些块位于 LRU 列表的顶部、块被标记为 `KEEP` 但已超出额外的 `KEEP` 阈值而未使用，或者它们的寿命已超过标准 LRU\
    \ 阈值。\n\n也可以使用 `ALTER TABLE <TABLE_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])`\
    \ 和 `ALTER INDEX <INDEX_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])` 命令手动将表或索引放入智能闪存缓存。指定\
    \ `NONE` 会阻止表或索引使用智能闪存缓存。`DEFAULT` 设置智能闪存缓存的正常行为，并且在创建表或索引时默认设置为此值；`KEEP` 会将表或索引放入智能闪存缓存（前提是空间足够），并且不会将其换出。不加区别地使用\
    \ `KEEP` 选项可能会填满智能闪存缓存，而没有空间留给 `FLASH_CACHE` 设置为 `DEFAULT` 的对象。`KEEP` 设置应用于小表（例如，较小的查找表）或索引，以允许更大的表/索引（其\
    \ `FLASH_CACHE` 存储参数设置为 `DEFAULT`）使用智能闪存缓存。\n\n## 日志记录\n\n每个单元上配置的闪存存储并非仅用于智能闪存缓存，因为\
    \ Exadata 还提供了智能闪存日志（Smart Flash Log）作为重做日志写入的额外机制。每个配置的闪存磁盘都有 32MB 的存储空间被配置为智能闪存日志；每个存储单元总共\
    \ 512MB 的智能闪存日志存储。使用智能闪存日志可以加速事务处理，因为第一个报告完成的写入会触发数据库层继续进行事务处理。\n\n重做日志写入被同时发送到磁盘和智能闪存日志。一旦日志写入器进程（`LGWR`）收到写入完成的确认，事务处理就会继续。无论是智能闪存日志还是磁盘上的写入先完成都不重要；是确认信号触发了数据库服务器允许处理继续进行。请放心，所有写入智能闪存日志的数据也会被写入磁盘。智能闪存日志先完成并不会阻止\
    \ `LGWR` 完成其磁盘写入。从概念上讲，智能闪存日志与使用多路复用重做日志非常相似，因为所有配置的日志都会被写入，无论哪个日志先完成写入。\n\n##\
    \ 它是磁盘\n\n智能闪存磁盘并不仅限于智能闪存缓存和智能闪存日志使用。可以将这些设备配置为 ASM 识别的闪存磁盘，以创建闪存磁盘组。\n\n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组，但这需要调整现有智能闪存缓存的大小。在开始此过程之前，应决定这些闪存磁盘的大小，因为创建此类磁盘并非易事，因为第一步是删除现有的闪存缓存：\n\
    \n```\nCellCLI> drop flashcache\nFlash cache myexa1cel01_flashcache successfully\
    \ dropped\n```\n\n一旦闪存缓存被删除，就可以用新的大小创建它。要创建一个 100GB 的闪存缓存：\n\n```\nCellCLI> create\
    \ flashcache all size=100G\nFlash cache myexa1cel01_flashcache successfully created\n\
    ```\n\n可用于 ASM 的闪存磁盘将使用剩余的可用闪存存储（264.75GB）创建，因此不需要使用大小参数：\n\n```\nCellCLI> create\
    \ gridddisk all flashdisk prefix=flash\nGridDisk flash_FD_00_myexa1cel01 successfully\
    \ created\nGridDisk flash_FD_01_myexa1cel01 successfully created\n...\nGridDisk\
    \ flash_FD_15_myexa1cel01 successfully created\n\nCellCLI> list griddisk\n...\n\
    \         flash_FD_00_myexa1cel01 active\n         flash_FD_01_myexa1cel01 active\n\
    \         ...\n         Flash_FD_15_myexa1cel01 active\nCellCLI>\n```\n\n可以选择创建一组或多组闪存磁盘，方法是仅在一个存储单元、两个存储单元甚至所有可用存储服务器上重新配置智能闪存缓存。在存储服务器之间使用相同的前缀允许将所有闪存磁盘分配给一个磁盘组，无论涉及哪个存储单元。也可以通过使前缀特定于单元来创建单独的闪存磁盘集，这样，只需在\
    \ `CREATE DISKGROUP` 命令中指定前缀名称，就可以创建多个基于闪存的磁盘组。\n\n创建闪存磁盘组并不困难；但是，如果使用多个闪存磁盘前缀，则需要仔细注意细节，以便将正确的闪存磁盘集分配给正确的磁盘组。命令语法很简单，但是，首先必须设置数据库服务器上的环境才能访问\
    \ ASM 实例。以下脚本 `sid` 是设置环境的好方法：\n\n```\n#################################################################\n\
    # Oracle sid selection script\n#\n# 13-May-2012 - Mary Mikell Spence\n#      \
    \         Infocrossing\n#################################################################\n\
    \nORASID=$ORACLE_SID\n\nif [ -f /etc/oratab ]\nthen\n   export ORATAB=/etc/oratab\n\
    else\n   export ORATAB=/var/opt/oracle/oratab\nfi\n\nunset ORACLE_BASE\n\necho;\n\
    I=1\nfor SHOW_DB in `cat $ORATAB | grep -v \"#\" |  grep -v '*' | cut -f 1 -d\
    \ :`\ndo\n   OHOME=`grep -v '#' $ORATAB | grep -v '*' | grep \"^$SHOW_DB:\" |\
    \ cut -d: -f 2`\n   echo \"$I - $SHOW_DB - $OHOME\"\n   I=`expr $I + 1`\ndone\n\
    echo;\n```"
  raw: '*   CACHE, which causes the blocks to be cached. I/O for index lookups would
    be one type of request that would be cached.

    *   NOCACHE, which would apply to mirrored blocks from ASM, log writes, or a request
    that is simply too large to put into the cache. This hint is set, regardless of
    whether CELL_FLASH_CACHE is set to DEFAULT or KEEP.

    *   EVICT, to remove data from the cache. Activities that would use this hint
    would be ASM rebalance operations (which cause blocks to be moved from one disk
    to another, thus invalidating the cached entries, as they would reference the
    original physical location) and finding cached data that has exceeded the threshold
    for the LRU algorithm.


    The Smart Flash Cache, in addition to the CELL_FLASH_CACHE setting and the provided
    hint, also takes into consideration I/O size, type, and the current cache load,
    when making decisions on how and what to process. Extremely large I/O requests
    will not be cached, nor will any I/O requests that could negatively impact throughput,
    because the cache is extremely busy.


    Write operations that are cached are not affected by this caching, as write performance
    is neither improved nor diminished. CELLSRV performs the disk writes, sending
    acknowledgment to the database tier, so transactions can continue without interruption.
    The Smart Flash Cache then determines if the data is to be cached or not, making
    the disk writes independent of the data-caching process.


    Reads are the transactions that reap the rewards of the Smart Flash Cache. For
    a read, CELLSRV determines if the data is already in the Smart Flash Cache; an
    in-memory hash table of the cached data is maintained, so Oracle can quickly determine
    if the desired blocks can be found there. The hash table lists the blocks not
    marked for eviction, so when a match is found, a cache lookup can be executed.
    Cached blocks may be evicted when the source blocks have changed since the cached
    data was written, space is needed for I/O from a current transaction and the blocks
    are at the top of the LRU list, the blocks are tagged as KEEP but have remained
    unused beyond the additional KEEP threshold, or when their lifetime has exceeded
    the standard LRU thresholds.


    It is also possible to place a table or index into the Smart Flash Cache manually,
    using the `ALTER TABLE` `<TABLE_NAME> STORAGE(FLASH_CACHE` [NONE|DEFAULT|KEEP])
    and `ALTER INDEX` `<INDEX NAME> STORAGE(FLASH_CACHE` [NONE|DEFAULT|KEEP]) commands.
    Specifying `NONE` prevents the table or index from using the Smart Flash Cache.
    DEFAULT sets the normal Smart Flash Cache behavior and is set by default when
    creating a table or an index; KEEP will place the table or index into the Smart
    Flash Cache, provided there is sufficient space, and won’t age it out. Using the
    KEEP option indiscriminately can fill the Smart Flash Cache and leave no room
    for objects where the `FLASH_CACHE` setting is `DEFAULT`. The `KEEP` setting should
    be used for small tables (for example, smaller look-up tables) or indexes, to
    allow larger tables/indexes where the FLASH_CACHE storage parameter is set to
    DEFAULT to use the Smart Flash Cache.


    Logging We Will Go


    The configured flash storage on each cell isn’t used solely for Smart Flash Cache,
    as Exadata also provides Smart Flash Log as an additional mechanism for redo log
    writes. Each configured flash disk has 32MB of its storage configured as Smart
    Flash Log; this totals 512MB of Smart Flash Log storage per storage cell. Using
    Smart Flash Log can speed up transaction processing, as the first write that reports
    completion triggers the continuation of transaction processing at the database
    tier.


    Redo log writes are sent to both disk and the Smart Flash Log. Once the log writer
    process (LGWR) receives an acknowledgment that a write is completed, transaction
    processing continues. It doesn’t matter which write, to the Smart Flash Log or
    to disk, completes first; it’s the acknowledgment that triggers the database server
    to allow processing to proceed. Rest assured that all writes to Smart Flash Log
    are also written to disk. Just because Smart Flash Log finished first, it doesn’t
    stop LGWR from completing its disk writes. In concept, the Smart Flash Log is
    very similar to using multiplexed redo logs, in that all configured logs are written,
    regardless of which log finished writing first.


    It’s a Disk


    Smart flash disks are not just for the Smart Flash Cache and Smart Flash Log to
    use. It’s possible to configure these devices as flash disks recognized by ASM
    to create a flash disk group.


    A flash disk group can be created using the flash disks on one or more storage
    cells, but it does require resizing the existing Smart Flash Cache. Before starting
    this process, it should be decided how large these flash disks will be, because
    creating such disks is not for the faint of heart, as it requires, as the first
    step, dropping the existing flash cache:


    ```

    CellCLI> drop flashcache

    Flash cache myexa1cel01_flashcache successfully dropped

    ```


    Once the flash cache is dropped, it can be created with the new size. To create
    a 100GB flash cache:


    ```

    CellCLI> create flashcache all size=100G

    Flash cache myexa1cel01_flashcache successfully created

    ```


    The flash disks available for ASM will be created with the balance of the available
    flash storage, 264.75GB, so no size parameter need be used:


    ```

    CellCLI> create gridddisk all flashdisk prefix=flash

    GridDisk flash_FD_00_myexa1cel01 successfully created

    GridDisk flash_FD_01_myexa1cel01 successfully created

    ...

    GridDisk flash_FD_15_myexa1cel01 successfully created


    CellCLI> list griddisk

    ...

             flash_FD_00_myexa1cel01 active

             flash_FD_01_myexa1cel01 active

             ...

             Flash_FD_15_myexa1cel01 active

    CellCLI>

    ```


    The choice can be made to create one or more sets of flash disks, by reconfiguring
    the Smart Flash Cache on only one storage cell, two storage cells, or even all
    of the available storage servers. Using the same prefix across storage servers
    allows all of the flash disks to be assigned to a single disk group in a single
    statement, regardless of which storage cell is involved. It’s also possible to
    create separate flash disk sets, by making the prefix cell-specific, so that multiple
    flash-based disk groups could be created simply by specifying the prefix name
    in the `CREATE DISKGROUP command` .


    Creating the flash disk group is not difficult; careful attention to detail is
    necessary, however, if multiple flash disk prefixes are in use, so that the proper
    set of flash disks will be assigned to the proper disk group. The command syntax
    is straightforward, but, first, the environment on the database server has to
    be set, in order to access the ASM instance. The following script, sid, is a good
    way to set the environment:


    ```

    #################################################################

    # Oracle sid selection script

    #

    # 13-May-2012 - Mary Mikell Spence

    #               Infocrossing

    #################################################################


    ORASID=$ORACLE_SID


    if [ -f /etc/oratab ]

    then

       export ORATAB=/etc/oratab

    else

       export ORATAB=/var/opt/oracle/oratab

    fi


    unset ORACLE_BASE


    echo;

    I=1

    for SHOW_DB in `cat $ORATAB | grep -v "#" |  grep -v ''*'' | cut -f 1 -d :`

    do

       OHOME=`grep -v ''#'' $ORATAB | grep -v ''*'' | grep "^$SHOW_DB:" | cut -d:
    -f 2`

       echo "$I - $SHOW_DB - $OHOME"

       I=`expr $I + 1`

    done

    echo;'
  trans: "\n*   `CACHE`，这会导致块被缓存。索引查找的 I/O 就是一种会被缓存的请求类型。\n*   `NOCACHE`，这将应用于来自 ASM\
    \ 的镜像块、日志写入，或者简单来说就是太大而无法放入缓存的请求。无论`CELL_FLASH_CACHE`设置为`DEFAULT`还是`KEEP`，此提示都会被设置。\n\
    *   `EVICT`，用于从缓存中移除数据。使用此提示的活动将是 ASM 再平衡操作（这会导致块从一个磁盘移动到另一个磁盘，从而使缓存的条目失效，因为它们引用的是原始物理位置）以及查找已超过\
    \ LRU 算法阈值的缓存数据。\n\n智能闪存缓存在决定如何以及处理什么时，除了考虑`CELL_FLASH_CACHE`设置和提供的提示外，还会考虑 I/O\
    \ 大小、类型和当前的缓存负载。非常大的 I/O 请求不会被缓存，任何可能对吞吐量产生负面影响的 I/O 请求也不会被缓存，因为缓存可能非常繁忙。\n\n\
    被缓存的写操作不受此缓存的影响，因为写入性能既不会提高也不会降低。`CELLSRV`执行磁盘写入，向数据库层发送确认，因此事务可以继续而不会中断。然后，智能闪存缓存决定数据是否要被缓存，使得磁盘写入独立于数据缓存过程。\n\
    \n读取事务是智能闪存缓存的受益者。对于读取操作，`CELLSRV`会确定数据是否已在智能闪存缓存中；它维护了一个缓存数据的内存散列表，以便 Oracle\
    \ 可以快速确定所需的块是否可以在那里找到。该散列表列出了未被标记为驱逐的块，因此当找到匹配项时，可以执行缓存查找。在以下情况下，缓存块可能会被驱逐：源块自缓存数据写入后已更改、当前事务的\
    \ I/O 需要空间且这些块位于 LRU 列表的顶部、块被标记为`KEEP`但已超出额外的`KEEP`阈值而未使用，或者它们的寿命已超过标准 LRU 阈值。\n\
    \n也可以使用`ALTER TABLE <TABLE_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])`和`ALTER\
    \ INDEX <INDEX_NAME> STORAGE(FLASH_CACHE [NONE|DEFAULT|KEEP])`命令手动将表或索引放入智能闪存缓存。指定`NONE`会阻止表或索引使用智能闪存缓存。`DEFAULT`设置智能闪存缓存的正常行为，并且在创建表或索引时默认设置为此值；`KEEP`会将表或索引放入智能闪存缓存（前提是空间足够），并且不会将其换出。不加区别地使用`KEEP`选项可能会填满智能闪存缓存，而没有空间留给`FLASH_CACHE`设置为`DEFAULT`的对象。`KEEP`设置应用于小表（例如，较小的查找表）或索引，以允许更大的表/索引（其`FLASH_CACHE`存储参数设置为`DEFAULT`）使用智能闪存缓存。\n\
    \n## 日志记录\n\n每个单元上配置的闪存存储并非仅用于智能闪存缓存，因为 Exadata 还提供了智能闪存日志作为重做日志写入的额外机制。每个配置的闪存磁盘都有\
    \ 32MB 的存储空间被配置为智能闪存日志；每个存储单元总共 512MB 的智能闪存日志存储。使用智能闪存日志可以加速事务处理，因为第一个报告完成的写入会触发数据库层继续进行事务处理。\n\
    \n重做日志写入被同时发送到磁盘和智能闪存日志。一旦日志写入器进程（`LGWR`）收到写入完成的确认，事务处理就会继续。无论是智能闪存日志还是磁盘上的写入先完成都不重要；是确认信号触发了数据库服务器允许处理继续进行。请放心，所有写入智能闪存日志的数据也会被写入磁盘。智能闪存日志先完成并不会阻止`LGWR`完成其磁盘写入。从概念上讲，智能闪存日志与使用多路复用重做日志非常相似，因为所有配置的日志都会被写入，无论哪个日志先完成写入。\n\
    \n## 它是磁盘\n\n智能闪存磁盘并不仅限于智能闪存缓存和智能闪存日志使用。可以将这些设备配置为 ASM 识别的闪存磁盘，以创建闪存磁盘组。\n\n可以使用一个或多个存储单元上的闪存磁盘创建闪存磁盘组，但这需要调整现有智能闪存缓存的大小。在开始此过程之前，应决定这些闪存磁盘的大小，因为创建此类磁盘并非易事，因为第一步是删除现有的闪存缓存：\n\
    \n```\nCellCLI> drop flashcache\nFlash cache myexa1cel01_flashcache successfully\
    \ dropped\n```\n\n一旦闪存缓存被删除，就可以用新的大小创建它。要创建一个 100GB 的闪存缓存：\n\n```\nCellCLI> create\
    \ flashcache all size=100G\nFlash cache myexa1cel01_flashcache successfully created\n\
    ```\n\n可用于 ASM 的闪存磁盘将使用剩余的可用闪存存储（264.75GB）创建，因此不需要使用大小参数：\n\n```\nCellCLI> create\
    \ griddisk all flashdisk prefix=flash\nGridDisk flash_FD_00_myexa1cel01 successfully\
    \ created\nGridDisk flash_FD_01_myexa1cel01 successfully created\n...\nGridDisk\
    \ flash_FD_15_myexa1cel01 successfully created\n\nCellCLI> list griddisk\n...\n\
    \         flash_FD_00_myexa1cel01 active\n         flash_FD_01_myexa1cel01 active\n\
    \         ...\n         flash_FD_15_myexa1cel01 active\nCellCLI>\n```\n\n可以选择创建一组或多组闪存磁盘，方法是仅在一个存储单元、两个存储单元甚至所有可用存储服务器上重新配置智能闪存缓存。在存储服务器之间使用相同的前缀允许将所有闪存磁盘分配给一个磁盘组，无论涉及哪个存储单元。也可以通过使前缀特定于单元来创建单独的闪存磁盘集，这样，只需在`CREATE\
    \ DISKGROUP`命令中指定前缀名称，就可以创建多个基于闪存的磁盘组。\n\n创建闪存磁盘组并不困难；但是，如果使用多个闪存磁盘前缀，则需要仔细注意细节，以便将正确的闪存磁盘集分配给正确的磁盘组。命令语法很简单，但是，首先必须设置数据库服务器上的环境才能访问\
    \ ASM 实例。以下脚本`sid`是设置环境的好方法：\n\n```\n#################################################################\n\
    # Oracle sid selection script\n#\n# 13-May-2012 - Mary Mikell Spence\n#      \
    \         Infocrossing\n#################################################################\n\
    \nORASID=$ORACLE_SID\n\nif [ -f /etc/oratab ]\nthen\n   export ORATAB=/etc/oratab\n\
    else\n   export ORATAB=/var/opt/oracle/oratab\nfi\n\nunset ORACLE_BASE\n\necho;\n\
    I=1\nfor SHOW_DB in `cat $ORATAB | grep -v \"#\" |  grep -v '*' | cut -f 1 -d\
    \ :`\ndo\n   OHOME=`grep -v '#' $ORATAB | grep -v '*' | grep \"^$SHOW_DB:\" |\
    \ cut -d: -f 2`\n   echo \"$I - $SHOW_DB - $OHOME\"\n   I=`expr $I + 1`\ndone\n\
    echo;\n```\n"
