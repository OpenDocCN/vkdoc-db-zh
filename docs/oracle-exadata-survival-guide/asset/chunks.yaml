    The savings from the Smart Scan for the COUNT() query are impressive. Oracle only
    had to process approximately one-fourth of the data that would have been returned
    by a conventionally configured system.


    Because there are so many functions available in an Oracle database, which of
    the many can be offloaded? Oracle provides a data dictionary view, V$SQLFN_METADATA,
    which answers that very question. Inside this view is a column named, appropriately
    enough, OFFLOADABLE, which indicates, for every Oracle-supplied function in the
    database, if it can be offloaded. As you could probably guess, it’s best to consult
    this view for each new release or patch level of Oracle running on Exadata. For
    11.2.0.3, there are 393 functions that are offloadable, quite a long list by any
    standard. The following is a tabular output of the full list produced by the offloadable_fn_tbl.sql
    script.'
