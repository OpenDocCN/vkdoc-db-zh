    \                 | 3355758      |\n\n已选择 58 行。\n\n## 使用 `V$SYSSTAT` 与 `V$SESSTAT`\n\
    \n`V$SYSSTAT` 提供了系统范围的统计信息视图，因此使用此视图来精确定位特定会话的问题将很困难。`V$SESSTAT` 提供了会话级别的统计信息，当某个特定会话成为问题时，它将更有用。查看我们一个数据库中\
    \ SID 为 1141 的非零统计信息，得到以下输出：\n\n```sql\nSQL> select sn.name, ss.value\n  2  from\
    \ v$sesstat ss join v$statname sn on sn.statistic# = ss.statistic#\n  3  and ss.sid\
