    When to Use Them, and How


    Now that you know where to find useful performance metrics and wait statistics,
    the next step is knowing how and when to use them to diagnose performance issues.
    Despite all of the available statistics and metrics you can use to dig deep into
    performance issues, the main concern, and driving force, behind performance evaluation
    and tuning is time. Users measure performance in how long a task takes to complete
    once started, and all of the I/O statistics in the world won’t mean much to most
    of them. The first stop on the journey to performance is through an AWR report
    for the period in question. AWR provides information you’ll need to find problems
    and begin the diagnosis process.'
