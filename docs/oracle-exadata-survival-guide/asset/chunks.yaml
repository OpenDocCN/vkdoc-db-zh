    OEM


    OEM 12c can also be used to monitor the storage cells, provided you have the System
    Monitoring plug-in for Exadata Storage Server installed. Although it may not provide
    all of the metrics reported by the command-line interface, it can give graphical
    representation of how the metric values change over time. Unfortunately, we do
    not have access to an OEM installation with this plug-in installed.


    ![image](images/sq.jpg) **Note**  As we don’t have access to the plug-in, our
    “choice” is the command-line interface. Others may choose OEM for the graphical
    representations it provides. The choice, ultimately, is yours to make. We, being
    old-school DBAs, prefer scripting to “flashy” graphic tools.


    Adding the O/S Metrics


    Oracle does a pretty good job of gathering performance statistics and metrics,
    but sometimes, especially when you encounter a bug situation, Oracle can miss
    the mark. It also has issues collecting and reporting low-level I/O data, such
    as that provided at the O/S level. In these situations, we turn to `iostat`, an
    O/S level utility that reports both the wait time and service time for I/O requests,
    something that Oracle cannot do.


    The `iostat` utility can produce two types of reports, one for CPU utilization
    and the other for device utilization. When `iostat` is called without parameters,
    these two types are combined into a single output block, and an example of that
    follows.


