    与之前的操作一样，将使用`deploy11203.sh`脚本，尽管步骤数量更多。以下是此过程此部分可用的完整步骤列表：


    ```

    Step  0 = ValidateEnv

    Step  1 = CreateWorkDir

    Step  2 = UnzipFiles

