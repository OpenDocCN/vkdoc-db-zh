    then this can be the source for subsequent clones.


    The SCAN Listener


    While both ERP 11i and R12 can take advantage of the Single Client Access Name
    (SCAN) listener, its use is optional. At the time of this writing, all of the
    EBS clients are pre-11.2; therefore, EBS cannot make full use of the SCAN listener.
    If you are running 11i, then you may be discouraged from using the SCAN listener
    for your ERP database, because Autoconfig does not support it—although there are
    manual steps for setting it up. Also, if you are setting up a dev/test environment
    with several different databases, you will be setting up multiple listeners—one
    for each environment. Perhaps you are migrating an 11i database from another platform
    where the 1521 port (port pool zero, in Oracle ERP parlance) has been in use for
    many years and, therefore, may be difficult to change. In any event, you may find
    yourself in a situation where you do not want the SCAN listener running on the
    default 1521 port. In that case, you will have to reconfigure the SCAN listener
    to run on a different port. It does not really matter much which port you choose,
    but to keep things fairly simple, we will go with 1523.


    There is a “My Oracle Support” note that outlines the steps as well (How to Modify
    SCAN Setting or SCAN Listener Port after Installation [ID 972500.1]). Using that
    note as a guide, we do the following:


    First, modify the `remote_listener` and `local_listener` parameters for any existing
    non-ERP databases. On each of these databases, as SYS, execute the following:


    ```

    SQL> alter system set remote_listener=''exacluster-scan:1523'' scope=spfile sid=''*''
    ;

    SQL> alter system set local_listener=

       ''(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))''

       scope=spfile sid=''dbm1'' ;

    SQL> alter system set local_listener=

       ''(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa02-vip)(PORT=1523))))''

       scope=spfile sid=''dbm2'' ;

    ```


    Set the environment for the Grid Oracle Home and do the same for ASM. Note that
    ASM does not have a `remote_listener`:


    ```

    alter system set local_listener=  ''(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))''

       scope=spfile sid=''+ASM1'' ;

    alter system set local_listener=  ''(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))''

       scope=spfile sid=''+ASM2'' ;

    ```


    Shut down all databases.


    ```

    $ srvctl stop database -d dbm

    ```


    Now, we will set the environment for the Grid Oracle Home and change the listener
    port, as follows:


    ```

    $ srvctl modify listener -l LISTENER -p "TCP:1523"

    $ srvctl modify scan_listener -p 1523

    $ srvctl stop scan_listener

    $ srvctl start scan_listener

    ```


    Restart the database(s), and that’s all there should be to it.


    ```

    $ srvctl start database –d dbm

    ```


    Creating a Database


    Whether performing a fresh installation or migrating from another server, you
    will have to create an empty database for your future full-blown ERP environment.
    In truth, this does not really differ from creating a database in any RAC environment
    where Oracle Managed Files are in use. The interesting part will come in the next
    section, when we discuss setting up the listener. For the sake of completeness,
    however, we must mention that, yes, a database gets created.


    The simplest method is just to use `dbca`. Set the `ORACLE_HOME` and modify the
    `PATH` appropriately, as follows:


    ```

    $ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb

    $ export PATH=$PATH:$ORACLE_HOME/bin

    $ dbca

    ```'
  trans: "\n# SCAN 监听器与数据库创建指南\n\n## Oracle Home 的注册与补丁应用\n\n前述命令将确保 `Oracle Home`\
    \ 被注册到中央 `inventory` 中。正确执行克隆操作非常重要，因为它会对后续应用数据库补丁（特别是季度捆绑补丁）产生重大影响。如果 `Oracle\
    \ Home` 未注册，你将无法为其应用补丁。\n\n很可能需要在此基础版本之上安装额外的数据库补丁。一旦有额外的补丁应用到这个 `Oracle Home`，它就可以作为后续克隆操作的源。\n\
    \n## SCAN 监听器\n\n虽然 `ERP 11i` 和 `R12` 都可以利用单客户端访问名称 (`SCAN`) 监听器，但其使用是可选的。在撰写本文时，所有的\
    \ `EBS` 客户端版本都低于 11.2；因此，`EBS` 无法充分利用 `SCAN` 监听器。如果你运行的是 `11i`，那么你可能会被建议不要为你的\
    \ `ERP` 数据库使用 `SCAN` 监听器，因为 `Autoconfig` 不支持它——尽管有手动设置步骤。此外，如果你正在搭建一个包含多个不同数据库的开发/测试环境，你将需要设置多个监听器——每个环境一个。也许你正在将一个\
    \ `11i` 数据库从其他平台迁移过来，而 1521 端口（用 `Oracle ERP` 的术语说，即端口池零）已经使用了多年，因此可能难以更改。无论如何，你可能会发现自己处于一种不希望\
    \ `SCAN` 监听器运行在默认 1521 端口上的情况。在这种情况下，你将不得不重新配置 `SCAN` 监听器以使其在另一个端口上运行。具体选择哪个端口其实并不太重要，但为了保持相当简单，我们将使用\
    \ `1523`。\n\n“My Oracle Support”上有一份说明也概述了相关步骤 (`How to Modify SCAN Setting or\
    \ SCAN Listener Port after Installation [ID 972500.1]`)。以该说明为指导，我们执行以下操作：\n\n\
    首先，修改任何现有的非 `ERP` 数据库的 `remote_listener` 和 `local_listener` 参数。在每个这样的数据库上，以 `SYS`\
    \ 身份执行以下命令：\n\n```sql\nSQL> alter system set remote_listener='exacluster-scan:1523'\
    \ scope=spfile sid='*' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='dbm1' ;\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa02-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='dbm2' ;\n```\n\n设置 `Grid Oracle Home` 的环境，并为 `ASM` 执行相同的操作。注意，`ASM`\
    \ 没有 `remote_listener`：\n\n```sql\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='+ASM1' ;\nalter system set local_listener=  '(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=exa01-vip)(PORT=1523))))'\n\
    \   scope=spfile sid='+ASM2' ;\n```\n\n关闭所有数据库。\n\n```bash\n$ srvctl stop database\
    \ -d dbm\n```\n\n现在，我们将设置 `Grid Oracle Home` 的环境并更改监听器端口，如下所示：\n\n```bash\n$ srvctl\
    \ modify listener -l LISTENER -p \"TCP:1523\"\n$ srvctl modify scan_listener -p\
    \ 1523\n$ srvctl stop scan_listener\n$ srvctl start scan_listener\n```\n\n重启数据库，应该就全部完成了。\n\
    \n```bash\n$ srvctl start database –d dbm\n```\n\n## 创建数据库\n\n无论是执行全新安装还是从其他服务器迁移，你都必须为你未来的完整\
    \ `ERP` 环境创建一个空数据库。实际上，这与在任何使用 `Oracle Managed Files` 的 `RAC` 环境中创建数据库并无区别。有趣的部分将在下一节讨论设置监听器时到来。然而，为了文档的完整性，我们必须提及，是的，需要创建一个数据库。\n\
    \n最简单的方法是使用 `dbca`。设置 `ORACLE_HOME` 并相应地修改 `PATH`，如下所示：\n\n```bash\n$ export ORACLE_HOME=/u01/app/oracle/product/11.2.0.3/erpdevdb\n\
    $ export PATH=$PATH:$ORACLE_HOME/bin\n$ dbca\n```\n"
- fmt: "The steps for running `dbca` are well-documented, so we will not go into detail\
    \ about that here. Make the usual choices regarding what disk group to use for\
    \ your Oracle Managed Files, the character set to use, and various memory configuration\
    \ choices. When complete, you may still want to adjust the redo log sizes and\
    \ the storage parameters for the tablespaces (`SYSTEM`, `UNDOTBS1` and `UNDOTBS2`,\
    \ `TEMP`, `USERS`, etc.).\n\nOnce the database creation is complete, add the instance\
    \ (the database will already have been added) to the `oratab` in each node in\
    \ the cluster and use Oracle’s `oraenv` utility to set your environment. Your\
    \ `oratab` on node 1 should look something like the following:\n```\n+ASM1:/u01/app/11.2.0.3/grid:N\n\
    agent11g:/u01/app/oracle/GCAgents/oracle/MW/agent11g:N\ndbm1:/u01/app/oracle/product/11.2.0.3/dbhome_1:N\n\
    erpdev1:/u01/app/oracle/product/11.2.0.3/erpdevdb:N\ndbm:/u01/app/oracle/product/11.2.0.3/dbhome_1:N\
    \           # line added by Agent\nerpdev:/u01/app/oracle/product/11.2.0.3/erpdevdb:N\
    \        # line added by Agent\n```\nThe `oratab` for node 2 will be similar,\
    \ the difference being that the instances local to that node (`dbm2`, `erpdev2`,\
    \ etc.) will be listed.\n\n## Setting Up the Listener\nEarlier, we moved the SCAN\
    \ listener to `1523`. Because port `1521` is now free, if we wish, we can create\
    \ a new listener that uses that port. This listener will be specific to our `ERPDEV`\
    \ database. Regardless of what port you do use, you will have to go through these\
    \ steps to create a listener dedicated to your new database. The main point is\
    \ that you cannot use the port that the SCAN listener is using.\n\nShut down the\
    \ newly created `ERPDEV` database:\n```\n$ srvctl stop database -d erpdev\n```\n\
    Under the `$ORACLE_HOME/network/admin` directory, create a new `tnsnames.ora`\
    \ file with the following entries:\n```\nerpdev=\n        (DESCRIPTION=\n    \
    \            (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n           \
    \     (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n            (LOAD_BALANCE\
    \ = yes)\n            (CONNECT_DATA=\n                (SERVER=DEDICATED)\n   \
    \             (SERVICE_NAME=erpdev)\n            )\n        )\n\nerpdev1_LOCAL=\n\
    \        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n\
    \        )\n\nerpdev2_LOCAL=\n        (DESCRIPTION=\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n\
    \        )\n\nerpdev_REMOTE=\n        (DESCRIPTION=\n            (ADDRESS_LIST=\n\
    \                (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521))\n       \
    \         (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521))\n              \
    \  (ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1523))\n                (ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1523))\n\
    \            )\n        )\n```\nNote the port `1523` references in the `erpdev_REMOTE`\
    \ entry. These address entries will cause the database service to register with\
    \ the default listener as well. Having the database registered with the default\
    \ listener is required, if it becomes necessary to run `dbca` at any point in\
    \ the future for this database. There are a variety of reasons why you may need\
    \ to run `dbca`: to configure Database Vault or Oracle Internet Directory, for\
    \ example.\n\nNext, create the listener and tie it to this Oracle Home.\n```\n\
    $ srvctl add listener -l erpdev -o $ORACLE_HOME -p 1521\n$ srvctl setenv listener\
    \ -l erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n$ srvctl setenv database\
    \ -d erpdev -T TNS_ADMIN=$ORACLE_HOME/network/admin\n```\nStart up the database\
    \ and change its listener parameters.\n```\n$ srvctl start database -d erpdev\n\
    \nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa01-vip)(PORT=1521)))'\n\
    \   sid='erpdev1' ;\n\nSQL> alter system set local_listener=\n   '(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=exa02-vip)(PORT=1521)))'\n\
    \   sid='erpdev2' ;\n\nSQL> alter system set remote_listener='erpdev_REMOTE' ;\n\
    ```\nIf you wish to also register the database with the SCAN listener, the `remote_listener`\
    \ parameter may be set as follows:\n```\nSQL> alter system set remote_listener='erpdev_REMOTE','exacluster-scan:1523'\
    \ ;\n```\n\n## Data Migration\nAt this point, we have an empty database and a\
    \ listener for that database. Unless this is a fresh install of Oracle ERP, the\
    \ next (and most time-consuming) step is the migration of the existing database\
    \ to our new, bright, shiny, Exadata database. The steps for migration are varied,\
    \ based on the source platform, ERP version, and a host of other factors. Suffice\
    \ to say, you will want to familiarize yourself with the copious “My Oracle Support”\
    \ notes to get your database from point A to point Exadata. We cannot begin to\
    \ attempt to cover that territory here. So, we will pick up at the point where\
    \ the import is complete and Autoconfig has been run. Please see the list of MOS\
    \ notes at the end of this chapter, which should provide a good basis for getting\
    \ you through.\n\n## Environment Configuration\nIn a traditional, single-node\
    \ ERP database environment, the SQLNet configuration files are stored under `$ORACLE_HOME/network/admin/<context>`\
    \ where `<context>` is `instance_server`. It is Autoconfig that creates those\
    \ files. Also, the `env` file that it creates sets `TNS_ADMIN` to that same `$ORACLE_HOME/network/admin/<context>`\
    \ location. However, in a RAC environment, we want to use `srvctl` to manage the\
    \ environment (i.e., start and stop the databases and the listeners). That being\
    \ the case, we cannot have `TNS_ADMIN` set in such a way, as it would obviously\
    \ have to be different on each node as the instance name changes.\n\nTraditional\
    \ single-node set-up:\n```\nTNS_ADMIN=$ORACLE_HOME/network/admin/erpdev_dbsrvr\n\
    $ORACLE_HOME/network/admin/erpdev_dbsrvr/tnsnames.ora\n$ORACLE_HOME/network/admin/erpdev_dbsrvr/listener.ora\n\
    ```\nIn addition, there will be an `ifile` parameter pointing to another file\
    \ that can be used for custom settings. On Exadata (RAC), we are going to flip\
    \ that around. Note in particular that we will not use the Autoconfig-generated\
    \ `listener.ora` at all, as its entries are not applicable to RAC.\n\nBe aware\
    \ that the `tnsnames.ora` file that Autoconfig creates is generally full of errors\
    \ in terms of what is needed for RAC. That file should be reviewed and adjustments\
    \ made. The `tnsnames.ora` file that we created earlier can be used as a model\
    \ for this. We then want to avoid these changes being overwritten as a result\
    \ of subsequent runs of Autoconfig.\n\nThere are a few options for managing this.\n\
    1.  Copy the file over the `$ORACLE_HOME/network/admin/tnsnames.ora`, i.e.,\n\
    ```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n    $ cp tnsnames.ora\
    \ ../.\n```\n2.  Rename the original file and add an `ifile` entry to `$ORACLE_HOME/network/admin/tnsnames.ora`\
    \ that will point to it.\n```\n    $ cd $ORACLE_HOME/network/admin/erpdev1_exadb01\n\
    \    $ cp tnsnames.ora tnsnames.ora.erpdev\n    $ vi $ORACLE_HOME/network/admin/tnsnames.ora\n\
    \    add ➔ ifile=<ORACLE_HOME>/network/admin/erpdev1_exadb01/tnsnames.ora.erpdev\n\
    ```\nBecause Autoconfig naturally restricts its activities to `$ORACLE_HOME/network/admin/<context>`\
    \ directory, this option works nicely. Files under `$ORACLE_HOME/network/admin`\
    \ will not be affected. Whatever you choose to do, this has to be communicated\
    \ fully to anyone who may be either running Autoconfig on these servers in the\
    \ future or adding entries to remote databases to the `tnsnames.ora`.\n\n![image](images/sq.jpg)\
    \ **Note** The `ifile` entry has to have the full path. `$ORACLE_HOME` will not\
    \ work there. Ensure use of the full path on both nodes.\n\n## Setting the Environment"
