    \          0           0\nFetch     2775      0.13       0.15          0     \
    \     0          0       41609\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\ntotal     2777      0.13       0.15     \
    \     0          4          0       41609\n\nMisses in library cache during parse:\
    \ 1\nOptimizer mode: ALL_ROWS\nParsing user id: 401\nNumber of plan statistics\
    \ captured: 1\n\nRows (1st) Rows (avg) Rows (max)  Row Source Operation\n----------\
    \ ---------- ----------  ---------------------------------------------------\n\
    \     41609      41609      41609  FIXED TABLE FULL X$KCFISOSSN (cr=0 pr=0 pw=0\
    \ time=116083 us cost=0\n                                  size=676 card=1)\n\n\
    Elapsed times include waiting on following events:\n  Event waited on        \
    \                     Times   Max. Wait  Total Waited\n  ----------------------------------------\
    \   Waited  ----------  ------------\n  SQL*Net message to client            \
    \        2775        0.00          0.00\n  cell statistics gather            \
    \             66        0.00          0.02\n  SQL*Net message from client    \
    \              2775        2.63         12.53\n  row cache lock              \
    \                     9        0.00          0.00\n  library cache lock      \
    \                         2        0.00          0.00\n  library cache pin   \
    \                             2        0.00          0.00\n********************************************************************************\n\
    ```\n\n## 系统I/O等待事件\n\n在此等待类别中有五个特定于单元的事件，其中三个很少积累显著的时间。两个备份事件在备份和恢复操作期间确实会积累时间，它们之所以有趣，不仅在于哪些操作记录了时间，还在于你认为应该记录时间但实际上没有记录的操作。我们在[表7-2](#9781430260103_Ch07.xhtml#Tab2)中列出了非备份事件。\n\
    \n[表7-2](#9781430260103_Ch07.xhtml#_Tab2)。单元启动和关闭等待事件\n\n| 事件 | 描述 |\n| --- |\
    \ --- |\n| Cell manager closing cell | 此事件是单元关闭事件，记录单元关闭操作的时间。唯一传回的参数是单元哈希值（`cellhash#`）。\
    \ |\n| Cell manager opening cell | 此事件是单元启动事件。唯一传回的参数同样是单元哈希值（`cellhash#`）。 |\n\
    | Cell manager discovering disks | 这是另一个单元启动事件，传回单元哈希值（`cellhash#`）。与其他两个事件一样，不提供其他参数。\
    \ |\n\n## 等待事件：Cell Smart Incremental Backup\n\nExadata通过允许将RMAN（恢复管理器）增量备份卸载到存储层，优化了此类备份。因此，此事件会为增量级别1备份积累等待时间，其中处理已卸载到存储层。在Exadata上，更改在块级别进行跟踪，从而可以更快地备份自上次增量级别0备份以来更改的块。存储层特别适合此类处理，因此需要这个新的等待事件。\n\
    \n并非每个增量备份都会触发此等待事件。增量级别0备份不会触发，因为它们本质上是完整备份，不依赖于块更改跟踪。它们是任何使用增量备份的恢复操作的起点，这就是为什么在执行恢复时，如果没有`RECOVER\
    \ ... UNTIL ...`子句或`SET UNTIL TIME`语句，最近的增量级别0备份会取代任何先前的增量级别0备份。\n\n此事件仅填充单元哈希值（`cellhash#`）。通常，Oracle会重置或清除当前等待事件未传递的任何参数，但有时，先前等待事件填充的值会残留下来。`obj#`参数就是其中一个可能在记录此事件的10046跟踪文件中被填充的参数。在这种情况下，非负的`obj#`是没有意义的。Oracle会用-1填充`obj#`，以显示它是从先前的事件中清除的。\n\
    \n## 等待事件：Cell Smart Restore from Backup\n\n此事件记录使用RMAN进行还原所花费的等待时间。就像前一个事件一样，Exadata将此处理卸载到存储单元，这些单元再次因其直接访问存储而特别适合此类操作。\n\
    \n此事件实际上与`cell smart file creation`事件相关；两个事件都记录格式化空数据块和与文件创建相关的初始化操作的时间。"
  raw: 'When data files are created or extended, data blocks must be formatted. On
    non-Exadata systems, this task falls to the database server, and the `data file
    init write` event collects time when this occurs. Exadata does things differently
    by having the storage cells perform this task, and as a result, the `cell smart
    file creation` wait event records time when data blocks are formatted. Note that
    a file does not have to be added to a tablespace for this wait to occur; the event
    actually records time against data block formatting.


    It may seem strange to have this wait event in the User I/O category, but many
    times, data blocks are formatted due to DML operations, such as autoextending
    a data file or deleting data. Other operations that can trigger this event include
    updates, nonunique index creations, direct-path loads, and inserts using the `/*+
    append */` hint.


    How can updates and deletes trigger the `cell smart file creation` wait event?
    As noted previously, the wait event actually records time for data block-formatting
    operations, and deletes can cause data blocks to be reformatted for reuse when
    those blocks no longer contain data. Updates can also trigger this event, as an
    update may trigger a data file extension or use of a new data block, if row chaining
    or migration occurs.


    There is only one parameter returned when this event is triggered and that is
    the cell hash (cellhash#); all other parameters that could be passed are unused.


    Cell Statistics Gather


    This is a wait event that we feel is incorrectly categorized as User I/O, because
    it doesn’t record time against disk I/O operations; rather, it records time reading
    from `V$CELL_THREAD_HISTORY`, `V$CELL_REQUEST_TOTALS`, and other X$ tables and
    V$ views referencing cell activities, as well as recursive queries against the
    AUD$ table.


    Generating a 10046 trace file and using `grep` to find this event produces the
    following abbreviated output:


    ```

    WAIT #47971177959976: nam=''cell statistics gather'' ela= 235 cellhash#=0 p2=0
    p3=0 obj#=384 tim=1372568877816026

    WAIT #47971177959976: nam=''cell statistics gather'' ela= 253 cellhash#=0 p2=0
    p3=0 obj#=384 tim=1372568877836094

