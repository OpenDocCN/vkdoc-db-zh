- fmt: "# CHAPTER 12\n\n![image](images/frontdot.jpg)\n\n## Migrating Databases to\
    \ Exadata\n\nAn Exadata system, freshly installed and configured, has but one\
    \ database, normally named DBM. As you might expect, it’s a RAC database, so it\
    \ exists on all available database servers. Exadata can run more than one database\
    \ (either clustered or non-clustered), which is why you bought the system in the\
    \ first place. Creating new databases isn’t difficult, if you’ve built RAC databases\
    \ before, and if you haven’t, we’ll provide instructions and guidance in this\
    \ chapter, to help you along. However, you won’t always be building truly “new”\
    \ databases, because your goal is to migrate existing application databases to\
    \ Exadata. There are a number of ways to accomplish this task. Some, such as the\
    \ logical methods, require an empty database to work with, while others (the physical\
    \ methods) will require only an `init.ora` file and the control files to get the\
    \ process started. The aim of this chapter is to make migrating databases to Exadata\
    \ as painless a task as possible.\n\n## Getting Physical\n\nIn these sections,\
    \ we will discuss three options for physically migrating databases to Exadata:\
    \ backups, transportable tablespaces, and standby databases. Each method has its\
    \ advantages and disadvantages. Which method you choose is dependent on what migration\
    \ strategy you have to use. Not all platforms are the same. Some are “big-endian,”\
    \ where the most significant byte of a data “word” is written to the lowest address\
    \ in memory, and others are “little-endian,” where the least significant byte\
    \ of a data “word” is written to the lowest memory address.\n\n## Act 4\n\nCongratulations,\
    \ you have completed the storage reconfiguration of your Exadata system. Looking\
    \ at `V$ASM_DISKGROUP`, you should see output similar to the following, if you\
    \ used the `SizeArr` setting from the example:\n\n```\nSYS> select name, free_mb,\
    \ usable_file_mb\n  2  from v$asm_diskgroup\n  3  where name like '%MYEXA%';\n\
    \nNAME                              FREE_MB USABLE_FILE_MB\n------------------------------\
    \ ---------- --------------\nDATA_MYEXA1                      52375300       17051522\n\
    RECO_MYEXA1                      46920568       15638300\n\nSYS>\n```\n\nThe values\
    \ of interest are those in the `USABLE_FILE_MB` column. From earlier in the chapter,\
    \ the output of that query against the original storage allocations follows.\n\
    \n```\nSQL> select name, free_mb, usable_file_mb\n  2  from v$asm_diskgroup\n\
    \  3  where name like '%MYEXA%';\n\nNAME                              FREE_MB\
    \ USABLE_FILE_MB\n------------------------------  --------- --------------\nDATA_MYEXA1\
    \                      81050256       26959176\nRECO_MYEXA1                  \
    \    20324596        6770138\n\nSQL>\n```\n\nThere may be other tasks that you\
    \ need to perform, depending on how you have the Exadata system configured, which\
    \ include reinstalling any OEM agents you had running and, if it’s not using the\
    \ default port, reconfiguring the SCAN listener. Steps such as these are part\
    \ of the preparation step prior to reconfiguration and should be noted prior to\
    \ starting any storage reallocation.\n\n### Things to Know\n\nReconfiguring the\
    \ storage allocations is possible on Exadata, but it is a destructive process\
    \ that requires planning prior to execution.\n\nIt will be necessary to drop the\
    \ existing storage configuration using the `/opt/oracle.SupportTools/onecommand/deploy11203.sh`\
    \ script. This script will also be used, with different parameters, to create\
    \ the new storage configuration.\n\nDropping the existing storage configuration\
    \ is performed in three steps: dropping the GRID Infrastructure, dropping the\
    \ cell disks, then dropping the associated user accounts and groups. Since the\
    \ “oracle” O/S user will be dropped in this process, it is necessary to preserve\
    \ the existing O/S user home on all available database servers in the Exadata\
    \ system. This can be done with `tar` or `cpio` to create an archive of the directories\
    \ and files in those locations.\n\nThere is a configuration file under `/opt/oracle.SupportTools/onecommand`\
    \ named `onecommand.params`. It is this file that has to be edited to provide\
    \ the new storage array size. The size provided in this file is for the +DATA\
    \ disk group (the +DATA and +RECO disk group names usually include the Exadata\
    \ machine name, for example, +DATA_MYEXA1 and +RECO_MYEXA1 for an Exadata machine\
    \ named MYEXA1); the recovery disk group size is derived from this parameter’s\
    \ value.\n\nThe actual reconfiguration takes place using, once again, the `/opt/oracle.SupportTools/onecommand/deploy11203.sh`\
    \ script and encompasses 26 separate steps. These steps reestablish user accounts,\
    \ connectivity, software installations, disk partition creations, creation of\
    \ the grid disks and ASM disk groups, creating the default DBM database, and applying\
    \ database and security patches across the various homes. This part of the process\
    \ also ensures that inter-process communication (`IPC`) uses InfiniBand, rather\
    \ than the standard network, to avoid performance issues.\n\nThe next step you\
    \ must execute is the restoration of all but the `.ssh` directory in the “oracle”\
    \ O/S user’s home directory. Since passwordless `ssh` connectivity was established\
    \ by the reconfiguration procedure, overwriting those files would disable that\
    \ functionality.\n\nFinally, you must connect as the “oracle” user, preferably\
    \ using an additional session, to verify that all functionality you established\
    \ prior to the reconfiguration works, as expected.\n\nAdditional tasks you may\
    \ need to perform include reinstalling OEM agents and reconfiguring the SCAN listener,\
    \ if you changed it from using the default port.\n\nYou may be prompted to overwrite\
    \ existing files. With the exception of the `.ssh` directory, you should do so,\
    \ as the files you are restoring are those which you configured prior to the storage\
    \ reallocation. Remember that this process reestablished passwordless `ssh` connectivity\
    \ for “oracle,” and replacing the `.ssh` directory contents with those you saved\
    \ prior to the reconfiguration could disable passwordless `ssh`, because the signatures\
    \ in the saved authorized_keys file don’t match the current values. Check the\
    \ logfile for any errors you may have missed as the verbose output scrolled by\
    \ and correct the listed errors. Use `tar` again to restore files or directories\
    \ not created because of errors that have now been corrected. Should a second\
    \ pass with `tar` be required, do `not` replace existing files when prompted.\n\
    \nIf you used `cpio` to archive the directory and its contents, the following\
    \ command will restore the archived items:\n\n```\n$ cpio -ivf ./.ssh < /tmp/oraclehome.cpio\
    \ | tee oraclehome_restore.log\n```\n\nThe `cpio` utility reads the archive specified;\
    \ extracts the files and directories, except for the `.ssh` directory; and puts\
    \ them in the current location. As explained in the `tar` example, you do not\
    \ want to overwrite the `.ssh` directory contents, because the reconfiguration\
    \ process reestablished passwordless `ssh` connectivity for “oracle,” and overwriting\
    \ those current files will disable that configuration. Once the archive restore\
    \ is finished, you need to check the logfile for errors. Presuming there are none,\
    \ you should be back to the “oracle” O/S user configuration you established before\
    \ making changes to the storage allocations. If you do find errors in the restore,\
    \ correct the conditions causing those errors and use `cpio` again to restore\
    \ the files or directories that failed to create, due to errors.\n\nOpen another\
    \ session and log in as “oracle,” to see that all of the restored settings function\
    \ as intended. If you have configured a way to set various ORACLE_HOME environments,\
    \ that method should be tested, to ensure that nothing was missed in the archive\
    \ of the “oracle” O/S user home or in the restore of those archived files and\
    \ directories."
  raw: 'You may be prompted to overwrite existing files. With the exception of the
    `.ssh` directory, you should do so, as the files you are restoring are those which
    you configured prior to the storage reallocation. Remember that this process reestablished
    passwordless `ssh` connectivity for “oracle,” and replacing the `.ssh` directory
    contents with those you saved prior to the reconfiguration could disable passwordless
    `ssh`, because the signatures in the saved authorized_keys file don’t match the
    current values. Check the logfile for any errors you may have missed as the verbose
    output scrolled by and correct the listed errors. Use `tar` again to restore files
    or directories not created because of errors that have now been corrected. Should
    a second pass with `tar` be required, do *not* replace existing files when prompted.


    If you used `cpio` to archive the directory and its contents, the following command
    will restore the archived items:


    ```

    $ cpio -ivf ./.ssh < /tmp/oraclehome.cpio | tee oraclehome_restore.log

    ```


    The `cpio` utility reads the archive specified; extracts the files and directories,
    except for the `.ssh` directory; and puts them in the current location. As explained
    in the `tar` example, you do not want to overwrite the `.ssh` directory contents,
    because the reconfiguration process reestablished passwordless `ssh` connectivity
    for “oracle,” and overwriting those current files will disable that configuration.
    Once the archive restore is finished, you need to check the logfile for errors.
    Presuming there are none, you should be back to the “oracle” O/S user configuration
    you established before making changes to the storage allocations. If you do find
    errors in the restore, correct the conditions causing those errors and use `cpio`
    again to restore the files or directories that failed to create, due to errors.


    Open another session and log in as “oracle,” to see that all of the restored settings
    function as intended. If you have configured a way to set various ORACLE_HOME
    environments, that method should be tested, to ensure that nothing was missed
    in the archive of the “oracle” O/S user home or in the restore of those archived
    files and directories.


    Act 4


    Congratulations, you have completed the storage reconfiguration of your Exadata
    system. Looking at `V$ASM_DISKGROUP` , you should see output similar to the following,
    if you used the `SizeArr` setting from the example:


    ```

    SYS> select name, free_mb, usable_file_mb

      2  from v$asm_diskgroup

      3  where name like ''%MYEXA%'';


    NAME                              FREE_MB USABLE_FILE_MB

    ------------------------------ ---------- --------------

    DATA_MYEXA1                      52375300       17051522

    RECO_MYEXA1                      46920568       15638300


    SYS>

    ```


    The values of interest are those in the `USABLE_FILE_MB` column. From earlier
    in the chapter, the output of that query against the original storage allocations
    follows.


    ```

    SQL> select name, free_mb, usable_file_mb

      2  from v$asm_diskgroup

      3  where name like ''%MYEXA%'';


    NAME                              FREE_MB USABLE_FILE_MB

    ------------------------------  --------- --------------

    DATA_MYEXA1                      81050256       26959176

    RECO_MYEXA1                      20324596        6770138


    SQL>

    ```


    There may be other tasks that you need to perform, depending on how you have the
    Exadata system configured, which include reinstalling any OEM agents you had running
    and, if it’s not using the default port, reconfiguring the SCAN listener. Steps
    such as these are part of the preparation step prior to reconfiguration and should
    be noted prior to starting any storage reallocation.


    Things to Know


    Reconfiguring the storage allocations is possible on Exadata, but it is a destructive
    process that requires planning prior to execution.


    It will be necessary to drop the existing storage configuration using the `/opt/oracle.SupportTools/onecommand/deploy11203.sh`
    script. This script will also be used, with different parameters, to create the
    new storage configuration.


    Dropping the existing storage configuration is performed in three steps: dropping
    the GRID Infrastructure, dropping the cell disks, then dropping the associated
    user accounts and groups. Since the “oracle” O/S user will be dropped in this
    process, it is necessary to preserve the existing O/S user home on all available
    database servers in the Exadata system. This can be done with `tar` or `cpio`
    to create an archive of the directories and files in those locations.


    There is a configuration file under `/opt/oracle.SupportTools/onecommand` named
    `onecommand.params`. It is this file that has to be edited to provide the new
    storage array size. The size provided in this file is for the +DATA disk group
    (the +DATA and +RECO disk group names usually include the Exadata machine name,
    for example, +DATA_MYEXA1 and +RECO_MYEXA1 for an Exadata machine named MYEXA1);
    the recovery disk group size is derived from this parameter’s value.


    The actual reconfiguration takes place using, once again, the `/opt/oracle.SupportTools/onecommand/deploy11203.sh`
    script and encompasses 26 separate steps. These steps reestablish user accounts,
    connectivity, software installations, disk partition creations, creation of the
    grid disks and ASM disk groups, creating the default DBM database, and applying
    database and security patches across the various homes. This part of the process
    also ensures that inter-process communication (IPC) uses InfiniBand, rather than
    the standard network, to avoid performance issues.


    The next step you must execute is the restoration of all but the `.ssh` directory
    in the “oracle” O/S user’s home directory. Since passwordless `ssh` connectivity
    was established by the reconfiguration procedure, overwriting those files would
    disable that functionality.


    Finally, you must connect as the “oracle” user, preferably using an additional
    session, to verify that all functionality you established prior to the reconfiguration
    works, as expected.


    Additional tasks you may need to perform include reinstalling OEM agents and reconfiguring
    the SCAN listener, if you changed it from using the default port.


    CHAPTER 12


    ![image](images/frontdot.jpg)


    Migrating Databases to Exadata


    An Exadata system, freshly installed and configured, has but one database, normally
    named DBM. As you might expect, it’s a RAC database, so it exists on all available
    database servers. Exadata can run more than one database (either clustered or
    non-clustered), which is why you bought the system in the first place. Creating
    new databases isn’t difficult, if you’ve built RAC databases before, and if you
    haven’t, we’ll provide instructions and guidance in this chapter, to help you
    along. However, you won’t always be building truly “new” databases, because your
    goal is to migrate existing application databases to Exadata. There are a number
    of ways to accomplish this task. Some, such as the logical methods, require an
    empty database to work with, while others (the physical methods) will require
    only an `init.ora` file and the control files to get the process started. The
    aim of this chapter is to make migrating databases to Exadata as painless a task
    as possible.


    Getting Physical


    In these sections, we will discuss three options for physically migrating databases
    to Exadata: backups, transportable tablespaces, and standby databases. Each method
    has its advantages and disadvantages. Which method you choose is dependent on
    what migration strategy you have to use. Not all platforms are the same. Some
    are “big-endian,” where the most significant byte of a data “word” is written
    to the lowest address in memory, and others are “little-endian,” where the least
    significant byte of a data “word” is written to the lowest memory address.'
