    This is a lot of information to process, and you don’t really need all of it to
    monitor the grid disks. One benefit to using the `DETAIL` option to any of the
    `LIST` commands is that the entire attribute list is provided in an `attribute:
    value` output format. Some of the `LIST` commands produce a long list of output
    (like the `LIST GRIDDISK DETAIL` example), so you might want to wait until the
    output stops scrolling to take note of the available attributes. With an attribute
    list in hand, you can then report on attributes that interest you. For example,
    looking at the output from `LIST GRIDDISK ATTRIBUTES name, celldisk, offset, size,
    status`, a much more manageable and readable report is generated.


    ```

    CellCLI> LIST GRIDDISK ATTRIBUTES name, celldisk, offset, size, status

