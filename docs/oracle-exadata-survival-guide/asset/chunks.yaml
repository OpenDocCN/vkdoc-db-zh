    our data agreed fairly well with the estimates; [Table 6-4](#9781430260103_Ch06.xhtml#Tab4)
    summarizes those results.


    [Table 6-4](#9781430260103_Ch06.xhtml#_Tab4). Actual Observed Compression Ratios


