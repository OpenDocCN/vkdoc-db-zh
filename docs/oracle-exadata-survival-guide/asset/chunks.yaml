    EMP                            ENABLED  QUERY LOW


    Elapsed: 00:00:00.02

    SQL>

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

      3  group by segment_name;


    SEGMENT_NAME                        TOTAL_SPACE

    ----------------------------------- -----------

    DEPT                                      65536

    DUMMY                                     65536

    EMP                                    14680064

    EMP_IDX                               260046848

    SALGRADE                                  65536


    Elapsed: 00:00:00.02

    SQL>

    ```


    ARCHIVE


    The HCC compression type ARCHIVE is definitely the most aggressive in terms of
    space savings, but it’s also intended for data that is designated read-only and
    is or will be archived for occasional use. It certainly isn’t intended for actively
    updated tables; the space savings would be lost due to uncompressing the data,
    to allow the updates and recompressing at the lower OLTP level. We’ll compress
    our standard EMP table for ARCHIVE HIGH and see what space savings are generated:


    ```

    SQL> --

    SQL> -- Current storage for the EMP table

    SQL> -- (this is simply a test table for this example)

    SQL> --

    SQL> select segment_name, sum(bytes) total_space

      2  from user_segments

