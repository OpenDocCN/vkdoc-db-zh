  trans: '

    步骤 6、7 和 8 执行必要的 InfiniBand 连通性、存储单元配置以及数据库服务器与存储单元之间的 InfiniBand 进程间通信（`IPC`）验证。步骤
    8 通过检查`oracle`可执行文件的链接方式来执行此验证。`InfiniBand`上的`IPC`是通过使用`ipc_rds`选项链接`oracle`内核来设置的，如果缺少此选项，`IPC`将通过非`InfiniBand`网络层进行。不幸的是，大多数重新链接内核的数据库补丁并不包含此参数，我猜测是因为它们主要面向非
    Exadata 系统。因此，为`oracle`软件打补丁可能导致此连接性丢失，进而因使用速度慢得多的网络连接进行`IPC`而引发性能问题。通过使用`ipc_rds`选项重新链接`oracle`内核可以轻松解决此问题。确保这一点的一种方法是编辑打补丁集中的脚本，该脚本用于重新链接`oracle`内核。另一种选择是在将数据库发布给用户之前，简单地使用`ipc_rds`选项再执行一次重新链接。从数据库服务器命令行复制而来的具体语句如下：


    ```

    $ make -f $ORACLE_HOME/rdbms/lib/ins_rdbms.mk ipc_rds

    ```


    这也是`exachk`脚本执行的一项检查，该报告的输出会列出那些未链接以提供`InfiniBand`上`RDS`连接性的`oracle`内核。


    步骤 9 校准存储，这是一个非常重要的步骤。每个可用的存储单元都会运行此操作。首先，关闭`CELLSRV`，然后运行`calibrate`过程。将生成类似于以下内容的输出：


    ```

    CellCLI> calibrate;

    Calibration will take a few minutes...

    Aggregate random read throughput across all hard disk luns: 137 MBPS

    Aggregate random read throughput across all flash disk luns: 2811.35 MBPS

    Aggregate random read IOs per second (IOPS) across all hard disk luns: 1152

    Aggregate random read IOs per second (IOPS) across all flash disk luns: 143248

    Controller read throughput: 5477.08 MBPS

    Calibrating hard disks (read only) ...

    Calibrating flash disks (read only, note that writes will be significantly slower)
    ...

    ...

    ```


    一旦所有存储单元的`calibrate`步骤完成，就可以创建单元磁盘和网格磁盘，即步骤 12。在此之前，步骤 10 和 11 会创建`oracle`操作系统用户，并建立关联的免密`ssh`访问。这些步骤完成后，在步骤
    12 中创建网格磁盘分区，以便`ASM`可以识别它们。这是您的新设置生效的地方，并建立了`+DATA_MYEXA1`和`+RECO_MYEXA1`之间所需的比例。


    接下来是设置`GRID`主目录，通过安装`GRID`软件（步骤 13）、修补`GRID`主目录（步骤 14）、重新链接`GRID` `oracle`可执行文件以提供`InfiniBand`上的`IPC`（步骤
    15）以及运行`GRID`的`root.sh`脚本（步骤 16）。除了步骤 15，这些操作与您在任何其他`GRID`安装中执行的操作相同。安装和配置`GRID`软件后，安装并修补数据库软件（步骤
    17 和 18）。同样，这些步骤是您在安装和修补`Oracle`数据库软件时，在任何系统上都会执行的步骤。


    由于网格磁盘现已创建，让`ASM`识别它们并在步骤 19 中创建`+DATA_MYEXA1`、`+RECO_MYEXA1`和`+DBFS_DG`磁盘组就是一项简单的任务。这为在步骤
    20 中创建`DBM`集群数据库铺平了道路，这是`裸机`Exadata 安装附带的默认数据库。可以在配置工作表中更改此数据库名称，但我们尚未见过任何安装中`DBM`不是可用数据库的情况。创建`DBM`数据库后，会解锁选定的账户（步骤
    21），并执行`DBM` `oracle`可执行文件的最终重新链接，以确保`InfiniBand`上的`IPC`功能正常（步骤 22）。步骤 23 中`GRID`基础设施被“锁定”以防止任何配置更改，然后，在步骤
    24 中，任何安全修复/补丁都会应用于数据库主目录。


    步骤 25 可能会也可能不会执行，这取决于您的企业是否决定允许`Oracle`通过自动服务请求（`ASR`）服务器直接访问 Exadata。这需要配置一个单独的服务器与
    Exadata 通信以监控系统，并将发现的任何问题自动报告回`Oracle`，自动生成服务请求来解决问题。此类问题可能是实际或即将发生的硬件故障（磁盘驱动器、Sun
    PCIe 卡、内存）。服务请求会生成零件订单并派遣服务技术员安装故障或即将故障的零件。如果您没有为此配置服务器，该步骤将运行然后成功终止，不执行任何操作。如果您确实需要此服务并已安装所需的额外服务器，此步骤会使用提供的
    My `Oracle` Support 凭据配置服务，并进行测试以确保凭据有效。


    步骤 26 通过电子邮件设置任何所需的单元警报。它需要一个有效的电子邮件地址，该地址会被使用和验证。将单元警报通过电子邮件发送给您很方便；您无需连接到各个单元来列出警报历史记录，因此节省时间。这也是一个可选步骤；您不必配置将单元警报通过电子邮件发送给您，但建议这样做。


    至此，您的 Exadata 系统已恢复到安装时的状态，但您修改的存储百分比除外。现在是恢复在此过程开始之前拥有的`oracle`操作系统用户主目录的时候了。


    ## 恢复


    既然存储已经重新配置，现在该解决重新创建的`oracle`操作系统用户主目录和重置的`oracle`操作系统密码了。请记住，在清除旧存储配置的最后一步中删除了`oracle`操作系统用户。假设您仍然以`root`身份连接，那么在每个数据库服务器的
    shell 提示符下，您将键入以下内容：


    ```

    # passwd oracle

    ```


    这将提示您输入新的`oracle`操作系统用户密码，需要输入两次进行确认。由于已为`root`账户配置了免密`ssh`访问，您可以从节点 1 上的“基地”使用`ssh`连接到所有其他数据库服务器。对于不熟悉`ssh`的用户，以下命令将连接到数据库服务器
    2：


    ```

    # ssh myexa1db02

    ```


    更改目标服务器名称以连接到其余的数据库服务器。


    现在该恢复之前的`oracle`操作系统用户主目录文件和配置了。使用`su`以`oracle`身份连接。这也会将您置于用户的主目录中。如果您使用`tar`来归档目录及其内容，以下命令将恢复归档的项目：


    ```

    $ tar xvf /tmp/oraclehome.tar . | tee oraclehome_restore.log

    ```

