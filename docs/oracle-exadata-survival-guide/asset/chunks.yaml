    \        FD_08_myexa1cel04,FD_10_myexa1cel04,FD_00_myexa1cel04,FD_12_myexa1cel04,FD_03_myexa1cel04,FD_02_\n\
    myexa1cel04,FD_05_myexa1cel04,FD_01_myexa1cel04,FD_13_myexa1cel04,FD_04_myexa1cel04,FD_11_myexa1\n\
    cel04,FD_15_myexa1cel04,FD_07_myexa1cel04,FD_14_myexa1cel04,FD_09_myexa1cel04,FD_06_myexa1cel04\n\
    \         creationTime:           2013-07-09T17:33:53-05:00\n         degradedCelldisks:\n\
    \         effectiveCacheSize:     1488.75G\n         id:                     7af2354f-1e3b-4932-b2be-4c57a1c03f33\n\
    \         size:                   1488.75G\n         status:                 normal\n\
    CellCLI>\n```\n\n输出按每个属性一行进行格式化，并提供了名称，因此您知道哪个属性对应哪个值。查看属性，报告的大小小于智能闪存缓存总共的 1600GB。这不是问题，因为闪存日志也是从智能闪存缓存存储中配置的，并消耗了总缓存大小的\
    \ 512MB。闪存日志使 Oracle 能够同时将重做日志写入重做日志文件和闪存存储，以加速事务处理。首先完成的写入会通知 Oracle 事务已成功记录在重做流中。这允许更快的事务时间和更高的吞吐量，因为\
    \ Oracle 不需要等待重做日志写入。您可以像报告闪存缓存一样报告闪存日志。\n\n```\nCellCLI> list flashlog detail\n\
    \         name:                   myexa1cel04_FLASHLOG\n         cellDisk:   \
    \            FD_14_myexa1cel04,FD_05_myexa1cel04,FD_00_myexa1cel04,FD_01_myexa1cel04,FD_04_myexa1cel04,FD_07_\n\
    myexa1cel04,FD_09_odevx1cel04,FD_02_myexa1cel04,FD_08_myexa1cel04,FD_03_myexa1cel04,FD_15_\n\
    myexa1cel04,FD_12_myexa1cel04,FD_11_myexa1cel04,FD_06_myexa1cel04,FD_10_myexa1cel\
    \ 04,FD_13_\nmyexa1cel04\n         creationTime:           2013-07-09T17:33:31-05:00\n\
    \         degradedCelldisks:\n         effectiveSize:          512M\n        \
    \ efficiency:             100.0\n         id:                     7eb480f9-b94a-4493-bfca-3ba00b6618bb\n\
    \         size:                   512M\n         status:                 normal\n\
    \nCellCLI>\n```\n\n该存储单元的智能闪存缓存和闪存日志报告的总大小为 1489.25GB，仍然小于分配给缓存的 1600GB。与物理磁盘一样，智能闪存缓存中使用的“磁盘”也需要为操作系统管理任务（如\
    \ inode 列表等）预留空间。无需担心，因为分配的空间足以让智能闪存缓存提供出色的性能。如果大小小于 1488.75GB，则表明一个或多个闪存磁盘存在问题。我们将在后面的章节中使用\
    \ `celladmin` 账户来介绍该问题。\n\n您还可以列出有关网格磁盘（配置在存储层中的物理驱动器）的详细信息。`LIST GRIDDISK ATTRIBUTES\
    \ name, size` 报告以下输出：\n\n```\nCellCLI> list griddisk attributes name, size;\n\
    \         DATA_MYEXA1_CD_00_Myexa1cel04   2208G\n         DATA_MYEXA1_CD_01_Myexa1cel04\
    \   2208G\n         DATA_MYEXA1_CD_02_Myexa1cel04   2208G\n...\n         DBFS_DG_CD_02_Myexa1cel04\
    \       33.796875G\n         DBFS_DG_CD_03_Myexa1cel04       33.796875G\n    \
    \     DBFS_DG_CD_04_Myexa1cel04       33.796875G\n...\n         RECO_MYEXA1_CD_00_Myexa1cel04\
    \   552.109375G\n         RECO_MYEXA1_CD_01_Myexa1cel04   552.109375G\n      \
    \   RECO_MYEXA1_CD_02_Myexa1cel04   552.109375G\n...\n         RECO_MYEXA1_CD_11_Myexa1cel04\
    \   552.109375G\n\nCellCLI>\n```\n\n磁盘组名称是磁盘名称的一部分，这使得很容易查看每个磁盘组中每个磁盘的空间。使用 `LIST\
    \ GRIDDISK DETAIL` 可以获得更详细的信息；部分报告如下：\n\n```\nCellCLI> list griddisk detail\n\
    \         name:                   DATA_MYEXA1_CD_00_Myexa1cel04\n         asmDiskgroupName:\
    \       DATA_MYEXA1\n         asmDiskName:            DATA_MYEXA1_CD_00_MYEXA1CEL04\n\
    \         asmFailGroupName:       MYEXA1CEL04\n         availableTo:\n       \
    \  cachingPolicy:          default\n         cellDisk:               CD_00_Myexa1cel04\n\
    \         comment:\n         creationTime:           2013-07-09T17:36:41-05:00\n\
    \         diskType:               HardDisk\n         errorCount:             0\n\
    \         id:                     aa946f1e-f7c4-4fee-8660-4c69c830ef59\n     \
    \    offset:                 32M\n         size:                   2208G\n   \
    \      status:                 active\n```\n"
- fmt: "# 监控网格磁盘与存储单元\n\n## 使用 LIST 命令查看信息\n\n通过 `LIST` 命令的 `DETAIL` 选项可以查看完整的属性列表，其输出格式为\
    \ `属性: 值`。某些 `LIST` 命令（例如 `LIST GRIDDISK DETAIL`）会产生较长的输出，您可以等待滚动停止后再记录可用的属性。掌握属性列表后，就可以查询感兴趣的特定属性。\n\
    \n例如，使用 `LIST GRIDDISK ATTRIBUTES name, celldisk, offset, size, status` 命令可以生成更易于管理的可读报告。\n\
    \n```\nCellCLI> LIST GRIDDISK ATTRIBUTES name, celldisk, offset, size, status\n\
    \         DATA_MYEXA1_CD_00_myexa1celMyexa1cel04   CD_00_myexa1celMyexa1cel04\
    \       32M             2208G           active\n         DATA_MYEXA1_CD_01_myexa1celMyexa1cel04\
    \   CD_01_myexa1celMyexa1cel04       32M             2208G           active\n\
    myexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
    \         DBFS_DG_CD_03_myexa1celMyexa1cel04       CD_03_myexa1celMyexa1cel04\
    \       2760.15625G      33.796875G      active\n         DBFS_DG_CD_04_myexa1celMyexa1cel04\
    \       CD_04_myexa1celMyexa1cel04       2760.15625G      33.796875G      active\n\
    \         DBFS_DG_CD_05_myexa1celMyexa1cel04       CD_05_myexa1celMyexa1cel04\
    \       2760.15625G      33.796875G      active\nmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
    \         RECO_MYEXA1_CD_00_myexa1celMyexa1cel04   CD_00_myexa1celMyexa1cel04\
    \       2208.046875G     552.109375G     active\n         RECO_MYEXA1_CD_01_myexa1celMyexa1cel04\
    \   CD_01_myexa1celMyexa1cel04       2208.046875G     552.109375G     active\n\
    \         RECO_MYEXA1_CD_02_myexa1celMyexa1cel04   CD_02_myexa1celMyexa1cel04\
    \       2208.046875G     552.109375G     active\nmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1celmyexa1cel...\n\
    \nCellCLI>\n```\n\n## 磁盘配置说明\n\n在 Exadata 配置期间，磁盘根据 `/opt/oracle.SupportTools/onecommand/onecommand.params`\
    \ 文件中的数据被划分为多个切片。默认情况下，`SizeArr` 变量设置为 2208GB，这是为数据磁盘组分配的切片大小。其他切片大小均由此初始设置衍生而来。（可以更改磁盘分配；该过程将在\
    \ [第 11 章](#9781430260103_Ch11.xhtml) 中讨论。）每个磁盘有 32MB 用于管理进程和数据，这解释了 ASM 可用的第一个磁盘切片的偏移量。在上面的示例中，第一个切片分配给了\
    \ `DATA_MYEXA1` 磁盘组，大小为 2208GB。下一个可用切片用于恢复磁盘组，大小为 565360MB。最后一个切片用于 DBFS 磁盘组，提供\
    \ 34608MB 的存储空间。初始 32MB 之后的每个偏移量都是 32MB 加上已配置切片的大小；它为磁盘上配置的 ASM 存储的每个区域提供了“起始点”。\n\
    \n## 存储单元账户与权限\n\n`cellmonitor` 账户是在服务器级别查看存储单元的一个良好起点，但它功能受限，因为它只是一个监控账户，无法管理存储单元。要更深入地研究存储单元并获取额外的统计信息和指标，您必须使用\
    \ `celladmin` 账户。\n\n以 `celladmin` 身份连接到存储单元与以 `cellmonitor` 身份连接没有区别；但是，`celladmin`\
    \ 提供了更多的功能和指标访问权限。除了 `cellcli`，`celladmin` 账户还可以访问 `cellsrvstat`，它可以提供 `cellcli`\
    \ 未报告的额外统计信息和指标。\n\n当以 `celladmin` 身份连接时，`cellcli` 接口提供了本章前面列出的全部函数列表。由于这是一个管理员账户，您可以执行\
    \ `cellmonitor` 无法完成的以下操作：\n\n```\nALTER ALERTHISTORY\nALTER CELL\nALTER CELLDISK\n\
    ALTER GRIDDISK\nALTER IBPORT\nALTER IORMPLAN\nALTER LUN\nALTER PHYSICALDISK\n\
    ALTER QUARANTINE\nALTER THRESHOLD\nASSIGN KEY\nCREATE CELL\nCREATE CELLDISK\n\
    CREATE FLASHCACHE\nCREATE FLASHLOG\nCREATE GRIDDISK\nCREATE KEY\nCREATE QUARANTINE\n\
    CREATE THRESHOLD\nDESCRIBE\nDROP ALERTHISTORY\nDROP CELL\nDROP CELLDISK\nDROP\
    \ FLASHCACHE\nDROP FLASHLOG\nDROP GRIDDISK\nDROP QUARANTINE\nDROP THRESHOLD\n\
    EXPORT CELLDISK\nIMPORT CELLDISK\n```\n\n## 查看告警历史\n\n在存储单元的可用指标中，告警历史是开始查找潜在问题的好地方。查看\
    \ `LIST ALERTHISTORY DETAIL` 的输出，我们看到以下信息：\n\n```\nCellCLI> list alerthistory\
    \ detail\n         name:                   1_1\n         alertMessage:       \
    \    \"Cell configuration checkdiscovered the following problems:\nCheck Exadata\
    \ configuration via ipconf utility Verifying of Exadata configuration file /opt/oracle.cellos/cell.conf\
    \ Error. Exadata configuration file not found /opt/oracle.cellos/cell.conf [INFO]\
    \ The ipconf check may generate a failure for temporary inability to reach NTP\
    \ or DNS server. You may ignore this alert, if the NTP or DNS servers are valid\
    \ and available. [INFO] You may ignore this alert, if the NTP or DNS servers are\
    \ valid and available. [INFO] As root user run /usr/local/bin/ipconf -verify -semantic\
    \ to verify consistent network configurations.\"\n         alertSequenceID:  \
    \      1\n         alertShortName:         Software\n         alertType:     \
    \         Stateful\n         beginTime:              2013-05-14T22:31:59-05:00\n\
    \         endTime:                2013-06-20T11:36:18-05:00\n         examinedBy:\n\
    \         metricObjectName:       checkconfig\n         notificationState:   \
    \   0\n         sequenceBeginTime:      2013-05-14T22:31:59-05:00\n         severity:\
    \               critical\n         alertAction:            \"Correct the configuration\
    \ problems. Then run cellcli command:\nALTER CELL VALIDATE CONFIGURATION   Verify\
    \ that the new configuration is correct.\"\n\nmyexa1celmyexa1cel....\n\nname:\
    \                   4_1\n         alertMessage:           \"The disk controller\
    \ battery is executing a learn cycle and may\ntemporarily enter WriteThrough Caching\
    \ mode as part of the learn cycle. Disk write throughput\nmight be temporarily\
    \ lower during this time. The flash drives are not affected. The battery\nlearn\
    \ cycle is a normal maintenance activity that occurs quarterly and runs for approximately\
    \ 1\nto 12 hours.  Note that many learn cycles do not require entering WriteThrough\
    \ caching mode.\nWhen the disk controller cache returns to the normal WriteBack\
    \ caching mode, an additional\ninformational alert will be sent.  Battery Serial\
    \ Number : 6360  Battery Type          : iBBU08\nBattery Temperature   : 35 C\
    \  Full Charge Capacity  : 1342 mAh  Relative Charge       : 97 %\nAmbient Temperature\
    \   : 22 C\"\n         alertSequenceID:        4\n         alertShortName:   \
    \      Hardware\n         alertType:              Stateful\n         beginTime:\
    \              2013-07-17T04:00:56-05:00\n         endTime:                2013-07-17T10:09:16-05:00\n\
    \         examinedBy:\n         metricObjectName:       LUN_LEARN_CYCLE_ALERT\n\
    \         notificationState:      0\n         sequenceBeginTime:      2013-07-17T04:00:56-05:00\n\
    \         severity:               info\n         alertAction:            Informational.\n\
    ```"
