    \ 时间。在我们管理的系统上，对于物理磁盘，看到的最大 `await` 时间大约是 20 到 25 毫秒，对于闪存磁盘则小于 1 毫秒。如果您在某个磁盘上经常看到数百毫秒或更长的\
    \ `await` 时间，则需要进行进一步调查，因为该单元可能存在固件不匹配或设备即将故障的问题。\n\n由于数据库服务器不直接访问存储介质，运行 `iostat`\
    \ 设备报告来诊断磁盘读/写问题不会提供有关 ASM 存储的任何有用信息。但是，不要忘记数据库服务器为所有事务利用 CPU，因此在为存储单元生成 CPU 报告时，也应生成\
    \ `iostat` CPU 报告。这样做可以最大程度地减少错过可能仅在数据库服务器上发生的 CPU 相关问题的风险。\n\n`iostat` 报告的设备名称是在被监控服务器的\
    \ `/dev` 目录层次结构中找到的名称。哪个单元磁盘映射到哪个设备由 CellCLI 命令 `list celldisk` 报告，该命令指定 `name`\
    \ 和 `deviceName` 属性，如下所示：\n\n```\nCellCLI> list celldisk attributes name, deviceName\n\
    \         CD_00_myexa1cel04       /dev/sda\n         CD_01_myexa1cel04       /dev/sdb\n\
    \         CD_02_myexa1cel04       /dev/sdc\n         CD_03_myexa1cel04       /dev/sdd\n\
    \         CD_04_myexa1cel04       /dev/sde\n         CD_05_myexa1cel04       /dev/sdf\n\
    \         CD_06_myexa1cel04       /dev/sdg\n         CD_07_myexa1cel04       /dev/sdh\n\
    \         CD_08_myexa1cel04       /dev/sdi\n         CD_09_myexa1cel04       /dev/sdj\n\
    \         CD_10_myexa1cel04       /dev/sdk\n         CD_11_myexa1cel04       /dev/sdl\n\
    \         FD_00_myexa1cel04       /dev/sdv\n         FD_01_myexa1cel04       /dev/sdw\n\
    \         FD_02_myexa1cel04       /dev/sdx\n         FD_03_myexa1cel04       /dev/sdy\n\
    \         FD_04_myexa1cel04       /dev/sdz\n         FD_05_myexa1cel04       /dev/sdaa\n\
    \         FD_06_myexa1cel04       /dev/sdab\n         FD_07_myexa1cel04      \
    \ /dev/sdac\n         FD_08_myexa1cel04       /dev/sdr\n         FD_09_myexa1cel04\
    \       /dev/sds\n         FD_10_myexa1cel04       /dev/sdt\n         FD_11_myexa1cel04\
    \       /dev/sdu\n         FD_12_myexa1cel04       /dev/sdn\n         FD_13_myexa1cel04\
    \       /dev/sdo\n         FD_14_myexa1cel04       /dev/sdp\n         FD_15_myexa1cel04\
    \       /dev/sdq\n\nCellCLI>\n```\n\n所示的报告应该在 Exadata 系统上的每个存储单元运行一次，前提是您不将其升级到下一个可用配置，或者您的\
    \ Exadata 系统是全机架（Full Rack）。从四分之一机架（Quarter Rack）升级到半机架（Half Rack）或从半机架升级到全机架的系统升级将要求您再次运行该报告，以便可以看到新的设备映射。\n\
    \n了解这些信息可以更轻松地将 `iostat -d` 报告的设备统计信息与 ASM 磁盘和闪存磁盘关联起来。您可能遇到的底层 I/O 问题现在可以通过结合两个实用程序的输出来进行跟踪和诊断。\n\
    \n## 注意事项\n\nExadata 在数据库层和存储层都提供了良好的监控，提供了大量可用指标，报告系统的许多方面。选择报告哪些指标是一项重要的任务，可以防止您在数据洪流中迷失方向。\n\
    \n为了使监控有效，必须建立一个基线，这样您就有了一个已知的参考点来与后续的监控运行进行比较。与基线进行比较提供了一个坚实的起点，用于衡量性能改进和问题。没有这样的基线，每次分析都是针对一个移动的目标，使得任务比原本需要的更加困难。\n"
- fmt: "Oracle Enterprise Manager can be used to generate reports and graphs that\
    \ represent performance metrics as they change over time. You still need a baseline\
    \ to start from, and that baseline does not have to be for perfect performance.\
    \ Remember: You’re measuring performance changes relative to this baseline. You\
    \ may find that when performance improves, you use that point of improvement as\
    \ your new baseline.\n\nOEM can also monitor the storage cells, if the System\
    \ Monitoring plug-in for Exadata Storage Server is installed. This plug-in may\
    \ not provide all of the metrics available from the command-line tools, but it\
    \ can provide a view of how the storage statistics and metrics change over time.\n\
    \nMonitoring can also be performed outside of the Oracle Enterprise Manager by\
    \ using scripts and command-line utilities to return the requested data. The storage\
    \ cells offer both the `cellcli` and `cellsrvadmin` utilities, which report on\
    \ various areas of the storage cells.\n\nOracle, no matter how well instrumented,\
    \ doesn’t report low-level I/O statistics, so it is necessary to go to the O/S\
    \ for those. The `iostat` utility can provide a window into this low-level CPU\
    \ and device activity. Two separate reports can be generated, one for CPU and\
    \ one for devices, or both reports can be combined, by calling `iostat` without\
    \ any command-line parameters.\n\nThe `cellcli` utility can report which cell\
    \ disk is mapped to which hardware device, with the list `celldisk` command. The\
    \ attributes of interest are name and deviceName. Knowing this mapping allows\
    \ you to “translate” the output from the `iostat` device report, so you can monitor\
    \ the ASM disks and see which, if any, may be experiencing problems.\n\n# Storage\
    \ Reconfiguration\n\n![image](images/frontdot.jpg)\n\nAn Exadata system, by default,\
    \ pre-allocates the bulk of the physical storage between the `+DATA_MYEXA1` and\
    \ `+RECO_MYEXA1` disk groups and does so using an 80/20 split. During the preinstallation\
    \ phase of purchase, Oracle supplies a worksheet to the DBAs, the network administrators,\
    \ and the system administrators. Each group supplies information for the configuration\
    \ process, with the DBAs and the network admins providing the bulk of that data.\
    \ Once the worksheet is completed, discussions are held to clarify any ambiguous\
    \ settings and to determine how the storage will be divided. It may not be apparent\
    \ that the default settings need to be adjusted, so the system is configured with\
    \ the standard 80/20 allocations. A third disk group, `DBFS_DG`, is also provided\
    \ with approximately 32GB of space, and this disk group does not change in size.\n\
    \nIt is possible, after configuration is complete, to change those allocations,\
    \ but this is a destructive process that requires careful consideration. We have\
    \ done this on an Exadata system destined for production, but it was done long\
    \ before any production databases were created. It was also done with the assistance\
    \ of Oracle Advanced Customer Support, and though we provide the steps to perform\
    \ this reconfiguration, we strongly recommend you involve Oracle Advanced Customer\
    \ Support in the process. The actual steps will be discussed, so that you will\
    \ understand the entire process from start to finish. The goal of this chapter\
    \ is to provide working knowledge of the storage-reconfiguration process. It may\
    \ be best, if you are not comfortable performing such actions, to arrange with\
    \ Oracle Advanced Customer Support to do this for you, should the need arise.\
    \ Even if you don’t do this yourself, it will be helpful to know what tasks will\
    \ be run and what the end results will be. With that thought in mind, we’ll proceed.\n\
    \n## I Wish We Had More…\n\nIt may become apparent after the configuration has\
    \ been completed, but before any databases (aside from DBM, the default database\
    \ provided at installation) are created, that you may want or need more recovery\
    \ storage than originally allocated, as an example. Or you may not be using the\
    \ recovery area (an unlikely event) and would like to make the data disk group\
    \ a bit larger, as another example. There is a way to do that before anything\
    \ important gets created. We state again that reconfiguring the storage allocations\
    \ is a destructive process that requires planning long before execution. We will\
    \ demonstrate a process to distribute storage more evenly between the `+DATA_MYEXA1`\
    \ and `+RECO_MYEXA1` disk groups, again with the caveat that proper planning is\
    \ absolutely necessary and that Oracle Advanced Customer Support should be involved.\n\
    \n## Redistributing the Wealth\n\nEach disk in an Exadata system is logically\
    \ divided into areas sometimes known as partitions, areas containing a fixed amount\
    \ of storage determined at configuration time. Looking at how a single disk is\
    \ configured on a standard Exadata installation, the following output shows how\
    \ the various partitions are allocated:\n\n```\nCellCLI> list griddisk attributes\
    \ name, size, offset where name like '.*CD_11.*'\n         DATA_MYEXA1_CD_11_myexa1cel05\
    \   2208G           32M\n         DBFS_DG_CD_11_myexa1cel05       33.796875G \
    \     2760.15625G\n         RECO_MYEXA1_CD_11_myexa1cel05   552.109375G     2208.046875G\n\
    \nCellCLI>\n```\n\n![image](images/sq.jpg) Note For UNIX/Linux systems, the terms\
    \ slice and partition are used interchangeably in some sources. Both are used\
    \ to indicate logical divisions of the physical disk. We will use the term partition\
    \ in this text, as it is the most accurate terminology.\n\nNotice that for a given\
    \ disk, there are three partitions that ASM can see and use. Also note that for\
    \ a given partition, the size plus the offset gives the starting “point” for the\
    \ next partition. Unfortunately, the output from CellCLI cannot be ordered the\
    \ way you might like to see it. The default ordering is by name in this example.\n\
    \nFrom the output provided, the first partition is assigned as the `+DATA_MYEXA1`\
    \ storage partition, starting after the first 32MB of storage. That 32MB is reserved\
    \ for disk management by the operating system. The next partition available to\
    \ ASM is assigned to the `+RECO_MYEXA1` disk group, and the third partition is\
    \ assigned to the `+DBFS_DG` disk group. The size of the disk groups is determined\
    \ by the type of storage you select and the size of the Exadata rack that you’ve\
    \ ordered. The system illustrated in this chapter uses high capacity disks, providing\
    \ 3TB of storage per disk. High speed disks provide 600GB of storage per disk.\
    \ The configuration process configures partitions for the data and recovery disk\
    \ groups based on a parameter in the `/opt/oracle.SupportTools/onecommand/onecommand.param`\
    \ file named `SizeArr`. Two systems were configured with the default storage division\
    \ between `+DATA_MYEXA1` and `+RECO_MYEXA1`. This resulted in an 80/20 allocation\
    \ between these two disk groups. As mentioned previously, the output provided\
    \ is for a standard Exadata configuration.\n\nTo change how ASM sees the storage,\
    \ it will be necessary to delete the original configuration as the first step,\
    \ so new partitions can be created across the physical disks. The next basic step\
    \ is to create the new partitions and after that configure the ASM disk groups.\
    \ Because the first step is to delete all configured partitions, this is not a\
    \ recommended procedure when development, test, or production databases have been\
    \ created on the Exadata system. We state again that this process is a destructive\
    \ process and that no databases will remain after the initial steps of deleting\
    \ the original logical disk configuration have completed. The GRID infrastructure\
    \ is also deleted; it will be re-created as one of the 26 steps executed to define\
    \ the new logical storage partitions."
  raw: 'Oracle Enterprise Manager can be used to generate reports and graphs that
    represent performance metrics as they change over time. You still need a baseline
    to start from, and that baseline does not have to be for perfect performance.
    Remember: You’re measuring performance changes relative to this baseline. You
    may find that when performance improves, you use that point of improvement as
    your new baseline.


    OEM can also monitor the storage cells, if the System Monitoring plug-in for Exadata
    Storage Server is installed. This plug-in may not provide all of the metrics available
    from the command-line tools, but it can provide a view of how the storage statistics
    and metrics change over time.


    Monitoring can also be performed outside of the Oracle Enterprise Manager by using
    scripts and command-line utilities to return the requested data. The storage cells
    offer both the `cellcli` and `cellsrvadmin` utilities, which report on various
    areas of the storage cells.


    Oracle, no matter how well instrumented, doesn’t report low-level I/O statistics,
    so it is necessary to go to the O/S for those. The `iostat` utility can provide
    a window into this low-level CPU and device activity. Two separate reports can
    be generated, one for CPU and one for devices, or both reports can be combined,
    by calling `iostat` without any command-line parameters.


    The `cellcli` utility can report which cell disk is mapped to which hardware device,
    with the list `celldisk` command. The attributes of interest are name and deviceName.
    Knowing this mapping allows you to “translate” the output from the `iostat` device
    report, so you can monitor the ASM disks and see which, if any, may be experiencing
    problems.


    CHAPTER 11


    ![image](images/frontdot.jpg)


    Storage Reconfiguration


    An Exadata system, by default, pre-allocates the bulk of the physical storage
    between the +DATA_MYEXA1 and +RECO_MYEXA1 disk groups and does so using an 80/20
    split. During the preinstallation phase of purchase, Oracle supplies a worksheet
    to the DBAs, the network administrators, and the system administrators. Each group
    supplies information for the configuration process, with the DBAs and the network
    admins providing the bulk of that data. Once the worksheet is completed, discussions
    are held to clarify any ambiguous settings and to determine how the storage will
    be divided. It may not be apparent that the default settings need to be adjusted,
    so the system is configured with the standard 80/20 allocations. A third disk
    group, DBFS_DG, is also provided with approximately 32GB of space, and this disk
    group does not change in size.


    It is possible, after configuration is complete, to change those allocations,
    but this is a destructive process that requires careful consideration. We have
    done this on an Exadata system destined for production, but it was done long before
    any production databases were created. It was also done with the assistance of
    Oracle Advanced Customer Support, and though we provide the steps to perform this
    reconfiguration, we *strongly* recommend you involve Oracle Advanced Customer
    Support in the process. The actual steps will be discussed, so that you will understand
    the entire process from start to finish. The goal of this chapter is to provide
    working knowledge of the storage-reconfiguration process. It may be best, if you
    are not comfortable performing such actions, to arrange with Oracle Advanced Customer
    Support to do this for you, should the need arise. Even if you don’t do this yourself,
    it will be helpful to know what tasks will be run and what the end results will
    be. With that thought in mind, we’ll proceed.


    I Wish We Had More…


    It may become apparent after the configuration has been completed, but before
    any databases (aside from DBM, the default database provided at installation)
    are created, that you may want or need more recovery storage than originally allocated,
    as an example. Or you may not be using the recovery area (an unlikely event) and
    would like to make the data disk group a bit larger, as another example. There
    is a way to do that before anything important gets created. We state again that
    reconfiguring the storage allocations is a *destructive* process that requires
    planning long before execution. We will demonstrate a process to distribute storage
    more evenly between the +DATA_MYEXA1 and +RECO_MYEXA1 disk groups, again with
    the caveat that proper planning is absolutely necessary and that Oracle Advanced
    Customer Support should be involved.


    Redistributing the Wealth


    Each disk in an Exadata system is logically divided into areas sometimes known
    as partitions, areas containing a fixed amount of storage determined at configuration
    time. Looking at how a single disk is configured on a standard Exadata installation,
    the following output shows how the various partitions are allocated:


    ```

    CellCLI> list griddisk attributes name, size, offset where name like ''.*CD_11.*''

             DATA_MYEXA1_CD_11_myexa1cel05   2208G           32M

             DBFS_DG_CD_11_myexa1cel05       33.796875G      2760.15625G

             RECO_MYEXA1_CD_11_myexa1cel05   552.109375G     2208.046875G


    CellCLI>

    ```


    ![image](images/sq.jpg) **Note**  For UNIX/Linux systems, the terms *slice* and
    *partition* are used interchangeably in some sources. Both are used to indicate
    logical divisions of the physical disk. We will use the term *partition* in this
    text, as it is the most accurate terminology.


    Notice that for a given disk, there are three partitions that ASM can see and
    use. Also note that for a given partition, the size plus the offset gives the
    starting “point” for the next partition. Unfortunately, the output from CellCLI
    cannot be ordered the way you might like to see it. The default ordering is by
    name in this example.


    From the output provided, the first partition is assigned as the +DATA_MYEXA1
    storage partition, starting after the first 32MB of storage. That 32MB is reserved
    for disk management by the operating system. The next partition available to ASM
    is assigned to the +RECO_MYEXA1 disk group, and the third partition is assigned
    to the +DBFS_DG disk group. The size of the disk groups is determined by the type
    of storage you select and the size of the Exadata rack that you’ve ordered. The
    system illustrated in this chapter uses high capacity disks, providing 3TB of
    storage per disk. High speed disks provide 600GB of storage per disk. The configuration
    process configures partitions for the data and recovery disk groups based on a
    parameter in the `/opt/oracle.SupportTools/onecommand/onecommand.param` file named
    `SizeArr`. Two systems were configured with the default storage division between
    +DATA_MYEXA1 and +RECO_MYEXA1\. This resulted in an 80/20 allocation between these
    two disk groups. As mentioned previously, the output provided is for a standard
    Exadata configuration.


    To change how ASM sees the storage, it will be necessary to delete the original
    configuration as the first step, so new partitions can be created across the physical
    disks. The next basic step is to create the new partitions and after that configure
    the ASM disk groups. Because the first step is to delete all configured partitions,
    this is not a recommended procedure when development, test, or production databases
    have been created on the Exadata system. We state again that this process is a
    destructive process and that no databases will remain after the initial steps
    of deleting the original logical disk configuration have completed. The GRID infrastructure
    is also deleted; it will be re-created as one of the 26 steps executed to define
    the new logical storage partitions.'
  trans: "\nOracle Enterprise Manager 可用于生成报表和图表，以展示随时间变化的性能指标。您仍然需要一个起始基线，而这个基线并非必须是完美性能的状态。请记住：您衡量的是相对于此基线的性能变化。您可能会发现，当性能提升时，您会将那个提升点作为新的基线。\n\
    \n如果安装了 Exadata 存储服务器的系统监控插件，OEM 还能监控存储单元。此插件可能不提供命令行工具的所有指标，但它可以展示存储统计信息和指标随时间的变化情况。\n\
    \n监控也可以通过 Oracle Enterprise Manager 之外的脚本和命令行实用程序来执行，以返回所需数据。存储单元提供了 `cellcli`\
    \ 和 `cellsrvadmin` 实用程序，可报告存储单元的各个区域。\n\n无论 Oracle 的监测机制多么完善，它都不会报告低级别的 I/O 统计信息，因此需要到操作系统层面去获取这些信息。`iostat`\
    \ 实用程序可以提供对这种低级别 CPU 和设备活动的洞察。可以生成两份独立的报告，一份针对 CPU，一份针对设备；或者通过调用不带任何命令行参数的 `iostat`\
    \ 将两份报告合并输出。\n\n`cellcli` 实用程序可以通过 `celldisk` 命令报告哪个单元磁盘映射到哪个硬件设备。值得关注的属性是 name\
    \ 和 deviceName。了解此映射关系后，您就可以“翻译” `iostat` 设备报告的输出，从而监控 ASM 磁盘，并查看哪些磁盘（如果有的话）可能出现问题。\n\
    \n# 存储重新配置\n\n![image](img/frontdot.jpg)\n\n默认情况下，Exadata 系统会在 `+DATA_MYEXA1`\
    \ 和 `+RECO_MYEXA1` 磁盘组之间预先分配大部分物理存储，并且采用 80/20 的拆分比例。在购买的预安装阶段，Oracle 会向 DBA、网络管理员和系统管理员提供一份工作表。每个小组为配置过程提供信息，其中\
    \ DBA 和网络管理员提供大部分数据。工作表完成后，会进行讨论以澄清任何模糊的设置，并确定存储将如何划分。可能并不明显需要调整默认设置，因此系统按标准的\
    \ 80/20 分配进行配置。还会提供第三个磁盘组 `DBFS_DG`，其空间约为 32GB，且此磁盘组的大小不会改变。\n\n在配置完成后，可以更改这些分配，但这是一个破坏性的过程，需要仔细考虑。我们曾在一台将用于生产的\
    \ Exadata 系统上执行过此操作，但那是在任何生产数据库创建之前很久进行的。该操作也是在 Oracle 高级客户支持的协助下完成的，尽管我们会提供执行此重新配置的步骤，但我们强烈建议您让\
    \ Oracle 高级客户支持参与此过程。我们将讨论实际步骤，以便您理解从头到尾的整个过程。本章的目标是提供有关存储重新配置过程的实用知识。如果您对执行此类操作感到不太放心，最好的方法可能是安排\
    \ Oracle 高级客户支持在需要时为您执行此操作。即使您不亲自执行，了解将运行哪些任务以及最终结果会是什么样也会很有帮助。考虑到这一点，我们将继续下去。\n\
    \n## 我希望我们能有更多...\n\n在配置完成后，但在创建任何数据库（除了安装时提供的默认数据库 DBM）之前，您可能会发现，例如，您希望或需要比最初分配更多的恢复存储。或者，您可能不使用恢复区域（不太可能），并希望使数据磁盘组稍大一些，作为另一个例子。有一种方法可以在创建任何重要内容之前完成此操作。我们再次声明，重新配置存储分配是一个破坏性的过程，需要在执行前很久就进行规划。我们将演示一个在\
    \ `+DATA_MYEXA1` 和 `+RECO_MYEXA1` 磁盘组之间更均匀分配存储的过程，再次提醒，**适当的规划绝对必要**，并且应让 Oracle\
    \ 高级客户支持参与。\n\n## 重新分配资源\n\nExadata 系统中的每个磁盘在逻辑上划分为有时称为分区的区域，这些区域包含在配置时确定的固定存储量。查看标准\
    \ Exadata 安装上单个磁盘的配置方式，以下输出显示了各种分区的分配情况：\n\n```\nCellCLI> list griddisk attributes\
    \ name, size, offset where name like '.*CD_11.*'\n         DATA_MYEXA1_CD_11_myexa1cel05\
    \   2208G           32M\n         DBFS_DG_CD_11_myexa1cel05       33.796875G \
    \     2760.15625G\n         RECO_MYEXA1_CD_11_myexa1cel05   552.109375G     2208.046875G\n\
    \nCellCLI>\n```\n\n![image](img/sq.jpg) **注意** 对于 UNIX/Linux 系统，slice 和 partition\
    \ 这两个术语在某些资料中互换使用。两者都用于指示物理磁盘的逻辑划分。在本文中，我们将使用术语 **partition**，因为它是最准确的术语。\n\n\
    请注意，对于给定的磁盘，有三个 ASM 可以看到并使用的分区。还要注意，对于给定的分区，其大小加上偏移量给出了下一个分区的起始“点”。不幸的是，CellCLI\
    \ 的输出无法按照您希望的方式排序。在此示例中，默认排序方式是按名称。\n\n从提供的输出看，第一个分区被分配为 `+DATA_MYEXA1` 存储分区，从存储的前\
    \ 32MB 之后开始。那 32MB 保留给操作系统进行磁盘管理。下一个可供 ASM 使用的分区被分配给 `+RECO_MYEXA1` 磁盘组，第三个分区被分配给\
    \ `+DBFS_DG` 磁盘组。磁盘组的大小取决于您选择的存储类型以及您订购的 Exadata 机架大小。本章图示的系统使用高容量磁盘，每块磁盘提供 3TB\
    \ 存储。高速磁盘每块提供 600GB 存储。配置过程根据 `/opt/oracle.SupportTools/onecommand/onecommand.param`\
    \ 文件中名为 `SizeArr` 的参数，为数据和恢复磁盘组配置分区。两个系统都采用 `+DATA_MYEXA1` 和 `+RECO_MYEXA1` 之间的默认存储划分进行配置。这导致这两个磁盘组之间采用\
    \ 80/20 的分配。如前所述，提供的输出是针对标准 Exadata 配置的。\n\n要改变 ASM 看到存储的方式，第一步将是删除原始配置，以便可以在物理磁盘上创建新的分区。下一个基本步骤是创建新分区，然后配置\
    \ ASM 磁盘组。由于第一步是删除所有已配置的分区，因此当 Exadata 系统上已创建开发、测试或生产数据库时，**不建议**执行此过程。我们再次声明，此过程是**破坏性的**，在删除原始逻辑磁盘配置的初始步骤完成后，**将没有任何数据库保留**。GRID\
    \ 基础架构也会被删除；它将作为定义新逻辑存储分区的 26 个步骤之一被重新创建。\n"
- fmt: "# 准备\n\n不仅逻辑存储区域被重新定义，“oracle”操作系统的用户主目录也会被重新创建，因此在执行此过程之前，必须保留对该位置所做的任何更改。这需要在您的\
    \ Exadata 系统中所有可用的数据库服务器上执行，即使您让 Oracle 高级客户支持执行实际的存储工作也是如此。因此，执行的第一步是使用 `tar`（最初是\
    \ *Tape ARchiver* 的首字母缩写，因为在旧时代，唯一可用的介质是磁带）或 `cpio`（*CoPy In/Out* 的首字母缩写，一个相对于\
    \ `tar` “较新”的实用程序，设计为不仅可以在磁带上操作，还可以在磁盘驱动器等块设备上操作）来保留“oracle”用户主目录。这两个实用程序在操作系统级别提供。如果您选择\
    \ `tar`，以下命令将保留“oracle”操作系统用户的主目录：\n\n```\n$ tar cvf /tmp/oraclehome.tar ./*\n\
    ```\n\n如果您不熟悉 `tar` 命令，提供的选项执行以下操作：\n\n```\nc -- 创建归档文件\nv -- 使用详细模式。这将显示所有处理的目录和文件及其关联路径\n\
    f -- 用于归档的文件名\n```\n\n使用 `./*` 语法指定要归档的文件，可以更轻松地将文件恢复到您选择的任何基本目录。“oracle”操作系统用户主目录不太可能更改名称。了解此语法会很有帮助，如果您想将完整的目录树复制到另一个位置，这是我们通常调用\
    \ `tar` 来复制文件和目录的方式。\n\n使用 `tar` 不是强制性的；您也可以使用 `cpio`。如果您更习惯使用 `cpio` 实用程序，以下命令将归档“oracle”操作系统用户主目录：\n\
    \n```\n$ find . -depth -print | cpio -ov > /tmp/oraclehome.cpio\n```\n\n提供的选项执行以下操作：\n\
    \n```\no -- 复制输出到列出的归档文件\nv -- 详细输出，列出处理的文件和路径\n```\n\n我们建议在开始任何存储重新配置之前保留“oracle”用户主目录，因为它将被重新配置过程覆盖。在所有可用的数据库服务器上保留现有的“oracle”操作系统用户主目录，因为所有“oracle”操作系统用户主目录都将被重建。此外，“oracle”操作系统用户密码将被重置为其原始值，该值在交付、安装和初始配置之前填写的\
    \ Exadata 工作表中列出。\n\n用于 Exadata 配置的文件仅允许您指定数据磁盘组分区的大小。恢复磁盘组分区的大小源自为调整数据磁盘组大小而提供的值。DBFS_DG\
    \ 的大小不受更改此值的影响。在删除原始存储配置之前，无法修改此文件。\n\n![image](images/sq.jpg) **注意** 列出的存储重新配置命令必须以“root”用户身份运行。由于此用户在操作系统级别拥有无限权力，因此在执行这些命令时必须格外谨慎，这一点再怎么强调也不为过。如果您不习惯使用“root”帐户，最好与\
    \ Oracle 高级客户支持安排，将存储重新配置到您所需的级别。\n\n您应该对存储重新配置在 +DATA_MYEXA1 磁盘组和 +RECO_MYEXA1\
    \ 磁盘组大小方面希望提供的内容有很好的了解，并且您应该已经使用 `tar` 或 `cpio` 保留了“oracle”操作系统用户主目录。我们现在继续进行实际的存储重新配置过程。\n\
    \n此时的其他任务包括了解安装了哪些 OEM 代理，并记录 SCAN 监听器是否使用默认端口。如有必要，重新安装 OEM 代理和为非默认端口重新配置 SCAN\
    \ 监听器，将不得不在恢复步骤中作为存储重新配置完成和“oracle”操作系统用户主目录恢复后的一部分来完成。本章将不涵盖重新安装 OEM 代理和重新配置\
    \ SCAN 监听器的步骤，但了解可能需要执行这些操作是好的。\n\n# 执行\n\n您应该充分准备好开始实际的重新配置过程。第一步是删除原始存储配置，包括存储单元的配置。让我们开始。\n\
    \n## 步骤 1\n\n以“root”用户身份连接到数据库服务器 1。您应该在 shell 提示符中看到 `#`，表示登录/su 过程成功。您现在必须将目录更改为\
    \ `/opt/oracle.SupportTools/onecommand`。这是完成此操作所需的脚本和配置文件所在的位置。了解您可以执行哪些命令来进行此重新配置是一个好主意，该信息可以通过使用列出的参数执行以下脚本来找到：\n\
    \n```\n./deploy11203.sh -a -l\n```\n\n将显示以下列表：\n\n```\nStep  0 = CleanworkTmp\n\
    Step  1 = DropUsersGroups\nStep  2 = CreateUsers\nStep  3 = ValidateGridDiskSizes\n\
    Step  4 = CreateOCRVoteGD\nStep  5 = TestGetErrNode\nStep  6 = DeinstallGI\nStep\
    \  7 = DropCellDisk\nStep  8 = DropUsersGroups\nStep  9 = CheckCssd\nStep 10 =\
    \ testfn\nStep 11 = FixAsmAudit\nStep 12 = DropExpCellDisk\nStep 13 = testHash\n\
    Step 14 = DeconfigGI\nStep 15 = GetVIPInterface\nStep 16 = DeleteDB\nStep 17 =\
    \ ApplyBP3\nStep 18 = CopyCrspatchpm\nStep 19 = SetupMultipath\nStep 20 = RemovePartitions\n\
    Step 21 = SetupPartitions\nStep 22 = ResetMultipath\nStep 23 = DoT4Copy\nStep\
    \ 24 = DoAlltest\nStep 25 = ApplyBPtoGridHome\nStep 26 = Apply112CRSBPToRDBMS\n\
    Step 27 = RelinkRDSGI\nStep 28 = RunConfigAssistV2\nStep 29 = NewCreateCellCommands\n\
    Step 30 = GetPrivIpArray\nStep 31 = SetASMDefaults\nStep 32 = GetVIPInterface\n\
    Step 33 = Mychknode\nStep 34 = UpdateOPatch\nStep 35 = GetGroupHash\nStep 36 =\
    \ HugePages\nStep 37 = ResetPermissions\nStep 38 = CreateGroups\nStep 39 = FixCcompiler\n\
    Step 40 = CollectLogFiles\nStep 41 = OcrVoteRelocate\nStep 42 = OcrVoteRelocate\n\
    Step 43 = FixOSWonCells\nStep 44 = Dbcanew\nStep 45 = testgetcl\nStep 46 = setupASR\n\
    Step 47 = CrossCheckCellConf\nStep 48 = SetupCoreControl\nStep 49 = dropExtraCellDisks\n\
    Step 50 = CreateCellCommands\n```\n\n对于此重新配置步骤，有三个感兴趣的命令：\n\n```\nStep  6 = DeinstallGI\n\
    Step  7 = DropCellDisk\nStep  8 = DropUsersGroups\n```\n\n这些是将执行以“清除”现有存储配置并为下一步做准备的命令。每个命令都从\
    \ `deploy11203.sh` 脚本单独运行。您必须按列出的顺序运行这些步骤，以确保完全删除现有配置。实际的命令如下：\n\n```\n./deploy11203.sh\
    \ -a -s 6\n./deploy11203.sh -a -s 7\n./deploy11203.sh -a -s 8\n```\n\n查看 `V$ASM_DISKGROUP`\
    \ 的输出，您可以看到原始的存储分配。以下输出说明了这一点：\n\n```\nSQL> select name, free_mb, usable_file_mb\n\
    \  2  from v$asm_diskgroup\n  3  where name like '%MYEXA%';\n\nNAME          \
    \                 FREE_MB USABLE_FILE_MB\n------------------------------  ---------\
    \ --------------\nDATA_MYEXA1                   81050256       26959176\nRECO_MYEXA1\
    \                   20324596        6770138\n\nSQL>\n```\n\n您将看到，当此过程完成时，所示查询的输出将报告不同的值，这些值是新存储设置的结果。您应该在过程开始前和过程结束后运行此查询，以记录原始存储和新配置的存储。\n\
    \n考虑到这些注意事项，我们继续进行重新配置存储所需的步骤。"
  raw: '![image](images/sq.jpg) **Note**  We ran this procedure on a newly configured
    Exadata system, with the assistance of Oracle Advanced ­Customer Support. *No
    important databases had been created on this system.* This is *not* a recommended
    operation when such databases exist on your system.


    Looking at the `V$ASM_DISKGROUP` output you can see the original storage allocations.
    This is illustrated with the following output:


    ```

    SQL> select name, free_mb, usable_file_mb

      2  from v$asm_diskgroup

      3  where name like ''%MYEXA%'';


    NAME                              FREE_MB USABLE_FILE_MB

    ------------------------------  --------- --------------

    DATA_MYEXA1                      81050256       26959176

    RECO_MYEXA1                      20324596        6770138


    SQL>

    ```


    You will see that when this process completes, the output from the illustrated
    query will report different values that are the result of the new storage settings.
    You should run this query both before the process starts and after the process
    finishes, to document the original storage and the newly configured storage.


    With those notes in mind, we proceed with the steps necessary to reconfigure the
    storage.


    Prepare


    Not only are the logical storage areas redefined, but the “oracle” O/S user home
    is also re-created, so any changes made to that location must be preserved before
    executing this procedure. This needs to be done on all available database servers
    in your Exadata system, even if you have Oracle Advanced Customer Support perform
    the actual storage work. Thus, the first step to be executed is to preserve the
    “oracle” user home, either with `tar` (which originally was an acronym for *Tape
    ARchiver*,  since in the olden days, the only media available was tape) or `cpio`
    (an acronym for *CoPy In/Out*, a “newer” utility relative to `tar`, designed to
    operate not only on tape but on block devices such as disk drives). These two
    utilities are provided at the operating-system level. If you choose `tar`, the
    following command will preserve the “oracle” O/S user’s home directory:


    ```

    $ tar cvf /tmp/oraclehome.tar ./*

    ```


    In case you are not familiar with the `tar` command, the options provided perform
    the following actions:


    ```

    c -- Create the archive

    v -- Use verbose mode.  This will display all of the directories and files processed
    with their associated paths

    f -- The filename to use for the archive

    ```


    Using the ./* syntax to specify the files to archive makes it easier to restore
    the files to any base directory you choose. It isn’t likely that the “oracle”
    O/S user home will change names. Knowing this syntax can be helpful, if you want
    to copy a complete directory tree to another location, and it is our usual way
    to invoke `tar` to copy files and directories.


    Using `tar` is not mandatory; you can also use `cpio`. If you are more comfortable
    with the `cpio` utility, the following command will archive the “oracle” O/S user
    home:


    ```

    $ find . -depth -print | cpio -ov > /tmp/oraclehome.cpio

    ```


    The options provided do the following:


    ```

    o -- Copy out to the listed archive

    v -- Verbose output, listing the files and paths processed

    ```


    We recommend preserving the “oracle” user home directory before starting any storage
    reconfiguration, as it will be overwritten by the reconfiguration process. Preserve
    the existing “oracle” O/S user home on all available database servers, as all
    “oracle” O/S user homes will be rebuilt. Additionally, the “oracle” O/S user password
    will be reset to its original value, listed in the Exadata worksheet completed
    prior to delivery, installation, and initial configuration.


    The file used for the Exadata configuration only allows you to specify the size
    of the data disk group partition. The recovery disk group partition size is derived
    from the value provided to size the data disk group. The DBFS_DG size is not affected
    by changing this value. This file cannot be modified until the original storage
    configuration has been deleted.


    ![image](images/sq.jpg) **Note**  The commands listed for storage reconfiguration
    *must* be run as the “root” user. As this user has *unlimited power* at the O/S
    level, it *cannot* be stressed enough that caution *must* be exercised when executing
    these commands. If you are not comfortable using the “root” account, it would
    be best to make arrangements with Oracle Advanced Customer Support to reconfigure
    the storage to your desired levels.


    You should have a good idea on what you want the storage reconfiguration to provide
    in terms of +DATA_MYEXA1 disk group and +RECO_MYEXA1 disk group sizes, and you
    should also have the “oracle” O/S user home preserved, either with `tar` or `cpio`.
    We now proceed with the actual process of reconfiguring the storage.


    Additional tasks at this point include knowing what OEM agents are installed and
    noting whether or not the SCAN listener is using the default port. Reinstalling
    the OEM agents and reconfiguring the SCAN listener for a non-default port, if
    necessary, will have to be done as part of the restore steps, after the storage
    reconfiguration completes and the “oracle” O/S user home is restored. Steps to
    reinstall the OEM agents and reconfigure the SCAN listener will not be covered
    in this chapter, but it is good to know that they may need to be executed.


    Act


    You should be sufficiently prepared to begin the actual reconfiguration process.
    This first step drops the original storage configuration, including the configuration
    for the storage cells. Let’s begin.


    Act 1


    Connect to database server 1 as the “root” user. You should see a `#` in the shell
    prompt indicating the login/su process was successful. You will now have to change
    directories to `/opt/oracle.SupportTools/onecommand`. This is where the scripts
    and configuration files that you will need to complete this operation reside.
    It’s a good idea to know the available commands you can execute for this reconfiguration,
    and that information can be found by executing the following script with the listed
    parameters:


    ```

    ./deploy11203.sh -a -l

    ```


    The following list will be displayed:


    ```

    Step  0 = CleanworkTmp

    Step  1 = DropUsersGroups

    Step  2 = CreateUsers

    Step  3 = ValidateGridDiskSizes

    Step  4 = CreateOCRVoteGD

    Step  5 = TestGetErrNode

    Step  6 = DeinstallGI

    Step  7 = DropCellDisk

    Step  8 = DropUsersGroups

    Step  9 = CheckCssd

    Step 10 = testfn

    Step 11 = FixAsmAudit

    Step 12 = DropExpCellDisk

    Step 13 = testHash

    Step 14 = DeconfigGI

    Step 15 = GetVIPInterface

    Step 16 = DeleteDB

    Step 17 = ApplyBP3

    Step 18 = CopyCrspatchpm

    Step 19 = SetupMultipath

    Step 20 = RemovePartitions

    Step 21 = SetupPartitions

    Step 22 = ResetMultipath

    Step 23 = DoT4Copy

    Step 24 = DoAlltest

    Step 25 = ApplyBPtoGridHome

    Step 26 = Apply112CRSBPToRDBMS

    Step 27 = RelinkRDSGI

    Step 28 = RunConfigAssistV2

    Step 29 = NewCreateCellCommands

    Step 30 = GetPrivIpArray

    Step 31 = SetASMDefaults

    Step 32 = GetVIPInterface

    Step 33 = Mychknode

    Step 34 = UpdateOPatch

    Step 35 = GetGroupHash

    Step 36 = HugePages

    Step 37 = ResetPermissions

    Step 38 = CreateGroups

    Step 39 = FixCcompiler

    Step 40 = CollectLogFiles

    Step 41 = OcrVoteRelocate

    Step 42 = OcrVoteRelocate

    Step 43 = FixOSWonCells

    Step 44 = Dbcanew

    Step 45 = testgetcl

    Step 46 = setupASR

    Step 47 = CrossCheckCellConf

    Step 48 = SetupCoreControl

    Step 49 = dropExtraCellDisks

    Step 50 = CreateCellCommands

    ```


    The following are three commands of interest for this step of the reconfiguration:


    ```

    Step  6 = DeinstallGI

    Step  7 = DropCellDisk

    Step  8 = DropUsersGroups

    ```


    These are the commands that will be executed to “wipe clean” the existing storage
    configuration and prepare it for the next step. Each command is run individually
    from the `deploy11203.sh` script. You must run these steps in the listed order,
    to ensure a complete removal of the existing configuration. The actual commands
    follow:


    ```

    ./deploy11203.sh -a -s 6

    ./deploy11203.sh -a -s 7

    ./deploy11203.sh -a -s 8

    ```'
