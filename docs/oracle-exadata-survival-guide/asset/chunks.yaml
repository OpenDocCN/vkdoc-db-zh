    # 引言


    本书源于我们在将数据库和应用程序管理、配置及迁移到 Exadata 平台方面的个人经验。在此过程中，我们记录了笔记，尝试了各种方法，最终理解了 Exadata
    能做什么以及它是如何运作的。我们没有深入探讨系统的内部工作机制（Kerry Osborne、Randy Johnson 和 Tanel Pöder 已经在那个层面提供了出色的著作），而是选择为忙碌的
    DBA 提供一本指南，他们可能没有时间通读并消化一本“细节”书籍。因此，本书旨在引领 DBA 了解我们认为最重要的 Exadata 方面和概念，而不会陷入细节的泥潭。我们建议使用一台
    Exadata 机器，以便您可以尝试提供的脚本、查询和命令，并亲眼看到结果。我们相信，与 Exadata 的互动体验会让一些概念更容易理解。


    我们编写本书的目标是为经验丰富的 Oracle DBA 提供工具和知识，以驾驭 Exadata，希望他们不再心怀畏惧。本书无意解释 Oracle 的工作原理——这不是一本“通过实践学习
    Oracle”的教材。我们的意图是利用那些经过实战检验和时间考验的 Oracle 专业人士的现有知识，使他们能够成功地将已知内容适配到 Exadata 平台上。


    # 第 1 章：Exadata 基础


    ![image](img/frontdot.jpg)


    自 2008 年 9 月推出以来，Exadata 已迅速成为 IT/数据库领域既熟悉又常见的术语。在其短暂的历史中，该系统经历了数次变革，从存储解决方案演变为完整的数据库一体机。尽管它还不是家喻户晓的名字，但
    Exadata 的装机量已经增长到即将在全国各地的数据中心变得司空见惯的程度。那么，*究竟什么是* Exadata？或许最好先从说明 Exadata *不是*什么开始。Exadata
    不是：


    *   自切片面包以来最伟大的发明；

    *   能单枪匹马消除您应用程序中所有争用问题的唯一数据库机器；

    *   解决您所有其他数据库性能问题的期待已久的灵丹妙药；

    *   一个由中土世界巫师建造、只有被选中少数人才能理解的黑匣子。


    ## *究竟什么是* Exadata？


    既然您知道了 Exadata 不是什么，现在让我们来讨论它是什么。Exadata 是一个系统，由经过匹配和调优的组件组成，提供其他配置无法获得的增强功能，能够提升数据库层的性能。该系统包括数据库服务器、存储服务器、带有交换机的内部
    InfiniBand 网络以及存储设备（磁盘），所有这些都由 Oracle 高级客户支持人员根据客户需求进行配置。（对该配置的更改，包括更改数据和恢复磁盘组之间的默认存储分配，可以在
    Oracle 高级客户支持人员的协助下完成。）图 1-1 展示了 Exadata 系统的总体布局。


    ![9781430260103_Fig01-01.jpg](img/9781430260103_Fig01-01.jpg)


    图 1-1. Exadata 系统的总体布局


    Exadata 能改善所有情况吗？不能，但这并非其设计初衷。Exadata 最初是作为数据仓库/商业智能一体机设计的，从 V2 版本开始增加了在线事务处理（OLTP）应用支持。然而，并非
    Exadata 的每个特性都适用于可能出现的每个查询、应用程序或情况。如果您的应用程序没有遭受争用问题，那么 Exadata 很可能比使用现成组件的系统提供更短的响应时间和更好的吞吐量。


    Exadata 并非生来就是今天的样子；最初，它被构想为 RAC（真正应用集群）安装的开源存储解决方案，旨在解决通过网格基础架构（Oracle 内部称为 SAGE，即网格环境存储设备）传输大量数据的问题。2008
    年 9 月，Oracle 发布了 HP Oracle 数据库一体机，重点展示了 Exadata 存储服务器。当时，Exadata 仅指存储服务器组件，尽管
    HP Oracle 数据库一体机包含了后来发布的 Exadata 产品中的所有组件。

