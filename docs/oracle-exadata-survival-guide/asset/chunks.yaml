    \ to specify a comma-delimited list of storage cell names `dcli` is to connect\
    \ to. The entire command you want executed, including any supplied parameters,\
    \ must be enclosed in single quotes. An example of generating a similar report\
    \ on storage cells 4 and 5 follows.\n\n![image](images/Table9-1a.jpg)![image](images/Table9-1b.jpg)\n\
    \nThe storage cell name is displayed, as well as the `cellsrvstat` report data\
    \ for each interval reported. This also relies on passwordless `ssh` access to\
    \ the storage cells; if that isn’t established, it will be necessary to enter\
