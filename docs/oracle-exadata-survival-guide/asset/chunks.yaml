    ## 压缩比率分析


    [Table 6-3](#9781430260103_Ch06.xhtml#Tab3) 总结了各种压缩类型的估计压缩比率。


    **Table 6-3. 估计的压缩比率**


    | 压缩类型 | 估计比率 |

    | --- | --- |

    | OLTP | 3.5 |

    | Query Low | 51.1 |

    | Query High | 183.9 |

    | Archive Low | 183.9 |

    | Archive High | 189.8 |


    ### 实际结果与差异


    我们的 `EMP` 表中的数据非常易于压缩（简单来说，就是同样的 14 行数据被反复加载，以达到目标大小和行数），因此压缩比率非常可观。你的数据可能没那么容易压缩（很可能不会），所以你的估计值和实际比率可能会有所不同。我们数据的实际比率与估计值相当吻合；[Table
    6-4](#9781430260103_Ch06.xhtml#Tab4) 总结了这些结果。


    **Table 6-4. 实际观察到的压缩比率**


    | 压缩类型 | 实际比率 |

    | --- | --- |

    | OLTP | 3.5 |

    | Query Low | 48.6 |

    | Query High | 85.0 |

    | Archive Low | 85.0 |

