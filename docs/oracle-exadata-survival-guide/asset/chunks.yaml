    # User I/O Events


    Each of these events is associated with a wait class; there are four distinct
    wait classes for the cell events. The most populous wait class for cell events
    is the User I/O class, with seven of the seventeen events in this class. We will
    look at each event in that class in this section and see what it reports.


    ## Cell Smart Table Scan


    The `cell smart table scan` event records time against full-table scans that are
    offloaded to the storage cells. Because it can be used to determine if a statement
    utilized a Smart Scan, and thus benefited from offloading, it may be the most
    important wait event in the Exadata system. Remember that offloading only occurs
    during direct-path reads, so this event will, in general, replace the `direct
    path read` event. This is not to say that you won’t see a `direct path read` event
    on an Exadata system, but it is much more likely to see time recorded against
    the `cell smart table scan` event. As this is a direct-path read, it returns the
    data directly to the program global area (PGA) of the user process requesting
    it, which includes parallel slave processes.


    The use of an InfiniBand network changes the actual mechanism for direct-path
    reads, in comparison to non-Exadata systems. Each direct-path read request to
    the storage cells also contains a reference to the select list, join predicates—if
    they exist—and the query predicates. This allows the storage servers to filter
    the data and perform column projection before “handing over” the results to the
    database servers. Each data block processed by a Smart Scan has these optimizations
    applied to it; the database server processes that request. The data also have
    access to the ASM extent map, so they can request the necessary allocation units,
    or AUs, from each storage cell. The storage cells then read these allocation units
    in the order of request and apply the Smart Scan optimizations to each AU, returning
    the projected columns from rows that satisfy the supplied filter criteria. As
    expected, this event will occur repeatedly when large scans are executed.


