    \n`CellCLI>`\n\n由于您以 `cellmonitor` 身份连接，诸如 `ALTER`、`ASSIGN`、`CALIBRATE`、`DROP`、`EXPORT`\
    \ 和 `IMPORT` 等管理命令不可用。这些命令是为 `celladmin` 用户账户保留的。`DESCRIBE`、`LIST` 和 `SET` 是可用的，`SPOOL`\
    \ 命令也可用，用于将输出发送到文件。\n\n那么，作为 `cellmonitor` 你能做什么呢？您可以执行监控任务以确保存储单元正常运行。注意这里长长的\
    \ `LIST` 命令列表。它们用于报告存储单元操作的重要领域，包括智能闪存缓存。我们将从查看智能闪存缓存开始。\n\n```\nCellCLI> list\
    \ flashcache attributes all\n         myexa1cel04_FLASHCACHE  FD_08_myexa1cel04,FD_10_myexa1cel04,FD_00_myexa1cel04,FD_12_myexa1cel04,FD_03_myexa1cel04,FD_02_\n\
