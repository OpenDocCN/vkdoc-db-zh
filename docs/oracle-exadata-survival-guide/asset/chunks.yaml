    p3=0 obj#=384 tim=1372568877902691

    WAIT #47971177959976: nam=''cell statistics gather'' ela= 256 cellhash#=0 p2=0
    p3=0 obj#=384 tim=1372568877921221

    WAIT #47971177959976: nam=''cell statistics gather'' ela= 318 cellhash#=0 p2=0
    p3=0 obj#=384 tim=1372568877940424

    ```


    These waits are against the AUD$ table (object_id and data_object_id 384 in our
    database). The query executed in this trace file was not against AUD$ but against
    `V$CELL` and `V$CELL_THREAD_HISTORY`. The formatted output from tkprof from the
    trace file generated for the `V$CELL_THREAD_HISTORY` query follows:


    ```

