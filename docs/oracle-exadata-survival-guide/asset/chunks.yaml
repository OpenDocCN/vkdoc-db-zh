    `V$SQL_MONITOR` 和 `GV$SQL_MONITOR` 视图记录哪些语句处于并行语句队列中。状态为 `QUEUED` 表示哪些语句正在队列中等待。除了报告队列中的语句外，这些视图还记录了
    `SQL_EXEC_ID`，它指示了排队语句的执行顺序。通常，这是顺序分配的，但如果几个排队的语句可以并行同时执行，`SQL_EXEC_ID` 可能对多个条目显示相同的值。


    可以控制并行语句排队。更改 `parallel_servers_target` 的值会影响语句何时进入队列。较低的 `parallel_servers_target`
    值可能导致更多语句排队，因为可用的并行查询资源减少了。增加此值可以在队列填满之前允许更多语句处理。另一种控制排队的方法是通过提示。如果使用 `NO_STATEMENT_QUEUING`
    提示，则可以绕过该语句的并行语句排队。如果可用资源低到足以使该语句被放入队列，那么带有此提示的语句将绕过语句队列，并立即以计算出的 DOP 运行。这是 `parallel_servers_target`
    的值可能被超过的一种情况。'
- fmt: "# CHAPTER 6 Compression\n\nIf parallel statement queuing is not enabled, by\
    \ setting `parallel_degree_policy` to `LIMITED` or `MANUAL` or by setting the\
    \ hidden parameter `_parallel_statement_queuing` to `FALSE`, selected statements\
    \ can still be queued, using the `STATEMENT_QUEUING` hint. Using this hint causes\
    \ Oracle to behave as though parallel statement queuing is enabled, but only affects\
    \ statements that utilize this hint. This is useful when you want parallel statement\
    \ queuing enabled only for statements you choose to queue if their parallel execution\
    \ would impede the processing of other statements that are more important to the\
    \ business.\n\nIn-memory parallel execution is the third new feature, and it’s\
    \ probably not one that most queries on Exadata would utilize. There is both good\
    \ and bad to this feature. The good is the elimination of disk I/O, traffic between\
    \ the database servers and the storage cells, and the fact that memory has a far\
    \ lower latency than either disk or flash storage. The bad, on Exadata, is that\
    \ because the disk I/O is eliminated, the Smart Scan optimizations are no longer\
    \ available, the database servers must do all of the work of filtering and decompressing\
    \ data, and the number of available CPUs diminishes as the storage servers are\
    \ no longer involved in the query processing.\n\nIn-memory parallel execution\
    \ can be disabled either by setting another hidden parameter, `_parallel_cluster_cache_policy`,\
    \ to `ADAPTIVE` or by setting `parallel_degree_policy` to `MANUAL`, which turns\
    \ off all of the new parallel query features.\n\nIn-memory parallel execution\
    \ is rarely found on Exadata systems. It may be possible to have a query that\
    \ would benefit more from in-memory parallel execution than by using a Smart Scan,\
    \ but we haven’t seen that happen on Exadata systems we support.\n\n![image](images/frontdot.jpg)\n\
    \nOracle Release 11.2 offers Advanced Compression, a way to reduce the overall\
    \ size of your data by compressing commonly occurring values and strings with\
    \ tokens, mnemonics that can represent much larger strings and values. Two types\
    \ of compression are offered on systems not using Exadata-type storage: Basic\
    \ and OLTP. Basic compression is available without the Advanced Compression licensing.\
    \ A third compression option, Hybrid Columnar Compression (HCC), is available\
    \ on Exadata systems and non-Exadata systems using Exadata-type storage. This\
    \ is offered in two basic levels: QUERY and ARCHIVE.\n\nThese compression options\
    \ provide space savings, reducing table sizes to almost half the uncompressed\
    \ size. Of course, such features do not come without a price, and may not behave\
    \ as you would expect them to. When used with caution and care, storage requirements\
    \ can be reduced, sometimes significantly. It’s knowing when to use compression\
    \ and which compression level to implement that makes this a valuable, usable\
    \ feature.\n\n## How Can I Compress Thee\n\nThere are three general levels of\
    \ compression: Basic, OLTP, and Hybrid Columnar Compression (which we will refer\
    \ to as HCC), available with Exadata. By far, the most aggressive of these is\
    \ HCC, but it can throw in some surprises for the uninitiated. Also, be aware\
    \ that only one Advanced Compression option can be in use for a nonpartitioned\
    \ table; it can be OLTP or HCC but not both. Partitioned tables differ in that\
    \ each partition can use different compression methods. For example, the current\
    \ partition, partitioned by date, can use OLTP compression to make updates and\
    \ inserts less time-consuming; partitions for the next six months can use QUERY\
    \ LOW compression; and archive partitions (those older than six months) can use\
    \ ARCHIVE HIGH compression to allow space savings for partitions that are no longer\
    \ updated.\n\n### Basic\n\nBasic compression is aptly named; it compresses table\
    \ data simply and fairly quickly, resulting in considerable space savings:\n\n\
    ```sql\nSQL> select segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME\
    \                               BYTES\n----------------------------------- ----------\n\
    DEPT                                       65536\nSALGRADE                   \
    \                65536\nDUMMY                                      65536\nEMP\
    \                                  713031680\n\nSQL> alter table emp move compress;\n\
    \nTable altered.\n\nSQL> select segment_name, bytes\n  2  from user_segments;\n\
    \nSEGMENT_NAME                               BYTES\n-----------------------------------\
    \ ----------\nDEPT                                       65536\nSALGRADE     \
    \                              65536\nDUMMY                                  \
    \    65536\nEMP                                  184549376\n```\n\nTo affect the\
    \ current data, as well as future inserts and updates, we have to move the table\
    \ and compress it. A simple `alter table emp compress;` would have set the table\
    \ for compression, but the current data would have remained unaffected, providing\
    \ no immediate space savings. The move allowed Oracle to compress the existing\
    \ data in the table.\n\n### OLTP\n\nOLTP compression is the first of the Advanced\
    \ Compression options, which require separate licensing to use. Unlike Basic compression,\
    \ OLTP compression does provide for automatic compression after updates; however,\
    \ it’s performed in a batch-type operation on a block-by-block basis. It, too,\
    \ can provide substantial savings on the storage tier:\n\n```sql\nSQL> select\
    \ segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME              \
    \                 BYTES\n----------------------------------- ----------\nEMP \
    \                                 721420288\nDEPT                            \
    \           65536\nSALGRADE                                   65536\nDUMMY   \
    \                                   65536\n\nSQL> alter table emp move compress\
    \ for oltp;\n\nTable altered.\n\nSQL> select segment_name, bytes\n  2  from user_segments;\n\
    \nSEGMENT_NAME                               BYTES\n-----------------------------------\
    \ ----------\nEMP                                  201326592\nDEPT           \
    \                            65536\nSALGRADE                                 \
    \  65536\nDUMMY                                      65536\n\nSQL>\n```\n\nThe\
    \ compressed size using OLTP compression is a bit larger than that for Basic compression,\
    \ but you get the added benefit of eventual recompression after updated blocks\
    \ are filled. As updated blocks hit the compression threshold, they are compressed\
    \ using the OLTP algorithm, so that it is not necessary to manually re-compress\
    \ the table. This does, of course, leave the updated table in a mixed state of\
    \ compressed and uncompressed blocks, but the uncompressed blocks will return\
    \ to the compressed state, once the conditions for compression are reached.\n\n\
    ### Hybrid Columnar Compression (HCC)\n\nHybrid Columnar Compression is a compression\
    \ option available only for tables residing on Exadata storage. (As well as Exadata,\
    \ this includes Axiom, the SPARC SuperCluster, and the Sun ZFS Storage Appliance.)\
    \ If you try this on any other system, you will receive the following informative\
    \ message:\n\n```sql\nSQL> alter table emp move compress for query high;\nalter\
    \ table emp move compress for query high\n            *\nERROR at line 1:\nORA-64307:\
    \ hybrid columnar compression is not supported for tablespaces on this storage\
    \ type\n\nSQL>\n```\n\nThe phrase `this storage type` means any storage other\
    \ than those listed at the beginning of this section. With that in mind, we want\
    \ to mention that HCC can be a showstopper for Data Guard, when the destination\
    \ database is not on Exadata or using Exadata storage. Tables in the affected\
    \ Data Guard instance will need to be uncompressed before transactions can be\
    \ applied to them, so all of the space savings will be lost. This is also true\
    \ for database backups when HCC is enabled. Restoring a backup where HCC compression\
    \ is used to a non-Exadata system will necessitate uncompressing those tables.\
    \ This can easily cause you to run out of storage before all the tables are uncompressed,\
    \ if the storage requirements were determined from the Exadata side."
  raw: 'If parallel statement queuing is not enabled, by setting `parallel_degree_policy`
    to `LIMITED` or `MANUAL` or by setting the hidden parameter `_parallel_statement_queuing`
    to `FALSE`, selected statements can still be queued, using the `STATEMENT_QUEUING`
    hint. Using this hint causes Oracle to behave as though parallel statement queuing
    is enabled, but only affects statements that utilize this hint. This is useful
    when you want parallel statement queuing enabled only for statements you choose
    to queue if their parallel execution would impede the processing of other statements
    that are more important to the business.


    In-memory parallel execution is the third new feature, and it’s probably not one
    that most queries on Exadata would utilize. There is both good and bad to this
    feature. The good is the elimination of disk I/O, traffic between the database
    servers and the storage cells, and the fact that memory has a far lower latency
    than either disk or flash storage. The bad, on Exadata, is that because the disk
    I/O is eliminated, the Smart Scan optimizations are no longer available, the database
    servers must do all of the work of filtering and decompressing data, and the number
    of available CPUs diminishes as the storage servers are no longer involved in
    the query processing.


    In-memory parallel execution can be disabled either by setting another hidden
    parameter, `_parallel_cluster_cache_policy`, to `ADAPTIVE` or by setting `parallel_degree_policy`
    to `MANUAL`, which turns off all of the new parallel query features.


    In-memory parallel execution is rarely found on Exadata systems. It may be possible
    to have a query that would benefit more from in-memory parallel execution than
    by using a Smart Scan, but we haven’t seen that happen on Exadata systems we support.


    CHAPTER 6


    ![image](images/frontdot.jpg)


    Compression


    Oracle Release 11.2 offers Advanced Compression, a way to reduce the overall size
    of your data by compressing commonly occurring values and strings with tokens,
    mnemonics that can represent much larger strings and values. Two types of compression
    are offered on systems not using Exadata-type storage: Basic and OLTP . Basic
    compression is available without the Advanced Compression licensing. A third compression
    option, Hybrid Columnar Compression (HCC) , is available on Exadata systems and
    non-Exadata systems using Exadata-type storage. This is offered in two basic levels:
    QUERY and ARCHIVE.


    These compression options provide space savings, reducing table sizes to almost
    half the uncompressed size. Of course, such features do not come without a price,
    and may not behave as you would expect them to. When used with caution and care,
    storage requirements can be reduced, sometimes significantly. It’s knowing when
    to use compression and which compression level to implement that makes this a
    valuable, usable feature.


    How Can I Compress Thee


    There are three general levels of compression: Basic, OLTP, and Hybrid Columnar
    Compression (which we will refer to as HCC), available with Exadata. By far, the
    most aggressive of these is HCC, but it can throw in some surprises for the uninitiated.
    Also, be aware that only one Advanced Compression option can be in use for a nonpartitioned
    table; it can be OLTP or HCC but not both. Partitioned tables differ in that each
    partition can use different compression methods. For example, the current partition,
    partitioned by date, can use OLTP compression to make updates and inserts less
    time-consuming; partitions for the next six months can use QUERY LOW compression;
    and archive partitions (those older than six months) can use ARCHIVE HIGH compression
    to allow space savings for partitions that are no longer updated.


    Basic


    Basic compression is aptly named; it compresses table data simply and fairly quickly,
    resulting in considerable space savings:


    ```

    SQL> select segment_name, bytes

      2  from user_segments;


    SEGMENT_NAME                             BYTES

    ----------------------------------- ----------

    DEPT                                     65536

    SALGRADE                                 65536

    DUMMY                                    65536

    EMP                                  713031680


    SQL> alter table emp move compress;


    Table altered.


    SQL> select segment_name, bytes

      2  from user_segments;


    SEGMENT_NAME                             BYTES

    ----------------------------------- ----------

    DEPT                                     65536

    SALGRADE                                 65536

    DUMMY                                    65536

    EMP                                  184549376

    ```


    To affect the current data, as well as future inserts and updates, we have to
    move the table and compress it. A simple `alter table emp compress` `;` would
    have set the table for compression, but the current data would have remained unaffected,
    providing no immediate space savings. The move allowed Oracle to compress the
    existing data in the table.


    OLTP


    OLTP compression is the first of the Advanced Compression options, which require
    separate licensing to use. Unlike Basic compression, OLTP compression does provide
    for automatic compression after updates; however, it’s performed in a batch-type
    operation on a block-by-block basis. It, too, can provide substantial savings
    on the storage tier:


    ```

    SQL> select segment_name, bytes

      2  from user_segments;


    SEGMENT_NAME                             BYTES

    ----------------------------------- ----------

    EMP                                  721420288

    DEPT                                     65536

    SALGRADE                                 65536

    DUMMY                                    65536


    SQL> alter table emp move compress for oltp;


    Table altered.


    SQL> select segment_name, bytes

      2  from user_segments;


    SEGMENT_NAME                             BYTES

    ----------------------------------- ----------

    EMP                                  201326592

    DEPT                                     65536

    SALGRADE                                 65536

    DUMMY                                    65536


    SQL>

    ```


    The compressed size using OLTP compression is a bit larger than that for Basic
    compression, but you get the added benefit of eventual recompression after updated
    blocks are filled. As updated blocks hit the compression threshold, they are compressed
    using the OLTP algorithm, so that it is not necessary to manually re-compress
    the table. This does, of course, leave the updated table in a mixed state of compressed
    and uncompressed blocks, but the uncompressed blocks will return to the compressed
    state, once the conditions for compression are reached.


    Hybrid Columnar Compression (HCC)


    Hybrid Columnar Compression is a compression option available only for tables
    residing on Exadata storage. (As well as Exadata, this includes Axiom, the SPARC
    SuperCluster, and the Sun ZFS Storage Appliance.) If you try this on any other
    system, you will receive the following informative message:


    ```

    SQL> alter table emp move compress for query high;

    alter table emp move compress for query high

                *

    ERROR at line 1:

    ORA-64307: hybrid columnar compression is not supported for tablespaces on this
    storage type


    SQL>

    ```


    The phrase *this storage type* means any storage other than those listed at the
    beginning of this section. With that in mind, we want to mention that HCC can
    be a showstopper for Data Guard, when the destination database is not on Exadata
    or using Exadata storage. Tables in the affected Data Guard instance will need
    to be uncompressed before transactions can be applied to them, so all of the space
    savings will be lost. This is also true for database backups when HCC is enabled.
    Restoring a backup where HCC compression is used to a non-Exadata system will
    necessitate uncompressing those tables. This can easily cause you to run out of
    storage before all the tables are uncompressed, if the storage requirements were
    determined from the Exadata side.'
  trans: "# 第 6 章 压缩\n\n如果未启用并行语句排队（通过将 `parallel_degree_policy` 设置为 `LIMITED` 或 `MANUAL`，或者将隐藏参数\
    \ `_parallel_statement_queuing` 设置为 `FALSE`），仍可使用 `STATEMENT_QUEUING` 提示对选定的语句进行排队。使用此提示会使\
    \ Oracle 的行为如同启用了并行语句排队，但仅影响使用此提示的语句。当你只想为你选择的、其并行执行可能阻碍更重要的业务语句处理的语句启用并行语句排队时，这非常有用。\n\
    \n内存中并行执行是第三个新特性，它可能不是大多数在 Exadata 上运行的查询会利用的功能。该特性有其优点和缺点。优点是消除了磁盘 I/O、数据库服务器与存储单元之间的通信流量，并且内存的延迟远低于磁盘或闪存存储。在\
    \ Exadata 上的缺点是，由于消除了磁盘 I/O，Smart Scan 优化不再可用，数据库服务器必须承担所有数据过滤和解压缩的工作，并且由于存储服务器不再参与查询处理，可用的\
    \ CPU 数量也减少了。\n\n可以通过将另一个隐藏参数 `_parallel_cluster_cache_policy` 设置为 `ADAPTIVE`，或者将\
    \ `parallel_degree_policy` 设置为 `MANUAL` 来禁用内存中并行执行，后者会关闭所有新的并行查询特性。\n\n内存中并行执行在\
    \ Exadata 系统中很少见。可能存在某个查询从内存中并行执行中获益比使用 Smart Scan 更多的情况，但在我们支持的 Exadata 系统上尚未遇到过。\n\
    \n![image](img/frontdot.jpg)\n\nOracle 11.2 版本提供了高级压缩，这是一种通过使用令牌（可代表更长字符串和值的助记符）压缩常见值和字符串来减少数据总体大小的方法。在不使用\
    \ Exadata 类型存储的系统上提供两种压缩类型：基础压缩和 OLTP 压缩。基础压缩无需高级压缩许可即可使用。第三种压缩选项，混合列压缩（HCC），可在\
    \ Exadata 系统和使用 Exadata 类型存储的非 Exadata 系统上使用。它提供两个基本级别：QUERY 和 ARCHIVE。\n\n这些压缩选项可节省空间，将表大小压缩到几乎未压缩大小的一半。当然，这些特性并非没有代价，其行为也可能不如预期。谨慎使用时，可以减少存储需求，有时效果显著。正是知道何时使用压缩以及实现哪个压缩级别，才使得这项功能既实用又有价值。\n\
    \n## 我可以如何压缩你\n\n压缩有三个通用级别：基础压缩、OLTP 压缩和混合列压缩（我们将之称为 HCC，适用于 Exadata）。到目前为止，其中最激进的是\
    \ HCC，但它可能会给初学者带来一些意外。另外请注意，对于非分区表，一次只能使用一种高级压缩选项；可以是 OLTP 压缩或 HCC，但不能同时使用两者。分区表的不同之处在于每个分区可以使用不同的压缩方法。例如，按日期分区的当前分区可以使用\
    \ OLTP 压缩以使更新和插入更省时；未来六个月的分区可以使用 QUERY LOW 压缩；而存档分区（超过六个月的分区）可以使用 ARCHIVE HIGH\
    \ 压缩，以便为不再更新的分区节省空间。\n\n### 基础压缩\n\n基础压缩名副其实；它简单且相当快速地压缩表数据，从而显著节省空间：\n\n```sql\n\
    SQL> select segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME    \
    \                           BYTES\n----------------------------------- ----------\n\
    DEPT                                       65536\nSALGRADE                   \
    \                65536\nDUMMY                                      65536\nEMP\
    \                                  713031680\n\nSQL> alter table emp move compress;\n\
    \nTable altered.\n\nSQL> select segment_name, bytes\n  2  from user_segments;\n\
    \nSEGMENT_NAME                               BYTES\n-----------------------------------\
    \ ----------\nDEPT                                       65536\nSALGRADE     \
    \                              65536\nDUMMY                                  \
    \    65536\nEMP                                  184549376\n```\n\n要影响当前数据以及未来的插入和更新，我们必须移动表并对其进行压缩。一个简单的\
    \ `alter table emp compress;` 命令会将表设置为压缩，但当前数据将保持不变，无法立即节省空间。移动操作使 Oracle 能够压缩表中的现有数据。\n\
    \n### OLTP 压缩\n\nOLTP 压缩是需要单独许可才能使用的高级压缩选项之一。与基础压缩不同，OLTP 压缩确实能在更新后自动进行压缩；但是，它是以逐块（block-by-block）的批量类型操作执行的。它同样能在存储层上提供可观的节省：\n\
    \n```sql\nSQL> select segment_name, bytes\n  2  from user_segments;\n\nSEGMENT_NAME\
    \                               BYTES\n----------------------------------- ----------\n\
    EMP                                  721420288\nDEPT                         \
    \              65536\nSALGRADE                                   65536\nDUMMY\
    \                                      65536\n\nSQL> alter table emp move compress\
    \ for oltp;\n\nTable altered.\n\nSQL> select segment_name, bytes\n  2  from user_segments;\n\
    \nSEGMENT_NAME                               BYTES\n-----------------------------------\
    \ ----------\nEMP                                  201326592\nDEPT           \
    \                            65536\nSALGRADE                                 \
    \  65536\nDUMMY                                      65536\n\nSQL>\n```\n\n使用\
    \ OLTP 压缩后的大小比基础压缩稍大，但你可以获得更新块填满后最终重新压缩的额外好处。当更新的块达到压缩阈值时，它们会使用 OLTP 算法进行压缩，因此无需手动重新压缩表。这当然会使更新后的表处于压缩块和未压缩块的*混合状态*，但一旦达到压缩条件，未压缩的块将返回到压缩状态。\n\
    \n### 混合列压缩 (HCC)\n\n混合列压缩是一种仅适用于驻留在 Exadata 存储上的表的压缩选项。（除了 Exadata，还包括 Axiom、SPARC\
    \ SuperCluster 和 Sun ZFS Storage Appliance。）如果你在任何其他系统上尝试此操作，将收到以下信息性消息：\n\n```sql\n\
    SQL> alter table emp move compress for query high;\nalter table emp move compress\
    \ for query high\n            *\nERROR at line 1:\nORA-64307: hybrid columnar\
    \ compression is not supported for tablespaces on this storage type\n\nSQL>\n\
    ```\n\n短语 `this storage type` 指的是本节开头所列存储类型之外的任何存储。考虑到这一点，我们要提到，当目标数据库不在 Exadata\
    \ 上或未使用 Exadata 存储时，HCC 可能会成为 Data Guard 的*障碍*。受影响的 Data Guard 实例中的表在事务应用之前将需要解压缩，因此所有节省的空间都将丢失。对于启用了\
    \ HCC 的数据库备份也是如此。将使用 HCC 压缩的备份恢复到非 Exadata 系统时，将需要解压缩这些表。如果存储需求是根据 Exadata 端确定的，这很容易导致在解压缩所有表之前存储空间就已耗尽。"
- fmt: "# HCC\n\nHCC的工作原理与本章前面提到的两种选项不同，因为它会将数据重新组织为压缩单元（`CU`）。它的工作原理将在下一节讨论。目前，我们将专注于实现HCC的四种形式以及它们之间的差异。HCC标志下有两种基本类型：`QUERY`和`ARCHIVE`，每种类型都有`HIGH`和`LOW`选项。我们将首先讨论属于`QUERY`类型的第一组HCC选项，然后讨论`ARCHIVE`类型。\n\
    \n## QUERY\n\n这种类型不如`ARCHIVE`激进，但它最初压缩数据的程度仍然高于`OLTP`压缩。我们首先对`EMP`表进行`QUERY HIGH`压缩：\n\
    \n```sql\nSQL>\nSQL> --\nSQL> -- Current storage for the EMP table\nSQL> -- (this\
    \ is simply a test table for this example)\nSQL> --\nSQL> select segment_name,\
