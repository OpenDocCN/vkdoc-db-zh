    ```\n\n## 实现它\n\nI/O 校准并非启用自动 DOP 的唯一因素，因为参数 `parallel_degree_policy` 必须设置为 `AUTO`\
    \ 或 `LIMITED`。默认情况下，它被设置为 `MANUAL`，这会禁用 Oracle 11.2 版本的三个并行功能：自动 DOP、并行语句排队和内存中并行执行。这三个可用的设置及其对这些功能的影响列在表\
    \ 5-2 中。\n\n表 5-2. `parallel_degree_policy` 设置如何影响并行执行\n\n| 设置 | 影响 |\n| --- |\
    \ --- |\n| `MANUAL` | 禁用所有三个新的并行查询功能。导致并行处理回退到先前版本的行为，仅当语句有提示或被查询的对象是创建时或被更改为具有大于默认值\
