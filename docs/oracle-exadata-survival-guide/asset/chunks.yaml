    \ `DEGREE` 为 `DEFAULT` 相关联的对象的查询才会被考虑。 |\n| `AUTO` | 所有三个新的并行功能都被启用。无论访问的对象上的\
    \ `DEGREE` 设置如何，查询和语句都将被评估是否进行并行执行。 |\n\n另一个影响其中一个新功能的“隐藏”参数是 `_parallel_statement_queueing`。当设置为\
    \ `TRUE`（默认值）时，排队功能被启用，这允许 Oracle 在运行时决定并行语句是否可以执行，或者是否需要等待队列中直到有足够资源可用。还有一个“隐藏”参数\
    \ `_parallel_cluster_cache_policy`，它控制内存中并行执行是否可用。设置为 `cached` 会启用此功能。在 Exadata\
    \ 上，此功能可能不太有用；当它启用时，扫描缓冲区缓存时将无法使用 Smart Scan 优化。这是一个选择：是对缓冲区缓存使用 Smart Scan 的全部功能，还是使用内存中并行执行。这主要适用于数据仓库工作负载，因为\
    \ OLTP 处理很少需要并行处理。但您应该意识到，当配置了内存中并行执行时，访问缓冲区缓存的 Smart Scan 可能会受到影响。\n\n当 `parallel_degree_policy`\
    \ 设置为 `AUTO` 时，对象是否以大于 1 的 `DEGREE` 创建就不重要了，因为数据库决定哪些语句并行运行、使用多少并行从属进程执行，甚至决定涉及多少个\
    \ RAC 节点参与该过程。这就是自动 DOP 的魅力和强大之处。\n\n## 在内存中执行\n\n第三个并行功能，内存中并行执行，可以在不使用 Smart\
    \ Scan 时提高查询性能。它设计为使用缓冲区缓存，具有集群感知能力，并且可以利用所有可用的 RAC 节点。当 `parallel_degree_policy`\
    \ 设置为 `AUTO` 时，它即被启用。其他可以影响内存中并行执行的参数有 `parallel_servers_target`、`parallel_min_time_threshold`、`parallel_degree_limit`\
    \ 和 `parallel_degree_policy`。`parallel_servers_target`、`parallel_degree_limit`\
    \ 和 `parallel_min_time_threshold` 的较低值会使内存中更有可能运行并行执行。此外，可以将 `parallel_force_local`\
    \ 参数设置为 `TRUE`，将可用的并行资源限制在本地服务器上，这也有利于内存中并行执行。影响此改进的非并行参数是 `sga_max_size` 和 `sga_target`，它们控制着缓冲区缓存大小以及\
    \ SGA 的其他区域。更大的缓存大小可以在内存中容纳更大的表，这也使得此功能更有可能运行。将这些参数设置为较低值不能保证此功能会运行，但如果缩减这些设置，您使用它的机会可能会更大。\n\
    \n虽然内存确实比磁盘快得多，但 Smart Scan 旨在快速高效地访问磁盘上的数据。列投影和谓词过滤大大减少了数据库层处理的数据量，从而加快了查询速度。但如果所有数据都能在内存中加载和处理，那么处理相同数据量所需的时间将只是从磁盘读取处理时间的一小部分。\n\
    \n内存中并行执行有其好处。\n"
- fmt: '# Oracle Exadata 并行查询处理特性详解


    ## 内存并行执行的优缺点与考量


    *   物理 I/O 实际上被消除。

    *   数据库服务器与存储单元之间的流量被消除。

    *   与磁盘或闪存存储相比，内存访问的延迟要低得多。


    然而，这些益处不能孤立看待，因为必须考虑可用的 CPU 和内存资源。在智能扫描执行期间，本应卸载到存储单元的功能（数据过滤和数据解压缩）现在需要由数据库服务器来执行。这可能增加处理数据所需的
    CPU 周期，并且如果没有存储服务器额外的 CPU 和内存，可能会给数据库服务器性能带来压力。你有可能拥有这些富余资源，也同样有可能没有。是否使用此功能是一个只有你在仔细考虑所有事实后才能做出的决定。


    我们处理过的所有 Exadata 系统均未使用内存并行执行。这很可能是一件好事，如果大多数查询都使用智能扫描，因为如前所述，所有智能扫描优化都不可用。是的，它会消除磁盘
    I/O，但它也消除了存储服务器本可提供的、用于数据过滤、解压缩和其他操作的额外 CPU。尽管理念上看起来不错，但在 Exadata 系统上，使用内存并行执行可能比使用智能扫描效率更低，因为在智能扫描中，存储服务器分担工作负载并减少了数据库层处理的数据量。此外，能从中获益最大的查询，恰恰是那些通常不会使用存储索引的查询，它们会将整张表放入内存。在大量查询和语句不使用智能扫描、且表的大小足以完全放入缓冲区缓存的
    Exadata 系统上，内存并行执行可以通过消除磁盘 I/O（以物理读的形式）并转为内存访问（通过逻辑读）来提升性能。


    ## 如何禁用内存并行执行


    如前所述，当 `parallel_degree_policy` 设置为 `AUTO` 时，所有三项并行功能都将启用。如果你想禁用内存并行执行，可以通过以下两种方式之一完成：要么将
    `parallel_degree_policy` 设置为 `MANUAL`（此设置将禁用所有功能），要么将隐藏参数 `_parallel_cluster_cache_policy`
    设置为 `ADAPTIVE`，后者会保留自动并行度和并行语句排队功能的可用性。当自动并行度激活时，`_parallel_cluster_cache_policy`
    将被设置为 `CACHED`。


    ## 在 Exadata 上实施的挑战


    内存并行执行并非在 Exadata 上最容易实现的功能。我们尚未在我们的系统上成功启用它，即使将 `parallel_min_time_threshold`、`parallel_servers_target`
    和 `parallel_degree_limit` 设置为异常低的阈值。它还要求整张表必须能放入缓冲区缓存，这并非易事。此外，数据库服务器在没有智能扫描协助的情况下执行所有工作，无法消除可能的数据大容量，因此智能扫描可能是一条更好的路径。再次强调，这是一个只有你在考虑了智能扫描和内存并行执行的所有方面，以及系统当前工作负载后，才能做出的决定。


    ## 注意事项


    并行查询处理并非 Exadata 独有；它使用的是任何 Oracle 11.2 安装都可用的相同功能。它对 Exadata 特别有益的原因在于，Exadata
    从一开始就是为数据仓库而设计的，而并行处理在数据仓库中被频繁使用。


    并行查询处理有三个改变其性能的新特性。它们是自动并行度、并行语句排队和内存并行处理。其中，前两项对 Exadata 提供了最大的益处。


    ## 自动并行度


    自动并行度正如其名：它根据可用资源和系统负载自动计算并行度。默认情况下不启用。必须将初始化参数 `parallel_degree_policy` 设置为 `AUTO`
    或 `LIMITED` 才能启用自动并行度。默认情况下，此参数设置为 `MANUAL`。当此参数设置为 `AUTO` 时，所有三项新的并行查询特性都将被启用。


    I/O 校准是使自动并行度正常工作的必要条件，使用提供的过程 `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 来生成和记录校准数据。尽管执行起来相当简单，但它是一项耗时且资源密集型的操作，不应在负载重的系统上尝试。


    I/O 校准结果可在 `V$IO_CALIBRATION_STATUS` 和 `DBA_RSRC_IO_CALIBRATE` 视图中查看。结果存储在 `RESOURCE_IO_CALIBRATE$`
    表中。当查询 `V$IO_CALIBRATION_STATUS` 返回状态为 `NOT AVAILABLE` 时，表明尚未运行 I/O 校准。状态为 `COMPLETED`
    以及完成日期则证明存在有效的校准数据。


    启用自动并行度后可能会出现性能问题，例如查询整体完成时间变长。可以通过从 `RESOURCE_IO_CALIBRATE$` 表中删除来清除 I/O 校准统计信息。这并不像乍看起来那么激烈，因为
    `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 过程在生成新校准数据之前会先执行此删除操作。


    ## 并行语句排队


    并行语句排队通过以下初始化参数启用：


    ```

    parallel_degree_policy

    parallel_servers_target

    ```


    请记住，将 `parallel_degree_policy` 设置为 `AUTO` 会启用所有三项新的并行查询功能，这是启用并行语句排队的唯一方式。`parallel_servers_target`
    应设置为允许的并行从属进程的期望数量。然而，它并非硬性限制，因为在某些情况下可能会超过此设置，因为自动并行度可以设置分配的 DOP 两倍的并行从属进程数。这种情况并不常见，所以即使发生也不是问题。


    `V$SQL_MONITOR` 和 `GV$SQL_MONITOR` 视图记录哪些语句处于并行语句队列中。状态为 `QUEUED` 表示哪些语句正在队列中等待。除了报告队列中的语句外，这些视图还记录了
    `SQL_EXEC_ID`，它指示了排队语句的执行顺序。通常，这是顺序分配的，但如果几个排队的语句可以并行同时执行，`SQL_EXEC_ID` 可能对多个条目显示相同的值。


    可以控制并行语句排队。更改 `parallel_servers_target` 的值会影响语句何时进入队列。较低的 `parallel_servers_target`
    值可能导致更多语句排队，因为可用的并行查询资源减少了。增加此值可以在队列填满之前允许更多语句处理。另一种控制排队的方法是通过提示。如果使用 `NO_STATEMENT_QUEUING`
    提示，则可以绕过该语句的并行语句排队。如果可用资源低到足以使该语句被放入队列，那么带有此提示的语句将绕过语句队列，并立即以计算出的 DOP 运行。这是 `parallel_servers_target`
    的值可能被超过的一种情况。'
  raw: '*   Physical I/O is essentially eliminated.

    *   Traffic between the database servers and the storage cells is eliminated.

    *   There is far lower latency for memory, as compared to either disk or flash
    storage.


    These benefits cannot be taken alone, however, because the available resources
    of CPU and memory have to be considered. Functions that would be offloaded to
    the storage cells (data filtering and data decompression) during Smart Scan execution
    fall to the database servers to perform. This can increase the CPU cycles required
    to process data, and without the additional CPUs and memory of the storage servers,
    it can put a strain on database server performance. There is a chance that you
    will have these resources to spare, and an equally likely chance that you do not.
    Whether or not to use this feature is a decision only you can make, after carefully
    considering all the facts.


    None of the Exadata systems we have worked on use in-memory parallel execution.
    This is likely a good thing, if the majority of queries use Smart Scans, because,
    as mentioned previously, none of the Smart Scan optimizations are available. Yes,
    it would eliminate disk I/O, but it also eliminates the extra CPUs the storage
    servers would provide for data filtering, decompression, and other operations.
    Even though it looks good in concept, on an Exadata system, using in-memory parallel
    execution could be less efficient than using a Smart Scan, because, in a Smart
    Scan, the storage servers share the workload and reduce the volume of data the
    database tier processes. In addition, queries that would see the greatest benefit
    would be those that normally wouldn’t use a Storage Index, placing the entire
    table into memory. On Exadata systems where a good number of queries and statements
    don’t use Smart Scans, and the tables are sized to fit entirely in the buffer
    cache, in-memory parallel execution could improve performance by eliminating disk
    I/O (in the form of physical reads), in favor of memory access (by using logical
    reads).


    As noted earlier, when `parallel_degree_policy` is set to `AUTO`, all three of
    the parallel features are enabled. If you want to disable in-memory parallel execution,
    this can be done in one of two ways: either by setting `parallel_degree_policy`
    to `MANUAL` (a setting that disables all of the features) or by setting a hidden
    parameter, `_parallel_cluster_cache_policy`, to `ADAPTIVE`, which preserves availability
    of the Auto DOP and parallel statement queuing features. When Auto DOP is active,
    `_parallel_cluster_cache_policy` will be set to `CACHED`.


    In-memory parallel execution is not the easiest feature to get to work on Exadata.
    We have yet to get it to function on our systems, even when setting unusually
    low thresholds for `parallel_min_time_threshold`, `parallel_servers_target`, and
    `parallel_degree_limit`. It also requires that an entire table fit into the buffer
    cache, which is not an easy accomplishment. Add to that the fact that the database
    servers are performing all the work, without the assistance of a Smart Scan to
    eliminate possibly large volumes of data, and it may be that a Smart Scan is really
    a better path to take. Again, the decision is one only you can make, after considering
    all aspects of both Smart Scan and in-memory parallel execution and the current
    workload on your system.


    Things to Know


    Parallel query processing is not exclusive to Exadata; it uses the same functionality
    available to any installation of Oracle 11.2\. What makes it especially beneficial
    to Exadata is the fact that Exadata was designed, in the beginning, to support
    data warehousing, where parallel processing is utilized frequently.


    There are three new features of parallel query processing that change how parallel
    queries perform. These are automatic degree of parallelism (Auto DOP), parallel
    statement queuing, and in-memory parallel processing. Of the three, the first
    two provide the greatest benefit to Exadata.


    Auto DOP does just what its name suggests: it computes the degree of parallelism
    automatically based on available resources and system load. It is not enabled
    by default. An initialization parameter, `parallel_degree_policy`, must be set
    to `AUTO` or `LIMITED` to enable Auto DOP. By default, this parameter is set to
    `MANUAL`. When this parameter is set to `AUTO`, then all three new parallel query
    features are enabled.


    I/O calibration is a must to get Auto DOP to function, and a provided procedure,
    `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`, is used to generate and record the calibration
    data. Although it’s fairly simple to execute, it is a time-consuming and resource-intensive
    operation and should not be attempted on a heavily used system.


    I/O calibration results are visible in the V$IO_CALIBRATION_STATUS and DBA_RSRC_IO_CALIBRATE
    views. The results are stored in the `RESOURCE_IO_CALIBRATE$` table. When a query
    to `V$IO_CALIBRATION_STATUS` returns a status of `NOT AVAILABLE`, this indicates
    that I/O calibration has not been run. A status of COMPLETED, along with the completion
    date, proves the existence of valid calibration data.


    There may be performance issues after enabling Auto DOP, such as queries taking
    a longer overall time to complete. It is possible to delete the I/O calibration
    statistics by deleting from the `RESOURCE_IO_CALIBRATE$` table. This is not as
    drastic an action as it may first appear, as the `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`
    procedure first executes this delete before generating new calibration data.


    Parallel statement queuing is enabled through the following initialization parameters:


    ```

    parallel_degree_policy

    parallel_servers_target

    ```


    Remember that setting parallel_degree_policy to AUTO enables all three new parallel
    query features, which is the only way to enable parallel statement queing. The
    parallel_servers_target should be set to the desired number of parallel slaves,
    which should be allowed. It is not, however, a hard limit, as this setting can
    be exceeded in some cases, because Auto DOP can set a number of parallel slaves,
    which is double the assigned DOP. It is not a common occurrence, so it’s not an
    issue, should it happen.


    The `V$SQL_MONITOR` and `GV$SQL_MONITOR` views record which statements are in
    the parallel statement queue. A status of `QUEUED` indicates which statements
    are waiting in the statement queue. In addition to reporting which statements
    are in the queue, these views also record the `SQL_EXEC_ID`, which indicates the
    order in which the queued statements will be executed. Normally, this is sequentially
    assigned, but if several of the queued statements can be executed in parallel
    simultaneously, the `SQL_EXEC_ID` can show the same value for several entries.


    It is possible to control parallel statement queuing. Changing the value for parallel_servers_target
    affects when statements will be queued. A low value for parallel_servers_target
    can cause more statements to be queued, as the available parallel query resources
    have been reduced. Increasing this value can allow more statements to process
    before the queue is populated. Another way to control queuing is through hints.
    Parallel statement queuing can be bypassed for a statement, if the `NO_STATEMENT_QUEUING`
    hint is used. The hinted statement will bypass the statement queue, if the available
    resources are low enough to have caused it to be placed there and run immediately
    at the computed DOP. This is one case when the value for `parallel_servers_target`
    can be exceeded.'
