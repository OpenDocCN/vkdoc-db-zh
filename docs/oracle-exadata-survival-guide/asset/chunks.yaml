    \ this database will run, you will have to put a copy of the `init.ora` file you\
    \ just created, modifying the name to reflect the local instance `SID`. The next\
    \ step is to register the database with cluster services, using the `srvctl` utility.\
    \ The `db_unique_name`, the Oracle home, the instance name, and the `spfile` are\
