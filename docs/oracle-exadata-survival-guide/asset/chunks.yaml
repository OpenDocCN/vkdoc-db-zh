    \n使用 Oracle 11.2.0.3，可以通过执行切换（switchover）来测试新数据库而不影响备数据库配置。这暂时允许备数据库承担主数据库的角色，提供了一个测试配置并在最终迁移发生前对环境进行必要调整的机会。这还允许您切换回主数据库而无需重建数据库。\n\
    \n在切换日期，将需要故障转移（failover）到备用位置，将备用数据库转换为主数据库。这将是一个“单向”移动，因为源数据库将不再使用，并且不需要重建。\n\
    \n## 迁移后任务\n\n包、过程和视图可能因迁移而失效，因此需要重新编译这些对象并纠正可能出现的任何问题。最好在迁移之前生成源数据库中无效对象的列表。这将使您更容易知道何时成功从源数据库还原了所有有效的已迁移对象。以下脚本将生成该列表：\n\
    \n```\nselect owner, object_name, object_type, status\nfrom dba_objects\nwhere\
    \ status <> 'VALID';\n```\n\n将输出假脱机到文件以供稍后参考，并将该文件传输到 Exadata。在迁移后的数据库上再次运行相同的查询，并执行`$ORACLE_HOME/rdbms/admin/utlrp.sql`以重新编译数据库对象，纠正任何问题，直到最终的`INVALID`对象列表与从源数据库生成的列表匹配。\n\
    \n如果您使用物理备数据库将数据库迁移到 Exadata，则必须删除为建立备数据库所必需的`spfile`参数，并可能调整控制文件位置以引用多个副本。（通常，备数据库使用单个备用控制文件。）将现有控制文件复制到这些附加位置。\n\
    \n已弃用的`init.ora`参数也可能是个问题，因为源数据库可能是 11.2.0.3 之前的版本（Exadata 上的当前版本）。警报日志是查找此类参数的好地方，以便可以相应地处理它们。\n\
    \n尽管`BFILE`列将被复制，但它们指向的源文件不会被复制。这些文件将必须复制到 Exadata 系统，并且一旦数据库可以访问它们，`BFILE`定位器将必须根据新位置重新分配。\n\
    \n您可能会发现可能需要其他管理任务，例如调整 extent 大小、对大表进行分区或压缩表（例如存档表或存档分区）。这些任务也是迁移后列表的一部分。调整 extent\
    \ 大小和创建分区可能需要相当长的时间，特别是对于大型数据库。在规划数据库迁移到 Exadata 时，请考虑此类任务，以便最终用户能够意识到在实际物理迁移之后，数据库可用之前可能仍存在一些任务。\n\
    \n## 逻辑迁移选项\n\n逻辑迁移也是迁移至 Exadata 的一种选择。此类迁移将涉及导出和导入、复制或数据库链接。以下部分将介绍这些选项。\n\n\
    ### 导出和导入"
- fmt: '# Oracle数据库迁移至Exadata：逻辑迁移方法


    ## 导出与导入工具的选择


    可用的导出和导入工具取决于您迁移的Oracle版本。对于10.1之前的版本，可以使用传统的导出和导入实用程序（`exp` 和 `imp`）。这些工具在所有当前的Oracle版本中都提供，以保持向后兼容性。对于10.1及之后的版本，应使用较新的数据泵实用程序（`expdp`
    和 `impdp`）。


    采用导出-导入策略需要在Exadata系统上创建一个空数据库。这可以通过数据库配置助手（`DBCA`）来完成，该工具可以创建单实例和集群数据库。我们建议创建一个新的集群数据库，因为Exadata是为`RAC`构建的。我们不会详细介绍如何使用`DBCA`创建数据库，因为过程很直接，且图形用户界面（`GUI`）很直观。


    当使用 `exp` 和 `imp` 工具迁移较旧的数据库时，必须在导入任何表和数据之前，在新的Exadata数据库中创建用户账户。如果您能使用 `expdp`
    和 `impdp` 工具，则不需要此步骤，因为导出用户时会导出创建该用户的命令，这些命令将在导入过程中执行。


    旧版导出-导入工具的兼容性矩阵如 [表 12-1](#9781430260103_Ch12.xhtml#Tab1) 所示。


    **[表 12-1](#9781430260103_Ch12.xhtml#_Tab1)。`exp` 和 `imp` 工具的兼容性矩阵**


    | 目标版本 | 源版本 |

    | --- | --- |

    |  | &#124;  7 &#124; 8i &#124; 9i &#124; 10g &#124; 11g |

    | 7 | &#124;yes &#124; no &#124; no &#124; no  &#124; no |

    | 8i | &#124;yes &#124;yes &#124; no &#124; no  &#124; no |

    | 9i | &#124;yes &#124;yes &#124;yes &#124; no  &#124; no |

    | 10g | &#124;yes &#124;yes &#124;yes &#124; yes &#124; no |

    | 11g | &#124;yes &#124;yes &#124;yes &#124; yes &#124; yes |


    正如预期的那样，旧版本不具备向前兼容性，因此无法将8i数据库的导出文件导入到使用版本7的数据库中。但是，您始终可以使用最旧版本的 `exp` 和 `imp`
    工具，后续版本将能够读取和处理生成的转储文件。


    [表 12-2](#9781430260103_Ch12.xhtml#Tab2) 列出了 `expdp` 和 `impdp` 工具的兼容性矩阵。


    **[表 12-2](#9781430260103_Ch12.xhtml#_Tab2)。`expdp` 和 `impdp` 工具的兼容性矩阵**


    ![image](images/Table12-2.jpg)


    在规划使用导出和导入工具进行逻辑迁移时，请参考这些矩阵，以避免导出和导入过程中出现问题。


    ## 导出策略与注意事项


    如果您使用导出-导入策略，很可能只传输数据库数据和表的一个子集。建议按模式或用户导出，而不是按表名导出，因为导出特定用户会捕获该账户拥有的所有内部对象。正如本章前面讨论的，可能需要重新创建目录并将`BFILES`传输到Exadata系统，因为这些对象不会在导入时创建。对于目录，创建目录的`DDL`语句*会被捕获*。但该`DDL`中引用的位置在Exadata上将不存在，这些位置必须在导入完成后创建。如果您无法在Exadata上创建与源服务器相同的位置，则必须创建新位置，然后重新创建这些目录以指向新目录。


    对于给定的用户账户，可能存在跨模式依赖关系。如果是这种情况，某些对象（如视图和完整性约束）将无法编译并变为无效。`DBA_DEPENDENCIES`视图对于查找此类依赖关系非常有用，这样您就可以导出必要的用户，以保持迁移后模式中对象的有效性。可以通过以下查询生成被给定用户引用的对象的所有者列表：


    ```sql

    select distinct referenced_owner

    from dba_dependencies

    where owner = ''<user account>''

    and referenced_owner <> ''<user account>'';

    ```


    如果您更希望获得对象列表以减小导出文件的大小，可以使用以下查询：


    ```sql

    select referenced_owner, referenced_name, referenced_type

    from dba_dependencies

    where owner = ''<user account>''

    and referenced_owner <> ''<user account>'';

    ```


    这将生成对象名称、对象类型和所有者的列表，因此只有这些对象会包含在导出文件中。请记住，如果您只导出选定的对象列表，则必须在原始用户导出之后执行额外的导出操作，以将应用程序表和数据传输到Exadata。以下示例针对11.2.0.3数据库说明了这一概念：


    ```bash

    #

    # 导出应用程序用户

    #

    expdp directory=dbmig_dir schemas=$1 dumpfile="$1"_mig.dmp logfile="$1"_mig.log


    #

    # 导出不被应用程序用户拥有的依赖对象

    #

    expdp directory=dbmig.dir dumpfile="$1"_"$2".dmp logfile="$1"_"$2".log tables="$3"

    ```


    此示例接受三个参数：两个用户名和一个逗号分隔的表列表，并假定该表列表相当短。例如，如果只需要排除少量表，命令可以这样编写：


    ```bash

    expdp directory=dbmig.dir schemas=$2 dumpfile="$1"_"$2".dmp logfile="$1"_"$2".log
    exclude="$3"

    ```


    现在，表列表是一个排除列表，参数2中指定用户的所有表都将被导出，除了提供的列表中的表。转储文件应按相反顺序导入，即先导入依赖表所属的用户，再导入应用程序用户。这将允许导入过程为应用程序用户创建并验证约束和视图，而不会出错。


    ## 复制


    复制是将数据库逻辑迁移到Exadata的另一种方法，我们推荐使用`Streams`或`Golden Gate`进行此类迁移。由于`Golden Gate`内置了所有`Streams`功能，它是更健壮的工具。我们不会详细介绍`Golden
    Gate`迁移场景，但会提及这种迁移类型需要注意的几个方面。


    `Golden Gate`和`Streams`都对可复制到目标服务器的数据类型施加了限制。以下类型将不会被复制：


    ```text

    BFILE

    ROWID

    用户定义的类型（包括对象类型、REF、varrays和嵌套表）

    以关系形式或二进制XML存储的XMLType

    以下Oracle提供的类型：Any类型、URI类型、空间类型和媒体类型

    ```


    如果您的数据包含此类类型，使用物理迁移方法可能更好，这样无论何种数据类型都能被复制。如前所述，`BFILE`定位器引用的文件不会被复制，在源文件复制完成后，必须修改这些定位器。


    在Exadata系统上也必须重新创建目录。如果目录引用的位置发生变化，则必须替换目录条目。这在介绍物理迁移方法时已经提到，但我们认为它非常重要，值得在此重复强调。


    ## 使用数据库链接


    数据库链接可以在两个数据库之间传输数据，如果网络带宽充足，这种方式相当高效。您无法获得物理迁移的速度（数据库恢复可以相对快速地运行），但您不需要外部存储来存放传输的文件。


    我们建议使用以下两种方法之一通过数据库链接传输数据：


    ```sql

    INSERT

    COPY

    ```'
  raw: 'The export and import utilities that are available depend on the release of
    Oracle you are migrating from. For releases earlier than 10.1, the original export
    and import utilities exist (`exp` and `imp`). These utilities are provided in
    all current releases of Oracle for backwards compatibility. For 10.1 and later
    releases, the newer Data Pump utilities (`expdp` and `impdp`) should be used.


    Using an export-import strategy requires that an empty database be created on
    the Exadata system. This can be achieved by using the Database Configuration Assistant
    (DBCA), and this utility can create both single-instance and cluster databases.
    We recommend creating a new cluster database, because Exadata is built for RAC.
    We won’t go into detail on how to create a database with DBCA, as the process
    is straightforward, and the GUI is intuitive.


    When migrating older databases using the `exp` and `imp` utilities, it will be
    necessary to create the user account in the new Exadata database before importing
    any tables and data. If you’re able to use the `expdp` and `impdp` utilities,
    this won’t be necessary, as exporting a user exports the commands to create that
    user, commands that will be executed during the import process.


    The compatibility matrix for the older export-import utilities is shown in [Table
    12-1](#9781430260103_Ch12.xhtml#Tab1).


    [Table 12-1](#9781430260103_Ch12.xhtml#_Tab1). Compatibility Matrix for the exp
    and imp Utilities


    | Destination Release | Source Release |

    | --- | --- |

    |  | &#124;  7 &#124; 8i &#124; 9i &#124; 10g &#124; 11g |

    | 7 | &#124;yes &#124; no &#124; no &#124; no  &#124; no |

    | 8i | &#124;yes &#124;yes &#124; no &#124; no  &#124; no |

    | 9i | &#124;yes &#124;yes &#124;yes &#124; no  &#124; no |

    | 10g | &#124;yes &#124;yes &#124;yes &#124; yes &#124; no |

    | 11g | &#124;yes &#124;yes &#124;yes &#124; yes &#124; yes |


    As expected, the older releases are not forward-compatible, so an export from
    an 8i database cannot be imported into a database using release 7\. You can always
    use the `exp` and `imp` utilities from the oldest release, however, and later
    releases will be able to read and process the resulting dump file.


    [Table 12-2](#9781430260103_Ch12.xhtml#Tab2) lists the compatibility matrix for
    the `expdp` and `impdp` utilities.


    [Table 12-2](#9781430260103_Ch12.xhtml#_Tab2). Compatibility Matrix for the expdp
    and impdp Utilities


    ![image](images/Table12-2.jpg)


    Use these matrices when planning your logical migration, using the export and
    import utilities, to avoid issues during the export and import process.


    If you’re using the export-import strategy, it’s likely that you are transferring
    only a subset of the database data and tables. It is a good idea to export by
    schema or user, rather than by table name, because exporting a given user will
    capture all of the internal objects owned by that account. As we discussed previously
    in this chapter, it may be necessary to re-create directories and transfer BFILES
    to the Exadata system, as these objects won’t be created on import. In the case
    of directories, the DDL to create the directory *is* captured. It’s the location
    referenced in that DDL that won’t exist on Exadata, and those locations will have
    to be created after the import is complete. If you cannot create the same location
    on Exadata as there was on the source server, you will have to create new locations
    and then re-create those directories to point to the new directories.


    Cross-schema dependencies may exist for a given user account, and if that is the
    case, then some objects, such as views and integrity constraints, will fail to
    compile and will be invalid. The `DBA_DEPENDENCIES` view is useful for finding
    such dependencies, so you can export the necessary users to keep objects valid
    in the migrated schemas. A list of the user accounts having objects referenced
    by a given user can be generated with the following query:


    ```

    select distinct referenced_owner

    from dba_dependencies

    where owner = ''<user account>''

    and referenced_owner <> ''<user account>'';

    ```


    If you would rather have a list of the objects to reduce the size of the export,
    the following query can be used:


    ```

    select referenced_owner, referenced_name, referenced_type

    from dba_dependencies

    where owner = ''<user account>''

    and referenced_owner <> ''<user account>'';

    ```


    This will generate a list of the object name, object type, and owner, so only
    those objects will be in the export file. Remember that if you are only exporting
    a selected list of objects, you will have to perform an additional export after
    the original user export created, to transfer application tables and data to Exadata.
    The following example, for an 11.2.0.3 database, illustrates this concept:


    ```

    #

    # Export application user

    #

    expdp directory=dbmig_dir schemas=$1 dumpfile="$1"_mig.dmp logfile="$1"_mig.log


    #

    # Export dependent objects not owned by

    # application user

    #

    expdp directory=dbmig.dir dumpfile="$1"_"$2".dmp logfile="$1"_"$2".log tables="$3"

    ```


    This example takes three parameters, two user names, and a comma-delimited list
    of tables and presumes the list of tables is fairly short. If, for example, only
    a short list of tables is to be excluded, the command can be written as follows:


    ```

    expdp directory=dbmig.dir schemas=$2 dumpfile="$1"_"$2".dmp logfile="$1"_"$2".log
    exclude="$3"

    ```


    Now the table list is one of exclusion, and all tables for the user specified
    in parameter 2 will be exported, except those in the supplied list. The dumpfiles
    should be imported in reverse order, that is, for the user of the dependent tables,
    then for the application user. This will allow the import process to create and
    validate constraints and views for the application user without error.


    Replication


    Replication is another way to logically migrate a database to Exadata, and Streams
    or Golden Gate are the tools we would recommend for such a migration. Because
    Golden Gate has all of the Streams functionality built in, it is the more robust
    tool to use. We won’t go into detail on a Golden Gate migration scenario, but
    we will mention a few areas you should be aware of with this type of migration.


    Both Golden Gate and Streams impose limitations on the data types that will replicate
    to the destination server. The types that won’t replicate follow:


    ```

    BFILE


    ROWID


    User-defined types (including object types, REFs, varrays, and nested tables)


    XMLType stored object relationally or as binary XML


    The following Oracle-supplied types: Any types, URI types, spatial types, and
    media types

    ```


    If your data contains such types, it might be better to use a physical method
    of migration, so that all data types, regardless, will be replicated. As mentioned
    previously, the files referenced by BFILE locators won’t be copied, and it will
    be necessary to modify those locators once the source files have been copied.


    Directories will also have to be re-created on the Exadata system, and, if the
    locations the directories reference change, the directory entries will have to
    be replaced. This was mentioned previously with the physical migration methods,
    but we feel it’s important enough to repeat here.


    Using Database Links


    Database links can transfer data between two databases and, if the network bandwidth
    is sufficient, do so in a fairly efficient manner. You won’t get the speed of
    a physical migration (a database restore can run relatively quickly), but you
    won’t require external storage to house the files being transferred.


    We suggest using one of the following two methods to transfer data over a database
    link:


    ```

    INSERT

    COPY

    ```'
