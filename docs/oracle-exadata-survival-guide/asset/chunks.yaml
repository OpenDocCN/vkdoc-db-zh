    \ OPTIMIZER_ENV                                      RAW(2000)\n OPTIMIZER_ENV_HASH_VALUE\
    \                           NUMBER\n PARSING_USER_ID                         \
    \           NUMBER\n PARSING_SCHEMA_ID                                  NUMBER\n\
