    No benefit was realized from a storage index for the last query, because it didn’t
    execute a Smart Scan; the partitions are too small, individually, to trigger Smart
    Scan execution. Also, the first query computing the sum was not offloaded. This
    is proven by the fact that the query text is not listed among the SQL statements
    that were offloaded at one time or another, using another incarnation of the table
    and data.


    NULLs


    NULL searches are treated in a slightly different yet more efficient manner in
    Exadata. Unlike non-NULL table data, which is indexed by the minimum and maximum
    values for the listed column, the presence of NULLs is flagged by a bit for each
    column present in the storage index. Storage regions containing NULLs for the
    indexed columns have this bit set, which makes searching for NULLs a very fast
    operation, as Oracle only need search for segments where this NULL indicator bit
    shows that NULLs are present. Avoiding NULLs is also just as efficient, as Oracle
    only needs to read table segments where the NULL indicator bit is not set.


    Proving this is another example, utilizing the previous data-loading strategy,
    clustering the desired values together to get the most “bang for the buck” out
    of the storage index. NULL values were added to the mix, so that three values
    now exist for the SUITABLE_FOR_FRYING column. Timing has been enabled to show
    the elapsed time for each query execution, so the total time for each query can
    be noted, and the session-level statistics were reset by reconnecting between
    queries, so it’s easier to see how many bytes the storage index skipped for each
    search condition:


    ```

    SQL>

    SQL> connect bing/#########

    Connected.

    SQL>

    SQL> set timing on

    SQL>

    SQL> select /*+ parallel(4) */

      2  count(*)

      3  from chicken_hr_tab

      4  where suitable_for_frying = ''Yes'';


    COUNT(*)


    Elapsed: 00:00:00.80

    SQL>

