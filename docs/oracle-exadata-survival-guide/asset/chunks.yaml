    204.70199 DONE (FIRST N ROWS)

    ```


    An `ORDER BY` clause can cause this behavior, as it can up to double the read
    bytes processed by the query.


    ![image](images/Table10-1.jpg)


    Index access can also increase the value for `PHYSICAL_READ_BYTES` above the value
    of `IO_INTERCONNECT_BYTES`. This is the case for `SQL_ID 6m6y2y82sjpjx`, as the
    plan shows.


    ![image](images/Table10-2.jpg)


    Since the index access paths didn’t qualify for a Smart Scan, they increased the
    `PHYSICAL_READ_BYTES` without adding the same amount to `IO_INTERCONNECT_BYTES`.


    Another way to generate monitoring data with Oracle 11.2 is the `DBMS_SQLTUNE.REPORT_SQL_MONITOR`
    function.


    ```

    select dbms_sqltune.report_sql_monitor(session_id=>&sessid, report_level=>''ALL'',type=>''HTML'')
    from dual;

    ```


    The `TYPE` parameter can be either `TEXT` or `HTML`. We usually generate `HTML`
    reports, because they are easier to navigate and read in a web browser, as they
    preserve contextual (drill-down) information you can access with a right-click
    on the data item. Sample output for one of these `HTML` reports is shown in [Figures
    10-6a](#9781430260103_Ch10.xhtml#Fig6a), [10-6b](#9781430260103_Ch10.xhtml#Fig6b),
    and [10-6c](#9781430260103_Ch10.xhtml#Fig6c).


