    CHAPTER 5


    ![image](images/frontdot.jpg)


    Parallel Query


    Unlike other areas of Exadata, parallel query execution uses the same Oracle Release
    11.2 functionality as non-Exadata systems. Because Exadata is, at its heart, a
    data-warehousing system, and efficient handling and processing of data-warehouse
    workloads was a primary design goal, parallel query processing is an important
    feature. Remember that Smart Scans and offloading rely on direct-path reads, the
    same read functionality that is used by parallel query slaves. In Release 11.2,
    Oracle has provided three improvements to the earlier attempts at controlling
    parallel execution. These improvements, along with the processing power of Exadata,
    make this feature more manageable, more scalable, and less likely to saturate
    server resources, such as memory and CPU, than earlier releases of the database.
    The first of those improvements that we will discuss is parallel statement queuing.


    Getting into the Queue


    Parallel query has been available in Oracle releases since version 7, and, when
    used with care, can significantly improve statement performance. On the other
    hand, when overused, it can bring the database server to its knees. Multiple users,
    all choosing parallel execution, can saturate CPU resources to the point that
    the benefits of parallel query become the curse of parallel query. Until Release
    11.2, there was no way to control parallel execution by multiple users on the
    same system. That changed with parallel statement queuing. This was implemented
    because Exadata is a system designed to handle mixed workloads, allowing both
    data-warehouse and Online Transaction Processing applications to run and ensuring
    that neither suffers at the hands of the other. With parallel statement queuing,
    Exadata has a way to both separate the different types of workloads and also “rein
    in” parallel statements that otherwise would be too resource-intensive for a multiuser
    system.


    Old School


    To give some perspective on how parallel statement queuing has improved parallel
    query performance, it is necessary to examine the tool Oracle provided to manage
    this feature in earlier releases. The parallel_adaptive_multi_user parameter is
    quite a powerful tool, but it can create varying performance by deciding, at runtime,
    whether to parallelize a statement or not. It also determines how many slaves
    should be employed for a parallelized query. With this mechanism, the parallelism
    can go down dramatically, depending on the system resources in use at the moment
    the decision is made, which is the time the execution starts.


    Statements can go from having 16 or more parallel slaves for one execution to
    having absolutely none the next time the same statement is executed. Remember
    that once the degree of parallelism (DOP) is set, it cannot be altered; the statement
    must run to completion at the assigned DOP, which may be one. The statement also
    cannot benefit from resources freed during its execution; if ten parallel query
    slaves become available during the serial execution of that statement, they cannot
    be repurposed to provide a higher DOP and, as a result, a shorter execution time.


    As an example, you have a statement that was assigned 24 parallel query slaves
    the last time it was run, with a resulting execution time of 1 minute. A short
    spike in activity occurs at the time this statement starts its next execution,
    downgrading it to a serial operation. Several seconds later, this spike is over;
    the statement is stuck, executing serially for possibly 24 minutes or longer.
    With no apparent rhyme or reason for this seemingly erratic behavior (from the
    user’s perspective), such inconsistent performance can make for unhappy users
    and very confused, unhappy developers.


    The New Method


    Parallel adaptive multi user was a good start at controlling parallel execution,
    based on available resources, but version 11.2 introduces parallel statement queuing
    to the mix, allowing parallel execution to be placed on hold, until sufficient
    resources become available.


    ![image](images/sq.jpg) **Note**  It is best to set `parallel_adaptive_multi_user`
    to `FALSE` to prevent these two features from conflicting with each other. When
    both are enabled, we have seen parallel queries take much longer to execute.


    How it works is simple, really. Enable the feature by setting `parallel_degree_policy`
    to `AUTO`. Next, set `parallel_servers_target` to the number of parallel slaves
    you want. The easy part is that you run your queries; Oracle takes care of the
    rest for you. In basic terms, a statement will be queued if it will require more
    parallel slaves than there are currently available. Once the required number of
    slaves are freed, the statement executes.


    The V$SQL_MONITOR and GV$SQL_MONITOR views report on the execute status of submitted
    statements; basically, these views report that a statement is DONE (in some form),
    EXECUTING, or, if parallel statement queuing is enabled, QUEUED. Given that information,
    it isn’t difficult to see which statements are waiting in the parallel statement
    queue. The standard EMP table from the demobld.sql script was used, although it
    was loaded with a very large number of records:


    ```

    SQL> select count(*)

      2  from emp;


    COUNT(*)


    SQL>

    ```


    We chose to select the average salary from our large version of the EMP table
    from 12 different sessions. We then queried V$SQL_MONITOR to see how many of those
    sessions ended up in the queue. The query produced the following output:


    ```

    SQL> select sid, sql_id, sql_exec_id, sql_text

      2  from v$sql_monitot monitor

      3  where status = ''QUEUED''

      4  order by 3;


    SID SQL_ID        SQL_EXEC_ID SQL_TEXT

    ---------- ------------- ----------- ------------------------------------

          1532 5du23va3p3ad0    16777216 select avg(sal) from emp

          1059 5du23va3p3ad0    16777217 select avg(sal) from emp

          1628 5du23va3p3ad0    16777218 select avg(sal) from emp

           865 5du23va3p3ad0    16777219 select avg(sal) from emp

           205 5du23va3p3ad0    16777220 select avg(sal) from emp

          2199 5du23va3p3ad0    16777221 select avg(sal) from emp

          1542 5du23va3p3ad0    16777222 select avg(sal) from emp

           159 5du23va3p3ad0    16777223 select avg(sal) from emp

          1888 5du23va3p3ad0    16777224 select avg(sal) from emp

          1234 5du23va3p3ad0    16777225 select avg(sal) from emp

           705 5du23va3p3ad0    16777226 select avg(sal) from emp


    11 rows selected.


    SQL>

    ```


    The sql_exec_id is, basically, a run number indicating the statement’s position
    in the queue. It is also possible for the sql_exec_id to be the same for all queued
    statements (indicating simultaneous execution), if the sum of the parallel resources
    required for execution doesn’t exceed the maximum available for the database.


    Control Issues


    There may be times when you want to have some control over parallel statement
    queuing behavior. If you simply turn it on and let it run, it’s a first-in, first-out
    (FIFO) queue. It’s possible to bypass the queue using a hint. It’s also possible
    to use parallel statement queuing, even if the feature isn’t enabled at the database
    level.


    Two parameters are available that can affect parallel statement queuing, and the
    foremost of those is parallel_servers_target. The value for this parameter sets
    the number of parallel server processes Oracle can run before placing statements
    in the queue. There is a formula for computing the default value, as follows:


    ```

    ((4*cpu_count)*parallel_threads_per_cpu)*active number of instances

    ```


    Given an Exadata X3-2 with the following settings:


    cpu_count                                              24


    parallel_threads_per_cpu                        4


    and two active instances, the default setting would be computed as follows:


    ((4*24)*4)*2 = 768'
  trans: "\n# 第 5 章\n\n## 并行查询\n\n![image](img/frontdot.jpg)\n\n与 Exadata 的其他领域不同，并行查询执行使用的是与非\
    \ Exadata 系统相同的 Oracle 11.2 版本功能。由于 Exadata 本质上是一个数据仓库系统，高效处理和加工数据仓库工作负载是其主要设计目标之一，并行查询处理因此成为一项重要特性。请记住，**智能扫描**和**下载处理**依赖于直接路径读取，这与并行查询从属进程使用的读取功能相同。在\
    \ 11.2 版本中，Oracle 对早期控制并行执行的尝试提供了三项改进。这些改进，结合 Exadata 的处理能力，使得此特性比早期数据库版本更易于管理、更具可扩展性，并且更不容易使服务器资源（如内存和\
    \ CPU）达到饱和。我们将讨论的第一项改进是并行语句排队。\n\n### 进入队列\n\n并行查询自 Oracle 第 7 版起就已可用，若谨慎使用，可显著提升语句性能。另一方面，若过度使用，它可能会让数据库服务器不堪重负。多个用户若都选择并行执行，会使\
    \ CPU 资源达到饱和，并行查询的优势便会成为并行查询的诅咒。直到 11.2 版本之前，都没有办法在同一系统上控制多用户的并行执行。随着并行语句排队的引入，这一状况得以改变。之所以实现这一功能，是因为\
    \ Exadata 是一个为处理混合工作负载而设计的系统，允许数据仓库和在线事务处理应用程序同时运行，并确保两者不会因对方而受损。通过并行语句排队，Exadata\
    \ 能够区分不同类型的工作负载，并且“约束”那些在多用户系统中原本会消耗过多资源的并行语句。\n\n### 传统方式\n\n为了说明并行语句排队如何改进了并行查询性能，有必要审视\
    \ Oracle 在早期版本中提供的用于管理此功能的工具。`parallel_adaptive_multi_user` 参数是一个相当强大的工具，但它会在运行时决定是否对语句进行并行化，从而导致性能波动。它还决定应为并行化查询启用多少个从属进程。在这种机制下，并行度可能会急剧下降，这取决于做出决定（即执行开始时）那一刻的系统资源使用情况。\n\
    \n一个语句上次执行时可能拥有 16 个或更多并行从属进程，而下次执行时可能一个都没有。请记住，一旦确定了并行度 (`DOP`)，它就无法更改；语句必须在分配的\
    \ `DOP`（可能为 1）下运行至完成。该语句也无法利用其执行期间释放的资源；如果在该语句串行执行期间有十个并行查询从属进程变为可用，它们也无法被重新利用以提供更高的\
    \ `DOP`，从而无法缩短执行时间。\n\n举个例子，假设你有一个语句，上次运行时被分配了 24 个并行查询从属进程，执行时间为 1 分钟。当下一次执行此语句时，活动出现短暂峰值，将其降级为串行操作。几秒钟后，峰值结束；该语句却卡住了，可能串行执行\
    \ 24 分钟或更长时间。从用户的角度看，这种看似不稳定的行为似乎毫无规律或原因，如此不一致的性能会导致用户不满，也会让开发者非常困惑和不快。\n\n###\
    \ 新方法\n\n并行自适应多用户是基于可用资源控制并行执行的一个良好开端，但 11.2 版本引入了并行语句排队，允许在资源不足时将并行执行挂起，直到有足够资源可用。\n\
    \n![image](img/sq.jpg) **注意** 最好将 `parallel_adaptive_multi_user` 设置为 `FALSE`，以防止这两个功能相互冲突。当两者都启用时，我们观察到并行查询的执行时间会大大延长。\n\
    \n其工作原理其实很简单。通过将 `parallel_degree_policy` 设置为 `AUTO` 来启用此功能。接着，将 `parallel_servers_target`\
    \ 设置为你想要的并行从属进程数。简单之处在于，你只需运行查询；Oracle 会为你处理剩下的事。基本上，如果一个语句所需的并行从属进程数超过当前可用数量，它将被放入队列。一旦所需数量的从属进程被释放，该语句就会执行。\n\
    \n`V$SQL_MONITOR` 和 `GV$SQL_MONITOR` 视图报告已提交语句的执行状态；这些视图主要报告语句是 `DONE`（以某种形式）、`EXECUTING`，或者如果启用了并行语句排队，则是\
    \ `QUEUED`。有了这些信息，不难看出哪些语句在并行语句队列中等待。我们使用了来自 `demobld.sql` 脚本的标准 `EMP` 表，尽管它加载了非常大量的记录：\n\
    \n```\nSQL> select count(*)\n  2  from emp;\n\nCOUNT(*)\n\nSQL>\n```\n\n我们选择从\
    \ 12 个不同的会话中，对我们这个大型 `EMP` 表求平均薪资。然后，我们查询 `V$SQL_MONITOR`，以查看这些会话中有多少最终进入了队列。该查询产生以下输出：\n\
    \n```\nSQL> select sid, sql_id, sql_exec_id, sql_text\n  2  from v$sql_monitor\
    \ monitor\n  3  where status = 'QUEUED'\n  4  order by 3;\n\nSID SQL_ID      \
    \  SQL_EXEC_ID SQL_TEXT\n---------- ------------- ----------- ------------------------------------\n\
    \      1532 5du23va3p3ad0    16777216 select avg(sal) from emp\n      1059 5du23va3p3ad0\
    \    16777217 select avg(sal) from emp\n      1628 5du23va3p3ad0    16777218 select\
    \ avg(sal) from emp\n       865 5du23va3p3ad0    16777219 select avg(sal) from\
    \ emp\n       205 5du23va3p3ad0    16777220 select avg(sal) from emp\n      2199\
    \ 5du23va3p3ad0    16777221 select avg(sal) from emp\n      1542 5du23va3p3ad0\
    \    16777222 select avg(sal) from emp\n       159 5du23va3p3ad0    16777223 select\
    \ avg(sal) from emp\n      1888 5du23va3p3ad0    16777224 select avg(sal) from\
    \ emp\n      1234 5du23va3p3ad0    16777225 select avg(sal) from emp\n       705\
    \ 5du23va3p3ad0    16777226 select avg(sal) from emp\n\n11 rows selected.\n\n\
    SQL>\n```\n\n`sql_exec_id` 基本上是一个运行编号，指示语句在队列中的位置。对于所有排队语句，`sql_exec_id` 也可能相同（表示同时执行），前提是执行所需的并行资源总和不超过数据库可用的最大值。\n\
    \n### 控制问题\n\n有时你可能希望对并行语句排队的行为进行一些控制。如果你只是将其打开并让它运行，它是一个先进先出 (`FIFO`) 队列。可以使用提示\
    \ (`hint`) 绕过队列。即使数据库级别未启用该功能，也仍然可以使用并行语句排队。\n\n有两个可用参数可以影响并行语句排队，其中最重要的是 `parallel_servers_target`。此参数的值设置了\
    \ Oracle 在将语句放入队列之前可以运行的并行服务器进程数。计算默认值的公式如下：\n\n```\n((4*cpu_count)*parallel_threads_per_cpu)*活动实例数\n\
    ```\n\n给定一台 Exadata X3-2，其设置如下：\n\n`cpu_count` 24\n\n`parallel_threads_per_cpu`\
    \ 4\n\n以及两个活动实例，默认设置将计算如下：\n\n```\n((4*24)*4)*2 = 768\n```\n"
- fmt: '# Oracle 并行查询执行：参数与自动并行度（Auto DOP）


    This is a value that is much higher than you’d ever want to set; the calculation,
    as written, will compute a value intended to utilize all of the available resources
    for parallel query processes. Also, a setting that high would seriously impact
    OLTP transactions, as they could possibly starve, should a long-running, resource-intensive
    parallel query commandeer the available CPU and memory.


    Like `pga_aggregate_target`, this parameter sets a target value, not a limit.
    There can be more parallel server processes running than the parameter initially
    configures. This can occur because the number of parallel slaves assigned to a
    statement may be up to twice the DOP setting. As an example, a system has `parallel_servers_target`
    set to 4 and Auto DOP set a degree of parallelism of 4. The statement could have
    up to 8 parallel query processes attached to it, which is greater than the target
    setting. Parallel query processes are assigned, in part, based on available resources,
    so occasionally, exceeding the `parallel_servers_target` setting isn’t a problem.
    The statement may end up in the parallel statement queue, but it won’t fail to
    run, because it’s using more parallel query slaves than `parallel_servers_target`
    would lead you to believe are allowed.


    The second parameter to affect parallel statement queuing is a hidden parameter,
    `_parallel_statement_queuing`. The values for this parameter are `TRUE` and `FALSE`,
    with `TRUE` being the default setting when `parallel_degree_policy` is set to
    `AUTO`. It can be set independently of `parallel_degree_policy`, to enable and
    disable this feature.


    Even when parallel statement queuing is active it’s possible to bypass the queue
    entirely, with a hint. The `NO_STATEMENT_QUEUING` hint allows you to immediately
    execute parallel queries that otherwise would have been placed into the queue.
    Checking the queue for them is fruitless, as they do not appear with a status
    of “QUEUED.” Querying `V$SQL`/`GV$SQL` joined to `V$SESSION`/`GV$SESSION` will
    reveal that they are, indeed, running. Not only do they jump the queue, they also
    can spawn parallel query slaves in excess of the setting for `parallel_servers_target`.


    If you don’t have parallel statement queuing enabled, you can still use it with
    another hint: `STATEMENT_QUEUING`. This will queue statements, should parallel
    resources be scarce at the time the statement starts execution.


    ## Necessary Settings


    In addition to parallel statement queuing (which we just covered), Oracle has
    provided automatic degree of parallelism (Auto DOP) and in-memory parallel execution.
    All three are enabled when `parallel_degree_policy` is set to `AUTO`. Auto DOP
    allows the database to calculate the degree of parallelism on a query-by-query
    basis; we will discuss this in more detail in a separate section. This is the
    one improvement that requires a bit of effort to get working, as Oracle won’t
    activate this feature, if the I/O system has not been calibrated.


    We will discuss I/O calibration in more detail later on in this chapter. For now,
    you should know that it’s not a task to be executed during business hours.


    I/O calibration is just one part of parallel query processing configuration; several
    database initialization parameters control some aspect of parallel query execution.
    These parameters, their settings, and which features or aspects of parallel query
    execution they affect are listed in Table 5-1.


    **Table 5-1.** Parameters Affecting Parallel Query Execution


    | Name | Default | Description |

    | --- | --- | --- |

    | `parallel_adaptive_multi_user` | `TRUE` | Enable adaptive setting of degree
    for multiple-user streams. |

    | `parallel_automatic_tuning` | `FALSE` | Enable intelligent defaults for parallel
    execution parameters. |

    | `parallel_degree_limit` | `CPU` | Limit placed on degree of parallelism. Values
    range from CPU, I/O, and an integer value of 2 or greater. |

    | `parallel_degree_policy` | `MANUAL` | Policy used to compute the degree of parallelism
    (MANUAL/LIMITED/AUTO). |

    | `parallel_execution_message_size` | `16384` | Message buffer size for parallel
    execution. |

    | `parallel_force_local` | `FALSE` | Force single-instance execution. |

    | `parallel_instance_group` |  | Instance group to use for all parallel operations.
    Can restrict parallel operations to a subset of the RAC instances available. |

    | `parallel_io_cap_enabled` | `FALSE` | Enable capping of DOP by I/O bandwidth.
    |

    | `parallel_max_servers` | `240` | Maximum parallel query servers per instance.
    |

    | `parallel_min_percent` | `0` | Minimum percent of threads required for parallel
    query. |

    | `parallel_min_servers` |  | Minimum parallel query servers per instance. |

    | `parallel_min_time_threshold` | `AUTO` | Threshold above which a plan is a candidate
    for parallelization (in seconds). Can also be set to a numeric value, including
    0. |

    | `parallel_servers_target` | `240` | Instance target in terms of number of parallel
    servers. |

    | `parallel_threads_per_cpu` | `2` | Number of parallel execution threads per
    CPU. Used in various parallel query computations. |


    Parallel statement queuing and in-memory parallel execution rely on the `parallel_servers_target`
    and the `parallel_min_time_threshold` parameter settings. We have discussed parallel
    statement queuing at the beginning of this chapter; in-memory parallel execution
    will be discussed in its own section.


    ## My Friend Auto


    Auto DOP is a change in parallel operations introduced in Oracle Release 11.2.
    In prior releases of the database, parallel operations relied on hints at the
    query level or on the `DEGREE` and `INSTANCES` settings for the object in use.
    It is an unfortunate reality that a single DOP setting is rarely appropriate for
    all queries, at all times, for a given object. Arriving at usable values for the
    DOP that makes the query execution more efficient than serial execution and doesn’t
    adversely impact other queries and statements is a time-consuming trial-and-error
    process. It requires the development team to understand the platform in use and
    the workload that the system will be experiencing when the statement is executed.
    Another issue with the DOP: it cannot change during statement execution. Auto
    DOP was designed to overcome such problems, and it’s done its job admirably.


    ## Calibrate Me


    Auto DOP, when enabled and activated, causes Oracle to evaluate each statement,
    to determine if it should run in parallel. The DOP is set once this decision has
    been made.


    ![image](images/sq.jpg) **Note** It is important to note that simply enabling
    Auto DOP doesn’t get it working; it needs to be activated by running an I/O calibration
    in each database where you want Auto DOP available.


    The optimizer evaluates serial execution time and, in general, if that estimated
    time exceeds the setting for `parallel_min_time_threshold`, the statement will
    be executed in parallel. By default, this parameter is set to `AUTO`, providing
    a threshold value of 10 seconds. This parameter can be altered at the system level
    or at the session level, to implement a lower or higher parallel triggering threshold.'
