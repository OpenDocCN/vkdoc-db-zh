    DONE (ALL ROWS)

       1   869  484955222 6136552  5940097   127      147456     106496 72.222222
    DONE (ALL ROWS)

    ```


    Much of the output for statements from these two sessions was offloaded, but there
    was some output that wasn’t, possibly because it needed traditional consistent-read
    processing at the database level. It’s also possible to get percentages higher
    than 100.


    ```

