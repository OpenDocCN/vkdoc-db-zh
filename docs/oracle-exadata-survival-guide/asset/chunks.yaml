    \ 1 中的 `CU` 头和 `CU` 位图行之后，列 1 数据从块的第三行开始。\n\n如前所述，如果列无法完全放入单个块中，则会链接到压缩单元中的下一个块。此策略会持续进行，直到所有列都存储完毕。因为相似的数据存储在一起，与基本压缩或\
    \ OLTP 压缩相比，HCC 可以提供极高的压缩比。此外，以这种方式创建压缩单元可以防止单行被拆分到多个 `CU` 中，因此可以从单个 `CU` 中读取整行。\n\
    \n### 性能影响\n\n根据您是插入、更新还是查询数据，压缩表的性能可能不如预期。查询数据通常是一个快速的操作。除了 OLTP 压缩外，插入操作都需要并行或直接路径加载插入，以便新插入的行被压缩。更新操作耗时更长，因为数据在更新前必须被解压缩。在决定使用压缩之前，请仔细分析表的使用方式；频繁更新的表更适合使用\
    \ OLTP 压缩，而不是 HCC 压缩类型。请记住，工程通常被描述为进行权衡的艺术。鱼与熊掌不可兼得。\n\n### 加载数据的影响\n\n向压缩表中加载数据，除了\
    \ OLTP 压缩这个唯一的例外，都需要并行或直接路径插入。当然，向压缩表中加载数据可能比对未压缩表进行相同的过程花费更长时间。我们使用各种压缩方法创建了空表，并从我们在前面示例中填充的\
    \ `EMP` 表中加载数据。这些加载的结果以及所需时间如下例所示：\n```\nSQL>\nSQL> --\nSQL> -- Build compressed\
