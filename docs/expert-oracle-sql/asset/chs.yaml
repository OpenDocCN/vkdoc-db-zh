- "# SQL 聚合函数详解\n\n## 聚合行为基础\n\n以下是创建测试表`T1`并执行一系列查询的 SQL 代码：\n```sql\nCREATE TABLE\
  \ t1\nAS\n       SELECT DATE '2013-12-31' + ROWNUM transaction_date\n          \
  \   ,MOD (ROWNUM, 4) + 1 channel_id\n             ,MOD (ROWNUM, 5) + 1 cust_id\n\
  \             ,DECODE (ROWNUM\n                     ,1, 4\n                    \
  \ ,ROWNUM * ROWNUM + DECODE (MOD (ROWNUM, 7), 3, 3000, 0))\n                 sales_amount\n\
  \         FROM DUAL\n   CONNECT BY LEVEL <= 100;\n\n-- 下一个查询中不包含聚合操作\n\nSELECT *\
  \ FROM t1;\n\n-- 下一个查询中精确返回一行\n\nSELECT COUNT (*) cnt FROM t1;\n\n-- 下一个查询中返回 0\
  \ 行或多行\n\nSELECT channel_id\n    FROM t1\nGROUP BY channel_id;\n\n-- 下一个查询中最多返回一行\n\
  \nSELECT 1 non_empty_flag\n  FROM t1\nHAVING COUNT (*) > 0;\n\n-- 下一个查询中返回 0 行或多行\n\
  \nSELECT channel_id, COUNT (*) cnt\n    FROM t1\nGROUP BY channel_id\n  HAVING COUNT\
  \ (*) < 2;\n```\n\n清单 7-1 创建了表`T1`并随后执行了数个查询。\n\n-   清单 7-1 中的第一个查询不包含聚合函数和`GROUP\
  \ BY`子句，因此不会发生聚合。\n-   第二个查询包含了`COUNT(*)`聚合函数。由于未指定`GROUP BY`子句，整个表被聚合并精确返回一行。需要说明的是，如果`T1`为空，该查询仍将返回一行，且`CNT`的值为\
  \ 0。\n-   第三个查询包含了一个`GROUP BY`子句，因此即使语句中没有出现聚合函数，聚合操作仍然会发生。`GROUP BY`运算符会为`GROUP\
  \ BY`子句中指定的表达式的每一个不同值返回一行。因此在这种情况下，会为`CHANNEL_ID`的每一个不同值返回一行，当表为空时则不返回行。\n-   清单\
  \ 7-1 中的第四个查询表明，触发聚合并不需要将聚合函数放在选择列表中。`HAVING`子句在聚合**之后**应用过滤条件，这与在聚合**之前**过滤的`WHERE`子句不同。因此，在这种情况下，如果`T1`为空，`COUNT(*)`的值将为\
  \ 0，查询将返回 0 行。如果表中有行，查询将返回一行。\n-   当然，聚合最常见的用法是`GROUP BY`子句与聚合函数结合使用。清单 7-1 中最后一个查询的`GROUP\
  \ BY`子句确保只返回在`T1`中至少出现过一次的`CHANNEL_ID`值，因此`CNT`的值不可能为 0。`HAVING`子句会移除所有`COUNT(*)\
  \ >= 2`的行，所以如果这个最终查询返回任何行，在所有情况下`CNT`的值都将为 1！\n\n## 排序聚合函数\n\n许多聚合函数需要排序才能有效运行。清单\
  \ 7-2 展示了如何使用`MEDIAN`聚合函数。\n\n清单 7-2. 使用排序聚合函数\n```sql\n SELECT channel_id, MEDIAN\
  \ (sales_amount) med, COUNT (*) cnt\n    FROM t1\nGROUP BY channel_id;\n```\n\n\
  ```\n| Id  | Operation          |\n\n|   0 | SELECT STATEMENT   |\n|   1 |  SORT\
  \ GROUP BY     |\n|   2 |   TABLE ACCESS FULL|\n```\n\n![image](img/sq.jpg) `Note`\
  \ 奇数个数字的中位数是排序后列表中的中间那个数。对于偶数个数值，它是两个中间数字的平均值（均值）。因此，2, 4, 6, 8, 100, 102 的中位数是\
  \ 7（6 和 8 的平均值）。\n\n从清单 7-2 开始，我将使用`DBMS_XPLAN.DISPLAY`生成的格式展示 SQL 语句的执行计划，而不使用`EXPLAIN\
  \ PLAN`语句，也不展示对`DBMS_XPLAN.DISPLAY`函数的显式调用。此外，我将只展示执行计划的相关部分。这些措施纯粹是为了节省空间。可下载的材料并未以这种方式缩写。\n\
  \n清单 7-2 将我们在清单 7-1 中创建的表`T1`的 100 行数据进行聚合，返回四行，每行对应一个不同的`CHANNEL_ID`值。这些行中的`MED`值代表每个组内\
  \ 25 行数据的中位数。该语句的基本执行计划也显示在清单 7-2 中，操作 1 就是用于实现此目的的排序。\n\n![image](img/sq.jpg) `Note`\
  \ 说实话，清单 7-2 中实际上执行了六次排序！第一次是按`C1`排序以创建四个组。然后，每个组按照`MEDIAN`函数的要求按`SALES_AMOUNT`排序。如果你在清单\
  \ 7-2 查询前后检查“*sorts (rows)*”统计信息，你会发现它增加了 200，是表中行数的两倍；每一行被排序了两次。并且如果使用了多个具有不同排序顺序的聚合函数，那么每个组可能会被排序多次。\n\
  \n可用于检查该统计信息的代码是：\n```sql\nSELECT VALUE FROM v$mystat NATURAL JOIN v$statname WHERE\
  \ name = 'sorts (rows)';\n```\n\n### 非排序聚合函数\n\n并非所有聚合函数都需要排序。我使用术语“*非排序聚合函数*”（NSAF）来指代不需要排序的聚合函数。NSAF\
  \ 的一个例子是`COUNT`。`COUNT`不需要排序：随着每一行的处理，`COUNT`只是简单地增加一个运行中的计数。其他 NSAF，如`SUM`、`AVG`和`STDDEV`，也是通过维护一种或另一种形式的运行计数来实现的。\n\
  \n当查询块中同时出现 NSAF 和`GROUP BY`子句时，NSAF 需要为每个组维护运行计数。Oracle 数据库 10g 引入了一项称为*哈希聚合*的功能，它允许\
  \ NSAF 通过在哈希表中查找来找到每个组的计数，而不是从排序列表中查找。让我们看一下清单 7-3，它展示了该功能的实际应用。\n\n清单 7-3. 针对 NSAF\
  \ 的哈希聚合\n```sql\n SELECT channel_id\n        ,AVG (sales_amount)\n        ,SUM (sales_amount)\n\
  \        ,STDDEV (sales_amount)\n        ,COUNT (*)\n    FROM t1\nGROUP BY channel_id;\n\
  ```\n\n```\n| Id  | Operation          | Name |\n\n|   0 | SELECT STATEMENT   |\
  \      |\n|   1 |  HASH GROUP BY     |      |\n|   2 |   TABLE ACCESS FULL| T1 \
  \  |\n```\n\n哈希聚合要求查询块中使用*所有*聚合函数都是 NSAF；清单 7-3 中的所有函数都是 NSAF，因此使用了操作`HASH GROUP\
  \ BY`来避免任何排序。\n\n![image](img/sq.jpg) `Note` 并非所有 NSAF 都能利用哈希聚合。不能利用的包括`COLLECT`、`FIRST`、`LAST`、`RANK`、`SYS_XMLAGG`和`XMLAGG`。这些函数在使用`GROUP\
  \ BY`子句时使用`SORT GROUP BY`操作，在未指定`GROUP BY`子句时使用非排序的`SORT AGGREGATE`操作。此限制可能是由于聚合值的可变大小造成的。\n\
  \n仅仅因为 CBO 可以使用哈希聚合，并不意味着它一定会使用。当被分组的数据已经排序或无论如何都需要排序时，将不会使用哈希聚合。清单 7-4 提供了两个例子。\n\
  \n清单 7-4. 针对 NSAF 的 SORT GROUP BY\n```sql\n SELECT channel_id, AVG (sales_amount)\
  \ mean\n    FROM t1\n   WHERE channel_id IS NOT NULL\nGROUP BY channel_id\nORDER\
  \ BY channel_id;\n\nCREATE INDEX t1_i1\n   ON t1 (channel_id);\n\nSELECT channel_id,\
  \ AVG (sales_amount) mean\n    FROM t1\n   WHERE channel_id IS NOT NULL\nGROUP BY\
  \ channel_id;\n\nDROP INDEX t1_i1;\n```\n\n```\n| Id  | Operation          | Name\
  \ |\n\n|   0 | SELECT STATEMENT   |      |\n|   1 |  SORT GROUP BY     |      |\n\
  |*  2 |   TABLE ACCESS FULL| T1   |\n\n| Id  | Operation                    | Name\
  \  |\n```\n\n\n| Id | Operation | Name |\n|---|---|--- |\n| 0 | `SELECT STATEMENT`\
  \ | |\n| 1 | `SORT GROUP BY NOSORT` | |\n| 2 | `TABLE ACCESS BY INDEX ROWID` | `T1`\
  \ |\n| *3 | `INDEX FULL SCAN` | `T1_I1` |\n\n`清单 7-4` 中的第一个查询包含一个 `ORDER BY` 子句。在这种情况下，排序无法避免，因此哈希聚合没有任何优势。\n\
  \n> **注意**：你可能会认为，先执行哈希聚合，再对聚合后的行进行排序会更高效。毕竟，如果你有 1,000,000 行数据和 10 个分组，难道对聚合后的\
  \ 10 行进行排序不比对 1,000,000 条未聚合的行排序更好吗？实际上，在这种情况下，排序工作区中只会保留 10 行数据；非全聚合函数（NSAF）会像哈希聚合一样，为每个分组维护其运行时的累计值。\n\
  \n在执行 `清单 7-4` 中的第二个查询之前，我们在 `CHANNEL_ID` 上创建了一个索引。该索引会以排序后的顺序返回数据，因此我们既不需要显式排序，也不需要哈希表，聚合是按分组依次处理的。请注意，此时操作\
  \ 1 的名称现在是自相矛盾的：`SORT GROUP BY NOSORT`。显然，没有发生排序操作。\n\n## 分析函数\n\n既然我们已经完全理解了什么是聚合函数以及它们是如何处理的，现在可以转向更复杂的概念——分析函数。分析函数有潜力使\
  \ SQL 语句易于阅读且性能良好。但如果使用不当，它们也可能使 SQL 语句难以理解且运行缓慢。\n\n### 分析的概念\n\n我们说过，聚合函数会丢弃被聚合的原始行。如果这不是我们想要的结果，会发生什么？还记得\
  \ `清单 3-1` 吗？那个查询列出了 `SCOTT.EMP` 表中的每一行，以及关于该员工所在部门的聚合数据。我们使用子查询来实现这一点。`清单 7-5`\
  \ 是使用 `清单 7-1` 中的表 `T1` 和 `COUNT` 函数的另一个相同技术的示例。\n\n**`清单 7-5`**：使用子查询实现分析功能\n\n\
  ```sql\nSELECT outer.*\n      , (SELECT COUNT (*)\n           FROM t1 inner\n  \
  \        WHERE inner.channel_id = outer.channel_id)\n          cnt\n  FROM t1 outer;\n\
  \n| Id | Operation | Name |\n|---|---|--- |\n| 0 | `SELECT STATEMENT` | |\n| 1 |\
  \ `SORT GROUP BY` | |\n| *2 | `TABLE ACCESS FULL` | `T1` |\n| 3 | `TABLE ACCESS\
  \ FULL` | `T1` |\n```\n\n`清单 7-5` 中的查询列出了 `T1` 表中的 100 行，并附加了一个额外的列，其中包含对应 `CHANNEL_ID`\
  \ 值的匹配行数。该查询的执行计划似乎表明我们将对 `T1` 表中的 100 行中的每一行执行一次子查询。然而，与 `清单 3-1` 一样，标量子查询缓存意味着我们只执行四次子查询，每个\
  \ `CHANNEL_ID` 的不同值执行一次。尽管如此，当我们将主查询中的操作 3 加入计算时，在整个查询过程中仍然会对 `T1` 执行五次全表扫描。\n\n\
  子查询也可以用来表示排序。`清单 7-6` 展示了如何为排序列表添加行号和排名。\n\n**`清单 7-6`**：使用 `ROWNUM` 和子查询对输出进行编号\n\
  \n```sql\nWITH q1\n     AS (  SELECT *\n             FROM t1\n         ORDER BY\
  \ transaction_date)\n  SELECT ROWNUM rn\n        , (SELECT COUNT (*)+1\n       \
  \      FROM q1 inner\n            WHERE inner.sales_amount < outer.sales_amount)\n\
  \            rank_sales, outer.*\n    FROM q1 outer\nORDER BY sales_amount;\n\n\
  -- 输出的前几行\nRN RANK_SALES TRANSACTI CHANNEL_ID CUST_ID SALES_AMOUNT\n---------- ----------\
  \ --------- ---------- ---------- ------------\n         1          1 01-JAN-14\
  \          2          2            4\n         2          1 02-JAN-14          3\
  \          3            4\n         4          3 04-JAN-14          1          5\
  \           16\n         5          4 05-JAN-14          2          1          \
  \ 25\n\n| Id | Operation | Name |\n|---|---|--- |\n| 0 | `SELECT STATEMENT` | |\n\
  | 1 | `SORT AGGREGATE` | |\n| *2 | `VIEW` | |\n| 3 | `TABLE ACCESS FULL` | `SYS_TEMP_0FD9D664B_479D89AC`\
  \ |\n| 4 | `TEMP TABLE TRANSFORMATION` | |\n| 5 | `LOAD AS SELECT` | `SYS_TEMP_0FD9D664B_479D89AC`\
  \ |\n| 6 | `SORT ORDER BY` | |\n| 7 | `TABLE ACCESS FULL` | `T1` |\n| 8 | `SORT\
  \ ORDER BY` | |\n| 9 | `COUNT` | |\n| 10 | `VIEW` | |\n| 11 | `TABLE ACCESS FULL`\
  \ | `SYS_TEMP_0FD9D664B_479D89AC` |\n```\n\n`清单 7-6` 中的因子化子查询 `Q1` 对表中的行进行排序，然后我们使用\
  \ `ROWNUM` 伪列来标识每行在排序列表中的位置。`RANK_SALES` 列与 `RN` 略有不同，因为具有相同销售额的行（如前两行）被赋予相同的位置。该语句的执行计划远非直截了当。肯定有一种更简单、更高效的方法！确实有；分析函数为许多低效的子查询提供了解决方案。\n\
  \n> **注意**：所有分析函数都有一个涉及子查询的等效表述。有时分析函数比子查询性能更好，有时子查询比分析函数性能更好。\n\n### 用作分析的聚合函数\n\
  \n大多数（但并非全部）聚合函数也可以用作分析函数。`清单 7-7` 重写了 `清单 7-5`，这次将 `COUNT` 作为分析函数而不是聚合函数使用。\n\n\
  **`清单 7-7`**：聚合函数用作分析函数\n\n```sql\nSELECT t1.*, COUNT (sales_amount) OVER (PARTITION\
  \ BY channel_id) cnt FROM t1;\n\n| Id | Operation | Name |\n|---|---|--- |\n| 0\
  \ | `SELECT STATEMENT` | |\n| 1 | `WINDOW SORT` | |\n| 2 | `TABLE ACCESS FULL` |\
  \ `T1` |\n```\n\n`清单 7-7` 中 `OVER` 子句的存在表明 `COUNT` 函数被用作分析函数而不是聚合函数。该查询返回 `T1` 的所有\
  \ 100 行，并添加了列 `CNT`，就像在 `清单 7-5` 中一样。尽管 `清单 7-5` 和 `清单 7-7` 返回的行是相同的，但查询的执行方式却大不相同，而且返回的行顺序很可能也不同。\n\
  \n`清单 7-7` 中显示的执行计划包含了分析函数特有的 `WINDOW SORT` 操作。与可能执行多次排序的 `SORT GROUP BY` 操作不同，`WINDOW\
  \ SORT` 操作只对其从子操作接收的行执行一次排序。在 `清单 7-7` 的情况下，行按照包含 `CHANNEL_ID` 和 `SALES_AMOUNT`\
  \ 列的复合键排序，这隐式地为每个 `CHANNEL_ID` 值创建了一个分组。然后，`COUNT` 函数分两个阶段处理每个分组：\n\n\n*   第一阶段，对组进行处理，以使用\
  \ `COUNT` 函数的聚合变体来计算该组的 `COUNT` 值。\n*   第二阶段，输出组中的每一行，同时为每一行提供一个额外的列，其中包含相同的计算计数值。\n\
  \n术语 `PARTITION BY` 在分析函数中的作用，相当于聚合查询中的 `GROUP BY` 子句；如果省略 `PARTITION BY` 关键字，分析函数将处理整个结果集。\n\
  \n清单 7-8 展示了一个处理整个结果集的简单分析函数示例。\n\n清单 7-8. 在分析函数中使用非序列聚合函数\n\n```sql\nSELECT t1.*,\
  \ AVG (sales_amount) OVER ()average_sales_amount FROM t1;\n\n| Id  | Operation \
  \         | Name |\n\n|   0 | SELECT STATEMENT   |      |\n|   1 |  WINDOW BUFFER\
  \     |      |\n|   2 |   TABLE ACCESS FULL| T1   |\n```\n\n清单 7-8 中的查询添加了一个列 `AVERAGE_SALES_AMOUNT`，该列在\
  \ `T1` 表的所有 100 行中具有相同的值。该值是整个表中 `SALES_AMOUNT` 的平均值。请注意，因为 `AVG` 是一个非序列聚合函数，并且没有\
  \ `PARTITION BY` 子句，所以根本不需要排序。因此，执行计划使用了 `WINDOW BUFFER` 操作而不是 `WINDOW SORT`。\n\n\
  与聚合一样，当使用多个函数时，可能需要多次排序。然而，在分析函数的情况下，每次排序都有自己的操作。比较一下 清单 7-9 中两个查询的执行计划。\n\n清单 7-9.\
  \ 比较聚合和分析函数的多次排序\n\n```sql\nSELECT MEDIAN (channel_id) med_channel_id\n      ,MEDIAN\
  \ (sales_amount) med_sales_amount\n  FROM t1;\n\n| Id  | Operation          | Name\
  \ |\n\n|   0 | SELECT STATEMENT   |      |\n|   1 |  SORT GROUP BY     |      |\n\
  |   2 |   TABLE ACCESS FULL| T1   |\n\nSELECT t1.*\n      ,MEDIAN (channel_id) OVER\
  \ ()med_channel_id\n      ,MEDIAN (sales_amount) OVER ()med_sales_amount\n  FROM\
  \ t1;\n\n| Id  | Operation           |\n\n|   0 | SELECT STATEMENT    |\n|   1 |\
  \  WINDOW SORT        |\n|   2 |   WINDOW SORT       |\n|   3 |    TABLE ACCESS\
  \ FULL|\n```\n\n清单 7-9 中的第一个查询返回一行，其中包含 `CHANNEL_ID` 和 `SALES_AMOUNT` 的中值。每个聚合函数调用都需要自己的排序：第一次按\
  \ `CHANNEL_ID` 排序，第二次按 `SALES_AMOUNT` 排序。然而，这个细节被 `SORT GROUP BY` 操作掩盖了。第二个查询涉及分析函数调用，返回\
  \ `T1` 中的所有 100 行。这第二个查询也需要两次排序。但是，在这种情况下，这两次排序在执行计划中各自都有自己的 `WINDOW SORT` 操作。\n\
  \n## 纯分析函数\n\n虽然几乎所有的聚合函数都可以作为分析函数运行，但有许多分析函数没有对应的聚合函数。例如，清单 7-10 以一种更易读且更高效的方式重写了\
  \ 清单 7-6。\n\n清单 7-10. 引入 ROW_NUMBER 和 RANK 分析函数\n\n```sql\n SELECT ROW_NUMBER ()\
  \ OVER (ORDER BY sales_amount) rn\n        ,RANK () OVER (ORDER BY sales_amount)\
  \ rank_sales\n        ,t1.*\n    FROM t1\nORDER BY sales_amount;\n\n| Id  | Operation\
  \          |\n\n|   0 | SELECT STATEMENT   |\n|   1 |  WINDOW SORT       |\n|  \
  \ 2 |   TABLE ACCESS FULL|\n```\n\n清单 7-10 中查询的输出与清单 7-6 中的输出相同。`WINDOW SORT` 操作按\
  \ `SALES_AMOUNT` 对行进行排序，然后 `ROW_NUMBER` 分析函数从排序后的缓冲区读取行，并添加一个指示其在列表中位置的新列。`RANK`\
  \ 函数与 `ROW_NUMBER` 类似，只是 `SALES_AMOUNT` 值相等的行被赋予相同的排名。请注意，`ORDER BY` 子句不会导致额外的开销，因为数据已经排序。但这种行为不能保证，并且万一\
  \ CBO 在将来的版本中做了不同的事情，如果排序很重要，最好添加 `ORDER BY` 子句。\n\n## 分析子句\n\n我们已经看到分析函数包含关键字 `OVER`，后跟一对括号。在这些括号内，最多有三个可选子句。它们是\
  \ `query partition` 子句、`order by` 子句和 `windowing` 子句。如果存在多个子句，则必须按照规定的顺序书写。让我们更详细地看看这些子句中的每一个。\n\
  \n### 查询分区子句\n\n此子句使用关键字 `PARTITION BY` 将行分成组，然后独立地对每个组运行分析函数。\n\n![image](img/sq.jpg) **注意**  分析函数中使用的关键字\
  \ `PARTITION BY` 与允许将索引和表拆分为多个段的许可功能无关。分析函数中的术语 `PARTITION BY` 与我们第一章中讨论的分区外连接概念之间也没有任何关系。\n\
  \n我们在清单 7-7 中看到了一个查询分区子句的例子。清单 7-11 给我们提供了另一个例子，它是对清单 7-8 的一个轻微修改。\n\n清单 7-11. 带\
  \ PARTITION BY 子句的 NSAF 分析函数\n\n```sql\nSELECT t1.*\n      ,AVG (sales_amount) OVER\
  \ (PARTITION BY channel_id) average_sales_amount\n  FROM t1;\n\n| Id  | Operation\
  \          |\n\n|   0 | SELECT STATEMENT   |\n|   1 |  WINDOW SORT       |\n|  \
  \ 2 |   TABLE ACCESS FULL|\n```\n\n清单 7-8 中的查询与 清单 7-11 中的查询之间的唯一区别是添加了查询分区子句。因此，在清单\
  \ 7-8 中，`CHANNEL_ID` 为 1 且 `SALES_AMOUNT` 为 16 的行的 `AVERAGE_SALES_AMOUNT` 值为 3803.53，就像每一行一样。`T1`\
  \ 表中所有 100 行的 `SALES_AMOUNT` 的平均值是 3803.53。另一方面，包含 `PARTITION BY` 子句的查询在 `CHANNEL_ID`\
  \ 为 1 且 `SALES_AMOUNT` 为 16 时返回的 `AVERAGE_SALES_AMOUNT` 值为 3896。这是 `CHANNEL_ID`\
  \ 为 1 的 25 行的平均值。\n\n你会注意到 清单 7-11 中的执行计划与 清单 7-8 中的不同。清单 7-11 中的查询分区子句要求按 `CHANNEL_ID`\
  \ 对行进行排序，即使 `AVG` 函数是一个非序列聚合函数。\n\n### ORDER BY 子句\n\n当 `MEDIAN` 函数用作分析函数时，行的排序顺序由\
  \ `MEDIAN` 函数的参数决定，在这种情况下，`order by` 子句是多余的，并且是非法的。然而，我们已经在清单 7-10 中看到了一个合法使用 `order\
  \ by` 子句的例子，该清单引入了 `ROW_NUMBER` 分析函数。清单 7-12 显示了 `order by` 子句的另一个用法。\n\n清单 7-12.\
  \ NTILE 分析函数\n\n```sql\nSELECT t1.*, NTILE (4) OVER (ORDER BY sales_amount) nt FROM\
  \ t1;\n```\n\n\n\n"
- "# 窗口分析子句\n\n清单 7-12 中的查询按 `SALES_AMOUNT` 对 `T1` 表中的 100 行进行排序。该语句的执行计划看起来与清单 7-10\
  \ 和 7-11 中的相同，因此我没有再次展示。`NTILE` 函数用于识别百分位数，其参数指示数量。在此案例中，该函数为 `SALES_AMOUNT` 值最低的\
  \ 25 行（即最低四分位数中的行）返回 1，为第二四分位数的 25 行返回 2，为第三四分位数的 25 行返回 3，为 `SALES_AMOUNT` 值最高的\
  \ 25 行返回 4。\n\n可以在同一个函数调用中组合查询分区子句和排序子句。清单 7-13 展示了如何实现这一点，并同时引入了一个新的分析函数。\n\n清单\
  \ 7-13. LAG 分析函数\n\n```sql\n SELECT t1.*\n        ,LAG (sales_amount)\n        \
  \    OVER (PARTITION BY channel_id, cust_id ORDER BY transaction_date)\n       \
  \     prev_sales_amount\n    FROM t1\nORDER BY channel_id, sales_amount;\n```\n\n\
  `LAG` 函数从较早的行中选取表达式的值。该函数接受三个参数。\n\n*   第一个参数是必需的，是要选取的列或表达式\n*   第二个参数是可选的，表示要回溯的行数，默认为\
  \ 1，即前一行\n*   第三个也是最后一个可选参数，是指定当偏移量超出窗口范围时返回的值。如果未指定第三个参数，则默认为 `NULL`。\n\n这个对 `LAG`\
  \ 函数的调用通过根据 `CHANNEL_ID` 和 `CUST_ID` 的不同值将 100 行逻辑上分成 20 组，每组 5 行来操作。在每组内，我们按 `TRANSACTION_DATE`\
  \ 排序，取前一行的 `SALES_AMOUNT` 值。换句话说，我们看到一笔交易的详细信息，以及同一客户使用同一渠道进行的上一笔交易的 `SALES_AMOUNT`。清单\
  \ 7-14 展示了输出的几行示例。\n\n清单 7-14. 清单 7-13 的示例输出\n\n```\nTRANSACTION_DATE        CHANNEL_ID\
  \      CUST_ID SALES_AMOUNT    PREV_SALES_AMOUNT\n20/01/2014              1    \
  \           1       400\n09/02/2014              1               1       1600  \
  \          400\n01/03/2014              1               1       3600           \
  \ 1600\n21/03/2014              1               1       9400            3600\n10/04/2014\
  \              1               1       10000           9400\n16/01/2014        \
  \      1               2       256\n```\n\n请注意，**高亮**的行是其组内的第一行。在此案例中，`LAG` 返回 `NULL`，因为我们没有为函数指定三个参数。你应该知道还有一个\
  \ `LEAD` 函数调用。它从后续行而非前序行取值。\n\n![image](img/sq.jpg)\n**注意** 使用降序排序调用 `LEAD` 所得的值与使用升序排序调用\
  \ `LAG` 所得的值相同，反之亦然。只有 `WINDOW SORT` 操作返回的行的顺序会改变。\n\n窗口子句是三种类型子句中最复杂的，但也最有用的之一。它的使用规则相当复杂，我在这里只能做一个介绍。\n\
  \n*   窗口子句仅允许用于一部分 NSAF（非 SQL 聚合函数）。\n*   如果指定了窗口子句，则也需要 `order by` 子句。\n*   对于那些支持窗口子句的函数，如果提供了\
  \ `order by` 子句，则隐含默认的窗口子句。\n\n与查询分区子句类似，窗口子句将分析函数限制在行的一个子集内，但与查询分区子句不同的是，它的范围是动态的。考虑清单\
  \ 7-15，它展示了窗口子句的实际应用。\n\n清单 7-15. 移动平均值的实现\n\n```sql\nSELECT t1.*\n      ,AVG (\n\
  \          sales_amount)\n       OVER (PARTITION BY cust_id\n             ORDER\
  \ BY transaction_date\n             ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)\n\
  \          mov_avg\n  FROM t1;\n\n-- 示例输出\n\nTRANSACTION_DATE        CHANNEL_ID\
  \      CUST_ID SALES_AMOUNT    MOV_AVG\n05-JAN-14               2              \
  \ 1           25          25\n10-JAN-14               3               1        \
  \   3100        1562.5\n15-JAN-14               4               1           225\
  \         1116.66666666667\n20-JAN-14               1               1          \
  \ 400         1241.66666666667\n```\n\n清单 7-15 实现了一个传统的移动平均值计算，包括当前行及其之前的两行（假设它们存在）。该函数返回的值是该客户最近三笔交易的平均\
  \ `SALES_AMOUNT`。示例输出显示了 `CUST_ID` 为 1 的一些行。第一行的窗口只有一行，第二行提供了前两行的平均值，第三行及之后的行在该组内平均三个数字。因此，第四行提供了\
  \ 3100、225 和 400 的平均值，即 1241⅔。\n\n默认的窗口规范是 `ROWS BETWEEN UNBOUNDED PRECEDING AND\
  \ CURRENT ROW`，它的一个非常常见的用途是实现累计总计，如清单 7-16 所示。\n\n清单 7-16. 使用带隐含窗口子句的 SUM 实现累计总计\n\
  \n```sql\nSELECT t1.*\n      ,SUM (sales_amount)\n          OVER (PARTITION BY cust_id\
  \ ORDER BY transaction_date)\n          moving_balance\n  FROM t1;\n\n-- 示例输出（前几行）\n\
  \nTRANSACTION_DATE        CHANNEL_ID      CUST_ID SALES_AMOUNT    MOVING_BALANCE\n\
  05-JAN-14               2               1               25      25\n10-JAN-14  \
  \             3               1               3100    3125\n15-JAN-14          \
  \     4               1               225     3350\n20-JAN-14               1  \
  \             1               400     3750\n```\n\n乍一看，与 `SUM` 函数一起使用的 `order by`\
  \ 子句似乎很荒谬，因为无论顺序如何，一组值的总和都是一样的。然而，由于 `SUM` 支持窗口，`order by` 子句的隐含意义是，我们只对当前行和之前的行求和；窗口子句是隐含的。你看出\
  \ `SALES_AMOUNT` 的值是如何在 `MOVING_BALANCE` 列中累加的吗？\n\n窗口也支持逻辑范围。清单 7-17 展示了一个逻辑范围的例子。\n\
  \n清单 7-17. 在指定时间段上的窗口\n\n```sql\n SELECT t1.*\n    ,AVG (\n        sales_amount)\n\
  \     OVER (PARTITION BY cust_id\n           ORDER BY transaction_date\n       \
  \    RANGE INTERVAL '10' DAY PRECEDING)\n        mov_avg\nFROM t1;\n```\n\n清单 7-17\
  \ 中的查询指定，截止到当前行交易日期的十一天内进行的交易都包含在窗口中。请注意，我这里对窗口规范进行了缩写；默认情况下，窗口在当前行或当前值处关闭。由于 `T1`\
  \ 中数据的设置方式，清单 7-17 的输出与清单 7-15 中的输出相同。\n\n\n\n![image](img/sq.jpg) `Note` 当使用逻辑范围时，`CURRENT\
  \ ROW` 关键字（在 Listing 7-17 中是隐式的）实际上意味着当前值。因此，如果存在多行与当前行的 `TRANSACTION_DATE` 值相同，那么分析函数会将所有此类行的\
  \ `SALES_AMOUNT` 值都包含在其平均值计算中。\n\n## 为何窗口化仅限于 NSAF（非排序聚合函数）\n\n不久前，一位客户要求我实现一个移动中位数，类似于\
  \ Listing 7-15 中的移动平均。我无法在带有窗口子句的情况下使用 `MEDIAN` 函数，因为窗口化对于 `MEDIAN` 函数不受支持，这样做效率低下。\n\
  \n要理解计算移动中位数为何如此困难，让我们再看一下 Listing 7-15 中显示的示例输出。在计算最后一个 `MOVING_BALANCE` 之前，窗口需要“滑动”以排除第一行并包含第四行。结果窗口中包含的行已高亮显示。为了使这种“滑动”操作高效，`WINDOW\
  \ SORT` 操作已经按 `CUST_ID` 和 `TRANSACTION_DATE` 对行进行了排序。\n\n一旦确定了窗口中的行，就该调用分析函数了。对于像\
  \ Listing 7-15 中使用的 `AVG` 这样的 NSAF，这只是像往常一样扫描值并跟踪累计值的问题。\n\n![image](img/sq.jpg)\
  \ `Note` 对于许多函数，包括 `AVG`，理论上可以不必每次都扫描窗口中的所有行来计算新值。然而，对于像 `MAX` 和 `MIN` 这样的函数，扫描是必需的。\n\
  \n现在假设我们想为 `SALES_AMOUNT` 计算一个移动中位数，而不是移动平均。我们窗口中的行已按 `TRANSACTION_DATE` 排序，并且必须重新按\
  \ `SALES_AMOUNT` 排序。每次窗口滑动到 `T1` 中的新行时，都需要进行这种重新排序。对于任何需要排序的聚合函数，都可以提出同样的论点。\n\n\
  当然，无论计算效率如何，我的客户仍然需要移动中位数功能！当我们讨论 `MODEL` 子句时，我会再回到我如何解决这个问题。\n\n## 分析作为一把双刃剑\n\n\
  这些分析功能看起来确实很酷。分析函数允许我们编写简洁高效的代码，同时还能用我们的 SQL 能力给朋友留下深刻印象！还有什么比这更好的呢？实际上，还有很多。\n\n\
  让我创建一个新表 `T2`，它展示分析函数如何更经常地将你引入性能泥潭，而不是将你从中解救出来。Listing 7-18 展示了一个测试案例，类似于几年前天真的\
  \ Tony Hasler 开发来展示分析函数有多快的案例。结果令我大吃一惊！\n\nListing 7-18. 分析函数的缺点\n\n```sql\nCREATE\
  \ TABLE t2\n(\n   c1            NUMBER\n  ,c2            NUMBER\n  ,big_column1\
  \   CHAR (2000)\n  ,big_column2   CHAR (2000)\n);\n\nINSERT /*+ APPEND */ INTO t2\
  \ (c1\n               ,c2\n               ,big_column1\n               ,big_column2)\n\
  \       SELECT ROWNUM\n             ,MOD (ROWNUM, 5)\n             ,RPAD ('X', 2000)\n\
  \             ,RPAD ('X', 2000)\n         FROM DUAL\n   CONNECT BY LEVEL <= 50000;\n\
  \nCOMMIT;\n\nWITH q1\n     AS (  SELECT c2, AVG (c1) avg_c1\n             FROM t2\n\
  \         GROUP BY c2)\nSELECT *\n  FROM t2 NATURAL JOIN q1;\n\n| Id  | Operation\
  \            | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT\
  \ STATEMENT     |      | 50000 |   192M| 27106   (1)| 00:00:02 |\n|*  1 |  HASH\
  \ JOIN           |      | 50000 |   192M| 27106   (1)| 00:00:02 |\n|   2 |   VIEW\
  \               |      |     5 |   130 | 13553   (1)| 00:00:01 |\n|   3 |    HASH\
  \ GROUP BY     |      |     5 |    40 | 13553   (1)| 00:00:01 |\n|   4 |     TABLE\
  \ ACCESS FULL| T2   | 50000 |   390K| 13552   (1)| 00:00:01 |\n|   5 |   TABLE ACCESS\
  \ FULL  | T2   | 50000 |   191M| 13552   (1)| 00:00:01 |\n\nPredicate Information\
  \ (identified by operation id):\n\n1 - access(\"T2\".\"C2\"=\"Q1\".\"C2\")\n\nSELECT\
  \ t2.*, AVG (c1) OVER (PARTITION BY c2) avg_c1 FROM t2;\n\n| Id  | Operation   \
  \       | Name | Rows  | Bytes |TempSpc| Cost (%CPU)| Time     |\n\n|   0 | SELECT\
  \ STATEMENT   |      | 50000 |   191M|       | 55293   (1)| 00:00:03 |\n|   1 |\
  \  WINDOW SORT       |      | 50000 |   191M|   195M| 55293   (1)| 00:00:03 |\n\
  |   2 |   TABLE ACCESS FULL| T2   | 50000 |   191M|       | 13552   (1)| 00:00:01\
  \ |\n```\n\nListing 7-18 创建了一个测试表，然后执行了两个产生完全相同结果的查询。第一个查询是那些对分析函数一无所知、但热衷于展示子查询因子分解和\
  \ ANSI 语法知识的初级程序员的典型写法。CBO 似乎认为将有 58 亿行数据占用 21TB 空间。所有这些可怕的情况当然应该避免。\n\nListing\
  \ 7-18 中的第二个查询看起来高效得多。我们消除了那个“冒犯性”的对 `T2` 的第二次全表扫描。太好了——那么为什么第二个查询的估计（和实际）耗时比第一个还高呢？\n\
  \n问题的线索在于执行计划中名为“TempSpc”（临时表空间）的列，该列仅出现在第二个查询的执行计划中。分析函数的一大问题是排序是基于*整个结果集*的。假设的初级程序员的\
  \ SQL 中聚合的数据排除了 `BIG_COLUMN1` 和 `BIG_COLUMN2`。因此，我们可以在内存中聚合数据，并且由于 `AVG` 是 NSAF，我们根本不需要任何排序！除非你有足够大的\
  \ SGA，否则你永远无法在内存中对第二个查询的数据进行排序，而基于磁盘的排序将比多一次全表扫描耗时更长。\n\n![image](img/sq.jpg) `Note`\
  \ Listing 17-18 中显示的执行计划是在一个拥有 512Mb SGA 的数据库上准备的。如果你在一个拥有大 SGA 的数据库上尝试运行这些示例，你可能需要将\
  \ `T2` 中的行数从 50,000 增加到更大的值才能看到效果。同样，如果你发现第二个查询耗时过长，你可能需要将行数减少到一个更小的值。\n\n## 聚合函数与分析函数结合使用\n\
  \n分析函数在任何可选聚合之后进行计算。这个事实的第一个后果是分析函数不能出现在 `WHERE` 子句、`GROUP BY` 子句或 `HAVING` 子句中；分析函数只能与\
  \ `MODEL` 子句一起使用，作为选择列表的一部分，或者作为 `ORDER BY` 子句中表达式的一部分。分析函数被较晚评估的第二个后果是，聚合的结果可以用作分析函数的输入。Listing\
  \ 7-19 给出了一个例子。\n\nListing 7-19. 结合聚合函数和分析函数\n\n```sql\n SELECT cust_id\n      \
  \  ,COUNT (*) tran_count\n        ,SUM (sales_amount) total_sales\n        ,100\
  \ * SUM (sales_amount) / SUM (SUM (sales_amount)) OVER ()\n            pct_revenue1\n\
  \        ,100 * ratio_to_report (SUM (sales_amount)) OVER () pct_revenue2\n    FROM\
  \ t1\nGROUP BY cust_id;\n\n| Id  | Operation           | Name |\n\n|   0 | SELECT\
  \ STATEMENT    |      |\n|   1 |  WINDOW BUFFER      |      |\n|   2 |   HASH GROUP\
  \ BY     |      |\n|   3 |    TABLE ACCESS FULL| T1   |\n```\n\n\n\n## 数据示例\n\n\
  ```\nCUST_ID  TRAN_COUNT    TOTAL_SALES    PCT_REVENUE1           PCT_REVENUE2\n\
  1        20            80750          21.2302781889455       21.2302781889455\n\
  2        20            69673          18.3179835573796       18.3179835573796\n\
  4        20            76630          20.1470739024012       20.1470739024012\n\
  5        20            78670          20.6834177724377       20.6834177724377\n\
  3        20            74630          19.621246578836        19.621246578836\n```\n\
  \n清单 7-19 将 `T1` 表中的 100 行数据聚合为五组，每组对应一个 `CUST_ID`。我们使用聚合函数来计算 `TRAN_COUNT`（与该客户的交易数量）和\
  \ `TOTAL_SALES`（该客户的 `SALES_AMOUNT` 总和）。从执行计划中可以看出，此时，操作 2 中哈希聚合的结果被传递给支持非分区 NSAF\
  \ 分析函数调用的 `WINDOW BUFFER` 操作。\n\n最后两列 `PCT_REVENUE1` 和 `PCT_REVENUE2` 显示了客户贡献的收入百分比。尽管这两列的值相同，但计算方式略有不同。`PCT_REVENUE1`\
  \ 是通过将客户的聚合 `SALES_AMOUNT` 总和除以所有客户的聚合销售总额来计算的。`PCT_REVENUE2` 则使用了特殊的分析函数 `RATIO_TO_REPORT`，这使得编写此类表达式更加容易。\n\
  \n我认为有些人可能会觉得这种 SQL 难以阅读，我也不建议您将 清单 7-19 视为良好的编码实践。编写 清单 7-19 中 SQL 的一个稍长但更清晰的方式如\
  \ 清单 7-20 所示。\n\n## 通过子查询分离聚合与分析\n\n```\nWITH q1\n     AS (  SELECT cust_id, COUNT\
  \ (*) tran_count, SUM (sales_amount) total_sales\n             FROM t1\n       \
  \  GROUP BY cust_id)\nSELECT q1.*\n      ,100 * total_sales / SUM (total_sales)\
  \ OVER () pct_revenue1\n      ,100 * ratio_to_report (total_sales) OVER () pct_revenue2\n\
  \  FROM q1;\n```\n\nCBO 能够轻松地将 清单 7-20 中的查询转换为 清单 7-19 中的形式，这两个查询具有相同的执行计划。\n\n\
  ## 单行函数\n\nSQL 语言参考手册中创造的术语 *“单行函数”* 有些误导性，因为所提到的函数可以应用于从多行聚合而来的数据。单行函数通常被称为 *标量函数*，但这种说法并不准确，因为该类别中的某些函数，例如\
  \ `SET`，操作的是非标量数据。清单 7-21 展示了此类函数的几个有趣案例。\n\n## 各种上下文中的单行函数\n\n```\n SELECT GREATEST\
  \ (\n            ratio_to_report (FLOOR (SUM (LEAST (sales_amount, 100)))) OVER\
  \ ()\n           ,0)\n            n1\n    FROM t1\nGROUP BY cust_id;\n\n| Id  |\
  \ Operation           | Name |\n\n|   0 | SELECT STATEMENT    |      |\n|   1 |\
  \  WINDOW BUFFER      |      |\n|   2 |   HASH GROUP BY     |      |\n|   3 |  \
  \  TABLE ACCESS FULL| T1   |\n```\n\n这个查询没有做任何有意义的事情，因此我没有列出结果。构建这个查询纯粹是为了展示单行函数如何工作。基本的评估规则是：\n\
  \n*   单行函数在查询块的所有子句的表达式中都是有效的。\n*   如果单行函数的参数包含一个或多个分析函数，则单行函数在分析函数之后评估；否则，单行函数在任何分析之前评估。\n\
  *   如果单行函数的参数包含一个或多个聚合函数，则单行函数在聚合之后评估；否则，单行函数在任何聚合之前评估（除非参数包含分析函数）。\n\n让我们看看这些规则如何影响用于评估查询中\
  \ `N1` 的各种标量函数。\n\n*   单行函数 `LEAST` 的参数不包含聚合或分析函数，因此 `LEAST` 在任何聚合或分析之前评估。\n*  \
  \ 单行函数 `FLOOR` 的参数是一个聚合函数，因此 `FLOOR` 在聚合之后但在分析之前评估。\n*   单行函数 `GREATEST` 的参数包含一个分析函数，因此\
  \ `GREATEST` 函数在分析之后评估。\n\n## MODEL 子句\n\n在投资银行界（可能还有其他行业）存在一种普遍行为，监管机构对此越来越不认可。这种行为是业务人员将数据库查询结果下载到\
  \ Excel 电子表格中，然后使用 Visual Basic 函数在其中执行复杂的计算。我听说过一个案例，这些计算非常复杂，需要超过 45 分钟才能运行！监管机构对这类事情的问题在于，对这些电子表格的变更通常控制很少。我们作为技术人员应该注意到的问题是，当有一个拥有大量\
  \ CPU 的巨型数据库服务器可以更快地执行这些计算时，在台式机上执行如此复杂的计算是不合适的。\n\n为了解决这个问题，Oracle 在 10g 中引入了 `MODEL`\
  \ 子句。事实上，关键字 `SPREADSHEET` 是 `MODEL` 的同义词，这一事实强调了该子句的正常使用。在本节中，我将简要介绍其概念。如果您有真正需要使用\
  \ `MODEL` 子句，应查阅数据仓库指南中名为 *SQL for Modeling* 的章节。\n\n## 电子表格概念\n\nOracle 提供的文档中缺少的一点是将\
  \ `MODEL` 子句的术语和概念与 Excel 电子表格的术语和概念进行比较。考虑到 Excel 不是 Oracle 提供的产品，这并不奇怪！让我现在来纠正这一点。俗话说一图胜千言，那么请看\
  \ 图 7-1。\n\n![9781430259770_Fig07-01.jpg](img/9781430259770_Fig07-01.jpg)\n\n图 7-1\
  \ Excel 与 MODEL 子句概念比较\n\n*   Excel 工作簿被拆分为一个或多个工作表。等效的 `MODEL` 子句概念是 `PARTITION`。这是这个重载术语的另一种用法！\n\
  *   工作表包含许多值。等效的 `MODEL` 子句概念是 `MEASURE`。\n*   工作表中的值通过行号和列字母引用。在 `MODEL` 分区中，度量通过\
  \ `DIMENSION` 值引用。\n*   Excel 电子表格中的某些值是通过公式计算的。`MODEL` 子句中的公式被称为 `RULES`。\n\nExcel\
  \ 和 `MODEL` 子句概念之间存在一些重要差异，这些差异总结在 表 7-1 中。\n\n## Excel 与 MODEL 子句概念之间的差异\n\n\n\n"
- "# MODEL 子句详解与移动中位数实现\n\n## 模型术语与 Excel 术语对比\n\n| 模型术语 | Excel 术语 | 差异 |\n| ---\
  \ | --- | --- |\n| 分区 (Partition) | 工作表 (Worksheet) | 一个 Excel 工作表中的公式可以引用另一个工作表中的单元格。模型子句中的分区则不能相互引用。\
  \ |\n| 维度 (Dimension) | 行和列 | Excel 中始终恰好有两个维度。模型子句中则有一个或多个维度。 |\n| 度量 (Measure)\
  \ | 单元格值 | Excel 中只有由维度引用的一个值。模型子句允许一个或多个度量。 |\n| 规则 (Rules) | 公式 | 模型中可以实现嵌套的单元格引用。\
  \ |\n\n## 使用 MODEL 子句实现移动中位数\n\n还记得我们不能在窗口子句中将 `MEDIAN` 作为分析函数使用，因为数据库不支持它吗？清单 7-22\
  \ 展示了如何用 `MODEL` 子句实现移动中位数。\n\n清单 7-22. 使用 MODEL 子句实现移动中位数\n\n```sql\nALTER SESSION\
  \ FORCE PARALLEL QUERY PARALLEL 3;\n\nSELECT transaction_date,channel_id,cust_id,sales_amount,mov_median,mov_med_avg\n\
  \  FROM t1\nMODEL\n   PARTITION BY (cust_id)\n   DIMENSION BY (ROW_NUMBER () OVER\
  \ (PARTITION BY cust_id ORDER BY transaction_date) rn)\n   MEASURES (transaction_date,\
  \ channel_id, sales_amount, 0 mov_median, 0 mov_med_avg)\n   RULES\n      (\n  \
  \    mov_median [ANY] =\n            MEDIAN (sales_amount)[rn BETWEEN CV()-2 AND\
  \ CV ()],\n      mov_med_avg [ANY] = ROUND(AVG(mov_median) OVER (ORDER BY rn ROWS\
  \ 2 PRECEDING))\n)\nORDER BY cust_id,transaction_date,mov_median;\n\nALTER SESSION\
  \ ENABLE PARALLEL QUERY;\n\n-- 示例输出\n\nTRANSACTION_DATE       CHANNEL_ID       CUST_ID\
  \  SALES_AMOUNT   MOV_MEDIAN      MOV_MED_AVG\n05-JAN-2014            2        \
  \        1               25      25              25\n10-JAN-2014            3  \
  \              1               3100    1562.5          794\n15-JAN-2014        \
  \    4                1               225     225             604\n20-JAN-2014 \
  \           1                1               400     400             729\n\n| Id\
  \  | Operation                      | Name     |\n| --- | --- | --- |\n|   0 | SELECT\
  \ STATEMENT               |          |\n|   1 |  PX COORDINATOR                |\
  \          |\n|   2 |   PX SEND QC (ORDER)           | :TQ10002 |\n|   3 |    SORT\
  \ ORDER BY               |          |\n|   4 |     SQL MODEL ORDERED          |\
  \          |\n|   5 |      PX RECEIVE                |          |\n|   6 |     \
  \  PX SEND RANGE            | :TQ10001 |\n|   7 |        WINDOW SORT           \
  \  |          |\n|   8 |         PX RECEIVE             |          |\n|   9 |  \
  \        PX SEND RANGE         | :TQ10000 |\n|  10 |           PX BLOCK ITERATOR\
  \    |          |\n|  11 |            TABLE ACCESS FULL   | T1       |\n|  12 |\
  \      WINDOW (IN SQL MODEL) SORT|          |\n```\n\n清单 7-22 中的代码首先强制并行查询。我这样做只是为了演示\
  \ `MODEL` 子句的并行化能力；数据集通常太小，不值得使用并行查询。\n\n该查询首先从 `T1` 中选择所有行和列，并将数据传递给 model 子句。\n\
  \n*   我们看到的第一个子句是可选的 `PARTITION BY` 子句。这意味着每个 `CUST_ID` 的数据被单独处理——可以认为是在自己的工作表中。\n\
  *   第二个子句是 `DIMENSION BY` 子句，其表达式中包含一个分析函数。该子句定义了一个新的标识符 `RN`，它按事务日期给出了工作表中行的排序。通常我会使用类似于\
  \ 清单 7-20 中的因子化子查询来使查询更易读，但这里我只是展示可能的做法。\n*   `MEASURES` 子句标识了我们的 `RN` 维度所引用的值。这些包括来自\
  \ `T1` 的剩余列以及两个新列。`MOV_MEDIAN` 将是最近三次交易的中位数，`MOV_MED_AVG` 将是最近三次交易的 `MOV_MED` 的平均值。这些标识符被初始化为零，以便度量的数据类型是已知的。\n\
  *   `RULES` 子句随后计算我们缺失的度量。\n\n第一条规则使用 `MEDIAN` 作为聚合函数，在 `MODEL` 子句中我们可以显式指定要使用的度量范围。右侧方括号中的表达式是：\n\
  \n```sql\nrn BETWEEN CV()-2 AND CV ()\n```\n\n术语 `CV` 是 `CURRENT_VALUE` 的缩写，这是模型类别中的一个函数，仅在\
  \ `MODEL` 子句内合法。`CV` 函数非常类似于 Excel 中的相对单元格引用。因此，例如，当维度 `RN` 的值为 7 时，整个表达式将被解释为 `rn\
  \ BETWEEN 5 AND 7`。请注意，我们在 `RULES` 子句中应用聚合函数是在 `DIMENSION BY` 子句中的分析函数之后。这是合法的，因为\
  \ `RULES` 子句独立于查询块的其余部分运行。\n\n第二条规则在第一条之后进行评估，因此可以使用在第一条规则中计算的 `MOV_MEDIAN` 度量作为输入，就像\
  \ Excel 中一个公式的结果可以作为另一个公式的输入一样。我本可以像计算 `MOV_MED_median` 一样计算 `MOV_MED_AVG`，但在这种情况下，我可以选择使用分析函数，这就是我所选择的做法。\n\
  \n在度量由规则评估后，结果被传回选择列表和 `ORDER BY` 子句。我将 `MOV_MEDIAN` 包含在 `ORDER BY` 子句中只是为了展示这是可能的，并没有其他原因。\n\
  \n清单 7-22 中的执行计划有点长，但这更多是与并行化有关，而不是 `MODEL` 子句；`MODEL` 子句中的各个规则不会在执行计划中显示。关于执行计划，我想提到的第一点是操作\
  \ 7 和操作 12 之间的区别。操作 7 用于在 `MODEL` 子句外部评估 `ROW_NUMBER` 分析函数，操作 12 用于在 `MODEL` 子句内部评估\
  \ `AVG` 分析函数，正如您可能从操作名称 `WINDOW (IN SQL MODEL) SORT` 猜到的那样。没有针对 `MEDIAN` 聚合函数的可见操作。我想在执行计划中强调的另一点是操作\
  \ 6。它检查 `CUST_ID` 的值以确定将数据发送到哪个并行查询从属进程；`MODEL` 子句规则评估的并行化总是基于 `PARTITION BY` 子句中的表达式，以防止并行查询从属进程之间需要任何通信。\n\
  \n## 为什么不用 PL/SQL？\n\n`MODEL` 子句看起来像是异端！SQL 应该是一种声明性编程语言，而我们在这里编写一系列规则，并指定计算的执行方式和顺序。我们有像\
  \ PL/SQL 这样具有等效并行化能力的命令式编程语言来处理这些，不是吗？\n\n\n需要认识到的关键点是，SQL 是**声明式**（`declarative`）的，并且有能力同时对`多行`进行操作。而\
  \ PL/SQL 等命令式语言则是**命令式**（`imperative`）且基于**单行**的。`MODEL`子句为我们提供的，正是能够一次性操作`多行`的**命令式**语法。想象一下，在\
  \ PL/SQL 中实现一个移动中位数该有多困难！\n\n## 总结\n\n本书的一个反复出现的主题是，你对事物理解得越透彻，就越容易正确地分析问题并找到这些问题的良好解决方案。本章开头，我们先看了看查询块的语法，因为如果不理解该语法，执行计划的某些方面就会难以理解。接着，我们介绍了函数。透彻理解\
  \ SQL 函数的主要类别，对于理解日益增多的、与为访问表选择索引或确定正确的连接顺序无关的性能问题至关重要。特别是，我们看到了分析函数处理的数据量如何使其在某些情况下缺乏吸引力。最后，我们介绍了`MODEL`子句这一复杂主题，并解释了如何在无法轻易通过其他方式执行计算时，使用它来对行集进行分析计算。\n\
  \n本章标志着我们对 SQL 语言本身分析的结束。现在是回到性能分析主题的时候了。在第 8 章，我们将完成从第 3 章开始的关于执行计划的研究。\n\n## 第\
  \ 8 章\n\n![image](img/frontdot.jpg)\n\n### 高级执行计划概念\n\n本章涵盖三个主要主题：执行计划的显示、并行执行计划和全局提示。\n\
  \n我在本书中已经展示了不少执行计划的部分，在本章中，我将解释剩余的大部分部分，尤其是大纲提示部分。这些额外的执行计划部分可以通过非默认的格式化选项来显示。本章的第二个主要主题是讨论并行运行语句的执行计划。关于并行执行计划如何工作的著述不多，特别是关于如何解读此类执行计划存在很多困惑。我想花些时间澄清所有这些困惑。CBO（基于成本的优化器）对执行计划的选择可以通过使用`优化器提示`来控制，或者至少是影响，而提示这个话题远比本书迄今为止所展现的要深入得多。因此，本章的第三个主题是`全局提示`。全局提示允许程序员影响\
  \ CBO 对提示出现位置之外的其他块的处理。这类提示对于在不修改视图的情况下提示来自数据字典视图的查询块等场景非常有用。\n\n但让我从这三个主题中的第一个开始本章：显示执行计划。\n\
  \n### 显示额外的执行计划部分\n\n在第 3 章，我解释了使用`DBMS_XPLAN`包中的函数默认显示执行计划；在第 4 章，我解释了如何在`DBMS_XPLAN`输出的操作表和`V$SQL_PLAN_STATISTICS_ALL`视图中显示来自运行时引擎的附加信息。但是`DBMS_XPLAN`能显示的关于\
  \ CBO 行为的信息远比迄今为止解释的要多得多。如果通过使用非默认格式化选项请求这样做，`DBMS_XPLAN`将在操作表下方的额外部分中显示更多信息。我将简要概述这些格式化选项，然后解释如何解读这些额外的部分。\n\
  \n#### DBMS_XPLAN 格式化选项\n\n表 8-1 总结了 PL/SQL 包和类型参考手册中记录的关于`DBMS_XPLAN`显示选项的信息：\n\
  \n表 8-1。对 DBMS_XPLAN 包调用中的格式级别和细粒度控制\n\n![Table8-1.jpg](img/Table8-1.jpg)\n\n查看表\
  \ 8-1 时，请记住以下几点：\n\n*   一些可选的显示数据出现在操作表的额外列中，一些则出现在操作表之后的额外部分中。该表格显示了每个数据项的出现位置。\n\
  *   `BASIC`级别仅显示操作表的`Id`、`Operation`和`Name`列，并且除了一些晦涩的例外¹外，不显示其他任何部分。这些基本级别的列在任何显示中都无法被抑制。\n\
  *   除`BASIC`以外的显示级别包含无法被抑制的额外列（如`Time`），除非选择`BASIC`级别然后再添加任何所需的部分或列。\n*   格式关键字不区分大小写。\n\
  *   所有级别都可以使用细粒度控制进行自定义，结合减号（`-`）移除数据，或可选的加号（`+`）添加数据。因此，例如，'`ADVANCED -COST`' 和\
  \ '`BASIC +PEEKED_BINDS`' 都是合法的格式。\n*   任何级别都不显示有关自适应执行计划的信息，必须通过`+ADAPTIVE`显式添加。将`ADAPTIVE`显式添加到`BASIC`级别不起作用。\n\
  *   运行时统计信息使用格式选项显示，如第 4 章所述。因此，要从`DBMS_XPLAN.DISPLAY_CURSOR`获得尽可能完整的显示，你需要为 format\
  \ 参数指定 '`ADVANCED ALLSTATS LAST ADAPTIVE`'。\n*   除`ADVANCED`外的所有级别都有文档记录；除`PEEKED_BINDS`和`OUTLINE`外的所有细粒度控制都有文档记录。\n\
  *   `SERIAL`级别仍然会为并行执行的语句显示并行操作。只有操作表中与并行操作相关的列会被抑制。\n*   有些选项并不适用于`DBMS_XPLAN`包中的所有过程。例如，`PEEKED_BINDS`仅对`DBMS_XPLAN.DISPLAY_CURSOR`有效，而`PREDICATE`信息不会在`DBMS_XPLAN.DISPLAY_AWR`的输出中显示。\n\
  \n我已经解释过，如果你需要关于单个行源操作的详细信息，最好查看视图`V$SQL_PLAN_STATISTICS_ALL`，因此我将专注于执行计划的额外部分，并按它们出现的顺序进行介绍。\n\
  \n#### 为分析运行 EXPLAIN PLAN\n\n本章剩余部分的清单使用如清单 8-1 所示创建的表。\n\n清单 8-1。为执行计划演示创建表和环回数据库链接\n\
  \n```sql\nCREATE PUBLIC DATABASE LINK \"loopback\"\nUSING 'localhost:1521/orcl';\
  \ -- 根据你的数据库名称和端口进行自定义\n\nCREATE /*+ NO_GATHER_OPTIMIZER_STATISTICS */ TABLE t1\
  \ AS\n        SELECT ROWNUM c1 FROM DUAL CONNECT BY LEVEL <= 100;\nCREATE /*+ NO_GATHER_OPTIMIZER_STATISTICS\
  \ */ TABLE t2 AS\n        SELECT ROWNUM c2 FROM DUAL CONNECT BY LEVEL <= 100;\n\
  CREATE /*+ NO_GATHER_OPTIMIZER_STATISTICS */ TABLE t3 AS\n        SELECT ROWNUM\
  \ c3 FROM DUAL CONNECT BY LEVEL <= 100;\nCREATE /*+ NO_GATHER_OPTIMIZER_STATISTICS\
  \ */ TABLE t4 AS\n        SELECT ROWNUM c4 FROM DUAL CONNECT BY LEVEL <= 100;\n\
  ```\n\n清单 8-1 创建了四个表，每个表只有一列。为了测试远程访问，我还创建了一个环回数据库链接。该清单假设数据库名为`ORCL`，且 SQLNET 端口设置为默认的\
  \ 1521。这是一种安全性极低的方法，要测试这些示例，你可能需要修改数据库链接创建语句以满足你的需求。\n\n\n接下来几节中的清单包含语句和执行计划。除非另有说明，执行计划应使用\
  \ `EXPLAIN PLAN` 获取，并配合调用 `DBMS_XPLAN.DISPLAY` 来指定 `BASIC` 级别，同时根据清单出现的具体章节中规定的适当细粒度控制。使用\
  \ `BASIC` 级别是为了尽可能保持操作表简洁，从而将注意力引向所讨论执行计划的其他方面。\n\n## 查询块和对象别名\n\n如果指定了或隐含了 `ALIAS`\
  \ 细粒度控制，那么在操作表之后会立即出现一个详细说明被解释语句中使用的查询块和对象的章节。清单 8-2 是一个简单的查询，有助于说明本节的含义。\n\n###\
  \ 清单 8-2. 包含三个查询块的简单查询\n\n```\nWITH q1 AS (SELECT /*+ no_merge */\n            \
  \      c1 FROM t1)\n    ,q2 AS (SELECT /*+  no_merge */\n                  c2 FROM\
  \ t2)\nSELECT COUNT (*)\n  FROM q1, q2 myalias\n WHERE c1 = c2;\n\nPlan hash value:\
  \ 1978226902\n\n| Id  | Operation            | Name |\n\n|   0 | SELECT STATEMENT\
  \     |      |\n|   1 |  SORT AGGREGATE      |      |\n|   2 |   HASH JOIN     \
  \     |      |\n|   3 |    VIEW              |      |\n|   4 |     TABLE ACCESS\
  \ FULL| T1   |\n|   5 |    VIEW              |      |\n|   6 |     TABLE ACCESS\
  \ FULL| T2   |\n\nQuery Block Name / Object Alias (identified by operation id):\n\
  \n1 - SEL$3\n   3 - SEL$1 / Q1@SEL$3\n   4 - SEL$1 / T1@SEL$1\n   5 - SEL$2 / MYALIAS@SEL$3\n\
  \   6 - SEL$2 / T2@SEL$2\n```\n\n当然，清单 8-2 中的简单语句可以通过消除两个带因子的子查询，改为直接连接 `T1` 和 `T2`\
  \ 来变得更简单。实际上，如果移除了 `NO_MERGE` 提示，CBO 会应用*简单视图合并*转换来为我们完成这项工作。但就目前而言，三个查询块没有被合并，并且全部出现在最终的执行计划中。\n\
  \nCBO 为这三个查询块提供了默认名称。这些名称是 `SEL$1`、`SEL$2` 和 `SEL$3`，按照原始语句中 `SELECT` 关键字出现的顺序分配。执行计划显示的\
  \ `ALIAS` 部分指明了操作相关的查询块。在适用的情况下，还会显示一个*对象别名*。由于操作 2 与操作 1 关联到同一个查询块，并且没有对象别名可显示，因此操作\
  \ 2 根本没有出现在 `ALIAS` 部分中；`SEL$3` 是隐含的。\n\n对于表 `T1` 和 `T2`，我未在 `FROM` 子句中指定别名，因此对于操作\
  \ 4 和 6 的对象别名，显示的是表名本身。然而，你会注意到表名已被限定，前面加上了查询块的名称，并以‘@’符号开头。因此，对于操作 4，`T1@SEL$1`\
  \ 表示*在 SEL$1 的 FROM 子句中出现的名为 T1 的行源*。之所以需要限定行源名称，是因为同一个对象（或别名）可以在同一个 SQL 语句的不同查询块中多次使用。\n\
  \n请注意，别名可能针对的是表之外的对象。操作 3 引用了 `Q1`，这是一个在 清单 8-2 主句中未给予别名的带因子子查询。操作 5 引用了 `MYALIAS`，这是我在主查询\
  \ (`SEL$3`) 中为 `Q2` 给出的别名。\n\n清单 8-3 展示了当我们移除其中一个 `NO_MERGE` 提示时会发生什么。\n\n### 清单\
  \ 8-3. 查询块合并\n\n```\nWITH q1 AS (SELECT c1 FROM t1)\n    ,q2 AS (SELECT /*+  no_merge\
  \ */\n                  c2 FROM t2)\nSELECT COUNT (*)\n  FROM q1, q2 myalias\n WHERE\
  \ c1 = c2;\n\nPlan hash value: 3055011902\n\n| Id  | Operation            | Name\
  \ |\n\n|   0 | SELECT STATEMENT     |      |\n|   1 |  SORT AGGREGATE      |   \
  \   |\n|   2 |   HASH JOIN          |      |\n|   3 |    TABLE ACCESS FULL | T1\
  \   |\n|   4 |    VIEW              |      |\n|   5 |     TABLE ACCESS FULL| T2\
  \   |\n\nQuery Block Name / Object Alias (identified by operation id):\n\n1 - SEL$F1D6E378\n\
  \   3 - SEL$F1D6E378 / T1@SEL$1\n   4 - SEL$2        / MYALIAS@SEL$3\n   5 - SEL$2\
  \        / T2@SEL$2\n```\n\n操作表现在少了一行，因为移除第一个带因子子查询中的 `NO_MERGE` 提示，使得 `SEL$1` 和\
  \ `SEL$3` 得以合并。然而，`ALIAS` 部分突然变得更难以解析。操作 1 和 3 的那个古怪别名是什么？这个十六进制名称实际上是 CBO 通过对 `SEL$1`\
  \ 和 `SEL$3` 进行哈希运算分配的一个名称。事实证明，在所有直到并包括 12cR1（至少）的版本中，当 `SEL$1` 被合并到 `SEL$3` 中时（反之则不然），无论语句、数据库实例或数据库版本如何，这个看似随机的名称总是完全相同！决定合并后查询块名称的唯一因素是待合并块的名称。\n\
  \n操作 3 展示了另一个有趣的点。请注意，斜杠左边的引用查询块 (`SEL$F1D6E378`) 是与*操作*相关的查询块，但斜杠右边的引用查询块 (`SEL$1`)\
  \ 是被引用*对象*所来自的原始查询块。\n\n在处理全局提示时，我们可能需要依赖这些名称，但尽管这些名称具有稳定性，最佳实践是在使用全局提示时显式命名查询块。清单\
  \ 8-4 展示了如何操作。\n\n### 清单 8-4. 使用 QB_NAME 提示命名查询块\n\n```\nWITH q1 AS (SELECT /*+\
  \  qb_name(qb1)*/\n                  c1 FROM t1)\n    ,q2 AS (SELECT /*+  no_merge\
  \ */\n                  c2 FROM t2)\nSELECT /*+ qb_name(qb2)*/\n       COUNT (c1)\n\
  \  FROM q1, q2 myalias\n WHERE c1 = c2;\n\nPlan hash value: 3055011902\n\n| Id \
  \ | Operation            | Name |\n\n|   0 | SELECT STATEMENT     |      |\n|  \
  \ 1 |  SORT AGGREGATE      |      |\n|   2 |   HASH JOIN          |      |\n|  \
  \ 3 |    TABLE ACCESS FULL | T1   |\n|   4 |    VIEW              |      |\n|  \
  \ 5 |     TABLE ACCESS FULL| T2   |\n\nQuery Block Name / Object Alias (identified\
  \ by operation id):\n\n1 - SEL$86DECE37\n   3 - SEL$86DECE37 / T1@QB1\n   4 - SEL$1\
  \        / MYALIAS@QB2\n   5 - SEL$1        / T2@SEL$1\n```\n\n由于我们通过 `QB_NAME`\
  \ 提示将 `SEL$1` 显式重命名为 `QB1`，将 `SEL$3` 显式重命名为 `QB2`，因此 清单 8-4 中操作 3 和 4 的完全限定对象别名已更改。此外，操作\
  \ 5 的查询块名称从 `SEL$2` 更改为 `SEL$1`，因为操作 5 现在与语句中第一个未命名的查询块相关联。更重要的是，合并查询块的古怪名称已更改；每当名为\
  \ `QB1` 的查询块合并到 `QB2` 中时，生成的查询块被命名为 `SEL$86DECE37`。清单 8-5 展示了 DML 语句中的查询块命名。\n\n\
  ### 清单 8-5. 多表插入语句中的附加查询块\n\n```\nINSERT ALL\n  INTO t1 (c1)\n   WITH q1 AS (SELECT\
  \ /*+  qb_name(qb1) */\n                     c1 FROM t1)\n       ,q2 AS (SELECT\
  \ /*+  no_merge */\n                     c2 FROM t2)\n   SELECT /*+ qb_name(qb2)\
  \ */\n          COUNT (c1)\n     FROM q1, q2 myalias\n    WHERE c1 = c2;\n\nPlan\
  \ hash value: 3420834736\n\n| Id  | Operation              | Name |\n\n|   0 | INSERT\
  \ STATEMENT       |      |\n|   1 |  MULTI-TABLE INSERT    |      |\n|   2 |   VIEW\
  \                 |      |\n|   3 |    SORT AGGREGATE      |      |\n|   4 |   \
  \  HASH JOIN          |      |\n|   5 |      TABLE ACCESS FULL | T1   |\n|   6 |\
  \      VIEW              |      |\n|   7 |       TABLE ACCESS FULL| T2   |\n|  \
  \ 8 |   INTO                 | T1   |\n```\n\n## 查询块名称 / 对象别名（由操作 ID 标识）：\n\n```\n\
  1 - SEL$1\n   2 - SEL$86DECE37 / from$_subquery$_002@SEL$1\n   3 - SEL$86DECE37\n\
  \   5 - SEL$86DECE37 / T1@QB1\n   6 - SEL$2        / MYALIAS@QB2\n   7 - SEL$2 \
  \       / T2@SEL$2\n```\n\n在 Listing 8-5 中，`INSERT`关键字之后出现的关键字`ALL`使其在语法上成为一个多表操作，尽管我们只是向`T1`插入数据。然而，与从`T2`中未合并的选择相关联的查询块（Listing\
  \ 8-5 中的操作 7）已从`SEL$1`更改为`SEL$2`。这里发生的情况是添加了一个隐藏的查询块。我们合并后的查询块名称没有改变，因为它仍然是通过将`QB1`合并到`QB2`中形成的。当我们在本章后面查看全局提示时，这一点的重要性将变得更加清晰。\n\
  \n在实际生活中，我们需要调整的语句通常比我目前给出的简单例子要复杂得多。Listing 8-6 更接近实际情况。\n\nListing 8-6. 多种查询块类型\n\
  \n```\nALTER SESSION SET star_transformation_enabled=temp_disable;\n\nINSERT /*+\
  \ APPEND */ INTO t2 (c2)\n   WITH q1\n        AS (SELECT *\n              FROM book.t1@loopback\
  \ t1)\n   SELECT\n          COUNT (*)\n     FROM (SELECT *\n             FROM q1,\
  \ t2\n            WHERE q1.c1 = t2.c2\n           UNION ALL\n           SELECT *\n\
  \             FROM t3, t4\n            WHERE t3.c3 = t4.c4\n            -- ORDER\
  \ BY 1  ... 参见下面关于列投影的解释\n           )\n         ,t3\n    WHERE c1 = c3;\n\nCOMMIT;\n\
  \nALTER SESSION SET star_transformation_enabled=false;\n\nPlan hash value: 2044158967\n\
