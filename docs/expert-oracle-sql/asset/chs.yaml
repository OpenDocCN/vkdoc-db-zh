  ```\n3 - filter(\"C\".\"CUST_LAST_NAME\"='Everett')\n   4 - access(\"ITEM_1\"=\"\
  C0\")\n   6 - access(\"ITEM_2\"=\"P\".\"PROD_ID\")\n   8 - access(\"P\".\"PROD_CATEGORY\"\
  ='Electronics')\n  18 - access(\"S\".\"CUST_ID\"=\"C0\")\n  22 - filter(\"P\".\"\
  PROD_CATEGORY\"='Electronics')\n  23 - access(ROWID=ROWID)\n  24 - access(\"P\"\
  .\"PROD_CATEGORY\"='Electronics')\n  26 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\"\
  )\n```\n\nListing 13-39 表明，即使 CBO 无法处理你编写的因子化子查询，它也能自行生成并妥善使用它们！\n\n让我们逐步分析。在第 2\
  \ 行和第 3 行，我们扫描`customers`表，找到匹配的行，并将`CUST_FIRST_NAME`和`CUST_ID`列存储在一个临时表中。第 9 行到第\
  \ 27 行与其他我们见过的执行计划非常相似，唯一的例外是在第 17 行我们使用了临时表来获取`CUST_ID`。同样，我们在第 5 行使用了同一个临时表来为选择列表获取`CUST_FIRST_NAME`。\n\
  \n请注意，没有为`SH.PRODUCTS`生成临时表；CBO 判断使用索引连接来获取`PROD_ID`（第 22 至 25 行），然后重复索引查找以获取`PROD_NAME`（第\
  \ 7 行和第 8 行）是更好的方案。这很可能是一次在成本方面非常接近的权衡。\n\n关于星型转换有很多奇怪之处。《数据仓库指南》中记录了各种限制，例如在使用绑定变量时它们不起作用。然而，有一项记录在案的限制已被证明不实。事实证明，在没有位图索引的情况下也可以使用星型转换：Oracle\
  \ 可以将 B 树索引转换为位图索引并加以利用。\n\n星型转换是本章要讨论的最后一个优化器转换，但在结束之前，我想让你快速瞥眼可能即将到来的新技术。\n\n\
  ## 未来展望\n\n本章迄今为止是本书中最长的一章，涵盖了超过两打优化器转换。然而，你可以期待更多内容的到来。2009 年，VLDB 基金会发表了一篇由 CBO\
  \ 开发团队撰写的学术论文，题为“Oracle 中的增强型子查询优化”，该文展示了未来可能发展的方向。请看一下 Listing 13-40 中的两个查询及相关执行计划。\n\
  \nListing 13-40. 子查询合并的未来\n\n```sql\n-- 原始查询\n\nSELECT prod_id\n      ,p1.prod_name\n\
  \      ,p1.prod_desc\n      ,p1.prod_category\n      ,p1.prod_list_price\n  FROM\
  \ sh.products p1\n WHERE     EXISTS\n              (SELECT 1\n                 FROM\
  \ sh.products p2\n                WHERE     p1.prod_category = p2.prod_category\n\
  \                      AND p1.prod_id <> p2.prod_id)\n       AND NOT EXISTS\n  \
  \                (SELECT 1\n                     FROM sh.products p3\n         \
  \           WHERE     p1.prod_category = p3.prod_category\n                    \
  \      AND p1.prod_id <> p3.prod_id\n                          AND p3.prod_list_price\
  \ > p1.prod_list_price);\n```\n\n```\n| Id  | Operation               | Name   \
  \              | Cost (%CPU)|\n|   0 | SELECT STATEMENT        |               \
  \       |     8   (0)|\n|*  1 |  HASH JOIN RIGHT SEMI   |                      |\
  \     8   (0)|\n|   2 |   VIEW                  | index$_join$_002     |     2 \
  \  (0)|\n|*  3 |    HASH JOIN            |                      |            |\n\
  |   4 |     INDEX FAST FULL SCAN| PRODUCTS_PK          |     1   (0)|\n|   5 | \
  \    INDEX FAST FULL SCAN| PRODUCTS_PROD_CAT_IX |     1   (0)|\n|*  6 |   HASH JOIN\
  \ ANTI        |                      |     6   (0)|\n|   7 |    TABLE ACCESS FULL\
  \    | PRODUCTS             |     3   (0)|\n|   8 |    TABLE ACCESS FULL    | PRODUCTS\
  \             |     3   (0)|\n```\n\n谓词信息（由操作 ID 标识）：\n\n```\n1 - access(\"P1\"\
  .\"PROD_CATEGORY\"=\"P2\".\"PROD_CATEGORY\")\n       filter(\"P1\".\"PROD_ID\"<>\"\
  P2\".\"PROD_ID\")\n   3 - access(ROWID=ROWID)\n   6 - access(\"P1\".\"PROD_CATEGORY\"\
  =\"P3\".\"PROD_CATEGORY\")\n       filter(\"P3\".\"PROD_LIST_PRICE\">\"P1\".\"PROD_LIST_PRICE\"\
  \ AND\n              \"P1\".\"PROD_ID\"<>\"P3\".\"PROD_ID\")\n```\n\n```sql\n--\
  \ 未来的一种转换形式\n\nSELECT p1.prod_id\n        ,p1.prod_name\n        ,p1.prod_desc\n\
  \        ,prod_category\n        ,p1.prod_list_price\n    FROM sh.products p1 JOIN\
  \ sh.products p2 USING (prod_category)\n   WHERE p1.prod_id <> p2.prod_id\nGROUP\
  \ BY p1.prod_id\n        ,p1.prod_name\n        ,p1.prod_desc\n        ,prod_category\n\
  \        ,p1.prod_list_price\n  HAVING SUM (\n            CASE\n               WHEN\
  \ p2.prod_list_price > p1.prod_list_price THEN 1\n               ELSE 0\n      \
  \      END) = 0;\n```\n\n```\n| Id  | Operation            | Name     | Cost (%CPU)|\n\
  |   0 | SELECT STATEMENT     |          |     6   (0)|\n|*  1 |  FILTER        \
  \      |          |            |\n|   2 |   HASH GROUP BY      |          |    \
  \ 6   (0)|\n|*  3 |    HASH JOIN         |          |     6   (0)|\n|   4 |    \
  \ TABLE ACCESS FULL| PRODUCTS |     3   (0)|\n|   5 |     TABLE ACCESS FULL| PRODUCTS\
  \ |     3   (0)|\n```\n\n谓词信息（由操作 ID 标识）：\n\n```\n1 - filter(SUM(CASE  WHEN \"P2\"\
  .\"PROD_LIST_PRICE\">\"P1\".\"PROD_LIST_PRIC\n              E\" THEN 1 ELSE 0 END\
  \ )=0)\n   3 - access(\"P1\".\"PROD_CATEGORY\"=\"P2\".\"PROD_CATEGORY\")\n     \
  \  filter(\"P1\".\"PROD_ID\"<>\"P2\".\"PROD_ID\"\n```\n\n\n\n代码清单 13-40 中的两个查询版本都识别出了在其所属类别中具有最高标价、但又不自成一类的产品。代码清单\
  \ 13-40 中的后一个查询，既合并（coalesced）了两个子查询，又将它们解除了嵌套（unnested）。我必须得说，我盯着已发布的查询看了好几分钟⁵，才确信它们在语义上是等价的⁶，并且这样的转换确实能带来实际益处。\n\
  \n## 总结\n\n基于成本的优化器（CBO）拥有大量的优化器转换手段。本章涵盖了其中超过两 dozen 种转换，尽管在写作时这份列表可能（虽然不太可能）是全面的，但等到本书付印时它很可能就不再全面了。然而，学习如何识别这些优化器转换，并在必要时影响其选择，对于调优复杂查询至关重要。\n\
  \n一项优化器转换可能是基于成本框架的一部分，并会基于计算出的成本收益被选择应用。然而，有几种优化器转换是启发式的，意味着它们是否被应用取决于某些固定规则。这意味着可能会应用一项导致预估成本增加的转换。当然，如果查询的实际执行时间减少了，增加的预估成本可能就无关紧要了。\n\
  \n本章应该清楚说明的一点是，人类要找出构建 SQL 语句的正确方式，以便仅通过最终状态优化就能推导出最优执行计划，有时几乎需要超凡的 SQL 技能。请记住，尽管我们都应该为所有这些优化器转换的存在而感到高兴，但我们不能固步自封，祈求\
  \ CBO 能将我们编写的任何糟糕代码转换为好代码；真正糟糕的代码仍然会迷惑 CBO。\n\n尽管如此，既然我们已经理解了第 12 章中介绍的最终状态优化过程的威力与灵活性，以及\
  \ CBO 所具备的转换的广度和复杂性，你可能会疑惑为什么市场上还有那么多 SQL 调优专家。事实是，在现实世界中，事情总会出错——而且一直在出错。让我们在第\
  \ 14 章中接下来看看这个问题。\n\n__________________\n\n¹我有理由相信在 `12.1.0.1` 版本中可能确实存在一个 bug。\n\
  ²对复杂视图合并的限制阻止了在代码清单 13-17 中进行逆向转换。\n³偶尔，除非使用提示，否则即使被引用多次，`INDEX FAST FULL SCAN`\
  \ 也可能不会被物化。\n⁴实际上，Jonathan Lewis 给我看了一个使用了 `SEMIJOIN_DRIVER` 提示的反例，但如果没有这种恶意提示，CBO\
  \ 永远不会生成这样的计划。\n⁵那篇学术论文没有使用 `SH` 示例模式，但我已经制作了一个等效的例子。\n⁶在纠正了看起来像印刷错误的问题后，它们是等价的。\n\
  \n"
