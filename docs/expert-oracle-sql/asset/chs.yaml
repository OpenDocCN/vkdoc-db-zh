  \ 要强制物化因子子查询，需使用 `MATERIALIZE` 提示符；要禁用物化，则使用 `INLINE` 提示符。\n*   `MATERIALIZE` 和\
  \ `INLINE` 提示符均不支持全局提示符语法。这些提示符必须直接放置在因子子查询内部。\n*   由于上述限制，`MATERIALIZE` 和 `INLINE`\
  \ 提示符永远不会出现在大纲提示符、SQL 基线、SQL 配置文件等之中。将提示符放置在代码中是唯一的方法！\n\n牢记以上要点，清单 13-23 展示了如何阻止因子子查询\
