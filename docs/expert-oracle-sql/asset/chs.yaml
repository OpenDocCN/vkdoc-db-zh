- "# SQL 执行计划优化与临时表统计信息设置\n\n## 执行计划对比\n\n### 初始强制执行计划（针对 3 行临时表）\n\n| Id  | Operation\
  \               | Name          | Rows  | Cost (%CPU) |\n| --- | -----------------------\
  \ | ------------- | ----- | ----------- |\n| 0   | MERGE STATEMENT         |   \
  \            | 3     | 176 (1)     |\n| 1   | MERGE                   | PAYMENTS\
  \      |       |             |\n| 2   | VIEW                    |              \
  \ |       |             |\n| 3   | HASH JOIN OUTER         |               | 3 \
  \    | 176 (1)     |\n| 4   | TABLE ACCESS FULL       | PAYMENTS_TEMP | 3     |\
  \ 2 (0)       |\n| 5   | TABLE ACCESS FULL       | PAYMENTS      | 120K  | 174 (1)\
  \     |\n\n### 针对 3 行临时表的 MERGE 语句示例\n\n```sql\nMERGE /*+ cardinality(t 10000) leading(t)\
  \ use_nl(p) */\n     INTO  payments p\n     USING payments_temp t\n        ON (p.payment_id\
  \ = t.payment_id)\nWHEN MATCHED\nTHEN\n   UPDATE SET p.employee_id = t.employee_id\n\
  \             ,p.special_flag = t.special_flag\n             ,p.paygrade = t.paygrade\n\
  \             ,p.payment_date = t.payment_date\n             ,p.job_description\
