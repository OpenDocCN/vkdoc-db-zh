- '# 第 2 章


  ![image](img/frontdot.jpg)


  ## 基于成本的优化器


  第 1 章介绍了`CBO`。`CBO`的工作是确定如何着手运行你的 SQL 语句。执行 SQL 语句的方法被称为*执行计划*，对于非常简单的语句，可能只有一种方式来完成任务。因此，可能只有一种执行计划。然而，对于绝大多数
  SQL 语句，存在不同的可能执行计划，`CBO`必须从中进行选择。在英语中，*优化*意味着从多个选项中挑选最佳方案，而在这里，`CBO`正试图从它识别出的所有可能计划中挑选最优的执行计划。


  ## 基于规则的优化器


  当数据库已挂载但未打开时，查询不能使用`CBO`，而使用基于规则的优化器（`RBO`）。在其他情况下也可以使用`RBO`，但自 Oracle 数据库 10gR1
  版本发布以来，`RBO`已不再支持通用用途。因此，在本书中我将不再进一步讨论`RBO`。


  `CBO`的绝大部分工作围绕优化查询或嵌入在`DML`或数据定义语言（`DDL`）语句中的子查询展开。对于`DML`和`DDL`语句，还有一两件其他事情需要考虑，例如是执行直接路径插入还是常规插入，但这些通常由相对固定的规则决定。为简单起见，我将忽略这些，并继续假设`CBO`的存在纯粹是为了优化查询。


  本章首先讨论`CBO`用来确定最优执行计划的标准。之后，我将介绍成本的概念，这是`CBO`量化一个计划相对于另一个计划的收益的方式。最后，我将简要概述`CBO`用来识别和评估其必须从中选择的一组计划的过程。我将在本书后面重新讨论本章介绍的主题，并进行更详细的阐述。


  ## 最优执行计划


  那么，如果优化是关于挑选最优执行计划，理解什么是最优执行计划就很重要。幸运或者说不幸的是，`CBO`对什么构成最优有一个非常简单的看法：最优执行计划是运行最快的那一个。就是这样。嗯，*几乎*就是这样。如果优化器使用`FIRST_ROWS`优化器模式之一运行，那么最优计划是最快返回前几行的计划，而不是最快返回所有行的计划。尽管如此，关键在于`CBO`不会让自己背负对资源消耗等问题的担忧。因此，例如，如果一个串行执行计划估计需要
  4.98 秒完成，而一个涉及 128 个并行查询从属进程的计划估计需要 4.97 秒完成，那么`CBO`将选择后者！也就是说，如果你允许它这样做的话。我将在本章稍后讨论优化过程，作为该讨论的一部分，我将回到并行操作的主题。


  ## 成本的定义


  因此，如果最优执行计划是最早完成的那个，那么`CBO`需要估计每个计划运行所需的时间，然后选择预测执行时间最短的那个。这个估计的执行时间被称为计划的*成本*。现在你可能会假设执行时间的单位可能是纳秒、毫秒、秒或类似的标准度量。不幸的是，由于历史原因，成本的单位被定义为单个块读取完成所需的时间长度！所以，如果`CBO`认为一个查询需要
  5 秒运行，并且单个块读取需要 10 毫秒，那么分配的成本将是 500，因为这是 5,000 毫秒除以 10 毫秒。


  ### **CBO 成本与实际成本**


  本书中使用的术语*成本*专指`CBO`对 SQL 语句执行时间的估计。当然，这个估计可能不准确。重要的是要认识到，在调优（即试图超越`CBO`的人工优化过程）时，目标是减少语句运行的实际耗时。只要语句运行速度快，`CBO`的成本估计有多高并不重要；同样，如果语句运行时间很长，即使成本估计很低，也不会令人满意。


  为了得出执行计划的成本，`CBO`不仅仅是估计单块读取的数量。它还试图计算计划中任何多块读取操作需要多长时间，以及中央处理器（`CPU`）相关操作（如内存排序）需要多长时间，并将这些时间纳入总成本。然而，奇怪的是，它将所有这些时间都转换为等效的单块读取。这里有一个例子。假设一个特定计划估计涉及：


  *   400 次单块读取

  *   300 次多块读取

  *   5 秒的`CPU`处理


  让我们进一步假设`CBO`估计：


  *   一次单块读取需要 10 毫秒

  *   一次多块读取需要 30 毫秒


  该计划的成本计算如下：


  ```

  ((400 x 10) + (300 x 30) + 5,000)/10 = 1800

  ```


  如今，执行计划通常打印时会同时显示成本和以小时、分钟、秒为单位的估计耗时，所以你不必像以前那样做那么多的数学运算了！


  ## CBO 的成本估计算法


  此时有两个大问题需要回答：执行计划的成本是如何确定的？这个猜测的准确性如何？现在我们来看看这些问题。


  ### 计算成本




  '
- '# CBO 估算过程的主要输入


  CBO 估算过程的主要输入是保存在数据字典中的 `object statistics`。这些统计信息会指出，例如，一个表有多少数据块，因此，要完整读取它需要多少次多块读取。索引也保存有统计信息，因此
  CBO 有一定的依据来估算使用索引从表中读取数据需要多少次单块读取。


  对象统计信息是 CBO 成本计算算法最重要的输入，但绝不是唯一的输入。`Initialization parameter settings`、`system statistics`、`dynamic
  sampling, SQL profiles` 以及 `SQL baselines` 都是 CBO 在进行成本估算时考虑的其他因素的例子。


  '
- '# CBO 的计划选择质量


  让我们来看看 CBO 成本估算过程的准确性，以及为什么它有时重要，有时又无关紧要。


  ## CBO 成本估算的准确性


  你可能会惊讶地发现，CBO 的成本计算经常是极不准确的！幸运的是，这些错误往往被证明是无关紧要的。假设 CBO 正在为一个查询在两个可能的执行计划之间做选择。它认为计划
  A 需要 5 秒运行，计划 B 需要 10 秒，因此选择了计划 A。现在，当使用计划 A 运行查询时，实际上可能需要 50 秒，CBO 的估算误差达到了 10
  倍。嗯，如果对计划 B 的估算也是一个很大的低估，那么这个误差就不会产生任何后果。只要使用计划 B 运行查询时，速度没有明显快于使用计划 A，那么就没有造成损害：尽管做出了极不准确的成本估算，CBO
  仍然做出了可接受的计划选择。


  在许多情况下，特别是对于交互式联机事务处理 (OLTP) 风格的查询，计划的选择是显而易见的，即使对象统计信息非常不准确或不存在，CBO 也不可能出错。例如，如果你使用所有主键列上的相等谓词从一个巨大的表中读取一行，很难想象
  CBO 会不使用主键索引。全表扫描的替代方法可能需要多花数百甚至数千倍的时间来运行，因此，即使 CBO 的成本估算偏差很大，仍然会选择正确的计划。


  ## 次优执行计划


  尽管 CBO 通常会选择可接受的执行计划，但它也经常会严重地选择次优计划，即使统计信息收集正确且是最新的。换句话说，CBO 选择的计划运行时间比另一个替代计划要长得多。我将在本书后面解释为什么这种情况经常发生。


  这些糟糕的计划选择常常不被注意的主要原因有两个：


  *   第一个原因是许多 SQL 语句的性能无关紧要。假设你有一个在夜间运行的五小时批处理作业，执行了数千个 SQL 语句。如果一个 SQL 语句需要运行 30
  秒而不是 1 秒，那通常无关紧要，特别是如果批处理中的其他语句在并发运行，而这个语句不在关键路径上。

  *   第二个原因是无法轻易知道一个 SQL 语句应该运行多长时间；人们的期望通常很低。当然，例外是当一个计划变得更糟时；你会知道新计划很差，因为你体验过之前的好计划！我冒昧地保守猜测，大多数未经专业调优的夜间批处理作业的运行时间，如果有足够的分析时间，不添加任何代码（除了添加优化器提示），至少可以减少一半。在现实生活中，调优工作通常涉及物理数据库更改，例如添加索引和重写一些代码。在这些情况下，批处理时间减少
  10 倍或更多并不少见！


  关于 CBO 经常出错的断言可能会令人惊讶。但请记住，CBO 只是对什么是正确的计划做出猜测。它无法确定。常识告诉我们，当你一次又一次地猜测时，有时会猜错，而在某些猜错的情况下，你会错得非常、非常离谱。


  现在你理解了优化和成本的概念，让我们来看看识别和计算查询各种执行计划所涉及的三个主要任务。


  '
- "# 优化过程\n\n识别和计算查询各种执行计划的三个主要任务是：\n\n*   确定要使用的并行度。\n*   确定要应用哪些转换。\n*   确定我称为 `final\
  \ state optimization` 的内容。我创造了这个术语，因为“优化”这个词有歧义。一方面，优化可以指整个过程，包括确定并行度和必要的转换。另一方面，它可以指在转换和并行度确定后，识别和计算各种执行计划的过程。为了避免混淆，我将使用术语\
  \ `final state optimization` 来指代后一个、更狭窄的概念。\n\n这三个任务并非相互独立。在不知道串行执行计划是什么样子之前，你无法真正计算出使用什么并行度。毕竟，一个表及其各个索引在数据字典中可能指定了不同的并行度。但除非知道全表扫描将在多大程度上被并行化，否则你通常无法判断使用索引还是全表扫描更好。幸运的是，你和我都不需要理解\
  \ CBO 如何理清这一切。我们只需要理解基础知识，让我们开始吧。\n\n## 并行度\n\n如果 CBO 完全不关心资源消耗，你可能想知道为什么它不大多数时候（即使不是所有时候）都使用并行查询。简短的回答是，默认情况下，CBO\
  \ 被禁止考虑并行查询、并行 DML 和并行 DDL。要允许 CBO 考虑并行查询，你需要执行以下操作之一：\n\n*   向查询添加 `PARALLEL` 优化器提示。\n\
  *   更改查询涉及的一个或多个表或索引，以指定非默认的并行度。\n*   使用 `ALTER SESSION` 语句为会话指定并行度。\n*   在系统上设置\
  \ `automatic degree of parallelism` (auto DOP)。\n\n\n\n如果你执行上述任一操作，成本优化器将被允许考虑并行操作，但在所有情况下，最大并行度都会受到限制，以确保资源消耗不会过度失控。清单\
  \ 2-1 提供了启用并行查询操作的示例。\n\n清单 2-1. 启用并行查询的不同方法\n\n```\nCREATE TABLE t\nAS\n   SELECT\
  \ ROWNUM c1 FROM all_objects;\n\nCREATE INDEX i\n   ON t (c1);\n\n--\n-- 使用优化器提示来允许成本优化器考虑并行操作\n\
  --\nEXPLAIN PLAN\n   FOR\n      SELECT /*+ parallel(10) */\n            * FROM t;\n\
  \nSELECT * FROM TABLE (DBMS_XPLAN.display);\n--\n-- 启用涉及表 T 的操作的并行操作\n--\nALTER\
  \ TABLE t PARALLEL (DEGREE 10);\n--\n-- 启用索引 I 的并行操作\n--\n\nALTER INDEX i\n   PARALLEL\
  \ (DEGREE 10);\n\n--\n-- 尝试强制所有 SQL 语句的并行查询度为 10。\n-- 请注意，FORCE 并不意味着并行性得到保证！\n\
  --\nALTER SESSION FORCE PARALLEL QUERY PARALLEL 10;\n--\n-- 为系统设置自动 DOP（以 SYS 用户登录，需要重启）\n\
  --\n\nDELETE FROM resource_io_calibrate$;\n\nINSERT INTO resource_io_calibrate$\n\
  \     VALUES (CURRENT_TIMESTAMP\n            ,CURRENT_TIMESTAMP\n            ,0\n\
  \            ,0\n            ,200\n            ,0\n            ,0);\n\nCOMMIT;\n\
  \nALTER SYSTEM SET parallel_degree_policy=auto;\n```\n\n让我们逐一看看这些示例。在创建了一个表及其关联索引后，下一条语句使用了\
  \ Oracle 数据库 11gR2 中引入的 `PARALLEL` 优化器提示的变体，为该语句启用并行度为 10 的并行查询。请注意，与 SQL 语言参考手册相反，此提示并不强制进行并行查询；它只是允许成本优化器考虑它。关键在于，某些操作，例如对非分区索引的索引范围扫描，是无法并行化的，并且在指定的并行度下，串行的索引范围扫描可能比并行的全表扫描更高效。\n\
  \n如果你真的想强制进行并行查询，可以尝试使用清单 2-1 中给出的 `ALTER SESSION` 语句。这里我也指定了要使用的并行度，并且由于同样的原因，平行性同样无法得到保证！`ALTER\
  \ SESSION` 语句所做的全部事情，就是隐式地向会话中的所有语句添加一个 `PARALLEL` 提示。\n\n**强制并行操作**\n\n如果成本优化器选择了串行索引范围扫描，而你想强制进行并行全表扫描，那么即使使用了清单\
  \ 2-1 中的 `ALTER SESSION` 语句，尽管其语句中包含了具有误导性的 `FORCE` 关键字，也可能不够。你可能还需要在代码中添加提示来强制进行全表扫描。\n\
  \n我在清单 2-1 的任何示例中都不必指定并行度。如果我没有指定，那么成本优化器将选择“理想的并行度”，即允许查询最快完成的并行度，前提是该度不超过初始化参数\
  \ `PARALLEL_DEGREE_LIMIT` 指定的值。\n\n**并行度与成本**\n\n在某些情况下，增加并行度会适得其反，原因多种多样。尽管理想的并行度反映了这一现实，但报告中显示的并行度高于理想并行度的计划的成本，将低于使用理想并行度的计划。\n\
  \n为语句启用并行查询的最终方法是使用 Oracle 数据库 11gR2 中引入的自动 DOP 功能。此功能基本上意味着，对于预计运行时间超过 10 秒的所有语句，都将使用理想的并行度。理论上，你应该使用\
  \ `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 例程来设置自动 DOP，以便成本优化器能够更准确地计算理想的并行度。实际上，成本优化器团队建议改用清单\
  \ 2-1 中的代码，该代码为输入/输出子系统指定了每秒 200 MB 的吞吐量。所有其他指标，如磁盘数量（对于企业存储来说已无意义），则未指定。无论哪种方式，你都必须重启数据库实例。\n\
  \n我曾在一个拥有 64 个处理器和 64GB 系统全局区的大型系统上尝试使用非官方方法进行自动 DOP，效果非常好。我从使用文档方法的人那里听到了好坏参半的报告。有些人很满意，有些人则报告了问题。\n\
  \n**查询转换**\n\n成本优化器在优化查询时的第二项主要任务是考虑可能应用于该语句的潜在转换。换句话说，成本优化器着眼于以更简单或更高效的方式重写语句。如今，成本优化器可以考虑很多可能的转换，我将在第\
  \ 13 章中介绍其中的大部分。\n\n查询转换有两种类型：\n\n*   *基于成本的转换*：只有当转换后查询能获得的最优计划的成本低于未转换查询能获得的最优计划的成本时，成本优化器才应应用此转换。\n\
  *   *启发式转换*：此类转换是无条件应用的，或者基于一些简单的规则。\n\n如今，绝大多数转换都是基于成本的，但有一两个不是。无论转换的类型如何，你总是可以通过优化器提示来强制或抑制它。清单\
  \ 2-2 显示了一个示例查询，其中成本优化器不恰当地应用了启发式查询转换。\n\n清单 2-2. 简单的视图合并查询转换\n\n```\nCREATE TABLE\
  \ t1\nAS\n       SELECT 1 c1\n         FROM DUAL\n   CONNECT BY LEVEL <= 100;\n\n\
  CREATE TABLE t2\nAS\n       SELECT 1 c2\n         FROM DUAL\n   CONNECT BY LEVEL\
  \ <= 100;\n\nCREATE TABLE t3\nAS\n       SELECT 1 c3\n         FROM DUAL\n   CONNECT\
  \ BY LEVEL <= 100;\n\nCREATE TABLE t4\nAS\n       SELECT 1 c4\n         FROM DUAL\n\
  \   CONNECT BY LEVEL <= 100;\n\nEXPLAIN PLAN\n   FOR\n      WITH t1t2\n        \
  \   AS (SELECT t1.c1, t2.c2\n                 FROM t1, t2\n                WHERE\
  \ t1.c1 = t2.c2)\n          ,t3t4\n           AS (SELECT t3.c3, t4.c4\n        \
  \         FROM t3, t4\n                WHERE t3.c3 = t4.c4)\n      SELECT COUNT\
  \ (*)\n        FROM t1t2 j1, t3t4 j2\n       WHERE j1.c1 + j1.c2 = j2.c3 + j2.c4;\n\
  \nSELECT * FROM TABLE (DBMS_XPLAN.display (format => 'BASIC +COST'));\n\nPAUSE\n\
  \n-- 上面的查询被转换成了下面的查询\n\nEXPLAIN PLAN\n   FOR\n      SELECT COUNT (*)\n        FROM\
  \ t1\n            ,t2\n            ,t3\n            ,t4\n       WHERE     t1.c1\
  \ = t2.c2\n             AND t3.c3 = t4.c4\n             AND t1.c1 + t2.c2 = t3.c3\
  \ + t4.c4;\n\nSELECT * FROM TABLE (DBMS_XPLAN.display (format => 'BASIC +COST'));\n\
  -- 生成的执行计划如下：\n\nPlan hash value: 2241143226\n\n| Id  | Operation              \
  \ | Name | Cost (%CPU)|\n```\n\n\n"
- '# 第 3 章


  ## 最终状态查询优化


  现在让我们简要关注一下基于成本的优化器（CBO）的基本工作。最终状态优化涉及确定：


  *   各行源的连接顺序

  *   连接机制

  *   查询中每个表的访问方法

  *   是否使用 `in-list 迭代`


  我将在第 12 章详细讨论所有这些项目。


  ## 本章小结


  本章简要介绍了一些基本的 CBO 概念，例如成本，并在较高的层次上描述了 CBO 必须做出的决策类型以及它如何做出这些决策。本书的第 3 部分完全致力于 CBO，届时我将更详细地解释查询转换和最终状态优化。现在，让我们以三个关键信息来结束本次介绍：


  *   CBO 试图在短时间内完成一项非常复杂的工作。

  *   CBO 只是一个（非常）高级的猜测机器，虽然它的猜测通常是可以接受的，但常常并非如此，并且可能出现重大的性能问题。

  *   当 CBO 错误地计算执行计划的成本时，这不应引起担忧。但如果它在一个明显更快的计划可用时选择了一个运行缓慢的计划，这就值得关注了。


  既然我已经介绍了 CBO，是时候开始看看它的输出了。第 3 章将首次探讨执行计划。


