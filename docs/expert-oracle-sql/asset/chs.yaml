  ## 基于成本的优化器


  '
- "# 第 10 章\n\n![image](img/frontdot.jpg)\n\n## 访问方法\n\n\n\n在本章中，我们将探讨运行时引擎用于访问数据库中数据的主要方法。对于每种方法，我们将提供所用算法的基本细节、执行计划操作名称，以及可用于显式指定访问方法的提示。我将首先讨论\
  \ `ROWID` 是什么，以及使用它访问表的各种方式。这将自然地引出两个章节，分别讨论使用 B 树索引和位图索引来生成 ROWID 的各种方式。本章最后三节将讨论备受非议的全表扫描、鲜为人知的\
  \ `TABLE` 和 `XMLTABLE` 操作符，以及为了完整性而涵盖的簇访问——后者大多数人永远不需要使用。\n\n### 通过 ROWID 访问\n\n\
  访问表中行的最有效方法是指定 `ROWID`。`ROWID` 有许多不同类型，我将在给出如何使用 `ROWID` 的示例之前，解释它们是什么以及它们如何与索引操作相关联。\n\
  \n### ROWID 概念\n\n`ROWID` 是寻址表中行的基本方式。`ROWID` 有几种格式：\n\n*   受限 `ROWID`（小文件表空间）\n\
  *   受限 `ROWID`（大文件表空间）\n*   扩展 `ROWID`（小文件表空间）\n*   扩展 `ROWID`（大文件表空间）\n*   通用 `ROWID`（物理）\n\
  *   通用 `ROWID`（逻辑）\n*   通用 `ROWID`（外部表）\n\n最常用的 `ROWID` 格式是小文件表空间的受限 `ROWID`。它包含以下部分：\n\
  \n*   相对文件号（10 位）\n*   块号（22 位）\n*   行号（16 位）\n\n总共 48 位，即 6 字节。前 32 位通常统称为 `相对数据块地址（RDBA）`，因为\
  \ `RDBA` 标识了表空间中的一个块。\n\n当包含被寻址行的段可以被明确确定时，会使用受限 `ROWID`，例如在行片指针中，用于非分区表的 B 树索引，以及分区表的本地索引。这种\
  \ `ROWID` 格式意味着：\n\n*   一个表、分区或子分区段最多可以有 4,294,967,296 (2³²) 个块\n*   每个块最多可以容纳 65,536\
  \ (2¹⁶) 行\n\n受限 `ROWID` 格式的一个变体用于 `大文件表空间`。大文件表空间只有一个数据文件，因此 `ROWID` 的整个前 32 位都可以用于块号，这一个数据文件可以拥有\
  \ 4,294,967,296 个块！但请注意，大文件和小文件表空间的最大块数是相同的。大文件表空间的主要目的实际上是处理那些可能达到 65,535 个数据文件限制的巨型数据库。然而，大文件表空间也可以简化管理，因为你不必持续为增长的表空间添加数据文件。大文件表空间还可以减少进程需要保持打开的文件描述符数量，这在巨型数据库上可能是一个潜在的严重问题。\n\
  \n当被引用的段存在歧义时，使用扩展 `ROWID` 格式。它们出现在分区表的全局索引中。扩展 `ROWID` 额外包含了四个字节，用于表示被引用的表、分区或子分区的数据对象\
  \ ID。\n\n通用 `ROWID` 是一个伞状类型，用于描述以下三种尚未涵盖的情况：\n\n*   逻辑 `ROWID` 包含索引组织表中行的主键及其位置的“猜测”。\n\
  *   外部 `ROWID` 包含用于访问非 Oracle 厂商数据库中数据的网关特定信息。\n*   物理 `ROWID` 就是表示为通用 `ROWID` 的扩展\
  \ `ROWID`。\n\n通用 `ROWID` 的物理表示以一个指示适用上述哪种类型的字节开始。请记住以下几点：\n\n*   任何类型为 `ROWID` 的列、表达式或变量都是扩展\
  \ `ROWID`。\n*   任何类型为 `UROWID` 的列、表达式或变量都是通用 `ROWID`。\n*   `ROWID` 伪列对于堆表或簇组织表是扩展\
  \ `ROWID`，对于索引组织表则是通用 `ROWID`。\n\n既然我们知道了 `ROWID` 是什么，就可以开始讨论如何使用它们来访问表数据了。\n\n\
  ### 通过 ROWID 访问\n\n有五种方式可以使用 `ROWID` 来访问表；它们列在表 10-1 中，随后将进行更详细的讨论。\n\n**表 10-1.\
  \ 用于表访问的四种 ROWID 方法**\n\n| 执行计划操作 | 提示 |\n| --- | --- |\n| `TABLE ACCESS BY USER\
  \ ROWID` | `ROWID` |\n| `TABLE ACCESS BY ROWID RANGE` | `ROWID` |\n| `TABLE ACCESS\
  \ BY INDEX ROWID` | 不适用 |\n| `TABLE ACCESS BY GLOBAL INDEX ROWID` | 不适用 |\n| `TABLE\
  \ ACCESS BY LOCAL INDEX ROWID` | 不适用 |\n\n当使用调用者提供的一或多个 `ROWID` 或 `UROWID` 变量访问表，或涉及\
  \ `ROWID` 伪列的使用时，执行计划中会出现 `TABLE ACCESS BY USER ROWID` 或 `TABLE ACCESS BY ROWID\
  \ RANGE` 操作。但是，当运行时引擎通过使用一个或多个索引自行识别 `ROWID` 时，则以下情况成立：\n\n*   `TABLE ACCESS BY\
  \ INDEX ROWID` 表示使用从一个或多个索引获取的受限 `ROWID` 访问非分区表。\n*   `TABLE ACCESS BY LOCAL INDEX\
  \ ROWID` 表示使用从一个或多个本地索引获取的受限 `ROWID` 访问分区或子分区。\n*   `TABLE ACCESS BY GLOBAL INDEX\
  \ ROWID` 表示使用从一个或多个全局索引获取的扩展 `ROWID` 访问分区或子分区。\n\n因为优化器在访问一个或多个索引之后才访问表，所以这三个操作没有提示。你可以提示索引访问，但如果需要表访问，它不可避免地会随之发生。\n\
  \n#### 批量行访问\n\n`TABLE ACCESS BY [LOCAL|GLOBAL] INDEX ROWID` 操作的一个变体出现在 12cR1 中。这个变体的表现是操作名称末尾出现了\
  \ `BATCHED` 这个词，大概是一种优化。然而，大多数评论者观察到，无论是否使用批量处理，运行时引擎可以应用于索引访问的各种优化都适用。关键字 `BATCHED`\
  \ 仅在特定情况下出现，并且可以使用 `BATCH_TABLE_ACCESS_BY_ROWID` 和 `NO_BATCH_TABLE_ACCESS_BY_ROWID`\
  \ 提示来强制或抑制。\n\n我将在介绍索引操作本身时提供通过索引进行 `ROWID` 访问的示例，但我将首先展示涉及直接 `ROWID` 访问的两个操作。我将从清单\
  \ 10-1 开始，该清单涉及将单个 `ROWID` 传递给语句。\n\n**清单 10-1. 通过指定单个 ROWID 访问表**\n\n```sql\nCREATE\
  \ TABLE t1\n(\n   c1   NOT NULL\n  ,c2   NOT NULL\n  ,c3   NOT NULL\n  ,c4   NOT\
  \ NULL\n  ,c5   NOT NULL\n  ,c6   NOT NULL\n)\nAS\n       SELECT ROWNUM\n      \
  \       ,ROWNUM\n             ,ROWNUM\n             ,ROWNUM\n             ,ROWNUM\n\
  \             ,ROWNUM\n         FROM DUAL\n   CONNECT BY LEVEL < 100;\n\nCREATE\
  \ BITMAP INDEX t1_bix2\n   ON t1 (c4);\n\nBEGIN\n   FOR r IN (SELECT t1.*, ORA_ROWSCN\
  \ oscn, ROWID rid\n               FROM t1\n              WHERE c1 = 1)\n   LOOP\n\
  \      LOOP\n         UPDATE /*+ TAG1 */\n               t1\n            SET c3\
  \ = r.c3 + 1\n          WHERE ROWID = r.rid AND ORA_ROWSCN = r.oscn;\n\n       \
  \  IF SQL%ROWCOUNT > 0 -- 更新成功\n         THEN\n            EXIT;\n         END IF;\n\
  \         -- 显示某种错误信息\n      END LOOP;\n   END LOOP;\nEND;\n/\n\nSELECT p.*\n  FROM\
  \ v$sql s\n      ,TABLE (\n          DBMS_XPLAN.display_cursor (sql_id => s.sql_id,\
  \ format => 'BASIC')) p\n WHERE sql_text LIKE 'UPDATE%TAG1%';\n```\n\n| Id | 操作\
  \ | 名称 |\n| --- | --- | --- |\n\n\n## B 树索引访问\n\n本节讨论 B 树索引可用于访问表数据的各种方法，下一节将讨论位图索引。表\
  \ 10-2 列举了各种 B 树访问方法。\n\n### 表 10-2. B 树索引访问方法\n\n| 执行计划操作 | 提示 | 替代提示 |\n| ---\
  \ | --- | --- |\n| `INDEX FULL SCAN` | `INDEX` |  |\n| `INDEX FULL SCAN (MIN/MAX)`\
  \ | `INDEX` |  |\n| `INDEX FULL SCAN DESCENDING` | `INDEX_DESC` |  |\n| `INDEX RANGE\
  \ SCAN` | `INDEX` | `INDEX_RS_ASC` |\n| `INDEX RANGE SCAN DESCENDING` | `INDEX_DESC`\
  \ | `INDEX_RS_DESC` |\n| `INDEX RANGE SCAN (MIN/MAX)` | `INDEX` |  |\n| `INDEX SKIP\
  \ SCAN` | `INDEX_SS` | `INDEX_SS_ASC` |\n| `INDEX SKIP SCAN DESCENDING` | `INDEX_SS_DESC`\
  \ |  |\n| `INDEX UNIQUE SCAN` | `INDEX` | `INDEX_RS_ASC` |\n| `INDEX FAST FULL SCAN`\
  \ | `INDEX_FFS` |  |\n| `INDEX SAMPLE FAST FULL SCAN` | `INDEX_FFS` |  |\n| `HASH\
  \ JOIN` | `INDEX_JOIN` |  |\n| `AND-EQUAL` | `AND_EQUAL` |  |\n\n访问 B 树索引的方式似乎多得令人眼花缭乱，但我认为我已经在上面全部列出了。让我们从详细分析顶部的\
  \ `INDEX FULL SCAN` 开始，然后快速地逐一探讨。\n\n### INDEX FULL SCAN\n\n图 10-1 提供了一个简化视图的索引，我们将以此作为指引。\n\
  \n![9781430259770_Fig10-01.jpg](img/9781430259770_Fig10-01.jpg)\n\n图 10-1. B 树索引的简化视图\n\
  \n图 10-1 描绘了一个索引根块 `A`，两个分支块 `B` 和 `C`，以及四个叶块 `D`、`E`、`F` 和 `G`。我在每个块中只画了两个索引条目。在实际中，可能有数百个条目。因此，如果每个块有\
  \ 200 个条目，那么可能有一个根块，200 个分支块，40,000 个叶块，以及这些叶块中的 8,000,000 个索引条目。\n\n一次 `INDEX FULL\
  \ SCAN` 从索引的根部开始：即图 10-1 中的块 `A`。我们使用块中的指针沿着索引结构的左侧向下遍历，直到获得包含前导索引列最小值的块，即块 `D`。然后，我们沿着叶节点上的前向指针进行访问，依次访问\
  \ `E`、`F` 和 `G`。\n\n索引扫描创建一个中间结果集，其中包含索引中的所有列以及 `ROWID`。当然，如果我们的 `WHERE` 子句中有选择谓词（或者在\
  \ `FROM` 列表中可以被视为选择谓词的谓词），那么我们可以在扫描过程中过滤掉行。同样明显的是，我们可以丢弃任何不需要的列，并根据选择列表中的表达式创建新列。\n\
  \n代码清单 10-1 创建了一个表和一个关联的索引，然后执行一个 PL/SQL 块，该块演示了所谓的`乐观锁定`中所涉及的基本技术，用于交互式应用程序。其思想是，当数据显示给用户时（未显示），会保存\
  \ `ROWID` 和 `ORA_ROWSCN` 伪列。如果用户决定更新显示的行，则通过指定先前保存的 `ROWID` 来直接更新。在行显示后和更新前之间，如果其他用户更改了该行，将反映在\
  \ `ORA_ROWSCN` 伪列的变化中。更新语句中的谓词 `ORA_ROWSCN = r.oscn` 用于确保没有发生此类更改。\n\n请注意，我应用了两个我最喜欢的技巧：第一，使用返回单行的游标以避免声明\
  \ PL/SQL 变量；第二，通过横向连接和 PL/SQL 代码中类似提示的标签来提取嵌入式 `UPDATE` 语句的执行计划。这与我在代码清单 8-9 中使用的方法相同。\n\
  \n代码清单 10-1 涵盖了使用 `ROWID` 访问单行。也可以使用 `ROWID` 来指定一个物理行范围。这种机制最常见的用途是手动并行化查询或更新。代码清单\
  \ 10-2 展示了如何更新 `T1` 中的第二组十行。\n\n代码清单 10-2. 更新表中间范围的一组行\n\n```\nMERGE /*+ rowid(t1)leading(q)\
  \ use_nl(t1) */\n     INTO  t1\n     USING (WITH q1\n                 AS (  SELECT\
  \ /*+ leading(a) use_nl(b) */  ROWID rid, ROWNUM rn\n                         FROM\
  \ t1\n                     ORDER BY ROWID)\n            SELECT a.rid min_rid, b.rid\
  \ max_rid\n              FROM q1 a, q1 b\n             WHERE a.rn = 11 AND b.rn\
  \ = 20) q\n        ON (t1.ROWID BETWEEN q.min_rid AND q.max_rid)\nWHEN MATCHED\n\
  THEN\n   UPDATE SET c3 = c3 + 1;\n```\n\n```\n| Id  | Operation                \
  \            | Name                        |\n|   0 | MERGE STATEMENT          \
  \            |                             |\n|   1 |  MERGE                   \
  \            | T1                          |\n|   2 |   VIEW                   \
  \            |                             |\n|   3 |    NESTED LOOPS          \
  \            |                             |\n|   4 |     VIEW                 \
  \            |                             |\n|   5 |      TEMP TABLE TRANSFORMATION\
  \       |                             |\n|   6 |       LOAD AS SELECT          \
  \       | SYS_TEMP_0FD9D6626_47CA26D6 |\n|   7 |        SORT ORDER BY          \
  \       |                             |\n|   8 |         COUNT                 \
  \       |                             |\n|   9 |          BITMAP CONVERSION TO ROWIDS\
  \ |                             |\n|  10 |           BITMAP INDEX FAST FULL SCAN|\
  \ T1_BIX2                     |\n|  11 |       NESTED LOOPS                   |\
  \                             |\n|  12 |        VIEW                          |\
  \                             |\n|  13 |         TABLE ACCESS FULL            |\
  \ SYS_TEMP_0FD9D6626_47CA26D6 |\n|  14 |        VIEW                          |\
  \                             |\n|  15 |         TABLE ACCESS FULL            |\
  \ SYS_TEMP_0FD9D6626_47CA26D6 |\n|  16 |     TABLE ACCESS BY ROWID RANGE      |\
  \ T1                          |\n```\n\n试着想象 `T1` 中有 100,000,000 行而不是 100 行。想象有十个线程，每个线程对\
  \ 1,000,000 行执行一些复杂操作，而不是如代码清单 10-2 所示，对 100 行中的第二组十行执行微不足道的操作。\n\n代码清单 10-2 中 `MERGE`\
  \ 语句的子查询确定了表中的第十一个和第二十个 `ROWID`，然后用它们来指示要更新的表的物理部分。由于表 `T1` 非常小，需要使用一些提示，包括 `ROWID`\
  \ 提示，来演示 `TABLE ACCESS BY ROWID RANGE` 操作，否则 CBO 会相当正确地认为该操作效率低下。\n\n当然，代码清单 10-2\
  \ 是高度人工构造的。这个示例的几个问题之一是我编写它的方式暗示了识别 `ROWID` 范围的工作被假想的十个线程中的每一个复制了。更好的方法是利用数据字典视图\
  \ `DBA_EXTENTS` 中的信息，一次性为所有线程完成 `ROWID` 范围的识别。实际上，有一个包——`DBMS_PARALLEL_EXECUTE`——可以为你完成这项工作。更多详细信息，请参阅\
  \ PL/SQL 包和类型参考手册。\n\n\n如果我们只需要该表中位于索引中的列，则无需执行更多操作。至此已完成。然而，大多数情况下，我们会使用 `ROWID`\
  \ 通过 `TABLE ACCESS BY [LOCAL|GLOBAL] INDEX ROWID` 操作来访问关联的表、表分区或表子分区。\n\n请注意以下几点：\n\
  \n*   图中块的布局纯粹是逻辑顺序。磁盘上的顺序可能大不相同。\n*   因此，我们必须使用单块读取并遵循指针。这可能会降低速度。\n*   `INDEX\
  \ FULL SCAN` 返回的行会自动按索引列排序，因此这种访问方法可能避免排序。这可以加快速度。\n\nListing 10-3 是一个使用 `INDEX`\
  \ 提示强制进行 `INDEX FULL SCAN` 的示例：\n\nListing 10-3. INDEX FULL SCAN 操作\n\n```\nCREATE\
  \ INDEX t1_i1\n   ON t1 (c1, c2);\n\nSELECT /*+ index(t1 (c1,c2)) */ * FROM t1;\n\
  \n| Id  | Operation                   | Name  |\n\n|   0 | SELECT STATEMENT    \
  \        |       |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |\n|   2 |   INDEX\
  \ FULL SCAN           | T1_I1 |\n```\n\nListing 10-3 在 `T1` 上创建了一个多列索引。SELECT 语句包含一个指定使用该索引的提示。\n\
  \n![image](img/sq.jpg) **注意** 请注意，提示中并未使用索引的名称。合法且实际上是推荐的做法是，在括号中指定要使用的索引列，而不是索引名称本身。这是为了确保如果有人重命名索引，提示不会失效。执行计划\
  \ `OUTLINE` 部分中显示的所有索引提示都使用此方法。\n\n在某些情况下，优化器可以在此处做出巨大改进，并在所谓的 `INDEX FULL SCAN`\
  \ 掩护下执行完全不同的操作。Listing 10-4 展示了在索引列上使用的聚合操作：\n\nListing 10-4. 带 MIN/MAX 优化的 INDEX\
  \ FULL SCAN\n\n```\n SELECT /*+ index(t1 (c1,c2)) */\n            MAX (c1) FROM\
  \ t1;\n\n| Id  | Operation                  | Name  |\n\n|   0 | SELECT STATEMENT\
  \           |       |\n|   1 |  SORT AGGREGATE            |       |\n|   2 |   INDEX\
  \ FULL SCAN (MIN/MAX)| T1_I1 |\n```\n\n在 Listing 10-4 中实际发生的是，我们使用树的后沿从索引的根块向下移动。在本例中，后沿是\
  \ `A`、`C` 和 `G`。我们可以直接确定 `C1` 的最大值，而无需扫描整个索引。不必担心 `SORT AGGREGATE`。正如我在第 3 章中解释的那样，`SORT\
  \ AGGREGATE` 操作从不排序。\n\n我在 2009 年 9 月的博客中研究了 Oracle Database 10g 的许多限制和特殊情况，见此处：\n\
  \n```\nhttp://tonyhasler.wordpress.com/2009/09/08/index-full-scan-minmax/\n```\n\
  \n我怀疑这是一个不断变化的目标，我那时说的很多内容可能在 Oracle Database 的后续版本中不再适用，因此如果您正在寻找此操作却无法使其工作，可能只需稍微调整一下您的谓词。\n\
  \n还有一个 `INDEX FULL SCAN DESCENDING` 操作。它从最大值开始，并使用向后指针在索引中回溯。区别在于行以降序返回，这可以避免排序，如\
  \ Listing 10-5 所示。\n\nListing 10-5. `INDEX FULL SCAN DESCENDING`\n\n```\n SELECT\
  \ /*+ index_desc(t1 (c1,c2)) */\n        *\n    FROM t1\nORDER BY c1 DESC, c2 DESC;\n\
  \n| Id  | Operation                   | Name  |\n\n|   0 | SELECT STATEMENT    \
  \        |       |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |\n|   2 |   INDEX\
  \ FULL SCAN DESCENDING| T1_I1 |\n```\n\n请注意，尽管存在 `ORDER BY` 子句，但没有排序操作。现在，让我们继续讨论列表中的下一个访问方法。\n\
  \n## INDEX RANGE SCAN\n\n`INDEX RANGE SCAN` 与 `INDEX FULL SCAN` 非常相似。事实上，它们如此相似，以至于使用了相同的提示来选择它。区别在于，当查询块中存在对索引的一个或多个前导列的合适谓词时，我们可能能够从中间某处开始和/或在中间某处停止扫描叶子块。在上面的图中，谓词\
  \ `C1 BETWEEN 3 AND 5` 将使我们能够从根块 `A` 下到 `B`，读取 `E` 和 `F`，然后停止。Listing 10-6 演示了这一点：\n\
  \nListing 10-6. INDEX RANGE SCAN\n\n```\n SELECT /*+ index(t1 (c1,c2)) */\n    \
  \        *\n        FROM t1\n       WHERE c1 BETWEEN 3 AND 5;\n\n| Id  | Operation\
  \                   | Name  |\n\n|   0 | SELECT STATEMENT            |       |\n\
  |   1 |  TABLE ACCESS BY INDEX ROWID| T1    |\n|   2 |   INDEX RANGE SCAN      \
  \    | T1_I1 |\n```\n\n当 `INDEX RANGE SCAN` 可用时，执行 `INDEX FULL SCAN` 是没有意义的，优化器永远不会选择它。我猜这就是为什么\
  \ `INDEX RANGE SCAN` 的单独提示没有被记录的原因。\n\n有些人会推荐使用替代的、未记录在案的 `INDEX_RS_ASC` 提示，因为它更具体。就我个人而言，我对使用未记录在案的提示毫无顾虑，但当存在一个已记录的提示时，我看不出这样做的意义！\n\
  \n我关于 `INDEX FULL SCANS` 的评论同样适用于 `INDEX RANGE SCANS`。\n\n*   我们必须使用单块读取并遵循指针。这可能会降低速度。\n\
  *   `INDEX RANGE SCAN` 返回的行会自动按索引列排序，因此这种访问方法可能避免排序。这可以加快速度。\n\n`INDEX RANGE SCAN\
  \ DESCENDING` 是 `INDEX RANGE SCAN` 的降序变体，在 Listing 10-7 中展示。\n\nListing 10-7. `INDEX\
  \ RANGE SCAN DESCENDING`\n\n```\n SELECT /*+ index_desc(t1 (c1,c2)) */\n       \
  \       *\n          FROM t1\n         WHERE c1 BETWEEN 3 AND 5\n      ORDER BY\
  \ c1 DESC;\n\n| Id  | Operation                    | Name  |\n\n|   0 | SELECT STATEMENT\
  \             |       |\n|   1 |  TABLE ACCESS BY INDEX ROWID | T1    |\n|   2 |\
  \   INDEX RANGE SCAN DESCENDING| T1_I1 |\n```\n\nListing 10-8 显示，`MIN/MAX` 优化可以像用于\
  \ `INDEX FULL SCAN` 一样用于范围扫描。\n\nListing 10-8. 带 MIN/MAX 优化的 INDEX RANGE SCAN\n\n\
  ```\n SELECT /*+ index(t1 (c1,c2)) */\n              MIN (c2)\n          FROM t1\n\
  \         WHERE c1 = 3\n      ORDER BY c1 DESC;\n\n| Id  | Operation           \
  \         | Name  |\n\n|   0 | SELECT STATEMENT             |       |\n|   1 | \
  \ SORT AGGREGATE              |       |\n|   2 |   FIRST ROW                  |\
  \       |\n|   3 |    INDEX RANGE SCAN (MIN/MAX)| T1_I1 |\n```\n\n请注意突然出现了一个额外的操作——`FIRST\
  \ ROW`。当使用 `MIN/MAX` 优化时，它有时会出现。我还没弄清楚它的含义，我建议您直接忽略它。\n\n`INDEX RANGE SCAN` 要求在索引的前导列上存在合适的谓词。如果存在一个或多个非前导列上的谓词但没有前导列上的谓词，会发生什么？`INDEX\
  \ SKIP SCAN` 就是这种情况下的一个选项。\n\n## INDEX SKIP SCAN\n\n如果前导列的唯一值数量很少，那么一系列范围扫描（前导列的每个值一个）可能比\
  \ `INDEX FULL SCAN` 更高效。当前导列的值改变时，`INDEX SKIP SCAN` 操作会回溯 B-tree，然后再次下降以查找与新前导列值相关的范围。Listing\
  \ 10-9 演示了这个操作。\n\n\n### 索引跳跃扫描\n\n```\nSELECT /*+ index_ss(t1 (c1,c2)) */\n   \
  \           *\n          FROM t1\n         WHERE c2 = 3\n      ORDER BY c1, c2;\n\
  \n| Id  | Operation                   | Name  |\n\n|   0 | SELECT STATEMENT    \
  \        |       |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |\n|   2 |   INDEX\
  \ SKIP SCAN           | T1_I1 |\n```\n\nListing 10-10 展示了其降序变体。\n\n### 索引跳跃扫描降序\n\
  \n```\nSELECT /*+ index_ss_desc(t1 (c1,c2)) */\n              *\n          FROM\
  \ t1\n         WHERE c2 = 3\n      ORDER BY c1 DESC, c2 DESC;\n\n| Id  | Operation\
  \                   | Name  |\n\n|   0 | SELECT STATEMENT            |       |\n\
  |   1 |  TABLE ACCESS BY INDEX ROWID| T1    |\n|   2 |   INDEX SKIP SCAN DESCENDING|\
  \ T1_I1 |\n```\n\n顺便提一下，在 Oracle Database 10g 中，无法同时请求使用某个索引 **并且** 指定不使用 `INDEX\
  \ SKIP SCAN`。但现在这已不再是限制。只需使用 `INDEX` 提示，你就会得到一个 `INDEX FULL SCAN`。\n\n### 索引唯一扫描\n\
  \n当从唯一索引中最多访问一行时，会使用 `INDEX UNIQUE SCAN`。这是一个单独的操作，因为它的实现方式比从非唯一索引中读取恰好只有一行的数据更高效。Listing\
  \ 10-11 创建了一个唯一索引，然后展示了该操作。\n\n### 索引唯一扫描\n\n```\nCREATE UNIQUE INDEX t1_i2\n  \
  \ ON t1 (c2);\n\nSELECT /*+ index(t1 (c2)) */\n            *\n        FROM t1\n\
  \       WHERE c2 = 1;\n\n| Id  | Operation                   | Name  |\n\n|   0\
  \ | SELECT STATEMENT            |       |\n|   1 |  TABLE ACCESS BY INDEX ROWID|\
  \ T1    |\n|   2 |   INDEX UNIQUE SCAN         | T1_I2 |\n```\n\n请注意，此执行计划没有“降序”变体，因为我们只检索单行数据。\n\
  \n### 索引快速全扫描\n\n下一种索引访问方法是 `INDEX FAST FULL SCAN`。嗯，我们都喜欢 *快* 这个词，不是吗？显而易见的问题是：如果有一个快速的（全扫描），为什么我们还需要那个慢的？事实是，`INDEX\
  \ FAST FULL SCAN` 有一个很大的限制，并且并不总是比常规的 `INDEX FULL SCAN` 更快。\n\n`INDEX FAST FULL\
  \ SCAN` 通过多块读取来读取整个索引。忘掉那些烦人的指针吧。直接把整个索引吸进来！\n\n当然，多块读取始终是读取大量数据时比单块读取更快的方式。但是：\n\
  \n*   我们读取的是索引中的 **所有** 数据——而不仅仅是我们需要的叶块。\n*   数据是按物理顺序提供的，而不是逻辑顺序。\n\n关于第一点，这并不太重要。索引中几乎所有的块都是叶块，所以我们只是丢弃了很小一部分。至于第二点，我们可能并不关心顺序。即使关心顺序，将\
  \ `INDEX FAST FULL SCAN` 与显式排序相结合，也可能比其他访问方法成本更低。\n\n关于 `INDEX FAST FULL SCAN` 真正令人失望的是，与迄今为止讨论的所有其他索引访问方法不同，我们不能使用\
  \ ROWID 来访问表。至于为什么开发人员施加了这个限制，我也不知道。\n\n如果你是因为刚刚接到性能问题的电话，怀疑使用 `INDEX FAST FULL\
  \ SCAN` 随后进行表访问会有所帮助才阅读本文，请直接跳到 第 19 章，我在那里记录了一种解决方法。\n\nListing 10-12 展示了该操作。\n\
  \n### 索引快速全扫描\n\n```\nSELECT /*+ index_ffs(t1 (c1, c2)) */\n            c1, c2\n\
  \        FROM t1\n       WHERE c2 = 1;\n\n| Id  | Operation            | Name  |\n\
  \n|   0 | SELECT STATEMENT     |       |\n|   1 |  INDEX FAST FULL SCAN| T1_I1 |\n\
  ```\n\n这个例子表明，我们不一定需要索引中的所有行才能使用 `INDEX FAST FULL SCAN`；我们的 `WHERE` 子句可以自由地过滤掉其中一些行。当然，如果你想使用索引但不希望使用快速全扫描，请使用\
  \ `INDEX` 或 `INDEX_DESC` 提示。\n\n### 索引采样快速全扫描\n\n最后一种仅使用单个 B 树索引的访问方法，可能最常被 `DBMS_STATS`\
  \ 包在收集索引统计信息时使用。它仅在与快速全扫描结合进行采样时使用。Listing 10-13 进行了演示。\n\n### 索引采样快速全扫描\n\n```\n\
  SELECT /*+ index_ffs(t1 (c1, c2)) */\n            c1, c2\n        FROM t1 SAMPLE\
  \ (5);\n\n| Id  | Operation                   | Name  |\n\n|   0 | SELECT STATEMENT\
  \            |       |\n|   1 |  INDEX SAMPLE FAST FULL SCAN| T1_I1 |\n```\n\n迄今为止讨论的所有访问方法都只涉及单个\
  \ B 树索引。Oracle 数据库的所有版本中都提供两种允许组合 B 树索引的访问方法。现在让我们看看第一种。\n\n## 索引连接\n\nListing 10-14\
  \ 展示了一个使用 `HR` 示例模式中的表的 `INDEX JOIN` 示例。\n\n### 索引连接示例\n\n```\nSELECT\n      e.first_name\n\
  \  FROM hr.employees e\n WHERE e.manager_id >=100 AND e.last_name LIKE '%ran%';\n\
  \n| Id  | Operation              | Name             |\n\n|   0 | SELECT STATEMENT\
  \       |                  |\n|*  1 |  VIEW                  | index$_join$_001\
  \ |\n|*  2 |   HASH JOIN            |                  |\n|*  3 |    INDEX RANGE\
  \ SCAN    | EMP_MANAGER_IX   |\n|*  4 |    INDEX FAST FULL SCAN| EMP_NAME_IX   \
  \   |\n```\n\nListing 10-14 将 `EMPLOYEES` 表上的两个索引像表本身一样进行连接。连接的列是表的 ROWID。实际上发生的是，Listing\
  \ 10-14 被转换成了 Listing 10-15。\n\n### 手动转换的索引连接\n\n```\nWITH q1\n     AS (SELECT /*+\
  \ no_merge */ first_name, ROWID r1\n           FROM hr.employees\n          WHERE\
  \ last_name LIKE '%ran%')\n    ,q2\n     AS (SELECT /*+ no_merge */ ROWID r2\n \
  \          FROM hr.employees\n          WHERE manager_id >=100)\nSELECT first_name\n\
  \  FROM q1, q2\n WHERE r1 = r2;\n```\n\nListing 10-15 中的子查询 `Q1` 可以通过对 `EMP_NAME_IX`\
  \ 索引的范围扫描来满足，无需访问表本身，因为我们选择的列都来自索引。子查询 `Q2` 同样可以将其访问限制在 `EMP_MANAGER_IX` 索引上。主查询然后使用来自两个索引的\
  \ ROWID 来连接两个子查询的结果。\n\n请注意，索引连接只有在从被连接索引所属的表中所需的列都存在于索引中时才可能实现。然而，在某些情况下，可以将索引连接与常规的表连接结合使用，如\
  \ Listing 10-16 所示。\n\n### 复杂的 INDEX JOIN 示例\n\n```\nSELECT /*+ leading(e) index_join(e)\
  \ */\n            e.first_name, m.last_name\n        FROM hr.employees e, hr.employees\
  \ m\n       WHERE     m.last_name = 'Mourgos'\n             AND e.manager_id = m.employee_id\n\
  \             AND e.last_name = 'Grant'\n             AND e.department_id = 50;\n\
  \n| Id  | Operation                    | Name              |\n```\n\n\n"
- "# Oracle 执行计划与索引技术\n\n## 索引连接\n\n```\n|   0 | SELECT STATEMENT             |  \
  \                 |\n|   1 |  NESTED LOOPS                |                   |\n\
  |   2 |   NESTED LOOPS               |                   |\n|*  3 |    VIEW    \
  \                  | index$_join$_001  |\n|*  4 |     HASH JOIN                |\
  \                   |\n|*  5 |      HASH JOIN               |                  \
  \ |\n|*  6 |       INDEX RANGE SCAN       | EMP_DEPARTMENT_IX |\n|*  7 |       INDEX\
  \ RANGE SCAN       | EMP_NAME_IX       |\n|   8 |      INDEX FAST FULL SCAN    |\
  \ EMP_MANAGER_IX    |\n|*  9 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK    \
  \ |\n|* 10 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES         |\n```\n\n由于姓氏为 Grant\
  \ 的员工只有两位，并且其中只有一位的经理是 Mourgos，因此对于这个特定查询来说，出于性能考虑，索引连接并不合适，但我们可以使用提示来演示。\n\n请注意，对`M.LAST_NAME`的引用并不妨碍索引连接，因为它并非来自表别名为`E`的`EMPLOYEES`表副本。\n\
  \n*   索引连接要求被连接的索引中引用的列是唯一被引用的。你甚至不能引用 ROWID！\n*   索引连接只可能在一组连接表中的第一个表上进行（因此使用了上面的`LEADING`提示）。\n\
  *   当合法时，可以使用`INDEX_JOIN`提示强制使用索引连接，如上面的清单 10-16 所示。\n\n如果你确实看到索引连接频繁发生，你可能需要考虑创建一个多列索引，因为这将比索引连接稍微高效一些，但根据我的经验，索引连接通常不是严重性能问题的根源。\n\
  \n你可能认为，即使你想引用主表中的行，索引连接有时也可能是合适的。嗯，确实有办法做到这一点。\n\n## AND_EQUAL\n\n清单 10-17 展示了`AND_EQUAL`访问方法，但优化器除非被提示，否则不再使用它，并且该提示已弃用。\n\
  \n清单 10-17. 已弃用的 AND_EQUAL 访问方法\n\n```\nSELECT /*+ and_equal(e (manager_id) (job_id))\
  \ */\n      employee_id\n      ,first_name\n      ,last_name\n      ,email\n  FROM\
  \ hr.employees e\n WHERE e.manager_id = 124 AND e.job_id = 'SH_CLERK';\n\n| Id \
  \ | Operation                   | Name           |\n\n|   0 | SELECT STATEMENT \
  \           |                |\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES\
  \      |\n|   2 |   AND-EQUAL                 |                |\n|*  3 |    INDEX\
  \ RANGE SCAN         | EMP_MANAGER_IX |\n|*  4 |    INDEX RANGE SCAN         | EMP_JOB_IX\
  \     |\n```\n\n清单 10-17 展示了如前所述合并两组 ROWID 的过程（但可能使用了不同的机制），然后我们使用 ROWID 来访问表并获取额外的列。\n\
  \n*   这是一个已弃用的特性。\n*   存在诸多限制，其中之一是索引必须是单列的、非唯一索引。\n*   它需要`AND_EQUAL`提示。除非被提示，否则优化器永远不会生成此计划。\n\
  *   这种机制很少能带来性能提升，但如果确实有提升，通常也需要一个多列索引。\n*   无论是标准版用户还是企业版用户，都有替代方法。我们将在第 19 章讨论一个适用于标准版用户的选项。下一节关于位图索引的内容将展示几种供企业版用户组合索引的方法。\n\
  \n## 位图索引访问\n\n位图索引的物理结构实际上与 B 树索引非常相似，其根块和分支块结构完全相同。\n\n区别在于叶块。假设我们在`T1`表的`C1`列上有一个\
  \ B 树索引，并且`T1`中有 100 行的`C1`值为'X'。B 树索引将包含 100 个索引条目，每个条目都有表中特定匹配行的 ROWID。\n\n\n\n\
  ## 位图索引结构与压缩\n\n位图索引会为值'X'生成一个位图，该位图为表或分区中的每一行对应一个比特位；对于表中`C1`列值为'X'的 100 行，对应的比特位会被置位，其余行的比特位则保持清零状态。\n\
  \n叶块中的这些位图会经过压缩以清除长段的清零位，因此表中数据越聚集，索引体积就越小。这种压缩通常意味着，即使每个值平均只对应两行数据，位图索引也会比对应的 B\
  \ 树索引更小。\n\n## 位图索引的限制与访问\n\n需要始终记住，位图是受限制 ROWID 集合的表示。因此，不可能：\n*   创建全局位图索引；\n\
  *   将全局索引中的 ROWID 转换为位图；或\n*   将类型为 ROWID 或 UROWID 的变量或表达式转换为位图。\n\n访问位图索引的操作与 B\
  \ 树索引的操作相似（参见表 10-3）。\n\n表 10-3。位图索引访问操作\n\n| 执行计划操作 | 提示 | 替代提示 |\n| --- | ---\
  \ | --- |\n| `BITMAP INDEX SINGLE VALUE` | `INDEX` | `BITMAP_TREE` / `INDEX_RS_ASC`\
  \ |\n| `BITMAP INDEX RANGE SCAN` | `INDEX` | `BITMAP_TREE` /`INDEX_RS_ASC` |\n|\
  \ `BITMAP INDEX FULL SCAN` | `INDEX` | `BITMAP_TREE` |\n| `BITMAP INDEX FAST FULL\
  \ SCAN` | `INDEX_FFS` |  |\n| `BITMAP CONSTRUCTION` | N/A |  |\n| `BITMAP COMPACTION`\
  \ | N/A |  |\n\n查看表 10-3 可以注意到以下几点：\n*   没有降序或跳跃扫描的变体。\n*   没有可用的`MIN`/`MAX`优化。\n\
  *   没有`UNIQUE`选项——这并不奇怪，因为唯一位图索引这种愚蠢的想法甚至不被支持。\n\n`BITMAP INDEX SINGLE VALUE`操作用于为索引中的列提供了相等谓词的情况，意味着处理单个位图。\n\
  \n提供`BITMAP CONSTRUCTION`和`BITMAP COMPACTION`是为了完整性。如果你对`CREATE BITMAP INDEX`或`ALTER\
  \ INDEX...REBUILD`命令运行`EXPLAIN PLAN`，你会看到这些操作出现。它们是 DDL 特定的操作。\n\n## 位图操作概览\n\n\
  除了在索引中访问位图，我们还可以对位图做更多事情。表 10-4 展示了完整的操作集。\n\n表 10-4。位图操作\n\n| 执行计划操作 | 提示 | 替代提示\
  \ |\n| --- | --- | --- |\n| `BITMAP CONVERSION FROM ROWIDS` |  |  |\n| `BITMAP CONVERSION\
  \ TO ROWIDS` |  |  |\n| `BITMAP AND` | `INDEX_COMBINE` | `BITMAP_TREE` |\n| `BITMAP\
  \ OR` | `INDEX_COMBINE` | `BITMAP_TREE` |\n| `BITMAP MINUS` | `INDEX_COMBINE` |\
  \ `BITMAP_TREE` |\n| `BITMAP MERGE` | `INDEX_COMBINE` | `BITMAP_TREE` |\n| `BITMAP\
  \ CONVERSION COUNT` |  |  |\n| `BITMAP KEY ITERATION` | `STAR_TRANSFORMATION` |\
  \  |\n\n操作`BITMAP CONVERSION FROM ROWIDS`用于将来自 B 树索引的受限 ROWID 转换为位图，而操作`BITMAP CONVERSION\
  \ TO ROWIDS`用于将位图转换回受限 ROWID。\n\n`BITMAP AND`、`BITMAP OR`和`BITMAP MINUS`操作按照预期的方式执行布尔代数运算；可以形成复杂的位图操作树。`BITMAP\
  \ MERGE`操作类似于`BITMAP OR`，但用于 ROWID 集合已知不相交的某些上下文。\n\n通常，在完成所有这些位图操作后，最终结果会传递给`BITMAP\
  \ CONVERSION TO ROWIDS`操作。然而，有时我们只想要行数的计数。这可以通过`BITMAP CONVERSION COUNT`操作完成。\n\n\
  `BITMAP KEY ITERATION`操作用于星型转换，我们将在第 13 章中讨论。\n\n在一个查询中看到大量位图操作并不少见，如清单 10-18 所示。\n\
  \n清单 10-18。位图操作示例\n\n```\nCREATE INDEX t1_i3\n   ON t1 (c5);\n\nCREATE BITMAP INDEX\
  \ t1_bix1\n   ON t1 (c3);\n\nSELECT /*+ index_combine(t)no_expand */\n         *\n\
  \        FROM t1 t\n       WHERE (c1 > 0 AND c5 = 1 AND c3 > 0) OR c4 > 0;\n\n|\
  \ Id  | Operation                         | Name    |\n\n|   0 | SELECT STATEMENT\
  \                  |         |\n|   1 |  TABLE ACCESS BY INDEX ROWID      | T1 \
  \     |\n|   2 |   BITMAP CONVERSION TO ROWIDS     |         |\n|   3 |    BITMAP\
  \ OR                      |         |\n|   4 |     BITMAP MERGE                \
  \  |         |\n|   5 |      BITMAP INDEX RANGE SCAN      | T1_BIX2 |\n|   6 | \
  \    BITMAP AND                    |         |\n|   7 |      BITMAP CONVERSION FROM\
  \ ROWIDS|         |\n|   8 |       INDEX RANGE SCAN            | T1_I3   |\n|  \
  \ 9 |      BITMAP MERGE                 |         |\n|  10 |       BITMAP INDEX\
  \ RANGE SCAN     | T1_BIX1 |\n|  11 |      BITMAP CONVERSION FROM ROWIDS|      \
  \   |\n|  12 |       SORT ORDER BY               |         |\n|  13 |        INDEX\
  \ RANGE SCAN           | T1_I1   |\n\n```\n\n清单 10-18 开始时创建了另外两个索引。该查询的执行计划看起来有点吓人，但阅读此类执行计划时首先要明白的是不要惊慌。如果你一步一步地看，就能轻松理解它们。\n\
  \n让我们从操作 5 开始，这是第一个没有子节点的操作。它在`T1_BIX2`上执行`BITMAP INDEX RANGE SCAN`，该索引基于列`C4`。此范围扫描将可能处理与`C4`不同值关联的多个位图，这些位图由操作\
  \ 4 合并。这个合并后的位图代表了第 3 行`BITMAP OR`的第一个操作数。然后我们继续查看`BITMAP OR`的第二个操作数，它由第 6 行的操作及其子节点定义。\n\
  \n现在我们看操作 8，这是第二个没有子节点的操作。这是在`T1_I3`上的`INDEX RANGE SCAN`，`T1_I3`是基于`C5`的 B 树索引。这里我们有一个相等谓词`C5\
  \ = 1`，这意味着返回的所有行具有相同的索引键值。一个鲜为人知的事实是，具有相同键值的非唯一索引条目会按 ROWID 排序。这意味着`INDEX RANGE\
  \ SCAN`返回的所有行都将按 ROWID 顺序排列，并且可以通过操作 7 直接转换为位图。这个`BITMAP MERGE`构成了第 6 行`BITMAP AND`操作的第一个操作数。\n\
  \n我们继续看第 10 行，在`T1_BIX1`上的`INDEX RANGE SCAN`，`T1_BIX1`是基于`C3`的位图索引。同样，`C3`可能有多个值，因此各个位图需要由第\
  \ 9 行合并，最终形成操作 6（即`BITMAP AND`）的第二个操作数。\n\n但是操作 6 还有第三个操作数。我们通过查看第 13 行开始评估这第三个操作数，这是在`T1_I1`上的`INDEX\
  \ RANGE SCAN`，`T1_I1`是基于`C1`和`C2`的 B 树索引。由于范围扫描可能覆盖多个键值，索引条目可能不会按 ROWID 顺序返回；我们需要在第\
  \ 12 行对 ROWID 进行排序，然后在第 11 行将它们转换为位图。\n\n现在我们有了第 6 行`BITMAP AND`操作的三个操作数和第 3 行`BITMAP\
  \ OR`操作的两个操作数。在完成所有位图操作后，最终的位图在第 2 行转换为一组 ROWID，这些 ROWID 最终在第 1 行用于访问表。\n\n清单 10-19\
  \ 对清单 10-18 稍作修改，返回行数计数而不是内容；我们可以看到，将位图转换为 ROWID 的操作可以被消除。\n\n清单 10-19。`BITMAP CONVERSION\
  \ COUNT`示例\n\n```\nSELECT /*+ index_combine(t) */\n            COUNT (*)\n     \
  \   FROM t1 t\n       WHERE (c1 > 0 AND c5 = 1 AND c3 > 0) OR c4 > 0;\n\n| Id  |\
  \ Operation                         | Name    |\n```\n\n\n\n"
- "# 执行计划操作\n\n| 0 | SELECT STATEMENT | |\n| 1 | SORT AGGREGATE | |\n| 2 | BITMAP\
  \ CONVERSION COUNT | |\n| 3 | BITMAP OR | |\n| 4 | BITMAP MERGE | |\n| 5 | BITMAP\
  \ INDEX RANGE SCAN | T1_BIX2 |\n| 6 | BITMAP AND | |\n| 7 | BITMAP MERGE | |\n|\
  \ 8 | BITMAP INDEX RANGE SCAN | T1_BIX1 |\n| 9 | BITMAP CONVERSION FROM ROWIDS |\
  \ |\n| 10 | INDEX RANGE SCAN | T1_I3 |\n| 11 | BITMAP CONVERSION FROM ROWIDS | |\n\
  | 12 | SORT ORDER BY | |\n| 13 | INDEX RANGE SCAN | T1_I1 |\n\n此计划与前一个计划的主要区别在于第\
  \ 2 行存在`BITMAP CONVERSION COUNT`操作，并且没有任何`BITMAP CONVERSION TO ROWIDS`操作。\n\n位图操作的一个主要限制是我们将在讨论星型转换时详细研究（详见第\
  \ 13 章），即这种机制无法处理包含子查询的“IN 列表”，正如 Listing 10-20 中尝试但失败的那样。\n\nListing 10-20. 针对\
  \ IN 列表的 INDEX COMBINE 尝试\n\n```sql\nSELECT /*+ index_combine(e) */\n       /* THIS\
  \ HINT INNEFFECTIVE IN THIS QUERY */\n      employee_id\n      ,first_name\n   \
  \   ,last_name\n      ,email\n  FROM hr.employees e\n WHERE    manager_id IN (SELECT\
  \ employee_id\n                           FROM hr.employees\n                  \
  \        WHERE salary > 14000)\n       OR job_id = 'SH_CLERK';\n\n| Id  | Operation\
  \                    | Name          |\n\n|   0 | SELECT STATEMENT             |\
  \               |\n|   1 |  FILTER                      |               |\n|   2\
  \ |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |\n|   3 |    INDEX FULL SCAN \
  \          | EMP_EMP_ID_PK |\n|   4 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES \
  \    |\n|   5 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |\n```\n\n#### 全表扫描\n\
  \n现在我们来到执行计划中备受诟病的操作：全表扫描（full table scan）（参见表 10-5）。\n\n表 10-5. 全表扫描操作\n\n| Operation\
  \ | Hint |\n| --- | --- |\n| `TABLE ACCESS FULL` | `FULL` |\n| `TABLE ACCESS SAMPLE`\
  \ | `FULL` |\n| `TABLE ACCESS SAMPLE BY ROWID RANGE` | `FULL PARALLEL` |\n\n虽然我们都称这个操作为全表扫描，但在执行计划显示中该操作的实际名称是`TABLE\
  \ ACCESS FULL`。这两个术语都有些误导性，因为在分区表的情况下，被扫描的“表”实际上是一个单独的分区或子分区。也许为了避免过于具体的术语，它可能被称为“段全扫描”，但这又不够具体；毕竟我们这里讨论的不是索引。为了简单起见，在本节剩余部分我将假设我们查看的是非分区表；其机制不会改变。为了简洁，我也会使用缩写\
  \ FTS。\n\nFTS 操作听起来足够简单：我们从头到尾读取表中的所有数据块。\n\n然而，实际上它比这要复杂得多。我们需要：\n\n*   访问段头以读取区映射并识别高水位标记（HWM）；\n\
  *   读取直到 HWM 的所有区中的所有数据；以及\n*   重新读取段头以确认没有更多行。\n\n即使我们只讨论串行（而非并行）操作，这仍然不是全部情况。一旦所有数据都返回给客户端，可能需要额外的\
  \ FETCH 操作来再次确认没有更多数据。这将导致第三次读取段头。\n\n当我们处理大型甚至中等大小的表时，这些额外的段头读取通常不是主要因素，但对于一个微小的表，例如只有一个数据块，这些额外读取可能是个问题。如果这个小表被频繁访问，你可能需要创建索引，或者将表转换为索引组织表。\n\
  \n有些人会告诉你，调整性能不佳的 SQL 的关键是找出 FTS 并通过添加索引来消除它们。这是一种危险的不完整说法。确实，缺失的索引*可能*导致性能问题，并且这些性能问题可能通过执行计划中存在`TABLE\
  \ FULL SCAN`操作被识别出来。然而，正如我在第 9 章介绍索引聚簇因子概念时所解释的那样，FTS 通常是访问表最有效的方式。如果你忘记了，可以回顾一下图\
  \ 9-1。\n\nListing 10-21 展示了基本的 FTS 操作。\n\nListing 10-21. 全表扫描\n\n```sql\nSELECT\
  \ /*+ full(t1) */\n         * FROM t1;\n\n| Id  | Operation         | Name |\n\n\
  |   0 | SELECT STATEMENT  |      |\n|   1 |  TABLE ACCESS FULL| T1   |\n```\n\n\
  Listing 10-22 展示了本节开头列出的第二个操作。与`INDEX FAST FULL SCAN`一样，使用样本会改变操作。\n\nListing 10-22.\
  \ TABLE ACCESS SAMPLE\n\n```sql\nSELECT /*+ full(t1) */\n            *\n       \
  \ FROM t1 SAMPLE (5);\n\n| Id  | Operation           | Name |\n\n|   0 | SELECT\
  \ STATEMENT    |      |\n|   1 |  TABLE ACCESS SAMPLE| T1   |\n```\n\nListing 10-22\
  \ 请求从表中抽取 5%的样本。最后的 FTS 变体在 Listing 10-23 中演示，展示了一个并行采样的查询。\n\nListing 10-23. 并行\
  \ TABLE ACCESS SAMPLE\n\n```sql\nSELECT /*+ full(t1) parallel */\n            *\n\
  \        FROM t1 SAMPLE (5);\n\n| Id  | Operation                             |\
  \ Name     |\n\n|   0 | SELECT STATEMENT                      |          |\n|  \
  \ 1 |  PX COORDINATOR                       |          |\n|   2 |   PX SEND QC (RANDOM)\
  \                 | :TQ10000 |\n|   3 |    PX BLOCK ITERATOR                  |\
  \          |\n|   4 |     TABLE ACCESS SAMPLE BY ROWID RANGE| T1       |\n```\n\n"
- "# TABLE 和 XMLTABLE\n\nSQL 语言参考手册中的函数列表包含`XMLTABLE`。由于即将明了的原因，我将不准确地将`XMLTABLE`称为一个“运算符”。`XMLTABLE`的一个兄弟是`TABLE`，但该“运算符”被奇怪地记录在手册中与`XMLTABLE`完全不同的部分。\n\
  \n`XMLTABLE`“运算符”有一个 Xquery“操作数”，并且该“操作”的结果是一个行源，可以像常规表或视图一样出现在`FROM`子句中。\n\n我不是\
  \ XML 专家，但 Listing 10-24 是一个使用`XMLTABLE`的快速示例。\n\nListing 10-24. XMLTABLE 示例\n\n\
  ```sql\nCREATE TABLE xml_test (c1 XMLTYPE);\n\nSELECT x.*\n    FROM xml_test t\n\
  \        ,XMLTABLE (\n                  '//a'\n                  PASSING t.c1\n\
  \                  COLUMNS \"a\" CHAR (10) PATH '@path1'\n                     \
  \    ,\"b\" CHAR (50) PATH '@path2'\n                         ) x;\n\n| Id  | Operation\
  \          | Name     |\n\n|   0 | SELECT STATEMENT   |          |\n|   1 |  NESTED\
  \ LOOPS      |          |\n|   2 |   TABLE ACCESS FULL| XML_TEST |\n|   3 |   XPATH\
  \ EVALUATION|          |\n```\n\n`TABLE`“运算符”有一个“操作数”，该操作数是一个*嵌套表*。嵌套表操作数具有以下三种格式之一：\n\
  \n*   数据字典或经过`CAST`的 PL/SQL 嵌套表对象\n*   返回嵌套表对象的函数。此类函数通常是管道函数\n*   一个`CAST...MULTISET`表达式\n\
  \n\n\n这三种形式中的第二种最为常见，管道函数通常被称为 **“表函数”**。这种对“表函数”术语的常见用法，使得将 `TABLE` 和 `XMLTABLE`\
  \ 关键字称为 **“操作符”** 而非函数更为方便。\n\n在数据字典中使用嵌套表并不是一个很好的做法。这些表本身并非内联存储，因此你完全可以创建一个子表，并通过引用完整性约束将其链接到父表。这样，你至少可以有不访问父表而直接访问子数据的选项。\n\
  \n![image](img/sq.jpg) **注意** 我们将在第 13 章中看到，如今 CBO 可以执行表消除转换，从而消除任何对父表的不必要引用。\n\n\
  然而，如果你从前任那里继承了一些糟糕的嵌套表，清单 10-25 展示了如何查询它们。\n\n清单 10-25. 查询嵌套表\n\n```\nCREATE TYPE\
  \ order_item AS OBJECT\n(\n   product_name VARCHAR2 (50)\n  ,quantity INTEGER\n\
  \  ,price NUMBER (8, 2)\n);\n/\n\nCREATE TYPE order_item_table AS TABLE OF order_item;\n\
  /\n\nCREATE TABLE orders\n(\n   order_id      NUMBER PRIMARY KEY\n  ,customer_id\
  \   INTEGER\n  ,order_items   order_item_table\n)\nNESTED TABLE order_items\n  \
  \ STORE AS order_items_nt;\n\nSELECT o.order_id\n      ,o.customer_id\n      ,oi.product_name\n\
  \      ,oi.quantity\n      ,oi.price\n  FROM orders o, TABLE (o.order_items) oi;\n\
  \n| Id  | Operation                    | Name                    |\n|---|---|---|\n\
  |   0 | SELECT STATEMENT             |                         |\n|   1 |  NESTED\
  \ LOOPS                |                         |\n|   2 |   NESTED LOOPS     \
  \          |                         |\n|   3 |    TABLE ACCESS FULL         | ORDERS\
  \                  |\n|   4 |    INDEX RANGE SCAN          | SYS_FK0000127743N00003$\
  \ |\n|   5 |   TABLE ACCESS BY INDEX ROWID| ORDER_ITEMS_NT          |\n```\n\n如你所见，我们通过自动创建在隐藏列上的索引，建立了一个从新创建的父表\
  \ `ORDERS` 到嵌套表 `ORDER_ITEMS_NT` 的嵌套循环。其他的连接顺序和方法也是可能的。\n\n![image](img/sq.jpg)\
  \ **注意** 关于嵌套表中所有列的信息，包括列统计信息，可以在视图 `ALL_NESTED_TABLE_COLS` 中查看。该视图也显示了在其上构建索引的隐藏列\
  \ `NESTED_TABLE_ID`。\n\n管道表函数是表操作符的一种更好的用途。清单 10-26 展示了一个常见例子。\n\n清单 10-26. `DBMS_XPLAN.display`\
  \ 示例\n\n```\nSELECT * FROM TABLE (DBMS_XPLAN.display);\n\n| Id  | Operation    \
  \                     | Name    |\n|---|---|---|\n|   0 | SELECT STATEMENT     \
  \             |         |\n|   1 |  COLLECTION ITERATOR PICKLER FETCH| DISPLAY |\n\
  ```\n\n你可以看到 `COLLECTION ITERATOR PICKLER FETCH` 操作，它表示调用管道函数来检索行。实际上，这些行是批量处理的，因此你不会在检索每一行时都在调用\
  \ SQL 语句和管道函数之间进行上下文切换。\n\n使用表操作符的第三种也是最后一种方式是结合子查询。清单 10-27 展示了一种可能不太熟悉的语法，它需要使用用户定义的类型才能工作。\n\
  \n清单 10-27. `CAST MULTISET` 示例\n\n```\nSELECT *\n  FROM TABLE (CAST (MULTISET (SELECT\
  \ 'CAMERA' product, 1 quantity, 1 price\n                                 FROM DUAL\n\
  \                           CONNECT BY LEVEL <= 3) AS order_item_table)) oi;\n\n\
  | Id  | Operation                          | Name |\n|---|---|---|\n|   0 | SELECT\
  \ STATEMENT                   |      |\n|   1 |  COLLECTION ITERATOR SUBQUERY FETCH|\
  \      |\n|   2 |   COUNT                            |      |\n|   3 |    CONNECT\
  \ BY WITHOUT FILTERING    |      |\n|   4 |     FAST DUAL                      |\
  \      |\n```\n\n\n\n这里我查询了 `DUAL` 表来生成一个包含三行的集合，然后使用我在清单 10-25 中创建的 `ORDER_ITEM_TYPE`\
  \ 将结果强制转换为嵌套表。接着，`TABLE` 操作符允许我将此嵌套表视为行源。查询结果与最初从 `DUAL` 表 `SELECT` 的结果相同。\n\n清单\
  \ 10-27 中的执行计划展示了第 2、3、4 行的子查询，而第 1 行的 `COLLECTION ITERATOR SUBQUERY FETCH` 操作是由\
  \ `TABLE` 操作符生成的。\n\n这一切看起来非常复杂且没有必要。为什么非要费尽周折将一堆行构建成嵌套表，然后再将它们展开回行呢？然而，正如我们将在第\
  \ 17 章中看到的，将此技术与我之前提到的左外连接结合使用，在某些情况下会非常有用。\n\n## 集群访问\n\n为了本章内容的完整性，我需要提及集群（参见表\
  \ 10-6）。\n\n表 10-6. 集群访问操作\n\n| 操作 | 提示 |\n| --- | --- |\n| `TABLE ACCESS HASH`\
  \ | `HASH` |\n| `TABLE ACCESS CLUSTER` | `CLUSTER` |\n\n让我来讲解这个例子。清单 10-28 是本章的最后一个清单。\n\
  \n清单 10-28. 集群访问方法\n\n```\nCREATE CLUSTER cluster_hash\n(\n  ck                \
  \              INTEGER\n)\nHASHKEYS 3\nHASH IS ck;\n\nCREATE TABLE tch1\n(\n   ck\
  \   INTEGER\n  ,c1   INTEGER\n)\nCLUSTER cluster_hash ( ck );\n\nCREATE CLUSTER\
  \ cluster_btree\n(\n  ck                              INTEGER,\n  c1           \
  \                   INTEGER\n);\n\nCREATE INDEX cluster_btree_ix\n   ON CLUSTER\
  \ cluster_btree;\n\nCREATE TABLE tc2\n(\n   ck   INTEGER\n  ,c1   INTEGER\n)\nCLUSTER\
  \ cluster_btree ( ck, c1 );\n\nCREATE TABLE tc3\n(\n   ck   INTEGER\n  ,c1   INTEGER\n\
  )\nCLUSTER cluster_btree ( ck, c1 );\n\nSELECT /*+ hash(tch1) index(tc2) cluster(tc3)*/\n\
  \            *\n        FROM tch1, tc2, tc3\n       WHERE     tch1.ck = 1\n    \
  \         AND tch1.ck = tc2.ck\n             AND tch1.c1 = tc2.c1\n            \
  \ AND tc2.ck = tc3.ck\n             AND tc2.c1 = tc3.c1;\n\n| Id  | Operation  \
  \            | Name             |\n\n|   0 | SELECT STATEMENT       |          \
  \        |\n|   1 |  NESTED LOOPS          |                  |\n|   2 |   NESTED\
  \ LOOPS         |                  |\n|   3 |    TABLE ACCESS HASH   | TCH1    \
  \         |\n|   4 |    TABLE ACCESS CLUSTER| TC2              |\n|   5 |     INDEX\
  \ UNIQUE SCAN  | CLUSTER_BTREE_IX |\n|   6 |   TABLE ACCESS CLUSTER | TC3      \
  \        |\n```\n\n清单 10-28 首先创建了一个哈希集群、一个 B 树集群和三个关联表。表 `TCH1` 是在单表哈希集群中创建的，表 `TC2`\
  \ 和 `TC3` 是在 B 树集群中创建的。\n\n清单 10-28 中查询的执行计划首先访问表 `TCH1`。因为我们在查询中包含了谓词 `TCH1.CK\
  \ = 1`，并且 `CK` 是我们的哈希集群键，所以我们能够直接定位到包含 `TCH1` 中匹配行的块，而无需使用索引。对于 `TCH1` 中的每一个匹配行，我们使用\
  \ `CK` 和 `C1` 的值来访问我们在 `CLUSTER_BTREE` 上的集群索引。集群索引的特殊之处在于，每个键值只有一个条目，这就是为什么我们在第\
  \ 5 行得到一个 `INDEX UNIQUE SCAN` 操作，即使 `TC2` 中可能有许多行匹配从 `TCH1` 提取的特定 `CK` 和 `C1` 值。\n\
  \n由于 `CK` 和 `C1` 列都在 `CLUSTER_BTREE` 中定义，并且也被指定为 `TC2` 和 `TC3` 的连接条件，所以我们知道在 `TC3`\
  \ 中需要的行与 `TC2` 中的行是同位的。实际上，第 5 行的单次索引条目查找帮助我们找到所有匹配我们 `TCH1` 行的、在 `TC2` 和 `TC3`\
  \ 中我们需要的行。\n\n这一切看起来相当酷。事实上，集群在数据字典中被广泛使用。然而，我个人从未参与过任何在数据字典之外使用任何形式集群的生产环境 Oracle\
  \ 数据库。\n\n那么为什么它们如此不受欢迎呢？嗯，在绝大多数情况下，通过索引访问数据的主要开销在于访问表中的数据，而不是在于执行索引查找。这是因为索引结构本身很可能被缓存，而表数据则很可能没有。这倾向于限制哈希集群的好处。哈希集群也有些难以管理，因为你必须大致知道每个特定哈希键会匹配多少行。一方面，如果你设置的这个值太小，哈希链就会变长。另一方面，如果你设置得太大，你的集群就会不必要地庞大，最终导致比你实际需要的更多逻辑和/或物理\
  \ I/O。无论你将 `HASHKEYS` 参数设置得过大还是过小，你原本期望获得的性能收益都会迅速消失。\n\n但是普通的 B 树集群呢？你不必担心设置 `HASHKEYS`，而且你仍然可以获得集群的主要性能收益，不是吗？\n\
  \n想象一下，你有一个名为 `ORDERS` 的表，其主键是 `ORDER_ID`，还有一个 `ORDER_ITEMS` 表，其中有一个参照完整性约束将其链接到父表。如果能进行一次单块读取，同时获取\
  \ `ORDERS` 表中的一行及其在 `ORDER_ITEMS` 表中对应的行，岂不美哉？这肯定比分别从两个表中检索数据做两次 I/O 要好，对吧？\n\n\
  嗯，是的。然而，仅检索单个订单数据的查询无论如何都会很快完成，你可能注意不到性能的提升。另一方面，如果你正在运行一个查看大量订单及其相关明细项的报表，无论如何你都会读取大量块，所以数据如何分布在这些块中就无关紧要了。\n\
  \n你可能有一个拥有成百上千交互用户的系统，因此 `ORDERS` 和 `ORDER_ITEMS` 表可能非常庞大，无法缓存在 SGA 中，所以你确实希望将这些\
  \ I/O 减半以提高处理能力。\n\n好的。不幸的是，这个场景有一个很大的问题：你无法对集群表进行分区。这是一个大的“陷阱”。分区为大型表提供了显著的管理和性能优势，很少有人愿意为了享受集群的好处而放弃所有这些优势。\n\
  \n但如果你因为某些原因（例如许可问题）无法使用分区，并且你经常执行我所描述的表之间的连接，那么集群可能看起来是个不错的选择。\n\n即使在这些罕见的情况下，大多数人最终也会选择对数据进行反规范化或寻找其他变通方法，而不是使用像集群这样的东西——无论对错，它被视为一个巨大的未知领域。在本书中，我将不再提及集群。\n\
  \n## 总结\n\n恐怕即使是对访问方法的冗长讨论也是不完整的。我们没有讨论 `LOB` 对象的访问、`REF` 数据类型的使用或域索引的使用。但即便如此，本章已经涵盖了你在商业应用中绝大多数\
  \ SQL 语句里可能遇到的所有访问方法。\n\n既然已经介绍了在查询中访问单个行源的各种方法，现在该将我们的注意力转向将这些行源连接在一起这个主题了。继续前进到第\
  \ 11 章。\n\n"
- "# 第 11 章\n\n![image](img/frontdot.jpg)\n\n连接\n\n\n\n每个 SQL 查询或子查询都有一个 `FROM` 子句，该子句标识一个或多个`行源`。这些行源可以是表、数据字典视图、内联视图、因子化子查询，或是涉及\
  \ `TABLE` 或 `XMLTABLE` 运算符的表达式。如果存在多个行源，则需要将这些行源产生的行进行`连接`，连接操作的数量比行源数量少一个。在第 1\
  \ 章中，我介绍了连接的各种不同语法结构。这些结构包括内连接、左外连接、右外连接、全外连接和分区外连接。我还解释了哪些类型的连接可以用传统语法构建，哪些需要 ANSI\
  \ 连接语法。\n\n在本章中，我将探讨运行时引擎可用于实现任何类型连接的不同方法、行源连接顺序的相关规则，以及如何在连接中使用并行执行。我还将讨论两种类型的`子查询解嵌套`：半连接和反连接。子查询解嵌套是一种`优化器转换`，用于构建原始查询\
  \ `FROM` 子句中不存在的附加行源和连接。但首先，让我回顾一下四种连接方法。\n\n## 连接方法\n\n运行时引擎有四种方法可用于实现任何连接。这四种方法是`嵌套循环`、`哈希连接`、`合并连接`和`笛卡尔连接`。笛卡尔连接只是合并连接的一种简化形式，因此从某种意义上说，只有三种半连接方法。\n\
  \n当通过 `DBMS_XPLAN` 显示执行计划时，连接操作的两个操作数会在同一缩进级别上下排列显示。在第 1 章中，我引入了术语`驱动行源`来指代显示中顶部的行源，以及`探测行源`来指代底部的行源。正如我们即将看到的，这个术语对于嵌套循环、合并连接和笛卡尔连接是恰当的。为避免混淆，我也会将哈希连接的顶部行源称为驱动行源，将底部操作数称为探测源，尽管，正如稍后将阐明的，这些术语对于哈希连接来说并不完全贴切。\n\
  \n第 1 章还引入了描述连接顺序的一些语法。语法 `(T1 ![image](img/right-arrow.jpg) T2) ![image](img/right-arrow.jpg)\
  \ T3` 描述了我将称之为涉及两个连接的`连接树`。首先发生的是 `T1` 和 `T2` 之间的连接，其中 `T1` 是驱动行源，`T2` 是探测行源。此连接产生一个`中间结果集`，该结果集成为第二个连接操作的驱动行源，`T3`\
  \ 作为探测行源。在本章中，我将继续使用相同的术语。现在让我们看看四种连接方法中的第一种，嵌套循环。\n\n## 嵌套循环\n\n嵌套循环连接方法，并且只有嵌套循环连接方法，可以通过左横向连接来支持`相关行源`。我将很快讨论左横向连接，但让我首先看看我称之为传统嵌套循环的方法，它实现的是非相关行源之间的连接。\n\
  \n### 传统嵌套循环\n\n列表 11-1 连接了来自最著名示例数据库模式的两张最著名的 Oracle 数据库表。\n\n**列表 11-1. 使用嵌套循环连接\
  \ EMP 和 DEPT (10.2.0.5)**\n\n```sql\nSELECT  /*+\ngather_plan_statistics\noptimizer_features_enable('10.2.0.5')\n\
  leading(e)\nuse_nl(d)\nindex(d)\n*/\n      e.*, d.loc\n  FROM scott.emp e, scott.dept\
  \ d\n WHERE hiredate > DATE '1980-12-17' AND e.deptno = d.deptno;\n\nSET LINES 200\
  \ PAGES 0\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor (format=>\n        \
  \                      'BASIC +IOSTATS LAST -BYTES -ROWS +PREDICATE'));\n\n| Id\
  \  | Operation                    | Name    | Starts | A-Rows |\n\n|   0 | SELECT\
  \ STATEMENT             |         |      1 |     13 |\n|   1 |  NESTED LOOPS   \
  \             |         |      1 |     13 | -- 额外的列\n|*  2 |   TABLE ACCESS FULL\
  \          | EMP     |      1 |     13 | -- 已移除\n|   3 |   TABLE ACCESS BY INDEX\
  \ ROWID| DEPT    |     13 |     13 |\n|*  4 |    INDEX UNIQUE SCAN         | PK_DEPT\
  \ |     13 |     13 |\n\n谓词信息 (由操作标识):\n\n2 - filter(\"HIREDATE\">TO_DATE(' 1980-12-17\
  \ 00:00:00', 'syyyy-mm-dd\n              hh24:mi:ss'))\n   4 - access(\"E\".\"DEPTNO\"\
  =\"D\".\"DEPTNO\")\n```\n\n列表 11-1 连接了示例 `SCOTT` 模式中的 `EMP` 和 `DEPT` 表。我再次使用提示来生成我希望讨论的执行计划，否则\
  \ CBO 会选择更高效的计划。我使用了 `LEADING` 提示来指定驱动行源是 `EMP` 表，并使用了 `INDEX` 提示，以便通过索引访问 `DEPT`。为了能分阶段解释嵌套循环的不同方面，我还使用了\
  \ `OPTIMIZER_FEATURES_ENABLE` 提示，以便使用 10.2.0.5 的实现。`GATHER_PLAN_STATISTICS` 提示用于从\
  \ `DBMS_XPLAN.DISPLAY_CURSOR` 获取运行时数据。\n\n第 1 行的 `NESTED LOOPS` 操作首先访问驱动表 `EMP`。内连接的语义意味着逻辑上所有\
  \ `WHERE` 子句中的谓词都在连接操作之后处理。然而，实际上，谓词 `hiredate > DATE '1980-12-17'` 是特定于 `EMP` 表的，CBO\
  \ 会尽可能早地消除不符合此过滤条件的行，正如列表 11-1 执行计划的谓词部分所证实的，该部分显示过滤条件由操作 2 应用。当找到 `EMP` 中 13 个符合雇佣日期条件的行时，会识别并返回\
  \ `DEPT` 中符合连接谓词 `e.deptno = d.deptno` 的行。\n\n尽管在 `EMP` 中有三个匹配的行 `DEPTNO` 为 10，五个为\
  \ 20，十三行中有五个 `DEPTNO` 值为 30，但仍然可以使用 `DEPT.DEPTNO` 上的索引。伪代码大致如下：\n\n```\n对于 EMP 子集中的每一行\n\
  循环\n        对于 DEPT 中每个匹配的行\n       循环\n        <返回行>\n        结束循环\n结束循环\n```\n\
  \n因此称为`嵌套循环`。你可以从 `DBMS_XPLAN.DISPLAY_CURSOR` 结果的 `STARTS` 列中看到，第 4 行对 `PK_DEPT`\
  \ 的索引查找和第 3 行对 `DEPT` 表的访问执行了 13 次，对应 `EMP` 中每个匹配的行各一次。\n\n![image](img/sq.jpg) **提示**  嵌套循环操作的探测行源的\
  \ `STARTS` 列通常与驱动行源的 `A-ROWS` 列相匹配。这个提示同样适用于 `V$STATISTICS_PLAN_ALL` 中的 `LAST_STARTS`\
  \ 和 `LAST_OUTPUT_ROWS`。`半连接`和`反连接`是此规则的例外，因为它们利用了标量子查询缓存。我将很快讨论半连接和反连接。\n\n列表 11-2\
  \ 让我们看到当我们将 `OPTIMIZER_FEATURES_ENABLE` 提示更改为启用某些 11gR1 功能时会发生什么。\n\n**列表 11-2.\
  \ 使用嵌套循环连接 EMP 和 DEPT (11.2.0.1)**\n\n```sql\nSELECT  /*+\ngather_plan_statistics\n\
  optimizer_features_enable('11.2.0.1')\nleading(e)\nuse_nl(d)\nindex(d)\nno_nlj_batching(d)\n\
  */\n      e.*, d.loc\n  FROM scott.emp e, scott.dept d\nWHERE hiredate > DATE '1980-12-17'\
  \ AND e.deptno = d.deptno;\n\nSET LINES 200 PAGES 0\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor\
  \ (format=>\n                              'BASIC +IOSTATS LAST -BYTES -ROWS +PREDICATE'));\n\
  \n| Id  | Operation                   | Name    | Starts | E-Rows | A-Rows |\n```\n\
  \n\n## 执行计划分析\n\n```\n|   0 | SELECT STATEMENT            |         |      0 | \
  \       |      0 |\n|   1 |  TABLE ACCESS BY INDEX ROWID| DEPT    |      1 |   \
  \   1 |     13 |\n|   2 |   NESTED LOOPS              |         |      1 |     13\
  \ |     27 |\n|*  3 |    TABLE ACCESS FULL        | EMP     |      1 |     13 |\
  \     13 |\n|*  4 |    INDEX UNIQUE SCAN        | PK_DEPT |     13 |      1 |  \
  \   13 |\n```\n\n`谓词信息（由操作 ID 标识）：`\n\n*   3 - 过滤(`\"HIREDATE\">TO_DATE(' 1980-12-17\
  \ 00:00:00', 'syyyy-mm-dd hh24:mi:ss')`)\n*   4 - 访问(`\"E\".\"DEPTNO\"=\"D\".\"\
  DEPTNO\"`)\n\n除了 `OPTIMIZER_FEATURES_ENABLE` 参数的更改外，清单 11-2 还通过使用 `NO_NLJ_BATCHING`\
  \ 提示禁用了 11gR1 的一项新功能。清单 11-2 中的执行计划与 清单 11-1 中的不同之处在于，连接操作是操作 1（`TABLE ACCESS BY\
  \ INDEX ROWID`）的子操作。这种方法称为嵌套循环预取，在 9i 中可用于 `INDEX RANGE SCAN`，但直到 11gR1 才可用于 `INDEX\
  \ UNIQUE SCAN`。嵌套循环预取允许操作 1 在决定下一步操作之前，从其第 2 行的子操作中获取一定数量的 ROWID。如果返回的 ROWID 位于连续的数据块中，且这些块都不在缓冲区高速缓存中，则操作\
  \ 1 可以通过进行一次多块读取来替代多次单块读取，从而获得一定的性能提升。注意，在 清单 11-1 中，第 3 行的 `TABLE ACCESS BY INDEX\
  \ ROWID` 操作在 STARTS 列中的值为 13，而 清单 11-2 中的操作 1 显示的值为 1。在后一种情况下，调用一次操作 1 就足够了，因为所有的\
  \ ROWID 都是从第 2 行的子操作中获取的。\n\n清单 11-3 展示了当我们从 清单 11-2 中移除两个加粗的提示后会发生什么。\n\n## 嵌套循环连接批处理\n\
  \n清单 11-3\n\n```sql\nSELECT  /*+\n        gather_plan_statistics\n        leading(e)\n\
  \        use_nl(d)\n        index(d)\n        */\n        e.*, d.loc\n    FROM scott.emp\
  \ e, scott.dept d\n  WHERE hiredate > DATE '1980-12-17' AND e.deptno = d.deptno;\n\
  \nSET LINES 200 PAGES 0\n\nSELECT *\n    FROM TABLE (\n            DBMS_XPLAN.display_cursor\
  \ (\n               format   => 'BASIC +IOSTATS LAST -BYTES +PREDICATE'));\n```\n\
  \n```\n| Id  | Operation                    | Name    | Starts | E-Rows | A-Rows\
  \ |\n|   0 | SELECT STATEMENT             |         |      1 |        |     13 |\n\
  |   1 |  NESTED LOOPS                |         |      1 |        |     13 |\n| \
  \  2 |   NESTED LOOPS               |         |      1 |     13 |     13 |\n|* \
  \ 3 |    TABLE ACCESS FULL         | EMP     |      1 |     13 |     13 |\n|*  4\
  \ |    INDEX UNIQUE SCAN         | PK_DEPT |     13 |      1 |     13 |\n|   5 |\
  \   TABLE ACCESS BY INDEX ROWID| DEPT    |     13 |      1 |     13 |\n```\n\n这里我们采用了一种称为\
  \ *嵌套循环批处理* 的优化。我们现在为一个连接执行了两个 `NESTED LOOPS` 操作。尽管嵌套循环批处理在官方上并不是一个优化器转换，但 CBO 实际上已将原始查询转换为\
  \ 清单 11-4 中所示的形式。\n\n## 模拟 10g 中的 11g 嵌套循环\n\n清单 11-4\n\n```sql\nSELECT  /*+ leading(e\
  \ d1)\n        use_nl(d)\n        index(d)\n        rowid(d)\n        optimizer_features_enable('10.2.0.5')\
  \ */\n        e.*, d.loc\n    FROM scott.emp e, scott.dept d1, scott.dept d\n  \
  \ WHERE     e.hiredate > DATE '1980-12-17'\n         AND e.deptno = d1.deptno\n\
  \         AND d.ROWID = d1.ROWID;\n```\n\n```\n| Id  | Operation               \
  \    | Name    |\n|   0 | SELECT STATEMENT            |         |\n|   1 |  NESTED\
  \ LOOPS               |         |\n|   2 |   NESTED LOOPS              |       \
  \  |\n|   3 |    TABLE ACCESS FULL        | EMP     |\n|   4 |    INDEX UNIQUE SCAN\
  \        | PK_DEPT |\n|   5 |   TABLE ACCESS BY USER ROWID| DEPT    |\n```\n\n\n\
  清单 11-4 中的执行计划与清单 11-3 中的执行计划非常相似，尽管 `OPTIMIZER_FEATURES_ENABLE` 提示禁用了所有 11g 特性。清单\
  \ 11-4 中的查询包含两个 `DEPT` 副本和一个 `EMP` 副本，总共三个行源，因此需要两次连接。清单 11-3 和清单 11-4 中执行计划的一个区别在于：由于我们在清单\
  \ 11-4 中指定了自己的 ROWID，因此对表的访问是通过 `TABLE ACCESS BY USER ROWID` 操作进行的，而不是通过清单 11-3\
  \ 中的 `TABLE ACCESS BY INDEX ROWID` 操作。\n\n从 `DBMS_XPLAN` 的显示中，嵌套循环批处理的性能优势并不明显：在清单\
  \ 11-3 中，操作 4 和 5 的 `STARTS` 列仍然显示针对 13 行数据进行了 13 次探测，但在某些情况下，物理和逻辑 I/O 操作可能仍然会减少。\n\
  \n![image](img/sq.jpg) **提示** 你会在清单 11-3 中注意到，执行计划操作 4 和 5 的 `E-ROWS` 列（估计行数）显示值为\
  \ 1，而 `A-ROWS` 列（实际行数）显示值为 13。这不是 CBO 的基数错误。对于 `NESTED LOOPS`，估计行数是循环每次迭代的行数，而实际行数是循环所有迭代的总行数。\n\
  \n嵌套循环具有一个理想的特性，即它们通常呈线性扩展。我的意思是，如果 `EMP` 和 `DEPT` 的大小翻倍，嵌套循环所需的时间也会翻倍（而不是增加更多）。\n\
  \n然而，嵌套循环有两个不理想的性能特性：\n\n*   除非探测表是哈希集群的一部分（哎呀！我说过不会再提哈希集群了）或者非常小，否则需要在连接列（在本例中是\
  \ `DEPT.DEPTNO`）上建立索引。如果这样的索引不存在，那么对于 `EMP` 中的每一行，我们可能需要访问 `DEPT` 中的每一行。这不仅本身通常非常耗时，还会破坏连接的可扩展性：如果我们将\
  \ `EMP` 和 `DEPT` 的大小翻倍，那么循环所需的时间将变为四倍，因为 `EMP` 变大导致我们访问 `DEPT` 的次数翻倍，同时 `DEPT` 变大导致每次扫描所需的时间也翻倍。请注意，如果嵌套循环的探测行源是子查询或内联视图，通常无法建立索引。因此，当使用嵌套循环连接表与子查询或内联视图时，探测行源几乎总是那个表。\n\
  *   当探测行源是一个表时，被探测表中的数据块可能会被访问多次，每次挑选出不同的行。\n\n## 左外连接\n\n在 12cR1 版本之前，左外连接只能与我们在第\
  \ 10 章中介绍的 `TABLE` 和 `XMLTABLE` 操作符一起使用。我在清单 8-9 中展示了一个涉及 `DBMS_XPLAN.DISPLAY` 的连接示例。在\
  \ 12cR1 版本中，这个有用的特性通过 `LATERAL` 关键字变得更容易使用。清单 11-5 展示了它的用法示例。\n\n清单 11-5。左外连接\n\n\
  ```\nSELECT e1.*, e3.avg_sal\n  FROM scott.emp e1\n      ,LATERAL (SELECT AVG (e2.sal)\
  \ avg_sal\n                  FROM scott.emp e2\n                 WHERE e1.deptno\
  \ != e2.deptno) e3;\n\n| Id  | Operation            | Name            |\n\n|   0\
  \ | SELECT STATEMENT     |                 |\n|   1 |  NESTED LOOPS        |   \
  \              |\n|   2 |   TABLE ACCESS FULL  | EMP             |\n|   3 |   VIEW\
  \               | VW_LAT_A18161FF |\n|   4 |    SORT AGGREGATE    |            \
  \     |\n|*  5 |     TABLE ACCESS FULL| EMP             |\n\nPredicate Information\
  \ (identified by operation id):\n\n5 - filter(\"E1\".\"DEPTNO\"<>\"E2\".\"DEPTNO\"\
  )\n```\n\n清单 11-5 列出了每个员工的详细信息以及所有非其所在部门员工的平均工资。\n\n左外连接总是通过嵌套循环实现，并且前面带有 `LATERAL`\
  \ 的内联视图总是探测行源。外连接的关键优势在于，可以在内联视图中使用源自驱动行源列的谓词。当我在第 17 章中研究优化排序时，将会非常有效地使用外连接。\n\n\
  可以通过在内联视图后放置 `(+)` 字符来执行左外连接，但正如我在第 1 章中解释的那样，我更喜欢对外连接使用 ANSI 语法。ANSI 语法使用关键字 `CROSS\
  \ APPLY` 表示内左外连接，使用 `OUTER APPLY` 表示外左外连接；当我介绍第 13 章中的优化器转换时，我将提供这两种变体的示例。\n\n###\
  \ 哈希连接\n\n根据连接输入是否交换，哈希连接有两种变体。我们先讨论不交换连接输入的标准哈希连接，然后在本章后面更广泛地讨论连接顺序时，再考虑将交换连接输入作为一部分的变体。\n\
  \n让我们从查看清单 11-6 开始，它修改了清单 11-3 中的提示，指定使用哈希连接而不是嵌套循环。\n\n清单 11-6。哈希连接\n\n```\nSELECT\
  \ /*+ gather_plan_statistics\nleading(e)\nuse_hash(d)\n*/\n      e.*, d.loc\n  FROM\
  \ scott.emp e, scott.dept d\n WHERE hiredate > DATE '1980-12-17' AND e.deptno =\
  \ d.deptno;\n\nSELECT *\n  FROM TABLE (DBMS_XPLAN.display_cursor (format => 'BASIC\
  \ +IOSTATS LAST'));\n\n| Id  | Operation          | Name | Starts | E-Rows | A-Rows\
  \ |\n\n|   0 | SELECT STATEMENT   |      |      1 |        |     13 |\n|*  1 | \
  \ HASH JOIN         |      |      1 |     13 |     13 |\n|*  2 |   TABLE ACCESS\
  \ FULL| EMP  |      1 |     13 |     13 |\n|   3 |   TABLE ACCESS FULL| DEPT | \
  \     1 |      4 |      4 |\n\nPredicate Information (identified by operation id):\n\
  \n1 - access(\"E\".\"DEPTNO\"=\"D\".\"DEPTNO\")\n   2 - filter(\"HIREDATE\">TO_DATE('\
  \ 1980-12-17 00:00:00', 'syyyy-mm-dd\n              hh24:mi:ss'))\n```\n\n哈希连接的操作方式是：将来自\
  \ `EMP` 的 13 行符合选择谓词的数据放入一个工作区，该工作区包含一个以内存中哈希集群（键为 `EMP.DEPTNO`）组织的数据。然后，哈希连接对探测表\
  \ `DEPT` 进行单次遍历，对于每一行，我们对 `D.DEPTNO` 应用哈希函数并在 `EMP` 中查找任何匹配的行。\n\n在这方面，哈希连接类似于嵌套循环连接，其中\
  \ `DEPT` 是驱动行源，存储在内存哈希集群中的 `EMP` 表副本是探测行源。然而，为了保持一致性，在我们的连接中我将继续将 `EMP` 称为驱动行源。当探测行源是一个表时，哈希连接相比嵌套循环具有以下优势：\n\
  \n*   探测表中的每个数据块最多只被访问一次，而不会像嵌套循环那样可能被访问多次。\n*   探测表中的连接列不需要索引。\n*   如果对探测表的访问使用了全表扫描（或快速全索引扫描），则可以使用多块读取，这比通过索引进行单块读取高效得多。\n\
  *   连接输入可以交换。我们很快就会讨论哈希连接输入交换。\n\n然而，哈希连接也有以下缺点：\n\n\n\n### 哈希连接注意事项\n\n*   即使探测表中的某个数据块不包含与驱动行源中任何行匹配的行，它仍可能被访问。因此，例如，如果探测表大小为\
  \ 1TB，没有选择谓词，并且只有两行满足连接谓词，我们仍会扫描整个 1TB 的表，而不是通过索引挑选出这两行。\n*   当两个连接操作数都很小时，哈希连接会像嵌套循环一样线性扩展。然而，如果驱动行源过大，哈希表会溢出到磁盘，从而破坏线性的性能特性。\n\
  *   哈希连接只能用于等值连接谓词。\n\n当探测行源上存在索引时，嵌套循环连接可能会多次访问某些数据块，而某些数据块则完全不访问。在带有索引的嵌套循环连接（可能多次访问块）与通过全表扫描恰好访问所有块一次的哈希连接之间做决定可能很困难。优化器会利用连接谓词的选择性与索引的聚簇因子相结合来帮助确定正确的行动方案，正如我们在第\
  \ 9 章中讨论的那样。\n\n### 合并连接\n\n合并连接与归并排序非常相似。驱动和探测行源在开始时都被排序并放入进程私有的工作区中。然后我们以类似于嵌套循环连接的方式进行：对于驱动行源中的每一行，我们在探测行源中查找所有与该驱动行匹配的行。对于像`T1.C1=T2.C2`这样的等值连接谓词，我们可以同步遍历两个已排序的集合。然而，合并连接也可以利用*基于范围的连接谓词*，例如`T1.C1\
  \ < T2.C2`。在这种情况下，随着我们在驱动行源中前进，可能需要“回退”检查排序后探测行源的指针。\n\n考虑清单 11-7，其中包含一个基于范围的连接谓词。\n\
  \n清单 11-7. 包含基于范围的连接谓词的查询\n\n```sql\nCREATE TABLE t1\nAS\n   SELECT ROWNUM c1\n\
  \     FROM all_objects\n    WHERE ROWNUM <= 100;\n\nCREATE TABLE t2\nAS\n   SELECT\
  \ c1 + 1 c2 FROM t1;\n\nCREATE TABLE t3\nAS\n   SELECT c2 + 1 c3 FROM t2;\n\nCREATE\
  \ TABLE t4\nAS\n   SELECT c3 + 1 c4 FROM t3;\n\nSELECT /*+ leading (t1) use_merge(t2)*/\n\
  \       *\n  FROM t1, t2\n WHERE t1.c1 > 3 AND t2.c2 < t1.c1;\n\n| Id  | Operation\
  \           | Name |\n\n|   0 | SELECT STATEMENT    |      |\n|   1 |  MERGE JOIN\
  \         |      |\n|   2 |   SORT JOIN         |      |\n|   3 |    TABLE ACCESS\
  \ FULL| T1   |\n|   4 |   SORT JOIN         |      |\n|   5 |    TABLE ACCESS FULL|\
  \ T2   |\n```\n\n图 11-1 展示了由`T1`驱动的合并连接是如何实现的：\n\n![9781430259770_Fig11-01.jpg](img/9781430259770_Fig11-01.jpg)\n\
  \n图 11-1. 合并连接\n\n请注意：\n\n*   由于`\"<\"`谓词，`T1`和`T2`都按降序排序。如果谓词是`\"=\"`、`\">\"`或`\"\
  >=\"`，则两个表都会按升序排序。\n*   由于选择谓词，`T1`的工作区只包含两行。\n\n如今，合并连接是一种相对少见的连接机制选择，但在满足以下一个或多个条件时可能很有用：\n\
  \n*   第一个行源已经排序，避免了合并连接通常执行的两次排序中的第一次排序。请注意，即使第二个行源初始已排序，它也总是会被再次排序！\n*   要求行源按连接列排序（例如，因为有`ORDER\
  \ BY`子句）。由于连接的结果生成时已经排好序，因此避免了额外的排序步骤。\n*   连接列上没有索引和/或选择性/聚簇因子较弱（使得嵌套循环缺乏吸引力）。\n\
  *   连接谓词是范围谓词（排除了哈希连接）。\n*   两个连接的行源都太大，以至于无法在内存中构建哈希表（使得哈希连接缺乏吸引力）。请注意，合并连接也可能溢出到磁盘，但其影响可能不如哈希连接溢出到磁盘那么严重。\n\
  \n### 笛卡尔连接\n\n笛卡尔连接与合并连接非常相似（在执行计划中显示为`MERGE JOIN CARTESIAN`）。这是最后的连接方法，几乎只在没有可用的连接谓词时使用（除非你使用未文档化且可能无用的`USE_MERGE_CARTESIAN`提示）。这种连接方法的操作类似于合并连接，只是由于驱动行源中的每一行都匹配探测行源中的每一行，因此不进行排序。你可能会看到一个`BUFFER\
  \ SORT`操作，但这具有误导性——它只是缓冲，并不排序。如果驱动行源有`m`行，探测行源有`n`行，那么连接将返回`m x n`行。只要`m x n`很小和/或`m`或`n`为零，笛卡尔连接就不应该成为性能问题。清单\
  \ 11-8 展示了一个笛卡尔连接。\n\n清单 11-8. 笛卡尔连接\n\n```sql\nSELECT /*+ leading (t1) use_merge_cartesian(t2)*/\n\
  \       *\n  FROM t1, t2;\n\n| Id  | Operation            | Name |\n\n|   0 | SELECT\
  \ STATEMENT     |      |\n|   1 |  MERGE JOIN CARTESIAN|      |\n|   2 |   TABLE\
  \ ACCESS FULL  | T1   |\n|   3 |   BUFFER SORT        |      |\n|   4 |    TABLE\
  \ ACCESS FULL | T2   |\n```\n\n再次强调，`BUFFER SORT`操作是缓冲而非排序。\n\n### 连接顺序\n\n哈希连接输入交换是一种生成额外连接顺序的机制，否则这些顺序对\
  \ CBO 不可用。不过，在我们深入探讨哈希连接输入交换之前，让我们先确保理解在没有哈希连接输入交换的情况下可用的合法连接顺序。\n\n#### 无哈希连接输入交换的连接顺序\n\
  \n在实现哈希连接输入交换之前，连接顺序适用以下限制：\n\n*   第一次连接发生在来自`FROM`子句的两个行源之间，生成一个中间结果集。\n*   第二次及所有后续的连接将使用前一次连接产生的中间结果集作为驱动行源，并使用来自`FROM`子句的另一个行源作为探测行源。\n\
  \n让我举个例子。如果我们连接在清单 1-18 中创建的四个表`T1`、`T2`、`T3`和`T4`，进行内连接，那么一个可能的连接树是`((T1 ![image](img/right-arrow.jpg)\
  \ T2) ![image](img/right-arrow.jpg) T3) ![image](img/right-arrow.jpg) T4`。你可以重新排列这些表。第一个表有四种选择，第二个表有三种选择，第三个表有两种选择，第四个表只有一种选择，从而生成\
  \ 24 种可能的合法连接顺序。这种连接顺序类型会导致所谓的*左深连接树*。其原因在图 11-2 中绘制连接时很清楚。\n\n![9781430259770_Fig11-02.jpg](img/9781430259770_Fig11-02.jpg)\n\
  \n图 11-2. 左深连接树\n\n\n\n"
- "# 图 11-2 显示箭头指向下方，因为连接操作会调用其子节点来访问表。不过，你可能更倾向于将箭头绘制为指向上方；这样更能反映数据的流向。\n\n左深连接树引出了一套简单的优化器提示，用于指定连接顺序和连接方法：\n\
  \n*   `LEADING` 提示指定了连接中最前面的几个（或全部）行源。例如，`LEADING(T1 T2)` 强制 CBO 以 `T1` 和 `T2` 开始连接。`T1`\
  \ 必须是驱动行源，`T2` 是探测行源。接下来是连接 `T3` 还是 `T4`，则由 CBO 决定。\n*   提示 `USE_NL`、`USE_HASH`、`USE_MERGE`\
  \ 和 `USE_MERGE_CARTESIAN` 用于指定连接方法。为了标识提示所指的连接，我们使用探测行源的名称。\n\n这一切都有些抽象，但希望 清单 11-9\
  \ 中的示例能使事情变得清晰。\n\n## 清单 11-9. 完全指定连接顺序和连接方法\n\n```sql\nSELECT /*+\nleading (t4\
  \ t3 t2 t1)\nuse_nl(t3)\nuse_nl(t2)\nuse_nl(t1)\n*/\n       *\n  FROM t1\n     \
  \ ,t2\n      ,t3\n      ,t4\n WHERE t1.c1 = t2.c2 AND t2.c2 = t3.c3 AND t3.c3 =\
  \ t4.c4;\n\n| Id  | Operation            | Name |\n\n|   0 | SELECT STATEMENT  \
  \   |      |\n|   1 |  NESTED LOOPS        |      |\n|   2 |   NESTED LOOPS    \
  \   |      |\n|   3 |    NESTED LOOPS      |      |\n|   4 |     TABLE ACCESS FULL|\
  \ T4   |\n|   5 |     TABLE ACCESS FULL| T3   |\n|   6 |    TABLE ACCESS FULL |\
  \ T2   |\n|   7 |   TABLE ACCESS FULL  | T1   |\n```\n\n清单 11-9 中的 `LEADING` 提示指定了所有表，因此连接顺序固定为\
  \ `((T4 ![image](img/right-arrow.jpg) T3) ![image](img/right-arrow.jpg) T2) ![image](img/right-arrow.jpg)\
  \ T1`。在提示连接机制时，三个连接通过它们各自的探测行源来识别：`T3`、`T2` 和 `T1`。在这种情况下，指定 `T4` 的提示将毫无意义，因为它在任何连接中都不是探测行源。\n\
  \n"
- "# 具有哈希连接输入交换的连接顺序\n\n对于哈希连接（且仅限于哈希连接），优化器可以在不需要内联视图的情况下交换连接的输入。例如，假设我们开始时的连接顺序是\
  \ `((T1 ![image](img/right-arrow.jpg) T2) ![image](img/right-arrow.jpg) T3) ![image](img/right-arrow.jpg)\
  \ T4`，然后我们交换了与 `T4` 的最终连接的输入。我们最终得到 `T4 ![image](img/right-arrow.jpg) ((T1 ![image](img/right-arrow.jpg)\
  \ T2) ![image](img/right-arrow.jpg) T3)`。我们第一次得到了一个连接，其探测行源是一个中间结果集。让我们继续这个过程，交换与\
  \ `T3` 的第二次连接的输入。这产生 `T4 ![image](img/right-arrow.jpg) (T3 ![image](img/right-arrow.jpg)\
  \ (T1 ![image](img/right-arrow.jpg) T2))`。我们还可以选择交换与 `T2` 的连接。交换 `T1` 和 `T2` 的连接的输入结果为\
  \ `(T4 ![image](img/right-arrow.jpg) (T3 ![image](img/right-arrow.jpg) (T2 ![image](img/right-arrow.jpg)\
  \ T1)))`。交换 `T1` 和 `T2` 的连接的输入看起来毫无意义：我们本可以直接更改连接顺序。但我们不要分心。我很快就会向你展示为什么交换第一个连接的输入可能很有用。清单\
  \ 11-10 展示了我们如何以不同方式提示 清单 11-9 中的查询以控制连接输入交换。\n\n## 清单 11-10. 一个比较交换和未交换连接输入的简单示例\n\
  \n```sql\nSELECT /*+                                   SELECT /*+\nleading (t1 t2\
  \ t3 t4)                        leading (t1 t2 t3 t4)\nuse_hash(t2)            \
  \                     use_hash(t2)\nuse_hash(t3)                               \
  \  use_hash(t3)\nuse_hash(t4)                                 use_hash(t4)\nno_swap_join_inputs(t2)\
  \                             swap_join_inputs(t2)\nno_swap_join_inputs(t3)    \
  \                         swap_join_inputs(t3)\nno_swap_join_inputs(t4)        \
  \                     swap_join_inputs(t4)\n*/                                 \
  \          */\n       *                                            *\n  FROM t1\
  \                                      FROM t1\n      ,t2                      \
  \                    ,t2\n      ,t3                                          ,t3\n\
  \      ,t4                                          ,t4\n WHERE t1.c1 = t2.c2  \
  \                       WHERE t1.c1 = t2.c2\n   AND t2.c2 = t3.c3              \
  \             AND t2.c2 = t3.c3\n   AND t3.c3 = t4.c4;                         \
  \ AND t3.c3 = t4.c4;\n\n----------------------------------------  --------------------------------------\n\
  | Id  | Operation               | Name |  | Id  | Operation             | Name |\n\
  ----------------------------------------  --------------------------------------\n\
  |   0 | SELECT STATEMENT        |      |  |   0 | SELECT STATEMENT      |      |\n\
  |   1 |  HASH JOIN              |      |  |   1 |  HASH JOIN            |      |\n\
  |   2 |   |HASH JOIN            |      |  |   2 |   |TABLE ACCESS FULL  | T4   |\n\
  |   3 |   | |HASH JOIN          |      |  |   3 |   |HASH JOIN          |      |\n\
  |   4 |   | | |TABLE ACCESS FULL| T1   |  |   4 |    |TABLE ACCESS FULL | T3   |\n\
  |   5 |   | | |TABLE ACCESS FULL| T2   |  |   5 |    |HASH JOIN         |      |\n\
  |   6 |   | |TABLE ACCESS FULL  | T3   |  |   6 |     |TABLE ACCESS FULL| T2   |\n\
  |   7 |   |TABLE ACCESS FULL    | T4   |  |   7 |     |TABLE ACCESS FULL| T1   |\n\
  ----------------------------------------  --------------------------------------\n\
  ```\n\n清单 11-10 的左侧显示了传统的左深连接树，没有交换任何连接输入。这是通过使用 `NO_SWAP_JOIN_INPUTS` 提示来实现的。你会注意到，第\
  \ 3 行连接产生的中间结果集被用作第 2 行连接的驱动行源（第 3 行在垂直方向上位于第 6 行之上），并且第 2 行连接产生的中间结果集是第 1 行连接的驱动行源（第\
  \ 2 行在垂直方向上位于第 7 行之上）。我在 `DBMS_XPLAN` 输出中添加了一些行以使对齐更清晰。\n\n另一方面，清单 11-10 的右侧通过 `SWAP_JOIN_INPUTS`\
  \ 提示交换了所有连接输入。现在你可以看到，由第 5 行连接形成的中间结果集是第 3 行连接的探测行源（第 5 行在垂直方向上位于第 4 行之下），并且由第 3\
  \ 行连接形成的中间结果集是第 1 行连接的探测行源（第 3 行在垂直方向上位于第 2 行之下）。交换所有连接输入的结果被称为右深连接树，并在 图 11-3 中以图示方式描绘。\n\
  \n![9781430259770_Fig11-03.jpg](img/9781430259770_Fig11-03.jpg)\n\n## 图 11-3. 右深连接树\n\
  \n![image](img/sq.jpg) **注意**  如果查询中的某些连接交换了输入而另一些没有，则生成的连接树被称为 *zigzag* 树。诸如 `(T1\
  \ ![image](img/right-arrow.jpg) T2) ![image](img/right-arrow.jpg) (T3 ![image](img/right-arrow.jpg)\
  \ T4)` 的连接树被称为 *bushy* 连接，但 CBO 永远不会考虑 bushy 连接。\n\n\n\n既然 CBO（基于成本的优化器）已经创建了这个右深连接树，运行时引擎会如何使用它呢？尽管\
  \ `LEADING` 提示声称我们从表 `T1` 开始，但运行时引擎实际上首先将从 `T4` 中选出的行放入工作区的一个内存哈希簇中。然后，它将 `T3` 的内容放入第二个工作区，将\
  \ `T2` 的内容放入第三个工作区。接着发生的是，扫描 `T1` 并将来自 `T1` 的行与 `T2` 进行匹配。`T1` 和 `T2` 匹配的结果再与来自\
  \ `T3` 的行进行匹配。最后，来自 `T1`、`T2` 和 `T3` 连接的匹配行再与来自 `T4` 的行进行匹配。\n\n右深连接树的好处可能不会立即显现。乍一看，左深连接树似乎比右深连接树更节省内存。在左深连接树中，运行时引擎通过将\
  \ `T1` 放入工作区，开始处理 Listing 11-10 中第 3 行的连接操作。随着扫描 `T2` 并找到匹配项，连接后的行被放入与第 2 行连接相关的第二个工作区。当\
  \ `T2` 扫描结束时，包含 `T1` 的工作区不再需要，在创建操作 1 用于接收与 `T3` 连接结果所需的新工作区之前就被丢弃了。因此，一个左深连接树最多只会有两个工作区。另一方面，一个具有\
  \ `n` 个连接的右深连接树则需要 `n` 个并发工作区。\n\n理解右深连接树好处的最佳方式是看一个来自数据仓库的例子。Listing 11-11 使用了`SH`示例模式中的表。\n\
  \nListing 11-11. 在数据仓库环境中交换哈希连接输入\n\n```\nSELECT *                             \
  \     SELECT /*+\n  FROM sh.sales                                      leading (sales\
  \ customers products)\n       JOIN sh.products                              use_hash(customers)\n\
  \          USING (prod_id)                    use_hash(products)\n       LEFT JOIN\
  \ sh.customers                no_swap_join_inputs(customers)\n          USING (cust_id);\
  \                   swap_join_inputs(products)\n                               \
  \                 */ *\n                                           FROM sh.sales\n\
  \                                             JOIN sh.products USING (prod_id)\n\
  \                                             LEFT JOIN sh.customers USING (cust_id);\n\
  \n------------------------------------------  -----------------------------------------\n\
  | Id| Operation              | Name      |  | Id| Operation             | Name \
  \     |\n------------------------------------------  -----------------------------------------\n\
  | 0 | SELECT STATEMENT       |           |  | 0 | SELECT STATEMENT      |      \
  \     |\n| 1 |  HASH JOIN             |           |  | 1 |  HASH JOIN          \
  \  |           |\n| 2 |   TABLE ACCESS FULL    | PRODUCTS  |  | 2 |   TABLE ACCESS\
  \ FULL   | PRODUCTS  |\n| 3 |   HASH JOIN RIGHT OUTER|           |  | 3 |   HASH\
  \ JOIN OUTER     |           |\n| 4 |    TABLE ACCESS FULL   | CUSTOMERS |  | 4\
  \ |    PARTITION RANGE ALL|           |\n| 5 |    PARTITION RANGE ALL |        \
  \   |  | 5 |     TABLE ACCESS FULL | SALES     |\n| 6 |     TABLE ACCESS FULL  |\
  \ SALES     |  | 6 |    TABLE ACCESS FULL  | CUSTOMERS |\n------------------------------------------\
  \  -----------------------------------------\n```\n\nListing 11-11 将`SALES`表与`CUSTOMERS`和`PRODUCTS`表连接起来，分别使用了提示和不使用提示。实际的`SALES`数据总是为每笔销售指定了一个客户，但为了演示目的，我想防止`SALES`表中的`CUST_ID`字段可能为`NULL`的情况，因此我将使用外连接来确保`SALES`中的行不会丢失。\n\
  \nListing 2-9 中最大的表是`SALES`，有 918,843 行，因此我们希望最后读取该表，以避免构建可能无法放入内存的巨大哈希簇。`PRODUCTS`表有\
  \ 72 行，`CUSTOMERS`表有 55,500 行，但不幸的是，没有用于连接`PRODUCTS`和`CUSTOMERS`表的谓词，将它们用笛卡尔连接的结果将产生一个包含\
  \ 3,996,000 行（72 x 55,500）的中间结果。让我们看看 CBO 如何解决这个问题。\n\n如果你仔细观察，你会发现未使用提示的查询的连接顺序是\
  \ PRODUCTS ![image](img/right-arrow.jpg) (CUSTOMERS ![image](img/right-arrow.jpg)\
  \ SALES)——一个右深连接树。我们没有将`PRODUCTS`和`CUSTOMERS`用笛卡尔连接起来（生成一个巨大的工作区），而是创建了一个包含 72 行的工作区和另一个包含\
  \ 55,500 行的工作区。然后扫描`SALES`表一次，查询返回`SALES`中与`CUSTOMERS`和`PRODUCTS`表都匹配的行。这就是答案。当将一个大表与多个小表连接时，可以使用右深连接树，方法是创建多个小工作区，而不是一个或多个大工作区。\n\
  \n关于 Listing 11-11 中未使用提示的执行计划，还有一个有趣的观察：第 3 行外连接中的保留行源是探测行源。\n\nListing 11-11 中的`HASH\
  \ JOIN RIGHT OUTER`操作工作方式如下：\n\n*   来自`CUSTOMERS`表的行被放入一个哈希簇。\n*   扫描`SALES`的所有分区。来自`SALES`的每一行都与`CUSTOMERS`进行匹配，任何匹配项都被传递到与`PRODUCTS`的连接。\n\
  *   如果来自`SALES`的行在`CUSTOMERS`中没有匹配项，那么该行仍然会传递到与`PRODUCTS`的连接。\n\nListing 11-11 的右侧使用了提示来抑制`SALES`和`CUSTOMERS`表的输入交换，但在其他方面与左侧相同。`HASH\
  \ JOIN OUTER`操作的工作方式完全不同：\n\n*   `SALES`表被放入内存哈希簇（这次对性能不利）。\n*   扫描`CUSTOMERS`表，在`SALES`中找到的任何匹配项都被传递到与`PRODUCTS`的连接。\n\
  *   当找到匹配项时，`SALES`内存哈希簇中的条目会被标记。\n*   在`CUSTOMERS`扫描结束时，`SALES`哈希簇中任何未被标记的条目都被传递到与`PRODUCTS`的连接。\n\
  \n**外连接操作**\n\n有许多操作支持不同形式的外连接。这些包括 `NESTED LOOPS OUTER`、`HASH JOIN OUTER`、`HASH\
  \ JOIN RIGHT OUTER`、`HASH JOIN FULL OUTER`、`MERGE JOIN OUTER` 和 `MERGE JOIN PARTITION\
  \ OUTER`。\n\n*   只有哈希连接机制直接支持完全外连接。\n*   出于某种原因，`HASH JOIN FULL OUTER`操作的第一个操作数必须是写在`FULL`一词左边的行源，但连接输入可以被交换。\n\
  *   你不能通过改变连接顺序来获得`HASH JOIN RIGHT OUTER`操作。你需要交换连接输入。\n*   除了`HASH JOIN RIGHT OUTER`操作，驱动行源是保留的，而探测行源是可选的。\n\
  *   只有嵌套循环和合并连接支持分区外连接。\n\n虽然我们现在已经介绍了所有显式编写的连接操作的实现，但 CBO 可以生成未以这种方式编写的额外连接。让我们继续讨论半连接，这是\
  \ CBO 可以制造的两种连接类型中的第一种。\n\n"
- '# 半连接




  '
- "# 半连接\n\n事实证明，优化器可以将一些你并非显式编写的连接构造转换为连接。我们将从半连接开始，然后介绍反连接。半连接有两种类型：标准半连接和接受空值的半连接。让我们先看看标准半连接。\n\
  \n## 标准半连接\n\n考虑清单 11-12，它查找有客户的国家：\n\n清单 11-12. 半连接\n\n```\nSELECT *          \
  \                   SELECT *\n  FROM sh.countries                     FROM sh.countries\n\
  \ WHERE country_id IN (SELECT         WHERE country_id IN (SELECT /*+ NO_UNNEST\
  \ */\ncountry_id FROM sh.customers);                            country_id FROM\
  \ sh.customers);\n\n--------------------------------------       --------------------------------------\n\
  | Id| Operation          | Name      |       | Id| Operation          | Name   \
  \   |\n--------------------------------------       --------------------------------------\n\
  | 0 | SELECT STATEMENT   |           |       | 0 | SELECT STATEMENT   |        \
  \   |\n| 1 |  HASH JOIN SEMI    |           |       | 1 |  FILTER            | \
  \          |\n| 2 |   TABLE ACCESS FULL| COUNTRIES |       | 2 |   TABLE ACCESS\
  \ FULL| COUNTRIES |\n| 3 |   TABLE ACCESS FULL| CUSTOMERS |       | 3 |   TABLE\
  \ ACCESS FULL| CUSTOMERS |\n--------------------------------------       --------------------------------------\n\
  ```\n\n当运行时引擎执行清单 11-12 左侧的执行计划时，它会先像常规哈希连接一样为`COUNTRIES`创建一个内存中的哈希簇，然后处理`CUSTOMERS`以查找匹配项。然而，当运行时引擎找到匹配项时，它会从内存中的哈希簇中删除该条目，这样同一个国家就不会再次返回。\n\
  \n将子查询更改为连接的过程称为`子查询展开`，它是优化器转换的一个例子。我们将在第 13 章中更多地讨论优化器转换，但这里先做个预览。像所有优化器转换一样，`子查询展开`由两个提示控制。左侧不需要`UNNEST`提示，因为\
  \ CBO 自己选择了这种转换。在清单 11-12 的右侧，通过`NO_UNNEST`提示显式地抑制了这种转换。没有`子查询展开`的帮助，`CUSTOMERS`表将被扫描\
  \ 23 次，即`COUNTRIES`中的每一行扫描一次。\n\n嵌套循环半连接、合并半连接和哈希半连接都是可能的。\n\n*   半连接的哈希连接输入可以像外连接一样交换，产生`哈希右半连接`操作。\n\
  *   你可以使用`UNNEST`和`NO_UNNEST`提示来控制`子查询展开`。\n*   将局部提示应用于涉及`子查询展开`的执行计划可能有点麻烦，如前面清单\
  \ 8-17 所示。\n*   当你使用以下任何构造时，可能会看到半连接：\n    *   `IN ( ... )`\n    *   `EXISTS ( ...\
  \ )`\n    *   `= ANY ( ... ), > ANY( ... ), < ANY ( ... )`\n    *   `<= ANY (...),\
  \ >=ANY ( ... )`\n    *   `= SOME ( ... ), > SOME( ... ), < SOME ( ... )`\n    *\
  \   `<= SOME (...), >=SOME ( ... )`\n\n## 接受空值的半连接\n\n12cR1 版本扩展了半连接展开，以包含像清单 11-13\
  \ 中的查询：\n\n清单 11-13. 12cR1 中的接受空值半连接\n\n```\nSELECT *\n  FROM t1\n WHERE    t1.c1\
  \ IS NULL OR\n       EXISTS\n             (SELECT *\n                FROM t2\n \
  \              WHERE t1.c1 = t2.c2);\n-----------------------------------  -----------------------------------\n\
  | Id  | Operation          | Name |  | Id  | Operation          | Name |\n-----------------------------------\
  \  -----------------------------------\n|   0 | SELECT STATEMENT   |      |  | \
  \  0 | SELECT STATEMENT   |      |\n|*  1 |  FILTER            |      |  |*  1 |\
  \  HASH JOIN SEMI NA |      |\n|   2 |   TABLE ACCESS FULL| T1   |  |   2 |   TABLE\
  \ ACCESS FULL| T1   |\n|*  3 |   TABLE ACCESS FULL| T2   |  |   3 |   TABLE ACCESS\
  \ FULL| T2   |\n-----------------------------------  -----------------------------------\n\
  \nPredicate Information                  Predicate Information\n---------------------\
  \                  ----------------------\n\n1 - filter(\"T1\".\"C1\" IS NULL OR\
  \     1 - access(\"T1\".\"C1\"=\"T2\".\"C2\")\n       EXISTS (SELECT 0\n    FROM\
  \ \"T2\" \"T2\" WHERE \"T2\".\"C2\"=:B1))\n   3 - filter(\"T2\".\"C2\"=:B1)\n```\n\
  \n像清单 11-13 所示的查询很常见。其思路是，当我们找到与`T2.C2`匹配的项*或者*`T1.C1`为`NULL`时，返回来自`T1`的行。在 12cR1\
  \ 之前，这样的构造会阻止`子查询展开`，从而产生清单 11-13 左侧的执行计划。在 12cR1 中，引入了`哈希半连接 NA`和`哈希右半连接 NA`操作，它们确保除了匹配`T2.C2`的行之外，还返回`T1.C1`为`NULL`的来自`T1`的行，从而产生了清单\
  \ 11-13 右侧所示的执行计划。\n\n## 反连接\n\n你可能看到的另一种`子查询展开`称为`反连接`。`反连接`查找不匹配项而不是匹配项，这正是我们目前一直在做的。与半连接一样，反连接也有两种类型：标准反连接和空值感知反连接。\n\
  \n## 标准反连接\n\n清单 11-14 在客户表中查找无效国家。\n\n清单 11-14. 标准反连接\n\n```\n SELECT /*+ leading(c)*/\
  \ *                SELECT *\n    FROM sh.customers c                       FROM\
  \ sh.customers c\nWHERE country_id                              WHERE country_id\
  \  NOT IN (SELECT country_id\nNOT IN (SELECT country_id                        \
  \                       FROM sh.countries);\n        FROM sh.countries);\n\n-----------------------------------------\
  \       -------------------------------------------\n| Id| Operation          |\
  \ Name         |       | Id| Operation            | Name         |\n-----------------------------------------\
  \       -------------------------------------------\n| 0 | SELECT STATEMENT   |\
  \              |       | 0 | SELECT STATEMENT     |              |\n| 1 |  NESTED\
  \ LOOPS ANTI |              |       | 1 |  HASH JOIN RIGHT ANTI|              |\n\
  | 2 |   TABLE ACCESS FULL| CUSTOMERS    |       | 2 |   INDEX FULL SCAN    | COUNTRIES_PK\
  \ |\n| 3 |   INDEX UNIQUE SCAN| COUNTRIES_PK |       | 3 |   TABLE ACCESS FULL \
  \ | CUSTOMERS    |\n-----------------------------------------       -------------------------------------------\n\
  ```\n\n为了演示目的，我再次为清单 11-14 的左侧添加了提示。对于`CUSTOMERS`中的每一行，我们查找匹配的`COUNTRIES`，但仅当*未*找到匹配项时才返回`CUSTOMERS`中的一行。\n\
  \n嵌套循环反连接、合并反连接和哈希反连接都是可能的。\n\n*   像往常一样，哈希连接的输入可以交换。清单 11-14 右侧显示的未加提示的执行计划使用了输入交换后的哈希连接。\n\
  *   与半连接一样，可以使用`UNNEST`和`NO_UNNEST`提示来控制展开。\n\n当你使用以下任何构造时，可能会看到反连接：\n\n\n\n"
- "# 空值感知反连接\n\n*   `NOT IN ( ... )`\n*   `NOT EXISTS ( ... )`\n*   `!= ALL ( ...\
  \ ), > ALL( ... ), < ALL ( ... ), <= ALL ( ... ), >=ALL ( ... )`\n\n我们前一节展示的执行计划之所以可能，是因为\
  \ `CUSTOMERS` 表和 `COUNTRIES` 表中的 `COUNTRY_ID` 列都定义了 `NOT NULL` 约束。你能看出 Listing 11-15\
  \ 中两个查询的区别吗？\n\n**Listing 11-15. NOT EXISTS 与 NOT IN 对比**\n\n```sql\nSELECT COUNT\
  \ (*)                             SELECT COUNT (*)\n  FROM sh.customers c      \
  \                   FROM sh.customers c\n WHERE NOT EXISTS                     \
  \      WHERE c.cust_src_id NOT IN(SELECT prod_src_id\n          (SELECT 1      \
  \                             FROM sh.products p);\n             FROM sh.products\
  \ p\n            WHERE prod_src_id = cust_src_id);\n-----------------------------------------\
  \        --------------------------------------------\n| Id|  Operation        \
  \    | Name      |        | Id| Operation                | Name      |\n-----------------------------------------\
  \        --------------------------------------------\n| 0 | SELECT STATEMENT  \
  \    |           |        | 0 | SELECT STATEMENT         |           |\n| 1 |  SORT\
  \ AGGREGATE       |           |        | 1 |  SORT AGGREGATE          |        \
  \   |\n| 2 |   HASH JOIN RIGHT ANTI|           |        | 2 |   HASH JOIN RIGHT\
  \ ANTI NA|           |\n| 3 |    TABLE ACCESS FULL  | PRODUCTS  |        | 3 | \
  \   TABLE ACCESS FULL     | PRODUCTS  |\n| 4 |    TABLE ACCESS FULL  | CUSTOMERS\
  \ |        | 4 |    TABLE ACCESS FULL     | CUSTOMERS |\n-----------------------------------------\
  \        --------------------------------------------\n```\n\n看不出来？如果你运行它们，会发现左边的查询返回\
  \ 55,500，而右边的查询返回 0！这是因为有些产品的 `PROD_SRC_ID` 未指定（`NULL`）。如果一个值未指定，我们就无法断言任何值与它不相等。Listing\
  \ 11-16 可能是一个更清晰的例子。\n\n**Listing 11-16. 在 IN 列表中包含 NULL 的简单查询**\n\n```sql\nSELECT\
  \ *\n  FROM DUAL\n WHERE 1 NOT IN (NULL);\n```\n\nListing 11-16 中的查询不返回任何行，因为如果我们不知道\
  \ `NULL` 的值，它可能是 1。\n\n在 11gR1 之前，`CUST_SRC_ID` 可能为 `NULL` 或 `PROD_SRC_ID` 可能为 `NULL`\
  \ 这种可能性，会阻止对 Listing 11-15 右侧查询的子查询解嵌套。\n\n`HASH JOIN RIGHT ANTI NA` 是空值感知反连接的交换连接输入变体。所谓的单一空值感知反连接操作，例如\
  \ `HASH JOIN ANTI SNA` 和 `HASH JOIN RIGHT ANTI SNA` 操作，会在 `PROD_SRC_ID` 非空但 `CUST_SRC_ID`\
  \ 可为空的情况下成为可能。有关空值感知反连接的更多细节，只需在你喜欢的搜索引擎中输入“Greg Rahn null-aware anti-join”。对空值感知反连接的讨论结束了与在串行执行计划中连接表相关的主题列表。但是，我们还有一些来自第\
  \ 8 章关于并行执行计划的未竟事宜，现在我们可以处理了。让我们现在开始吧。\n\n"
- "# 并行连接的分布机制\n\n第 8 章介绍了并行执行的主题，特别是并行查询服务器集（PQSS）通过表队列（TQ）进行通信的一些不同方式。我们不得不将关于并行连接相关分布机制的讨论推迟到我们涵盖串行连接之后，但现在我们可以重新审视这个主题了。\n\
  \n当 PQSS 协作执行两个表的连接时，有相当多的通信机制，其中一些仅适用于分区表，而另一些适用于任何表。正确选择连接分布机制对性能的影响程度并未得到广泛认识，因此我将详细介绍每种分布机制。但在那之前，让我先讨论一下\
  \ `PQ_DISTRIBUTE` 提示在并行连接中的使用方式。\n\n## PQ_DISTRIBUTE 提示与并行连接\n\n当 `PQ_DISTRIBUTE`\
  \ 用作控制负载分布的本地提示时，只提供两个参数，正如我在 Listings 8-23 和 8-24 中演示的那样。当用作控制连接分布的本地提示时，则有三个参数。第一个参数标识该提示应用的连接，为此我们使用探测源的名称，就像我们为\
  \ `USE_HASH` 等提示所做的那样。第二和第三个参数组合使用以指定分布机制。是时候举个例子了。让我们从第一个连接分布机制开始：*全分区智能连接*。\n\n\
  ## 全分区智能连接\n\n全分区智能连接仅在同时满足以下两个条件时才会发生：\n\n*   连接的两个表都是分区表，并且以相同的方式分区。¹\n*   在分区（或子分区）列上存在等值连接谓词。换句话说，一个表中的分区列与另一个表中对应的分区列相等。Listing\
  \ 11-17 展示了全分区智能连接的两个实际示例。\n\n**Listing 11-17. 全分区智能连接**\n\n```sql\nCREATE TABLE\
  \ t_part1\nPARTITION BY HASH (c1)\n   PARTITIONS 8\nAS\n   SELECT c1, ROWNUM AS\
  \ c3 FROM t1;\n\nCREATE TABLE t_part2\nPARTITION BY HASH (c2)\n   PARTITIONS 8\n\
  AS\n   SELECT c1 AS c2, ROWNUM AS c4 FROM t1;\n\nSELECT *\n  FROM t_part1, t_part2\n\
  \ WHERE t_part1.c1 = t_part2.c2;\n\n| Id  | Operation           | Name    |\n\n\
  |   0 | SELECT STATEMENT    |         |\n|   1 |  PARTITION HASH ALL |         |\n\
  |*  2 |   HASH JOIN         |         |\n|   3 |    TABLE ACCESS FULL| T_PART1 |\n\
  |   4 |    TABLE ACCESS FULL| T_PART2 |\n\nPredicate Information (identified by\
  \ operation id):\n\n2 - access(\"T_PART1\".\"C1\"=\"T_PART2\".\"C2\")\n\nSELECT\
  \ /*+ parallel(t_part1 8) parallel(t_part2 8) leading(t_part1)\n           pq_distribute(t_part2\
  \ NONE NONE)*/\n       *\n  FROM t_part1, t_part2\n WHERE t_part1.c1 = t_part2.c2;\n\
  \n| Id  | Operation               | Name     |    TQ  |IN-OUT| PQ Distrib |\n\n\
  |   0 | SELECT STATEMENT        |          |        |      |            |\n|   1\
  \ |  PX COORDINATOR         |          |        |      |            |\n|   2 | \
  \  PX SEND QC (RANDOM)   | :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX\
  \ PARTITION HASH ALL|          |  Q1,00 | PCWC |            |\n|*  4 |     HASH\
  \ JOIN           |          |  Q1,00 | PCWP |            |\n|   5 |      TABLE ACCESS\
  \ FULL  | T_PART1  |  Q1,00 | PCWP |            |\n|   6 |      TABLE ACCESS FULL\
  \  | T_PART2  |  Q1,00 | PCWP |            |\n\nPredicate Information (identified\
  \ by operation id):\n\n4 - access(\"T_PART1\".\"C1\"=\"T_PART2\".\"C2\")\n```\n\n\
  \n\n"
- "# 分区连接与分发机制\n\n## 全分区连接\n\nListing 11-17 首先重新创建了来自 Listing 8-23 的分区表 `T_PART1`\
  \ 和 `T_PART2`，然后以串行和并行方式连接它们。由于两张表以相同方式分区，且连接条件使两个分区列 `T_PART1.C1` 和 `T_PART2.C2`\
  \ 相等，因此可以进行全分区连接。从并行变体中可以看出，只有一个 `TQ` 和一个 DFO。每个并行查询服务器从 `T_PART1` 的一个分区读取数据，然后将其与来自\
  \ `T_PART2` 对应分区的行进行连接。如果分区数多于并行查询服务器数，则可能需要一个并行查询服务器为多个分区重复连接操作。\n\n全分区连接同时支持哈希连接和归并连接，但对我来说原因不特别清楚的是，在\
  \ 12.1.0.1 版本中，嵌套循环似乎是非法的。\n\n由于全分区连接一次处理一对分区，因此内存使用最小化，并且在并行运行时只有一个 DFO，不需要并行查询服务器之间的任何通信。并行全分区连接的潜在缺点是使用了分区粒度，因此如果一张或两张表的某些分区比其他分区大，负载均衡可能无效。在解决这个顾虑之前，让我们考虑当只有一张表按等值连接列分区时会发生什么。\n\
  \n## 部分分区连接\n\nListing 11-18 展示了一个涉及分区表和非分区表的连接。\n\n**Listing 11-18. 部分分区连接**\n\n\
  ```sql\nSELECT                                   SELECT\n  /*+ parallel(t_part1\
  \ 8)                 /*+ parallel(t_part1 8)\n      parallel(t1 8) full(t1)    \
  \             parallel(t1 8) full(t1)\n      leading(t_part1)                  \
  \      leading(t1)\n      no_swap_join_inputs(t1)                 swap_join_inputs(t_part1)\n\
  \      pq_distribute(t1 NONE PARTITION) */     pq_distribute(t_part1 PARTITION NONE)\
  \ */\n       *                                       *\nFROM t_part1 JOIN t1 USING\
  \ (c1);          FROM t_part1 JOIN t1 USING (c1);\n```\n\n```\n| Id  | Operation\
  \                   | Name     |    TQ  |IN-OUT| PQ Distrib |\n|---  |---      \
  \                    |---       |---     |---   |---         |\n|   0 | SELECT STATEMENT\
  \            |          |        |      |            |\n|   1 |  PX COORDINATOR\
  \             |          |        |      |            |\n|   2 |   PX SEND QC (RANDOM)\
  \       | :TQ10001 |  Q1,01 | P->S | QC (RAND)  |\n|*  3 |    HASH JOIN BUFFERED\
  \       |          |  Q1,01 | PCWP |            |\n|   4 |     PX PARTITION HASH\
  \ ALL   |          |  Q1,01 | PCWC |            |\n|   5 |      TABLE ACCESS FULL\
  \      | T_PART1  |  Q1,01 | PCWP |            |\n|   6 |     PX RECEIVE       \
  \       |          |  Q1,01 | PCWP |            |\n|   7 |      PX SEND PARTITION\
  \ (KEY)| :TQ10000 |  Q1,00 | P->P | PART (KEY) |\n|   8 |       PX BLOCK ITERATOR\
  \     |          |  Q1,00 | PCWC |            |\n|   9 |        TABLE ACCESS FULL\
  \    | T1       |  Q1,00 | PCWP |            |\n\nPredicate Information (identified\
  \ by operation id):\n3 - access(\"T_PART1\".\"C1\"=\"T1\".\"C1\")\n```\n\n与全分区连接不同，像\
  \ Listing 11-18 中所示的部分分区连接仅在并行运行语句的执行计划中看到。\n\nListing 11-18 连接了两张表，但只有哈希连接中驱动行源按连接谓词中使用的列进行了分区。我们在这里使用了两个\
  \ PQSS。`T_PART1` 使用了分区粒度，而 `T1` 使用了块范围粒度。从 `T1` 读取的行只能与 `T_PART1` 中一个分区中的对应行匹配，因此\
  \ PQSS1 读取的每一行仅被发送到 PQSS2 中的一个服务器。\n\n请注意，尽管我们消除了被探测行源需要分区的需求，并因此消除了该行源中因数据倾斜导致负载不平衡的风险，但现在我们有了两个\
  \ DFO 和一个 TQ 的开销：一个 DFO 从驱动行源获取行并执行连接，第二个 DFO 访问被探测行源。需要明确的是，这种部分分区连接的变体对于驱动行源中分区大小的变化没有任何帮助。\n\
  \nListing 11-18 展示了我们如何使用提示获得相同执行计划的两种不同方式。如果我们不交换连接输入，则使用关键字 `NONE PARTITION` 来强制此分发机制；如果我们交换了连接输入，我们也交换关键字并指定\
  \ `PARTITION NONE`。\n\n当连接中只有被探测的表被适当分区时，我们也可以使用部分分区连接，我将在接下来关于布隆过滤的讨论中进行演示。\n\n\
  ### 广播分发\n\nListing 11-19 连接了两张非分区表。\n\n**Listing 11-19. BROADCAST 分发机制**\n\n```sql\n\
  CREATE INDEX t1_i1 ON t1 (c1);\n\nSELECT /*+ index(t1) parallel(t2 8)       SELECT\
  \ /*+ index(t1) parallel(t2 8)\n         leading(t1)                           \
  \      leading(t2)\n         use_hash(t2)                                use_hash(t1)\n\
  \         no_swap_join_inputs(t2)                     swap_join_inputs(t1)\n   \
  \      pq_distribute(t2 BROADCAST NONE)            pq_distribute(t1 NONE BROADCAST)\n\
  \         no_pq_replicate(t2)                         no_pq_replicate(t1)\n    \
  \   */                                         */\n       *                    \
  \                      *\n  FROM t1 JOIN t2 ON t1.c1 = t2.c2;          FROM t1 JOIN\
  \ t2 ON t1.c1 = t2.c2;\n```\n\n```\n| Id  | Operation             | Name     | \
  \   TQ  |IN-OUT| PQ Distrib |\n|---  |---                    |---       |---   \
  \  |---   |---         |\n|   0 | SELECT STATEMENT      |          |        |  \
  \    |            |\n|   1 |  PX COORDINATOR       |          |        |      |\
  \            |\n|   2 |   PX SEND QC (RANDOM) | :TQ10001 |  Q1,01 | P->S | QC (RAND)\
  \  |\n|*  3 |    HASH JOIN          |          |  Q1,01 | PCWP |            |\n\
  |   4 |     PX RECEIVE        |          |  Q1,01 | PCWP |            |\n|   5 |\
  \      PX SEND BROADCAST| :TQ10000 |  Q1,00 | S->P | BROADCAST  |\n|   6 |     \
  \  PX SELECTOR     |          |  Q1,00 | SCWC |            |\n|   7 |        INDEX\
  \ FULL SCAN| T1_I1    |  Q1,00 | SCWP |            |\n|   8 |     PX BLOCK ITERATOR\
  \ |          |  Q1,01 | PCWC |            |\n|   9 |      TABLE ACCESS FULL| T2\
  \       |  Q1,01 | PCWP |            |\n\nPredicate Information (identified by operation\
  \ id):\n3 - access(\"T1\".\"C1\"=\"T2\".\"C2\")\n```\n\nListing 11-19 首先在 `T1.C1`\
  \ 上创建索引，然后运行两个查询，并排显示。当查询运行时，PQSS1 中的一个从属进程使用索引从 `T1` 读取行，并将读取的每一行发送到 *每个* PQSS2\
  \ 成员，这些行被放入第 3 行 `HASH JOIN` 的工作区中。一旦 `T1.T1_I1` 索引读取完成，PQSS2 的每个成员使用块范围粒度读取 `T2`\
  \ 的一部分。这些行在第 3 行进行连接，然后发送给 QC。\n\n现在，这可能看起来效率低下。为什么我们要将 `T1` 的行发送到 PQSS2 的 *每个*\
  \ 成员呢？嗯，如果 `T1` 有大量宽行，我们不会这样做。但如果 `T1` 只有少量窄行，广播这些行的开销可能并不那么大。但仍然存在一些开销，那么为什么还要这样做呢？答案在于，我们可以避免在连接之前将\
  \ `T2` 的行发送到任何地方！如果 `T2` 比 `T1` 大得多，通过 TQ 多次发送 `T1` 的行可能比通过 TQ 一次发送 `T2` 的行更好。\n\
  \n\n\n广播分发方法支持所有连接方式，而清单 11-19 展示了两种用于提示哈希连接的变体，类似于部分分区连接。\n\n![image](img/sq.jpg)\
  \ **提示** 你无法对外连接的保留行源进行广播。这是因为对可选行源的存在性检查必须在其所有行上执行。类似的限制也适用于半连接和反连接：你无法广播主查询，因为存在性检查需要应用于子查询中的所有行。\n\
  \n与我在清单 11-18 中展示的部分分区连接类似，清单 11-19 中的广播分发机制使用了两个 DFO，但这次连接是由访问探测行源而非驱动行源的 DFO 执行的。\n\
  \n从技术上讲，广播探测行源而非驱动行源是可行的，但我想不到这有什么用。一种实现方法是用 `SWAP_JOIN_INPUTS` 替换清单 11-19 左侧查询中的\
  \ `NO_SWAP_JOIN_INPUTS`。一方面，广播 `T2` 意味着 `T2` 小于 `T1`。另一方面，选择 `T1` 作为哈希连接的驱动行源这一事实表明\
  \ `T1` 小于 `T2`。这种矛盾意味着 CBO 不太可能选择这种并行连接方法，你或许也不应该这样做。\n\n### 行源复制\n\n这是一种在 12cR1\
  \ 中引入的并行查询分发机制，我尚未看到它的官方名称，因此暂称之为行源复制。出于某种原因，该分发机制不是通过 `PQ_DISTRIBUTE` 的新变体来提示，而是通过一个新的提示\
  \ `PQ_REPLICATE` 来提示，该提示修改了广播复制的行为。\n\n细心的读者会注意到清单 11-19 中的查询包含了 `NO_PQ_REPLICATE`\
  \ 提示。清单 11-20 将这些提示改为了 `PQ_REPLICATE`。\n\n清单 11-20. 行源复制\n\n```sql\nSELECT /*+ parallel(t2\
  \ 8)                   SELECT /*+ parallel(t2 8)\n         leading(t1)         \
  \                        leading(t2)\n         index_ffs(t1) parallel_index(t1)\
  \            index_ffs(t1) parallel_index(t1)\n         use_hash(t2)           \
  \                     use_hash(t1)\n         no_swap_join_inputs(t2)           \
  \          swap_join_inputs(t1)\n         pq_distribute(t2 BROADCAST NONE)     \
  \       pq_distribute(t1 NONE BROADCAST)\n         pq_replicate(t2)            \
  \                pq_replicate(t1)\n       */                                   \
  \      */\n       *                                          *\n  FROM t1 JOIN t2\
  \ ON t1.c1 = t2.c2;          FROM t1 JOIN t2 ON t1.c1 = t2.c2;\n\n| Id  | Operation\
  \               | Name     |\n\n|   0 | SELECT STATEMENT        |          |\n|\
  \   1 |  PX COORDINATOR         |          |\n|   2 |   PX SEND QC (RANDOM)   |\
  \ :TQ10000 |\n|*  3 |    HASH JOIN            |          |\n|   4 |     INDEX FAST\
  \ FULL SCAN| T1_I1    |\n|   5 |     PX BLOCK ITERATOR   |          |\n|   6 | \
  \     TABLE ACCESS FULL  | T2       |\n\nPredicate Information (identified by operation\
  \ id):\n\n3 - access(\"T1\".\"C1\"=\"T2\".\"C2\")\n```\n\n现在，这里发生的事情相当酷。由于 `T1`\
  \ 非常小，CBO 推断让连接 DFO 中的每个并行查询服务器完整读取 `T1`，比使用单独的 DFO 和单独的 TQ 来读取 `T1` 并广播结果更划算。在完整读取\
  \ `T1` 后，每个并行查询服务器读取 `T2` 的一部分。\n\n这种分发机制仅在 `T1` 小而 `T2` 大时才有意义。因此，如果你从 TB 级的表 `T1`\
  \ 中选择一行，除非有提示，否则 CBO 将使用旧的广播分发机制而非复制机制。\n\n你可能已经注意到，我将清单 11-19 中的 `INDEX (T1)` 提示替换为了清单\
  \ 11-20 中的两个提示 `INDEX_FFS (T1)` 和 `PARALLEL_INDEX (T1)`。`T1` 被视为并行读取，尽管它实际上是串行但多次读取。由于这是复制而非并行执行，因此没有理由禁止索引范围扫描或全扫描。然而，截至\
  \ `12.1.0.1`，此功能尚未支持，因此我不得不使用索引快速全扫描作为替代。全表扫描也可以工作。\n\n还有一种分发机制我们尚未讨论。这种连接机制解决了与分区大小相关的所有负载不平衡问题，但有代价。\n\
  \n## 哈希分布\n\n想象一下，你需要将一个行源的 `3GB` 数据与另一个行源的 `3GB` 数据连接。这个连接发生在你夜间批量处理的关键节点。在你的连接完成之前，没有其他任务在运行，也不会有其他任务运行，因此时间至关重要。你有\
  \ `15GB` 的 PGA、`32` 个处理器和 `20` 个并行查询服务器。串行执行不在考虑之列。这不仅会浪费你可用的所有 CPU 和磁盘带宽，而且你的连接操作会溢出到磁盘：工作区的最大大小是\
  \ `2GB`，而你有 `3GB` 的数据。\n\n你需要使用并行执行，并选择 `10` 的并行度（DOP），但你认为应该使用哪种连接分发机制？你的第一个想法应该是某种分区连接。但让我们假设这不是一个选项。也许你的行源不是分区表。也许它们是分区表，但你的全部\
  \ `3GB` 数据来自一个分区。也许 `3GB` 来自多个分区，但连接条件与分区列无关。无论出于何种原因，你都需要找到分区连接的替代方案。\n\n行源复制和广播分发似乎都不吸引人。当你将\
  \ `3GB` 复制或广播到十个并行查询从属进程时，你总共使用了 `30GB` 的 PGA。这超过了可用的 `15GB`。清单 11-21 展示了我们如何解决此类问题。\n\
  \n清单 11-21. 哈希分布\n\n```sql\nALTER SESSION SET optimizer_adaptive_features=FALSE;\n\
  SELECT /*+ full(t1) parallel(t1)\n        parallel(t_part2 8)\n       leading(t1)\n\
  \       use_hash(t_part2)\n       no_swap_join_inputs(t_part2)\n       pq_distribute(t_part2\
  \ HASH HASH)*/\n       *\n  FROM t1 JOIN t_part2 ON t1.c1 = t_part2.c4\n WHERE t_part2.c2\
  \ IN (1, 3, 5);\n\n| Id  | Operation               | Name     | Pstart| Pstop |\
  \    TQ  |IN-OUT| PQ Distrib |\n\n|   0 | SELECT STATEMENT        |          | \
  \      |       |        |      |            |\n|   1 |  PX COORDINATOR         |\
  \          |       |       |        |      |            |\n|   2 |   PX SEND QC\
  \ (RANDOM)   | :TQ10002 |       |       |  Q1,02 | P->S | QC (RAND)  |\n|*  3 |\
  \    HASH JOIN BUFFERED   |          |       |       |  Q1,02 | PCWP |         \
  \   |\n|   4 |     PX RECEIVE          |          |       |       |  Q1,02 | PCWP\
  \ |            |\n|   5 |      PX SEND HASH       | :TQ10000 |       |       | \
  \ Q1,00 | P->P | HASH       |\n|   6 |       PX BLOCK ITERATOR |          |    \
  \   |       |  Q1,00 | PCWC |            |\n|   7 |        TABLE ACCESS FULL| T1\
  \       |       |       |  Q1,00 | PCWP |            |\n|   8 |     PX RECEIVE \
  \         |          |       |       |  Q1,02 | PCWP |            |\n|   9 |   \
  \   PX SEND HASH       | :TQ10001 |       |       |  Q1,01 | P->P | HASH       |\n\
  |  10 |       PX BLOCK ITERATOR |          |KEY(I) |KEY(I) |  Q1,01 | PCWC |   \
  \         |\n|* 11 |        TABLE ACCESS FULL| T_PART2  |KEY(I) |KEY(I) |  Q1,01\
  \ | PCWP |            |\n```\n\n\n\n"
- "# 高级文档工程师排版\n\n**谓词信息 (由操作 ID 标识)：**\n\n*   3 - `access(\"T1\".\"C1\"=\"T_PART2\"\
  .\"C4\")`\n*   11 - `filter(\"T_PART2\".\"C2\"=1 OR \"T_PART2\".\"C2\"=3 OR \"T_PART2\"\
  .\"C2\"=5)`\n\n到目前为止，我展示的所有涉及区块范围粒度的示例都指定了未分区的表。为了表明分区表虽然非必需，但也并非被禁止，清单 11-21 将\
  \ `T_PART2`（一个分区表）与 `T1` 进行了连接。从 `PSTART` 和 `PSTOP` 列可以看出，对分区列 `T_PART2.C2` 的过滤谓词允许进行分区消除，因此并非扫描表中的所有块。但\
  \ `T_PART2` 的剩余块在 `PQSS2` 的成员之间进行分发时，并未考虑它们来自哪个分区。\n\n因为连接条件使用了 `T_PART2.C4`，而 `T_PART2`\
  \ 是使用 `T_PART2.C2` 进行分区的，所以部分分区级连接不可用。作为替代，我们使用了哈希分发。\n\n我想明确区分哈希*分发*和哈希*连接*，因为清单\
  \ 11-21 中同时使用了这两种技术。哈希分发通过 `PQ_DISTRIBUTE (T_PART2 HASH HASH)` 指示强制指定，并在清单 11-21\
  \ 的第 5 行和第 9 行通过 `PX SEND HASH` 操作实现。在清单 11-21 中，对列 `T1.C1` 使用了分发哈希函数，以确保 `T1` 中的每一行都由\
  \ `PQSS1` 准确地发送到 `PQSS2` 的一个成员。当 `PQSS1` 扫描 `T_PART2` 时，对 `T_PART2.C4` 使用了相同的分发哈希函数，以便将来自\
  \ `T_PART2` 的行发送到持有任何来自 `T1` 的匹配行的 `PQSS2` 的那个成员。\n\n![image](img/sq.jpg) **注意**\
  \ 尽管哈希分发避免了因分区大小变化引起的负载不均衡，但负载不均衡仍可能因哈希函数而产生。例如，如果 `T1.C1` 只有一个值，那么来自 `T1` 的所有行都将被发送到\
  \ `PQSS2` 的同一个成员。\n\n连接哈希函数通过 `USE_HASH (T_PART2)` 指示强制指定，并在第 3 行通过 `HASH JOIN BUFFERED`\
  \ 操作实现。与串行哈希连接或其他分发机制的并行连接一样，`PQSS2` 的成员使用连接哈希函数在 `T1.C1` 和 `T_PART2.C4` 上对收到的行进行匹配。哈希分发可以与归并连接一起使用，但它不支持嵌套循环连接。\n\
  \n你会注意到哈希分发涉及三个 DFO：一个 DFO 用于获取驱动行源的数据，第二个 DFO 用于获取探测行源的数据，第三个用于连接本身。在清单 11-21 中，`PQSS1`\
  \ 先读取 `T1`，然后转而读取 `T_PART2`。连接操作由 `PQSS2` 执行。\n\n这看起来很棒，那么有什么不喜欢的呢？嗯，我精心设计了一个非常顺利的场景，一切都没有出错。但是存在一个性能威胁——一个很大的威胁。线索就在第\
  \ 3 行连接操作的名称中。哈希连接总是涉及一个工作区，但第 3 行的 `HASH JOIN BUFFERED` 操作涉及两个工作区！我稍后会解释为什么，但首先我想向你展示\
  \ 12cR1 版本中对哈希分发进行的一项不错的改进。\n\n## 自适应并行连接\n\n你可能已经注意到清单 11-21 开头有一条语句禁用了 12cR1 的自适应功能。清单\
