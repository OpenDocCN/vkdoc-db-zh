  \ SQL Loader 脚本或一组 `INSERT` 语句。这样可以将该脚本与其它项目脚本一起签入源代码控制系统以供存档。\n*   现在，你必须想象 清单\
  \ 9-1 中的剩余代码正在目标系统上运行。良好的做法是先使用 `DBMS_STATS.DELETE_TABLE_STATS` 或 `DBMS_STATS.DELETE_SCHEMA_STATS`\
  \ 删除目标表上任何现有的统计信息。否则，你最终可能会得到一套混合的统计信息。\n*   然后执行对 `DBMS_STATS.IMPORT_TABLE_STATS`\
  \ 的调用，以将对象统计信息从 `CH9_STATS` 堆表加载到数据字典中，随后 CBO 就可以在涉及 `STATEMENT` 表的 SQL 语句中使用这些统计信息。\n\
  \n如果存在任何疑问，那么这些导出/导入操作所需的时间与所涉及对象的大小无关。执行导出/导入操作所需的时间纯粹取决于所涉及对象的数量，对于大多数数据库而言，导入统计信息是一项最多在几分钟内即可完成的任务。\n\
  \n### 传输统计信息\n\nOracle 数据库 12cR1 引入了一种替代导出/导入方法来复制统计信息从一个数据库到另一个数据库的方案。`DBMS_STATS.TRANSFER_STATS`\
  \ 过程允许复制对象统计信息，而无需创建堆表，例如 清单 9-1 中使用的 `CH9_STATS`。清单 9-2 展示了如何直接使用数据库链接将特定表的统计信息从一个数据库传输到另一个数据库。\n\
  \n清单 9-2。使用数据库链接在数据库之间传输统计信息\n\n```sql\nBEGIN\n   DBMS_STATS.transfer_stats (\n\
  \      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   =>\
  \ 'STATEMENT'\n     ,dblink    => 'DBLINK_NAME');\nEND;\n/\n```\n\n如果你想尝试此操作，需要将\
  \ `DBLINK_NAME` 参数值替换为目标数据库上指向源数据库的有效数据库链接的名称。表 `STATEMENT` 的统计信息将直接从一个系统传输到另一个系统。\n\
  \n也许我有些守旧，但在我看来，如果你的统计信息重要到需要复制，那么它们也值得备份。基于这个前提，清单 9-1 中的方法优于 清单 9-2 中的方法。不过话又说回来，也许老狗学不了新把戏。\n\
  \n### 直接设置对象统计信息\n\n尽管绝大多数对象统计信息应该通过收集获得，但在少数情况下需要直接设置统计信息。以下是其中一些情况：\n\n\n\n"
- '# 创建或重建索引与表


  *   使用 `DBMS_STATS.COPY_TABLE_STATS` 包的用户可能需要为复制目标分区的一些列设置统计信息。我们将在第 20 章讨论 `DBMS_STATS.COPY_TABLE_STATS`。

  *   TSTATS 部署模型要求为某些列删除其最小值和最大值。同样，用于稳定执行计划的 TSTATS 模型也将在第 20 章讨论。

  *   在临时表上收集统计信息可能很棘手，因为在收集统计信息时，临时表很可能是空的，尤其是当表设置为 `ON COMMIT DELETE ROWS` 时。

  *   在我看来，所有需要的列都应该手动设置直方图。我主张手动设置直方图，以便限制测试用例的数量。本章稍后的列表 9-8 提供了一个如何直接设置直方图的示例，并更详细地解释了其好处。


  在大型索引上收集对象统计信息可能非常耗时，因为需要从索引中读取数据。然而，在构建或重建索引时，可以生成索引的统计信息，而几乎不会带来额外开销，除非正在建立索引的表的统计信息被锁定，否则这是默认行为。请注意，即使为尚未加载数据的空表创建索引，也无法抑制此行为。


  当运行 `CREATE TABLE ... AS SELECT` 语句时，或者使用 SQL Loader 或 `INSERT ... SELECT` 语句将数据批量加载到空表中时，也可以生成表和列的统计信息。奇怪的是，直到
  12cR1 版本才出现能够在创建或加载表时生成统计信息的功能。以下是一些适用于 12cR1 及更高版本的一般提示：


  *   当通过批量数据加载生成统计信息时，不会生成任何列直方图，并且任何索引的统计信息也不会被更新。

  *   可以通过使用 `GATHER_OPTIMIZER_STATISTICS` 提示，为批量加载到非空表中的数据生成统计信息。

  *   可以通过使用 `NO_GATHER_OPTIMIZER_STATISTICS` 提示来抑制为 `CREATE TABLE ... AS SELECT`
  语句和批量加载空表生成统计信息。


  以上规则可能会让你认为，如果你批量加载数据然后创建索引，那么你将不再需要收集更多统计信息。然而，`函数索引` 会向表中添加 `隐藏列`，而这些列的统计信息只能在索引创建后才能获取。此外，还涉及分区和索引组织表的复杂性。关于在表创建和批量插入期间如何以及何时收集对象统计信息的具体细节，请参阅《SQL
  调优指南》。


  '
- '# 创建对象统计信息总结


  到目前为止，我已经解释了五种可以将对象统计信息加载到数据字典中的不同方式。主要机制是使用诸如 `DBMS_STATS.GATHER_TABLE_STATS` 之类的存储过程直接收集对象统计信息。我们还可以使用
  `DBMS_STATS.IMPORT_TABLE_STATS` 或 `DBMS_STATS.TRANSFER_STATS` 加载预先制作好的统计信息。第四种选择是使用诸如
  `DBMS_STATS.SET_TABLE_STATS` 之类的存储过程将对象统计信息设置为特定值。最后，对象统计信息可以通过 DDL 或 DML 操作（例如
  `CREATE INDEX`）生成。


  既然我们已经将对象统计信息加载到数据库中，能够查看它们就太好了。现在让我们来处理这个问题。


  '
- '# 检查对象统计信息


  对象统计信息同时保存在数据字典和由 `DBMS_STATS.CREATE_STAT_TABLE` 创建的表中。让我们看看如何找到并解读这些统计信息，从数据字典开始。


  ## 检查数据字典中的对象统计信息


  可以通过调用 `DBMS_STATS` 包中的存储过程（例如 `DBMS_STATS.GET_COLUMN_STATS`）来获取数据字典中的统计信息。然而，通常更方便的是使用数据字典上的视图。表
  9-1 列出了用于检查对象统计信息的主要视图。


  表 9-1. 用于检查数据字典中对象统计信息的视图


  ![Table9-1.jpg](img/Table9-1.jpg)


  此时我需要定义一些术语以避免混淆。


  *   对象统计信息与表、索引或列相关联。在本章中，当我指代具有对象统计信息的实体时，将使用术语 `对象表`、`对象索引` 和 `对象列`。我在本章中对这些术语的使用与其在《对象关系开发者指南》中定义的常规用法无关。

  *   可以使用表 9-1 中的视图（以及其他视图）来显示对象统计信息。我将此类视图称为 `统计视图`，将统计视图中的列称为 `统计列`。

  *   我将使用术语 `导出表` 来指代由 `DBMS_STATS.CREATE_STAT_TABLE` 创建的表。我将使用术语 `导出列` 来指代导出表中的列。


  ![image](img/sq.jpg) **提示** 虽然向导出表加载数据的常规方式是使用 `DBMS_STATS.EXPORT_TABLE_STATS`，但也可以使用诸如
  `DBMS_STATS.GATHER_TABLE_STATS` 之类的存储过程，直接将统计信息收集到导出表中，而不更新数据字典。


  在查看表 9-1 时请注意以下几点：


  *   直方图是一种特殊类型的列统计信息。与其他类型的列统计信息不同，每个对象列在统计视图中需要多行记录。因此，直方图显示在一组与其他列统计信息分开的统计视图中。

  *   表 9-1 中列出的所有视图都以 `ALL` 开头。与许多数据字典视图一样，也存在以 `USER` 和 `DBA` 为前缀的替代变体。`USER` 视图仅列出当前用户拥有的对象的统计信息。具有适当权限的用户可以访问
  `DBA` 变体，其中包含由 `SYS` 拥有的对象以及当前用户无权访问的其他对象。表 9-1 中的视图以 `ALL` 开头，显示当前用户有访问权限的所有对象的对象统计信息，包括其他用户拥有的对象。当前用户没有访问权限的对象不会被显示。

  *   对象统计信息也包含在许多其他常用视图中，例如 `ALL_TABLES`，但这些视图可能缺少一些关键列。例如，列 `STATTYPE_LOCKED` 指示表的统计信息是否被锁定，该列不存在于
  `ALL_TABLES` 中，但它存在于 `ALL_TAB_STATISTICS` 中。

  *   视图 `ALL_TAB_COL_STATISTICS` 排除了没有统计信息的对象列，并且三个直方图统计视图不一定列出所有对象列。列表 9-1 中的其他八个表包含具有统计信息的对象行以及没有统计信息的对象行。


  ## 检查已导出的对象统计信息


  当你查看一个导出表时，你会发现大多数导出列都有意被赋予了无意义的名称。例如，在 11gR2 中创建的导出表中有 12 个数字列，名称从 `N1` 到 `N12`。有两个类型为
  `RAW` 的列，名为 `R1` 和 `R2`，30 字节的字符列名为 `C1` 到 `C5`，以及列 `CH1`、`CL1` 和 `D1`。最后三个列分别是一个
  1000 字节的字符列、一个 `CLOB` 和一个 `DATE`。在 12cR1 中添加了额外的列。




  '
- '# 统计信息描述


  到目前为止，在本章中，我已经解释了如何将统计信息加载到数据字典中，如何导出统计信息，以及如何使用统计视图和导出表来检查统计信息。现在是时候看看各个对象统计信息了，以便我们理解它们各自的作用。表
  9-2、9-3 和 9-4 分别提供了表、索引和列统计信息的描述。


  重要的是要认识到 CBO 是一个复杂且不断变化的“野兽”。如果没有访问所有 Oracle 数据库版本的源代码，就不可能确切地说某个特定的统计信息（如果有的话）究竟是如何被使用的。尽管如此，有相当多的已发表研究可以给我们一些概念。¹
  让我们从查看表统计信息开始。


  ## 表统计信息


  表 9-2 提供了每个表统计信息的描述，以及在统计视图和导出表中标识该统计信息的名称。表 9-2 还提供了在调用 `DBMS_STATS.SET_TABLE_STATS`
  时使用的参数名称。


  表 9-2. 表统计信息描述


  ![Table9-2.jpg](img/Table9-2.jpg)


  表 9-2 显示，据我所知，CBO 仅使用了三个表`统计信息`。


  *   `NUM_ROWS`：此统计信息与行源操作的估计`选择率`结合使用，以估计该操作的基数（cardinality）；换句话说，就是该操作预期返回的行数。因此，如果
  `NUM_ROWS` 是 1,000 且选择率计算为 0.1（10%），则该操作的估计基数将为 100。`NUM_ROWS` 统计信息既不用于确定每个返回行将消耗的字节数，也不用于确定操作的成本。

  *   `BLOCKS`：此统计信息仅用于全表扫描，并且仅用于估计行源操作的成本，换句话说，就是全表扫描需要多长时间。此统计信息不用于估计基数或字节数。

  *   `AVG_ROW_LEN`：此统计信息仅用于估计行源操作返回的每行将消耗的字节数。事实上，只有当选择了表中的所有列时，CBO 才可以选择使用此统计信息。大多数时候，列统计信息
  `AVG_COL_LEN` 被用于估计行源操作返回的字节数。


  我们缺少的一个信息是操作的选择率。我们使用列统计信息来计算选择率，在查看索引统计信息之后，我们将讨论列统计信息。


  ## 索引统计信息


  表 9-3 提供了每个索引统计信息的描述，以及在统计视图和导出表中标识该统计信息的名称。表 9-3 还提供了在调用 `DBMS_STATS.SET_INDEX_STATS`
  时使用的参数名称。


  表 9-3. 索引统计信息描述


  ![Table9-3.jpg](img/Table9-3.jpg)


  关于索引统计信息，我想说的第一点是，它们完全独立于表和列统计信息，仅通过查看索引本身就可以收集，无需访问表。例如，看起来与表相关的统计信息 `AVG_DATA_BLOCKS_PER_KEY`，可以通过查看索引条目中的
  ROWID 来确定。


  索引统计信息不仅用于确定索引访问的成本、基数和字节数，还用于在索引访问是 `TABLE ACCESS BY [LOCAL|GLOBAL] ROWID` 操作的子操作时，确定访问表的成本。然而，在查看索引统计信息如何用于计算表访问成本之前，让我们先考虑索引操作本身。


  ### 索引统计信息如何用于索引操作


  有许多用于访问索引的行源操作。这些包括 `INDEX RANGE SCAN`、`INDEX FULL SCAN` 等。我们将在第 10 章中查看所有这些操作。一旦访问了索引，返回的
  ROWID 可能会被用于访问表本身，也可能不会。现在，让我们专注于 CBO 如何使用索引统计信息来为索引访问本身生成估计。


  所有类型的统计信息都可以保存在导出表中，不仅仅是对象统计信息，而这些无意义的列名正反映了导出表的多用途性质。理论上，你不需要解读此类表中的数据。不幸的是，在实践中你很可能需要这么做。一个涉及直接操作导出统计信息的常见场景涉及分区表。假设你为按日期分区的表备份了分区级别的统计信息，并希望在一年后恢复这些统计信息。一些分区可能已被删除，而另一些则已创建，因此分区的名称很可能已经改变。最实际的做法就是在导入前，更新导出表中的分区名称。


  导出表中有一些列具有有意义或半有意义的名称：


  *   `TYPE` 表示统计信息的类型。`T` 表示 `table`（表），`I` 表示 `index`（索引），`C` 表示该行包含列统计信息。当一个对象列有直方图时，导出表中会有多行对应同一个对象列。导出表中所有这样的行，其
  `TYPE` 均为 `C`。

  *   `FLAGS` 是一个位掩码。例如，如果 `TYPE` 的值是 `C` 且 `FLAGS` 是奇数（最低位被置位），则表示该对象列的统计信息是通过调用
  `DBMS_STATS.SET_COLUMN_STATS` 设置的。导入后，`ALL_TAB_COL_STATISTICS` 中的统计信息列 `USER_STATS`
  将为 `YES`。

  *   `VERSION` 适用于导出表的布局。如果你尝试将统计信息从在 10g 中创建的导出表导入到 11g 数据库，系统会要求你运行 `DBMS_STATS.UPGRADE_STAT_TABLE`
  过程。在此过程中，导出表中所有行的 `VERSION` 列的值将从 4 增加到 6。

  *   `STATID` 是一个导出列，允许为同一个对象保存多组统计信息。可以在调用 `DBMS_STATS.EXPORT_TABLE_STATS` 时设置 `STATID`
  的值，并在调用 `DBMS_STATS.IMPORT_TABLE_STATS` 时指定要导入的那组统计信息。


  既然我们知道了显示数据字典中对象统计信息的统计视图，并且从高层次上了解了如何解读导出表中的行，我们就可以继续描述各个统计信息是什么以及它们的用途了。




  '
- "# 索引统计信息如何用于评估表访问的成本\n\n## NUM_ROWS\n如果一个 B 树索引完全由非空列组成，那么索引的 `NUM_ROWS` 值将与表的\
  \ `NUM_ROWS` 值完全匹配。但是，当被索引的列包含 `NULL` 时，该行在 B 树索引中不会创建条目，因此索引的 `NUM_ROWS` 值可能低于表的\
  \ `NUM_ROWS` 值。事实证明，有时 CBO（基于成本的优化器）会利用索引的 `NUM_ROWS` 统计信息来估算索引操作的基数（cardinality），但在大多数情况下，索引的统计信息会被忽略，而使用表的\
  \ `NUM_ROWS` 统计信息进行基数计算。\n\n## LEAF_BLOCKS\n此统计信息用于帮助确定索引操作的成本。如果选择性（selectivity）为\
  \ 10%（不包括过滤谓词），则假定访问的叶块（leaf blocks）数量为 `LEAF_BLOCKS` 统计信息值的 10%。\n\n## BLEVEL\n\
  大多数索引访问操作涉及访问索引的根块（root block）并向下遍历到叶块。`BLEVEL` 统计信息可直接用于估算此遍历过程的成本，并与基于 `LEAF_BLOCKS`\
  \ 的计算结果相加，以得出索引操作的总体成本。`INDEX FAST FULL SCAN`（索引快速全扫描）的成本计算算法是唯一不使用 `BLEVEL` 统计信息的算法，因为它不是从根块开始遍历索引来读取叶块。我将在第\
  \ 10 章中，结合其他访问方法来讨论 `INDEX FAST FULL SCAN` 操作。\n\n索引访问操作返回的字节数，是通过将索引操作返回的所有列的 `AVG_COL_LEN`（平均列长度）列统计信息相加，再加上一些额外开销（overhead）来确定的。我们需要使用列统计信息来确定索引操作的选择性，就像对表操作所做的那样。在解释了如何使用索引统计信息来评估通过索引访问表的成本之后，我将接着讨论列统计信息。\n\
  \n当通过索引访问表时，该访问的估算成本是由索引（而非表）的统计信息决定的。另一方面，索引统计信息既不用于确定表访问操作返回的行数，也不用于确定返回的字节数。这是合理的，因为从表中选择的行数与使用哪个索引（或是否使用索引）来访问表无关。\n\
  \n图 9-1 和 图 9-2 展示了确定通过索引访问表的成本有多么困难。\n\n![9781430259770_Fig09-01.jpg](img/9781430259770_Fig09-01.jpg)\n\
  图 9-1. 来自弱聚簇索引的表块\n\n![9781430259770_Fig09-02.jpg](img/9781430259770_Fig09-02.jpg)\n\
  图 9-2. 来自强聚簇索引的表块\n\n图 9-1 展示了一个假想表中的三个表块，该表共有十个块，每个块包含 20 行，总共 200 行。假设表中有 20 行在特定列上具有特定值，并且该列已被索引。如果这\
  \ 20 行分散在整个表中，那么每个块中大约会有两行匹配数据。我在图 9-1 中用高亮行表示了这种情况。\n\n如图所示，要获取这 20 行数据，几乎需要读取表中的所有块，因此全表扫描会比索引访问更高效，主要原因是全表扫描可以使用多块读取（multi-block\
  \ reads）来访问表，而不是单块读取（single block reads）。现在来看一下图 9-2。\n\n在这种情况下，我们通过索引选择的所有 20 行都出现在一个块中，现在索引访问将高效得多，因为只需要读取一个表块。请注意，在图\
  \ 9-1 和图 9-2 中，选择性都是 10%（200 行中的 20 行），因此仅知道选择性对于 CBO 估算通过索引访问表的成本来说是不够的。于是引入了 `聚簇因子（clustering\
  \ factor）`。要计算通过索引访问表（而非访问索引本身）的成本，我们将聚簇因子乘以选择性。由于强聚簇索引的 `聚簇因子` 比弱聚簇索引的 `聚簇因子` 更低，因此通过强聚簇索引访问表的成本低于通过弱聚簇索引访问表的成本。清单\
  \ 9-3 演示了这在实践中是如何运作的。\n\n## 清单 9-3. 聚簇因子对表访问成本的影响\n```sql\nSELECT index_name, distinct_keys,\
  \ clustering_factor\n  FROM all_ind_statistics I\n  WHERE    i.table_name = 'STATEMENT'\n\
  \       AND i.owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n       AND i.index_name\
  \ IN ('STATEMENT_I_PC', 'STATEMENT_I_CC')\nORDER BY index_name DESC;\n\nSELECT *\n\
  \  FROM statement t\n WHERE product_category = 1;\n\nSELECT *\n  FROM statement\
  \ t\n WHERE customer_category = 1;\n\nSELECT /*+ index(t (customer_category)) */\n\
  \       *\n  FROM statement t\n WHERE customer_category = 1;\n--\n-- 第一个查询的输出，显示索引的聚簇因子\n\
  --\n\nINDEX_NAME                     DISTINCT_KEYS                          CLUSTERING_FACTOR\n\
  STATEMENT_I_PC                 10                                     17\nSTATEMENT_I_CC\
  \                 50                                     500\n\n--\n-- 对 STATEMENT\
  \ 表的三个查询的执行计划\n--\n\n| Id  | Operation                           | Name        \
  \   | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT                    |            \
  \    |     3   (0)|\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| STATEMENT   \
  \   |     3   (0)|\n|   2 |   INDEX RANGE SCAN                  | STATEMENT_I_PC\
  \ |     1   (0)|\n\n| Id  | Operation         | Name      | Cost (%CPU)|\n\n|  \
  \ 0 | SELECT STATEMENT  |           |     7   (0)|\n|   1 |  TABLE ACCESS FULL|\
  \ STATEMENT |     7   (0)|\n\n| Id  | Operation                           | Name\
  \           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT                    |    \
  \            |    11   (0)|\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| STATEMENT\
  \      |    11   (0)|\n|   2 |   INDEX RANGE SCAN                  | STATEMENT_I_CC\
  \ |     1   (0)|\n```\n\n我已安排插入 `STATEMENT` 表的前 50 行具有一个 `PRODUCT_CATEGORY` 值，接下来的\
  \ 50 行具有第二个值，依此类推。因此，`PRODUCT_CATEGORY` 有 10 个不同的值，并且数据是强聚簇的，因为所有属于同一个 `PRODUCT_CATEGORY`\
  \ 的行都集中在少量的块中。另一方面，`CUSTOMER_CATEGORY` 的 50 个值是使用 `MOD` 函数分配的，因此特定 `CUSTOMER_CATEGORY`\
  \ 的行分散在整个表中。\n\n当我们选择特定 `PRODUCT_CATEGORY` 的行时，我们将选择性（1/10）乘以 `STATEMENT_I_PC` 索引的聚簇因子（清单\
  \ 9-3 显示为 17），得到值 1.7。索引访问本身的成本为 1，因此通过索引访问表的总成本为 2.7。为显示目的，该值被四舍五入为 3。\n\n\n"
- "# 索引访问成本与统计\n\n共有 50 个不同的 `CUSTOMER_CATEGORY` 值，因此当我们按一个 `CUSTOMER_CATEGORY` 值选择行时，只得到\
  \ 10 行，而不是按特定 `PRODUCT_CATEGORY` 选择时得到的 50 行。仅基于选择性参数，您可能会认为，如果 CBO 使用索引访问 50 行，它也会使用索引访问\
  \ 10 行。然而，由于特定 `CUSTOMER_CATEGORY` 的选择行分散在表中，聚簇因子更高，现在 CBO 估计全表扫描比索引访问更便宜。Listing\
  \ 9-3 中报告的全表扫描成本为 `7`。当我们使用提示强制使用索引时，通过索引访问表的成本计算为选择性 (`1/50`) 乘以 `STATEMENT_I_CC`\
  \ 索引的聚簇因子 (`500`)。这得出成本 `10`，再加上索引访问本身的成本 `1`，显示的总成本为 `11`。由于通过索引访问表的估计总成本是 `11`，而全表扫描的成本是\
  \ `5`，未加提示的选择特定 `CUSTOMER_CATEGORY` 行会使用全表扫描。\n\n## 通过多列索引的嵌套循环访问\n\n存在一种晦涩的情况，其中索引范围扫描的成本计算方式与我上面描述的完全不同。该情况涉及多列索引上的嵌套循环，其中索引列的值之间存在强相关性，并且所有索引列都存在等式谓词。这种晦涩的情况通过\
  \ `DISTINCT_KEYS` 的低值来识别，其计算只是简单地将 `BLEVEL` 和 `AVG_LEAF_BLOCKS_PER_KEY` 相加作为索引访问成本；表访问成本是\
  \ `AVG_DATA_BLOCKS_PER_KEY`。我提到这种情况只是为了避免让您产生 `DISTINCT_KEYS`、`AVG_LEAF_BLOCKS_PER_KEY`\
  \ 和 `AVG_DATA_BLOCKS_PER_KEY` 索引统计信息未被使用的印象。有关此晦涩情况的更多信息，请参见 Jonathan Lewis (2006)\
  \ 的《Cost-Based Oracle》的第 11 章。\n\n## 函数基础索引与 TIMESTAMP WITH TIME ZONE\n\n可以创建涉及表中列的表达式（而不仅仅是列本身）的一个或多个表达式的索引。此类索引被称为*函数基础索引*。可能令你们中的一些人感到惊讶的是，任何在\
  \ `TIMESTAMP WITH TIME ZONE` 类型的列上创建索引的尝试都会创建一个函数基础索引！这是因为 `TIMESTAMP WITH TIME\
  \ ZONE` 类型的列在索引时以 Listing 9-4 所示的方式进行转换。\n\n### Listing 9-4. 一个涉及 TIMESTAMP WITH\
  \ TIME ZONE 的函数基础索引\n\n```\nSELECT transaction_date_time\n  FROM statement t\n WHERE\
  \ transaction_date_time = TIMESTAMP '2013-01-02 12:00:00.00 -05:00';\n\n| Id  |\
  \ Operation                           | Name                |\n|---|---|---|\n|\
  \   0 | SELECT STATEMENT                    |                     |\n|   1 |  TABLE\
  \ ACCESS BY INDEX ROWID BATCHED| STATEMENT           |\n|   2 |   INDEX RANGE SCAN\
  \                  | STATEMENT_I_TRAN_DT |\n\nPredicate Information (identified\
  \ by operation id):\n\n2 - access(SYS_EXTRACT_UTC(\"TRANSACTION_DATE_TIME\")=TIMESTAMP'\n\
  \              2013-01-02 17:00:00.000000000')\n```\n\n如果您查看 Listing 9-4 中查询执行计划的过滤谓词，您将看到谓词已更改，包含了一个函数\
  \ `SYS_EXTRACT_UTC`，该函数将 `TIMESTAMP WITH TIME ZONE` 数据类型转换为表示*协调世界时* (UTC) 的 `TIMESTAMP`\
  \ 数据类型²。字面量中原始时区比 UTC 早五小时，这一事实反映在执行计划中显示的谓词的 `TIMESTAMP` 字面量中。进行此转换的原因是，两个涉及不同时区但实际上是同时发生的\
  \ `TIMESTAMP WITH TIME ZONE` 值被认为是相等的。请注意，由于函数基础索引排除了原始时区，即使选择列表中没有其他列，也需要访问表本身以检索时区。\n\
  \n![image](img/sq.jpg) **注意** 由于所有涉及 `TIMESTAMP WITH TIME ZONE` 类型列的谓词都被转换为使用 `SYS_EXTRACT_UTC`\
  \ 函数，因此无法使用 `TIMESTAMP WITH TIME ZONE` 类型的对象列上的列统计信息来确定基数！\n\n#### 位图索引\n\n位图索引的根块和分支块的结构与\
  \ B-tree 索引相同，但叶块中的条目是指向表中多个行的位图。因此，位图索引的 `NUM_ROWS` 统计信息（在这种情况下应解释为“索引条目数”）通常远小于表中的行数，对于小表将等于该列的不同值的数量。`CLUSTERING_FACTOR`\
  \ 在位图索引中未使用，并被任意设置为 `NUM_ROWS` 的副本。\n\n"
- '# 列统计信息


  最后我们来讨论列统计信息。列统计信息与操作的成本无关，而与操作返回的行的大小和操作的基数有关。与表和索引统计信息一样，表 9-4 列出了各个列统计信息，并提供了统计视图和导出表中的相关标识符。表
  9-4 还提供了 `DBMS_STATS.SET_COLUMN_STATS` 的参数名称。


  ### 表 9-4. 表统计信息描述


  ![Table9-4.jpg](img/Table9-4.jpg)


  尽管列统计信息可以独立于表统计信息设置和导出，但列统计信息只能与表一起收集。`DBMS_STATS` 收集过程的 `METHOD_OPT` 参数控制收集哪些列统计信息以及是否为这些列生成直方图。


  让我首先描述在没有直方图的情况下如何使用列统计信息，然后解释直方图如何改变情况。



  '
- "# 列统计信息\n\n*   **NUM_DISTINCT.** 此统计信息*有时*用于确定选择率。如果对一个有五个不同值的列使用等值谓词，选择率将是 1/5\
  \ 或 20%。另请参见`DENSITY`统计信息。\n*   **DENSITY.** *当不使用直方图时*，此统计信息是`NUM_DISTINCT`的倒数，并*有时*用于确定选择率。如果对一个有五个不同值的列使用等值谓词，`DENSITY`列将反映\
  \ 1/5 或 0.2 的选择率。\n*   **NUM_NULLS.** 此列统计信息用于帮助确定基数。当你有这样的谓词时，例如 `<object_column>\
  \ IS NULL` 或 `<object_column> IS NOT NULL`，该统计信息显然非常宝贵。在后一种情况下，选择的行数是对象表的`NUM_ROWS`统计信息值减去对象列的`NUM_NULLS`统计信息值。对于对象列，非空值的行数也是计算相等、不等和范围谓词基数的基础。\n\
  *   **LOW_VALUE 和 HIGH_VALUE.** 这些列统计信息的主要目的是处理范围谓词，例如 `TRANSACTION_DATE` < `DATE\
  \ '2013-02-11'`。由于在清单 9-1 中创建的`STATEMENT`表里`TRANSACTION_DATE`的最大值已知是 2013 年 1 月\
  \ 10 日，因此该谓词的选择率估计为 100%。我将在第 20 章中回到`LOW_VALUE`和`HIGH_VALUE`列统计信息进行更详细的解释。\n* \
  \  **AVG_COL_LEN.** 此统计信息用于确定操作返回的字节数。例如，如果你从一个表中选择五列，那么估计该操作每行返回的字节数将是这五列的`AVG_COL_LEN`统计信息的总和，再加上每行的可变大小开销。\n\
  \n对列统计信息的这个解释似乎遗漏了很多内容。如果你从一个典型应用中随机挑选几条 SQL 语句，并尝试仅基于对象统计信息和我目前的解释来重现 CBO 的基数计算，你可能会在很少的情况下成功。但首先，让我们看看清单\
  \ 9-5 并过一个非常简单的例子。\n\n## 清单 9-5. 基于列统计信息的简单基数和字节计算\n\n```sql\nSELECT num_rows\n\
  \      ,column_name\n      ,num_nulls\n      ,avg_col_len\n      ,num_distinct\n\
  \      ,ROUND (density, 3) density\n  FROM all_tab_col_statistics c, all_tab_statistics\
  \ t\n WHERE     t.owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n       AND\
  \ t.table_name = 'STATEMENT'\n       AND c.owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \       AND c.table_name = 'STATEMENT'\n       AND c.column_name IN ('TRANSACTION_DATE'\n\
  \                            ,'DESCRIPTION'\n                            ,'POSTING_DATE'\n\
  \                            ,'POSTING_DELAY');\n\nSELECT *\n  FROM statement\n\
  \ WHERE description = 'Flight' AND posting_delay = 0;\n```\n\n```\nNUM_ROWS  COLUMN_NAME\
  \        NUM_NULLS   AVG_COL_LEN  NUM_DISTINCT DENSITY\n500       TRANSACTION_DATE\
  \   0           8            10           0.1\n500       POSTING_DATE       0  \
  \         8            12           0.083\n500       POSTING_DELAY      0      \
  \     3            3            0.333\n500       DESCRIPTION        0          \
  \ 7            4            0.25\n```\n\n```\n| Id  | Operation         | Name \
  \     | Rows  | Bytes | Time     |\n|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT\
  \  |           |    42 |  2310 | 00:00:01 |\n|   1 |  TABLE ACCESS FULL| STATEMENT\
  \ |    42 |  2310 | 00:00:01 |\n```\n\n清单 9-5 首先从统计视图中选择几个相关的列统计信息，并查看基于清单 9-1 中创建的表的简单单表选择语句的执行计划。\n\
  \n*   第一个选择谓词是在`DESCRIPTION`列上的等值操作，`DESCRIPTION`对象列的`NUM_DISTINCT`列统计信息为 4（`DENSITY`为\
  \ 1/4）。\n*   第二个选择谓词是在`POSTING_DELAY`列上的等值操作，`POSTING_DELAY`对象列的`NUM_DISTINCT`列统计信息为\
  \ 3（`DENSITY`为 1/3）。\n*   `STATEMENT`表的`NUM_ROWS`统计信息为 500，`DESCRIPTION`和`POSTING_DELAY`列的`NUM_NULLS`统计信息为\
  \ 0，因此我们从中进行选择的估计行数是 500。\n*   给定 1/4 和 1/3 的选择率，从 500 行中，该语句的估计基数是 500/4/3 = 41.67，四舍五入后这就是`DBMS_XPLAN`显示的内容。\n\
  \n你可能会说，这都很好，但真实的查询在选择列表和谓词中包含表达式和函数调用。清单 9-6 只是稍微复杂一点，但 CBO 的估计开始变得不那么科学，也不那么准确了。\n\
  \n## 清单 9-6. 缺少列统计信息时的 CBO 计算\n\n```sql\nSELECT *\n  FROM statement\n WHERE SUBSTR\
  \ (description, 1, 1) = 'F';\n```\n\n```\n| Id  | Operation         | Name     \
  \ | Rows  | Bytes | Time     |\n|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT\
  \  |           |     5 |   275 | 00:00:01 |\n|   1 |  TABLE ACCESS FULL| STATEMENT\
  \ |     5 |   275 | 00:00:01 |\n```\n\n这次我们的谓词涉及一个函数调用。我们没有可用的列统计信息，所以 CBO 必须选择一个任意的选择率。当面对一个等值谓词且没有可用于估计选择率的统计数据时，CBO\
  \ 就直接选择 1%！硬编码的！因此，我们估计的基数是 500/100 = 5。如果你运行这个查询，实际会得到 125 行，所以估计值相差了 25 倍。\n\n\
  公平地说，我对 CBO 基数估计算法的解释是异常简化的，但这并不影响观点的有效性：即在没有有意义的输入数据时，CBO 通常会做出任意的估计。\n\n"
- "# 直方图\n\n到目前为止对列统计信息的解释意味着，CBO 必须以相同的方式处理大多数涉及列名和字面值的等值谓词，而不管提供的值是什么。清单 9-7 显示了这可能带来的问题。\n\
  \n## 清单 9-7. 缺失直方图的示例\n\n```sql\nSELECT *\n  FROM statement\n WHERE transaction_amount\
  \ = 8;\n```\n\n```\n| Id  | Operation         | Name      | Rows  | Bytes | Cost\
  \ (%CPU)| Time     |\n|---|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT  |\
  \           |     2 |   106 |     8   (0)| 00:00:01 |\n|*  1 |  TABLE ACCESS FULL|\
  \ STATEMENT |     2 |   106 |     8   (0)| 00:00:01 |\n```\n\n在`STATEMENT`表中，`TRANSACTION_AMOUNT`有\
  \ 262 个不同的值，范围从 5 到 15200。CBO（这次是正确的）假设 8 是这 262 个值之一，但假设只有大约 500/262 行会有`TRANSACTION_AMOUNT\
  \ = 8`。实际上，有 125 行满足`TRANSACTION_AMOUNT = 8`。在这种情况下，提高 CBO 估计准确性的方法是定义直方图。在创建直方图之前，我想定义我称之为*直方图规范*的东西，它记录了我们希望\
  \ CBO 做出的不同估计。对于`TRANSACTION_AMOUNT`，我建议以下直方图规范：\n\n对于`STATEMENT`中的每 500 行，CBO 应假设其中\
  \ 125 行的`TRANSACTION_AMOUNT`值为 8，并且 CBO 应假设对于任何其他提供的值，只有 2 行。\n\n清单 9-8 展示了我们如何构建一个直方图来让\
  \ CBO 做出这些假设。\n\n## 清单 9-8. 在 TRANSACTION_AMOUNT 上创建直方图\n\n\n```\nDECLARE\n   srec\
  \   DBMS_STATS.statrec;\nBEGIN\n   FOR r\n      IN (SELECT *\n            FROM all_tab_cols\n\
  \           WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n      \
  \           AND table_name = 'STATEMENT'\n                 AND column_name = 'TRANSACTION_AMOUNT')\n\
  \   LOOP\n      srec.epc := 3;\n      srec.bkvals := DBMS_STATS.numarray (600, 400,\
  \ 600);\n      DBMS_STATS.prepare_column_values (srec\n                        \
  \               ,DBMS_STATS.numarray (-1e7, 8, 1e7));\n      DBMS_STATS.set_column_stats\
  \ (ownname   => r.owner\n                                  ,tabname   => r.table_name\n\
  \                                  ,colname   => r.column_name\n               \
  \                   ,distcnt   => 3\n                                  ,density\
  \   => 1 / 250\n                                  ,nullcnt   => 0\n            \
  \                      ,srec      => srec\n                                  ,avgclen\
  \   => r.avg_col_len);\n   END LOOP;\nEND;\n/\n\nSELECT *\n  FROM statement\n WHERE\
  \ transaction_amount = 8;\n\n| Id  | Operation         | Name      | Rows  | Bytes\
  \ | Time     |\n| --- | ----------------- | --------- | ----- | ----- | --------\
  \ |\n|   0 | SELECT STATEMENT  |           |   125 |  6875 | 00:00:01 |\n|   1 |\
  \  TABLE ACCESS FULL| STATEMENT |   125 |  6875 | 00:00:01 |\n\nSELECT *\n  FROM\
  \ statement\n WHERE transaction_amount = 1640;\n\n| Id  | Operation         | Name\
  \      | Rows  | Bytes | Time     |\n| --- | ----------------- | --------- | -----\
  \ | ----- | -------- |\n|   0 | SELECT STATEMENT  |           |     2 |   110 |\
  \ 00:00:01 |\n|   1 |  TABLE ACCESS FULL| STATEMENT |     2 |   110 | 00:00:01 |\n\
  ```\n\n这个 PL/SQL \"循环\"实际上只会调用一次`DBMS_STATS.SET_COLUMN_STATS`，因为对`ALL_TAB_COLS`³的查询只返回一行。在`TRANSACTION_AMOUNT`上定义直方图的关键是我在粗体中突出显示的`SREC`参数。这个结构的设置如下：\n\
  \n1.  设置`SREC.EPC`。`EPC`是*End Point Count*（端点计数）的缩写，在这里定义了对象列的不同值的数量。我建议将`EPC`设置为比*直方图规范*定义的列值数量多两个。在我们的例子中，直方图规范中唯一的值是\
  \ 8，所以我们设置`EPC`为 3。\n2.  设置`SREC.BKVALS`。`BKVALS`是*bucket values*（桶值）的缩写，这里的三个桶值列表表示每个端点的假设行数。因此，理论上\
  \ 600 行有一个`TRANSACTION_AMOUNT`值，400 行有第二个值，600 行有第三个值。这三个值一起表明表中有 1600 行（`600+400+600=1600`）。实际上，这些值的实际解释是：对于表中的*每\
  \ 1600 行*，600 行具有第一个（尚未指定的）`TRANSACTION_AMOUNT`值，400 行具有第二个值，600 行具有第三个值。\n3.  调用`DBMS_STATS.PREPARE_COLUMN_VALUES`来为每个端点定义实际的对象列值。第一个端点故意设置得非常低，中间端点是我们直方图规范中的值\
  \ 8，最后一个值故意设置得非常高。在我们有序值集的开头和结尾添加极低和极高值的原因是，我们为什么将`SREC.EPC`设置为比直方图规范中的值数量多两个。我们永远不会在谓词中使用这些荒谬的值（否则它们就不荒谬了），所以唯一值得注意的统计信息是：每\
  \ 1600 行中有 400 行的值为 8。这意味着当我们从 500 行中选择时，CBO 给出的基数估计是`500 x 400 / 1600 = 125`。\n\
  4.  调用`DBMS_STATS.SET_COLUMN_STATS`。有两个参数我想请你注意。\n    *   **DISTCNT** 设置为 3。我们为列定义了三个值`(-1e7,\
  \ 8, 和 1e7)`，所以我们需要保持一致，将`DISTCNT`设置为与`SREC.EPC`相同的值。这种安排确保我们获得所谓的*频率直方图*。\n   \
  \ *   **DENSITY** 设置为 1/250。当定义了频率直方图时，该统计信息表示谓词中未在直方图中指定的值的选择性。清单 9-8 中提供的值 1/250\
  \ 表明，对于 500 个非空行，当谓词中出现三个提供值以外的任何值时，CBO 应假设有 500/250 = 2 行匹配该相等谓词。\n\n直方图创建后，我们可以看到，当提供`TRANSACTION_AMOUNT\
  \ = 8`谓词时，CBO 给出的基数估计是 125；当谓词中提供任何其他字面值时，基数估计是 2。\n\n以这种方式创建直方图通常被称为*伪造直方图*。我不喜欢这个术语，因为它暗示收集的（非伪造的）直方图在某种程度上更优越。其实不然。例如，当我在我的\
  \ 12cR1 数据库上允许为`TRANSACTION_AMOUNT`自动创建直方图时，我得到了一个具有 254 个端点的直方图。理论上，这意味着对于涉及`TRANSACTION_AMOUNT`相等谓词的每条语句，我可能会得到\
  \ 255 个不同的执行计划（每个定义的端点一个，加上直方图中未指定值的一个）。通过使用为测试而定义的直方图规范手动创建频率直方图，你可以限制测试用例的数量。在清单\
  \ 9-8 的例子中，每条语句只有两个测试用例：`TRANSACTION_AMOUNT = 8` 和 `TRANSACTION_AMOUNT = <任何其他值>`。\n\
  \n以此方式手动创建直方图时，请牢记以下几点：\n\n"
- "# 手动创建直方图与虚拟列\n\n## 手动创建频率直方图的注意事项\n\n*   手动创建一个具有不合理最小值和最大值的频率直方图，意味着你不必担心新出现的列值高于之前的最大值或低于之前的最小值。然而，像\
  \ `TRANSACTION_AMOUNT > 15000` 这样的范围谓词可能会导致基数估计值过高。如果你使用范围谓词，你可能需要选择合理的最小值和最大值。\n\
  *   不要为 `srec.bkvals` 数组选择过小的值，否则可能会产生舍入误差。例如，不要将清单 9-8 中的 600、400 和 600 替换为 6、4\
  \ 和 6。这会改变像 `TRANSACTION_AMOUNT > 8` 这类谓词的结果。\n*   如果来自 `DENSITY` 的默认选择率高于为提供的端点指定的选择率，CBO（基于成本的优化器）会感到困惑。\n\
  *   对于手动创建的直方图，只有 `DENSITY` 统计量被用于计算列中未指定值的选择率。当直方图是自动生成（`ALL_TAB_COL_STATISTICS`\
  \ 中的 `USER_STATS = 'NO'`）时，未指定值的选择率是最低提供端点值选择率的一半。\n*   还有其他类型的直方图。这些包括 *基于高度的直方图*、*顶部频率直方图*\
  \ 和 *混合直方图*。顶部频率和混合直方图首次出现在 12cR1 中。根据我的经验（可能并不典型），我在这里描述的手动创建的频率直方图是我唯一需要的类型。\n\
  \n## 查看直方图数据\n\n当你使用表 9-1 中列出的视图之一来查看直方图时，你可能会暂时感到困惑。清单 9-9 显示了我在清单 9-8 中创建的 `TRANSACTION_AMOUNT`\
  \ 列上的直方图：\n\n**[清单 9-9]. 显示直方图数据**\n\n```sql\nSELECT table_name\n      ,column_name\n\
  \      ,endpoint_number\n      ,endpoint_value\n      ,endpoint_actual_value\n \
  \ FROM all_tab_histograms\n WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \       AND table_name = 'STATEMENT'\n       AND column_name = 'TRANSACTION_AMOUNT';\n\
  \nTABLE_NAME    COLUMN_NAME             ENDPOINT_NUMBER     ENDPOINT_VALUE     ENDPOINT_ACTUAL_VALUE\n\
  STATEMENT     TRANSACTION_AMOUNT      600                -10000000\nSTATEMENT  \
  \   TRANSACTION_AMOUNT      1000                8\nSTATEMENT     TRANSACTION_AMOUNT\
  \      1600                10000000\n```\n\n需要警惕两点：\n\n1.  `ENDPOINT_ACTUAL_VALUE`\
  \ 仅对前六个字符由连续端点共享的字符列进行填充。\n2.  `ENDPOINT_NUMBER` 是累积的。它代表了到该点为止的基数的运行总和。\n\n## 虚拟列与隐藏列\n\
  \n我已经提到，基于函数的索引会创建一个隐藏的对象列，并且该隐藏的对象列可以像常规对象列一样拥有统计信息。但是因为该列是隐藏的，所以它不会被以 `SELECT\
  \ * FROM` 开头的查询返回。这类隐藏列也被认为是 *虚拟列*，因为它们在表中没有物理表示。\n\nOracle 数据库 11gR1 引入了非隐藏虚拟列的概念。这些非隐藏的虚拟列是通过\
  \ `CREATE TABLE` 或 `ALTER TABLE` DDL 语句显式声明的，而不是作为基于函数的索引创建的一部分隐式声明的。从 CBO 的角度来看，虚拟列的处理方式几乎相同，无论它们是隐藏的还是非隐藏的。清单\
  \ 9-10 展示了 CBO 如何使用在清单 9-1 中创建的 `STATEMENT` 表的虚拟列上的统计信息。\n\n**[清单 9-10]. CBO 对虚拟列统计信息的使用**\n\
  \n```sql\n--\n-- 查询 1：使用显式声明的虚拟列\n--\nSELECT *\n  FROM statement\n WHERE posting_delay\
  \ = 1;\n\n| Id  | Operation         | Name      | Rows  |\n\n|   0 | SELECT STATEMENT\
  \  |           |   167 |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |   167 |\n\nPredicate\
  \ Information (identified by operation id):\n\n1 - filter(\"POSTING_DELAY\"=1)\n\
  \n--\n-- 查询 2：使用与显式声明的虚拟列等效的表达式。\n--\nSELECT *\n  FROM statement\n WHERE (posting_date\
  \ - transaction_date) = 1;\n\n| Id  | Operation         | Name      | Rows  |\n\n\
  |   0 | SELECT STATEMENT  |           |   167 |\n|*  1 |  TABLE ACCESS FULL| STATEMENT\
  \ |   167 |\n\nPredicate Information (identified by operation id):\n\n1 - filter(\"\
  STATEMENT\".\"POSTING_DELAY\"=1)\n--\n-- 查询 3：使用与虚拟列不完全相同的表达式。\n--\nSELECT *\n \
  \ FROM statement\n WHERE (transaction_date - posting_date) = -1;\n\n| Id  | Operation\
  \         | Name      | Rows  |\n\n|   0 | SELECT STATEMENT  |           |     5\
  \ |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |     5 |\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - filter(\"TRANSACTION_DATE\"-\"POSTING_DATE\"=(-1))\n\n\
  --\n-- 查询 4：使用隐藏列\n--\nSELECT /*+ full(s) */ sys_nc00010$\n  FROM statement s\n\
  \ WHERE sys_nc00010$ = TIMESTAMP '2013-01-02 17:00:00.00';\n\n| Id  | Operation\
  \         | Name      | Rows  |\n\n|   0 | SELECT STATEMENT  |           |    50\
  \ |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |    50 |\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - filter(SYS_EXTRACT_UTC(\"TRANSACTION_DATE_TIME\")=TIMESTAMP'\n\
  \              2013-01-02 17:00:00.000000000')\n--\n-- 查询 5：使用与隐藏列等效的表达式。\n--\n\n\
  SELECT SYS_EXTRACT_UTC (transaction_date_time)\n  FROM statement s\n WHERE SYS_EXTRACT_UTC\
  \ (transaction_date_time) =\n          TIMESTAMP '2013-01-02 17:00:00.00';\n\n|\
  \ Id  | Operation        | Name                | Rows  |\n\n|   0 | SELECT STATEMENT\
  \ |                     |    50 |\n|*  1 |  INDEX RANGE SCAN| STATEMENT_I_TRAN_DT\
  \ |    50 |\n\nPredicate Information (identified by operation id):\n\n1 - access(SYS_EXTRACT_UTC(\"\
  TRANSACTION_DATE_TIME\")=TIMESTAMP'\n              2013-01-02 17:00:00.000000000')\n\
  --\n-- 查询 6：使用带时区的 timestamp 列\n--\n\nSELECT transaction_date_time\n  FROM statement\
  \ s\n WHERE transaction_date_time = TIMESTAMP '2013-01-02 12:00:00.00 -05:00';\n\
  \n| Id  | Operation                           | Name                | Rows  |\n\n\
  |   0 | SELECT STATEMENT                    |                     |    50 |\n| \
  \  1 |  TABLE ACCESS BY INDEX ROWID BATCHED| STATEMENT           |    50 |\n|* \
  \ 2 |   INDEX RANGE SCAN                  | STATEMENT_I_TRAN_DT |    50 |\n\nPredicate\
  \ Information (identified by operation id):\n\n2 - access(SYS_EXTRACT_UTC(\"TRANSACTION_DATE_TIME\"\
  )=TIMESTAMP'\n              2013-01-02 17:00:00.000000000')\n```\n\n清单 9-10 中的第一个查询涉及对显式声明的虚拟列的谓词。可以使用该虚拟列的统计信息，CBO\
  \ 将非空行数除以 `POSTING_DELAY` 的不同值的数量。结果是 50/3，四舍五入后得到 167。第二个查询使用了与虚拟列定义完全相同的表达式，同样使用了虚拟列统计信息，得出的基数估计值为\
  \ 167。请注意，虚拟列的名称出现在第二个查询执行计划的谓词部分。第三个查询使用了与虚拟列定义相似但不完全相同的表达式，现在无法使用虚拟列统计信息，CBO 不得不退而求其次，使用其\
  \ 1% 的选择率猜测。\n\n\n当我们在隐藏列上使用谓词时，会看到类似的行为。清单 9-10 中的第四个查询有点不寻常，但完全合法地显式引用了为我们的基于函数的索引生成的隐藏列。CBO\
  \ 能够利用表中该表达式存在十个不同值这一事实，将基数估算为 `500/10`，即 `50`。我强制使用了全表扫描来强调一个事实：尽管隐藏列纯粹是由于基于函数的索引而存在，但无论使用何种访问方法，都可以使用这些统计信息。清单\
  \ 9-10 中的第五和第六个查询也利用了隐藏列上的统计信息。第五个查询使用了隐藏列的表达式，而第六个查询使用了 `TIMESTAMP WITH TIME ZONE`\
  \ 列的名称。请注意，在最后一个查询中，必须访问表以检索索引中缺失的时区信息。对最后三个查询的最后一个观察是，执行计划的谓词部分没有提及隐藏列名，这是对显式声明的虚拟列的过滤谓词显示的一个合理变体。\n\
  \n"
- "# 扩展统计\n\n与通过创建基于函数的索引而隐式创建的列类似，扩展统计是隐藏的虚拟列。在第 6 章中，我解释了扩展统计的主要目的，即让 CBO 理解列之间的相关性。现在让我使用在清单\
  \ 9-1 中创建的 `STATEMENT` 表给您举个例子。清单 9-11 显示了一个查询的两个执行计划，一个是在为 `DESCRIPTION` 和 `AMOUNT_CATEGORY`\
  \ 列创建扩展统计之前，另一个是之后。\n\n清单 9-11. 多列扩展统计的使用\n\n```\n--\n-- 没有扩展统计时的查询及相关执行计划\n--\n\
  SELECT *\n  FROM statement t\n WHERE     transaction_date = DATE '2013-01-02'\n\
  \       AND posting_date = DATE '2013-01-02';\n\n| Id  | Operation         | Name\
  \      | Rows  | Time     |\n\n|   0 | SELECT STATEMENT  |           |     4 | 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |     4 | 00:00:01 |\n\n--\n-- 现在我们为这两列收集扩展统计信息\n\
  --\nDECLARE\n   extension_name   all_tab_col_statistics.column_name%TYPE;\nBEGIN\n\
  \   extension_name :=\n      DBMS_STATS.create_extended_stats (\n         ownname\
  \     => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n        ,tabname     => 'STATEMENT'\n\
  \        ,extension   => '(TRANSACTION_DATE,POSTING_DATE)');\n\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT'\n     ,partname      => NULL\n     ,GRANULARITY   => 'GLOBAL'\n\
  \     ,method_opt    => 'FOR ALL COLUMNS SIZE 1'\n     ,cascade       => FALSE);\n\
  END;\n/\n--\n-- 现在让我们看看该查询的新执行计划\n--\n\n| Id  | Operation         | Name      |\
  \ Rows  | Time     |\n\n|   0 | SELECT STATEMENT  |           |    17 | 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |    17 | 00:00:01 |\n```\n\n清单 9-11\
  \ 中的查询包含对 `TRANSACTION_DATE` 和 `POSTING_DATE` 列的谓词。`TRANSACTION_DATE` 有 `10` 个值，`POSTING_DATE`\
  \ 有 `12` 个值，因此在没有扩展统计的情况下，CBO 假设查询将返回 `500/10/12` 行，大约是 `4`。实际上，`TRANSACTION_DATE`\
  \ 和 `POSTING_DATE` 只有 `30` 种不同的组合，在收集了扩展统计之后，我们查询的执行计划显示基数为 `17`，这是 `500/30` 四舍五入的结果。\n\
  \n![image](img/sq.jpg) **注意**  我本可以将 `TRANSACTION_DATE` 列创建为一个虚拟列，由表达式 `TRUNC (TRANSACTION_DATE_TIME)`\
  \ 派生而来。然而，像清单 9-11 中定义的这类扩展统计，不能基于虚拟列。\n\n我说过，对于基数估算，我们不应该过度担心 `2` 倍或 `3` 倍的误差，而\
  \ `17` 和 `4` 之间的差异也不过如此。然而，在多个相关列上有多个谓词的情况相当常见，这类基数误差的累积效应可能是灾难性的。\n\n![image](img/sq.jpg)\
  \ **注意**  在第 6 章中，我提到当您开始分析一个新应用程序或现有应用程序的新主要版本的性能时，寻找改进大量语句执行计划的方法是个好主意。扩展统计就是这类变更的主要例子：如果您正确设置了扩展统计，CBO\
  \ 可能会改进大量语句的执行计划。\n\n还有第二种扩展统计可能很有用。这种扩展就像您通过基于函数的索引得到的隐藏虚拟列，但没有索引本身。清单 9-12 显示了一个例子。\n\
  \n清单 9-12. 为表达式创建扩展统计\n\n```\nSELECT *\n  FROM statement\n WHERE CASE\n        \
  \  WHEN description <> 'Flight' AND transaction_amount > 100\n          THEN\n \
  \            'HIGH'\n       END = 'HIGH';\n\n| Id  | Operation         | Name  \
  \    | Rows  | Time     |\n\n|   0 | SELECT STATEMENT  |           |     5 | 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| STATEMENT |     5 | 00:00:01 |\n\nPredicate Information\
  \ (identified by operation id):\n\n1 - filter(CASE  WHEN (\"DESCRIPTION\"<>'Flight'\
  \ AND\n              \"TRANSACTION_AMOUNT\">100) THEN 'HIGH' END ='HIGH')\n\nDECLARE\n\
  \   extension_name   all_tab_cols.column_name%TYPE;\nBEGIN\n   extension_name :=\n\
  \      DBMS_STATS.create_extended_stats (\n         ownname     => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n        ,tabname     => 'STATEMENT'\n        ,extension   =>\
  \ q'[(CASE WHEN DESCRIPTION <> 'Flight'\n                                      AND\
  \ TRANSACTION_AMOUNT > 100\n                                 THEN 'HIGH' END)]');\n\
  \n   DBMS_STATS.gather_table_stats (\n      ownname       => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT'\n     ,partname      =>\
  \ NULL\n     ,method_opt    => 'FOR ALL COLUMNS SIZE 1'\n     ,cascade       =>\
  \ FALSE);\nEND;\n/\n\n| Id  | Operation         | Name      | Rows  | Time     |\n\
  \n|   0 | SELECT STATEMENT  |           |   105 | 00:00:01 |\n|*  1 |  TABLE ACCESS\
  \ FULL| STATEMENT |   105 | 00:00:01 |\n\nPredicate Information (identified by operation\
  \ id):\n\n1 - filter(CASE  WHEN (\"DESCRIPTION\"<>'Flight' AND\n              \"\
  TRANSACTION_AMOUNT\">100) THEN 'HIGH' END ='HIGH')\n```\n\n清单 9-12 中的查询列出了所有 `AMOUNT\
  \ > 100` 且不是航班的交易。这个查询必须以特殊方式构造，以便我们能够利用扩展统计。在创建扩展统计之前，基于我们惯用的 `1%` 估算，估算的基数是 `5`。在为我们精心构造的表达式创建扩展统计，并随后收集表上的统计信息之后，我们可以看到\
  \ CBO 已经能够准确地估算出查询将返回的行数为 `105`。\n\n"
- "# 查看虚拟列和隐藏列的信息\n\n\n\n正如我们所看到的，隐藏列和虚拟列的统计信息与常规列相同；CBO（基于成本的优化器）以类似的方式使用这些统计信息。然而，关于隐藏列和虚拟列还有两点需要说明。我想解释扩展统计信息的导出方式，但首先让我们看看如何在数据字典中检查隐藏列和虚拟列的信息。\n\
  \n## 隐藏列和虚拟列的数据字典视图\n\n视图 `ALL_TAB_COLUMNS` 不显示隐藏列，并且只有当隐藏列上存在统计信息时，才会出现在 `ALL_TAB_COL_STATISTICS`\
  \ 中。有两个视图无论统计信息是否存在都会显示隐藏列的信息：\n\n*   `ALL_TAB_COLS` 显示与 `ALL_TAB_COLUMNS` 类似的信息，但包含隐藏列。`ALL_TAB_COLS`\
  \ 统计视图包含两个统计列——`VIRTUAL_COLUMN` 和 `HIDDEN_COLUMN`——分别指示对象列是否为虚拟列或隐藏列。\n*   `ALL_STAT_EXTENSIONS`\
  \ 列出所有虚拟列的信息，包括隐藏的虚拟列，无论它们是否与基于函数的索引关联；未隐藏的、显式声明的虚拟列；或与扩展统计信息关联的隐藏列。`ALL_STAT_EXTENSIONS`\
  \ 包含一个列——`EXTENSION`——其数据类型为 `CLOB`，定义了虚拟列所基于的表达式。\n\n## 导出扩展统计信息\n\n除扩展统计信息外，隐藏列和虚拟列的导出和导入方式与常规列完全相同。但是，每个扩展统计信息在导出表中都有一行额外的记录。\n\
  \n如果不先使用 `CREATE INDEX` 语句创建基于函数的索引，就无法导入与基于函数的索引关联的隐藏列的统计信息。如果不先使用 `CREATE TABLE`\
  \ 或 `ALTER TABLE` 语句声明该列，就无法导入显式声明的虚拟列的统计信息。创建基于函数的索引和显式声明的虚拟列的 DDL 语句会导致虚拟列所基于的表达式被存储在数据字典中。\n\
  \n另一方面，您可以在不先调用 `DBMS_STATS.CREATE_EXTENDED_STATS` 的情况下导入扩展统计信息；导入操作会隐式创建隐藏的虚拟列。导入统计信息时发生的这种虚拟列隐式创建意味着导出表需要包含虚拟列所基于表达式的信息。此信息保存在导出表的一个额外行中，该行的\
  \ `TYPE` 为 `E`，表达式存储在类型为 `CLOB` 的导出列 `CL1` 中。清单 9-13 展示了如何导出和导入扩展统计信息。\n\n清单 9-13.\
  \ 导出和导入扩展统计信息\n\n```\nTRUNCATE TABLE ch9_stats;\n\nBEGIN\n   DBMS_STATS.export_table_stats\
  \ (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'STATEMENT'\n     ,statown   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \     ,stattab   => 'CH9_STATS');\n\nDBMS_STATS.drop_extended_stats (\n      ownname\
  \     => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname     => 'STATEMENT'\n\
  \     ,extension   => '(TRANSACTION_DATE,POSTING_DATE)');\n\nDBMS_STATS.drop_extended_stats\
  \ (\n      ownname     => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \     => 'STATEMENT'\n     ,extension   => q'[(CASE WHEN DESCRIPTION <> 'Flight'\n\
  \                                      AND TRANSACTION_AMOUNT > 100\n          \
  \                       THEN 'HIGH' END)]');\n\nDBMS_STATS.delete_table_stats (\n\
  \      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   =>\
  \ 'STATEMENT');\nEND;\n/\n\nSELECT c1, SUBSTR (c4, 1,10) c4, DBMS_LOB.SUBSTR (cl1,60,1)\
  \ cl1\n  FROM ch9_stats\n WHERE TYPE = 'E';\n\n-- 查询语句输出\nC1                C4 \
  \               CL1\nSTATEMENT        SYS_STU557        SYS_OP_COMBINED_HASH(\"\
  TRANSACTION_DATE\",\"POSTING_DATE\")\nSTATEMENT        SYS_STUN6S        CASE  WHEN\
  \ (\"DESCRIPTION\"<>'Flight' AND \"TRANSACTION_AMOUNT\"\n\nSELECT extension_name\n\
  \    FROM all_stat_extensions\n   WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \         AND table_name = 'STATEMENT'\nORDER BY extension_name;\n\n-- 查询语句输出\n\n\
  EXTENSION_NAME\nAMOUNT_CATEGORY\nPOSTING_DELAY\nSYS_NC00010$\n\nBEGIN\n   DBMS_STATS.import_table_stats\
  \ (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'STATEMENT'\n     ,statown   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \     ,stattab   => 'CH9_STATS');\nEND;\n/\n\nSELECT extension_name\n    FROM all_stat_extensions\n\
  \   WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n         AND table_name\
  \ = 'STATEMENT'\nORDER BY extension_name;\n\n-- 查询语句输出\n\nEXTENSION_NAME\nAMOUNT_CATEGORY\n\
  POSTING_DELAY\nSYS_NC00010$\nSYS_STU557IEAHGZ6B4RPUZEQ_SX#6\nSYS_STUN6S71CM11RD1VMYVLKR9$GJ\n\
  ```\n\n清单 9-14 将 `STATEMENT` 的对象统计信息导出到一个刚刚截断的导出表中，然后使用 `DBMS_STATS.DROP_EXTENDED_STATISTICS`\
  \ 过程删除了两个扩展统计信息。为了确保彻底，剩余的统计信息也被删除了。\n\n对导出表的查询显示扩展统计信息表达式的定义已被保存。请注意多列统计信息中 `SYS_OP_COMBINED_HASH`\
  \ 函数的使用。一旦扩展统计信息被删除，我们可以看到它们在对 `ALL_STAT_EXTENSIONS` 的查询输出中不再可见。\n\n一旦我们导入统计信息，就可以看到扩展统计信息重新出现在\
  \ `ALL_STAT_EXTENSIONS` 中。\n\n## 统计信息描述总结\n\n我已经解释了与表、索引和列相关的统计信息是什么，以及 CBO 如何使用它们进行优化。我还解释了\
  \ CBO 可以创建和使用的主要不同类型的隐藏列和虚拟列。我尚未做的是解释可以在分区表上使用的各种不同级别的统计信息。现在让我们开始讨论这个话题。\n\n##\
  \ 统计信息与分区\n\n分区选项是 Oracle 数据库企业版的一项单独许可的功能。利用此选项，您可以对表和索引进行分区，并享受诸多性能和管理上的好处。我将在第\
  \ 15 章简要探讨分区的性能优势，但现在我想重点介绍与分区表相关的统计信息。\n\n正如我在本章引言中提到的，当使用分区选项时，表、索引和列的统计信息都可以在全局、分区以及（对于复合分区表而言）子分区级别进行维护。与表或索引分区关联的统计信息与全局级别的统计信息完全相同。例如，表分区的\
  \ `AVG_ROW_LEN` 统计信息指示该表分区中行的平均大小。索引分区的 `BLEVEL` 统计信息指示从该索引分区的根块到分区内的叶块需要访问多少个块。在分区级别定义的列对象的\
  \ `NUM_NULLS` 统计信息指示在指定表分区中该列值为 `NULL` 的行数。\n\n在本节中，我想澄清一些关于 CBO 如何以及何时使用分区和子分区级别统计信息、何时使用全局统计信息的困惑。我还想清楚地解释\
  \ CBO 使用分区级统计信息与运行时引擎进行分区消除之间的区别。\n\n\n"
- "# 分区与子分区统计概述\n\n在深入探讨这些主题之前，我需要先解释如何获取分区级别的统计信息。为特定分区或子分区设置、导出和导入统计信息，其方法与为整个表或索引执行这些操作的方法相同，只需指定分区或子分区的名称即可；因此我不再赘述这些步骤。然而，在分区或子分区级别收集统计信息存在一些复杂情况，我将在下面说明。\n\
  \n表统计信息与分区级别统计信息之间的关系，可以扩展到分区级别统计信息与子分区级别统计信息之间的关系。为了简洁起见，在本节的大部分内容中，我将忽略复合分区表和子分区级别的统计信息。\n\
  \n## 在分区表上收集统计信息\n\n当我们调用如 `DBMS_STATS.GATHER_TABLE_STATS` 之类的例程并提供分区表的名称作为参数时，我们可以为\
  \ `GRANULARITY` 参数指定一个值。对于分区表，`GRANULARITY` 的默认值是 `ALL`，这意味着同时收集全局统计信息和分区级别统计信息。\n\
  \n你可能会认为，通过扫描分区表中每个分区的数据，可以同时构建全局统计信息和分区级别统计信息。但这并非默认行为。\n\n如果你为 `DBMS_STATS.GATHER_TABLE_STATS`\
  \ 的 `GRANULARITY` 参数指定 `ALL`，并为 `PARTNAME` 参数指定 `NULL`，默认情况下实际发生的是：所有分区会被扫描两次。一次扫描用于获取全局统计信息，另一次用于获取分区级别统计信息。因此，如果你的表有五个分区，总共将进行十次分区扫描。\n\
  \n如果你为 `DBMS_STATS.GATHER_TABLE_STATS` 的 `GRANULARITY` 参数指定 `ALL`，并为 `PARTNAME`\
  \ 参数指定特定分区的名称，那么仅对指定的分区收集分区级别统计信息，但是*所有*分区都会被扫描以收集全局统计信息。因此，如果你的表有五个分区，总共将进行六次分区扫描。\n\
  \n许多用户喜欢在数据加载到先前为空的分区时收集分区级别统计信息，而扫描所有分区以更新全局统计信息的开销是不可接受的。因此，在收集单个分区的统计信息时，调用 `DBMS_STATS.GATHER_TABLE_STATS`\
  \ 通常为 `GRANULARITY` 参数指定 `PARTITION` 值。此设置意味着仅在指定的分区上进行一次扫描，而不扫描任何其他分区。幸运的是，这种捷径的负面影响远小于你的想象。清单\
  \ 9-14 展示了当未显式收集全局统计信息时会发生什么。\n\n### 清单 9-14. 将 GRANULARITY 设置为 PARTITION 以收集统计信息\n\
  \n```sql\nCREATE /*+ NO_GATHER_OPTIMIZER_STATISTICS */TABLE statement_part\nPARTITION\
  \ BY RANGE\n   (transaction_date)\n   (\n      PARTITION p1 VALUES LESS THAN (DATE\
  \ '2013-01-05')\n     ,PARTITION p2 VALUES LESS THAN (maxvalue))\nAS\n   SELECT\
  \ * FROM statement;\n\nBEGIN\n   DBMS_STATS.gather_table_stats (\n      ownname\
  \       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n\
  \     ,partname      => 'P1'\n     ,GRANULARITY   => 'PARTITION'\n     ,method_opt\
  \    => 'FOR ALL COLUMNS SIZE 1');\n\nDBMS_STATS.gather_table_stats (\n      ownname\
  \       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n\
  \     ,partname      => 'P2'\n     ,GRANULARITY   => 'PARTITION'\n     ,method_opt\
  \    => 'FOR ALL COLUMNS SIZE 1');\nEND;\n/\n\nSELECT a.num_rows p1_rows\n     \
  \ ,a.global_stats p1_global_stats\n      ,b.num_rows p2_rows\n      ,b.global_stats\
  \ p2_global_stats\n      ,c.num_rows tab_rows\n      ,c.global_stats tab_global_stats\n\
  \  FROM all_tab_statistics a\n       FULL JOIN all_tab_statistics b USING (owner,\
  \ table_name)\n       FULL JOIN all_tab_statistics c USING (owner, table_name)\n\
  \ WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n       AND table_name\
  \ = 'STATEMENT_PART'\n       AND a.partition_name = 'P1'\n       AND b.partition_name\
  \ = 'P2'\n       AND c.partition_name IS NULL;\n\nP1_ROWS   P1_GLOBAL_STATS   P2_ROWS\
  \    P2_GLOBAL_STATS    TAB_ROWS      TAB_GLOBAL_STATS\n200       YES          \
  \     300        YES                500           NO\n```\n\n清单 9-14 创建了一个表 `STATEMENT_PART`，其内容与\
  \ `STATEMENT` 相同，但所有虚拟列都变成了真实列，并且表通过 `TRANSACTION_DATE` 列按范围分区。创建了两个分区；它们被命名为 `P1`\
  \ 和 `P2`。我指定了 `NO_GATHER_OPTIMIZER_STATISTICS` 提示，以便在 12cR1 及更高版本中不会自动收集全局统计信息。\n\
  \n一旦 `STATEMENT_PART` 被创建并填充，统计信息会分别收集在两个分区——`P1` 和 `P2` 上。清单 9-14 随后查看了两个分区以及整个表的\
  \ `NUM_ROWS` 和 `GLOBAL_STATS` 统计列。我们可以看到，分区 `P1` 中显然有 200 行，`P2` 中有 300 行。然而，与我上面关于\
  \ `GRANULARITY` 参数的解释明显矛盾的是，整个表的全局统计信息是存在的，因为 `ALL_TAB_STATISTICS` 中的 `NUM_ROWS`\
  \ 被设置为 500！\n\n理解所发生事情的关键是查看名为 `GLOBAL_STATS` 的列的值。多年来，我曾对这个列感到非常困惑。我曾以为设置为 `YES`\
  \ 或 `NO` 的 `GLOBAL_STATS` 与统计信息是否是全局统计信息有关。我希望你能理解我的错误。如果我认真阅读了参考手册，我会看到以下内容：\n\n\
  GLOBAL_STATS VARCHAR2 (3) 指示统计信息是否在不合并底层分区的情况下计算（YES）还是（NO）\n\n直到不久前，Doug Burns\
  \ (`http://oracledoug.com/index.html`) 在一次会议演讲中恰当地解释了这个概念，才将我从困惑中解救出来。你看，一旦表或索引中所有分区的统计信息都可用，这些分区级别的统计信息就可以被合并以确定全局统计信息。在这个案例中，来自\
  \ `P1` 的 200 和来自 `P2` 的 300 被相加得到整个 `STATEMENT_PART` 的 500。\n\n这种合并分区级别统计信息的方法似乎使得收集全局统计信息变得不必要。然而，这并不完全正确。清单\
  \ 9-15 展示了与合并分区级别统计信息相关的一个问题。\n\n### 清单 9-15. 合并分区级别统计信息时的 NUM_DISTINCT 计算\n\n```sql\n\
  SELECT column_name\n      ,a.num_distinct p1_distinct\n      ,b.num_distinct p2_distinct\n\
  \      ,c.num_distinct tab_distinct\n  FROM all_part_col_statistics a\n       FULL\
  \ JOIN all_part_col_statistics b\n          USING (owner, table_name, column_name)\n\
  \       FULL JOIN all_tab_col_statistics c\n          USING (owner, table_name,\
  \ column_name)\n WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n \
  \      AND table_name = 'STATEMENT_PART'\n       AND a.partition_name = 'P1'\n \
  \      AND b.partition_name = 'P2';\n```\n\n\n| 列名 | P1_ 唯一值数量 | P2_ 唯一值数量 | 表 _\
  \ 唯一值数量 |\n| --- | --- | --- | --- |\n| CUSTOMER_CATEGORY | 50 | 50 | 50 |\n| PRODUCT_CATEGORY\
  \ | 4 | 6 | 10 |\n| AMOUNT_CATEGORY | 3 | 3 | 3 |\n| TRANSACTION_AMOUNT | 112 |\
  \ 166 | 166 |\n| DESCRIPTION | 4 | 4 | 4 |\n| POSTING_DELAY | 3 | 3 | 3 |\n| POSTING_DATE\
  \ | 6 | 8 | 8 |\n| TRANSACTION_DATE | 4 | 6 | 10 |\n| TRANSACTION_DATE_TIME | 4\
  \ | 6 | 10 |\n\n清单 9-15 查询了分区 `P1`、`P2` 以及整个表的 `NUM_DISTINCT` 统计列。我们可以看到，在 `P1`\
  \ 中 `TRANSACTION_DATE_TIME` 有四个唯一值，在 `P2` 中有六个唯一值。`DBMS_STATS` 包正确判断出整个表中总共有十个 `TRANSACTION_DATE_TIME`\
  \ 的唯一值，这是因为 `P1` 中 `TRANSACTION_DATE_TIME` 的最大值低于 `P2` 中的最小值。另一方面，`DBMS_STATS` 看到\
  \ `P1` 中 `POSTING_DATE` 有六个唯一值，`P2` 中有八个，但它无法知道整个表中 `POSTING_DATE` 的唯一值数量是 8、14\
  \ 还是介于两者之间。这种不确定性是由于 `P1` 中 `POSTING_DATE` 的最大值大于 `P2` 中的最小值造成的。`STATEMENT_PART`\
  \ 表中 `POSTING_DATE` 的实际唯一值数量是 12。在这种情况下，`DBMS_STATS` 总是取最小的可能值。\n\nOracle 数据库 11gR1\
  \ 引入了一个巧妙的新功能，允许我们通过合并分区列统计信息来获取准确或近乎准确的全局列统计信息。清单 9-16 向我们展示了如何做到这一点。\n\n清单 9-16.\
  \ 增量收集全局统计信息\n\n```\nBEGIN\n   DBMS_STATS.set_table_prefs(\n      ownname   => SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   => 'STATEMENT_PART'\n     ,pname\
  \     => 'INCREMENTAL'\n     ,pvalue    => 'TRUE');\nEND;\n/\n\nBEGIN\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT_PART'\n     ,partname      => 'P1'\n     ,GRANULARITY   =>\
  \ 'APPROX_GLOBAL AND PARTITION'\n     ,method_opt    => 'FOR ALL COLUMNS SIZE 1');\n\
  \nDBMS_STATS.gather_table_stats (\n      ownname       => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n     ,partname   \
  \   => 'P2'\n     ,granularity   => 'APPROX_GLOBAL AND PARTITION'\n     ,method_opt\
  \    => 'FOR ALL COLUMNS SIZE 1');\nEND;\n/\n\nSELECT column_name\n      ,a.num_distinct\
  \ p1_distinct\n      ,b.num_distinct p2_distinct\n      ,c.num_distinct tab_distinct\n\
  \  FROM all_part_col_statistics a\n       FULL JOIN all_part_col_statistics b\n\
  \          USING (owner, table_name, column_name)\n       FULL JOIN all_tab_col_statistics\
  \ c\n          USING (owner, table_name, column_name)\n WHERE     owner = SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n       AND table_name = 'STATEMENT_PART'\n    \
  \   AND a.partition_name = 'P1'\n       AND b.partition_name = 'P2';\n```\n\n| 列名\
  \ | P1_ 唯一值数量 | P2_ 唯一值数量 | 表 _ 唯一值数量 |\n| --- | --- | --- | --- |\n| CUSTOMER_CATEGORY\
  \ | 50 | 50 | 50 |\n| PRODUCT_CATEGORY | 4 | 6 | 10 |\n| AMOUNT_CATEGORY | 3 | 3\
  \ | 3 |\n| TRANSACTION_AMOUNT | 112 | 166 | 262 |\n| DESCRIPTION | 4 | 4 | 4 |\n\
  | POSTING_DELAY | 3 | 3 | 3 |\n| POSTING_DATE | 6 | 8 | 12 |\n| TRANSACTION_DATE\
  \ | 4 | 6 | 10 |\n| TRANSACTION_DATE_TIME | 4 | 6 | 10 |\n\n清单 9-16 使用 `DBMS_STATS.SET_TABLE_PREFS`\
  \ 过程为分区设置所谓的“概要”。然后使用 `GRANULARITY` 参数值为 `APPROX_GLOBAL AND PARTITION` 来收集分区 `P1`\
  \ 和 `P2` 的统计信息，此时全局 `NUM_DISTINCT` 统计信息的计算就得到了修正。特别要注意，现在整个表 `POSTING_DATE` 的唯一值数量是\
  \ 12。\n\n![image](img/sq.jpg) **注意** 你还可以通过 `DBMS_STATS.SET_DATABASE_PREFS`、`DBMS_STATS.SET_SCHEMA_PREFS`\
  \ 和 `DBMS_STATS.SET_TABLE_PREFS` 设置许多其他首选项。我稍后会解释为什么你应该保持大多数默认设置。\n\n对于唯一值数量较少的列，概要本质上就是这些唯一值的列表，统计信息合并是\
  \ 100% 准确的，如清单 9-16 所示。当唯一值数量很大时，可能会进行一些复杂的哈希处理，导致合并后的统计信息出现轻微的不准确。在大多数情况下，使用增量维护的全局统计信息将减少收集统计信息所需的总时间，并且产生的全局统计信息完全可以使用。另一方面，概要会占用空间并增加收集分区级统计信息的时间。许多用户仍然喜欢在工作日快速收集分区级统计信息（不使用概要），而在系统较空闲的周末收集全局统计信息。\n\
  \n关于收集分区级统计信息，总结几点：\n\n*   当使用 `INCREMENTAL` 首选项并将 `GRANULARITY` 设置为 `APPROX_GLOBAL\
  \ AND PARTITION` 时，表/索引的整体 `GLOBAL_STATS` 值将是 `YES`，尽管统计信息实际上是通过合并分区级统计信息获得的。\n\
  *   如果分区的 `GLOBAL_STATS=NO`，则意味着该分区的统计信息是从子分区级统计信息合并而来的。`GLOBAL_STATS` 对于子分区级统计信息没有意义。\n\
  *   `GLOBAL_STATS` 和 `USER_STATS` 都会被 `DBMS_STATS.SET_xxx_STATS` 过程设置为 `YES`。\n\
  *   通过合并分区统计信息来更新全局统计信息并不总是会发生。例如，当表/索引整体已存在统计信息，且这些统计信息的 `GLOBAL_STATS=YES` 时，合并就不会发生。无论这些未合并的统计信息有多旧，除非在收集分区级统计信息时使用了\
  \ `GRANULARITY` 的 `APPROX_GLOBAL AND PARTITION` 值，否则它们永远不会被从分区级统计信息合并而来的统计信息更新。显然，在其他一些未文档化的场景中，分区级统计信息合并到全局统计信息的过程也不会发生。\n\
  *   如果通过调用 `DBMS_STATS.SET_TABLE_PREFS` 将 `INCREMENTAL` 首选项设置为 `TRUE`，那么收集整个表的统计信息（指定\
  \ `GRANULARITY` 为 `GLOBAL`）实际上会收集分区级统计信息并将其合并。因此，在这种情况下，`GLOBAL` 和 `ALL` 似乎是 `GRANULARITY`\
  \ 的等效值。\n\n"
- '# CBO 如何使用分区级统计信息




