  (1)   |

  | 1  | NESTED LOOPS                  |              |      |             |

  | 2  | NESTED LOOPS                  |              | 1000M| 1740K (1)   |

  | 3  | INDEX FULL SCAN               | CUSTOMERS_PK | 55500| 116 (0)     |

  | 4  | PARTITION RANGE ALL           |              |      |             |

