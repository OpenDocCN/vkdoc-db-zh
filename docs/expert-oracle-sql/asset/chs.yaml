- "# 基本执行计划概念\n\n既然您了解了 CBO 是什么以及它的作用，您需要开始学习如何解读它的输出：执行计划。您经常会听到执行计划被称为 `explain\
  \ plan`，因为 SQL 的 `explain plan` 语句是查看执行计划最重要方法之一的关键组成部分。本章将详细探讨 `explain plan` 语句以及其他查看执行计划的方法。\n\
  \n但是，如果无法理解显示的内容，那么展示执行计划就没什么意义。我将在本章中解释解读执行计划的过程。不幸的是，有些执行计划极其复杂，因此在介绍更多基础知识后，我将在第\
  \ 8 章中探讨更高级的执行计划解读主题。\n\n回到本章，让我们从查看保存执行计划信息的各种视图开始。\n\n## 显示执行计划\n\n执行计划可以在 Oracle\
  \ 数据库的多个位置找到，但就本书目的而言，以下三个位置最为重要。\n\n*   `SYS.PLAN_TABLE$`：这个系统拥有的全局临时表通常通过公共同义词\
  \ `PLAN_TABLE` 引用，它包含 `EXPLAIN PLAN` 语句的结果。\n*   `V$SQL_PLAN`：此视图显示当前正在运行或最近完成运行的语句的执行计划。该视图显示的数据保存在共享池的*游标缓存*中。\n\
  *   `DBA_HIST_SQL_PLAN`：此视图显示过去执行过的执行计划的一个有用子集。该视图显示的数据保存在 AWR 中，由 MMON 后台进程从共享池中收集。\n\
  \n虽然可以直接查看该表和两个视图，但这样做并不方便。对于 `OTHER_XML` 列尤其如此，正如您可能猜到的，它包含未格式化的 XML。使用 `DBMS_XPLAN`\
  \ 包中的函数要容易得多，这些函数以更易于阅读的格式呈现执行计划。在接下来的章节中，我将讨论如何解读该包中三个函数的默认输出；我将在第 4 章和第 8 章中探讨非默认输出格式。\n\
  \n## 显示 EXPLAIN PLAN 的结果\n\n清单 2-2 创建了四个表，然后查询它们。该查询被显式编写为建议先连接 `T1` 和 `T2`；接下来连接\
  \ `T3` 和 `T4`；然后连接两个中间结果。然而，CBO 应用了 `简单视图合并`，并用粗体突出显示的四个表的简单连接替换了原始查询。我将在第 3 章详细解释这一点以及如何生成和分析执行计划，但现在您只需要关注整个查询的估计成本，该成本在计划的第\
  \ 0 行报告为 293。清单 2-3 添加了一些提示。\n\n清单 2-3。抑制了简单视图合并\n\n```sql\nWITH t1t2\n     AS (SELECT\
  \ /*+ NO_MERGE */\n               t1.c1, t2.c2\n           FROM t1, t2\n       \
  \   WHERE t1.c1 = t2.c2)\n    ,t3t4\n     AS (SELECT /*+ NO_MERGE */\n         \
  \      t3.c3, t4.c4\n           FROM t3, t4\n          WHERE t3.c3 = t4.c4)\nSELECT\
  \ COUNT (*)\n  FROM t1t2 j1, t3t4 j2\n WHERE j1.c1 + j1.c2 = j2.c3 + j2.c4;\n\n\
  | Id  | 操作             | 名称 | 成本 (%CPU)|\n\n|   0 | SELECT STATEMENT      |    \
  \  |    11  (28)|\n|   1 |  SORT AGGREGATE       |      |            |\n|   2 |\
  \   HASH JOIN           |      |    11  (28)|\n|   3 |    VIEW               | \
  \     |     4   (0)|\n|   4 |     HASH JOIN         |      |     4   (0)|\n|   5\
  \ |      TABLE ACCESS FULL| T1   |     2   (0)|\n|   6 |      TABLE ACCESS FULL|\
  \ T2   |     2   (0)|\n|   7 |    VIEW               |      |     4   (0)|\n|  \
  \ 8 |     HASH JOIN         |      |     4   (0)|\n|   9 |      TABLE ACCESS FULL|\
  \ T3   |     2   (0)|\n|  10 |      TABLE ACCESS FULL| T4   |     2   (0)|\n```\n\
  \n两个 `NO_MERGE` 提示抑制了简单视图合并转换，现在所选执行计划的成本为 11！这很有趣，不是吗？大多数人认为应用优化器提示的唯一原因是让 CBO\
  \ 选择一个它认为不是最优但用户知道是最优的计划。然而，在这种情况下，CBO 认为带提示的计划比它自己选择的计划更好。它自己没有选择带提示的计划，因为简单视图合并转换的无条件性质意味着最优计划甚至没有被考虑！查询在实际运行中表现如何？所有这些关于\
  \ CBO 成本计算的讨论都非常有趣，但归根结底，您最感兴趣的是实际的耗时，而不是成本估计。事实上，在这次的成本算法并没有太大问题。如果您尝试运行这些语句，很可能会发现带提示的查询运行速度比不带提示的快得多，但可能不像成本估计所暗示的那样快\
  \ 26 倍。\n\n|   0 | SELECT STATEMENT        |      |   293  (89)|\n|   1 |  SORT\
  \ AGGREGATE         |      |            |\n|   2 |   HASH JOIN             |   \
  \   |   293  (89)|\n|   3 |    TABLE ACCESS FULL    | T4   |     2   (0)|\n|   4\
  \ |    HASH JOIN            |      |    36   (9)|\n|   5 |     TABLE ACCESS FULL\
  \   | T2   |     2   (0)|\n|   6 |     MERGE JOIN CARTESIAN|      |    31   (0)|\n\
  |   7 |      TABLE ACCESS FULL  | T1   |     2   (0)|\n|   8 |      BUFFER SORT\
  \        |      |    29   (0)|\n|   9 |       TABLE ACCESS FULL | T3   |     0 \
  \  (0)|\n\n\n"
- "# 《EXPLAIN PLAN` 与 `DBMS_XPLAN.DISPLAY`\n\n`EXPLAIN PLAN` SQL 语句存在的理由，是在不实际执行语句的情况下为其生成执行计划。`EXPLAIN\
  \ PLAN` 语句仅将执行计划的表示形式写入一个表，它本身不显示任何内容。为此，必须使用 `DBMS_XPLAN.DISPLAY` 函数。此函数接受多个参数，所有参数都是可选的；目前我将使用默认值。目的是将该函数的结果传递给\
  \ `TABLE` 操作符。清单 3-1 展示了一个示例，该示例对一个使用 `SCOTT` 示例模式中表的查询执行 `EXPLAIN PLAN`，然后使用 `DBMS_XPLAN.DISPLAY`\
  \ 显示结果。\n\n清单 3-1. EMP 与 DEPT 表的连接\n\n```\nSET LINES 200 PAGESIZE 0 FEEDBACK OFF\n\
  \nEXPLAIN PLAN\n   FOR\n      SELECT e.*\n            ,d.dname\n            ,d.loc\n\
  \            ,(SELECT COUNT (*)\n                 FROM scott.emp i\n           \
  \     WHERE i.deptno = e.deptno)\n                dept_count\n        FROM scott.emp\
  \ e, scott.dept d\n       WHERE e.deptno = d.deptno;\n\nSELECT * FROM TABLE (DBMS_XPLAN.display);\n\
  \nPlan hash value: 4153889731\n\n| Id  | Operation          | Name | Rows  | Bytes\
  \ | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT   |      |    14 |  1638\
  \ |     7  (15)| 00:00:01 |\n|   1 |  SORT AGGREGATE    |      |     1 |    13 |\
  \            |          |\n|*  2 |   TABLE ACCESS FULL| EMP  |     1 |    13 | \
  \    3   (0)| 00:00:01 |\n|*  3 |  HASH JOIN         |      |    14 |  1638 |  \
  \   7  (15)| 00:00:01 |\n|   4 |   TABLE ACCESS FULL| DEPT |     4 |   120 |   \
  \  3   (0)| 00:00:01 |\n|   5 |   TABLE ACCESS FULL| EMP  |    14 |  1218 |    \
  \ 3   (0)| 00:00:01 |\n\nPredicate Information (identified by operation id):\n\n\
  2 - filter(\"I\".\"DEPTNO\"=:B1)\n   3 - access(\"E\".\"DEPTNO\"=\"D\".\"DEPTNO\"\
  )\n\nNote\n\n- dynamic sampling used for this statement (level=2)\n```\n\n被解释的语句显示了每位员工的详细信息，以及部门的详细信息，包括通过选择列表中的关联子查询获得的部门员工估计数量。`DBMS_XPLAN.DISPLAY`\
  \ 的输出以计划哈希值开始。如果两个计划具有相同的哈希值，它们将是同一个计划。事实上，只要操作、对象名称和谓词都相同，相同的执行计划在不同的数据库上将具有相同的哈希值。\n\
  \n在计划哈希值之后，您可以看到操作表，该表提供了运行时引擎预期如何执行 SQL 语句的详细信息。\n\n*   第一列是 ID。这只是一个数字，用于唯一标识语句中的操作，以供计划的其他部分使用。您会注意到操作\
  \ 2 和 3 的 ID 前面有一个星号。这是因为在后面的输出中引用了它们。为简洁起见，我将从现在开始说“操作 2”而不是“ID 为 2 的操作”。\n*  \
  \ 第二列是操作。大约有 200 个操作码，其中很少有官方文档记录，并且每个版本列表都在变长。幸运的是，在绝大多数执行计划中的绝大多数操作都来自一小部分几十个操作，随着您阅读本书，这些操作将会变得熟悉，如果它们还不熟悉的话。\n\
  *   操作表中的第三列称为 `name`。这个相当不起眼的列标题指的是被操作的数据库对象的名称，可以这么说。此列并非适用于所有操作，因此经常为空白，但在 `TABLE\
  \ ACCESS FULL` 操作的情况下，它是被扫描表的名称。\n*   下一列是 `rows`。此列提供操作最终将产生的估计行数，该数字通常被称为*基数估计*。例如，您可以看到操作\
  \ 2 在 `EMP` 上使用 `TABLE ACCESS FULL` 操作，并且将读取与在同一对象上执行相同操作的 ID 5 相同数量的行。然而，ID 5 返回表中的所有\
  \ 14 行，而操作 2 预计返回一行。您稍后将看到这种差异的原因。有时，在 SQL 语句的单次执行过程中，单个操作会被执行多次。重要的是要理解，估计的行数通常适用于该操作的单次调用，而不是所有调用返回的行总数。在这种情况下，操作\
  \ 1 和 2 对应于选择列表中的子查询，预计每次调用时平均返回约一行。\n*   `bytes` 列显示操作的一次调用返回的估计字节数。换句话说，它是平均行数乘以行的平均大小。\n\
  *   `cost` 列和 `time` 列都显示语句的估计耗时。`cost` 列以单块读取单位表示此耗时，而 `time` 列以更熟悉的术语表示。当显示较大的值时，可以通过将时间除以成本来计算出\
  \ CBO 认为单块读取需要多长时间。这里的数字较小且进行了四舍五入，使得这很困难。您还可以看到 `cost` 列显示了操作在 CPU 上花费的时间百分比估计值（与从磁盘读取数据相反）。\n\
  \n## 四舍五入问题\n\n此表中显示的数字始终是整数或秒，但事实上 CBO 保留的是分数估计值。`rows` 列向上取整，并且几乎总是至少为 1，即使 CBO\
  \ 认为操作返回行的可能性微乎其微。`cost` 列向上取整到最接近的整数，`time` 列向上取整到最接近的秒。因此，根据经验，总是将基数为 1 的估计理解为“0\
  \ 或 1”。\n\n操作表中可能还有其他列。这些列包括与临时空间利用、分区消除、并行查询操作等相关的列。然而，这里没有显示它们，因为它们与此查询无关。\n\n\
  在操作表之后，您可以看到一个关于谓词的部分。在此查询中有两个谓词。\n\n\n"
- "# 执行计划分析与展示\n\n第一个列出的谓词与操作 2 相关。这是一个`filter predicate`（过滤谓词），意味着该谓词在操作生成行之后、输出之前应用于行。在这种情况下，除非`DEPTNO`列匹配特定值，否则这些行会从`TABLE\
  \ ACCESS FULL`（全表扫描）操作中被拒绝。但是是什么值呢？值`:B1`看起来完全像一个绑定变量，但这个查询中没有任何绑定变量！实际上，如果你尝试将该操作与原始\
  \ SQL 文本匹配，你会看到别名为`I`的表实际上来自一个关联子查询，而这个“变量”实际上只是该关联子查询调用时对应的`DEPTNO`值；换句话说，它是来自别名为`E`的表的值。\n\
  \n第二个列出的谓词是一个`access predicate`（访问谓词）。这意味着它实际上用作操作执行的一部分，而不是像过滤谓词那样仅在最后应用。在这种情况下，操作\
  \ 3 的`HASH JOIN`（哈希连接）使用该谓词来实际执行连接。\n\n最后列出的部分是一个人类可读的注释。它列出了可能有用但没有在计划中其他地方出现的信息。在这种情况下，数据字典中的表没有统计信息，因此使用了动态采样来即时生成一些统计信息。\n\
  \n## EXPLAIN PLAN 可能具有误导性\n\n当你使用`EXPLAIN PLAN`时，你可能期望实际运行语句时运行时引擎使用的执行计划会与之前`EXPLAIN\
  \ PLAN`调用生成的计划相匹配。这是一个危险的假设！让我提供一个可能不符合此情况的情景。\n\n*   你运行一个语句。CBO 基于当时的可用统计信息生成一个计划，并将其保存在游标缓存中供运行时引擎使用。\n\
  *   你收集（或设置）统计信息而没有指定`NO_INVALIDATE=FALSE`。结果，保存在游标缓存中的执行计划没有被作废。\n*   你发出`EXPLAIN\
  \ PLAN`。CBO 基于新的统计信息生成一个计划。\n*   你运行你的语句。CBO 不会生成新计划，因为游标缓存中已经存在一个有效的执行计划。运行时引擎使用基于旧统计信息保存的计划。\n\
  \n这不是`EXPLAIN PLAN`可能具有误导性的唯一场景。我将在第 8 章中讨论一个称为“绑定变量窥探”的功能。同样值得注意的是，可能出于某种原因（也许是与安全相关），SQL*Plus\
  \ 的`AUTOTRACE`功能使用`EXPLAIN PLAN`，而不是尝试从游标缓存中检索实际的执行计划。因此`AUTOTRACE`也可能具有误导性。\n\n\
  现在让我们离开`EXPLAIN PLAN`，看看显示执行计划的其他方法。\n\n## 从游标缓存显示输出\n\n由于`EXPLAIN PLAN`调用可能具有误导性，幸运的是，通常可以在语句运行时或运行后不久从游标缓存中检索实际的执行计划。清单\
  \ 3-2 中的代码实际上运行了一个 SQL 语句，然后从游标缓存中检索了该计划。默认情况下，`DBMS_XPLAN.DISPLAY_CURSOR`从调用会话最近执行的\
  \ SQL 语句中检索计划。\n\n**清单 3-2. 查看游标缓存中的执行计划**\n\n```\nSELECT 'Count of sales: ' ||\
  \ COUNT (*) cnt\n  FROM sh.sales s JOIN sh.customers c USING (cust_id)\n WHERE cust_last_name\
  \ = 'Ruddy';\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor);\n\nCount of sales:\
  \ 1385\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor);\n\nSQL_ID  d4sba28503nxy,\
  \ child number 0\n\nSELECT 'Count of sales: ' || COUNT (*) cnt   FROM sh.sales s\
  \ JOIN\nsh.customers c USING (cust_id)  WHERE cust_last_name = 'Ruddy'\n\nPlan hash\
  \ value: 1818178872\n\n| Id  | Operation             | Name      |X| Cost (%CPU)|\
  \ Time     | Pstart| Pstop |\n\n|   0 | SELECT STATEMENT      |           |X|  \
  \ 832 (100)|          |       |       |\n|   1 |  SORT AGGREGATE       |       \
  \    |X|            |          |       |       |\n|*  2 |   HASH JOIN          \
  \ |           |X|   832   (1)| 00:00:08 |       |       |\n|*  3 |    TABLE ACCESS\
  \ FULL  | CUSTOMERS |X|   423   (1)| 00:00:04 |       |       |\n|   4 |    PARTITION\
  \ RANGE ALL|           |X|   407   (0)| 00:00:05 |     1 |    28 |\n|   5 |    \
  \ TABLE ACCESS FULL | SALES     |X|   407   (0)| 00:00:05 |     1 |    28 |\n\n\
  Predicate Information (identified by operation id):\n\n2 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n   3 - filter(\"CUST_LAST_NAME\"='Ruddy')\n\nNote\n\n- this\
  \ is an adaptive plan\n```\n\n你会注意到这次调用的输出看起来有点不同。操作表中标记为“X”的列在现实中并不存在。为了使输出适应页面，我抑制了行和字节列。\n\
  \n## 使用 SH 示例模式和游标缓存\n\n*   你需要对`V$SESSION`、`V$SQL`和`V$SQL_PLAN`具有`SELECT`特权才能使用`DBMS_XPLAN.DISPLAY_CURSOR`函数。通常，我建议授予任何进行诊断工作的用户`SELECT_CATALOG_ROLE`。\n\
  *   请注意，SQL*Plus 命令`SET SERVEROUTPUT ON`会在无参数调用`DBMS_XPLAN.DISPLAY_CURSOR`时产生干扰。\n\
  *   使用`SH`模式需要具有分区选项的 Oracle 企业版。\n*   虽然不是必需的，但我在访问`SH`模式时（以及从现在开始的大多数示例中）将使用 ANSI\
  \ 连接语法。在这种情况下，ANSI 语法比传统语法更简洁，因为`CUST_ID`连接列在`SH.SALES`和`SH.CUSTOMERS`表中名称相同。\n\n\
  输出以标识语句`SQL_ID`的一行开始。这是`DBMS_XPLAN.DISPLAY`未提供的有用信息。子游标号指示正在显示的具体子游标。\n\n## “游标”一词\n\
  \n“游标”这个词是 Oracle 在太多不同上下文中使用的少数术语之一。我在这里使用的术语与 PL/SQL 数据类型或任何相关的客户端概念无关。在讨论 CBO\
  \ 和运行时引擎时，“父游标”指的是关于 SQL 语句文本的信息。“子游标”指的是保存的执行计划和安全上下文。子游标被编号，并在 SQL 语句首次解析时从零开始。\n\
  \n下一部分显示的是压缩了空格的 SQL 语句片段。对于较长的语句，该片段是代码的截断版本。之后是计划哈希值和操作表，与`DBMS_XPLAN.DISPLAY`类似。\n\
  \n你可以看到在这种情况下，操作表有两个额外的列：`pstart`和`pstop`。这些列在清单 3-1 中没有出现，因为没有涉及分区表。在清单 3-2 中，列出了访问`SH.SALES`表的分区范围。在这种情况下，所有\
  \ 28 个分区都被访问，因为没有涉及分区列的谓词。\n\n谓词部分应该看起来很熟悉，因为它与清单 3-1 中的非常相似。\n\n注释部分表明该计划是`自适应的`。我将在第\
  \ 6 章讨论 Oracle 12cR1 的一个新功能——自适应计划。\n\n## 从 AWR 显示执行计划\n\n使用游标缓存作为执行计划信息来源的局限性在于“缓存”这个词。这个词表明计划可能会消失，如果共享池中的空间开始短缺，它确实会消失。幸运的是，MMON\
  \ 进程将大多数长时间运行的计划保存在 AWR 中。清单 3-3 展示了如何检索一个可能早已从游标缓存中消失的执行计划。\n\n\n### 3.3.1 执行计划解析\n\
  \n```\nSELECT * FROM TABLE (DBMS_XPLAN.display_awr ('6xvp6nxs4a9n4'));\n\nSQL_ID\
  \ 6xvp6nxs4a9n4\n\nselect nvl(sum(space),0) from recyclebin$ where ts# = :1\n\n\
  Plan hash value: 1168251937\n\n| Id  | Operation                    | Name     \
  \      | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT   \
  \          |                |       |       |     1 (100)|          |\n|   1 | \
  \ SORT AGGREGATE              |                |     1 |    26 |            |  \
  \        |\n|   2 |   TABLE ACCESS BY INDEX ROWID| RECYCLEBIN$    |     1 |    26\
  \ |     1   (0)| 00:00:01 |\n|   3 |    INDEX RANGE SCAN          | RECYCLEBIN$_TS\
  \ |     1 |       |     1   (0)| 00:00:01 |\n```\n\n我在这里所做的是检索一条由 MMON 进程自身用于监控空间的\
  \ SQL 语句。它在所有 11gR2 和 12cR1 数据库上都会执行，并且由于一条语句的 `SQL_ID` 在不同数据库间是固定不变的，所以如果你有 11gR2\
  \ 或 12cR1 数据库，上面的查询应该对你有效。\n\n你可以看到，尽管语句中显然有一个谓词，但此输出中没有谓词部分。如果你检查视图 `DBA_HIST_SQL_PLAN`\
  \ 的定义，你会看到列 `ACCESS_PREDICATES` 和 `FILTER_PREDICATES`，但截至 12cR1，这些列始终为 `NULL`。我听很多人抱怨过这个麻烦事，但显然存在无法克服的技术问题阻碍了这些列的填充。\n\
  \n### 理解操作\n\n操作是 CBO 为运行时引擎生成以供执行的执行计划组成部分。要调查性能问题，你需要理解它们做什么、如何交互以及耗时多久。让我逐一讨论这些问题。\n\
  \n#### 操作的作用\n\n不幸的是，Oracle 并没有文档化执行计划中的所有操作（尽管从 12cR1 开始，《SQL 调优指南》引入了不少），我们只能靠自己来弄清楚它们实际做什么。我将在第\
  \ 3 部分介绍涉及表访问和连接的最重要操作，但即使我能声称我了解并理解所有操作（我做不到），我也没有篇幅在这里记录它们。通常你可以通过回溯到原始语句来弄清楚一个操作做什么，但对此要小心。例如，你认为\
  \ 清单 3-1 中的 `SORT AGGREGATE` 操作做什么？语句中有一个聚合函数 `COUNT`，你可以正确地假设 `SORT AGGREGATE`\
  \ 函数对输入行进行计数并输出该计数。然而，你可能会被 `SORT` 这个词干扰。排序从何谈起？答案是它没有排序！我做了相当多的测试，并得出结论：`SORT AGGREGATE`\
  \ 操作从不排序；只需在 SQL*Plus 中用 `AUTOTRACE` 多运行几次类似 清单 3-3 的查询，你就会发现初始解析后就没有排序了！\n\n####\
  \ 操作如何交互\n\n和许多人一样，当我看到我的第一个执行计划时，我问的第一个问题是“我从哪里开始？”第二个问题隐含其中：“运行时引擎从哪里开始？”许多人回答这些问题时会说，“从缩进最深的、最顶部的操作开始”，或者类似的说法。在\
  \ Oracle 8i 中，这是一种过度简化。在 9i 版本发布并引入了我之前顺便提到过的 hash-join-input-swapping 功能后，这种解释变得极具误导性。一个正确（虽然有些轻率）的答案是，你从\
  \ ID 为 0 的操作开始，即你从顶部开始！为了帮助解释从那里该去哪里，你确实需要理解所有这些缩进的含义。操作被组织成一个树形结构，操作 0 是树的根。缩进以一种直观的方式表示了父子关系。图\
  \ 3-1 展示了如何绘制 清单 3-1 中显示的执行计划，以强调其父子关系。\n\n![9781430259770_Fig03-01.jpg](img/9781430259770_Fig03-01.jpg)\n\
  \n操作 0 向操作 1 和 3 发起一次或多次协程调用以生成行，操作 1 向操作 2 发起协程调用，操作 3 向操作 4 和 5 发起协程调用。其理念是子操作收集少量行，然后将其传递回其父操作。如果子操作未完成，它会等待被再次调用以继续。\n\
  \n### 协程的概念\n\n你可能对子程序调用的概念很熟悉，但对协程的概念不太熟悉。如果是这种情况，那么做一些关于协程的背景阅读可能会有所帮助，因为这可能有助于你更好地理解执行计划。\n\
  \n让我按照运行时引擎的方式，过一遍 清单 3-1 中的具体操作。\n\n#### 操作 0：SELECT STATEMENT\n\n运行时引擎从 `SELECT\
  \ STATEMENT` 本身开始。这个特定操作总是至少有一个子项，并且首先调用*最后*一个子项。也就是说，它调用 ID 最高的子项——本例中是操作 3。它等待\
  \ `HASH JOIN` 返回行，对于返回的每一行，它调用操作 1 来评估 select 列表中的相关子查询。操作 1 添加额外的列，然后完整的行被输出。如果\
  \ `HASH JOIN` 未完成，则再次调用它以检索更多行。\n\n#### 操作 1：SORT AGGREGATE\n\n操作 1 和 2 与 select\
  \ 列表中的相关子查询有关。我已在 清单 3-1 中高亮显示了相关子查询和关联的操作。在 SQL 语句执行过程中，操作 1 被多次调用，每次都被传入来自主查询的\
  \ `DEPTNO` 作为输入。它调用其子操作，即操作 2，传递 `DEPTNO` 参数，执行一次 `TABLE ACCESS FULL` 并将行传回。`SORT\
  \ AGGREGATE` 所做的就是对这些行进行计数然后丢弃它们。当计数返回后，它将其单行单列输出传递给其父操作：操作 0。你可以看到此操作的估计基数为 1，这证实了对该操作功能的理解。\n\
  \n#### 操作 2：TABLE ACCESS FULL\n\n因为在 SQL 语句执行过程中操作 1 被多次调用，而操作 1 总是调用一次操作 2，所以操作\
  \ 2 在整个语句执行过程中也被多次调用。它每次执行一个 `TABLE ACCESS FULL`。当行从该操作返回时，但在返回给操作 1 之前，会应用过滤谓词；行中的\
  \ `DEPTNO` 与输入的 `DEPTNO` 参数进行匹配，如果行不匹配则被丢弃。\n\n#### 操作 3：HASH JOIN\n\n\n\n此操作执行\
  \ `EMP` 和 `DEPT` 表的连接。该操作首先调用其第一个子操作，即操作 4，随着行的返回，它们被放入一个内存中的哈希集群中。一旦 `DEPT` 表的所有行都已返回且操作\
  \ 4 完成，操作 5 便开始执行。随着操作 5 的行的返回，它们会与从操作 4 返回的行进行匹配，并且假设有一个或多个行匹配，则它们被返回给操作 0 进行进一步处理。对于\
  \ `HASH JOIN`（或任何连接操作），总是恰好有两个子操作，并且每个子操作在每次调用连接时都会被调用一次。\n\n## 操作 4 和 5：全表扫描\n\n\
  这些操作对 `EMP` 和 `DEPT` 表执行全表扫描，并将其结果直接传回其父操作，即操作 3。这些操作上没有谓词，并且在本例中，也没有子操作。\n\n##\
  \ 操作如何交互（总结）\n\n你可以看到，实际上在任何时间点都有多个操作在进行中。随着从操作 5 返回的行被操作 3 连接并传回操作 0，操作 0 随后调用操作\
  \ 1，并间接调用操作 2。“最顶层的最内层”操作是操作 2，它是最后一个开始并且几乎是最后一个完成的，所以这个理论被打破了。\n\n## 操作需要多长时间？\n\
  \n我必须在强调和唠叨之间取得平衡，但请允许我再次提醒你，在此阶段，我谈论的只是 CBO 认为操作需要运行多长时间，而不是它们在实践中实际运行多长时间。即使是来自\
  \ `DBMS_XPLAN.DISPLAY_CURSOR` 和 `DBMS_XPLAN.DISPLAY_AWR` 的数据也仍然是初始估计值（在默认显示中），而不是实际的已用时间。分析\
  \ SQL 语句性能的大部分工作在于识别初始估计值与实际现实之间的差异。我将在第四章介绍如何识别实际的基数（cardinality）和运行时间。\n\n我已经指出，基数估计（标题为\
  \ \"rows\" 的列）是基于单次调用的。成本（cost）和时间（time）列也是基于单次调用的。如果你再次查看清单 3-1，你会看到操作 2 和操作 5\
  \ 的成本是相同的，尽管操作 2 被调用了多次，而操作 5 只被调用了一次。我不确定为什么数据是以这种方式呈现的，但事实就是如此。\n\n## INLIST 迭代器和分区范围操作\n\
  \n解释如何阅读执行计划如此困难的原因之一，是存在太多例外情况。对于 `INLIST ITERATOR` 和 `PARTITION RANGE` 操作符，子操作（实际上是所有后代操作）报告的行数、字节数、成本和时间列反映的是所有调用的累计成本，而不是单个调用的成本。\n\
  \n父操作的成本/时间包括其子操作的成本。所以在清单 3-1 中，你可以看到操作 3 的成本是 7，而它的两个子操作 4 和 5 的成本各为 3。这意味着 `HASH\
  \ JOIN` 本身预计有 1 的开销（似乎全是 CPU……这说得通）。\n\n但是等等。`SELECT STATEMENT` 本身的成本是 7。子查询的成本去哪了？这些子查询的成本各为\
  \ 3，而运行时引擎执行了多个这样的子查询。这纯粹是一个错误。如果你想看看另一个错误，可以查看清单 3-2 和 3-3 中报告的操作 0 的成本所占 CPU 百分比。这些百分比是\
  \ 100%，并且对于操作 0，在 `DBMS_XPLAN.DISPLAY_CURSOR` 和 `DBMS_XPLAN.DISPLAY_AWR` 的情况下，它们总是\
  \ 100%。这类异常比比皆是，我指出这些问题只是因为当你第一次尝试理解执行计划时，你很可能会认为这些异常反映了你从根本上理解不足。但在这些情况下并非如此。\n\
  \n## 总结\n\n在本章中，我通过示例介绍了展示和解读一些具有基本格式的简单 SQL 语句的技术。即使对于这些简单的例子，仍有很多未作解释的地方，但当我再介绍几个概念后，其中一些问题将得到解答。\n\
  \n好消息是，当我们查看运行时引擎产生的实际统计数据时，我们在查看 CBO 初始估计时看到的许多异常行为就消失了。那么，让我们在第四章中继续探讨吧。\n\n"
- "# 第四章\n\n![image](img/frontdot.jpg)\n\n## 运行时引擎\n\n第三章侧重于 CBO 制定的计划。现在是时候看看这些计划在实际中如何运作了。我将解释收集和分析运行时数据的传统方法，以及一种更新的、互补的方法，称为\
  \ SQL 性能监视器。要充分理解 SQL 性能，理解工作区（workareas）的作用以及运行时引擎用于最小化开销的捷径非常重要，这两个主题都将在本章中介绍。\n\
  \n## 收集操作级别的运行时数据\n\n正如你将在第五章中学到的，我们几乎总是需要获取 SQL 语句在操作级别的行为分解，以确定如何最好地优化该 SQL 语句。可以收集的一些操作级统计信息包括：\n\
  \n*   该操作在语句执行过程中运行了多少次\n*   运行了多长时间\n*   执行了多少次磁盘操作\n*   进行了多少次逻辑读取\n*   该操作是否完全在内存中执行\n\
  \n这些统计信息默认情况下不会收集。有三种方法可以触发收集：\n\n*   在你的 SQL 语句中添加 `GATHER_PLAN_STATISTICS` 优化器提示：收集将仅针对该语句进行。\n\
  *   将初始化参数 `STATISTICS_LEVEL` 更改为 `ALL`：如果在会话级别设置，则该会话的所有 SQL 语句都会受到影响。如果 `STATISTICS_LEVEL`\
  \ 在系统级别设置为 `ALL`，则实例中所有会话的所有 SQL 语句都将启用收集。\n*   启用 SQL 跟踪：与 `STATISTICS_LEVEL` 参数一样，SQL\
  \ 跟踪可以在会话或系统级别启用。\n\n让我们依次看看这些选项。\n\n## GATHER_PLAN_STATISTICS 提示\n\n这个优化器提示已经存在很长时间了，但在\
  \ Oracle Database 12cR1 中才被首次记录。清单 4-1 通过添加 `GATHER_PLAN_STATISTICS` 提示更新了清单 3-2。\n\
  \n清单 4-1. 在语句级别收集操作数据\n\n```sql\nSELECT /*+ gather_plan_statistics */\n       'Count\
  \ of sales: ' || COUNT (*) cnt\n  FROM sh.sales s JOIN sh.customers c USING (cust_id)\n\
  \ WHERE cust_last_name = 'Ruddy';\n```\n\n请注意，与所有优化器提示一样，你可以使用大写或小写。\n\n## 设置 STATISTICS_LEVEL=ALL\n\
  \n\n\n"
- "# 如果您无法更改或不愿更改正在分析的代码，可以通过清单 4-2 中的两条语句之一来设置`STATISTICS_LEVEL`参数。\n\n**清单 4-2.\
  \ 在会话或系统级别启用运行时数据收集**\n\n```sql\nALTER SESSION SET STATISTICS_LEVEL=ALL;\nALTER\
  \ SYSTEM  SET STATISTICS_LEVEL=ALL;\n```\n\n任何 Oracle 性能专家若未能提醒您在系统级别将`STATISTICS_LEVEL`设置为`ALL`可能带来的严重性能问题，都是失职的。主要的担忧是额外的开销可能导致应用程序性能严重下降。然而，许多专家会更进一步，建议您只应在进行短期故障排除时才在系统级别将`STATISTICS_LEVEL`设置为`ALL`，并且永久性地在系统级别将其设置为`ALL`是完全不可取的。我倒不至于如此极端。\n\
  \n收集运行时统计信息的主要开销源于对 Unix 操作系统例程`GETTIMEOFDAY`或其等效函数（在其他平台上）的频繁调用。尽管这个操作系统调用在某些操作系统上可能效率很低，但在其他系统上却可能非常高效。此外，在后续版本的\
  \ Oracle 数据库中，采样频率（由隐藏参数`_rowsource_statistics_sampfreq`控制）已经降低。我最近在一个负载很重的 Solaris/SPARC-64\
  \ 生产系统上将`STATISTICS_LEVEL`在系统级别设置为`ALL`，发现在一个两小时的批处理运行中，其对总耗时没有可测量的影响。\n\n即使您永久性地在系统范围内将`STATISTICS_LEVEL`设置为`ALL`，运行时引擎统计信息也不会保存在\
  \ AWR 中。为了解决这个问题，我会运行自己的计划任务来捕获这些数据。实现此功能的代码相当长，因此我未在此处包含，但它可以在下载的资料中找到。\n\n您可能考虑在系统级别永久设置`STATISTICS_LEVEL`为`ALL`的原因，是为了在事后处理意外的生产性能问题；如果一个\
  \ SQL 语句有时运行良好，有时却不行，您可能无法随意重现该问题，而拥有来自实际事件的数据可能是无价的。\n\n最后需要提醒您注意的是，在版本 10.1.0.2\
  \ 到 11.1.0.7 之间，您可能会遇到错误 8289729，该错误会导致 SYSAUX 表空间大小急剧增加。请查阅 Oracle 支持说明 874518.1\
  \ 或 Martin Widlake 的这篇博客（`http://mwidlake.wordpress.com/2011/06/02/why-is-my-sysaux-tablespace-so-big-statistics_levelall/`），但也不必太过沮丧，因为在我的案例中，这种额外的数据收集并未损害性能。\n\
  \n## 启用 SQL 追踪\n\n有几种方法可以启用 SQL 追踪。最古老也是最广为人知的启用 SQL 追踪的方法是设置 10046 事件。因此您经常会听到人们将\
  \ SQL 追踪称为“10046 追踪”。然而，现今启用 SQL 追踪的首选方式是使用例程`DBMS_MONITOR.SESSION_TRACE_ENABLE`，如何调用它的示例在\
  \ PL/SQL 包和类型参考手册中提供。更多信息可以在性能调优指南（12cR1 之前）或 SQL 调优指南（12cR1 及以后版本）中找到。\n\n除了启用从运行时引擎收集统计信息外，SQL\
  \ 追踪还会生成一个文本文件，其中包含关于会话中正在发生的事情的大量附加信息。其中包括，此追踪文件可以帮助您查看：\n\n*   运行了哪些 SQL 语句以及它们运行的频率。\n\
  *   运行了哪些递归 SQL 语句（触发器或函数中的 SQL 语句）。\n*   打开游标（执行 SQL 语句）花费了多少时间，从游标中提取数据花费了多少时间，以及在所谓的空闲等待事件中花费了多少时间（这意味着会话正在数据库之外执行应用程序逻辑）。\n\
  *   关于单个等待事件的详细信息，例如单个数据库文件多块读等待所读取的确切块数。\n\n尽管对于许多性能专家来说，SQL 追踪是主要的诊断工具，但我几乎从不使用它来调整个别的\
  \ SQL 语句！对于绝大多数 SQL 调优任务，运行时引擎统计信息已经绰绰有余，并且您很快就会看到，有一些数据字典视图可以非常方便地展示这些数据。\n\n##\
  \ 显示操作级别数据\n\n一旦通过上述方法之一收集了运行时引擎统计信息，接下来的任务就是显示它们。让我们看看两种方法：\n\n*   使用`DBMS_XPLAN.DISPLAY_CURSOR`\n\
  *   使用`V$SQL_PLAN_STATISTICS_ALL`\n\n### 使用 DBMS_XPLAN.DISPLAY_CURSOR 显示运行时引擎统计信息\n\
  \n通过使用`DBMS_XPLAN.DISPLAY_CURSOR`的非默认参数，您可以在操作表中看到运行时引擎统计信息。清单 4-3 展示了如何在运行清单 4-1\
  \ 中的语句后立即执行此操作。\n\n**清单 4-3. 显示运行时引擎统计信息**\n\n```sql\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor\
  \ (format => 'ALLSTATS LAST'));\n```\n\n```\n| Id  | Operation                 \
  \      | Name           | Starts | E-Rows | A-Rows |\n|   0 | SELECT STATEMENT \
  \               |                |      1 |        |      1 |\n|   1 |  SORT AGGREGATE\
  \                 |                |      1 |      1 |      1 |\n|*  2 |   HASH\
  \ JOIN                     |                |      1 |   7956 |   1385 |\n|*  3\
  \ |    TABLE ACCESS FULL            | CUSTOMERS      |      1 |     61 |     80\
  \ |\n|   4 |    PARTITION RANGE ALL          |                |      1 |    918K|\
  \    918K|\n|   5 |     BITMAP CONVERSION TO ROWIDS |                |     28 |\
  \    918K|    918K|\n|   6 |      BITMAP INDEX FAST FULL SCAN| SALES_CUST_BIX |\
  \     28 |        |  35808 |\n```\n\n清单 4-3 经过了一些编辑，移除了操作表中的各种标题和部分列。再次说明，这只是为了让输出在页面上可读。\n\
  \n`DBMS_XPLAN.DISPLAY_CURSOR`有一个`FORMAT`参数，要获取上次执行该语句的所有运行时执行统计信息，方法是指定`'ALLSTATS\
  \ LAST'`的值；您可以查阅文档了解更多变体。生成的输出相当有启发性：\n\n*   首先，查看`Starts`列。这告诉您操作 0 到 4 运行了一次，但操作\
  \ 5 运行了 28 次。这是因为`SALES`表中有 28 个分区，需要为每个分区运行一次`TABLE ACCESS FULL`操作。\n*   `E-Rows`和`A-Rows`列分别是估计的和实际的行数，您可以看到最大的差异出现在操作\
  \ 2，其估计值比实际值高出五倍多。\n*   `A-Time`列中的实际耗时比`DBMS_XPLAN.DISPLAY`显示的估计值具有更高的准确性。\n\n\
  重要的是要意识到，所有运行时引擎统计信息反映的是该操作所有执行的累积结果。因此，操作 5 在扫描完所有 28 个分区后返回了 918K 行，0.46 秒的耗时也反映了扫描整个`SALES`表的累积时间。\n\
  \n**语句的所有执行 vs. 操作的所有执行**\n\n\n\n我提到过 `ALLSTATS LAST` 格式会显示 SQL 语句**最后一次**运行的统计信息。然而，我也指出过\
  \ `A-Time` 列反映的是操作 5 所有执行的累计时间。这两种说法都是正确的，因为操作 5 的 28 次执行都包含在 SQL 语句的**最后一次**执行中。如果我指定了\
  \ `ALLSTATS ALL` 格式，并且该语句被多次运行，那么操作 5 的 `Starts` 值将是 28 的倍数。\n\n`A-Time` 列反映了执行该操作及其所有子操作所花费的时间。例如，查看操作\
  \ 2 的 `HASH` 连接及其两个子操作：\n\n*   操作 2 的第一个子操作是操作 3 中对 `CUSTOMERS` 表的全表扫描。报告显示操作 2\
  \ 耗时 0.2 秒。\n*   ID 为 4 的 `PARTITION RANGE ALL` 操作是操作 2 的第二个子操作，显然耗时 0.66 秒。\n*\
  \   如果我们将 0.2 和 0.66 相加，操作 2 的子操作总耗时 0.86 秒。\n*   用操作 2 报告的 1.22 减去 0.86，可以看到 `HASH\
  \ JOIN` 本身耗时 0.36 秒。\n\n## 使用 `V$SQL_PLAN_STATISTICS_ALL` 显示运行时引擎统计信息\n\n虽然我发现 `DBMS_XPLAN`\
  \ 函数的输出在分析执行计划并理解其作用方面非常出色，但在进行运行时统计信息的详细分析时，我觉得 `DBMS_XPLAN` 的输出格式非常难以处理。主要问题是列数众多，即使假设你有一个能显示所有列的电子页面，眼睛也很难左右浏览。\n\
  \n视图 `V$SQL_PLAN_STATISTICS_ALL` 返回了 `DBMS_XPLAN.DISPLAY_CURSOR` 所显示的所有运行时引擎统计信息。当我进行任何类型的运行时引擎数据分析时，我几乎总是使用工具在网格中显示该视图的输出。即使你没有像\
  \ SQL Developer 这样的图形工具，也可以总是从该视图中以逗号分隔值（CSV）格式获取数据，然后放入电子表格中；这同样有效。\n\n以网格形式显示统计信息之所以有用，是因为你可以按需排列列的顺序，并可以暂时隐藏当前不关注的列。还有一些额外的技巧可以让阅读这些数据更容易：\n\
  \n*   `V$SQL_PLAN_STATISTICS_ALL` 包含语句最后一次执行和所有执行的所有统计信息。包含最后一次执行信息的列以 `LAST_` 为前缀。因为这些信息可能就是你所需要的，所以大多数时候你可能不希望选择\
  \ `STARTS`、`OUTPUT_ROWS`、`CR_BUFFER_GETS`、`CU_BUFFER_GETS`、`DISK_READS`、`DISK_WRITES`\
  \ 和 `ELAPSED_TIME` 这些列，因为它们反映了语句的所有执行情况，会引起混淆。\n*   你可以使用 `DEPTH` 列对 `OPERATION`\
  \ 列进行缩进。\n*   你可以为可能引起混淆的列添加标签以避免混淆。\n*   将 `LAST_ELAPSED_TIME` 除以 1000000 可将微秒转换为秒，这对我们大多数人来说更具可读性。\n\
  \n清单 4-4 展示了一个针对 `V$SQL_PLAN_STATISTICS_ALL` 的简单查询，说明了这些要点。\n\n### 清单 4-4. 从 `V$SQL_PLAN_STATISTICS_ALL`\
  \ 中选择部分列\n\n```sql\n SELECT DEPTH\n        ,LPAD (' ', DEPTH) || operation operation\n\
  \        ,options\n        ,object_name\n        ,time \"EST TIME (Secs)\"\n   \
  \     ,last_elapsed_time / 1000000 \"ACTUAL TIME (Secs)\"\n        ,CARDINALITY\
  \ \"EST ROWS\"\n        ,last_output_rows \"Actual Rows\"\n    FROM v$sql_plan_statistics_all\n\
  \   WHERE sql_id = '4d133k9p6xbny' AND child_number = 0\nORDER BY id;\n```\n\n这个查询只选择了几个列，但在实践中你会选择更多的列。你感兴趣的语句的\
  \ `SQL_ID` 和子编号可以使用第 1 章中描述的技术来获取。\n\n## 使用 Snapper 显示会话级统计信息\n\n虽然对于运行时性能分析最重要的统计信息位于\
  \ `V$SQL_PLAN_STATISTICS_ALL` 中，但默认情况下 Oracle 会持续收集大量的统计信息。出于某种难以理解的原因，Oracle 只给客户提供了一堆难以理解的视图来查看这些统计信息，我们大多数人因此灰心，不愿尝试使用它们。幸运的是，“大多数”并不等于“全部”，已经有许多人找到了让这些信息更易于理解的方法。最早的一个用于以可读方式显示会话统计信息的脚本来自\
  \ Tom Kyte，可以在 `http://asktom.oracle.com/runstats.html` 找到。在我看来，查看此类信息的最佳工具来自 Oracle\
  \ 专家 Tanel Poder，他发布了一个通用脚本，可以以易于阅读的格式提取和显示众多运行时统计信息。他宝贵的 Snapper 脚本的最新版本可在 `http://blog.tanelpoder.com/`\
  \ 获取，我鼓励你下载这个免费且简单易用的工具。\n\n当会话在 CPU 上“卡住”时，Snapper 特别有用。每次我在这种情况下使用 Snapper 时，都能立即看到问题所在。清单\
  \ 4-5 展示了一个实际 Snapper 运行结果的摘录，该运行针对一个持续占用 CPU 的长时间运行查询。\n\n### 清单 4-5. snapper 突出显示的争用问题\n\
  \n```\nTYPE, STATISTIC                                                 ,     HDELTA,\n\
  \nSTAT, session logical reads                                     ,      1.06M,\n\
  \ STAT, concurrency wait time                                     ,          1,\n\
  \ STAT, consistent gets                                           ,      1.06M,\n\
  \ STAT, consistent gets from cache                                ,      1.06M,\n\
  \ STAT, consistent gets - examination                             ,      1.06M,\n\
  \ STAT, consistent changes                                        ,      1.06M,\n\
  \ STAT, free buffer requested                                     ,         17,\n\
  \ STAT, hot buffers moved to head of LRU                          ,         27,\n\
  \ STAT, free buffer inspected                                     ,         56,\n\
  \ STAT, CR blocks created                                         ,         17,\n\
  \ STAT, calls to kcmgas                                           ,         17,\n\
  \ STAT, data blocks consistent reads - undo records applied       ,      1.06M,\n\
  \ STAT, rollbacks only - consistent read gets                     ,         17,\n\
  \ TIME, DB CPU                                                    ,      5.82s,\n\
  \ TIME, sql execute elapsed time                                  ,      5.71s,\n\
  \ TIME, DB time                                                   ,      5.82s,\n\
  \ WAIT, latch: cache buffers chains                               ,    11.36ms,\n\
  --  End of Stats snap 1, end=2013-01-31 02:29:11, seconds=10\n```\n\n当我第一次看到清单 4-5\
  \ 中的输出时，最让我震惊的是在 10 秒的快照中应用了 106 万条撤销记录！该查询与一批在查询开始后不久启动的插入会话发生冲突，查询正忙于通过撤销这些插入来制作一致读副本。我立即看出，杀死并重启该查询将使其快速完成。有人问我是否需要在重启前收集统计信息。我能够自信地表示，那没有必要。所有的猜测都被消除了！\n\
  \n## SQL 性能监视器\n\n\n\n\n"
- "# SQL 性能监控器\n\n`V$SQL_PLAN_STATISTICS_ALL` 中的统计信息存在三大缺陷：\n\n*   只有将 `STATISTICS_LEVEL`\
  \ 设置为 `ALL` 时，这些统计信息才可用。正如前面所讨论的，在某些硬件平台上这不会造成问题，但在其他平台上可能会出现问题。\n*   这些信息仅在语句执行完成后才可用。\n\
  *   当使用并行查询操作时，`LAST` 统计信息会缺失或不正确。\n\n这些缺陷使得诊断某些问题变得困难。幸运的是，Oracle Database 11gR1\
  \ 引入了 SQL 性能监控器，它有助于克服所有这些不足。\n\n可以通过 Enterprise Manager 或在 SQL*Plus 中调用 `DBMS_SQLTUNE.REPORT_SQL_MONITOR`\
  \ 来访问 SQL 性能监控器报告。在这里，我将重点介绍后一种机制。列表 4-6 展示了可用于生成 HTML 报告的两个小型脚本。就个人而言，在详细分析时，我并不太喜欢多彩的图表。我随时都喜欢文本输出和电子表格。然而，在这种情况下，即使是我也会总是生成\
  \ HTML 输出。让我来告诉你为什么。\n\n你应该将 列表 4-6 中的前两段代码分别保存为 PC 上的两个独立脚本。第三段代码展示了如何调用这些脚本。当你调用脚本时，一个\
  \ HTML 文件会生成在 C:\\Temp 目录下，如果你愿意，这个路径显然可以更改。\n\n列表 4-6. 用于生成带有 SQL 性能监控器的 HTML 报告的脚本\n\
  \n```\n-- 将此代码放入 GET_MONITOR_SID.SQL\n\nSET ECHO OFF TERMOUT OFF LINES 32767 PAGES\
  \ 0 TRIMSPOOL ON VERIFY OFF LONG 1000000 LONGC 1000000\nSPOOL c:\\temp\\monitor.html\
  \ REPLACE\n\nSELECT DBMS_SQLTUNE.report_sql_monitor (session_id => &sid, TYPE =>\
  \ 'ACTIVE')\n  FROM DUAL;\n\nSPOOL OFF\nSET TERMOUT ON\n\n-- 将此代码放入 GET_MONITOR_SQLID.SQL\n\
  \nSET ECHO OFF TERMOUT OFF LINES 32767 PAGES 0 TRIMSPOOL ON VERIFY OFF LONG 1000000\
  \ LONGC 1000000\nSPOOL c:\\temp\\monitor.html REPLACE\n\nSELECT DBMS_SQLTUNE.report_sql_monitor\
  \ (sql_id   => '&sql_id'\n                                       ,TYPE     => 'ACTIVE')\n\
  \  FROM DUAL;\n\nSPOOL OFF\nSET TERMOUT ON PAGES 900 LINES 200\n\n-- 从 SQL*Plus\
  \ 调用 GET_MONITOR_SID.SQL 的示例\n\nDEFINE SID=123\n@GET_MONITOR_SID\n```\n\n注意 `SPOOL`\
  \ 语句之前的 SQL*Plus 格式化行。这些对于确保输出可用非常重要。\n\n下一步是在浏览器中将一个书签指向 `file:///c:/temp/monitor.html`。你只需点击此书签，你最新的监控报告就会出现！\n\
  \n输出包含了 `V$SQL_PLAN_STATISTICS_ALL` 中几乎所有可用信息，甚至更多。图 4-1 展示了 SQL 性能监控器报告的一部分。\n\n\
  ![9781430259770_Fig04-01.jpg](img/9781430259770_Fig04-01.jpg)\n\n图 4-1. SQL 性能监控器报告片段\n\
  \n图 4-1 中的截图来自一个正在运行的查询。你看到左边的箭头了吗？这些箭头显示了当前正在进行的操作。数据正从 `SALES` 表中读取，随着行被生成，它们正通过\
  \ `HASH JOIN` 进行匹配，然后通过 `SORT AGGREGATE` 操作进行聚合。请记住，`SORT AGGREGATE` 并不排序！\n\n第五列中的\
  \ 47 秒时间线显示，第一次全表扫描很快，但第二次运行得较慢。这里你必须小心。此报告所示的时间线数字显示了操作首次变为活动状态的时间以及它们（如果）停止活动的时间点；它包含了父操作和子操作处理行所花费的时间。将此与\
  \ `V$SQL_PLAN_STATISTICS_ALL` 对比，后者报告的时间包含了子操作但不包含父操作。SQL 性能报告中包含大量信息，所以请多尝试使用它。\n\
  \n不幸的是，SQL 性能监控器并非 `V$SQL_PLAN_STATISTICS_ALL` 的完全替代品。例如，从 图 4-1 中无法判断当前运行的四个操作中哪一个占用了时间。这只有在查询完成后，才能在\
  \ `V$SQL_PLAN_STATISTICS_ALL` 中看到。关于 SQL 性能监控器，还有几点最后的注意事项：\n\n*   语句通常仅在运行超过五秒后才会被监控。你可以通过\
  \ `MONITOR` 和 `NO_MONITOR` 提示来覆盖此规则。\n*   受监控的 SQL 语句的数据保存在一个循环缓冲区中，因此在繁忙的系统中，这些数据可能很快就会被清除。\n\
  \n"
- "# 工作区\n\nSQL 语句中的许多操作都需要一些内存才能运行，这些内存分配被称为工作区。\n\n## 需要工作区的操作\n\n以下是一些需要工作区的操作：\n\
  \n*   除嵌套循环（不需要工作区）外的所有类型的连接。\n*   排序，除了其他用途外，用于实现 `ORDER BY` 子句以及一些聚合和分析函数。\n*\
  \   尽管一些聚合和分析函数需要排序，但有些并不需要。在本书中已多次出现的 `SORT AGGREGATE` 操作仍然需要一个工作区，即使它不涉及排序！\n\
  *   `MODEL` 子句需要一个工作区来存放被操作的单元格。这将在本书后面讨论 `MODEL` 子句时进行介绍。\n\n## 为工作区分配内存\n\n为每个工作区分配多少内存，以及在内存不足时从临时表空间分配磁盘空间，是运行时引擎的职责。在计算操作成本时，CBO\
  \ 会猜测运行时引擎将分配多少内存，但执行计划并不包含任何关于分配多少内存的指令。\n\n一个常见的误解是，工作区内存是一次性大块分配的。事实并非如此。工作区内存是根据需要一点一点分配的，但可能到达某个点时，运行时引擎不得不宣布已经足够，操作必须使用临时表空间中的空间来完成。\n\
  \n为工作区分配多少内存的计算取决于初始化参数 `WORKAREA_SIZE_POLICY` 是设置为 `MANUAL` 还是 `AUTO`。\n\n### 当\
  \ WORKAREA_SIZE_POLICY 设置为 AUTO 时的内存分配计算\n\n如今我们几乎总是显式地将初始化参数 `PGA_AGGREGATE_TARGET`\
  \ 设置为一个非零值，因此会进行自动工作区大小调整。在这种情况下，运行时引擎会尝试将总内存量控制在 `PGA_AGGREGATE_TARGET` 以下，但这并不能保证。`PGA_AGGREGATE_TARGET`\
  \ 用于推导以下隐藏初始化参数的值：\n\n*   `_smm_max_size`：串行执行的语句中，单个工作区的最大大小。该值以千字节为单位指定。\n*  \
  \ `_smm_px_max_size`：并行执行的查询中，所有匹配工作区的总最大大小。该值以千字节为单位指定。\n*   `_pga_max_size`：一个进程内所有工作区可分配的最大内存量。该值以字节为单位指定。\n\
  \n计算这些隐藏值的内部规则似乎相当复杂，并且会因版本而异，因此我不打算在此记录它们。请记住：\n\n*   当自动 `WORKAREA_SIZE_POLICY`\
  \ 设置为 `AUTO` 时，任何工作区的最大大小最多为 1GB。\n*   当 `WORKAREA_SIZE_POLICY` 设置为 `MANUAL` 时，分配给一个进程的所有工作区的总内存最多为\
  \ 2GB。\n*   增加语句的并行度，在达到某个点后，将不再对你的操作可用内存产生影响。\n\n### 当 WORKAREA_SIZE_POLICY 设置为\
  \ MANUAL 时的内存分配计算\n\n\n\n要获得超过 1GB 的单个**工作区**，或让串行执行的 SQL 语句在多个工作区中使用超过 2GB 的空间，唯一的方法是将\
  \ `WORKAREA_SIZE_POLICY` 设置为 `MANUAL`。这可以在会话级别完成。然后，您可以在会话级别设置以下参数：\n\n*   `HASH_AREA_SIZE`：用于\
  \ `HASH JOIN` 的工作区的最大大小。以字节为单位指定，必须小于 2GB。\n*   `SORT_AREA_SIZE`：用于所有其他目的的工作区的最大大小。这包括诸如\
  \ `HASH GROUP BY` 之类的操作，所以请不要混淆！`SORT_AREA_SIZE` 的值以字节为单位指定，可以设置为任何小于 2GB 的值。\n\n\
  `HASH_AREA_SIZE` 和 `SORT_AREA_SIZE` 参数仅在 `WORKAREA_SIZE_POLICY` 设置为 `MANUAL` 时使用。否则，它们将被忽略。\n\
  \n## Optimal, One-Pass, and Multipass Operations\n\n如果您的排序、连接或其他操作完全在分配给工作区的内存中完成，则称为\
  \ **optimal** 操作。如果需要磁盘空间，则可能是数据被写入磁盘一次，然后又读回一次。在这种情况下，它被称为 **one-pass** 操作。有时，如果工作区严重不足，数据需要被读写多次。这被称为\
  \ **multipass** 操作。通常，尽管存在一些晦涩的异常情况，**optimal** 操作会比 **one-pass** 操作完成得更快，而 **multipass**\
  \ 操作则比 **one-pass** 操作花费的时间长得多。正如你可能想象的那样，识别 **multipass** 操作非常有用，幸运的是，`V$SQL_PLAN_STATISTICS_ALL`\
  \ 中有几个列可以帮上忙：\n\n*   `LAST_EXECUTION`：该值为 `OPTIMAL`，或者指定了该语句上次执行所经历的精确 **pass**\
  \ 次数。\n*   `ESTIMATED_OPTIMAL_SIZE`：估计此工作区为了在内存中完全执行操作（**optimal** 执行）所需的大小（以千字节为单位）。这要么来源于优化器统计信息，要么来源于之前的执行记录。\n\
  *   `ESTIMATED_ONEPASS_SIZE`：这是估计此工作区为了在单次 **pass** 中执行操作所需的大小（以千字节为单位）。这要么来源于优化器统计信息，要么来源于之前的执行记录。\n\
  *   `LAST_TEMPSEG_SIZE`：上次实例化此工作区时创建的临时段大小（以字节为单位）。当 `LAST_EXECUTION` 为 `OPTIMAL`\
  \ 时，此列为 null。\n\n## Shortcuts\n\n运行时引擎通常会严格遵循 CBO 设定的指令，但有时为了性能，它会发挥主动性，偏离规定的路径。让我们看几个例子。\n\
  \n### Scalar Subquery Caching\n\n再看一下 Listing 3-1 中的查询。Listing 4-7 执行了该查询并检查了运行时行为。\n\
  \n**Listing 4-7. 标量子查询缓存示例**\n\n```sql\nSET LINES 200 PAGES 900 SERVEROUT OFF\n\
  COLUMN PLAN_TABLE_OUTPUT FORMAT a200\n\nSELECT e.*\n      ,d.dname\n      ,d.loc\n\
  \      , (SELECT COUNT (*)\n           FROM scott.emp i\n          WHERE i.deptno\
  \ = e.deptno)\n          dept_count  FROM scott.emp e, scott.dept d\n WHERE e.deptno\
  \ = d.deptno;\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor (format => 'ALLSTATS\
  \ LAST'));\n```\n\n```\n| Id  | Operation          | Name | Starts | E-Rows | A-Rows\
  \ |\n\n|   0 | SELECT STATEMENT   |      |      1 |        |     14 |\n|   1 | \
  \ SORT AGGREGATE    |      |      3 |      1 |      3 |\n|*  2 |   TABLE ACCESS\
  \ FULL| EMP  |      3 |      1 |     14 |\n|*  3 |  HASH JOIN         |      | \
  \     1 |     14 |     14 |\n|   4 |   TABLE ACCESS FULL| DEPT |      1 |      4\
  \ |      4 |\n|   5 |   TABLE ACCESS FULL| EMP  |      1 |     14 |     14 |\n```\n\
  \n`DBMS_XPLAN.DISPLAY` 的输出再次被编辑过，但重要的列已列出。你可以看到操作 5 执行了 1 次并返回了 14 行。这很合理。`SCOTT.EMP`\
  \ 表中有 14 行。然而，你可能预期来自相关子查询的操作 1 和 2 会执行 14 次。从 `Starts` 列可以看到它们只执行了 3 次！这是因为运行时引擎为每个\
  \ `DEPTNO` 值缓存了子查询的结果，因此子查询对于 `EMP` 中出现的 3 个 `DEPTNO` 值中的每一个只执行了一次。提醒一下，`E-Rows`\
  \ 是操作单次执行估计返回的行数，`A-Rows` 是操作所有三次执行实际返回的行数。\n\n标量子查询缓存仅在子查询的结果已知在多次调用之间不会变化时才会启用。因此，如果子查询调用了例如\
  \ `DBMS_RANDOM` 包中的例程，那么子查询缓存就会被关闭。如果子查询包含对用户编写函数的调用，那么标量子查询缓存也会被禁用，除非在函数声明中添加了关键字\
  \ `DETERMINISTIC`。在我们讨论函数结果缓存时，我会再稍微详细解释一下这一点。\n\n### Join Shortcuts\n\n有时，如果继续执行没有意义，运行时引擎会中断连接操作。Listing\
  \ 4-8 创建并连接了两个表。\n\n**Listing 4-8. 连接快捷方式**\n\n```sql\nSET LINES 200 PAGES 0 SERVEROUTPUT\
  \ OFF\n\nCREATE TABLE t1\nAS\n       SELECT ROWNUM c1\n         FROM DUAL\n   CONNECT\
  \ BY LEVEL <= 100;\n\nCREATE TABLE t2\nAS\n       SELECT ROWNUM c1\n         FROM\
  \ DUAL\n   CONNECT BY LEVEL <= 100;\n\nSELECT *\n  FROM t1 JOIN t2 USING (c1)\n\
  \ WHERE c1 = 200;\n\nSELECT *\nFROM TABLE (DBMS_XPLAN.display_cursor (format =>\
  \ 'BASIC IOSTATS LAST'));\n```\n\n```\n| Id  | Operation          | Name | Starts\
  \ | E-Rows | A-Rows |\n\n|   0 | SELECT STATEMENT   |      |      1 |        | \
  \     0 |\n|*  1 |  HASH JOIN         |      |      1 |      1 |      0 |\n|*  2\
  \ |   TABLE ACCESS FULL| T1   |      1 |      1 |      0 |\n|*  3 |   TABLE ACCESS\
  \ FULL| T2   |      0 |      1 |      0 |\n```\n\n表 `T1` 和 `T2` 连接的执行计划显示了一个哈希连接，但操作\
  \ 2，即对表 `T1` 的全表扫描，返回了 0 行。运行时引擎随后意识到，如果 `T1` 没有行，连接就不可能产生任何行。从 `Starts` 列你可以看到操作\
  \ 3，即对 `T2` 的全表扫描，从未运行。我相信你会同意，这是一个合理的决定，覆盖了 CBO 的指令！\n\n## Result and OCI Caches\n\
  \n结果缓存（**result cache**）在 Oracle Database 11gR1 中引入，旨在避免重复执行相同的查询。结果缓存的使用主要通过 `RESULT_CACHE_MODE`\
  \ 初始化参数和两个提示（hint）来控制：\n\n*   如果 `RESULT_CACHE_MODE` 设置为 `FORCE`，那么除非代码中提供了 `NO_RESULT_CACHE`\
  \ 提示，否则在所有有效情况下都会使用结果缓存。\n*   如果 `RESULT_CACHE_MODE` 设置为 `MANUAL`（默认值），那么除非代码中提供了\
  \ `RESULT_CACHE` 提示并且使用结果缓存是有效的，否则永远不会使用结果缓存。\n\nListing 4-9 展示了如何使用结果缓存功能。\n\n\
  **Listing 4-9. 由初始化参数强制启用的结果缓存功能**\n\n```sql\nBEGIN\n   DBMS_RESULT_CACHE.flush;\n\
  END;\n/\n\nALTER SESSION SET result_cache_mode=force;\n\nSELECT COUNT (*) FROM scott.emp;\n\
  \nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor (format => 'ALLSTATS LAST'));\n\
  \nSELECT COUNT (*) FROM scott.emp;\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor\
  \ (format => 'ALLSTATS LAST'));\n\nALTER SESSION SET result_cache_mode=manual;\n\
  ```\n\n```\n| Id  | Operation              | Name                       | Starts\
  \ | E-Rows | A-Rows |\n```\n\n\n## 执行计划与缓存\n\n| Id | Operation              | Name\
  \                       | Starts | E-Rows | A-Rows |\n|----|------------------------|----------------------------|--------|--------|--------|\n\
  |  0 | SELECT STATEMENT       |                            |      1 |        | \
  \     1 |\n|  1 |  RESULT CACHE          | `2jv3dwym1r7n6fjj959uz360b2` |      1\
  \ |        |      1 |\n|  2 |   SORT AGGREGATE       |                         \
  \   |      1 |      1 |      1 |\n|  3 |    INDEX FAST FULL SCAN| `PK_EMP`     \
  \                |      1 |     14 |     14 |\n\n| Id | Operation              |\
  \ Name                       | Starts | E-Rows | A-Rows |\n|----|------------------------|----------------------------|--------|--------|--------|\n\
  |  0 | SELECT STATEMENT       |                            |      1 |        | \
  \     1 |\n|  1 |  RESULT CACHE          | `2jv3dwym1r7n6fjj959uz360b2` |      1\
  \ |        |      1 |\n|  2 |   SORT AGGREGATE       |                         \
  \   |      0 |      1 |      0 |\n|  3 |    INDEX FAST FULL SCAN| `PK_EMP`     \
  \                |      0 |     14 |      0 |\n\n为了运行一个可重复的示例，我首先使用 `DBMS_RESULT_CACHE`\
  \ 包刷新了结果缓存。然后我执行了一个简单的查询两次。您可以看到执行计划现在有了一个新的 `RESULT_CACHE` 操作，该操作导致第一次执行的结果被保存。在刷新调用后进行的第二次调用中，操作\
  \ 2 和 3 都没有执行，结果已从结果缓存中检索。\n\n我必须说，我还没有利用结果缓存。处理查询被多次执行的常用方法是只执行它们一次！在有一次我无法阻止语句的多次执行的情况下，因为它们是自动生成的，而结果缓存的使用无效，因为查询中出现了表达式\
  \ `TRUNC(SYSDATE)`，该表达式的非确定性使得结果缓存的使用无效。尽管如此，我确信在某些情况下，结果缓存将是最后的救命稻草！\n\nOCI 缓存比服务器端结果缓存更进一步，它将数据存储在客户端。一方面，这可能会提供出色的性能，因为它完全避免了与服务器进行任何通信。另一方面，结果的一致性无法保证，因此它的有用性甚至比服务器端结果缓存更有限！\n\
  \n## 函数结果缓存\n\n假设一个函数调用对于相同的参数集总是返回相同的结果，那么您可以在函数声明中提供 `RESULT_CACHE` 关键字。这将导致返回值与相关参数值一起保存在系统范围内的缓存中。即使函数的结果仅在某些基础表的内容保持不变的情况下才是确定的，您仍然可以使用函数结果缓存。当函数结果缓存首次在\
  \ Oracle Database 11gR1 中引入时，您必须指定一个 `RELIES_ON` 子句来指定函数确定性所依赖的对象。从 Oracle Database\
  \ 11gR2 开始，系统会自动完成此操作，如果指定了 `RELIES_ON` 子句，它将被忽略。\n\n函数结果缓存的概念与我在标量子查询缓存上下文中简要提到的确定性函数的概念非常相似：\n\
  \n*   无论 `DETERMINISTIC` 还是 `RESULT_CACHE` 关键字，都不会阻止在不同参数被提供时对函数的多次调用。\n*   声明为\
  \ `DETERMINISTIC` 的函数将只避免在单个 SQL 语句调用内对具有相同参数值的函数进行多次调用。`RESULT_CACHE` 关键字可以跨语句和跨会话节省调用。\n\
  *   当函数被声明为 `DETERMINISTIC` 时，不会检查基础数据在语句中间的变化。从这个意义上说，`DETERMINISTIC` 不如 `RESULT_CACHE`\
  \ 可靠。另一方面，您可能不希望基础数据的变化在语句中间可见！\n*   `DETERMINISTIC` 函数不消耗系统缓存，并且理论上至少应该比函数结果缓存效率稍高一些。\n\
  \n您可以在函数声明中同时指定 `DETERMINISTIC` 和 `RESULT_CACHE` 关键字，但请记住，`DETERMINISTIC` 并不绝对保证在同一个\
  \ SQL 语句中的多次调用会返回相同的结果。标量子查询缓存是有限的，在某些情况下，早期调用的结果可能会从缓存中被移除。\n\n## 事务一致性与函数调用\n\n\
  为这样一本书准备示例的一个有趣之处在于，有时作为作者，我自己也学到了新东西！我以前认为 `READ_COMMITTED` 隔离级别将保证单个 SQL 语句的结果是一致的，即使不能提供\
  \ `SERIALIZABLE` 的事务级别保证。然而，事实证明，除非事务隔离级别是 `SERIALIZABLE`，否则重复的递归 SQL 调用（如在函数调用中）*不能*保证产生一致的结果！\n\
  \nListing 4-10 展示了一个同时使用 `DETERMINISTIC` 和 `RESULT_CACHE` 关键字声明的函数的声明和调用。\n\nListing\
  \ 4-10. 通过缓存函数结果进行性能改进\n\n```sql\nCREATE TABLE business_dates\n(\n   location  \
  \      VARCHAR2 (20)\n  ,business_date   DATE\n);\n\nINSERT INTO business_dates\
  \ (location, business_date)\n     VALUES ('Americas', DATE '2013-06-03');\n\nINSERT\
  \ INTO business_dates (location, business_date)\n     VALUES ('Europe', DATE '2013-06-04');\n\
  \nINSERT INTO business_dates (location, business_date)\n     VALUES ('Asia', DATE\
  \ '2013-06-04');\n\nCREATE OR REPLACE FUNCTION get_business_date (p_location VARCHAR2)\n\
  \   RETURN DATE\n   DETERMINISTIC\n   RESULT_CACHE\nIS\n   v_date   DATE;\n   dummy\
  \    PLS_INTEGER;\nBEGIN\n   DBMS_LOCK.sleep (5);\n\nSELECT business_date\n    \
  \ INTO v_date\n     FROM business_dates\n    WHERE location = p_location;\n\nRETURN\
  \ v_date;\nEND get_business_date;\n/\n\nCREATE TABLE transactions\nAS\n       SELECT\
  \ ROWNUM rn\n             ,DECODE (MOD (ROWNUM - 1, 3),  0, 'Americas',  1, 'Europe',\
  \  'Asia')\n                 location\n             ,DECODE (MOD (ROWNUM - 1, 2)\n\
  \                     ,0, DATE '2013-06-03'\n                     ,DATE '2013-06-04')\n\
  \                 transaction_date\n         FROM DUAL\n   CONNECT BY LEVEL <= 20;\n\
  \nSELECT *\n    FROM transactions\n   WHERE transaction_date = get_business_date\
  \ (location);\n```\n\n此代码创建了一个 `BUSINESS_DATE` 表，该表非常真实地将 `Americas` 的 `BUSINESS_DATE`\
  \ 设置为比 `Europe` 和 `Asia` 的晚一天。然后从 `TRANSACTIONS` 表中进行选择，挑选与该 `LOCATION` 的 `BUSINESS_DATE`\
  \ 匹配的行。当然，在现实生活中，这个简单的例子可能最好通过表连接来完成，但同样在现实生活中，函数中的逻辑可能比这里提供的更复杂。\n\n如果您运行此脚本，其中函数内部有一个刻意的\
  \ 5 秒暂停，您将看到它仅在 15 秒后（即仅三次函数调用后）返回。这表明该函数每个区域只被调用了一次。\n\n## 总结\n\nCBO 创建了一个它认为在当时信息下是最优的执行计划。优化的一个关键部分是理解\
  \ CBO 认为将要发生的情况与实际发生的情况之间的差异。本章解释了运行时引擎如何解释 CBO 给出的执行计划，如何跟踪运行时引擎的性能，以及各种形式的缓存如何影响其行为。\n\
  \n您现在已经掌握了足够的基本概念，我可以向您概述我对 SQL 语句优化的方法，这就是我将在第 5 章中介绍的内容。\n\n## 第 5 章\n\n![image](img/frontdot.jpg)\n\
  \n## 调优简介\n\n"
- "# 调优 SQL 语句\n\n本章将介绍本书两大主题中的第一个：调优 SQL 语句。本章描述的系统化过程旨在确定一种执行 SQL 语句的方法，确保其在合理的时间内完成，且不会过度消耗资源。在此阶段，我将仅对该过程进行概述。更多细节将在本书的第\
  \ 4 部分中深入探讨。\n\n需要明确的是，用于确定使 SQL 语句快速运行的方法的技术，可能与在生产系统中实施或强制执行该方法的技术不同。我们将在下一章开始探讨部署相关的内容。\n\
  \n## 理解问题\n\n在生活中的许多方面，准确理解你试图解决的问题是找到解决方案所需的大部分工作。调优 SQL 语句就是一个典型的例子。你对调优问题的理解越深入，就越能自信地做出调优决策。\n\
  \n### 理解业务问题\n\n这是一本技术书籍，并非管理技巧的培训手册，但厘清业务问题至关重要，因此我不得不花少量篇幅加以讨论。当你首次被要求检查一个或多个\
  \ SQL 语句的性能问题时，很容易立即着手深入排查。但你应该先**冷静一下**。\n\n假设你半夜被叫醒，因为一个夜间批次处理中的查询运行超时。你需要得到的第一个答案是：“那又怎样？”你可能想把问题表达得更委婉一些，但这确实是你需要弄清楚的实际问题。查询延迟运行业务影响是什么？是否有需要满足的服务等级协议（`SLA`），如果违反协议会怎样？`SLA`\
  \ 何时会被违反，或者是否已被违反？\n\n理解业务背景对你的整个调优工作方法至关重要，原因有几。其一，你需要在完成查询的需求与为根本原因分析（`RCA`）收集诊断信息的需求之间取得平衡，而\
  \ `RCA` 对于防止此问题再次发生本身也很重要。\n\n理解业务问题之所以重要的第二个原因，是让你能够优先分配资源。你可能会观察到系统正忙于运行其他进程。这些其他进程有多重要？能否终止它们？问题越严重，业务部门就越能接受采取严厉措施，反之亦然。一方面，有时可能涉及数十亿美元，甚至有时人命关天。在这种危急情况下，你可能需要请一两个人协助处理。另一方面，我也曾半夜被叫醒，结果发现查询运行很久实际上没有任何后果；我只是被告知“以防你想知道”。最好在开始前就了解清楚这类情况。\n\
  \n对生产查询进行补救性性能调优并非唯一需要理解业务问题的情形。如果开发人员向你咨询一个运行 10 分钟的查询，你也应从礼貌地询问“那又怎样”问题的不同变体开始。该查询是用于交互式使用还是批处理的一部分？业务部门的期望是什么？如果该查询作为年终夜间批处理的一部分每年运行一次，那么也许它并不重要——当然，除非去年的年终批处理是一场灾难！\n\
  \n开发场景引出了理解业务问题的第三个重要原因：那就是知道何时停止！假设你有一个 75 分钟的 `SLA`，并且你已经将查询调优到能稳定在 15 分钟内完成。你可以看到，再稍加努力，也许能将运行时间缩短到\
  \ 12 分钟。这值得吗？几乎可以肯定，你的时间最好花在别处，因为你的服务使用者从这项额外工作中获益甚微。\n\n完整且权威地理解业务背景可能相当困难，在许多情况下甚至极不现实。你不能花费\
  \ 30 分钟去弄清楚一个可能只需 10 分钟就能修复的问题；你的“专业精神”本身可能就会导致服务等级协议（`SLA`）被违反！然而，问题看起来越紧急，恐慌情绪似乎越弥漫，就越需要弄清楚真正的问题是什么，以便正确地集中资源。\n\
  \n这里需要相当多的判断力，我们都会随着经验积累而做得更好。关于状态报告，我将以一个小建议结束本话题：你可能想写一封简短的电子邮件，说明你被要求做什么以及为什么。将此类邮件的副本发送给各个关键人员，是让这些关键人员了解你被要求做出的假设的好方法，并提供了有用的审计跟踪。\n\
  \n### 理解技术问题\n\n技术问题似乎显而易见：让 SQL 语句运行得快。对吗？再一次，你需要**冷静一下**。\n\n我曾花费两天时间调优一个从未完成的查询，结果发现查询本身是错误的！开发人员刚接触她团队编码标准中规定的\
  \ `ANSI` 语法，每次本意是写 `RIGHT JOIN` 时都写成了 `LEFT JOIN`，反之亦然！我本应为自己没有检查而懊恼不已，我很想说我再也没有犯过这种错误，但我不能！就在不久前，一位开发人员在将\
  \ SQL 语句交给我调优之前，特意修改了它。修改是出于好意。提供给我处理的测试系统上的数据不具有生产环境的代表性，而实际的生产查询在那个测试系统上运行良好。查询被善意修改以适应测试数据，但这一改变完全改变了调优的可选方案。\n\
  \n确保你被要求查看（或你自己编写）的语句是正确的，并不是你需要弄清楚的唯一技术事项。你还需要了解 SQL 语句是静态的还是动态的。换句话说，你需要知道该语句每次运行时是否都会变化。你需要了解这是唯一需要调优的语句，还是存在数百个类似的语句。你需要了解同时还会运行什么其他任务，以便避免资源争用并适当分配资源。可能还有其他会困扰你的事情，所以不要将此视为详尽清单。\n\
  \n## 理解 SQL 语句\n\n\n在第 1 章中，我介绍了**因式分解子查询**，因为我感觉能够阅读 SQL 语句并理解其功能对于调优至关重要。你可能需要完全重写一个查询以获得完全相同的结果。还记得从代码清单\
  \ 1-1 到代码清单 1-2 的改动吗？如果你对 SQL 语句试图做什么毫无头绪，那么这类转换就非常难以看出来。也许查询中有一个`ORDER BY`子句。你知道它为什么在那里吗？它满足了真正的需求，还是仅仅因为开发者更容易验证输出正确而被放进去的？无处不在的`SELECT\
  \ COUNT (*) FROM`查询通常仅用于确定匹配行的存在，而确切的计数无关紧要。如果查询是你自己写的，那么希望你知道这些问题的答案，但如果不是，花些时间尝试理解查询的功能和原因通常会加速整个调优过程。\n\
  \n## 理解数据\n\n在测试系统上让你的查询运行得很快固然很好，但测试数据是否代表了你将在生产系统上找到的数据？你生产系统上的数据量是否可能增长？如果会，增长速度如何？我承认，关于数据的具体问题可能在调优练习的最初阶段难以提出。除非你对性能问题是什么以及可能的执行计划是什么有了一定了解，否则可能很难知道查询的哪些特定方面对数据量或数据分布敏感。然而，一旦你发现查询的某些方面对数据量或数据分布特别敏感，最好暂停并提一些问题。\n\
  \n让我给你一个现实生活中的例子，说明当不检查关于数据的假设时会发生什么问题。一项监管要求导致了一个我称之为`AUDIT_TRAIL`的表被添加到数据库中。`AUDIT_TRAIL`表中的行填充了诸如`USER_ID`、`PRODUCT_ID`等列。向该表添加行的软件经过了测试，大约有半打行出现在`AUDIT_TRAIL`表中。然后编写了一份报告。它从`AUDIT_TRAIL`表中取出数据，并与`USERS`和`PRODUCTS`表进行连接，以便用更具可读性的`USER_NAME`和`PRODUCT_NAME`列替换无意义的`USER_ID`和`PRODUCT_ID`列。报告运行良好！\n\
  \n应用程序部署到生产环境的第一天，报告就引起了一些担忧，因为它似乎运行得比预期的要长一些。第二天，担忧的声音更强烈了，因为报告现在花费的时间长得无法接受。报告花费如此长时间的原因是，每天大约有\
  \ 100,000 行被添加到`AUDIT_TRAIL`表中！谁知道呢？显然报告的测试者不知道，他在报告了大约六行后就签字确认了测试！\n\n## 理解问题总结\n\
  \n关于调优问题各个方面的讨论，不应被视为强制性的检查清单或详尽无遗的问题列表。我花这么长时间讨论这个问题是为了强调一个事实：没有任何 SQL 调优任务像最初看起来那么简单。如果你过早开始进行技术分析，你很可能会做出错误的假设，并提供一个因其他原因而不适用或不合适的解决方案。如果你最终确实提供了一个用户满意的解决方案，如果你先问对了问题，你会更快速、更高效地完成。最后，我想强调的是，一旦你开始分析，就应该始终警惕基于未经证实的假设从观察中得出结论。不要害怕暂停并核实你的事实。\n\
  \n## 分析\n\n在透彻理解问题陈述之后，调优过程的下一阶段是分析 SQL 语句的行为。这是一个迭代过程的一部分；你进行分析，做出一些更改，然后重新分析。\n\
  \n## 让语句运行完成\n\n尽管在 SQL 语句运行时，你可以通过使用 SQL 性能监视器对其工作方式有所了解，但直到 SQL 语句执行完毕，你才能真正声称掌握了全貌。而且，如果你想尝试几件事，你需要让语句在最多\
  \ 5 到 10 分钟内完成。否则，你要么会空等太久，要么最终不得不同时处理其他事情，并最终忘记自己进行到哪里了。\n\n假设一个查询已经运行了两分钟，你查看\
  \ SQL 性能监视器报告，发现表`T1`正在进行全表扫描，并且只完成了 1%。天哪。你没想到全表扫描会花这么长时间。按照这个速度，全表扫描需要 200 分钟才能完成，而整个语句完成还需要更长时间，谁知道呢。作为临时措施，你需要减少从表中选择的数据量。代码清单\
  \ 5-1 展示了可用于减少你所操作数据集的众多方法之一。\n\n代码清单 5-1. 使用 `SAMPLE` 关键字减小数据集大小\n\n```\nCREATE\
  \ TABLE t1\nAS\n       SELECT 1 c1\n         FROM DUAL\n   CONNECT BY LEVEL <= 100;\n\
  \nCREATE TABLE t2\nAS\n       SELECT 1 c2\n         FROM DUAL\n   CONNECT BY LEVEL\
  \ <= 100;\n\nSELECT *\n  FROM t1, t2\n WHERE t1.c1 = t2.c2;\n\nWITH q1\n     AS\
  \ (SELECT *\n           FROM t1 SAMPLE (5) SEED(0))\nSELECT *\n  FROM q1 t1, t2\n\
  \ WHERE t1.c1 = t2.c2;\n\nDROP TABLE t1;\nDROP TABLE t2;\n```\n\n代码清单 5-1 中的第一个查询展示了一个连接两个表的典型查询。第二个查询使用`SAMPLE`关键字，在本例中选择`T1`中\
  \ 5%的数据，试图在合理的时间内获得某种结果。`SEED`关键字用于生成可复现的结果。当然，在某个时刻你将必须移除这个`SAMPLE`关键字，但只有在你弄清楚查询为什么花费这么长时间之后。\n\
  \n## 分析耗时\n\n语句执行完毕后，你需要获取该耗时的明细分解。在第 4 章中，我解释了如何确保视图`V$SQL_PLAN_STATISTICS_ALL`从运行时引擎填充了有关\
  \ SQL 语句中各个操作的信息。这是分析的主要信息来源。\n\n### 当耗时总和不匹配时\n\n有时，查看`V$SQL_PLAN_STATISTICS_ALL`的数据时，你会发现总耗时与你等待查询完成的时间长度相去甚远。可能的原因有以下几种：\n\
  \n\n\n## 影响 SQL 执行时间的其他因素\n\n通常，大多数 SQL 语句的执行时间都花在了 CPU 处理、磁盘 I/O 和 SQL*Net 消息传递上。但有时会出现这样的情况：尽管统计数据显示\
  \ CPU、I/O 和 SQL*Net 的总时间与语句的总执行时间相符，但你仍然觉得某些操作花费了比预期更长的时间。这可能是因为时间被“隐藏”在了以下几个地方：\n\
  \n*   **递归 SQL。** 如果被测试的 SQL 语句包含了对某些函数的调用，而这些函数又包含了对其他 SQL 语句的调用，那么执行这些递归 SQL 语句所花费的时间**不会**包含在所报告语句的执行时间内。如果一个\
  \ DML 语句最终触发了一个或多个触发器，那么执行这些触发器所花费的时间同样会被排除在外。\n*   **向客户端进程发送和接收数据。** 一旦查询返回了行数据，就需要将它们发送到客户端进程。如果客户端进程跟不上，就会阻塞服务器的处理。慢速网络或缓慢的客户端会在`V$ACTIVE_SESSION_HISTORY`中体现为大量的“SQL*Net\
  \ message to client”等待事件。\n*   **解析。** 对于运行时间长达数秒的 SQL 语句来说，这很少是个问题，但我曾遇到过一个应用，其中\
  \ CBO 花了超过 4 秒来制定一个查询计划！这个查询计划本身很好，运行时间不到 1 秒，但这于事无补！\n\n大多数情况下，时间丢失的原因很快就会变得清晰。只有在极少数你看不到时间丢失在何处的情况下，我在第\
  \ 4 章中提到的 10046 SQL 跟踪才变得至关重要。\n\n## 当时间确实累积起来时\n\n一旦`V$SQL_PLAN_STATISTICS_ALL`中的数据讲得通了，你就需要首先聚焦于最昂贵的操作。看看清单\
  \ 5-2 中的测试脚本做了什么。\n\n**清单 5-2. 分析一个简单的两表连接的性能**\n```\nCREATE TABLE t1 (c1 PRIMARY\
  \ KEY)\nORGANIZATION INDEX\nAS\n   SELECT ROWNUM c1 FROM DUAL;\n\nCREATE TABLE t2\n\
  PCTFREE 99\nPCTUSED 1\nAS\n   WITH q1\n        AS (    SELECT ROWNUM c2\n      \
  \            FROM DUAL\n            CONNECT BY LEVEL <= 100)\n   SELECT a.c2, RPAD\
  \ ('X', 2000) vpad\n     FROM q1 a, q1;\n\nBEGIN\n   DBMS_STATS.gather_table_stats\
  \ (SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n                                 ,'T1'\n\
  \                                 ,no_invalidate   => FALSE);\n   DBMS_STATS.gather_table_stats\
  \ (SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n                                 ,'T2'\n\
  \                                 ,no_invalidate   => FALSE);\nEND;\n/\n\nINSERT\
  \ INTO t2 (c2, vpad)\n   WITH q1\n        AS (    SELECT ROWNUM c2\n           \
  \       FROM DUAL\n            CONNECT BY LEVEL <= 300)\n   SELECT a.c2, RPAD ('X',\
  \ 2000) vpad\n     FROM q1 a, q1;\n\nSET LINES 200 PAGES 900 TIMING ON\n\nALTER\
  \ SESSION SET statistics_level=all;\n\nBEGIN\n   FOR r IN (SELECT *\n          \
  \     FROM t1, t2\n              WHERE t1.c1 = t2.c2)\n   LOOP\n      NULL;\n  \
  \ END LOOP;\nEND;\n/\n\nCOLUMN id FORMAT 99\nCOLUMN operation FORMAT a18\nCOLUMN\
  \ options FORMAT a11\nCOLUMN actual_time FORMAT 99.999 HEADING \"Actual|Time\"\n\
  COLUMN object_name FORMAT a17 HEADING \"Object|Name\"\nCOLUMN last_starts FORMAT\
  \ 9999999 HEADING \"Last|Starts\"\nCOLUMN actual_rows FORMAT 9999999 HEADING \"\
  Actual|Rows\"\n\nSELECT id\n        ,LPAD (' ', DEPTH) || operation operation\n\
  \        ,options\n        ,last_elapsed_time / 1000000 actual_time\n        ,object_name\n\
  \        ,last_starts\n        ,last_output_rows actual_rows\n    FROM v$sql_plan_statistics_all\n\
  \   WHERE sql_id = 'cwktrs03rd8c7'\nORDER BY id;\n```\n\n清单 5-2 包含一些 SQL*Plus 特有的语法，它首先创建了两个表。`T1`是一个索引组织表，`T2`是一个普通的堆表。在收集了两个表的统计信息之后（在\
  \ 12cR1 及更高版本中这是多余的，我将在本书后面解释），更多的行被添加到表`T2`中。`T2`的统计信息现在稍微过时了。这也许有点不寻常；你不能每次向表中插入数据都重新收集统计信息，但通常也不会在重新收集统计信息之前让行数增加好几倍！然后，这两个表在一个\
  \ PL/SQL 块中被连接，并且出于测试目的，输出被丢弃。在我的笔记本电脑上，这个查询大约花了 25 秒。清单 5-2 中的最后一条语句使用我通过第 1 章描述的技术单独确定的\
  \ SQL_ID，检查了`V$SQL_PLAN_STATISTICS_ALL`中的一些关键列。\n\n清单 5-2 中最后一个查询的输出显示在清单 5-3 中。\n\
  \n**清单 5-3. 来自两表连接的运行时统计信息**\n```\n Actual Object                Last   Actual\n\
  \ ID OPERATION          OPTIONS        Time Name                Starts     Rows\n\
  --- ------------------ ----------- ------- ----------------- -------- --------\n\
  \  0 SELECT STATEMENT                25.157                          1      400\n\
  \  1  NESTED LOOPS                   25.157                          1      400\n\
  \  2   TABLE ACCESS     FULL         24.806 T2                       1   100000\n\
  \  3   INDEX            UNIQUE SCAN    .258 SYS_IOT_TOP_97615   100000      400\n\
  ```\n\n我们可以看到，操作 1 表面上花费了大约 25.16 秒，但你还记得我说过分配给子操作的时间包含在父操作的时间中吗？操作 2 和 3 总共花了大约\
  \ 24.81 秒，所以`NESTED LOOPS`本身只负责 0.35 秒。这是可以预料的，因为`NESTED LOOPS`连接只是从驱动行源获取行，然后调用探测行源进行匹配。或许更令人惊讶的是，尽管我们可以看到操作\
  \ 3 被调用了 100,000 次（我们从`LAST_STARTS`列知道），但总耗时仍然只有 0.26 秒！\n\n**提示** 除了我将在第 11 章中介绍的半连接和反连接之外，`NESTED\
  \ LOOPS`连接的探测行源（具有较高 ID 的子操作）的执行次数（`LAST_STARTS`）总是与驱动行源（具有较低 ID 的子操作的`LAST_OUTPUT_ROWS`列）返回的行数完全相同。这是因为对于第一个子操作返回的每一行，第二个子操作都会被探测一次。在这个案例中，`T2`的全表扫描返回了\
  \ 100,000 行，因此`T1`的索引被探测了 100,000 次。\n\n显然，在那 100,000 次探测的底层发生了大量复杂的优化，这可能会在某天变得有趣，但目前主要的结论是你不需要担心操作\
  \ 3。不，主要的关注点是操作 2。尽管它只执行了一次，但那次全表扫描占用了我们语句总耗时 24.16 秒中的 24.81 秒。我们需要将注意力集中在这个全表扫描上。\n\
  \n## 解决问题\n\n一旦你确定了 SQL 语句中消耗时间最多的具体操作，接下来要做的就是想办法节省部分时间。请始终记住，在此阶段，我们只是试图找出需要修复什么，而不是如何在生产环境中部署修复方案。\n\
  \n### 检查统计信息\n\n\n"
- "# 对象统计信息与查询优化\n\n在继续之前，你需要了解你的对象统计信息是否合适。对象统计信息是 CBO 的关键输入，我将在第 6 章解释为什么“合适”不一定意味着“最新”。关键是确保你不会在查询语句性能不佳纯粹是由于过时或不合适的统计信息时，却花费大量精力去调整查询。\n\
  \n如果你正在一个具有生产类数据的测试系统上工作，并且该测试系统上的对象统计信息已过时，那么简单的方法可能就是重新收集它们。但是，如果你的生产系统上有一些扩展统计信息或手工创建的直方图，最好确保测试系统上也存在相同的扩展统计信息和直方图。也许最好的做法是将统计信息从生产系统复制到测试系统。\n\
  \n我将在下一章更详细地讨论对象统计信息，现在不想在这里深入太多。我这里想强调的主要观点是，在调优过程的早期就需要考虑对象统计信息的状态。\n\n让我们收集 Listing\
  \ 5-2 中表的统计信息并重新运行查询。Listing 5-4 显示了来自`V$SQL_PLAN_STATISTICS_ALL`的更新结果。\n\nListing\
  \ 5-4. 收集统计信息后的性能\n\n```\n Actual Object                Last   Actual\n ID OPERATION\
  \          OPTIONS        Time Name                Starts     Rows\n--- ------------------\
  \ ----------- ------- ----------------- -------- --------\n  0 SELECT STATEMENT\
  \                13.390                          1      400\n  1  HASH JOIN    \
  \                  13.390                          1      400\n  2   INDEX     \
  \       FULL SCAN      .000 SYS_IOT_TOP_100393       1        1\n  3   TABLE ACCESS\
  \     FULL         13.307 T2                       1   100000\n```\n\n我们可以看到执行计划已经改变，性能也有所提升。事实上，改进主要是由于数据现在被缓存了，而不是因为执行计划的变化。同样那个全表扫描仍然是问题的根源。\n\
  \n## 修改代码\n\n以功能等效的方式重写查询可能有助于 CBO，这有几个原因。我现在提几个。我将在第 16 章更深入地讨论这个话题。\n\n### 添加信息\n\
  \n有很多方法可以向 CBO 提供信息以帮助它。这里只是一个例子。\n\n除非一个列被保证总是`NOT NULL`，否则你不能为它添加`NOT NULL`约束。然而，在你选择的特定时间，你选择的特定行可能被保证是`NOT\
  \ NULL`的，你可以添加一个谓词，如“`WHERE c1 IS NOT NULL`”。这样，CBO 就多了一点可能有用的信息，可以将其纳入执行计划的准备中。在\
  \ Listing 5-2 这个简单查询的例子中，我们无法添加任何有用的信息。\n\n### 转换查询\n\n正如我在 Listings 1-1 和 1-2 中所展示的，有时你可以以完全不同的方式重写查询，使\
  \ CBO 产生完全不同的执行计划。似乎没有适用于 Listing 5-2 中查询的有用转换，所以我们继续。\n\n### 添加提示\n\n虽然我认为提示是在生产系统上使\
  \ SQL 语句快速运行的一种完全可以接受的方式，但现在不是就这个话题进行辩论的时候。在这个阶段，我们只是试图通过一系列实验来识别一个性能良好的执行计划。你会发现所有知名的\
  \ Oracle 专家都会同意，*仅用于实验目的*，你在寻找最有效的执行计划时，不应以任何方式抑制自己使用提示，无论是文档化的还是未文档化的。\n\n和你们大多数人一样，我经常问自己这样的问题：“为什么\
  \ CBO 使用了全表扫描，而不是使用我专门为这类查询创建的索引？”好吧，在花几天时间进行理论推导之前，我通常会在查询中添加一个`INDEX`提示，并在可能的情况下重新运行查询。有几种可能的结果：\n\
  - 添加`INDEX`提示后，CBO 仍然使用了全表扫描。这表明索引的使用在某种程度上是非法的。我现在就得到了问题的一半答案。另一半是：“为什么索引的使用是非法的？”\n\
  - 索引被使用了，但查询实际上并没有变快，甚至可能更慢。我现在有了一个新问题：“我做了什么错误的假设，让我相信索引会更快？”\n- 索引被使用了，查询的耗时减少了。这个实验结果引出了一个不同的新问题：“CBO\
  \ 做了什么错误的假设，让它认为索引不会更快？”如果有数百个类似的 SQL 语句，那么这个新问题就极其重要。不过，在这一点上，这些担忧并不太让我担心；我可以继续调整查询的其他部分，同时保留这个提示。\n\
  \n在 Listing 5-2 的查询案例中，表`T2`上还没有任何索引。唯一可能有帮助的提示`PARALLEL`在我的笔记本电脑上不起作用，因为单个本地硬盘一次只能做一件事。我们继续吧。\n\
  \n## 对数据库进行物理更改\n\n人们为改善查询性能而进行的最常见物理数据库更改是添加一个或多个索引。然而，还有许多其他物理设计更改可能有助于改善查询性能，我将在第\
  \ 15 章介绍这些。这里只举几个例子。\n\n如果你拥有必要的许可证，你可能会实施分区或压缩。你可能会创建物化视图或执行其他形式的反规范化。当然，在 Listing\
  \ 5-2 显示的特定情况下，我们可以简单地移除我特意添加以减慢全表扫描的`PCTFREE 99`！这在现实生活中可能不常是一个选项，但你可能会偶尔发现一个表的块中有大量空闲空间，通过移动表，你可以显著减小其大小并改善访问时间。\n\
  \n即使你决定添加索引将有助于查询性能，仍然有几个问题需要问。像任何物理设计更改一样，你脑海中浮现的第一个想法应该是评估添加索引对 DML 语句的影响。每次向表中插入一行、每次从表中删除一行、每次更新表中的索引列时，你都需要调整表的索引。索引越多，DML\
  \ 所需的时间就越长。不仅如此，索引还会占用缓冲区缓存和磁盘上的空间，这些空间可能更适合用于其他目的。\n\n\n\n我在此自相矛盾了一下。毕竟，你现在仍处于实验阶段，因此在这个阶段无需把所有事情都想周全。但某些物理设计变更需要大量工作，并且会影响到其他测试人员，因此，在你投入大量精力去实现一个在实际中可能相当不切实际的想法之前，值得考虑一下你的提议可能带来的更广泛影响。\n\
  \n我们假设你仍然热衷于添加索引的想法。然后，你需要问自己：要对哪些列建立索引？顺序如何？也许在索引中额外添加一列会对其他查询有帮助。另一件需要考虑的事情是使用一个或多个位图索引的可能性，如果数据是批量加载且之后很少（如果有的话）更新，这并不是一个坏选择。对于窄表，改为使用`索引组织表`也可能是一种选择。\n\
  \n添加索引时最后要考虑的是要压缩多少列（如果有的话）。以清单 5-2 中的表`T2`为例，我们知道被索引的列会重复很多次，因此压缩它似乎是合理的。清单 5-5\
  \ 在`T2.C2`上添加了一个索引，并显示了来自`V$SQL_PLAN_STATISTICS_ALL`的修正后数据。\n\n清单 5-5. 添加压缩索引\n\n\
  ```\nCREATE INDEX t2_i1\n   ON t2 (c2)\n   COMPRESS 1;\n```\n\n```\nActual Object\
  \              Last   Actual\n ID OPERATION          OPTIONS           Time Name\
  \              Starts     Rows\n--- ------------------ -------------- ------- ---------------\
  \ -------- --------\n  0 SELECT STATEMENT                     .004             \
  \           1      400\n  1  HASH JOIN                           .004          \
  \              1      400\n  2   NESTED LOOPS                       .003       \
  \                 1      400\n  3    NESTED LOOPS                      .001    \
  \                    1      400\n  4     STATISTICS COL                   .000 \
  \                       1        1\n  5      INDEX         FULL SCAN         .000\
  \ SYS_IOT_TOP_100        1        1\n  6     INDEX          RANGE SCAN        .001\
  \ T2_I1                  1      400\n  7    TABLE ACCESS    BY INDEX ROWID    .001\
  \ T2                   400      400\n  8   TABLE ACCESS     FULL              .000\
  \ T2                     0        0\n```\n\n哇！我们的查询现在只需几分之一秒就能运行！我们看到，添加索引后，执行计划几乎变得面目全非。关键点在于，我们的全表扫描已被操作\
  \ 7 所取代，该操作仅对`T2`进行了 400 次单块访问。\n\n### 修改环境\n\n如果你的查询似乎已经调优得非常完美，但性能仍然无法接受，那该怎么办？当然，升级硬件总是一个选项，但通常还有远不那么激烈的措施可用。你可以尝试增大缓冲区缓存的大小以减少磁盘读取次数。你可以增大\
  \ PGA 的大小或将`WORAKAREA_SIZE_POLICY`设置为`MANUAL`，以便排序能在内存中完成。我们将在第 17 章详细讨论排序。你可能还想并行运行查询，我们将在第\
  \ 8 章讨论并行执行计划。\n\n### 运行 SQL 调优顾问\n\n一个不幸的事实是，DBA 通常负责大量的应用程序和数据库，但往往在最后一刻、常常是在非工作时段被叫去处理他们几乎没有背景知识的性能问题。在这些情况下，很难像我在此所倡导的那样，为性能问题构建详细的业务和技术背景。\n\
  \n幸运的是，帮助可能近在眼前。`SQL 调优顾问`会对它在数据库中能看到的内容执行自动化检查。它检查统计信息是否过时或具有误导性。它查找列中隐藏的相关性，并进行一些其他基本检查。我相信它的工作方式是运行部分\
  \ SQL 语句，以查看 CBO 的理论想法在实践中效果如何。\n\n关于`SQL 调优顾问`，有好消息也有坏消息。坏消息是，`SQL 调优顾问`无法解决除最基本调优问题之外的所有问题：\n\
  *   它并没有比 CBO 拥有更多的 SQL 转换方法，并且执行与 CBO 相同类型的成本计算，因此它经常得出与 CBO 相同的结论。\n*   它可以推荐一个新索引，但其建议应持保留态度，因为\
  \ CBO 实际上并不创建索引，因此对诸如*聚簇因子*之类的索引统计信息一无所知。\n\n![image](img/sq.jpg) `提示` 当查询涉及临时表时，切勿运行`SQL\
  \ 调优顾问`。在实际应用中，应用程序会在调用查询前填充临时表，但`SQL 调优顾问`不会。因此，生成的建议通常完全错误。\n\n好消息是，虽然`SQL 调优顾问`只能帮助解决最基本的调优问题，但许多调优问题实际上相当基础！正因如此，即使在处理我非常熟悉的应用程序时，我有时也会使用`SQL\
  \ 调优顾问`。当然，现在我通常能立即看到简单调优问题的解决方案，因此我使用`SQL 调优顾问`现在主要限于午餐时间！如果我在准备出去吃饭时遇到一个调优问题，在出发前启动`SQL\
  \ 调优顾问`是相当直接的。有时，等我吃完午餐回来，答案已经在等着我了！\n\n你可以从*企业管理器* (`EM`) 调用`SQL 调优顾问`，但当你登录到`EM`时，你本可以从`SQL*Plus`启动任务然后去吃午餐了。清单\
  \ 5-6 显示了一个你可以使用的通用 SQL 脚本。\n\n清单 5-6. 从 SQL*Plus 创建 SQL 调优顾问任务\n\n```\nVARIABLE\
  \ t VARCHAR2(20)\n\nBEGIN\n   :t := DBMS_SQLTUNE.create_tuning_task (sql_id => '&SQL_ID');\n\
  \   DBMS_SQLTUNE.execute_tuning_task (:t);\nEND;\n/\n\nSET LINES 32767 PAGES 0 TRIMSPOOL\
  \ ON VERIFY OFF LONG 1000000 LONGC 1000000\n\nSELECT DBMS_SQLTUNE.report_tuning_task\
  \ (task_name => :t, TYPE => 'TEXT')\n  FROM DUAL;\n\nEXEC dbms_sqltune.drop_tuning_task(:t);\n\
  SET LINES 200\n```\n\n思路与我之前展示的 SQL 性能监视器脚本相同。你使用`SQL*Plus`的`DEFINE`命令来指定`SQL_ID`，然后调用你保存在某个方便位置的脚本。你看到突出显示的部分`TYPE\
  \ => 'TEXT'`了吗？在这种情况下，唯一支持的类型是`'TEXT'`，因此该脚本不是生成供浏览器查看的`HTML`报告，而是将报告发送到终端。\n\n\
  `DBMS_SQLTUNE.CREATE_TUNING_TASK`过程有几个你可能想查看的选项。例如，分配给调优任务的默认时间是 30 分钟，这常常是不够的。当`SQL\
  \ 调优顾问`达到其时间限制时，所有发生的事情就是它生成一个简短的报告，说明已超时。你可能想增加超时时间，特别是如果你计划吃一顿长午餐的话！\n\n我们要看看`SQL\
  \ 调优顾问`对清单 5-2 中的查询有什么建议吗？请看清单 5-7。\n\n清单 5-7. 删除清单 5-5 中的索引并运行 SQL 调优顾问\n\n```\n\
  DROP INDEX t2_i1;\nDEFINE SQL_ID=cwktrs03rd8c7\n@@run_tuning_advisor\n```\n\n\n\n\
  \n--- 编辑后的输出\n\n## 2- 使用新索引\n\n计划哈希值：3119652813\n\n| 编号 | 操作 | 名称 | 行数 | 字节数 | 时间\
  \ |\n|-----|------|------|------|--------|------|\n| 0 | SELECT STATEMENT | | 333\
  \ | 652K | 00:00:05 |\n| 1 | NESTED LOOPS | | | | |\n| 2 | NESTED LOOPS | | 333\
  \ | 652K | 00:00:05 |\n| 3 | INDEX FULL SCAN | SYS_IOT_TOP_446365 | 1 | 3 | 00:00:01\
  \ |\n|* 4 | INDEX RANGE SCAN | IDX$$_126C0001 | 333 | | 00:00:01 |\n| 5 | TABLE\
  \ ACCESS BY INDEX ROWID | T2 | 333 | 652K | 00:00:05 |\n\nListing 5-7 中的 `@run_tuning_advisor`\
  \ 调用假定 Listing 5-6 中的代码已保存在一个名为 `run_tuning_advisor.sql` 的脚本中。我们可以看到，SQL 优化建议器建议使用我们刚刚删除并且知道其帮助巨大的那个索引。值得庆幸的是，你不必使用\
  \ SQL 优化建议器为该索引起的名字 `IDX$$_126C0001`！\n\n### 重新思考需求\n\n有时，解决方案的成本和复杂性似乎与所要解决的问题完全不成比例。这真的值得投入所有的时间和精力吗？让\
  \ 200 个并行查询从进程全速运行半小时，是否会对系统其他部分产生太大影响？确实有时需要提出这类问题。或许你被要求调优的那个每日报告，可以在系统空闲的周末只运行一次。也许查询可以简化，同时仍能为业务使用者提供完全可用的数据。\n\
  \n尽管在时机合适时不应害怕提出这类问题，但你需要确保在提问前掌握事实。你不希望你的老板让你的同事“再看一下”，然后他或她找到了一个快速的解决方案。那会很尴尬！如果你有任何疑问，何不先与同事一起复核一下你的发现？\n\
  \n## 总结\n\n本章概述了系统化调优 SQL 语句的方法。首先需要尽可能透彻地理解手头的问题。下一步是分解时间消耗在何处。最后，使用迭代的更改和重新测试过程，直到性能达到可接受的水平。\n\
  \n在现阶段，我还没有给你太多关于查询转换的示例，没有关于如何正确使用提示的信息，并且只是非常简要地讨论了物理数据库转换。这些主题都将在本书后面更详细地讨论。\n\
  \n请始终记住，调优是一个实验过程，旨在确定哪里出了问题以及为什么出问题。这与在生产系统中的部署关系不大。现在让我们进入第 6 章的这个主题。\n\n__________________\n\
  \n¹实际上，该操作如此快速的原因，首先是因为从唯一索引进行“一致性获取”实际上并不需要获取闩锁，其次是因为大多数时候没有找到索引条目。\n\n"
- '# 第 6 章


  ![image](img/frontdot.jpg)


  ## 对象统计信息与部署


  本章介绍了本书两个重要主题中的第二个：如何在生产环境中管理 SQL 语句的性能。这无疑是本书中最具争议性的一章，因为一些专家可能不同意我在此表达的观点，特别是当这些观点与
  Oracle 声明的策略背道而驰时。尽管如此，我绝非唯一得出这些结论的人，我所描述的技术已被许多人用于稳定许多 Oracle 数据库的性能。让我们从关于性能管理的一些通用观察开始。


  ### 性能管理的原则


  我相信有一个首要原则适用于所有类型服务的性能。它不一定必须是与数据库相关的服务，甚至不一定在 IT 领域。让我举几个非 IT 相关的例子来把这一点说清楚。


  #### 英国皇家邮政的例子


  大约 20 年前，我听了一位英国皇家邮政员工的餐后演讲。英国皇家邮政是英国的邮政服务，演讲者开始讨论他的雇主对其企业客户进行的一项调查。英国皇家邮政想知道他们的客户是否愿意接受下午
  2:00 的送达时间，或者他们是否愿意为上午 9:00 的送达支付额外费用。客户群体的回应是，英国皇家邮政问错了问题！


  当时，英国皇家邮政的可靠性不是特别好。我对所谓的“一类邮件”的个人经验是，信件大约有 90%的概率会在第二天到达。有 10%的情况邮件至少两天内无法送达。这种服务对业务使用者来说根本没用。假设一家律师事务所将法律文件寄给其在伦敦办公室的员工
  John。John 想与同样在伦敦的律师事务所客户 Jim 讨论这些文件。你能想象 John 可以打电话给 Jim 说，“嘿，Jim，过来聊聊这些法律文件怎么样？我有
  90%的几率到那时已经收到它们了！”这不是业务运作的方式。John 需要一个送达时间的*保证*。如果那个保证的时间是下午 2:00，那么 John 也许能把与
  Jim 的会议安排在下午 3:00。如果 Jim 只有上午有空，那可能需要另一家承运商，但无论 John 使用哪家服务提供商，该服务提供商都必须（套用美国一家包裹服务公司的著名广告语）确保邮件**绝对、肯定、必须**在承诺的任何时间送达。


  当然，在现实生活中，没有*绝对*的保证。总有一些我们无法控制的因素会引入小程度的风险。但如果消费者要容忍这些例外情况，它们就必须非常少。


  #### 机场的例子


  我开车送我成年的儿子 Thomas 去机场，并告诉他我试图解释的性能管理原则。我问他是否能想到第二个大多数人都能理解的例子。我们吃饭时，他有点努力地想找出一个合适的例子。我们吃完饭后，Thomas
  通过了机场安检，我开车回家。大约一小时后，我接到了 Thomas 的电话。他有一个好消息和一个坏消息。坏消息是他错过了他的航班，但好消息是我的书有了第二个例子！


  我曾经是个经常飞行的人，我绝对讨厌在机场浪费时间。我在 Thomas 的航班预定起飞前大约 30 分钟让他去过安检。这应该给他足够的时间，而且他也不会在候机厅困太久。我以为我是个好的“服务提供商”。不幸的是，Thomas
  智能手机上的电子登机牌图像出了问题，他不得不去打印一份纸质副本。等 Thomas 回到安检处时，他的航班已经停止登机了。他向我解释说，优化机场体验以最小化等待时间固然值得赞赏，但下次我必须确保他**绝对、肯定**不能错过航班！


  ### IT 中的服务级别协议




  '
- "# 服务消费者与可预测的性能\n\nIT 服务的消费者与其他任何服务的消费者并无不同。他们想要**保证**。这些保证体现在服务水平协议（SLA）中，这些协议可能是正式文件，也可能是非正式的理解。这些\
  \ SLA 不会写上类似“批处理任务必须在 90%的情况下在一小时内完成”甚至“批处理任务在一个月内的平均完成时间必须少于一小时”这样的话。这类性能指标对任何服务消费者都毫无用处。不，SLA\
  \ 总是表述为体现这种情绪：批处理任务“绝对、必须在一小时内完成”。\n\n在绝大多数情况下，消费者并不关心一小时的批处理任务是在 15 分钟还是 59 分钟内完成，就像你不会关心你的信件是在凌晨\
  \ 4:30 送达一样。IT 服务的商业消费者极少会打电话给在家的员工说：“嘿，隔夜批处理提前完成了，为什么不赶早班车提前开始工作呢？”服务消费者根据保证的性能水平制定计划，通常无法利用更高水平的性能（如果它们偶然出现）。\n\
  \n当然，一小时批处理任务的**服务提供者**对 15 分钟和 59 分钟运行时间的差异非常关注。前者有充足的应急时间来处理意外事件，而后者则完全没有。尽管如此，消费者的需求是第一位的，只有在建立了可预测的性能概况后，才能努力减少批处理的耗时。\n\
  \n## 非数据库部署策略\n\n鉴于服务消费者的要求，IT 行业已经建立了一些技术，用以确保 IT 服务的功能和性能水平是可预测的。目前存在多种软件开发方法，但它们都有几个共同的属性：\n\
  \n*   在交付给一般用途消费之前，新功能会以某种方式进行测试，以提供信心，证明软件功能正确且性能水平令人满意。\n*   涉及生产服务的软件或关键配置数据的变更，会以某种方式进行控制以最小化风险。通常，这些控制涉及测试、影响分析、授权和审计的某种组合。\n\
  \n所有这些流程和程序都是为了做一件基本的事情；它们是为了让消费者绝对、肯定地获得他们所承诺的服务。当然，我们并不总是成功，但这至少是我们的目标。\n\n##\
  \ CBO 的战略方向\n\n到目前为止，我一直在谈论向消费者交付服务。我详细地谈了这一点，并刻意避免提及数据库性能。正如你可能已经猜到的，所有这些铺垫是因为，在我看来，Oracle，特别是\
  \ CBO 开发团队所遵循的战略，并未反映出可预测服务交付的基本要求。\n\n### 战略特性的历史\n\nCBO 在 Oracle 7 中作为一个可选特性被引入。你不必使用它，我们大多数人也确实没有使用。其采用缓慢有两个原因。一些客户担心，像任何重大的新特性一样，CBO\
  \ 起初可能工作得不好。他们说得有道理。采用缓慢的第二个原因是，CBO 在设计上就是不可预测的。你可能今天得到一个执行计划，然后在收集了对象统计信息后，你可能会得到一个完全不同的执行计划，这个计划可能工作得一样好，也可能不好。\n\
  \n旧的基于规则的优化器（RBO）的一个关键点是，相同的语句每次都会产生相同的执行计划。而 CBO 在设计上是**可适应的**。CBO 每次都试图获得最优的执行计划，如果对象统计信息表明数据已经改变，那么\
  \ CBO 会很乐意考虑一个新的执行计划。\n\n尽管客户从一开始并持续至今都在提出对可预测性的担忧，但 CBO 的战略方向仍然基于适应性。动态采样和绑定变量窥探等特性开始出现。当\
  \ 11g 到来时，很明显 CBO 团队正朝着更加适应和更不可预测的行为迈进。这些信号以 11gR1 中的**自适应游标共享**和 11gR2 中的**基数反馈**的形式出现。自适应游标共享和基数反馈都可能导致为语句第一次执行选择的执行计划在第二次及后续执行时被“升级”，即使对象统计信息没有改变！通常，这些改变是为了变得更好，但并没有**保证**。\n\
  \n好像这还不够糟糕，12cR1 引入了**自适应执行计划**。这个特性可能导致一个语句的执行计划在中途改变！我们不想要这些特性！\n\n*   在测试系统上，我们不想要这些特性，因为它们可能掩盖会影响生产服务的问题。\n\
  *   在生产系统上，我们不想要这些特性，因为无论 CBO 怎么想，我们已经测试过的执行计划是令人满意的；我们不想冒险使用未经测试的、可能导致性能下降的计划。\n\
  \n### CBO 战略的影响\n\n既然我们知道了 CBO 开发团队的战略是什么，现在让我们看看它对我们意味着什么。我将通过两位著名 Oracle 专家：Connor\
  \ McDonald 和 Dave Ensor 的评论来探讨这一点。\n\n**Connor McDonald 的观点**\n\n如果你问谁是 Oracle 数据库技术方面知识最渊博的专家，你可能会很快发现自己陷入一场争论。有时甚至是相当激烈的争论！然而，世界上最具娱乐性的\
  \ Oracle 演讲者肯定是 Connor McDonald。如果你提出另一个名字，你可能没听过 Connor 的演讲！哦，以防你好奇，Connor 对 Oracle\
  \ 数据库技术也略知一二！\n\n我有幸只听过 Connor 演讲两次，在第一次演讲中，他讨论了一个话题，正好是我们本章讨论问题的核心。Connor 以对软件程序的一个非常简单的修改建议开始了他的演示。一个下拉列表有两个条目：“MALE”和“Female”。“MALE”全是大写字母，但“Female”只有首字母大写。一位开发者希望通过将“MALE”改为“Male”来纠正这一点。需要做什么？嗯，Connor\
  \ 列举了一长串虚构开发者可能需要完成的任务：编写商业案例、获得商业案例批准、生成测试计划、进行单元测试、子系统测试和系统测试、记录测试结果、通过质量保证审查……这个列表没完没了。在此期间，Connor\
  \ 的笔记本电脑不断弹出会议、文档和各种其他事物的图片，为了不破坏你观看他演讲的乐趣，我就不一一提及了！当 Connor 讲完他的列表时，我和大多数听众一样，笑得相当大声。毕竟，我们大多数人都曾在某个时刻经历过类似的事情！\n\
  \n\n\nConnor 随后的演讲则采取了不同的思路。他提出了一个虚构的服务影响事件及其后续的复盘分析。该事件由一个变更的执行计划引起，而执行计划的变更又源于对象统计信息的变化。什么！一个导致事件的变化！这个变更经过授权了吗？有变更记录吗？该追究谁的责任？\n\
  \n当然，这个虚构的执行计划变更是由一个显式运行的、用于收集统计信息的作业引起的。没有授权，没有影响分析，没有测试，什么都没有。Connor 提出了一个非常合理的问题：为何\
  \ IT 组织总是会贸然引发未经测试的执行计划变更来影响他们的数据库系统，与此同时，却将大多数其他类型的变更置于最严格的审查之下。在 Connor 看来，这个世界简直疯了。我深表同意！\n\
  \n## **戴夫·恩索尔悖论**\n\n如果说**康纳·麦克唐纳**是世界上最有趣的 Oracle 演讲者，那么我会把“最令人难忘的精辟言论”奖颁给**戴夫·恩索尔**！我不知道戴夫最初是在何时何地说出“唯一安全收集统计信息的时候就是收集它也不会改变什么的时候”这句话的。无论他是在何时何地说出这句如今闻名于世（或者说声名狼藉）的话，它现在已被全球业界称为“戴夫·恩索尔悖论”。\n\
  \n我必须立刻指出，戴夫的断言完全是错误的，我相信戴夫本人也会第一个承认这一点。然而，他的“悖论”中有两个引人深思的方面值得讨论。第一个方面是他原始断言的依据。\n\
  \n当你收集统计信息时，你的 SQL 语句的执行计划可能会发生两种情况。第一种情况是**什么都没发生**；基于新统计信息的执行计划与上次语句运行时使用的执行计划完全一致。既然没有任何变化，你显然没有造成任何损害。第二种情况是**执行计划发生了变化**。我们无法确定新计划在实际中会如何表现，因此当结果是后者时，收集统计信息就不安全了。这是一个有力的论点。\n\
  \n戴夫·恩索尔悖论的第二个有趣之处在于其论证中存在的致命缺陷。我们很快就会谈到这一点。\n\n## **为何我们需要收集统计信息**\n\n如果收集统计信息是一项如此危险的活动，正如康纳和戴夫所暗示的那样，那我们到底为什么还要做呢？清单\
  \ 6-1 对此有所揭示：\n\n**清单 6-1. 时间如何改变执行计划，第 1 部分**\n\n```\nSET LINES 2000 PAGES 0\n\n\
  CREATE TABLE t3\n(\n   c1\n  ,c2\n  ,c3\n)\nPCTFREE 99\nPCTUSED 1\nAS\n       SELECT\
  \ ROWNUM, DATE '2012-04-01' + MOD (ROWNUM, 2), RPAD ('X', 2000) c3\n         FROM\
  \ DUAL\n   CONNECT BY LEVEL <= 1000;\n\nCREATE INDEX t3_i1\n   ON t3 (c2);\n\nEXPLAIN\
  \ PLAN\n   FOR\n      SELECT *\n        FROM t3\n       WHERE t3.c2 = TO_DATE (\
  \ :b1, 'DD-MON-YYYY');\n\nSELECT * FROM TABLE (DBMS_XPLAN.display);\n\nVARIABLE\
  \ b1 VARCHAR2(11)\nEXEC :b1 := '01-APR-2012';\n\nBEGIN\n   FOR r IN (SELECT *\n\
  \               FROM t3\n              WHERE t3.c2 = TO_DATE ( :b1, 'DD-MON-YYYY'))\n\
  \   LOOP\n      NULL;\n   END LOOP;\nEND;\n/\n\nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor\
  \ (sql_id => 'dgcvn46zatdqr'));\n```\n\n清单 6-1 首先创建了表 `T3`，其中包含一个 `DATE` 类型的列。表\
  \ `T3` 填充了 2012 年 4 月的日期数据，在 12cR1 及更高版本中，将自动为该表和索引隐式收集统计信息。然后，我们使用 `DBMS_XPLAN.DISPLAY`\
  \ 查看 `EXPLAIN PLAN` 语句的结果，并使用 `DBMS_XPLAN.DISPLAY_CURSOR` 查看运行时实际使用的执行计划。清单 6-2\
  \ 展示了实验结果。\n\n**清单 6-2. 时间如何改变执行计划，第 2 部分**\n\n```\nPlan hash value: 4161002650\n\
  \n| Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n\
  |   0 | SELECT STATEMENT  |      |       |       |   272 (100)|          |\n|* \
  \ 1 |  TABLE ACCESS FULL| T3   |   500 |   982K|   272   (0)| 00:00:01 |\n\nPredicate\
  \ Information (identified by operation id):\n\n1 - filter(\"T3\".\"C2\"=TO_DATE(:B1,'DD-MON-YYYY'))\n\
  \nSQL_ID  dgcvn46zatdqr, child number 0\n\nSELECT * FROM T3 WHERE T3.C2 = TO_DATE\
  \ ( :B1, 'DD-MON-YYYY')\n\nPlan hash value: 4161002650\n\n| Id  | Operation    \
  \     | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
  \  |      |       |       |   272 (100)|          |\n|*  1 |  TABLE ACCESS FULL|\
  \ T3   |   500 |   982K|   272   (0)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - filter(\"T3\".\"C2\"=TO_DATE(:B1,'DD-MON-YYYY'))\n```\n\
  \n两次 `DBMS_XPLAN` 调用的输出都显示了完全相同的执行计划。这很好。现在，让我们假设一段时间过去了。清单 6-3 是我尝试模拟从 2012 年 4\
  \ 月到 2014 年 4 月这段时间流逝的方式。\n\n**清单 6-3. 时间如何改变执行计划，第 3 部分**\n\n```\nALTER SYSTEM\
  \ FLUSH SHARED_POOL;\n\nDELETE FROM t3;\n\nINSERT INTO t3 (c1, c2,c3)\n       SELECT\
  \ ROWNUM, DATE '2014-04-01' + MOD (ROWNUM, 2),rpad('X',2000)\n         FROM DUAL\n\
  \   CONNECT BY LEVEL <= 1000;\n\nEXPLAIN PLAN\n   FOR\n      SELECT *\n        FROM\
  \ t3\n       WHERE t3.c2 = TO_DATE ( :b1, 'DD-MON-YYYY');\n\nSELECT * FROM TABLE\
  \ (DBMS_XPLAN.display);\n\nVARIABLE b1 VARCHAR2(11)\nEXEC :b1 := '01-APR-2014';\n\
  \nBEGIN\n   FOR r IN (SELECT *\n               FROM t3\n              WHERE t3.c2\
  \ = TO_DATE ( :b1, 'DD-MON-YYYY'))\n   LOOP\n      NULL;\n   END LOOP;\nEND;\n/\n\
  \nSELECT * FROM TABLE (DBMS_XPLAN.display_cursor (sql_id => 'dgcvn46zatdqr'));\n\
  ```\n\n我在这里做的是：\n*   刷新共享池，以模拟该语句从游标缓存中老化\n*   虽然非必需，但用 2014 年 4 月的数据替换表中的数据\n*\
  \   重新执行 `EXPLAIN PLAN` 语句\n*   重新执行 `DBMS_XPLAN.DISPLAY` 调用\n*   重新执行语句，检索 2014\
  \ 年 4 月的数据\n*   重新执行 `DBMS_XPLAN.DISPLAY_CURSOR` 语句\n\n清单 6-4 展示了这第二次实验的结果。\n\n\
  **清单 6-4. 时间如何改变执行计划，第 4 部分**\n\n```\nPlan hash value: 4161002650\n\n| Id  | Operation\
  \         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
  \  |      |   500 |   982K|   272   (0)| 00:00:01 |\n|*  1 |  TABLE ACCESS FULL|\
  \ T3   |   500 |   982K|   272   (0)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - filter(\"T3\".\"C2\"=TO_DATE(:B1,'DD-MON-YYYY'))\n\n\
  SQL_ID  dgcvn46zatdqr, child number 0\n\nSELECT * FROM T3 WHERE T3.C2 = TO_DATE\
  \ ( :B1, 'DD-MON-YYYY')\n\nPlan hash value: 3225921897\n\n| Id  | Operation    \
  \                       | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n| \
  \  0 | SELECT STATEMENT                    |       |       |       |     2 (100)|\
  \          |\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| T3    |     1 |  2013\
  \ |     2   (0)| 00:00:01 |\n|*  2 |   INDEX RANGE SCAN                  | T3_I1\
  \ |     1 |       |     1   (0)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n\n2 - access(\"T3\".\"C2\"=TO_DATE(:B1,'DD-MON-YYYY'))\n```\n\
  \n\n\n我们可以看到，虽然 `EXPLAIN PLAN` 的输出没有变化，但运行时实际使用的执行计划却完全改变了！愚人节快乐！执行计划之所以发生变化，是因为对象统计信息——特别是\
  \ `T3.C2` 列的列统计信息——包含了我称之为*时间敏感数据*的信息。`LOW_VALUE` 和 `HIGH_VALUE` 统计信息记录了收集统计信息时列的最小值和最大值。两年后当我们再次执行语句时，CBO\
  \ 经历了以下比喻性的思考过程：“如果上次收集统计信息时 `T3.C2` 的最大值是 2012 年 4 月 30 日，而现在为绑定变量 `B1` 指定的值是 2014\
  \ 年 4 月 1 日，那么从 `T3` 中选择的行数几乎肯定是零”。这种逻辑的依据是什么？CBO 假设我们指定了一个未来的日期，并且统计信息是当前的，而不是更可能的情况——日期是最近过去的某个时间点，统计信息已经过时。让我们看看当我们重新收集统计信息时会发生什么。\n\
  \n## 清单 6-5. 时间如何改变执行计划，第 5 部分\n\n```\nBEGIN\n   DBMS_STATS.gather_table_stats (SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n                                 ,'T3'\n      \
  \                           ,no_invalidate   => FALSE);\nEND;\n/\n\nBEGIN\n   FOR\
  \ r IN (SELECT *\n               FROM t3\n              WHERE t3.c2 = TO_DATE (\
  \ :b1, 'DD-MON-YYYY'))\n   LOOP\n      NULL;\n   END LOOP;\nEND;\n/\n\nSELECT *\
  \ FROM TABLE (DBMS_XPLAN.display_cursor (sql_id => 'dgcvn46zatdqr'));\nSQL_ID  dgcvn46zatdqr,\
  \ child number 0\n\nSELECT * FROM T3 WHERE T3.C2 = TO_DATE ( :B1, 'DD-MON-YYYY')\n\
  \nPlan hash value: 3225921897\n\n| Id  | Operation                           | Name\
  \  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT       \
  \             |       |       |       |     1 (100)|          |\n|   1 |  TABLE\
  \ ACCESS BY INDEX ROWID BATCHED| T3    |     1 |  2013 |     1   (0)| 00:00:01 |\n\
  |*  2 |   INDEX RANGE SCAN                  | T3_I1 |     1 |       |     1   (0)|\
  \ 00:00:01 |\n\nPredicate Information (identified by operation id):\n\n2 - access(\"\
  T3\".\"C2\"=TO_DATE(:B1,'DD-MON-YYYY'))\n```\n\n我们可以看到，在重新收集统计信息，从而更新了 `LOW_VALUE`\
  \ 和 `HIGH_VALUE` 列统计信息之后，我们的语句在运行时使用的执行计划突然恢复为最初的那个。\n\n这个实验得出了一个惊人的结论。接下来的这句话是本书中最重要的一句。\n\
  \n我们在生产系统上收集统计信息的原因是为了**防止**执行计划发生变化，而不是为了确保执行计划**发生**变化。\n\n让我们暂停一下，思考一下这句话的巨大含义。现在可以看出\
  \ Dave Ensor 悖论中的缺陷了。有时，收集统计信息所带来的“差异”是为了阻止一个原本会发生的执行计划变更！因此，Dave Ensor 悖论的正确版本应该是：\n\
  \n> 收集统计信息唯一安全的时刻，是当这样做不会导致执行计划与上次 SQL 语句运行时相比产生任何变化。\n\n听起来就不那么顺耳了，对吧？我们现在的处境似乎很绝望。一方面，如果我们在生产系统上不收集统计信息，那么迟早——就像鸡蛋注定会孵出小鸡一样——执行计划会发生变化，而且几乎肯定会变得更糟。另一方面，如果我们真的收集统计信息，那就像在玩俄罗斯轮盘赌；迟早某个表、列或索引统计信息的某种变化会导致一个不期望的执行计划变更，从而引发影响服务的事故。我们该怎么办？在回答这个问题之前，我们还需要理清一两件事。\n\
  \n## 我们需要多久改变一次执行计划？\n\nConnor McDonald 和 Dave Ensor 都隐含地假设：可预测的性能来自于不变的执行计划。这真的正确吗？如果我们的数据库在增长，表的大小发生变化，难道我们不需要在某个时间点改变我们语句的执行计划吗？Wolfgang\
  \ Breitling 可以帮助我们回答这个问题。\n\n## Wolfgang Breitling 的基于基数反馈的调优\n\n2006 年，Wolfgang\
  \ Breitling 发表了一篇题为“基于基数反馈的调优 (Tuning by Cardinality Feedback, TCF)”的论文。你可以在这里找到他的论文：`http://www.centrexcc.com/Tuning%20by%20Cardinality%20Feedback.pdf`。这篇论文可能是迄今为止对\
  \ Oracle SQL 调优科学的最大单一贡献。\n\n![image](img/sq.jpg) **注意** 我需要指出，我之前提到的 11gR2 基数反馈功能与\
  \ Wolfgang 的论文绝对没有任何关系。不过，我想 Wolfgang 对 Oracle 似乎用他的发明来命名一个功能感到暗自高兴！\n\n简而言之，Wolfgang\
  \ 的论点如下：\n\n*   如果 CBO 能够正确确定执行计划中操作的基数，那么 CBO 将得出最优的执行计划。\n*   当 CBO 产生的执行计划比最佳可能计划运行得慢很多时，是因为一个或多个基数估计值偏离了*好几个数量级*；偏离两倍或三倍的基数估计可能导致错过最优执行计划，但所选计划的性能几乎与最优计划相当。\n\
  *   要确定一条语句的最优执行计划，我们只需为 CBO 提供正确的基数估计，剩下的 CBO 会处理好。\n\n虽然这些说法并不总是成立，但在大多数情况下是正确的！现在，Wolfgang\
  \ 的论文是关于 SQL 调优的，所以我在专门讨论对象统计信息和部署的章节中提到它可能显得有些奇怪。我之所以这样做，是因为 TCF 推论。\n\n## TCF\
  \ 推论\n\n让我们假设执行计划中的一个操作实际返回 10,000 行。TCF 说的是，如果 CBO 估计值是 5,000 或 20,000，那么无需担心；CBO\
  \ 选择的计划会是合理的。只有当 CBO 估计值低于 100 或高于 1,000,000 时，CBO 才可能得出一个性能非常差的计划。\n\n这个论点的推论是，如果一个表的大小翻倍或翻三倍，则不需要改变执行计划。假设我们为一个有\
  \ 10,000 行的表收集了统计信息，CBO 根据准确的基数估计 10,000 得出了一个计划。现在假设表增长到 20,000 行。TCF 说，当 CBO 使用基于（现在不准确的）基数估计\
  \ 10,000 的计划时，它仍然可以正常工作！这是理论。理论在实践中并不总是有效，但在这个情况下，我很高兴地报告它确实有效！\n\n让我澄清一点。假设我们有一条\
  \ SQL 语句连接了 `T1` 和 `T2`，然后对结果进行聚合。一方面，如果 `T1` 和 `T2` 的大小都翻倍了，那么这条 SQL 语句几乎肯定会运行得更慢。另一方面，通过改变执行计划来避免这种耗时增加是不太可能的；无论最初的最优执行计划是什么，在表大小增加后它很可能仍然是最优的，或接近最优。\n\
  \n\n\n在**绝大多数**现实案例中，数据库表通常不会频繁地增长（或缩减）100 倍或 1000 倍；我们可能多年都使用同一套执行计划，而不会出现任何与执行计划相关的性能问题！此原则的主要例外是将空表部署到生产环境后其数据快速增长的情况，例如我在第\
  \ 5 章中提到的`AUDIT_TRAIL`表。本章稍后，在理清主要原则后，我们将处理这个例外。\n\n## 并发执行计划\n\n我们现在已确定，如果一个执行计划某天运行良好，那么第二天它很可能也会运行良好。但是，对于每条\
  \ SQL 语句，我们是否总能始终只依赖一个执行计划？让我们看几个似乎表明我们无法这样做的案例。\n\n## 偏斜数据与直方图\n\n许多数据库表包含偏斜数据。我指的是，某一列中有限数量的数值出现频率非常高，而其他数值的出现频率则低得多。假设贵公司\
  \ 60%的业务是与一家名为 AJAX 的公司进行的，其余 40%的业务是与其他 100 家客户（包括 ACME）进行的。从表中选择 AJAX 所有交易的查询很可能最适合采用全表扫描。另一方面，选择\
  \ ACME 所有交易的查询可能更适合使用索引，因为只有大约 0.4%的交易会被选中。为了使 CBO 能够区分 AJAX 客户与其他所有客户，可以使用`直方图`。\n\
  \n这里需要认识到的主要点是，绑定变量和直方图应被视为**互斥的**。如果你使用绑定变量的一个值（例如我的示例中的 AJAX）来解析语句，那么当使用该绑定变量的其他值（例如\
  \ ACME）时，可能会应用该执行计划。为了防止这种情况，你应该确保为你需要的每个执行计划使用不同的`SQL_ID`。清单 6-6 展示了如何实现这一点：\n\n\
  ### 清单 6-6. 使用多个 SQL_ID 以支持多个执行计划\n\n```\nCREATE OR REPLACE PROCEDURE listing_6_6\
  \ (p_cust_last_name VARCHAR2)\nIS\n   cnt   NUMBER;\nBEGIN\n   IF p_cust_last_name\
  \ ='AJAX'\n   THEN\n      SELECT COUNT (*)\n        INTO cnt\n        FROM sh.sales\
  \ s JOIN sh.customers c USING (cust_id)\n       WHERE c.cust_last_name = 'AJAX';\
  \ -- 为 AJAX 使用一个执行计划\n   ELSE\n      SELECT COUNT (*)\n        INTO cnt\n      \
  \  FROM sh.sales s JOIN sh.customers c USING (cust_id)\n       WHERE c.cust_last_name\
  \ = p_cust_last_name; -- 为其他所有人使用另一个执行计划\n   END IF;\nEND listing_6_6;\n/\n```\n\
  \n上面的过程不执行任何实际操作，但展示了使用直方图时正确的编码方式。PL/SQL 过程中的两条 SQL 语句将具有不同的`SQL_ID`，因此，两个不同的执行计划可以同时保存在游标缓存中。\n\
  \n在 11gR1 中，Oracle 引入了自适应游标共享，它允许具有相同`SQL_ID`的两个或多个执行计划保存在游标缓存中。这可能会让你认为清单 6-6 中展示的复杂性不再需要。自适应游标共享的问题在于，一条\
  \ SQL 语句必须先至少**执行**得不好一次，才会考虑备选执行计划。如果你希望**每次**都能获得高性能的 SQL，那么你仍然需要使用具有独立`SQL_ID`的独立\
  \ SQL 语句。\n\n## 工作负载变化\n\n我还遇到过另一种情况，显然需要为同一条 SQL 语句使用多个执行计划。让我解释一下这个**极其罕见**的场景。\n\
  \n我当时在处理一个 ETL 流程，该流程将数据从远程数据库中的一张表`R1`加载到一张全局临时表`TEMP1`中。然后，使用一条`INSERT`语句将`TEMP1`与永久表`T1`连接，再将连接后的数据加载到`T2`中。该\
  \ ETL 流程有两种操作模式，有趣之处正在于此。\n\nETL 流程的正常操作模式称为`增量`。只有`R1`中更改的数据被加载到`TEMP1`中。`增量`加载每\
  \ 15 分钟运行一次，加载到`TEMP1`的行数从零到几十行不等。第二种操作模式是`完全`。`完全`加载仅在特殊条件下执行，涉及将`全部`行从`R1`加载到`TEMP1`中。一次`完全`加载会向`TEMP1`添加数百万行，但无论是`增量`还是`完全`加载，都使用相同的`INSERT`语句将数据插入`T2`。\n\
  \n根据为`TEMP1`设置的统计信息或动态采样的结果，CBO 可能会选择两种可能的执行计划。第一种计划涉及由`TEMP1`驱动的`嵌套循环`连接，这对`增量`加载运行良好。不幸的是，当`完全`加载使用`嵌套循环`计划时，ETL\
  \ 过程需要大约两天时间！备选执行计划是使用`哈希连接`。使用此计划进行`完全`加载时，它能在几小时内完成，考虑到其不常使用，这已经非常令人满意。不幸的是，当`哈希连接`用于`增量`加载时，该过程需要大约一小时，这对于设计为每\
  \ 15 分钟运行一次的过程来说非常不合适！\n\n现在，正如你可以想象的那样，`完全`加载和`增量`加载**从**不会同时运行，但它们偶尔会在几分钟内相继运行，因此我们偶尔会观察到相同的执行计划被用于不同的模式。我们本可以结合使用共享池刷新、动态采样和统计信息操作来解决这个问题，但依赖操作人员遵循文档是一个应尽可能避免的风险。清单\
  \ 6-7 向你展示了我们在实践中所做的事情。\n\n### 清单 6-7. 使用提示创建多个 SQL_ID\n\n```\nCREATE OR REPLACE\
  \ PROCEDURE listing_6_7 (load_mode VARCHAR2)\nIS\nBEGIN\n   IF load_mode = 'INCREMENTAL'\n\
  \   THEN\n      INSERT INTO t3 (c1, c2)\n         SELECT /*+ leading(temp1) use_nl(t3)\
  \ */\n               temp1.c3, t3.c2\n           FROM temp1, t3\n          WHERE\
  \ temp1.c1 = t3.c1;\n   ELSE -- FULL\n      INSERT INTO t3 (c1, c2)\n         SELECT\
  \ /*+ leading(t3) use_hash(temp1) no_swap_join_inputs(temp1) */\n              \
  \ temp1.c3, t3.c2\n           FROM temp1, t3\n          WHERE temp1.c1 = t3.c1;\n\
  \   END IF;\nEND listing_6_7;\n/\n```\n\n从代码的高亮部分可以看到，我们使用了优化器提示。现在不必担心这些提示的具体含义。此阶段的关键点是，这些提示起到了三个作用：\n\
  \n*   由于两条语句的`SQL_ID`现在不同了，来自`完全`加载的游标缓存中的执行计划不会被用于`增量`加载，反之亦然。\n*   提示指示 CBO 使用哪个执行计划。在我们理清问题的其余细节时，我们知道每种情况需要什么计划，因此无需冒险让\
  \ CBO 出错。\n*   这些提示提供了有用的文档说明，让后来者能够理解为何使用如此晦涩的逻辑。当然，代码中也添加了几段解释性注释。\n\n\n\n在过去的几年里，我接触过大量基于\
  \ Oracle 技术的应用程序，其中每一个都可能包含数万条 SQL 语句。在那段时间里，我只遇到过一条确实需要这种特殊处理的 SQL 语句！不过，它确实是一个非常好的教学案例。\n\
  \n## 并发执行计划总结\n\n似乎确实存在一些特殊情况，对于同一条 SQL 语句，需要不同的执行计划来应对所访问数据的变化。无论幸运与否，我们确保在不同场景下使用不同执行计划的唯一方法，就是重新编写我们的应用程序，以便在每种场景下使用具有不同\
  \ `SQL_ID` 的不同 SQL 语句。好消息是，一旦接受了这个现实，我们就有了一个可以自我实现的预言，并可以据此制定策略：每条 SQL 语句我们只需要一个执行计划！\n\
  \n## Oracle 的计划稳定性特性\n\n尽管 CBO（基于成本的优化器）策略的核心是适应性，但 Oracle 和其他任何公司一样，必须采取一些措施来满足其最大且最直言不讳的客户的需求。以下是\
  \ Oracle 为应对客户对可预测性的关切而采取的战术性计划稳定性措施。\n\n### 存储概要\n\n对客户关于稳定执行计划需求的第一个回应是在 8i 版本中引入了存储概要。粗略地说，存储概要涉及一个执行计划的存储库，每个\
  \ SQL 语句对应一个计划。该存储库保存在 `OUTLN` 方案的表中。存储概要有一些缺点，但两个关键缺点是：\n\n*   无法确定哪些存储概要不再需要，因为它们引用的\
  \ SQL 语句已被更改或删除。\n*   更致命的是，无法确定应用程序中哪些语句缺少存储概要。\n\n### SQL 配置文件\n\nSQL 配置文件出现在\
  \ 10g 版本中，与 `SQL 调优顾问` 紧密相关。尽管我在 Listing 5-7 中给出的例子涉及创建新索引，但大多数 `SQL 调优顾问` 的建议都与基数错误有关，通常只涉及采用不同的执行计划。为了启用新的执行计划，你需要“接受”\
  \ `SQL 调优顾问` 为你创建的 SQL 配置文件。由于 SQL 配置文件会覆盖 CBO 原本会使用的执行计划，我们大多数人最初认为 SQL 配置文件是某种计划稳定性的方案。但它们并不是！即使你接受了\
  \ SQL 配置文件，下次收集统计信息时，那个原始的、性能不佳的计划可能又会出现！你甚至可能得到一个性能未知的第三种计划。\n\nSQL 配置文件实际上是为了改进\
  \ CBO 的猜测，而不是为了消除猜测。SQL 配置文件不是 CBO 战略方向的一部分，也不提供计划稳定性。SQL 配置文件处于两难境地，CBO 团队已向我们保证，未来不会对\
  \ SQL 配置文件进行大量投入。\n\n### SQL 计划基线\n\nSQL 计划基线在 11gR1 版本中伴随着一片混乱出现。简单来说，SQL 计划基线是存储概要的直接替代品。一个明显的改进，至少从安全角度来看，是执行计划的存储库现在保存在数据字典中，而不是保存在一个可能泄露密码的方案里。\n\
  \nSQL 计划基线相当易于使用，许多客户正在成功地使用它们。然而，它们存在与存储概要相同的主要缺点，即你无法将执行计划存储库与应用程序中的语句进行核对。在其他大多数重要方面，SQL\
  \ 计划基线具有与存储概要相同的优点和缺点。\n\n混淆出现在许可证方面。直到发布前夕，SQL 计划基线还计划成为一个收费功能。事实上，包括我在内的许多参加过\
  \ Oracle 大学 11g 新特性课程的学生都被错误地告知，SQL 计划基线需要 `调优包`。实际上，SQL 计划基线功能中唯一需要许可证的部分叫做 `计划演进`，这是一个允许执行计划更改的功能！即便如此，许可证也仅当\
  \ `计划演进` 由 `SQL 调优顾问` 执行时才需要。因此，我们免费得到了我们想要的东西（稳定性部分），而必须为不想要的东西（适应性部分）付费。难怪 Oracle\
  \ 员工对此都感到困惑！\n\n## 介绍 TSTATS\n\nTSTATS 是一种用于管理性能的部署方法，它使我们能够充分利用 CBO 最好的方面，同时防止它随意更改执行计划。不涉及执行计划的存储库，因此没有核对问题，也不涉及使用隐藏初始化参数或其他不支持的功能。\n\
  \n## 致谢\n\nTSTATS 这个名字代表“托尼的统计信息”，是我的客户发明的名字，用来指代我当时成功说服他们采纳的方法。虽然这个名字满足了我的虚荣心，但如果我说\
  \ TSTATS 完全是我的发明，那就错了。在前言中，我详细介绍了 TSTATS 的历史，并对 Jonathan Lewis 和 Wolfgang Breitling\
  \ 表示了感谢。然而，最大的贡献来自 Adrian Billington，他提出的从对象统计信息中删除基于时间数据的想法是 TSTATS 的核心。现在让我们来探讨这一点。\n\
  \n## 调整列统计信息\n\n如果 CBO 缺乏可预测性是基于时间敏感的数据，换句话说，是仅在有限时间段内有效的统计信息，那么我们为什么不直接删除那些统计信息呢？事实证明，尽管有几个原因表明从对象统计信息中删除时间敏感数据可能不是个好主意（我们将在\
  \ 第 20 章 中讨论这些），但在大多数情况下，我们可以放心地这样做。你无法通过更新列统计信息来移除 `LOW_VALUE` 和 `HIGH_VALUE` 统计信息，并且出于我无法理解的原因，这多年来一直是我思维上的一个障碍。这个问题的解决方案（事后看来显而易见）是删除列统计信息，然后重新插入它们，并去掉时间敏感的部分！Listing\
  \ 6-8 展示了如何做到这一点。\n\nListing 6-8. 使用 `DBMS_STATS` 更新列统计信息\n\n```sql\nDECLARE\n \
  \  distcnt   NUMBER;\n   density   NUMBER;\n   nullcnt   NUMBER;\n   srec      DBMS_STATS.statrec;\n\
  \   avgclen   NUMBER;\nBEGIN\n   DBMS_STATS.get_column_stats (\n      ownname  \
  \ => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   => 'T3'\n     ,colname\
  \   => 'C2'\n     ,distcnt   => distcnt\n     ,density   => density\n     ,nullcnt\
  \   => nullcnt\n     ,srec      => srec\n     ,avgclen   => avgclen);\n\n   DBMS_STATS.delete_column_stats\
  \ (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'T3'\n     ,colname   => 'C2');\n\n   DBMS_STATS.set_column_stats (\n   \
  \   ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   => 'T3'\n\
  \     ,colname   => 'C2'\n     ,distcnt   => distcnt\n     ,density   => density\n\
  \     ,nullcnt   => nullcnt\n     ,srec      => NULL\n     ,avgclen   => avgclen);\n\
  END;\n/\n```\n\nListing 6-8 操作了 `T3.C2`，关键点是加亮的那一行。`SREC` 结构保存着本应存入 `LOW_VALUE`\
  \ 和 `HIGH_VALUE` 统计信息的数据，在重新插入统计信息时省略了此结构。\n\n\n\n一旦完成这些更改并刷新共享池，无论你提供什么日期，`清单 6-1`\
  \ 至 `6-5` 中使用的示例语句都将使用全表扫描！此外，在删除了时间敏感的统计数据后，成本和基数的计算结果将与删除前针对当代日期的计算结果相同。\n\n##\
  \ TSTATS 简述\n\n`TSTATS` 的核心思想是从对象统计信息中移除时间敏感数据。基于此理念，可以应用以下流程要点：\n\n1.  在选定的“主”测试系统上收集统计信息。\n\
  2.  为所有全局临时表伪造统计信息。\n3.  从对象统计信息中移除时间敏感数据。\n4.  在主测试系统上进行初始性能测试，并根据需要进行调整。\n5. \
  \ 将统计信息复制到所有其他测试系统，并最终复制到生产环境。\n6.  在所有系统上锁定应用程序模式的对象统计信息。\n7.  在所有系统上删除所有针对应用程序模式的统计信息收集作业。\n\
  8.  `TSTATS` 仅适用于应用程序模式，因此任何收集字典统计信息的作业均不受影响。\n\n遵循这些步骤并采取一些其他预防措施，你可以确保所有测试系统上的执行计划与生产系统相匹配，并且相同的\
  \ SQL 语句将永远具有相同的执行计划，或者至少在你决定改变之前是如此！\n\n这个方法听起来熟悉吗？它应该熟悉；这是部署软件、DML 和配置更改的标准方法。你为软件和\
  \ DML 建立的任何变更控制程序都应应用于对象统计信息。通常，你会将软件、DML 和对象统计信息作为发布的一部分同时交付。\n\n## TSTATS 的替代方案\n\
  \n使用 `TSTATS` 方法来稳定应用程序性能并非易事，需要投入一定的时间和精力。正如你将在 `第 20 章` 看到的，可能存在简化 `TSTATS` 以解决特定问题的方法，让你能够快速轻松地解决关键稳定性问题。即便如此，如果你要管理数百个数据库的庞大体系，那么将\
  \ `TSTATS` 的任何变体作为标准采用可能都不切实际。只有在 `CBO` 团队做出某些使得类似 `TSTATS` 的方法变得更直接的改变（尽管这种可能性不大）时，这种情况才会改变。\n\
  \n2012 年，Oracle 的真实世界性能团队进行了一次环球巡讲，试图破除一些关于 Oracle 性能的误解，并教育人们如何进行性能管理。我参加了爱丁堡的研讨会，发现它非常发人深省。其中最有趣的建议之一来自\
  \ Graham Wood。Graham 观察到，许多 Oracle 客户收集统计信息的频率过高。我想明确说明，Graham 并没有说收集统计信息只是为了防止执行计划改变，他当然也没有将收集统计信息比作俄罗斯轮盘赌！然而，Graham\
  \ 的建议确实（非常正确地）指出，收集统计信息存在一些风险，而减少其频率可以显著降低这种风险。\n\n## 你需要多久收集一次统计信息？\n\n如果你的表中的数据日期范围越广，`CBO`\
  \ 降低其基数估计的速度就越慢，并且只有当基数估计降低到非常小的数字时，执行计划才可能改变。因此，如果你保存一个月的数据，每周收集一次统计信息，应该没问题。如果你保存一年的数据，那么你不需要超过每三个月收集一次统计信息！\n\
  \n## 优化后 SQL 的部署选项\n\n在 `第 5 章` 中，我描述了一个系统化的 SQL 语句调优过程，涉及运行一系列实验。我明确指出，实验性更改和生产环境部署更改可能不同，我现在想谈的就是确定后者的过程。无论你是使用传统的对象统计信息管理技术还是\
  \ `TSTATS` 的某种变体，所涉及的考虑因素都是相同的；主要考虑因素是你是否希望生产环境的更改也影响其他语句。\n\n### 当仅需更改一个 SQL 语句时\n\
  \n你可能希望生产环境的更改仅限于一个特定 SQL 语句的原因有几个。可能你的性能问题涉及仅在一个地方出现的构造，并且你知道没有其他 SQL 语句需要修复。你甚至可能怀疑其他\
  \ SQL 语句可能也存在同样的问题，但这些语句并不关键，测试更改影响所需的时间和精力无法被证明是合理的。最后，你可能发现了一个影响多个关键 SQL 语句的问题，但你现在需要将修复仅部署到一个\
  \ SQL 语句，而其他语句的修复则推迟到下一个版本。\n\n无论出于何种原因决定将更改限制在一个 SQL 语句，这个决定都是确定部署策略的关键。\n\n###\
  \ 转换 SQL 代码\n\n这个很简单。如果成功的优化实验涉及以某种方式重写 SQL 语句，那么大多数情况下，在生产环境中进行相同的代码更改只会影响力一个 SQL\
  \ 语句。由于这正是我们期望的效果，你可以直接将实验性的代码更改部署到生产环境。\n\n为了限制更改范围，你应该尽量避免更改视图定义。更好的做法是创建一个新视图或使用带因子的子查询。\n\
  \n### 向 SQL 代码添加提示\n\n如果你的成功优化实验涉及向 SQL 语句添加提示，并且你想要一个将更改限制在该 SQL 语句的部署选项，那么你应该毫不犹豫地将提示部署到生产环境。这个建议可能会让你感到惊讶，因为在书籍、会议论文和博客中有大量材料建议你应该非常不愿意在生产代码中部署提示。我强烈不同意这种观点，我将在\
  \ `第 18 章` 回到这个话题进行更详细的讨论。\n\n仅仅因为你使用一组提示获得了期望的执行计划，并不意味着你应该为生产使用相同的提示集。例如，你可能认真采纳了\
  \ Wolfgang Breitling 的“基于基数反馈的调优”理念，并向代码中应用了一个或多个 `CARDINALITY` 提示来纠正一些 `CBO` 基数错误。如果你不使用\
  \ `TSTATS`，那么当下次收集统计信息时，这些提示将无法可靠地防止执行计划改变。最好识别出 `CARDINALITY` 提示带来的具体变化，然后直接使用其他提示来指定访问方法、连接顺序等。在\
  \ `第 8 章`，我将向你展示如何确定这些提示是什么，并且我们将在 `第 3 部分` 讨论其中大多数提示的含义。\n\n## 物理数据库更改\n\n你应该非常谨慎地仅为加速一个\
  \ SQL 语句而进行物理数据库更改。我已经在上一章解释过，添加索引会给所有 `DML` 操作带来额外开销。此外，当你添加索引或进行其他物理数据库更改时，你无法确定对其他\
  \ SQL 语句执行计划的影响。你应该仅在最后考虑为优化一个 SQL 语句而进行物理数据库更改。\n\n### 当需要更改多个 SQL 语句时\n\n\n\n\
  当你处于重大发布的早期阶段，并且前方仍有大量测试周期时，你可能希望进行一些会影响多个 SQL 语句的更改。这些更改甚至可能带来整个应用程序的全面性能提升。\n\n\
  我最近接到一项任务，需要将一个耗时六小时的夜间批处理作业的运行时间缩短至两小时。该批处理涉及数百甚至数千条 SQL 语句，逐一优化排名前 10%的语句都是一项无望完成的任务。即便如此，我仍然会首先查看运行时间最长的\
  \ SQL 语句。但一旦理解了该语句的问题所在，我就会尝试寻找修复方法，并希望该方法也能使其他语句受益。当性能问题与某种常见结构相关时，这通常是可行的。\n\n\
  请记住，如果你做了一项更改，它提升了 100 条语句的性能，却导致另外两条语句的性能下降，你总可以对这两条性能下降的语句使用**提示（hint）**！\n\n\
  ## 转换 SQL 代码与添加提示\n\n我已经说过，当你试图限制变更范围时，修改视图定义是个坏主意。由此可推论，当需要全面修改时，修改视图定义就是个好主意。\n\
  \n除了这个例外，更改单条 SQL 语句（包括添加提示）不太可能对整个应用程序产生巨大影响，除非该语句运行得非常频繁或耗时特别长。\n\n## 物理数据库更改\n\
  \n物理数据库更改对提升应用程序整体性能具有巨大潜力，并且在进行此类更改时，需要考虑的是应用程序的整体性能。应用程序性能不佳，往往是因为多年来为解决个别查询的问题而添加了大量索引，这种情况并不少见。也许提升你应用程序性能的方法是删除其中许多索引！添加索引并不是解决长时间运行的全表扫描的唯一方法，我们将在第\
  \ 15 章中讨论多种其他方法。\n\n## 更改统计信息\n\n我曾大力强调这样一个事实：当对象统计信息发生变化时，执行计划可能会改变。在生产系统的上下文中，执行计划的改变是坏事；但在测试系统上调优整个应用程序的上下文中，此类改变可能是潜在的大好事。\n\
  \n如果你的成功优化实验涉及向 SQL 语句添加提示，并且你怀疑许多其他 SQL 语句会受到类似影响，你应该尝试寻找一个不同的、能在全局解决问题的方案。更改统计信息可以提供帮助。\n\
  \n## 扩展统计信息\n\n正如 Wolfgang Breitling 的 TCF 论文所解释的，CBO（基于成本的优化器）得出糟糕执行计划的最常见原因之一是它做出了错误的**基数估算**。而\
  \ CBO 做出错误基数估算的一个主要原因，是它没有意识到两列之间的相关性。因此，如果你为 CBO 提供相关性信息，那么你可能有助于提升多条 SQL 语句的性能。\n\
  \n想象一下，你有一个包含 40,000 行的表`T1`。`T1`有两个列`C1`和`C2`。`C1`有 20 个不同的值，每个值对应 2,000 行。`C2`也有\
  \ 20 个不同的值，每个值对应 2,000 行。CBO 可能需要知道有多少行会同时匹配`C1`的一个特定值和`C2`的一个特定值。CBO 知道`C1`和`C2`有\
  \ 400 种可能的组合，并通常假设这 400 种组合出现的可能性均等。因此，CBO 会将 40,000 除以 400，得出基数估算为 100。\n\n现在假设`T1`的真实名称是`ORDERS`，而`C1`和`C2`的真实名称分别是`ORDER_DATE`和`DELIVERY_DATE`。`ORDER_DATE`的值从\
  \ 3 月 1 日到 3 月 20 日不等，而`DELIVERY_DATE`的值从 3 月 2 日到 3 月 21 日不等。你管理严格，每一笔订单的`DELIVERY_DATE`都是`ORDER_DATE`的次日！这意味着实际上表中只有\
  \ 20 种`ORDER_DATE`和`DELIVERY_DATE`的组合——每种组合对应 2,000 行。`ORDER_DATE`和`DELIVERY_DATE`是相关的。\n\
  \n此类问题可以通过使用`扩展统计信息`来解决，我将在第 9 章中详细讲解扩展统计信息。通过创建扩展统计信息而不是添加提示，你可能会提升使用相同列组合的其他 SQL\
  \ 语句的性能。\n\n## 手工创建的直方图\n\nCBO 得出错误基数估算的另一个原因是`数据倾斜`。我在本章前面已经介绍了数据倾斜的概念：它指的是少数列值出现频率远高于其他值的情况。虽然常规的\
  \ TSTATS（统计信息收集工具）对列统计信息的处理方式是移除关于特定值的所有信息，但对于需要直方图的列来说，这并非正确方法。只要应用程序没有为存在数据倾斜的列的值使用绑定变量，那么部署直方图是完全合理的事情。\n\
  \n根据我的经验，在一个完全规范化的模式中，需要直方图的列数量非常少。当然，在实际生活中，一定程度的反规范化是常见的，需要直方图的特定列会被复制到多个表中。在这些情况下，被复制的列通常具有相同的列名，易于识别，并且需要相同的直方图。无论你是否使用\
  \ TSTATS，我的建议始终是分析你的数据并手动设置此类直方图。我们将在第 20 章中详细讨论这一点。然而，此时的关键信息一如既往：统计信息的更改可以用于同时提升多条\
  \ SQL 语句的性能。\n\n## 生成虚假的对象统计信息\n\n扩展统计信息和直方图的使用是 Oracle 员工经常讨论并鼓励你使用的功能。然而，关于显式设置或用特定值覆盖其他类型统计信息的讨论则少得多。我推测缺乏讨论的原因是，将统计信息设置为特定值所需的知识和专业水平，比设置扩展统计信息或直方图要高得多。\n\
  \n此时我想强调的是，将统计信息设置为特定值是完全支持的，并且相关技术在`DBMS_STATS`包的文档中有记载。有一些特殊情况需要将对象统计信息设置为不反映现实的值，我们将在第\
  \ 20 章中讨论这些情况。\n\n![image](img/sq.jpg) **注意** 对象统计信息存在的目的是帮助 CBO 做出正确的决策。如果准确的统计信息导致了糟糕的\
  \ CBO 决策，而不准确的统计信息反而带来了良好的决策，那么你希望部署的是不准确的统计信息。\n\n与任何统计信息操作一样，你应该考虑你的更改对其他 SQL\
  \ 语句的影响。通常，了解你的应用程序中盛行的查询类型以及极少（如果有的话）出现的查询类型，对于判断伪造对象统计信息是否有益至关重要。\n\n## 更改 PL/SQL\
  \ 代码与调整环境\n\n\n"
