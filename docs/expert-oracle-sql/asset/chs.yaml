  \ AS SELECT`操作在`IN-OUT`列中的值为`PCWP`（并行结合子操作），这清楚地表明我们正在并行加载一个表。这可能会让你感到惊讶，因为清单 8-22\
  \ 开头禁用了并行 DML。但是，禁用并行 DML 的目的是为了防止出现`ORA-12838`错误，就像清单 8-19 中那样。由于我们正在加载的临时表是为了物化因子化子查询`Q1`而创建的，并且在当前语句结束时将不复存在，因此不可能发生此类错误；即使并行\
  \ DML 表面上已被禁用，我们也可以使用它。\n\n接下来看操作 12、13 和 14。从`IN-OUT`列的值可以看出，这些操作是串行读取表`T2`的。第\
  \ 13 行的`PX SELECTOR`操作是 12cR1 的新特性，表明串行操作是由来自`PQSS1`的并行查询服务器完成的，而不是像早期版本那样由 QC 完成。第\
  \ 12 行显示，从`T2`中选择的所有行都广播到了`PQSS2`的所有成员。我们稍后会探讨并行查询服务器之间相互通信的其他方式。\n\n现在来看第 30 行的操作。关于这个操作有两点需要注意。首先，新创建的临时表被`PQSS1`并行读取（为了节省页面空间，我截断了表名），但所有行都发送给了`PQSS2`的单个成员，这从操作名可以看出，并被`IN-OUT`列证实。由于查询中使用了`ROWNUM`伪列，所有行都由`PQSS2`中的一个从属进程处理。同样，`PX\
  \ SEND 1 SLAVE`操作是 12cR1 的新特性，在之前的版本中，这个操作会是`PX SEND QC (RANDOM)`，因为实现`ROWNUM`伪列的`COUNT`操作是由\
  \ QC 执行的。\n\n关于操作 30 要注意的第二点是，`DFO`的名称是`Q2, 00`，`TQ`名称是`:TQ20000`。这些名称表明该语句中使用了第二个`DFO`树，并且从第\
  \ 16 行到第 33 行的所有操作都是由这第二个`DFO`树执行的。当一个语句中涉及多个`DFO`树时，每个`DFO`树通常会获得自己的一组并行查询服务器或一对并行查询服务器集，而且实际上，不同`DFO`树的`DOP`（并行度）也可能不同。支持特定`DFO`树的并行查询服务器集被称为`并行组`。因此，在清单\
