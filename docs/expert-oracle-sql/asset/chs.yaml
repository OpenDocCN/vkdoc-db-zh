  \ `TSTATS.ADJUST_TABLE_STATS` 集成到我们的分区维护过程中，全表扫描的成本保持不变，并且未加提示的查询继续使用索引。\n\n## 临时表\n\
  \n老实说：对于 TSTATS 方法而言，临时表是一个具有挑战性的问题，原因有二：\n*   你无法通过独立作业轻松地为临时表收集统计信息，因为临时表当时会是空的。\n\
  *   永久表的大小很少会按数量级变化，而临时表则很常见，可能一次容纳 1,000,000 行，不久后又只容纳 3 行。\n\n当临时表在抽取-转换-加载（ETL）过程中用作暂存表时，这些困难往往显而易见。实际上，永久表有时也在\
  \ ETL 过程中用作暂存表，本节讨论的问题同样适用于这类表。\n\n### 动态采样的利弊\n\n尽管这完全违背了 TSTATS 的理念，但处理剧烈变化基数的一个务实方法是依赖动态采样。除非你明确禁用它，否则动态采样会在任何没有对象统计信息的表上自动发生，这包括临时表。\n\
  \n动态采样的好处在于它相当智能，完全理解列相关性等概念，因此您无需担心甚至无需了解**扩展统计**是什么！事实上，当您的语句被解析时，您很有可能获得一个相当不错的执行计划。而如果下周您使用临时表中完全不同的内容重新解析该语句，您也很可能会获得一个迥然不同、但非常适用于您修改后工作负载的计划。\n\
  \n![image](img/sq.jpg) **提示**：如果您运行的是 `12cR1` 或更高版本，并且有多个针对具有相同内容的同一临时表的查询，您可以通过收集特定于会话的临时表统计信息来避免重复的动态采样。详情请参阅《PL/SQL\
  \ 包和类型参考手册》中 `DBMS_STATS.SET_TABLE_PREFS` 过程的说明，并查找 `GLOBAL_TEMP_TABLE_STATS` 首选项。然而，如果您使用会话特定统计信息作为动态采样的替代方案，则可能需要设置**扩展统计**！\n\
  \n这一切都很好，但我相信您能看出动态采样的潜在缺点。我们仍然面临着最初促使我们开发 TSTATS 的性能不佳的风险，具体如下：\n\n*   动态采样产生的执行计划及其最终带来的性能都无法确定地预测。\n\
  *   一个会话创建的执行计划，可能被相同或不同的会话在临时表内容与语句解析时截然不同的情况下重复使用。\n\n我必须承认，当我最初为 AJAX 应用程序实现\
  \ TSTATS 时，我对这些担忧**视而不见**，并寄希望于通过稳定所有不涉及临时表的语句的执行计划，并对剩余语句依赖动态采样，就足以让 AJAX 提供稳定的服务。不幸的是，我错了，最终不得不寻找一种方法来稳定涉及临时表的查询的计划。我最终放弃了动态采样，改为为临时表伪造统计信息。\n\
  \n### 为临时表伪造统计信息\n\n思路很简单：使用 `DBMS_STATS.SET_TABLE_STATS`、`DBMS_STATS.SET_COLUMN_STATS`，并在适当时使用\
  \ `DBMS_STATS.SET_INDEX_STATS` 来为全局临时表及其关联的列和索引设置统计信息。这样，您就可以确保涉及全局临时表的执行计划像您所有其他查询一样是固定且可测试的。当然，问题在于如何确定该伪造哪些统计信息。\n\
  \n为了说明问题，让我们看看 清单 20-12，它执行了一个临时表与永久表的合并操作。\n\n清单 20-12. 将临时表合并到永久表中\n\n```sql\n\
  CREATE GLOBAL TEMPORARY TABLE payments_temp\nAS\n   SELECT *\n     FROM payments\n\
  \    WHERE 1 = 0;\n\nMERGE /*+ cardinality(t 3 ) */\n     INTO  payments p\n   \
  \  USING payments_temp t\n        ON (p.payment_id = t.payment_id)\nWHEN MATCHED\n\
  THEN\n   UPDATE SET p.employee_id = t.employee_id\n             ,p.special_flag\
  \ = t.special_flag\n             ,p.paygrade = t.paygrade\n             ,p.payment_date\
  \ = t.payment_date\n             ,p.job_description = t.job_description\nWHEN NOT\
  \ MATCHED\nTHEN\n   INSERT     (payment_id\n              ,special_flag\n      \
  \        ,paygrade\n              ,payment_date\n              ,job_description)\n\
  \       VALUES (t.payment_id\n              ,t.special_flag\n              ,t.paygrade\n\
  \              ,t.payment_date\n              ,t.job_description);\n```\n\n```\n\
  | Id  | Operation                      | Name          | Rows  | Cost (%CPU)|\n\n\
  |   0 | MERGE STATEMENT                |               |     3 |     5   (0)|\n\
  |   1 |  MERGE                         | PAYMENTS      |       |            |\n\
  |   2 |   VIEW                         |               |       |            |\n\
  |   3 |    NESTED LOOPS OUTER          |               |     3 |     5   (0)|\n\
  |   4 |     TABLE ACCESS FULL          | PAYMENTS_TEMP |     3 |     2   (0)|\n\
  |   5 |     TABLE ACCESS BY INDEX ROWID| PAYMENTS      |     1 |     1   (0)|\n\
  |   6 |      INDEX UNIQUE SCAN         | PAYMENTS_PK   |     1 |     0   (0)|\n\
  ```\n\n```sql\nMERGE /*+ cardinality(t 10000 ) */\n     INTO  payments p\n     USING\
  \ payments_temp t\n        ON (p.payment_id = t.payment_id)\nWHEN MATCHED\nTHEN\n\
  \   UPDATE SET p.employee_id = t.employee_id\n             ,p.special_flag = t.special_flag\n\
  \             ,p.paygrade = t.paygrade\n             ,p.payment_date = t.payment_date\n\
  \             ,p.job_description = t.job_description\nWHEN NOT MATCHED\nTHEN\n \
  \  INSERT     (payment_id\n              ,special_flag\n              ,paygrade\n\
  \              ,payment_date\n              ,job_description)\n       VALUES (t.payment_id\n\
  \              ,t.special_flag\n              ,t.paygrade\n              ,t.payment_date\n\
  \              ,t.job_description);\n```\n\n```\n| Id  | Operation            |\
  \ Name          | Rows  | Cost (%CPU)|\n\n|   0 | MERGE STATEMENT      |       \
  \        | 10000 |   176   (1)|\n|   1 |  MERGE               | PAYMENTS      |\
  \       |            |\n|   2 |   VIEW               |               |       | \
  \           |\n|   3 |    HASH JOIN OUTER   |               | 10000 |   176   (1)|\n\
  |   4 |     TABLE ACCESS FULL| PAYMENTS_TEMP | 10000 |     2   (0)|\n|   5 |   \
  \  TABLE ACCESS FULL| PAYMENTS      |   120K|   174   (1)|\n```\n\n清单 20-12 展示了两个\
  \ `MERGE` 语句及其相关的执行计划。两个语句的唯一区别在于 `CARDINALITY` 提示的参数，一个案例中是 `3`，另一个案例中是 `10,000`。我们可以看到，在这两种情况下，CBO\
  \ 都选择将临时表作为连接中的驱动表。在基数为 `3` 的案例中，CBO 倾向于使用**嵌套循环连接**，而在基数估计为 `10,000` 的案例中，则更偏好**哈希连接**。\n\
  \n我们希望伪造我们的统计信息，使得 CBO 能在无需我们使用提示的情况下选择一个合理的执行计划。但最优执行计划似乎取决于临时表中的行数，那么我们该怎么办呢？\n\
  \n回答这个问题的关键在于回答另外两个问题：\n\n*   当临时表中有 `10,000` 行时，如果我们使用了嵌套循环连接，性能会有多糟糕？\n*   当表中只有\
  \ `3` 行时，如果我们使用了哈希连接，性能会有多糟糕？\n\n清单 20-13 展示了我们如何开始思考这个问题。\n\n清单 20-13. 评估错误基数估计的影响\n\
  \n```sql\nMERGE /*+ cardinality(t 3) leading(t) use_hash(p) no_swap_join_inputs(p)\
  \ */\n     INTO  payments p\n     USING payments_temp t\n        ON (p.payment_id\
  \ = t.payment_id)\nWHEN MATCHED\nTHEN\n   UPDATE SET p.employee_id = t.employee_id\n\
  \             ,p.special_flag = t.special_flag\n             ,p.paygrade = t.paygrade\n\
  \             ,p.payment_date = t.payment_date\n             ,p.job_description\
  \ = t.job_description\nWHEN NOT MATCHED\nTHEN\n   INSERT     (payment_id\n     \
  \         ,special_flag\n              ,paygrade\n              ,payment_date\n\
  \              ,job_description)\n       VALUES (t.payment_id\n              ,t.special_flag\n\
  \              ,t.paygrade\n              ,t.payment_date\n              ,t.job_description);\n\
  ```\n\n```\n| Id  | Operation            | Name          | Rows  | Cost (%CPU)|\n\
  ```\n\n（注：此处原文似乎不完整，因此译文也相应结束。如果需要翻译完整的段落，请提供完整的原文内容。）\n\n---\n**请注意**：为确保没有遗漏任何内容，并方便您对照核查，我已将处理过程与原始文本结构完全对应。如果您需要核对任何特定部分的翻译，可以随时指出。\n\
