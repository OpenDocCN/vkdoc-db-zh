- '# 第七章


  ## 高级 SQL 概念


  在本章中，我们将回到 SQL 语言的复杂性，研究另外三个关键概念，这些概念既能让你陷入性能困境，也能帮你摆脱困境。


  *   首先，我想探讨的是查询块和子查询的语法。讨论的重点在于 **CBO**（基于成本的优化器）处理这两种结构的方式与 *SQL 语言参考手册* 的方式之间的区别——这是当我们深入分析执行计划（我们将在下一章中进行）时的一个关键问题。

  *   本章的第二个主题是不同类型的 SQL 函数。特别是**分析函数**，如果使用得当会非常有帮助，而如果使用不当，则会对性能造成极大损害。

  *   本章的第三个也是最后一个主题是 `MODEL` 子句。许多人可能整个职业生涯都不需要了解 `MODEL` 子句是什么或它的作用。然而，如果你像我一样，发现自己迫切需要使用
  `MODEL` 子句，那么你需要知道何时去查阅《数据仓库指南》！


  ## 查询块与子查询


  对于 Oracle 性能专家而言，查询块的概念非常重要，因为它是 **CBO** 和运行时引擎的基本处理单元。然而，在讨论查询块如何工作之前，我们需要澄清一些术语。


  ### 术语


  *SQL 语言参考手册* 中对查询块的正式定义相当复杂，但非正式地，查询块可以很直接地解释为“跟随关键字 `SELECT` 的内容”。该手册定义了子查询，它有四种可能的构成方式：


  *   一个查询块

  *   一个查询块后跟一个 `ORDER BY` 子句

  *   多个通过集合运算符连接的查询块

  *   多个通过集合运算符连接的查询块，后跟一个 `ORDER BY` 子句


  集合运算符包括 `UNION`、`UNION ALL`、`INTERSECT` 和 `MINUS`。


  **注意** 我对子查询概念的解释与 *SQL 语言参考手册* 略有不同，是为了强调：集合运算符的操作数中包含 `ORDER BY` 子句是不合法的。


  事实证明，**CBO** 似乎将所有子查询都视为查询块。它处理方式如下：


  *   涉及集合运算符的子查询被视为一种特殊类型的查询块，我将其称为集合查询块。

  *   `ORDER BY` 子句被视为其所属查询块的一部分。


  从现在起，在本书中使用术语“查询块”时，应理解为 **CBO** 的解释；当我使用术语“子查询”时，我指的是其通常的非正式含义，即 `SELECT` 语句中除主查询块之外的查询块。


  ### 查询块的处理方式


  在 `SELECT` 关键字之后，查询块按以下顺序编写：


  *   可选的 `DISTINCT` 或 `UNIQUE` 操作

  *   选择列表

  *   除 `ORDER BY` 子句外的其他所有内容

  *   可选的 `ORDER BY` 子句


  然而，查询块的逻辑执行顺序却不同：


  *   其他所有内容

  *   选择列表

  *   可选的 `DISTINCT` 或 `UNIQUE` 操作

  *   可选的 `ORDER BY` 子句


  好消息是，除了极少数例外，我笼统称为“其他所有内容”的各个部分，其逻辑处理顺序与它们出现的顺序一致。特别是，以下子句（其中一些是可选的）的编写顺序与其逻辑处理顺序相同：


  *   `FROM` 子句

  *   `WHERE` 子句

  *   `GROUP BY` 子句

  *   `HAVING` 子句

  *   `MODEL` 子句


  当然，只要最终生成的行集与逻辑顺序的结果相同，**CBO** 可以自由更改其要求运行时引擎执行操作的顺序。


  ## 函数


  如果你的应用程序构建时，大部分业务逻辑都在数据库之外实现，那么你在 SQL 中可能很少使用函数。然而，大多数商业和科学领域的 SQL 语句都充斥着函数调用。这些函数调用的使用和滥用常常导致大量的处理工作，尤其是排序和聚合；这种开销超过传统的访问和连接表的数据库开销的情况并不少见。因此，在本节中，我想要确保我们都清楚理解主要函数类别的工作方式。


  *SQL 语言参考手册* 定义了以下函数类别：


  *   单行函数

  *   聚合函数

  *   分析函数

  *   对象引用函数

  *   模型函数

  *   OLAP 函数

  *   数据 cartridge 函数


  本节重点介绍单行函数、聚合函数和分析函数。让我们从聚合函数开始。


  **注意** 在本节中，我将使用内置函数作为示例，但重要的是要理解，你可以编写自己的标量、聚合或分析函数，并且我将要讨论的同样原则也适用。


  ### 聚合函数


  本书的一些读者可能对聚合函数相当熟悉，但我认为正式回顾一下这些概念很重要，以免我们在稍后研究分析函数和 `MODEL` 子句时产生混淆。


  #### 聚合的概念


  简而言之，聚合涉及获取一组项目，产生一个单一值，***然后丢弃输入***。清单 7-1 展示了触发聚合的两种不同方式。


  清单 7-1. 使用 GROUP BY 和分析函数来触发聚合


  ***


  我经常看到一些 SQL 语句因为涉及递归 SQL 的重复函数调用而性能不佳。改进的一种方法是重新编写调用该 SQL 语句的逻辑，使得该函数只被调用一次。当已知某个特定函数或函数集会被应用程序中的大量
  SQL 语句重复调用时，将这些函数设置为 `DETERMINISTIC`（确定性的）或使用我在第 1 章中描述的函数缓存，可能是具有成本效益的。


  如果排序操作溢出到磁盘，你可能会考虑并行化查询。但如果你怀疑其他排序操作也可能溢出到磁盘，你可以考虑增加 `PGA_AGGREGATE_TARGET` 参数值，以帮助改善其他查询的性能。你也应该以同样的思路考虑其他环境变更。


  ## 总结


  本章介绍了一种称为 **TSTATS** 的部署方法论，该方法论旨在满足生产环境中对执行计划稳定性的需求，而无需维护一个执行计划仓库。该方法的设置较为复杂，将在本书的第
  20 章中详细讨论，但存在替代方法。你可能会使用简化版的 TSTATS，但对于绝大多数行为良好的应用程序，你可能应该尽量减少对象统计信息收集的次数。


  与物理数据库设计一起，对象统计信息是部署优化 SQL 时的一个重要考虑因素。在发布的早期阶段，调整统计信息是同时改善应用程序多个部分性能的好方法。然而，在测试生命周期的后期阶段，当目标是限制变更的影响范围时，应尽量减少对对象统计信息的更改，一个合理的替代方案是向你的
  SQL 语句中添加提示。



