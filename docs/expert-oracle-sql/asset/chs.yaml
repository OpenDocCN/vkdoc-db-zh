  \n转换后的查询执行了一个简单的`GROUP BY`操作，没有使用`ROLLUP`，然后从物化视图中添加了月度总计的行。有趣的是，除了将`SORT GROUP\
  \ BY ROLLUP`操作替换为更直接的`HASH GROUP BY`操作外，该转换还使得分组放置成为可能！既然新的分组放置转换已经创建，那么旧的扩展分组集到联合（expand-grouping-sets-to-union）转换可能会被重新审视，以便在没有任何物化视图的情况下也能操作。但就目前而言，此转换似乎仅在物化视图可用时才起作用。\n\
  \n## 排序消除\n\n在子查询中出现`ORDER BY`表达式是完全合法且非常常见的，而且你有权依赖此类子查询结果的排序。例如，在 Listing 13-24\
  \ 中，我在包含`ORDER BY`子句的子查询结果上使用了`ROWNUM=1`谓词。\n\n然而，有时你可能无法依赖子查询的`ORDER BY`子句，因为结果查询是另一个连接、聚合或集合操作的输入。在这种情况下，CBO\
  \ 认为有权删除你看似多余的`ORDER BY`子句。\n\n问题是：为什么你添加了`ORDER BY`子句却不使用它？几乎总是，多余的`ORDER BY`子句出现在数据字典视图中，而这正是\
  \ order-by-elimination 转换旨在解决的情况。另一方面，也可以使用内联视图来演示 order-by-elimination 转换，如 Listing\
  \ 13-32 所示。\n\n### Listing 13-32. 排序消除\n\n```sql\nSELECT COUNT (*)\n  FROM (  SELECT\
  \ /*+   eliminate_oby */\n                 /* no_eliminate_oby */\n            \
  \     o1.*\n            FROM oe.order_items o1\n           WHERE product_id = (SELECT\
  \ MAX (o2.product_id)\n                                 FROM oe.order_items o2\n\
  \                                WHERE o2.order_id = o1.order_id)\n        ORDER\
  \ BY order_id) v;\n```\n\n```sql\n-- 未转换的执行计划（NO_ELIMINATE_OBY）\n\n| Id  | Operation\
  \                  | Name           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT \
  \          |                |     5   (0)|\n|   1 |  SORT AGGREGATE            |\
  \                |            |\n|   2 |   VIEW                     |          \
  \      |     5   (0)|\n|   3 |    SORT ORDER BY           |                |   \
  \  5   (0)|\n|*  4 |     HASH JOIN              |                |     5   (0)|\n\
  |   5 |      VIEW                  | VW_SQ_1        |     2   (0)|\n|   6 |    \
  \   HASH GROUP BY        |                |     2   (0)|\n|   7 |        INDEX FAST\
  \ FULL SCAN| ORDER_ITEMS_UK |     2   (0)|\n|   8 |      TABLE ACCESS FULL     |\
  \ ORDER_ITEMS    |     3   (0)|\n\n谓词信息（通过操作 ID 标识）：\n\n4 - access(\"PRODUCT_ID\"\
  =\"MAX(O2.PRODUCT_ID)\" AND\n              \"ITEM_1\"=\"O1\".\"ORDER_ID\")\n```\n\
  \n```sql\n-- 转换后的查询\n\nSELECT COUNT (*)\n  FROM (SELECT o1.*\n          FROM oe.order_items\
  \ o1\n         WHERE product_id = (SELECT MAX (o2.product_id)\n                \
  \               FROM oe.order_items o2\n                              WHERE o2.order_id\
  \ = o1.order_id)) v;\n```\n\n```sql\n-- 转换后的执行计划（默认）\n\n| Id  | Operation      \
  \          | Name           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT         |\
  \                |     2   (0)|\n|   1 |  SORT AGGREGATE          |            \
  \    |            |\n|   2 |   NESTED LOOPS           |                |     2 \
  \  (0)|\n|   3 |    VIEW                  | VW_SQ_1        |     2   (0)|\n|   4\
  \ |     HASH GROUP BY        |                |     2   (0)|\n|   5 |      INDEX\
  \ FAST FULL SCAN| ORDER_ITEMS_UK |     2   (0)|\n|*  6 |    INDEX UNIQUE SCAN  \
  \   | ORDER_ITEMS_UK |     0   (0)|\n\n谓词信息（通过操作 ID 标识）：\n\n6 - access(\"ITEM_1\"\
  =\"O1\".\"ORDER_ID\" AND\n              \"PRODUCT_ID\"=\"MAX(O2.PRODUCT_ID)\")\n\
  ```\n\nListing 13-32 中的查询包含一个隐藏在内联视图中的未使用`ORDER BY`子句。未转换的查询包含一个`SORT ORDER BY`操作（执行排序）和一个`SORT\
  \ AGGREGATE`操作（不执行排序）。转换后的查询删除了冗余的`ORDER BY`子句，最终执行计划只包含评估`COUNT (*)`的不排序的`SORT\
  \ AGGREGATE`操作。\n\n你可能想知道为什么我突然在 Listing 13-32 中放弃了我喜欢的带因子子查询。原因是 order-by-elimination\
  \ 不会发生在带因子子查询上！我实际上认为这是合理的事情。如果你在带因子子查询中放置`ORDER BY`子句，那是有原因的。真正需要 order-by-elimination\
  \ 转换的其实只有数据字典视图。\n\n## 表扩展\n\n表扩展（Table expansion）是 11gR2 中引入的一个转换，特定于分区表。在引入表扩展转换之前，一个分区上本地索引的不可用性可能会妨碍使用其他分区上可用的索引。\n\
  \n为了演示这个转换，我必须更改索引分区的可用性，因此我将创建一个新表，而不是更改示例模式数据的状态。Listing 13-33 创建了一个具有不可用本地索引的分区表，然后仅重建一个分区。\n\
  \n### Listing 13-33. 为表扩展演示创建表\n\n\n"
- "# 表扩展与星型转换\n\n```\nCREATE TABLE t\nPARTITION BY RANGE\n   (d)\n   (\n      PARTITION\n\
  \         t_q1_2013 VALUES LESS THAN (TO_DATE ('2013-04-01', 'yyyy-mm-dd'))\n  \
  \   ,PARTITION\n         t_q2_2013 VALUES LESS THAN (TO_DATE ('2013-07-01', 'yyyy-mm-dd'))\n\
  \     ,PARTITION\n         t_q3_2013 VALUES LESS THAN (TO_DATE ('2013-10-01', 'yyyy-mm-dd'))\n\
  \     ,PARTITION\n         t_q4_2013 VALUES LESS THAN (TO_DATE ('2014-01-01', 'yyyy-mm-dd')))\n\
  PCTFREE 99\nPCTUSED 1\nAS\n       SELECT DATE '2013-01-01' + ROWNUM - 1 d, ROWNUM\
  \ n\n         FROM DUAL\n   CONNECT BY LEVEL <= 365;\n\nCREATE INDEX i\n   ON t\
  \ (n)\n   LOCAL\n   UNUSABLE;\n\nALTER INDEX i\n   REBUILD PARTITION t_q3_2013;\n\
  ```\n\n现在我们已经有了分区表，清单 13-34 可以展示表扩展转换如何工作。\n\n清单 13-34. 表扩展转换\n\n```\nSELECT /*+\
  \     expand_table(t) */\n       /*  no_expand_table(t) */\n      COUNT (*)\n FROM\
  \ t\nWHERE n = 8;\n\n-- 未转换的执行计划 (NO_EXPAND_TABLE)\n\n| Id  | Operation        \
  \    | Name | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT     |      |    45   (0)|\n\
  |   1 |  SORT AGGREGATE      |      |            |\n|   2 |   PARTITION RANGE ALL|\
  \      |    45   (0)|\n|*  3 |    TABLE ACCESS FULL | T    |    45   (0)|\n\nPredicate\
  \ Information (identified by operation id):\n\n3 - filter(\"N\"=8)\n\n-- 转换后的查询\n\
  \nWITH vw_te\n     AS (SELECT *\n           FROM t PARTITION (t_q3_2013)\n     \
  \     WHERE n = 8\n         UNION ALL\n         SELECT *\n           FROM t\n  \
  \        WHERE     n = 8\n                AND (   d < TO_DATE ('2013-07-01', 'yyyy-mm-dd')\n\
  \                     OR d >=TO_DATE ('2013-10-01', 'yyyy-mm-dd')))\nSELECT COUNT\
  \ (*)\n  FROM vw_te;\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation                 |\
  \ Name    | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT          |         |    34\
  \   (0)|\n|   1 |  SORT AGGREGATE           |         |            |\n|   2 |  \
  \ VIEW                    | VW_TE_1 |    34   (0)|\n|   3 |    UNION-ALL       \
  \       |         |            |\n|   4 |     PARTITION RANGE SINGLE|         |\
  \     1   (0)|\n|*  5 |      INDEX RANGE SCAN     | I       |     1   (0)|\n|  \
  \ 6 |     PARTITION RANGE OR    |         |    33   (0)|\n|*  7 |      TABLE ACCESS\
  \ FULL    | T       |    33   (0)|\n\nPredicate Information (identified by operation\
  \ id):\n\n5 - access(\"N\"=8)\n   7 - filter(\"N\"=8 AND (\"T\".\"D\"<TO_DATE('\
  \ 2013-07-01 00:00:00',\n              'syyyy-mm-dd hh24:mi:ss') OR \"T\".\"D\"\
  >=TO_DATE(' 2013-10-01 00:00:00',\n              'syyyy-mm-dd hh24:mi:ss') AND \"\
  T\".\"D\"<TO_DATE(' 2014-01-01 00:00:00',\n              'syyyy-mm-dd hh24:mi:ss')))\n\
  ```\n\n如果没有表扩展转换，清单 13-34 中的查询将无法利用本地索引，因为它的某些分区是不可用的。应用表扩展转换将查询拆分为 `UNION-ALL`\
  \ 操作的两个分支。第一个分支针对具有可用本地索引的分区，第二个分支则针对只能使用全表扫描的分区。\n\n这种转换很可能有益于许多定期重建本地位图索引分区的数据仓库应用。\n\
  \n表扩展转换是我们介绍的最后一个杂项转换，但我把最好的留到了最后。著名的星型转换可以说是自成一类。让我们以解释这个最著名的优化器转换的作用及其如何帮助我们作为本章的结尾。\n\
  \n## 星型转换\n\n星型转换是最难理解的优化器转换，因此我们将仔细梳理。我们将从考虑 CBO 面临的问题开始，然后探讨如何解决它。\n\n### 分布式连接过滤问题\n\
  \n让我们从查看清单 13-35 开始，并思考如果我们是 CBO 会怎么做。\n\n清单 13-35. 用于星型转换的候选查询\n\n```\nSELECT prod_id\n\
  \      ,cust_id\n      ,p.prod_name\n      ,c.cust_first_name\n      ,s.time_id\n\
  \      ,s.amount_sold\n  FROM sh.sales s\n       JOIN sh.customers c USING (cust_id)\n\
  \       JOIN sh.products p USING (prod_id)\n WHERE c.cust_last_name = 'Everett'\
  \ AND p.prod_category = 'Electronics';\n```\n\n让我们看一些统计数据：\n*   `SH.SALES` 表中有 918,843\
  \ 行。\n*   这 918,843 行中有 116,267 行匹配产品过滤器。\n*   这 918,843 行中有 740 行匹配客户过滤器。\n*  \
  \ 有 115 行同时匹配客户和产品过滤器。\n\n那么，我们选择什么连接顺序呢？\n*   如果我们从 `SH.SALES` 表与 `SH.PRODUCTS`\
  \ 或 `SH.CUSTOMERS` 开始连接，最终会从 `SH.SALES` 读取过多的行；从 `SH.SALES` 读取的行中超过 80% 随后会被丢弃。\n\
  *   如果我们首先连接 `SH.PRODUCTS` 和 `SH.CUSTOMERS`，最终会得到 5,760 行，即使使用多列索引开销也很高。\n\n这是一个\
  \ *分布式过滤器* 的示例，其中两个或多个过滤条件组合起来的选择性远高于任何单个过滤器。\n\n这个问题与我们在第 10 章讨论的 `INDEX_COMBINE`\
  \ 和 `AND_EQUAL` 提示所解决的问题非常相似；我们希望识别同时匹配我们所有过滤器的行，然后只读取那些匹配所有条件的行。不同之处在于，我们的过滤条件源自其他表。\n\
  \n这就是我们的问题陈述。现在让我们将注意力转向如何解决它。\n\n### 解决分布式连接过滤问题\n\n清单 13-36 是对清单 13-35 的一次重写尝试。\n\
  \n清单 13-36. 解决分布式连接过滤的首次尝试\n\n```\nALTER SESSION SET star_transformation_enabled=temp_disable;\n\
  \nSELECT /* no_table_lookup_by_nl(s) */\n      s.time_id, s.amount_sold\n  FROM\
  \ sh.sales s\n WHERE     s.cust_id IN (SELECT c.cust_id\n                      \
  \     FROM sh.customers c\n                          WHERE cust_last_name = 'Everett')\n\
  \       AND s.prod_id IN (SELECT p.prod_id\n                           FROM sh.products\
  \ p\n                          WHERE prod_category = 'Electronics');\n\n| Id  |\
  \ Operation                      | Name                 | Cost (%CPU)|\n```\n\n\n\
  |   0 | SELECT 语句                       |                      |   923   (1)|\n\
  |   1 |  视图                            | VW_ST_8230C7ED       |   923   (1)|\n|\
  \   2 |   嵌套循环                       |                      |   498   (1)|\n|  \
  \ 3 |    分区范围-全部                 |                      |   440   (1)|\n|   4 |\
  \     位图转换为 ROWID              |                      |   440   (1)|\n|   5 |  \
  \    位图与操作                  |                      |            |\n|   6 |     \
  \  位图合并                   |                      |            |\n|   7 |       \
  \ 位图键迭代                |                      |            |\n|   8 |         缓冲区排序\
  \               |                      |            |\n|*  9 |          全表扫描   \
  \            | CUSTOMERS            |   423   (1)|\n|* 10 |         位图索引范围扫描   \
  \      | SALES_CUST_BIX       |            |\n|  11 |       位图合并               \
  \    |                      |            |\n|  12 |        位图键迭代               \
  \ |                      |            |\n|  13 |         缓冲区排序               | \
  \                     |            |\n|* 14 |          视图                    | index$_join$_051\
  \     |     2   (0)|\n|* 15 |           哈希连接               |                   \
  \   |            |\n|* 16 |            索引范围扫描          | PRODUCTS_PROD_CAT_IX |\
  \     1   (0)|\n|  17 |            索引快速全扫描        | PRODUCTS_PK          |     1\
  \   (0)|\n|* 18 |         位图索引范围扫描         | SALES_PROD_BIX       |            |\n\
  |  19 |    通过用户 ROWID 访问表           | SALES                |   483   (1)|\n\n谓词信息（通过操作\
  \ ID 识别）：\n```\n  9 - 过滤(\"CUST_LAST_NAME\"='Everett')\n 10 - 访问(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n 14 - 过滤(\"PROD_CATEGORY\"='Electronics')\n 15 - 访问(ROWID=ROWID)\n\
  \ 16 - 访问(\"PROD_CATEGORY\"='Electronics')\n 18 - 访问(\"S\".\"PROD_ID\"=\"P\".\"\
  PROD_ID\")\n```\n\n请注意，由于`CUST_ID`在`SH.CUSTOMERS`表中是唯一的，且`PROD_ID`在`SH.PRODUCTS`表中是唯一的，因此清单\
  \ 13-35 和清单 13-36 返回的行数应该相同；如果`SH.CUSTOMERS`表中相同的`CUST_ID`对应多行，那么清单 13-36 返回的行数将少于清单\
  \ 13-35。\n\n这个重写后的查询无法使用索引合并，因为正如我在第 10 章中提到的，该技术不支持`IN`列表。清单 13-36 中的执行计划展示了星形转换，这种替代方法提供了一个高效的执行计划。\n\
  \n执行计划显示，已使用`SH.PRODUCTS`表上的索引连接来获取`PROD_ID`的值列表，并且这些值已被用于在`SH.SALES`表的`SALES_PROD_BIX`索引中进行多次查找，以获取多个位图。这些位图是通过第\
  \ 12 行的`BITMAP KEY ITERATION`操作获得的。`BITMAP KEY ITERATION`的使用是星形转换的一个标志：每次你看到`BITMAP\
  \ KEY ITERATION`，就意味着发生了星形转换，反之亦然。⁴ 随着这些位图的获取，它们在第 11 行被合并，生成一个单一的位图，标识出所有来自电子产品类别的产品的`SH.SALES`表中的行。\n\
  \n类似的过程应用于`CUST_ID`的值，使用的是`SALES_CUST_BIX`索引。第 6 行的位图标识了对 14 位名叫 Abner Everett 的客户的销售记录。第\
  \ 6 行和第 11 行生成的位图被输入到第 5 行的`BITMAP AND`操作中，生成一个单一的位图，标识出同时满足两个谓词的所有行。既然我们有了最终的 ROWID\
  \ 列表，我们就可以访问`SH.SALES`表，仅获取我们需要的行。\n\n![image](img/sq.jpg)  **注意**  `SH.SALES`表是通过嵌套循环连接和一个`TABLE\
  \ ACCESS BY USER ROWID`操作访问的。这个方法实际上是 11gR2 引入的另一个转换的结果，可以通过在粗体显示的注释中添加一个加号来禁用它。如果禁用了通过嵌套循环进行表查找的转换，第\
  \ 4 行的`BITMAP CONVERSION TO ROWIDS`操作将成为`TABLE ACCESS BY LOCAL INDEX ROWID BATCHED`操作的子操作，嵌套循环连接就会消失。我不知道通过嵌套循环进行表查找的转换能提供什么好处。\n\
  \n请注意，要应用星形转换，你必须使用企业版，并且对于未加提示的查询，初始化参数`STAR_TRANSFORMATION_ENABLED`必须设置为`TRUE`或`TEMP_DISABLE`（我稍后会解释两者的区别）。\n\
  \n但是清单 13-36 中的查询与清单 13-35 中的查询并不相同：我们失去了选择维度列的能力。我们可以通过将维度表重新添加回我们的表列表中来解决这个问题，如清单\
  \ 13-37 所示。\n\n清单 13-37. 通过星形转换添加维度列\n\n```\nALTER SESSION SET star_transformation_enabled=temp_disable;\n\
  \nSELECT prod_id\n      ,cust_id\n      ,prod_name\n      ,cust_first_name\n   \
  \   ,time_id\n      ,amount_sold\n  FROM sh.sales s\n       JOIN sh.products USING\
  \ (prod_id)\n       JOIN sh.customers USING (cust_id)\n WHERE     cust_id IN (SELECT\
  \ c.cust_id\n                         FROM sh.customers c\n                    \
  \    WHERE cust_last_name = 'Everett')\n       AND prod_id IN (SELECT p.prod_id\n\
  \                         FROM sh.products p\n                        WHERE prod_category\
  \ = 'Electronics');\n\n| Id  | 操作                            | 名称              \
  \   | 成本 (%CPU)|\n```\n\n\n| 标识 | 操作 | 名称 | 成本 (%CPU) |\n|---|---|---|---|\n| 0\
  \ | SELECT STATEMENT | | 1348 (1) |\n|* 1 | HASH JOIN | | 1348 (1) |\n| 2 | TABLE\
  \ ACCESS BY INDEX ROWID BATCHED | PRODUCTS | 3 (0) |\n|* 3 | INDEX RANGE SCAN |\
  \ PRODUCTS_PROD_CAT_IX | 1 (0) |\n|* 4 | HASH JOIN | | 1345 (1) |\n|* 5 | TABLE\
  \ ACCESS FULL | CUSTOMERS | 423 (1) |\n| 6 | VIEW | VW_ST_C72FA945 | 923 (1) |\n\
  | 7 | NESTED LOOPS | | 498 (1) |\n| 8 | PARTITION RANGE ALL | | 440 (1) |\n| 9 |\
  \ BITMAP CONVERSION TO ROWIDS | | 440 (1) |\n| 10 | BITMAP AND | | |\n| 11 | BITMAP\
  \ MERGE | | |\n| 12 | BITMAP KEY ITERATION | | |\n| 13 | BUFFER SORT | | |\n|* 14\
  \ | TABLE ACCESS FULL | CUSTOMERS | 423 (1) |\n|* 15 | BITMAP INDEX RANGE SCAN |\
  \ SALES_CUST_BIX | |\n| 16 | BITMAP MERGE | | |\n| 17 | BITMAP KEY ITERATION | |\
  \ |\n| 18 | BUFFER SORT | | |\n|* 19 | VIEW | index$_join$_055 | 2 (0) |\n|* 20\
  \ | HASH JOIN | | |\n|* 21 | INDEX RANGE SCAN | PRODUCTS_PROD_CAT_IX | 1 (0) |\n\
  | 22 | INDEX FAST FULL SCAN | PRODUCTS_PK | 1 (0) |\n|* 23 | BITMAP INDEX RANGE\
  \ SCAN | SALES_PROD_BIX | |\n| 24 | TABLE ACCESS BY USER ROWID | SALES | 483 (1)\
  \ |\n\n谓词信息（通过操作标识识别）：\n1 - 访问(`\"ITEM_1\"=\"P\".\"PROD_ID\"`)\n3 - 访问(`\"PROD_CATEGORY\"\
  ='Electronics'`)\n4 - 访问(`\"ITEM_2\"=\"C\".\"CUST_ID\"`)\n5 - 过滤(`\"CUST_LAST_NAME\"\
  ='Everett'`)\n14 - 过滤(`\"CUST_LAST_NAME\"='Everett'`)\n15 - 访问(`\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\"`)\n19 - 过滤(`\"PROD_CATEGORY\"='Electronics'`)\n20 - 访问(`ROWID=ROWID`)\n\
  21 - 访问(`\"PROD_CATEGORY\"='Electronics'`)\n23 - 访问(`\"S\".\"PROD_ID\"=\"P\".\"\
  PROD_ID\"`)\n\n当 `STAR_TRANSFORMATION_ENABLED` 设置为 `TEMP_DISABLE` 时，代码清单 13-37 中显示的执行计划由此产生。\n\
  \n你会注意到代码清单 13-37 中的第 6 到 24 行与代码清单 13-36 中的第 1 到 19 行相同，但这次我们再次访问了 `SH.PRODUCTS`\
  \ 和 `SH.CUSTOMERS` 表各一次，以获取维度列。尽管我们访问了维度表各两次，但我们避免了从 `SH.SALES` 表中进行的大部分昂贵的表提取操作。\n\
  \n虽然这个查询开始看起来有点难以阅读，但它仍然不是最优的：为什么我们必须访问维度表两次？难道我们不能在第一次读取 `SH.PRODUCTS` 和 `SH.CUSTOMERS`\
  \ 表时就缓存我们 SELECT 列表中的列吗？\n\n假设我们运行了代码清单 13-38 所示的脚本。\n\n代码清单 13-38. 手动创建临时表的星型转换\n\
  \n```sql\nCREATE GLOBAL TEMPORARY TABLE cust_cache ON COMMIT PRESERVE ROWS\nAS\n\
  \   SELECT cust_id, cust_first_name\n     FROM sh.customers c\n    WHERE cust_last_name\
  \ = 'Everett';\n\nCREATE GLOBAL TEMPORARY TABLE prod_cache ON COMMIT PRESERVE ROWS\n\
  AS\n   SELECT prod_id, prod_name\n     FROM sh.products p\n    WHERE prod_category\
  \ = 'Electronics';\n\nSELECT s.prod_id\n      ,s.cust_id\n      ,p.prod_name\n \
  \     ,c.cust_first_name\n      ,s.time_id\n      ,s.amount_sold\n  FROM sh.sales\
  \ s\n       JOIN cust_cache c ON s.cust_id = c.cust_id\n       JOIN prod_cache p\
  \ ON s.prod_id = p.prod_id\n WHERE     s.prod_id IN (SELECT prod_id FROM prod_cache)\n\
  \       AND s.cust_id IN (SELECT cust_id FROM cust_cache);\n```\n\n| 标识 | 操作 | 名称\
