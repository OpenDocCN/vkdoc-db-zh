- "# 第 19 章 高级调优技术\n\n![image](img/frontdot.jpg)\n\n当我最初规划这本书时，我想象这一章会比现在的篇幅长得多。事实上，我在\
  \ SQL 调优中使用的大多数高级技术已经在前面的章节中讨论过了。我只是有几个教育性（即使比较晦涩）的案例需要讲一下。让我们从一些使用 ROWID 伪列的不同寻常的方法开始。\n\
  \nROWID 伪列的可用性是 Oracle 数据库产品的一个显著特征。这个伪列可以用来绕过产品的许多特性。我使用*特性*这个词而不是一个更具贬义的名词，因为无意批评。事实上，CBO\
  \ 必须在尽可能短的时间内做出执行计划的决定，考虑那些只有在极少数情况下才有意义的选项是没有意义的。\n\n## 利用 `INDEX FAST FULL SCAN`\n\
