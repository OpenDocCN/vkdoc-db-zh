- '# 关于 IOUG Press


  IOUG Press 是 **独立 Oracle 用户组 (IOUG)** 和 **Apress** 共同合作的成果，旨在就 Oracle 数据库及相关主题提供尽可能最高质量的内容。IOUG
  是全球领先的独立组织，服务于 Oracle 产品的专业用户。Apress 是一家领先的独立技术出版商，以为严肃的技术专业人士开发高质量、无水分的内容而闻名。IOUG
  和 Apress 通过 IOUG Press 强强联手，为使用 Oracle 产品的职场专业人士提供最佳内容和出版机会。


  我们的共同目标包括：

