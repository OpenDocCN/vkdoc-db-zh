  \ 'CH9_STATS');\nEND;\n/\n```\n\n*   清单 9-1 创建了一个名为 `STATEMENT` 的表，该表将构成本章其他演示的基础。`STATEMENT`\
  \ 表被加载了数据，创建了一些索引，然后收集了统计信息。在这个阶段，你必须想象这个表位于源系统上，即我上面描述的场景中的测试系统。\n*   统计信息复制过程的第一阶段是创建一个常规的堆表来存放导出的统计信息。该表必须具有特定的格式，并通过调用\
  \ `DBMS_STATS.CREATE_STAT_TABLE` 来创建。我将该堆表命名为 `CH9_STATS`，但你也可以使用任何其他名称。\n*   下一步是导出统计信息。我使用\
  \ `DBMS_STATS.EXPORT_TABLE_STATS` 完成了这一步骤，该过程默认导出表、其列和相关索引的统计信息。正如你可能想象的那样，此过程还有用于数据库和模式等的变体。\n\
