  \ 13-22 展示的这类查询，可能是由不熟悉在 `GROUP BY` 操作中使用 `ROLLUP` 关键字的人编写的。\n\n`TEMP TABLE TRANSFORMATION`\
  \ 操作标志着创建一个或多个临时表，这些表仅在该操作期间存在。该操作的子节点总是一个或多个 `LOAD AS SELECT` 操作（它们将行插入临时表），外加一个用于主查询的额外子节点（该主查询利用创建的一个或多个临时表）。\n\
  \n清单 13-22 使用了提取子查询 `Q1` 两次，但该子查询只被求值一次；查询的结果存储在一个名称古怪的临时表中（本例中为 `SYS_TEMP_0FD9D672C_4E5E5D`），并且该临时表在\
  \ `UNION ALL` 操作的两个分支中被使用。\n\n当选择的是对象类型或 `LOB` 时，提取子查询物化是不可能的，并且在分布式事务中该转换也是非法的。\n\
  \n在合法的情况下，提取子查询物化是一种启发式优化。如果一个子查询只被引用一次，则它不会被物化，但如果它被引用两次或更多次，通常就会被物化。³ 你可以在清单 13-22\
  \ 中看到，提取子查询 `Q2` 只被引用了一次，因此它没有被物化。CBO 选择改为对提取子查询与主查询进行简单的视图合并。\n\n所有这些听起来都很合理，但千万别以为提取子查询物化是无需动脑筋的选择。我们将在第\
