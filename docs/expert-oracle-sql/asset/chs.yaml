  \ 树，并且所有 DFO 都由一个 `PQSS` 处理。不幸的是，一些 SQL 语句需要不止一个 DFO 树，有时一个 DFO 由 QC 处理。清单 8-22\
  \ 演示了这些要点。\n\n清单 8-22. 具有多 DFO 树的并行查询\n\n```sql\nCOMMIT;\n\nALTER SESSION DISABLE\
  \ PARALLEL DML;\n\nWITH q1\n     AS (  SELECT /*+\n                     parallel(T1)\n\
  \                     full(t1)\n                     no_parallel(t2)\n         \
