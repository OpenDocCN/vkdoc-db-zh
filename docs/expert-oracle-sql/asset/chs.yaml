  \n现在，你可能在疑惑为什么简单视图合并和复杂视图合并被分开讨论。毕竟，这两种转换做的事情是一样的，并且都由 `MERGE` 和 `NO_MERGE` 暗示来管理。关键的区别在于，简单视图合并是一种*启发式*转换，而复杂视图合并是一种*基于成本的*转换。\n\
  \n如果你不合并一个复杂视图，你就有机会提前聚合，减少输入到连接中的行数。如果你*确实*合并了，那么你的连接可以减少被聚合的行数。因此，是先执行连接还是先执行聚合，取决于哪种操作能最大程度地减小中间结果集。事实上，如果你从清单\
  \ 13-21 的原始查询中移除 `WHERE` 子句，除非你包含了 `MERGE` 暗示，否则复杂视图合并将不会发生。\n\n这听起来熟悉吗？应该是的。我们这里进行的讨论，与之前关于\
  \ `DISTINCT` 位置和 `GROUP BY` 位置转换的讨论完全相同，只是方向相反！可下载的资料表明，如果你取清单 13-16 中的转换后查询，并添加一个\
  \ `MERGE` 暗示，你就可以通过反转原始转换来重建原始查询。²\n\n## 提取子查询物化\n\n在第 1 章中，我解释了提取子查询的一个关键好处是它们可以在一个查询中被多次使用。事实上，当它们被多次使用时，会创建一个专属于该语句的临时表；这个表保存了提取子查询的结果。清单\
  \ 13-22 演示了这一点。\n\n清单 13-22. 提取子查询物化\n\n```sql\nWITH q1\n     AS (  SELECT prod_name,\
