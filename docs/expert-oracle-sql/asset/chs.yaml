  =1919)\n7 - access(\"P\".\"PROD_CATEGORY\"='Electronics')\n9 - filter(\"S1\".\"\
  AMOUNT_SOLD\"> (SELECT /*+ PUSH_SUBQ */ AVG(\"S2\".\"AMOUNT_SOLD\")\n          \
  \    FROM \"SH\".\"SALES\" \"S2\" WHERE \"S2\".\"PROD_ID\"=:B1))\n11 - access(\"\
  S1\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n16 - access(\"S2\".\"PROD_ID\"=:B1)\n```\n\n\
  ## 子查询推入分析\n\n`Listing 13-25`无法在与`SH.PRODUCTS`的连接中使用`USING`子句，因为需要在子查询中使用表别名来限定引用。`Listing\
  \ 13-25`中查询的执行计划使用哈希连接来访问`SH.SALES`表，因此无法提前评估子查询。非法提示所做的只是防止子查询解嵌套。然而，如果我们应用`LEADING`和`USE_NL`提示来强制使用嵌套循环连接，那么将子查询推入到与`SH.CUSTOMERS`连接之前进行评估现在是完全合法的（尽管不建议这样做）。第\
  \ 9 行的表访问现在有两个子节点。第一个子节点为位图索引操作返回的每一行获取`ROWID`。理论上，操作 9 的第二个子节点会对每个`ROWID`进行评估，但子查询缓存确保子查询只被评估了\
  \ 13 次，电子类别中的 13 种产品各一次。如果子查询评估被推迟到与`SH.CUSTOMERS`连接之后，子查询将只被评估 4 次，因为 1919 年出生的客户只购买了\
  \ 13 种电子产品中的 4 种。\n\n## 连接谓词下推\n\n当视图合并不可取或不可能时，连接谓词下推（`JPPD`）转换是一个备选方案。请看`Listing\
  \ 13-26`。\n\n### Listing 13-26. 连接谓词下推\n\n```\nWITH agg_q\n     AS (  SELECT /*+\
  \   push_pred */\n                  /* no_push_pred */\n                  s.cust_id\n\
  \                 ,prod_id\n                 ,p.prod_name\n                 ,SUM\
  \ (s.amount_sold) total_amt_sold\n             FROM sh.sales s JOIN sh.products\
  \ p USING (prod_id)\n         GROUP BY s.cust_id, prod_id)\nSELECT cust_id\n   \
  \   ,c.cust_first_name\n      ,c.cust_last_name\n      ,c.cust_email\n      ,agg_q.total_amt_sold\n\
  \  FROM agg_q RIGHT JOIN sh.customers c USING (cust_id)\n WHERE cust_first_name\
  \ = 'Abner' AND cust_last_name = 'Everett';\n```\n\n### 未转换的执行计划 (`NO_PUSH_PRED`)\n\
  \n```\n| Id  | Operation                 | Name        | Cost (%CPU)|\n|   0 | SELECT\
  \ STATEMENT          |             |  5519   (1)|\n|*  1 |  HASH JOIN OUTER    \
  \      |             |  5519   (1)|\n|*  2 |   TABLE ACCESS FULL       | CUSTOMERS\
  \   |   423   (1)|\n|   3 |   VIEW                    |             |  5095   (1)|\n\
  |   4 |    HASH GROUP BY          |             |  5095   (1)|\n|*  5 |     HASH\
  \ JOIN             |             |  3021   (1)|\n|   6 |      INDEX FULL SCAN  \
  \    | PRODUCTS_PK |     1   (0)|\n|   7 |      VIEW                 | VW_GBC_6\
  \    |  3019   (1)|\n|   8 |       HASH GROUP BY       |             |  3019   (1)|\n\
  |   9 |        PARTITION RANGE ALL|             |   517   (2)|\n|  10 |        \
  \ TABLE ACCESS FULL | SALES       |   517   (2)|\n```\n\n谓词信息（由操作 ID 标识）：\n\n```\n\
  1 - access(\"C\".\"CUST_ID\"=\"AGG_Q\".\"CUST_ID\"(+))\n2 - filter(\"C\".\"CUST_FIRST_NAME\"\
  ='Abner' AND\n              \"C\".\"CUST_LAST_NAME\"='Everett')\n5 - access(\"ITEM_1\"\
  =\"P\".\"PROD_ID\")\n```\n\n### 转换后的查询\n\n```\nSELECT c.cust_id\n      ,agg_q.prod_id\n\
  \      ,agg_q.prod_name\n      ,c.cust_first_name\n      ,c.cust_last_name\n   \
  \   ,c.cust_email\n      ,agg_q.total_amt_sold\n  FROM sh.customers c\n       OUTER\
  \ APPLY\n       (  SELECT prod_id, p.prod_name, SUM (s.amount_sold) total_amt_sold\n\
  \            FROM sh.sales s JOIN sh.products p USING (prod_id)\n           WHERE\
  \ s.cust_id = c.cust_id\n        GROUP BY prod_id, p.prod_name) agg_q\n WHERE cust_first_name\
  \ = 'Abner' AND cust_last_name = 'Everett';\n```\n\n### 转换后的执行计划（默认）\n\n```\n| Id\
  \  | Operation                                        | Name           | Cost (%CPU)|\n\
  |   0 | SELECT STATEMENT                                 |                |   480\
  \   (0)|\n|   1 |  NESTED LOOPS OUTER                              |           \
  \     |   480   (0)|\n|*  2 |   TABLE ACCESS FULL                              |\
  \ CUSTOMERS      |   423   (1)|\n|   3 |   VIEW PUSHED PREDICATE               \
  \           |                |    58   (0)|\n|   4 |    SORT GROUP BY          \
  \                       |                |    58   (0)|\n|*  5 |     HASH JOIN \
  \                                   |                |    58   (0)|\n|   6 |   \
  \   VIEW                                        | VW_GBC_6       |    55   (0)|\n\
  |   7 |       SORT GROUP BY                              |                |    55\
  \   (0)|\n|   8 |        PARTITION RANGE ALL                       |           \
  \     |    55   (0)|\n|   9 |         TABLE ACCESS BY LOCAL INDEX ROWID BATCHED|\
  \ SALES          |    55   (0)|\n|  10 |          BITMAP CONVERSION TO ROWIDS  \
  \           |                |            |\n|* 11 |           BITMAP INDEX SINGLE\
  \ VALUE              | SALES_CUST_BIX |            |\n|  12 |      TABLE ACCESS\
  \ FULL                           | PRODUCTS       |     3   (0)|\n```\n\n谓词信息（由操作\
  \ ID 标识）：\n\n```\n2 - filter(\"C\".\"CUST_FIRST_NAME\"='Abner' AND \"C\".\"CUST_LAST_NAME\"\
  ='Everett')\n5 - access(\"ITEM_1\"=\"P\".\"PROD_ID\")\n11 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n```\n\n\n\n清单 13-26 中的查询展示了向名为 Abner Everett 的 14 位客户销售的每种产品的总销售额。外连接的使用排除了简单视图合并和复杂视图合并的可能性，因此，如果没有\
  \ JPPD，`GROUP BY` 操作将为每个客户和产品的组合生成 328,395 行数据。JPPD 转换要求从 `SH.CUSTOMERS` 到视图进行嵌套循环连接，以便在每次评估子查询时都能应用\
  \ `CUST_ID` 上的谓词。请注意，清单 13-26 中的两个执行计划变体都显示了应用了分组下推转换；`SH.SALES` 中的行在与产品表连接之前，先按\
  \ `CUST_ID` 进行了分组。\n\n根据优化器团队的博客文章，[`blogs.oracle.com/optimizer/entry/basics_of_join_predicate_pushdown_in_oracle`](https://blogs.oracle.com/optimizer/entry/basics_of_join_predicate_pushdown_in_oracle)，JPPD\
  \ 仅支持以下类型的视图：\n\n*   `UNION ALL/UNION` 视图\n*   外连接视图\n*   反连接视图\n*   半连接视图\n*  \
  \ `DISTINCT` 视图\n*   `GROUP-BY` 视图\n\n为什么 JPPD 要以这种方式受限呢？嗯，如果这些条件都不满足，那么启发式的简单视图合并转换几乎肯定会应用，从而使\
  \ JPPD 的限制变得无关紧要。不过，我将在第 19 章中介绍一个晦涩的案例，在该案例中既不支持 JPPD，也不支持简单视图合并。\n\nJPPD 是一种基于成本的转换，可以通过执行计划中出现的\
  \ `VIEW PUSHED PREDICATE` 或 `UNION ALL PUSHED PREDICATE` 操作轻松识别。在早期阶段进行过滤的好处，是以必须多次执行子查询为代价的。如果多次评估子查询的成本过高，CBO\
  \ 可能会选择不应用该转换，然后使用哈希连接，这样子查询只需评估一次。\n\n尽管 JPPD 已存在很长时间，但直到 12c SQL 语法出现，我们才有能力展示转换的结果。清单\
  \ 13-26 中的转换查询使用了 ANSI 语法变体进行外部 LATERAL 连接，其效果应与连接谓词下推转换完全相同。然而，在 12.1.0.1 中，似乎存在一个\
  \ bug，即使提供了提示，也会阻止 CBO 为 LATERAL 连接生成最优的执行计划。\n\n## 子查询去关联\n\nJPPD 和子查询去关联是彼此互逆的转换，就像复杂视图合并和分组下推是彼此互逆的转换一样。子查询去关联在清单\
  \ 13-27 中展示。\n\n清单 13-27. 子查询去关联\n\n```\nSELECT o.order_id\n      ,o.order_date\n\
  \      ,o.order_mode\n      ,o.customer_id\n      ,o.order_status\n      ,o.order_total\n\
  \      ,o.sales_rep_id\n      ,o.promotion_id\n      ,agg_q.max_quantity\n  FROM\
  \ oe.orders o\n       CROSS APPLY(SELECT /*+   decorrelate */\n                \
  \           /* no_decorrelate */\n                          MAX (oi.quantity) max_quantity\n\
  \                     FROM oe.order_items oi\n                    WHERE oi.order_id\
  \ = o.order_id) agg_q\n WHERE o.order_id IN (2458, 2397);\n\n-- 未转换的执行计划 (NO_DECORRELATE)\n\
  \n| Id  | Operation                              | Name            | Cost (%CPU)|\n\
  \n|   0 | SELECT STATEMENT                       |                 |     8   (0)|\n\
  |   1 |  NESTED LOOPS                          |                 |     8   (0)|\n\
  |   2 |   INLIST ITERATOR                      |                 |            |\n\
  |   3 |    TABLE ACCESS BY INDEX ROWID         | ORDERS          |     2   (0)|\n\
  |*  4 |     INDEX UNIQUE SCAN                  | ORDER_PK        |     1   (0)|\n\
  |   5 |   VIEW                                 | VW_LAT_535DE542 |     3   (0)|\n\
  |   6 |    SORT AGGREGATE                      |                 |            |\n\
  |   7 |     TABLE ACCESS BY INDEX ROWID BATCHED| ORDER_ITEMS     |     3   (0)|\n\
  |*  8 |      INDEX RANGE SCAN                  | ITEM_ORDER_IX   |     1   (0)|\n\
  \nPredicate Information (identified by operation id):\n\n4 - access(\"O\".\"ORDER_ID\"\
  =2397 OR \"O\".\"ORDER_ID\"=2458)\n   8 - access(\"OI\".\"ORDER_ID\"=\"O\".\"ORDER_ID\"\
  )\n\n-- 转换后的查询\n\nSELECT o.order_id order_id\n        ,o.order_date order_date\n\
  \        ,o.order_mode order_mode\n        ,o.customer_id customer_id\n        ,o.order_status\
  \ order_status\n        ,o.order_total order_total\n        ,o.sales_rep_id sales_rep_id\n\
  \        ,o.promotion_id promotion_id\n        ,MAX (oi.quantity) max_quantity\n\
  \    FROM oe.orders o\n         LEFT JOIN oe.order_items oi\n            ON    \
  \ oi.order_id = o.order_id\n               AND (oi.order_id = 2397 OR oi.order_id\
  \ = 2458)\n   WHERE (o.order_id = 2397 OR o.order_id = 2458)\nGROUP BY o.order_id\n\
  \        ,o.ROWID\n        ,o.promotion_id\n        ,o.sales_rep_id\n        ,o.order_total\n\
  \        ,o.order_status\n        ,o.customer_id\n        ,o.order_mode\n      \
  \  ,o.order_date\n        ,o.order_id;\n\n-- 转换后的执行计划（默认）\n\n| Id  | Operation \
  \                     | Name        | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT \
  \              |             |     5   (0)|\n|   1 |  HASH GROUP BY            \
  \     |             |     5   (0)|\n|*  2 |   HASH JOIN OUTER              |   \
  \          |     5   (0)|\n|   3 |    INLIST ITERATOR             |            \
  \ |            |\n|   4 |     TABLE ACCESS BY INDEX ROWID| ORDERS      |     2 \
  \  (0)|\n|*  5 |      INDEX UNIQUE SCAN         | ORDER_PK    |     1   (0)|\n|*\
  \  6 |    TABLE ACCESS FULL           | ORDER_ITEMS |     3   (0)|\n\nPredicate\
  \ Information (identified by operation id):\n\n2 - access(\"OI\".\"ORDER_ID\"(+)=\"\
  O\".\"ORDER_ID\")\n   5 - access(\"O\".\"ORDER_ID\"=2397 OR \"O\".\"ORDER_ID\"=2458)\n\
  \   6 - filter(\"OI\".\"ORDER_ID\"(+)=2397 OR \"OI\".\"ORDER_ID\"(+)=2458)\n```\n\
  \n我本可以使用清单 13-26 中的转换查询来演示子查询去关联，但需要相当复杂的提示来防止 JPPD 应用于去关联后的结果！我没有那样做，而是使用了 `OE.ORDERS`\
  \ 和 `OE.ORDER_ITEMS` 表的 LATERAL 连接来演示一些额外的要点。\n\n清单 13-27 列出了 `OE.ORDERS` 中来自订单\
  \ 2397 和 2458 的两行，以及匹配订单在 `OE.ORDER_ITEMS` 中的 `QUANTITY` 最大值。\n\n转换后的查询现在可以使用哈希连接，这是普通人不太可能想到的。以下是一些值得注意的有趣点：\n\
  \n*   尽管这是一个内 LATERAL 连接 `(CROSS APPLY)` 而不是外 LATERAL 连接 `(OUTER APPLY)`，但转换后的查询仍然使用了外连接。这是因为即使订单没有任何行项目，子查询也保证返回恰好一行。\n\
  *   `GROUP BY` 子句包含了 `O.ROWID`。在这种情况下没有必要这样做，因为 `GROUP BY` 列表中已经包含了主键，但通常需要这样做以确保不会对连接左侧的行进行聚合；聚合只适用于右侧，这里是\
  \ `OE.ORDER_ITEMS`。\n*   该转换成功地应用了传递闭包，从而允许对 `OE.ORDERS` 和 `OE.ORDER_ITEMS` 分别进行过滤。\n\
