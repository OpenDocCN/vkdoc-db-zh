  \ SELECT STATEMENT      |       |   918K|    87M|       |  7810|\n|*  1 |  VIEW\
  \                 |       |   918K|    87M|       |  7810|\n|   2 |   WINDOW SORT\
  \         |       |   918K|    25M|    42M|  7810|\n|   3 |    PARTITION RANGE ALL|\
  \       |   918K|    25M|       |   440|\n|   4 |     TABLE ACCESS FULL | SALES\
  \ |   918K|    25M|       |   440|\n\nPredicate Information (identified by operation\
  \ id):\n1 - filter(\"TIME_ID\"=TO_DATE(' 2001-10-18 00:00:00', 'syyyy-mm-dd hh24:mi:ss'))\n\
  \n代码清单 17-15 列出了发生在 2001 年 10 月 18 日的所有来自`SH.SALES`的数据。添加了一个额外的列`AVG_WEEKLY_AMOUNT`，它列出了当前客户在截至当前日期的七天内交易的平均值。\n\
  \n![image](img/sq.jpg) **注意** 正如我在第 7 章中解释的那样，当指定`RANGE`时，SQL 术语`CURRENT ROW`实际上意味着当前值，因此即使当前行中出现后续行，也会包含当天的所有销售记录。\n\
  \n这个查询效率非常低下。效率低下的原因是我们先对整个`SH.SALES`表进行排序，然后才选择我们需要的行——你可以看到过滤谓词是由第 1 行的操作应用的。我们无法将谓词推送到视图中，因为我们需要一周的数据来计算分析函数。我们可以通过添加第二个不同的、在调用分析函数之前应用的谓词来轻松改进此查询的性能。代码清单\
  \ 17-16 展示了这种方法。\n\n### 性能优化方法\n\n代码清单 17-16。添加额外谓词以优化分析性能\n\n```sql\nWITH q1\n\
  \     AS (SELECT s.*\n               ,AVG (\n                   amount_sold)\n \
