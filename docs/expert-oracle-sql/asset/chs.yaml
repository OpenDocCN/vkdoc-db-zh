  \ 17-19 在我们的视图定义中添加了两列`MIN_TIME`和`MAX_TIME`，可以在调用查询中使用它们来指定所需的日期范围。我们将维度表连接了两次，这样我们就有两个值可以被嵌入的谓词使用。\n\
  \n### 在早期版本中使用横向连接 (清单 17-20)\n\n这很好。但如果你必须处理像 John 那样的 12c 之前的数据库怎么办？嗯，事实证明横向连接在\
  \ Oracle 数据库中实际上已经可用很长时间了。然而，要在旧版本中使用它们，你需要定义几个数据字典类型，如清单 17-20 所示。\n\n#### 使用数据字典类型的横向连接\
  \ (清单 17-20)\n\n```sql\nCREATE OR REPLACE TYPE sales_analytics_ot\n   FORCE AS OBJECT\n\
  (\n   prod_id NUMBER\n  ,cust_id NUMBER\n  ,time_id DATE\n  ,channel_id NUMBER\n\
  \  ,promo_id NUMBER\n  ,quantity_sold NUMBER (10, 2)\n  ,amount_sold NUMBER (10,\
  \ 2)\n  ,avg_weekly_amount NUMBER (10, 2)\n);\n\nCREATE OR REPLACE TYPE sales_analytics_tt\
  \ AS TABLE OF sales_analytics_ot;\n\nCREATE OR REPLACE VIEW sales_analytics\nAS\n\
  \   SELECT t1.time_id min_time, t2.time_id max_time, s2.*\n     FROM sh.times t1\n\
  \         ,sh.times t2\n         ,TABLE (\n             CAST (\n               \
  \ MULTISET (\n                   SELECT s.*\n                         ,AVG (\n \
  \                            amount_sold)\n                          OVER (\n  \
  \                           PARTITION BY cust_id\n                             ORDER\
  \ BY time_id\n                             RANGE BETWEEN INTERVAL '6' DAY PRECEDING\n\
  \                                   AND     CURRENT ROW)\n                     \
  \        avg_weekly_amount\n                     FROM sh.sales s\n             \
  \       WHERE s.time_id BETWEEN t1.time_id - 6 AND t2.time_id)\n               \
  \           AS sales_analytics_tt))s2\n                    WHERE s2.time_id >= t1.time_id;\n\
  \nSELECT *\n    FROM sales_analytics\n   WHERE min_time = DATE '2001-10-01' AND\
  \ max_time = DATE '2002-01-01';\n```\n\n执行计划输出：\n\n```\n| Id  | Operation      \
