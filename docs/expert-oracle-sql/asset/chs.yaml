- '# 第五部分 使用 TSTATS 管理统计信息


  ## 第 20 章 使用 TSTATS 管理统计信息


  本章介绍了一些在 SQL 调优中较少使用、且前文未涵盖的技术。与之前一样，你应该更多地将这些技术视为如何思考调优问题的示例，而非需要死记硬背的原则。如果你确实需要借鉴本章的经验，那么你可能正在解决一个与示例略有不同的问题，因此你的解决方案很可能也需要与本章提供的方案有所不同，或细微或显著。


  至此，我们已经结束了关于 SQL 优化的讨论，现在是时候将注意力转向如何在生产环境中稳定我们精心调优的应用程序了。我在第 6 章介绍了 TSTATS 的概念，并将在第
  20 章讨论其细节。


  __________________


  ¹虽然我使用的提示明确表达了意图，但使用单个 `NO_QUERY_TRANSFORMATION` 提示是替代三个 `NO_ELIMINATE_JOIN` 提示的一个可能更具未来适应性的选择。


  ![image](img/frontdot.jpg)


  本章阐述了一种可用于在生产系统上管理对象统计信息的激进方法。我的一位客户将这种方法命名为 TSTATS，意为“Tony 的统计信息”，我必须说我很喜欢这个名字。它满足了我的虚荣心！然而，正如我已经说过的，我并非唯一考虑本章所解决问题的人，其他人也独立开发了类似的解决方案，例如
  Adrian Billington。


  我在第 6 章解释了 TSTATS 要解决的问题：在生产系统上收集统计信息是一项有风险的活动，收集到的统计信息可能导致执行计划性能不佳。但是，如果按照 Oracle
  推荐的传统方法来管理对象统计信息，这种风险是不可避免的。TSTATS 允许你消除在生产系统上收集统计信息这一有风险的活动，让你能够高枕无忧，知道在你休息时执行计划不会变得更糟。


  关于 TSTATS，有好消息也有坏消息。坏消息是 TSTATS 不是一个快速的“即插即用”解决方案。对于一个复杂的应用程序，你可能需要花费数周甚至数月的时间来准备部署
  TSTATS。你需要一位 Oracle 性能专家的服务来启动 TSTATS。请注意，我说的是*专家*，而不是*有经验的*。如果这样的专家不能全职在岗，你需要安排他来审查执行计划并确保其正常运行。此外，你很可能会遇到同事和管理层的反对；有些人会（相当错误地）声称
  TSTATS 会使你的数据库无法获得 Oracle 支持。


  ### TSTATS 与 Oracle 支持


  `DBMS_STATS` 包中用于手动创建或更改统计信息的过程是完全文档化并受支持的。使用这些提供的过程与手动更新数据字典中的表有很大不同：使用提供的过程是受支持的，但直接更新数据字典中的行则不受支持。


  确实，如果你对对象统计信息的更改导致执行计划比未更改前更差，Oracle 支持不太可能会特别同情。但是，如果你遇到任何其他类型的问题（例如执行期间出现 ORA-0600
  错误），无论你是否使用 TSTATS，你都应该拥有向 Oracle 寻求支持的同等权利。


  关于 TSTATS 的好消息是，当它被正确开发时，它是有效的！在初始设置之后，你可能永远不再需要在任何开发、测试或生产系统上收集统计信息了，当然，除非是为新添加到应用程序中的表或索引生成统计信息。


  ![image](img/sq.jpg) **注意** 我在 TSTATS 方面犯的最大错误是在从 10g 升级到 11g 时重新收集了统计信息。这完全没有必要，只是制造了许多不必要的工作。在成功部署
  TSTATS 后，对表重新收集统计信息要非常谨慎。


  成功的 TSTATS 部署的两个关键是管理层的支持和正确完成这项工作的承诺——一个考虑不周的实施只会让反对者欢呼“我早就告诉过你”，而你将永远不会再有第二次机会。


  考虑到这些，在继续之前，你需要思考以下问题的答案：


  *   你的性能稳定性问题是否严重到值得投入 TSTATS？

  *   是否有更简单的解决方案，例如减少收集统计信息的频率？比如作为季度发布的一部分来收集？

  *   是否有办法*安全地*简化 TSTATS 方法，或者你真的需要本章描述的所有花哨功能？

  *   你的问题是整个应用程序范围的，还是可以在某种程度上限制 TSTATS 的范围？

  *   本章是否解释了解决你问题所需的所有内容，或者你的应用程序是否有需要额外考虑的特殊情况？例如，在特定情况下，数据量是否会有多个数量级的变化？


  当你回答这些问题时，请记住没有绝对的对错答案。例如，如果你决定将 TSTATS 的范围缩小到几个关键表，决定不考虑直方图，并对所有使用范围谓词的查询使用提示，你可能低估了需要做的事情。就像本书及生活中其他地方提出的所有问题一样，决策最好在掌握尽可能多的信息后做出，因此请与你的同事交流并慢慢来。


  既然我已经营造了紧张气氛，我需要告诉你这个神奇的 TSTATS 技术包含什么。它有几个要素，如下所示：


  *   **列统计信息的定制**。这是 TSTATS 最重要的部分，也是我在第 6 章介绍的一个概念。

  *   **分区表统计信息的管理**。显然，如果你没有分区表，就不需要担心 TSTATS 的这一部分。

  *   **临时表统计信息的管理**。

  *   **部署 TSTATS**。


  让我们开始吧，重新审视列统计信息这个主题，我在第 6 章介绍过它。


  ### 管理列统计信息


  当你停止在生产系统上收集统计信息时，朝着稳定执行计划迈出的最重要一步是，按照清单 6-8 所示的方式消除列统计信息的高值和低值。然而，还有几个其他问题需要考虑，例如：


  *   只有一个值的列

  *   具有倾斜数据值的列

  *   相关的列和表达式

  *   用于范围谓词的列


  重要的是要认识到，大多数表中的大多数列不需要任何特殊考虑：与未在 `WHERE` 或 `HAVING` 子句谓词中使用的列相关的统计信息不会被 CBO 使用，即使一个列用于谓词中，它也可能不是基于时间的，可能没有任何倾斜数据，可能不会在谓词中与任何相关列一起使用，也可能不用于范围谓词。重要的是不要低估手头的任务，但同样重要的是不要高估它。


  #### 基于时间的列




  '
- "# 优化基于时间列的统计信息\n\n正如我们在第 6 章中所讨论的，基于时间的列（如日期或序列号），如果统计信息未定期收集，可能会导致执行计划发生不期望的变化。您可以通过移除`HIGH_VALUE`和`LOW_VALUE`这两个统计信息列来防止这些不期望的执行计划变更。然而，除了少数我们稍后将讨论的例外情况外，即使该列并非基于时间的，移除`HIGH_VALUE`和`LOW_VALUE`统计信息列通常也没有坏处。\n\
  \n![image](img/sq.jpg) **注意** 在本书定稿之际，我发现版本 12.1.0.1 中引入了一个错误：当两个表的连接列都缺少`HIGH_VALUE`和`LOW_VALUE`时，会导致连接基数计算错误。此问题的一个解决方法是设置一个极高的`HIGH_VALUE`和一个极低的`LOW_VALUE`。这个解决方法包含在可下载的资料中，但为了避免不必要的复杂性，本书默认假设将`HIGH_VALUE`和`LOW_VALUE`设置为`NULL`不会引发问题。\n\
  \n我通常的建议是，在设置 TSTATS 时，首先为您模式中的所有对象列移除`HIGH_VALUE`和`LOW_VALUE`统计信息列，除非您事先已知存在我稍后将介绍的例外情况。如果您不了解某些例外情况，也不必担心。您会在测试过程中发现它们。\n\
  \n代码清单 20-1 展示了一个名为`TSTATS`的包中的过程`ADJUST_COLUMN_STATS_V1()`，用于从指定表中移除`HIGH_VALUE`和`LOW_VALUE`统计信息列。\n\
  \n代码清单 20-1. 移除`HIGH_VALUE`和`LOW_VALUE`统计信息列\n\n```sql\nCREATE OR REPLACE PACKAGE\
  \ tstats\nAS\n-- 其他未显示的过程\n\nPROCEDURE adjust_column_stats_v1 (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE);\n\
  \n-- 其他未显示的过程\nEND tstats;\n\nCREATE OR REPLACE PACKAGE BODY tstats\nAS\n-- 其他未显示的过程\n\
  \nPROCEDURE adjust_column_stats_v1 (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE)\n\
  \   AS\n      CURSOR c1\n      IS\n         SELECT *\n           FROM all_tab_col_statistics\n\
  \          WHERE     owner = p_owner\n                AND table_name = p_table_name\n\
  \                AND last_analyzed IS NOT NULL;\n   BEGIN\n      FOR r IN c1\n \
  \     LOOP\n         DBMS_STATS.delete_column_stats (ownname         => r.owner\n\
  \                                        ,tabname         => r.table_name\n    \
  \                                    ,colname         => r.column_name\n       \
  \                                 ,cascade_parts   => TRUE\n                   \
  \                     ,no_invalidate   => TRUE\n                               \
  \         ,force           => TRUE);\n         DBMS_STATS.set_column_stats (ownname\
  \         => r.owner\n                                     ,tabname         => r.table_name\n\
  \                                     ,colname         => r.column_name\n      \
  \                               ,distcnt         => r.num_distinct\n           \
  \                          ,density         => r.density\n                     \
  \                ,nullcnt         => r.num_nulls\n                             \
  \        ,srec            => NULL -- 无 HIGH_VALUE/LOW_VALUE\n                  \
  \                   ,avgclen         => r.avg_col_len\n                        \
  \             ,no_invalidate   => FALSE\n                                     ,force\
  \           => TRUE);\n      END LOOP;\n   END adjust_column_stats_v1;\n-- 其他未显示的过程\n\
  END tstats;\n```\n\n代码清单 20-1 中展示的过程会遍历指定表中所有具有列统计信息的列，然后删除并重新添加列统计信息，但不含`HIGH_VALUE`和`LOW_VALUE`部分。\n\
  \n## `NUM_DISTINCT=1`的列\n\n我发现了一个相当奇特的 CBO 行为，它与那些根据对象统计信息，每一行都具有相同值（且该列值不为`NULL`）的列有关。让我举个例子。代码清单\
  \ 16-4 展示了如何通过使用`NULL`来表示列中最常见的值，以最小化索引大小。该示例使用了一个名为`SPECIAL_FLAG`的列。如果行是特殊的，则`SPECIAL_FLAG`设置为`Y`；否则`SPECIAL_FLAG`为`NULL`。在这种情况下，`SPECIAL_FLAG`的不同值数量为\
  \ 1，因为在 CBO（或数据库理论家）看来，`NULL`不算作一个值。\n\n在收集统计信息后，`SPECIAL_VALUE`的`HIGH_VALUE`和`LOW_VALUE`都将为`Y`，而`NUM_DISTINCT`和`DENSITY`统计信息列都将为\
  \ 1。这不无道理，当`NUM_DISTINCT`为 1 而`HIGH_VALUE`和`LOW_VALUE`不同时，CBO 会感到有些困惑！在这种情况下，CBO\
  \ 会认为没有行匹配您可能提供的任何等式谓词。在 12cR1 之前，当`HIGH_VALUE`和`LOW_VALUE`统计信息被移除时，也会看到相同的行为，如代码清单\
  \ 20-2 所示。\n\n代码清单 20-2. CBO 在`NUM_DISTINCT=1`时的特殊处理\n\n```sql\nCREATE TABLE payments\n\
  (\n   payment_id        INTEGER\n  ,employee_id       INTEGER\n  ,special_flag \
  \     CHAR (1)\n  ,paygrade          INTEGER\n  ,payment_date      DATE\n  ,job_description\
  \   VARCHAR2 (50)\n)\nPCTFREE 0;\n```\n\n\n\n"
- "# SQL 代码清单与解释\n\n```sql\nINSERT INTO payments (payment_id\n                   \
  \  ,employee_id\n                     ,special_flag\n                     ,paygrade\n\
  \                     ,payment_date\n                     ,job_description)\n  \
