  \ |\n|   1 |  SORT AGGREGATE           |       |            |      1 |00:00.58 |\
  \     440 |    440 |\n|   2 |   TABLE ACCESS BY INDEX RO| T1    |   458   (1)| \
  \ 80000 |00:00.56 |     440 |    440 |\n|   3 |    INDEX RANGE SCAN       | T1_N1\
  \ |   165   (0)|  80000 |00:00.21 |     159 |    159 |\n\nALTER SYSTEM FLUSH BUFFER_CACHE;\n\
  \nSELECT /*+ full(t1) */\n       MAX (filler)\n  FROM t1\n WHERE n1 = 2;\n\nSELECT\
  \ *\n  FROM TABLE (\n          DBMS_XPLAN.display_cursor (NULL\n               \
  \                     ,NULL\n                                    ,'basic cost iostats\
  \ -predicate'));\n\n| Id  | Operation          | Name | Cost (%CPU)| A-Rows |A-Time\
  \   | Buffers | Reads  |\n\n|   0 | SELECT STATEMENT   |      | 19507 (100)|   \
  \   1 | 00:08.67|   71596 |  71592 |\n|   1 |  SORT AGGREGATE    |      |      \
  \      |      1 |00:08.67 |   71596 |  71592 |\n|   2 |   TABLE ACCESS FULL| T1\
  \   | 19507   (1)|  80000 |00:08.67 |   71596 |  71592 |\n```\n\n清单 14-4 创建了一个包含\
  \ 20,025,000 行数据的表 `T1`。这些行是按照列 `N1` 排序添加的。然后在列 `N1` 上创建了一个单列索引 `T1_N1` 并收集了统计信息。该索引的聚簇因子相当低，为\
  \ 74,102。为了公平比较，我在每个查询之前都刷新了缓冲区缓存。\n\n\n当我们查询表以寻找具有特定 `N1` 值的行时，CBO 选择使用索引 `T1_N1`。当我们使用\
  \ hint 强制进行全表扫描时，我们看到成本要高得多，实际经过的时间也长得多。CBO 正确地得出结论：全表扫描会花费更长的时间。清单 14-5 展示了当我们向索引中添加第二个列时会发生什么。\n\
  \n清单 14-5. 使用多列索引的索引聚类缓存效应\n\n```\nDROP INDEX t1_n1;\n\nCREATE  INDEX t1_n1_n2 ON\
  \ t1(n1,n2);\n\nselect index_name,clustering_factor from all_indexes where index_name='T1_N1_N2';\n\
  \nINDEX_NAME CLUSTERING_FACTOR\n---------- -----------------\nT1_N1_N2         \
  \   18991249\n\nALTER SYSTEM FLUSH BUFFER_CACHE;\n\nSELECT MAX (filler)\n  FROM\
  \ t1\n WHERE n1 =2;\n\nSELECT *\n  FROM TABLE (DBMS_XPLAN.display_cursor (NULL,\n\
  \                                         NULL,\n                              \
