  Listing 20-5 首先展示了为 `PAYMENTS` 表的两个列 `PAYGRADE` 和 `PAYMENT_DATE` 创建列组扩展统计信息。这是一项一次性的任务，并且与调用\
  \ `TSTATS.AMEND_TIME_BASED_STATISTICS` 不同，它不会每个月都执行。\n\n\n通常情况下，`TSTATS.AMEND_TIME_BASED_STATISTICS`会使用当前日期生成样本数据，但出于演示目的，清单\
  \ 20-5 首先指定了 2014 年 5 月 1 日。清单 20-5 中的第一个查询涉及`PAYGRADE` 1。输入到`COUNT`函数的有 24 行，但估计的基数过高，为\
  \ 132。尽管如此，仍然选择了正确的索引访问方法。如果高选择性存在其他问题，可能需要进一步调整样本数据。\n\n清单 20-5 中的第二个和第三个查询涉及标准薪资等级和\
  \ 4 月 18 日的标准发薪日（2014 年 4 月 20 日是星期日）。CBO 为这两个查询提供了相同的 1,101 行估计值。使用了全表扫描，这似乎是合理的。对于`PAYGRADE`\
  \ 10，基数估计过低，而对于`PAYGRADE` 4，则估计过高。然而，我们得到了我们想要的一致估计和一致的执行计划。\n\n清单 20-5 中的第四个查询涉及`PAYGRADE`和`JOB_DESCRIPTION`。尽管我们没有创建显示`PAYGRADE`\
  \ 8 的员工只有两个`JOB_DESCRIPTION`值的列组统计信息，但对 6,674 行的估计与`PAYMENTS`表中实际的 7,716 匹配行相当接近。这是因为从`SAMPLE_PAYMENTS`复制的统计信息使\
  \ CBO 相信整个表中只有两个`JOB_DESCRIPTION`值！如果多个列相互关联，通过这种方式修改列统计信息以反映显著减少的不同值数量，通常可以避免 CBO\
  \ 低估基数。\n\n清单 20-5 中的下一个查询涉及`EMPLOYEE_ID`上的谓词。我们的样本数据不包含此列，因此`PAYMENTS`表中`EMPLOYEE_ID`列的统计信息未被替换。CBO\
  \ 基于从`PAYMENTS`表收集的统计信息进行了基数估计。\n\n假设时间流逝。清单 20-5 第二次调用`TSTATS.AMEND_TIME_BASED_STATISTICS`，时间为\
  \ 2015 年 5 月 1 日，模拟时间的推移。我们可以看到，2015 年新日期的基数估计与 2014 年的相同；我没有显示实际的行数，因为在现实生活中并未更新`PAYMENTS`表。\n\
  \n**管理列统计总结**\n\n我们可能希望修改收集的列统计信息以帮助 CBO 产生更准确的基数估计，和/或随时间稳定这些基数估计，原因有很多。我们可能从收集的列统计信息开始，只是移除`HIGH_VALUE`和`LOW_VALUE`部分。这是最常见的方法。为了处理更复杂的问题，我们可以伪造统计信息，甚至在伪造的数据上收集统计信息。关键是，无论遇到什么问题，我们都能找到一种方法，避免对应用程序使用的表重复收集统计信息。\n\
  \n**统计与分区**\n\n在第 9 章中，我解释了使用分区级统计信息的一些原因，并指出，在我看来，分区级统计信息往往弊大于利。我知道你们中的许多人可能仍需要对此点有所信服。我也确信你们中的一些人会非常正确地担心，从使用分区级统计信息转变为全局统计信息是一个巨大的变化，可能对某些已建立的应用程序带来不必要的风险。让我们来看看这个被高估的过程`DBMS_STATS.COPY_TABLE_STATS`，目的是使这些问题更清晰。\n\
  \n**DBMS_STATS.COPY_TABLE_STATS 的迷思**\n\n`DBMS_STATS.COPY_TABLE_STATS`在 11gR1 中首次被记录，但实际上在\
  \ 10.2.0.4 及 10gR2 的更高版本中已得到支持。该过程的名称有些不恰当，因为它并非用于复制表统计信息本身，至少不是全局表统计信息。该过程实际上用于将分区统计信息从一个分区复制到同一表的另一个分区，或者将子分区统计信息从一个子分区复制到同一表的另一个子分区。在讨论其缺点之前，让我从解释其预期工作方式开始。\n\
  \n**DBMS_STATS.COPY_TABLE_STATS 的预期工作方式**\n\n使用`DBMS_STATS.COPY_TABLE_STATS`相比收集分区级统计信息有三个关键优势。第一个优势是复制统计信息比收集统计信息快得多。第二个优势是分区统计信息只能在分区填充数据后才能收集，而你可能需要在所有数据加载完毕之前查询该分区。第三个优势，也是最初最吸引我的，是复制统计信息可以最大限度地减少执行计划变更的风险。清单\
  \ 20-6 展示了`DBMS_STATS.COPY_TABLE_STATS`背后的基本原理。\n\n清单 20-6. 使用 `DBMS_STATS.COPY_TABLE_STATS`\
  \ 的初始尝试\n\n```sql\nCREATE TABLE statement_part\n(\n   transaction_date_time\n  ,transaction_date\n\
  \  ,posting_date\n  ,description\n  ,transaction_amount\n  ,product_category\n \
  \ ,customer_category\n)\nPARTITION BY RANGE\n   (transaction_date)\n   (\n     \
  \ PARTITION p1 VALUES LESS THAN (DATE '2013-01-05')\n     ,PARTITION p2 VALUES LESS\
  \ THAN (DATE '2013-01-11')\n     ,PARTITION p3 VALUES LESS THAN (maxvalue))\nPCTFREE\
  \ 99\nPCTUSED 1\nAS\n       SELECT   TIMESTAMP '2013-01-01 12:00:00.00 -05:00'\n\
  \              + NUMTODSINTERVAL (TRUNC ( (ROWNUM - 1) / 50), 'DAY')\n         \
  \    ,DATE '2013-01-01' + TRUNC ( (ROWNUM - 1) / 50)\n             ,DATE '2013-01-01'\
  \ + TRUNC ( (ROWNUM - 1) / 50) + MOD (ROWNUM, 3)\n             ,DECODE (MOD (ROWNUM,\
  \ 4)\n                     ,0, 'Flight'\n                     ,1, 'Meal'\n     \
  \                ,2, 'Taxi'\n                     ,'Deliveries')\n             ,DECODE\
  \ (MOD (ROWNUM, 4)\n                     ,0, 200 + (30 * ROWNUM)\n             \
  \        ,1, 20 + ROWNUM\n                     ,2, 5 + MOD (ROWNUM, 30)\n      \
  \               ,8)\n             ,TRUNC ( (ROWNUM - 1) / 50) + 1\n            \
  \ ,MOD ( (ROWNUM - 1), 50) + 1\n         FROM DUAL\n   CONNECT BY LEVEL <= 500;\n\
  \nCREATE INDEX statement_part_ix1\n   ON statement_part (transaction_date)\n   LOCAL\n\
  \   PCTFREE 99;\n\nBEGIN\n   DBMS_STATS.delete_table_stats (\n      ownname    \
  \       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname           =>\
  \ 'STATEMENT_PART'\n     ,cascade_parts     => TRUE\n     ,cascade_indexes   =>\
  \ TRUE\n     ,cascade_columns   => TRUE);\n\nDBMS_STATS.gather_table_stats (\n \
  \     ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT_PART'\n     ,partname      => 'P1'\n     ,granularity   =>\
  \ 'PARTITION'\n     ,method_opt    => 'FOR ALL COLUMNS SIZE 1');\n\nDBMS_STATS.copy_table_stats\
  \ (\n      ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT_PART'\n     ,srcpartname   => 'P1'\n     ,dstpartname   =>\
  \ 'P2');\n\nDBMS_STATS.copy_table_stats (\n      ownname       => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n     ,srcpartname\
  \   => 'P1'\n     ,dstpartname   => 'P3');\nEND;\n/\n\n--\n-- 我们可以看到 NUM_ROWS 统计信息已从\
  \ P1 复制到其他分区并聚合到全局统计信息中。\n--\n\nSELECT partition_name, num_rows\n  FROM all_tab_statistics\n\
  \ WHERE owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n       AND table_name\
  \ = 'STATEMENT_PART';\n\nPARTITION_NAME    NUM_ROWS\n```\n\n\n"
- "# 复制分区统计信息：机制与陷阱\n\n## 问题：为新分区提供统计信息\n\n当基于日期等范围进行分区时，新分区最初可能缺少有效的统计信息。通过查询 `all_part_col_statistics`\
  \ 视图可以确认这一点。例如，分区 `P1`、`P2`、`P3` 的 `DESCRIPTION` 列都只有 4 个不同值。\n\n```sql\nSELECT\
  \ partition_name, num_distinct\n  FROM all_part_col_statistics\n WHERE owner = SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n       AND table_name = 'STATEMENT_PART'\n    \
  \   AND column_name = 'DESCRIPTION'\nUNION ALL\nSELECT 'TABLE' partition_name, num_distinct\n\
  \  FROM all_tab_col_statistics\n WHERE owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \       AND table_name = 'STATEMENT_PART'\n       AND column_name = 'DESCRIPTION';\n\
  ```\n\n```\nPARTITION_NAME   NUM_DISTINCT\n---------------- ------------\nP1   \
  \                       4\nP2                          4\nP3                   \
  \       4\nTABLE                       4\n```\n\n因此，针对新分区（如 `P2`）的查询现在可以获得合理的基数估计。\n\
  \n```sql\nSELECT COUNT (*)\n  FROM statement_part PARTITION (p2)\n WHERE description\
  \ = 'Flight';\n```\n\n```\n| Id  | Operation               | Name           | Rows\
  \  | Pstart| Pstop |\n------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT        |                |     1 |       |       |\n|  \
  \ 1 |  SORT AGGREGATE         |                |     1 |       |       |\n|   2\
  \ |   PARTITION RANGE SINGLE|                |    50 |     2 |     2 |\n|*  3 |\
  \    TABLE ACCESS FULL    | STATEMENT_PART |    50 |     2 |     2 |\n```\n\n##\
  \ 解决方案：使用 `DBMS_STATS.COPY_TABLE_STATS`\n\n**Listing 20-6** 重新创建了我们在 **Chapter 9**\
  \ 中创建的表 `STATEMENT_PART`，这次包含三个分区。首先，我删除任何现有统计信息，然后仅收集分区 `P1` 的统计信息。接着，我使用 `DBMS_STATS.COPY_TABLE_STATS`\
  \ 将统计信息从分区 `P1` 复制到分区 `P2` 和 `P3`。结果表明，我们不仅为 `P2` 获得了一套可用的统计信息，而且 `STATEMENT_PART`\
  \ 的全局统计信息也已生成。这看起来很不错。然而，事情并不像乍看起来那样简单直接。\n\n## `DBMS_STATS.COPY_TABLE_STATS` 的缺陷\n\
  \n**Listing 20-7** 突显了使用 `DBMS_STATS.COPY_TABLE_STATS` 可能出现的主要问题。\n\n**Listing 20-7.\
  \ `DBMS_STATS.COPY_TABLE_STATS` 的问题**\n\n```sql\nDELETE FROM statement_part\n  \
  \    WHERE transaction_date NOT IN (DATE '2013-01-01', DATE '2013-01-06');\n\nBEGIN\n\
  \   DBMS_STATS.delete_table_stats (\n      ownname           => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n     ,tabname           => 'STATEMENT_PART'\n     ,cascade_parts\
  \     => TRUE\n     ,cascade_indexes   => TRUE\n     ,cascade_columns   => TRUE);\n\
  \n   DBMS_STATS.gather_table_stats (\n      ownname       => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n     ,partname   \
  \   => 'P1'\n     ,granularity   => 'PARTITION'\n     ,method_opt    => 'FOR ALL\
  \ COLUMNS SIZE 1');\n\n   DBMS_STATS.copy_table_stats (\n      ownname       =>\
  \ SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname       => 'STATEMENT_PART'\n\
  \     ,srcpartname   => 'P1'\n     ,dstpartname   => 'P2');\n\n   DBMS_STATS.copy_table_stats\
  \ (\n      ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT_PART'\n     ,srcpartname   => 'P1'\n     ,dstpartname   =>\
  \ 'P3');\nEND;\n/\n\nCREATE OR REPLACE FUNCTION convert_date_stat (raw_value RAW)\n\
  \   RETURN DATE\nIS\n   date_value   DATE;\nBEGIN\n   DBMS_STATS.convert_raw_value\
  \ (rawval => raw_value, resval => date_value);\n   RETURN date_value;\nEND convert_date_stat;\n\
  /\n\nSELECT column_name\n        ,partition_name\n        ,convert_date_stat (low_value)\
  \ low_value\n        ,convert_date_stat (high_value) high_value\n        ,num_distinct\n\
  \    FROM all_part_col_statistics\n   WHERE owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \         AND table_name = 'STATEMENT_PART'\n         AND column_name IN ('TRANSACTION_DATE',\
  \ 'POSTING_DATE')\nORDER BY column_name DESC, partition_name;\n```\n\n```\nCOLUMN_NAME\
  \          PARTITION_NAME       LOW_VALUE HIGH_VALU NUM_DISTINCT\n--------------------\
  \ -------------------- --------- --------- ------------\nTRANSACTION_DATE     P1\
  \                   01-JAN-13 01-JAN-13            1\nTRANSACTION_DATE     P2  \
  \                 05-JAN-13 05-JAN-13            1\nTRANSACTION_DATE     P3    \
  \               11-JAN-13 11-JAN-13            1\nPOSTING_DATE         P1      \
  \             01-JAN-13 03-JAN-13            3\nPOSTING_DATE         P2        \
  \           01-JAN-13 03-JAN-13            3\nPOSTING_DATE         P3          \
  \         01-JAN-13 03-JAN-13            3\n```\n\n```sql\nSELECT COUNT (*)\n  FROM\
  \ statement_part\n WHERE transaction_date = DATE '2013-01-06';\n```\n\n```\n| Id\
  \  | Operation               | Name               | Rows  |\n----------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT        |                    |     1 |\n|   1 |  SORT AGGREGATE\
  \         |                    |     1 |\n|   2 |   PARTITION RANGE SINGLE|    \
  \                |     1 |\n|   3 |    INDEX RANGE SCAN     | STATEMENT_PART_IX1\
  \ |     1 |\n```\n\n**Listing 20-7** 首先从表 `STATEMENT_PART` 中删除行，使每个分区仅包含一个 `TRANSACTION_DATE`。虽然在可以保证分区列的值在每个分区中唯一时，使用列表分区更有意义，但在这种情况下使用范围分区也并不少见。对于周末没有数据的业务来说，这些范围覆盖超过\
  \ 24 小时也很常见。\n\n重新收集分区 `P1` 的统计信息并将其复制到 `P2` 和 `P3` 后，我们看到了第一个问题：`DBMS_STATS.COPY_TABLE_STATS`\
  \ 过程并非盲目地将统计信息从 `P2` 复制到 `P3`。它进行了它认为合理的调整：分区 `P2` 中 `TRANSACTION_DATE` 列的 `HIGH_VALUE`\
  \ 和 `LOW_VALUE` 列统计信息都被设置为 1 月 5 日。在 11.2.0.2 和 11.2.0.3 版本中，`HIGH_VALUE` 会被设置为\
  \ 1 月 11 日，以反映分区的范围，但这导致了一个问题（错误 14607573），因为分区 `P2` 中 `TRANSACTION_DATE` 的 `NUM_DISTINCT`\
  \ 列统计值为 1，而 `HIGH_VALUE` 和 `LOW_VALUE` 却不同。无论如何，由于分区 `P2` 中行的 `TRANSACTION_DATE`\
  \ 值实际上是 1 月 6 日，即使在 12cR1 中，`HIGH_VALUE` 和 `LOW_VALUE` 仍然具有误导性。\n\n尽管 `DBMS_STATS.COPY_TABLE_STATS`\
  \ 试图调整分区列的列统计信息，但它没有尝试调整其他列的统计信息，这导致了第二个问题。`POSTING_DATE` 列与 `TRANSACTION_DATE`\
  \ 相关，每当调整其中一个列的统计信息时，从逻辑上讲也应该调整另一个；如果不使用 TSTATS，我建议在对按日期分区的表使用 `DBMS_STATS.COPY_TABLE_STATS`\
  \ 时，手动调整所有基于时间的列的 `HIGH_VALUE` 和 `LOW_VALUE`。\n\n## `DBMS_STATS.COPY_TABLE_STATS`\
  \ 的逻辑矛盾\n\n我第一次实现 T 是在 2009 年。第一个应用程序，我称之为 AJAX，包含了按一个我称之为 `BUSINESS_DATE` 的列进行分区的表。AJAX\
  \ 的程序员遵循一个特定的编码标准：所有 SQL 语句*必须*对访问的每个分区表包含一个关于 `BUSINESS_DATE` 的等式谓词。这个标准的意图是避免任何对全局统计信息的依赖。分区级统计信息被独家使用，随着新分区的创建，使用\
  \ `DBMS_STATS.COPY_TABLE_STATS` 过程为这些新分区生成统计信息。`BUSINESS_DATE` 的列统计信息被手动调整。\n\n\
  TSTATS 实现是成功的，并为其他应用程序转换到 TSTATS 铺平了道路。我当时非常高兴，并感谢幸运之星带来了美妙的 `DBMS_STATS.COPY_TABLE_STATS`\
  \ 过程。\n\n\n几年后，某个我无法想起缘由的清晨，我在床上醒来，脑海中闪过一个惊人的想法：使用分区级统计信息的唯一合理原因，应该是分区之间存在显著差异。但\
  \ `DBMS_STATS.COPY_TABLE_STATS` 仅在所有分区都相似时才有效。因此，`DBMS_STATS.COPY_TABLE_STATS` 仅在**不需要**它的时候才可用！\n\
  \n我醒来时常常有这种想法：仿佛整个世界都忽略了某些显而易见的事情并为之疯狂。通常，在我揉掉睡意、喝杯茶、吃完早餐麦片后，我那昏昏沉沉想法中的致命缺陷就会变得清晰起来。然而，这次我却想不出任何缺陷。我依然相信，尽管它被广泛使用，但\
  \ `DBMS_STATS.COPY_TABLE_STATS` 的有效用例寥寥无几。\n\n无论你是否采用 TSTATS 方法，你在分区表全局统计信息方面面临的问题，与未分区表的统计信息问题并无太大不同：基于时间的列会导致执行计划变更，相关列和表达式会导致基数估计错误，列中倾斜的值可能要求同一语句有多个执行计划。分区级统计信息并不能妥善解决所有这些问题，正如我在第\
  \ 9 章的列表 9-17 至 9-21 中所展示的那样。\n\n不幸的是，我们不能总是像对待未分区表那样对待分区表。我们不能总是简单地删除分区和子分区统计信息然后继续生活。现在让我停止讨论\
  \ `DBMS_STATS.COPY_TABLE_STATS`，更详细地审视分区表上的全局统计信息，以便我们理解全局统计信息**会**和**不会**带来哪些问题。\n\
  \n## 使用全局统计信息的基数估计\n\n让我们尝试另一种方法来管理 `STATEMENT_PART` 上的对象统计信息。列表 20-8 完全舍弃了分区级统计信息，仅设置了全局统计信息。\n\
  \n### 列表 20-8. STATEMENT_PART 上的全局统计信息\n\n```sql\nBEGIN\n   DBMS_STATS.delete_table_stats\
  \ (\n      ownname           => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n    \
  \ ,tabname           => 'STATEMENT_PART'\n     ,cascade_parts     => TRUE\n    \
  \ ,cascade_indexes   => TRUE\n     ,cascade_columns   => TRUE);\n\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname       => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \       => 'STATEMENT_PART'\n     ,granularity   => 'GLOBAL'\n     ,method_opt \
  \   => 'FOR ALL COLUMNS SIZE 1');\n\n   tstats.adjust_column_stats_v2 (\n      p_owner\
  \        => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,p_table_name   => 'STATEMENT_PART');\n\
  END;\n/\n```\n\n```sql\nSELECT COUNT (*)\n  FROM statement_part t\n WHERE transaction_date\
  \ = DATE '2013-01-06';\n```\n\n| Id  | 操作                | 名称               | 行数\
  \  | 代价 (%CPU)| Pstart| Pstop |\n| --- | ----------------------- | ------------------\
  \ | ----- | ---------- | ----- | ----- |\n|   0 | SELECT STATEMENT        |    \
  \                |     1 |    29   (0)|       |       |\n|   1 |  SORT AGGREGATE\
  \         |                    |     1 |            |       |       |\n|   2 | \
  \  PARTITION RANGE SINGLE|                    |    50 |    29   (0)|     2 |   \
  \  2 |\n|*  3 |    INDEX FAST FULL SCAN | STATEMENT_PART_IX1 |    50 |    29   (0)|\
  \     2 |     2 |\n\n```sql\nSELECT /*+ full(t) */\n       COUNT (*)\n  FROM statement_part\
  \ t\n WHERE transaction_date = DATE '2013-01-06';\n```\n\n| Id  | 操作           \
  \     | 名称           | 行数  | 代价 (%CPU)| Pstart| Pstop |\n| --- | -----------------------\
  \ | -------------- | ----- | ---------- | ----- | ----- |\n|   0 | SELECT STATEMENT\
  \        |                |     1 |    47   (0)|       |       |\n|   1 |  SORT\
  \ AGGREGATE         |                |     1 |            |       |       |\n| \
  \  2 |   PARTITION RANGE SINGLE|                |    50 |    47   (0)|     2 | \
  \    2 |\n|*  3 |    TABLE ACCESS FULL    | STATEMENT_PART |    50 |    47   (0)|\
  \     2 |     2 |\n\n`STATEMENT_PART` 的全局统计信息已使用列表 20-3 介绍的 `TSTATS.ADJUST_COLUMN_STATS_V2`\
  \ 过程进行了调整。针对 `STATEMENT_PART` 查询产生的基数估计非常合理，就像针对未分区表一样。请注意，我们的查询使用了我们创建的索引，而基于提示的全表扫描的代价更高。但如果我们增加几个分区会怎样呢？列表\
  \ 20-9 将展示这一点。\n\n### 列表 20-9. 向 STATEMENT_PART 添加分区\n\n```sql\nALTER TABLE statement_part\n\
  \   SPLIT PARTITION p3\n      AT (DATE '2013-01-12')\n      INTO (PARTITION p3,\
  \ PARTITION p4);\n\nALTER TABLE statement_part\n   SPLIT PARTITION p4\n      AT\
  \ (DATE '2013-01-13')\n      INTO (PARTITION p4, PARTITION p5);\n\nALTER TABLE statement_part\n\
  \   SPLIT PARTITION p5\n      AT (DATE '2013-01-14')\n      INTO (PARTITION p5,\
  \ PARTITION p6);\n```\n\n```sql\nSELECT COUNT (*)\n  FROM statement_part t\n WHERE\
  \ transaction_date = DATE '2013-01-06';\n```\n\n| Id  | 操作                | 名称 \
  \          | 行数  | 代价 (%CPU)| Pstart| Pstop |\n| --- | ----------------------- |\
  \ -------------- | ----- | ---------- | ----- | ----- |\n|   0 | SELECT STATEMENT\
  \        |                |     1 |    25   (0)|       |       |\n|   1 |  SORT\
  \ AGGREGATE         |                |     1 |            |       |       |\n| \
  \  2 |   PARTITION RANGE SINGLE|                |    50 |    25   (0)|     2 | \
  \    2 |\n|*  3 |    TABLE ACCESS FULL    | STATEMENT_PART |    50 |    25   (0)|\
  \     2 |     2 |\n\n```sql\nSELECT COUNT (*)\n  FROM statement_part t\n WHERE transaction_date\
  \ = DATE '2013-01-13';\n```\n\n| Id  | 操作                | 名称           | 行数  |\
  \ 代价 (%CPU)| Pstart| Pstop |\n| --- | ----------------------- | -------------- |\
  \ ----- | ---------- | ----- | ----- |\n|   0 | SELECT STATEMENT        |      \
  \          |     1 |    25   (0)|       |       |\n|   1 |  SORT AGGREGATE     \
  \    |                |     1 |            |       |       |\n|   2 |   PARTITION\
  \ RANGE SINGLE|                |    50 |    25   (0)|     5 |     5 |\n|*  3 | \
  \   TABLE ACCESS FULL    | STATEMENT_PART |    50 |    25   (0)|     5 |     5 |\n\
  \n在我们向 `STATEMENT_PART` 添加分区后，我们可以看到我们的示例查询在分区维护前后的基数估计都是相同的 50 行，而针对新创建分区的类似查询的基数估计也是\
  \ 50 行。请注意，`TRANSACTION_DATE` 的 `NUM_DISTINCT` 值仅为 2，即使存在对应更多 `TRANSACTION_DATE`\
  \ 值的分区。我强调这一点是因为许多与我交谈过的人都曾对此类差异表示担忧。只要列 `TRANSACTION_DATE` 的 `NUM_DISTINCT` 值与表的\
  \ `NUM_ROWS` 值保持一致，每个 `TRANSACTION_DATE` 的行数就会是合理的。\n\n如果分区维护没有改变基数估计，为什么列表 20-8\
  \ 和 20-9 中的执行计划不同？答案与基数无关，而完全与代价有关。\n\n## 计算表分区的全表扫描代价\n\n当分区表的总分区数量发生变化而其对象统计信息未改变时，会产生一个显著的复杂情况。再看一下列表\
  \ 20-8 和 20-9 中的执行计划。列表 20-8 中未加提示的查询使用了索引。使用 `FULL` 提示的变体所关联的代价更高——到目前为止没有问题。\n\
  \n\n\n"
- "# 分区维护后的查询优化与 CBO 成本估算异常\n\n然而，一旦我们添加了几个分区，我们突然发现未使用提示的查询会使用全表扫描！我们可以看到，由于分区维护操作，全表扫描的成本已经降低。现在全表扫描的成本低于索引扫描的成本，未使用提示查询的执行计划也因此发生了变化。如果新添加的分区被删除，索引访问将再次变得更具吸引力。\n\
  \n这里发生的情况非常不寻常。CBO 估算分区全表扫描成本的方式是：将 `NUM_BLOCKS` 统计值除以从数据字典中获取的当前分区数量。通常，CBO 估算过程的输入是对象统计信息系统统计信息和初始化参数。这条规则的一个例外是数据字典中为表或索引指定的并行度。据我所知，CBO\
  \ 使用数据字典信息（统计信息除外）的唯一另一种情况是在为分区计算全表扫描成本时。\n\n## 分区消除异常\n\nCBO 意识到对一个分区执行全表扫描将比扫描表中的所有分区花费更少的时间。然而，对于任何类型的索引扫描，应用的逻辑并非如此：在本地索引的一个分区上进行索引扫描的成本与扫描所有分区的成本是相同的；在所有数据库版本（直至并包括\
  \ 12.1.0.1）中，这一点都是成立的。\n\n此外，如果您使用复合分区，您会发现消除一个分区内的子分区也不会降低全表扫描的成本。当然，这些异常可能在未来得到修正。\n\
  \n在我看来，CBO 开发团队在这里错过了一个改进点。我认为，如果有一个对象统计信息（也许可以称为 `NUM_PARTITIONS`），能反映收集该表对象统计信息时存在的分区数量，那将会更好。但这只是一厢情愿的想法。我们需要面对现实。我们只需将表的\
  \ `NUM_BLOCKS` 统计值按分区数量增加的相同比例增加即可。最简单的方法是在收集统计信息时捕获每个分区的平均块数，然后为分区维护操作添加一个 TSTATS\
  \ 钩子。Listing 20-10 展示了一种实现方法。\n\nListing 20-10. 通过分区维护操作管理 NUM_BLOCKS\n\n```sql\n\
  CREATE OR REPLACE PACKAGE tstats\nAS\n   -- 其他过程已省略\n\nPROCEDURE adjust_global_stats\
  \ (\n      p_owner all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n   \
  \                                                                'USERENV'\n   \
  \                                                               ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name all_tab_col_statistics.table_name%TYPE\n     ,p_mode VARCHAR2\
  \ DEFAULT 'PMOP');\n\nPROCEDURE gather_table_stats (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE);\n\
  \n-- 其他过程已省略\nEND tstats;\n/\n\nCREATE OR REPLACE PACKAGE BODY tstats\nAS\n-- 其他过程已省略\n\
  \nPROCEDURE adjust_global_stats (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE\n\
  \     ,p_mode VARCHAR2 DEFAULT 'PMOP')\n   IS\n      -- 这个辅助函数更新表中的块数统计信息，以保持分区的平均大小不变。\n\
  \      -- 我们将这个值保存在未使用的 CACHEDBLK 统计信息中。\n      --\n      numblks     NUMBER;\n\
  \      numrows     NUMBER;\n      avgrlen     NUMBER;\n      cachedblk   NUMBER;\n\
  \      cachehit    NUMBER;\n   BEGIN\n      DBMS_STATS.get_table_stats (ownname\
  \     => p_owner\n                                 ,tabname     => p_table_name\n\
  \                                 ,numrows     => numrows\n                    \
  \             ,avgrlen     => avgrlen\n                                 ,numblks\
  \     => numblks\n                                 ,cachedblk   => cachedblk\n \
  \                                ,cachehit    => cachehit);\n\nIF p_mode = 'PMOP'\n\
  \      THEN\n         --\n         -- 根据 CACHEDBLK（平均段大小）和当前分区数量重置 NUMBLKS。\n  \
  \       --\n         IF cachedblk IS NULL\n         THEN\n            RETURN; --\
  \ 没有保存的值\n         END IF;\n\n--\n         -- 根据当前分区数量和保存的平均段大小重新计算块数。\n       \
  \  -- 避免引用 DBA_SEGMENTS，以防没有权限。\n         --\n         SELECT cachedblk * COUNT\
  \ (*)\n           INTO numblks\n           FROM all_objects\n          WHERE owner\
  \ = p_owner\n                AND object_name = p_table_name\n                AND\
  \ object_type = 'TABLE PARTITION';\n      ELSIF p_mode = 'GATHER'\n      THEN\n\
  \         --\n         -- 根据 NUMBLKS 和当前分区数量，将平均段大小保存在 CACHEDBLK 中。\n         --\n\
  \         SELECT numblks / COUNT (*), TRUNC (numblks / COUNT (*)) * COUNT (*)\n\
  \           INTO cachedblk, numblks\n           FROM all_objects\n          WHERE\
  \ owner = p_owner\n                AND object_name = p_table_name\n            \
  \    AND object_type = 'TABLE PARTITION';\n      ELSE\n         RAISE PROGRAM_ERROR;\n\
  \      -- 只有在 p_mode 未设置为 PMOP 或 GATHER 时才会到达这里\n      END IF;\n\nDBMS_STATS.set_table_stats\
  \ (ownname     => p_owner\n                                 ,tabname     => p_table_name\n\
  \                                 ,numblks     => numblks\n                    \
  \             ,cachedblk   => cachedblk\n                                 ,force\
  \       => TRUE);\n   END adjust_global_stats;\n\nPROCEDURE gather_table_stats (\n\
  \      p_owner all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n       \
  \                                                            'USERENV'\n       \
  \                                                           ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name all_tab_col_statistics.table_name%TYPE)\n   IS\n   BEGIN\n \
  \     DBMS_STATS.unlock_table_stats (ownname   => p_owner\n                    \
  \                ,tabname   => p_table_name);\n\nFOR r IN (SELECT *\n          \
  \        FROM all_tables\n                 WHERE owner = p_owner AND table_name\
  \ = p_table_name)\n      LOOP\n         DBMS_STATS.gather_table_stats (\n      \
  \      ownname       => p_owner\n           ,tabname       => p_table_name\n   \
  \        ,granularity   => CASE r.partitioned\n                               WHEN\
  \ 'YES' THEN 'GLOBAL'\n                               ELSE 'ALL'\n             \
  \               END\n           ,method_opt    => 'FOR ALL COLUMNS SIZE 1');\n\n\
  adjust_column_stats_v2 (p_owner        => p_owner\n                            \
  \    ,p_table_name   => p_table_name);\n```\n\n\n```sql\nIF r.partitioned = 'YES'\n\
  \         THEN\n            adjust_global_stats (p_owner        => p_owner\n   \
  \                             ,p_table_name   => p_table_name\n                \
  \                ,p_mode         => 'GATHER');\n         END IF;\n      END LOOP;\n\
  \nDBMS_STATS.lock_table_stats (ownname => p_owner, tabname => p_table_name);\n \
  \  END gather_table_stats;\n\n-- 其他过程被省略\nEND tstats;\n/\n```\n\n清单 20-10 展示了 `TSTATS`\
  \ 包中的更多过程。`TSTATS.GATHER_TABLE_STATS` 是一个封装例程，用于收集表的统计信息并调整列统计信息。对于分区表，仅收集全局统计信息，并且每个分区的平均块数通过\
  \ `TSTATS.ADJUST_TABLE_STATS` 过程保存在未使用的 `CACHEDBLK` 统计信息中。\n\n![image](img/sq.jpg)\
  \ **注意** 使用 Oracle 保留供未来使用的统计信息是非常非常“淘气”的做法。你们中的一些人可能会对在书中看到这种实践感到震惊。严格来说，我应该将我的私有数据保存在合法的地方，例如数据字典之外的常规表中。然而，在实际工作中，我发现使用这个未使用的统计信息的诱惑是难以抗拒的。该统计信息在调用\
  \ `DBMS_STATS.EXPORT_TABLE_STATS` 和 `DBMS_STATS.IMPORT_TABLE_STATS` 时会被保留下来，这一事实似乎使得该过程在未来某个时间点中断的风险值得承担。该统计信息列在所有版本（包括\
  \ `12.1.0.1`）中都是未使用的。\n\n`TSTATS.ADJUST_TABLE_STATS` 例程以两种模式运行。当作为统计信息收集过程的一部分被调用时，它会计算并保存每个分区的平均块数。当执行分区维护操作时，会使用默认模式\
  \ `\"PMOP\"` 调用 `TSTATS.ADJUST_TABLE_STATS` 过程，这会导致基于当前分区数和保存的每个分区块数重新计算 `NUM_BLOCKS`\
  \ 统计信息。\n\n清单 20-11 展示了如何将 `TSTATS.ADJUST_TABLE_STATS` 集成到我们的分区维护过程中，以避免这些分区维护操作破坏我们的执行计划。\n\
