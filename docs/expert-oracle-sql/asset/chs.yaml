  \        ,p.prod_name\n    FROM sh.sales s\n         JOIN sh.customers c USING (cust_id)\n\
  \         JOIN sh.products p USING (prod_id)\n   WHERE prod_id = (SELECT /*+   push_subq\
  \ */\n                           /* no_push_subq */\n                          \
  \ prod_id\n                      FROM q1\n                     WHERE ROWNUM = 1)\n\
  GROUP BY c.cust_first_name\n        ,c.cust_last_name\n        ,c.cust_email\n \
  \       ,p.prod_name\n  HAVING SUM (s.amount_sold) > 20000;\n\n-- 未下推子查询 (NO_PUSH_SUBQ)\n\
  \n| Id  | Operation                  | Name      | Cost (%CPU)|\n```\n\n\n\n## 执行计划分析\n\
