  \                |   369   (8)|\n|   1 |  SORT ORDER BY                  |     \
  \               |   369   (8)|\n|   2 |   VIEW                          |      \
  \              |   369   (8)|\n|   3 |    UNION-ALL                    |       \
  \             |            |\n|   4 |     HASH GROUP BY               |        \
  \            |   367   (8)|\n|*  5 |      HASH JOIN                  |         \
  \           |   367   (8)|\n|   6 |       VIEW                      | VW_GBC_6 \
