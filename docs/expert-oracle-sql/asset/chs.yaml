  PROD_ID\"=\"PRODUCTS\".\"PROD_ID\")\n   4 - access(ROWID=ROWID)\n```\n\n子查询展开和视图合并的概念很容易混淆：\n\
  \n*   视图合并适用于出现在外部查询块 `FROM` 子句中作为行源的内联视图、因子化子查询和数据字典视图。视图合并由 `MERGE` 和 `NO_MERGE`\
  \ 提示控制。\n*   子查询展开与 `SELECT` 列表、`WHERE` 子句或 Oracle 未来可能支持的任何其他地方的子查询相关。子查询展开由 `UNNEST`\
  \ 和 `NO_UNNEST` 提示控制。\n\nListing 13-20 展示了使用因子化子查询如何节省输入；我们不必将 `GROUP BY` 表达式复制到选择列表。我们只是使用了子查询中的列别名\
  \ `adjusted_amount_sold`。再一次，Oracle 将我们简洁的查询转换成了概念上更简单（即使不那么简洁）的形式。\n\n简单视图合并是一种启发式转换，在合法的情况下会被无条件地应用。简单视图合并的主要好处是可能实现额外的连接顺序（尽管在\
  \ Listing 13-20 中并非如此）。\n\n我不会深入探讨简单视图合并的限制。你只需记住，简单的行源可以被合并，而复杂的则不能，这样就没问题了。有一种特殊情况，复杂的行源可以被合并，但不是通过简单视图合并。现在让我们来看看这个。\n\
  \n### 复杂视图合并\n\n如果一个子查询包含 `GROUP BY` 子句和/或 `DISTINCT` 关键字，并且这是*唯一*导致无法使用简单视图合并的原因，那么复杂视图合并是一个替代方案。Listing\
  \ 13-21 给出了一个例子。\n\n### 复杂视图合并\n\n```\nWITH agg_q\n     AS (  SELECT /*+   merge\
  \ */\n                  /* no_merge */\n                  s.cust_id, s.prod_id,\
  \ SUM (s.amount_sold) total_amt_sold\n             FROM sh.sales s\n         GROUP\
  \ BY s.cust_id, s.prod_id)\nSELECT cust_id\n      ,c.cust_first_name\n      ,c.cust_last_name\n\
  \      ,c.cust_email\n      ,p.prod_name\n      ,agg_q.total_amt_sold\n  FROM agg_q\n\
  \       JOIN sh.customers c USING (cust_id)\n       JOIN sh.countries co USING (country_id)\n\
  \       JOIN sh.products p USING (prod_id)\n WHERE     co.country_name = 'Japan'\n\
  \       AND prod_category = 'Photo'\n       AND total_amt_sold > 20000;\n```\n\n\
