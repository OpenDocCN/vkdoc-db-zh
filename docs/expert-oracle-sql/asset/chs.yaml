  \      => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname      => 'PAYMENTS'\n\
  \     ,method_opt   => 'FOR ALL COLUMNS SIZE 1');\nEND;\n/\n\nCREATE UNIQUE INDEX\
  \ payments_pk\n   ON payments (payment_id);\n\nALTER TABLE payments\n   ADD  CONSTRAINT\
