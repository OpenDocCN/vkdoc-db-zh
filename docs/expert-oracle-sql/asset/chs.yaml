  \n**子查询下推**\n\n当子查询出现在 `WHERE` 子句中时，CBO 如果能够进行子查询非嵌套，通常就会这样做。如果子查询由于某种原因无法非嵌套，那么\
  \ CBO 就会面临一个类似于处理聚合时的问题：应该尽早评估子查询，还是推迟到所有连接之后再评估？奇怪的是，这个决定是通过一个查询转换来做出的。\n\n尽管子查询下推是作为查询转换实现的，但它在逻辑上并非一个转换。事实上，我曾一度认为，CBO\
  \ 决定何时评估子查询是我们第 12 章讨论的最终状态转换逻辑的一部分。显然，无法提供任何显示所谓转换结果的已转换 SQL。\n\n它的工作原理如下：CBO 首先假设\
  \ `WHERE` 子句中的子查询应在所有连接执行之后进行评估。只有当基于成本的转换框架决定应该改变此行为（或存在提示符）时，此行为才会改变。清单 13-24\
  \ 或许有助于更好地解释这一点。\n\n清单 13-24. 子查询下推\n\n```sql\nWITH q1\n     AS (  SELECT prod_id\n\
  \             FROM sh.sales\n         GROUP BY prod_id\n         ORDER BY SUM (amount_sold)\
