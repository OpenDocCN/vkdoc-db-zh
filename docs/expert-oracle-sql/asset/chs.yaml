  \n## 概要解释提示\n\n当 Oracle 客户从 9i 升级到 10g 时，许多人发现他们的存储大纲不再按预期工作。问题在于提示的解释方式发生了变化。如今，像清单\
  \ 8-7 中第 24、25、26 和 27 行那样的提示控制着剩余提示被解释的确切方式。当然，如果你在代码中指定了这样的提示，或者`OPTMIZER_MODE`初始化参数有非默认设置，`ALL_ROWS`提示可能会被某个`FIRST_ROWS`变体所替代。传递给`OPTIMIZER_FEATURES_ENABLE`的参数值也可能因数据库版本、提示或初始化参数设置而异。\n\
  \n这些参数如何与未文档化的`DB_VERSION`提示协同工作我们无需关心。我们只需要知道，其目的是为了在数据库版本或初始化参数发生变化时避免行为改变。如果优化器初始化参数有任何非默认设置，例如我在解释查询前更改的`STAR_TRANSFORMATION_ENABLED`设置，那么也会出现一个或多个`OPT_PARAM`提示，就像第\
  \ 25 行看到的那样。\n\n识别大纲数据\n\n清单 8-7 中第 2、28 和 29 行的提示协同工作，以确保大纲提示与语句中的其他提示区别对待。`IGNORE_OPTIM_EMBEDDED_HINTS`提示告诉\
  \ CBO 忽略 SQL 语句中**大多数**提示，除了那些被`BEGIN_OUTLINE_DATA`和`END_OUTLINE_DATA`提示括起来的提示。我强调“大多数”这个词是因为有一些提示并未在执行计划的`OUTLINE`部分实现，值得庆幸的是这些提示不会被忽略。\n\
  \n术语“大纲”（OUTLINE）\n\n术语“大纲”有些重载，为避免混淆，我需要解释其不同用法：\n\n*   在由`OUTLINE`细粒度控制生成的`DBMS_XPLAN`函数输出中，有一个标题为`Outline\
  \ Data`的部分。\n*   大纲部分的内容包含一些提示，这些提示被单独称为**大纲提示（outline hints）**，整个集合则简称为**大纲（outline）**。这些大纲提示被`BEGIN_OUTLINE_DATA`和`END_OUTLINE_DATA`这两个提示括起来。\n\
  *   大纲提示是计划稳定性功能（如存储大纲和 SQL 计划基线）实现的基础。\n*   大纲提示可以粘贴到 SQL 语句中，在那里它们仍然被称为大纲提示。除了被`BEGIN_OUTLINE_DATA`和`END_OUTLINE_DATA`括起来的提示外，其他提示被称为**嵌入式提示（embedded\
  \ hints）**。\n*   如果这还不够令人困惑，其中一个大纲提示被命名为`OUTLINE`，另一个被命名为`OUTLINE_LEAF`。\n\n希望这能带来一点帮助。\n\
  \n一个未被`IGNORE_OPTIM_EMBEDDED_HINTS`忽略的嵌入式提示例子是`APPEND`。`APPEND`会导致发生串行直接路径加载。清单\
  \ 8-6 中的`APPEND`提示，以及任何执行相同功能的替代提示，都没有出现在清单 8-7 中，但串行直接路径加载仍然发生了。为了更清楚地说明这一点，清单\
  \ 8-8 展示了我们如何将大纲提示移入清单 8-6 以防止执行计划更改。\n\n清单 8-8. 在源代码中使用大纲提示\n\n```\nINSERT /*+\
  \ APPEND */\n      INTO  t2 (c2)\n   WITH q1\n        AS (SELECT *\n           \
  \   FROM book.t1@loopback t1)\n   SELECT /*+\n           BEGIN_OUTLINE_DATA\n  \
  \         <other hints suppressed for brevity>\n           IGNORE_OPTIM_EMBEDDED_HINTS\n\
  \           END_OUTLINE_DATA\n         */\n          COUNT (*)\n     FROM (SELECT\
  \ *\n             FROM q1, t2\n            WHERE q1.c1 = t2.c2\n           UNION\
  \ ALL\n           SELECT *\n             FROM t3, t4\n            WHERE t3.c3 =\
  \ t4.c4)\n         ,t3\n    WHERE c1 = c3;\n```\n\n清单 8-8 中高亮显示的提示源自清单 8-7，但为简洁起见已被缩短。如果你查看清单\
  \ 8-8 的执行计划，会发现它与清单 8-6 的执行计划未改变，特别是操作 1 仍然是`LOAD AS SELECT`。如果从清单 8-8 中移除`APPEND`提示，那么操作\
  \ 1 将变为`LOAD TABLE CONVENTIONAL`，因为大纲提示中没有出现使用直接路径加载的指令。\n\n![image](img/sq.jpg) **注意**  优化器参数的非默认值，例如`_optimizer_gather_stats_on_load`，也会被忽略，除非大纲提示中包含相应的`OPT_PARAM`提示。这是因为`OPTIMIZER_FEATURES_ENABLE`提示的存在，它会将优化器参数重置为该版本的默认值。\n\
  \n关于哪些提示未在大纲中实现的完整列表，你可以查看视图`V$SQL_HINT`。所有`OUTLINE_VERSION`为`NULL`的行都标识了那些如果包含在源代码中，将不会在大纲中实现且不会被`IGNORE_OPTIM_EMBEDDED_HINTS`忽略的提示。被排除在大纲之外的提示包括我们在第\
  \ 4 章中讨论过的`RESULT_CACHE`，以及控制因子化子查询行为的`MATERIALIZE`和`INLINE`。我们将在第 13 章中研究因子化子查询的具体化。\n\
  \n![image](img/sq.jpg) **注意**  当`IGNORE_OPTIM_EMBEDDED_HINTS`作为大纲外部的嵌入式提示提供时，会产生一个有趣的悖论。实际上，这样的提示没有任何效果。这实际上意味着它忽略了自己！\n\
  \n我强调出现在大纲中的提示与那些不出现的提示之间的区别，是因为许多人在将大纲提示粘贴到代码中时，会从 SQL 语句中移除所有其他嵌入式提示。在你确定它们确实不必要之前，不要移除任何嵌入式提示！\n\
  \n最终查询块结构\n\n提示`OUTLINE_LEAF`和`OUTLINE`出现在清单 8-7 的第 16、17、18、19、20、21 和 23 行。这些提示指出了哪些查询块存在于最终的执行计划中`（OUTLINE_LEAF）`，以及哪些被合并或以其他方式转换消失了`（OUTLINE）`。²\n\
  \n是时候提醒你注意你在大纲中看到的那些未文档化的提示了。除非你知道自己在做什么，否则你不应该尝试更改它们或在大纲之外使用它们。例如，如果你想抑制视图合并，你可以使用`OUTLINE_LEAF`来实现。然而，像我在本章中多次做的那样，使用文档化的`NO_MERGE`提示来实现此目的要安全得多。将`OUTLINE`和`OUTLINE_LEAF`这类提示的使用保留到你将大纲提示原封不动地粘贴到代码中的场合。\n\
  \n查询转换提示\n\n\n"
- "# 代码清单 8-7 第 22 行的 `MERGE` 提示展示了应用于查询块 `SEL$1` 的简单视图合并查询转换的用法。我们将在第 13 章介绍 CBO\
  \ 可用的大部分查询转换功能，而语句中使用的所有非强制性查询转换都将在执行计划大纲中通过诸如 `MERGE` 之类的提示反映出来。\n\n## 注释\n\n代码清单\
  \ 8-7 第 13 行的 `NO_ACCESS` 提示对我来说有点神秘。它记录了 CBO 没有合并某个查询块这一事实。如果你在代码中添加它，它实际上并不会产生任何效果；即使你从大纲中移除它，似乎也无关紧要。它看起来只是一个注释。\n\
  \n## 最终状态优化提示\n\n代码清单 8-7 第 3 至 12 行、第 14 和 15 行的提示看起来`几乎`像是 SQL 语句中常见的内嵌提示。它们控制连接顺序、连接方法和访问方法。我说`几乎`，是因为它们包含了全局提示语法和完全限定的对象别名，这些虽然合法，但在\
  \ SQL 语句的源代码中很少见到。我们将在本章后面更详细地探讨全局提示。\n\n现在我们已经对代码清单 8-7 中的所有大纲提示进行了分类。让我们继续看`DBMS_XPLAN`输出的其他部分。\n\
  \n## 被窥探的绑定变量\n\n当调用 `DBMS_XPLAN.DISPLAY_CURSOR` 时，`PEEKED_BINDS` 部分会紧跟在 `OUTLINE`\
  \ 部分之后。代码清单 8-6 无法用于演示 `PEEKED_BINDS`，原因有二：\n*   该语句没有任何绑定变量。\n*   该语句使用了数据库链接，因此在\
  \ 12cR1 之前的版本中，不会执行任何绑定变量窥探。\n\n因此，为了演示 `PEEKED_BINDS` 部分，我将使用代码清单 8-9 中所示的脚本。\n\
  \n代码清单 8-9. 展示被窥探绑定变量的本地数据库查询\n\n```\nDECLARE\n   dummy   NUMBER := 0;\nBEGIN\n\
  \   FOR r IN (WITH q1 AS (SELECT /*+ TAG1*/\n                               * FROM\
  \ t1)\n             SELECT *\n               FROM (SELECT *\n                  \
  \     FROM q1, t2\n                     WHERE q1.c1 = t2.c2 AND c1 > dummy\n   \
  \                  UNION ALL\n                     SELECT *\n                  \
  \     FROM t3, t4\n                      WHERE t3.c3 = t4.c4 AND c3 > dummy)\n \
  \                  ,t3\n              WHERE c1 = c3)\n   LOOP\n      NULL;\n   END\
  \ LOOP;\nEND;\n/\n\nSET LINES 200 PAGES 0\n\nSELECT p.*\n  FROM v$sql s\n      ,TABLE\
  \ (\n          DBMS_XPLAN.display_cursor (s.sql_id\n                           \
  \         ,s.child_number\n                                    ,'BASIC +PEEKED_BINDS'))\
  \ p\n WHERE sql_text LIKE 'WITH%SELECT /*+ TAG1*/%';\n\nEXPLAINED SQL STATEMENT:\n\
  \nWITH Q1 AS (SELECT /*+ TAG1 */ * FROM T1) SELECT * FROM (SELECT * FROM\nQ1, T2\
  \ WHERE Q1.C1 = T2.C2 AND C1 > :B1 UNION ALL SELECT * FROM T3, T4\nWHERE T3.C3 =\
  \ T4.C4 AND C3 > :B1 ) ,T3 WHERE C1 = C3\n\nPlan hash value: 2648033210\n\n| Id\
  \  | Operation             | Name |\n\n|   0 | SELECT STATEMENT      |      |\n\
  |   1 |  HASH JOIN            |      |\n|   2 |   TABLE ACCESS FULL   | T3   |\n\
  |   3 |   VIEW                |      |\n|   4 |    UNION-ALL          |      |\n\
  |   5 |     HASH JOIN         |      |\n|   6 |      TABLE ACCESS FULL| T1   |\n\
  |   7 |      TABLE ACCESS FULL| T2   |\n|   8 |     HASH JOIN         |      |\n\
  |   9 |      TABLE ACCESS FULL| T3   |\n|  10 |      TABLE ACCESS FULL| T4   |\n\
  \nPeeked Binds (identified by position):\n\n1 - :B1 (NUMBER): 0\n   2 - :B1 (NUMBER,\
  \ Primary=1)\n```\n\n与本章前面那些暗示先调用 `EXPLAIN PLAN` 然后调用 `DBMS_XPLAN.DISPLAY` 的示例不同，代码清单\
  \ 8-9 实际运行了一个语句，然后调用 `DBMS_XPLAN.DISPLAY_CURSOR` 来生成输出。你会看到我在语句的注释中包含了字符串 `TAG1`。这个注释对\
  \ PL/SQL 编译器来说像是一个提示（当然它并不是），因此注释没有被移除。运行语句并丢弃返回的行后，我使用 `left lateral join` 将 `DBMS_XPLAN.DISPLAY_CURSOR`\
  \ 与 `V$SQL` 连接起来以识别 `SQL_ID`。我们将在第 11 章讨论连接方法时介绍左横向连接。调用 `DBMS_XPLAN.DISPLAY_CURSOR`\
  \ 的输出也显示在代码清单 8-9 中。\n\n我们可以看到，当查询被解析时，会查看绑定变量 `:B1` 的值，因为该值可能会影响执行计划的选择。该绑定变量是\
  \ PL/SQL 由于我命名为 `DUMMY` 的 PL/SQL 变量的使用而添加的。`DUMMY` 被使用了两次，但不需要窥探它的值两次。这就是输出中 `Primary=1`\
  \ 部分的含义——它表示第二次使用的绑定变量的值取自第一次。\n\n值得再次强调的是，绑定变量只在语句被解析时被窥探。除少数例外情况（如自适应游标共享），使用不同绑定变量值对同一语句的第二次及后续执行将不会导致更多的窥探，并且此类调用也不会更新\
  \ `DBMS_XPLAN.DISPLAY_CURSOR` 的输出。\n\n## 谓词信息\n\n`DBMS_XPLAN` 函数调用的 `PREDICATE`\
  \ 部分出现在任何 `PEEKED_BINDS` 部分之后。我们已经在第 3 章介绍过过滤谓词，因为 `DBMS_XPLAN` 函数的默认输出级别是 `TYPICAL`，而\
  \ `PREDICATE` 部分包含在 `TYPICAL` 级别中。为完整起见，代码清单 8-10 展示了代码清单 8-6 中语句的过滤谓词。\n\n代码清单\
