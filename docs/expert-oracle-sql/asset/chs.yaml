  \ 1。这种`ROWID`的用法节省了输入，并避免了因 23 次单独的`LAST`调用而产生的冗长难读的 SQL。清单 17-13 中第二个查询所展示的技术不仅简洁，还可能进一步提高性能，因为现在不仅排序的行数减少到\
