  \n以上就是关于执行计划显示的讨论。现在让我们继续本章的第二个主要主题：并行执行计划。\n\n## 理解并行执行计划\n\n当一条 `SQL` 语句使用并行执行时，两个或多个`并行执行服务器`（有时称为并行执行从属进程或并行查询从属进程）会被分配到原始会话中。每个并行查询服务器可以执行总工作负载的一部分，从而使整个\
  \ `SQL` 语句能更快地完成。\n\n并行执行是一个很长的主题，一本关于 `Oracle` 数据库性能的通用书籍可能会用一整章来专门讨论它。事实上，《*VLDB\
  \ and Partitioning Guide*》中题为“*使用并行执行*”的章节正是这样做的。不过，在这里我只想专注于解读包含并行操作的执行计划以及分析其性能。但在查看示例执行计划之前，我需要先奠定一些基础。让我们先从哪些\
  \ `SQL` 语句可以并行运行、哪些不可以开始。\n\n## 可以并行运行的操作\n\n以下 `DDL` 语句可以并行运行：\n\n*   `CREATE INDEX`\n\
  *   `CREATE TABLE ... AS SELECT`\n*   `ALTER INDEX ... REBUILD`\n*   `ALTER TABLE\
  \ ... [MOVE|SPLIT|COALESCE] PARTITION`\n*   `ALTER TABLE ... MOVE`\n*   `ALTER INDEX\
  \ ... [REBUILD|SPLIT] PARTITION`\n\n![image](img/sq.jpg) **提示** 当你验证约束时，会涉及一个递归查询，该递归查询也可以并行执行。\n\
  \n当 `DDL` 语句被并行化时，正在创建的对象的多个块会被同时写入。所有 `DML` 操作也可以并行运行，并且同样可以并行写入或更新多个块。术语`并行 DDL`和`并行\
  \ DML`就用来指代这些类型的并行操作。\n\n第三种也是最常见的并行操作类型称为`并行查询`。术语`并行查询`不仅指并行运行 `SELECT` 语句，也用于指代\
  \ `DDL` 或 `DML` 语句中子查询的并行化。因此，例如，如果你并行运行 `CREATE TABLE ... AS SELECT` 语句的查询部分，但将数据串行写入磁盘，那么你执行的是并行查询，而不是并行\
  \ DDL。\n\n并行查询在概念上比并行 `DDL` 或并行 `DML` 更复杂。一个查询或子查询通常涉及多个行源操作。在执行计划中看到一些行源操作并行运行而另一些串行运行是很正常的。随着我们继续，为什么会经常在执行计划中混合使用串行和并行操作的原因将变得清晰。\n\
  \n## 控制并行执行\n\n控制并行 `DDL`、并行 `DML` 和并行查询的机制存在细微差异，因此我想分别探讨它们。让我们从并行 `DDL` 开始。\n\n\
  ### 控制并行 DDL\n\n运行并行 `DDL` 的两个主要考虑因素是会话状态和 `DDL` 语句的语法。默认情况下，并行 `DDL` 是启用的，但可以使用以下命令之一为当前会话进行更改：\n\
  \n*   `ALTER SESSION DISABLE PARALLEL DDL`\n*   `ALTER SESSION ENABLE DDL`\n*  \
  \ `ALTER SESSION FORCE PARALLEL DDL [PARALLEL n]`\n\n通过查看 `V$SESSION` 中的 `PDDL_STATUS`\
  \ 列，你可以看到最后执行的是哪条命令（如果有的话）。`PDDL_STATUS` 的有效值为 `DISABLED`、`ENABLED` 或 `FORCED`。我们稍后会解释这些命令的作用，但首先我们需要查看\
  \ Listing 8-17，它展示了运行并行 `DDL` 的语法结构。\n\n**Listing 8-17. 并行 DDL 语法**\n\n```sql\n\
  CREATE INDEX t1_i1\n   ON t1 (c1)\n   PARALLEL 10;\n```\n\nListing 8-17 使用了 `PARALLEL`\
  \ 子句，该子句在所有支持并行 `DDL` 的语句中都可用，用于`建议`索引内容以并行方式写入。`并行度`（`DOP`）在语句中被指定为“10”。如果我不希望显式指定\
  \ `DOP`，这个 `PARALLEL` 子句本可以简写为 `PARALLEL`。在解释更多概念之后，我将在几页后解释什么是 `DOP`。\n\n`PDDL_STATUS`\
  \ 的值可以解释如下：\n\n*   如果 `PDDL_STATUS` 的值是 `DISABLED`，那么即使 Listing 8-17 中存在 `PARALLEL`\
  \ 子句，索引 `T1_I1` 也不会被并行构建。\n*   如果 `PDDL_STATUS` 的值是 `ENABLED`，索引将使用指定的或默认的并行度来构建。\n\
  *   如果 `PDDL_STATUS` 的值是 `FORCED`，索引将使用 `ALTER SESSION FORCE PARALLEL` `DDL` 语句中指定的度来并行构建。实际上，如果\
  \ `PDDL_STATUS` 的值是 `FORCED`，即使 `SQL` 语句中没有指定 `PARALLEL` 子句，表也会被并行创建。\n\n![image](img/sq.jpg)\
  \ `提示` 在 12cR1 之前的版本中，执行并行 DDL 时指定 DOP 也会为后续的并行查询设置默认 DOP。我无法告诉你有多少次看到 DBA 或开发者在创建或重建索引后忘记执行\
  \ `ALTER INDEX xxx PARALLEL 1` 语句。明智的是，在 12cR1 中，如果你并行移动表或重建索引，数据字典不会被更新。但是，如果你并行创建表或索引，数据字典会像以前的版本一样保留你指定的\
  \ DOP，所以请继续小心！\n\n## 控制并行 DML\n\n与并行 DDL 类似，我们需要考虑会话状态和并行 DML 语句的语法，但还有其他考虑因素。默认情况下，并行\
  \ DML 是*禁用的*，但可以使用以下命令之一为当前会话进行更改：\n\n*   `ALTER SESSION DISABLE DML`\n*   `ALTER\
  \ SESSION ENABLE PARALLEL DML`\n*   `ALTER SESSION FORCE PARALLEL DML [PARALLEL\
  \ n]`\n\n通过查看 `V$SESSION` 中的 `PDML_STATUS` 列，你可以看到最后执行了这些语句中的哪一个。\n\n我稍后会解释为什么并行\
  \ DML 默认是禁用的。首先，看一下 代码清单 8-18，它展示了当并行 DML 启用时如何使用。\n\n**代码清单 8-18. 并行 DML 语法**\n\
  \n```\nALTER SESSION ENABLE PARALLEL DML;\n\nINSERT INTO t2 (c2)\n   SELECT /*+\
  \ parallel */\n         c1 FROM t1;\n\nINSERT /*+ parallel(t3 10) */\n      INTO\
  \  t3 (c3)\n   SELECT c1 FROM t1;\n\nALTER TABLE t3 PARALLEL 10;\n\nINSERT INTO\
  \ t3 (c3)\n   SELECT c1 FROM t1;\n\nCOMMIT;\n```\n\n代码清单 8-18 中的第一个 `INSERT` 语句使用*语句级提示*来允许整个语句中的并行\
  \ DML 和并行查询。因为它是一个语句级提示，它可以出现在任何合法的位置。\n\n代码清单 8-18 中的第二个查询展示了 `PARALLEL` 提示的另一种变体，它指定了一个特定对象，即表\
  \ `T3`，以及一个可选的 DOP。为了使提示应用于并行 DML，它需要像所示那样放在查询中 `INSERT` 关键字之后。这是因为该提示应用于我们之前讨论过的\
  \ `INS$1` 查询块。\n\n代码清单 8-18 中的第三个查询没有包含任何提示。然而，并行 DML 仍然可能，因为前面的 `ALTER TABLE` 命令为对象设置了默认\
  \ DOP。`PDML_STATUS` 的值可以解释如下：\n\n*   如果 `PDML_STATUS` 的值是 `DISABLED`，那么 代码清单 8-18\
  \ 中的语句都不会使用并行 DML。\n*   如果 `PDML_STATUS` 的值是 `ENABLED`，那么 代码清单 8-18 中的所有语句都将使用并行\
  \ DML。\n*   如果 `PDML_STATUS` 的值是 `FORCED`，那么 代码清单 8-18 中的所有语句都将使用 `ALTER SESSION\
  \ FORCE PARALLEL DML` 语句中指定的 DOP 来使用并行 DML。事实上，如果 `PDML_STATUS` 的值是 `FORCED`，即使\
  \ SQL 语句中没有指定提示并且涉及的表没有指定大于 1 的 DOP，也会使用并行 DML。\n\n现在让我回到为什么并行 DML 在会话级别默认是禁用的问题。如果我们看看运行\
  \ 代码清单 8-19 中的代码会发生什么，这会有所帮助。\n\n**代码清单 8-19. 在并行修改后尝试读取表**\n\n```\nALTER SESSION\
  \ ENABLE PARALLEL DML;\n\n-- 下面的语句成功\n\nINSERT INTO t2 (c2)\n   SELECT /*+ parallel\
  \ */\n         c1 FROM t1;\n\n-- 下面的语句失败\n\nINSERT INTO t2 (c2)\n   SELECT c1 FROM\
  \ t1;\n\nCOMMIT;\n\n-- 下面的语句成功\n\nINSERT INTO t2 (c2)\n   SELECT c1 FROM t1;\n\n\
  -- 下面的语句成功\n\nINSERT INTO t2 (c2)\n   SELECT c1 FROM t1;\n\nCOMMIT;\n```\n\n如果你尝试运行\
  \ 代码清单 8-19 中的代码，你会发现第二个 `INSERT` 语句失败了，即使它没有使用并行 DML。错误代码是\n\n```\nORA-12838: cannot\
  \ read/modify an object after modifying it in parallel\n```\n\n问题是并行 DML 语句可能使用所谓的*直接路径写入*，这意味着插入的行不在\
  \ SGA 中，并且只能在事务提交后从磁盘读取。这种语义变化是并行 DML 默认不启用的原因。请注意，从 12cR1 开始，直接路径写入仅在向表中插入行时使用，而且并非总是如此。当行被更新或删除时，从不使用直接路径写入。但是，无论执行哪种\
  \ DML 语句是并行的，你都会收到相同的错误消息。\n\n## 控制并行查询\n\n我们现在来到 SQL 语句可以并行化的三种方式中最复杂的一种：并行查询。并行查询在会话级别默认是启用的，冒着重复的风险，这里是在会话级别影响并行查询的三个命令：\n\
  \n*   `ALTER SESSION DISABLE PARALLEL QUERY`\n*   `ALTER SESSION ENABLE QUERY`\n\
  *   `ALTER SESSION FORCE PARALLEL QUERY [PARALLEL n]`\n\n![image](img/sq.jpg) `注意`\
  \ 尽管并行 DDL 和并行 DML 可以用 `ALTER SESSION FORCE` 语句强制执行，但 `ALTER SESSION FORCE PARALLEL\
  \ QUERY` 并不会强制并行查询！在奠定更多基础之后，我稍后会解释原因。\n\n通过查看 `V$SESSION` 中的 `PQ_STATUS` 列，你可以看到最后执行了这些语句中的哪一个。\n\
  \n与并行 DML 类似，并行查询可以在语句级别通过设置对象的 DOP 和/或使用提示来管理。然而，在讨论并行查询时，需要考虑更多的提示。这些是我将在后续章节中讨论的提示：\n\
  \n*   `PARALLEL`\n*   `PARALLEL_INDEX`\n*   `PQ_DISTRIBUTE`\n*   `PQ_REPLICATE`\n\
  \n我还没准备好提供并行查询的例子。我们首先需要涵盖更多概念，从*并行粒度*开始。\n\n## 并行粒度\n\n当并行访问对象时，可以分配两种类型的粒度。我们将首先讨论*块范围粒度*，然后讨论*分区粒度*。永远记住，当多个对象在同一\
  \ SQL 语句中被访问时，有些可能使用块范围粒度访问，有些使用分区粒度访问，有些可能串行访问而不使用任何粒度。\n\n### 块范围粒度\n\n当使用多块读取访问对象时，我们可以并行化这些读取。例如，当需要\
  \ `TABLE FULL SCAN` 操作时，可以使用多个并行查询服务器，每个服务器读取表的一部分。\n\n为此，表被分成所谓的块范围粒度。这些块范围粒度是在运行时识别的，执行计划中没有任何信息告诉你块范围粒度有多少或者它们有多大。块范围粒度的数量通常比\
  \ DOP 大得多。\n\n即使访问分区表的多个分区时，也可以使用块范围粒度。图 8-1 展示了基本思想。\n\n![9781430259770_Fig08-01.jpg](img/9781430259770_Fig08-01.jpg)\n\
  \n**图 8-1. 分区表上的块范围粒度**\n\n图 8-1 显示了一个有三个分区的表如何被分成六个大致相等大小的块范围粒度，即使分区大小差异很大。例如，我们可以使用两个并行查询服务器，每个服务器最终可能会从三个块范围粒度中读取数据。\n\
  \n\n![image](img/sq.jpg) `提示` 当使用区块范围粒度时，执行计划中会出现操作 `PX BLOCK ITERATOR`。此操作的子项是派生出这些粒度的对象。\n\
  \n对于大型表，通常有几十个甚至几百个粒度，许多粒度被分配给每个并行查询服务器。\n\n现在，让我们继续讨论第二种类型的粒度——分区粒度。\n\n## 分区粒度\n\
  \n当表或索引被分区时，可以分配分区粒度而不是区块范围粒度。在这种情况下，每个分区（或子分区）恰好有一个粒度。这听起来不是一个好主意，因为粒度的大小可能差异很大，如图\
  \ 8-2 所示：\n\n![9781430259770_Fig08-02.jpg](img/9781430259770_Fig08-02.jpg)\n\n图\
  \ 8-2. 分区表上的分区粒度\n\n正如你所见，现在三个分区只有三个粒度，并且这些粒度的大小都不同。分区粒度可能导致一些并行查询服务器完成了大部分工作，而其他服务器则处于空闲状态。\n\
  \n![image](img/sq.jpg) `提示` 当使用分区粒度时，许多以 `PX PARTITION ...` 开头的操作之一会出现在执行计划中。此操作的子项是派生出这些粒度的对象。\n\
  \n使用分区粒度主要有三个原因：\n\n*   在执行并行 DDL 或并行 DML 时，让一个并行查询服务器写入一个分区通常比多个服务器写入更高效。\n*  \
  \ 正如我们将在 第 10 章 中看到的，不可能对未分区的索引并行执行 `INDEX RANGE SCAN` 或 `INDEX FULL SCAN`。然而，一个并行查询服务器可以扫描索引的一个分区，而其他并行查询服务器扫描不同的分区。\n\
  *   *分区连接*（*Partition-wise joins*）需要分区粒度。我们将在 第 11 章 中介绍分区连接。\n\n现在我们知道了数据是如何为并行化而拆分的，是时候看看如何组织并行查询服务器以使它们能够访问这些粒度数据了。\n\
  \n## 数据流操作符\n\nOracle 文档讨论了一种称为**数据流操作符**（**Data Flow Operator**）或 DFO 的东西。就我个人而言，我认为从语法上它应该被称为数据流操作（Data\
  \ Flow Operation），但既然我从现在开始将使用缩写 DFO，我们就不必太担心这个细节。\n\nDFO 基本上是一个执行计划中的一个或多个行源操作，它们形成一个并行化工作的单一单元。为了解释这一点，我终于需要展示一个带有并行查询的实际执行计划了！清单\
  \ 8-20 展示了一个只有一个 DFO 的执行计划。\n\n清单 8-20. 只有一个 DFO 的执行计划\n\n```\nCREATE TABLE t5\n\
  PARTITION BY HASH (c1)\n   PARTITIONS 16\nAS\n       SELECT ROWNUM c1, ROWNUM c2\n\
  \         FROM DUAL\n   CONNECT BY LEVEL <= 10000;\n\nCREATE INDEX t5_i1\n   ON\
  \ t5 (c2) local;\n\nSELECT /*+ index(t5) parallel_index(t5) */\n       *\n  FROM\
  \ t5\n WHERE c2 IS NOT NULL;\n\n| Id  | Operation                              \
  \      | Name     |    TQ  |IN-OUT| PQ Distrib |\n\n|   0 | SELECT STATEMENT   \
  \                          |          |        |      |            |\n|   1 |  PX\
  \ COORDINATOR                              |          |        |      |        \
  \    |\n|   2 |   PX SEND QC (RANDOM)                        | :TQ10000 |  Q1,00\
  \ | P->S | QC (RAND)  |\n|   3 |    PX PARTITION HASH ALL                     |\
  \          |  Q1,00 | PCWC |            |\n|   4 |     TABLE ACCESS BY LOCAL INDEX\
  \ ROWID BATCHED| T5       |  Q1,00 | PCWP |            |\n|   5 |      INDEX FULL\
  \ SCAN                         | T5_I1    |  Q1,00 | PCWP |            |\n```\n\n\
  清单 8-20 首先创建了一个分区表 `T5` 和一个关联的本地索引 `T5_I1`。然后查询该表，指定提示以通过索引访问 `T5`。由于 `INDEX FULL\
  \ SCAN` 无法使用区块范围粒度，你可以看到 `PX PARTITION HASH ALL` 操作，这表明使用了分区粒度。每个并行查询服务器将访问一个或多个分区，并对这些分区执行操作\
  \ 4 和 5。\n\n当每个并行查询服务器从表中读取行时，这些行被发送到*查询协调器*（*query coordinator*, QC），如操作 2 所示。QC\
  \ 是开始时存在的原始会话。除了接收并行查询服务器的输出外，QC 还负责将任何类型的粒度分配给并行查询服务器。\n\n注意执行计划中 `IN-OUT` 列的内容。操作\
  \ 3 显示 `PCWC`，表示*与子项并行组合*（*Parallel Combined with Child*）。操作 5 显示 `PCWP`，表示*与父项并行组合*（*Parallel\
  \ Combined with Parent*）。操作 4 则与父项和子项都组合。此信息可用于识别执行计划中每个 DFO 内的行源操作组。顺便说一下，操作 2\
  \ 的 `IN-OUT` 列显示 `P->S`，表示*并行到串行*（*Parallel to Serial*）；并行查询服务器正在向 QC 发送数据。\n\n\
  这理解起来并不太难，对吧？让我继续一个涉及多个 DFO 的更复杂示例。\n\n## 并行查询服务器集与 DFO 树\n\n清单 8-20 中的执行计划只涉及一个\
  \ DFO。一个执行计划可能涉及多个 DFO。DFO 的集合被称为 *DFO 树*（*DFO tree*）。清单 8-21 提供了一个具有多个 DFO 的 DFO\
  \ 树示例。\n\n清单 8-21. 具有多个 DFO 的并行查询\n\n```\nBEGIN\n   FOR i IN 1 .. 4\n   LOOP\n \
  \     DBMS_STATS.gather_table_stats (\n         ownname   => SYS_CONTEXT ('USERENV',\
  \ 'CURRENT_SCHEMA')\n        ,tabname   => 'T' || i);\n   END LOOP;\nEND;\n/\n\n\
  WITH q1\n     AS (  SELECT c1, COUNT (*) cnt1\n             FROM t1\n         GROUP\
  \ BY c1)\n    ,q2\n     AS (  SELECT c2, COUNT (*) cnt2\n             FROM t2\n\
  \         GROUP BY c2)\nSELECT /*+ monitor optimizer_features_enable('11.2.0.3')\
  \ parallel*/\n       c1, c2, cnt1\n  FROM q1, q2\n WHERE cnt1 = cnt2;\n\n| Id  |\
  \ Operation                   | Name     |    TQ  |IN-OUT| PQ Distrib |\n\n|   0\
  \ | SELECT STATEMENT            |          |        |      |            |\n|   1\
  \ |  PX COORDINATOR             |          |        |      |            |\n|   2\
  \ |   PX SEND QC (RANDOM)       | :TQ10003 |  Q1,03 | P->S | QC (RAND)  |\n|   3\
  \ |    HASH JOIN BUFFERED       |          |  Q1,03 | PCWP |            |\n|   4\
  \ |     VIEW                    |          |  Q1,03 | PCWP |            |\n|   5\
  \ |      HASH GROUP BY          |          |  Q1,03 | PCWP |            |\n|   6\
  \ |       PX RECEIVE            |          |  Q1,03 | PCWP |            |\n|   7\
  \ |        PX SEND HASH         | :TQ10001 |  Q1,01 | P->P | HASH       |\n|   8\
  \ |         PX BLOCK ITERATOR   |          |  Q1,01 | PCWC |            |\n|   9\
  \ |          TABLE ACCESS FULL  | T1       |  Q1,01 | PCWP |            |\n|  10\
  \ |     PX RECEIVE              |          |  Q1,03 | PCWP |            |\n|  11\
  \ |      PX SEND BROADCAST      | :TQ10002 |  Q1,02 | P->P | BROADCAST  |\n|  12\
  \ |       VIEW                  |          |  Q1,02 | PCWP |            |\n|  13\
  \ |        HASH GROUP BY        |          |  Q1,02 | PCWP |            |\n|  14\
  \ |         PX RECEIVE          |          |  Q1,02 | PCWP |            |\n|  15\
  \ |          PX SEND HASH       | :TQ10000 |  Q1,00 | P->P | HASH       |\n|  16\
  \ |           PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |\n|  17\
  \ |            TABLE ACCESS FULL| T2       |  Q1,00 | PCWP |            |\n```\n\
  \n\n\n"
- '# 并行执行计划：DFO 树与表队列


  收集缺失对象统计信息后，清单 8-21 发出了并行查询。我指定了 `optimizer_features_enable(''11.2.0.3'')` 提示；12.1.0.1
  计划可能会过早地呈现一些新特性。


  使用 清单 8-21 的 `IN-OUT` 列来识别 DFO 是可行的，但有点麻烦。更简单的方法是查看 `TQ` 列，可以看到四个不同的值，反映了该计划中的四个
  DFO。我们还可以查看每个 `PX SEND` 操作上方的操作，以了解每个 DFO 将数据发送到了哪里。


  对于像这样的复杂并行执行计划，画出 DFO 树通常很有帮助。图 8-3 展示了与 清单 8-21 关联的 DFO 树的一种描述方式。


  ![9781430259770_Fig08-03.jpg](img/9781430259770_Fig08-03.jpg)


  图 8-3. 清单 8-21 的 DFO 树图示


  从图 8-3 可以看出，四个 DFO 中有三个将数据发送到另一个 DFO，而名为 `Q1, 03` 的 DFO（清单 8-21 执行计划中的操作 2 到 6 和操作
  10）则将数据发送给 QC。


  DFO 树既不是高度平衡的，也不是二叉的；树的叶子节点距离根节点的距离各不相同，一个分支节点可能有一个或多个子节点。树的叶子节点往往是诸如全表扫描之类的操作，而分支节点则往往是连接、聚合或排序操作。


  为了支持多个并发的 DFO，Oracle 数据库创建了**并行查询服务器集 (PQSS)** 的概念，每个集一次在一个 DFO 上操作。现在，如果每个 DFO
  都有一个 PQSS，对于一个复杂的 DFO 树来说，我们将有数量惊人的进程。事实上，对于每个 DFO 树，我们最多只有**两个** PQSS。


  ![image](img/sq.jpg) **提示** PQSS 中的服务器数量被称为*并行度 (DOP)*，并且如果一个 DFO 树中有两个 PQSS，则两者的
  DOP 将相同。此外，如果你使用提示为一个表指定 DOP 为 4，为另一个表指定 DOP 为 5，通常会使用较高的数字，从而分配 10 个并行查询服务器（尽管这个数字可能会减少以节省资源）。


  为了理解我们如何能仅用两个 PQSS 就应付过去，是时候看看 DFO 之间以及 DFO 与 QC 之间是如何通信的了。是时候引入**表队列**了。


  ## 表队列与 DFO 排序


  图 8-3 中连接节点的箭头表示数据从一个 DFO 发送到另一个 DFO 或发送给 QC。这种通信是通过**表队列 (TQ)** 实现的。每个表队列都有一个生产者和一个消费者。表队列的名称显示在
  `PX SEND` 操作的执行计划的 `NAME` 列中，并且与作为该 TQ 生产者的 DFO 的名称有显著的相似性。这不是巧合！


  当生产者向 TQ 发送数据时，*必须*有一个消费者正在主动等待该数据；不要让“队列”这个词误导你认为大量数据可以缓冲在 TQ 中。它不能。如果生产者和消费者正在使用
  TQ 交换数据，我将称一个 `TQ` 为*活动的*。谈论一段内存是活动的有点奇怪，但我相信你明白我的意思。


  那么，运行时引擎如何仅用两个 PQSS 来处理整个 DFO 树呢？嗯，运行时引擎必须遵循几条规则：


  1.  在任何时间点，对于一个 DFO 树，最多只能有一个 TQ 是活动的。

  2.  在接收时，TQ 的消费者不得将数据转发到另一个 TQ。这通常通过在工作区中缓冲数据来实现。

  3.  运行时引擎总是从 `:TQ10000` 开始，并按数字顺序处理每个 TQ。


  理解这第三条规则是读懂并行执行计划的关键。引用 Jonathan Lewis 的话：*跟着 TQ 走*。让我们使用这些规则来梳理 清单 8-21 中的事件序列。


  两个 PQSS 最初被分配给 `:TQ10000`，一个 PQSS（让我们称之为 PQSS1）生产，另一个（让我们称之为 PQSS2）消费。这意味着 PQSS1
  从运行 DFO Q1, 00 开始，而 PQSS2 从运行 Q1, 02 开始。第 13 行有一个 `HASH GROUP BY` 聚合，用于缓冲数据，以便 PQSS2
  能够遵守上面的规则 2。一旦来自表 `T2` 的所有数据被分组，DFO Q1, 00 就完成了。以下是与 `:TQ10000` 相关的操作集高亮显示：


  ```

  | Id  | Operation                   | Name     |    TQ  |IN-OUT| PQ Distrib |

  |  13 |        HASH GROUP BY        |          |  Q1,02 | PCWP |            |

  |  14 |         PX RECEIVE          |          |  Q1,02 | PCWP |            |

  |  15 |          PX SEND HASH       | :TQ10000 |  Q1,00 | P->P | HASH       |

