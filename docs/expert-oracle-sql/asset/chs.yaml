  .\"C2\"=3 OR \"T_PART2\".\"C2\"=5)\n```\n\n执行计划中的更改在清单 11-22 中以粗体显示。这里发生的情况是，`STATISTICS\
  \ COLLECTOR` 从 `T1` 缓冲一定数量的行（当前 DOP 的两倍），如果未达到该数量，则将原始的哈希分发机制更改为广播。\n\n你可能会认为，一旦来自\
  \ `T1` 的行被广播，执行连接的同一个 DFO 将访问 `T_PART2`，并且 `:TQ10001` 将不会被使用。这当然是我最初的假设。不幸的是，在 12cR1\
  \ 中，来自 `T_PART2` 的行仍然通过一个 TQ 发送！据我所知，广播来自 `T1` 的行的唯一优点是使用了轮询分发机制而不是哈希分发，因此可以避免由哈希函数带来的负载不均衡。希望这个冗余的\
  \ DFO 在未来某个时候能被移除。\n\n考虑到我在第 6 章中关于自适应行为的评论，你可能会惊讶地发现我其实挺喜欢这个功能。这个功能与迄今为止所有其他自适应功能的最大区别在于，决定使用哈希分发还是广播分发是在查询每次运行时动态做出的。因此，你可以在一次执行时使用哈希分发，下一次执行时广播，第三次执行时又回到哈希分发。如果适应性决策在首次做出后不是固定不变的，我是否会更热衷于自适应连接方法这类功能呢？我当然会。\n\
  \n## 验证自适应连接方法\n\n如果你查看 *VLDB 和分区指南* 中关于*使用并行执行*的章节，你会发现一些可用于研究并行执行行为和性能的视图信息。其中最重要的是\
  \ `V$PQ_TQSTAT`，可下载的脚本在测试用例中使用了这个视图，以证明广播与哈希分发的选择是在游标每次执行时动态决定的。\n\n现在是时候解释这个 `HASH\
  \ JOIN BUFFERED` 操作是什么，以及为什么它是对性能的巨大威胁了。\n\n### 数据缓冲\n\n当 `T1` 是 3GB 而 `T_PART2`\
  \ 也是 3GB 时，串行执行的哈希连接必然溢出到磁盘，但使用哈希分发并行实现的哈希连接可能不会。另一方面，假设 `T1` 是 500MB 而 `T_PART2`\
  \ 是 30GB——串行哈希连接可能不会溢出到磁盘，但假设同样有 15GB 的 PGA 可用，这个并行执行计划将会溢出到磁盘！\n\n\n\n### 布隆过滤\n\
  \n花朵会绽放，有时你需要修剪它们。但如果你认为布隆过滤与分区修剪有关，那可就错了！事实上，根据维基百科关于布隆过滤的文章，这项技术是由伯顿·霍华德·布隆在 1970\
  \ 年发明的。该技术并非 Oracle 数据库或一般数据库所特有。但 Oracle 在优化并行连接时对其进行了巧妙应用。\n\n我们试图避免的场景如下：我们将一行数据从探头行源通过\
  \ TQ 发送到消耗端 DFO，后者将其与驱动行源执行连接。不幸的是，消耗端 DFO 发现它接收到的行与驱动行源中的任何行都不匹配，于是丢弃了这行来自探头行源的数据。多么浪费啊！\n\
  \n通过某种方式，可以由生成端 DFO 在通过 TQ 发送大多数不匹配的探头行源数据之前就将其丢弃！就我而言，这简直是纯粹的魔法，但如果你真想了解伯顿的发明是如何应用于\
  \ Oracle 数据库的并行连接的，只需谷歌搜索“Christian Antognini Bloom Filtering”，你首先找到的文章将解释一切。\n\n\
  布隆过滤涉及从驱动行源生成少量数据，并将其反向通过 TQ 发送，以便用于过滤行。这种过滤有时不会显示在操作表或过滤谓词中，但有时会。代码清单 11-23 回到了代码清单\
  \ 11-18 的部分分区智能连接，以查看当我们对探头行源而非驱动行源进行分区时会发生什么。\n\n代码清单 11-23. 带分区探头行源的部分分区智能连接\n\
  \n```\n SELECT /*+ parallel(t_part1 8)\n           parallel(t1 8) full(t1)\n   \
  \        leading(t1)\n           no_swap_join_inputs(t_part1)\n           px_join_filter(t_part1)\n\
  \           pq_distribute(t_part1 PARTITION NONE)*/\n       *\n  FROM t_part1 JOIN\
  \ t1 USING (c1);\n\n| Id  | 操作                           | 名称     | Pstart| Pstop\
  \ |    TQ  |IN-OUT|\n\n|   0 | SELECT STATEMENT                  |          |  \
  \     |       |        |      |\n|   1 |  PX COORDINATOR                   |   \
  \       |       |       |        |      |\n|   2 |   PX SEND QC (RANDOM)       \
  \      | :TQ10001 |       |       |  Q1,01 | P->S |\n|*  3 |    HASH JOIN      \
  \                |          |       |       |  Q1,01 | PCWP |\n|   4 |     JOIN\
  \ FILTER CREATE            | :BF0001  |       |       |  Q1,01 | PCWP |\n|   5 |\
  \      PART JOIN FILTER CREATE      | :BF0000  |       |       |  Q1,01 | PCWP |\n\
  |   6 |       PX RECEIVE                  |          |       |       |  Q1,01 |\
  \ PCWP |\n|   7 |        PX SEND PARTITION (KEY)    | :TQ10000 |       |       |\
  \  Q1,00 | P->P |\n|   8 |         PX BLOCK ITERATOR         |          |      \
  \ |       |  Q1,00 | PCWC |\n|   9 |          TABLE ACCESS FULL        | T1    \
  \   |       |       |  Q1,00 | PCWP |\n|  10 |     JOIN FILTER USE             \
  \  | :BF0001  |       |       |  Q1,01 | PCWP |\n|  11 |      PX PARTITION HASH\
  \ JOIN-FILTER|          |:BF0000|:BF0000|  Q1,01 | PCWC |\n|* 12 |       TABLE ACCESS\
  \ FULL           | T_PART1  |:BF0000|:BF0000|  Q1,01 | PCWP |\n\n谓词信息 (通过操作 id 识别):\n\
  \n3 - access(\"T_PART1\".\"C1\"=\"T1\".\"C1\")\n  12 - filter(SYS_OP_BLOOM_FILTER(:BF0001,\"\
  T_PART1\".\"C1\")) \n```\n\n代码清单 11-23 显示了两个布隆过滤器的创建及其应用。布隆过滤器 `:BF0000` 在第 5 行创建，并在第\
  \ 11 行用于执行分区修剪，因为已知来自 `T_PART1` 的特定分区的任何行都不可能与来自 `T1` 的任何选中行匹配——所以分区修剪和布隆过滤之间终究是有联系的！第二个布隆过滤器\
  \ `:BF0001` 在第 4 行创建，并在第 12 行用于在读取行时进行过滤。\n\n你会注意到查询中有一个提示 `PX_JOIN_FILTER`。如果没有这个提示，CBO\
  \ 在这种情况下不会应用 `:BF0001`，不过用于分区修剪的布隆过滤无法通过 `PX_JOIN_FILTER` 强制启用，也无法通过 `NO_PX_JOIN_FILTER`\
  \ 禁用。\n\n## 总结\n\n尽管在查询或子查询中连接行源只有四种基本方法，但在执行计划中可能出现的操作实际上要多得多。这些变体是由于哈希连接输入交换以及需要支持不同类型连接而产生的：内连接、外连接、全外连接、分区外连接以及多种类型的半连接和反连接都需要独立的连接操作。\n\
  \n当查询或子查询中的多个行源被连接时，连接树会作为 CBO 选择连接顺序的结果而创建，但存在许多限制约束了连接顺序的选择。特别地，CBO 从不选择丛状连接，并且外连接中的保留行源必须先于可选行源。这些限制无法被覆盖，即使使用提示也不行，尽管在某些情况下哈希连接输入交换是一种替代方案。\n\
  \n\n"
- "# 第 12 章\n\n## 最终状态优化\n\n当并行执行与连接操作结合使用时，有多种不同的分布方法可供选择，但在无法进行分区级连接的情况下，对探查行源的数据缓冲往往是性能的隐性威胁。\n\
  \n第 10 章 涵盖了访问行源的方法，本章则讨论了这些行源如何被连接。一个不幸的事实是，成本基优化器在选择访问和连接行源的方式时常常做出不恰当的决定，理解这些概念背后的计算机科学原理对于\
  \ SQL 调优至关重要。但仅仅理解访问和连接行源的机制是不够的。我们还需要理解 CBO 所遵循流程的其他方面。第 12 章 重点介绍优化过程，随后第 13 章\
  \ 将探讨查询转换。\n\n__________________\n\n¹当涉及复合分区时，可以容忍一些差异。\n\n我在第 2 章介绍 CBO 时解释过，CBO\
  \ 通过两个过程为运行时引擎生成执行计划：查询转换和最终状态优化。本章我将介绍最终状态优化，而转换将是第 13 章的重点。换句话说，本章探讨的是在执行了任何查询转换之后，CBO\
  \ 如何评估不同的候选执行计划。\n\n在第 10 章和第 11 章中，我介绍了访问和连接查询中指定的行源的机制。在本章中，我将提供 CBO 用于确定最佳连接顺序、连接方法和访问方法的高级概述。我还将探讨\
  \ `inlist iteration`。严格来说，并行化是最终状态转换的一部分，但我在第 2 章和第 8 章中已将并行化作为一个单独的主题进行了讨论，因此这里无需赘述。\n\
  \n阅读本章时请记住，所涉及的主题都不是相互独立的。在确定连接顺序之前，你可能无法总是知道访问表的最佳索引（如果有的话）。但最佳的连接顺序可能又取决于被连接表的访问方法。这实际上意味着\
  \ CBO 必须进行多次评估。事实上，本章涵盖的整个最终状态优化过程，需要针对每个候选的查询转换重复进行！\n\n幸运的是，正如我在第 2 章中所说，我们不需要了解\
  \ CBO 如何解决所有这些依赖关系的精细细节，也不需要了解它为了在合理时间内完成任务而采用的任何捷径。我们只需要对 CBO 的操作方式有足够的了解，以便当出现问题时，我们能够找出原因并想出解决办法。\n\
  \n最终状态优化的目标是找出成本最低的执行计划；换句话说，就是运行时引擎最有可能在最短时间内执行的执行计划。实现这一目标的主要方法是：\n\n-   避免检索行后又将其丢弃\n\
  -   避免访问数据块后又丢弃块中的所有行\n-   避免多次读取同一个数据块\n-   使用多块读取而非单块读取来读取多个连续的数据块\n\n避免浪费这一主题是本章的关键。让我们从\
  \ CBO 如何选择最优连接顺序开始。\n\n### 连接顺序\n\n确定 SQL 查询的最佳连接顺序变化多端，完全可以写一整本书来讨论。事实上，在 2003\
  \ 年，Dan Tow 就这么做了！他由 O'Reilly 出版的《SQL Tuning》一书，几乎全部致力于描述一种系统化的方法来确定查询的最佳连接顺序。该书出版时，Oracle\
  \ 尚未支持哈希连接输入交换或星型转换（我们将在第 13 章中讨论这些）。如今，连接顺序优化的主题比 2003 年时更加复杂。\n\n幸运的是，如今连接顺序的问题在\
  \ Oracle SQL 性能专家需要担心的问题清单上排名已经相当靠后。这是因为，*如果*（这是一个很大的前提）CBO 能够对每次对象访问和每次连接做出准确的基数估计，那么\
  \ CBO 在确定连接顺序方面做得相当不错。CBO 所使用的连接顺序算法的可靠性，是 Wolfgang Breitling 著名的“通过基数反馈进行调优”论文的核心（我在第\
  \ 6 章的不同上下文中提到过）。Wolfgang 的调优方法是纠正 CBO 做出的基数估计，然后祈祷 CBO 做出明智的决定。而如今，CBO 通常*确实*会做出明智的决定！\n\
  \n那么，是什么让一种连接顺序比另一种更好呢？请看清单 12-1，它提供了一个非常简单的例子。\n\n**清单 12-1. 简单的连接顺序优化**\n\n```sql\n\
  SELECT /*+ gather_plan_statistics */\n       COUNT (*)\n  FROM oe.order_items i\
  \ JOIN oe.product_descriptions p USING (product_id)\n WHERE i.order_id = 2367 AND\
  \ p.language_id = 'US';\n\nSET LINES 200 PAGES 0\n\nSELECT *\n  FROM TABLE (DBMS_XPLAN.display_cursor\
  \ (format => 'BASIC ROWS IOSTATS LAST'));\n\n| Id  | Operation           | Name\
  \           | Starts | E-Rows | A-Rows |\n\n|   0 | SELECT STATEMENT    |      \
  \          |      1 |        |      1 |\n|   1 |  SORT AGGREGATE     |         \
  \       |      1 |      1 |      1 |\n|   2 |   NESTED LOOPS      |            \
  \    |      1 |     13 |      8 |\n|*  3 |    INDEX RANGE SCAN | ORDER_ITEMS_UK\
  \ |      1 |      8 |      8 |\n|*  4 |    INDEX UNIQUE SCAN| PRD_DESC_PK    | \
  \     8 |      2 |      8 |\n\nPredicate Information (identified by operation id):\n\
  \n3 - access(\"I\".\"ORDER_ID\"=2367)\n4 - access(\"I\".\"PRODUCT_ID\"=\"P\".\"\
  PRODUCT_ID\" AND \"P\".\"LANGUAGE_ID\"='US')\n```\n\n清单 12-1 连接了示例模式`OE`中的`ORDER_ITEMS`和`PRODUCT_DESCRIPTIONS`表。查询对两个表都有选择谓词，并且在`PRODUCT_ID`上有一个等值连接谓词。查询中唯一的提示是`GATHER_PLAN_STATISTICS`，它用于收集运行时统计信息。\n\
  \n根据`DBMS_XPLAN.DISPLAY_CURSOR`显示的执行计划，CBO 决定采用以下连接顺序：`ORDER_ITEMS` `PRODUCT_DESCRIPTIONS`。CBO\
  \ 估计从`ORDER_ITEMS`中会有 8 行匹配，并且由于操作 3 的`E-ROWS`和`A-ROWS`列相匹配，我们知道这是一个完全准确的猜测。尽管操作\
  \ 4 是对`PRODUCT_DESCRIPTIONS`表索引的`INDEX UNIQUE SCAN`，但 CBO 假设可能会返回多于一行；预计有 13 行输入到第\
  \ 1 行的`SORT AGGREGATE`操作，而不是实际返回的 8 行。这无关紧要。CBO 已经选择了正确的连接顺序。清单 12-2 让我们看看如果我们试图覆盖选定的连接顺序会发生什么。\n\
  \n**清单 12-2. 不恰当的连接顺序**\n\n```sql\nSELECT /*+ gather_plan_statistics leading(p)*/\n\
  \       COUNT (*)\n  FROM oe.order_items i JOIN oe.product_descriptions p USING\
  \ (product_id)\n WHERE i.order_id = 2367 AND p.language_id = 'US';\n\nSET LINES\
  \ 200 PAGES 0\n```\n\n\nSELECT *\n  FROM TABLE (DBMS_XPLAN.display_cursor (format\
  \ => 'BASIC ROWS IOSTATS LAST'));\n\n| 标识 | 操作                     | 名称        \
  \   | 开始次数 | 预估行数 | 实际行数 |\n|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT\
  \       |                |      1 |        |      1 |\n|   1 |  SORT AGGREGATE \
  \       |                |      1 |      1 |      1 |\n|   2 |   NESTED LOOPS  \
  \       |                |      1 |     13 |      8 |\n|*  3 |    INDEX FAST FULL\
  \ SCAN| PRD_DESC_PK    |      1 |    288 |    288 |\n|*  4 |    INDEX UNIQUE SCAN\
  \   | ORDER_ITEMS_UK |    288 |      1 |      8 |\n\n谓词信息（由操作标识识别）：\n3 - filter(\"\
  P\".\"LANGUAGE_ID\"='US')\n4 - access(\"I\".\"ORDER_ID\"=2367 AND \"I\".\"PRODUCT_ID\"\
  =\"P\".\"PRODUCT_ID\")\n\n清单 12-2 中的 `LEADING` 提示让我们看到连接顺序 `PRODUCT_DESCRIPTIONS`\
  \ `ORDER_ITEMS` 是如何执行的。结果证明，有 288 行符合 `LANGUAGE_ID` 上的谓词，这再次被 CBO（基于成本的优化器）完美预测到。然而，在这\
  \ 288 个产品描述中，有 280 个最终在第 2 行的 `NESTED LOOPS` 操作中被丢弃了。真是浪费。现在我们明白了为什么 `PRODUCT_DESCRIPTIONS`\
  \ `ORDER_ITEMS` 是一个糟糕的连接顺序。\n\n![image](img/sq.jpg) **提示** 如果你期望 CBO 选择计划 A，但它却选择了计划\
  \ B，而你又无法立即理解原因，可以尝试添加提示来强制使用计划 B。然后查看计划 B 的基数和成本估算。你很可能会发现其背后的道理。接着，你应该能看出“误解”发生在哪里。是你遗漏了什么，还是\
  \ CBO 犯了错？\n\n我最近处理过一个查询，它从第一个行源返回了大约 1,000,000 行数据，与第二个行源连接后返回了 400,000,000 行，而在与第三个行源进行第二次连接后，基数又回落到\
  \ 1,000,000 行。如果你看到这种效果（基数急剧上升然后下降），你应该强烈怀疑连接顺序不是最优的。\n\n尽管已经过时，但仍然可以从 Tow 的书中学到一些东西。让我告诉你我从这本书中学到的最重要的两点。\n\
  \n*   确保第一个行源正确。在大多数情况下，这足以获得一个不错的执行计划。\n*   作为引导行源的最佳选择通常是选择性最强的那个行源。这不一定是指行数最少的行源。\n\
  \n## 连接方法\n\n第 11 章 解释了四种连接机制各自的优缺点，因此这里不再重复。不过，如果我之前在书中给读者留下了人类专家总能比 CBO 更聪明的印象，那么请看看清单\
  \ 12-3。\n\n**清单 12-3. 一个反直觉的连接方法**\n```sql\nSELECT /*+ gather_plan_statistics */\
  \ *\n  FROM hr.employees e JOIN hr.departments d USING (department_id)\n WHERE e.job_id\
  \ = 'SH_CLERK';\n\nSET LINES 200 PAGES 0\n\nSELECT *\n  FROM TABLE (\n         \
  \ DBMS_XPLAN.display_cursor (format => 'BASIC ROWS IOSTATS LAST'));\n```\n| 标识 |\
  \ 操作                             | 名称        | 开始次数 | 预估行数 | 实际行数 | 缓冲区 |\n|---|---|---|---|---|---|---|\n\
  |   0 | SELECT STATEMENT                      |             |      1 |        |\
  \     20 |    5 |\n|   1 |  MERGE JOIN                           |             |\
  \      1 |     20 |     20 |    5 |\n|   2 |   TABLE ACCESS BY INDEX ROWID     \
  \    | DEPARTMENTS |      1 |     27 |      6 |    2 |\n|   3 |    INDEX FULL SCAN\
  \                    | DEPT_ID_PK  |      1 |     27 |      6 |    1 |\n|*  4 |\
  \   SORT JOIN                           |             |      6 |     20 |     20\
  \ |    3 |\n|   5 |    TABLE ACCESS BY INDEX ROWID BATCHED| EMPLOYEES   |      1\
  \ |     20 |     20 |    3 |\n|*  6 |     INDEX RANGE SCAN                  | EMP_JOB_IX\
  \  |      1 |     20 |     20 |    1 |\n\n谓词信息（由操作标识识别）：\n4 - access(\"E\".\"DEPARTMENT_ID\"\
  =\"D\".\"DEPARTMENT_ID\")\n   filter(\"E\".\"DEPARTMENT_ID\"=\"D\".\"DEPARTMENT_ID\"\
  )\n6 - access(\"E\".\"JOB_ID\"='SH_CLERK')\n\n这个例子找出所有 `JOB_ID` 为 `SH_CLERK` 的员工，并列出他们所属的部门信息。我必须承认，就算再给我一个月的时间，我也绝不可能想出\
  \ CBO 制定的这个执行计划。然而，仔细检查后，它看起来相当不错！\n\n为什么使用 `MERGE JOIN`？这些表都很小，而且两张表上都有 `DEPARTMENT_ID`\
  \ 的索引，所以显然 `NESTED LOOPS` 连接更合适？我在第 11 章中宣扬的那些简单规则，似乎没有一条暗示 `MERGE JOIN` 是合适的。这是怎么回事？让我们深入看看。\n\
  \n操作 2 和 3 似乎只是加深了困惑。执行计划执行了一个没有过滤谓词的 `INDEX FULL SCAN`，然后访问表。这意味着操作 2 和 3 将访问表中的每一行。为什么不用\
  \ `TABLE FULL SCAN`？在继续阅读之前，请试着想一想。\n\n操作 4、5 和 6 通过索引访问 `EMPLOYEES` 表中符合 `JOB_ID`\
  \ 谓词的 20 行数据，并按照 `MERGE JOIN` 的要求对它们进行排序。这没有什么神秘的。但接下来发生了什么？嗯，`MERGE JOIN` 会为 `DEPARTMENTS`\
  \ 表中的每一行，按顺序探测（probe）这 20 行 `EMPLOYEES` 数据。这就是通过 `INDEX FULL SCAN` 访问 `DEPARTMENTS`\
  \ 表的关键：结果已经是按 `DEPARTMENT_ID` 排序的，不需要再排序了！不仅如此，事实证明，`JOB_ID` 值 `SH_CLERK` 的意思是“发货文员”，而所有发货文员都属于\
  \ `DEPARTMENT_ID` 为 50 的“Shipping”部门。因此，当运行时引擎查看 `DEPARTMENT_ID` 60（第六个部门）时，它发现\
  \ `EMPLOYEES` 表中已没有更多行需要探测，于是停止了对 `DEPARTMENTS` 表的进一步访问。这就是为什么 `A-ROWS` 列显示的值为 6；只访问了部门\
  \ 10、20、30、40、50 和 60。\n\n如果你感兴趣，我原本猜测会更好的执行计划是使用 `NESTED LOOPS` 连接。通过强制执行我认为更好的执行计划的技术，我证明了我的计划并不更好。请看清单\
  \ 12-4。\n\n**清单 12-4. 我设计的较差执行计划**\n```sql\nSELECT /*+ gather_plan_statistics leading(e)\
  \ use_nl(d)*/\n       *\n  FROM hr.employees e JOIN hr.departments d USING (department_id)\n\
  \ WHERE e.job_id = 'SH_CLERK';\n\nSET LINES 200 PAGES 0\n\nSELECT *\n  FROM TABLE\
  \ (\n          DBMS_XPLAN.display_cursor (format => 'BASIC ROWS IOSTATS LAST'));\n\
  ```\n| 标识 | 操作                             | 名称        | 开始次数 | 预估行数 | 实际行数 | 缓冲区\
  \ |\n|---|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT                   \
  \   |             |      1 |        |     20 |    27 |\n|   1 |  NESTED LOOPS  \
  \                       |             |      1 |        |     20 |    27 |\n|  \
  \ 2 |   NESTED LOOPS                        |             |      1 |     20 |  \
  \   20 |     7 |\n|   3 |    TABLE ACCESS BY INDEX ROWID BATCHED| EMPLOYEES   |\
  \      1 |     20 |     20 |     3 |\n|*  4 |     INDEX RANGE SCAN             \
  \     | EMP_JOB_IX  |      1 |     20 |     20 |     1 |\n|*  5 |    INDEX UNIQUE\
  \ SCAN                  | DEPT_ID_PK  |     20 |      1 |     20 |     4 |\n|  \
  \ 6 |   TABLE ACCESS BY INDEX ROWID         | DEPARTMENTS |     20 |      1 |  \
  \   20 |    20 |\n\n谓词信息（由操作标识识别）：\n4 - access(\"E\".\"JOB_ID\"='SH_CLERK')\n  \
  \ 5 - access(\"E\".\"DEPARTMENT_ID\"=\"D\".\"DEPARTMENT_ID\")\n\n你可以看到，`NESTED LOOPS`\
  \ 连接对 `DEPT_ID_PK` 的查找重复了 20 次，导致总共产生了 27 次缓冲区访问，而不是清单 12-3 中的 5 次。\n\n\n\n这一切都相当酷。是\
  \ CBO 算出来的吗？不是。你可以看到 CBO 完全没料到运行时引擎会在 `DEPARTMENT_ID` 60 处停止。我们之所以知道这点，是因为 `DEPARTMENTS`\
  \ 表中有 27 行，而操作 2 的 `E-ROWS` 值是 27。所以 CBO 只是在猜测，而且猜得挺走运。但即便如此，CBO 的猜测也远比我凭借多年 SQL\
  \ 调优经验做出的猜测要好得多。\n\n![image](img/sq.jpg) **提示**  本书花了很多时间告诉你为什么 CBO 经常出错。当 CBO 犯下严重错误时，通常是因为它做决策所依据的信息要么完全缺失，要么大错特错。听听\
  \ Wolfgang 的建议吧。纠正 CBO 的误解，它通常会比你我联手工作做得更好。唯一的问题是，要纠正 CBO 所有的错误假设有时相当不切实际，正如我们将在第\
  \ 14 章中看到的那样。\n\n## 访问方法\n\n正如你在第 10 章中所读到的，访问表的方式多种多样，但可能对查询性能产生最大影响（无论好坏）的访问方法选择，是那些与索引范围扫描相关的：如果有索引，应该选择哪一个？\n\
  \n仅仅因为连接方法是 `NESTED LOOPS`，并不意味着必须通过连接谓词上的索引来访问；同样，仅仅因为使用了 `HASH JOIN`，也不意味着探测表上必然进行全表扫描。看看清单\
  \ 12-5，它使用了哈希连接但没有全表扫描。\n\n### 清单 12-5. 无全表扫描的哈希连接\n\n```sql\nSELECT *\n  FROM sh.sales\
  \ s, sh.customers c\n WHERE     c.cust_marital_status = 'married'\n       AND c.cust_gender\
  \ = 'M'\n       AND c.cust_year_of_birth = 1976\n       AND c.cust_id = s.cust_id\n\
  \       AND s.prod_id = 136;\n\n| Id  | Operation                              \
  \     | Name                  | Rows  |\n\n|   0 | SELECT STATEMENT            \
  \                |                       |    40 |\n|*  1 |  HASH JOIN         \
  \                         |                       |    40 |\n|   2 |   TABLE ACCESS\
  \ BY INDEX ROWID BATCHED       | CUSTOMERS             |    38 |\n|   3 |    BITMAP\
  \ CONVERSION TO ROWIDS              |                       |       |\n|   4 | \
  \    BITMAP AND                              |                       |       |\n\
  |*  5 |      BITMAP INDEX SINGLE VALUE              | CUSTOMERS_YOB_BIX     |  \
  \     |\n|*  6 |      BITMAP INDEX SINGLE VALUE              | CUSTOMERS_MARITAL_BIX\
  \ |       |\n|*  7 |      BITMAP INDEX SINGLE VALUE              | CUSTOMERS_GENDER_BIX\
  \  |       |\n|   8 |   PARTITION RANGE ALL                       |            \
  \           |   710 |\n|   9 |    TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| SALES\
  \                 |   710 |\n|  10 |     BITMAP CONVERSION TO ROWIDS           \
  \  |                       |       |\n|* 11 |      BITMAP INDEX SINGLE VALUE   \
  \           | SALES_PROD_BIX        |       |\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   5 - access(\"\
  C\".\"CUST_YEAR_OF_BIRTH\"=1976)\n   6 - access(\"C\".\"CUST_MARITAL_STATUS\"='married')\n\
  \   7 - access(\"C\".\"CUST_GENDER\"='M')\n  11 - access(\"S\".\"PROD_ID\"=136)\n\
  ```\n\n清单 12-5 中的查询在 `SH` 示例模式中对 `CUSTOMERS` 和 `SALES` 表执行连接。CBO 估计有 23 位已婚、出生于\
  \ 1976 年的男性客户，并且在这 23 位客户中，针对产品 136 的销售记录有 24 条。基于这些假设，CBO 认为 `NESTED LOOPS` 连接需要探测\
  \ `SALES` 表 23 次。在具有 23 次探测的嵌套循环和需要全表扫描的哈希连接之间做选择可能难分伯仲，但在此例中，哈希连接看起来快得多。原因是 `CUSTOMERS`\
  \ 表上存在**独立于连接**的选择性谓词，并且 `SALES` 表上有一个（`s.prod_id = 136`）**独立于连接**的谓词，因此即使使用哈希连接，`SALES`\
  \ 表也可以通过索引访问。注意第 8 行的 `PARTITION RANGE ALL` 操作。无论使用何种连接方法，由于分区键 `TIME_ID` 上没有谓词，所以必须访问所有分区。\n\
  \nCBO 对合适连接方法和访问方法的分析无可挑剔，但碰巧实际有 284 位已婚、出生于 1976 年的男性客户，并且连接输入应该交换顺序，不过这次影响不大。\n\
  \n### 清单 12-6. 未索引连接列的嵌套循环\n\n```sql\nSELECT *\n  FROM oe.order_items i1, oe.order_items\
  \ i2\n WHERE     i1.quantity = i2.quantity\n       AND i1.order_id = 2392\n    \
  \   AND i1.line_item_id = 4\n       AND i2.product_id = 2462;\n\n| Id  | Operation\
  \                            | Name            | Rows  |\n\n|   0 | SELECT STATEMENT\
  \                     |                 |     1 |\n|   1 |  NESTED LOOPS       \
  \                 |                 |     1 |\n|   2 |   TABLE ACCESS BY INDEX ROWID\
  \        | ORDER_ITEMS     |     1 |\n|*  3 |    INDEX UNIQUE SCAN             \
  \    | ORDER_ITEMS_PK  |     1 |\n|*  4 |   TABLE ACCESS BY INDEX ROWID BATCHED|\
  \ ORDER_ITEMS     |     1 |\n|*  5 |    INDEX RANGE SCAN                  | ITEM_PRODUCT_IX\
  \ |     2 |\n\nPredicate Information (identified by operation id):\n\n3 - access(\"\
  I1\".\"ORDER_ID\"=2392 AND \"I1\".\"LINE_ITEM_ID\"=4)\n   4 - filter(\"I1\".\"QUANTITY\"\
  =\"I2\".\"QUANTITY\")\n   5 - access(\"I2\".\"PRODUCT_ID\"=2462)\n```\n\n清单 12-6\
  \ 在 `OE` 示例模式中的 `ORDER_ITEMS` 表上执行了一个自连接。该查询查找与指定行项订单数量相匹配的订单项。连接列是 `QUANTITY`，它通常不出现在\
  \ `WHERE` 子句中，也没有被索引。这个查询可能有点不寻常，但或许可用于调查疑似数据录入问题。\n\n与清单 12-5 类似，清单 12-6 中的两个行源都具有**独立于连接**的高度选择性谓词。这次，其中一个行源\
  \ `I1` 通过唯一索引访问，因此嵌套循环是合适的。\n\n到目前为止，本章已经介绍了连接顺序、连接方法和访问方法。然而，在最终状态优化过程中，CBO 可能还需要考虑另外一两个因素。让我们从讨论带有\
  \ `IN` 列表的查询开始。\n\n## IN 列表迭代\n\n当查询的列（或由索引支持的多个列）上指定了 `IN` 列表时，CBO 需要选择使用多少列。看看清单\
  \ 12-7 中的查询。\n\n### 清单 12-7. IN 列表执行计划选项——无迭代\n\n```sql\nSELECT *\n    FROM hr.employees\
  \ e\n   WHERE last_name = 'Grant' AND first_name IN ('Kimberely', 'Douglas')\nORDER\
  \ BY last_name, first_name;\n\n| Id  | Operation                   | Name      \
  \  | Cost (%CPU)|\n```\n\n\n\n## SQL 执行计划分析\n\n|   0 | SELECT STATEMENT        \
  \    |             |     2   (0)|\n|---|---|---|---|\n|   1 |  TABLE ACCESS BY INDEX\
  \ ROWID| `EMPLOYEES`   |     2   (0)|\n|*  2 |   INDEX RANGE SCAN          | `EMP_NAME_IX`\
  \ |     1   (0)|\n\n谓词信息（由操作 ID 标识）：\n\n```\n2 - access(\"LAST_NAME\"='Grant')\n\
  \       filter(\"FIRST_NAME\"='Douglas' OR \"FIRST_NAME\"='Kimberely')\n```\n\n\
  `HR` 示例模式中 `EMPLOYEES` 表上的 `EMP_NAME_IX` 索引包含了 `LAST_NAME` 和 `FIRST_NAME` 两列。对于\
  \ `LAST_NAME = 'Grant'`，`FIRST_NAME` 的可能选择似乎不多，因此 CBO 选择在 `LAST_NAME` 上进行一次 `INDEX\
  \ RANGE SCAN`，并过滤掉任何与为 `FIRST_NAME` 提供的两个值都不匹配的索引条目。假设存在大量不同的 `FIRST_NAME`——那么另一种执行计划可能更合适。请查看\
  \ 清单 12-8 中带有提示的查询版本。\n\n清单 12-8. 带迭代的 IN 列表执行计划选项\n\n```sql\n SELECT /*+ num_index_keys(e\
  \ emp_name_ix 2)*/\n         *\n    FROM hr.employees e\n   WHERE last_name = 'Grant'\
  \ AND first_name IN ('Kimberely','Douglas')\nORDER BY last_name,first_name ;\n```\n\
  \n```\n| Id  | Operation                    | Name        | Cost (%CPU)|\n|---|---|---|---|\n\
  |   0 | SELECT STATEMENT             |             |     2   (0)|\n|   1 |  INLIST\
  \ ITERATOR             |             |            |\n|   2 |   TABLE ACCESS BY INDEX\
  \ ROWID| `EMPLOYEES`   |     2   (0)|\n|*  3 |    INDEX RANGE SCAN          | `EMP_NAME_IX`\
  \ |     1   (0)|\n```\n\n谓词信息（由操作 ID 标识）：\n\n```\n3 - access(\"LAST_NAME\"='Grant'\
  \ AND (\"FIRST_NAME\"='Douglas' OR\n              \"FIRST_NAME\"='Kimberely'))\n\
  ```\n\n提示 `NUM_INDEX_KEYS` 可用于指示在存在 `IN` 列表时执行 `INDEX RANGE SCAN` 应使用多少列。提供的提示指定了使用两列。这意味着我们需要运行两次\
  \ `INDEX RANGE SCAN` 操作，由 `INLIST ITERATOR` 操作驱动。第一次 `INDEX RANGE SCAN` 使用 `LAST_NAME\
  \ = 'Grant'` 和 `FIRST_NAME = 'Douglas'` 作为访问谓词，第二次 `INDEX RANGE SCAN` 使用 `LAST_NAME\
  \ = 'Grant'` 和 `FIRST_NAME = 'Kimberly'` 作为访问谓词。就我个人而言，在这种情况下，我觉得 `DBMS_XPLAN.display`\
  \ 输出中对访问谓词的描述不是特别有用，因此希望我的解释对您有所帮助。\n\n请注意，在 清单 12-7 或 清单 12-8 的执行计划中都没有出现排序操作。在前一种情况下，索引条目已经按适当顺序排列。在后一种情况下，`IN`\
  \ 列表的成员已被重新排序以避免排序的需要。在这个例子中，不同备选计划的估算成本几乎相同，但在更大的表上，迭代可能带来显著的效益。\n\n## 总结\n\n最终状态优化是我赋予\
  \ CBO 最为人熟知部分的名称：即处理连接顺序、连接方法和访问方法的部分。然而，最终状态优化也处理列表迭代。\n\n然而，CBO 的能力远不止最终状态优化。CBO\
  \ 还能够将您编写的查询转换成看起来与您提供的原始查询完全不同的形式。这个相当庞大的主题是 第 13 章 的重点。\n\n"
- '# 第 13 章


  ![image](img/frontdot.jpg)


  ## 优化器转换


  我们在本书中已经看到，有许多方法可以将一条 SQL 查询（或 DML 子查询）转换为另一条，而完全不改变其含义。对于除最简单的查询之外的所有查询，CBO 都会考虑多种此类转换，有时会估算成本，以确定用于执行我们在第
  12 章中刚刚介绍的最终状态优化的最佳 SQL 语句。本章致力于讨论优化器转换的主题；您将会看到，这类转换的数量令人眼花缭乱。虽然并非所有的优化器转换都包含在本章中，但您在日常工作中遇到的绝大多数转换，以及一些您很少遇到的转换，都已涵盖。


  您可能想知道为什么要在 CBO 转换上投入如此多的精力。毕竟，您可能会觉得以高效的方式编写 SQL 是程序员的责任，并且您的这种感觉是正确的。然而，随着本章的展开，您将看到，有些重写
  SQL 语句的方式是普通程序员不太可能考虑到的，而这些深奥的重写有时会产生非常高效的执行计划。


  然而，一些 CBO 转换，比如连接消除（我将在本章后面介绍），似乎只适用于编写得非常糟糕的代码。这类转换之所以重要，有以下几个原因：


  *   查询经常引用为多种目的而设计的数据字典视图。一旦这些视图被展开到语句中，结果往往明显低效。

  *   有时 SQL 代码是由图形工具或其他语言处理器生成的。自动生成的代码常常显得极其简单。

  *   嗯，实际上，世界上有很多糟糕的 SQL 程序员！


  有一类特殊的转换，我称之为“无需思考的”转换，我将很快讨论它们。除了“无需思考的”转换之外，所有优化器转换都可以通过 `NO_QUERY_TRANSFORMATION`
  提示一键禁用。这个提示有时对分析和调试很有用，但我从未在生产 SQL 语句中使用过它。然而，在某些情况下，您需要在特定上下文中强制或禁用特定的转换。除了“无需思考的”转换之外，所有优化器转换都可以在合法的情况下通过特定于该转换的提示来强制执行，并且可以通过另一个提示来禁用，该提示通常（但不总是）通过在提示开头加上字符
  `NO_` 来生成。例如，我们已经在第 8 章讨论了视图合并：`MERGE` 提示强制视图合并，而 `NO_MERGE` 提示则禁用它。此规则有两个例外：


  *   或展开转换通过 `USE_CONCAT` 提示强制，通过 `NO_EXPAND` 提示禁用。

  *   提取子查询物化通过 `MATERIALIZE` 提示强制，通过 `INLINE` 提示禁用。


  本章解释的大多数查询转换都可以用合法的 SQL 来表达；换句话说，您可能一开始就自己编写了转换后的 SQL。然而，我们已经在第 11 章中看到，子查询去关联可以生成半连接和反连接，这些连接没有等价的合法
  SQL 语法，而这里我们将讨论分组下推，这是另一个无法用合法 SQL 表达的转换示例。在阅读本章中旨在演示各个转换的清单时，请记住，转换后的查询文本可能不是精确的表示。这些清单显示了原始查询以及（在可能的情况下）转换后的查询，同时附带相关的执行计划以及强制和禁用相关转换的提示。



