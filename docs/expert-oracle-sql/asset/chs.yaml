- "# 避免重复排序\n\n有时排序是不可避免的，但请尽量不要进行不必要的排序。对相同的数据排序两次是没有意义的，但有时这种重复会发生。尽可能避免它。代码清单 17-9\
  \ 展示了一个导致双重排序的查询。该查询看起来像是一个编写良好的 SQL 语句，直到我们查看其执行计划。\n\n代码清单 17-9. 冗余排序\n\n```sql\n\
  \ SELECT cust_id\n        ,time_id\n        ,SUM (amount_sold) daily_amount\n  \
  \      ,SUM (\n            SUM (amount_sold))\n         OVER (PARTITION BY cust_id\n\
  \               ORDER BY time_id\n               RANGE BETWEEN INTERVAL '6' DAY\
  \ PRECEDING AND CURRENT ROW)\n            weekly_amount\n    FROM sh.sales\nGROUP\
  \ BY cust_id, time_id\nORDER BY cust_id, time_id DESC;\n\n| 标识  | 操作           \
  \  | 名称  | 行数  | 成本 (%CPU)|\n|-----|-----------------------|-------|-------|------------|\n\
  |   0 | SELECT STATEMENT      |       |   143K|  5275   (1)|\n|   1 |  SORT ORDER\
  \ BY        |       |   143K|  5275   (1)|\n|   2 |   WINDOW SORT         |    \
  \   |   143K|  5275   (1)|\n|   3 |    PARTITION RANGE ALL|       |   143K|  5275\
  \   (1)|\n|   4 |     SORT GROUP BY     |       |   143K|  5275   (1)|\n|   5 |\
  \      TABLE ACCESS FULL| SALES |   918K|   517   (2)|\n```\n\n代码清单 17-9 聚合数据，以便将同一客户在同一天的多次销售相加。这本可以使用哈希聚合完成，但\
  \ CBO 决定使用排序。那就这样吧。然后我们在分析函数中使用窗口子句来计算截至当前日期当周内当前客户的总销售额。这需要第二次排序。但是，我们希望数据按客户和*降序*日期顺序呈现。这似乎需要第三次排序。通过对代码进行微小的改动，我们可以避免其中一次排序。代码清单\
  \ 17-10 展示了方法。\n\n代码清单 17-10. 避免冗余排序\n\n```sql\n SELECT cust_id\n        ,time_id\n\
  \        ,SUM (amount_sold) daily_amount\n        ,SUM (\n            SUM (amount_sold))\n\
  \         OVER (PARTITION BY cust_id\n               ORDER BY time_id DESC\n   \
  \            RANGE BETWEEN CURRENT ROW AND INTERVAL '6' DAY FOLLOWING)\n       \
  \     weekly_amount\n    FROM sh.sales\nGROUP BY cust_id, time_id\nORDER BY cust_id,\
  \ time_id DESC;\n\n| 标识  | 操作            | 名称  | 行数  | 成本 (%CPU)|\n|-----|----------------------|-------|-------|------------|\n\
  |   0 | SELECT STATEMENT     |       |   918K|  5745   (1)|\n|   1 |  WINDOW SORT\
  \         |       |   918K|  5745   (1)|\n|   2 |   PARTITION RANGE ALL|       |\
  \   918K|  5745   (1)|\n|   3 |    SORT GROUP BY     |       |   918K|  5745   (1)|\n\
  |   4 |     TABLE ACCESS FULL| SALES |   918K|   517   (2)|\n```\n\n我们的分析函数现在以与\
  \ `ORDER BY` 子句相同的方式对数据进行排序，这样就消除了一次排序。请注意，在 代码清单 17-9 和 代码清单 17-10 的执行计划中，CBO 的成本估算都没有意义。然而，代码清单\
  \ 17-10 效率更高。\n\n"
- "# 排序更少的列\n\n既然我们已经确保只在需要时才排序，就可以开始专注于优化剩余的排序。我们可以采取的一个步骤是尽量减少排序的列数。排序的列越少，我们的排序就越有可能适应工作区。让我们从对未建立索引的列排序开始，看看我们能做什么。\n\
  \n## 利用 ROWID\n\n想象你在汽车展厅工作，想按价格顺序物理排列五十辆汽车。你会开车移动它们来试图排好顺序吗？可能不会。你可能会把汽车的名称和价格写在纸片上，然后对这些纸片排序。一旦你把纸片排序好，就可以按正确的顺序一辆一辆地挑选实际的汽车。\n\
  \n有时，你可以在 Oracle 数据库中使用类似的方法对行进行排序。如果行非常宽而排序键相对较窄，最好将排序不需要的列替换为一个 `ROWID`。`ROWID`\
  \ 排序后，你可以使用这些 `ROWID` 来检索表中的其余列。\n\n是时候看一个例子了。代码清单 17-11 展示了一个代价相当高的排序，它是由一个编写得相当自然的查询产生的。\n\
  \n代码清单 17-11. 按未建立索引的列排序\n\n```sql\n SELECT /*+ cardinality(s 1e9) */\n        \
  \ *\n    FROM sh.sales s\n         JOIN sh.customers c USING (cust_id)\n       \
  \  JOIN sh.products p USING (prod_id)\nORDER BY cust_id;\n\n| 标识  | 操作         \
  \     | 名称      | 行数  | 字节数 |临时空间| 成本 |\n|-----|------------------------|-----------|-------|-------|-------|------|\n\
  |   0 | SELECT STATEMENT       |           |  1000M|   364G|       |    59|\n| \
  \  1 |  MERGE JOIN            |           |  1000M|   364G|       |    59|\n|  \
  \ 2 |   SORT JOIN            |           |  1000M|   188G|   412G|    59|\n|*  3\
  \ |    HASH JOIN           |           |  1000M|   188G|       | 21907|\n|   4 |\
  \     TABLE ACCESS FULL  | PRODUCTS  |    72 | 12456 |       |     3|\n|   5 | \
  \    PARTITION RANGE ALL|           |  1000M|    27G|       | 12955|\n|   6 |  \
  \    TABLE ACCESS FULL | SALES     |  1000M|    27G|       | 12955|\n|*  7 |   SORT\
  \ JOIN            |           | 55500 |    10M|    25M|  2709|\n|   8 |    TABLE\
  \ ACCESS FULL   | CUSTOMERS | 55500 |    10M|       |   415|\n```\n\n代码清单 17-11\
  \ 在 `SH.SALES` 事实表和两个维度表之间进行了自然连接。生成的宽行随后被排序。我再次使用了基数提示来尝试模拟一个更大的事实表。如你所见，CBO 估计我们需要\
  \ 412.025GB 的临时表空间来执行两次排序。CBO 使用了 `MERGE JOIN`，因为这种连接的结果会自动排序，并且我们的大连接不需要来自 `SH.CUSTOMERS`\
  \ 表的列。聪明，是的，但重大胜利？不是。\n\n我们可以排序少得多的数据。在 代码清单 17-12 中需要一两个优化器提示。\n\n代码清单 17-12. 排序更少的列并使用\
  \ ROWID\n\n\n"
- "# 使用 ROWID 和 FIRST/LAST 函数优化排序性能\n\n```\nWITH q1\n     AS (  SELECT /*+ cardinality(s1\
  \ 1e9) */\n                      ROWID rid\n             FROM sh.sales s1\n    \
  \     ORDER BY cust_id)\nSELECT /*+ cardinality(s2 1e9) leading(q1 s2 c p)\n   \
  \    use_nl(s2)\n       rowid(s2)\n       use_hash(c)\n       use_hash(p)\n    \
  \   swap_join_inputs(c)\n       swap_join_inputs(p)\n       */\n       *\n  FROM\
  \ q1\n       JOIN sh.sales s2 ON s2.ROWID = q1.rid\n       JOIN sh.customers c USING\
  \ (cust_id)\n       JOIN sh.products p USING (prod_id);\n```\n\n```\n| Id  | Operation\
  \                          | Name           | Rows  | Bytes |TempSpc| Cost |\n|---|---|---|---|---|---|---|\n\
  |   0 | SELECT STATEMENT                   |                |  1088G|   411T|  \
  \     |  4432|\n|*  1 |  HASH JOIN                         |                |  1088G|\
  \   411T|       |  4432|\n|   2 |   TABLE ACCESS FULL                | PRODUCTS\
  \       |    72 | 12456 |       |     3|\n|*  3 |   HASH JOIN                  \
  \      |                |  1088G|   240T|    10M|  4423|\n|   4 |    TABLE ACCESS\
  \ FULL               | CUSTOMERS      | 55500 |    10M|       |   415|\n|   5 |\
  \    NESTED LOOPS                    |                |  1088G|    53T|       |\
  \  1006|\n|   6 |     VIEW                           |                |  1000M|\
  \    23G|       |  5602|\n|   7 |      SORT ORDER BY                 |         \
  \       |  1000M|    15G|    26G|  5602|\n|   8 |       PARTITION RANGE ALL    \
  \      |                |  1000M|    15G|       |   406|\n|   9 |        BITMAP\
  \ CONVERSION TO ROWIDS |                |  1000M|    15G|       |   406|\n|  10\
  \ |         BITMAP INDEX FAST FULL SCAN| SALES_CUST_BIX |       |       |      \
  \ |      |\n|  11 |     TABLE ACCESS BY USER ROWID     | SALES          |  1088\
  \ | 31552 |       |     1|\n```\n\n深呼吸，保持冷静。这并不像看起来那么复杂。让我们看一下清单 17-12 中的子查询`Q1`。我们将`SH.SALES`中的所有`ROWID`按`CUST_ID`排序。我们只需要访问`SALES_CUST_BIX`索引即可完成此操作。我们没有使用`INDEX\
  \ FULL SCAN`，因为本地索引不提供我们需要的全局排序，因此`INDEX FAST FULL SCAN`更合适。请注意，由于我们只有两列：`CUST_ID`和`ROWID`，排序估计仅占用\
  \ 26GB。一旦我们按正确顺序获得了`SH.SALES`中的`ROWID`列表，就可以通过使用`ROWID`来获取`SH.SALES`的其余列。获得`SH.SALES`的所有列后，我们可以使用嵌套循环连接访问维度表中的列。但是，使用哈希连接的右深连接树效率更高，因为逻辑读取次数更少。\n\
  \n为什么需要这种复杂的重写和所有这些提示？因为这是一个非常复杂的查询转换，并且正如我在第 14 章中解释的那样，CBO 无法执行专家 SQL 程序员能做的所有查询转换。实际上，如果我们添加`ORDER\
  \ BY`子句，CBO 不会识别出行将按排序顺序产生，并将执行冗余排序。\n\n另一种使用`ROWID`来提高排序性能的方法涉及`FIRST`和`LAST`函数。清单\
  \ 17-13 展示了清单 17-3 中所示的`ROW_NUMBER`技术的简洁高效的替代方案。\n\n清单 17-13. 在`LAST`函数中使用`ROWID`函数\n\
  \n```\nWITH q1\n     AS (SELECT c.*\n               ,SUM (amount_sold) OVER (PARTITION\
  \ BY cust_state_province)\n                   total_province_sales\n           \
  \    ,ROW_NUMBER ()\n                OVER (PARTITION BY cust_state_province\n  \
  \                     ORDER BY amount_sold DESC, c.cust_id DESC) rn\n          \
  \ FROM sh.sales s JOIN sh.customers c ON s.cust_id = c.cust_id)\nSELECT *\n  FROM\
  \ q1\n WHERE rn = 1;\n```\n\n```\n| Id  | Operation              | Name      | Rows\
  \  | Cost (%CPU)|\n|---|---|---|---|---|\n|   0 | SELECT STATEMENT       |     \
  \      |   918K| 41847   (1)|\n|*  1 |  VIEW                  |           |   918K|\
  \ 41847   (1)|\n|   2 |   WINDOW SORT          |           |   918K| 41847   (1)|\n\
  |*  3 |    HASH JOIN           |           |   918K|  2093   (1)|\n|   4 |     TABLE\
  \ ACCESS FULL  | CUSTOMERS | 55500 |   271   (1)|\n|   5 |     PARTITION RANGE ALL|\
  \           |   918K|   334   (3)|\n|   6 |      TABLE ACCESS FULL | SALES     |\
  \   918K|   334   (3)|\n```\n\n谓词信息（通过操作 ID 标识）：\n```\n1 - filter(\"RN\"=1)\n3 -\
  \ access(\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n```\n\n```\nWITH q1\n     AS (  SELECT\
  \ MIN (c.ROWID) KEEP (DENSE_RANK LAST ORDER BY amount_sold, cust_id)\n         \
  \            cust_rowid\n                 ,SUM (amount_sold) total_province_sales\n\
  \             FROM sh.sales s JOIN sh.customers c USING (cust_id)\n         GROUP\
  \ BY cust_state_province)\nSELECT c.*, q1.total_province_sales\n  FROM q1 JOIN sh.customers\
  \ c ON q1.cust_rowid = c.ROWID;\n```\n\n```\n| Id  | Operation                 \
  \  | Name      | Rows  | Cost (%CPU)|\n|---|---|---|---|---|\n|   0 | SELECT STATEMENT\
  \            |           | 80475 |  1837   (2)|\n|   1 |  NESTED LOOPS         \
  \      |           | 80475 |  1837   (2)|\n|   2 |   VIEW                      |\
  \           |   145 |  1692   (3)|\n|   3 |    SORT GROUP BY            |      \
  \     |   145 |  1692   (3)|\n|*  4 |     HASH JOIN               |           |\
  \   918K|  1671   (1)|\n|   5 |      TABLE ACCESS FULL      | CUSTOMERS | 55500\
  \ |   271   (1)|\n|   6 |      PARTITION RANGE ALL    |           |   918K|   334\
  \   (3)|\n|   7 |       TABLE ACCESS FULL     | SALES     |   918K|   334   (3)|\n\
  |   8 |   TABLE ACCESS BY USER ROWID| CUSTOMERS |   555 |     1   (0)|\n```\n\n\
  谓词信息（通过操作 ID 标识）：\n```\n4 - access(\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n```\n\n\
  清单 17-13 中的第一个查询使用`ROW_NUMBER`分析函数来识别每个省份中单笔销售额最大的客户，并使用`SUM`分析函数计算该省份的总`AMOUNT_SOLD`。该查询效率低下，因为\
