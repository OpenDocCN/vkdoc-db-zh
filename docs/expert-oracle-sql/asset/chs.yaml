  \ access(\"C\".\"CUST_ID\"=\"S1\".\"CUST_ID\")\n```\n\n`WHERE` 子句中的原始子查询是一个*相关*子查询，这意味着在未转换的查询中，该子查询在逻辑上为连接返回的每一行执行一次。然而，在转换后的查询中，聚合只执行一次，为每个\
  \ `CUST_ID` 值进行聚合。\n\n子查询脱钩相当不同寻常，因为它有时作为*基于成本的转换*应用，有时作为*启发式转换*应用。如果你使用诸如 `WHERE\
  \ C1 = (<subquery>)` 的结构，子查询脱钩是基于成本的。然而，在本书的所有清单中，子查询脱钩都是作为启发式转换应用的，这意味着 CBO 不使用基于成本的框架来决定是否应用此转换。与我们迄今为止讨论的所有其他转换（半连接转内连接转换除外）一样，子查询脱钩*总是*执行（除非使用提示），无论预期性能是否会提高。在我们迄今为止讨论的所有优化器转换中，转换都不会损害性能。但在某些情况下，子查询脱钩*确实*可能损害性能。我们将在第\
  \ 14 章和第 18 章回到启发式转换的潜在性能影响这个话题，但现在只需记下这一点。我们需要关注子查询脱钩的另一个案例，见清单 13-10。\n\n### 清单\
