  \         ,special_flag\n              ,paygrade\n              ,payment_date\n\
  \              ,job_description)\n       VALUES (t.payment_id\n              ,t.special_flag\n\
  \              ,t.paygrade\n              ,t.payment_date\n              ,t.job_description);\n\
  ```\n\n### 强制执行计划（针对 10000 行临时表）\n\n| Id  | Operation                      | Name\
  \          | Rows  | Cost (%CPU) |\n| --- | ------------------------------ | -------------\
  \ | ----- | ----------- |\n| 0   | MERGE STATEMENT                |            \
  \   | 10000 | 10004 (1)   |\n| 1   | MERGE                         | PAYMENTS  \
  \    |       |             |\n| 2   | VIEW                         |           \
  \    |       |             |\n| 3   | NESTED LOOPS OUTER          |            \
  \   | 10000 | 10004 (1)   |\n| 4   | TABLE ACCESS FULL          | PAYMENTS_TEMP\
  \ | 10000 | 2 (0)       |\n| 5   | TABLE ACCESS BY INDEX ROWID| PAYMENTS      |\
  \ 1     | 1 (0)       |\n| 6   | INDEX UNIQUE SCAN         | PAYMENTS_PK   | 1 \
  \    | 0 (0)       |\n\n## CBO 成本估算分析\n\nListing 12-13 展示了当我们在 3 行临时表上强制执行针对 10,000\
  \ 行临时表的最优计划，以及在 10,000 行临时表上强制执行针对 3 行临时表的最优计划时的 CBO 成本估算。在这个具体示例中，我们可以看到：当应用于 10,000\
  \ 行表时，嵌套循环连接（`NESTED LOOPS OUTER`）似乎是灾难性的：成本从 176 跃升至 10,000。然而，当临时表中只选择了 3 行时，使用哈希连接（`HASH\
  \ JOIN`）的后果并不特别严重，从 5 跃升至 176；这是一个重要因素，但可能只会导致一两秒的耗时增加。因此，我们可以伪造临时表统计信息，指示我们的表中有\
  \ 10,000 行，这样一切就应该没问题了——至少在这个例子中是这样。\n\n如果您从表中选择特定行，您可能希望阻止这些列上的谓词将 CBO 的基数估计值降低到如此程度，以至于使用了嵌套循环连接方法。Listing\
  \ 20-14 显示，通过将每个列的`NUM_DISTINCT`值设置为 2，并将表的`NUM_ROWS`提高到（比如）20,000，我们可以安排总是（或几乎总是）选择哈希连接。\n\
  \n## 设置统计信息以增加哈希连接机会\n\nListing 20-14. 设置统计信息以增加哈希连接的机会\n\n```sql\nCREATE OR REPLACE\
  \ PACKAGE tstats\nAS\n-- Other procedures omitted\nPROCEDURE set_temp_table_stats\
  \ (\n      p_owner all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n   \
  \                                                                'USERENV'\n   \
  \                                                               ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name    all_tab_col_statistics.table_name%TYPE\n     ,p_numrows \
  \      INTEGER DEFAULT 20000\n     ,p_numblks       INTEGER DEFAULT 1000\n     ,p_avgrlen\
  \       INTEGER DEFAULT 400);\n-- Other procedures omitted\nEND tstats;\n/\n\nCREATE\
  \ OR REPLACE PACKAGE BODY tstats\nAS\n-- Other procedures omitted\nPROCEDURE set_temp_table_stats\
  \ (\n      p_owner         all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT\
  \ (\n                                                                   'USERENV'\n\
  \                                                                  ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name    all_tab_col_statistics.table_name%TYPE\n     ,p_numrows \
  \      INTEGER DEFAULT 20000\n     ,p_numblks       INTEGER DEFAULT 1000\n     ,p_avgrlen\
  \       INTEGER DEFAULT 400)\n   IS\n      distcnt   NUMBER;\n   BEGIN\n      DBMS_STATS.unlock_table_stats\
  \ (ownname   => p_owner\n                                    ,tabname   => p_table_name);\n\
  \      $IF dbms_db_version.version >=12\n      $then\n         DBMS_STATS.set_table_prefs\
  \ (ownname   => p_owner\n                                    ,tabname   => p_table_name\n\
  \                                    ,pname     => 'GLOBAL_TEMP_TABLE_STATS'\n \
  \                                   ,pvalue    => 'SHARED');\n      $END\n     \
  \ DBMS_STATS.delete_table_stats (ownname   => p_owner\n                        \
  \            ,tabname   => p_table_name);\n      DBMS_STATS.set_table_stats (ownname\
  \         => p_owner\n                                 ,tabname         => p_table_name\n\
  \                                 ,numrows         => p_numrows\n              \
  \                   ,numblks         => p_numblks\n                            \
  \     ,avgrlen         => p_avgrlen\n                                 ,no_invalidate\
  \   => FALSE);\n      /*\n\n我们必须现在设置列统计信息以限制谓词对基数计算的影响；\n      默认情况下，每个谓词会使基数减少\
  \ 100 倍。\n\n我们使用 2 作为不同值的数量，以将这个因子减少到 2。\n      我们不使用 1，因为像\"column_1 <> 'VALUE_1'\"\
  这样的谓词会将\n      基数减少到 1。\n\n*/\n      distcnt := 2;\n\nFOR r IN (SELECT *\n     \
  \             FROM all_tab_columns\n                 WHERE owner = p_owner AND table_name\
  \ = p_table_name)\n      LOOP\n         DBMS_STATS.set_column_stats (ownname   \
  \      => p_owner\n                                     ,tabname         => r.table_name\n\
  \                                     ,colname         => r.column_name\n      \
  \                               ,distcnt         => distcnt\n                  \
  \                   ,density         => 1 / distcnt\n                          \
  \           ,srec            => NULL\n                                     ,no_invalidate\
  \   => FALSE);\n      END LOOP;\n\nDBMS_STATS.lock_table_stats (ownname => p_owner,\
  \ tabname => p_table_name);\n   END set_temp_table_stats;\n-- Other procedures omitted\n\
  END tstats;\n\nEXEC tstats.set_temp_table_stats(p_table_name=>'PAYMENTS_TEMP');\n\
  ```\n\n## 应用统计信息后的执行计划示例\n\n### 示例 1：无谓词条件的连接查询\n\n```sql\nSELECT *\n  FROM payments_temp\
  \ JOIN payments USING (payment_id);\n```\n\n| Id  | Operation          | Name  \
  \        | Rows  | Cost (%CPU) |\n| --- | ------------------ | ------------- | -----\
  \ | ----------- |\n| 0   | SELECT STATEMENT   |               | 20000 | 845 (1)\
  \     |\n| 1   | HASH JOIN         |               | 20000 | 845 (1)     |\n| 2\
  \   | TABLE ACCESS FULL| PAYMENTS_TEMP | 20000 | 272 (0)     |\n| 3   | TABLE ACCESS\
  \ FULL| PAYMENTS      | 120K  | 174 (1)     |\n\n### 示例 2：带等值谓词的连接查询\n\n```sql\n\
  SELECT *\n  FROM payments_temp t JOIN payments p USING (payment_id)\n WHERE t.paygrade\
  \ = 10 AND t.job_description='INTERN';\n```\n\n| Id  | Operation          | Name\
  \          | Rows  | Cost (%CPU) |\n| --- | ------------------ | ------------- |\
  \ ----- | ----------- |\n| 0   | SELECT STATEMENT   |               | 5000  | 447\
  \ (1)     |\n| 1   | HASH JOIN         |               | 5000  | 447 (1)     |\n\
  | 2   | TABLE ACCESS FULL| PAYMENTS_TEMP | 5000  | 272 (0)     |\n| 3   | TABLE\
  \ ACCESS FULL| PAYMENTS      | 120K  | 174 (1)     |\n\n### 示例 3：带不等值和范围谓词的连接查询\n\
  \n```sql\nSELECT *\n  FROM payments_temp t JOIN payments p USING (payment_id)\n\
  \ WHERE t.paygrade != 10 AND t.payment_date > SYSDATE - 31;\n```\n\n| Id  | Operation\
  \          | Name          | Rows  | Cost (%CPU) |\n| --- | ------------------ |\
  \ ------------- | ----- | ----------- |\n\n\n\n|   0 | SELECT STATEMENT   |    \
  \           |  6697 |   447   (1)|\n|---|---|---|---|---|\n|   1 |  哈希连接       \
  \  |               |  6697 |   447   (1)|\n|   2 |   全表扫描| PAYMENTS_TEMP |  6697\
  \ |   272   (0)|\n|   3 |   全表扫描| PAYMENTS      |   120K|   174   (1)|\n\n清单 20-14\
  \ 展示了 `TSTATS` 包中的另一个过程。该过程用于在临时表上伪造统计信息。过程包含一个用于设置表首选项的条件调用，这是 12c 特有的功能。在为 `PAYMENTS_TEMP`\
  \ 伪造统计信息后，清单 20-14 展示了使用临时表上各种谓词组合的多种两表连接的执行计划。由于基数估计保持较高，所有情况都使用了哈希连接，并且成本估计保持合理。当然，在实际工作中，你不会依赖\
  \ CBO 的估计——你会运行一些真实的工作负载并测量实际的用时。\n\n## 列统计信息的正确取值\n\n在清单 20-14 所示的例子中，通过为所有用于谓词的列设置较低的\
  \ `NUM_DISTINCT` 值来保持较高的基数估计。然而，较低的 `NUM_DISTINCT` 值会导致该列在 `GROUP BY` 子句中使用时产生较低的基数。可能需要一些实验，并且在某些情况下你很可能需要借助提示。\n\
  \n这些清单只考察了一条 SQL 语句，而这条语句可能代表也可能不代表你应用中的典型 SQL 语句。尽管如此，当表中的行数变化很大时，哈希连接通常代表最佳的折衷方案。\n\
  \n你不应该将关于临时表统计信息的讨论视为一种规定性的解决方案。相反，你应该将其视作你需要进行的那种分析的模板。如果你进行了分析并发现你确实必须为不同大小的临时表制定不同的执行计划，那么清单\
  \ 6-6 和 6-7 中展示的方案类型始终可作为最后的手段。\n\n一旦你为所有表（包括临时表）收集或设置了所有统计信息，你的测试系统上所有应用语句的执行计划就应该稳定了。现在该看看如何将这种稳定性复制到其他测试系统以及生产环境了。\n\
  \n## 如何部署 TSTATS\n\n正如我在第 6 章中解释的那样，`TSTATS` 的理念是将对象统计信息视为应用程序代码。就像应用程序代码一样，对象统计信息应置于版本控制之下，并根据变更控制规则，使用自动化部署脚本部署到生产环境和正式测试系统。这如何最好地实现呢？\n\
  \n这个过程始于收集对象统计信息的测试系统。第一步是将你的应用程序中表的对象统计信息导出到使用 `DBMS_STATS.CREATE_STAT_TABLE` 过程创建的导出表中。为了便于讨论，我们假设你的应用程序名为\
  \ `AJAX`，并且你的导出表名为 `TSTATS_AJAX`。现在你需要以 `TSTATS_AJAX` 为基础，创建一个置于版本控制下的部署脚本。你可以通过将\
  \ `TSTATS_AJAX` 中的行转换为 `insert` 语句或创建一个 SQL*Loader 文件来实现这一点。像 Oracle 的 SQL Developer\
  \ 和 Dell 的 TOAD 这样的工具都包含了生成此类脚本的功能。你的部署脚本可以在目标系统上创建 `TSTATS_AJAX`，然后使用 SQL*Plus\
  \ 或 SQL*Loader（视情况而定）直接将数据加载进去。\n\n![image](img/sq.jpg) **注意** 你可能会认为，如果部署脚本包含了应用程序模式中每个表、索引和表列的\
  \ `insert` 语句，其大小将会非常巨大。但是，请记住你不会有表分区的统计信息，所以情况可能不会像你想象的那么糟糕。\n\n部署脚本的最后一部分应将数据从\
  \ `TSTATS_AJAX` 导入到生产环境或目标测试系统的数据字典中。清单 20-15 展示了 `TSTATS` 包中执行此导入的过程。\n\n清单 20-15。将对象统计信息导入数据字典\n\
  \n```\nCREATE OR REPLACE PACKAGE tstats\nAS\n-- 其他过程已省略\n   PROCEDURE import_table_stats\
  \ (\n      p_owner all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n   \
  \                                                                'USERENV'\n   \
  \                                                               ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name all_tab_col_statistics.table_name%TYPE\n     ,p_statown all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_stat_table all_tab_col_statistics.table_name%TYPE);\n\
  -- 其他过程已省略\nEND tstats;\n/\n\nCREATE OR REPLACE PACKAGE BODY tstats\nAS\n-- 其他过程已省略\n\
  PROCEDURE import_table_stats (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE\n\
  \     ,p_statown all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n     \
  \                                                              'USERENV'\n     \
  \                                                             ,'CURRENT_SCHEMA')\n\
  \     ,p_stat_table all_tab_col_statistics.table_name%TYPE)\n   IS\n   BEGIN\n \
  \     DECLARE\n         already_up_to_date   EXCEPTION;\n         PRAGMA EXCEPTION_INIT\
  \ (already_up_to_date, -20000);\n      BEGIN\n         DBMS_STATS.upgrade_stat_table\
  \ (ownname   => 'DLS'\n                                       ,stattab   => 'DLS_TSTATS');\n\
  \      EXCEPTION\n         WHEN already_up_to_date\n         THEN\n            NULL;\n\
  \      END;\n\n      DBMS_STATS.unlock_table_stats (ownname   => p_owner\n     \
  \                               ,tabname   => p_table_name);\n      DBMS_STATS.delete_table_stats\
  \ (ownname         => p_owner\n                                    ,tabname    \
  \     => p_table_name\n                                    ,no_invalidate   => FALSE);\n\
  \      DBMS_STATS.import_table_stats (ownname         => p_owner\n             \
  \                       ,tabname         => p_table_name\n                     \
  \               ,statown         => p_statown\n                                \
  \    ,stattab         => p_stat_table\n                                    ,no_invalidate\
  \   => FALSE);\n\n-- 对于分区表，目标系统上的（子）分区数量\n      -- 可能与源系统上的不匹配。\n      FOR r\n \
  \        IN (SELECT *\n               FROM all_tables\n              WHERE     owner\
  \ = p_owner\n                    AND table_name = p_table_name\n               \
  \     AND partitioned = 'YES')\n      LOOP\n         adjust_global_stats (p_owner,\
  \ p_table_name,'PMOP');\n      END LOOP;\n\n      DBMS_STATS.lock_table_stats (ownname\
  \ => p_owner, tabname => p_table_name);\n   END import_table_stats;\n-- 其他过程已省略\n\
  END tstats;\n/\n\n\n\n若目标系统运行的 Oracle 数据库软件版本高于源系统，则会调用 `DBMS_STATS.UPGRADE_STAT_TABLE`\
  \ 以使 `TSTATS_AJAX` 保持最新状态，若 `TSTATS_AJAX` 已是最新则忽略生成的任何错误。随后，针对 `TSTATS_AJAX` 所引用的每张表执行以下操作：\n\
  \n*   移除任何现有统计信息。这对于防止出现统计信息混杂的情况是必要的。\n*   通过调用 `DBMS_STATS.IMPORT_TABLE_STATS`\
  \ 将对象统计信息导入数据字典。\n*   调整分区表的全局统计信息，因为目标系统上的分区数量可能与源系统不匹配。\n*   锁定已导入的统计信息。\n\n如果在您应用程序软件的后续版本中希望添加新表或索引，您可以简单地创建一个包含这些额外对象的新版部署脚本，或者也可以为这些对象创建一个专用脚本。您也可能将\
  \ `TSTATS.IMPORT_OBJECT_STATS` 调用包含在创建新表或索引的 DML 脚本中。这完全取决于您组织内部署新对象所使用的流程。\n\n\
  ## 总结\n\nTSTATS 是一种管理对象统计信息的方法，它与 Oracle 建议的标准方法**根本不同**。尽管如此，TSTATS 并未使用 Oracle\
  \ 数据库的任何不受支持的特性，并且有效地允许将执行计划的变更置于变更控制流程之下，而无需使用难以（若非不可能）与应用程序代码协调一致的 SQL 语句存储库。\n\
  \n本章提供了一些关于如何设置 TSTATS 的思路。然而，TSTATS 并非一个“即插即用”的工具，在成功地为复杂的商业应用程序部署 TSTATS 之前，通常需要进行大量的分析和定制。希望本章已指明了方向。\n\
