- '# 第十四章


  ![image](img/frontdot.jpg)


  ## 为什么事情会出错？


  正如我在第 1 章开头所提到的，SQL 是一种声明式编程语言。理论上，你只需说明你想要完成什么，然后某个“东西”会设法找出如何去做。对于 Oracle 数据库而言，这个“东西”就是
  CBO，它应该为你设计出合适的执行计划。理论上，你不必担心得到错误的结果，也不必担心性能。既然你正在阅读这本书，你几乎肯定已经意识到生活并非那么简单，事实上，你确实需要相当多的担心。除了
  bug 之外，正确编写的 SQL 语句的结果将是正确的，但最优性能，甚至是可接受的性能，远非有保证，即使是来自一个没有 bug 的数据库也是如此。


  那么为什么性能常常如此糟糕呢？我们在本书中已经触及了许多问题。没有正确的扩展统计信息集合，就会发生基数错误，而基数错误会完全迷惑 CBO。但迷惑 CBO 的不仅仅是基数错误。我们在第
  4 章讨论了标量子查询缓存。CBO 无法评估标量子查询缓存的收益，也无法知道查询运行时哪些数据块会在缓冲区缓存中。


  缓存只是信息缺失的一个例子。有时，只有在确定被索引的列不为空时才能使用索引。CBO 可能知道某列不为空，因为该列上有 `NOT NULL` 约束，或者 `WHERE`
  子句中出现了 `IS NOT NULL` 谓词。在缺乏此类信息的情况下，CBO 将不得不假设该列实际上可能为 `NULL`，从而避免使用索引。


  那么争用呢？你是否认为，当另一个会话正在更新你正在查询的索引时，你的性能可能会受到影响？我可以告诉你，它可能会。我见过真实案例，我不得不使用一个对 CBO 来说似乎是较差选择的索引，但查询性能良好，因为在我查询时，我选择的索引没有被其他进程更新。另一方面，CBO
  选择的索引正被其他进程更新，导致了性能不佳。


  声明式编程语言的概念意味着 CBO 应该是全知的，因此我们可以轻易地将糟糕执行计划的大部分责任归咎于 CBO 的不足。然而，设计你的物理数据库不在 CBO 的职责范围内；如果缺少索引，CBO
  无法为你创建它。


  你可以看到，本章涉及的许多概念在本书前面已经讨论过，但我想把它们汇集在一处并展开说明。让我们首先重新审视 CBO 面临的最大问题：基数错误。


  ### 基数错误


  术语 *基数错误* 指的是在候选执行计划中，CBO 对行源操作返回行数的估计值与实际选择并运行该执行计划时将返回的实际行数之间存在显著差异。基数估计是 CBO
  在执行最终状态优化时生成的最重要的信息。基数错误有几个原因。让我从最大的基数错误来源开始：相关列。


  ### 列的相关性




  '
- "# 第 14 章 基数估算问题\n\n## 列相关性\n\n我在第 6 章介绍了列相关性的概念，在第 9 章的清单 9-11 中展示了两个名为`TRANSACTION_DATE`和`POSTING_DATE`的列之间的相关性。这两个日期列之间的相关性很容易看出，但在其他情况下可能就不那么明显了。考虑`SH`模式中`SALES`表的列：\n\
  \n*   `PROD_ID`\n*   `CUST_ID`\n*   `TIME_ID`\n*   `PROMO_ID`\n*   `QUANTITY_SOLD`\n\
  *   `AMOUNT_SOLD`\n\n对于一个数据仓库表来说，这些列是相当真实的，尽管示例数据是人为构造的。请想象这个表属于一个酒商，它具有以下特征：\n\n\
  *   100 种葡萄酒\n*   10,000 名客户\n*   10 年的交易历史（假设`TIME_ID`有 10 个值）\n*   每月有一次葡萄酒促销活动\n\
  *   售出了 10,000,000 瓶葡萄酒\n*   每笔订单平均售出 10 瓶葡萄酒\n\n这意味着表中有 1,000,000 行。\n\n让我们看看表中哪些列是相互关联的。从`PROD_ID`和`CUST_ID`开始。乍一看，这些列似乎毫无关系。但是等等；假设我们想估算某一款特定葡萄酒的销售数量。我们知道有\
  \ 100 种葡萄酒，所以选择率将是 1%，而基数估计（该葡萄酒的平均销售交易数）将是 1,000,000 的 1%，即 10,000。使用同样的逻辑，我们看到有\
  \ 10,000 名客户，因此每位客户下了 0.01%的订单，这意味着平均每位客户在十年期间下了 100 笔订单。\n\n那么现在我们来问这个问题：某位特定客户购买了多少瓶某款特定的葡萄酒？嗯，CBO\
  \ 会假设每位客户为 100 种葡萄酒中的每一种都下了一笔订单。这不太可能是准确的，因为通常客户不会品尝每一种酒——他们会大量购买自己喜欢的酒。因此`CUST_ID`和`PROD_ID`是相关的。\n\
  \n![image](img/sq.jpg) **提示** 如果你意识到不会找到两个列的每一种可能组合对应的行，那么这两个列就是相关的，并且当同时存在对这两个列的谓词且没有扩展统计信息时，CBO\
  \ 会低估基数。\n\n每位客户每年都买酒吗？可能不是。客户来来去去，所以`CUST_ID`和`TIME_ID`是相关的。每位客户都会利用每一次促销活动吗？不太可能。大多数客户每次下单的金额可能相同或相似，并且几乎可以肯定，表中不会出现`CUST_ID`和`AMOUNT_SOLD`的每一种组合。所以`CUST_ID`与表中的每一个其他列都相关！那么`PROD_ID`呢？每种葡萄酒每年都会售出吗？不会：2012\
  \ 年的酒不会在 2011 年或更早售出，而且售罄后就无法再获得。促销活动适用于每个产品吗？不适用。如果你继续思考下去，你会发现几乎每一列都与另一列相关。\n\n\
  我曾与一些应用程序合作过，其中几乎每一个关键执行计划中的基数估计都显著低于实际值，原因就是列相关性的影响。\n\n## 统计信息反馈与`DBMS_STATS.SEED_COL_USAGE`特性\n\
  \n对于大多数复杂的应用程序来说，确定要创建的正确扩展统计信息集合几乎是不可能的，这一点优化器团队也意识到了，他们提供了两种解决这个问题的方法。\n\n让我们从了解*统计信息反馈*开始，这是我在第\
  \ 6 章提到过的基数反馈特性的扩展和重命名版本。如果你在 12cR1 或更高版本中遇到显著的基数错误，并且你没有通过将`OPTIMIZER_ADAPTIVE_FEATURES`设置为`FALSE`来禁用统计信息反馈，那么很可能会创建一个*SQL\
  \ 计划指令*。SQL 计划指令的存在可能会、也可能不会引发以下一种或两种后果：\n\n*   对该语句或将来执行的类似语句（无论是否由同一会话发出）进行动态采样。\n\
  *   下一次收集统计信息时，自动为某些列组创建扩展统计信息。\n\n在我看来，这种动态自适应特性在生产环境中是不受欢迎的。正如我在第 6 章解释的那样，我们通常不希望未经测试的执行计划首次在生产环境中运行。但尽管这个概述很简短，我认为\
  \ SQL 计划指令在项目生命周期的早期阶段，用于在测试系统上识别扩展统计信息的需求是一个潜在有用的功能。在早期阶段使用动态采样对于识别扩展统计信息目前无法解决的问题（例如多表中的相关列）也很有用。你可以在\
  \ SQL 调优指南中阅读更多关于 SQL 计划指令的内容。\n\n一个可能更容易管理的独立特性在 11gR2 中引入并支持，但直到 12cR1 才首次被记录。`DBMS_STATS.SEED_COL_USAGE`过程允许你在运行特定工作负载时收集关于列组统计信息需求的信息。清单\
  \ 14-1 展示了基本方法。\n\n**清单 14-1. 通过 DBMS_STATS.SEED_COL_USAGE 获取扩展统计信息**\n\n```sql\n\
  BEGIN\n   DBMS_STATS.reset_col_usage (ownname => 'SH', tabname => NULL); -- 可选\n\
  \n   DBMS_STATS.seed_col_usage (NULL, NULL, 3600);\nEND;\n/\n\n-- 等待一个多小时\n\nDECLARE\n\
  \   dummy   CLOB;\nBEGIN\n   FOR r\n      IN (SELECT DISTINCT object_name\n    \
  \        FROM dba_objects, sys.col_group_usage$\n           WHERE obj# = object_id\
  \ AND owner = 'SH' AND object_type = 'TABLE')\n   LOOP\n      SELECT DBMS_STATS.create_extended_stats\
  \ ('SH', r.object_name)\n        INTO dummy\n        FROM DUAL;\n   END LOOP;\n\
  END;\n/\n```\n\n清单 14-1 首先调用了未记录的`DBMS_STATS.RESET_COL_USAGE`过程来清除先前测试运行中遗留的关于`SH`模式的不具有代表性的数据，但这是可选的。下一个调用是`DBMS_STATS.SEED_COL_USAGE`，它开始监控\
  \ SQL 语句 3,600 秒。一小时过后，你就可以根据获得的列使用统计信息创建扩展统计信息了。请注意，对`DBMS_STATS.CREATE_EXTENDED_STATS`的调用省略了任何扩展的指定，因为它们是从数据字典中自动获取的。\n\
  \n你可以通过查看数据字典表`SYS.COL_GROUP_USAGE$`（如清单 14-1 所示）来找出需要扩展统计信息的表。作为替代方案，如果你传递`NULL`作为表名（与省略表名相对），你可以在一次调用中为整个`SH`模式创建必要的扩展。\n\
  \n现在让我离开相关列，转而讨论另一个主要的基数错误来源：函数。\n\n## 函数\n\n当你在谓词中包含函数调用时，CBO 通常无法知道该谓词的选择率。考虑清单\
  \ 14-2：\n\n**清单 14-2. 谓词中的函数调用**\n\n```sql\nSELECT *\n  FROM some_table t1, another_table\
  \ t2\n WHERE some_function (t1.some_column) = 1 AND t1.c1 = t2.c2;\n```\n\n\n\n\
  假设 `SOME_TABLE` 的对象统计信息显示该表有 1,000,000 行。在应用过滤谓词 `some_function (t1.some_column)\
  \ = 1` 后，`SOME_TABLE` 中会剩下多少行？你无法判断，对吧？CBO（基于成本的优化器）同样无法判断。如果从 `SOME_TABLE` 中只选择了一行或两行，那么使用与\
  \ `ANOTHER_TABLE` 的 `NESTED LOOPS`（嵌套循环）连接可能是合适的。但也有可能所有 1,000,000 行都被选中，这种情况下，`HASH\
  \ JOIN`（哈希连接）将是避免灾难性性能的唯一方法。我在上面的例子中特意使用了无意义的表名和函数名。假设 清单 14-2 中的函数调用实际上是 `MOD (t1.some_column,\
  \ 2)?` 那会怎样？既然 `MOD` 是 SQL 引擎提供的函数，CBO 当然应该意识到这个函数调用可能只会过滤掉大约一半的行？嗯，其实不然。SQL 语言提供了数十种内置函数，让\
  \ CBO 为每个函数都保存一套识别基数估计值的规则是不切实际的。CBO 唯一切实可行的做法是，像对待用户编写的函数一样对待它们。\n\n当 CBO 无法确定基数时，它会使用一组固定的内置值之一进行任意猜测。对于函数调用，通常使用\
  \ 1% 的选择性估计值。\n\n## 过时的统计信息\n\n这里我将简要说明。我已在第 6 章详细讨论过过时统计信息的主题，并将在第 20 章再次讨论。只需将过时的统计信息（在非\
  \ `TSTATS` 环境中）添加到导致基数错误的原因列表中即可。\n\n## 愚蠢的数据类型\n\n“愚蠢的数据类型”是《*Cost Based Oracle\
  \ Fundamentals*》一书第 6 章中一个章节的标题。该章节完全致力于讨论基数错误的主题，我毫不掩饰地复制了该章节标题。清单 14-3 也几乎直接复制自\
  \ Jonathan Lewis 书中同一章节的内容。\n\n清单 14-3. 愚蠢的数据类型\n\n```sql\nCREATE TABLE t2\nAS\n\
  \   SELECT d1\n         ,TO_NUMBER (TO_CHAR (d1, 'yyyymmdd')) n1\n         ,TO_CHAR\
  \ (d1, 'yyyymmdd') c1\n     FROM (SELECT TO_DATE ('31-Dec-1999') + ROWNUM d1\n \
  \            FROM all_objects\n            WHERE ROWNUM <= 1827);\n\nSELECT *\n\
  \  FROM t2\n WHERE d1 BETWEEN TO_DATE ('30-Dec-2002', 'dd-mon-yyyy')\n         \
  \     AND TO_DATE ('05-Jan-2003', 'dd-mon-yyyy');\n\n| Id  | Operation         |\
  \ Name | Rows  |\n\n|   0 | SELECT STATEMENT  |      |     8 |\n|*  1 |  TABLE ACCESS\
  \ FULL| T2   |     8 |\n\nSELECT *\n  FROM t2\n WHERE n1 BETWEEN 20021230 AND 20030105;\n\
  \n| Id  | Operation         | Name | Rows  |\n\n|   0 | SELECT STATEMENT  |    \
  \  |   396 |\n|*  1 |  TABLE ACCESS FULL| T2   |   396 |\n```\n\n清单 14-3 生成 2000\
  \ 年 1 月 1 日到 2004 年 12 月 31 日之间的每一天一行数据。第一个查询使用日期列选取 2002 年 12 月 30 日到 2003 年 1\
  \ 月 5 日（含首尾）之间的七行数据，其基数估计几乎是正确的。第二个查询使用了一个谓词，该谓词作用于一个以 `YYYYMMDD` 格式存储日期的数值列。此时的基数估计就偏差很大了，因为当被视为数字时，范围\
  \ 20,021,230 到 20,030,105 似乎占了总范围 20,000,101 到 20,041,231 的相当大一部分。\n\n我可以复制并粘贴 Jonathan\
  \ 书中更多的内容，但没必要。关键不是试图记住一堆 CBO 出错的原因，而是培养一种思维方式，让你在需要时能够推断出问题所在。\n\n我想关于基数错误我已经说完了我想说的。但基数错误并不是\
  \ CBO 出错的唯一原因。让我们继续讲述 CBO 问题的故事，将注意力转向缓存效应。\n\n## 缓存效应\n\n许多 Oracle 专家养成了使用术语 “cache”\
  \ 作为 “buffer cache”（缓冲区缓存）缩写的习惯。我自己也经常这样做。然而，在 Oracle 数据库中有许多不同类型的缓存。我在第 4 章介绍了\
  \ OCI、结果和函数缓存，并在第 13 章相当详细地讨论了标量子查询缓存。所有这些缓存都会影响 SQL 语句的耗时和资源消耗。CBO 无法量化任何这些缓存带来的好处，因此在其计算中不会以任何方式考虑缓存效应。\n\
  \n我想讨论一个特定的案例，在这个案例中，CBO 有朝一日可能能够比目前考虑得更周全一点。它涉及到我在第 9 章解释过的索引聚簇因子统计信息。清单 14-4 展示了一个有趣的测试用例。\n\
  \n清单 14-4. 单列索引的聚簇缓存效应\n\n```sql\nALTER SESSION SET statistics_level=all;\n\nSET\
  \ PAGES 900 LINES 200 SERVEROUTPUT OFF\nCOMMIT;\nALTER SESSION ENABLE PARALLEL DML;\n\
  \nCREATE TABLE t1\n(\n   n1       INT\n  ,n2       INT\n  ,filler   CHAR (10)\n\
  )\nNOLOGGING;\n\nINSERT /*+ parallel(t1 10) */\n      INTO  t1\n   WITH generator\n\
  \        AS (    SELECT ROWNUM rn\n                  FROM DUAL\n            CONNECT\
  \ BY LEVEL <= 4500)\n   SELECT TRUNC (ROWNUM / 80000)\n         ,ROWNUM + 5000 *\
  \ (MOD (ROWNUM, 2))\n         ,RPAD ('X', 10)\n     FROM generator, generator;\n\
  \nCOMMIT;\n\nCREATE INDEX t1_n1\n   ON t1 (n1)\n   NOLOGGING\n   PARALLEL 10;\n\n\
  COLUMN index_name FORMAT a10\n\nSELECT index_name, clustering_factor\n  FROM all_indexes\n\
  \ WHERE index_name = 'T1_N1';\nINDEX_NAME CLUSTERING_FACTOR\n---------- -----------------\n\
  T1_N1                  74102\n\nALTER SYSTEM FLUSH BUFFER_CACHE;\n\nSELECT MAX (filler)\n\
  \  FROM t1\n WHERE n1 = 2;\n\nSELECT *\n  FROM TABLE (\n          DBMS_XPLAN.display_cursor\
  \ (NULL\n                                    ,NULL\n                           \
  \         ,'basic cost iostats -predicate'));\n\n| Id  | Operation             \
