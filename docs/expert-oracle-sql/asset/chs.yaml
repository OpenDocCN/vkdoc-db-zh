  ```sql\nBEGIN\n   DBMS_STATS.create_stat_table (\n      ownname   => SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n     ,stattab   => 'CH9_STATS');\n\n   DBMS_STATS.export_table_stats\
