  \ |     1 |     2 |\n111 ---------------------------------------------------------------------------------\n\
  ```\n\n\n\n"
- "# 设置与发布待处理统计信息\n\n以下脚本展示了如何设置、测试并发布待处理的统计信息。首先执行命令：\n```sql\nALTER SESSION SET\
  \ optimizer_use_pending_statistics=TRUE;\n```\n会话已更改。\n\n接着执行查询：\n```sql\nSELECT\
  \ *\n  FROM statement_part\n WHERE transaction_amount = 8;\n```\n执行计划如下：\n```\n\
  ---------------------------------------------------------------------------------\n\
  | Id  | Operation           | Name           | Rows  | Time     | Pstart| Pstop\
  \ |\n---------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT    |                |   125 | 00:00:01 |       |      \
  \ |\n|   1 |  PARTITION RANGE ALL|                |   125 | 00:00:01 |     1 | \
  \    2 |\n|*  2 |   TABLE ACCESS FULL | STATEMENT_PART |   125 | 00:00:01 |    \
  \ 1 |     2 |\n---------------------------------------------------------------------------------\n\
  ```\n\n然后发布待处理的统计信息：\n```sql\nBEGIN\n    DBMS_STATS.publish_pending_stats (\n  \
  \     ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n      ,tabname   =>\
  \ 'STATEMENT_PART');\nEND;\n/\n```\nPL/SQL 过程已成功完成。\n\n之后禁用待处理统计信息的使用：\n```sql\n\
  ALTER SESSION SET optimizer_use_pending_statistics=FALSE;\n```\n会话已更改。\n\n再次运行查询以验证效果：\n\
  ```sql\nSELECT *\n  FROM statement_part\n WHERE transaction_amount = 8;\n```\n执行计划显示：\n\
  ```\n---------------------------------------------------------------------------------\n\
  | Id  | Operation           | Name           | Rows  | Time     | Pstart| Pstop\
  \ |\n---------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT    |                |   125 | 00:00:01 |       |      \
  \ |\n|   1 |  PARTITION RANGE ALL|                |   125 | 00:00:01 |     1 | \
  \    2 |\n|*  2 |   TABLE ACCESS FULL | STATEMENT_PART |   125 | 00:00:01 |    \
  \ 1 |     2 |\n---------------------------------------------------------------------------------\n\
  ```\n\n关闭自动跟踪：\n```sql\nSET AUTOTRACE OFF\n```\n\n最后，查询 `ALL_TAB_HISTOGRAMS` 和 `ALL_TAB_HISTGRM_PENDING_STATS`\
  \ 视图来观察直方图的状态变化。\n\n查询 `ALL_TAB_HISTOGRAMS`：\n```sql\nSELECT endpoint_number, endpoint_value\n\
  \  FROM all_tab_histograms\n WHERE     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \       AND table_name = 'STATEMENT_PART'\n       AND column_name = 'TRANSACTION_AMOUNT';\n\
  ```\n结果如下：\n```\nENDPOINT_NUMBER ENDPOINT_VALUE\n--------------- --------------\n\
  \           1000              8\n           1600       10000000\n            600\
  \      -10000000\n```\n已选择 3 行。\n\n查询 `ALL_TAB_HISTGRM_PENDING_STATS`：\n```sql\n\
  SELECT endpoint_number, endpoint_value\n  FROM all_tab_histgrm_pending_stats\n WHERE\
  \     owner = SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n       AND table_name =\
  \ 'STATEMENT_PART'\n       AND column_name = 'TRANSACTION_AMOUNT';\n```\n未选择任何行。\n\
  \n"
- '# 关于 CBO 其他输入信息的说明


  虽然本章重点讨论了对象统计信息，但你应该知道，CBO（基于成本的优化器）还利用了至少四个其他信息来源：


  *   优化器提示

  *   初始化参数

  *   系统统计信息

  *   其他数据字典信息


  我们将在本书中讨论优化器提示，第 18 章 专门讨论该主题。让我们依次看看其他三个信息来源，从初始化参数开始。


  ## 初始化参数


  有大量的文档化初始化参数要么专用于 CBO，要么以某种方式影响 CBO。还有大量的隐藏初始化参数允许你影响 CBO 行为的特定方面。除非你得到第三方软件供应商的建议，否则你几乎总是应该努力使用几乎所有此类参数的默认值。


  除了你不太可能通过调整与优化器相关的初始化参数的非默认值来改进 CBO 或运行时引擎的性能这一事实之外，你可能会遇到错误，因为 CBO 不一定在你的设置下经过测试。


  为了说明我的观点，让我举一个初始化参数的例子，它不直接与 CBO 相关，但会影响 CBO 行为。`DB_BLOCK_SIZE` 的默认值是 8192 字节。过去专家们曾经建议为数据仓库使用更大的值。如今，大多数专家会同意
  Jonathan Lewis 的《Cost-Based Oracle》一书中的以下评论：


  > 你也许能找到一些特殊情况，通过将对象从一个块大小更改为另一个块大小可以获得积极的收益；但一般来说，由于优化器改变其算术运算而产生的一些副作用可能会超过你选择的块大小的感知收益。


  确实如此。人们过去经常调整的另外两个初始化参数是 `OPTIMIZER_INDEX_COST_ADJ` 和 `OPTIMIZER_INDEX_CACHING`。这两个参数在系统范围内（这种概念本身就值得怀疑）工作，使得索引访问比全表扫描更优惠或不那么优惠。这些参数的一个问题是，它们的作用是减少索引访问的成本，而不是增加全表扫描的成本，因此可能会出现舍入误差。最好别动它们。




  '
- '# 有几个初始化参数你可以随意更改。这些参数是：


  *   `DB_FILE_MULTIBLOCK_READ_COUNT`

  *   `PARALLEL_DEGREE_POLICY`

  *   `OPTIMIZER_FEATURES_ENABLE`

  *   `OPTIMIZER_ADAPTIVE_FEATURES`

  *   `OPTIMIZER_ADAPTIVE_REPORTING_ONLY`


  `DB_FILE_MULTIBLOCK_READ_COUNT` 的默认行为，说得委婉些，有点令人困惑。你应该将此参数显式设置为你的平台和块大小所允许的最大 I/O
  大小。对于大多数平台，最大 I/O 大小是 1MB，这意味着在块大小为 8K 的情况下，该参数的最佳值是 128。通过显式设置此参数，你可以让 CBO 认为多块读是高效的——而事实也确实如此。


  在 第 2 章 中，我解释了如何通过将 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO` 来设置自动并行度。我对这一功能的体验极其正面，如果将来某个时候
  `AUTO` 成为 `PARALLEL_DEGREE_POLICY` 的默认设置，我一点也不会感到惊讶。


  如果你将数据库升级到新版本，并且没有机会进行彻底测试（或者你做了测试但遇到了问题），你可以将 `OPTIMIZER_FEATURES_ENABLE` 设置为非默认值，以禁用新的
  CBO 功能，并将这些新 CBO 功能干扰执行计划的风险降至最低。


  最后，我只想提一下随 12cR1 提供的两个新的初始化参数。将 `OPTIMIZER_ADAPTIVE_FEATURES` 设置为 `FALSE`，可以关闭 12cR1
  引入的所有新自适应功能，这些功能我在 第 6 章 讨论过。作为更改 `OPTIMIZER_ADAPTIVE_FEATURES` 的替代方案，你可以将 `OPTIMIZER_ADAPTIVE_REPORTING_ONLY`
  设置为 `TRUE`。采用此设置后，会收集自适应优化所需的信息，但不会采取任何行动来更改计划。换句话说，自适应计划将始终选择默认（由优化器选择的）计划，但会收集信息，以了解在非报告模式下应适应哪个计划。我必须承认，我目前的经验尚不足以对如何设置这些参数给出明确建议，但我的初步感觉是，至少生产系统通常应运行在
  `OPTIMIZER_ADAPTIVE_FEATURES` 设置为 `FALSE` 的状态下，直到自适应功能更加成熟。


  以防你好奇，我并不建议将 `所有` 初始化参数都保留为默认值！不，你的数据库不一定非要命名为 `orcl`，而且你可能需要更改 `SGA_TARGET` 或 `MEMORY_TARGET`
  的值！我在本节中的评论纯粹是关于刻意尝试影响 CBO 的行为。


  ## 系统统计信息


  哪个耗时更长：一次 1MB 的多块读还是 40 次顺序发出的单块读？理论上，该问题的答案取决于你的硬件。实际上，考虑到企业存储上可能存在的缓存，你的答案也可能取决于工作负载。理论上，CBO
  可能需要知道这个问题的答案。但 CBO 不仅需要在多块 I/O 和单块 I/O 之间做出选择；它偶尔还需要在例如内存中的 CPU 密集型聚合和读取物化视图的磁盘访问之间做出选择。CBO
  再次希望了解 CPU 和磁盘子系统的相对能力。


  于是就有了系统统计信息。系统统计信息在 10gR1 中引入，并受到了适度的欢迎。然而，我对专家进行的相当不科学的民意调查表明，专家意见的钟摆已经非常坚定地摆向了反对使用系统统计信息的一方。首先，执行计划因系统统计信息的存在而改变的可能性极小，即使真的改变，你也不太可能看到因此带来的性能大幅改善。


  那些劝阻人们不要通过调整初始化参数来影响 CBO 的论点，同样可以用来劝阻人们不要收集或设置系统统计信息：你遇到某种错误或其他差异的风险，超过了使用系统统计信息可能带来的任何好处。我的建议是调用
  `DBMS_STATS.DELETE_SYSTEM_STATS`。这个过程调用将恢复所谓的 `默认空载统计信息`，地球上大多数 Oracle 数据库都在使用这些统计信息。


  如果你确实选择使用非默认的系统统计信息，至关重要的是使用 `DBMS_STATS.EXPORT_SYSTEM_STATS` 和 `DBMS_STATS.IMPORT_SYSTEM_STATS`
  将这些非默认的系统统计信息从你的性能测试系统复制到生产系统。否则，你的生产系统可能会选择与你精心测试过的计划不同的执行计划。


  ## 其他数据字典信息


  显然，CBO 需要知道存在哪些表和索引，以及这些表和索引中有哪些列。这类模式信息、与之相关的对象统计信息，以及任何可能已收集或设置的系统统计信息，都保存在数据字典中。然而，CBO
  可能从数据字典中提取的信息至少还有另外两部分。


  我在 第 2 章 提到过，当 `PARALLEL_DEGREE_POLICY` 处于默认值 `MANUAL` 时，你可以通过指定查询要使用的并行度来修饰表或索引。此信息保存在数据字典中，不被视为对象统计信息。CBO
  也可能对表中的分区数量感兴趣。我们将在 第 20 章 回到最后这一点。我在此提及只是为了完整性。


  ## 小结


  对象统计信息是一个复杂的主题，这冗长的一章仍然只提供了高层次的概述。重要的是要认识到，我们需要的统计信息是能让 CBO 做出合理且可供我们测试的行为的统计信息，而不一定是反映现实的对象统计信息，因此有时需要对统计信息进行操作。另一方面，如果你手动更改了统计信息，你应该非常小心，确保统计信息是
  `自洽的`。例如，你不应该将索引的 `NUM_ROWS` 统计信息设置为大于表的 `NUM_ROWS` 的值。这种行为很可能会引导 CBO 走向无人测试过的代码路径。


  本章结束了本书涉及高级概念的部分，现在是时候进入 第 3 部分，更详细地探讨 CBO 的工作了。第 10 章 通过介绍 CBO 必须选择的访问方法来开启这一部分。


  ---


  [1] 如前言所述，我关于统计信息使用的主要信息来源是乔纳森·刘易斯（Jonathan Lewis）于 2006 年出版的《基于成本的 Oracle》一书。


  [2] 缩写 UTC 是英文“协调世界时”和法文“Temps Universel Coordonné”之间的折中。


  [3] 顺便说一句，我使用 `ALL_TAB_COLS` 而不是 `ALL_TAB_COL_STATISTICS`，以防该列没有预先存在的统计信息。


  '
