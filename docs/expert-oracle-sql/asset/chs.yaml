  ## 对象统计信息


  尽管 CBO 使用来自各种来源的数据来决定如何优化一条语句，但 CBO 所需的大部分重要信息来自对象统计信息。本章大部分内容致力于解释对象统计信息，不过我们将在本章结尾简要谈谈
  CBO 使用的其他信息来源。


  原则上，并且在很大程度上在实践中，将对象统计信息用作优化的基础是理想的。例如，我们需要某种方法来区分一个只有十行的小型配置表和一个拥有 TB 级数据的事务表——对象统计信息可以为我们做到这一点。请注意，如果
  CBO 被设计为从表的实际大小获取输入，而不是使用单独的统计信息，我们将无法控制对 CBO 输入数据的更改；每次我们向表添加一行时，语句的执行计划都可能改变。


  我们可以用两种方式对对象统计信息进行分类：按对象类型和按级别。我们有 `表统计信息`、`索引统计信息` 和 `列统计信息`，并且对于每个表、列或索引，我们可能在
  `全局`、`分区` 或 `子分区` 级别保存数据。


  ![image](img/sq.jpg) **注意** 如果你使用 `域索引`，你可以创建自己的对象统计信息类型。详情请参阅《Data Cartridge Developer’s
  Guide》。还有各种与用户定义对象类型和对象表相关的统计信息。相关信息请参阅《Object-Relational Developer’s Guide》。本书将不涵盖域索引或对象关系概念。


  本章将解释每个统计信息是什么以及它是如何使用的，并解释为什么我们有三种不同级别的统计信息。但我想首先谈谈对象统计信息应用的一些一般性要点，并解释它们最初是如何获得的。


  ### 对象统计信息的目的


  让我们假设 CBO 正在考虑使用全表扫描（`FTS`）访问一个表。CBO 需要估算三个关键指标：


  *   **成本。** 换句话说，CBO 需要知道 `FTS` 可能需要多长时间。如果很快，那么 `FTS` 可能是个好主意；如果耗时很长，那么可能就不是。

  *   **基数。** 在决定是执行 `FTS` 还是使用索引访问表时，返回的行数并不直接相关；无论我们如何访问表，返回的行数都是相同的。另一方面，输入到*父*操作的行数可能至关重要。例如，假设
  `FTS` 的结果随后被用作与另一个行源进行连接的驱动行源。如果 `FTS` 只返回一两行，那么嵌套循环可能是个好主意。如果 `FTS` 返回 10,000 行，那么可能哈希连接会更好。`FTS`
  的基数可以分两步确定。首先，我们需要知道表中的**行数**，其次，我们需要知道谓词的**选择率**。因此，例如，如果一个表有 1,000 行，我们有 10% 的选择率（也可以表示为
  0.1 的选择率），那么全表扫描返回的行数将是 1,000 的 10%，即 100。

  *   **字节数。** 与基数类似，无论使用 `FTS` 还是索引，表访问返回的字节数都是相同的。然而，如果 CBO 想要对两个各有 10,000 行的表执行哈希连接，那么将根据两个表中较小的那个（以字节衡量）来选择驱动行源。


  尽管我用 `FTS` 作为例子，但同样的三个指标对所有行源操作都至关重要，而对象统计信息的主要目的就是帮助 CBO 尽可能准确地估算它们。




  '
- "# 创建对象统计信息\n\n在少数情况下，特别是在通过索引访问表时，需要同时获取多个行源操作的估计值。我们将在接下来讨论*聚簇因子*索引统计信息时，将此特例纳入考量。\n\
  \n成本优化器从数据字典中读取对象统计信息，但首先需要将这些统计信息存入数据字典。使用 `DBMS_STATS` 包创建或更新对象统计信息有四种不同的方式：*收集*、*导入*、*转移*和*设置*统计信息。此外：\n\
  \n*   默认情况下，当索引被创建或重建时，会为其生成对象统计信息。\n*   默认情况下，自数据库版本 12cR1 起，当使用 `CREATE TABLE\
  \ ... AS SELECT` 选项创建表或使用 `INSERT` 语句批量加载空表时，会生成表及其关联列的对象统计信息。\n\n让我逐一介绍这些选项。\n\n\
  ## 收集对象统计信息\n\n收集统计信息是迄今为止创建或更新统计信息最常用的方式，对于应用对象，需要使用 `DBMS_STATS` 包中四种不同的过程之一：\n\
  \n*   `DBMS_STATS.GATHER_DATABASE_STATS` 收集整个数据库的统计信息。\n*   `DBMS_STATS.GATHER_SCHEMA_STATS`\
  \ 收集指定模式内对象的统计信息。\n*   `DBMS_STATS.GATHER_TABLE_STATS` 收集指定表、表分区或表子分区的统计信息。\n  \
  \  *   为分区表收集统计信息时，可以在同一次调用中收集所有分区和子分区（如适用）的统计信息。\n    *   无论是为表、分区还是子分区收集统计信息，默认行为都是在同一次调用中收集所有关联索引的统计信息。\n\
  \    *   除了表统计信息外，此过程还会同时收集表中部分或所有列的统计信息；没有单独收集列统计信息的选项。\n*   `DBMS_STATS.GATHER_INDEX_STATS`\
  \ 收集指定索引、索引分区或索引子分区的统计信息。与 `DBMS_STATS.GATHER_TABLE_STATS` 一样，可以在同一次调用中收集全局、分区和子分区级别的统计信息。\n\
  \n![image](img/sq.jpg) **注意** 数据字典中的对象也需要对象统计信息。这些统计信息使用 `DBMS_STATS.GATHER_DICTIONARY_STATS`\
  \ 和 `DBMS_STATS.GATHER_FIXED_OBJECT_STATS` 过程获取。\n\n`DBMS_STATS` 中的所有统计信息收集过程都以类似方式工作：使用递归\
  \ SQL 语句读取被分析的对象。并非需要读取对象中的所有块。默认情况下，会对数据进行随机抽样，直到 `DBMS_STATS` 认为额外的抽样不会对计算出的统计信息产生实质性影响为止。自\
  \ 11gR1 版本以来，在绝大多数情况下，这种确定何时停止的逻辑非常有效。\n\n![image](img/sq.jpg) **注意** 在某些情况下，例如当您有一个列在\
  \ 2,000,000 行中具有相同值，而在另外 2 行中具有第二个值时，随机抽样很可能过早地确定表中所有行的该列值都相同。在这种情况下，您应该直接设置列统计信息以反映现实情况！\n\
  \n`DBMS_STATS` 统计信息收集过程有许多可选参数。例如，您可以指示仅在统计信息缺失或被视为*陈旧*时才收集对象统计信息。您还可以指定以并行方式执行统计信息收集。更多详情请参阅\
  \ *PL/SQL Packages and Types Reference* 手册。\n\n您应该注意，在首次安装 Oracle 数据库时，会自动创建一个用于收集整个数据库统计信息的作业。我怀疑这个作业的存在是为了迎合那些从不考虑对象统计信息的为数不少的客户。对于大多数大型系统，需要定制此过程，您应仔细审查此作业。根据版本不同，该作业的调度方式也多种多样，因此更多详情请参阅《SQL\
  \ Tuning Guide》（对于 11g 或更早版本，则参阅《Performance Tuning Guide》）。\n\n在绝大多数情况下，应该收集对象的*初始*统计信息集。这是唯一实用的方法。另一方面，正如我在第\
  \ 6 章中所解释的，应尽量减少在生产系统上收集统计信息。现在我将解释一种可以完全避免在生产系统上收集统计信息的方法。\n\n## 导出与导入统计信息\n\n\
  如果您是烹饪节目的粉丝，您会熟悉像“这是我预先准备好的一个”这样的表达方式。烹饪需要时间，有时还会出错。因此，在电视烹饪节目中，为了节省时间，通常会展示准备餐点的初始阶段，然后直接使用预先准备好的菜肴跳到结尾。\n\
  \n在某些方面，收集统计信息就像烹饪：需要一些时间，一个小失误就可能毁掉一切。好消息是，DBA 们像电视厨师一样，通常可以通过将预先制作好的统计信息导入数据库来节省时间并避免风险。使用预制统计信息是我在第\
  \ 6 章介绍的 TSTATS 部署方法中的几个关键概念之一，但在许多其他场景中，使用预制的对象统计信息也很有用。一个例子是冗长的数据转换、迁移或升级过程。这些过程通常在紧张的维护窗口内执行，并使用与生产数据即使不完全相同也非常相似的数据进行多次演练。从这些测试数据中得出的对象统计信息很可能适用于生产系统。清单\
  \ 9-1 演示了此技术。\n\n清单 9-1. 使用 DBMS_STATS 导出和导入过程将统计信息从一个系统复制到另一个系统\n\n```\nCREATE\
