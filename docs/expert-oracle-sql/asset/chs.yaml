  \ FULL       | SYS_TEMP_0FD9D6|  Q2,02 | PCWP |            |\n|  24 |         PX\
  \ RECEIVE                |                |  Q2,02 | PCWP |            |\n|  25\
  \ |          PX SEND BROADCAST        | :TQ20001       |  Q2,01 | S->P | BROADCAST\
  \  |\n|  26 |           BUFFER SORT             |                |  Q2,01 | SCWP\
  \ |            |\n|  27 |            VIEW                   |                | \
  \ Q2,01 | SCWC |            |\n|  28 |             COUNT                 |     \
  \           |  Q2,01 | SCWP |            |\n|  29 |              PX RECEIVE    \
  \       |                |  Q2,01 | SCWP |            |\n|  30 |               PX\
  \ SEND 1 SLAVE     | :TQ20000       |  Q2,00 | P->S | 1 SLAVE    |\n|  31 |    \
