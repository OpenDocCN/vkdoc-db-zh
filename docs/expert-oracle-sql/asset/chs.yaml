  \ 的 `T1` 副本获得的 `ROWID` 来访问 `T2` 副本，并从中获取其余的列。\n\n\n需要采用此类方法的情况极为罕见，这几乎肯定是 CBO（基于成本的优化器）不会考虑它的原因，除非显式编码了自连接。以清单\
  \ 19-1 为例，我们只读取了三行（而非 CBO 假设的任意 1%选择性），但这三行的索引条目分散在索引中。`INDEX RANGE SCAN`（索引范围扫描）不可行，因此在这种特殊情况下，除了`INDEX\
  \ FAST FULL SCAN`（索引快速全扫描）外，我们别无良策。\n\n我们需要使用所有这些提示¹来获得我们想要的执行计划，原因有二：首先，对匹配`MOD`函数调用的行数的估计过高；其次，如我在第\
  \ 13 章中所解释的，连接消除是一种启发式优化器转换。请记住，即使启发式转换会导致估计成本更高的执行计划，它们也会被应用。\n\n由于`SALES_CUST_BIX`索引较小，您可能会发现，使用传统的`INDEX\
  \ FULL SCAN`（索引全扫描）而不进行自连接，其性能与清单 19-1 相当。但当索引很大且未缓存时，使用`INDEX FAST FULL SCAN`和自连接应该能显著提升性能。\n\
  \n`INDEX FAST FULL SCAN`并非唯一一种我们能够通过自连接来规避其限制的访问方法。现在，让我兑现我在第 13 章中做出的承诺，向您展示在极端情况下，Oracle\
  \ 数据库标准版用户如何模拟星型转换。\n\n## 模拟星型转换\n\nOracle 数据库标准版用户无法使用位图索引或分区表。清单 19-2 首先将`SH.SALES`表复制到当前模式中的一个未分区表，然后重写了清单\
  \ 13-35 中的查询。\n\n**清单 19-2.** 面向标准版用户的星型转换\n\n```\nCREATE TABLE t1\nAS\n     SELECT\
  \ *\n       FROM sh.sales s\n   ORDER BY time_id, cust_id, prod_id;\n\nCREATE INDEX\
  \ t1_cust_ix\n   ON t1 (cust_id)\n   COMPRESS 1;\n\nCREATE INDEX t1_prod_ix\n  \
  \ ON t1 (prod_id)\n   COMPRESS 1;\n\nWITH q1\n     AS (SELECT /*+ no_merge */\n\
  \               c.cust_first_name, s.ROWID rid\n           FROM sh.customers c JOIN\
  \ t1 s USING (cust_id)\n          WHERE c.cust_last_name = 'Everett')\n    ,q2\n\
  \     AS (SELECT /*+ no_merge */\n               p.prod_name, s.ROWID rid\n    \
  \       FROM sh.products p JOIN t1 s USING (prod_id)\n          WHERE p.prod_category\
  \ = 'Electronics')\nSELECT /*+ no_eliminate_join(s) leading(q1 q2 s) use_nl(s) */\n\
  \      q2.prod_name\n      ,q1.cust_first_name\n      ,s.time_id\n      ,s.amount_sold\n\
  \  FROM q1 NATURAL JOIN q2 JOIN t1 s ON rid = s.ROWID;\n```\n\n```\n| Id  | Operation\
  \                               | Name                 | Rows  | Cost (%CPU)|\n\n\
  |   0 | SELECT STATEMENT                        |                      |  1591 |\
  \  2420   (1)|\n|   1 |  NESTED LOOPS                           |              \
  \        |  1591 |  2420   (1)|\n|   2 |   HASH JOIN                           \
  \  |                      |  1591 |   829   (1)|\n|   3 |    VIEW              \
  \                   |                      |  7956 |   545   (1)|\n|   4 |     NESTED\
  \ LOOPS                        |                      |  7956 |   545   (1)|\n|\
  \   5 |      TABLE ACCESS FULL                  | CUSTOMERS            |    61 |\
  \   423   (1)|\n|   6 |      INDEX RANGE SCAN                   | T1_CUST_IX   \
  \        |   130 |     2   (0)|\n|   7 |    VIEW                               \
  \  |                      |   183K|   284   (1)|\n|   8 |     NESTED LOOPS     \
  \                   |                      |   183K|   284   (1)|\n|   9 |     \
  \ TABLE ACCESS BY INDEX ROWID BATCHED| PRODUCTS             |    14 |     3   (0)|\n\
  |  10 |       INDEX RANGE SCAN                  | PRODUCTS_PROD_CAT_IX |    14 |\
  \     1   (0)|\n|  11 |      INDEX RANGE SCAN                   | T1_PROD_IX   \
  \        | 12762 |    20   (0)|\n|  12 |   TABLE ACCESS BY USER ROWID          \
  \  | T1                   |     1 |     1   (0)|\n```\n\n清单 19-2 中的查询使用了两个具名子查询`Q1`和`Q2`。`Q1`将维度表`SH.CUSTOMERS`连接到事实表`T1`，以识别`T1`中匹配指定客户的`ROWID`。只需要用到`T1.CUST_ID`上的索引；无需访问`T1`本身。具名子查询`Q2`对维度表`SH.PRODUCTS`执行类似操作。主查询连接`Q1`和`Q2`，利用来自`T1`的`ROWID`来识别仅满足两组条件的`T1`行，然后再从`T1`中读取这些行。\n\
  \n和往常一样，我们必须在代码中加入大量提示来强制执行这个计划，而该计划在这个样本数据上效率相当低。需要注意的主要点是，该计划没有使用企业版特性，如分区或位图转换。\n\
  \n我必须承认，我已有多年没有与使用标准版的客户合作了，所以我从未在实际生产环境中使用过这种技术这一事实并不能说明什么。然而，从理论角度来看，我怀疑这种查询的合法用途极为罕见。为了解释原因，我将在下一节提供一个此类技术的更简单示例。\n\
  \n## 模拟索引连接\n\n正如我在第 10 章中提到的，索引连接访问方法仅在查询引用的所有列都位于要连接的索引中时才有效。但正如我们在清单 19-2 中看到的，我们可以编写自己的基于`ROWID`的哈希连接。考虑到企业版用户可用的`INDEX_COMBINE`提示，清单\
  \ 19-3 中使用的技术可能最吸引标准版用户。\n\n**清单 19-3.** 模拟索引连接\n\n```\nWITH q1\n     AS (SELECT\
  \ /*+ no_merge */\n                ROWID rid\n           FROM t1\n          WHERE\
  \ cust_id = 462)\n    ,q2\n     AS (SELECT /*+ no_merge */\n                ROWID\
  \ rid\n           FROM t1\n          WHERE prod_id = 19)\nSELECT /*+ leading(q1\
  \ q2) use_nl(t1) */\n       t1.*\n  FROM q1, q2, t1\n WHERE q1.rid = q2.rid AND\
  \ q2.rid = t1.ROWID;\n```\n\n```\n| Id  | Operation                   | Name   \
  \    | Rows  | Cost (%CPU)|\n```\n\n\n```\n| 0 | SELECT 语句                |    \
  \        | 130 | 155 (0)|\n| 1 | 嵌套循环                  |            | 130 | 155\
  \ (0)|\n| 2 | 哈希连接                  |            | 130 | 25 (0)|\n| 3 | 视图     \
  \                 |            | 130 | 3 (0)|\n| 4 | 索引范围扫描              | T1_CUST_IX\
  \ | 130 | 3 (0)|\n| 5 | 视图                      |            | 12762 | 22 (0)|\n\
  | 6 | 索引范围扫描              | T1_PROD_IX | 12762 | 22 (0)|\n| 7 | 通过用户 ROWID 访问表 \
  \      | T1         | 1 | 1 (0)|\n```\n\n代码清单 19-3 使用的技术本质上与代码清单 19-2 相同，只是我们消除了对维度表的任何引用。要使代码清单\
  \ 19-2 和代码清单 19-3 中显示的执行计划达到最优，必须满足以下所有条件：\n\n1.  `INDEX_COMBINE`提示的选项不可用。\n2. \
  \ 两个索引的选择性都不能很高，否则我们就不需要连接第二个索引了。\n3.  两个索引的组合选择性必须很强，否则我们会使用全表扫描。\n4.  访问更少表行所带来的成本节约，必须超过额外索引访问和哈希连接的开销。\n\
  \n理论上，有可能找到满足所有这些条件的情况。最难满足的是上面列表中的第四个也是最后一个条件，因为哈希连接的开销远大于与位图索引结合使用的`BITMAP AND`操作；选择性差的索引会产生一个巨大的哈希表，而且哈希连接甚至可能溢出到磁盘。\n\
  \n那么，为什么我要花时间讨论这些我可能从未使用过、你大概也不会用到的技术呢？有两个原因。首先，现存的大量旧代码使用了`AND_EQUAL`提示（这基本是同类的东西），你应该意识到这些提示很可能会适得其反。第二个原因是，还有另一种场景下，基于\
  \ ROWID 的自连接实际上可能很有用。现在让我们来看一下。\n\n### 连接多列索引\n\n截至版本 12.1.0.1，当引用的索引是具有共同前缀的多列索引时，`INDEX_JOIN`和`INDEX_COMBINE`提示都不起作用。代码清单\
  \ 19-4 用两个都以`TIME_ID`列为前缀的多列索引，替换了我们在代码清单 19-2 中创建在`T1`上的两个索引。\n\n**代码清单 19-4. 尝试组合多列索引**\n\
  \n```\nDROP INDEX t1_cust_ix;\nDROP INDEX t1_prod_ix;\n\nCREATE INDEX t1_cust_ix2\n\
  \   ON t1 (time_id, cust_id);\n\nCREATE INDEX t1_prod_ix2\n   ON t1 (time_id, prod_id);\n\
  \nSELECT /*+ index_join(t1) index_combine(t1) */\n       COUNT (*)\n  FROM t1\n\
  \ WHERE time_id = DATE '2001-12-28' AND cust_id = 1673 AND prod_id = 44;\n\n| Id\
  \  | Operation                            | Name        | Rows  | Cost (%CPU)|\n\
  \n|   0 | SELECT 语句                          |             |     1 |     4   (0)|\n\
  |   1 |  排序聚合                            |             |     1 |            |\n\
  |   2 |   通过索引 ROWID 批量访问表            | T1          |     1 |     4   (0)|\n|  \
  \ 3 |    索引范围扫描                      | T1_CUST_IX2 |     6 |     3   (0)|\n```\n\
  \n从代码清单 19-4 可以看到，尽管存在`INDEX_JOIN`和`INDEX_COMBINE`提示，我们最终还是访问了`T1`表本身。这两个提示都被认为是无效的。当我最近遇到这种情况时，我很庆幸自己理解如何手动组合索引。代码清单\
  \ 19-5 展示了一种合法的实现自连接以模拟索引连接的方法。\n\n**代码清单 19-5. 模拟索引连接以避免表访问**\n\n```\nWITH q1\n\
  \     AS (SELECT /*+ no_merge */\n                ROWID rid\n           FROM t1\n\
  \          WHERE time_id = DATE '2001-12-28' AND cust_id = 1673)\n    ,q2\n    \
  \ AS (SELECT /*+ no_merge */\n                ROWID rid\n           FROM t1\n  \
  \        WHERE time_id = DATE '2001-12-28' AND prod_id = 44)\nSELECT /*+ leading(q1\
  \ q2) use_nl(t1) */\n       COUNT (*)\n  FROM q1 NATURAL JOIN q2;\n\n| Id  | Operation\
  \           | Name        | Rows  | Cost (%CPU)|\n\n|   0 | SELECT 语句         |\
  \             |     1 |     6   (0)|\n|   1 |  排序聚合           |             |  \
  \   1 |            |\n|   2 |   哈希连接          |             |     6 |     6   (0)|\n\
  |   3 |    视图             |             |     6 |     3   (0)|\n|   4 |     索引范围扫描\
  \    | T1_CUST_IX2 |     6 |     3   (0)|\n|   5 |    视图             |         \
  \    |    25 |     3   (0)|\n|   6 |     索引范围扫描    | T1_PROD_IX2 |    25 |     3\
  \   (0)|\n```\n\n由于`T1_CUST_IX2`索引的强选择性和强聚簇因子，代码清单 19-4 和代码清单 19-5 中的查询在性能上没有太大区别，但在实际应用中，收益可能相当可观，特别是当索引被缓存而表本身没有被缓存时。\n\
  \n关于`ROWID`伪列，我还有最后一个用例，那就是支持应用程序编码的并行执行。现在让我们来看看这个案例。\n\n### 使用 ROWID 范围进行应用程序编码的并行执行\n\
  \n理解问题是本书的核心主题之一，当面对如代码清单 19-4 中的查询时，值得尝试弄清楚为什么首先需要这个查询。应用程序可能想知道满足特定条件的行数的一个可能原因，是为了确定执行某种并行处理所需的应用程序线程数量。\n\
  \n这种由应用程序驱动的并行处理非常普遍，也是`DBMS_PARALLEL_EXECUTE`包存在的理由。该包允许你识别`ROWID`的范围，称为块。其思路是每个块将由不同的应用程序线程处理。上述包的潜在问题是它考虑了表中的所有行，并且每个块处理的行数可能会差异巨大。\n\
  \n当我在代码清单 19-2 中创建表`T1`时，我按`TIME_ID`、`CUST_ID`和`PROD_ID`对行进行了排序，这反映了现实中很可能出现的数据聚簇。现在假设代码清单\
  \ 19-5 中的查询返回了 3,000,000 行，而不是实际返回的 3 行，并且我们希望将这些行分成三批，每批 1,000,000 行，用于某种进一步处理。代码清单\
  \ 19-6 应该能让你大致了解如何做到这一点。\n\n**代码清单 19-6. 针对聚簇数据的应用程序驱动并行执行**\n\n```\nDECLARE\n \
  \  CURSOR c1\n   IS\n      WITH q1\n           AS (SELECT /*+ no_merge */\n    \
  \                  ROWID rid\n                 FROM t1\n                WHERE time_id\
  \ = DATE '2001-12-28' AND cust_id > 1)\n          ,q2\n           AS (SELECT /*+\
  \ no_merge */\n                      ROWID rid\n                 FROM t1\n     \
  \           WHERE time_id = DATE '2001-12-28' AND prod_id > 1)\n          ,q3\n\
  \           AS (SELECT /*+ leading(q1 q2) use_nl(t1) */\n                     rid,\
  \ ROW_NUMBER () OVER (ORDER BY rid) rn\n                 FROM q1 NATURAL JOIN q2)\n\
  \        SELECT TRUNC ( (rn - 1) / 100) + 1 chunk\n              ,MIN (rid) min_rowid\n\
  \              ,MAX (rid) max_rowid\n              ,COUNT (*) chunk_size\n     \
  \     FROM q3\n      GROUP BY TRUNC ( (rn - 1) / 100);\n```\n\n\n\n游标 `c2` (\n \
  \     `min_rowid`    `ROWID`\n     ,`max_rowid`    `ROWID`)\n   IS\n      SELECT\
  \ /*+ rowid(t1) */\n             *\n        FROM `t1`\n       WHERE     `ROWID`\
  \ BETWEEN `min_rowid` AND `max_rowid`\n             AND `time_id` = DATE '2001-12-28'\n\
  \             AND `prod_id` > 1\n             AND `cust_id` > 1;\nBEGIN\n   FOR\
  \ `r1` IN `c1`\n   LOOP\n      FOR `r2` IN `c2` (`r1`.`min_rowid`, `r1`.`max_rowid`)\n\
  \      LOOP\n         `NULL`;\n      END LOOP;\n   END LOOP;\nEND;\n/\n\n-- 游标 `C1`\
  \ 的执行计划如下\n\n| `Id`  | `Operation`             | `Name`        | `Rows`  | `Cost`\
  \ (`%CPU`)|\n| --- | --- | --- | --- | --- |\n|   0 | `SELECT STATEMENT`      |\
  \             |   628 |     9   (0)|\n|   1 |  `HASH GROUP BY`        |        \
  \     |   628 |     9   (0)|\n|   2 |   `VIEW`                |             |  \
  \ 628 |     9   (0)|\n|   3 |    `WINDOW SORT`        |             |   628 |  \
  \   9   (0)|\n|   4 |     `HASH JOIN`         |             |   628 |     9   (0)|\n\
  |   5 |      `VIEW`             |             |   629 |     5   (0)|\n|   6 |  \
  \     `INDEX RANGE SCAN`| `T1_CUST_IX2` |   629 |     5   (0)|\n|   7 |      `VIEW`\
  \             |             |   629 |     4   (0)|\n|   8 |       `INDEX RANGE SCAN`|\
  \ `T1_PROD_IX2` |   629 |     4   (0)|\n\n谓词信息（由操作 ID 标识）：\n\n4 - access(`\"Q1\"\
  .\"RID\"`=`\"Q2\".\"RID\"`)\n   6 - access(`\"TIME_ID\"`=`TO_DATE`(' 2001-12-28\
  \ 00:00:00', 'syyyy-mm-dd hh24:mi:ss') AND `\"CUST_ID\"`>1)\n   8 - access(`\"TIME_ID\"\
  `=`TO_DATE`(' 2001-12-28 00:00:00', 'syyyy-mm-dd hh24:mi:ss') AND `\"PROD_ID\"`>1)\n\
  \n-- 游标 `C2` 的执行计划如下\n\n| `Id`  | `Operation`                    | `Name` | `Rows`\
  \  | `Cost` (`%CPU`)|\n| --- | --- | --- | --- | --- |\n|   0 | `SELECT STATEMENT`\
  \             |      |     2 |  1206   (1)|\n|   1 |  `FILTER`                 \
  \     |      |       |            |\n|   2 |   `TABLE ACCESS BY ROWID RANGE`| `T1`\
  \   |     2 |  1206   (1)|\n\n谓词信息（由操作 ID 标识）：\n\n1 - filter(`CHARTOROWID`(:B2)>=`CHARTOROWID`(:B1))\n\
  \   2 - access(`ROWID`>=`CHARTOROWID`(:B1) AND `ROWID`<=`CHARTOROWID`(:B2))\n  \
  \     filter(`\"TIME_ID\"`=`TO_DATE`(' 2001-12-28 00:00:00', 'syyyy-mm-dd hh24:mi:ss')\
  \ AND `\"PROD_ID\"`>1 AND `\"CUST_ID\"`>1)\n\n`清单 19-6` 展示了一个包含两个游标的 PL/SQL 块。游标\
  \ `C1` 中的查询标识了 `T1` 表中符合我们选择谓词的行（我略微修改了谓词，使得返回 1,196 行而不是 3 行），然后将它们分组为最多 100 行一批的块。查询结果中的\
  \ 12 个块中有 11 个与 `T1` 中的 100 行相关，最后一个块与 96 行相关。每个块的最小和最大 ROWID 被标识出来。\nPL/SQL 块依次执行游标\
  \ `C2` 共 12 次，对应于游标 `C1` 标识出的 12 个块各一次。在现实生活中，这些执行将由独立的应用线程并行完成。这样只扫描表中包含我们聚集数据的那一小部分，对于更大数量的行，线程之间不会在\
  \ `T1` 的块上竞争，并且可以使用多块读取来高效地读取聚集的行。\n请注意，游标 `C2` 必须包含原始的谓词。并非 ROWID 范围内的所有行都保证来自我们的结果集。\n\
  关于 ROWID 伪列我想说的就这么多。现在我想换个话题，谈谈另一个听起来太过离奇而不像真实的 SQL 调优经历。\n\n## 将内部连接转换为外部连接\n\n\
  你可能认为本节标题有个印刷错误。其实没有！这是一个真实经历的故事，涉及约翰——我在前一章介绍过的、从事风险管理的客户。\n约翰（你可能猜到了，这是一个复合角色）又带着一个性能不佳的查询来找我。这个查询涉及一个在数据字典中定义的视图。`清单\
  \ 19-7` 展示了其基本思路。\n\n`清单 19-7`. 涉及数据字典视图的次优执行计划\n\n```\nCREATE OR REPLACE VIEW `sales_simple`\n\
  AS\n   SELECT `cust_id`\n         ,`time_id`\n         ,`promo_id`\n         ,`amount_sold`\n\
  \         ,`p`.`prod_id`\n         ,`prod_name`\n     FROM `sh`.`sales` `s`, `sh`.`products`\
  \ `p`\n    WHERE `s`.`prod_id` = `p`.`prod_id`;\n\nSELECT *\n  FROM `sales_simple`\
  \ `v` JOIN `sh`.`customers` `c` ON `c`.`cust_id` = `v`.`cust_id`\n WHERE     `v`.`time_id`\
  \ = DATE '1998-03-31'\n       AND `c`.`cust_first_name` = 'Madison'\n       AND\
  \ `cust_last_name` = 'Roy'\n       AND `cust_gender` = 'M';\n```\n\n| `Id`  | `Operation`\
  \                                     | `Name`           | `Rows`  | `Cost` (`%CPU`)|\n\
  | --- | --- | --- | --- | --- |\n|   0 | `SELECT STATEMENT`                    \
  \          |                |     1 |   448   (1)|\n|   1 |  `NESTED LOOPS`    \
  \                             |                |       |            |\n|   2 | \
  \  `NESTED LOOPS`                                |                |     1 |   448\
  \   (1)|\n|   3 |    `HASH JOIN`                                  |            \
  \    |     1 |   447   (1)|\n|   4 |     `TABLE ACCESS FULL`                   \
  \      | `CUSTOMERS`      |     1 |   423   (1)|\n|   5 |     `PARTITION RANGE SINGLE`\
  \                    |                |  1188 |    24   (0)|\n|   6 |      `TABLE\
  \ ACCESS BY LOCAL INDEX ROWID BATCHED`| `SALES`          |  1188 |    24   (0)|\n\
  |   7 |       `BITMAP CONVERSION TO ROWIDS`             |                |     \
  \  |            |\n|   8 |        `BITMAP INDEX SINGLE VALUE`              | `SALES_TIME_BIX`\
  \ |       |            |\n|   9 |    `INDEX UNIQUE SCAN`                       \
  \   | `PRODUCTS_PK`    |     1 |     0   (0)|\n|  10 |   `TABLE ACCESS BY INDEX\
  \ ROWID`                 | `PRODUCTS`       |     1 |     1   (0)|\n\n`清单 19-7`\
