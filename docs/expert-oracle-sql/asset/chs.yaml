  \n## 自适应计划\n\n自适应执行计划是 `12cR1` 的新功能，可能是该版本新自适应特性中最著名的。除了一条注释外，只有当 `ADAPTIVE` 被显式添加到\
  \ `DBMS_XPLAN` 调用的格式参数中时，才会显示有关执行计划调整的信息。与文档描述相反，`ADAPTIVE` 是一种细粒度控制，而非格式级别。\n\n\
  自适应计划的思想如下：你有两个可能的计划。你从其中一个开始，如果那个计划效果不佳，你就在中途切换到另一个。虽然我们将在本章后面讨论并行查询时提到的 `混合并行查询分发`\
  \ 与此非常相似，但截至 `12.1.0.1`，唯一真正自适应的机制是表连接。\n\n自适应连接的工作方式如下：你从其中一个连接表中找到一些匹配的行，并查看得到多少行。如果得到的行数很少，你可以使用嵌套循环连接访问第二个被连接的表。如果看起来会得到很多行，那么在某个时刻，你会放弃嵌套循环连接，转而开始使用哈希连接。\n\
  \n我们将在第 11 章讨论嵌套循环连接和哈希连接的细节，但现在我们只需要专注于理解执行计划试图告诉我们的信息。\n\n并非所有连接都是自适应的。事实上，大多数都不是，因此在我的演示中，我不得不依赖\
  \ `SQL 调优指南` 中提供的例子。清单 8-13 展示了我对 `SQL 调优指南` 中自适应连接示例的改编。\n\n清单 8-13。自适应执行计划的使用\n\
