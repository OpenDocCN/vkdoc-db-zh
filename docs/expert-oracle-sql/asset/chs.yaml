  \ 的第 3 行和清单 8-22 的第 20 行，这种缓冲被整合到了`HASH JOIN BUFFERED`操作中，但在清单 8-22 的第 26 行，缓冲是一个独立且显式的操作。不用担心`sort`（排序）这个词。这是众多情况中的一种，即`BUFFER\
  \ SORT`操作实际上并不进行排序。\n\n## 并行查询分发机制\n\n清单 8-21 和清单 8-22 使用了`PX SEND HASH`、`PX SEND\
  \ RANGE`、`PX SEND BROADCAST`、`PX SEND QC (RANDOM)`和`PX SEND QC (ORDER)`等操作。生产者通过表队列发送数据的这些多种方式，反映了这些操作所关联的多种`数据分发`机制。现在是时候解释这些分发机制了。我们将从分区表的数据加载分发机制开始，然后介绍与连接和其他操作相关的分发机制。\n\
  \n## 分区表的数据加载分发机制\n\n虽然一些数据加载分发机制已经存在了很长时间，但它们直到 11gR2 才在控制它们的提示（hint）的上下文中被记录。在本节中，我将只讨论在向分区表的多个分区加载数据时可以使用的两种数据加载分发机制。更多信息你可以查阅`PQ_DISTRIBUTE`提示在\
  \ SQL 参考手册中的描述。\n\n想象一下，你正在向一个有八个分区的哈希分区表加载数据。自然的做法应该是为被加载表的每个分区分配一个并行查询服务器，不是吗？是的，确实如此！清单\
  \ 8-23 演示了这一点。\n\n清单 8-23. 将无偏斜的数据加载到哈希分区表中\n\n```\nCREATE TABLE t_part1\nPARTITION\
  \ BY HASH (c1)\n   PARTITIONS 8\nAS\n   SELECT c1, ROWNUM AS c3 FROM t1;\n\nCREATE\
  \ TABLE t_part2\nPARTITION BY HASH (c2)\n   PARTITIONS 8\nAS\n   SELECT c1 AS c2,\
  \ ROWNUM AS c4 FROM t1;\n\nALTER SESSION ENABLE PARALLEL DML;\n\nINSERT /*+ parallel(t_part1\
  \ 8) pq_distribute(t_part1 PARTITION)*/\n      INTO  t_part1\n   SELECT  c1,c1 FROM\
  \ t1;\n\n| Id  | Operation                          | Name     |    TQ  |IN-OUT|\
  \ PQ Distrib |\n\n|   0 | INSERT STATEMENT                   |          |      \
  \  |      |            |\n|   1 |  PX COORDINATOR                    |         \
  \ |        |      |            |\n|   2 |   PX SEND QC (RANDOM)              | :TQ10001\
  \ |  Q1,01 | P->S | QC (RAND)  |\n|   3 |    LOAD AS SELECT                  | T_PART1\
  \  |  Q1,01 | PCWP |            |\n|   4 |     OPTIMIZER STATISTICS GATHERING |\
  \          |  Q1,01 | PCWP |            |\n|   5 |      PX RECEIVE             \
  \       |          |  Q1,01 | PCWP |            |\n|   6 |       PX SEND PARTITION\
  \ (KEY)      | :TQ10000 |  Q1,00 | S->P | PART (KEY) |\n|   7 |        PX SELECTOR\
  \                 |          |  Q1,00 | SCWC |            |\n|   8 |         TABLE\
  \ ACCESS FULL          | T1       |  Q1,00 | SCWP |            |\n```\n\n创建了几个分区表并启用并行\
  \ DML 后，清单 8-23 将数据从一个非分区表复制到一个分区表，每个分区使用一个加载服务器。我们使用了提示来演示如何强制使用这种加载技术。在这个案例中，非分区表`T1`是串行读取的；然后每一行都被发送到负责将该行加载到其目标分区的并行查询从属服务器。\n\
  \n这看起来似乎很好，但是如果你读取的大部分数据只进入一两个分区呢？如果只有一个进程写入一个分区，那帮助就不大了。看看清单 8-24。\n\n清单 8-24.\
  \ 将有偏斜的数据加载到哈希分区表中\n\n```\nINSERT /*+ parallel(t_part1 8) pq_distribute(t_part1\
  \ RANDOM)  */\n      INTO  t_part1\n   SELECT /*+ parallel(t_part2 8) */ * FROM\
  \ t_part2;\n\n| Id  | Operation                          | Name     |    TQ  |IN-OUT|\
  \ PQ Distrib |\n\n|   0 | INSERT STATEMENT                   |          |      \
  \  |      |            |\n|   1 |  PX COORDINATOR                    |         \
  \ |        |      |            |\n|   2 |   PX SEND QC (RANDOM)              | :TQ10001\
  \ |  Q1,01 | P->S | QC (RAND)  |\n|   3 |    LOAD AS SELECT                  | T_PART1\
  \  |  Q1,01 | PCWP |            |\n|   4 |     OPTIMIZER STATISTICS GATHERING |\
  \          |  Q1,01 | PCWP |            |\n|   5 |      PX RECEIVE             \
  \       |          |  Q1,01 | PCWP |            |\n|   6 |       PX SEND ROUND-ROBIN\
  \          | :TQ10000 |  Q1,00 | S->P | RND-ROBIN  |\n|   7 |        PARTITION HASH\
  \ ALL          |          |        |      |            |\n|   8 |         TABLE\
  \ ACCESS FULL          | T_PART2  |        |      |            |\n```\n\n\n\n"
- "# 数据库并行查询机制与优化\n\n## 数据加载机制\n\n清单 8-24 中使用的数据加载机制在数据主要目标为一到两个分区时最为有效，因为每个服务器可以将数据加载到所有分区中。由于直接路径写入的工作方式，当行数据均匀分布在各分区之间时，这种机制会是低效的。\n\
  \n## 相关子查询分发机制\n\n在 12cR1 版本之前，对无法解嵌套的相关子查询的评估要么以串行方式完成，要么由一个完全独立的 DFO 树完成。12cR1\
  \ 版本引入了多种可以并行评估相关子查询的方法。它还引入了 `PQ_FILTER` 提示，让你能对该机制进行一定控制。清单 8-25 展示了四种选项中的两种。\n\
  \n清单 8-25. 相关子查询评估的并行执行\n\n```\nSELECT /*+                                    SELECT\
  \ /*+\nparallel(t1) full(t1)                         parallel(t1) full(t1)\npq_filter(NONE)\
  \                               pq_filter(HASH)\n*/                            \
  \                */\n       *                                              *\n \
  \ FROM t1                                        FROM t1\n WHERE EXISTS        \
  \                           WHERE EXISTS\n          (SELECT null               \
  \                    (SELECT null\n             FROM t2                        \
  \                 FROM t2\n            WHERE t1.c1 != t2.c2);                  \
  \        WHERE t1.c1 != t2.c2);\n------------------------------------------  ---------------------------------------------\n\
  | Id  | Operation             | Name     |  | Id  | Operation                | Name\
  \     |\n------------------------------------------  ---------------------------------------------\n\
  |   0 | SELECT STATEMENT      |          |  |   0 | SELECT STATEMENT         | \
  \         |\n|   1 |  PX COORDINATOR       |          |  |   1 |  PX COORDINATOR\
  \          |          |\n|   2 |   PX SEND QC (RANDOM) | :TQ10000 |  |   2 |   PX\
  \ SEND QC (RANDOM)    | :TQ10001 |\n|   3 |    FILTER             |          | \
  \ |   3 |    BUFFER SORT           |          |\n|   4 |     PX BLOCK ITERATOR |\
  \          |  |   4 |     FILTER               |          |\n|   5 |      TABLE\
  \ ACCESS FULL| T1       |  |   5 |      PX RECEIVE          |          |\n|   6\
  \ |     TABLE ACCESS FULL | T2       |  |   6 |       PX SEND HASH       | :TQ10000\
  \ |\n------------------------------------------  |   7 |        PX BLOCK ITERATOR\
  \ |          |\n                                            |   8 |         TABLE\
  \ ACCESS FULL| T1       |\n                                            |   9 | \
  \     TABLE ACCESS FULL   | T2       |\n                                       \
  \     ---------------------------------------------\n```\n\n清单 8-25 中的查询并行读取 `T1`，并使用一个无法解嵌套的相关子查询对结果进行过滤。\n\
  \n假设 `T1` 非常大，相关子查询的评估成本很低，且该过滤器能过滤掉 `T1` 中的大多数行。在这种情况下，左侧使用 `PQ_FILTER (NONE)`\
  \ 提示会是一个好主意，因为生成的执行计划使用读取 `T1` 的同一个并行查询服务器来评估子查询，并且只有一个 DFO；我们不需要通过 TQ 发送所有未过滤的数据。这在大多数情况下可能是最明智的方法。\n\
  \n另一方面，假设 `T1` 并没有那么大，但相关子查询执行的计算非常昂贵。在这种情况下，你可以安排由一个独立的 DFO 与 `T1` 的并行全表扫描并发地完成过滤。这是通过在清单\
  \ 8-25 的右侧使用 `PQ_FILTER (HASH)` 提示来实现的。\n\n清单 8-25 右侧的执行计划显示，当 PQSS1 从 `T1` 读取行时，它会基于\
  \ `T1.C1` 的哈希值将这些行发送给 PQSS2 的一个成员。请注意，第二个 DFO 的存在意味着数据在过滤后需要缓冲，然后再发送给 QC。并且，冒着听起来重复的风险，我想再次提醒你，操作\
  \ 3 尽管表面上看涉及排序，但实际上并不包含排序。\n\n`PQ_FILTER` 提示参数还有两个其他合法值。`PQ_FILTER (SERIAL)` 会导致所有相关子查询评估都由\
  \ QC 执行，就像 11gR2 及更早版本那样。如果关联列 `T1.C1` 的不同值数量很少，让 QC 执行过滤可能是个好主意，因为标量子查询缓存可能会防止子查询被重复评估。\n\
  \n如果你指定了 `PQ_FILTER (RANDOM)` 提示，行会以轮询方式从 `PQSS1` 发送到 `PQSS2`，而不是像 `PQ_FILTER (HASH)`\
  \ 分发机制那样基于 `TQ1.C1` 的哈希函数。根据文档，当数据存在偏斜时应使用这种分发机制，但这对我来说没有意义。假设 `T1` 中所有行的 `T1.C1`\
  \ 值完全相同。清单 8-25 右侧执行计划第 6 行显示的 `PX SEND HASH` 操作会将所有行发送到 PQSS2 的同一个成员，但标量子查询缓存会阻止使用\
  \ `PQ_FILTER (RANDOM)` 时会出现的子查询多次评估。\n\n如今，无法解嵌套的子查询已经很少见，而需要并行评估它们的场合则更为罕见。我必须承认，我对这个\
  \ 12cR1 特性没有实际经验；以上分析纯属理论，可能存在缺陷。至少现在你和我一样了解它了！\n\n## 其他并行分发机制\n\n`PQ_DISTRIBUTE`\
  \ 提示不仅用于控制不同的数据加载方法。事实上，迄今为止，这个提示最常见的用途是控制并行连接表的不同方法。在介绍完串行连接表的不同方法后，我将在第 11 章中介绍这些分发机制。\n\
  \n生产者 PQSS 通过 TQ 分发数据还有另外一两种方式，但这些方式适用于特定场景，并且没有分发机制可供选择；`PQ_DISTRIBUTE` 提示既不合法也不需要。\n\
  \n例如，你将在清单 8-22 的第 7 行看到 `PX SEND RANGE` 操作。这是因为 TQ 的使用者并行执行排序。第 17 章专门讨论排序；我们将在那里研究排序的并行化。同一份清单在第\
  \ 3 行显示了一个 `PX SEND QC (RANDOM)` 操作，在第 16 行显示了一个 `PX SEND QC (ORDER)` 操作。这两种分发机制都涉及将数据发送给\
  \ QC，但在前一种情况下，PQSS 成员向 QC 发送数据的顺序无关紧要——PQSS 成员只需通知 QC 它们已完成数据加载，而 QC 只想知道所有操作何时完成。在后一种情况下，PQSS\
  \ 成员向 QC 发送行的顺序很重要，因为最终结果集需要按 `CNT_C2` 排序。\n\n## 为何强制并行查询可能不生效\n\n`PARALLEL` 和 `PARALLEL_INDEX`\
  \ 提示用于*授权* CBO 使用并行执行来并行执行操作，并可选择指定要使用的 DOP（并行度）。但是，如果 CBO 有权选择一个无法并行执行的操作，例如索引范围扫描，那么它可能会选择该访问方法并串行运行它，而不是使用另一个更昂贵的并行操作。\n\
  \n\n\n"
- "# 语句 `ALTER SESSION FORCE PARALLEL QUERY`\n\n语句 `ALTER SESSION FORCE PARALLEL QUERY`\
  \ 实质上是为会话中的每条 SQL 语句添加了 `PARALLEL` 和 `PARALLEL_INDEX` 语句级提示；清单 8-26 演示了该语句并不能保证并行执行。\n\
  \n## 清单 8-26. 理解 FORCE PARALLEL QUERY\n\n```\nALTER SESSION FORCE PARALLEL QUERY\
  \ PARALLEL 2;\n\nSELECT *\n  FROM sh.customers c\n WHERE cust_id < 100;\n\n| Id\
  \  | Operation                           | Name         | Cost (%CPU)|\n\n|   0\
  \ | SELECT STATEMENT                    |              |    54   (0)|\n|   1 | \
  \ TABLE ACCESS BY INDEX ROWID BATCHED| CUSTOMERS    |    54   (0)|\n|*  2 |   INDEX\
  \ RANGE SCAN                  | CUSTOMERS_PK |     2   (0)|\n\nPredicate Information\
  \ (identified by operation id):\n\n2 - access(\"CUST_ID\"<100)\n\nSELECT /*+ full(c)*/\n\
  \       *\n  FROM sh.customers c\n WHERE cust_id < 100;\n\n| Id  | Operation   \
  \         | Name      | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT     |         \
  \  |   235   (1)|\n|   1 |  PX COORDINATOR      |           |            |\n|  \
  \ 2 |   PX SEND QC (RANDOM)| :TQ10000  |   235   (1)|\n|   3 |    PX BLOCK ITERATOR\
  \ |           |   235   (1)|\n|*  4 |     TABLE ACCESS FULL| CUSTOMERS |   235 \
  \  (1)|\n\nPredicate Information (identified by operation id):\n\n4 - filter(\"\
  CUST_ID\"<100)\n\nALTER SESSION FORCE PARALLEL QUERY PARALLEL 20;\n\nSELECT *\n\
  \  FROM sh.customers c\n WHERE cust_id < 100;\n\n| Id  | Operation            |\
  \ Name      | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT     |           |    23 \
  \  (0)|\n|   1 |  PX COORDINATOR      |           |            |\n|   2 |   PX SEND\
  \ QC (RANDOM)| :TQ10000  |    23   (0)|\n|   3 |    PX BLOCK ITERATOR |        \
  \   |    23   (0)|\n|*  4 |     TABLE ACCESS FULL| CUSTOMERS |    23   (0)|\n\n\
  Predicate Information (identified by operation id):\n\n4 - filter(\"CUST_ID\"<100)\n\
  \nALTER SESSION ENABLE PARALLEL QUERY;\n```\n\n清单 8-26 首先“强制”设置并行度（DOP）为 2，然后查询\
  \ `SH.CUSTOMERS` 表。得到的执行计划使用了一个串行运行的索引范围扫描，成本为 54。当我使用提示强制进行全表扫描时，可以看到 CBO 选择并行运行，但成本\
  \ 235 远高于替代的串行索引范围扫描。然而，清单 8-26 中的最终查询以 DOP 20 运行。现在，并行全表扫描的成本是 23，因为每个并行查询从属进程现在需要读取的数据块更少了；CBO\
  \ 计算得出，并行查询操作现在将比等效的索引范围扫描更快完成。\n\n在第 10 章中，我们将更详细地研究索引范围扫描，并将清楚地阐明为什么不能使用数据块范围粒度来并行运行索引范围扫描。\n\
  \n## 延伸阅读\n\n关于并行执行这个主题，比我本章涵盖的内容要多得多。有几个初始化参数控制着诸如实例可以支持的最小和最大并行执行从属进程数之类的事情。还有一些功能，如`语句排队`和`DOP\
  \ 降级`，它们决定了当所需的并行查询服务器不可用时会发生什么。您还可以使用`资源管理器`来为并行执行设置优先级。有关所有这些功能的详细信息以及可用于监视并行执行的视图信息，我再次建议您查阅《VLDB\
  \ 和分区指南》。\n\n关于并行执行的讨论到此结束。现在是时候进入本章第三个也是最后一个主要主题：全局提示。\n\n## 理解全局提示\n\nSQL 语句中绝大多数嵌入的提示都是*局部*提示，这意味着它们应用于其所在的查询块。在概要中，所有查询块的所有提示都集中放置在一个地方，因此必须找到某种方法来指示每个提示所适用的查询块。这是通过在提示的第一个参数的开头使用‘@’符号来实现的，将其标记为*全局*提示。看一下清单\
  \ 8-7 中的第 4、8 和 12 行。这些都是 `LEADING` 提示，但第 4 行应用于查询块 `SEL$F1D6E378`（正如我之前解释的，这是由查询块\
  \ `SEL$1` 合并到 `SEL$3` 中形成的查询块），而第 8 行和第 12 行的提示则分别应用于查询块 `SEL$2` 和 `SEL$4`。\n\n\
  全局提示在《SQL 语言参考手册》中有文档说明，在嵌入 SQL 语句时得到完全支持，并且通常非常宝贵。至少有三种情况值得使用全局提示，如下所示：\n\n*  \
  \ 您想提示源自数据字典视图的块。在这种情况下使用局部提示需要修改视图的定义，并会影响该视图的其他用户。\n*   您想提示作为查询转换结果的查询块。在这些情况下，局部提示可能会让读者感到困惑。\n\
  *   当提示数量过多以至于损害了原始语句的可读性时，全局提示允许将它们全部集中放置在一个地方。\n\n我将提供前两种场景的简单示例，但要为复杂的提示提供一个简单示例，这本身是有些矛盾的。在演示了这些场景之后，我将重点介绍\
  \ `NO_MERGE` 提示，因为这个非常常见提示的多个变体有些令人望而生畏。如果您能掌握 `NO_MERGE` 提示，您就可以认为自己是全局提示的大师了！\n\
  \n### 提示数据字典视图\n\n清单 8-27 创建了一个数据字典视图并在查询中使用该视图。为了简单起见，我还删除了 `T1` 上的索引并禁用了并行查询。\n\
  \n清单 8-27. 使用数据字典视图的简单查询\n\n```\nALTER SESSION DISABLE PARALLEL QUERY;\n\nDROP INDEX\
  \ t1_i1\n\nCREATE OR REPLACE VIEW v1\nAS\n     SELECT c1, MEDIAN (c2) med_c2\n \
  \      FROM t1, t2\n      WHERE t1.c1 = t2.c2\n   GROUP BY t1.c1;\n\nSELECT *\n\
  \  FROM v1, t3\n WHERE v1.c1 = t3.c3;\n\nPlan hash value: 808098385\n\n| Id  | Operation\
  \             | Name |\n\n|   0 | SELECT STATEMENT      |      |\n|   1 |  HASH\
  \ JOIN            |      |\n|   2 |   VIEW                | V1   |\n|   3 |    HASH\
  \ GROUP BY      |      |\n|   4 |     HASH JOIN         |      |\n|   5 |      TABLE\
  \ ACCESS FULL| T1   |\n|   6 |      TABLE ACCESS FULL| T2   |\n|   7 |   TABLE ACCESS\
  \ FULL   | T3   |\n\nQuery Block Name / Object Alias (identified by operation id):\n\
  \n1 - SEL$1\n   2 - SEL$2 / V1@SEL$1\n   3 - SEL$2\n   5 - SEL$2 / T1@SEL$2\n  \
  \ 6 - SEL$2 / T2@SEL$2\n   7 - SEL$1 / T3@SEL$1\n\nOutline Data\n\n/*+\n      BEGIN_OUTLINE_DATA\n\
  \      USE_HASH_AGGREGATION(@\"SEL$2\")\n      USE_HASH(@\"SEL$2\" \"T2\"@\"SEL$2\"\
  )\n      LEADING(@\"SEL$2\" \"T1\"@\"SEL$2\" \"T2\"@\"SEL$2\")\n      FULL(@\"SEL$2\"\
  \ \"T2\"@\"SEL$2\")\n      FULL(@\"SEL$2\" \"T1\"@\"SEL$2\")\n      USE_HASH(@\"\
  SEL$1\" \"T3\"@\"SEL$1\")\n      LEADING(@\"SEL$1\" \"V1\"@\"SEL$1\" \"T3\"@\"SEL$1\"\
  )\n      FULL(@\"SEL$1\" \"T3\"@\"SEL$1\")\n      NO_ACCESS(@\"SEL$1\" \"V1\"@\"\
  SEL$1\")\n      OUTLINE_LEAF(@\"SEL$1\")\n      OUTLINE_LEAF(@\"SEL$2\")\n     \
  \ ALL_ROWS\n      DB_VERSION('12.1.0.1')\n      OPTIMIZER_FEATURES_ENABLE('12.1.0.1')\n\
  \      IGNORE_OPTIM_EMBEDDED_HINTS\n      END_OUTLINE_DATA\n  */\n```\n\n现在，假设您希望将\
  \ `T1` 和 `T2` 的 `HASH JOIN` 更改为由 `T1` 驱动的嵌套循环连接。当然，从性能角度来看这没有意义，但我此时只是试图用一个简单的例子来解释原理。清单\
  \ 8-28 展示了如何在不编辑视图定义的情况下做到这一点。\n\n\n\n```markdown\n清单 8-28. 将提示应用于数据字典视图中嵌入的查询块\n\
  \n```sql\nSELECT\n/*+\n    LEADING(@\"SEL$2\" \"T1\"@\"SEL$2\" \"T2\"@\"SEL$2\"\
  )\n    USE_NL(@\"SEL$2\" \"T2\"@\"SEL$2\")\n*/\n*\n  FROM v1, t3\n WHERE v1.c1 =\
  \ t3.c3;\n\nPlan hash value: 1369664419\n\n| Id  | Operation             | Name\
  \ |\n\n|   0 | SELECT STATEMENT      |      |\n|   1 |  HASH JOIN            | \
  \     |\n|   2 |   VIEW                | V1   |\n|   3 |    HASH GROUP BY      |\
  \      |\n|   4 |     NESTED LOOPS      |      |\n|   5 |      TABLE ACCESS FULL|\
  \ T1   |\n|   6 |      TABLE ACCESS FULL| T2   |\n|   7 |   TABLE ACCESS FULL  \
  \ | T3   |\n\nQuery Block Name / Object Alias (identified by operation id):\n\n\
  1 - SEL$1\n   2 - SEL$2 / V1@SEL$1\n   3 - SEL$2\n   5 - SEL$2 / T1@SEL$2\n   6\
  \ - SEL$2 / T2@SEL$2\n   7 - SEL$1 / T3@SEL$1\n\nOutline Data\n\n/*+\n      BEGIN_OUTLINE_DATA\n\
  \      USE_HASH_AGGREGATION(@\"SEL$2\")\n      USE_NL(@\"SEL$2\" \"T2\"@\"SEL$2\"\
  )\n      LEADING(@\"SEL$2\" \"T1\"@\"SEL$2\" \"T2\"@\"SEL$2\")\n      FULL(@\"SEL$2\"\
  \ \"T2\"@\"SEL$2\")\n      FULL(@\"SEL$2\" \"T1\"@\"SEL$2\")\n      USE_HASH(@\"\
  SEL$1\" \"T3\"@\"SEL$1\")\n      LEADING(@\"SEL$1\" \"V1\"@\"SEL$1\" \"T3\"@\"SEL$1\"\
  )\n      FULL(@\"SEL$1\" \"T3\"@\"SEL$1\")\n      NO_ACCESS(@\"SEL$1\" \"V1\"@\"\
  SEL$1\")\n      OUTLINE_LEAF(@\"SEL$1\")\n      OUTLINE_LEAF(@\"SEL$2\")\n     \
  \ ALL_ROWS\n      DB_VERSION('12.1.0.1')\n      OPTIMIZER_FEATURES_ENABLE('12.1.0.1')\n\
  \      IGNORE_OPTIM_EMBEDDED_HINTS\n      END_OUTLINE_DATA\n  */\n```\n\n我在这里所做的是查看清单\
  \ 8-27 中原始语句执行计划的`ALIAS`和`OUTLINE`部分的高亮行，以确定要使用的正确查询块名称和对象别名。由于操作 4 没有列出查询块，我可以通过查看操作\
  \ 3 的查询块来确定正确的查询块。然后，我利用这些信息构建了合适的全局提示，并将其嵌入到我的 SQL 语句中。清单 8-28 中语句的执行计划表明，这些提示达到了预期的效果。\n\
  \n![image](img/sq.jpg) **注意** 重要的是要认识到，与本地提示不同，全局提示出现的位置无关紧要；它们可以放置在 SQL 语句中任何合法的位置，效果都是相同的。\n\
  \n将提示应用于转换后的查询\n\n一般来说，本地提示比全局提示更可取，因为它们更容易被读者理解，但情况并非总是如此。在本书的第 13 章中，我将讨论`星型转换`和`子查询非嵌套转换`。这些转换以及其他一些转换，可能导致生成的执行计划与原始\
  \ SQL 语句看起来几乎没有相似之处，使得本地提示显得毫无意义。即使在没有或很少有转换的情况下，当大量本地提示分散在一个复杂的语句中时，也会成为原始代码可读性的障碍。在这些希望罕见的情况下，在我看来，将一组全局提示集中放置可以使理解语句及其相关提示变得更容易。提供一个混淆的简单例子有点挑战，但清单\
  \ 8-29 可能有助于说明我的观点。\n\n清单 8-29. 应用于非嵌套子查询的本地提示\n\n```sql\nSELECT *\n  FROM t1\n\
  \ WHERE NOT EXISTS\n          (SELECT /*+ unnest use_nl(t2)*/\n\nFROM t2\n     \
  \       WHERE t2.c2 = t1.c1);\n```\n\n我故意隐瞒了清单 8-29 的执行计划，以模拟程序员阅读源代码时的体验。`USE_NL`提示控制连接机制，但因为它出现在只包含一个行源的块中，所以看起来毫无意义。然而，这个提示是有效的，因为它应用于一个包含多个行源的转换后的块。由于这些提示只有在查看转换后的执行计划时才有意义，因此最好将所有这些提示集中放在一个地方，这样业务逻辑仍然清晰明了。\n\
  \nNO_MERGE 提示\n\n我想通过关于`MERGE`和`NO_MERGE`提示的说明来结束对全局提示的讨论。当用作本地提示时，`MERGE`和`NO_MERGE`提示有两种变体。这两种本地变体都有等效的全局形式，因此总共有四种变体。很容易混淆这四种变体，所以让我来澄清一下。为了简单起见，我将坚持使用`NO_MERGE`提示，因为它显然是更常见的嵌入式提示。\n\
  \n*   当用作不带参数的本地提示时，`NO_MERGE`指示 CBO 不要合并提示所在的*查询块*。\n*   当用作带有一个参数（前面没有‘@’符号）的本地提示时，该参数被假定为一个数据字典视图、一个因子化子查询或一个内联视图。`NO_MERGE`提示指示\
  \ CBO 不要合并参数中命名的*行源*。\n*   当用作带有一个参数（前面有‘@’符号）的全局提示时，`NO_MERGE`提示指示 CBO 不要合并参数中命名的*查询块*。\n\
  *   当用作带有两个参数的全局提示（第一个参数前有‘@’符号）时，第二个参数被假定为一个数据字典视图、一个因子化子查询或一个出现在第一个参数指定的查询块中的内联视图。`NO_MERGE`提示指示\
  \ CBO 不要合并出现在第一个参数指定的*查询块*中、由第二个参数命名的*行源*。\n\n困惑了吗？也许清单 8-30 能说明一些问题。\n\n清单 8-30.\
  \ `NO_MERGE`提示的四种变体\n\n```sql\nWITH fs AS (SELECT /*+ qb_name(qb1) no_merge*/\n\
  \                  * FROM t1)\nSELECT /*+ qb_name(qb2) */\n       *\n  FROM fs myalias,\
  \ t2\n WHERE myalias.c1 = t2.c2;\n\nWITH fs AS (SELECT /*+ qb_name(qb1) */\n   \
  \               * FROM t1)\nSELECT /*+ qb_name(qb2) no_merge(myalias)*/\n      \
  \ *\n  FROM fs myalias, t2\n WHERE myalias.c1 = t2.c2;\n\nWITH fs AS (SELECT /*+\
  \ qb_name(qb1) */\n                  * FROM t1)\nSELECT /*+ qb_name(qb2) no_merge(@qb1)*/\n\
  \       *\n  FROM fs myalias, t2\n WHERE myalias.c1 = t2.c2;\n\nWITH fs AS (SELECT\
  \ /*+ qb_name(qb1) no_merge(@qb2 myalias)*/\n                  * FROM t1)\nSELECT\
  \ /*+ qb_name(qb2)  */\n       *\n  FROM fs myalias, t2\n WHERE myalias.c1 = t2.c2;\n\
