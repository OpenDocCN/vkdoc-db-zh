- "# Oracle CBO 优化器转换与提示\n\nCBO（基于成本的优化器）能够连续执行多次转换，这一事实使得理解其意图变得有些困难。好消息是，除了那些“理所当然”的转换外，与\
  \ CBO 所选转换相关联的提示，会出现在`DBMS_XPLAN`函数生成的执行计划的概述部分，正如我在第 8 章中所描述的那样。然而，你永远不会在显示的执行计划概述部分看到像`NO_MERGE`或`NO_EXPAND`这样的提示，因为`OUTLINE`和`OUTLINE_LEAF`提示的存在意味着，缺少像`MERGE`或`USE_CONCAT`这样的提示就表明相应的转换并未被应用。\n\
  \n本文在前文中不得不多次特别提及优化器的“理所当然”转换。现在让我们来认识它们。\n\n## 理所当然的转换\n\n我确信你不会惊讶地发现，Oracle 官方并未将任何\
  \ CBO 转换称为*理所当然的*（*no-brainers*）；这只是我自己创造的一个术语，用来指代一组具有特殊性质的转换。这些转换是如此基础，以至于它们没有相关联的提示，因此既不能被强制启用，也不能被禁用。事实上，甚至连`NO_QUERY_TRANSFORMATION`提示也无法禁用这些转换。这些转换是如此隐形，以至于只有两种方式可以知道它们的存在：\n\
  \n*   你可以仔细研读 10053 跟踪文件。Christian Antognini 就是这么做的。\n*   你可以阅读 Christian 的著作*《Troubleshooting\
  \ Oracle Performance》*。我就是这么做的！\n\n讨论几个这样的“理所当然”转换是有价值的，但我不会试图穷尽它们。让我们从计数转换开始。\n\
  \n## 计数转换\n\n看一下 Listing 13-1 中展示的两个查询及其相关的执行计划。\n\n**Listing 13-1. 计数转换**\n\n```sql\n\
  SELECT COUNT (cust_income_level) FROM sh.customers;\n\n| Id  | Operation       \
  \   | Name      |\n\n|   0 | SELECT STATEMENT   |           |\n|   1 |  SORT AGGREGATE\
  \    |           |\n|   2 |   TABLE ACCESS FULL| CUSTOMERS |\n\nSELECT COUNT (cust_id)\
  \ FROM sh.customers;\n\n| Id  | Operation                     | Name           \
  \      |\n\n|   0 | SELECT STATEMENT              |                      |\n|  \
  \ 1 |  SORT AGGREGATE               |                      |\n|   2 |   BITMAP CONVERSION\
  \ COUNT     |                      |\n|   3 |    BITMAP INDEX FAST FULL SCAN| CUSTOMERS_GENDER_BIX\
  \ |\n```\n\n两个查询的执行计划和结果都不同。事实证明，`SH.CUSTOMERS`表中的`CUST_INCOME_LEVEL`列没有`NOT NULL`约束，因此该列可能为`NULL`（某些行确实为`NULL`）。这些行在\
  \ Listing 13-1 的第一个查询中不会被计数。由于`CUST_INCOME_LEVEL`没有索引，执行`COUNT (CUST_INCOME_LEVEL)`的唯一方法就是进行全表扫描。然而，`CUST_ID`是`NOT\
  \ NULL`的，因此`COUNT (CUST_ID)`可以被转换为`COUNT (*)`。我们可以通过全表扫描来实现`COUNT (*)`，但我们也可以通过位图索引或在`NOT\
  \ NULL`列上的 B 树索引来实现`COUNT (*)`。在第二个查询的情况下，索引`CUSTOMERS_GENDER_BIX`是一个建立在非空列上的位图索引，因此它是全表扫描的一个双重合适、廉价的替代方案。\n\
  \n感到无聊了吗？下一个转换更有趣一些，但也仅此而已。\n\n## 谓词移动\n\n考虑 Listing 13-2 中的查询和执行计划。\n\n**Listing\
  \ 13-2. 谓词移动**\n\n```sql\nWITH cust_q\n     AS (  SELECT cust_id, promo_id, SUM\
  \ (amount_sold) cas\n             FROM sh.sales\n         GROUP BY cust_id, promo_id)\n\
  \    ,prod_q\n     AS (  SELECT prod_id, promo_id, SUM (amount_sold) pas\n     \
  \        FROM sh.sales\n            WHERE promo_id = 999\n         GROUP BY prod_id,\
  \ promo_id)\nSELECT promo_id\n      ,prod_id\n      ,pas\n      ,cust_id\n     \
  \ ,cas\n  FROM cust_q NATURAL JOIN prod_q;\n\n| Id  | Operation              | Name\
  \  |\n\n|   0 | SELECT STATEMENT       |       |\n|*  1 |  HASH JOIN           \
  \  |       |\n|   2 |   VIEW                 |       |\n|   3 |    HASH GROUP BY\
  \       |       |\n|   4 |     PARTITION RANGE ALL|       |\n|*  5 |      TABLE\
  \ ACCESS FULL | SALES |\n|   6 |   VIEW                 |       |\n|   7 |    HASH\
  \ GROUP BY       |       |\n|   8 |     PARTITION RANGE ALL|       |\n|*  9 |  \
  \    TABLE ACCESS FULL | SALES |\n\nPredicate Information (identified by operation\
  \ id):\n\n1 - access(\"CUST_Q\".\"PROMO_ID\"=\"PROD_Q\".\"PROMO_ID\")\n   5 - filter(\"\
  PROMO_ID\"=999)\n   9 - filter(\"PROMO_ID\"=999)\n```\n\nListing 13-2 中的查询没有做任何有意义的事情。对于产品的每种组合，它列出了客户针对`PROMO_ID`\
  \ 999 的总销售额，以及产品针对`PROMO_ID` 999 的总销售额。这里有两个因子化子查询和一个`WHERE`子句，但自然连接意味着通过传递闭包，我们可以将谓词也应用到另一个子查询上。然而，Listing\
  \ 13-3 使查询稍微复杂了一些，从而导致谓词移动转换不再起作用。\n\n**Listing 13-3. 谓词移动未被识别**\n\n```sql\nWITH\
  \ cust_q\n     AS (  SELECT cust_id\n                 ,promo_id\n              \
  \   ,SUM (amount_sold) cas\n                 ,MAX (SUM (amount_sold)) OVER (PARTITION\
  \ BY promo_id) max_cust\n             FROM sh.sales\n         GROUP BY cust_id,\
  \ promo_id)\n    ,prod_q\n     AS (  SELECT prod_id\n                 ,promo_id\n\
  \                 ,SUM (amount_sold) pas\n                 ,MAX (SUM (amount_sold))\
  \ OVER (PARTITION BY promo_id) max_prod\n             FROM sh.sales\n          \
  \  WHERE promo_id = 999\n         GROUP BY prod_id, promo_id)\nSELECT promo_id\n\
  \      ,prod_id\n      ,pas\n      ,cust_id\n      ,cas\n  FROM cust_q NATURAL JOIN\
  \ prod_q\n WHERE cust_q.cas = cust_q.max_cust AND prod_q.pas = prod_q.max_prod;\n\
  \n| Id  | Operation                | Name  |\n\n|   0 | SELECT STATEMENT       \
  \  |       |\n|   1 |  MERGE JOIN              |       |\n|*  2 |   VIEW       \
  \            |       |\n|   3 |    WINDOW BUFFER         |       |\n|   4 |    \
  \ SORT GROUP BY        |       |\n|   5 |      PARTITION RANGE ALL |       |\n|\
  \   6 |       TABLE ACCESS FULL  | SALES |\n|*  7 |   SORT JOIN              | \
  \      |\n|*  8 |    VIEW                  |       |\n|   9 |     WINDOW BUFFER\
  \        |       |\n|  10 |      SORT GROUP BY       |       |\n|  11 |       PARTITION\
  \ RANGE ALL|       |\n|* 12 |        TABLE ACCESS FULL | SALES |\n\nPredicate Information\
  \ (identified by operation id):\n\n2 - filter(\"CUST_Q\".\"CAS\"=\"CUST_Q\".\"MAX_CUST\"\
  )\n   7 - access(\"CUST_Q\".\"PROMO_ID\"=\"PROD_Q\".\"PROMO_ID\")\n       filter(\"\
  CUST_Q\".\"PROMO_ID\"=\"PROD_Q\".\"PROMO_ID\")\n   8 - filter(\"PROD_Q\".\"PAS\"\
  =\"PROD_Q\".\"MAX_PROD\")\n  12 - filter(\"PROMO_ID\"=999)\n```\n\nListing 13-3\
  \ 做的是一件更有意义的事：它识别出针对`PROMO_ID` 999 卖得最多的产品，以及针对`PROMO_ID` 999 买得最多的客户。但是，在子查询中添加分析函数导致\
  \ CBO 对谓词移动的正确性失去了信心。为了使查询高效，你必须自己将`WHERE`子句添加到`CUST_Q`因子化子查询中。\n\n还有一两个其他的“理所当然”转换：\n\
  \n\n*   `过滤器下推`是谓词移动的一种更简单的变体。\n*   `去重消除`会从查询中移除冗余的`DISTINCT`操作，当操作数涉及主键的所有列、所有`NOT\
  \ NULL`的唯一键列或`ROWID`时。\n*   `选择列表修剪`会从子查询的选择列表中移除未被引用的项。\n\n这些转换的关键点在于，应用它们没有可能的负面影响。例如，通过从子查询的选择列表中移除未引用的项，不可能使查询变慢。所有这些都有一些价值，但不太大，所以让我们继续看第二组转换：集合和连接转换。\n\
  \n## 集合与连接转换\n\n存在几种与集合和连接操作相关的转换，其中大部分都是最近才实现的，这令人惊讶，因为它们中的许多都非常有用。让我们从连接消除开始。\n\
  \n## 连接消除\n\n连接消除是那种可以通过内联视图和因子化子查询来演示的转换之一，但它实际上是为通用数据字典视图设计的。我将在清单 13-4 中演示这种对数据字典视图的关注，但我将在未来的示例中假定这一点已被理解。\n\
  \n**清单 13-4. 对数据字典视图进行连接消除**\n\n```sql\nCREATE OR REPLACE VIEW cust_sales\nAS\n\
  \   WITH sales_q\n        AS (  SELECT cust_id\n                    ,SUM (amount_sold)\
  \ amount_sold\n                    ,AVG (amount_sold) avg_sold\n               \
  \     ,COUNT (*) cnt\n                FROM sh.sales s\n            GROUP BY cust_id)\n\
  \   SELECT c.*\n         ,s.cust_id AS sales_cust_id\n         ,s.amount_sold\n\
  \         ,s.avg_sold\n         ,cnt\n     FROM sh.customers c JOIN sales_q s ON\
  \ c.cust_id = s.cust_id;\n\nSELECT sales_cust_id\n      ,amount_sold\n      ,avg_sold\n\
  \      ,cnt\n  FROM cust_sales;\n\n| Id  | Operation              | Name       \
  \  |\n|---|---|---|\n|   0 | SELECT STATEMENT       |              |\n|   1 |  NESTED\
  \ LOOPS          |              |\n|   2 |   VIEW                 |            \
  \  |\n|   3 |    HASH GROUP BY       |              |\n|   4 |     PARTITION RANGE\
  \ ALL|              |\n|   5 |      TABLE ACCESS FULL | SALES        |\n|*  6 |\
  \   INDEX UNIQUE SCAN    | CUSTOMERS_PK |\n\nCREATE OR REPLACE VIEW cust_sales\n\
  AS\n   WITH sales_q\n        AS (  SELECT cust_id\n                    ,SUM (amount_sold)\
  \ amount_sold\n                    ,AVG (amount_sold) avg_sold\n               \
  \     ,COUNT (*) cnt\n                FROM sh.sales s\n            GROUP BY cust_id)\n\
  \   SELECT c.*\n         ,s.cust_id AS sales_cust_id\n         ,s.amount_sold\n\
  \         ,s.avg_sold\n         ,cnt\n     FROM sh.customers c RIGHT JOIN sales_q\
  \ s ON c.cust_id = s.cust_id;\n\nSELECT /*+   eliminate_join(@SEL$13BD1B6A c@sel$2)\
  \ */\n       /* no_eliminate_join(@SEL$13BD1B6A c@sel$2) */sales_cust_id\n     \
  \ ,amount_sold\n      ,avg_sold\n      ,cnt\n  FROM cust_sales;\n\n-- 未转换的执行计划 (NO_ELIMINATE_JOIN)\n\
  \n| Id  | Operation              | Name         |\n|---|---|---|\n|   0 | SELECT\
  \ STATEMENT       |              |\n|   1 |  NESTED LOOPS OUTER    |           \
  \   |\n|   2 |   VIEW                 |              |\n|   3 |    HASH GROUP BY\
  \       |              |\n|   4 |     PARTITION RANGE ALL|              |\n|   5\
  \ |      TABLE ACCESS FULL | SALES        |\n|*  6 |   INDEX UNIQUE SCAN    | CUSTOMERS_PK\
  \ |\n\n-- 转换后的查询\n\nSELECT cust_id AS sales_cust_id\n        ,SUM (amount_sold)\
  \ amount_sold\n        ,AVG (amount_sold) avg_sold\n        ,COUNT (*) cnt\n   \
  \ FROM sh.sales s\nGROUP BY cust_id;\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation  \
  \          | Name  |\n|---|---|---|\n|   0 | SELECT STATEMENT     |       |\n| \
  \  1 |  HASH GROUP BY       |       |\n|   2 |   PARTITION RANGE ALL|       |\n\
  |   3 |    TABLE ACCESS FULL | SALES |\n```\n\n清单 13-4 首先创建了数据字典视图 `CUST_SALES`，该视图通过在\
  \ `SH.SALES` 表上执行聚合，向 `SH.CUSTOMERS` 示例模式表添加了一些列。然后查询使用了 `CUST_SALES` 视图，但只对来自 `SH.SALES`\
  \ 表的列感兴趣。不幸的是，聚合操作导致 CBO 无法追踪确保 `SH.SALES` 中的所有行在 `SH.CUSTOMERS` 中恰好有一行对应行这一引用完整性约束的重要性。结果，CBO\
  \ 没有应用连接消除优化。\n\n清单 13-4 继续重新定义 `CUST_SALES` 视图以使用外连接。这向 CBO 确认了聚合的 `SH.SALES` 数据与\
  \ `SH.CUSTOMERS` 的连接不会导致任何行丢失，并且连接列 `CUST_ID` 是 `SH.CUSTOMERS` 的主键这一事实也意味着连接不会导致添加任何行。CBO\
  \ 现在确信，消除从 `SH.SALES` 到 `SH.CUSTOMERS` 的连接不会影响结果，并继续进行转换。\n\n清单 13-4 中的第二个查询包含两个注释。第一个是强制默认行为的提示。如果删除第一个注释并在第二个注释前加一个加号，你可以禁用该转换。不幸的是，因为连接发生在视图内部，你必须查看\
  \ `DBMS_XPLAN.DISPLAY` 的大纲部分来识别查询块，并生成一个全局提示，如果你真的想禁用该转换。清单 13-4 也显示了与未转换查询、转换后的查询以及转换后执行计划相关的执行计划。\n\
  \n请仔细查看清单 13-4，因为我将在介绍其他转换时使用这种方法。\n\n连接消除还有另一个有趣的应用，适用于`嵌套表`。由于嵌套表不提供任何性能或管理优势，它们在\
  \ 21 世纪设计的模式中很少见。但以防你需要处理 20 世纪的模式，请查看清单 13-5，它引用了 `PM.PRINT_MEDIA` 示例模式。\n\n**清单\
  \ 13-5. 对嵌套表进行连接消除**\n\n```sql\n SELECT /*+   eliminate_join(parent_tab) */\n  \
  \       /* no_eliminate_join(parent_tab) */\n         nested_tab.document_typ, COUNT\
  \ (*) cnt\n    FROM pm.print_media parent_tab\n        ,TABLE (parent_tab.ad_textdocs_ntab)nested_tab\n\
  GROUP BY nested_tab.document_typ;\n\n-- 未转换的执行计划 (NO_ELIMINATE_JOIN)\n\n| Id  |\
  \ Operation           | Name               |\n|---|---|---|\n|   0 | SELECT STATEMENT\
  \    |                    |\n|   1 |  HASH GROUP BY      |                    |\n\
  |   2 |   NESTED LOOPS      |                    |\n|   3 |    TABLE ACCESS FULL|\
  \ TEXTDOCS_NESTEDTAB |\n|*  4 |    INDEX UNIQUE SCAN| SYS_C0011792       |\n\n--\
  \ 转换后的执行计划 (默认)\n\n| Id  | Operation                            | Name         \
  \           |\n|---|---|---|\n|   0 | SELECT STATEMENT                     |   \
  \                      |\n|   1 |  HASH GROUP BY                       |       \
  \                  |\n|   2 |   TABLE ACCESS BY INDEX ROWID BATCHED| TEXTDOCS_NESTEDTAB\
  \      |\n|*  3 |    INDEX FULL SCAN                   | SYS_FK0000091775N00007$\
  \ |\n```\n\n清单 13-5 有趣的地方在于，在 10gR2 版本引入连接消除转换之前，引用嵌套表而不引用其父表的可能性是不存在的。没有有效的 SQL\
  \ 语法来表示连接消除转换的结果！\n\n\n\n你可能认为连接消除（join elimination）应该是 `no-brainer`（显而易见的事）：保留连接永远不会有任何性能益处。然而，我怀疑用于控制转换的提示（hints）的创建现在已成为一种标准，如果是这样，我表示赞同。在\
  \ `DBMS_XPLAN` 函数的概要部分看到提示，意味着你可以更容易地弄清楚发生了什么，并允许你出于教育或研究目的禁用该转换。\n\n## 外连接转内连接\n\
  \n有时外连接无法被消除，但可以被转换为内连接。让我们再看一下 清单 13-4 中 `CUST_SALES` 视图的第二个定义。尽管对视图定义的更改帮助了那些只需要聚合\
  \ `SH.SALES` 数据的查询，但它使得那些确实需要 `SH.CUSTOMERS` 列的查询效率降低。如果我们更改这些查询，就可以消除那个开销。看看 清单\
  \ 13-6。\n\n**清单 13-6. 外连接转内连接转换**\n\n```\nSELECT /*+   outer_join_to_inner(@SEL$13BD1B6A\
  \ c@sel$2) */\n       /* no_outer_join_to_inner(@SEL$13BD1B6A c@sel$2) */\n    \
  \  *\n FROM cust_sales c\nWHERE cust_id IS NOT NULL;\n\n-- 未转换的执行计划 (NO_OUTER_JOIN_TO_INNER)\n\
  \n| Id  | Operation               | Name      |\n\n|   0 | SELECT STATEMENT    \
  \    |           |\n|*  1 |  FILTER                 |           |\n|*  2 |   HASH\
  \ JOIN OUTER       |           |\n|   3 |    VIEW                 |           |\n\
  |   4 |     HASH GROUP BY       |           |\n|   5 |      PARTITION RANGE ALL|\
  \           |\n|   6 |       TABLE ACCESS FULL | SALES     |\n|   7 |    TABLE ACCESS\
  \ FULL    | CUSTOMERS |\n\nPredicate Information (identified by operation id):\n\
  \n1 - filter(\"C\".\"CUST_ID\" IS NOT NULL)\n   2 - access(\"C\".\"CUST_ID\"(+)=\"\
  S\".\"CUST_ID\")\n\n-- 转换后的查询\n\nWITH sales_q\n        AS (  SELECT cust_id\n  \
  \                  ,SUM (amount_sold) amount_sold\n                    ,AVG (amount_sold)\
  \ avg_sold\n                    ,COUNT (*) cnt\n                FROM sh.sales s\n\
  \            GROUP BY cust_id)\n   SELECT c.*\n         ,s.cust_id AS sales_cust_id\n\
  \         ,s.amount_sold\n         ,s.avg_sold\n         ,cnt\n     FROM sh.customers\
  \ c JOIN sales_q s ON c.cust_id = s.cust_id;\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation\
  \              | Name      |\n\n|   0 | SELECT STATEMENT       |           |\n|*\
  \  1 |  HASH JOIN             |           |\n|   2 |   VIEW                 |  \
  \         |\n|   3 |    HASH GROUP BY       |           |\n|   4 |     PARTITION\
  \ RANGE ALL|           |\n|   5 |      TABLE ACCESS FULL | SALES     |\n|   6 |\
  \   TABLE ACCESS FULL    | CUSTOMERS |\n\nPredicate Information (identified by operation\
  \ id):\n\n1 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n```\n\n暂且不谈参照完整性约束，`SH.CUSTOMERS`\
  \ 上的外连接与内连接之间的潜在区别在于，可能会添加 `C.CUST_ID` 为 `NULL` 的额外行。存在 `WHERE cust_id IS NOT NULL`\
  \ 这个谓词意味着任何此类额外行都会被消除，因此 CBO 将应用从外连接到内连接的转换，除非被提示禁止这样做。\n\n## 全外连接转外连接\n\n外连接转内连接转换的一个逻辑扩展是全外连接转外连接转换。完全相同的原则适用。如果你理解了\
  \ 清单 13-6，清单 13-7 应该不言自明。\n\n**清单 13-7. 全外连接转外连接**\n\n```\nSELECT /*+    full_outer_join_to_outer(cust)\
  \ */\n       /*  no_full_outer_join_to_outer(cust) */\n      *\n FROM sh.countries\
  \ FULL OUTER JOIN sh.customers cust USING (country_id)\nWHERE cust.cust_id IS NOT\
  \ NULL;\n\n-- 未转换的执行计划 (NO_FULL_OUTER_JOIN_TO_OUTER)\n\n| Id  | Operation      \
  \       | Name      |\n\n|   0 | SELECT STATEMENT      |           |\n|*  1 |  VIEW\
  \                 | VW_FOJ_0  |\n|*  2 |   HASH JOIN FULL OUTER|           |\n|\
  \   3 |    TABLE ACCESS FULL  | COUNTRIES |\n|   4 |    TABLE ACCESS FULL  | CUSTOMERS\
  \ |\n\nPredicate Information (identified by operation id):\n\n1 - filter(\"CUST\"\
  .\"CUST_ID\" IS NOT NULL)\n   2 - access(\"COUNTRIES\".\"COUNTRY_ID\"=\"CUST\".\"\
  COUNTRY_ID\")\n\n-- 转换后的查询\n\nSELECT *\n  FROM sh.countries RIGHT OUTER JOIN sh.customers\
  \ cust USING (country_id);\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation            \
  \ | Name      |\n\n|   0 | SELECT STATEMENT      |           |\n|*  1 |  HASH JOIN\
  \ RIGHT OUTER|           |\n|   2 |   TABLE ACCESS FULL   | COUNTRIES |\n|   3 |\
  \   TABLE ACCESS FULL   | CUSTOMERS |\n\nPredicate Information (identified by operation\
  \ id):\n\n1 - access(\"COUNTRIES\".\"COUNTRY_ID\"(+)=\"CUST\".\"COUNTRY_ID\")\n\
  ```\n\n当然，如果我们在 清单 13-7 中添加一个诸如 `WHERE COUNTRIES.COUNTRY_NAME IS NOT NULL` 的谓词，我们也可以应用外连接转内连接转换，从而得到一个内连接。\n\
  \n## 半连接转内连接\n\n虽然半连接转内连接的转换已经存在一段时间，但用于管理该转换的提示在 `11.2.0.3` 版本中是新的。清单 13-8 进行了演示。\n\
  \n**清单 13-8. 半连接转内连接**\n\n```\nSELECT *\n  FROM sh.sales s\n WHERE EXISTS\n    \
  \      (SELECT /*+   semi_to_inner(c) */\n                  /*  no_semi_to_inner(c)\
  \ */\n\nFROM sh.customers c\n           WHERE     c.cust_id = s.cust_id\n      \
  \           AND cust_first_name = 'Abner'\n                 AND cust_last_name =\
  \ 'Everett');\n\n-- 未转换的执行计划 (NO_SEMI_TO_INNER)\n\n| Id  | Operation           \
  \ | Name      |\n\n|   0 | SELECT STATEMENT     |           |\n|*  1 |  HASH JOIN\
  \ RIGHT SEMI|           |\n|*  2 |   TABLE ACCESS FULL  | CUSTOMERS |\n|   3 | \
  \  PARTITION RANGE ALL|           |\n|   4 |    TABLE ACCESS FULL | SALES     |\n\
  \nPredicate Information (identified by operation id):\n\n1 - access(\"C\".\"CUST_ID\"\
  =\"S\".\"CUST_ID\")\n   2 - filter(\"CUST_FIRST_NAME\"='Abner' AND \"CUST_LAST_NAME\"\
  ='Everett')\n\n-- 转换后的查询 (近似)\n\nWITH q1\n     AS (SELECT DISTINCT cust_id\n   \
  \        FROM sh.customers\n          WHERE cust_first_name = 'Abner' AND cust_last_name\
  \ = 'Everett')\nSELECT s.*\n  FROM sh.sales s JOIN q1 ON s.cust_id = q1.cust_id;\n\
  \n-- 转换后的执行计划 (默认)\n\n| Id  | Operation                          | Name        \
  \   |\n\n|   0 | SELECT STATEMENT                   |                |\n|   1 |\
  \  NESTED LOOPS                      |                |\n|   2 |   NESTED LOOPS\
  \                     |                |\n|   3 |    SORT UNIQUE               \
  \      |                |\n|*  4 |     TABLE ACCESS FULL              | CUSTOMERS\
  \      |\n|   5 |    PARTITION RANGE ALL             |                |\n|   6 |\
  \     BITMAP CONVERSION TO ROWIDS    |                |\n|*  7 |      BITMAP INDEX\
  \ SINGLE VALUE     | SALES_CUST_BIX |\n|   8 |   TABLE ACCESS BY LOCAL INDEX ROWID|\
  \ SALES          |\n\nPredicate Information (identified by operation id):\n\n4 -\
  \ filter(\"CUST_FIRST_NAME\"='Abner' AND \"CUST_LAST_NAME\"='Everett')\n   7 - access(\"\
  C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n```\n\n清单 13-8 中显示的转换为嵌套循环和合并半连接提供了额外的连接顺序。在此转换创建之前，半连接要求未嵌套的子查询是嵌套循环或合并半连接的探测行源（对于哈希连接，连接输入可以交换）。现在我们可以将半连接转换为内连接，因此可以使用子查询作为驱动行源。\n\
  \n\n\n注意在转换后的执行计划中有一个 `SORT UNIQUE` 操作。此操作的目的是确保 `SH.SALES` 中的任何行在结果集中最多只出现一次。但是，如果你获取转换后的查询并对*那个*查询运行\
  \ `DBMS_XPLAN.DISPLAY`，你将不会看到这个 `SORT UNIQUE` 操作。这是因为如果直接执行或解释转换后的查询，就会执行无脑的重复消除转换。我推测，由该转换引入的冗余\
  \ `SORT UNIQUE` 操作将在未来的版本中消失。\n\n## 子查询脱钩\n\n我们已经在第 11 章的半连接和反连接上下文中看到了子查询脱钩转换。我们还将在第\
  \ 14 章中探讨在选择列表中的子查询脱钩。然而，这里我还想讨论一两种其他变体的子查询脱钩。请看清单 13-9。\n\n### 清单 13-9. 使用脱钩的子查询脱钩\n\
  \n```sql\nSELECT c.cust_first_name, c.cust_last_name, s1.amount_sold\n  FROM sh.customers\
  \ c, sh.sales s1\n WHERE     s1.amount_sold = (SELECT /*     unnest */\n       \
  \                             /*+ no_unnest */\n                               \
  \     MAX (amount_sold)\n                               FROM sh.sales s2\n     \
  \                         WHERE s1.cust_id= s2.cust_id)\n       AND c.cust_id =\
  \ s1.cust_id;\n```\n\n-- 未转换的执行计划 (NO_UNNEST)\n\n| Id  | Operation             \
  \                       | Name           |\n\n|   0 | SELECT STATEMENT         \
  \                    |                |\n|*  1 |  FILTER                       \
  \               |                |\n|*  2 |   HASH JOIN                        \
  \          |                |\n|   3 |    TABLE ACCESS FULL                    \
  \     | CUSTOMERS      |\n|   4 |    PARTITION RANGE ALL                       |\
