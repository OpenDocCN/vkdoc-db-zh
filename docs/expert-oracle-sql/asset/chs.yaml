  \ | -------- | ------ |\n|   0 | SELECT STATEMENT  |          |   1200 |\n|   1\
  \ |  TABLE ACCESS FULL| PAYMENTS |   1200 |\n\nEXEC tstats.adjust_column_stats_v1(p_table_name=>'PAYMENTS');\n\
  \nSELECT *\n  FROM payments\n WHERE special_flag = 'Y';\n\n| Id  | Operation   \
  \      | Name     | Rows  |\n| --- | ----------------- | ------- | ----- |\n|  \
  \ 0 | SELECT STATEMENT  |          |     1 |\n|   1 |  TABLE ACCESS FULL| PAYMENTS\
  \ |     1 |\n```\n\n## 对 Listing 20-2 的解释\n\nListing 20-2 创建了一个名为 `PAYMENTS` 的表，我将在本章中用它来说明几个要点。`PAYMENTS`\
  \ 表包含一个 `SPECIAL_FLAG` 列，其值为 `Y` 或 `NULL`。在收集统计信息后，我们可以立即看到，对于在 `SPECIAL_FLAG` 上包含等式谓词的查询，其估计的基数是绝对准确的。然而，一旦调用过程\
  \ `TSTATS.ADJUST_COLUMN_STATS_V1` 来移除 `HIGH_VALUE` 和 `LOW_VALUE` 统计列，我们就会看到 CBO\
  \ 感到困惑，并将基数减少到 0（在显示中四舍五入为 1，通常如此）。这可能是一个错误，因为在 12.1.0.1 中无法观察到此行为。\n\n解决此问题的一种方法是让统计调整过程避免处理\
  \ `NUM_DISTINCT` 为 1 的列。这在 Listing 20-2 所示的示例中肯定有效。然而，一个唯一值的列也可能是一个基于时间的列，如果是这样，保留\
  \ `HIGH_VALUE` 和 `LOW_VALUE` 会产生问题，正如我们稍后在查看 `DBMS_STATS.COPY_TABLE_STATS` 时将要展示的那样。\n\
  \n处理 `NUM_DISTINCT` 为 1 的另一种方法是更改 `NUM_DISTINCT` 的值！Listing 20-3 展示了过程 `TSTATS.ADJUST_COLUMN_STATS_V2`，它解决了这个问题。\n\
  \n## Listing 20-3. 调整 `NUM_DISTINCT` 和 `DENSITY` 以修复基数问题\n\n```sql\nCREATE OR REPLACE\
  \ PACKAGE tstats\nAS\n-- Other procedures not shown\n   PROCEDURE adjust_column_stats_v2\
  \ (\n      p_owner all_tab_col_statistics.owner%TYPE DEFAULT SYS_CONTEXT (\n   \
  \                                                                'USERENV'\n   \
  \                                                               ,'CURRENT_SCHEMA')\n\
  \     ,p_table_name all_tab_col_statistics.table_name%TYPE);\n-- Other procedures\
  \ not shown\nEND tstats;\n/\n\nCREATE OR REPLACE PACKAGE BODY tstats\nAS\n-- Other\
  \ procedures not shown\n  PROCEDURE adjust_column_stats_v2 (\n      p_owner all_tab_col_statistics.owner%TYPE\
  \ DEFAULT SYS_CONTEXT (\n                                                      \
  \             'USERENV'\n                                                      \
  \            ,'CURRENT_SCHEMA')\n     ,p_table_name all_tab_col_statistics.table_name%TYPE)\n\
  \   AS\n      CURSOR c1\n      IS\n         SELECT *\n           FROM all_tab_col_statistics\n\
  \          WHERE     owner = p_owner\n                AND table_name = p_table_name\n\
  \                AND last_analyzed IS NOT NULL;\n\n      v_num_distinct all_tab_col_statistics.num_distinct%TYPE;\n\
  \   BEGIN\n      FOR r IN c1\n      LOOP\n         DBMS_STATS.delete_column_stats\
  \ (ownname         => r.owner\n                                        ,tabname\
  \         => r.table_name\n                                        ,colname    \
  \     => r.column_name\n                                        ,cascade_parts \
  \  => TRUE\n                                        ,no_invalidate   => TRUE\n \
  \                                       ,force           => TRUE);\n\n         IF\
  \ r.num_distinct = 1\n         THEN\n            v_num_distinct := 1 + 1e-14;\n\
  \         ELSE\n            v_num_distinct := r.num_distinct;\n         END IF;\n\
  ```\n\n\n\n"
- "# 基于时间的列统计信息复杂性\n\n## 偏斜的列值与范围谓词\n\n清单 9-8 展示了如何为表设置直方图，以处理在相等谓词中为不同值需要不同执行计划的偏斜数据。我在第\
  \ 9 章中也提到，当涉及范围谓词时，你可能需要为高低端点指定现实的值（而不是清单 9-8 中的那些离谱值）。但是，如果你遇到基于时间的偏斜数据和/或基于时间的范围谓词，该怎么办呢？\n\
  \n考虑一个保存了 12 个月工资支付记录的工资系统。绝大多数交易发生在每月 20 号（除非 20 号是周末），因为那是公司的发薪日。然而，有极少数交易发生在其他日期，用于处理高管薪酬、错误、调整或其他异常事件。\n\
  \n在这个工资应用中，热门的值会随时间变化：每个月会添加一个新的标准发薪日，同时移除一个旧的。就我个人而言，我还没有处理过带有此类基于时间的直方图的应用程序，但弄清楚如何应对这样的需求似乎是一项有益的练习。我建议在添加新的支付日期和移除旧日期时，手动更新直方图。\n\
  \n请注意，用新值手动更新直方图与收集统计信息有很大不同；前者变更受到严格控制，不存在执行计划发生不良变化的风险，但在后者情况下，我们又回到了玩俄罗斯轮盘赌的状态。我们假想的工资系统的维护过程需要每月至少调用一次\
  \ `TSTATS` 包中的自定义过程，以保持直方图的时效性。\n\n这种针对特定应用程序的 `TSTATS` 定制是典型的需要你考虑的情况，这也说明了为什么\
  \ `TSTATS` 通常不是即插即用的解决方案。现在让我们来看基于时间的列统计信息的最后一个复杂性：相关性。\n\n## 相关列与表达式\n\n清单 9-11\
  \ 和 9-12 展示了如何设置扩展统计信息来处理谓词中的相关列和表达式。值得注意的是，你也可以为扩展统计信息创建直方图，而且扩展统计信息也可能是基于时间的。在列组统计信息上手动设置直方图远非易事。理论上，应该能够使用\
  \ `SYS_OP_COMBINED_HASH` 函数来设置直方图的值，但我一直未能成功实现。此外，当直方图中缺少值时，CBO 根本不会使用扩展统计信息。\n\n\
  很容易想象更复杂的情况，那时扩展统计信息甚至会更不实用。我最近参与的一个应用程序有如此多的相关列，以至于可能需要数百个扩展统计信息。然而，通过对性能不佳的查询进行仔细分析，我找到了另一种解决方案。该方案是伪造某些列的统计信息。\n\
  \n为了说明这一点，你可以看到清单 20-2 创建的 `PAYMENTS` 表包含一个名为 `JOB_DESCRIPTION` 的列，并且每个职位描述都与 `PAYGRADE`\
  \ 高度相关。我们可能知道，应用程序中所有包含 `JOB_DESCRIPTION` 谓词的查询也都包含 `PAYGRADE` 谓词。既然如此，伪造 `JOB_DESCRIPTION`\
  \ 的 `NUM_DISTINCT` 值可能是可行的。通过将 `NUM_DISTINCT` 设置为一个非常低的值，我们可以最小化涉及 `JOB_DESCRIPTION`\
  \ 的谓词导致 CBO 错误地降低基数估计的程度。\n\n但是，让我们喘口气。与其使用大量代码来操作列统计信息以解决复杂问题，不如精心构建样本数据。让我演示一下。\n\
  \n## 利用样本数据解决复杂统计问题\n\n现实数据的问题在于其不可预测性。某个月你的工资异常比例可能是 2%，下个月可能是 1%，再下个月可能是 3%。但是，如果你手动创建样本数据并在该样本数据上收集统计信息，就可以消除这种变化。在某些情况下，在伪造的数据上收集统计信息比直接伪造统计信息更容易。一旦收集完成，来自样本数据的列统计信息就可以复制到现实表中。\n\
  \n无论我们是伪造统计信息还是伪造样本数据，都必须从分析需求开始。因此，让我基于对使用清单 20-2 创建的 `PAYMENTS` 表的 SQL 语句的分析，提出以下结果。\n\
  \n### PAYGRADE 列分析\n\n我们发现，处理 `PAYGRADE` 为 1 的两名员工的工资支付的代码，与处理 `PAYGRADE` 为 2 到\
  \ `PAYGRADE` 为 10 的 9998 名员工的工资支付的代码不同。我们需要一个直方图，显示支付给 `PAYGRADE` 1 员工的少量支付记录，但我们不希望直方图反映剩余工资等级之间的真实差异，因为除了\
  \ 1 以外的所有工资等级都使用相同的 SQL 进行处理。我们决定，我们的直方图应显示 `PAYGRADE` 1 的行数比其他工资等级少 100 倍。这意味着：\n\
  \n*   `PAYGRADE` 1 的选择性为 1/901\n*   工资等级 2 到 10 各自的选择性为 100/901\n\n记住，我们想要一个能产生有效且稳定执行计划的直方图。直方图没有准确反映\
  \ `PAYMENTS` 表中的数据分布并不重要。\n\n### PAYMENT_DATE 列分析\n\n```sql\nDBMS_STATS.set_column_stats\
  \ (ownname         => r.owner\n                                     ,tabname   \
  \      => r.table_name\n                                     ,colname         =>\
  \ r.column_name\n                                     ,distcnt         => v_num_distinct\n\
  \                                     ,density         => 1 / v_num_distinct\n \
  \                                    ,nullcnt         => r.num_nulls\n         \
  \                            ,srec            => NULL -- No HIGH_VALUE/LOW_VALUE\n\
  \                                     ,avgclen         => r.avg_col_len\n      \
  \                               ,no_invalidate   => FALSE\n                    \
  \                 ,force           => TRUE);\n      END LOOP;\n   END adjust_column_stats_v2;\n\
  -- 其他过程未显示\nEND tstats;\n/\n\nEXEC tstats.adjust_column_stats_v2(p_table_name=>'PAYMENTS');\n\
  SELECT *\n  FROM payments\n WHERE special_flag = 'Y';\n```\n\n| Id  | 操作       \
  \       | 名称     | 行数   |\n| --- | ----------------- | -------- | ------ |\n|  \
  \ 0 | SELECT STATEMENT  |          |   1200 |\n|   1 |  TABLE ACCESS FULL| PAYMENTS\
  \ |   1200 |\n\n你可以看到，`TSTATS.ADJUST_COLUMN_STATS_V2` 现在将 `SPECIAL_FLAG` 的 `NUM_DISTINCT`\
  \ 设置为一个略大于 1 的非整数值，并将 `DENSITY` 设置为 `1/NUM_DISTINCT`。现在，一个列的 distinct 值数量为非整数在逻辑上是不合理的，但\
  \ CBO 似乎对此并不在意，并将这个非整数值代入其计算中。正如我们通过查询的基数估计所看到的，我们避免了 CBO 代码中不期望的特殊代码路径，并且我们的基数估计值恢复到了一个合理的（在这种情况下是绝对正确的）值。\n\
  \n让我继续讨论基于时间的列统计信息的另外两个复杂性：偏斜的列值与范围谓词。\n\n\n\n"
- "# 支付模式概述\n\n绝大多数工资支付在每月 20 号进行（若 20 号为周末则提前至周五）。对于错误、调整及高管薪酬等少数例外情况，支付日期可能稍晚，但占比极小。如果`PAYMENT_DATE`列上没有直方图，正常支付日的选择率（selectivity）会过低。由于`PAYMENTS`表存储了一年的数据，我们的直方图应显示大约\
  \ 1/12 的支付发生在 12 个标准发薪日，并且年内其他日期的选择率应非常小。\n\n## PAYGRADE 与 PAYMENT_DATE 关联分析\n\n\
  实际上，我们虚构公司中最资深的两位员工（`PAYGRADE`为 1）在每月最后一个工作日领取薪酬，而其他所有人都在 20 号左右领取。如果处理这两位`PAYGRADE`为\
  \ 1 的高管的特殊代码中，包含同时基于`PAYGRADE`和`PAYMENT_DATE`的谓词条件，那么 CBO（基于成本的优化器）如果假设大多数支付发生在标准发薪日，就不太可能选择合适的执行计划。\n\
  \n我们可以为`PAYGRADE`和`PAYMENT_DATE`列设置列组统计信息，以显示这两位`PAYGRADE`为 1 的员工在其特殊发薪日各有一次支付。我们也可以为可能发生例外的日期设置非零选择率，这样列组统计信息仍然会被使用。\n\
  \n## JOB_DESCRIPTION 列分析\n\n共有 13 种职位描述和 10 个薪酬等级，但并非有 130 种组合。我们可能会考虑为`PAYGRADE`和`JOB_DESCRIPTION`设置列组统计信息，但只要应用程序从不使用独立于`PAYGRADE`的`JOB_DESCRIPTION`谓词，就存在一个更简单的方法：我们可以直接告诉\
  \ CBO `JOB_DESCRIPTION`只有两个值。这种“善意的谎言”在您有大量相关列，并且只想阻止 CBO 过度降低基数估计时很有用。一旦我们构造好示例数据，您就会看到它的效果。\n\
  \n## 构建样本数据\n\n现在我们已经识别了问题列，并决定了希望 CBO 如何处理它们，接下来就可以构造符合我们模型的一些数据了。\n\nListing 20-4\
  \ 创建了一个表 `SAMPLE_PAYMENTS`，它包含了我们感兴趣的`PAYMENTS`表的列子集，即`PAYGRADE`、`PAYMENT_DATE`和`JOB_DESCRIPTION`。\n\
  \nListing 20-4 还展示了一个过程 `TSTATS.AMEND_TIME_BASED_STATISTICS`，用于填充`SAMPLE_PAYMENTS`。一旦`SAMPLE_PAYMENTS`被数据填充，我们就收集统计信息，然后将列统计信息从`SAMPLE_PAYMENTS`复制到真实的`PAYMENTS`表。\n\
  \n**Listing 20-4. 创建并填充 SAMPLE_PAYMENTS 表**\n\n```\nCREATE TABLE sample_payments\n\
  (\n   paygrade          INTEGER\n  ,payment_date      DATE\n  ,job_description \
  \  CHAR (20)\n);\n\nCREATE OR REPLACE PACKAGE tstats\nAS\n-- Other procedures cut\n\
  \     PROCEDURE amend_time_based_statistics (\n      effective_date    DATE DEFAULT\
  \ SYSDATE);\n-- Other procedures cut\nEND tstats;\n/\n\nCREATE OR REPLACE PACKAGE\
  \ BODY tstats AS\n  PROCEDURE amend_time_based_statistics (\n      effective_date\
  \    DATE DEFAULT SYSDATE)\n   IS\n      distcnt   NUMBER;\n      density   NUMBER;\n\
  \      nullcnt   NUMBER;\n      srec      DBMS_STATS.statrec;\n      avgclen   NUMBER;\n\
  \   BEGIN\n      --\n      -- Step 1: Remove data from previous run\n      --\n\
  \      DELETE FROM sample_payments;\n\n      --\n      -- Step 2:  Add data for\
  \ standard pay for standard employees\n      --\n      INSERT INTO sample_payments\
  \ (paygrade, payment_date, job_description)\n         WITH payment_dates\n     \
  \         AS (    SELECT ADD_MONTHS (TRUNC (effective_date, 'MM') + 19\n       \
  \                                 ,1 - ROWNUM)\n                               \
  \ standard_paydate\n                        FROM DUAL\n                  CONNECT\
  \ BY LEVEL <= 12)\n             ,paygrades\n              AS (    SELECT ROWNUM\
  \ + 1 paygrade\n                        FROM DUAL\n                  CONNECT BY\
  \ LEVEL <= 9)\n             ,multiplier\n              AS (    SELECT ROWNUM rid\n\
  \                        FROM DUAL\n                  CONNECT BY LEVEL <= 100)\n\
  \         SELECT paygrade\n               ,CASE MOD (standard_paydate - DATE '1001-01-06',\
  \ 7)\n                   WHEN 5 THEN standard_paydate - 1\n                   WHEN\
  \ 6 THEN standard_paydate - 2\n                   ELSE standard_paydate\n      \
  \          END\n                   payment_date\n               ,'AAA' job_description\n\
  \           FROM paygrades, payment_dates, multiplier;\n\n      --\n      -- Step\
  \ 3:  Add data for paygrade 1\n      --\n      INSERT INTO sample_payments (paygrade,\
  \ payment_date, job_description)\n         WITH payment_dates\n              AS\
  \ (    SELECT ADD_MONTHS (LAST_DAY (TRUNC (effective_date))\n                  \
  \                      ,1 - ROWNUM)\n                                standard_paydate\n\
  \                        FROM DUAL\n                  CONNECT BY LEVEL <= 12)\n\
  \         SELECT 1 paygrade\n               ,CASE MOD (standard_paydate - DATE '1001-01-06',\
  \ 7)\n                   WHEN 5 THEN standard_paydate - 1\n                   WHEN\
  \ 6 THEN standard_paydate - 2\n                   ELSE standard_paydate\n      \
  \          END\n                   payment_dates\n               ,'zzz' job_description\n\
  \           FROM payment_dates;\n\n      --\n      -- Step 4:  Add rows for exceptions.\n\
  \      --\n      INSERT INTO sample_payments (paygrade, payment_date, job_description)\n\
  \         WITH payment_dates\n              AS (    SELECT ADD_MONTHS (TRUNC (effective_date,\
  \ 'MM') + 19\n                                        ,1 - ROWNUM)\n           \
  \                     standard_paydate\n                        FROM DUAL\n    \
  \              CONNECT BY LEVEL <= 12)\n             ,paygrades\n              AS\
  \ (    SELECT ROWNUM + 1 paygrade\n                        FROM DUAL\n         \
  \         CONNECT BY LEVEL <= 7)\n         SELECT paygrade\n               ,CASE\
  \ MOD (standard_paydate - DATE '1001-01-06', 7)\n                   WHEN 5 THEN\
  \ standard_paydate - 2 + paygrade\n                   WHEN 6 THEN standard_paydate\
  \ - 3 + paygrade\n                   ELSE standard_paydate - 1 + paygrade\n    \
  \            END\n                   payment_date\n               ,'AAA' job_description\n\
  \           FROM paygrades, payment_dates;\n\n      --\n      -- Step 5:  Gather\
  \ statistics for SAMPLE_PAYMENTS\n      --\n      DBMS_STATS.gather_table_stats\
  \ (\n         ownname      => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n      \
  \  ,tabname      => 'SAMPLE_PAYMENTS'\n        ,method_opt   =>    'FOR COLUMNS\
  \ SIZE 1 JOB_DESCRIPTION '\n                         || 'FOR COLUMNS SIZE 254 PAYGRADE,PAYMENT_DATE,\
  \ '\n                         || '(PAYGRADE,PAYMENT_DATE)');\n\n      --\n     \
  \ -- Step 6:  Copy column statistics from SAMPLE_PAYMENTS to PAYMENTS\n      --\n\
  \      FOR r IN (SELECT column_name, histogram\n                  FROM all_tab_cols\n\
  \                 WHERE table_name = 'SAMPLE_PAYMENTS')\n      LOOP\n         DBMS_STATS.get_column_stats\
  \ (\n            ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n      \
  \     ,tabname   => 'SAMPLE_PAYMENTS'\n           ,colname   => r.column_name\n\
  \           ,distcnt   => distcnt\n           ,density   => density\n          \
  \ ,nullcnt   => nullcnt\n           ,srec      => srec\n           ,avgclen   =>\
  \ avgclen);\n```\n\n\n## 使用伪造数据生成稳定统计信息\n\nListing 20-4 中的代码需要注意以下几点：\n\n*   `SAMPLE_PAYMENTS`\
  \ 表中的行数不需要与 `PAYMENTS` 表一样多。我们只需要足够的行来演示想要的数据分布。事实上，`SAMPLE_PAYMENTS` 包含 10,896\
  \ 行，而 `PAYMENTS` 当前包含 120,000 行。\n*   `SAMPLE_PAYMENTS` 表并未包含 `PAYMENTS` 中的所有列，仅包含需要特殊处理的列。\n\
  *   从 `SAMPLE_PAYMENTS` 中删除历史数据后，我们为薪资等级 2 到 9 与 12 个标准发薪日的每种组合添加 100 行。我们为 `JOB_DESCRIPTION`\
  \ 指定一个低值。\n*   然后，我们添加高管薪资的行——每个高管发薪日仅一行。我们为 `JOB_DESCRIPTION` 指定第二个高值。\n*   最后添加的一组行是用于特殊条目——标准发薪日后一周内的每一天一行。我们为\
  \ `PAYGRADE` 指定一个任意值（不是 1）。\n*   当我们收集统计信息时，重要的是**不**为 `JOB_DESCRIPTION` 收集直方图，因为我们为该列指定的值不是真实的。我们对其余列收集直方图。注意\
  \ `METHOD_OPT` 语法的一个有趣特性：我们可以通过这种方式隐式创建扩展统计信息！\n*   然后，我们将为 `SAMPLE_PAYMENTS` 收集的列统计信息复制到\
  \ `PAYMENTS` 中。\n\n你可能想知道我们在这里实现了什么。所有这些操作的关键点在于，每个月我们都可以重新生成 `SAMPLE_PAYMENTS`\
  \ 中的数据，并且可以 100% 确定数据的**唯一**差异是 `PAYMENT_DATE` 的值。其他一切都将保持不变。这意味着一旦我们将统计信息复制到 `PAYMENTS`，执行计划将保持不变。Listing\
  \ 20-5 展示了这在实践中的工作方式。\n\n**Listing 20-5. 展示伪造数据生成的统计信息在实际中的应用**\n\n```sql\nDECLARE\n\
