  \ |       |       |            |\n|   3 |    分区范围 全部             |             \
  \              |   918K|       |  5745   (1)|\n|   4 |     窗口缓冲区              |\
  \                           |   918K|       |  5745   (1)|\n|   5 |      排序 分组 \
  \             |                           |   918K|    24M|  5745   (1)|\n|   6\
  \ |       表 访问 全表扫描       | SALES                     |   918K|       |   517  \
  \ (2)|\n|   7 |   UNION-ALL                |                           |       |\
  \       |            |\n|*  8 |    视图                     |                    \
  \       |   918K|       |   616   (1)|\n|   9 |     表 访问 全表扫描        | SYS_TEMP_0FD9D664A_64B671\
  \ |   918K|       |   616   (1)|\n|* 10 |    视图                     |          \
  \                 |   918K|       |   616   (1)|\n|  11 |     表 访问 全表扫描        |\
  \ SYS_TEMP_0FD9D664A_64B671 |   918K|       |   616   (1)|\n\n谓词信息 (由操作 ID 标识):\n\
  \n8 - filter(\"TIME_ID\"=TO_DATE(' 1999-12-31 00:00:00', 'syyyy-mm-dd\n        \
  \      hh24:mi:ss') AND \"MIN_AS\"<100)\n  10 - filter(\"TIME_ID\"=TO_DATE(' 2000-01-01\
  \ 00:00:00', 'syyyy-mm-dd\n              hh24:mi:ss') AND \"MAX_AS\">100)\n\n--\
  \ 带提示的执行计划\n\n| ID  | 操作                                            | 名称       \
  \    | 行数  | 代价 (%CPU)|\n\n|   0 | SELECT 语句                                   \
  \   |                |   312 |    43  (45)|\n|   1 |  UNION-ALL                \
  \                     |                |       |            |\n|*  2 |   视图    \
  \                                      |                |   207 |    24   (0)|\n\
  |   3 |    窗口缓冲区                                   |                |   207 |  \
  \  24   (0)|\n|   4 |     排序 分组                                   |            \
  \    |   207 |    24   (0)|\n|   5 |      分区范围 单个                              |\
  \                |   310 |    24   (0)|\n|   6 |       表 访问 通过本地索引 ROWID 批量处理  \
  \     | SALES          |   310 |    24   (0)|\n|   7 |        位图转换 为 ROWIDS    \
  \                   |                |       |            |\n|*  8 |         位图索引\
  \ 单值                           | SALES_TIME_BIX |       |            |\n|*  9 |\
  \   视图                                          |                |   105 |    19\
  \   (0)|\n|  10 |    窗口缓冲区                                   |                |\
  \   105 |    19   (0)|\n|  11 |     排序 分组                                   |  \
  \              |   105 |    19   (0)|\n|  12 |      分区范围 单个                    \
