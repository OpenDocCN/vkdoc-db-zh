- "# 子查询合并\n\n子查询合并是 Oracle 11gR2 引入的一项转换技术，目前仍处于发展初期。代码清单 13-28 展示了少数几个能够应用此转换的案例之一。\n\
  \n## 代码清单 13-28. 子查询合并\n\n```sql\nSELECT *\n  FROM sh.sales s1\n WHERE    EXISTS\n\
  \             (SELECT /*+   coalsesce_sq */\n                     /* no_coalesce_sq\
  \ */\n                    *\n               FROM sh.sales s2\n              WHERE\
  \     s1.time_id = s2.time_id\n                    AND s2.amount_sold > s1.amount_sold\
  \ + 100)\n       OR EXISTS\n             (SELECT /*+   coalsesce_sq */\n       \
  \              /* no_coalesce_sq */\n                    *\n               FROM\
  \ sh.sales s3\n              WHERE     s1.time_id = s3.time_id\n               \
  \     AND s3.amount_sold < s1.amount_sold - 100);\n\n-- 未转换的执行计划 (NO_COALESCE_SQ)\n\
  \n| Id  | Operation                                   | Name           | Cost (%CPU)|\n\
  \n|   0 | SELECT STATEMENT                            |                |  1205K\
  \  (1)|\n|*  1 |  FILTER                                     |                |\
  \            |\n|   2 |   PARTITION RANGE ALL                       |          \
  \      |   518   (2)|\n|   3 |    TABLE ACCESS FULL                        | SALES\
  \          |   518   (2)|\n|   4 |   PARTITION RANGE SINGLE                    |\
  \                |     1   (0)|\n|*  5 |    TABLE ACCESS BY LOCAL INDEX ROWID BATCHED|\
  \ SALES          |     1   (0)|\n|   6 |     BITMAP CONVERSION TO ROWIDS       \
  \      |                |            |\n|*  7 |      BITMAP INDEX SINGLE VALUE \
  \             | SALES_TIME_BIX |            |\n|   8 |   PARTITION RANGE SINGLE\
  \                    |                |     1   (0)|\n|*  9 |    TABLE ACCESS BY\
  \ LOCAL INDEX ROWID BATCHED| SALES          |     1   (0)|\n|  10 |     BITMAP CONVERSION\
  \ TO ROWIDS             |                |            |\n|* 11 |      BITMAP INDEX\
  \ SINGLE VALUE              | SALES_TIME_BIX |            |\n\nPredicate Information\
  \ (identified by operation id):\n\n1 - filter( EXISTS (SELECT /*+ NO_COALESCE_SQ\
  \ */ 0 FROM \"SH\".\"SALES\"\n              \"S2\" WHERE \"S2\".\"TIME_ID\"=:B1\
  \ AND \"S2\".\"AMOUNT_SOLD\">:B2+100) OR  EXISTS\n              (SELECT 0 FROM \"\
  SH\".\"SALES\" \"S3\" WHERE \"S3\".\"TIME_ID\"=:B3 AND\n              \"S3\".\"\
  AMOUNT_SOLD\"<:B4-100))\n   5 - filter(\"S2\".\"AMOUNT_SOLD\">:B1+100)\n   7 - access(\"\
  S2\".\"TIME_ID\"=:B1)\n   9 - filter(\"S3\".\"AMOUNT_SOLD\"<:B1-100)\n  11 - access(\"\
  S3\".\"TIME_ID\"=:B1)\n\n-- 转换后的查询\n\nSELECT *\n  FROM sh.sales s1\n WHERE EXISTS\n\
  \          (SELECT *\n             FROM sh.sales s2\n            WHERE        s2.amount_sold\
  \ > s1.amount_sold + 100\n                     AND s2.time_id = s1.time_id\n   \
  \               OR     s2.amount_sold < s1.amount_sold - 100\n                 \
  \    AND s2.time_id = s1.time_id);\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation    \
  \                               | Name           | Cost (%CPU)|\n\n|   0 | SELECT\
  \ STATEMENT                            |                |   358K  (1)|\n|*  1 |\
  \  FILTER                                     |                |            |\n\
  |   2 |   PARTITION RANGE ALL                       |                |   517   (2)|\n\
  |   3 |    TABLE ACCESS FULL                        | SALES          |   517   (2)|\n\
  |   4 |   PARTITION RANGE INLIST                    |                |     5   (0)|\n\
  |*  5 |    TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| SALES          |     5   (0)|\n\
  |   6 |     BITMAP CONVERSION TO ROWIDS             |                |         \
  \   |\n|   7 |      BITMAP OR                              |                |  \
  \          |\n|*  8 |       BITMAP INDEX SINGLE VALUE             | SALES_TIME_BIX\
  \ |            |\n|*  9 |       BITMAP INDEX SINGLE VALUE             | SALES_TIME_BIX\
  \ |            |\n\nPredicate Information (identified by operation id):\n\n1 - filter(\
  \ EXISTS (SELECT 0 FROM \"SH\".\"SALES\" \"S2\" WHERE\n              (\"S2\".\"\
  TIME_ID\"=:B1 OR \"S2\".\"TIME_ID\"=:B2) AND (\"S2\".\"TIME_ID\"=:B3 AND\n     \
  \         \"S2\".\"AMOUNT_SOLD\">:B4+100 OR \"S2\".\"TIME_ID\"=:B5 AND\n       \
  \       \"S2\".\"AMOUNT_SOLD\"<:B6-100)))\n   5 - filter(\"S2\".\"TIME_ID\"=:B1\
  \ AND \"S2\".\"AMOUNT_SOLD\">:B2+100 OR\n              \"S2\".\"TIME_ID\"=:B3 AND\
  \ \"S2\".\"AMOUNT_SOLD\"<:B4-100)\n   8 - access(\"S2\".\"TIME_ID\"=:B1)\n   9 -\
  \ access(\"S2\".\"TIME_ID\"=:B1)\n```\n\n代码清单 13-28 中的两个子查询通过 `OR` 组合在一起，这意味着它们无法被反嵌套。然而，这两个子查询可以被合并。请注意，未转换查询的执行计划包含一个具有三个子节点的\
  \ `FILTER` 操作，这意味着两个子查询过滤器是分别应用的。而转换后执行计划中的 `FILTER` 操作仅有两个子节点，这意味着只进行了一次过滤。\n\n\
  你会发现在转换后的执行计划中，我们将第 8 行和第 9 行两个相同的位图进行了不必要的合并。如果你自己重写这个查询，可以避免这个不必要的步骤。\n\n子查询合并是我想讨论的最后一项与子查询相关的转换。不过，还有一些其他的转换有待介绍。\n\
  \n"
- "# 其他转换\n\n在本章中，我试图将这些转换归类到逻辑组中，但有一些转换不太方便归入任何类别。让我们从“或”扩展开始。\n\n## 或扩展\n\n有时，将使用\
  \ `OR` 简洁编写的谓词改写并分开处理其各个部分是有意义的，如代码清单 13-29 所示。\n\n### 代码清单 13-29. 或扩展\n\n```sql\n\
  SELECT /*+ use_concat */\n       /* no_expand */\n      SUM (amount_sold) cnt\n\
  \ FROM sh.sales JOIN sh.products USING (prod_id)\nWHERE time_id = DATE '1998-03-31'\
  \ OR prod_name = 'Y Box';\n\n-- 未转换的执行计划 (NO_EXPAND)\n\n| Id  | Operation      \
  \       | Name     | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT      |          |\
  \   522   (2)|\n|   1 |  SORT AGGREGATE       |          |            |\n|*  2 |\
  \   HASH JOIN           |          |   522   (2)|\n|   3 |    TABLE ACCESS FULL\
  \  | PRODUCTS |     3   (0)|\n|   4 |    PARTITION RANGE ALL|          |   517 \
  \  (2)|\n|   5 |     TABLE ACCESS FULL | SALES    |   517   (2)|\n\nPredicate Information\
  \ (identified by operation id):\n\n2 - access(\"SALES\".\"PROD_ID\"=\"PRODUCTS\"\
  .\"PROD_ID\")\n       filter(\"SALES\".\"TIME_ID\"=TO_DATE(' 1998-03-31 00:00:00',\n\
  \              'syyyy-mm-dd hh24:mi:ss') OR \"PRODUCTS\".\"PROD_NAME\"='Y Box')\n\
  \n-- 转换后的查询 (近似)\n\nWITH q1\n     AS (SELECT amount_sold\n           FROM sh.sales\
  \ JOIN sh.products USING (prod_id)\n          WHERE prod_name = 'Y Box'\n      \
  \   UNION ALL\n         SELECT amount_sold\n           FROM sh.sales JOIN sh.products\
  \ USING (prod_id)\n          WHERE time_id = DATE '1998-03-31' AND LNNVL (prod_name\
  \ = 'Y Box'))\nSELECT SUM (amount_sold) cnt\n  FROM q1;\n\n-- 转换后的执行计划 (默认)\n\n\
  | Id  | Operation                                     | Name           | Cost (%CPU)|\n\
  ```\n\n\n\n"
