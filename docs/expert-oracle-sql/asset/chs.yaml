  \ HASH JOIN | | 358 (0) |\n| 2 | TABLE ACCESS FULL | CUST_CACHE | 2 (0) |\n|* 3\
  \ | HASH JOIN | | 356 (0) |\n| 4 | TABLE ACCESS FULL | PROD_CACHE | 2 (0) |\n| 5\
  \ | VIEW | VW_ST_456F1C80 | 354 (0) |\n| 6 | NESTED LOOPS | | 350 (0) |\n| 7 | PARTITION\
  \ RANGE ALL | | 58 (0) |\n| 8 | BITMAP CONVERSION TO ROWIDS | | 58 (0) |\n| 9 |\
  \ BITMAP AND | | |\n| 10 | BITMAP MERGE | | |\n| 11 | BITMAP KEY ITERATION | | |\n\
  | 12 | BUFFER SORT | | |\n| 13 | TABLE ACCESS FULL | PROD_CACHE | 2 (0) |\n|* 14\
  \ | BITMAP INDEX RANGE SCAN | SALES_PROD_BIX | |\n| 15 | BITMAP MERGE | | |\n| 16\
  \ | BITMAP KEY ITERATION | | |\n| 17 | BUFFER SORT | | |\n| 18 | TABLE ACCESS FULL\
  \ | CUST_CACHE | 2 (0) |\n|* 19 | BITMAP INDEX RANGE SCAN | SALES_CUST_BIX | |\n\
  | 20 | TABLE ACCESS BY USER ROWID | SALES | 296 (0) |\n\n谓词信息（通过操作标识识别）：\n1 - 访问(`\"\
  ITEM_1\"=\"C\".\"CUST_ID\"`)\n3 - 访问(`\"ITEM_2\"=\"P\".\"PROD_ID\"`)\n14 - 访问(`\"\
  S\".\"PROD_ID\"=\"P\".\"PROD_ID\"`)\n19 - 访问(`\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\"\
  `)\n\n你可能会好奇为什么我创建了真实的临时表，而不是使用因子化子查询。嗯，我使用的逻辑流程实际上与 CBO 真正使用的逻辑有很大不同，而且截至 12cR1，CBO\
  \ 似乎还无法处理这样的因子化子查询；在这个例子中，CBO 甚至被 ANSI 连接的 `USING` 子句搞糊涂了。\n\n注意第 12 和 17 行的 `BUFFER\
  \ SORT` 操作。看起来 `BITMAP KEY ITERATION` 操作要求输入是排序的。当输入是索引时（到目前为止的情况就是这样），这会自动发生；我们本可以通过将\
  \ `CUST_CACHE` 和 `PROD_CACHE` 表组织为索引组织表来避免排序，但我有点跑题了。\n\n好消息是，在实际应用中，你不需要创建临时表或做其他任何花哨的事情。如果你将\
  \ `STAR_TRANSFORMATION_ENABLED` 设置为 `TRUE`（而不是 `TEMP_DISABLE`），CBO 会为你解决所有这些问题。代码清单\
  \ 13-39 显示了当 `STAR_TRANSFORMATION_ENABLED` 设置为 `TRUE` 时，代码清单 13-35 的执行计划。\n\n代码清单\
  \ 13-39. star_transformation_enabled=true 时的最终星型转换\n\n```\n| 标识 | 操作 | 名称 | 成本 (%CPU)\
  \ |\n```\n\n\n\n## 执行计划分析\n\n```\n|   0 | SELECT STATEMENT                     \
