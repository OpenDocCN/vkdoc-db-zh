  )\n   9 - access(ROWID=ROWID)\n```\n\n清单 13-18 表明，如果我们直接运行或解释清单 13-17 的转换后查询，它将经历进一步的转换。现在我们有了两个独立的查询块，CBO\
  \ 可以在任何连接之前聚合来自 `SH.SALES` 的数据。在与 `SH.PRODUCTS` 连接之后、与 `SH.CUSTOMERS` 连接之前，数据被再次聚合。在此阶段引入了一个额外且不必要的聚合：第\
  \ 4 行和第 6 行的操作本可以被合并。\n\n这一分析引出了一个有趣的 SQL 调优技术：通过观察 CBO 执行了哪些转换，我们可以通过迭代运行转换过程来进一步改进。可能并非所有这些转换在实践中都有效，但至少你会有一些想法可以尝试！\n\
  \n\n我们已经在本书中看到了大量简单视图合并的示例，现在让我们简要地正式审视一下 Listing 13-20 中的转换。\n\n### 简单视图合并\n\n\
  ```\nWITH q1\n     AS (SELECT /*+   MERGE */\n                /* NO_MERGE */\n \
  \              CASE prod_category\n                   WHEN 'Electronics' THEN amount_sold\
  \ * 0.9\n                   ELSE amount_sold\n                END\n            \
  \       AS adjusted_amount_sold\n           FROM sh.sales JOIN sh.products USING\
  \ (prod_id))\n  SELECT adjusted_amount_sold, COUNT (*) cnt\n    FROM q1\nGROUP BY\
  \ adjusted_amount_sold;\n```\n\n-- 未转换的执行计划 (NO_MERGE)\n```\n| Id  | Operation \
  \                | Name                 | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT\
