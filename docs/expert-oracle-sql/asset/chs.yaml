  \ id):\n\n4 - access(\"C1\"=\"C3\")\n   8 - access(\"T1\".\"C1\"=\"T2\".\"C2\")\n\
  \  11 - access(\"T3\".\"C3\"=\"T4\".\"C4\")\n```\n\n此例中的访问谓词与三个 `HASH JOIN` 操作相关。\n\
