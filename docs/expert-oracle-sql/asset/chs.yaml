  \ 的消费者时，都会构建一个与第 13 行的 `HASH GROUP BY` 相关联的工作区。然后，在 `:TQ10001` 活动期间，DFO `Q1,02`\
  \ 实际上被暂停。当 `:TQ10002` 变为活动状态并从工作区读取数据时，`PQSS2` 恢复 DFO `Q1,02`，此时它充当生产者。\n\n上面的规则\
  \ 2 指出，TQ 的消费者不能将数据转发到另一个 TQ。然而——在第 10 行收到数据时——看起来第 3 行的哈希连接第二部分将开始生成行并将其发送到第 2\
