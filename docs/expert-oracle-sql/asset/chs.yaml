  \ 20 行。当然，在实际生活中，数字 21 和 40 将是绑定变量。\n\n## 是否需要 ORDER BY 子句？\n\nOracle 在这个话题上有相当多的政治姿态。理论上，除非你提供`ORDER\
  \ BY`子句，否则 Oracle 不会保证数据库会按正确的顺序返回行。官方立场是，除非你提供`ORDER BY`子句，否则 Oracle 不能保证清单 17-12\
  \ 和 17-14 中的查询在未来的版本中会产生正确顺序的结果。\n\nOracle 采取这种立场有充分的理由。当 10gR1 发布时，许多依赖于`SORT GROUP\
  \ BY`排序的查询在执行计划被更改为使用新引入的、更高效的`HASH GROUP BY`操作时崩溃了。一些客户因此不公平地批评了 Oracle 破坏客户代码。Oracle\
  \ 不想被视为纵容任何可能被解释为先例的行为，也不想传递`ORDER BY`子句不必要的信息。\n\n然而，当你像我在清单 17-12 和 17-14 中那样对子句进行重度暗示时，代码在将来版本中崩溃的风险很小，即使崩溃了，也一定会有解决方法。让我反过来论证一下。事实证明，如果你避免\
  \ ANSI 语法，你可以给清单 17-14 添加`ORDER BY`子句，而不会发生额外的排序。我不会为了政治正确而那样做，因为如果你升级到更高版本，存在额外排序可能悄悄潜入的风险！\n\
  \n如果你想在下班后争论 Oracle 政治，你总是可以提起排序哈希集群这个话题。排序哈希集群是集群的一个晦涩变体，在 10gR1 中作为优化排序的一种方式被引入。但是这个优化只有在你*不*包含显式的`ORDER\
  \ BY`子句时才有效！\n\n实际上，这些都是无稽之谈。业务需求是让关键查询运行得快，所以做需要做的事，把风险记录在你的风险登记册中留给后人，然后继续你的生活。\n\
  \n## 减少排序的行数\n\n我们花了相当长的篇幅讨论了通过减少排序的列数来减少排序数据量的各种方法。另一种减少排序数据量的方法是排序更少的行，这种方法也有可能通过避免比较来减少\
  \ CPU。减少排序中的行数有时说起来容易做起来难。让我们从一个相对简单的案例开始：向带有分析函数的查询中添加谓词。\n\n## 使用分析函数添加额外的谓词\n\
  \n几年前，我与一位客户合作——我称他为 John——他在一家投资银行的风险管理团队工作。John 需要他的 Oracle 数据库做一些花哨的分析——至少对我这个非数学家来说似乎很花哨。John\
  \ 不仅需要看到移动平均值，还需要看到移动标准差、移动中值和许多其他移动指标。通常移动的时间窗口相当小。让我用`SH.SALES`表来转述 John 的一个问题。看看清单\
  \ 17-15，它实现了一个移动平均。\n\n## 清单 17-15. 移动平均的首次尝试\n\n\n## SQL 查询优化示例\n\n### 初始查询及其执行计划\n\
  \n```sql\nWITH q1\n     AS (SELECT s.*\n               ,AVG (\n                \
  \   amount_sold)\n                OVER (\n                   PARTITION BY cust_id\n\
  \                   ORDER BY time_id\n                   RANGE BETWEEN INTERVAL\
  \ '6' DAY PRECEDING AND CURRENT ROW)\n                   avg_weekly_amount\n   \
  \        FROM sh.sales s)\nSELECT *\n  FROM q1\n WHERE time_id = DATE '2001-10-18';\n\
  ```\n\n| Id  | Operation             | Name  | Rows  | Bytes |TempSpc| Cost |\n\
