  \    | Name     | Cost (%CPU)| A-Rows |A-Time   | Buffers | Reads  |\n\n|   0 |\
  \ SELECT STATEMENT         |          | 75014 (100)|      1 | 00:00.67|   74497\
  \ |    494 |\n|   1 |  SORT AGGREGATE          |          |            |      1\
  \ |00:00.67 |   74497 |    494 |\n|   2 |   TABLE ACCESS BY INDEX R| T1       |\
  \ 75014   (1)|  80000 |00:00.65 |   74497 |    494 |\n|   3 |    INDEX RANGE SCAN\
  \      | T1_N1_N2 |   231   (0)|  80000 |00:00.23 |     214 |    214 |\n```\n\n\
  清单 14-5 删除了索引 `T1_N1`，并在列 `N1` 和 `N2` 上创建了索引 `T1_N1_N2`。当我们现在运行查询时，CBO 选择了全表扫描。当我们使用\
  \ hint 强制使用新索引时，我们看到 CBO 给多列索引操作赋予的成本比考虑使用单列索引 `T1_N1` 访问时高得多。为什么？`T1_N1_N2` 比 `T1_N1`\
  \ 稍大，但这并不能解释成本的大幅增加。CBO 错了吗？\n\n嗯，既对又不对。如果你查看索引操作的运行时统计信息，你会看到，事实上，一致读的数量大幅增加了（从\
  \ 清单 14-4 中的 440 增加到 清单 14-5 中的 74,497），这正是 CBO 所怀疑的，因为索引中加入了 `N2`。逻辑 I/O 大量增加的原因是\
  \ `T1_N1_N2` 中的索引条目排序方式与 `T1_N1` 中的不同。我构造数据的方式使得 `T1_N1_N2` 中连续的索引条目几乎保证引用不同的表块，而\
  \ `T1_N1` 中大多数连续的索引条目引用相同的表块，并且可以作为同一个逻辑 I/O 操作的一部分进行处理。这种差异反映在 `T1_N1_N2` 的索引聚类因子统计信息中，该值为\
  \ 18,991,249（几乎等于表中的行数，符合预期），远高于 `T1_N1` 的聚类因子。这解释了 CBO 如何得出对使用 `T1_N1_N2` 的查询的相应更高的成本估算。\n\
  \n尽管 CBO 正确地意识到通过 `T1_N1_N2` 进行索引访问涉及大量的逻辑 I/O 操作，但它没有意识到这些操作是针对同一小组表块的。因此，索引访问只有\
  \ 494 次物理 I/O，经过的时间同样很低。全表扫描的物理 I/O 次数高达 71,592 次，因为表并未完全保存在缓冲区缓存中。\n\n### 传递闭包\n\
  \n如果你在互联网上搜索传递闭包的定义，你可能会找到很多令人困惑的数学术语。让我给你一个外行人的解释：如果 `A=B` 且 `B=C`，那么 `A=C`。真的很简单，但你可能会惊讶于\
  \ Oracle 对传递闭包的理解是多么有限。清单 14-6 展示了三个有趣的查询及其相关的执行计划。\n\n清单 14-6. 传递闭包示例\n\n```\n\
  CREATE TABLE t3 AS SELECT ROWNUM c1 FROM DUAL CONNECT BY LEVEL <=10;\nCREATE TABLE\
  \ t4 AS SELECT MOD(ROWNUM,10)+100 c1 FROM DUAL CONNECT BY LEVEL <= 100;\nCREATE\
  \ TABLE t5 AS SELECT MOD(ROWNUM,10) c1,RPAD('X',30) filler FROM DUAL\n         \
  \                    CONNECT BY LEVEL <= 10000;\n\nCREATE INDEX t5_i1 ON t5(c1);\n\
  \nSELECT COUNT (*)\n   FROM t3, t5\n  WHERE t3.c1 = t5.c1 AND t3.c1 = 1;\n\n| Id\
  \  | Operation             | Name  | Rows  |\n\n|   0 | SELECT STATEMENT      |\
  \       |     1 |\n|   1 |  SORT AGGREGATE       |       |     1 |\n|   2 |   MERGE\
  \ JOIN CARTESIAN|       |  1000 |\n|*  3 |    TABLE ACCESS FULL  | T3    |     1\
  \ |\n|   4 |    BUFFER SORT        |       |  1000 |\n|*  5 |     INDEX RANGE SCAN\
  \  | T5_I1 |  1000 |\n\nPredicate Information(identified by operation id):\n\n3\
  \ - filter(\"T3\".\"C1\"=1)\n   5 - access(\"T5\".\"C1\"=1)\n\nSELECT *\n  FROM\
  \ t3, t4, t5\n WHERE t3.c1 = t4.c1 AND t4.c1 = t5.c1;\n\n| Id  | Operation     \
  \               | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT\
  \ STATEMENT             |       |     1 |    39 |     8  (13)| 00:00:01 |\n|   1\
  \ |  NESTED LOOPS                |       |       |       |            |        \
  \  |\n|   2 |   NESTED LOOPS               |       |     1 |    39 |     8  (13)|\
  \ 00:00:01 |\n|*  3 |    HASH JOIN                 |       |     1 |     6 |   \
  \  7  (15)| 00:00:01 |\n|   4 |     TABLE ACCESS FULL        | T3    |    10 | \
  \   30 |     3   (0)| 00:00:01 |\n|   5 |     TABLE ACCESS FULL        | T4    |\
  \   100 |   300 |     3   (0)| 00:00:01 |\n|*  6 |    INDEX RANGE SCAN         \
  \ | T5_I1 |  1000 |       |     1   (0)| 00:00:01 |\n|   7 |   TABLE ACCESS BY INDEX\
  \ ROWID| T5    |     1 |    33 |     1   (0)| 00:00:01 |\n\nPredicate Information\
  \ (identified by operation id):\n\n3 - access(\"T3\".\"C1\"=\"T4\".\"C1\")\n   6\
  \ - access(\"T4\".\"C1\"=\"T5\".\"C1\")\n\nSELECT *\n  FROM t3, t4, t5\n WHERE t3.c1\
  \ = t5.c1 AND t4.c1 = t5.c1;\n\n| Id  | Operation           | Name | Rows  | Bytes\
  \ | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT    |      |     1 |    39\
  \ |    25   (4)| 00:00:01 |\n|*  1 |  HASH JOIN          |      |     1 |    39\
  \ |    25   (4)| 00:00:01 |\n|*  2 |   HASH JOIN         |      |     1 |    36\
  \ |    22   (5)| 00:00:01 |\n|   3 |    TABLE ACCESS FULL| T4   |   100 |   300\
  \ |     3   (0)| 00:00:01 |\n|   4 |    TABLE ACCESS FULL| T5   | 10000 |   322K|\
  \    18   (0)| 00:00:01 |\n|   5 |   TABLE ACCESS FULL | T3   |    10 |    30 |\
  \     3   (0)| 00:00:01 |\n\nPredicate Information(identified by operation id):\n\
  \n1 - access(\"T3\".\"C1\"=\"T5\".\"C1\")\n   2 - access(\"T4\".\"C1\"=\"T5\".\"\
  C1\")\n```\n\n"
- "# Oracle CBO 的优化器转换与数据访问策略\n\n我们第一个查询中的谓词是 `T3.C1=1` 和 `T3.C1=T5.C1`。如果查看此第一个查询的执行计划中显示的过滤谓词，您会看到\
  \ `T3.C1=T5.C1` 谓词已被替换为 `T5.C1=1`。当存在字面值或绑定变量时，传递闭合在简单情况下通常能被识别，但任何更复杂的情况都会使 CBO\
  \ 感到困惑。第二和第三个查询在语义上是等价的。两个谓词 `T3.C1=T4.c1 AND T4.C1=T5.C1` 显然等价于另外两个谓词 `T3.C1=T5.c1\
  \ AND T4.C1=T5.c1`。这两对谓词都意味着所有三个列是相同的。然而，我们可以看到最后两条语句选择的执行计划是不同的：CBO 没有“传递闭合”转换。除非两个执行计划的性能完全相同，否则它们不可能都是最优的！但是，“传递闭合”只是\
  \ CBO 未来可能实现、但目前尚不存在的众多潜在转换之一。让我们更深入地思考一下其含义。\n\n## 不支持的转换\n\n考虑 清单 14-7 中的两条 SQL\
  \ 语句。看看并判断您认为哪一条语句写得更好。\n\n清单 14-7. 不支持的转换\n\n```sql\nCREATE TABLE t6\nAS\n SELECT\
  \ ROWNUM c1,MOD(ROWNUM, 2) c2, RPAD ('X', 10) filler\n         FROM DUAL\n   CONNECT\
  \ BY LEVEL <= 1000;\nCREATE TABLE t7 AS\n    SELECT ROWNUM c1,ROWNUM c2 FROM DUAL\
  \ CONNECT BY LEVEL <= 10;\n\nCREATE INDEX t6_i1 ON t6(c2,c1);\n\nWITH subq AS\n\
  \     (SELECT   t6.c2, MAX (t6.c1) max_c1\n          FROM t6\n      GROUP BY t6.c2)\n\
  SELECT c2, subq.max_c1\n  FROM t7 LEFT JOIN subq USING (c2);\n```\n\n```\n| Id \
  \ | Operation            | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n\n| \
  \  0 | SELECT STATEMENT     |      |    10 |   290 |     4  (23)| 00:00:01 |\n|*\
  \  1 |  HASH JOIN OUTER     |      |    10 |   290 |     4  (23)| 00:00:01 |\n|\
  \   2 |   TABLE ACCESS FULL  | T7   |    10 |    30 |     2   (0)| 00:00:01 |\n\
  |   3 |   VIEW               |      |     2 |    52 |     2  (20)| 00:00:01 |\n\
  |   4 |    HASH GROUP BY     |      |     2 |    14 |     2  (20)| 00:00:01 |\n\
  |   5 |     TABLE ACCESS FULL| T6   |  1000 |  7000 |     2   (0)| 00:00:01 |\n\n\
  Predicate Information (identified by operation id):\n\n1 - access(\"T7\".\"C2\"\
  =\"SUBQ\".\"C2\"(+))\n```\n\n```sql\nSELECT c2, (SELECT /*+ no_unnest */ MAX (c1)\n\
  \              FROM t6\n             WHERE t6.c2 = t7.c2) max_c1\n  FROM t7;\n```\n\
  \n```\n| Id  | Operation                    | Name  | Rows  | Bytes | Cost (%CPU)|\
  \ Time     |\n\n|   0 | SELECT STATEMENT             |       |    10 |    30 | \
  \    3   (0)| 00:00:01 |\n|   1 |  SORT AGGREGATE              |       |     1 |\
  \     8 |            |          |\n|   2 |   FIRST ROW                  |      \
  \ |     1 |     8 |     2   (0)| 00:00:01 |\n|*  3 |    INDEX RANGE SCAN (MIN/MAX)|\
  \ T6_I1 |     1 |     8 |     2   (0)| 00:00:01 |\n|   4 |  TABLE ACCESS FULL  \
  \         | T7    |    10 |    30 |     3   (0)| 00:00:01 |\n\nPredicate Information\
  \ (identified by operation id):\n\n3 - access(\"T6\".\"C2\"=:B1)\n```\n\n如果您仔细查看这两条语句，会发现它们在语义上是等价的。两个查询都列出了来自\
  \ `T7` 的所有行，以及 `T6` 中匹配 `C2` 值对应的最大值（如果有）。那么，哪一种构造更优呢？\n\n清单 14-7 中的上半部分查询将获取 `T6`\
  \ 中每个 `C2` 值对应的 `C1` 最大值。这个计算保证对 `T6` 中的每个 `C2` 值只执行一次。\n\n下半部分查询的构造方式使得仅对 `T7`\
  \ 中存在的 `C2` 值计算 `C1` 的最大值。然而，对于 `T7` 中存在的某个 `C2` 值，其对应的 `C1` 最大值可能会被计算多次。子查询缓存可能会缓解这种情况。此外，我们还需考虑在\
  \ 清单 10-8 中介绍的 `MAX/MIN` 优化。\n\n是否觉得熟悉？我们应该把所有事情做一次（包括我们可能永远不需要做的事情），还是应该避免做我们永远不需要做的事情，即使冒着把需要做的事情做多次的风险？这与围绕使用索引访问和嵌套循环与哈希连接及全表扫描的争论是完全相同的思路。请让您的思维朝这个方向思考。这正是问题的关键所在。\n\
  \n因此，数据的性质和是否有合适的索引似乎决定了哪种构造更优。如果 `T7` 是一个只有几行的小表，而 `T6` 有数百万行、数千个不同的 `C2` 值，那么后者构造似乎更优。另一方面，如果\
  \ `T7` 有数百万行，而 `T6` 只有几千行（虽小但足以危及标量子查询缓存），那么可能最好使用前一种构造。\n\n但还有一个最后的复杂情况：Oracle\
  \ 12cR1 通常会反嵌套下半部分查询，将其转换为前一种形式。要防止这种启发式转换发生，您需要包含一个 `NO_UNNEST` 提示。\n\n## 缺失信息\n\
  \nCBO 可能无法识别合适执行计划的另一个原因是，它不理解业务规则。如果您不以某种方式将业务规则嵌入到 SQL 中，CBO 最终可能会做出错误的决定。请看 清单\
  \ 14-8，它显示了对示例 `OE` 模式中 `ORDERS` 表的两个查询。\n\n清单 14-8. 缺失的信息\n\n```sql\nselect sales_rep_id,sum(order_total)\
  \ from oe.orders where order_status=7 group by sales_rep_id order by sales_rep_id;\n\
  ```\n\n```\n| Id  | Operation          | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n\n|   0 | SELECT STATEMENT   |        |     9 |   144 |     4  (25)| 00:00:01\
  \ |\n|   1 |  SORT GROUP BY     |        |     9 |   144 |     4  (25)| 00:00:01\
  \ |\n|*  2 |   TABLE ACCESS FULL| ORDERS |    73 |  1168 |     3   (0)| 00:00:01\
  \ |\n```\n\n```sql\nselect sales_rep_id,sum(order_total) from oe.orders\nwhere order_status=7\
  \ and sales_rep_id is not null group by sales_rep_id order by sales_rep_id;\n```\n\
  \n```\n| Id  | Operation                    | Name             | Rows  | Cost (%CPU)|\
  \ Time     |\n\n|   0 | SELECT STATEMENT             |                  |     9\
  \ |     2   (0)| 00:00:01 |\n|   1 |  SORT GROUP BY NOSORT        |            \
  \      |     9 |     2   (0)| 00:00:01 |\n|*  2 |   TABLE ACCESS BY INDEX ROWID|\
  \ ORDERS           |    49 |     2   (0)| 00:00:01 |\n|*  3 |    INDEX FULL SCAN\
  \           | ORD_SALES_REP_IX |    70 |     1   (0)| 00:00:01 |\n```\n\n第一个查询列出了\
  \ `ORDER_STATUS` 为 7 的每个 `SALES_REP_ID` 的总订单价值。执行计划使用了全表扫描，并使用排序对数据进行分组，因为输出数据需要排序。\n\
  \n第二个查询所做的完全相同，只是我们添加了一个额外的谓词 `SALES_REP_ID is not null`。如您所见，这个额外的谓词导致了一个完全不同的执行计划，除其他外，该计划不需要排序。关键在于，`SALES_REP_ID`\
  \ 上没有 `NOT NULL` 约束，因为一些交易，包括所有在线销售，没有销售员。然而，您可能知道 `ORDER_STATUS=7` 意味着使用了 `salesman`。¹\
  \ 除非您提供这个额外的谓词，否则 CBO 无法知道使用该索引是安全的，因此可能会产生一个较差的执行计划。\n\n## 糟糕的物理设计\n\n\n"
- '# 第十四章 剩余问题


  我是那种喜欢在事情出错时责怪他人或其他事物的人之一。我妻子会告诉你，在我心里，从来不是我的错。这正是我喜欢 **CBO**（基于成本的优化器）的一点。当性能不佳时，它是一个很好的替罪羊！当我的
  SQL 执行得很差时（是的，我有时会写出性能不佳的 SQL），我通常可以声称 CBO 本应发现我的错误并修复它。然而，**CBO** 不能为缺失的索引背锅！我得找别人来怪罪这个！


  当然，物理数据库设计远不止是确定要创建哪些索引。其中最重要的考虑之一是确定要删除哪些索引。下一章，第十五章，将更详细地探讨物理数据库设计的主题，所以我现在就停笔。我只希望你将糟糕的物理设计加入那份不断增长的“出错原因”清单中。


  ## 争用


  当 **CBO** 考虑为一条语句使用何种执行计划时，它不会假设同时可能有其他数据库活动在进行。对并发活动的考虑可能会影响最优执行计划。


  考虑以下场景。我们连续运行十个作业。第一个作业向表`T1`中插入数据，其`JOB_ID=1`。第二个作业插入`JOB_ID=2`的数据，依此类推。假设在执行最后一个作业时，我们决定查询`JOB_ID=1`的部分数据。我们的查询指定了`WHERE
  JOB_ID=1 AND PRODUCT_CODE=27`。**CBO** 对任何争用问题浑然不觉，它选择使用`PRODUCT_CODE`上的索引，因为该索引更具选择性且聚簇因子较低。但第十个作业正在大量插入`PRODUCT_CODE=27`的行。这意味着我们的查询可能需要做大量工作来回滚这些插入，并将数据块重构成查询开始时的样子。


  现在假设我们提示查询使用`JOB_ID`上的索引。使用选择性较低的`JOB_ID`索引可能更高效，因为查询运行时，`JOB_ID=1`的那部分索引不会被更新。此外，被访问的表数据块早已填满且不会被更新。通过`JOB_ID`索引访问的索引和表数据块在我们的查询过程中均未被更新这一事实，可能限制甚至消除回滚活动。我曾经处理过一个运行数小时的查询，通过更改查询使用一个表面上看起来很差的索引，执行时间降到了几分钟！


  ## 总结


  本章可能让你感到沮丧。所有这些关于似乎永无止境的、阻止 **CBO** 制定出最优执行计划的原因的负面谈论，可能令人望而生畏。而我的清单只是触及了表面。还有许多导致出错的原因我甚至没有在此涵盖。一条
  SQL 语句越复杂，特别是其谓词越复杂，**CBO** 猜对的可能性就越小。别太沮丧。本章的主要目的是摘掉你可能一直戴着的玫瑰色眼镜。一旦你理解了事情确实会出错以及它们出错的主要原因，你就处于更有利的位置去采取行动！让我们现在就开始着手解决吧。进入第十五章，看看良好的物理数据库设计如何帮助提升
  SQL 性能。


  __________________


  ¹更合理的建议或许是：直销有销售代表，而在线销售没有。遗憾的是，示例数据并未遵循该规则！


  '
- '# 第十五章


  ![image](img/frontdot.jpg)


  ## 物理数据库设计


  为了让运行时引擎以足够的性能执行 SQL 语句，你必须为它提供一台配置合理的机器，具有足够的 **SGA**（系统全局区）和 **PGA**（程序全局区）。然而，物理数据库设计也至关重要：即使机器配置合理、SQL
  语句编写良好、**CBO** 完美地做出了所有基数估计，除非你关注物理数据库设计，否则也不太可能获得良好的性能。


  ### 关于 EXADATA 的一点说明


  有人认为 **Exadata** 的一个好处是，你无需担心物理数据库设计：全表扫描成本极低，硬件资源又如此充足，谁会在乎呢？


  我觉得这有点夸张。是的，花数月时间设计物理模型可能不划算，但人们总会希望有效利用硬件。考虑物理数据库设计几乎总是一个好主意。


  本章回顾了物理数据库设计中更为关键的方面，这是我们无法归咎于 **CBO** 的少数 SQL 性能问题之一。


  人们常常将“改进物理数据库设计”等同于“添加索引”。这与事实相去甚远，我们将在本章开头比较索引的积极和消极方面。一旦你断定需要一个或多个索引，你仍面临许多决策：索引中要包含哪些列，是否使用位图索引等等。我们将探讨其中的一些问题。


  分区选项是提高性能的一个流行且有效的工具，我将介绍我认为最重要的三个分区性能优势：对表的部分进行全表扫描、使用分区连接的能力以及并行化的更多可能性。


  在某些圈子里，“反规范化”这个词被视为邪恶，就像“提示”一样。而就像提示一样，反规范化在 SQL 性能调优中有一席之地。我将在本章后面介绍物化视图和其他形式的反规范化。我将用一些关于压缩和
  **LOB**（大型对象）的评论来结束本章。


  然而，在我们开始之前，我想再次强调，物理数据库设计几乎从来不是针对单个 SQL 语句进行调优。你通常是寻找优化整个应用程序的方法。在我们讨论索引时，这个想法应该牢记在你脑海中。


  ## 添加与删除索引


  想象一下，你正在查看一个查询的执行计划。你看到一个索引被用于访问表，但该索引的选择性并不高：经常访问了一个表数据块，然后因为未索引列上的谓词，索引中指定的行被丢弃。“啊哈，”你说，“让我创建一个新索引，包含我的查询中所有谓词引用的列，这样一切就都会好了。”你创建了新索引（或向现有索引添加了列）……瞧！你的查询运行得很快，你拍拍自己的背。这种行为太常见了，它反映了一种不恰当的思考索引和物理数据库设计的方式——你不应该零敲碎打地添加索引来优化单个查询。你需要思考的是，为支持**所有**查询且不过度负担
  **DML**（数据操作语言）操作，特定表所需的最优索引集合。让我们首先从表的另一面看索引策略：优化 DML。


  ### 删除索引


  数据库性能中最被忽视的问题之一是表上索引过多的影响。在讨论如何最好地减少这种开销之前，让我们先详细考虑一下这种开销。


  #### 理解索引对 DML 的开销




  '
- '# 索引维护成本与识别


  如果你在一个表上有十几个索引，那么每次向该表添加一行时，都需要添加十几个索引条目。再加上对表块本身的更改，总共会产生 13 个块更改。由于这些更改是针对不同的数据库对象进行的，因此这
  13 个块更改保证会涉及不同的块。不要低估这种开销。索引占用`SGA`中的空间，增加了所需的`redo`量，并经常产生大量`I/O`。你是否见过`INSERT`语句持续等待“`db
  file sequential read`”事件？你可能假设这些等待事件与`INSERT`语句的查询部分有关。检查这一点最简单的方法是查看`V$ACTIVE_SESSION_HISTORY`或`DBA_HIST_ACTIVE_SESS_HISTORY`中的`CURRENT_OBJ#`列。这个数字代表与被访问对象相关的`DBA_OBJECTS`中的`OBJECT_ID`。你很可能会发现，大部分或全部这些等待事件都与你正在插入行的表的索引块有关；你需要在添加索引条目之前，将索引块读入`SGA`。如果你能减少一个表上的索引数量，你就可以显著提高`DML`的性能。以下是《性能调优指南》中的一段话：


  > 使用这个简单的估算指南来理解索引维护的成本：`INSERT`、`DELETE`或`UPDATE`索引键所维护的每个索引，其资源消耗大约是实际在表上执行的`DML`操作的三倍。因此，如果你向一个有三个索引的表执行`INSERT`，那么该插入操作大约比向一个没有索引的表执行`INSERT`慢
  10 倍。对于`DML`，尤其是`INSERT`密集型的应用程序，索引设计应被认真审视，这可能需要在查询性能和`INSERT`性能之间做出妥协。


  根据我见过的许多拥有数十个索引的表来看，许多开发员并没有意识到上述问题。要么如此，要么在解决查询性能问题的紧要关头忘记了这些信息。


  '
- '# 使用 `V$OBJECT_USAGE` 识别未使用的索引


  作为解决高开销`DML`的短期修复方法，你可以寻找未被使用的索引。这可以通过在表的所有索引或模式（schema）的所有索引上启用索引监控来实现，使用`ALTER
  INDEX ....MONITORING USAGE`命令。该命令会在视图`V$OBJECT_USAGE`中创建一行。`V$OBJECT_USAGE`视图包含一个`USED`列，该列由`ALTER
  INDEX`命令初始化为`NO`值，当索引在执行计划中被使用时，它会被更新为`YES`。其思路是，如果`USED`列的值永远保持为`NO`，那么该索引就没有被使用，因此可以安全地删除。当然，“永远”是很长的时间，但你的系统在没有使用该索引的情况下运行得越久，你对该索引永远不会被当前版本的应用程序使用的置信度就越高。


  关于`V$OBJECT_USAGE`，你应该记住以下几点：


  *   你只能在`V$OBJECT_USAGE`中查看你拥有的索引。换句话说，你必须作为模式所有者登录才能使用`V$OBJECT_USAGE`视图。

  *   对被监控索引进行统计信息收集不会导致`V$OBJECT_USAGE`中`USED`列的值发生变化。

  *   与动态性能视图不同寻常的是，重启数据库不会导致`V$OBJECT_USAGE`中任何索引的`USED`列值发生变化。

  *   通过`DML`添加或删除索引条目不会导致`V$OBJECT_USAGE`中`USED`列的值发生变化。

  *   重建或合并索引不会导致`V$OBJECT_USAGE`中`USED`列的值发生变化。

  *   当索引用于强制执行主键、唯一键或外键约束时，`V$OBJECT_USAGE`中`USED`列的值不会改变。


  最后一点值得强调：一个索引在执行计划中未被使用，并不意味着它没有履行其职责，因此在审查你考虑删除的索引时要格外小心。


  ## 移除外键约束列上的索引


  在 20 世纪 90 年代，一个关于所谓*最佳实践*的神话完全失控了。这个神话就是，*总是*需要在外键约束的引用列上创建索引。这个神话影响如此之大，以至于许多数据库设计工具会自动生成`DDL`来在这些列上创建索引。


  以`OE`示例模式中`ORDER_ITEMS`表的`ORDER_ID`列为例——该列被`ORDER_ITEMS_ORDER_ID_FK`外键约束使用，该约束引用了`ORDERS`表中的`ORDER_ID`列。现在，确实有必要在`ORDERS`表的`ORDER_ID`列上创建索引，因为`ORDER_ID`是`ORDERS`表的主键，但**没有必要**在`ORDER_ITEMS`表的`ORDER_ID`列上创建索引。


  那么，*总是*应该在像`ORDER_ITEMS.ORDER_ID`这样的列上创建索引的神话是如何盛行的呢？嗯，如果你从`ORDERS`表中`DELETE`行（或者你用`UPDATE`或`MERGE`语句更改主键），那么除非`ORDER_ITEMS.ORDER_ID`列上有索引，否则将需要一个表锁。但是，如果你不执行这样的`DELETE`语句，或者`DELETE`语句的性能并不关键，那么你就不需要这个索引。


  别误会我的意思——尽管`ORDER_ITEMS`中的`ORDER_ID`列被用于外键约束，无论如何索引该列可能仍然是个好主意。如果你使用两个表上的`ORDER_ID`列将`ORDERS`与`ORDER_ITEMS`连接起来，并且你希望从`ORDERS`表驱动一个嵌套循环进入`ORDER_ITEMS`，那么在`ORDER_ITEMS.ORDER_ID`上创建索引可能是个好主意。事实上，`OE.ORDER_ITEMS`表确实有一个名为`ITEM_ORDER_IX`的索引位于`ORDER_ID`上。


  但是，所有这些删除未使用索引的操作都只是一个快速修复。最好的做法是透彻地理解你的索引需求，并只保留那些必要的索引。


  '
- "# 识别必需的索引\n\n《性能调优指南》指出：\n\n> 索引设计在很大程度上是一个迭代过程，基于应用程序设计者生成的`SQL`。然而，通过构建用于强制主键约束的索引以及针对已知访问模式（例如人名）的索引，可以做出一个合理的开始。\n\
  \n索引设计是一个迭代过程，这一点非常正确，但我建议你在初始选择索引时要非常保守。很容易错误地假设一个索引是必需的，而实际上并非如此。在开始测试之前，你如何判断什么是*已知访问模式*？如果你有时间，我建议仅创建支持主键和唯一约束的索引，然后运行一些测试看看效果如何。\n\
  \n## 单列索引与多列索引\n\n大多数非唯一的`B-tree`索引应该是多列索引。让我先解释一下原因，然后我将讨论列的排序。\n\n### 对单列非唯一`B-tree`索引的滥用\n\
  \n`Listing 15-1`再次审视了`OE`示例模式中`ORDER_ITEMS`表的索引，特别是`ITEM_ORDER_IX`。\n\n`Listing\
  \ 15-1`. 对单列非唯一索引的滥用\n\n```sql\nSELECT *\n  FROM oe.orders JOIN oe.order_items i\
  \ USING (order_id)\n WHERE order_id = 2400;\n\n| Id  | Operation               \
  \             | Name          | Cost (%CPU)|\n```\n\n\n"
- "# 多列索引的优化策略\n\n## 查询执行计划分析\n\n| Id | Operation | Name | Cost (%CPU) |\n|---|---|---|---|\n\
  | 0 | SELECT STATEMENT | | 4 (0) |\n| 1 | NESTED LOOPS | | 4 (0) |\n| 2 | TABLE\
  \ ACCESS BY INDEX ROWID | ORDERS | 1 (0) |\n| *3 | INDEX UNIQUE SCAN | ORDER_PK\
  \ | 0 (0) |\n| 4 | TABLE ACCESS BY INDEX ROWID BATCHED | ORDER_ITEMS | 3 (0) |\n\
  | *5 | INDEX RANGE SCAN | ITEM_ORDER_IX | 1 (0) |\n\n```sql\nSELECT /*+ index(i\
  \ order_items_pk) */ *\n  FROM oe.orders JOIN oe.order_items i USING (order_id)\n\
  \ WHERE order_id = 2400;\n```\n\n| Id | Operation | Name | Cost (%CPU) |\n|---|---|---|---|\n\
  | 0 | SELECT STATEMENT | | 4 (0) |\n| 1 | NESTED LOOPS | | 4 (0) |\n| 2 | TABLE\
  \ ACCESS BY INDEX ROWID | ORDERS | 1 (0) |\n| *3 | INDEX UNIQUE SCAN | ORDER_PK\
  \ | 0 (0) |\n| 4 | TABLE ACCESS BY INDEX ROWID BATCHED | ORDER_ITEMS | 3 (0) |\n\
  | *5 | INDEX RANGE SCAN | ORDER_ITEMS_PK | 1 (0) |\n\n清单 15-1 中的第一个查询展示了人们认为`ITEM_ORDER_IX`索引设计所针对的那种查询：对特定`ORDER_ID`的查询。然而，该清单中的第二个查询使用了一个提示来强制使用支持主键约束的多列索引。强制主键的索引名为`ORDER_ITEMS_PK`。`ORDER_ITEMS_PK`索引是一个多列唯一索引，其前导列是`ORDER_ID`，而报告估算的使用`ORDER_ITEMS_PK`的成本与使用`ITEM_ORDER_IX`的成本相同：我们不需要两个索引。\n\
  \n当然，`ITEM_ORDER_IX`索引比`ORDER_ITEMS_PK`索引略小，因此实际上使用`ITEM_ORDER_IX`可能比使用`ORDER_ITEMS_PK`带来轻微的性能提升。然而，在实践中，维护`ITEM_ORDER_IX`的\
  \ DML 开销将远远超过该索引为查询带来的好处，如果这是一个真实的表，我会删除单列的`ITEM_ORDER_IX`索引。\n\n![image](img/sq.jpg)\
  \ **注意** 如果删除了`ITEM_ORDER_IX`列，当删除`ORDERS`表中的行时，仍然不会有表锁。这是因为`ORDER_ID`是`ORDER_ITEMS_PK`的前导列，因此`ORDER_ITEMS_PK`可以防止表锁。\n\
  \n## 多列非唯一索引的正确使用\n\n如果你需要在一个列上创建非唯一 B-tree 索引，那么几乎总是有意义添加额外的列到索引中，以帮助那些使用涉及多列谓词的查询。这是因为向索引添加一两个列通常对\
  \ DML 或查询增加的开销相对较小，但添加额外的索引对 DML 来说非常昂贵。清单 15-2 展示了在`OE.CUSTOMERS`表上使用一个潜在合法的索引。\n\
  \n清单 15-2. 多列索引的正确使用\n\n```sql\nSELECT *\n  FROM oe.customers\n WHERE UPPER (cust_last_name)\
  \ = 'KANTH';\n\n| Id | Operation | Name | Rows | Cost (%CPU) |\n|---|---|---|---|---|\n\
  | 0 | SELECT STATEMENT | | 2 | 4 (0) |\n| 1 | TABLE ACCESS BY INDEX ROWID BATCHED\
  \ | CUSTOMERS | 2 | 4 (0) |\n| *2 | INDEX RANGE SCAN | CUST_UPPER_NAME_IX | 2 |\
  \ 2 (0) |\n\nPredicate Information (identified by operation id):\n2 - access(UPPER(\"\
  CUST_LAST_NAME\")='KANTH')\n```\n\n```sql\nSELECT *\n  FROM oe.customers\n WHERE\
  \     UPPER (cust_first_name) = 'MALCOLM'\n       AND UPPER (cust_last_name) = 'KANTH';\n\
  \n| Id | Operation | Name | Rows | Cost (%CPU) |\n|---|---|---|---|---|\n| 0 | SELECT\
  \ STATEMENT | | 1 | 2 (0) |\n| 1 | TABLE ACCESS BY INDEX ROWID BATCHED | CUSTOMERS\
  \ | 1 | 2 (0) |\n| *2 | INDEX RANGE SCAN | CUST_UPPER_NAME_IX | 1 | 1 (0) |\n\n\
  Predicate Information (identified by operation id):\n2 - access(UPPER(\"CUST_LAST_NAME\"\
  )='KANTH' AND\n              UPPER(\"CUST_FIRST_NAME\")='MALCOLM')\n```\n\n```sql\n\
  SELECT *\n  FROM oe.customers\n WHERE UPPER (cust_first_name) = 'MALCOLM';\n\n|\
  \ Id | Operation | Name | Rows | Cost (%CPU) |\n|---|---|---|---|---|\n| 0 | SELECT\
  \ STATEMENT | | 2 | 5 (0) |\n| *1 | TABLE ACCESS FULL | CUSTOMERS | 2 | 5 (0) |\n\
  \nPredicate Information (identified by operation id):\n1 - filter(UPPER(\"CUST_FIRST_NAME\"\
  )='MALCOLM')\n```\n\n`CUST_UPPER_NAME_IX`是一个基于函数的多列索引，包含两个表达式：`UPPER (CUST_LAST_NAME)`和`UPPER\
  \ (CUST_FIRST_NAME)`。清单 15-2 表明，当查询只使用第一个表达式的谓词或使用两个表达式的谓词时，都可以使用`INDEX RANGE SCAN`。但是当查询中只使用第二个表达式时，只有昂贵且不合适的`INDEX\
  \ SKIP SCAN`可用，因此 CBO 选择进行全表扫描。\n\n让我以一个提醒来结束本节：如果你的查询只从索引中选择列，则根本不需要访问表。这意味着，即使某些查询没有包含被添加列的谓词，通过向索引添加列，这些查询的性能也可能得到提升。\n\
  \n## 多列索引中的列顺序\n\n正如清单 15-2 所示，确保常用的列或表达式出现在索引的前导边缘非常重要。但是，如果你的查询包含了指定索引中所有列的谓词，那么索引中列的顺序是否重要呢？一般来说，答案是否定的：无论索引中列的顺序如何，你的索引范围扫描都将扫描完全相同数量的索引条目。然而，除了那些只指定部分索引列的查询外，在确定索引的最佳列顺序时还有另外三个考虑因素：\n\
  \n*   如果你只想压缩索引列的一个子集，那么这些列需要出现在索引的前导边缘。我将在本章后面介绍索引压缩。\n*   如果查询例行地使用索引中的多个列对数据进行排序，那么在索引中正确排序列可能会避免显式排序。我将在第\
  \ 19 章中演示如何使用索引来避免排序。\n*   从理论上讲，如果数据是以有序或半有序的方式加载的，那么按照与表数据排序相同的方式来排列索引中的列可能会改善索引聚簇因子（从而改善查询性能）。我必须说，我个人从未遇到过在选择索引列顺序时聚簇因子是一个需要关注的问题的情况。\n\
  \n![image](img/sq.jpg) **注意** 《性能调优指南》指出，你应该“将最具选择性的列放在最前面”。这是一个著名的文档错误，截至 12cR1\
  \ 仍未纠正。\n\n#### 位图索引\n\n到目前为止，我们对索引策略的讨论明确或隐含地都限制在 B-tree 索引上。位图索引往往非常小巧，是解决一个重要问题的一种方法。\n\
  \n[内容]\n清单 15-2 表明，如果查询不包含对索引首列的谓词，通常无法高效利用多列索引。假设你有一个名为 `PROBLEM_TABLE` 的表。你有几十个对该表的常用查询，每个查询都指定了来自约六列中的两到三列的一个子集，但没有哪一列是在所有查询中都用到的。你该创建哪些索引？正是这种情况，导致一些开发人员为每个列子集创建数十个索引。这不是个好主意。\n\
  \n如果你是批量加载数据，那么位图索引可以解决这个问题：你只需在 `PROBLEM_TABLE` 上创建六个单列位图索引，而我们在 清单 10-18 中展示的\
  \ `INDEX COMBINE` 操作就可以用于在访问表之前，识别出所需的行子集。重要的是，不要试图在 DML 操作本身期间维护你的位图索引。清单 15-3\
  \ 展示了在使用位图索引时加载数据的正确方法。\n\n清单 15-3. 将数据加载到包含位图索引的分区表中\n\n```sql\nCREATE TABLE statement_part_ch15\n\
  PARTITION BY RANGE\n   (transaction_date)\n   (\n      PARTITION p1 VALUES LESS\
  \ THAN (DATE '2013-01-05')\n     ,PARTITION p2 VALUES LESS THAN (DATE '2013-01-11')\n\
  \     ,PARTITION p3 VALUES LESS THAN (DATE '2013-01-12')\n     ,PARTITION p4 VALUES\
  \ LESS THAN (maxvalue))\nAS\n   SELECT transaction_date_time\n         ,transaction_date\n\
  \         ,posting_date\n         ,description\n         ,transaction_amount\n \
  \        ,product_category\n         ,customer_category\n     FROM statement;\n\n\
  CREATE BITMAP INDEX statement_part_pc_bix\n   ON statement_part_ch15 (product_category)\n\
  \   LOCAL;\n\nCREATE BITMAP INDEX statement_part_cc_bix\n   ON statement_part_ch15\
  \ (customer_category)\n   LOCAL;\n\nALTER TABLE statement_part_ch15 MODIFY PARTITION\
  \ FOR (DATE '2013-01-11') UNUSABLE LOCAL INDEXES;\n\nINSERT INTO statement_part_ch15\
  \ (transaction_date_time\n                                ,transaction_date\n  \
  \                              ,posting_date\n                                ,description\n\
  \                                ,transaction_amount\n                         \
  \       ,product_category\n                                ,customer_category)\n\
  \   SELECT DATE '2013-01-11'\n         ,DATE '2013-01-11'\n         ,DATE '2013-01-11'\n\
  \         ,description\n         ,transaction_amount\n         ,product_category\n\
  \         ,customer_category\n     FROM statement_part_ch15;\n\nALTER TABLE statement_part_ch15\
  \ MODIFY PARTITION FOR (DATE '2013-01-11')\n            REBUILD UNUSABLE LOCAL INDEXES;\n\
  ```\n\n清单 15-3 使用我们在第 9 章创建的 `STATEMENT` 表中的数据，创建了一个分区表 `STATEMENT_PART_CH15`。在将数据加载到之前为空的、`TRANSACTION_DATE`\
  \ 为 2013 年 1 月 11 日的分区之前，该分区的索引被标记为不可用。然后，在不维护索引的情况下插入数据，最后，重建该分区的索引（特别是位图索引）。一旦你的位图索引重建完毕，它们就可以投入使用了。\n\
  \n我想强调一下，位图索引只有在你先加载数据、再重建索引、最后查询数据的情况下才具有实用价值。这在数据仓库应用中通常非常实用，但是对*可用的*位图索引进行 DML\
  \ 操作开销很大，并发性也很差。这意味着位图索引通常对于大多数其他类型的应用程序来说是不切实际的。\n\n### 位图索引的替代方案\n\n让我们回到那个 `PROBLEM_TABLE`，它的六列被各种问题查询的谓词所使用。假设现在并发的\
  \ DML 和查询使得位图索引不切实际。那该怎么办？当我们单独考虑每个查询时，最好的做法是创建一个多列索引，包含该查询中的所有列或表达式。但正如我已经强调过的，这种针对每个查询的自动化反应重复进行，可能会导致索引泛滥，从而严重降低\
  \ DML 性能。那么，有替代方案吗？\n\n你可以考虑创建六个单列 B 树索引，因为正如我在清单 10-18 中所示，`INDEX COMBINE` 操作既可以用于位图索引，也可以用于\
  \ B 树索引。然而，将 B 树索引条目转换为位图的相关操作可能代价高昂，因此六个单列 B 树索引不太可能是个好主意。你也可以只创建一个包含所有六列的大索引。这样，如果某个特定查询未使用索引的前导列，则可以使用\
  \ `INDEX FULL SCAN` 或 `INDEX SKIP SCAN` 作为替代。\n\n归根结底，你可能不得不接受这样一个事实：对于某些查询，即使你知道使用索引的嵌套循环连接会使查询性能更好，你也只能忍受全表扫描和哈希连接。\n\
  \n如果你真的非常需要优化，我将在第 19 章向你展示如何重写 SQL 来解决这个问题。\n\n### 索引组织表\n\n在我看来，索引组织表（IOT）在以下两个条件都满足时使用效果最佳：\n\
  \n-   你的表（或表分区）非常小（小于 50MB）或非常窄（主键至少占行大小的 10%）\n-   除了支持主键的那个索引外，你不需要任何其他索引\n\n\
  如果这两个条件都满足，你就可以将表的所有列存储在索引中，从而完全避免对实际表的需要。\n\n可以在 IOT 上创建额外的索引，但正如我在第 3 章中简要提到的，IOT\
  \ 上的二级索引保存了对所引用行所在位置的“猜测”，因此当“猜测”过时时，它们可能需要频繁重建。一些专家比我更看好 IOT。Martin Widlake 是 IOT\
  \ 的忠实粉丝。你可以从他的这篇博文开始阅读更多内容：`http://mwidlake.wordpress.com/2011/07/18/index-organized-tables-the-basics/`。\n\
  \n### 管理争用\n\nOracle 数据库架构的一大优点是写入器不会阻塞读取器。唉，但写入器会阻塞其他写入器！因此，本节讨论由于多个进程并发地对同一数据库对象执行\
  \ DML 而可能出现的性能问题。\n\n#### 序列争用\n\n你应该努力设计你的应用程序，使得序列生成的数字出现间隔不是问题，并且如果数字从序列中乱序生成也不会发生特别糟糕的事情。这种努力在\
  \ RAC 环境中尤其重要。一旦你对应用程序的稳定性有信心，就可以修改序列并指定 `CACHE` 和 `NOORDER` 属性。这将确保在 RAC 集群中分配序列号时，节点间的通信最小化。\n\
  \n### 热块问题\n\n当多个进程并发地向表中插入行时，无论你是使用自动段空间管理（`ASSM`）还是手动段空间管理（`MSSM`），这些行通常都会被插入到表中的不同块中。然而，多个进程经常试图同时更新同一个索引块。当索引的前导列是时间戳或从序列生成的数字时，这种情况尤其明显。\n\
  \n\n如果你尝试访问一个缓冲区，而它正被另一个会话更新，你就必须等待。在 Oracle 9i 及更早版本中，你总是会看到这种等待表现为一个“`buffer busy\
  \ waits`”事件，但从 10.1 及以后版本开始，第二个等待事件被分离出来。“`read by other session`”等待事件意味着你试图访问的缓冲区正被另一个会话更新，并且该块正由那个会话从磁盘读入缓冲区缓存。“`buffer\
  \ busy waits`”事件和“`read by other session`”等待事件都是对数据块争用的迹象，尽管当有多个会话并发读取同一个块时，你也可能看到“`read\
  \ by other session`”等待事件。\n\n当多个进程并发尝试更新同一个块时，该块被称为`热块`。热块并非总是出现在索引中，但大多数情况下是。让我们通过看一个特定于索引的解决方案来开始我们对热块争用的讨论。\n\
  \n## 反向键索引\n\n理论上，这个想法简单而优雅。想象你有一个在列`C1`上的索引`I1`，并且你通过从一个序列获取值来填充`C1`的值。三个进程可能从序列中生成值\
  \ 123,456、123,457 和 123,458，然后将行插入到你的表中。在传统索引中，索引条目将是连续的，并且很可能这些进程会争用以更新同一个索引叶块。如果你使用`REVERSE`关键字创建索引，索引条目中的字节将在插入前被反转。你可以这样想象：索引条目\
  \ 654,321、754,321 和 854,321。如你所见，这些索引条目甚至不再接近连续，它们将被插入到不同的块中。这并非完全准确：是索引条目中的字节被反转，而不是数字中的位数，但概念是一样的。这看起来几乎像变魔术一样，你似乎瞬间解决了你的争用问题。\n\
  \n现实情况并不像最初看起来那么优雅。有两个大问题。第一个问题是`INDEX RANGE SCAN`（索引范围扫描）被限制在`C1`的特定值。如果你有一个带有谓词`WHERE\
  \ C1 BETWEEN 123456 AND 123458`的查询，CBO 将无法使用范围扫描来找到这三个索引条目，因为它们分散在索引各处。\n\n反向键索引的第二个问题是，热块问题现在变成了冷块问题。在反转索引之前，进程之间可能存在争用，但至少只需要将一个索引块读入\
  \ SGA。当你反转索引时，索引条目将被插入到各处，除非索引的所有叶块都能被缓存在 SGA 中，否则索引的磁盘读取急剧增加的风险是真实存在的。\n\n我要感谢\
  \ Oracle 的“真实世界性能”团队，他们让我了解到一个可能更优的热索引块问题解决方案。那就是全局分区索引。\n\n#### 全局分区索引\n\n无论底层表是否分区，你都可以以一种完全独立于底层表任何分区策略的方式来分区索引。这样的索引被称为`全局分区索引`。清单\
  \ 15-4 展示了如何做到这一点。\n\n**清单 15-4. 创建一个全局分区索引**\n\n```sql\nCREATE TABLE global_part_index_test\n\
  (\n   c1   INTEGER\n  ,c2   VARCHAR2 (50)\n  ,c3   VARCHAR2 (50)\n);\n\nCREATE UNIQUE\
  \ INDEX gpi_ix\n   ON global_part_index_test (c1)\n   GLOBAL PARTITION BY HASH (c1)\n\
  \      PARTITIONS 32;\n\nALTER TABLE global_part_index_test ADD CONSTRAINT global_part_index_test_pk\
  \ PRIMARY KEY (c1);\n\nSELECT *\n  FROM global_part_index_test\n WHERE c1 BETWEEN\
  \ 123456 AND 123458;\n\n| Id | Operation                            | Name     \
  \              |\n\n|  0 | SELECT STATEMENT                     |              \
  \          |\n|  1 |  PARTITION HASH ALL                  |                    \
  \    |\n|  2 |   TABLE ACCESS BY INDEX ROWID BATCHED| GLOBAL_PART_INDEX_TEST |\n\
  |  3 |    INDEX RANGE SCAN                  | GPI_IX                 |\n```\n\n\
  清单 15-4 创建了用于支持主键约束的索引，将其作为全局哈希分区索引。对索引的插入将分散在 32 个分区中，从而显著降低争用水平，就像反向键索引一样。但与我们的反向键索引不同，我们没有失去对多个`C1`值执行范围扫描的能力。从执行计划的第\
  \ 1 行可以看到，运行时引擎需要检查所有 32 个分区，因此索引范围扫描比未分区的索引成本更高，但至少它们是可行的。\n\n我们也解决了冷块问题。想象一下，向一个大型表插入\
  \ 1,024 行数据，`C1`值从 1 到 1,024。如果`C1`是用反向键索引索引的，我们很可能会将索引条目插入到 1,024 个不同的块中。另一方面，假设我们能在单个块中存储超过\
  \ 32 个索引条目，那么当`C1`像清单 15-4 中那样被索引时，我们的 1,024 个索引条目将仅存储在 32 个块中。这是因为一个哈希分区的`C1`值（大约\
  \ 32 个）在该分区内将是连续的！所以，正如 Graham Wood 所说，我们的块是“温的”，并且这 32 个块很可能可以保持在缓冲区缓存中。\n\n全局分区索引有缺点吗？是的。它们难以维护——甚至比在分区表上维护未分区的全局索引更困难。\n\
  \n想象你有一个 1TB 的表。你创建了五个全局哈希分区索引，每个索引使用 32 个哈希分区。现在你升级了硬件，并使用数据泵导出/导入将 1TB 表迁移到新机器上，然后尝试重建索引。你需要扫描整个\
  \ 1TB 表来重建每个索引分区，无论表上有什么分区策略。那就是 5 x 32 = 160 次对你的 1TB 表的全表扫描！\n\n解决重建问题的一个方案是，按哈希对表进行（子）分区，然后使用本地索引。对表进行（子）分区还有一个额外好处，就是降低表本身发生争用的风险。\n\
  \n## 初始 ITL 条目\n\n当事务第一次更新一个块时，它会使用块中感兴趣事务列表（ITL）里的一个条目。如果一个块中的所有 ITL 条目都被未提交的事务占用，并且块中有空间添加新条目，那么就会添加一个新的\
  \ ITL 条目。一个 ITL 条目消耗 24 字节，因此如果你预分配 100 个条目，在一个 8K 的块中大约会浪费四分之一的空间。默认情况下，表块的初始 ITL\
  \ 槽数量为 1，索引块为 2。如果你看到大量名为“`enq: TX - allocate ITL entry`”的等待事件，那么等待进程由于块内空间不足而无法分配新的\
  \ ITL 条目。解决此问题的直接方法是增加索引或表中块最初分配的 ITL 条目数量。要将索引`I1`的初始 ITL 条目数从两个增加到五个，语法是`ALTER\
  \ INDEX I1 INITRANS 5`，但请记住以下几点：\n\n*   对`INITRANS`的更改不会影响索引或表中已格式化的块。你可能需要重建索引或移动表。\n\
  *   解决了 ITL 争用问题，并不意味着你不会再遇到其他争用问题。\n\n\n\n如果您遇到 ITL（兴趣事务列表）条目争用问题，可能更好的方法是避免问题而非解决它：使用反向键或全局哈希分区索引可能同时消除您的\
  \ ITL 问题，因为并发添加的新索引条目很可能位于不同的块，因此也位于不同的 ITL 中。现在让我们看看另一种减少块争用的方法。\n\n## 分散数据\n\n\
  仅仅因为两个会话试图更新同一个表块，并不意味着它们试图更新该块中的同一行。同样，仅仅因为两个会话试图更新同一个索引块，也不意味着它们试图更新同一个索引条目。如果您的数据库对象很小，您可以尝试减少每个表块的行数或每个索引块的索引条目数以缓解争用。\n\
  \n假设您有 50 个会话，每个会话都频繁更新表中一个特定于会话的小行。如果不做特殊处理，所有 50 行最终都会位于同一个块中，您可能会看到大量的`缓冲区忙等待`事件。由于表非常小，您或许可以负担得起将行分散开，每行一个块以避免争用。实际上有几种方法可以实现这一点。清单\
  \ 15-5 展示了其中一种方法。\n\n### 清单 15-5. 确保每个块只有一行\n\n```sql\nCREATE TABLE process_status\n\
  (\n   process_id                 INTEGER PRIMARY KEY\n  ,status                \
  \     INTEGER\n  ,last_job_id                INTEGER\n  ,last_job_completion_time\
  \   DATE\n  ,filler_1                   CHAR (100) DEFAULT RPAD (' ', 100)\n)\n\
  PCTFREE 99\nPCTUSED 1;\n\nINSERT INTO process_status (process_id)\n       SELECT\
  \ ROWNUM\n         FROM DUAL\n   CONNECT BY LEVEL <= 50;\n\nBEGIN\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname     => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'PROCESS_STATUS');\nEND;\n/\n\nUPDATE process_status\n     SET status = 1,\
  \ last_job_id = 1, last_job_completion_time = SYSDATE\n WHERE process_id = 1;\n\
  ```\n\n```\n| 编号 | 操作                 | 名称             |\n|---|---|---|\n|   0 |\
  \ UPDATE STATEMENT   |                |\n|   1 |  UPDATE            | PROCESS_STATUS\
  \ |\n|   2 |   INDEX UNIQUE SCAN| SYS_C005053    |\n```\n\n清单 15-5 创建了一个名为`PROCESS_STATUS`的表，该表存储\
  \ 50 行数据，每行对应一个应用程序进程。我们尝试减少`PROCESS_STATUS`表每个块中的行数，方法是将`PCTFREE`设置为 99，这意味着一旦\
  \ 8K 块的 1%被使用，就不再向表中插入行。但我们的行长度小于 81 字节，因此我们需要添加一个额外的列，我称之为`FILLER_1`。现在，当我们插入 50\
  \ 行时，它们都将进入不同的块。任何针对单行的`UPDATE`语句都将通过索引找到专用的块，并且不会与更新表中其他行的其他会话发生争用。\n\n### 分区\n\
  \n专家之间轻松辩论的一个热门话题是，分区选项的主要优势是与管理简便性相关，还是与性能提升相关。当然，分区既提供了管理方面的优势，也提供了性能方面的优势。我们已经讨论了全局哈希分区索引和哈希分区表如何帮助缓解热点块争用。现在让我们看看分区带来的其他一些与性能相关的优势。\n\
  \n### 对分区或子分区的全表扫描\n\n想象一下，您的表存储了 10 个工作日的 100,000 行数据，总计 1,000,000 行。假设每个块大约可以容纳\
  \ 100 行，那么您的表总共有大约 10,000 个块。让我们以乐观的态度看待这个问题，并假设所有行都按业务日期完美聚簇，使得特定业务日期的所有行都位于 10,000\
  \ 个块中的 1,000 个块中。现在假设您想要读取特定业务日期的所有 10,000 行。为简化起见，我们假设缓冲区缓存中没有任何数据。您认为索引访问还是全表扫描更好？\n\
  \n实际上，两种选择都不太理想。如果您使用全表扫描，那么您将读取并丢弃 10,000 个块中的 9,000 个块。如果您使用索引读取表块，那么您只会访问所需的\
  \ 1,000 个块，但它们将通过 1,000 次单块读取来读取。\n\n我们真正想要的是，通过多块读取读取选定业务日期的 1,000 个块，而不必理会其他 9,000\
  \ 个块。正如我将在第 19 章中展示的，可以重写 SQL 来实现这一点，但这非常棘手。如果您按业务日期对表进行分区，您将有 10 个表段，每个段大小为 1,000\
  \ 个块，而不是一个单独的 10,000 块的段。在分区消除之后，您的查询可以对单个 1,000 块的段执行一次全表扫描。如果这 1,000 个块已经在缓冲区缓存中，那么通过索引访问块与通过全表扫描访问块之间可能不会有巨大的性能差异。但如果选定的\
  \ 1,000 个块都需要从磁盘读取，那么全表扫描将使用多块读取这一事实意味着它将比使用索引快得多。\n\n因此，分区使全表扫描更具吸引力，这反过来可能使一些原本需要的索引变得多余。一举两得！\n\
  \n#### 分区智能连接\n\n如果您连接两个以相同方式分区的表，并且连接谓词中包含了分区列，那么您可以执行所谓的*完全分区智能连接*。清单 15-6 展示了一个正在运行的完全分区智能连接。\n\
  \n#### 清单 15-6. 串行执行的完全分区智能连接\n\n```sql\nCREATE TABLE orders_part\n(\n   order_id\
  \           INTEGER NOT NULL\n  ,order_date         DATE NOT NULL\n  ,customer_name\
  \      VARCHAR2 (50)\n  ,delivery_address   VARCHAR2 (100)\n)\nPARTITION BY LIST\n\
  \   (order_date)\n   SUBPARTITION BY HASH (order_id)\n      SUBPARTITIONS 16\n \
  \  (\n      PARTITION p1 VALUES (DATE '2014-04-01')\n     ,PARTITION p2 VALUES (DATE\
  \ '2014-04-02'));\n\nCREATE UNIQUE INDEX orders_part_pk\n   ON orders_part (order_date,\
  \ order_id)\n   LOCAL;\n\nALTER TABLE orders_part\n   ADD CONSTRAINT orders_part_pk\
  \ PRIMARY KEY\n  (order_date,order_id);\n\nCREATE TABLE order_items_part\n(\n  \
  \ order_id        INTEGER NOT NULL\n  ,order_item_id   INTEGER NOT NULL\n  ,order_date\
  \      DATE NOT NULL\n  ,product_id      INTEGER\n  ,quantity        INTEGER\n \
  \ ,price           NUMBER\n  ,CONSTRAINT order_items_part_fk FOREIGN KEY\n     \
  \ (order_date, order_id)\n       REFERENCES orders_part (order_date, order_id)\n\
  )\nPARTITION BY REFERENCE (order_items_part_fk);\n\nCREATE UNIQUE INDEX order_items_part_pk\n\
  \   ON order_items_part (order_date, order_id, order_item_id)\n   COMPRESS 1\n \
  \  LOCAL;\n\nALTER TABLE order_items_part\n   ADD CONSTRAINT order_items_part_pk\
  \ PRIMARY KEY\n  (order_date,order_id,order_item_id);\n\nSELECT /*+ leading(o i)\
  \ use_hash(i) no_swap_join_inputs(i) */\n       *\n  FROM orders_part o JOIN order_items_part\
  \ i USING (order_id);\n```\n\n```\n| 编号 | 操作                 | 名称             |\n\
  ```\n\n\n\n"
- "# 执行计划与分区表连接分析\n\n## 执行计划对比\n\n以下展示了两个不同的执行计划，对应于不同的查询方式：\n\n```\n|   0 | SELECT\
  \ STATEMENT         |                  |\n|   1 |  HASH JOIN               |   \
  \               |\n|   2 |   PARTITION LIST ALL     |                  |\n|   3\
  \ |    PARTITION HASH ALL    |                  |\n|   4 |     TABLE ACCESS FULL\
  \    | ORDERS_PART      |\n|   5 |   PARTITION REFERENCE ALL|                  |\n\
  |   6 |    TABLE ACCESS FULL     | ORDER_ITEMS_PART |\n```\n\n第一个查询语句如下，它使用了提示（hints）来获取一个易于理解的典型执行计划：\n\
  \n```sql\nSELECT /*+ leading(o i) use_hash(i) no_swap_join_inputs(i) */\n      \
  \ *\n  FROM orders_part o JOIN order_items_part i USING (order_date, order_id);\n\
  ```\n\n第二个执行计划对应于仅使用 `order_id` 列进行连接的查询：\n\n```\n| Id  | Operation            |\
  \ Name             |\n|   0 | SELECT STATEMENT     |                  |\n|   1 |\
  \  PARTITION LIST ALL  |                  |\n|   2 |   PARTITION HASH ALL |    \
  \              |\n|   3 |    HASH JOIN         |                  |\n|   4 |   \
  \  TABLE ACCESS FULL| ORDERS_PART      |\n|   5 |     TABLE ACCESS FULL| ORDER_ITEMS_PART\
  \ |\n```\n\n## 分区表连接分析\n\nListing 15-6 创建了两个表：`ORDERS_PART` 和 `ORDER_ITEMS_PART`。`ORDERS_PART`\
  \ 表按 `ORDER_DATE` 列表分区，并按 `ORDER_ID` 哈希子分区。它包含两个 `ORDER_DATE` 值的分区，每个 `ORDER_DATE`\
  \ 有 16 个子分区，总计 32 个子分区。主键本应仅为 `ORDER_ID`，但我们做了一个常见且实用的妥协：将 `ORDER_DATE` 添加到主键中，以便可以使用本地索引来强制执行约束。\n\
  \n`ORDER_ITEMS_PART` 表按引用分区，这意味着在创建时它有 32 个分区，每个分区对应 `ORDER_ITEMS` 的一个子分区。每当向 `ORDERS_PART`\
  \ 添加或删除一个分区时，`ORDER_ITEMS_PART` 将相应地添加或删除 16 个分区。\n\n当我们连接这两个表时会发生什么？Listing 15-6\
  \ 中的第一个查询仅使用 `ORDER_ID` 列连接两个表。从执行计划的第 5 行可以看出，对于 `ORDERS_PART` 的每个子分区，都会扫描 `ORDER_ITEMS_PART`\
  \ 的全部 32 个子分区。这是因为 CBO 不知道特定的 `ORDER_ID` 值只出现在 `ORDER_ITEMS_PART` 的一个分区中。\n\n当我们把\
  \ `ORDER_DATE` 添加到连接列列表中时，可以看到 `PARTITION REFERENCE ALL` 操作消失了，这意味着对于 `ORDER_ORDERS_PART`\
  \ 的每个子分区，只扫描 `ORDER_ITEMS_PART` 的一个分区。在 Listing 15-6 的后一个查询中，由于两个表中用于定义分区和子分区的所有列都出现在连接条件中，成功地在\
  \ `ORDER_ITEMS_PART` 上实现了分区消除。\n\n![image](img/sq.jpg) **提示** 引用分区的一个假定好处是，你可以使用仅存在于父表中的列对子表进行分区。然而，Listing\
  \ 15-6 表明，如果你试图通过从 `ORDER_ITEMS_PART` 中省略 `ORDER_DATE` 列来规范化设计，你将发现无法使用完全分区智能连接（full\
  \ partition-wise joins）。用于分区或子分区父表的所有列都应存在于子表中。\n\n那么我们获得了什么好处？如果我们根本没有对表进行分区，我们将得到一个涉及整个表的大哈希连接，而现在我们有\
  \ 32 个小的哈希连接。关键在于，这些小的哈希连接更有可能完全在内存中完成，而大型哈希连接则更有可能溢出到磁盘。\n\n到目前为止，我们只看了串行分区智能连接。当我们考虑并行化时，分区智能连接的真正优势才变得显而易见。\n\
  \n## 并行分区连接\n\n我在 Listings 11-17 和 11-18 中分别给出了完全和部分分区智能连接的示例，但为了回顾，Listing 15-7\
  \ 获取了 Listing 15-6 中的后一个查询并以并行方式运行它。\n\n**Listing 15-7. 并行完全分区智能连接**\n\n```sql\n\
  SELECT /*+ leading(o i) use_hash(i) no_swap_join_inputs(i)\n           parallel(16)\
  \ PQ_DISTRIBUTE(I NONE NONE)*/\n       *\n  FROM orders_part o JOIN order_items_part\
  \ i USING (order_date,order_id);\n\n| Id  | Operation               | Name     \
  \        |\n|   0 | SELECT STATEMENT        |                  |\n|   1 |  PX COORDINATOR\
  \         |                  |\n|   2 |   PX SEND QC (RANDOM)   | TQ10000:     \
  \    |\n|   3 |    PX PARTITION HASH ALL|                  |\n|   4 |     HASH JOIN\
  \           |                  |\n|   5 |      TABLE ACCESS FULL  | ORDERS_PART\
  \      |\n|   6 |      TABLE ACCESS FULL  | ORDER_ITEMS_PART |\n```\n\n## 数据库反规范化策略\n\
  \n我并非逻辑数据库设计方面的权威专家，但我相信逻辑数据库设计应该是规范化的。然而，一旦你有了初始整洁、规范化的逻辑模型，作为物理数据库设计过程的一部分，你通常需要对其进行反规范化，以获得良好的性能。本节描述了一些你可能需要反规范化数据库的方法，从物化视图开始。\n\
  \n### 物化视图\n\n创建物化视图有两个原因。一个原因是为了自动化将数据从一个数据库复制到另一个数据库。第二个原因是为了性能目的对数据进行反规范化。性能是我们这里关注的重点，主要有两类与性能相关的物化视图：\n\
  \n*   **物化连接视图** 存储两个或多个表连接的结果。\n*   **物化汇总视图** 存储聚合的结果。\n\n当然，你也可以创建一个既连接表又执行聚合的物化视图。如果相同的连接和/或聚合操作频繁执行，那么创建物化视图可能是有意义的，这样工作只需执行一次。物化视图提供了一些很好的功能：\n\
  \n*   **查询重写（Query rewrite）**。这是我在 Listing 13-30 中展示的一个优化器转换示例。你不需要重写你的查询来利用物化视图。\n\
  *   **物化视图日志（Materialized view logs）**。这些可用于跟踪物化视图所基于的表的变化，以便可以将更改增量地应用到物化视图。\n\
  *   **提交时刷新（Refresh on commit）**。使用此选项，每当对物化视图所基于的表进行更改时，物化视图都会使用物化视图日志以增量方式更新。\n\
  \n这只是物化视图功能的一个简介。关于这个复杂功能的完整教程，我推荐《数据仓库指南》。《数据仓库指南》还描述了 `DIMENSION` 数据库对象，它们用于支持行内聚合值。\n\
  \n### 手动聚合与连接表\n\n实际上，物化视图对于许多应用程序来说可能过于复杂。你不一定希望处理发生或未按预期发生的查询重写：你可以直接编写查询来访问物化视图数据。你不一定希望担心物化视图日志和提交时刷新可能对\
  \ DML 性能产生的重大性能影响：你可以自己刷新物化视图。\n\n\n\n如果那是你的立场，那么你根本不需要使用 Oracle 物化视图功能。例如，在数据仓库应用中，你可以在每日加载流程结束时自行生成聚合数据。你可以将聚合数据加载到常规表中，供在线时段内的查询使用。\n\
  \n你也不一定需要同时维护数据的规范化和反规范化副本。例如，你可以将维度表中常用的列存储在事实表中，从而消除连接操作。这种反规范化甚至可能避免对星型转换的需求。但如果星型转换的高成本或复杂性是你的主要顾虑，那么有一个潜在的更优解决方案。我将在接下来介绍该方案。\n\
  \n请记住，反规范化会带来数据库不一致的风险，你应该考虑是否需要构建一些保护措施（例如对账作业）来缓解该风险。\n\n## 位图连接索引\n\n位图连接索引实际上是一种非常特殊的反规范化形式。它们主要用于避免星型转换。我必须说，我个人最初觉得位图连接索引的概念很难理解。让我分阶段、慢慢地阐述这个概念。\n\
  \n常规的单列 B 树索引获取列的每个不同值，并为拥有该值的每一行创建一个索引条目。被索引表中的匹配行通过`ROWID`来标识。位图索引类似，只是匹配行通过位图而非`ROWID`列表来标识。基于函数的位图索引与常规位图索引类似，只是位图与表达式关联，而非与表中显式存储的值关联。与基于函数的位图索引类似，位图连接索引中的索引值并不显式地作为被索引表中的一列出现，而是间接地与索引值相关联。我想是时候举个例子了。请看\
  \ Listing 15-8，其中展示了我们如何使用位图连接索引来改进 Listing 13-35 中的查询。\n\nListing 15-8. 位图连接索引\n\
  \n```\nCREATE TABLE sales_2\nPARTITION BY RANGE (time_id)\n   (PARTITION pdefault\
  \ VALUES LESS THAN (maxvalue))\nAS\n   SELECT *\n     FROM sh.sales\n    WHERE time_id\
  \ = DATE '2001-10-18';\n\nCREATE TABLE customers_2\nAS\n   SELECT * FROM sh.customers;\n\
  \nCREATE TABLE products_2\nAS\n   SELECT * FROM sh.products;\n\nALTER TABLE products_2\n\
  \   ADD CONSTRAINT products_2_pk PRIMARY KEY\n (prod_id) ENABLE VALIDATE;\n\nALTER\
  \ TABLE customers_2\n   ADD CONSTRAINT customers_2_pk PRIMARY KEY\n (cust_id) ENABLE\
  \ VALIDATE;\n\nBEGIN\n   DBMS_STATS.gather_table_stats (\n      ownname   => SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   => 'SALES_2');\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'CUSTOMERS_2');\n   DBMS_STATS.gather_table_stats (\n      ownname   => SYS_CONTEXT\
  \ ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname   => 'PRODUCTS_2');\nEND;\n/\n\n\
  CREATE BITMAP INDEX sales_2_cust_ln_bjx\n   ON sales_2 (c.cust_last_name)\n   FROM\
  \ customers_2 c, sales_2 s\n   WHERE c.cust_id = s.cust_id\n   LOCAL;\n\nCREATE\
  \ BITMAP INDEX sales_prod_category_bjx\n   ON sales_2 (p.prod_category)\n   FROM\
  \ products_2 p, sales_2 s\n   WHERE s.prod_id = p.prod_id\n   LOCAL;\n\nSELECT prod_name\n\
  \      ,cust_first_name\n      ,time_id\n      ,amount_sold\n  FROM customers_2\
  \ c, products_2 p, sales_2 s\n WHERE     s.cust_id = c.cust_id\n       AND s.prod_id\
  \ = p.prod_id\n       AND c.cust_last_name = 'Everett'\n       AND p.prod_category\
  \ = 'Electronics';\n\n| Id  | Operation                                     | Name\
  \                    |\n|---|---|---|\n|   0 | SELECT STATEMENT                \
  \              |                         |\n|   1 |  NESTED LOOPS              \
  \                   |                         |\n|   2 |   NESTED LOOPS        \
  \                        |                         |\n|   3 |    HASH JOIN     \
  \                             |                         |\n|   4 |     TABLE ACCESS\
  \ FULL                         | PRODUCTS_2              |\n|   5 |     PARTITION\
  \ RANGE SINGLE                    |                         |\n|   6 |      TABLE\
  \ ACCESS BY LOCAL INDEX ROWID BATCHED| SALES_2                 |\n|   7 |      \
  \ BITMAP CONVERSION TO ROWIDS             |                         |\n|   8 | \
  \       BITMAP AND                             |                         |\n|  \
  \ 9 |         BITMAP INDEX SINGLE VALUE             | SALES_2_CUST_LN_BJX     |\n\
  |  10 |         BITMAP INDEX SINGLE VALUE             | SALES_PROD_CATEGORY_BJX\
  \ |\n|  11 |    INDEX UNIQUE SCAN                          | CUSTOMERS_2_PK    \
  \      |\n|  12 |   TABLE ACCESS BY INDEX ROWID                 | CUSTOMERS_2  \
  \           |\n```\n\nListing 15-8 创建了`SH.SALES`、`SH.CUSTOMERS`和`SH.PRODUCTS`表的副本，而不是对\
  \ Oracle 提供的示例模式进行 DDL 更改。在创建任何位图连接索引之前，我们需要在`CUSTOMERS_2`和`PRODUCTS_2`表上创建已启用、已验证的主键约束。示例模式中的约束并未经过验证。\n\
  \n我们创建的第一个位图索引是`SALES_2_CUST_LN_BJX`。此索引标识`SALES_2`表中与`CUSTOMERS_2`表中每个`CUST_LAST_NAME`值相关联的所有行。此位图索引使我们能够识别`SALES_2`中与姓氏为\
  \ Everett 的客户相关联的所有行，而无需访问`CUSTOMERS_2`表。类似地，`SALES_PROD_CATEGORY_BJX`使我们能够识别`SALES_2`中与“电子产品”类别中的产品相关联的行，而无需访问`PRODUCTS_2`表。通过组合这些索引，我们可以找到`SALES_2`中同时匹配两组谓词的确切行集。\n\
  \n尽管位图连接索引与基于函数的索引相似，但它们也与物化连接视图非常相似。你可以创建一个物化连接视图，保存来自`CUSTOMERS_2`的`CUST_LAST_NAME`值和来自`SALES_2`的相关联的`ROWID`，这样你基本上就得到了与位图连接索引相同的东西。然而，位图连接索引比物化连接视图紧凑得多，使用效率也更高。\n\
  \n位图连接索引的最大问题（与任何位图索引一样）是，对与该索引关联的表进行 DML 操作的效率低下。实际上，在维度表上进行并行 DML 操作会将位图连接索引标记为不可用。因此，位图连接索引实际上只在数据仓库环境中才有用。\n\
  \n### 压缩\n\n压缩数据不是一种反规范化形式。除了性能变化之外，使用或不使用压缩对用户或 SQL 开发者没有可见影响。接下来让我们看看索引和表压缩。我将在稍后提到大对象（LOB）时介绍\
  \ LOB 压缩。\n\n一般来说，索引压缩和表压缩都会使 DML 操作成本更高，而使查询成本更低。这可能听起来违反直觉，因为查询需要解压缩数据。然而，正如我们将要看到的，索引和表的解压缩过程都非常廉价，并且即使是适度的逻辑\
  \ I/O 减少也将远远超过解压缩的成本。另一方面，如果在数据加载过程中看到过多的 CPU 使用，你可能需要尝试关闭压缩功能，看看是否有所不同。\n\n## 索引压缩\n\
  \n\n\n## 索引压缩\n\n索引压缩是 Oracle 中应该被广泛使用，却常被遗忘的特性之一。索引压缩是在数据块级别实现的。基本上，Oracle 使用一种称为`prefix\
  \ table`的结构来存储数据块中被压缩列的唯一值。现在，索引条目中只存储指向`prefix table`条目的指针，而不是列值本身。Oracle 允许你指定要压缩的列（如果有的话），但你的选择是受限的：语法允许你从引导列开始指定要压缩的列数。例如，你不能选择压缩第二列而不压缩第一列。\n\
  \n想象一下，在一个非压缩索引中，每个数据块有 200 行。首先，如果被压缩列的唯一值通常在每个数据块中只有一两个，那么你的`prefix table`将只包含一两个条目，你就能够在压缩索引的一个数据块中存储远多于\
  \ 200 行的数据。但是，假设在 200 个未压缩行中，你的引导列有 150 个唯一值。现在索引压缩就会成为一个问题，因为`prefix table`中的 150\
  \ 个条目将消耗掉数据块的大部分空间，所有额外的开销很可能意味着你将无法再在数据块中容纳所有 200 行。\n\n![image](img/sq.jpg) **提示**\
  \ `ANALYZE INDEX . . . VALIDATE STRUCTURE`命令可用于确定索引建议压缩的列数。建议值可以在`INDEX_STATS`表的`OPT_CMPR_COUNT`列中找到。\n\
  \n不要认为索引是唯一的，它就不能从压缩中受益。请注意，清单 15-6 中创建的`ORDER_ITEMS_PART_PK`索引在创建时指定了`COMPRESS\
  \ 1`，如果每天有大量订单行项目，这是一个完全合适的做法，因为如果不压缩它，每个`ORDER_DATE`值都会有大量的索引条目。除非每个订单中有大量行项目，否则压缩`ORDER_ID`列可能并不值得。\n\
  \n请注意，索引压缩实际上并不是真正的压缩。它实际上是一种 Oracle 所谓的*去重*形式。因此，查询无需进行真正的解压缩工作。查询只需遵循一个指针来获取`prefix\
  \ table`中的列值即可。\n\n## 表压缩\n\n表压缩有几种类型：\n\n*   **基本表压缩**。这是一种仅针对直接路径插入和表移动压缩表数据的压缩变体，不需要额外许可。\n\
  *   **OLTP 表压缩**。在 11gR1 中，此功能被称为*所有操作压缩*。基本上它与基本压缩相同，但与基本压缩不同的是，数据在非直接路径`INSERT`操作时也会被压缩。OLTP\
  \ 表压缩需要 Oracle 数据库产品的个人版或企业版。对于企业版，需要单独购买 Oracle Advanced Compression。\n*   **混合列压缩**。这是一个完全不同的功能，特定于\
  \ Exadata 和 Oracle 提供的存储。这个主题超出了本书的范围。\n\n与索引压缩类似，基本压缩和 OLTP 表压缩都基于数据块内去重的概念。换句话说，Oracle\
  \ 试图在每个数据块中只存储每个重复值一次。表压缩的实现比索引压缩稍微复杂一些。Oracle 可以重新排序列，对列的组合进行去重等等。关于表压缩内部机制的详细描述，请参阅\
  \ Jonathan Lewis 的文章，从这里开始：`http://allthingsoracle.com/compression-oracle-basic-table-compression/`。以下是一些需要注意的要点：\n\
  \n*   当你使用基本压缩创建表时，`PCTFREE`默认为 0。当你使用 OLTP 压缩创建表时，`PCTFREE`的默认值保持为 10。\n*   当你更新表中的一行时，更新后的值不会被重新压缩。这可能就是为什么\
  \ 11gR1 中 OLTP 压缩的名称“所有操作压缩”被匆忙更改的原因！\n*   对于插入后被修改的行，你可能应该谨慎使用基本或 OLTP 压缩。这意味着\
  \ OLTP 压缩最好用于通过非直接路径`INSERT`语句加载、从不修改、然后被重复读取的数据。因此，在创建使用 OLTP 压缩的表时，你可能应该覆盖`PCTFREE`的值。清单\
  \ 15-9 显示了基本语法。\n\n清单 15-9。使用 OLTP 压缩创建表并覆盖 PCTFREE\n\n```sql\n    CREATE TABLE\
  \ order_items_compress\n    (\n       order_id        INTEGER NOT NULL\n      ,order_item_id\
  \   INTEGER NOT NULL\n      ,order_date      DATE NOT NULL\n      ,product_id  \
  \    INTEGER\n      ,quantity        INTEGER\n      ,price           NUMBER\n  \
  \    ,CONSTRAINT order_items_compress_fk FOREIGN KEY\n          (order_date, order_id)\n\
  \           REFERENCES orders_part (order_date, order_id)\n    )\n    COMPRESS FOR\
  \ OLTP\n    PCTFREE 0;\n```\n\n![image](img/sq.jpg) **提示** 无论你是否使用表压缩，只要你确定表中的行绝不会因为`UPDATE`或`MERGE`操作而增大，就应该将`PCTFREE`设置为\
  \ 0。\n\n## LOB\n\n术语`LOB`代表大对象。不仅仅是 LOB 很大——这个主题也很大！事实上，Oracle 有一本完整的手册《SecureFiles\
  \ and Large Objects Developer's Guide》，专门讨论这个主题。我在这里只挑选几个关键特性。\n\n*   你的 LOB 应该在具有自动段空间管理的表空间中创建为\
  \ SecureFiles。根据手册，另一种类型的 LOB，BasicFiles，将在未来的 Oracle 数据库版本中被弃用。\n*   利用 Advanced\
  \ Compression 选项，你可以使用 LOB 去重和 LOB 压缩。\n*   你可以选择为读取缓存 LOB，或者为读写都缓存。默认情况下，根本不会在\
  \ SGA 中缓存 LOB 数据。\n*   只要你不缓存 LOB 数据，你就可以选择不记录 LOB 数据。如果你利用这个选项，`INSERT`操作的性能将会提高，但在介质恢复时你将丢失\
  \ LOB 数据。如果你可以重新加载数据，这可能没关系。\n\n## 总结\n\n本章涵盖了物理数据库设计中对 SQL 性能重要的一些特性，但它并不自称是一本全面的指南。然而，通常\
  \ SQL 性能问题最好通过物理数据库设计更改来解决，希望本章能帮助你识别这些情况。\n\n如果你从本章只记住一件事，那就是：不要盲目地添加一个索引来解决单个查询的性能问题——至少在没有经过一些思考的情况下不要这样做。\n\
  \n## 第 16 章\n\n![image](img/frontdot.jpg)\n\n## 重写查询\n\n在第 1 章的开头，我解释了假设 CBO 会得出最优执行计划，而不管你如何编写\
  \ SQL 语句，是天真的想法。到目前为止，在本书中你已经看到许多例子，其中构造不当的 SQL 语句会导致 CBO 选择不合适的执行计划，仅在上一章就有相当多的例子。本章和下一章将更详细地探讨重写\
  \ SQL 语句的主题，但我不会假装给你一份问题场景的完整列表。\n\n\n\n事实上，与几年前若撰写此章所需篇幅相比，本章内容已大幅精简；因为随着优化器转换数量的增加，引发性能问题的\
  \ SQL 结构数量反而减少了。尽管如此，仍存在许多情况：一个 SQL 语句在随意浏览者看来完全合理，但为获得可接受的性能，却需要被重写。\n\n如今，重写 SQL\
  \ 语句最常见的原因之一是解决排序性能不佳的问题，而下一章将专门深入探讨该主题。然而，在深入这一复杂主题之前，让我们先看几个本书前文未曾讨论过的简单 SQL 重写示例。\n\
  \n## 在谓词中使用表达式\n\n一般来说，应尽量避免在用于谓词的列上使用表达式。我们在清单 14-1 中已经看到，在谓词中使用函数可能导致 CBO 的基数估算错误，但这并非唯一问题。清单\
  \ 16-1 展示了表达式如何影响分区消除。\n\n清单 16-1. 谓词中的表达式与分区消除\n\n```sql\nSELECT COUNT (DISTINCT\
  \ amount_sold)\n  FROM sh.sales\n WHERE EXTRACT (YEAR FROM time_id) = 1998;\n\n\
  | Id  | Operation              | Name     | Cost (%CPU)| Pstart| Pstop |\n\n|  \
  \ 0 | SELECT STATEMENT       |          |   528   (4)|       |       |\n|   1 |\
  \  SORT AGGREGATE        |          |            |       |       |\n|   2 |   VIEW\
  \                 | VW_DAG_0 |   528   (4)|       |       |\n|   3 |    HASH GROUP\
  \ BY       |          |   528   (4)|       |       |\n|   4 |     PARTITION RANGE\
  \ ALL|          |   528   (4)|     1 |    28 |\n|   5 |      TABLE ACCESS FULL |\
  \ SALES    |   528   (4)|     1 |    28 |\n\nSELECT COUNT (DISTINCT amount_sold)\n\
  \  FROM sh.sales\n WHERE time_id >=DATE '1998-01-01' AND time_id < DATE '1999-01-01';\n\
  \n| Id  | Operation                   | Name     | Cost (%CPU)| Pstart| Pstop |\n\
  \n|   0 | SELECT STATEMENT            |          |   118   (6)|       |       |\n\
  |   1 |  SORT AGGREGATE             |          |            |       |       |\n\
  |   2 |   VIEW                      | VW_DAG_0 |   118   (6)|       |       |\n\
  |   3 |    HASH GROUP BY            |          |   118   (6)|       |       |\n\
  |   4 |     PARTITION RANGE ITERATOR|          |   113   (2)|     5 |     8 |\n\
  |   5 |      TABLE ACCESS FULL      | SALES    |   113   (2)|     5 |     8 |\n\
  ```\n\n清单 16-1 中的两个查询产生相同结果：`SH.SALES`表中 1998 年的`AMOUNT_SOLD`不同值的数量。第一个查询使用`EXTRACT`函数识别每笔销售的年份。第二个查询使用两个谓词生成日期范围。我们可以看到，后者能够执行分区消除，因此仅访问了\
  \ 1998 年的分区。而前者不得不访问表中的所有分区，因为对列值应用函数阻碍了分区消除。\n\n如果没有直接方法避免在用于谓词的列上使用函数，可能需要创建虚拟列或添加基于函数的索引，如清单\
  \ 15-2 所示。清单 16-2 展示了另一种方法。\n\n清单 16-2. 当函数应用于列时使用连接\n\n```sql\nSELECT COUNT (DISTINCT\
  \ amount_sold)\n  FROM sh.sales\n WHERE EXTRACT (MONTH FROM time_id) = 10;\n\n|\
  \ Id  | Operation              | Name     | Cost (%CPU)| Pstart| Pstop |\n\n|  \
  \ 0 | SELECT STATEMENT       |          |   528   (4)|       |       |\n|   1 |\
  \  SORT AGGREGATE        |          |            |       |       |\n|   2 |   VIEW\
  \                 | VW_DAG_0 |   528   (4)|       |       |\n|   3 |    HASH GROUP\
  \ BY       |          |   528   (4)|       |       |\n|   4 |     PARTITION RANGE\
  \ ALL|          |   528   (4)|     1 |    28 |\n|   5 |      TABLE ACCESS FULL |\
  \ SALES    |   528   (4)|     1 |    28 |\n\nSELECT COUNT (DISTINCT amount_sold)\n\
  \  FROM sh.sales s, sh.times t\n WHERE EXTRACT (MONTH FROM t.time_id) = 10 AND t.time_id\
  \ = s.time_id;\n\n| Id  | Operation                             | Name         \
  \  | Cost (%CPU)| Pstart| Pstop |\n\n|   0 | SELECT STATEMENT                  \
  \    |                |   102   (1)|       |       |\n|   1 |  SORT AGGREGATE  \
  \                     |                |            |       |       |\n|   2 | \
  \  VIEW                                | VW_DAG_0       |   102   (1)|       | \
  \      |\n|   3 |    HASH GROUP BY                      |                |   102\
  \   (1)|       |       |\n|   4 |     NESTED LOOPS                      |      \
  \          |            |       |       |\n|   5 |      NESTED LOOPS           \
  \          |                |   101   (0)|       |       |\n|   6 |       INDEX\
  \ FULL SCAN                 | TIMES_PK       |     0   (0)|       |       |\n| \
  \  7 |       PARTITION RANGE ITERATOR        |                |            |   KEY\
  \ |   KEY |\n|   8 |        BITMAP CONVERSION TO ROWIDS    |                |  \
  \          |       |       |\n|   9 |         BITMAP INDEX SINGLE VALUE     | SALES_TIME_BIX\
  \ |            |   KEY |   KEY |\n|  10 |      TABLE ACCESS BY LOCAL INDEX ROWID|\
  \ SALES          |   101   (0)|     1 |     1 |\n```\n\n清单 16-2 中的两个查询都计算`SH.SALES`表中十月份（任意年份）的`AMOUNT_SOLD`不同值的数量。第一个查询的执行计划访问了表中的所有行，因为与清单\
  \ 16-1 中的第一个查询一样，无法进行分区消除。清单 16-2 中的第二个查询对`SH.TIMES`表的`TIMES_PK`索引执行了`INDEX FULL\
  \ SCAN`。这个额外步骤增加了开销，但开销（单块访问）被超额补偿了，因为只访问了`SH.SALES`表中的匹配行。最终收益可能不明显，但你可以看到，在我的笔记本电脑上，CBO\
  \ 估计第一个查询的成本为 528，第二个查询为 102。第二个查询实际上运行得也更快！\n\n### 等式与不等式谓词\n\n在谓词中使用不等式运算符有时是不可避免的，但其误用如此频繁，以至于\
  \ SQL 调优顾问会发出警告。清单 16-3 展示了一个典型例子。\n\n清单 16-3. 不等式运算符的不当使用\n\n```sql\nCREATE TABLE\
  \ mostly_boring\n(\n   primary_key_id   INTEGER PRIMARY KEY\n  ,special_flag   \
  \  CHAR (1)\n  ,boring_field     CHAR (100) DEFAULT RPAD ('BORING', 100)\n)\nPCTFREE\
  \ 0;\n\nINSERT INTO mostly_boring (primary_key_id, special_flag)\n       SELECT\
  \ ROWNUM, DECODE (MOD (ROWNUM, 10000), 0, 'Y', 'N')\n         FROM DUAL\n   CONNECT\
  \ BY LEVEL <= 100000;\n\nBEGIN\n   DBMS_STATS.gather_table_stats (\n      ownname\
  \      => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname      => 'MOSTLY_BORING'\n\
  \     ,method_opt   => 'FOR COLUMNS SPECIAL_FLAG SIZE 2');\nEND;\n/\n\nCREATE INDEX\
  \ special_index\n   ON mostly_boring (special_flag);\n\nSELECT *\n  FROM mostly_boring\n\
  \ WHERE special_flag != 'N';\n\n| Id  | Operation         | Name          | Rows\
  \  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT  |               |    10 |   384 \
  \  (1)|\n|   1 |  TABLE ACCESS FULL| MOSTLY_BORING |    10 |   384   (1)|\n\nSELECT\
  \ *\n  FROM mostly_boring\n WHERE special_flag = 'Y';\n\n| Id  | Operation     \
  \                      | Name          | Rows  | Cost (%CPU)|\n```\n\n\n"
- "# 使用 NULL 表示一个常见值\n\n|   0 | SELECT STATEMENT                    |            \
  \   |    10 |     2   (0)|\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| MOSTLY_BORING\
  \ |    10 |     2   (0)|\n|   2 |   INDEX RANGE SCAN                  | SPECIAL_INDEX\
  \ |    10 |     1   (0)|\n\n```\nSELECT *\n  FROM mostly_boring\n WHERE special_flag\
  \ = 'N';\n```\n\n| Id  | Operation         | Name          | Rows  | Cost (%CPU)|\n\
  |   0 | SELECT STATEMENT  |               | 99990 |   384   (1)|\n|   1 |  TABLE\
  \ ACCESS FULL| MOSTLY_BORING | 99990 |   384   (1)|\n\n我创建了一个名为 `MOSTLY_BORING`\
  \ 的表，其中包含 100,000 行数据，正如你猜的那样，大部分是乏味的。然而，有十行的 `SPECIAL_FLAG` 被设置为 `Y`；其余的 99,990\
  \ 行的 `SPECIAL_FLAG` 值为 `N`。在收集统计信息时，我为 `SPECIAL_FLAG` 指定了一个直方图，以便记录这两个值的偏斜情况。当我们使用谓词\
  \ `SPECIAL_FLAG != N` 查询该表时，我们使用了全表扫描。我们无法利用我们建立的索引。当我们使用谓词 `SPECIAL_FLAG = 'Y'`\
  \ 时，可以看到使用了索引，并且预估成本节省显著。\n当我们使用谓词 `SPECIAL_FLAG = 'N'` 请求所有乏味的行时，CBO 正确地选择了全表扫描。通过索引来读取表中几乎所有的行是没有意义的。这意味着乏味行\
  \ `(SPECIAL_FLAG = 'N')` 在索引中的条目将永远不会被使用。我们可以避免存储这些行，并使我们的索引更小。我们可以通过一种被一些数据库理论家视为异端的技术来实现这一点：我们可以使用值的缺失\
  \ `(NULL)` 来表示一个乏味的行。让我们以这种方式重新加载表数据。\n\nListing 16-4 重新加载数据，使用 `NULL` 作为“值”来表示\
  \ 99,990 个乏味行，而不是 `N`。我们现在不再需要 `SPECIAL_FLAG` 上的直方图，因为现在只有一个非空值。选择乏味行的修改后查询的预估成本降低了。这是预期的，因为乏味行中移除了\
  \ `N` 值意味着表稍微变小了，全表扫描的成本也相应降低了。但是，对于选择特殊行的查询，我们看到了什么？预估成本从 2 增加到了 11！为什么？事实上，增加的预估成本是正确的，而\
  \ Listing 16-3 中的预估成本 2 太低了。为什么？嗯，`SPECIAL_INDEX` 原始聚簇因子的值表明大多数时候连续的索引条目会在同一个块中。虽然这对于大多数索引条目（那些\
  \ `SPECIAL_FLAG = 'N'` 的）是真的，但对于我们的十个特殊行来说并非如此，没有两个特殊行在同一个块中！事实上，由于数据变化，`SPECIAL_INDEX`\
  \ 的 `BLEVEL` 已从 1 减少到 0，因此无论 CBO 如何估算，我们确实从这一更改中获得了少量的性能改进。\n\nListing 16-4. 使用\
  \ NULL 表示一个常见值\n\n```\nTRUNCATE TABLE mostly_boring;\n\nINSERT INTO mostly_boring\
  \ (primary_key_id, special_flag)\n       SELECT ROWNUM, DECODE (MOD (ROWNUM, 10000),\
  \ 0, 'Y', NULL)\n         FROM DUAL\n   CONNECT BY LEVEL <= 100000;\n\nBEGIN\n \
  \  DBMS_STATS.gather_table_stats (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n\
  \     ,tabname   => 'MOSTLY_BORING');\nEND;\n/\n\nSELECT *\n  FROM mostly_boring\n\
  \ WHERE special_flag = 'Y';\n\n| Id  | Operation                           | Name\
  \          | Cost (%CPU)|\n|   0 | SELECT STATEMENT                    |       \
  \        |    11   (0)|\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| MOSTLY_BORING\
  \ |    11   (0)|\n|   2 |   INDEX RANGE SCAN                  | SPECIAL_INDEX |\
  \     1   (0)|\n\nSELECT *\n  FROM mostly_boring\n WHERE special_flag IS NULL;\n\
  \n| Id  | Operation         | Name          | Rows  | Cost (%CPU)|\n|   0 | SELECT\
  \ STATEMENT  |               | 99990 |   379   (1)|\n|   1 |  TABLE ACCESS FULL|\
  \ MOSTLY_BORING | 99990 |   379   (1)|\n```\n\n"
- "# 隐式数据类型转换\n\nOracle 数据库自动将数据从一种类型转换为另一种类型这一事实可能非常方便，特别是对于业务用户拼凑一个重要的即席查询而言，因为开发时间非常宝贵。然而，这种无声的转换可能会掩盖严重的性能问题。Listing\
  \ 16-5 展示了隐式数据类型转换可能掩盖性能问题的一种方式。\n\nListing 16-5. 隐式数据类型转换\n\n```\nCREATE TABLE\
  \ date_table\n(\n   mydate     DATE\n  ,filler_1   CHAR (2000)\n)\nPCTFREE 0;\n\n\
  INSERT INTO date_table (mydate, filler_1)\n       SELECT SYSDATE, RPAD ('x', 2000)\n\
  \         FROM DUAL\n   CONNECT BY LEVEL <= 1000;\n\nBEGIN\n   DBMS_STATS.gather_table_stats\
  \ (\n      ownname   => SYS_CONTEXT ('USERENV', 'CURRENT_SCHEMA')\n     ,tabname\
  \   => 'DATE_TABLE');\nEND;\n/\n\nCREATE INDEX date_index\n   ON date_table (mydate);\n\
  \nSELECT mydate\n  FROM date_table\n WHERE mydate = SYSTIMESTAMP;\n\n| Id  | Operation\
  \         | Name       | Rows  | Cost (%CPU)|\n|   0 | SELECT STATEMENT  |     \
  \       |    10 |    70   (0)|\n|*  1 |  TABLE ACCESS FULL| DATE_TABLE |    10 |\
  \    70   (0)|\n\nPredicate Information (identified by operation id):\n1 - filter(SYS_EXTRACT_UTC(INTERNAL_FUNCTION(\"\
  MYDATE\"))=SYS_EXTRACT_U\n              TC(SYSTIMESTAMP(6)))\n\nSELECT mydate\n\
  \  FROM date_table\n WHERE mydate = SYSDATE;\n\n| Id  | Operation        | Name\
  \       | Rows  | Cost (%CPU)|\n|   0 | SELECT STATEMENT |            |     1 |\
  \     1   (0)|\n|*  1 |  INDEX RANGE SCAN| DATE_INDEX |     1 |     1   (0)|\n\n\
  Predicate Information (identified by operation id):\n1 - access(\"MYDATE\"=SYSDATE@!)\n\
  ```\n\nListing 16-5 创建了一个表 `DATE_TABLE`，其中包含一个类型为 `DATE` 的索引列。当我们尝试将该列与 `TIMESTAMP\
  \ WITH TIMEZONE` 类型的值进行比较时，该列会被隐式转换为 `TIMESTAMP WITH TIMEZONE` 数据类型，从而无法使用索引。当我们的谓词指定了\
  \ `DATE` 类型的值时，索引就可以被使用。\n这类编码问题可能看起来很晦涩；谁会用 `SYSTIMESTAMP` 而不是 `SYSDATE`？然而，当使用绑定变量时，这类问题实际上经常发生，特别是当同一个\
  \ PL/SQL 变量用于多个 SQL 语句时。同时请记住，SQL*Plus 的 `VARIABLE` 命令只支持有限的类型，而 `DATE` 并不包括在内。\n\
  \n"
- "# 绑定变量\n\n尽管 Oracle 在释放了绑定变量窥视带来的麻烦后，引入了自适应游标共享作为损害控制措施，但我仍然建议在涉及带有直方图的列的谓词中使用绑定变量时要谨慎。让我们把\
  \ `MOSTLY_BORING` 表恢复到 Listing 16-3 中的样子，看看当我们为 `SPECIAL_FLAG` 使用绑定变量时会发生什么。\n\n\
  Listing 16-6. 绑定变量的不恰当使用\n\n```\n/*  MOSTLY_BORING 表的设置参见 Listing 16-3 */\n\nSELECT\
  \ *\n  FROM mostly_boring\n WHERE special_flag = :b1;\n\n| Id  | Operation     \
  \    | Name          | Rows  | Cost (%CPU)|\n|   0 | SELECT STATEMENT  |       \
  \        | 50000 |   384   (1)|\n|*  1 |  TABLE ACCESS FULL| MOSTLY_BORING | 50000\
  \ |   384   (1)|\n```\n\n\n表中约有 100,000 行数据，且 `SPECIAL_FLAG` 有两个可能值，因此当使用 `EXPLAIN\
  \ PLAN` 时，CBO 会假设清单 16-6 中的查询将返回 50,000 行。当然，实际上，如果我们运行该语句，基数估算和执行计划都将取决于所提供的绑定变量值。最终，无论每次执行时提供的绑定变量值如何，我们都将使用相同的计划来重复执行该语句。有几种方法可以解决此问题。你可以像我在清单\
  \ 6-7 中所做的那样复制代码，或者可以使用动态 SQL 生成带有字面值的代码。这两种方法都会创建两个具有独立计划的不同 SQL 语句。由于只有两种不同的执行计划，你也可以只编写一个带有\
  \ `UNION ALL` 的语句。请暂时记住这一点，让我们先关注 `UNION ALL`。\n\n## UNION, UNION ALL 与 OR\n\n作为一本名为\
  \ *Expert Oracle SQL* 的书籍的读者，我相信你了解 `UNION`、`UNION ALL` 和 `OR` 在语义上的区别。无论幸运与否（这取决于你的视角），许多\
  \ SQL 是由对 SQL 性能问题了解相对较少的业务用户编写的，对他们来说，这些结构之间的区别并不清晰。清单 16-7 展示了三条返回相同结果但具有截然不同执行计划的语句。\n\
  \n清单 16-7. 三条结果相同但计划不同的语句\n\n```sql\nSELECT *\n  FROM sh.customers\n WHERE cust_id\
  \ = 3228\nUNION ALL\nSELECT *\n  FROM sh.customers\n WHERE cust_id = 6783;\n```\n\
  \n```\n| Id  | Operation                    | Name         | Rows  | Cost (%CPU)|\n\
  |---  |---                           |---           |---    |---         |\n|  \
  \ 0 | SELECT STATEMENT             |              |     2 |     4  (50)|\n|   1\
  \ |  UNION-ALL                   |              |       |            |\n|   2 |\
  \   TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |     1 |     2   (0)|\n|*  3 |  \
  \  INDEX UNIQUE SCAN         | CUSTOMERS_PK |     1 |     1   (0)|\n|   4 |   TABLE\
  \ ACCESS BY INDEX ROWID| CUSTOMERS    |     1 |     2   (0)|\n|*  5 |    INDEX UNIQUE\
  \ SCAN         | CUSTOMERS_PK |     1 |     1   (0)|\n```\n\n```sql\nSELECT *\n\
  \  FROM sh.customers\n WHERE cust_id = 3228\nUNION\nSELECT *\n  FROM sh.customers\n\
  \ WHERE cust_id = 6783;\n```\n\n```\n| Id  | Operation                     | Name\
  \         | Rows  | Cost (%CPU)|\n|---  |---                            |---   \
  \        |---    |---         |\n|   0 | SELECT STATEMENT              |       \
  \       |     2 |     4  (50)|\n|   1 |  SORT UNIQUE                  |        \
  \      |     2 |     4  (50)|\n|   2 |   UNION-ALL                   |         \
  \     |       |            |\n|   3 |    TABLE ACCESS BY INDEX ROWID| CUSTOMERS\
  \    |     1 |     2   (0)|\n|*  4 |     INDEX UNIQUE SCAN         | CUSTOMERS_PK\
  \ |     1 |     1   (0)|\n|   5 |    TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |\
  \     1 |     2   (0)|\n|*  6 |     INDEX UNIQUE SCAN         | CUSTOMERS_PK | \
  \    1 |     1   (0)|\n```\n\n```sql\nSELECT *\n  FROM sh.customers\n WHERE cust_id\
  \ = 3228 OR cust_id = 6783;\n```\n\n```\n| Id  | Operation                    |\
  \ Name         | Rows  | Cost (%CPU)|\n|---  |---                           |---\
  \           |---    |---         |\n|   0 | SELECT STATEMENT             |     \
  \         |     2 |     5   (0)|\n|   1 |  INLIST ITERATOR             |       \
  \       |       |            |\n|   2 |   TABLE ACCESS BY INDEX ROWID| CUSTOMERS\
  \    |     2 |     5   (0)|\n|*  3 |    INDEX UNIQUE SCAN         | CUSTOMERS_PK\
  \ |     2 |     3   (0)|\n```\n\n清单 16-7 中的三条语句都返回两行——且是完全相同的两行。然而，这些语句的执行计划却各不相同。要理解其原因，请看清单\
  \ 16-8 中的三个查询。\n\n清单 16-8. UNION, UNION ALL 与 OR 产生不同结果\n\n```sql\nSELECT cust_first_name,\
  \ cust_last_name\n  FROM sh.customers\n WHERE cust_first_name = 'Abner'\nUNION ALL\n\
  SELECT cust_first_name, cust_last_name\n  FROM sh.customers\n WHERE cust_last_name\
  \ = 'Everett';  -- 返回 144 行\n```\n\n```\n| Id  | Operation          | Name     \
  \ | Rows  | Cost (%CPU)|\n|---  |---                 |---        |---    |---  \
  \       |\n|   0 | SELECT STATEMENT   |           |   173 |   845  (51)|\n|   1\
  \ |  UNION-ALL         |           |       |            |\n|*  2 |   TABLE ACCESS\
  \ FULL| CUSTOMERS |    43 |   423   (1)|\n|*  3 |   TABLE ACCESS FULL| CUSTOMERS\
  \ |   130 |   423   (1)|\n\nPredicate Information (identified by operation id):\n\
  \   2 - filter(\"CUST_FIRST_NAME\"='Abner')\n   3 - filter(\"CUST_LAST_NAME\"='Everett')\n\
  ```\n\n```sql\nSELECT cust_first_name, cust_last_name\n  FROM sh.customers\n WHERE\
  \ cust_first_name = 'Abner'\nUNION\nSELECT cust_first_name, cust_last_name\n  FROM\
  \ sh.customers\n WHERE cust_last_name = 'Everett'; -- 返回 10 行\n```\n\n```\n| Id\
  \  | Operation           | Name      | Rows  | Cost (%CPU)|\n|---  |---        \
  \          |---        |---    |---         |\n|   0 | SELECT STATEMENT    |   \
  \        |   173 |   845  (51)|\n|   1 |  SORT UNIQUE        |           |   173\
  \ |   845  (51)|\n|   2 |   UNION-ALL         |           |       |            |\n\
  |*  3 |    TABLE ACCESS FULL| CUSTOMERS |    43 |   423   (1)|\n|*  4 |    TABLE\
  \ ACCESS FULL| CUSTOMERS |   130 |   423   (1)|\n\nPredicate Information (identified\
  \ by operation id):\n   3 - filter(\"CUST_FIRST_NAME\"='Abner')\n   4 - filter(\"\
  CUST_LAST_NAME\"='Everett')\n```\n\n```sql\nSELECT cust_first_name, cust_last_name\n\
  \  FROM sh.customers\n WHERE cust_first_name = 'Abner' OR cust_last_name = 'Everett'\
  \ -- 返回 128 行;\n```\n\n```\n| Id  | Operation         | Name      | Rows  | Cost\
  \ (%CPU)|\n|---  |---                |---        |---    |---         |\n|   0 |\
  \ SELECT STATEMENT  |           |     1 |   423   (1)|\n|*  1 |  TABLE ACCESS FULL|\
  \ CUSTOMERS |     1 |   423   (1)|\n\nPredicate Information (identified by operation\
  \ id):\n   1 - filter(\"CUST_FIRST_NAME\"='Abner' AND \"CUST_LAST_NAME\"='Everett')\n\
  ```\n\n清单 16-8 中的所有三个查询都组合了来自 `SH.CUSTOMERS` 的两个行子集。第一个查询先返回 80 行匹配名字 `Abner` 的记录，然后返回\
  \ 64 行匹配姓氏 `Everett` 的记录。第二个查询只返回 10 行。`UNION` 操作符会从选择列表中移除所有重复值，结果证明只有 10 个不同的名字和姓氏组合符合我们的谓词。第三个查询返回的行数又不同。`OR`\
  \ 条件不会移除重复项，但它确保如果某一行同时匹配两个谓词，则只返回一次。由于 `SH.CUSTOMERS` 表中有 16 行数据的名字为 `Abner` 且姓氏为\
  \ `Everett`，这 16 行会被 `UNION ALL` 查询的两个部分返回，而被 `OR` 操作符只返回一次，因此 `UNION ALL` 查询的结果集比使用\
  \ `OR` 操作符的查询多出 16 行。\n\n当已知 `UNION ALL` 能产生相同结果时，使用 `UNION` 绝非明智之举。`UNION` 只是先执行\
  \ `UNION ALL`，然后再执行一次 `SORT UNIQUE` 操作。如果不需要移除重复项，那么 `UNION` 所执行的排序就完全是不必要的开销，有时这种开销还相当显著。正如你在清单\
  \ 16-8 中所看到的，`OR` 操作符只使用了一次全表扫描，而其他结构则需要两次。一般来说，当已知结果相同时，你应该使用 `OR` 操作符代替 `UNION`\
  \ 或 `UNION ALL`。不过，让我给你看一个可能的例外情况。清单 16-9 回到了我们的 `MOSTLY_BORING` 表。\n\n清单 16-9.\
  \ 使用 UNION ALL 避免动态 SQL\n\n```sql\nSELECT *\n  FROM mostly_boring\n WHERE special_flag\
  \ = 'Y' AND :b1 = 'Y'\nUNION ALL\nSELECT *\n  FROM mostly_boring\n WHERE special_flag\
  \ = 'N' AND :b1 = 'N';\n```\n\n```\n| Id  | Operation                          \
  \   | Name          | Cost (%CPU)|\n```\n\n\n\n## 执行计划对比\n\n```sql\n|   0 | SELECT\
  \ STATEMENT                      |               |   386 (100)|\n|   1 |  UNION-ALL\
  \                            |               |            |\n|   2 |   FILTER  \
  \                            |               |            |\n|   3 |    TABLE ACCESS\
  \ BY INDEX ROWID BATCHED| MOSTLY_BORING |     2   (0)|\n|   4 |     INDEX RANGE\
  \ SCAN                  | SPECIAL_INDEX |     1   (0)|\n|   5 |   FILTER       \
  \                       |               |            |\n|   6 |    TABLE ACCESS\
  \ FULL                  | MOSTLY_BORING |   384   (1)|\n\nPredicate Information\
  \ (identified by operation id):\n\n2 - filter(:B1='Y')\n   4 - access(\"SPECIAL_FLAG\"\
  ='Y')\n   5 - filter(:B1='N')\n   6 - filter(\"SPECIAL_FLAG\"='N')\n\nSELECT /*+\
  \ use_concat */\n       *\n  FROM mostly_boring\n WHERE    (special_flag = 'Y' AND\
  \ :b1 = 'Y')\n       OR (special_flag = 'N' AND :b1 = 'N');\n\n| Id  | Operation\
  \                             | Name          | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT\
  \                      |               |   387   (1)|\n|   1 |  CONCATENATION  \
  \                      |               |            |\n|*  2 |   FILTER        \
  \                      |               |            |\n|   3 |    TABLE ACCESS BY\
  \ INDEX ROWID BATCHED| MOSTLY_BORING |     2   (0)|\n|*  4 |     INDEX RANGE SCAN\
  \                  | SPECIAL_INDEX |     1   (0)|\n|*  5 |   FILTER            \
  \                  |               |            |\n|*  6 |    TABLE ACCESS FULL\
  \                  | MOSTLY_BORING |   385   (1)|\n\nPredicate Information(identified\
  \ by operation id):\n\n2 - filter(:B1='Y')\n   4 - access(\"SPECIAL_FLAG\"='Y')\n\
  \   5 - filter(:B1='N')\n   6 - filter(\"SPECIAL_FLAG\"='N' AND (LNNVL(:B1='Y')\
  \ OR\n              LNNVL(\"SPECIAL_FLAG\"='Y')))\n```\n\n清单 16-9 展示了如何在不使用动态 SQL\
  \ 的情况下，将两种不同的访问路径合并到单个语句中。清单 16-9 中的第一个查询使用了 `UNION ALL` 集合运算符。该查询的前半部分仅在绑定变量的值为\
  \ `Y` 时才选择行。因此，选择了索引访问路径。第一个查询的后半部分仅在绑定变量的值为 `N` 时才返回行，因此全表扫描是合适的。第 2 行和第 5 行的 `FILTER`\
  \ 操作确保只执行两个操作中的一个。\n\n清单 16-9 中的第二个查询使用 `OR` 运算符实现了相同的效果，但需要一个 `USE_CONCAT` 提示；这是因为\
  \ CBO 没有意识到该语句的两个部分中只有一个会被执行，它将全表扫描的成本与索引访问路径的成本相加来得出语句的总成本。我们知道该语句只有一半会被运行，并且理解为什么\
  \ CBO 的成本计算是错误的。因此，我们可以放心地提供这个提示。\n\n## 通用视图的问题\n\n数据字典视图非常有用，定义越复杂，视图可能越有用。除了提高生产力和提升使用复杂视图的查询的可读性之外，当需求变更时，它还有可能避免在多处修改代码。\n\
  \n不幸的是，视图越复杂，就越有可能潜入低效问题。在近期的 Oracle 数据库版本中，由于引入了连接消除等转换，这种风险已大大降低，但问题仍然存在。清单 16-10\
  \ 展示了一个典型示例。\n\n### 清单 16-10. 复杂视图的低效问题\n\n```sql\nCREATE OR REPLACE VIEW sales_data\n\
  AS\n   SELECT *\n     FROM sh.sales\n          JOIN sh.customers USING (cust_id)\n\
  \          JOIN sh.products USING (prod_id);\n\nSELECT prod_name, SUM (amount_sold)\n\
  \    FROM sales_data\nGROUP BY prod_name;\n\n| Id  | Operation                 |\
  \ Name         | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT          |           \
  \   |   576   (6)|\n|   1 |  HASH GROUP BY            |              |   576   (6)|\n\
  |*  2 |   HASH JOIN               |              |   576   (6)|\n|   3 |    VIEW\
  \                   | VW_GBC_9     |   573   (6)|\n|   4 |     HASH GROUP BY   \
  \      |              |   573   (6)|\n|*  5 |      HASH JOIN            |      \
  \        |   552   (2)|\n|   6 |       INDEX FAST FULL SCAN| CUSTOMERS_PK |    33\
  \   (0)|\n|   7 |       PARTITION RANGE ALL |              |   517   (2)|\n|   8\
  \ |        TABLE ACCESS FULL  | SALES        |   517   (2)|\n|   9 |    TABLE ACCESS\
  \ FULL      | PRODUCTS     |     3   (0)|\n\n```\n\n清单 16-10 首先定义了一个连接 `SH.SALES`、`SH.CUSTOMERS`\
  \ 和 `SH.PRODUCTS` 的视图。你想要自己连接 `SH.SALES` 和 `SH.PRODUCTS`，并决定使用提供的视图。毕竟，你了解 CBO 具有的神奇的连接消除转换功能，并且确信使用该视图不会导致低效。然而，我们仍然可以看到执行计划中包含了与\
  \ `SH.CUSTOMERS` 表的连接。原因是确保 `SH.SALES` 中的每一行在 `SH.CUSTOMERS` 中都有对应行的引用完整性约束未被验证，因此连接消除是不合法的。要避免这个额外步骤，你需要自己连接\
  \ `SH.SALES` 和 `SH.PRODUCTS`。\n\n## 如何使用临时表\n\n我在清单 1-15 中展示了，你可以（并且通常应该）使用带因子的子查询来避免使用仅单个\
  \ SQL 语句需要的临时表。理论上，当可以使用临时表的索引时，临时表可能比带因子的子查询提供更好的性能。然而，这种理论上的可能性非常罕见，因为构建和维护索引的成本通常超过该索引可能为单个语句带来的任何好处。\n\
  \n但是，如果同一个会话中的多个独立 SQL 语句使用了类似的构造，那么使用临时表可能是个好主意，以避免重复工作。清单 16-11 展示了一个急需优化的存储过程。\n\
  \n### 清单 16-11. 多个 SQL 语句中的重复构造\n\n```sql\nCREATE TABLE key_electronics_customers\n\
  (\n   cust_id                  NUMBER PRIMARY KEY\n  ,latest_sale_month        DATE\n\
  \  ,total_electronics_sold   NUMBER (10, 2)\n);\n\nCREATE TABLE electronics_promotion_summary\n\
  (\n   sales_month              DATE\n  ,promo_id                 NUMBER\n  ,total_electronics_sold\
  \   NUMBER (10, 2)\n  ,PRIMARY KEY (sales_month, promo_id)\n);\n\nCREATE OR REPLACE\
  \ PROCEDURE get_electronics_stats_v1 (p_sales_month DATE)\nIS\n   v_sales_month\
  \        CONSTANT DATE := TRUNC (p_sales_month, 'MM'); -- 合理性检查\n   v_next_sales_month\
  \   CONSTANT DATE := ADD_MONTHS (v_sales_month, 1);\nBEGIN\n   --\n   -- 识别本月在电子产品上消费超过\
  \ 1000 的关键电子产品客户\n   --\n   MERGE INTO key_electronics_customers c\n        USING\
  \ (  SELECT cust_id, SUM (amount_sold) amount_sold\n                   FROM sh.sales\
  \ s JOIN sh.products p USING (prod_id)\n                  WHERE     time_id >=v_sales_month\n\
  \                        AND time_id < v_next_sales_month\n                    \
  \    AND prod_category = 'Electronics'\n               GROUP BY cust_id\n      \
  \           HAVING SUM (amount_sold) > 1000) t\n           ON (c.cust_id = t.cust_id)\n\
  \   WHEN MATCHED\n   THEN\n      UPDATE SET\n         c.latest_sale_month = v_sales_month\n\
  \        ,c.total_electronics_sold = t.amount_sold\n   WHEN NOT MATCHED\n   THEN\n\
  \      INSERT     (cust_id, latest_sale_month, total_electronics_sold)\n       \
  \   VALUES (t.cust_id, v_sales_month, t.amount_sold);\n\n--\n   -- 删除近期活动较少的客户\n\
  \   --\n   DELETE FROM key_electronics_customers\n         WHERE latest_sale_month\
  \ < ADD_MONTHS (v_sales_month, -3);\n```\n\n\n\n```\n   -- 现在为电子产品销售生成促销统计\n   --\n\
  \   MERGE INTO `electronics_promotion_summary` `p`\n        USING (  SELECT `promo_id`,\
  \ SUM (`amount_sold`) `amount_sold`\n                   FROM `sh.sales` `s` JOIN\
  \ `sh.products` `p` USING (`prod_id`)\n                  WHERE     `time_id` >=`v_sales_month`\n\
  \                        AND `time_id` < `v_next_sales_month`\n                \
  \        AND `prod_category` = 'Electronics'\n               GROUP BY `promo_id`)\
  \ `t`\n           ON (`p`.`promo_id` = `t`.`promo_id` AND `p`.`sales_month` = `v_sales_month`)\n\
  \   WHEN MATCHED\n   THEN\n      UPDATE SET `p`.`total_electronics_sold` = `t`.`amount_sold`\n\
  \   WHEN NOT MATCHED\n   THEN\n      INSERT     (`sales_month`, `promo_id`, `total_electronics_sold`)\n\
  \          VALUES (`v_sales_month`, `t`.`promo_id`, `t`.`amount_sold`);\nEND `get_electronics_stats_v1`;\n\
  /\n```\n\n`代码清单 16-11` 创建了两个表和一个存储过程。`KEY_ELECTRONICS_CUSTOMERS` 用于识别在过去三个月中，至少有一个月在电子产品上花费超过\
  \ 1000 货币单位的客户。`ELECTRONICS_PROMOTION_SUMMARY` 则汇总了每个月每个促销活动的电子产品销售总额。这些表由一个名为 `GET_ELECTRONICS_STATS_V1`\
  \ 的存储过程维护，该过程从 `SH.SALES` 和 `SH.PRODUCTS` 表中获取数据并合并到这两个表中。\n\n我们可以看到，两个 `MERGE`\
  \ 语句以极其相似的方式访问了 `SH.SALES` 和 `SH.PRODUCTS` 表：它们的连接方式相同，都只选择特定月份电子产品的行，并且都执行某种聚合操作。我们可以通过执行一次公共操作并将结果保存到临时表中来优化此代码。`代码清单\
  \ 16-12` 展示了这种方法。\n\n## 通过使用临时表避免重复工作 (`代码清单 16-12`)\n\n```sql\nCREATE GLOBAL TEMPORARY\
  \ TABLE `electronics_analysis_gtt`\n(\n   `cust_id`       NUMBER NOT NULL\n  ,`promo_id`\
  \      NUMBER NOT NULL\n  ,`time_id`       DATE\n  ,`amount_sold`   NUMBER\n) ON\
  \ COMMIT DELETE ROWS;\n\nCREATE OR REPLACE PROCEDURE `get_electronics_stats_v2`\
  \ (`p_sales_month` DATE)\nIS\n   `v_sales_month`        CONSTANT DATE := TRUNC (`p_sales_month`,\
  \ 'MM'); -- 合理性检查\n   `v_next_sales_month`   CONSTANT DATE := ADD_MONTHS (`v_sales_month`,\
  \ 1);\nBEGIN\n   --\n   -- 创建半聚合数据以供后续使用\n   --\n\nDELETE FROM `electronics_analysis_gtt`;\
  \ -- 以防万一\n\nINSERT INTO `electronics_analysis_gtt`(`cust_id`\n                \
  \                        ,`promo_id`\n                                        ,`time_id`\n\
  \                                        ,`amount_sold`)\n        SELECT `cust_id`\n\
  \              ,`promo_id`\n              ,MAX (`time_id`) `time_id`\n         \
  \     ,SUM (`amount_sold`) `amount_sold`\n          FROM `sh.sales` JOIN `sh.products`\
  \ `p` USING (`prod_id`)\n         WHERE     `time_id` >=`v_sales_month`\n      \
  \         AND `time_id` < `v_next_sales_month`\n               AND `prod_category`\
  \ = 'Electronics'\n      GROUP BY `cust_id`, `promo_id`;\n\n   --\n   -- 识别本月在电子产品上消费超过\
  \ 1000 的关键电子客户\n   --\n   MERGE INTO `key_electronics_customers` `c`\n        USING\
  \ (  SELECT `cust_id`, SUM (`amount_sold`) `amount_sold`\n                   FROM\
  \ `electronics_analysis_gtt`\n               GROUP BY `cust_id`\n              \
  \   HAVING SUM (`amount_sold`) > 1000) `t`\n           ON (`c`.`cust_id` = `t`.`cust_id`)\n\
  \   WHEN MATCHED\n   THEN\n      UPDATE SET\n         `c`.`latest_sale_month` =\
  \ `v_sales_month`\n        ,`c`.`total_electronics_sold` = `t`.`amount_sold`\n \
  \  WHEN NOT MATCHED\n   THEN\n      INSERT     (`cust_id`, `latest_sale_month`,\
  \ `total_electronics_sold`)\n          VALUES (`t`.`cust_id`, `v_sales_month`, `t`.`amount_sold`);\n\
  \n   --\n   -- 删除近期活动较少的客户\n   --\n   DELETE FROM `key_electronics_customers`\n\
  \         WHERE `latest_sale_month` < ADD_MONTHS (`v_sales_month`, -3);\n\n   --\n\
  \   -- 现在为电子产品销售生成促销统计\n   --\n   MERGE INTO `electronics_promotion_summary` `p`\n\
  \        USING (  SELECT `promo_id`, SUM (`amount_sold`) `amount_sold`\n       \
  \            FROM `electronics_analysis_gtt`\n               GROUP BY `promo_id`)\
  \ `t`\n           ON (`p`.`promo_id` = `t`.`promo_id` AND `p`.`sales_month` = `v_sales_month`)\n\
  \   WHEN MATCHED\n   THEN\n      UPDATE SET `p`.`total_electronics_sold` = `t`.`amount_sold`\n\
  \   WHEN NOT MATCHED\n   THEN\n      INSERT     (`sales_month`, `promo_id`, `total_electronics_sold`)\n\
  \          VALUES (`v_sales_month`, `t`.`promo_id`, `t`.`amount_sold`);\nEND `get_electronics_stats_v2`;\n\
  /\n```\n\n`代码清单 16-12` 首先创建了一个全局临时表 `ELECTRONICS_ANALYSIS_GTT`，用于存储半聚合数据，供我们升级后的存储过程\
  \ `GET_ELECTRONICS_STATS_V2` 使用。升级后的过程首先生成指定月份电子产品按 `CUST_ID` 和 `PROMO_ID` 组合聚合的数据。然后两个\
  \ `MERGE` 语句进一步聚合临时表中的数据。\n\n如果您指定 2001 年 12 月 1 日运行该过程，临时表将包含 1071 行。因为我们最初只从 `SH.SALES`\
  \ 表中匹配到 4132 行，所以这种优化带来的性能提升不易衡量，但在实际应用中，半聚合实现的数据缩减量可能大得多，效益也相当可观。\n\n## 避免多个相似的子查询\n\
  \n正如 `代码清单 16-11` 中多个相似的聚合一样，许多 SQL 语句也包含多个相似的子查询。`代码清单 16-13` 展示了一个典型例子。\n\n##\
  \ 多个相似的子查询 (`代码清单 16-13`)\n\n```sql\nSELECT `p`.`prod_id`\n      ,`p`.`prod_name`\n\
  \      ,`p`.`prod_category`\n      , (SELECT SUM (`amount_sold`)\n           FROM\
  \ `sh.sales` `s`\n          WHERE `s`.`prod_id` = `p`.`prod_id`)\n          `sum_amount_sold`\n\
  \      , (SELECT SUM (`quantity_sold`)\n           FROM `sh.sales` `s`\n       \
  \   WHERE `s`.`prod_id` = `p`.`prod_id`)\n          `sum_quantity_sold`\n  FROM\
  \ `sh.products` `p`;\n```\n\n```\n| Id  | Operation               | Name     | Cost\
  \ (%CPU)|\n|---|---|---|---|\n|   0 | SELECT STATEMENT        |          |  1078\
  \   (6)|\n|   1 |  HASH JOIN OUTER        |          |  1078   (6)|\n|   2 |   HASH\
  \ JOIN OUTER       |          |   541   (6)|\n|   3 |    TABLE ACCESS FULL    |\
  \ PRODUCTS |     3   (0)|\n|   4 |    VIEW                 | VW_SSQ_2 |   538  \
  \ (6)|\n|   5 |     HASH GROUP BY       |          |   538   (6)|\n|   6 |     \
  \ PARTITION RANGE ALL|          |   517   (2)|\n|   7 |       TABLE ACCESS FULL\
  \ | SALES    |   517   (2)|\n|   8 |   VIEW                  | VW_SSQ_1 |   537\
  \   (6)|\n|   9 |    HASH GROUP BY        |          |   537   (6)|\n|  10 |   \
  \  PARTITION RANGE ALL |          |   516   (2)|\n|  11 |      TABLE ACCESS FULL\
  \  | SALES    |   516   (2)|\n```\n\n`代码清单 16-13` 中的查询在选择列表中使用了两个相似的子查询来计算每个产品的销售总额和总数量。我展示了来自\
  \ 12cR1 数据库的执行计划，我们可以看到 CBO 已经成功地将这两个子查询去相关化。不幸的是，在撰写本文时，CBO 无法合并这些子查询（如果未来 CBO\
  \ 能够做到这一点，我不会感到惊讶），因此我们仍然需要对 `SH.SALES` 表进行两次全表扫描。我们可以看到，估计成本的主要部分就来自这两次重复的全表扫描。\n\
  \n实际上有几种不同的方法可以解决重复子查询的问题，但在这种情况下，我们有一个简单的解决方案。`代码清单 16-14` 展示了如何使用连接来避免重复工作。\n\n\
  ## 使用连接避免重复子查询 (`代码清单 16-14`)\n\n\n\n"
- "# 第 17 章：优化排序\n\n## 总结\n\n我们可以看到，只需简单地连接两个表并执行一个 `GROUP BY`，我们就能获得聚合值，而无需进行全表扫描的复制。\n\
  \n本章提供了一些许多人称之为编写糟糕的 SQL 的示例。然而，我们需要记住，今天易于阅读但性能不佳的代码，当成本优化器实现其下一个查询转换时，明天可能表现得非常完美。尽管如此，性能不佳的\
  \ SQL 几乎总是要么做了不需要做的工作，然后丢弃结果；要么需要做的工作重复了多次。本章仅提供了 CBO 在查询被重写之前无法生成最优计划的一些更常见场景的示例。如果你看到一条重要的\
  \ SQL 语句似乎做了冗余或重复的工作，你应该考虑重写它。\n\n本章的示例都没有涉及数据排序。我发现，在过去的几年里，我花了大量时间试图避免烦人的排序带来的性能问题。我们故事的下一部分将完全聚焦于排序这个主题。\n\
  \n![image](img/frontdot.jpg)\n\n## 优化排序\n\n我推测在 20 世纪 80 年代和 90 年代，SQL 性能问题的最大来源可能是糟糕的连接顺序。如果你选择了错误的表来开始连接，你很可能会陷入困境。如今，我们拥有相当成熟\
  \ CBO 和复杂的运行时引擎，它们共同支持右深连接树、星型转换以及其他许多高级特性。一方面，这些改进意味着对于我们这些使用 Oracle 数据库的人来说，连接顺序已远不如过去那样是个大问题。另一方面，我似乎现在花了很多时间在解决排序问题上。一条\
  \ SQL 语句经常看似挂起，吞噬所有临时表空间，导致整个数据库戛然而止。本章将完全致力于优化排序这一重要主题，并且主要关注如何高效地编写或重写 SQL。\n\n\
  排序优化几乎完全围绕一件事：阻止排序溢出到磁盘。如果你无法阻止排序溢出到磁盘，那么你需要尽量减少发生的磁盘活动量。实现这个目标实际上只有四种方法：\n\n* \
  \  根本不排序。或者减少排序次数。最高效的排序就是你根本不做的排序。\n*   排序更少的列。更少的列意味着更少的内存需求。\n*   排序更少的行。更少的行意味着更少的内存需求以及更少的比较次数。\n\
  *   为排序获取更多内存。\n\n这些概念很容易理解，但实现它们通常相当困难。在我们开始优化之前，让我们先回顾一下 Oracle 用于对大量数据进行排序的基本机制。\n\
  \n## 排序机制\n\n当我们想到排序时，大多数人本能地想到 `ORDER BY` 子句。但排序也发生在许多其他地方。排序合并连接、聚合函数、分析函数、集合操作、模型子句、层次查询、索引的创建和重建，以及任何我忘记提及的操作都涉及排序。所有这些排序需求都是通过相同基本排序机制的变体来满足的。\n\
  \n如果你能在内存中对所有行进行排序，则称为最优排序。但是，如果你尝试对数据进行排序，而数据在不超出运行时引擎设定的限制的情况下无法放入内存，会发生什么？在某些时候，你的排序将溢出到磁盘。在本节中，我想讨论当排序无法完全在内存中完成时会发生什么。但首先让我简要谈谈内存分配限制是如何设置的。\n\
  \n### 排序的内存限制\n\n排序最初在内存中的工作区执行。此工作区大小的上限主要由四个初始化参数间接控制：`MEMORY_TARGET`、`PGA_AGGREGATE_TARGET`、`WORKAREA_SIZE_POLICY`\
  \ 和 `SORT_AREA_SIZE`。这四个参数中的最后两个可以在会话级别设置。\n\n如果 `WORKAREA_SIZE_POLICY` 设置为 `AUTO`，那么\
  \ `PGA_AGGREGATE_TARGET`（如果设置了，则是 `MEMORY_TARGET`）会间接地尝试调节程序全局区（PGA）的内存分配，包括工作区：随着实例中会话分配的内存增多，分配给新工作区的内存就会减少。如果你将\
  \ `WORKAREA_SIZE_POLICY` 设置为 `MANUAL`（并且你可以在会话级别这样做），你就完全控制了工作区分配的限制。通常，最好将 `WORKAREA_SIZE_POLICY`\
  \ 保留为 `AUTO`。但是，当你有一个关键的批处理进程，你知道它将在一天（或夜晚）的安静时段运行，并且需要分配大量可用内存时，你应该将 `WORKAREA_SIZE_POLICY`\
  \ 设置为 `MANUAL`。\n\n计算工作区内存大小的算法因版本而异，但以下陈述至少适用于 11gR2：\n\n*   当 `WORKAREA_SIZE_POLICY`\
  \ 设置为默认值 `AUTO` 时，可以分配给一个工作区的最大内存量是 1GB，无论 `PGA_AGGREGATE_TARGET` 有多大。\n*   当你将\
  \ `WORKAREA_SIZE_POLICY` 设置为 `MANUAL` 时，可以分配给一个工作区的最大内存量略低于 2GB。\n*   你可以通过使用并行查询为排序分配更多内存，因为每个并行查询服务进程都有自己的工作区。但是，一旦你有超过六个并行查询服务进程，分配给每个并行查询服务进程的内存量就会减少，以防止分配给特定排序的内存量变得更大。这意味着无论你做什么，你都无法为任何一个排序分配超过\
  \ 12GB 的内存。\n\n当然，这些高数值并不总能实现。一方面，一条 SQL 语句可能同时有多个活动的工作区，并且存在各种未文档化的限制，这些限制因版本而异，它们限制了某个进程一次可以分配给所有工作区的总内存量。现在让我来讨论当你的排序无法获得足够内存时会发生什么。\n\
  \n### 基于磁盘的排序\n\n当行被添加到内存工作区时，它们以排序顺序维护。当内存工作区满时，一些已排序的行会被写入指定的临时表空间。这个基于磁盘的区域被称为一个排序运行。一旦排序运行被写入磁盘，内存就被释放出来用于更多的行。这个过程可以重复多次，直到所有行都被处理完毕。图\
  \ 17-1 说明了其工作原理：\n\n![9781430259770_Fig17-01.jpg](img/9781430259770_Fig17-01.jpg)\n\
  \n图 17-1. 两趟排序\n\n```sql\n SELECT p.prod_id\n        ,p.prod_name\n        ,p.prod_category\n\
  \        ,SUM (amount_sold) sum_amount_sold\n        ,SUM (quantity_sold) sum_quantity_sold\n\
  \    FROM sh.sales s, sh.products p\n   WHERE s.prod_id = p.prod_id\nGROUP BY p.prod_id,\
  \ p.prod_name, p.prod_category;\n```\n\n| Id  | Operation               | Name \
  \    | Cost (%CPU)|\n| --- | ----------------------- | -------- | ---------- |\n\
  |   0 | SELECT STATEMENT        |          |   541   (6)|\n|   1 |  HASH GROUP BY\
  \          |          |   541   (6)|\n|   2 |   HASH JOIN             |        \
  \  |   541   (6)|\n|   3 |    VIEW                 | VW_GBC_5 |   538   (6)|\n|\
  \   4 |     HASH GROUP BY       |          |   538   (6)|\n|   5 |      PARTITION\
  \ RANGE ALL|          |   517   (2)|\n|   6 |       TABLE ACCESS FULL | SALES  \
  \  |   517   (2)|\n|   7 |    TABLE ACCESS FULL    | PRODUCTS |     3   (0)|\n\n\
  \n\n"
- "# 排序优化与避免排序\n\n## 单遍排序与多遍排序\n图 17-1 右侧的九个方框代表九个排序归档。方框中的数字代表已排序的行，尽管一个排序归档中通常远多于四行。一旦所有排序归档创建完毕，每个排序归档的前几个块会被读回内存，合并并输出。随着合并行的输出，内存被释放，可以从磁盘读入更多数据。这种排序方式被称为**单遍排序**，因为每一行只被写入磁盘并读回一次。\n\
  \n然而，如果我们第一遍产生了 9000 个排序归档，而不是 9 个，会发生什么？此时，你可能无法将来自所有 9000 个排序归档的哪怕一个块都装入工作区。在这种情况下，你只将一部分排序归档的前段读入内存并进行合并。合并后的行不会像单遍排序那样输出，而是再次写入磁盘，创建另一个更大的排序归档。图\
  \ 17-1 展示了从第一遍产生的九个排序归档被分成三个子集，每个子集包含三个。想象一下，这三个子集各自包含来自第一遍的 3000 个排序归档，而不是图中显示的三个。每个子集被合并，产生三个大的排序归档。这三个更大的排序归档现在可以合并以创建最终输出。这种排序变体被称为**两遍排序**，因为每一行被写入磁盘并读回两次。在第一遍中，每一行作为小排序归档的一部分写入磁盘；在第二遍中，该行被写入更大的、合并后的排序归档。\n\
  \n我们可以将这个思路推演到逻辑上的终点。如果第一遍结束时我们没有 9000 个排序归档，而是 9,000,000 个，会发生什么？现在在第二遍结束时，我们拥有的不是三个大的合并排序归档，而是\
  \ 3000 个。此时我们遇到了大麻烦，因为可能需要通过创建特大型排序归档来进一步减少大排序归档的数量，才能产生最终的排序结果。这被称为**三遍排序**，我相信读者已经明白这个思路了。只要我们的临时表空间有足够的空间（以及无限的耐心），我们就可以用这种方式对任意大的数据集进行排序。\n\
  \n判断一次排序是单遍最优、单遍还是多遍的最简单方法是查看 `V$SQL_PLAN_STATISTICS_ALL` 中的 `LAST_EXECUTION` 列。与文档相反，该列会告诉你多遍排序中确切的遍数。不过你可能不太关心这个：如果你无法用单遍完成排序，你可能会耗尽时间和耐心。\n\
  \n如果你遇到了多遍排序，你第一个想法可能是尝试为你的工作区分配更多内存。`V$SQL_PLAN_STATISTICS_ALL` 中的 `ESTIMATED_OPTIMAL_SIZE`\
  \ 和 `ESTIMATED_ONEPASS_SIZE` 列大致给出了你的工作区需要多大才能让排序作为最优或单遍排序执行。报告的单位是字节，如果你看到 1TB（并不罕见）或更大的数字，你需要想办法减少排序量。我稍后会讨论这一点，但偶尔你会发现稍微大一点的工作区就能解决问题。如果是这种情况，你可能会在你的\
  \ PL/SQL 代码中加入 代码清单 17-1 中的动态 SQL 行：\n\n**代码清单 17-1. 手动增加重要排序的内存量**\n\n```\nBEGIN\n\
  \   EXECUTE IMMEDIATE 'ALTER SESSION SET workarea_size_policy=manual';\n   EXECUTE\
  \ IMMEDIATE 'ALTER SESSION SET sort_area_size=2147483647';\nEND;\n/\n```\n\n你应该仅对那些既重要又不可避免的大排序使用\
  \ 代码清单 17-1 中的代码；你不能通过允许每个进程随意占用内存来神奇地创造更多内存。但一旦你决定打开闸门，半途而废就没有意义：如果你不需要完整的 2GB，它不会被分配。一旦你的重要排序完成，你的代码应该发出一条\
  \ `ALTER SESSION SET WORKAREA_SIZE_POLICY=AUTO` 语句来关闭内存分配的闸门。\n\n## 避免排序\n我希望所有关于多遍排序低效性的讨论能激励你避免不必要的排序。我已经在\
  \ 代码清单 7-17 中向你展示了一种消除排序的方法。在本节中，我将再展示几个如何消除排序的例子。\n\n### 非排序聚合函数\n假设你想从 `SH.SALES`\
  \ 表中提取每个 `PROD_ID` 的最大 `AMOUNT_SOLD` 值，并且想知道与该销售关联的 `CUST_ID`。代码清单 17-2 展示了一种你可能从其他书籍中学到的方法。\n\
  \n**代码清单 17-2. 使用 FIRST_VALUE 分析函数排序行**\n\n```\nWITH q1\n     AS (SELECT prod_id\n\
  \               ,amount_sold\n               ,MAX (amount_sold) OVER (PARTITION\
  \ BY prod_id) largest_sale\n               ,FIRST_VALUE (\n                   cust_id)\n\
  \                OVER (PARTITION BY prod_id\n                      ORDER BY amount_sold\
  \ DESC, cust_id ASC)\n                   largest_sale_customer\n           FROM\
  \ sh.sales)\nSELECT DISTINCT prod_id, largest_sale, largest_sale_customer\n  FROM\
  \ q1\n WHERE amount_sold = largest_sale;\n```\n\n```\n| Id  | Operation        \
  \      | Name  | Rows  | Cost (%CPU)|\n|---|---|---|---|---|\n|   0 | SELECT STATEMENT\
  \       |       |    72 |  5071   (1)|\n|   1 |  HASH UNIQUE           |       |\
  \    72 |  5071   (1)|\n|   2 |   VIEW                 |       |   918K|  5050 \
  \  (1)|\n|   3 |    WINDOW SORT         |       |   918K|  5050   (1)|\n|   4 |\
  \     PARTITION RANGE ALL|       |   918K|   517   (2)|\n|   5 |      TABLE ACCESS\
  \ FULL | SALES |   918K|   517   (2)|\n```\n\n在这个例子中，`FIRST_VALUE` 分析函数用于识别与每个产品最大\
  \ `AMOUNT_SOLD` 值关联的 `CUST_ID` 值（当行按 `AMOUNT_SOLD` 降序排序时的第一个值）。`FIRST_VALUE` 函数的一个问题是，当有多个\
  \ `CUST_ID` 值都与最大 `AMOUNT_SOLD` 值关联时，结果是不确定的。为了避免歧义，我们也按 `CUST_ID` 排序，以保证从合格的 `CUST_ID`\
  \ 值集合中获得最低值。\n\n从执行计划中可以看出，我们在因子化子查询中排序了所有 918,843 行，然后在主查询中丢弃了其中除 72 行外的所有行。这是一种非常低效的做法，我建议在大多数情况下不要使用\
  \ `FIRST_VALUE` 分析函数。我遇到的许多专业 SQL 程序员使用 代码清单 17-3 中的技巧试图改进。\n\n**代码清单 17-3. 使用 ROW_NUMBER**\n\
  \n```\nWITH q1\n     AS (SELECT prod_id\n               ,amount_sold\n         \
  \      ,cust_id\n               ,ROW_NUMBER ()\n                OVER (PARTITION\
  \ BY prod_id\n                      ORDER BY amount_sold DESC, cust_id ASC)\n  \
  \                 rn\n           FROM sh.sales)\nSELECT prod_id, amount_sold largest_sale,\
  \ cust_id largest_sale_customer\n  FROM q1\n WHERE rn = 1;\n```\n\n```\n| Id  |\
  \ Operation                | Name  | Rows  | Cost (%CPU)|\n|---|---|---|---|---|\n\
  ```\n\n\n\n## 优化排序操作\n\n|   0 | SELECT STATEMENT         |       |   918K|  5050\
  \   (1)|\n|   1 |  VIEW                    |       |   918K|  5050   (1)|\n|   2\
  \ |   WINDOW SORT PUSHED RANK|       |   918K|  5050   (1)|\n|   3 |    PARTITION\
  \ RANGE ALL   |       |   918K|   517   (2)|\n|   4 |     TABLE ACCESS FULL    |\
  \ SALES |   918K|   517   (2)|\n\n`WINDOW SORT PUSHED RANK`操作听起来可能比`WINDOW SORT`更高效，但实际上并非如此。如果你做一个\
  \ 10032 跟踪，你会看到`ROW_NUMBER`分析函数使用的是所谓的*version 1 sort*，这是一种内存密集型的、基于插入的排序，而`FIRST_VALUE`函数使用的是*version\
  \ 2 sort*，这显然是基数排序和快速排序的巧妙组合¹，它需要的内存更少，比较次数也更少。\n\n我们可以做得比这更好得多。看一下下面的示例。\n\n示例\
  \ 17-4. 使用 FIRST 聚合函数优化排序\n\n```sql\n SELECT prod_id\n        ,MAX (amount_sold)\
  \ largest_sale\n        ,MIN (cust_id) KEEP (DENSE_RANK FIRST ORDER BY amount_sold\
  \ DESC)\n            largest_sale_customer\n    FROM sh.sales\nGROUP BY prod_id;\n\
  \n| Id  | Operation            | Name  | Rows  | Cost (%CPU)|\n\n|   0 | SELECT\
  \ STATEMENT     |       |    72 |   538   (6)|\n|   1 |  SORT GROUP BY       | \
  \      |    72 |   538   (6)|\n|   2 |   PARTITION RANGE ALL|       |   918K|  \
  \ 517   (2)|\n|   3 |    TABLE ACCESS FULL | SALES |   918K|   517   (2)|\n```\n\
  \n`FIRST`聚合函数的名字与`FIRST_VALUE`非常相似，但相似之处仅此而已。`FIRST`只为 72 个产品中的每一个保留一行，因此只消耗极少的内存。性能的改进虽然不如估计成本所显示的那么显著，但仍然是可测量的，即使在示例模式的小数据量情况下也是如此。\n\
  \n在某些情况下，`FIRST`和`LAST`函数可以更高效，甚至完全避免排序！如果我们只想知道整个表中`AMOUNT_SOLD`的最大值，而不是每个产品的最大值，会怎样？下面的示例展示了结果。\n\
  \n示例 17-5. 使用 FIRST 聚合函数避免排序\n\n```sql\nSELECT MAX (amount_sold) largest_sale\n\
  \      ,MIN (cust_id) KEEP (DENSE_RANK FIRST ORDER BY amount_sold DESC)\n      \
  \    largest_sale_customer\n  FROM sh.sales;\n\n| Id  | Operation            | Name\
  \  | Rows  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT     |       |     1 |   517\
  \   (2)|\n|   1 |  SORT AGGREGATE      |       |     1 |            |\n|   2 | \
  \  PARTITION RANGE ALL|       |   918K|   517   (2)|\n|   3 |    TABLE ACCESS FULL\
  \ | SALES |   918K|   517   (2)|\n```\n\n当我们消除了`GROUP BY`子句，`SORT GROUP BY`操作就被替换成了`SORT\
  \ AGGREGATE`操作。我相信你还记得，`SORT AGGREGATE`操作从不排序。\n\n### 索引范围扫描与索引全扫描\n\n索引基本上只是一个或多个列的值以及表\
  \ ROWID 的有序列表，有时我们可以利用这个预先排序的列表来避免查询中的排序。正如我在第 10 章中解释的，通过索引访问可能比全表扫描成本更高，所以这并不总是一个好主意。但要排序的数据量越大，通过消除排序来获得性能提升的潜力就越大。下面的示例展示了一个虚构的测试案例。\n\
  \n示例 17-6. 使用索引避免排序\n\n```sql\n SELECT /*+ cardinality(s 1e9)*/\n         s.*\n\
  \    FROM sh.sales s\nORDER BY s.time_id;\n\n| Id  | Operation                 \
  \         | Name           | Rows  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT  \
  \                 |                |  1000M|  3049   (1)|\n|   1 |  PARTITION RANGE\
  \ ALL               |                |  1000M|  3049   (1)|\n|   2 |   TABLE ACCESS\
  \ BY LOCAL INDEX ROWID| SALES          |  1000M|  3049   (1)|\n|   3 |    BITMAP\
  \ CONVERSION TO ROWIDS     |                |       |            |\n|   4 |    \
  \ BITMAP INDEX FULL SCAN         | SALES_TIME_BIX |       |            |\n```\n\n\
  示例使用了`cardinality`提示来观察如果`SH.SALES`表实际包含 1,000,000,000 行，并且我们想要按`TIME_ID`对所有行进行排序，CBO\
  \ 会怎么做。我们可以使用`TIME_ID`上的索引来避免任何形式的排序，因为数据在索引中已经排序了。注意`PARTITION RANGE ALL`操作在执行计划中出现在其他操作*之上*。这是因为我们按分区键排序，而分区已经对我们的数据进行了部分排序，使得我们可以依次处理每个分区。\n\
  \n![image](img/sq.jpg) **提示**  按`LIST`分区表很常见，并且每个分区只有一个值。例如，我们可能按`LIST`重新分区`SH.SALES`，为每个`TIME_ID`设置一个分区。在这种情况下，只要分区顺序正确且*没有默认分区*，按分区列对多个分区进行排序仍然可以通过逐个处理分区来实现！\n\
  \n如果我们想按不同的列排序数据会怎样？下面的示例说明了为什么事情会变得有点复杂。\n\n示例 17-7. 使用本地索引排序数据的失败尝试\n\n```sql\n\
  \ SELECT /*+ cardinality(s 1e9) index(s (cust_id))*/\n         s.*\n    FROM sh.sales\
  \ s\nORDER BY s.cust_id;\n\n| Id  | Operation                                  \
  \ | Name           | Rows  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT          \
  \                  |                |  1000M|  8723K  (1)|\n|   1 |  SORT ORDER\
  \ BY                              |                |  1000M|  8723K  (1)|\n|   2\
  \ |   PARTITION RANGE ALL                       |                |  1000M|   3472\
  \   (1)|\n|   3 |    TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| SALES          |\
  \  1000M|   3472   (1)|\n|   4 |     BITMAP CONVERSION TO ROWIDS             | \
  \               |       |            |\n|   5 |      BITMAP INDEX FULL SCAN    \
  \             | SALES_CUST_BIX |       |            |\n```\n\n示例使用了一个提示来尝试强制生成类似于示例的执行计划，但这当然行不通。本地索引`SALES_CUST_BIX`按顺序返回每个分区中的行，但这与对整个表的数据进行排序不是一回事——除了增加开销外，我们通过添加提示一无所获。当然，全局\
  \ B 树索引可以避免这个问题，但示例展示了另一种方法。\n\n示例 17-8. 使用维度表避免全局索引\n\n```sql\n SELECT /*+ cardinality(s\
  \ 1e9) */\n         s.*\n    FROM sh.sales s , sh.customers c\n   WHERE s.cust_id\
  \ = c.cust_id\nORDER BY s.cust_id;\n\n| Id  | Operation                        \
  \  | Name           | Rows  | Cost (%CPU)|\n```\n\n\n\n"
