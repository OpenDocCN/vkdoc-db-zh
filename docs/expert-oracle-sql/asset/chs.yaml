  **部分连接**\n\n部分连接是 12cR1 的一个新特性，但在我看来，它们的解释并不充分。让我看看能否从另一个角度来阐述。请看 清单 13-11。\n\n\
  清单 13-11. 部分连接转换\n\n```\nSELECT /*+    partial_join(iv) */\n         /*  no_partial_join(iv)\
  \ */\n         product_id, MAX (it.quantity)\n    FROM oe.order_items it JOIN oe.inventories\
  \ iv USING (product_id)\nGROUP BY product_id;\n```\n\n-- 未转换的执行计划 (NO_PARTIAL_JOIN)\n\
  \n| Id  | Operation              | Name         |\n|---|---|---|\n|   0 | SELECT\
  \ STATEMENT       |              |\n|   1 |  HASH GROUP BY         |           \
  \   |\n|*  2 |   HASH JOIN            |              |\n|   3 |    TABLE ACCESS\
  \ FULL   | ORDER_ITEMS  |\n|   4 |    INDEX FAST FULL SCAN| INVENTORY_IX |\n\n谓词信息（由操作\
  \ ID 标识）：\n2 - access(`IT`.`PRODUCT_ID`=`IV`.`PRODUCT_ID`)\n\n-- 转换后的查询\n\n```\n\
  SELECT product_id, MAX (quantity)\n    FROM oe.order_items it\n   WHERE EXISTS\n\
  \            (SELECT 1\n               FROM oe.inventories iv\n              WHERE\
  \ it.product_id = iv.product_id)\nGROUP BY it.product_id;\n```\n\n-- 转换后的执行计划 (默认)\n\
  \n| Id  | Operation              | Name         |\n|---|---|---|\n|   0 | SELECT\
  \ STATEMENT       |              |\n|   1 |  HASH GROUP BY         |           \
  \   |\n|*  2 |   HASH JOIN SEMI       |              |\n|   3 |    TABLE ACCESS\
  \ FULL   | ORDER_ITEMS  |\n|   4 |    INDEX FAST FULL SCAN| INVENTORY_IX |\n\n谓词信息（由操作\
  \ ID 标识）：\n2 - access(`IT`.`PRODUCT_ID`=`IV`.`PRODUCT_ID`)\n\n如你所见，部分连接将内连接转换为了半连接。但之前我们不是有从半连接到内连接的转换吗？你感到困惑了吗？我当时是。让我来解开这个谜团。\n\
  \n部分连接的好处最好用具有多对多关系的两个表的连接来解释，因此在 清单 13-11 中，我暂时放弃了 `SH` 示例模式，而使用了 `OE` 示例模式中具有多对多关系的两个表。\n\
  \n让我们以 `PRODUCT_ID` 1797 为例，首先看看未转换的查询是如何处理它的。该产品属于三个订单，在 `OE.ORDER_ITEMS` 的三行匹配记录中，`QUANTITY`\
  \ 的值分别为 7、9 和 12。`PRODUCT_ID` 1797 也存放在三个仓库中，因此在 `OE.INVENTORIES` 中有三行与 `PRODUCT_ID`\
  \ 1797 匹配。当我们使用 `PRODUCT_ID` 连接 `OE.ORDER_ITEMS` 和 `OE.INVENTORIES` 时，对于 `PRODUCT_ID`\
  \ 1797，我们得到了九行记录，`QUANTITY` 值分别为 7, 9, 12, 7, 9, 12, 7, 9, 和 12（来自 `OE.ORDER_ITEMS`\
  \ 的三行被复制了三次）。当我们将这九行输入到 `HASH GROUP BY` 操作时，`MAX (QUANTITY)` 的值是 12。如果我们在选择列表中包含了\
  \ `MIN (QUANTITY)`、`SUM (DISTINCT QUANTITY)`、`AVG (QUANTITY)` 和 `SUM (QUANTITY)`，我们得到的结果将分别是\
  \ 7、28、9⅓ 和 84。\n\n转换为半连接可以防止 `OE.INVENTORIES` 中 `PRODUCT_ID` 1797 的任何重复值导致 `OE.ORDER_ITEMS`\
  \ 的行被重复，因此输入到 `HASH GROUP BY` 操作的值仅为 7、9 和 12。`MAX (PRODUCT_ID)` 的值仍然是 12，与处理所有九行时完全相同。基于这些行的\
  \ `MIN (QUANTITY)`、`SUM (DISTINCT QUANTITY)`、`AVG (QUANTITY)` 和 `SUM (QUANTITY)`\
  \ 的值将分别为 7、28、9⅓ 和 28。在我所有的示例中，对于转换后查询的三行和未转换查询的九行，聚合值都是相同的，除了 `SUM (QUANTITY)`\
  \ 产生了不同的结果。因此，如果你尝试在 清单 13-11 的查询的选择列表中添加 `SUM (QUANTITY)`，你会发现部分连接突然变得不合法了。在 12.1.0.1\
  \ 中，`AVG (QUANTITY)` 函数也会禁用部分连接，我推测这是因为 `COUNT (QUANTITY)` 和 `SUM (QUANTITY)` 都确实不合法。这类问题可能会在后续版本中得到修复。\n\
  \n部分连接的主要好处是减少输入到 `GROUP BY` 或 `DISTINCT` 操作的行数。在转换后执行计划中的 `HASH JOIN SEMI` 操作中，这是通过在找到第一个匹配后立即从哈希集群中移除条目来实现的。从那时起，来自\
  \ `OE.INVENTORIES` 的具有相同 `PRODUCT_ID` 的后续行将不再匹配。\n\n部分连接应用于嵌套循环连接时也有一些有趣的副作用。请看\
  \ 清单 13-12，其中显示了编辑后的运行时统计信息以及执行计划。\n\n清单 13-12. 带嵌套循环连接的部分连接转换\n\n```\nBEGIN\n \
  \  FOR r IN (  SELECT/*+ TAGPJ gather_plan_statistics */\n                     cust_id,\
  \ MAX (s.amount_sold)\n                 FROM sh.customers c JOIN sh.sales s USING\
  \ (cust_id)\n                WHERE s.amount_sold > 1782 AND s.prod_id = 18\n   \
  \          GROUP BY cust_id)\n   LOOP\n      NULL;\n   END LOOP;\nEND;\n```\n\n\
  SET LINES 200 PAGES 0\n\n```\nSELECT p.*\n  FROM v$sql s\n      ,TABLE (\n     \
  \     DBMS_XPLAN.display_cursor (s.sql_id\n                                    ,s.child_number\n\
  \                                    ,'BASIC IOSTATS LAST')) p\n WHERE sql_text\
  \ LIKE 'SELECT /*+ TAGPJ%';\n```\n\n| Id  | Operation                    | Name\
  \           | Starts | E-Rows | A-Rows |\n\n\n\n## 执行计划分析\n\n| 0 | SELECT STATEMENT\
  \             |                | 1 |     | 83 |\n|---|------------------------------|----------------|---|-----|----|\n\
  | 1 | HASH GROUP BY                |                | 1 | 3   | 83 |\n| 2 | NESTED\
  \ LOOPS SEMI            |                | 1 | 3   | 108 |\n| 3 | PARTITION RANGE\
  \ ALL          |                | 1 | 3   | 108 |\n|* 4 | TABLE ACCESS BY LOCAL\
  \ INDEX ROWID | SALES      | 28 | 3   | 108 |\n| 5 | BITMAP CONVERSION TO ROWIDS\
  \  |                | 16 |    | 9591 |\n|* 6 | BITMAP INDEX SINGLE VALUE    | SALES_PROD_BIX\
  \ | 16 |    | 16 |\n|* 7 | INDEX UNIQUE SCAN            | CUSTOMERS_PK   | 83 |\
  \ 55500 | 83 |\n\n谓词信息（按操作 ID 标识）：\n\n4 - 过滤(`\"SALES\".\"AMOUNT_SOLD\"`>1782)\n\
  6 - 访问(`\"SALES\".\"PROD_ID\"`=18)\n7 - 访问(`\"CUSTOMERS\".\"CUST_ID\"`=`\"SALES\"\
  .\"CUST_ID\"`)\n\n乍一看，应用于清单 13-12 中嵌套循环连接的**部分连接**似乎毫无意义。`SH.CUSTOMERS`表的`CUST_ID`列上存在主键约束，因此第\
  \ 7 行的`INDEX UNIQUE SCAN`只会获取一行，那么将`NESTED LOOPS`转换为`NESTED LOOPS SEMI`有什么好处呢？答案可以通过查看操作\
  \ 7 的`STARTS`列得出。尽管有 108 行`SH.SALES`数据满足谓词`SH.PROD_ID=18`和`SH.AMOUNT_SOLD > 1782`，但`INDEX\
  \ UNIQUE SCAN`只执行了 83 次！这是因为在这 108 行中，`CUST_ID`只有 83 个不同的值，而`NESTED LOOPS SEMI`和`NESTED\
  \ LOOPS ANTI`连接操作可以利用**标量子查询缓存**。常规的`NESTED LOOPS`连接则无法利用这一点！\n\n不过，也许我们有点跑题了。**部分连接转换**的主要目的是尽早消除在流程后期会被无谓地输入到`DISTINCT`或`GROUP\
  \ BY`操作中的行。这需要将内连接转换为半连接。另一方面，**半连接到内连接转换**的目的是让子查询充当`NESTED LOOPS`或`MERGE`连接操作中的**驱动行源**。这两个目标是相互排斥的。幸运的是，部分连接和半连接到内连接的转换都是**基于成本**的，当\
  \ CBO 认为进行部分连接转换会产生不利的连接顺序时，它将不会执行该转换。\n\n## 连接因式分解\n\n**连接因式分解转换**的目的是从`UNION ALL`操作的操作数中移除公共组件，然后在操作之后统一应用它们一次。清单\
  \ 13-13 提供了一个示例。\n\n### 示例查询\n\n清单 13-13. 连接因式分解\n\n```sql\nSELECT /*+   factorize_join(@set$1(s@u1\
  \ S@u2)) qb_name(u1) */\n       /* no_factorize_join(@set$1) */\n       *\n  FROM\
  \ sh.sales s, sh.customers c\n WHERE     c.cust_first_name = 'Abner'\n       AND\
  \ c.cust_last_name = 'Everett'\n       AND s.cust_id = c.cust_id\n/*AND prod_id\
  \ = 13\nAND time_id = DATE '2001-09-13' */\n\nUNION ALL\nSELECT /*+ qb_name(u2)\
  \ */\n       *\n  FROM sh.sales s, sh.customers c\n WHERE     c.cust_first_name\
  \ = 'Abigail'\n       AND c.cust_last_name = 'Ruddy'\n       AND s.cust_id = c.cust_id\n\
  /*AND prod_id = 13\nAND time_id = DATE '2001-09-13' */;\n```\n\n### 未转换的执行计划 (NO_FACTORIZE_JOIN)\n\
  \n```sql\n| Id  | Operation                           | Name           |\n|---|---|---|\n\
  |   0 | SELECT STATEMENT                    |                |\n|   1 |  UNION-ALL\
  \                          |                |\n|   2 |   NESTED LOOPS          \
  \            |                |\n|   3 |    NESTED LOOPS                     | \
  \               |\n|*  4 |     TABLE ACCESS FULL               | CUSTOMERS     \
  \ |\n|   5 |     PARTITION RANGE ALL             |                |\n|   6 |   \
  \   BITMAP CONVERSION TO ROWIDS    |                |\n|*  7 |       BITMAP INDEX\
  \ SINGLE VALUE     | SALES_CUST_BIX |\n|   8 |    TABLE ACCESS BY LOCAL INDEX ROWID|\
  \ SALES          |\n|   9 |   NESTED LOOPS                      |              \
  \  |\n|  10 |    NESTED LOOPS                     |                |\n|* 11 |  \
  \   TABLE ACCESS FULL               | CUSTOMERS      |\n|  12 |     PARTITION RANGE\
  \ ALL             |                |\n|  13 |      BITMAP CONVERSION TO ROWIDS \
  \   |                |\n|* 14 |       BITMAP INDEX SINGLE VALUE     | SALES_CUST_BIX\
  \ |\n|  15 |    TABLE ACCESS BY LOCAL INDEX ROWID| SALES          |\n```\n\n谓词信息（按操作\
  \ ID 标识）：\n\n4 - 过滤(`\"C\".\"CUST_FIRST_NAME\"`='Abner' AND\n              `\"C\"\
  .\"CUST_LAST_NAME\"`='Everett')\n7 - 访问(`\"S\".\"CUST_ID\"`=`\"C\".\"CUST_ID\"`)\n\
  11 - 过滤(`\"C\".\"CUST_FIRST_NAME\"`='Abigail' AND\n              `\"C\".\"CUST_LAST_NAME\"\
  `='Ruddy')\n14 - 访问(`\"S\".\"CUST_ID\"`=`\"C\".\"CUST_ID\"`)\n\n### 转换后的查询\n\n```sql\n\
  WITH vw_jf\n     AS (SELECT *\n           FROM sh.customers c\n          WHERE c.cust_first_name\
  \ = 'Abner' AND c.cust_last_name = 'Everett'\n         UNION ALL\n         SELECT\
  \ *\n           FROM sh.customers c\n          WHERE c.cust_first_name = 'Abigail'\
  \ AND c.cust_last_name = 'Ruddy')\nSELECT *\n  FROM sh.sales s, vw_jf\n WHERE s.cust_id\
  \ = vw_jf.cust_id;\n```\n\n### 转换后的执行计划 (default)\n\n```sql\n| Id  | Operation \
  \           | Name               |\n|---|---|---|\n|   0 | SELECT STATEMENT    \
  \ |                    |\n|*  1 |  HASH JOIN           |                    |\n\
  |   2 |   VIEW               | VW_JF_SET$F472D255 |\n|   3 |    UNION-ALL      \
  \   |                    |\n|*  4 |     TABLE ACCESS FULL| CUSTOMERS          |\n\
  |*  5 |     TABLE ACCESS FULL| CUSTOMERS          |\n|   6 |   PARTITION RANGE ALL|\
  \                    |\n|   7 |    TABLE ACCESS FULL | SALES              |\n```\n\
  \n谓词信息（按操作 ID 标识）：\n\n6 - 访问(`\"TIME_ID\"`=TO_DATE(' 2001-09-13 00:00:00', 'syyyy-mm-dd\n\
  \              hh24:mi:ss'))\n7 - 访问(`\"PROD_ID\"`=13)\n10 - 过滤(`\"C\".\"CUST_FIRST_NAME\"\
  `='Abner' AND\n              `\"C\".\"CUST_LAST_NAME\"`='Everett')\n11 - 访问(`\"\
  C\".\"CUST_ID\"`=`\"S\".\"CUST_ID\"`)\n12 - 过滤(`\"C\".\"CUST_FIRST_NAME\"`='Abigail'\
  \ AND\n              `\"C\".\"CUST_LAST_NAME\"`='Ruddy')\n13 - 访问(`\"C\".\"CUST_ID\"\
  `=`\"S\".\"CUST_ID\"`)\n\n清单 13-13 中的原始查询，其两个分支都以相同的方式引用了`SH.SALES`表。转换后的查询提取了两个分支中的连接，并在`UNION\
  \ ALL`操作之后仅执行一次连接。正如您能想象的，这种转换可能会带来巨大的节省，但在本例中，我们用一次全表扫描替换了两次索引访问，收益很小。实际上，如果您添加注释掉的谓词，执行连接因式分解反而会不利。幸运的是，连接因式分解是一种**基于成本**的转换，您会发现当包含额外谓词时，除非使用提示强制，否则不会应用该转换。\n\
  \n提示连接因式分解很棘手，因为提示适用于一个**集合查询块**。这会产生一系列连锁的复杂问题。\n\n\n\n## 转换为连接（Join）\n\n`INTERSECT`\
  \ 和 `MINUS` 集合操作可以表达为连接操作。清单 13-14 展示了如何实现这一点。\n\n清单 13-14. 集合到连接的转换\n\n```sql\n\
  SELECT /*+ set_to_join(@set$1) */ /* no_set_to_join(@set$1) */\n       prod_id\n\
  \  FROM sh.sales s1\n WHERE time_id < DATE '2000-01-01' AND cust_id = 13\nMINUS\n\
  SELECT prod_id\n  FROM sh.sales s2\n WHERE time_id >=DATE '2000-01-01';\n```\n\n\
  ```\n-- 未转换的执行计划（默认）\n\n| Id  | Operation                                    | Name\
  \           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT                         \
  \    |                |  2396  (99)|\n|   1 |  MINUS                           \
  \            |                |            |\n|   2 |   SORT UNIQUE            \
  \                    |                |    24   (0)|\n|   3 |    PARTITION RANGE\
  \ ITERATOR                  |                |    24   (0)|\n|   4 |     TABLE ACCESS\
  \ BY LOCAL INDEX ROWID BATCHED| SALES          |    24   (0)|\n|   5 |      BITMAP\
  \ CONVERSION TO ROWIDS             |                |            |\n|*  6 |    \
  \   BITMAP INDEX SINGLE VALUE              | SALES_CUST_BIX |            |\n|  \
  \ 7 |   SORT UNIQUE                                |                |  2372   (1)|\n\
  |   8 |    PARTITION RANGE ITERATOR                  |                |   275  \
  \ (2)|\n|   9 |     TABLE ACCESS FULL                        | SALES          |\
  \   275   (2)|\n\nPredicate Information (identified by operation id):\n\n6 - access(\"\
  CUST_ID\"=13)\n```\n\n```sql\n-- 转换后的查询\n\nSELECT DISTINCT s1.prod_id\n  FROM sh.sales\
  \ s1\n WHERE     time_id < DATE '2000-01-01'\n       AND cust_id = 13\n       AND\
  \ prod_id NOT IN (SELECT prod_id\n                             FROM sh.sales s2\n\
  \                            WHERE time_id >=DATE '2000-01-01');\n```\n\n```\n--\
  \ 转换后的执行计划（SET_TO_JOIN）\n\n| Id  | Operation                                   \
  \ | Name           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT                  \
  \           |                |   301   (2)|\n|   1 |  HASH UNIQUE              \
  \                   |                |   301   (2)|\n|*  2 |   HASH JOIN ANTI  \
  \                           |                |   301   (2)|\n|   3 |    PARTITION\
  \ RANGE ITERATOR                  |                |    24   (0)|\n|   4 |     TABLE\
  \ ACCESS BY LOCAL INDEX ROWID BATCHED| SALES          |    24   (0)|\n|   5 |  \
  \    BITMAP CONVERSION TO ROWIDS             |                |            |\n|*\
  \  6 |       BITMAP INDEX SINGLE VALUE              | SALES_CUST_BIX |         \
  \   |\n|   7 |    PARTITION RANGE ITERATOR                  |                | \
  \  275   (2)|\n|   8 |     TABLE ACCESS FULL                        | SALES    \
  \      |   275   (2)|\n\nPredicate Information (identified by operation id):\n\n\
  2 - access(\"PROD_ID\"=\"PROD_ID\")\n   6 - access(\"CUST_ID\"=13)\n```\n\n清单 13-14\
  \ 中的查询用于找出 `CUST_ID` 为 13 的客户在 20 世纪购买、但在 21 世纪未被任何人购买过的产品。未转换的查询在识别结果集元素之前，会对 `UNION\
  \ ALL` 操作的两个分支分别执行唯一排序；这正是 `MINUS` 和 `INTERSECT` 集合操作的一贯实现方式。应用此转换意味着可以避免其中一个排序操作。但是，看看转换后查询执行计划中的操作\
  \ 2——`HASH JOIN ANTI` 操作的工作区包含了重复值，因此我们需要反思这个转换是否真的值得。在这个案例中，`CUST_ID` 13 在 20 世纪只进行了\
  \ 19 次交易，涉及 6 种产品，所以从这个工作区中消除 13 行数据并非大事。然而，该转换避免了对 21 世纪交易相关的 492,064 行 `SH.SALES`\
  \ 数据中的 72 种产品进行唯一排序。这次转换是个好主意。\n\n尽管成本估算显示 CBO（正确地）认为集合到连接的转换能产生更优的执行计划，但如果没有提示（hint），此转换**不会**被应用到未加提示的查询上，通常情况下**永远不会**被应用！\n\
  \n要理解为什么我们需要在清单 13-14 中使用 `SET_TO_JOIN` 提示，我们需要进一步了解基于成本的转换与启发式转换之间的区别。当 CBO 考虑基于成本的转换时，它会尝试判断该转换是否会减少查询的执行时间；如果转换会减少估计的执行时间——即成本更低——则会应用该转换，否则不应用。启发式转换则通过应用某种规则来工作。到目前为止，我们在本章中遇到的所有启发式转换都是无条件应用的，除非被提示禁用。在这些情况下，其工作假设是：这个提示很可能（即使不是一定）会有帮助。\n\
  \n对于集合到连接的启发式转换，其启发式规则是：除非使用提示，否则**永不**应用该转换，其工作假设是：需要此转换的情况很少。考虑到 CBO 需要在毫秒级时间内生成执行计划，除非你使用提示，否则它不会浪费时间去考虑集合到连接的转换。\n\
  \n如果你喜欢摆弄隐藏的初始化参数，并且不在意这样做的支持影响，你可以修改 `\"_convert_set_to_join\"` 的值。如果你在会话级别将此参数的值从其默认值\
  \ `FALSE` 改为 `TRUE`，那么启发式规则将被更改，使得该转换**总是**被应用。这是唯一一种需要你使用 `NO_SET_TO_JOIN` 提示来禁用该转换的情况。\n\
  \n集合到连接转换为我们关于集合与连接相关转换的讨论画上了一个圆满的句号。现在，我们可以将注意力转向与聚合操作相关的一类新转换。\n\n## 聚合转换\n\n\
  在 Oracle 数据库中，聚合是一个异常复杂的问题，并且在 SQL 调优专家的工作中占据重要地位。我们需要理解需要聚合什么信息、何时聚合以及如何聚合。在最近的版本中，Oracle\
  \ 引入了许多与聚合相关的转换，它们不仅有助于查询性能，还充当了极佳的教学指南，可帮助你分析包含聚合的查询。让我们从了解如何优化**不同值聚合**开始吧。\n\n\
  ### 不同值聚合\n\n\n\n我不知道你怎么想，但我一直觉得包含 `DISTINCT` 关键字的聚合函数本质上效率低下，使用它只是有点偷懒。不过现在我不必担心了，因为如今的优化器（CBO）会把我的简洁查询转换成不那么简洁但更高效的形式。请看\
  \ 清单 13-15。\n\n## 去重聚合转换\n\n```\nSELECT /*+   transform_distinct_agg */\n      \
  \ /* no_transform_distinct_agg */\n      COUNT (DISTINCT cust_id) FROM sh.sales;\n\
  \n-- 未转换的执行计划 (NO_TRANSFORM_DISTINCT_AGG)\n\n| Id  | Operation                 \
  \     | Name           | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT              \
  \ |                |   407   (0)|\n|   1 |  SORT GROUP BY                 |    \
  \            |            |\n|   2 |   PARTITION RANGE ALL          |          \
  \      |   407   (0)|\n|   3 |    BITMAP CONVERSION TO ROWIDS |                |\
  \   407   (0)|\n|   4 |     BITMAP INDEX FAST FULL SCAN| SALES_CUST_BIX |      \
  \      |\n\n-- 转换后的查询\n\nWITH vw_dag\n     AS (  SELECT cust_id\n             FROM\
  \ sh.sales\n         GROUP BY cust_id)\nSELECT COUNT (cust_id)\n  FROM vw_dag;\n\
  \n-- 转换后的执行计划 (默认)\n\n| Id  | Operation                        | Name          \
  \ | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT                 |                |\
  \   428   (5)|\n|   1 |  SORT AGGREGATE                  |                |    \
  \        |\n|   2 |   VIEW                           | VW_DAG_0       |   428  \
  \ (5)|\n|   3 |    HASH GROUP BY                 |                |   428   (5)|\n\
  |   4 |     PARTITION RANGE ALL          |                |   407   (0)|\n|   5\
  \ |      BITMAP CONVERSION TO ROWIDS |                |   407   (0)|\n|   6 |  \
  \     BITMAP INDEX FAST FULL SCAN| SALES_CUST_BIX |            |\n```\n\n去重聚合转换是在\
  \ `11gR2` 版本中引入的，在我看来，这是一种启发式转换，在合法的情况下会被无条件应用。转换后的估算成本比不转换要高，但通过将识别不同值的工作与计数工作分开，查询实际上运行得更快得多。\n\
  \n## 去重放置\n\n去重放置是一种基于成本的转换，从 `11gR2` 版本开始使用，目的是尽早消除重复行。从概念上讲，去重放置与我们将在下一节讨论的分组放置非常相似。清单\
  \ 13-16 展示了基本思想。\n\n```\nSELECT /*+no_partial_join(s1) no_partial_join(s2)     place_distinct(s1)\
  \ */\n       /*  no_partial_join(s1) no_partial_join(s2) no_place_distinct(s1) */\n\
  \      DISTINCT cust_id, prod_id\n FROM sh.sales s1 JOIN sh.sales s2 USING (cust_id,\
  \ prod_id)\nWHERE s1.time_id < DATE '2000-01-01' AND s2.time_id >=DATE '2000-01-01';\n\
  \n-- 未转换的执行计划 (NO_PLACE_DISTINCT)\n\n| Id  | Operation                  | Name \
  \ | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT           |       |  5302   (1)|\n\
  |   1 |  HASH UNIQUE               |       |  5302   (1)|\n|*  2 |   HASH JOIN \
  \               |       |  1787   (1)|\n|   3 |    PARTITION RANGE ITERATOR|   \
  \    |   246   (2)|\n|   4 |     TABLE ACCESS FULL      | SALES |   246   (2)|\n\
  |   5 |    PARTITION RANGE ITERATOR|       |   275   (2)|\n|   6 |     TABLE ACCESS\
  \ FULL      | SALES |   275   (2)|\n\n谓词信息 (由操作 ID 标识):\n\n2 - access(\"S1\".\"\
  PROD_ID\"=\"S2\".\"PROD_ID\" AND\n              \"S1\".\"CUST_ID\"=\"S2\".\"CUST_ID\"\
  )\n-- 转换后的查询\n\nWITH vw_dtp\n     AS (SELECT /*+ no_partial_join(s1) no_merge */\n\
  \                DISTINCT s1.cust_id, s1.prod_id\n           FROM sh.sales s1\n\
  \          WHERE s1.time_id < DATE '2000-01-01')\nSELECT /*+ no_partial_join(s2)\
  \ */\n       DISTINCT cust_id, prod_id\n  FROM vw_dtp NATURAL JOIN sh.sales s2\n\
  \ WHERE s2.time_id >=DATE '2000-01-01';\n\n-- 转换后的执行计划 (默认)\n\n| Id  | Operation\
  \                    | Name            | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT\
  \             |                 |  5595   (1)|\n|   1 |  HASH UNIQUE           \
  \      |                 |  5595   (1)|\n|*  2 |   HASH JOIN                  |\
  \                 |  3326   (1)|\n|   3 |    VIEW                      | VW_DTP_6DE9D1A7\
  \ |  2138   (1)|\n|   4 |     HASH UNIQUE              |                 |  2138\
  \   (1)|\n|   5 |      PARTITION RANGE ITERATOR|                 |   246   (2)|\n\
  |   6 |       TABLE ACCESS FULL      | SALES           |   246   (2)|\n|   7 | \
  \   PARTITION RANGE ITERATOR  |                 |   275   (2)|\n|   8 |     TABLE\
  \ ACCESS FULL        | SALES           |   275   (2)|\n\n谓词信息 (由操作 ID 标识):\n\n2\
  \ - access(\"ITEM_2\"=\"S2\".\"PROD_ID\" AND \"ITEM_1\"=\"S2\".\"CUST_ID\")\n```\n\
  \n清单 13-16 中的查询查找了在 20 世纪和 21 世纪都出现过的 `cust_id` 和 `prod_id` 的组合。为了简单起见，我禁用了部分连接转换（如果没有\
  \ `NO_PARTIAL_JOIN` 提示，该转换会发生）。额外的 `HASH UNIQUE` 操作意味着，在转换后的执行计划中，第 2 行 `HASH JOIN`\
  \ 操作所使用的工作区仅包含 72 行，而在未转换查询的操作 2 所关联的工作区中，则放置了来自 `SH.SALES` 的 426,779 行 20 世纪的销售记录。成本估算表明这种转换不值得，但不知何故，CBO\
  \ 无论如何都执行了转换，并且查询速度明显加快。\n\n## 分组放置\n\n分组放置的实现方式和原因与去重放置相同。然而，清单 13-17 突出了一些新的要点。\n\
  \n```\n SELECT /*+   place_group_by((s p)) */\n         /* no_place_group_by */\n\
  \         cust_id\n        ,c.cust_first_name\n        ,c.cust_last_name\n     \
  \   ,c.cust_email\n        ,p.prod_category\n        ,SUM (s.amount_sold) total_amt_sold\n\
  \    FROM sh.sales s\n         JOIN sh.customers c USING (cust_id)\n         JOIN\
  \ sh.products p USING (prod_id)\nGROUP BY cust_id\n        ,c.cust_first_name\n\
  \        ,c.cust_last_name\n        ,c.cust_email\n        ,p.prod_category;\n\n\
  -- 未转换的执行计划 (NO_PLACE_GROUP_BY)\n\n| Id  | Operation                | Name     \
  \            | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT         |              \
  \        | 19957   (1)|\n|   1 |  HASH GROUP BY           |                    \
  \  | 19957   (1)|\n|*  2 |   HASH JOIN              |                      |  2236\
  \   (1)|\n|   3 |    VIEW                  | index$_join$_004     |     2   (0)|\n\
  |*  4 |     HASH JOIN            |                      |            |\n|   5 |\
  \      INDEX FAST FULL SCAN| PRODUCTS_PK          |     1   (0)|\n|   6 |      INDEX\
  \ FAST FULL SCAN| PRODUCTS_PROD_CAT_IX |     1   (0)|\n|*  7 |    HASH JOIN    \
  \         |                      |  2232   (1)|\n|   8 |     TABLE ACCESS FULL \
  \   | CUSTOMERS            |   423   (1)|\n|   9 |     PARTITION RANGE ALL  |  \
  \                    |   517   (2)|\n|  10 |      TABLE ACCESS FULL   | SALES  \
  \              |   517   (2)|\n\n谓词信息 (由操作 ID 标识):\n\n2 - access(\"S\".\"PROD_ID\"\
  =\"P\".\"PROD_ID\")\n   4 - access(ROWID=ROWID)\n   7 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n```\n\n\nWITH vw_gbc\n     AS (  SELECT /*+ no_place_group_by\
  \ */\n                 s.cust_id\n                 ,p.prod_category\n          \
  \       ,SUM (s.amount_sold) total_amt_sold\n             FROM sh.sales s JOIN sh.products\
  \ p USING (prod_id)\n         GROUP BY s.cust_id, p.prod_category, prod_id)\n  SELECT\
  \ /*+ no_place_group_by leading(vw_gbc)\n            use_hash(c) no_swap_join_inputs(c)\
  \ */\n         cust_id\n        ,c.cust_first_name\n        ,c.cust_last_name\n\
  \        ,c.cust_email\n        ,vw_gbc.prod_category\n        ,SUM (vw_gbc.total_amt_sold)\
  \ total_amt_sold\n    FROM vw_gbc JOIN sh.customers c USING (cust_id)\nGROUP BY\
  \ cust_id\n        ,c.cust_first_name\n        ,c.cust_last_name\n        ,c.cust_email\n\
  \        ,vw_gbc.prod_category;\n```\n\n```\n-- 转换后的执行计划（默认）\n\n| Id  | Operation\
  \                   | Name                 | Cost (%CPU)|\n| --- | ---------------------------\
  \ | -------------------- | ---------- |\n|   0 | SELECT STATEMENT            | \
  \                     |  4802   (1)|\n|   1 |  HASH GROUP BY              |    \
  \                  |  4802   (1)|\n|*  2 |   HASH JOIN                 |       \
  \               |  4319   (1)|\n|   3 |    VIEW                     | VW_GBC_1 \
  \            |  3682   (1)|\n|   4 |     HASH GROUP BY           |             \
  \         |  3682   (1)|\n|*  5 |      HASH JOIN              |                \
  \      |   521   (2)|\n|   6 |       VIEW                  | index$_join$_004  \
  \   |     2   (0)|\n|*  7 |        HASH JOIN            |                      |\
  \            |\n|   8 |         INDEX FAST FULL SCAN| PRODUCTS_PK          |   \
  \  1   (0)|\n|   9 |         INDEX FAST FULL SCAN| PRODUCTS_PROD_CAT_IX |     1\
  \   (0)|\n|  10 |       PARTITION RANGE ALL   |                      |   517   (2)|\n\
  |  11 |        TABLE ACCESS FULL    | SALES                |   517   (2)|\n|  12\
  \ |    TABLE ACCESS FULL        | CUSTOMERS            |   423   (1)|\n\n谓词信息（按操作\
  \ ID 标识）：\n\n2 - access(\"ITEM_1\"=\"C\".\"CUST_ID\")\n5 - access(\"S\".\"PROD_ID\"\
  =\"P\".\"PROD_ID\")\n7 - access(ROWID=ROWID)\n```\n\n清单 13-17 中的查询识别了每个客户在每个产品类别上的总销售额。转换后的查询在\
  \ `SH.SALES` 与 `SH.PRODUCTS` 连接之后执行聚合，因此第 2 行 `HASH JOIN` 的工作区很小。\n\n分组放置转换的应用似乎存在一些限制¹，其中有些我尚未能完全弄清楚。然而，目前看来，我们确实无法在不对\
  \ `SH.SALES` 的行至少进行一次连接的情况下对其进行分组。\n\n在 清单 13-17 中，产生最终结果的连接的两个操作数是：\n-   由 `SH.SALES`\
  \ 和 `SH.PRODUCTS` 连接形成的中间结果集\n-   表 `SH.CUSTOMERS`\n\n可以对这两个操作数中的任何一个或两者都执行分组放置。你可以在\
  \ 清单 13-17 中看到强制在第一个操作数上进行分组的语法。提示 `PLACE_GROUP_BY ((S P) (C))` 将用于对两个操作数都执行分组放置。\n\
  \n清单 13-18 展示了当我们从 清单 13-17 中的转换后查询中移除提示，然后运行 `EXPLAIN PLAN` 时会发生什么。\n\n## 清单 13-18.\
  \ 子查询中的分组放置\n\n```sql\nWITH vw_gbc\n     AS (  SELECT /*+   place_group_by((s))\
  \ */\n                  /* no_place_group_by */\n                  s.cust_id, p.prod_category,\
  \ SUM (s.amount_sold) total_amt_sold\n             FROM sh.sales s JOIN sh.products\
  \ p USING (prod_id)\n         GROUP BY s.cust_id, p.prod_category, prod_id)\n  SELECT\
  \ /*+ place_group_by((vw_gbc)) */\n         /* no_place_group_by leading(vw_gbc)use_hash(c)\
  \ no_swap_join_inputs(c) */\n         cust_id\n        ,c.cust_first_name\n    \
  \    ,c.cust_last_name\n        ,c.cust_email\n        ,vw_gbc.prod_category\n \
  \       ,SUM (vw_gbc.total_amt_sold) total_amt_sold\n    FROM vw_gbc JOIN sh.customers\
  \ c USING (cust_id)\nGROUP BY cust_id\n        ,c.cust_first_name\n        ,c.cust_last_name\n\
  \        ,c.cust_email\n        ,vw_gbc.prod_category;\n```\n\n```\n-- 未转换的执行计划（两个\
  \ NO_PLACE_GROUP_BY）\n\n| Id  | Operation                   | Name             \
  \    | Cost (%CPU)|\n| --- | --------------------------- | --------------------\
  \ | ---------- |\n|   0 | SELECT STATEMENT            |                      | 29396\
  \   (1)|\n|   1 |  HASH GROUP BY              |                      | 29396   (1)|\n\
  |*  2 |   HASH JOIN                 |                      | 11675   (1)|\n|   3\
  \ |    VIEW                     |                      |  9046   (1)|\n|   4 | \
  \    HASH GROUP BY           |                      |  9046   (1)|\n|*  5 |    \
  \  HASH JOIN              |                      |   521   (2)|\n|   6 |       VIEW\
  \                  | index$_join$_002     |     2   (0)|\n|*  7 |        HASH JOIN\
  \            |                      |            |\n|   8 |         INDEX FAST FULL\
  \ SCAN| PRODUCTS_PK          |     1   (0)|\n|   9 |         INDEX FAST FULL SCAN|\
  \ PRODUCTS_PROD_CAT_IX |     1   (0)|\n|  10 |       PARTITION RANGE ALL   |   \
  \                   |   517   (2)|\n|  11 |        TABLE ACCESS FULL    | SALES\
  \                |   517   (2)|\n|  12 |    TABLE ACCESS FULL        | CUSTOMERS\
  \            |   423   (1)|\n\n谓词信息（按操作 ID 标识）：\n\n2 - access(\"VW_GBC\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n5 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n7 - access(ROWID=ROWID)\n\
  ```\n\n```\n-- 转换后的查询\n\nWITH vw_gbc_1\n     AS (  SELECT s.cust_id, s.prod_id,\
  \ SUM (s.amount_sold) AS total_amt_sold\n             FROM sh.sales s\n        \
  \ GROUP BY s.cust_id, s.prod_id)\n    ,vw_gbc_2\n     AS (  SELECT vw_gbc_1.cust_id,\
  \ vw_gbc_1.total_amt_sold, p.prod_category\n             FROM vw_gbc_1 JOIN sh.products\
  \ p USING (prod_id)\n         GROUP BY vw_gbc_1.cust_id\n                 ,vw_gbc_1.total_amt_sold\n\
  \                 ,p.prod_category\n                 ,prod_id)\n    ,vw_gbc\n  \
  \   AS (  SELECT vw_gbc_2.cust_id\n                 ,SUM (vw_gbc_2.total_amt_sold)\
  \ AS total_amt_sold\n                 ,vw_gbc_2.prod_category\n             FROM\
  \ vw_gbc_2\n         GROUP BY vw_gbc_2.cust_id, vw_gbc_2.prod_category)\n  SELECT\
  \ cust_id\n        ,c.cust_first_name\n        ,c.cust_last_name\n        ,c.cust_email\n\
  \        ,vw_gbc.prod_category\n        ,SUM (vw_gbc.total_amt_sold) total_amt_sold\n\
  \    FROM vw_gbc JOIN sh.customers c USING (cust_id)\nGROUP BY cust_id\n       \
  \ ,c.cust_first_name\n        ,c.cust_last_name\n        ,c.cust_email\n       \
  \ ,vw_gbc.prod_category;\n```\n\n```\n-- 转换后的执行计划（默认）\n\n| Id  | Operation     \
  \                | Name                 | Cost (%CPU)|\n| --- | -----------------------------\
  \ | -------------------- | ---------- |\n```\n\n## 分组下推\n\n分组下推对于并行聚合的作用，类似于去重和分组放置对连接聚合的作用。其核心思想相同：尽可能早地在流程中执行尽可能多的聚合操作。清单\
  \ 13-19 展示了分组下推转换的实际应用。\n\n**清单 13-19.** 分组下推\n\n```sql\n SELECT /*+ parallel gby_pushdown\
  \ */ /* parallel no_gby_pushdown */\n        prod_id\n        ,cust_id\n       \
  \ ,promo_id\n        ,COUNT (*) cnt\n    FROM sh.sales\n   WHERE amount_sold > 100\n\
  GROUP BY prod_id, cust_id, promo_id;\n-- 未转换的执行计划 (NO_GBY_PUSHDOWN)\n\n| Id  | Operation\
  \               | Name     | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT        | \
  \         |   289   (3)|\n|   1 |  PX COORDINATOR         |          |         \
  \   |\n|   2 |   PX SEND QC (RANDOM)   | :TQ10001 |   289   (3)|\n|   3 |    HASH\
  \ GROUP BY        |          |   289   (3)|\n|   4 |     PX RECEIVE          | \
  \         |   288   (2)|\n|   5 |      PX SEND HASH       | :TQ10000 |   288   (2)|\n\
  |   6 |       PX BLOCK ITERATOR |          |   288   (2)|\n|*  7 |        TABLE\
  \ ACCESS FULL| SALES    |   288   (2)|\n\n谓词信息 (通过操作 ID 识别):\n\n7 - filter(\"AMOUNT_SOLD\"\
  >100)\n\n-- 转换后查询的概念\n\nWITH pq\n     AS (  SELECT prod_id\n                 ,cust_id\n\
  \                 ,promo_id\n                 ,COUNT (*) cnt\n             FROM\
  \ sh.sales\n            WHERE amount_sold > 100 AND time_id < DATE '2000-01-01'\n\
  \         GROUP BY prod_id, cust_id, promo_id\n         UNION ALL\n           SELECT\
  \ prod_id\n                 ,cust_id\n                 ,promo_id\n             \
  \    ,COUNT (*) cnt\n             FROM sh.sales\n            WHERE amount_sold >\
  \ 100 AND time_id >=DATE '2000-01-01'\n         GROUP BY prod_id, cust_id, promo_id)\n\
  \  SELECT prod_id\n        ,cust_id\n        ,promo_id\n        ,SUM (cnt) AS cnt\n\
  \    FROM pq\nGROUP BY prod_id, cust_id, promo_id;\n\n-- 转换后的执行计划\n\n| Id  | Operation\
  \                | Name     | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT         |\
  \          |   325   (1)|\n|   1 |  PX COORDINATOR          |          |       \
  \     |\n|   2 |   PX SEND QC (RANDOM)    | :TQ10001 |   325   (1)|\n|   3 |   \
  \ HASH GROUP BY         |          |   325   (1)|\n|   4 |     PX RECEIVE      \
  \     |          |   325   (1)|\n|   5 |      PX SEND HASH        | :TQ10000 | \
  \  325   (1)|\n|   6 |       HASH GROUP BY      |          |   325   (1)|\n|   7\
  \ |        PX BLOCK ITERATOR |          |   144   (2)|\n|*  8 |         TABLE ACCESS\
  \ FULL| SALES    |   144   (2)|\n\n谓词信息 (通过操作 ID 识别):\n\n8 - filter(\"AMOUNT_SOLD\"\
  >100)\n```\n\n清单 13-19 中的查询是对 `SH.SALES` 执行的一个简单的 `COUNT` 聚合，并以并行方式进行。若没有此转换，所有满足\
  \ `AMOUNT_SOLD > 100` 的 `SH.SALES` 行都将从一个并行查询服务器发送到另一个服务器进行聚合。此转换的概念通过清单 13-19 中的一个\
  \ `UNION ALL` 因子化子查询来展示。`UNION ALL` 的每个分支都对应于一个并行查询服务器，该服务器读取 `SH.SALES` 表的一部分数据。概念性查询使用世纪来分割分支间的数据，而实际的并行查询将使用块范围粒度。\n\
  \n在概念性查询中，`UNION ALL` 的每个分支先执行自己的 `COUNT` 聚合，然后主查询再对结果执行 `SUM` 聚合以获得最终结果。在并行查询中，每个读取\
  \ `SH.SALES` 的并行查询从进程都会对其数据子集执行 `COUNT` 聚合，因此需要发送到 DFO:`TQ10001` 进行最终 `SUM` 聚合的行数大大减少。\n\
  \n我们再次看到，CBO 执行了一个实际上增加了估算成本的转换。越来越多的证据表明，基于成本的转换框架实际上并未对每个可能的转换执行最终状态优化，而是执行了某种近似的成本计算。\n\
  \n分组下推是一种基于成本的转换，它适用于 `DISTINCT` 操作以及 `GROUP BY` 操作。由于 `GROUP BY` 和 `DISTINCT` 操作几乎总是能显著降低基数，因此只要合法，分组下推几乎总是会被应用。\n\
  \n分组下推转换是我想要介绍的最后一个聚合转换。现在，是时候看看子查询了。\n\n## 子查询转换\n\n正如我在第 7 章中解释的，我在本书中非正式地使用术语\
  \ *子查询* 来指代一个集合查询块，或任何以关键字 `SELECT` 开头且不是查询主查询块的 SQL 语句部分。因此，例如，一个内联视图或数据字典视图在此处的讨论中被视为一个子查询。\n\
  \n我们已经在第 11 章和本章前面讨论过子查询非合并，因此我不再重访该主题。但我们还有很多其他转换要介绍。让我们通过简要回顾简单视图合并来开始吧。\n\n###\
  \ 简单视图合并\n\n|   0 | SELECT STATEMENT              |                      |  7224\
  \   (1)|\n|   1 |  HASH GROUP BY                |                      |  7224 \
