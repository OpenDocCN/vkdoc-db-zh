  raw: '```

    #!/bin/bash

    if [ $# -ne 1 ]; then

      echo "Usage: $0 SID"

      exit 1

    fi

    # source oracle OS variables

    . /etc/oraset $1

    #

    crit_var=$(sqlplus -s <<EOF

    / as sysdba

    SET HEAD OFF FEED OFF

    SELECT count(*)

    FROM dba_users

    WHERE lock_date IS NOT NULL

    AND username in (''CIAP'',''REPV'',''CIAL'',''STARPROD'');

    EOF)

    #

    if [ $crit_var -ne 0 ]; then

      echo $crit_var

      echo "locked acct. issue with $1" | mailx -s "locked acct. issue" dkuhn@gmail.com

    else

      echo $crit_var

      echo "no locked accounts"

    fi

    exit 0

    ```


    This shell script is called from a scheduling tool, such as cron. For example,
    this cron entry instructs the job to run every 10 minutes (this entry should actually
    be a single line of code but has been placed on two lines in order to fit on the
    page):


    ```

    0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP

       1>/home/oracle/bin/log/lock.log 2>&1

    ```


    In this way, I am notified when one of the production database accounts becomes
    locked.


    Checking for Files Older Than a Certain Age


    For some jobs that I run from shell scripts (such as backups), I’ll first check
    to see if another backup job is already running. The check involves looking for
    a lock file. If the lock file exists, then the shell script exits; if the lock
    file doesn’t exist, then one is created. At the end of the job, the lock file
    is removed.


    Sometimes, there’s a problem with the job, and it aborts abnormally before the
    lock file can be removed. In these situations, I want to know if a lock file that
    is older than 1 day exists the a server. The existence of an old lock file indicates
    that there has been an issue and that I need to investigate. The following shell
    script checks for any lock files older than 1 day in the tmp directory.


    ```

    #!/bin/bash

    BOX=$(uname -a | awk ''{print $2}'')

    # find all lock files gt 1 day old.

    # Find all lock files in /tmp, if found, find any older than one day

    ls /tmp/*.lock 2>/dev/null && \

    filevar=$(find /tmp/*lock -type f -mtime +1 | wc -l) || filevar=0

    if [ $filevar -gt 0 ]; then

      echo "$BOX, lockfile issue: $filevar" | \

      mailx -s "$BOX lockfile problem" dkuhn@gmail.com

    else

      echo "Lock file ok: $filevar"

    fi

    exit 0

    ```


    I usually check for the existence of a lock file on a daily basis. Here is a typical
    cron entry for running the prior script, named lock_chk.bsh (this entry should
    all be on one line but has been placed on two lines in order to fit on the page):


    ```

    33 5 * * * /orahome/oracle/bin/lock_chk.bsh

       1>/orahome/oracle/bin/log/lock_chk.log 2>&1

    ```


    Checking for Too Many Processes


    On some database servers, you may have many background SQL*Plus jobs. These batch
    jobs may perform tasks such as copying data from remote databases and large daily
    update jobs. In these environments it’s useful to know if, at any given time,
    there are an abnormal number of shell scripts or SQL*Plus processes running on
    the database server. An abnormal number of jobs could be an indication that something
    is broken or hung.


    The next shell script has two checks in it: one  to determine the number of shell
    scripts that are named with the extension of bsh and one to determine the number
    of processes that contain the string of sqlplus:


    ```

    #!/bin/bash

    #

    if [ $# -ne 0 ]; then

      echo "Usage: $0"

      exit 1

    fi

    #

    crit_var=$(ps -ef | grep -v grep | grep bsh | wc -l)

    if [ $crit_var -lt 20 ]; then

      echo $crit_var

      echo "processes running normal"

    else

      echo "too many processes"

      echo $crit_var | mailx -s "too many bsh procs: $1" dkuhn@gmail.com

    fi

    #

    crit_var=$(ps -ef | grep -v grep | grep sqlplus | wc -l)

    if [ $crit_var -lt 30 ]; then

      echo $crit_var

      echo "processes running normal"

    else

      echo "too many processes"

      echo $crit_var | mailx -s "too many sqlplus procs: $1" dkuhn@gmail.com

    fi

    #

    exit 0

    ```


    The prior shell script, named proc_count.bsh, is run once an hour from a cron
    job (this entry should actually be a single line of code but is placed on two
    lines in order to fit on the page):


    ```

    33 * * * * /home/oracle/bin/proc_count.bsh

      1>/home/oracle/bin/log/proc_count.log 2>&1

    ```


    Verifying the Integrity of RMAN Backups


    As part of your backup-and-recovery strategy, you should periodically validate
    the integrity of the backup files. RMAN provides a RESTORE...VALIDATE command
    that checks for physical corruption within the backup files. The following script
    starts RMAN and spools a log file. The log file is subsequently searched for the
    keyword error. If there are any errors in the log file, an e-mail is sent:


    ```

    #!/bin/bash

    #

    if [ $# -ne 1 ]; then

      echo "Usage: $0 SID"

      exit 1

    fi

    # source oracle OS variables

    . /etc/oraset $1

    #

    date

    BOX=''uname -a | awk ''{print$2}''''

    rman nocatalog <<EOF

    connect target /

    spool log to $HOME/bin/log/rman_val.log

    set echo on;

    restore database validate;

    EOF

    grep -i error $HOME/bin/log/rman_val.log

    if [ $? -eq 0 ]; then

      echo "RMAN verify issue $BOX, $1" | \

      mailx -s "RMAN verify issue $BOX, $1" dkuhn@sun.com

    else

      echo "no problem..."

    fi

    #

    date

    exit 0

    ```


    The RESTORE...VALIDATE doesn’t actually restore any files; it only validates that
    the files required to restore the database are available and checks for physical
    corruption.


    If you need to check for logical corruption as well, specify the CHECK LOGICAL
    clause. For example, to check for logical corruption, the prior shell script would
    have this line in it:


    ```

    restore database validate check logical;

    ```


    For large databases the validation process can take a great deal of time (because
    the script checks each block in the backup file for corruption). If you only want
    to verify that the backup files exist, specify the V ALIDATE HEADER clause, like
    so:


    ```

    restore database validate header;

    ```


    This command only checks for valid information in the header of each file that
    would be required for a restore and recovery.


    Summary


    Automating routine database jobs is a key strategy of the successful DBA. Automated
    jobs ensure that tasks are repeatable and verifiable and that you’re quickly notified
    when there are any problems. For example, your job as a DBA greatly depends on
    successfully running backups and ensuring that the database is highly available.
    This chapter includes several scripts and examples that detail how to run routine
    jobs at defined frequencies.


    Oracle provides the Oracle Scheduler utility (implemented via the DBMS_SCHEDULER
    PL/SQL package) for scheduling jobs. This tool can be used to automate any type
    of database task. You can also initiate jobs based on system events or on the
    success/failure of other scheduled jobs. I prefer to use cron for scheduling database
    jobs. However, you might have sophisticated scheduling requirements that dictate
    the use of a tool such as the Oracle Scheduler.


    If you’re a DBA who works in a Linux/Unix shop, you should familiarize yourself
    with the cron utility. This scheduler is simple to use and is almost universally
    available. Even if you don’t use cron for your current assignment, you’re sure
    to encounter its use in future work environments.


    At this point in the book, you’ve learned how to implement and perform many tasks
    required of a DBA. Even if you manage just one database, no doubt you’ve been
    embroiled in a vast number of troubleshooting activities. The next chapter focuses
    on diagnosing and resolving many of the issues that a DBA encounters.


