    \ 是否与它将插入的 `CDB` 兼容。运行此代码时，请提供先前创建的 `XML` 文件的目录和名称：\n\n```sql\nSET SERVEROUTPUT\
    \ ON\nDECLARE\nhold_var boolean;\nbegin\nhold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>'/orahome/oracle/ncdb.xml');\n\
    if hold_var then\n  dbms_output.put_line('YES');\nelse\n  dbms_output.put_line('NO');\n\
    end if;\nend;\n/\n```\n\n如果没有兼容性问题，上述代码将显示 `YES`；如果可插拔数据库不兼容，则显示 `NO`。你可以查询 `PDB_PLUG_IN_VIOLATIONS`\
    \ 视图的内容，了解可插拔数据库与 `CDB` 不兼容的原因。\n\n接下来，使用以下 `SQL` 从非 `CDB` 创建一个可插拔数据库。你必须指定详细信息，例如先前创建的\
    \ `XML` 文件的名称和位置、非 `CDB` 数据文件的位置以及你希望新数据文件创建的位置：\n\n```sql\nCREATE PLUGGABLE DATABASE\
    \ dkpdb\nUSING '/orahome/oracle/ncdb.xml'\nCOPY\nFILE_NAME_CONVERT = ('/u01/dbfile/dk/',\n\
    \                     '/u01/dbfile/CDB/dkpdb/');\n```\n\n如果成功，你应该会看到：\n\n```\n\
    Pluggable database created.\n```\n\n现在，作为 `SYS` 连接到新创建的可插拔数据库：\n\n```bash\n$ sqlplus\
    \ sys/foo@'speed2:1521/dkpdb' as sysdba\n```\n\n作为最后一步，运行以下脚本：\n\n```sql\nSQL>\
    \ @?/rdbms/admin/noncdb_to_pdb.sql\n```\n\n你现在应该能够打开可插拔数据库并开始使用它。\n\n## 从 `CDB`\
    \ 卸载可插拔数据库\n\n在将可插拔数据库插入另一个 `CDB` 之前，必须先将其卸载。卸载意味着将可插拔数据库与 `CDB` 解除关联，并生成一个描述被卸载的可插拔数据库的\
    \ `XML` 文件。此 `XML` 文件将来可用于将可插拔数据库插入另一个 `CDB`。\n\n卸载可插拔数据库需要以下步骤：\n\n1.  关闭可插拔数据库（这会将其打开模式更改为\
    \ `MOUNTED`）\n2.  通过 `ALTER PLUGGABLE DATABASE ... UNPLUG` 命令卸载可插拔数据库\n\n首先，作为\
    \ `SYS` 用户连接到根容器，然后关闭可插拔数据库：\n\n```bash\n$ sqlplus / as sysdba\nSQL> alter pluggable\
    \ database dkpdb close immediate;\n```\n\n接下来，卸载可插拔数据库。确保为 `XML` 文件的位置指定一个在你的环境中存在的目录：\n\
    \n```sql\nalter pluggable database dkpdb unplug into\n'/orahome/oracle/dba/dkpdb.xml';\n\
    ```"
- fmt: "The XML file contains metadata regarding the pluggable database, such as its\
    \ data files. This XML is required if you want to plug the pluggable database\
    \ into another CDB.\n\n![image](Images/sq.jpg) **Note** Once a pluggable database\
    \ is unplugged, it must be dropped before it can be plugged back into the original\
    \ CDB.\n\n## Plugging an Unplugged Pluggable Database into a CDB\n\nBefore a pluggable\
    \ database can be plugged into a CDB, it must be compatible with a CDB in terms\
    \ of data file endianness and compatible database options installed. You can verify\
    \ the compatibility via the `DBMS_PDB` package. You must provide as input to the\
    \ package the directory and name of the XML file created when the pluggable database\
    \ was unplugged. Here is an example:\n\n```\nSET SERVEROUTPUT ON\nDECLARE\nhold_var\
    \ boolean;\nbegin\nhold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>'/orahome/oracle/dba/dkpdb.xml');\n\
    if hold_var then\n  dbms_output.put_line('YES');\nelse\n  dbms_output.put_line('NO');\n\
    end if;\nend;\n/\n```\n\nIf there are no compatibility issues, a `YES` is displayed\
    \ by the prior code; a `NO` is displayed if the pluggable database is not compatible.\
    \ You can query the contents of the `PDB_PLUG_IN_VIOLATIONS` view for details\
    \ on why a pluggable database is not compatible with a CDB.\n\nPlugging in a pluggable\
    \ database is done with the `CREATE PLUGGABLE DATABASE` command. When you plug\
    \ a pluggable database into a CDB, you must provide some key pieces of information,\
    \ using these two clauses:\n\n*   `USING` clause: This clause specifies the location\
    \ of the XML file created when the pluggable database was unplugged.\n*   `COPY\
    \ FILE_NAME_CONVERT` clause: This clause specifies the source of the pluggable\
    \ database data files and the location where the pluggable database data files\
    \ will be created within the destination CDB.\n\nTo plug in a pluggable database,\
    \ connect to the CDB as a privileged user, and run the following:\n\n```\nCREATE\
    \ PLUGGABLE DATABASE dkpdb\nUSING '/orahome/oracle/dba/dkpdb.xml'\nCOPY\nFILE_NAME_CONVERT\
    \ = ('/u01/app/oracle/oradata/CDB1/dkpdb',\n                     '/u01/dbfile/CDB2/dkpdb');\n\
    ```\n\nYou can now open the pluggable database and begin using it.\n\n## Using\
    \ the DBCA to Create a Pluggable Database from the Seed Database\n\nYou can use\
    \ the `DBCA` utility to create a pluggable database from the seed database by\
    \ specifying the `–createPDBFrom DEFAULT` clause. Here is an example that creates\
    \ a pluggable database named `HRPDB` within a CDB named `CDB`:\n\n```\ndbca -silent\
    \ -createPluggableDatabase -sourceDB CDB -pdbName hrpdb\n-createPDBFrom DEFAULT\n\
    -pdbAdminUserName adminplug -pdbAdminPassword foo\n-pdbDatafileDestination /u01/dbfile/CDB/hrpdb\n\
    ```\n\nThe prior lines of code must be entered on one line. Also, if the pluggable\
    \ database destination directory doesn’t exist, the `DBCA` will automatically\
    \ create it. As the command progresses, you should see output similar to this:\n\
    \n```\nCreating Pluggable Database\n4% complete\n12% complete\n...\nCompleting\
    \ Pluggable Database Creation\n100% complete\nLook at the log file \"/orahome/app/oracle/cfgtoollogs/dbca/CDB.log\"\
    \ for further details.\n```\n\nAs a last step, you should inspect the log file\
    \ and ensure that there were no issues with the creation of the pluggable database.\n\
    \n## Checking the Status of Pluggable Databases\n\nAfter creating a pluggable\
    \ database, you may want to check its status. You can view the status of all pluggable\
    \ databases within a CDB while connected as a privileged user in the root container.\
    \ For instance, a user with `DBA` privileges can report on the status of all pluggable\
    \ databases via this query:\n\n```\nSQL> select pdb_id, pdb_name, status from\
    \ cdb_pdbs;\n```\n\nHere is some sample output:\n\n```\n    PDB_ID PDB_NAME  \
    \           STATUS\n---------- -------------------- -------------\n         2\
    \ PDB$SEED             NORMAL\n         3 SALESPDB             NORMAL\n      \
    \   4 HRPDB                NORMAL\n```\n\nThis next query reports on whether or\
    \ not the pluggable databases are open:\n\n```\nSQL> select con_id, name, open_mode\
    \ from v$pdbs;\n```\n\nHere is some sample output:"
  raw: 'The XML file contains metadata regarding the pluggable database, such as its
    data files. This XML is required if you want to plug the pluggable database into
    another CDB.


    ![image](Images/sq.jpg) **Note**   Once a pluggable database is unplugged, it
    must be dropped before it can be plugged back into the original CDB.


    Plugging an Unplugged Pluggable Database into a CDB


    Before a pluggable database can be plugged into a CDB, it must be compatible with
    a CDB in terms of data file endianness and compatible database options installed.
    You can verify the compatibility via the DBMS_PDB package. You must provide as
    input to the package the directory and name of the XML file created when the pluggable
    database was unplugged. Here is an example:


    ```

    SET SERVEROUTPUT ON

    DECLARE

    hold_var boolean;

    begin

    hold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>''/orahome/oracle/dba/dkpdb.xml'');

    if hold_var then

      dbms_output.put_line(''YES'');

    else

      dbms_output.put_line(''NO'');

    end if;

    end;

    /

    ```


    If there are no compatibility issues, a YES is displayed by the prior code; a
    NO is displayed if the pluggable database is not compatible. You can query the
    contents of the PDB_PLUG_IN_VIOLATIONS view for details on why a pluggable database
    is not compatible with a CDB.


    Plugging in a pluggable database is done with the CREATE PLUGGABLE DATABASE command.
    When you plug a pluggable database into a CDB, you must provide some key pieces
    of information, using these two clauses:


    *   USING clause: This clause specifies the location of the XML file created when
    the pluggable database was unplugged

    *   COPY FILE_NAME_CONVERT clause: This clause specifies the source of the pluggable
    database data files and the location where the pluggable database data files will
    be created within the destination CDB.


    To plug in a pluggable database, connect to the CDB as a privileged user, and
    run the following:


    ```

    CREATE PLUGGABLE DATABASE dkpdb

    USING ''/orahome/oracle/dba/dkpdb.xml''

    COPY

    FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB1/dkpdb'',

                         ''/u01/dbfile/CDB2/dkpdb'');

    ```


    You can now open the pluggable database and begin using it.


    Using the DBCA to Create a Pluggable Database from the Seed Database


    You can use the DBCA utility to create a pluggable database from the seed database
    by specifying the –createPDBFrom DEFAULT clause. Here is an example that creates
    a pluggable database named HRPDB within a CDB named CDB:


    ```

    dbca -silent -createPluggableDatabase -sourceDB CDB -pdbName hrpdb

    -createPDBFrom DEFAULT

    -pdbAdminUserName adminplug -pdbAdminPassword foo

    -pdbDatafileDestination /u01/dbfile/CDB/hrpdb

    ```


    The prior lines of code must be entered on one line. Also, if the pluggable database
    destination directory doesn’t exist, the DBCA will automatically create it. As
    the command progresses, you should see output similar to this:


    ```

    Creating Pluggable Database

    4% complete

    12% complete

    ...

    Completing Pluggable Database Creation

    100% complete

    Look at the log file "/orahome/app/oracle/cfgtoollogs/dbca/CDB.log" for further
    details.

    ```


    As a last step, you should inspect the log file and ensure that there were no
    issues with the creation of the pluggable database.


    Checking the Status of Pluggable Databases


    After creating a pluggable database, you may want to check its status. You can
    view the status of all pluggable databases within a CDB while connected as a privileged
    user in the root container. For instance, a user with DBA privileges can report
    on the status of all pluggable databases via this query:


    ```

    SQL> select pdb_id, pdb_name, status from cdb_pdbs;

    ```


    Here is some sample output:


    ```

        PDB_ID PDB_NAME             STATUS

    ---------- -------------------- -------------

             2 PDB$SEED             NORMAL

             3 SALESPDB             NORMAL

             4 HRPDB                NORMAL

    ```


    This next query reports on whether or not the pluggable databases are open:


    ```

    SQL> select con_id, name, open_mode from v$pdbs;

    ```


    Here is some sample output:'
