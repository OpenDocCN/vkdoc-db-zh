    \  1>/orahome/oracle/bin/log/lock_chk.log 2>&1\n```\n\n## Checking for Too Many\
    \ Processes\n\nOn some database servers, you may have many background `SQL*Plus`\
    \ jobs. These batch jobs may perform tasks such as copying data from remote databases\
    \ and large daily update jobs. In these environments it’s useful to know if, at\
    \ any given time, there are an abnormal number of shell scripts or `SQL*Plus`\
    \ processes running on the database server. An abnormal number of jobs could be\
    \ an indication that something is broken or hung.\n\nThe next shell script has\
    \ two checks in it: one to determine the number of shell scripts that are named\
    \ with the extension of `bsh` and one to determine the number of processes that\
    \ contain the string of `sqlplus`:\n\n```bash\n#!/bin/bash\n#\nif [ $# -ne 0 ];\
    \ then\n  echo \"Usage: $0\"\n  exit 1\nfi\n#\ncrit_var=$(ps -ef | grep -v grep\
    \ | grep bsh | wc -l)\nif [ $crit_var -lt 20 ]; then\n  echo $crit_var\n  echo\
    \ \"processes running normal\"\nelse\n  echo \"too many processes\"\n  echo $crit_var\
    \ | mailx -s \"too many bsh procs: $1\" dkuhn@gmail.com\nfi\n#\ncrit_var=$(ps\
    \ -ef | grep -v grep | grep sqlplus | wc -l)\nif [ $crit_var -lt 30 ]; then\n\
    \  echo $crit_var\n  echo \"processes running normal\"\nelse\n  echo \"too many\
    \ processes\"\n  echo $crit_var | mailx -s \"too many sqlplus procs: $1\" dkuhn@gmail.com\n\
    fi\n#\nexit 0\n```\n\nThe prior shell script, named `proc_count.bsh`, is run once\
    \ an hour from a `cron` job (this entry should actually be a single line of code\
    \ but is placed on two lines in order to fit on the page):\n\n```\n33 * * * *\
    \ /home/oracle/bin/proc_count.bsh\n  1>/home/oracle/bin/log/proc_count.log 2>&1\n\
    ```\n\n## Verifying the Integrity of RMAN Backups\n\nAs part of your backup-and-recovery\
    \ strategy, you should periodically validate the integrity of the backup files.\
    \ `RMAN` provides a `RESTORE...VALIDATE` command that checks for physical corruption\
    \ within the backup files. The following script starts `RMAN` and spools a log\
    \ file. The log file is subsequently searched for the keyword `error`. If there\
    \ are any errors in the log file, an e-mail is sent:\n\n```bash\n#!/bin/bash\n\
    #\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n# source oracle\
    \ OS variables\n. /etc/oraset $1\n#\ndate\nBOX='uname -a | awk '{print$2}''\n\
    rman nocatalog <<EOF\nconnect target /\nspool log to $HOME/bin/log/rman_val.log\n\
    set echo on;\nrestore database validate;\nEOF\ngrep -i error $HOME/bin/log/rman_val.log\n\
    if [ $? -eq 0 ]; then\n  echo \"RMAN verify issue $BOX, $1\" | \\\n  mailx -s\
    \ \"RMAN verify issue $BOX, $1\" dkuhn@sun.com\nelse\n  echo \"no problem...\"\
