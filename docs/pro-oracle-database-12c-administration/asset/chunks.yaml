    | 术语 | 含义 |

    | --- | --- |

    | 容器数据库 (CDB), 多租户数据库 | 能够容纳一个或多个可插拔数据库的数据库 |

    | 可插拔数据库 (PDB) | 一组可以无缝地从一个 CDB 传输到另一个 CDB 的数据文件和元数据 |

