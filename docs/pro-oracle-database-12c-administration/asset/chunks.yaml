- fmt: "# Granularity and Synergy\n\n**Granularity:** If need be, repair and maintenance\
    \ can be performed at the container level. Likewise, you can take pluggable databases\
    \ offline for maintenance without affecting any other pluggable databases within\
    \ the CDB.\n\n**Synergy:** Each container efficiently shares the ship’s communal\
    \ resources, such as the engine, crew, and navigation systems. This is similar\
    \ to pluggable databases’ sharing a common SGA, UNDO tablespace, FRA, parameter\
    \ file, and redo stream (online redo logs and archive redo logs) as well as background\
    \ processes and control files. Economies of scale are generated through sharing\
    \ a mutual database infrastructure; hardware and human resource (DBA) costs are\
    \ spread across many databases.\n\n**Provisioning:** For this analogy, assume\
    \ that you can easily replicate a shipping container (perhaps with a giant three-dimensional\
    \ scanner/printer); this would allow you to create containers as copies of existing\
    \ containers. Similarly, pluggable databases can quickly and efficiently be created\
    \ from existing databases (seed, pluggable database, or non-CDB).\n\n**Transferability:**\
    \ When required, a shipping container can be easily transferred to another form\
    \ of transportation (another ship, a freight train, or piggyback on a semi-truck).\
    \ In the same way, pluggable databases can be easily unplugged and plugged into\
    \ other CDBs. It doesn’t necessarily matter if the destination CDB is the same\
    \ version and type as the source CDB.\n\n# Creating a CDB\n\nTo use the pluggable\
    \ database feature, you have to specifically create a pluggable enabled CDB. There\
    \ are a several different techniques for creating a CDB:\n\n*   Manually issuing\
    \ the SQL `CREATE DATABASE` command\n*   Using `DBCA`\n*   Generating the required\
    \ scripts with the `DBCA`, and then manually running the scripts to create a CDB\n\
    *   Using `RMAN` to duplicate an existing CDB\n\nThe next two sections focus on\
    \ showing you how to create a database with the `CREATE DATABASE` command and\
    \ the `DBCA`. For details on using `RMAN` to duplicate a CDB or pluggable database,\
    \ see *RMAN Recipes for Oracle Database 12c*, second edition, by Darl Kuhn (Apress,\
    \ 2013).\n\n## Creating Manually with SQL\n\nFirst, ensure that your `ORACLE_SID`,\
    \ `ORACLE_HOME`, and `PATH` variables are set for your CDB environment (see [Chapter\
    \ 2](#9781430257288_Ch02.xhtml) for details on setting OS variables); for example,\n\
    \n```bash\n$ export ORACLE_SID=CDB\n$ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    $ export PATH=$ORACLE_HOME/bin:$PATH\n```\n\nNext, create a parameter initialization\
    \ file in the `ORACLE_HOME/dbs` directory. Make certain you set the `ENABLE_PLUGGABLE_DATABASE`\
    \ parameter to `TRUE`. Here, I’ve used an OS text editor to create a file named\
    \ `initCDB.ora` and placed within it the following parameter specifications:\n\
    \n```text\ndb_name='CDB'\nenable_pluggable_database=true\naudit_trail='db'\ncontrol_files='/u01/dbfile/CDB/control01.ctl','/u01/dbfile/CDB/control02.ctl'\n\
    db_block_size=8192\ndb_domain=''\nmemory_target=629145600\nmemory_max_target=629145600\n\
    open_cursors=300\nprocesses=300\nremote_login_passwordfile='EXCLUSIVE'\nundo_tablespace='UNDOTBS1'\n\
    ```\n\nNow, use an OS text editor to create a file named `credb.sql`, and place\
    \ within it an appropriate `CREATE DATABASE` statement:\n\n```sql\nCREATE DATABASE\
    \ CDB\n   MAXLOGFILES 16\n   MAXLOGMEMBERS 4\n   MAXDATAFILES 1024\n   MAXINSTANCES\
    \ 1\n   MAXLOGHISTORY 680\n   CHARACTER SET US7ASCII\n   NATIONAL CHARACTER SET\
    \ AL16UTF16\nDATAFILE\n'/u01/dbfile/CDB/system01.dbf' SIZE 500M\n   EXTENT MANAGEMENT\
    \ LOCAL\nUNDO TABLESPACE undotbs1 DATAFILE\n'/u01/dbfile/CDB/undotbs01.dbf' SIZE\
    \ 800M\nSYSAUX DATAFILE\n'/u01/dbfile/CDB/sysaux01.dbf' SIZE 500M\nDEFAULT TEMPORARY\
    \ TABLESPACE TEMP TEMPFILE\n'/u01/dbfile/CDB/temp01.dbf' SIZE 500M\nDEFAULT TABLESPACE\
    \ USERS DATAFILE\n'/u01/dbfile/CDB/users01.dbf' SIZE 50M\nLOGFILE GROUP 1\n  \
    \      ('/u01/oraredo/CDB/redo01a.rdo') SIZE 50M,\n        GROUP 2\n        ('/u01/oraredo/CDB/redo02a.rdo')\
    \ SIZE 50M\nUSER sys    IDENTIFIED BY foo\nUSER system IDENTIFIED BY foo\nUSER_DATA\
    \ TABLESPACE userstbs DATAFILE\n  '/u01/dbfile/CDB/userstbsp01.dbf' SIZE 500M\n\
    ENABLE PLUGGABLE DATABASE\nSEED FILE_NAME_CONVERT = ('/u01/dbfile/CDB','/u01/dbfile/CDB/pdbseed');\n\
    ```\n\nThere are a few clauses of the `CREATE DATABASE` statement relevant only\
    \ to pluggable databases. For instance, the `ENABLE PLUGGABLE DATABASE` clause\
    \ is required if you want to create a pluggable database within the CDB. The `USER_DATA\
    \ TABLESPACE` clause specifies that an additional tablespace be created within\
    \ the seed database; this tablespace will also be replicated to any pluggable\
    \ databases that are cloned from the seed database. Also, the `SEED FILE_NAME_CONVERT`\
    \ specifies how the seed database files will be named and in what directories\
    \ they will be located.\n\nNext, ensure you have created any directories referenced\
    \ in the parameter file and the `CREATE DATABASE` statement:\n\n```bash\n$ mkdir\
    \ -p /u01/dbfile/CDB/pdbseed\n$ mkdir -p /u01/dbfile/CDB\n$ mkdir -p /u01/oraredo/CDB\n\
    ```\n\nNow, start up your database in `nomount` mode, and run the `credb.sql`\
    \ script:\n\n```bash\n$ sqlplus / as sysdba\nSQL> startup nomount;\nSQL> @credb.sql\n\
    ```\n\nIf successful, you should see this:\n\n```text\nDatabase created.\n```\n\
    \nOracle recommends that you use the `catcon.pl` Perl script to run any Oracle\
    \ supplied SQL scripts for a CDB. Therefore to create the data dictionary for\
    \ a CDB use the `catcon.pl` Perl script. First change directories to the `ORACLE_HOME/rdbms/admin`\
    \ directory:\n\n```bash\n$ cd $ORACLE_HOME/rdbms/admin\n```\n\nNow use `catcon.pl`\
    \ to run the `catalog.sql` script as `SYS`:\n\n```bash\n$ perl catcon.pl -u sys/foo\
    \ -s -e -d $ORACLE_HOME/rdbms/admin -b catalog1 catalog.sql > catcon-catalog.log\n\
    ```\n\nNext, use `catcon.pl` to run the `catproc.sql` script as `SYS`:\n\n```bash\n\
    $ perl catcon.pl -u sys/foo -s -e -d $ORACLE_HOME/rdbms/admin -b catproc1 catproc.sql\
    \ > catcon-catproc.log\n```\n\nAfter you have created the data dictionary, as\
    \ the `SYSTEM` schema, create the product user profile tables:\n\n```bash\n$ perl\
    \ catcon.pl -u system/foo -s -e -d $ORACLE_HOME/sqlplus/admin -b pupbld1 pupbld.sql\
    \ > catcon-pupbld.log\n```\n\nAt this point, you should have a fully functional\
    \ CDB database and can start creating pluggable databases within it.\n\n## Using\
    \ the DBCA\n\nYou can use the `DBCA` utility to create a CDB through either a\
    \ graphical interface or the command-line mode. When using the graphical interface,\
    \ you’ll be prompted as to whether or not you want to create a CDB.\n\nThis example\
    \ walks you through using the command-line mode. First, ensure that your `ORACLE_SID`,\
    \ `ORACLE_HOME`, and `PATH` variables are set for your CDB environment (see [Chapter\
    \ 2](#9781430257288_Ch02.xhtml) for details on setting OS variables); for example,\n\
    \n```bash\n$ export ORACLE_SID=CDB\n$ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    $ export PATH=$ORACLE_HOME/bin:$PATH\n```\n\nNow, use the `DBCA` to create a CDB.\
    \ When using the command-line mode of the `DBCA`, you must specify the `createAsContainerDatabase`\
    \ clause. The following bit of code creates a database named `CDB`:\n\n```bash\n\
    dbca -silent -createDatabase -templateName General_Purpose.dbc -gdbname CDB -sid\
    \ CDB -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30 -emConfiguration\
    \ LOCAL -createAsContainerDatabase true -sysPassword foo -systemPassword foo\n\
    ```"
  raw: '**Granularity:** If need be, repair and maintenance can be performed at the
    container level. Likewise, you can take pluggable databases offline for maintenance
    without affecting any other pluggable databases within the CDB.


    **Synergy:** Each container efficiently shares the ship’s communal resources,
    such as the engine, crew, and navigation systems. This is similar to pluggable
    databases’ sharing a common SGA, UNDO tablespace, FRA, parameter file, and redo
    stream (online redo logs and archive redo logs) as well as background processes
    and control files. Economies of scale are generated through sharing a mutual database
    infrastructure; hardware and human resource (DBA) costs are spread across many
    databases.


    **Provisioning:** For this analogy, assume that you can easily replicate a shipping
    container (perhaps with a giant three-dimensional scanner/printer); this would
    allow you to create containers as copies of existing containers. Similarly, pluggable
    databases can quickly and efficiently be created from existing databases (seed,
    pluggable database, or non-CDB).


    **Transferability:** When required, a shipping container can be easily transferred
    to another form of transportation (another ship, a freight train, or piggyback
    on a semi-truck). In the same way, pluggable databases can be easily unplugged
    and plugged into other CDBs. It doesn’t necessarily matter if the destination
    CDB is the same version and type as the source CDB.


    Creating a CDB


    To use the pluggable database feature, you have to specifically create a pluggable
    enabled CDB. There are a several different techniques for creating a CDB:


    *   Manually issuing the SQL CREATE DATABASE command

    *   Using DBCA

    *   Generating the required scripts with the DBCA, and then manually running the
    scripts to create a CDB

    *   Using RMAN to duplicate an existing CDB


    The next two sections focus on showing you how to create a database with the CREATE
    DATABASE command and the DBCA. For details on using RMAN to duplicate a CDB or
    pluggable database, see *RMAN Recipes for Oracle Database 12c*, second edition,
    by Darl Kuhn (Apress, 2013).


    Creating Manually with SQL


    First, ensure that your ORACLE_SID, ORACLE_HOME, and PATH variables are set for
    your CDB environment (see [Chapter 2](#9781430257288_Ch02.xhtml) for details on
    setting OS variables); for example,


    ```

    $ export ORACLE_SID=CDB

    $ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    $ export PATH=$ORACLE_HOME/bin:$PATH

    ```


    Next, create a parameter initialization file in the ORACLE_HOME/dbs directory.
    Make certain you set the ENABLE_PLUGGABLE_DATABASE parameter to TRUE. Here, I’ve
    used an OS text editor to create a file named initCDB.ora and placed within it
    the following parameter specifications:


    ```

    db_name=''CDB''

    enable_pluggable_database=true

    audit_trail=''db''

    control_files=''/u01/dbfile/CDB/control01.ctl'',''/u01/dbfile/CDB/control02.ctl''

    db_block_size=8192

    db_domain=''''

    memory_target=629145600

    memory_max_target=629145600

    open_cursors=300

    processes=300

    remote_login_passwordfile=''EXCLUSIVE''

    undo_tablespace=''UNDOTBS1''

    ```


    Now, use an OS text editor to create a file named credb.sql, and place within
    it an appropriate CREATE DATABASE statement:


    ```

    CREATE DATABASE CDB

       MAXLOGFILES 16

       MAXLOGMEMBERS 4

       MAXDATAFILES 1024

       MAXINSTANCES 1

       MAXLOGHISTORY 680

       CHARACTER SET US7ASCII

       NATIONAL CHARACTER SET AL16UTF16

    DATAFILE

    ''/u01/dbfile/CDB/system01.dbf'' SIZE 500M

       EXTENT MANAGEMENT LOCAL

    UNDO TABLESPACE undotbs1 DATAFILE

    ''/u01/dbfile/CDB/undotbs01.dbf'' SIZE 800M

    SYSAUX DATAFILE

    ''/u01/dbfile/CDB/sysaux01.dbf'' SIZE 500M

    DEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE

    ''/u01/dbfile/CDB/temp01.dbf'' SIZE 500M

    DEFAULT TABLESPACE USERS DATAFILE

    ''/u01/dbfile/CDB/users01.dbf'' SIZE 50M

    LOGFILE GROUP 1

            (''/u01/oraredo/CDB/redo01a.rdo'') SIZE 50M,

            GROUP 2

            (''/u01/oraredo/CDB/redo02a.rdo'') SIZE 50M

    USER sys    IDENTIFIED BY foo

    USER system IDENTIFIED BY foo

    USER_DATA TABLESPACE userstbs DATAFILE

      ''/u01/dbfile/CDB/userstbsp01.dbf'' SIZE 500M

    ENABLE PLUGGABLE DATABASE

    SEED FILE_NAME_CONVERT = (''/u01/dbfile/CDB'',''/u01/dbfile/CDB/pdbseed'');

    ```


    There are a few clauses of the CREATE DATABASE statement relevant only to pluggable
    databases. For instance, the ENABLE PLUGGABLE DATABASE clause is required if you
    want to create a pluggable database within the CDB. The USER_DATA TABLESPACE clause
    specifies that an additional tablespace be created within the seed database; this
    tablespace will also be replicated to any pluggable databases that are cloned
    from the seed database. Also, the SEED FILE_NAME_CONVERT specifies how the seed
    database files will be named and in what directories they will be located.


    Next, ensure you  have created any directories referenced in the parameter file
    and the CREATE DATABASE statement:


    ```

    $ mkdir -p /u01/dbfile/CDB/pdbseed

    $ mkdir -p /u01/dbfile/CDB

    $ mkdir -p /u01/oraredo/CDB

    ```


    Now, start up your database in nomount mode, and run the credb.sql script:


    ```

    $ sqlplus / as sysdba

    SQL> startup nomount;

    SQL> @credb.sql

    ```


    If successful, you should see this:


    ```

    Database created.

    ```


    Oracle recommends that you use the catcon.pl Perl script to run any Oracle supplied
    SQL scripts for a CDB. Therefore to create the data dictionary for a CDB use the
    catcon.pl Perl script. First change directories to the ORACLE_HOME/rdbms/admin
    directory:


    ```

    $ cd $ORACLE_HOME/rdbms/admin

    ```


    Now use catcon.pl to run the catalog.sql script as SYS:


    ```

    $ perl catcon.pl -u sys/foo -s -e -d $ORACLE_HOME/rdbms/admin -b catalog1

    catalog.sql > catcon-catalog.log

    ```


    Next, use catcon.pl to run the catproc.sql script as SYS:


    ```

    $ perl catcon.pl -u sys/foo -s -e -d $ORACLE_HOME/rdbms/admin -b catproc1

    catproc.sql > catcon-catproc.log

    ```


    After you have created the data dictionary, as the SYSTEM schema, create the product
    user profile tables:


    ```

    $ perl catcon.pl -u system/foo -s -e -d $ORACLE_HOME/sqlplus/admin -b pupbld1

    pupbld.sql > catcon-pupbld.log

    ```


    At this point, you should have a fully functional CDB database and can start creating
    pluggable databases within it.


    Using the DBCA


    You can use the DBCA utilityto create a CDB through either a graphical interface
    or the command-line mode. When using the graphical interface, you’ll be prompted
    as to whether or not you want to create a CDB.


    This example walks you through using the command-line mode. First, ensure that
    your ORACLE_SID, ORACLE_HOME, and PATH variables are set for your CDB environment
    (see [Chapter 2](#9781430257288_Ch02.xhtml) for details on setting OS variables);
    for example,


    ```

    $ export ORACLE_SID=CDB

    $ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    $ export PATH=$ORACLE_HOME/bin:$PATH

    ```


    Now, use the DBCA to create a CDB. When using the command-line mode of the DBCA,
    you must specify the createAsContainerDatabase clause. The following bit of code
    creates a database named CDB:


    ```

    dbca -silent -createDatabase -templateName General_Purpose.dbc -gdbname CDB

    -sid CDB -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30

    -emConfiguration LOCAL -createAsContainerDatabase true

    -sysPassword foo -systemPassword foo

    ```'
  trans: "\n# 粒度与协同效应\n\n**粒度：** 如有必要，可以在容器级别执行修复和维护。同样，您可以将可插拔数据库下线进行维护，而不会影响 CDB\
    \ 中的任何其他可插拔数据库。\n\n**协同效应：** 每个容器高效地共享船舶的公共资源，如引擎、船员和导航系统。这类似于可插拔数据库共享一个公共的 SGA、UNDO\
    \ 表空间、FRA、参数文件、重做流（在线重做日志和归档重做日志）以及后台进程和控制文件。通过共享一个共同的数据库基础设施，产生了规模经济；硬件和人力（DBA）成本分摊到众多数据库上。\n\
    \n**配置：** 对于这个类比，假设您可以轻松复制一个航运集装箱（或许使用一台巨大的三维扫描仪/打印机）；这将允许您以现有容器为副本来创建新容器。类似地，可以快速高效地从现有数据库（种子、可插拔数据库或非\
    \ CDB）创建可插拔数据库。\n\n**可移植性：** 在需要时，航运集装箱可以轻松转移到另一种运输工具（另一艘船、货运列车或半挂卡车背负运输）。同样，可插拔数据库可以轻松地拔出并插入其他\
    \ CDB。目标 CDB 是否与源 CDB 版本和类型相同并不重要。\n\n# 创建 CDB\n\n要使用可插拔数据库功能，您必须专门创建一个支持可插拔的\
    \ CDB。创建 CDB 有几种不同的技术：\n\n*   手动发出 SQL `CREATE DATABASE` 命令\n*   使用 `DBCA`\n*\
    \   使用 `DBCA` 生成所需的脚本，然后手动运行脚本以创建 CDB\n*   使用 `RMAN` 复制现有的 CDB\n\n接下来的两个部分重点展示如何使用\
    \ `CREATE DATABASE` 命令和 `DBCA` 创建数据库。有关使用 `RMAN` 复制 CDB 或可插拔数据库的详细信息，请参阅 Darl\
    \ Kuhn 所著的《*RMAN Recipes for Oracle Database 12c*》第二版（Apress, 2013）。\n\n## 手动使用\
    \ SQL 创建\n\n首先，确保您的 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH` 变量已为您的 CDB 环境设置好（有关设置操作系统变量的详细信息，请参阅第\
    \ 2 章）；例如，\n\n```bash\n$ export ORACLE_SID=CDB\n$ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    $ export PATH=$ORACLE_HOME/bin:$PATH\n```\n\n接下来，在 `ORACLE_HOME/dbs` 目录中创建一个参数初始化文件。确保将\
    \ `ENABLE_PLUGGABLE_DATABASE` 参数设置为 `TRUE`。这里，我使用操作系统文本编辑器创建了一个名为 `initCDB.ora`\
    \ 的文件，并在其中写入了以下参数规范：\n\n```text\ndb_name='CDB'\nenable_pluggable_database=true\n\
    audit_trail='db'\ncontrol_files='/u01/dbfile/CDB/control01.ctl','/u01/dbfile/CDB/control02.ctl'\n\
    db_block_size=8192\ndb_domain=''\nmemory_target=629145600\nmemory_max_target=629145600\n\
    open_cursors=300\nprocesses=300\nremote_login_passwordfile='EXCLUSIVE'\nundo_tablespace='UNDOTBS1'\n\
    ```\n\n现在，使用操作系统文本编辑器创建一个名为 `credb.sql` 的文件，并在其中放入一个合适的 `CREATE DATABASE` 语句：\n\
    \n```sql\nCREATE DATABASE CDB\n   MAXLOGFILES 16\n   MAXLOGMEMBERS 4\n   MAXDATAFILES\
    \ 1024\n   MAXINSTANCES 1\n   MAXLOGHISTORY 680\n   CHARACTER SET US7ASCII\n \
    \  NATIONAL CHARACTER SET AL16UTF16\nDATAFILE\n'/u01/dbfile/CDB/system01.dbf'\
    \ SIZE 500M\n   EXTENT MANAGEMENT LOCAL\nUNDO TABLESPACE undotbs1 DATAFILE\n'/u01/dbfile/CDB/undotbs01.dbf'\
    \ SIZE 800M\nSYSAUX DATAFILE\n'/u01/dbfile/CDB/sysaux01.dbf' SIZE 500M\nDEFAULT\
    \ TEMPORARY TABLESPACE TEMP TEMPFILE\n'/u01/dbfile/CDB/temp01.dbf' SIZE 500M\n\
    DEFAULT TABLESPACE USERS DATAFILE\n'/u01/dbfile/CDB/users01.dbf' SIZE 50M\nLOGFILE\
    \ GROUP 1\n        ('/u01/oraredo/CDB/redo01a.rdo') SIZE 50M,\n        GROUP 2\n\
    \        ('/u01/oraredo/CDB/redo02a.rdo') SIZE 50M\nUSER sys    IDENTIFIED BY\
    \ foo\nUSER system IDENTIFIED BY foo\nUSER_DATA TABLESPACE userstbs DATAFILE\n\
    \  '/u01/dbfile/CDB/userstbsp01.dbf' SIZE 500M\nENABLE PLUGGABLE DATABASE\nSEED\
    \ FILE_NAME_CONVERT = ('/u01/dbfile/CDB','/u01/dbfile/CDB/pdbseed');\n```\n\n\
    `CREATE DATABASE` 语句中有几个子句仅与可插拔数据库相关。例如，如果您想在 CDB 内创建可插拔数据库，则需要 `ENABLE PLUGGABLE\
    \ DATABASE` 子句。`USER_DATA TABLESPACE` 子句指定了在种子数据库内创建一个额外的表空间；该表空间也将复制到从种子数据库克隆的任何可插拔数据库中。此外，`SEED\
    \ FILE_NAME_CONVERT` 指定了种子数据库文件的命名方式及所在的目录。\n\n接下来，确保您已创建参数文件和 `CREATE DATABASE`\
    \ 语句中引用的任何目录：\n\n```bash\n$ mkdir -p /u01/dbfile/CDB/pdbseed\n$ mkdir -p /u01/dbfile/CDB\n\
    $ mkdir -p /u01/oraredo/CDB\n```\n\n现在，以 `nomount` 模式启动数据库，并运行 `credb.sql` 脚本：\n\
    \n```bash\n$ sqlplus / as sysdba\nSQL> startup nomount;\nSQL> @credb.sql\n```\n\
    \n如果成功，您应该会看到：\n\n```text\nDatabase created.\n```\n\nOracle 建议您使用 `catcon.pl`\
    \ Perl 脚本为 CDB 运行任何 Oracle 提供的 SQL 脚本。因此，要为 CDB 创建数据字典，请使用 `catcon.pl` Perl 脚本。首先进入\
    \ `ORACLE_HOME/rdbms/admin` 目录：\n\n```bash\n$ cd $ORACLE_HOME/rdbms/admin\n```\n\
    \n现在使用 `catcon.pl` 以 `SYS` 身份运行 `catalog.sql` 脚本：\n\n```bash\n$ perl catcon.pl\
    \ -u sys/foo -s -e -d $ORACLE_HOME/rdbms/admin -b catalog1 catalog.sql > catcon-catalog.log\n\
    ```\n\n接下来，使用 `catcon.pl` 以 `SYS` 身份运行 `catproc.sql` 脚本：\n\n```bash\n$ perl catcon.pl\
    \ -u sys/foo -s -e -d $ORACLE_HOME/rdbms/admin -b catproc1 catproc.sql > catcon-catproc.log\n\
    ```\n\n创建完数据字典后，以 `SYSTEM` 方案身份，创建产品用户配置文件表：\n\n```bash\n$ perl catcon.pl -u system/foo\
    \ -s -e -d $ORACLE_HOME/sqlplus/admin -b pupbld1 pupbld.sql > catcon-pupbld.log\n\
    ```\n\n至此，您应该拥有一个功能齐全的 CDB 数据库，并可以开始在其中创建可插拔数据库了。\n\n## 使用 DBCA\n\n您可以使用 `DBCA`\
    \ 实用程序通过图形界面或命令行模式创建 CDB。使用图形界面时，系统会提示您是否要创建 CDB。\n\n本示例将引导您使用命令行模式。首先，确保您的 `ORACLE_SID`、`ORACLE_HOME`\
    \ 和 `PATH` 变量已为您的 CDB 环境设置好（有关设置操作系统变量的详细信息，请参阅第 2 章）；例如，\n\n```bash\n$ export\
    \ ORACLE_SID=CDB\n$ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    $ export PATH=$ORACLE_HOME/bin:$PATH\n```\n\n现在，使用 `DBCA` 创建一个 CDB。使用 `DBCA` 的命令行模式时，必须指定\
    \ `createAsContainerDatabase` 子句。以下代码创建了一个名为 `CDB` 的数据库：\n\n```bash\ndbca -silent\
    \ -createDatabase -templateName General_Purpose.dbc -gdbname CDB -sid CDB -responseFile\
    \ NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30 -emConfiguration LOCAL\
    \ -createAsContainerDatabase true -sysPassword foo -systemPassword foo\n```\n"
- fmt: "The prior code must be entered on one line (it only appears here on multiple\
    \ lines in order to fit on the page). The `SID` that you provide (in this example,\
    \ `CDB`) must not exist in your `oratab` file. On Linux systems the `oratab` file\
    \ is usually located in the `/etc` directory. On other Unix systems (such as Solaris)\
    \ the `oratab` file is generally located in the `/var/opt/oracle` directory.\n\
    \nAfter pressing the Enter key, you should see some output similar to this:\n\n\
    ```\nCopying database files\n...\n9% complete\n41% complete\nCreating and starting\
    \ Oracle instance\n43% complete\n48% complete\n...\n```\n\nIt will take the `DBCA`\
    \ assistant several minutes to create the new `CDB`. Ensure that you have enough\
    \ disk space available when creating this database (approximately 5GB should be\
    \ enough). After the `DBCA` is finished running, you should have a fully functional\
    \ `CDB` database and can start creating pluggable databases within it.\n\n## Generating\
    \ CDB Create Scripts via DBCA\n\nYou can use the `DBCA` to generate the scripts\
    \ required to create a `CDB`, and then you have the option of manually running\
    \ the scripts to carry out the process. This next bit of code invokes the `DBCA`\
    \ utility from the command line and generates the scripts needed to create a `CDB`\
    \ named `CDB1`:\n\n```\ndbca -silent -generateScripts -templateName General_Purpose.dbc\
    \ -gdbname CDB1\n-sid CDB1 -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage\
    \ 30\n-emConfiguration LOCAL -createAsContainerDatabase true\n-sysPassword foo\
    \ -systemPassword foo\n```\n\nThe prior code must be entered on one line when\
    \ executed. Here is a snippet of typical output:\n\n```\nDatabase creation script\
    \ generation\n1% complete\n.....\n100% complete\nLook at the log file \"/orahome/app/oracle/admin/CDB1/scripts/CDB1.log\"\
    ...\n```\n\nAfter the `DBCA` is finished running, change the directory to the\
    \ location of the newly generated scripts:\n\n```\n$ cd $ORACLE_BASE/admin/CDB1/scripts\n\
    ```\n\nNow, display the scripts in the directory:\n\n```\n$ ls\n```\n\nHere is\
    \ some sample output:\n\n```\nCDB1.log                 cloneDBCreation.sql   \
    \   lockAccount.sql\nCDB1.sh                  init.ora                 postDBCreation.sql\n\
    CDB1.sql                 initCDB1Temp.ora         postScripts.sql\nCloneRmanRestore.sql\
    \     initCDB1TempOMF.ora      rmanRestoreDatafiles.sql\ntempControl.ctl\n```\n\
    \nTo create the database, run the `CDB1.sh` script:\n\n```\n$ CDB1.sh\n```\n\n\
    The prior shell script calls `CDB1.sql`, which subsequently invokes the `RMAN`\
    \ utility. `RMAN` creates the required data files from a backup and also creates\
    \ a database named `CDB1`. You should be able to start the database after you’ve\
    \ set your `ORACLE_SID` OS variable to contain the name of the freshly created\
    \ `CDB`.\n\n## Verifying that a CDB was Created\n\nTo verify whether a database\
    \ was created as a `CDB`, first connect to the root container as `SYS`:\n\n```\n\
    $ sqlplus / as sysdba\n```\n\nYou can now confirm that the `CDB` was successfully\
    \ created via this query. If a database was created as a `CDB`, the `CDB` column\
    \ of `V$DATABASE` will contain a `YES` value:\n\n```\nSQL> select name, cdb from\
    \ v$database;\n```\n\nHere is some sample output:\n\n```\nNAME      CDB\n---------\
    \ ---\nCDB       YES\n```\n\nAt this point, you should have two containers in\
    \ your `CDB` database: the root container and the seed pluggable database. You\
    \ can check with this query:\n\n```\nSQL> select con_id, name from v$containers;\n\
    ```\n\nHere is some sample output:\n\n```\nCON_ID NAME\n------ --------------------\n\
    \     1 CDB$ROOT\n     2 PDB$SEED\n```\n\nYou should also have data files associated\
    \ with the root and the seed database. You can view the data files associated\
    \ with each container via this query:\n\n```\nSQL> select con_id, file_name from\
    \ cdb_data_files order by 1;\n```\n\nHere is some output:\n\n```\nCON_ID FILE_NAME\n\
    ------ -------------------------------------------------------\n     1 /u01/app/oracle/oradata/CDB/system01.dbf\n\
    \     1 /u01/app/oracle/oradata/CDB/sysaux01.dbf\n     1 /u01/app/oracle/oradata/CDB/undotbs01.dbf\n\
    \     1 /u01/app/oracle/oradata/CDB/users01.dbf\n     2 /u01/app/oracle/oradata/CDB/pdbseed/system01.dbf\n\
    \     2 /u01/app/oracle/oradata/CDB/pdbseed/sysaux01.dbf\n```\n\nNote that if\
    \ you had selected from `DBA_DATA_FILES` instead of `CDB_DATA_FILES`, you would\
    \ only see the four data files associated with the root container (the container\
    \ you’re currently connected to); for example:\n\n```\nSQL> select file_name from\
    \ dba_data_files;\n\nFILE_NAME\n\n/u01/app/oracle/oradata/CDB/system01.dbf\n/u01/app/oracle/oradata/CDB/sysaux01.dbf\n\
    /u01/app/oracle/oradata/CDB/users01.dbf\n/u01/app/oracle/oradata/CDB/undotbs01.dbf\n\
    ```\n\n## Administrative the Root Container\n\nWhen you manage a `CDB`, for the\
    \ most part, you are connecting to the root container as `SYS` and performing\
    \ tasks as you would with a non-`CDB` database. However, there are several points\
    \ to be aware of that are specific to maintaining a `CDB`. The following tasks\
    \ can only be performed while connected to the root container with `SYSDBA` privileges:\n\
    \n*   Starting/stopping instance\n*   Enabling/disabling archive log mode\n* \
    \  Managing instance settings that affect all databases within the `CDB`, such\
    \ as overall memory size\n*   `B&R` of all data files within the database\n* \
    \  Managing control files (adding, restoring, removing, and so on)\n*   Managing\
    \ online redo logs\n*   Managing the root `UNDO` tablespace\n*   Managing the\
    \ root `TEMP` tablespace\n*   Creating common users and roles\n\nThese topics\
    \ are discussed in the following sections.\n\n## Connecting to the Root Container\n\
    \nConnecting to the root container as `SYS` allows you to perform all the tasks\
    \ you normally associate with database administration. You can connect as `SYS`\
    \ locally from the database server through OS authentication or a network connection\
    \ (which requires a listener and password file).\n\n### Through OS Authentication\n\
    \nIf you have access to the database server, you can connect to the `CDB` the\
    \ same as you would a non-`CDB` database. First, ensure that the required OS variables\
    \ have been set (see [Chapter 2](#9781430257288_Ch02.xhtml) for details):\n\n\
    ```\n$ echo $ORACLE_SID $ORACLE_HOME\n\nCDB /u01/app/oracle/product/12.1.0.1/db_1\n\
    ```\n\nWhen using OS authentication, you can connect to the `CDB` root container\
    \ without specifying a username and password:\n\n```\n$ sqlplus / as sysdba\n\
    ```\n\nYou can verify the `SYS` connection to the root container, as shown:\n\n\
    ```\nSQL> show user con_id con_name user\n\nUSER is \"SYS\"\n\nCON_ID\n\nCON_NAME\n\
    \nCDB$ROOT\nUSER is \"SYS\"\n```\n\n### Through Network\n\nIf you’re initiating\
    \ a remote connection through the network, then you need to first set up a listener\
    \ on the target database server and create a password file (see [Chapter 2](#9781430257288_Ch02.xhtml)\
    \ for details). Once a listener and password file are established, you can connect\
    \ remotely over the network, as shown:\n\n```\n$ sqlplus user/pass@connection_string\
    \ as sysdba\n```\n\nFor details on how to implement a listener in a pluggable\
    \ environment, see the section “Managing a Listener in a Pluggable Database Environment,”\
    \ later in this chapter.\n\n## Displaying Currently Connected Container Information\n\
    \nFrom `SQL*Plus` there are a couple of easy techniques for displaying the name\
    \ of the `CDB` that you’re currently connected to. This example uses the `SHOW`\
    \ command to display the container ID, the name, and the user:\n\n```\nSQL> show\
    \ con_id con_name user\n```\n\nYou can also display the same information via an\
    \ `SQL` query:\n\n```\nSELECT SYS_CONTEXT('USERENV', 'CON_ID') AS con_id,\n  \
    \     SYS_CONTEXT('USERENV', 'CON_NAME') AS cur_container,\n       SYS_CONTEXT('USERENV',\
    \ 'SESSION_USER') AS cur_user\nFROM DUAL;\n```\n\nHere is some sample output:\n\
    \n```\nCON_ID               CUR_CONTAINER        CUR_USER\n--------------------\
    \ -------------------- --------------------\n1                    CDB$ROOT   \
    \          SYS\n```\n\n## Starting/Stopping the Root Container"
  raw: 'The prior code must be entered on one line (it only appears here on multiple
    lines in order to fit on the page). The SID that you provide (in this example,
    CDB) must not exist in your oratab file. On Linux systems the oratab file is usually
    located in the /etc directory. On other Unix systems (such as Solaris) the oratab
    file is generally located in the /var/opt/oracle directory.


    After pressing the Enter key, you should see some output similar to this:


    ```

    Copying database files

    ...

    9% complete

    41% complete

    Creating and starting Oracle instance

    43% complete

    48% complete

    ...

    ```


    It will take the DBCA assistant several minutes to create the new CDB. Ensure
    that you have enough disk space available when creating this database (approximately
    5GB should be enough). After the DBCA is finished running, you should have a fully
    functional CDB database and can start creating pluggable databases within it.


    Generating CDB Create Scripts via DBCA


    You can use the DBCA to generate the scripts required to create a CDB, and then
    you have the option of manually running the scripts to carry out the process.
    This next bit of code invokes the DBCA utility from the command line and generates
    the scripts needed to create a CDB named CDB1:


    ```

    dbca -silent -generateScripts -templateName General_Purpose.dbc -gdbname CDB1

    -sid CDB1 -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30

    -emConfiguration LOCAL -createAsContainerDatabase true

    -sysPassword foo -systemPassword foo

    ```


    The prior code must be entered on one line when executed. Here is a snippet of
    typical output:


    ```

    Database creation script generation

    1% complete

    .....

    100% complete

    Look at the log file "/orahome/app/oracle/admin/CDB1/scripts/CDB1.log"...

    ```


    After the DBCA is finished running, change the directory to the location of the
    newly generated scripts:


    ```

    $ cd $ORACLE_BASE/admin/CDB1/scripts

    ```


    Now, display the scripts in the directory:


    ```

    $ ls

    ```


    Here is some sample output:


    ```

    CDB1.log                  cloneDBCreation.sql       lockAccount.sql

    CDB1.sh                   init.ora                  postDBCreation.sql

    CDB1.sql                  initCDB1Temp.ora          postScripts.sql

    CloneRmanRestore.sql      initCDB1TempOMF.ora       rmanRestoreDatafiles.sql

    tempControl.ctl

    ```


    To create the database, run the CDB1.sh script:


    ```

    $ CDB1.sh

    ```


    The prior shell script calls CDB1.sql, which subsequently invokes the RMAN utility.
    RMAN creates the required data files from a backup and also creates a database
    named CDB1\. You should be able to start the database after you’ve set your ORACLE_SID
    OS variable to contain the name of the freshly created CDB.


    Verifying that a CDB was Created


    To verify whether a database was created as a CDB, first connect to the root container
    as SYS:


    ```

    $ sqlplus / as sysdba

    ```


    You can now confirm that the CDB was successfully created via this query. If a
    database was created as a CDB, the CDB column of V$DATABASE will contain a YES
    value:


    ```

    SQL> select name, cdb from v$database;

    ```


    Here is some sample output:


    ```

    NAME      CDB

    --------- ---

    CDB       YES

    ```


    At this point, you should have two containers in your CDB database: the root container
    and the seed pluggable database. You can check with this query:


    ```

    SQL> select con_id, name from v$containers;

    ```


    Here is some sample output:


    ```

    CON_ID NAME

    ------ --------------------

         1 CDB$ROOT

         2 PDB$SEED

    ```


    You should also have data files associated with the root and the seed database.
    You can view the data files associated with each container via this query:


    ```

    SQL> select con_id, file_name from cdb_data_files order by 1;

    ```


    Here is some output:


    ```

    CON_ID FILE_NAME

    ------ -------------------------------------------------------

         1 /u01/app/oracle/oradata/CDB/system01.dbf

         1 /u01/app/oracle/oradata/CDB/sysaux01.dbf

         1 /u01/app/oracle/oradata/CDB/undotbs01.dbf

         1 /u01/app/oracle/oradata/CDB/users01.dbf

         2 /u01/app/oracle/oradata/CDB/pdbseed/system01.dbf

         2 /u01/app/oracle/oradata/CDB/pdbseed/sysaux01.dbf

    ```


    Note that if you had selected from DBA_DATA_FILES instead of CDB_DATA_FILES, you
    would only see the four data files associated with the root container (the container
    you’re currently connected to); for example,


    ```

    SQL> select file_name from dba_data_files;


    FILE_NAME


    /u01/app/oracle/oradata/CDB/system01.dbf

    /u01/app/oracle/oradata/CDB/sysaux01.dbf

    /u01/app/oracle/oradata/CDB/users01.dbf

    /u01/app/oracle/oradata/CDB/undotbs01.dbf

    ```


    Administrating the Root Container


    When you manage a CDB, for the most part, you are connecting to the root container
    as SYS and performing tasks as you would with a non-CDB database. However, there
    are several points to be aware of that are specific to maintaining a CDB. The
    following tasks can only be performed while connected to the root container with
    SYSDBA privileges:


    *   Starting/stopping instance

    *   Enabling/disabling archive log mode

    *   Managing instance settings that affect all databases within the CDB, such
    as overall memory size

    *   B&R of all data files within the database

    *   Managing control files (adding, restoring, removing, and so on)

    *   Managing online redo logs

    *   Managing the root UNDO tablespace

    *   Managing the root TEMP tablespace

    *   Creating common users and roles


    These topics are discussed in the following sections.


    Connecting to the Root Container


    Connecting to the root container as SYS allows you to perform all the tasks you
    normally associate with database administration. You can connect as SYS locally
    from the database server through OS authentication or a network connection (which
    requires a listener and password file).


    Through OS Authentication


    If you have access to the database server, you can connect to the CDB the same
    as you would a non-CDB database. First, ensure that the required OS variables
    have been set (see [Chapter 2](#9781430257288_Ch02.xhtml) for details):


    ```

    $ echo $ORACLE_SID $ORACLE_HOME


    CDB /u01/app/oracle/product/12.1.0.1/db_1

    ```


    When using OS authentication, you can connect to the CDB root container without
    specifying a username and password:


    ```

    $ sqlplus / as sysdba

    ```


    You can verify the SYS connection to the root container, as shown:


    ```

    SQL> show user con_id con_name user


    USER is "SYS"


    CON_ID


    CON_NAME


    CDB$ROOT

    USER is "SYS"

    ```


    Through Network


    If you’re initiating a remote connection through the network, then you need to
    first set up a listener on the target database server and create a password file
    (see [Chapter 2](#9781430257288_Ch02.xhtml) for details). Once a listener and
    password file are established, you can connect remotely over the network, as shown:


    ```

    $ sqlplus user/pass@connection_string as sysdba

    ```


    For details on how to implement a listener in a pluggable environment, see the
    section “Managing a Listener in a Pluggable Database Environment,” later in this
    chapter.


    Displaying Currently Connected Container Information


    From SQL*Plus there are a couple of easy techniques for displaying the name of
    the CDB that you’re currently connected to. This example uses the SHOW command
    to display the container ID, the name, and the user:


    ```

    SQL> show con_id con_name user

    ```


    You can also display the same information via an SQL query:


    ```

    SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'') AS con_id,

    SYS_CONTEXT(''USERENV'', ''CON_NAME'') AS cur_container,

    SYS_CONTEXT(''USERENV'', ''SESSION_USER'') AS cur_user

    FROM DUAL;

    ```


    Here is some sample output:


    ```

    CON_ID               CUR_CONTAINER        CUR_USER

    -------------------- -------------------- --------------------

    1                    CDB$ROOT             SYS

    ```


    Starting/Stopping the Root Container'
