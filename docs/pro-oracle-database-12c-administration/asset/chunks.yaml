  raw: 'Occasionally, you may need to drop a pluggable database. You may want to do
    so because you don’t need the pluggable database anymore or because you are transferring
    (unplugging/plugging) to a different CDB and you want to drop the pluggable database
    from the original CDB. If you need to remove a pluggable database, you can do
    it in two ways:


    *   Drop the pluggable database and its data files.

    *   Drop the pluggable database, and leave its data files in place.


    If you never plan on using the pluggable database again, then you can drop it
    and specify that the data files also be removed. If you plan on plugging the pluggable
    database into a different CDB, then (of course) don’t drop the data files, as
    doing so removes them from disk.


    To drop a pluggable database, first connect to the root container as a privileged
    account, and close the pluggable database:


    ```

    $ sqlplus / as sysdba

    SQL> alter pluggable database dkpdb close immediate;

    ```


    This example drops the pluggable database and its data files:


    ```

    SQL> drop pluggable database dkpdb including datafiles;

    ```


    If successful, you should see this message:


    ```

    Pluggable database dropped.

    ```


    This next example drops a pluggable database without removing the data files.
    You may want to do this if you’re moving the pluggable database to a different
    CDB:


    ```

    SQL> drop pluggable database dkpdb;

    ```


    In this manner, the pluggable database is disassociated from the CDB, but its
    data files remain intact on disk.


    Summary


    New with Oracle Database 12c, a pluggable database is a collection of data files
    and metadata that exist within a CDB. Pluggable databases have several interesting
    architectural features:


    *   When connected to a pluggable database, you have no visibility to other pluggable
    databases that exist within the CDB. It’s as if you are connected to an isolated
    database.

    *   Multiple pluggable databases share common database resources (memory structures,
    background processes, and so on) within the CDB. From the root container level,
    you can manage many DBA databases as if they were one database.

    *   You can shut down a pluggable database without affecting other pluggable databases
    within the CDB.

    *   New pluggable databases can be quickly created by cloning the seed database,
    an existing pluggable database, or a non-CDB.

    *   Pluggable databases can be easily transferred from one CDB to another by unplugging
    from one CDB and plugging the pluggable database into another CDB.


    These features provide new ways in which you can create and manage databases.
    The main advantage of pluggable database technology is that it allows you to consolidate
    many databases into one overarching database. This generates economies of scale,
    in that more databases can be implemented and maintained on fewer servers with
    less support personnel. As a DBA, understanding this technology and how to implement
    it makes you all the more valuable to your company.


    Godspeed.


