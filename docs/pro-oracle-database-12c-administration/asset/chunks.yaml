    *   当使用 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器时，你可以选择通过一个备份命令备份整个 CDB（根、种子及所有可插拔数据库）内的所有数据文件。你也可以选择在可插拔数据库级别的粒度上执行
    B&R 任务。

    *   当使用 `SYSDBA` 或 `SYSBACKUP` 特权直接连接到某个可插拔数据库时，你只能备份和恢复与当前连接的可插拔数据库关联的数据文件；你无法查看或操作根容器数据文件或其他可插拔数据库的数据文件。

    *   对整个 CDB 的不完整恢复必须使用 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器执行。在对整个 CDB 执行不完整恢复期间，CDB
    内的所有数据文件（根容器和关联的可插拔数据库）都不可用。

    *   使用 `SYSDBA` 或 `SYSBACKUP` 特权直接连接到可插拔数据库，可以仅对当前连接的可插拔数据库执行不完整恢复，而不影响 CDB 内的任何其他可插拔数据库。

    *   由于存在共享的 `UNDO` 表空间，对可插拔数据库执行任何基于时间点的不完整恢复时，也必须临时将根容器的 `UNDO` 表空间还原到一个辅助数据库位置，以便它能参与可插拔数据库的时间点恢复。


    这意味着，作为根级别的 DBA，你可以将 B&R 操作视为对一个数据库进行操作。从可插拔数据库的角度看，如果需要，你可以按可插拔数据库执行 B&R。


    ![image](img/sq.jpg) `Note` 有关在可插拔环境中使用 RMAN 进行备份、还原和恢复的示例，请参见第 18 章和第 19 章。


    ## 调优细微差别


    在可插拔环境中调优带来了新的挑战。例如，当某个应用程序团队抱怨可插拔数据库性能低下时，由于 CDB 中的所有可插拔数据库共享相同的实例、后台进程和磁盘存储，你如何知道
    CDB 中的哪个可插拔数据库可能占用了过量的资源？要确定哪个可插拔数据库性能不佳，你必须了解 CDB 中的所有可插拔数据库，以及如何使用 CDB 级别的视图来识别每个可插拔数据库的资源消耗情况。


    `AWR`、`ADDM` 和 `ASH` 报告现在会在可插拔数据库级别显示资源使用情况；这将使你能够将调优工作集中在适当的可插拔数据库上。对于你编写的任何自定义调优
    SQL 查询，需要根据情况修改它们以查询 CDB 级别的视图。同样，在分析 SQL 语句时，你必须考虑该 SQL 语句是在哪个可插拔数据库中执行的。


    本章前面的部分重点讨论了可插拔架构。在创建 CDB 之前，理解这些架构基础至关重要；因此，对此主题进行了长篇介绍。现在你已经掌握了可插拔的基础知识，可以准备将理论概念转化为可用且可持续的数据库技术了。手头的第一个实际任务就是创建一个
    CDB。


    ## 可插拔运输集装箱：数量优势


    `Security:` CDB 中的可插拔数据库类似于大型商船上的运输集装箱。每个集装箱都是安全隔离且自包含的。如果你发现自己在一个特定的运输集装箱内，你不一定知道母船上的其他集装箱。船长（到根容器的
    `SYS` 连接）知道船上的所有集装箱，并可以通过运输清单（CDB 级别的元数据视图）查看每个集装箱的内容。

