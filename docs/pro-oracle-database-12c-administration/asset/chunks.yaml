    \ true\n-sysPassword foo -systemPassword foo\n```\n\n执行时，前面的代码必须在一行内输入。以下是典型的输出片段：\n\
    \n```\nDatabase creation script generation\n1% complete\n.....\n100% complete\n\
    Look at the log file \"/orahome/app/oracle/admin/CDB1/scripts/CDB1.log\"...\n\
    ```\n\n`DBCA` 运行完成后，切换目录到新生成的脚本所在位置：\n\n```\n$ cd $ORACLE_BASE/admin/CDB1/scripts\n\
    ```\n\n现在，显示目录中的脚本：\n\n```\n$ ls\n```\n\n示例输出如下：\n\n```\nCDB1.log            \
    \     cloneDBCreation.sql      lockAccount.sql\nCDB1.sh                  init.ora\
    \                 postDBCreation.sql\nCDB1.sql                 initCDB1Temp.ora\
    \         postScripts.sql\nCloneRmanRestore.sql     initCDB1TempOMF.ora      rmanRestoreDatafiles.sql\n\
    tempControl.ctl\n```\n\n要创建数据库，请运行 `CDB1.sh` 脚本：\n\n```\n$ CDB1.sh\n```\n\n前面的\
    \ shell 脚本会调用 `CDB1.sql`，随后又调用 `RMAN` 实用程序。`RMAN` 从备份中创建所需的数据文件，并创建一个名为 `CDB1`\
    \ 的数据库。在将你的 `ORACLE_SID` 操作系统变量设置为新创建的 `CDB` 名称后，你应该就能启动数据库了。\n\n## 验证 CDB 是否已创建\n\
    \n要验证数据库是否创建为 `CDB`，首先以 `SYS` 身份连接到根容器：\n\n```\n$ sqlplus / as sysdba\n```\n\n\
    现在，你可以通过此查询确认 `CDB` 是否已成功创建。如果数据库是作为 `CDB` 创建的，那么 `V$DATABASE` 的 `CDB` 列将包含 `YES`\
    \ 值：\n\n```\nSQL> select name, cdb from v$database;\n```\n\n示例输出如下：\n\n```\nNAME\
    \      CDB\n--------- ---\nCDB       YES\n```\n\n此时，你的 `CDB` 数据库中应该有两个容器：根容器和种子可插拔数据库。你可以用此查询进行检查：\n\
    \n```\nSQL> select con_id, name from v$containers;\n```\n\n示例输出如下：\n\n```\nCON_ID\
    \ NAME\n------ --------------------\n     1 CDB$ROOT\n     2 PDB$SEED\n```\n\n\
    你也应该有与根容器和种子数据库关联的数据文件。你可以通过此查询查看与每个容器关联的数据文件：\n\n```\nSQL> select con_id, file_name\
    \ from cdb_data_files order by 1;\n```\n\n部分输出如下：\n\n```\nCON_ID FILE_NAME\n------\
    \ -------------------------------------------------------\n     1 /u01/app/oracle/oradata/CDB/system01.dbf\n\
    \     1 /u01/app/oracle/oradata/CDB/sysaux01.dbf\n     1 /u01/app/oracle/oradata/CDB/undotbs01.dbf\n\
    \     1 /u01/app/oracle/oradata/CDB/users01.dbf\n     2 /u01/app/oracle/oradata/CDB/pdbseed/system01.dbf\n\
    \     2 /u01/app/oracle/oradata/CDB/pdbseed/sysaux01.dbf\n```\n\n请注意，如果你选择查询 `DBA_DATA_FILES`\
    \ 而不是 `CDB_DATA_FILES`，你将只看到与根容器（你当前连接的容器）关联的四个数据文件；例如：\n\n```\nSQL> select file_name\
    \ from dba_data_files;\n\nFILE_NAME\n\n/u01/app/oracle/oradata/CDB/system01.dbf\n\
    /u01/app/oracle/oradata/CDB/sysaux01.dbf\n/u01/app/oracle/oradata/CDB/users01.dbf\n\
    /u01/app/oracle/oradata/CDB/undotbs01.dbf\n```\n\n## 管理根容器\n\n在管理 `CDB` 时，大部分情况下，你都是作为\
    \ `SYS` 连接到根容器，并像操作非 `CDB` 数据库一样执行任务。然而，有几个特定于维护 `CDB` 的要点需要注意。以下任务只能在以 `SYSDBA`\
    \ 特权连接到根容器时执行：\n\n*   启动/停止实例\n*   启用/禁用归档日志模式\n*   管理影响 `CDB` 内所有数据库的实例设置，例如总体内存大小\n\
    *   数据库内所有数据文件的 `B&R`（备份与恢复）\n*   管理控制文件（添加、恢复、删除等）\n*   管理联机重做日志\n*   管理根 `UNDO`\
    \ 表空间\n*   管理根 `TEMP` 表空间\n*   创建公共用户和角色\n\n以下部分将讨论这些主题。\n\n## 连接到根容器\n\n以 `SYS`\
    \ 身份连接到根容器，允许你执行通常与数据库管理相关的所有任务。你可以通过操作系统认证从数据库服务器本地连接为 `SYS`，或者通过网络连接（需要侦听器和密码文件）。\n\
    \n### 通过操作系统认证\n\n如果你有权访问数据库服务器，可以像连接非 `CDB` 数据库一样连接到 `CDB`。首先，确保已设置所需的环境变量（详见第\
    \ 2 章）：\n\n```\n$ echo $ORACLE_SID $ORACLE_HOME\n\nCDB /u01/app/oracle/product/12.1.0.1/db_1\n\
    ```\n\n使用操作系统认证时，无需指定用户名和密码即可连接到 `CDB` 根容器：\n\n```\n$ sqlplus / as sysdba\n```\n\
    \n你可以验证到根容器的 `SYS` 连接，如下所示：\n\n```\nSQL> show user con_id con_name user\n\nUSER\
    \ is \"SYS\"\n\nCON_ID\n\nCON_NAME\n\nCDB$ROOT\nUSER is \"SYS\"\n```\n\n### 通过网络\n\
    \n如果你通过网络发起远程连接，则需要首先在目标数据库服务器上设置一个侦听器并创建一个密码文件（详见第 2 章）。一旦建立了侦听器和密码文件，你就可以通过网络远程连接，如下所示：\n\
    \n```\n$ sqlplus user/pass@connection_string as sysdba\n```\n\n关于如何在可插拔环境中实现侦听器的详细信息，请参阅本章后面的“在可插拔数据库环境中管理侦听器”部分。\n\
    \n## 显示当前连接的容器信息\n\n从 `SQL*Plus` 出发，有几种简单的方法可以显示你当前连接的 `CDB` 的名称。此示例使用 `SHOW`\
    \ 命令显示容器 ID、名称和用户：\n\n```\nSQL> show con_id con_name user\n```\n\n你也可以通过 `SQL`\
    \ 查询显示相同的信息：\n\n```\nSELECT SYS_CONTEXT('USERENV', 'CON_ID') AS con_id,\n    \
    \   SYS_CONTEXT('USERENV', 'CON_NAME') AS cur_container,\n       SYS_CONTEXT('USERENV',\
    \ 'SESSION_USER') AS cur_user\nFROM DUAL;\n```\n\n示例输出如下：\n\n```\nCON_ID     \
    \          CUR_CONTAINER        CUR_USER\n-------------------- --------------------\
    \ --------------------\n1                    CDB$ROOT             SYS\n```\n\n\
    ## 启动/停止根容器\n"
- fmt: '# 启动与关闭 CDB


    只能以特权用户身份连接到根容器时启动/停止 CDB。启动和停止根容器的步骤与非 CDB 数据库相同。要启动 CDB，首先作为 SYS 连接，然后发出启动命令：


    ```

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    启动 CDB 数据库不会打开任何关联的可插拔数据库。你可以使用以下命令打开所有可插拔数据库：


    ```

    SQL> alter pluggable database all open;

    ```


    要关闭 CDB 数据库，请发出以下命令：


    ```

    SQL> shutdown immediate;

    ```


    与非 CDB 数据库一样，上述命令会关闭 CDB 实例并断开任何连接到数据库的用户。如果有任何可插拔数据库处于打开状态，它们将被关闭，用户也会被断开连接。


    # 创建公共用户


    在可插拔环境中存在两种用户：本地用户和公共用户。本地用户不过是在可插拔数据库中创建的常规用户。可插拔数据库中的本地用户类型与非 CDB 环境中的用户行为相同。管理本地用户没有什么特别之处。你可以像在非
    CDB 环境中管理用户一样管理它们。


    公共用户是 Oracle Database 12c 中的一个新概念，仅适用于可插拔数据库环境。公共用户是存在于根容器和每个可插拔数据库中的用户。此类用户必须最初在根容器中创建，并且会自动在所有现有可插拔数据库以及未来创建的任何可插拔数据库中创建。


    ![image](Images/sq.jpg) `Tip` SYS 和 SYSTEM 账户是 Oracle 在可插拔环境中自动创建的公共用户。


    必须使用以 `C##` 或 `c##` 开头的字符串创建公共用户。例如，以下命令在所有可插拔数据库中创建一个公共用户：


    ```

    $ sqlplus / as sysdba


    SQL> create user c##dba identified by foo;

    ```


    必须从每个可插拔数据库内部为公共用户授予特权。换句话说，如果你在连接到根容器时向公共用户授予特权，这不会级联到可插拔数据库。如果你需要向公共用户授予跨越可插拔数据库的特权，那么请创建一个公共角色，并将其分配给该公共用户。


    公共用户有什么用？一种情况是执行跨越可插拔数据库的公共 DBA 维护活动，而不需要 `SYSDBA` 级别的特权。例如，你想要设置一个 DBA 账户，该账户具有创建用户、授予权限等的特权，但你不想使用像
    SYS（在所有数据库中拥有所有特权）这样的账户。在这种情况下，你将创建一个公共 DBA 用户，并创建一个包含适当特权的 DBA 公共角色。然后，该公共角色将被分配给公共
    DBA。


    # 创建公共角色


    就像你可以创建一个跨越所有可插拔数据库的公共用户一样，你也可以以相同的方式创建一个公共角色。公共角色提供了一个单一对象，你可以向其授予在根容器关联的所有可插拔数据库中有效的特权。


    公共角色在根容器中创建，并自动在所有关联的可插拔数据库以及未来创建的任何可插拔数据库中创建。与公共用户一样，公共角色必须以 `C##` 或 `c##` 字符串开头；例如，


    ```

    $ sqlplus / as sysdba

    SQL> create role c##dbaprivs container = all;

    ```


    接下来，你可以根据需要向公共角色分配特权。这里，将 `DBA` 角色分配给先前创建的角色：


    ```

    SQL> grant dba to c##dbaprivs container = all;

    ```


    现在，如果你将此公共角色分配给公共用户，则当该公共用户连接到与根容器关联的任何可插拔数据库时，与该角色关联的特权将生效：


    ```

    SQL> grant c##dbaprivs to c##dba container = all;

    ```


    # 报告容器空间'
  raw: 'You can only start/stop the CDB while connected as a privileged user to the
    root container. The procedure for starting and stopping the root container is
    the same as for a non-CDB database. To start a CDB, first connect as SYS, and
    issue the startup command:


    ```

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    Starting the CDB database does not open any associated pluggable databases. You
    can open all pluggable databases with this command:


    ```

    SQL> alter pluggable database all open;

    ```


    To shut down a CDB database, issue the following command:


    ```

    SQL> shutdown immediate;

    ```


    Just as with a non-CDB database, the prior line shuts down the CDB instance and
    disconnects any users connected to the database. If any pluggable databases are
    open, they are closed, and users are disconnected.


    Creating Common Users


    There are two types of users in a pluggable environment: local and common. A local
    user is nothing more than a regular user that is created in a pluggable database.
    The local type of user in a pluggable database behaves the same as a user in a
    non-CDB environment. There’s nothing special about administering local users.
    You administer them as you would a user in a non-CDB environment.


    A common user is a new concept in Oracle Database 12c and only pertains to a pluggable
    database environment. A common user is one that exists in the root container and
    in every pluggable database. This type of user must be initially created in the
    root container and is automatically created in all existing pluggable databases
    as well as in any pluggable databases created in the future.


    ![image](Images/sq.jpg) **Tip**   The SYS and SYSTEM accounts are common users
    that Oracle creates automatically in a pluggable environment.


    Common users must be created with the string C## or c## at the start of the username.
    For instance, the following command creates a common user in all pluggable databases:


    ```

    $ sqlplus / as sysdba


    SQL> create user c##dba identified by foo;

    ```


    Common users must be granted privileges from within each pluggable database. In
    other words, if you grant privileges to a common user while connected to the root
    container, this does not cascade to the pluggable databases. If you need to grant
    a common user a privilege that spans pluggable databases, then create a common
    role, and assign it to the common user.


    What use is there for a common user? One situation would be the performance of
    common DBA maintenance activities across pluggable databases not requiring SYSDBA-level
    privileges. For example, you want to set up a DBA account that has the privileges
    to create users, grants, and so on, but you don’t want to use an account such
    as SYS (which has all privileges in all databases). In this scenario, you would
    create a common DBA user and also create a DBA common role that contains the appropriate
    privileges. The common role would then be assigned to the common DBA.


    Creating Common Roles


    Much like you can create a common user that spans all pluggable databases, you
    can, in the same manner, create a common role. Common roles provide a single object
    to which you can grant privileges that are valid within all pluggable databases
    associated with the root container.


    A common role is created in the root container and is automatically created in
    all associated pluggable databases as well as any pluggable databases created
    in the future. Like common users, common roles must start with the C## or c##
    string; for example,


    ```

    $ sqlplus / as sysdba

    SQL> create role c##dbaprivs container = all;

    ```


    Next, you can assign privileges, as desired, to the common role. Here, the DBA
    role is assigned to the previously created role:


    ```

    SQL> grant dba to c##dbaprivs container = all;

    ```


    Now, if you assign this common role to a common user, the privileges associated
    with the role are in effect when the common user connects to any pluggable database
    associated with the root container:


    ```

    SQL> grant c##dbaprivs to c##dba container = all;

    ```


