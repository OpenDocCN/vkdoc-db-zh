- fmt: '# CDB 与 PDB 的特性


    ## 连接 CDB

    连接到 CDB 数据库等同于连接到 `CDB$ROOT` 根容器。根容器的主要目的是存放所有关联 PDB 的元数据。

    您可以通过 `SYS` 用户访问根容器，就像访问非 CDB 数据库一样。换句话说，当登录到数据库服务器时，您可以使用操作系统认证直接连接到根容器，而无需指定用户名和密码（例如
    `sqlplus / as sysdba`）。连接到根容器不需要运行监听器。


    ## PDB$SEED 种子容器

    种子可插拔数据库容器 (`PDB$SEED`) 仅作为创建新可插拔数据库的模板而存在。您可以连接到种子容器，但它是只读的，这意味着您无法对其执行事务。


    ## 额外 PDB

    除了两个默认容器（根和种子）外，此特定 CDB 还手动创建了两个额外的可插拔数据库，分别命名为 `SALESPDB` 和 `HRPDB`（本章后面将详细介绍如何创建可插拔数据库）。


    ## 命名空间和表空间

    可插拔数据库存在于独立的命名空间中。可插拔数据库在 CDB 内必须是唯一的，但可插拔数据库内的对象遵循非 CDB 数据库的命名空间规则。例如，表空间名称和用户名必须在单个可插拔数据库内唯一，而不需要在
    CDB 内唯一。

    每个可插拔数据库都有自己的 `SYSTEM` 和 `SYSAUX` 表空间，以及可选的 `TEMP` 表空间。

    如果可插拔数据库没有自己的 `TEMP` 文件，则它可以消耗根容器 `TEMP` 文件中的资源。

    每个可插拔数据库的 `SYSTEM` 表空间包含有关该可插拔数据库元数据的信息，例如其用户和对象；这些元数据可以通过可插拔数据库内的 `DBA/ALL/USER`
    级别视图访问，并且可以通过根容器内的 CDB 级别视图看到。

    为 CDB 定义的字符集也用于所有关联的 PDB。

    您可以设置 CDB 和所有关联 PDB 的时区，也可以为每个 PDB 单独设置时区。


    ## 实例和初始化参数

    图 23-1 显示了一个非 RAC 配置，因此只有一个内存分配和一组后台进程。换句话说，只有一个实例。CDB 内的所有可插拔数据库使用相同的实例和后台进程。如果这是
    RAC 配置，那么到 RAC 实例的任何连接都将共享该实例和后台进程。

    CDB 实例的启动和停止需要在连接到根容器的 `SYS` 用户下进行。您不能在连接到可插拔数据库时启动/停止 CDB 实例。

    有一个初始化参数文件，在实例启动时被读取。连接到根容器的特权用户可以修改所有初始化参数。相反，连接到可插拔数据库的特权用户只能修改适用于当前连接的可插拔数据库的参数。当连接到可插拔数据库并修改初始化参数时，这些修改仅适用于当前连接的可插拔数据库，并在数据库重启后在该可插拔数据库内持久化。`V$PARAMETER`
    中的 `ISPDB_MODIFIABLE` 列显示了哪些参数可以在作为特权用户连接到可插拔数据库时修改。


    ## 网络连接和启动停止

    应用程序用户只能通过网络连接访问可插拔数据库。因此，必须运行监听器并监听与关联可插拔数据库对应的服务名。如果没有运行监听器，则应用程序用户无法连接到可插拔数据库。

    单个可插拔数据库本身不会像数据库实例那样启动或停止。当您启动/停止可插拔数据库时，您并不是在分配内存或启动/停止后台进程。相反，可插拔数据库是被设置为可用或不可用（打开或关闭）。


    ## 控制文件和重做日志

    CDB 有一组控制文件。控制文件在以特权用户连接到根容器时进行管理。

    CDB 有一个 `UNDO` 表空间。CDB 内的所有可插拔数据库使用相同的 `UNDO` 表空间（如果是 RAC，则每个实例有一个活动的 undo 表空间）。

    CDB 有一组重做日志（每个实例一组），在以具有适当特权的用户连接到根容器时进行管理。只有连接到根的特权连接才能启用归档或切换联机日志。连接到具有可插拔数据库
    `SYSDBA` 权限的用户不能更改联机重做或归档设置。

    CDB 有一个警报日志和一组跟踪文件。关联可插拔数据库的任何适用数据库消息都写入公共的 CDB 警报日志。


    ## 容器 ID 和 FRA

    每个容器都被分配一个唯一的容器 ID。根容器的容器 ID 为 `1`；种子数据库的容器 ID 为 `2`。随后创建的每个可插拔数据库都会被分配一个唯一的顺序容器
    ID。

    CDB 有一个 `FRA`（快速恢复区）。不会在 `FRA` 内为可插拔数据库创建单独的目录。RMAN 备份文件、控制文件和联机重做日志放在与 CDB 关联的目录中，不按可插拔数据库隔离。


    ## 闪回和 AWR 报告

    闪回数据库功能通过特权连接到根容器来开启和关闭。您不能在可插拔数据库级别启用闪回。

    `AWR`、`ADDM` 和 `ASH` 报告是针对 CDB 中的所有 PDB 发出的。资源消耗按可插拔数据库标识。

    在解决 SQL 性能问题时，查询通过视图（如 `V$SQL` 和 `V$SQLAREA`）中的 `CON_ID` 列与特定的可插拔数据库相关联。'
  raw: '*   A connection to the CDB database is synonymous with connecting to the
    CDB$ROOT root container. The main purpose of the root container is to house metadata
    for any associated PDBs.

    *   You can access the root container via the SYS user, just as you would a non-CDB
    database. In other words, when logged in to the database server, you can use OS
    authentication to connect directly to the root container without specifying a
    username and password (sqlplus / as sysdba). You do not need a listener running
    to connect to the root container.

    *   The seed pluggable database container (PDB$SEED) only exists as a template
    for creating new pluggable databases. You can connect to the seed, but it is read-only,
    meaning you can’t issue transactions against it.

    *   Besides the two default containers (root and seed), for this particular CDB,
    two additional pluggable databases have been manually created, named SALESPDB
    and HRPDB (more on creating pluggable databases later in the chapter).

    *   Pluggable databases exist within individual namespaces. Pluggable databases
    must be unique within the CDB, but objects within a pluggable database follow
    the namespace rules of a non-CDB database. For example, tablespace names and user
    names have to be unique within the individual pluggable databases, but not within
    the CDB.

    *   Each pluggable database has its own SYSTEM and SYSAUX tablespaces and, optionally,
    a TEMP tablespace.

    *   If a pluggable database does not have its own TEMP file, it can consume resources
    in the root container TEMP file.

    *   The SYSTEM tablespace of each pluggable database contains information regarding
    the pluggable database metadata, such as its users and objects; these metadata
    are accessible via the DBA/ALL/USER-level views from the pluggable database and
    are visible via CDB-level views from the root container.

    *   The character set defined for the CDB is also used for all associated PDBs.

    *   You can set the time zones for the CDB and all associated PDBs or you can
    set the time zone individually per PDB.

    *   [Figure 23-1](#9781430257288_Ch23.xhtml#Fig1) shows a non-RAC configuration,
    so there is only one memory allocation and one set of background processes. In
    other words, there is one instance. All pluggable databases within the CDB use
    the same instance and background processes. If this were a RAC configuration,
    then any connections to the RAC instance would share that instance and background
    processes.

    *   The CDB instance is started and stopped while connected as SYS to the root
    container. You can’t start/stop the CDB instance while connected to a pluggable
    database.

    *   There is one initialization parameter file that is read by the instance when
    starting. A privileged user connected to the root container can modify all initialization
    parameters. In contrast, a privileged user connected to a pluggable database can
    only modify parameters applicable to the currently connected pluggable database.
    When connected to a pluggable database and modifying initialization parameters,
    these modifications only apply to the currently connected pluggable database and
    persist for the pluggable database across database restarts. The ISPDB_MODIFIABLE
    column in V$PARAMETER shows which parameters are modifiable while connected as
    a privileged user to a pluggable database.

    *   Application users can only access the pluggable databases via a network connection.
    Therefore, a listener must be running and listening for service names corresponding
    to associated pluggable databases. If a listener is not running, then there is
    no way for an application user to connect to a pluggable database.

    *   The individual pluggable databases aren’t stopped or started per se (not in
    the terms of a database instance). When you start/stop a pluggable database, you
    are not allocating memory or starting/stopping background processes. Rather, pluggable
    databases are either made available or not (open or closed).

    *   There is one set of control files for the CDB. The control files are managed
    while connected to the root container as a privileged user.

    *   There is one UNDO tablespace for the CDB. All pluggable databases within the
    CDB use the same UNDO tablespace (if RAC, then one active undo tablespace per
    instance).

    *   There is one thread of redo (per instance) that is managed while connected
    to the root container as a user with appropriate privileges. Only privileged connections
    to root can enable archiving or switching online logs. Connections to users with
    SYSDBA privileges to pluggable databases cannot alter online redo or archiving
    settings.

    *   There is one alert log and set of trace files for a CDB. Any applicable database
    messages for associated pluggable databases are written to the common CDB alert
    log.

    *   Each container is assigned a unique container ID. The root container is assigned
    a container ID of 1; the seed database is assigned a container ID of 2\. Each
    subsequently created pluggable database is assigned a unique sequential container
    ID.

    *   There is one FRA for the CDB. Separate directories are not created for pluggable
    databases within the FRA. RMAN backup files, control files, and online redo logs
    are placed in a directory associated with the CDB and are not segregated by pluggable
    database.

    *   The Flashback Database feature is turned on and off via a privileged connection
    to the root container. You cannot enable flashback at the pluggable database level.

    *   AWR, ADDM, and ASH reports are issued across all PDBs in the CDB. Resource
    consumption is identified per pluggable database.

    *   When resolving SQL performance issues, queries are associated with a particular
    pluggable database via the CON_ID column in views such as V$SQL and V$SQLAREA.'
  trans: '# CDB 与 PDB 的特性


    ## 连接 CDB

    连接到 CDB 数据库等同于连接到 `CDB$ROOT` 根容器。根容器的主要目的是存放所有关联 PDB 的元数据。

    您可以通过 `SYS` 用户访问根容器，就像访问非 CDB 数据库一样。换句话说，当登录到数据库服务器时，您可以使用操作系统认证直接连接到根容器，而无需指定用户名和密码（例如
    `sqlplus / as sysdba`）。连接到根容器不需要运行监听器。


    ## PDB$SEED 种子容器

    种子可插拔数据库容器 (`PDB$SEED`) 仅作为创建新可插拔数据库的模板而存在。您可以连接到种子容器，但它是只读的，这意味着您无法对其执行事务。


    ## 额外 PDB

    除了两个默认容器（根和种子）外，此特定 CDB 还手动创建了两个额外的可插拔数据库，分别命名为 `SALESPDB` 和 `HRPDB`（本章后面将详细介绍如何创建可插拔数据库）。


    ## 命名空间和表空间

    可插拔数据库存在于独立的命名空间中。可插拔数据库在 CDB 内必须是唯一的，但可插拔数据库内的对象遵循非 CDB 数据库的命名空间规则。例如，表空间名称和用户名必须在单个可插拔数据库内唯一，而不需要在
    CDB 内唯一。

    每个可插拔数据库都有自己的 `SYSTEM` 和 `SYSAUX` 表空间，以及可选的 `TEMP` 表空间。

    如果可插拔数据库没有自己的 `TEMP` 文件，则它可以消耗根容器 `TEMP` 文件中的资源。

    每个可插拔数据库的 `SYSTEM` 表空间包含有关该可插拔数据库元数据的信息，例如其用户和对象；这些元数据可以通过可插拔数据库内的 `DBA/ALL/USER`
    级别视图访问，并且可以通过根容器内的 CDB 级别视图看到。

    为 CDB 定义的字符集也用于所有关联的 PDB。

    您可以设置 CDB 和所有关联 PDB 的时区，也可以为每个 PDB 单独设置时区。


    ## 实例和初始化参数

    图 23-1 显示了一个非 RAC 配置，因此只有一个内存分配和一组后台进程。换句话说，只有一个实例。CDB 内的所有可插拔数据库使用相同的实例和后台进程。如果这是
    RAC 配置，那么到 RAC 实例的任何连接都将共享该实例和后台进程。

    CDB 实例的启动和停止需要在连接到根容器的 `SYS` 用户下进行。您不能在连接到可插拔数据库时启动/停止 CDB 实例。

    有一个初始化参数文件，在实例启动时被读取。连接到根容器的特权用户可以修改所有初始化参数。相反，连接到可插拔数据库的特权用户只能修改适用于当前连接的可插拔数据库的参数。当连接到可插拔数据库并修改初始化参数时，这些修改仅适用于当前连接的可插拔数据库，并在数据库重启后在该可插拔数据库内持久化。`V$PARAMETER`
    中的 `ISPDB_MODIFIABLE` 列显示了哪些参数可以在作为特权用户连接到可插拔数据库时修改。


    ## 网络连接和启动停止

    应用程序用户只能通过网络连接访问可插拔数据库。因此，必须运行监听器并监听与关联可插拔数据库对应的服务名。如果没有运行监听器，则应用程序用户无法连接到可插拔数据库。

    单个可插拔数据库本身不会像数据库实例那样启动或停止。当您启动/停止可插拔数据库时，您并不是在分配内存或启动/停止后台进程。相反，可插拔数据库是被设置为可用或不可用（打开或关闭）。


    ## 控制文件和重做日志

    CDB 有一组控制文件。控制文件在以特权用户连接到根容器时进行管理。

    CDB 有一个 `UNDO` 表空间。CDB 内的所有可插拔数据库使用相同的 `UNDO` 表空间（如果是 RAC，则每个实例有一个活动的 undo 表空间）。

    CDB 有一组重做日志（每个实例一组），在以具有适当特权的用户连接到根容器时进行管理。只有连接到根的特权连接才能启用归档或切换联机日志。连接到具有可插拔数据库
    `SYSDBA` 权限的用户不能更改联机重做或归档设置。

    CDB 有一个警报日志和一组跟踪文件。关联可插拔数据库的任何适用数据库消息都写入公共的 CDB 警报日志。


    ## 容器 ID 和 FRA

    每个容器都被分配一个唯一的容器 ID。根容器的容器 ID 为 `1`；种子数据库的容器 ID 为 `2`。随后创建的每个可插拔数据库都会被分配一个唯一的顺序容器
    ID。

    CDB 有一个 `FRA`（快速恢复区）。不会在 `FRA` 内为可插拔数据库创建单独的目录。RMAN 备份文件、控制文件和联机重做日志放在与 CDB 关联的目录中，不按可插拔数据库隔离。


    ## 闪回和 AWR 报告

    闪回数据库功能通过特权连接到根容器来开启和关闭。您不能在可插拔数据库级别启用闪回。

    `AWR`、`ADDM` 和 `ASH` 报告是针对 CDB 中的所有 PDB 发出的。资源消耗按可插拔数据库标识。

    在解决 SQL 性能问题时，查询通过视图（如 `V$SQL` 和 `V$SQLAREA`）中的 `CON_ID` 列与特定的可插拔数据库相关联。'
- fmt: '# Oracle 可插拔数据库架构概述


    上述列表可能看起来很长，但一旦你消化了可插拔数据库环境的细微差别，就能够有效地实施和管理这项技术。这里的一个要点是，你可以在一个 CDB 中安置数十个或更多安全隔离的可插拔数据库，且仅需管理一个实例（内存和后台进程）、一个重做线程和一套控制文件。


    ## 范式转换


    通常，特定的应用程序会要求将其数据库对象（用户、表、索引等）放置在一个与其他应用程序隔离的数据库中。这样做的原因通常是安全问题或性能考虑。在可插拔数据库出现之前，可以回想一下你如何解决为不同应用程序和开发团队提供独立环境的需求。通常采用的两种解决方案如下：


    *   为每个需要环境的团队/应用程序创建一个独立的数据库。有时这种做法是每个服务器上部署一个数据库，这常常意味着额外的硬件和许可成本。

    *   在一个数据库内创建独立的环境。这通常通过独立的模式和不同的表空间来实现。这种方法要求应用程序之间没有任何数据库对象命名冲突，例如用户名、表空间名称和公共同义词等对象。


    从 Oracle Database 12c 开始，可插拔数据库为你提供了另一种满足前述需求的工具。可插拔数据库提供了安全隔离的要求；一个可插拔数据库无法直接访问另一个。即使是使用
    `SYSDBA` 特权连接到某个可插拔数据库的用户，也无法直接 SQL 访问 CDB 内的其他可插拔数据库。这与非 CDB 数据库的行为一致。从安全和应用程序的角度来看，你在更大的
    CDB 内拥有完全隔离的可插拔数据库。


    作为 DBA，你不再需要实施和维护数十个独立的数据库及相关运维任务（例如，配置新数据库、安装、升级、调优、高可用性、监控、复制、灾难恢复和 B&R），而是可以像管理一个数据库一样管理任意数量的可插拔数据库。从根容器的视角来看，这类似于管理一个非
    CDB 数据库。


    可插拔架构的另一个显著优势是，可插拔数据库可以轻松地被克隆或从一个 CDB 传输到另一个 CDB。这在执行诸如配置新数据库、升级数据库、负载均衡或将应用程序数据从一个环境迁移到另一个环境（例如从开发数据库迁移到测试数据库）等任务时提供了更多选项。可以通过克隆另一个可插拔数据库来创建新环境。而将可插拔数据库从
    CDB 中移出，只需通过 SQL 命令将可插拔数据库从 CDB 中“拔出”，然后将其元数据和数据文件与一个新的 CDB“插入”关联即可。


    ## B&R 影响


    可插拔环境具有一些有趣的 B&R 架构特性。以下列表重点说明了这些特性：


    *   当使用 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器时，你可以选择通过一个备份命令备份 CDB（根、种子及所有可插拔数据库）内的所有数据文件。你也可以选择在可插拔数据库级别的粒度上执行
    B&R 任务。

    *   当使用 `SYSDBA` 或 `SYSBACKUP` 特权直接连接到某个可插拔数据库时，你只能备份和恢复与当前连接的可插拔数据库关联的数据文件；你无法查看或操作根容器数据文件或其他可插拔数据库的数据文件。

    *   对整个 CDB 的不完整恢复必须使用 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器执行。在不完整恢复整个 CDB 期间，CDB 内的所有数据文件（根容器和关联的可插拔数据库）都不可用。

    *   使用 `SYSDBA` 或 `SYSBACKUP` 特权直接连接到可插拔数据库，可以仅对当前连接的可插拔数据库执行不完整恢复，而不影响 CDB 内的任何其他可插拔数据库。

    *   由于存在共享的 `UNDO` 表空间，对可插拔数据库执行任何基于时间点的不完整恢复时，也必须临时将根容器的 `UNDO` 表空间还原到一个辅助数据库位置，以便它能参与可插拔数据库的时间点恢复。


    这意味着，作为根级别的 DBA，你可以将 B&R 操作视为对一个数据库进行操作。从可插拔数据库的角度看，如果需要，你可以按可插拔数据库执行 B&R。


    ![image](Images/sq.jpg) `` `Note` `` 有关在可插拔环境中使用 RMAN 进行备份、还原和恢复的示例，请参见[第 18 章](#9781430257288_Ch18.xhtml)和[第
    19 章](#9781430257288_Ch19.xhtml)。


    ## 调优细微差别


    在可插拔环境中调优带来了新的挑战。例如，当某个应用程序团队抱怨可插拔数据库性能低下时，由于 CDB 中的所有可插拔数据库共享相同的实例、后台进程和磁盘存储，你如何知道
    CDB 中的哪个可插拔数据库可能占用了过量的资源？要确定哪个可插拔数据库性能不佳，你必须了解 CDB 中的所有可插拔数据库，以及如何使用 CDB 级别的视图来识别每个
    CDB 的资源消耗情况。


    `AWR`、`ADDM` 和 `ASH` 报告现在会在可插拔数据库级别显示资源使用情况；这将使你能够将调优工作集中在适当的可插拔数据库上。对于你编写的任何自定义调优
    SQL 查询，需要根据情况修改它们以查询 CDB 级别的视图。同样，在分析 SQL 语句时，你必须考虑该 SQL 语句是在哪个可插拔数据库中执行的。


    本章前面的部分重点讨论了可插拔架构。在创建 CDB 之前，理解这些架构基础至关重要；因此，对此主题进行了长篇介绍。现在你已经掌握了可插拔的基础知识，可以准备将理论概念转化为可用且可持续的数据库技术了。手头的第一个实际任务就是创建一个
    CDB。


    ## 可插拔运输集装箱：数量优势


    `` `Security:` `` CDB 中的可插拔数据库类似于大型商船上的运输集装箱。每个集装箱都是安全隔离且自包含的。如果你发现自己在一个特定的运输集装箱内，你不一定知道母船上的其他集装箱。船长（到根容器的
    `SYS` 连接）知道船上的所有集装箱，并可以通过运输清单（CDB 级别的元数据视图）查看每个集装箱的内容。'
  raw: 'The prior list may seem long, but once you digest the nuances of a pluggable
    database environment, you’ll be able to effectively implement and manage this
    technology. One of the main points here is that you can have dozens or more securely
    isolated pluggable databases housed within one CDB with only one instance (memory
    and background processes), one thread of redo, and one set of control files to
    manage.


    Paradigm Shift


    It’s fairly common for a specific application to request that its database objects
    (users, tables, indexes, and so on) be placed in a database isolated from other
    applications. Reasons cited for doing this are often security issues or performance
    concerns. Before the advent of pluggable databases, think about how you solved
    the requirement of separate environments for various applications and development
    teams. Two common solutions employed are as follows:


    *   Create a separate database for each team/application that needs an environment.
    Sometimes this approach is implemented with one database per server, which often
    translates into additional hardware and licensing costs.

    *   Create separate environments within one database. Usually this is achieved
    through separate schemas and distinct tablespaces. This approach requires that
    there not be any database object naming collisions between applications, for example,
    with objects such as user names, tablespace names, and public synonyms.


    Starting with Oracle Database 12c, pluggable databases give you another tool for
    addressing the prior needs. Pluggable databases provide the security isolation
    requirement; there is no direct access from one pluggable database to another.
    Even a user connected with SYSDBA privileges to a given pluggable database has
    no direct SQL access to other pluggable databases within the CDB. This is just
    like with non-CDB databases. From a security and application perspective, you
    have totally isolated pluggable databases within the larger CDB.


    As a DBA, instead of having to implement and maintain dozens of individual databases
    and associated operational tasks (such as provisioning new databases, installs,
    upgrades, tuning, availability, monitoring, replication, disaster recovery, and
    B&R), you can manage any number of pluggable databases as if they were one database.
    From the root container perspective, it’s similar to managing one non-CDB database.


    Another significant advantage of the pluggable architecture is that a pluggable
    database can easily be cloned or transferred from one CDB to another. This allows
    for more options when performing tasks such as provisioning new databases, upgrading
    databases, load balancing, or moving application data from one environment to
    another (such as from a development database to a test database). Creating a new
    environment can be done by cloning another pluggable database. And, moving a pluggable
    database from a CDB simply requires that you unplug (via SQL commands) the pluggable
    database from the CDB and then associate the metadata and data files (plug in)
    with a new CDB.


    B&R Implications


    A pluggable environment has some interesting B&R architectural aspects. The following
    list highlights these features:


    *   While connected to the root container with SYSDBA or SYSBACKUP privileges,
    you have the option of backing up all the data files within the CDB (root, seed,
    and all pluggable databases) via one backup command. You also have the choice
    of performing B&R tasks at a pluggable database level of granularity.

    *   While connected directly to a pluggable database with SYSDBA or SYSBACKUP
    privileges, you can only back up and recover data files associated with the currently
    connected pluggable database; you cannot view or operate on the root container
    data files or other pluggable database data files.

    *   An incomplete recovery of the entire CDB must be performed with a connection
    to the root container with SYSDBA or SYSBACKUP privileges. All data files within
    the CDB (root container and associated pluggable databases) are unavailable during
    an incomplete recovery of the entire CDB.

    *   A direct connection to a pluggable database with SYSDBA or SYSBACKUP privileges
    can perform an incomplete recovery only on the currently connected pluggable database
    without affecting any other pluggable databases within the CDB.

    *   Because there is a shared UNDO tablespace, any point-in-time incomplete recoveries
    of a pluggable database will also have to temporarily restore the root container’s
    UNDO tablespace to an auxiliary database location so that it can participate in
    the point-in-time recovery of the pluggable database.


    This means that as a root-level DBA, you can treat B&R operations as if they were
    one database. From the pluggable perspective, if need be, you can perform B&R
    per pluggable database.


    ![image](Images/sq.jpg) **Note**   See [Chapters 18](#9781430257288_Ch18.xhtml)
    and [19](#9781430257288_Ch19.xhtml) for examples of using RMAN to back up, restore,
    and recover in a pluggable environment.


    Tuning Nuances


    Tuning in a pluggable environment presents new challenges. For example, when an
    application team complains about the poor performance of a pluggable database,
    because all pluggable databases within the CDB share the same instance, background
    processes, and disk storage, how do you know which pluggable database within the
    CDB might be consuming inordinate amounts of resources? To determine which pluggable
    database is performing poorly, you’ll have to be aware of all the pluggable databases
    within the CDB and how to use the CDB-level views to identify resource consumption
    per CDB.


    The AWR, ADDM, and ASH reports now show resource usage at the pluggable database
    level; this will allow you to focus your tuning efforts on the appropriate pluggable
    database. For any homegrown tuning SQL queries that you’ve written, you’ll need
    to modify these to report on the CDB-level views where appropriate. Likewise,
    when analyzing SQL statements, you’ll have to consider which pluggable database
    the SQL statement is executing within.


    The previous sections of this chapter place an emphasis on discussion of the pluggable
    architecture. Before creating a CDB, it’s critical that you understand these architectural
    underpinnings; hence, the lengthy introduction to this topic. Now that you have
    a pluggable foundation, you’re ready to turn theoretical concepts into usable
    and sustainable database technology. The first real task at hand is to create
    a CDB.


    PLUGGABLE SHIPPING CONTAINERS: STRENGTH IN NUMBERS


    **Security:** Pluggable databases within a CDB are similar to the shipping containers
    present on a large merchant ship. Each container is securely isolated and self-contained.
    If you were to find yourself inside a particular shipping container, you wouldn’t
    necessarily be aware of any other containers on the mother ship. The captain (SYS
    connection to the root container) is aware of all the containers on the vessel
    and can view the contents of each container via the shipping manifest (CDB-level
    metadata views).'
