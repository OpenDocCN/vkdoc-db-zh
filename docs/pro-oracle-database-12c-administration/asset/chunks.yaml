    0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP\n   1>/home/oracle/bin/log/lock.log\
    \ 2>&1\n```\n\n这样，当生产数据库账户之一被锁定时，我就会收到通知。\n\n## 检查超过特定时限的文件\n\n对于我通过 shell 脚本运行的一些作业（例如备份），我会首先检查是否已有另一个备份作业在运行。此检查涉及查找一个锁文件。如果锁文件存在，则\
