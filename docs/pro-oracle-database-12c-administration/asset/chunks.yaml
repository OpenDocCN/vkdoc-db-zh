    \ issue: $filevar\" | \\\n  mailx -s \"$BOX lockfile problem\" dkuhn@gmail.com\n\
    else\n  echo \"Lock file ok: $filevar\"\nfi\nexit 0\n```\n\n我通常每天检查锁文件的存在。以下是运行前述脚本（名为\
    \ `lock_chk.bsh`）的典型 `cron` 条目（此条目应全部在一行，但为了适应页面已放置在两行）：\n\n```\n33 5 * * * /orahome/oracle/bin/lock_chk.bsh\n\
    \   1>/orahome/oracle/bin/log/lock_chk.log 2>&1\n```\n\n## 检查进程是否过多\n\n在某些数据库服务器上，您可能有许多后台\
    \ `SQL*Plus` 作业。这些批处理作业可能执行从远程数据库复制数据和大型每日更新作业等任务。在这些环境中，了解数据库服务器上在任何给定时间是否有异常数量的\
    \ shell 脚本或 `SQL*Plus` 进程在运行非常有用。异常数量的作业可能表明某些内容已损坏或挂起。\n\n下一个 shell 脚本中有两个检查：一个用于确定以\
    \ `bsh` 扩展名命名的 shell 脚本的数量，另一个用于确定包含字符串 `sqlplus` 的进程的数量：\n\n```bash\n#!/bin/bash\n\
    #\nif [ $# -ne 0 ]; then\n  echo \"Usage: $0\"\n  exit 1\nfi\n#\ncrit_var=$(ps\
