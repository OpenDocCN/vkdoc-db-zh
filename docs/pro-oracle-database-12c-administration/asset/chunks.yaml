  raw: '# runlevel


    N 5


    # who -r


    run-level 5  Jun 17 00:29                   last=S


    A given runlevel governs which scripts Linux will run when starting. These scripts
    are located in the directory /etc/rc.d/rc<N>.d, where <N> corresponds to the runlevel.
    For runlevel 5 the scripts are in the /etc/rc.d/rc5.d directory. For example,
    when Linux starts up in runlevel 5, one of the scripts it will run is /etc/rc.d/rc5.d/S55sshd,
    which is actually a soft link to /etc/rc.d/init.d/sshd.


    Checking for Archive Redo Destination Fullness


    Sometimes DBAs and SAs don’t adequately plan and implement a location for storing
    archive redo log files on disk. In these scenarios it’s sometimes convenient to
    have a script that checks for space in the primary location and that sends out
    warnings before the archive redo destination becomes full. Additionally, you may
    want to implement within the script that the archive redo log location automatically
    switch to an alternate location that has adequate disk space.


    I’ve only used scripts such as this in chaotic environments that have issues with
    the archive redo log destination’s filling up at unpredictable frequencies. If
    the archive redo log destination fills up, the database will hang. In some environments
    this is highly unacceptable. You could argue that you should never let yourself
    get into this type of situation. Therefore, if you’re brought in to maintain an
    unpredictable environment, and you’re the one getting the phone calls at 2:00
    am, you may want to consider implementing a script such as the one provided in
    this section.


    Before using the following script, change the variables within the script to match
    your environment. For instance, SWITCH_DIR should point to an alternate location
    on disk that you can safely switch to the archive redo log destination, should
    the primary destination become full. The script will send warning e-mails when
    the threshold goes below the amount of space specified by the T HRESH_GET_WORRIED
    variable. If the archive redo log space falls below the value specified in the
    T HRESH_SPACE_CRIT variable, then the destination will automatically be switched
    to the directory contained in the S WITCH_DIR variable.


    ```

    #!/bin/bash

    PRG=''basename $0''

    DB=$1

    USAGE="Usage: ${PRG} <sid>"

    if [ -z "$DB" ]; then

      echo "${USAGE}"

      exit 1

    fi

    # source OS variables

    . /var/opt/oracle/oraset ${DB}

    # Set an alternative location, make sure it exists and has space.

    SWITCH_DIR=/oradump01/${DB}/archivelog

    # Set thresholds for getting concerned and switching.

    THRESH_GET_WORRIED=2000000 # 2Gig from df -k

    THRESH_SPACE_CRIT=1000000  # 1Gig from df -k

    MAILX="/bin/mailx"

    MAIL_LIST="dkuhn@gmail.com "

    BOX=''uname -a | awk ''{print$2}''''

    #

    loc=''sqlplus -s <<EOF

    CONNECT / AS sysdba

    SET HEAD OFF FEEDBACK OFF

    SELECT SUBSTR(destination,1,INSTR(destination,''/'',1,2)-1)

    FROM v\\$archive_dest WHERE dest_name=''LOG_ARCHIVE_DEST_1'';

    EOF''

    # The output of df depends on your version of Linux/Unix,

    # you may need to tweak the next line based on that output.

    free_space=''df -k | grep ${loc} | awk ''{print $4}''''

    echo box = ${BOX}, sid = ${DB}, Arch Log Mnt Pnt = ${loc}

    echo "free_space        = ${free_space} K"

    echo "THRESH_GET_WORRIED= ${THRESH_GET_WORRIED} K"

    echo "THRESH_SPACE_CRIT = ${THRESH_SPACE_CRIT} K"

    #

    if [ $free_space -le $THRESH_GET_WORRIED ]; then

    $MAILX -s "Arch Redo Space Low ${DB} on $BOX" $MAIL_LIST <<EOF

    Archive log dest space low, box: $BOX, sid: ${DB}, free space: $free_space

    EOF

    fi

    #

    if [ $free_space -le $THRESH_SPACE_CRIT ]; then

    sqlplus -s << EOF

    CONNECT / AS sysdba

    ALTER SYSTEM SET log_archive_dest_1=''location=${SWITCH_DIR}'';

    ALTER SYSTEM SWITCH LOGFILE;

    EOF

    $MAILX -s "Archive Switch ${DB} on $BOX" $MAIL_LIST <<EOF

    Archive log dest, box: $BOX, sid: ${DB} has switched.

    Then ALTER SYSTEM SET LOG_ARCHIVE_DEST_1=''location=<Normal Location>'';

    EOF

    else

      echo no need to switch, ${free_space} KB free on ${loc}

    fi

    #

    exit 0

    ```


    The prior script assumes that the LOG_ARCHIVE_DEST_1 initialization parameter
    has been set to your archive redo location. If you’re using an FRA for the location
    of your archive redo log files, you can derive the archive location from the V$ARCHIVED_LOG
    view; for example,


    ```

    select

      substr(name,1,instr(name,''/'',1,2)-1)

    from v$archived_log

    where first_time =

     (select max(first_time) from v$archived_log);

    ```


    Typically, I’ll run a script to check the archive redo log destination once an
    hour. Here is a typical cron entry (this entry should actually be a single line
    of code but has been placed on two lines in order to fit on the page):


    ```

    38 * * * * /u01/oracle/bin/arch_check.bsh DWREP

      1>/u01/oracle/bin/log/arch_check.log 2>&1

    ```


    Truncating Large Log Files


    Sometimes log files can grow very large and cause issues by filling up critical
    mount points. The listener.log will record information about incoming connections
    to the database. With active systems this file can quickly grow to several gigabytes.
    For many of my environments, the information in the listener.log file does not
    need to be retained. If there are Oracle Net connectivity issues, then the file
    can be inspected to help troubleshoot issues.


    The listener.log file is actively written to, so you shouldn’t just delete it.
    If you remove the file, the listener process won’t re-create the file and start
    writing to it again; you have to stop and restart the listener to restart its
    writing to the listener.log file. You can, however, null out the listener.log
    file or truncate it. In Linux/Unix environments this is done via the following
    technique:


    ```

    $ cat /dev/null >listener.log

    ```


    The previous command replaces the contents of the listener.log file with the contents
    of /dev/null (a default file on Linux/Unix systems that contains nothing). The
    result of this command is that the listener.log file is truncated, and the listener
    can continue to actively write to it.


    Listed next is a shell script that truncates the default listener.log file. This
    script is dependent on setting the OS variable ORACLE_BASE. If you don’t set that
    variable in your environment, you’ll have to hard-code the directory path within
    this script:


    ```

    #!/bin/bash

    #

    if [ $# -ne 1 ]; then

      echo "Usage: $0 SID"

      exit 1

    fi

    # See Chapter 2 for details on setting OS variables

    # Source oracle OS variables with oraset script

    . /etc/oraset $1

    #

    MAILX=''/bin/mailx''

    MAIL_LIST=''dkuhn@gmail.com’

    BOX=$(uname -a | awk ''{print $2}'' | cut -f 1 -d''.'')

    #

    if [ -f $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.log ]; then

      cat /dev/null > $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.log

    fi

    if [ $? -ne 0 ]; then

      echo "trunc list. problem" | $MAILX -s "trunc list. problem $1" $MAIL_LIST

    else

      echo "no problem..."

    fi

    exit 0

    ```


    The following cron entry runs the prior script on a monthly basis (this entry
    should all be on one line but has been placed on two lines in order to fit on
    the page):


    ```

    30 6 1 * * /orahome/oracle/bin/trunc_log.bsh DWREP

      1>/orahome/oracle/bin/log/trunc_log.log 2>&1

    ```


    Checking for Locked Production Accounts


    Usually I have a database profile in place that specifies that a database account
    become locked after a designated number of failed login attempts. For example,
    I’ll set the DEFAULT profile FAILED_LOGIN_ATTEMPTS to 5\. Sometimes, however,
    a rogue user or developer will attempt to guess the production account password,
    and after five attempts, locks the production account. When this happens, I need
    to know about it as soon as possible so that I can investigate the issue and then
    unlock the account.


    The following shell script checks the LOCK_DATE value in DBA_USERS for a list
    of production database accounts:'
