    \ SALESPDB                       READ WRITE\n         4 HRPDB                \
    \          READ WRITE\n```\n\n如果您在直接连接到可插拔数据库时运行前面的查询，`CDB_PDBS`中将不会显示任何信息。此外，`V$PDBS`视图将仅显示当前连接的可插拔数据库的信息。\n\
    \n# 管理可插拔数据库\n\n您可以在直接连接到可插拔数据库时执行许多数据库管理任务。您可以打开/关闭可插拔数据库、检查其状态、显示当前连接的用户等等。您可以通过具有特权的连接（例如`SYS`）连接到根容器来管理可插拔数据库，也可以作为特权用户直接连接到可插拔数据库本身来执行任务。\n\
    \n请记住，当您作为`SYS`用户连接到 CDB 内的某个可插拔数据库时，您只能执行针对您所连接的可插拔数据库的`SYS`特权操作。您无法启动/停止容器实例或查看与\
    \ CDB 内其他可插拔数据库相关的数据字典信息。\n\n## 连接到可插拔数据库\n\n您可以通过本地或网络连接，以`SYS`用户身份连接到可插拔数据库。要进行本地连接，首先作为`SYS`用户连接到根容器，然后使用`SET\
    \ CONTAINER`命令连接到目标可插拔数据库：\n\n```\n$ sqlplus / as sysdba\nSQL> alter session set\
    \ container=salespdb;\n```\n\n前面的连接不需要监听器或密码文件；而通过网络进行的连接则需要这两者。下一个示例通过`SQL*Plus`进行网络连接，并指定可插拔数据库的主机、监听器端口和服务名：\n\
    \n```\n$ sqlplus sys/foo@speed2:1521/salespdb as sysdba\n```\n\n如果您不确定如何设置监听器和密码文件，请参阅第\
    \ 2 章。关于如何将可插拔数据库服务名注册到监听器的说明，请参见下一节。\n\n## 在可插拔数据库环境中管理监听器\n\n回顾第 2 章，监听器是支持远程网络连接到数据库的进程。大多数数据库环境都需要一个监听器才能运行。当客户端尝试连接到远程数据库时，客户端会提供三个关键信息：监听器所在的主机、监听器监听的主机端口以及数据库服务名。\n\
    \n每个数据库都分配有一个或多个服务名。默认情况下，通常有一个源自数据库唯一名称和域名的**服务名**。您可以为数据库手动创建一个或多个服务名。DBA 有时会创建多个服务，以便可以控制或监控每个服务的资源使用情况。例如，可以为销售应用程序创建一个服务，为人力资源应用程序创建另一个服务。每个应用程序通过其服务名连接到数据库。服务连接信息会显示在`V$SESSION`视图的`SERVICE_NAME`列中，对应每个会话。\n\
    \n如果您在没有`listener.ora`文件的情况下启动默认监听器，`PMON`后台进程会自动将任何数据库（包括任何可插拔数据库）注册为一项服务：\n\n\
    ```\n$ lsnrctl start\n```\n\n最终（在一两分钟后），您应该会看到数据库（包括任何可插拔数据库）已注册到默认监听器。\n\n![image](img/sq.jpg)\
    \ **注意** 启动监听器时，如果存在`listener.ora`文件，监听器将尝试静态注册该文件中出现的所有服务名。\n\n默认情况下，可插拔数据库注册的服务名与其可插拔数据库名称相同。默认服务通常是您用于进行`SYS`连接的服务：\n"
- fmt: "## 连接与验证\n\n通过以下命令以 SYSDBA 身份连接到数据库：\n```\n$ sqlplus sys/foo@speed2:1521/salespdb\
    \ as sysdba\n```\n\n你可以通过连接到根容器并以 SYS 身份查询，来验证正在运行的服务：\n```\nSQL> select name,\
    \ network_name, pdb from v$services order by pdb, name;\n```\n\n你也可以通过 `lsnrctl`\
    \ 工具来验证监听器正在监听哪些服务：\n```\n$ lsnrctl services\n```\n\n## 配置可插拔数据库的服务\n\nOracle\
    \ 建议为任何需要访问可插拔数据库的应用程序配置一个额外的服务（除了默认服务之外）。你可以使用 `SRVCTL` 实用程序或 `DBMS_SERVICE`\
    \ 包手动配置服务。此示例展示了如何通过 `DBMS_SERVICE` 包来配置服务。首先，通过默认服务以 SYS 身份连接到你想要在其中创建服务的可插拔数据库：\n\
    ```\n$ sqlplus sys/foo@speed2:1521/salespdb as sysdba\n```\n\n确保可插拔数据库处于读写模式：\n\
    ```\nSQL> SELECT con_id, name, open_mode FROM v$pdbs;\n```\n\n接下来，创建一个服务。此代码创建并启动一个名为\
    \ `SALESWEST` 的服务：\n```\nexec DBMS_SERVICE.CREATE_SERVICE(service_name => 'SALESWEST',\
    \ network_name => 'SALESWEST');\nexec DBMS_SERVICE.START_SERVICE(service_name\
    \ => 'SALESWEST');\n```\n\n现在，应用程序用户可以通过该服务连接到 `SALESPDB` 可插拔数据库：\n```\n$ sqlplus\
    \ user/pass@speed2:1521/saleswest\n```\n\n![image](Images/sq.jpg) **注意** 如果你的服务器上有多个\
    \ CDB 数据库，请确保可插拔数据库的服务名称在该服务器上的所有 CDB 数据库中是唯一的。不建议将两个同名的可插拔数据库注册到同一个监听器上。这会导致你实际连接到哪个可插拔数据库的混淆。\n\
    \n## 显示当前连接的可插拔数据库\n\n从 SQL\\*Plus 出发，有几种简单的方法可以显示你当前连接的可插拔数据库的名称。此示例使用 `SHOW`\
    \ 命令显示容器 ID、名称和用户：\n```\nSQL> show con_id con_name user\n```\n\n以下是一些示例输出：\n```\n\
    CON_ID\nCON_NAME\nSALESPDB\nUSER is \"SYS\"\n```\n\n你也可以通过 SQL 查询显示相同的信息：\n```\n\
    SELECT SYS_CONTEXT('USERENV', 'CON_ID') AS con_id,\nSYS_CONTEXT('USERENV', 'CON_NAME')\
    \ AS cur_container,\nSYS_CONTEXT('USERENV', 'SESSION_USER') AS cur_user\nFROM\
    \ DUAL;\n```\n\n以下是一些示例输出：\n```\nCON_ID     CUR_CONTAINER   CUR_USER\n----------\
    \ --------------- ----------\n3          SALESPDB        SYS\n```\n\n请记住，`SYS_CONTEXT`\
    \ 函数可用于显示其他有用信息，例如 `SERVICE_NAME`、`DB_UNIQUE_NAME`、`INSTANCE_NAME` 和 `SERVER_HOST`；例如，\n\
    ```\nSELECT\n SYS_CONTEXT('USERENV', 'SERVICE_NAME') as service_name,\n SYS_CONTEXT('USERENV',\
    \ 'DB_UNIQUE_NAME') as db_unique_name,\n SYS_CONTEXT('USERENV', 'INSTANCE_NAME')\
    \ as instance_name,\n SYS_CONTEXT('USERENV', 'SERVER_HOST') as server_host\nfrom\
    \ dual;\n```\n\n## 启动/停止可插拔数据库\n\n当你启动/停止可插拔数据库时，你并不是在启动/停止实例。相反，你是在使可插拔数据库可用或不可用，打开或关闭。你可以从以\
    \ SYS 身份连接到根容器的连接，或者从直接以 SYS 身份连接到可插拔数据库的连接，来更改可插拔数据库的打开模式。\n\n### 从根容器\n\n要从根容器更改可插拔数据库的打开模式，请执行以下操作：\n\
    ```\n$ sqlplus / as sysdba\nSQL> alter pluggable database salespdb open;\n```\n\
    \n你也可以以特定状态启动可插拔数据库，例如只读：\n```\nSQL> startup pluggable database salespdb open\
    \ read only;\n```\n\n要关闭可插拔数据库，可以指定可插拔数据库的名称：\n```\nSQL> alter pluggable database\
    \ salespdb close immediate;\n```\n\n在以 SYS 身份连接到根容器时，你也可以打开或关闭所有可插拔数据库：\n```\n\
    SQL> alter pluggable database all open;\nSQL> alter pluggable database all close\
    \ immediate;\n```\n\n### 从可插拔数据库\n\n要打开/启动可插拔数据库，以 SYS 身份连接到可插拔数据库：\n```\n$ sqlplus\
    \ sys/foo@salespdb as sysdba\nSQL> startup;\n```\n\n要关闭数据库，请发出以下命令：\n```\nSQL>\
    \ shutdown immediate;\n```\n\n## 修改特定于可插拔数据库的初始化参数\n\nOracle 允许在以特权用户身份连接到可插拔数据库时修改某些初始化参数。你可以通过以下查询查看这些参数：\n\
    ```\nSELECT name\nFROM v$parameter\nWHERE ispdb_modifiable='TRUE'\nORDER BY name;\n\
    ```\n\n以下是一段输出片段：\n```\nNAME\nsort_area_size\nsql_trace\nsqltune_category\nstar_transformation_enabled\n\
    statistics_level\n```\n\n当你直接连接到可插拔数据库进行初始化参数更改时，这些更改仅影响当前连接的可插拔数据库。参数更改不会影响根容器或其他可插拔数据库。例如，假设你想要更改\
    \ `OPEN_CURSORS` 的值。首先，以特权用户身份直接连接到可插拔数据库，并发出 `ALTER SYSTEM` 语句：\n```\n$ sqlplus\
    \ sys/foo@speed2:1521/salespdb as sysdba\nSQL> alter system set open_cursors=100;\n\
    ```\n\n先前的更改仅修改了 `SALESPDB` 可插拔数据库的 `OPEN_CURSORS` 值。此外，`SALESPDB` 的 `OPEN_CURSORS`\
    \ 设置将在数据库重启后保留。\n\n## 重命名可插拔数据库\n\n偶尔，你可能需要重命名一个可插拔数据库。例如，数据库最初可能被错误命名，或者你不再使用该数据库并想在其名称后附加\
    \ `_OLD`。要重命名可插拔数据库，首先以具有 SYSDBA 特权的账户连接到它：\n```\n$ sqlplus sys/foo@invpdb as\
    \ sysdba\n```\n\n接下来，停止可插拔数据库，并以受限模式重新启动它：\n```\nSQL> shutdown immediate;\nSQL>\
    \ startup restrict;\n```\n\n现在，可以重命名可插拔数据库：\n```\nSQL> alter pluggable database\
    \ INVPDB rename global_name to INVPDB_OLD;\n```\n\n## 限制可插拔数据库消耗的空间量\n\n你可以对可插拔数据库可以消耗的磁盘空间总量设置一个限制。我建议对每个可插拔数据库的整体大小设置一些合理的限制，特别是如果你在这样一个环境中工作：不同的\
    \ DBA 或组在同一个 CDB 中管理单独的可插拔数据库，并且每个 DBA/组不知道其他数据库正在消耗的空间。\n\n在此示例中，对可插拔数据库设置了 20GB\
    \ 的总体限制。首先，以 SYS 身份连接到可插拔数据库：\n```\n$ sqlplus sys/foo@speed2:1521/salespdb as\
    \ sysdba\n```\n\n然后，更改可插拔数据库的最大大小限制。此命令将可插拔数据库的大小限制为最大 2GB：\n```\nSQL> alter pluggable\
    \ database salespdb storage(maxsize 20G);\n```\n\n## 查看可插拔数据库历史记录\n\n如果你需要查看可插拔数据库的创建时间，可以查询\
    \ `CDB_PDB_HISTORY` 视图，如下所示：\n```\nCOL db_name FORM A10\nCOL con_id FORM 999\n\
    COL pdb_name FORM A15\nCOL operation FORM A16\nCOL op_timestamp FORM A10\nCOL\
    \ cloned_from_pdb_name FORMAT A15\n--\nSELECT db_name, con_id, pdb_name, operation,\n\
    \       op_timestamp, cloned_from_pdb_name\nFROM cdb_pdb_history\nWHERE con_id\
    \ > 2\nORDER BY con_id;\n```\n\n以下是一些示例输出：\n```\nDB_NAME    CON_ID PDB_NAME  \
    \      OPERATION        OP_TIMESTA CLONED_FROM_PDB\n---------- ------ ---------------\
    \ ---------------- ---------- ---------------\nCDB             3 SALESPDB    \
    \    CREATE           04-DEC-12  PDB$SEED\nCDB             4 HRPDB           CREATE\
    \           10-FEB-13  PDB$SEED\n```\n\n通过这种方式，你可以确定可插拔数据库是何时创建的以及源是什么。\n\n##\
    \ 删除可插拔数据库"
