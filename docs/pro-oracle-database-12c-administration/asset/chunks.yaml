    0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP\n   1>/home/oracle/bin/log/lock.log\
    \ 2>&1\n```\n\nIn this way, I am notified when one of the production database\
    \ accounts becomes locked.\n\n## Checking for Files Older Than a Certain Age\n\
    \nFor some jobs that I run from shell scripts (such as backups), I’ll first check\
    \ to see if another backup job is already running. The check involves looking\
    \ for a lock file. If the lock file exists, then the shell script exits; if the\
    \ lock file doesn’t exist, then one is created. At the end of the job, the lock\
    \ file is removed.\n\nSometimes, there’s a problem with the job, and it aborts\
    \ abnormally before the lock file can be removed. In these situations, I want\
    \ to know if a lock file that is older than 1 day exists the a server. The existence\
    \ of an old lock file indicates that there has been an issue and that I need to\
    \ investigate. The following shell script checks for any lock files older than\
    \ 1 day in the `tmp` directory.\n\n```bash\n#!/bin/bash\nBOX=$(uname -a | awk\
    \ '{print $2}')\n# find all lock files gt 1 day old.\n# Find all lock files in\
    \ /tmp, if found, find any older than one day\nls /tmp/*.lock 2>/dev/null && \\\
    \nfilevar=$(find /tmp/*lock -type f -mtime +1 | wc -l) || filevar=0\nif [ $filevar\
    \ -gt 0 ]; then\n  echo \"$BOX, lockfile issue: $filevar\" | \\\n  mailx -s \"\
    $BOX lockfile problem\" dkuhn@gmail.com\nelse\n  echo \"Lock file ok: $filevar\"\
    \nfi\nexit 0\n```\n\nI usually check for the existence of a lock file on a daily\
    \ basis. Here is a typical `cron` entry for running the prior script, named `lock_chk.bsh`\
    \ (this entry should all be on one line but has been placed on two lines in order\
