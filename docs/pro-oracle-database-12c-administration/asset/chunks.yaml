    \ To remove OSB, as root, run the uninstallob shell script, located in the OSB_HOME/install\
    \ directory. Replace the OS variable OSB_HOME to the usr/local/oracle/backup directory\
    \ for Unix/Linux platforms, and to the C:\\Programs Files\\Oracle\\Backup directory\
    \ for Windows platforms.\n\nCommand-Line Access to OSB\n\nAll the examples in\
    \ this chapter use either obtool or RMAN to access OSB and perform tasks such\
    \ as creating backups and restoring files. This section focuses on connecting\
    \ to the obtool utility. The first time you run the obtool utility, you will be\
    \ prompted for the password of the admin user, which is the default OSB user created\
    \ when you installed OSB. When prompted, use the password you specified when installing\
    \ the OSB software:\n\n```\n$ obtool\nOracle Secure Backup 10.4.0.2.0\nlogin:\n\
    ```\n\nTo launch the obtool utility and log in to a specific user, use the u option,\
    \ as shown (you will learn how to maintain OSB users in the next section):\n\n\
    ```\n$ obtool -u apress_oracle\n```\n\nTo verify the OSB user that you are logged\
    \ in as, issue the id command:\n\n```\nob> id\napress_oracle\n```\n\nTo view a\
    \ list of obtool help topics, enter the following command:\n\n```\nob> help topics\n\
    ```\n\nHelp is available on the following topics:\n\n```\nadvanced        .. advanced\
    \ and seldom-used commands\nbackups         .. data backup operations\nbackupwindow    ..\
    \ backup window definition\nbrowser         .. file system browser\ncheckpoint      ..\
    \ checkpoint management\nclass           .. user class rights\n```\n\nTo exit\
    \ the obtool utility, issue either the exit or quit command, like so\n\n```\n\
    ob> exit\n```\n\nHowever, to log out the current user, issue the logout command,\
    \ as follows:\n\n```\nob> logout\n```\n\nOSB Configuration\n\nOnce OSB is installed\
    \ and running, you can run a simple backup command. However, for an environment\
    \ in which security is a top priority, you may want to change the OSB default\
    \ settings first. Imagine that tight security is strictly enforced for your production\
    \ database, and a single OSB user account is used to back up both production and\
    \ test databases. You are in a vulnerable situation, because a DBA on your testing\
    \ team can restore the backup of your production database to another server and\
    \ access the data from there. To increase security and better manage your tape\
    \ backups, I recommend creating new user accounts and assigning specific roles\
    \ as well as creating media families and database backup storage selectors. These\
    \ topics are discussed in the next several sections.\n\nConfiguring Users and\
    \ Classes\n\nWhen OSB is installed, the default user account created, named admin,\
    \ has all the privileges relating to OSB. For security reasons, you should create\
    \ separate OSB user accounts to access the different environments, such as production,\
    \ test, and development. Also, assign these users to specific classes (roles),\
    \ such as admin, operator, oracle, user, or reader. Monitor them to limit their\
    \ rights to modify OSB administrative domain configurations and perform backup\
    \ and restore operations. Limiting rights ensures that a particular OSB user can\
    \ back up the test database but has no rights to perform other tasks, for example,\
    \ restoring the production database.\n\nTo determine the rights of the admin class,\
    \ issue the l sclass command, as shown:\n\n```\nob> lsclass -l admin\n```\n\n\
    Here is some sample output:\n\n```\nadmin:\n    browse backup catalogs with this\
    \ access:         privileged\n    access Oracle database backups:                  all\n\
        access file system backups:                      all\n    display administrative\
    \ domain's configuration:   yes\n    modify own name and password:                    yes\n\
        modify administrative domain's configuration:    yes\n    modify catalog:                                  yes\n\
        perform file system backups as self:             yes\n    perform file system\
    \ backups as privileged user:  yes\n    list any jobs owned by user:                    \
    \ yes\n    modify any jobs owned by user:                   yes\n    perform file\
    \ system restores as self:            yes\n    perform file system restores as\
    \ privileged user: yes\n    receive email requesting operator assistance:    yes\n\
        receive email describing internal errors:        yes\n    receive email regarding\
    \ expired passphrase keys: yes\n    query and display information about devices:    \
    \ yes\n    manage devices and change device state:          yes\n    list any\
    \ job, regardless of its owner:           yes\n    modify any job, regardless\
    \ of its owner:         yes\n    perform Oracle database backups and restores:    yes\n\
    ```\n\n![image](Images/sq.jpg) **Note**   To display the complete syntax of an\
    \ OSB command, issue the help command, followed by the OSB command.\n\nTo create\
    \ an OSB user, issue the m kuser command. In the following example the OSB user\
    \ apress_oracle is created and assigned oracle rights:\n\n```\nob> mkuser --class\
    \ oracle apress_oracle --preauth BLLNX3:oracle+cmdline+rman\n```\n\nThe cmdline\
    \ attribute in the -preauth option grants the oracle OS user preauthorized access\
    \ to obtool utility, whereas the rman attribute grants Oracle Database SBT backups\
    \ via RMAN. If no +rman preauthorization is defined for the server hosting the\
    \ target database that you want to back up, then the RMAN backup fails, with ORA-19511\
    \ error, as shown:\n\n```\nORA-19511: Error received from media manager layer,\
    \ error text:\n   sbt__rpc_cat_query: Query for piece u8lr5bs6_1_1 failed.\n(Oracle\
    \ Secure Backup error: 'no preauth config found for OS user (OB tools) oracle').\n\
    ```\n\nIf you want to view all OSB users, issue the l suser command:\n\n```\n\
    ob> lsuser\n```\n\n[Table 20-1](#9781430257288_Ch20.xhtml#Tab1) describes the\
    \ various OSB commands used to maintain OSB user accounts.\n\n[Table 20-1.](#9781430257288_Ch20.xhtml#_Tab1)\
    \ OSB Commands for Maintaining OSB Users\n\n| Command | Meaning |\n| --- | ---\
    \ |\n| mkuser | Create an OSB user. |\n| lsuser | Display information on OSB users.\
    \ |\n| renuser | Rename an OSB user. |\n| chuser | Modify the attributes of an\
    \ OSB user. |\n| rmuser | Delete an OSB user. |\n\nConfiguring Media Families\n\
    \nThe media family classifies and defines the characteristics of the tape volume,\
    \ such as the volume ID, volume expiration, and write window. The volume ID, which\
    \ is used by OSB to uniquely identify the tape volume, consists of the name of\
    \ the media family affixed with a six-digit sequence number generated by OSB.\
    \ For example, if the name of the media family is APRESS_BACKUP, then the first\
    \ volume ID is APRESS_BACKUP-000001, the second is APRESS_BACKUP-000002, and so\
    \ on.\n\nThere are two types of volume expiration policies: time managed and content\
    \ managed. The tape volumes in a time-managed media family can expire after surpassing\
    \ the expiration time; in a content-managed media family, they expire when all\
    \ the backup pieces on the volume are marked as deleted. For filesystem backups,\
    \ you must use a time-managed media family to let OSB manage the volume expiration.\
    \ For RMAN backups, you must use content-managed media family to let RMAN manage\
    \ the expiration of the backup pieces on the tape volume instead of OSB. This\
    \ avoids inconsistency between the RMAN metadata and the contents of the tapes.\n\
    \nTo create a time-managed media family, issue the m kmf command. In the following\
    \ example the media family APRESS_OS has 7 days of write period and 14 days of\
    \ retention period. This means that the volumes of the media family APRESS_OS\
    \ will expire and are ready for recycling after 21 days, as the first backup piece\
    \ is created on the tape volume:\n\n```\nob> mkmf --writewindow 7days --retain\
    \ 14days APRESS_OS\n```\n\nTo create a content-managed media family, issue the\
    \ mkmf, as shown. Because the default volume expiration policy is content managed,\
    \ you can omit the --contentmanaged option.\n\n```\nob> mkmf --contentmanaged\
    \ APRESS_RMAN\n```\n\n[Table 20-2](#9781430257288_Ch20.xhtml#Tab2) describes OSB\
    \ commands used to maintain media families.\n\n[Table 20-2.](#9781430257288_Ch20.xhtml#_Tab2)\
    \ OSB Commands for Maintaining Media Families\n\n| Command | Meaning |\n| ---\
    \ | --- |\n| mkmf | Create a media family. |\n| lsmf | Display information on\
    \ media families. |\n| renmf | Rename a media family. |\n| chmf | Modify the attributes\
    \ of a media family. |\n| rmmf | Delete a media family. |\n\nTo increase security\
    \ and better manage your tape backups, you may create separate media families\
    \ for different environments, such as production, test, and development. In this\
    \ way, the backups of the production database and test database are not sharing\
    \ the same tape volumes.\n\nConfiguring Database Backup Storage Selector\n\nThe\
    \ default media family for RMAN backup is RMAN-DEFAULT. To use a different media\
    \ family when running RMAN backup, create a database backup storage selector,\
    \ using the mkssel command. Here, the database backup storage selector, named\
    \ BLLNX3-DB11R2.ssel, assigns the media family APRESS_RMAN for RMAN backups on\
    \ the Oracle database DB11R2, hosted on the client server BLLNX3:\n\n```\nob>\
    \ mkssel --host BLLNX3 --dbname DB11R2 --family APRESS_RMAN BLLNX3-DB11R2.ssel\n\
    ```\n\n![image](Images/sq.jpg) **Note**   If an RMAN backup matches the Oracle\
    \ database or client host defined on a database backup storage selector, then\
    \ you don’t have to pass the OS environment variable OB_MEDIA_FAMILY parameter\
    \ when allocating the RMAN channel for SBT_TAPE.\n\n[Table 20-3](#9781430257288_Ch20.xhtml#Tab3)\
    \ offers descriptions of OSB commands related to maintaining the database backup\
    \ storage selector.\n\n[Table 20-3.](#9781430257288_Ch20.xhtml#_Tab3) OSB Commands\
    \ for Maintaining the Database Backup Storage Selector\n\n| Command | Meaning\
    \ |\n| --- | --- |\n| mkssel | Create a database backup storage selector. |\n\
    | lsssel | Display information on database backup storage selectors. |\n| renssel\
    \ | Rename a database backup storage selector. |\n| chssel | Modify the attributes\
    \ of a database backup storage selector. |\n| rmssel | Delete a database backup\
    \ storage selector. |\n\nDatabase Backup\n\nIn [Chapter 18](#9781430257288_Ch18.xhtml),\
    \ you learned how to use RMAN to back up database files to disk. In the following\
    \ sections, you will use OSB and RMAN to create backups on tape. There are two\
    \ ways to configure RMAN for a backup to tape:\n\n*   Allocate a channel\n*  \
    \ Configure a channel\n\nThe first option is to allocate an RMAN channel for SBT_TAPE\
    \ inside the run{} block. In this example the media family APRESS_RMAN is passed\
    \ as a parameter to the environment variable OB_MEDIA_FAMILY. The tape volumes\
    \ will have a volume ID of APRESS_RMAN, affixed with a six-digit sequence number\
    \ generated by OSB.\n\n```\nRMAN> run {\n  allocate channel t1 device type sbt_tape\
    \ parms 'ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)';\n  backup database;\n}\n```\n\nYou\
    \ can configure multiple channels for SBT_TAPE, equivalent to the number of available\
    \ physical tape devices. However, if you allocate two channels and only have one\
    \ physical tape device, the other channel will just wait for the tape resource\
    \ to become available. You can also use the C ONFIGURE command to set the RMAN\
    \ channel for SBT_TAPE, as shown:\n\n```\nRMAN> configure channel device type\
    \ sbt_tape\n          parms 'ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)';\nRMAN> backup\
    \ device type sbt_tape database;\n```\n\nFor discussion on monitoring the backup\
    \ jobs you have submitted, see the section “OSB Job Monitoring,” later in this\
    \ chapter. [Table 20-4](#9781430257288_Ch20.xhtml#Tab4) provides descriptions\
    \ of other OSB media management parameters.\n\n[Table 20-4.](#9781430257288_Ch20.xhtml#_Tab4)\
    \ OSB Media Management Parameters\n\n| Parameter | Meaning |\n| --- | --- |\n\
    | OB_MEDIA_FAMILY | Specify the media family that defines the characteristics\
    \ of the tape volumes. |\n| OB_DEVICE | Specify the tape drives to use during\
    \ backup. |\n| OB_RESOURCE_WAIT_TIME | Specify the wait time for resources to\
    \ become available. |\n| OB_ENCRYPTION | Specify the OSB encryption. If this is\
    \ set, then OSB does not perform further encryption. |\n| OB_RESTORE_DEVICE |\
    \ Specify the tape drives to use during restore. |\n| OB_IGNORE_NUMA | Enable\
    \ support for nonuniform memory access (NUMA). NUMA allows the Oracle shadow process\
    \ and the Oracle Secure Backup data service (obndmpd process) to access a common\
    \ memory when exchanging data. This feature is available starting with Oracle\
    \ Secure Backup version 10.4.0.1.0; the default value is 1, which enables NUMA.\
    \ |\n\n![image](Images/sq.jpg) **Note**   If no media family is explicitly passed\
    \ when allocating/configuring the RMAN channel for SBT_TAPE, or no database backup\
    \ storage selector is defined for the specific host or database, OSB will use\
    \ the default media family RMAN-DEFAULT, which is created when OSB is installed.\n\
    \nDatabase Restore\n\nFor RMAN restore and recover, you have to allocate an RMAN\
    \ channel for SBT_TAPE. In the following example the RMAN channel for SBT_TAPE\
    \ is allocated inside the run{} block:\n\n```\nRMAN> run {\n  allocate channel\
    \ t1 device type sbt_tape;\n  restore database;\n  recover database;\n}\n```\n\
    \nAnother option is to run the CONFIGURE command. Unlike the previous example,\
    \ you must include the PARMS clause in the CONFIGURE command (if you don’t use\
    \ the PARMS clause, a syntax error is returned):\n\n```\nRMAN> configure channel\
    \ device type sbt_tape\n          parms 'ENV=(OB_MEDIA_FAMILY=APRESS_RMAN)';\n\
    RMAN> restore device type sbt_tape database;\nRMAN> recover device type sbt_tape\
    \ database;\n```\n\nSuppose you have a scenario in which the production server\
    \ is completely gone, owing to a catastrophic event, but, luckily, you have an\
    \ off-site tape backup of the database. Additionally, you are not using an RMAN\
    \ recovery catalog, and control file autobackup is disabled. You discover that\
    \ the latest backup of the control file is corrupted, but you are able to restore\
    \ the control file from a backup taken 2 days ago. After mounting the database,\
    \ you realize that the latest RMAN backups, taken yesterday, are not on the list\
    \ when you issue the RMAN LIST BACKUP command (because the control file restored\
    \ was from 2 days ago and has no knowledge of yesterday’s RMAN backup).\n\nIn\
    \ this situation the control file restored from a backup taken 2 days ago has\
    \ no information on the backup pieces created on tape yesterday. To make the RMAN\
    \ repository (control file, in this scenario) aware of the backup pieces on tape,\
    \ do the following:\n\n1.  Configure a channel for tape.\n2.  Make the RMAN repository\
    \ aware of the backup piece via the CATALOG command.\n\nNext, issue the CATALOG\
    \ DEVICE TYPE SBT_TAPE BACKUPPIECE command, followed by the name of the backup\
    \ piece. In this example, one backup piece is cataloged:\n\n```\nRMAN> catalog\
    \ device type sbt_tape backuppiece '15o2qns3_1_1';\n```\n\nHere is the sample\
    \ output for the previous command.\n\n```\nchannel ORA_SBT_TAPE_1: sid=159 devtype=SBT_TAPE\n\
    channel ORA_SBT_TAPE_1: Oracle Secure Backup\ncataloged backuppiece\nbackup piece\
    \ handle=15o2qns3_1_1 recid=5559 stamp=813392789\n```\n\nIf you have multiple\
    \ backup pieces that you want to catalog, you must issue the CATALOG DEVICE TYPE\
    \ SBT_TAPE BACKUPPIECE command for each individual backup piece. The key to cataloging\
    \ the RMAN backup pieces on tape is that you must know their exact names.\n\n\
    ![image](Images/sq.jpg) **Note**   As mentioned in [Chapter 19](#9781430257288_Ch19.xhtml),\
    \ for disk-based backups, you can easily make the RMAN repository aware of multiple\
    \ backup pieces via the CATALOG START WITH <directory> command. However, this\
    \ technique only works for disk-based backups and not tape backups.\n\nWhat if\
    \ you don’t know the names of the back pieces? One way to figure out their names\
    \ is to check the RMAN log file generated during the RMAN backup. In the snippet\
    \ of the RMAN log file shown here, the RMAN backup piece is silr06fk_1_1:\n\n\
    ```\nchannel t1: finished piece 1 at 25-FEB-2013 02:46:43piece handle=15o2qns3_1_1\
    \ tag=TAG20130225T021218 comment=API Version 2.0,MMS Version 10.4.0.2\nchannel\
    \ t1: backup set complete, elapsed time: 00:34:24\n```\n\nBut, what if the RMAN\
    \ log file is not available? You can issue the lspiece command, using the obtool\
    \ utility. Here, the output is filtered to display only the backup pieces for\
    \ the hostname BLLNX3, which hosts the database DB11R2:\n\nThe following is the\
    \ snippet of the output of the L SPIECE command:\n\n```\nob> lspiece -d MYDB\n\
        POID Database   Content    Copy Created      Host             Piece name\n\
       17350 MYDB       full          0 02/25.07:12  BLLNX1           15o2qns3_1_1\n\
    ```\n\nThis listing shows information such as the creation date and backup piece\
    \ name. In this example the missing RMAN backup piece is 15o2qns3_1_1\\. After\
    \ you catalog the missing RMAN backup pieces, you can proceed with the RMAN restore\
    \ and recovery.\n\nFilesystem Backup\n\nLike any backup job, you need to define\
    \ the three Ws and one H. What data do I back up? When do I run the backup? Where\
    \ do I store the backup? How should the backup run? To accomplish the 3 Ws and\
    \ 1 H using OSB, you need to create a data set file as well configure a backup\
    \ window, a schedule, and a trigger.\n\nCreating Data Set Files\n\nData setfiles\
    \ define the directories and files on the client hosts that you want to back up.\
    \ In the following example the data set file specifies to include all files under\
    \ the directory home/oracle on the client host BLLNX1, except for files under\
    \ the directory /home/oracle/temp and Oracle database-related files:\n\n```\n\
    include host BLLNX1\ninclude path /home/oracle {\n   exclude path /home/oracle/temp\n\
       exclude oracle database files\n}\n```\n\nTo create a data set file named bllnx1_home-oracle.ds,\
    \ perform the following steps, using the obtool utility, as shown:\n\n1.  Issue\
    \ the mkds command, followed by the name of the data set file.\n\n    ```\n  \
    \  ob> mkds bllnx1_home-oracle.ds\n    ```\n\n2.  The vi editor is invoked, and\
    \ a data set template is displayed.\n3.  Comment out or remove all existing lines,\
    \ and add the following lines:\n\n    ```\n    include host BLLNX1\n    include\
    \ path /home/oracle {\n       exclude oracle database files\n       exclude path\
    \ /home/oracle/temp\n    }\n    ```\n\n4.  Save the file by pressing the Esc key\
    \ and typing : and wq!\n5.  The following prompt is displayed. Press the Enter\
    \ key to confirm the changes.\n\n    ```\n    Apply your changes, if any [yes]?\n\
    \    ```\n\nYou just created a data set file. [Table 20-5](#9781430257288_Ch20.xhtml#Tab5)\
    \ gives a list of other data set commands.\n\n[Table 20-5.](#9781430257288_Ch20.xhtml#_Tab5)\
    \ Data Set Commands\n\n| Command | Meaning |\n| --- | --- |\n| catds | Display\
    \ the contents of a data set file. |\n| cdds | Change the data set directory.\
    \ |\n| chkds | Check the syntax in a data set file. |\n| edds | Modify a data\
    \ set file. |\n| lsds | List the data set file and data set directory names. |\n\
    | mkds | Create a data set file or data set directory. |\n| pwdds | Show the current\
    \ directory in the data set directory tree. |\n| rends | Rename a data set file\
    \ or data set directory. |\n| rmds | Delete a data set file or data set directory.\
    \ |\n\nConfiguring Backup Windows\n\nThe backup window defines the range of time\
    \ in which the scheduled backups are allowed to run. The default backup window\
    \ is daily, 00:00–24:00\\. If no backup window is defined, the scheduled backups\
    \ are not going to run at all.\n\nFor production servers, you may want the backups\
    \ to run daily between 1 am and 5 am. when there is minimal database traffic.\
    \ To define a range of time for your backup window, perform the following steps:\n\
    \n1.  Remove the existing backup window (daily, 00:00–24:00), as it overlaps the\
    \ backup window you want to create, by issuing the r mbw command, like so\n\n\
    \    ```\n    ob> rmbw daily\n    ```\n\n2.  Issue the lsbw command.\n\n    ```\n\
    \    ob> lsbw\n    ```\n\n    There are no backup windows. This result indicates\
    \ that the daily backup window is already removed.\n\n3.  To create the backup\
    \ window, issue the a ddbw command. The following example defines the backup window\
    \ as daily, from 01:00 to 05:00:\n\n    ```\n    ob> addbw --times '01:00-05:00'\
    \ ,mon,tue,wed,thu,fri,sat,sun\n    ```\n\n[Table 20-6](#9781430257288_Ch20.xhtml#Tab6)\
    \ presents a list of other backup window commands.\n\n[Table 20-6.](#9781430257288_Ch20.xhtml#_Tab6)\
    \ Backup Window Commands\n\n| Command | Meaning |\n| --- | --- |\n| addbw | Add\
    \ a backup window. |\n| chkbw | Check whether there is a backup window defined.\
    \ |\n| lsbw | List the backup windows. |\n| rmbw | Remove a backup window. |\n\
    | setbw | Modify a backup window. |\n\nConfiguring Backup Schedules and Triggers\n\
    \nThe backup schedule defines what data to back up, where to store the backup,\
    \ and how the backup runs, whereas the triggers define when the backup is scheduled\
    \ to run. For what data to back up, set the specific data sets. For where to store\
    \ the backup, set the specific tape drives. If no specific tape drive is selected,\
    \ then any available tape drive will be used. For how the backup runs, set the\
    \ job priority and backup encryption options. The lower the value of the job priority\
    \ number, the greater the preference given to the job by the scheduler. The default\
    \ value for the job priority is 100; the default value for the encryption option\
    \ is no.\n\nThe following example uses the MKSCHED command to create a backup\
    \ schedule named bllnx1_home-oracle.sched for the data set bllnx1_home-oracle.ds:\n\
    \n```\nob> mksched --dataset bllnx1_home-oracle.ds bllnx1_home-oracle.sched\n\
    ```\n\nAfter creating the backup schedule, create a trigger to define when to\
    \ run the scheduled backup. This example uses the C HSCHED command to define a\
    \ trigger for the schedule bllnx1_home-oracle.sched to run daily at 02:00 (2 am).\
    \ The –a option means the addtrigger, the –d option means day, the –t option means\
    \ time, and the –f option means media family.\n\n```\nob> chsched -a -d daily\
    \ -t 02:00 -f APRESS_OS bllnx1_home-oracle.sched\n```\n\nTo display the information\
    \ on the backup schedules, issue the l ssched command, like so:\n\n```\nob> lssched\
    \ -l bllnx1_home-oracle.sched\nbllnx1_home-oracle.sched:\n    Type:                  \
    \ backup\n    State:                  enabled\n    Dataset:                bllnx1_home-oracle.ds\n\
        Encryption:             no\n    UUID:                   1ea82008-bfdd-102d-a743-0002a530c867\n\
        Trigger 1:\n        Day/date:           daily\n        At:                \
    \ 02:00\n        Backup level:       full\n        Media family:       APRESS_OS\n\
    ```\n\nYou just scheduled a backup, named bllnx1_home-oracle.sched, that is going\
    \ to run daily at 2 am. For details on monitoring a backup job, see the section\
    \ “OSB Job Monitoring,” later in this chapter.\n\nTo remove a backup schedule,\
    \ issue the r msched command, as shown:\n\n```\nob> rmsched bllnx1_home-oracle.sched\n\
    ```\n\nPerforming On-Demand Filesystem Backups\n\nTo run a one-time backup on\
    \ a specific client host, use the backup command. In this example the data set\
    \ file is bllnx1_home-oracle.ds, which was created earlier:\n\n```\nob> backup\
    \ --dataset bllnx1_home-oracle.ds --go\n```\n\nIf you omit the -go option, the\
    \ backup request is still in the queue. You can issue the lsbackup command to\
    \ display the backup requests that are queued, as follows:\n\n```\nob> lsbackup\n\
    Item #   Save data\n1        dataset bllnx1_home-oracle.ds\n```\n\nTo forward\
    \ the backup request to the OSB scheduler, issue the following b ackup command\
    \ with the --go option, as shown:\n\n```\nob> backup --go\n```\n\nTo back up the\
    \ OSB catalog of the admin server manually, issue the following b ackup command:\n\
    \n```\nob> backup --dataset OSB-CATALOG-DS --family OSB-CATALOG-MF --go\n```\n\
    \nFor discussion on monitoring the backup jobs you have submitted, see the section\
    \ “OSB Job Monitoring,” later in this chapter.\n\n![image](Images/sq.jpg) **Note**  \
    \ By default, OSB-CATALOG-SCHED is scheduled to run daily at 1 am to back up the\
    \ OSB catalog, using the data set file OSB-CATALOG-DS.\n\nFilesystem Restore\n\
    \nThere are three options for restoring from a filesystem backup:\n\n*   Catalog-based\
    \ restore\n*   Raw restore\n*   obtar command\n\nIn a catalog-based restore, you\
    \ provide the directory and file, which you can browse from the OSB catalog. With\
    \ both the raw restore and the obtar command, you give the volume ID and file\
    \ number. The volume ID is the unique name (containing the media family) assigned\
    \ to a tape volume; the file number is the number of the backup image on the tape\
    \ volume. Both the catalog-based restore and raw restore are performed using the\
    \ obtool utility, whereas the obtar commands are issued at the OS prompt.\n\n\
    Performing Catalog-Based Restore\n\nFora catalog-based restore, you can browse\
    \ the OSB catalog to determine and verify the files you want to restore. In the\
    \ following example, you want to restore the file /home/oracle/scripts/rmanbkup.sh,\
    \ of the client host BLLNX1\\. To restore the files using the OSB catalog, perform\
    \ the following steps:\n\n1.  Set the host variable to BLLNX1, which is the source\
    \ host.\n\n    ```\n    ob> set host BLLNX1\n    ```\n\n2.  Issue the cd command\
    \ to navigate to the directory.\n\n    ```\n    ob> cd /home/oracle/scripts\n\
    \    ```\n\n3.  Issue the ls command to verify the files in the directory.\n\n\
    \    ```\n    ob> ls -l rmanbkup.sh\n    -rwxr-xr-x   oracle.oinstall  782      2010/01/13.18:14\
    \ rmanbkup.sh        (0)\n    ```\n\n4.  Issue the restore command.\n\n    ```\n\
    \    ob> restore '/home/oracle/scripts/rmanbkup.sh' --go\n    ```\n\nFor details\
    \ on monitoring a restore job, see the section “OSB Job Monitoring,” later in\
    \ this chapter.\n\nPerforming a Raw Restore\n\nTo restore data using the raw restore,\
    \ you must know where to extract the data from; you must provide the file’s volume\
    \ ID and file number (you know that backups use a particular media family, which\
    \ can make the search a bit easier).\n\nHere, you are going to restore the file\
    \ /home/oracle/scripts/rmanbkup.sh from a tape volume that has the media family\
    \ APRESS_OS.\n\n1.  Issue the l svol command with the -contents option, to display\
    \ the contents of the volumes associated with the media family APRESS_OS:\n\n\
    \    ```\n    ob> lsvol --contents --family APRESS_OS --nobarcode\n    VOID    OOID\
    \ Seq Volume ID          Family      Created     Attributes\n    2845    2845  \
    \ 1 APRESS_OS-000001   APRESS_OS   10/21.04:41 open; closes 10/28.04:41\n            BSOID  File\
    \ Sect  Level  Host                  Size Created     Attributes\n            31250    \
    \ 1 1         0  BLLNX1            208.6 MB 10/21.04:41\n            31258    \
    \ 2 1         0  BLLNX1            208.8 MB 10/21.06:04\n            31260    \
    \ 3 1         0  BLLNX1            210.1 MB 10/21.12:23\n            31261    \
    \ 4 1         0  BLLNX1            210.1 MB 10/21.12:34\n    ```\n\n2.  According\
    \ to the output shown, you want to restore from a backup taken on 10/21.06:04\
    \ (i.e., October 21, at 6:04 am). The corresponding file number is 2, and the\
    \ volume ID is APRESS_OS-000001\\. Issue the following restore command. The -R\
    \ option indicates a raw restore operation and does not use an OSB catalog, whereas\
    \ the –F option means the file number, and the –v option means the volume ID.\n\
    \n    ```\n    ob> restore -R -F 2 -v APRESS_OS-000001 /home/oracle/scripts/rmanbkup.sh\
    \ --go\n    ```\n\nFor discussion on monitoring the restore job you have submitted,\
    \ see the section “OSB Job Monitoring section” later in this chapter.\n\nPerforming\
    \ an obtar Restore\n\nWhen you run the OSB restores, they are actually translated\
    \ to obtar commands in the background. The obtar commands are issued at the OS\
    \ level. The obtar command is seldom used to perform restore operations, as you\
    \ need to give the volume ID and file number, which are not readily available,\
    \ especially if you have no access to the OSB catalog.\n\nIn the following example,\
    \ let’s assume that the file you want to restore, /home/oracle/scripts/rmanbkup.sh,\
    \ is in a tape that has the volume ID Home-MF-000098\\. If you didn’t know the\
    \ specific volume ID), you would have to repeat steps 1–3 until you could confirm\
    \ that the file you wanted to restore was in that particular volume ID.\n\n1.\
    \  Issue the loadvol command to load manually the tape that has the volume ID\
    \ Home-MF-000098 to an available tape drive. Here, I am using the tape drive vdrive8.\n\
    \n    ```\n    ob> loadvol -D vdrive8 --volume Home-MF-000098\n    ```\n\n2. \
    \ Run the obtar –zz to display all OSB labels on the volume ID Host_Home-MF-000098\\\
    . Identify the file number for the corresponding date and time of the backup that\
    \ you want to extract from. In this example the volume ID is Host_Home-MF-000098,\
    \ and the file number is 1, which you will use in the next step.\n\n    ```\n\
    \    # obtar -zzvf vdrive8 -e Host_Home-MF-000098\n    Volume label:\n        Volume\
    \ tag:         2ed9dbd024ce10397df0004e238fbd3\n        Volume UUID:        dd56f352-5028-1030-a8f5-0004e238fbd3\n\
    \        Volume ID:          Host_Home-MF-000098\n        Volume sequence:    1\n\
    \        Volume set owner:   root\n        Volume set created: Sun Feb 03 02:11:00\
    \ 2013\n        Volume set closes:  Sun Feb 10 02:11:00 2013 (no writes after\
    \ this time)\n        Volume set expires: Sun Feb 24 02:11:00 2013\n        Media\
    \ family:       Host_Home-MF (permanent)\n        Original UUID:      dd56f352-5028-1030-a8f5-0004e238fbd3\n\
    \n    Archive label:\n        File number:        1\n        File section:      \
    \ 1\n        Owner:              root\n        Client host:        BLLNX1\n  \
    \      Backup level:       0\n        S/w compression:    no\n        Archive\
    \ created:    Sun Feb 03 02:11:00 2013\n        Encryption:         on\n        Algorithm:          aes192\n\
    \    ```\n\n3.  To check whether /home/oracle/scripts/rmanbkup.sh is in file 1\
    \ in the tape volume ID Home-MF-000098, which is loaded in the vdrive8, issue\
    \ the obtar command with the -t option.\n\n    ```\n    $ obtar -t -f vdrive8\
    \ -F 1\n    ```\n\n4.  To perform the restore operation using the obtar command,\
    \ issue the following command with the -x option. The -F option means the file\
    \ number, and the -k option avoids overwriting the existing file.\n\n    ```\n\
    \    $ obtar -F 1 -x -f vdrive8 -k /home/oracle/scripts/rmanbkup.sh\n    ```\n\
    \n5.  Because you are restoring using the obtar command, which is executed at\
    \ the OS level, you can’t monitor the restore job using the obtool utility. However,\
    \ one way to verify whether the file is restored is to issue the ls OS command.\n\
    \n    ```\n    $ ls -l /home/oracle/scripts/rmanbkup.sh\n    ```\n\nOSB Job Monitoring\n\
    \nYou submitted a backup or restore operation for an Oracle database, using RMAN,\
    \ or for filesystem data, using Oracle Enterprise Manager, Oracle Secure Backup\
    \ web tool, or obtool utility, and you want to check whether the job is active,\
    \ pending, or completed. To check the status of an OSB job, issue the lsjob command\
    \ and the catxcr command to show the details about the operation of a job.\n\n\
    Listing Jobs\n\nTo display the jobs that are still running, issue the lsjob command\
    \ with the -active, or -a, option. For other job states, use the --complete, or\
    \ -c, option for completed jobs; --pending, or -p, for pending jobs; --inputrequest,\
    \ or -i, for jobs currently requesting input; and --all, or -A, to display all\
    \ jobs, regardless of the job state. For example, to list active jobs, issue this\
    \ command:\n\n```\nob> lsjob --active\n```\n\nFor RMAN jobs, use the --dbname,\
    \ or -d, option to limit the output for a specific Oracle database. If you know\
    \ the database ID, you can use the --dbid, or -I, option instead. This example\
    \ uses the dbname parameter:\n\n```\nob> lsjob --active --dbname MYDB\n```\n\n\
    In the following output the State column indicates that the job is still running.\
    \ Once the job is done without error, the State column displays completed successfully.\n\
    \n```\nJob ID           Sched time  Contents                       State\n----------------\
    \ ----------- ------------------------------ ---------------------------------------\n\
    rmansbt/380.1    none        incremental backup             running since 2013/02/25.08:54\n\
    ```\n\nFor filesystem jobs, use the --host, or -h, option to limit the output\
    \ for a specific client host, as follows:\n\n```\nob> lsjob --active --host BLLNX1\n\
    Job ID           Sched time  Contents                       State\n----------------\
    \ ----------- ------------------------------ ---------------------------------------\n\
    admin/134.1      none        backup BLLNX1                  running since 2013/02/25.09:04\n\
    ```\n\nTo monitor active jobs, use the lsjob command. If there are several active\
    \ jobs running, you can filter the output by providing the job ID. However, if\
    \ the job is already completed, you can use the same command, but you need to\
    \ remove the -a option and give the corresponding job ID. I usually run the lsjob\
    \ command with the following options:\n\n```\nob> lsjob -a -l -j -o -R -L -C\n\
    ```\n\nThe prior command displays detailed information on the status of the job.\
    \ Here is some sample output:\n\n```\nadmin/134:\n    Type:                  \
    \ dataset BLLnx1_home_bslopuz.ds\n    Level:                  full\n    Family:                \
    \ Host_Home-MF\n    Encryption:             off\n    Scheduled time:         none\n\
        Introduction time:      2013/02/25.09:04\n    Earliest exec time:     any\n\
        Last update time:       2013/02/25.09:04\n    Expire time:            never\n\
        State:                  processed; host backup(s) scheduled\n    Priority:              \
    \ 100\n    Privileged op:          no\n    Run on host:            (administrative\
    \ server)\n    Requires:               any device\n    Attempts:              \
