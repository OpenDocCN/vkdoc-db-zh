    CDB 环境中管理用户那样管理它们。


    公共用户是 Oracle Database 12c 中的一个新概念，仅适用于可插拔数据库环境。公共用户是存在于根容器和每个可插拔数据库中的用户。此类用户必须最初在根容器中创建，并且会自动在所有现有可插拔数据库以及未来创建的任何可插拔数据库中创建。


