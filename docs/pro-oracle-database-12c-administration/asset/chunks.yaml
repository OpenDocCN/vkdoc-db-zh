    Administrating Pluggable Databases


    You can perform many database administrative tasks while connected directly to
    the pluggable database. You can open/close a pluggable database, check its status,
    show currently connected users, and so on. You can administer a pluggable database
    as a privileged connection (such as SYS) to the root container, or you can perform
    tasks while connected as a privileged user directly to the pluggable database
    itself.


    Keep in mind that when you connect as SYS to a pluggable database within the CDB,
    you can only perform SYS-privileged operations for the pluggable database to which
    you are connected. You cannot start/stop the container instance or view data dictionary
    information related to other pluggable databases within the CDB.


    Connecting to a Pluggable Database


    You can connect to a pluggable database as SYS either locally or over the network.
    To make a local connection, first connect to the root container as SYS, then use
    the SET CONTAINER command to connect to the desired pluggable database:


    ```

    $ sqlplus / as sysdba

    SQL> alter session set container=salespdb;

    ```


    The prior connection doesn’t require a listener or password file; a connection
    over the network requires both. This next example makes a network connection via
    SQL*Plus and specifies the host, listener port, and service name of the pluggable
    database:


    ```

    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    ```


    If you’re unsure how to set up a listener and a password file, see [Chapter 2](#9781430257288_Ch02.xhtml).
    For instructions on how to register a pluggable database service name with the
    listener, see the next section.


    Managing a Listener in a Pluggable Database Environment


    Recall from [Chapter 2](#9781430257288_Ch02.xhtml) that a listener is the process
    that enables remote network connections to a database. Most database environments
    require a listener in order to operate. When a client attempts to connect to a
    remote database, the client provides three key pieces of information: the host
    the listener is on, the host port the listener is listening on, and a database
    service name.


    Each database has one or more service names assigned to it. By default there is
    usually one service name that is derived from the database unique name and domain.
    You can manually create one or more service names for a database. DBAs sometimes
    create more than one service so that resource usage can be controlled or monitored
    for each service. For example, a service may be created for a sales application,
    and a service may be created for the HR application. Each application connects
    to the database via its service name. The service connection information appears
    in the SERVICE_NAME column of the V$SESSION view for each session.


    If you start a default listener with no listener.ora file in place, the PMON background
    process will automatically register any databases (including any pluggable) as
    a service:


    ```

    $ lsnrctl start

    ```


    Eventually (after a minute or two), you should see the databases (including any
    pluggable) registered with the default listener.


    ![image](Images/sq.jpg) **Note**   When starting the listener, if there is a listener.ora
    file present, the listener will attempt to statically register any service names
    that appear in the listener.ora file.


    By default the pluggable databases are registered with a service name that is
    the same as the pluggable database name. The default service is typically the
    one that you would use to make SYS connections:'
