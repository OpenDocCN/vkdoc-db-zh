  raw: '*   One root container, named CDB$ROOT. The root contains the master set of
    data dictionary views, which have metadata regarding the root as well as every
    child pluggable database within the CDB.

    *   One static seed container, named PDB$SEED. This container exists solely as
    a template for providing data files and metadata used to create new pluggable
    databases within the CDB.

    *   Zero, or one or more, pluggable databases (with a maximum of 252). Each pluggable
    database is self-contained and functions like an isolated non-CDB database. Additionally,
    each pluggable database contains its own data files and application objects (users,
    tables, indexes and so on). When connected to a pluggable database, there is no
    visibility to the root container or any other pluggable databases present within
    the CDB.


    New with Oracle Database 12c there is a CDB level of data dictionary views that
    overarch the DBA/ALL/USER-level views. The CDB-level views report across all containers
    (root, seed, and all pluggable databases) in a CDB. For instance, if you wanted
    to view all users within a CDB database, you would do so from the root container,
    by querying CDB_USERS. If you’re not using a CDB, then DBA_USERS is still an accurate
    view for reporting all user information. Many of the data dictionary views now
    contain a new column, named CON_ID, that is a unique identifier for each container
    within the CDB. The root container has a CON_ID of 1\. The seed has a CON_ID of
    2\. Each new pluggable database created within the CDB is assigned a unique sequential
    container ID.


    [Table 23-1](#9781430257288_Ch23.xhtml#Tab1) defines terms used in a pluggable
    database environment. Refer back to this table as you read through this chapter.


    [Table 23-1.](#9781430257288_Ch23.xhtml#_Tab1) Summary of Pluggable Database Terms


    | Term | Meaning |

    | --- | --- |

    | Container database (CDB), multitenant database | A database capable of housing
    one or more pluggable databases |

    | Pluggable database, (PDB) | A set of data files and metadata that can be seamlessly
    transferred from one CDB to another |

    | Root container | A master set of data files and metadata containing information
    regarding all containers within a CDB. The root container is named CDB$ROOT. |

    | Container | A collection of data files and metadata. Can be root, seed, or a
    pluggable database. |

    | Seed pluggable database | A template of data files and metadata used to create
    new pluggable databases. The seed pluggable database is named PDB$SEED. |

    | Plugging | Associating the metadata and data files of a pluggable database with
    a CDB |

    | Unplugging | Disassociating the metadata and data files of a pluggable database
    from a CDB |

    | Cloning | Creating a pluggable database from a copy of another database (seed,
    PDB, or non-CDB) |

    | CON_ID | A unique identifier for each container within a CDB. The CDB-level
    views contain a CON_ID column that identifies the container with which the information
    being viewed is associated. |

    | CDB data dictionary views | Views that contain metadata regarding all pluggable
    databases within a CDB. These views only display meaningful information when queried
    via a privileged connection from the root container. The pluggable databases must
    be open for use. |

    | non-CDB database | An Oracle database created without the pluggable database
    feature enabled (the only type of database that was available prior to 12c) |


    The goal of this chapter is to make you proficient in administering a container/pluggable
    database environment. By the end of this chapter, you should understand how to
    create a pluggable environment, provision pluggable databases, connect and navigate
    within a pluggable database, and transfer pluggable databases from one CDB to
    another. The foundation for this starts with understanding the pluggable architecture.


    ![image](Images/sq.jpg) **Note**   Oracle Multitenant is an extra cost option
    available with the Enterprise Edition. However, it is available for use with one
    pluggable database for all editions. Check the Oracle licensing guide for details.


    Understanding Pluggable Architecture


    Pluggable databases have some important architectural differences with a non-CDB
    database environment. [Figure 23-1](#9781430257288_Ch23.xhtml#Fig1) displays a
    container database, named CDB, that contains a root container, a seed database,
    and two pluggable databases, named SALESPDB and HRPDB.


