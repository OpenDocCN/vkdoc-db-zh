    SYS（在所有数据库中拥有所有特权）这样的账户。在这种情况下，你将创建一个公共 DBA 用户，并创建一个包含适当特权的 DBA 公共角色。然后，该公共角色将被分配给公共
    DBA。


    # 创建公共角色


    就像你可以创建一个跨越所有可插拔数据库的公共用户一样，你也可以以相同的方式创建一个公共角色。公共角色提供了一个单一对象，你可以向其授予在根容器关联的所有可插拔数据库中生效的特权。


    公共角色在根容器中创建，并自动在所有关联的可插拔数据库以及未来创建的任何可插拔数据库中创建。与公共用户一样，公共角色必须以 `C##` 或 `c##` 字符串开头；例如，


    ```

    $ sqlplus / as sysdba

    SQL> create role c##dbaprivs container = all;

    ```


    接下来，你可以根据需要向公共角色分配特权。这里，将 `DBA` 角色分配给先前创建的角色：


    ```

    SQL> grant dba to c##dbaprivs container = all;

    ```


    现在，如果你将此公共角色分配给公共用户，则当该公共用户连接到与根容器关联的任何可插拔数据库时，与该角色关联的特权将生效：


    ```

    SQL> grant c##dbaprivs to c##dba container = all;

    ```


    # 报告容器空间'
- fmt: "# Oracle CDB管理与操作指南\n\n## 报告所有容器信息\n\n要在CDB中报告所有容器（根容器、种子容器及所有可插拔数据库）的信息，必须遵循以下步骤：\n\
    \n1.  以具有查看CDB级别视图权限的用户身份连接到根容器。\n2.  确保你的查询在适当位置使用了CDB级别视图。\n3.  确保你希望报告的所有可插拔数据库都处于打开状态。如果可插拔数据库未打开，则不会显示任何信息。\n\
    \n以下查询使用CDB级别视图，报告CDB内所有容器的基本空间使用情况信息：\n\n```sql\nSET LINES 132 PAGES 100\nCOL\
    \ con_name        FORM A15 HEAD \"Container|Name\"\nCOL tablespace_name FORM A15\n\
    COL fsm             FORM 999,999,999,999 HEAD \"Free|Space Meg.\"\nCOL apm   \
    \          FORM 999,999,999,999 HEAD \"Alloc|Space Meg.\"\n--\nCOMPUTE SUM OF\
    \ fsm apm ON REPORT\nBREAK ON REPORT ON con_id ON con_name ON tablespace_name\n\
    --\nWITH x AS (SELECT c1.con_id, cf1.tablespace_name, SUM(cf1.bytes)/1024/1024\
    \ fsm\n           FROM cdb_free_space cf1\n               ,v$containers   c1\n\
    \           WHERE cf1.con_id = c1.con_id\n           GROUP BY c1.con_id, cf1.tablespace_name),\n\
    \     y AS (SELECT c2.con_id, cd.tablespace_name, SUM(cd.bytes)/1024/1024 apm\n\
    \           FROM cdb_data_files cd\n               ,v$containers   c2\n      \
    \     WHERE cd.con_id = c2.con_id\n           GROUP BY c2.con_id\n           \
    \        ,cd.tablespace_name)\nSELECT x.con_id, v.name con_name, x.tablespace_name,\
    \ x.fsm, y.apm\nFROM x, y, v$containers v\nWHERE x.con_id          = y.con_id\n\
    AND   x.tablespace_name = y.tablespace_name\nAND   v.con_id          = y.con_id\n\
    UNION\nSELECT vc2.con_id, vc2.name, tf.tablespace_name, null, SUM(tf.bytes)/1024/1024\n\
    FROM v$containers vc2, cdb_temp_files tf\nWHERE vc2.con_id  = tf.con_id\nGROUP\
    \ BY vc2.con_id, vc2.name, tf.tablespace_name\nORDER BY 1, 2;\n```\n\n以下是一些示例输出：\n\
    \n```sql\n           Container                                           Free\
    \            Alloc\n    CON_ID Name            TABLESPACE_NAME       Space Meg.\
    \       Space Meg.\n---------- --------------- --------------- ----------------\
    \ ----------------\n         1 CDB$ROOT        SYSAUX                        42\
    \              780\n                           SYSTEM                        \
    \ 7              790\n                           TEMP                        \
    \                  88\n                           UNDOTBS1                   \
    \  206              230\n                           USERS                    \
    \      4                5\n         2 PDB$SEED        SYSAUX                 \
    \        2              640\n                           SYSTEM               \
    \          5              260\n                           TEMP               \
    \                           87\n********** *************** *************** ----------------\
    \ ----------------\nsum                                                     266\
    \            2,880\n```\n\n在尝试查询CDB级别视图之前，请确保你想要报告的可插拔数据库已打开。如果可插拔数据库未打开，它将不会出现在报告输出中。作为参考，以下是再次打开所有可插拔数据库的语句：\n\
    \n```sql\nSQL> alter pluggable database all open;\n```\n\n> **提示**：报告单个可插拔数据库的表空间和数据文件使用情况，与报告非CDB数据库中的空间使用情况没有显著差异。首先，以具有从DBA级别视图选择权限的用户身份直接连接到可插拔数据库。然后，运行一个查询空间相关视图的报告。有关报告非CDB空间使用情况的查询，请参见[第4章](#9781430257288_Ch04.xhtml)。\n\
    \n## 切换容器\n\n一旦你以普通用户（如`SYS`）身份连接到数据库中的任何容器（根容器或可插拔数据库），就可以使用`ALTER SESSION`命令切换到另一个你已被授权访问的容器。例如，要将当前容器设置为名为`SALESPDB`的可插拔数据库，操作如下：\n\
    \n```sql\nSQL> alter session set container = salespdb;\n```\n\n你可以通过指定`CDB$ROOT`切换回根容器：\n\
    \n```sql\nSQL> alter session set container = cdb$root;\n```\n\n切换容器不需要启动监听器或密码文件。只要普通用户拥有权限，用户就能成功切换到新的容器上下文中。当你需要连接到可插拔数据库以排查问题，然后再连接回根容器时，切换容器的功能尤其有用。\n\
    \n## 在CDB中创建可插拔数据库\n\n创建CDB后，就可以开始在其中创建可插拔数据库。当你指示Oracle创建可插拔数据库时，其内部过程实际上是复制现有数据库（种子数据库、可插拔数据库或非CDB）的数据文件，然后使用新可插拔数据库的元数据实例化CDB。关键是要正确指定你希望Oracle用作创建新可插拔数据库模板的数据库。\n\
    \n有几种工具可用于创建（克隆）可插拔数据库：即`CREATE PLUGGABLE DATABASE` SQL语句、`DBCA`实用程序和Enterprise\
    \ Manager Cloud Control。本章重点介绍使用SQL和`DBCA`实用程序。如果你理解了如何使用SQL和`DBCA`创建可插拔数据库，你应该就能轻松地使用Enterprise\
    \ Manager界面来实现相同的目标。\n\n使用`CREATE PLUGGABLE DATABASE`语句，你可以使用以下任何源来创建可插拔数据库：\n\
    \n*   种子数据库\n*   现有的可插拔数据库（本地或远程）\n*   非CDB数据库\n*   已拔出的可插拔数据库\n\n使用`DBCA`，你可以从以下任何源创建可插拔数据库：\n\
    \n*   种子数据库\n*   `RMAN`备份\n*   已拔出的可插拔数据库\n\n以下各节将介绍所有使用`CREATE PLUGGABLE DATABASE`变体来创建可插拔数据库的方法。对于`DBCA`，我只展示如何从种子数据库创建可插拔数据库。你应该能够修改该示例以满足你的各种需求。\n\
    \n### 克隆种子数据库\n\n`CREATE PLUGGABLE DATABASE`语句可用于通过复制种子数据库的数据文件来创建可插拔数据库。为此，首先以`SYS`用户身份连接到根容器数据库：\n\
    \n```bash\n$ sqlplus / as sysdba\n```\n\n以下SQL语句创建了一个名为`SALESPDB`的可插拔数据库：\n\n\
    ```sql\nCREATE PLUGGABLE DATABASE salespdb\nADMIN USER salesadm IDENTIFIED BY\
    \ foo\nFILE_NAME_CONVERT = ('/u01/app/oracle/oradata/CDB/pdbseed',\n         \
    \            '/u01/app/oracle/oradata/CDB/salespdb');\n```\n\n运行上述代码后，你应该会看到类似以下的输出：\n\
    \n```\nPluggable database created.\n```\n\n> **注意**：如果你使用的是`OMF`，则在创建可插拔数据库时不需要指定`FILE_NAME_CONVERT`子句，因为Oracle会自动确定可插拔数据库数据文件的名称和位置。\n\
    \n请注意，此示例中的`FILE_NAME_CONVERT`子句包含两个字符串。一个指定种子数据库数据文件的位置：\n\n```\n/u01/app/oracle/oradata/CDB/pdbseed\n\
    ```\n\n第二个字符串是你希望创建新可插拔数据库数据文件的位置：\n\n```\n/u01/app/oracle/oradata/CDB/salespdb\n\
    ```\n\n你需要将这些字符串修改为适合你环境的值。\n\n使用`CREATE PLUGGABLE DATABASE`语句创建可插拔数据库时，有几个可用的选项。[表23-2](#9781430257288_Ch23.xhtml#Tab2)总结了各种子句的含义。\n\
    \n[表23-2.](#9781430257288_Ch23.xhtml#_Tab2) 可插拔数据库创建选项"
  raw: 'To report on all containers (root, seed, and all pluggable databases) within
    a CDB, you must follow this procedure:


    *   Connect to the root container as a user with privileges to view the CDB-level
    views.

    *   Make sure your query uses the CDB-level views where appropriate.

    *   Ensure that any pluggable databases you wish to report on are open. If the
    pluggable databases are not open, then no information will be displayed.


    Here is a query that uses the CDB-level views to report basic space usage information
    relating to all containers within a CDB:


    ```

    SET LINES 132 PAGES 100

    COL con_name        FORM A15 HEAD "Container|Name"

    COL tablespace_name FORM A15

    COL fsm             FORM 999,999,999,999 HEAD "Free|Space Meg."

    COL apm             FORM 999,999,999,999 HEAD "Alloc|Space Meg."

    --

    COMPUTE SUM OF fsm apm ON REPORT

    BREAK ON REPORT ON con_id ON con_name ON tablespace_name

    --

    WITH x AS (SELECT c1.con_id, cf1.tablespace_name, SUM(cf1.bytes)/1024/1024 fsm

               FROM cdb_free_space cf1

                   ,v$containers   c1

               WHERE cf1.con_id = c1.con_id

               GROUP BY c1.con_id, cf1.tablespace_name),

         y AS (SELECT c2.con_id, cd.tablespace_name, SUM(cd.bytes)/1024/1024 apm

               FROM cdb_data_files cd

                   ,v$containers   c2

               WHERE cd.con_id = c2.con_id

               GROUP BY c2.con_id

                       ,cd.tablespace_name)

    SELECT x.con_id, v.name con_name, x.tablespace_name, x.fsm, y.apm

    FROM x, y, v$containers v

    WHERE x.con_id          = y.con_id

    AND   x.tablespace_name = y.tablespace_name

    AND   v.con_id          = y.con_id

    UNION

    SELECT vc2.con_id, vc2.name, tf.tablespace_name, null, SUM(tf.bytes)/1024/1024

    FROM v$containers vc2, cdb_temp_files tf

    WHERE vc2.con_id  = tf.con_id

    GROUP BY vc2.con_id, vc2.name, tf.tablespace_name

    ORDER BY 1, 2;

    ```


    Here is some sample output:


    ```

               Container                                   Free            Alloc

        CON_ID Name            TABLESPACE_NAME       Space Meg.       Space Meg.

    ---------- --------------- --------------- ---------------- ----------------

             1 CDB$ROOT        SYSAUX                        42              780

                               SYSTEM                         7              790

                               TEMP                                           88

                               UNDOTBS1                     206              230

                               USERS                          4                5

             2 PDB$SEED        SYSAUX                         2              640

                               SYSTEM                         5              260

                               TEMP                                           87

    ********** *************** *************** ---------------- ----------------

    sum                                                     266            2,880

    ```


    Make sure any pluggable databases you want to report on are open before attempting
    to query the CDB-level views. If a pluggable database is not open, it won’t appear
    in the report output. For reference, here’s the statement again to open all pluggable
    databases:


    ```

    SQL> alter pluggable database all open;

    ```


    ![image](Images/sq.jpg) **Tip**   Reporting on tablespace and data file usage
    for an individual pluggable database isn’t significantly different from reporting
    on the space in a non-CDB database. First, connect directly to the pluggable database
    as a user that has privileges to select from the DBA-level views. Then, run a
    report that queries the space-related views. See [Chapter 4](#9781430257288_Ch04.xhtml)
    for a query for reporting on space usage in a non-CDB.


    Switching Containers


    Once you connect as a common user (such as SYS) to any container within the database
    (either the root or a pluggable database), you can use the ALTER SESSION command
    to switch to another container for which you have been granted access. For example,
    to set the current container to a pluggable database named SALESPDB, you would
    do as follows:


    ```

    SQL> alter session set container = salespdb;

    ```


    You can switch back to the root container by specifying the CDB$ROOT:


    ```

    SQL> alter session set container = cdb$root;

    ```


    You don’t need a listener to be up and running or a password file to switch containers.
    As long as the common user has privileges, then the user is successfully switched
    to the new container context. Having the ability to switch containers is especially
    useful when you need to connect to a pluggable database to troubleshoot issues
    and then connect back to the root container.


    Creating a Pluggable Database within a CDB


    After you’ve created a CDB, you can start creating pluggable databases within
    it. When you instruct Oracle to create a pluggable database, under the covers,
    it is actually copying data files from an existing database (seed, pluggable database,
    or non-CDB) and then instantiating the CDB with the new pluggable database’s metadata.
    The key here is to correctly reference what database you want Oracle to use as
    a template for creating the new pluggable database.


    There are several tools for creating (cloning) a pluggable database; namely the
    CREATE PLUGGABLE DATABASE SQL statement, the DBCA utility, and Enterprise Manager
    Cloud Control. This chapter focuses on using SQL and the DBCA utilities. If you
    understand how to create pluggable databases using SQL and DBCA, you should easily
    be able to use the Enterprise Manager screens to achieve the same objectives.


    With the CREATE PLUGGABLE DATABASE statement, you can use any of the following
    sources to create a pluggable database:


    *   Seed database

    *   Existing pluggable database (either local or remote)

    *   Non-CDB database

    *   Unplugged pluggable database


    With the DBCA, you can create a pluggable database from any of the following sources:


    *   Seed database

    *   RMAN backup

    *   Unplugged pluggable database


    In the following sections, all the CREATE PLUGGABLE DATABASE variants of creating
    a pluggable database are covered. With the DBCA, I only show how to create a pluggable
    database from the seed database. You should be able to modify that example for
    your various needs.


    Cloning the Seed Database


    The CREATE PLUGGABLE DATASE statement can be used to create a pluggable database
    by copying the seed database’s data files. To do this, first connect to the root
    container database as the SYS user:


    ```

    $ sqlplus / as sysdba

    ```


    The following SQL statement creates a pluggable database named SALESPDB:


    ```

    CREATE PLUGGABLE DATABASE salespdb

    ADMIN USER salesadm IDENTIFIED BY foo

    FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/pdbseed'',

                         ''/u01/app/oracle/oradata/CDB/salespdb'');

    ```


    After running the prior code, you should see some output similar to this:


    ```

    Pluggable database created.

    ```


    ![image](Images/sq.jpg) **Note**   If you’re using OMF, you don’t need to specify
    the FILE_NAME_CONVERT clause when creating a pluggable database, because Oracle
    automatically determines the names and locations of the pluggable database data
    files.


    Note that the FILE_NAME_CONVERT clause in this example has two strings. One specifies
    the location of the seed database data files:


    ```

    /u01/app/oracle/oradata/CDB/pdbseed

    ```


    The second string is the location where you want the new pluggable database’s
    data files created:


    ```

    /u01/app/oracle/oradata/CDB/salespdb

    ```


    You’ll have to modify these strings to the appropriate values for your environment.


    There are several options available when using the CREATE PLUGGABLE DATABASE statement
    to create a pluggable database. [Table 23-2](#9781430257288_Ch23.xhtml#Tab2) summarizes
    the meanings of the various clauses.


    [Table 23-2.](#9781430257288_Ch23.xhtml#_Tab2) Pluggable Database Creation Options'
