    \ snapshot too old`错误的次数。如果此列报告非零值，您需要执行以下一项或多项任务。"
  raw: '```

    set lines 80

    col blkg_user form a10

    col blkg_machine form a10

    col blkg_sid form 99999999

    col wait_user form a10

    col wait_machine form a10

    col wait_sid form 9999999

    col obj_own form a10

    col obj_name form a10

    col blkg_sql form a50

    col wait_sql form a50

    --

    select

     s1.username    blkg_user, s1.machine     blkg_machine

    ,s1.sid         blkg_sid, s1.serial#     blkg_serialnum

    ,s1.process     blkg_OS_PID

    ,substr(b1.sql_text,1,50) blkg_sql

    ,chr(10)

    ,s2.username    wait_user, s2.machine     wait_machine

    ,s2.sid         wait_sid, s2.serial#     wait_serialnum

    ,s2.process     wait_OS_PID

    ,substr(w1.sql_text,1,50) wait_sql

    ,lo.object_id   blkd_obj_id

    ,do.owner       obj_own, do.object_name obj_name

    from v$lock          l1

        ,v$session       s1

        ,v$lock          l2

        ,v$session       s2

        ,v$locked_object lo

        ,v$sqlarea       b1

        ,v$sqlarea       w1

        ,dba_objects     do

    where s1.sid = l1.sid

    and s2.sid = l2.sid

    and l1.id1 = l2.id1

    and s1.sid = lo.session_id

    and lo.object_id = do.object_id

    and l1.block = 1

    and s1.prev_sql_addr = b1.address

    and s2.sql_address = w1.address

    and l2.request > 0;

    ```


    The output from this query does not fit well on one page. When running this query,
    you will have to format it so that it on your screen. Here is some sample output,
    indicating that the SALES table is locked and that another process is waiting
    for the lock to be released:


    ```

    BLKG_USER  BLKG_MACHI  BLKG_SID BLKG_SERIALNUM BLKG_OS_PID

    ---------- ---------- --------- -------------- ------------------------

    BLKG_SQL                                           C WAIT_USER  WAIT_MACHI

    -------------------------------------------------- - ---------- ----------

    WAIT_SID WAIT_SERIALNUM WAIT_OS_PID

    -------- -------------- ------------------------

    WAIT_SQL                                           BLKD_OBJ_ID OBJ_OWN

    -------------------------------------------------- ----------- ----------

    OBJ_NAME


    MV_MAINT   speed2            32            487 26216

    update sales set sales_amt=100 where sales_id=1      MV_MAINT   speed2

         116            319 25851

    ```


    This situation is typical when applications don’t explicitly issue a COMMIT or
    ROLLBACK at appropriate times in the code. This leaves a lock on a row and prevents
    a transaction from continuing until the lock is released. In this scenario, you
    can try to locate the user that is blocking the transaction and see if the user
    needs to click a button that says something like “Commit your changes.” If that’s
    not possible, you can manually kill one of the sessions. Keep in mind that terminating
    a session may have unforeseen effects (such as rolling back data that a user thought
    was committed).


    If you decide to kill one of the user sessions, you need to identify the SID and
    serial number of the session you want to terminate. Once identified, use the A
    LTER SYSTEM KILL SESSION statement to terminate the session:


    ```

    SQL> alter system kill session ''32,487'';

    ```


    Again, be careful when killing sessions. Ensure that you know the impact of killing
    a session and thereby rolling back any active transactions currently open in that
    session.


    The other way to kill a session is to use an OS command such as kill. In the prior
    output, you can identify the OS processes from the BLKG_OS_PID and WAIT_OS_PID
    columns. Before you terminate a process from the OS, ensure that the process isn’t
    critical. For this example, to terminate the blocking OS process, first check
    the blocking PID:


    ```

    $ ps -ef | grep 26216

    ```


    Here is some sample output:


    ```

    oracle   26222 26216  0 16:49 ?        00:00:00 oracleo12c

    ```


    Next, use the kill command, as shown:


    ```

    $ kill -9  26216

    ```


    The kill command will unceremoniously terminate a process. Any open transactions
    associated with the process will be rolled back by the Oracle process monitor.


    Resolving Open-Cursor Issues


    The OPEN_CURSORS initialization parameter determines the maximum number of cursors
    a session can have open. This setting is per session. The default value of 50
    is usually too low for any application. When an application exceeds the number
    of open cursors allowed, the following error is thrown:


    ```

    ORA-01000: maximum open cursors exceeded

    ```


    Usually, the prior error is encountered when


    *   O PEN_CURSORS initialization parameter is set too low

    *   developers write code that doesn’t close cursors properly


    To investigate this issue, first determine the current setting of the parameter:


    ```

    SQL> show parameter open_cursors;

    ```


    If the value is less than 300, consider setting it higher. I typically set this
    value to 1,000 for busy OLTP systems. You can dynamically modify the value while
    your database is open, as shown:


    ```

    SQL> alter system set open_cursors=1000;

    ```


    If you’re using an spfile, consider making the change both in memory and in the
    spfile, at the same time:


    ```

    SQL> alter system set open_cursors=1000 scope=both;

    ```


    After setting O PEN_CURSORS to a higher value, if the application continues to
    exceed the maximum value, you probably have an issue with code that is not properly
    closing cursors.


    If you work in an environment that has thousands of connections to the database,
    you may want to view only the top cursor-consuming sessions. The following query
    uses an inline view and the pseudocolumn R OWNUM to display the top 20 values:


    ```

    select * from (

    select a.value, c.username, c.machine, c.sid, c.serial#

    from v$sesstat  a

        ,v$statname b

        ,v$session  c

    where a.statistic# = b.statistic#

    and   c.sid        = a.sid

    and   b.name       = ''opened cursors current''

    and   a.value     != 0

    and   c.username IS NOT NULL

    order by 1 desc,2)

    where rownum < 21;

    ```


    If a single session has more than 1,000 open cursors, then the code is probably
    written such that the cursors aren’t closing. When the limit is reached, somebody
    should inspect the application code to determine if a cursor is not being closed.


    ![image](Images/sq.jpg) **Tip**   I recommend that you query V$SESSION instead
    of V$OPEN_CURSOR to determine the number of open cursors. V$SESSION provides a
    more accurate count of the cursors currently open.


    Troubleshooting Undo Tablespace Issues


    Problems with the undo tablespace are usually of the following nature:


    *   ORA-01555: snapshot too old

    *   ORA-30036: unable to extend segment by ... in undo tablespace ''UNDOTBS1''


    The prior errors can be caused by many different issues, such as incorrect sizing
    of the undo tablespace or poorly written SQL or PL/SQL code.


    Determining if Undo Is Correctly Sized


    Suppose you have a long-running SQL statement that is throwing an ORA-01555: snapshot
    too old error, and you want to determine if adding space to the undo tablespace
    might help alleviate the issue. Run this next query to identify potential issues
    with your undo tablespace. The query checks for issues that have occurred within
    the last day:


    ```

    select to_char(begin_time,''MM-DD-YYYY HH24:MI'') begin_time

    ,ssolderrcnt    ORA_01555_cnt, nospaceerrcnt  no_space_cnt

    ,txncount       max_num_txns, maxquerylen    max_query_len

    ,expiredblks    blck_in_expired

    from v$undostat

    where begin_time > sysdate - 1

    order by begin_time;

    ```


    Here is some sample output. Part of the output has been omitted to fit this on
    the page:


    ```

    BEGIN_TIME       ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS BLCK_IN_EXPIRED

    ---------------- ------------- ------------ ------------ ---------------

    01-31-2013 08:21             0            0           51               0

    01-31-2013 08:31             0            0            0               0

    01-31-2013 12:11             0            0          629             256

    ```


    The ORA_01555_CNT column indicates the number of times your database has encountered
    the ORA-01555: snapshot too old error. If this column reports a nonzero value,
    you need to do one or more of the following tasks:'
  trans: "\n# 数据库故障排查：锁与资源争用\n\n## 锁查询\n\n以下 SQL 查询用于识别数据库中的锁和等待会话：\n```sql\nset lines\
