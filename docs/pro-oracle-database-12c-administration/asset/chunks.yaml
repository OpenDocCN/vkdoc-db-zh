    For the cumulative statistics the way to measure periodic usage is to note the
    value of a statistic at a starting point, then note the value again at a later
    point in time and capture the delta. This is the approach used by the Oracle performance
    utilities, such as AWR and Statspack. Periodically, Oracle will take snapshots
    of the dynamic wait interface views and store them in a repository.


    The following sections detail how to access AWR, ADDM, ASH, and Statspack via
    the SQL command line.


    ![image](Images/sq.jpg) **Tip**   You can access AWR, ADDM, and ASH from the Enterprise
    Manager. If you have access to the Enterprise ­Manager, you will find the interface
    fairly intuitive and visually helpful.


    Using AWR


    An AWR report is good for viewing the entire system’s performance and identifying
    the top resource-consuming SQL queries. Run the following script to generate an
    AWR report:


    ```

    SQL> @?/rdbms/admin/awrrpt

    ```


