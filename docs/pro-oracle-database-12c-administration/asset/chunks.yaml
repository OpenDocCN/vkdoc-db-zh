    Detecting and Resolving Locking Issues


    Sometimes, a developer or application user will report that a process that normally
    takes seconds to run is now taking several minutes and doesn’t appear to be doing
    anything. In these situations the problem is usually one of the following:


    *   Space-related issue (e.g., the archive redo destination is full and has suspended
    all transactions).

    *   A process has a lock on a table row and is not committing or rolling back,
    thus preventing another session from modifying the same row.


    In this scenario, I first check the alert.log to see if there are any obvious
    issues that have occurred recently (such as a tablespace’s not being able to allocate
    another extent). If there is nothing obvious in the alert.log file, I run an SQL
    query to look for locking issues. The query listed here is a more sophisticated
    version of the lock-detecting script introduced in [Chapter 3](#9781430257288_Ch03.xhtml).
    This query shows information such as the locking session SQL statement and the
    waiting SQL statement:'
