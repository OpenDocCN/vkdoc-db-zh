    restore database validate check logical;\n```\n\n对于大型数据库，验证过程可能需要大量时间（因为脚本会检查备份文件中的每个块是否存在损坏）。如果只想验证备份文件是否存在，请指定\
    \ `VALIDATE HEADER` 子句，如下所示：\n\n```bash\nrestore database validate header;\n```\n\
    \n此命令仅检查每个恢复和恢复所需文件的头部中是否包含有效信息。\n\n## 总结\n\n自动化例行数据库作业是成功的 `DBA` 的关键策略。自动化作业确保任务可重复且可验证，并在出现问题时能快速通知您。例如，`DBA`\
    \ 的工作在很大程度上取决于成功运行备份和确保数据库高可用性。本章包含多个脚本和示例，详细说明了如何按定义的频率运行例行作业。\n\nOracle 提供了\
    \ Oracle Scheduler 实用程序（通过 `DBMS_SCHEDULER` `PL/SQL` 包实现）来调度作业。此工具可用于自动化任何类型的数据库任务。您还可以基于系统事件或其他计划作业的成功/失败来启动作业。我更喜欢使用\
    \ `cron` 来调度数据库作业。但是，您可能有复杂的调度需求，需要使用 Oracle Scheduler 之类的工具。\n\n如果您是在 Linux/Unix\
    \ 环境中工作的 `DBA`，您应该熟悉 `cron` 实用程序。该调度器简单易用，几乎普遍可用。即使您当前的任务不使用 `cron`，您也肯定会在未来的工作环境中遇到它的使用。\n\
    \n在本书的这一点上，您已经学习了如何实现和执行 `DBA` 所需的许多任务。即使您只管理一个数据库，无疑您也卷入了大量的故障排除活动。下一章重点介绍诊断和解决\
    \ `DBA` 遇到的许多问题。\n\n# 第二十二章\n\n![image](img/frontdot.jpg)\n\n# 数据库故障排除\n\n*数据库故障排除*是一个模糊而笼统的术语，适用于广泛的主題。它可以指从调查数据库连接问题到详细的性能调优等任何内容。在本章中，我将涵盖以下故障排除活动：\n"
- fmt: '# 数据库故障排除与性能问题类型


    *   快速评估数据库可用性问题

    *   使用操作系统工具识别系统性能问题

    *   查询数据字典视图以显示资源密集型SQL语句

    *   使用Oracle性能工具识别消耗资源的SQL语句

    *   识别并解决锁问题

    *   故障排除打开游标（open-cursor）问题

    *   调查Undo和临时表空间问题


    以上列表并未涵盖您将遇到的所有类型的数据库故障排除和性能问题。它只是一个示例，列举了您可能遇到的一些常见数据库问题，并展示了解决这些问题的有用技术。


    ## 快速诊断


    当我接到报告数据库存在某些模糊性能问题的电话时，我会执行一些快速的常规检查，以确定是否真的存在问题。可能有一半的情况，结果发现是数据库以外的问题。无论如何，当有人（开发人员、用户、老板等）报告问题时，DBA必须做出响应，并确定是存在问题，还是问题出在系统的非数据库组件上。


    ![image](Images/sq.jpg) **提示**  请记住，您应该自动化执行诸如验证数据库可用性（有关自动化DBA任务的示例，请参见[第21章](#9781430257288_Ch21.xhtml)）等任务的作业。自动化作业有助于您主动处理问题，以免它们演变成数据库停机。


    ## 检查数据库可用性


    我首先执行的几项检查不需要登录到数据库服务器。相反，它们可以通过SQL*Plus和操作系统命令远程执行。事实上，我所有的初步检查都是通过网络远程进行的；这可以确定所有系统组件是否正常工作。


    一个快速的检查方法是，通过SQL*Plus客户端通过网络连接到远程数据库，以确定远程服务器是否可用、数据库是否启动、网络是否正常工作以及监听器是否正在接受传入连接。我通常会在所有数据库中创建一个标准的数据库帐户和密码，用于此类场景。以下是一个通过网络以`barts`用户身份（密码为`l1sa`）连接到远程数据库的示例；网络连接信息直接嵌入到连接字符串中（其中`dwdb1`是服务器，`1521`是端口，`dwrep1`是数据库服务名）：


    ```

    $ sqlplus barts/l1sa@''dwdb1:1521/dwrep1''

    ```


    如果可以建立连接，则表示远程服务器可用，数据库和监听器已启动并正在工作。此时，我会联系报告问题的人，查看连接问题是否与应用程序或数据库以外的其他东西有关。


    如果前面的SQL*Plus命令不起作用，请尝试确定远程服务器是否可用。在此示例中，向名为`dwdb1`的远程服务器发出`ping`命令：


    ```

    $ ping dwdb1

    ```


    如果`ping`成功，您应该会看到类似以下的输出：


    ```

    64 bytes from dwdb1 (192.168.254.215): icmp_seq=1 ttl=64 time=0.044 ms

    ```


    如果`ping`不起作用，则可能是网络或远程服务器存在问题。如果远程服务器不可用，我通常会尝试联系系统管理员或网络管理员。


    如果`ping`确实有效，那么我会检查远程服务器是否可以通过监听器正在监听的端口访问。我使用`telnet`命令来完成此操作：


    ```

    $ telnet IP <port>

    ```


    在此示例中，尝试通过服务器的IP地址在`1521`端口上建立网络连接：


    ```

    $ telnet 192.168.254.215 1521

    ```


    如果可以在指定端口上访问IP地址，您应该会在输出中看到“Connected to ...”之类的提示，如下所示：


    ```

    Trying 192.168.254.215...

    Connected to dwdb1.

    Escape character is ''^]''.

    ```


    如果`telnet`命令不起作用，我会联系系统管理员（SA）或网络管理员。


    如果`telnet`命令确实有效，并且可以通过指定端口连接到服务器，那么请使用`tnsping`命令通过Oracle Net测试与远程服务器和数据库的网络连接。此示例尝试联系`DWREP1`远程服务：


    ```

    $ tnsping DWREP1

    ```


    如果成功，输出应包含`OK`字符串，如下所示：


    ```

    Attempting to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST = DWDB1)

    (PORT = 1521)) (CONNECT_DATA = (SERVICE_NAME = DWREP1)))

    OK (20 msec)

    ```


    如果`tnsping`有效，则表示远程监听器已启动并正在工作。这并不一定意味着数据库已启动，因此您可能需要登录到数据库服务器以进行进一步调查。如果`tnsping`无效，则监听器或数据库已关闭或挂起。


    为了进一步调查问题，我会直接登录到服务器执行其他检查，例如检查某个挂载点是否已满。


    ### ORACLE即时客户端


    我与一些系统管理员和开发人员合作，他们有时需要测试到数据库的远程连接，但无法访问包含`sqlplus`可执行文件的Oracle安装。在这种情况下，我建议他们下载并使用Oracle
    Instant Client。它的占用空间非常小，只需几分钟即可安装。步骤如下：


    1.  从Oracle网站的技术网络区域下载Instant Client ([http://otn.oracle.com](http://otn.oracle.com))。

    2.  创建一个目录用于存储文件。

    3.  将文件解压缩到该目录。

    4.  设置`LD_LIBRARY_PATH`和`PATH`变量以包含文件解压缩到的目录。

    5.  使用简单连接语法连接到远程数据库：


    ```

    $ sqlplus user/pass@''host:port/database_service_name''

    ```


    此过程允许您访问`sqlplus`，而无需执行庞大且繁琐的Oracle安装。Instant Client适用于大多数硬件平台（Windows、Mac、Linux和Unix）。


    ## 调查磁盘空间满的问题


    要进一步诊断问题（例如磁盘空间不足），您需要直接登录到远程服务器。通常，您需要以Oracle软件的所有者（通常是`oracle`操作系统帐户）身份登录。首次登录到一台机器时，可能导致数据库挂起或出现问题的一个原因是挂载点已满。`df`命令与人类可读的`-h`开关有助于验证磁盘是否已满：


    ```

    $ df -h

    ```


    任何已满的挂载点都需要调查。如果包含`ORACLE_HOME`的挂载点已满，那么在连接到数据库时，您会收到类似以下的错误：


    ```

    Linux Error: 28: No space left on device

    ```


    要解决挂载点已满的问题，首先要确定可以移动或删除的文件。通常，我首先查找旧的跟踪文件；通常可以安全地删除一些旧文件。


    ## 定位告警日志和跟踪文件


    在Oracle Database 11g及更高版本中，默认的告警日志目录路径具有以下结构：


    ```

    ORACLE_BASE/diag/rdbms/LOWER(<db_unique_name>)/<instance_name>/trace

    ```


    ![image](Images/sq.jpg) **注意**  您可以通过设置`DIAGNOSTIC_DEST`初始化参数来覆盖告警日志的默认目录路径。


    通常，`db_unique_name`与`instance_name`相同。然而，在RAC和Data Guard环境中，`db_unique_name`通常与`instance_name`不同。您可以通过以下查询验证目录路径：


    ```

    SQL> select value from v$diag_info where name = ''Diag Trace'';

    ```


    告警日志的名称遵循以下格式：


    ```

    alert_<ORACLE_SID>.log

    ```


    您还可以通过以下操作系统命令（无论数据库是否已启动）从操作系统定位告警日志：


    ```

    $ cd $ORACLE_BASE

    $ find . -name alert_<ORACLE_SID>.log

    ```


    在前面的`find`命令中，您需要将`<ORACLE_SID>`值替换为您的数据库名称。'
  raw: '*   Assessing database availability issues quickly

    *   Identifying system performance issues with OS utilities

    *   Querying data dictionary views to display resource-intensive SQL statements

    *   Using Oracle performance tools to identify resource-consuming SQL statements

    *   Identifying and resolving locking issues

    *   Troubleshooting open-cursor issues

    *   Investigating issues with the undo and temporary tablespaces


    The prior list doesn’t encompass all the types of database troubleshooting and
    performance issues that you’ll encounter. Rather, it’s a sampling of the database
    problems that you’re likely to encounter and demonstrates useful techniques for
    resolving problems.


    Quickly Triaging


    When I get a call reporting some vague performance issues with a database, I perform
    a few quick standard checks to establish whether or not there are really problems.
    Probably half the time, it turns out to be something other than the database.
    Regardless, when somebody (developer, user, boss, and so on) reports an issue,
    the DBA must respond and determine if there is an issue or if the problem is with
    a nondatabase component of the system.


    ![image](Images/sq.jpg) **Tip**   Keep in mind that you should automate jobs that
    perform tasks such as verifying the database availability (see [Chapter 21](#9781430257288_Ch21.xhtml)
    for examples of automating DBA tasks). Automated jobs help you proactively handle
    issues so that they don’t turn into database downtime.


    Checking Database Availability


    The first few checks that I perform don’t require logging in to the database server.
    Rather, they can be performed remotely via SQL*Plus and OS commands. In fact,
    I perform all the initial checks remotely over the network; this establishes whether
    all the system components are working.


    One quick check to determine whether the remote server is available, the database
    is up, the network is working, and the listener is accepting incoming connections
    is to connect via an SQL*Plus client to the remote database over the network.
    I usually have a standard database account and password that I create in all databases
    for use in such scenarios. Here is an example of connecting over the network to
    a remote database as the barts user with a password of l1sa; the network connect
    information is embedded directly into the connect string (where dwdb1 is the server,
    1521 is the port, and dwrep1 is the database service name):


    ```

    $ sqlplus barts/l1sa@''dwdb1:1521/dwrep1''

    ```


    If a connection can be made, then the remote server is available, and the database
    and listener are up and working. At this point, I contact whomever reported a
    problem and see if the connectivity issue has to do with the application or with
    something other than the database.


    If the prior SQL*Plus command doesn’t work, try to establish whether the remote
    server is available. In this example, the p ing command is issued to the remote
    server, named dwdb1:


    ```

    $ ping dwdb1

    ```


    If ping works, you should see output such as this:


    ```

    64 bytes from dwdb1 (192.168.254.215): icmp_seq=1 ttl=64 time=0.044 ms

    ```


    If ping doesn’t work, there is probably an issue with either the network or the
    remote server. If the remote server isn’t available, I usually try to contact
    a system administrator or network administrator.


    If p ing does work, I then check to see if the remote server is reachable via
    the port that the listener is listening on. I use the t elnet command to accomplish
    this:


    ```

    $ telnet IP <port>

    ```


    In this example a network connection is attempted to the server’s IP address on
    the 1521 port:


    ```

    $ telnet 192.168.254.215 1521

    ```


    If the IP address is reachable on the specified port, you should see “Connected
    to . . .” in the output, like so:


    ```

    Trying 192.168.254.215...

    Connected to dwdb1.

    Escape character is ''^]''.

    ```


    If the t elnet command doesn’t work, I contact the SA or the network administrator.


    If the t elnet command does work, and there is network connectivity to the server
    on the specified port, then use the tnsping command to test network connectivity
    to the remote server and database, using Oracle Net. This example attempts to
    reach the DWREP1 remote service:


    ```

    $ tnsping DWREP1

    ```


    If successful, the output should contain the OK string, like so:


    ```

    Attempting to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST = DWDB1)

    (PORT = 1521)) (CONNECT_DATA = (SERVICE_NAME = DWREP1)))

    OK (20 msec)

    ```


    If t nsping works, it means that the remote listener is up and working. It doesn’t
    necessarily mean that the database is up, so you may need to log in to the database
    server to investigate further. If tnsping doesn’t work, then the listener or the
    database is down or hung.


    To further investigate issues, I log in directly to the server to perform additional
    checks, such as a mount point’s filling up.


    **ORACLE INSTANT CLIENT**


    I work with SAs and developers who sometimes need to test remote connectivity
    to a database but who don’t have access to an Oracle installation with the SQL*Plus
    executable. In these situations, I recommend that they download and use Oracle
    Instant Client. It has a very small footprint and takes just a few minutes to
    install. Here are the steps:


    1.  Download the Instant Client from the Technology Network area of the Oracle
    web site ([http://otn.oracle.com](http://otn.oracle.com)).

    2.  Create a directory for storing the files.

    3.  Unzip the files to that directory.

    4.  Set the LD_LIBRARY_PATH and PATH variables to include the directory to which
    the files were unzipped.

    5.  Connect to a remote database, using the easy connect syntax:


    $ sqlplus user/pass@''host:port/database_service_name''


    This process allows you to access SQL*Plus without having to perform a large and
    cumbersome Oracle install. Instant Client is available for most hardware platforms
    (Windows, Mac, Linux, and Unix).


    Investigating Disk Fullness


    To further diagnose issues (such as running low on disk space), you need to log
    in directly to the remote server. Typically, you will need to log in as the owner
    of the Oracle software (usually the oracle OS account). When first logging in
    to a box, one issue that will cause a database to hang or have problems is a full
    mount point. The df command with the human readable -h switch assists with verifying
    disk fullness:


    ```

    $ df -h

    ```


    Any mount point that is full needs to be investigated. If the mount point that
    contains ORACLE_HOME becomes full, then you’ll receive errors such as this when
    connecting to the database:


    ```

    Linux Error: 28: No space left on device

    ```


    To fix issues with a full mount point, first identify files that can be either
    moved or removed. Generally, I start by looking for old trace files; often, there
    are old files that can be safely removed.


    Locating the Alert Log and Trace Files


    In Oracle Database 11g and higher the default alert log directory path has this
    structure:


    ```

    ORACLE_BASE/diag/rdbms/LOWER(<db_unique_name>)/<instance_name>/trace

    ```


    ![image](Images/sq.jpg) **Note**   You can override the default directory path
    for the alert log by setting the DIAGNOSTIC_DEST initialization parameter.


    Usually, the db_unique_name is the same as the instance_name. In RAC and Data
    Guard environments, however, the db_unique_name is often different from the instance_name.
    You can verify the directory path with this query:


    ```

    SQL> select value from v$diag_info where name = ''Diag Trace'';

    ```


    The name of the alert log follows this format:


    ```

    alert_<ORACLE_SID>.log

    ```


    You can also locate the alert log from the OS (whether or not the database is
    started) via these OS commands:


    ```

    $ cd $ORACLE_BASE

    $ find . -name alert_<ORACLE_SID>.log

    ```


    In the prior find command, you’ll need to replace the <ORACLE_SID> value with
    the name of your database.'
