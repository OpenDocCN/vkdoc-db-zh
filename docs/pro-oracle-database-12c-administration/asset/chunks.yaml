    Pluggable Databases


    New with Oracle Database 12c is Oracle Multitenant. This feature allows you to
    create and maintain many pluggable databases within an overarching multitenant
    container database. Following is a concise introduction to pluggable terminology.


    A multitenant container database (CDB) is defined as a database capable of housing
    one or more pluggable databases. A container is defined as a collection of data
    files and metadata that exist within a CDB. A pluggable database is a special
    type of container that can be easily provisioned by cloning another database.
    If need be, a  pluggable database can also be transferred from one CDB to another.


    Every CDB contains a master set of data files and metadata known as the root container.
    Each CDB also contains a seed container, which is used as a template for creating
    other pluggable databases. Each CDB consists of one master root container, one
    seed container, and zero, or one or more, pluggable databases.


    A pluggable enabled CDB must be created with the ENABLE PLUGGABLE DATABASE clause.
    A database that was not created in this manner (a non-CDB) cannot contain pluggable
    databases. A non-CDB was the only type of database available prior to Oracle Database
    12c. Each CDB consists of the following elements:'
