- fmt: "# RMAN backups, dk: 01-jan-13, updated.\n\nIf you manage dozens of database\
    \ servers (each with its own cron table), with multiple DBAs, you’ll need some\
    \ mechanism (and it doesn’t have to be sophisticated) for tracking who made changes\
    \ and when.\n\n## Redirecting cron Output\n\nWhenever you run a Linux shell command,\
    \ by default the standard output (of the command) will be displayed on your screen.\
    \ Also, if any error messages are generated, they will, by default, be displayed\
    \ on your screen. You can use either `>` or `1>` (they are synonymous) to redirect\
    \ any standard output to an OS file. Additionally, you can use `2>` to redirect\
    \ any error messages to a file. The notation `2>&1` instructs the shell to send\
    \ any error messages to the same location as standard output.\n\nWhen you create\
    \ a cron job, you can use these redirection features to send the output of a shell\
    \ script to a log file. For example, in the following cron table entry, any standard\
    \ output and error messages generated by the `backup.bsh` shell script are captured\
    \ in a file named `bck.log`:\n\n```\n11 12 * * * /home/oracle/bin/backup.bsh 1>/home/oracle/bin/log/bck.log\
    \ 2>&1\n```\n\nIf you don’t redirect the cron job output, then any output will\
    \ be e-mailed to the user that owns the cron table. You can override this behavior\
    \ by specifying the `MAILTO` variable directly within the cron table. With the\
    \ next few lines of code, the cron output will go to the root user:\n\n```\nMAILTO=root\n\
    11 12 * * * /home/oracle/bin/backup.bsh\n```\n\nIf you don’t want the output to\
    \ go anywhere, then redirect it to the proverbial bit bucket. The following entry\
    \ sends the standard output and standard error to the `/dev/null` device:\n\n\
    ```\n11 12 * * * /home/oracle/bin/backup.bsh 1>/dev/null 2>&1\n```\n\n## Troubleshooting\
    \ cron\n\nIf you have a cron job that isn’t running correctly, follow these steps\
    \ to troubleshoot the issue:\n\n1.  Copy your cron entry, paste it into the OS\
    \ command line, and manually run the command. Frequently, a slight typo in a directory\
    \ or file name can be the source of the problem. Manually running the command\
    \ will highlight errors such as this.\n2.  If the script runs Oracle utilities,\
    \ make sure you source (set) the required OS variables within the script, such\
    \ as `ORACLE_HOME` and `ORACLE_SID`. Oftentimes, these variables are set by startup\
    \ scripts (such as `HOME/.bashrc`) when you log in. Because cron doesn’t run a\
    \ user’s startup scripts, any required variables must be set explicitly within\
    \ the script.\n3.  Ensure that the first line of any shell scripts invoked from\
    \ cron specify the name of the program that will be used to interpret the commands\
    \ within the script. For instance, `#!/bin/bash` should be the first entry in\
    \ a Bash shell script. Because cron doesn’t run a user’s startup scripts (such\
    \ as `HOME/.bashrc`), you can’t assume that your OS user’s default shell will\
    \ be used to run a command or script evoked from cron.\n4.  Make certain that\
    \ the cron background process is running. Issue the following command from the\
    \ OS to verify:\n\n    ```\n    $ ps -ef | grep cron\n    ```\n\n    If the cron\
    \ daemon (background process) is running, you should see something similar to\
    \ this:\n\n    ```\n    root      2969     1  0 Mar23 ?        00:00:00 crond\n\
    \    ```\n\n5.  Check your e-mail on the server. The cron utility will usually\
    \ send an e-mail to the OS account when there are issues with a misbehaving cron\
    \ job.\n6.  Inspect the contents of the `/var/log/cron` file for any errors. Sometimes,\
    \ this file has relevant information regarding a cron job that has failed to run.\n\
    \n## Examples of Automated DBA Jobs\n\nIn today’s often chaotic business environment,\
    \ it’s almost mandatory to automate jobs. If you don’t automate, you may forget\
    \ to do a task; or, if performing a job manually, you may introduce error into\
    \ the procedure. If you don’t automate, you could find yourself replaced by a\
    \ more efficient or cheaper set of DBAs.\n\nUsually, I automate jobs such that\
    \ the script only sends an e-mail in the event of a failure. Generating an e-mail\
    \ upon success often leads to a full mailbox. Some DBAs like to see success messages.\
    \ I generally don’t.\n\nDBAs automate a wide variety of tasks and jobs. Almost\
    \ any type of environment requires that you create some sort of OS script that\
    \ encapsulates a combination of OS commands, SQL statements, and PL/SQL blocks.\n\
    \nThe following scripts in this chapter are a sample of the wide variety of different\
    \ types of tasks that DBAs automate. This set of scripts is, by no means, complete.\
    \ Many of these scripts may not be needed in your environment. The point is to\
    \ give you a good sampling of the types of jobs automated and the techniques used\
    \ to accomplish a task.\n\n> **Note** [Chapter 3](#9781430257288_Ch03.xhtml) contains\
    \ basic examples of some core scripts that DBAs require. This section provides\
    \ examples of tasks and scripts that DBAs commonly automate.\n\n## Starting and\
    \ Stopping the Database and Listener\n\nIn many environments it’s desirable to\
    \ have the Oracle database and listener automatically shut down and started up\
    \ when the server reboots. If you have that requirement, then follow the next\
    \ several steps to automate your database and listener shutdown and startup.\n\
    \n> **Note** The example in this section is Linux centric; if you’re working with\
    \ a different Unix platform, refer to the *Oracle Database Administrator’s Guide*,\
    \ which can be freely downloaded from the Technology Network area of the Oracle\
    \ web site ([http://otn.oracle.com](http://otn.oracle.com)), for details for your\
    \ environment.\n\n1.  Edit the `/etc/oratab` file, and place a `Y` at the end\
    \ of the entry for the databases you want to restart automatically when the system\
    \ reboots. You may need root privileges to edit the file:\n\n    ```\n    # vi\
    \ /etc/oratab\n    ```\n\n2.  Place within the file a line similar to this, for\
    \ your environment:\n\n    ```\n    o12c:/u01/app/oracle/product/12.1.0.1/db_1:Y\n\
    \    ```\n\n3.  In the previous line, `o12c` is the database name, and `/u01/app/oracle/product/12.1.0.1/db_1`\
    \ specifies the directory `ORACLE_HOME`. The `Y` at the end of the string signifies\
    \ that the database can be started and stopped by the `ORACLE_HOME/bin/dbstart`\
    \ and `ORACLE_HOME/bin/dbshut` scripts. You can replace the `Y` with an `N` if\
    \ you do not want the database automatically stopped and restarted.\n\n    > **Note**\
    \ With Unix systems (such as Solaris) the `oratab` file is usually located in\
    \ the `/var/opt/oracle` directory.\n\n4.  As root, navigate to the `/etc/init.d`\
    \ directory, and create a file named `dbora`:\n\n    ```\n    # cd /etc/init.d\n\
    \    # vi dbora\n    ```\n\n5.  Place the following lines in the `dbora` file.\
    \ Make sure you change the values of the variables `ORA_HOME` and `ORA_OWNER`\
    \ to match your environment. This is a bare-bones script of what you minimally\
    \ would need to stop and start a database and listener:\n\n    ```\n    #!/bin/bash\n\
    \    # chkconfig: 35 99 10\n    # description: Starts and stops Oracle processes\n\
    \    ORA_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n    ORA_OWNER=oracle\n  \
    \  case \"$1\" in\n      'start')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl\
    \ start\"\n        su - $ORA_OWNER -c $ORA_HOME/bin/dbstart\n       ;;\n     \
    \ 'stop')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl stop\"\n       \
    \ su - $ORA_OWNER -c $ORA_HOME/bin/dbshut\n       ;;\n    esac\n    ```\n\n  \
    \  These lines look like comments in the `dbora` file but are actually mandatory:\n\
    \n    ```\n    # chkconfig: 35 99 10\n    # description: Starts and stops Oracle\
    \ processes\n    ```\n\n    The prior lines describe the service characteristics\
    \ of the script. The `35` means that the service will be started in runlevels\
    \ 3 and 5. The `99` indicates that the service will be started near the end of\
    \ the init processing. The `10` signifies that the service will be stopped near\
    \ the beginning of the init processing. A description is also required providing\
    \ textual information about the service.\n\n    > **Note** A Linux runlevel is\
    \ a logical container for specifying which services will run when the system is\
    \ started.\n\n6.  Change the group of the `dbora` file to match the group assigned\
    \ to the OS owner of the Oracle software (usually `oinstall` or `dba`):\n\n  \
    \  ```\n    # chgrp dba dbora\n    ```\n\n7.  Change the permissions on the `dbora`\
    \ file to 750:\n\n    ```\n    # chmod 750 dbora\n    ```\n\n8.  Run the following\
    \ `chkconfig` command:\n\n    ```\n    # /sbin/chkconfig --add dbora\n    ```\n\
    \n    Here, the `chkconfig` command registers the service script. This also creates\
    \ the appropriate symbolic links to files beneath the `/etc/rc.d` directory. Use\
    \ the `--list` option to display whether a service is on or off for each runlevel:\n\
    \n    ```\n    # chkconfig --list | grep dbora\n    dbora           0:off   1:off\
    \   2:off   3:on    4:off   5:on    6:off\n    ```\n\n    This output indicates\
    \ that the `dbora` service is on for runlevels 3 and 5. If you need to delete\
    \ a service, use the `-del` option of `chkconfig`.\n\n    > **Tip** If you want\
    \ to stop and start automatically (on system reboots), you can use other processes,\
    \ such as the Intelligent Agent, Management Server, or HTTP Server. See MOS note\
    \ 222813.1 for details.\n\nAutomating the shutdown and startup of your Oracle\
    \ database will vary, depending on whether you’re using tools such as cluster\
    \ software or ASM. The prior code in this section demonstrates the typical steps\
    \ for implementing the shutdown and startup of your database in scenarios in which\
    \ you don’t have other software that manages this task.\n\nTo test whether the\
    \ `dbora` script is working, as root, run the following command to stop your database\
    \ and listener:\n\n```\n# /etc/init.d/dbora stop\n```\n\nTo test the startup of\
    \ your database and listener, as root, issue the following command:\n\n```\n#\
    \ /etc/init.d/dbora start\n```\n\nAs of this writing, you may need to make a slight\
    \ modification to the Oracle-supplied `ORACLE_HOME/bin/dbstart` and `ORACLE_HOME/bin/dbshut`\
    \ scripts. If you inspect these scripts with an OS editor (such as `vi`), you’ll\
    \ notice the following line:\n\n```\nORACLE_HOME_LISTNER=$1\n```\n\nI would recommend\
    \ that you change it to this:\n\n```\nORACLE_HOME_LISTNER=${1:-$ORACLE_HOME}\n\
    ```\n\nThis line instructs the scripts to accept a parameter if one is passed\
    \ in. If a parameter is not passed in, then set `ORACLE_HOME_LISTNER` to the value\
    \ contained in the variable `$ORACLE_HOME`. This preserves the functionality of\
    \ `dbstart` and `dbshut` and also makes these scripts work when called from `dbora`.\n\
    \nIf you have the opportunity to reboot your system, I recommend that you do so\
    \ to ensure that the database stops and restarts correctly. When you invoke `dbstart`\
    \ and `dbshut`, these utilities create log files in the `ORACLE_HOME` directory,\
    \ named `startup.log` and `shutdown.log`. You can inspect the contents of these\
    \ to verify that the shutdown and startup are working as expected.\n\n> **Tip**\
    \ Starting with Oracle Database 11g, consider using the Oracle Restart utility\
    \ to automate the startup/shutdown of your database and listener. This utility\
    \ is especially useful in RAC and ASM environments.\n\n## LINUX SYSTEM V INIT\
    \ RUNLEVELS\n\nA Linux service is an application that typically runs in the background\
    \ (conceptually similar to a Windows service). A runlevel is used to configure\
    \ which services run on a box. Usually, there are seven runlevels (0–6). The `chkconfig`\
    \ command manages which services you want running in which runlevel(s).\n\nWhen\
    \ Linux starts up, the `sbin/init` program reads the `/etc/inittab` file to determine\
    \ the runlevel in which it should run. Following is a snippet of script from `/etc/inittab`\
    \ that shows the runlevels used by Red Hat (these are similar to runlevels in\
    \ other Linux distributions):\n\n```\n#   0 - halt (Do NOT set initdefault to\
    \ this)\n#   1 - Single user mode\n#   2 - Multiuser, without NFS (The same as\
    \ 3, if you do not have networking)\n#   3 - Full multiuser mode\n#   4 - unused\n\
    #   5 - X11\n#   6 - reboot (Do NOT set initdefault to this)\n```\n\nTo set the\
    \ default runlevel, specify `N` in the `id:<N>:initdefault` line in the `/etc/inittab`\
    \ file. This example sets the default runlevel to 5:\n\n```\nid:5:initdefault:\n\
    ```\n\nA runlevel of 1 is used by SAs when performing maintenance and repairs.\
    \ A runlevel of 5 will start the Linux server with a graphical login screen at\
    \ the console, plus networking capabilities. However, if you have a problem running\
    \ the display manager at the console—owing to a video driver issue, for example—then\
    \ you can start in runlevel 3 instead, which is command line based but still has\
    \ networking services.\n\nMost SAs who are security conscious operate their servers\
    \ in runlevel 3. With the wide acceptance of VNC, SAs oftentimes do not see the\
    \ benefit of running in runlevel 5. If an SA wants to take advantage of graphical\
    \ utilities, the SA will just use VNC (or a similar tool). Do not attempt to set\
    \ `initdefault` to either 0 or 6, because your Linux server will never start.\n\
    \nTo determine the current runlevel, you can run `who -r` or `runlevel`, as follows:"
