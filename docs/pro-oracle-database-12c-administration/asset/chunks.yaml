    Summary


    A senior DBA must be adept at efficiently determining the source of database unavailability
    and performance problems. The ability to identify and resolve problems defines
    a professional-level DBA. Anyone can google a topic (there’s nothing worse than
    being on a trouble call with a manager who is googling and recommending random
    solutions). Finding the appropriate solution and confidently applying it in a
    production database environment is how you add tremendous value.


    Diagnosing issues sometimes requires some system and network administrator skills.
    Additionally, an effective DBA must know how to leverage the Oracle data dictionary
    to identify problems. As part of your strategy, you should also proactively monitor
    for the common sources of database unavailability. Ideally, you’ll be aware of
    the problem before anybody else and will proactively solve the issue.


    No book can cover every troubleshooting activity. This chapter includes some of
    the most common techniques for identifying problems and dealing with them. Often,
    basic OS utilities will help you ascertain the source of a hung database. In almost
    every scenario the alert.log and corresponding trace files should be inspected.
    Finding the root cause of a problem is often the hardest task. Use a consistent
    and methodical approach, and you’ll be much more successful in diagnosing and
    resolving issues.


    I have tried to convey techniques and methods that will help you survive even
    the most chaotic database environments. To summarize these thoughts, a DBA’s manifesto,
    of sorts:


    *   Automate and monitor through scripts and schedulers. Be the first to know
    when something is broken.

    *   Strive for repeatability and efficiency in processes and scripts. Be consistent.

    *   Keep it simple. If a module is more than a page long, it’s too long. Don’t
    implement a script or feature that another DBA won’t be able to understand or
    maintain. Sometimes, the simple solution is the correct solution.

    *   Remain calm regardless of the disaster. Be respectful.

    *   Don’t be afraid to seek or take advice. Welcome feedback and criticism. Listen
    to others. Entertain the thought that you might be wrong.

    *   Take advantage of graphical tools, but always know how to implement a feature
    manually.

    *   Expect failure, predict failure, prepare for failure. You don’t know what
    will go wrong, but you do know something will go wrong. Be happy that you prepared
    for failure. The best lessons are painful.

    *   Test and document your operating procedures. This will help you stay calm(er)
    and focused when in stressful database-down situations.

    *   Don’t write code to implement a feature that the database vendor has already
    provided a solution for (replication, disaster recovery, backup and recovery,
    and so on).

    *   Become proficient with SQL, procedural SQL, and OS commands. These skills
    separate the weak from the strong. The best DBAs posses both SA and developer
    expertise.

    *   Continually investigate new features and technology. Learning is a never ending
    process. Question everything, reevaluate, and look for a better way. Verify your
    solutions with repeatable, peer-reviewed tests. Document and freely share your
    knowledge.

    *   Do what it takes to get the job done. You compete with the world now. Work
    harder and smarter.


    The job of a DBA can be quite rewarding. It can also be very painful and stressful.
    Hopefully, the techniques documented in this book will get you from being mostly
    stressed to an occasionally happy state.


