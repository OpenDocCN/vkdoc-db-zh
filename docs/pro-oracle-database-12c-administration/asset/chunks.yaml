  raw: 'Once you have identified a top-consuming process associated with a database,
    you can query the data dictionary views, based on the SPID, to identify what the
    database process is executing.


    **OS WATCHER**


    Oracle provides a collection of scripts that gather and store metrics for CPU,
    memory, disk, and network usage. On Linux/Unix systems, the OS Watcher tool suite
    automates the gathering of statistics, using tools such as top, vmstat, iostat,
    mpstat, netstat, and traceroute. This utility also has an optional graphical component
    for visually displaying performance metrics.


    You can obtain OS Watcher from Oracle’s MOS web site. For the Linux/Unix version,
    see MOS note 301137.1 or the document titled “OS Watcher User Guide.” For details
    on the Windows version of OS Watcher, see MOS note 433472.1.


    Finding Resource-Intensive SQL Statements


    One of the best ways to isolate a poorly performing query is to have a user or
    developer complain about a specific SQL statement. In this situation there is
    no detective work involved. You can directly pinpoint the SQL query that is in
    need of tuning.


    However, you don’t often have the luxury of a human’s letting you know specifically
    where to look when investigating performance issues. There are a number of methods
    for determining which SQL statements are consuming the most resources in a database:


    *   Real-time execution statistics (new, starting with Oracle Database 11g)

    *   Near real-time statistics

    *   Oracle performance reports


    These techniques are described in the next several sections.


    Monitoring Real-Time SQL Execution Statistics


    If you’re using Oracle Database 11g or higher, you can use the following query
    to select from the V$SQL_MONITOR to monitor the near real-time resource consumption
    of SQL queries:


    ```

    select * from (

    select a.sid session_id, a.sql_id

    ,a.status

    ,a.cpu_time/1000000 cpu_sec

    ,a.buffer_gets, a.disk_reads

    ,b.sql_text sql_text

    from v$sql_monitor a

        ,v$sql b

    where a.sql_id = b.sql_id

    order by a.cpu_time desc)

    where rownum <=20;

    ```


    The output for this query doesn’t fit easily onto a page. Here is a subset of
    the output:


    ```

    SESSION_ID SQL_ID        STATUS      CPU_SEC BUFFER_GETS  DISK_READS SQL_TEXT

    ---------- ------------- --------- ---------- ----------- ---------- ---------------

           139 d07nngmx93rq7 DONE          331.88        5708       3490 select count(*)

           130 9dtu8zn9yy4uc EXECUTING      11.55        5710        248 select task_name

    ```


    In the query an inline view is used to first retrieve all records and organize
    them by CPU_TIME, in descending order. The outer query then limits the result
    set to the top 20 rows, using the R OWNUM pseudocolumn. You can modify the previous
    query to order the results by the statistic of your choice or to display only
    the queries that are currently executing. For example, the next SQL statement
    monitors currently executing queries, ordered by the number of disk reads:


    ```

    select * from (

    select a.sid session_id, a.sql_id, a.status

    ,a.cpu_time/1000000 cpu_sec

    ,a.buffer_gets, a.disk_reads

    ,substr(b.sql_text,1,35) sql_text

    from v$sql_monitor a

        ,v$sql b

    where a.sql_id = b.sql_id

    and   a.status=''EXECUTING''

    order by a.disk_reads desc)

    where rownum <=20;

    ```


    The statistics in V$SQL_MONITOR are updated every second, so you can view resource
    consumption as it changes. These statistics are gathered by default if an SQL
    statement runs in parallel or consumes more than 5 seconds of CPU or I/O time.


    The V$SQL_MONITOR view includes a subset of statistics contained in the V$SQL,
    V$SQLAREA, and V$SQLSTATS views. The V$SQL_MONITOR view displays real-time statistics
    for each execution of a resource-intensive SQL statement, whereas V$SQL, V$SQLAREA,
    and V$SQLSTATS contain cumulative sets of statistics resulting from several executions
    of an SQL statement.


    Once the SQL statement execution ends, the runtime statistics are not immediately
    flushed from V $SQL_MONITOR. Depending on activity in your database, the statistics
    can be available for some time. If you have a very active database, however, the
    statistics can potentially be flushed soon after the query finishes.


    ![image](Images/sq.jpg) **Tip**   You can uniquely identify the execution of an
    SQL statement in V $SQL_MONITOR from a combination of the ­following columns:
    SQL_ID, SQL_EXEC_START, SQL_EXEC_ID.


    You can also query views such as V$SQLSTATS to determine which SQL statements
    are consuming an inordinate amount of resources. For example, use the following
    query to identify the ten most resource-intensive queries, based on CPU time:


    ```

    select * from(

    select s.sid, s.username, s.sql_id

    ,sa.elapsed_time/1000000, sa.cpu_time/1000000

    ,sa.buffer_gets, sa.sql_text

    from v$sqlarea sa

        ,v$session s

    where s.sql_hash_value = sa.hash_value

    and   s.sql_address    = sa.address

    and   s.username is not null

    order by sa.cpu_time desc)

    where rownum <= 10;

    ```


    In the prior query an inline view is used to first retrieve all records and sort
    the output by CPU_TIME, in descending order. The outer query then limits the result
    set to the top ten rows, using the R OWNUM pseudocolumn. The query can be easily
    modified to sort by a column other than CPU_TIME. For instance, if you want to
    report resource usage by BUFFER_GETS, simply substitute BUFFER_GETS for CPU_TIME
    in the ORDER BY clause. The CPU_TIME column is calculated in microseconds; to
    convert it to seconds, it is divided by 1,000,000.


    ![image](Images/sq.jpg) **Tip**   Keep in mind that V$SQLAREA contains statistics
    that are cumulative for the duration for a given session. So, if a session runs
    an identical query several times, the statistics for that connection will be the
    total for all the runs of a query. In contrast, V$SQL_MONITOR shows statistics
    that have accumulated for the current run of a given SQL statement. Therefore,
    each time a query runs, new statistics are reported for that query in V$SQL_MONITOR.


    Running Oracle Diagnostic Utilities


    Oracle provides several utilities for diagnosing database performance issues:


    *   Automatic workload repository (AWR)

    *   Automatic database diagnostic monitor (ADDM)

    *   Active session history (ASH)

    *   Statspack


    AWR, ADDM, and ASH were introduced many years ago, in Oracle Database 10g. These
    tools provide advanced reporting capabilities that allow you to troubleshoot and
    resolve performance issues. These new utilities require an extra license from
    Oracle. The older Statspack utility is free and requires no license.


    All these tools rely heavily on the underlying V$ dynamic performance views. Oracle
    maintains a vast collection of these views, which track and accumulate metrics
    of database performance. For example, if you run the following query, you’ll notice
    that for Oracle Database 12c, there are approximately 700 V$ views:


    ```

    SQL> select count(*) from dictionary where table_name like ''V$%'';


    COUNT(*)


    ```


    The Oracle performance utilities rely on periodic snapshots gathered from these
    internal performance views. Two of the most useful views, with regard to performance
    statistics, are the V $SYSSTAT and V $SESSTAT views. The V$SYSSTAT view offers
    more than 400 types of database statistics. This V$SYSSTAT view contains information
    about the entire database, whereas the V$SESSTAT view contains statistics on individual
    sessions. A few of the values in the V$SYSSTAT and V$SESSTAT views represent the
    current usage of the resource. These values are


    *   opened cursors current

    *   logins current

    *   session cursor cache current

    *   work area memory allocated


    The rest of the values are cumulative. The values in V $SYSSTAT are cumulative
    for the entire database, from the time the instance was started. The values in
    V $SESSTAT are cumulative per session, from the time the session was started.
    Some of the more important performance-related cumulative values are'
  trans: "\n# 识别与监控数据库资源消耗\n\n一旦识别出与数据库相关的高消耗进程，就可以基于 SPID 查询数据字典视图，以确定该数据库进程正在执行什么操作。\n\
    \n## OS Watcher\n\nOracle 提供了一套用于收集和存储 CPU、内存、磁盘和网络使用情况指标的脚本。在 Linux/Unix 系统上，OS\
    \ Watcher 工具套件通过使用 `top`、`vmstat`、`iostat`、`mpstat`、`netstat` 和 `traceroute` 等工具，实现了统计数据收集的自动化。该工具还有一个可选的图形组件，用于可视化显示性能指标。\n\
    \n您可以从 Oracle 的 MOS 网站获取 OS Watcher。对于 Linux/Unix 版本，请参阅 MOS 笔记 301137.1 或标题为\
    \ “OS Watcher User Guide” 的文档。有关 Windows 版本 OS Watcher 的详细信息，请参阅 MOS 笔记 433472.1。\n\
    \n## 查找资源密集型 SQL 语句\n\n隔离性能不佳查询的最佳方法之一，就是有用户或开发者对某个特定 SQL 语句进行投诉。在这种情况下，无需进行任何侦探工作。您可以直接定位到需要调优的\
    \ SQL 查询。\n\n然而，在调查性能问题时，您通常没有这种直接的提示。有几种方法可用于确定数据库中哪些 SQL 语句消耗了最多的资源：\n\n*  \
    \ 实时执行统计信息（从 Oracle Database 11g 开始新增）\n*   近实时统计信息\n*   Oracle 性能报告\n\n这些技术将在接下来的几个部分中描述。\n\
    \n### 监控实时 SQL 执行统计信息\n\n如果您使用的是 Oracle Database 11g 或更高版本，可以使用以下查询从 `V$SQL_MONITOR`\
    \ 中选择数据，以监控 SQL 查询的近实时资源消耗情况：\n\n```sql\nselect * from (\nselect a.sid session_id,\
    \ a.sql_id\n,a.status\n,a.cpu_time/1000000 cpu_sec\n,a.buffer_gets, a.disk_reads\n\
    ,b.sql_text sql_text\nfrom v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\n\
    order by a.cpu_time desc)\nwhere rownum <=20;\n```\n\n该查询的输出结果不易完全显示在一页上。以下是输出结果的一个子集：\n\
    \n```\nSESSION_ID SQL_ID        STATUS      CPU_SEC BUFFER_GETS  DISK_READS SQL_TEXT\n\
    ---------- ------------- --------- ---------- ----------- ---------- ---------------\n\
    \       139 d07nngmx93rq7 DONE          331.88        5708       3490 select count(*)\n\
    \       130 9dtu8zn9yy4uc EXECUTING      11.55        5710        248 select task_name\n\
    ```\n\n在此查询中，使用了一个内联视图来首先检索所有记录并按 `CPU_TIME` 降序组织它们。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前\
    \ 20 行。您可以修改之前的查询，以按您选择的统计信息对结果进行排序，或仅显示当前正在执行的查询。例如，下一个 SQL 语句监控当前正在执行的查询，并按磁盘读取数量排序：\n\
    \n```sql\nselect * from (\nselect a.sid session_id, a.sql_id, a.status\n,a.cpu_time/1000000\
    \ cpu_sec\n,a.buffer_gets, a.disk_reads\n,substr(b.sql_text,1,35) sql_text\nfrom\
    \ v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\nand   a.status='EXECUTING'\n\
    order by a.disk_reads desc)\nwhere rownum <=20;\n```\n\n`V$SQL_MONITOR` 中的统计信息每秒更新一次，因此您可以查看资源消耗的变化情况。默认情况下，如果\
    \ SQL 语句并行运行或消耗超过 5 秒的 CPU 或 I/O 时间，则会收集这些统计信息。\n\n`V$SQL_MONITOR` 视图包含 `V$SQL`、`V$SQLAREA`\
    \ 和 `V$SQLSTATS` 视图中统计信息的一个子集。`V$SQL_MONITOR` 视图显示每次执行资源密集型 SQL 语句的实时统计信息，而 `V$SQL`、`V$SQLAREA`\
    \ 和 `V$SQLSTATS` 则包含由于多次执行 SQL 语句而累积的统计信息集。\n\nSQL 语句执行结束后，运行时统计信息不会立即从 `V$SQL_MONITOR`\
    \ 中清除。根据数据库中的活动情况，这些统计信息可能会保留一段时间。但是，如果您的数据库非常活跃，统计信息可能会在查询完成后不久就被清除。\n\n![image](img/sq.jpg)\
    \ **提示**：您可以通过以下列的组合在 `V$SQL_MONITOR` 中唯一标识 SQL 语句的执行：`SQL_ID`、`SQL_EXEC_START`、`SQL_EXEC_ID`。\n\
    \n您也可以查询 `V$SQLSTATS` 等视图来确定哪些 SQL 语句消耗了异常多的资源。例如，使用以下查询来识别基于 CPU 时间的十大资源密集型查询：\n\
    \n```sql\nselect * from(\nselect s.sid, s.username, s.sql_id\n,sa.elapsed_time/1000000,\
    \ sa.cpu_time/1000000\n,sa.buffer_gets, sa.sql_text\nfrom v$sqlarea sa\n    ,v$session\
    \ s\nwhere s.sql_hash_value = sa.hash_value\nand   s.sql_address    = sa.address\n\
    and   s.username is not null\norder by sa.cpu_time desc)\nwhere rownum <= 10;\n\
    ```\n\n在之前的查询中，使用了一个内联视图来首先检索所有记录并按 `CPU_TIME` 降序对输出进行排序。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前\
    \ 10 行。该查询可以轻松修改为按 `CPU_TIME` 以外的列排序。例如，如果您想按 `BUFFER_GETS` 报告资源使用情况，只需在 `ORDER\
    \ BY` 子句中用 `BUFFER_GETS` 替换 `CPU_TIME` 即可。`CPU_TIME` 列以微秒计算；要将其转换为秒，需要除以 1,000,000。\n\
    \n![image](img/sq.jpg) **提示**：请记住，`V$SQLAREA` 包含在给定会话持续期间累积的统计信息。因此，如果一个会话多次运行相同的查询，则该连接的统计信息将是该查询所有运行的总和。相比之下，`V$SQL_MONITOR`\
    \ 显示的是给定 SQL 语句当前运行所累积的统计信息。因此，每次查询运行时，`V$SQL_MONITOR` 中都会报告该查询的新统计信息。\n\n## 运行\
    \ Oracle 诊断工具\n\nOracle 提供了多个用于诊断数据库性能问题的工具：\n\n*   自动工作负载存储库 (AWR)\n*   自动数据库诊断监视器\
    \ (ADDM)\n*   活动会话历史 (ASH)\n*   Statspack\n\nAWR、ADDM 和 ASH 是多年前在 Oracle Database\
    \ 10g 中引入的。这些工具提供了高级报告功能，使您能够对性能问题进行故障排除和解决。这些新工具需要从 Oracle 获得额外许可。较旧的 Statspack\
    \ 工具是免费的，不需要许可。\n\n所有这些工具都严重依赖底层的 `V$` 动态性能视图。Oracle 维护着大量此类视图，用于跟踪和累积数据库性能指标。例如，如果您运行以下查询，您会注意到对于\
    \ Oracle Database 12c，大约有 700 个 `V$` 视图：\n\n```sql\nSQL> select count(*) from\
    \ dictionary where table_name like 'V$%';\n\nCOUNT(*)\n```\n\nOracle 性能工具依赖于从这些内部性能视图定期收集的快照。关于性能统计信息，两个最有用的视图是\
    \ `V$SYSSTAT` 和 `V$SESSTAT`。`V$SYSSTAT` 视图提供了超过 400 种类型的数据库统计信息。此 `V$SYSSTAT`\
    \ 视图包含有关整个数据库的信息，而 `V$SESSTAT` 视图则包含有关各个会话的统计信息。`V$SYSSTAT` 和 `V$SESSTAT` 视图中的少数几个值代表了资源的当前使用情况。这些值是：\n\
    \n*   `opened_cursors_current`\n*   `logins_current`\n*   `session_cursor_cache_current`\n\
    *   `workarea_memory_allocated`\n\n其余的值是累积的。`V$SYSSTAT` 中的值是自实例启动以来整个数据库的累积值。`V$SESSTAT`\
    \ 中的值是自会话启动以来每个会话的累积值。一些更重要的与性能相关的累积值包括：\n"
- fmt: '# Oracle性能工具使用指南


    *   `CPU used`

    *   `consistent gets`

    *   `physical reads`

    *   `physical writes`


    对于累积统计信息，衡量周期性使用率的方法是记录某个统计信息在起始点的值，然后在稍后时间点再次记录其值并计算差值。Oracle性能工具（如AWR和Statspack）就采用了这种方法。Oracle会定期获取动态等待接口视图的快照，并将其存储在存储库中。


    以下部分详细介绍如何通过SQL命令行访问AWR、ADDM、ASH和Statspack。


    ![image](Images/sq.jpg) **提示** 你可以从Enterprise Manager访问AWR、ADDM和ASH。如果你有权访问Enterprise
    Manager，会发现该界面相当直观且视觉上很有帮助。


    ## 使用AWR


    AWR报告适用于查看整个系统的性能并识别消耗资源最多的SQL查询。运行以下脚本来生成AWR报告：

    ```sql

    SQL> @?/rdbms/admin/awrrpt

    ```


    从AWR输出中，你可以通过检查报告的“SQL Ordered by Elapsed Time”或“SQL Ordered by CPU Time”部分来识别消耗资源最多的语句。以下是一些示例输出：

    ```

    SQL ordered by CPU Time                  DB/Inst: O12C/o12c  Snaps: 1668-1669

    -> Resources reported for PL/SQL code includes the resources used by all SQL

       statements called by the code.

    -> %Total - CPU Time      as a percentage of Total DB CPU

    -> %CPU   - CPU Time      as a percentage of Elapsed Time

    -> %IO    - User I/O Time as a percentage of Elapsed Time

    -> Captured SQL account for   3.0E+03% of Total CPU Time (s):               0

    -> Captured PL/SQL account for  550.9% of Total CPU Time (s):               0


    CPU                   CPU per           Elapsed

      Time (s)  Executions    Exec (s) %Total   Time (s)   %CPU    %IO    SQL Id

    ---------- ------------ ---------- ------ ---------- ------ ------ -------------

           3.2            1       3.24  930.5       10.5   30.9   74.9 93jktd5vtxb98

    ```


    从Oracle Database 10g开始，Oracle会自动每小时对数据库进行一次快照，并填充存储统计信息的基础AWR表。默认情况下，统计信息会保留7天。


    你也可以通过运行`awrsqrpt.sql`报告为特定的SQL语句生成AWR报告。运行以下脚本时，系统将提示你输入感兴趣的查询的`SQL_ID`：

    ```sql

    SQL> @?/rdbms/admin/awrsqrpt.sql

    ```


    ## 使用ADDM


    ADDM报告提供了哪些SQL语句是调优候选者的有用信息。使用以下SQL脚本生成ADDM报告：

    ```sql

    SQL> @?/rdbms/admin/addmrpt

    ```


    查找报告中标记为“SQL Statements Consuming Significant Database Time”的部分。以下是一些示例输出：

    ```

    FINDING 2: 29% impact (65043 seconds)


    SQL statements consuming significant database time were found.


    RECOMMENDATION 1: SQL Tuning, 6.7% benefit (14843 seconds)

          ACTION: Investigate the SQL statement with SQL_ID "46cc3t7ym5sx0" for

    ```


    ADDM报告分析AWR表中的数据，以识别潜在的瓶颈和高资源消耗的SQL查询。


    ## 使用ASH


    ASH报告允许你专注于最近运行过且可能只执行了很短时间的短命SQL语句。运行以下脚本来生成ASH报告：

    ```sql

    SQL> @?/rdbms/admin/ashrpt

    ```


    在输出中搜索标记为“Top SQL”的部分。以下是一些示例输出：

    ```

    Top SQL with Top Events           DB/Inst: O12C/o12c  (Jan 30 14:49 to 15:14)


    Sampled #

                     SQL ID             Planhash        of Executions     % Activity

    ----------------------- -------------------- -------------------- --------------

    Event                          % Event Top Row Source                    % RwSrc

    ------------------------------ ------- --------------------------------- -------

              dx5auh1xb98k5           1677482778                    1          46.57

    CPU + Wait for CPU               46.57 HASH JOIN                           23.53

    ```


    前面的输出表明查询正在等待CPU资源。在这种情况下，问题可能是另一个查询正在消耗CPU资源。


    何时ASH报告比AWR或ADDM报告更有用？AWR和ADDM输出显示的是按总数据库时间消耗最多的SQL。如果SQL性能问题是短暂且短命的，它可能不会出现在AWR和ADDM报告上。在这些情况下，ASH报告更有用。


    ## 使用Statspack


