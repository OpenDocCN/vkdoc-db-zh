- fmt: "# 可插拔数据库管理\n\n## 创建可插拔数据库\n\n### 参数说明\n\n| Parameter | Description |\n| ---\
    \ | --- |\n| `ADMIN_USER` | 一个为管理任务创建和使用的本地用户。该用户被授予 `PDB_DBA` 角色。 |\n| `MAXSIZE`\
    \ | 可插拔数据库可消耗的最大存储量；如果未指定，则可插拔数据库可使用的存储量没有限制。 |\n| `MAX_SHARED_TEMP_SIZE` | 连接到可插拔数据库的会话可以使用的共享临时表空间的最大量。\
    \ |\n| `DEFAULT TABLESPACE` | 指定在可插拔数据库内创建的新用户的默认永久表空间。 |\n| `DATAFILE` | 与默认表空间关联的数据文件的路径和文件名。\
    \ |\n| `PATH_PREFIX` | 指定添加到可插拔数据库的任何新数据文件必须存在于本目录或其子目录中。 |\n| `FILE_NAME_CONVERT`\
    \ | 指定种子数据库数据文件的位置以及它们应被复制到的位置。 |\n\n### 克隆现有的可插拔数据库\n\n你可以从当前连接的（本地）`CDB` 中现有的可插拔数据库创建一个新的可插拔数据库，或者作为远程\
    \ `CDB` 中某个可插拔数据库的副本创建。这两种技术将在接下来的两节中详细说明。\n\n#### 本地克隆\n\n在此示例中，使用一个现有的可插拔数据库\
    \ (`SALESPDB`) 来创建一个新的可插拔数据库 (`SALESPDB2`)。首先，连接到根容器，并将现有的源可插拔数据库置于只读模式：\n\n```bash\n\
    $ sqlplus / as sysdba\nSQL> alter pluggable database salespdb close;\nSQL> alter\
    \ pluggable database salespdb open read only;\n```\n\n现在，运行以下 `SQL` 语句来创建新的可插拔数据库：\n\
    \n```sql\nCREATE PLUGGABLE DATABASE salespdb2\nFROM salespdb\nFILE_NAME_CONVERT\
    \ = ('/u01/app/oracle/oradata/CDB/salespdb',\n                     '/u01/dbfile/CDB/salespb2')\n\
    STORAGE (MAXSIZE 6G MAX_SHARED_TEMP_SIZE 100M);\n```\n\n在上面的示例中，`/u01/app/oracle/oradata/CDB/salespdb`\
    \ 目录中的（与 `SALESPDB` 关联的）数据文件用于在 `/u01/dbfile/CDB/salespdb2` 目录中创建数据文件。如果目标目录事先不存在，系统会为你创建。你还可以为克隆的可插拔数据库指定管理限制，例如将其最大大小限制为\
    \ `6GB`，以及它在共享临时表空间中可以消耗的共享资源的最大量为 `100MB`。\n\n#### 远程克隆\n\n你也可以创建一个可插拔数据库作为远程可插拔数据库的克隆。首先，你需要从\
    \ `CDB` 到将作为克隆源的可插拔数据库创建一个数据库链接。本地用户和在数据库链接中指定的用户都必须具有 `CREATE PLUGGABLE DATABASE`\
    \ 权限。\n\n此示例显示了作为 `SYS` 用户到根容器的本地连接。这是将在其中创建新可插拔数据库的数据库：\n\n```bash\n$ sqlplus\
    \ / as sysdba\n```\n\n在此数据库中，创建到远程 `CDB` 中可插拔数据库的数据库链接。远程 `CDB` 包含一个名为 `SALESPDB`\
    \ 的可插拔数据库，其中有一个用户已被授予 `CREATE PLUGGABLE DATABASE` 权限。该用户将用于数据库链接：\n\n```sql\n\
    create database link salespdb\nconnect to mv_maint identified by foo\nusing 'speed2:1521/salespdb';\n\
    ```\n\n接下来，连接到包含将要克隆的可插拔数据库的远程数据库：\n\n```bash\n$ sqlplus sys/foo@speed2:1521/salespdb\
    \ as sysdba\n```\n\n关闭可插拔数据库，并以只读模式打开它：\n\n```sql\nSQL> alter pluggable database\
    \ salespdb close;\nSQL> alter pluggable database salespdb open read only;\n```\n\
    \n现在，作为 `SYS` 连接到目标 `CDB`，并通过克隆远程可插拔数据库来创建新的可插拔数据库，如下所示：\n\n```bash\n$ sqlplus\
    \ / as sysdba\n```\n\n```sql\nCREATE PLUGGABLE DATABASE salespdb3\nFROM salespdb@salespdb\n\
    FILE_NAME_CONVERT = ('/u01/app/oracle/oradata/CDB/salespdb',\n               \
    \      '/u01/dbfile/CDB2/salespdb3');\n```\n\n### 从非 `CDB` 数据库克隆\n\n有三种方式可以从现有的非\
    \ `CDB` 创建可插拔数据库：\n\n*   使用 `DBMS_PDB` 包生成元数据，然后使用 `CREATE PLUGGABLE DATABASE`\
    \ `SQL` 语句创建可插拔数据库\n*   数据泵（使用可传输表空间功能）\n*   `GoldenGate` 复制\n\n以下示例使用 `DBMS_PDB`\
    \ 包从非 `CDB` 创建可插拔数据库。有关数据泵和 `GoldenGate` 的详细信息，请分别参阅《*Oracle Database Utilities\
    \ Guide*》和 `GoldenGate` 特定文档，这些文档可从 `Oracle` 网站（`http://otn.oracle.com`）的技术网络区域获取。\n\
    \n![image](Images/sq.jpg) **Note** 当使用 `DBMS_PDB` 包将非 `CDB` 转换为可插拔数据库时，非 `CDB`\
    \ 必须是 `Oracle12c` 或更高版本。\n\n首先，将非 `CDB` 置于只读模式：\n\n```sql\nSQL> startup mount;\n\
    SQL> alter database open read only;\n```\n\n然后，运行 `DBMS_PDB` 包来创建一个描述非 `CDB` 数据库结构的\
    \ `XML` 文件：\n\n```sql\nBEGIN\n  DBMS_PDB.DESCRIBE(pdb_descr_file => '/orahome/oracle/ncdb.xml');\n\
    END;\n/\n```\n\n创建 `XML` 文件后，关闭非 `CDB` 数据库：\n\n```sql\nSQL> shutdown immediate;\n\
    ```\n\n接下来，设置你的 `oracle` `OS` 变量（如 `ORACLE_SID` 和 `ORACLE_HOME`），并连接到将作为可插拔数据库容纳非\
    \ `CDB` 的 `CDB` 数据库：\n\n```bash\n$ sqlplus / as sysdba\n```\n\n现在，你可以选择检查非 `CDB`\
    \ 是否与它将插入的 `CDB` 兼容。运行此代码时，请提供先前创建的 `XML` 文件的目录和名称：\n\n```sql\nSET SERVEROUTPUT\
    \ ON\nDECLARE\nhold_var boolean;\nbegin\nhold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>'/orahome/oracle/ncdb.xml');\n\
    if hold_var then\n  dbms_output.put_line('YES');\nelse\n  dbms_output.put_line('NO');\n\
    end if;\nend;\n/\n```\n\n如果没有兼容性问题，上述代码将显示 `YES`；如果可插拔数据库不兼容，则显示 `NO`。你可以查询 `PDB_PLUG_IN_VIOLATIONS`\
    \ 视图的内容，了解可插拔数据库与 `CDB` 不兼容的原因。\n\n接下来，使用以下 `SQL` 从非 `CDB` 创建一个可插拔数据库。你必须指定详细信息，例如先前创建的\
    \ `XML` 文件的名称和位置、非 `CDB` 数据文件的位置以及你希望新数据文件创建的位置：\n\n```sql\nCREATE PLUGGABLE DATABASE\
    \ dkpdb\nUSING '/orahome/oracle/ncdb.xml'\nCOPY\nFILE_NAME_CONVERT = ('/u01/dbfile/dk/',\n\
    \                     '/u01/dbfile/CDB/dkpdb/');\n```\n\n如果成功，你应该会看到：\n\n```\n\
    Pluggable database created.\n```\n\n现在，作为 `SYS` 连接到新创建的可插拔数据库：\n\n```bash\n$ sqlplus\
    \ sys/foo@'speed2:1521/dkpdb' as sysdba\n```\n\n作为最后一步，运行以下脚本：\n\n```sql\nSQL>\
    \ @?/rdbms/admin/noncdb_to_pdb.sql\n```\n\n你现在应该能够打开可插拔数据库并开始使用它。\n\n## 从 `CDB`\
    \ 卸载可插拔数据库\n\n在将可插拔数据库插入另一个 `CDB` 之前，必须先将其卸载。卸载意味着将可插拔数据库与 `CDB` 解除关联，并生成一个描述被卸载的可插拔数据库的\
    \ `XML` 文件。此 `XML` 文件将来可用于将可插拔数据库插入另一个 `CDB`。\n\n卸载可插拔数据库需要以下步骤：\n\n1.  关闭可插拔数据库（这会将其打开模式更改为\
    \ `MOUNTED`）\n2.  通过 `ALTER PLUGGABLE DATABASE ... UNPLUG` 命令卸载可插拔数据库\n\n首先，作为\
    \ `SYS` 用户连接到根容器，然后关闭可插拔数据库：\n\n```bash\n$ sqlplus / as sysdba\nSQL> alter pluggable\
    \ database dkpdb close immediate;\n```\n\n接下来，卸载可插拔数据库。确保为 `XML` 文件的位置指定一个在你的环境中存在的目录：\n\
    \n```sql\nalter pluggable database dkpdb unplug into\n'/orahome/oracle/dba/dkpdb.xml';\n\
    ```"
  raw: '| Parameter | Description |

    | --- | --- |

    | ADMIN USER | A local user that is created and used for administrative tasks.
    This user is assigned the PDB_DBA role. |

    | MAXSIZE | Maximum amount of storage a pluggable database can consume; if not
    specified, then there is no limit to the amount of storage a pluggable database
    can use |

    | MAX_SHARED_TEMP_SIZE | Maximum amount of shared temporary tablespace that can
    be used by sessions connected to the pluggable database |

    | DEFAULT TABLESPACE | Specifies the default permanent tablespace assigned to
    new users created within the pluggable database |

    | DATAFILE | Path and file name of the data file associated with the default tablespace
    |

    | PATH_PREFIX | Specifies that any new data files added to the pluggable database
    must exist within this directory or its subdirectories |

    | FILE_NAME_CONVERT | Specifies the location of the seed database data files and
    the location where they should be copied |


    Cloning an Existing Pluggable Database


    You can create a pluggable database from an existing pluggable database within
    the currently connected (local) CDB, or you can create a pluggable database as
    a copy of a pluggable database from a remote CDB. These two techniques are detailed
    in the next two sections.


    Local


    In this example an existing pluggable database (SALESPDB) is used to create a
    new pluggable database (SALESPDB2). First, connect to the root container, and
    place the existing source pluggable database in read-only mode:


    ```

    $ sqlplus / as sysdba

    SQL> alter pluggable database salespdb close;

    SQL> alter pluggable database salespdb open read only;

    ```


    Now, run the following SQL to create the new pluggable database:


    ```

    CREATE PLUGGABLE DATABASE salespdb2

    FROM salespdb

    FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/salespdb'',

                         ''/u01/dbfile/CDB/salespb2'')

    STORAGE (MAXSIZE 6G MAX_SHARED_TEMP_SIZE 100M);

    ```


    In the prior example the data files (associated with SALESPDB) in the /u01/app/oracle/oradata/CDB/salespdb
    directory are used to create data files in the /u01/dbfile/CDB/salespdb2 directory.
    The destination directory will be created for you if it doesn’t pre exist. You
    can also specify governing restrictions on the cloned pluggable database, such
    as limiting its maximum size to 6GB and the maximum amount of shared resources
    it can consume in the shared temporary tablespace to 100MB.


    Remote


    You can also create a pluggable database as a clone of a remote pluggable database.
    First, you need to create a database link from the CDB to the pluggable database
    that will serve as the source for the clone. Both the local user and the user
    specified in the database link must have the CREATE PLUGGABLE DATABASE privilege.


    This example shows a local connection as SYS to the root container. This is the
    database in which the new pluggable database will be created:


    ```

    $ sqlplus / as sysdba

    ```


    In this database, create a database link to the pluggable database in the remote
    CDB. The remote CDB contains a pluggable database named SALESPDB, with a user
    that has been created with the CREATE PLUGGABLE DATABASE privilege granted to
    it. This is the user that will be used in the database link:


    ```

    create database link salespdb

    connect to mv_maint identified by foo

    using ''speed2:1521/salespdb'';

    ```


    Next, connect to the remote database that contains the pluggable database that
    will be cloned:


    ```

    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    ```


    Close the pluggable database, and open it in read-only mode:


    ```

    SQL> alter pluggable database salespdb close;

    SQL> alter pluggable database salespdb open read only;

    ```


    Now, connect to the destination CDB as SYS, and create the new  pluggable database
    by cloning the remote pluggable database, as shown:


    ```

    $ sqlplus / as sysdba


    CREATE PLUGGABLE DATABASE salespdb3

    FROM salespdb@salespdb

    FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/salespdb'',

                         ''/u01/dbfile/CDB2/salespdb3'');

    ```


    Cloning from a Non-CDB Database


    There are three ways of creating a pluggable database from an existing non-CDB:


    *   Using the DBMS_PDB package to generate metadata and then creating the pluggable
    database with CREATE PLUGGABLE DATABASE SQL statement

    *   Data Pump (using the transportable tablespace feature)

    *   GoldenGate replication


    The following example uses the DBMS_PDB package to create a pluggable database
    from a non-CDB. For details on Data Pump and GoldenGate, see the *Oracle Database
    Utilities Guide* and GoldenGate-specific documentation, respectively, available
    from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)).


    ![image](Images/sq.jpg) **Note**   When using the DBMS_PDB package to convert
    a non-CDB to a pluggable database, the non-CDB must be Oracle12c or higher.


    First, place the non-CDB in read-only mode:


    ```

    SQL> startup mount;

    SQL> alter database open read only;

    ```


    Then, run the DBMS_PDB package to create an XML file that describes the structure
    of the non-CDB database:


    ```

    BEGIN

      DBMS_PDB.DESCRIBE(pdb_descr_file => ''/orahome/oracle/ncdb.xml'');

    END;

    /

    ```


    After the XML file is created, shut down the non-CDB database:


    ```

    SQL> shutdown immediate;

    ```


    Next, set your oracle OS variables (such as ORACLE_SID and ORACLE_HOME), and connect
    to the CDB database that will house the non-CDB as a pluggable database:


    ```

    $ sqlplus / as sysdba

    ```


    Now, you can optionally check to see if the non-CDB is compatible with the CDB
    in which it will be plugged. When you run this code provide the directory and
    name of the XML file that was created previously:


    ```

    SET SERVEROUTPUT ON

    DECLARE

    hold_var boolean;

    begin

    hold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>''/orahome/oracle/ncdb.xml'');

    if hold_var then

      dbms_output.put_line(''YES'');

    else

      dbms_output.put_line(''NO'');

    end if;

    end;

    /

    ```


    If there are no compatibility issues, a YES is displayed by the prior code; a
    NO is displayed if the pluggable database is not compatible. You can query the
    contents of the PDB_PLUG_IN_VIOLATIONS view for details on why a pluggable database
    is not compatible with a CDB.


    Next, use the following SQL to create a pluggable database from the non-CDB. You
    must specify details such as the name and location of the previously created XML
    file, the location of the non-CDB data files, and the location where you want
    the new data files created:


    ```

    CREATE PLUGGABLE DATABASE dkpdb

    USING ''/orahome/oracle/ncdb.xml''

    COPY

    FILE_NAME_CONVERT = (''/u01/dbfile/dk/'',

                         ''/u01/dbfile/CDB/dkpdb/'');

    ```


    If successful, you should see this:


    ```

    Pluggable database created.

    ```


    Now, connect as SYS to the newly created  pluggable database:


    ```

    $ sqlplus sys/foo@''speed2:1521/dkpdb'' as sysdba

    ```


    As a last step, run the following script:


    ```

    SQL> @?/rdbms/admin/noncdb_to_pdb.sql

    ```


    You should now be able to open the pluggable database and begin using it.


    Unplugging a Pluggable Database from a CDB


    Before plugging a pluggable database into another CDB, it must first be unplugged.
    Unplugging translates to disassociating a pluggable database from a CDB and generating
    an XML file that describes the pluggable database being unplugged. This XML file
    can be used in the future to plug the pluggable database into another CDB.


    Here are the steps required to unplug a pluggable database:


    1.  Close the pluggable database (which changes its open mode to MOUNTED)

    2.  Unplug the pluggable database via the ALTER PLUGGABLE DATABASE ... UNPLUG
    command


    First, connect to the root container as the SYS user, and then close the pluggable
    database:


    ```

    $ sqlplus / as sysdba

    SQL> alter pluggable database dkpdb close immediate;

    ```


    Next, unplug the pluggable database. Make sure you specify a directory that exists
    in your environment for the location of the XML file:


    ```

    alter pluggable database dkpdb unplug into

    ''/orahome/oracle/dba/dkpdb.xml'';

    ```'
