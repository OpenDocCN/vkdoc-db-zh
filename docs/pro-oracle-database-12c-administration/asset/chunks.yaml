    (PORT = 1521)) (CONNECT_DATA = (SERVICE_NAME = DWREP1)))

    OK (20 msec)

    ```


    如果`tnsping`有效，则表示远程监听器已启动并正在工作。这并不一定意味着数据库已启动，因此您可能需要登录到数据库服务器以进行进一步调查。如果`tnsping`无效，则监听器或数据库已关闭或挂起。


    为了进一步调查问题，我会直接登录到服务器执行其他检查，例如检查某个挂载点是否已满。


    ### ORACLE 即时客户端


    我与一些系统管理员和开发人员合作，他们有时需要测试到数据库的远程连接，但无法访问包含`sqlplus`可执行文件的 Oracle 安装。在这种情况下，我建议他们下载并使用
    Oracle Instant Client。它的占用空间非常小，只需几分钟即可安装。步骤如下：


    1.  从 Oracle 网站的技术网络区域下载 Instant Client ([`otn.oracle.com`](http://otn.oracle.com))。

    2.  创建一个目录用于存储文件。

    3.  将文件解压缩到该目录。

    4.  设置`LD_LIBRARY_PATH`和`PATH`变量以包含文件解压缩到的目录。

    5.  使用简单连接语法连接到远程数据库：


    ```

    $ sqlplus user/pass@''host:port/database_service_name''

    ```


    此过程允许您访问`sqlplus`，而无需执行庞大且繁琐的 Oracle 安装。Instant Client 适用于大多数硬件平台（Windows、Mac、Linux
    和 Unix）。


    ## 调查磁盘空间满的问题


    要进一步诊断问题（例如磁盘空间不足），您需要直接登录到远程服务器。通常，您需要以 Oracle 软件的所有者（通常是`oracle`操作系统帐户）身份登录。首次登录到一台机器时，可能导致数据库挂起或出现问题的一个原因是挂载点已满。`df`命令与人类可读的`-h`开关有助于验证磁盘是否已满：


    ```

    $ df -h

    ```


    任何已满的挂载点都需要调查。如果包含`ORACLE_HOME`的挂载点已满，那么在连接到数据库时，您会收到类似以下的错误：


    ```

    Linux Error: 28: No space left on device

    ```


    要解决挂载点已满的问题，首先要确定可以移动或删除的文件。通常，我首先查找旧的跟踪文件；通常可以安全地删除一些旧文件。


    ## 定位告警日志和跟踪文件


    在 Oracle Database 11g 及更高版本中，默认的告警日志目录路径具有以下结构：


    ```

    ORACLE_BASE/diag/rdbms/LOWER(<db_unique_name>)/<instance_name>/trace

    ```


    ![image](img/sq.jpg) **注意**  您可以通过设置`DIAGNOSTIC_DEST`初始化参数来覆盖告警日志的默认目录路径。


    通常，`db_unique_name`与`instance_name`相同。然而，在 RAC 和 Data Guard 环境中，`db_unique_name`通常与`instance_name`不同。您可以通过以下查询验证目录路径：


    ```

    SQL> select value from v$diag_info where name = ''Diag Trace'';

    ```


    告警日志的名称遵循以下格式：


    ```

    alert_<ORACLE_SID>.log

    ```


    您还可以通过以下操作系统命令（无论数据库是否已启动）从操作系统定位告警日志：


    ```

    $ cd $ORACLE_BASE

    $ find . -name alert_<ORACLE_SID>.log

    ```


    在前面的`find`命令中，您需要将`<ORACLE_SID>`值替换为您的数据库名称。'
- fmt: "![image](Images/sq.jpg) `` `Tip` `` For Oracle Database 10g the standard location\
    \ for the alert log is defined as the `` `<ORACLE_BASE>/admin/<SID>/bdump` ``\
    \ directory. The easiest way to determine its location is via the following SQL\
    \ command: `` `show parameter background_dump_dest` ``\n\nAs shown in [Chapter\
    \ 3](#9781430257288_Ch03.xhtml), it’s advisable to set up an OS function that\
    \ helps you navigate to the location of the alert log. Here is such a function\
    \ (you’ll have to modify this to match your environment):\n\n```\nfunction bdump\
    \ {\n  if [ \"$ORACLE_SID\" = \"O12C\" ]; then\n    cd /orahome/app/oracle/diag/rdbms/o12c/O12C/trace\n\
    \  elif [ \"$ORACLE_SID\" = \"O11R2\" ]; then\n    cd /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace\n\
    \  fi\n}\n```\n\nYou can now type `` `bdump` `` and will be placed in the working\
    \ directory that contains the database alert log. Once you have found the correct\
    \ file, inspect the most recent entries for errors, and then look for trace files\
    \ in the same directory:\n\n```\n$ ls -altr *.tr*\n```\n\nIf any of these trace\
    \ files are more than several days old, consider moving or removing them.\n\n\
    ## Removing Files\n\nNeedless to say, be very careful when removing files. When\
    \ trying to resolve issues, the last thing you want to do is make things worse.\
    \ Accidentally removing one critical file can be catastrophic. For any files you\
    \ identify as candidates for deletion, consider moving (instead of deleting) them.\
    \ If you have a mount point that has free space, move the files there, and leave\
    \ them for a couple of days before removing them.\n\n![image](Images/sq.jpg) ``\
    \ `Tip` `` Consider using the Automatic Diagnostic Repository Command Interpreter\
    \ (`` `ADRCI` ``) utility to purge old trace files. For more details, see the\
    \ `` `Oracle Database Utilities Guide` ``, which is available for download from\
    \ the Technology Network area of the Oracle website ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nIf you have identified files that can be removed, first create a list of the\
    \ files that will be removed before you actually delete them. Minimally, I do\
    \ this before removing any file:\n\n```\n$ ls -altr <file_name>\n```\n\nAfter\
    \ viewing the results returned by the `` `ls` `` command, remove the file(s).\
    \ This example uses the Linux/Unix `` `rm` `` command to permanently delete the\
    \ file:\n\n```\n$ rm <file_name>\n```\n\nYou can also remove files based on the\
    \ age of the file. For example, say you determine that any trace files more than\
    \ 2 days old can be safely deleted. Typically, the `` `find` `` command is used\
    \ in conjunction with the `` `rm` `` command to accomplish this task. Before removing\
    \ files, first display the results of the `` `find` `` command:\n\n```\n$ find\
    \ . -type f -mtime +2 -name \"*.tr*\"\n```\n\nIf you are satisfied with the list\
    \ of files, then add the `` `rm` `` command to remove them:\n\n```\n$ find . -type\
    \ f -mtime +2 -name \"*.tr*\" | xargs rm\n```\n\nIn the prior line of code, the\
    \ results of the `` `find` `` command are piped to the `` `xargs` `` command,\
    \ which executes the `` `rm` `` command for every file found by the `` `find`\
    \ `` command. This is an efficient method for deleting files based on age. However,\
    \ be very sure you know which files will be deleted.\n\nAnother file that sometimes\
    \ consumes large amounts of space is the `` `listener.log` `` file. Because this\
    \ file is actively written to by the listener process, you can’t simply remove\
    \ it. If you need to preserve the contents of this file, first copy it to a backup\
    \ location (that contains free disk space), and then truncate the file. In this\
    \ example the `` `listener.log` `` file is copied to `` `/u01/backups` ``, and\
    \ then the file is truncated, as follows:\n\n```\n$ cp listener.log /u01/backups\n\
    ```\n\nNext, use the `` `cat` `` command to replace the contents of the `` `listener.log`\
    \ `` with the `` `/dev/null` `` file (which contains zero bytes):\n\n```\n$ cat\
    \ /dev/null > listener.log\n```\n\n## Inspecting the Alert Log\n\nWhen dealing\
    \ with database issues, the `` `alert.log` `` file should be one of the first\
    \ files you check for relevant error messages. You can use either OS tools or\
    \ the `` `ADRCI` `` utility to view the `` `alert.log` `` file and corresponding\
    \ trace files.\n\n### Viewing the Alert Log via OS Tools"
  raw: '![image](Images/sq.jpg) **Tip**   For Oracle Database 10g the standard location
    for the alert log is defined as the <ORACLE_BASE>/admin/<SID>/bdump directory.
    The easiest way to determine its location is via the following SQL command: show
    parameter background_dump_dest


    As shown in [Chapter 3](#9781430257288_Ch03.xhtml), it’s advisable to set up an
    OS function that helps you navigate to the location of the alert log. Here is
    such a function (you’ll have to modify this to match your environment):


    ```

    function bdump {

      if [ "$ORACLE_SID" = "O12C" ]; then

        cd /orahome/app/oracle/diag/rdbms/o12c/O12C/trace

      elif [ "$ORACLE_SID" = "O11R2" ]; then

        cd /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace

      fi

    }

    ```


    You can now type bdump and will be placed in the working directory that contains
    the database alert log. Once you have found the correct file, inspect the most
    recent entries for errors, and then look for trace files in the same directory:


    ```

    $ ls -altr *.tr*

    ```


    If any of these trace files are more than several days old, consider moving or
    removing them.


    Removing Files


    Needless to say, be very careful when removing files. When trying to resolve issues,
    the last thing you want to do is make things worse. Accidentally removing one
    critical file can be catastrophic. For any files you identify as candidates for
    deletion, consider moving (instead of deleting) them. If you have a mount point
    that has free space, move the files there, and leave them for a couple of days
    before removing them.


    ![image](Images/sq.jpg) **Tip**   Consider using the Automatic Diagnostic Repository
    Command Interpreter (ADRCI) utility to purge old trace files. For more details,
    see the *Oracle Database Utilities Guide*, which is available for download from
    the Technology Network area of the Oracle website ([http://otn.oracle.com](http://otn.oracle.com)).


    If you have identified files that can be removed, first create a list of the files
    that will be removed before you actually delete them. Minimally, I do this before
    removing any file:


    ```

    $ ls -altr <file_name>

    ```


    After viewing the results returned by the ls command, remove the file(s). This
    example uses the Linux/Unix rm command to permanently delete the file:


    ```

    $ rm <file_name>

    ```


    You can also remove files based on the age of the file. For example, say you determine
    that any trace files more than 2 days old can be safely deleted. Typically, the
    f ind command is used in conjunction with the rm command to accomplish this task.
    Before removing files, first display the results of the find command:


    ```

    $ find . -type f -mtime +2 -name "*.tr*"

    ```


    If you are satisfied with the list of files, then add the rm command to remove
    them:


    ```

    $ find . -type f -mtime +2 -name "*.tr*" | xargs rm

    ```


    In the prior line of code, the results of the find command are piped to the x
    args command, which executes the rm command for every file found by the find command.
    This is an efficient method for deleting files based on age. However, be very
    sure you know which files will be deleted.


    Another file that sometimes consumes large amounts of space is the listener.log
    file. Because this file is actively written to by the listener process, you can’t
    simply remove it. If you need to preserve the contents of this file, first copy
    it to a backup location (that contains free disk space), and then truncate the
    file. In this example the listener.log file is copied to ora01/backups, and then
    the file is truncated, as follows:


    ```

    $ cp listener.log /u01/backups

    ```


    Next, use the cat command to replace the contents of the listener.log with the
    /dev/null file (which contains zero bytes):


    ```

    $ cat /dev/null > listener.log

    ```


    Inspecting the Alert Log


    When dealing with database issues, the alert.log file should be one of the first
    files you check for relevant error messages. You can use either OS tools or the
    ADRCI utility to view the alert.log file and corresponding trace files.


    Viewing the Alert Log via OS Tools'
  trans: "\n![image](img/sq.jpg) `` `提示` `` 对于 Oracle Database 10g，告警日志的标准位置定义为 ``\
    \ `<ORACLE_BASE>/admin/<SID>/bdump` `` 目录。确定其位置最简单的方法是通过以下 SQL 命令： `` `show parameter\
    \ background_dump_dest` ``\n\n如 第 3 章 所示，建议设置一个操作系统函数，以帮助您导航到告警日志的位置。下面就是一个这样的函数（您需要修改它以匹配您的环境）：\n\
    \n```\nfunction bdump {\n  if [ \"$ORACLE_SID\" = \"O12C\" ]; then\n    cd /orahome/app/oracle/diag/rdbms/o12c/O12C/trace\n\
    \  elif [ \"$ORACLE_SID\" = \"O11R2\" ]; then\n    cd /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace\n\
    \  fi\n}\n```\n\n现在您可以输入 `` `bdump` ``，就会进入包含数据库告警日志的工作目录。找到正确的文件后，检查最近的条目是否有错误，然后在同一目录中查找跟踪文件：\n\
    \n```\n$ ls -altr *.tr*\n```\n\n如果其中任何跟踪文件已有几天历史，请考虑移动或删除它们。\n\n## 删除文件\n\n不用说，删除文件时要非常小心。尝试解决问题时，您最不想做的事情就是让情况变得更糟。意外删除一个关键文件可能是灾难性的。对于您确定为删除候选的任何文件，请考虑移动（而不是删除）它们。如果您有一个有可用空间的挂载点，将文件移到那里，保留几天后再删除。\n\
    \n![image](img/sq.jpg) `` `提示` `` 考虑使用自动诊断资料库命令解释程序（`` `ADRCI` ``）实用程序来清除旧的跟踪文件。有关更多详细信息，请参阅\
    \ `` `Oracle Database Utilities Guide` ``，可从 Oracle 网站的技术网络区域下载 ([`otn.oracle.com`](http://otn.oracle.com))。\n\
    \n如果您已确定可以删除的文件，请在实际删除它们之前，首先创建一个将被删除的文件列表。至少，我在删除任何文件之前都会这样做：\n\n```\n$ ls -altr\
    \ <file_name>\n```\n\n查看 `` `ls` `` 命令返回的结果后，删除文件。此示例使用 Linux/Unix 的 `` `rm` ``\
    \ 命令永久删除文件：\n\n```\n$ rm <file_name>\n```\n\n您也可以根据文件的年龄删除文件。例如，假设您确定所有超过 2 天的跟踪文件都可以安全删除。通常，``\
    \ `find` `` 命令与 `` `rm` `` 命令结合使用来完成此任务。在删除文件之前，首先显示 `` `find` `` 命令的结果：\n\n```\n\
    $ find . -type f -mtime +2 -name \"*.tr*\"\n```\n\n如果您对文件列表满意，则添加 `` `rm` `` 命令来删除它们：\n\
    \n```\n$ find . -type f -mtime +2 -name \"*.tr*\" | xargs rm\n```\n\n在前面的代码行中，``\
    \ `find` `` 命令的结果通过管道传递给 `` `xargs` `` 命令，该命令对 `` `find` `` 命令找到的每个文件执行 `` `rm`\
    \ `` 命令。这是一种基于文件年龄删除文件的高效方法。但是，请务必确认您知道将要删除哪些文件。\n\n另一个有时会占用大量空间的文件是 `` `listener.log`\
    \ `` 文件。由于此文件由侦听器进程频繁写入，因此不能简单地删除它。如果您需要保留此文件的内容，请首先将其复制到有可用磁盘空间的备份位置，然后截断该文件。在此示例中，``\
    \ `listener.log` `` 文件被复制到 `` `/u01/backups` ``，然后截断该文件，如下所示：\n\n```\n$ cp listener.log\
    \ /u01/backups\n```\n\n接下来，使用 `` `cat` `` 命令将 `` `listener.log` `` 的内容替换为 `` `/dev/null`\
    \ `` 文件（该文件包含零字节）：\n\n```\n$ cat /dev/null > listener.log\n```\n\n## 检查告警日志\n\n\
    处理数据库问题时，`` `alert.log` `` 文件应该是您首先检查相关错误消息的文件之一。您可以使用操作系统工具或 `` `ADRCI` `` 实用程序来查看\
    \ `` `alert.log` `` 文件和相应的跟踪文件。\n\n### 通过操作系统工具查看告警日志\n"
- fmt: "# 查看警报日志\n\n导航到包含 `alert.log` 的目录后，您可以通过查看文件末尾（最下方）来查看最新的消息（换句话说，最新的消息被写入文件末尾）。要查看最后\
    \ 50 行，请使用 `tail` 命令：\n\n```\n$ tail -50 alert_<SID>.log\n```\n\n您可以使用 `-f` 开关来持续查看最新的条目：\n\
    \n```\n$ tail -f alert_<SID>.log\n```\n\n您也可以直接用操作系统编辑器（如 `vi`）打开 `alert.log`：\n\
    \n```\n$ vi alert_<SID>.log\n```\n\n有时，定义一个函数会很方便，它可以让您无论当前工作目录如何，都能打开 `alert.log`。接下来的几行代码定义了一个函数，该函数使用\
    \ `view` 命令定位并打开 `alert.log`：\n\n```\n#-----------------------------------------------------------#\n\
    # view alert log\n  function valert {\n  if [ \"$ORACLE_SID\" = \"O12C\" ]; then\n\
    \    view /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/alert_O12C.log\n  elif\
    \ [ \"$ORACLE_SID\" = \"O11R2\" ]; then\n    view /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace/alert_O11R2.log\n\
    \  fi\n  } # valert\n#-----------------------------------------------------------#\n\
    ```\n\n通常，这些代码行会被放置在启动文件中，以便在您登录服务器时自动定义该函数。一旦函数定义完成，您就可以通过输入以下命令来查看 `alert.log`：\n\
    \n```\n$ valert\n```\n\n在检查 `alert.log` 末尾时，寻找指示以下类型问题的错误：\n\n*   归档进程挂起，原因是磁盘空间不足\n\
    *   文件系统空间不足\n*   表空间空间不足\n*   缓冲区高速缓存或共享池内存耗尽\n*   媒体错误，表明数据文件丢失或损坏\n*   表明归档重做日志写入存在问题的错误；例如：\n\
    \n```\nORA-19502: write error on file \"/ora01/fra/o12c/archivelog/...\n```\n\n\
    对于 `alert.log` 文件中列出的严重错误消息，几乎总是存在相应的跟踪文件。例如，以下是前述错误消息的伴随消息：\n\n```\nErrors in\
    \ file /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_5665.trc\n```\n\
    \n检查跟踪文件通常（但不总是）能提供有关该问题的更多见解。\n\n# 使用 ADRCI 工具查看警报日志\n\n对于 Oracle Database 11g\
    \ 或更高版本，您可以使用 `ADRCI` 实用程序查看 `alert.log` 文件的内容。从操作系统运行以下命令以启动 `ADRCI` 实用程序：\n\n\
    ```\n$ adrci\n```\n\n您应该会看到一个提示符：\n\n```\nadrci>\n```\n\n使用 `SHOW ALERT` 命令查看\
    \ `alert.log` 文件：\n\n```\nadrci> show alert\n```\n\n如果服务器上有多个 Oracle 主目录，系统将提示您选择要查看哪个\
    \ `alert.log`。`SHOW ALERT` 命令将使用设置为操作系统默认编辑器的实用程序打开 `alert.log`。在 Linux/Unix 系统上，默认编辑器源自\
    \ `EDITOR` 环境变量（通常设置为 `vi` 等实用程序）。\n\n![image](Images/sq.jpg) **提示** 当显示 `alert.log`\
    \ 时，如果您不熟悉 `vi` 并且想要退出，请先按 Escape 键，然后按住 Shift 键的同时按冒号 (`:`) 键。接下来，输入 `q!`。这应该会让您退出\
    \ `vi` 编辑器并返回到 `ADRCI` 提示符。\n\n您可以使用 `SET EDITOR` 命令在 `ADRCI` 中覆盖默认编辑器。此示例将默认编辑器设置为\
    \ `emacs`：\n\n```\nadrci> set editor emacs\n```\n\n您可以使用 `TAIL` 选项查看 `alert.log`\
    \ 中最后 N 行。以下命令显示 `alert.log` 的最后 50 行：\n\n```\nadrci> show alert -tail 50\n```\n\
    \n如果您有多个 Oracle 主目录，可能会看到类似以下的消息：\n\n```\nDIA-48449: Tail alert can only apply\
    \ to single ADR home\n```\n\n`ADRCI` 实用程序不会假设您想要在服务器上处理一个 Oracle 主目录而非另一个。要专门为\
    \ `ADRCI` 实用程序设置 Oracle 主目录，请首先使用 `SHOW HOMES` 命令显示所有可用的 Oracle 主目录："
  raw: "After navigating to the directory that contains the alert.log, you can see\
    \ the most current messages by viewing the end (furthest down) of the file (in\
    \ other words, the most current messages are written to the end of the file).\
    \ To view the last 50 lines, use the tail command:\n\n```\n$ tail -50 alert_<SID>.log\n\
    ```\n\nYou can continuously view the most current entries by using the f switch:\n\
    \n```\n$ tail -f alert_<SID>.log\n```\n\nYou can also directly open the alert.log\
    \ with an OS editor (such as vi):\n\n```\n$ vi alert_<SID>.log\n```\n\nSometimes,\
    \ it’s handy to define a function that will allow you to open the alert.log, regardless\
    \ of your current working directory. The next few lines of code define a function\
    \ that locates and opens the alert.log with the v iew command:\n\n```\n#-----------------------------------------------------------#\n\
    # view alert log\n  function valert {\n  if [ \"$ORACLE_SID\" = \"O12C\" ]; then\n\
        view /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/alert_O12C.log\n  elif\
    \ [ \"$ORACLE_SID\" = \"O11R2\" ]; then\n    view /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace/alert_O11R2.log\n\
      fi\n  } # valert\n#-----------------------------------------------------------#\n\
    ```\n\nUsually, the prior lines of code are placed in a startup file so that the\
    \ function is automatically defined when you log in to a server. Once the function\
    \ is defined, you can view the a lert.log by typing this command:\n\n```\n$ valert\n\
    ```\n\nWhen inspecting the end of the a lert.log, look for errors that indicate\
    \ these types of issues:\n\n*   Archiver process hung, owing to inadequate disk\
    \ space\n*   File system out of space\n*   Tablespace out of space\n*   Running\
    \ out of memory in the buffer cache or shared pool\n*   Media error indicating\
    \ that a data file is missing or damaged\n*   Error indicating an issue with writing\
    \ an archive redo log; for example,\n\n```\n    ORA-19502: write error on file\
    \ \"/ora01/fra/o12c/archivelog/...\n    ```\n\nFor a serious error message listed\
    \ in the alert.log file, there is almost always a corresponding trace file. For\
    \ example, here is the accompanying message for the prior error message:\n\n```\n\
    Errors in file /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_5665.trc\n\
    ```\n\nInspecting the trace file will often (but not always) provide additional\
    \ insight into the issue.\n\nViewing the Alert Log Using the ADRCI Utility\n\n\
    With Oracle Database 11g or higher, you can use the ADRCI utility to view the\
    \ contents of the alert.log file. Run the following command from the OS to start\
    \ the ADRCI utility:\n\n```\n$ adrci\n```\n\nYou should be presented with a prompt:\n\
    \n```\nadrci>\n```\n\nUse the S HOW ALERT command to view the alert.log file:\n\
    \n```\nadrci> show alert\n```\n\nIf there are multiple Oracle homes on the server,\
    \ then you will be prompted to choose which alert.log you want to view. The S\
    \ HOW ALERT command will open the alert.log with the utility that has been set\
    \ as the default editor for your OS. On Linux/Unix systems the default editor\
    \ is derived from the OS EDITOR variable (which is usually set to a utility such\
    \ as vi).\n\n![image](Images/sq.jpg) **Tip**   When presented with the alert.log,\
    \ if you are unfamiliar with vi, and want to exit, first press the Escape key,\
    \ then press and hold down the Shift key while pressing the colon (:) key. Next,\
    \ type q!. That should exit you out of the vi editor and back to the ADRCI prompt.\n\
    \nYou can override the default editor within ADRCI, using the S ET EDITOR command.\
    \ This example sets the default editor to emacs:\n\n```\nadrci> set editor emacs\n\
    ```\n\nYou can view the last N number of lines in the a lert.log with the T AIL\
    \ option. The following command shows the last 50 lines of the alert.log:\n\n\
    ```\nadrci> show alert -tail 50\n```\n\nIf you have multiple Oracle homes, you\
    \ may see a message such as this:\n\n```\nDIA-48449: Tail alert can only apply\
    \ to single ADR home\n```\n\nThe ADRCI utility doesn’t assume that you want to\
    \ work with one Oracle home over another on a server. To specifically set the\
    \ Oracle home for the ADRCI utility, first use the S HOW HOMES command to display\
    \ all available Oracle homes:"
  trans: "\n# 查看警报日志\n\n导航到包含 `alert.log` 的目录后，您可以通过查看文件末尾（最下方）来查看最新的消息（换句话说，最新的消息被写入文件末尾）。要查看最后\
    \ 50 行，请使用 `tail` 命令：\n\n```\n$ tail -50 alert_<SID>.log\n```\n\n您可以使用 `-f` 开关来持续查看最新的条目：\n\
    \n```\n$ tail -f alert_<SID>.log\n```\n\n您也可以直接用操作系统编辑器（如 `vi`）打开 `alert.log`：\n\
    \n```\n$ vi alert_<SID>.log\n```\n\n有时，定义一个函数会很方便，它可以让您无论当前工作目录如何，都能打开 `alert.log`。接下来的几行代码定义了一个函数，该函数使用\
    \ `view` 命令定位并打开 `alert.log`：\n\n```\n#-----------------------------------------------------------#\n\
    # 查看警报日志\n  function valert {\n  if [ \"$ORACLE_SID\" = \"O12C\" ]; then\n   \
    \ view /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/alert_O12C.log\n  elif [\
    \ \"$ORACLE_SID\" = \"O11R2\" ]; then\n    view /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace/alert_O11R2.log\n\
    \  fi\n  } # valert\n#-----------------------------------------------------------#\n\
    ```\n\n通常，这些代码行会被放置在启动文件中，以便在您登录服务器时自动定义该函数。一旦函数定义完成，您就可以通过输入以下命令来查看 `alert.log`：\n\
    \n```\n$ valert\n```\n\n在检查 `alert.log` 末尾时，寻找指示以下类型问题的错误：\n\n*   归档进程挂起，原因是磁盘空间不足\n\
    *   文件系统空间不足\n*   表空间空间不足\n*   缓冲区高速缓存或共享池内存耗尽\n*   媒体错误，表明数据文件丢失或损坏\n*   表明归档重做日志写入存在问题的错误；例如：\n\
    \n```\nORA-19502: write error on file \"/ora01/fra/o12c/archivelog/...\n```\n\n\
    对于 `alert.log` 文件中列出的严重错误消息，几乎总是存在相应的跟踪文件。例如，以下是前述错误消息的伴随消息：\n\n```\nErrors in\
    \ file /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_5665.trc\n```\n\
    \n检查跟踪文件通常（但不总是）能提供有关该问题的更多见解。\n\n# 使用 ADRCI 工具查看警报日志\n\n对于 Oracle Database 11g\
    \ 或更高版本，您可以使用 `ADRCI` 实用程序查看 `alert.log` 文件的内容。从操作系统运行以下命令以启动 `ADRCI` 实用程序：\n\n\
    ```\n$ adrci\n```\n\n您应该会看到一个提示符：\n\n```\nadrci>\n```\n\n使用 `SHOW ALERT` 命令查看\
    \ `alert.log` 文件：\n\n```\nadrci> show alert\n```\n\n如果服务器上有多个 Oracle 主目录，系统将提示您选择要查看哪个\
    \ `alert.log`。`SHOW ALERT` 命令将使用设置为操作系统默认编辑器的实用程序打开 `alert.log`。在 Linux/Unix 系统上，默认编辑器源自\
    \ `EDITOR` 环境变量（通常设置为 `vi` 等实用程序）。\n\n![image](img/sq.jpg) **提示** 当显示 `alert.log`\
    \ 时，如果您不熟悉 `vi` 并且想要退出，请先按 Escape 键，然后按住 Shift 键的同时按冒号 (`:`) 键。接下来，输入 `q!`。这应该会让您退出\
    \ `vi` 编辑器并返回到 `ADRCI` 提示符。\n\n您可以使用 `SET EDITOR` 命令在 `ADRCI` 中覆盖默认编辑器。此示例将默认编辑器设置为\
    \ `emacs`：\n\n```\nadrci> set editor emacs\n```\n\n您可以使用 `TAIL` 选项查看 `alert.log`\
    \ 中最后 N 行。以下命令显示 `alert.log` 的最后 50 行：\n\n```\nadrci> show alert -tail 50\n```\n\
    \n如果您有多个 Oracle 主目录，可能会看到类似以下的消息：\n\n```\nDIA-48449: Tail alert can only apply\
    \ to single ADR home\n```\n\n`ADRCI` 实用程序不会假设您想要在服务器上处理一个 Oracle 主目录而非另一个。要专门为\
    \ `ADRCI` 实用程序设置 Oracle 主目录，请首先使用 `SHOW HOMES` 命令显示所有可用的 Oracle 主目录：\n"
- fmt: '## Identifying Bottlenecks via OS Utilities


    In the Oracle world there is sometimes a tendency to assume that you have a dedicated
    machine for one Oracle database. Furthermore, this database is the latest version
    of Oracle, fully patched, and monitored by a sophisticated graphical tool. This
    database environment is completely automated and kept trouble free through the
    use of visual tools that quickly pinpoint problems and efficiently isolate and
    resolve issues. If you live in this ideal world, then you probably don’t need
    any of the material in this chapter.


    Let me paint a slightly different picture. I have an environment in which one
    machine has a dozen databases running on it. There’s a MySQL database, a PostgreSQL
    database, and a mix of Oracle version 10g, 11g, and 12c databases. Furthermore,
    many of these old databases are on nonterminal releases of Oracle and are therefore
    not supported by Oracle Support. There are no plans to upgrade any of these unsupported
    databases because the business can’t take the risk of potentially breaking the
    applications that depend on these databases.


    So, what does one do in this type of environment when somebody reports that a
    database application is performing poorly? In this scenario it’s often something
    in a different database that is causing other applications on the box to behave
    poorly. It may not be an Oracle process or an Oracle database that is causing
    problems.


    In this situation it’s almost always more effective to start investigating issues
    by using an OS tool. The OS tools are database agnostic. OS performance utilities
    help pinpoint where the most resources are consumed, regardless of database vendor
    or version.


    In Linux/Unix environments there are several tools available for monitoring resource
    usage. [Table 22-1](#9781430257288_Ch22.xhtml#Tab1) summarizes the most commonly
    used OS utilities for diagnosing performance issues. Being familiar with how these
    OS commands work and how to interpret the output will allow you to better diagnose
    server performance issues, especially when it’s a non-Oracle or even a nondatabase
    process that is tanking performance for every other application on the box.


    [Table 22-1.](#9781430257288_Ch22.xhtml#_Tab1) Performance and Monitoring Utilities


    | Tool | Purpose |

    | --- | --- |

    | `vmstat` | Monitors processes, CPU, memory, and disk I/O bottlenecks |

    | `top` | Identifies sessions consuming the most resources |

    | `watch` | Periodically runs another command |

    | `ps` | Identifies highest CPU- and memory-consuming sessions; used to identify
    Oracle sessions consuming the most system resources |

    | `mpstat` | Reports CPU statistics |

    | `sar` | Displays CPU, memory, disk I/O, and network usage, both current and
    historical |

    | `free` | Displays free and used memory |

    | `df` | Reports on free disk space |

    | `du` | Displays disk usage |

    | `iostat` | Displays disk I/O statistics |

    | `netstat` | Reports on network statistics |


    When diagnosing performance issues, it’s useful to determine where the OS is constrained.
    For instance, try to identify whether the issue is related to CPU, memory, or
    I/O, or a combination of these.


    ### Identifying System Bottlenecks


    Whenever there are application performance issues or availability problems, seemingly
    (from the DBA’s perspective), the first question asked is, “What’s wrong with
    the database?” Regardless of the source of the problem, the onus is often on the
    DBA to establish whether the database is behaving well. I usually approach this
    issue by determining which system-wide resources are being consumed. There are
    two Linux/Unix OS tools that are particularly useful for displaying system-wide
    resource usage:


    *   `vmstat`

    *   `top`


    The `vmstat` (virtual memory statistics) tool is intended to help you quickly
    identify bottlenecks on your server. The `top` utility provides a dynamic, real-time
    view of system resource usage. These two utilities are discussed in the next two
    sections.


    ### Using vmstat


    The `vmstat` utility displays real-time performance information about processes,
    memory, paging, disk I/O, and CPU usage. This example shows using `vmstat` to
    display the default output, with no options specified:


    ```

    $ vmstat

    procs  -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

     r  b   swpd   free   buff  cache    si   so    bi    bo   in    cs us sy id wa

    14  0  52340  25272   3068 1662704    0    0    63    76    9    31 15  1 84  0

    ```


    Here are some general heuristics you can use when interpreting the output of `vmstat`:


    *   If the `wa` (time waiting for I/O) column is high, this is usually an indication
    that the storage subsystem is overloaded.

    *   If `b` (processes sleeping) is consistently greater than 0, then you may not
    have enough CPU processing power.

    *   If `so` (memory swapped out to disk) and `si` (memory swapped in from disk)
    are consistently greater than 0, you may have a memory bottleneck.


    By default only one line of server statistics is displayed when running `vmstat`
    (without supplying any options). This one line of output gives average statistics
    calculated from the last time the system was rebooted. This is fine for a quick
    snapshot. However, if you want to gather metrics over a period of time, use `vmstat`
    with this syntax:


    ```

    $ vmstat <interval in seconds> <number of intervals>

    ```


    While in this mode, `vmstat` reports statistics, sampling from one interval to
    the next. For example, if you wanted to report system statistics every 2 seconds,
    for ten intervals, you’d issue this command:


    ```

    $ vmstat 2 10

    ```


    You can also send the `vmstat` output to a file. This is useful for analyzing
    historical performance over a period of time. This example samples statistics
    every 5 seconds, for a total of 60 reports, and records the output in a file:


    ```

    $ vmstat 5 60 > vmout.perf

    ```


    Additionally, the `vmstat` utility can be used with the `watch` tool. The `watch`
    command is used to execute another program on a periodic basis. In this example,
    `watch` runs the `vmstat` command every 5 seconds and highlights on the screen
    any differences between each snapshot:


    ```

    $ watch –n 5 –d vmstat

    Every 5.0s: vmstat                                    Thu Aug  9 13:27:57 2007

    procs -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

     r  b   swpd   free   buff  cache  si   so    bi    bo   in    cs us sy id wa

     0  0    144  15900  64620 1655100   0    0     1     7   16     4  0  0 99  0

    ```


    When running `vmstat` in `watch -d` (differences) mode, you’ll visually see changes
    on your screen, from snapshot to snapshot. To exit `watch`, press Ctrl+C.


    Note that the default unit of measure for the memory columns of `vmstat` is kilobytes.
    If you want to view the memory statistics in megabytes, then use the `–S m` (statistics
    in megabytes) option:


    ```

    $ vmstat –S m

    ```


    ![image](Images/sq.jpg) **Tip**   Use the `man vmstat` or `vmstat --help` command
    for further documentation on this utility.


    ### Using top


    ```

    adrci> show homes

    ```


    Here is some sample output for this server:


    ```

    diag/rdbms/o12c/O12C

    diag/rdbms/o12cp/O12CP

    ```


    Now, use the `SET HOMEPATH` command. This sets the `HOMEPATH` to `diag/rdbms/e64208/E64208`:


    ```

    adrci> set homepath  diag/rdbms/o12c/O12C

    ```


    To continuously display the end of the file, use this command:


    ```

    adrci> show alert -tail -f

    ```


    Press Ctrl+C to break off continuously viewing the `alert.log` file. To display
    lines from the `alert.log` that contain specific strings, use the `MESSAGE_TEXT
    LIKE` command. This example shows messages that contain the `ORA-27037` string:


    ```

    adrci> show alert -p "MESSAGE_TEXT LIKE ''%ORA-27037%''"

    ```


    You will be presented with a file that contains all the lines in the `alert.log`
    that match the specified string.


    ![image](Images/sq.jpg) **Tip**   See the *Oracle Database Utilities Guide* for
    full details on how to use the ADRCI utility.'
