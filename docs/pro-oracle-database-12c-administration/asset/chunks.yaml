    \       s2\n    ,v$locked_object lo\n    ,v$sqlarea       b1\n    ,v$sqlarea \
    \      w1\n    ,dba_objects     do\nwhere s1.sid = l1.sid\nand s2.sid = l2.sid\n\
    and l1.id1 = l2.id1\nand s1.sid = lo.session_id\nand lo.object_id = do.object_id\n\
    and l1.block = 1\nand s1.prev_sql_addr = b1.address\nand s2.sql_address = w1.address\n\
    and l2.request > 0;\n```\n\n此查询的输出可能较长，无法在一页内显示。运行时需根据屏幕大小调整格式。以下是一个示例输出，显示`SALES`表被锁定，另一个进程正在等待锁释放：\n\
    ```sql\nBLKG_USER  BLKG_MACHI  BLKG_SID BLKG_SERIALNUM BLKG_OS_PID\n----------\
    \ ---------- --------- -------------- ------------------------\nBLKG_SQL     \
    \                                                C WAIT_USER  WAIT_MACHI\n--------------------------------------------------\
    \ - ---------- ----------\nWAIT_SID WAIT_SERIALNUM WAIT_OS_PID\n-------- --------------\
    \ ------------------------\nWAIT_SQL                                         \
    \            BLKD_OBJ_ID OBJ_OWN\n--------------------------------------------------\
    \ ----------- ----------\nOBJ_NAME\n\nMV_MAINT   speed2            32        \
    \    487 26216\nupdate sales set sales_amt=100 where sales_id=1      MV_MAINT\
    \   speed2\n     116            319 25851\n```\n\n这种情况通常发生在应用程序未在代码中适时显式提交`COMMIT`或回滚`ROLLBACK`时。这会在行上留下锁，阻止事务继续，直到锁被释放。在此场景中，您可以尝试找到阻塞事务的用户，查看该用户是否需要点击类似“提交更改”的按钮。如果不可行，可以手动终止其中一个会话。请注意，终止会话可能会产生不可预见的影响（例如回滚用户认为已提交的数据）。\n\
    \n## 杀会话的方法\n\n### 使用 SQL 命令\n如果决定终止用户会话，需要确定要终止会话的`SID`和序列号。确定后，使用`ALTER SYSTEM\
    \ KILL SESSION`语句终止会话：\n```sql\nSQL> alter system kill session '32,487';\n```\n\
    请再次注意，在终止会话时要谨慎。确保您了解终止会话并回滚该会话中所有当前打开的活动事务的影响。\n\n### 使用操作系统命令\n另一种终止会话的方法是使用操作系统命令，如`kill`。在之前的输出中，您可以从`BLKG_OS_PID`和`WAIT_OS_PID`列识别操作系统进程。在终止操作系统进程之前，请确保该进程不关键。对于本例，要终止阻塞的操作系统进程，首先检查阻塞的`PID`：\n\
    ```bash\n$ ps -ef | grep 26216\n```\n示例输出如下：\n```bash\noracle   26222 26216  0\
    \ 16:49 ?        00:00:00 oracleo12c\n```\n接着，使用`kill`命令：\n```bash\n$ kill -9\
    \  26216\n```\n`kill`命令会直接终止进程。与该进程关联的所有打开的事务将由 Oracle 进程监视器回滚。\n\n## 解决开放游标问题\n\
    \n### 理解问题\n`OPEN_CURSORS`初始化参数决定了一个会话可以打开的最大游标数。此设置是按会话的。默认值 50 对于任何应用程序来说通常都太低。当应用程序超过允许的开放游标数时，会抛出以下错误：\n\
    ```sql\nORA-01000: maximum open cursors exceeded\n```\n通常，此错误在以下情况下遇到：\n- `OPEN_CURSORS`初始化参数设置过低\n\
    - 开发人员编写的代码未正确关闭游标\n\n### 调查开放游标问题\n要调查此问题，首先确定参数的当前设置：\n```sql\nSQL> show parameter\
    \ open_cursors;\n```\n如果该值小于 300，请考虑将其设置得更高。对于繁忙的`OLTP`系统，我通常将此值设置为 1000。可以在数据库打开时动态修改该值：\n\
    ```sql\nSQL> alter system set open_cursors=1000;\n```\n如果您使用的是`spfile`，请考虑同时在内存和`spfile`中进行更改：\n\
    ```sql\nSQL> alter system set open_cursors=1000 scope=both;\n```\n将`OPEN_CURSORS`设置为更高值后，如果应用程序继续超过最大值，那么很可能存在未正确关闭游标的代码问题。\n\
    \n在拥有数千个数据库连接的环境中，您可能只想查看消耗游标最多的前几个会话。以下查询使用内联视图和伪列`ROWNUM`显示前 20 个值：\n```sql\n\
    select * from (\nselect a.value, c.username, c.machine, c.sid, c.serial#\nfrom\
    \ v$sesstat  a\n    ,v$statname b\n    ,v$session  c\nwhere a.statistic# = b.statistic#\n\
    and   c.sid        = a.sid\nand   b.name       = 'opened cursors current'\nand\
    \   a.value      != 0\nand   c.username IS NOT NULL\norder by 1 desc,2)\nwhere\
    \ rownum < 21;\n```\n如果单个会话有超过 1000 个开放游标，那么代码可能存在问题导致游标未关闭。当达到限制时，应检查应用程序代码以确定是否有游标未关闭。\n\
    \n`![image](img/sq.jpg) **提示**` 建议您查询`V$SESSION`而不是`V$OPEN_CURSOR`来确定开放游标数。`V$SESSION`提供了当前开放游标数的更准确计数。\n\
    \n## 排查 Undo 表空间问题\n\nUndo 表空间的问题通常表现为以下几种情况：\n- `ORA-01555: snapshot too old`\n\
    - `ORA-30036: unable to extend segment by ... in undo tablespace 'UNDOTBS1'`\n\
    \n上述错误可能由多种问题引起，例如 Undo 表空间大小不正确，或 SQL/PL/SQL 代码编写不当。\n\n### 确定 Undo 表空间大小是否合适\n\
    假设您有一个运行时间很长的 SQL 语句，抛出了`ORA-01555: snapshot too old`错误，您想确定向 Undo 表空间添加空间是否有助于缓解此问题。运行以下查询以识别\
    \ Undo 表空间的潜在问题。该查询检查过去一天内发生的问题：\n```sql\nselect to_char(begin_time,'MM-DD-YYYY\
    \ HH24:MI') begin_time\n,ssolderrcnt    ORA_01555_cnt, nospaceerrcnt  no_space_cnt\n\
    ,txncount       max_num_txns, maxquerylen    max_query_len\n,expiredblks    blck_in_expired\n\
    from v$undostat\nwhere begin_time > sysdate - 1\norder by begin_time;\n```\n以下是一些示例输出（部分内容已省略以适应页面）：\n\
    ```sql\nBEGIN_TIME       ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS BLCK_IN_EXPIRED\n\
    ---------------- ------------- ------------ ------------ ---------------\n01-31-2013\
    \ 08:21             0            0           51               0\n01-31-2013 08:31\
    \             0            0            0               0\n01-31-2013 12:11  \
    \           0            0          629             256\n```\n`ORA_01555_CNT`列表示您的数据库遇到`ORA-01555:\
    \ snapshot too old`错误的次数。如果此列报告非零值，您需要执行以下一项或多项任务。\n"
- fmt: "# Oracle Undo 和 Temporary Tablespace 性能调优\n\n*   确保代码中不包含游标循环内的`COMMIT`语句。\n\
    *   调优抛出错误的SQL语句使其运行更快。\n*   确保你拥有良好的统计信息（以便你的SQL高效运行）。\n*   增加`UNDO_RETENTION`初始化参数。\n\
    \n`NO_SPACE_CNT`列显示在undo表空间中请求空间的次数。在此示例中，没有此类请求。如果`NO_SPACE_CNT`报告非零值，你可能需要为你的undo表空间添加更多空间。\n\
    \n`V$UNDOSTAT`视图中最多存储4天的信息。统计信息每10分钟收集一次，表中最多有576行。如果你在过去4天内停止并启动了数据库，此视图将仅包含自上次启动数据库以来的信息。\n\
    \n获取关于undo表空间大小调整建议的另一种方法是使用Oracle Undo Advisor，你可以通过从`SELECT`语句中查询`PL/SQL`包`DBMS_UNDO_ADV`来调用它。以下查询显示当前undo大小以及`undo\
    \ retention`设置为900秒时的推荐大小：\n\n```sql\nselect\n  sum(bytes)/1024/1024         \
    \         cur_mb_size\n ,dbms_undo_adv.required_undo_size(900) req_mb_size\nfrom\
    \ dba_data_files\nwhere tablespace_name =\n  (select\n     value\n   from v$parameter\n\
    \   where name = 'undo tablespace');\n```\n\n以下是一些示例输出：\n\n```\nCUR_MB_SIZE REQ_MB_SIZE\n\
    ----------- -----------\n      36864       20897\n```\n\n输出显示undo表空间当前分配了36.8GB。在之前的查询中，你使用了900秒作为在undo表空间中保留信息的时间。为了保留undo信息900秒，Oracle\
    \ Undo Advisor估计undo表空间应为20.8GB。在此示例中，undo表空间大小是足够的。如果大小不足，你将不得不向现有数据文件添加空间，或者向undo表空间添加一个数据文件。\n\
    \n以下是一个稍微复杂的使用Oracle Undo Advisor查找所需undo表空间大小的示例。此示例使用`PL/SQL`显示有关潜在问题的信息以及修复问题的建议：\n\
    \n```sql\nSET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro    VARCHAR2(200);\n  rec\
    \    VARCHAR2(200);\n  rtn    VARCHAR2(200);\n  ret    NUMBER;\n  utb    NUMBER;\n\
    \  retval NUMBER;\nBEGIN\n  DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n\
    \  DBMS_OUTPUT.PUT_LINE('Required Undo Size (megabytes): ' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE\
    \ (900));\n  retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n \
    \ DBMS_OUTPUT.PUT_LINE('Problem:   ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice:\
    \    ' || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational:  ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention:\
    \ ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize:   ' || TO_CHAR(utb));\n\
    END;\n/\n```\n\n如果没有发现问题，保留大小将返回0。以下是一些示例输出：\n\n```\nFinding 1:The undo tablespace\
    \ is OK.\nRequired Undo Size (megabytes): 64\nProblem:   No problem found\nAdvice:\n\
    Rational:\nRetention: 0\nUTBSize:   0\n```\n\n## 查看消耗Undo空间的SQL\n\n有时，一段代码没有正确提交（`commit`），这导致大量空间在undo表空间中被分配且永远不会被释放。迟早，你会收到`ORA-30036`错误，指示表空间无法扩展。通常，第一次出现与空间相关的错误时，我只需增加与undo表空间关联的其中一个数据文件的大小。\n\
    \n然而，如果一条SQL语句继续运行并填满新添加的空间，那么问题可能出在编写不当的应用程序上。例如，开发人员可能在代码中没有适当的提交语句。\n\n在这些情况下，识别哪些用户正在消耗undo表空间中的空间很有帮助。运行此查询以报告有关每个用户分配空间的基本信息：\n\
    \n```sql\nselect s.sid, s.serial#, s.osuser, s.logon_time\n,s.status, s.machine\n\
    ,t.used_ublk, t.used_ublk*16384/1024/1024 undo_usage_mb\nfrom v$session     s\n\
    \    ,v$transaction t\nwhere t.addr = s.taddr;\n```\n\n如果你想查看与消耗undo空间的用户关联的SQL语句，则连接到`V$SQL`，如下所示：\n\
    \n```sql\nselect s.sid, s.serial#, s.osuser, s.logon_time, s.status\n,s.machine,\
    \ t.used_ublk\n,t.used_ublk*16384/1024/1024 undo_usage_mb\n,q.sql_text\nfrom v$session\
    \     s\n    ,v$transaction t\n    ,v$sql         q\nwhere t.addr = s.taddr\n\
    and s.sql_id = q.sql_id;\n```\n\n如果你需要更多信息，例如回滚段的名称和状态，请运行连接到`V$ROLLNAME`和`V$ROLLSTAT`视图的查询，如下：\n\
    \n```sql\nselect s.sid, s.serial#, s.username, s.program\n,r.name undo_name, rs.status\n\
    ,rs.rssize/1024/1024 redo_size_mb\n,rs.extents\nfrom v$session     s\n    ,v$transaction\
    \ t\n    ,v$rollname    r\n    ,v$rollstat    rs\nwhere s.taddr = t.addr\nand\
    \ t.xidusn  = r.usn\nand r.usn     = rs.usn;\n```\n\n前面的查询允许你精确定位哪些用户应为undo表空间内分配的空间负责。当有代码未在适当时候提交并过度消耗undo空间时，这尤其有用。\n\
    \n## 处理临时表空间问题\n\n临时表空间的问题比较容易发现。例如，当临时表空间用尽空间时，将抛出以下错误：\n\n```\nORA-01652: unable\
    \ to extend temp segment by 128 in tablespace TEMP\n```\n\n当你看到此错误时，你需要确定是临时表空间空间不足，还是一个罕见的失控SQL查询暂时消耗了异常多的临时空间。以下部分将讨论这两个问题。\n\
    \n### 确定临时表空间大小是否合适\n\n临时表空间在磁盘上用作排序区，当一个进程耗尽可用内存并需要更多空间时使用。需要排序区的操作包括：\n\n* \
    \  索引创建\n*   SQL排序操作\n*   临时表和索引\n*   临时`LOB`\n*   临时`B-`树\n\n没有确切的公式来确定你的临时表空间大小是否合适。它取决于查询的数量和类型、索引构建操作、并行操作以及内存排序空间（`PGA`）的大小。你必须在数据库有负载时监控临时表空间以建立其使用模式。如果你使用Oracle\
    \ Database 11g或更高版本，运行以下查询以显示临时表空间内已分配和空闲的空间：\n\n```sql\nselect tablespace_name\n\
    ,tablespace_size/1024/1024 mb_size\n,allocated_space/1024/1024 mb_alloc\n,free_space/1024/1024\
    \      mb_free\nfrom dba_temp_free_space;\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME\
    \    MB_SIZE   MB_ALLOC    MB_FREE\n--------------- ---------- ---------- ----------\n\
    TEMP                   200        200        170\n```\n\n如果`FREE_SPACE` (`MB_FREE`)值降至接近0，则你的数据库中有SQL操作正在消耗大部分可用空间。`FREE_SPACE`\
    \ (`MB_FREE`)列是总可用空闲空间，包括当前已分配且可供重用的空间。\n\n如果你使用的是Oracle Database 10g数据库，运行此查询以查看临时表空间中正在使用的空间：\n\
    \n```sql\nselect tablespace_name\n,sum(bytes_used)/1024/1024 mb_used\nfrom v$temp_extent_pool\n\
    group by tablespace_name;\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME    MB_USED\n\
    --------------- ----------\nTEMP                   120\n```\n\n如果使用量接近你当前分配的量，你可能需要向临时表空间数据文件分配更多空间。运行以下查询以查看临时数据文件名称和分配的大小：\n\
    \n```sql\nselect name, bytes/1024/1024 mb_alloc from v$tempfile;\n```\n\n以下是一些典型输出："
  raw: '*   Ensure that code does not contain COMMIT statements within cursor loops.

    *   Tune the SQL statement throwing the error so that it runs faster.

    *   Ensure that you have good statistics (so that your SQL runs efficiently).

    *   Increase the UNDO_RETENTION initialization parameter.


    The NO_SPACE_CNT column displays the number of times space was requested in the
    undo tablespace. In this example there were no such requests. If the NO_SPACE_CNT
    is reporting a nonzero value, however, you may need to add more space to your
    undo tablespace.


    A maximum of 4 days’ worth of information is stored in the V$UNDOSTAT view. The
    statistics are gathered every 10 minutes, for a maximum of 576 rows in the table.
    If you’ve stopped and started your database within the last 4 days, this view
    will only contain information from the time you last started your database.


    Another way to get advice on the undo tablespace sizing is to use the Oracle Undo
    Advisor, which you can invoke by querying the PL/SQL D BMS_UNDO_ADV package from
    a SELECT statement. The following query displays the current undo size and the
    recommended size for an undo retention setting of 900 seconds:


    ```

    select

      sum(bytes)/1024/1024                  cur_mb_size

     ,dbms_undo_adv.required_undo_size(900) req_mb_size

    from dba_data_files

    where tablespace_name =

      (select

        value

       from v$parameter

       where name = ''undo tablespace'');

    ```


    Here is some sample output:


    ```

    CUR_MB_SIZE REQ_MB_SIZE

    ----------- -----------

          36864       20897

    ```


    The output shows that the undo tablespace currently has 36.8GB allocated to it.
    In the prior query, you used 900 seconds as the amount of time to retain information
    in the undo tablespace. To retain undo information for 900 seconds, the Oracle
    Undo Advisor estimates that the undo tablespace should be 20.8GB. In this example
    the undo tablespace is sized adequately. If it were not sized adequately, you
    would have to either add space to an existing data file or add a data file to
    the undo tablespace.


    Here is a slightly more complex example of using the Oracle Undo Advisor to find
    the required size of the undo tablespace. This example uses PL/SQL to display
    information about potential issues and recommendations for fixing the problem:


    ```

    SET SERVEROUT ON SIZE 1000000

    DECLARE

     pro    VARCHAR2(200);

     rec    VARCHAR2(200);

     rtn    VARCHAR2(200);

     ret    NUMBER;

     utb    NUMBER;

     retval NUMBER;

    BEGIN

      DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));

      DBMS_OUTPUT.PUT_LINE(''Required Undo Size (megabytes): '' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE
    (900));

      retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);

      DBMS_OUTPUT.PUT_LINE(''Problem:   '' || pro);

      DBMS_OUTPUT.PUT_LINE(''Advice:    '' || rec);

      DBMS_OUTPUT.PUT_LINE(''Rational:  '' || rtn);

      DBMS_OUTPUT.PUT_LINE(''Retention: '' || TO_CHAR(ret));

      DBMS_OUTPUT.PUT_LINE(''UTBSize:   '' || TO_CHAR(utb));

    END;

    /

    ```


    If no issues are found, a 0 will be returned for the retention size. Here is some
    sample output:


    ```

    Finding 1:The undo tablespace is OK.

    Required Undo Size (megabytes): 64

    Problem:   No problem found

    Advice:

    Rational:

    Retention: 0

    UTBSize:   0

    ```


    Viewing SQL That Is Consuming Undo Space


    Sometimes, a piece of code does not commit properly, which results in large amounts
    of space being allocated in the undo tablespace and never being released. Sooner
    or later, you’ll get the ORA-30036 error, indicating that the tablespace can’t
    extend. Usually, the first time a space-related error is thrown, I simply increase
    the size of one of the data files associated with the undo tablespace.


    However, if an SQL statement continues to run and fills up the newly added space,
    then the issue is probably with a poorly written application. For example, a developer
    may not have appropriate commit statements in the code.


    In these situations it’s helpful to identify which users are consuming space in
    the undo tablespace. Run this query to report on basic information regarding space
    allocated on a per-user basis:


    ```

    select s.sid, s.serial#, s.osuser, s.logon_time

    ,s.status, s.machine

    ,t.used_ublk, t.used_ublk*16384/1024/1024 undo_usage_mb

    from v$session     s

        ,v$transaction t

    where t.addr = s.taddr;

    ```


    If you want to view the SQL statement associated with a user consuming undo space,
    then join to V$SQL, as shown:


    ```

    select s.sid, s.serial#, s.osuser, s.logon_time, s.status

    ,s.machine, t.used_ublk

    ,t.used_ublk*16384/1024/1024 undo_usage_mb

    ,q.sql_text

    from v$session     s

        ,v$transaction t

        ,v$sql         q

    where t.addr = s.taddr

    and s.sql_id = q.sql_id;

    ```


    If you need more information, such as the name and status of the rollback segment,
    run a query that joins to the V$ROLLNAME and V$ROLLSTAT views, like so:


    ```

    select s.sid, s.serial#, s.username, s.program

    ,r.name undo_name, rs.status

    ,rs.rssize/1024/1024 redo_size_mb

    ,rs.extents

    from v$session     s

        ,v$transaction t

        ,v$rollname    r

        ,v$rollstat    rs

    where s.taddr = t.addr

    and t.xidusn  = r.usn

    and r.usn     = rs.usn;

    ```


    The prior queries allow you to pinpoint which users are responsible for space
    allocated within the undo tablespace. This can be especially useful when there
    is code that is not committing at appropriate times and that is excessively consuming
    undo space.


    Handling Temporary Tablespace Issues


    Issues with temporary tablespaces are somewhat easy to spot. For example, when
    the temporary tablespace runs out of space, the following error will be thrown:


    ```

    ORA-01652: unable to extend temp segment by 128 in tablespace TEMP

    ```


    When you see this error, you need to determine if there’s not enough space in
    the temporary tablespace or if  a rare runaway SQL query has temporarily consumed
    an inordinate amount of temporary space. Both of these issues are discussed in
    the following sections.


    Determining if Temporary Tablespace Is Sized Correctly


    The temporary tablespace is used as a sorting area on disk when a process has
    consumed the available memory and needs more space. Operations that require a
    sorting area include


    *   index creation

    *   SQL sorting operations

    *   temporary tables and indexes

    *   temporary LOBs

    *   temporary B-trees


    There is no exact formula for determining if your temporary tablespace is sized
    correctly. It depends on the number and types of queries, index build operations,
    and parallel operations and on size of your memory sort space (PGA). You’ll have
    to monitor your temporary tablespace while there is a load on your database to
    establish its usage patterns. If you are using Oracle Database 11g or higher,
    run the following query to show both the allocated and free space within the temporary
    tablespace:


    ```

    select tablespace_name

    ,tablespace_size/1024/1024 mb_size

    ,allocated_space/1024/1024 mb_alloc

    ,free_space/1024/1024      mb_free

    from dba_temp_free_space;

    ```


    Here is some sample output:


    ```

    TABLESPACE_NAME    MB_SIZE   MB_ALLOC    MB_FREE

    --------------- ---------- ---------- ----------

    TEMP                   200        200        170

    ```


    If the FREE_SPACE (MB_FREE) value drops to near 0, there are SQL operations in
    your database consuming most of the available space. The FREE_SPACE (MB_FREE)
    column is the total free space available, including space currently allocated
    and available for reuse.


    If you are using an Oracle Database 10g database, run this query to view the space
    being used in your temporary tablespace:


    ```

    select tablespace_name

    ,sum(bytes_used)/1024/1024 mb_used

    from v$temp_extent_pool

    group by tablespace_name;

    ```


    Here is some sample output:


    ```

    TABLESPACE_NAME    MB_USED

    --------------- ----------

    TEMP                   120

    ```


    If the amount used is getting near your current allocated amount, you may need
    to allocate more space to the temporary tablespace data files. Run the following
    query to view the temporary data file names and allocated sizes:


    ```

    SQL> select name, bytes/1024/1024 mb_alloc from v$tempfile;

    ```


