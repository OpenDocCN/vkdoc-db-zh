    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    ```


    You can verify which services are running by connecting as SYS to the root container
    and querying:


    ```

    SQL> select name, network_name, pdb from v$services order by pdb, name;

    ```


    You can also verify which services a listener is listing for via the lsnrctl utility:


    ```

    $ lsnrctl services

    ```


    Oracle recommends that you configure an additional service (besides the default
    service) for any applications that need to access a pluggable database. You can
    manually configure services by using the SRVCTL utility or the DBMS_SERVICE package.
    This example shows how to configure a service via the DBMS_SERVICE package. First,
    connect as SYS to the pluggable database that you want to create the service in
    via the default service:


    ```

    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    ```


    Make sure the pluggable database is open for read-write mode:


    ```

    SQL> SELECT con_id, name, open_mode FROM v$pdbs;

    ```


    Next, create a service. This code creates and starts a service named SALESWEST:


    ```

    exec DBMS_SERVICE.CREATE_SERVICE(service_name => ''SALESWEST'', network_name =>
    ''SALESWEST'');

    exec DBMS_SERVICE.START_SERVICE(service_name => ''SALESWEST'');

    ```


    Now, application users can connect to the SALESPDB pluggable database via the
    service:


    ```

    $ sqlplus user/pass@speed2:1521/saleswest

    ```


    ![image](Images/sq.jpg) **Caution**   If you have multiple CDB databases on one
    server, ensure that the pluggable database service names are unique across all
    CDB databases on the server. It’s not advisable to register two pluggable database
    databases with the exact same name with one common listener. This will lead to
    confusion as to which pluggable database you are actually connecting to.


    Showing the Currently Connected Pluggable Database


    From SQL*Plus there are a couple of easy techniques for displaying the name of
    the pluggable database that you’re currently connected to. This example uses the
    SHOW command to display the container ID, the name, and the user:


    ```

    SQL> show con_id con_name user

    ```


    Here is some sample output:


    ```

    CON_ID


    CON_NAME


    SALESPDB


    USER is "SYS"

    ```


    You can also display the same information via an SQL query:


    ```

    SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'') AS con_id,

    SYS_CONTEXT(''USERENV'', ''CON_NAME'') AS cur_container,

    SYS_CONTEXT(''USERENV'', ''SESSION_USER'') AS cur_user

    FROM DUAL;

    ```


    Here is some sample output:


    ```

    CON_ID     CUR_CONTAINER   CUR_USER

    ---------- --------------- ----------

    3          SALESPDB        SYS

    ```


    Keep in mind that the SYS_CONTEXT function can be used to display other useful
    information, such as the SERVICE_NAME, DB_UNIQUE_NAME, INSTANCE_NAME, and SERVER_HOST;
    for example,


    ```

    SELECT

     SYS_CONTEXT(''USERENV'', ''SERVICE_NAME'') as service_name,

     SYS_CONTEXT(''USERENV'', ''DB_UNIQUE_NAME'') as db_unique_name,

     SYS_CONTEXT(''USERENV'', ''INSTANCE_NAME'') as instance_name,

     SYS_CONTEXT(''USERENV'', ''SERVER_HOST'') as server_host

    from dual;

    ```


    Starting/Stopping a Pluggable Database


    When you start/stop a pluggable database, you aren’t starting/stopping an instance.
    Rather, you are making the pluggable database either available or unavailable,
    open or closed. You can change the open mode of a pluggable database from either
    a connection to the root container as SYS or a direct connection to the pluggable
    database as SYS.


    From Root Container


    To change the open mode of a pluggable database from the root container, do as
    follows:


    ```

    $ sqlplus / as sysdba

    SQL> alter pluggable database salespdb open;

    ```


    You can also start a pluggable database in a particular state, such as read-only:


    ```

    SQL> startup pluggable database salespdb open read only;

    ```


    To close a pluggable database, you can specify the name of the pluggable database:


    ```

    SQL> alter pluggable database salespdb close immediate;

    ```


    You can also open or close all pluggable databases while connected to the root
    container as SYS:


    ```

    SQL> alter pluggable database all open;

    SQL> alter pluggable database all close immediate;

    ```


    From Pluggable


    To open/start a pluggable database, connect to the pluggable database as SYS:


    ```

    $ sqlplus sys/foo@salespdb as sysdba

    SQL> startup;

    ```


    To shut down the database, issue the following command:


    ```

    SQL> shutdown immediate;

    ```


    Modifying Initialization Parameters Specific to a Pluggable Database


    Oracle allows some initialization parameters to be modified while connected as
    a privileged user to a pluggable database. You can view these parameters via the
    following query:


    ```

    SELECT name

    FROM v$parameter

    WHERE ispdb_modifiable=''TRUE''

    ORDER BY name;

    ```


    Here is a snippet of the output:


    ```

    NAME


    sort_area_size

    sql_trace

    sqltune_category

    star_transformation_enabled

    statistics_level

    ```


    When you make initialization parameter changes while connected directly to a pluggable
    database, these changes only affect the currently connected pluggable database.
    The parameter changes do not affect the root container or other pluggable databases.
    For example, say you wanted to change the value of OPEN_CURSORS. First, connect
    directly to the pluggable database as a privileged user, and issue the ALTER SYSTEM
    statement:


    ```

    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    SQL> alter system set open_cursors=100;

    ```


    The prior change modifies the value of OPEN_CURSORS only for the SALESPDB pluggable
    database. Furthermore, the setting of OPEN_CURSORS for SALESPDB will persist across
    database restarts.


    Renaming a Pluggable Database


    Occasionally, you may be required to rename a pluggable database. For instance,
    the database may have been originally misnamed, or you may no longer be using
    the database and want to append an _OLD to its name. To rename a pluggable database,
    first connect to it as a SYSDBA-privileged account:


    ```

    $ sqlplus sys/foo@invpdb as sysdba

    ```


    Next, stop the pluggable database, and restart it in restricted mode:


    ```

    SQL> shutdown immediate;

    SQL> startup restrict;

    ```


    Now, the pluggable database can be renamed:


    ```

    SQL> alter pluggable database INVPDB rename global_name to INVPDB_OLD;

    ```


    Limiting the Amount of Space Consumed by a Pluggable Database


    You can place an overall limit on the amount of disk space a pluggable database
    can consume. I would recommend placing some reasonable limit on the overall size
    of each pluggable database, especially if you work in an environment in which
    there are different DBAs or groups managing separate pluggable databases within
    the same CDB, and each DBA/group is unaware of the space that the other databases
    are consuming.


    In this example an overall limit of 20GB is placed on a pluggable database. First,
    connect to the pluggable database as SYS:


    ```

    $ sqlplus sys/foo@speed2:1521/salespdb as sysdba

    ```


    Then, alter the pluggable databases’ maximum size limit. This command limits the
    size of the pluggable database to a maximum of 2GB:


    ```

    SQL> alter pluggable database salespdb storage(maxsize 20G);

    ```


    Viewing Pluggable Database History


    If you need to view when a pluggable database was created, you can query the CDB_PDB_HISTORY
    view, as shown:


    ```

    COL db_name FORM A10

    COL con_id FORM 999

    COL pdb_name FORM A15

    COL operation FORM A16

    COL op_timestamp FORM A10

    COL cloned_from_pdb_name FORMAT A15

    --

    SELECT db_name, con_id, pdb_name, operation,

           op_timestamp, cloned_from_pdb_name

    FROM cdb_pdb_history

    WHERE con_id > 2

    ORDER BY con_id;

    ```


    Here is some sample output:


    ```

    DB_NAME    CON_ID PDB_NAME        OPERATION        OP_TIMESTA CLONED_FROM_PDB

    ---------- ------ --------------- ---------------- ---------- ---------------

    CDB             3 SALESPDB        CREATE           04-DEC-12  PDB$SEED

    CDB             4 HRPDB           CREATE           10-FEB-13  PDB$SEED

    ```


    In this way, you can determine when a pluggable database was created and from
    what source.


