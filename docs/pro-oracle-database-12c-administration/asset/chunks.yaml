  trans: '## 通过操作系统工具识别瓶颈


    在 Oracle 领域，有时会存在一种倾向，即假设您有一台专用于一个 Oracle 数据库的机器。此外，这个数据库是 Oracle 的最新版本，已完全打上补丁，并由复杂的图形工具监控。这个数据库环境是完全自动化的，并通过使用可视化工具来快速定位问题、高效隔离并解决问题，从而保持无故障运行。如果您生活在这个理想世界中，那么您可能不需要本章的任何内容。


    让我描绘一个略有不同的场景。我有一个环境，其中一台机器上运行着十几个数据库。有一个 MySQL 数据库，一个 PostgreSQL 数据库，以及混合的 Oracle
    10g、11g 和 12c 数据库。此外，这些旧数据库中的许多都运行在 Oracle 的非终端版本上，因此不受 Oracle 支持。没有任何计划升级这些不受支持的数据库，因为业务无法承担可能破坏依赖这些数据库的应用程序的风险。


    那么，在这种环境下，当有人报告某个数据库应用程序性能不佳时，该怎么办呢？在这种情况下，通常是另一个数据库中的某些东西导致这台机器上的其他应用程序运行不佳。造成问题的可能不是
    Oracle 进程或 Oracle 数据库。


    在这种情况下，使用操作系统工具开始调查问题几乎总是更有效。操作系统工具是数据库不可知的。操作系统性能工具有助于定位资源消耗最多的地方，无论数据库供应商或版本如何。


    在 Linux/Unix 环境中，有几种可用的工具可用于监控资源使用情况。表 22-1 总结了用于诊断性能问题的最常用操作系统实用程序。熟悉这些操作系统命令的工作原理以及如何解读输出，将使您能够更好地诊断服务器性能问题，特别是当导致机器上所有其他应用程序性能下降的是一个非
    Oracle 甚至是非数据库进程时。


    表 22-1. 性能和监控实用程序


    | 工具 | 用途 |

    | --- | --- |

    | `vmstat` | 监控进程、CPU、内存和磁盘 I/O 瓶颈 |

    | `top` | 识别消耗资源最多的会话 |

    | `watch` | 定期运行另一个命令 |

    | `ps` | 识别 CPU 和内存消耗最高的会话；用于识别消耗系统资源最多的 Oracle 会话 |

    | `mpstat` | 报告 CPU 统计信息 |

    | `sar` | 显示 CPU、内存、磁盘 I/O 和网络使用情况，包括当前和历史数据 |

    | `free` | 显示空闲和已使用的内存 |

    | `df` | 报告空闲磁盘空间 |

    | `du` | 显示磁盘使用情况 |

    | `iostat` | 显示磁盘 I/O 统计信息 |

    | `netstat` | 报告网络统计信息 |


    在诊断性能问题时，确定系统瓶颈所在是很有用的。例如，尝试识别问题是与 CPU、内存或 I/O 相关，还是这些因素的组合。


    ### 识别系统瓶颈


    每当出现应用程序性能问题或可用性问题时，（从 DBA 的角度来看）似乎问的第一个问题是：“数据库怎么了？” 无论问题来源如何，责任通常落在 DBA 身上，需要确认数据库是否运行良好。我通常通过确定哪些系统范围内的资源正在被消耗来处理这个问题。有两个
    Linux/Unix 操作系统工具特别适合显示系统范围内的资源使用情况：


    *   `vmstat`

    *   `top`


    `vmstat`（虚拟内存统计信息）工具旨在帮助您快速识别服务器上的瓶颈。`top` 实用程序提供了系统资源使用情况的动态、实时视图。这两个实用工具将在接下来的两节中讨论。


    ### 使用 vmstat


    `vmstat` 实用程序显示关于进程、内存、页面调度、磁盘 I/O 和 CPU 使用情况的实时性能信息。此示例显示使用 `vmstat` 显示默认输出，未指定任何选项：


    ```

    $ vmstat

    procs  -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

     r  b   swpd   free   buff  cache    si   so    bi    bo   in    cs us sy id wa

    14  0  52340  25272   3068 1662704    0    0    63    76    9    31 15  1 84  0

    ```


    在解读 `vmstat` 输出时，可以使用以下一些通用经验法则：


    *   如果 `wa`（等待 I/O 的时间）列很高，这通常表明存储子系统过载。

    *   如果 `b`（正在睡眠的进程）持续大于 0，则您可能没有足够的 CPU 处理能力。

    *   如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于 0，您可能存在内存瓶颈。


    默认情况下，运行 `vmstat`（不提供任何选项）时只显示一行服务器统计信息。这一行输出提供了自系统上次重新启动以来计算的平均统计信息。这对于快速快照来说是可以的。但是，如果您想在一段时间内收集指标，请使用以下语法运行
    `vmstat`：


    ```

    $ vmstat <间隔秒数> <间隔次数>

    ```


    在此模式下，`vmstat` 会报告统计信息，从一个间隔到下一个间隔进行采样。例如，如果您想每 2 秒报告一次系统统计信息，总共报告十次，可以输入以下命令：


    ```

    $ vmstat 2 10

    ```


    您还可以将 `vmstat` 输出发送到文件。这对于分析一段时间内的历史性能很有用。此示例每 5 秒采样一次统计信息，总共生成 60 个报告，并将输出记录到文件中：


    ```

    $ vmstat 5 60 > vmout.perf

    ```


    此外，`vmstat` 实用程序可以与 `watch` 工具一起使用。`watch` 命令用于定期执行另一个程序。在此示例中，`watch` 每 5 秒运行一次
    `vmstat` 命令，并在屏幕上高亮显示每个快照之间的任何差异：


    ```

    $ watch –n 5 –d vmstat

    Every 5.0s: vmstat                                    Thu Aug  9 13:27:57 2007

    procs -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

     r  b   swpd   free   buff  cache  si   so    bi    bo   in    cs us sy id wa

     0  0    144  15900  64620 1655100   0    0     1     7   16     4  0  0 99  0

    ```


    在 `watch -d`（差异）模式下运行 `vmstat` 时，您会在屏幕上看到快照之间的变化。要退出 `watch`，请按 Ctrl+C。


    请注意，`vmstat` 内存列的默认计量单位是千字节。如果您想以兆字节查看内存统计信息，请使用 `–S m`（以兆字节显示统计信息）选项：


    ```

    $ vmstat –S m

    ```


    ![image](img/sq.jpg) **提示**   使用 `man vmstat` 或 `vmstat --help` 命令获取有关此实用程序的进一步文档。


    ### 使用 top


    ```

    adrci> show homes

    ```


    以下是此服务器的一些示例输出：


    ```

    diag/rdbms/o12c/O12C

    diag/rdbms/o12cp/O12CP

    ```


    现在，使用 `SET HOMEPATH` 命令。这将 `HOMEPATH` 设置为 `diag/rdbms/e64208/E64208`：


    ```

    adrci> set homepath  diag/rdbms/o12c/O12C

    ```


    要持续显示文件末尾，请使用此命令：


    ```

    adrci> show alert -tail -f

    ```


    按 Ctrl+C 可停止连续查看 `alert.log` 文件。要显示 `alert.log` 中包含特定字符串的行，请使用 `MESSAGE_TEXT LIKE`
    命令。此示例显示包含 `ORA-27037` 字符串的消息：


    ```

    adrci> show alert -p "MESSAGE_TEXT LIKE ''%ORA-27037%''"

    ```


    您将看到一个文件，其中包含 `alert.log` 中与指定字符串匹配的所有行。


    ![image](img/sq.jpg) **提示**   有关如何使用 ADRCI 实用程序的完整详情，请参阅 *Oracle Database Utilities
    Guide*。'
- fmt: "# 使用 top 命令监控系统进程\n\n另一个识别资源密集型进程的工具是 `top` 命令。使用此工具可以快速识别服务器上哪些进程消耗的资源最多。默认情况下，`top`\
    \ 会重复刷新（每 3 秒）关于最消耗 CPU 的进程的信息。运行 `top` 的最简单方法如下：\n\n```\n$ top\n```\n\n以下是输出片段：\n\
    \n```\ntop - 13:34:32 up 19 min,  2 users,  load average: 0.05, 0.16, 0.24\nTasks:\
    \ 176 total,   1 running, 175 sleeping,   0 stopped,   0 zombie\nCpu(s):  2.0%us,\
    \  0.7%sy,  0.0%ni, 91.6%id,  5.7%wa,  0.0%hi,  0.0%si,  0.0%st\nMem:    787028k\
    \ total,   748744k used,    38284k free,     1836k buffers\nSwap:  1605624k total,\
    \    31896k used,  1573728k free,   377668k cached\n\nPID USER      PR  NI  VIRT\
    \  RES  SHR S %CPU %MEM    TIME+  COMMAND\n4683 root      20   0  279m  14m 7268\
    \ S  2.0  1.9   0:01.61 gnome-terminal\n3826 root      20   0  218m 9944 4200\
    \ S  1.7  1.3   0:02.80 Xorg\n3592 oracle    -2   0  601m  18m  15m S  0.7  2.4\
    \   0:09.36 ora_vktm_o12c\n```\n\n消耗最高的会话的进程标识符（`PID`）列在第一列（`PID`）。您可以使用此信息查看\
    \ `PID` 是否映射到数据库进程（有关将 `PID` 映射到数据库进程的详细信息，请参见下一节“将操作系统进程映射到 SQL 语句”）。\n\n当 `top`\
    \ 运行时，您可以交互式地更改其输出。例如，如果键入重定向字符（`>`），这将使 `top` 排序的列向右移动一个位置。[表 22-2](#9781430257288_Ch22.xhtml#Tab2)\
    \ 列出了一些可用于将 `top` 显示更改为您所需格式的关键功能。\n\n[表 22-2.](#9781430257288_Ch22.xhtml#_Tab2)\
    \ 交互式更改 `top` 输出的命令\n\n| 命令 | 功能 |\n| --- | --- |\n| Spacebar | 立即刷新输出 |\n| <\
    \ or > | 将排序列向左或向右移动一个位置。默认情况下，`top` 按 CPU 列排序。 |\n| D | 更改刷新时间 |\n| R | 反转排序顺序\
    \ |\n| Z | 切换彩色输出 |\n| H | 显示帮助菜单 |\n| F or O | 选择排序列 |\n\n键入 `q`，或按 `Ctrl+C`\
    \ 退出 `top`。[表 22-3](#9781430257288_Ch22.xhtml#Tab3) 描述了 `top` 默认输出中显示的几个列。\n\n\
    [表 22-3.](#9781430257288_Ch22.xhtml#_Tab3) `top` 输出的列描述\n\n| 列 | 描述 |\n| --- |\
    \ --- |\n| `PID` | 唯一的进程标识符 |\n| `USER` | 运行进程的操作系统用户名 |\n| `PR` | 进程优先级 |\n|\
    \ `NI` | 进程的 nice 值。负值表示高优先级；正值表示低优先级。 |\n| `VIRT` | 进程使用的总虚拟内存 |\n| `RES` | 进程使用的非交换物理内存\
    \ |\n| `SHR` | 进程使用的共享内存 |\n| `S` | 进程状态 |\n| `%CPU` | 自上次屏幕刷新以来进程消耗的 CPU 百分比\
    \ |\n| `%MEM` | 进程消耗的物理内存百分比 |\n| `TIME` | 进程使用的总 CPU 时间 |\n| `TIME+` | 进程使用的总\
    \ CPU 时间，显示百分之一秒 |\n| `COMMAND` | 用于启动进程的命令行 |\n\n您也可以使用 `b`（批处理模式）选项运行 `top`，并将输出发送到文件以供后续分析：\n\
    \n```\n$ top –b > tophat.out\n```\n\n在批处理模式下运行时，`top` 命令将一直运行，直到您终止它（使用 `Ctrl+C`）或达到指定的迭代次数。您可以在前一个\
    \ `top` 命令中结合使用 `nohup` 和 `&`，以使其在您是否登录系统的情况下都保持运行。这样做的危险在于，您可能会忘记它，并最终创建一个非常大的输出文件（以及一个愤怒的系统管理员）。\n\
    \n如果您有一个想要监控的特定进程，请使用 `p` 选项监控一个 `PID`，或使用 `U` 选项监控一个用户名。您还可以使用 `d` 和 `-n` 选项指定延迟和迭代次数。以下示例以\
    \ 5 秒的延迟监控 `oracle` 用户，共进行 25 次迭代：\n\n```\n$ top –u oracle –d 5 –n 25\n```\n\n\
    ![image](Images/sq.jpg) **提示** 使用 `man top` 或 `top --help` 命令列出您的操作系统版本中所有可用的选项。\n\
    \n## 将操作系统进程映射到 SQL 语句\n\n在识别操作系统进程时，查看哪些进程消耗最多的 CPU 非常有用。如果资源占用者是数据库进程，将操作系统进程映射到数据库作业或查询也很有用。要确定消耗最多\
    \ CPU 资源的进程的 ID，请使用诸如 `ps` 之类的命令，如下所示：\n\n```\n$ ps -e -o pcpu,pid,user,tty,args\
    \ | sort -n -k 1 -r | head\n```\n\n以下是输出片段：\n\n```\n14.6 24875 oracle   ?    \
    \    oracleo12c (DESCRIPTION=(LOCAL=YES)(ADDRESS=...\n 0.8 21613 oracle   ?  \
    \      ora_vktm_o12c\n 0.1 21679 oracle   ?        ora_mmon_o12c\n```\n\n从输出中，您可以看到操作系统会话\
    \ `24875` 是 CPU 资源的最大消耗者。输出还表明该进程与 `o12c` 数据库相关联。掌握了这些信息后，登录到相应的数据库，并使用以下 SQL\
    \ 语句来确定与操作系统进程 `24875` 关联的程序类型：\n\n```\nselect\n  'USERNAME : ' || s.username||\
    \ chr(10) ||\n  'OSUSER   : ' || s.osuser  || chr(10) ||\n  'PROGRAM  : ' || s.program\
    \ || chr(10) ||\n  'SPID     : ' || p.spid    || chr(10) ||\n  'SID      : ' ||\
    \ s.sid     || chr(10) ||\n  'SERIAL#  : ' || s.serial# || chr(10) ||\n  'MACHINE\
    \  : ' || s.machine || chr(10) ||\n  'TERMINAL : ' || s.terminal\nfrom v$session\
    \ s,\n     v$process p\nwhere s.paddr = p.addr\nand   p.spid  = &PID_FROM_OS;\n\
    ```\n\n当您运行该命令时，SQL*Plus 将提示您输入用于替代 `&PID_FROM_OS` 的值。在此示例中，您将输入 `24875`。以下是相关输出：\n\
    \n```\nUSERNAME : MV_MAINT\nOSUSER   : oracle\nPROGRAM  : sqlplus@speed2 (TNS\
    \ V1-V3)\nSPID     : 24875\nSID      : 111\nSERIAL#  : 899\nMACHINE  : speed2\n\
    TERMINAL : pts/4\n```\n\n在此输出中，`PROGRAM` 值表明一个 SQL*Plus 会话是消耗服务器上过量资源的程序。接下来，运行以下查询以显示与操作系统\
    \ `PID` 关联的 SQL 语句（在此示例中，服务器进程标识符 [SPID] 是 `24875`）：\n\n```\nselect\n  'USERNAME\
    \ : ' || s.username || chr(10) ||\n  'OSUSER   : ' || s.osuser   || chr(10) ||\n\
    \  'PROGRAM  : ' || s.program  || chr(10) ||\n  'SPID     : ' || p.spid     ||\
    \ chr(10) ||\n  'SID      : ' || s.sid      || chr(10) ||\n  'SERIAL#  : ' ||\
    \ s.serial#  || chr(10) ||\n  'MACHINE  : ' || s.machine  || chr(10) ||\n  'TERMINAL\
    \ : ' || s.terminal || chr(10) ||\n  'SQL TEXT : ' || sa.sql_text\nfrom v$process\
    \ p,\nv$session s,\nv$sqlarea sa\nwhere p.addr = s.paddr\nand s.username is not\
    \ null\nand s.sql_address = sa.address(+)\nand s.sql_hash_value = sa.hash_value(+)\n\
    and p.spid= &PID_FROM_OS;\n```\n\n结果显示消耗资源的 SQL 作为输出的一部分，位于 `SQL TEXT` 列中。以下是输出片段：\n\
    \n```\nUSERNAME : MV_MAINT\nOSUSER   : oracle\nPROGRAM  : sqlplus@speed2 (TNS\
    \ V1-V3)\nSPID     : 24875\nSID      : 111\nSERIAL#  : 899\nMACHINE  : speed2\n\
    TERMINAL : pts/4\nSQL TEXT : select a.table_name from dba_tables a,dba_indexes\
    \ b,dba_objects c...\n```\n\n当您在一台服务器上运行多个数据库并遇到服务器性能问题时，有时很难确定是哪个数据库及相关进程导致了问题。在这些情况下，您必须使用操作系统工具来识别系统上消耗资源最多的会话。\n\
    \n在 Linux/Unix 环境中，您可以使用诸如 `ps`、`top` 或 `vmstat` 之类的工具来识别消耗资源最多的操作系统进程。`ps` 工具非常方便，因为它可以让您识别消耗最多\
    \ CPU 或内存的进程。前面的 `ps` 命令识别了消耗 CPU 最多的进程。在这里，它被用来识别使用 Oracle 内存最多的进程：\n\n```\n\
    $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head\n\
    ```"
  raw: 'Another tool for identifying resource-intensive processes is the top command.
    Use this utility to quickly identify which processes are the highest consumers
    of resources on the server. By default, top will repetitively refresh (every 3
    seconds) information regarding the most CPU-intensive processes. The simplest
    way to run top is as follows:


    ```

    $ top

    ```


    Here is a fragment of the output:


    ```

    top - 13:34:32 up 19 min,  2 users,  load average: 0.05, 0.16, 0.24

    Tasks: 176 total,   1 running, 175 sleeping,   0 stopped,   0 zombie

    Cpu(s):  2.0%us,  0.7%sy,  0.0%ni, 91.6%id,  5.7%wa,  0.0%hi,  0.0%si,  0.0%st

    Mem:    787028k total,   748744k used,    38284k free,     1836k buffers

    Swap:  1605624k total,    31896k used,  1573728k free,   377668k cached


    PID USER      PR  NI  VIRT  RES  SHR S %CPU %MEM    TIME+  COMMAND

    4683 root      20   0  279m  14m 7268 S  2.0  1.9   0:01.61 gnome-terminal

    3826 root      20   0  218m 9944 4200 S  1.7  1.3   0:02.80 Xorg

    3592 oracle    -2   0  601m  18m  15m S  0.7  2.4   0:09.36 ora_vktm_o12c

    ```


    The process identifiers (PIDs) of the top-consuming sessions are listed in the
    first column (PID). You can use this information to see if a PID maps to a database
    process (see the next section, “Mapping an OS Process to an SQL Statement,” for
    details on mapping a PID to a database process).


    While top is running, you can interactively change its output. For example, if
    you type the redirection character (>), this will move the column that top is
    sorting one position to the right. [Table 22-2](#9781430257288_Ch22.xhtml#Tab2)
    lists some key features that you can use to alter the top display to the desired
    format.


    [Table 22-2.](#9781430257288_Ch22.xhtml#_Tab2) Commands to Interactively Change
    the top Output


    | Command | Function |

    | --- | --- |

    | Spacebar | Immediately refreshes the output |

    | < or > | Moves the sort column one position to the left or to the right. By
    default, top sorts on the CPU column. |

    | D | Changes the refresh time |

    | R | Reverses the sort order |

    | Z | Toggles the color output |

    | H | Displays the Help menu |

    | F or O | Chooses a sort column |


    Type q, or press Ctrl+C, to exit top. [Table 22-3](#9781430257288_Ch22.xhtml#Tab3)
    describes several of the columns displayed in the default output of top.


    [Table 22-3.](#9781430257288_Ch22.xhtml#_Tab3) Column Descriptions of the top
    Output


    | Column | Description |

    | --- | --- |

    | PID | Unique process identifier |

    | USER | OS username running the process |

    | PR | Priority of the process |

    | NI | Nice value or process. Negative value means high priority; positive value
    means low priority. |

    | VIRT | Total virtual memory used by process |

    | RES | Nonswapped physical memory used by process |

    | SHR | Shared memory used by process |

    | S | Process status |

    | CPU | Processes percentage of CPU consumption since last screen refresh |

    | MEM | Percentage of physical memory the process is consuming |

    | TIME | Total CPU time used by process |

    | TIME+ | Total CPU time, showing hundredths of seconds, used by process |

    | COMMAND | Command line used to start a process |


    You can also run top using the b (batch mode) option and send the output to a
    file for later analysis:


    ```

    $ top –b > tophat.out

    ```


    While running in batch mode, the top command will run until you kill it (with
    Ctrl+C) or until it reaches a specified number of iterations. You could run the
    previous top command in batch mode, with a combination of nohup and & to keep
    it running, regardless of whether you were logged in to the system. The danger
    there is that you might forget about it and eventually create a very large output
    file (and an angry SA).


    If you have a particular process that you’re interesting in monitoring, use the
    p option to monitor a PID or the U option to monitor a username. You can also
    specify a delay and the number of iterations by using the d and -n options. The
    following example monitors the oracle user with a delay of 5 seconds, for 25 iterations:


    ```

    $ top –u oracle –d 5 –n 25

    ```


    ![image](Images/sq.jpg) **Tip**   Use the man top or top --help command to list
    all the options available in your OS version.


    Mapping an Operating System Process to an SQL Statement


    When identifying OS processes, it’s useful to view which processes are consuming
    the greatest amount of CPU. If the resource hog is a database process, it’s also
    useful to map the OS process to a database job or query. To determine the ID of
    the processes consuming the most CPU resources, use a command such as ps, like
    so:


    ```

    $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head

    ```


    Here is a snippet of the output:


    ```

    14.6 24875 oracle   ?        oracleo12c (DESCRIPTION=(LOCAL=YES)(ADDRESS=...

     0.8 21613 oracle   ?        ora_vktm_o12c

     0.1 21679 oracle   ?        ora_mmon_o12c

    ```


    From the output, you can see that the OS session 24875 is the top consumer of
    CPU resources. The output also indicates that the process is associated with the
    o12c database. With that information in hand, log in to the appropriate database,
    and use the following SQL statement to determine what type of program is associated
    with the OS process 24875:


    ```

    select

      ''USERNAME : '' || s.username|| chr(10) ||

      ''OSUSER   : '' || s.osuser  || chr(10) ||

      ''PROGRAM  : '' || s.program || chr(10) ||

      ''SPID     : '' || p.spid    || chr(10) ||

      ''SID      : '' || s.sid     || chr(10) ||

      ''SERIAL#  : '' || s.serial# || chr(10) ||

      ''MACHINE  : '' || s.machine || chr(10) ||

      ''TERMINAL : '' || s.terminal

    from v$session s,

         v$process p

    where s.paddr = p.addr

    and   p.spid  = &PID_FROM_OS;

    ```


    When you run the command, SQL*Plus will prompt you for the value to use in place
    of &PID_FROM_OS. In this example, you’ll enter 24875\. Here is the relevant output:


    ```

    USERNAME : MV_MAINT

    OSUSER   : oracle

    PROGRAM  : sqlplus@speed2 (TNS V1-V3)

    SPID     : 24875

    SID      : 111

    SERIAL#  : 899

    MACHINE  : speed2

    TERMINAL : pts/4

    ```


    In this output the PROGRAM value indicates that an SQL*Plus session is the program
    consuming the inordinate amount of resources on the server. Next, run the following
    query to display the SQL statement associated with the OS PID (in this example,
    the server process identifier [SPID] is 24875):


    ```

    select

      ''USERNAME : '' || s.username || chr(10) ||

      ''OSUSER   : '' || s.osuser   || chr(10) ||

      ''PROGRAM  : '' || s.program  || chr(10) ||

      ''SPID     : '' || p.spid     || chr(10) ||

      ''SID      : '' || s.sid      || chr(10) ||

      ''SERIAL#  : '' || s.serial#  || chr(10) ||

      ''MACHINE  : '' || s.machine  || chr(10) ||

      ''TERMINAL : '' || s.terminal || chr(10) ||

      ''SQL TEXT : '' || sa.sql_text

    from v$process p,

    v$session s,

    v$sqlarea sa

    where p.addr = s.paddr

    and s.username is not null

    and s.sql_address = sa.address(+)

    and s.sql_hash_value = sa.hash_value(+)

    and p.spid= &PID_FROM_OS;

    ```


    The results show the resource-consuming SQL as part of the output, in the S QL
    TEXT column. Here is a snippet of the output:


    ```

    USERNAME : MV_MAINT

    OSUSER   : oracle

    PROGRAM  : sqlplus@speed2 (TNS V1-V3)

    SPID     : 24875

    SID      : 111

    SERIAL#  : 899

    MACHINE  : speed2

    TERMINAL : pts/4

    SQL TEXT : select a.table_name from dba_tables a,dba_indexes b,dba_objects c...

    ```


    When you run multiple databases on one server and are experiencing server performance
    issues, it can sometimes be difficult to pinpoint which database and associated
    process are causing the problems. In these situations, you have to use an OS tool
    to identify the top resource-consuming sessions on the system.


    In a Linux/Unix environment, you can use utilities such as ps, top, or vmstat
    to identify top-consuming OS processes. The p s utility is handy because it lets
    you identify processes consuming the most CPU or memory. The previous ps command
    identified the top-consuming CPU processes. Here, it’s used to identify the top
    Oracle memory–using processes:


    ```

    $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head

    ```'
  trans: "\n# 使用 top 命令监控系统进程\n\n另一个识别资源密集型进程的工具是 `top` 命令。使用此工具可以快速识别服务器上哪些进程消耗的资源最多。默认情况下，`top`\
    \ 会重复刷新（每 3 秒）关于最消耗 CPU 的进程的信息。运行 `top` 的最简单方法如下：\n\n```\n$ top\n```\n\n以下是输出片段：\n\
    \n```\ntop - 13:34:32 up 19 min,  2 users,  load average: 0.05, 0.16, 0.24\nTasks:\
    \ 176 total,   1 running, 175 sleeping,   0 stopped,   0 zombie\nCpu(s):  2.0%us,\
    \  0.7%sy,  0.0%ni, 91.6%id,  5.7%wa,  0.0%hi,  0.0%si,  0.0%st\nMem:    787028k\
    \ total,   748744k used,    38284k free,     1836k buffers\nSwap:  1605624k total,\
    \    31896k used,  1573728k free,   377668k cached\n\nPID USER      PR  NI  VIRT\
    \  RES  SHR S %CPU %MEM    TIME+  COMMAND\n4683 root      20   0  279m  14m 7268\
    \ S  2.0  1.9   0:01.61 gnome-terminal\n3826 root      20   0  218m 9944 4200\
    \ S  1.7  1.3   0:02.80 Xorg\n3592 oracle    -2   0  601m  18m  15m S  0.7  2.4\
    \   0:09.36 ora_vktm_o12c\n```\n\n消耗最高的会话的进程标识符（`PID`）列在第一列（`PID`）。您可以使用此信息查看\
    \ `PID` 是否映射到数据库进程（有关将 `PID` 映射到数据库进程的详细信息，请参见下一节“将操作系统进程映射到 SQL 语句”）。\n\n当 `top`\
    \ 运行时，您可以交互式地更改其输出。例如，如果键入重定向字符（`>`），这将使 `top` 排序的列向右移动一个位置。表 22-2 列出了一些可用于将 `top`\
    \ 显示更改为您所需格式的关键功能。\n\n表 22-2. 交互式更改 `top` 输出的命令\n\n| 命令 | 功能 |\n| --- | --- |\n\
    | 空格键 | 立即刷新输出 |\n| < 或 > | 将排序列向左或向右移动一个位置。默认情况下，`top` 按 CPU 列排序。 |\n| D | 更改刷新时间\
    \ |\n| R | 反转排序顺序 |\n| Z | 切换彩色输出 |\n| H | 显示帮助菜单 |\n| F 或 O | 选择排序列 |\n\n键入 `q`，或按\
    \ `Ctrl+C` 退出 `top`。表 22-3 描述了 `top` 默认输出中显示的几个列。\n\n表 22-3. `top` 输出的列描述\n\n\
    | 列 | 描述 |\n| --- | --- |\n| `PID` | 唯一的进程标识符 |\n| `USER` | 运行进程的操作系统用户名 |\n|\
    \ `PR` | 进程优先级 |\n| `NI` | 进程的 nice 值。负值表示高优先级；正值表示低优先级。 |\n| `VIRT` | 进程使用的总虚拟内存\
    \ |\n| `RES` | 进程使用的非交换物理内存 |\n| `SHR` | 进程使用的共享内存 |\n| `S` | 进程状态 |\n| `%CPU`\
    \ | 自上次屏幕刷新以来进程消耗的 CPU 百分比 |\n| `%MEM` | 进程消耗的物理内存百分比 |\n| `TIME` | 进程使用的总 CPU\
    \ 时间 |\n| `TIME+` | 进程使用的总 CPU 时间，显示百分之一秒 |\n| `COMMAND` | 用于启动进程的命令行 |\n\n您也可以使用\
    \ `b`（批处理模式）选项运行 `top`，并将输出发送到文件以供后续分析：\n\n```\n$ top –b > tophat.out\n```\n\n\
    在批处理模式下运行时，`top` 命令将一直运行，直到您终止它（使用 `Ctrl+C`）或达到指定的迭代次数。您可以在前一个 `top` 命令中结合使用 `nohup`\
    \ 和 `&`，以使其在您是否登录系统的情况下都保持运行。这样做的危险在于，您可能会忘记它，并最终创建一个非常大的输出文件（以及一个愤怒的系统管理员）。\n\
    \n如果您有一个想要监控的特定进程，请使用 `p` 选项监控一个 `PID`，或使用 `U` 选项监控一个用户名。您还可以使用 `d` 和 `-n` 选项指定延迟和迭代次数。以下示例以\
    \ 5 秒的延迟监控 `oracle` 用户，共进行 25 次迭代：\n\n```\n$ top –u oracle –d 5 –n 25\n```\n\n\
    ![image](img/sq.jpg) **提示** 使用 `man top` 或 `top --help` 命令列出您的操作系统版本中所有可用的选项。\n\
    \n## 将操作系统进程映射到 SQL 语句\n\n在识别操作系统进程时，查看哪些进程消耗最多的 CPU 非常有用。如果资源占用者是数据库进程，将操作系统进程映射到数据库作业或查询也很有用。要确定消耗最多\
    \ CPU 资源的进程的 ID，请使用诸如 `ps` 之类的命令，如下所示：\n\n```\n$ ps -e -o pcpu,pid,user,tty,args\
    \ | sort -n -k 1 -r | head\n```\n\n以下是输出片段：\n\n```\n14.6 24875 oracle   ?    \
    \    oracleo12c (DESCRIPTION=(LOCAL=YES)(ADDRESS=...\n 0.8 21613 oracle   ?  \
    \      ora_vktm_o12c\n 0.1 21679 oracle   ?        ora_mmon_o12c\n```\n\n从输出中，您可以看到操作系统会话\
    \ `24875` 是 CPU 资源的最大消耗者。输出还表明该进程与 `o12c` 数据库相关联。掌握了这些信息后，登录到相应的数据库，并使用以下 SQL\
    \ 语句来确定与操作系统进程 `24875` 关联的程序类型：\n\n```\nselect\n  'USERNAME : ' || s.username||\
    \ chr(10) ||\n  'OSUSER   : ' || s.osuser  || chr(10) ||\n  'PROGRAM  : ' || s.program\
    \ || chr(10) ||\n  'SPID     : ' || p.spid    || chr(10) ||\n  'SID      : ' ||\
    \ s.sid     || chr(10) ||\n  'SERIAL#  : ' || s.serial# || chr(10) ||\n  'MACHINE\
    \  : ' || s.machine || chr(10) ||\n  'TERMINAL : ' || s.terminal\nfrom v$session\
    \ s,\n     v$process p\nwhere s.paddr = p.addr\nand   p.spid  = &PID_FROM_OS;\n\
    ```\n\n当您运行该命令时，SQL*Plus 将提示您输入用于替代 `&PID_FROM_OS` 的值。在此示例中，您将输入 `24875`。以下是相关输出：\n\
    \n```\nUSERNAME : MV_MAINT\nOSUSER   : oracle\nPROGRAM  : sqlplus@speed2 (TNS\
    \ V1-V3)\nSPID     : 24875\nSID      : 111\nSERIAL#  : 899\nMACHINE  : speed2\n\
    TERMINAL : pts/4\n```\n\n在此输出中，`PROGRAM` 值表明一个 SQL*Plus 会话是消耗服务器上过量资源的程序。接下来，运行以下查询以显示与操作系统\
    \ `PID` 关联的 SQL 语句（在此示例中，服务器进程标识符 [SPID] 是 `24875`）：\n\n```\nselect\n  'USERNAME\
    \ : ' || s.username || chr(10) ||\n  'OSUSER   : ' || s.osuser   || chr(10) ||\n\
    \  'PROGRAM  : ' || s.program  || chr(10) ||\n  'SPID     : ' || p.spid     ||\
    \ chr(10) ||\n  'SID      : ' || s.sid      || chr(10) ||\n  'SERIAL#  : ' ||\
    \ s.serial#  || chr(10) ||\n  'MACHINE  : ' || s.machine  || chr(10) ||\n  'TERMINAL\
    \ : ' || s.terminal || chr(10) ||\n  'SQL TEXT : ' || sa.sql_text\nfrom v$process\
    \ p,\nv$session s,\nv$sqlarea sa\nwhere p.addr = s.paddr\nand s.username is not\
    \ null\nand s.sql_address = sa.address(+)\nand s.sql_hash_value = sa.hash_value(+)\n\
    and p.spid= &PID_FROM_OS;\n```\n\n结果显示消耗资源的 SQL 作为输出的一部分，位于 `SQL TEXT` 列中。以下是输出片段：\n\
    \n```\nUSERNAME : MV_MAINT\nOSUSER   : oracle\nPROGRAM  : sqlplus@speed2 (TNS\
    \ V1-V3)\nSPID     : 24875\nSID      : 111\nSERIAL#  : 899\nMACHINE  : speed2\n\
    TERMINAL : pts/4\nSQL TEXT : select a.table_name from dba_tables a,dba_indexes\
    \ b,dba_objects c...\n```\n\n当您在一台服务器上运行多个数据库并遇到服务器性能问题时，有时很难确定是哪个数据库及相关进程导致了问题。在这些情况下，您必须使用操作系统工具来识别系统上消耗资源最多的会话。\n\
    \n在 Linux/Unix 环境中，您可以使用诸如 `ps`、`top` 或 `vmstat` 之类的工具来识别消耗资源最多的操作系统进程。`ps` 工具非常方便，因为它可以让您识别消耗最多\
    \ CPU 或内存的进程。前面的 `ps` 命令识别了消耗 CPU 最多的进程。在这里，它被用来识别使用 Oracle 内存最多的进程：\n\n```\n\
    $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head\n\
    ```\n"
- fmt: "# 识别与监控数据库资源消耗\n\n一旦识别出与数据库相关的高消耗进程，就可以基于 SPID 查询数据字典视图，以确定该数据库进程正在执行什么操作。\n\
    \n## OS Watcher\n\nOracle 提供了一套用于收集和存储 CPU、内存、磁盘和网络使用情况指标的脚本。在 Linux/Unix 系统上，OS\
    \ Watcher 工具套件通过使用 `top`、`vmstat`、`iostat`、`mpstat`、`netstat` 和 `traceroute` 等工具，实现了统计数据收集的自动化。该工具还有一个可选的图形组件，用于可视化显示性能指标。\n\
    \n您可以从 Oracle 的 MOS 网站获取 OS Watcher。对于 Linux/Unix 版本，请参阅 MOS 笔记 301137.1 或标题为\
    \ “OS Watcher User Guide” 的文档。有关 Windows 版本 OS Watcher 的详细信息，请参阅 MOS 笔记 433472.1。\n\
    \n## 查找资源密集型 SQL 语句\n\n隔离性能不佳查询的最佳方法之一，就是有用户或开发者对某个特定 SQL 语句进行投诉。在这种情况下，无需进行任何侦探工作。您可以直接定位到需要调优的\
    \ SQL 查询。\n\n然而，在调查性能问题时，您通常没有这种直接的提示。有几种方法可用于确定数据库中哪些 SQL 语句消耗了最多的资源：\n\n*  \
    \ 实时执行统计信息（从 Oracle Database 11g 开始新增）\n*   近实时统计信息\n*   Oracle 性能报告\n\n这些技术将在接下来的几个部分中描述。\n\
    \n### 监控实时 SQL 执行统计信息\n\n如果您使用的是 Oracle Database 11g 或更高版本，可以使用以下查询从 `V$SQL_MONITOR`\
    \ 中选择数据，以监控 SQL 查询的近实时资源消耗情况：\n\n```sql\nselect * from (\nselect a.sid session_id,\
    \ a.sql_id\n,a.status\n,a.cpu_time/1000000 cpu_sec\n,a.buffer_gets, a.disk_reads\n\
    ,b.sql_text sql_text\nfrom v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\n\
    order by a.cpu_time desc)\nwhere rownum <=20;\n```\n\n该查询的输出结果不易完全显示在一页上。以下是输出结果的一个子集：\n\
    \n```\nSESSION_ID SQL_ID        STATUS      CPU_SEC BUFFER_GETS  DISK_READS SQL_TEXT\n\
    ---------- ------------- --------- ---------- ----------- ---------- ---------------\n\
    \       139 d07nngmx93rq7 DONE          331.88        5708       3490 select count(*)\n\
    \       130 9dtu8zn9yy4uc EXECUTING      11.55        5710        248 select task_name\n\
    ```\n\n在此查询中，使用了一个内联视图来首先检索所有记录并按 `CPU_TIME` 降序组织它们。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前\
    \ 20 行。您可以修改之前的查询，以按您选择的统计信息对结果进行排序，或仅显示当前正在执行的查询。例如，下一个 SQL 语句监控当前正在执行的查询，并按磁盘读取数量排序：\n\
    \n```sql\nselect * from (\nselect a.sid session_id, a.sql_id, a.status\n,a.cpu_time/1000000\
    \ cpu_sec\n,a.buffer_gets, a.disk_reads\n,substr(b.sql_text,1,35) sql_text\nfrom\
    \ v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\nand   a.status='EXECUTING'\n\
    order by a.disk_reads desc)\nwhere rownum <=20;\n```\n\n`V$SQL_MONITOR` 中的统计信息每秒更新一次，因此您可以查看资源消耗的变化情况。默认情况下，如果\
    \ SQL 语句并行运行或消耗超过 5 秒的 CPU 或 I/O 时间，则会收集这些统计信息。\n\n`V$SQL_MONITOR` 视图包含 `V$SQL`、`V$SQLAREA`\
    \ 和 `V$SQLSTATS` 视图中统计信息的一个子集。`V$SQL_MONITOR` 视图显示每次执行资源密集型 SQL 语句的实时统计信息，而 `V$SQL`、`V$SQLAREA`\
    \ 和 `V$SQLSTATS` 则包含由于多次执行 SQL 语句而累积的统计信息集。\n\nSQL 语句执行结束后，运行时统计信息不会立即从 `V$SQL_MONITOR`\
    \ 中清除。根据数据库中的活动情况，这些统计信息可能会保留一段时间。但是，如果您的数据库非常活跃，统计信息可能会在查询完成后不久就被清除。\n\n![image](Images/sq.jpg)\
    \ **提示**：您可以通过以下列的组合在 `V$SQL_MONITOR` 中唯一标识 SQL 语句的执行：`SQL_ID`、`SQL_EXEC_START`、`SQL_EXEC_ID`。\n\
    \n您也可以查询 `V$SQLSTATS` 等视图来确定哪些 SQL 语句消耗了异常多的资源。例如，使用以下查询来识别基于 CPU 时间的十大资源密集型查询：\n\
    \n```sql\nselect * from(\nselect s.sid, s.username, s.sql_id\n,sa.elapsed_time/1000000,\
    \ sa.cpu_time/1000000\n,sa.buffer_gets, sa.sql_text\nfrom v$sqlarea sa\n    ,v$session\
    \ s\nwhere s.sql_hash_value = sa.hash_value\nand   s.sql_address    = sa.address\n\
    and   s.username is not null\norder by sa.cpu_time desc)\nwhere rownum <= 10;\n\
    ```\n\n在之前的查询中，使用了一个内联视图来首先检索所有记录并按 `CPU_TIME` 降序对输出进行排序。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前\
    \ 10 行。该查询可以轻松修改为按 `CPU_TIME` 以外的列排序。例如，如果您想按 `BUFFER_GETS` 报告资源使用情况，只需在 `ORDER\
    \ BY` 子句中用 `BUFFER_GETS` 替换 `CPU_TIME` 即可。`CPU_TIME` 列以微秒计算；要将其转换为秒，需要除以 1,000,000。\n\
    \n![image](Images/sq.jpg) **提示**：请记住，`V$SQLAREA` 包含在给定会话持续期间累积的统计信息。因此，如果一个会话多次运行相同的查询，则该连接的统计信息将是该查询所有运行的总和。相比之下，`V$SQL_MONITOR`\
    \ 显示的是给定 SQL 语句当前运行所累积的统计信息。因此，每次查询运行时，`V$SQL_MONITOR` 中都会报告该查询的新统计信息。\n\n## 运行\
    \ Oracle 诊断工具\n\nOracle 提供了多个用于诊断数据库性能问题的工具：\n\n*   自动工作负载存储库 (AWR)\n*   自动数据库诊断监视器\
    \ (ADDM)\n*   活动会话历史 (ASH)\n*   Statspack\n\nAWR、ADDM 和 ASH 是多年前在 Oracle Database\
    \ 10g 中引入的。这些工具提供了高级报告功能，使您能够对性能问题进行故障排除和解决。这些新工具需要从 Oracle 获得额外许可。较旧的 Statspack\
