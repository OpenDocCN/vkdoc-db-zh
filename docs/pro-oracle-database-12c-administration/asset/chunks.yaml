    \ job transcript backup statistics, refer to the *Oracle Secure Backup Administrator’s\
    \ Guide*.\n\nMonitoring OSB Logs\n\nIn addition to analyzing the OSB job details\
    \ and transcript, you can investigate the OSB logs. This is especially useful\
    \ when troubleshooting OSB issues. [Table 20-7](#9781430257288_Ch20.xhtml#Tab7)\
    \ lists the logs of the different OSB daemons and describes their contents.\n\n\
    [Table 20-7.](#9781430257288_Ch20.xhtml#_Tab7) Log Files of OSB Daemons\n\n| Daemon\
    \ | Messages Contained |\n| --- | --- |\n| observiced | OSB job run and transcript\
    \ cleanup as well as security messages related to certificate signing for host\
    \ and starting of the obhttpd and obscheduled services |\n| obndmpd | NDMP traffic\
    \ between clients and media server |\n| obproxyd | Verification of user access\
    \ for SBT backup/restore operations as well as import process of data into the\
    \ sbtpiece catalog after each database backup |\n| obscheduled | OSB job schedule\
    \ |\n| obixd | Import process of filesystem backup metadata into the backup catalog\
    \ |\n| obhttpd | Oracle Secure Backup web tool |\n| obrobotd | Library and drive\
    \ operations |\n\n[Table 20-8](#9781430257288_Ch20.xhtml#Tab8) lists the pathnames\
    \ of the log files for the different OSB daemons., Replace the OS variable {OSBhome}\
    \ to the /usr/local/oracle/backup directory for Unix/Linux platforms, and to the\
    \ C:\\Programs Files\\Oracle\\Backup directory for the Windows platform.\n\n[Table\
    \ 20-8.](#9781430257288_Ch20.xhtml#_Tab8) OSB Daemons and Logs\n\n| Daemon | Linux/Unix\
    \ | Windows |\n| --- | --- | --- |\n| Observiced | /usr/tmp/observiced.log | {OSBhome}\\\
    temp\\observiced.log |\n| obndmpd | /usr/tmp/obndmpd.log | {OSBhome}\\temp\\obndmpd.log\
    \ |\n| obproxyd | /usr/tmp/obproxyd.log | {OSBhome}\\temp\\obproxyd.log |\n| obscheduled\
    \ | {OSBhome}/admin/log/scheduler/log | {OSBhome}\\admin\\log\\scheduler\\log\
    \ |\n| obixd | {OSBhome}/admin/log/index/log | {OSBhome}\\admin\\log\\index\\\
    log |\n| obhttpd | {OSBhome}/apache/logs/error_log | {OSBhome}\\apache\\logs\\\
    error_log |\n| obrobotd | {OSBhome}/admin/log/device/{library}/obrobotd | {OSBhome}\\\
    admin\\log\\device\\{library}\\obrobotd |\n\nFor example, while the RMAN backup\
    \ job is running, you can run the following OS command to monitor the obproxyd.log\
    \ on the server hosting the Oracle database:\n\n```\n# tail -f /usr/tmp/obproxyd.log\n\
    ```\n\nFrom another terminal, on which you are connected to the OSB admin server\
    \ or media server, you can run this OS command to monitor the observiced.log,\
    \ as shown.\n\n```\n# tail -f /usr/tmp/observiced.log\n```\n\nVirtual Test Devices\n\
    \nYou may relate to the expression “experience is the best teacher.” You have\
    \ read this chapter, and you want to try the OSB commands and examples yourself.\
    \ However, you don’t have a physical tape device connected to any test servers\
    \ in your environment. In this situation, where can you install and experiment\
    \ with OSB? Well, you can configure a virtual test device solely for testing purposes.\n\
    \n![image](Images/sq.jpg) **Caution**   You should not implement virtual test\
    \ devices in a production environment. Oracle Support does not provide support\
    \ for virtual test devices.\n\nTo configure a virtual test device, perform the\
    \ following steps. In this example the hostname of the media server is BLLNX3.\n\
    \n1.  Log in as the oracle OS user at your designated media server of the OSB\
    \ administrative domain.\n\n    ```\n    $ su - oracle\n    ```\n\n2.  At the\
    \ OSB media server, create a directory that hosts the virtual storage elements\
    \ and virtual tape devices. Make sure you have enough disk space on the mount\
    \ point on which you are going to create the directory.\n\n    ```\n    $ mkdir\
    \ /osb_vdevices\n    ```\n\n3.  Log in as admin user to the obtool utility, and\
    \ provide the corresponding password.\n\n    ```\n    $ obtool -u admin\n     Password:\n\
    \    ```\n\n4.  Configure the virtual tape library by running the following m\
    \ kdev command, using the -t option to specify the device as a tape library and\
    \ the -v option to specify it as a virtual tape library. The -S option specifies\
    \ the number of storage elements. The -I option specifies the number of export\
    \ and import elements. The -o option specifies that the tape device is logically\
    \ available to OSB. The -B option with the yes value specifies that the bar code\
    \ reader is present. The -a option attaches the virtual library vlib1 to the directory\
    \ /osb_vdevices/vlib1 of the host BLLNX3.\n\n    ```\n    ob> mkdev -t library\
    \ -v -S20 -I2 -o -B yes -a BLLNX3:/osb_vdevices/vlib1  vlib1\n    ```\n\n5.  Configure\
    \ the virtual tape devices by running the following m kdev command, using the\
    \ -t option to specify the device as a tape device and the -v option to specify\
    \ it as a virtual tape device. The -o option specifies that the tape device is\
    \ logically available to OSB. The -l option specifies the name of the associated\
    \ tape library. The -d option specifies the data transfer element (DTE). The -a\
    \ option attaches the virtual tape vdrive1 to the directory /osb_vdevices/vdrive1\
    \ of the host BLLNX3\\. To configure additional virtual tape devices, run the\
    \ same mkdev command. However, for the second virtual tape device, change the\
    \ name vdrive1 and the directory /osb_vdevices/vdrive1 to vdrive2 and /osb_vdevices/vdrive2,\
    \ respectively.\n\n    ```\n    ob> mkdev -t tape -v -o -l vlib1 -d1 -a BLLNX3:/osb_vdevices/vdrive1  vdrive1\n\
    \    ```\n\n6.  Run the i nsertvol command to insert a volume to the tape library\
    \ manually. The -L option specifies the library name, which is vlib1\\. Because\
    \ there are 20 storage elements defined when the virtual library is created, issue\
    \ unlabeled 1-20 to insert 20 new volumes.\n\n    ```\n    ob> insertvol -L vlib1\
    \ unlabeled 1-20\n    ```\n\n7.  Issue the l svol command to display the volumes\
    \ in the tape library vlib1.\n\n    ```\n    ob> lsvol -l -L vlib1\n    ```\n\n\
    Oracle Database Backup in the Cloud\n\nPerhaps your company is traditionally dependent\
    \ on tape for off-site backups of your Oracle database. However, with the continuous\
    \ accessibility, better reliability, and cost savings offered by Oracle Secure\
    \ Backup Cloud Module, you can back up your Oracle database to the cloud (Internet\
    \ storage) through Amazon Web Services (AWS), using Amazon Simple Storage Service\
    \ (Amazon S3).\n\nTo install and configure the Oracle Secure Backup Cloud Module,\
    \ perform the following steps:\n\n1.  Obtain your Oracle Technology Network account\
    \ *username and password*. You can register for a free account by going to the\
    \ Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)\
    \ ).\n2.  Obtain your AWS access key ID and secret access key at aws.amazon.com\
    \ by selecting the My Account/Console tab and choosing Security Credentials under\
    \ the drop-down menu. You can create your Amazon account at [www.amazon.com](http://www.amazon.com).\n\
    3.  Download the S3 backup installer, osbws_installer.zip, from [www.oracle.com/technetwork/database/secure-backup/secure-backup-s3-484709.html](http://www.oracle.com/technetwork/database/secure-backup/secure-backup-s3-484709.html).\n\
    4.  Unzip the osbws_installer.zip.\n\n    ```\n    $ unzip osbws_installer.zip\n\
    \    ```\n\n5.  Set and verify the OS environment variables ORACLE_HOME and ORACLE_SID.\n\
    \n    ```\n    $ . oraenv\n    ORACLE_SID = [MYDB] ?\n    The Oracle base for\
    \ ORACLE_HOME=/usr/oracle/product/12.1.0/db_1 is /usr/oracle\n    $ env | grep\
    \ ORACLE\n    ORACLE_SID=MYDB\n    ORACLE_BASE=/usr/oracle\n    ORACLE_HOME=/usr/oracle/product/12.1.0/db_1\n\
    \    ```\n\n6.  Run the installer to extract the Oracle Secure Backup Cloud Module\
    \ library and to create the library configuration file and the Oracle wallet where\
    \ the S3 credentials are to be stored. Make sure to replace the appropriate values\
    \ for your AWS access key ID and secret access key as well as your Oracle Technology\
    \ Network username and password. If your server is behind a firewall, provide\
    \ the appropriate values for the proxyHost and proxyPort. Otherwise, you can omit\
    \ the proxyHost and proxyPort.\n\n    ```\n    $ORACLE_HOME/jdk/bin/java -jar\
    \ osbws_install.jar \\\n     -AWSID ***** -AWSKey ***** \\\n     -otnUser *****\
    \ -otnPass ***** \\\n     -walletDir $ORACLE_HOME/dbs/osbws_wallet \\\n     -configFile\
    \ $ORACLE_HOME/dbs/osbws$ORACLE_SID \\\n     -libdir $ORACLE_HOME/lib \\\n   \
    \  -proxyHost www-proxy.us.oracle.com \\\n     -proxyPort 80\n    ```\n\nHere\
    \ is the sample output:\n\n```\nOracle Secure Backup Database Web-Service Install\
    \ Tool, build 2011-02-04.0001\nAWS credentials are valid.\nS3 user already registered.\n\
    Registration ID: *****\nS3 Logging Bucket: oracle-log-bernard--1\nValidating log\
    \ bucket location ...\nValidating license file ...\nCreate credential oracle.security.client.connect_string1\n\
    OSB web-services wallet created in directory /usr/oracle/product/12.1.0/db_1/dbs/osbws_wallet.\n\
    OSB web-services initialization file /usr/oracle/product/12.1.0/db_1/dbs/osbwsMYDB\
    \ created.\nDownloading OSB Web Services Software Library from file osbws_linux32.zip.\n\
    Downloaded 15060954 bytes in 30 seconds. Transfer rate was 502031 bytes/second.\n\
    Download complete.\nExtracted file /usr/oracle/product/12.1.0/db_1/lib/libosbws12.so\n\
    ```\n\n![image](Images/sq.jpg) **Note**   Installation of OSB is not required\
    \ to install and run Oracle Secure Backup Cloud Module.\n\nAfter you extract the\
    \ Oracle Secure Backup Cloud Module library, you can run the following RMAN backup\
    \ script to store the backups of your Oracle database directly to Amazon S3, as\
    \ shown.\n\n```\nrun {\nallocate channel t1 device type sbt_tape parms='SBT_LIBRARY=/usr/oracle/product/12.1.0/db_1/lib/libosbws12.so,ENV=(OSB_WS_PFILE=/usr/oracle/product/12.1.0/db_1/dbs/osbwsMYDB)';\n\
    backup database;\n}\n```\n\nThe following is a snippet of the RMAN log, indicating\
    \ that the RMAN channel t1 is connected via the Oracle Secure Backup Web Services\
    \ Library, as follows:\n\n```\nallocated channel: t1\nchannel t1: SID=124 device\
    \ type=SBT_TAPE\nchannel t1: Oracle Secure Backup Web Services Library\n```\n\n\
    OSB Software Upgrades\n\nYou have an older version of OSB installed, and you want\
    \ to upgrade to the current release. To perform an OSB upgrade, follow the same\
    \ procedure used for installing OSB. However, before performing the upgrade, make\
    \ sure to back up the OSB catalog in the admin server and stop the OSB daemons\
    \ and services at all hosts in the administrative domain. Also, upgrade the admin\
    \ server first, then the media servers and client hosts.\n\n[Table 20-9](#9781430257288_Ch20.xhtml#Tab9)\
    \ provides a list of OS-specific commands for starting and stopping OSB services.\
    \ You must have root privilege on Linux/Unix or be a member of the Administrators\
    \ group for Windows to run these commands.\n\n[Table 20-9.](#9781430257288_Ch20.xhtml#_Tab9)\
    \ OSB Service Shutdown and Startup Commands\n\n| OS | Shutdown Command | Startup\
    \ Command |\n| --- | --- | --- |\n| Linux | etc/init.d/observiced stop | etc/init.d/observiced\
    \ start |\n| Solaris | etc/init.d/OracleBackup stop | etc/init.d/OracleBackup\
    \ start |\n| AIX | etc/rc.d/init.d/OracleBackup stop | etc/rc.d/init.d/OracleBackup\
    \ start |\n| HP-UX | /sbin/init.d/OracleBackup stop | /sbin/init.d/OracleBackup\
    \ start |\n| Windows | net stop observiced | net start observiced |\n\nSummary\n\
    \nOSB is a tool you can use to back up and restore OS files to and from tape.\
    \ OSB is a full-featured tape management utility. OSB can be integrated with RMAN\
    \ to facilitate the backup of database files directly to tape. This provides you\
    \ with extra data protection in the event that the entire server or data center\
    \ experiences a failure.\n\nOSB is available in two editions: Oracle Secure Backup\
    \ Express and Oracle Secure Backup. The Express version is available for use without\
    \ extra licensing costs and is suitable for small shops with one server and one\
    \ physical tape device. The full-fledged Oracle Secure Backup edition is appropriate\
    \ for distributed servers across multiple platforms (Linux/Unix, Windows).\n\n\
    You can access OSB through graphical tools such as Enterprise Manager and Oracle\
    \ Secure Backup web tool or through command-line tools such as obtool. This chapter\
    \ focused on demonstrating how to use the command-line obtool for backup and restore\
    \ operations.\n\nIn addition to storing the backups of your Oracle database on\
    \ tape for off-site storage, you can install and configure Oracle Secure Backup\
    \ Cloud Module to store the backups of your Oracle database directly to Amazon\
    \ S3\\. However, because of network performance and security concerns, some companies\
    \ may not adapt the backup to cloud technology.\n\nThis chapter concludes coverage\
    \ of backup and recovery. The next chapter focuses on automating jobs and database\
    \ troubleshooting.\n\nCHAPTER 21\n\n![image](Images/frontdot.jpg)\n\nAutomating\
    \ Jobs\n\nIn almost any type of database environment—from development, to testing,\
    \ to production—DBAs rely heavily on automating tasks. Typical jobs that DBAs\
    \ automate include the following:\n\n*   Shutdown and startup of databases and\
    \ listeners\n*   Backups\n*   Validating the integrity of backups\n*   Checking\
    \ for errors\n*   Removing old trace or log files\n*   Checking for errant processes\n\
    *   Checking for abnormal conditions\n\nAutomating routine tasks allows DBAs to\
    \ be much more effective and productive. Automated environments are inherently\
    \ smoother running and more efficient than manually administered systems. DBA\
    \ jobs that run automatically from scripts consistently execute the same set of\
    \ commands each time and therefore are less prone to human error and mistakes.\
    \ Two scheduling utilities are described in this chapter:\n\n*   Oracle Scheduler\n\
    *   Linux/Unix cron utility\n\nThis chapter begins by detailing the basic aspects\
    \ of the Oracle Scheduler utility. This scheduler is available if you have an\
    \ Oracle database installed. Oracle Scheduler can be used to schedule jobs in\
    \ a wide variety of configurations.\n\nAlso covered in this chapter is how to\
    \ use the Linux/Unix cron scheduling tool. In Linux/Unix environments, DBAs often\
    \ use the cron scheduling utility to run jobs automatically. The cron utility\
    \ is ubiquitous and easy to implement and use. If you’re an Oracle DBA, you must\
    \ be familiar with cron, because sooner or later, you’ll find yourself in an environment\
    \ that relies heavily on this tool to automate database jobs.\n\nThe last several\
    \ sections in this chapter show you how to implement many real-world DBA jobs,\
    \ such as automatically starting/stopping the database, monitoring, and OS file\
    \ maintenance. You should be able to extend these scripts to meet the automation\
    \ requirements of your environment.\n\n![image](Images/sq.jpg) **Note**   Enterprise\
    \ Manager Grid/Cloud Control can also be used to schedule and manage automated\
    \ jobs. If you work in a shop that uses Enterprise Manager, then it’s appropriate\
    \ to use this tool for automating your environment.\n\nAutomating Jobs with Oracle\
    \ Scheduler\n\nOracle Scheduler is a tool that provides a way of automating the\
    \ scheduling of jobs. Oracle Scheduler is implemented via the DBMS_SCHEDULER internal\
    \ PL/SQL package. Oracle Scheduler offers a sophisticated set of features for\
    \ scheduling jobs. The following sections of this chapter cover the basics of\
    \ using Oracle Scheduler to automate jobs with simple requirements.\n\n![image](Images/sq.jpg) **Tip**  \
    \ There are currently more than 70 procedures and functions available within the\
    \ DBMS_SCHEDULER package. For complete details, see the *Oracle Database PL/SQL\
    \ Packages and Types Reference Guide*, which is available for download from the\
    \ Technology Network area of the Oracle Web site ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nCreating and Scheduling a Job\n\nThe example in this section shows how to use\
    \ DBMS_SCHEDULER to run an OS shell script on a daily basis. First, a shell script\
    \ is created that contains an RMAN backup command. For this example, the shell\
    \ script is named rmanback.bsh and is located in the /orahome/oracle/bin directory.\
    \ The shell script also assumes that there is an /orahome/oracle/bin/log directory\
    \ available. Here is the shell script:\n\n```\n#!/bin/bash\n# source oracle OS\
    \ variables; see Chapter 2 for an example of oraset script\n. /etc/oraset o12c\n\
    rman target / <<EOF\nspool log to '/orahome/oracle/bin/log/rmanback.log'\nbackup\
    \ database;\nspool log off;\nEOF\nexit 0\n```\n\nNext, the CREATE_JOB procedure\
    \ of the DBMS_SCHEDULER package is used to create a daily job. Next, connect as\
    \ SYS, and execute the following command:\n\n```\nBEGIN\nDBMS_SCHEDULER.CREATE_JOB(\n\
    job_name => 'RMAN_BACKUP',\njob_type => 'EXECUTABLE',\njob_action => '/orahome/oracle/bin/rmanback.bsh',\n\
    repeat_interval => 'FREQ=DAILY;BYHOUR=9;BYMINUTE=35',\nstart_date => to_date('17-01-2013','dd-mm-yyyy'),\n\
    job_class => '\"DEFAULT_JOB_CLASS\"',\nauto_drop => FALSE,\ncomments => 'RMAN\
    \ backup job',\nenabled => TRUE);\nEND;\n/\n```\n\nIn the prior code the JOB_TYPE\
    \ parameter can be one of the following types: STORED_PROCEDURE, PLSQL_BLOCK,\
    \ EXTERNAL_SCRIPT, SQL_SCRIPT, or EXECUTABLE.\n\nThe REPEAT_INTERVAL parameter\
    \ is set to FREQ=DAILY;BYHOUR=9;BYMINUTE=35\\. This instructs the job to run daily,\
    \ at 9:35 am. The REPEAT_INTERVAL parameter of the CREATE_JOB is capable of implementing\
    \ sophisticated calendaring frequencies. For instance, it supports a variety of\
    \ yearly, monthly, weekly, daily, hourly, by the minute, and by the second schedules.\
    \ The *Oracle Database PL/SQL Packages and Types Reference Guide* contains several\
    \ pages of syntax details for just the REPEAT_INTERVAL parameter.\n\nThe JOB_CLASS\
    \ parameter specifies which job class to assign the job to. Typically, you would\
    \ create a job class and assign a job to that class, whereby the job would inherit\
    \ the attributes of that particular class. For example, you may want all jobs\
    \ in a particular class to have the same logging level or to purge log files in\
    \ the same manner. There’s a default job class that can be used if you haven’t\
    \ created any job classes. The previous example uses the default job class.\n\n\
    The AUTO_DROP parameter is set to FALSE in this example. This instructs the Oracle\
    \ Scheduler not to drop the job automatically after it runs (the default is TRUE).\n\
    \nViewing Job Details\n\nTo view details about how a job is configured, query\
    \ the DBA_SCHEDULER_JOBS view. This query selects information for the RMAN_BACKUP\
    \ job:\n\n```\nSELECT job_name\n ,last_start_date\n ,last_run_duration\n ,next_run_date\n\
     ,repeat_interval\nFROM dba_scheduler_jobs\nWHERE job_name='RMAN_BACKUP';\n```\n\
    \nEach time a job runs, a record of the job execution is logged in the data dictionary.\
    \ To check the status of a job execution, query the DBA_SCHEDULER_JOB_LOG view.\
    \ There should be one entry for every time a job has run:\n\n```\nSELECT job_name\n\
    ,log_date\n,operation\n,status\nFROM dba_scheduler_job_log\nWHERE job_name='RMAN_BACKUP';\n\
    ```\n\nModifying Job Logging History\n\nBy default the Oracle Scheduler keeps\
    \ 30 days’ worth of log history. You can modify the default retention period via\
    \ the S ET_SCHEDULER_ATTRIBUTE procedure. For example this command changes the\
    \ default number of days to 15:\n\n```\nSQL> exec dbms_scheduler.set_scheduler_attribute('log_history',15);\n\
    ```\n\nTo remove the contents of the log history completely, use the P URGE_LOG\
    \ procedure:\n\n```\nSQL> exec dbms_scheduler.purge_log();\n```\n\nModifying a\
    \ Job\n\nYou can modify various attributes of a job via the SET_ATTRIBUTE procedure.\
    \ This example modifies the RMAN_BACKUP job to run weekly, on Mondays:\n\n```\n\
    BEGIN\n  dbms_scheduler.set_attribute(\n    name=>'RMAN_BACKUP'\n   ,attribute=>'repeat_interval'\n\
       ,value=>'freq=weekly; byday=mon');\nEND;\n/\n```\n\nYou can verify the change\
    \ by selecting the REPEAT_INTERVAL column from the DBA_SCHEDULER_JOBS view. Here\
    \ is what the REPEAT_INTERVAL column now shows for the RMAN_BACKUP job:\n\n```\n\
    21-JAN-13 12.00.00.200000 AM -07:00 freq=weekly; byday=mon\n```\n\nFrom the prior\
    \ output you can see that the job will run on the next Monday, and because no\
    \ BYHOUR and BYMINUTE options were specified (when modifying the job), the job\
    \ is scheduled to run at the default time of 12:00 am.\n\nStopping a Job\n\nIf\
    \ you have a job that has been running for an abnormally long period of time,\
    \ you may want to abort it. Use the S TOP_JOB procedure to stop a currently running\
    \ job. This example stops the RMAN_BACKUP job while it is running:\n\n```\nSQL>\
    \ exec dbms_scheduler.stop_job(job_name=>'RMAN_BACKUP');\n```\n\nThe STATUS column\
    \ of DBA_SCHEDULER_JOB_LOG will show STOPPED for jobs stopped using the STOP_JOB\
    \ procedure.\n\nDisabling a Job\n\nYou may want to temporarily disable a job because\
    \ it’s not running correctly. You need to ensure that the job does not run while\
    \ you’re troubleshooting the issue. Use the D ISABLE procedure to disable a job:\n\
    \n```\n SQL> exec dbms_scheduler.disable('RMAN_BACKUP');\n```\n\nIf the job is\
    \ currently running, consider stopping the job first or using the FORCE option\
    \ of the DISABLE procedure:\n\n```\nSQL> exec dbms_scheduler.disable(name=>'RMAN_BACKUP',force=>true);\n\
    ```\n\nEnabling a Job\n\nYou can enable a previously disabled job via the ENABLE\
    \ procedure of the DBMS_SCHEDULER package. This example reenables the RMAN_BACKUP\
    \ job:\n\n```\nSQL> exec dbms_scheduler.enable(name=>'RMAN_BACKUP');\n```\n\n\
    ![image](Images/sq.jpg) **Tip**   You can check to see if a job has been disabled\
    \ or enabled by selecting the E NABLED column from the DBA_SCHEDULER_JOBS view.\n\
    \nCopying a Job\n\nIf you have a current job that you want to clone, you can use\
    \ the COPY_JOB procedure to accomplish this. The procedure takes two arguments:\
    \ the old job name and the new job name. Here is an example of copying a job,\
    \ where RMAN_BACKUP is a previously created job, and RMAN_NEW_BACK is the new\
    \ job that will be created:\n\n```\nbegin\n  dbms_scheduler.copy_job('RMAN_BACKUP','RMAN_NEW_BACK');\n\
    end;\n/\n```\n\nThe copied job will be created but not enabled. You must enable\
    \ the job first (see the previous section for an example) before it will run.\n\
    \nRunning a Job Manually\n\nYou can manually run a job outside its regular schedule.\
    \ You might want to do this to test the job to ensure that it’s working correctly.\
    \ Use the RUN_JOB procedure to initiate a job manually. This example manually\
    \ runs the previously created RMAN_BACKUP job:\n\n```\nBEGIN\n  DBMS_SCHEDULER.RUN_JOB(\n\
      JOB_NAME => 'RMAN_BACKUP',\n  USE_CURRENT_SESSION => FALSE);\nEND;\n/\n```\n\
    \nThe USE_CURRENT_SESSION parameter instructs Oracle Scheduler to run the job\
    \ as the current user (or not). A value of FALSE instructs the scheduler to run\
    \ the job as the user who originally created and scheduled the job.\n\nDeleting\
    \ a Job\n\nIf you no longer require a job, you should delete it from the scheduler.\
    \ Use the DOP_JOB procedure to permanently remove a job. This example removes\
    \ the RMAN_BACKUP job:\n\n```\nBEGIN\n  dbms_scheduler.drop_job(job_name=>'RMAN_BACKUP');\n\
    END;\n/\n```\n\nThe code will drop the job and remove any information regarding\
    \ the dropped job from the DBA_SCHEDULER_JOBS view.\n\nOracle Scheduler vs. cron\n\
    \nDBAs often debate whether they should use Oracle Scheduler or the Linux/Unix\
    \ cron utility for scheduling and automating tasks. These are some of the benefits\
    \ that Oracle Scheduler has over cron:\n\n*   Can make the execution of a job\
    \ dependent on the completion of another job\n*   Robust resource balancing and\
    \ flexible scheduling features\n*   Can run jobs based on a database event\n*\
    \   Program’s DBMS_SCHEDULER PL/SQL package syntax works the same, regardless\
    \ of the OS\n*   Can run status reports, using the data dictionary\n*   If working\
    \ in a clustered environment, no need to worry about synchronizing multiple cron\
    \ tables for each node in the cluster\n*   Can be maintained and monitored via\
    \ Enterprise Manager\n\nThe Oracle Scheduler is implemented via the D BMS_SCHEDULER\
    \ PL/SQL package. As discussed previously, it’s fairly easy to create and maintain\
    \ jobs, using this utility. Yet, despite Oracle Scheduler’s benefits, many DBAs\
    \ prefer to use a scheduling utility such as cron. These are some of the advantages\
    \ of cron:\n\n*   Easy to use; simple, tried and true; only takes seconds to create\
    \ or modify jobs\n*   Almost universally available on all Linux/Unix boxes; for\
    \ the most part, runs nearly identically, regardless of the Linux/Unix platform\
    \ (yes, there are minor differences)\n*   Database agnostic; operates independently\
    \ of the database and works the same, regardless of the database vendor or version\n\
    *   Works whether or not the database is available\n\nThe prior lists aren’t comprehensive\
    \ but should give you a flavor of the uses of each scheduling tool. I prefer to\
    \ use cron, but if you require a more sophisticated scheduler, then consider using\
    \ Oracle Scheduler. The following sections in this chapter provide information\
    \ on how to implement and schedule automated jobs via cron.\n\n![image](Images/sq.jpg) **Note**  \
    \ If you’re in a Windows environment, use the Task Scheduler utility to run batch\
    \ jobs automatically. You can access the Task Scheduler by going to the Control\
    \ Panel, and then to Administrative Tools.\n\nAutomating Jobs via cron\n\nThe\
    \ cron program is a job-scheduling utility that is ubiquitous in Linux/Unix environments.\
    \ This tool derives its name from *chrónos* (the Greek word for “time”). The cron\
    \ (the geek word for “scheduler”) tool allows you to schedule scripts or commands\
    \ to run at a specified time and repeat at a designated frequency.\n\nHow cron\
    \ Works\n\nWhen your Linux server boots up, a cron background process is automatically\
    \ started to manage all cron jobs in the system. The cron background process is\
    \ also known as the cron daemon. This process is started upon system startup by\
    \ the etc/init.d/crond script. You can check to see whether the cron daemon process\
    \ is running with the p s command:\n\n```\n$ ps -ef | grep crond | grep -v grep\n\
    root      3081     1  0  2012 ?        00:00:18 crond\n```\n\nOn Linux boxes,\
    \ you can also check to see whether the cron daemon is running, using the s ervice\
    \ command:\n\n```\n$ /sbin/service crond status\ncrond (pid  3081) is running...\n\
    ```\n\nThe root user uses several files and directories when executing system\
    \ cron jobs. The /etc/crontab file contains commands for running system cron jobs.\
    \ Here is a typical listing of the contents of the /etc/crontab file:\n\n```\n\
    SHELL=/bin/bash\nPATH=/sbin:/bin:/usr/sbin:/usr/bin\nMAILTO=root\nHOME=/\n# run-parts\n\
    01 * * * * root run-parts /etc/cron.hourly\n02 4 * * * root run-parts /etc/cron.daily\n\
    22 4 * * 0 root run-parts /etc/cron.weekly\n42 4 1 * * root run-parts /etc/cron.monthly\n\
    ```\n\nThis /etc/crontab file uses the run-parts utility to run scripts located\
    \ in the following directories: /etc/cron.hourly, /etc/cron.daily, /etc/cron.weekly,\
    \ and /etc/cron.monthly. If there is a system utility that needs to run other\
    \ than on an hourly, daily, weekly, or monthly basis, then it can be placed in\
    \ the /etc/cron.d directory.\n\nEach user can create a crontab (also known as\
    \ a cron table) file. This file contains the list of programs that you want to\
    \ run at a specific time and interval. This file is usually located in the /var/spool/cron\
    \ directory. For every user who creates a cron table, there will be a file in\
    \ the /var/spool/cron directory named after the user. As root, you can list the\
    \ files in that directory, as shown:\n\n```\n# ls /var/spool/cron\noracle root\n\
    ```\n\nThe cron background process is mostly idle. It wakes up once every minute\
    \ and checks /etc/crontab, /etc/cron.d, and the user cron table files and determines\
    \ whether there are any jobs that need to be executed.\n\n[Table 21-1](#9781430257288_Ch21.xhtml#Tab1)\
    \ summarizes the purpose of the various files and directories used by cron. Knowledge\
    \ of these files and directories will help you troubleshoot any issues as well\
    \ as get a better understanding of cron.\n\n[Table 21-1.](#9781430257288_Ch21.xhtml#_Tab1)\
    \ Descriptions of Files and Directories Used by the cron Utility\n\n| File | Purpose\
    \ |\n| --- | --- |\n| /etc/init.d/crond | Starts the cron daemon upon system boot\
    \ |\n| /var/log/cron | System messages related to the cron process; useful for\
    \ troubleshooting problems |\n| /var/spool/cron/<username> | User crontab files\
    \ are stored in the /var/spool/cron directory. |\n| /etc/cron.allow | Specifies\
    \ users who can create a cron table |\n| /etc/cron.deny | Specifies users who\
    \ are not allowed to create a cron table |\n| /etc/crontab/ | The system cron\
    \ table that has commands to run scripts located in the following directories:\
    \ /etc/cron.hourly, /etc/cron.daily, /etc/cron.weekly, and /etc/cron.monthly |\n\
    | /etc/cron.d | Directory that contains cron tables for jobs that need to run\
    \ on a schedule other than hourly, daily, weekly, or monthly |\n| /etc/cron.hourly\
    \ | Directory that contains system scripts to run on an hourly basis |\n| /etc/cron.daily\
    \ | Directory that contains system scripts to run on a daily basis |\n| /etc/cron.weekly\
    \ | Directory that contains system scripts to run on a weekly basis |\n| /etc/cron.monthly\
    \ | Directory that contains system scripts to run on a monthly basis |\n\nEnabling\
    \ Access to cron\n\nSometimes when SAs set up a new box, they don’t (by default)\
    \ enable the use of cron for all users on the system. To verify whether you have\
    \ access to cron, invoke the utility as follows:\n\n```\n$ crontab -e\n```\n\n\
    If you receive the following error message, then you do not have access:\n\n```\n\
    You (oracle) are not allowed to use this program (crontab)\n```\n\nTo enable cron\
    \ access as the root user, add oracle to the /etc/cron.allow file with the e cho\
    \ command:\n\n```\n# echo oracle >> /etc/cron.allow\n```\n\nOnce the oracle entry\
    \ is added to the /etc/cron.allow file, you can use the crontab utility to schedule\
    \ a job.\n\n![image](Images/sq.jpg) **Note**   You can also use an editing utility\
    \ (such as vi) to add an entry to the cron.allow file.\n\nThe root user can always\
    \ schedule jobs with the crontab utility. Other users must be listed in the /etc/cron.allow\
    \ file. If the /etc/cron.allow file does not exist, then the OS user must not\
    \ appear in the /etc/cron.deny file. If neither the /etc/cron.allow nor the /etc/cron.deny\
    \ file exists, then only the root user can access the crontab utility. (These\
    \ rules may vary slightly, depending on the version of Linux/Unix you’re using.)\n\
    \nOn some Unix OSs (such as Solaris) the cron.allow and cron.deny files are located\
    \ in the /etc/cron.d directory. These files usually can only be modified by the\
    \ root user.\n\n![image](Images/sq.jpg) **Tip**   On some Linux/Unix platforms\
    \ newer and more flexible variants of cron are available, such as the anacron\
    \ utility. Use the man anacron command to view details on the implementation of\
    \ this utility on your system.\n\nUnderstanding cron Table Entries\n\nYour cron\
    \ table is a list of numbers and commands that the cron background process (cron\
    \ daemon) will run at a specified time and schedule. The crontab utility expects\
    \ entries to follow a well-defined format. It’s a good idea to add a comment line\
    \ at the beginning of your crontab file that documents the required format, like\
    \ so:\n\n```\n# min(0-59) hr(0-23) dayMonth(1-31) monthYear(1-12) dayWeek(0/7-6)\
    \ commandOrScript\n```\n\nIn the previous example the number sign (#) in the cron\
    \ file represents the start of a comment. Any text entered after # is ignored\
    \ by cron.\n\nEach entry in the crontab is a single line composed of six fields.\
    \ The first five fields specify the execution time and frequency. Entries in these\
    \ fields can be separated by commas or hyphens. A comma indicates multiple values\
    \ for an entry, whereas a hyphen indicates a range of values. An entry can also\
    \ be an asterisk (*), which indicates that all possible values are in effect.\
    \ Here is an example to help clarify. The following entry sends an e-mail saying,\
    \ “Wake up,” every half hour, from 8 am to 4:30 pm, Monday through Friday:\n\n\
    ```\n0,30 8-16 * * 1-5 echo \"wake up\" | mailx -s \"wake up\"\n\ndkuhn@gmail.com\n\
    ```\n\nOn some Linux systems, you can skip a value within a range by following\
    \ the entry with /<integer>. For instance, if you wanted to run a job every other\
    \ minute, use 0-59/2 in the minute column. You can also use a slash (/) with an\
    \ asterisk to skip values. For instance, to run a job every fourth minute, you\
    \ would use */4 in the minute column.\n\nThe sixth field in the crontab can be\
    \ one or more Linux commands or a shell script. Or, put another way, the sixth\
    \ column can be any combination of commands or a script that you can run on one\
    \ line from the Linux command line.\n\nThe cron utility has a few quirks that\
    \ need further explanation. The fifth column is the day of the week. Sunday is\
    \ designated by either a 0 or a 7; Monday, by a 1; Tuesday, by a 2; and so on,\
    \ to Saturday, which is indicated with a 6.\n\nThe hour numbers in the second\
    \ column are in military time format, ranging from 0 to 23\\. The fourth column\
    \ (month of the year) and fifth column (day of the week) can be represented with\
    \ numeric values or by three-letter abbreviations. For example, the following\
    \ entry in the crontab uses three-letter abbreviations for months and days:\n\n\
    ```\n0,30 8-16 * Jan-Dec Mon-Fri echo \"wake up\" | mailx -s \"get up\"\n\ndkuhn@gmail.com\n\
    ```\n\nThere also appear to be overlapping columns, such as the third column (day\
    \ of the month) and the fifth column (day of the week). These columns allow you\
    \ to create flexible schedules for jobs that need to run on schedules such as\
    \ the 1st and 15th day of the month or every Tuesday. Put an asterisk in the column\
    \ that you’re not using. If you need to run a job on the 1st and 15th and every\
    \ Tuesday, then fill in both columns.\n\nIf you’re running a shell script from\
    \ cron that contains a call to an Oracle utility such as sqlplus or rman, ensure\
    \ that you instantiate within the script any required OS variables, such as ORACLE_SID\
    \ and ORACLE_HOME. If you don’t source these variables, you’ll see errors such\
    \ as the following when your shell script runs from cron:\n\n```\nsqlplus: command\
    \ not found\n```\n\nWhen cron runs a script (in a user’s crontab), it doesn’t\
    \ run the user’s startup or login files (such as .bashrc). Therefore, any script\
    \ (being run from cron) needs to explicitly set any required variables. You can\
    \ directly set the variables within the script or call another script that exports\
    \ these variables (such as Oracle’s oraenv script).\n\n![image](Images/sq.jpg) **Tip**  \
    \ Don’t schedule the jobs that you enter in cron to run all at the same time.\
    \ Rather, spread them out so as not to bog down cron or the system at any particular\
    \ point in time.\n\nScheduling a Job to Run Automatically\n\nTo schedule a job,\
    \ you must add a line in your cron table, specifying the time you want the job\
    \ to execute. There are two methods for adding entries in your cron table:\n\n\
    *   Editing the cron table file directly\n*   Loading the cron table from a file\n\
    \nThese two techniques are described in the following sections.\n\nEditing the\
    \ cron Table Directly\n\nYou an edit your cron table directly with the -e (editor)\
    \ option of the crontab command:\n\n```\n$ crontab -e\n```\n\nWhen issuing the\
    \ previous command, you will be presented with a file to edit. This file is known\
    \ as your cron table (crontab). To schedule a script named backup.bsh to run daily,\
    \ at 11:05 pm, enter the following line into your cron table:\n\n```\n5 23 * *\
    \ * /home/oracle/bin/backup.bsh\n```\n\nHere, the 5 specifies that the job will\
    \ run at 5 minutes after the top of the hour. The 23 is military time, specifying\
    \ that the job should run in the 2300 hour window (in this example, 5 minutes\
    \ after the hour). The three stars (* * *) signify that the job should run every\
    \ day of the month, every month of the year, and every day of the week.\n\nExit\
    \ the cron table file. If your default editor is vi, then type wq to exit. When\
    \ you exit crontab, your cron table is saved for you. To view your cron entries,\
    \ use the -l (list) option of the crontab command:\n\n```\n$ crontab -l\n```\n\
    \nTo remove your cron table completely, use the r option:\n\n```\n$ crontab -r\n\
    ```\n\nBefore running the previous command, you should save your cron table in\
    \ a text file, as shown:\n\n```\n$ crontab -l > saved.cron\n```\n\nIn this way,\
    \ you can refer to the saved file, in the event that you didn’t mean to delete\
    \ your cron table.\n\n![image](Images/sq.jpg) **Tip**   I once worked with a DBA\
    \ who thought crontab -r meant “read the cron table.” Don’t ever make that mistake.\n\
    \nSetting Default Editor\n\nThe default editor invoked to modify the cron table\
    \ is dependent on the value of your VISUAL OS variable. In my current environment\
    \ the VISUAL variable is set to vi:\n\n```\n$ echo $VISUAL\nvi\n```\n\nIf the\
    \ VISUAL OS variable isn’t set, then the value of EDITOR is used to define the\
    \ default editor. Make sure that either VISUAL or EDITOR is set to your editor\
    \ of choice. If neither VISUAL nor EDITOR is set, your system will default to\
    \ the ed editor. In this scenario, you’ll be presented with the following prompt:\n\
    \n```\n\n<blank prompt>\n```\n\nPress the Q key to exit from ed. You can have\
    \ the VISUAL or EDITOR variable automatically set for you when you log in to the\
    \ system. You can also manually set the editor with the export command. The following\
    \ example sets the default editor to vi:\n\n```\n$ export EDITOR=vi\n```\n\nConsider\
    \ putting the prior line of code in a startup file (such as .bashrc) so that your\
    \ editor is set consistently.\n\nLoading the cron Table from a File\n\nThe other\
    \ way to modify your cron table is to load it directly with a file name, using\
    \ the following syntax:\n\n```\n$ crontab <filename>\n```\n\nHere, the crontab\
    \ utility will load the contents of the specified file into your cron table. The\
    \ recommended steps to modify your cron table with this method are as follows:\n\
    \n1.  Before modifying your cron table, first populate a file with the cron table’s\
    \ current contents; for example,\n\n    ```\n    $ crontab -l > mycron.txt\n \
    \   ```\n\n2.  Next, make a copy of the previously created file (mycron.txt).\
    \ This allows you to revert back to the original file, in the event that you introduce\
    \ errors and can’t readily figure out what’s incorrect. This also provides you\
    \ with an audit trail of changes to your cron table:\n\n    ```\n    $ cp mycron.txt\
    \ mycron.jul29.txt\n    ```\n\n3.  Now, edit the mycron.txt file with your favorite\
    \ text editor:\n\n    ```\n    $ vi mycron.txt\n    ```\n\n    For example, to\
    \ schedule a script named backup.bsh to run daily, at 11:05 pm, add the following\
    \ lines:\n\n    ```\n    #---------------------------------------------------------------------------------\n\
    \    # File backup, dk: 20-jan-14, inserted.\n    5 23 * * * /home/oracle/bin/backup.bsh\n\
    \    #---------------------------------------------------------------------------------\n\
    \    ```\n\n4.  When you are finished making edits, load the contents of mycron.txt\
    \ into the cron table, as shown:\n\n    ```\n    $ crontab mycron.txt\n    ```\n\
    \nIf your file doesn’t conform to the cron syntax, you’ll receive an error such\
    \ as the following:\n\n```\n\"mycron.txt\":6: bad day-of-week\nerrors in crontab\
    \ file, can't install.\n```\n\nIn this situation, either correct the syntax error,\
    \ or reload the original copy of the cron table.\n\nEXAMPLE OF A TYPICAL CRON\
    \ TABLE\n\nListed here is a sample entry from a cron table on a database server:\n\
    \n#---------------------------------------------------------------------------------"
