     s.sid, s.serial#, s.username, s.osuser, p.spid, s.module,

     p.program, tbsp.block_size, su.tablespace

    ORDER BY s.sid;

    ```


    If you determine that you need to add space, you can either resize an existing
    data file or add a new one. To resize a temporary tablespace data file, use the
    ALTER DATABASE TEMPFILE...RESIZE statement. The following command resizes a temporary
