    The ADDM report analyzes data in the AWR tables to identify potential bottlenecks
    and high resource-consuming SQL queries.


    Using ASH


    The ASH report allows you to focus on short-lived SQL statements that have been
    recently run and that may have only executed for a briefly. Run the following
    script to generate an ASH report:


    ```

    SQL> @?/rdbms/admin/ashrpt

    ```


    Search the output for the section labeled “Top SQL.” Here is some sample output:


