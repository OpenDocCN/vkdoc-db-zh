    *   保持简单。如果一个模块超过一页长，那就太长了。不要实现另一个 DBA 无法理解或维护的脚本或功能。有时，简单的解决方案就是正确的解决方案。\n* \
    \  无论遇到什么灾难，保持冷静。保持尊重。\n*   不要害怕寻求或接受建议。欢迎反馈和批评。倾听他人。接受自己可能是错误的想法。\n*   利用图形化工具，但始终要知道如何手动实现某个功能。\n\
