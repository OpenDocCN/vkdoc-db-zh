    ## Oracle Database 12c新增的CDB级视图


    Oracle Database 12c新增了一个CDB级别的数据字典视图层，它超越了`DBA`/`ALL`/`USER`级别的视图。CDB级别的视图报告整个CDB中所有容器（根、种子和所有可插拔数据库）的信息。例如，如果你想查看CDB数据库中的所有用户，你应该从根容器查询`CDB_USERS`。如果你没有使用CDB，那么`DBA_USERS`仍然是报告所有用户信息的准确视图。许多数据字典视图现在包含一个名为`CON_ID`的新列，它是CDB内每个容器的唯一标识符。根容器的`CON_ID`为1。种子容器的`CON_ID`为2。在CDB内创建的每个新可插拔数据库都被分配一个唯一的顺序容器ID。


