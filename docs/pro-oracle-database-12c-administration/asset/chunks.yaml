    \n## 可插拔数据库\n\nOracle 数据库 12c 的新特性是 Oracle 多租户。此功能允许您在一个总体性的多租户容器数据库中创建和维护多个可插拔数据库。以下是对可插拔术语的简明介绍。\n\
