    ### 表 23-1. 可插拔数据库术语摘要


    | 术语 | 含义 |

    | --- | --- |

    | 容器数据库 (CDB), 多租户数据库 | 能够容纳一个或多个可插拔数据库的数据库 |

    | 可插拔数据库 (PDB) | 一组可以无缝地从一个CDB传输到另一个CDB的数据文件和元数据 |

    | 根容器 | 一个主数据文件和元数据集，包含关于CDB内所有容器的信息。根容器名为`CDB$ROOT`。 |

    | 容器 | 数据文件和元数据的集合。可以是根、种子或可插拔数据库。 |

    | 种子可插拔数据库 | 用于创建新可插拔数据库的数据文件和元数据模板。种子可插拔数据库名为`PDB$SEED`。 |

    | 插入 (Plugging) | 将可插拔数据库的元数据和数据文件与CDB关联 |

    | 拔出 (Unplugging) | 将可插拔数据库的元数据和数据文件与CDB解除关联 |

    | 克隆 (Cloning) | 从另一个数据库（种子、PDB或非CDB）的副本创建可插拔数据库 |

    | `CON_ID` | CDB内每个容器的唯一标识符。CDB级别的视图包含一个`CON_ID`列，用于标识所查看信息关联的容器。 |

    | CDB数据字典视图 | 包含关于CDB内所有可插拔数据库元数据的视图。这些视图仅在通过根容器的特权连接查询时显示有意义的信息。可插拔数据库必须处于打开状态才能使用。
    |

    | 非CDB数据库 | 在创建时未启用可插拔数据库功能的Oracle数据库（12c之前唯一可用的数据库类型） |


    本章的目标是使你能够熟练管理容器/可插拔数据库环境。到本章结束时，你应该了解如何创建可插拔环境、配置可插拔数据库、在可插拔数据库内连接和导航，以及将可插拔数据库从一个CDB传输到另一个CDB。这一切的基础始于理解可插拔架构。


