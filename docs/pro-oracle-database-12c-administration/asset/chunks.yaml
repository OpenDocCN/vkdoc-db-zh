    \ or ASM. The prior code in this section demonstrates the typical steps for implementing\
    \ the shutdown and startup of your database in scenarios in which you don’t have\
    \ other software that manages this task.\n\nTo test whether the d bora script\
    \ is working, as root, run the following command to stop your database and listener:\n\
    \n```\n# /etc/init.d/dbora stop\n```\n\nTo test the startup of your database and\
    \ listener, as root, issue the following command:\n\n```\n# /etc/init.d/dbora\
    \ start\n```\n\nAs of this writing, you may need to make a slight modification\
    \ to the Oracle-supplied ORACLE_HOME/bin/dbstart and ORACLE_HOME/bin/dbshut scripts.\
    \ If you inspect these scripts with an OS editor (such as vi), you’ll notice the\
    \ following line:\n\n```\nORACLE_HOME_LISTNER=$1\n```\n\nI would recommend that\
    \ you change it to this:\n\n```\nORACLE_HOME_LISTNER=${1:-$ORACLE_HOME}\n```\n\
    \nThis line instructs the scripts to accept a parameter if one is passed in. If\
    \ a parameter is not passed in, then set ORACLE_HOME_LISTNER to the value contained\
    \ in the variable $ORACLE_HOME. This preserves the functionality of dbstart and\
    \ dbshut and also makes these scripts work when called from d bora.\n\nIf you\
    \ have the opportunity to reboot your system, I recommend that you do so to ensure\
    \ that the database stops and restarts correctly. When you invoke dbstart and\
    \ dbshut, these utilities create log files in the ORACLE_HOME directory, named\
    \ startup.log and shutdown.log. You can inspect the contents of these to verify\
    \ that the shutdown and startup are working as expected.\n\n![image](Images/sq.jpg) **Tip**  \
    \ Starting with Oracle Database 11g, consider using the Oracle Restart utility\
    \ to automate the startup/shutdown of your database and listener. This utility\
    \ is especially useful in RAC and ASM environments.\n\nLINUX SYSTEM V INIT RUNLEVELS\n\
    \nA Linux service is an application that typically runs in the background (conceptually\
    \ similar to a Windows service). A runlevel is used to configure which services\
    \ run on a box. Usually, there are seven runlevels (0–6). The chkconfig command\
    \ manages which services you want running in which runlevel(s).\n\nWhen Linux\
    \ starts up, the sbin/init program reads the /etc/inittab file to determine the\
    \ runlevel in which it should run. Following is a snippet of script from /etc/inittab\
    \ that shows the runlevels used by Red Hat (these are similar to runlevels in\
    \ other Linux distributions):\n\n#   0 - halt (Do NOT set initdefault to this)\n\
    \n#   1 - Single user mode\n\n#   2 - Multiuser, without NFS (The same as 3, if\
    \ you do not have networking)\n\n#   3 - Full multiuser mode\n\n#   4 - unused\n\
    \n#   5 - X11\n\n#   6 - reboot (Do NOT set initdefault to this)\n\nTo set the\
    \ default runlevel, specify N in the id:<N>:initdefault line in the /etc/inittab\
    \ file. This example sets the default runlevel to 5:\n\nid:5:initdefault:\n\n\
    A runlevel of 1 is used by SAs when performing maintenance and repairs. A runlevel\
    \ of 5 will start the Linux server with a graphical login screen at the console,\
    \ plus networking capabilities. However, if you have a problem running the display\
    \ manager at the console—owing to a video driver issue, for example—then you can\
    \ start in runlevel 3 instead, which is command line based but still has networking\
    \ services.\n\nMost SAs who are security conscious operate their servers in runlevel\
    \ 3\\. With the wide acceptance of VNC, SAs oftentimes do not see the benefit\
    \ of running in runlevel 5\\. If an SA wants to take advantage of graphical utilities,\
    \ the SA will just use VNC (or a similar tool). Do not attempt to set initdefault\
    \ to either 0 or 6, because your Linux server will never start.\n\nTo determine\
    \ the current runlevel, you can run who -r or runlevel, as follows:"
  trans: "\n# RMAN 备份，日期：2013 年 1 月 1 日，已更新。\n\n如果你管理着数十台数据库服务器（每台都有自己的 cron 表），并且有多个\
    \ DBA，那么你需要某种机制（不一定很复杂）来跟踪谁在何时进行了更改。\n\n## 重定向 cron 输出\n\n当你执行一个 Linux shell 命令时，默认情况下，命令的标准输出会显示在屏幕上。同样，如果产生了任何错误消息，默认情况下也会显示在屏幕上。你可以使用\
    \ `>` 或 `1>`（它们是同义的）将任何标准输出重定向到操作系统文件。此外，你可以使用 `2>` 将错误消息重定向到一个文件。符号 `2>&1` 指示\
    \ shell 将任何错误消息发送到与标准输出相同的位置。\n\n当你创建一个 cron 任务时，你可以使用这些重定向功能将 shell 脚本的输出发送到一个日志文件。例如，在下面的\
    \ cron 表条目中，由 `backup.bsh` shell 脚本生成的任何标准输出和错误消息都被捕获到一个名为 `bck.log` 的文件中：\n\n\
    ```\n11 12 * * * /home/oracle/bin/backup.bsh 1>/home/oracle/bin/log/bck.log 2>&1\n\
    ```\n\n如果你不重定向 cron 任务的输出，那么任何输出都将通过电子邮件发送给拥有该 cron 表的用户。你可以通过直接在 cron 表中指定 `MAILTO`\
    \ 变量来覆盖此行为。使用接下来的几行代码，cron 输出将发送给 root 用户：\n\n```\nMAILTO=root\n11 12 * * * /home/oracle/bin/backup.bsh\n\
    ```\n\n如果你不希望输出发送到任何地方，那么将其重定向到众所周知的“位桶”。下面的条目将标准输出和标准错误发送到 `/dev/null` 设备：\n\n\
    ```\n11 12 * * * /home/oracle/bin/backup.bsh 1>/dev/null 2>&1\n```\n\n## 故障排除\
    \ cron\n\n如果你有一个运行不正常的 cron 任务，请按照以下步骤进行故障排除：\n\n1.  复制你的 cron 条目，粘贴到操作系统命令行中，然后手动运行该命令。通常，目录或文件名中的轻微拼写错误可能是问题的根源。手动运行命令将突出显示此类错误。\n\
    2.  如果脚本运行 Oracle 实用程序，请确保在脚本内部来源（设置）所需的 OS 变量，例如 `ORACLE_HOME` 和 `ORACLE_SID`。通常，这些变量是在你登录时由启动脚本（如\
    \ `HOME/.bashrc`）设置的。由于 cron 不运行用户的启动脚本，任何必需的变量都必须在脚本内显式设置。\n3.  确保从 cron 调用的任何\
    \ shell 脚本的第一行指定了将用于解释脚本内命令的程序名称。例如，`#!/bin/bash` 应该是 Bash shell 脚本的第一条目。由于 cron\
    \ 不运行用户的启动脚本（如 `HOME/.bashrc`），因此你不能假设你的 OS 用户的默认 shell 将用于运行从 cron 调用的命令或脚本。\n\
    4.  确保 cron 后台进程正在运行。从操作系统发出以下命令进行验证：\n\n    ```\n    $ ps -ef | grep cron\n \
    \   ```\n\n    如果 cron 守护进程（后台进程）正在运行，你应该会看到类似以下内容：\n\n    ```\n    root     \
    \ 2969     1  0 Mar23 ?        00:00:00 crond\n    ```\n\n5.  检查你服务器上的电子邮件。当 cron\
    \ 任务行为异常时，cron 实用程序通常会向 OS 账户发送电子邮件。\n6.  检查 `/var/log/cron` 文件的内容是否有错误。有时，该文件包含有关未能运行的\
    \ cron 任务的相关信息。\n\n## 自动化 DBA 任务示例\n\n在当今往往混乱的商业环境中，自动化任务几乎是强制性的。如果你不自动化，你可能会忘记执行某项任务；或者，如果手动执行任务，你可能会在过程中引入错误。如果你不自动化，你可能会发现自己被一群更高效或更廉价的\
    \ DBA 所取代。\n\n通常，我会自动化这样的任务：脚本仅在失败时发送电子邮件。成功时生成电子邮件通常会导致邮箱爆满。有些 DBA 喜欢看到成功消息。我通常不喜欢。\n\
    \nDBA 自动化各种各样的任务和作业。几乎任何类型的环境都要求你创建某种操作系统脚本，该脚本封装了操作系统命令、SQL 语句和 PL/SQL 块的组合。\n\
    \n本章中的以下脚本是 DBA 自动化的各种不同类型任务的示例。这套脚本绝非完整。其中许多脚本在你的环境中可能不需要。重点是让你很好地了解自动化的任务类型以及用于完成任务的技术。\n\
    \n> **注意** 第 3 章 包含了一些 DBA 所需的核心脚本的基本示例。本节提供了 DBA 通常自动化的任务和脚本的示例。\n\n## 启动和停止数据库与监听器\n\
    \n在许多环境中，希望 Oracle 数据库和监听器在服务器重启时自动关闭和启动。如果你有这个需求，那么请按照接下来的几个步骤来自动化你的数据库和监听器的关闭与启动。\n\
    \n> **注意** 本节中的示例以 Linux 为中心；如果你使用的是不同的 Unix 平台，请参考 *Oracle Database Administrator’s\
    \ Guide*，该指南可以从 Oracle 网站的技术网络区域（[`otn.oracle.com`](http://otn.oracle.com)）免费下载，以获取适合你环境的详细信息。\n\
    \n1.  编辑 `/etc/oratab` 文件，在你希望系统重启时自动重启的数据库条目末尾放置一个 `Y`。你可能需要 root 权限来编辑该文件：\n\
    \n    ```\n    # vi /etc/oratab\n    ```\n\n2.  在文件中放置一行类似于以下内容的行，适用于你的环境：\n\n\
    \    ```\n    o12c:/u01/app/oracle/product/12.1.0.1/db_1:Y\n    ```\n\n3.  在上一行中，`o12c`\
    \ 是数据库名称，`/u01/app/oracle/product/12.1.0.1/db_1` 指定了目录 `ORACLE_HOME`。字符串末尾的 `Y`\
    \ 表示该数据库可以由 `ORACLE_HOME/bin/dbstart` 和 `ORACLE_HOME/bin/dbshut` 脚本启动和停止。如果你不希望数据库自动停止和重启，可以将\
    \ `Y` 替换为 `N`。\n\n    > **注意** 对于 Unix 系统（如 Solaris），`oratab` 文件通常位于 `/var/opt/oracle`\
    \ 目录中。\n\n4.  以 root 用户身份，导航到 `/etc/init.d` 目录，并创建一个名为 `dbora` 的文件：\n\n    ```\n\
    \    # cd /etc/init.d\n    # vi dbora\n    ```\n\n5.  将以下行放入 `dbora` 文件中。确保将变量\
    \ `ORA_HOME` 和 `ORA_OWNER` 的值更改为与你的环境相匹配。这是一个停止和启动数据库及监听器所需的最简脚本：\n\n    ```\n\
    \    #!/bin/bash\n    # chkconfig: 35 99 10\n    # description: Starts and stops\
    \ Oracle processes\n    ORA_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n    ORA_OWNER=oracle\n\
    \    case \"$1\" in\n      'start')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl\
    \ start\"\n        su - $ORA_OWNER -c $ORA_HOME/bin/dbstart\n       ;;\n     \
    \ 'stop')\n        su - $ORA_OWNER -c \"$ORA_HOME/bin/lsnrctl stop\"\n       \
    \ su - $ORA_OWNER -c $ORA_HOME/bin/dbshut\n       ;;\n    esac\n    ```\n\n  \
    \  `dbora` 文件中的这些行看起来像是注释，但实际上是必需的：\n\n    ```\n    # chkconfig: 35 99 10\n  \
    \  # description: Starts and stops Oracle processes\n    ```\n\n    前面的行描述了脚本的服务特性。`35`\
    \ 表示该服务将在运行级别 3 和 5 中启动。`99` 表示该服务将在 init 处理接近尾声时启动。`10` 表示该服务将在 init 处理开始时停止。还需要提供一个描述，包含有关服务的文本信息。\n\
    \n    > **注意** Linux 运行级别是一个逻辑容器，用于指定系统启动时将运行哪些服务。\n\n6.  更改 `dbora` 文件的组，使其与分配给\
    \ Oracle 软件 OS 所有者的组（通常是 `oinstall` 或 `dba`）相匹配：\n\n    ```\n    # chgrp dba dbora\n\
    \    ```\n\n7.  将 `dbora` 文件的权限更改为 750：\n\n    ```\n    # chmod 750 dbora\n  \
    \  ```\n\n8.  运行以下 `chkconfig` 命令：\n\n    ```\n    # /sbin/chkconfig --add dbora\n\
    \    ```\n\n    这里，`chkconfig` 命令注册了服务脚本。这还会在 `/etc/rc.d` 目录下的文件中创建适当的符号链接。使用\
    \ `--list` 选项可以显示服务在每个运行级别是开启还是关闭：\n\n    ```\n    # chkconfig --list | grep dbora\n\
    \    dbora           0:off   1:off   2:off   3:on    4:off   5:on    6:off\n \
    \   ```\n\n    此输出表明 `dbora` 服务在运行级别 3 和 5 是开启的。如果你需要删除一个服务，请使用 `chkconfig` 的\
    \ `-del` 选项。\n\n    > **提示** 如果你想在系统重启时自动停止和启动其他进程，例如智能代理、管理服务器或 HTTP 服务器，请参阅\
    \ MOS 注释 222813.1 以获取详细信息。\n\n自动化 Oracle 数据库的关闭和启动会有所不同，具体取决于你是否使用了集群软件或 ASM 等工具。本节前面的代码演示了在你没有其他管理此任务的软件的情况下，实现数据库关闭和启动的典型步骤。\n\
    \n要测试 `dbora` 脚本是否正常工作，以 root 用户身份运行以下命令来停止数据库和监听器：\n\n```\n# /etc/init.d/dbora\
    \ stop\n```\n\n要测试数据库和监听器的启动，以 root 用户身份发出以下命令：\n\n```\n# /etc/init.d/dbora start\n\
    ```\n\n截至撰写本文时，你可能需要对 Oracle 提供的 `ORACLE_HOME/bin/dbstart` 和 `ORACLE_HOME/bin/dbshut`\
    \ 脚本进行细微修改。如果你用操作系统编辑器（如 `vi`）检查这些脚本，你会注意到以下行：\n\n```\nORACLE_HOME_LISTNER=$1\n\
    ```\n\n我建议你将其更改为：\n\n```\nORACLE_HOME_LISTNER=${1:-$ORACLE_HOME}\n```\n\n这一行指示脚本在传入参数时接受它。如果没有传入参数，则将\
    \ `ORACLE_HOME_LISTNER` 设置为变量 `$ORACLE_HOME` 中包含的值。这样既保留了 `dbstart` 和 `dbshut`\
    \ 的功能，也使这些脚本在从 `dbora` 调用时能够工作。\n\n如果你有机会重启系统，我建议你这样做，以确保数据库正确停止和重启。当你调用 `dbstart`\
    \ 和 `dbshut` 时，这些实用程序会在 `ORACLE_HOME` 目录中创建名为 `startup.log` 和 `shutdown.log` 的日志文件。你可以检查这些文件的内容，以验证关闭和启动是否按预期工作。\n\
    \n> **提示** 从 Oracle Database 11g 开始，请考虑使用 Oracle Restart 实用程序来自动化数据库和监听器的启动/关闭。此实用程序在\
    \ RAC 和 ASM 环境中特别有用。\n\n## LINUX SYSTEM V INIT 运行级别\n\nLinux 服务是一种通常在后台运行的应用程序（概念上类似于\
    \ Windows 服务）。运行级别用于配置在机器上运行哪些服务。通常有七个运行级别（0–6）。`chkconfig` 命令管理你希望在哪个运行级别运行哪些服务。\n\
    \n当 Linux 启动时，`sbin/init` 程序读取 `/etc/inittab` 文件以确定它应在哪个运行级别运行。以下是从 `/etc/inittab`\
    \ 中截取的脚本片段，显示了 Red Hat 使用的运行级别（其他 Linux 发行版中的运行级别类似）：\n\n```\n#   0 - 停机（不要将 initdefault\
    \ 设置为此）\n#   1 - 单用户模式\n#   2 - 多用户，无 NFS（如果没有网络，与 3 相同）\n#   3 - 完全多用户模式\n# \
    \  4 - 未使用\n#   5 - X11（图形界面）\n#   6 - 重新启动（不要将 initdefault 设置为此）\n```\n\n要设置默认运行级别，请在\
    \ `/etc/inittab` 文件的 `id:<N>:initdefault` 行中指定 `N`。此示例将默认运行级别设置为 5：\n\n```\nid:5:initdefault:\n\
    ```\n\n运行级别 1 由系统管理员（SA）在执行维护和修理时使用。运行级别 5 将在控制台启动 Linux 服务器，显示图形登录屏幕，并具有网络功能。但是，如果你在控制台运行显示管理器时遇到问题（例如由于视频驱动程序问题），那么你可以改为在运行级别\
    \ 3 启动，它是基于命令行的，但仍具有网络服务。\n\n大多数具有安全意识的 SA 在运行级别 3 下运行其服务器。随着 VNC 的广泛接受，SA 通常看不到在运行级别\
    \ 5 下运行的好处。如果 SA 想要利用图形实用程序，只需使用 VNC（或类似工具）。不要尝试将 `initdefault` 设置为 0 或 6，因为你的\
    \ Linux 服务器将永远不会启动。\n\n要确定当前运行级别，你可以运行 `who -r` 或 `runlevel`，如下所示：\n"
- fmt: "# runlevel\n\n```\nN 5\n```\n\n```\n# who -r\nrun-level 5  Jun 17 00:29  \
    \                 last=S\n```\n\n特定的运行级别（runlevel）决定了 Linux 在启动时将运行哪些脚本。这些脚本位于\
    \ `/etc/rc.d/rc<N>.d` 目录中，其中 `<N>` 对应于运行级别。对于运行级别 5，脚本位于 `/etc/rc.d/rc5.d` 目录中。例如，当\
    \ Linux 以运行级别 5 启动时，它将运行的脚本之一是 `/etc/rc.d/rc5.d/S55sshd`，这实际上是一个指向 `/etc/rc.d/init.d/sshd`\
    \ 的软链接。\n\n## 检查归档重做日志目标目录的容量\n\n有时，数据库管理员（DBA）和系统管理员（SA）没有充分规划和实现用于在磁盘上存储归档重做日志文件的位置。在这些情况下，拥有一个检查主位置空间并在归档重做目标目录变满之前发出警告的脚本通常会很方便。此外，您可能希望在脚本中实现自动将归档重做日志位置切换到具有足够磁盘空间的备用位置。\n\
    \n我仅在混乱的环境中使用过此类脚本，这些环境的归档重做日志目标目录会以不可预测的频率变满。如果归档重做日志目标目录已满，数据库将挂起。在某些环境中，这是完全无法接受的。您可能会争辩说，您永远不应该让自己陷入这种情况。因此，如果您被请来维护一个不可预测的环境，并且您是那个在凌晨\
    \ 2 点接到电话的人，那么您可能需要考虑实现一个类似于本节提供的脚本。\n\n在使用以下脚本之前，请更改脚本内的变量以匹配您的环境。例如，`SWITCH_DIR`\
    \ 应指向磁盘上您可以安全切换到归档重做日志目标的备用位置。当阈值低于由 `THRESH_GET_WORRIED` 变量指定的空间量时，脚本将发送警告电子邮件。如果归档重做日志空间低于在\
    \ `THRESH_SPACE_CRIT` 变量中指定的值，则目标将自动切换到 `SWITCH_DIR` 变量中包含的目录。\n\n```bash\n#!/bin/bash\n\
    PRG='basename $0'\nDB=$1\nUSAGE=\"Usage: ${PRG} <sid>\"\nif [ -z \"$DB\" ]; then\n\
    \  echo \"${USAGE}\"\n  exit 1\nfi\n# source OS variables\n. /var/opt/oracle/oraset\
    \ ${DB}\n# Set an alternative location, make sure it exists and has space.\nSWITCH_DIR=/oradump01/${DB}/archivelog\n\
    # Set thresholds for getting concerned and switching.\nTHRESH_GET_WORRIED=2000000\
    \ # 2Gig from df -k\nTHRESH_SPACE_CRIT=1000000  # 1Gig from df -k\nMAILX=\"/bin/mailx\"\
    \nMAIL_LIST=\"dkuhn@gmail.com \"\nBOX='uname -a | awk '{print$2}''\n#\nloc='sqlplus\
    \ -s <<EOF\nCONNECT / AS sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT SUBSTR(destination,1,INSTR(destination,'/',1,2)-1)\n\
    FROM v\\$archive_dest WHERE dest_name='LOG_ARCHIVE_DEST_1';\nEOF'\n# The output\
