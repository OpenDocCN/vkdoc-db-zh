    *   一个根容器，名为`CDB$ROOT`。根容器包含主数据字典视图集，这些视图包含关于根容器以及CDB内每个子可插拔数据库的元数据。

    *   一个静态种子容器，名为`PDB$SEED`。此容器仅作为模板存在，用于提供在CDB内创建新的可插拔数据库所需的数据文件和元数据。

