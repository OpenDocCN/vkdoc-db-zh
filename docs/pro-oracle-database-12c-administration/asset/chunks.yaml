    admin/134.1:\n    Type:                   backup BLLNX1\n    Level:                  full\n\
        Family:                 Host_Home-MF\n    Encryption:             on\n    Scheduled\
    \ time:         none\n    Introduction time:      2013/02/25.09:04\n    Earliest\
    \ exec time:     any\n    Last update time:       2013/02/25.09:04\n    Expire\
    \ time:            never\n    State:                  running since 2013/02/25.09:04\n\
        Priority:               100\n    Privileged op:          no\n    Run on host:            BLLNX3\n\
        Requires:               host BLLNX1 and family Host_Home-MF and any device\n\
        Attempts:               1\n    Processed:              64.0 KB\n    Files:                  32\n\
        Log:\n        2013/02/25.09:04:42 Job created.\n        2013/02/25.09:05:06\
    \ Dispatching job to run on BLLNX3.\n```\n\nIn the previous output  the lsjob\
    \ command displays all active jobs using the -a option. Besides the job ID, scheduled\
    \ time, contents, and job state, the -l option shows more information, such as\
    \ the RMAN backup piece, media family, encryption status, priority number, host\
    \ on which the job runs, and number of times OSB attempted to run the job. The\
    \ --subjobs, or -j, gives the subordinate job (subjob), which is admin/134.1\\\
    . The --progress, or -o, option indicates the progress of the active job, which\
    \ is 64.0KB processed. The --requires, or -R, option provides resources required\
    \ to run each job, which are the media family Host_Home-MF and any device. The\
    \ --log, or -L, option offers the log associated with the job, which is the log\
    \ information following the output. The --times, or -C, option illustrates all\
    \ relevant times for each job, such as introduction time, earliest execution time,\
    \ last update time, and expire time.\n\nShowing Job Transcripts\n\nIn addition\
    \ to using the lsjob command to help monitor the OSB job, you can issue the catxcr\
    \ command to gather detailed information on the operation of the job. The --folow,\
    \ or -f, option shows the transcript as the file grows, which is valuable when\
    \ monitoring active jobs. The --msgno, or -m, gives the number for each line in\
    \ the transcript. The --level, or -l, option indicates the message level, which\
    \ is useful for generating additional messages for debugging or troubleshooting;\
    \ for example,\n\n```\nob> catxcr -f -m -l 0 rmansbt/394\n```\n\nThe following\
    \ is a snippet of the output for the prior command. Line 463 shows that the status\
    \ is 0, which means that the OSB job rmansbt/394.1 is successfully completed.\
    \ For additional information on status codes, see samples/obexit.h in your OSB\
    \ home directory.\n\n```\nrmansbt/394.1:  462: Backup statistics:\nrmansbt/394.1:  463:\
