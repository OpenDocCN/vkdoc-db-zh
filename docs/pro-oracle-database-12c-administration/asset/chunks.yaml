       statements called by the code.

    -> %Total - CPU Time      as a percentage of Total DB CPU

    -> %CPU   - CPU Time      as a percentage of Elapsed Time

    -> %IO    - User I/O Time as a percentage of Elapsed Time

    -> Captured SQL account for   3.0E+03% of Total CPU Time (s):               0

    -> Captured PL/SQL account for  550.9% of Total CPU Time (s):               0


    CPU                   CPU per           Elapsed

      Time (s)  Executions    Exec (s) %Total   Time (s)   %CPU    %IO    SQL Id

    ---------- ------------ ---------- ------ ---------- ------ ------ -------------

           3.2            1       3.24  930.5       10.5   30.9   74.9 93jktd5vtxb98

    ```


    As of Oracle Database 10g, Oracle will automatically take a snapshot of your database
    once an hour and populate the underlying AWR tables that store the statistics.
    By default, 7 days of statistics are retained.


    You can also generate an AWR report for a specific SQL statement by running the
    awrsqrpt.sql report. When you run the following script, you will be prompted for
