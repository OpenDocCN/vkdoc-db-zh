    \ the coordinating editor, Kevin Shea; the copy editor, Lisa Vecchione; and the\
    \ entire Apress production team.\n\nFinally, my thanks to the numerous database\
    \ administrators, system administrators, and developers from whom I’ve learned\
    \ database administration techniques over the years: Roger Murphy, Bob Suehrstedt,\
    \ Scott Schulze, Dave Jennings, Pete Mullineaux, Shawn Heisdorffer, Tim Gorman,\
    \ Sujit Pattanaik, Ken Toney, Janet Bacon, Sue Wagner, Doug Davis, Ken Roberts,\
    \ Mehran Sowdaey, Dan Fink, Steve Roughton, Barb Sannwald, Andy Brown, Guido Handley,\
    \ Nehru Kaja, Tim Colbert, Patrick Gates, Bill Padfield, Bob Mason, Glenn Balanoff,\
    \ Ravi Narayanaswamy, Kevin Bayer, Abdul Ebadi, Kevin Hoyt, Trent Sherman, Sandra\
    \ Montijo, Sean Best, Roy Backstrom, Mohan Koneru, John Lilly, Todd Wichers, Mike\
    \ Tanaka, Will Thornburg, Ashley Jackson, Aaron Isom, Carson Vowles, Kevin Cook,\
    \ Doug Cushing, Jeff Sherard, Liz Brill, Greg Roberts, Debbie Earman, Ennio Murroni,\
    \ Beth Loker, Bob Sell, Mike O’Neill, Tom Wheltle, Gabor Gyurovszky, Gary Smith,\
    \ Mark Lutze, and Jim Stark.\n\n—Darl Kuhn\n\nIntroduction\n\nMany companies,\
    \ large and small, use Oracle products. At the heart of this technology is an\
    \ Oracle database. Businesses use the technology to store and manage mission critical\
    \ data. This information is the basis for making smart business decisions. Companies\
    \ that effectively transform data into business intelligence quickly gain a competitive\
    \ edge in the marketplace.\n\nOracle database administrators (DBAs) play a pivotal\
    \ role in implementing and leveraging Oracle database technology. DBAs add value\
    \ by ensuring that databases are created in an efficient manner and optimally\
    \ maintained. DBAs are often queried for architectural advice on features, implementation,\
    \ data migration, replication, SQL coding, tuning, and so on. DBAs fill the role\
    \ of the go-to person for anything related to Oracle.\n\nThe job of an Oracle\
    \ DBA is frequently complex and challenging. This book focuses on practical examples\
    \ and techniques for providing a smoothly operating database environment. The\
    \ content is drawn from years of experience working with Oracle technology. The\
    \ book shows you from the ground up how a senior DBA manages a multifaceted database\
    \ environment. I try to focus on demonstrating how to correctly implement features,\
    \ with scalability and maintainability in mind.\n\nI hope you find the material\
    \ in this book useful. The goal is to elevate you to a professional level as a\
    \ DBA. Being a DBA doesn’t have to be constantly painful. The key is to correctly\
    \ implement the technology the first time, not paint yourself into a corner with\
    \ a badly implemented feature, and proactively manage your surroundings.\n\nThis\
    \ book doesn’t show you the most complex and sophisticated techniques used in\
    \ database administration. I try to keep my techniques as simple as possible,\
    \ yet robust enough to manage any level of chaos and complexity. You should be\
    \ able to take the concepts elucidated in this book and build on them to help\
    \ you manage any type of database environment.\n\nWho This Book Is For\n\nThis\
    \ book is for DBAs who want real-world guidance on how to efficiently configure\
    \ and maintain complex database environments. Whether you are a novice or an expert,\
    \ this book contains practical examples of how to implement Oracle database technology.\
    \ This book is for those who want advice from a real DBA on how Oracle database\
    \ technology is effectively implemented and maintained.\n\nHow This Book Is Structured\n\
    \nThe book is divided into several sections, each covering a logical group of\
    \ database administration topics, as follows:\n\n*   **Part 1** concentrates on\
    \ creating a working environment. This includes installing the Oracle software\
    \ and creating databases.\n*   **Part 2** deals with managing critical database\
    \ files. Topics explored are tablespaces, data files, control files, and online\
    \ redo log files.\n*   **Part 3** discusses configuring users and database objects,\
    \ such as tables, constraints, indexes, views, synonyms, sequences, and so on.\n\
    *   **Part 4** details how to create and maintain large database objects and partitioned\
    \ tables and indexes.\n*   **Part 5** shows how DBAs use tools such as Data Pump,\
    \ external tables, and materialized views to manage and distribute large amounts\
    \ of data.\n*   **Part 6** takes a deep dive into backup-and-recovery (B&R) concepts.\
    \ Both user-managed backups and Oracle Recovery Manager (RMAN) B&R are presented\
    \ in detail.\n*   **Part 7** focuses on techniques used to automate database jobs\
    \ and how to troubleshoot typical problems that DBAs encounter.\n*   **Part 8**\
    \ describes how to implement and manage container and pluggable databases.\n\n\
    Conventions\n\nThe following typographical conventions are used in this book:\n\
    \n*   $ is used to denote Linux/Unix commands that can be run by the operating\
    \ system (OS) owner of the Oracle binaries (usually named oracle).\n*   # is used\
    \ to denote Linux/Unix commands that should be run as the root OS user.\n*   SQL>\
    \ is used to denote one-line SQL*Plus statements.\n*   `Monospaced` font is used\
    \ for code examples, utility names, file names, URLs, and directory paths.\n*\
    \   *Italic* is used to highlight a new concept or term.\n*   `UPPERCASE` indicates\
    \ names of database objects, such as views, tables, and corresponding column names.\n\
    *   < > is used where you need to provide input, such as a file name or password.\n\
    \nDownloading the Code\n\nThe code for the examples shown in this book is available\
    \ on the Apress web site (`www.apress.com`). A link can be found on the book’s\
    \ information page, under the Source Code/Downloads tab. This tab is located beneath\
    \ the Related Titles section of the page.\n\nContacting the Author\n\nIf you have\
    \ any questions regarding the book, please feel free to contact me directly at\
    \ the following e-mail address: `darl.kuhn@gmail.com.`\n\nCHAPTER 1\n\n![image](Images/frontdot.jpg)\n\
    \nInstalling the Oracle Binaries\n\nOracle installations can be large, complex,\
    \ and cumbersome. This is one reason you usually ask an Oracle database administrator\
    \ (DBA) to install the software. You want someone who has previously performed\
    \ installations and who knows how to troubleshoot when problems arise. Accordingly,\
    \ installing the Oracle software (binaries) is a task at which every DBA must\
    \ be proficient.\n\n![image](Images/sq.jpg) **Tip**   If you’re fairly new to\
    \ Oracle, this chapter may seem like an overwhelming way to start a book on database\
    \ administration. Don’t worry too much about this. If you’re already working in\
    \ an Oracle environment, chances are that another DBA has probably already installed\
    \ the Oracle binaries. If you don’t need to install the Oracle binaries, make\
    \ sure you read the following section, “Understanding the Optimal Flexible Architecture,”\
    \ and then feel free to proceed to [Chapter 2](#9781430257288_Ch02.xhtml).\n\n\
    Many DBAs don’t use techniques for automating installations. Some are unaware\
    \ of these methods; others perceive them as unreliable. Therefore, most DBAs typically\
    \ use the graphical mode of the Oracle Universal Installer (OUI). Although the\
    \ graphical installer is a good tool, it doesn’t lend itself to repeatability\
    \ and automation. Running the graphical installer is a manual process during which\
    \ you’re presented with options to choose from on multiple screens. Even if you\
    \ know which options to select, you may still inadvertently click an undesired\
    \ choice.\n\nThe graphical installer can also be problematic when you’re performing\
    \ remote installations, and the network bandwidth is insufficient. In these situations\
    \ you can find yourself waiting for dozens of minutes for a screen to repaint\
    \ itself on your local screen. You need a different technique for efficient installation\
    \ on remote servers.\n\nThis chapter focuses on techniques for installing Oracle\
    \ in an efficient and repeatable manner. This includes silent installations, which\
    \ rely on a response file. A response file is a text file in which you assign\
    \ values to variables that govern the installation. DBAs often don’t realize the\
    \ powerful repeatability and efficiency that can be achieved by using response\
    \ files.\n\n![image](Images/sq.jpg) **Note**   This chapter only covers installing\
    \ the Oracle software. The task of creating a database is covered in [Chapter\
    \ 2](#9781430257288_Ch02.xhtml).\n\nUnderstanding the OFA\n\nBefore you install\
    \ Oracle and start creating databases, you must understand Oracle’s Optimal Flexible\
    \ Architecture (OFA) standard. This standard is widely employed for specifying\
    \ consistent directory structures and the file-naming conventions used when installing\
    \ and creating Oracle databases.\n\n![image](Images/sq.jpg) **Note**   One irony\
    \ of this ubiquitous OFA “standard” is that almost every DBA, in some manner,\
    \ customizes it to fit the unique requirements of his or her environment.\n\n\
    Because most shops implement a form of the OFA standard, understanding this structure\
    \ is critical. [Figure 1-1](#9781430257288_Ch01.xhtml#Fig1) shows the directory\
    \ structure and file names used with the OFA standard. Not all the directories\
    \ and files found in an Oracle environment appear in this figure (there isn’t\
    \ enough room). However, the critical and most frequently used directories and\
    \ files are displayed.\n\n![9781430257288_Fig01-01.jpg](Images/9781430257288_Fig01-01.jpg)\n\
    \n[Figure 1-1](#9781430257288_Ch01.xhtml#_Fig1). Oracle’s OFA standard\n\nThe\
    \ OFA standard includes several directories that you should be familiar with:\n\
    \n*   Oracle inventory directory\n*   Oracle base directory (ORACLE_BASE)\n* \
    \  Oracle home directory (ORACLE_HOME)\n*   Oracle network files directory (TNS_ADMIN)\n\
    *   Automatic Diagnostic Repository (ADR_HOME)\n\nThese directories are discussed\
    \ in the following sections.\n\nOracle Inventory Directory\n\nThe Oracle inventory\
    \ directory stores the inventory of Oracle software installed on the server. This\
    \ directory is required and is shared among all installations of Oracle software\
    \ on a server. When you first install Oracle, the installer checks to see whether\
    \ there is an existing OFA-compliant directory structure in the format /u[01–09]/app.\
    \ If such a directory exists, then the installer creates an Oracle inventory directory,\
    \ such as\n\n```\n/u01/app/oraInventory\n```\n\nIf the ORACLE_BASE variable is\
    \ defined for the oracle operating system (OS) user, then the installer creates\
    \ a directory for the location of Oracle inventory, as follows:\n\n```\nORACLE_BASE/../oraInventory\n\
    ```\n\nFor example, if ORACLE_BASE is defined as /ora01/app/oracle, then the installer\
    \ defines the location of Oracle inventory as\n\n```\n/ora01/app/oraInventory\n\
    ```\n\nIf the installer doesn’t find a recognizable OFA-compliant directory structure\
    \ or an ORACLE_BASE variable, then the location for Oracle inventory is created\
    \ under the HOME directory of the oracle user. For instance, if the HOME directory\
    \ is /home/oracle, then the location of Oracle inventory is\n\n```\n/home/oracle/oraInventory\n\
    ```\n\nOracle Base Directory\n\nThe Oracle base directory is the topmost directory\
    \ for Oracle software installation. You can install one or more versions of the\
    \ Oracle software beneath this directory. The OFA standard for the Oracle base\
    \ directory is as follows:\n\n```\n/<mount_point>/app/<software_owner>\n```\n\n\
    Typical names for the mount point include /u01, /ora01, /oracle, and /oracle01\\\
    . You can name the mount point according to whatever your standard is for your\
    \ environment. I prefer to use a mount-point name such as /ora01. It’s short,\
    \ and when I look at the mount points on a database server, I can immediately\
    \ tell which are used for the Oracle database. Also, a short mount-point name\
    \ is easier to use when you’re querying the data dictionary to report on the physical\
    \ aspects of your database. Additionally, a shorter mount-point name makes for\
    \ less typing when you’re navigating through directories via OS commands.\n\n\
    The software owner is typically named oracle. This is the OS user you use to install\
    \ the Oracle software (binaries). Listed next is an example of a fully formed\
    \ Oracle base directory path:\n\n```\n/u01/app/oracle\n```\n\nOracle Home Directory\n\
    \nThe Oracle home directory defines the installation location of software for\
    \ a particular product, such as Oracle Database 12c or Oracle Database 11g. You\
    \ must install different products or different releases of a product in separate\
    \ Oracle homes. The recommended OFA-compliant Oracle home directory is as follows:\n\
    \n```\nORACLE_BASE/product/<version>/<install_name>\n```\n\nIn the previous line\
    \ of code, possible versions include 12.1.0.1 and 11.2.0.3\\. Possible install_name\
    \ values include db_1, devdb1, test2, and prod1\\. Here is an example of an Oracle\
    \ home name for a 12.1 database:\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1\n\
    ```\n\n![image](Images/sq.jpg) **Note**   Some DBAs dislike the db_1 string on\
    \ the end of the ORACLE_HOME directory and see no need for it. The reason for\
    \ the db_1 is that you may have two separate installations of binaries: a development\
    \ installation and a test installation. If you don’t require that configuration\
    \ in your environment, feel free to drop the extra string (db_1).\n\nOracle Network\
    \ Files Directory\n\nSome Oracle utilities use the value TNS_ADMIN to locate network\
    \ configuration files. This directory is defined as ORACLE_HOME/network/admin.\
    \ It typically contains the tnsnames.ora and listener.ora Oracle Net files.\n\n\
    ![image](Images/sq.jpg) **Tip**   Sometimes DBAs will set TNS_ADMIN to point at\
    \ one central directory location (such as /etc or /var/opt/oracle). This allows\
    \ them to maintain one set of Oracle network files (instead of one for each ORACLE_HOME).\
    \ This approach also has the advantage of not requiring the copying or moving\
    \ of files when a database upgrade occurs, potentially changing the location of\
    \ ORACLE_HOME.\n\nAutomatic Diagnostic Repository\n\nStarting with Oracle Database\
    \ 11g, the ADR_HOME directory specifies the location of the diagnostic files related\
    \ to Oracle. These files are crucial for troubleshooting problems with the Oracle\
    \ database. This directory is defined as ORACLE_BASE/diag/rdbms/lower(db_unique_name)/instance_name.\
    \ You can query the V$PARAMETER view to get the values of db_unique_name and instance_name.\n\
    \nFor example, in the next line, the lowercase database unique name is o12c, and\
    \ the instance name is O12C:\n\n```\n/u01/app/oracle/diag/rdbms/o12c/O12C\n```\n\
    \nYou can verify the location of the ADR_HOME directory via this query:\n\n```\n\
    SQL> select value from v$diag_info where name='ADR Home';\n```\n\nHere is some\
    \ sample output:\n\n```\nVALUE\n\n/u01/app/oracle/diag/rdbms/o12c/O12C\n```\n\n\
    Now that you understand the OFA standard, you’ll next see how it’s used when installing\
    \ the Oracle binaries. For instance, you’ll need to specify directory values for\
    \ the ORACLE_BASE and ORACLE_HOME directories when running the Oracle installer.\n\
    \n![image](Images/sq.jpg) **Tip**   See the *Oracle Database Installation Guide*\
    \ for full details on OFA. This document can be freely downloaded from the Technology\
    \ Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nInstalling Oracle\n\nSuppose you’re new on the job, and your manager asks you\
    \ how long it will take to install a new set of Oracle Database 12c software on\
    \ a server. You reply that it will take less than an hour. Your boss is incredulous\
    \ and states that previous DBAs always estimated at least a day to install the\
    \ Oracle binaries on a new server. You reply, “Actually, it’s not that complicated,\
    \ but DBAs do tend to overestimate installations, because it’s hard to predict\
    \ everything that could go wrong.”\n\nWhen you’re handed a new server and are\
    \ given the task of installing the Oracle binaries, this usually refers to the\
    \ process of downloading and installing the software required before you can create\
    \ an Oracle database. This process involves several steps:\n\n1.  Create the appropriate\
    \ OS groups. In Oracle Database 12c there are several OS groups that you can form\
    \ and use to manage the level of granularity of SYSDBA permissions. Minimally,\
    \ you’ll need to create an OS dba group and the OS oracle user.\n2.  Ensure that\
    \ the OS is configured adequately for an Oracle database.\n3.  Obtain the database\
    \ installation software from Oracle.\n4.  Unzip the database installation software.\n\
    5.  If using the silent installer when first installing Oracle software on the\
    \ box, create an oraInst.loc file. This step only needs to be done once per server.\
    \ Subsequent installations do not require this step to be performed.\n6.  Configure\
    \ the response file, and run the Oracle silent installer.\n7.  Troubleshoot any\
    \ issues.\n\nThese steps are detailed in the following sections.\n\n![image](Images/sq.jpg) **Note**  \
    \ Any version of the database that Oracle designates as a base release (10.1.0.2,\
    \ 10.2.0.1, 11.1.0.6, 11.2.0.1, 12.1.0.1, and so on) can be freely downloaded\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)).\
    \ However, be aware that any subsequent patch downloads require a purchased license.\
    \ In other words, downloading base software requires an Oracle Technology Network\
    \ (OTN) login (free), whereas downloading a patch set requires a My Oracle Support\
    \ account (for fee).\n\nStep 1\\. Create the OS Groups and User\n\nIf you work\
    \ in a shop with a system administrator (SA), then steps 1 and 2 usually are performed\
    \ by the SA. If you don’t have an SA, then you have to perform these steps yourself\
    \ (this is often the case in small shops, where you may be required to perform\
    \ many different job functions). You need root access to accomplish these steps.\n\
    \nIn the old days, a typical Oracle installation would contain one OS group (dba)\
    \ and one OS user (oracle). You can still install the Oracle software, using this\
    \ minimalistic, one-group, one-user approach; it works fine. If there is just\
    \ one DBA in your shop, and you don’t need a more granular division of privileges\
    \ among team members, then go ahead, and create only the dba group and the oracle\
    \ OS user. There is nothing wrong with this method.\n\nNowadays, there are multiple\
    \ OS groups that Oracle recommends you create—the idea being that you can add\
    \ different OS users and assign them to groups on an as-needed basis, depending\
    \ on the job function. When an OS user is assigned to a group, that assignment\
    \ provides the user with specific database privileges. [Table 1-1](#9781430257288_Ch01.xhtml#Tab1)\
    \ documents the OS groups and how each group maps to corresponding database privileges.\
    \ For example, if you have a user that is only responsible for monitoring database\
    \ and that only needs privileges to start up and shut down the database, then\
    \ that user would be assigned the oper group (which ensures that subsequent connections\
    \ to the database can be done with sysoper privileges).\n\n[Table 1-1.](#9781430257288_Ch01.xhtml#_Tab1)\
    \ Mapping of OS Groups to Privileges Related to Backup and Recovery\n\n![Table1-1.jpg](Images/Table1-1.jpg)\n\
    \n[Table 1-1](#9781430257288_Ch01.xhtml#Tab1) contains recommended group names.\
    \ You don’t have to use the group names listed; you can adjust per your requirements.\
    \ For example, if you have two separate groups using the same server, you may\
    \ want to create two separate Oracle installations, each managed by a different\
    \ DBAs; the development DBA group might create and install the Oracle binaries\
    \ with a group named dbadev, whereas a test group using the same box might install\
    \ a separate set of Oracle binaries managed with a group named dbatest. Each group\
    \ would have permissions to manipulate only its set of binaries. Or, as mentioned\
    \ earlier, you may decide to use just one group (dba) for everything. It all depends\
    \ on your environment.\n\nOnce you decide which groups you need, then you need\
    \ access to the root user to run the groupadd command. As root, add the OS groups\
    \ that you need. Here, I add the three groups that I foresee will be needed:\n\
    \n```\n# groupadd oinstall\n# groupadd dba\n# groupadd oper\n```\n\nIf you don’t\
    \ have access to the root account, then you need to get your SA to run the previous\
    \ commands. You can verify that each group was added successfully by inspecting\
    \ the contents of the /etc/group file. Here are typical entries created in the\
    \ /etc/group file:\n\n```\noinstall:x:500:\ndba:x:501:\noper:x:502:\n```\n\nNow,\
    \ create the oracle OS user. The following example explicitly sets the group ID\
    \ to 500 (your company may require use of the same group ID for all installations),\
    \ establishes the primary group as oinstall, and assigns the dba and oper groups\
    \ to the newly created oracle user:\n\n```\n# useradd -u 500 -g oinstall -G dba,oper\
    \ oracle\n```\n\nYou can verify user account information by viewing the /etc/passwd\
    \ file. Here is what you can expect to see for the oracle user:\n\n```\noracle:x:500:500::/home/oracle:/bin/bash\n\
    ```\n\nIf you need to modify a group, as root, use the groupmod command. If, for\
    \ any reason, you need to remove a group (as root) use the groupdel command.\n\
    \nIf you need to modify a user, as root, use the usermod command. If you need\
    \ to remove an OS user, use the userdel command. You need root privileges to run\
    \ the userdel command. This example removes the oracle user from the server:\n\
    \n```\n# userdel oracle\n```\n\nStep 2\\. Ensure That the OS Is Adequately Configured\n\
    \nThe tasks associated with this step vary somewhat for each database release\
    \ and OS. You must refer to the Oracle installation manual for the database release\
    \ and OS vendor to get the exact requirements. To perform this step, you’re required\
    \ to verify and configure OS components such as these:\n\n*   Memory and swap\
    \ space\n*   System architecture (processor)\n*   Free disk space (Oracle now\
    \ takes almost 5GB of space to install)\n*   Operating system version and kernel\n\
    *   Operating system software (required packages and patches)\n\nRun the following\
    \ command to confirm the memory size on a Linux server:\n\n```\n$ grep MemTotal\
    \ /proc/meminfo\n```\n\nTo verify the amount of memory and swap space, run the\
    \ following command:\n\n```\n$ free -t\n```\n\nTo verify the amount of space in\
    \ the /tmp directory, enter this command:\n\n```\n$ df -h /tmp\n```\n\nTo display\
    \ the amount of free disk space, execute this command:\n\n```\n$ df -h\n```\n\n\
    To verify the OS version, enter this command:\n\n```\n$ cat /proc/version\n```\n\
    \nTo verify kernel information, run the following command:\n\n```\n$ uname -r\n\
    ```\n\nTo determine whether the required packages are installed, execute this\
    \ query, and provide the required package name:\n\n```\n$ rpm -q <package_name>\n\
    ```\n\nAgain, database server requirements vary quite a bit by OS and database\
    \ version. You can download the specific installation manual from the Documentation\
    \ page of the Oracle web site ([www.oracle.com/documentation](http://www.oracle.com/documentation)).\n\
    \n![image](Images/sq.jpg) **Note**   The OUI displays any deficiencies in OS software\
    \ and hardware. Running the installer is covered in step 6.\n\nStep 3\\. Obtain\
    \ the Oracle Installation Software\n\nUsually, the easiest way to obtain the Oracle\
    \ software is to download it from the Oracle web site. Navigate to the software\
    \ download page ([www.oracle.com/technology/software](http://www.oracle.com/technology/software)),\
    \ and download the Oracle database version that is appropriate for the type of\
    \ OS and hardware on which you want to install it (Linux, Solaris, Windows, and\
    \ so on).\n\nStep 4\\. Unzip the Files\n\nBefore you unzip the files, I recommend\
    \ that you create a standard directory where you can place the Oracle installation\
    \ media. You should do this for a couple of reasons:\n\n*   When you come back\
    \ to a box a week, month, or year later, you’ll want to be able to easily find\
    \ the installation media.\n*   Standard directory structures help you organize\
    \ and understand quickly what has or hasn’t been installed on the box.\n\nCreate\
    \ a standard set of directories to contain the files used to install the Oracle\
    \ software. I like to store the installation media in a directory such as /home/oracle/orainst\
    \ and then create a subdirectory there for each version of the Oracle software\
    \ that is installed on the box:\n\n```\n$ mkdir -p /home/oracle/orainst/11.2.0.2\n\
    $ mkdir -p /home/oracle/orainst/12.1.0.1\n```\n\nNow, move the installation files\
    \ to the appropriate directory, and unzip them there:\n\n```\n$ mv linux_12c_database_1of2.zip  /home/oracle/orainst/12.1.0.1\n\
    $ mv linux_12c_database_2of2.zip  /home/oracle/orainst/12.1.0.1\n```\n\nUse the\
    \ unzip command for unbundling zipped files. The Oracle Database 11g Release 2\
    \ software is unzipped, as shown:\n\n```\n$ unzip linux_12cR1_database_1of2.zip\n\
    $ unzip linux_12cR1_database_2of2.zip\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ On some installations of Oracle, you may find that the distribution file is\
    \ provided as a compressed cpio file. You can uncompress and unbundle the file\
    \ with one command, as follows: $ cat 10gr2_db_sol.cpio.gz | gunzip | cpio -idvm.\n\
    \nStep 5: Creating oraInst.loc File\n\nIf an oraInst.loc file already exists on\
    \ your server, then you can skip this step. Creating the oraInst.loc file only\
    \ needs to be performed the first time you install binaries on a server, using\
    \ the silent install method. If you’re using the OUI graphical installer, then\
    \ the oraInst.loc file is created automatically for you.\n\nOn Linux servers the\
    \ oraInst.loc file is usually located in the /etc directory. On other Unix systems\
    \ (such as Solaris) this file is located in the /var/opt/oracle directory. The\
    \ oraInst.loc file contains the following information:\n\n*   Oracle inventory\
    \ directory path\n*   Name of OS group that has permissions for installing and\
    \ upgrading Oracle software\n\nThe Oracle inventory directory path is the location\
    \ of files associated with managing Oracle installations and upgrades. Typically,\
    \ there is one Oracle inventory per host. Within this directory structure is the\
    \ inventory.xml file, which contains a record of where various versions of Oracle\
    \ have been installed on the server.\n\nThe Oracle inventory OS group has the\
    \ OS permissions required for installing and upgrading Oracle software. Oracle\
    \ recommends that you name this group oinstall. You’ll find that sometimes DBAs\
    \ assign the inventory group to the dba group. If your environment doesn’t require\
    \ a separate group (such as oinstall), then using the dba group is fine.\n\nYou\
    \ can create the oraInst.loc file with a utility such as vi. Here are some sample\
    \ entries in the file:\n\n```\ninventory_loc=/u01/app/oraInventory\ninst_group=oinstall\n\
    \nAs root, ensure that the response file is owned by the oracle OS user and that\
    \ it has the proper file access privileges:\n\n# chown oracle:oinstall oraInst.loc\n\
    # chmod 664 oraInst.loc\n```\n\nStep 6\\. Configure the Response File, and Run\
    \ the Installer\n\nYou can run the OUI in one of two modes: graphical or silent.\
    \ Typically, DBAs use the graphical installer. However, I strongly prefer using\
    \ the silent install option for the following reasons:\n\n*   Silent installs\
    \ don’t require the availability of X Window System software.\n*   You avoid performance\
    \ issues with remote graphical installs, which can be extremely slow when trying\
    \ to paint screens locally.\n*   Silent installs can be scripted and automated.\
    \ This means that every install can be performed with the same, consistent standards,\
    \ regardless of which team member is performing the install (I even have the SA\
    \ install the Oracle binaries this way).\n\nThe key to performing a silent install\
    \ is to use a response file.\n\nAfter unzipping the Oracle software, navigate\
    \ to the database directory (which was created when you unzipped the Oracle zip\
    \ files previously, in step 4); for example,\n\n```\n\n$ cd /home/oracle/orainst/12.1.0.1/database\n\
    ```\n\nNext, find the sample response files that Oracle provides:\n\n```\n$ find\
    \ . -name \"*.rsp\"\n```\n\nDepending on the version of Oracle and the OS platform,\
    \ the names and number of response files that you find may be quite different.\
    \ The next two sections show two scenarios: an Oracle Database 11g Release 2 silent\
    \ install and an Oracle Database 12c Release 1 silent install.\n\nOracle Database\
    \ 11g Release 2 Scenario\n\nNavigate to the database directory, and issue the\
    \ find command to locate sample response files. Here are the response files provided\
    \ with an Oracle Database 11g Release 2 on a Linux server:\n\n```\n$ find . -name\
    \ \"*.rsp\"\n./response/db_install.rsp\n./response/dbca.rsp\n./response/netca.rsp\n\
    ```\n\nCopy one of the response files so that you can modify it. This example\
    \ copies the db_install.rsp file to the current working directory and names the\
    \ file inst.rsp:\n\n```\n$ cp response/db_install.rsp inst.rsp\n```\n\nKeep in\
    \ mind that the format of response files can differ quite a bit, depending on\
    \ the Oracle database version. For example, there are major differences between\
    \ Oracle Database 11g Release 1 and Oracle Database 11g Release 2\\. When you\
    \ install a new release, you have to inspect the response file and determine which\
    \ parameters must be set. Here is a partial listing of an Oracle Database 11g\
    \ Release 2 response file (the first two lines are actually a single line of code\
    \ but have been placed on two lines in order to fit on the page). The lines of\
    \ code are the only variables that I modified. I removed the comments so that\
    \ you could more clearly see which variables were modified:\n\n```\noracle.install.responseFileVersion=\n\
    /oracle/install/rspfmt_dbinstall_response_schema_v11_2_0\noracle.install.option=INSTALL_DB_SWONLY\n\
    ORACLE_HOSTNAME=ora03\nUNIX_GROUP_NAME=dba\noracle.install.db.DBA_GROUP=dba\n\
    oracle.install.db.OPER_GROUP=dba\nINVENTORY_LOCATION=/ora01/orainst/11.2.0.1/database/stage/products.xml\n\
    SELECTED_LANGUAGES=en\nORACLE_HOME=/oracle/app/oracle/product/11.2.0/db_1\nORACLE_BASE=/oracle/app/oracle\n\
    DECLINE_SECURITY_UPDATES=true\noracle.install.db.InstallEdition=EE\noracle.install.db.isCustomInstall=true\n\
    ```\n\nBe sure to modify the appropriate parameters for your environment. If you’re\
    \ unsure what to set the ORACLE_HOME and ORACLE_BASE values to, see the section\
    \ “Understanding the Optimal Flexible Architecture,” earlier in this chapter,\
    \ for a description of the OFA standard directories.\n\nThere are sometimes idiosyncrasies\
    \ to these parameters that are specific to a release. For instance, in Oracle\
    \ Database 11g Release 2, if you don’t want to specify your My Oracle Support\
    \ (MOS) login information, then you need to set the following parameter as follows:\n\
    \n```\nDECLINE_SECURITY_UPDATES=true\n```\n\nIf you don’t set DECLINE_SECURITY_UPDATES\
    \ to TRUE, then you will be expected to provide your MOS login information. Failure\
    \ to do so will cause the installation to fail.\n\nAfter you’ve configured your\
    \ response file, you can run the Oracle installer in silent mode. Note that you\
    \ have to enter the entire directory path for the location of your response file:\n\
    \n```\n$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile \\\n/ora01/orainst/11.2.0.1/database/inst.rsp\n\
    ```\n\nThe previous command is entered on two lines. The first line is continued\
    \ to the second line via the backward slash (\\).\n\n![image](Images/sq.jpg) **Note**  \
    \ On Windows the setup.exe command is equivalent to the Linux/Unix runInstaller\
    \ command.\n\nIf you encounter errors with the installation process, you can view\
    \ the associated log file. Each time you attempt to run the installer, it creates\
    \ a log file with a unique name that includes a timestamp. The log file is located\
    \ in the oraInventory/logs directory. You can stream the output to your screen\
    \ as the OUI writes to it:\n\n```\n$ tail -f <logfile name>\n```\n\nHere is an\
    \ example of a log file name:\n\n```\ninstallActions2012-04-33 11-42-52AM.log\n\
    ```\n\nIf everything runs successfully, in the output you’re notified that you\
    \ need to run the root.sh script as the root user:\n\n```\n#Root scripts to run\n\
    /oracle/app/oracle/product/11.2.0/db_1/root.sh\n```\n\nRun the root.sh script\
    \ as the root OS user. Then, you should be able to create an Oracle database (database\
    \ creation is covered in [Chapter 2](#9781430257288_Ch02.xhtml)).\n\n![image](Images/sq.jpg) **Note**  \
    \ On Linux/Unix platforms, the root.sh script contains commands that must be run\
    \ as the root user. This script needs to modify the owner and permissions of some\
    \ of the Oracle executables (such as the nmo executable). Some ­versions of root.sh\
    \ prompt you as to whether you want to accept the default values. Usually, it’s\
    \ suitable to do so.\n\nOracle Database 12c Release 1 Scenario\n\nNavigate to\
    \ the database directory, and issue the find command to locate sample response\
    \ files. Here are the response files provided with an Oracle Database 12c Release\
    \ 1 on a Linux server:\n\n```\n$ find . -name \"*.rsp\"\n./response/db_install.rsp\n\
    ./response/netca.rsp\n./response/dbca.rsp\n```\n\nCopy one of the response files\
    \ so that you can modify it. This example copies the db_install.rsp file to the\
    \ current working directory and names the file inst.rsp:\n\n```\n$ cp response/db_install.rsp\
    \ inst.rsp\n```\n\nModify the inst.rsp file. Here is a partial listing of an Oracle\
    \ Database 12c Release 1 response file (the first two lines are actually a single\
    \ line of code but have been placed on two lines in order to fit on the page).\
    \ The lines of code are the only variables that I modified. I removed the comments\
    \ so that you could more clearly see which variables were modified:\n\n```\noracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v12.1.0\n\
    oracle.install.option=INSTALL_DB_SWONLY\nORACLE_HOSTNAME=oraserv1\nUNIX_GROUP_NAME=oinstall\n\
    INVENTORY_LOCATION=/home/oracle/orainst/12.1.0.1/database/stage/products.xml\n\
    SELECTED_LANGUAGES=en\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nORACLE_BASE=/u01/app/oracle\n\
    oracle.install.db.InstallEdition=EE\noracle.install.db.DBA_GROUP=dba\noracle.install.db.OPER_GROUP=oper\n\
    oracle.install.db.BACKUPDBA_GROUP=dba\noracle.install.db.DGDBA_GROUP=dba\noracle.install.db.KMDBA_GROUP=dba\n\
    DECLINE_SECURITY_UPDATES=true\n```\n\nBe sure to modify the appropriate parameters\
    \ for your environment. If you’re unsure what to set the ORACLE_HOME and ORACLE_BASE\
    \ values to, see the section “Understanding the Optimal Flexible Architecture,”\
    \ earlier in this chapter, for a description of the OFA standard directories.\n\
    \nAfter you’ve configured your response file, you can run the Oracle installer\
    \ in silent mode. Note that you have to enter the entire directory path for the\
    \ location of your response file:\n\n```\n$ ./runInstaller -ignoreSysPrereqs -force\
    \ -silent -responseFile \\\n /home/oracle/orainst/12.1.0.1/database/inst.rsp\n\
    ```\n\nThe previous command is entered on two lines. The first line is continued\
    \ to the second line via the backward slash (\\).\n\nIf you encounter errors with\
    \ the installation process, you can view the associated log file. Each time you\
    \ attempt to run the installer, it creates a log file with a unique name that\
    \ includes a timestamp. The log file is created in the oraInventory/logs directory.\
    \ You can stream the output to your screen as the OUI writes to it:\n\n```\n$\
    \ tail -f <logfile name>\n```\n\nHere is an example of a log file name:\n\n```\n\
    installActions2012-11-04_02-57-29PM.log\n```\n\nIf everything runs successfully,\
    \ in the output you’re notified that you need to run the root.sh script as the\
    \ root user:\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/root.sh\n```\n\nRun\
    \ the root.sh script as the root OS user. Then, you should be able to create an\
    \ Oracle database (database creation is covered in [Chapter 2](#9781430257288_Ch02.xhtml)).\n\
    \nStep 7\\. Troubleshoot Any Issues\n\nIf you encounter an error, using a response\
    \ file, 90 percent of the time it’s due to an issue with how you set the variables\
    \ in the file. Inspect those variables carefully, and ensure that they’re set\
    \ correctly. Also, if you don’t fully specify the command-line path to the response\
    \ file, you receive errors such as this:\n\n```\nOUI-10203: The specified response\
    \ file ... is not found.\n```\n\nHere is another common error when the path or\
    \ name of the response file is incorrectly specified:\n\n```\nOUI-10202: No response\
    \ file is specified for this session.\n```\n\nListed next is the error message\
    \ you receive if you enter a wrong path to your products.xml file within the response\
    \ file’s FROM_LOCATION variable:\n\n```\nOUI-10133: Invalid staging area\n```\n\
    \nAlso, be sure to provide the correct command-line syntax when running a response\
    \ file. If you incorrectly specify or misspell an option, you may receive a misleading\
    \ error message, such as DISPLAY not set. When using a response file, you don’t\
    \ need to have your DISPLAY variable set. This message is confusing because, in\
    \ this scenario, the error is caused by an incorrectly specified command-line\
    \ option and has nothing to do with the DISPLAY variable. Check all options entered\
    \ from the command line, and ensure that you haven’t misspelled an option.\n\n\
    Problems can also occur when you specify an ORACLE_HOME, and the silent installation\
    \ “thinks” the given home already exists:\n\n```\nCheck complete: Failed <<<<\n\
    Recommendation: Choose a new Oracle Home for installing this product.\n```\n\n\
    Check your inventory.xml file (in the oraInventory/ContentsXML directory), and\
    \ make sure there isn’t a conflict with an already existing Oracle home name.\n\
    \nWhen you’re troubleshooting issues with Oracle installations, remember that\
    \ the installer uses two key files to keep track of what software has been installed,\
    \ and where: oraInst.loc and inventory.xml. [Table 1-2](#9781430257288_Ch01.xhtml#Tab2)\
    \ describes the files used by the Oracle installer.\n\n[Table 1-2.](#9781430257288_Ch01.xhtml#_Tab2)\
    \ Useful Files for Troubleshooting Oracle Installation Issues\n\n| File name |\
    \ Directory Location | Contents |\n| --- | --- | --- |\n| oraInst.loc | The location\
    \ of this file varies by OS. On Linux the file is in /etc; on Solaris, it’s in\
    \ /var/opt/oracle. | oraInventory directory location and installation OS group\
    \ |\n| inst.loc | \\\\HKEY_LOCAL_MACHINE\\\\Software\\Oracle (Windows registry)\
    \ | Inventory information |\n| inventory.xml | oraInventory/ContentsXML/inventory.xml\
    \ | Oracle home names and corresponding directory location |\n| .log files | oraInventory/logs\
    \ | Installation log files, which are extremely useful for troubleshooting |\n\
    \nInstalling with a Copy of an Existing Installation\n\nDBAs sometimes install\
    \ Oracle software by using a utility such as tar to copy an existing installation\
    \ of the Oracle binaries to a different server (or a different location on the\
    \ same server). This approach is fast and simple (especially compared with downloading\
    \ and running the Oracle installer). This technique allows DBAs to easily install\
    \ the Oracle software on multiple servers, while ensuring that each installation\
    \ is identical.\n\nInstalling Oracle with an existing copy of the binaries is\
    \ a two-part process:\n\n1.  Copy the binaries, using an OS utility.\n2.  Attach\
    \ the Oracle home.\n\nThese steps are detailed in the next two sections.\n\n![image](Images/sq.jpg) **Tip**  \
    \ See MOS note 300062.1 for instructions on how to clone an existing Oracle installation.\n\
    \nStep 1\\. Copy the Binaries, Using an OS Utility\n\nYou can use any OS copy\
    \ utility to perform this step. The Linux/Unix tar, scp, and rsync utilities are\
    \ commonly used by DBAs to copy files. This example shows how to use the Linux/Unix\
    \ tar utility to replicate an existing set of Oracle binaries to a different server.\
    \ First, locate the target Oracle home binaries that you want to copy:\n\n```\n\
    $ echo $ORACLE_HOME\n/ora01/app/oracle/product/12.1.0.1/db_1\n```\n\nIn this example\
    \ the tar utility copies every file and subdirectory in or below the db_1 directory:\n\
    \n```\n$ cd $ORACLE_HOME\n$ cd ..\n$ tar -cvf orahome.tar db_1\n```\n\nNow, copy\
    \ the orahome.tar file to the server on which you want to install the Oracle software.\
    \ In this example the tar file is copied to the /u01/app/oracle/product/12.1.0.1\
    \ directory on a different server. The tar file is extracted there and creates\
    \ a db_1 directory as part of the extract:\n\n```\n$ cd /u01/app/oracle/product/12.1.0.1\n\
    ```\n\nMake sure you have plenty of disk space available to extract the files.\
    \ A typical Oracle installation can consume at least 3–4GB of space. Use the Linux/Unix\
    \ df command to verify that you have enough space:\n\n```\n$ df -h | sort\n```\n\
    \nNext, extract the files:\n\n```\n$ tar -xvf orahome.tar\n```\n\nWhen the tar\
    \ command completes, there should be a db_1 directory beneath the /u01/app/oracle/product/12.1.0.1\
    \ directory.\n\n![image](Images/sq.jpg) **Tip**   Use the tar -tvf <tarfile_name>\
    \ command to preview which directories and files are restored without ­actually\
    \ restoring them.\n\nListed next is a powerful one-line combination of commands\
    \ that allows you to bundle the Oracle files, copy them to a remote server, and\
    \ have them extracted remotely:\n\n```\n$ tar -cvf - <locDir> | ssh <remoteNode>\
    \ \"cd <remoteDir>; tar -xvf -\"\n```\n\nFor instance, the following command copies\
    \ everything in the dev_1 directory to the remote ora03 server /home/oracle directory:\n\
    \n```\n$ tar -cvf - dev_1 | ssh ora03 \"cd /home/oracle; tar -xvf -\"\n```\n\n\
    ABSOLUTE PATHS VS. RELATIVE PATHS\n\nSome older, non-GNU versions of tar use absolute\
    \ paths when extracting files. The next line of code shows an example of specifying\
    \ the absolute path when creating an archive file:\n\n```\n$ tar -cvf orahome.tar\
    \ /home/oracle\n```\n\nSpecifying an absolute path with non-GNU versions of tar\
    \ can be dangerous. These older versions of tar restore the contents with the\
    \ same directories and file names from which they were copied. This means that\
    \ any directories and file names that previously existed on disk are overwritten.\n\
    \nWhen using older versions of tar, it’s much safer to use a relative pathname.\
    \ This example first changes to the /home directory and then creates an archive\
    \ of the oracle directory (relative to the current working directory):\n\n```\n\
    $ cd /home$ tar -cvf orahome.tar oracle\n```\n\nThe previous example uses the\
    \ relative pathname.\n\nYou don’t have to worry about absolute vs. relative paths\
    \ on most Linux systems. This is because these systems use the GNU version of\
    \ tar. This version strips off the forward slash (/) and restores files relative\
    \ to where your current working directory is located.\n\nUse the man tar command\
    \ if you’re not sure whether you have a GNU version of the tar utility. You can\
    \ also use the tar -tvf <tarfile name> command to preview which directories and\
    \ files are restored to what locations.\n\nStep 2\\. Attach the Oracle Home\n\n\
    One issue with using a copy of an existing installation to install the Oracle\
    \ software is that if you later attempt to upgrade the software, the upgrade process\
    \ will throw an error and abort. This is because a copied installation isn’t registered\
    \ in oraInventory. Before you upgrade a set of binaries installed via a copy,\
    \ you must first register the Oracle home so that it appears in the inventory.xml\
    \ file. This is called attaching an Oracle home.\n\nTo attach an Oracle home,\
    \ you need to know the location of your oraInst.loc file on your server. On Linux\
    \ servers this file is usually located in the /etc directory. On Solaris this\
    \ file can generally be found in the /var/opt/oracle directory.\n\nAfter you’ve\
    \ located your oraInst.loc file, navigate to the ORACLE_HOME/oui/bin directory\
    \ (on the server on which you installed the Oracle binaries from a copy):\n\n\
    ```\n$ cd $ORACLE_HOME/oui/bin\n```\n\nNow, attach the Oracle home by running\
    \ the runInstaller utility, as shown:\n\n```\n$ ./runInstaller -silent -attachHome\
    \ -invPtrLoc /etc/oraInst.loc \\\nORACLE_HOME=\"/u01/app/oracle/product/12.1.0.1/db_1\"\
    \ ORACLE_HOME_NAME=\"ONEW\"\n```\n\nYou should see this as the last message in\
    \ the output, if successful:\n\n```\n'AttachHome' was successful.\n```\n\nYou\
    \ can also examine the contents of your oraInventory/ContentsXML/inventory.xml\
    \ file. Here is a snippet of the line inserted into the inventory.xml file as\
    \ a result of running the runInstaller utility with the attachHome option:\n\n\
    ```\n<HOME NAME=\"ONEW\" LOC=\"/u01/app/oracle/product/12.1.0.1/db_1\" TYPE=\"\
    O\" IDX=\"2\"/>\n```\n\nUpgrading Oracle Software\n\nYou can also upgrade a version\
    \ of the Oracle software, using the silent installation method. Begin by downloading\
    \ the upgrade version from the MOS web site ([http://support.oracle.com](http://support.oracle.com))\
    \ (you need a valid support contract to do this). Read the upgrade documentation\
    \ that comes with the new software. The upgrade procedure can vary quite a bit,\
    \ depending on what version of Oracle you’re using.\n\nFor the most recent upgrades\
    \ that I’ve performed, the procedure was much like installing a new set of Oracle\
    \ binaries. You can use the OUI in either graphical or silent mode to install\
    \ the software. See the section “Installing Oracle,” earlier in this chapter,\
    \ for information on using the silent mode installation method.\n\n![image](Images/sq.jpg) **Note**  \
    \ Upgrading the Oracle software isn’t the same as upgrading an Oracle database.\
    \ This section only deals with using the silent install method for upgrading the\
    \ Oracle software. Additional steps are involved for upgrading a database. See\
    \ MOS note 730365.1 for instructions on how to upgrade a database.\n\nDepending\
    \ on the version being upgraded, you may be presented with two different scenarios.\
    \ Here is scenario A:\n\n1.  Shut down any databases using the Oracle home to\
    \ be upgraded.\n2.  Upgrade the Oracle home binaries.\n3.  Start up the database,\
    \ and run any required upgrade scripts.\n\nHere are the steps for the scenario\
    \ B approach to an upgrade:\n\n1.  Leave the existing Oracle home as it is—don’t\
    \ upgrade it.\n2.  Install a new Oracle home that is the same version as the old\
    \ Oracle home.\n3.  Upgrade the new Oracle home to the desired version.\n4.  When\
    \ you’re ready, shut down the database using the old Oracle home; set the OS variables\
    \ to point to the new, upgraded Oracle home; start up the database; and run any\
    \ required upgrade scripts.\n\nWhich of the two previous scenarios is better?\
    \ Scenario B has the advantage of leaving the old Oracle home as it is; therefore,\
    \ if, for any reason, you need to switch back to the old Oracle home, you have\
    \ those binaries available. Scenario B has the disadvantage of requiring extra\
    \ disk space to contain two installations of Oracle home. This usually isn’t an\
    \ issue, because after the upgrade is complete, you can delete the old Oracle\
    \ home when it’s convenient.\n\n![image](Images/sq.jpg) **Tip**   Consider using\
    \ the Database Upgrade Assistant (DBUA) to upgrade an Oracle database.\n\nReinstalling\
    \ After Failed Installation\n\nYou may run into a situation in which you’re attempting\
    \ to install Oracle, and for some reason the installation fails. You correct the\
    \ issue and attempt to rerun the Oracle installer. However, you receive this message:\n\
    \n```\n   CAUSE: The chosen installation conflicted with software already\n          installed\
    \ in the given Oracle home.\n   ACTION: Install into a different Oracle home.\n\
    ```\n\nIn this situation, Oracle thinks that the software has already been installed,\
    \ for a couple of reasons:\n\n*   Files in the ORACLE_HOME directory are specified\
    \ in the response file.\n*   An existing Oracle home and location in your oraInventory/ContentsXML/inventory.xml\
    \ file match what you have specified in the response file.\n\nOracle doesn’t allow\
    \ you to install a new set of binaries over an existing Oracle home. If you’re\
    \ sure you don’t need any of the files in the ORACLE_HOME directory, you can remove\
    \ them (be very careful—ensure that you absolutely want to do this). This example\
    \ navigates to ORACLE_HOME and then removes the db_1 directory and its contents:\n\
    \n```\n$ cd $ORACLE_HOME\n$ cd ..\n$ rm -rf db_1\n```\n\nAlso, even if there are\
    \ no files in the ORACLE_HOME directory, the installer inspects the inventory.xml\
    \ file for previous Oracle home names and locations. In the inventory.xml file\
    \ you must remove the entry corresponding to the Oracle home location that matches\
    \ the Oracle home you’re trying to install to. To remove the entry, first, locate\
    \ your oraInst.loc file, which contains the directory of your oraInventory. Next,\
    \ navigate to the oraInventory/ContentsXML directory. Make a copy of inventory.xml\
    \ before you modify it:\n\n```\n$ cp inventory.xml inventory.xml.old\n```\n\n\
    Then, edit the inventory.xml file with an OS utility (such as vi), and remove\
    \ the line that contains the Oracle home information of your previously failed\
    \ installation. You can now attempt to execute the runInstaller utility again.\n\
    \nApplying Interim Patches\n\nSometimes, you’re required to apply a patch to resolve\
    \ a database issue or eradicate a bug. You can usually obtain patches from the\
    \ MOS web site and install them with the opatch utility. Here are the basic steps\
    \ for applying a patch:\n\n1.  Obtain the patch from MOS (requires a valid support\
    \ contract).\n2.  Unzip the patch file.\n3.  Carefully read the README.txt file\
    \ for special instructions.\n4.  Shut down any databases and processes using the\
    \ Oracle home to which the patch is being applied.\n5.  Apply the patch.\n6. \
    \ Verify that the patch was installed successfully.\n\nA brief example will help\
    \ illustrate the process of applying a patch. Here, the patch number 14390252\
    \ is applied to an 11.2.0.3 database on a Solaris box. First, download the p14390252_112030_SOLARIS64.zip\
    \ file from MOS ([https://support.oracle.com](https://support.oracle.com)). Next,\
    \ unzip the file on the server to which the patch is being applied:\n\n```\n$\
    \ unzip p14390252_112030_SOLARIS64.zip\n```\n\nThe README.txt instructs you to\
    \ change the directory, as follows:\n\n```\n$ cd 14390252\n```\n\nMake sure you\
    \ follow the instructions included in the README.txt, such as shutting down any\
    \ databases that use the Oracle home to which the patch is being applied:\n\n\
    ```\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\nNext, apply the patch.\
    \ Ensure that you perform this step as the owner of the Oracle software (usually\
    \ the oracle OS account). Also make sure your ORACLE_HOME variable is set to point\
    \ to the Oracle home to which you’re applying the patch. In this example, because\
    \ the opatch utility isn’t in a path included in the PATH directory, you specify\
    \ the entire path:\n\n```\n$ $ORACLE_HOME/OPatch/opatch napply -skip_subset -skip_duplicate\n\
    ```\n\nFinally, verify that the patch was applied by listing the inventory of\
    \ patches:\n\n```\n$ $ORACLE_HOME/OPatch/opatch lsinventory\n```\n\nHere is some\
    \ sample output for this example:\n\n```\nPatch  13742433     : applied on Sun\
    \ Nov 04 13:49:07 MST 2012\nUnique Patch ID:  15427576\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ See MOS note 242993.1 for more information regarding the opatch utility.\n\n\
    Installing Remotely with the Graphical Installer\n\nIn today’s global environment,\
    \ DBAs often find themselves tasked with installing Oracle software on remote\
    \ Linux/Unix servers. In these situations I strongly suggest that you use the\
    \ silent installation mode with a response file (as mentioned earlier). However,\
    \ if you want to install Oracle on a remote server via the graphical installer,\
    \ this section of the chapter describes the required steps.\n\n![image](Images/sq.jpg) **Note**  \
    \ If you’re in a Windows-based environment, use the Remote Desktop Connection\
    \ or Virtual Network Computing (VNC) to install software remotely.\n\nOne issue\
    \ that frequently arises is how to run the Oracle installer on a remote server\
    \ and have the graphical output displayed to your local computer. [Figure 1-2](#9781430257288_Ch01.xhtml#Fig2)\
    \ shows the basic components and utilities required to run the Oracle graphical\
    \ installer remotely.\n\n![9781430257288_Fig01-02.jpg](Images/9781430257288_Fig01-02.jpg)\n\
    \n[Figure 1-2](#9781430257288_Ch01.xhtml#_Fig2). Components needed for a remote\
    \ Oracle graphical installation\n\nListed next are the steps for setting up your\
    \ environment to display the graphical screens on your local computer while remotely\
    \ running the Oracle installer:\n\n1.  Install software on the local computer\
    \ that allows for X Window System emulation and secure networking.\n2.  Start\
    \ an X session on the local computer, and issue the startx command.\n3.  Copy\
    \ the Oracle installation files to the remote server.\n4.  Run the xhost command.\n\
    5.  Log in to the remote computer from an X terminal.\n6.  Ensure that the DISPLAY\
    \ variable is set correctly on the remote computer.\n7.  Execute the runInstaller\
    \ utility on the remote server.\n8.  Troubleshoot.\n\nThese steps are explained\
    \ in the following sections.\n\nStep 1\\. Install X Software and Networking Utilities\
    \ on the Local PC\n\nIf you’re installing Oracle on a remote server, and you’re\
    \ using your home personal computer (PC), then you first need to install software\
    \ on your PC that allows you to run X Window System software and to run commands\
    \ such as ssh (secure shell) and scp (secure copy). Several free tools are available\
    \ that provide this functionality. One such tool is Cygwin, which you can download\
    \ from the Cygwin web site ([http://x.cygwin.com](http://x.cygwin.com)). Be sure\
    \ to install the packages that provide the X emulation and secure networking utilities,\
    \ such as ssh and scp.\n\nStep 2\\. Start an X Session on the Local Computer\n\
    \nAfter you install on your local computer the software that allows you to run\
    \ X Window System software, you can open an X terminal window and start the X\
    \ server via the startx command:\n\n```\n$ startx\n```\n\nHere is a snippet of\
    \ the output:\n\n```\nxauth:  creating new authority file /home/test/.serverauth.3012\n\
    waiting for X server to begin accepting connections.\n```\n\nWhen the X software\
    \ has started, run a utility such as xeyes to determine whether X is working properly:\n\
    \n```\n$ xeyes\n```\n\n[Figure 1-3](#9781430257288_Ch01.xhtml#Fig3) shows what\
    \ a local terminal session looks like, using the Cygwin X terminal session tool.\n\
    \n![9781430257288_Fig01-03.jpg](Images/9781430257288_Fig01-03.jpg)\n\n[Figure\
    \ 1-3](#9781430257288_Ch01.xhtml#_Fig3). Running xeyes utility on a local computer\n\
    \nIf you can’t get a utility such as xeyes to execute, stop at this step until\
    \ you get it working. You must have correctly functioning X software before you\
    \ can remotely install Oracle, using the graphical installer.\n\nStep 3\\. Copy\
    \ the Oracle Installation Media to the Remote Server\n\nFrom the X terminal, run\
    \ the scp command to copy the Oracle installation media to the remote server.\
    \ Here is the basic syntax for using scp:\n\n```\n$ scp <localfile> <username>@<remote_server>:<remote_directory>\n\
    ```\n\nThe next line of code copies the Oracle installation media to a remote\
    \ Oracle OS user on a remote server in the home directory oracle:\n\n```\n$ scp\
    \ linux_11gR2_database_1of2.zip oracle@shrek2:.\n```\n\nStep 4\\. Run the xhost\
    \ Command\n\nFrom the X screen, enable access to the remote host via the xhost\
    \ command. This command must be run from your local computer:\n\n```\n$ xhost\
    \ +\naccess control disabled, clients can connect from any host.\n```\n\nThe prior\
    \ command allows any client to connect to the local X server. If you want to enable\
    \ remote access specifically for the remote computer on which you’re installing\
    \ the software, provide an Internet protocol (IP) address or hostname (of the\
    \ remote server). In this example the remote hostname is [tst-z1.central.sun.com](http://tst-z1.central.sun.com)\n\
    \n```\n$ xhost +\n\ntst-z1.central.sun.com\ntst-z1.central.sun.com\n\n being added\
    \ to access control list\n```\n\nStep 5\\. Log In to the Remote Computer from\
    \ X\n\nFrom your local X terminal, use the ssh utility to log in to the remote\
    \ server on which you want to install the Oracle software:\n\n```\n$ ssh -Y -l\
    \ oracle <hostname>\n```\n\nStep 6\\. Ensure that the DISPLAY Variable Is Set\
    \ Correctly on the Remote Computer\n\nWhen you’ve logged in to the remote box,\
    \ verify that your DISPLAY variable has been set:\n\n```\n$ echo $DISPLAY\n```\n\
    \nYou should see something similar to this:\n\n```\nlocalhost:10.0\n```\n\nIf\
    \ your DISPLAY variable is set to localhost:10.0, then proceed to the next step.\
    \ Otherwise, follow the next set of recommendations.\n\nIf your DISPLAY variable\
    \ isn’t set, you must ensure that it’s set to a value that reflects your local\
    \ home computer location. From your local home computer, you can use the ping\
    \ or arp utility to determine the IP address that identifies your local computer.\
    \ Run the following command on your home computer:\n\n```\nC:\\> ping <local_computer>\n\
    ```\n\n![image](Images/sq.jpg) **Tip**   If you don’t know your local home computer\
    \ name, on Windows you can look in the Control Panel, then System, then reference\
    \ the Computer name.\n\nNow, from the remote server, execute this command to set\
    \ the DISPLAY variable to contain the IP address of the local computer:\n\n```\n\
    $ export DISPLAY=129.151.31.147:0.0\n```\n\nNote that you must append the :0.0\
    \ to the end of the IP address. If you’re using the C shell, use the setenv command\
    \ to set the DISPLAY variable:\n\n```\n$ setenv DISPLAY 129.151.31.147:0.0\n```\n\
    \nIf you’re unsure which shell you’re using, use the echo command to display the\
    \ SHELL variable:\n\n```\n$ echo $SHELL\n```\n\nStep 7\\. Execute the runInstaller\
    \ Utility\n\nNavigate to the directory where you copied and unzipped the Oracle\
    \ software on the remote server. Locate the runInstaller utility, and run it,\
    \ as shown:\n\n```\n$ ./runInstaller\n```\n\nIf everything goes well, you should\
    \ see a screen such as the one in [Figure 1-4](#9781430257288_Ch01.xhtml#Fig4).\n\
    \n![9781430257288_Fig01-04.jpg](Images/9781430257288_Fig01-04.jpg)\n\n[Figure\
    \ 1-4](#9781430257288_Ch01.xhtml#_Fig4). OUI 12c initial screen\n\nFrom here,\
    \ you can point and click your way through an Oracle installation of the software.\
    \ Many DBAs are more comfortable installing the software through a graphical screen.\
    \ This is a particularly good method if you aren’t familiar with Oracle’s installation\
    \ process and want to be prompted for input and presented with reasonable default\
    \ values.\n\nStep 8\\. Troubleshoot\n\nMost issues with remote installations occur\
    \ in steps 4, 5, and 6. Make sure you’ve properly enabled remote-client access\
    \ to your local X server (running on your home computer) via the xhost command.\
    \ The xhost command must be run on the local computer on which you want the graphical\
    \ display presented. Using the + (plus sign) with the remote hostname adds a host\
    \ to the local access list. This enables the remote server to display an X window\
    \ on the local host. If you type the xhost command by itself (with no parameters),\
    \ it displays all remote hosts that can display X sessions on the local computer:\n\
    \n```\n$ xhost\naccess control disabled, clients can connect from any host\n```\n\
    \nSetting the DISPLAY OS variable on the remote server is also crucial. This allows\
    \ you to log in to another host remotely and display an X application back to\
    \ your local computer. The DISPLAY variable must be set on the remote database\
    \ server, to contain information that points it to the local computer on which\
    \ you want the graphical screen displayed.\n\nSummary\n\nThis chapter detailed\
    \ techniques for efficiently installing the Oracle binaries. These methods are\
    \ especially useful if you work in environments in which you are geographically\
    \ separated from the database servers. The Oracle silent installation method is\
    \ efficient because it doesn’t require graphical software and uses a response\
    \ file that helps enforce consistency from one installation to the next. When\
    \ working in chaotic and constantly changing environments, you should benefit\
    \ from the installation tips and procedures described here.\n\nMany DBAs feel\
    \ more comfortable using Oracle’s graphical installer for installing the database\
    \ software. However, the graphical installer can be troublesome when the server\
    \ is in a remote location or embedded deeply within a secure network. A slow network\
    \ or a security feature can greatly impede the graphical installation process.\
    \ In these situations, make sure you correctly configure the required X software\
    \ and OS variables (such as DISPLAY).\n\nIt’s critical as a DBA to be an expert\
    \ in Oracle installation procedures. If the Oracle installation software isn’t\
    \ correctly installed, you won’t be able to successfully create a database. Once\
    \ you have properly installed Oracle, you can go on to the next step of starting\
    \ the background processes and creating a database. The topics of starting Oracle\
    \ and issuing and creating a database are discussed next, in [Chapter 2](#9781430257288_Ch02.xhtml).\n\
    \nCHAPTER 2\n\n![image](Images/frontdot.jpg)\n\nImplementing a Database\n\n[Chapter\
    \ 1](#9781430257288_Ch01.xhtml) detailed how to efficiently install the Oracle\
    \ binaries. After you’ve installed the Oracle software, the next logical task\
    \ is creating a database. There are two standard ways for creating Oracle databases:\n\
    \n*   Use the Database Configuration Assistant (dbca) utility\n*   Run a CREATE\
    \ DATABASE statement from SQL*Plus\n\nOracle’s dbca utility has a graphical interface\
    \ from which you can configure and create databases. This visual tool is easy\
    \ to use and has a very intuitive interface. If you need to create a development\
    \ database and get going quickly, then this tool is more than adequate. Having\
    \ said that, I normally don’t use the dbca utility to create databases. In Linux/Unix\
    \ environments the dbca tool depends on X software and an appropriate setting\
    \ for the OS DISPLAY variable. The dbca utility therefore requires some setup\
    \ and can perform poorly if you’re installing on remote servers when the network\
    \ throughput is slow.\n\nThe dbca utility also allows you to create a database\
    \ in silent mode, without the graphical component. Using dbca in silent mode with\
    \ a response file is an efficient way to create databases in a consistent and\
    \ repeatable manner. This approach also works well when you’re installing on remote\
    \ servers, which could have a slow network connection or not have the appropriate\
    \ X software installed.\n\nWhen you’re creating databases on remote servers, it’s\
    \ usually easier and more efficient to use SQL*Plus. The SQL*Plus approach is\
    \ simple and inherently scriptable. In addition, SQL*Plus works no matter how\
    \ slow the network connection is, and it isn’t dependent on a graphical component.\
    \ Therefore, I almost always use the SQL*Plus technique to create databases.\n\
    \nThis chapter starts by showing you how to quickly create a database using SQL*Plus,\
    \ and also how to make your database remotely available by enabling a listener\
    \ process. Later, the chapter demonstrates how to use the dbca utility in silent\
    \ mode with a response file to create a database.\n\nSetting OS Variables\n\n\
    Before creating a database, you need to know a bit about OS variables, often called\
    \ environment variables. Before you run SQL*Plus (or any other Oracle utility),\
    \ you must set several OS variables:\n\n*   ORACLE_HOME\n*   ORACLE_SID\n*   LD_LIBRARY_PATH\n\
    *   PATH\n\nThe ORACLE_HOME variable defines the starting point directory for\
    \ the default location for the initialization file, which is ORACLE_HOME/dbs on\
    \ Linux/Unix. On Windows this directory is usually ORACLE_HOME\\database. The\
    \ ORACLE_HOME variable is also important because it defines the starting point\
    \ directory for locating the Oracle binary files (such as sqlplus, dbca, netca,\
    \ rman, and so on) that are in ORACLE_HOME/bin.\n\nThe ORACLE_SID variable defines\
    \ the default name of the database you’re attempting to create. ORACLE_SID is\
    \ also used as the default name for the parameter file, which is init<ORACLE_SID>.ora\
    \ or spfile<ORACLE_SID>.ora.\n\nThe LD_LIBRARY_PATH variable is important because\
    \ it specifies where to search for libraries on Linux/Unix boxes. The value of\
    \ this variable is typically set to include ORACLE_HOME/lib.\n\nThe PATHvariable\
    \ specifies which directories are looked in by default when you type a command\
    \ from the OS prompt. In almost all situations, ORACLE_HOME/bin (the location\
    \ of the Oracle binaries) must be included in your PATH variable.\n\nYou can take\
    \ several different approaches to setting the prior variables. This chapter discusses\
    \ three, beginning with a hard-coded manual approach and ending with the approach\
    \ that I personally prefer.\n\nA Manually Intensive Approach\n\nIn Linux/Unix,\
    \ when you’re using the Bourne, Bash, or Korn shell, you can set OS variables\
    \ manually from the OS command line with the export command::\n\n```\n$ export\
    \ ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n$ export ORACLE_SID=o12c\n\
    $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib\n$ export PATH=$ORACLE_HOME/bin:$PATH\n\
    ```\n\nFor the C or tcsh shell, use the setenv command to set variables:\n\n```\n\
    $ setenv ORACLE_HOME <path>\n$ setenv ORACLE_SID <sid>\n$ setenv LD_LIBRARY_PATH\
    \ <path>\n$ setenv PATH <path>\n```\n\nAnother way that DBAs set these variables\
    \ is by placing the previous export or setenv commands into a Linux/Unix startup\
    \ file, such as .bash_profile, .bashrc, or .profile. That way, the variables are\
    \ automatically set upon login.\n\nHowever, manually setting OS variables (either\
    \ from the command line or by hard-coding values into a startup file) isn’t the\
    \ optimal way to instantiate these variables. For example, if you have multiple\
    \ databases with multiple Oracle homes on a box, manually setting these variables\
    \ quickly becomes unwieldy and not very maintainable.\n\nOracle’s Approach to\
    \ Setting OS Variables\n\nA much better method for setting OS variables is use\
    \ of a script that uses a file that contains the names of all Oracle databases\
    \ on a server and their associated Oracle homes. This approach is flexible and\
    \ maintainable. For instance, if a database’s Oracle home changes (e.g., after\
    \ an upgrade), you only have to modify one file on the server and not hunt down\
    \ where the Oracle home variables may be hard-coded into scripts.\n\nOracle provides\
    \ a mechanism for automatically setting the required OS variables. Oracle’s approach\
    \ relies on two files: oratab and oraenv.\n\nUnderstanding oratab\n\nYou can think\
    \ of the entries in the oratab file as a registry of what databases are installed\
    \ on a box and their corresponding Oracle home directories. The oratab file is\
    \ automatically created for you when you install the Oracle software. On Linux\
    \ boxes, oratab is usually placed in the /etc directory. On Solaris servers the\
    \ oratab file is placed in the /var/opt/oracle directory. If, for some reason,\
    \ the oratab file isn’t automatically created, you can manually create the directory\
    \ and file.\n\nThe oratab file is used in Linux/Unix environments for the following\
    \ purposes:\n\n*   Automating the sourcing of required OS variables\n*   Automating\
    \ the start and stop of Oracle databases on the server\n\nThe oratab file has\
    \ three columns with this format:\n\n```\n<database_sid>:<oracle_home_dir>:Y|N\n\
    ```\n\nThe Y or N indicates whether you want Oracle to restart automatically on\
    \ reboot of the box; Y indicates yes, and N indicates no. Automating the startup\
    \ and shutdown of your database is covered in detail in [Chapter 21](#9781430257288_Ch21.xhtml).\n\
    \nComments in the oratab file start with a pound sign (#). Here is a typical oratab\
    \ file entry:\n\n```\no12c:/u01/app/oracle/product/12.1.0.1/db_1:N\nrcat:/u01/app/oracle/product/12.1.0.1/db_1:N\n\
    ```\n\nThe names of the databases on the previous lines are o12c and rcat. The\
    \ path of each database’s Oracle home directory is next on the line (separated\
    \ from the database name by a colon [:]).\n\nSeveral Oracle-supplied utilities\
    \ use the oratab file:\n\n*   oraenv uses oratab to set the OS variables.\n* \
    \  dbstart uses it to start the database automatically on server reboots (if the\
    \ third field in oratab is Y).\n*   dbshut uses it to stop the database automatically\
    \ on server reboots (if the third field in oratab is Y).\n\nThe oraenv tool is\
    \ discussed in the following section.\n\nUsing oraenv\n\nIf you don’t properly\
    \ set the required OS variables for an Oracle environment, then utilities such\
    \ as SQL*Plus, Oracle Recovery Manager (RMAN), Data Pump, and so on won’t work\
    \ correctly. The oraenv utility automates the setting of required OS variables\
    \ (such as ORACLE_HOME, ORACLE_SID, and PATH) on an Oracle database server. This\
    \ utility is used in Bash, Korn, and Bourne shell environments (if you’re in a\
    \ C shell environment, there is a corresponding coraenv utility).\n\nThe oraenv\
    \ utility is located in the ORACLE_HOME/bin directory. You can run it manually,\
    \ like this:\n\n```\n$ . oraenv\n```\n\nNote that the syntax to run this from\
    \ the command line requires a space between the dot (.) and the oraenv tool. You’re\
    \ prompted for ORACLE_SID and ORACLE_HOME values:\n\n```\nORACLE_SID = [oracle]\
    \ ?\nORACLE_HOME = [/home/oracle] ?\n```\n\nYou can also run the oraenv utility\
    \ in a noninteractive way by setting OS variables before you run it. This is useful\
    \ for scripting when you don’t want to be prompted for input:\n\n```\n$ export\
    \ ORACLE_SID=o12c\n$ export ORAENV_ASK=NO\n$ . oraenv\n```\n\nKeep in mind that\
    \ if you set your ORACLE_SID to a value that isn’t found with the oratab file,\
    \ then you may be prompted for values such as ORACLE_HOME.\n\nMy Approach to Setting\
    \ OS Variables\n\nI don’t use Oracle’s oraenvfile to set the OS variables (see\
    \ the previous section, “Using oraenv,” for details of Oracle’s approach). Instead,\
    \ I use a script named oraset. The oraset script depends on the oratab file’s\
    \ being in the correct directory and expected format:\n\n```\n<database_sid>:<oracle_home_dir>:Y|N\n\
    ```\n\nAs mentioned in the previous section, the Oracle installer should create\
    \ an oratab file for you in the correct directory. If it doesn’t, then you can\
    \ manually create and populate the file. In Linux the oratab file is usually created\
    \ in the /etc directory. On Solaris servers the oratab file is located in the\
    \ /var/opt/oracle directory.\n\nNext, use a script that reads the oratab file\
    \ and sets the OS variables. Here is an example of an oraset script that reads\
    \ the oratab file and presents a menu of choices (based on the database names\
    \ in the oratab file):\n\n```\n#!/bin/bash\n# Sets Oracle environment variables.\n\
    # Setup: 1\\. Put oraset file in /etc (Linux), in /var/opt/oracle (Solaris)\n\
    #        2\\. Ensure /etc or /var/opt/oracle is in $PATH\n# Usage: batch mode:\
    \ . oraset <SID>\n#        menu mode:  . oraset\n#====================================================\n\
    if [ −f /etc/oratab ]; then\n  OTAB=/etc/oratab\nelif [ −f /var/opt/oracle/oratab\
    \ ]; then\n  OTAB=/var/opt/oracle/oratab\nelse\n     echo 'oratab file not found.'\n\
         exit\nfi\n#\nif [ −z $1 ]; then\n  SIDLIST=$(egrep -v '#|\\*' ${OTAB} | cut\
    \ -f1 -d:)\n  # PS3 indicates the prompt to be used for the Bash select command.\n\
      PS3='SID? '\n  select sid in ${SIDLIST}; do\n    if [ −n $sid ]; then\n      HOLD_SID=$sid\n\
          break\n    fi\n  done\nelse\n  if egrep -v '#|\\*' ${OTAB} | grep -w \"\
    ${1}:\">/dev/null; then\n    HOLD_SID=$1\n  else\n    echo \"SID: $1 not found\
    \ in $OTAB\"\n  fi\n  shift\nfi\n#\nexport ORACLE_SID=$HOLD_SID\nexport ORACLE_HOME=$(egrep\
    \ -v '#|\\*' $OTAB|grep -w $ORACLE_SID:|cut -f2 -d:)\nexport ORACLE_BASE=${ORACLE_HOME%%/product*}\n\
    export TNS_ADMIN=$ORACLE_HOME/network/admin\nexport ADR_BASE=$ORACLE_BASE/diag\n\
    export PATH=$ORACLE_HOME/bin:/usr/ccs/bin:/opt/SENSsshc/bin/\\\n:/bin:/usr/bin:.:/var/opt/oracle:/usr/sbin\n\
    export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib\n```\n\nYou can run the oraset\
    \ script either from the command line or from a startup file (such as .profile,\
    \ .bash_profile, or .bashrc). To run oraset from the command line, place the oraset\
    \ file in a standard location, such as /var/opt/oracle (Solaris) or /etc (Linux),\
    \ and run, as follows:\n\n```\n$ . /etc/oraset\n```\n\nNote that the syntax to\
    \ run this from the command line requires a space between the dot (.) and the\
    \ rest of the command. When you run oraset from the command line, you should be\
    \ presented with a menu such as this:\n\n```\n1) o12c\n2) rcat\nSID?\n```\n\n\
    In this example you can now enter 1 or 2 to set the OS variables required for\
    \ whichever database you want to use. This allows you to set up OS variables interactively,\
    \ regardless of the number of database installations on the server.\n\nYou can\
    \ also call the oraset file from an OS startup file. Here is a sample entry in\
    \ the .bashrc file:\n\n```\n. /etc/oraset\n```\n\nNow, every time you log in to\
    \ the server, you’re presented with a menu of choices that you can use to indicate\
    \ the database for which you want the OS variables set. If you want the OS variables\
    \ automatically set to a particular database, then put an entry such as this in\
    \ the .bashrc file:\n\n```\n. /etc/oraset o12c\n```\n\nThe prior line will run\
    \ the oraset file for the o12c database and set the OS variables appropriately.\n\
    \nCreating a Database\n\nThis section explains how to create an Oracle database\
    \ manually with the SQL*Plus CREATE DATABASE statement. These are the steps required\
    \ to create a database:\n\n1.  Set the OS variables.\n2.  Configure the initialization\
    \ file.\n3.  Create the required directories.\n4.  Create the database.\n5.  Create\
    \ a data dictionary.\n\nEach of these steps is covered in the following sections.\n\
    \nStep 1\\. Set the OS Variables\n\nAs mentioned previously, before you run SQL*Plus\
    \ (or any other Oracle utility), you must set several OS variables. You can either\
    \ manually set these variables or use a combination of files and scripts to set\
    \ the variables. Here’s an example of setting these variables manually:\n\n```\n\
    $ export ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n$ export ORACLE_SID=o12c\n\
    $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib\n$ export PATH=$ORACLE_HOME/bin:$PATH\n\
    ```\n\nSee the section “Setting OS Variables,” earlier in this chapter, for a\
    \ complete description of these variables and techniques for setting them.\n\n\
    Step 2: Configure the Initialization File\n\nOracle requires that you have an\
    \ initialization file in place before you attempt to start the instance. The initialization\
    \ file is used to configure features such as memory and to control file locations.\
    \ You can use two types of initialization files:\n\n*   Server parameter binary\
    \ file (spfile)\n*   init.ora text file\n\nOracle recommends that you use an spfile\
    \ for reasons such as these:\n\n*   You can modify the contents of the spfile\
    \ with the SQL ALTER SYSTEM statement.\n*   You can use remote-client SQL sessions\
    \ to start the database without requiring a local (client) initialization file.\n\
    \nThese are good reasons to use an spfile. However, some shops still use the traditional\
    \ init.ora file. The init.ora file also has advantages:\n\n*   You can directly\
    \ edit it with an OS text editor.\n*   You can place comments in it that detail\
    \ a history of modifications.\n\nWhen I first create a database, I find it easier\
    \ to use an init.ora file. This file can be easily converted later to an spfile\
    \ if required (via the CREATE SPFILE FROM PFILE statement). In this example my\
    \ database name is o12c, so I place the following contents in a file named inito12c.ora\
    \ and put the file in the ORACLE_HOME/dbs directory:\n\n```\ndb_name=o12c\ndb_block_size=8192\n\
    memory_target=300M\nmemory_max_target=300M\nprocesses=200\ncontrol_files=(/u01/dbfile/o12c/control01.ctl,/u02/dbfile/o12c/control02.ctl)\n\
    job_queue_processes=10\nopen_cursors=500\nfast_start_mttr_target=500\nundo_management=AUTO\n\
    undo_tablespace=UNDOTBS1\nremote_login_passwordfile=EXCLUSIVE\n```\n\nEnsure that\
    \ the initialization file is named correctly and located in the appropriate directory.\
    \ This is critical because when starting your instance, Oracle first looks in\
    \ the ORACLE_HOME/dbs directory for parameter files with specific formats, in\
    \ this order:\n\n*   spfile<SID>.ora\n*   spfile.ora\n*   init<SID>.ora\n\nIn\
    \ other words, Oracle first looks for a file named spfile<SID>.ora. If found,\
    \ the instance is started; if not, Oracle looks for spfile.ora and then init<SID>.ora.\
    \ If one of these files is not found, Oracle throws an error.\n\nThis may cause\
    \ some confusion if you’re not aware of the files that Oracle looks for, and in\
    \ what order. For example, you may make a change to an init<SID>.ora file and\
    \ expect the parameter to be instantiated after stopping and starting your instance.\
    \ If there is an spfile<SID>.ora in place, the init<SID>.ora is completely ignored.\n\
    \n![image](Images/sq.jpg) **Note**   You can manually instruct Oracle to look\
    \ for a text parameter file in a directory, using the pfile=<directory/filename>\
    \ clause with the startup command; under normal circumstances, you shouldn’t need\
    \ to do this. You want the default behavior, which is for Oracle to find a parameter\
    \ file in the ORACLE_HOME/dbs directory (for Linux/Unix). The default directory\
    \ on Windows is ORACLE_HOME/database.\n\n[Table 2-1](#9781430257288_Ch02.xhtml#Tab1)\
    \ lists best practices to consider when configuring an Oracle initialization file.\n\
    \n[Table 2-1](#9781430257288_Ch02.xhtml#_Tab1). Initialization File Best Practices\n\
    \n| Best Practice | Reasoning |\n| --- | --- |\n| Oracle recommends that you use\
    \ a binary server parameter file (spfile). However, I still use the old text init.ora\
    \ files in some cases. | Use whichever type of initialization parameter file you’re\
    \ comfortable with. If you have a requirement to use an spfile, then by all means,\
    \ implement one. |\n| In general, don’t set initialization parameters if you’re\
    \ not sure of their intended purpose. When in doubt, use the default. | Setting\
    \ initialization parameters can have far-reaching consequences in terms of database\
    \ performance. Only modify parameters if you know what the resulting behavior\
    \ will be. |\n| For 11g and higher, set the memory_target and memory_max_target\
    \ initialization parameters. | Doing this allows Oracle to manage all memory components\
    \ for you. |\n| For 10g, set the sga_target and sga_target_max initialization\
    \ parameters. | Doing this lets Oracle manage most memory components for you.\
    \ |\n| For 10g, set pga_aggregate_target and workarea_size_policy. | Doing this\
    \ allows Oracle to manage the memory used for the sort space. |\n| Starting with\
    \ 10g, use the automatic UNDO feature. This is set using the undo_management and\
    \ undo_tablespace parameters. | Doing this allows Oracle to manage most features\
    \ of the UNDO tablespace. |\n| Set open_cursors to a higher value than the default.\
    \ I typically set it to 500\\. Active online transaction processing (OLTP) databases\
    \ may need a much higher value. | The default value of 50 is almost never enough.\
    \ Even a small, one-user application can exceed the default value of 50 open cursors.\
    \ |\n| Name the control files with the pattern /<mount_point>/dbfile/<database_name>/control0N.ctl.\
    \ | This deviates slightly from the OFA standard. I find this location easier\
    \ to navigate to, as opposed to being located under ORACLE_BASE. |\n| Use at least\
    \ two control files, preferably in different locations, using different disks.\
    \ | If one control file becomes corrupt, it’s always a good idea to have at least\
    \ one other control file available. |\n\nStep 3: Create the Required Directories\n\
    \nAny OS directories referenced in the parameter file or CREATE DATABASE statement\
    \ must be created on the server before you attempt to create a database. For instance,\
    \ in the previous section’s initialization file, the control files are defined\
    \ as\n\n```\ncontrol_files=(/u01/dbfile/o12c/control01.ctl,/u02/dbfile/o12c/control02.ctl)\n\
    ```\n\nFrom the previous line, ensure that you’ve created the directories /u01/dbfile/o12c\
    \ and /u02/dbfile/o12c (modify this according to your environment). In Linux/Unix\
    \ you can create directories, including any parent directories required, by using\
    \ the mkdir command with the p switch:\n\n```\n$ mkdir -p /u01/dbfile/o12c\n$\
    \ mkdir -p /u02/dbfile/o12c\n```\n\nAlso make sure you create any directories\
    \ required for data files and online redo logs referenced in the CREATE DATABASE\
    \ statement (see step 4). For this example, here are the additional directories\
    \ required:\n\n```\n$ mkdir -p /u01/oraredo/o12c\n$ mkdir -p /u02/oraredo/o12c\n\
    ```\n\nIf you create the previous directories as the root user, ensure that the\
    \ oracle user and dba groups are properly set to own the directories, subdirectories,\
    \ and files. This example recursively changes the owner and group of the following\
    \ directories:\n\n```\n# chown -R oracle:dba /u01\n# chown -R oracle:dba /u02\n\
    ```\n\nStep 4: Create the Database\n\nAfter you’ve established OS variables, configured\
    \ an initialization file, and created any required directories, you can now create\
    \ a database. This step explains how to use the CREATE DATABASE statement to create\
    \ a database.\n\nBefore you can run the CREATE DATABASE statement, you must start\
    \ the background processes and allocate memory via the STARTUP NOMOUNT statement:\n\
    \n```\n$ sqlplus / as sysdba\nSQL> startup nomount;\n```\n\nWhen you issue a STARTUP\
    \ NOMOUNT statement, SQL*Plus attempts to read the initialization file in the\
    \ ORACLE_HOME/dbs directory (see step 2). The STARTUP NOMOUNT statement instantiates\
    \ the background processes and memory areas used by Oracle. At this point, you\
    \ have an Oracle instance, but you have no database.\n\n![image](Images/sq.jpg) **Note**  \
    \ An Oracle instance is defined as the background processes and memory areas.\
    \ The Oracle database is defined as the physical files (data files, control files,\
    \ online redo logs) on disk.\n\nListed next is a typical Oracle CREATE DATABASE\
    \ statement:\n\n```\nCREATE DATABASE o12c\n   MAXLOGFILES 16\n   MAXLOGMEMBERS\
    \ 4\n   MAXDATAFILES 1024\n   MAXINSTANCES 1\n   MAXLOGHISTORY 680\n   CHARACTER\
    \ SET AL32UTF8\nDATAFILE\n'/u01/dbfile/o12c/system01.dbf'\n   SIZE 500M REUSE\n\
       EXTENT MANAGEMENT LOCAL\nUNDO TABLESPACE undotbs1 DATAFILE\n'/u01/dbfile/o12c/undotbs01.dbf'\n\
       SIZE 800M\nSYSAUX DATAFILE\n'/u01/dbfile/o12c/sysaux01.dbf'\n   SIZE 500M\n\
    DEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE\n'/u01/dbfile/o12c/temp01.dbf'\n  \
    \ SIZE 500M\nDEFAULT TABLESPACE USERS DATAFILE\n'/u01/dbfile/o12c/users01.dbf'\n\
       SIZE 20M\nLOGFILE GROUP 1\n        ('/u01/oraredo/o12c/redo01a.rdo',\n        \
    \ '/u02/oraredo/o12c/redo01b.rdo') SIZE 50M,\n        GROUP 2\n        ('/u01/oraredo/o12c/redo02a.rdo',\n\
             '/u02/oraredo/o12c/redo02b.rdo') SIZE 50M,\n        GROUP 3\n        ('/u01/oraredo/o12c/redo03a.rdo',\n\
             '/u02/oraredo/o12c/redo03b.rdo') SIZE 50M\nUSER sys    IDENTIFIED BY\
    \ foo\nUSER system IDENTIFIED BY foo;\n```\n\nIn this example the script is placed\
    \ in a file named credb.sql and is run from the SQL*Plus prompt as the sys user:\n\
    \n```\nSQL> @credb.sql\n```\n\nIf it’s successful, you should see the following\
    \ message:\n\n```\nDatabase created.\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ See [Chapter 23](#9781430257288_Ch23.xhtml) for details on creating a pluggable\
    \ database.\n\nIf any errors are thrown while the CREATE DATABASE statement is\
    \ running, check the alert log file. Typically, errors occur when required directories\
    \ don’t exist, the memory allocation isn’t sufficient, or an OS limit has been\
    \ exceeded. If you’re unsure of the location of your alert log, issue the following\
    \ query:\n\n```\nSQL> select value from v$diag_info where name = 'Diag Trace';\n\
    ```\n\nThe prior query should work even when your database is in the nomount state.\
    \ Another way to quickly find the alert log file is from the OS:\n\n```\n$ cd\
    \ $ORACLE_BASE\n$ find . -name \"alert*.log\"\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ The default format for the name of the alert log file is alert_<SID>.log.\n\n\
    There are few key things to point out about the prior CREATE DATABASE statement\
    \ example. Note that the SYSTEM data file is defined as locally managed. This\
    \ means that any tablespace created in this database must be locally managed (as\
    \ opposed to dictionary managed). Oracle throws an error if you attempt to create\
    \ a dictionary-managed tablespace in this database. This is the desired behavior.\n\
    \nA dictionary-managed tablespace uses the Oracle data dictionary to manage extents\
    \ and free space, whereas a locally managed tablespace uses a bitmap in each data\
    \ file to manage its extents and free space. Locally managed tablespaces have\
    \ these advantages:\n\n*   Performance is increased.\n*   No coalescing is required.\n\
    *   Contention for resources in the data dictionary is reduced.\n*   Recursive\
    \ space management is reduced.\n\nAlso note that the TEMP tablespace is defined\
    \ as the default temporary tablespace. This means that any user created in the\
    \ database automatically has the TEMP tablespace assigned to him or her as the\
    \ default temporary tablespace. After you create the data dictionary (see step\
    \ 5), you can verify the default temporary tablespace with this query:\n\n```\n\
    select *\nfrom database_properties\nwhere property_name = 'DEFAULT_TEMP_TABLESPACE';\n\
    ```\n\nFinally, note that the USERS tablespace is defined as the default permanent\
    \ tablespace for any users created that don’t have a default tablespace defined\
    \ in a CREATE USER statement. After you create the data dictionary (see step 5)\
    \ you can run this query to determine the default temporary tablespace:\n\n```\n\
    select *\nfrom database_properties\nwhere property_name = 'DEFAULT_PERMANENT_TABLESPACE';\n\
    ```\n\n[Table 2-2](#9781430257288_Ch02.xhtml#Tab2) lists best practices to consider\
    \ when you’re creating an Oracle database.\n\n[Table 2-2](#9781430257288_Ch02.xhtml#_Tab2).\
    \ Best Practices for Creating an Oracle Database\n\n| Best Practice | Reasoning\
    \ |\n| --- | --- |\n| Ensure that the SYSTEM tablespace is locally managed. |\
    \ Doing this enforces that all tablespaces created in this database are locally\
    \ managed. |\n| Use the REUSE clause with caution. Normally, you should use it\
    \ only when you’re re-creating a database. | The REUSE clause instructs Oracle\
    \ to overwrite existing files, regardless of whether they’re in use. This is dangerous.\
    \ |\n| Create a default temporary tablespace with TEMP somewhere in the name.\
    \ | Every user should be assigned a temporary tablespace of the type TEMP, including\
    \ the SYS user. If you don’t specify a default temporary tablespace, then the\
    \ SYSTEM tablespace is used. You never want a user to be assigned a temporary\
    \ tablespace of SYSTEM. If your database doesn’t have a default temporary tablespace,\
    \ use the ALTER DATABASE DEFAULT TEMPORARY TABLESPACE statement to assign one.\
    \ |\n| Create a default permanent tablespace named USERS. | This ensures that\
    \ users are assigned a default permanent tablespace other than SYSTEM. If your\
    \ database doesn’t have a default permanent tablespace, use the ALTER DATABASE\
    \ DEFAULT TABLESPACE statement to assign one. |\n| Use the USER SYS and USER SYSTEM\
    \ clauses to specify nondefault passwords. | Doing this creates the database with\
    \ nondefault passwords for database accounts that are usually the first targets\
    \ for hackers. |\n| Create at least three redo log groups, with two members each.\
    \ | At least three redo log groups provides time for the archive process to write\
    \ out archive redo logs between switches. Two members mirror the online redo log\
    \ members, providing some fault tolerance. |\n| Give the redo logs a name such\
    \ as redoNA.rdo. | This deviates slightly from the OFA standard, but I’ve had\
    \ files with the extension.log accidentally deleted more than once (it shouldn’t\
    \ ever happen, but it has). |\n| Make the database name somewhat intelligent,\
    \ such as PAPRD, PADEV1, or PATST1. | This helps you determine what database you’re\
    \ operating in and whether it’s a production, development, or test environment.\
    \ |\n| Use the ? variable when you’re creating the data dictionary (see step 5).\
    \ Don’t hard-code the directory path. | SQL*Plus interprets the ? as the directory\
    \ contained in the OS ORACLE_HOME variable. This prevents you from accidentally\
    \ running scripts from the wrong version of ORACLE_HOME. |\n\nNote that the CREATE\
    \ DATABASE statement used in this step deviates slightly from the OFA standard\
    \ in terms of the directory structure. I prefer not to place the Oracle data files,\
    \ online redo logs, and control files under ORACLE_BASE (as specified by the OFA\
    \ standard). I instead directly place files under directories named /<mount_point>/<file_type>/<database_name>,\
    \ because the path names are much shorter. The shorter path names make command\
    \ line navigation to directories easier, and the names fit more cleanly in the\
    \ output of SQL SELECT statements. [Figure 2-1](#9781430257288_Ch02.xhtml#Fig1)\
    \ displays this deviation from the OFA standard.\n\n![9781430257288_Fig02-01.jpg](Images/9781430257288_Fig02-01.jpg)\n\
    \n[Figure 2-1](#9781430257288_Ch02.xhtml#_Fig1). A slight deviation from the OFA\
    \ standard for laying out database files\n\nIt’s not my intention to have you\
    \ use nonstandard OFA structures. Rather, do what makes sense for your environment\
    \ and requirements. Apply reasonable standards that foster manageability, maintainability,\
    \ and scalability.\n\nStep 5\\. Create a Data Dictionary\n\nAfter your database\
    \ is successfully created, you can instantiate the data dictionary by running\
    \ two scripts. These scripts are created when you install the Oracle binaries.\
    \ You must run these scripts as the SYS schema:\n\n```\nSQL> show user\nUSER is\
    \ \"SYS\"\n```\n\nBefore I create the data dictionary, I like to spool an output\
    \ file that I can inspect in the event of unexpected errors:\n\n```\nSQL> spool\
    \ create_dd.lis\n```\n\nNow, create the data dictionary:\n\n```\nSQL> @?/rdbms/admin/catalog.sql\n\
    SQL> @?/rdbms/admin/catproc.sql\n```\n\nAfter you successfully create the data\
    \ dictionary, as the SYSTEM schema, create the product user profile tables:\n\n\
    ```\nSQL> connect system/<password>\nSQL> @?/sqlplus/admin/pupbld\n```\n\nThese\
    \ tables allow SQL*Plus to disable commands on a user-by-user basis. If the pupbld.sql\
    \ script isn’t run, then all non-sys users see the following warning when logging\
    \ in to SQL*Plus:\n\n```\nError accessing PRODUCT_USER_PROFILE\nWarning: Product\
    \ user profile information not loaded!\nYou may need to run PUPBLD.SQL as SYSTEM\n\
    ```\n\nThese errors can be ignored. If you don’t want to see them when logging\
    \ in to SQL*Plus, make sure you run the pupbld.sql script.\n\nAt this point, you\
    \ should have a fully functional database. You next need to configure and implement\
    \ your listener to enable remote connectivity and, optionally, set up a password\
    \ file. These tasks are described in the next two sections.\n\nConfiguring and\
    \ Implementing the Listener\n\nAfter you’ve installed binaries and created a database,\
    \ you need to make the database accessible to remote-client connections. You do\
    \ this by configuring and starting the Oracle listener. Appropriately named, the\
    \ listener is the process on the database server that “listens” for connection\
    \ requests from remote clients. If you don’t have a listener started on the database\
    \ server, then you can’t connect from a remote client. There are two methods for\
    \ setting up a listener: manually and using the Oracle Net Configuration Assistant\
    \ (netca).\n\nManually Configuring a Listener\n\nWhen you’re setting up a new\
    \ environment, manually configuring the listener is a two-step process:\n\n1.\
    \  Configure the listener.ora file.\n2.  Start the listener.\n\nThe listener.ora\
    \ file is located by default in the ORACLE_HOME/network/admin directory. This\
    \ is the same directory that the TNS_ADMIN OS variable should be set to. Here\
    \ is a sample listener.ora file that contains network configuration information\
    \ for one database:\n\n```\nLISTENER =\n  (DESCRIPTION_LIST =\n    (DESCRIPTION\
    \ =\n      (ADDRESS_LIST =\n        (ADDRESS = (PROTOCOL = TCP)(HOST = oracle12c)(PORT\
    \ = 1521))\n       )\n     )\n    )\n\nSID_LIST_LISTENER =\n  (SID_LIST =\n    (SID_DESC\
    \ =\n      (GLOBAL_DBNAME = o12c)\n      (ORACLE_HOME = /u01/app/oracle/product/12.1.0.1/db_1)\n\
          (SID_NAME = o12c)\n     )\n   )\n```\n\nThis code listing has two sections.\
    \ The first defines the listener name; in this example the listener name is LISTENER.\
    \ The second defines the list of SIDs for which the listener is listening for\
    \ incoming connections (to the database). The format of the SID list name is SID_LIST_<name\
    \ of listener>. The name of the listener must appear in the SID list name. The\
    \ SID list name in this example is SID_LIST_LISTENER.\n\nAlso, you don’t have\
    \ to explicitly specify the SID_LIST_LISTENER section (the second section) in\
    \ the prior code listing. This is because the process monitor (PMON) background\
    \ process will automatically register any running databases as a service with\
    \ the listener; this is known as dynamic registration. However, some DBAs prefer\
    \ to explicitly list which databases should be registered with the listener and\
    \ therefore include the second section; this is known as static registration.\n\
    \nAfter you have a listener.ora file in place, you can start the listener background\
    \ process with the lsnrctl utility:\n\n```\n$ lsnrctl start\n```\n\nYou should\
    \ see informational messages, such as the following:\n\n```\nListening Endpoints\
    \ Summary.  .  .\n  (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=oracle12c)(PORT=1521)))\n\
    Services Summary.  .  .\nService \"o12c\" has 1 instance(s).\n```\n\nYou can verify\
    \ the services for which a listener is listening via\n\n```\n$ lsnrctl services\n\
    ```\n\nYou can check the status of the listener with the following query:\n\n\
    ```\n$ lsnrctl status\n```\n\nFor a complete listing of listener commands, issue\
    \ this command:\n\n```\n$ lsnrctl help\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ Use the Linux/Unix ps -ef | grep tns command to view any listener processes\
    \ running on a server.\n\nImplementing a Listener with the Net Configuration Assistant\n\
    \nThe netca utility assists you with all aspects of implementing a listener. You\
    \ can run the netca tool in either graphical or silent mode. Using the netca in\
    \ graphical mode is easy and intuitive. To use the netca in graphical mode, ensure\
    \ that you have the proper X software installed, then issue the xhost + command,\
    \ and check that your DISPLAY variable is set; for example,\n\n```\n$ xhost +\n\
    $ echo $DISPLAY\n:0.0\n```\n\nYou can now run the netca utility:\n\n```\n$ netca\n\
    ```\n\nNext, you will be guided through several screens from which you can choose\
    \ options such as name of the listener, desired port, and so on.\n\nYou can also\
    \ run the netca utility in silent mode with a response file. This mode allows\
    \ you to script the process and ensure repeatability when creating and implementing\
    \ listeners. First, find the default listener response file within the directory\
    \ structure that contains the Oracle install media:\n\n```\n$  find . -name \"\
    netca.rsp\"\n./12.1.0.1/database/response/netca.rsp\n```\n\nNow, make a copy of\
    \ the file so that you can modify it:\n\n```\n$ cp 12.1.0.1/database/response/netca.rsp\
    \ mynet.rsp\n```\n\nIf you want to change the default name or other attributes,\
    \ then edit the mynet.rsp file with an OS utility such as vi:\n\n```\n$ vi mynet.rsp\n\
    ```\n\nFor this example I haven’t modified any values within the mynet.rsp file.\
    \ In other words, I’m using all the default values already contained within the\
    \ response file. Next, the netca utility is run in silent mode:\n\n```\n$ netca\
    \ -silent -responsefile /home/oracle/orainst/mynet.rsp\n```\n\nThe utility creates\
    \ a listener.ora and sqlnet.ora file in the ORACLE_HOME/network/admin directory\
    \ and starts a default listener.\n\nConnecting to a Database through the Network\n\
    \nOnce the listener has been configured and started, you can test remote connectivity\
    \ from a SQL*Plus client, as follows:\n\n```\n$ sqlplus user/pass@'server:port/service_name'\n\
    ```\n\nIn the next line of code, the user and password are system/foo, connecting\
    \ the oracle12c server, port 1521, to a database named o12c:\n\n```\n$ sqlplus\
    \ system/foo@'oracle12c:1521/o12c'\n```\n\nThis example demonstrates what is known\
    \ as the easy connect naming method of connecting to a database. It’s easy because\
    \ it doesn’t rely on any setup files or utilities. The only information you need\
    \ to know is username, password, server, port, and service name (SID).\n\nAnother\
    \ common connection method is local naming. This method relies on connection information\
    \ in the ORACLE_HOME/network/admin/tnsnames.ora file. In this example the tnsnames.ora\
    \ file is edited, and the following Transparent Network Substrate (TNS) (Oracle’s\
    \ network architecture) entry is added:\n\n```\no12c =\n  (DESCRIPTION =\n    (ADDRESS\
    \ = (PROTOCOL = TCP)(HOST = oracle12c)(PORT = 1521))\n    (CONNECT_DATA = (SERVICE_NAME\
    \ = o12c)))\n```\n\nNow, from the OS command line, you establish a connection\
    \ by referencing the o12c TNS information that was placed in the tnsnames.ora\
    \ file:\n\n```\n$ sqlplus system/foo@o12c\n```\n\nThis connection method is local\
    \ because it relies on a local client copy of the tnsnames.ora file to determine\
    \ the Oracle Net connection details. By default, SQL*Plus inspects the directory\
    \ defined by the TNS_ADMIN variable for a file named tnsnames.ora. If not found,\
    \ then the directory defined by ORACLE_HOME/network/admin is searched. If the\
    \ tnsnames.ora file is found, and if it contains the alias specified in the SQL*Plus\
    \ connection string (in this example, o12c), then the connection details are derived\
    \ from the entry in the tnsnames.ora file.\n\nThe other connection-naming methods\
    \ that Oracle uses are external naming and directory naming. See the *Oracle Net\
    \ Services Administrator’s Guide*, which can be freely downloaded from the Technology\
    \ Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for further details.\n\n![image](Images/sq.jpg) **Tip**   You can use the netca\
    \ utility to create a tnsnames.ora file. Start the utility, and choose the Local\
    \ Net Service Name Configuration option. You will be prompted for input, such\
    \ as the SID, hostname, and port.\n\nCreating a Password File\n\nCreating a password\
    \ file is optional. There are some good reasons for requiring a password file:\n\
    \n*   You want to assign non-sys users sys* privileges (sysdba, sysoper, sysbackup,\
    \ and so on).\n*   You want to connect remotely to your database via Oracle Net\
    \ with sys* privileges.\n*   An Oracle feature or utility requires the use of\
    \ a password file.\n\nPerform the following steps to implement a password file:\n\
    \n1.  Create the password file with the orapwd utility.\n2.  Set the initialization\
    \ parameter REMOTE_LOGIN_PASSWORDFILE to EXCLUSIVE.\n\nIn a Linux/Unix environment,\
    \ use the orapwd utility to create a password file, as follows:\n\n```\n$ cd $ORACLE_HOME/dbs\n\
    $ orapwd file=orapw<ORACLE_SID> password=<sys password>\n```\n\nIn a Linux/Unix\
    \ environment the password file is usually stored in ORACLE_HOME/dbs; in Windows\
    \ it’s typically placed in the ORACLE_HOME\\database directory.\n\nThe format\
    \ of the filename that you specify in the previous command may vary by OS. For\
    \ instance, in Windows the format is PWD<ORACLE_SID>.ora. The following example\
    \ shows the syntax in a Windows environment:\n\n```\nc:\\> cd %ORACLE_HOME%\\\
    database\nc:\\> orapwd file=PWD<ORACLE_SID>.ora password=<sys password>\n```\n\
    \nTo enable the use of the password file, set the initialization parameter REMOTE_LOGIN_PASSWORDFILE\
    \ to EXCLUSIVE (this is the default value). If the parameter is not set to EXCLUSIVE,\
    \ then you’ll have to modify your parameter file:\n\n```\nSQL> alter system set\
    \ remote_login_passwordfile='EXCLUSIVE' scope=spfile;\n```\n\nYou need to stop\
    \ and start the instance to instantiate the prior setting.\n\nYou can add users\
    \ to the password file via the GRANT <any SYS privilege> statement. The following\
    \ example grants SYSDBA privileges to the heera user (and thus adds heera to the\
    \ password file):\n\n```\n VSQL> grant sysdba to heera;\nGrant succeeded.\n```\n\
    \nEnabling a password file also allows you to connect to your database remotely\
    \ with SYS*-level privileges via an Oracle Net connection. This example shows\
    \ the syntax for a remote connection with SYSDBA-level privileges:\n\n```\n$ sqlplus\
    \ <username>/<password>@<database connection string> as sysdba\n```\n\nThis allows\
    \ you to do remote maintenance with sys* privileges (sysdba, sysoper, sysbackup,\
    \ and so on) that would otherwise require your logging in to the database server\
    \ physically. You can verify which users have sys* privileges by querying the\
    \ V$PWFILE_USERS view:\n\n```\nSQL> select * from v$pwfile_users;\n```\n\nHere\
    \ is some sample output:\n\n```\nUSERNAME                       SYSDB SYSOP SYSAS\
    \ SYSBA SYSDG SYSKM     CON_ID\n------------------------------ ----- ----- -----\
    \ ----- ----- ----- ----------\nSYS                            TRUE  TRUE  FALSE\
    \ FALSE FALSE FALSE          0\n```\n\nThe concept of a privileged user is also\
    \ important to RMAN backup and recovery. Like SQL*Plus, RMAN uses OS authentication\
    \ and password files to allow privileged users to connect to the database. Only\
    \ a privileged account is allowed to back up, restore, and recover a database.\n\
    \nStarting and Stopping the Database\n\nBefore you can start and stop an Oracle\
    \ instance, you must set the proper OS variables (previously covered in this chapter).\
    \ You also need access to either a privileged OS account or a privileged database\
    \ user account. Connecting as a privileged user allows you to perform administrative\
    \ tasks, such as starting, stopping, and creating databases. You can use either\
    \ OS authentication or a password file to connect to your database as a privileged\
    \ user.\n\nUnderstanding OS Authentication\n\nOS authentication means that if\
    \ you can log in to a database server via an authorized OS account, you’re allowed\
    \ to connect to your database without the requirement of an additional password.\
    \ A simple example demonstrates this concept. First, the id command is used to\
    \ display the OS groups to which the oracle user belongs:\n\n```\n$ id\nuid=500(oracle)\
    \ gid=506(oinstall) groups=506(oinstall),507(dba),508(oper)\n```\n\nNext, a connection\
    \ to the database is made with SYSDBA privileges, purposely using a bad (invalid)\
    \ username and password:\n\n```\n$ sqlplus bad/notgood as sysdba\n```\n\nI can\
    \ now verify that the connection as SYS was established:\n\n```\nSYS@o12c&#x003E;\
    \ show user\nUSER is \"SYS\"\n```\n\nHow is it possible to connect to the database\
    \ with an incorrect username and password? Actually, it’s not a bad thing (as\
    \ you might initially think). The prior connection works because Oracle ignores\
    \ the username/password provided, as the user was first verified via OS authentication.\
    \ In that example the oracle OS user belongs to the dba OS group and is therefore\
    \ allowed to make a local connection to the database with SYSDBA privileges without\
    \ having to provide a correct username and password.\n\nSee [Table 1-1](#9781430257288_Ch01.xhtml#Tab1),\
    \ in [Chapter 1](#9781430257288_Ch01.xhtml), for a complete description of OS\
    \ groups and the mapping to corresponding database privileges. Typical groups\
    \ include dba and oper; these groups correspond to sysdba and sysoper database\
    \ privileges, respectively. The sysdba and sysoper privileges allow you to perform\
    \ administrative tasks, such as starting and stopping your database.\n\nIn a Windows\
    \ environment an OS group is automatically created (typically named ora_dba) and\
    \ assigned to the OS user that installs the Oracle software. You can verify which\
    \ OS users belong to the ora_dba group as follows: select Start ➤ Control Panel\
    \ ➤ Administrative Tools ➤ Computer Management ➤ Local Users and Groups ➤ Groups.\
    \ You should see a group with a name such as ora_dba. You can click that group\
    \ and view which OS users are assigned to it. In addition, for OS authentication\
    \ to work in Windows environments, you must have the following entry in your sqlnet.ora\
    \ file:\n\n```\nSQLNET.AUTHENTICATION_SERVICES=(NTS)\n```\n\nThe sqlnet.ora file\
    \ is usually located in the ORACLE_HOME/network/admin directory.\n\nStarting the\
    \ Database\n\nStarting and stopping your database is a task that you perform frequently.\
    \ To start/stop your database, connect with a sysdba- or sysoper- privileged user\
    \ account, and issue the startup and shutdown statements. The following example\
    \ uses OS authentication to connect to the database:\n\n```\n$ sqlplus / as sysdba\n\
    ```\n\nAfter you’re connected as a privileged account, you can start your database,\
    \ as follows:\n\n```\nSQL> startup;\n```\n\nFor the prior command to work, you\
    \ need either an spfile or init.ora file in the ORACLE_HOME/dbs directory. See\
    \ the section  “Step 2: Configure the Initialization File,” earlier in this chapter,\
    \ for details.\n\n![image](Images/sq.jpg) **Note**   Stopping and restarting your\
    \ database in quick succession is known colloquially in the DBA world as bouncing\
    \ your database.\n\nWhen your instance starts successfully, you should see messages\
    \ from Oracle indicating that the system global area (SGA) has been allocated.\
    \ The database is mounted and then opened:\n\n```\nORACLE instance started.\n\n\
    Total System Global Area  313159680 bytes\nFixed Size                  2259912\
    \ bytes\nVariable Size             230687800 bytes\nDatabase Buffers          \
    \ 75497472 bytes\nRedo Buffers                4714496 bytes\nDatabase mounted.\n\
    Database opened.\n```\n\nFrom the prior output the database startup operation\
    \ goes through three distinct phases in opening an Oracle database:\n\n1.  Starting\
    \ the instance\n2.  Mounting the database\n3.  Opening the database\n\nYou can\
    \ step through these one at a time when you start your database. First, start\
    \ the Oracle instance (background processes and memory structures):\n\n```\nSQL>\
    \ startup nomount;\n```\n\nNext, mount the database. At this point, Oracle reads\
    \ the control files:\n\n```\nSQL> alter database mount;\n```\n\nFinally, open\
    \ the data files and online redo log files:\n\n```\nSQL> alter database open;\n\
    ```\n\nThis startup process is depicted graphically in [Figure 2-2](#9781430257288_Ch02.xhtml#Fig2).\n\
    \n![9781430257288_Fig02-02.jpg](Images/9781430257288_Fig02-02.jpg)\n\n[Figure\
    \ 2-2](#9781430257288_Ch02.xhtml#_Fig2). Phases of Oracle startup\n\nWhen you\
    \ issue a STARTUP statement without any parameters, Oracle automatically steps\
    \ through the three startup phases (nomount, mount, open). In most cases, you\
    \ will issue a STARTUP statement with no parameters to start your database. [Table\
    \ 2-3](#9781430257288_Ch02.xhtml#Tab3) describes the meanings of parameters that\
    \ you can use with the database STARTUP statement.\n\n[Table 2-3](#9781430257288_Ch02.xhtml#_Tab3).\
    \ Parameters Available with the startup Command\n\n| Parameter | Meaning |\n|\
    \ --- | --- |\n| FORCE | Shuts down the instance with ABORT before restarting\
    \ it; useful for troubleshooting startup issues; not normally used |\n| RESTRICT\
    \ | Only allows users with the RESTRICTED SESSION privilege to connect to the\
    \ database |\n| PFILE | Specifies the client parameter file to be used when starting\
    \ the instance |\n| QUIET | Suppresses the display of SGA information when starting\
    \ the instance |\n| NOMOUNT | Starts background processes and allocates memory;\
    \ doesn’t read control files |\n| MOUNT | Starts background processes, allocates\
    \ memory, and reads control files |\n| OPEN | Starts background processes, allocates\
    \ memory, reads control files, and opens online redo logs and data files |\n|\
    \ OPEN RECOVER | Attempts media recovery before opening the database |\n| OPEN\
    \ READ ONLY | Opens the database in read-only mode |\n| UPGRADE | Used when upgrading\
    \ a database |\n| DOWNGRADE | Used when downgrading a database |\n\nStopping the\
    \ Database\n\nNormally, you use the SHUTDOWN IMMEDIATE statement to stop a database.\
    \ The IMMEDIATE parameter instructs Oracle to halt database activity and roll\
    \ back any open transactions:\n\n```\nSQL> shutdown immediate;\nDatabase closed.\n\
    Database dismounted.\nORACLE instance shut down.\n```\n\n[Table 2-4](#9781430257288_Ch02.xhtml#Tab4)\
    \ provides a detailed definition of the parameters available with the SHUTDOWN\
    \ statement. In most cases, SHUTDOWN IMMEDIATE is an acceptable method of shutting\
    \ down your database. If you issue the SHUTDOWN command with no parameters, it’s\
    \ equivalent to issuing SHUTDOWN NORMAL.\n\n[Table 2-4](#9781430257288_Ch02.xhtml#_Tab4).\
    \ Parameters Available with the SHUTDOWN Command\n\n| Parameter | Meaning |\n\
    | --- | --- |\n| NORMAL | Wait for users to log out of active sessions before\
    \ shutting down. |\n| TRANSACTIONAL | Wait for transactions to finish, and then\
    \ terminate the session. |\n| TRANSACTIONAL LOCAL | Perform a transactional shutdown\
    \ for local instance only. |\n| IMMEDIATE | Terminate active sessions immediately.\
    \ Open transactions are rolled back. |\n| ABORT | Terminate the instance immediately.\
    \ Transactions are terminated and aren’t rolled back. |\n\nStarting and stopping\
    \ your database is a fairly simple process. If the environment is set up correctly,\
    \ you should be able to connect to your database and issue the appropriate STARTUP\
    \ and SHUTDOWN statements.\n\n![image](Images/sq.jpg) **Tip**   If you experience\
    \ any issues with starting or stopping your database, look in the alert log for\
    \ details. The alert log usually has a pertinent message regarding any problems.\n\
    \nYou should rarely need to use the SHUTDOWN ABORT statement. Usually, SHUTDOWN\
    \ IMMEDIATE is sufficient. Having said that, there is nothing wrong with using\
    \ SHUTDOWN ABORT. If SHUTDOWN IMMEDIATE isn’t working for any reason, then use\
    \ SHUTDOWN ABORT.\n\nOn a few, rare occasions the SHUTDOWN ABORT will fail to\
    \ work. In those situations, you can use ps -ef | grep smon to locate the Oracle\
    \ system-monitor process and then use the Linux/Unix kill command to terminate\
    \ the instance. When you kill a required Oracle background process, this causes\
    \ the instance to abort. Obviously, you should use an OS kill command only as\
    \ a last resort.\n\nDATABASE VS. INSTANCE\n\nAlthough DBAs often use the terms\
    \ *database* and *instance* synonymously, these two terms refer to very different\
    \ architectural components. In Oracle the term *database* denotes the physical\
    \ files that make up a database: the data files, online redo log files, and control\
    \ files. The term *instance* denotes the background processes and memory structures.\n\
    \nFor instance, you can create an instance without having a database present.\
    \ Before a database is physically created, you must start the instance with the\
    \ STARTUP NOMOUNT statement. In this state you have background processes and memory\
    \ structures without any associated data files, online redo logs, or control files.\
    \ The database files aren’t created until you issue the CREATE DATABASE statement.\n\
    \nAnother important point to remember is that an instance can only be associated\
    \ with one database, whereas a database can be associated with many different\
    \ instances (as with Oracle Real Application Clusters [RAC]). An instance can\
    \ mount and open a database one time only. Each time you stop and start a database,\
    \ a new instance is associated with it. Previously created background processes\
    \ and memory structures are never associated with a database.\n\nTo demonstrate\
    \ this concept, close a database with the ALTER DATABASE CLOSE statement:\n\n\
    ```\nSQL> alter database close;\n```\n\nIf you attempt to restart the database,\
    \ you receive an error:\n\n```\nSQL> alter database open;\nERROR at line 1:\n\
    ORA-16196: database has been previously opened and closed\n```\n\nThis is because\
    \ an instance can only ever mount and open one database. You must stop and start\
    \ a new instance before you can mount and open the database.\n\nUsing the dbca\
    \ to Create a Database\n\nYou can also use the dbca utility to create a database.\
    \ This utility works in two modes: graphical and silent. To use the dbca in graphical\
    \ mode, ensure you have the proper X software installed, then issue the xhost\
    \ + command, and make certain your DISPLAY variable is set; for example,\n\n```\n\
    $ xhost +\n$ echo $DISPLAY\n:0.0\n```\n\nTo run the dbca in graphical mode, type\
    \ in dbca from the OS command line:\n\n```\n$ dbca\n```\n\nThe graphical mode\
    \ is very intuitive and will walk you through all aspects of creating a database.\
    \ You may prefer to use this mode if you are new to Oracle and want to be explicitly\
    \ prompted with choices.\n\nYou can also run the dbca in silent mode with a response\
    \ file. In some situations, using dbca in graphical mode isn’t feasible. This\
    \ may be due to slow networks or the unavailability of X software. To create a\
    \ database, using dbca in silent mode, perform the following steps:\n\n1.  Locate\
    \ the dbca.rsp file.\n2.  Make a copy of the dbca.rsp file.\n3.  Modify the copy\
    \ of the dbca.rsp file for your environment.\n4.  Run the dbca utility in silent\
    \ mode.\n\nFirst, navigate to the location in which you copied the Oracle database\
    \ installation software, and use the find command to locate dbca.rsp:\n\n```\n\
    $ find . -name dbca.rsp\n./12.1.0.1/database/response/dbca.rsp\n```\n\nCopy the\
    \ file so that you’re not modifying the original (in this way, you’ll always have\
    \ a good, original file):\n\n```\n$ cp dbca.rsp mydb.rsp\n```\n\nNow, edit the\
    \ mydb.rsp file. Minimally, you need to modify the following parameters: GDBNAME,\
    \ SID, SYSPASSWORD, SYSTEMPASSWORD, SYSMANPASSWORD, DBSNMPPASSWORD, DATAFILEDESTINATION,\
    \ STORAGETYPE, CHARACTERSET, and NATIONALCHARACTERSET. Following is an example\
    \ of modified values in the mydb.rsp file:\n\n```\n[CREATEDATABASE]\nGDBNAME =\
    \ \"O12DEV\"\nSID = \"O12DEV\"\nTEMPLATENAME = \"General_Purpose.dbc\"\nSYSPASSWORD\
    \ = \"foo\"\nSYSTEMPASSWORD = \"foo\"\nSYSMANPASSWORD = \"foo\"\nDBSNMPPASSWORD\
    \ = \"foo\"\nDATAFILEDESTINATION =\"/u01/dbfile\"\nSTORAGETYPE=\"FS\"\nCHARACTERSET\
    \ = \"AL32UTF8\"\nNATIONALCHARACTERSET= \"UTF8\"\n```\n\nNext, run the dbca utility\
    \ in silent mode, using a response file:\n\n```\n$ dbca -silent -responseFile\
    \ /home/oracle/orainst/mydb.rsp\n```\n\nYou should see output such as\n\n```\n\
    Copying database files\n1% complete\n.  .  .\nCreating and starting Oracle instance\n\
    .  .  .\n62% complete\nCompleting Database Creation\n.  .  .\n100% complete\n\
    Look at the log file .  .  . for further details.\n```\n\nIf you look in the log\
    \ files, note that the dbca utility uses the rman utility to restore the data\
    \ files used for the database. Then, it creates the instance and performs postinstallation\
    \ steps. On a Linux server you should also have an entry in the /etc/oratab file\
    \ for your new database.\n\nMany DBAs launch dbca and configure databases in the\
    \ graphical mode, but a few exploit the options available to them using the response\
    \ file. With effective utilization of the response file, you can consistently\
    \ automate the database creation process. You can modify the response file to\
    \ build databases on ASM and even create RAC databases. In addition, you can control\
    \ just about every aspect of the response file, similar to launching the dbca\
    \ in graphical mode.\n\n![image](Images/sq.jpg) **Tip**   You can view all options\
    \ of the dbca via the help parameter: dbca -help\n\nUSING DBCA TO GENERATE A CREATE\
    \ DATABASE STATEMENT\n\nYou can use the dbca utility to generate a CREATE DATABASE\
    \ statement. You can perform this either interactively with the graphical interface\
    \ or via silent mode. The key is to choose the “custom database template” and\
    \ also specify the option to “generate database creation scripts.” This example\
    \ uses the silent mode to generate a script that contains a CREATE DATABASE statement:\n\
    \n```\n$ dbca -silent -generateScripts -customCreate -templateName New_Database.dbt\
    \ \\\n  -gdbName DKDEV\n```\n\nThe prior line of code instructs the dbca to create\
    \ a script named CreateDB.sql and place it in the ORACLE_BASE/admin/DKDEV/scripts\
    \ directory. The CreateDB.sql file contains a CREATE DATABASE statement within\
    \ it. Also created is an init.ora file for initializing your instance.\n\nIn this\
    \ example the scripts required to create a database are generated for you. No\
    \ database is created until you manually run the scripts.\n\nThis technique gives\
    \ you an automated method for generating a CREATE DATABASE statement. This is\
    \ especially useful if you are new to Oracle and are unsure of how to construct\
    \ a CREATE DATABASE statement or if you are using a new version of the database\
    \ and want a valid CREATE DATABASE statement generated by an Oracle utility.\n\
    \nDropping a Database\n\nIf you have an unused database that you need to drop,\
    \ you can use the DROP DATABASE statement to accomplish this. Doing so removes\
    \ all data files, control files, and online redo logs associated with the database.\n\
    \nNeedless to say, use extreme caution when dropping a database. Before you drop\
    \ a database, ensure that you’re on the correct server and are connected to the\
    \ correct database. On a Linux/Unix system, issue the following OS command from\
    \ the OS prompt:\n\n```\n$ uname -a\n```\n\nNext, connect to SQL*Plus, and be\
    \ sure you’re connected to the database you want to drop:\n\n```\nSQL> select\
    \ name from v$database;\n```\n\nAfter you’ve verified that you’re in the correct\
    \ database environment, issue the following SQL commands from a SYSDBA-privileged\
    \ account:\n\n```\nSQ> shutdown immediate;\nSQL> startup mount exclusive restrict;\n\
    SQL> drop database;\n```\n\n![image](Images/sq.jpg) **Caution**   Obviously, you\
    \ should be careful when dropping a database. You aren’t prompted when dropping\
    \ the database and, as of this writing, there is no UNDROP ACCIDENTALLY DROPPED\
    \ DATABASE command. Use extreme caution when dropping a database, because this\
    \ operation removes data files, control files, and online redo log files.\n\n\
    The DROP DATABASE command is useful when you have a database that needs to be\
    \ removed. It may be a test database or an old database that is no longer used.\
    \ The DROP DATABASE command doesn’t remove old archive redo log files. You must\
    \ manually remove those files with an OS command (such as rm, in Linux/Unix, or\
    \ del, at the Windows command prompt). You can also instruct RMAN to remove archive\
    \ redo log files.\n\nHow Many Databases on One Server?\n\nSometimes, when you’re\
    \ creating new databases, this question arises: How many databases should you\
    \ put on one server? One extreme is to have only one database running on each\
    \ database server. This architecture is illustrated in [Figure 2-3](#9781430257288_Ch02.xhtml#Fig3),\
    \ which shows two different database servers, each with its own installation of\
    \ the Oracle binaries. This type of setup is profitable for the hardware vendor\
    \ but in many environments isn’t an economical use of resources.\n\n![9781430257288_Fig02-03.jpg](Images/9781430257288_Fig02-03.jpg)\n\
    \n[Figure 2-3](#9781430257288_Ch02.xhtml#_Fig3). Architecture with one server\
    \ per database\n\nIf you have enough memory, central processing unit (CPU), and\
    \ disk resources, then you should consider creating multiple databases on one\
    \ server. You can create a new installation of the Oracle binaries for each database\
    \ or have multiple databases share one set of Oracle binaries. [Figure 2-4](#9781430257288_Ch02.xhtml#Fig4)\
    \ shows a configuration using one set of Oracle binaries that’s shared by multiple\
    \ databases on one server. Of course, if you have requirements for different versions\
    \ of the Oracle binaries, you must have multiple Oracle homes to house those installations.\n\
    \n![9781430257288_Fig02-04.jpg](Images/9781430257288_Fig02-04.jpg)\n\n[Figure\
    \ 2-4](#9781430257288_Ch02.xhtml#_Fig4). Multiple databases sharing one set of\
    \ Oracle binaries on a server\n\nIf you don’t have the CPU, memory, or disk resources\
    \ to create multiple databases on one server, consider using one database to host\
    \ multiple applications and users, as shown in [Figure 2-5](#9781430257288_Ch02.xhtml#Fig5).\
    \ In environments such as this, be careful not to use public synonyms, because\
    \ there may be collisions between applications. It’s typical to create different\
    \ schemas and tablespaces to be used by different applications in such environments.\n\
    \n![9781430257288_Fig02-05.jpg](Images/9781430257288_Fig02-05.jpg)\n\n[Figure\
    \ 2-5](#9781430257288_Ch02.xhtml#_Fig5). One database used by multiple applications\
    \ and users\n\nWith Oracle Database 12c you have the option of using the pluggable\
    \ database feature. This technology allows you to house several pluggable databases\
    \ within one container database. The pluggable databases share the instance, background\
    \ processes, undo, and Oracle binaries but function as completely separate databases.\
    \ Each pluggable database has its own set of tablespaces (including SYSTEM) that\
    \ are not visible to any other pluggable databases within the container database.\
    \ This allows you to securely implement an isolated database that shares resources\
    \ with other databases. Figure [**2-6**](#9781430257288_Ch02.xhtml#Fig6) depicts\
    \ this architecture (see [Chapter 23](#9781430257288_Ch23.xhtml) for details on\
    \ how to implement a pluggable database).\n\n![9781430257288_Fig02-06.jpg](Images/9781430257288_Fig02-06.jpg)\n\
    \n[Figure 2-6](#9781430257288_Ch02.xhtml#_Fig6). One container database with multiple\
    \ pluggable databases\n\nYou must consider several architectural aspects when\
    \ determining whether to use one database to host multiple applications and users:\n\
    \n*   Do the applications generate vastly different amounts of redo, which may\
    \ necessitate differently sized online redo logs?\n*   Are the queries used by\
    \ applications dissimilar enough to require different amounts of undo, sorting\
    \ space, and memory?\n*   Does the type of application require a different database\
    \ block size, such as 8KB, for an OLTP database, or 32KB, for a data warehouse?\n\
    *   Are there any security, availability, replication, or performance requirements\
    \ that require an application to be isolated?\n*   Does an application require\
    \ any features available only in the Enterprise Edition of Oracle?\n*   Does an\
    \ application require the use of any special Oracle features, such as Data Guard,\
    \ partitioning, Streams, or RAC?\n*   What are the backup and recovery requirements\
    \ for each application? Does one application require online backups and the other\
    \ application not? Does one application require tape backups?\n*   Is any application\
    \ dependent on an Oracle database version? Will there be different database upgrade\
    \ schedules and requirements?\n\n[Table 2-5](#9781430257288_Ch02.xhtml#Tab5) describes\
    \ the advantages and disadvantages of these architectural considerations regarding\
    \ how to use Oracle databases and applications.\n\n[Table 2-5](#9781430257288_Ch02.xhtml#_Tab5).\
    \ Oracle Database Configuration Advantages and Disadvantages\n\n| Configuration\
    \ | Advantages | Disadvantages |\n| --- | --- | --- |\n| One database per server\
    \ | Dedicated resources for the application using the database; completely isolates\
    \ applications from each other; | Most expensive; requires more hardware |\n|\
    \ Multiple databases and Oracle homes per server | requires fewer servers | Multiple\
    \ databases competing for disk, memory, and CPU resources |\n| Multiple databases\
    \ and one installation of Oracle binaries on the server | Requires fewer servers;\
    \ doesn’t require multiple installations of the Oracle binaries | Multiple databases\
    \ competing for disk, memory, and CPU resources |\n| One database and one Oracle\
    \ home serving multiple applications | Only requires one server and one database;\
    \ inexpensive | Multiple databases competing for disk, memory, and CPU resources;\
    \ multiple applications dependent on one database; one single point of failure\
    \ |\n| Container database containing multiple pluggable databases | Least expensive;\
    \ allows multiple pluggable databases to use the infrastructure of one parent\
    \ container database securely | Multiple databases competing for disk, memory,\
    \ and CPU resources; multiple applications dependent on one database; one single\
    \ point of failure |\n\nUnderstanding Oracle Architecture\n\nThis chapter introduced\
    \ concepts such as database (data files, online redo log files, control files),\
    \ instance (background processes and memory structures), parameter file, password\
    \ file, and listener. Now is a good time to present an Oracle architecture diagram\
    \ that shows the various files and processes that constitute a database and instance.\
    \ Some of the concepts depicted in [Figure 2-7](#9781430257288_Ch02.xhtml#Fig7)\
    \ have already been covered in detail, for example, database vs. instance. Other\
    \ aspects of Figure [**2-7**](#9781430257288_Ch02.xhtml#Fig7) will be covered\
    \ in future chapters. However, it’s appropriate to include a high-level diagram\
    \ such as this in order to represent visually the concepts already discussed and\
    \ to lay the foundation for understanding upcoming topics in this book.\n\n![9781430257288_Fig02-07.jpg](Images/9781430257288_Fig02-07.jpg)\n\
    \n[Figure 2-7](#9781430257288_Ch02.xhtml#_Fig7). Oracle database architecture\n\
    \nThere are several aspects to note about [Figure 2-7](#9781430257288_Ch02.xhtml#Fig7).\
    \ Communication with the database is initiated through a sqlplus user process.\
    \ Typically, the user process connects to the database over the network. This\
    \ requires that you configure and start a listener process. The listener process\
    \ hands off incoming connection requests to an Oracle server process, which handles\
    \ all subsequent communication with the client process. If a remote connection\
    \ is initiated as a sys*-level user, then a password file is required. A password\
    \ file is also required for local sys* connections that don’t use OS authentication.\n\
    \nThe instance consists of memory structures and background processes. When the\
    \ instance starts, it reads the parameter file, which helps establish the size\
    \ of the memory processes and other characteristics of the instance. When starting\
    \ a database, the instance goes through three phases: nomount (instance started),\
    \ mount (control files opened), and open (data files and online redo logs opened).\n\
    \nThe number of background processes varies by database version (more than 300\
    \ in the latest version of Oracle). You can view the names and descriptions of\
    \ the processes via this query:\n\n```\nSQL> select name, description from v$bgprocess;\n\
    ```\n\nThe major background processes include\n\n*   DBWn: The database writer\
    \ writes blocks from the database buffer cache to the data files.\n*   CKPT: The\
    \ checkpoint process writes checkpoint information to the control files and data\
    \ file headers.\n*   LGWR: The log writer writes redo information from the log\
    \ buffer to the online redo logs.\n*   ARCn: The archiver copies the content of\
    \ online redo logs to archive redo log files.\n*   RVWR: The recovery writer maintains\
    \ before images of blocks in the fast recovery area.\n*   MMON: The manageability\
    \ monitor process gathers automatic workload repository statistics.\n*   MMNL:\
    \ The manageability monitor lite process writes statistics from the active session\
    \ history buffer to disk.\n*   SMON: The system monitor performs system level\
    \ clean-up operations, including instance recovery in the event of a failed instance,\
    \ coalescing free space, and cleaning up temporary space.\n*   PMON: The process\
    \ monitor cleans up abnormally terminated database connections and also automatically\
    \ registers a database instance with the listener process.\n*   RECO: The recoverer\
    \ process automatically resolves failed distributed transactions.\n\nThe structure\
    \ of the SGA varies by Oracle release. You can view details for each component\
    \ via this query:\n\n```\nSQL> select pool, name from v$sgastat;\n```\n\nThe major\
    \ SGA memory structures include\n\n*   SGA: The SGA is the main read/write memory\
    \ area and is composed of several buffers, such as the database buffer cache,\
    \ redo log buffer, shared pool, large pool, java pool, and streams pool.\n*  \
    \ Database buffer cache: The buffer cache stores copies of blocks read from data\
    \ files.\n*   Log buffer: The log buffer stores changes to modified data blocks.\n\
    *   Shared pool: The shared pool contains library cache information regarding\
    \ recently executed SQL and PL/SQL code. The shared pool also houses the data\
    \ dictionary cache, which contains structural information about the database,\
    \ objects, and users.\n\nFinally, the program global area (PGA) is a memory area\
    \ separate from the SGA. The PGA is a process-specific memory area that contains\
    \ session-variable information.\n\nSummary\n\nAfter you’ve installed the Oracle\
    \ binaries, you can create a database. Before creating a database, make sure you’ve\
    \ correctly set the required OS variables. You also need an initialization file\
    \ and to pre-create any necessary directories. You should carefully think about\
    \ which initialization parameters should be set to a nondefault value. In general,\
    \ I try to use as many default values as possible and only change an initialization\
    \ parameter when there is a good reason.\n\nThis chapter focused on using SQL*Plus\
    \ to create databases. This is an efficient and repeatable method for creating\
    \ a database. When you’re crafting a CREATE DATABASE statement, consider the size\
    \ of the data files and online redo logs. You should also put some thought into\
    \ how many groups of online redo logs you require and how many members per group.\n\
    \nI’ve worked in some environments in which management dictated the requirement\
    \ of one database per server. Usually that is overkill. A fast server with large\
    \ memory areas and many CPUs should be capable of hosting several different databases.\
    \ You have to determine what architecture meets your business requirements when\
    \ deciding how many databases to place on one box.\n\nAfter you’ve created a database,\
    \ the next step is to configure the environment so that you can efficiently navigate,\
    \ operate, and monitor the database. These tasks are described in the next chapter.\n\
    \nCHAPTER 3\n\n![image](Images/frontdot.jpg)\n\nConfiguring an Efficient Environment\n\
    \nAfter you install the Oracle binaries and create a database, you should configure\
    \ your environment to enable you to operate efficiently. Regardless of the functionality\
    \ of graphical database administration tools, DBAs still need to perform many\
    \ tasks from the OS command line and manually execute SQL statements. A DBA who\
    \ takes advantage of the OS and SQL has a clear advantage over a DBA who doesn’t.\n\
    \nIn any database environment (Oracle, MySQL, and so on) an effective DBA uses\
    \ advanced OS features to allow you to quickly navigate the directory, locate\
    \ files, repeat commands, display system bottlenecks, and so forth. To achieve\
    \ this efficiency, you must be knowledgeable about the OS that houses the database.\n\
    \nIn addition to being proficient with the OS, you must also be skillful with\
    \ the SQL interface into the database. Although you can glean much diagnostic\
    \ information from graphical interfaces, SQL enables you to take a deeper dive\
    \ into the internals to do advanced troubleshooting and derive database intelligence.\n\
    \nThis chapter lays the foundation for efficient use of the OS and SQL to manage\
    \ your databases. You can use the following OS and database features to configure\
    \ your environment for effectiveness:\n\n*   OS variables\n*   Shell aliases\n\
    *   Shell functions\n*   Shell scripts\n*   SQL scripts\n\nWhen you’re in a stressful\
    \ situation, it’s paramount to have an environment in which you can quickly discern\
    \ where you are and what accounts you’re using and to have tools that help you\
    \ quickly identify problems. The techniques described in this chapter are like\
    \ levers: they provide leverage for doing large amounts of work fast. These tools\
    \ let you focus on the issues you may be facing instead of verifying your location\
    \ or worrying about command syntax.\n\nThis chapter begins by detailing OS techniques\
    \ for enabling maximum efficiency. Later sections show how you can use these tools\
    \ to display environment details automatically, navigate the file system, monitor\
    \ the database proactively, and triage.\n\n![image](Images/sq.jpg) **Tip**   Consistently\
    \ use one OS shell when working on your database servers. I recommend that you\
    \ use the Bash shell; it contains all the most useful features from the other\
    \ shells (Korn and C), plus it has additional features that add to its ease of\
    \ use.\n\nCustomizing Your OS Command Prompt\n\nTypically, DBAs work with multiple\
    \ servers and multiple databases. In these situations, you may have numerous terminals’\
    \ sessions open on your screen. You can run the following types of commands to\
    \ identify your current working environment:\n\n```\n$ hostname -a\n$ id\n$ who\
    \ am i\n$ echo $ORACLE_SID\n$ pwd\n```\n\nTo avoid confusion about which server\
    \ you’re working on, it’s often desirable to configure your command prompt to\
    \ display information regarding its environment, such as the machine name and\
    \ database SID. In this example the command prompt name is customized to include\
    \ the hostname, user, and Oracle SID:\n\n```\n$ PS1='[\\h:\\u:${ORACLE_SID}]$\
    \ '\n```\n\nThe \\h specifies the hostname. The \\u specifies the current OS user.\
    \ $ORACLE_SID contains the current setting for your Oracle instance identifier.\
    \ Here is the command prompt for this example:\n\n```\n[oracle12c:oracle:o12c]$\n\
    ```\n\nThe command prompt contains three pieces of important information about\
    \ the environment: server name, OS username, and database name. When you’re navigating\
    \ among multiple environments, setting the command prompt can be an invaluable\
    \ tool for keeping track of where you are and what environment you’re in.\n\n\
    If you want the OS prompt automatically configured when you log in, then you need\
    \ to set it in a startup file. In a Bash shell environment, you typically use\
    \ the .bashrc file. This file is normally located in your HOME directory. Place\
    \ the following line of code in .bashrc:\n\n```\nPS1='[\\h:\\u:${ORACLE_SID}]$\
    \ '\n```\n\nWhen you place this line of code in the startup file, then any time\
    \ you log in to the server, your OS prompt is set automatically for you. In other\
    \ shells, such as the Korn shell, the .profile file is the startup file.\n\nDepending\
    \ on your personal preference, you may want to modify the command prompt for your\
    \ particular needs. For example, many DBAs like the current working directory\
    \ displayed in the command prompt. To display the current working directory information,\
    \ add the \\w variable:\n\n```\n$ PS1='[\\h:\\u:\\w:${ORACLE_SID}]$ '\n```\n\n\
    As you can imagine, a wide variety of options are available for the information\
    \ shown in the command prompt. Here is another popular format:\n\n```\n$ PS1='[\\\
    u@${ORACLE_SID}@\\h:\\W]$ '\n```\n\n[Table 3-1](#9781430257288_Ch03.xhtml#Tab1)\
    \ lists many of the Bash shell variables you can use to customize the OS command\
    \ prompt.\n\n[Table 3-1.](#9781430257288_Ch03.xhtml#_Tab1) Bash Shell Backslash-Escaped\
    \ Variables Used for Customizing the Command Prompt\n\n| Variable | Description\
    \ |\n| --- | --- |\n| \\a | ASCII bell character |\n| \\d | Date in “weekday month\
    \ day-of-month” format |\n| \\h | Hostname |\n| \\e | ASCII escape character |\n\
    | \\j | Number of jobs managed by the shell |\n| \\l | Base name of the shell’s\
    \ terminal device |\n| \\n | Newline |\n| \\r | Carriage return |\n| \\s | Name\
    \ of the shell |\n| \\t | Time in 24-hour HH:MM:SS format |\n| \\T | Time in 12-hour\
    \ HH:MM:SS format |\n| \\@ | Time in 12-hour am / pm format |\n| \\A | Time in\
    \ 24-hour HH:MM format |\n| \\u | Current shell |\n| \\v | Version of the Bash\
    \ shell |\n| \\V | Release of the Bash shell |\n| \\w | Current working directory\
    \ |\n| \\W | Base name of the current working directory (not the full path) |\n\
    | \\! | History number of command |\n| \\$ | If the effective user identifier\
    \ (UID) is 0, then displays #; otherwise, displays $ |\n\nThe variables available\
    \ for use with your command prompt vary somewhat by OS and shell. For example,\
    \ in a Korn shell environment the hostname variable displays the server name in\
    \ the OS prompt:\n\n```\n$ export PS1=\"['hostname']$ \"\n```\n\nIf you want to\
    \ include the ORACLE_SID variable within that string, then set it as follows:\n\
    \n```\n$ export PS1=['hostname'':\"${ORACLE_SID}\"]$ '\n```\n\nTry not to go overboard\
    \ in terms of how much information you display in the OS prompt. Too much information\
    \ limits your ability to type in and view commands on one line. As a rule of thumb,\
    \ minimally you should include the server name and database name displayed in\
    \ the OS prompt. Having that information readily available will save you from\
    \ making the mistake of thinking that you’re in one environment when you’re really\
    \ in another.\n\nCustomizing Your SQL Prompt\n\nDBAs frequently use SQL*Plus to\
    \ perform daily administrative tasks. Often, you’ll work on servers that contain\
    \ multiple databases. Obviously, each database contains multiple user accounts.\
    \ When connected to a database, you can run the following commands to verify information\
    \ such as your username, database connection, and hostname:\n\n```\nSQL> show\
    \ user;\nSQL> select name from v$database;\n```\n\nA more efficient way to determine\
    \ your username and SID is to set your SQL prompt to display that information;\
    \ for example,\n\n```\nSQL> SET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.> '\n\
    ```\n\nAn even more efficient way to configure your SQL prompt is to have it automatically\
    \ run the SET SQLPROMPT command when you log in to SQL*Plus. Follow these steps\
    \ to fully automate this:\n\n1.  Create a file named login.sql, and place in it\
    \ the SET SQLPROMPT command.\n2.  Set your SQLPATH OS variable to include the\
    \ directory location of login.sql. In this example the SQLPATH OS variable is\
    \ set in the .bashrc OS file, which is executed each time a new shell is logged\
    \ in to or started. Here is the entry:\n\n    ```\n    export SQLPATH=$HOME/scripts\n\
    \    ```\n\n3.  Create a file named login.sql in the HOME/scripts directory. Place\
    \ the following line in the file:\n\n    ```\n    SET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.>\
    \ '\n    ```\n\n4.  To see the result, you can either log out and log back in\
    \ to your server or source the .bashrc file directly:\n\n    ```\n    $ . ./.bashrc\n\
    \    ```\n\nNow, log in to SQL. Here is an example of the SQL*Plus prompt:\n\n\
    ```\nSYS@devdb1>\n```\n\nIf you connect to a different user, this should be reflected\
    \ in the prompt:\n\n```\nSQL> conn system/foo\n```\n\nThe SQL*Plus prompt now\
    \ displays\n\n```\nSYSTEM@devdb1>\n```\n\nSetting your SQL prompt is an easy way\
    \ to remind yourself which environment and user you’re currently connected as.\
    \ This will help prevent you from accidentally running an SQL statement in the\
    \ wrong environment. The last thing you want is to think you’re in a development\
    \ environment and then discover that you’ve run a script to delete objects while\
    \ connected in a production environment.\n\n[Table 3-2](#9781430257288_Ch03.xhtml#Tab2)\
    \ contains a complete list of SQL*Plus variables that you can use to customize\
    \ your prompt.\n\n[Table 3-2.](#9781430257288_Ch03.xhtml#_Tab2) Predefined SQL*Plus\
    \ Variables\n\n| Variable | Description |\n| --- | --- |\n| _CONNECT_IDENTIFIER\
    \ | Connection identifier, such as the Oracle SID |\n| _DATE | Current date |\n\
    | _EDITOR | Editor used by the SQL EDIT command |\n| _O_VERSION | Oracle version\
    \ |\n| _O_RELEASE | Oracle release |\n| _PRIVILEGE | Privilege level of the current\
    \ connected session |\n| _SQLPLUS_RELEASE | SQL*Plus release number |\n| _USER\
    \ | Current connected user |\n\nCreating Shortcuts for Frequently Used Commands\n\
    \nIn Linux/Unix environments, you can use two common methods to create shortcuts\
    \ to other commands: create aliases for often repeated commands and use functions\
    \ to form shortcuts for groups of commands. The following sections describe ways\
    \ in which you can deploy these two techniques.\n\nUsing Aliases\n\nAn alias is\
    \ a simple mechanism for creating a short piece of text that will execute other\
    \ shell commands. Here is the general syntax:\n\n```\n$ alias <alias_name>='<shell\
    \ command>'\n```\n\nFor instance, when faced with database problems, it’s often\
    \ useful to create an alias that runs a cd command that places you in the directory\
    \ containing the database alert log. This example creates an alias (named bdump)\
    \ that changes the current working directory to where the alert log is located:\n\
    \n```\n$ alias bdump='cd /u01/app/oracle/diag/rdbms/o12c/o12c/trace'\n```\n\n\
    Now, instead of having to type the cd command, along with a lengthy (and easily\
    \ forgettable) directory path, you can simply type in bdump and are placed in\
    \ the specified directory:\n\n```\n$ bdump\n$ pwd\n/u01/app/oracle/diag/rdbms/o12c/o12c/trace\n\
    ```\n\nThe prior technique allows you to navigate to the directory of interest\
    \ efficiently and accurately. This is especially handy when you manage many different\
    \ databases on different servers. You simply have to set up a standard set of\
    \ aliases that allow you to navigate and work more efficiently.\n\nTo show all\
    \ aliases that have been defined, use the alias command, with no arguments:\n\n\
    ```\n$ alias\n```\n\nListed next are some common examples of alias definitions\
    \ you can use:\n\n```\nalias l.='ls -d .*'\nalias ll='ls -l'\nalias lsd='ls -altr\
    \ | grep ^d'\nalias sqlp='sqlplus \"/ as sysdba\"'\nalias shutdb='echo \"shutdown\
    \ immediate;\" | sqlp'\nalias startdb='echo \"startup;\" | sqlp'\n```\n\nIf you\
    \ want to remove an alias definition from your current environment, use the unalias\
    \ command. The following example removes the alias for lsd:\n\n```\n$ unalias\
    \ lsd\n```\n\nLOCATING THE ALERT LOG\n\nIn Oracle Database 11g and higher, the\
    \ alert log directory path has this structure:\n\n```\nORACLE_BASE/diag/rdbms/LOWER(<db_unique_name>)/<instance_name>/trace\n\
    ```\n\nUsually (but not always) the db_unique_name is the same as the instance_name.\
    \ In Data Guard environments the db_unique_name will often not be the same as\
    \ the instance_name. You can verify the directory path with this query:\n\n```\n\
    SQL> select value from v$diag_info where name = 'Diag Trace';\n```\n\nThe name\
    \ of the alert log follows this format:\n\n```\nalert_<ORACLE_SID>.log\n```\n\n\
    You can also locate the alert log from the OS (whether the database is started\
    \ or not) via these OS commands:\n\n```\n$ cd $ORACLE_BASE\n$ find . -name alert_<ORACLE_SID>.log\n\
    ```\n\nIn the prior find command you’ll need to replace the <ORACLE_SID> value\
    \ with the name of your database.\n\nUsing a Function\n\nMuch like an alias, you\
    \ can also use a function to form command shortcuts. A function is defined with\
    \ this general syntax:\n\n```\n$ function <function_name> {\n  shell commands\n\
    }\n```\n\nFor example, the following line of code creates a simple function (named\
    \ bdump) that allows you to change the current working directory, dependent on\
    \ the name of the database passed in:\n\n```\nfunction bdump {\nif [ \"$1\" =\
    \ \"engdev\" ]; then\n  cd /orahome/app/oracle/diag/rdbms/engdev/ENGDEV/trace\n\
    elif [ \"$1\" = \"stage\" ]; then\n  cd /orahome/app/oracle/diag/rdbms/stage/STAGE/trace\n\
    fi\necho \"Changing directories to $1 Diag Trace directory\"\npwd\n}\n```\n\n\
    You can now type bdump, followed by a database name at the command line, to change\
    \ your working directory to the Oracle background dump directory:\n\n```\n$ bdump\
    \ stage\nChanging directories to stage Diag Trace directory\n/orahome/app/oracle/diag/rdbms/stage/STAGE/trace\n\
    ```\n\nUsing functions is usually preferable to using aliases. Functions are more\
    \ powerful than aliases because of features such as the ability to operate on\
    \ parameters passed in on the command line and allowing for multiple lines of\
    \ code and therefore more complex coding.\n\nDBAs commonly establish functions\
    \ by setting them in the HOME/.bashrc file. A better way to manage functions is\
    \ to create a file that stores only function code and call that file from the\
    \ .bashrc file. It’s also better to store special purpose files in directories\
    \ that you’ve created for these files. For instance, create a directory named\
    \ bin under HOME. Then, in the bin directory, create a file named dba_fcns, and\
    \ place in it your function code. Now, call the dba_fcns file from the .bashrc\
    \ file. Here is an example of an entry in a .bashrc file:\n\n```\n. $HOME/bin/dba_fcns\n\
    ```\n\nListed next is a small sample of some of the types of functions you can\
    \ use:\n\n```\n# show environment variables in sorted list\n  function envs {\n\
        if test -z \"$1\"\n      then /bin/env | /bin/sort\n      else /bin/env |\
    \ /bin/sort | /bin/grep -i $1\n    fi\n  } # envs\n#-----------------------------------------------------------#\n\
    # find largest files below this point\nfunction flf {\n  find . -ls | sort -nrk7\
    \ | head −10\n}\n#-----------------------------------------------------------#\n\
    # find largest directories consuming space below this point\nfunction fld {\n\
      du -S . | sort -nr | head −10\n}\n#-----------------------------------------------------------#\n\
    function bdump {\n  if [ $ORACLE_SID = \"o12c\" ]; then\n    cd /u01/app/oracle/diag/rdbms/o12c/o12c/trace\n\
      elif [ $ORACLE_SID = \"CDB1\" ]; then\n    cd /u01/app/oracle/diag/rdbms/cdb1/CDB1/trace\n\
      elif [ $ORACLE_SID = \"rcat\" ]; then\n    cd /u01/app/oracle/diag/rdbms/rcat/rcat/trace\n\
      fi\n  pwd\n} # bdump\n```\n\nIf you ever wonder whether a shortcut is an alias\
    \ or a function, use the type command to verify a command’s origin. This example\
    \ verifies that bdump is a function:\n\n```\n$ type bdump\n```\n\nRerunning Commands\
    \ Quickly\n\nWhen there are problems with a database server, you need to be able\
    \ to quickly run commands from the OS prompt. You may be having some sort of performance\
    \ issue and want to run commands that navigate you to directories that contain\
    \ log files, or you may want to display the top consuming processes from time\
    \ to time. In these situations, you don’t want to waste time having to retype\
    \ command sequences.\n\nOne time-saving feature of the Bash shell is that it has\
    \ several methods for editing and rerunning previously executed commands. The\
    \ following list highlights several options available for manipulating previously\
    \ typed commands:\n\n*   Scrolling with the up and down arrow keys\n*   Using\
    \ Ctrl+P and Ctrl+N\n*   Listing the command history\n*   Searching in reverse\n\
    *   Setting the command editor\n\nEach of these techniques is described briefly\
    \ in the following sections.\n\nScrolling with the Up and Down Arrow Keys\n\n\
    You can use the up arrow to scroll up through your recent command history. As\
    \ you scroll through previously run commands, you can rerun a desired command\
    \ by pressing the Enter or Return key.\n\nIf you want to edit a command, use the\
    \ Backspace key to erase characters, or use the left arrow to navigate to the\
    \ desired location in the command text. After you’ve scrolled up through command\
    \ stack, use the down arrow to scroll back down through previously viewed commands.\n\
    \n![image](Images/sq.jpg) **Note**   If you’re familiar with Windows, scrolling\
    \ through the command stack is similar to using the DOSKEY utility.\n\nUsing Ctrl+P\
    \ and Ctrl+N\n\nThe Ctrl+P keystroke (pressing the Ctrl and P keys at the same\
    \ time) displays your previously entered command. If you’ve pressed Ctrl+P several\
    \ times, you can scroll back down the command stack by pressing Ctrl+N (pressing\
    \ the Ctrl and N keys at the same time).\n\nListing the Command History\n\nYou\
    \ can use the history command to display commands that the user previously entered:\n\
    \n```\n$ history\n```\n\nDepending on how many commands have previously been executed,\
    \ you may see a lengthy stack. You can limit the output to the last n number of\
    \ commands by providing a number with the command. For example, the following\
    \ query lists the last five commands that were run:\n\n```\n$ history 5\n```\n\
    \nHere is some sample output:\n\n```\n273  cd -\n274  grep -i ora alert.log\n\
    275  ssh -Y -l oracle 65.217.177.98\n276  pwd\n277  history 5\n```\n\nTo run a\
    \ previously listed command in the output, use an exclamation point (!) (sometimes\
    \ called the bang) followed by the history number. In this example, to run the\
    \ pwd command on line 276, use !, as follows:\n\n```\n$ !276\n```\n\nTo run the\
    \ last command you ran, use !!, as shown here:\n\n```\n$ !!\n```\n\nSearching\
    \ in Reverse\n\nPress Ctrl+R, and you’re presented with the Bash shell reverse-search\
    \ utility:\n\n```\n$ (reverse-i-search)'':\n```\n\nFrom the reverse-i-search prompt,\
    \ as you type each letter, the tool automatically searches through previously\
    \ run commands that have text similar to the string you entered. As soon as you’re\
    \ presented with the desired command match, you can rerun the command by pressing\
    \ the Enter or Return key. To view all commands that match a string, press Ctrl+R\
    \ repeatedly. To exit the reverse search, press Ctrl+C.\n\nSetting the Command\
    \ Editor\n\nYou can use the set -o command to make your command-line editor be\
    \ either vi or emacs. This example sets the command-line editor to be vi:\n\n\
    ```\n$ set -o vi\n```\n\nNow, when you press Esc+K, you’re placed in a mode in\
    \ which you can use vi commands to search through the stack of previously entered\
    \ commands.\n\nFor example, if you want to scroll up the command stack, you can\
    \ use the K key; similarly, you can scroll down using the J key. When in this\
    \ mode you can use the slash (/) key and then type a string to be searched for\
    \ in the entire command stack.\n\n![image](Images/sq.jpg) **Tip**   Before you\
    \ attempt to use the command editor feature, be sure you’re thoroughly familiar\
    \ with either the vi or emacs editor.\n\nA short example will illustrate the power\
    \ of this feature. Say you know that you ran the ls -altr command about an hour\
    \ ago. You want to run it again, but this time without the r (reverse-sort) option.\
    \ To enter the command stack, press Esc+K:\n\n```\n$ Esc+K\n```\n\nYou should\
    \ now see the last command you executed. To search the command stack for the ls\
    \ command, type /ls, and then press Enter or Return:\n\n```\n$ /ls\n```\n\nThe\
    \ most recently executed ls command appears at the prompt:\n\n```\n$ ls -altr\n\
    ```\n\nTo remove the r option, use the right arrow key to place the prompt over\
    \ the r on the screen, and press X to remove the r from the end of the command.\
    \ After you’ve edited the command, press the Enter or Return key to execute it.\n\
    \nDeveloping Standard Scripts\n\nI’ve worked in shops where the database administration\
    \ team developed hundreds of scripts and utilities to help manage an environment.\
    \ One company had a small squad of DBAs whose job function was to maintain the\
    \ environmental scripts. I think that’s overkill. I tend to use a small set of\
    \ focused scripts, with each script usually less than 50 lines long. If you develop\
    \ a script that another DBA can’t understand or maintain, then it loses its effectiveness.\n\
    \n![image](Images/sq.jpg) **Note**   All the scripts in this chapter are available\
    \ for download from the Source Code/Download area of the Apress web site ([www.apress.com](http://www.apress.com)\
    \ ).\n\nThis section contains several short shell functions, shell scripts, and\
    \ SQL scripts that can help you manage a database environment. This is by no means\
    \ a complete list of scripts—rather, it provides a starting point from which you\
    \ can build. Each subsection heading is the name of a script.\n\n![image](Images/sq.jpg) **Note**  \
    \ Before you attempt to run a shell script, ensure that it’s executable. Use the\
    \ chmod command to achieve this: chmod 750 <script>.\n\ndba_setup\n\nUsually,\
    \ you’ll establish a common set of OS variables and aliases in the same manner\
    \ for every database server. When navigating among servers, you should set these\
    \ variables and aliases in a consistent and repeatable manner. Doing so helps\
    \ you (or your team) operate efficiently in every environment. For example, it’s\
    \ extremely useful to have the OS prompt set in a consistent way when you work\
    \ with dozens of different servers. This helps you quickly identify what box you’re\
    \ on, which OS user you’re logged in as, and so on.\n\nOne technique is to store\
    \ these standard settings in a script and then have that script executed automatically\
    \ when you log in to a server. I usually create a script named dba_setup to set\
    \ these OS variables and aliases. You can place this script in a directory such\
    \ as HOME/bin and automatically execute the script via a startup script (see the\
    \ section “Organizing Scripts,” later in this chapter). Here are the contents\
    \ of a typical dba_setup script:\n\n```\n# set prompt\nPS1='[\\h:\\u:${ORACLE_SID}]$\
    \ '\n#\nexport EDITOR=vi\nexport VISUAL=$EDITOR\nexport SQLPATH=$HOME/scripts\n\
    set -o vi\n#\n# list directories only\nalias lsd=\"ls -p | grep /\"\n# show top\
    \ cpu consuming processes\nalias topc=\"ps -e -o pcpu,pid,user,tty,args | sort\
    \ -n -k 1 -r | head\"\n# show top memory consuming processes\nalias topm=\"ps\
    \ -e -o pmem,pid,user,tty,args | sort -n -k 1 -r | head\"\n#\nalias sqlp='sqlplus\
    \ \"/ as sysdba\"'\nalias shutdb='echo \"shutdown immediate;\" | sqlp'\nalias\
    \ startdb='echo \"startup;\" | sqlp'\n```\n\ndba_fcns\n\nUse this script to store\
    \ OS functions that help you navigate and operate in your database environment.\
    \ Functions tend to have more functionality than do aliases. You can be quite\
    \ creative with the number and complexity of functions you use. The idea is that\
    \ you want a consistent and standard set of functions that you can call, no matter\
    \ which database server you’re logged in to.\n\nPlace this script in a directory\
    \ such as HOME/bin. Usually, you’ll have this script automatically called when\
    \ you log in to a server via a startup script (see the section “Organizing Scripts,”\
    \ later in this chapter). Here are some typical functions you can use:\n\n```\n\
    #-----------------------------------------------------------#\n# show environment\
    \ variables in sorted list\n  function envs {\n    if test -z \"$1\"\n      then\
    \ /bin/env | /bin/sort\n      else /bin/env | /bin/sort | /bin/grep -i $1\n    fi\n\
      } # envs\n#-----------------------------------------------------------#\n# login\
    \ to sqlplus\n  function sp {\n    time sqlplus \"/ as sysdba\"\n  } # sp\n#-----------------------------------------------------------#\n\
    # find largest files below this point\nfunction flf {\n  find . -ls | sort -nrk7\
    \ | head −10\n}\n#-----------------------------------------------------------#\n\
    # find largest directories consuming space below this point\nfunction fld {\n\
      du -S . | sort -nr | head −10\n}\n#-----------------------------------------------------------#\n\
    # change directories to directory containing alert log file\nfunction bdump {\n\
       cd /u01/app/oracle/diag/rdbms/o12c/o12c/trace\n  } # bdump\n#-----------------------------------------------------------#\n\
    ```\n\ntbsp_chk.bsh\n\nThis script checks to see if any tablespaces are surpassing\
    \ a certain fullness threshold. Store this script in a directory such as HOME/bin.\
    \ Make sure you modify the script to contain the correct username, password, and\
    \ e-mail address for your environment.\n\nYou also need to establish the required\
    \ OS variables, such as ORACLE_SID and ORACLE_HOME. You can either hard-code those\
    \ variables into the script or call a script that sources the variables for you.\
    \ The next script calls a script (named oraset) that sets the OS variables (see\
    \ [Chapter 2](#9781430257288_Ch02.xhtml) for the details of this script). You\
    \ don’t have to use this script—the idea is to have a consistent and repeatable\
    \ way of establishing OS variables for your environment.\n\nYou can run this script\
    \ from the command line. In this example I passed it the database name (o12c)\
    \ and wanted to see what tablespaces had less than 20 percent space left:\n\n\
    ```\n$ tbsp_chk.bsh o12c 20\n```\n\nThe output indicates that two tablespaces\
    \ for this database have less than 20 percent space left:\n\n```\nspace not okay\n\
    0 % free UNDOTBS1, 17 % free SYSAUX,\n```\n\nHere are the contents of the tbsp_chk.bsh\
    \ script:\n\n```\n#!/bin/bash\n#\nif [ $# -ne 2 ]; then\n  echo \"Usage: $0 SID\
    \ threshold\"\n  exit 1\nfi\n# either hard code OS variables or source them from\
    \ a script.\n# see Chapter 2 for details on using oraset to source oracle OS variables\n\
    . /var/opt/oracle/oraset $1\n#\ncrit_var=$(\nsqlplus -s <<EOF\nsystem/foo\nSET\
    \ HEAD OFF TERM OFF FEED OFF VERIFY OFF\nCOL pct_free FORMAT 999\nSELECT (f.bytes/a.bytes)*100\
    \ pct_free,'% free',a.tablespace_name||','\nFROM\n(SELECT NVL(SUM(bytes),0) bytes,\
    \ x.tablespace_name\nFROM dba_free_space y, dba_tablespaces x\nWHERE x.tablespace_name\
    \ = y.tablespace_name(+)\nAND x.contents != 'TEMPORARY' AND x.status != 'READ\
    \ ONLY'\nAND x.tablespace_name  NOT LIKE 'UNDO%'\nGROUP BY x.tablespace_name)\
    \ f,\n(SELECT SUM(bytes) bytes, tablespace_name\nFROM dba_data_files\nGROUP BY\
    \ tablespace_name) a\nWHERE a.tablespace_name = f.tablespace_name\nAND  (f.bytes/a.bytes)*100\
    \ <= $2\nORDER BY 1;\nEXIT;\nEOF)\nif [ \"$crit_var\" = \"\" ]; then\n  echo \"\
    space okay\"\nelse\n  echo \"space not okay\"\n  echo $crit_var\n  echo $crit_var\
    \ | mailx -s \"tbsp getting full on $1\" dkuhn@gmail.com\nfi\nexit 0\n```\n\n\
    Usually, you run a script such as this automatically, on a periodic basis, from\
    \ a scheduling utility, such as cron. Here is a typical cron entry that runs the\
    \ script once an hour:\n\n```\n# Tablespace check\n2 * * * * /orahome/bin/tbsp_chk.bsh\
    \ INVPRD 10 1>/orahome/bin/log/tbsp_chk.log 2>&1\n```\n\nThis cron entry runs\
    \ the job and stores any informational output in the tbsp_chk.log file.\n\nWhen\
    \ running tbsp_chk.bsh in an Oracle Database 12c pluggable database environment\
    \ from the root container, you’ll need to reference the CDB_* views rather than\
    \ the DBA_* views for the script to properly report on space regarding all pluggable\
    \ databases (within the container database). You should also consider adding the\
    \ NAME and CON_ID to the query so that you can view which pluggable database is\
    \ potentially having space issues; for example,\n\n```\nSET LINES 132 PAGES 100\n\
    COL name FORM A10\nCOL tablespace_name FORM A15\nCOL file_name FORM A40\n--\n\
    SELECT\n  c.name, t.tablespace_name,\n  NVL(SUM(f.bytes),0) free_bytes, SUM(d.bytes)\
    \ alloc_bytes, d.file_name\nFROM v$containers    c\n    ,cdb_tablespaces t\n    ,cdb_free_space  f\n\
        ,cdb_data_files  d\nWHERE t.tablespace_name = f.tablespace_name(+)\nAND c.con_id\
    \ = t.con_id\nAND c.con_id = f.con_id\nAND c.con_id = d.con_id\nAND t.tablespace_name\
    \ = d.tablespace_name\nGROUP BY c.name, t.tablespace_name, d.file_name\nORDER\
    \ BY 1,2,5;\n```\n\nconn.bsh\n\nYou need to be alerted if there are issues with\
    \ connecting to databases. This script checks to see if a connection can be established\
    \ to the database. If a connection can’t be established, an e-mail is sent. Place\
    \ this script in a directory such as HOME/bin. Make sure you modify the script\
    \ to contain the correct username, password, and e-mail address for your environment.\n\
    \nYou also need to establish the required OS variables, such as ORACLE_SID and\
    \ ORACLE_HOME. You can either hard-code those variables into the script or call\
    \ a script that sources the variables for you. Like the previous script, this\
    \ script calls a script (named oraset) that sets the OS variables (see [Chapter\
    \ 2](#9781430257288_Ch02.xhtml)).\n\nThe script requires that the ORACLE_SID be\
    \ passed to it; for example,\n\n```\n$ conn.bsh INVPRD\n```\n\nIf the script can\
    \ establish a connection to the database, the following message is displayed:\n\
    \n```\nsuccess\ndb ok\n```\n\nHere are the contents of the conn.bsh script:\n\n\
    ```\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\n\
    fi\n# either hard code OS variables or source them from a script.\n# see Chapter\
    \ 2 for details on oraset script to source OS variables\n. /etc/oraset $1\n#\n\
    echo \"select 'success' from dual;\" | sqlplus -s system/foo@o12c | grep success\n\
    if [[ $? -ne 0 ]]; then\n  echo \"problem with $1\" | mailx -s \"db problem\"\
    \ dkuhn@gmail.com\n else\n  echo \"db ok\"\nfi\n#\nexit 0\n```\n\nThis script\
    \ is usually automated via a utility such as cron. Here is a typical cron entry:\n\
    \n```\n# Check to connect to db.\n18 * * * * /home/oracle/bin/conn.bsh o12c 1>/home/oracle/bin/log/conn.log\
    \ 2>&1\n```\n\nThis cron entry runs the script once per hour. Depending on your\
    \ availability requirements, you may want to run a script such as this on a more\
    \ frequent basis.\n\nfilesp.bsh\n\nUse the following script to check for an operating\
    \ point that is filling up. Place the script in a directory such as HOME/bin.\
    \ You need to modify the script so that the mntlist variable contains a list of\
    \ mount points that exist on your database server. Because this script isn’t running\
    \ any Oracle utilities, there is no reason to set the Oracle-related OS variables\
    \ (as with the previous shell scripts):\n\n```\n#!/bin/bash\nmntlist=\"/orahome\
    \ /ora01 /ora02 /ora03\"\nfor ml in $mntlist\ndo\necho $ml\nusedSpc=$(df -h $ml\
    \ | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1 -)\nBOX=$(uname -a\
    \ | awk '{print $2}')\n#\ncase $usedSpc in\n[0–9])\narcStat=\"relax, lots of disk\
    \ space: $usedSpc\"\n;;\n[1–7][0–9])\narcStat=\"disk space okay: $usedSpc\"\n\
    ;;\n[8][0–9])\narcStat=\"space getting low: $usedSpc\"\necho $arcStat | mailx\
    \ -s \"space on: $BOX\" dkuhn@gmail.com\n;;\n[9][0–9])\narcStat=\"warning, running\
    \ out of space: $usedSpc\"\necho $arcStat | mailx -s \"space on: $BOX\"  dkuhn@gmail.com\n\
    ;;\n[1][0][0])\narcStat=\"update resume, no space left: $usedSpc\"\necho $arcStat\
    \ | mailx -s \"space on: $BOX\" dkuhn@gmail.com\n;;\n*)\narcStat=\"huh?: $usedSpc\"\
    \nesac\n#\nBOX=$(uname -a | awk '{print $2}')\necho $arcStat\n#\ndone\n#\nexit\
    \ 0\n```\n\nYou can run this script manually from the command line, like this:\n\
    \n```\n$ filesp.bsh\n```\n\nHere is the output for this database server:\n\n```\n\
    /orahome\ndisk space okay: 79\n/ora01\nspace getting low: 84\n/ora02\ndisk space\
    \ okay: 41\n/ora03\nrelax, lots of disk space: 9\n```\n\nThis is the type of script\
    \ you should run on an automated basis from a scheduling utility such as cron.\
    \ Here is a typical cron entry:\n\n```\n# Filesystem check\n7 * * * * /orahome/bin/filesp.bsh\
    \ 1>/orahome/bin/log/filesp.log 2>&1\n```\n\nKeep in mind that the shell script\
    \ used in this section (filesp.bsh) may require modification for your environment.\
    \ The shell script is dependent on the output of the df -h command, which does\
    \ vary by OS and version. For instance, on a Solaris box the output of df -h appears\
    \ as follows:\n\n```\n$ df -h\nFilesystem             size   used  avail capacity  Mounted\
    \ on\n/ora01                  50G    42G   8.2G    84%    /ora01\n/ora02                  50G    20G    30G    41%    /ora02\n\
    /ora03                  50G   4.5G    46G     9%    /ora03\n/orahome                30G    24G  \
    \ 6.5G    79%    /orahome\n```\n\nThis line in the shell script selectively reports\
    \ on the “capacity” in the output of the df -h command:\n\n```\nusedSpc=$(df -h\
    \ $ml | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1 -)\n```\n\nFor\
    \ your environment you’ll have to modify the prior line to correctly extract the\
    \ information related to disk space remaining per mount point. For example, say\
    \ you’re on a Linux box and issue a df -h command, and you observe the following\
    \ output:\n\n```\nFilesystem            Size  Used Avail Use% Mounted on\n/dev/mapper/VolGroup00-LogVol00\n\
                          222G  162G   49G  77% /\n```\n\nThere’s only one mount point,\
    \ and the disk space percentage is associated with the “Use%” column. Therefore,\
    \ to extract the pertinent information, you’ll need to modify the code associated\
    \ with usedSpc within the shell script; for example,\n\n```\ndf -h / | grep %\
    \ | grep -v Use | awk '{print $4}' | cut -d \"%\" -f1 -\n```\n\nThe shell script\
    \ will thus need to have the following lines modified, as shown:\n\n```\nmntlist=\"\
    /\"\nfor ml in $mntlist\ndo\necho $ml\nusedSpc=$(df -h / | grep % | grep -v Use\
    \ | awk '{print $4}' | cut -d \"%\" -f1 -)\n```\n\nlogin.sql\n\nUse this script\
    \ to customize aspects of your SQL*Plus environment. When logging in to SQL*Plus\
    \ in Linux/Unix, the login.sql script is automatically executed if it exists in\
    \ a directory contained within the SQLPATH variable. If the SQLPATH variable hasn’t\
    \ been defined, then SQL*Plus looks for login.sql in the current working directory\
    \ from which SQL*Plus was invoked. For instance, here is how the SQLPATH variable\
    \ is defined in my environment:\n\n```\n$ echo $SQLPATH\n/home/oracle/scripts\n\
    ```\n\nI created the login.sql script in the /home/oracle/scripts directory. It\
    \ contains the following lines:\n\n```\n-- set SQL prompt\nSET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.>\
    \ '\n```\n\nNow, when I log in to SQL*Plus, my prompt is automatically set:\n\n\
    ```\n$ sqlplus / as sysdba\nSYS@o12c>\n```\n\ntop.sql\n\nThe following script\
    \ lists the top CPU-consuming SQL processes. It’s useful for identifying problem\
    \ SQL statements. Place this script in a directory such as HOME/scripts:\n\n```\n\
    select * from(\nselect\n sql_text\n,buffer_gets\n,disk_reads\n,sorts\n,cpu_time/1000000\
    \ cpu_sec\n,executions\n,rows_processed\nfrom v$sqlstats\norder by cpu_time DESC)\n\
    where rownum < 11;\n```\n\nThis is how you execute this script:\n\n```\nSQL> @top\n\
    ```\n\nHere is a snippet of the output, showing an SQL statement that is consuming\
    \ a large amount of database resources:\n\n```\nINSERT INTO \"REP_MV\".\"GEM_COMPANY_MV\"\
    \nSELECT   CASE GROUPING_ID(trim(upper(nvl(ad.organization_name,u.company))))\n\
    WHEN 0 THEN\ntrim(upper(nvl(ad.organization_name,u.company)))\n\n11004839   20937562        136  \
    \ 21823.59         17       12926019\n```\n\nlock.sql\n\nThis script displays\
    \ sessions that have locks on tables that are preventing other sessions from completing\
    \ work. The script shows details about the blocking and waiting sessions. You\
    \ should place this script in a directory such as HOME/scripts. Here are the contents\
    \ of lock.sql:\n\n```\nSET LINES 83 PAGES 30\nCOL blkg_user    FORM a10\nCOL blkg_machine\
    \ FORM a10\nCOL blkg_sid     FORM 99999999\nCOL wait_user    FORM a10\nCOL wait_machine\
    \ FORM a10\nCOL wait_sid     FORM 9999999\nCOL obj_own      FORM a10\nCOL obj_name    \
    \ FORM a10\n--\nSELECT\n s1.username    blkg_user\n,s1.machine     blkg_machine\n\
    ,s1.sid         blkg_sid\n,s1.serial#     blkg_serialnum\n,s1.sid || ',' || s1.serial#\
    \ kill_string\n,s2.username    wait_user\n,s2.machine     wait_machine\n,s2.sid        \
    \ wait_sid\n,s2.serial#     wait_serialnum\n,lo.object_id   blkd_obj_id\n,do.owner      \
    \ obj_own\n,do.object_name obj_name\nFROM v$lock l1\n    ,v$session s1\n    ,v$lock\
    \ l2\n    ,v$session s2\n    ,v$locked_object lo\n    ,dba_objects do\nWHERE s1.sid\
    \ = l1.sid\nAND   s2.sid = l2.sid\nAND   l1.id1 = l2.id1\nAND   s1.sid = lo.session_id\n\
    AND   lo.object_id = do.object_id\nAND   l1.block = 1\nAND   l2.request > 0;\n\
    ```\n\nThe lock.sql script is useful for determining what session has a lock on\
    \ an object and also for showing the blocked session. You can run this script\
    \ from SQL*Plus, as follows:\n\n```\nSQL> @lock.sql\n```\n\nHere is a partial\
    \ listing of the output (truncated so that it fits on one page):\n\n```\nBLKG_USER  BLKG_MACHI  BLKG_SID\
    \ BLKG_SERIALNUM\n---------- ---------- --------- --------------\nKILL_STRING\n\
    \nWAIT_USER  WAIT_MACHI WAIT_SID WAIT_SERIALNUM BLKD_OBJ_ID OBJ_OWN    OBJ_NAME\n\
    ---------- ---------- -------- -------------- ----------- ---------- ----------\n\
    MV_MAINT   speed             24             11\n24,11\nMV_MAINT   speed            87              7      \
    \ 19095 MV_MAINT   INV\n```\n\nWhen running lock.sql in an Oracle Database 12c\
    \ pluggable database environment from the root container, you’ll need to change\
    \ DBA_OBJECTS to CDB_OBJECTS for the script to properly report locks throughout\
    \ the entire database. You should also consider adding the NAME and CON_ID to\
    \ the query so that you can view the container in which the lock is occurring.\
    \ Here’s a snippet of the modified query (you’ll need to replace the “…” with\
    \ columns you want to report on):\n\n```\nSELECT\n u.name\n,s1.username    blkg_user\n\
    .  .  .  \n,do.object_name obj_name\nFROM v$lock l1\n    ,v$session s1\n    ,v$lock\
    \ l2\n    ,v$session s2\n    ,v$locked_object lo\n    ,cdb_objects do\n    ,v$containers\
    \ u\nWHERE s1.sid = l1.sid\nAND   s2.sid = l2.sid\nAND   l1.id1 = l2.id1\nAND  \
    \ s1.sid = lo.session_id\nAND   lo.object_id = do.object_id\nAND   l1.block =\
    \ 1\nAND   l2.request > 0\nAND   do.con_id = u.con_id;\n```\n\nusers.sql\n\nThis\
    \ script displays information about when users were created and whether their\
    \ account is locked. The script is useful when you’re troubleshooting connectivity\
    \ issues. Place the script in a directory such as HOME/scripts. Here is a typical\
    \ users.sql script for displaying user account information:\n\n```\nSELECT\n  username\n\
     ,account_status\n ,lock_date\n ,created\nFROM dba_users\nORDER BY username;\n\
    ```\n\nYou can execute this script from SQL*Plus, as follows:\n\n```\nSQL> @users.sql\n\
    ```\n\nHere is some sample output:\n\n```\nUSERNAME        ACCOUNT_ST LOCK_DATE    CREATED\n\
    --------------- ---------- ------------ ------------\nSYS             OPEN                    09-NOV-12\n\
    SYSBACKUP       OPEN                    09-NOV-12\nSYSDG           OPEN                    09-NOV-12\n\
    ```\n\nWhen running users.sql in an Oracle Database 12c pluggable database environment\
    \ from the root container, you’ll need to change DBA_USERS to CDB_USERS and add\
    \ the NAME and CON_ID columns to report on all users in all pluggable databases;\
    \ for example,\n\n```\nSELECT\n  c.name\n ,u.username\n ,u.account_status\n ,u.lock_date\n\
     ,u.created\nFROM cdb_users    u\n    ,v$containers c\nWHERE u.con_id = c.con_id\n\
    ORDER BY c.name, u.username;\n```\n\nOrganizing Scripts\n\nWhen you have a set\
    \ of scripts and utilities, you should organize them such that they’re consistently\
    \ implemented for each database server. Follow these steps to implement the preceding\
    \ DBA utilities for each database server in your environment:\n\n1.  Create OS\
    \ directories in which to store the scripts.\n2.  Copy your scripts and utilities\
    \ to the directories created in step 1.\n3.  Configure your startup file to initialize\
    \ the environment.\n\nThese steps are detailed in the following sections.\n\n\
    Step 1: Create Directories\n\nCreate a standard set of directories on each database\
    \ server to store your custom scripts. A directory beneath the HOME directory\
    \ of the oracle user is usually a good location. I generally create the following\
    \ three directories:\n\n*   HOME/bin. Standard location for shell scripts that\
    \ are run in an automated fashion (such as from cron).\n*   HOME/bin/log. Standard\
    \ location for log files generated from the scheduled shell scripts.\n*   HOME/scripts.\
    \ Standard location for storing SQL scripts.\n\nYou can use the mk dir command\
    \ to create the previous directories, as follows:\n\n```\n$ mkdir -p $HOME/bin/log\n\
    $ mkdir $HOME/scripts\n```\n\nIt doesn’t matter where you place the scripts or\
    \ what you name the directories, as long as you have a standard location so that\
    \ when you navigate from server to server, you always find the same files in the\
    \ same locations. In other words, it doesn’t matter what the standard is, only\
    \ that you have a standard.\n\nStep 2: Copy Files to Directories\n\nPlace your\
    \ utilities and scripts in the appropriate directories. Copy the following files\
    \ to the HOME/bin directory:\n\n```\ndba_setup\ndba_fcns\ntbsp_chk.bsh\nconn.bsh\n\
    filesp.bsh\n```\n\nPlace the following SQL scripts in the HOME/scripts directory:\n\
    \n```\nlogin.sql\ntop.sql\nlock.sql\nusers.sql\n```\n\nStep 3: Configure the Startup\
    \ File\n\nPlace the following code in the . bashrc file or the equivalent startup\
    \ file for the shell you use (.profile for the Korn shell). Here is an example\
    \ of how to configure the .bashrc file:\n\n```\n# Source global definitions\n\
    if [ −f /etc/bashrc ]; then\n        . /etc/bashrc\nfi\n#\n# source oracle OS\
    \ variables\n. /etc/oraset <default_database>\n#\n# User specific aliases and\
    \ functions\n. $HOME/bin/dba_setup\n. $HOME/bin/dba_fcns\n```\n\nNow, each time\
    \ you log in to an environment, you have full access to all the OS variables,\
    \ aliases, and functions established in the dba_setup and dba_fcns files. If you\
    \ don’t want to log off and back in, then run the file manually, using the dot\
    \ (.) command. This command executes the lines contained within a file. The following\
    \ example runs the .bashrc file:\n\n```\n$ . $HOME/.bashrc\n```\n\nThe dot instructs\
    \ the shell to source the script. Sourcing tells the shell process you’re currently\
    \ logged in to, to inherit any variables set with an export command in an executed\
    \ script. If you don’t use the dot notation, then the variables set within the\
    \ script are visible only in the context of the subshell that is spawned when\
    \ the script is executed.\n\n![image](Images/sq.jpg) **Note**   In the Bash shell\
    \ the source command is equivalent to the dot (.) command.\n\nSummary\n\nThis\
    \ chapter described how to configure an efficient environment. This is especially\
    \ important for DBAs who manage multiple databases on multiple servers. Regular\
    \ maintenance and troubleshooting activities require you to log in directly to\
    \ the database server. To promote efficiency and sanity, you should develop a\
    \ standard set of OS tools and SQL scripts that help you maintain multiple environments.\
    \ You can use standard features of the OS to assist with navigating, repeating\
    \ commands, showing system bottlenecks, quickly finding critical files, and so\
    \ on.\n\nThe techniques for configuring a standard OS are especially useful when\
    \ you’re working on multiple servers with multiple databases. When you have multiple\
    \ terminal sessions running simultaneously, it’s easy to lose your bearings and\
    \ forget which session is associated with a particular server and database. With\
    \ just a small amount of setup, you can make certain that your OS prompt always\
    \ shows information such as the host and database. Likewise, you can always set\
    \ your SQL prompt to show the username and database connection. These techniques\
    \ help ensure that you don’t accidentally run a command or script in the wrong\
    \ environment.\n\nAfter you have installed the Oracle binaries, created a database,\
    \ and configured your environment, you are ready to perform additional database\
    \ administration tasks, such as creating tablespaces for the applications. The\
    \ topic of tablespace creation and maintenance is discussed in the next chapter.\n\
    \nCHAPTER 4\n\n![image](Images/frontdot.jpg)\n\nTablespaces and Data Files\n\n\
    The term *tablespace* is something of a misnomer, in that it’s not just a space\
    \ for tables. Rather, a tablespace is a logical container that allows you to manage\
    \ groups of data files,  the physical files on disk that consume space. Once a\
    \ tablespace is created, you can then create database objects (tables and indexes)\
    \ within tablespaces, which results in space allocated on disk in the associated\
    \ data files.\n\nA tablespace is logical in the sense that it is only visible\
    \ through data dictionary views (such as DBA_TABLESPACES); you manage tablespaces\
    \ through SQL*Plus or graphical tools (such as Enterprise Manager), or both. Tablespaces\
    \ only exist while the database is up and running.\n\nData files can also be viewed\
    \ through data dictionary views (such as DBA_DATA_FILES) but additionally have\
    \ a physical presence, as they can be viewed outside the database through OS utilities\
    \ (such as ls). Data files persist whether the database is open or closed.\n\n\
    Oracle databases typically contain several tablespaces. A tablespace can have\
    \ one or more data files associated with it, but a data file can be associated\
    \ with only one tablespace. In other words, a data file can’t be shared between\
    \ two (or more) tablespaces.\n\nObjects (such as tables and indexes) are owned\
    \ by users and created within tablespaces. An object is logically instantiated\
    \ as a segment. A segment consists of extents of space within the tablespace.\
    \ An extent consists of a set of database blocks. [Figure 4-1](#9781430257288_Ch04.xhtml#Fig1)\
    \ shows the relationships between these logical and physical constructs used to\
    \ manage space within an Oracle database.\n\n![9781430257288_Fig04-01.jpg](Images/9781430257288_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781430257288_Ch04.xhtml#_Fig1). Relationships of logical storage\
    \ objects and physical storage\n\nAs you saw in [Chapter 2](#9781430257288_Ch02.xhtml),\
    \ when you create a database, typically five tablespaces are created when you\
    \ execute the CREATE DATABASE statement:\n\n*   SYSTEM\n*   SYSAUX\n*   UNDO\n\
    *   TEMP\n*   USERS\n\nThese five tablespaces are the minimal set of storage containers\
    \ you need to operate a database (one could argue, however, you don’t need the\
    \ USERS tablespace; more on that in the next section). As you open a database\
    \ for use, you should quickly create additional tablespaces for storing application\
    \ data. This chapter discusses the purpose of the standard set of tablespaces,\
    \ the need for additional tablespaces, and how to manage these critical database\
    \ storage containers. The chapter focuses on the most common and critical tasks\
    \ associated with creating and maintaining tablespaces and data files, progressing\
    \ to more advanced topics, such as moving and renaming data files.\n\nUnderstanding\
    \ the First Five\n\nThe SYSTEM tablespace provides storage for the Oracle data\
    \ dictionary objects. This tablespace is where all objects owned by the SYS user\
    \ are stored. The SYS user should be the only user that owns objects created in\
    \ the SYSTEM tablespace.\n\nStarting with Oracle Database 10g, the SYSAUX (system\
    \ auxiliary) tablespace is created when you create the database. This is an auxiliary\
    \ tablespace used as a data repository for Oracle database tools, such as Enterprise\
    \ Manager, Statspack, LogMiner, Logical Standby, and so on.\n\nThe UNDOtablespace\
    \ stores the information required to undo the effects of a transaction (insert,\
    \ update, delete, or merge). This information is required in the event a transaction\
    \ is purposely rolled back (via a ROLLBACK statement). The undo information is\
    \ also used by Oracle to recover from unexpected instance crashes and to provide\
    \ read consistency for SQL statements. Additionally, some database features, such\
    \ as Flashback Query, use the undo information.\n\nSome Oracle SQL statements\
    \ require a sort area, either in memory or on disk. For example, the results of\
    \ a query may need to be sorted before being returned to the user. Oracle first\
    \ uses memory to sort the query results, and when there is no longer sufficient\
    \ memory, the TEMP tablespace is used as a sorting area on disk. Extra temporary\
    \ storage may also be required when creating or rebuilding indexes. When you create\
    \ a database, typically you create the TEMP tablespace and specify it to be the\
    \ default temporary tablespace for any users you create.\n\nThe USERS tablespace\
    \ is not absolutely required but is often used as a default permanent tablespace\
    \ for table and index data for users. As shown in [Chapter 2](#9781430257288_Ch02.xhtml),\
    \ you can create a default permanent tablespace for users when you create your\
    \ database. This means that when a user attempts to create a table or index, if\
    \ no tablespace is specified during object creation, by default the object is\
    \ created in the default permanent tablespace.\n\nUnderstanding the Need for More\n\
    \nAlthough you could put every database user’s data in the USERS tablespace, this\
    \ usually isn’t scalable or maintainable for any type of serious database application.\
    \ Instead, it’s more efficient to create additional tablespaces for application\
    \ users. You typically create at least two tablespaces specific to each application\
    \ using the database: one for the application table data and one for the application\
    \ index data. For example, for the APP user, you can create tablespaces named\
    \ APP_DATA and APP_INDEX for table and index data, respectively.\n\nDBAs used\
    \ to separate table and index data for performance reasons. The thinking was that\
    \ separating table data from index data would reduce input/ouput (I/O) contention.\
    \ This is because the data files (for each tablespace) could be placed on different\
    \ disks, with separate controllers.\n\nWith modern storage configurations, which\
    \ have multiple layers of abstraction between the application and the underlying\
    \ physical storage devices, it’s debatable whether you can realize any performance\
    \ gains by creating multiple separate tablespaces. But, there still are valid\
    \ reasons for creating multiple tablespaces for table and index data:\n\n*   Backup\
    \ and recovery requirements may be different for the tables and indexes.\n*  \
    \ The indexes may have storage requirements different from those of the table\
    \ data.\n\nIn addition to separate tablespaces for data and indexes, you sometimes\
    \ create separate tablespaces for objects of different sizes. For instance, if\
    \ an application has very large tables, you can create an APP_DATA_LARGE tablespace\
    \ that has a large extent size and a separate APP_DATA_SMALL tablespace that has\
    \ a smaller extent size. This concept also extends to binary/character large object\
    \ (LOB) data types. You may want to separate a LOB column in its own tablespace\
    \ because you want to manage the LOB tablespace storage characteristics differently\
    \ from those of the regular table data.\n\nDepending on your requirements, you\
    \ should consider creating separate tablespaces for each application using the\
    \ database. For example, for an inventory application, create INV_DATA and INV_INDEX;\
    \ for a human resources application, create HR_DATA and HR_INDEX. Here are some\
    \ reasons to consider creating separate tablespaces for each application using\
    \ the database:\n\n*   Applications may have different availability requirements.\
    \ Separate tablespaces lets you take tablespaces offline for one application without\
    \ affecting another application.\n*   Applications may have different backup and\
    \ recovery requirements. Separate tablespaces lets tablespaces be backed up and\
    \ recovered independently.\n*   Applications may have different storage requirements.\
    \ Separate tablespaces allows for different settings for space quotas, extent\
    \ sizes, and segment management.\n*   You may have some data that is purely read-only.\
    \ Separate tablespaces lets you put a tablespace that contains only read-only\
    \ data into read-only mode.\n\nThe next section discusses creating tablespaces.\n\
    \nCreating Tablespaces\n\nYou use the CREATE TABLESPACE statement to create tablespaces.\
    \ The *Oracle SQL Reference Manual* contains more than a dozen pages of syntax\
    \ and examples for creating tablespaces. In most scenarios, you need to use only\
    \ a few of the features available, namely, locally managed extent allocation,\
    \ and automatic segment space management. The following code snippet demonstrates\
    \ how to create a tablespace that employs the most common features:\n\n```\ncreate\
    \ tablespace tools\n  datafile '/u01/dbfile/o12c/tools01.dbf'\n  size 100m\n  extent\
    \ management local\n  uniform size 128k\n  segment space management auto;\n```\n\
    \nYou need to modify this script for your environment. For example, the directory\
    \ path, data file size, and uniform extent size should be changed per environment\
    \ requirements.\n\nYou create tablespaces as locally managed by using the EXTENT\
    \ MANAGEMENT LOCAL clause. A locally managed tablespace uses a bitmap in the data\
    \ file to efficiently determine whether an extent is in use. The storage parameters\
    \ NEXT, PCTINCREASE, MINEXTENTS, MAXEXTENTS, and DEFAULT aren’t valid for extent\
    \ options in locally managed tablespaces.\n\n![image](Images/sq.jpg) **Note**  \
    \ A locally managed tablespace with uniform extents must be minimally sized for\
    \ at least five database blocks per extent.\n\nAs you add data to objects in tablespaces,\
    \ Oracle automatically allocates more extents to an associated tablespace data\
    \ file as needed to accommodate the growth. You can instruct Oracle to allocate\
    \ a uniform size for each extent via the UNIFORM SIZE [size] clause. If you don’t\
    \ specify a size, then the default uniform extent size is 1MB.\n\nThe uniform\
    \ extent size that you use varies, depending on the storage requirements of your\
    \ tables and indexes. In some scenarios, I create several tablespaces for a given\
    \ application. For instance, you can create a tablespace for small objects that\
    \ has a uniform extent size of 512KB, a tablespace for medium-sized objects that\
    \ has a uniform extent size of 4MB, a tablespace for large objects with a uniform\
    \ extent size of 16MB, and so on.\n\nAlternatively, you can specify that Oracle\
    \ determine the extent size via the AUTOALLOCATE clause. Oracle allocates extent\
    \ sizes of 64KB, 1MB, 8MB, or 64MB. Using AUTOALLOCATE is appropriate when you\
    \ think objects in one tablespace will be of varying sizes.\n\nThe SEGMENT SPACE\
    \ MANAGEMENT AUTO clause instructs Oracle to manage the space within the block.\
    \ When you use this clause, there is no need to specify parameters, such as PCTUSED,\
    \ FREELISTS, and FREELIST GROUPS. The alternative to AUTO space management is\
    \ MANUAL. When you use MANUAL, you can adjust the parameters to the requirements\
    \ of your application. I recommend that you use AUTO and not MANUAL. Using AUTO\
    \ vastly reduces the number of parameters you need to configure and manage.\n\n\
    When a data file fills up, you can instruct Oracle to increase the size of the\
    \ data file automatically, with the AUTOEXTEND feature. I recommend that you don’t\
    \ use this feature. Instead, you should monitor tablespace growth and add space\
    \ as necessary. Manually adding space is preferable to having a runaway SQL process\
    \ that accidentally grows a tablespace until it has consumed all the space on\
    \ a mount point. If you inadvertently fill up a mount point that contains a control\
    \ file or the Oracle binaries, you can hang your database.\n\nIf you do use the\
    \ AUTOEXTEND feature, I suggest that you always specify a corresponding MAXSIZE\
    \ so that a runaway SQL process doesn’t accidentally fill up a tablespace that\
    \ in turn fills up a mount point. Here is an example of creating an autoextending\
    \ tablespace with a cap on its maximum size:\n\n```\ncreate tablespace tools\n\
      datafile '/u01/dbfile/o12c/tools01.dbf'\n  size 100m\n  autoextend on maxsize\
    \ 1000m\n  extent management local\n  uniform size 128k\n  segment space management\
    \ auto;\n```\n\nWhen you’re using CREATE TABLESPACE scripts in different environments,\
    \ it’s useful to be able to parameterize portions of the script. For instance,\
    \ in development you may size the data files at 100MB, whereas in production the\
    \ data files may be 100GB. Use ampersand (&) variables to make CREATE TABLESPACE\
    \ scripts more portable among environments.\n\nThe next listing defines ampersand\
    \ variables at the top of the script, and those variables determine the sizes\
    \ of data files created for the tablespaces:\n\n```\ndefine tbsp_large=5G\ndefine\
    \ tbsp_med=500M\n--\ncreate tablespace reg_data\n  datafile '/u01/dbfile/o12c/reg_data01.dbf'\n\
      size &&tbsp_large\n  extent management local\n  uniform size 128k\n  segment\
    \ space management auto;\n--\ncreate tablespace reg_index\n  datafile '/u01/dbfile/o12c/reg_index01.dbf'\n\
      size &&tbsp_med\n  extent management local\n  uniform size 128k\n  segment space\
    \ management auto;\n```\n\nUsing ampersand variables allows you to modify the\
    \ script once and have the variables reused throughout the script. You can parameterize\
    \ all aspects of the script, including data file mount points and extent sizes.\n\
    \nYou can also pass the values of the ampersand variables in to the CREATE TABLESPACE\
    \ script from the SQL*Plus command line. This lets you avoid hard-coding a specific\
    \ size in the script and instead provide the sizes at runtime. To accomplish this,\
    \ first define at the top of the script the ampersand variables to accept the\
    \ values being passed in:\n\n```\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\n\
    create tablespace reg_data\n  datafile '/u01/dbfile/o12c/reg_data01.dbf'\n  size\
    \ &&tbsp_large\n  extent management local\n  uniform size 128k\n  segment space\
    \ management auto;\n--\ncreate tablespace reg_index\n  datafile '/u01/dbfile/o12c/reg_index01.dbf'\n\
      size &&tbsp_med\n  extent management local\n  uniform size 128k\n  segment space\
    \ management auto;\n```\n\nNow, you can pass variables in to the script from the\
    \ SQL*Plus command line. The following example executes a script named cretbsp.sql\
    \ and passes in two values that set the ampersand variables to 5G and 500M, respectively:\n\
    \n```\nSQL> @cretbsp  5G  500M\n```\n\n[Table 4-1](#9781430257288_Ch04.xhtml#Tab1)\
    \ summarizes the best practices for creating and managing tablespaces.\n\n[Table\
    \ 4-1.](#9781430257288_Ch04.xhtml#_Tab1) Best Practices for Creating and Managing\
    \ Tablespaces\n\n| Best Practice | Reasoning |\n| --- | --- |\n| Create separate\
    \ tablespaces for different applications using the same database. | If a tablespace\
    \ needs to be taken offline, it affects only one application. |\n| For an application,\
    \ separate table data from index data in different tablespaces. | Table and index\
    \ data may have different storage requirements. |\n| Don’t use the AUTOEXTEND\
    \ feature for data files. If you do use AUTOEXTEND, specify a maximum size. |\
    \ Specifying a maximum size prevents a runaway SQL statement from filling up a\
    \ storage device. |\n| Create tablespaces as locally managed. You shouldn’t create\
    \ a tablespace as dictionary managed. | This provides better performance and manageability.\
    \ |\n| For a tablespace’s data file naming convention, use a name that contains\
    \ the tablespace name followed by a two-digit number that’s unique within data\
    \ files for that tablespace. | Doing this makes it easy to identify which data\
    \ files are associated with which tablespaces. |\n| Try to minimize the number\
    \ of data files associated with a tablespace. | You have fewer data files to manage.\
    \ |\n| In tablespace CREATE scripts, use ampersand variables to define aspects\
    \ such as storage characteristics. | This makes scripts more reusable among various\
    \ environments. |\n\nIf you ever need to verify the SQL required to re-create\
    \ an existing tablespace, you can do so with the DBMS_METADATA package. First,\
    \ set the LONG variable to a large value:\n\n```\nSQL> set long 1000000\n```\n\
    \nNext, use the DBMS_METADATA package to display the CREATE TABLESPACE data definition\
    \ language (DDL)  for all tablespaces within the database:\n\n```\nselect dbms_metadata.get_ddl('TABLESPACE',tablespace_name)\n\
    from dba_tablespaces;\n```\n\n![image](Images/sq.jpg) **Tip**   You can also use\
    \ Data Pump to extract the DDL of database objects. See [Chapter 13](#9781430257288_Ch13.xhtml)\
    \ for details.\n\nRenaming a Tablespace\n\nSometimes, you need to rename a tablespace.\
    \ You may want to do this because a tablespace was initially erroneously named,\
    \ or you may want the tablespace name to better conform to your database naming\
    \ standards. Use the ALTER TABLESPACE statement to rename a tablespace. This example\
    \ renames a tablespace from TOOLS to TOOLS_DEV:\n\n```\nSQL> alter tablespace\
    \ tools rename to tools_dev;\n```\n\nWhen you rename a tablespace, Oracle updates\
    \ the name of the tablespace in the data dictionary, control files, and data file\
    \ headers. Keep in mind that renaming a tablespace doesn’t rename any associated\
    \ data files. See the section “Renaming or Relocating a Data File,” later in this\
    \ chapter, for information on renaming data files.\n\n![image](Images/sq.jpg) **Note**  \
    \ You can’t rename the SYSTEM tablespace or the SYSAUX tablespace.\n\nControlling\
    \ the Generation of Redo\n\nFor some types of applications, you may know beforehand\
    \ that you can easily re-create the data. An example might be a data warehouse\
    \ environment in which you perform direct path inserts or use SQL*Loader to load\
    \ data. In these scenarios you can turn off the generation of redo for direct\
    \ path loading. You use the NOLOGGING clause to do this:\n\n```\ncreate tablespace\
    \ inv_mgmt_data\n  datafile '/u01/dbfile/o12c/inv_mgmt_data01.dbf' size 100m\n\
      extent management local\n  uniform size 128k\n  segment space management auto\n\
      nologging;\n```\n\nIf you have an existing tablespace and want to alter its\
    \ logging mode, use the ALTER TABLESPACE statement:\n\n```\nSQL> alter tablespace\
    \ inv_mgmt_data nologging;\n```\n\nYou can confirm the tablespace logging mode\
    \ by querying the DBA_TABLESPACES view:\n\n```\nSQL> select tablespace_name, logging\
    \ from dba_tablespaces;\n```\n\nThe generation of redo logging can’t be suppressed\
    \ for regular INSERT, UPDATE, and DELETE statements. For regular data manipulation\
    \ language (DML) statements, the NOLOGGING clause is ignored. The NOLOGGING clause\
    \ does apply, however, to the following types of DML:\n\n*   Direct path INSERT\
    \ statements\n*   Direct path SQL*Loader\n\nThe NOLOGGING clause also applies\
    \ to the following types of DDL statements:\n\n*   CREATE TABLE . . . AS SELECT\
    \ (NOLOGGING only affects the initial create, not subsequent regular DML, statements\
    \ against the table)\n*   ALTER TABLE . . . MOVE\n*   ALTER TABLE . . . ADD/MERGE/SPLIT/MOVE/MODIFY\
    \ PARTITION\n*   CREATE INDEX\n*   ALTER INDEX . . . REBUILD\n*   CREATE MATERIALIZED\
    \ VIEW\n*   ALTER MATERIALIZED VIEW . . . MOVE\n*   CREATE MATERIALIZED VIEW LOG\n\
    *   ALTER MATERIALIZED VIEW LOG . . . MOVE\n\nBe aware that if redo isn’t logged\
    \ for a table or index, and you have a media failure before the object is backed\
    \ up, then you can’t recover the data; you receive an ORA-01578 error, indicating\
    \ that there is logical corruption of the data.\n\n![image](Images/sq.jpg) **Note**  \
    \ You can also override the tablespace level of logging at the object level. For\
    \ example, even if a tablespace is specified as NOLOGGING, you can create a table\
    \ with the LOGGING clause.\n\nChanging a Tablespace’s Write Mode\n\nIn environments\
    \ such as data warehouses, you may need to load data into tables and then never\
    \ modify the data again. To enforce that no objects in a tablespace can be modified,\
    \ you can alter the tablespace to be read-only. To do this, use the ALTER TABLESPACE\
    \ statement:\n\n```\nSQL> alter tablespace inv_mgmt_rep read only;\n```\n\nOne\
    \ advantage of a read-only tablespace is that you only have to back it up once.\
    \ You should be able to restore the data files from a read-only tablespace no\
    \ matter how long ago the backup was made.\n\nIf you need to modify the tablespace\
    \ out of read-only mode, you do so as follows:\n\n```\nSQL> alter tablespace inv_mgmt_rep\
    \ read write;\n```\n\nMake sure you reenable backups of a tablespace after you\
    \ place it in read/write mode.\n\n![image](Images/sq.jpg) **Note**   You can’t\
    \ make a tablespace that contains active rollback segments read-only. For this\
    \ reason, the SYSTEM tablespace can’t be made read-only, because it contains the\
    \ SYSTEM rollback segment.\n\nBe aware that in Oracle Database 11g and above,\
    \ you can modify individual tables to be read-only. This allows you to control\
    \ the read-only at a much more granular level (than at the tablespace level);\
    \ for example,\n\n```\nSQL> alter table my_tab read only;\n```\n\nWhile in read-only\
    \ mode, you can’t issue any insert, update, or delete statements against the table.\
    \ Making individual tables read/write can be advantageous when you’re doing maintenance\
    \ (such as a data migration) and you want to ensure that users don’t update the\
    \ data.\n\nThis example modifies a table back to read/write mode:\n\n```\nSQL>\
    \ alter table my_tab read write;\n```\n\nDropping a Tablespace\n\nIf you have\
    \ a tablespace that is unused, it’s best to drop it so it doesn’t clutter your\
    \ database, consume unnecessary resources, and potentially confuse DBAs who aren’t\
    \ familiar with the database. Before dropping a tablespace, it’s a good practice\
    \ to first take it offline:\n\n```\nSQL> alter tablespace inv_data offline;\n\
    ```\n\nYou may want to wait to see if anybody screams that an application is broken\
    \ because it can’t write to a table or index in the tablespace to be dropped.\
    \ When you’re sure the tablespace isn’t required, drop it, and delete its data\
    \ files:\n\n```\nSQL> drop tablespace inv_data including contents and datafiles;\n\
    ```\n\n![image](Images/sq.jpg) **Tip**   You can drop a tablespace whether it’s\
    \ online or offline. The exception to this is the SYSTEM tablespace, which can’t\
    \ be dropped. It’s always a good idea to take a tablespace offline before you\
    \ drop it. By doing so, you can better determine if an application is using any\
    \ objects in the tablespace. If you attempt to query a table in an offline tablespace,\
    \ you receive this error: ORA-00376: file can't be read at this time.\n\nDropping\
    \ a tablespace using INCLUDING CONTENTS AND DATAFILES permanently removes the\
    \ tablespace and any of its data files. Make certain the tablespace doesn’t contain\
    \ any data you want to keep before you drop it.\n\nIf you attempt to drop a tablespace\
    \ that contains a primary key that is referenced by a foreign key associated with\
    \ a table in a tablespace different from the one you’re trying to drop, you receive\
    \ this error:\n\n```\nORA-02449: unique/primary keys in table referenced by foreign\
    \ keys\n```\n\nRun this query first to determine whether any foreign key constraints\
    \ will be affected:\n\n```\nselect p.owner,\n       p.table_name,\n       p.constraint_name,\n\
           f.table_name referencing_table,\n       f.constraint_name foreign_key_name,\n\
           f.status fk_status\nfrom   dba_constraints p,\n       dba_constraints f,\n\
           dba_tables      t\nwhere  p.constraint_name = f.r_constraint_name\nand    f.constraint_type\
    \ = 'R'\nand    p.table_name = t.table_name\nand    t.tablespace_name = UPPER('&tablespace_name')\n\
    order by 1,2,3,4,5;\n```\n\nIf there are referenced constraints, you need to first\
    \ drop the constraints or use the CASCADE CONSTRAINTS clause of the DROP TABLESPACE\
    \ statement. This statement uses CASCADE CONSTRAINTS to drop any affected constraints\
    \ automatically:\n\n```\nSQL> drop tablespace inv_data including contents and\
    \ data files cascade constraints;\n```\n\nThis statement drops any referential\
    \ integrity constraints from tables outside the tablespace being dropped that\
    \ reference tables within the dropped tablespace.\n\nIf you drop a tablespace\
    \ that has required objects in a production system, the results can be catastrophic.\
    \ You must perform some sort of recovery to get the tablespace and its objects\
    \ back. Needless to say, be very careful when dropping a tablespace. [Table 4-2](#9781430257288_Ch04.xhtml#Tab2)\
    \ lists recommendations to consider when you do this.\n\n[Table 4-2.](#9781430257288_Ch04.xhtml#_Tab2)\
    \ Best Practices for Dropping Tablespaces\n\n| Best Practice | Reasoning |\n|\
    \ --- | --- |\n| Before dropping a tablespace, run a script such as this to determine\
    \ if any objects exist in the tablespace: select owner, segment_name, segment_type\
    \ from dba_segments where tablespace_name=upper('&&tbsp_name'); | Doing this ensures\
    \ that no tables or indexes exist in the tablespace before you drop it. |\n| Consider\
    \ renaming tables in a tablespace before you drop it. | If any applications are\
    \ using tables within the tablespace to be dropped, the application throws an\
    \ error when a required table is renamed. |\n| If there are no objects in the\
    \ tablespace, resize the associated data files to a very small number, such as\
    \ 10MB. | Reducing the size of the data files to a miniscule amount of space quickly\
    \ shows whether any applications are trying to access objects that require space\
    \ in a tablespace. |\n| Make a backup of your database before dropping a tablespace.\
    \ | This ensures that you have a way to recover objects that are discovered to\
    \ be in use after you drop the tablespace. |\n| Take the tablespace and data files\
    \ offline before you drop the tablespace. Use the ALTER TABLESPACE statement to\
    \ take the tablespace offline. | This helps determine if any applications or users\
    \ are using objects in the tablespace. They can’t access the objects if the tablespace\
    \ and data files are offline. |\n| When you’re sure a tablespace isn’t in use,\
    \ use the DROP TABLESPACE . . . INCLUDING CONTENTS AND DATAFILES statement. |\
    \ This removes the tablespace and physically removes any data files associated\
    \ with it. Some DBAs don’t like this approach, but you should be fine if you’ve\
    \ taken the necessary precautions. |\n\nUsing Oracle Managed Files\n\nThe Oracle\
    \ Managed File (OMF) feature automates many aspects of tablespace management,\
    \ such as file placement, naming, and sizing. You control OMF by setting the following\
    \ initialization parameters:\n\n*   DB_CREATE_FILE_DEST\n*   DB_CREATE_ONLINE_LOG_DEST_N\n\
    *   DB_RECOVERY_FILE_DEST\n\nIf you set these parameters before you create the\
    \ database, Oracle uses them for the placement of the data files, control files,\
    \ and online redo logs. You can also enable OMF after your database has been created.\
    \ Oracle uses the values of the initialization parameters for the locations of\
    \ any newly added files. Oracle also determines the name of the newly added file.\n\
    \nThe advantage of using OMF is that creating tablespaces is simplified. For example,\
    \ the CREATE TABLESPACE statement doesn’t need to specify anything other than\
    \ the tablespace name. First, enable the OMF feature by setting the DB_CREATE_FILE_DEST\
    \ parameter:\n\n```\nSQL> alter system set db_create_file_dest='/u01';\n```\n\n\
    Now, issue the CREATE TABLESPACE statement:\n\n```\nSQL> create tablespace inv1;\n\
    ```\n\nThis statement creates a tablespace named INV1, with a default data file\
    \ size of 100MB. Keep in mind that you can override the default size of 100MB\
    \ by specifying a size:\n\n```\nSQL> create tablespace inv2 datafile size 20m;\n\
    ```\n\nTo view the details of the associated data files, query the V$DATAFILE\
    \ view, and note that Oracle has created subdirectories beneath the /u01 directory\
    \ and named the file with the OMF format:\n\n```\nSQL> select name from v$datafile\
    \ where name like '%inv%';\nNAME\n\n/u01/O12C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n\
    /u01/O12C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n```\n\nOne limitation of OMF is that\
    \ you’re limited to one directory for the placement of data files. If you want\
    \ to add data files to a different directory, you can alter the location dynamically:\n\
    \n```\nSQL> alter system set db_create_file_dest='/u02';\n```\n\nAlthough this\
    \ procedure isn’t a huge deal, I find it easier not to use OMF. Most of the environments\
    \ I’ve worked in have many mount points assigned for database use. You don’t want\
    \ to have to modify an initialization parameter every time you need a data file\
    \ added to a directory that isn’t in the current definition of DB_CREATE_FILE_DEST.\
    \ It’s easier to issue a CREATE TABLESPACE statement or ALTER TABLESPACE statement\
    \ that has the file location and storage parameters in the script. It isn’t cumbersome\
    \ to provide directory names and file names to the tablespace-management statements.\n\
    \nCreating a Bigfile Tablespace\n\nThe bigfile feature allows you to create a\
    \ tablespace with a very large data file assigned to it. The advantage of using\
    \ the bigfile feature is this potential to create very large files. With an 8KB\
    \ block size, you can create a data file as large as 32TB. With a 32KB block size,\
    \ you can create a data file up to 128TB.\n\nUse the BIGFILE clause to create\
    \ a bigfile tablespace:\n\n```\ncreate bigfile tablespace inv_big_data\n  datafile\
    \ '/u01/dbfile/o12c/inv_big_data01.dbf'\n  size 10g\n  extent management local\n\
      uniform size 128k\n  segment space management auto;\n```\n\nAs long as you have\
    \ plenty of space associated with the filesystem supporting the bigfile tablespace\
    \ data file, you can store massive amounts of data in a tablespace.\n\nOne potential\
    \ disadvantage of using a bigfile tablespace is that if, for any reason, you run\
    \ out of space on a filesystem that supports the data file associated with the\
    \ bigfile, you can’t expand the size of the tablespace (unless you can add space\
    \ to the filesystem). You can’t add more data files to a bigfile tablespace if\
    \ they’re placed on separate mount points. A bigfile tablespace allows only one\
    \ data file to be associated with it.\n\nYou can make the bigfile tablespace the\
    \ default type of tablespace for a database, using the ALTER DATABASE SET DEFAULT\
    \ BIGFILE TABLESPACE statement. However, I don’t recommend doing that. You could\
    \ potentially create a tablespace, not knowing it was a bigfile tablespace (because\
    \ you forgot it was the default or because you’re a new DBA on the project and\
    \ didn’t realize it), and create a tablespace on a mount point. Then, when you\
    \ discovered that you needed more space, you wouldn’t know that you couldn’t add\
    \ another data file on a different mount point for this tablespace.\n\nEnabling\
    \ Default Table Compression within a Tablespace\n\nWhen working with large databases,\
    \ you may want to consider compressing the data. Compressed data results in less\
    \ disk space, less memory, and fewer I/O operations. Queries reading compressed\
    \ data potentially execute faster because fewer blocks are required to satisfy\
    \ the result of the query. But, compression does have a cost; it requires more\
    \ CPU resources, as the data are compressed and uncompressed while reading and\
    \ writing.\n\nWhen creating a tablespace, you can enable data compression features.\
    \ Doing so doesn’t compress the tablespace. Rather, any tables you create within\
    \ the tablespace inherit the compression characteristics of the tablespace. This\
    \ example creates a tablespace with ROW STORE COMPRESS ADVANCED:\n\n```\nCREATE\
    \ TABLESPACE tools_comp\n  DATAFILE '/u01/dbfile/o12c/tools_comp01.dbf'\n  SIZE\
    \ 100m\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512k\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO\n  DEFAULT ROW STORE COMPRESS ADVANCED;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If you’re using Oracle Database 11g, then use the COMPRESS FOR OLTP clause instead\
    \ of ROW STORE COMPRESS ADVANCED.\n\nNow when a table is created within this tablespace,\
    \ it will automatically be created with the ROW STORE COMPRESS ADVANCED feature.\
    \ You can verify the compression characteristics of a tablespace via this query:\n\
    \n```\nselect tablespace_name, def_tab_compression, compress_for from dba_tablespaces;\n\
    ```\n\n![image](Images/sq.jpg) **Tip**   See [Chapter 7](#9781430257288_Ch07.xhtml)\
    \ for full details on table compression.\n\nIf a tablespace is already created,\
    \ you can alter its compression characters, as follows:\n\n```\nSQL> alter tablespace\
    \ tools_comp default row store compress advanced;\n```\n\nHere’s an example that\
    \ alters a tablespace’s default compress to BASIC:\n\n```\nSQL> alter tablespace\
    \ tools_comp default compress basic;\n```\n\nYou can disable tablespace compression\
    \ via the NOCOMPRESS clause:\n\n```\nSQL> alter tablespace tools_comp default\
    \ nocompress;\n```\n\n![image](Images/sq.jpg) **Note**   Most compression features\
    \ require the Enterprise Edition of Oracle and the Advanced Compression option\
    \ (for a fee).\n\nDisplaying Tablespace Size\n\nDBAs often use monitoring scripts\
    \ to alert them when they need to increase the space allocated to a tablespace.\
    \ Depending on whether or not you’re in a pluggable database environment, your\
    \ SQL for determining space usage will vary. For a regular database (nonpluggable),\
    \ you can use the regular DBA-level views to determine space usage. The following\
    \ script displays the percentage of free space left in a tablespace and data file:\n\
    \n```\nSET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP\
    \ ON\nCOMPUTE SUM OF a_byt t_byt f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name\
    \ ON pf\nCOL tablespace_name FOR A17   TRU HEAD 'Tablespace|Name'\nCOL file_name      \
    \ FOR A40   TRU HEAD 'Filename'\nCOL a_byt           FOR 9,990.999 HEAD 'Allocated|GB'\n\
    COL t_byt           FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt          \
    \ FOR 9,990.999 HEAD 'Current|Free GB'\nCOL pct_free        FOR 990.0     HEAD\
    \ 'File %|Free'\nCOL pf              FOR 990.0     HEAD 'Tbsp %|Free'\nCOL seq\
    \ NOPRINT\nDEFINE b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100\
    \ pf, b.file_name file_name,\n  b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt,\n  NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0)\
    \ pct_free\nFROM dba_free_space f, dba_data_files b\n ,(SELECT y.tablespace_name,\
    \ SUM(y.bytes) fs\n   FROM dba_free_space y GROUP BY y.tablespace_name) x\n ,(SELECT\
    \ x.tablespace_name, SUM(x.bytes) ap\n   FROM dba_data_files x GROUP BY x.tablespace_name)\
    \ y\nWHERE f.file_id(+) = b.file_id\nAND   x.tablespace_name(+) = y.tablespace_name\n\
    and   y.tablespace_name =  b.tablespace_name\nAND   f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name,\n  j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt,\n  a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,\n  a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n  ,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n  ,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
    WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\nIf you don’t have any monitoring\
    \ in place, you’re alerted via the SQL statement that is attempting to perform\
    \ an insert or update operation that the tablespace requires more space but isn’t\
    \ able to allocate more. At that point, an ORA-01653 error is thrown, indicating\
    \ the object can’t extend.\n\nAfter you determine that a tablespace needs more\
    \ space, you need to either increase the size of a data file or add a data file\
    \ to the tablespace. See the section “Altering Tablespace Size,” later in this\
    \ chapter, for a discussion of these topics.\n\n![image](Images/sq.jpg) **Tip**  \
    \ See [Chapter 23](#9781430257288_Ch23.xhtml) for full details on reporting on\
    \ space within a pluggable database environment using the container database (CDB)\
    \ level views.\n\nDISPLAYING ORACLE ERROR MESSAGES AND ACTIONS\n\nYou can use\
    \ the oerr utility to quickly display the cause of an error and simple instructions\
    \ on what actions to take; for example,\n\n```\n$ oerr ora 01653\n```\n\nHere\
    \ is the output for this example:\n\n```\n01653, 00000, \"unable to extend table\
    \ %s.%s by %s in tablespace %s\"\n// *Cause:  Failed to allocate an extent of\
    \ the required number of blocks for\n\n//          a table segment in the tablespace\
    \ indicated.\n\n// *Action: Use ALTER TABLESPACE ADD DATAFILE statement to add\
    \ one or more\n\n//          files to the tablespace indicated.\n```\n\nThe oerr\
    \ utility’s output gives you a fast and easy way to triage problems. If the information\
    \ provided isn’t enough, then Google is a good second option.\n\nAltering Tablespace\
    \ Size\n\nWhen you’ve determined which data file you want to resize, first make\
    \ sure you have enough disk space to increase the size of the data file on the\
    \ mount point on which the data file exists:\n\n```\n$ df -h | sort\n```\n\nUse\
    \ the ALTER DATABASE DATAFILE . . . RESIZE command to increase the data file’s\
    \ size. This example resizes the data file to 1GB:\n\n```\nSQL> alter database\
    \ datafile '/u01/dbfile/o12c/users01.dbf' resize 1g;\n```\n\nIf you don’t have\
    \ space on an existing mount point to increase the size of a data file, then you\
    \ must add a data file. To add a data file to an existing tablespace, use the\
    \ ALTER TABLESPACE . . . ADD DATAFILE statement:\n\n```\nSQL> alter tablespace\
    \ users\n     add datafile '/u02/dbfile/o12c/users02.dbf' size 100m;\n```\n\n\
    With bigfile tablespaces, you have the option of using the ALTER TABLESPACE statement\
    \ to resize the data file. This works because only one data file can be associated\
    \ with a bigfile tablespace:\n\n```\nSQL> alter tablespace inv_big_data resize\
    \ 1T;\n```\n\nResizing data files can be a daily task when you’re managing databases\
    \ with heavy transaction loads. Increasing the size of an existing data file allows\
    \ you to add space to a tablespace without adding more data files. If there isn’t\
    \ enough disk space left on the storage device that contains an existing data\
    \ file, you can add a data file in a different location to an existing tablespace.\n\
    \nTo add space to a temporary tablespace, first query the V$TEMPFILE view to verify\
    \ the current size and location of temporary data files:\n\n```\nSQL> select name,\
    \ bytes from v$tempfile;\n```\n\nThen, use the TEMPFILE option of the ALTER DATABASE\
    \ statement:\n\n```\nSQL> alter database tempfile '/u01/dbfile/o12c/temp01.dbf'\
    \ resize 500m;\n```\n\nYou can also add a file to a temporary tablespace via the\
    \ ALTER TABLESPACE statement:\n\n```\nSQL> alter tablespace temp add tempfile\
    \ '/u01/dbfile/o12c/temp02.dbf' size 5000m;\n```\n\nToggling Data Files Offline\
    \ and Online\n\nSometimes, when you’re performing maintenance operations (such\
    \ as renaming data files), you may need to first take a data file offline. You\
    \ can use either the ALTER TABLESPACE or the ALTER DATABASE DATAFILE statement\
    \ to toggle data files offline and online.\n\n![image](Images/sq.jpg) **Tip**  \
    \ As of Oracle Database 12c, you can move and rename data files while they are\
    \ online and open for use. See “Renaming or Relocating a Data File,” later in\
    \ this chapter, for a discussion of this.\n\nUse the ALTER TABLESPACE . . . OFFLINE\
    \ NORMAL statement to take a tablespace and its associated data files offline.\
    \ You don’t need to specify NORMAL, because it’s the default:\n\n```\nSQL> alter\
    \ tablespace users offline;\n```\n\nWhen you place a tablespace offline in normal\
    \ mode, Oracle performs a checkpoint on the data files associated with the tablespace.\
    \ This ensures that all modified blocks in memory that are associated with the\
    \ tablespace are flushed and written to the data files. You don’t need to perform\
    \ media recovery when you bring the tablespace and its associated data files back\
    \ online.\n\nYou can’t use the ALTER TABLESPACE statement to place tablespaces\
    \ offline when the database is in mount mode. If you attempt to take a tablespace\
    \ offline while the database is mounted (but not open), you receive the following\
    \ error:\n\n```\nORA-01109: database not open\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ When in mount mode, you must use the ALTER DATABASE DATAFILE statement to take\
    \ a data file offline.\n\nWhen taking a tablespace offline, you can also specify\
    \ ALTER TABLESPACE . . . OFFLINE TEMPORARY. In this scenario, Oracle initiates\
    \ a checkpoint on all data files associated with the tablespace that are online.\
    \ Oracle doesn’t initiate a checkpoint on offline data files associated with the\
    \ tablespace.\n\nYou can specify ALTER TABLESPACE . . . OFFLINE IMMEDIATE when\
    \ taking a tablespace offline. Your database must be in archivelog mode in this\
    \ situation, or the following error is thrown:\n\n```\nORA-01145: offline immediate\
    \ disallowed unless media recovery enabled\n```\n\nWhen using OFFLINE IMMEDIATE,\
    \ Oracle doesn’t issue a checkpoint on the data files. You must perform media\
    \ recovery on the tablespace before bringing it back online.\n\n![image](Images/sq.jpg) **Note**  \
    \ You can’t take the SYSTEM or UNDO tablespace offline while the database is open.\n\
    \nYou can also use the ALTER DATABASE DATAFILE statement to take a data file offline.\
    \ If your database is open for use, then it must be in archivelog mode in order\
    \ for you to take a data file offline with the ALTER DATABASE DATAFILE statement.\
    \ If you attempt to take a data file offline using the ALTER DATABASE DATAFILE\
    \ statement, and your database isn’t in archivelog mode, the ORA-01145 error is\
    \ thrown.\n\nIf your database isn’t in archivelog mode, you must specify ALTER\
    \ DATABASE DATAFILE . . . OFFLINE FOR DROP when taking a data file offline. You\
    \ can specify the entire file name or provide the file number. In this example,\
    \ data file 4 is taken offline:\n\n```\nSQL> alter database datafile 4 offline\
    \ for drop;\n```\n\nNow, if you attempt to bring online the offline data file,\
    \ you receive the following error:\n\n```\nSQL> alter database datafile 4 online;\n\
    ORA-01113: file 4 needs media recovery\n```\n\nWhen you use the OFFLINE FOR DROP\
    \ clause, no checkpoint is taken on the data file. This means you need to perform\
    \ media recovery on the data file before bringing it online. Performing media\
    \ recovery applies any changes to the data file that are recorded in the online\
    \ redo logs that aren’t in the data files themselves. Before you can bring online\
    \ a data file that was taken offline with the OFFLINE FOR DROP clause, you must\
    \ perform media recovery on it. You can specify either the entire file name or\
    \ the file number:\n\n```\nSQL> recover datafile 4;\n```\n\nIf the redo information\
    \ that Oracle needs is contained in the online redo logs, you should see this\
    \ message:\n\n```\nMedia recovery complete.\n```\n\nIf your database isn’t in\
    \ archivelog mode, and if Oracle needs redo information not contained in the online\
    \ redo logs to recover the data file, then you can’t recover the data file and\
    \ place it back online.\n\nIf your database is in archivelog mode, you can take\
    \ it offline without the FOR DROP clause. In this scenario, Oracle overlooks the\
    \ FOR DROP clause. Even when your database is in archivelog mode, you need to\
    \ perform media recovery on a data file that has been taken offline with the ALTER\
    \ DATABASE DATAFILE statement. [Table 4-3](#9781430257288_Ch04.xhtml#Tab3) summarizes\
    \ the options you must consider when taking a tablespace/data files offline.\n\
    \n![image](Images/sq.jpg) **Note**   While the database is in mount mode (and\
    \ not open), you can use the ALTER DATABASE DATAFILE command to take any data\
    \ file offline, including SYSTEM and UNDO.\n\n[Table 4-3.](#9781430257288_Ch04.xhtml#_Tab3)\
    \ Options for Taking Tablespaces/Data Files Offline\n\n![Table4-3.jpg](Images/Table4-3.jpg)\n\
    \nRenaming or Relocating a Data File\n\nYou may occasionally need to move or rename\
    \ a data file. For example, you may need to move data files because of changes\
    \ in the storage devices or because the files were created in the wrong location\
    \ or with a nonstandard name. As of Oracle Database 12c, you have the option of\
    \ renaming or moving data files, or both, while they are online. Otherwise, you\
    \ will have to take data files offline for maintenance operations.\n\nPerforming\
    \ Online Data File Operations\n\nNew in Oracle Database 12c is the ALTER DATABASE\
    \ MOVE DATAFILE command. This command allows you to rename or move data files\
    \ without any downtime. This vastly simplifies the task of moving or renaming\
    \ a data file, as there is no need to manually place data files offline/online\
    \ and use OS commands to physically move the files. This once manually intensive\
    \ (and error-prone) operation has now been simplified to a single SQL command.\n\
    \nA data file must be online for the online move or rename to work. Here is an\
    \ example of renaming an online data file:\n\n```\nSQL> alter database move datafile\
    \ '/u01/dbfile/o12c/users01.dbf' to\n     '/u01/dbfile/o12c/users_dev01.dbf';\n\
    ```\n\nHere is an example of moving a data file to a new mount point:\n\n```\n\
    SQL> alter database move datafile '/u01/dbfile/o12c/system01.dbf' to\n     '/u02/dbfile/o12c/system01.dbf';\n\
    ```\n\nYou can also specify the data file number when renaming or moving a data\
    \ file; for example,\n\n```\nSQL> alter database move datafile 2 to '/u02/dbfile/o12c/sysuax01.dbf';\n\
    ```\n\nIn the previous example, you are specifying that data file 2 be moved.\n\
    \nIf you’re moving a data file and, for any reason, want to keep a copy of the\
    \ original file, you can use the KEEP option:\n\n```\nSQL> alter database move\
    \ datafile 4 to '/u02/dbfile/o12c/users01.dbf' keep;\n```\n\nYou can specify the\
    \ REUSE clause to overwrite an existing file:\n\n```\nSQL> alter database move\
    \ datafile 4 to '/u01/dbfile/o12c/users01.dbf' reuse;\n```\n\nOracle will not\
    \ allow you to overwrite (reuse) a data file that is currently being used by the\
    \ database. That’s a good thing.\n\nPerforming Offline Data File Operations\n\n\
    If you are using Oracle Database 11g or lower, before you rename or move a data\
    \ file, you must take the data file offline. There are two somewhat different\
    \ approaches to moving and renaming offline data files:\n\n*   Use a combination\
    \ of SQL commands and OS commands.\n*   Use a combination of re-creating the control\
    \ file and OS commands.\n\nThese two techniques are discussed in the next two\
    \ bsections.\n\nUsing SQL and OS Commands\n\nHere are the steps for renaming a\
    \ data file using SQL commands and OS commands:\n\n1.  Use the following query\
    \ to determine the names of existing data files:\n\n    ```\n    SQL> select name\
    \ from v$datafile;\n    ```\n\n2.  Take the data file offline, using either the\
    \ ALTER TABLESPACE or ALTER DATABASE DATAFILE statement (see the previous section,\
    \ \"Performing Offline Data File Operations,\" for details on how to do this).\
    \ You can also shut down your database and then start it in mount mode; the data\
    \ files can be moved while in this mode because they aren't open for use.\n3.\
    \  Physically move the data file to the new location, using either an OS command\
    \ (like mv or cp) or the COPY_FILE procedure of the DBMS_FILE_TRANSFER built-in\
    \ PL/SQL package.\n4.  Use either the ALTER TABLESPACE . . . RENAME DATAFILE .\
    \ . . TO statement or the ALTER DATABASE RENAME FILE . . . TO statement to update\
    \ the control file with the new data file name.\n5.  Alter the data file online.\n\
    \n![image](Images/sq.jpg) **Note**   If you need to rename data files associated\
    \ with the SYSTEM or UNDO tablespace, you must shut down your database and start\
    \ it in mount mode. When your database is in mount mode, you can rename these\
    \ data files via the ALTER DATABASE RENAME FILE statement.\n\nThe following example\
    \ demonstrates how to move the data files associated with a single tablespace.\
    \ First, take the data files offline with the ALTER TABLESPACE statement:\n\n\
    ```\nSQL> alter tablespace users offline;\n```\n\nNow, from the OS prompt, move\
    \ the data files to a new location, using the Linux/Unix mv command:\n\n```\n\
    $ mv /u01/dbfile/o12c/users01.dbf /u02/dbfile/o12c/users01.dbf\n```\n\nUpdate\
    \ the control file with the ALTER TABLESPACE statement:\n\n```\nalter tablespace\
    \ users\nrename datafile\n'/u01/dbfile/o12c/users01.dbf'\nto\n'/u02/dbfile/o12c/users01.dbf';\n\
    ```\n\nFinally, bring the data files within the tablespace back online:\n\n```\n\
    SQL> alter tablespace users online;\n```\n\nIf you want to rename data files from\
    \ multiple tablespaces in one operation, you can use the ALTER DATABASE RENAME\
    \ FILE statement (instead of the ALTER TABLESPACE. . .RENAME DATAFILE statement).\
    \ The following example renames several data files in the database. Because the\
    \ SYSTEM and UNDO tablespaces’ data files are being moved, you must shut down\
    \ the database first and then place it in mount mode:\n\n```\nSQL> conn / as sysdba\n\
    SQL> shutdown immediate;\nSQL> startup mount;\n```\n\nBecause the database is\
    \ in mount mode, the data files aren’t open for use, and thus there is no need\
    \ to take the data files offline. Next, physically move the files via the Linux/Unix\
    \ mv command:\n\n```\n$ mv /u01/dbfile/o12c/system01.dbf /u02/dbfile/o12c/system01.dbf\n\
    $ mv /u01/dbfile/o12c/sysaux01.dbf /u02/dbfile/o12c/sysaux01.dbf\n$ mv /u01/dbfile/o12c/undotbs01.dbf\
    \ /u02/dbfile/o12c/undotbs01.dbf\n```\n\n![image](Images/sq.jpg) **Note**   You\
    \ must move the files before you update the control file. The ALTER DATABASE RENAME\
    \ FILE command expects the file to be in the renamed location. If the file isn’t\
    \ there, an error is thrown: ORA-27037: unable to obtain file status.\n\nNow,\
    \ you can update the control file to be aware of the new file name:\n\n```\nalter\
    \ database rename file\n'/u01/dbfile/o12c/system01.dbf',\n'/u01/dbfile/o12c/sysaux01.dbf',\n\
    '/u01/dbfile/o12c/undotbs01.dbf'\nto\n'/u02/dbfile/o12c/system01.dbf',\n'/u02/dbfile/o12c/sysaux01.dbf',\n\
    '/u02/dbfile/o12c/undotbs01.dbf';\n```\n\nYou should be able to open your database:\n\
    \n```\nSQL> alter database open;\n```\n\nRe-Creating the Control File and OS Commands\n\
    \nAnother way you can relocate all data files in a database is to use a combination\
    \ of a re-created control file and OS commands. The steps for this operation are\
    \ as follows:\n\n1.  Create a trace file that contains a CREATE CONTROLFILE statement.\n\
    2.  Modify the trace file to display the new location of the data files.\n3. \
    \ Shut down the database.\n4.  Physically move the data files, using an OS command.\n\
    5.  Start the database in nomount mode.\n6.  Run the CREATE CONTROLFILE command.\n\
    \n![image](Images/sq.jpg) **Note**   When you re-create a control file, be aware\
    \ that anyRMAN information that was contained in the file will be lost. If you’re\
    \ not using a recovery catalog, you can repopulate the control file with RMAN\
    \ backup information, using the RMAN CATALOG command.\n\nThe following example\
    \ walks through the previous steps. First, you write a CREATE CONTROLFILE statement\
    \ to a trace file via an ALTER DATABASE BACKUP CONTROLFILE TO TRACE statement:\n\
    \n```\nSQL> alter database backup controlfile to trace as '/tmp/mv.sql' noresetlogs;\n\
    ```\n\nThere are a couple of items to note about the prior statement. First, a\
    \ file named mv.sql is created in the /tmp directory; this file contains a CREATE\
    \ CONTROLFILE statement. Second, the prior statement uses the NORESETLOGS clause;\
    \ this instructs Oracle to write only one SQL statement to the trace file. If\
    \ you don’t specify NORESETLOGS, Oracle writes two SQL statements to the trace\
    \ file: one to re-create the control file with the NORESETLOGS option and one\
    \ to re-create the control file with RESETLOGS. Normally, you know whether you\
    \ want to reset the online redo logs as part of re-creating the control file.\
    \ In this case, you know that you don’t need to reset the online redo logs when\
    \ you re-create the control file (because the online redo logs haven’t been damaged\
    \ and are still in the normal location for the database).\n\nNext, edit the /tmp/mv.sql\
    \ file, and change the names of the directory paths to the new locations. Here\
    \ is a CREATE CONTROLFILE statement for this example:\n\n```\nCREATE CONTROLFILE\
    \ REUSE DATABASE \"O12C\" NORESETLOGS  NOARCHIVELOG\n    MAXLOGFILES 16\n    MAXLOGMEMBERS\
    \ 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY 876\nLOGFILE\n\
      GROUP 1 (\n    '/u01/oraredo/o12c/redo01a.rdo',\n    '/u02/oraredo/o12c/redo01b.rdo'\n\
      ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/u01/oraredo/o12c/redo02a.rdo',\n\
        '/u02/oraredo/o12c/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n\
        '/u01/oraredo/o12c/redo03a.rdo',\n    '/u02/oraredo/o12c/redo03b.rdo'\n  )\
    \ SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/u01/dbfile/o12c/system01.dbf',\n  '/u01/dbfile/o12c/sysaux01.dbf',\n\
      '/u01/dbfile/o12c/undotbs01.dbf',\n  '/u01/dbfile/o12c/users01.dbf'\nCHARACTER\
    \ SET AL32UTF8;\n```\n\nNow, shut down the database:\n\n```\nSQL> shutdown immediate;\n\
    ```\n\nPhysically move the files from the OS prompt. This example uses the Linux/Unix\
    \ mv command to move the files:\n\n```\n$ mv /u02/dbfile/o12c/system01.dbf /u01/dbfile/o12c/system01.dbf\n\
    $ mv /u02/dbfile/o12c/sysaux01.dbf /u01/dbfile/o12c/sysaux01.dbf\n$ mv /u02/dbfile/o12c/undotbs01.dbf\
    \ /u01/dbfile/o12c/undotbs01.dbf\n$ mv /u02/dbfile/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf\n\
    ```\n\nStart up the database in nomount mode:\n\n```\nSQL> startup nomount;\n\
    ```\n\nThen, execute the file that contains the CREATE CONTROLFILE statement (in\
    \ this example, mv.sql):\n\n```\nSQL> @/tmp/mv.sql\n```\n\nIf the statement is\
    \ successful, you see the following message:\n\n```\nControl file created.\n```\n\
    \nFinally, alter your database open:\n\n```\nSQL> alter database open;\n```\n\n\
    Summary\n\nThis chapter discussed managing tablespaces and data files. Tablespaces\
    \ are logical containers for a group of data files. Data files are the physical\
    \ files on disk that contain data. You should plan carefully when creating tablespaces\
    \ and the corresponding data files.\n\nTablespaces allow you to separate the data\
    \ of different applications. You can also separate tables from indexes. These\
    \ allow you to customize storage characteristics of the tablespace for each application.\
    \ Furthermore, tablespaces provide a way to better manage applications that have\
    \ different availability and backup and recovery requirements. As a DBA you must\
    \ be proficient in managing tablespaces and data files. In any type of environment,\
    \ you have to add, rename, relocate, and drop these storage containers.\n\nOracle\
    \ requires three types of files for a database to operate: data files, control\
    \ files, and online redo log files. The next chapter focuses on control file and\
    \ online redo log file management.\n\nCHAPTER 5\n\n![image](Images/frontdot.jpg)\n\
    \nManaging Control Files, Online Redo Logs, and Archiving\n\nAn Oracle database\
    \ consists of three types of mandatory files: data files, control files, and online\
    \ redo logs. [Chapter 4](#9781430257288_Ch04.xhtml) focused on tablespaces and\
    \ data files. This chapter looks at managing control files and online redo logs\
    \ and implementing archiving (of the online redo logs). The first part of the\
    \ chapter discusses typical control file maintenance tasks, such adding, moving,\
    \ and removing control files. The middle part of the chapter examines DBA activities\
    \ related to online redo log files, such as renaming, adding, dropping, and relocating\
    \ these critical files. Finally, the architectural aspects of enabling and implementing\
    \ archiving are covered.\n\nManaging Control Files\n\nA control file is a small\
    \ binary file that stores the following types of information:\n\n*   Database\
    \ name\n*   Names and locations of data files\n*   Names and locations of online\
    \ redo log files\n*   Current online redo log sequence number\n*   Checkpoint\
    \ information\n*   Names and locations of RMAN backup files (if using)\n\nYou\
    \ can query much of the information stored in the control file from data dictionary\
    \ views. This example displays the types of information stored in the control\
    \ file by querying V$CONTROLFILE_RECORD_SECTION:\n\n```\nSQL> select distinct\
    \ type from v$controlfile_record_section;\n```\n\nHere is a partial listing of\
    \ the output:\n\n```\nTYPE\n\nFILENAME\nTABLESPACE\nRMAN CONFIGURATION\nBACKUP\
    \ CORRUPTION\nPROXY COPY\nFLASHBACK LOG\nREMOVABLE RECOVERY FILES\nAUXILIARY DATAFILE\
    \ COPY\nDATAFILE\n```\n\nYou can view database-related information stored in the\
    \ control file via the V$DATABASE view:\n\n```\nSQL> select name, open_mode, created,\
    \ current_scn from v$database;\n```\n\nHere is the output for this example:\n\n\
    ```\nNAME      OPEN_MODE            CREATED   CURRENT_SCN\n--------- --------------------\
    \ --------- -----------\nO12C      READ WRITE           28-SEP-12     2573820\n\
    ```\n\nEvery Oracle database must have at least one control file. When you start\
    \ your database in nomount mode, the instance is aware of the location of the\
    \ control files from the CONTROL_FILES initialization parameter in the spfile\
    \ or init.ora file. When you issue a STARTUP NOMOUNT command, Oracle reads the\
    \ parameter file and starts the background processes and allocates memory structures:\n\
    \n```\n-- locations of control files are known to the instance\nSQL> startup nomount;\n\
    ```\n\nAt this point, the control files haven’t been touched by any processes.\
    \ When you alter your database into mount mode, the control files are read and\
    \ opened for use:\n\n```\n-- control files opened\nSQL> alter database mount;\n\
    ```\n\nIf any of the control files listed in the CONTROL_FILES initialization\
    \ parameter aren’t available, then you can’t mount your database.\n\nWhen you\
    \ successfully mount your database, the instance is aware of the locations of\
    \ the data files and online redo logs but hasn’t yet opened them. After you alter\
    \ your database into open mode, the data files and online redo logs are opened:\n\
    \n```\n-- datafiles and online redo logs opened\nSQL> alter database open;\n```\n\
    \n![image](Images/sq.jpg) **Note**   Keep in mind that when you issue the STARTUP\
    \ command (with no options), the previously described three phases are automatically\
    \ performed in this order: nomount, mount, open. When you issue a SHUTDOWN command,\
    \ the phases are reversed: close the database, unmount the control file, stop\
    \ the instance.\n\nThe control file is created when the database is created. As\
    \ you saw in [Chapter 2](#9781430257288_Ch02.xhtml), you should create at least\
    \ two control files when you create your database (to avoid a single point of\
    \ failure). If possible you should have multiple control files stored on separate\
    \ storage devices controlled by separate controllers.\n\nAfter the database has\
    \ been opened, Oracle will frequently write information to the control files,\
    \ such as when you make any physical modifications (e.g., creating a tablespace,\
    \ adding/removing/resizing a data file). Oracle writes to all control files specified\
    \ by the CONTROL_FILES initialization parameter. If Oracle can’t write to one\
    \ of the control files, an error is thrown:\n\n```\nORA-00210: cannot open the\
    \ specified control file\n```\n\nIf one of your control files becomes unavailable,\
    \ shut down your database, and resolve the issue before restarting (see [Chapter\
    \ 19](#9781430257288_Ch19.xhtml) for using RMAN to restore a control file). Fixing\
    \ the problem may mean resolving a storage-device failure or modifying the CONTROL_FILES\
    \ initialization parameter to remove the control file entry for the control file\
    \ that isn’t available.\n\nDISPLAYING THE CONTENTS OF A CONTROL FILE\n\nYou can\
    \ use the ALTER SESSION statement to display the physical contents of the control\
    \ file; for example,\n\n```\nSQL> oradebug setmypid\nSQL> oradebug unlimit\nSQL>\
    \ alter session set events 'immediate trace name controlf level 9';\nSQL> oradebug\
    \ tracefile_name\n```\n\nThe prior line of code displays the following name of\
    \ the trace file:\n\n```\n/ora01/app/oracle/diag/rdbms/o12c/o12c/trace/o12c_ora_4153.trc\n\
    ```\n\nIn Oracle Database 11g and above, the trace file is written to the $ADR_HOME/trace\
    \ directory. You can also view the trace directory name via this query:\n\nSQL>\
    \ select value from v$diag_info where name='Diag Trace';\n\nIn Oracle 10g and\
    \ below, the trace directory is defined by the USER_DUMP_DEST initialization parameter.\n\
    \nHere is a partial listing of the contents of the trace file:\n\n***************************************************************************\n\
    \nDATABASE ENTRY\n\n***************************************************************************\n\
    \n```\n(size = 316, compat size = 316, section max = 1, section in-use = 1,\n\
      last-recid= 0, old-recno = 0, last-recno = 0)\n(extent = 1, blkno = 1, numrecs\
    \ = 1)\n09/28/2012 16:04:54\nDB Name \"O12C\"\nDatabase flags = 0x00404001 0x00001200\n\
    Controlfile Creation Timestamp  09/28/2012 16:04:57\nIncmplt recovery scn: 0x0000.00000000\n\
    ```\n\nYou can inspect the contents of the control file when troubleshooting or\
    \ when you’re trying to gain a better understanding of Oracle internals.\n\nViewing\
    \ Control File Names and Locations\n\nIf your database is in a nomount state,\
    \ a mounted state, or an open state, you can view the names and locations of the\
    \ control files, as follows:\n\n```\nSQL> show parameter control_files\n```\n\n\
    You can also view control file location and name information by querying the V$CONTROLFILEview.\
    \ This query works while your database is mounted or open:\n\n```\nSQL> select\
    \ name from v$controlfile;\n```\n\nIf, for some reason, you can’t start your database\
    \ at all, and you need to know the names and locations of the control files, you\
    \ can inspect the contents of the initialization (parameter) file to see where\
    \ they’re located. If you’re using an spfile, even though it’s a binary file,\
    \ you can still open it with a text editor. The safest approach is to make a copy\
    \ of the spfile and then inspect its contents with an OS editor:\n\n```\n$ cp\
    \ $ORACLE_HOME/dbs/spfileo12c.ora $ORACLE_HOME/dbs/spfileo12c.copy\n$ vi $ORACLE_HOME/dbs/spfileo12c.copy\n\
    ```\n\nYou can also use the strings command to search for values in a binary file:\n\
    \n```\n$ strings spfileo12c.ora | grep -i control_files\n```\n\nIf you’re using\
    \ a text-based initialization file, you can view the file directly, with an OS\
    \ editor, or use the grep command:\n\n```\n$ grep -i control_files $ORACLE_HOME/dbs/inito12c.ora\n\
    ```\n\nAdding a Control File\n\nAdding a control file means copying an existing\
    \ control file and making your database aware of the copy by modifying your CONTROL_FILES\
    \ parameter. This task must be done while your database is shut down. This procedure\
    \ only works when you have a good existing control file that can be copied. Adding\
    \ a control file isn’t the same thing as creating or restoring a control file.\n\
    \n![image](Images/sq.jpg) **Tip**   See [Chapter 4](#9781430257288_Ch04.xhtml)\
    \ for an example of re-creating a control file for the purpose of renaming and\
    \ moving data files. See [Chapter 19](#9781430257288_Ch19.xhtml) for an example\
    \ of re-creating a control file for the purpose of renaming a database.\n\nIf\
    \ your database uses only one control file, and that control file becomes damaged,\
    \ you need to either restore a control file from a backup (if available) and perform\
    \ a recovery or re-create the control file. If you’re using two or more control\
    \ files, and one becomes damaged, you can use the remaining good control file(s)\
    \ to quickly get your database into an operating state.\n\nIf a database is using\
    \ only one control file, the basic procedure for adding a control file is as follows:\n\
    \n1.  Alter the initialization file CONTROL_FILES parameter to include the new\
    \ location and name of the control file.\n2.  Shut down your database.\n3.  Use\
    \ an OS command to copy an existing control file to the new location and name.\n\
    4.  Restart your database.\n\nDepending on whether you use an spfile or an init.ora\
    \ file, the previous steps vary slightly. The next two sections detail these different\
    \ scenarios.\n\nSpfile Scenario\n\nIf your database is open, you can quickly determine\
    \ whether you’re using an spfile with the following SQL statement:\n\n```\nSQL>\
    \ show parameter spfile\n```\n\nHere is some sample output:\n\n```\nNAME                                \
    \ TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
    spfile                               string      /ora01/app/oracle/product/12.1\n\
                                                     .0.1/db_1/dbs/spfileo12c.ora\n\
    ```\n\nWhen you’ve determined that you’re using an spfile, use the following steps\
    \ to add a control file:\n\n1.  Determine the CONTROL_FILES parameter’s current\
    \ value:\n\n    SQL> show parameter control_files\n\n    The output shows that\
    \ this database is using only one control file:\n\n    ```\n    NAME                                \
    \ TYPE        VALUE\n    ------------------------------------ ----------- ------------------------------\n\
    \    control_files                        string      /u01/dbfile/o12c/control01.ctl\n\
    \    ```\n\n2.  Alter your CONTROL_FILES parameter to include the new control\
    \ file that you want to add, but limit the scope of the operation to the spfile\
    \ (you can’t modify this parameter in memory). Make sure you also include any\
    \ control files listed in step 1:\n\n    ```\n    SQL> alter system set control_files='/u01/dbfile/o12c/control01.ctl',\n\
    \    '/u01/dbfile/o12c/control02.ctl' scope=spfile;\n    ```\n\n3.  Shut down\
    \ your database:\n\n    SQL> shutdown immediate;\n\n4.  Copy an existing control\
    \ file to the new location and name. In this example a new control file named\
    \ control02.ctl is created via the OS cp command:\n\n    $ cp /u01/dbfile/o12c/control01.ctl\
    \ /u01/dbfile/o12c/control02.ctl\n\n5.  Start up your database:\n\n    ```\n \
    \   SQL> startup;\n    ```\n\nYou can verify that the new control file is being\
    \ used by displaying the CONTROL_FILES parameter:\n\n```\nSQL> show parameter\
    \ control_files\n```\n\nHere is the output for this example:\n\n```\nNAME                      \
    \ TYPE        VALUE\n-------------------------- ----------- ------------------------------\n\
    control_files              string      /u01/dbfile/o12c/control01.ctl\n                                              \
    \ ,/u01/dbfile/o12c/control02.ctl\n```\n\nInit.ora Scenario\n\nRun the following\
    \ statement to verify that you’re using an init.ora file. If you’re not using\
    \ an spfile, the VALUE column is blank:\n\n```\nSQL> show parameter spfile\nNAME                                \
    \ TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
    spfile                               string\n```\n\nTo add a control file when\
    \ using a text init.ora file, perform the following steps:\n\n1.  Shut down your\
    \ database:\n\n    ```\n    SQL> shutdown immediate;\n    ```\n\n2.  Edit your\
    \ init.ora file with an OS utility (such as vi), and add the new control file\
    \ location and name to the CONTROL_FILES parameter. This example opens the init.ora\
    \ file, using vi, and adds control02.ctl to the CONTROL_FILES parameter:\n\n \
    \   ```\n    $ vi $ORACLE_HOME/dbs/inito12c.ora\n    ```\n\n    Listed next is\
    \ the CONTROL_FILES parameter after control02.ctl is added:\n\n    ```\n    control_files='/u01/dbfile/o12c/control01.ctl',\n\
    \                  '/u01/dbfile/o12c/control02.ctl'\n    ```\n\n3.  From the OS,\
    \ copy the existing control file to the location, and name of the control file\
    \ being added:\n\n    ```\n    $ cp /u01/dbfile/o12c/control01.ctl /u01/dbfile/o12c/control02.ctl\n\
    \    ```\n\n4.  Start up your database:\n\n    ```\n    SQL> startup;\n    ```\n\
    \nYou can view the control files in use by displaying the CONTROL_FILES parameter:\n\
    \n```\nSQL> show parameter control_files\n```\n\nFor this example, here is the\
    \ output:\n\n```\nNAME                       TYPE        VALUE\n--------------------------\
    \ ----------- ------------------------------\ncontrol_files              string      /u01/dbfile/o12c/control01.ctl\n\
                                           ,/u01/dbfile/o12c/control02.ctl\n```\n\n\
    Moving a Control File\n\nYou may occasionally need to move a control file from\
    \ one location to another. For example, if new storage is added to the database\
    \ server, you may want to move an existing control file to the newly available\
    \ location.\n\nThe procedure for moving a control file is very similar to adding\
    \ a control file. The only difference is that you rename the control file instead\
    \ of copying it. This example shows how to move a control file when you’re using\
    \ an spfile:\n\n1.  Determine the CONTROL_FILES parameter’s current value:\n\n\
    \    ```\n    SQL> show parameter control_files\n    ```\n\n    The output shows\
    \ that this database is using only one control file:\n\n    ```\n    NAME                                \
    \ TYPE        VALUE\n    ------------------------------------ ----------- ------------------------------\n\
    \    control_files                        string      /u01/dbfile/o12c/control01.ctl\n\
    \    ```\n\n2.  Alter your CONTROL_FILES parameter to reflect that you’re moving\
    \ a control file. In this example the control file is currently in this location:\n\
    \n    ```\n    /u01/dbfile/o12c/control01.ctl\n    ```\n\n    You’re moving the\
    \ control file to this location:\n\n    ```\n    /u02/dbfile/o12c/control01.ctl\n\
    \    ```\n\n    Alter the spfile to reflect the new location for the control file.\
    \ You have to specify SCOPE=SPFILE because the CONTROL_FILES parameter can’t be\
    \ modified in memory:\n\n    ```\n    SQL> alter system set\n         control_files='/u02/dbfile/o12c/control01.ctl'\
    \ scope=spfile;\n    ```\n\n3.  Shut down your database:\n\n    ```\n    SQL>\
    \ shutdown immediate;\n    ```\n\n4.  At the OS prompt, move the control file\
    \ to the new location. This example uses the OS mv command:\n\n    ```\n    $\
    \ mv /u01/dbfile/o12c/control01.ctl /u02/dbfile/o12c/control01.ctl\n    ```\n\n\
    5.  Start up your database:\n\n    ```\n    SQL> startup;\n    ```\n\nYou can\
    \ verify that the new control file is being used by displaying the CONTROL_FILES\
    \ parameter:\n\n```\nSQL> show parameter control_files\n```\n\nHere is the output\
    \ for this example:\n\n```\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- ------------------------------\n\
    control_files                        string      /u02/dbfile/o12c/control01.ctl\n\
    ```\n\nRemoving a Control File\n\nYou may run into a situation in which you experience\
    \ a media failure with a storage device that contains one of your multiplexed\
    \ control files:\n\n```\nORA-00205: error in identifying control file, check alert\
    \ log for more info\n```\n\nIn this scenario, you still have at least one good\
    \ control file. To remove a control file, follow these steps:\n\n1.  Identify\
    \ which control file has experienced media failure by inspecting the alert.log\
    \ for information:\n\n    ```\n    ORA-00210: cannot open the specified control\
    \ file\n    ORA-00202: control file: '/u01/dbfile/o12c/control02.ctl'\n    ```\n\
    \n2.  Remove the unavailable control file name from the CONTROL_FILES parameter.\
    \ If you’re using an init.ora file, modify the file directly with an OS editor\
    \ (such as vi). If you’re using an spfile, modify the CONTROL_FILES parameter\
    \ with the ALTER SYSTEM statement. In this spfile example the control02.ctl control\
    \ file is removed from the CONTROL_FILES parameter:\n\n    ```\n    SQL> alter\
    \ system set control_files='/u01/dbfile/o12c/control01.ctl'\n         scope=spfile;\n\
    \    ```\n\n3.  This database now has only one control file associated with it.\
    \ You should never run a production database with just one control file. See the\
    \ section “Adding a Control File,” earlier in this chapter, for details on how\
    \ to add more control files to your database.\n4.  Stop and start your database:\n\
    \n    ```\n    SQL> shutdown immediate;\n    SQL> startup;\n    ```\n\n![image](Images/sq.jpg) **Note**  \
    \ If SHUTDOWN IMMEDIATE doesn’t work, use SHUTDOWN ABORT to shut down your database.\
    \ There’s nothing wrong with using SHUTDOWN ABORT to quickly close a database\
    \ when SHUTDOWN IMMEDIATE hangs.\n\nManaging Online Redo Logs\n\nOnline redo logs\
    \ store a record of transactions that have occurred in your database. These logs\
    \ serve the following purposes:\n\n*   Provide a mechanism for recording changes\
    \ to the database so that in the event of a media failure, you have a method of\
    \ recovering transactions.\n*   Ensure that in the event of total instance failure,\
    \ committed transactions can be recovered (crash recovery) even if committed data\
    \ changes have not yet been written to the data files.\n*   Allow administrators\
    \ to inspect historical database transactions through the Oracle LogMiner utility.\n\
    *   They are read by Oracle tools such as GoldenGate or Streams to replicate data.\n\
    \nYou’re required to have at least two online redo log groups in your database.\
    \ Each online redo log group must contain at least one online redo log member.\
    \ The member is the physical file that exists on disk. You can create multiple\
    \ members in each redo log group, which is known as multiplexing your online redo\
    \ log group.\n\n![image](Images/sq.jpg) **Tip**   I highly recommend that you\
    \ multiplex your online redo log groups and, if possible, have each member on\
    \ a separate physical device governed by a separate controller.\n\nThe log writer\
    \ is the background process responsible for writing transaction information from\
    \ the redo log buffer (in the SGA) to the online redo log files (on disk). Log\
    \ writer flushes the contents of the redo log buffer when any of the following\
    \ are true:\n\n*   A COMMIT is issued.\n*   A log switch occurs.\n*   Three seconds\
    \ go by.\n*   The redo log buffer is one-third full.\n*   The redo log buffer\
    \ fills to one megabyte.\n\nThe online redo log group that the log writer is actively\
    \ writing to is the current online redo log group. The log writer writes simultaneously\
    \ to all members of a redo log group. The log writer needs to successfully write\
    \ to only one member in order for the database to continue operating. The database\
    \ ceases operating if the log writer can’t write successfully to at least one\
    \ member of the current group.\n\nWhen the current online redo log group fills\
    \ up, a log switch occurs, and the log writer starts writing to the next online\
    \ redo log group. The log writer writes to the online redo log groups in a round-robin\
    \ fashion. Because you have a finite number of online redo log groups, eventually\
    \ the contents of each online redo log group are overwritten. If you want to save\
    \ a history of the transaction information, you must place your database in archivelog\
    \ mode (see the section “Implementing Archivelog Mode,” later in this chapter).\n\
    \nWhen your database is in archivelog mode, after every log switch the archiver\
    \ background process copies the contents of the online redo log file to an archived\
    \ redo log file. In the event of a failure the archived redo log files allow you\
    \ to restore the complete history of transactions that have occurred since your\
    \ last database backup.\n\n[Figure 5-1](#9781430257288_Ch05.xhtml#Fig1) displays\
    \ a typical setup for the online redo log files. This figure shows three online\
    \ redo log groups, each containing two members. The database is in archivelog\
    \ mode. In the figure, group 2 has recently been filled with transactions, a log\
    \ switch has occurred, and the log writer is now writing to group 3. The archiver\
    \ process is copying the contents of group 2 to an archived redo log file. When\
    \ group 3 fills up, another log switch will occur, and the log writer will begin\
    \ writing to group 1\\. At the same time, the archiver process will copy the contents\
    \ of group 3 to archive log sequence 3 (and so forth).\n\n![9781430257288_Fig05-01.jpg](Images/9781430257288_Fig05-01.jpg)\n\
    \n[Figure 5-1](#9781430257288_Ch05.xhtml#_Fig1). Online redo log configuration\n\
    \nThe online redo log files aren’t intended to be backed up. These files contain\
    \ only the most recent redo transaction information generated by the database.\
    \ When you enable archiving, the archived redo log files are the mechanism for\
    \ protecting your database transaction history.\n\nThe contents of the current\
    \ online redo log files aren’t archived until a log switch occurs. This means\
    \ that if you lose all members of the current online redo log file, you lose transactions.\
    \ Listed next are several mechanisms you can implement to minimize the chance\
    \ of failure with the online redo log files:\n\n*   Multiplex the groups.\n* \
    \  If possible, never allow two members of the same group to share the same controller.\n\
    *   If possible, never put two members of the same group on the same physical\
    \ disk.\n*   Ensure that OS file permissions are set appropriately (restrictive,\
    \ that only the owner of the Oracle binaries has permissions to write and read).\n\
    *   Use physical storage devices that are redundant (i.e., RAID [redundant array\
    \ of inexpensive disks]).\n*   Appropriately size the log files, so that they\
    \ switch and are archived at regular intervals.\n*   Consider setting the ARCHIVE_LAG_TARGET\
    \ initialization parameter to ensure that the online redo logs are switched at\
    \ regular intervals.\n\n![image](Images/sq.jpg) **Note**   The only tool provided\
    \ by Oracle that can protect you and preserve all committed transactions in the\
    \ event you lose all members of the current online redo log group is Oracle Data\
    \ Guard, implemented in maximum protection mode. See MOS note 239100.1 for more\
    \ details regarding Oracle Data Guard protection modes.\n\nThe online redo log\
    \ files are never backed up by an RMAN backup or by a user-managed hot backup.\
    \ If you did back up the online redo log files, it would be meaningless to restore\
    \ them. The online redo log files contain the latest redo generated by the database.\
    \ You wouldn’t want to overwrite them from a backup with old redo information.\
    \ For a database in archivelog mode the online redo log files contain the most\
    \ recently generated transactions that are required to perform a complete recovery.\n\
    \nDisplaying Online Redo Log Information\n\nUse the V$LOG and V$LOGFILE views\
    \ to display information about online redo log groups and corresponding members:\n\
    \n```\nCOL group#     FORM 99999\nCOL thread#    FORM 99999\nCOL grp_status FORM\
    \ a10\nCOL member     FORM a30\nCOL mem_status FORM a10\nCOL mbytes     FORM 999999\n\
    --\nSELECT\n a.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n,b.status\
    \ mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\n     v$logfile b\n\
    WHERE a.group# = b.group#\nORDER BY a.group#, b.member;\n```\n\nHere is some sample\
    \ output:\n\n```\nGROUP# THREAD# GRP_STATUS MEMBER                         MEM_STATUS  MBYTES\n\
    ------ ------- ---------- ------------------------------ ---------- -------\n\
         1       1 INACTIVE   /u01/oraredo/o12c/redo01a.rdo                  50\n\
         1       1 INACTIVE   /u02/oraredo/o12c/redo01b.rdo                  50\n\
         2       1 CURRENT    /u01/oraredo/o12c/redo02a.rdo                  50\n\
         2       1 CURRENT    /u02/oraredo/o12c/redo02b.rdo                  50\n\
    ```\n\nWhen you’re diagnosing online redo log issues, the V$LOG and V$LOGFILE\
    \ views are particularly helpful. You can query these views while the database\
    \ is mounted or open. [Table 5-1](#9781430257288_Ch05.xhtml#Tab1) briefly describes\
    \ each view.\n\n[Table 5-1.](#9781430257288_Ch05.xhtml#_Tab1) Useful Views Related\
    \ to Online Redo Logs\n\n| View | Description |\n| --- | --- |\n| V$LOG | Displays\
    \ the online redo log group information stored in the control file |\n| V$LOGFILE\
    \ | Displays online redo log file member information |\n\nThe STATUS column of\
    \ the V$LOG view is especially useful when you’re working with online redo log\
    \ groups. [Table 5-2](#9781430257288_Ch05.xhtml#Tab2) describes each status and\
    \ its meaning for the V$LOG view.\n\n[Table 5-2.](#9781430257288_Ch05.xhtml#_Tab2)\
    \ Status for Online Redo Log Groups in the V$LOG View\n\n| Status | Meaning |\n\
    | --- | --- |\n| CURRENT | The log group is currently being written to by the\
    \ log writer. |\n| ACTIVE | The log group is required for crash recovery and may\
    \ or may not have been archived. |\n| CLEARING | The log group is being cleared\
    \ out by an ALTER DATABASE CLEAR LOGFILE command. |\n| CLEARING_CURRENT | The\
    \ current log group is being cleared of a closed thread. |\n| INACTIVE | The log\
    \ group isn’t required for crash recovery and may or may not have been archived.\
    \ |\n| UNUSED | The log group has never been written to; it was recently created.\
    \ |\n\nThe STATUS column of the V$LOGFILE view also contains useful information.\
    \ This view offers information about each physical online redo log file member\
    \ of a log group. [Table 5-3](#9781430257288_Ch05.xhtml#Tab3) provides descriptions\
    \ of the each status and its meaning for each log file member.\n\n[Table 5-3.](#9781430257288_Ch05.xhtml#_Tab3)\
    \ Status for Online Redo Log File Members in the V$LOGFILE View\n\n| Status |\
    \ Meaning |\n| --- | --- |\n| INVALID | The log file member is inaccessible or\
    \ has been recently created. |\n| DELETED | The log file member is no longer in\
    \ use. |\n| STALE | The log file member’s contents aren’t complete. |\n| NULL\
    \ | The log file member is being used by the database. |\n\nIt’s important to\
    \ differentiate between the STATUS column in V$LOG and the STATUS column in V$LOGFILE.\
    \ The STATUS column in V$LOG reflects the status of the log group. The STATUS\
    \ column in V$LOGFILE reports the status of the physical online redo log file\
    \ member. Refer to these tables when diagnosing issues with your online redo logs.\n\
    \nDetermining the Optimal Size of Online Redo Log Groups\n\nTry to size the online\
    \ redo logs so that they switch anywhere from two to six times per hour. The V$LOG_HISTORY\
    \ contains a history of how frequently the online redo logs have switched. Execute\
    \ this query to view the number of log switches per hour:\n\n```\nselect count(*)\n\
    ,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\ngroup by to_char(first_time,'YYYY:MM:DD:HH24')\n\
    order by 2;\n```\n\nHere is a snippet of the output:\n\n```\n  COUNT(*) TO_CHAR(FIRST\n\
    ---------- -------------\n         1 2012:10:23:23\n         3 2012:10:24:03\n\
            28 2012:10:24:04\n        23 2012:10:24:05\n        68 2012:10:24:06\n\
            84 2012:10:24:07\n        15 2012:10:24:08\n```\n\nFrom the previous output,\
    \ you can see that a great deal of log switch activity occurred from approximately\
    \ 4:00 am to 7:00 am . This could be due to a nightly batch job or users’ in different\
    \ time zones updating data. For this database the size of the online redo logs\
    \ should be increased. You should try to size the online redo logs to accommodate\
    \ peak transaction loads on the database.\n\nThe V$LOG_HISTORY derives its data\
    \ from the control file. Each time there is a log switch, an entry is recorded\
    \ in this view that details information such as the time of the switch and the\
    \ system change number (SCN). As stated, a general rule of thumb is that you should\
    \ size your online redo log files so that they switch approximately two to six\
    \ times per hour. You don’t want them switching too often because there is overhead\
    \ with the log switch. Oracle initiates a checkpoint as part of a log switch.\
    \ During a checkpoint the database writer background process writes modified (also\
    \ called dirty) blocks to disk, which is resource intensive.\n\nThen again, you\
    \ don’t want online redo log files never to switch, because the current online\
    \ redo log contains transactions that you may need in the event of a recovery.\
    \ If a disaster causes a media failure in your current online redo log, you can\
    \ lose those transactions that haven’t been archived.\n\n![image](Images/sq.jpg) **Tip**  \
    \ Use the ARCHIVE_LAG_TARGET initialization parameter to set a maximum amount\
    \ of time (in seconds) between log switches. A typical setting for this parameter\
    \ is 1,800 seconds (30 minutes). A value of 0 (default) disables this feature.\
    \ This parameter is commonly used in Oracle Data Guard environments to force log\
    \ switches after the specified amount of time elapses.\n\nYou can also query the\
    \ OPTIMAL_LOGFILE_SIZE column from the V$INSTANCE_RECOVERY view to determine if\
    \ your online redo log files have been sized correctly:\n\n```\nSQL> select optimal_logfile_size\
    \ from v$instance_recovery;\n```\n\nHere is some sample output:\n\n```\nOPTIMAL_LOGFILE_SIZE\n\
    \n```\n\nThis column reports the redo log file size (in megabytes) that is considered\
    \ optimal, based on the initialization parameter setting of FAST_START_MTTR_TARGET.\
    \ Oracle recommends that you configure all online redo logs to be at least the\
    \ value of OPTIMAL_LOGFILE_SIZE. However, when sizing your online redo logs, you\
    \ must take into consideration information about your environment (such as the\
    \ frequency of the switches).\n\nDetermining the Optimal Number of Redo Log Groups\n\
    \nOracle requires at least two redo log groups in order to function. But, having\
    \ just two groups sometimes isn’t enough. To understand why this is so, remember\
    \ that every time a log switch occurs, it initiates a checkpoint. As part of a\
    \ checkpoint the database writer writes all modified (dirty) blocks from the SGA\
    \ to the data files on disk. Also recall that the online redo logs are written\
    \ to in a round-robin fashion and that eventually the information in a given log\
    \ is overwritten. Before the log writer can begin to overwrite information in\
    \ an online redo log, all modified blocks in the SGA associated with the redo\
    \ log must first be written to a data file. If not all modified blocks have been\
    \ written to the data files, you see this message in the alert.log file:\n\n```\n\
    Thread 1 cannot allocate new log, sequence <sequence number>\nCheckpoint not complete\n\
    ```\n\nAnother way to explain this issue is that Oracle needs to store in the\
    \ online redo logs any information that would be required to perform a crash recovery.\
    \ To help you visualize this, see [Figure 5-2](#9781430257288_Ch05.xhtml#Fig2).\n\
    \n![9781430257288_Fig05-02.jpg](Images/9781430257288_Fig05-02.jpg)\n\n[Figure\
    \ 5-2](#9781430257288_Ch05.xhtml#_Fig2). Redo protected until the modified (dirty)\
    \ buffer is written to disk\n\nAt time 1, Block A is read from Data File AA into\
    \ the buffer cache and modified. At time 2 the redo-change vector information\
    \ (how the block changed) is written to the log buffer. At time 3 the log-writer\
    \ process writes the Block A change-vector information to online redo log 1\\\
    . At time 4 a log switch occurs, and online redo log 2 becomes the current online\
    \ redo log.\n\nNow, suppose that online redo log 2 fills up quickly and another\
    \ log switch occurs, at which point the log writer attempts to write to online\
    \ redo log 1\\. The log writer isn’t allowed to overwrite information in online\
    \ redo log 1 until the database writer writes Block A to Data File AA. Until Block\
    \ A is written to Data File AA, Oracle needs information in the online redo logs\
    \ to recover this block in the event of a power failure or shutdown abort. Before\
    \ Oracle overwrites information in the online redo logs, it ensures that blocks\
    \ protected by redo have been written to disk. If these modified blocks haven’t\
    \ been written to disk, Oracle temporarily suspends processing until this occurs.\
    \ There are a few ways to resolve this issue:\n\n*   Add more redo log groups.\n\
    *   Lower the value of FAST_START_MTTR_TARGET. Doing so causes the database writer\
    \ process to write older modified blocks to disk in a shorter time frame.\n* \
    \  Tune the database-writer process (modify DB_WRITER_PROCESSES).\n\nIf you notice\
    \ that the Checkpoint not complete message is occurring often (say, several times\
    \ a day), I recommend that you add one or more log groups to resolve the issue.\
    \ Adding an extra redo log gives the database writer more time to write modified\
    \ blocks in the database buffer cache to the data files before the associated\
    \ redo with a block is overwritten. There is little downside to adding more redo\
    \ log groups. The main concern is that you could bump up against the MAXLOGFILES\
    \ value that was used when you created the database. If you need to add more groups\
    \ and have exceeded the value of MAXLOGFILES, then you must re-create your control\
    \ file and specify a high value for this parameter.\n\nIf adding more redo log\
    \ groups doesn’t resolve the issue, you should carefully consider lowering the\
    \ value of FAST_START_MTTR_TARGET. When you lower this value, you can potentially\
    \ see more I/O because the database writer process is more actively writing modified\
    \ blocks to data files. Ideally, it would be nice to verify the impact of modifying\
    \ FAST_START_MTTR_TARGET in a test environment before making the change in production.\
    \ You can modify this parameter while your instance is up; this means you can\
    \ quickly modify it back to its original setting if there are unforeseen side\
    \ effects.\n\nFinally, consider increasing the value of the DB_WRITER_PROCESSES\
    \ parameter. Carefully analyze the impact of modifying this parameter in a test\
    \ environment before you apply it to production. This value requires that you\
    \ stop and start your database; therefore, if there are adverse effects, downtime\
    \ is required to change this value back to the original setting.\n\nAdding Online\
    \ Redo Log Groups\n\nIf you determine that you need to add an online redo log\
    \ group, use the ADD LOGFILE GROUP statement. In this example the database already\
    \ contains two online redo log groups that are sized at 50M each. An additional\
    \ log group is added that has two members and is sized at 50MB:\n\n```\nalter\
    \ database add logfile group 3\n('/u01/oraredo/o12c/redo03a.rdo',\n '/u02/oraredo/o12c/redo03b.rdo')\
    \ SIZE 50M;\n```\n\nIn this scenario I highly recommend that the log group you\
    \ add be the same size and have the same number of members as the existing online\
    \ redo logs. If the newly added group doesn’t have the same physical characteristics\
    \ as the existing groups, it’s harder to accurately determine performance issues.\n\
    \nFor example, if you have two log groups sized at 50MB, and you add a new log\
    \ group sized at 500MB, this is very likely to produce the Checkpoint not complete\
    \ issue described in the previous section. This is because flushing all modified\
    \ blocks from the SGA that are protected by the redo in a 500MB log file can potentially\
    \ take much longer than flushing modified blocks from the SGA that are protected\
    \ by a 50MB log file.\n\nResizing and Dropping Online Redo Log Groups\n\nYou may\
    \ need to change the size of your online redo logs (see the section “Determining\
    \ the Optimal Size of Online Redo Log Groups,” earlier in this chapter). You can’t\
    \ directly modify the size of an existing online redo log (as you can a data file).\
    \ To resize an online redo log, you have to first add online redo log groups that\
    \ are the size you want, and then drop the online redo logs that are the old size.\n\
    \nSay you want to resize the online redo logs to be 200MB each. First, you add\
    \ new groups that are 200MB, using the ADD LOGFILE GROUP statement. The following\
    \ example adds log group 4, with two members sized at 200MB:\n\n```\nalter database\
    \ add logfile group 4\n('/u01/oraredo/o12c/redo04a.rdo',\n '/u02/oraredo/o12c/redo04b.rdo')\
    \ SIZE 200M;\n```\n\n![image](Images/sq.jpg) **Note**   You can specify the size\
    \ of the log file in bytes, kilobytes, megabytes, or gigabytes.\n\nAfter you’ve\
    \ added the log files with the new size, you can drop the old online redo logs.\
    \ A log group must have an INACTIVE status before you can drop it. You can check\
    \ the status of the log group, as shown here:\n\n```\nSQL> select group#, status,\
    \ archived, thread#, sequence# from v$log;\n```\n\nYou can drop an inactive log\
    \ group with the ALTER DATABASE DROP LOGFILE GROUP statement:\n\n```\nSQL> alter\
    \ database drop logfile group <group #>;\n```\n\nIf you attempt to drop the current\
    \ online log group, Oracle returns an ORA-01623 error, stating that you can’t\
    \ drop the current group. Use the ALTER SYSTEM SWITCH LOGFILE statement to switch\
    \ the logs and make the next group the current group:\n\n```\nSQL> alter system\
    \ switch logfile;\n```\n\nAfter a log switch the log group that was previously\
    \ the current group retains an active status as long as it contains redo that\
    \ Oracle requires to perform crash recovery. If you attempt to drop a log group\
    \ with an active status, Oracle throws an ORA-01624 error, indicating that the\
    \ log group is required for crash recovery. Issue an ALTER SYSTEM CHECKPOINT command\
    \ to make the log group inactive:\n\n```\nSQL> alter system checkpoint;\n```\n\
    \nAdditionally, you can’t drop an online redo log group if doing so leaves your\
    \ database with only one log group. If you attempt to do this, Oracle throws an\
    \ ORA-01567 error and informs you that dropping the log group isn’t permitted\
    \ because it would leave you with fewer than two log groups for your database\
    \ (as mentioned earlier, Oracle requires at least two redo log groups in order\
    \ to function).\n\nDropping an online redo log group doesn’t remove the log files\
    \ from the OS. You have to use an OS command to do this (such as the rm Linux/Unix\
    \ command). Before you remove a file from the OS, ensure that it isn’t in use\
    \ and that you don’t remove a live online redo log file. For every database on\
    \ the server, issue this query to view which online redo log files are in use:\n\
    \n```\nSQL> select member from v$logfile;\n```\n\nBefore you physically remove\
    \ a log file, first switch the online redo logs enough times that all online redo\
    \ log groups have recently been switched; doing so causes the OS to write to the\
    \ file and thus give it a new timestamp. For example, if you have three groups,\
    \ make sure you perform at least three log switches:\n\n```\nSQL> alter system\
    \ switch logfile;\nSQL> /\nSQL> /\n```\n\nNow, verify at the OS prompt that the\
    \ log file you intend to remove doesn’t have a new timestamp. First, go to the\
    \ directory containing the online redo log files:\n\n```\n$ cd  /u01/oraredo/o12c\n\
    ```\n\nThen, list the files to view the latest modification date:\n\n```\n$ ls\
    \ -altr\n```\n\nWhen you’re absolutely sure the file isn’t in use, you can remove\
    \ it. The danger in removing a file is that if it happens to be an in-use online\
    \ redo log, and the only member of a group, you can cause serious damage to your\
    \ database. Ensure that you have a good backup of your database and that the file\
    \ you’re removing isn’t used by any databases on the server.\n\nAdding Online\
    \ Redo Log Files to a Group\n\nYou may occasionally need to add a log file to\
    \ an existing group. For example, if you have an online redo log group that contains\
    \ only one member, you should consider adding a log file (to provide a higher\
    \ level of protection against a single–log file member failure). Use the ALTER\
    \ DATABASE ADD LOGFILE MEMBER statement to add a member file to an existing online\
    \ redo log group. You need to specify the new member file location, name, and\
    \ group to which you want to add the file:\n\n```\nSQL> alter database add logfile\
    \ member '/u02/oraredo/o12c/redo01b.rdo'\n     to group 1;\n```\n\nMake certain\
    \ you follow standards with regard to the location and names of any newly added\
    \ redo log files.\n\nRemoving Online Redo Log Files from a Group\n\nOccasionally,\
    \ you may need to remove an online redo log file from a group. For example, your\
    \ database may have experienced a failure with one member of a multiplexed group,\
    \ and you want to remove the apostate member. First, make sure the log file you\
    \ want to drop isn’t in the current group:\n\n```\nSELECT a.group#, a.member,\
    \ b.status, b.archived, SUM(b.bytes)/1024/1024 mbytes\nFROM v$logfile a, v$log\
    \ b\nWHERE a.group# = b.group#\nGROUP BY a.group#, a.member, b.status, b.archived\n\
    ORDER BY 1, 2;\n```\n\nIf you attempt to drop a log file that is in the group\
    \ with the CURRENT status, you receive the following error:\n\n```\nORA-01623:\
    \ log 2 is current log for instance o12c (thread 1) - cannot drop\n```\n\nIf you’re\
    \ attempting to drop a member from the current online redo log group, then force\
    \ a switch, as follows:\n\n```\nSQL> alter system switch logfile;\n```\n\nUse\
    \ the ALTER DATABASE DROP LOGFILE MEMBER statement to remove a member file from\
    \ an existing online redo log group. You don’t need to specify the group number\
    \ because you’re removing a specific file:\n\n```\nSQL> alter database drop logfile\
    \ member '/u01/oraredo/o12c/redo04a.rdo';\n```\n\nYou also can’t drop the last\
    \ remaining log file of a group. A group must contain at least one log file. If\
    \ you attempt to drop the last remaining log file of a group, you receive the\
    \ following error:\n\n```\nORA-00361: cannot remove last log member .  .  .\n\
    ```\n\nMoving or Renaming Redo Log Files\n\nSometimes, you need to move or rename\
    \ online redo log files. For example, you may have added some new mount points\
    \ to the system, and you want to move the online redo logs to the new storage.\
    \ You can use two methods to accomplish this task:\n\n*   Add the new log files\
    \ in the new location, and drop the old log files.\n*   Physically rename the\
    \ files from the OS.\n\nIf you can’t afford any downtime, consider adding new\
    \ log files in the new location and then dropping the old log files. See the section\
    \ “Adding Online Redo Log Groups,” earlier in this chapter, for details on how\
    \ to add a log group. See also the section “Resizing and Dropping Online Redo\
    \ Log Groups,” earlier in this chapter, for details on how to drop a log group.\n\
    \nAlternatively, you can physically move the files from the OS. You can do this\
    \ with the database open or closed. If your database is open, ensure that the\
    \ files you move aren’t part of the current online redo log group (because those\
    \ are actively written to by the log writer background process). It’s dangerous\
    \ to try to do this task while your database is open because on an active system,\
    \ the online redo logs may be switching at a rapid rate, which creates the possibility\
    \ of attempting to move a file while it’s being switched to be the current online\
    \ redo log. Therefore, I recommend that you only try to do this while your database\
    \ is closed.\n\nThe next example shows how to move the online redo log files with\
    \ the database shut down. Here are the steps:\n\n1.  Shut down your database:\n\
    \n    ```\n    SQL> shutdown immediate;\n    ```\n\n2.  From the OS prompt, move\
    \ the files. This example uses the mv command to accomplish this task:\n\n   \
    \ ```\n    $ mv /u02/oraredo/o12c/redo02b.rdo /u01/oraredo/o12c/redo02b.rdo\n\
    \    ```\n\n3.  Start up your database in mount mode:\n\n    ```\n    SQL> startup\
    \ mount;\n    ```\n\n4.  Update the control file with the new file locations and\
    \ names:\n\n    ```\n    SQL> alter database rename file '/u02/oraredo/o12c/redo02b.rdo'\n\
    \         to '/u01/oraredo/o12c/redo02b.rdo';\n    ```\n\n5.  Open your database:\n\
    \n    ```\n    SQL> alter database open;\n    ```\n\nYou can verify that your\
    \ online redo logs are in the new locations by querying the V$LOGFILE view. I\
    \ recommend as well that you switch your online redo logs several times and then\
    \ verify from the OS that the files have recent timestamps. Also check the alert.log\
    \ file for any pertinent errors.\n\nImplementing Archivelog Mode\n\nRecall from\
    \ the discussion earlier in this chapter that archive redo logs are created only\
    \ if your database is in archivelog mode. If you want to preserve your database\
    \ transaction history to facilitate point-in-time and other types of recovery,\
    \ you need to enable that mode.\n\nIn normal operation, changes to your data generate\
    \ entries in the database redo log files. As each online redo log group fills\
    \ up, a log switch is initiated. When a log switch occurs, the log writer process\
    \ stops writing to the most recently filled online redo log group and starts writing\
    \ to a new online redo log group. The online redo log groups are written to in\
    \ a round-robin fashion—meaning the contents of any given online redo log group\
    \ will eventually be overwritten. Archivelog mode preserves redo data for the\
    \ long term by employing an archiver background process to copy the contents of\
    \ a filled online redo log to what is termed an *archive redo log file*. The trail\
    \ of archive redo log files is crucial to your ability to recover the database\
    \ with all changes intact, right up to the precise point of failure.\n\nMaking\
    \ Architectural Decisions\n\nWhen you implement archivelog mode, you also need\
    \ a strategy for managing the archived log files. The archive redo logs consume\
    \ disk space. If left unattended, these files will eventually use up all the space\
    \ allocated for them. If this happens, the archiver can’t write a new archive\
    \ redo log file to disk, and your database will stop processing transactions.\
    \ At that point, you have a hung database. You then need to intervene manually\
    \ by creating space for the archiver to resume work. For these reasons, there\
    \ are several architectural decisions you must carefully consider before you enable\
    \ archiving:\n\n*   Where to place the archive redo logs and whether to use the\
    \ fast recovery area to store them\n*   How to name the archive redo logs\n* \
    \  How much space to allocate to the archive redo log location\n*   How often\
    \ to back up the archive redo logs\n*   When it’s okay to permanently remove archive\
    \ redo logs from disk\n*   How to remove archive redo logs (e.g., have RMAN remove\
    \ the logs, based on a retention policy)\n*   Whether multiple archive redo log\
    \ locations should be enabled\n*   When to schedule the small amount of downtime\
    \ that’s required (if a production database)\n\nAs a general rule of thumb, you\
    \ should have enough space in your primary archive redo location to hold at least\
    \ a day’s worth of archive redo logs. This lets you back them up on a daily basis\
    \ and then remove them from disk after they’ve been backed up.\n\nIf you decide\
    \ to use a fast recovery area (FRA) for your archive redo log location, you must\
    \ ensure that it contains sufficient space to hold the number of archive redo\
    \ logs generated between backups. Keep in mind that the FRA typically contains\
    \ other types of files, such as RMAN backup files, flashback logs, and so on.\
    \ If you use a FRA, be aware that the generation of other types of files can potentially\
    \ impact the space required by the archive redo log files.\n\nYou need a strategy\
    \ for automating the backup and removal of archive redo log files. For user-managed\
    \ backups, this can be implemented with a shell script that periodically copies\
    \ the archive redo logs to a backup location and then removes them from the primary\
    \ location. As you will see in later chapters, RMAN automates the backup and removal\
    \ of archive redo log files.\n\nIf your business requirements are such that you\
    \ must have a certain degree of high availability and redundancy, then you should\
    \ consider writing your archive redo logs to more than one location. Some shops\
    \ set up jobs to copy the archive redo logs periodically to a different location\
    \ on disk or even to a different server.\n\nSetting the Archive Redo File Location\n\
    \nBefore you set your database mode to archiving, you should specifically instruct\
    \ Oracle where you want the archive redo logs to be placed. You can set the archive\
    \ redo log file destination with the following techniques:\n\n*   Set the LOG_ARCHIVE_DEST_N\
    \ database initialization parameter.\n*   Implement a FRA.\n\nThese two approaches\
    \ are discussed in detail in the following sections.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you don’t specifically set the archive redo log location via an initialization\
    \ parameter or by enabling the FRA, then the archive redo logs are written to\
    \ a default location. For Linux/Unix the default location is ORACLE_HOME/dbs.\
    \ For Windows the default location is ORACLE_HOME\\database. For active production\
    \ database systems, the default archive redo log location is rarely appropriate.\n\
    \nSetting the Archive Location to a User-Defined Disk Location (non-FRA)\n\nIf\
    \ you’re using an init<SID>.ora file, modify the file with an OS utility (such\
    \ as vi). In this example the archive redo log location is set to /u01/oraarch/o12c:\n\
    \n```\nlog_archive_dest_1='location=/u01/oraarch/o12c'\nlog_archive_format='o12c_%t_%s_%r.arc'\n\
    ```\n\nIn the prior line of code, my standard for naming archive redo log files\
    \ includes the ORACLE_SID (in this example, o12c to start the string); the mandatory\
    \ parameters %t, %s, and %r; and the string .arc, to end. I like to embed the\
    \ name of the ORACLE_SID in the string to avoid confusion when multiple databases\
    \ are housed on one server. I like to use the extension .arc to differentiate\
    \ the files from other types of database files.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you don’t specify a value for LOG_ARCHIVE_FORMAT, Oracle uses a default,\
    \ such as %t_%s_%r.dbf. One aspect of the default format that I don’t like is\
    \ that it ends with the extension .dbf, which is widely used for data files. This\
    \ can cause confusion about whether a particular file can be safely removed because\
    \ it’s an old archive redo log file or shouldn’t be touched because it’s a live\
    \ data file. Most DBAs are reluctant to issue commands such as rm *.dbf for fear\
    \ of accidentally removing live data files.\n\nIf you’re using an spfile, use\
    \ ALTER SYSTEM to modify the appropriate initialization variables:\n\n```\nSQL>\
    \ alter system set log_archive_dest_1='location=/u01/oraarch/o12c' scope=both;\n\
    SQL> alter system set log_archive_format='o12c_%t_%s_%r.arc' scope=spfile;\n```\n\
    \nYou can dynamically change the LOG_ARCHIVE_DEST_n parameters while your database\
    \ is open. However, you have to stop and start your database for the LOG_ARCHIVE_FORMAT\
    \ parameter to take effect.\n\nRECOVERING FROM SETTING A BAD SPFILE PARAMETER\n\
    \nTake care not to set the LOG_ARCHIVE_FORMAT to an invalid value; for example,\n\
    \n```\nSQL> alter system set log_archive_format='%r_%y_%dk.arc' scope=spfile;\n\
    ```\n\nIf you do so, when you attempt to stop and start your database, you won’t\
    \ even get to the nomount phase (because the spfile contains an invalid parameter):\n\
    \n```\nSQL> startup nomount;\nORA-19905: log_archive_format must contain %s, %t\
    \ and %r\n```\n\nIn this situation, if you’re using an spfile, you can’t start\
    \ your instance. You have a couple of options here. If you’re using RMAN and are\
    \ backing up the spfile, then restore the spfile from a backup.\n\nIf you’re not\
    \ using RMAN, you can also try to edit the spfile directly with an OS editor (such\
    \ as vi), but Oracle doesn’t recommend or support this.\n\nThe alternative is\
    \ to create an init.ora file manually from the contents of the spfile. First,\
    \ rename the spfile that contains a bad value:\n\n```\n$ cd $ORACLE_HOME/dbs\n\
    $ mv spfile<SID>.ora spfile<SID>.old.ora\n```\n\nThen, open the renamed spfile\
    \ with a text editor, such as vi:\n\n```\n$ vi spfile<SID>.old.ora\n```\n\nNow,\
    \ use your mouse to copy the visible initialization parameters. Exit out of editing\
    \ the old file, and open a file named init<SID>.ora; for example,\n\n```\n$ vi\
    \ inito12c.ora\n```\n\nFinally, paste in the parameters you copied from the old\
    \ spfile. Modify the bad parameter to contain a valid value. You may also have\
    \ to do cleanup with some of the parameters that contain unwanted characters.\
    \ Exit out of the init<SID>.ora file. You should now be able to start up your\
    \ database.\n\nWhen you specify LOG_ARCHIVE_FORMAT, you must include %t (or %T),\
    \ %s (or %S), and r% in the format string. [Table 5-4](#9781430257288_Ch05.xhtml#Tab4)\
    \ lists the valid variables you can use with the LOG_ARCHIVE_FORMAT initialization\
    \ parameter.\n\n[Table 5-4.](#9781430257288_Ch05.xhtml#_Tab4) Valid Variables\
    \ for the Log Archive Format String\n\n| Format String | Meaning |\n| --- | ---\
    \ |\n| %s | Log sequence number |\n| %S | Log sequence number padded to the left\
    \ with zeros |\n| %t | Thread number |\n| %T | Thread number padded to the left\
    \ with zeros |\n| %a | Activation ID |\n| %d | Database ID |\n| %r | Resetlogs\
    \ ID required to ensure uniqueness across multiple incarnations of the database\
    \ |\n\nYou can view the value of the LOG_ARCHIVE_DEST_N parameter by running the\
    \ following:\n\n```\nSQL> show parameter log_archive_dest\n```\n\nHere is a partial\
    \ listing of the output:\n\n```\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- --------------------------\n\
    log_archive_dest                     string\nlog_archive_dest_1                  \
    \ string      location=/u01/oraarch/o12c\nlog_archive_dest_10                  string\n\
    ```\n\nFor Oracle Database 11g and higher you can enable up to 31 different locations\
    \ for the archive redo log file destination. For most production systems one archive\
    \ redo log destination location is usually sufficient. If you need a higher degree\
    \ of protection, you can enable multiple destinations. Keep in mind that when\
    \ you use multiple destinations, the archiver must be able to write to at least\
    \ one location successfully. If you enable multiple mandatory locations and set\
    \ LOG_ARCHIVE_MIN_SUCCEED_DEST to be higher than 1, then your database may hang\
    \ if the archiver can’t write to all mandatory locations.\n\nYou can check the\
    \ details regarding the status of archive redo log locations via this query:\n\
    \n```\nselect\n dest_name\n,destination\n,status\n,binding\nfrom v$archive_dest;\n\
    ```\n\nHere is a small sample of the output:\n\n```\nDEST_NAME            DESTINATION                    STATUS    BINDING\n\
    -------------------- ------------------------------ --------- ---------\nLOG_ARCHIVE_DEST_1  \
    \ /u01/oraarch/o12c              VALID     OPTIONAL\nLOG_ARCHIVE_DEST_2                                  INACTIVE  OPTIONAL\n\
    ```\n\nUsing the FRA for Archive Log Files\n\nThe FRA is an area on disk—specified\
    \ via database initialization parameters—that can be used to store files, such\
    \ as archive redo logs, RMAN backup files, flashback logs, and multiplexed control\
    \ files and online redo logs. To enable the use of a FRA, you must set two initialization\
    \ parameters (in this order):\n\n*   DB_RECOVERY_FILE_DEST_SIZE specifies the\
    \ maximum space to be used for all files that are stored in the FRA for a database.\n\
    *   DB_RECOVERY_FILE_DEST specifies the base directory for the FRA.\n\nWhen you\
    \ create a FRA, you’re not really creating anything—you’re telling Oracle which\
    \ directory to use when storing files that go in the FRA. For example, say 200GB\
    \ of space are reserved on a mount point, and you want the base directory for\
    \ the FRA to be /u01/fra. To enable the FRA, first set DB_RECOVERY_FILE_DEST_SIZE:\n\
    \n```\nSQL> alter system set db_recovery_file_dest_size=200g scope=both;\n```\n\
    \nNext, set the DB_RECOVERY_FILE_DEST parameter:\n\n```\nSQL> alter system set\
    \ db_recovery_file_dest='/u01/fra' scope=both;\n```\n\nIf you’re using an init.ora\
    \ file, modify it with an OS utility (such as vi) with the appropriate entries.\n\
    \nAfter you enable a FRA, by default, Oracle writes archive redo logs to subdirectories\
    \ in the FRA.\n\n![image](Images/sq.jpg) **Note**   If you’ve set the LOG_ARCHIVE_DEST_N\
    \ parameter to be a location on disk, archive redo logs aren’t written to the\
    \ FRA.\n\nYou can verify that the archive location is using a FRA:\n\n```\nSQL>\
    \ archive log list;\n```\n\nIf archive files are being written to the FRA, you\
    \ should see output like this:\n\n```\nDatabase log mode              Archive\
    \ Mode\nAutomatic archival             Enabled\nArchive destination            USE_DB_RECOVERY_FILE_DEST\n\
    ```\n\nYou can display the directory associated with the FRA like this:\n\n```\n\
    SQL> show parameter db_recovery_file_dest\n```\n\nWhen you first implement a FRA,\
    \ there are no subdirectories beneath the base FRA directory (specified with DB_RECOVERY_FILE_DEST).\
    \ The first time Oracle needs to write a file to the FRA, it creates any required\
    \ directories beneath the base directory. For example, after you implement a FRA,\
    \ if archiving for your database is enabled, then the first time a log switch\
    \ occurs, Oracle creates the following directories beneath the base FRA directory:\n\
    \n```\n<SID>/archivelog/<YYYY_MM_DD>\n```\n\nEach day that archive redo logs are\
    \ generated results in a new directory’s being created in the FRA, using the directory\
    \ name format YYYY_MM_DD. Archive redo logs written to the FRA use the OMF format\
    \ naming convention (regardless of whether you’ve set the LOG_ARCHIVE_FORMAT parameter).\n\
    \nIf you want archive redo logs written to both a FRA and a non-FRA location,\
    \ you can enable that, as follows:\n\n```\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/o12c';\n\
    SQL> alter system set log_archive_dest_2='location=USE_DB_RECOVERY_FILE_DEST';\n\
    ```\n\nThinking “Un-Oraclethodox” FRA Thoughts\n\nOracle recommends that you use\
    \ a FRA for archive redo logs and RMAN backups. However, I usually don’t implement\
    \ a FRA in production environments—not for the archive redo logs, not for the\
    \ RMAN backup files, not for any types of files. Why is that?\n\nWhen you enable\
    \ a FRA, if you don’t set the initialization parameter LOG_ARCHIVE_DEST_N, then,\
    \ by default, the archive redo logs are written to the FRA. It’s the same with\
    \ RMAN backups: if you don’t specifically configure an RMAN channel disk location,\
    \ then, by default, the RMAN backup files are written to the FRA.\n\nWhen you\
    \ use a FRA (as described earlier), the disk space consumed by the archive redo\
    \ logs and RMAN backups must fit in the disk space assigned to the FRA. What happens\
    \ if you have an unexpected spike in the amount of redo generated for a database\
    \ or if an unforeseen issue arises with the RMAN backups that results in the consuming\
    \ of unanticipated amounts of disk space?\n\nWith regard to the RMAN backups,\
    \ if the FRA fills up, the RMAN backups abort. An RMAN backup failure isn’t catastrophic,\
    \ because usually you can quickly resolve space issues and manually run another\
    \ backup. In most situations this doesn’t compromise your database availability;\
    \ in the event of a backup failure, you still have a previous RMAN backup that\
    \ you can use to restore and recover your database.\n\nHowever, in the event that\
    \ the archive redo log destination fills up, and the archiver can’t write to the\
    \ file system, your database will hang. In many 24–7 mission-critical environments,\
    \ this type of downtime is unacceptable and will jeopardize your ability to keep\
    \ your job.\n\nI find it easier to control the space allocated to the archive\
    \ redo logs by using a dedicated mount point for these critical files. If possible,\
    \ don’t share the disk space allocated to the archive redo logs with the RMAN\
    \ backups. A problem with the RMAN backups can cause disk space issues for the\
    \ archive redo logs, and you want the space consumed by the archive redo logs\
    \ to be as stable and predictable as possible.\n\nFor production environments,\
    \ set the LOG_ARCHIVE_DEST_1 parameter to be a specific location that is separate\
    \ from any other types of database files. This isn’t always possible: you may\
    \ have a server for which you have no choice but to share mount points for the\
    \ various file types. But, whenever possible, try to isolate your archive redo\
    \ logs from other types of database files. The archive redo log files are the\
    \ mechanism for recovering your database.\n\nYou should be able to estimate how\
    \ much space is consumed and allow for some wiggle room. Yet, the reality is that\
    \ sometimes very unpredictable events happen, such as an application process’s\
    \ erroneously getting stuck in a loop and generating enormous amounts of redo.\
    \ This can quickly consume more disk space than anticipated. It shouldn’t happen,\
    \ but it does, and when you’re the DBA who’s called at 2:30 am , you design defensively.\n\
    \nI’m not saying, “Don’t use a FRA.” Rather, you should think carefully about\
    \ any database feature that you enable and what impact it may have on database\
    \ availability.\n\nANOTHER PERSPECTIVE ON THE FRA\n\nThe technical editor for\
    \ this book has provided a different perspective on using the FRA. I think it’s\
    \ worth hearing what he has to say. He prefers storing the archivelog files in\
    \ the FRA, because some aspects of database administration are automated. For\
    \ example, once the FRA is enabled, RMAN backups and archive redo logs are automatically\
    \ placed in a FRA within directory structures identifiable by database and date.\
    \ (One caveat to the prior statement is that you can override that automatic behavior\
    \ by specifying RMAN backup set locations through channel settings and archive\
    \ redo log placement via LOG_ARCHIVE_DEST_N parameters.)\n\nAnother feature he\
    \ likes is that archivelog files that are already beyond the retention policy\
    \ (set via RMAN) are automatically deleted when space is needed in the FRA. The\
    \ technical editor has voiced a valid opinion here, and you should be aware of\
    \ it.\n\nHowever, the FRA can be a single point of failure and a potential performance\
    \ bottleneck if the archivelog files, RMAN backups/copies, control files, and\
    \ redo log files are all stored in the FRA. What to do isn’t always an easy decision.\
    \ The technical editor and I agree that the storage location of the archivelog\
    \ files, whether inside or outside the FRA, is the production DBA’s prerogative.\n\
    \nEnabling Archivelog Mode\n\nAfter you’ve set the location for your archive redo\
    \ log files, you can enable archiving. To enable archiving, you need to connect\
    \ to the database as SYS (or a user with the SYSDBA privilege) and do the following:\n\
    \n```\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
    SQL> alter database archivelog;\nSQL> alter database open;\n```\n\nYou can confirm\
    \ archivelog mode with this query:\n\n```\nSQL> archive log list;\n```\n\nYou\
    \ can also confirm it as follows:\n\n```\nSQL> select log_mode from v$database;\n\
    \nLOG_MODE\n\nARCHIVELOG\n```\n\nDisabling Archivelog Mode\n\nUsually, you don’t\
    \ disable archivelog mode for a production database. However, you may be doing\
    \ a big data load and want to reduce any overhead associated with the archiving\
    \ process, and so you want to turn off archivelog mode before the load begins\
    \ and then reenable it after the load. If you do this, be sure you make a backup\
    \ as soon as possible after  reenabling archiving.\n\nTo disable archiving, do\
    \ the following as SYS (or a user with the SYSDBA privilege):\n\n```\n$ sqlplus\
    \ / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\nSQL> alter database\
    \ noarchivelog;\nSQL> alter database open;\n```\n\nYou can confirm archivelog\
    \ mode with  this query:\n\n```\nSQL> archive log list;\n```\n\nYou can also confirm\
    \ the log mode, as follows:\n\n```\nSQL> select log_mode from v$database;\n\n\
    LOG_MODE\n\nNOARCHIVELOG\n```\n\nReacting to a Lack of Disk Space in Your Archive\
    \ Log Destination\n\nThe archiver background process writes archive redo logs\
    \ to a location that you specify. If, for any reason, the archiver process can’t\
    \ write to the archive location, your database hangs. Any users attempting to\
    \ connect receive this error:\n\n```\nORA-00257: archiver error. Connect internal\
    \ only, until freed.\n```\n\nAs a production-support DBA, you never want to let\
    \ your database get into that state. Sometimes, unpredictable events happen, and\
    \ you have to deal with unforeseen issues.\n\n![image](Images/sq.jpg) **Note**  \
    \ DBAs who support production databases have a mindset completely different from\
    \ that of architect DBAs, who get new ideas from flashy presentations or regurgitated\
    \ documentation.\n\nIn this situation your database is as good as down and completely\
    \ unavailable. To fix the issue, you have to act quickly:\n\n*   Move files to\
    \ a different location.\n*   Compress old files in the archive redo log location.\n\
    *   Permanently remove old files.\n*   Switch the archive redo log destination\
    \ to a different location (this can be changed dynamically, while the database\
    \ is up and running).\n\nMoving files is usually the quickest and safest way to\
    \ resolve the archiver error. You can use an OS utility such as mv to move old\
    \ archive redo logs to a different location. If they’re needed for a subsequent\
    \ restore and recovery, you can let the recovery process know about the new location.\
    \ Be careful not to move an archive redo log that is currently being written to.\
    \ If an archived redo log file appears in V$ARCHIVED_LOG, that means it has been\
    \ completely archived.\n\nYou can use an OS utility such as gzip to compress archive\
    \ redo log files in the current archive destination. If you do this, you have\
    \ to remember to uncompress any files that may be later needed for a restore and\
    \ recovery. Be careful not to compress an archive redo log that is currently being\
    \ written to.\n\nAnother option is to use an OS utility such as rm to remove archive\
    \ redo logs from disk permanently. This approach is dangerous because you may\
    \ need those archive redo logs for a subsequent recovery. If you do remove archive\
    \ redo log files, and you don’t have a backup of them, you should make a full\
    \ backup of your database as soon as possible. Again, this approach is risky and\
    \ should only be done as a last resort; if you delete archive redo logs that haven’t\
    \ been backed up, then you chance not being able to perform a complete recovery.\n\
    \nIf another location on your server has plenty of space, you can consider changing\
    \ the location to which the archive redo logs are being written. You can perform\
    \ this operation while the database is up and running; for example,\n\n```\nSQL>\
    \ alter system set log_archive_dest_1='location=/u02/oraarch/o12c';\n```\n\nAfter\
    \ you’ve resolved the issue with the primary location, you can switch back the\
    \ original location.\n\n![image](Images/sq.jpg) **Note**   When a log switch occurs,\
    \ the archiver determines where to write the archive redo logs, based on the current\
    \ FRA setting or a LOG_ARCHIVE_DEST_N parameter. It doesn’t matter to the archiver\
    \ if the destination has recently changed.\n\nWhen the archive redo log file destination\
    \ is full, you have to scramble to resolve it. This is why a good deal of thought\
    \ should precede enabling archiving for 24–7 production databases.\n\nFor most\
    \ databases, writing the archive redo logs to one location is sufficient. However,\
    \ if you have any type of disaster recovery or high-availability requirement,\
    \ then you should write to multiple locations. Sometimes, DBAs set up a job to\
    \ back up the archive redo logs every hour and copy them to an alternate location\
    \ or even to an alternate server.\n\nBacking Up Archive Redo Log Files\n\nDepending\
    \ on your business requirements, you may need a strategy for backing up archive\
    \ redo log files. Minimally, you should back up any archive redo logs generated\
    \ during a backup of a database in archivelog mode. Additional strategies may\
    \ include\n\n*   periodically copying archive redo logs to an alternate location\
    \ and then removing them from the primary destination\n*   copying the archive\
    \ redo logs to tape and then deleting them from disk\n*   using two archive redo\
    \ log locations\n*   using Data Guard for a robust disaster recovery solution\n\
    \nKeep in mind that you need all archive redo logs generated since the begin time\
    \ of the last good backup to ensure that you can completely recover your database.\
    \ Only after you’re sure you have a good backup of your database should you consider\
    \ removing archive redo logs that were generated prior to the backup.\n\nIf you’re\
    \ using RMAN as a backup and recovery strategy, then you should use RMAN to backup\
    \ the archive redo logs. Additionally, you should specify an RMAN retention policy\
    \ for these files and have RMAN remove the archive redo logs only after the retention\
    \ policy requirements are met (e.g., back up files at least once before removing\
    \ from disk) (see [Chapter 18](#9781430257288_Ch18.xhtml) for details on using\
    \ RMAN).\n\nSummary\n\nThis chapter described how to configure and manage control\
    \ files and online redo log files and enable archiving. Control files and online\
    \ redo logs are critical database files; a normally operating database can’t function\
    \ without them.\n\nControl files are small binary files that contain information\
    \ about the structure of the database. Any control files specified in the parameter\
    \ file must be available in order for you to mount the database. If a control\
    \ file becomes unavailable, then your database will cease operating until you\
    \ resolve the issue. I highly recommend that you configure your database with\
    \ at least three control files. If one control file becomes unavailable, you can\
    \ replace it with a copy of a good existing control file. It’s critical that you\
    \ know how to configure, add, and remove these files.\n\nOnline redo logs are\
    \ crucial files that record the database’s transaction history. If you have multiple\
    \ instances connected to one database, then each instance generates its own redo\
    \ thread. Each database must be created with two or more online redo log groups.\
    \ You can operate a database with each group’s having just one online redo log\
    \ member. However, I highly recommend that you create your online redo log groups\
    \ with two members in each group. If an online redo log has at least one member\
    \ that can be written to, your database will continue to function. If all members\
    \ of an online redo log group are unavailable, then your database will cease to\
    \ operate. As a DBA you must be extremely proficient in creating, adding, moving,\
    \ and dropping these critical database files.\n\nArchiving is the mechanism for\
    \ ensuring you have all the transactions required to recover the database. Once\
    \ enabled, the archiver needs to successfully copy the online redo log after a\
    \ log switch occurs. If the archiver can’t write to the primary archive destination,\
    \ then your database will hang. Therefore, you need to map out carefully the amount\
    \ of disk space required and how often to back up and subsequently remove these\
    \ files.\n\nThe chapters up to this point in the book have covered tasks such\
    \ as installing the Oracle software; creating databases; and managing tablespaces,\
    \ data files, control files, online redo log files, and archiving. The next several\
    \ chapters concentrate on how to configure a database for application use and\
    \ include topics such as creating users and database objects.\n\nCHAPTER 6\n\n\
    ![image](Images/frontdot.jpg)\n\nUsers and Basic Security\n\nAfter you’ve installed\
    \ the binaries, implemented a database, and created tablespaces, the next logical\
    \ task is to secure your database and begin creating new users. When you create\
    \ a database, several default user accounts are created by default. As a DBA you\
    \ must be aware of these accounts and how to manage them. The default accounts\
    \ are frequently the first place a hacker will look to gain access to a database;\
    \ therefore, you must take precautions to secure these users. Depending on what\
    \ options you install and which version of the database you implement, there could\
    \ be 20 or more default accounts.\n\nAs applications and users need access to\
    \ the database, you’ll need to create and manage new accounts. This includes choosing\
    \ an appropriate authentication method, implementing password security, and allocating\
    \ privileges to users. These topics are discussed in detail in this chapter.\n\
    \nManaging Default Users\n\nAs stated, when you create a database, Oracle creates\
    \ several default database users. One of your first tasks should be to identify\
    \ these users and establish basic security procedures, such as locking and expiring\
    \ passwords. The specific users that are created vary by database version. If\
    \ you’ve just created your database, you can view the default user accounts, as\
    \ follows:\n\n```\nSQL> select username from dba_users order by 1;\n```\n\nHere\
    \ is a partial listing of some default database user accounts:\n\n```\nUSERNAME\n\
    \nANONYMOUS\nAPPQOSSYS\nAUDSYS\nDBSNMP\nDIP\nGSMADMIN_INTERNAL\nGSMCATUSER\nGSMUSER\n\
    ORACLE_OCM\nOUTLN\nSYS\nSYSTEM\n...\n```\n\nWhat DBAs find frustrating about the\
    \ prior list is that it’s hard to keep track of what the default accounts are\
    \ and if they’re really required. Some DBAs may be tempted to drop default accounts\
    \ so as not to clutter up the database. I wouldn’t advise that. It’s safer to\
    \ lock these accounts (as shown in the next section). If you drop an account,\
    \ it can be difficult to figure out exactly how it was originally created, whereas\
    \ if you lock an account, you can simply unlock it to reactivate it.\n\n![image](Images/sq.jpg) **Note**  \
    \ If you’re working in a pluggable database environment, you can view all users\
    \ while connected as a ­privileged account to the root container by querying CDB_USERS.\
    \ Unless otherwise noted in this chapter, the queries assume that you’re not working\
    \ in a pluggable environment (and that you’re therefore using the DBA-level views).\
    \ If you’re in a ­pluggable environment, to view information across all pluggable\
    \ databases, you’ll need to use the CDB level views while connected to the root\
    \ container.\n\nSYS VS. SYSTEM\n\nOracle novices sometimes ask, “What’s the difference\
    \ between the SYS and SYSTEM schemas?” The SYS schema is the super-user of the\
    \ database, owns all internal data dictionary objects, and is used for tasks such\
    \ as creating a database, starting or stopping the instance, backup and recovery,\
    \ and adding or moving data files. These types of tasks typically require the\
    \ SYSDBA or SYSOPER role. Security for these roles is often controlled through\
    \ access to the OS account owner of the Oracle software. Additionally, security\
    \ for these roles can be administered via a password file, which allows remote\
    \ client/server access.\n\nIn contrast, the SYSTEM schema isn’t very special.\
    \ It’s just a schema that has been granted the DBA role. Many shops lock the SYSTEM\
    \ schema after database creation and never use it because it’s often the first\
    \ schema a hacker will try to access when attempting to break into a database.\n\
    \nRather than risking an easily guessable entry point to the database, you can\
    \ create a separate schema (named something other than SYSTEM) that has the DBA\
    \ role granted to it. This DBA schema is used for administrative tasks, such as\
    \ creating users, changing passwords, and granting database privileges.\n\nHaving\
    \ one or more separate DBA schemas for administrators provides more options for\
    \ security and auditing. If you require auditing that shows which DBA logged on\
    \ and when, then create a separate privileged account for each DBA on the team\
    \ (and turn on database auditing). Otherwise, one generic DBA-privileged account\
    \ is usually sufficient.\n\nLocking Accounts and Expiring Passwords\n\nTo begin\
    \ securing your database, you should minimally change the password for every default\
    \ account and then lock any accounts that you’re not using. Locking an account\
    \ means that a user won’t be able to access it unless a DBA explicitly unlocks\
    \ it. Also consider expiring the password for each account. Expiring the password\
    \ means that when a user first attempts to access an account, that user will be\
    \ forced to change the password.\n\nAfter creating a database, I usually lock\
    \ every default account and change their passwords to expired; I unlock default\
    \ users only as they’re needed. The following script generates the SQL statements\
    \ that lock all users and set their passwords to expired:\n\n```\nselect\n  'alter\
    \ user ' || username || ' password expire account lock;'\nfrom dba_users;\n```\n\
    \nA locked user can only be accessed by altering the user to an unlocked state;\
    \ for example,\n\n```\nSQL> alter user outln account unlock;\n```\n\nA user with\
    \ an expired password is prompted for a new password when first connecting to\
    \ the database as that user. When connecting to a user, Oracle checks to see if\
    \ the current password is expired and, if so, prompts the user, as follows:\n\n\
    ```\nORA-28001: the password has expired\nChanging password for ...\nNew password:\n\
    ```\n\nAfter entering the new password, the user is prompted to enter it again:\n\
    \n```\nRetype new password:\nPassword changed\nConnected.\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ You can lock the SYS account, but this has no influence on your ability to connect\
    \ as the SYS user through OS authentication or when using a password file.\n\n\
    There is no alter user <user_name> password unexpire command. To unexpire a password,\
    \ you simply need to change it. The user can change the password (as demonstrated\
    \ in the prior bits of code), or, as a DBA, you can change the password for a\
    \ user:\n\n```\nSQL> alter user <username> identified by <new password>;\n```\n\
    \nHowever, if you have a user with an expired password, and you don’t know the\
    \ current password and are hesitant to change it (because it’s in use in a production\
    \ environment, and you’re not sure in how many places within the application code\
    \ the old password has been hard-coded), what do you do?\n\nConsider this technique\
    \ to unexpire a password without changing it. In this example the user is MV_MAINT:\n\
    \n1.  As a DBA-privileged database user, first note the current profile of the\
    \ user:\n\n    ```\n    SQL> select username, profile from dba_users where username='MV_MAINT';\n\
    \n    USERNAME             PROFILE\n    -------------------- ----------\n    MV_MAINT            \
    \ DEFAULT\n    ```\n\n2.  Next, create a temporary profile:\n\n    ```\n    CREATE\
    \ PROFILE temp_prof LIMIT\n    PASSWORD_REUSE_MAX unlimited\n    PASSWORD_REUSE_TIME\
    \ unlimited;\n    ```\n\n3.  Now, assign the temporary profile to the user:\n\n\
    \    ```\n    SQL> alter user mv_maint profile temp_prof;\n    ```\n\n4.  Then,\
    \ view the obfuscated password:\n\n    ```\n    SQL> select password from user$\
    \ where name='MV_MAINT';\n    ```\n\n    Here is the output for this example:\n\
    \n    ```\n    PASSWORD\n    --------------------\n    E88FDA313EC0F3F4\n    ```\n\
    \n5.  Now, set the password to what it was; this unexpires it:\n\n    ```\n  \
    \  SQL> alter user mv_maint identified by values 'E88FDA313EC0F3F4';\n    ```\n\
    \n6.  Finally, assign the original profile back to the user:\n\n    ```\n    SQL>\
    \ alter user mv_maint profile default; ;\n    ```\n\nThe prior technique allows\
    \ you to unexpire a password without knowing the password and also avoids issues\
    \ with passwords that cannot be reused (ORA-28007: the password cannot be reused)\
    \ because of restrictive profile settings (such as PASSWORD_REUSE_MAX).\n\nIdentifying\
    \ DBA-Created Accounts\n\nIf you’ve inherited a database from another DBA, then\
    \ sometimes it’s useful to determine whether the DBA created a user or if a user\
    \ is a default account created by Oracle. As mentioned earlier, usually several\
    \ user accounts are created for you when you create a database. The number of\
    \ accounts varies somewhat by database version and options installed. Run this\
    \ query to display users that have been created by another DBA versus those created\
    \ by Oracle (such as those created by default when the database is created):\n\
    \n```\nselect distinct u.username\n,case when d.user_name is null then 'DBA created\
    \ account'\n else 'Oracle created account'\n end\nfrom dba_users    u\n    ,default_pwd$\
    \ d\nwhere u.username=d.user_name(+);\n```\n\nFor default users, there should\
    \ be a record in the DEFAULT_PWD$ view. So, if a user doesn’t exist in DEFAULT_PWD$,\
    \ then you can assume it’s not a default account. Given that logic, another way\
    \ to identify just the default users would be this:\n\n```\nselect distinct(user_name)\n\
    from default_pwd$\nwhere user_name in (select username from dba_users);\n```\n\
    \nThe prior queries aren’t 100 percent accurate, as there are users that exist\
    \ in DEFAULT_PWD$ that can be created manually by a DBA. Having said that, the\
    \ prior queries do provide a starting point for separating the default accounts\
    \ from ones created by you (or another DBA).\n\n![image](Images/sq.jpg) **Note**  \
    \ The DEFAULT_PWD$ view is available starting with Oracle Database 11g. See MOS\
    \ note 227010.1 for more details about guidelines on checking for default passwords.\n\
    \nChecking Default Passwords\n\nYou should also check your database to determine\
    \ whether any accounts are using default passwords. If you’re using an Oracle\
    \ Database 11g or higher, you can check the DBA_USERS_WITH_DEFPWD view to see\
    \ whether any Oracle-created user accounts are still set to the default password:\n\
    \n```\nSQL> select * from dba_users_with_defpwd;\n```\n\nIf you aren’t using Oracle\
    \ Database 11g or higher, then you have to check the passwords manually or use\
    \ a script. Listed next is a simple shell script that attempts to connect to the\
    \ database, using default passwords:\n\n```\n#!/bin/bash\nif [ $# -ne 1 ]; then\n\
      echo \"Usage: $0 SID\"\n  exit 1\nfi\n# Source oracle OS variables via oraset\
    \ script.\n# See Chapter 2 for more details on setting OS variables.\n. /etc/oraset\
    \ $1\n#\nuserlist=\"system sys dbsnmp dip oracle_ocm outln\"\nfor u1 in $userlist\n\
    do\n#\ncase $u1 in\nsystem)\npwd=manager\ncdb=$1\n;;\nsys)\npwd=\"change_on_install\"\
    \ncdb=\"$1 as sysdba\"\n;;\n*)\npwd=$u1\ncdb=$1\nesac\n#\necho \"select 'default'\
    \ from dual;\" | \\\n  sqlplus -s $u1/$pwd@$cdb | grep default >/dev/null\nif\
    \ [[ $? -eq 0 ]]; then\n  echo \"ALERT: $u1/$pwd@$cdb default password\"\n  echo\
    \ \"def pwd $u1 on $cdb\" | mailx -s \"$u1 pwd default\" dkuhn@gmail.com\nelse\n\
      echo \"cannot connect to $u1 with default password.\"\nfi\ndone\nexit 0\n```\n\
    \nIf the script detects a default password, an e-mail is sent to the appropriate\
    \ DBA. This script is just a simple example, the point being that you need some\
    \ sort of mechanism for detecting default passwords. You can create your own script\
    \ or modify the previous script to suit your requirements.\n\nCreating Users\n\
    \nWhen you’re creating a user, you need to consider the following factors:\n\n\
    *   Username and authentication method\n*   Basic privileges\n*   Default permanent\
    \ tablespace and space quotas\n*   Default temporary tablespace\n\nThese aspects\
    \ of creating a user are discussed in the following sections.\n\n![image](Images/sq.jpg) **Note**  \
    \ New in Oracle Database 12c, pluggable database environments have common users\
    \ and local users. Common users span all pluggable databases within a container\
    \ database. Local users exist within one pluggable database. See [Chapter 23](#9781430257288_Ch23.xhtml)\
    \ for details on managing common users and local users.\n\nChoosing a Username\
    \ and Authentication Method\n\nPick a username that gives you an idea as to what\
    \ application the user will be using. For example, if you have an inventory management\
    \ application, a good choice for a username is INV_MGMT. Choosing a meaningful\
    \ username helps identify the purpose of a user. This can be especially useful\
    \ if a system isn’t documented properly.\n\nAuthentication is the method used\
    \ to confirm that the user is authorized to use the account. Oracle supports a\
    \ robust set of authentication methods:\n\n*   Database authentication (username\
    \ and password stored in database)\n*   OS authentication\n*   Network authentication\n\
    *   Global user authentication and authorization\n*   External service authentication\n\
    \nA simple, easy, and reliable form of authentication is through the database.\
    \ In this form of authentication, the username and password are stored within\
    \ the database. The password is not stored in plain text; it is stored in a secure,\
    \ encrypted format. When connecting to the database, the user provides a username\
    \ and password. The database checks the entered username and password against\
    \ information stored in the database, and if there’s a match, the user is allowed\
    \ to connect to the database with the privileges associated with the account.\n\
    \nAnother commonly implemented authentication method is through the OS. OS authentication\
    \ means that if you can successfully log in to a server, then it’s possible to\
    \ establish a connection to a local database without providing username and password\
    \ details. In other words, you can associate database privileges with an OS account\
    \ or and associated OS group, or both.\n\nExamples of database and OS authentication\
    \ are discussed in the next two sections. If you have more sophisticated authentication\
    \ requirements, then you should investigate network, global, or external service\
    \ authentication. See the Oracle Database Security Guide and the Oracle Database\
    \ Advanced Security Administrator’s Guide, which can be freely downloaded from\
    \ the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for more details regarding these methods.\n\nCreating a User with Database Authentication\n\
    \nDatabase authentication is established with the CREATE USER SQL statement. When\
    \ you’re creating users as a DBA, your account must have the CREATE USER system\
    \ privilege. This example creates a user named HEERA with the password CHAYA and\
    \ assigns the default permanent tablespace USERS, default temporary tablespace\
    \ TEMP , and unlimited space quota on the USERS tablespace:\n\n```\ncreate user\
    \ heera identified by chaya\ndefault tablespace users\ntemporary tablespace temp\n\
    quota unlimited on users;\n```\n\nThis creates a bare-bones schema that has no\
    \ privileges to do anything in the database. To make the user useful, you must\
    \ minimally grant it the CREATE SESSION system privilege:\n\n```\nSQL> grant create\
    \ session to heera;\n```\n\nIf the new schema needs to be able to create tables,\
    \ you need to grant it additional privileges, such as CREATE TABLE:\n\n```\nSQL>\
    \ grant create table to heera;\n```\n\nYou can also use the GRANT...IDENTIFIED\
    \ BY statement to create a user; for example,\n\n```\ngrant create table, create\
    \ session\nto heera identified by chaya;\n```\n\nIf the user doesn’t exist, the\
    \ account is created by the prior statement. If the user does exist, the password\
    \ is changed to the one specified by the IDENTIFIED BY clause (and any specified\
    \ grants are also applied).\n\n![image](Images/sq.jpg) **Note**   Sometimes, when\
    \ DBAs create a user, they’ll assign default roles to a schema, such as CONNECT\
    \ and RESOURCE. These roles contain system privileges, such as CREATE SESSION\
    \ and CREATE TABLE (and several others privileges, which vary by database release).\
    \ I recommend against doing this, because Oracle has stated that those roles may\
    \ not be ­available in future releases.\n\nCreating a User with OS Authentication\n\
    \nOS authentication assumes that if the user can log in to the database server,\
    \ then database privileges can be associated with and derived from the OS user\
    \ account. There are two types of OS authentication:\n\n*   Authentication through\
    \ assigning specific OS roles to users (allows database privileges to be mapped\
    \ to users)\n*   Authentication for regular database users via the IDENTIFIED\
    \ EXTERNALLY clause\n\nAuthentication through OS roles is detailed in [Chapter\
    \ 2](#9781430257288_Ch02.xhtml). This type of authentication is used by DBAs and\
    \ allows them to connect to an OS account, such as oracle, and then connect to\
    \ the database with SYSDBA privileges without having to specify a username and\
    \ password.\n\nAfter logging in to the database server, users created with the\
    \ IDENTIFIED EXTERNALLY clause can connect to the database without having to specify\
    \ a username or password. This type of authentication has some interesting advantages:\n\
    \n*   Users with access to the server don’t have to maintain a database username\
    \ and password.\n*   Scripts that log in to the database don’t have to use hard-coded\
    \ passwords if executed by OS-authenticated users.\n*   Another database user\
    \ can’t hack into a user by trying to guess the username and password connection\
    \ string. The only way to log in to an OS-authenticated user is from the OS.\n\
    \nWhen using OS authentication, Oracle prefixes the value contained in OS_AUTHENT_PREFIX\
    \ database initialization parameter to the OS user connecting to the database.\
    \ The default value for this parameter is OPS$. Oracle strongly recommends that\
    \ you set the OS_AUTHENT_PREFIX parameter to a null string; for example,\n\n```\n\
    SQL> alter system set os_authent_prefix='' scope=spfile;\n```\n\nYou have to stop\
    \ and start your database for this modification to take effect. After you’ve set\
    \ the OS_AUTHENT_PREFIX parameter, you can create an externally authenticated\
    \ user. For instance, say you have an OS user named jsmith, and you want anybody\
    \ with access to this OS user to be able to log in to the database without supplying\
    \ a password. Use the CREATE EXTERNALLY statement to do this:\n\n```\nSQL> create\
    \ user jsmith identified externally;\nSQL> grant create session to jsmith;\n```\n\
    \nNow, when jsmith logs in to the database server, this user can connect to SQL*Plus,\
    \ as follows:\n\n```\n$ sqlplus /\n```\n\nNo username or password is required,\
    \ because the user has already been authenticated by the OS.\n\nUnderstanding\
    \ Schemas vs. Users\n\nA schema is a collection of database objects (such as tables\
    \ and indexes). A schema is owned by a user and has the same name as the user.\
    \ The terms user and schema are often used synonymously by DBAs and developers.\
    \ Distinguishing between the two terms isn’t usually important, but there are\
    \ some subtle differences.\n\nWhen you log in to an Oracle database, you connect\
    \ using a username and password. In this example, the user is INV_MGMT, and the\
    \ password is f00bar:\n\n```\nSQL> connect inv_mgmt/f00bar\n```\n\nWhen you connect\
    \ as a user, by default you can manipulate objects in the schema owned by the\
    \ user with which you connected to the database. For example, when you attempt\
    \ to describe a table, Oracle by default accesses the current user’s schema. Therefore,\
    \ there is no reason to preface the table name with the currently connected user\
    \ (owner). Suppose the currently connected user is INV_MGMT. Consider the following\
    \ DESCRIBE command:\n\n```\nSQL> describe inventory;\n```\n\nThe prior statement\
    \ is identical in function to the following statement:\n\n```\nSQL> desc inv_mgmt.inventory;\n\
    ```\n\nYou can alter your current user’s session to point at a different schema\
    \ via the ALTER SESSION statement:\n\n```\nSQL> alter session set current_schema\
    \ = hr;\n```\n\nThis statement doesn’t grant the current user (in this example,\
    \ INV_MGMT) any extra privileges. The statement does instruct Oracle to use the\
    \ schema qualifier HR for any subsequent SQL statements that reference database\
    \ objects. If the appropriate privileges have been granted, the INV_MGMT user\
    \ can access the HR user’s objects without having to prefix the schema name to\
    \ the object name.\n\n![image](Images/sq.jpg) **Note**   Oracle does have a CREATE\
    \ SCHEMA statement. Ironically, CREATE SCHEMA does not create a schema or a user.\
    \ Rather, this statement provides a method for creating several objects (tables,\
    \ views, grants) in a schema as one ­transaction. I’ve rarely seen the CREATE\
    \ SCHEMA statement used, but it’s something to be aware of in case you’re in a\
    \ shop that does use it.\n\nAssigning Default Permanent and Temporary Tablespaces\n\
    \nEnsuring that users have a correct default permanent tablespace and temporary\
    \ tablespace helps prevent issues of inadvertently filling up the SYSTEM tablespace,\
    \ which could cause the database to become unavailable as well as engendering\
    \ performance problems. The concern is that when you don’t define a default permanent\
    \ and temporary tablespace for your database, when you create a user, by default\
    \ the SYSTEM tablespace is used. This is never a good thing.\n\nAs outlined in\
    \ [Chapter 2](#9781430257288_Ch02.xhtml), you should establish a default permanent\
    \ tablespace and temporary tablespace when creating the database. Also shown in\
    \ [Chapter 2](#9781430257288_Ch02.xhtml) were the SQL statements for identifying\
    \ and altering the default permanent tablespace and temporary tablespace. This\
    \ ensures that when you create a user and don’t specify default permanent and\
    \ temporary tablespaces, the database defaults will be applied. The SYSTEM tablespace\
    \ will therefore never be used for the default permanent and temporary tablespaces.\n\
    \nHaving said that, the reality is that you’ll most likely encounter databases\
    \ that were not set up this way. When maintaining a database, you should verify\
    \ the default permanent and temporary tablespace settings to make certain they\
    \ meet your database standards. You can look at user information by selecting\
    \ from the DBA_USERS view:\n\n```\nselect\n username\n,password\n,default_tablespace\n\
    ,temporary_tablespace\nfrom dba_users;\n```\n\nHere is small sample of the output:\n\
    \n```\nUSERNAME             PASSWORD   DEFAULT_TABLESPACE        TEMPORARY_TABLESPACE\n\
    -------------------- ---------- ------------------------- --------------------\n\
    JSMITH               EXTERNAL   USERS                     TEMP\nMV_MAINT                        USERS                    \
    \ TEMP\nAUDSYS                          USERS                     TEMP\nGSMUSER                        \
    \ USERS                     TEMP\nXS$NULL                         USERS                    \
    \ TEMP\n```\n\nNone of your users, other than the SYS user, should have a default\
    \ permanent tablespace of SYSTEM. You don’t want any users other than SYS creating\
    \ objects in the SYSTEM tablespace. The SYSTEM tablespace should be reserved for\
    \ the SYS user’s objects. If other users’ objects existed in the SYSTEM tablespace,\
    \ you’d run the risk of filling up that tablespace and compromising the availability\
    \ of your database.\n\nAll your users should be assigned a temporary tablespace\
    \ that has been created as type temporary. Usually, this tablespace is named TEMP\
    \ (see [Chapter 4](#9781430257288_Ch04.xhtml) for more details).\n\nIf you find\
    \ any users with inappropriate default tablespace settings, you can modify them\
    \ with the ALTER USER statement:\n\n```\nSQL> alter user inv_mgmt default tablespace\
    \ users temporary tablespace temp;\n```\n\nYou never want any users with a temporary\
    \ tablespace of SYSTEM. If a user has a temporary tablespace of SYSTEM, then any\
    \ sort area for which the user requires temporary disk storage acquires extents\
    \ in the SYSTEM tablespace. This can lead to the SYSTEM tablespace’s filling up.\
    \ You don’t want this ever to occur, because a SYS schema’s inability to acquire\
    \ more space as its objects grow can lead to a nonfunctioning database. To check\
    \ for users that have a temporary tablespace of SYSTEM, run this script:\n\n```\n\
    SQL> select username from dba_users where temporary_tablespace='SYSTEM';\n```\n\
    \nTypically, I use the script name creuser.sql when creating a user. This script\
    \ uses variables that define the usernames, passwords, default tablespace name,\
    \ and so on. For each environment in which the script is executed (development,\
    \ test, quality assurance (QA), beta, production), you can change the ampersand\
    \ variables, as required. For instance, you can use a different password and different\
    \ tablespaces for each separate environment.\n\nHere’s an example creuser.sql\
    \ script:\n\n```\nDEFINE cre_user=inv_mgmt\nDEFINE cre_user_pwd=inv_mgmt_pwd\n\
    DEFINE def_tbsp=inv_data\nDEFINE idx_tbsp=inv_index\nDEFINE def_temp_tbsp=temp\n\
    DEFINE smk_ttbl=zzzzzzz\n--\nCREATE USER &&cre_user IDENTIFIED BY &&cre_user_pwd\n\
    DEFAULT TABLESPACE &&def_tbsp\nTEMPORARY TABLESPACE &&def_temp_tbsp;\n--\nGRANT\
    \ CREATE SESSION TO &&cre_user;\nGRANT CREATE TABLE   TO &&cre_user;\n--\nALTER\
    \ USER &&cre_user QUOTA UNLIMITED ON &&def_tbsp;\nALTER USER &&cre_user QUOTA\
    \ UNLIMITED ON &&idx_tbsp;\n--\n-- Smoke test\nCONN &&cre_user/&&cre_user_pwd\n\
    CREATE TABLE &&smk_ttbl(test_id NUMBER) TABLESPACE &&def_tbsp;\nCREATE INDEX &&smk_ttbl._idx1\
    \ ON &&smk_ttbl(test_id) TABLESPACE &&idx_tbsp;\nINSERT INTO &&smk_ttbl VALUES(1);\n\
    DROP TABLE &&smk_ttbl;\n```\n\nSMOKE TEST\n\n*Smoke test* is a term used in occupations\
    \ such as plumbing, electronics, and software development. The term refers to\
    \ the first check done after initial assembly or repairs in order to provide some\
    \ level of assurance that the system works properly.\n\nIn plumbing a smoke test\
    \ forces smoke through the drainage pipes. The forced smoke helps quickly identify\
    \ cracks or leaks in the system. In electronics a smoke test occurs when power\
    \ is first connected to a circuit. This sometimes produces smoke if the wiring\
    \ is faulty.\n\nIn software development a smoke test is a simple test of the system\
    \ to ensure that it has some level of workability. Many managers have reportedly\
    \ been seen to have smoke coming out their ears when the smoke test fails.\n\n\
    Modifying Passwords\n\nUse the ALTER USER command to modify an existing user’s\
    \ password. This example changes the HEERA user’s password to FOOBAR:\n\n```\n\
    SQL> alter user HEERA identified by FOOBAR;\n```\n\nYou can change the password\
    \ of another account only if you have the ALTER USER privilege granted to your\
    \ user. This privilege is granted to the DBA role. After you change a password\
    \ for a user, any subsequent connection to the database by that user requires\
    \ the password indicated by the ALTER USER statement.\n\nIn Oracle Database 11g\
    \ or higher, when you modify a password, it’s case sensitive. If you’re using\
    \ Oracle Database 10g or lower, the password isn’t case sensitive.\n\nSQL*PLUS\
    \ PASSWORD COMMAND\n\nYou can change the password for a user with the SQL*Plus\
    \ PASSWORD command. (Like all SQL*Plus commands, it can be abbreviated.) After\
    \ issuing the command, you’re prompted for a new password:\n\n```\nSQL> passw\
    \ heera\nChanging password for heera\nNew password:\nRetype new password:\nPassword\
    \ changed\n```\n\nThis method has the advantage of changing a password for a user\
    \ without displaying the new password on the screen.\n\nLogging In as a Different\
    \ User\n\nThis section details how to log in to a different user without having\
    \ the clear-text form of the user’s password. You may wish to do this in a couple\
    \ of situations:\n\n*   You’re copying a user from one environment (such as production)\
    \ to a different environment (such as test), and you want to retain the original\
    \ password.\n*   You’re working in a production environment, and you need to be\
    \ able to connect as the user that owns objects to execute CREATE TABLE statements,\
    \ issue grants, and so on. In a production environment you may not know the user’s\
    \ password because of poor maintenance procedures.\n\nYou need access to a DBA-privileged\
    \ account to be able to log in as a different user without knowing the password.\
    \ Here are the steps to do this:\n\n1.  As a DBA, temporarily store a user’s obfuscated\
    \ password.\n2.  Change the user’s password.\n3.  Connect to the user with the\
    \ new password, and run DDL statements.\n4.  Connect as a DBA, and change the\
    \ password back to the original.\n\nBe very careful when changing a user’s password\
    \ as described in the previous steps. First, the application can’t connect to\
    \ the database while the password has been changed to a temporary setting. If,\
    \ when attempting to connect the application, you exceed the FAILED_LOGIN_ATTEMPTS\
    \ limit of a user’s profile (the default is ten failed attempts), the account\
    \ will lock.\n\nFurthermore, if you’ve modified the values of PASSWORD_REUSE_MAX\
    \ (the number of days before a password can be reused) and PASSWORD_REUSE_TIME(the\
    \ number of times a password must change before a password can be reused), then\
    \ you can’t change the password back to its original value.\n\nListed next is\
    \ an example that shows how to temporarily change a user’s password and then change\
    \ the password back to its original value. First, select the statement required\
    \ to restore a user’s password to its original setting. In this example, the username\
    \ is APPUSR:\n\n```\nselect 'alter user appusr identified by values ' ||\n''''\
    \ || password || '''' || ';'\nfrom user$ where name='APPUSR';\n```\n\nHere is\
    \ the output for this example:\n\n```\nalter user appusr identified by values\
    \ 'A0493EBF86198724';\n```\n\nNow, modify the user’s password to a known value\
    \ (in this example, foo):\n\n```\nSQL> alter user appusr identified by foo;\n\
    ```\n\nConnect to the APPUSR user:\n\n```\nSQL> conn appusr/foo\n```\n\nAfter\
    \ you’re finished using the APPUSR user, change its password back to the original\
    \ value:\n\n```\nSQL> alter user appusr identified by values 'A0493EBF86198724';\n\
    ```\n\nAgain, be very cautious when performing this procedure, because you don’t\
    \ want to put yourself in a situation in which a password profile setting won’t\
    \ allow you to reset the password:\n\n```\nORA-28007: the password cannot be reused\n\
    ```\n\nIf you get this error, one option is to set the password to a brand new\
    \ value. However, doing so may have an undesirable impact on the application.\
    \ If developers have hard-coded the password into response files, the application\
    \ can’t log in without changing the hard-coded password to the new password.\n\
    \nYour other option is to temporarily change the user’s profile to allow the password\
    \ to be reused. First, check to see what the current profile is for the user:\n\
    \n```\nSQL> select username, profile from dba_users where username = UPPER('&&username');\n\
    ```\n\nHere is some sample output:\n\n```\nUSERNAME                       PROFILE\n\
    ------------------------------ ------------------------------\nAPPUSR                        \
    \ SECURE\n```\n\nThen, create a profile that specifically allows a password to\
    \ be reused without any restrictions:\n\n```\nCREATE PROFILE temp_prof LIMIT\n\
    PASSWORD_REUSE_MAX unlimited\nPASSWORD_REUSE_TIME unlimited;\n```\n\nNext, assign\
    \ the user the profile that doesn’t limit the reuse of passwords:\n\n```\nSQL>\
    \ alter user appusr profile temp_prof;\n```\n\nYou should be able to modify the\
    \ password, as shown previously:\n\n```\nSQL> alter user appusr identified by\
    \ values 'A0493EBF86198724';\n```\n\nIf successful, you see this message:\n\n\
    ```\nUser altered.\n```\n\nMake sure you set the profile back to the original\
    \ value for the user:\n\n```\nSQL> alter user appusr profile secure;\n```\n\n\
    Finally, drop the temporary profile so that it isn’t accidentally used in the\
    \ future:\n\n```\nSQL> drop profile temp_prof;\n```\n\nModifying Users\n\nSometimes\
    \ you need to modify existing users, for the following types of reasons:\n\n*\
    \   Change a user’s password\n*   Lock or unlock a user\n*   Change the default\
    \ permanent or temporary tablespace, or both\n*   Change a profile or role\n*\
    \   Change system or object privileges\n*   Modify quotas on tablespaces\n\nUse\
    \ the ALTER USER statement to modify users. Listed next are several SQL statements\
    \ that modify a user. This example changes a user’s password, using the IDENTIFIED\
    \ BY clause:\n\n```\nSQL> alter user inv_mgmt identified by i2jy22a;\n```\n\n\
    If you don’t set a default permanent tablespace and temporary tablespace when\
    \ you initially create the user, you can modify them after creation, as shown\
    \ here:\n\n```\nSQL> alter user inv_mgmt default tablespace users temporary tablespace\
    \ temp;\n```\n\nThis example locks a user account:\n\n```\nSQL> alter user inv_mgmt\
    \ account lock;\n```\n\nAnd, this example alters the user’s quota on the USERS\
    \ tablespace:\n\n```\nSQL> alter user inv_mgmt quota 500m on users;\n```\n\nDropping\
    \ Users\n\nBefore you drop a user, I recommend that you first lock the user. Locking\
    \ the user prevents others from connecting to a locked database account. This\
    \ allows you to better determine whether someone is using the account before it’s\
    \ dropped. Here is an example of locking a user:\n\n```\nSQL> alter user heera\
    \ account lock;\n```\n\nAny user or application attempting to connect to this\
    \ user now receives the following error:\n\n```\nORA-28000: the account is locked\n\
    ```\n\nTo view the users and lock dates in your database, issue this query:\n\n\
    ```\nSQL> select username, lock_date from dba_users;\n```\n\nTo unlock an account,\
    \ issue this command:\n\n```\nSQL> alter user heera account unlock;\n```\n\nLocking\
    \ users is a very handy technique for securing your database and discovering which\
    \ users are active.\n\nBe aware that by locking a user, you aren’t locking access\
    \ to a user’s objects. For instance, if a USER_A has select, insert, update, and\
    \ delete privileges on tables owned by USER_B, if you lock the USER_B account,\
    \ USER_A can still issue DML statements against the objects owned by USER_B.\n\
    \n![image](Images/sq.jpg) **Tip**   If a user’s objects don’t consume inordinate\
    \ amounts of disk space, then before you drop the user, it’s prudent to make a\
    \ quick backup. See [Chapter 13](#9781430257288_Ch13.xhtml) for details on using\
    \ Data Pump to back up a single user.\n\nAfter you’re sure that a user and its\
    \ objects aren’t needed, use the DROP USER statement to remove a database account.\
    \ This example drops the user HEERA:\n\n```\nSQL> drop user heera;\n```\n\nThe\
    \ prior command won’t work if the user owns any database objects. Use the CASCADE\
    \ clause to remove a user and have its objects dropped:\n\n```\nSQL> drop user\
    \ heera cascade;\n```\n\n![image](Images/sq.jpg) **Note**   The DROP USER statement\
    \ may take a great deal of time to execute if the user being dropped owns a vast\
    \ number of database objects. In these situations, you may want to consider dropping\
    \ the user’s objects before dropping the user.\n\nWhen you drop a user, any tables\
    \ that it owns are also dropped. Additionally, all indexes, triggers, and referential\
    \ integrity constraints are removed. If referential integrity constraints exist\
    \ in other schemas that depend on any dropped primary key and unique key constraints,\
    \ the referential constraints in those schemas are also dropped. Oracle invalidates\
    \ but doesn’t drop any views, synonyms, procedures, functions, or packages that\
    \ are dependent on the dropped user’s objects.\n\nEnforcing Password Security\
    \ and Resource Limits\n\nWhen you’re creating users, sometimes requirements call\
    \ for passwords to adhere to a set of security rules, for example, necessitating\
    \ that the password be of a certain length and contain numeric characters. Also,\
    \ when you set up database users, you may want to ensure that a certain user isn’t\
    \ capable of consuming an inordinate amount of CPU resources.\n\nYou can use a\
    \ database profile to meet these types of requirements. An Oracle profile is a\
    \ database object that serves two purposes:\n\n*   Enforces password security\
    \ settings\n*   Limits system resources that a user consumes\n\nThese topics are\
    \ discussed in the next several sections.\n\n![image](Images/sq.jpg) **Tip**  \
    \ Don’t confuse a database profile with a SQL profile. A database profile is an\
    \ object assigned to a user that enforces password security and that constrains\
    \ database resource usage, whereas a SQL profile is associated with a SQL statement\
    \ and contains corrections to statistics that help the optimizer generate a more\
    \ efficient execution plan.\n\nBasic Password Security\n\nWhen you create a user,\
    \ if no profile is specified, the DEFAULT profile is assigned to the newly created\
    \ user. To view the current settings for a profile, issue the following SQL:\n\
    \n```\nselect profile, resource_name, resource_type, limit\nfrom dba_profiles\n\
    order by profile, resource_type;\n```\n\nHere is a partial listing of the output:\n\
    \n```\nPROFILE      RESOURCE_NAME               RESOURCE LIMIT\n------------ ---------------------------\
    \ -------- ---------------\nDEFAULT      CONNECT_TIME                KERNEL  \
    \ UNLIMITED\nDEFAULT      PRIVATE_SGA                 KERNEL   UNLIMITED\nDEFAULT      COMPOSITE_LIMIT            \
    \ KERNEL   UNLIMITED\nDEFAULT      SESSIONS_PER_USER           KERNEL   UNLIMITED\n\
    DEFAULT      LOGICAL_READS_PER_SESSION   KERNEL   UNLIMITED\nDEFAULT      CPU_PER_CALL                KERNEL  \
    \ UNLIMITED\nDEFAULT      IDLE_TIME                   KERNEL   UNLIMITED\nDEFAULT      LOGICAL_READS_PER_CALL      KERNEL  \
    \ UNLIMITED\nDEFAULT      CPU_PER_SESSION             KERNEL   UNLIMITED\nDEFAULT      PASSWORD_LIFE_TIME          PASSWORD\
    \ 180\nDEFAULT      PASSWORD_GRACE_TIME         PASSWORD 7\nDEFAULT      PASSWORD_REUSE_TIME        \
    \ PASSWORD UNLIMITED\nDEFAULT      PASSWORD_REUSE_MAX          PASSWORD UNLIMITED\n\
    DEFAULT      PASSWORD_LOCK_TIME          PASSWORD 1\nDEFAULT      FAILED_LOGIN_ATTEMPTS      \
    \ PASSWORD 10\nDEFAULT      PASSWORD_VERIFY_FUNCTION    PASSWORD NULL\n```\n\n\
    A profile’s password restrictions are in effect as soon as the profile is assigned\
    \ to a user. For example, from the previous output, if you’ve assigned the DEFAULT\
    \ profile to a user, that user is allowed only ten consecutive failed login attempts\
    \ before the user account is automatically locked by Oracle. See [Table 6-1](#9781430257288_Ch06.xhtml#Tab1)\
    \ for a description of the password profile security settings.\n\n[Table 6-1.](#9781430257288_Ch06.xhtml#_Tab1)\
    \ Password Security Settings\n\n| Password Setting | Description | Default |\n\
    | --- | --- | --- |\n| FAILED_LOGIN_ATTEMPTS | Number of failed login attempts\
    \ before the schema is locked | 10 attempts |\n| PASSWORD_GRACE_TIME | Number\
    \ of days after a password expires that the owner can log in with an old password\
    \ | 7 days |\n| PASSWORD_LIFE_TIME | Number of days a password is valid | 180\
    \ days |\n| PASSWORD_LOCK_TIME | Number of days an account is locked after FAILED_LOGIN_ATTEMPTS\
    \ has been reached | 1 day |\n| PASSWORD_REUSE_MAX | Number of days before a password\
    \ can be reused | Unlimited |\n| PASSWORD_REUSE_TIME | Number of times a password\
    \ must change before a password can be reused | Unlimited |\n| PASSWORD_VERIFY_FUNCTION\
    \ | Database function used to verify the password | Null |\n\n![image](Images/sq.jpg) **Tip**  \
    \ See MOS note 454635.1 for details on Oracle Database DEFAULT profile changes.\n\
    \nYou can alter the DEFAULT profile to customize it for your environment. For\
    \ instance, say you want to enforce a cap on the maximum number of days a password\
    \ can be used. The next line of code sets the PASSWORD_LIFE_TIME of the DEFAULT\
    \ profile to 300 days:\n\n```\nSQL> alter profile default limit password_life_time\
    \ 300;\n```\n\nThe PASSWORD_REUSE_TIME and PASSWORD_REUSE_MAX settings must be\
    \ used in conjunction. If you specify an integer for one parameter (it doesn’t\
    \ matter which one) and UNLIMITED for the other parameter, the then current password\
    \ can never be reused.\n\nIf you want to specify that the DEFAULT profile password\
    \ must be changed ten times within 100 days before it can be reused, use a line\
    \ of code similar to this:\n\n```\nSQL> alter profile default limit password_reuse_time\
    \ 100 password_reuse_max 10;\n```\n\nAlthough using the DEFAULT profile is sufficient\
    \ for many environments, you may need tighter security management. I recommend\
    \ that you create custom security profiles and assign them to users, as required.\
    \ For example, create a profile specifically for application users:\n\n```\nCREATE\
    \ PROFILE SECURE_APP LIMIT\nPASSWORD_LIFE_TIME 200\nPASSWORD_GRACE_TIME 10\nPASSWORD_REUSE_TIME\
    \ 1\nPASSWORD_REUSE_MAX 1\nFAILED_LOGIN_ATTEMPTS 3\nPASSWORD_LOCK_TIME 1;\n```\n\
    \nAfter you create the profile, you can assign it to users, as appropriate. The\
    \ following SQL generates a SQL script, named alt_prof_dyn.sql, that you can use\
    \ to assign the newly created profile to users:\n\n```\nset head off;\nspo alt_prof_dyn.sql\n\
    select 'alter user ' || username || ' profile secure_app;'\nfrom dba_users where\
    \ username like '%APP%';\nspo off;\n```\n\nBe careful when assigning profiles\
    \ to application accounts that use the database. If you want to enforce that a\
    \ password change at a regular frequency, be sure you understand the impact on\
    \ production systems. Passwords tend to get hard-coded into response files and\
    \ code. Enforcing password changes in these environments can wreak havoc, as you\
    \ try to chase down all the places where the password is referenced. If you don’t\
    \ want to enforce the periodic changing of the password, you can set PASSWORD_LIFE_TIME\
    \ to a high value, such as 10,000 or unlimited.\n\nHAS THE PASSWORD EVER CHANGED?\n\
    \nWhen you’re determining if a password is secure, it’s useful to check to see\
    \ whether the password for a user has ever been changed. If the password for a\
    \ user has never been changed, this may be viewed as a security risk. This example\
    \ performs such a check:\n\n```\nselect\nname\n,to_char(ctime,'dd-mon-yy hh24:mi:ss')\n\
    ,to_char(ptime,'dd-mon-yy hh24:mi:ss')\n,length(password)\nfrom user$\nwhere password\
    \ is not null\nand password not in ('GLOBAL','EXTERNAL')\nand ctime=ptime;\n```\n\
    \nIn this script the CTIME column contains the timestamp of when the user was\
    \ created. The PTIME column contains the timestamp of when the password was changed.\
    \ If the CTIME and PTIME are identical, then the password has never changed.\n\
    \nPassword Strength\n\nA password that cannot be easily guessed is considered\
    \ a strong password. The strength of a password can be quantified in terms of\
    \ length, use of upper/lower case, nondictionary based words, numeric characters,\
    \ and so on. For example, a password of L5K0ta890g would be considered strong,\
    \ whereas a password of pass would be considered weak. There are a couple schools\
    \ of thought on enforcing password strength:\n\n*   Use easily remembered passwords\
    \ so that you don’t have them written down or recorded in a file somewhere. Because\
    \ the passwords aren’t sophisticated, they aren’t very secure.\n*   Enforce a\
    \ level of sophistication (strength) for passwords. Such passwords aren’t easily\
    \ remembered and thus must be recorded somewhere, which isn’t secure.\n\nYou may\
    \ choose to enforce a degree of password strength because you think it’s the most\
    \ secure option. Or you may be required to enforce password security sophistication\
    \ by your corporate security team (and thus have no choice in the matter). This\
    \ section isn’t about debating which of the prior methods is preferable. Should\
    \ you choose to impose a degree of strength for a password, this section describes\
    \ how to enforce the rules.\n\nYou can enforce a minimum standard of password\
    \ complexity by assigning a password verification function to a user’s profile.\
    \ Oracle supplies a default password verification function that you create by\
    \ running the following script as the SYS schema:\n\n```\nSQL> @?/rdbms/admin/utlpwdmg\n\
    ```\n\nThe prior script creates the following password verification functions:\n\
    \n*   ora12c_verify_function (Oracle Database 12c)\n*   ora12c_strong_verify_function\
    \ (very secure Oracle Database 12c)\n*   verify_function_11G (Oracle Database\
    \ 11g)\n*   verify_function (Oracle Database 10g)\n\nOnce the password verify\
    \ function has been created, you can use the ALTER PROFILE command to associate\
    \ the password verify function with all users to which a given profile is assigned.\
    \ For instance, in Oracle Database 12c, to set the password verify function of\
    \ the DEFAULT profile, issue this command:\n\n```\nSQL> alter profile default\
    \ limit PASSWORD_VERIFY_FUNCTION ora12c_verify_function;\n```\n\nIf, for any reason,\
    \ you need to back out of the new security modifications, run this statement to\
    \ disable the password function:\n\n```\nSQL> alter profile default limit PASSWORD_VERIFY_FUNCTION\
    \ null;\n```\n\nWhen enabled, the password verification function ensures that\
    \ users are correctly creating or modifying their passwords. The utlpwdmgsql script\
    \ creates a function that checks a password to make certain it meets basic security\
    \ standards, such as minimum password length and password not the same as username.\
    \ You can verify that the new security function is in effect by attempting to\
    \ change the password of a user to which the DEFAULT profile has been assigned.\
    \ This example tries to change the password to less than the minimum length:\n\
    \n```\nSQL> password\nChanging password for HEERA\nOld password:\nNew password:\n\
    Retype new password:\nERROR:\nORA-28003: password verification for the specified\
    \ password failed\nORA-20001: Password length less than 8\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ For Oracle Database 12c and 11g, when using the standard password verify function,\
    \ the minimum password length is eight characters. For Oracle Database 10g the\
    \ minimum length is four characters.\n\nKeep in mind that it’s possible to modify\
    \ the code used to create the password verification function. For example, you\
    \ can open and modify the script used to create this function:\n\n```\n$ vi $ORACLE_HOME/rdbms/admin/utlpwdmg.sql\n\
    ```\n\nIf you feel that the Oracle-supplied verification function is too strong,\
    \ or overly restrictive, you can create your own function and assign the appropriate\
    \ database profiles to it.\n\n![image](Images/sq.jpg) **Note**   As of Oracle\
    \ Database 12g, the SEC_CASE_SENSITIVE_LOGON parameter has been deprecated. Setting\
    \ this initialization parameter to FALSE allows you to make passwords case insensitive.\n\
    \nLimiting Database Resource Usage\n\nAs mentioned earlier, the password profile\
    \ settings take effect as soon as you assign the profile to a user. Unlike password\
    \ settings, kernel resource profile restrictions don’t take effect until you set\
    \ the RESOURCE_LIMIT initialization parameter to TRUE for your database; for example,\n\
    \n```\nSQL> alter system set resource_limit=true scope=both;\n```\n\nTo view the\
    \ current setting of the RESOURCE_LIMIT parameter, issue this query:\n\n```\n\
    SQL> select name, value from v$parameter where name='resource_limit';\n```\n\n\
    When you create a user, if you don’t specify a profile, then the DEFAULT profile\
    \ is assigned to the user. You can modify the DEFAULT profile with the ALTER PROFILE\
    \ statement. The next example modifies the DEFAULT profile to limit CPU_PER_SESSION\
    \ to 240,000 (in hundredths of seconds):\n\n```\nSQL> alter profile default limit\
    \ cpu_per_session 240000;\n```\n\nThis limits any user with the DEFAULT profile\
    \ to 2,400 seconds of CPU use. You can set various limits in a profile. [Table\
    \ 6-2](#9781430257288_Ch06.xhtml#Tab2) describes the database resource settings\
    \ you can limit via a profile.\n\n[Table 6-2.](#9781430257288_Ch06.xhtml#_Tab2)\
    \ Database Resource Profile Settings\n\n| Profile Resource | Meaning |\n| ---\
    \ | --- |\n| COMPOSITE_LIMIT | Limit, based on a weighted-sum algorithm for these\
    \ resources: CPU_PER_SESSION, CONNECT_TIME, LOGICAL_READS_PER_SESSION, and PRIVATE_SGA\
    \ |\n| CONNECT_TIME | Connect time, in minutes |\n| CPU_PER_CALL | CPU time limit\
    \ per call, in hundredths of seconds |\n| CPU_PER_SESSION | CPU time limit per\
    \ session, in hundredths of seconds |\n| IDLE_TIME | Idle time, in minutes |\n\
    | LOGICAL_READS_PER_CALL | Blocks read per call |\n| LOGICAL_READS_PER_SESSION\
    \ | Blocks read per session |\n| PRIVATE_SGA | Amount of space consumed in the\
    \ shared pool |\n| SESSIONS_PER_USER | Number of concurrent sessions |\n\nYou\
    \ can also create a custom profile and assign it to users via the CREATE PROFILE\
    \ statement. You can then assign that profile to any existing database users.\
    \ The following SQL statement creates a profile that limits resources, such as\
    \ the amount of CPU an individual session can consume:\n\n```\ncreate profile\
    \ user_profile_limit\nlimit\nsessions_per_user 20\ncpu_per_session 240000\nlogical_reads_per_session\
    \ 1000000\nconnect_time 480\nidle_time 120;\n```\n\nAfter you create a profile,\
    \ you can assign it to a user. In the next example, the user HEERA is assigned\
    \ USER_PROFILE_LIMIT:\n\n```\nSQL> alter user heera profile user_profile_limit;\n\
    ```\n\n![image](Images/sq.jpg) **Note**   Oracle recommends that you use Database\
    \ Resource Manager to manage database resource limits. ­However, for basic resource\
    \ management needs, I find database profiles (implemented via SQL) to be an effective\
    \ and easy ­mechanism for managing resource usage. If you have more sophisticated\
    \ resource management requirements, ­investigate the Database Resource Manager\
    \ feature.\n\nAs part of the CREATE USER statement, you can specify a profile\
    \ other than DEFAULT:\n\n```\nSQL> create user heera identified by foo profile\
    \ user_profile_limit;\n```\n\nWhen should you use database profiles? You should\
    \ always take advantage of the password security settings of the DEFAULT profile.\
    \ You can easily modify the default settings of this profile, as required by your\
    \ business rules.\n\nA profile’s kernel resource limits are useful when you have\
    \ power users who need to connect directly to the database and run queries. For\
    \ example, you can use the kernel resource settings to limit the amount of CPU\
    \ time a user consumes, which is handy when a user writes a bad query that inadvertently\
    \ consumes excessive database resources.\n\n![image](Images/sq.jpg) **Note**  \
    \ You can only assign one database profile to a user, so if you need to manage\
    \ both password security and resource limits,  make certain you set both within\
    \ the same profile.\n\nManaging Privileges\n\nA database user must be granted\
    \ privileges before the user can perform any tasks in the database. In Oracle,\
    \ you assign privileges either by granting a specific privilege to a user or by\
    \ granting the privilege to a role and then granting the role that contains the\
    \ privilege to a user. There are two types of privileges: system privileges and\
    \ object privileges. The following sections discuss these privileges in detail.\n\
    \nAssigning Database System Privileges\n\nDatabase system privileges allow you\
    \ to do tasks such as connecting to the database and creating and modifying objects.\
    \ There are hundreds of different system privileges. You can view system privileges\
    \ by querying the DBA_SYS_PRIVS view:\n\n```\nSQL> select distinct privilege from\
    \ dba_sys_privs;\n```\n\nYou can grant privileges to other users or roles. To\
    \ be able to grant privileges, a user needs the GRANT ANY PRIVILEGE privilege\
    \ or must have been granted a system privilege with ADMIN OPTION.\n\nUse the GRANT\
    \ statement to assign a system privilege to a user. For instance, minimally a\
    \ user needs CREATE SESSION to be able to connect to the database. You grant this\
    \ system privilege as shown:\n\n```\nSQL> grant create session to inv_mgmt;\n\
    ```\n\nUsually, a user needs to do more than just connect to the database. For\
    \ instance, a user may need to create tables and other types of database objects.\
    \ This example grants a user the CREATE TABLE and CREATE DATABASE LINK system\
    \ privileges:\n\n```\nSQL> grant create table, create database link to inv_mgmt;\n\
    ```\n\nIf you need to take away privileges, use the REVOKE statement:\n\n```\n\
    SQL> revoke create table from inv_mgmt;\n```\n\nOracle has a feature that allows\
    \ you to grant a system privilege to a user and also give that user the ability\
    \ to administer a privilege. You do this with the WITH ADMIN OPTION clause:\n\n\
    ```\nSQL> grant create table to inv_mgmt with admin option;\n```\n\nI rarely use\
    \ WITH ADMIN OPTION when granting privileges. Usually, a user with the DBA role\
    \ is used to grant privileges, and that privilege isn’t generally meted out to\
    \ non-DBA users in the database. This is because it would be hard to keep track\
    \ of who assigned what system privileges, for what reason, and when. In a production\
    \ environment, this would be untenable.\n\nYou can also grant system privileges\
    \ to the PUBLIC user group (I don’t recommend doing this). For example, you could\
    \ grant CREATE SESSION to all users that ever need to connect to the database,\
    \ as follows:\n\n```\nSQL> grant create session to public;\n```\n\nNow, every\
    \ user that is created can automatically connect to the database. Granting system\
    \ privileges to the PUBLIC user group is almost always a bad idea. As a DBA, one\
    \ of your main priorities is to ensure that the data in the database are safe\
    \ and secure. Granting privileges to the PUBLIC role is a sure way of not being\
    \ able to manage who is authorized to perform specific actions within the database.\n\
    \nAssigning Database Object Privileges\n\nDatabase object privileges allow you\
    \ to access and manipulate other users’ objects. The types of database objects\
    \ to which you can grant privileges include tables, views, materialized views,\
    \ sequences, packages, functions, procedures, user-defined types, and directories.\
    \ To be able to grant object privileges, one of the following must be true:\n\n\
    *   You own the object.\n*   You’ve been granted the object privilege with GRANT\
    \ OPTION.\n*   You have the GRANT ANY OBJECT PRIVILEGE system privilege.\n\nThis\
    \ example grants object privileges (as the object owner) to the INV_MGMT_APP user:\n\
    \n```\nSQL> grant insert, update, delete, select on registrations to inv_mgmt_app;\n\
    ```\n\nThe GRANT ALL statement is equivalent to granting INSERT, UPDATE, DELETE,\
    \ and SELECT to an object. The next statement is equivalent to the prior statement:\n\
    \n```\nSQL> grant all on registrations to inv_mgmt_app;\n```\n\nYou can also grant\
    \ INSERT and UPDATE privileges to tables, at the column level. The next example\
    \ grants INSERT privileges to specific columns in the INVENTORY table:\n\n```\n\
    SQL> grant insert (inv_id, inv_name, inv_desc) on inventory to inv_mgmt_app;\n\
    ```\n\nIf you want a user that is being granted object privileges to be able to\
    \ subsequently grant those same object privileges to other users, then use the\
    \ WITH GRANT OPTION clause:\n\n```\nSQL> grant insert on registrations to inv_mgmt_app\
    \ with grant option;\n```\n\nNow, the INV_MGMT_APP user can grant insert privileges\
    \ on the REGISTRATIONS table to other users.\n\nI rarely use the WITH GRANT OPTION\
    \ when granting object privileges. Allowing other users to propagate object privileges\
    \ to users makes it hard to keep track of who assigned what object privileges,\
    \ for what reason, when, and so on. In a production environment this would be\
    \ untenable. When you’re managing a production environment, when problems arise,\
    \ you need to know what changed, when, and for what reason.\n\nYou can also grant\
    \ object privileges to the PUBLIC user group (I don’t recommend doing this). For\
    \ example, you could grant select privileges on a table to PUBLIC:\n\n```\nSQL>\
    \ grant select on registrations to public;\n```\n\nNow, every user can select\
    \ from the REGISTRATIONS table. Granting object privileges to the PUBLIC role\
    \ is almost always a bad idea. As a DBA, one of your main priorities is to ensure\
    \ that the data in the database are safe and secure. Granting object privileges\
    \ to the PUBLIC role is a sure way of not being able to manage who can access\
    \ what data in the database.\n\nIf you need to take away object privileges, use\
    \ the REVOKE statement. This example revokes DML privileges from the INV_MGMT_APP\
    \ user:\n\n```\nSQL> revoke insert, update, delete, select on registrations from\
    \ inv_mgmt_app;\n```\n\nGrouping and Assigning Privileges\n\nA role is a database\
    \ object that allows you to group together system or object privileges, or both,\
    \ in a logical manner so that you can assign those privileges in one operation\
    \ to a user. Roles help you manage aspects of database security in that they provide\
    \ a central object that has privileges assigned to it. You can subsequently assign\
    \ the role to multiple users or other roles.\n\nTo create a role, connect to the\
    \ database as a user that has the CREATE ROLE system privilege. Next, create a\
    \ role and assign to it the system or object privileges that you want to group\
    \ together. This example uses the CREATE ROLE statement to create the JR_DBA role:\n\
    \n```\nSQL> create role jr_dba;\n```\n\nThe next several lines of SQL grant system\
    \ privileges to the newly created role:\n\n```\nSQL> grant select any table to\
    \ jr_dba;\nSQL> grant create any table to jr_dba;\nSQL> grant create any view\
    \ to jr_dba;\nSQL> grant create synonym to jr_dba;\nSQL> grant create database\
    \ link to jr_dba;\n```\n\nNext, grant the role to any schema you want to possess\
    \ those privileges:\n\n```\nSQL> grant jr_dba to lellison;\nSQL> grant jr_dba\
    \ to mhurd;\n```\n\nThe users LELLISON and MHURD can now perform tasks such as\
    \ creating synonyms and views. To see the users to which a role is assigned, query\
    \ the DBA_ROLE_PRIVS view:\n\n```\nSQL> select grantee, granted_role from dba_role_privs\
    \ order by 1;\n```\n\nTo see roles granted to your currently connected user, query\
    \ from the USER_ROLE_PRIVS view:\n\n```\nSQL> select * from user_role_privs;\n\
    ```\n\nTo revoke a privilege from a role, use the REVOKE command:\n\n```\nSQL>\
    \ revoke create database link from jr_dba;\n```\n\nSimilarly, use the REVOKE command\
    \ to remove a role from a user:\n\n```\nSQL> revoke jr_dba from lellison;\n```\n\
    \n![image](Images/sq.jpg) **Note**   Unlike other database objects, roles don’t\
    \ have owners. A role is defined by the privileges assigned to it.\n\nPL/SQL AND\
    \ ROLES\n\nIf you work with PL/SQL, sometimes you get this error when attempting\
    \ to compile a procedure or a function:\n\nPL/SQL: ORA-00942: table or view does\
    \ not exist\n\nWhat’s confusing is that you can describe the table:\n\nSQL> desc\
    \ app_table;\n\nWhy doesn’t PL/SQL seem to be able to recognize the table? It’s\
    \ because PL/SQL requires that the owner of the package, procedure, or function\
    \ be explicitly granted privileges to any objects referenced in the code. The\
    \ owner of the PL/SQL code can’t have obtained the grants through a role.\n\n\
    When confronted with this issue, try this as the owner of the PL/SQL code:\n\n\
    SQL> set role none;\n\nNow, try to run a SQL statement that accesses the table\
    \ in question:\n\nSQL> select count(*) from app_table;\n\nIf you can no longer\
    \ access the table, then you’ve been granted access through a role. To resolve\
    \ the issue, explicitly grant access to any tables to the owner of the PL/SQL\
    \ code (as the owner of the table):\n\nSQL> connect owner/pass\n\nSQL> grant select\
    \ on app_table to proc_owner;\n\nYou should be able to connect as the owner of\
    \ the PL/SQL code and successfully compile your code.\n\nSummary\n\nAfter you\
    \ create a database, one of your first tasks is to secure any default user accounts.\
    \ One valid approach is to lock all the default accounts and open them only as\
    \ they’re required. Other approaches include changing or expiring the password,\
    \ or both. After the default users’ accounts have been secured, you’re responsible\
    \ for creating users that need access to the database. This often includes application\
    \ users, DBAs, and developers.\n\nYou should consider using a secure profile for\
    \ any users you create. Additionally, think about password security when creating\
    \ users. Oracle provides a password function that enforces a certain level of\
    \ password strength. I recommend that you use a combination of profiles and a\
    \ password function as a first step in creating a secure database.\n\nAs the databases\
    \ ages, you need to maintain the user accounts. Usually, the requirements for\
    \ database accounts change over time. You’re responsible for ensuring that the\
    \ correct system and object privileges are maintained for each account. With any\
    \ legacy system, you’ll eventually need to lock and drop users. Dropping unused\
    \ accounts helps ensure that your environment is more secure and maintainable.\n\
    \nThe next logical step after creating users is to create database objects. [Chapter\
    \ 7](#9781430257288_Ch07.xhtml) deals with concepts related to table creation.\n\
    \nCHAPTER 7\n\n![image](Images/frontdot.jpg)\n\nTables and Constraints\n\nThe\
    \ previous chapters in this book covered topics that prepare you for the next\
    \ logical step in creating database objects. For example, you need to install\
    \ the Oracle binaries and create a database, tablespaces, and users before you\
    \ start creating tables. Usually, the first objects created for an application\
    \ are the tables, constraints, and indexes. This chapter focuses on the management\
    \ of tables and constraints. The administration of indexes is covered in [Chapter\
    \ 8](#9781430257288_Ch08.xhtml).\n\nA table is the basic storage container for\
    \ data in a database. You create and modify the table structure via DDL statements,\
    \ such as CREATE TABLE and ALTER TABLE. You access and manipulate table data via\
    \ DML statements (INSERT, UPDATE, DELETE, MERGE, SELECT).\n\n![image](Images/sq.jpg) **Tip**  \
    \ One important difference between DDL and DML statements is that DDL statements\
    \ are implicitly committed, whereas with DML statements, you must explicitly issue\
    \ a COMMIT or ROLLBACK to end the transaction.\n\nA constraint is a mechanism\
    \ for enforcing that data adhere to business rules. For example, you may have\
    \ a business requirement that all customer IDs be unique within a table. In this\
    \ scenario, you can use a primary key constraint to guarantee that all customer\
    \ IDs inserted or updated in a CUSTOMER table are unique. Constraints inspect\
    \ data as they’re inserted, updated, and deleted to ensure that no business rules\
    \ are violated.\n\nThis chapter deals with common techniques for creating and\
    \ maintaining tables and constraints. Almost always, when you create a table,\
    \ the table needs one or more constraints defined; therefore, it makes sense to\
    \ cover constraint management along with tables. The first part of the chapter\
    \ focuses on common table creation and maintenance tasks. The latter part of the\
    \ chapter details constraint management.\n\nUnderstanding Table Types\n\nThe Oracle\
    \ database supports a vast and robust variety of table types. These various types\
    \ are described in [Table 7-1](#9781430257288_Ch07.xhtml#Tab1).\n\n[Table 7-1](#9781430257288_Ch07.xhtml#_Tab1).\
    \ Oracle Table Type Descriptions\n\n| Table Type | Description | Typical Use |\n\
    | --- | --- | --- |\n| Heap organized | The default table type and the most commonly\
    \ used | Table type to use unless you have a specific reason to use a different\
    \ type |\n| Temporary | Session private data, stored for the duration of a session\
    \ or transaction; space allocated in temporary segments | Program needs a temporary\
    \ table structure to store and sort data; table isn’t required after program ends\
    \ |\n| Index organized | Data stored in a B-tree (balanced tree) index structure\
    \ sorted by primary key | Table is queried mainly on primary key columns; provides\
    \ fast random access |\n| Partitioned | A logical table that consists of separate\
    \ physical segments | Type used with large tables with millions of rows |\n| External\
    \ | Tables that use data stored in OS files outside the database | Type lets you\
    \ efficiently access data in a file outside the database (such as a CSV file)\
    \ |\n| Clustered | A group of tables that share the same data blocks | Type used\
    \ to reduce I/O for tables that are often joined on the same columns |\n| Hash\
    \ clustered | A table with data that is stored and retrieved using a hash function\
    \ | Reduces the I/O for tables that are mostly static (not growing after initially\
    \ loaded) |\n| Nested | A table with a column with a data type that is another\
    \ table | Rarely used |\n| Object | A table with a column with a data type that\
    \ is an object type | Rarely used |\n\nThis chapter focuses on the table types\
    \ that are most often used, in particular heap organized, index organized, and\
    \ temporary tables. Partitioned tables are used extensively in data warehouse\
    \ environments and are covered separately, in [Chapter 12](#9781430257288_Ch12.xhtml).\
    \ External tables are covered in [Chapter 14](#9781430257288_Ch14.xhtml). For\
    \ details on table types not covered in this book, see the *SQL Language Reference\
    \ Guide*, which is available for download from the Oracle Technology Network web\
    \ site ([http://otn.oracle.com](http://otn.oracle.com) ).\n\nUnderstanding Data\
    \ Types\n\nWhen creating a table, you must specify the columns names and corresponding\
    \ data types. As a DBA you should understand the appropriate use of each data\
    \ type. I’ve seen many application issues (performance and accuracy of data) caused\
    \ by the wrong choice of data type. For instance, if a character string is used\
    \ when a date data type should have been used, this causes needless conversions\
    \ and headaches when attempting to do date math and reporting. Compounding the\
    \ problem, after an incorrect data type is implemented in a production environment,\
    \ it can be very difficult to modify data types, as this introduces a change that\
    \ might possibly break existing code. Once you go wrong, it’s extremely tough\
    \ to recant and backtrack and choose the right course. It’s more likely you will\
    \ end up with hack upon hack as you attempt to find ways to force the ill-chosen\
    \ data type to do the job it was never intended to do.\n\nHaving said that, Oracle\
    \ supports the following groups of data types:\n\n*   Character\n*   Numeric\n\
    *   Date/Time\n*   RAW\n*   ROWID\n*   LOB\n\nA brief description and usage recommendation\
    \ are provided in the following sections.\n\n![image](Images/sq.jpg) **Note**  \
    \ Specialized data types, such as XML types, Any types, spatial types, media Types,\
    \ and user-defined types, are not covered in this book. For more details regarding\
    \ these data types, see the SQL Language Reference guide available from the Oracle\
    \ Technology Network web site ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nCharacter\n\nUse a character data type to store characters and string data.\
    \ The following character data types are available in Oracle:\n\n*   VARCHAR2\n\
    *   CHAR\n*   NVARCHAR2 and NCHAR\n\nVARCHAR2\n\nThe VARCHAR2 data type is what\
    \ you should use in most scenarios to hold character/string data. A VARCHAR2 only\
    \ allocates space based on the number of characters in the string. If you insert\
    \ a one-character string into a column defined to be VARCHAR2(30), Oracle will\
    \ only consume space for the one character. The following example verifies this\
    \ behavior:\n\n```\ncreate table d(d varchar2(30));\ninsert into d values ('a');\n\
    select dump(d) from d;\n```\n\nHere is a snippet of the output, verifying that\
    \ only 1B has been allocated:\n\n```\nDUMP(D)\n\nTyp=1 Len=1\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ Oracle does have another data type, the VARCHAR (without the “2”). I only mention\
    \ this because you’re bound to encounter this data type at some point in your\
    \ Oracle DBA career. Oracle currently defines VARCHAR as synonymous with VARCHAR2\\\
    . Oracle strongly recommends that you use VARCHAR2 (and not VARCHAR), as Oracle’s\
    \ documentation states that VARCHAR might serve a different purpose in the future.\n\
    \nWhen you define a VARCHAR2 column, you must specify a length. There are two\
    \ ways to do this: BYTE and CHAR. BYTE specifies the maximum length of the string\
    \ in bytes, whereas CHAR specifies the maximum number of characters. For example,\
    \ to specify a string that contains at the most 30B, you define it as follows:\n\
    \n```\nvarchar2(30 byte)\n```\n\nTo specify a character string that can contain\
    \ at most 30 characters, you define it as follows:\n\n```\nvarchar2(30 char)\n\
    ```\n\nMany DBAs do not realize that if you don’t specify either BYTE or CHAR,\
    \ then the default length is calculated in bytes. In other words, VARCHAR2(30)\
    \ is the same as VARCHAR2(30 byte).\n\nIn almost all situations you’re safer specifying\
    \ the length using CHAR. When working with multibyte character sets, if you specified\
    \ the length to be VARCHAR2(30 byte), you may not get predictable results, because\
    \ some characters require more than 1B of storage. In contrast, if you specify\
    \ VARCHAR2(30 char), you can always store 30 characters in the string, regardless\
    \ of whether some characters require more than1B.\n\nCHAR\n\nIn almost every scenario\
    \ a VARCHAR2 is preferable to a CHAR. The VARCHAR2 data type is more flexible\
    \ and space efficient than CHAR. This is because a CHAR is a fixed-length character\
    \ field. If you define a CHAR(30) and insert a string that consists of only one\
    \ character, Oracle will allocate 30B of space. This can be an inefficient use\
    \ of space. The following example verifies this behavior:\n\n```\ncreate table\
    \ d(d char(30));\ninsert into d values ('a');\nselect dump(d) from d;\n```\n\n\
    Here is a snippet of the output, verifying that 30B have been consumed:\n\n```\n\
    DUMP(D)\n\nTyp=96 Len=30\n```\n\nNVARCHAR2 and NCHAR\n\nThe NVARCHAR2 and NCHAR\
    \ data types are useful if you have a database that was originally created with\
    \ a single-byte, fixed-width character set, but sometime later you need to store\
    \ multibyte character set data in the same database. You can use the NVARCHAR2\
    \ and NCHAR data types to support this requirement.\n\n![image](Images/sq.jpg) **Note**  \
    \ For Oracle Database 11g and lower, 4,000 was the largest size allowed for a\
    \ VARCHAR2 or NVARCHAR2 data type. In Oracle Database 12c and higher, you can\
    \ specify up to 32,767 characters in a VARCHAR2 or NVARCHAR2 data type. Prior\
    \ to 12c, if you wanted to store character data larger greater than 4,000 characters,\
    \ the logical choice was a CLOB (see the section “LOB,” later in this chapter,\
    \ for more details).\n\nNumeric\n\nUse a numeric data typeto store data that you’ll\
    \ potentially need to use with mathematic functions, such as SUM, AVG, MAX, and\
    \ MIN. Never store numeric information in a character data type. When you use\
    \ a VARCHAR2 to store data that are inherently numeric, you’re introducing future\
    \ failures into your system. Eventually, you’ll want to report or run calculations\
    \ on numeric data, and if they’re not a numeric data type, you’ll get unpredictable\
    \ and oftentimes wrong results.\n\nOracle supports three numeric data types:\n\
    \n*   NUMBER\n*   BINARY_DOUBLE\n*   BINARY_FLOAT\n\nFor most situations, you’ll\
    \ use the NUMBER data type for any type of number data. Its syntax is\n\n```\n\
    NUMBER(scale, precision)\n```\n\nwhere scale is the total number of digits, and\
    \ precision is the number of digits to the right of the decimal point. So, with\
    \ a number defined as NUMBER(5, 2) you can store values +/–999.99\\. That’s a\
    \ total of five digits, with two used for precision to the right of the decimal\
    \ point.\n\n![image](Images/sq.jpg) **Tip**   Oracle allows a maximum of 38 digits\
    \ for a NUMBER data type. This is almost always sufficient for any type of numeric\
    \ application.\n\nWhat sometimes confuses DBAs is that you can create a table\
    \ with columns defined as INT, INTEGER, REAL, DECIMAL, and so on. These data types\
    \ are all implemented by Oracle with a NUMBER data type. For example, a column\
    \ specified as INTEGER is implemented as a NUMBER(38).\n\nThe BINARY_DOUBLE and\
    \ BINARY_FLOAT data types are used for scientific calculations. These map to the\
    \ DOUBLE and FLOAT Java data types. Unless your application is performing rocket\
    \ science calculations, then use the NUMBER data type for all your numeric requirements.\n\
    \nDate/Time\n\nWhen capturing and reporting on date-related information, you should\
    \ always use a DATE or TIMESTAMP data type (and not VARCHAR2). Using the correct\
    \ date-related data type allows you to perform accurate Oracle date calculations\
    \ and aggregations and dependable sorting for reporting. If you use a VARCHAR2\
    \ for a field that contains date information, you are guaranteeing future reporting\
    \ inconsistencies and needless conversion functions (such as TO_DATE and TO_CHAR).\n\
    \nOracle supports three date-related data types:\n\n*   DATE\n*   TIMESTAMP\n\
    *   INTERVAL\n\nThe DATE data type contains a date component as well as a time\
    \ component that is granular to the second. By default, if you don’t specify a\
    \ time component when inserting data, then the time value defaults to midnight\
    \ (0 hour at the 0 second). If you need to track time at a more granular level\
    \ than the second, then use TIMESTAMP; otherwise, feel free to use DATE.\n\nThe\
    \ TIMESTAMP data type contains a date component and a time component that is granular\
    \ to fractions of a second. When you define a TIMESTAMP, you can specify the fractional\
    \ second precision component. For instance, if you wanted five digits of fractional\
    \ precision to the right of the decimal point, you would specify that as\n\n```\n\
    TIMESTAMP(5)\n```\n\nThe maximum fractional precision is 9; the default is 6\\\
    . If you specify 0 fractional precision, then you have the equivalent of the DATE\
    \ data type.\n\nThe TIMESTAMP data type comes in two additional variations: TIMESTAMP\
    \ WITH TIME ZONE and TIMESTAMP WITH LOCAL TIME ZONE. These are time zone–aware\
    \ data types, meaning that when the user selects the data, the time value is adjusted\
    \ to the time zone of the user’s session.\n\nOracle also provides an INTERVAL\
    \ data type. This is meant to store a duration, or interval, of time. There are\
    \ two types: INTERVAL YEAR TO MONTH and INTERVAL DAY TO SECOND. Use the former\
    \ when precision to the year and month is required. Use the latter when you need\
    \ to store interval data granular to the day and second.\n\nCHOOSING YOUR INTERVAL\
    \ TYPE\n\nWhen choosing an interval type, let your choice be driven by the level\
    \ of granularity you desire in your results. For example, you can use INTERVAL\
    \ DAY TO SECOND to store intervals several years in length—it is just that you\
    \ will express such intervals in terms of days, perhaps of several hundreds of\
    \ days. If you record only a number of years and months, then you can never actually\
    \ get to the correct number of days, because the number of days represented by\
    \ a year or a month depends on which specific year and month are under discussion.\n\
    \nSimilarly, if you need granularity in terms of months, you can’t back into the\
    \ correct number of months based on the number of days. So, choose the type to\
    \ match the granularity needed in your application.\n\nRAW\n\nThe RAW data typeallows\
    \ you to store binary data in a column. This type of data is sometimes used for\
    \ storing globally unique identifiers or small amounts of encrypted data.\n\n\
    ![image](Images/sq.jpg) **Note**   Prior to Oracle Database 12c, the maximum size\
    \ for a RAW column was 2,000 bytes. As of Oracle Database 12c you can declare\
    \ a RAW to have a maximum size of 32,767 bytes. If you have large amounts of binary\
    \ data to store, then use a BLOB.\n\nIf you select data from a RAW column, SQL*Plus\
    \ implicitly applies the built-in RAWTOHEX function to the data retrieved. The\
    \ data are displayed in hexadecimal format, using characters 0–9 and A–F. When\
    \ inserting data into a RAW column, the built-in HEXTORAW is implicitly applied.\n\
    \nThis is important because if you create an index on a RAW column, the optimizer\
    \ may ignore the index, as SQL*Plus is implicitly applying functions where the\
    \ RAW column is referenced in the SQL. A normal index may be of no use, whereas\
    \ a function-based index using RAWTOHEX may result in a substantial performance\
    \ improvement.\n\nROWID\n\nWhen DBAs hear the word ROWID (row identifier), they\
    \ often think of a pseudocolumn provided with every table row that contains the\
    \ physical location of the row on disk; that is correct. However, many DBAs do\
    \ not realize that Oracle supports an actual ROWID data type, meaning that you\
    \ can create a table with a column defined as the type ROWID.\n\nThere are a few\
    \ practical uses for the ROWID data type. One valid application would be if you’re\
    \ having problems when trying to enable a referential integrity constraint and\
    \ want to capture the ROWID of rows that violate a constraint. In this scenario,\
    \ you could create a table with a column of the type ROWID and store in it the\
    \ ROWIDs of offending records within the table. This affords you an efficient\
    \ way to capture and resolve issues with the offending data (see the section “Enabling\
    \ Constraints,” later in this chapter, for more details).\n\n![image](Images/sq.jpg) **Tip**  \
    \ Never be tempted to use a ROWID data type and the associated ROWID of a row\
    \ within the table for the primary key value. This is because the ROWID of a row\
    \ in a table can change. For example, an ALTER TABLE...MOVE command will potentially\
    \ change every ROWID within a table. Normally, the primary key values of rows\
    \ within a table should never change. For this reason, instead of using ROWID\
    \ for a primary key value, use a sequence-generated nonmeaningful number (see\
    \ the section “Creating a Table with an Autoincrementing (Identity) Column,” later\
    \ in this chapter, for further discussion).\n\nLOB\n\nOracle supports storing\
    \ large amounts of data in a column via a LOB data type. Oracle supports the following\
    \ types of LOBs:\n\n*   CLOB\n*   NCLOB\n*   BLOB\n*   BFILE\n\n![image](Images/sq.jpg) **Tip**  \
    \ The LONG and LONG RAW data types are deprecated and should not be used.\n\n\
    If you have textual data that don’t fit within the confines of a VARCHAR2, then\
    \ you should use a CLOB to store these data. A CLOB is useful for storing large\
    \ amounts of character data, such as log files. An NCLOB is similar to a CLOB\
    \ but allows for information encoded in the nation character set of the database.\n\
    \nBLOBs store large amounts of binary data that usually aren’t meant to be human\
    \ readable. Typical BLOB data include images, audio, and video files.\n\nCLOBs,\
    \ NCLOBs, and BLOBs are known as internal LOBs. This is because they are stored\
    \ inside the Oracle database. These data types reside within data files associated\
    \ with the database.\n\nBFILEs are known as external LOBs. BFILE columns store\
    \ a pointer to a file on the OS that is outside the database. When it’s not feasible\
    \ to store a large binary file within the database, then use a BFILE. BFILEs don’t\
    \ participate in database transactions and aren’t covered by Oracle security or\
    \ backup and recovery. If you need those features, then use a BLOB and not a BFILE.\n\
    \n![image](Images/sq.jpg) **Tip**   See [Chapter 11](#9781430257288_Ch11.xhtml)\
    \ for a full discussion of LOBs.\n\nExtended Character Types\n\nPrior to Oracle\
    \ Database 12c, the maximum length for a VARCHAR2 and NVARCHAR2 was 4,000 bytes,\
    \ and the maximum length of a RAW column was 2,000 bytes. Starting with Oracle\
    \ Database 12c, these data types have been extended to accommodate a length of\
    \ 32,767 bytes.\n\nCheck with the current Oracle documentation for the release\
    \ you’re using to find the exact steps for implementing an extended character\
    \ type. The procedure for implementing extended character types (as of this writing)\
    \ is documented in the following list:\n\n1.  As SYS, shut down the database:\n\
    \n    ```\n    SQL> shutdown immediate;\n    ```\n\n2.  Start the database in\
    \ upgrade mode:\n\n    ```\n    SQL> startup upgrade;\n    ```\n\n3.  Change the\
    \ setting of MAX_STRING_SIZE to EXTENDED:\n\n    ```\n    SQL> alter system set\
    \ max_string_size=extended scope=both;\n    ```\n\n4.  As SYS, run the utl32k.sql\
    \ script:\n\n    ```\n    SQL> @?/rdbms/admin/utl32k.sql\n    ```\n\n5.  Restart\
    \ the database normally:\n\n    ```\n    SQL> shutdown immediate;SQL> startup;\n\
    \    ```\n\nNow, you should be able to create an extended column as follows:\n\
    \n```\nSQL> create table d1(dext varchar2(32727)) tablespace users;\n```\n\nThe\
    \ extended character type is actually implemented internally as a LOB, and you\
    \ can view the LOB details via the USER_LOBS view; for example:\n\n```\nSQL> select\
    \ table_name, column_name, segment_name, tablespace_name, in_row from user_lobs;\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME COLUMN_NAME     SEGMENT_NAME                  \
    \ TABLESPACE IN_ROW---------- --------------- ------------------------------ ----------\
    \ ----------D1         DEXT            SYS_LOB0000043206C00001$$      USERS      YES\n\
    ```\n\nFollowing normal LOB storage rules, Oracle stores the first 4,000 bytes\
    \ inline within the table. Anything greater than 4,000 bytes goes into a LOB segment.\n\
    \nCreating a Table\n\nThe number of table features expands with each new version\
    \ of Oracle. Consider this: the 12c version of the *Oracle SQL Language Reference\
    \ Guide* presents more than 80 pages of syntax associated with the CREATE TABLE\
    \ statement. Moreover, the ALTER TABLE statement takes up another 90-plus pages\
    \ of details related to table maintenance. For most situations, you typically\
    \ need to use only a fraction of the table options available.\n\nListed next are\
    \ the general factors you should consider when creating a table:\n\n*   Type of\
    \ table (heap organized, temporary, index organized, partitioned, and so on)\n\
    *   Naming conventions\n*   Column data types and sizes\n*   Constraints (primary\
    \ key, foreign keys, and so on)\n*   Index requirements (see [Chapter 8](#9781430257288_Ch08.xhtml)\
    \ for details)\n*   Initial storage requirements\n*   Special features (virtual\
    \ columns, read-only, parallel, compression, no logging, invisible columns, and\
    \ so on)\n*   Growth requirements\n*   Tablespace(s) for the table and its indexes\n\
    \nBefore you run a CREATE TABLE statement, you need to give some thought to each\
    \ item in the previous list. To that end, DBAs often use data modeling tools to\
    \ help manage the creation of DDL scripts that are used to make database objects.\
    \ Data modeling tools allow you to define visually tables and relationships and\
    \ the underlying database features.\n\nCreating a Heap-Organized Table\n\nYou\
    \ use the CREATE TABLE statement to create tables. When creating a table, at minimum\
    \ you must specify the table name, column name(s), and data types and lengths\
    \ associated with the columns. The Oracle default table type is heap organized.\
    \ The term *heap* means that the data aren’t stored in a specific order in the\
    \ table (instead, they’re a heap of data). Here is a simple example of creating\
    \ a heap-organized table:\n\n```\nCREATE TABLE dept\n(deptno     NUMBER(10)\n\
    ,dname      VARCHAR2(14 CHAR)\n,loc        VARCHAR2(14 CHAR));\n```\n\nIf you\
    \ don’t specify a tablespace, then the table is created in the default permanent\
    \ tablespace of the user that creates the table. Allowing the table to be created\
    \ in the default permanent tablespace is fine for a few small test tables. For\
    \ anything more sophisticated, you should explicitly specify the tablespace in\
    \ which you want tables created. For reference (in future examples), here are\
    \ the creation scripts for two sample tablespaces: HR_DATA and HR_INDEX:\n\n```\n\
    CREATE TABLESPACE hr_data\n  DATAFILE '/u01/dbfile/O12C/hr_data01.dbf' SIZE 1000m\n\
      EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512k SEGMENT SPACE MANAGEMENT AUTO;\n\
    --\nCREATE TABLESPACE hr_index\n  DATAFILE '/u01/dbfile/O12C/hr_index01.dbf' SIZE\
    \ 100m\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512k SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n```\n\nUsually, when you create a table, you should also specify constraints,\
    \ such as the primary key. The following code shows the most common features you\
    \ use when creating a table. This DDL defines primary keys, foreign keys, tablespace\
    \ information, and comments:\n\n```\nCREATE TABLE dept\n(deptno     NUMBER(10)\n\
    ,dname      VARCHAR2(14 CHAR)\n,loc        VARCHAR2(14 CHAR)\n,CONSTRAINT dept_pk\
    \ PRIMARY KEY (deptno)\n USING INDEX TABLESPACE hr_index\n) TABLESPACE hr_data;\n\
    --\nCOMMENT ON TABLE dept IS 'Department table';\n--\nCREATE UNIQUE INDEX dept_uk1\
    \ ON dept(dname)\nTABLESPACE hr_index;\n--\nCREATE TABLE emp\n(empno      NUMBER(10)\n\
    ,ename      VARCHAR2(10 CHAR)\n,job        VARCHAR2(9 CHAR)\n,mgr        NUMBER(4)\n\
    ,hiredate   DATE\n,sal        NUMBER(7,2)\n,comm       NUMBER(7,2)\n,deptno    \
    \ NUMBER(10)\n,CONSTRAINT emp_pk PRIMARY KEY (empno)\n USING INDEX TABLESPACE\
    \ hr_index\n) TABLESPACE hr_data;\n--\nCOMMENT ON TABLE emp IS 'Employee table';\n\
    --\nALTER TABLE emp ADD CONSTRAINT emp_fk1\nFOREIGN KEY (deptno)\nREFERENCES dept(deptno);\n\
    --\nCREATE INDEX emp_fk1 ON emp(deptno)\nTABLESPACE hr_index;\n```\n\nWhen creating\
    \ a table, I usually don’t specify table-level physical space properties. If you\
    \ don’t specify table-level space properties, then the table inherits its space\
    \ properties from the tablespace in which it’s created. This simplifies administration\
    \ and maintenance. If you have tables that require different physical space properties,\
    \ then you can create separate tablespaces to hold tables with differing needs.\
    \ For instance, you might create a HR_DATA_LARGE tablespace with extent sizes\
    \ of 16MB and a HR_DATA_SMALL tablespace with extent sizes of 128KB and choose\
    \ where a table is created based on its storage requirements. See [Chapter 4](#9781430257288_Ch04.xhtml)\
    \ for details regarding the creation of tablespaces.\n\n[Table 7-2](#9781430257288_Ch07.xhtml#Tab2)\
    \ lists some guidelines to consider when creating tables. These aren’t hard-and-fast\
    \ rules; adapt them as needed for your environment. Some of these guidelines may\
    \ seem like obvious suggestions. However, after inheriting many databases over\
    \ the years, I’ve seen each of these recommendations violated in some way that\
    \ makes database maintenance difficult and unwieldy.\n\n[Table 7-2.](#9781430257288_Ch07.xhtml#_Tab2)\
    \ Guidelines to Consider When Creating Tables\n\n| Recommendation | Reasoning\
    \ |\n| --- | --- |\n| Use standards when naming tables, columns, constraints,\
    \ triggers, indexes, and so on. | Helps document the application and simplifies\
    \ maintenance |\n| If a column always contains numeric data, make it a number\
    \ data type. | Enforces a business rule and allows for the greatest flexibility,\
    \ performance, and consistency when using Oracle SQL math functions (which may\
    \ behave differently for a “01” character versus a “1” number) |\n| If you have\
    \ a business rule that defines the length and precision of a number field, then\
    \ enforce it; for example, NUMBER(7,2). If you don’t have a business rule, make\
    \ it NUMBER(38). | Enforces a business rule and keeps the data cleaner |\n| For\
    \ character data that are of variable length, use VARCHAR2 (and not VARCHAR).\
    \ | Follows Oracle’s recommendation of using VARCHAR2 for character data (instead\
    \ of VARCHAR). The Oracle documentation states that in the future, VARCHAR will\
    \ be redefined as a separate data type. |\n| For character data, specify the size\
    \ in CHAR; for example, VARCHAR(30 CHAR). | When working with multibyte data,\
    \ you’ll get more predictable results, as multibyte characters are usually stored\
    \ in more than1B. |\n| If you have a business rule that specifies the maximum\
    \ length of a column, then use that length, as opposed to making all columns VARCHAR2(4000).\
    \ | Enforces a business rule and keeps the data cleaner |\n| Use DATE and TIMESTAMP\
    \ data types appropriately. | Enforces a business rule, ensures that the data\
    \ are of the appropriate format, and allows for the greatest flexibility when\
    \ using SQL date functions |\n| Specify a separate tablespace for the table and\
    \ indexes. Let the table and indexes inherit storage attributes from the tablespaces.\
    \ | Simplifies administration and maintenance |\n| Most tables should be created\
    \ with a primary key. | Enforces a business rule and allows you to uniquely identify\
    \ each row |\n| Create a numeric surrogate key to be the primary key for each\
    \ table. Populate the surrogate key from a sequence. | Makes joins easier and\
    \ more efficient |\n| Create primary key constraints out of line. | Allows you\
    \ more flexibility when creating the primary key, especially if you have a situation\
    \ in which the primary key consists of multiple columns |\n| Create a unique key\
    \ for the logical user—a recognizable combination of columns that makes a row\
    \ one of a kind. | Enforces a business rule and keeps the data cleaner |\n| Create\
    \ comments for the tables and columns. | Helps document the application and eases\
    \ maintenance |\n| Avoid LOB data types if possible. | Prevents maintenance issues\
    \ associated with LOB columns, such as unexpected growth and performance issues\
    \ when copying. |\n| If a column should always have a value, then enforce it with\
    \ a NOT NULL constraint. | Enforces a business rule and keeps the data cleaner\
    \ |\n| Create audit-type columns, such as CREATE_DTT and UPDATE_DTT, that are\
    \ automatically populated with default values or triggers, or both. | Helps with\
    \ maintenance and determining when data were inserted or updated, or both. Other\
    \ types of audit columns to consider include the users that inserted and updated\
    \ the row. |\n| Use check constraints where appropriate. | Enforces a business\
    \ rule and keeps the data cleaner |\n| Define foreign keys where appropriate.\
    \ | Enforces a business rule and keeps the data cleaner |\n\nImplementing Virtual\
    \ Columns\n\nWith Oracle Database 11g and higher, you can create a virtual column\
    \ as part of your table definition. A virtual column is based on one or more existing\
    \ columns from the same table or a combination of constants, SQL functions, and\
    \ user-defined PL/SQL functions, or both. Virtual columns aren’t stored on disk;\
    \ they’re evaluated at runtime, when the SQL query executes. Virtual columns can\
    \ be indexed and can have stored statistics.\n\nPrior to Oracle Database 11g,\
    \ you could simulate a virtual column via a SELECT statement or in a view definition.\
    \ For example, this next SQL SELECT statement generates a virtual value when the\
    \ query is executed:\n\n```\nselect inv_id, inv_count,\n  case when inv_count\
    \ <= 100 then 'GETTING LOW'\n       when inv_count > 100 then 'OKAY'\n  end\n\
    from inv;\n```\n\nWhy use a virtual column? The advantages of doing so are as\
    \ follows:\n\n*   You can create an index on a virtual column; internally, Oracle\
    \ creates a function-based index.\n*   You can store statistics in a virtual column\
    \ that can be used by the cost-based optimizer (CBO).\n*   Virtual columns can\
    \ be referenced in WHERE clauses.\n*   Virtual columns are permanently defined\
    \ in the database; there is one central definition of such a column.\n\nHere is\
    \ an example of creating a table with a virtual column:\n\n```\ncreate table inv(\n\
     inv_id number\n,inv_count number\n,inv_status generated always as (\n  case when\
    \ inv_count <= 100 then 'GETTING LOW'\n       when inv_count > 100 then 'OKAY'\n\
      end)\n);\n```\n\nIn the prior code listing, specifying GENERATED ALWAYS is optional.\
    \ For example, this listing is equivalent to the previous one:\n\n```\ncreate\
    \ table inv(\n inv_id number\n,inv_count number\n,inv_status as (\n  case when\
    \ inv_count <= 100 then 'GETTING LOW'\n       when inv_count > 100 then 'OKAY'\n\
      end)\n);\n```\n\nI prefer to add GENERATED ALWAYS because it reinforces in my\
    \ mind that the column is always virtual. The GENERATED ALWAYS helps document\
    \ inline what you’ve done. This aids in maintenance for other DBAs who come along\
    \ long after you.\n\nTo view values generated by virtual columns, first insert\
    \ some data into the table:\n\n```\nSQL> insert into inv (inv_id, inv_count) values\
    \ (1,100);\n```\n\nNext, select from the table to view the generated value:\n\n\
    ```\nSQL> select * from inv;\n```\n\nHere is some sample output:\n\n```\n    INV_ID  INV_COUNT\
    \ INV_STATUS\n---------- ---------- -----------\n         1        100 GETTING\
    \ LOW\n```\n\n![image](Images/sq.jpg) **Note**   If you insert data into the table,\
    \ nothing is stored in a column set to GENERATED ALWAYS AS. The virtual value\
    \ is generated when you select from the table.\n\nYou can also alter a table to\
    \ contain a virtual column:\n\n```\nalter table inv add(\ninv_comm generated always\
    \ as(inv_count * 0.1) virtual\n);\n```\n\nAnd, you can change the definition of\
    \ an existing virtual column:\n\n```\nalter table inv modify inv_status generated\
    \ always as(\ncase when inv_count <= 50 then 'NEED MORE'\n     when inv_count\
    \ >50 and inv_count <=200 then 'GETTING LOW'\n     when inv_count > 200 then 'OKAY'\n\
    end);\n```\n\nYou can access virtual columns in SQL queries (DML or DDL). For\
    \ instance, suppose you want to update a permanent column based on the value in\
    \ a virtual column:\n\n```\nSQL> update inv set inv_count=100 where inv_status='OKAY';\n\
    ```\n\nA virtual column itself can’t be updated via the SET clause of an UPDATE\
    \ statement. However, you can reference a virtual column in the WHERE clause of\
    \ an UPDATE or DELETE statement.\n\nOptionally, you can specify the data type\
    \ of a virtual column. If you omit the data type, Oracle derives it from the expression\
    \ you use to define the virtual column.\n\nSeveral caveats are associated with\
    \ virtual columns:\n\n*   You can only define a virtual column on a regular, heap-organized\
    \ table. You can’t define a virtual column on an index-organized table, an external\
    \ table, a temporary table, object tables, or cluster tables.\n*   Virtual columns\
    \ can’t reference other virtual columns.\n*   Virtual columns can only reference\
    \ columns from the table in which the virtual column is defined.\n*   The output\
    \ of a virtual column must be a scalar value (i.e., a single value, not a set\
    \ of values).\n\nTo view the definition of a virtual column, use the DBMS_METADATA\
    \ package to see the DDL associated with the table. If you’re selecting from SQL*Plus,\
    \ you need to set the LONG variable to a value large enough to show all data returned:\n\
    \n```\nSQL> set long 10000;\nSQL> select dbms_metadata.get_ddl('TABLE','INV')\
    \ from dual;\n```\n\nHere is a snippet of the output:\n\n```\n  CREATE TABLE \"\
    INV_MGMT\".\"INV\"\n   (    \"INV_ID\" NUMBER,\n \"INV_COUNT\" NUMBER,\n \"INV_STATUS\"\
    \ VARCHAR2(11) GENERATED ALWAYS AS (CASE  WHEN \"INV_COUNT\"<=50 THEN\n'NEED MORE'\
    \ WHEN (\"INV_COUNT\">50 AND \"INV_COUNT\"<=200) THEN 'GETTING LOW' WHEN \n\"\
    INV_COUNT\">200 THEN 'OKAY' END) VIRTUAL ...\n```\n\nImplementing Invisible Columns\n\
    \nStarting with Oracle Database 12c, you can create invisible columns. When a\
    \ column is invisible, it cannot be viewed via\n\n*   DESCRIBE command\n*   SELECT\
    \ * (to access all of a table’s columns)\n*   %ROWTYPE (in PL/SQL)\n*   Describes\
    \ within an Oracle Call Interface (OCI)\n\nHowever, the column can be accessed\
    \ if explicitly specified in a SELECT clause or referenced directly in a DML statement\
    \ (INSERT, UPDATE, DELETE, or MERGE). Invisible columns can also be indexed (just\
    \ like visible columns).\n\nThe main use for an invisible column is to ensure\
    \ that adding a column to a table won’t disrupt any of the existing application\
    \ code. If the application code doesn’t explicitly access the invisible column,\
    \ then it appears to the application as if the column doesn’t exist.\n\nA table\
    \ can be created with invisible columns, or a column can be added or altered so\
    \ as to be invisible. A column that is defined as invisible can also be altered\
    \ so as to be visible. Here is an example of creating a table with an invisible\
    \ column:\n\n```\ncreate table inv\n(inv_id     number\n,inv_desc   varchar2(30\
    \ char)\n,inv_profit number invisible);\n```\n\nNow, when the table is described,\
    \ note that the invisible column is not displayed:\n\n```\nSQL> desc inv\n Name                                      Null?    Type\n\
     ----------------------------------------- -------- ----------------------------\n\
     INV_ID                                             NUMBER\n INV_DESC                                          \
    \ VARCHAR2(30 CHAR)\n```\n\nA column that has been defined as invisible is still\
    \ accessible if you specify it directly in a SELECT statement or any DML operations.\
    \ For example, when selecting from a table, you can view the invisible column\
    \ by specifying it in the SELECT clause:\n\n```\nSQL> select inv_id, inv_desc,\
    \ inv_profit from inv;\n```\n\n![image](Images/sq.jpg) **Note**   When you create\
    \ a table that has invisible columns, at least one column must be visible.\n\n\
    Making Read-Only Tables\n\nStarting with Oracle Database 11g, you can place individual\
    \ tables in read-only mode. Doing so prevents any INSERT, UPDATE, or DELETE statements\
    \ from running against a table. In versions prior to Oracle Database 11g, the\
    \ only way to make a table read-only was to either place the entire database in\
    \ read-only mode or place a tablespace in read-only mode (making all tables in\
    \ the tablespace read-only).\n\nThere are several reasons why you may require\
    \ the read-only feature at the table level:\n\n*   The data in the table are historical\
    \ and should never be updated in normal circumstances.\n*   You’re performing\
    \ some maintenance on the table and want to ensure that it doesn’t change while\
    \ it’s being updated.\n*   You want to drop the table, but before you do, you\
    \ want to better determine if any users are attempting to update the table.\n\n\
    Use the ALTER TABLE statement to place a table in read-only mode:\n\n```\nSQL>\
    \ alter table inv read only;\n```\n\nYou can verify the status of a read-only\
    \ table by issuing the following query:\n\n```\nSQL> select table_name, read_only\
    \ from user_tables where read_only='YES';\n```\n\nTo modify a read-only table\
    \ to read/write, issue the following SQL:\n\n```\nSQL> alter table inv read write;\n\
    ```\n\n![image](Images/sq.jpg) **Note**   The read-only table feature requires\
    \ that the database initialization COMPATIBLE parameter be set to 11.1.0 or higher.\n\
    \nUnderstanding Deferred Segment Creation\n\nStarting with Oracle Database 11g\
    \ Release 2, when you create a table, the creation of the associated segment is\
    \ deferred until the first row is inserted into the table. This feature has some\
    \ interesting implications. For instance, if you have thousands of objects that\
    \ you’re initially creating for an application (such as when you first install\
    \ it), no space is consumed by any of the tables (or associated indexes) until\
    \ data are inserted into the application tables. This means that the initial DDL\
    \ runs more quickly when you create a table, but the first INSERT statement runs\
    \ slightly slower.\n\nTo illustrate the concept of deferred segments, first create\
    \ a table:\n\n```\nSQL> create table inv(inv_id number, inv_desc varchar2(30 CHAR));\n\
    ```\n\nYou can verify that the table has been created by inspecting USER_TABLES:\n\
    \n```\nselect\n table_name\n,segment_created\nfrom user_tables\nwhere table_name='INV';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME                     SEG\n\
    ------------------------------ ---\nINV                            NO\n```\n\n\
    Next, query USER_SEGMENTS to verify that a segment hasn’t yet been allocated for\
    \ the table:\n\n```\nselect\n segment_name\n,segment_type\n,bytes\nfrom user_segments\n\
    where segment_name='INV'\nand segment_type='TABLE';\n```\n\nHere is the corresponding\
    \ output for this example:\n\n```\nno rows selected\n```\n\nNow, insert a row\
    \ into a table:\n\n```\nSQL> insert into inv values(1,'BOOK');\n```\n\nRerun the\
    \ query, selecting from USER_SEGMENTS, and note that a segment has been created:\n\
    \n```\nSEGMENT_NAME    SEGMENT_TYPE            BYTES\n--------------- ------------------\
    \ ----------\nINV             TABLE                   65536\n```\n\nIf you’re\
    \ used to working with older versions of Oracle, the deferred–segment creation\
    \ feature can cause confusion. For example, if you have space-related monitoring\
    \ reports that query DBA_SEGMENTS or DBA_EXTENTS, be aware that these views aren’t\
    \ populated for a table or any indexes associated with a table until the first\
    \ row is inserted into the table.\n\n![image](Images/sq.jpg) **Note**   You can\
    \ disable the deferred–segment creation feature by setting the database initialization\
    \ parameter DEFERRED_SEGMENT_CREATION to FALSE. The default for this parameter\
    \ is TRUE.\n\nCreating a Table with an Autoincrementing (Identity) Column\n\n\
    Starting with Oracle Database 12c, you can define a column that is automatically\
    \ populated and incremented when inserting data. This feature is ideal for automatically\
    \ populating primary key columns.\n\n![image](Images/sq.jpg) **Tip**   Prior to\
    \ Oracle Database 12c, you would have to create a sequence manually and then access\
    \ the sequence when inserting into the table. Sometimes, DBAs would create triggers\
    \ on tables to simulate an autoincrementing column based on a sequence (see [Chapter\
    \ 9](#9781430257288_Ch09.xhtml) for details).\n\nYou define an autoincrementing\
    \ (identity) column with the GENERATED AS IDENTITY clause. This example creates\
    \ a table with primary key column that will be automatically populated and incremented:\n\
    \n```\ncreate table inv(\n inv_id number generated as identity\n,inv_desc varchar2(30\
    \ char));\n--\nalter table inv add constraint inv_pk primary key (inv_id);\n```\n\
    \nNow, you can populate the table without having to specify the primary key value:\n\
    \n```\ninsert into inv (inv_desc) values ('Book');\ninsert into inv (inv_desc)\
    \ values ('Table');\n```\n\nSelecting from the table shows that the INV_ID column\
    \ has been automatically populated:\n\n```\nselect * from inv;\n```\n\nHere is\
    \ some sample output:\n\n```\n    INV_ID INV_DESC\n---------- ------------------------------\n\
             1 Book\n         2 Table\n```\n\nWhen you create an identity column,\
    \ Oracle automatically creates a sequence and associates the sequence with the\
    \ column. You can view the sequence information in USER_SEQUENCES:\n\n```\nSQL>\
    \ select sequence_name, min_value, increment_by from user_sequences;\n```\n\n\
    Here is some sample output for this example:\n\n```\nSEQUENCE_NAME         MIN_VALUE\
    \ INCREMENT_BY\n-------------------- ---------- ------------\nISEQ$$_43216                  1            1\n\
    ```\n\nYou can identify identity columns via this query:\n\n```\nselect table_name,\
    \ identity_column\nfrom user_tab_columns\nwhere identity_column='YES';\n```\n\n\
    When creating a table with an identity column (such as in the prior example),\
    \ you can’t directly specify a value for the identity column; for example, if\
    \ you try this:\n\n```\ninsert into inv values(3,'Chair');\n```\n\nyou’ll receive\
    \ an error:\n\n```\nORA-32795: cannot insert into a generated always identity\
    \ column\n```\n\nIf, for some reason, you need to occasionally insert values into\
    \ an identity column, then use the following syntax when creating:\n\n```\ncreate\
    \ table inv(\n inv_id number generated by default on null as identity\n,inv_desc\
    \ varchar2(30 char));\n```\n\nBecause the underlying mechanism for populating\
    \ an identity column is a sequence, you have some control over how the sequence\
    \ is created (just like you would if you manually created a sequence). For instance,\
    \ you can specify at what number to start the sequence and by how much the sequence\
    \ increments each time. This example specifies that the underlying sequence start\
    \ at the number 50 and increment by two each time:\n\n```\ncreate table inv(\n\
     inv_id number generated as identity (start with 50 increment by 2)\n,inv_desc\
    \ varchar2(30 char));\n```\n\nThere are some caveats to be aware of when using\
    \ autoincrementing (identity) columns:\n\n*   Only one per table is allowed.\n\
    *   They must be numeric.\n*   They can’t have default values.\n*   NOT NULL and\
    \ NOT DEFERRABLE constraints are implicitly applied.\n*   CREATE TABLE ... AS\
    \ SELECT will not inherit identity column properties.\n\nAlso keep in mind that\
    \ after inserting into a column that is autoincremented, if you issue a rollback,\
    \ the transaction is rolled back, but not the autoincremented values from the\
    \ sequence. This is the expected behavior of a sequence. You can roll back such\
    \ an insert, but the sequence values are used and gone.\n\n![image](Images/sq.jpg) **Tip**  \
    \ See [Chapter 9](#9781430257288_Ch09.xhtml) for details on how to manage a sequence.\n\
    \nAllowing for Default Parallel SQL Execution\n\nIf you work with large tables,\
    \ you may want to consider creating your tables as PARALLEL. This instructs Oracle\
    \ to set the degree of parallelism for queries and any subsequent INSERT, UPDATE,\
    \ DELETE, MERGE, and query statements. This example creates a table with a PARALLEL\
    \ clause of 2:\n\n```\ncreate table inv\n(inv_id     number,\n inv_desc   varchar2(30\
    \ char),\n create_dtt date default sysdate)\nparallel 2;\n```\n\nYou can specify\
    \ PARALLEL, NOPARALLEL, or PARALLEL N. If you don’t specify N, Oracle sets the\
    \ degree of parallelism based on the PARALLEL_THREADS_PER_CPU initialization parameter.\
    \ You can verify the degree of parallelism with this query:\n\n```\nSQL> select\
    \ table_name, degree from user_tables;\n```\n\nThe main issue to be aware of here\
    \ is that if a table has been created with a default degree of parallelism, any\
    \ subsequent queries will execute with parallel threads. You may wonder why a\
    \ query or a DML statement is executing in parallel (without explicitly invoking\
    \ a parallel operation).\n\nWHERE ARE ALL THE P_0 PROCESSES COMING FROM?\n\nI\
    \ once got a call from a production support person who reported that nobody could\
    \ connect to the database because of an ORA-00020 maximum number of processes\
    \ error. I logged into the box and noted that there were hundreds of ora_p parallel\
    \ query processes running.\n\nI had to kill some of the processes manually so\
    \ that I could connect to the database. Upon further inspection, I traced the\
    \ parallel query sessions to an SQL statement and table. The table, in this case,\
    \ had been created with a default parallel degree of 64 (don’t ask me why), which\
    \ in turn spawned hundreds of processes and sessions when the table was queried.\
    \ This maxed out the number of allowed connections to the database and caused\
    \ the issue. I resolved the problem by setting the table parallel setting to 1.\n\
    \nYou can also alter a table to modify its default degree of parallelism:\n\n\
    ```\nSQL> alter table inv parallel 1;\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ Keep in mind that PARALLEL_THREADS_PER_CPU is platform dependent and can vary\
    \ from a development environment to a production environment. Therefore, if you\
    \ don’t specify the degree of parallelism, the behavior of parallel operations\
    \ can vary, depending on the environment.\n\nCompressing Table Data\n\nAs your\
    \ database grows, you may want to consider table level compression. Compressed\
    \ data have the benefit of using less disk space and less memory and reduced I/O.\
    \ Queries that read compressed data potentially run faster because there are fewer\
    \ blocks to process. However, CPU usage increases as the data are compressed and\
    \ uncompressed as writes and reads occur, so there is a tradeoff.\n\nStarting\
    \ with Oracle Database 12c, there are four types of compression available:\n\n\
    *   Basic compression\n*   Advanced row compression (in 11g this was referred\
    \ to as OLTP compression)\n*   Warehouse compression (hybrid columnar compression)\n\
    *   Archive compression (hybrid columnar compression)\n\nBasic compression is\
    \ enabled with the COMPRESS or COMPRESS BASIC clause (they are synonymous). This\
    \ example creates a table with basic compression:\n\n```\ncreate table inv\n(inv_id    \
    \ number,\n inv_desc   varchar2(300 char),\n create_dtt timestamp)\ncompress basic;\n\
    ```\n\nBasic compression provides compression as data are direct-path inserted\
    \ into the table. By default, tables created with COMPRESS BASIC have a PCTFREE\
    \ setting of 0\\. You can override this by specifying PCTFREE when creating the\
    \ table.\n\n![image](Images/sq.jpg) **Note**   Basic compression requires the\
    \ Oracle Enterprise Edition, but doesn’t require an extra license.\n\nAdvanced\
    \ row compression is enabled with the ROW STORE COMPRESS ADVANCED (in 11g this\
    \ was enabled with COMPRESS FOR OLTP) clause:\n\n```\ncreate table inv\n(inv_id    \
    \ number,\n inv_desc   varchar2(300 char),\n create_dtt timestamp)\nrow store\
    \ compress advanced;\n```\n\n![image](Images/sq.jpg) **Note**   If you’re using\
    \ Oracle Database 11g, then use the COMPRESS FOR OLTP clause instead of ROW STORE\
    \ COMPRESS ADVANCED.\n\nAdvanced row compression provides compression when initially\
    \ inserting data into the table as well as in any subsequent DML operations. You\
    \ can verify the compression for a table via the following SELECT statement:\n\
    \n```\nselect table_name, compression, compress_for\nfrom user_tables\nwhere table_name='INV';\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME                     COMPRESS\
    \ COMPRESS_FOR\n------------------------------ -------- ------------\nINV                            ENABLED  ADVANCED\n\
    ```\n\n![image](Images/sq.jpg) **Note**   OLTP table compression is a feature\
    \ of the Oracle Advanced Compression option. This option requires an ­additional\
    \ license from Oracle and is only available with the Oracle Enterprise Edition.\n\
    \nYou can also create a tablespace with the compression clause. Any table created\
    \ in that tablespace will inherit the tablespace compression settings. For example,\
    \ here is how to set the default level of compression for a tablespace:\n\n```\n\
    CREATE TABLESPACE hr_data\n  DEFAULT ROW STORE COMPRESS ADVANCED\n  DATAFILE '/u01/dbfile/O12C/hr_data01.dbf'\
    \ SIZE 100m\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 512k SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n```\n\nIf you have a table that already exists, you can alter it to allow\
    \ compression (either basic or advanced):\n\n```\nSQL> alter table inv row store\
    \ compress advanced;\n```\n\n![image](Images/sq.jpg) **Note**   Oracle does not\
    \ support compression for tables with more than 255 columns.\n\nAltering to allow\
    \ compression doesn’t compress the existing data in the table. You’ll need to\
    \ rebuild the table with Data Pump or move the table to compress the data that\
    \ were in it prior to enabling compression:\n\n```\nSQL> alter table inv move;\n\
    ```\n\n![image](Images/sq.jpg) **Note**   If you move the table, then you’ll also\
    \ need to rebuild any associated indexes.\n\nYou can disable compression via the\
    \ NOCOMPRESS clause. This doesn’t affect existing data within the table. Rather,\
    \ it affects future inserts (basic and advanced row compression) and future DML\
    \ (advanced row compression); for example,\n\n```\nSQL> alter table inv nocompress;\n\
    ```\n\nOracle also has a warehouse and archive hybrid columnar compression feature\
    \ that is available when using certain types of storage (such as Exadata). This\
    \ type of compression is enabled with the COLUMN STORE COMPRESS FOR QUERY  LOW|HIGH\
    \ or COLUMN STORE COMPRESS FOR ARCHIVE LOW|HIGH clause. For more details regarding\
    \ this type of compression, see the Oracle Technology Network web site ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nAvoiding Redo Creation\n\nWhen you’re creating a table, you have the option\
    \ of specifying the NOLOGGING clause. The NOLOGGING feature can greatly reduce\
    \ the amount of redo generation for certain types of operations. Sometimes, when\
    \ you’re working with large amounts of data, it’s desirable, for performance reasons,\
    \ to reduce the redo generation when you initially create and insert data into\
    \ a table.\n\nThe downside to eliminating redo generation is that you can’t recover\
    \ the data created via NOLOGGING in the event a failure occurs after the data\
    \ are loaded (and before you can back up the table). If you can tolerate some\
    \ risk of data loss, then use NOLOGGING, but back up the table soon after the\
    \ data are loaded. If your data are critical, then don’t use NOLOGGING. If your\
    \ data can be easily recreated, then NOLOGGING is desirable when you’re trying\
    \ to improve performance of large data loads.\n\nOne perception is that NOLOGGING\
    \ eliminates redo generation for the table for all DML operations. That isn’t\
    \ correct. The NOLOGGING feature never affects redo generation for normal DML\
    \ statements (regular INSERT, UPDATE, and DELETE).\n\nThe NOLOGGING feature can\
    \ significantly reduce redo generation for the following types of operations:\n\
    \n*   SQL*Loader direct-path load\n*   Direct-path INSERT /*+ append */\n*   CREATE\
    \ TABLE AS SELECT\n*   ALTER TABLE MOVE\n*   Creating or rebuilding an index\n\
    \nYou need to be aware of some quirks (features) when using NOLOGGING. If your\
    \ database is in FORCE LOGGING mode, then redo is generated for all operations,\
    \ regardless of whether you specify NOLOGGING. Likewise, when you’re loading a\
    \ table, if the table has a referential foreign key constraint defined, then redo\
    \ is generated regardless of whether you specify NOLOGGING.\n\nYou can specify\
    \ NOLOGGING at one of the following levels:\n\n*   Statement\n*   CREATE TABLE\
    \ or ALTER TABLE\n*   CREATE TABLESPACE or ALTER TABLESPACE\n\nI prefer to specify\
    \ the NOLOGGING clause at the statement or table level. In these scenarios it’s\
    \ obvious to the DBA executing the statement or DDL that NOLOGGING is used. If\
    \ you specify NOLOGGING at the tablespace level, then each DBA who creates objects\
    \ within that tablespace must be aware of this tablespace-level setting. In teams\
    \ with multiple DBAs, it’s easy for one DBA to be unaware that another DBA has\
    \ created a tablespace with NOLOGGING.\n\nThis example first creates a table with\
    \ the NOLOGGING option:\n\n```\ncreate table inv(inv_id number)\ntablespace users\n\
    nologging;\n```\n\nNext, do a direct-path insert with some test data, and commit\
    \ the data:\n\n```\ninsert /*+ append */ into inv select level from dual\nconnect\
    \ by level <= 10000;\n--\ncommit;\n```\n\nWhat happens if you have a media failure\
    \ after you’ve populated a table in NOLOGGING mode (and before you’ve made a backup\
    \ of the table)? After a restore and recovery operation, it will appear that the\
    \ table has been restored:\n\n```\nSQL> desc inv\nName                                      Null?    Type\n\
    ----------------------------------------- -------- ----------------------------\n\
    INV_ID                                             NUMBER\n```\n\nHowever, try\
    \ to execute a query that scans every block in the table:\n\n```\nSQL> select\
    \ * from inv;\n```\n\nHere, an error is thrown, indicating that there is logical\
    \ corruption in the data file:\n\n```\nORA-01578: ORACLE data block corrupted\
    \ (file # 5, block # 203)\nORA-01110: data file 5: '/u01/dbfile/O12C/users01.dbf'\n\
    ORA-26040: Data block was loaded using the NOLOGGING option\n```\n\nIn other words,\
    \ the data are unrecoverable, because the redo doesn’t exist to restore them.\
    \ Again, the NOLOGGING option is suitable for large batch loading of data that\
    \ can easily be reproduced in the event a failure occurs before a backup of the\
    \ database can be taken after a NOLOGGING operation.\n\nIf you specify a logging\
    \ clause at the statement level, it overrides any table or tablespace setting.\
    \ If you specify a logging clause at the table level, it sets the default mode\
    \ for any statements that don’t specify a logging clause and overrides the logging\
    \ setting at the tablespace. If you specify a logging clause at the tablespace\
    \ level, it sets the default logging for any CREATE TABLE statements that don’t\
    \ specify a logging clause.\n\nYou verify the logging mode of the database as\
    \ follows:\n\n```\nSQL> select name, log_mode, force_logging from v$database;\n\
    ```\n\nThe next statement verifies the logging mode of a tablespace:\n\n```\n\
    SQL> select tablespace_name, logging from dba_tablespaces;\n```\n\nAnd, this example\
    \ verifies the logging mode of a table:\n\n```\nSQL> select owner, table_name,\
    \ logging from dba_tables where logging = 'NO';\n```\n\nYou can view the effects\
    \ of NOLOGGING in a few different ways. One way is to enable autotracing with\
    \ statistics and view the redo size:\n\n```\nSQL> set autotrace trace statistics;\n\
    ```\n\nThen, run a direct-path INSERT statement, and view the redo size statistic:\n\
    \n```\ninsert /*+ append */ into inv select level from dual\nconnect by level\
    \ <= 10000;\n```\n\nHere is a snippet of the output:\n\n```\nStatistics\n\n      13772  redo\
    \ size\n```\n\nWith logging disabled, for direct-path operations, you should see\
    \ a much smaller redo size number than with a regular INSERT statement, such as,\n\
    \n```\ninsert into inv select level from dual\nconnect by level <= 10000;\n```\n\
    \nHere is the partial output, indicating that the redo size is much greater:\n\
    \n```\nStatistics\n\n     159152  redo size\n```\n\nAnother method for determining\
    \ the effects of NOLOGGING is to measure the amount of redo generated for an operation\
    \ with logging enabled versus operating in NOLOGGING mode. If you have a development\
    \ environment that you can test in, you can monitor how often the redo logs switch\
    \ while the operation is taking place. Another simple test is to time how long\
    \ the operation takes with and without logging. The operation performed in NOLOGGING\
    \ mode should be faster (because a minimal amount of redo is being generated).\n\
    \nCreating a Table from a Query\n\nSometimes. it’s convenient to create a table\
    \ based on the definition of an existing table. For instance, say you want to\
    \ create a quick backup of a table before you modify the table’s structure or\
    \ data. Use the CREATE TABLE AS SELECT statement (CTAS) to achieve this; for example,\n\
    \n```\ncreate table inv_backup\nas select * from inv;\n```\n\nThe previous statement\
    \ creates an identical table, complete with data. If you don’t want the data included—you\
    \ just want the structure of the table replicated—then provide a WHERE clause\
    \ that always evaluates to false (in this example, 1 will never equal 2):\n\n\
    ```\ncreate table inv_empty\nas select * from inv\nwhere 1=2;\n```\n\nYou can\
    \ also specify that no redo be logged when a CTAS table is created. For large\
    \ data sets, this can reduce the amount of time required to create the table:\n\
    \n```\ncreate table inv_backup\nnologging\nas select * from inv;\n```\n\nBe aware\
    \ that using the CTAS technique with the NOLOGGING clause creates the table as\
    \ NOLOGGING and doesn’t generate the redo required to recover the data that populate\
    \ the table as the result of the SELECT statement. Also, if the tablespace (in\
    \ which the CTAS table is being created) is defined as NOLOGGING, then no redo\
    \ is generated. In these scenarios, you can’t restore and recover your table in\
    \ the event a failure occurs before you’re able to back up the table. If your\
    \ data are critical, then don’t use the NOLOGGING clause.\n\nYou can also specify\
    \ parallelism and storage parameters. Depending on the number of CPUs, you may\
    \ see some performance gains:\n\n```\ncreate table inv_backup\nnologging\ntablespace\
    \ hr_data\nparallel 2\nas select * from inv;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ The CTAS technique doesn’t create any indexes or triggers. You have to create\
    \ indexes and triggers separately if you need those objects from the original\
    \ table.\n\nENABLING DDL LOGGING\n\nOracle allows you to enable the logging of\
    \ DDL statements to a log file. This type of logging is switched on with the ENABLE_DDL_LOGGING\
    \ parameter (the default is FALSE). You can set this at the session or system\
    \ level. This feature provides you with an audit trail regarding which DDL statements\
    \ have been issued and when they were run. Here is an example of setting this\
    \ parameter at the system level:\n\nSQL> alter system set enable_ddl_logging=true\
    \ scope=both;\n\nAfter this parameter is set to TRUE, DDL statements will be logged\
    \ to a log file. Oracle doesn’t log every type of DDL statement, only the most\
    \ common ones to a log file. The exact location of the DDL logging file and number\
    \ of files vary by database version. In 11g the logging file is named log.xml.\
    \ The location (directory path) of this file can be determined via this query:\n\
    \n```\nSQL> select value from v$diag_info where name='Diag Alert';\nVALUE\n\n\
    /orahome/app/oracle/diag/rdbms/o11r2/O11R2/alert\n```\n\nYou can search the log.xml\
    \ file in the prior directory for any DDL statements issued after DDL logging\
    \ has been enabled.\n\nIn Oracle Database 12c there are multiple files that capture\
    \ DDL logging. To find these files, first determine the location of your diagnostic\
    \ home directory:\n\n```\nSQL> select value from v$diag_info where name='ADR Home';\n\
    VALUE\n\n/ora01/app/oracle/diag/rdbms/o12c/O12C\n```\n\nNow, change your current\
    \ working directory to the prior directory and the subdirectory of log; for example,\n\
    \n```\n$ cd /ora01/app/oracle/diag/rdbms/o12c/O12C/log\n```\n\nWithin this directory,\
    \ there will be a file with the format ddl_<SID>.log. This contains a log of DDL\
    \ statements that have been issued after DDL logging has been enabled. You can\
    \ also view DDL logging in the log.xml file. This file is located in the ddl subdirectory\
    \ beneath the previously mentioned log directory; for example,\n\n```\n$ cd /ora01/app/oracle/diag/rdbms/o12c/O12C/log/ddl\n\
    ```\n\nOnce you navigate to the prior directory, you can view the log.xml file\
    \ with an OS utility such as vi.\n\nModifying a Table\n\nAltering a table is a\
    \ common task. New requirements frequently mean that you need to rename, add,\
    \ drop, or change column data types. In development environments, changing a table\
    \ can be a trivial task: you don’t often have large quantities of data or hundreds\
    \ of users simultaneously accessing a table. However, for active production systems,\
    \ you need to understand the ramifications of trying to change tables that are\
    \ currently being accessed or that are already populated with data, or both.\n\
    \nObtaining the Needed Lock\n\nWhen you modify a table, you must have an exclusive\
    \ lock on the table. One issue is that if a DML transaction has a lock on the\
    \ table, you can’t alter it. In this situation, you receive this error:\n\n```\n\
    ORA-00054: resource busy and acquire with NOWAIT specified or timeout expired\n\
    ```\n\nThe prior error message is somewhat confusing in that it leads you to believe\
    \ that you can resolve the problem by acquiring a lock with NOWAIT. However, this\
    \ is a generic message that is generated when the DDL you’re issuing can’t obtain\
    \ an exclusive lock on the table. In this situation, you have a few options:\n\
    \n*   After issuing the DDL command and receiving the ORA-00054 error, rapidly\
    \ press the forward slash (/) key repeatedly in hopes of modifying the table between\
    \ transactions.\n*   Shut down the database and start it in restricted mode, modify\
    \ the table, and then open the database for normal use.\n*   In Oracle Database\
    \ 11g and higher, set the DDL_LOCK_TIMEOUT parameter.\n\nThe last item in the\
    \ previous list instructs Oracle to repeatedly attempt to run a DDL statement\
    \ until it obtains the required lock on the table. You can set the DDL_LOCK_TIMEOUT\
    \ parameter at the system or session level. This next example instructs Oracle\
    \ to repeatedly try to obtain a lock for 100 seconds:\n\n```\nSQL> alter session\
    \ set ddl_lock_timeout=100;\n```\n\nThe default value for the system-level DDL_LOCK_TIMEOUT\
    \ initialization parameter is 0. If you want to modify the default behavior for\
    \ every session in the system, issue an ALTER SYSTEM SET statement. The following\
    \ command sets the default time-out value to 10 seconds for the system:\n\n```\n\
    SQL> alter system set ddl_lock_timeout=10 scope=both;\n```\n\nRenaming a Table\n\
    \nThere are a couple of reasons for renaming a table:\n\n*   Make the table conform\
    \ to standards\n*   Better determine whether the table is being used before you\
    \ drop it\n\nThis example renames a table, from INV to INV_OLD:\n\n```\nSQL> rename\
    \ inv to inv_old;\n```\n\nIf successful, you should see this message:\n\n```\n\
    Table renamed.\n```\n\nAdding a Column\n\nUse the ALTER TABLE ... ADD statement\
    \ to add a column to a table. This example adds a column to the INV table:\n\n\
    ```\nSQL> alter table inv add(inv_count number);\n```\n\nIf successful, you should\
    \ see this message:\n\n```\nTable altered.\n```\n\nAltering a Column\n\nOccasionally,\
    \ you need to alter a column to adjust its size or change its data type. Use the\
    \ ALTER TABLE ... MODIFY statement to adjust the size of a column. This example\
    \ changes the size of a column to 256 characters:\n\n```\nSQL> alter table inv\
    \ modify inv_desc varchar2(256 char);\n```\n\nIf you decrease the size of a column,\
    \ first ensure that no values exist that are greater than the decreased size value:\n\
    \n```\nSQL> select max(length(<column_name>)) from <table_name>;\n```\n\nWhen\
    \ you change a column to NOT NULL, there must be a valid value for each column.\
    \ First, verify that there are no NULL values:\n\n```\nSQL> select <column_name>\
    \ from <table_name> where <column_name> is null;\n```\n\nIf any rows have a NULL\
    \ value for the column you’re modifying to NOT NULL, then you must first update\
    \ the column to contain a value. Here is an example of modifying a column to NOT\
    \ NULL:\n\n```\nSQL> alter table inv modify(inv_desc not null);\n```\n\nYou can\
    \ also alter the column to have a default value. The default value is used any\
    \ time a record is inserted into the table, but no value is provided for a column:\n\
    \n```\nSQL> alter table inv modify(inv_desc default 'No Desc');\n```\n\nIf you\
    \ want to remove the default value of a column, then set it to NULL:\n\n```\n\
    SQL> alter table inv modify(inv_desc default NULL);\n```\n\nSometimes, you need\
    \ to change a table’s data type; for example, a column that was originally incorrectly\
    \ defined as a VARCHAR2 needs to be changed to a NUMBER. Before you change a column’s\
    \ data type, first verify that all values for an existing column are valid numeric\
    \ values. Here is a simple PL/SQL script to do this:\n\n```\ncreate or replace\
    \ function isnum(v_in varchar2)\n  return varchar is\n  val_err exception;\n  pragma\
    \ exception_init(val_err, -6502); -- char to num conv. error\n  scrub_num number;\n\
    begin\n  scrub_num := to_number(v_in);\n  return 'Y';\n  exception when val_err\
    \ then\n  return 'N';\nend;\n/\n```\n\nYou can use the ISNUM function to detect\
    \ whether data in a column are numeric. The function defines a PL/SQL pragma exception\
    \ for the ORA-06502 character-to-number conversion error. When this error is encountered,\
    \ the exception handler captures it and returns an N. If the value passed in to\
    \ the ISNUM function is a number, then a Y is returned. If the value can’t be\
    \ converted to a number, then an N is returned. Here is a simple example illustrating\
    \ the prior concepts:\n\n```\nSQL> create table stage(hold_col varchar2(30));\n\
    SQL> insert into stage values(1);\nSQL> insert into stage values('x');\nSQL> select\
    \ hold_col from stage where isnum(hold_col)='N';\n\nHOLD_COL\n\nX\n```\n\nSimilarly,\
    \ when you modify a character column to a DATE or TIMESTAMP data type, it’s prudent\
    \ to check first to see whether the data can be successfully converted. Here is\
    \ a function that does that:\n\n```\ncreate or replace function isdate(p_in varchar2,\
    \ f_in varchar2)\nreturn varchar is\nscrub_dt date;\nbegin\nscrub_dt := to_date(p_in,\
    \ f_in);\nreturn 'Y';\nexception when others then\nreturn 'N';\nend;\n/\n```\n\
    \nWhen you call the ISDATE function, you need to pass it a valid date-format mask,\
    \ such as YYYYMMDD. Here is a simple example to demonstrate the prior concept:\n\
    \n```\nSQL> create table stage2 (hold_col varchar2(30));\nSQL> insert into stage2\
    \ values('20130103');\nSQL> insert into stage2 values('03-JAN-13');\nSQL> select\
    \ hold_col from stage2 where isdate(hold_col,'YYYYMMDD')='N';\n\nHOLD_COL\n\n\
    03-JAN-13\n```\n\nRenaming a Column\n\nThere are a couple of reasons to rename\
    \ a column:\n\n*   Sometimes, requirements change, and you may want to modify\
    \ the column name to better reflect what the column is used for.\n*   If you’re\
    \ planning to drop a column, it doesn’t hurt to rename the column first to better\
    \ determine whether any users or applications are accessing it.\n\nUse the ALTER\
    \ TABLE ... RENAME statement to rename a column:\n\n```\nSQL> alter table inv\
    \ rename column inv_count to inv_amt;\n```\n\nDropping a Column\n\nTables sometimes\
    \ end up having columns that are never used. This may be because the initial requirements\
    \ changed or were inaccurate. If you have a table that contains an unused column,\
    \ you should consider dropping it. If you leave an unused column in a table, you\
    \ may run into issues with future DBAs’ not knowing what the column is used for,\
    \ and the column can potentially consume space unnecessarily.\n\nBefore you drop\
    \ a column, I recommend that you first rename it. Doing so gives you an opportunity\
    \ to determine whether any users or applications are using the column. After you’re\
    \ confident the column isn’t being used, first make a backup of the table, using\
    \ Data Pump export, and then drop the column. These strategies provide you with\
    \ options if you drop a column and then subsequently realize that it’s needed.\n\
    \nTo drop a column, use the ALTER TABLE ... DROP statement:\n\n```\nSQL> alter\
    \ table inv drop (inv_name);\n```\n\nBe aware that the DROP operation may take\
    \ some time if the table from which you’re removing the column contains a large\
    \ amount of data. This time lag may result in the delay of transactions while\
    \ the table is being modified (because the ALTER TABLE statement locks the table).\
    \ In scenarios such as this, you may want to first mark the column unused and\
    \ then later drop it, when you have a maintenance window:\n\n```\nSQL> alter table\
    \ inv set unused (inv_name);\n```\n\nWhen you mark a column unused, it no longer\
    \ shows up in the table description. The SET UNUSED clause doesn’t incur the overhead\
    \ associated with dropping the column. This technique allows you to quickly stop\
    \ the column from being seen or used by SQL queries or applications. Any query\
    \ that attempts to access an unused column receives the following error:\n\n```\n\
    ORA-00904: ... invalid identifier\n```\n\nYou can later drop any unused columns\
    \ when you’ve scheduled some downtime for the application. Use the DROP UNUSED\
    \ clause to remove any columns marked UNUSED.\n\n```\nSQL> alter table inv drop\
    \ unused columns;\n```\n\nDisplaying Table DDL\n\nSometimes, DBAs do a poor job\
    \ of documenting what DDL is used when creating or modifying a table. Normally,\
    \ you should maintain the database DDL code in a source control repository or\
    \ in some sort of modeling tool. If your shop doesn’t have the DDL source code,\
    \ there are a few ways that you can manually reproduce DDL:\n\n*   Query the data\
    \ dictionary.\n*   Use the exp and imp utilities.\n*   Use Data Pump.\n*   Use\
    \ the DBMS_METADATA package.\n\nBack in the olden days, say, version 7 and earlier,\
    \ DBAs often wrote SQL that queried the data dictionary in an attempt to extract\
    \ the DDL required to recreate objects. Although this method was better than nothing,\
    \ it was often prone to errors because the SQL didn’t account for every object\
    \ creation feature.\n\nThe exp and imp utilities are useful for generating DDL.\
    \ The basic idea is that you export the object in question and then use the imp\
    \ utility with the SCRIPT or SHOW option to display the DDL. This is a good method,\
    \ but you often have to edit the output of the imp utility manually to produce\
    \ the desired DDL.\n\nThe Data Pump utility is an excellent method for generating\
    \ the DDL used to create database objects. Using Data Pump to generate DDL is\
    \ covered in detail in [Chapter 13](#9781430257288_Ch13.xhtml).\n\nThe GET_DDL\
    \ function of the DBMS_METADATA package is usually the quickest way to display\
    \ the DDL required to create an object. This example shows how to generate the\
    \ DDL for a table named INV:\n\n```\nSQL> set long 10000\nSQL> select dbms_metadata.get_ddl('TABLE','INV')\
    \ from dual;\n```\n\nHere is some sample output:\n\n```\nDBMS_METADATA.GET_DDL('TABLE','INV')\n\
    \n  CREATE TABLE \"MV_MAINT\".\"INV\"\n   (    \"INV_ID\" NUMBER,\n        \"\
    INV_DESC\" VARCHAR2(30 CHAR),\n        \"INV_COUNT\" NUMBER\n   ) SEGMENT CREATION\
    \ DEFERRED\n  PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255\n NOCOMPRESS LOGGING\n\
      TABLESPACE \"USERS\"\n```\n\nThe following SQL statement displays all the DDL\
    \ for the tables in a schema:\n\n```\nselect\ndbms_metadata.get_ddl('TABLE',table_name)\n\
    from user_tables;\n```\n\nIf you want to display the DDL for a table owned by\
    \ another user, add the SCHEMA parameter to the GET_DDL procedure:\n\n```\nselect\n\
    dbms_metadata.get_ddl(object_type=>'TABLE', name=>'INV', schema=>'INV_APP')\n\
    from dual;\n```\n\n![image](Images/sq.jpg) **Note**   You can display the DDL\
    \ for almost any database object type, such as INDEX, FUNCTION, ROLE, PACKAGE,\
    \ MATERIALIZED VIEW, PROFILE, CONSTRAINT, SEQUENCE, and SYNONYM.\n\nDropping a\
    \ Table\n\nIf you want to remove an object, such as a table, from a user, use\
    \ the DROP TABLE statement. This example drops a table named INV:\n\n```\nSQL>\
    \ drop table inv;\n```\n\nYou should see the following confirmation:\n\n```\n\
    Table dropped.\n```\n\nIf you attempt to drop a parent table that has a primary\
    \ key or unique keys referenced as a foreign key in a child table, you see an\
    \ error such as\n\n```\nORA-02449: unique/primary keys in table referenced by\
    \ foreign keys\n```\n\nYou need to either drop the referenced foreign key constraint(s)\
    \ or use the CASCADE CONSTRAINTS option when dropping the parent table:\n\n```\n\
    SQL> drop table inv cascade constraints;\n```\n\nYou must be the owner of the\
    \ table or have the DROP ANY TABLE system privilege to drop a table. If you have\
    \ the DROP ANY TABLE privilege, you can drop a table in a different schema by\
    \ prepending the schema name to the table name:\n\n```\nSQL> drop table inv_mgmt.inv;\n\
    ```\n\nIf you don’t prepend the table name to a user name, Oracle assumes you’re\
    \ dropping a table in your current schema.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you’re using Oracle Database 10g or higher, keep in mind that you can flash\
    \ back a table to before drop for an accidentally dropped table.\n\nUndropping\
    \ a Table\n\nSuppose you accidentally drop a table, and you want to restore it.\
    \ First, verify that the table you want to restore is in the recycle bin:\n\n\
    ```\nSQL> show recyclebin;\n```\n\nHere is some sample output:\n\n```\nORIGINAL\
    \ NAME    RECYCLEBIN NAME                OBJECT TYPE  DROP TIME\n----------------\
    \ ------------------------------ ------------ -------------------\nINV              BIN$0F27WtJGbXngQ4TQTwq5Hw==$0\
    \ TABLE        2012-12-08:12:56:45\n```\n\nNext, use the FLASHBACK TABLE...TO\
    \ BEFORE DROP statement to recover the dropped table:\n\n```\nSQL> flashback table\
    \ inv to before drop;\n```\n\n![image](Images/sq.jpg) **Note**   You can’t use\
    \ the FLASHBACK TABLE...TO BEFORE DROP statement for a table created in the SYSTEM\
    \ ­tablespace.\n\nIn Oracle Database 10g and higher, when you issue a DROP TABLE\
    \ statement (without PURGE), the table is actually renamed (to a name that starts\
    \ with BIN$) and placed in the recycle bin. The recycle bin is a mechanism that\
    \ allows you to view some of the metadata associated with a dropped object. You\
    \ can view complete metadata regarding renamed objects by querying DBA_SEGMENTS:\n\
    \n```\nselect\n owner\n,segment_name\n,segment_type\n,tablespace_name\nfrom dba_segments\n\
    where segment_name like 'BIN$%';\n```\n\nThe FLASHBACK TABLE statement simply\
    \ renames the table its original name. By default, the RECYCLEBIN feature is enabled\
    \ in Oracle Database 10g and higher. You can change the default by setting the\
    \ RECYCLEBIN initialization parameter to OFF.\n\nI recommend that you not disable\
    \ the RECYCLEBIN feature. It’s safer to leave this feature enabled and purge the\
    \ RECYCLEBIN to remove objects that you want permanently deleted. This means that\
    \ the space associated with a dropped table isn’t released until you purge your\
    \ RECYCLEBIN. If you want to purge the entire contents of the currently connected\
    \ user’s recycle bin, use the PURGE RECYCLEBIN statement:\n\n```\nSQL> purge recyclebin;\n\
    ```\n\nIf you want to purge the recycle bin for all users in the database, then\
    \ do the following, as a DBA-privileged user:\n\n```\nSQL> purge dba_recyclebin;\n\
    ```\n\nIf you want to bypass the RECYCLEBIN feature and permanently drop a table,\
    \ use the PURGE option of the DROP TABLE statement:\n\n```\nSQL> drop table inv\
    \ purge;\n```\n\nYou can’t use the FLASHBACK TABLE statement to retrieve a table\
    \ dropped with the PURGE option. All space used by the table is released, and\
    \ any associated indexes and triggers are also dropped.\n\nRemoving Data from\
    \ a Table\n\nYou can use either the DELETE statement or the TRUNCATE statement\
    \ to remove records from a table. You need to be aware of some important differences\
    \ between these two approaches. [Table 7-3](#9781430257288_Ch07.xhtml#Tab3) summarizes\
    \ the attributes of the DELETE and TRUNCATE statements.\n\n[Table 7-3.](#9781430257288_Ch07.xhtml#_Tab3)\
    \ Features of DELETE and TRUNCATE\n\n|  | DELETE | TRUNCATE |\n| --- | --- | ---\
    \ |\n| Choice of COMMIT or ROLLBACK | YES | NO |\n| Generates undo | YES | NO\
    \ |\n| Resets the high-water mark to 0 | NO | YES |\n| Affected by referenced\
    \ and enabled foreign key constraints | NO | YES |\n| Performs well with large\
    \ amounts of data | NO | YES |\n\nUsing DELETE\n\nOne big difference is that the\
    \ DELETE statement can be either committed or rolled back. Committing a DELETE\
    \ statement makes the changes permanent:\n\n```\nSQL> delete from inv;\nSQL> commit;\n\
    ```\n\nIf you issue a ROLLBACK statement instead of COMMIT, the table contains\
    \ data as they were before the DELETE was issued.\n\nUsing TRUNCATE\n\nTRUNCATE\
    \ is a DDL statement. This means that Oracle automatically commits the statement\
    \ (and the current transaction) after it runs, so there is no way to roll back\
    \ a TRUNCATE statement. If you need the option of choosing to roll back (instead\
    \ of committing) when removing data, then you should use the DELETE statement.\
    \ However, the DELETE statement has the disadvantage of generating a great deal\
    \ of undo and redo information. Thus, for large tables, a TRUNCATE statement is\
    \ usually the most efficient way to remove data.\n\nThis example uses a TRUNCATE\
    \ statement to remove all data from the COMPUTER_SYSTEMS table:\n\n```\nSQL> truncate\
    \ table computer_systems;\n```\n\nBy default, Oracle deallocates all space used\
    \ for the table, except the space defined by the MINEXTENTS table-storage parameter.\
    \ If you don’t want the TRUNCATE statement to deallocate the extents, use the\
    \ REUSE STORAGE parameter:\n\n```\nSQL> truncate table computer_systems reuse\
    \ storage;\n```\n\nThe TRUNCATE statement sets the high-water mark of a table\
    \ back to 0\\. When you use a DELETE statement to remove data from a table, the\
    \ high-water mark doesn’t change. One advantage of using a TRUNCATE statement\
    \ and resetting the high-water mark is that full table scans only search for rows\
    \ in blocks below the high-water mark. This can have significant performance implications.\n\
    \nYou can’t truncate a table that has a primary key defined that is referenced\
    \ by an enabled foreign key constraint in a child table—even if the child table\
    \ contains zero rows. Oracle prevents you from doing this because in a multiuser\
    \ system, there is the possibility that another session can populate the child\
    \ table with rows in between the time you truncate the child table and the time\
    \ you subsequently truncate the parent table. In this scenario, you must temporarily\
    \ disable the referenced foreign key constraints, issue the TRUNCATE statement,\
    \ and then reenable the constraints.\n\nBecause a TRUNCATE statement is DDL, you\
    \ can’t truncate two separate tables as one transaction. Compare this behavior\
    \ with that of DELETE. Oracle does allow you to use the DELETE statement to remove\
    \ rows from a parent table while the constraints are enabled that reference a\
    \ child table. This is because DELETE generates undo, is read consistent, and\
    \ can be rolled back.\n\n![image](Images/sq.jpg) **Note**   Another way to remove\
    \ data from a table is to drop and recreate the table. However, this means that\
    \ you also have to recreate any indexes, constraints, grants, and triggers that\
    \ belong to the table. Additionally, when you drop a table, it’s unavailable until\
    \ you recreate it and reissue any required grants. Usually, dropping and recreating\
    \ a table are acceptable only in a development or test environment.\n\nViewing\
    \ and Adjusting the High-Water Mark\n\nOracle defines the high-water mark of a\
    \ table as the boundary between used and unused space in a segment. When you create\
    \ a table, Oracle allocates a number of extents to the table, defined by the MINEXTENTS\
    \ table-storage parameter. Each extent contains a number of blocks. Before data\
    \ are inserted into the table, none of the blocks have been used, and the high-water\
    \ mark is 0.\n\nAs data are inserted into a table, and extents are allocated,\
    \ the high-water mark boundary is raised. A DELETE statement doesn’t reset the\
    \ high-water mark.\n\nYou need to be aware of a couple of performance-related\
    \ issues regarding the high-water mark\n\n*   SQL query full-table scans\n*  \
    \ Direct-path load-space usage\n\nOracle sometimes needs to scan every block of\
    \ a table (under the high-water mark) when performing a query. This is known as\
    \ a full-table scan. If a significant amount of data have been deleted from a\
    \ table, a full-table scan can take a long time to complete, even for a table\
    \ with zero rows.\n\nAlso, when doing direct-path loads, Oracle inserts data above\
    \ the high-water mark line. Potentially, you can end up with a large amount of\
    \ unused space in a table that is regularly deleted from and that is also loaded\
    \ via a direct-path mechanism.\n\nThere are several methods for detecting space\
    \ below the high-water mark:\n\n*   Autotrace tool\n*   DBMS_SPACE package\n*\
    \   Selecting from the data dictionary extents view\n\nThe autotrace tool offers\
    \ a simple method for detecting high-water mark issues. Autotrace is advantageous\
    \ because it’s easy to use, and the output is simple to interpret.\n\nYou can\
    \ use the DBMS_SPACE package to determine the high-water mark of objects created\
    \ in tablespaces that use autospace segment management. The DBMS_SPACE package\
    \ allows you to check for high-water mark problems programmatically. The downside\
    \ to this approach is that the output is somewhat cryptic and sometimes difficult\
    \ to derive concrete answers from.\n\nSelecting from DBA/ALL/USER_EXTENTS provides\
    \ you with information such as the number of extents and bytes consumed. This\
    \ is a quick and easy way to detect high-water mark issues.\n\nTracing to Detect\
    \ Space Below the High-Water Mark\n\nYou can run this simple test to detect whether\
    \ you have an issue with unused space below the high-water mark:\n\n1.  SQL> set\
    \ autotrace trace statistics.\n2.  Run the query that performs the full-table\
    \ scan.\n3.  Compare the number of rows processed with the number of logical I/Os\
    \ (memory and disk accesses).\n\nIf the number of rows processed is low, but the\
    \ number of logical I/Os is high, you may have an issue with the number of free\
    \ blocks below the high-water mark. Here is a simple example to illustrate this\
    \ technique:\n\n```\nSQL> set autotrace trace statistics\n```\n\nThe next query\
    \ generates a full-table scan on the INV table:\n\n```\nSQL> select * from inv;\n\
    ```\n\nHere is a snippet of the output from AUTOTRACE:\n\n```\nno rows selected\n\
    \nStatistics\n\n          4  recursive calls\n          0  db block gets\n      \
    \ 7371  consistent gets\n       2311  physical reads\n```\n\nThe number of rows\
    \ returned is zero, yet there are 7,371consistent gets (memory accesses) and 2,311\
    \ physical reads from disk, indicating free space beneath the high-water mark.\n\
    \nNext, truncate the table, and run the query again:\n\n```\nSQL> truncate table\
    \ inv;\nSQL> select * from inv;\n```\n\nHere is a partial listing from the output\
    \ of AUTOTRACE:\n\n```\nno rows selected\n\nStatistics\n\n          6  recursive\
    \ calls\n          0  db block gets\n         12  consistent gets\n          0  physical\
    \ reads\n```\n\nNote that the number of memory accesses and physical reads are\
    \ now quite small.\n\nUsing DBMS_SPACE to Detect Space Below the High-Water Mark\n\
    \nYou can use the DBMS_SPACE package to detect free blocks beneath the high-water\
    \ mark. Here is an anonymous block of PL/SQL that you can call from SQL*Plus:\n\
    \n```\nset serverout on size 1000000\ndeclare\n   p_fs1_bytes number;\n   p_fs2_bytes\
    \ number;\n   p_fs3_bytes number;\n   p_fs4_bytes number;\n   p_fs1_blocks number;\n\
       p_fs2_blocks number;\n   p_fs3_blocks number;\n   p_fs4_blocks number;\n  \
    \ p_full_bytes number;\n   p_full_blocks number;\n   p_unformatted_bytes number;\n\
       p_unformatted_blocks number;\nbegin\n   dbms_space.space_usage(\n      segment_owner      =>\
    \ user,\n      segment_name       => 'INV',\n      segment_type       => 'TABLE',\n\
          fs1_bytes          => p_fs1_bytes,\n      fs1_blocks         => p_fs1_blocks,\n\
          fs2_bytes          => p_fs2_bytes,\n      fs2_blocks         => p_fs2_blocks,\n\
          fs3_bytes          => p_fs3_bytes,\n      fs3_blocks         => p_fs3_blocks,\n\
          fs4_bytes          => p_fs4_bytes,\n      fs4_blocks         => p_fs4_blocks,\n\
          full_bytes         => p_full_bytes,\n      full_blocks        => p_full_blocks,\n\
          unformatted_blocks => p_unformatted_blocks,\n      unformatted_bytes  =>\
    \ p_unformatted_bytes\n   );\n   dbms_output.put_line('FS1: blocks = '||p_fs1_blocks);\n\
       dbms_output.put_line('FS2: blocks = '||p_fs2_blocks);\n   dbms_output.put_line('FS3:\
    \ blocks = '||p_fs3_blocks);\n   dbms_output.put_line('FS4: blocks = '||p_fs4_blocks);\n\
       dbms_output.put_line('Full blocks = '||p_full_blocks);\nend;\n/\n```\n\nIn\
    \ this scenario, you want to check the INV table for free space below the high-water\
    \ mark. Here is the output of the previous PL/SQL:\n\n```\nFS1: blocks = 0\nFS2:\
    \ blocks = 0\nFS3: blocks = 0\nFS4: blocks = 3646\nFull blocks = 0\n```\n\nIn\
    \ the prior output the FS1 parameter shows that 0 blocks have 0 to 25 percent\
    \ free space. The FS2 parameter shows that 0 blocks have 25 to 50 percent free\
    \ space. The FS3 parameter shows that 0 blocks have 50 to 75 percent free space.\
    \ The FS4 parameter shows there are 3,646 blocks with 75 to 100 percent free space.\
    \ Finally, there are 0 full blocks. Because there are no full blocks, and a large\
    \ number of blocks are mostly empty, you can see that free space exists below\
    \ the high-water mark.\n\nSelecting from Data Dictionary Extents View\n\nYou can\
    \ also detect tables with high-water mark issues by selecting from DBA/ALL/USER_EXTENTS\
    \ views. If a table has a large number of extents allocated to it, but has zero\
    \ rows, that’s an indication that an extensive amount of data have been deleted\
    \ from the table; for example,\n\n```\nSQL> select count(*) from user_extents\
    \ where segment_name='INV';\n\n  COUNT(*)\n\n```\n\nNow, inspect the number of\
    \ rows in the table:\n\n```\nSQL> select count(*) from inv;\n\n  COUNT(*)\n\n\
    ```\n\nThe prior table most likely has had data inserted into it, which resulted\
    \ in extents’ being allocated. And, subsequently, data were deleted, and the extents\
    \ remained.\n\nLowering the High-Water Mark\n\nHow can you reduce a table’s high-water\
    \ mark? You can use several techniques to set the high-water mark back to0:\n\n\
    *   A TRUNCATE statement\n*   ALTER TABLE ... SHRINK SPACE\n*   ALTER TABLE ...  MOVE\n\
    \nUsing the TRUNCATE statement was discussed earlier in this chapter (see the\
    \ section “Using TRUNCATE”). Shrinking a table and moving a table are discussed\
    \ in the following sections.\n\nShrinking a Table\n\nTo readjust the high-water\
    \ mark, you must enable row movement for the table and then use the ALTER TABLE...SHRINK\
    \ SPACE statement. The tablespace in which the table is created must have been\
    \ built with automatic segment space management enabled. You can determine the\
    \ tablespace segment space management type via this query:\n\n```\nSQL> select\
    \ tablespace_name, segment_space_management from dba_tablespaces;\n```\n\nThe\
    \ SEGMENT_SPACE_MANAGEMENT value must be AUTO for the tablespace in which the\
    \ table is created. Next, you need to enable row movement for the table to be\
    \ shrunk. This example enables row movement for the INV table:\n\n```\nSQL> alter\
    \ table inv enable row movement;\n```\n\nNow, you can shrink the space used by\
    \ the table:\n\n```\nSQL> alter table inv shrink space;\n```\n\nYou can also shrink\
    \ the space associated with any index segments via the CASCADE clause:\n\n```\n\
    SQL> alter table inv shrink space cascade;\n```\n\nMoving a Table\n\nMoving a\
    \ table means either rebuilding the table in its current tablespace or building\
    \ it in a different tablespace. You may want to move a table because its current\
    \ tablespace has disk space storage issues or because you want to lower the table’s\
    \ high-water mark.\n\nUse the ALTER TABLE ... MOVE statement to move a table from\
    \ one tablespace to another. This example moves the INV table to the USERS tablespace:\n\
    \n```\nSQL> alter table inv move tablespace users;\n```\n\nYou can verify that\
    \ the table has been moved by querying USER_TABLES:\n\n```\nSQL> select table_name,\
    \ tablespace_name from user_tables where table_name='INV';\n\nTABLE_NAME          \
    \ TABLESPACE_NAME\n-------------------- ------------------------------\nINV                  USERS\n\
    ```\n\n![image](Images/sq.jpg) **Note**   The ALTER TABLE ... MOVE statement doesn’t\
    \ allow DML to execute while it’s running.\n\nYou can also specify NOLOGGING when\
    \ you move a table:\n\n```\nSQL> alter table inv move tablespace users nologging;\n\
    ```\n\nMoving a table with NOLOGGING eliminates most of the redo that would normally\
    \ be generated when the table is relocated. The downside to using NOLOGGING is\
    \ that if a failure occurs immediately after the table is moved (and hence, you\
    \ don’t have a backup of the table after it’s moved), then you can’t restore the\
    \ contents of the table. If the data in the table are critical, then don’t use\
    \ NOLOGGING when moving them.\n\nWhen you move a table, all its indexes are rendered\
    \ unusable. This is because a table’s index includes the ROWID as part of the\
    \ structure. The table ROWID contains information about the physical location.\
    \ Given that the ROWID of a table changes when the table moves from one tablespace\
    \ to another (because the table rows are now physically located in different data\
    \ files), any indexes on the table contain incorrect information. To rebuild the\
    \ index, use the ALTER INDEX ... REBUILD command.\n\nORACLE ROWID\n\nEvery row\
    \ in every table has an address. The address of a row is determined from a combination\
    \ of the following:\n\n```\nDatafile number\nBlock number\nLocation of the row\
    \ within the block\nObject number\n```\n\nYou can display the address of a row\
    \ in a table by querying the ROWID pseudocolumn; for example,\n\n```\nSQL> select\
    \ rowid, emp_id from emp;\n```\n\nHere is some sample output:\n\n```\nROWID                  EMP_ID\n\
    ------------------ ----------\nAAAFJAAAFAAAAJfAAA          1\n```\n\nThe ROWID\
    \ pseudocolumn value isn’t physically stored in the database. Oracle calculates\
    \ its value when you query it. The ROWID contents are displayed as base 64 values\
    \ that can contain the characters A–Z, a–z, 0–9, +, and /. You can translate the\
    \ ROWID value into meaningful information via the DMBS_ROWID package. For instance,\
    \ to display the relative file number in which a row is stored, issue this statement:\n\
    \nSQL> select dbms_rowid.rowid_relative_fno(rowid), emp_id from emp;\n\nHere is\
    \ some sample output:\n\n```\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID)     EMP_ID\n\
    ------------------------------------ ----------\n                                  \
    \ 5          1\n```\n\nYou can use the ROWID value in the SELECT and WHERE clauses\
    \ of an SQL statement. In most cases, the ROWID uniquely identifies a row. However,\
    \ it’s possible to have rows in different tables that are stored in the same cluster\
    \ and that therefore contain rows with the same ROWID.\n\nCreating a Temporary\
    \ Table\n\nUse the CREATE GLOBAL TEMPORARY TABLE statement to create a table that\
    \ stores data only provisionally. You can specify that the temporary table retain\
    \ the data for a session or until a transaction commits. Use ON COMMIT PRESERVE\
    \ ROWS to specify that the data be deleted at the end of the user’s session. In\
    \ this example, the rows will be retained until the user either explicitly deletes\
    \ the data or terminates the session:\n\n```\ncreate global temporary table today_regs\n\
    on commit preserve rows\nas select * from f_registrations\nwhere create_dtt >\
    \ sysdate - 1;\n```\n\nSpecify ON COMMIT DELETE ROWSto indicate that the data\
    \ should be deleted at the end of the transaction. The following example creates\
    \ a temporary table named TEMP_OUTPUT and specifies that records should be deleted\
    \ at the end of each committed transaction:\n\n```\ncreate global temporary table\
    \ temp_output(\n temp_row varchar2(30))\non commit delete rows;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If you don’t specify a commit method for a global temporary table, then the\
    \ default is ON COMMIT DELETE ROWS.\n\nYou can create a temporary table and grant\
    \ other users access to it. However, a session can only view the data that it\
    \ inserts into a table. In other words, if two sessions are using the same temporary\
    \ table, a session can’t select any data inserted into the temporary table by\
    \ a different session.\n\nA global temporary table is useful for applications\
    \ that need to briefly store data in a table structure. After you create a temporary\
    \ table, it exists until you drop it. In other words, the definition of the temporary\
    \ table is “permanent”—it’s the data that are short-lived (in this sense, the\
    \ term temporary table can be misleading).\n\nYou can view whether a table is\
    \ temporary by querying the TEMPORARY column of DBA/ALL/USER_TABLES:\n\n```\n\
    SQL> select table_name, temporary from user_tables;\n```\n\nTemporary tables are\
    \ designated with a Y in the TEMPORARY column. Regular tables contain an N in\
    \ the TEMPORARY column.\n\nWhen you create records in a temporary table, space\
    \ is allocated in your default temporary tablespace. You can verify this by running\
    \ the following SQL:\n\n```\nSQL> select username, contents, segtype from v$sort_usage;\n\
    ```\n\nIf you’re working with a large number of rows and need better performance\
    \ for selectively retrieving rows, you may want to consider creating an index\
    \ on the appropriate columns in your temporary table:\n\n```\nSQL> create index\
    \ temp_index on temp_output(temp_row);\n```\n\nUse the DROP TABLE command to drop\
    \ a temporary table:\n\n```\nSQL> drop table temp_output;\n```\n\nTEMPORARY TABLE\
    \ REDO\n\nNo redo data are generated for changes to blocks of a global temporary\
    \ table. However, rollback (undo) data are generated for a transaction against\
    \ a temporary table. Because the rollback data generate redo, some redo data are\
    \ associated with a transaction for a temporary table. You can verify this by\
    \ turning on statistics tracing and viewing the redo size as you insert records\
    \ into a temporary table:\n\n```\nSQL> set autotrace on\n```\n\nNext, insert a\
    \ few records into the temporary table:\n\n```\nSQL> insert into temp_output values(1);\n\
    ```\n\nHere is a snippet of the output (only showing the redo size):\n\n```\n\
    140 redo size\n```\n\nThe redo load is less for temporary tables than normal tables\
    \ because the redo generated is only associated with the rollback (undo) data\
    \ for a temporary table transaction.\n\nAdditionally, starting with Oracle Database\
    \ 12c, the undo for temporary objects is stored in the temporary tablespace, not\
    \ the undo tablespace.\n\nCreating an Index-Organized Table\n\nIndex-organized\
    \ tables (IOTs) are efficient objects when the table data are typically accessed\
    \ through querying on the primary key. Use the ORGANIZATION INDEX clause to create\
    \ an IOT:\n\n```\ncreate table prod_sku\n(prod_sku_id number,\nsku varchar2(256),\n\
    create_dtt timestamp(5),\nconstraint prod_sku_pk primary key(prod_sku_id)\n)\n\
    organization index\nincluding sku\npctthreshold 30\ntablespace inv_data\noverflow\n\
    tablespace inv_data;\n```\n\nAn IOT stores the entire contents of the table’s\
    \ row in a B-tree index structure. IOTs provide fast access for queries that have\
    \ exact matches or range searches, or both, on the primary key.\n\nAll columns\
    \ specified, up to and including the column specified in the INCLUDING clause,\
    \ are stored in the same block as the PROD_SKU_ID primary key column. In other\
    \ words, the INCLUDING clause specifies the last column to keep in the table segment.\
    \ Columns listed after the column specified in the INCLUDING clause are stored\
    \ in the overflow data segment. In the previous example, the CREATE_DTT column\
    \ is stored in the overflow segment.\n\nPCTTHRESHOLD specifies the percentage\
    \ of space reserved in the index block for the IOT row. This value can be from\
    \ 1 to 50 and defaults to 50 if no value is specified. There must be enough space\
    \ in the index block to store the primary key.\n\nThe OVERFLOW clause details\
    \ which tablespace should be used to store overflow data segments. Note that DBA/ALL/USER_TABLES\
    \ includes an entry for the table name used when creating an IOT. Additionally,\
    \ DBA/ALL/USER_INDEXES contains a record with the name of the primary key constraint\
    \ specified. The INDEX_TYPE column contains a value of IOT - TOP for IOTs:\n\n\
    ```\nSQL> select index_name,table_name,index_type from user_indexes;\n```\n\n\
    Managing Constraints\n\nThe next several sections in this chapter deal with constraints.\
    \ Constraints provide a mechanism for ensuring that data conform to certain business\
    \ rules. You must be aware of what types of constraints are available and when\
    \ it’s appropriate to use them. Oracle offers several types of constraints:\n\n\
    *   Primary key\n*   Unique key\n*   Foreign key\n*   Check\n*   NOT NULL\n\n\
    Implementing and managing these constraints are discussed in the following sections.\n\
    \nCreating Primary Key Constraints\n\nWhen you implement a database, most tables\
    \ you create require a primary key constraint to guarantee that every record in\
    \ the table can be uniquely identified. There are multiple techniques for adding\
    \ a primary key constraint to a table. The first example creates the primary key\
    \ inline with the column definition:\n\n```\ncreate table dept(\n dept_id number\
    \ primary key\n,dept_desc varchar2(30));\n```\n\nIf you select the CONSTRAINT_NAME\
    \ from USER_CONSTRAINTS, note that Oracle generates a cryptic name for the constraint\
    \ (such as SYS_C003682). Use the following syntax to explicitly give a name to\
    \ a primary key constraint:\n\n```\ncreate table dept(\ndept_id number constraint\
    \ dept_pk primary key using index tablespace users,\ndept_desc varchar2(30));\n\
    ```\n\n![image](Images/sq.jpg) **Note**   When you create a primary key constraint,\
    \ Oracle also creates a unique index with the same name as the ­constraint. You\
    \ can control which tablespace the unique index is placed in via the USING INDEX\
    \ TABLESPACE clause.\n\nYou can also specify the primary key constraint definition\
    \ after the columns have been defined. The advantage of doing this is that you\
    \ can define the constraint on multiple columns. The next example creates the\
    \ primary key when the table is created, but not inline with the column definition:\n\
    \n```\ncreate table dept(\ndept_id number,\ndept_desc varchar2(30),\nconstraint\
    \ dept_pk primary key (dept_id)\nusing index tablespace users);\n```\n\nIf the\
    \ table has already been created, and you want to add a primary key constraint,\
    \ use the ALTER TABLE statement. This example places a primary key constraint\
    \ on the DEPT_ID column of the DEPT table:\n\n```\nalter table dept\nadd constraint\
    \ dept_pk primary key (dept_id)\nusing index tablespace users;\n```\n\nWhen a\
    \ primary key constraint is enabled, Oracle automatically creates a unique index\
    \ associated with the primary key constraint. Some DBAs prefer to first create\
    \ a nonunique index on the primary key column and then define the primary key\
    \ constraint:\n\n```\nSQL> create index dept_pk on dept(dept_id) tablespace users;\n\
    SQL> alter table dept add constraint dept_pk primary key (dept_id);\n```\n\nThe\
    \ advantage of this approach is that you can drop or disable the primary key constraint\
    \ independently of the index. When you’re working with large data sets, you may\
    \ want that sort of flexibility. If you don’t create the index before creating\
    \ the primary key constraint, then whenever you drop or disable the primary key\
    \ constraint, the index is automatically dropped.\n\nConfused about which method\
    \ to use to create a primary key? All the methods are valid and have their merits.\
    \ [Table 7-4](#9781430257288_Ch07.xhtml#Tab4) summarizes the primary key and unique\
    \ key constraint creation methods. I’ve used all these methods to create primary\
    \ key constraints. Usually, I use the ALTER TABLE statement, which adds the constraint\
    \ after the table has been created.\n\n[Table 7-4.](#9781430257288_Ch07.xhtml#_Tab4)\
    \ Primary Key and Unique Key Constraint Creation Methods\n\n| Constraint Creation\
    \ Method | Advantages | Disadvantages |\n| --- | --- | --- |\n| Inline, no name\
    \ | Very simple | Oracle-generated name makes troubleshooting harder; less control\
    \ over storage attributes; only applied to a single column |\n| Inline, with name\
    \ | Simple; user-defined name makes troubleshooting easier | Requires more thought\
    \ than inline without name |\n| Inline, with name and tablespace definition |\
    \ User-defined name and tablespace; makes troubleshooting easier | Less simple\
    \ |\n| After column definition (out of line) | User-defined name and tablespace;\
    \ can operate on multiple columns | Less simple |\n| ALTER TABLE add just constraint\
    \ | Lets you manage constraints in statements (and files) separate from table\
    \ creation scripts; can operate on multiple columns | More complicated |\n| CREATE\
    \ INDEX, ALTER TABLE add constraint | Separates the index and constraint, so you\
    \ can drop/disable constraints without affecting the index; can operate on multiple\
    \ columns | Most complicated: more to maintain, more moving parts |\n\nEnforcing\
    \ Unique Key Values\n\nIn addition to creating a primary key constraint, you should\
    \ create unique constraints on any combinations of columns that should always\
    \ be unique within a table. For example, for the primary key for a table, it’s\
    \ common to use a numeric key (sometimes called a surrogate key) that is populated\
    \ via a sequence. Besides the surrogate primary key, sometimes users have a column\
    \ (or columns) that the business uses to uniquely identify a record (also called\
    \ a logical key). Using both a surrogate key and a logical key\n\n*   lets you\
    \ efficiently join parent and child tables on a single numeric column\n*   allows\
    \ updates to logical key columns without changing the surrogate key\n\nA unique\
    \ key guarantees uniqueness on the defined column(s) within a table. There are\
    \ some subtle differences between primary key and unique key constraints. For\
    \ example, you can define only one primary key per table, but there can be several\
    \ unique keys. Also, a primary key doesn’t allow a NULL value in any of its columns,\
    \ whereas a unique key allows NULL values.\n\nAs with the primary key constraint,\
    \ you can use several methods to create a unique column constraint. This method\
    \ uses the UNIQUE keyword inline with the column:\n\n```\ncreate table dept(\n\
     dept_id number\n,dept_desc varchar2(30) unique);\n```\n\nIf you want to explicitly\
    \ name the constraint, use the CONSTRAINT keyword:\n\n```\ncreate table dept(\n\
     dept_id number\n,dept_desc varchar2(30) constraint dept_desc_uk1 unique);\n```\n\
    \nAs with primary keys, Oracle automatically creates an index associated with\
    \ the unique key constraint. You can specify inline the tablespace information\
    \ to be used for the associated unique index:\n\n```\ncreate table dept(\n dept_id\
    \ number\n,dept_desc varchar2(30) constraint dept_desc_uk1\n   unique using index\
    \ tablespace users);\n```\n\nYou can also alter a table to include a unique constraint:\n\
    \n```\nalter table dept\nadd constraint dept_desc_uk1 unique (dept_desc)\nusing\
    \ index tablespace users;\n```\n\nAnd you can create an index on the columns of\
    \ interest before you define a unique key constraint:\n\n```\nSQL> create index\
    \ dept_desc_uk1 on dept(dept_desc) tablespace users;\nSQL> alter table dept add\
    \ constraint dept_desc_uk1 unique(dept_desc);\n```\n\nThis can be helpful when\
    \ you’re working with large data sets, and you want to be able to disable or drop\
    \ the unique constraint without dropping the associated index.\n\n![image](Images/sq.jpg) **Tip**  \
    \ You can also enforce a unique key constraint with a unique index. See [Chapter\
    \ 8](#9781430257288_Ch08.xhtml) for details on using unique indexes to enforce\
    \ unique constraints.\n\nCreating Foreign Key Constraints\n\nForeign key constraints\
    \ are used to ensure that a column value is contained within a defined list of\
    \ values. Using a foreign key constraint is an efficient way of enforcing that\
    \ data be a predefined value before an insert or update is allowed. This technique\
    \ works well for the following scenarios:\n\n*   The list of values contains many\
    \ entries.\n*   Other information about the lookup value needs to be stored.\n\
    *   It’s easy to select, insert, update, or delete values via SQL.\n\nFor example,\
    \ suppose the EMP table is created with a DEPT_ID column. To ensure that each\
    \ employee is assigned a valid department, you can create a foreign key constraint\
    \ that enforces the rule that each DEPT_ID in the EMP table must exist in the\
    \ DEPT table.\n\n![image](Images/sq.jpg) **Tip**   If the condition you want to\
    \ check for consists of a small list that doesn’t change very often, consider\
    \ using a check constraint instead of a foreign key constraint. For instance,\
    \ if you have a column that will always be defined as containing either a 0 or\
    \ a 1, a check constraint is an efficient solution.\n\nFor reference, here’s how\
    \ the parent table DEPT table was created for these examples:\n\n```\ncreate table\
    \ dept(\ndept_id number primary key,\ndept_desc varchar2(30));\n```\n\nA foreign\
    \ key must reference a column in the parent table that has a primary key or a\
    \ unique key defined on it. DEPT is the parent table and has a primary key defined\
    \ on DEPT_ID.\n\nYou can use several methods to create a foreign key constraint.\
    \ The following example creates a foreign key constraint on the DEPT_ID column\
    \ in the EMP table:\n\n```\ncreate table emp(\nemp_id number,\nname varchar2(30),\n\
    dept_id constraint emp_dept_fk references dept(dept_id));\n```\n\nNote that the\
    \ DEPT_ID data type isn’t explicitly defined. The foreign key constraint derives\
    \ the data type from the referenced DEPT_ID column of the DEPT table. You can\
    \ also explicitly specify the data type when you define a column (regardless of\
    \ the foreign key definition):\n\n```\ncreate table emp(\nemp_id number,\nname\
    \ varchar2(30),\ndept_id number constraint emp_dept_fk references dept(dept_id));\n\
    ```\n\nYou can also specify the foreign key definition out of line from the column\
    \ definition in the CREATE TABLE statement:\n\n```\ncreate table emp(\nemp_id\
    \ number,\nname varchar2(30),\ndept_id number,\nconstraint emp_dept_fk foreign\
    \ key (dept_id) references dept(dept_id)\n);\n```\n\nAnd, you can alter an existing\
    \ table to add a foreign key constraint:\n\n```\nalter table emp\nadd constraint\
    \ emp_dept_fk foreign key (dept_id)\nreferences dept(dept_id);\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ Unlike with primary key and unique key constraints, Oracle doesn’t automatically\
    \ add an index to foreign key columns; you must explicitly create indexes on them.\
    \ See [Chapter 8](#9781430257288_Ch08.xhtml) for a discussion on why it’s important\
    \ to create indexes on foreign key columns and how to detect foreign key columns\
    \ that don’t have associated indexes.\n\nChecking for Specific Data Conditions\n\
    \nA check constraint works well for lookups when you have a short list of fairly\
    \ static values, such as a column that can be either Y or N. In this situation\
    \ the list of values most likely won’t change, and no information needs to be\
    \ stored other than Y or N, so a check constraint is the appropriate solution.\
    \ If you have a long list of values that needs to be periodically updated, then\
    \ a table and a foreign key constraint are a better solution.\n\nAlso, a check\
    \ constraint works well for a business rule that must always be enforced and that\
    \ can be written with a simple SQL expression. If you have sophisticated business\
    \ logic that must be validated, then the application code is more appropriate.\n\
    \nYou can define a check constraint when you create a table. The following enforces\
    \ the ST_FLG column to contain either a 0 or 1:\n\n```\ncreate table emp(\nemp_id\
    \ number,\nemp_name varchar2(30),\nst_flg number(1) CHECK (st_flg in (0,1))\n\
    );\n```\n\nA slightly better method is to give the check constraint a name:\n\n\
    ```\ncreate table emp(\nemp_id number,\nemp_name varchar2(30),\nst_flg number(1)\
    \ constraint st_flg_chk CHECK (st_flg in (0,1))\n);\n```\n\nA more descriptive\
    \ way to name the constraint is to embed information in the constraint name that\
    \ describes the condition that was violated; for example,\n\n```\ncreate table\
    \ emp(\nemp_id number,\nemp_name varchar2(30),\nst_flg number(1) constraint \"\
    st_flg must be 0 or 1\" check (st_flg in (0,1))\n);\n```\n\nYou can also alter\
    \ an existing column to include a constraint. The column must not contain any\
    \ values that violate the constraint being enabled:\n\n```\nSQL> alter table emp\
    \ add constraint\n     \"st_flg must be 0 or 1\" check (st_flg in (0,1));\n```\n\
    \n![image](Images/sq.jpg) **Note**   The check constraint must evaluate to a true\
    \ or unknown (NULL) value in the row being inserted or updated. You can’t use\
    \ subqueries or sequences in a check constraint. Also, you can’t reference the\
    \ SQL functions UID, USER, SYSDATE, or USERENV or the pseudocolumns LEVEL or ROWNUM.\n\
    \nEnforcing Not Null Conditions\n\nAnother common condition to check for is whether\
    \ a column is null; you use the NOT NULL constraint to do this. The NOT NULL constraint\
    \ can be defined in several ways. The simplest technique is shown here:\n\n```\n\
    create table emp(\nemp_id number,\nemp_name varchar2(30) not null);\n```\n\nA\
    \ slightly better approach is to give the NOT NULL constraint a name that makes\
    \ sense to you:\n\n```\ncreate table emp(\nemp_id number,\nemp_name varchar2(30)\
    \ constraint emp_name_nn not null);\n```\n\nUse the ALTER TABLE command if you\
    \ need to modify a column for an existing table. For the following command to\
    \ work, there must not be any NULL values in the column being defined as NOT NULL:\n\
    \n```\nSQL> alter table emp modify(emp_name not null);\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If there are currently NULL values in a column that is being defined as NOT\
    \ NULL, you must first update the table so that the column has a value in every\
    \ row.\n\nDisabling Constraints\n\nOne nice feature of Oracle is that you can\
    \ disable and enable constraints without dropping and recreating them. This means\
    \ that you avoid having to know the DDL statements that would be required to recreate\
    \ the dropped constraints.\n\nOccasionally, you need to disable constraints. For\
    \ example, you may be trying to truncate a table but receive the following error\
    \ message:\n\n```\nORA-02266: unique/primary keys in table referenced by enabled\
    \ foreign keys\n```\n\nOracle doesn’t allow a truncate operation on a parent table\
    \ with a primary key that is referenced by an enabled foreign key in a child table.\
    \ If you need to truncate a parent table, you first have to disable all the enabled\
    \ foreign key constraints that reference the parent table’s primary key. Run this\
    \ query to determine the names of the constraints that need to be disabled:\n\n\
    ```\ncol primary_key_table form a18\ncol primary_key_constraint form a18\ncol\
    \ fk_child_table form a18\ncol fk_child_table_constraint form a18\n--\nselect\n\
     b.table_name primary_key_table\n,b.constraint_name primary_key_constraint\n,a.table_name\
    \ fk_child_table\n,a.constraint_name fk_child_table_constraint\nfrom dba_constraints\
    \ a\n,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\nand a.r_owner\
    \ = b.owner\nand a.constraint_type = 'R'\nand b.owner = upper('&table_owner')\n\
    and b.table_name = upper('&pk_table_name');\n```\n\nFor this example, there is\
    \ only one foreign key dependency:\n\n```\nPRIMARY_KEY_TAB PRIMARY_KEY_CON FK_CHILD_TABLE  FK_CHILD_TABLE_\n\
    --------------- --------------- --------------- ---------------\nDEPT            DEPT_PK        \
    \ EMP             EMP_DEPT_FK\n```\n\nUse the ALTER TABLE statement to disable\
    \ constraints on a table. In this case, there is only one foreign key to disable:\n\
    \n```\nSQL> alter table emp disable constraint emp_dept_fk;\n```\n\nYou can now\
    \ truncate the parent table:\n\n```\nSQL> truncate table dept;\n```\n\nDon’t forget\
    \ to reenable the foreign key constraints after the truncate operation has completed,\
    \ like this:\n\n```\nSQL> alter table emp enable constraint emp_dept_fk;\n```\n\
    \nYou can disable a primary key and all dependent foreign key constraints with\
    \ the CASCADE option of the DISABLE clause. For example, the next line of code\
    \ disables all foreign key constraints related to the primary key constraint:\n\
    \n```\nSQL> alter table dept disable constraint dept_pk cascade;\n```\n\nThis\
    \ statement doesn’t cascade through all levels of dependencies; it only disables\
    \ the foreign key constraints directly dependent on DEPT_PK. Also keep in mind\
    \ that there is no ENABLE...CASCADE statement. To reenable the constraints, you\
    \ have to query the data dictionary to determine which constraints have been disabled\
    \ and then reenable them individually.\n\nSometimes, you run into situations,\
    \ when loading data, in which it’s convenient to disable all the foreign keys\
    \ before loading the data (perhaps from a schema-level import, using the imp utility).\
    \ In these situations the imp utility imports the tables in alphabetical order\
    \ and doesn’t ensure that child tables are imported before parent tables. You\
    \ may also want to run several import jobs in parallel to take advantage of parallel\
    \ hardware. In such scenarios, you can disable the foreign keys, perform the import,\
    \ and then reenable the foreign keys.\n\nHere is a script that uses SQL to generate\
    \ SQL to disable all foreign key constraints for a user:\n\n```\nset lines 132\
    \ trimsp on head off feed off verify off echo off pagesize 0\nspo dis_dyn.sql\n\
    select 'alter table ' || a.table_name\n|| ' disable constraint ' || a.constraint_name\
    \ || ';'\nfrom dba_constraints a\n,dba_constraints b\nwhere a.r_constraint_name\
    \ = b.constraint_name\nand a.r_owner = b.owner\nand a.constraint_type = 'R'\n\
    and b.owner = upper('&table_owner');\nspo off;\n```\n\nThis script generates a\
    \ file, named dis_dyn.sql, that contains the SQL statements to disable all the\
    \ foreign key constraints for a user.\n\nEnablingConstraints\n\nThis section contains\
    \ a few scripts to help you enable constraints that you’ve disabled. Listed next\
    \ is a script that creates a file with the SQL statements required to reenable\
    \ any foreign key constraints for tables owned by a specified user:\n\n```\nset\
    \ lines 132 trimsp on head off feed off verify off echo off pagesize 0\nspo enable_dyn.sql\n\
    select 'alter table ' || a.table_name\n|| ' enable constraint ' || a.constraint_name\
    \ || ';'\nfrom dba_constraints a\n,dba_constraints b\nwhere a.r_constraint_name\
    \ = b.constraint_name\nand a.r_owner = b.owner\nand a.constraint_type = 'R'\n\
    and b.owner = upper('&table_owner');\nspo off;\n```\n\nWhen enabling constraints,\
    \ by default, Oracle checks to ensure that the data don’t violate the constraint\
    \ definition. If you’re fairly certain that the data integrity is fine and that\
    \ you don’t need to incur the performance hit by revalidating the constraint,\
    \ you can use the NOVALIDATE clause when reenabling the constraints. Here is an\
    \ example:\n\n```\nselect 'alter table ' || a.table_name\n|| ' modify constraint\
    \ ' || a.constraint_name || ' enable novalidate;'\nfrom dba_constraints a\n,dba_constraints\
    \ b\nwhere a.r_constraint_name = b.constraint_name\nand a.r_owner = b.owner\n\
    and a.constraint_type = 'R'\nand b.owner = upper('&table_owner');\n```\n\nThe\
    \ NOVALIDATE clause instructs Oracle not to validate the constraints being enabled,\
    \ but it does enforce that any new DML activities adhere to the constraint definition.\n\
    \nIn multiuser systems the possibility exists that another session has inserted\
    \ data into the child table while the foreign key constraint was disabled. If\
    \ that happens, you see the following error when you attempt to reenable the foreign\
    \ key:\n\n```\nORA-02298: cannot validate (<owner>.<constraint>) - parent keys\
    \ not found\n```\n\nIn this scenario, you can use the ENABLE NOVALIDATE clause:\n\
    \n```\nSQL> alter table emp enable novalidate constraint emp_dept_fk;\n```\n\n\
    To clean up the rows that violate the constraint, first ensure that you have an\
    \ EXCEPTIONS table created in your currently connected schema. If you don’t have\
    \ an EXCEPTIONS table, use this script to create one:\n\n```\nSQL> @?/rdbms/admin/utlexcpt.sql\n\
    ```\n\nNext, populate the EXCEPTIONS table with the rows that violate the constraint,\
    \ using the EXCEPTIONS INTO clause:\n\n```\nSQL> alter table emp modify constraint\
    \ emp_dept_fk validate\nexceptions into exceptions;\n```\n\nThis statement still\
    \ throws the ORA-02298 error as long as there are rows that violate the constraint.\
    \ The statement also inserts records into the EXCEPTIONS table for any bad rows.\
    \ You can now use the ROW_ID column of the EXCEPTIONS table to remove any records\
    \ that violate the constraint.\n\nHere, you see that one row needs to be removed\
    \ from the EMP table:\n\n```\nSQL> select * from exceptions;\n```\n\nHere is some\
    \ sample output:\n\n```\nROW_ID             OWNER    TABLE_NAME CONSTRAINT\n------------------\
    \ -------- ---------- --------------------\nAAAFKQAABAAAK8JAAB MV_MAINT EMP        EMP_DEPT_FK\n\
    ```\n\nTo remove the offending record, issue a DELETE statement:\n\n```\nSQL>\
    \ delete from emp where rowid = 'AAAFKQAABAAAK8JAAB';\n```\n\nIf the EXCEPTIONS\
    \ table contains many records, you can run a query such as the following to delete\
    \ by OWNER and TABLE_NAME:\n\n```\ndelete from emp where rowid in\n(select row_id\n\
    from exceptions\nwhere owner=upper('&owner') and table_name = upper('&table_name'));\n\
    ```\n\nYou may also run into situations in which you need to disable primary key\
    \ or unique key constraints, or both. For instance, you may want to perform a\
    \ large data load and for performance reasons want to disable the primary key\
    \ and unique key constraints. You don’t want to incur the overhead of having every\
    \ row checked as it’s inserted.\n\nThe same general techniques used for disabling\
    \ foreign keys are applicable for disabling primary and unique keys. Run this\
    \ query to display the primary key and unique key constraints for a user:\n\n\
    ```\nselect\na.table_name\n,a.constraint_name\n,a.constraint_type\nfrom dba_constraints\
    \ a\nwhere a.owner = upper('&table_owner')\nand a.constraint_type in ('P','U')\n\
    order by a.table_name;\n```\n\nWhen the table name and constraint name are identified,\
    \ use the ALTER TABLE statement to disable the constraint:\n\n```\nSQL> alter\
    \ table dept disable constraint dept_pk;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ Oracle doesn’t let you disable a primary key or unique key constraint that is\
    \ referenced in an enabled foreign key constraint. You first have to disable the\
    \ foreign key constraint.\n\nSummary\n\nThis chapter focused on basic activities\
    \ related to creating and maintaining tables. Tables are the containers that store\
    \ the data within the database. Key table management tasks include modifying,\
    \ moving, deleting from, shrinking, and dropping. You must also be familiar with\
    \ how to implement and use special table types, such as temporary, IOT, and read-only.\n\
    \nOracle also provides various constraints to help you manage the data within\
    \ tables. Constraints form the bedrock of data integrity. In most cases, each\
    \ table should include a primary key constraint that ensures that every row is\
    \ uniquely identifiable. Additionally, any parent–child relationships should be\
    \ enforced with foreign key constraints. You can use unique constraints to implement\
    \ business rules that require a column or combination of columns to be unique.\
    \ Check and NOT NULL constraints ensure that columns contain business-specified\
    \ data requirements.\n\nAfter you create tables, the next logical activity is\
    \ to create indexes where appropriate. Indexes are optional database objects that\
    \ help improve performance. Index creation and maintenance tasks are covered in\
    \ the next chapter.\n\nCHAPTER 8\n\n![image](Images/frontdot.jpg)\n\nIndexes\n\
    \nAn index is an optionally created database object used primarily to increase\
    \ query performance. The purpose of a database index is similar to that of an\
    \ index in the back of a book. A book index associates a topic with a page number.\
    \ When you’re locating information in a book, it’s usually much faster to examine\
    \ the index first, find the topic of interest, and identify associated page numbers.\
    \ With this information, you can navigate directly to specific page numbers in\
    \ the book.\n\nIf a topic only appears on a few pages within the book, then the\
    \ number of pages to read is minimal. In this manner, the usefulness of the index\
    \ decreases with an increase in the number of times a topic appears in a book.\
    \ In other words, if a subject entry appears on every page of the book, there\
    \ would be no benefit to creating an index on it. In this scenario, regardless\
    \ of the presence of an index, it would be more efficient for the reader to scan\
    \ every page of the book.\n\n![image](Images/sq.jpg) **Note**   In database parlance,\
    \ searching all blocks of a table is known as a full-table scan. Full-table scans\
    \ occur when there is no available index or when the query optimizer determines\
    \ a full-table scan is a more efficient access path than using an existing index.\n\
    \nSimilar to a book index (topic and page number), a database index stores the\
    \ column value of interest, along with its row identifier (ROWID). The ROWID contains\
    \ the physical location of the table row on disk that stores the column value.\
    \ With the ROWID in hand, Oracle can efficiently retrieve table data with a minimum\
    \ of disk reads. In this way, indexes function as a shortcut to the table data.\
    \ If there is no available index, then Oracle reads each row in the table to determine\
    \ if the row contains the desired information.\n\n![image](Images/sq.jpg) **Note**  \
    \ In addition to improving performance, Oracle uses indexes to help enforce enabled\
    \ primary key and unique key constraints. Additionally, Oracle can better manage\
    \ certain table-locking scenarios when indexes are placed on foreign key columns.\n\
    \nWhereas it’s possible to build a database application devoid of indexes, without\
    \ them you’re almost guaranteeing poor performance. Indexes allow for excellent\
    \ scalability, even with very large data sets. If indexes are so important to\
    \ database performance, why not place them on all tables and column combinations?\
    \ The answer is short: indexes are not free. They consume disk space and system\
    \ resources. As column values are modified, any corresponding indexes must also\
    \ be updated. In this way, indexes use storage, I/O, CPU, and memory resources.\
    \ A poor choice of indexes leads to wasted disk usage and excessive consumption\
    \ of system resources. This results in a decrease in database performance.\n\n\
    For these reasons, when you design and build an Oracle database application, consideration\
    \ must be given to your indexing strategy. As an application architect, you must\
    \ understand the physical properties of an index, what types of indexes are available,\
    \ and strategies for choosing which table and column combinations to index. A\
    \ correct indexing methodology is central to achieving maximum performance for\
    \ your database.\n\nDeciding When to Create an Index\n\nThere are usually two\
    \ different situations in which DBAs and developers decide to create indexes:\n\
    \n*   Proactively, when first deploying an application; the DBAs/developers make\
    \ an educated guess as to which tables and columns to index.\n*   Reactively,\
    \ when application performance bogs down, and users complain of poor performance;\
    \ then, the DBAs/developers attempt to identify slow-executing SQL queries and\
    \ how indexes might be a solution.\n\nThe prior two topics are discussed in the\
    \ next two sections.\n\nProactively Creating Indexes\n\nWhen creating a new database\
    \ application, part of the process involves identifying primary keys, unique keys,\
    \ and foreign keys. The columns associated with those keys are usually candidates\
    \ for indexes. Here are some guidelines:\n\n*   Define a primary key constraint\
    \ for each table. This results in an index automatically being created on the\
    \ columns specified in the primary key.\n*   Create unique key constraints on\
    \ columns that are required to be unique and that are different from the primary\
    \ key columns. Each unique key constraint results in an index automatically being\
    \ created on the columns specified in the constraint.\n*   Manually create indexes\
    \ on foreign key columns. This is done for better performance, to avoid certain\
    \ locking issues.\n\nIn other words, some of the decision process on what tables\
    \ and columns to index is automatically done for you when determining the table\
    \ constraints. When creating primary and unique key constraints, Oracle automatically\
    \ creates indexes for you. There is some debate about whether or not to create\
    \ indexes on foreign key columns. See the section “Indexing Foreign Key Columns,”\
    \ later in this chapter, for further discussion.\n\nIn addition to creating indexes\
    \ related to constraints, if you have enough knowledge of the SQL contained within\
    \ the application, you can create indexes related to tables and columns referenced\
    \ in SELECT, FROM, and WHERE clauses. In my experience, DBAs and developers are\
    \ not adept at proactively identifying such indexes. Rather, these indexing requirements\
    \ are usually identified reactively.\n\nReactively Creating Indexes\n\nRarely\
    \ do DBAs and developers accurately create the right mix of indexes when first\
    \ deploying an application. And, that’s not a bad thing or unexpected; it’s hard\
    \ to predict everything that occurs in a large database system. Furthermore, as\
    \ the application matures, changes are introduced to the database (new tables,\
    \ new columns, new constraints, database upgrades that add new features/behaviors,\
    \ and so on). The reality is that you will have to react to unforeseen situations\
    \ in your database that warrant adding indexes to improve performance.\n\nHere\
    \ is a typical process for reactively identifying poorly performing SQL statements\
    \ and improving performance with indexes:\n\n1.  A poorly performing SQL statement\
    \ is identified (a user complains about a specific statement, the DBA runs automatic\
    \ database diagnostic monitor (ADDM) or automatic workload repository (AWR) reports\
    \ to identify resource-consuming SQL, and so on).\n2.  DBA checks the table and\
    \ index statistics to ensure that out-of-date statistics aren’t causing the optimizer\
    \ to make bad choices.\n3.  DBA/developer determines that the query can’t be rewritten\
    \ in a way that alleviates performance issues.\n4.  DBA/developer examines the\
    \ SQL statement and determines which tables and columns are being accessed, by\
    \ inspecting the SELECT, FROM, and WHERE clauses.\n5.  DBA/developer performs\
    \ testing and recommends that an index be created, based on a table and one or\
    \ more columns.\n\nOnce you’ve identified a poorly performing SQL query, consider\
    \ creating indexes for the following situations:\n\n*   Create indexes on columns\
    \ used often as predicates in the WHERE clause; when multiple columns from a table\
    \ are used in the WHERE clause, consider using a concatenated (multicolumn) index.\n\
    *   Create a covering index (i.e., an index on all columns) in the SELECT clause.\n\
    *   Create indexes on columns used in the ORDER BY, GROUP BY, UNION, and DISTINCT\
    \ clauses.\n\nOracle allows you to create an index that contains more than one\
    \ column. Multicolumn indexes are known as concatenated indexes (also called composite\
    \ indexes). These indexes are especially effective when you often use multiple\
    \ columns in the WHERE clause when accessing a table. Concatenated indexes are,\
    \ in many instances, more efficient in this situation than creating separate,\
    \ single-column indexes (See the section “Creating Concatenated Indexes,” later\
    \ in this chapter, for more details).\n\nColumns included in the SELECT and WHERE\
    \ clauses are also potential candidates for indexes. Sometimes, a covering index\
    \ in a SELECT clause results in Oracle’s using the index structure itself (and\
    \ not the table) to satisfy the results of the query. Also, if the column values\
    \ are selective enough, Oracle can use an index on columns referenced in the WHERE\
    \ clause to improve query performance.\n\nAlso consider creating indexes on columns\
    \ used in the ORDER BY, GROUP BY, UNION, and DISTINCT clauses. This may result\
    \ in greater efficiency for queries that frequently use these SQL constructs.\n\
    \nIt’s okay to have multiple indexes per table. However, the more indexes you\
    \ place on a table, the slower DML statements will run (as Oracle has more and\
    \ more indexes to maintain when the table column values change). Don’t fall into\
    \ the trap of randomly adding indexes to a table until you stumble upon the right\
    \ combination of indexed columns. Rather, verify the performance of an index before\
    \ you create it in a production environment.\n\nAlso keep in mind that it’s possible\
    \ to add an index that increases the performance of one statement, while hurting\
    \ the performance of others. You must be sure that the statements that are improved\
    \ warrant the penalty being applied to other statements. You should only add an\
    \ index when you’re certain it will improve performance.\n\nPlanning for Robustness\n\
    \nAfter you’ve decided that you need to create an index, it’s prudent to make\
    \ a few foundational decisions that will affect maintainability and availability.\
    \ Oracle provides a wide assortment of indexing features and options. As a DBA\
    \ or a developer, you need to be aware of the various features and how to use\
    \ them. If you choose the wrong type of index or use a feature incorrectly, there\
    \ may be serious, detrimental performance implications. Listed next are manageability\
    \ features to consider before you create an index:\n\n*   Type of index\n*   Initial\
    \ space required and growth\n*   Temporary tablespace usage while the index is\
    \ being created (for large indexes)\n*   Tablespace placement\n*   Naming conventions\n\
    *   Which column(s) to include\n*   Whether to use a single column or a combination\
    \ of columns\n*   Special features, such as the PARALLEL clause, NOLOGGING, compression,\
    \ and invisible indexes\n*   Uniqueness\n*   Impact on performance of SELECT statements\
    \ (improvement)\n*   Impact on performance of INSERT, UPDATE, and DELETE statements\n\
    \nThese topics are discussed in subsequent sections in this chapter.\n\nDetermining\
    \ Which Type of Index to Use\n\nOracle provides a wide range of index types and\
    \ features. The correct use of indexes results in a well-performing and scalable\
    \ database application. Conversely, if you incorrectly or unwisely implement a\
    \ feature, there may be detrimental performance implications. [Table 8-1](#9781430257288_Ch08.xhtml#Tab1)\
    \ summarizes the various Oracle index types available. At first glance, this is\
    \ a long list and may be somewhat overwhelming to somebody new to Oracle. However,\
    \ deciding which index type to use isn’t as daunting as it might initially seem.\
    \ For most applications, you should simply use the default B-tree index type.\n\
    \n[Table 8-1.](#9781430257288_Ch08.xhtml#_Tab1) Oracle Index Type and Usage Descriptions\n\
    \n| Index Type | Usage |\n| --- | --- |\n| B-tree | Default index; good for columns\
    \ with high cardinality (i.e., high degree of distinct values). Use a normal B-tree\
    \ index unless you have a concrete reason to use a different index type or feature.\
    \ |\n| IOT | This index is efficient when most of the column values are included\
    \ in the primary key. You access the index as if it were a table. The data are\
    \ stored in a B-tree-like structure. See [Chapter 7](#9781430257288_Ch07.xhtml)\
    \ for details on this type of index. |\n| Unique | A form of B-tree index; used\
    \ to enforce uniqueness in column values; often used with primary key and unique\
    \ key constraints but can be created independently of constraints. |\n| Reverse\
    \ key | A form of B-tree index; useful for balancing I/O in an index that has\
    \ many sequential inserts. |\n| Key compressed | Good for concatenated indexes\
    \ in which the leading column is often repeated; compresses leaf block entries;\
    \ applies to B-tree and IOT indexes. |\n| Descending | A form of B-tree index;\
    \ used with indexes in which corresponding column values are sorted in a descending\
    \ order (the default order is ascending). You can’t specify descending for a reverse-key\
    \ index, and Oracle ignores descending if the index type is bitmap. |\n| Bitmap\
    \ | Excellent in data warehouse environments with low cardinality (i.e., low degree\
    \ of distinct values) columns and SQL statements using many AND or OR operators\
    \ in the WHERE clause. Bitmap indexes aren’t appropriate for OLTP databases in\
    \ which rows are frequently updated. You can’t create a unique bitmap index. |\n\
    | Bitmap join | Useful in data warehouse environments for queries that use star\
    \ schema structures that join fact and dimension tables. |\n| Function based |\
    \ Good for columns that have SQL functions applied to them; can be used with either\
    \ a B-tree or bitmap index. |\n| Indexed virtual column | An index defined on\
    \ a virtual column (of a table); useful for columns that have SQL functions applied\
    \ to them; a viable alternative to a function-based index. |\n| Virtual | Allows\
    \ you to create an index with no physical segment or extents via the NOSEGMENT\
    \ clause of CREATE INDEX; useful in tuning SQL without consuming resources required\
    \ to build the physical index. Any index type can be created as virtual. |\n|\
    \ Invisible | The index is not visible to the query optimizer. However, the structure\
    \ of the index is maintained as table data are modified. Useful for testing an\
    \ index before making it visible to the application. Any index type can be created\
    \ as invisible. |\n| Globalpartitioned | Global index across all partitions in\
    \ a partitioned or regular table; can be a B-tree index type and can’t be a bitmap\
    \ index type. |\n| Local partitioned | Local index based on individual partitions\
    \ in a partitioned table; can be either a B-tree or bitmap index type. |\n| Domain\
    \ | Specific for an application or cartridge. |\n| B-tree cluster | Used with\
    \ clustered tables. |\n| Hash cluster | Used with hash clusters. |\n\n![image](Images/sq.jpg) **Note**  \
    \ Several of the index types listed in [Table 8-1](#9781430257288_Ch08.xhtml#Tab1)\
    \ are actually just variations on the B-tree index. A reverse-key index, for example,\
    \ is merely a B-tree index optimized for evenly spreading I/O when the index value\
    \ is sequentially generated and inserted with similar values.\n\nThis chapter\
    \ focuses on the most commonly used indexes and features—B-tree, function based,\
    \ unique, bitmap, reverse key, and key compressed—and the most used options. IOTs\
    \ are covered in [Chapter 7](#9781430257288_Ch07.xhtml), and partitioned indexes\
    \ are covered in [Chapter 12](#9781430257288_Ch12.xhtml). If you need more information\
    \ about index types or features, see the *Oracle SQL Reference Guide*, which is\
    \ available for download from the Technology Network area of the Oracle web site\
    \ ([http://otn.oracle.com](http://otn.oracle.com)).\n\nEstimating the Size of\
    \ an Index Before Creation\n\nIf you don’t work with large databases, then you\
    \ don’t need to worry about estimating the amount of space an index will initially\
    \ consume. However, for large databases, you absolutely need an estimate on how\
    \ much space it will take to create an index. If you have a large table in a data\
    \ warehouse environment, a corresponding index could easily be hundreds of gigabytes\
    \ in size. In this situation, you need to ensure that the database has adequate\
    \ disk space available.\n\nThe best way to predict the size of an index is to\
    \ create it in a test environment that has a representative set of production\
    \ data. If you can’t build a complete replica of production data, a subset of\
    \ data can often be used to extrapolate the size required in production. If you\
    \ don’t have the luxury of using a cut of production data, you can also estimate\
    \ the size of an index using the DBMS_SPACE.CREATE_INDEX_COST procedure.\n\nFor\
    \ reference, here is the table creation script that the index used in the subsequent\
    \ examples is based on:\n\n```\nCREATE TABLE cust\n(cust_id    NUMBER\n,last_name  VARCHAR2(30)\n\
    ,first_name VARCHAR2(30)\n) TABLESPACE users;\n```\n\nNext, several thousand records\
    \ are inserted into the prior table. Here is a snippet of the insert statements:\n\
    \n```\ninsert into cust values(7,'ACER','SCOTT');\ninsert into cust values(5,'STARK','JIM');\n\
    insert into cust values(3,'GREY','BOB');\ninsert into cust values(11,'KAHN','BRAD');\n\
    insert into cust values(21,'DEAN','ANN');\n...\n```\n\nNow, suppose you want to\
    \ create an index on the CUST table like this:\n\n```\nSQL> create index cust_idx1\
    \ on cust(last_name);\n```\n\nHere is the procedure for estimating the amount\
    \ of space the index will initially consume:\n\n```\nSQL> set serverout on\nSQL>\
    \ exec dbms_stats.gather_table_stats(user,'CUST');\nSQL> variable used_bytes number\n\
    SQL> variable alloc_bytes number\nSQL> exec dbms_space.create_index_cost( 'create\
    \ index cust_idx1 on cust(last_name)', -\n               :used_bytes, :alloc_bytes\
    \ );\nSQL> print :used_bytes\n```\n\nHere is some sample output for this example:\n\
    \n```\nUSED_BYTES\n\nSQL> print :alloc_bytes\n\nALLOC_BYTES\n\n```\n\nThe used_bytes\
    \ variable gives you an estimate of how much room is required for the index data.\
    \ The alloc_bytes variable provides an estimate of how much space will be allocated\
    \ within the tablespace.\n\nNext, go ahead and create the index.\n\n```\nSQL>\
    \ create index cust_idx1 on cust(last_name);\n```\n\nThe actual amount of space\
    \ consumed is shown by this query:\n\n```\nSQL> select bytes from user_segments\
    \ where segment_name='CUST_IDX1';\n```\n\nThe output indicates that the estimated\
    \ amount of allocated bytes is in the ballpark of the amount of space actually\
    \ consumed:\n\n```\n     BYTES\n\n```\n\nYour results may vary, depending on the\
    \ number of records, the number of columns, the data types, and the accuracy of\
    \ statistics.\n\nIn addition to the initial sizing, keep in mind that the index\
    \ will grow as records are inserted into the table. You’ll have to monitor the\
    \ space consumed by the index and ensure that there’s enough disk space to accommodate\
    \ future growth requirements.\n\nCREATING INDEXES AND TEMPORARY TABLESPACE SPACE\n\
    \nRelated to space usage, sometimes DBAs forget that Oracle often requires space\
    \ in either memory or disk to sort an index as it’s created. If the available\
    \ memory area is consumed, then Oracle allocates disk space as required within\
    \ the default temporary tablespace. If you’re creating a large index, you may\
    \ need to increase the size of your temporary tablespace.\n\nAnother approach\
    \ is to create an additional temporary tablespace and then assign it to be the\
    \ default temporary tablespace of the user creating the index. After the index\
    \ is created, you can drop the temporary tablespace (that was created just for\
    \ the new index) and reassign the user’s default temporary tablespace back to\
    \ the original temporary tablespace.\n\nCreating Separate Tablespaces for Indexes\n\
    \nFor critical applications, you must give some thought to how much space tables\
    \ and indexes will consume and how fast they grow. Space consumption and object\
    \ growth have a direct impact on database availability. If you run out of space,\
    \ your database will become unavailable. The best way to manage space in the database\
    \ is by creating tablespaces tailored to space requirements and then creating\
    \ objects in specified tablespaces that you’ve designed for those objects. With\
    \ that in mind, I recommend that you separate tables and indexes into different\
    \ tablespaces. Consider the following reasons:\n\n*   Doing so allows for differing\
    \ backup and recovery requirements. You may want the flexibility of backing up\
    \ the indexes at a different frequency than the tables. Or, you may choose not\
    \ to back up indexes because you know that you can recreate them.\n*   If you\
    \ let the table or index inherit its storage characteristics from the tablespace,\
    \ when using separate tablespaces, you can tailor storage attributes for objects\
    \ created within the tablespace. Tables and indexes often have different storage\
    \ requirements (such as extent size and logging).\n*   When running maintenance\
    \ reports, it’s sometimes easier to manage tables and indexes when the reports\
    \ have sections separated by tablespace.\n\nIf these reasons are valid for your\
    \ environment, it’s probably worth the extra effort to employ different tablespaces\
    \ for tables and indexes. If you don’t have any of the prior needs, then it’s\
    \ fine to put tables and indexes together in the same tablespace.\n\nI should\
    \ point out that DBAs often consider placing indexes in separate tablespaces for\
    \ performance reasons. If you have the luxury of creating a storage system from\
    \ scratch and can set up mount points that have their own sets of disks and controllers,\
    \ you may see some I/O benefits from separating tables and indexes into different\
    \ tablespaces. Nowadays, storage administrators often give you a large slice of\
    \ storage in a storage area network (SAN), and there’s no way to guarantee that\
    \ data and indexes will be stored physically, on separate disks (and controllers).\
    \ Thus, you typically don’t gain any performance benefits by separating tables\
    \ and indexes into different tablespaces.\n\nThe following code shows an example\
    \ of building separate tablespaces for tables and indexes. It creates locally\
    \ managed tablespaces, using a fixed extent size and automatic segment space management:\n\
    \n```\nCREATE TABLESPACE reporting_data\n  DATAFILE '/u01/dbfile/O12C/reporting_data01.dbf'\
    \ SIZE 1G\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 1M\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n--\nCREATE TABLESPACE reporting_index\n  DATAFILE '/u01/dbfile/O12C/reporting_index01.dbf'\
    \ SIZE 500M\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 128K\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n```\n\nI prefer to use uniform extent sizes because that ensures that\
    \ all extents within the tablespace will be of the same size, which reduces fragmentation\
    \ as objects are created and dropped. The automatic segment space management feature\
    \ allows Oracle to manage automatically many storage attributes that previously\
    \ had to be monitored and maintained by the DBA manually.\n\nInheriting Storage\
    \ Parameters from the Tablespace\n\nWhen creating a table or an index, there are\
    \ a few tablespace-related technical details to be aware of. For instance, if\
    \ you don’t specify storage parameters when creating tables and indexes, then\
    \ they inherit storage parameters from the tablespace. This is the desired behavior\
    \ in most circumstances; it saves you from having to specify these parameters\
    \ manually. If you need to create an object with storage parameters different\
    \ from those of its tablespace, then you can do so within the CREATE TABLE/INDEX\
    \ statement.\n\nAlso keep in mind that if you don’t explicitly specify a tablespace,\
    \ by default, indexes are created in the default permanent tablespace for the\
    \ user. This is acceptable for development and test environments. For production\
    \ environments, you should consider explicitly naming tablespaces in the CREATE\
    \ TABLE/INDEX statement.\n\nPlacing Indexes in Tablespaces, Based on Extent Size\n\
    \nIf you know how large an index may initially be or what its growth requirements\
    \ are, consider placing the index in a tablespace that is appropriate in terms\
    \ of the size of the tablespace and the size of the extents. I’ll sometimes create\
    \ two or more index tablespaces per application. Here is an example:\n\n```\n\
    create tablespace inv_idx_small\n  datafile '/u01/dbfile/O12C/inv_idx_small01.dbf'\
    \ size 100m\n  extent management local\n  uniform size 128k\n  segment space management\
    \ auto;\n--\ncreate tablespace inv_idx_med\n  datafile '/u01/dbfile/O12C/inv_idx_med01.dbf'\
    \ size 1000m\n  extent management local\n  uniform size 4m\n  segment space management\
    \ auto;\n```\n\nIndexes that have small space and growth requirements are placed\
    \ in the INV_IDX_SMALL tablespace, and indexes that have medium storage requirements\
    \ would be created in INV_IDX_MED. If you discover that an index is growing at\
    \ an unpredicted rate, consider dropping the index and recreating it in a different\
    \ tablespace or rebuilding the index in a more appropriate tablespace.\n\nCreating\
    \ Portable Scripts\n\nI oftentimes find myself working in multiple database environments,\
    \ such as development, testing, and production. Typically, I’ll create a tablespace\
    \ first in development, then later in testing, and finally in production. Frequently,\
    \ there are aspects of the script that need to change as it is promoted through\
    \ the environments. For instance, development may need only 100MB of space, but\
    \ production may need 10GB.\n\nIn these situations it’s handy to use ampersand\
    \ variables to make the scripts somewhat portable among environments. For example,\
    \ this next script uses an ampersand variable at the top of the script to define\
    \ the tablespace size. The ampersand variable is then referenced within the CREATE\
    \ TABLESPACE statement:\n\n```\ndefine reporting_index_size=100m\n--\ncreate tablespace\
    \ reporting_index\n  datafile '/u01/dbfile/O12C/reporting_index01.dbf' size &&reporting_index_size\n\
      extent management local\n  uniform size 128k\n  segment space management auto;\n\
    ```\n\nIf you’re only working with one tablespace, then there’s not much to gain\
    \ from using the prior technique. But, if you’re creating dozens of tablespaces\
    \ within numerous environments, then it pays to build in the reusability. Keep\
    \ in mind that you can use ampersand variables anywhere within the script for\
    \ any values you think may differ from one environment to the next.\n\nEstablishing\
    \ Naming Standards\n\nWhen you’re creating and managing indexes, it’s highly desirable\
    \ to develop some standards regarding naming. Consider the following motives:\n\
    \n*   Diagnosing issues is simplified when error messages contain information\
    \ that indicates the table, index type, and so on.\n*   Reports that display index\
    \ information are more easily grouped and therefore are more readable, making\
    \ it easier to spot patterns and issues.\n\nGiven those needs, here are some sample\
    \ index-naming guidelines:\n\n*   Primary key index names should contain the table\
    \ name and a suffix such as _PK.\n*   Unique key index names should contain the\
    \ table name and a suffix such as _UKN, where N is a number.\n*   Indexes on foreign\
    \ key columns should contain the foreign key table and a suffix such as _FKN,\
    \ where N is a number.\n*   Indexes that aren’t used for constraints should contain\
    \ the table name and a suffix such as _IDXN, where N is a number.\n*   Function-based\
    \ index names should contain the table name and a suffix such as _FNXN, where\
    \ N is a number.\n*   Bitmap index names should contain the table name and a suffix\
    \ such as _BMXN, where N is a number.\n\nSome shops use prefixes when naming indexes.\
    \ For example, a primary key index would be named PK_CUST (instead of CUST_PK).\
    \ All these various naming standards are valid.\n\n![image](Images/sq.jpg) **Tip**  \
    \ It doesn’t matter what the standard is, as long as everybody on the team follows\
    \ the same standard.\n\nCreating Indexes\n\nAs described previously, when you\
    \ think about creating tables, you must think about the corresponding index architecture.\
    \ Creating the appropriate indexes and using the correct index features will usually\
    \ result in dramatic performance improvements. Conversely, creating indexes on\
    \ the wrong columns or using features in the wrong situations can cause dramatic\
    \ performance degradation.\n\nHaving said that, after giving some thought to what\
    \ kind of index you need, the next logical step is to create the index. Creating\
    \ indexes and implementing specific features are discussed in the next several\
    \ sections.\n\nCreating B-tree Indexes\n\nThe default index type in Oracle is\
    \ a B-tree index. To create a B-tree index on an existing table, use the CREATE\
    \ INDEX statement. This example creates an index on the CUST table, specifying\
    \ LAST_NAME as the column:\n\n```\nSQL> CREATE INDEX cust_idx1 ON cust(last_name);\n\
    ```\n\nBy default, Oracle will create an index in your default permanent tablespace.\
    \ Sometimes, that may be the desired behavior. But often, for manageability reasons,\
    \ you want to create the index in a specific tablespace. Use the following syntax\
    \ to instruct Oracle to build an index in a specific tablespace:\n\n```\nSQL>\
    \ CREATE INDEX cust_idx1 ON cust(last_name) TABLESPACE reporting_index;\n```\n\
    \n![image](Images/sq.jpg) **Tip**   If you don’t specify any physical storage\
    \ properties for an index, the index inherits its properties from the tablespace\
    \ in which it’s created. This is usually an acceptable method for managing index\
    \ storage.\n\nBecause B-tree indexes are the default type and are used extensively\
    \ with Oracle applications, it’s worth taking some time to explain how this particular\
    \ type of index works. A good way to understand the workings of an index is to\
    \ show its conceptual structure, along with its relationship with a table (an\
    \ index can’t exist without a table). Take a look at [Figure 8-1](#9781430257288_Ch08.xhtml#Fig1);\
    \ the top section illustrates the CUST table, with some data. The table data are\
    \ stored in two separate data files, and each data file contains two blocks. The\
    \ bottom part of the diagram shows a balanced, treelike structure of a B-tree\
    \ index named CUST_IDX1, created on a LAST_NAME of the CUST table. The index is\
    \ stored in one data file and consists of four blocks.\n\n![9781430257288_Fig08-01.jpg](Images/9781430257288_Fig08-01.jpg)\n\
    \n[Figure 8-1](#9781430257288_Ch08.xhtml#_Fig1). Oracle B-tree hierarchical index\
    \ structure and associated table\n\nThe index definition is associated with a\
    \ table and column(s). The index structure stores a mapping of the table’s ROWID\
    \ and the column data on which the index is built. A ROWID usually uniquely identifies\
    \ a row within a database and contains information to physically locate a row\
    \ (data file, block, and row position within block). The two dotted lines in [Figure\
    \ 8-1](#9781430257288_Ch08.xhtml#Fig1) depict how the ROWID (in the index structure)\
    \ points to the physical row in the table for the column values of ACER.\n\nThe\
    \ B-tree index has a hierarchical tree structure. When Oracle accesses the index,\
    \ it starts with the top node, called the root (or header) block. Oracle uses\
    \ this block to determine which second-level block (also called a branch block)\
    \ to read next. The second-level block points to several third-level blocks (leaf\
    \ nodes), which contain a ROWID and the name value. In this structure it will\
    \ take three I/O operations to find the ROWID. Once the ROWID is determined, Oracle\
    \ will use it to read the table block that contains the ROWID.\n\nA couple of\
    \ examples will help illustrate how an index works. Consider this query:\n\n```\n\
    SQL> select last_name from cust where last_name = 'ACER';\n```\n\nOracle accesses\
    \ the index, first reading the root, block 20; then, determines that the branch\
    \ block 30 needs to be read; and, finally, reads the index values from the lead\
    \ node block 39\\. Conceptually, that would be three I/O operations. In this case,\
    \ Oracle doesn’t need to read the table because the index contains sufficient\
    \ information to satisfy the result of the query. You can verify the access path\
    \ of a query by using the autotrace utility; for example,\n\n```\nSQL> set autotrace\
    \ trace explain;\nSQL> select last_name from cust where last_name = 'ACER';\n\
    ```\n\nNote that only the index was accessed (and not the table) to return the\
    \ data:\n\n```\n\n| Id  | Operation        | Name      | Rows  | Bytes | Cost\
    \ (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT |           |     1 |     6 |    \
    \ 1   (0)| 00:00:01 |\n|*  1 |  INDEX RANGE SCAN| CUST_IDX1 |     1 |     6 |    \
    \ 1   (0)| 00:00:01 |\n\n```\n\nAlso consider this query:\n\n```\nSQL> select\
    \ first_name, last_name from cust where last_name = 'ACER';\n```\n\nHere, Oracle\
    \ would follow the same index access path by reading blocks 20, 30, and 39\\.\
    \ However, because the index structure does not contain the FIRST_NAME value,\
    \ Oracle must also use the ROWID to read the appropriate rows in the CUST table\
    \ (blocks 11 and 2500). Here is a snippet of the output from autotrace, indicating\
    \ that the table has also been accessed:\n\n```\n\n| Id  | Operation                          \
    \ | Name      | Rows  | Bytes | Cost\n\n|   0 | SELECT STATEMENT                    |          \
    \ |     1 |    44 |     2\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED| CUST      |    \
    \ 1 |    44 |     2\n|*  2 |   INDEX RANGE SCAN                  | CUST_IDX1 |    \
    \ 1 |       |     1\n\n```\n\nAlso note at the bottom of [Figure 8-1](#9781430257288_Ch08.xhtml#Fig1)\
    \ the bidirectional arrows between the leaf nodes. This illustrates that the leaf\
    \ nodes are connected via a doubly linked list, thus making index range scans\
    \ possible. For instance, suppose you have this query:\n\n```\nSQL> select last_name\
    \ from cust where last_name >= 'A' and last_name <= 'J';\n```\n\nTo determine\
    \ where to start the range scan, Oracle would read the root, block 20; then, the\
    \ branch block 30; and, finally, the leaf node block 39\\. Because the leaf node\
    \ blocks are linked, Oracle can navigate forward as needed to find all required\
    \ blocks (and doesn’t have to navigate up and down through branch blocks). This\
    \ is a very efficient traversal mechanism for range scans.\n\nARBORISTIC VIEWS\n\
    \nOracle provides two types of views containing details about the structure of\
    \ B-tree indexes:\n\n*   INDEX_STATS\n*   DBA/ALL/USER_INDEXES\n\nThe INDEX_STATS\
    \ view contains information regarding the HEIGHT (number of blocks from root to\
    \ leaf blocks), LF_ROWS (number of index entries), and so on. The INDEX_STATS\
    \ view is only populated after you analyze the structure of the index; for example,\n\
    \n```\nSQL> analyze index cust_idx1 validate structure;\n```\n\nThe DBA/ALL/USER_INDEXES\
    \ views contain statistics, such as BLEVEL (number of blocks from root to branch\
    \ blocks; this equals HEIGHT – 1); LEAF_BLOCKS (number of leaf blocks); and so\
    \ on. The DBA/ALL/USER_INDEXES views are populated automatically when the index\
    \ is created and refreshed via the DBMS_STATS package.\n\nCreating Concatenated\
    \ Indexes\n\nOracle allows you to create an index that contains more than one\
    \ column. Multicolumn indexes are known as concatenated indexes. These indexes\
    \ are especially effective when you often use multiple columns in the WHERE clause\
    \ when accessing a table.\n\nSuppose you have this scenario, in which two columns\
    \ from the same table are used in the WHERE clause:\n\n```\nselect first_name,\
    \ last_name\nfrom cust\nwhere first_name = 'JIM'\nand last_name = 'STARK';\n```\n\
    \nBecause both FIRST_NAME and LAST_NAME are often used in WHERE clauses for retrieving\
    \ data, it may be efficient to create a concatenated index on the two columns:\n\
    \n```\nSQL> create index cust_idx2 on cust(first_name, last_name);\n```\n\nOften,\
    \ it’s not clear whether a concatenated index is more efficient than a single-column\
    \ index. For the previous SQL statement, you may wonder whether it’s more efficient\
    \ to create two single-column indexes on FIRST_NAME and LAST_NAME, such as\n\n\
    ```\nSQL> create index cust_idx3 on cust(first_name);\nSQL> create index cust_idx4\
    \ on cust(last_name);\n```\n\nIn this scenario, if you’re consistently using the\
    \ combination of columns that appear in the WHERE clause, then the optimizer will\
    \ most likely use the concatenated index and not the single-column indexes. Using\
    \ a concatenated index, in these situations, is usually much more efficient. You\
    \ can verify that the optimizer chooses the concatenated index by generating an\
    \ explain plan; for example:\n\n```\nSQL> set autotrace trace explain;\n```\n\n\
    Then, run this query:\n\n```\nselect first_name, last_name\nfrom cust\nwhere first_name\
    \ = 'JIM'\nand last_name = 'STARK';\n```\n\nHere is some sample output, indicating\
    \ that the optimizer uses the concatenated index on CUST_IDX2 to retrieve data:\n\
    \n```\n\n| Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time    \
    \ |\n\n|   0 | SELECT STATEMENT |           |     1 |    44 |     1   (0)| 00:00:01\
    \ |\n|*  1 |  INDEX RANGE SCAN| CUST_IDX2 |     1 |    44 |     1   (0)| 00:00:01\
    \ |\n\n```\n\nIn older versions of Oracle (circa version 8), the optimizer would\
    \ use a concatenated index only if the leading-edge column (or columns) appeared\
    \ in the WHERE clause. In modern versions the optimizer can use a concatenated\
    \ index even if the leading-edge column (or columns) isn’t present in the WHERE\
    \ clause. This ability to use an index without reference to leading-edge columns\
    \ is known as the skip-scan feature.\n\nA concatenated index that is used for\
    \ skip scanning can, in certain situations, be more efficient than a full-table\
    \ scan. However, you should try to create concatenated indexes that use the leading\
    \ column. If you’re consistently using only a lagging-edge column of a concatenated\
    \ index, then consider creating a single-column index on the lagging column.\n\
    \nCREATING MULTIPLE INDEXES ON THE SAME SET OF COLUMNS\n\nPrior to Oracle Database\
    \ 12c, you could not have multiple indexes defined on the exact same combination\
    \ of columns in one table. This has changed in 12c. You can now have multiple\
    \ indexes on the same set of columns. However, you can only do this if there is\
    \ something physically different about the indexes, for example, one index is\
    \ created as a B-tree index, and the second, as a bitmap index.\n\nAlso, there\
    \ can be only one visible index for the same combination of columns. Any other\
    \ indexes created on that same set of columns must be declared invisible; for\
    \ example,\n\n```\nSQL> create index cust_idx2 on cust(first_name, last_name);\n\
    SQL> create bitmap index cust_bmx1 on cust(first_name, last_name) invisible;\n\
    ```\n\nPrior to Oracle Database 12c, if you attempted the previous operation,\
    \ the second creation statement would throw an error such as ORA-01408: such column\
    \ list already indexed.\n\nWhy would you want two indexes defined on the same\
    \ set of columns? You might want to do this if you originally implemented B-tree\
    \ indexes and now wanted to change them to bitmap—the idea being, you create the\
    \ new indexes as invisible, then drop the original indexes and make the new indexes\
    \ visible. In a large database environment this would enable you to make the change\
    \ quickly.\n\nImplementing Function-Based Indexes\n\nFunction-based indexes are\
    \ created with SQL functions or expressions in their definitions. Sometimes, function-based\
    \ indexes are required when queries use SQL functions. For example, consider the\
    \ following query, which uses an SQL UPPER function:\n\n```\nSQL> select first_name\
    \ from cust where UPPER(first_name) = 'JIM';\n```\n\nIn this scenario there may\
    \ be a normal B-tree index on the FIRST_NAME column, but Oracle won’t use a regular\
    \ index that exists on a column when a function is applied to it.\n\nIn this situation,\
    \ you can create a function-based index to improve performance of queries that\
    \ use an SQL function in the WHERE clause. This example creates a function-based\
    \ index:\n\n```\nSQL> create index cust_fnx1 on cust(upper(first_name));\n```\n\
    \nFunction-based indexes allow index lookups on columns referenced by functions\
    \ in the WHERE clause of an SQL query. The index can be as simple as the preceding\
    \ example, or it can be based on complex logic stored in a PL/SQL function.\n\n\
    ![image](Images/sq.jpg) **Note**   Any user-created SQL functions must be declared\
    \ deterministic before they can be used in a function-based index. *Deterministic*\
    \ means that for a given set of inputs, the function always returns the same results.\
    \ You must use the keyword DETERMINISTIC when creating a user-defined function\
    \ that you want to use in a function-based index.\n\nIf you want to see the definition\
    \ of a function-based index, select from the DBA/ALL/USER_IND_EXPRESSIONS view\
    \ to display the SQL associated with the index. If you’re using SQL*Plus, be sure\
    \ to issue a SET LONG command first; for example,\n\n```\nSQL> SET LONG 500\n\
    SQL> select index_name, column_expression from user_ind_expressions;\n```\n\n\
    The SET LONG command in this example tells SQL*Plus to display up to 500 characters\
    \ from the COLUMN_EXPRESSION column, which is of type LONG.\n\nCreating Unique\
    \ Indexes\n\nWhen you create a B-tree index, you can also specify that the index\
    \ be unique. Doing so ensures that non-NULL values are unique when you insert\
    \ or update columns in a table.\n\nSuppose you’ve identified a column (or combination\
    \ of columns) in the table (outside the primary key) that is used heavily in the\
    \ WHERE clause. In addition, this column (or combination of columns) has the requirement\
    \ that it be unique within a table. This is a good scenario in which to use a\
    \ unique index. Use the UNIQUE clause to create a unique index:\n\n```\nSQL> create\
    \ unique index cust_uk1 on cust(first_name, last_name);\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ The unique index doesn’t enforce uniqueness for NULL values inserted into the\
    \ table. In other words, you can insert the value NULL into the indexed column\
    \ for multiple rows.\n\nYou must be aware of some interesting nuances regarding\
    \ unique indexes, primary key constraints, and unique key constraints (see [Chapter\
    \ 7](#9781430257288_Ch07.xhtml) for a detailed discussion of primary key constraints\
    \ and unique key constraints). When you create a primary key constraint or a unique\
    \ key constraint, Oracle automatically creates a unique index and a corresponding\
    \ constraint that is visible in DBA/ALL/USER_CONSTRAINTS.\n\nWhen you only create\
    \ a unique index explicitly (as in the example in this section), Oracle creates\
    \ a unique index but doesn’t add an entry for a constraint in DBA/ALL/USER_CONSTRAINTS.\
    \ Why does this matter? Consider this scenario:\n\n```\nSQL> create unique index\
    \ cust_uk1 on cust(first_name, last_name);\nSQL> insert into cust values(500,'JOHN','DEERE');\n\
    SQL> insert into cust values(501,'JOHN','DEERE');\n```\n\nHere is the corresponding\
    \ error message that is thrown:\n\n```\nERROR at line 1:\nORA-00001: unique constraint\
    \ (MV_MAINT.CUST_UK1) violated\n```\n\nIf you’re asked to troubleshoot this issue,\
    \ the first place you look is in DBA_CONSTRAINTS for a constraint named CUST_IDX1\\\
    . However, there is no information:\n\n```\nselect constraint_name\nfrom dba_constraints\n\
    where constraint_name='CUST_UK1';\n```\n\nHere is the output:\n\n```\nno rows\
    \ selected\n```\n\nThe no rows selected message can be confusing: the error message\
    \ thrown when you insert into the table indicates that a unique constraint has\
    \ been violated, yet there is no information in the constraint-related data dictionary\
    \ views. In this situation, you have to look at DBA_INDEXES and DBA_IND_COLUMNS\
    \ to view the details of the unique index that has been created:\n\n```\nselect\
    \ a.owner, a.index_name, a.uniqueness, b.column_name\nfrom dba_indexes a, dba_ind_columns\
    \ b\nwhere a.index_name='CUST_UK1'\nand   a.table_owner = b.table_owner\nand  \
    \ a.index_name = b.index_name;\n```\n\nIf you want to have information related\
    \ to the constraint in the DBA/ALL/USER_CONSTRAINTS views, you can explicitly\
    \ associate a constraint after the index has been created:\n\n```\nSQL> alter\
    \ table cust add constraint cust_idx1 unique(first_name, last_name);\n```\n\n\
    In this situation, you can enable and disable the constraint independent of the\
    \ index. However, because the index was created as unique, the index still enforces\
    \ uniqueness regardless of whether the constraint has been disabled.\n\nWhen should\
    \ you explicitly create a unique index versus creating a constraint and having\
    \ Oracle automatically create the index? There are no hard-and-fast rules. I prefer\
    \ to create a unique key constraint and let Oracle automatically create the unique\
    \ index, because then I get information in both the DBA/ALL/USER_CONSTRAINTS and\
    \ DBA/ALL/USER_INDEXES views.\n\nBut, Oracle’s documentation recommends that if\
    \ you have a scenario in which you’re strictly using a unique constraint to improve\
    \ query performance, it’s preferable to create only the unique index. This is\
    \ appropriate. If you take this approach, just be aware that you may not find\
    \ any information in the constraint-related data dictionary views.\n\nImplementing\
    \ Bitmap Indexes\n\nBitmap indexes are recommended for columns with a relatively\
    \ low degree of distinct values (low cardinality). You shouldn’t use bitmap indexes\
    \ in OLTP databases with high INSERT/UPDATE/DELETE activities, owing to locking\
    \ issues; the structure of the bitmap index results in many rows’ potentially\
    \ being locked during DML operations, which causes locking problems for high-transaction\
    \ OLTP systems.\n\nBitmap indexes are commonly used in data warehouse environments.\
    \ A typical star schema structure consists of a large fact table and many small\
    \ dimension (lookup) tables. In these scenarios it’s common to create bitmap indexes\
    \ on fact table foreign key columns. The fact tables are typically inserted into\
    \ on a daily basis and usually aren’t updated or deleted from.\n\nListed next\
    \ is a simple example that demonstrates the creation and structure of a bitmap\
    \ index. First, create a LOCATIONS table:\n\n```\ncreate table locations(\n location_id\
    \ number\n,region      varchar2(10));\n```\n\nNow, insert the following rows into\
    \ the table:\n\n```\ninsert into locations values(1,'NORTH');\ninsert into locations\
    \ values(2,'EAST');\ninsert into locations values(3,'NORTH');\ninsert into locations\
    \ values(4,'WEST');\ninsert into locations values(5,'EAST');\ninsert into locations\
    \ values(6,'NORTH');\ninsert into locations values(7,'NORTH');\n```\n\nYou use\
    \ the BITMAP keyword to create a bitmap index. The next line of code creates a\
    \ bitmap index on the REGION column of the LOCATIONS tsable:\n\n```\nSQL> create\
    \ bitmap index locations_bmx1 on locations(region);\n```\n\nA bitmap index stores\
    \ information about the ROWID of a row and a corresponding bitmap. You can think\
    \ of the bitmap as a combination of ones and zeros that point at multiple rows\
    \ (this is quite different from a B-tree index, in which one index entry points\
    \ at one row). A 1 indicates the presence of a value, and a 0 indicates that the\
    \ value doesn’t exist. [Table 8-2](#9781430257288_Ch08.xhtml#Tab2) shows the resulting\
    \ structure of the bitmap index.\n\n[Table 8-2.](#9781430257288_Ch08.xhtml#_Tab2)\
    \ Structure of the LOCATIONS_BMX1 Bitmap Index\n\n![Table8-2.jpg](Images/Table8-2.jpg)\n\
    \nFor each value of REGION (EAST, NORTH, WEST), an array of values is stored that\
    \ indicates which rows contain a value for a particular REGION. For instance,\
    \ the EAST location has bit settings in row 2 and row 5 (meaning that the EAST\
    \ location is present for those two rows).\n\nBitmap indexes are effective at\
    \ retrieving rows when multiple AND and OR conditions appear in the WHERE clause.\
    \ For example, to perform the task find all rows with a region of EAST or WEST,\
    \ a Boolean algebra OR operation is performed on the EAST and WEST bitmaps to\
    \ quickly return rows 2, 4, and 5\\. The last row of [Table 8-3](#9781430257288_Ch08.xhtml#Tab3)\
    \ shows the OR operation on the EAST and WEST bitmap.\n\n[Table 8-3.](#9781430257288_Ch08.xhtml#_Tab3)\
    \ Results of an OR Operation\n\n![Table8-3.jpg](Images/Table8-3.jpg)\n\n![image](Images/sq.jpg) **Note**  \
    \ Bitmap indexes and bitmap join indexes are available only with the Oracle Enterprise\
    \ Edition of the database. Also, you can’t create a unique bitmap index.\n\nCreating\
    \ Bitmap Join Indexes\n\nBitmap join indexes store the results of a join between\
    \ two tables in an index. Bitmap join indexes are beneficial because they avoid\
    \ joining tables to retrieve results. The syntax for a bitmap join index differs\
    \ from that of a regular bitmap index in that it contains FROM and WHERE clauses.\
    \ Here is the basic syntax for creating a bitmap join index:\n\n```\ncreate bitmap\
    \ index <index_name>\non <fact_table> (<dimension_table.dimension_column>)\nfrom\
    \ <fact_table>, <dimension_table>\nwhere <fact_table>.<foreign_key_column> = <dimension_table>.<primary_key_column>;\n\
    ```\n\nBitmap join indexes are appropriate in situations in which you’re joining\
    \ two tables, using the foreign key column (or columns) in one table relating\
    \ to the primary key column (or columns) in  the other table. For example, suppose\
    \ you typically retrieve the FIRST_NAME and LAST_NAME from the CUST dimension\
    \ table while joining to a large F_SHIPMENTS fact table. This next example creates\
    \ a bitmap join index between the F_SHIPMENTS and CUST tables:\n\n```\ncreate\
    \ bitmap index f_shipments_bmx1\non f_shipments(cust.first_name, cust.last_name)\n\
    from f_shipments, cust\nwhere f_shipments.cust_id = cust.cust_id;\n```\n\nNow,\
    \ consider a query such as this:\n\n```\nselect c.first_name, c.last_name\nfrom\
    \ f_shipments s, cust c\nwhere s.cust_id = c.cust_id\nand c.first_name = 'JIM'\n\
    and c.last_name = 'STARK';\n```\n\nThe optimizer can choose to use the bitmap\
    \ join index, thus avoiding the expense of having to join the tables. For small\
    \ amounts of data, the optimizer will most likely choose not to use the bitmap\
    \ join index, but as the data in the table grow, using the bitmap join index becomes\
    \ more cost-effective than full-table scans or using other indexes.\n\nImplementing\
    \ Reverse-Key Indexes\n\nReverse-key indexes are similar to B-tree indexes, except\
    \ that the bytes of the index key are reversed when an index entry is created.\
    \ For example, if the index values are 201, 202, and 203, the reverse-key index\
    \ values are 102, 202, and 302:\n\n```\nIndex value              Reverse key value\n\
    -------------            --------------------\n201                      102\n\
    202                      202\n203                      302\n```\n\nReverse-key\
    \ indexes can perform better in scenarios in which you need a way to evenly distribute\
    \ index data that would otherwise have similar values clustered together. Thus,\
    \ when using a reverse-key index, you avoid having I/O concentrated in one physical\
    \ disk location within the index during large inserts of sequential values.\n\n\
    Use the REVERSE clause to create a reverse-key index:\n\n```\nSQL> create index\
    \ cust_idx1 on cust(cust_id) reverse;\n```\n\nYou can verify that an index is\
    \ reverse key by running the following query:\n\n```\nSQL> select index_name,\
    \ index_type from user_indexes;\n```\n\nHere is some sample output, showing that\
    \ the CUST_IDX1 index is reverse key:\n\n```\nINDEX_NAME           INDEX_TYPE\n\
    -------------------- ---------------------------\nCUST_IDX1            NORMAL/REV\n\
    ```\n\n![image](Images/sq.jpg) **Note**   You can’t specify REVERSE for a bitmap\
    \ index or an IOT.\n\nCreating Key-Compressed Indexes\n\nIndex compression is\
    \ useful for indexes that contain multiple columns in which the leading index\
    \ column value is often repeated. Compressed indexes, in these situations, have\
    \ the following advantages:\n\n*   Reduced storage\n*   More rows stored in leaf\
    \ blocks, which can result in less I/O when accessing a compressed index\n\nSuppose\
    \ you have a table defined as follows:\n\n```\ncreate table users(\n last_name  varchar2(30)\n\
    ,first_name varchar2(30)\n,address_id number);\n```\n\nYou want to create a concatenated\
    \ index on the LAST_NAME and FIRST_NAME columns. You know from examining the data\
    \ that there is duplication in the LAST_NAME column. Use the COMPRESS N clause\
    \ to create a compressed index:\n\n```\nSQL> create index users_idx1 on users(last_name,\
    \ first_name) compress 2;\n```\n\nThe prior line of code instructs Oracle to create\
    \ a compressed index on two columns. You can verify that an index is compressed\
    \ as follows:\n\n```\nselect index_name, compression\nfrom user_indexes\nwhere\
    \ index_name like 'USERS%';\n```\n\nHere is some sample output, indicating that\
    \ compression is enabled for the index:\n\n```\nINDEX_NAME                    \
    \ COMPRESS\n------------------------------ --------\nUSERS_IDX1                    \
    \ ENABLED\n```\n\n![image](Images/sq.jpg) **Note**   You can’t create a key-compressed\
    \ index on a bitmap index.\n\nParallelizing Index Creation\n\nIn large database\
    \ environments in which you’re attempting to create an index on a table that is\
    \ populated with many rows, you may be able to greatly increase the index creation\
    \ speed by using the PARALLEL clause:\n\n```\ncreate index cust_idx1 on cust(cust_id)\n\
    parallel 2\ntablespace reporting_index;\n```\n\nIf you don’t specify a degree\
    \ of parallelism, Oracle selects a degree, based on the number of CPUs on the\
    \ box times the value of PARALLEL_THREADS_PER_CPU.\n\nYou can run this query to\
    \ verify the degree of parallelism associated with an index:\n\n```\nSQL> select\
    \ index_name, degree from user_indexes;\n```\n\nAvoiding Redo Generation When\
    \ Creating an Index\n\nYou can optionally create an index with the NOLOGGING clause.\
    \ Doing so has these implications:\n\n*   The redo isn’t generated that would\
    \ be required to recover the index in the event of a media failure.\n*   Subsequent\
    \ direct-path operations also won’t generate the redo required to recover the\
    \ index information in the event of a media failure.\n\nHere is an example of\
    \ creating an index with the NOLOGGING clause:\n\n```\ncreate index cust_idx1\
    \ on cust(cust_id)\nnologging\ntablespace users;\n```\n\nThe main advantage of\
    \ NOLOGGING is that when you create the index, a minimal amount of redo information\
    \ is generated, which can have significant performance implications for a large\
    \ index. The disadvantage is that if you experience a media failure soon after\
    \ the index is created (or have records inserted via a direct-path operation),\
    \ and you restore and recover the database from a backup that was taken prior\
    \ to the index creation, you’ll see this error when the index is accessed:\n\n\
    ```\nORA-01578: ORACLE data block corrupted (file # 4, block # 1044)\nORA-01110:\
    \ data file 4: '/u01/dbfile/O12C/users01.dbf'\nORA-26040: Data block was loaded\
    \ using the NOLOGGING option\n```\n\nThis error indicates that the index is logically\
    \ corrupt. In this scenario, you must recreate the index before it’s usable. In\
    \ most scenarios it’s acceptable to use the NOLOGGING clause when creating an\
    \ index, because the index can be recreated without affecting the table on which\
    \ the index is based.\n\nYou can run this query to view whether an index has been\
    \ created with NOLOGGING:\n\n```\nSQL> select index_name, logging from user_indexes;\n\
    ```\n\nImplementing Invisible Indexes\n\nIn Oracle Database 11g and higher, you\
    \ have the option of making an index invisible to the optimizer. Oracle still\
    \ maintains an invisible index (as DML occurs on the table) but doesn’t make it\
    \ available for use by the optimizer. You can use the OPTIMIZER_USE_INVISIBLE_INDEXES\
    \ database parameter to make an invisible index visible to the optimizer.\n\n\
    Invisible indexes have a couple of interesting uses:\n\n*   Altering an index\
    \ to be invisible before dropping it allows you to quickly recover if you later\
    \ determine that the index is required.\n*   You can add an invisible index to\
    \ a third-party application without affecting existing code or support agreements.\n\
    \nThese two scenarios are discussed in the following sections.\n\nMaking an Existing\
    \ Index Invisible\n\nSuppose you’ve identified an index that isn’t being used\
    \ and are considering dropping it. In earlier releases of Oracle, you could mark\
    \ the index UNUSABLE and then later drop indexes that you were certain weren’t\
    \ being used. If you later determined that you needed an unusable index, the only\
    \ way to reenable the index was to rebuild it. For large indexes this could take\
    \ a great amount of time and database resources.\n\nMaking an index invisible\
    \ has the advantage of telling only the optimizer not to use the index. The invisible\
    \ index is still maintained as the underlying table has records inserted, updated,\
    \ and deleted. If you decide that you later need the index, there is no need to\
    \ rebuild it; you simply make it visible again.\n\nYou can create an index as\
    \ invisible or alter an existing index to be invisible; for example,\n\n```\n\
    SQL> create index cust_idx2 on cust(first_name) invisible;\nSQL> alter index cust_idx1\
    \ invisible;\n```\n\nYou can verify the visibility of an index via this query:\n\
    \n```\nSQL> select index_name, status, visibility from user_indexes;\n```\n\n\
    Here is some sample output:\n\n```\nINDEX_NAME           STATUS   VISIBILITY\n\
    -------------------- -------- ----------\nCUST_IDX1            VALID    INVISIBLE\n\
    CUST_IDX2            VALID    INVISIBLE\nUSERS_IDX1           VALID    VISIBLE\n\
    ```\n\nUse the VISIBLE clause to make an invisible index visible to the optimizer\
    \ again:\n\n```\nSQL> alter index cust_idx1 visible;\n```\n\n![image](Images/sq.jpg) **Caution**  \
    \ If you have a B-tree index on a foreign key column, and you decide to make it\
    \ invisible, Oracle can still use the index to prevent certain locking issues.\
    \ Before you drop an index on a column associated with a foreign key constraint,\
    \ ensure that it’s not used by Oracle to prevent locking issues. See the section\
    \ “Indexing Foreign Key Columns,” later in this chapter, for details.\n\nGuaranteeing\
    \ Application Behavior Is Unchanged When You Add an Index\n\nYou can also use\
    \ an invisible index when you’re working with third-party applications. Often,\
    \ third-party vendors don’t support customers’ adding their own indexes to an\
    \ application. However, there may be a scenario in which you’re certain you can\
    \ increase a query’s performance without affecting other queries in the application.\n\
    \nYou can create the index as invisible and then use the OPTIMIZER_USE_INVISIBLE_INDEXES\
    \ parameter to instruct the optimizer to consider invisible indexes. This parameter\
    \ can be set at the system or session level. Here is an example:\n\n```\nSQL>\
    \ create index cust_idx1 on cust(cust_id) invisible;\n```\n\nNow, set the OPTIMIZER_USE_INVISIBLE_INDEXES\
    \ database parameter to TRUE. This instructs the optimizer to consider invisible\
    \ indexes for the currently connected session:\n\n```\nSQL> alter session set\
    \ optimizer_use_invisible_indexes=true;\n```\n\nYou can verify that the index\
    \ is being used by setting AUTOTRACE to on and running the SELECT statement:\n\
    \n```\nSQL> set autotrace trace explain;\nSQL> select cust_id from cust where\
    \ cust_id = 3;\n```\n\nHere is some sample output, indicating that the optimizer\
    \ chose to use the invisible index:\n\n```\n\n| Id  | Operation        | Name      |\
    \ Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT |          \
    \ |     1 |     5 |     1   (0)| 00:00:01 |\n|*  1 |  INDEX RANGE SCAN| CUST_IDX1\
    \ |     1 |     5 |     1   (0)| 00:00:01 |\n\n```\n\nKeep in mind that *invisible\
    \ index* simply means an index the optimizer can’t see. Just like any other index,\
    \ an invisible index consumes space and resources during DML statements.\n\nMaintaining\
    \ Indexes\n\nAs applications age, you invariably have to perform some maintenance\
    \ activities on existing indexes. You may need to rename an index to conform to\
    \ newly implemented standards, or you may need to rebuild a large index to move\
    \ it to a different tablespace that better suits the index’s storage requirements.\
    \ The following list shows common tasks associated with index maintenance:\n\n\
    *   Renaming an index\n*   Displaying the DDL for an index\n*   Rebuilding an\
    \ index\n*   Setting indexes to unusable\n*   Monitoring an index\n*   Dropping\
    \ an index\n\nEach of these items is discussed in the following sections.\n\n\
    Renaming an Index\n\nSometimes you need to rename an index. The index may have\
    \ been erroneously named when it was created, or perhaps you want a name that\
    \ better conforms to naming standards. Use the ALTER INDEX . . . RENAME TO statement\
    \ to rename an index:\n\n```\nSQL> alter index cust_idx1 rename to cust_index1;\n\
    ```\n\nYou can verify that the index was renamed by querying the data dictionary:\n\
    \n```\nselect\n  table_name\n ,index_name\n ,index_type\n ,tablespace_name\n ,status\n\
    from user_indexes\norder by table_name, index_name;\n```\n\nDisplaying Code to\
    \ Recreate an Index\n\nYou may be performing routine maintenance activities, such\
    \ as moving an index to a different tablespace, and before you do so, you want\
    \ to verify the current storage settings. You can use the DBMS_METADATA package\
    \ to display the DDL required to recreate an index. If you’re using SQL*Plus,\
    \ set the LONG variable to a value large enough to display all the output. Here\
    \ is an example:\n\n```\nSQL> set long 10000\nSQL> select dbms_metadata.get_ddl('INDEX','CUST_IDX1')\
    \ from dual;\n```\n\nHere is a partial listing of the output:\n\n```\nCREATE INDEX\
    \ \"MV_MAINT\".\"CUST_IDX1\" ON \"MV_MAINT\".\"CUST\" (\"CUST_ID\")\n  PCTFREE\
    \ 10 INITRANS 2 MAXTRANS 255 INVISIBLE COMPUTE STATISTICS\n```\n\nTo show all\
    \ index DDL for a user, run this query:\n\n```\nSQL> select dbms_metadata.get_ddl('INDEX',index_name)\
    \ from user_indexes;\n```\n\nYou can also display the DDL for a particular user.\
    \ You must provide as input to the GET_DDL function the object type, object name,\
    \ and schema; example,\n\n```\nselect\ndbms_metadata.get_ddl(object_type=>'INDEX',\
    \ name=>'CUST_IDX1', schema=>'INV')\nfrom dual;\n```\n\nRebuilding an Index\n\n\
    There are a couple of good reasons to rebuild an index:\n\n*   Modifying storage\
    \ characteristics, such as changing the tablespace.\n*   Rebuilding an index that\
    \ was previously marked unusable to make it usable again.\n\nUse the REBUILD clause\
    \ to rebuild an index. This example rebuilds an index named CUST_IDX1:\n\n```\n\
    SQL> alter index cust_idx1 rebuild;\n```\n\nOracle attempts to acquire a lock\
    \ on the table and rebuild the index online. If there are any active transactions\
    \ that haven’t committed, Oracle won’t be able to obtain a lock, and the following\
    \ error will be thrown:\n\n```\nORA-00054: resource busy and acquire with NOWAIT\
    \ specified or timeout expired\n```\n\nIn this scenario, you can either wait until\
    \ there is little activity in the database or try setting the DDL_LOCK_TIMEOUT\
    \ parameter:\n\n```\nSQL> alter session set ddl_lock_timeout=15;\n```\n\nThe DDL_LOCK_TIMEOUT\
    \ initialization parameter is available in Oracle Database 11g and higher. It\
    \ instructs Oracle to repeatedly attempt to obtain a lock (for 15 seconds, in\
    \ this case).\n\nIf no tablespace is specified, Oracle rebuilds the index in the\
    \ tablespace in which the index currently exists. Specify a tablespace if you\
    \ want the index rebuilt in a different tablespace:\n\n```\nSQL> alter index cust_idx1\
    \ rebuild tablespace reporting_index;\n```\n\nIf you’re working with a large index,\
    \ you may want to consider using features such as NOLOGGING or PARALLEL, or both.\
    \ This next example rebuilds an index in parallel, while generating a minimal\
    \ amount of redo:\n\n```\nSQL> alter index cust_idx1 rebuild parallel nologging;\n\
    ```\n\n![image](Images/sq.jpg) **Note**   See the sections “Avoiding Redo Generation\
    \ When Creating an Index” and “Parallelizing Index Creation,” earlier in this\
    \ chapter, for details on using these features with indexes.\n\nREBUILDING FOR\
    \ PERFORMANCE REASONS\n\nIn the olden days (version 7 or so), in the name of performance,\
    \ DBAs religiously rebuilt indexes on a regular basis. Every DBA and his (or her)\
    \ dog had a script similar to the one listed next, which uses SQL to generate\
    \ the SQL required to rebuild indexes for a schema:\n\n```\nSPO ind_build_dyn.sql\n\
    SET HEAD OFF PAGESIZE 0 FEEDBACK OFF;\nSELECT 'ALTER INDEX ' || index_name ||\
    \ ' REBUILD;'\nFROM user_indexes;\nSPO OFF;\nSET FEEDBACK ON;\n```\n\nHowever,\
    \ it’s debatable whether rebuilding an index with the newer versions of Oracle\
    \ achieves any performance gain. Usually, the only valid reason for rebuilding\
    \ an index is that the index has become corrupt or unusable or that you want to\
    \ modify storage characteristics (such as the tablespace).\n\nMaking Indexes Unusable\n\
    \nIf you’ve identified an index that is no longer being used, you can mark it\
    \ UNUSABLE. From that point forward, Oracle won’t maintain the index, nor will\
    \ the optimizer consider the index for use in SELECT statements. The advantage\
    \ of marking the index UNUSABLE (rather than dropping it) is that if you later\
    \ determine that the index is being used, you can alter it to a USABLE state and\
    \ rebuild it without needing the DDL on hand to recreate it.\n\nHere is an example\
    \ of marking an index UNUSABLE:\n\n```\nSQL> alter index cust_idx1 unusable;\n\
    ```\n\nYou can verify that it’s unusable via this query:\n\n```\nSQL> select index_name,\
    \ status from user_indexes;\n```\n\nThe index has an UNUSABLE status:\n\n```\n\
    INDEX_NAME           STATUS\n-------------------- --------\nCUST_IDX1            UNUSABLE\n\
    ```\n\nIf you determine that the index is needed (before you drop it), then it\
    \ must be rebuilt to become usable again:\n\n```\nSQL> alter index cust_idx1 rebuild;\n\
    ```\n\nAnother common scenario for marking indexes UNUSABLE is that you’re performing\
    \ a large data load. When you want to maximize table-loading performance, you\
    \ can mark the indexes UNUSABLE before performing the load. After you’ve loaded\
    \ the table, you must rebuild the indexes to make them usable again.\n\n![image](Images/sq.jpg) **Note**  \
    \ The alternative to setting an index to UNUSABLE is to drop and recreate it.\
    \ This approach requires the CREATE INDEX DDL.\n\nMonitoring Index Usage\n\nYou\
    \ may have inherited a database, and as part of getting to know the database and\
    \ application, you want to determine which indexes are being used (or not). The\
    \ idea is that you can identify indexes that aren’t being used and drop them,\
    \ thus eliminating the extra overhead and storage required.\n\nUse the ALTER INDEX\
    \ . . . MONITORING USAGE statement to enable basic index monitoring. The following\
    \ example enables monitoring an index:\n\n```\nSQL> alter index cust_idx1 monitoring\
    \ usage;\n```\n\nThe first time the index is accessed, Oracle records this; you\
    \ can view whether an index has been accessed via the DBA_OBJECT_USAGE view. To\
    \ report which indexes are being monitored and have been used, run this query:\n\
    \n```\nSQL> select * from dba_object_usage;\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ Prior to Oracle Database 12c, index usage was recorded in the V$OBJECT_USAGE\
    \ view.\n\nMost likely, you won’t monitor only one index. Rather, you’ll want\
    \ to monitor all indexes for a user. In this situation, use SQL to generate SQL\
    \ to create a script you that can run to turn on monitoring for all indexes. Here\
    \ is such a script:\n\n```\nselect\n  'alter index ' || index_name || ' monitoring\
    \ usage;'\nfrom user_indexes;\n```\n\nThe DBA_OBJECT_USAGE view only shows information\
    \ for the currently connected user. If you inspect the TEXT column of DBA_VIEWS,\
    \ note the following line:\n\n```\nwhere io.owner# = userenv('SCHEMAID')\n```\n\
    \nIf you’re logged in as a DBA-privileged user and want to view the status of\
    \ all indexes that have monitoring enabled (regardless of the user), execute this\
    \ query:\n\n```\nselect io.name, t.name,\n       decode(bitand(i.flags, 65536),\
    \ 0, 'NO', 'YES'),\n       decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n      \
    \ ou.start_monitoring,\n       ou.end_monitoring\nfrom sys.obj$ io, sys.obj$ t,\
    \ sys.ind$ i, sys.object_usage ou\n  where i.obj# = ou.obj#\n  and io.obj# = ou.obj#\n\
      and t.obj# = i.bo#;\n```\n\nThe prior query removes the line from the query\
    \ that restricts the currently logged-in user. This provides you with a convenient\
    \ way to view all monitored indexes.\n\n![image](Images/sq.jpg) **Caution**  \
    \ Keep in mind that Oracle can use an index defined on a foreign key column to\
    \ prevent certain locking issues (see the sections “Determining if Foreign Key\
    \ Columns Are Indexed” and “Implementing an Index on a Foreign Key Column,” later\
    \ in this chapter, for further discussion). Oracle’s internal use of the index\
    \ is not recorded in DBA_OBJECT_USAGE or V$OBJECT_USAGE. Be very careful before\
    \ dropping an index defined on a foreign key column.\n\nDropping an Index\n\n\
    If you’ve determined that an index isn’t being used, then it’s a good idea to\
    \ drop it. Unused indexes take up space and can potentially slow down DML statements\
    \ (because the index must be maintained as part of those DML operations). Use\
    \ the DROP INDEX statement to drop an index:\n\n```\nSQL> drop index cust_idx1;\n\
    ```\n\nDropping an index is a permanent DDL operation; there is no way to undo\
    \ an index drop other than to rebuild the index. Before you drop an index, it\
    \ doesn’t hurt to quickly capture the DDL required to rebuild the index. Doing\
    \ so will allow you to recreate the index in the event you subsequently discover\
    \ that you did need it after all.\n\nIndexing Foreign Key Columns\n\nForeign key\
    \ constraints ensure that when inserting into a child table, a corresponding parent\
    \ table record exists. This is the mechanism for guaranteeing that data conform\
    \ to parent–child business relationship rules. Foreign keys are also known as\
    \ referential integrity constraints.\n\nUnlike primary key and unique key constraints,\
    \ Oracle doesn’t automatically create indexes on foreign key columns. Therefore,\
    \ you must create a foreign key index manually, based on the columns defined as\
    \ the foreign key constraint. In most scenarios, you should create indexes on\
    \ columns associated with a foreign key. Here are two good reasons:\n\n*   Oracle\
    \ can often make use of an index on foreign key columns to improve the performance\
    \ of queries that join a parent table and child table (using the foreign key columns).\n\
    *   If no B-tree index exists on the foreign key columns, when you insert or delete\
    \ a record from a child table, all rows in the parent table are locked. For applications\
    \ that actively modify both the parent and child tables, this will cause locking\
    \ and deadlock issues (see the section “Determining if Foreign Key Columns Are\
    \ Indexed,” later in this chapter, for an example of this locking issue).\n\n\
    One could argue that if you know your application well enough and can predict\
    \ that queries won’t be issued that join tables on foreign key columns and that\
    \ certain update/delete scenarios will never be encountered (that result in entire\
    \ tables’ being locked), then, by all means, don’t place an index on foreign key\
    \ columns. In my experience, however, this is seldom the case: developers rarely\
    \ think about how the “black box database” might lock tables; some DBAs are equally\
    \ unaware of common causes of locking; teams experience high turnover rates, and\
    \ the DBA de jour is left holding the bag for issues of poor database performance\
    \ and hung sessions. Considering the time and resources spent chasing down locking\
    \ and performance issues, it doesn’t cost that much to put an index on each foreign\
    \ key column in your application. I know some purists will argue against this,\
    \ but I tend to avoid pain, and an unindexed foreign key column is a ticking bomb.\n\
    \nHaving made my recommendation, I’ll first cover creating a B-tree index on a\
    \ foreign key column. Then, I’ll show you some techniques for detecting unindexed\
    \ foreign key columns.\n\nImplementing an Index on a Foreign Key Column\n\nSay\
    \ you have a requirement that every record in the ADDRESS table be assigned a\
    \ corresponding CUST_ID column from the CUST table. To enforce this relationship,\
    \ you create the ADDRESS table and a foreign key constraint, as follows:\n\n```\n\
    create table address(address_id number\n,cust_address varchar2(2000)\n,cust_id\
    \ number);\n--\nalter table address add constraint addr_fk1\nforeign key (cust_id)\
    \ references cust(cust_id);\n```\n\n![image](Images/sq.jpg) **Note**   A foreign\
    \ key column must reference a column in the parent table that has a primary key\
    \ or unique key constraint defined on it. Otherwise, you’ll receive the error\
    \ ORA-02270: no matching unique or primary key for this column-list.\n\nYou realize\
    \ that the foreign key column is used extensively when joining the CUST and ADDRESS\
    \ tables and that an index on the foreign key column will increase performance.\
    \ In this situation, you have to create an index manually. For instance, a regular\
    \ B-tree index is created on the foreign key column of CUST_ID in the ADDRESS\
    \ table.\n\n```\ncreate index addr_fk1\non address(cust_id);\n```\n\nYou don’t\
    \ have to name the index the same name as the foreign key (as I did in these lines\
    \ of code). It’s a personal preference as to whether you do that. I feel it’s\
    \ easier to maintain environments when the constraint and corresponding index\
    \ have the same name.\n\nWhen creating an index, if you don’t specify the tablespace\
    \ name, Oracle places the index in the user’s default tablespace. It’s usually\
    \ a good idea to explicitly specify which tablespace the index should be placed\
    \ in; for example,\n\n```\ncreate index addr_fk1\non address(cust_id)\ntablespace\
    \ reporting_index;\n```\n\n![image](Images/sq.jpg) **Note**   An index on foreign\
    \ key columns doesn’t have to be of the type B-tree. In data warehouse environments\
    \ it’s common to use bitmap indexes on foreign key columns in star schema fact\
    \ tables. Unlike B-tree indexes, bitmap indexes on foreign key columns don’t resolve\
    \ parent–child table-locking issues. Applications that use star schemas typically\
    \ are not deleting or modifying the child record from fact tables; therefore,\
    \ locking is less of an issue, in this situation, regardless of the use bitmap\
    \ indexes on foreign key columns.\n\nDetermining if Foreign Key Columns Are Indexed\n\
    \nIf you’re creating an application from scratch, it’s fairly easy to create the\
    \ code and ensure that each foreign key constraint has a corresponding index.\
    \ However, if you’ve inherited a database, it’s prudent to check if the foreign\
    \ key columns are indexed.\n\nYou can use data dictionary views to verify if all\
    \ columns of a foreign key constraint have a corresponding index. The task isn’t\
    \ as simple as it might first seem. For example, here is a query that gets you\
    \ started in the right direction:\n\n```\nSELECT DISTINCT\n  a.owner                                \
    \ owner\n ,a.constraint_name                       cons_name\n ,a.table_name                            tab_name\n\
     ,b.column_name                           cons_column\n ,NVL(c.column_name,'***Check\
    \ index****') ind_column\nFROM dba_constraints  a\n    ,dba_cons_columns b\n    ,dba_ind_columns  c\n\
    WHERE constraint_type = 'R'\nAND a.owner           = UPPER('&&user_name')\nAND\
    \ a.owner           = b.owner\nAND a.constraint_name = b.constraint_name\nAND\
    \ b.column_name     = c.column_name(+)\nAND b.table_name      = c.table_name(+)\n\
    AND b.position        = c.column_position(+)\nORDER BY tab_name, ind_column;\n\
    ```\n\nThis query, while simple and easy to understand, doesn’t correctly report\
    \ on unindexed foreign keys for all situations. For example, in the case of multicolumn\
    \ foreign keys, it doesn’t matter if the constraint is defined in an order different\
    \ from that of the index columns, as long as the columns defined in the constraint\
    \ are in the leading edge of the index. In other words, if the constraint is defined\
    \ as COL1 and then COL2, then it’s okay to have a B-tree index defined on leading-edge\
    \ COL2 and then COL1.\n\nAnother issue is that a B-tree index protects you from\
    \ locking issues, but a bitmap index does not. In this situation, the query should\
    \ also check the index type.\n\nIn these scenarios, you’ll need a more sophisticated\
    \ query to detect indexing issues related to foreign key columns. The following\
    \ example is a more complex query that uses the LISTAGG analytical function to\
    \ compare columns (returned as a string in one row) in a foreign key constraint\
    \ with corresponding indexed columns:\n\n```\nSELECT\n CASE WHEN ind.index_name\
    \ IS NOT NULL THEN\n   CASE WHEN ind.index_type IN ('BITMAP') THEN\n     '** Bitmp\
    \ idx **'\n   ELSE\n     'indexed'\n   END\n ELSE\n   '** Check idx **'\n END\
    \ checker\n,ind.index_type\n,cons.owner, cons.table_name, ind.index_name, cons.constraint_name,\
    \ cons.cols\nFROM (SELECT\n        c.owner, c.table_name, c.constraint_name\n\
           ,LISTAGG(cc.column_name, ',' ) WITHIN GROUP (ORDER BY cc.column_name) cols\n\
          FROM dba_constraints  c\n          ,dba_cons_columns cc\n      WHERE c.owner          \
    \ = cc.owner\n      AND   c.owner = UPPER('&&schema')\n      AND   c.constraint_name\
    \ = cc.constraint_name\n      AND   c.constraint_type = 'R'\n      GROUP BY c.owner,\
    \ c.table_name, c.constraint_name) cons\nLEFT OUTER JOIN\n(SELECT\n  table_owner,\
    \ table_name, index_name, index_type, cbr\n ,LISTAGG(column_name, ',' ) WITHIN\
    \ GROUP (ORDER BY column_name) cols\n FROM (SELECT\n        ic.table_owner, ic.table_name,\
    \ ic.index_name\n       ,ic.column_name, ic.column_position, i.index_type\n      \
    \ ,CONNECT_BY_ROOT(ic.column_name) cbr\n       FROM dba_ind_columns ic\n          \
    \ ,dba_indexes     i\n       WHERE ic.table_owner = UPPER('&&schema')\n      \
    \ AND   ic.table_owner = i.table_owner\n       AND   ic.table_name  = i.table_name\n\
           AND   ic.index_name  = i.index_name\n       CONNECT BY PRIOR ic.column_position-1\
    \ = ic.column_position\n       AND PRIOR ic.index_name = ic.index_name)\n  GROUP\
    \ BY table_owner, table_name, index_name, index_type, cbr) ind\nON  cons.cols      \
    \ = ind.cols\nAND cons.table_name = ind.table_name\nAND cons.owner      = ind.table_owner\n\
    ORDER BY checker, cons.owner, cons.table_name;\n```\n\nThis query will prompt\
    \ you for a schema name and then will display foreign key constraints that don’t\
    \ have corresponding indexes. This query also checks for the index type; as previously\
    \ stated, bitmap indexes may exist on foreign key columns but don’t prevent locking\
    \ issues.\n\nTABLE LOCKS AND FOREIGN KEYS\n\nHere is a simple example that demonstrates\
    \ the locking issue when foreign key columns are not indexed. First, create two\
    \ tables (DEPT and EMP), and associate them with a foreign key constraint:\n\n\
    ```\ncreate table emp(emp_id number primary key, dept_id number);\ncreate table\
    \ dept(dept_id number primary key);\nalter table emp add constraint emp_fk1 foreign\
    \ key (dept_id) references dept(dept_id);\n```\n\nNext, insert some data:\n\n\
    ```\ninsert into dept values(10);\ninsert into dept values(20);\ninsert into dept\
    \ values(30);\ninsert into emp values(1,10);\ninsert into emp values(2,20);\n\
    insert into emp values(3,10);\ncommit;\n```\n\nOpen two terminal sessions. From\
    \ one, delete one record from the child table (don't commit):\n\n```\ndelete from\
    \ emp where dept_id = 10;\n```\n\nThen, attempt to delete from the parent table\
    \ some data not affected by the child table delete:\n\n```\ndelete from dept where\
    \ dept_id = 30;\n```\n\nThe delete from the parent table hangs until the child\
    \ table transaction is committed. Without a regular B-tree index on the foreign\
    \ key column in the child table, any time you attempt to insert or delete in the\
    \ child table, a table-wide lock is placed on the parent table; this prevents\
    \ deletes or updates in the parent table until the child table transaction completes.\n\
    \nNow, run the prior experiment, except this time, additionally create an index\
    \ on the foreign key column of the child table:\n\n```\ncreate index emp_fk1 on\
    \ emp(dept_id);\n```\n\nYou should be able to run the prior two delete statements\
    \ independently. When you have a B-tree index on the foreign key columns, if deleting\
    \ from the child table, Oracle will not excessively lock all rows in the parent\
    \ table.\n\nSummary\n\nIndexes are critical objects separate from tables; they\
    \ vastly increase the performance of a database application. Your index architecture\
    \ should be well planned, implemented, and maintained. Carefully choose which\
    \ tables and columns are indexed. Although they dramatically increase the speed\
    \ of queries, indexes can slow down DML statements, because the index has to be\
    \ maintained as the table data changes. Indexes also consume disk space. Thus,\
    \ indexes should be created only when required.\n\nOracle’s B-tree index is the\
    \ default index type and is sufficient for most applications. However, you should\
    \ be aware of other index types and their uses. Specific features, such as bitmap\
    \ and function-based indexes, should be implemented where applicable. This chapter\
    \ has discussed various aspects of implementing and maintaining indexes. [Table\
    \ 8-4](#9781430257288_Ch08.xhtml#Tab4) summarizes the guidelines and techniques\
    \ covered in this chapter.\n\n[Table 8-4.](#9781430257288_Ch08.xhtml#_Tab4) Summary\
    \ of Guidelines for Creating Indexes\n\n| Guideline | Reasoning |\n| --- | ---\
    \ |\n| Create as many indexes as you need, but try to keep the number to a minimum.\
    \ Add indexes judiciously. Test first to determine quantifiable performance gains.\
    \ | Indexes increase performance, but also consume disk space and processing resources.\
    \ Don’t add indexes unnecessarily. |\n| The required performance of queries you\
    \ execute against a table should form the basis of your indexing strategy. | Indexing\
    \ columns used in SQL queries will help performance the most. |\n| Consider using\
    \ the SQL Tuning Advisor or the SQL Access Advisor for indexing recommendations.\
    \ | These tools provide recommendations and a second set of “eyes” on your indexing\
    \ decisions. |\n| Create primary key constraints for all tables. | This will automatically\
    \ create a B-tree index (if the columns in the primary key aren’t already indexed).\
    \ |\n| Create unique key constraints where appropriate. | This will automatically\
    \ create a B-tree index (if the columns in the unique key aren’t already indexed).\
    \ |\n| Create indexes on foreign key columns. | Foreign key columns are usually\
    \ included in the WHERE clause when joining tables and thus improve performance\
    \ of SQL SELECT statements. Creating a B-tree index on foreign key columns also\
    \ reduces locking issues when updating and inserting into child tables. |\n| Carefully\
    \ select and test indexes on small tables (small being fewer than a few thousand\
    \ rows). | Even on small tables, indexes can sometimes perform better than full-table\
    \ scans. |\n| Use the correct type of index. | Correct index usage maximizes performance.\
    \ See [Table 8-1](#9781430257288_Ch08.xhtml#Tab1) for more details. |\n| Use the\
    \ basic B-tree index type if you don’t have a verifiable performance gain from\
    \ using a different index type. | B-tree indexes are suitable for most applications\
    \ in which you have high-cardinality column values. |\n| Consider using bitmap\
    \ indexes in data warehouse environments. | These indexes are ideal for low-cardinality\
    \ columns in which the values aren’t updated often. Bitmap indexes work well on\
    \ foreign key columns on star schema fact tables in which you often run queries\
    \ that use AND and OR join conditions. |\n| Consider using a separate tablespace\
    \ for indexes (i.e., separate from tables). | Table and index data may have different\
    \ storage or backup and recovery requirements, or both. Using separate tablespaces\
    \ lets you manage indexes separately from tables. |\n| Let the index inherit its\
    \ storage properties from the tablespace. | This makes it easier to manage and\
    \ maintain index storage. |\n| Use consistent naming standards. | This makes maintenance\
    \ and troubleshooting easier. |\n| Don’t rebuild indexes unless you have a solid\
    \ reason to do so. | Rebuilding indexes is generally unnecessary unless an index\
    \ is corrupt or unusable or you want to move an index to different tablespace.\
    \ |\n| Monitor your indexes, and drop those that aren’t used. | Doing this frees\
    \ up physical space and improves the performance of DML statements. |\n| Before\
    \ dropping an index, consider marking it unusable or invisible. | This allows\
    \ you to better determine if there are any performance issues before you drop\
    \ the index. These options let you rebuild or reenable the index without requiring\
    \ the DDL creation statement. |\n\nRefer to these guidelines as you create and\
    \ manage indexes in your databases. These recommendations are intended to help\
    \ you correctly use index technology.\n\nAfter you build a database and users\
    \ and configure the database with tables and indexes, the next step is to create\
    \ additional objects needed by the application and users. Besides tables and indexes,\
    \ typical objects include views, synonyms, and sequences. Building these database\
    \ objects is detailed in the next chapter.\n\nCHAPTER 9\n\n![image](Images/frontdot.jpg)\n\
    \nViews, Synonyms, and Sequences\n\nThis chapter focuses on views, synonyms, and\
    \ sequences. Views are used extensively in reporting applications and also to\
    \ present subsets of data to users. Synonyms provide a method of transparently\
    \ allowing users to display and use other users’ objects. Sequences are often\
    \ utilized to generate unique integers that are used to populate primary key and\
    \ foreign key values.\n\n![image](Images/sq.jpg) **Note**   Although views, synonyms,\
    \ and sequences may not seem as important as tables and indexes, the truth of\
    \ the matter is that they’re almost equally important to understand. An application\
    \ with any level of sophistication will encompass what’s discussed in this chapter.\n\
    \nImplementing Views\n\nIn one sense, you can think of a view as an SQL statement\
    \ stored in the database. Conceptually, when you select from a view, Oracle looks\
    \ up the view definition in the data dictionary, executes the query the view is\
    \ based on, and returns the results.\n\nIn addition to selecting from a view,\
    \ in some scenarios it’s possible to execute INSERT, UPDATE, and DELETE statements\
    \ against the view, which results in modifications to the underlying table data.\
    \ So, in this sense, instead of simply describing a view as a stored SQL statement,\
    \ it’s more accurate to conceptualize a view as a logical table built on other\
    \ tables or views, or both.\n\nHaving said that, listed next are the common uses\
    \ for views:\n\n*   Create an efficient method of storing an SQL query for reuse.\n\
    *   Provide an interface layer between an application and physical tables.\n*\
    \   Hide the complexity of an SQL query from an application.\n*   Report to a\
    \ user only a subset of columns or rows, or both.\n\nWith all this in mind, the\
    \ next step is to create a view and observe some of its characteristics.\n\nCreating\
    \ a View\n\nYou can create views on tables, materialized views, or other views.\
    \ To create a view, your user account must have the CREATE VIEW system privilege.\
    \ If you want to create a view in another user’s schema, then you must have the\
    \ CREATE ANY VIEW privilege.\n\nFor reference, the view creation example in this\
    \ section depends on the following base table:\n\n```\ncreate table sales(\n sales_id\
    \ number primary key\n,amnt    number\n,state   varchar2(2)\n,sales_person_id\
    \ number);\n```\n\nAlso assume that the table has the following data initially\
    \ inserted into it:\n\n```\ninsert into sales values(1, 222, 'CO', 8773);\ninsert\
    \ into sales values(20, 827, 'FL', 9222);\n```\n\nThen, the CREATE VIEW statement\
    \ is used to create a view. The following code creates a view (or replaces it\
    \ if the view already exists) that selects a subset of columns and rows from the\
    \ SALES table:\n\n```\ncreate or replace view sales_rockies as\nselect sales_id,\
    \ amnt, state\nfrom sales\nwhere state in ('CO','UT','WY','ID','AZ');\n```\n\n\
    ![image](Images/sq.jpg) **Note**   If you don’t want to accidentally replace an\
    \ existing view definition, then use CREATE VIEW, and not CREATE OR REPLACE VIEW.\
    \ The CREATE VIEW statement will throw an ORA-00955 error if the view already\
    \ exists, whereas the CREATE OR REPLACE VIEW overwrites the existing definition.\n\
    \nNow, when you select from SALES_ROCKIES, it executes the view query and returns\
    \ data from the SALES table as appropriate:\n\n```\nSQL> select * from sales_rockies;\n\
    ```\n\nGiven the view query, it’s intuitive that the output show only the following\
    \ columns and one row:\n\n```\n  SALES_ID       AMNT ST\n---------- ----------\
    \ --\n         1        222 CO\n```\n\nWhat isn’t as apparent is that you can\
    \ also issue UPDATE, INSERT, and DELETE statements against a view, which results\
    \ in modification of the underlying table data. For example, the following insert\
    \ statement against the view results in the insertion of a record in the SALES\
    \ table:\n\n```\ninsert into sales_rockies(\n sales_id, amnt, state)\nvalues\n\
    (2,100,'CO');\n```\n\nAdditionally, as the owner of the table and view (or as\
    \ a DBA), you can grant DML privileges to other users on the view. For instance,\
    \ you can grant SELECT, INSERT, UPDATE, and DELETE privileges on the view to another\
    \ user, which will allow the user to select and modify data referencing the view.\
    \ However, having privileges on the view does not give the user direct SQL access\
    \ to the underlying table(s).\n\nThus, any users granted privileges on the view\
    \ will be able to manipulate data through the view but not issue SQL against the\
    \ objects the view is based on.\n\nNote that you can insert a value into the view\
    \ that results in a row in the underlying table that isn’t selectable by the view:\n\
    \n```\ninsert into sales_rockies(\n sales_id, amnt, state)\nvalues (3,123,'CA');\n\
    \nSQL> select * from sales_rockies;\n\n  SALES_ID       AMNT ST\n---------- ----------\
    \ --\n         1        222 CO\n         2        100 CO\n```\n\nIn contrast,\
    \ the query on the underlying table shows that rows exist that aren’t returned\
    \ by the view:\n\n```\nSQL> select * from sales;\n\n  SALES_ID       AMNT ST SALES_PERSON_ID\n\
    ---------- ---------- -- ---------------\n         1        222 CO            8773\n\
            20        827 FL            9222\n         2        100 CO\n         3        123\
    \ CA\n```\n\nIf you want the view to only allow insert and update statements that\
    \ result in data modifications that are selectable by the view statement, then\
    \ use the WITH CHECK OPTION (see the next section, “Checking Updates”).\n\nChecking\
    \ Updates\n\nYou can specify that a view should allow modifications to the underlying\
    \ table data only if those data are selectable by the view. This behavior is enabled\
    \ with the WITH CHECK OPTION:\n\n```\ncreate or replace view sales_rockies as\n\
    select sales_id, amnt, state\nfrom sales\nwhere state in ('CO','UT','WY','ID','AZ')\n\
    with check option;\n```\n\nUsing the WITH CHECK OPTION means that you can only\
    \ insert or update rows that would be returned by the view query. For example,\
    \ this UPDATE statement works because the statement isn’t changing the underlying\
    \ data in a way would result in the row’s not being returned by the view query:\n\
    \n```\nSQL> update sales_rockies set state='ID' where sales_id=1;\n```\n\nHowever,\
    \ this next update statement fails because it attempts to update the STATE column\
    \ to a value that isn’t selectable by the query on which the view is based:\n\n\
    ```\nSQL> update sales_rockies set state='CA' where sales_id=1;\n```\n\nIn this\
    \ example, the following error is thrown:\n\n```\nORA-01402: view WITH CHECK OPTION\
    \ where-clause violation\n```\n\nI’ve rarely seen the WITH CHECK OPTION used.\
    \ Having said that, if your business requirements mandate that updatable views\
    \ only have the ability to update data selectable by the view query, then, by\
    \ all means, use this feature.\n\nCreating Read-Only Views\n\nIf you don’t want\
    \ a user to be able to perform INSERT, UPDATE, or DELETE operations on a view,\
    \ then don’t grant those object privileges on the view to that user. Furthermore,\
    \ you should also create a view with the WITH READ ONLY clause for any views for\
    \ which you don’t want the underlying tables to be modified. The default behavior\
    \ is that a view is updatable (assuming the object privileges exist).\n\nThis\
    \ example creates a view with the WITH READ ONLY clause:\n\n```\ncreate or replace\
    \ view sales_rockies as\nselect sales_id, amnt, state\nfrom sales\nwhere state\
    \ in ('CO','UT','WY','ID','AZ')\nwith read only;\n```\n\nEven if a user (including\
    \ the owner) has privileges to delete, insert, or update the underlying table,\
    \ if such an operation is attempted, the following error is thrown:\n\n```\nORA-42399:\
    \ cannot perform a DML operation on a read-only view\n```\n\nIf you use views\
    \ for reporting, and never intend for the views to be used as a mechanism for\
    \ modifying the underlying table’s data, then you should always create the views\
    \ with the WITH READ ONLY clause. Doing so prevents accidental modifications to\
    \ the underlying tables through a view that was never intended to be used to modify\
    \ data.\n\nUpdatable Join Views\n\nIf you have multiple tables defined in the\
    \ FROM clause of the SQL query on which the view is based, it’s still possible\
    \ to update the underlying tables. This is known as an updatable join view.\n\n\
    For reference purposes, here are the CREATE TABLE statements for the two tables\
    \ used in the examples in this section:\n\n```\ncreate table emp(\n emp_id number\
    \ primary key\n,emp_name varchar2(15)\n,dept_id number);\n--\ncreate table dept(\n\
     dept_id number primary key\n,dept_name varchar2(15),\n constraint emp_dept_fk\n\
     foreign key(dept_id) references dept(dept_id));\n```\n\nAnd, here are some seed\
    \ data for the two tables:\n\n```\ninsert into dept values(1,'HR');\ninsert into\
    \ dept values(2,'IT');\ninsert into dept values(3,'SALES');\ninsert into emp values(10,'John',2);\n\
    insert into emp values(20,'Bob',1);\ninsert into emp values(30,'Craig',2);\ninsert\
    \ into emp values(40,'Joe',3);\ninsert into emp values(50,'Jane',1);\ninsert into\
    \ emp values(60,'Mark',2);\n```\n\nHere is an example of an updatable join view,\
    \ based on the two prior base tables:\n\n```\ncreate or replace view emp_dept_v\n\
    as\nselect a.emp_id, a.emp_name, b.dept_name, b.dept_id\nfrom emp a, dept b\n\
    where a.dept_id = b.dept_id;\n```\n\nThere are some restrictions regarding the\
    \ columns on which DML operations are permitted. For instance, columns in the\
    \ underlying tables can be updated only if the following conditions are true:\n\
    \n*   The DML statement must modify only one underlying table.\n*   The view must\
    \ be created without the READ ONLY clause.\n*   The column being updated belongs\
    \ to the key-preserved table in the join view (there is only one key-preserved\
    \ table in a join view).\n\nAn underlying table in a view is key preserved if\
    \ the table’s primary key can also be used to uniquely identify rows returned\
    \ by the view. An example with data will help illustrate whether an underlying\
    \ table is key preserved. In this scenario the primary key of the EMP table is\
    \ the EMP_ID column; the primary key of the DEPT table is the DEPT_ID column.\
    \ Here are some sample data returned by querying the view listed previously in\
    \ this section:\n\n```\n    EMP_ID EMP_NAME        DEPT_NAME          DEPT_ID\n\
    ---------- --------------- --------------- ----------\n        10 John            IT                      \
    \ 2\n        20 Bob             HR                       1\n        30 Craig          \
    \ IT                       2\n        40 Joe             SALES                    3\n\
            50 Jane            HR                       1\n        60 Mark            IT                      \
    \ 2\n```\n\nAs you can see from the output of the view, the EMP_ID column is always\
    \ unique. Therefore, the EMP table is key preserved (and its columns can be updated).\
    \ In contrast, the view’s output shows that it’s possible for the DEPT_ID column\
    \ to be not unique. Therefore, the DEPT table isn’t key preserved (and its columns\
    \ can’t be updated).\n\nWhen you update the view, any modifications that result\
    \ in columns that map to the underlying EMP table should be allowed because the\
    \ EMP table is key preserved in this view. For example, this UPDATE statement\
    \ is successful:\n\n```\nSQL> update emp_dept_v set emp_name = 'Jon' where emp_name\
    \ = 'John';\n```\n\nHowever, statements that result in updating the DEPT table’s\
    \ columns aren’t allowed. The next statement attempts to update a column in the\
    \ view that maps to the DEPT table:\n\n```\nSQL> update emp_dept_v set dept_name\
    \ = 'HR West' where dept_name = 'HR';\n```\n\nHere is the resulting error message\
    \ that’s thrown:\n\n```\nORA-01779: cannot modify a column which maps to a non\
    \ key-preserved table\n```\n\nTo summarize, an updatable join view can select\
    \ from many tables, but only one of the tables in the join view is key preserved.\
    \ The primary key and foreign key relationships of the tables in the query determine\
    \ which table is key preserved.\n\nCreating an INSTEAD OF Trigger\n\nFor views\
    \ that aren’t read-only, when you issue a DML statement against a view, Oracle\
    \ attempts to modify the data in the table that the view is based on. It’s also\
    \ possible to instruct Oracle to ignore the DML statement and instead execute\
    \ a block of PL/SQL. This feature is known as an INSTEAD OF trigger. It allows\
    \ you to modify the underlying base tables in ways that you can’t with regular\
    \ join views.\n\nI’m not a huge fan of INSTEAD OF triggers. In my opinion, if\
    \ you’re considering using them, you should rethink how you’re issuing DML statements\
    \ to modify base tables. Maybe you should allow the application to issue INSERT,\
    \ UPDATE, and DELETE statements directly against the base tables instead of trying\
    \ to build PL/SQL INSTEAD OF triggers on a view.\n\nThink about how you’ll maintain\
    \ and troubleshoot issues with INSTEAD OF triggers. Will it be difficult for the\
    \ next DBA to figure out how the base tables are being modified? Will it be easy\
    \ for the next DBA or developer to make modifications to the INSTEAD OF triggers?\
    \ When an INSTEAD OF trigger throws an error, will it be obvious what code is\
    \ throwing the error and how to resolve the problem?\n\nHaving said that, if you\
    \ determine that you require an INSTEAD OF trigger on a view, use the INSTEAD\
    \ OF clause to create it, and embed within it the required PL/SQL. This example\
    \ creates an INSTEAD OF trigger on the EMP_DEPT_V view:\n\n```\ncreate or replace\
    \ trigger emp_dept_v_updt\ninstead of update on emp_dept_v\nfor each row\nbegin\n\
      update emp set emp_name=UPPER(:new.emp_name)\n  where emp_id=:old.emp_id;\n\
    end;\n/\n```\n\nNow, when an update is issued against EMP_DEPT_V, instead of the\
    \ DML’s being executed, Oracle intercepts the statement and runs the INSTEAD OF\
    \ PL/SQL code; for example,\n\n```\nSQL> update emp_dept_v set emp_name='Jonathan'\
    \ where emp_id = 10;\n1 row updated.\n```\n\nThen, you can verify that the trigger\
    \ correctly updated the table by selecting the data:\n\n```\nSQL> select * from\
    \ emp_dept_v;\n\n    EMP_ID EMP_NAME        DEPT_NAME          DEPT_ID\n----------\
    \ --------------- --------------- ----------\n        10 JONATHAN        IT                      \
    \ 2\n        20 Bob             HR                       1\n        30 Craig          \
    \ IT                       2\n        40 Joe             SALES                    3\n\
            50 Jane            HR                       1\n        60 Mark            IT                      \
    \ 2\n```\n\nThis code is a simple example, but it illustrates that you can have\
    \ PL/SQL execute instead of the DML that was run on the view. Again, be careful\
    \ when using INSTEAD OF triggers; be sure you’re confident that you can efficiently\
    \ diagnose and resolve any related issues that may arise.\n\nImplementing an Invisible\
    \ Column\n\nStarting with Oracle Database 12c, you can create or modify a column\
    \ in a table or view to be invisible (see [Chapter 7](#9781430257288_Ch07.xhtml)\
    \ for details on adding an invisible column to a table). One good use for an invisible\
    \ column is to ensure that adding a column to a table or view won’t disrupt any\
    \ of the existing application code. If the application code doesn’t explicitly\
    \ access the invisible column, then it appears to the application as if the column\
    \ doesn’t exist.\n\nA small example will demonstrate the usefulness of an invisible\
    \ column. Suppose you have a table created and populated with some data as follows:\n\
    \n```\ncreate table sales(\n sales_id number primary key\n,amnt    number\n,state  \
    \ varchar2(2)\n,sales_person_id number);\n--\ninsert into sales values(1, 222,\
    \ 'CO', 8773);\ninsert into sales values(20, 827, 'FL', 9222);\n```\n\nAnd, furthermore,\
    \ you have a view based on the prior table, created as shown:\n\n```\ncreate or\
    \ replace view sales_co as\nselect sales_id, amnt, state\nfrom sales where state\
    \ = 'CO';\n```\n\nFor the purpose of this example, suppose you also have a reporting\
    \ table such as this:\n\n```\ncreate table rep_co(\n sales_id number\n,amnt    number\n\
    ,state   varchar2(2));\n```\n\nAnd, it is populated with this insert statement,\
    \ which uses SELECT *:\n\n```\nSQL> insert into rep_co select * from sales_co;\n\
    ```\n\nSometime later, a new column is added to the view:\n\n```\ncreate or replace\
    \ view sales_co as\nselect sales_id, amnt, state, sales_person_id\nfrom sales\
    \ where state = 'CO';\n```\n\nNow, consider what happens to the statement that\
    \ is inserting into REP_CO. Because it uses a SELECT *, it breaks because there\
    \ hasn’t been a corresponding column added to the REP_CO table:\n\n```\nSQL> insert\
    \ into rep_co select * from sales_co;\n\nORA-00913: too many values\n```\n\nThe\
    \ prior insert statement no longer is able to populate the REP_CO table because\
    \ the statement doesn’t account for the additional column that has been added\
    \ to the view.\n\nNow, consider the same scenario, but with the column added to\
    \ the SALES_CO view with an invisible column:\n\n```\n create or replace view\
    \ sales_co\n(sales_id, amnt, state, sales_person_id invisible)\nas\nselect\n sales_id,\
    \ amnt, state, sales_person_id\nfrom sales\nwhere state = 'CO';\n```\n\nWhen a\
    \ view column is defined as invisible, this means that the column will not show\
    \ up when describing the view or in the output of SELECT *. This ensures that\
    \ the insert statement based on a SELECT * will continue to work.\n\nOne could\
    \ successfully argue that you should never create an insert statement based on\
    \ a SELECT * and that you therefore would never encounter this issue. Or, one\
    \ could argue that the REP_CO table in this example should also have a column\
    \ added to it to avoid the problem. However, when working with third-party applications,\
    \ you oftentimes have no control over poorly written code. In this scenario, you\
    \ can add an invisible column to a view without fear of breaking any existing\
    \ code.\n\nHaving said that, the invisible column isn’t entirely invisible. If\
    \ you know the name of an invisible column, you can select from it directly; for\
    \ example,\n\n```\nSQL> select sales_id, amnt, state, sales_person_id from sales_co;\n\
    ```\n\nIn this sense, the invisible column is only unseen to poorly written application\
    \ code or to users that don’t know the column exists.\n\nModifying a View Definition\n\
    \nIf you need to modify the SQL query on which a view is based, then either drop\
    \ and recreate the view, or use the CREATE OR REPLACE syntax, as in the previous\
    \ examples. For instance, say you add a REGION column to the SALES table:\n\n\
    ```\nSQL> alter table sales add (region varchar2(30));\n```\n\nNow, to add the\
    \ REGION column to the SALES_ROCKIES view, run the following command to replace\
    \ the existing view definition:\n\n```\ncreate or replace view sales_rockies as\n\
    select sales_id, amnt, state, region\nfrom sales\nwhere state in ('CO','UT','WY','ID','AZ')\n\
    with read only;\n```\n\nThe advantage of using the CREATE OR REPLACE method is\
    \ that you don’t have to reestablish access to the view for users with previously\
    \ granted permissions. The alternative to CREATE OR REPLACE is to drop and recreate\
    \ the view with the new definition. If you drop and recreate the view, you must\
    \ regrant privileges to any users or roles that were previously granted access\
    \ to the dropped and recreated object. For this reason, I almost never use the\
    \ drop-and-recreate method when altering the structure of a view.\n\nWhat happens\
    \ if you remove a column from a table, and there is a corresponding view that\
    \ references the removed column?; for example,\n\n```\nSQL> alter table sales\
    \ drop (region);\n```\n\nIf you attempt to select from the view, you’ll receive\
    \ an ORA-04063 error. When modifying underlying tables, you can check to see if\
    \ a view is affected by the table change by compiling the view; for example,\n\
    \n```\nSQL> alter view sales_rockies compile;\n\nWarning: View altered with compilation\
    \ errors.\n```\n\nIn this way, you can proactively determine whether or not a\
    \ table change affects dependent views. In this situation, you should recreate\
    \ the view sans the dropped table column:\n\n```\ncreate or replace view sales_rockies\
    \ as\nselect sales_id, amnt, state\nfrom sales\nwhere state in ('CO','UT','WY','ID','AZ')\n\
    with read only;\n```\n\nDisplaying the SQL Used to Create a View\n\nSometimes,\
    \ when you’re troubleshooting issues with the information a view returns, you\
    \ need to see the SQL query on which the view is based. The view definition is\
    \ stored in the TEXT column of the DBA/USER/ALL_VIEWS views. Note that the TEXT\
    \ column of the DBA/USER/ALL_VIEWS views is a LONG data type and that, by default,\
    \ SQL*Plus only shows 80 characters of this type. You can set it longer, as follows:\n\
    \n```\nSQL> set long 5000\n```\n\nNow, use the following script to display the\
    \ text associated with a particular view for a user:\n\n```\nselect view_name,\
    \ text\nfrom dba_views\nwhere owner = upper('&owner')\nand view_name like upper('&view_name');\n\
    ```\n\nYou can also query ALL_VIEWS for the text of any view you have access to:\n\
    \n```\nselect text\nfrom all_views\nwhere owner='MV_MAINT'\nand view_name='SALES_ROCKIES';\n\
    ```\n\nIf you want to display the view text that exists within your schema, use\
    \ USER_VIEWS:\n\n```\nselect text\nfrom user_views\nwhere view_name=upper('&view_name');\n\
    ```\n\n![image](Images/sq.jpg) **Note**   The TEXT column of DBA/ALL/USER_VIEWS\
    \ does not hide information regarding columns that were defined as invisible.\n\
    \nYou can also use the DBMS_METADATA package’s GET_DDL function to display a view’s\
    \ code. The data type returned from GET_DDL is a CLOB; therefore, if you run it\
    \ from SQL*Plus, make sure you first set your LONG variable to a sufficient size\
    \ to display all the text. For example, here is how to set LONG to 5,000 characters:\n\
    \n```\nSQL> set long 5000\n```\n\nNow, you can display the view definition by\
    \ invoking DBMS_METADATA.GET_DDL with a SELECT statement, as follows:\n\n```\n\
    SQL> select dbms_metadata.get_ddl('VIEW','SALES_ROCKIES') from dual;\n```\n\n\
    If you want to display the DDL for all views for the currently connected user,\
    \ run this SQL:\n\n```\nSQL> select dbms_metadata.get_ddl('VIEW', view_name) from\
    \ user_views;\n```\n\nRenaming a View\n\nThere are a couple of good reasons to\
    \ rename a view. You may want to change the name so that it better conforms to\
    \ standard, or you may want to rename a view before dropping it so that you can\
    \ better determine whether it’s in use. Use the RENAME statement to change the\
    \ name of a view. This example renames a view:\n\n```\nSQL> rename sales_rockies\
    \ to sales_rockies_old;\n```\n\nYou should see this message:\n\n```\nTable renamed.\n\
    ```\n\nThe prior message would make more sense if it said, “View renamed”; just\
    \ be aware that the message, in this case, doesn’t exactly match the operation.\n\
    \nDropping a View\n\nBefore you drop a view, consider renaming it. If you’re certain\
    \ that a view isn’t being used anymore, then it makes sense to keep your schema\
    \ as clean as possible and drop any unused objects. Use the DROP VIEW statement\
    \ to drop a view:\n\n```\nSQL> drop view sales_rockies_old;\n```\n\nKeep in mind\
    \ that when you drop a view, any dependent views, materialized views, and synonyms\
    \ become invalid. Additionally, any grants associated with the dropped view are\
    \ also removed.\n\nManaging Synonyms\n\nSynonyms provide a mechanism for creating\
    \ an alternate name or alias for an object. For example, say USER1 is the currently\
    \ connected user, and USER1 has select access to USER2’s EMP table. Without a\
    \ synonym, USER1 must select from USER2’s EMP table, as follows:\n\n```\nSQL>\
    \ select * from user2.emp;\n```\n\nAssuming it has the CREATE SYNONYM system privilege,\
    \ USER1 can do the following:\n\n```\nSQL> create synonym emp for user2.emp;\n\
    ```\n\nNow, USER1 can transparently select from USER2’s EMP table:\n\n```\nSQL>\
    \ select * from emp;\n```\n\nYou can create synonyms for the following types of\
    \ database objects:\n\n*   Tables\n*   Views, object views\n*   Other synonyms\n\
    *   Remote objects via a database link\n*   PL/SQL packages, procedures, and functions\n\
    *   Materialized views\n*   Sequences\n*   Java class schema object\n*   User-defined\
    \ object types\n\nCreating a synonym that points to another object eliminates\
    \ the need to specify the schema owner and also allows you to specify a name for\
    \ the synonym that does not match the object name. This lets you create a layer\
    \ of abstraction between an object and the user, often referred to as object transparency.\
    \ Synonyms allow you to manage objects transparently and separately from the users\
    \ that access the objects. You can also seamlessly relocate objects to different\
    \ schemas or even different databases. The application code that references the\
    \ synonym doesn’t need to change—only the definition of the synonym.\n\n![image](Images/sq.jpg) **Tip**  \
    \ You can use synonyms to set up multiple application environments within one\
    \ database. Each environment has its own synonyms that point to a different user’s\
    \ objects, allowing you to run the same code against several different schemas\
    \ within one database. You may do this because you can’t afford to build a separate\
    \ box or database for development, testing, quality assurance, production, and\
    \ so on.\n\nCreating a Synonym\n\nA user must be granted the CREATE SYNONYM system\
    \ privilege before creating a synonym. Once that privilege is granted, use the\
    \ CREATE SYNONYM command to create an alias for another database object. You can\
    \ specify CREATE OR REPLACE SYNONYM if you want the statement to create the synonym,\
    \ if it doesn’t exist, or replace the synonym definition, if it does. This is\
    \ usually acceptable behavior.\n\nIn this example, a synonym will be created that\
    \ provides access to a view. First, the owner of the view must grant select access\
    \ to the view. Here, the owner of the view is MV_MAINT:\n\n```\nSQL> show user;\n\
    USER is \"MV_MAINT\"\n\nSQL> grant select on sales_rockies to app_user;\n```\n\
    \nNext, connect to the database as the user that will create the synonym.\n\n\
    ```\nSQL> conn app_user/foo\n```\n\nWhile connected as APP_USER, a synonym is\
    \ created that points to a view named SALES_ROCKIES, owned by MV_MAINT:\n\n```\n\
    SQL> create or replace synonym sales_rockies for mv_maint.sales_rockies;\n```\n\
    \nNow, the APP_USER can directly reference the SALES_ROCKIES view:\n\n```\nSQL>\
    \ select * from sales_rockies;\n```\n\nWith the CREATE SYNONYM command, if you\
    \ don’t specify OR REPLACE (as shown in the example), and the synonym already\
    \ exists, then an ORA-00955 error is thrown. If it’s okay to overwrite any prior\
    \ existing synonym definitions, then specify the OR REPLACE clause.\n\nThe creation\
    \ of the synonym doesn’t also create the privilege to access an object. Such privileges\
    \ must be granted separately, usually before you create the synonym (as shown\
    \ in the example).\n\nBy default, when you create a synonym, it’s a private synonym.\
    \ This means that it’s owned by the user that created the synonym and that other\
    \ users can’t access it unless they’re granted the appropriate object privileges.\n\
    \nCreating Public Synonyms\n\nYou can also define a synonym as public (see the\
    \ previous section, “Creating a Synonym,” for a discussion of private synonyms),\
    \ which means that any user in the database has access to the synonym. Sometimes,\
    \ an inexperienced DBA does the following:\n\n```\nSQL> grant all on sales to\
    \ public;\nSQL> create public synonym sales for mv_maint.sales;\n```\n\nNow, any\
    \ user that can connect to the database can perform any INSERT, UPDATE, DELETE,\
    \ or SELECT operation on the SALES table that exists in the MV_MAINT schema. You\
    \ may be tempted to do this so that you don’t have to bother setting up individual\
    \ grants and synonyms for each schema that needs access. This is almost always\
    \ a bad idea. There are a few issues with using public synonyms:\n\n*   Troubleshooting\
    \ can be problematic if you’re not aware of globally defined (public) synonyms;\
    \ DBAs tend to forget or are unaware that public synonyms were created.\n*   Applications\
    \ that share one database can have collisions on object names if multiple applications\
    \ use public synonyms that aren’t unique within the database.\n*   Security should\
    \ be administered as needed, not on a wholesale basis.\n\nI usually try to avoid\
    \ using public synonyms. However, there may be scenarios that warrant their use.\
    \ For example, when Oracle creates the data dictionary, public synonyms are used\
    \ to simplify the administration of access to internal database objects. To display\
    \ any public synonyms in your database, run this query:\n\n```\nselect owner,\
    \ synonym_name\nfrom dba_synonyms\nwhere owner='PUBLIC';\n```\n\nDynamically Generating\
    \ Synonyms\n\nSometimes, it’s useful to dynamically generate synonyms for all\
    \ tables or views for a schema that needs private synonyms. The following script\
    \ uses SQL*Plus commands to format and capture the output of an SQL script that\
    \ generates synonyms for all tables within a schema:\n\n```\nCONNECT &&master_user/&&master_pwd\n\
    --\nSET LINESIZE 132 PAGESIZE 0 ECHO OFF FEEDBACK OFF\nSET VERIFY OFF HEAD OFF\
    \ TERM OFF TRIMSPOOL ON\n--\nSPO gen_syns_dyn.sql\n--\nselect 'create or replace\
    \ synonym ' || table_name ||\n       ' for ' || '&&master_user..' ||\n  table_name\
    \ || ';'\nfrom user_tables;\n--\nSPO OFF;\n--\nSET ECHO ON FEEDBACK ON VERIFY\
    \ ON HEAD ON TERM ON;\n```\n\nLook at the &master_user variable with the two dots\
    \ appended to it in the SELECT statement: what is the purpose of double-dot syntax?\
    \ A single dot at the end of an ampersand variable instructs SQL*Plus to concatenate\
    \ anything after the single dot to the ampersand variable. When you place two\
    \ dots together, that tells SQL*Plus to concatenate a single dot to the string\
    \ contained in the ampersand variable.\n\nDisplaying Synonym Metadata\n\nThe DBA/ALL/USER_SYNONYMS\
    \ views contain information about synonyms in the database. Use the following\
    \ SQL to view synonym metadata for the currently connected user:\n\n```\nselect\
    \ synonym_name, table_owner, table_name, db_link\nfrom user_synonyms\norder by\
    \ 1;\n```\n\nThe ALL_SYNONYMS view displays all private synonyms, all public synonyms,\
    \ and any private synonyms owned by different users for which your currently connected\
    \ user has select access to the underlying base table. You can display information\
    \ for all private and public synonyms in your database by querying the DBA_SYNONYMS\
    \ view.\n\nThe TABLE_NAME column in the DBA/ALL/USER_SYNONYMS views is a bit of\
    \ a misnomer because TABLE_NAME can reference many types of database objects,\
    \ such as another synonym, view, package, function, procedure, or materialized\
    \ view. Similarly, TABLE_OWNER refers to the owner of the object (and that object\
    \ may not necessarily be a table).\n\nWhen you’re diagnosing data integrity issues,\
    \ sometimes you first want to identify what table or object is being accessed.\
    \ You can select from what appears to be a table, but in reality it may be a synonym\
    \ that points to a view that selects from a synonym, which in turn points to a\
    \ table in a different database.\n\nThe following query is often a starting point\
    \ for figuring out whether an object is a synonym, a view, or a table:\n\n```\n\
    select owner, object_name, object_type, status\nfrom dba_objects\nwhere object_name\
    \ like upper('&object_name%');\n```\n\nNote that using the wildcard character\
    \ the percentage sign (%) in this query allows you to enter the object’s partial\
    \ name. Therefore, the query has the potential to return information regarding\
    \ any object that partially matches the text string you enter.\n\nYou can also\
    \ use the GET_DDL function of the DBMS_METADATA package to display synonym metadata.\
    \ If you want to display the DDL for all synonyms for the currently connected\
    \ user, run this SQL:\n\n```\nSQL> set long 5000\nSQL> select dbms_metadata.get_ddl('SYNONYM',\
    \ synonym_name) from user_synonyms;\n```\n\nYou can also display the DDL for a\
    \ particular user. You must provide as input to the G ET_DDL function the object\
    \ type, object name, and schema:\n\n```\nSQL> select dbms_metadata.get_ddl(object_type=>'SYNONYM',\n\
                 name=>'SALES_ROCKIES', schema=>'APP_USER') from dual;\n```\n\nRenaming\
    \ a Synonym\n\nYou may want to rename a synonym so that it conforms to naming\
    \ standards or in order to determine whether it’s being used. Use the RENAME statement\
    \ to change the name of a synonym:\n\n```\nSQL> rename inv_s to inv_st;\n```\n\
    \nNote that the output displays this message:\n\n```\nTable renamed.\n```\n\n\
    The prior message is somewhat misleading. It indicates that a table has been renamed,\
    \ when, in this scenario, it was a synonym.\n\nDropping a Synonym\n\nIf you’re\
    \ certain that you no longer need a synonym, then you can drop it. Unused synonyms\
    \ can be confusing to others called on to enhance or debug existing applications.\
    \ Use the DROP SYNONYM statement to drop a private synonym:\n\n```\nSQL> drop\
    \ synonym inv;\n```\n\nIf it’s a public synonym, then you need to specify PUBLIC\
    \ when you drop it:\n\n```\nSQL> drop public synonym inv_pub;\n```\n\nIf successful,\
    \ you should see this message:\n\n```\nSynonym dropped.\n```\n\nManaging Sequences\n\
    \nA sequence is a database object that users can access to select unique integers.\
    \ Sequences are typically used to generate integers for populating primary key\
    \ and foreign key columns. You increment a sequence by accessing it via a SELECT,\
    \ INSERT, or UPDATE statement. Oracle guarantees that a sequence number is unique\
    \ when selected; no two user sessions can choose the same sequence number.\n\n\
    There is no way to guarantee that occasional gaps won’t occur in the numbers generated\
    \ by a sequence. Usually, some number of sequence values are cached in memory,\
    \ and in the event of an instance failure (power failure, shutdown abort), any\
    \ unused values still in memory are lost. Even if you don’t cache the sequence,\
    \ nothing stops a user from acquiring a sequence as part of a transaction and\
    \ then rolling back that transaction (the transaction is rolled back, but not\
    \ the sequence). For most applications, it’s acceptable to have a mostly gap-free,\
    \ unique integer generator. Just be aware that gaps can exist.\n\nCreating a Sequence\n\
    \nFor many applications, creating a sequence can be as simple as this:\n\n```\n\
    SQL> create sequence inv_seq;\n```\n\nBy default the starting number is 1, the\
    \ increment is 1, the default number of sequences cached in memory is 20, and\
    \ the maximum value is 10^27\\. You can verify the default values via this query:\n\
    \n```\nselect sequence_name, min_value, increment_by, cache_size, max_value\n\
    from user_sequences;\n```\n\nYou have a great deal of latitude in changing aspects\
    \ of a sequence when creating it. For example, this command creates a sequence\
    \ with a starting value of 1,000 and a maximum value of 1,000,000:\n\n```\nSQL>\
    \ create sequence inv_seq2 start with 10000 maxvalue 1000000;\n```\n\n[Table 9-1](#9781430257288_Ch09.xhtml#Tab1)\
    \ lists the various options available when you’re creating a sequence.\n\n[Table\
    \ 9-1.](#9781430257288_Ch09.xhtml#_Tab1) Sequence Creation Options\n\n| Option\
    \ | Description |\n| --- | --- |\n| INCREMENT BY | Specifies the interval between\
    \ sequence numbers |\n| START WITH | Specifies the first sequence number generated\
    \ |\n| MAXVALUE | Specifies the maximum value of the sequence |\n| NOMAXVALUE\
    \ | Sets the maximum value of a sequence to a really big number (10^28 -1) |\n\
    | MINVALUE | Specifies the minimum value of sequence |\n| NOMINVALUE | Sets the\
    \ minimum value to 1 for an ascending sequence; sets the value to –(10^28–1) for\
    \ a descending sequence |\n| CYCLE | Specifies that when the sequence hits a maximum\
    \ or minimum value, it should start generating numbers from the minimum value\
    \ for an ascending sequence and from the maximum value for a descending sequence\
    \ |\n| NOCYCLE | Tells the sequence to stop generating numbers after a maximum\
    \ or minimum value is reached |\n| CACHE | Specifies how many sequence numbers\
    \ to preallocate and keep in memory. If CACHE and NOCACHE aren’t specified, the\
    \ default is CACHE 20. |\n| NOCACHE | Specifies that sequence numbers aren’t to\
    \ be cached |\n| ORDER | Guarantees that the numbers are generated in the order\
    \ of request |\n| NOORDER | Used if it isn’t necessary to guarantee that sequence\
    \ numbers are generated in the order of request. This is usually acceptable and\
    \ is the default. |\n\nUsing Sequence Pseudocolumns\n\nAfter a sequence is created,\
    \ you can use two pseudocolumns to access the sequence’s value:\n\n*   NEXTVAL\n\
    *   CURRVAL\n\nYou can reference these pseudocolumns in any SELECT, INSERT, or\
    \ UPDATE statements. To retrieve a value from the INV_SEQ sequence, access the\
    \ NEXTVAL value, as shown:\n\n```\nSQL> select inv_seq.nextval from dual;\n```\n\
    \nNow that a sequence number has been retrieved for this session, you can use\
    \ it multiple times by accessing the CURRVAL value:\n\n```\nSQL> select inv_seq.currval\
    \ from dual;\n```\n\nThe following example uses a sequence to populate the primary\
    \ key value of a parent table and then uses the same sequence to populate the\
    \ corresponding foreign key values in a child table. The sequence can be accessed\
    \ directly in the INSERT statement. The first time you access the sequence, use\
    \ the NEXTVAL pseudocolumn.\n\n```\nSQL> insert into inv(inv_id, inv_desc) values\
    \ (inv_seq.nextval, 'Book');\n```\n\nIf you want to reuse the same sequence value,\
    \ you can reference it via the CURRVAL pseudocolumn. Next, a record is inserted\
    \ into a child table that uses the same value for the foreign key column as its\
    \ parent primary key value:\n\n```\ninsert into inv_lines\n   (inv_line_id,inv_id,inv_item_desc)\n\
         values\n   (1, inv_seq.currval, 'Tome1');\n--\ninsert into inv_lines\n    (inv_line_id,inv_id,inv_item_desc)\n\
         values\n    (2, inv_seq.currval, 'Tome2');\n```\n\nAutoincrementing Columns\n\
    \n![image](Images/sq.jpg) **Tip**   Starting with Oracle Database 12c, you can\
    \ create a table with identity columns that are automatically populated with sequence\
    \ values. See [Chapter 7](#9781430257288_Ch07.xhtml) for details.\n\nI occasionally\
    \ get this request from a developer: “I used to work with another database, and\
    \ it had a really cool feature that would allow you to create a table and, as\
    \ part of the table definition, specify that a column should always be populated\
    \ with an automatically incrementing number.” Prior to Oracle Database 12c, I\
    \ would reply something like, “Oracle has no such feature. If you have an issue\
    \ with this, please send an e-mail to Larry at . . .” Or, I would inform the developer\
    \ that  he or she could either use the sequence number directly in an INSERT statement\
    \ (as shown in the previous section, “Using Sequence Pseudocolumns”) or select\
    \ the sequence value into a variable and then reference the variable as needed.\n\
    \nIf you’re not able to use the identity column feature in Oracle Database 12c,\
    \ then you can simulate this automatic incrementing functionality by using triggers.\
    \ For  instance, say you create a table and sequence, as follows:\n\n```\nSQL>\
    \ create table inv(inv_id number, inv_desc varchar2(30));\nSQL> create sequence\
    \ inv_seq;\n```\n\nNext, create a trigger on the INV table that automatically\
    \ populates the INV_ID column from the sequence:\n\n```\ncreate or replace trigger\
    \ inv_bu_tr\nbefore insert on inv\nfor each row\nbegin\n  select inv_seq.nextval\
    \ into :new.inv_id from dual;\nend;\n/\n```\n\nNow, insert a couple of records\
    \ into the INV table:\n\n```\nSQL> insert into inv (inv_desc) values( 'Book');\n\
    SQL> insert into inv (inv_desc) values( 'Pen');\n```\n\nSelect from the table\
    \ to verify that the INV_ID column is indeed populated automatically by the sequence:\n\
    \n```\nSQL> select * from inv;\n    INV_ID INV_DESC\n---------- ------------------------------\n\
             1 Book\n         2 Pen\n```\n\nI generally don’t like using this technique.\
    \ Yes, it makes it easier for the developers, in that they don’t have to worry\
    \ about populating the key columns. However, it’s more work for the DBA to generate\
    \ the code required to maintain the columns to be automatically populated. Because\
    \ I’m the DBA, and I like to keep the database code that I maintain as simple\
    \ as possible, I usually tell the developers that we aren’t using this autoincrementing\
    \ column approach and that we’ll instead use the technique of directly calling\
    \ the sequence in the DML statements (as shown in the previous section, “Using\
    \ Sequence Pseudocolumns”).\n\n**GAP-FREE SEQUENCES**\n\nPeople sometimes worry\
    \ unduly about ensuring that not a single sequence value is lost as rows are inserted\
    \ into a table. In a few cases, I’ve seen applications fail because of gaps in\
    \ sequence values. I have two thoughts on these issues:\n\n*   If you’re worried\
    \ about gaps, you aren’t thinking correctly about the problem you’re solving.\n\
    *   If your application fails because of gaps, you’re doing it wrong.\n\nMy words\
    \ are strong, I know, but few, if any, applications need gap-free sequences. If\
    \ you really and truly need gap-free sequences, then using Oracle sequence objects\
    \ is the wrong approach. You must instead implement your own sequence generator.\
    \ You’ll need to go through agonizing contortions to make sure no gaps exist.\
    \ Those contortions will impair your code’s performance. And, in the end, you’ll\
    \ probably fail.\n\nImplementing Multiple Sequences That Generate Unique Values\n\
    \nI once had a developer ask if it was possible to create multiple sequences for\
    \ an application and to guarantee that each sequence would generate numbers unique\
    \ across all sequences. If you have this type of requirement, you can handle it\
    \ a few different ways:\n\n*   If you’re feeling grumpy, tell the developer that\
    \ it’s not possible and that the standard is to use one sequence per application\
    \ (this is usually the approach I take).\n*   Set sequences to start and increment\
    \ at different points.\n*   Use ranges of sequence numbers.\n\nIf you’re not feeling\
    \ grumpy, you can set up a small, finite number of sequences that always generate\
    \ unique values by specifying an odd or even starting number and then incrementing\
    \ the sequence by two. For example, you can set up two odd and two even sequence\
    \ generators; for example,\n\n```\nSQL> create sequence inv_seq_odd start with\
    \ 1 increment by 2;\nSQL> create sequence inv_seq_even start with 2 increment\
    \ by 2;\nSQL> create sequence inv_seq_odd_dwn start with -1 increment by -2;\n\
    SQL> create sequence inv_seq_even_dwn start with -2 increment by -2;\n```\n\n\
    The numbers generated by these four sequences should never intersect. However,\
    \ this approach is limited by its ability to use only four sequences.\n\nIf you\
    \ need more than four unique sequences, you can use ranges of numbers; for example,\n\
    \n```\nSQL> create sequence inv_seq_low start with 1 increment by 1 maxvalue 10000000;\n\
    SQL> create sequence inv_seq_ml  start with 10000001 increment by 1 maxvalue 20000000;\n\
    SQL> create sequence inv_seq_mh  start with 20000001 increment by 1 maxvalue 30000000;\n\
    SQL> create sequence inv_seq_high start with 30000001 increment by 1 maxvalue\
    \ 40000000;\n```\n\nWith this technique, you can set up numerous different ranges\
    \ of numbers to be used by each sequence. The downside is that you’re limited\
    \ by the number of unique values that can be generated by each sequence.\n\nCreating\
    \ One Sequence or Many\n\nSay you have an application with 20 tables. One question\
    \ that comes up is whether you should use 20 different sequences to populate the\
    \ primary key and foreign key columns for each table or just 1 sequence.\n\nI\
    \ recommend using just 1 sequence; 1 sequence is easier to manage than multiple\
    \ sequences, and it means less DDL code to manage and fewer places to investigate\
    \ when there are issues.\n\nSometimes, developers raise issues such as\n\n*  \
    \ performance problems with only 1 sequence\n*   sequence numbers that become\
    \ too high\n\nIf you cache the sequence values, usually there are no performance\
    \ issues with accessing sequences. The maximum number for a sequence is 10^28–1,\
    \ so if the sequence is incrementing by one, you’ll never reach the maximum value\
    \ (at least, not in this lifetime).\n\nHowever, in scenarios in which you’re generating\
    \ surrogate keys for the primary and child tables, it’s sometimes convenient to\
    \ use more than 1 sequence. In these situations multiple sequences per application\
    \ may be warranted. When you use this approach, you must remember to add a sequence\
    \ when tables are added and potentially drop sequences as tables are removed.\
    \ This isn’t a big deal, but it means a little more maintenance for the DBA, and\
    \ the developers must ensure that they use the correct sequence for each table.\n\
    \nViewing Sequence Metadata\n\nIf you have DBA privileges, you can query the DBA_SEQUENCES\
    \ view to display information about all sequences in the database. To view sequences\
    \ that your schema owns, query the USER_SEQUENCES view:\n\n```\nselect sequence_name,\
    \ min_value, max_value, increment_by\nfrom user_sequences;\n```\n\nTo view the\
    \ DDL code required to recreate a sequence, access the DBMS_METADATA view. If\
    \ you’re using SQL*Plus to execute DBMS_METADATA, first ensure that you set the\
    \ LONG variable:\n\n```\nSQL> set long 5000\n```\n\nThis example extracts the\
    \ DDL for INV_SEQ:\n\n```\nSQL> select dbms_metadata.get_ddl('SEQUENCE','INV_SEQ')\
    \ from dual;\n```\n\nIf you want to display the DDL for all sequences for the\
    \ currently connected user, run this SQL:\n\n```\nSQL> select dbms_metadata.get_ddl('SEQUENCE',sequence_name)\
    \ from user_sequences;\n```\n\nYou can also generate the DDL for a sequence owned\
    \ by a particular user by providing the SCHEMA parameter:\n\n```\nselect\ndbms_metadata.get_ddl(object_type=>'SEQUENCE',\
    \ name=>'INV_SEQ', schema=>'INV_APP')\nfrom dual;\n```\n\nRenaming a Sequence\n\
    \nOccasionally, you may need to rename a sequence. For instance, a sequence may\
    \ have been created with an erroneous name, or you may want to rename the sequence\
    \ before dropping it from the database. Use the RENAME statement to do this. This\
    \ example renames INV_SEQ to INV_SEQ_OLD:\n\n```\nSQL> rename inv_seq to inv_seq_old;\n\
    ```\n\nYou should see the following message:\n\n```\nTable renamed.\n```\n\nIn\
    \ this case, even though the message says, “Table renamed,” it was the sequence\
    \ that was renamed.\n\nDropping a Sequence\n\nUsually, you want a drop a sequence\
    \ either because it’s not used or you want to recreate it with a new starting\
    \ number. To drop a sequence, use the DROP SEQUENCE statement:\n\n```\nSQL> drop\
    \ sequence inv_seq;\n```\n\nWhen an object is dropped, all the associated grants\
    \ on the object are dropped as well. So, if you need to recreate the sequence,\
    \ then remember to reissue select grants to other users that may need to use the\
    \ sequence.\n\n![image](Images/sq.jpg) **Tip**   See the next section, “Resetting\
    \ a Sequence,” for an alternative approach to dropping and recreating a sequence.\n\
    \nResetting a Sequence\n\nYou may occasionally be required to change the current\
    \ value of a sequence number. For example, you may work in a test environment\
    \ in which the developers periodically want the database reset to a previous state.\
    \ A typical scenario is one in which the developers have scripts that truncate\
    \ the tables and reseed them with test data and, as part of that exercise, want\
    \ a sequence set back to a value such as 1.\n\nOracle’s documentation states,\
    \ “to restart a sequence at a different number, you must drop and re-create it.”\
    \ That’s not entirely accurate. In most cases, you should avoid dropping a sequence\
    \ because you must regrant permissions on the object to users that currently have\
    \ select permissions on the sequence. This can lead to temporary downtime for\
    \ your application while you track down those users.\n\nThe following technique\
    \ demonstrates how to set the current value to a higher or lower value, using\
    \ the ALTER SEQUENCE statement. The basic procedure is as follows:\n\n1.  Alter\
    \ INCREMENT BY to a large number.\n2.  Select from the sequence to increment it\
    \ by the large positive or negative value.\n3.  Set INCREMENT BY back to its original\
    \ value (usually 1).\n\nThis example sets the next value of a sequence number\
    \ to 1,000 integers higher than the current value:\n\n```\nSQL> alter sequence\
    \ myseq increment by 1000;\nSQL> select myseq.nextval from dual;\nSQL> alter sequence\
    \ myseq increment by 1;\n```\n\nVerify that the sequence is set to the value you\
    \ desire:\n\n```\nSQL> select myseq.nextval from dual;\n```\n\nYou can also use\
    \ this technique to set the sequence number to a much lower number than the current\
    \ value. The difference is that the INCREMENT BY setting is a large negative number.\
    \ For example, this example sets the sequence back 1,000 integers:\n\n```\nSQL>\
    \ alter sequence myseq increment by -1000;\nSQL> select myseq.nextval from dual;\n\
    SQL> alter sequence myseq increment by 1;\n```\n\nVerify that the sequence is\
    \ set to the value you desire:\n\n```\nSQL> select myseq.nextval from dual;\n\
    ```\n\nAdditionally, you can automate the task of resetting a sequence number\
    \ back to a value via an SQL script. This technique is shown in the next several\
    \ lines of SQL code. The code will prompt you for the sequence name and the value\
    \ you want the sequence set back to:\n\n```\nUNDEFINE seq_name\nUNDEFINE reset_to\n\
    PROMPT \"sequence name\" ACCEPT '&&seq_name'\nPROMPT \"reset to value\" ACCEPT\
    \ &&reset_to\nCOL seq_id NEW_VALUE hold_seq_id\nCOL min_id NEW_VALUE hold_min_id\n\
    --\nSELECT &&reset_to - &&seq_name..nextval - 1 seq_id\nFROM dual;\n--\nSELECT\
    \ &&hold_seq_id - 1 min_id FROM dual;\n--\nALTER SEQUENCE &&seq_name INCREMENT\
    \ BY &hold_seq_id MINVALUE &hold_min_id;\n--\nSELECT &&seq_name..nextval FROM\
    \ dual;\n--\nALTER SEQUENCE &&seq_name INCREMENT BY 1;\n```\n\nTo ensure that\
    \ the sequence has been set to the value you want, select the NEXTVAL from it:\n\
    \n```\nSQL> select &&seq_name..nextval from dual;\n```\n\nThis approach can be\
    \ quite useful when you’re moving applications through various development, test,\
    \ and production environments. It allows you to reset the sequence without having\
    \ to reissue object grants.\n\nSummary\n\nViews, synonyms, and sequences are used\
    \ extensively in Oracle database applications. These objects (along with tables\
    \ and indexes) afford the technology for creating sophisticated applications.\n\
    \nViews offer a way to create and store complex multitable join queries that can\
    \ then be used by database users and applications. Views can be used to update\
    \ the underlying base tables or can be created read-only for reporting requirements.\n\
    \nSynonyms (along with appropriate privileges) provide a mechanism for transparently\
    \ allowing a user to access objects that are owned by a separate schema. The user\
    \ accessing a synonym needs to know only the synonym name, regardless of the underlying\
    \ object type and owner. This lets the application designer seamlessly separate\
    \ the owner of the objects from the users that access the objects.\n\nSequences\
    \ generate unique integers that are often used by applications to populate primary\
    \ key and foreign key columns. Oracle guarantees that when a sequence is accessed,\
    \ it will always return a unique value to the selecting user.\n\nAfter installing\
    \ the Oracle binaries and creating a database and tablespaces, usually you create\
    \ an application that consists of the owning user and corresponding tables, constraints,\
    \ indexes, views, synonyms, and sequences. Metadata regarding these objects are\
    \ stored internally in the data dictionary. The data dictionary is used extensively\
    \ for monitoring, troubleshooting, and diagnosing issues. You must be thoroughly\
    \ fluent with retrieving information from the data dictionary. Retrieving and\
    \ analyzing data dictionary information is the topic of the next chapter.\n\n\
    CHAPTER 10\n\n![image](Images/frontdot.jpg)\n\nData Dictionary Fundamentals\n\n\
    The previous chapters in this book focused on topics such as creating a database,\
    \ strategically implementing tablespaces, managing users, basic security, tables,\
    \ indexes, and constraints. In those chapters, you were presented with several\
    \ SQL queries, which accessed the data dictionary views in order to\n\n*   show\
    \ what users are in the database and if any of their passwords expired\n*   display\
    \ the owners of each table and associated privileges\n*   show the settings of\
    \ various database parameters\n*   determine which columns have foreign key constraints\
    \ defined on them\n*   display tablespaces and associated data files and space\
    \ usage\n\nIn this regard, Oracle’s data dictionary is vast and robust. Almost\
    \ every conceivable piece of information about your database is available for\
    \ retrieval. The data dictionary stores critical information about the physical\
    \ characteristics of the database, users, objects, and dynamic performance metrics.\
    \ A senior-level DBA must possess an expert knowledge of the data dictionary.\n\
    \nThis chapter is a turning point in the book, dividing it between basic DBA tasks\
    \ and more advanced topics. It’s appropriate at this time to dive into the details\
    \ of the inner workings of the data dictionary. Knowledge of these workings will\
    \ provide a foundation for understanding your environment, extracting pertinent\
    \ information, and doing your job.\n\nThe first few sections of this chapter detail\
    \ the architecture of the data dictionary and how it is created. Also shown are\
    \ the relationships between logical objects and physical structures and how they\
    \ relate to specific data dictionary views. These understandings will serve as\
    \ a basis for writing SQL queries to extract the information that you’ll need\
    \ to be a more efficient and effective DBA. Finally, several examples are presented,\
    \ illustrating how DBAs use the data dictionary.\n\nData Dictionary Architecture\n\
    \nIf you inherit a database and are asked to maintain and manage it, typically\
    \ you’ll inspect the contents of the data dictionary to determine the physical\
    \ structure of the database and see what events are currently transacting. Toward\
    \ this end, Oracle provides two general categories of read-only data dictionary\
    \ views:\n\n*   The contents of your database, such as users, tables, indexes,\
    \ constraints, and privileges. These are sometimes referred to as the static CDB/DBA/ALL/USER\
    \ data dictionary views, and they’re based on internal tables stored in the SYSTEM\
    \ tablespace. The term *static*, in this sense, means that the information within\
    \ these views only changes as you make changes to your database, such as adding\
    \ a user, creating a table, or modifying a column.\n*   A real-time view of activity\
    \ in the database, such as users connected to the database, SQL currently executing,\
    \ memory usage, locks, and I/O statistics. These views are based on virtual memory\
    \ tables and are referred to as the dynamic performance views. The information\
    \ in these views is continuously updated by Oracle as events take place within\
    \ the database. The views are also sometimes called the V$ or GV$ views.\n\nThese\
    \ types of data dictionary views are described in further detail in the next two\
    \ sections.\n\nStatic Views\n\nOracle refers to a subset of the data dictionary\
    \ views as static. These views are based on physical tables maintained internally\
    \ by Oracle. Oracle’s documentation states that these views are static in the\
    \ sense that the data they contain don’t change at a rapid rate (at least, not\
    \ compared with the dynamic V$ and GV$ views).\n\nThe term *static* can sometimes\
    \ be a misnomer. For example, the DBA_SEGMENTS and DBA_EXTENTS views change dynamically\
    \ as the amount of data in your database grows and shrinks. Regardless, Oracle\
    \ has made the distinction between static and dynamic, and it’s important to understand\
    \ this architectural nuance when querying the data dictionary. Prior to Oracle\
    \ Database 12c, there were only three levels of static views:\n\n*   USER\n* \
    \  ALL\n*   DBA\n\nStarting with Oracle Database 12c, there is a fourth level\
    \ that is applicable when using the container/pluggable database feature:\n\n\
    *   CDB\n\nThe USER views contain information available to the current user. For\
    \ example, the USER_TABLES view contains information about tables owned by the\
    \ current user. No special privileges are required to select from the USER-level\
    \ views.\n\nAt the next level are the ALL static views. The ALL views show you\
    \ all object information the current user has access to. For example, the ALL_TABLES\
    \ view displays all database tables on which the current user can perform any\
    \ type of DML operation. No special privileges are required to query from the\
    \ ALL-level views.\n\nNext are the DBA static views. The DBA views contain metadata\
    \ describing all objects in the database (regardless of ownership or access privilege).\
    \ To access the DBA views, a DBA role or SELECT_CATALOG_ROLE must be granted to\
    \ the current user.\n\nThe CDB-level views are only applicable if you’re using\
    \ the pluggable database feature. This level provides information about all pluggable\
    \ databases within a container database (hence the acronym CDB). Starting with\
    \ Oracle Database 12c, you’ll notice that many of the static data dictionary and\
    \ dynamic performance views have a new column, CON_ID. This column uniquely identifies\
    \ each pluggable database within a container database.\n\n![image](Images/sq.jpg) **Tip**  \
    \ See [Chapter 23](#9781430257288_Ch23.xhtml) for a full discussion of pluggable\
    \ databases. Unless otherwise noted, this chapter focuses on the DBA/ALL/USER-level\
    \ views. Just keep in mind that if you’re working with Oracle Database 12c and\
    \ pluggable databases, you may need to access the CDB-level views when reporting\
    \ on all pluggable databases within a container database.\n\nThe static views\
    \ are based on internal Oracle tables, such as USER$, TAB$, and IND$. If you have\
    \ access to the SYS schema, you can view underlying tables directly via SQL. For\
    \ most situations, you only need to access the static views that are based on\
    \ the underlying internal tables.\n\nThe data dictionary tables (such as USER$,\
    \ TAB$, IND$) are created during the execution of the CREATE DATABASE command.\
    \ As part of creating a database, the sql.bsq file is executed, which builds these\
    \ internal data dictionary tables. The sql.bsq file is generally located in the\
    \ ORACLE_HOME/rdbms/admin directory; you can view it via an OS editing utility\
    \ (such as vi, in Linux/Unix, or Notepad, in Windows).\n\nThe static views are\
    \ created when you run the catalog.sql script (usually, you run this script once\
    \ the CREATE DATABASE operation succeeds). The catalog.sql script is located in\
    \ the ORACLE_HOME/rdbms/admin directory. [Figure 10-1](#9781430257288_Ch10.xhtml#Fig1)\
    \ shows the process of creating the static data dictionary views.\n\n![9781430257288_Fig10-01.jpg](Images/9781430257288_Fig10-01.jpg)\n\
    \n[Figure 10-1](#9781430257288_Ch10.xhtml#_Fig1). Creating the static data dictionary\
    \ views\n\nYou can view the creation scripts of the static views by querying the\
    \ TEXT column of DBA_VIEWS; for example,\n\n```\nSQL  >  set long 5000\nSQL  >\
    \  select text from dba_views where view_name = 'DBA_VIEWS';\n```\n\nHere is the\
    \ output:\n\n```\nselect u.name, o.name, v.textlength, v.text, t.typetextlength,\
    \ t.typetext,\n       t.oidtextlength, t.oidtext, t.typeowner, t.typename,\n      \
    \ decode(bitand(v.property, 134217728), 134217728,\n              (select sv.name\
    \ from superobj$ h, \"_CURRENT_EDITION_OBJ\" sv\n              where h.subobj#\
    \ = o.obj# and h.superobj# = sv.obj#), null),\n       decode(bitand(v.property,\
    \ 32), 32, 'Y', 'N'),\n       decode(bitand(v.property, 16384), 16384, 'Y', 'N'),\n\
           decode(bitand(v.property/4294967296, 134217728), 134217728, 'Y', 'N'),\n\
           decode(bitand(o.flags,8),8,'CURRENT_USER','DEFINER')\nfrom sys.\"_CURRENT_EDITION_OBJ\"\
    \ o, sys.view$ v, sys.user$ u, sys.typed_view$ t\nwhere o.obj# = v.obj#\n  and\
    \ o.obj# = t.obj#(+)\n  and o.owner# = u.user#\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If you manually create a database (not using the dbca utility), you must be\
    \ connected as the SYS schema when you run the catalog.sql and catproc.sql scripts.\
    \ The SYS schema is the owner of all objects in the data dictionary.\n\nDynamic\
    \ Performance Views\n\nThe dynamic performance data dictionary views are colloquially\
    \ referred to as the V$ and GV$ views. These views are constantly updated by Oracle\
    \ and reflect the current condition of the instance and database. Dynamic views\
    \ are critical for diagnosing real-time performance issues.\n\nThe V$ and GV$\
    \ views are indirectly based on underlying X$ tables, which are internal memory\
    \ structures that are instantiated when you start your Oracle instance. Some of\
    \ the V$ views are available the moment the Oracle instance is started. For example,\
    \ V$PARAMETER contains meaningful data after the STARTUP NOMOUNT command has been\
    \ issued, and doesn’t require the database to be mounted or open. Other dynamic\
    \ views (such as V$CONTROLFILE) depend on information in the control file and\
    \ therefore contain significant information only after the database has been mounted.\
    \ Some V$ views (such as V$BH) provide kernel-processing information and thus\
    \ have useful results only after the database has been opened.\n\nAt the top layer,\
    \ the V$ views are actually synonyms that point to underlying SYS.V_$ views. At\
    \ the next layer down, the SYS.V_$ objects are views created on top of another\
    \ layer of SYS.V$ views. The SYS.V$ views in turn are based on the SYS.GV$ views.\
    \ At the bottom layer, the SYS.GV$ views are based on the X$ memory structures.\n\
    \nThe top-level V$ synonyms and SYS.V_$ views are created when you run the catalog.sql\
    \ script, which you usually do after the database is initially created. [Figure\
    \ 10-2](#9781430257288_Ch10.xhtml#Fig2) shows the process for creating the V$\
    \ dynamic performance views.\n\n![9781430257288_Fig10-02.jpg](Images/9781430257288_Fig10-02.jpg)\n\
    \n[Figure 10-2](#9781430257288_Ch10.xhtml#_Fig2). Creating the V$ dynamic performance\
    \ data dictionary views\n\nAccessing the V$ views through the topmost synonyms\
    \ is usually adequate for dynamic performance information needs. On rare occasions,\
    \ you’ll want to query internal information that may not be available through\
    \ the V$ views. In these situations it’s critical to understand the X$ underpinnings.\n\
    \nIf you work with Oracle RAC, you should be familiar with the GV$ global views.\
    \ These views provide global dynamic performance information regarding all instances\
    \ in a cluster (whereas the V$ views are instance specific). The GV$ views contain\
    \ an INST_ID column for identifying specific instances in a clustered environment.\n\
    \nYou can display the V$ and GV$ view definitions by querying the VIEW_DEFINITION\
    \ column of the V$FIXED_VIEW_DEFINITION view. For instance, this query displays\
    \ the definition of the V$CONTROLFILE:\n\n```\nselect view_definition\nfrom v$fixed_view_definition\n\
    where view_name = 'V$CONTROLFILE';\n```\n\nHere is the output:\n\n```\nselect\
    \ STATUS, NAME, IS_RECOVERY_DEST_FILE, BLOCK_SIZE, FILE_SIZE_BLKS,\nCON_ID from\
    \ GV$CONTROLFILE where inst_id = USERENV('Instance')\n```\n\nA Different View\
    \ of Metadata\n\nDBAs commonly face the following types of database issues:\n\n\
    *   An insert into a table fails because a tablespace can’t extend.\n*   The database\
    \ is refusing connections because the maximum number of sessions is exceeded.\n\
    *   An application is hung, apparently because of some sort of locking issue.\n\
    *   A PL/SQL statement is failing, with a memory error.\n*   RMAN backups haven’t\
    \ succeeded for 2 days.\n*   A user is trying to update a record, but a unique\
    \ key constraint violation is thrown.\n*   An SQL statement has been running for\
    \ hours longer than normal.\n*   Application users have reported that performance\
    \ seems sluggish and that something must be wrong with the database.\n\nThe prior\
    \ list is a small sample of the typical issues a DBA encounters on a daily basis.\
    \ A certain amount of knowledge is required to be able to efficiently diagnose\
    \ and handle these types of problems. A fundamental piece of that knowledge is\
    \ an understanding of Oracle’s physical structures and corresponding logical components.\n\
    \nFor example, if a table can’t extend because a tablespace is full, what knowledge\
    \ do you rely on to solve this problem? You need to understand that when a database\
    \ is created, it contains multiple logical space containers called tablespaces.\
    \ Each tablespace consists of one or more physical data files. Each data file\
    \ consists of many OS blocks. Each table consists of a segment, and every segment\
    \ contains one or more extents. As a segment needs space, it allocates additional\
    \ extents within a physical data file.\n\nOnce you understand the logical and\
    \ physical concepts involved, you intuitively look in data dictionary views such\
    \ as DBA_TABLES, DBA_SEGMENTS, DBA_TABLESPACES, and DBA_DATA_FILES to pinpoint\
    \ the issue and add space as required. In a wide variety of troubleshooting scenarios,\
    \ your understanding of the relationships of various logical and physical constructs\
    \ will allow you to focus on querying views that will help you quickly resolve\
    \ the problem at hand. To that end, inspect [Figure 10-3](#9781430257288_Ch10.xhtml#Fig3).\
    \ This diagram describes the relationships between logical and physical structures\
    \ in an Oracle database. The rounded rectangle shapes represent logical constructs,\
    \ and the sharp-cornered rectangles are physical files.\n\n![9781430257288_Fig10-03.jpg](Images/9781430257288_Fig10-03.jpg)\n\
    \n[Figure 10-3](#9781430257288_Ch10.xhtml#_Fig3). Oracle database logical and\
    \ physical structure relationships\n\n![image](Images/sq.jpg) **Tip**   Logical\
    \ objects are only viewable from SQL after the database has been started. In contrast,\
    \ physical objects can be viewed via OS utilities even if the instance is not\
    \ started.\n\n[Figure 10-3](#9781430257288_Ch10.xhtml#Fig3) doesn’t show all the\
    \ relationships of all logical and physical aspects of an Oracle database. Rather,\
    \ it focuses on components that you’re most likely to encounter on a daily basis.\
    \ This base relational diagram forms a foundation for leveraging of Oracle’s data\
    \ dictionary infrastructure.\n\nKeep an image of [Figure 10-3](#9781430257288_Ch10.xhtml#Fig3)\
    \ open in your mind; now, juxtapose it with [Figure 10-4](#9781430257288_Ch10.xhtml#Fig4).\n\
    \n![9781430257288_Fig10-04.jpg](Images/9781430257288_Fig10-04.jpg)\n\n[Figure\
    \ 10-4](#9781430257288_Ch10.xhtml#_Fig4). Relationships of commonly used data\
    \ dictionary views\n\nVoila, these data dictionary views map very closely to almost\
    \ all the logical and physical elements of an Oracle database. [Figure 10-4](#9781430257288_Ch10.xhtml#Fig4)\
    \ doesn’t show every data dictionary view. Indeed, the figure barely scratches\
    \ the surface. However, this diagram does provide you with a secure foundation\
    \ on which to build your understanding of how to leverage the data dictionary\
    \ views to get the data you need to do your job.\n\nThe diagram does show relationships\
    \ between views, but it doesn’t specify which columns to use when joining views\
    \ together. You’ll have to describe the tables and make an educated guess as to\
    \ how the views should be joined. For example, suppose you want to display the\
    \ data files associated with tablespaces that aren’t locally managed. That requires\
    \ joining DBA_TABLESPACES to DBA_DATA_FILES. If you inspect those two views, you’ll\
    \ notice that each contains a TABLESPACE_NAME column, which allows you to write\
    \ a query as follows:\n\n```\nselect a.tablespace_name, a.extent_management, b.file_name\n\
    from dba_tablespaces a,\n     dba_data_files  b\nwhere a.tablespace_name = b.tablespace_name\n\
    and a.extent_management != 'LOCAL';\n```\n\nIt’s generally somewhat obvious how\
    \ to join the views. Use the diagram as a guide for where to start looking for\
    \ information and how to write SQL queries that will provide answers to problems\
    \ and expand your knowledge of Oracle’s internal architecture and inner workings.\
    \ This anchors your problem-solving skills on a solid foundation. Once you firmly\
    \ understand the relationships of Oracle’s logical and physical components and\
    \ how this relates to the data dictionary, you can confidently address any type\
    \ of database issue.\n\n![image](Images/sq.jpg) **Note**   As of Oracle Database\
    \ 12c, there are several thousand CDB/DBA/ALL/USER static views and more than\
    \ 700 V$ dynamic performance views.\n\nA Few Creative Uses of the Data Dictionary\n\
    \nIn nearly every chapter of this book, you’ll find several SQL examples of how\
    \ to leverage the data dictionary to better understand concepts and resolve problems.\
    \ Having said that, it’s worth showing a few offbeat examples of how DBAs leverage\
    \ the data dictionary. The next few sections do just that. Keep in mind that this\
    \ is just the tip of the iceberg: there are an endless number of queries and techniques\
    \ that DBAs employ to extract and use data dictionary information.\n\nDerivable\
    \ Documentation\n\nSometimes, if you’re troubleshooting an issue and are under\
    \ pressure, you need to quickly extract information from the data dictionary to\
    \ help resolve the problem. However, you may not know the exact name of a data\
    \ dictionary view or its associated columns. If you’re like me, it’s impossible\
    \ to keep all the data dictionary view names and column names in your head. Additionally,\
    \ I work with databases from versions 8 through 12c, and it’s difficult to keep\
    \ track of which particular view may be available with a given release of Oracle.\n\
    \nBooks and posters can provide this information, but if you can’t find exactly\
    \ what you’re looking for, you can use the documentation contained in the data\
    \ dictionary itself. You can query from three views, in particular:\n\n*   DBA_OBJECTS\n\
    *   DICTIONARY\n*   DICT_COLUMNS\n\nIf you know roughly the name of the view from\
    \ which you want to select information, you can first query from DBA_OBJECTS.\
    \ For instance, if you’re troubleshooting an issue regarding materialized views,\
    \ and you can’t remember the exact names of the data dictionary views associated\
    \ with materialized views, you can do this:\n\n```\nselect object_name\nfrom dba_objects\n\
    where object_name like '%MV%'\nand owner = 'SYS';\n```\n\nThat may be enough to\
    \ get you in the ballpark. But, often you need more information about each view.\
    \ This is when the DICTIONARY and DICT_COLUMNS views can be invaluable. The DICTIONARY\
    \ view stores the names of the data dictionary views. It has two columns:\n\n\
    ```\nSQL  >  desc dictionary\n\nName                                      Null?    Type\n\
    ----------------------------------------- -------- ----------------------------\n\
    TABLE_NAME                                         VARCHAR2(30)\nCOMMENTS                                          \
    \ VARCHAR2(4000)\n```\n\nFor example, say you’re troubleshooting an issue with\
    \ materialized views, and you want to determine the names of data dictionary views\
    \ related to the materialized view feature. You can run a query such as this:\n\
    \n```\nselect table_name, comments\nfrom dictionary\nwhere table_name like '%MV%';\n\
    ```\n\nHere is a snippet of the output:\n\n```\nTABLE_NAME                COMMENTS\n\
    ------------------------- -------------------------------------------------------\n\
    DBA_MVIEW_LOGS            All materialized view logs in the database\nDBA_MVIEWS                All\
    \ materialized views in the database\nDBA_MVIEW_ANALYSIS        Description of\
    \ the materialized views accessible to dba\nDBA_MVIEW_COMMENTS        Comments\
    \ on all materialized views in the database\n```\n\nIn this manner, you can quickly\
    \ determine which view you need to access. If you want further information about\
    \ the view, you can describe it; for example,\n\n```\nSQL  >  desc dba_mviews\n\
    ```\n\nIf that doesn’t give you enough information regarding the column names,\
    \ you can query the D ICT_COLUMNS view. This view provides comments about the\
    \ columns of a data dictionary view; for example,\n\n```\nselect column_name,\
    \ comments\nfrom dict_columns\nwhere table_name = 'DBA_MVIEWS';\n```\n\nHere is\
    \ a fraction of the output:\n\n```\nCOLUMN_NAME             COMMENTS\n-----------------------\
    \ ---------------------------------------------\nOWNER                   Owner\
    \ of the materialized view\nMVIEW_NAME              Name of the materialized view\n\
    CONTAINER_NAME          Name of the materialized view container table\nQUERY                  \
    \ The defining query that the materialized view instantiates\n```\n\nIn this way,\
    \ you can generate and view documentation regarding most data dictionary objects.\
    \ The technique allows you to quickly identify appropriate views and the columns\
    \ that may help you in a troubleshooting situation.\n\nDisplaying User Information\n\
    \nYou may find yourself in an environment that contains hundreds of databases\
    \ located on dozens of different servers. In such a scenario, you want to ensure\
    \ that you don’t run the wrong commands or connect to the wrong database, or both.\
    \ When performing DBA tasks, it’s prudent to verify that you’re connected as the\
    \ appropriate account and to the correct database. You can run the following types\
    \ of SQL commands to verify the currently connected user and database information:\n\
    \n```\nSQL  >  show user;\nSQL  >  select * from user_users;\nSQL  >  select name\
    \ from v$database;\nSQL  >  select instance_name, host_name from v$instance;\n\
    ```\n\nAs shown in [Chapter 3](#9781430257288_Ch03.xhtml), an efficient way of\
    \ staying aware of your environment is to set your SQL*Plus prompt automatically,\
    \ via the login.sql script, to display user and instance information. This example\
    \ manually sets the SQL prompt:\n\n```\nSQL  >  set sqlprompt '&_USER.@&_CONNECT_IDENTIFIER.\
    \  >  '\n```\n\nHere is what the SQL prompt now looks like:\n\n```\nSYS@O12C>\n\
    ```\n\nYou can also use the SYS_CONTEXT built-in SQL function to extract information\
    \ from the data dictionary regarding details about your currently connected session.\
    \ The general syntax for this function is as follows:\n\n```\nSYS_CONTEXT('  <namespace\
    \  >  ','  <parameter  >  ',[length])\n```\n\nThis example displays the user,\
    \ authentication method, host, and instance:\n\n```\nselect\n sys_context('USERENV','CURRENT_USER')\
    \ usr\n,sys_context('USERENV','AUTHENTICATION_METHOD') auth_mth\n,sys_context('USERENV','HOST')\
    \ host\n,sys_context('USERENV','INSTANCE_NAME') inst\nfrom dual;\n```\n\nU SERENV\
    \ is a built-in Oracle namespace. More than 50 parameters are available when you\
    \ use the USERENV namespace with the SYS_CONTEXT function. [Table 10-1](#9781430257288_Ch10.xhtml#Tab1)\
    \ describes some of the more useful parameters. See the *Oracle SQL Language Reference\
    \ Guide*, which can be freely downloaded from the Technology Network area of the\
    \ Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)), for a complete\
    \ list of parameters.\n\n[Table 10-1.](#9781430257288_Ch10.xhtml#_Tab1) Useful\
    \ USERENV Parameters Available with SYS_CONTEXT\n\n| Parameter Name | Description\
    \ |\n| --- | --- |\n| AUTHENTICATED_IDENTITY | Identity used in authentication\
    \ |\n| AUTHENTICATION_METHOD | Method of authentication |\n| CON_ID | Container\
    \ identifier |\n| CON_NAME | Container name |\n| CURRENT_USER | Username for the\
    \ currently active session |\n| DB_NAME | Name specified by the DB_NAME initialization\
    \ parameter |\n| DB_UNIQUE_NAME | Name specified by the DB_UNIQUE_NAME initialization\
    \ parameter |\n| HOST | Hostname for the machine on which the client initiated\
    \ the database connection |\n| INSTANCE_NAME | Instance name |\n| IP_ADDRESS |\
    \ IP address of the machine on which the client initiated the database connection\
    \ |\n| ISDBA | TRUE if the user authenticated with DBA privileges through the\
    \ OS or password file |\n| NLS_DATE_FORMAT | Date format for the session |\n|\
    \ OS_USER | OS user from the machine on which the client initiated the database\
    \ connection |\n| SERVER_HOST | Hostname of the machine on which the database\
    \ instance is running |\n| SERVICE_NAME | Service name for the connection |\n\
    | SID | Session identifier |\n| TERMINAL | OS identifier for the client terminal\
    \ |\n\n**DETERMINING YOUR ENVIRONMENT’S DETAILS**\n\nSometimes, when deploying\
    \ code through various development, test, beta, and production environments, it’s\
    \ handy to be prompted as to whether you’re in the correct environment. The technique\
    \ for accomplishing this requires two files: answer_yes.sql and answer_no.sql.\
    \ Here are the contents of answer_yes.sql:\n\n-- answer_yes.sql\n\nPROMPT\n\n\
    PROMPT Continuing...\n\nAnd, here is answer_no.sql:\n\n-- answer_no.sql\n\nPROMPT\n\
    \nPROMPT Quitting and discarding changes...\n\nROLLBACK;\n\nEXIT;\n\nNow, you\
    \ can insert the following code into the first part of your deployment script;\
    \ the code will prompt you as to whether you’re in the right environment and if\
    \ you want to continue:\n\nWHENEVER SQLERROR EXIT FAILURE ROLLBACK;\n\nWHENEVER\
    \ OSERROR EXIT FAILURE ROLLBACK;\n\nselect host_name from v$instance;\n\nselect\
    \ name as db_name from v$database;\n\nSHOW user;\n\nSET ECHO OFF;\n\nPROMPT\n\n\
    ACCEPT answer PROMPT 'Correct environment? Enter yes to continue: '\n\n@@answer_&answer..sql\n\
    \nIf you type in yes, then the answer_yes.sql script will execute, and you will\
    \ continue to run any other scripts you call. If you type in no, then the answer_no.sql\
    \ script will run, and you will exit from SQL*Plus and end up at the OS prompt.\
    \ If you press the Enter key without typing either, you will also exit and return\
    \ to the OS prompt.\n\nDisplaying Table Row Counts\n\nWhen you’re investigating\
    \ performance or space issues, it’s useful to display each table’s row count.\
    \ To calculate row counts manually, you would write a query such as this for each\
    \ table that you own:\n\n```\nSQL  >  select count(*) from  <  table_name>;\n\
    ```\n\nManually crafting the SQL is time-consuming and error prone. In this situation\
    \ it’s more efficient to use SQL to generate the SQL required to solve the problem.\
    \ To that end, this next example dynamically selects the required text, based\
    \ on information in the DBA_TABLES view. An output file is spooled that contains\
    \ the dynamically generated SQL. Run the following SQL code as a DBA-privileged\
    \ schema. Note that this script contains SQL*Plus-specific commands, such as UNDEFINE\
    \ and SPOOL. The script prompts you each time for a username:\n\n```\nUNDEFINE\
    \ user\nSPOOL tabcount_&&user..sql\nSET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY\
    \ OFF FEED OFF TERM OFF\nSELECT\n  'SELECT RPAD(' || '''' || table_name || ''''\
    \ ||',30)'\n  || ',' || ' COUNT(*) FROM &&user..' || table_name || ';'\nFROM dba_tables\n\
    WHERE owner = UPPER('&&user')\nORDER BY 1;\nSPO OFF;\nSET TERM ON\n@@tabcount_&&user..sql\n\
    SET VERIFY ON FEED ON\n```\n\nThis code generates a file, named tabcount_ < user\
    \ > .sql, that contains the SQL statements that select row counts from all tables\
    \ in the specified schema. If the username you provide to the script is INVUSER,\
    \ then you can manually run the generated script as follows:\n\n```\nSQL  >  @tabcount_invuser.sql\n\
    ```\n\nKeep in mind that if the table row counts are high, this script can take\
    \ a long time to run (several minutes).\n\nDevelopers and DBAs often use SQL to\
    \ generate SQL statements. This is a useful technique when you need to apply the\
    \ same SQL process (repetitively) to many different objects, such as all tables\
    \ in a schema. If you don’t have access to DBA-level views, you can query the\
    \ USER_TABLES view; for example,\n\n```\nSPO tabcount.sql\nSET LINESIZE 132 PAGESIZE\
    \ 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF\nSELECT\n  'SELECT RPAD(' || ''''\
    \ || table_name || '''' ||',30)'\n  || ',' || ' COUNT(*) FROM ' || table_name\
    \ || ';'\nFROM user_tables\nORDER BY 1;\nSPO OFF;\nSET TERM ON\n@@tabcount.sql\n\
    SET VERIFY ON FEED ON\n```\n\nIf you have accurate statistics, you can query the\
    \ NUM_ROWS column of the CDB/DBA/ALL/USER_TABLES views. This column normally has\
    \ a close row count if statistics are generated on a regular basis. The following\
    \ query selects NUM_ROWS from the USER_TABLES view:\n\n```\nSQL  >  select table_name,\
    \ num_rows from user_tables;\n```\n\nOne final note: if you have partitioned tables\
    \ and want to show row counts by partition, use the next few lines of SQL and\
    \ PL/SQL code to generate the SQL required:\n\n```\nUNDEFINE user\nSET SERVEROUT\
    \ ON SIZE 1000000 VERIFY OFF\nSPO part_count_&&user..txt\nDECLARE\n  counter  NUMBER;\n\
      sql_stmt VARCHAR2(1000);\n  CURSOR c1 IS\n  SELECT table_name, partition_name\n\
      FROM dba_tab_partitions\n  WHERE table_owner = UPPER('&&user');\nBEGIN\n  FOR\
    \ r1 IN c1 LOOP\n    sql_stmt := 'SELECT COUNT(*) FROM &&user..' || r1.table_name\n\
          ||' PARTITION ( '||r1.partition_name ||' )';\n    EXECUTE IMMEDIATE sql_stmt\
    \ INTO counter;\n    DBMS_OUTPUT.PUT_LINE(RPAD(r1.table_name\n      ||'('||r1.partition_name||')',30)\
    \ ||' '||TO_CHAR(counter));\n  END LOOP;\nEND;\n/\nSPO OFF\n```\n\n**MANUALLY\
    \ GENERATING STATISTICS**\n\nIf you want to generate statistics for a table, use\
    \ the DBMS_STATS package. This example generates statistics for a user and a table:\n\
    \nSQL > exec dbms_stats.gather_table_stats(ownname=> 'MV_MAINT',-\n\n          tabname=\
    \ > 'F_SALES',-\n\n          cascade= > true,estimate_percent=> 20,degree=> 4);\n\
    \nYou can generate statistics for all objects for a user with the following code:\n\
    \nSQL > exec dbms_stats.gather_schema_stats(ownname = > 'MV_MAINT',-\n\n          estimate_percent\
    \ = > DBMS_STATS.AUTO_SAMPLE_SIZE,-\n\n          degree = > DBMS_STATS.AUTO_DEGREE,-\n\
    \n          cascade = > true);\n\nThe prior code instructs Oracle to estimate\
    \ the percentage of the table to be sampled with the ESTIMATE_PERCENT parameter,\
    \ using DBMS_STATS.AUTO_SAMPLE_SIZE. Oracle also chooses the appropriate degree\
    \ of parallelism with the DEGREE parameter setting of DBMS_STATS.AUTO_DEGREE.\
    \ The CASCADE parameter instructs Oracle to generate statistics for indexes.\n\
    \nKeep in mind that it’s possible that Oracle won’t choose the optimal auto sample\
    \ size. Oracle may choose 10 percent, but you may have experience with setting\
    \ a low percentage, such as 5 percent, and know that is an acceptable number.\
    \ In these situations, don’t use the AUTO_SAMPLE_SIZE; explicitly provide a number\
    \ instead.\n\nShowing Primary Key and Foreign Key Relationships\n\nSometimes when\
    \ you’re diagnosing constraint issues, it’s useful to display data dictionary\
    \ information regarding what primary key constraint is associated with a foreign\
    \ key constraint. For example, perhaps you’re attempting to insert into a child\
    \ table, and an error is thrown indicating that the parent key doesn’t exist,\
    \ and you want to display more information about the parent key constraint.\n\n\
    The following script queries the DBA_CONSTRAINTS data dictionary view to determine\
    \ the parent primary key constraints that are related to child foreign key constraints.\
    \ You need to provide as input to the script the owner of the table and the child\
    \ table for which you wish to display primary key constraints:\n\n```\nselect\n\
     a.constraint_type cons_type\n,a.table_name      child_table\n,a.constraint_name\
    \ child_cons\n,b.table_name      parent_table\n,b.constraint_name parent_cons\n\
    ,b.constraint_type cons_type\nfrom dba_constraints a\n    ,dba_constraints b\n\
    where a.owner    = upper('&owner')\nand a.table_name = upper('&table_name')\n\
    and a.constraint_type = 'R'\nand a.r_owner = b.owner\nand a.r_constraint_name\
    \ = b.constraint_name;\n```\n\nThe preceding script prompts you for two SQL*Plus\
    \ ampersand variables (OWNER, TABLE_NAME); if you aren’t using SQL*Plus, then\
    \ you may need to modify the script with the appropriate values before you run\
    \ it.\n\nThe following output shows that there are two foreign key constraints.\
    \ It also shows the parent table primary key constraints:\n\n```\nC CHILD_TABLE    \
    \ CHILD_CONS          PARENT_TABLE    PARENT_CONS         C\n- ---------------\
    \ ------------------- --------------- ------------------- -\nR REG_COMPANIES  \
    \ REG_COMPANIES_FK2   D_COMPANIES     D_COMPANIES_PK      P\nR REG_COMPANIES  \
    \ REG_COMPANIES_FK1   CLUSTER_BUCKETS CLUSTER_BUCKETS_PK  P\n```\n\nWhen the CONSTRAINT_TYPE\
    \ column (of DBA/ALL/USER_CONSTRAINTS) contains an R value, this indicates that\
    \ the row describes a referential integrity constraint, which means that the child\
    \ table constraint references a primary key constraint. You use the technique\
    \ of joining to the same table twice to retrieve the primary key constraint information.\
    \ The child constraint columns (R_OWNER, R_CONSTRAINT_NAME) match with another\
    \ row in the DBA_CONSTRAINTS view that contains the primary key information.\n\
    \nYou can also do the reverse of the prior query in this section; for a primary\
    \ key constraint, you want to find the foreign key columns (if any) that correlate\
    \ to it. The next script takes the primary key record and looks to see if it has\
    \ any child records with a constraint type of R. When you run this script, you’re\
    \ prompted for the primary key table owner and name:\n\n```\nselect\n  b.table_name        primary_key_table\n\
     ,a.table_name        fk_child_table\n ,a.constraint_name   fk_child_table_constraint\n\
    from dba_constraints a\n    ,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n\
    and   a.r_owner           = b.owner\nand   a.constraint_type   = 'R'\nand   b.owner            \
    \ = upper('&table_owner')\nand   b.table_name        = upper('&table_name');\n\
    ```\n\nHere is some sample output:\n\n```\nPRIMARY_KEY_TABLE    FK_CHILD_TABLE      \
    \ FK_CHILD_TABLE_CONSTRAINT\n-------------------- -------------------- ------------------------------\n\
    CLUSTER_BUCKETS      CB_AD_ASSOC          CB_AD_ASSOC_FK1\nCLUSTER_BUCKETS      CLUSTER_CONTACTS    \
    \ CLUSTER_CONTACTS_FK1\nCLUSTER_BUCKETS      CLUSTER_NOTES        CLUSTER_NOTES_FK1\n\
    ```\n\nDisplaying Object Dependencies\n\nSay you need to drop a table, but before\
    \ you drop it, you want to display any objects that are dependent on it. For example,\
    \ you may have a table that has synonyms, views, materialized views, functions,\
    \ procedures, and triggers that rely on it. Before making the change, you want\
    \ to review what other objects are dependent on the table. You can use the D BA_DEPENDENCIES\
    \ data dictionary view to display object dependencies. The following query prompts\
    \ you for a username and an object name:\n\n```\nselect '  +  ' || lpad(' ',level\
    \  +  2) || type || ' ' || owner || '.' || name  dep_tree\nfrom dba_dependencies\n\
    connect by prior owner = referenced_owner and prior name = referenced_name\nand\
    \ prior type = referenced_type\nstart with referenced_owner = upper('&object_owner')\n\
    and referenced_name = upper('&object_name')\nand owner is not null;\n```\n\nIn\
    \ the output each object listed has a dependency on the object you entered. Lines\
    \ are indented to show the dependency of an object on the object in the preceding\
    \ line:\n\n```\nDEP_TREE\n\n+   TRIGGER STAR2.D_COMPANIES_BU_TR1\n+   MATERIALIZED\
    \ VIEW CIA.CB_RAD_COUNTS\n+   SYNONYM STAR1.D_COMPANIES\n+    SYNONYM CIA.D_COMPANIES\n\
    +     MATERIALIZED VIEW CIA.CB_RAD_COUNTS\n```\n\nIn this example the object being\
    \ analyzed is a table named D_COMPANIES. Several synonyms, materialized views,\
    \ and one trigger are dependent on this table. For instance, the materialized\
    \ view C B_RAD_COUNTS, owned by CIA, is dependent on the synonym D_COMPANIES,\
    \ owned by CIA, which in turn is dependent on the D_COMPANIES synonym, owned by\
    \ STAR1.\n\nThe D BA_DEPENDENCIES view contains a hierarchical relationship between\
    \ the OWNER, NAME and TYPE columns and their referenced column names of REFERENCED_OWNER,\
    \ REFERENCED_NAME, and REFERENCED_TYPE. Oracle provides a number of constructs\
    \ to perform hierarchical queries. For instance, START WITH and CONNECT BY allow\
    \ you to identify a starting point in a tree and walk either up or down the hierarchical\
    \ relationship.\n\nThe previous SQL query in this section operates on only one\
    \ object. If you want to inspect every object in a schema, you can use SQL to\
    \ generate SQL to create scripts that display all dependencies for a schema’s\
    \ objects. The piece of code in the next example does that. For formatting and\
    \ output, the code uses some constructs specific to SQL*Plus, such as setting\
    \ the page sizes and line size and spooling the output:\n\n```\nUNDEFINE owner\n\
    SET LINESIZE 132 PAGESIZE 0 VERIFY OFF FEEDBACK OFF TIMING OFF\nSPO dep_dyn_&&owner..sql\n\
    SELECT 'SPO dep_dyn_&&owner..txt' FROM DUAL;\n--\nSELECT\n'PROMPT ' || '_____________________________'||\
    \ CHR(10) ||\n'PROMPT ' || object_type || ': ' || object_name || CHR(10) ||\n\
    'SELECT ' || '''' || '  +  ' || '''' || ' ' ||  '|| LPAD(' || '''' || ' '\n||\
    \ '''' || ',level  +  3)' || CHR(10) || ' || type || ' || '''' || ' ' || ''''\
    \ ||\n' || owner || ' || '''' || '.' || '''' || ' || name' || CHR(10) ||\n' FROM\
    \ dba_dependencies ' || CHR(10) ||\n' CONNECT BY PRIOR owner = referenced_owner\
    \ AND prior name = referenced_name '\n|| CHR(10) ||\n' AND prior type = referenced_type\
    \ ' || CHR(10) ||\n' START WITH referenced_owner = ' || '''' || UPPER('&&owner')\
    \ || '''' || CHR(10) ||\n' AND referenced_name = ' || '''' || object_name || ''''\
    \ || CHR(10) ||\n' AND owner IS NOT NULL;'\nFROM dba_objects\nWHERE owner = UPPER('&&owner')\n\
    AND object_type NOT IN ('INDEX','INDEX PARTITION','TABLE PARTITION');\n--\nSELECT\
    \ 'SPO OFF' FROM dual;\nSPO OFF\nSET VERIFY ON LINESIZE 80 FEEDBACK ON\n```\n\n\
    You should now have a script named dep_dyn_ <owner > .sql, created in the same\
    \ directory from which you run the script. This script contains all the SQL required\
    \ to display dependencies on objects in the owner you entered. Run the script\
    \ to display object dependencies. In this example, the owner is CIA:\n\n```\n\
    SQL  >  @dep_dyn_cia.sql\n```\n\nWhen the script runs, it spools a file with the\
    \ format dep_dyn_ < owner > .txt. You can open that text file with an OS editor\
    \ to view its contents. Here is a sample of the output from this example:\n\n\
    ```\nTABLE: DOMAIN_NAMES\n+    FUNCTION STAR2.GET_DERIVED_COMPANY\n+    TRIGGER\
    \ STAR2.DOMAIN_NAMES_BU_TR1\n+    SYNONYM CIA_APP.DOMAIN_NAMES\n```\n\nThis output\
    \ shows that the table DOMAIN_NAMES has three objects that are dependent on it:\
    \ a function, a trigger, and a synonym.\n\n**THE DUAL TABLE**\n\nThe DUAL table\
    \ is part of the data dictionary. This table contains one row and one column and\
    \ is useful when you want to return a row and you don’t have to retrieve data\
    \ from a particular table. In other words, you just want to return a value. For\
    \ example, you can perform arithmetic operations, as follows:\n\nSQL > select\
    \ 34*.15 from dual;\n\n    34*.15\n\n       5.1\n\nOther common uses are selecting\
    \ from DUAL to show the current date or to display some text within an SQL script.\n\
    \nSummary\n\nSometimes, you’re handed an old database that has been running for\
    \ years, and it’s up to you to manage and maintain it. In some scenarios, you\
    \ aren’t given any documentation regarding the users and objects in the database.\
    \ Even if you have documentation, it may not be accurate or up-to-date. In these\
    \ situations, the data dictionary quickly becomes your source of documentation.\
    \ You can use it to extract user information, the physical structure of the database,\
    \ security information, objects and owners, currently connected users, and so\
    \ on.\n\nOracle provides static and dynamic views in the data dictionary. The\
    \ static views contain information about the objects in the database. The dynamic\
    \ performance views offer a real-time window into events currently transacting\
    \ in the database. These views provide information about currently connected users,\
    \ SQL executing, where resources are being consumed, and so on. DBAs use these\
    \ views extensively to monitor and troubleshoot performance issues.\n\nThe book\
    \ now turns its attention toward specialized Oracle features, such as large objects,\
    \ partitioning, Data Pump, and external tables. These topics are covered in the\
    \ next several chapters.\n\nCHAPTER 16\n\n![image](Images/frontdot.jpg)\n\nUser-Managed\
    \ Backup and Recovery\n\nAll DBAs should know how to back up a database. Even\
    \ more critical, a DBA must be able to restore and recover a database. When media\
    \ failures occur, everybody looks to the DBA to get the database up and running.\
    \ There are two common, yet very different, Oracle approaches for backup and recovery:\n\
    \n*   User-managed approach\n*   RMAN approach\n\nUser-managed backups are aptly\
    \ named because you manually perform all steps associated with the backup or recovery,\
    \ or both. There are two types of user-managed backups: cold backups and hot backups.\
    \ Cold backups are sometimes called offline backups because the database is shut\
    \ down during the backup process. Hot backups are also referred to as online backups\
    \ because the database is available during the backup procedure.\n\nRMAN is Oracle’s\
    \ flagship backup and recovery tool. It automates and manages most aspects of\
    \ backup and recovery. For Oracle backup and recovery, you should use RMAN. So,\
    \ why have a chapter about user-managed backups when this approach has been gathering\
    \ dust for more than a decade? Consider the following reasons for understanding\
    \ user-managed backup and recovery:\n\n*   You still find shops using user-managed\
    \ backup and recovery techniques. Therefore, you’re required to be knowledgeable\
    \ about this technology.\n*   Manually executing a user-managed backup, restore,\
    \ and recovery solidifies your understanding of the Oracle backup and recovery\
    \ architecture. This helps immensely when you’re troubleshooting issues with any\
    \ backup and recovery tool and lays the foundation of core knowledge for key Oracle\
    \ tools, such as RMAN and Data Guard.\n*   You’ll more fully appreciate RMAN and\
    \ the value of its features.\n*   Nightmarish database recovery stories recounted\
    \ by the old DBAs will now make sense.\n\nFor these reasons, you should be familiar\
    \ with user-managed backup and recovery techniques. Manually working through the\
    \ scenarios in this chapter will greatly increase your understanding of which\
    \ files are backed up and how they’re used in a recovery. You’ll be much better\
    \ prepared to use RMAN. RMAN makes much of backup and recovery automated and push-button.\
    \ However, knowledge of how to back up and recover a database manually helps you\
    \ think through and troubleshoot issues with any type of backup technology.\n\n\
    This chapter begins with cold backups. These types of backups are viewed as the\
    \ simplest form of user-managed backup because even a system administrator can\
    \ implement them. Next, the chapter discusses hot backups. You also investigate\
    \ several common restore-and-recovery scenarios. These examples build your base\
    \ knowledge of Oracle backup and recovery internals.\n\n![image](Images/sq.jpg) **Tip**  \
    \ In Oracle Database 12c, you can perform user-managed hot backups and cold backups\
    \ on pluggable databases; the user-managed backup and recovery technology works\
    \ fine. However, I would strongly recommend that you use RMAN to manage backup\
    \ and recovery in a pluggable environment. When connected to either the root container\
    \ or a pluggable container, RMAN automatically determines which data files need\
    \ to be backed up, their locations, and how to restore and recover. This task\
    \ quickly becomes unwieldy for user-managed backups, in which the DBA has to manage\
    \ this information for the root container and, potentially, numerous pluggable\
    \ databases.\n\nImplementing a Cold-Backup Strategy for a Noarchivelog Mode Database\n\
    \nYou perform a user-managed cold backup by copying files after the database has\
    \ been shut down. This type of backup is also known as an offline backup. Your\
    \ database can be in either noarchivelog mode or archivelog mode when you make\
    \ a cold backup.\n\nDBAs tend to think of a cold backup as being synonymous with\
    \ a backup of a database in noarchivelog mode. That isn’t correct. You can make\
    \ a cold backup of a database in archivelog mode, and that’s a backup strategy\
    \ that many shops employ. The differences between a cold backup with the database\
    \ in noarchivelog mode and in archivelog mode are detailed in the following sections.\n\
    \nMaking a Cold Backup of a Noarchivelog Mode Database\n\nOne main reason for\
    \ making a cold backup of a database in noarchivelog mode is to give you a way\
    \ to restore a database back to a point in time in the past. You should use this\
    \ type of backup only if you don’t need to recover transactions that occurred\
    \ after the backup. This type of backup and recovery strategy is acceptable only\
    \ if your business requirements allow for the loss of data and downtime. Rarely\
    \ would you ever implement this type of backup and recovery solution for a production\
    \ business database.\n\nHaving said that, there are some good reasons to implement\
    \ this type of backup. One common use is to make a cold backup of a development/test/training\
    \ database and periodically reset the database back to the baseline. This gives\
    \ you a way to restart a performance test or a training session with the same\
    \ point-in-time snapshot of the database.\n\n![image](Images/sq.jpg) **Tip**  \
    \ Consider using the Flashback Database feature to set your database back to a\
    \ point in time in the past (see [Chapter 19](#9781430257288_Ch19.xhtml) for more\
    \ details).\n\nThe example in this section shows you how to make a backup of every\
    \ critical file in your database: all control files, data files, temporary data\
    \ files, and online redo log files. With this type of backup, you can easily restore\
    \ your database back to the point in time when the backup was made. The main advantages\
    \ of this approach are that it’s conceptually simple and easy to implement. Here\
    \ are the steps required for a cold backup of a database in noarchivelog mode:\n\
    \n1.  Determine where to copy the backup files and how much space is required.\n\
    2.  Identify the locations and names of the database files to copy.\n3.  Shut\
    \ down the database with the IMMEDIATE, TRANSACTIONAL, or NORMAL clause.\n4. \
    \ Copy the files (identified in step 2) to the backup location (determined in\
    \ step 1).\n5.  Restart your database.\n\nThe following sections elaborate on\
    \ these steps.\n\nStep 1\\. Determine Where to Copy the Backup Files and How Much\
    \ Space Is Required\n\nIdeally, the backup location should be on a set of disks\
    \ separate from your live data files location. However, in many shops, you may\
    \ not have a choice and may be told which mount points are to be used by the database.\
    \ For this example the backup location is the directory /u01/cbackup/o12c. To\
    \ get a rough idea of how much space you need to store one copy of the backups,\
    \ you can run this query:\n\n```\nselect sum(sum_bytes)/1024/1024 m_bytes\nfrom(\n\
    select sum(bytes) sum_bytes from v$datafile\nunion\nselect sum(bytes) sum_bytes\
    \ from v$tempfile\nunion\nselect (sum(bytes) * members) sum_bytes from v$log\n\
    group by members);\n```\n\nYou can verify how much operating disk space is available\
    \ with the Linux/Unix df (disk free) command. Make sure that the amount of disk\
    \ space available at the OS is greater than the sum returned from the prior query:\n\
    \n```\n$ df -h\n```\n\nStep 2\\. Identify the Locations and Names of the Database\
    \ Files to Copy\n\nRun this query to list the names (and paths) of the files that\
    \ are included in a cold backup of a noarchivelog mode database:\n\n```\nselect\
    \ name from v$datafile\nunion\nselect name from v$controlfile\nunion\nselect name\
    \ from v$tempfile\nunion\nselect member from v$logfile;\n```\n\nBACKING UP ONLINE\
    \ REDO LOGS (OR NOT)\n\nDo you need to back up the online redo logs? No; you never\
    \ need to back up the online redo logs as part of any type of backup. Then, why\
    \ do DBAs back up the online redo logs as part of a cold backup? One reason is\
    \ that it makes the restore process for the noarchivelog mode scenario slightly\
    \ easier. The online redo logs are required to open the database in a normal manner.\n\
    \nIf you back up all files (including the online redo logs), then to get your\
    \ database back to the state it was in at the time of the backup, you restore\
    \ all files (including the online redo logs) and start up your database.\n\nStep\
    \ 3\\. Shut Down the Database\n\nConnect to your database as the SYS (or as a\
    \ SYSDBA-privileged user), and shut down your database, using IMMEDIATE, TRANSACTIONAL,\
    \ or NORMAL. In almost every situation, using IMMEDIATE is the preferred method.\
    \ This mode disconnects users, rolls back incomplete transactions, and shuts down\
    \ the database:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\
    \nStep 4\\. Create Backup Copies of the Files\n\nFor every file identified in\
    \ step 2, use an OS utility to copy the files to a backup directory (identified\
    \ in step 1). In this simple example all the data files, control files, temporary\
    \ database files, and online redo logs are in the same directory. In production\
    \ environments, you’ll most likely have files spread out in several different\
    \ directories. This example uses the Linux/Unix cp command to copy the database\
    \ files from /u01/dbfile/o12c to the /u01/cbackup/o12c directory:\n\n```\n$ cp\
    \ /u01/dbfile/o12c/*.*  /u01/cbackup/o12c\n```\n\nStep 5\\. Restart Your Database\n\
    \nAfter all the files are copied, you can start up your database:\n\n```\n$ sqlplus\
    \ / as sysdba\nSQL> startup;\n```\n\nRestoring a Cold Backup in Noarchivelog Mode\
    \ with Online Redo Logs\n\nThe next example explains how to restore from a cold\
    \ backup of a database in noarchivelog mode. If you included the online redo logs\
    \ as part of the cold backup, you can include them when you restore the files.\
    \ Here are the steps involved in this procedure:\n\n1.  Shut down the instance.\n\
    2.  Copy the data files, online redo logs, temporary files, and control files\
    \ back from the backup to the live database data file locations.\n3.  Start up\
    \ your database.\n\nThese steps are detailed in the following sections.\n\nStep\
    \ 1\\. Shut Down the Instance\n\nShut down the instance, if it’s running. In this\
    \ scenario it doesn’t matter how you shut down the database, because you’re restoring\
    \ back to a point in time (with no recovery of transactions). Any files in the\
    \ live database directory locations are overwritten when the backup files are\
    \ copied back. If your instance is running, you can abruptly abort it. As a SYSDBA-privileged\
    \ user, do the following:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n\
    ```\n\nStep 2\\. Copy the Files Back from the Backup\n\nThis step does the reverse\
    \ of the backup: you’re copying files from the backup location to the live database\
    \ file locations. In this example all the backup files are located in the /u01/cbackup/o12c\
    \ directory, and all files are being copied to the /u01/dbfile/o12c directory:\n\
    \n```\n$ cp /u01/cbackup/o12c/*.*  /u01/dbfile/o12c\n```\n\nStep 3\\. Start Up\
    \ the database\n\nConnect to your database as SYS (or a user that has SYSDBA privileges),\
    \ and start up your database:\n\n```\n$ sqlplus / as sysdba\nSQL> startup;\n```\n\
    \nAfter you finish these steps, you should have an exact copy of your database\
    \ as it was when you made the cold backup. It’s as if you set your database back\
    \ to the point in time when you made the backup.\n\nRestoring a Cold Backup in\
    \ Noarchivelog Mode Without Online Redo Logs\n\nAs mentioned earlier, you don’t\
    \ ever need the online redo logs when restoring from a cold backup. If you made\
    \ a cold backup of your database in noarchivelog mode and didn’t include the online\
    \ redo logs as part of the backup, the steps to restore are nearly identical to\
    \ the steps in the previous section. The main difference is that the last step\
    \ requires you to open your database, using the OPEN RESETLOGS clause. Here are\
    \ the steps:\n\n1.  Shut down the instance.\n2.  Copy the control files and data\
    \ files back from the backup.\n3.  Start up the database in mount mode.\n4.  Open\
    \ the database with the OPEN RESETLOGS clause.\n\nStep 1\\. Shut Down the Instance\n\
    \nShut down the instance, if it’s running. In this scenario it doesn’t matter\
    \ how you shut down the database, because you’re restoring back to a point in\
    \ time. Any files in the live database directory locations are overwritten when\
    \ the backups are copied. If your instance is running, you can abruptly abort\
    \ it. As a SYSDBA-privileged user, do the following:\n\n```\n$ sqlplus / as sysdba\n\
    SQL> shutdown abort;\n```\n\nStep 2\\. Copy the Files Back from the Backup\n\n\
    Copy the control files and data files from the backup location to the live data\
    \ file locations:\n\n```\n$ cp <backup directory>/*.*  <live database file directory>\n\
    ```\n\nStep 3\\. Start Up the Database in Mount Mode\n\nConnect to your database\
    \ as SYS or a user with SYSDBA privileges, and start the database in mount mode:\n\
    \n```\n$ sqlplus / as sysdba\nSQL> startup mount\n```\n\nStep 4\\. Open the Database\
    \ with the OPEN RESETLOGS Clause\n\nOpen your database for use with the OPEN RESETLOGS\
    \ clause:\n\n```\nSQL> alter database open resetlogs;\n```\n\nIf you see the Database\
    \ altered message, the command was successful. However, you may see this error:\n\
    \n```\nORA-01139: RESETLOGS option only valid after an incomplete database recovery\n\
    ```\n\nIn this case, issue the following command:\n\n```\nSQL> recover database\
    \ until cancel;\n```\n\nYou should see this message:\n\n```\nMedia recovery complete.\n\
    ```\n\nNow, attempt to open your database with the OPEN RESETLOGS clause:\n\n\
    ```\nSQL> alter database open resetlogs;\n```\n\nThis statement instructs Oracle\
    \ to recreate the online redo logs. Oracle uses information in the control file\
    \ for the placement, name, and size of the redo logs. If there are old online\
    \ redo log files in those locations, they’re overwritten.\n\nIf you’re monitoring\
    \ your alert.log throughout this process, you may see ORA-00312 and ORA-00313\\\
    . This means that Oracle can’t find the online redo log files; this is okay, because\
    \ these files aren’t physically available until they’re recreated by the OPEN\
    \ RESETLOGS command.\n\nScripting a Cold Backup and Restore\n\nIt’s instructional\
    \ to view how to script a cold backup. The basic idea is to dynamically query\
    \ the data dictionary to determine the locations and names of the files to be\
    \ backed up. This is preferable to hard-coding the directory locations and file\
    \ names in a script. The dynamic generation of a script is less prone to errors\
    \ and surprises (e.g., the addition of new data files to a database but not to\
    \ an old, hard-coded backup script).\n\n![image](Images/sq.jpg) **Note**   The\
    \ scripts in this section aren’t meant to be production-strength backup and recovery\
    \ scripts. Rather, they illustrate the basic concepts of scripting a cold backup\
    \ and subsequent restore.\n\nThe first script in this section makes a cold backup\
    \ of a database. Before you use the cold backup script, you need to modify these\
    \ variables in the script to match your database environment:\n\n*   ORACLE_SID\n\
    *   ORACLE_HOME\n*   cbdir\n\nThe cbdir variable specifies the name of the backup-directory\
    \ location. The script creates a file named coldback.sql, which is executed from\
    \ SQL*Plus to initiate a cold backup of the database:\n\n```\n#!/bin/bash\nORACLE_SID=o12c\n\
    ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
    #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
    \ off trimsp on\ndefine cbdir=/u01/cbackup/o12c\nspo coldback.sql\nselect 'shutdown\
    \ immediate;' from dual;\nselect '!cp ' || name || ' ' || '&&cbdir'   from v\\\
    $datafile;\nselect '!cp ' || name || ' ' || '&&cbdir'   from v\\$tempfile;\nselect\
    \ '!cp ' || member || ' ' || '&&cbdir' from v\\$logfile;\nselect '!cp ' || name\
    \ || ' ' || '&&cbdir'   from v\\$controlfile;\nselect 'startup;' from dual;\n\
    spo off;\n@@coldback.sql\nEOF\nexit 0\n```\n\nThis file generates commands that\
    \ are to be executed from an SQL*Plus script to make a cold backup of a database.\
    \ You place an exclamation mark (!) in front of the Unix cp command to instruct\
    \ SQL*Plus to host out to the OS to run the cp command. You also place a backward\
    \ slash (\\) in front of each dollar sign ($) when referencing v$ data dictionary\
    \ views; this is required in a Linux/Unix shell script. The \\ escapes the $ and\
    \ tells the shell script not to treat the $ as a special character (the $ normally\
    \ signifies a shell variable).\n\nAfter you run this script, here is a sample\
    \ of the copy commands written to the coldback.sql script:\n\n```\nshutdown immediate;\n\
    !cp /u01/dbfile/o12c/system01.dbf /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/sysaux01.dbf\
    \ /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/undotbs01.dbf /u01/cbackup/o12c\n!cp\
    \ /u01/dbfile/o12c/users01.dbf /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/tools01.dbf\
    \ /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/temp01.dbf /u01/cbackup/o12c\n!cp /u01/oraredo/o12c/redo02a.rdo\
    \ /u01/cbackup/o12c\n!cp /u02/oraredo/o12c/redo02b.rdo /u01/cbackup/o12c\n!cp\
    \ /u01/oraredo/o12c/redo01a.rdo /u01/cbackup/o12c\n!cp /u02/oraredo/o12c/redo01b.rdo\
    \ /u01/cbackup/o12c\n!cp /u01/oraredo/o12c/redo03a.rdo /u01/cbackup/o12c\n!cp\
    \ /u02/oraredo/o12c/redo03b.rdo /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/control01.ctl\
    \ /u01/cbackup/o12c\n!cp /u01/dbfile/o12c/control02.ctl /u01/cbackup/o12c\nstartup;\n\
    ```\n\nWhile you make a cold backup, you should also generate a script that provides\
    \ the commands to copy data files, temp files, log files, and control files back\
    \ to their original locations. You can use this script to restore from the cold\
    \ backup. The next script in this section dynamically creates a coldrest.sql script\
    \ that copies files from the backup location to the original data file locations.\
    \ You need to modify this script in the same manner that you modified the cold\
    \ backup script (i.e., change the ORACLE_SID, ORACLE_HOME, and cbdir variables\
    \ to match your environment):\n\n```\n#!/bin/bash\nORACLE_SID=o12c\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
    \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/o12c\ndefine\
    \ dbname=$ORACLE_SID\nspo coldrest.sql\nselect 'shutdown abort;' from dual;\n\
    select '!cp ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1) ||\n      \
    \ ' ' || name   from v\\$datafile;\nselect '!cp ' || '&&cbdir/' || substr(name,\
    \ instr(name,'/',-1,1)+1) ||\n       ' ' || name   from v\\$tempfile;\nselect\
    \ '!cp ' || '&&cbdir/' || substr(member, instr(member,'/',-1,1)+1) ||\n      \
    \ ' ' || member from v\\$logfile;\nselect '!cp ' || '&&cbdir/' || substr(name,\
    \ instr(name,'/',-1,1)+1) ||\n       ' ' || name   from v\\$controlfile;\nselect\
    \ 'startup;' from dual;\nspo off;\nEOF\nexit 0\n```\n\nThis script creates a script,\
    \ named coldrest.sql, that generates the copy commands to restore your data files,\
    \ temp files, log files, and control files back to their original locations. After\
    \ you run this shell script, here is a snippet of the code in the coldrest.sql\
    \ file:\n\n```\nshutdown abort;\n!cp /u01/cbackup/o12c/system01.dbf /u01/dbfile/o12c/system01.dbf\n\
    !cp /u01/cbackup/o12c/sysaux01.dbf /u01/dbfile/o12c/sysaux01.dbf\n!cp /u01/cbackup/o12c/undotbs01.dbf\
    \ /u01/dbfile/o12c/undotbs01.dbf\n!cp /u01/cbackup/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf\n\
    !cp /u01/cbackup/o12c/tools01.dbf /u01/dbfile/o12c/tools01.dbf\n\n...\n!cp /u01/cbackup/o12c/redo03b.rdo\
    \ /u02/oraredo/o12c/redo03b.rdo\n!cp /u01/cbackup/o12c/control01.ctl /u01/dbfile/o12c/control01.ctl\n\
    !cp /u01/cbackup/o12c/control02.ctl /u01/dbfile/o12c/control02.ctl\nstartup;\n\
    ```\n\nIf you need to restore from a cold backup using this script, log in to\
    \ SQL*Plus as SYS, and execute the script:\n\n```\n$ sqlplus / as sysdba\nSQL>\
    \ @coldrest.sql\n```\n\nMaking a Cold Backup of an Archivelog Mode Database\n\n\
    You can use a backup of a database in archivelog mode to restore and recover up\
    \ to the last committed transaction prior to a failure. Therefore, unlike a backup\
    \ of a noarchivelog mode database, this type of backup is not necessarily intended\
    \ to be used to reset the database back to a point in time in the past from which\
    \ no recovery can be applied. The purpose of a backup of an archivelog mode database\
    \ is usually to restore the database and roll forward and apply transactions to\
    \ fully recover the database.\n\nThis has significant implications for the backups.\
    \ Recall that for a noarchivelog mode database, DBAs sometimes include the online\
    \ redo logs as part of the backup. For a backup of an archivelog mode database,\
    \ you should never include the online redo logs in the backup. The online redo\
    \ logs contain the most currently generated redo transaction information for the\
    \ database. Any transactions in the current online redo logs that haven’t been\
    \ archived are required for a complete recovery. In the event of a failure, you\
    \ don’t want to overwrite the online redo logs with backups of online redo logs\
    \ taken from a point in time in the past; this would result in the inability to\
    \ perform a complete recovery.\n\nThe high-level steps for a cold backup of a\
    \ database in archivelog mode are identical to those for a noarchivelog mode database:\n\
    \n1.  Determine where to copy the backup files and how much space is required.\n\
    2.  Identify the locations and names of the database files to copy.\n3.  Shut\
    \ down the database with the IMMEDIATE, TRANSACTIONAL, or NORMAL clause.\n4. \
    \ Copy the files (identified in step 2) to the backup location (determined in\
    \ step 1).\n5.  Restart your database.\n\nThe main difference between the cold\
    \ archivelog mode backup and noarchivelog mode backup is that in step 2, you run\
    \ this query to identify the files to be backed up:\n\n```\nselect name from v$datafile\n\
    union\nselect name from v$controlfile;\n```\n\nAlso, you don’t need to back up\
    \ the data files associated with the TEMP tablespace. As of Oracle Database 10g,\
    \ Oracle automatically attempts to create missing data files associated with the\
    \ TEMP tablespace (for locally managed temp tablespaces) when the database is\
    \ started.\n\nRestoring and recovering with a cold backup of a database in archivelog\
    \ mode is nearly identical to the restore and recovery from a hot backup. See\
    \ the sections “Performing a Complete Recovery of an Archivelog Mode Database”\
    \ and “Performing an Incomplete Recovery of an Archivelog Mode Database,” later\
    \ in this chapter, for discussion of how to restore and recover from a database\
    \ in archivelog mode.\n\nUNDERSTANDING THE MECHANICS DOES MATTER\n\nKnowing how\
    \ a hot backup works also helps in untangling and surviving difficult RMAN scenarios.\
    \ RMAN is a sophisticated and highly automated tool. With just a few commands,\
    \ you can back up, restore, and recover your database. However, if there is a\
    \ failure with any RMAN command or step, an understanding of Oracle’s underlying\
    \ internal restore-and-recovery architecture pays huge dividends. A detailed knowledge\
    \ of how to restore and recover from a hot backup helps you logically think your\
    \ way through any RMAN scenario.\n\nWhen you ride a bike, understanding how the\
    \ derailleurs and gears and shifting work helps a great deal. You can usually\
    \ tell when a rider knows only to push one button to go slower and another button\
    \ to go faster. Riders who understand in more detail how the chain moves between\
    \ gears will always be smoother at shifting gears. My editor, Jonathan Gennick,\
    \ recounted the following anecdote while reading an early draft of this chapter:\n\
    \nI loaned my bike to a guy the other week and went on a ride with him. You should\
    \ have heard the horrible noises he conjured out of my derailleurs and drivetrain.\
    \ I thought he was going to damage the bike. After a few minutes, he rode up to\
    \ me and told me that my front derailleur wasn’t working right.\n\n“The derailleur\
    \ was fine. He was just one of those guys who knows only how to push the button,\
    \ without any understanding of what goes on underneath that action.”\n\nSimilarly,\
    \ effort you put into understanding how backup and recovery is implemented pays\
    \ off in the long run. You actually have less to remember—because your understanding\
    \ of the underlying operation enables you to think through problems and solve\
    \ them in ways that checklists don’t.\n\nImplementing a Hot Backup Strategy\n\n\
    As discussed previously, RMAN should be your tool of choice for any type of Oracle\
    \ database backup (either online or offline). RMAN is more efficient than user-managed\
    \ backups and automates most tasks. Having said that, one of the best ways to\
    \ gain an understanding of Oracle backup and recovery internals is to make a hot\
    \ backup and then use that backup to restore and recover your database. Manually\
    \ issuing the commands involved in a hot backup, followed by a restore and recovery,\
    \ helps you understand the role of each type of file (control files, data files,\
    \ archive redo logs, online redo logs) in a restore-and-recovery scenario.\n\n\
    The following sections begin by showing you how to implement a hot backup. They\
    \ also provide basic scripts that you can use to automate the hot backup process.\
    \ Later sections explain some of the internal mechanics of a hot backup and clarify\
    \ why you must put tablespaces in backup mode before the hot backup takes place.\n\
    \nMaking a Hot Backup\n\nHere are the steps required for a hot backup:\n\n1. \
    \ Ensure that the database is in archivelog mode.\n2.  Determine where to copy\
    \ the backup files.\n3.  Identify which files need to be backed up.\n4.  Note\
    \ the maximum sequence number of the online redo logs.\n5.  Alter the database/tablespace\
    \ into backup mode.\n6.  Copy the data files with an OS utility to the location\
    \ determined in step 2.\n7.  Alter the database/tablespace out of backup mode.\n\
    8.  Archive the current online redo log, and note the maximum sequence number\
    \ of the online redo logs.\n9.  Back up the control file.\n10.  Back up any archive\
    \ redo logs generated during the backup.\n\nThese steps are covered in detail\
    \ in the following sections.\n\nStep 1\\. Ensure That the Database Is in Archivelog\
    \ Mode\n\nRun the following command to check the archivelog mode status of your\
    \ database:\n\n```\nSQL> archive log list;\n```\n\nThe output shows that this\
    \ database is in archivelog mode:\n\n```\nDatabase log mode              Archive\
    \ Mode\nAutomatic archival             Enabled\nArchive destination            /u01/oraarch/o12c\n\
    ```\n\nIf you’re not sure how to enable archiving, see [Chapter 5](#9781430257288_Ch05.xhtml)\
    \ for details.\n\nStep 2\\. Determine Where to Copy the Backup Files\n\nNow, determine\
    \ the backup location. For this example the backup location is the directory /u01/hbackup/o12c.\
    \ To get a rough idea of how much space you need, you can run this query:\n\n\
    ```\nSQL> select sum(bytes) from dba_data_files;\n```\n\nIdeally, the backup location\
    \ should be on a set of disks separate from your live data files. But, in practice,\
    \ many times you’re given a slice of space on a SAN and have no idea about the\
    \ underlying disk layout. In these situations, you rely on redundancy’s being\
    \ built into the SAN hardware (RAID disks, multiple controllers, and so on) to\
    \ ensure high availability and recoverability.\n\nStep 3\\. Identify Which Files\
    \ Need to Be Backed Up\n\nFor this step, you only need to know the locations of\
    \ the data files:\n\n```\nSQL> select name from v$datafile;\n```\n\nWhen you get\
    \ to step 5, you may want to consider altering tablespaces one at a time into\
    \ backup mode. If you take that approach, you need to know which data files are\
    \ associated with which tablespace:\n\n```\nselect tablespace_name, file_name\n\
    from dba_data_files\norder by 1,2;\n```\n\nStep 4\\. Note the Maximum Sequence\
    \ Number of the Online Redo Logs\n\nTo successfully recover using a hot backup,\
    \ you require, at minimum, all the archive redo logs that were generated during\
    \ the backup. For this reason, you need to note the archivelog sequence before\
    \ starting the hot backup:\n\n```\nselect thread#, max(sequence#)\nfrom v$log\n\
    group by thread#\norder by thread#;\n```\n\nStep 5\\. Alter the Database/Tablespaces\
    \ into Backup Mode\n\nYou can put all your tablespaces into backup mode at the\
    \ same time, using the ALTER DATABASE BEGIN BACKUP statement:\n\n```\nSQL> alter\
    \ database begin backup;\n```\n\nIf it’s an active OLTP database, doing this can\
    \ greatly degrade performance. This is because when a tablespace is in backup\
    \ mode, Oracle copies a full image of any block (when it’s first modified) to\
    \ the redo stream (see the section “Understanding the Split-Block Issue,” later\
    \ in this chapter, for more details).\n\nThe alternative is to alter only one\
    \ tablespace at a time into backup mode. After the tablespace has been altered\
    \ into backup mode, you can copy the associated data files (step 6) and then alter\
    \ the tablespace out of backup mode (step 7). You have to do this for each tablespace:\n\
    \n```\nSQL> alter tablespace <tablespace_name> begin backup;\n```\n\nStep 6\\\
    . Copy the Data Files with an OS Utility\n\nUse an OS utility (Linux/Unix cp command)\
    \ to copy the data files to the backup location. In this example all the data\
    \ files are in one directory, and they’re all copied to the same backup directory:\n\
    \n```\n$ cp /u01/dbfile/o12c/*.dbf  /u01/hbackup/o12c\n```\n\nStep 7\\. Alter\
    \ the Database/Tablespaces out of Backup Mode\n\nAfter you’re finished copying\
    \ all your data files to the backup directory, you need to alter the tablespaces\
    \ out of backup mode. This example alters all tablespaces out of backup mode at\
    \ the same time:\n\n```\nSQL> alter database end backup;\n```\n\nIf you’re altering\
    \ your tablespaces into backup mode one at a time, you need to alter each tablespace\
    \ out of backup mode after its data files have been copied:\n\n```\nSQL> alter\
    \ tablespace <tablespace_name> end backup;\n```\n\nIf you don’t take the tablespaces\
    \ out of backup mode, you can seriously degrade performance and compromise the\
    \ ability to recover your database. You can verify that no data files have an\
    \ ACTIVE status with the following query:\n\n```\nSQL> alter session set nls_date_format\
    \ = 'DD-MON-RRRR HH24:MI:SS';\nSQL> select * from v$backup where status='ACTIVE';\n\
    ```\n\n![image](Images/sq.jpg) **Note**   Setting the NLS_DATE_FORMAT parameter\
    \ appropriately will allow you to see the exact date/time when the data file was\
    \ placed into backup mode. This is useful for determining the starting sequence\
    \ number of the archivelog needed, in the event that the data file needs to be\
    \ recovered.\n\nStep 8\\. Archive the Current Online Redo Log, and Note the Maximum\
    \ Sequence Number of the Online Redo Logs\n\nThe following statement instructs\
    \ Oracle to archive any unarchived online redo logs and to initiate a log switch.\
    \ This ensures that an end-of-backup marker is written to the archive redo logs:\n\
    \n```\nSQL> alter system archive log current;\n```\n\nAlso, note the maximum online\
    \ redo log sequence number. If a failure occurs immediately after the hot backup,\
    \ you need any archive redo logs generated during the hot backup to fully recover\
    \ your database:\n\n```\nselect thread#, max(sequence#)\nfrom v$log\ngroup by\
    \ thread#\norder by thread#;\n```\n\nStep 9\\. Back Up the Control File\n\nFor\
    \ a hot backup, you can’t use an OS copy command to make a backup of the control\
    \ file. Oracle’s hot backup procedure specifies that you must use the ALTER DATABASE\
    \ BACKUP CONTROLFILE statement. This example makes a backup of the control file\
    \ and places it in the same location as the database backup files:\n\n```\nSQL>\
    \ alter database backup controlfile\n     to '/u01/hbackup/o12c/controlbk.ctl'\
    \ reuse;\n```\n\nThe REUSE clause instructs Oracle to overwrite the file if it\
    \ already exists in the backup location.\n\nStep 10\\. Back Up Any Archive Redo\
    \ Logs Generated During the Backup\n\nBack up the archive redo logs that were\
    \ generated during the hot backup. You can do this with an OS copy command:\n\n\
    ```\n$ cp <archive redo logs generated during backup>  <backup directory>\n```\n\
    \nThis procedure guarantees that you have the logs, even if a failure should occur\
    \ soon after the hot backup finishes. Be sure you don’t back up an archive redo\
    \ log that is currently being written to by the archiver process—doing so results\
    \ in an incomplete copy of that file. Sometimes, DBAs script this process by checking\
    \ the maximum SEQUENCE# with the maximum RESETLOGS_ID in the V$ARCHIVED_LOG view.\
    \ Oracle updates that view when it’s finished copying the archive redo log to\
    \ disk. Therefore, any archive redo log file that appears in the V$ARCHIVED_LOG\
    \ view should be safe to copy.\n\nScripting Hot Backups\n\nThe script in this\
    \ section covers the minimal tasks associated with a hot backup. For a production\
    \ environment a hot backup script can be quite complex. The script given here\
    \ provides you with a baseline of what you should include in a hot backup script.\
    \ You need to modify these variables in the script for it to work in your environment:\n\
    \n*   ORACLE_SID\n*   ORACLE_HOME\n*   hbdir\n\nThe ORACLE_SID OS variable defines\
    \ your database name. The ORACLE_HOME OS variable defines where you installed\
    \ the Oracle software. The SQL*Plus hbdir variable points to the directory for\
    \ the hot backups.\n\n```\n#!/bin/bash\nORACLE_SID=o12c\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
    \ lines 132 verify off feed off trimsp on\ndefine hbdir=/u01/hbackup/o12c\nspo\
    \ hotback.sql\nselect 'spo &&hbdir/hotlog.txt' from dual;\nselect 'select max(sequence#)\
    \ from v\\$log;' from dual;\nselect 'alter database begin backup;' from dual;\n\
    select '!cp ' || name || ' ' || '&&hbdir' from v\\$datafile;\nselect 'alter database\
    \ end backup;' from dual;\nselect 'alter database backup controlfile to ' || ''''\
    \ || '&&hbdir'\n       || '/controlbk.ctl'  || '''' || ' reuse;' from dual;\n\
    select 'alter system archive log current;' from dual;\nselect 'select max(sequence#)\
    \ from v\\$log;' from dual;\nselect 'select member from v\\$logfile;' from dual;\n\
    select 'spo off;' from dual;\nspo off;\n@@hotback.sql\nEOF\n```\n\nThe script\
    \ generates a hotback.sql script. This script contains the commands for performing\
    \ the hot backup. Here is a listing of the hotback.sql script for a test database:\n\
    \n```\nspo /u01/hbackup/o12c/hotlog.txt\nselect max(sequence#) from v$log;\nalter\
    \ database begin backup;\n!cp /u01/dbfile/o12c/system01.dbf /u01/hbackup/o12c\n\
    !cp /u01/dbfile/o12c/sysaux01.dbf /u01/hbackup/o12c\n!cp /u01/dbfile/o12c/undotbs01.dbf\
    \ /u01/hbackup/o12c\n!cp /u01/dbfile/o12c/users01.dbf /u01/hbackup/o12c\n!cp /u01/dbfile/o12c/tools01.dbf\
    \ /u01/hbackup/o12c\nalter database end backup;\nalter database backup controlfile\
    \ to '/u01/hbackup/o12c/controlbk.ctl' reuse;\nalter system archive log current;\n\
    select max(sequence#) from v$log;\nselect member from v$logfile;\nspo off;\n```\n\
    \nYou can run this script manually from SQL*Plus, like this:\n\n```\nSQL> @hotback.sql\n\
    ```\n\n![image](Images/sq.jpg) **Caution**   If the previous script fails on a\
    \ statement before ALTER DATABASE END BACKUP is executed, you must take your database\
    \ (tablespaces) out of backup mode by manually running ALTER DATABASE END BACKUP\
    \ from SQL*Plus (as the SYS user).\n\nWhile you generate the hot backup script,\
    \ it’s prudent to generate a script that you can use to copy the data files from\
    \ a backup directory. You have to modify the hbdir variable in this script to\
    \ match the location of the hot backups for your environment. Here is a script\
    \ that generates the copy commands:\n\n```\n#!/bin/bash\nORACLE_SID=o12c\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
    \ lines 132 verify off feed off trimsp on\ndefine hbdir=/u01/hbackup/o12c/\ndefine\
    \ dbname=$ORACLE_SID\nspo hotrest.sql\nselect '!cp ' || '&&hbdir' || substr(name,instr(name,'/',-1,1)+1)\n\
           || ' ' || name from v\\$datafile;\nspo off;\nEOF\n#\nexit 0\n```\n\nFor\
    \ my environment here is the code generated that can be executed from SQL*Plus\
    \ to copy the data files back from the backup directory, if a failure should occur:\n\
    \n```\n!cp /u01/hbackup/o12c/system01.dbf /u01/dbfile/o12c/system01.dbf\n!cp /u01/hbackup/o12c/sysaux01.dbf\
    \ /u01/dbfile/o12c/sysaux01.dbf\n!cp /u01/hbackup/o12c/undotbs01.dbf /u01/dbfile/o12c/undotbs01.dbf\n\
    !cp /u01/hbackup/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf\n!cp /u01/hbackup/o12c/tools01.dbf\
    \ /u01/dbfile/o12c/tools01.dbf\n```\n\nIn this output, you can remove the exclamation\
    \ point (!) from each line if you prefer to run the commands from the OS prompt.\
    \ The main idea is that these commands are available in the event of a failure,\
    \ so you know which files have been backed up to which location and how to copy\
    \ them back.\n\n![image](Images/sq.jpg) **Tip**   Don’t use user-managed hot backup\
    \ technology for online backups; use RMAN. RMAN doesn’t need to place tablespaces\
    \ in backup mode and automates nearly everything related to backup and recovery.\n\
    \nUnderstanding the Split-Block Issue\n\nTo perform a hot backup, one critical\
    \ step is to alter a tablespace into backup mode before you copy any of the data\
    \ files associated with the tablespace, using an OS utility. To understand why\
    \ you have to alter a tablespace into backup mode, you must be familiar with what\
    \ is sometimes called the split- (or fractured-) block issue.\n\nRecall that the\
    \ size of a database block is often different from that of an OS block. For instance,\
    \ a database block may be sized at 8KB, whereas the OS block size is 4KB. As part\
    \ of the hot backup, you use an OS utility to copy the live data files. While\
    \ the OS utility is copying the data files, the possibility exists that database\
    \ writers are writing to a block simultaneously. Because the Oracle block and\
    \ the OS block are different sizes, the following may happen:\n\n1.  The OS utility\
    \ copies part of the Oracle block.\n2.  A moment later, a database writer updates\
    \ the entire block.\n3.  A split second later, the OS utility copies the latter\
    \ half of the Oracle block.\n\nThis can result in the OS copy of the block’s being\
    \ inconsistent with what Oracle wrote to the OS. [Figure 16-1](#9781430257288_Ch16.xhtml#Fig1)\
    \ illustrates this concept.\n\n![9781430257288_Fig16-01.jpg](Images/9781430257288_Fig16-01.jpg)\n\
    \n[Figure 16-1](#9781430257288_Ch16.xhtml#_Fig1). Hot backup split- (or fractured-)\
    \ block issue\n\nLooking at [Figure 16-1](#9781430257288_Ch16.xhtml#Fig1), the\
    \ block copied to disk at time 3 is corrupt, as far as Oracle is concerned. The\
    \ first half of the block is from time 1, and the latter half is copied at time\
    \ 3\\. When you make a hot backup, you’re guaranteeing block-level corruption\
    \ in the backups of the data files.\n\nTo understand how Oracle resolves the split-block\
    \ issue, first consider a database operating in its normal mode (not in backup\
    \ mode). The redo information that is written to the online redo logs is only\
    \ what Oracle needs, to reapply transactions. The redo stream doesn’t contain\
    \ entire blocks of data. Oracle only records a change vector in the redo stream\
    \ that specifies which block changed and how it was changed. [Figure 16-2](#9781430257288_Ch16.xhtml#Fig2)\
    \ shows Oracle operating under normal conditions.\n\n![9781430257288_Fig16-02.jpg](Images/9781430257288_Fig16-02.jpg)\n\
    \n[Figure 16-2](#9781430257288_Ch16.xhtml#_Fig2). Oracle normally only writes\
    \ change vectors to the redo stream\n\nNow, consider what happens during a hot\
    \ backup. For a hot backup, before you copy the data files associated with a tablespace,\
    \ you must first alter the tablespace into backup mode. While in this mode, before\
    \ Oracle modifies a block, the entire block is copied to the redo stream. Any\
    \ subsequent changes to the block only require that the normal redo-change vectors\
    \ be written to the redo stream. This is illustrated in [Figure 16-3](#9781430257288_Ch16.xhtml#Fig3).\n\
    \n![9781430257288_Fig16-03.jpg](Images/9781430257288_Fig16-03.jpg)\n\n[Figure\
    \ 16-3](#9781430257288_Ch16.xhtml#_Fig3). Entire blocks are written to the redo\
    \ stream\n\nTo understand why Oracle logs the entire block to the redo stream,\
    \ consider what happens during a restore and recovery. First, the backup files\
    \ from the hot backup are restored. As explained earlier, these backup files contain\
    \ corrupt blocks, owing to the split-block issue. But, it doesn’t matter, because\
    \ once Oracle recovers the data files, for any block that was modified during\
    \ the hot backup, Oracle has an image copy of the block as it was before it was\
    \ modified. Oracle uses the copy of the block it has in the redo stream as a starting\
    \ point for the recovery (of that block). This process is illustrated in [Figure\
    \ 16-4](#9781430257288_Ch16.xhtml#Fig4).\n\n![9781430257288_Fig16-04.jpg](Images/9781430257288_Fig16-04.jpg)\n\
    \n[Figure 16-4](#9781430257288_Ch16.xhtml#_Fig4). Restore and recovery of a split\
    \ block\n\nIn this way, it doesn’t matter if there are corrupt blocks in the hot\
    \ backup files. Oracle always starts the recovery process for a block from a copy\
    \ of the block (as it was before it was modified) in the redo stream.\n\nUnderstanding\
    \ the Need for Redo Generated During Backup\n\nWhat happens if you experience\
    \ a failure soon after you make a hot backup? Oracle knows when a tablespace was\
    \ put in backup mode (begin backup system SCN written to the redo stream), and\
    \ Oracle knows when the tablespace was taken out of backup mode (end-of-backup\
    \ marker written to the redo stream). Oracle requires every archive redo log generated\
    \ during that time frame to successfully recover the data files.\n\n[Figure 16-5](#9781430257288_Ch16.xhtml#Fig5)\
    \ shows that, at minimum, the archive redo logs from sequence numbers 100 to 102\
    \ are required to recover the tablespace. These archive redo logs were generated\
    \ during the hot backup.\n\n![9781430257288_Fig16-05.jpg](Images/9781430257288_Fig16-05.jpg)\n\
    \n[Figure 16-5](#9781430257288_Ch16.xhtml#_Fig5). Recovery applied\n\nIf you attempt\
    \ to stop the recovery process before all redo between the begin and end markers\
    \ has been applied to the data file, Oracle throws this error:\n\n```\nORA-01195:\
    \ online backup of file 1 needs more recovery to be consistent\n```\n\nAll redo\
    \ generated during the hot backup of a tablespace must be applied to the data\
    \ files before they can be opened. Oracle, at a minimum, needs to apply everything\
    \ between the begin-backup SCN marker and the end-backup marker, to account for\
    \ every block modified while the tablespace was in backup mode. This redo is in\
    \ the archive redo log files; or, if the failure happened right after the backup\
    \ ended, some of the redo may not have been archived and may be in the online\
    \ redo logs. Therefore, you have to instruct Oracle to apply what’s in the online\
    \ redo logs.\n\nUnderstanding that Data Files are Updated\n\nNote that, in [Figures\
    \ 16-2](#9781430257288_Ch16.xhtml#Fig2) and [16-3](#9781430257288_Ch16.xhtml#Fig3),\
    \ the behavior of the database writer is, for the most part, unchanged throughout\
    \ the backup procedure. The database writer continues to write blocks to data\
    \ files, regardless of the backup mode of the database. The database writer doesn’t\
    \ care if a hot backup is taking place; its job is to write blocks from the buffer\
    \ cache to the data files.\n\nEvery once in a while, you run into a DBA who states\
    \ that the database writer doesn’t write to data files during user-managed hot\
    \ backups. This is a widespread misconception. Use some common sense: if the database\
    \ writer isn’t writing to the data files during a hot backup, then where are the\
    \ changes being written? If the transactions are being written to somewhere other\
    \ than the data files, how would those data files be resynchronized after the\
    \ backup? It doesn’t make any sense.\n\nSome DBAs say, “The data file header is\
    \ frozen, which means no changes to the data file.” Oracle does freeze the SCN\
    \ to indicate the start of the hot backup in the data file header and doesn’t\
    \ update that SCN until the tablespace is taken out of backup mode. This “frozen\
    \ SCN” doesn’t mean that blocks aren’t being written to data files during the\
    \ backup. You can easily demonstrate that a data file is written to during backup\
    \ mode by doing this:\n\n1.  Put a tablespace in backup mode:\n\n    ```\n   \
    \ SQL> alter tablespace users begin backup;\n    ```\n\n2.  Create a table that\
    \ has a character field:\n\n    ```\n    SQL> create table cc(cc varchar2(20))\
    \ tablespace users;\n    ```\n\n3.  Insert a string into that table:\n\n    ```\n\
    \    SQL> insert into cc values('DBWR does write');\n    ```\n\n4.  Force a checkpoint\
    \ (which ensures that all modified buffers are written to disk):\n\n    ```\n\
    \    SQL> alter system checkpoint;\n    ```\n\n5.  From the OS, use the strings\
    \ and grep commands to search for the string in the data file:\n\n    ```\n  \
    \  $ strings /u01/dbfile/o12c/users01.dbf | grep \"DBWR does write\"\n    ```\n\
    \n6.  Here is the output, proving that the database writer did write the data\
    \ to disk:\n\n    ```\n    DBWR does write\n    ```\n\n7.  Don’t forget to take\
    \ the tablespace out of backup mode:\n\n    ```\n    SQL> alter tablespace users\
    \ end backup;\n    ```\n\nPerforming a Complete Recovery of an Archivelog Mode\
    \ Database\n\nThe term *complete recovery* means that you can recover all transactions\
    \ that were committed before a failure occurred. *Complete recovery* doesn’t mean\
    \ you that completely restore and recover the entire database. For instance, if\
    \ only one data file has experienced media failure, you need to restore and recover\
    \ only the damaged data file to perform a complete recovery.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you have access to a test or development database, take the time to walk\
    \ through every step in each of the examples that follow. Going through these\
    \ steps can teach you more about backup and recovery than any documentation.\n\
    \nThe steps outlined here apply to any database backed up while in archivelog\
    \ mode. It doesn’t matter if you made a cold backup or hot backup. The steps to\
    \ restore and recover data files are the same, as long as the database was in\
    \ archivelog mode during the backup. For a complete recovery, you need\n\n*  \
    \ to be able to restore the data files that have experienced media failure\n*\
    \   access to all archive redo logs generated since the last backup was started\n\
    *   intact online redo logs\n\nHere is the basic procedure for a complete recovery:\n\
    \n1.  Place the database in mount mode; this prevents normal user transaction\
    \ processing from reading/writing to data files being restored. (If you’re not\
    \ restoring the SYSTEM or UNDO tablespace, you have the option of opening the\
    \ database and manually taking the data files offline before restoring them. If\
    \ you do this, make sure you place the data files online after the recovery is\
    \ complete.)\n2.  Restore the damaged data files with an OS copy utility.\n3.\
    \  Issue the appropriate SQL*Plus RECOVER command to apply any information required\
    \ in the archive redo logs and online redo logs.\n4.  Alter the database open.\n\
    \nThe next several sections demonstrate some common complete restore-and-recovery\
    \ scenarios. You should be able to apply these basic scenarios to diagnose and\
    \ recover from any complex situation you find yourself in.\n\nRestoring and Recovering\
    \ with the Database Offline\n\nThis section details a simple restore-and-recovery\
    \ scenario. Described next are the steps to simulate a failure and then perform\
    \ a complete restore and recovery. Try this scenario in a development database.\
    \ Ensure that you have a good backup and that you aren’t trying this experiment\
    \ in a database that contains critical business data.\n\nBefore you start this\
    \ example, create a table, and insert some data. This table and data are selected\
    \ from the end of the complete recovery process to demonstrate a successful recovery:\n\
    \n```\nSQL> create table foo(foo number) tablespace users;\nSQL> insert into foo\
    \ values(1);\nSQL> commit;\n```\n\nNow, switch the online logs several times.\
    \ Doing so ensures that you have to apply archive redo logs as part of the recovery:\n\
    \n```\nSQL> alter system switch logfile;\n```\n\nThe forward slash (/) reruns\
    \ the most recently executed SQL statement:\n\n```\nSQL> /\nSQL> /\nSQL> /\n```\n\
    \nNext, simulate a media failure by renaming the data file associated with the\
    \ USERS tablespace. You can identify the name of this file with this query:\n\n\
    ```\nSQL> select file_name from dba_data_files where tablespace_name='USERS';\n\
    \nFILE_NAME\n\n/u01/dbfile/o12c/users01.dbf\n```\n\nFrom the OS, rename the file:\n\
    \n```\n$ mv /u01/dbfile/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf.old\n```\n\
    \nAnd, attempt to stop your database:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown\
    \ immediate;\n```\n\nYou should see an error  such as this:\n\n```\nORA-01116:\
    \ error in opening database file ...\n```\n\nIf this were a real disaster, it\
    \ would be prudent to navigate to the data file directory, list the files, and\
    \ see if the file in question was in its correct location. You should also inspect\
    \ the alert.log file to see if any relevant information is logged there by Oracle.\n\
    \nNow that you’ve simulated a media failure, the next several steps walk you through\
    \ a restore and complete recovery.\n\nStep 1\\. Place Your Database in Mount Mode\n\
    \nBefore you place your database in mount mode, you may need to first shut it\
    \ down, using ABORT:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\nSQL>\
    \ startup mount;\n```\n\nStep 2\\. Restore the Data File from the Backup\n\nThe\
    \ next step is to copy from the backup the data file that corresponds to the one\
    \ that has had a failure:\n\n```\n$ cp /u01/hbackup/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf\n\
    ```\n\nAt this point, it’s instructional to ponder what Oracle would do if you\
    \ attempted to start your database. When you issue the ALTER DATABASE OPEN statement,\
    \ Oracle inspects the SCN in the control file for each data file. You can examine\
    \ this SCN by querying V$DATAFILE:\n\n```\nSQL> select checkpoint_change# from\
    \ v$datafile where file#=4;\n\nCHECKPOINT_CHANGE#\n\n```\n\nOracle compares the\
    \ SCN in the control file with the SCN in the data file header. You can check\
    \ the SCN in the data file header by querying V$DATAFILE_HEADER; for example,\n\
    \n```\nselect file#, fuzzy, checkpoint_change#\nfrom v$datafile_header\nwhere\
    \ file#=4;\n\n     FILE# FUZ CHECKPOINT_CHANGE#\n---------- --- ------------------\n\
             4 YES            3502285\n```\n\nNote that the SCN recorded in V$DATAFILE_HEADER\
    \ is less than the SCN in V$DATAFILE for the same data file. If you attempt to\
    \ open your database, Oracle throws an error stating that media recovery is required\
    \ (meaning that you need to apply redo) to synchronize the SCN in the data file\
    \ with the SCN in the control file. The FUZZY column is set to YES. This indicates\
    \ that redo must be applied to the data file before it can be opened for use.\
    \ Here is what happens when you try to open the database at this point:\n\n```\n\
    SQL> alter database open;\n\nalter database open;\nalter database open\n*\nERROR\
    \ at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\nOracle doesn’t\
    \ let you open the database until the SCN in all data file headers matches the\
    \ corresponding SCN in the control file.\n\nStep 3\\. Issue the Appropriate RECOVER\
    \ Statement\n\nThe archive redo logs and online redo logs have the information\
    \ required to catch up the data file SCN to the control file SCN. You can apply\
    \ redo to the data file that needs media recovery by issuing one of the following\
    \ SQL*Plus statements:\n\n*   RECOVER DATAFILE\n*   RECOVER TABLESPACE\n*   RECOVER\
    \ DATABASE\n\nBecause only one data file in this example needs to be recovered,\
    \ the RECOVER DATAFILE statement is appropriate. However, keep in mind that you\
    \ can run any of the previously listed RECOVER statements, and Oracle will figure\
    \ out what needs to be recovered. In this particular scenario, you may find it\
    \ easier to remember the name of the tablespace that contains the restored data\
    \ file(s) than to remember the data file name(s). Next, any data files that need\
    \ recovery in the USERS tablespace are recovered:\n\n```\nSQL> recover tablespace\
    \ users;\n```\n\nAt this point, Oracle uses the SCN in the data file header to\
    \ determine which archive redo log or online redo log to use to begin applying\
    \ redo. You can view the starting log sequence number that RMAN will use to begin\
    \ the recovery process via the following query:\n\n```\nselect\n HXFNM file_name\n\
    ,HXFIL file_num\n,FHTNM tablespace_name\n,FHTHR thread\n,FHRBA_SEQ sequence\n\
    from X$KCVFH\nwhere FHTNM = 'USERS';\n```\n\nIf all the redo required is in the\
    \ online redo logs, Oracle applies that redo and displays this message:\n\n```\n\
    Media recovery complete.\n```\n\nIf Oracle needs to apply redo that is only contained\
    \ in archived redo logs (meaning that the online redo log that contained the appropriate\
    \ redo has already been overwritten), you’re prompted with a recommendation from\
    \ Oracle as to which archive redo log to apply first:\n\n```\nORA-00279: change\
    \ 3502285 generated at 11/02/2012 10:49:39 needed for thread 1\nORA-00289: suggestion\
    \ : /u01/oraarch/o12c/1_1_798283209.dbf\nORA-00280: change 3502285 for thread\
    \ 1 is in sequence #1\n\nSpecify log: {<RET>=suggested | filename | AUTO | CANCEL}\n\
    ```\n\nYou can press Enter or Return (<RET>) to have Oracle apply the suggested\
    \ archive redo log file, specify a file name, specify AUTO to instruct Oracle\
    \ to apply any suggested files automatically, or type CANCEL to cancel out of\
    \ the recovery operation.\n\nIn this example, specify AUTO. Oracle applies all\
    \ redo in all archive redo log files and online redo log files to perform a complete\
    \ recovery:\n\n```\nAUTO\n```\n\nThe last message displayed after all required\
    \ archive redo and online redo have been applied is this:\n\n```\nLog applied.\n\
    Media recovery complete.\n```\n\nStep 4\\. Alter Your Database Open\n\nAfter the\
    \ media recovery is complete, you can open your database:\n\n```\nSQL> alter database\
    \ open;\n```\n\nYou can now verify that the transaction you committed just prior\
    \ to the media failure was restored and recovered:\n\n```\nSQL> select * from\
    \ foo;\n\n       FOO\n\n```\n\nRestoring and Recovering with a Database Online\n\
    \nIf you lose a data file associated with a tablespace other than SYSTEM and UNDO,\
    \ you can restore and recover the damaged data file while leaving the database\
    \ online. For this to work, any data files being restored and recovered must be\
    \ taken offline first. You may be alerted to an issue with a data file in which\
    \ a user is attempting to update a table and sees an error such as this:\n\n```\n\
    SQL> insert into foo values(2);\n\nORA-01116: error in opening database file ...\n\
    ```\n\nYou navigate to the OS directory that contains the data file and determine\
    \ that it has been erroneously removed by a system administrator.\n\nIn this example\
    \ the data file associated with the USERS tablespace is taken offline and subsequently\
    \ restored and recovered while the rest of the database remains online. First,\
    \ place take the data file offline:\n\n```\nSQL> alter database datafile '/u01/dbfile/o12c/users01.dbf'\
    \ offline;\n```\n\nNow, restore the appropriate data file from the backup location:\n\
    \n```\n$ cp /u01/hbackup/o12c/users01.dbf /u01/dbfile/o12c/users01.dbf\n```\n\n\
    In this situation, you can’t use RECOVER DATABASE. The RECOVER DATABASE statement\
    \ attempts to recover all data files in the database, of which the SYSTEM tablespace\
    \ is part. The SYSTEM tablespace can’t be recovered while the database is online.\
    \ If you use the RECOVER TABLESPACE, all data files associated with the tablespace\
    \ must be offline. In this case, it’s more appropriate to recover at the data\
    \ file level of granularity:\n\n```\nSQL> recover datafile '/u01/dbfile/o12c/users01.dbf';\n\
    ```\n\nOracle inspects the SCN in the data file header and determines which archive\
    \ redo log or online redo log to use to start applying redo. If all redo required\
    \ is in the online redo logs, you see this message:\n\n```\nMedia recovery complete.\n\
    ```\n\nIf the starting point for redo is contained only in an archive redo log\
    \ file, Oracle suggests which file to start with:\n\n```\nORA-00279: change 3502285\
    \ generated at 11/02/2012 10:49:39 needed for thread 1\nORA-00289: suggestion\
    \ : /u01/oraarch/o12c/1_1_798283209.dbf\nORA-00280: change 3502285 for thread\
    \ 1 is in sequence #1\n\nSpecify log: {<RET>=suggested | filename | AUTO | CANCEL}\n\
    ```\n\nYou can type AUTO to have Oracle apply all required redo in archive redo\
    \ log files and online redo log files:\n\n```\nAUTO\n```\n\nIf successful, you\
    \ should see this message:\n\n```\nLog applied.\nMedia recovery complete.\n```\n\
    \nYou can now bring the data file back online:\n\n```\nSQL> alter database datafile\
    \ '/u01/dbfile/o12c/users01.dbf' online;\n```\n\nIf successful, you should see\
    \ this:\n\n```\nDatabase altered.\n```\n\nRestoring Control Files\n\nWhen you’re\
    \ dealing with user-managed backups, you usually restore the control file in one\
    \ of these situations:\n\n*   A control file is damaged, and the file is multiplexed.\n\
    *   All control files are damaged.\n\nThese two situations are covered in the\
    \ following sections.\n\nRestoring a Damaged Control File When Multiplexed\n\n\
    If you configure your database with more than one control file, you can shut down\
    \ the database and use an OS command to copy an existing control file to the location\
    \ of the missing control file. For example, from the initialization file, you\
    \ know that two control files are used for this database:\n\n```\nSQL> show parameter\
    \ control_files\n\nNAME                         TYPE        VALUE\n----------------------------\
    \ ----------- ------------------------------\ncontrol_files                string      /u01/dbfile/o12c/control01.ctl\n\
                                             ,/u02/dbfile/o12c/control02.ctl\n```\n\
    \nSuppose the control02.ctl file has become damaged. Oracle throws this error\
    \ when querying the data dictionary:\n\n```\nORA-00210: cannot open the specified\
    \ control file...\n```\n\nWhen a good control file is available, you can shut\
    \ down the database, move the old/bad control file (this preserves it, in the\
    \ event that it is later needed for root cause analysis), and copy the existing\
    \ good control file to the name and location of the bad control file:\n\n```\n\
    SQL> shutdown abort;\n\n$ mv /u02/dbfile/o12c/control02.ctl /u02/dbfile/o12c/control02.ctl.old\n\
    $ cp /u01/dbfile/o12c/control01.ctl /u02/dbfile/o12c/control02.ctl\n```\n\nNow,\
    \ restart the database:\n\n```\nSQL> startup;\n```\n\nIn this manner, you can\
    \ restore a control file from an existing control file.\n\nRestoring When All\
    \ Control Files Are Damaged\n\nIf you lose all of your control files, you can\
    \ restore one from a backup, or you can recreate the control file. As long as\
    \ you have all your data files and any required redo (archive redo and online\
    \ redo), you should be able to recover your database completely. The steps for\
    \ this scenario are as follows:\n\n1.  Shut down the database.\n2.  Restore a\
    \ control file from the backup.\n3.  Start the database in mount mode, and initiate\
    \ database recovery, using the RECOVER DATABASE USING BACKUP CONTROLFILE clause.\n\
    4.  For a complete recovery, manually apply the redo contained in the online redo\
    \ logs.\n5.  Open the database with the OPEN RESETLOGS clause.\n\nIn this example\
    \ all control files for the database were accidentally deleted, and Oracle subsequently\
    \ reports this error:\n\n```\nORA-00210: cannot open the specified control file...\n\
    ```\n\nStep 1\\. Shut Down the Database\n\nFirst, shut down the database:\n\n\
    ```\nSQL> shutdown abort;\n```\n\nStep 2\\. Restore the Control File from the\
    \ Backup\n\nThis database was configured with just one control file, which you\
    \ copy back from the backup location, as shown:\n\n```\n$ cp /u01/hbackup/o12c/controlbk.ctl\
    \ /u01/dbfile/o12c/control01.ctl\n```\n\nIf more than one control file is being\
    \ used, you have to copy the backup control file to each control file and location\
    \ name listed in the CONTROL_FILES initialization parameter.\n\nStep 3\\. Start\
    \ the Database in Mount Mode, and Initiate Database Recovery\n\nNext, start the\
    \ database in mount mode:\n\n```\nSQL> startup mount;\n```\n\nAfter the control\
    \ file(s) and data files have been copied back, you can perform a recovery. Oracle\
    \ knows that the control file was from a backup (because it was created with the\
    \ ALTER DATABASE BACKUP CONTROLFILE statement), so the recovery must be performed\
    \ with the USING BACKUP CONTROLFILE clause:\n\n```\nSQL> recover database using\
    \ backup controlfile;\n```\n\nAt this point, you’re prompted for the application\
    \ of archive redo log files:\n\n```\nORA-00279: change 3584431 generated at 11/02/2012\
    \ 11:48:46 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/o12c/1_8_798283209.dbf\n\
    ORA-00280: change 3584431 for thread 1 is in sequence #8\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\nType AUTO to instruct the recovery process\
    \ to apply all archive redo logs automatically:\n\n```\nAUTO\n```\n\nThe recovery\
    \ process applies all available archive redo logs. The recovery process has no\
    \ one way of determining where the archive redo stream ends and therefore tries\
    \ to apply an archive redo log that doesn’t exist, resulting in a message such\
    \ as this:\n\n```\nORA-00308: cannot open archived log '/u01/oraarch/o12c/1_10_798283209.dbf'\n\
    ORA-27037: unable to obtain file status\n```\n\nThe prior message is to be expected.\
    \ Now, attempt to open the database:\n\n```\nSQL> alter database open resetlogs;\n\
    ```\n\nOracle throws the following error in this situation:\n\n```\nORA-01113:\
    \ file 1 needs media recovery\nORA-01110: data file 1: '/u01/dbfile/o12c/system01.dbf'\n\
    ```\n\nStep 4\\. Apply Redo Contained in the Online Redo Logs\n\nOracle needs\
    \ to apply more redo to synchronize the SCN in the control file with the SCN in\
    \ the data file header. In this scenario the online redo logs are still intact\
    \ and contain the required redo. To apply redo contained in the online redo logs,\
    \ first identify the locations and names of the online redo log files:\n\n```\n\
    select a.sequence#, a.status, a.first_change#, b.member\nfrom v$log a, v$logfile\
    \ b\nwhere a.group# = b.group#\norder by a.sequence#;\n```\n\nHere is the partial\
    \ output for this example:\n\n```\nSEQUENCE# STATUS           FIRST_CHANGE# MEMBER\n\
    ---------- ---------------- ------------- ------------------------------\n        \
    \ 6 INACTIVE               3543960 /u01/oraredo/o12c/redo03a.rdo\n         6 INACTIVE              \
    \ 3543960 /u02/oraredo/o12c/redo03b.rdo\n         7 INACTIVE               3543963\
    \ /u02/oraredo/o12c/redo01b.rdo\n         7 INACTIVE               3543963 /u01/oraredo/o12c/redo01a.rdo\n\
             8 CURRENT                3583986 /u02/oraredo/o12c/redo02b.rdo\n        \
    \ 8 CURRENT                3583986 /u01/oraredo/o12c/redo02a.rdo\n```\n\nNow,\
    \ reinitiate the recovery process:\n\n```\nSQL> recover database using backup\
    \ controlfile;\n```\n\nThe recovery process prompts for an archive redo log that\
    \ doesn’t exist:\n\n```\nORA-00279: change 3584513 generated at 11/02/2012 11:50:50\
    \ needed for thread 1\nORA-00289: suggestion : /u01/oraarch/o12c/1_10_798283209.dbf\n\
    ORA-00280: change 3584513 for thread 1 is in sequence #10\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\nInstead of supplying the recovery process\
    \ with an archive redo log file, type in the name of a current online redo log\
    \ file (you may have to attempt each online redo log until you find the one that\
    \ Oracle needs). This instructs the recovery process to apply any redo in the\
    \ online redo log:\n\n```\n/u01/oraredo/o12c/redo01a.rdo\n```\n\nYou should see\
    \ this message when the correct online redo log is applied:\n\n```\nLog applied.\n\
    Media recovery complete.\n```\n\nStep 5\\. Open the Database with RESETLOGS\n\n\
    The database is completely recovered at this point. However, because a backup\
    \ control file was used for the recovery process, the database must be opened\
    \ with the RESETLOGS clause:\n\n```\nSQL> alter database open resetlogs;\n```\n\
    \nUpon success, you should see this:\n\n```\nDatabase altered.\n```\n\nPerforming\
    \ an Incomplete Recovery of an Archivelog Mode Database\n\nIncomplete recovery\
    \ means that you don’t restore all transactions that were committed before the\
    \ failure. With this type of recovery, you’re recovering to a point in time in\
    \ the past, and transactions are lost. This is why incomplete recovery is also\
    \ known as database point-in-time recovery (DBPITR).\n\nIncomplete recovery doesn’t\
    \ mean that you’re restoring and recovering only a subset of data files. In fact,\
    \ with most incomplete scenarios, you have to restore all data files from the\
    \ backup as part of the procedure. If you don’t want to recover all data files,\
    \ you first need to take offline any data files you don’t intend to participate\
    \ in the incomplete recovery process. When you initiate the recovery, Oracle will\
    \ only recover data files that have an ONLINE value in the STATUS column of V$DATAFILE_HEADER.\n\
    \nYou may want to perform an incomplete recovery for many different reasons:\n\
    \n*   You attempt to perform a complete recovery but are missing the required\
    \ archive redo logs or unarchived online redo log information.\n*   You want to\
    \ restore the database back to a point in time in the past just prior to an erroneous\
    \ user error (deleted data, dropped table, and so on).\n*   You have a testing\
    \ environment in which you have a baseline copy of the database. After the testing\
    \ is finished, you want to reset the database back to baseline for another round\
    \ of testing.\n\nYou can perform user-managed incomplete recovery three ways:\n\
    \n*   Cancel based\n*   SCN based\n*   Time based\n\nCancel based allows you to\
    \ apply archive redo and halt the process at the boundary, based on an archive\
    \ redo log file. For instance, say you’re attempting to restore and recover your\
    \ database, and you realize that you’re missing an archive redo log. You have\
    \ to stop the recover process at the point of your last good archive redo log.\
    \ You initiate cancel-based incomplete recovery with the CANCEL clause of the\
    \ RECOVER DATABASE statement:\n\n```\nSQL> recover database until cancel;\n```\n\
    \nIf you want to recover up to and including a certain SCN number, use SCN-based\
    \ incomplete recovery. You may know from the alert log or from the output of LogMiner\
    \ the point to which you want to restore to a certain SCN. Use the UNTIL CHANGE\
    \ clause to perform this type of incomplete recovery:\n\n```\nSQL> recover database\
    \ until change 12345;\n```\n\nIf you know the time at which you want to stop the\
    \ recovery process, use time-based incomplete recovery. For example, you may know\
    \ that a table was dropped at a certain time and want to restore and recover the\
    \ database up to the specified time. The format for a time-based recovery is always\
    \ as follows: YYYY-MM-DD:HH24:MI:SS. Here is an example:\n\n```\nSQL> recover\
    \ database until time '2012-10-21:02:00:00';\n```\n\nWhen you perform an incomplete\
    \ recovery, you have to restore all data files that you plan to have online when\
    \ the incomplete restoration is finished. Here are the steps for an incomplete\
    \ recovery:\n\n1.  Shut down the database.\n2.  Restore all the data files from\
    \ the backup.\n3.  Start the database in mount mode.\n4.  Apply redo (roll forward)\
    \ to the desired point, and halt the recovery process (use cancel-, SCN-, or time-based\
    \ recovery).\n5.  Open the database with the OPEN RESETLOGS clause.\n\nThe following\
    \ example performs a cancel-based incomplete recovery. If the database is open,\
    \ shut it down:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\nNext,\
    \ copy all data files from the backup (either a cold or hot backup). This example\
    \ restores all data files from a hot backup. For this example the current control\
    \ file is intact and doesn’t need to be restored. Here is a snippet of the OS\
    \ copy commands for the database being restored:\n\n```\ncp /u01/hbackup/o12c/system01.dbf\
    \ /u01/dbfile/o12c/system01.dbf\ncp /u01/hbackup/o12c/sysaux01.dbf /u01/dbfile/o12c/sysaux01.dbf\n\
    cp /u01/hbackup/o12c/undotbs01.dbf /u01/dbfile/o12c/undotbs01.dbf\ncp /u01/hbackup/o12c/users01.dbf\
    \ /u01/dbfile/o12c/users01.dbf\ncp /u01/hbackup/o12c/tools01.dbf /u01/dbfile/o12c/tools01.dbf\n\
    ```\n\nAfter the data files have been copied back, you can initiate the recovery\
    \ process. This example performs a cancel-based incomplete recovery:\n\n```\n\
    $ sqlplus / as sysdba\nSQL> startup mount;\nSQL> recover database until cancel;\n\
    ```\n\nAt this point, the Oracle recovery process suggests an archive redo log\
    \ to apply:\n\n```\nORA-00279: change 3584872 generated at 11/02/2012 12:02:32\
    \ needed for thread 1\nORA-00289: suggestion : /u01/oraarch/o12c/1_1_798292887.dbf\n\
    ORA-00280: change 3584872 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\nApply the logs up to the point you where\
    \ want to stop, and then type CANCEL:\n\n```\nCANCEL\n```\n\nThis stops the recovery\
    \ process. Now, you can open the database with the RESETLOGS clause:\n\n```\n\
    SQL> alter database open resetlogs;\n```\n\nThe database has been opened to a\
    \ point in time in the past. The recovery is deemed incomplete because not all\
    \ redo was applied.\n\n![image](Images/sq.jpg) **Tip**   Now would be a good time\
    \ to get a good backup of your database. This will give you a clean point from\
    \ which to initiate a restore and recovery should a failure happen soon after\
    \ you’ve opened your database.\n\nPURPOSE OF OPEN RESETLOGS\n\nSometimes, you’re\
    \ required to open your database with the OPEN RESETLOGS clause. You may do this\
    \ when recreating a control file, performing a restore and recovery with a backup\
    \ control file, or performing an incomplete recovery. When you open your database\
    \ with the OPEN RESETLOGS clause, it either wipes out any existing online redo\
    \ log files or, if the files don’t exist, recreates them. You can query the MEMBER\
    \ column of V$LOGFILE to see which files are involved in an OPEN RESETLOGS operation.\n\
    \nWhy would you want to wipe out what’s in the online redo logs? Take the example\
    \ of an incomplete recovery, in which the database is deliberately opened to a\
    \ point in time in the past. In this situation the SCN information in the online\
    \ redo logs contains transaction data that will never be recovered. Oracle forces\
    \ you to open the database with OPEN RESETLOGS to purposely wipe out that information.\n\
    \nWhen you open your database with OPEN RESETLOGS, you create a new incarnation\
    \ of your database and reset the log sequence number back to 1\\. Oracle requires\
    \ a new incarnation so as to avoid accidentally using any old archive redo logs\
    \ (associated with a separate incarnation of the database), in the event that\
    \ another restore and recovery is required.\n\nSummary\n\nSome studies have indicated\
    \ that airplane pilots who are over dependent on autopilot technology are less\
    \ able to cope with catastrophic in-flight problems than the pilots who have spent\
    \ considerable time flying without autopilot assistance. The overautodependent\
    \ pilots tend to forget key procedures when serious problems arise, whereas pilots\
    \ who aren’t as dependent on autopilot are more adept at diagnosing and resolving\
    \ stressful in-flight failures.\n\nSimilarly, DBAs who understand how to backup,\
    \ restore, and recover a database manually, using user-managed techniques, are\
    \ more proficient at troubleshooting and resolving serious backup and recovery\
    \ problems than DBAs who only navigate backup and recovery technology via screens.\
    \ This is why I included this chapter in the book. Understanding what happens\
    \ at each step and why the step is required is vital for complete knowledge of\
    \ the Oracle backup and recovery architecture. This awareness translates into\
    \ key troubleshooting skills when you’re using Oracle tools such as RMAN (backup\
    \ and recovery), Enterprise Manager, and Data Guard (disaster recovery, high availability,\
    \ and replication).\n\nThe user-managed backup and recovery techniques covered\
    \ in this chapter aren’t taught or used much anymore. Most DBAs are (and should\
    \ be) using RMAN for their Oracle backup and recovery requirements. However, it’s\
    \ critical for you to understand how cold backups and hot backups work. You may\
    \ find yourself employed in a shop in which old technology has been implemented\
    \ and needing to restore and recover the database, troubleshoot, or assist in\
    \ migrating to RMAN. In these scenarios, you must fully understand the old backup\
    \ technologies.\n\nNow that you have an in-depth understanding of Oracle backup\
    \ and recovery mechanics, you’re ready to investigate RMAN. The next several chapters\
    \ examine how to configure and use RMAN for production-strength backup and recovery.\n\
    \nCHAPTER 19\n\n![image](Images/frontdot.jpg)\n\nRMAN Restore and Recovery\n\n\
    A couple of years ago, I was out on a long Saturday morning bike ride. About halfway\
    \ through the ride, my cell phone rang. It was one of the data center operational\
    \ support technicians. He told me that a mission critical database server was\
    \ acting strange and that I should log in as soon as possible and make sure things\
    \ were okay. I told him that I was about 15 minutes from being able to log in.\
    \ So, I scurried home as fast as I could to check out the production box. When\
    \ I got home and logged in to the database server, I tried to start SQL*Plus and\
    \ immediately got an error indicating that the SQL*Plus binary file had corruption.\
    \ Great. I couldn’t even log in to SQL*Plus. This was not good.\n\n![image](Images/sq.jpg) **Mental\
    \ Note**  Ensure that all bicycle rides are taken out of range of cell phone coverage.\
    \ – Ed.\n\nI had the SA restore the Oracle binaries from an OS backup. I started\
    \ SQL*Plus. The database had crashed, so I attempted to start it . The output\
    \ indicated that there was a media failure with all the data files. After some\
    \ analysis it was discovered that there had been some filesystem issues and that\
    \ all these files on disk were corrupt:\n\n*   Data files\n*   Control files\n\
    *   Archive redo logs\n*   Online redo log files\n*   RMAN backup pieces\n\nThis\
    \ was almost a total disaster. My director asked about our options. I responded,\
    \ “All we have to do is restore the database from our last tape backup, and we’ll\
    \ lose whatever data are in archive redo logs that haven’t been backed up to tape\
    \ yet. ”\n\nThe storage administrators were called in and instructed to restore\
    \ the last set of RMAN backups that had been written to tape. About 15 minutes\
    \ later, we could hear the tape guys talking to each other in hushed voices. One\
    \ of them said, “We are sooooo hosed. We don’t have any tape backups of RMAN for\
    \ any databases on this box.”\n\nThat was a dark moment. The worst case scenario\
    \ was to rebuild the database from DDL scripts and lose 3 years of production\
    \ data. Not a very palatable option.\n\nAfter looking around the production box,\
    \ I discovered that the prior production support DBA (who, ironically, had just\
    \ been let go a few days before, owing to budget cuts) had implemented a job to\
    \ copy the RMAN backups to another server in the production environment. The RMAN\
    \ backups on this other server were intact. I was able to restore and recover\
    \ the production database from these backups. We lost about a day’s worth of data\
    \ (between corrupt archive logs and downtime, in which no incoming transactions\
    \ were allowed), but we were able to get the database restored and recovered approximately\
    \ 20 hours after the initial phone call. That was a long day.\n\nMost situations\
    \ in which you need to restore and recover will not be as bad as the one just\
    \ described. However, the previous scenario does highlight the need for\n\n* \
    \  a backup strategy\n*   a DBA with B&R skills\n*   a restore-and-recovery strategy,\
    \ including a requirement to test the restore and recovery periodically\n\nThis\
    \ chapter walks you through restore and recovery, using RMAN. The chapter covers\
    \ many of the common tasks you will have to perform when dealing with media failures.\n\
    \nDetermining if Media Recovery Is Required\n\nThe term media recovery means the\
    \ restoration of files that have been lost or damaged, owing to the failure of\
    \ the underlying storage media (usually a disk of some sort) or accidental removal\
    \ of files. Usually, you know that media recovery is required through an error\
    \ such as the following:\n\n```\nORA-01157: cannot identify/lock data file 1 -\
    \ see DBWR trace file\nORA-01110: data file 1: '/u01/dbfile/o12c/system01.dbf'\n\
    ```\n\nThe error may be displayed on your screen when performing DBA tasks, such\
    \ as stopping and starting the database. Or, you might see such an error in a\
    \ trace file or the alert.log file. If you don’t notice the issue right away,\
    \ with a severe media failure, the database will stop processing transactions,\
    \ and users will start calling you.\n\nTo understand how Oracle determines that\
    \ media recovery is required, you must first understand how Oracle determines\
    \ that everything is okay. When Oracle shuts down normally (IMMEDIATE, TRANSACTIONAL,\
    \ NORMAL), part of the shutdown process is to flush all modified blocks (in memory)\
    \ to disk, mark the header of each data file with the current SCN, and update\
    \ the control file with the current SCN information.\n\nUpon startup, Oracle checks\
    \ to see if the SCN in the control file matches the SCN in the header of the data\
    \ files. If there is a match, then Oracle attempts to open the data files and\
    \ online redo log files. If all files are available and can be opened, Oracle\
    \ starts normally. The following query compares the SCN in the control file (for\
    \ each data file) with the SCN in the data file header:\n\n```\nSET LINES 132\n\
    COL name             FORM a40\nCOL status           FORM A8\nCOL file#            FORM\
    \ 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN     FORM 999999999999999\n\
    --\nSELECT\n a.name\n,a.status\n,a.file#\n,a.checkpoint_change# control_file_SCN\n\
    ,b.checkpoint_change# datafile_SCN\n,CASE\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
    \ = 0) THEN 'Startup Normal'\n   WHEN ((b.checkpoint_change#) = 0)                        THEN\
    \ 'File Missing?'\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#) > 0)\
    \ THEN 'Media Rec. Req.'\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
    \ < 0) THEN 'Old Control File'\n   ELSE 'what the ?'\n END datafile_status\nFROM\
    \ v$datafile        a -- control file SCN for datafile\n    ,v$datafile_header\
    \ b -- datafile header SCN\nWHERE a.file# = b.file#\nORDER BY a.file#;\n```\n\n\
    If the control file SCN values are greater than the data file SCN values, then\
    \ media recovery is most likely required. This would be the case if you restored\
    \ a data file from a backup, and the SCN in the restored data file had an SCN\
    \ less than the data file in the current control file.\n\n![image](Images/sq.jpg) **Tip**  \
    \ The V$DATAFILE_HEADER view uses the physical data file on disk as its source.\
    \ The V$DATAFILE view uses the control file as its source.\n\nYou can also directly\
    \ query the V$DATAFILE_HEADER for more information. The ERROR and RECOVER columns\
    \ report any potential problems. For example, a YES or null value in the RECOVER\
    \ column indicates that there is a problem:\n\n```\nSQL> select file#, status,\
    \ error, recover from v$datafile_header;\n```\n\nHere is some sample output:\n\
    \n```\n     FILE# STATUS  ERROR                REC\n---------- ------- --------------------\
    \ ---\n         1 ONLINE  FILE NOT FOUND\n         2 ONLINE                      \
    \ NO\n         3 ONLINE                       NO\n```\n\nDetermining What to Restore\n\
    \nMedia recovery requires that you perform manual tasks to get your database back\
    \ in one piece. These tasks usually involve a combination of RESTORE and RECOVER\
    \ commands. You will have to issue an RMAN RESTORE command if, for some reason\
    \ (accidental deleting of files, disk failure, and so on), your data files have\
    \ experienced media failure.\n\nHow the Process Works\n\nWhen you issue the RESTORE\
    \ command, RMAN automatically decides how to extract the data files from any of\
    \ the following available backups:\n\n*   Full database backup\n*   Incremental\
    \ level-0 backup\n*   Image copy backup generated by BACKUP AS COPY command\n\n\
    After the files are restored from a backup, you are required to apply redo to\
    \ them via the RECOVER command. When you issue the RECOVER command, Oracle examines\
    \ the SCNs in the affected data files and determines whether any of them need\
    \ to be recovered. If the SCN in the data file is less than the corresponding\
    \ SCN in the control file, then media recovery will be required.\n\nOracle retrieves\
    \ the data file SCN and then looks for the corresponding SCN in the redo stream\
    \ to establish where to start the recovery process. If the starting recovery SCN\
    \ is in the online redo log files, the archived redo log files are not required\
    \ for recovery.\n\nDuring a recovery, RMAN automatically determines how to apply\
    \ redo. First, RMAN applies any incremental backups available that are greater\
    \ than level 0, such as the incremental level 1\\. Next, any archived redo log\
    \ files on disk are applied. If the archived redo log files do not exist on disk,\
    \ RMAN attempts to retrieve them from a backup set.\n\nTo be able to perform a\
    \ complete recovery, all the following conditions need to be true:\n\n*   Your\
    \ database is in archivelog mode.\n*   You have a good baseline backup of your\
    \ database.\n*   You have any required redo that has been generated since the\
    \ backup (archived redo log files, online redo log files, or incremental backups\
    \ that RMAN can use for recovery instead of applying redo).\n\nThere are a wide\
    \ variety of restore-and-recovery scenarios. How you restore and recover depends\
    \ directly on your backup strategy and which files have been damaged. Listed next\
    \ are the general steps to follow when facing a media failure:\n\n1.  Determine\
    \ which files need to be restored.\n2.  Depending on the damage, set your database\
    \ mode to nomount, mount, or open.\n3.  Use the RESTORE command to retrieve files\
    \ from RMAN backups.\n4.  Use the RECOVER command for data files requiring recovery.\n\
    5.  Open your database.\n\nYour particular restore-and-recovery scenario may not\
    \ require that all the previous steps be performed. For instance, you may just\
    \ want to restore your spfile, which doesn’t require a recovery step.\n\nThe first\
    \ step in the restore-and-recovery process is to determine which files have experienced\
    \ media failure. You can usually determine which files need to be restored from\
    \ the following sources:\n\n*   Error messages displayed on your screen, either\
    \ from RMAN or SQL*Plus\n*   Alert.log file and corresponding trace files\n* \
    \  Data dictionary views\n\nIf you’re using Oracle Database 11g or higher, then\
    \ in addition to the previously listed methods, you should consider the Data Recovery\
    \ Advisor for obtaining information about the extent of a failure and corresponding\
    \ corrective action.\n\nUsing Data Recovery Advisor\n\nThe Data Recovery Advisor\
    \ tool was introduced in Oracle Database 11g. In the event of a media failure,\
    \ this tool will display the details of the failure, recommend corrective actions,\
    \ and perform the recommended actions if you specify that it do so. It’s like\
    \ having another set of eyes to provide feedback when in a restore-and-recovery\
    \ situation. There are four modes to Data Recovery Advisor:\n\n*   Listing failures\n\
    *   Suggesting corrective action\n*   Running commands to repair failures\n* \
    \  Changing the status of a failure\n\nThe Data Recovery Advisor is invoked from\
    \ RMAN. You can think of the Data Recovery Advisor as a set of RMAN commands that\
    \ can assist you when dealing with media failure.\n\nListing Failures\n\nWhen\
    \ using the Data Recovery Advisor, the LIST FAILURE command is used to display\
    \ any issues with the data files, control files, or online redo logs:\n\n```\n\
    RMAN> list failure;\n```\n\nIf there are no detected failures, you’ll see a message\
    \ indicating that there are no failures. Here is some sample output indicating\
    \ that there may be an issue with a data file:\n\n```\nList of Database Failures\n\
    =========================\n\nFailure ID Priority Status    Time Detected Summary\n\
    ---------- -------- --------- ------------- -------\n6222       CRITICAL OPEN      12-JAN-13    \
    \ System datafile 1:\n '/u01/dbfile/o12c/system01.dbf' is missing\n```\n\nTo display\
    \ more information about the failure, use the DETAIL clause:\n\n```\nRMAN> list\
    \ failure 6222 detail;\n```\n\nHere is the additional output for this example:\n\
    \n```\nImpact: Database cannot be opened\n```\n\nWith this type of failure, the\
    \ prior output indicates that the database can’t be opened.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you suspect there’s a media failure, yet the Data Recovery Advisor is not\
    \ reporting any issues, run the VALIDATE DATABASE command to verify that the database\
    \ is intact.\n\nSuggesting Corrective Action\n\nThe ADVISE FAILURE command gives\
    \ advice about how to recover from potential problems detected by the Data Recovery\
    \ Advisor. If you have multiple failures with your database, you can directly\
    \ specify the failure ID to get advice on a given failure, like so:\n\n```\nRMAN>\
    \ advise failure 6222;\n```\n\nHere is a snippet of the output for this particular\
    \ issue:\n\n```\nOptional Manual Actions\n=======================\n1\\. If file\
    \ /u01/dbfile/o12c/system01.dbf was unintentionally renamed or moved,\nrestore\
    \ it\n\nAutomated Repair Options\n========================\nOption Repair Description\n\
    ------ ------------------\n1      Restore and recover datafile 1\n  Strategy:\
    \ The repair includes complete media recovery with no data loss\n  Repair script:\
    \ /ora01/app/oracle/diag/rdbms/o12c/o12c/hm/reco_4116328280.hm\n```\n\nIn this\
    \ case, the Data Recovery Advisor created a script that can be used to potentially\
    \ fix the problem. The contents of the repair script can be viewed with an OS\
    \ utility; for example,\n\n```\n$ cat /ora01/app/oracle/diag/rdbms/o12c/o12c/hm/reco_4116328280.hm\n\
    ```\n\nHere are the contents of the script for this example:\n\n```\n# restore\
    \ and recover datafile\nrestore ( datafile 1 );\nrecover datafile 1;\nsql 'alter\
    \ database datafile 1 online';\n```\n\nAfter reviewing the script, you can decide\
    \ to run the suggested commands manually, or you can have the Data Recovery Advisor\
    \ run the script via the REPAIR command (see the next section for details).\n\n\
    Repairing Failures\n\nIf you have identified a failure and viewed the recommended\
    \ advice, you can proceed to the repair work. If you want to inspect what the\
    \ REPAIR FAILURE command will do without actually running the commands, use the\
    \ PREVIEW clause:\n\n```\nRMAN> repair failure preview;\n```\n\nBefore you run\
    \ the REPAIR FAILURE command, ensure that you first run the LIST FAILURE and ADVISE\
    \ FAILURE commands from the same connected session. In other words, the RMAN session\
    \ that you’re in must run the LIST and ADVISE commands within the same session\
    \ before running the REPAIR command.\n\nIf you’re satisfied with the repair suggestions,\
    \ then run the REPAIR FAILURE command:\n\n```\nRMAN> repair failure;\n```\n\n\
    You’ll be prompted at this point for confirmation:\n\n```\nDo you really want\
    \ to execute the above repair (enter YES or NO)?\n```\n\nType YES to proceed:\n\
    \n```\nYES\n```\n\nIf all goes well, you should see a final message such as this\
    \ in the output:\n\n```\nrepair failure complete\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ You can run the Data Recovery Advisor commands from the RMAN command prompt\
    \ or from Enterprise Manager.\n\nIn this way, you can use the RMAN commands L\
    \ IST FAILURE, A DVISE FAILURE, and REPAIR FAILURE to resolve media failures.\n\
    \nChanging the Status of a Failure\n\nOne last note on the Data Recovery Advisor:\
    \ if you know that you’ve had a failure and that it isn’t critical (e.g., a data\
    \ file missing from a tablespace that is no longer used), then use the CHANGE\
    \ FAILURE command to alter the priority of a failure. In this example, there’s\
    \ a missing data file that belongs to a noncritical tablespace. First, obtain\
    \ the failure priority via the LIST FAILURE command:\n\n```\nRMAN> list failure;\n\
    ```\n\nHere is some sample output:\n\n```\nFailure ID Priority Status    Time\
    \ Detected Summary\n---------- -------- --------- ------------- -------\n5          HIGH    \
    \ OPEN      12-JAN-13     One or more non-system datafiles\n                                            are\
    \ missing\n```\n\nNext, change the priority from HIGH to LOW with the CHANGE FAILURE\
    \ command:\n\n```\nRMAN> change failure 5 priority low;\n```\n\nYou will be prompted\
    \ to confirm that you really do want to change the priority:\n\n```\nDo you really\
    \ want to change the above failures (enter YES or NO)?\n```\n\nIf you do want\
    \ to change the priority, then type YES, and press the Enter key. If you run the\
    \ LIST FAILURE command again, you’ll see that the priority has now been changed\
    \ to LOW:\n\n```\nRMAN> list failure low;\n```\n\nUsing RMAN to Stop/Start Oracle\n\
    \nYou can use RMAN to stop and start your database with methods that are almost\
    \ identical to those available through SQL*Plus. When performing restore and recovery\
    \ operations, it’s often more convenient to stop and start your database from\
    \ within RMAN. The following RMAN commands can be used to stop and start your\
    \ database:\n\n*   SHUTDOWN\n*   STARTUP\n*   ALTER DATABASE\n\nShutting Down\n\
    \nThe S HUTDOWN command works the same from RMAN as it does from SQL*Plus. There\
    \ are four types of shutdown: ABORT, IMMEDIATE, NORMAL, and TRANSACTIONAL. I usually\
    \ first attempt to stop a database using S HUTDOWN IMMEDIATE; if that doesn’t\
    \ work, don’t hesitate to use S HUTDOWN ABORT. Here are some examples:\n\n```\n\
    RMAN> shutdown immediate;\nRMAN> shutdown abort;\n```\n\nIf you don’t specify\
    \ a shutdown option, NORMAL is the default. Shutting down a database with NORMAL\
    \ is rarely viable, as this mode waits for currently connected users to disconnect\
    \ at their leisure. I never use NORMAL when shutting down a database.\n\nStarting\
    \ Up\n\nAs with SQL*Plus, you can use a combination of S TARTUP and A LTER DATABASE\
    \ commands with RMAN to step the database through startup phases, like this:\n\
    \n```\nRMAN> startup nomount;\nRMAN> alter database mount;\nRMAN> alter database\
    \ open;\n```\n\nHere is another example:\n\n```\nRMAN> startup mount;\nRMAN> alter\
    \ database open;\n```\n\nIf you want to start the database with restricted access,\
    \ use the DBA option:\n\n```\nRMAN> startup dba;\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ Starting with Oracle Database 12c, you can run all SQL statements directly from\
    \ within RMAN without having to specify the RMAN sql command.\n\nComplete Recovery\n\
    \nAs discussed in [Chapter 16](#9781430257288_Ch16.xhtml), the term *complete\
    \ recovery* means that you can restore all transactions that were committed before\
    \ a failure occurred. *Complete recovery* doesn’t mean that you are restoring\
    \ and recovering all data files in your database. For instance, you are performing\
    \ a complete recovery if you have a media failure with one data file, and you\
    \ restore and recover the one data file. For complete recovery, the following\
    \ conditions must be true:\n\n*   Your database is in archivelog mode.\n*   You\
    \ have a good baseline backup of the data files that have experienced media failure.\n\
    *   You have any required redo that has been generated since the last backup.\n\
    *   All archive redo logs start from the point at which the last backup began.\n\
    *   Any incremental backups that RMAN can use for recovery are available (if using).\n\
    *   Online redo logs that contain transactions that have not yet been archived\
    \ are available.\n\nIf you’ve experienced a media failure, and you have the required\
    \ files to perform a complete recovery, then you can restore and recover your\
    \ database.\n\nTesting Restore and Recovery\n\nYou can determine which files RMAN\
    \ will use for restore and recovery before you actually perform the restore and\
    \ recovery. You can also instruct RMAN to verify the integrity of the backup files\
    \ that will be used for the restore and recovery.\n\nPreviewing Backups Used for\
    \ Recovery\n\nUse the RESTORE...PREVIEW command to list the backups and archive\
    \ redo log files that RMAN will use to restore and recover database data files.\
    \ The RESTORE...PREVIEW command does not actually restore any files. Rather, it\
    \ lists the backup files that will be used for a restore operation. This example\
    \ previews in detail the backups required for restore and recovery for the entire\
    \ database:\n\n```\nRMAN> restore database preview;\n```\n\nYou can also preview\
    \ require backup files at a summarized level of detail:\n\n```\nRMAN> restore\
    \ database preview summary;\n```\n\nHere is a snippet of the output:\n\n```\n\
    List of Backup Sets\n===================\nBS Key  Type LV Size       Device Type\
    \ Elapsed Time Completion Time\n------- ---- -- ---------- ----------- ------------\
    \ ---------------\n224     Full    775.37M    DISK        00:02:22     12-JAN-13\n\
            BP Key: 229   Status: AVAILABLE  Compressed: NO  Tag: TAG20130112T120713\n\
            Piece Name: /u02/O12C/rman/r29gnv7q7i_1_1.bk\n  List of Datafiles in backup\
    \ set 224\n  File LV Type Ckp SCN    Ckp Time  Name\n  ---- -- ---- ----------\
    \ --------- ----\n  1       Full 4586940    12-JAN-13 /u01/dbfile/o12c/system01.dbf\n\
      3       Full 4586940    12-JAN-13 /u01/dbfile/o12c/undotbs01.dbf\n  4      \
    \ Full 4586940    12-JAN-13 /u01/dbfile/o12c/users01.dbf\n```\n\nHere are some\
    \ more examples of how to preview backups required for restore and recovery:\n\
    \n```\nRMAN> restore tablespace system preview;\nRMAN> restore archivelog from\
    \ time 'sysdate -1' preview;\nRMAN> restore datafile 1, 2, 3 preview;\n```\n\n\
    Validating Backup Files Before Restoring\n\nThere are several levels of verification\
    \ that you can perform on backup files without actually restoring anything. If\
    \ you just want RMAN to verify that the files exist and check the file headers,\
    \ then use the RESTORE...VALIDATE HEADER command, as shown:\n\n```\nRMAN> restore\
    \ database validate header;\n```\n\nThis command only validates the existence\
    \ of backup files and checks the file headers. You can further instruct RMAN to\
    \ verify the integrity of blocks within backup files required to restore the database\
    \ data files via the RESTORE...VALIDATE command (sans the HEADER clause). Again,\
    \ RMAN will not restore any data files in this mode:\n\n```\nRMAN> restore database\
    \ validate;\n```\n\nThis command only checks for physical corruption within the\
    \ backup files. You can also check for logical corruption (along with physical\
    \ corruption), as follows:\n\n```\nRMAN> restore database validate check logical;\n\
    ```\n\nHere are some other examples of using RESTORE...VALIDATE:\n\n```\nRMAN>\
    \ restore datafile 1,2,3 validate;\nRMAN> restore archivelog all validate;\nRMAN>\
    \ restore controlfile validate;\nRMAN> restore tablespace system validate;\n```\n\
    \nTesting Media Recovery\n\nThe prior sections covered reporting and verifying\
    \ the restore operations. You can also instruct RMAN to verify the recovery process\
    \ via the RECOVER...TEST command. Before performing a test recovery, you need\
    \ to ensure that the data files being recovered are offline. Oracle will throw\
    \ an error for any online data files being recovered in test mode.\n\nIn this\
    \ example the tablespace U SERS is restored first, and then a trial recovery is\
    \ performed:\n\n```\nRMAN> connect target /\nRMAN> startup mount;\nRMAN> restore\
    \ tablespace users;\nRMAN> recover tablespace users test;\n```\n\nIf there are\
    \ any missing archive redo logs that are required for recovery, the following\
    \ error is thrown:\n\n```\nRMAN-06053: unable to perform media recovery because\
    \ of missing log\nRMAN-06025: no backup of archived log for thread 1 with sequence\
    \ 6 ...\n```\n\nIf the testing of the recovery succeeded, you’ll see messages\
    \ such as the following, indicating that the application of redo was tested but\
    \ not applied:\n\n```\nORA-10574: Test recovery did not corrupt any data block\n\
    ORA-10573: Test recovery tested redo from change 4586939 to 4588462\nORA-10572:\
    \ Test recovery canceled due to errors\nORA-10585: Test recovery can not apply\
    \ redo that may modify control file\n```\n\nHere are some other examples of testing\
    \ the recovery process:\n\n```\nRMAN> recover database test;\nRMAN> recover tablespace\
    \ users, tools test;\nRMAN> recover datafile 1,2,3 test;\n```\n\nRestoring and\
    \ Recovering the Entire Database\n\nThe RESTORE DATABASE command will restore\
    \ every data file in your database. The exception to this is when RMAN detects\
    \ that data files have already been restored; in that case, it will not restore\
    \ them again. If you want to override that behavior, use the FORCE command.\n\n\
    When you issue the R ECOVER DATABASE command, RMAN will automatically apply redo\
    \ to any data files that need recovery. The recovery process includes applying\
    \ changes found in the following files:\n\n*   Incremental backup pieces (applicable\
    \ only if using incremental backups)\n*   Archived redo log files (generated since\
    \ the last backup or incremental backup applied)\n*   Online redo log files (current\
    \ and unarchived)\n\nYou can open your database after the restore-and-recovery\
    \ process is complete. Complete database recovery works only if you have good\
    \ backups of your database and access to all redo generated after the backup was\
    \ taken. You need all the redo required to recover the database data files. If\
    \ you don’t have all the required redo, then you’ll most likely have to perform\
    \ an incomplete recovery (see the section “Incomplete Recovery, ” later in this\
    \ chapter).\n\n![image](Images/sq.jpg) **Note**   Your database has to be at least\
    \ mounted to restore data files, using RMAN. This is because RMAN reads information\
    \ from the control file during the restore-and-recovery process.\n\nYou can perform\
    \ a complete database-level recovery with either the current control file or a\
    \ backup control file.\n\nUsing the Current Control File\n\nYou must first put\
    \ your database in mount mode to perform a database-wide restore and recovery.\
    \ This is because Oracle won’t allow you to operate your database in open mode\
    \ while data files associated with the SYSTEM tablespace are being restored and\
    \ recovered. In this situation, start up the database in mount mode, issue the\
    \ R ESTORE and R ECOVER commands, and then open the database, like so:\n\n```\n\
    $ rman target /\nRMAN> startup mount;\nRMAN> restore database;\nRMAN> recover\
    \ database;\nRMAN> alter database open;\n```\n\nIf everything goes as expected,\
    \ the last message you should see is this:\n\n```\nStatement processed\n```\n\n\
    Using the Backup Control File\n\nThis technique uses an autobackup of the control\
    \ file retrieved from the FRA. (see the section “Restoring a Control File,” later\
    \ in this chapter, for more examples of how to restore your control file). In\
    \ this scenario the control file is first retrieved from a backup before restoring\
    \ and recovering the database:\n\n```\n$ rman target /\nRMAN> startup nomount;\n\
    RMAN> restore controlfile from autobackup;\nRMAN> alter database mount;\nRMAN>\
    \ restore database;\nRMAN> recover database;\nRMAN> alter database open resetlogs;\n\
    ```\n\nIf successful, the last message you should see is this:\n\n```\nStatement\
    \ processed\n```\n\nRestoring and Recovering Tablespaces\n\nSometimes you’ll have\
    \ a media failure that’s localized to a particular tablespace or set of tablespaces.\
    \ In this situation, it’s appropriate to restore and recover at the tablespace\
    \ level of granularity. The RMAN RESTORE TABLESPACE and RECOVER TABLESPACE commands\
    \ will restore and recover all data files associated with the specified tablespace(s).\n\
    \nRestoring Tablespaces While the Database Is Open\n\nIf your database is open,\
    \ then you must take offline the tablespace you want to restore and recover. You\
    \ can do this for any tablespace except SYSTEM and UNDO. This example restores\
    \ and recovers the USERS tablespace while the database is open:\n\n```\n$ rman\
    \ target /\nRMAN> sql 'alter tablespace users offline immediate';\nRMAN> restore\
    \ tablespace users;\nRMAN> recover tablespace users;\nRMAN> sql 'alter tablespace\
    \ users online';\n```\n\nAfter the tablespace is brought online, you should see\
    \ a message such as this:\n\n```\nsql statement: alter tablespace users online\n\
    ```\n\nStarting with Oracle Database 12c, you can run SQL statements directly,\
    \ without the RMAN sql command and associated quotation marks; for example,\n\n\
    ```\n$ rman target /\nRMAN> alter tablespace users offline immediate;\nRMAN> restore\
    \ tablespace users;\nRMAN> recover tablespace users;\nRMAN> alter tablespace users\
    \ online;\n```\n\nRestoring Tablespaces While the Database Is in Mount Mode\n\n\
    Usually when performing a restore and recovery, DBAs will shut down the database\
    \ and restart it in mount mode in preparation for performing the recovery. Placing\
    \ a database in mount mode ensures that no users are connecting to the database\
    \ and that no transactions are transpiring.\n\nAlso, if you’re restoring and recovering\
    \ the SYSTEM tablespace, then you must start the database in mount mode. Oracle\
    \ doesn’t allow for restoring and recovering the SYSTEM tablespace data files\
    \ while the database is open. This next example restores the SYSTEM tablespace\
    \ while the database is in mount mode:\n\n```\n$ rman target /\nRMAN> shutdown\
    \ immediate;\nRMAN> startup mount;\nRMAN> restore tablespace system;\nRMAN> recover\
    \ tablespace system;\nRMAN> alter database open;\n```\n\nIf successful, the last\
    \ message you should see is this:\n\n```\nStatement processed\n```\n\nRestoring\
    \ Read-Only Tablespaces\n\nRMAN will restore read-only tablespaces along with\
    \ the rest of the database when you issue a RESTORE DATABASE command. For example,\
    \ the following command will restore all data files (including those in read-only\
    \ mode):\n\n```\nRMAN> restore database;\n```\n\nPrior to Oracle Database 11g,\
    \ you were required to issue RESTORE DATABASE CHECK READONLY to instruct RMAN\
    \ to restore read-only tablespaces along with tablespaces in read-write mode.\
    \ This is no longer a requirement in Oracle Database 11g and higher.\n\n![image](Images/sq.jpg) **Note**  \
    \ If you are using a backup that was created after the read-only tablespace was\
    \ placed in read-only mode, then no recovery is necessary for the read-only data\
    \ files. In this situation no redo has been generated for the read-only tablespace\
    \ since it was backed up.\n\nRestoring Temporary Tablespaces\n\nStarting with\
    \ Oracle Database 10g, you don’t have to restore or re-create missing locally\
    \ managed temporary tablespace temp files. When you open your database for use,\
    \ Oracle automatically detects and re-creates locally managed temporary tablespace\
    \ temp files.\n\nWhen Oracle automatically re-creates a temporary tablespace,\
    \ it will log a message to your target database alert.log  such as this:\n\n```\n\
    Re-creating tempfile <your temporary tablespace filename>\n```\n\nIf, for any\
    \ reason, your temporary tablespace becomes unavailable, you can also re-create\
    \ it yourself. Because there are never any permanent objects in temporary tablespaces,\
    \ you can simply re-create them as needed. Here is an example of how to create\
    \ a locally managed temporary tablespace:\n\n```\nCREATE TEMPORARY TABLESPACE\
    \ temp TEMPFILE\n'/u01/dbfile/o12c/temp01.dbf' SIZE 1000M\nEXTENT MANAGEMENT\n\
    LOCAL UNIFORM SIZE 512K;\n```\n\nIf your temporary tablespace exists, but the\
    \ temporary data files are missing, you can just add them, as shown:\n\n```\n\
    alter tablespace temp\nadd tempfile '/u01/dbfile/o12c/temp02.dbf' SIZE 5000M REUSE;\n\
    ```\n\nRestoring and Recovering Data Files\n\nA data file–level restore and recovery\
    \ works well when a media failure is confined to a small set of data files. With\
    \ data file–level recoveries, you can instruct RMAN to restore and recover either\
    \ with data file name or data file number. For data files not associated with\
    \ the SYSTEM or UNDO tablespaces, you have the option of restoring and recovering\
    \ while the database remains open. While the database is open, however, you must\
    \ first take offline any data files being restored and recovered.\n\nRestoring\
    \ and Recovering Data Files While the Database Is Open\n\nUse the RESTORE DATAFILE\
    \ and RECOVER DATAFILE commands to restore and recover at the data file level.\
    \ When your database is open, you’re required to take offline any data files that\
    \ you’re attempting to restore and recover. This example restores and recovers\
    \ data files while the database is open:\n\n```\nRMAN> sql 'alter database datafile\
    \ 4, 5 offline';\nRMAN> restore datafile 4, 5;\nRMAN> recover datafile 4, 5;\n\
    RMAN> sql 'alter database datafile 4, 5 online';\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ Use the RMAN REPORT SCHEMA command to list data file names and file numbers.\
    \ You can also query the NAME and FILE# columns of V$DATAFILE to take names and\
    \ numbers.\n\nYou can also specify the name of the data file that you want to\
    \ restore and recover; for example,\n\n```\nRMAN> sql \"alter database datafile\
    \ ''/u01/dbfile/o12c/users01.dbf'' offline\";\nRMAN> restore datafile '/u01/dbfile/o12c/users01.dbf';\n\
    RMAN> recover datafile '/u01/dbfile/o12c/users01.dbf';\nRMAN> sql \"alter database\
    \ datafile ''/u01/dbfile/o12c/users01.dbf'' online\";\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ When using the RMAN sql command, if there are single quotation marks within\
    \ the SQL statement, then you are required to use double quotation marks to enclose\
    \ the entire SQL statement and two single quotation marks where you would ordinarily\
    \ use just one quotation double mark.\n\nAs mentioned earlier, starting with Oracle\
    \ Database 12c, you can run SQL commands directly, without the RMAN sql command\
    \ and associated quotation marks; for example,\n\n```\nRMAN> alter database datafile\
    \ 4 offline;\nRMAN> restore datafile 4;\nRMAN> recover datafile 4;\nRMAN> alter\
    \ database datafile 4 online;\n```\n\nHere are the corresponding 12c examples,\
    \ with the data file names:\n\n```\nRMAN> alter database datafile '/u01/dbfile/o12c/users01.dbf'\
    \ offline;\nRMAN> restore datafile '/u01/dbfile/o12c/users01.dbf';\nRMAN> recover\
    \ datafile '/u01/dbfile/o12c/users01.dbf';\nRMAN> alter database datafile '/u01/dbfile/o12c/users01.dbf'\
    \ online;\n```\n\nRestoring and Recovering Data Files While the Database Is Not\
    \ Open\n\nIn this scenario the database is first shut down and then started in\
    \ mount mode. You can restore and recover any data file in your database while\
    \ the database is not open. This example shows the restoring of data file 1, which\
    \ is associated with the SYSTEM tablespace:\n\n```\n$ rman target /\nRMAN> shutdown\
    \ abort;\nRMAN> startup mount;\nRMAN> restore datafile 1;\nRMAN> recover datafile\
    \ 1;\nRMAN> alter database open;\n```\n\nYou can also specify the file name when\
    \ performing a data file recovery:\n\n```\n$ rman target /\nRMAN> shutdown abort;\n\
    RMAN> startup mount;\nRMAN> restore datafile '/u01/dbfile/o12c/system01.dbf';\n\
    RMAN> recover datafile '/u01/dbfile/o12c/system01.dbf';\nRMAN> alter database\
    \ open;\n```\n\nRestoring Data Files to Nondefault Locations\n\nSometimes a failure\
    \ will occur that renders the disks associated with a mount point inoperable.\
    \ In these situations, you will need to restore and recover the data files to\
    \ a location different from the one where they originally resided. Another typical\
    \ need for restoring data files to nondefault locations is that you’re restoring\
    \ to a different database server, on which the mount points are completely different\
    \ from those of the server on which the backup originated.\n\nUse the SET NEWNAME\
    \ and SWITCH commands to restore data files to nondefault locations. Both of these\
    \ commands must be run from within an RMAN run{} block. You can think of using\
    \ SET NEWNAME and SWITCH as a way to rename data files (similar to the SQL*Plus\
    \ ALTER DATABASE RENAME FILE statement).\n\nThis example changes the location\
    \ of data files when doing a restore and recover. First, place the database in\
    \ mount mode:\n\n```\n$ rman target /\nRMAN> startup mount;\n```\n\nThen, run\
    \ the following block of RMAN code:\n\n```\nrun{\nset newname for datafile 4 to\
    \ '/u02/dbfile/o12c/users01.dbf';\nset newname for datafile 5 to '/u02/dbfile/o12c/users02.dbf';\n\
    restore datafile 4, 5;\nswitch datafile all; # Updates repository with new datafile\
    \ location.\nrecover datafile 4, 5;\nalter database open;\n}\n```\n\nThis is a\
    \ partial listing of the output:\n\n```\ndatafile 4 switched to datafile copy\n\
    input datafile copy RECID=79 STAMP=804533148 file name=/u02/dbfile/o12c/users01.dbf\n\
    datafile 5 switched to datafile copy\ninput datafile copy RECID=80 STAMP=804533148\
    \ file name=/u02/dbfile/o12c/users02.dbf\n```\n\nIf the database is open, you\
    \ can place the data files offline and then set their new names for restore and\
    \ recovery, as follows:\n\n```\nrun{\nsql 'alter database datafile 4, 5 offline';\n\
    set newname for datafile 4 to '/u02/dbfile/o12c/users01.dbf';\nset newname for\
    \ datafile 5 to '/u02/dbfile/o12c/users02.dbf';\nrestore datafile 4, 5;\nswitch\
    \ datafile all; # Updates repository with new datafile location.\nrecover datafile\
    \ 4, 5;\nsql 'alter database datafile 4, 5 online';\n}\n```\n\nStarting with Oracle\
    \ Database 12c, you no longer need to specify the RMAN sql command when running\
    \ SQL statements, such as ALTER DATABASE; for example,\n\n```\nrun{\nalter database\
    \ datafile 4, 5 offline;\nset newname for datafile 4 to '/u02/dbfile/o12c/users01.dbf';\n\
    set newname for datafile 5 to '/u02/dbfile/o12c/users02.dbf';\nrestore datafile\
    \ 4, 5;\nswitch datafile all; # Updates repository with new datafile location.\n\
    recover datafile 4, 5;\nalter database datafile 4, 5 online;\n}\n```\n\nPerforming\
    \ Block-Level Recovery\n\nBlock-level corruption is rare and is usually caused\
    \ by some sort of I/O error. However, if you do have an isolated corrupt block\
    \ within a large data file, it’s nice to have the option of performing a block-level\
    \ recovery. Block-level recovery is useful when a small number of blocks are corrupt\
    \ within a data file. Block recovery is not appropriate if the entire data file\
    \ needs media recovery.\n\nRMAN will automatically detect corrupt blocks whenever\
    \ a B ACKUP, V ALIDATE, or B ACKUP VALIDATE command is run. Details on corrupt\
    \ blocks can be viewed in the V$DATABASE_BLOCK_CORRUPTION view. In the following\
    \ example the regular backup job has reported a corrupt block in the output:\n\
    \n```\nORA-19566: exceeded limit of 0 corrupt blocks for file...\n```\n\nQuerying\
    \ the V$DATABASE_BLOCK_CORRUPTION view indicates which file contains corruption:\n\
    \n```\nSQL> select * from v$database_block_corruption;\n\n     FILE#     BLOCK#    \
    \ BLOCKS CORRUPTION_CHANGE# CORRUPTIO     CON_ID\n---------- ---------- ----------\
    \ ------------------ --------- ----------\n         4         20          1                  0\
    \ ALL ZERO           0\n```\n\nYour database can be either mounted or open when\
    \ performing block-level recovery. You do not have to take offline the data file\
    \ being recovered. You can instruct RMAN to recover all blocks reported in V $DATABASE_BLOCK_CORRUPTION,\
    \ as shown:\n\n```\nRMAN> recover corruption list;\n```\n\nIf successful, the\
    \ following message is displayed:\n\n```\nmedia recovery complete...\n```\n\n\
    Another way to recover the block is to specify the data file and block number,\
    \ like so:\n\n```\nRMAN> recover datafile 4 block 20;\n```\n\nIt’s preferable\
    \ to use the RECOVER CORRUPTION LIST syntax because it will clear out any blocks\
    \ recovered from the V $DATABASE_BLOCK_CORRUPTION view.\n\n![image](Images/sq.jpg) **Note**  \
    \ RMAN can’t perform block-level recovery on block 1 (data file header) of the\
    \ data file.\n\nBlock-level media recovery allows you to keep your database available\
    \ and also reduces the mean time to recovery, as only the corrupt blocks are offline\
    \ during the recovery. Your database must be in archivelog mode for performing\
    \ block-level recoveries. Starting with Oracle Database 11g, RMAN can restore\
    \ the block from the flashback logs (if available). If the flashback logs are\
    \ not available, then RMAN will attempt to restore the block from a full backup,\
    \ a level-0 backup, or an image copy backup generated by the B ACKUP AS COPY command.\
    \ After the block has been restored, any required archived redo logs must be available\
    \ to recover the block. RMAN can’t perform block media recovery using incremental\
    \ level-1 (or higher) backups.\n\n![image](Images/sq.jpg) **Note**   If you’re\
    \ using Oracle Database 10g or Oracle9i Database, use the B LOCKRECOVER command\
    \ to perform block media recovery. Block-level recovery is not available in Oracle\
    \ version 8.\n\nRestoring a Container Database and Its Associated Pluggable Databases\n\
    \nStarting with Oracle Database 12c, you can create pluggable databases within\
    \ one container database (see [Chapter 23](#9781430257288_Ch23.xhtml) for details).\
    \ When dealing with container and associated pluggable databases, there are three\
    \ basic scenarios:\n\n*   All data files have experienced media failure (container\
    \ root data files as well as all associated pluggable database data files).\n\
    *   Just the data files associated with the container root database have experienced\
    \ media failure.\n*   Only data files associated with a pluggable database have\
    \ experienced media failure.\n\nThe prior scenarios are covered in the following\
    \ sections.\n\nRestoring and Recovering All Data Files\n\nTo restore and recover\
    \ all data files associated with a container database (this includes the root\
    \ container, the seed container, and all associated pluggable databases), use\
    \ RMAN to connect to the container database as a user with sysdba or sysbackup\
    \ privileges. Because the data files associated with the root system tablespace\
    \ are being restored, the database must be started in mount mode (and not open):\n\
    \n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database;\nRMAN> recover\
    \ database;\nRMAN> alter database open;\n```\n\nKeep in mind that when you open\
    \ a container database, this does not, by default, open the associated pluggable\
    \ databases. You can do that from the root container, as follows:\n\n```\nRMAN>\
    \ alter pluggable database all open;\n```\n\nRestoring and Recovering Root Container\
    \ Data Files\n\nIf just data files associated with the root container have been\
    \ damaged, then you can restore and recover at the root level. In this example\
    \ the root container’s system data file is being restored, so the database must\
    \ not be open. The following commands instruct RMAN to restore only the data files\
    \ associated with the root container database, via the keyword root:\n\n```\n\
    $ rman target /\nRMAN> startup mount;\nRMAN> restore database root;\nRMAN> recover\
    \ database root;\nRMAN> alter database open;\n```\n\nIn the prior code the restore\
    \ database root command instructs RMAN to restore only data files associated with\
    \ the root container database. After the container database is opened, you must\
    \ open any associated pluggable databases. You can do so from the root container,\
    \ as shown:\n\n```\nRMAN> alter pluggable database all open;\n```\n\nYou can check\
    \ the status of your pluggable databases via this query:\n\n```\nSQL> select name,\
    \ open_mode from v$pdbs;\n```\n\nRestoring and Recovering a Pluggable Database\n\
    \nYou have two options for restoring and recovering a pluggable database:\n\n\
    *   Connect as the container root user, and specify the pluggable database to\
    \ be restored and recovered.\n*   Connect directly to the pluggable database as\
    \ a privileged pluggable-level user, and issue RESTORE and RECOVER commands.\n\
    \nThis first example connects to the root container and restores and recovers\
    \ the data files associated with the salespdb pluggable database. For this to\
    \ work, the pluggable database must not be open (because the pluggable database’s\
    \ system data files are also being restored and recovered):\n\n```\n$ rman target\
    \ /\nRMAN> alter pluggable database salespdb close;\nRMAN> restore pluggable database\
    \ salespdb;\nRMAN> recover pluggable database salespdb;\nRMAN> alter pluggable\
    \ database salespdb open;\n```\n\nYou can also connect directly to a pluggable\
    \ database and perform restore and recovery operations. When connected directly\
    \ to the pluggable database, the user only has access to the data files associated\
    \ with the pluggable database:\n\n```\n$ rman target sys/foo@salespdb\nRMAN> shutdown\
    \ immediate;\nRMAN> restore database;\nRMAN> recover database;\nRMAN> alter database\
    \ open;\n```\n\n![image](Images/sq.jpg) **Note**   When you’re connected directly\
    \ to a pluggable database, you can’t specify the name of the pluggable database\
    \ as part of the RESTORE and RECOVER commands. In this situation, you’ll get an\
    \ error indicating the operation isn’t allowed while connected to a pluggable\
    \ database.\n\nThe prior code only affects data files associated with the pluggable\
    \ database to which you are connected. The pluggable database needs to be closed\
    \ for this to work. However, the root container database can be open or mounted.\
    \ Also, you must use a backup that was taken while connected to the pluggable\
    \ database as a privileged user. The privileged pluggable database user can’t\
    \ access backups of data files initiated by the root container database privileged\
    \ user.\n\nRestoring Archive Redo Log Files\n\nRMAN will automatically restore\
    \ any archived redo log files that it needs during a recovery process. You normally\
    \ don’t need to restore archived redo log files manually. However, you may want\
    \ to do so if any of the following situations apply:\n\n*   You need to restore\
    \ archived redo log files in anticipation of later performing a recovery; the\
    \ idea is that if the archived redo log files are already restored, it will speed\
    \ the recovery operation.\n*   You’re required to restore the archived redo log\
    \ files to a nondefault location, either because of media failure or because of\
    \ storage space issues.\n*   You need to restore specific archived redo log files\
    \ in order to inspect them via LogMiner.\n\nIf you’ve enabled an FRA, then RMAN\
    \ will, by default, restore archived redo log files to the destination defined\
    \ by the initialization parameter DB_RECOVERY_FILE_DEST. Otherwise, RMAN uses\
    \ the LOG_ARCHIVE_DEST_N initialization parameter (where N is usually 1) to determine\
    \ where to restore the archived redo log files.\n\nIf you restore archived redo\
    \ log files to a nondefault location, RMAN knows the location they were restored\
    \ to and automatically finds these files when you issue any subsequent RECOVER\
    \ commands. RMAN will not restore archived redo log files that it determines are\
    \ already on disk. Even if you specify a nondefault location, RMAN will not restore\
    \ an archived redo log file to disk if the file already exists. In this situation,\
    \ RMAN simply returns a message stating that the archived redo log file has already\
    \ been restored. Use the FORCE option to override this behavior.\n\nIf you are\
    \ uncertain of the sequence numbers to use during a restore of log files, you\
    \ can query the V$LOG_HISTORY view.\n\n![image](Images/sq.jpg) **Tip**   Keep\
    \ in mind that you can’t restore an archive redo log that you never backed up.\
    \ Also, you can’t restore an archive redo log if the backup file containing the\
    \ archive redo log is no longer available. Run the LIST ARCHIVELOG ALL command\
    \ to view archive redo logs currently on disk, and LIST BACKUP OF ARCHIVELOG ALL\
    \ to verify which archive redo log files are in available RMAN backups.\n\nRestoring\
    \ to the Default Location\n\nThe following command will restore all archived redo\
    \ log files that RMAN has backed up:\n\n```\nRMAN> restore archivelog all;\n```\n\
    \nIf you want to restore from a specified sequence, use the FROM SEQUENCE clause.\
    \ You may want to run this query first to establish the most recent log files\
    \ and sequence numbers that have been generated:\n\n```\nSQL> select sequence#,\
    \ first_time from v$log_history order by 2;\n```\n\nThis example restores all\
    \ archived redo log files from sequence 68:\n\n```\nRMAN> restore archivelog from\
    \ sequence 68;\n```\n\nIf you want to restore a range of archived redo log files,\
    \ use the FROM SEQUENCE and UNTIL SEQUENCE clauses or the SEQUENCE BETWEEN clause,\
    \ as shown. The following commands restore archived redo log files from sequence\
    \ 68 through sequence 78, using thread 1:\n\n```\nRMAN> restore archivelog from\
    \ sequence 68 until sequence 78 thread 1;\nRMAN> restore archivelog sequence between\
    \ 68 and 78 thread 1;\n```\n\nBy default, RMAN won’t restore an archived redo\
    \ log file if it is already on disk. You can override this behavior if you use\
    \ the FORCE, like so:\n\n```\nRMAN> restore archivelog from sequence 1 force;\n\
    ```\n\nRestoring to a Nondefault Location\n\nUse the SET ARCHIVELOG DESTINATION\
    \ clause if you want to restore archived redo log files to a location different\
    \ from the default. The following example restores to the nondefault location\
    \ u01/archtemp. The option of the SET command must be executed from within an\
    \ RMAN run{} block.\n\n```\nrun{\nset archivelog destination to '/u01/archtemp';\n\
    restore archivelog from sequence 8 force;\n}\n```\n\nRestoring a Control File\n\
    \nIf you are missing one control file, and you have multiple copies, then you\
    \ can shut down your database and simply restore the missing or damaged control\
    \ file by copying a good control file to the correct location and name of the\
    \ missing control file (see [Chapter 5](#9781430257288_Ch05.xhtml) for details).\n\
    \nListed next are three typical scenarios when restoring a control file:\n\n*\
    \   Using a recovery catalog\n*   Using an autobackup\n*   Specifying a backup\
    \ file name\n\nUsing a Recovery Catalog\n\nWhen you’re connected to the recovery\
    \ catalog, you can view backup information about your control files even while\
    \ your target database is in nomount mode. To list backups of your control files,\
    \ use the LIST command, as shown:\n\n```\n$ rman target / catalog rcat/foo@rcat\n\
    RMAN> startup nomount;\nRMAN> list backup of controlfile;\n```\n\nIf you’re missing\
    \ all your control files, and you’re using a recovery catalog, then issue the\
    \ STARTUP NOMOUNT and the RESTORE CONTROLFILE commands:\n\n```\nRMAN> startup\
    \ nomount;\nRMAN> restore controlfile;\n```\n\nRMAN restores the control files\
    \ to the location defined by your CONTROL_FILES initialization parameter. You\
    \ should see a message indicating that your control files have been successfully\
    \ copied back from an RMAN backup piece. You can now alter your database into\
    \ mount mode and perform any additional restore and recovery commands required\
    \ for your database.\n\n![image](Images/sq.jpg) **Note**   When you restore a\
    \ control file from a backup, you’re required to perform media recovery on your\
    \ entire database and open your database with the OPEN RESETLOGS command, even\
    \ if you didn’t restore any data files. You can determine whether your control\
    \ file is a backup by querying the CONTROLFILE_TYPE column of the V$DATABASE view.\n\
    \nUsing an Autobackup\n\nWhen you enable the autobackup of your control file and\
    \ are using an FRA, restoring your control file is fairly simple. First, connect\
    \ to your target database, then issue a STARTUP NOMOUNT command, followed by the\
    \ RESTORE CONTROLFILE FROM AUTOBACKUP command, like this:\n\n```\n$ rman target\
    \ /\nRMAN> startup nomount;\nRMAN> restore controlfile from autobackup;\n```\n\
    \nRMAN restores the control files to the location defined by your CONTROL_FILES\
    \ initialization parameter. You should see a message indicating that your control\
    \ files have been successfully copied back from an RMAN backup piece. Here is\
    \ a snippet of the output:\n\n```\nchannel ORA_DISK_1: control file restore from\
    \ AUTOBACKUP complete\n```\n\nYou can now alter your database into mount mode\
    \ and perform any additional restore and recovery commands required for your database.\n\
    \nSpecifying a Backup File Name\n\nWhen restoring a database to a different server,\
    \ these are generally the first few steps in the process take a backup of the\
    \ target database, copy to the remote server, and then restore the control file\
    \ from the RMAN backup. In these scenarios, I usually know the name of the backup\
    \ piece that contains the control file. Here is an example in which you instruct\
    \ RMAN to restore a control file from a specific backup piece file:\n\n```\nRMAN>\
    \ startup nomount;\nRMAN> restore controlfile from\n'/u01/O12C/rman/rman_ctl_c-3423216220-20130113-01.bk';\n\
    ```\n\nThe control file will be restored to the location defined by the CONTROL_FILES\
    \ initialization parameter.\n\nRestoring the spfile\n\nYou might want to restore\
    \ a spfile for several different reasons:\n\n*   You accidentally set a value\
    \ in the spfile that keeps your instance from starting.\n*   You accidentally\
    \ deleted the spfile.\n*   You are required to see what the spfile looked like\
    \ at some point in time in the past.\n\nOne scenario (this has happened to me\
    \ more than once) is that you’re using a spfile, and one of the DBAs on your team\
    \ does something inexplicable, such as this:\n\n```\nSQL> alter system set processes=1000000\
    \ scope=spfile;\n```\n\nThe parameter is changed in the spfile on disk, but not\
    \ in memory. Sometime later, the database is stopped for some maintenance. When\
    \ attempting to start the database, you can’t even get the instance to start in\
    \ a nomount state. This is because a parameter has been set to a ridiculous value\
    \ that will consume all the memory on the box. In this scenario the instance may\
    \ hang, or you may see one or more of the following messages:\n\n```\nORA-01078:\
    \ failure in processing system parameters\nORA-00838: Specified value of ... is\
    \ too small\n```\n\nIf you have an RMAN backup available that has a copy of the\
    \ spfile as it was before it was modified, you can simply restore the spfile.\
    \ If you are using a recovery catalog, here is the procedure for restoring the\
    \ spfile:\n\n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> startup nomount;\n\
    RMAN> restore spfile;\n```\n\n*   If you’re not using a recovery catalog, there\
    \ are a number of ways to restore your spfile. The approach you take depends on\
    \ several variables, such as whether you’re using an FRA\n*   you’ve configured\
    \ a channel backup location for the autobackup\n*   you’re using the default location\
    \ for autobackups\n\nI’m not going to show every detail of these scenarios. Usually,\
    \ I determine the location of the backup piece that contains the backup of the\
    \ spfile and do the restore, like this:\n\n```\nRMAN> startup nomount force;\n\
    RMAN> restore spfile to '/tmp/spfile.ora'\n      from '/u01/O12C/rman/rman_ctl_c-3423216220-20130113-00.bk';\n\
    ```\n\nYou should see a message such as this:\n\n```\nchannel ORA_DISK_1: SPFILE\
    \ restore from AUTOBACKUP complete\n```\n\nIn this example the spfile is restored\
    \ to the /tmp directory. Once restored, you can copy the spfile to ORACLE_HOME/dbs,\
    \ with the proper name. For my environment (database name: o12c) this would be\
    \ as follows:\n\n```\n$ cp /tmp/spfile.ora $ORACLE_HOME/dbs/spfileo12c.ora\n```\n\
    \n![image](Images/sq.jpg) **Note**   For a complete description of all possible\
    \ spfile and control file restore scenarios, see *RMAN Recipes for Oracle Database\
    \ 12c, second edition*, by Darl Kuhn (Apress, 2013).\n\nIncomplete Recovery\n\n\
    The term *incomplete database recovery* means that you can’t recover all committed\
    \ transactions. *Incomplete* means that you do not apply all redo to restore up\
    \ to the point of the last committed transaction that occurred in your database.\
    \ In other words, you are restoring and recovering to a point in time in the past.\
    \ For this reason, incomplete database recovery is also called database point-in-time\
    \ recovery (DBPITR). Typically, you perform incomplete database recovery for one\
    \ of the following reasons:\n\n*   You don’t have all the redo required to perform\
    \ a complete recovery. You’re missing either the archived redo log files or the\
    \ online redo log files that are required for complete recovery. This situation\
    \ could arise because the required redo files are damaged or missing.\n*   You\
    \ purposely want to roll back the database to a point in time in the past. For\
    \ example, you would do this if somebody accidentally truncated a table, and you\
    \ intentionally wanted to roll back the database to just before the truncate table\
    \ command was issued.\n\nIncomplete database recovery consists of two : restore\
    \ and recovery. The restore step re-creates data files, and the recover step applies\
    \ redo up to the specified point in time. The restore process can be initiated\
    \ from RMAN in a couple of different ways:\n\n*   RESTORE DATABASE UNTIL\n*  \
    \ FLASHBACK DATABASE\n\nFor the majority of incomplete database recovery circumstances,\
    \ you use the RESTORE DATABASE UNTIL command to instruct RMAN to retrieve data\
    \ files from the RMAN backup files. This type of incomplete database recovery\
    \ is the main focus of this section of the chapter. The Flashback Database feature\
    \ is covered in the section “Flashing Back a Database, ” later in this chapter.\n\
    \nThe UNTIL portion of the R ESTORE DATABASE command instructs RMAN to retrieve\
    \ data files from a point in time in the past, based on one of the following methods:\n\
    \n*   Time\n*   SCN\n*   Log sequence number\n*   Restore point\n\nThe RMAN RESTORE\
    \ DATABASE UNTIL command will retrieve all data files from the most recent backup\
    \ set or image copy. RMAN will automatically determine from the UNTIL clause which\
    \ backup set contains the required data files. If you omit the UNTIL clause of\
    \ the R ESTORE DATABASE command, RMAN will retrieve data files from the latest\
    \ available backup set or image copy. In some situations this may be the behavior\
    \ you desire. I recommend that you use the UNTIL clause to ensure that RMAN restores\
    \ from the correct backup set. When you issue the RESTORE DATABASE UNTIL command,\
    \ RMAN will establish how to extract the data files from any of the following\
    \ types of backups:\n\n*   Full database backup\n*   Incremental level-0 backup\n\
    *   Image copy backup generated by the B ACKUP AS COPY command\n\nYou can’t perform\
    \ an incomplete database recovery on a subset of your database’s online data files.\
    \ When performing incomplete database recovery, all the checkpoint SCNs for all\
    \ online data files must be synchronized before you can open your database with\
    \ the ALTER DATABASE OPEN RESETLOGS command. You can view the data file header\
    \ SCNs and the status of each data file via this SQL query:\n\n```\nselect file#,\
    \ status, fuzzy,\nerror, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ The FUZZY column V$DATAFILE_HEADER contains data files that have one or more\
    \ blocks with an SCN value greater than or equal to the checkpoint SCN in the\
    \ data file header. If a data file is restored and has a FUZZY value of YES, then\
    \ media recovery is required.\n\nThe only exception to this rule of not performing\
    \ an incomplete recovery on a subset of online database files is a tablespace\
    \ point-in-time recovery (TSPITR), which uses the RECOVER TABLESPACE UNTIL command.\
    \ TSPITR is used in rare situations; it restores and recovers only the tablespace(s)\
    \ you specify. For more details on TSPITR, see *RMAN Recipes for Oracle Database\
    \ 12c*.\n\nThe recovery portion of an incomplete database recovery is always initiated\
    \ with the R ECOVER DATABASE UNTIL command. RMAN will automatically recover your\
    \ database up to the point specified with the UNTIL clause. Just like the RESTORE\
    \ command, you can recover up to time, change/SCN, log sequence number, or restore\
    \ point. When RMAN reaches the specified point, it will automatically terminate\
    \ the recovery process.\n\n![image](Images/sq.jpg) **Note**   Regardless of what\
    \ you specify in the UNTIL clause, RMAN will convert that into a corresponding\
    \ UNTIL SCN clause and assign the appropriate SCN. This is to avoid any timing\
    \ issues, particularly those caused by Daylight Saving Time.\n\nDuring a recovery,\
    \ RMAN will automatically determine how to apply redo. First, RMAN will apply\
    \ any incremental backups available. Next, any archived redo log files on disk\
    \ will be applied. If the archived redo log files do not exist on disk, then RMAN\
    \ will attempt to retrieve them from a backup set. If you want to apply redo as\
    \ part of an incomplete database recovery, the following conditions must be true:\n\
    \n*   Your database is in archivelog mode.\n*   You have a good backup of all\
    \ data files.\n*   You have all redo required to restore up to the specified point.\n\
    \n![image](Images/sq.jpg) **Tip**   Starting with Oracle Database 10g, you can\
    \ perform parallel media recovery by using the RECOVER DATABASE PARALLEL command.\n\
    \nWhen performing an incomplete database recovery with RMAN, you must have your\
    \ database in mount mode. RMAN needs the database in mount mode to be able to\
    \ read and write to the control file. Also, with an incomplete database recovery,\
    \ any SYSTEM tablespace data files are always recovered. Oracle will not allow\
    \ your database to be open while restoring the SYSTEM tablespace data file(s).\n\
    \n![image](Images/sq.jpg) **Note**   After incomplete database recovery is performed,\
    \ you are required to open your database with the ALTER DATABASE OPEN RESETLOGS\
    \ command.\n\nDepending on the scenario, you can use RMAN to perform a variety\
    \ of incomplete recovery methods. The next section discusses how to determine\
    \ what type of incomplete recovery to perform.\n\nDetermining the Type of Incomplete\
    \ Recovery\n\nTime-based restore and recovery is commonly used when you know the\
    \ approximate date and time to which you want to recover your database. For instance,\
    \ you may know approximately the time you want to stop the recovery process, but\
    \ not a particular SCN.\n\nLog sequence–based and cancel-based recovery work well\
    \ in situations in which you have missing or damaged log files. In such scenarios,\
    \ you can recover only up to your last good archived redo log file.\n\nSCN-based\
    \ recovery works well if you can pinpoint the SCN at which you want to stop the\
    \ recovery process. You can retrieve SCN information from views such as V$LOG\
    \ and V$LOG_HISTORY. You can also use tools such as LogMiner to retrieve the SCN\
    \ of a particular SQL statement.\n\nRestore point recoveries work only if you\
    \ have established restore points. In these situations, you restore and recover\
    \ up to the SCN associated with the specified restore point.\n\nTSPITR is used\
    \ in situations in which you need to restore and recover just a few tablespaces.\
    \ You can use RMAN to automate many of the tasks associated with this type of\
    \ incomplete recovery.\n\nPerforming Time-Based Recovery\n\nTo restore and recover\
    \ your database back to a point in time in the past, you can use either the UNTIL\
    \ TIME clause of the RESTORE and RECOVER commands or the SET UNTIL TIME clause\
    \ within a run{} block. RMAN will restore and recover the database up to, but\
    \ not including, the specified time. In other words, RMAN will restore any transactions\
    \ committed prior to the time specified. RMAN automatically stops the recovery\
    \ process when it reaches the time you specified.\n\nThe default date format that\
    \ RMAN expects is YYYY-MM-DD:HH24:MI:SS. However, I recommend using the TO_DATE\
    \ function and specifying a format mask. This eliminates ambiguities with different\
    \ national date formats and having to set the OS NLS_DATE_FORMAT variable. The\
    \ following example specifies a time when issuing the restore and recover commands:\n\
    \n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database until time\n\
          \"to_date('15-jan-2013 12:20:00', 'dd-mon-rrrr hh24:mi:ss')\";\nRMAN> recover\
    \ database until time\n      \"to_date('15-jan-2013 12:20:00', 'dd-mon-rrrr hh24:mi:ss')\"\
    ;\nRMAN> alter database open resetlogs;\n```\n\nIf everything goes well, you should\
    \ see output such as this:\n\n```\nStatement processed\n```\n\nPerforming Log\
    \ Sequence-Based Recovery\n\nUsually this type of incomplete database recovery\
    \ is initiated because you have a missing or damaged archived redo log file. If\
    \ that’s the case, you can recover only up to your last good archived redo log\
    \ file, because you can’t skip a missing archived redo log.\n\nHow you determine\
    \ which archived redo log file to restore up to (but not including) will vary.\
    \ For example, if you are physically missing an archived redo log file, and RMAN\
    \ can’t find it in a backup set, you’ll receive a message such as this when trying\
    \ to apply the missing file:\n\n```\nRMAN-06053: unable to perform media recovery\
    \ because of missing log\nRMAN-06025: no backup of archived log for thread 1 with\
    \ sequence 19...\n```\n\nBased on the previous error message, you would restore\
    \ up to (but not including) log sequence 19.\n\n```\n$ rman target /\nRMAN> startup\
    \ mount;\nRMAN> restore database until sequence 19;\nRMAN> recover database until\
    \ sequence 19;\nRMAN> alter database open resetlogs;\n```\n\nIf successful, you\
    \ should see output such as this:\n\n```\nStatement processed\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ Log sequence–based recovery is similar to user-managed cancel-based recovery.\
    \ See [Chapter 16](#9781430257288_Ch16.xhtml) for details on a user-managed cancel-based\
    \ recovery.\n\nPerforming SCN-Based Recovery\n\nSCN-based incomplete database\
    \ recovery works in situations in which you know the SCN value at which you want\
    \ to end the restore-and-recovery session. RMAN will recover up to, but not including,\
    \ the specified SCN. RMAN automatically terminates the restore process when it\
    \ reaches the specified SCN.\n\nYou can view your database SCN information in\
    \ several ways:\n\n*   Using LogMiner to determine an SCN associated with a DDL\
    \ or DML statement\n*   Looking in the alert.log file\n*   Looking in your trace\
    \ files\n*   Querying the FIRST_CHANGE# column of V$LOG, V$LOG_HISTORY and V$ARCHIVED_LOG\n\
    \nAfter establishing the SCN to which you want to restore, use the U NTIL SCN\
    \ clause to restore up to, but not including, the SCN specified. The following\
    \ example restores all transactions that have an SCN that is less than 95019865425:\n\
    \n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database until scn\
    \ 95019865425;\nRMAN> recover database until scn 95019865425;\nRMAN> alter database\
    \ open resetlogs;\n```\n\nIf everything goes well, you should see output such\
    \ as this:\n\n```\nStatement processed\n```\n\nRestoring to a Restore Point\n\n\
    There are two types of restore points: normal and guaranteed. The main difference\
    \ between a guaranteed restore point and a normal restore point is that a guaranteed\
    \ restore point is not eventually aged out of the control file; a guaranteed restore\
    \ point will persist until you drop it. Guaranteed restore points do require an\
    \ FRA. However, for incomplete recovery using a guaranteed restore point, you\
    \ do not have to have flashback database enabled.\n\nYou can create a normal restore\
    \ point using SQL*Plus, as follows:\n\n```\nSQL> create restore point MY_RP;\n\
    ```\n\nThis command creates a restore point, named MY_RP, that is associated with\
    \ the SCN of the database at the time the command was issued. You can view the\
    \ current SCN of your database, as shown:\n\n```\nSQL> select current_scn from\
    \ v$database;\n```\n\nYou can view restore point information in the V$RESTORE_POINT\
    \ view, like so:\n\n```\nSQL> select name, scn from v$restore_point;\n```\n\n\
    The restore point acts like a synonym for the particular SCN. The restore point\
    \ allows you to restore and recover to an SCN without having to specify a number.\
    \ RMAN will restore and recover up to, but not including, the SCN associated with\
    \ the restore point.\n\nThis example restores and recovers to the MY_RP restore\
    \ point:\n\n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database\
    \ until restore point MY_RP;\nRMAN> recover database until restore point MY_RP;\n\
    RMAN> alter database open resetlogs;\n```\n\nRestoring Tables to a Previous Point\n\
    \nStarting with Oracle Database 12c, you can restore individual tables from RMAN\
    \ backups via the RECOVER TABLE command. This gives you with the ability to restore\
    \ and recover a table back to a point in time in the past.\n\nThe table-level\
    \ restore feature uses a temporary auxiliary instance and the Data Pump utility.\
    \ Both the auxiliary instance and Data Pump create temporary files when restoring\
    \ the table. Before initiating a table-level restore, first create two directories:\
    \ one to hold files used by the auxiliary instance and one to store a Data Pump\
    \ dump file:\n\n```\n$ mkdir /tmp/oracle\n$ mkdir /tmp/recover\n```\n\nThe prior\
    \ two directories are referenced within the RECOVER TABLE command via the AUXILIARY\
    \ DESTINATION and DATAPUMP DESTINATION clauses. In the following bit of code,\
    \ the INV table, owned by MV_MAINT, is restored as it was at a prior SCN:\n\n\
    ```\nrecover table mv_maint.inv\nuntil scn 4689805\nauxiliary destination '/tmp/oracle'\n\
    datapump destination '/tmp/recover';\n```\n\nProviding that RMAN backups are available\
    \ that contain the state of the table at the specified SCN, a table-level restore\
    \ and recovery is performed.\n\n![image](Images/sq.jpg) **Note**   You can also\
    \ restore a table to an SCN, a point in time, or a log sequence number.\n\nWhen\
    \ RMAN performs a table-level recovery, it automatically creates a temporary auxiliary\
    \ database, uses Data Pump to export the table, and then imports the table back\
    \ into the target database as it was at the specified restore point. After the\
    \ restore is finished, the auxiliary database is dropped, and Data Pump dump file\
    \ is removed.\n\n![image](Images/sq.jpg) **Tip**   Although the RECOVER TABLE\
    \ command is a nice enhancement, I would recommend that, if you have an accidentally\
    \ dropped table, you first explore using the Flashback Table to Before Drop feature\
    \ to restore the table. Or, if the table was erroneously deleted from, then use\
    \ the Flashback Table feature to restore the table back to a point in time in\
    \ the past. If neither of the prior options are viable, then consider using the\
    \ RMAN Recover Table feature.\n\nFlashing Back a Table\n\nPrior to Oracle Database\
    \ 10g, if a table was accidentally dropped, you had to do the following to restore\
    \ the table:\n\n1.  Restore a backup of the database to a test database.\n2. \
    \ Perform an incomplete recovery up to the point in time at which the table was\
    \ dropped.\n3.  Export the table.\n4.  Import the table into the production database.\n\
    \nThis process can be time-consuming and resource intensive. It requires extra\
    \ server resources as well as time and effort from a DBA.\n\nTo  simplify recovery\
    \ of an accidentally dropped table, Oracle introduced the Flashback Table feature.\
    \ Oracle offers two different types of Flashback Table operations:\n\n*   FLASHBACK\
    \ TABLE TO BEFORE DROP quickly undrops a previously dropped table. This feature\
    \ uses a logical container named the recycle bin.\n*   FLASHBACK TABLE flashes\
    \ back to a recent point in time to undo the effects of undesired DML statements.\
    \ You can flash back to an SCN, a timestamp, or a restore point.\n\nOracle introduced\
    \ FLASHBACK TABLE TO BEFORE DROP to allow you to quickly recover a dropped table.\
    \ As of Oracle Database 10g, when you drop a table, if you don’t specify the PURGE\
    \ clause, Oracle doesn’t drop the table—instead, the table is renamed. Any tables\
    \ you drop (that Oracle renames) are placed in the recycle bin. The recycle bin\
    \ provides you with an efficient way to view and manage dropped objects.\n\n![image](Images/sq.jpg) **Note**  \
    \ To use the Flashback Table feature, you don’t need to implement an FRA, nor\
    \ do you need Flashback Database to be enabled.\n\nThe FLASHBACK TABLE TO BEFORE\
    \ DROP operation only works if your database has the recycle bin feature enabled\
    \ (which it is by default). You can check the status of the recycle bin, as follows:\n\
    \n```\nSQL> show parameter recyclebin\n\nNAME                                \
    \ TYPE        VALUE\n------------------------------------ ----------- ------------------------------\n\
    recyclebin                           string      on\n```\n\nFLASHBACK TABLE TO\
    \ BEFORE DROP\n\nWhen you drop a table, if you don’t specify the PURGE clause,\
    \ Oracle renames the table with a system-generated name. Because the table isn’t\
    \ really dropped, you can use FLASHBACK TABLE TO BEFORE DROP to instruct Oracle\
    \ to rename the table with its original name. Here is an example. Suppose the\
    \ INV table is accidentally dropped:\n\n```\nSQL> drop table inv;\n```\n\nVerify\
    \ that the table has been renamed by viewing the contents of the recycle bin:\n\
    \n```\nSQL> show recyclebin;\nORIGINAL NAME    RECYCLEBIN NAME                OBJECT\
    \ TYPE  DROP TIME\n---------------- ------------------------------ ------------\
    \ -------------------\nINV              BIN$0zIqhEFlcprgQ4TQTwq2uA==$0 TABLE        2013-01-11:12:16:49\n\
    ```\n\nThe SHOW RECYCLEBIN statement shows only tables that have been dropped.\
    \ To get a more complete picture of renamed objects, query the RECYCLEBIN view:\n\
    \n```\nselect object_name, original_name, type\nfrom recyclebin;\n```\n\nHere\
    \ is the output:\n\n```\nOBJECT_NAME                         ORIGINAL_NAM TYPE\n\
    ----------------------------------- ------------ -------------------------\nBIN$0zIqhEFjcprgQ4TQTwq2uA==$0      INV_PK      \
    \ INDEX\nBIN$0zIqhEFkcprgQ4TQTwq2uA==$0      INV_TRIG     TRIGGER\nBIN$0zIqhEFlcprgQ4TQTwq2uA==$0      INV          TABLE\n\
    ```\n\nIn this output the table also has a primary key that was renamed when the\
    \ object was dropped. To undrop the table, do this:\n\n```\nSQL> flashback table\
    \ inv to before drop;\n```\n\nThe prior command restores the table to its original\
    \ name. This statement, however, doesn’t restore the index to its original name:\n\
    \n```\nSQL> select index_name from user_indexes where table_name='INV';\n\nINDEX_NAME\n\
    \nBIN$0zIqhEFjcprgQ4TQTwq2uA==$0\n```\n\nIn this scenario, you have to rename\
    \ the index:\n\n```\nSQL> alter index \"BIN$0zIqhEFjcprgQ4TQTwq2uA==$0\" rename\
    \ to inv_pk;\n```\n\nYou also have to rename any trigger objects in the same manner.\
    \ If referential constraints were in place before the table was dropped, you must\
    \ manually re-create them.\n\nIf, for some reason, you need to flash back a table\
    \ to a name different from the original name, you can do so as follows:\n\n```\n\
    SQL> flashback table inv to before drop rename to inv_bef;\n```\n\nFlashing Back\
    \ a Table to a Previous Point in Time\n\nIf a table was erroneously deleted from,\
    \ you have the option of flashing back the table to a previous point in time.\
    \ The Flashback Table feature uses information in the undo tablespace to restore\
    \ the table. The point in time in the past depends on your undo tablespace retention\
    \ period, which specifies the minimum time that undo information is kept.\n\n\
    If the required flashback information isn’t in the undo tablespace, you receive\
    \ an error such as this:\n\n```\nORA-01555: snapshot too old\n```\n\nIn other\
    \ words, to be able to flash back to a point in time in the past, the required\
    \ information in the undo tablespace must not have been overwritten.\n\nFLASHBACK\
    \ TABLE TO SCN\n\nSuppose you’re testing an application feature, and you want\
    \ to quickly restore a table back to a specific SCN. As part of the application\
    \ testing, you record the SCN before testing begins:\n\n```\nSQL> select current_scn\
    \ from v$database;\n\nCURRENT_SCN\n\n```\n\nYou perform some testing and then\
    \ want to flash back the table to the SCN previously recorded. First, ensure that\
    \ row movement is enabled for the table:\n\n```\nSQL> alter table inv enable row\
    \ movement;\nSQL> flashback table inv to scn 4760089;\n```\n\nThe table should\
    \ now reflect transactions that were committed as of the historical SCN value\
    \ specified in the FLASHBACK statement.\n\nFLASHBACK TABLE TO TIMESTAMP\n\nYou\
    \ can also flash back a table to a prior point in time. For example, to flash\
    \ back a table to 15 minutes in the past, first enable row movement, and then\
    \ use FLASHBACK TABLE :\n\n```\nSQL> alter table inv enable row movement;\nSQL>\
    \ flashback table inv to timestamp(sysdate-1/96) ;\n```\n\nThe timestamp you provide\
    \ must evaluate to a valid format for an Oracle timestamp. You can also explicitly\
    \ specify a time, as follows:\n\n```\nSQL> flashback table inv to timestamp\n\
         to_timestamp('14-jan-13 12:07:33','dd-mon-yy hh24:mi:ss');\n```\n\nFLASHBACK\
    \ TABLE TO RESTORE POINT\n\nA restore point is a name associated with a timestamp\
    \ or an SCN in the database. You can create a restore point that contains the\
    \ current SCN of the database, as shown:\n\n```\nSQL> create restore point point_a;\n\
    ```\n\nLater, if you decide to flash back a table to that restore point, first\
    \ enable row movement:\n\n```\nSQL> alter table inv enable row movement;\nSQL>\
    \ flashback table inv to restore point point_a;\n```\n\nThe table should now contain\
    \ transactions as they were at the SCN associated with the specified restore point.\n\
    \nFlashing Back a Database\n\nThe Flashback Database feature allows you to perform\
    \ an incomplete recovery back to a point in time in the past. Flashback Database\
    \ uses information stored in flashback logs; it doesn’t rely on restoring database\
    \ files (as do cold backup, hot backup, and RMAN).\n\n![image](Images/sq.jpg) **Tip**  \
    \ Flashback Database isn’t a substitute for a backup of your database. If you\
    \ experience a media failure with a data file, you can’t use Flashback Database\
    \ to flash back to before the failure. If a data file is damaged, you have to\
    \ restore and recover, using a physical backup (hot, cold, or RMAN).\n\nThe Flashback\
    \ Database feature may be desirable in situations in which you want to consistently\
    \ reset your database back to a point in time in the past. For instance, you may\
    \ periodically want to set a test or training database back to a known baseline.\
    \ Or, you may be upgrading an application and, before making large-scale changes\
    \ to the application database objects, mark the starting point. After the upgrade,\
    \ if things don’t go well, you want the ability to quickly reset the database\
    \ back to the point in time before the upgrade took place.\n\nThere are several\
    \ prerequisites for Flashback Database:\n\n*   The database must be in archivelog\
    \ mode.\n*   You must be using an FRA.\n*   The Flashback Database feature must\
    \ be enabled.\n\nSee [Chapter 5](#9781430257288_Ch05.xhtml) for details on enabling\
    \ archivelog mode and/or enabling an FRA. You can verify the status of these features\
    \ using the following SQL*Plus statements:\n\n```\nSQL> archive log list;\nSQL>\
    \ show parameter db_recovery_file_dest;\n```\n\nTo enable the Flashback Database\
    \ feature, alter your database into flashback mode, as shown:\n\n```\nSQL> alter\
    \ database flashback on;\n```\n\n![image](Images/sq.jpg) **Note**   In Oracle\
    \ Database 10g the database must be in mount mode to enable Flashback Database.\n\
    \nYou can verify the flashback status, as follows:\n\n```\nSQL> select flashback_on\
    \ from v$database;\n```\n\nAfter you enable Flashback Database, you can view the\
    \ flashback logs in your FRA with this query:\n\n```\nselect name, log#, thread#,\
    \ sequence#, bytes\nfrom v$flashback_database_logfile;\n```\n\nThe range of time\
    \ in which you can flash back is determined by the D B_FLASHBACK_RETENTION_TARGET\
    \ parameter. This specifies the upper limit, in minutes, of how far your database\
    \ can be flashed back.\n\nYou can view the oldest SCN and time you can flash back\
    \ your database to by running the following SQL:\n\n```\nselect\n oldest_flashback_scn\n\
    ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
    ```\n\nIf, for any reason, you need to disable Flashback Database, you can turn\
    \ it off, as follows:\n\n```\nSQL> alter database flashback off;\n```\n\nYou can\
    \ use either RMAN or SQL*Plus to flash back a database. You can specify a point\
    \ in time in the past, using one of the following:\n\n*   SCN\n*   Timestamp\n\
    *   Restore point\n*   Last RESETLOGS operation (works from RMAN only)\n\nThis\
    \ example creates a restore point:\n\n```\nSQL> create restore point flash_1;\n\
    ```\n\nNext, the application performs some testing, after which the database is\
    \ flashed back to the restore point so that a new round of testing can begin:\n\
    \n```\nSQL> shutdown immediate;\nSQL> startup mount;\nSQL> flashback database\
    \ to restore point flash_1;\nSQL> alter database open resetlogs;\n```\n\nAt this\
    \ point, your database should be transactionally consistent with how it was at\
    \ the SCN associated with the restore point.\n\nRestoring and Recovering to Different\
    \ Server\n\nWhen you think about architecting your backup strategy, as part of\
    \ the process, you must also consider how you’re going to restore and recover.\
    \ Your backups are only as good as the last time you tested a restore and recovery.\
    \ A backup strategy can be rendered worthless without a good restore-and-recovery\
    \ strategy. The last thing you want to happen is to have a media failure, go to\
    \ restore your database, and then find out you’re missing critical pieces, you\
    \ don’t have enough space to restore, something is corrupt, and so on.\n\nOne\
    \ of the best ways to test an RMAN backup is to restore and recover it to a different\
    \ database server. This will exercise all your backup, restore, and recovery DBA\
    \ skills. If you can restore and recover an RMAN backup on a different server,\
    \ it will give you confidence when a real disaster hits. You can think of all\
    \ the prior material in this book as the building blocks for performing technically\
    \ challenging tasks. Moving a database from one server to another using an RMAN\
    \ backup requires an expert level understanding of the Oracle architecture and\
    \ how B&R works.\n\n![image](Images/sq.jpg) **Note**   RMAN does have a D UPLICATE\
    \ DATABASE command, which works well for copying a database from one server to\
    \ another. If you’re going to be performing this type of task often, I would recommend\
    \ that you use RMAN’s duplicate database functionality. However, you may still\
    \ have to copy a backup of a database manually from one server to another, especially\
    \ when the security is such that you can’t directly connect a production server\
    \ to a development environment. I work with many production databases in which\
    \ there is no direct access to a production server, so the only way to duplicate\
    \ a database is by manually copying the RMAN backups from production to a test\
    \ environment. Starting with Oracle Database 11g Release 2, you can use RMAN to\
    \ duplicate a database based on backups you copy from the target to the auxiliary\
    \ server. See MOS note 874352.1 for details on targetless duplication.\n\nIn this\
    \ example the originating server and destination server have different mount points.\
    \ Listed next are the high-level steps required to take an RMAN backup and use\
    \ it to recreate a database on a separate server:\n\n1.  Create an RMAN backup\
    \ on the originating database.\n2.  Copy the RMAN backup to the destination server.\
    \ All steps that follow are performed on the destination database server.\n3.\
    \  Ensure that Oracle is installed.\n4.  Source the required OS variables.\n5.\
    \  Create an init.ora file for the database to be restored.\n6.  Create any required\
    \ directories for data files, control files, and dump/trace files.\n7.  Start\
    \ up the database in nomount mode.\n8.  Restore the control file from the RMAN\
    \ backup.\n9.  Start up the database in mount mode.\n10.  Make the control file\
    \ aware of the location of the RMAN backups.\n11.  Rename and restore the data\
    \ files to reflect new directory locations.\n12.  Recover the database.\n13. \
    \ Set the new location for the online redo logs.\n14.  Open the database.\n15.\
    \  Add the temp file.\n16.  Rename the database (optional).\n\nEach of the prior\
    \ steps is covered in detail in the next several sections. Steps 1 and 2 occur\
    \ on the source database server. All remaining steps are performed on the destination\
    \ server. For this example the source database is named o12c, and the destination\
    \ database will be named DEVDB.\n\nFurthermore, the originating server and destination\
    \ server have different mount point names. On the source database the data files\
    \ and control files are here:\n\n```\n/u01/dbfile/o12c\n```\n\nOn the destination\
    \ database the data files and control files will be renamed and restored to this\
    \ directory:\n\n```\n/ora01/dbfile/DEVDB\n```\n\nThe destination database online\
    \ redo logs will be placed in this directory:\n\n```\n/ora01/oraredo/DEVDB\n```\n\
    \nThe destination database archive redo log file location will be set as follows:\n\
    \n```\n/ora01/arc/DEVDB\n```\n\nKeep in mind that these are the directories used\
    \ on servers in my test environment. You’ll have to adjust these directory names\
    \ to reflect the directory structures on your database servers.\n\nStep 1\\. Create\
    \ an RMAN Backup on the Originating Database\n\nWhen backing up a database, make\
    \ sure you have the autobackup control file feature turned on. Also, include the\
    \ archive redo logs as part of the backup, like so:\n\n```\nRMAN> backup database\
    \ plus archivelog;\n```\n\nYou can verify the names and locations of the backup\
    \ pieces via the LIST BACKUP command. For example, this is what the backup pieces\
    \ look like for the source database:\n\n```\nrman1_bonvb2js_1_1.bk\nrman1_bqnvb2k5_1_1.bk\n\
    rman1_bsnvb2p3_1_1.bk\nrman_ctl_c-3423216220-20130113-06.bk\n```\n\nIn the prior\
    \ output the file with the c-3423216220 string in the name is the backup piece\
    \ that contains the control file. You’ll have to inspect the output of your LIST\
    \ BACKUP command to determine which backup piece contains the control file. You’ll\
    \ need to reference that backup piece in step 8.\n\nStep 2\\. Copy the RMAN Backup\
    \ to the Destination Server\n\nFor this step, use a utility such as rsync or scp\
    \ to copy the backup pieces from one server to another. This example uses the\
    \ scp command to copy the backup pieces:\n\n```\n$ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB\n\
    ```\n\nIn this example the /ora01/rman/DEVDB directory must be created on the\
    \ destination server before copying the backup files. Depending on your environment,\
    \ this step might require copying the RMAN backups twice: once from the production\
    \ server to a secure server and once from the secure server to a test server.\n\
    \n![image](Images/sq.jpg) **Note**   If the RMAN backups are on tape instead of\
    \ on disk, then the same media manager software must be installed/configured on\
    \ the destination server. Also, that server must have direct access to the RMAN\
    \ backups on tape.\n\nStep 3\\. Ensure That Oracle Is Installed\n\nMake sure you\
    \ have the same version of the Oracle binaries installed on the destination server\
    \ as you do on the originating database.\n\nStep 4\\. Source the Required OS Variables\n\
    \nYou need to establish the OS variables, such as ORACLE_SID, ORACLE_HOME, and\
    \ PATH. Typically, the ORACLE_SID variable is initially set to match what it was\
    \ on the original database. The database name will be changed as part of the last\
    \ step in this recipe (optional). Here are the settings for ORACLE_SID and ORACLE_HOME\
    \ on the destination server:\n\n```\n$ echo $ORACLE_SID\no12c\n\n$ echo $ORACLE_HOME\n\
    /ora01/app/oracle/product/12.1.0.1/db_1\n```\n\nAt this point also consider adding\
    \ the Oracle SID to the oratab file. If you plan on using this database after\
    \ you’ve replicated it, then you should have an automated method for setting the\
    \ required OS variables. See [Chapter 2](#9781430257288_Ch02.xhtml) for details\
    \ on sourcing OS variables in conjunction with the oratab file.\n\nStep 5\\. Create\
    \ an init.ora File for the Database to Be Restored\n\nCopy the init.ora file from\
    \ the original server to the destination server, and modify it so that it matches\
    \ the destination box in terms of any directory paths. Ensure that you change\
    \ the parameters, such as the CONTROL_FILES, to reflect the new path directories\
    \ on the destination server (/ora01/dbfile/DEVDB, in this example).\n\nInitially,\
    \ the name of the init.ora file is ORACLE_HOME/dbs/inito12c.ora, and the name\
    \ of the database is o12c. Both will be renamed in a later step. Here are the\
    \ contents of the init.ora file:\n\n```\ncontrol_files='/ora01/dbfile/DEVDB/control01.ctl',\n\
                  '/ora01/dbfile/DEVDB/control02.ctl'\ndb_block_size=8192\ndb_name='o12c'\n\
    log_archive_dest_1='location=/ora01/arc/DEVDB'\njob_queue_processes=10\nmemory_max_target=300000000\n\
    memory_target=300000000\nopen_cursors=100\nos_authent_prefix=''\nprocesses=100\n\
    remote_login_passwordfile='EXCLUSIVE'\nresource_limit=true\nshared_pool_size=80M\n\
    sql92_security=TRUE\nundo_management='AUTO'\nundo_tablespace='UNDOTBS1'\nworkarea_size_policy='AUTO'\n\
    ```\n\n![image](Images/sq.jpg) **Note**   If this were an Oracle Database 10g\
    \ example, you would need to set the parameters background_dump_dest, user_dump_dest,\
    \ core_dump_dest.\n\nStep 6\\. Create Any Required Directories for Data Files,\
    \ Control Files, and Dump/Trace Files\n\nFor this example the directories /ora01/dbfile/DEVDB\
    \ and /ora01/oraredo/DEVDB are created:\n\n```\n$ mkdir -p /ora01/dbfile/DEVDB\n\
    $ mkdir -p /ora01/oraredo/DEVDB\n$ mkdir -p /ora01/arc/DEVDB\n```\n\nStep 7\\\
    . Start Up the Database in Nomount Mode\n\nYou should now be able to start up\
    \ the database in nomount mode:\n\n```\n$ rman target /\nRMAN> startup nomount;\n\
    ```\n\nStep 8\\. Restore the Control File from the RMAN Backup\n\nNext, restore\
    \ the control file from the backup that was previously copied; for example,\n\n\
    ```\nRMAN> restore controlfile from\n'/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk';\n\
    ```\n\nThe control file will be restored to all locations specified by the CONTROL_FILES\
    \ initialization parameter. Here is some sample output:\n\n```\nchannel ORA_DISK_1:\
    \ restore complete, elapsed time: 00:00:03\noutput file name=/ora01/dbfile/DEVDB/control01.ctl\n\
    output file name=/ora01/dbfile/DEVDB/control02.ctl\n```\n\nStep 9\\. Start Up\
    \ the Database in Mount Mode\n\nYou should now be able to start up your database\
    \ in mount mode:\n\n```\nRMAN> alter database mount;\n```\n\nAt this point, your\
    \ control files exist and have been opened, but none of the data files or online\
    \ redo logs exist yet.\n\nStep 10\\. Make the Control File Aware of the Location\
    \ of the RMAN Backups\n\nFirst, use the CROSSCHECK command to let the control\
    \ file know that none of the backups or archive redo logs are in the same location\
    \ that they were in on the original server:\n\n```\nRMAN> crosscheck backup; #\
    \ Crosscheck backups\nRMAN> crosscheck copy;   # Crosscheck image copies and archive\
    \ logs\n```\n\nThen, use the CATALOG command to make the control file aware of\
    \ the location and names of the backup pieces that were copied to the destination\
    \ server.\n\n![image](Images/sq.jpg) **Note**   Don’t confuse the CATALOG command\
    \ with the recovery catalog schema. The CATALOG command adds RMAN metadata to\
    \ the control file, whereas the recovery catalog schema is a user, generally created\
    \ in a separate database, that can be used to store RMAN metadata.\n\nIn this\
    \ example any RMAN files that are in the /ora01/rman/DEVDB directory will be cataloged\
    \ in the control file:\n\n```\nRMAN> catalog start with '/ora01/rman/DEVDB';\n\
    ```\n\nHere is some sample output:\n\n```\nList of Files Unknown to the Database\n\
    =====================================\nFile Name: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk\n\
    File Name: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk\nFile Name: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk\n\
    File Name: /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk\n\nDo you really want to catalog\
    \ the above files (enter YES or NO)?\n```\n\nNow, type YES (if everything looks\
    \ okay). You should then be able to use the RMAN LIST BACKUP command to view the\
    \ newly cataloged backup pieces:\n\n```\nRMAN> list backup;\n```\n\nStep 11\\\
    . Rename and Restore the Data Files to Reflect New Directory Locations\n\nIf your\
    \ destination server has the exact same directory structure as the original server\
    \ directories, you can issue the RESTORE command directly:\n\n```\nRMAN> restore\
    \ database;\n```\n\nHowever, when restoring data files to locations that are different\
    \ from the original directories, you’ll have to use the SET NEWNAME command. Create\
    \ a file that uses an RMAN run{} block that contains the appropriate SET NEWNAME\
    \ and RESTORE commands. I like to use an SQL script that generates SQL to give\
    \ me a starting point. Here is a sample script:\n\n```\nset head off feed off\
    \ verify off echo off pages 0 trimspool on\nset lines 132 pagesize 0\nspo newname.sql\n\
    --\nselect 'run{' from dual;\n--\nselect\n'set newname for datafile ' || file#\
    \ || ' to ' || '''' || name || '''' || ';'\nfrom v$datafile;\n--\nselect\n'restore\
    \ database;' || chr(10) ||\n'switch datafile all;' || chr(10) ||\n'}'\nfrom dual;\n\
    --\nspo off;\n```\n\nAfter running the script, these are the contents of the newname.sql\
    \ script that was generated:\n\n```\nrun{\nset newname for datafile 1 to '/u01/dbfile/o12c/system01.dbf';\n\
    set newname for datafile 2 to '/u01/dbfile/o12c/sysaux01.dbf';\nset newname for\
    \ datafile 3 to '/u01/dbfile/o12c/undotbs01.dbf';\nset newname for datafile 4\
    \ to '/u01/dbfile/o12c/users01.dbf';\nrestore database;\nswitch datafile all;\n\
    }\n```\n\nThen, modify the contents of the newname.sql script to reflect the directories\
    \ on the destination database server. Here is what the final newname.sql script\
    \ looks like for this example:\n\n```\nrun{\nset newname for datafile 1 to '/ora01/dbfile/DEVDB/system01.dbf';\n\
    set newname for datafile 2 to '/ora01/dbfile/DEVDB/sysaux01.dbf';\nset newname\
    \ for datafile 3 to '/ora01/dbfile/DEVDB/undotbs01.dbf';\nset newname for datafile\
    \ 4 to '/ora01/dbfile/DEVDB/users01.dbf';\nrestore database;\nswitch datafile\
    \ all;\n}\n```\n\nNow, connect to RMAN, and run the prior script to restore the\
    \ data files to the new locations:\n\n```\n$ rman target /\nRMAN> @newname.sql\n\
    ```\n\nHere is a snippet of the output:\n\n```\ndatafile 1 switched to datafile\
    \ copy\ninput datafile copy RECID=5 STAMP=790357985 file name=/ora01/dbfile/DEVDB/system01.dbf\n\
    ```\n\nAll the data files have been restored to the new database server. You can\
    \ use the RMAN REPORT SCHEMA command to verify that the files have been restored\
    \ and are in the correct locations:\n\n```\nRMAN> report schema;\n```\n\nHere\
    \ is some sample output:\n\n```\nRMAN-06139: WARNING: control file is not current\
    \ for REPORT SCHEMA\nReport of database schema for database with db_unique_name\
    \ O12C\nList of Permanent Datafiles\n===========================\nFile Size(MB)\
    \ Tablespace           RB segs Datafile Name\n---- -------- --------------------\
    \ ------- ------------------------\n1    500      SYSTEM               ***    \
    \ /ora01/dbfile/DEVDB/system01.dbf\n2    500      SYSAUX               ***    \
    \ /ora01/dbfile/DEVDB/sysaux01.dbf\n3    800      UNDOTBS1             ***    \
    \ /ora01/dbfile/DEVDB/undotbs01.dbf\n4    50       USERS                ***    \
    \ /ora01/dbfile/DEVDB/users01.dbf\n\nList of Temporary Files\n=======================\n\
    File Size(MB) Tablespace           Maxsize(MB) Tempfile Name\n---- -------- --------------------\
    \ ----------- --------------------\n1    500      TEMP                 500        \
    \ /u01/dbfile/o12c/temp01.dbf\n```\n\nFrom the prior output you can see that the\
    \ database name and temporary tablespace data file still don’t reflect the destination\
    \ database (DEVDB). These will be modified in subsequent steps.\n\nStep 12\\.\
    \ Recover the Database\n\nNext, you need to apply any archive redo files that\
    \ were generated during the backup. These should be included in the backup because\
    \ the ARCHIVELOG ALL clause was used to take the backup. Initiate the application\
    \ of redo via the RECOVER DATABASE command:\n\n```\nRMAN> recover database;\n\
    ```\n\nRMAN will restore and apply as many archive redo logs as it has in the\
    \ backup pieces and then may throw an error when it reaches an archive redo log\
    \ that doesn’t exist; for example,\n\n```\nRMAN-06054: media recovery requesting\
    \ unknown archived log for...\n```\n\nThat error message is fine. The recovery\
    \ process will restore and recover archive redo logs contained in the backups,\
    \ which should be sufficient to open the database. The recovery process doesn’t\
    \ know where to stop applying archive redo logs and therefore will continue to\
    \ attempt to do so until it can’t find the next log. Having said that, now is\
    \ a good time to verify that your data files are online and not in a fuzzy state:\n\
    \n```\nselect file#, status, fuzzy, error, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\nStep 13\\.\
    \ Set the New Location for the Online Redo Logs\n\nIf your source and destination\
    \ servers have the exact same directory structures, then you don’t need to set\
    \ a new location for the online redo logs (so you can skip this step).\n\nHowever,\
    \ if the directory structures are different, then you’ll need to update the control\
    \ file to reflect the new directory for the online redo logs. I sometimes use\
    \ an SQL script that generates SQL to assist with this step:\n\n```\nset head\
    \ off feed off verify off echo off pages 0 trimspool on\nset lines 132 pagesize\
    \ 0\nspo renlog.sql\nselect\n'alter database rename file ' || chr(10)\n|| ''''\
    \ || member || '''' || ' to ' || chr(10) || '''' || member || '''' ||';'\nfrom\
    \ v$logfile;\nspo off;\n```\n\nFor this example, here is a snippet of the renlog.sql\
    \ file that was generated:\n\n```\nalter database rename file\n'/u01/oraredo/o12c/redo01a.rdo'\
    \ to\n'/u01/oraredo/o12c/redo01a.rdo';\n...\nalter database rename file\n'/u02/oraredo/o12c/redo03b.rdo'\
    \ to\n'/u02/oraredo/o12c/redo03b.rdo';\n```\n\nThe contents of renlog.sql need\
    \ to be modified to reflect the directory structure on the destination server.\
    \ Here is what renlog.sql looks like after being edited:\n\n```\nalter database\
    \ rename file\n'/u01/oraredo/o12c/redo01a.rdo' to\n'/ora01/oraredo/DEVDB/redo01a.rdo';\n\
    ...\nalter database rename file\n'/u02/oraredo/o12c/redo03b.rdo' to\n'/ora01/oraredo/DEVDB/redo03b.rdo';\n\
    ```\n\nUpdate the control file by running the renlog.sql script:\n\n```\nSQL>\
    \ @renlog.sql\n```\n\nYou can select from V$LOGFILE to verify that the online\
    \ redo log names are correct:\n\n```\nSQL> select member from v$logfile;\n```\n\
    \nHere is the output for this example:\n\n```\n/ora01/oraredo/DEVDB/redo01a.rdo\n\
    /ora01/oraredo/DEVDB/redo02a.rdo\n/ora01/oraredo/DEVDB/redo03a.rdo\n/ora01/oraredo/DEVDB/redo01b.rdo\n\
    /ora01/oraredo/DEVDB/redo02b.rdo\n/ora01/oraredo/DEVDB/redo03b.rdo\n```\n\nMake\
    \ sure the directories exist on the new server that will contain the online redo\
    \ logs. For this example, here is the mkdir command:\n\n```\n$ mkdir -p /ora01/oraredo/DEVDB\n\
    ```\n\nStep 14\\. Open the Database\n\nYou must open the database with the OPEN\
    \ RESETLOGS command (because there are no redo logs, and they must be re-created\
    \ at this point):\n\n```\nSQL> alter database open resetlogs;\n```\n\nIf successful,\
    \ you should see this message:\n\n```\nStatement processed\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ Keep in mind that all the passwords from the newly restored copy are as they\
    \ were in the source database. You may want to change the passwords in a replicated\
    \ database, especially if it was copied from production.\n\nStep 15\\. Add the\
    \ Temp File\n\nWhen you start your database, Oracle will automatically try to\
    \ add any missing temp files to the database. Oracle won’t be able to do this\
    \ if the directory structure on the destination server is different from that\
    \ of the source server. In this scenario, you will have to add any missing temp\
    \ files manually. To do this, first take offline the temporary tablespace temp\
    \ file. The file definition from the originating database is taken offline like\
    \ so:\n\n```\nSQL> alter database tempfile '/u01/dbfile/o12c/temp01.dbf' offline;\n\
    SQL> alter database tempfile '/u01/dbfile/o12c/temp01.dbf' drop;\n```\n\nNext,\
    \ add a temporary tablespace file to the TEMP tablespace that matches the directory\
    \ structure of the destination database server:\n\n```\nSQL> alter tablespace\
    \ temp add tempfile '/ora01/dbfile/DEVDB/temp01.dbf'\n     size 100m;\n```\n\n\
    You can run the REPORT SCHEMA command to verify that all files are in the correct\
    \ locations.\n\nStep 16\\. Rename the Database\n\nThis step is optional. If you\
    \ need to rename the database to reflect the name for a development or test database,\
    \ create a trace file that contains the CREATE CONTROLFILE statement, and use\
    \ it to rename your database.\n\n![image](Images/sq.jpg) **Tip**   If you don’t\
    \ rename the database, be careful about connect and resync operations to the same\
    \ recovery catalog used by the original/source database. This causes confusion\
    \ in the recovery catalog as to which is the real source database and may jeopardize\
    \ your ability to recover and restore the real source database.\n\nThe steps for\
    \ renaming your database are as follows:\n\n1.  Generate a trace file that contains\
    \ the SQL command to recreate the control files:\n\n    ```\n    SQL> alter database\
    \ backup controlfile to trace as '/tmp/cf.sql' resetlogs;\n    ```\n\n2.  Shut\
    \ down the database:\n\n    ```\n    SQL> shutdown immediate;\n    ```\n\n3. \
    \ Modify the /tmp/cf.sql trace file; be sure to specify SET DATABASE \"<NEW DATABASE\
    \ NAME>\" in the top line of the output:\n\n    ```\n    CREATE CONTROLFILE REUSE\
    \ SET DATABASE \"DEVDB\" RESETLOGS ARCHIVELOG\n        MAXLOGFILES 16\n        MAXLOGMEMBERS\
    \ 4\n        MAXDATAFILES 1024\n        MAXINSTANCES 1\n        MAXLOGHISTORY\
    \ 876\n    LOGFILE\n      GROUP 1 (\n        '/ora01/oraredo/DEVDB/redo01a.rdo',\n\
    \        '/ora01/oraredo/DEVDB/redo01b.rdo'\n      ) SIZE 50M BLOCKSIZE 512,\n\
    \      GROUP 2 (\n        '/ora01/oraredo/DEVDB/redo02a.rdo',\n        '/ora01/oraredo/DEVDB/redo02b.rdo'\n\
    \      ) SIZE 50M BLOCKSIZE 512,\n      GROUP 3 (\n        '/ora01/oraredo/DEVDB/redo03a.rdo',\n\
    \        '/ora01/oraredo/DEVDB/redo03b.rdo'\n      ) SIZE 50M BLOCKSIZE 512\n\
    \    DATAFILE\n      '/ora01/dbfile/DEVDB/system01.dbf',\n      '/ora01/dbfile/DEVDB/sysaux01.dbf',\n\
    \      '/ora01/dbfile/DEVDB/undotbs01.dbf',\n      '/ora01/dbfile/DEVDB/users01.dbf'\n\
    \    CHARACTER SET AL32UTF8;\n    ```\n\n    If you don’t specify SET DATABASE\
    \ in the top line of the prior script, when you run the script (as shown later\
    \ in this example), you’ll receive an error such as this:\n\n    ```\n    ORA-01161:\
    \ database name ... in file header does not match...\n    ```\n\n4.  Create an\
    \ init.ora file that matches the new database name:\n\n    ```\n    $ cd $ORACLE_HOME/dbs\n\
    \    $ cp init<old_sid>.ora init<new_sid>.ora\n    $ cp inito12c.ora initDEVDB.ora\n\
    \    ```\n\n5.  Modify the DB_NAME variable within the new init.ora file (in this\
    \ example, it’s set to DEVDB):\n\n    ```\n    db_name='DEVDB'\n    ```\n\n6.\
    \  Set the ORACLE_SID OS variable to reflect the new SID name (in this example,\
    \ it’s set to DEVDB):\n\n    ```\n    $ echo $ORACLE_SID\n    DEVDB\n    ```\n\
    \n7.  Start up the instance in nomount mode:\n\n    ```\n    SQL> startup nomount;\n\
    \    ```\n\n8.  Run the trace file (from step 2) to re-create the control file:\n\
    \n    ```\n    SQL> @/tmp/cf.sql\n    ```\n\n    ![image](Images/sq.jpg) **Note**  \
    \ In this example the control files already exist in the location specified by\
    \ the CONTROL_FILES initialization parameter; therefore, the REUSE parameter is\
    \ used in the CREATE CONTROL FILE statement.\n\n9.  Open the database with OPEN\
    \ RESETLOGS:\n\n    ```\n    SQL> alter database open resetlogs;\n    ```\n\n\
    \    If successful, you should have a database that is a copy of the original\
    \ database. All the data files, control files, archive redo logs, and online redo\
    \ logs are in the new locations, and the database has a new name.\n\n10.  As a\
    \ last step, ensure that your temporary tablespace exists:\n\n    ```\n    ALTER\
    \ TABLESPACE TEMP ADD TEMPFILE '/ora01/dbfile/DEVDB/temp01.dbf'\n         SIZE\
    \ 104857600  REUSE AUTOEXTEND OFF;\n    ```\n\n![image](Images/sq.jpg) **Tip**  \
    \ You can also use the NID utility to change the database name and database identifier\
    \ (DBID). See MOS note 863800.1 for more details.\n\nSummary\n\nRMAN is an acronym\
    \ for Recovery Manager. It’s worth noting that Oracle did not name this tool Backup\
    \ Manager. The Oracle team recognized that although backups are important, the\
    \ real value of a B&R tool is its ability to restore and recover the database.\
    \ Being able to manage the recovery process is the critical skill. When a database\
    \ is damaged and needs to be restored, everybody looks to the DBA to perform a\
    \ smooth and speedy recovery of the database. Oracle DBAs should use RMAN to protect,\
    \ secure, and ensure the availability of the company’s data assets.\n\nThe restore-and-recovery\
    \ process is analogous to the healing process involved when you break a bone.\
    \ Restoring data files from a backup and placing them in their original directories\
    \ can be likened to setting a bone back to its original position. Recovering a\
    \ data file is similar to the healing of a broken bone—returning the bone back\
    \ to the state it was in before it was broken. When you recover data files, you\
    \ apply transactions (obtained from archive redo and online redo) to transform\
    \ the restored data files back to the state they were in before the media failure\
    \ occurred.\n\nRMAN can be used for any type of restore-and-recovery scenario.\
    \ Depending on the situation, RMAN can be used to restore the entire database,\
    \ specific data files, control files, server parameter files, archive redo logs,\
    \ or just specific data blocks. You can instruct RMAN to perform a complete or\
    \ an incomplete recovery.\n\nThe last section in this chapter details how to use\
    \ RMAN to restore and recover a database to a remote server. I recommend that\
    \ you periodically attempt this type of recovery in order to exercise your B&R\
    \ strategy. You will gain much confidence and fully understand B&R internals once\
    \ you can successfully restore a database to a server that is different from the\
    \ original.\n\nCHAPTER 11\n\n![image](Images/frontdot.jpg)\n\nLarge Objects\n\n\
    Organizations often deal with substantial files that need to be stored and viewed\
    \ by business users. Generally, LOBs are a data type that is suited to storing\
    \ large and unstructured data, such as text, log, image, video, sound, and spatial\
    \ data. Oracle supports the following types of LOBs:\n\n*   Character large object\
    \ (CLOB)\n*   National character large object (NCLOB)\n*   Binary large object\
    \ (BLOB)\n*   Binary file (BFILE)\n\nPrior to Oracle 8, the LONG and LONG RAW\
    \ data types were your only options for storing large amounts of data in a column.\
    \ You should no longer use these data types. The only reason I mention LONG and\
    \ LONG RAWis because many legacy applications (e.g., Oracle’s data dictionary)\
    \ still use them. You should otherwise use a CLOB instead of LONG and a BLOB instead\
    \ of LONG RAW.\n\nAlso, don’t confuse a RAW data type with a LONG RAW. The RAW\
    \ data type stores small amounts of binary data. The LONG RAW data type has been\
    \ deprecated for more than a decade.\n\nAnother caveat: Don’t unnecessarily use\
    \ a LOB data type. For example, for character data, if your application requires\
    \ fewer than 4,000 characters, use a VARCHAR2 data type (and not a CLOB). For\
    \ binary data, if you’re dealing with fewer than 2,000 bytes of binary data, use\
    \ a RAW data type (and not a BLOB). If you’re still not sure which data type your\
    \ application needs, see [Chapter 7](#9781430257288_Ch07.xhtml) for a description\
    \ of appropriate uses of Oracle data types.\n\n![image](Images/sq.jpg) **Tip**  \
    \ Starting with Oracle Database 12c, you can define VARCHAR2 and RAW data types\
    \ as being as large as 32,767 bytes. See [Chapter 7](#9781430257288_Ch07.xhtml)\
    \ for more details on this enhancement.\n\nBefore lobbing you into the details\
    \ of implementing LOBs, it’s prudent to review each LOB data type and its appropriate\
    \ use. After that, examples are provided of creating and working with LOBs and\
    \ relevant features that you should understand.\n\nDescribing LOB Types\n\nStarting\
    \ with Oracle version 8, the ability to store large files in the database vastly\
    \ improved with the CLOB, NCLOB, BLOB, and BFILE data types. These additional\
    \ LOB data types let you store much more data, with greater functionality. [Table\
    \ 11-1](#9781430257288_Ch11.xhtml#Tab1) summarizes the types of Oracle LOBs available\
    \ and their descriptions.\n\n[Table 11-1.](#9781430257288_Ch11.xhtml#_Tab1) Oracle\
    \ Large Object Data Types\n\n| Data Type | Description | Maximum Size |\n| ---\
    \ | --- | --- |\n| CLOB | Character large object for storing character documents,\
    \ such as big text files, log files, XML files, and so on | (4GB–1) * block size\
    \ |\n| NCLOB | National character large object; stores data in national character\
    \ set format; supports characters with varying widths | (4GB–1) * block size |\n\
    | BLOB | Binary large object for storing unstructured bitstream data (images,\
    \ video, and so on) | (4GB–1) * block size |\n| BFILE | Binary file large object\
    \ stored on the filesystem outside of database; read-only | 2^64–1 bytes (OS may\
    \ impose a size limit that is less than this) |\n\nA CLOB is capable of storing\
    \ large amounts of character data, such as XML, text, and log files. An NCLOB\
    \ is treated the same as a CLOB but can contain characters in the multibyte national\
    \ character set for a database.\n\nBLOBs store large amounts of binary data that\
    \ typically aren’t human readable. Typical uses for a BLOB are spreadsheets, word-processing\
    \ documents, images, and audio and video data.\n\nCLOBs, NCLOBs, and BLOBs are\
    \ known as internal LOBs. This is because these data types are stored inside the\
    \ Oracle database in data files. Internal LOBs participate in transactions and\
    \ are covered by Oracle’s database security as well as its backup and recovery\
    \ features.\n\nBFILEs are known as external LOBs. BFILE columns store a pointer\
    \ to a file on the OS that is outside the database. You can think of a BFILE as\
    \ a mechanism for providing read-only access to large binary files outside the\
    \ database on the OS filesystem.\n\nSometimes, the question arises as to whether\
    \ you should use a BLOB or a BFILE. BLOBs participate in database transactions\
    \ and can be backed up, restored, and recovered by Oracle. BFILEs don’t participate\
    \ in database transactions; are read-only; and aren’t covered by any Oracle security,\
    \ backup and recovery, replication, or disaster recovery mechanisms. BFILEs are\
    \ more appropriate for large binary files that are read-only and that don’t change\
    \ while an application is running. For instance, you may have large binary video\
    \ files that are referenced by a database application. In this scenario the business\
    \ determines that you don’t need to create and maintain a 500TB database when\
    \ all the application really needs is a pointer (stored in the database) to the\
    \ locations of the large files on disk.\n\nIllustrating LOB Locators, Indexes,\
    \ and Chunks\n\nInternal LOBs (CLOB, NCLOB, BLOB) store data in pieces called\
    \ chunks. A chunk is the smallest unit of allocation for a LOB and is made up\
    \ of one or more database blocks. LOB locators are stored in rows containing a\
    \ LOB column. The LOB locator points to a LOB index. The LOB index stores information\
    \ regarding the location of LOB chunks. When a table is queried, the database\
    \ uses the LOB locator and associated LOB index to locate the appropriate LOB\
    \ chunks. [Figure 11-1](#9781430257288_Ch11.xhtml#Fig1) shows the relationship\
    \ between a table, a row, a LOB locator, and a LOB locator’s associated index\
    \ and chunks.\n\n![9781430257288_Fig11-01.jpg](Images/9781430257288_Fig11-01.jpg)\n\
    \n[Figure 11-1](#9781430257288_Ch11.xhtml#_Fig1). Relationship of table, row,\
    \ LOB locator, LOB index, and LOB segment\n\nThe LOB locator for a BFILE stores\
    \ the directory path and file name on the OS. [Figure 11-2](#9781430257288_Ch11.xhtml#Fig2)\
    \ shows a BFILE LOB locator that references a file on the OS.\n\n![9781430257288_Fig11-02.jpg](Images/9781430257288_Fig11-02.jpg)\n\
    \n[Figure 11-2](#9781430257288_Ch11.xhtml#_Fig2). The BFILE LOB locator contains\
    \ information for locating a file on the OS\n\n![image](Images/sq.jpg) **Note**  \
    \ The DBMS_LOB package performs operations on LOBs through the LOB locator.\n\n\
    Distinguishing Between BasicFiles and SecureFiles\n\nSeveral significant improvements\
    \ were made to LOBs in Oracle Database 11g. Oracle now distinguishes between two\
    \ different types of underlying LOB architecture:\n\n*   BasicFiles\n*   SecureFiles\n\
    \nThese two LOB architectures are discussed in the following sections.\n\nBasicFiles\n\
    \nBasicFiles is the name Oracle gives to the LOB architecture available prior\
    \ to Oracle Database 11g. It’s still important to understand the BasicFiles LOBs\
    \ because many shops use Oracle versions that don’t support SecureFiles. Be aware\
    \ that in Oracle Database 11g, the default type of LOB is still BasicFiles. However,\
    \ in Oracle Database 12c, the default type of LOB is now SecureFiles.\n\nSecureFiles\n\
    \nWith Oracle Database 11g and higher, you have the option of using the SecureFiles\
    \ LOB architecture. It includes the following enhancements (over BasicFiles LOBs):\n\
    \n*   Encryption (requires Oracle Advanced Security option)\n*   Compression (requires\
    \ Oracle Advanced Compression option)\n*   Deduplication (requires Oracle Advanced\
    \ Compression option)\n\nSecureFiles encryption lets you transparently encrypt\
    \ LOB data (just like other data types). The compression feature allows for significant\
    \ space savings. The deduplication feature eliminates duplicate LOBs that otherwise\
    \ would be stored multiple times.\n\nYou need to do a small amount of planning\
    \ before using SecureFiles. Specifically, use of SecureFiles requires the following:\n\
    \n*   A SecureFiles LOB must be stored in a tablespace, using ASSM.\n*   The DB_SECUREFILE\
    \ initialization parameter controls whether a SecureFiles file can be used and\
    \ also defines the default LOB architecture for your database.\n\nA SecureFiles\
    \ LOB must be created within a tablespace using ASSM. To create an ASSM-enabled\
    \ tablespace, specify the SEGMENT SPACE MANAGEMENT AUTO clause; for example,\n\
    \n```\ncreate tablespace lob_data\n  datafile '/u01/dbfile/o12c/lob_data01.dbf'\n\
      size 1000m\n  extent management local\n  uniform size 1m\n  segment space management\
    \ auto;\n```\n\nIf you have existing tablespaces, you can verify the use of ASSM\
    \ by querying the DBA_TABLESPACES view. The SEGMENT_SPACE_MANAGEMENT column should\
    \ have a value of AUTO for any tablespaces that you want to use with SecureFiles:\n\
    \n```\nselect tablespace_name, segment_space_management\nfrom dba_tablespaces;\n\
    ```\n\nAlso, SecureFiles usage is governed by the DB_SECUREFILE database parameter.\
    \ You can use either ALTER SYSTEM or ALTER SESSION to modify the value of DB_SECUREFILE.\
    \ [Table 11-2](#9781430257288_Ch11.xhtml#Tab2) describes the valid values for\
    \ DB_SECUREFILE.\n\n[Table 11-2.](#9781430257288_Ch11.xhtml#_Tab2) Description\
    \ of  DB_SECUREFILE Settings\n\n| DB_SECUREFILE Setting | Description |\n| ---\
    \ | --- |\n| NEVER | Creates the LOB as a BasicFiles type, regardless of whether\
    \ the SECUREFILE option is specified |\n| PERMITTED | Default value in 11g; allows\
    \ creation of SecureFiles LOBs |\n| PREFERRED | New in Oracle Database 12c, and\
    \ the default value; specifies that all LOBs are created as a SecureFiles type,\
    \ unless otherwise stated |\n| ALWAYS | Creates the LOB as a SecureFiles type,\
    \ unless the underlying tablespace isn’t using ASSM |\n| IGNORE | Ignores the\
    \ SecureFiles option, along with any SecureFiles settings |\n\nCreating a Table\
    \ with a LOB Column\n\nBy default, in Oracle Database 11g and lower, when you\
    \ create a LOB, it’s a BasicFiles type. Starting with Oracle Database 12c, the\
    \ default underlying LOB architecture is SecureFiles. If you’re using Oracle Database\
    \ 11g or higher, I recommend that you always create a LOB as a SecureFiles type.\
    \ As discussed previously, SecureFiles allows you to use features such as compression\
    \ and encryption.\n\nCreating a BasicFiles LOB Column\n\nTo create a LOB column,\
    \ you have to specify a LOB data type. Here is a pre-11g example of creating a\
    \ table with a CLOB data type:\n\n```\ncreate table patchmain(\n patch_id number\n\
    ,patch_desc clob)\ntablespace users;\n```\n\nIf you’re using Oracle Database 11g\
    \ or higher, I recommend that you explicitly specify the STORE AS BASICFILE clause\
    \ in order to avoid confusion as to which LOB architecture is implemented. Listed\
    \ next is such an example:\n\n```\ncreate table patchmain(\n patch_id   number\n\
    ,patch_desc clob)\ntablespace users\nlob(patch_desc) store as basicfile;\n```\n\
    \nWhen you create a table with a LOB column, you must be aware of some technical\
    \ underpinnings. Review the following list, and be sure you understand each point:\n\
    \n*   Prior to Oracle Database 12c, LOBs, by default, are created as the BasicFiles\
    \ type.\n*   Oracle creates a LOB segment and a LOB index for each LOB column.\n\
    *   The LOB segment has a name of this format: SYS_LOB<string>.\n*   The LOB index\
    \ has a name of this format: SYS_IL<string>.\n*   The <string> is the same for\
    \ each LOB segment and its associated index.\n*   The LOB segment and index are\
    \ created in the same tablespace as the table, unless you specify a different\
    \ tablespace.\n*   By default nearly 4,000 bytes of a LOB are stored in the table\
    \ row (inline).\n*   With Oracle Database 11g Release 2 and higher a LOB segment\
    \ and a LOB index aren’t created until a record is inserted into the table (the\
    \ so-called deferred segment creation feature). This means that DBA/ALL/USER_SEGMENTS\
    \ and DBA/ALL/USER_EXTENTS have no information in them until a row is inserted\
    \ into the table.\n\nOracle creates a LOB segment and a LOB index for each LOB\
    \ column. The LOB segment stores the data. The LOB index keeps track of where\
    \ the chunks of LOB data are physically stored and in what order they should be\
    \ accessed.\n\nYou can query the DBA/ALL/USER_LOBS view to display the LOB segment\
    \ and LOB index names:\n\n```\nselect table_name, segment_name, index_name, securefile,\
    \ in_row\nfrom user_lobs;\n```\n\nHere is the output for this example:\n\n```\n\
    TABLE_NAME   SEGMENT_NAME              INDEX_NAME                SEC IN_\n------------\
    \ ------------------------- ------------------------- --- ---\nPATCHMAIN    SYS_LOB0000022332C00002$$\
    \ SYS_IL0000022332C00002$$  NO  YES\n```\n\nYou can also query DBA/USER/ALL_SEGMENTS\
    \ to view information regarding LOB segments. As mentioned earlier, if you create\
    \ a table in Oracle Database 11g Release 2 or higher, an initial segment isn’t\
    \ created until you insert a row into the table (deferred segment creation). This\
    \ can be confusing because you may expect a row to be present in DBA/ALL/USER_SEGMENTS\
    \ immediately after you create the table:\n\n```\nselect segment_name, segment_type,\
    \ segment_subtype, bytes/1024/1024 meg_bytes\nfrom user_segments\nwhere segment_name\
    \ IN ('&&table_just_created',\n                       '&&lob_segment_just_created',\n\
                           '&&lob_index_just_created');\n```\n\nThe prior query prompts\
    \ for the segment names. The output shows no rows:\n\n```\nno rows selected\n\
    ```\n\nNext, insert a record into the table that contains the LOB column:\n\n\
    ```\nSQL> insert into patchmain values(1,'clob text');\n```\n\nRerunning the query\
    \ against USER_SEGMENTS shows that three segments have been created—one for the\
    \ table, one for the LOB segment, and one for the LOB index:\n\n```\nSEGMENT_NAME              SEGMENT_TYPE      \
    \ SEGMENT_SU  MEG_BYTES\n------------------------- ------------------ ----------\
    \ ----------\nPATCHMAIN                 TABLE              ASSM            .0625\n\
    SYS_IL0000022332C00002$$  LOBINDEX           ASSM            .0625\nSYS_LOB0000022332C00002$$\
    \ LOBSEGMENT         ASSM            .0625\n```\n\nImplementing a LOB in a Specific\
    \ Tablespace\n\nBy default the LOB segment is stored in the same tablespace as\
    \ its table. You can specify a separate tablespace for a LOB segment by using\
    \ the LOB...STORE AS clause of the CREATE TABLE statement. The next table creation\
    \ script creates the table in a tablespace and creates separate tablespaces for\
    \ the CLOB and BLOB columns:\n\n```\ncreate table patchmain\n(patch_id   number\n\
    ,patch_desc clob\n,patch      blob\n) tablespace users\n lob (patch_desc) store\
    \ as (tablespace lob_data)\n,lob (patch)      store as (tablespace lob_data);\n\
    ```\n\nThe following query verifies the associated tablespaces for this table:\n\
    \n```\nselect table_name, tablespace_name, 'N/A' column_name\nfrom user_tables\n\
    where table_name='PATCHMAIN'\nunion\nselect table_name, tablespace_name, column_name\n\
    from user_lobs\nwhere table_name='PATCHMAIN';\n```\n\nHere is the output:\n\n\
    ```\nTABLE_NAME           TABLESPACE_NAME      COLUMN_NAME\n--------------------\
    \ -------------------- --------------------\nPATCHMAIN            LOB_DATA            \
    \ PATCH\nPATCHMAIN            LOB_DATA             PATCH_DESC\nPATCHMAIN            USERS                N/A\n\
    ```\n\nIf you think the LOB segment will require different storage characteristics\
    \ (such as size and growth patterns), then I recommend that you create the LOB\
    \ in a tablespace separate from that of the table data. This allows you to manage\
    \ the LOB column storage separately from the regular table data storage.\n\nCreating\
    \ a SecureFiles LOB Column\n\nAs discussed previously, starting with Oracle Database\
    \ 12c, the default LOB architecture is SecureFiles. Having said that, I recommend\
    \ that you explicitly state which LOB architecture to implement in order to avoid\
    \ any confusion. As mentioned earlier, the tablespace that contains the SecureFile\
    \ LOB must be ASSM managed. Here is an example that creates a SecureFiles LOB:\n\
    \n```\ncreate table patchmain(\n patch_id   number\n,patch_desc clob)\nlob(patch_desc)\
    \ store as securefile (tablespace lob_data);\n```\n\nBefore viewing the data dictionary\
    \ details regarding the LOB column, insert a record into the table to ensure that\
    \ segment information is available (owing to the deferred segment allocation feature\
    \ in Oracle Database 11g Release 2 and higher); for example,\n\n```\nSQL> insert\
    \ into patchmain values(1,'clob text');\n```\n\nYou can now verify a LOB’s architecture\
    \ by querying the USER_SEGMENTS view:\n\n```\nselect segment_name, segment_type,\
    \ segment_subtype\nfrom user_segments;\n```\n\nHere is some sample output, indicating\
    \ that a LOB segment is a SecureFiles type:\n\n```\nSEGMENT_NAME              SEGMENT_TYPE      \
    \ SEGMENT_SU\n------------------------- ------------------ ----------\nPATCHMAIN                \
    \ TABLE              ASSM\nSYS_IL0000022340C00002$$  LOBINDEX           ASSM\n\
    SYS_LOB0000022340C00002$$ LOBSEGMENT         SECUREFILE\n```\n\nYou can also query\
    \ the USER_LOBS view to verify the SecureFiles LOB architecture:\n\n```\nselect\
    \ table_name, segment_name, index_name, securefile, in_row\nfrom user_lobs;\n\
    ```\n\nHere is the output:\n\n```\nTABLE_NAME   SEGMENT_NAME              INDEX_NAME                SEC\
    \ IN_\n------------ ------------------------- ------------------------- --- ---\n\
    PATCHMAIN    SYS_LOB0000022340C00002$$ SYS_IL0000022340C00002$$  YES YES\n```\n\
    \n![image](Images/sq.jpg) **Note**   With the SecureFiles architecture, you no\
    \ longer need to specify the following options: CHUNK, PCTVERSION, FREEPOOLS,\
    \ FREELIST, and FREELIST GROUPS.\n\nImplementing a Partitioned LOB\n\nYou can\
    \ create a partitioned table that has a LOB column. Doing so lets you spread a\
    \ LOB across multiple tablespaces. Such partitioning helps with balancing I/O,\
    \ maintenance, and backup and recovery operations.\n\nYou can partition LOBs by\
    \ RANGE, LIST, or HASH. The next example creates a LIST-partitioned table in which\
    \ LOB column data are stored in tablespaces separate from those of the table data:\n\
    \n```\nCREATE TABLE patchmain(\n patch_id   NUMBER\n,region     VARCHAR2(16)\n\
    ,patch_desc CLOB)\nLOB(patch_desc) STORE AS (TABLESPACE patch1)\nPARTITION BY\
    \ LIST (REGION) (\nPARTITION p1 VALUES ('EAST')\nLOB(patch_desc) STORE AS SECUREFILE\n\
    (TABLESPACE patch1 COMPRESS HIGH)\nTABLESPACE inv_data1\n,\nPARTITION p2 VALUES\
    \ ('WEST')\nLOB(patch_desc) STORE AS SECUREFILE\n(TABLESPACE patch2 DEDUPLICATE\
    \ NOCOMPRESS)\nTABLESPACE inv_data2\n,\nPARTITION p3 VALUES (DEFAULT)\nLOB(patch_desc)\
    \ STORE AS SECUREFILE\n(TABLESPACE patch3 COMPRESS LOW)\nTABLESPACE inv_data3\n\
    );\n```\n\nNote that each LOB partition is created with its own storage options\
    \ (see the section “Implementing SecureFiles Advanced Features,” later in this\
    \ chapter, for details on SecureFiles features). You can view the details about\
    \ the LOB partitions as shown:\n\n```\nselect table_name, column_name, partition_name,\
    \ tablespace_name\n,compression, deduplication\nfrom user_lob_partitions;\n```\n\
    \nHere is some sample output:\n\n```\nTABLE_NAME   COLUMN_NAME     PARTITION_\
    \ TABLESPACE_NAME COMPRE DEDUPLICATION\n------------ --------------- ----------\
    \ --------------- ------ --------------\nPATCHMAIN    PATCH_DESC      P1        \
    \ PATCH1          HIGH   NO\nPATCHMAIN    PATCH_DESC      P2         PATCH2          NO    \
    \ LOB\nPATCHMAIN    PATCH_DESC      P3         PATCH3          LOW    NO\n```\n\
    \n![image](Images/sq.jpg) **Tip**   You can also view DBA/ALL_USER_PART_LOBS for\
    \ information about partitioned LOBs.\n\nYou can change the storage characteristics\
    \ of a partitioned LOB column after it’s been created. To do so, use the ALTER\
    \ TABLE...MODIFY PARTITION statement. This example alters a LOB partition to have\
    \ a high degree of compression:\n\n```\nalter table patchmain modify partition\
    \ p2\nlob (patch_desc) (compress high);\n```\n\nThe next example modifies a partitioned\
    \ LOB not to keep duplicate values (via the DEDUPLICATE clause):\n\n```\nalter\
    \ table patchmain modify partition p3\nlob (patch_desc) (deduplicate lob);\n```\n\
    \n![image](Images/sq.jpg) **Note**   Partitioning is an extracost option that\
    \ is available only with the Oracle Enterprise Edition.\n\nMaintaining LOB Columns\n\
    \nThe following sections describe some common maintenance tasks that are performed\
    \ on LOB columns or that otherwise involve LOB columns, including moving columns\
    \ between tablespaces, and adding new LOB columns to a table.\n\nMoving a LOB\
    \ Column\n\nAs mentioned previously, if you create a table with a LOB column and\
    \ don’t specify a tablespace, then, by default, the LOB is created in the same\
    \ tablespace as its table. This happens sometimes in environments in which the\
    \ DBAs don’t plan ahead very well; only after the LOB column has consumed large\
    \ amounts of disk space does the DBA wonder why the table has grown so big.\n\n\
    You can use the ALTER TABLE...MOVE...STORE AS statement to move a LOB column to\
    \ a tablespace separate from that of the table. Here is the basic syntax:\n\n\
    ```\nalter table <table_name> move lob(<lob_name>) store as (tablespace <new_tablespace>);\n\
    ```\n\nThe next example moves the LOB column to the LOB_DATA tablespace:\n\n```\n\
    alter table patchmain\nmove lob(patch_desc)\nstore as securefile (tablespace lob_data);\n\
    ```\n\nYou can verify that the LOB was moved by querying USER_LOBS:\n\n```\nSQL>\
    \ select table_name, column_name, tablespace_name from user_lobs;\n```\n\nTo summarize,\
    \ if the LOB column is populated with large amounts of data, you almost always\
    \ want to store the LOB in a tablespace separate from that of the rest of the\
    \ table data. In these scenarios the LOB data have different growth and storage\
    \ requirements and are best maintained in their own tablespace.\n\nAdding a LOB\
    \ Column\n\nIf you have an existing table to which you want to add a LOB column,\
    \ use the ALTER TABLE...ADD statement. The next statement adds the INV_IMAGE column\
    \ to a table:\n\n```\nSQL> alter table patchmain add(inv_image blob);\n```\n\n\
    This statement is fine for quickly adding a LOB column to a development environment.\
    \ For anything else, you should specify the storage characteristics. For instance,\
    \ this command specifies that a SecureFiles LOB be created in the LOB_DATA tablespace:\n\
    \n```\nalter table patchmain add(inv_image blob)\nlob(inv_image) store as securefile(tablespace\
    \ lob_data);\n```\n\nRemoving a LOB Column\n\nYou may have a scenario in which\
    \ your business requirements change, and you no longer need a column. Before you\
    \ remove a column, consider renaming it so that you can better identify whether\
    \ any applications or users are still accessing it:\n\n```\nSQL> alter table patchmain\
    \ rename column patch_desc to patch_desc_old;\n```\n\nAfter you determine that\
    \ nobody is using the column, use the ALTER TABLE...DROP statement to drop it:\n\
    \n```\nSQL> alter table patchmain drop(patch_desc_old);\n```\n\nYou can also remove\
    \ a LOB column by dropping and recreating a table (without the LOB column). This,\
    \ of course, permanently removes any data as well.\n\nAlso keep in mind that in\
    \ Oracle Database 10g and higher, if your recycle bin is enabled, then when you\
    \ don’t drop a table with the PURGE clause, space is still consumed by the dropped\
    \ table. If you want to remove the space associated with the table, use the PURGE\
    \ clause, or purge the recycle bin after dropping the table.\n\nCaching LOBs\n\
    \nBy default, when reading and writing LOB columns, Oracle doesn’t cache LOBs\
    \ in memory. You can change the default behavior by setting the cache-related\
    \ storage options. This example specifies that Oracle should cache a LOB column\
    \ in memory:\n\n```\ncreate table patchmain(\n patch_id number\n,patch_desc clob)\n\
    lob(patch_desc) store as (tablespace lob_data cache);\n```\n\nYou can verify the\
    \ LOB caching with this query:\n\n```\nSQL> select table_name, column_name, cache\
    \ from user_lobs;\n```\n\nHere is some sample output:\n\n```\nTABLE_NAME          \
    \ COLUMN_NAME          CACHE\n-------------------- -------------------- ----------\n\
    PATCHMAIN            PATCH_DESC           YES\n```\n\n[Table 11-3](#9781430257288_Ch11.xhtml#Tab3)\
    \ describes the memory cache settings related to LOBs. If you have LOBs that are\
    \ frequently read and written to, consider using the CACHE option. If your LOB\
    \ column is read frequently but rarely written to, then the CACHE READS setting\
    \ is more appropriate. If the LOB column is infrequently read or written to, then\
    \ the NOCACHE setting is suitable.\n\n[Table 11-3.](#9781430257288_Ch11.xhtml#_Tab3)\
    \ Cache Descriptions Regarding LOB Columns\n\n| Cache Setting | Meaning |\n| ---\
    \ | --- |\n| CACHE | Oracle should place LOB data in the buffer cache for faster\
    \ access. |\n| CACHE READS | Oracle should place LOB data in the buffer cache\
    \ for reads but not writes. |\n| NOCACHE | LOB data shouldn’t be placed in the\
    \ buffer cache. This is the default for both SecureFiles and BasicFiles LOBs.\
    \ |\n\nStoring LOBs In- and Out of Line\n\nBy default up to approximately 4,000\
    \ characters of a LOB column are stored inline with the table row. If the LOB\
    \ is more than 4,000 characters, then Oracle automatically stores it outside the\
    \ row data. The main advantage of storing a LOB in row is that small LOBs (fewer\
    \ than 4,000 characters) require less I/O, because Oracle doesn’t have to search\
    \ out of row for the LOB data.\n\nHowever, storing LOB data in row isn’t always\
    \ desirable. The disadvantage of storing LOBs in row is that the table row sizes\
    \ are potentially longer. This can affect the performance of full-table scans,\
    \ range scans, and updates to columns other than the LOB column. In these situations,\
    \ you may want to disable storage in the row. For example, you explicitly instruct\
    \ Oracle to store the LOB outside the row with the DISABLE STORAGE IN ROW clause:\n\
    \n```\ncreate table patchmain(\n patch_id number\n,patch_desc clob\n,log_file  \
    \ blob)\nlob(patch_desc, log_file)\nstore as (\ntablespace lob_data\ndisable storage\
    \ in row);\n```\n\nIf you want to store up to 4,000 characters of a LOB in the\
    \ table row, use the ENABLE STORAGE IN ROW clause when creating the table:\n\n\
    ```\ncreate table patchmain(\n patch_id number\n,patch_desc clob\n,log_file  \
    \ blob)\nlob(patch_desc, log_file)\nstore as (\ntablespace lob_data\nenable storage\
    \ in row);\n```\n\n![image](Images/sq.jpg) **Note**   The LOB locator is always\
    \ stored inline with the row.\n\nYou can’t modify the LOB storage in a row after\
    \ the table has been created. The only ways to alter storage in row are to move\
    \ the LOB column or drop and recreate the table. This example alters the storage\
    \ in row by moving the LOB column:\n\n```\nalter table patchmain\nmove lob(patch_desc)\n\
    store as (enable storage in row);\n```\n\nYou can verify the in-row storage via\
    \ the IN_ROW column of USER_LOBS:\n\n```\nselect table_name, column_name, tablespace_name,\
    \ in_row\nfrom user_lobs;\n```\n\nA value of YES indicates that the LOB is stored\
    \ in row:\n\n```\nTABLE_NAME      COLUMN_NAME     TABLESPACE_NAME IN_ROW\n---------------\
    \ --------------- --------------- ------\nPATCHMAIN       LOG_FILE        LOB_DATA        YES\n\
    PATCHMAIN       PATCH_DESC      LOB_DATA        YES\n```\n\nImplementing SecureFiles\
    \ Advanced Features\n\nAs mentioned earlier, the SecureFiles LOB architecture\
    \ allows you to compress LOB columns, eliminate duplicates, and transparently\
    \ encrypt LOB data. These features provide high performance and manageability\
    \ of LOB data and are available in Oracle Database 11g and higher. The next few\
    \ sections cover features specific to SecureFiles.\n\nCompressing LOBs\n\nIf you’re\
    \ using SecureFiles LOBs, then you can specify a degree of compression. The benefit\
    \ is that the LOBs consume much less space in the database. The downside is that\
    \ reading and writing the LOBs may take longer. See [Table 11-4](#9781430257288_Ch11.xhtml#Tab4)\
    \ for a description of the compression values.\n\n[Table 11-4.](#9781430257288_Ch11.xhtml#_Tab4)\
    \ Degrees of Compression Available with SecureFiles LOBs\n\n| Compression Type\
    \ | Description |\n| --- | --- |\n| HIGH | Highest degree of compression; incurs\
    \ higher latency when reading and writing the LOB |\n| MEDIUM | Medium level of\
    \ compression; default value if compression is specified, but with no degree |\n\
    | LOW | Lowest level of compression; provides the lowest latency when reading\
    \ and writing the LOB |\n\nThis example creates a CLOB column with a low degree\
    \ of compression:\n\n```\nCREATE TABLE patchmain(\n patch_id   NUMBER\n,patch_desc\
    \ CLOB)\nLOB(patch_desc) STORE AS SECUREFILE\n(COMPRESS LOW)\nTABLESPACE lob_data;\n\
    ```\n\nIf a LOB has been created as a SecureFiles type, you can alter its compression\
    \ level. For instance, this command changes the compression to HIGH:\n\n```\n\
    SQL> alter table patchmain modify lob(patch_desc) (compress high);\n```\n\nIf\
    \ you create a LOB with compression but decide that you don’t want to use the\
    \ feature, you can alter the LOB to have no compression via the NOCOMPRESS clause:\n\
    \n```\nSQL> alter table patchmain modify lob(patch_desc) (nocompress);\n```\n\n\
    ![image](Images/sq.jpg) **Tip**   Try to enable compression, deduplication, and\
    \ encryption through a CREATE TABLE statement. If you use an ALTER TABLE statement,\
    \ the table is locked while the LOB is modified.\n\nDeduplicating LOBs\n\nIf you\
    \ have an application in which identical LOBs are associated with two or more\
    \ rows, you should consider using the SecureFiles deduplication feature. When\
    \ enabled, this instructs Oracle to check when a new LOB is inserted into a table\
    \ to see whether that LOB is already stored in another row (for the same LOB column).\
    \ If the LOB is already stored, then Oracle stores a pointer to the existing identical\
    \ LOB. This can potentially mean huge space savings for your application.\n\n\
    ![image](Images/sq.jpg) **Note**   Deduplication requires the Oracle Advanced\
    \ Compression option. See the Oracle Database Licensing Information Guide, available\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for more information.\n\nThis example creates a LOB column, using the deduplication\
    \ feature:\n\n```\nCREATE TABLE patchmain(\n patch_id   NUMBER\n,patch_desc CLOB)\n\
    LOB(patch_desc) STORE AS SECUREFILE\n(DEDUPLICATE)\n TABLESPACE lob_data;\n```\n\
    \nTo verify that the deduplication feature is in effect, run this query:\n\n```\n\
    select table_name, column_name, deduplication\nfrom user_lobs;\n```\n\nHere is\
    \ some sample output:\n\n```\nTABLE_NAME      COLUMN_NAME     DEDUPLICATION\n\
    --------------- --------------- ---------------\nPATCHMAIN       PATCH_DESC      LOB\n\
    ```\n\nIf an existing table has a SecureFiles LOB, then you can alter the column\
    \ to enable deduplication:\n\n```\nalter table patchmain\nmodify lob(patch_desc)\
    \ (deduplicate);\n```\n\nHere is another example that modifies a partitioned LOB\
    \ to enable deduplication:\n\n```\nalter table patchmain modify partition p2\n\
    lob (patch_desc) (deduplicate lob);\n```\n\nIf you decide that you don’t want\
    \ deduplication enabled, use the KEEP_DUPLICATES clause:\n\n```\nalter table patchmain\n\
    modify lob(patch_desc) (keep_duplicates);\n```\n\nEncrypting LOBs\n\nYou can transparently\
    \ encrypt a SecureFiles LOB column (just like any other column). Before you use\
    \ encryption features, you must set up an encryption wallet. I’ve included a sidebar\
    \ at the end of this section that details how to set up a wallet.\n\n![image](Images/sq.jpg) **Note**  \
    \ The SecureFiles encryption feature requires a license for the Oracle Advanced\
    \ Security option. See the Oracle Database Licensing Information Guide, available\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for more information.\n\nThe ENCRYPT clause enables SecureFiles encryption,\
    \ using Oracle Transparent Data Encryption (TDE). The following example enables\
    \ encryption for the PATCH_DESC LOB column:\n\n```\nCREATE TABLE patchmain(\n\
     patch_id number\n,patch_desc clob)\nLOB(patch_desc) STORE AS SECUREFILE (encrypt)\n\
    tablespace lob_data;\n```\n\nWhen you describe the table, the LOB column now shows\
    \ that encryption is in effect:\n\n```\nSQL> desc patchmain;\nName                                      \
    \ Null?    Type\n----------------------------------------- -------- ----------------------------\n\
    PATCH_ID                                           NUMBER\nPATCH_DESC                                        \
    \ CLOB ENCRYPT\n```\n\nHere is a slightly different example that specifies the\
    \ ENCRYPT keyword inline with the LOB column:\n\n```\nCREATE TABLE patchmain(\n\
     patch_id   number\n,patch_desc clob encrypt)\nLOB (patch_desc) STORE AS SECUREFILE;\n\
    ```\n\nYou can verify the encryption details by querying the DBA_ENCRYPTED_COLUMNS\
    \ view:\n\n```\nselect table_name, column_name, encryption_alg\nfrom dba_encrypted_columns;\n\
    ```\n\nHere is the output for this example:\n\n```\nTABLE_NAME           COLUMN_NAME          ENCRYPTION_ALG\n\
    -------------------- -------------------- --------------------\nPATCHMAIN            PATCH_DESC          \
    \ AES 192 bits key\n```\n\nIf you’ve already created the table, you can alter\
    \ a column to enable encryption:\n\n```\nalter table patchmain modify\n(patch_desc\
    \ clob encrypt);\n```\n\nYou can also specify an encryption algorithm; for example,\n\
    \n```\nalter table patchmain modify\n(patch_desc clob encrypt using '3DES168');\n\
    ```\n\nYou can disable encryption for a SecureFiles LOB column via the DECRYPT\
    \ clause:\n\n```\nalter table patchmain modify\n(patch_desc clob decrypt);\n```\n\
    \nENABLING AN ORACLE WALLET\n\nAn Oracle wallet is the mechanism Oracle uses to\
    \ enable encryption. The wallet is an OS file that contains encryption keys. The\
    \ wallet is enabled via the following steps:\n\n1.  Modify the SQLNET.ORA file\
    \ to contain the location of the wallet:\n\n    ENCRYPTION_WALLET_LOCATION=\n\n\
    \    (SOURCE=(METHOD=FILE) (METHOD_DATA=\n\n        (DIRECTORY=/ora01/app/oracle/product/12.1.0.1/db_1/network/admin)))\n\
    \n2.  Create the wallet file (ewallet.p12) with the ALTER SYSTEM command:\n\n\
    \    SQL> alter system set encryption key identified by foo;\n\n3.  Enable encryption:\n\
    \n    SQL> alter system set encryption wallet open identified by foo;\n\nSee the\
    \ Oracle Advanced Security Administrator’s Guide, which can be freely downloaded\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for full details on implementing encryption.\n\nMigrating BasicFiles to SecureFiles\n\
    \nYou can migrate BasicFiles LOB data to SecureFiles via one of the following\
    \ methods:\n\n*   Create a new table, load the data from the old table, and rename\
    \ the tables\n*   Move the table\n*   Redefine the table online\n\nEach of these\
    \ techniques is described in the following sections.\n\nCreating a New Table\n\
    \nHere is a brief example of creating a new table and loading data from the old\
    \ table. In this example, PATCHMAIN_NEW is the new table being created with a\
    \ SecureFiles LOB.\n\n```\ncreate table patchmain_new(\n patch_id number\n,patch_desc\
    \ clob)\nlob(patch_desc) store as securefile (tablespace lob_data);\n```\n\nNext,\
    \ load the newly created table with data from the old table:\n\n```\nSQL> insert\
    \ into patchmain_new select * from patchmain;\n```\n\nNow, rename the tables:\n\
    \n```\nSQL> rename patchmain to patchmain_old;\nSQL> rename patchmain_new to patchmain;\n\
    ```\n\nWhen using this technique, be sure any grants that were pointing to the\
    \ old table are reissued for the new table.\n\nMoving a Table to SecureFiles Architecture\n\
    \nYou can also use the ALTER TABLE...MOVE statement to redefine the storage of\
    \ a LOB as a SecureFiles type; for example,\n\n```\nalter table patchmain\nmove\
    \ lob(patch_desc)\nstore as securefile (tablespace lob_data);\n```\n\nYou can\
    \ verify that the column is now a SecureFiles type via this query:\n\n```\nSQL>\
    \ select table_name, column_name, securefile from user_lobs;\n```\n\nThe SECUREFILE\
    \ column now has a value of YES:\n\n```\nTABLE_NAME      COLUMN_NAME     SEC\n\
    --------------- --------------- ---\nPATCHMAIN       PATCH_DESC      YES\n```\n\
    \nMigrating with Online Redefinition\n\nYou can also redefine a table while it’s\
    \ online via the DBMS_REDEFINITION package. Use the following steps to do an online\
    \ redefinition:\n\n1.  Ensure that the table has a primary key. If the table doesn’t\
    \ have a primary key, then create one:\n\n    ```\n    alter table patchmain\n\
    \    add constraint patchmain_pk\n    primary key (patch_id);\n    ```\n\n2. \
    \ Create a new table that defines the LOB column(s) as SecureFiles type:\n\n \
    \   ```\n    create table patchmain_new(\n     patch_id number\n    ,patch_desc\
    \ clob)\n    lob(patch_desc)\n    store as securefile (tablespace lob_data);\n\
    \    ```\n\n3.  Map the columns, and copy the data from the original table to\
    \ the new table (this can take a long time if there are many rows):\n\n    ```\n\
    \    declare\n      l_col_map varchar2(2000);\n    begin\n      l_col_map := 'patch_id\
    \ patch_id, patch_desc patch_desc';\n      dbms_redefinition.start_redef_table(\n\
    \       'MV_MAINT','PATCHMAIN','PATCHMAIN_NEW',l_col_map\n      );\n    end;\n\
    \    /\n    ```\n\n4.  Clone dependent objects of the table being redefined (grants,\
    \ triggers, constraints, and so on):\n\n    ```\n    set serverout on size 1000000\n\
    \    declare\n      l_err_cnt integer :=0;\n    begin\n      dbms_redefinition.copy_table_dependents(\n\
    \       'MV_MAINT','PATCHMAIN','PATCHMAIN_NEW',1,TRUE, TRUE, TRUE, FALSE, l_err_cnt\n\
    \      );\n      dbms_output.put_line('Num Errors: ' || l_err_cnt);\n    end;\n\
    \    /\n    ```\n\n5.  Finish the redefinition:\n\n    ```\n    begin\n      dbms_redefinition.finish_redef_table('MV_MAINT','PATCHMAIN','PATCHMAIN_NEW');\n\
    \    end;\n    /\n    ```\n\nYou can confirm that the table has been redefined\
    \ via this query:\n\n```\nSQL> select table_name, column_name, securefile from\
    \ user_lobs;\n```\n\nHere is the output for this example:\n\n```\nTABLE_NAME          \
    \ COLUMN_NAME          SECUREFILE\n-------------------- -------------------- --------------------\n\
    PATCHMAIN_NEW        PATCH_DESC           NO\nPATCHMAIN            PATCH_DESC          \
    \ YES\n```\n\nVIEWING LOB METADATA\n\nYou can use any of the DBA/ALL/USER_LOBS\
    \ views to display information about LOBs in your database:\n\nselect table_name,\
    \ column_name, index_name, tablespace_name\n\nfrom all_lobs\n\norder by table_name;\n\
    \nAlso keep in mind that a LOB segment has a corresponding index segment.\n\n\
    select segment_name, segment_type, tablespace_name\n\nfrom user_segments\n\nwhere\
    \ segment_name like 'SYS_LOB%'\n\nor    segment_name like 'SYS_IL%';\n\nIn this\
    \ way, you can query both the segment and the index in the DBA/ALL/USER_SEGMENTS\
    \ views for LOB information.\n\nLoading LOBs\n\nLoading LOB data isn’t typically\
    \ the DBA’s job, but you should be familiar with techniques used to populate LOB\
    \ columns. Developers may come to you for help with troubleshooting, performance,\
    \ or space-related issues.\n\nLoading a CLOB\n\nFirst, create an Oracle database\
    \ directory object that points to the OS directory in which the CLOB file is stored.\
    \ This directory object is used when loading the CLOB. In this example the Oracle\
    \ directory object is named LOAD_LOB, and the OS directory is /orahome/oracle/lob:\n\
    \n```\nSQL> create or replace directory load_lob as '/orahome/oracle/lob';\n```\n\
    \nFor reference, listed next is the DDL used to create the table in which the\
    \ CLOB file is loaded:\n\n```\ncreate table patchmain(\n patch_id number primary\
    \ key\n,patch_desc clob\n,patch_file blob)\nlob(patch_desc, patch_file)\nstore\
    \ as securefile (compress low) tablespace lob_data;\n```\n\nThis example also\
    \ uses a sequence named PATCH_SEQ. Here is the sequence creation script:\n\n```\n\
    SQL> create sequence patch_seq;\n```\n\nThe following bit of code uses the DBMS_LOB\
    \ package to load a text file (patch.txt) into a CLOB column. In this example\
    \ the table name is PATCHMAIN, and the CLOB column is PATCH_DESC:\n\n```\ndeclare\n\
      src_clb bfile; -- point to source CLOB on file system\n  dst_clb clob;  -- destination\
    \ CLOB in table\n  src_doc_name varchar2(300) := 'patch.txt';\n  src_offset integer\
    \ := 1; -- where to start in the source CLOB\n  dst_offset integer := 1;  -- where\
    \ to start in the target CLOB\n  lang_ctx integer := dbms_lob.default_lang_ctx;\n\
      warning_msg number; -- returns warning value if bad chars\nbegin\n  src_clb\
    \ := bfilename('LOAD_LOB',src_doc_name); -- assign pointer to file\n  --\n  insert\
    \ into patchmain(patch_id, patch_desc) -- create LOB placeholder\n  values(patch_seq.nextval,\
    \ empty_clob())\n  returning patch_desc into dst_clb;\n  --\n  dbms_lob.open(src_clb,\
    \ dbms_lob.lob_readonly); -- open file\n  --\n  -- load the file into the LOB\n\
      dbms_lob.loadclobfromfile(\n  dest_lob => dst_clb,\n  src_bfile => src_clb,\n\
      amount => dbms_lob.lobmaxsize,\n  dest_offset => dst_offset,\n  src_offset =>\
    \ src_offset,\n  bfile_csid => dbms_lob.default_csid,\n  lang_context => lang_ctx,\n\
      warning => warning_msg\n  );\n  dbms_lob.close(src_clb); -- close file\n  --\n\
      dbms_output.put_line('Wrote CLOB: ' || src_doc_name);\nend;\n/\n```\n\nYou can\
    \ place this code in a file and execute it from the SQL command prompt. In this\
    \ example the file that contains the code is named clob.sql:\n\n```\nSQL> set\
    \ serverout on size 1000000\nSQL> @clob.sql\n```\n\nHere is the expected output:\n\
    \n```\nWrote CLOB: patch.txt\nPL/SQL procedure successfully completed.\n```\n\n\
    Loading a BLOB\n\nLoading a BLOB is similar to loading a CLOB. This example uses\
    \ the directory object, table, and sequence from the previous example (which loaded\
    \ a CLOB). Loading a BLOB is simpler than loading a CLOB because you don’t have\
    \ to specify character set information.\n\nThis example loads a file named patch.zip\
    \ into the PATCH_FILE BLOB column:\n\n```\ndeclare\n  src_blb bfile; -- point\
    \ to source BLOB on file system\n  dst_blb blob;  -- destination BLOB in table\n\
      src_doc_name varchar2(300) := 'patch.zip';\n  src_offset integer := 1; -- where\
    \ to start in the source BLOB\n  dst_offset integer := 1;  -- where to start in\
    \ the target BLOB\nbegin\n  src_blb := bfilename('LOAD_LOB',src_doc_name); --\
    \ assign pointer to file\n  --\n  insert into patchmain(patch_id, patch_file)\n\
      values(patch_seq.nextval, empty_blob())\n  returning patch_file into dst_blb;\
    \ -- create LOB placeholder column first\n  dbms_lob.open(src_blb, dbms_lob.lob_readonly);\n\
      --\n  dbms_lob.loadblobfromfile(\n  dest_lob => dst_blb,\n  src_bfile => src_blb,\n\
      amount => dbms_lob.lobmaxsize,\n  dest_offset => dst_offset,\n  src_offset =>\
    \ src_offset\n  );\n  dbms_lob.close(src_blb);\n  dbms_output.put_line('Wrote\
    \ BLOB: ' || src_doc_name);\nend;\n/\n```\n\nYou can place this code in a file\
    \ and run it from the SQL command prompt. Here, the file that contains the code\
    \ is named blob.sql:\n\n```\nSQL> set serverout on size 1000000\nSQL> @blob.sql\n\
    ```\n\nHere is the expected output:\n\n```\nWrote BLOB: patch.zip\nPL/SQL procedure\
    \ successfully completed.\n```\n\nMeasuring LOB Space Consumed\n\nAs discussed\
    \ previously, a LOB consists of an in-row lob locator, a LOB index, and a LOB\
    \ segment that is made up of one or more chunks. The space used by the LOB index\
    \ is usually negligible compared with the space used by the LOB segment. You can\
    \ view the space consumed by a segment by querying the BYTES column of DBA/ALL/USER_SEGMENTS\
    \ (just like any other segment in the database). Here is a sample query:\n\n```\n\
    select segment_name, segment_type, segment_subtype,\n  bytes/1024/1024 meg_bytes\n\
    from user_segments;\n```\n\nYou can modify the query to report on only LOBs by\
    \ joining to the USER_LOBS view:\n\n```\nselect a.table_name, a.column_name, a.segment_name,\
    \ a.index_name\n,b.bytes/1024/1024 meg_bytes\nfrom user_lobs a, user_segments\
    \ b\nwhere a.segment_name = b.segment_name;\n```\n\nYou can also use the DBMS_SPACE.SPACE_USAGE\
    \ package and procedure to report on the blocks being used by a LOB. This package\
    \ only works on objects that have been created in an ASSM-managed tablespace.\
    \ There are two different forms of the SPACE_USAGE procedure: one form reports\
    \ on BasicFiles LOBs, and the other reports on SecureFiles LOBs.\n\nBasicFiles\
    \ Space Used\n\nHere is an example of how to call DBMS_SPACE.SPACE_USAGE for a\
    \ BasicFiles LOB:\n\n```\ndeclare\n   p_fs1_bytes number;\n   p_fs2_bytes number;\n\
       p_fs3_bytes number;\n   p_fs4_bytes number;\n   p_fs1_blocks number;\n   p_fs2_blocks\
    \ number;\n   p_fs3_blocks number;\n   p_fs4_blocks number;\n   p_full_bytes number;\n\
       p_full_blocks number;\n   p_unformatted_bytes number;\n   p_unformatted_blocks\
    \ number;\nbegin\n   dbms_space.space_usage(\n      segment_owner      => user,\n\
          segment_name       => 'SYS_LOB0000024082C00002$$',\n      segment_type      \
    \ => 'LOB',\n      fs1_bytes          => p_fs1_bytes,\n      fs1_blocks        \
    \ => p_fs1_blocks,\n      fs2_bytes          => p_fs2_bytes,\n      fs2_blocks        \
    \ => p_fs2_blocks,\n      fs3_bytes          => p_fs3_bytes,\n      fs3_blocks        \
    \ => p_fs3_blocks,\n      fs4_bytes          => p_fs4_bytes,\n      fs4_blocks        \
    \ => p_fs4_blocks,\n      full_bytes         => p_full_bytes,\n      full_blocks        =>\
    \ p_full_blocks,\n      unformatted_blocks => p_unformatted_blocks,\n      unformatted_bytes  =>\
    \ p_unformatted_bytes\n   );\n   dbms_output.put_line('Full bytes  = '||p_full_bytes);\n\
       dbms_output.put_line('Full blocks = '||p_full_blocks);\n   dbms_output.put_line('UF\
    \ bytes    = '||p_unformatted_bytes);\n   dbms_output.put_line('UF blocks   =\
    \ '||p_unformatted_blocks);\nend;\n/\n```\n\nIn this PL/SQL, you need to modify\
    \ the code so that it reports on the LOB segment in your environment.\n\nSecureFiles\
    \ Space Used\n\nHere is an example of how to call DBMS_SPACE.SPACE_USAGE for a\
    \ SecureFiles LOB:\n\n```\nDECLARE\n  l_segment_owner         varchar2(40);\n\
      l_table_name            varchar2(40);\n  l_segment_name          varchar2(40);\n\
      l_segment_size_blocks   number;\n  l_segment_size_bytes    number;\n  l_used_blocks          \
    \ number;\n  l_used_bytes            number;\n  l_expired_blocks        number;\n\
      l_expired_bytes         number;\n  l_unexpired_blocks      number;\n  l_unexpired_bytes      \
    \ number;\n  --\n  CURSOR c1 IS\n  SELECT owner, table_name, segment_name\n  FROM\
    \ dba_lobs\n  WHERE table_name = 'PATCHMAIN';\nBEGIN\n  FOR r1 IN c1 LOOP\n    l_segment_owner\
    \ := r1.owner;\n    l_table_name := r1.table_name;\n    l_segment_name := r1.segment_name;\n\
        --\n    dbms_output.put_line('-----------------------------');\n    dbms_output.put_line('Table\
    \ Name         : ' || l_table_name);\n    dbms_output.put_line('Segment Name      \
    \ : ' || l_segment_name);\n    --\n    dbms_space.space_usage(\n        segment_owner          \
    \ => l_segment_owner,\n        segment_name            => l_segment_name,\n        segment_type            =>\
    \ 'LOB',\n        partition_name          => NULL,\n        segment_size_blocks    \
    \ => l_segment_size_blocks,\n        segment_size_bytes      => l_segment_size_bytes,\n\
            used_blocks             => l_used_blocks,\n        used_bytes              =>\
    \ l_used_bytes,\n        expired_blocks          => l_expired_blocks,\n        expired_bytes          \
    \ => l_expired_bytes,\n        unexpired_blocks        => l_unexpired_blocks,\n\
            unexpired_bytes         => l_unexpired_bytes\n    );\n    --\n    dbms_output.put_line('segment_size_blocks:\
    \ '||  l_segment_size_blocks);\n    dbms_output.put_line('segment_size_bytes :\
    \ '||  l_segment_size_bytes);\n    dbms_output.put_line('used_blocks        :\
    \ '||  l_used_blocks);\n    dbms_output.put_line('used_bytes         : '||  l_used_bytes);\n\
        dbms_output.put_line('expired_blocks     : '||  l_expired_blocks);\n    dbms_output.put_line('expired_bytes      :\
    \ '||  l_expired_bytes);\n    dbms_output.put_line('unexpired_blocks   : '||  l_unexpired_blocks);\n\
        dbms_output.put_line('unexpired_bytes    : '||  l_unexpired_bytes);\n  END\
    \ LOOP;\nEND;\n/\n```\n\nAgain, in this PL/SQL, you need to modify the code so\
    \ that it reports on the table with the LOB segment in your environment.\n\nReading\
    \ BFILEs\n\nAs discussed previously, a BFILE data type is simply a column in a\
    \ table that stores a pointer to an OS file. A BFILE provides you with read-only\
    \ access to a binary file on disk. To access a BFILE, you must first create a\
    \ directory object. This is a database object that stores the location of an OS\
    \ directory. The directory object makes Oracle aware of the BFILE location on\
    \ disk.\n\nThis example first creates a directory object, creates a table with\
    \ a BFILE column, and then uses the DBMS_LOB package to access a binary file:\n\
    \n```\nSQL> create or replace directory load_lob as '/orahome/oracle/lob';\n```\n\
    \nNext, a table is created that contains a BFILE data type:\n\n```\ncreate table\
    \ patchmain\n(patch_id   number\n,patch_file bfile);\n```\n\nFor this example\
    \ a file named patch.zip is located in the aforementioned directory. You make\
    \ Oracle aware of the binary file by inserting a record into the table using the\
    \ directory object and the file name:\n\n```\nSQL> insert into patchmain values(1,\
    \ bfilename('LOAD_LOB','patch.zip'));\n```\n\nNow, you can access the BFILE via\
    \ the DBMS_LOB package. For \\ instance, if you want to verify that the file exists\
    \ or display the length of the LOB, you can do so as follows:\n\n```\nSQL> select\
    \ dbms_lob.fileexists(bfilename('LOAD_LOB','patch.zip')) from dual;\nSQL> select\
    \ dbms_lob.getlength(patch_file) from patchmain;\n```\n\nIn this manner, the binary\
    \ file behaves like a BLOB. The big difference is that the binary file isn’t stored\
    \ within the database.\n\n![image](Images/sq.jpg) **Tip**   See the Oracle Database\
    \ PL/SQL Packages and Types Reference guide for full details on using the DBMS_LOB\
    \ package. This guide is available on [http://otn.oracle.com](http://otn.oracle.com).\n\
    \nSummary\n\nOracle lets you store large objects in databases via various LOB\
    \ data types. LOBs facilitate the storage, management, and retrieval of video\
    \ clips, images, movies, word-processing documents, large text files, and so on.\
    \ Oracle can store these files in the database and thus provide backup and recovery\
    \ and security protection (just as it does for any other data type). BLOBs are\
    \ used to store binary files, such as images (JPEG, MPEG), movie files, sound\
    \ files, and so on. If it’s not feasible to store the file in the database, you\
    \ can use a BFILE LOB.\n\nOracle provides two underlying architectures for LOBS:\
    \ BasicFiles and SecureFiles. BasicFiles is the LOB architecture that has been\
    \ available since Oracle version 8\\. The SecureFiles feature was introduced in\
    \ Oracle Database 11g. SecureFiles has many advanced options, such as compression,\
    \ deduplication, and encryption (these specific features require an extra license\
    \ from Oracle).\n\nLOBs provide a way to manage very large files. Oracle has another\
    \ feature, partitioning, which allows you to manage very large tables and indexes.\
    \ Partitioning is covered in detail in the next chapter.\n\nCHAPTER 12\n\n![image](Images/frontdot.jpg)\n\
    \nPartitioning: Divide and Conquer\n\nOracle provides two key scalability features\
    \ that enable good performance, even with massively large databases: parallelism\
    \ and partitioning. Parallelism allows Oracle to start more than one thread of\
    \ execution to take advantage of multiple hardware resources. Partitioning allows\
    \ subsets of a table or index to be managed independently (Oracle’s “divide and\
    \ conquer” approach). The focus of this chapter is partitioning strategies.\n\n\
    Partitioning lets you create a logical table or index that consists of separate\
    \ segments that can each be accessed and worked on by separate threads of execution.\
    \ Each partition of a table or index has the same logical structure, such as the\
    \ column definitions, but can reside in separate containers. In other words, you\
    \ can store each partition in its own tablespace and associated data files. This\
    \ allows you to manage one large logical object as a group of smaller, more maintainable\
    \ pieces. The main benefits realized from partitioning are\n\n*   better performance;\
    \ in some circumstances, SQL queries can operate on a single partition or subset\
    \ of partitions, which allows for faster execution times\n*   higher availability;\
    \ the availability of data in one partition isn’t affected by the unavailability\
    \ of data in another partition\n*   easier maintenance; inserting, updating, deleting,\
    \ truncating, rebuilding, and reorganizing data by partition allows for efficient\
    \ loading and archiving operations that would otherwise be difficult and time-consuming\n\
    \nJust because you implement partitioning doesn’t mean you’ll automatically get\
    \ performance gains, achieve high availability, and ease your administration activities.\
    \ You need to be aware of how partitioning works and how to leverage various features\
    \ to reap any benefits. The goal of this chapter is to explain partitioning concepts\
    \ and how to implement partitioning and to offer guidelines on when to use which\
    \ features.\n\nBefore getting into the details, there are several partitioning\
    \ terms you should first be familiar with. [Table 12-1](#9781430257288_Ch12.xhtml#Tab1)\
    \ describes the meanings of key partitioning terms that are used throughout the\
    \ chapter.\n\n[Table 12-1](#9781430257288_Ch12.xhtml#_Tab1). Oracle Partitioning\
    \ Terminology\n\n| Term | Meaning |\n| --- | --- |\n| Partitioning | Transparently\
    \ implementing one logical table or index as many separate, smaller segments |\n\
    | Partition key | One or more columns that unambiguously determine which partition\
    \ a row is stored in |\n| Partition bound | Boundary between partitions |\n| Single-Level\
    \ partitioning | Partitioning, using a single method |\n| Composite partitioning\
    \ | Partitioning, using a combination of methods |\n| Subpartition | Partition\
    \ within a partition |\n| Partition independence | Ability to access partitions\
    \ separately to perform maintenance operations without affecting the availability\
    \ of other partitions |\n| Partition pruning | Elimination of unnecessary partitions.\
    \ Oracle detects which partitions need to be accessed by an SQL statement and\
    \ removes (prunes from search) any partitions that aren’t needed. |\n| Partition-wise\
    \ join | Join executed in partition-sized pieces to improve performance by executing\
    \ many smaller tasks in parallel rather than one large task in sequence |\n| Local\
    \ partitioned index | Index that uses the same partition key as its table |\n\
    | Global partitioned index | Index that doesn’t use the same partition key as\
    \ its table |\n| Global nonpartitioned index | Regular index created on a partitioned\
    \ table. The index itself isn’t partitioned. |\n\nAlso keep in mind, if you work\
    \ with mainly small OLTP databases, you probably don’t need to create partitioned\
    \ tables and indexes. However, if you work with large OLTP databases or in data\
    \ warehouse environments, you can most likely benefit from partitioning. Partitioning\
    \ is a key to designing and building scalable, highly available, large database\
    \ systems.\n\nWhat Tables Should Be Partitioned?\n\nFollowing are some rules of\
    \ thumb for determining whether to partition a table. In general, you should consider\
    \ partitioning for tables\n\n*   that are greater than 2GB.\n*   that have more\
    \ than 10 million rows, when SQL operations are getting slower as more data are\
    \ added\n*   that you know will grow large (it’s better to create a table as partitioned\
    \ than to rebuild it as partitioned after performance begins to suffer as the\
    \ table grows)\n*   that have rows that can be divided in a way that facilitates\
    \ parallel operations, such as inserting, retrieval, deleting, and backup and\
    \ recovery\n*   for which you want to archive the oldest partition on a periodic\
    \ basis or from which you want to drop the oldest partition regularly, as data\
    \ become stale\n\nOne rule is that any table greater than 2GB is a potential candidate\
    \ for partitioning. Run this query to show the top space-consuming objects in\
    \ your database:\n\n```\nselect * from (\nselect owner, segment_name, segment_type,\
    \ partition_name\n,sum(bytes)/1024/1024 meg_tot\nfrom dba_segments\ngroup by owner,\
    \ segment_name, segment_type, partition_name\norder by sum(extents) desc)\nwhere\
    \ rownum <= 10;\n```\n\nHere is a snippet of the output from the query:\n\n```\n\
    OWNER    SEGMENT_NAME                   SEGMENT_TYPE PARTITION_NAME     MEG_TOT\n\
    -------- ------------------------------ ------------ --------------- ----------\n\
    MV_MAINT F_SALES                        TABLE                             15281\n\
    MV_MAINT F_SALES_IDX1                   INDEX                              8075\n\
    ```\n\nThis output shows that a few large objects in this database may benefit\
    \ from partitioning. For this database, if there are performance issues with these\
    \ large objects, then partitioning may help.\n\nIf you’re running the previous\
    \ query from SQL*Plus, you need to apply some formatting to the columns to reasonably\
    \ display the output within the limited width of your terminal:\n\n```\nset lines\
    \ 132\ncol owner form a10\ncol segment_name form a25\ncol partition_name form\
    \ a15\n```\n\nIn addition to looking at the size of objects, if you can divide\
    \ your data so that they facilitate operations, such as loading data, querying,\
    \ backups, archiving, and deleting, you should consider using partitioning. For\
    \ example, if you work with a table that contains a large number of rows that\
    \ are often accessed according to a particular time range—such as by day, week,\
    \ month, or year—it makes sense to consider partitioning.\n\nA large table size\
    \ combined with a good business reason means that you should think about partitioning.\
    \ Keep in mind that there is more setup work and maintenance when you partition\
    \ a table. However, as mentioned earlier, it’s much easier to partition a table\
    \ during setup than it is to convert it after it’s grown to an unwieldy size.\n\
    \n![image](Images/sq.jpg) **Note**   Partitioning is an extra cost option that\
    \ is available only with the Oracle Enterprise Edition. You have to decide, based\
    \ on your business requirements, whether partitioning is worth the cost.\n\nCreating\
    \ Partitioned Tables\n\nOracle provides a robust set of methods for dividing tables\
    \ and indexes into smaller subsets. For example, you can divide a table’s data\
    \ by date ranges, such as by month or year. [Table 12-2](#9781430257288_Ch12.xhtml#Tab2)\
    \ gives an overview of the partitioning strategies available.\n\n[Table 12-2](#9781430257288_Ch12.xhtml#_Tab2).\
    \ Partitioning Strategies\n\n| Partition Type | Description |\n| --- | --- |\n\
    | Range | Allows partitioning based on ranges of dates, numbers, or characters\
    \ |\n| List | Useful when the partitions fit nicely into a list of values, such\
    \ as state or region codes |\n| Hash | Allows even distribution of rows when there\
    \ is no obvious partitioning key |\n| Composite | Allows combinations of other\
    \ partitioning strategies |\n| Interval | Extends range partitioning by automatically\
    \ allocating new partitions when new partition key values exceed the existing\
    \ high range |\n| Reference | Useful for partitioning a child table based on a\
    \ parent table column |\n| Virtual | Allows partitioning on a virtual column |\n\
    | System | Allows the application inserting the data to determine which partition\
    \ should be used |\n\nThe following sections show examples of each partitioning\
    \ strategy. Additionally, you learn how to place partitions in separate tablespaces;\
    \ to take advantage of all the benefits of partitioning, you need to understand\
    \ how to assign a partition to its own tablespace.\n\nPartitioning by Range\n\n\
    Range partitioning is frequently used. This strategy instructs Oracle to place\
    \ rows in partitions based on ranges of values, such as dates, numbers, or characters.\
    \ As data are inserted into a range-partitioned table, Oracle determines which\
    \ partition to place a row in based on the lower and upper bound of each range\
    \ partition.\n\nThe range-based partition key is defined by the PARTITION BY RANGE\
    \ clause in the CREATE TABLE statement. This determines which column is used to\
    \ control the partition a row belongs in. You’ll see some examples shortly.\n\n\
    Each range partition requires a VALUES LESS THAN clause that identifies the noninclusive\
    \ value of the upper bound of the range. The first partition defined for a range\
    \ has no lower bound. Any values less than those set in the first partition’s\
    \ VALUES LESS THAN clause are inserted into the first partition. For partitions\
    \ other than the first partition, the lower bound of a range is determined by\
    \ the upper bound of the previous partition.\n\nOptionally, you can create a range-partitioned\
    \ table’s highest partition with the MAXVALUE clause. Any row that doesn’t have\
    \ a partition key that falls in the lower ranges is inserted into this topmost\
    \ MAXVALUE partition.\n\nImplementing a NUMBER for the Partition Key Column\n\n\
    Let’s look at an example to illustrate the previous concepts. Suppose you’re working\
    \ in a data warehouse environment, in which you typically have a fact table that\
    \ stores information about an event, such as sales, profits, registrations, and\
    \ so on. In a fact table  usually one column represents an amount or count and\
    \ another represents a point in time.\n\nSome data warehouse architects choose\
    \ to represent the point-in-time column with a number that translates into a date—the\
    \ idea being that a number data type is efficient when joining to multiple dimension\
    \ tables. For instance, the value 20130101 is used to represent January 1, 2013,\
    \ and you use that number value (which represents a date) as the column to partition\
    \ the fact table. This SQL statement creates a table with three partitions based\
    \ on a range of numbers:\n\n```\ncreate table f_sales\n(sales_amt number\n,d_date_id\
    \ number)\npartition by range (d_date_id)(\npartition p_2012 values less than\
    \ (20130101),\npartition p_2013 values less than (20140101),\npartition p_max  values\
    \ less than (maxvalue));\n```\n\nWhen creating a range-partitioned table, you\
    \ don’t have to specify a MAXVALUE partition. However, if you don’t specify a\
    \ partition with the MAXVALUE clause, and you attempt to insert a row that doesn’t\
    \ fall within any other defined ranges, you receive an error such as\n\n```\n\
    ORA-14400: inserted partition key does not map to any partition\n```\n\nWhen you\
    \ see that error, you have to add a partition that accommodates the partition\
    \ key value being inserted or that has the MAXVALUE clause.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you’re using Oracle Database 11g or higher, consider using an interval partitioning\
    \ strategy, in which partitions are automatically added by Oracle when the high\
    \ range value is exceeded. See the section “Creating Partitions on Demand,” later\
    \ in this chapter.\n\nYou can view information about the partitioned table you\
    \ just created by running the following query:\n\n```\nselect table_name, partitioning_type,\
    \ def_tablespace_name\nfrom user_part_tables\nwhere table_name='F_SALES';\n```\n\
    \nHere is a snippet of the output:\n\n```\nTABLE_NAME           PARTITION DEF_TABLESPACE_NAME\n\
    -------------------- --------- ------------------------------\nF_SALES              RANGE    \
    \ USERS\n```\n\nTo view information about the partitions in the table, issue a\
    \ query as follows:\n\n```\nselect table_name, partition_name, high_value\nfrom\
    \ user_tab_partitions\nwhere table_name = 'F_SALES'\norder by table_name, partition_name;\n\
    ```\n\nHere is some sample output:\n\n```\nTABLE_NAME           PARTITION_NAME      \
    \ HIGH_VALUE\n-------------------- -------------------- --------------------\n\
    F_SALES              P_2012               20130101\nF_SALES              P_2013              \
    \ 20140101\nF_SALES              P_MAX                MAXVALUE\n```\n\nIn this\
    \ example the D_DATE_ID column is the partitioning key column. The VALUES LESS\
    \ THAN clauses create the partition boundaries; these define the partition into\
    \ which a row is inserted. The MAXVALUE parameter creates a partition in which\
    \ to store rows that don’t fit into the other defined partitions (including NULL\
    \ values).\n\nDETECTING WHEN ADDITIONAL HIGH RANGE IS REQUIRED\n\nWhen you partition\
    \ by range without specifying a MAXVALUE partition, you may not accurately predict\
    \ when a new high partition will need to be added. Additionally, the HIGH_VALUE\
    \ column in the data dictionary is a LONG data type, which means that you can’t\
    \ apply the MAX SQL function to return the current high value.\n\nListed next\
    \ is a simple shell script that attempts to insert a record that contains a future\
    \ date to determine if there is an accepting partition. If the record is inserted\
    \ successfully, the script rolls back the transaction. If the record fails to\
    \ insert, an error is generated, and the script sends you an e-mail:\n\n#!/bin/bash\n\
    \nif [ $# -ne 1 ]; then\n\n  echo \"Usage: $0 SID\"\n\n  exit 1\n\nfi\n\nexport\
    \ ORACLE_SID=o12c\n\nexport ORACLE_HOME=/ora01/app/oracle/product/12.1.0.1/db_1\n\
    \n#\n\nsqlplus -s <<EOF\n\nmv_maint/foo\n\nWHENEVER SQLERROR EXIT FAILURE\n\n\
    COL date_id NEW_VALUE hold_date_id\n\nSELECT to_char(sysdate+30,'yyyymmdd') date_id\
    \ FROM dual;\n\n--\n\nINSERT INTO mv_maint.f_sales(sales_amt, d_date_id)\n\nVALUES\
    \ (0, '&hold_date_id');\n\nROLLBACK;\n\nEOF\n\n#\n\nif [ $? -ne 0 ]; then\n\n\
      mailx -s \"Partition range issue: f_sales\"[dkuhn@gmail.com](http://mailto:dkuhn@gmail.com)\
    \ <<EOF\n\n  check f_sales high range.\n\nEOF\n\nelse\n\n  echo \"f_sales ok\"\
    \n\nfi\n\nexit 0\n\nEnsure that you don’t inadvertently add data to a production\
    \ table with a script such as this. You have to modify the script carefully to\
    \ match your table and high-range partition key column.\n\nImplementing a TIMESTAMP\
    \ for the Partition Key Column\n\nAs noted, the example in the previous section\
    \ created the column D_DATE_ID as a NUMBER data type instead of a DATE data type\
    \ for the F_SALES table. As opposed to a NUMBER data type, some data warehouse\
    \ architects would advocate using a DATE or TIMESTAMP data type for the partition\
    \ key. Here is an example that creates the F_SALES table with a DATE data type\
    \ for the D_DATE_DTT column:\n\n```\ncreate table f_sales\n(sales_amt  number\n\
    ,d_date_dtt date\n)\npartition by range (d_date_dtt)(\n partition p_2011 values\
    \ less than (to_date('01-01-2012','dd-mm-yyyy')),\n partition p_2012 values less\
    \ than (to_date('01-01-2013','dd-mm-yyyy')),\n partition p_max  values less than\
    \ (maxvalue));\n```\n\n![image](Images/sq.jpg) **Tip**   Using the date format\
    \ DD-MM-YYYY may be preferable to one such as 01-MON-YYYY. The DD-MM-YYYY format\
    \ avoids using character names for the month (JAN, FEB, and so on), which circumvents\
    \ issues with different character-set languages.\n\nAs shown in the prior code,\
    \ I recommend that you always use TO_DATE to explicitly instruct Oracle on how\
    \ to interpret the date. Doing so also provides a minimal level of documentation\
    \ for anybody supporting the database.\n\nUsing a DATE data type for the partition\
    \ key is every bit as valid as using a NUMBER field for the partition key. Just\
    \ keep in mind that whoever designs the data warehouse tables may have a strong\
    \ opinion about which technique to use.\n\nPlacing Partitions in Tablespaces\n\
    \nBenefits such as increased availability and reduced administration costs can\
    \ only be achieved if you create a separate tablespace for each partition. Using\
    \ separate tablespaces effects the partition independence; a single partition\
    \ can be placed online/offline, backed up, restored, and recovered independently\
    \ of the availability of other partitions.\n\nTo understand the benefits of using\
    \ a separate tablespace for each partition, first consider a nonpartitioned table\
    \ scenario. For reference, here is the CREATE TABLESPACE statement used for this\
    \ example:\n\n```\nCREATE TABLESPACE p1_tbsp\n  DATAFILE '/u01/dbfile/o12c/p1_tbsp01.dbf'\
    \ SIZE 100m\n  EXTENT MANAGEMENT LOCAL\n  UNIFORM SIZE 128K\n  SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n```\n\nHere is a nonpartitioned CREATE TABLE statement that creates a\
    \ table and places it in the P1_TBSP tablespace:\n\n```\ncreate table f_sales(\n\
     sales_amt number\n,d_date_id number)\ntablespace p1_tbsp;\n```\n\nNow, as data\
    \ are inserted into the F_SALES table, all the data are stored in the data files\
    \ associated with the tablespace P1_TBSP. [Figure 12-1](#9781430257288_Ch12.xhtml#Fig1)\
    \ illustrates this point. There is no way for the data being inserted into a nonpartitioned\
    \ table to be spread out across multiple tablespaces.\n\n![9781430257288_Fig12-01.jpg](Images/9781430257288_Fig12-01.jpg)\n\
    \n[Figure 12-1](#9781430257288_Ch12.xhtml#_Fig1). A nonpartitioned table\n\nCompare\
    \ the previous nonpartitioned architecture with that of a partitioned table. This\
    \ example creates a partitioned table but doesn’t specify tablespaces for the\
    \ partitions:\n\n```\ncreate table f_sales (\n sales_amt number\n,d_date_id number)\n\
    tablespace p1_tbsp\npartition by range(d_date_id)(\n partition y11 values less\
    \ than (20120101)\n,partition y12 values less than (20130101)\n,partition y13\
    \ values less than (20140101));\n```\n\n[Figure 12-2](#9781430257288_Ch12.xhtml#Fig2)\
    \ illustrates this approach. Note that in this case, all partitions are stored\
    \ in the same tablespace.\n\n![9781430257288_Fig12-02.jpg](Images/9781430257288_Fig12-02.jpg)\n\
    \n[Figure 12-2](#9781430257288_Ch12.xhtml#_Fig2). A partitioned table with only\
    \ one tablespace\n\nThis approach has some advantages over a nonpartitioned table,\
    \ in that you can perform partition maintenance operations (drop, split, merge,\
    \ truncate, and so on) on one partition without affecting others, thus ensuring\
    \ partition independence. However, the approach doesn’t quite take advantage of\
    \ all that partitioning has to offer.\n\nThe next example places each partition\
    \ in a separate tablespace:\n\n```\ncreate table f_sales (\n sales_amt number\n\
    ,d_date_id number)\ntablespace p1_tbsp\npartition by range(d_date_id)(\n partition\
    \ y11 values less than (20120101)\n   tablespace p1_tbsp\n,partition y12 values\
    \ less than (20130101)\n    tablespace p2_tbsp\n,partition y13 values less than\
    \ (20140101)\n    tablespace p3_tbsp);\n```\n\nNow, the data for each partition\
    \ are physically stored in their own tablespace and corresponding data files (see\
    \ [Figure 12-3](#9781430257288_Ch12.xhtml#Fig3)).\n\n![9781430257288_Fig12-03.jpg](Images/9781430257288_Fig12-03.jpg)\n\
    \n[Figure 12-3](#9781430257288_Ch12.xhtml#_Fig3). Partitions stored in separate\
    \ tablespaces\n\nAn advantage of placing partitions in separate tablespaces is\
    \ that you can back up and recover partitions independently (by backing up individual\
    \ tablespaces). Also, if you have a partition that isn’t being modified, you can\
    \ change its tablespace to read-only and instruct utilities such as RMAN to skip\
    \ backing up such tablespaces, thus increasing backup performance. Additionally,\
    \ creating each partition in its own tablespace makes it easier to move data from\
    \ OLTP databases to decision support system (DSS) databases, and it lets you place\
    \ specific tablespaces and corresponding data files on separate storage devices\
    \ to improve scalability and performance.\n\nAlso keep in mind that when you specify\
    \ a tablespace for a partition, you can also specify any other storage settings\
    \ (per tablespace). The next example explicitly sets the PCTFREE, PCTUSED, and\
    \ NOLOGGING storage clauses for the tablespaces:\n\n```\ncreate table f_sales\
    \ (\n sales_amt number\n,d_date_id number)\ntablespace p1_tbsp\npartition by range(d_date_id)(\n\
     partition y11 values less than (20120101)\n   tablespace p1_tbsp pctfree 5 pctused\
    \ 90 nologging\n,partition y12 values less than (20130101)\n   tablespace p2_tbsp\
    \ pctfree 5 pctused 90 nologging\n,partition y13 values less than (20140101)\n\
       tablespace p3_tbsp pctfree 5 pctused 90 nologging);\n```\n\nPartitioning by\
    \ List\n\nList partitioning works well for partitioning unordered and unrelated\
    \ sets of data. For example, say you have a large table and want to partition\
    \ it by state code. To do so, use the PARTITION BY LIST clause of the CREATE TABLE\
    \ statement. This example uses state codes to create three list-based partitions:\n\
    \n```\ncreate table f_sales\n (sales_amt  number\n ,d_date_id  number\n ,state_code\
    \ varchar2(3))\npartition by list (state_code)\n ( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
      ,partition reg_mid  values ('IA','KS','MI','MN','MO','NE','OH','ND')\n  ,partition\
    \ reg_def  values (default));\n```\n\nThe partition key for a list-partitioned\
    \ table can be only one column. Use the DEFAULT list to specify a partition for\
    \ rows that don’t match values in the list. If you don’t specify a DEFAULT list,\
    \ then an error is generated when a row is inserted with a value that doesn’t\
    \ map to the defined partitions. Run this SQL statement to view list values for\
    \ each partition:\n\n```\nselect table_name, partition_name, high_value\nfrom\
    \ user_tab_partitions\nwhere table_name = 'F_SALES'\norder by 1;\n```\n\nHere\
    \ is the output for this example:\n\n```\nTABLE_NAME  PARTITION_NAME   HIGH_VALUE\n\
    ----------- ---------------- ----------------------------------------------\n\
    F_SALES     REG_DEF          default\nF_SALES     REG_MID          'IA', 'KS',\
    \ 'MI', 'MN', 'MO', 'NE', 'OH', 'ND'\nF_SALES     REG_WEST         'AZ', 'CA',\
    \ 'CO', 'MT', 'OR', 'ID', 'UT', 'NV'\n```\n\nThe HIGH_VALUE column displays the\
    \ list values defined for each partition. This column is a LONG data type. If\
    \ you’re using SQL*Plus, you may need to set the LONG variable to a value higher\
    \ than the default (80B), to display the entire contents of the column:\n\n```\n\
    SQL> set long 1000\n```\n\nPartitioning by Hash\n\nSometimes a large table doesn’t\
    \ contain an obvious column by which to partition the table, whether by range\
    \ or by list. For instance, suppose you use a sequence to populate a surrogate\
    \ primary key for a table, and you want rows spread evenly across partitions,\
    \ based on the unique primary key. You may do this because there isn’t another\
    \ column to partition, or you may be mainly concerned with the efficiency of inserts.\n\
    \nHash partitioning maps rows to partitions based on an internal algorithm that\
    \ spreads data evenly across all defined partitions. You don’t have any control\
    \ over the hashing algorithm or the way Oracle distributes the data. You specify\
    \ how many partitions you’d like, and Oracle divides the data evenly, based on\
    \ the hash key column.\n\n![image](Images/sq.jpg) **Tip**   Oracle strongly recommends\
    \ that you use a power of two (2, 4, 8, 16, and so on) for the number of hash\
    \ partitions. Doing so results in the optimal distribution of rows throughout\
    \ the partitions.\n\nTo create hash-based partitions, use the PARTITION BY HASH\
    \ clause of the CREATE TABLE statement. This example creates a table that is divided\
    \ into two partitions; each partition is created in its own tablespace:\n\n```\n\
    create table f_sales(\n sales_id  number primary key\n,sales_amt number)\npartition\
    \ by hash(sales_id)\npartitions 2 store in(p1_tbsp, p2_tbsp);\n```\n\nOf course,\
    \ you have to modify details, such as the tablespace names, to match those in\
    \ your environment. Alternatively, you can eliminate the STORE IN clause, and\
    \ Oracle places all partitions in your default tablespace. If you want to name\
    \ both the tablespaces and the partitions, you can specify them as follows:\n\n\
    ```\ncreate table f_sales(\n sales_id  number primary key\n,sales_amt number)\n\
    partition by hash(sales_id)\n(partition p1 tablespace p1_tbsp\n,partition p2 tablespace\
    \ p2_tbsp);\n```\n\nHash partitioning has some interesting performance implications.\
    \ All rows that share the same value for the hash key are inserted into the same\
    \ partition. This means that inserts are particularly efficient, because the hashing\
    \ algorithm ensures that the data are distributed uniformly across partitions.\
    \ Also, if you typically select for a specific key value, Oracle has to access\
    \ only one partition to retrieve those rows. However, if you search by ranges\
    \ of values, Oracle will most likely have to search every partition to determine\
    \ which rows to retrieve. Thus, range searches can perform poorly in hash-partitioned\
    \ tables.\n\nBlending Different Partitioning Methods\n\nOracle allows you to partition\
    \ a table using multiple strategies (composite partitioning). For example, suppose\
    \ you have a table that you want to partition on a number range, but you also\
    \ want to subdivide each partition by a list of regions. The following example\
    \ does just that:\n\n```\ncreate table f_sales(\n  sales_amt  number\n ,state_code\
    \ varchar2(3)\n ,d_date_id  number)\npartition by range(d_date_id)\nsubpartition\
    \ by list(state_code)\n(partition p2011 values less than (20120101)\n  (subpartition\
    \ p1_north values ('ID','OR')\n  ,subpartition p1_south values ('AZ','NM')),\n\
     partition p2012 values less than (20130101)\n  (subpartition p2_north values\
    \ ('ID','OR')\n  ,subpartition p2_south values ('AZ','NM')));\n```\n\nYou can\
    \ view subpartition information by running the following query:\n\n```\nselect\
    \ table_name, partitioning_type, subpartitioning_type\nfrom user_part_tables\n\
    where table_name = 'F_SALES';\n```\n\nHere is some sample output:\n\n```\nTABLE_NAME  PARTITION\
    \ SUBPARTIT\n----------- --------- ---------\nF_SALES     RANGE     LIST\n```\n\
    \nRun the next query to view information about the subpartitions:\n\n```\nselect\
    \ table_name, partition_name, subpartition_name\nfrom user_tab_subpartitions\n\
    where table_name = 'F_SALES'\norder by table_name, partition_name;\n```\n\nHere\
    \ is a snippet of the output:\n\n```\nTABLE_NAME  PARTITION_NAME   SUBPARTITION_NAME\n\
    ----------- ---------------- --------------------\nF_SALES     P2011            P1_SOUTH\n\
    F_SALES     P2011            P1_NORTH\nF_SALES     P2012            P2_SOUTH\n\
    F_SALES     P2012            P2_NORTH\n```\n\nPrior to Oracle Database 11g, composite\
    \ partitioning can be implemented as range-hash (available since version 8i) and\
    \ range-list (available since version 9i). Starting with Oracle Database 11g,\
    \ here are the composite partitioning strategies available:\n\n*   Range-Hash:\
    \ Appropriate for ranges that can be subdivided by a somewhat random key, such\
    \ as a range of D_DATE_ID and then a hash on SALES_ID\n*   Range-List: Useful\
    \ when a range can be further partitioned by a list, such as a range of D_DATE_ID\
    \ and then a list on STATE_CODE\n*   Range-Range: Appropriate when you have two\
    \ distinct partition range values, such as D_DATE_ID and SHIP_DATE\n*   List-Range:\
    \ Useful when a list can be further subdivided by a range, such as a list on STATE_CODE\
    \ and then a range of D_DATE_ID\n*   List-Hash: Useful for further partitioning\
    \ a list by a somewhat random key, such as a list on STATE_CODE and then a hash\
    \ on SALES_ID\n*   List-List: Appropriate when a list can be further delineated\
    \ by another list, such as COUNTRY_CODE and then STATE_CODE\n*   Hash-Hash: Useful\
    \ when a hash can be further subdivided by another unique value, such as SALES_ID\
    \ and CUSTOMER_ID\n\nAs you can see, composite partitioning gives you a great\
    \ deal of flexibility in the way you partition your data.\n\nCreating Partitions\
    \ on Demand\n\nAs of Oracle Database 11g, you can instruct Oracle to add partitions\
    \ to range-partitioned tables automatically. This feature is known as interval\
    \ partitioning. Oracle dynamically creates a new partition when data inserted\
    \ exceed the maximum bound of a range-partitioned table. The newly added partition\
    \ is based on an interval that you specify (hence, the name interval partitioning).\n\
    \n![image](Images/sq.jpg) **Tip**   Think of the interval as a rule you provide,\
    \ stating how you want future partitions to be created.\n\nAdding Yearly Partitions,\
    \ Based on Date\n\nSuppose, for instance, you have a range-partitioned table and\
    \ want Oracle to add a partition automatically when values are inserted above\
    \ the highest value defined for the highest range. You can use the INTERVAL clause\
    \ of the CREATE TABLE statement to instruct Oracle to add a partition automatically\
    \ to the high end of a range-partitioned table. The following example creates\
    \ a table that initially has one partition, with a high value range of 01-01-2013:\n\
    \n```\ncreate table f_sales(\n sales_amt  number\n,d_date_dtt date)\npartition\
    \ by range (d_date_dtt)\ninterval(numtoyminterval(1, 'YEAR'))\nstore in (p1_tbsp,\
    \ p2_tbsp, p3_tbsp)\n(partition p1 values less than (to_date('01-01-2013','dd-mm-yyyy'))\n\
    tablespace p1_tbsp);\n```\n\nThe first partition is created in the P1_TBSP tablespace.\
    \ As Oracle adds partitions, it assigns a new partition to the tablespaces defined\
    \ in the STORE IN clause (the program is supposed to store them in a round-robin\
    \ fashion but isn’t always consistent).\n\n![image](Images/sq.jpg) **Note**  \
    \ With interval partitioning, you can specify only a single key column from the\
    \ table, and it must be either a DATE or a NUMBER data type. This is because the\
    \ interval is mathematically added to these data types. You can’t use a VARCHAR2,\
    \ as you can’t add a number to a VARCHAR2 data type.\n\nThe interval in this example\
    \ is one year, specified by the INTERVAL(NUMTOYMINTERVAL(1, 'YEAR')) clause. If\
    \ a record is inserted into the table with a D_DATE_DTT value greater than or\
    \ equal to 01-01-2013, Oracle automatically adds a new partition to the high end\
    \ of the table. You can check the details of the partition by running this SQL\
    \ statement:\n\n```\nset lines 132\ncol table_name form a10\ncol partition_name\
    \ form a9\ncol part_pos form 999\ncol interval form a10\ncol tablespace_name form\
    \ a12\ncol high_value form a30\n--\nselect table_name, partition_name, partition_position\
    \ part_pos\n       ,interval, tablespace_name, high_value\nfrom user_tab_partitions\n\
    where table_name = 'F_SALES'\norder by table_name, partition_position;\n```\n\n\
    Here is some sample output (the column headings have been shortened, and the HIGH_VALUE\
    \ column has been cut short so that the output fits on the page):\n\n```\nTABLE_NAME\
    \ PARTITION PART_POS INTERVAL   TABLESPACE_N HIGH_VALUE\n---------- ---------\
    \ -------- ---------- ------------ ------------------------------\nF_SALES    P1              \
    \ 1 NO         P1_TBSP      TO_DATE(' 2013-01-01 00:00:00'\n```\n\nNext, insert\
    \ data above the high value for the highest partition:\n\n```\nSQL> insert into\
    \ f_sales values(1, sysdate+1000);\n```\n\nHere is what the output from selecting\
    \ from USER_TAB_PARTITIONS now shows:\n\n```\nTABLE_NAME PARTITION PART_POS INTERVAL  \
    \ TABLESPACE_N HIGH_VALUE\n---------- --------- -------- ---------- ------------\
    \ ------------------------------\nF_SALES    P1               1 NO         P1_TBSP      TO_DATE('\
    \ 2013-01-01 00:00:00'\nF_SALES    SYS_P3344        2 YES        P1_TBSP      TO_DATE('\
    \ 2016-01-01 00:00:00'\n```\n\nA partition was automatically created with a high\
    \ value of 2016-01-01\\. If you don’t like the name that Oracle gives the partition,\
    \ you can rename it:\n\n```\nSQL> alter table f_sales rename partition sys_p3344\
    \ to p2;\n```\n\nNote what happens when a value is inserted that falls into a\
    \ year interval between the two partitions:\n\n```\nSQL> insert into f_sales values(1,\
    \ sysdate+500);\n```\n\nQuerying the USER_TAB_PARTITIONS view shows that another\
    \ partition has been created because the value inserted falls into a year interval\
    \ that isn’t included in the existing partitions:\n\n```\nTABLE_NAME PARTITION\
    \ PART_POS INTERVAL   TABLESPACE_N HIGH_VALUE\n---------- --------- -------- ----------\
    \ ------------ ------------------------------\nF_SALES    P1               1 NO        \
    \ P1_TBSP      TO_DATE(' 2013-01-01 00:00:00'\nF_SALES    SYS_P3345        2 YES        P3_TBSP      TO_DATE('\
    \ 2015-01-01 00:00:00'\nF_SALES    SYS_P3344        3 YES        P1_TBSP      TO_DATE('\
    \ 2016-01-01 00:00:00'\n```\n\n![image](Images/sq.jpg) **Note**   If there is\
    \ more than one INTERVAL partition with a value of NO, then all but the last one\
    \ can be dropped. In other words, if there is only one partition with an INTERVAL\
    \ value of NO, then the partition cannot be dropped. For example, attempting to\
    \ drop partition P1 from the table in the prior example generates an ORA-14758\
    \ error.\n\nAdding Weekly Partitions, Based on Date\n\nYou can also have Oracle\
    \ add partitions by other increments of time, such as a week; for example,\n\n\
    ```\ncreate table f_sales(\n sales_amt  number\n,d_date_dtt date)\npartition by\
    \ range (d_date_dtt)\ninterval(numtodsinterval(7,'day'))\nstore in (p1_tbsp, p2_tbsp,\
    \ p3_tbsp)\n(partition p1 values less than (to_date('01-01-2013', 'dd-mm-yyyy'))\n\
    tablespace p1_tbsp);\n```\n\nAs data are inserted into future weeks, new weekly\
    \ partitions will be created automatically; for example,\n\n```\nSQL> insert into\
    \ f_sales values(100, sysdate+7);\nSQL> insert into f_sales values(200, sysdate+14);\n\
    ```\n\nRunning this query verifies that partitions have automatically been added:\n\
    \n```\nselect table_name, partition_name, partition_position part_pos\n      \
    \ ,interval, tablespace_name, high_value\nfrom user_tab_partitions\nwhere table_name\
    \ = 'F_SALES'\norder by table_name, partition_position;\n```\n\nHere is some sample\
    \ output:\n\n```\nTABLE_NAME PARTITION PART_POS INTERVAL   TABLESPACE_N HIGH_VALUE\n\
    ---------- --------- -------- ---------- ------------ ------------------------------\n\
    F_SALES    P1               1 NO         P1_TBSP      TO_DATE(' 2013-01-01 00:00:00'\n\
    F_SALES    SYS_P3725        2 YES        P3_TBSP      TO_DATE(' 2013-01-15 00:00:00'\n\
    F_SALES    SYS_P3726        3 YES        P1_TBSP      TO_DATE(' 2013-01-22 00:00:00'\n\
    ```\n\nIn this way, Oracle automatically manages the addition of weekly partitions\
    \ to the table.\n\nAdding Daily Partitions, Based on Number\n\nRecall from the\
    \ section “Partitioning by Range,” earlier in this chapter, how a number field\
    \ (D_DATE_ID) was used as a range-based partition key. Suppose you want to create\
    \ daily interval partitions in a table with such a partitioning strategy automatically.\
    \ In this situation, you need to specify an INTERVAL of one. Here is an example:\n\
    \n```\ncreate table f_sales(\n sales_amt number\n,d_date_id number)\npartition\
    \ by range (d_date_id)\ninterval(1)\n(partition p1 values less than (20120101));\n\
    ```\n\nAs long as your application can correctly use a number that represents\
    \ a valid date, there shouldn’t be any issues. As each new day’s data are inserted,\
    \ a new daily partition is created. For example, suppose these data are inserted:\n\
    \n```\nSQL> insert into f_sales values(100,20130130);\nSQL> insert into f_sales\
    \ values(50,20130131);\n```\n\nTwo corresponding partitions are automatically\
    \ created. This can be verified via this query:\n\n```\nselect table_name, partition_name,\
    \ partition_position part_pos\n       ,interval, tablespace_name, high_value\n\
    from user_tab_partitions\nwhere table_name = 'F_SALES'\norder by table_name, partition_position;\n\
    ```\n\nHere is the corresponding output:\n\n```\nTABLE_NAME PARTITION PART_POS\
    \ INTERVAL   TABLESPACE_N HIGH_VALUE\n---------- --------- -------- ----------\
    \ ------------ --------------------\nF_SALES    P1               1 NO        \
    \ USERS        20130101\nF_SALES    SYS_P3383        2 YES        USERS        20130131\n\
    F_SALES    SYS_P3384        3 YES        USERS        20130132\n```\n\nBe aware\
    \ that the HIGH_VALUE column can contain numbers that map to invalid dates. This\
    \ is to be expected. For instance, when creating a partition with a D_DATE_ID\
    \ of 20130131, Oracle will calculate the upper boundary to be the value 20130132\\\
    . The high boundary value is defined as less than (but not equal to) any values\
    \ inserted into the partition. The only reason I mention this here is because\
    \ if you attempt to perform date arithmetic on the value in HIGH_VALUE, you will\
    \ need to account for potential numbers that map to invalid dates. In this specific\
    \ example, you would have to subtract one from the value in HIGH_VALUE to obtain\
    \ a valid date.\n\nAs previously shown in this section, a daily interval partitioning\
    \ scheme based on a number works fine. However, such a scheme doesn’t work as\
    \ well if you want to create interval partitions by month or year. This is because\
    \ there is no number that consistently represents a month or year. If you need\
    \ date-based interval functionality, then use a date and not a number.\n\nPartitioning\
    \ to Match a Parent Table\n\nIf you’re using Oracle Database 11g or higher, you\
    \ can use the PARTITION BY REFERENCE clause to specify that a child table should\
    \ be partitioned in the same way as its parent. This allows a child table to inherit\
    \ the partitioning strategy of its parent table. Any parent table partition maintenance\
    \ operations are automatically applied to the child record tables.\n\n![image](Images/sq.jpg) **Note**  \
    \ Before the advent of the partitioning-by-reference feature, you had to physically\
    \ duplicate and maintain the parent table column in the child table. Doing so\
    \ not only requires more disk space, but also is a source of error when maintaining\
    \ the partitions.\n\nFor example, say you  want to create a parent ORDERS table\
    \ and a child ORDER_ITEMS table that are related by primary key and foreign key\
    \ constraints on the ORDER_ID column. The parent ORDERS table will be partitioned\
    \ on the ORDER_DATE column. Even though it won’t contain the ORDER_DATE column,\
    \ you wonder whether you can partition the child ORDER_ITEMS table so that the\
    \ records are distributed the same way as in the parent ORDERS table. This example\
    \ creates a parent table with a primary key constraint on ORDER_ID and range partitions\
    \ on ORDER_DATE:\n\n```\ncreate table orders(\n order_id    number\n,order_date  date\n\
    ,constraint order_pk primary key(order_id))\npartition by range(order_date)\n\
    (partition p11  values less than (to_date('01-01-2012','dd-mm-yyyy'))\n,partition\
    \ p12  values less than (to_date('01-01-2013','dd-mm-yyyy'))\n,partition pmax\
    \ values less than (maxvalue));\n```\n\nNext, you create the child ORDER_ITEMS\
    \ table. It’s partitioned by naming the foreign key constraint as the referenced\
    \ object:\n\n```\ncreate table order_items(\n line_id  number\n,order_id number\
    \ not null\n,sku      number\n,quantity number\n,constraint order_items_pk  primary\
    \ key(line_id, order_id)\n,constraint order_items_fk1 foreign key (order_id) references\
    \ orders)\npartition by reference (order_items_fk1);\n```\n\nNote that the foreign\
    \ key column ORDER_ID must be defined as NOT NULL. The foreign key column must\
    \ be enabled and enforced.\n\nYou can inspect the partition key columns via the\
    \ following query:\n\n```\nselect name, column_name, column_position\nfrom user_part_key_columns\n\
    where name in ('ORDERS','ORDER_ITEMS');\n```\n\nHere is the output for this example:\n\
    \n```\nNAME                 COLUMN_NAME          COLUMN_POSITION\n--------------------\
    \ -------------------- ---------------\nORDERS               ORDER_DATE                        \
    \ 1\nORDER_ITEMS          ORDER_ID                           1\n```\n\nNote that\
    \ the child table is partitioned by the ORDER_ID column. This ensures that the\
    \ child record is partitioned in the same manner as the parent record (because\
    \ the child record is related to the parent record via the ORDER_ID key column).\n\
    \nWhen you create the referenced-partition child table, if you don’t explicitly\
    \ name the child table partitions, by default, Oracle creates partitions for the\
    \ child table with the same partition names as its parent table. This example\
    \ explicitly names the child table referenced partitions:\n\n```\ncreate table\
    \ order_items(\n line_id  number\n,order_id number not null\n,sku      number\n\
    ,quantity number\n,constraint order_items_pk  primary key(line_id, order_id)\n\
    ,constraint order_items_fk1 foreign key (order_id) references orders)\npartition\
    \ by reference (order_items_fk1)\n(partition c11\n,partition c12\n,partition cmax);\n\
    ```\n\nStarting with Oracle Database 12c, you can also specify an interval-reference\
    \ partitioning strategy. This allows for partitions to be automatically created\
    \ for both the parent and child tables. Here is what the table creation scripts\
    \ look like for this feature:\n\n```\ncreate table orders(\n order_id    number\n\
    ,order_date  date\n,constraint order_pk primary key(order_id))\npartition by range(order_date)\n\
    interval(numtoyminterval(1, 'YEAR'))\n(partition p1 values less than (to_date('01-01-2013','dd-mm-yyyy')));\n\
    --\ncreate table order_items(\n line_id  number\n,order_id number not null\n,sku      number\n\
    ,quantity number\n,constraint order_items_pk  primary key(line_id, order_id)\n\
    ,constraint order_items_fk1 foreign key (order_id) references orders)\npartition\
    \ by reference (order_items_fk1);\n```\n\nInserting some sample data will demonstrate\
    \ how the partitions are automatically created:\n\n```\nSQL> insert into orders\
    \ values(1,sysdate);\nSQL> insert into order_items values(10,1,123,1);\nSQL> insert\
    \ into orders values(2,sysdate+400);\nSQL> insert into order_items values(20,2,456,1);\n\
    ```\n\nNow, run this query to verify the partition details:\n\n```\nselect table_name,\
    \ partition_name, partition_position part_pos\n       ,interval, tablespace_name,\
    \ high_value\nfrom user_tab_partitions\nwhere table_name IN ('ORDERS','ORDER_ITEMS')\n\
    order by table_name, partition_position;\n```\n\nHere is a snippet of the output:\n\
    \n```\nTABLE_NAME  PARTITION PART_POS INTERVAL   TABLESPACE_N HIGH_VALUE\n-----------\
    \ --------- -------- ---------- ------------ ------------------------------\n\
    ORDERS      P1               1 NO         USERS        TO_DATE(' 2013-01-01 00:00:00'\n\
    ORDERS      SYS_P3761        2 YES        USERS        TO_DATE(' 2014-01-01 00:00:00'\n\
    ORDERS      SYS_P3762        3 YES        USERS        TO_DATE(' 2015-01-01 00:00:00'\n\
    ORDER_ITEMS P1               1 NO         USERS\nORDER_ITEMS SYS_P3761        2\
    \ YES        USERS\nORDER_ITEMS SYS_P3762        3 YES        USERS\n```\n\nPartitioning\
    \ on a Virtual Column\n\nIf you’re using Oracle Database 11g or higher, you can\
    \ partition on a virtual column (see [Chapter 7](#9781430257288_Ch07.xhtml) for\
    \ a discussion of virtual columns). Here is a sample script that creates a table\
    \ named EMP, with the virtual column COMMISSION and a corresponding range partition\
    \ for the virtual column:\n\n```\ncreate table emp (\n emp_id   number\n,salary  \
    \ number\n,comm_pct number\n,commission generated always as (salary*comm_pct)\n\
    )\npartition by range(commission)\n(partition p1 values less than (1000)\n,partition\
    \ p2 values less than (2000)\n,partition p3 values less than (maxvalue));\n```\n\
    \nThis strategy allows you to partition on a column that isn’t stored in the table\
    \ but that is computed dynamically. Virtual column partitioning is appropriate\
    \ when there is a business requirement to partition on a column that isn’t physically\
    \ stored in a table. The expression behind a virtual column can be a complex calculation,\
    \ return a subset of a column string, combine column values, and so on. The possibilities\
    \ are endless.\n\nFor example, you may have a ten-character-string column in which\
    \ the first two digits represent a region, and last eight digits represent a specific\
    \ location (this is a bad design, but it happens). In this case, it may make sense,\
    \ from a business perspective, to partition on the first two digits of this column\
    \ (by region).\n\nGiving an Application Control over Partitioning\n\nYou may have\
    \ a rare scenario, in which you want the application inserting records into a\
    \ table to explicitly control which partition it inserts data into. If you’re\
    \ using Oracle Database 11g or higher, you can use the PARTITION BY SYSTEM clause\
    \ to allow an INSERT statement to specify into which partition to insert data.\
    \ This next example creates a system-partitioned table with three partitions:\n\
    \n```\ncreate table apps\n(app_id number\n,app_amnt number)\npartition by system\n\
    (partition p1\n,partition p2\n,partition p3);\n```\n\nWhen inserting data into\
    \ this table, you must specify a partition. The next line of code inserts a record\
    \ into partition P1:\n\n```\nSQL> insert into apps partition(p1) values(1,100);\n\
    ```\n\nWhen you’re updating or deleting, if you don’t specify a partition, Oracle\
    \ scans all partitions of a system-partitioned table to find the relevant rows.\
    \ Therefore, you should specify a partition when updating and deleting to avoid\
    \ poor performance.\n\nA system-partitioned table is helpful in the unusual situation\
    \ of needing to explicitly control which partition a record is inserted into.\
    \ This allows your application code to manage the distribution of records among\
    \ the partitions. I recommend that you use this feature only when you can’t use\
    \ one of Oracle’s other partitioning mechanisms to meet your business requirement.\n\
    \nMaintaining Partitions\n\nWhen using partitions, you’ll eventually have to perform\
    \ some sort of maintenance operation. For instance, you may be required to move,\
    \ exchange, rename, split, merge, or drop partitions. The various partition maintenance\
    \ tasks are described in this section.\n\nViewing Partition Metadata\n\nWhen you’re\
    \ maintaining partitions, it’s helpful to view metadata information about the\
    \ partitioned objects. Oracle provides many data dictionary views that contain\
    \ information about partitioned tables and indexes. [Table 12-3](#9781430257288_Ch12.xhtml#Tab3)\
    \ outlines these views.\n\nKeep in mind that the DBA-level views contain data\
    \ for all partitioned objects in the database, the ALL level shows partitioning\
    \ information to which the currently connect user has access, and the USER-level\
    \ offers information about the partitioned objects owned by the currently connected\
    \ user.\n\n[Table 12-3.](#9781430257288_Ch12.xhtml#_Tab3) Data Dictionary Views\
    \ Containing Partitioning Information\n\n| View | Information Contained |\n| ---\
    \ | --- |\n| DBA/ALL/USER_PART_TABLES | Displays partitioned table information\
    \ |\n| DBA/ALL/USER_TAB_PARTITIONS | Contains information regarding individual\
    \ table partitions |\n| DBA/ALL/USER_TAB_SUBPARTITIONS | Shows subpartition-level\
    \ table information regarding storage and statistics |\n| DBA/ALL/USER_PART_KEY_COLUMNS\
    \ | Displays partition key columns |\n| DBA/ALL/USER_SUBPART_KEY_COLUMNS | Contains\
    \ subpartition key columns |\n| DBA/ALL/USER_PART_COL_STATISTICS | Shows column-level\
    \ statistics |\n| DBA/ALL/USER_SUBPART_COL_STATISTICS | Displays subpartition-level\
    \ statistics |\n| DBA/ALL/USER_PART_HISTOGRAMS | Contains histogram information\
    \ for partitions |\n| DBA/ALL/USER_SUBPART_HISTOGRAMS | Shows histogram information\
    \ for subpartitions |\n| DBA/ALL/USER_PART_INDEXES | Displays partitioned index\
    \ information |\n| DBA/ALL/USER_IND_PARTITIONS | Contains information regarding\
    \ individual index partitions |\n| DBA/ALL/USER_IND_SUBPARTITIONS | Shows subpartition-level\
    \ index information |\n| DBA/ALL/USER_SUBPARTITION_TEMPLATES | Displays subpartition\
    \ template information |\n\nTwo views you’ll use quite often are DBA_PART_TABLES\
    \ and the DBA_TAB_PARTITIONS. The DBA_PART_TABLES view contains table-level partitioning\
    \ information, such as partitioning method and default storage settings. The DBA_TAB_PARTITIONS\
    \ view provides information about the individual table partitions, such as the\
    \ partition name and storage settings for individual partitions.\n\nMoving a Partition\n\
    \nSuppose you create a list-partitioned table, as shown:\n\n```\ncreate table\
    \ f_sales\n (sales_amt  number\n ,d_date_id  number\n ,state_code varchar2(20))\n\
    partition by list (state_code)\n ( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
      ,partition reg_mid  values ('IA','KS','MI','MN','MO','NE','OH','ND')\n  ,partition\
    \ reg_rest values (default));\n```\n\nAlso for this partitioned table, you decide\
    \ to create a locally partitioned index, as follows:\n\n```\nSQL> create index\
    \ f_sales_lidx1 on f_sales(state_code) local;\n```\n\nYou decide to create as\
    \ well a nonpartitioned global index, as follows:\n\n```\nSQL> create index f_sales_gidx1\
    \ on f_sales(d_date_id) global;\n```\n\nAnd, you create a global partitioned index\
    \ column:\n\n```\ncreate index f_sales_gidx2 on f_sales(sales_amt)\nglobal partition\
    \ by range(sales_amt)\n(partition pg1 values less than (25)\n,partition pg2 values\
    \ less than (50)\n,partition pg3 values less than (maxvalue));\n```\n\nLater,\
    \ you decide that you want to move a partition to a specific tablespace. In this\
    \ scenario, you can use the ALTER TABLE. . .MOVE PARTITION statement to relocate\
    \ a table partition. This example moves the REG_WEST partition to a new tablespace:\n\
    \n```\nSQL> alter table f_sales move partition reg_west tablespace p1_tbsp;\n\
    ```\n\nMoving a partition to a different tablespace is a fairly simple operation.\
    \ Whenever you do this, however, make sure you check on the status of any indexes\
    \ associated with the table:\n\n```\nselect b.table_name, a.index_name, a.partition_name\n\
    ,a.status, b.locality\nfrom user_ind_partitions a\n    ,user_part_indexes   b\n\
    where a.index_name=b.index_name\nand table_name = 'F_SALES';\n```\n\nHere is some\
    \ sample output:\n\n```\nTABLE_NAME INDEX_NAME           PARTITION Status    LOCALI\n\
    ---------- -------------------- --------- --------- ------\nF_SALES    F_SALES_LIDX1        REG_MID  \
    \ USABLE    LOCAL\nF_SALES    F_SALES_LIDX1        REG_REST  USABLE    LOCAL\n\
    F_SALES    F_SALES_LIDX1        REG_WEST  UNUSABLE  LOCAL\nF_SALES    F_SALES_GIDX2        PG1      \
    \ UNUSABLE  GLOBAL\nF_SALES    F_SALES_GIDX2        PG2       UNUSABLE  GLOBAL\n\
    F_SALES    F_SALES_GIDX2        PG3       UNUSABLE  GLOBAL\n```\n\nYou must rebuild\
    \ any unusable indexes. As opposed to rebuilding the indexes manually, when moving\
    \ a partition, you can specify that the indexes associated with it be rebuilt\
    \ with the UPDATE INDEXES clause:\n\n```\nSQL> alter table f_sales move partition\
    \ reg_west tablespace p1_tbsp update indexes;\n```\n\nStarting with Oracle Database\
    \ 12c, when moving a partition, you can specify that all indexes be updated via\
    \ the ONLINE clause:\n\n```\nSQL> alter table f_sales move partition reg_west\
    \ online tablespace p1_tbsp;\n```\n\nThe prior line of code tells Oracle to maintain\
    \ all indexes during the move operation.\n\nAutomatically Moving Updated Rows\n\
    \nBy default, Oracle doesn’t let you update a row by setting the partition key\
    \ to a value outside the row’s current partition. For example, this statement\
    \ updates the partition key column (D_DATE_ID) to a value that would result in\
    \ the row’s needing to exist in a different partition:\n\n```\nSQL> update f_sales\
    \ set d_date_id = 20130901 where d_date_id = 20120201;\n```\n\nYou receive the\
    \ following error:\n\n```\nORA-14402: updating partition key column would cause\
    \ a partition change\n```\n\nIn this scenario, use the ENABLE ROW MOVEMENT clause\
    \ of the ALTER TABLE statement to allow updates to the partition key that would\
    \ change the partition in which a value belongs. For this example, the F_SALES\
    \ table is first modified to enable row movement:\n\n```\nSQL> alter table f_sales\
    \ enable row movement;\n```\n\nYou should now be able to update the partition\
    \ key to a value that moves the row to a different segment. You can verify that\
    \ row movement has been enabled by querying the ROW_MOVEMENT column of the USER_TABLES\
    \ view:\n\n```\nSQL> select row_movement from user_tables where table_name='F_SALES';\n\
    ```\n\nYou should see the value ENABLED:\n\n```\nROW_MOVE\n\nENABLED\n```\n\n\
    To disable row movement, use the DISABLE ROW MOVEMENT clause:\n\n```\nSQL> alter\
    \ table f_sales disable row movement;\n```\n\nPartitioning an Existing Table\n\
    \nYou may have a nonpartitioned table that has grown quite large and want to partition\
    \ it. There are several methods for converting a nonpartitioned table to a partitioned\
    \ table. [Table 12-4](#9781430257288_Ch12.xhtml#Tab4) lists the pros and cons\
    \ of various techniques.\n\n[Table 12-4.](#9781430257288_Ch12.xhtml#_Tab4) Methods\
    \ of Converting a Nonpartitioned Table\n\n| Conversion Method | Advantages | Disadvantages\
    \ |\n| --- | --- | --- |\n| CREATE <new_part_tab> AS SELECT * FROM <old_tab> |\
    \ Simple; can use NOLOGGING and PARALLEL options; direct path load | Requires\
    \ space for both old and new tables |\n| INSERT /*+ APPEND */ INTO <new_part_tab>\
    \ SELECT * FROM <old_tab> | Fast; simple; direct path load | Requires space for\
    \ both old and new tables |\n| Data Pump EXPDP old table; IMPDP new table (or\
    \ EXP IMP if using older version of Oracle) | Fast; less space required; takes\
    \ care of grants, privileges, and so on. Loading can be done per partition with\
    \ filtering conditions. | More complicated because you need to use a utility |\n\
    | Create partitioned <new_part_tab>; exchange partitions with <old_tab> | Potentially\
    \ less downtime | Many steps; complicated |\n| Use DBMS_REDEFINITION package |\
    \ Converts existing table inline | Many steps; complicated |\n| Create CSV file\
    \ or external table; load <new_part_tab> with SQL*Loader | Loading can be done\
    \ partition by partition. | Many steps; complicated |\n\nAs shown in [Table 12-4](#9781430257288_Ch12.xhtml#Tab4),\
    \ one of the easiest ways to partition an existing table is to create a new table—one\
    \ that is partitioned—and load it with data from the old table. Listed next are\
    \ the required steps:\n\n1.  If this is a table in an active production database,\
    \ you should schedule some downtime for the table to ensure that no active transactions\
    \ are occurring while it’s being migrated.\n2.  Create a new, partitioned table\
    \ from the old with CREATE TABLE <new table> AS SELECT * FROM <old table>.\n3.\
    \  Drop or rename the old table.\n4.  Rename the table created in step 2 to the\
    \ name of the dropped/renamed table.\n\nFor instance, let’s assume that the F_SALES\
    \ table used so far in this chapter was created as a nonpartitioned table. The\
    \ following statement creates a new table that is partitioned, taking data from\
    \ the old table, which isn’t:\n\n```\ncreate table f_sales_new\npartition by range\
    \ (d_date_id)\n(partition p2012 values less than(20130101),\n partition p2013\
    \ values less than(20140101),\n partition pmax values less than(maxvalue))\nnologging\n\
    as select * from f_sales;\n```\n\nNow, you can drop (or rename) the old, nonpartitioned\
    \ table and rename the new, partitioned table the old table’s name. Be sure you\
    \ don’t need the old table before you drop it with the PURGE option, as this permanently\
    \ drops the table:\n\n```\nSQL> drop table f_sales purge;\nSQL> rename f_sales_new\
    \ to f_sales;\n```\n\nFinally, create any required constraints, grants, indexes,\
    \ and statistics for the new table. You should now have a partitioned table that\
    \ replaces the old, nonpartitioned table.\n\nFor the last step, if the original\
    \ table contains many constraints, grants, and indexes, you may want to use Data\
    \ Pump expd to export the original table without data. Then, after the new table\
    \ is created, use Data Pump impdp to create the constraints, grants, and indexes\
    \ for the new table. Also consider generating fresh statistics for the newly created\
    \ table.\n\nAdding a Partition\n\nSometimes it’s hard to predict how many partitions\
    \ you should initially establish for a table. A typical example is a range-partitioned\
    \ table that’s created without a MAXVALUE-created partition. You make a partitioned\
    \ table that contains enough partitions for two years into the future, and then\
    \ you forget about the table. Sometime in the future, application users report\
    \ that this message is being thrown:\n\n```\nORA-14400: inserted partition key\
    \ does not map to any partition\n```\n\n![image](Images/sq.jpg) **Tip**   Consider\
    \ using interval partitioning, which enables Oracle to add range partitions automatically\
    \ when the upper bound is exceeded.\n\nRange\n\nFor a range-partitioned table,\
    \ if the table’s highest bound isn’t defined with a MAXVALUE, you can use the\
    \ ALTER TABLE. . .ADD PARTITION statement to add a partition to the high end of\
    \ the table. If you’re not sure what the current upper bound is, query the data\
    \ dictionary:\n\n```\nselect table_name, partition_name, high_value\nfrom user_tab_partitions\n\
    where table_name = UPPER('&&tab_name')\norder by table_name, partition_name;\n\
    ```\n\nThis example adds a partition to the high end of a range-partitioned table:\n\
    \n```\nalter table f_sales add\npartition p_2014 values less than (20150101) tablespace\
    \ p14_tbsp;\n```\n\nStarting with Oracle Database 12c, you can add multiple partitions\
    \ at the same time; for example,\n\n```\nalter table f_sales add\n partition p_2015\
    \ values less than (20160101) tablespace p15_tbsp\n,partition p_2016 values less\
    \ than (20170101) tablespace p16_tbsp;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If you have a range-partitioned table with the high range bounded by MAXVALUE,\
    \ you can’t add a partition. In this situation, you have to split an existing\
    \ partition (see the section “Splitting a Partition,” later in this chapter).\n\
    \nList\n\nFor a list-partitioned table, you can add a new partition only if there\
    \ isn’t a DEFAULT partition defined. The next example adds a partition to a list-partitioned\
    \ table:\n\n```\nSQL> alter table f_sales add partition reg_east values('GA');\n\
    ```\n\nStarting with Oracle Database 12c, you can add multiple partitions with\
    \ one statement:\n\n```\nSQL> alter table f_sales add partition reg_mid_east values('TN'),\n\
                                 partition reg_north values('NY');\n```\n\nHash\n\n\
    If you have a hash-partitioned table, use the ADD PARTITION clause, as follows,\
    \ to add a partition:\n\n```\nSQL> alter table f_sales add partition p3 update\
    \ indexes;\n```\n\n![image](Images/sq.jpg) **Note**   When you’re adding to a\
    \ hash-partitioned table, if you don’t specify the UPDATE INDEXES clause, any\
    \ global indexes must be rebuilt. Additionally, you must rebuild any local indexes\
    \ for the newly added partition.\n\nAfter adding a partition to a hash-partitioned\
    \ table, always check the indexes to be sure they all still have a VALID status:\n\
    \n```\nselect b.table_name, a.index_name, a.partition_name, a.status, b.locality\n\
    from user_ind_partitions a\n    ,user_part_indexes   b\nwhere a.index_name=b.index_name\n\
    and table_name = upper('&&part_table');\n```\n\nAlso check the status of any global\
    \ nonpartitioned indexes:\n\n```\nselect index_name, status\nfrom user_indexes\n\
    where table_name = upper('&&part_table');\n```\n\nI highly recommend that you\
    \ always test a maintenance operation in a nonproduction database to determine\
    \ any unforeseen side effects.\n\nExchanging a Partition with an Existing Table\n\
    \nExchanging a partition is a common technique for transparently loading new data\
    \ into large partitioned tables. The technique involves taking a stand-alone table\
    \ and swapping it with an existing partition (in an already partitioned table),\
    \ allowing you to add fully loaded new partitions (and associated indexes) without\
    \ affecting the availability or performance of operations against the other partitions\
    \ in the table.\n\nThis simple example illustrates the process. Say you have a\
    \ range-partitioned table, created as follows:\n\n```\ncreate table f_sales\n\
    (sales_amt number\n,d_date_id number)\npartition by range (d_date_id)\n(partition\
    \ p_2011 values less than (20120101),\n partition p_2012 values less than (20130101),\n\
     partition p_2013 values less than (20140101));\n```\n\nYou also create a local\
    \ bitmap index on the D_DATE_ID column:\n\n```\ncreate bitmap index d_date_id_fk1\
    \ on\nf_sales(d_date_id) local;\n```\n\nNow, add a new partition to the table\
    \ to store new data:\n\n```\nalter table f_sales add partition p_2014\nvalues\
    \ less than(20150101);\n```\n\nNext, create a staging table, and insert data that\
    \ fall within the range of values for the newly added partition:\n\n```\ncreate\
    \ table workpart(\n  sales_amt number\n ,d_date_id number);\n--\ninsert into workpart\
    \ values(100,20140201);\ninsert into workpart values(120,20140507);\n```\n\nThen,\
    \ create a bitmap index on the WORKPART table that matches the structure of the\
    \ bitmap index on F_SALES:\n\n```\ncreate bitmap index d_date_id_fk2\non workpart(d_date_id);\n\
    ```\n\nNow, exchange the WORKPART table with the P_2014 partition:\n\n```\nalter\
    \ table f_sales\nexchange partition p_2014\nwith table workpart\nincluding indexes\
    \ without validation;\n```\n\nA quick query of the F_SALES table verifies that\
    \ the partition was exchanged successfully:\n\n```\nSQL> select * from f_sales\
    \ partition(p_2014);\n```\n\nHere is the output:\n\n```\nSALES_AMT  D_DATE_ID\n\
    ---------- ----------\n       100   20140201\n       120   20140507\n```\n\nThis\
    \ query displays that the indexes are all still usable:\n\n```\nSQL> select index_name,\
    \ partition_name, status from user_ind_partitions;\n```\n\nYou can also verify\
    \ that a local index segment was created for the new partition:\n\n```\nselect\
    \ segment_name, segment_type, partition_name\nfrom user_segments\nwhere segment_name\
    \ IN('F_SALES','D_DATE_ID_FK1');\n```\n\nThe ability to exchange partitions is\
    \ an extremely powerful feature. It allows you to take a partition in an existing\
    \ table and make it a stand-alone table, while making a stand-alone table (which\
    \ can be fully populated before the partition exchange operation) part of a partitioned\
    \ table. When you exchange a partition, Oracle simple updates the entries in the\
    \ data dictionary to perform the exchange.\n\nWhen you exchange a partition with\
    \ the W ITHOUT VALIDATION clause, you instruct Oracle not to validate that the\
    \ rows in the incoming partition (or subpartition) are valid entries for the defined\
    \ range. This has the advantage of making the exchange a very quick operation\
    \ because Oracle is only updating pointers in the data dictionary to perform the\
    \ exchange operation. You need to make sure your data are accurate if you use\
    \ WITHOUT VALIDATION.\n\nIf a primary key is defined for the partitioned table,\
    \ the table being exchanged must have the same primary key structure defined.\
    \ If there is a primary key, the WITHOUT VALIDATION clause doesn’t stop Oracle\
    \ from enforcing unique constraints.\n\nRenaming a Partition\n\nSometimes, you\
    \ may be required to rename a table partition or index partition. For example,\
    \ you may want to rename a partition before you drop it (to ensure that it’s not\
    \ being used). Also, you may want to rename objects so that they conform to standards.\
    \ In these scenarios, use the ALTER TABLE or ALTER INDEX statement as appropriate.\n\
    \nThis example uses the ALTER TABLE statement to rename a table partition:\n\n\
    ```\nSQL> alter table f_sales rename partition p_2012 to part_2012;\n```\n\nThe\
    \ next line of code uses the ALTER INDEX statement to rename an index partition:\n\
    \n```\nSQL> alter index d_date_id_fk1 rename partition p_2012 to part_2012;\n\
    ```\n\nYou can query the data dictionary to verify the information regarding renamed\
    \ objects. This query shows partitioned table names:\n\n```\nselect table_name,\
    \ partition_name, tablespace_name\nfrom user_tab_partitions;\n```\n\nSimilarly,\
    \ this query displays partitioned index information:\n\n```\nselect index_name,\
    \ partition_name, status\n,high_value, tablespace_name\nfrom user_ind_partitions;\n\
    ```\n\nSplitting a Partition\n\nSuppose you’ve identified a partition that has\
    \ too many rows, and you want to split it into two partitions. Use the ALTER TABLE.\
    \ . .SPLIT PARTITION statement to split an existing partition. The following example\
    \ splits a partition in a range-partitioned table:\n\n```\nalter table f_sales\
    \ split partition p_2012 at (20120601)\ninto (partition p_2012_a, partition p_2012)\n\
    update indexes;\n```\n\nIf you don’t specify UPDATE INDEXES, you need to rebuild\
    \ any local indexes associated with the split partition as well as any global\
    \ indexes. You can verify the status of partitioned indexes with this SQL:\n\n\
    ```\nSQL> select index_name, partition_name, status from user_ind_partitions;\n\
    ```\n\nThe next example splits a list partition. First, here is the CREATE TABLE\
    \ statement, which shows you how the list partitions were originally defined:\n\
    \n```\ncreate table f_sales\n (sales_amt  number\n ,d_date_id  number\n ,state_code\
    \ varchar2(3))\npartition by list (state_code)\n ( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
      ,partition reg_mid  values ('IA','KS','MI','MN','MO','NE','OH','ND')\n  ,partition\
    \ reg_rest values (default));\n```\n\nNext, the REG_MID partition is split:\n\n\
    ```\nalter table f_sales split partition reg_mid values ('IA','KS','MI','MN')\
    \ into\n(partition reg_mid_a,\n partition reg_mid_b)\nupdate indexes;\n```\n\n\
    The REG_MID_A partition now contains the values IA, KS, MI, and MN, and REG_MID_B\
    \ is assigned the remaining values, MO, NE, OH, and ND.\n\nThe split partition\
    \ operation allows you to create two new partitions from a single partition. Each\
    \ new partition has its own segment, physical attributes, and extents. The segment\
    \ associated with the original partition is deleted.\n\nMerging Partitions\n\n\
    When you create a partition, sometimes it’s hard to predict how many rows the\
    \ partition will eventually contain. You may have two partitions that don’t contain\
    \ enough data to warrant separate partitions. In such a situation, use the ALTER\
    \ TABLE. . .MERGE PARTITIONS statement to combine partitions.\n\nThe following\
    \ example merges two partitions into one existing partition:\n\n```\nSQL> alter\
    \ table f_sales merge partitions p_2011, p_2012 into partition p_2012;\n```\n\n\
    In this example the partitions are organized by a range of dates. The partition\
    \ into which you’re merging is defined as accepting rows with the highest range\
    \ of the two merged partitions. Any local indexes are also merged into the new,\
    \ single partition.\n\nYou can verify the status of the partitioned indexes by\
    \ querying the data dictionary:\n\n```\nselect index_name, partition_name, tablespace_name,\
    \ high_value,status\nfrom user_ind_partitions\norder by 1,2;\n```\n\nWhen you\
    \ merge partitions, you can use the UPDATE INDEXES clause of the ALTER TABLE statement\
    \ to instruct Oracle to rebuild any associated indexes automatically:\n\n```\n\
    alter table f_sales merge partitions p_2011, p_2012 into partition p_2012\ntablespace\
    \ p2_tbsp\nupdate indexes;\n```\n\nKeep in mind that the merge operation takes\
    \ longer when you use the UPDATE INDEXES clause. If you want to minimize the length\
    \ of the merge operation, don’t use this clause. Instead, manually rebuild local\
    \ indexes associated with a merged partition:\n\n```\nSQL> alter table f_sales\
    \ modify partition p_2012 rebuild unusable local indexes;\n```\n\nYou can rebuild\
    \ each partition of a global index with the ALTER INDEX. . .REBUILD PARTITION\
    \ statement:\n\n```\nSQL> alter index f_glo_idx1 rebuild partition sys_p680;\n\
    SQL> alter index f_glo_idx1 rebuild partition sys_p681;\nSQL> alter index f_glo_idx1\
    \ rebuild partition sys_p682;\n```\n\nYou can merge two or more partitions with\
    \ the ALTER TABLE. . .MERGE PARTITIONS statement. The name of the partition into\
    \ which you’re merging can be the name of one of the partitions you’re merging\
    \ or a completely new name.\n\nBefore you merge two (or more) partitions, make\
    \ certain the partition into which you’re merging has enough space in its tablespace\
    \ to accommodate all the merged rows. If there isn’t enough space, you receive\
    \ an error that the tablespace can’t extend to the necessary size.\n\nDropping\
    \ a Partition\n\nYou occasionally need to drop a partition. A common scenario\
    \ is that you have old data that aren’t used anymore, meaning that the partition\
    \ can be dropped.\n\nFirst, identify the name of the partition you want to drop.\
    \ Run the following query to list partitions for a particular table for the currently\
    \ connected user:\n\n```\nselect segment_name, segment_type, partition_name\n\
    from user_segments\nwhere segment_name = upper('&table_name');\n```\n\nNext, use\
    \ the ALTER TABLE. . .DROP PARTITION statement to remove a partition from a table.\
    \ This example drops the P_2012 partition from the F_SALES table:\n\n```\nSQL>\
    \ alter table f_sales drop partition p_2012;\n```\n\nWhen dropping a partition,\
    \ you will need to rebuild any global indexes. This can be done within the same\
    \ DDL statement, as the following example shows:\n\n```\nSQL> alter table f_sales\
    \ drop partition p_2012 update global indexes;\n```\n\nIf you want to drop a subpartition,\
    \ use the DROP SUBPARTITION clause:\n\n```\nSQL> alter table f_sales drop subpartition\
    \ p2_south;\n```\n\nYou can query USER_TAB_SUBPARTITIONS to verify that the subpartition\
    \ has been dropped.\n\n![image](Images/sq.jpg) **Note**   Oracle doesn’t let you\
    \ drop all subpartitions of a composite-partitioned table. There must be at least\
    \ one subpartition per partition.\n\nWhen you drop a partition, there is no undrop\
    \ operation. Therefore, before you do this, be sure you’re in the correct environment\
    \ and really do need to drop the partition. If you need to preserve the data in\
    \ a partition to be dropped, merge the partition with another partition instead\
    \ of dropping it.\n\nYou can’t drop a partition from a hash-partitioned table.\
    \ For hash-partitioned tables, you must coalesce partitions to remove one. And,\
    \ you can’t explicitly drop a partition from a reference-partitioned table. When\
    \ a parent table partition is dropped, it’s also dropped from corresponding child\
    \ reference-partitioned tables.\n\nGenerating Statistics for a Partition\n\nAfter\
    \ you load a large amount of data into a partition, you should generate statistics\
    \ to reflect the newly inserted data. Use the EXECUTE statement to run the DBMS_STATS\
    \ package in order to generate statistics for a particular partition. In this\
    \ example the owner is STAR, the table is F_SALES, and the partition being analyzed\
    \ is P_2012:\n\n```\nexec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',-\n\
    tabname=>'F_SALES',-\npartname=>'P_2012');\n```\n\nIf you’re working with a large\
    \ partition, you probably want to specify the percentage sampling size and degree\
    \ of parallelism and also generate statistics for any indexes:\n\n```\nexec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',-\n\
    tabname=>'F_SALES',-\npartname=>'P_2012',-\nestimate_percent=>dbms_stats.auto_sample_size,-\n\
    degree=>dbms_stats.auto_degree,-\ncascade=>true);\n```\n\nFor a partitioned table,\
    \ you can generate statistics on either a single partition or the entire table.\
    \ I recommend that you generate statistics whenever a significant amount of data\
    \ change in the partition. You need to understand your tables and data well enough\
    \ to determine whether generating new statistics is required.\n\nAlso, starting\
    \ with Oracle Database 11g, you can instruct Oracle to scan only newly added partitions\
    \ when generating global statistics. This feature is enabled via the DBMS_STATS\
    \ package:\n\n```\nSQL> exec DBMS_STATS.SET_TABLE_PREFS(user,'F_SALES','INCREMENTAL','TRUE');\n\
    ```\n\nYou can verify the table preferences for the table as follows:\n\n```\n\
    SQL> select dbms_stats.get_prefs('INCREMENTAL', tabname=>'F_SALES') from dual;\n\
    ```\n\nThe incremental global statistics gathering must be used in conjunction\
    \ with DBMS_STATS.AUTO_SAMPLE_SIZE. This can greatly reduce the time and resources\
    \ required to gather incremental statistics for partitions newly added to large\
    \ tables.\n\nRemoving Rows from a Partition\n\nYou can use several techniques\
    \ to remove rows from a partition. If the data in the particular partition are\
    \ no longer required, consider dropping the partition. If you want to remove the\
    \ data and leave the partition intact, then you can either truncate or delete\
    \ from it. Truncating a partition quickly and permanently removes the data. If\
    \ you need the option of rolling back the removal of records, then you should\
    \ delete (instead of truncate). Both truncating and deleting are described next.\n\
    \nFirst, identify the name of the partition from which you want to remove records:\n\
    \n```\nselect segment_name, segment_type, partition_name\nfrom user_segments\n\
    where partition_name is not null;\n```\n\nUse the ALTER TABLE. . .TRUNCATE PARTITION\
    \ statement to remove all records from a partition. This example truncates a partition\
    \ from the F_SALES table:\n\n```\nSQL> alter table f_sales truncate partition\
    \ p_2013;\n```\n\nThe prior command removes data only from the specified partition\
    \ and not the entire table. Also keep in mind that truncating a partition will\
    \ invalidate any global indexes. You can update the global indexes while you issue\
    \ a TRUNCATE as follows:\n\n```\nSQL> alter table f_sales truncate partition p_2013\
    \ update global indexes;\n```\n\nTruncating a partition is an efficient way to\
    \ remove large amounts of data. When you truncate a partition, however, there\
    \ is no rollback mechanism. The truncate operation permanently deletes the data\
    \ from the partition.\n\nIf you need the option of rolling back a transaction,\
    \ use the DELETE statement:\n\n```\nSQL> delete from f_sales partition(p_2013);\n\
    ```\n\nThe downside to this approach is that if you have millions of records,\
    \ the DELETE operation can take a long time to run. Also, for a large number of\
    \ records, DELETE generates a great deal of rollback information. This can cause\
    \ performance issues for other SQL statements contending for resources.\n\nManipulating\
    \ Data Within a Partition\n\nIf you need to select or manipulate data within one\
    \ partition, specify the partition name as part of the SQL statement. For instance,\
    \ you can select the rows from a specific partition, as shown:\n\n```\nSQL> select\
    \ * from f_sales partition (p_2013);\n```\n\nIf you want to select from two (or\
    \ more) partitions, then use the UNION clause:\n\n```\nselect * from f_sales partition\
    \ (p_2013)\nunion\nselect * from f_sales partition (p_2014);\n```\n\nIf you’re\
    \ a developer, and you don’t have access to the data dictionary to view which\
    \ partitions are available, you can use the SELECT. . .PARTITION FOR <partition_key_value>\
    \ syntax (available in Oracle Database 11g and higher). With this new syntax,\
    \ you provide a partition key value, and Oracle determines what partition the\
    \ key value belongs in and returns the rows from that partition; for example,\n\
    \n```\nSQL> select * from f_sales partition for (20130202);\n```\n\nYou can also\
    \ update and delete partition rows. This example updates a column in a partition:\n\
    \n```\nSQL> update f_sales partition(p_2013) set sales_amt=200;\n```\n\nYou can\
    \ use the PARTITION FOR <partition_key_value> syntax for update, delete, and truncate\
    \ operations; for example,\n\n```\nSQL> update f_sales partition for (20130202)\
    \ set sales_amt=200;\n```\n\n![image](Images/sq.jpg) **Note**   See the previous\
    \ section, “Removing Rows from a Partition,” for examples of deleting and truncating\
    \ a partition.\n\nPartitioning Indexes\n\nIn today’s large database environments,\
    \ indexes can also grow to unwieldy sizes. Partitioning indexes provides the same\
    \ benefits as partitioning tables: improved performance, scalability, and maintainability.\n\
    \nYou can create an index that uses the partitioning strategy of its table (local),\
    \ or you can create an index that is partitioned differently from its table (global).\
    \ Both of these techniques are described in the following sections.\n\nPartitioning\
    \ an Index to Follow Its Table\n\nWhen you create an index on a partitioned table,\
    \ you have the option of making it a LOCAL index type. A local partitioned index\
    \ is partitioned in the same manner as the partitioned table. Each table partition\
    \ has a corresponding index that contains ROWID values and index-key values for\
    \ just that table partition. In other words, the ROWID values in a local partitioned\
    \ index only point to rows in the corresponding table partition.\n\nThe following\
    \ example illustrates the concept of a locally partitioned index. First, create\
    \ a table that has only two partitions:\n\n```\ncreate table f_sales (\n sales_id\
    \ number\n,sales_amt number\n,d_date_id number)\ntablespace p1_tbsp\npartition\
    \ by range(d_date_id)(\n partition y12 values less than (20130101)\n   tablespace\
    \ p1_tbsp\n,partition y13 values less than (20140101)\n    tablespace p2_tbsp);\n\
    ```\n\nAnd, say five records are inserted into the table, with three records inserted\
    \ into partition Y12 and two records inserted into partition Y13:\n\n```\nSQL>\
    \ insert into f_sales values(1,20,20120322);\nSQL> insert into f_sales values(2,33,20120507);\n\
    SQL> insert into f_sales values(3,72,20120101);\nSQL> insert into f_sales values(4,12,20130322);\n\
    SQL> insert into f_sales values(5,98,20130507);\n```\n\nNext, use the LOCAL clause\
    \ of the CREATE INDEX statement to create a local index on the partitioned table.\
    \ This example creates a local index on the D_DATE_ID column of the F_SALES table:\n\
    \n```\nSQL> create index f_sales_fk1 on f_sales(d_date_id) local;\n```\n\nRun\
    \ the following query to view information about partitioned indexes:\n\n```\n\
    select index_name, table_name, partitioning_type\nfrom user_part_indexes\nwhere\
    \ table_name = 'F_SALES';\n```\n\nHere is some sample output:\n\n```\nINDEX_NAME                    \
    \ TABLE_NAME PARTITION\n------------------------------ ---------- ---------\n\
    F_SALES_FK1                    F_SALES    RANGE\n```\n\nNow, query the USER_IND_PARTITIONS\
    \ table to view information about the locally partitioned index:\n\n```\nselect\
    \ index_name, partition_name, tablespace_name\nfrom user_ind_partitions\nwhere\
    \ index_name = 'F_SALES_FK1';\n```\n\nNote that an index partition has been created\
    \ for each partition of the table and that the index is created in the same tablespace\
    \ as the table partition:\n\n```\nINDEX_NAME           PARTITION_NAME       TABLESPACE_NAME\n\
    -------------------- -------------------- ---------------\nF_SALES_FK1          Y12                  P1_TBSP\n\
    F_SALES_FK1          Y13                  P2_TBSP\n```\n\n[Figure 12-4](#9781430257288_Ch12.xhtml#Fig4)\
    \ conceptually shows how a locally managed index is constructed.\n\n![9781430257288_Fig12-04.jpg](Images/9781430257288_Fig12-04.jpg)\n\
    \n[Figure 12-4](#9781430257288_Ch12.xhtml#_Fig4). Architecture of a locally partitioned\
    \ index\n\nIf you want the local index partitions to be created in a tablespace\
    \ (or tablespaces) separate from that of the table partitions, specify the tablespace(s)\
    \ when creating the index:\n\n```\ncreate index f_sales_fk1 on f_sales(d_date_id)\
    \ local\n(partition y12 tablespace users\n,partition y13 tablespace users);\n\
    ```\n\nQuerying USER_IND_PARTITIONS now shows that the index partitions have been\
    \ created in tablespaces separate from the table partitions’ tablespace:\n\n```\n\
    INDEX_NAME           PARTITION_NAME       TABLESPACE_NAME\n--------------------\
    \ -------------------- ---------------\nF_SALES_FK1          Y12                  USERS\n\
    F_SALES_FK1          Y13                  USERS\n```\n\nIf you specify the partition\
    \ information when building a local partitioned index, the number of partitions\
    \ must match the number of partitions in the table on which the partitioned index\
    \ is built.\n\nOracle automatically keeps local index partitions in sync with\
    \ the table partitions. You can’t explicitly add a partition to or drop a partition\
    \ from a local index. When you add or drop a table partition, Oracle automatically\
    \ performs the corresponding work for the local index. Oracle manages the local\
    \ index partitions, regardless of how the local indexes have been assigned to\
    \ tablespaces.\n\nLocal indexes are common in data warehouse and DSS environments.\
    \ If you query frequently by using the partitioned column(s), a local index is\
    \ appropriate. This approach lets Oracle use the appropriate index and table partition\
    \ to quickly retrieve the data.\n\nThere are two types of local indexes: local\
    \ prefixed and local nonprefixed. A local prefixed index is one in which the leftmost\
    \ column of the index matches the table partition key. The previous example in\
    \ this section is a local prefixed index because its leftmost column (D_DATE_ID)\
    \ is also the partition key for the table.\n\nA local nonprefixed index is one\
    \ in which the leftmost column doesn’t match the partition key used to partition\
    \ the corresponding table. For example, this is a local nonprefixed index:\n\n\
    ```\nSQL> create index f_sales_idx1 on f_sales(sales_id) local;\n```\n\nThe index\
    \ is partitioned with the SALES_ID column, which isn’t the partition key of the\
    \ table, and is therefore a nonprefixed index. You can verify whether an index\
    \ is considered prefixed by querying the ALIGNMENT column from USER_PART_INDEXES:\n\
    \n```\nselect index_name, table_name, alignment, locality\nfrom user_part_indexes\n\
    where table_name = 'F_SALES';\n```\n\nHere is some sample output:\n\n```\nINDEX_NAME          \
    \ TABLE_NAME           ALIGNMENT    LOCALI\n-------------------- --------------------\
    \ ------------ ------\nF_SALES_FK1          F_SALES              PREFIXED    \
    \ LOCAL\nF_SALES_IDX1         F_SALES              NON_PREFIXED LOCAL\n```\n\n\
    You may wonder why the distinction exists between prefixed and nonprefixed. A\
    \ local index that is nonprefixed doesn’t include the partition key as a leading\
    \ edge of its index definition. This can have performance implications, in that\
    \ a range scan accessing a nonprefixed index may need to search every index partition.\
    \ If there are a large number of partitions, this can result in poor performance.\n\
    \nYou can choose to create all local indexes as prefixed by including the partition\
    \ key column in the leading edge of the index. For instance, you can create the\
    \ F_SALES_IDX2 index as prefixed as follows:\n\n```\nSQL> create index f_sales_idx2\
    \ on f_sales(d_date_id, sales_id) local;\n```\n\nIs a prefixed index preferable\
    \ to a nonprefixed index? It depends on how you query your tables. You have to\
    \ generate explain plans for the queries you use and examine whether a prefixed\
    \ index is better able to take advantage of partition pruning (eliminating partitions\
    \ to search) than a nonprefixed index. Also keep in mind that a multicolumn local\
    \ prefixed index consumes more space and resources than a local nonprefixed index.\n\
    \nPartitioning an Index Differently from Its Table\n\nAn index that is partitioned\
    \ differently from its base table is known as a global index. An entry in a global\
    \ index can point to any of the partitions of its base table. You can create a\
    \ global index on any type of partitioned table.\n\nYou can create either a range-partitioned\
    \ or a hash-based global index. Use the keyword GLOBAL to specify that the index\
    \ is built with a partitioning strategy separate from that of its corresponding\
    \ table. You must always specify a MAXVALUE when creating a range-partitioned\
    \ global index.\n\nThe following example creates a range-based global index:\n\
    \n```\ncreate index f_sales_gidx1 on f_sales(sales_amt)\nglobal partition by range(sales_amt)\n\
    (partition pg1 values less than (25)\n,partition pg2 values less than (50)\n,partition\
    \ pg3 values less than (maxvalue));\n```\n\n[Figure 12-5](#9781430257288_Ch12.xhtml#Fig5)\
    \ shows that with a global index, the partitioning strategy of the index doesn’t\
    \ accord with the partitioning strategy of the table.\n\n![9781430257288_Fig12-05.jpg](Images/9781430257288_Fig12-05.jpg)\n\
    \n[Figure 12-5](#9781430257288_Ch12.xhtml#_Fig5). Architecture of a global index\n\
    \nThe other type of global partitioned index is hash based. This example creates\
    \ a hash-partitioned global index:\n\n```\ncreate index f_sales_gidx2 on f_sales(sales_id)\n\
    global partition by hash(sales_id) partitions 4;\n```\n\nIn general, global indexes\
    \ are more difficult to maintain than local indexes. I recommend that you try\
    \ to avoid using global indexes and use local indexes whenever possible.\n\nThere\
    \ is no automatic maintenance of global indexes (as there is with local indexes).\
    \ With global indexes, you’re responsible for adding and dropping index partitions.\
    \ Also, many maintenance operations on the underlying partitioned table require\
    \ that the global index partitions be rebuilt. The following operations on a heap-organized\
    \ table render a global index unusable:\n\n*   ADD (HASH)\n*   COALESCE (HASH)\n\
    *   DROP\n*   EXCHANGE\n*   MERGE\n*   MOVE\n*   SPLIT\n*   TRUNCATE\n\nConsider\
    \ using the UPDATE INDEXES clause when you perform maintenance operations. Doing\
    \ so keeps the global index available during the operation and eliminates the\
    \ need for rebuilding. The downside of using UPDATE INDEXES is that the maintenance\
    \ operation takes longer, owing to the indexes being maintained during the action.\n\
    \nGlobal indexes are useful for queries that retrieve a small set of rows via\
    \ an index. In these situations, Oracle can eliminate (prune) any unnecessary\
    \ index partitions and efficiently retrieve the data. For example, global range-partitioned\
    \ indexes are useful in OLTP environments, where you need quick access to individual\
    \ records.\n\nPartial Indexes\n\nStarting with Oracle Database 12c, you can specify\
    \ that index partitions be initially created in an unusable state. You may want\
    \ to do this if you’ve precreated partitions and don’t yet have data for range\
    \ partitions that map to future dates—the idea being that you’ll build the index\
    \ after the partitions have been loaded (at some future date).\n\nYou control\
    \ whether a local index is created in a usable state via the INDEXING ON|OFF clause.\
    \ Here is an example that specifies by default that index partitions will be unusable,\
    \ unless explicitly turned on:\n\n```\ncreate table f_sales (\n sales_id number\n\
    ,sales_amt number\n,d_date_id number\n)\nindexing off\npartition by range (d_date_id)\n\
    (partition p1 values less than (20110101)  indexing on,\n partition p2 values\
    \ less than (20120101)  indexing on,\n partition p3 values less than (20130101)  indexing\
    \ on,\n partition p4 values less than (20140101)  indexing off);\n```\n\nNext,\
    \ a local partitioned index is created on the table, specifying that the partial\
    \ index functionality should be used:\n\n```\ncreate index f_sales_lidx1 on f_sales(d_date_id)\n\
    local indexing partial;\n```\n\nYou can verify which partitions are usable (or\
    \ not) via this query:\n\n```\nselect a.index_name, a.partition_name, a.tablespace_name,\
    \ a.status\nfrom user_ind_partitions a, user_indexes b\nwhere b.table_name = 'F_SALES'\n\
    and a.index_name = b.index_name;\n```\n\nHere is some sample output for this example:\n\
    \n```\nINDEX_NAME           PARTITION_ TABLESPACE_NAME STATUS\n--------------------\
    \ ---------- --------------- --------\nF_SALES_LIDX1        P1         USERS          \
    \ USABLE\nF_SALES_LIDX1        P2         USERS           USABLE\nF_SALES_LIDX1        P3        \
    \ USERS           USABLE\nF_SALES_LIDX1        P4         USERS           UNUSABLE\n\
    ```\n\nIn this way, you can control whether the index is maintained as data are\
    \ inserted into the partition. You may not initially want an index partition created\
    \ in a usable state because it will slow down bulk loads of data. In this situation,\
    \ you would first load the data and then make the index usable by rebuilding it:\n\
    \n```\nSQL> alter index f_sales_lidx1 rebuild partition p4;\n```\n\nPartition\
    \ Pruning\n\nPartition pruning can greatly improve the performance of queries\
    \ executing against partitioned tables. If an SQL query specifically accesses\
    \ a table on a partition key, Oracle only searches the partitions that contain\
    \ data the query needs (and doesn’t access any partitions that don’t contain such\
    \ data—pruning them, so to speak).\n\nFor example, say a partitioned table is\
    \ defined as follows:\n\n```\ncreate table f_sales (\n sales_id  number\n,sales_amt\
    \ number\n,d_date_id number)\ntablespace p1_tbsp\npartition by range(d_date_id)(\n\
     partition y10 values less than (20110101)\n   tablespace p1_tbsp\n,partition\
    \ y11 values less than (20120101)\n   tablespace p2_tbsp\n,partition y12 values\
    \ less than (20130101)\n   tablespace p3_tbsp);\n```\n\nAdditionally, you create\
    \ a local index on the partition key column:\n\n```\nSQL> create index f_sales_fk1\
    \ on f_sales(d_date_id) local;\n```\n\nAnd, say you insert some sample data:\n\
    \n```\nSQL> insert into f_sales values(1,100,20100202);\nSQL> insert into f_sales\
    \ values(2,200,20110202);\nSQL> insert into f_sales values(3,300,20120202);\n\
    ```\n\nTo illustrate the process of partition pruning, enable the autotrace facility:\n\
    \n```\nSQL> set autotrace trace explain;\n```\n\nNow, execute an SQL statement\
    \ that accesses a row based on the partition key:\n\n```\nSQL> select sales_amt\
    \ from f_sales where d_date_id = '20110202';\n```\n\nAutotrace displays the explain\
    \ plan. Some of the columns have been removed in order to fit the output on the\
    \ page neatly:\n\n```\n\n| Id  | Operation                                  |\
    \ Name        | Pstart| Pstop |\n\n|   0 | SELECT STATEMENT                          \
    \ |             |       |       |\n|   1 |  PARTITION RANGE SINGLE                    |            \
    \ |     2 |     2 |\n|   2 |   TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| F_SALES    \
    \ |     2 |     2 |\n|*  3 |    INDEX RANGE SCAN                        | F_SALES_FK1\
    \ |     2 |     2 |\n\n```\n\nIn this output, Pstart shows that the starting partition\
    \ accessed is partition 2\\. Pstop shows that the last partition accessed is partition\
    \ 2\\. In this example, partition 2 is the only partition used to retrieve data;\
    \ the other partitions in the table aren’t accessed at all by the query.\n\nIf\
    \ a query is executed that doesn’t use the partition key, then all partitions\
    \ are accessed; for example,\n\n```\nSQL> select * from f_sales;\n```\n\nHere\
    \ is the corresponding explain plan:\n\n```\n\n| Id  | Operation           | Name    |    Rows|\
    \ Pstart|  Pstop|\n\n|   0 | SELECT STATEMENT    |         |     3  |       |      \
    \ |\n|   1 |  PARTITION RANGE ALL|         |     3  |     1 |     3 |\n|   2 |  \
    \ TABLE ACCESS FULL | F_SALES |     3  |     1 |     3 |\n\n```\n\nNote in this\
    \ output that the starting partition is partition 1, and the stopping partition\
    \ is partition 3\\. This means that partitions 1 through 3 are accessed by this\
    \ query, with no pruning of partitions.\n\nThis example is simple but demonstrates\
    \ the concept of partition pruning. When you access the table by the partition\
    \ key, you can drastically reduce the number of rows Oracle needs to inspect and\
    \ process. This has huge performance benefits for queries that are able to prune\
    \ partitions.\n\nSummary\n\nOracle provides a partitioning feature that is critical\
    \ for implementing large tables and indexes. Partitioning is vital for building\
    \ highly scalable and maintainable applications. This feature works on the concept\
    \ of logically creating an object (table or index) but implementing the object\
    \ as several separate database segments. A partitioned object allows you to build,\
    \ load, maintain, and query on a partition-by-partition basis. Maintenance operations,\
    \ such as deleting, archiving, updating, and inserting data, are manageable because\
    \ you’re working on only a small subset of the large logical table.\n\nIf you\
    \ work in data warehouse environments or with large databases, you must be highly\
    \ knowledgeable about partitioning concepts. As a DBA, you’re required to create\
    \ and maintain partitioned objects. You have to make recommendations about table\
    \ partitioning strategies and where to use local and global indexes. These decisions\
    \ have a huge impact on the usability and performance of the system.\n\nThe book\
    \ now moves on to utilities used to copy and move users, objects, and data from\
    \ one environment to another. Oracle’s Data Pump and external tables feature are\
    \ covered in the next two chapters.\n\nCHAPTER 13\n\n![image](Images/frontdot.jpg)\n\
    \nData Pump\n\nData Pump is often described as an upgraded version of the old\
    \ exp/imp utilities. That depiction is inaccurate; it’s a bit like calling a modern\
    \ smartphone a replacement for an old rotary-dial landline. Although the old utilities\
    \ are dependable and work well, Data Pump encompasses that functionality and while\
    \ adding completely new dimensions to how data can be lifted and moved between\
    \ environments. This chapter will help explain how Data Pump makes your current\
    \ data transfer tasks easier and will also show how to move information and solve\
    \ problems in ways that you didn’t think were possible.\n\nData Pump enables you\
    \ to efficiently back up, replicate, secure, and transform large amounts data\
    \ and metadata. You can use Data Pump in a variety of ways:\n\n*   Perform point-in-time\
    \ logical backups of the entire database or subsets of data\n*   Replicate entire\
    \ databases or subsets of data for testing or development\n*   Quickly generate\
    \ DDL required to recreate objects\n*   Upgrade a database by exporting from the\
    \ old version and importing into the new version\n\nSometimes, DBAs exert a Luddite-like\
    \ attachment to the exp/imp utilities because the DBAs are familiar with the syntax\
    \ of these utilities, and they get the job done quickly. Even if those legacy\
    \ utilities are easy to use, you should consider using Data Pump going forward.\
    \ Data Pump contains substantial functionality over the old exp/imp utilities:\n\
    \n*   Performance with large data sets, allowing efficient export and import gigabytes\
    \ of data\n*   Interactive command line utility, which lets you disconnect and\
    \ then later attach to active Data Pump jobs\n*   Ability to export large amounts\
    \ of data from a remote database and import them directly into a local database\
    \ without creating a dump file\n*   Ability to make on-the-fly changes to schemas,\
    \ tablespaces, data files, and storage settings from export to import\n*   Sophisticated\
    \ filtering of objects and data\n*   Security-controlled (via database) directory\
    \ objects\n*   Advanced features, such as compression and encryption\n\nThis chapter\
    \ begins with a discussion on the Data Pump architecture. Subsequent topics include\
    \ basic export and import tasks, moving data across networks, filtering data,\
    \ and running Data Pump in legacy mode.\n\nData Pump Architecture\n\nData Pump\
    \ consists of the following components:\n\n*   expdp (Data Pump export utility)\n\
    *   impdp (Data Pump import utility)\n*   DBMS_DATAPUMP PL/SQL package (Data Pump\
    \ application programming interface [API])\n*   DBMS_METADATA PL/SQL package (Data\
    \ Pump Metadata API)\n\nThe expdp and impdp utilities use the DBMS_DATAPUMP and\
    \ DBMS_METADATA built-in PL/SQL packages when exporting and importing data and\
    \ metadata. The DBMS_DATAPUMP package moves entire databases or subsets of data\
    \ between database environments. The DBMS_METADATA package exports and imports\
    \ information about database objects.\n\n![image](Images/sq.jpg) **Note**   You\
    \ can call the DBMS_DATAPUMP and DBMS_METADATA packages independently (outside\
    \ expdp and impdp) from SQL*Plus. I rarely call these packages directly from SQL*Plus,\
    \ but you may have a specific scenario in which it’s desirable to interact directly\
    \ with them. See the *Oracle Database PL/SQL Packages and Types Reference Guide*,\
    \ which is available for download from the Technology Network area of the Oracle\
    \ Web site ([http://otn.oracle.com](http://otn.oracle.com)), for more details.\n\
    \nWhen you start a Data Pump export or import job, a master OS process is initiated\
    \ on the database server. This master process name has the format ora_dmNN_<SID>.\
    \ On Linux/Unix systems, you can view this process from the OS, prompt using the\
    \ ps command:\n\n```\n$ ps -ef | grep -v grep | grep ora_dm\noracle   14602    \
    \ 1  4 08:59 ?        00:00:03 ora_dm00_o12c\n```\n\nDepending on the degree of\
    \ parallelism and the work specified, a number of worker processes are also started.\
    \ If no parallelism is specified, then only one worker process is started. The\
    \ master process coordinates the work between master and worker processes. The\
    \ worker process names have the format ora_dwNN_<SID>.\n\nAlso, when a user starts\
    \ an export or import job, a database status table is created (owned by the user\
    \ that starts the job). This table exists only for the duration of the Data Pump\
    \ job. The name of the status table is dependent on what type of job you’re running.\
    \ The table is named with the format SYS_<OPERATION>_<JOB_MODE>_NN, where OPERATION\
    \ is either EXPORT or IMPORT. JOB_MODE can be one of the following types:\n\n\
    *   FULL\n*   SCHEMA\n*   TABLE\n*   TABLESPACE\n*   TRANSPORTABLE\n\nFor example,\
    \ if you’re exporting a schema, a table is created in your account with the name\
    \ SYS_EXPORT_SCHEMA_NN, where NN is a number that makes the table name unique\
    \ in the user’s schema. This status table contains information such as the objects\
    \ exported/imported, start time, elapsed time, rows, and error count. The status\
    \ table has more than 80 columns.\n\n![image](Images/sq.jpg) **Tip**   The Data\
    \ Pump status table is created in the default permanent tablespace of the user\
    \ performing the export/import. Therefore, if the user has no privileges to create\
    \ a table in the default tablespace, the Data Pump job will fail, with an ORA-31633\
    \ error.\n\nThe status table is dropped by Data Pump upon successful completion\
    \ of an export or import job. If you use the KILL_JOB interactive command, the\
    \ master table is also dropped. If you stop a job with the STOP_JOB interactive\
    \ command, the table isn’t removed and is used in the event you restart the job.\n\
    \nIf your job terminates abnormally, the master table is retained. You can delete\
    \ the status table if you don’t plan to restart the job.\n\nWhen Data Pump runs,\
    \ it uses a database directory object to determine where to write and read dump\
    \ files and log files. Usually, you specify which directory object you want Data\
    \ Pump to use. If you don’t specify a directory object, a default directory is\
    \ used. The default directory path is defined by a data directory object named\
    \ DATA_PUMP_DIR. This directory object is automatically created when the database\
    \ is first created. On Linux/Unix systems this directory object maps to the ORACLE_HOME/rdbms/log\
    \ directory.\n\nA Data Pump export creates an export file and a log file. The\
    \ export file contains the objects being exported. The log file contains a record\
    \ of the job activities. [Figure 13-1](#9781430257288_Ch13.xhtml#Fig1) shows the\
    \ architectural components related to a Data Pump export job.\n\n![9781430257288_Fig13-01.jpg](Images/9781430257288_Fig13-01.jpg)\n\
    \n[Figure 13-1](#9781430257288_Ch13.xhtml#_Fig1). Data Pump export job components\n\
    \nSimilarly, [Figure 13-2](#9781430257288_Ch13.xhtml#Fig2) displays the architectural\
    \ components of a Data Pump import job. The main difference between export and\
    \ import is the direction in which the data flow. Export writes data out of the\
    \ database, and import brings information into the database. Refer back to these\
    \ diagrams as you work through Data Pump examples and concepts throughout this\
    \ chapter.\n\n![9781430257288_Fig13-02.jpg](Images/9781430257288_Fig13-02.jpg)\n\
    \n[Figure 13-2](#9781430257288_Ch13.xhtml#_Fig2). Data Pump import job components\n\
    \nFor each Data Pump job, you must ensure that you have access to a directory\
    \ object. The basics of exporting and importing are described in the next few\
    \ sections.\n\n![image](Images/sq.jpg) **Tip**   Because Data Pump internally\
    \ uses PL/SQL to perform its work, there needs to be some memory available in\
    \ the shared pool to hold the PL/SQL packages. If there is not enough room in\
    \ the shared pool, Data Pump will throw an ORA-04031: unable to allocate  bytes\
    \ of shared memory... error and abort. If you receive this error, set the database\
    \ parameter SHARED_POOL_SIZE to at least 50M. See MOS note 396940.1 for further\
    \ details.\n\nGetting Started\n\nNow that you have an understanding of the Data\
    \ Pump architecture, next is a simple example showing the required export setup\
    \ steps for exporting a table, dropping the table, and then reimporting the table\
    \ back into the database. This will lay the foundation for all other Data Pump\
    \ tasks covered in this chapter.\n\nTaking an Export\n\nA small amount of setup\
    \ is required when you run a Data Pump export job. Here are the steps:\n\n1. \
    \ Create a database directory object that points to an OS directory that you want\
    \ to write/read Data Pump files to/from.\n2.  Grant read and write privileges\
    \ on the directory object to the database user running the export.\n3.  From the\
    \ OS prompt, run the expdp utility.\n\nStep 1\\. Creating a Database Directory\
    \ Object\n\nBefore you run a Data Pump job, first create a database directory\
    \ object that corresponds to a physical location on disk. This location will be\
    \ used to hold the export and log files and should be a location where you know\
    \ you have plenty of disk space to accommodate the amount of data being exported.\n\
    \nUse the CREATE DIRECTORY command to accomplish this task. This example creates\
    \ a directory named dp_dir and specifies that it is to map to the /oradump physical\
    \ location on disk:\n\n```\nSQL> create directory dp_dir as '/oradump';\n```\n\
    \nTo view the details of the newly created directory, issue this query:\n\n```\n\
    SQL> select owner, directory_name, directory_path from dba_directories;\n```\n\
    \nHere is some sample output:\n\n```\nOWNER      DIRECTORY_NAME  DIRECTORY_PATH\n\
    ---------- --------------- --------------------\nSYS        DP_DIR          /oradump\n\
    ```\n\nKeep in mind that the directory path specified has to physically exist\
    \ on the database server. Furthermore, the directory has to be one that the oracle\
    \ OS user has read/write access to. Finally, the user performing the Data Pump\
    \ operations needs to be granted read/write access to the directory object (see\
    \ step 2).\n\nIf you don’t specify the DIRECTORY parameter when exporting or importing,\
    \ Data Pump will attempt to use the default database directory object (as previously\
    \ discussed, this maps to ORACLE_HOME/rdbms/log). I don’t recommend using the\
    \ default directory for two reasons:\n\n*   If you’re exporting large amounts\
    \ of data, it’s better to have on disk the preferred location, where you know\
    \ you have enough room to accommodate your disk space requirements. If you use\
    \ the default directory, you run the risk of inadvertently filling up the mount\
    \ point associated with ORACLE_HOME and then potentially hanging your database.\n\
    *   If you grant privileges to non-DBA users to take exports, you don’t want them\
    \ creating large dump files in a location associated with ORACLE_HOME. Again,\
    \ you don’t want the mount point associated with ORACLE_HOME to become full to\
    \ the detriment of your database.\n\nStep 2\\. Granting Access to the Directory\n\
    \nYou need to grant permissions on the database directory object to a user that\
    \ wants to use Data Pump. Use the GRANT statement to allocate the appropriate\
    \ privileges. If you want a user to be able to read from and write to the directory,\
    \ you must grant security access. This example grants access to the directory\
    \ object to a user named MV_MAINT:\n\n```\nSQL> grant read, write on directory\
    \ dp_dir to mv_maint;\n```\n\nAll directory objects are owned by the SYS user.\
    \ If you’re using a user account that has the DBA role granted to it, then you\
    \ have the requisite read/write privileges on any directory objects. I usually\
    \ perform Data Pump jobs with a user that has the DBA granted to it (so that I\
    \ don’t need to bother with granting access).\n\nSECURITY ISSUES WITH THE OLD\
    \ EXP UTILITY\n\nThe idea behind creating directory objects and then granting\
    \ specific I/O access to the physical storage location is that you can more securely\
    \ administer which users have the capability to generate read and write activities\
    \ when normally they wouldn’t have permissions. With the legacy exp utility, any\
    \ user that has access to the tool by default has access to write or read a file\
    \ to which the owner (usually oracle) of the Oracle binaries has access. It’s\
    \ conceivable that a malicious non-oracle OS user can attempt to run the exp utility\
    \ to purposely overwrite a critical database file. For example, the following\
    \ command can be run by any non-oracle OS user with execute access to the exp\
    \ utility:\n\n$ exp heera/foo file=/oradata04/SCRKDV12/users01.dbf\n\nThe exp\
    \ process runs as the oracle OS user and therefore has read and write OS privileges\
    \ on any oracle-owned data files. In this exp example, if the users01.dbf file\
    \ is a live database data file, it’s overwritten and rendered worthless. This\
    \ can cause catastrophic damage to your database.\n\nTo prevent such issues, with\
    \ Oracle Data Pump you first have to create a database object directory that maps\
    \ to a specific directory and then additionally assign read and write privileges\
    \ to that directory per user. Thus, Data Pump doesn’t have the security problems\
    \ that exist with the old exp utility.\n\nStep 3\\. Taking an Export\n\nWhen the\
    \ directory object and grants are in place, you can use Data Pump to export information\
    \ from a database. The simple example in this section shows how to export a table.\
    \ Later sections in this chapter describe in detail the various ways in which\
    \ you can export data. The point here is to work through an example that will\
    \ provide a foundation for understanding more complex topics that follow.\n\n\
    As a non-SYS user, create a table, and populate it with some data:\n\n```\nSQL>\
    \ create table inv(inv_id number);\nSQL> insert into inv values (123);\n```\n\n\
    Next, as a non-SYS user, export the table. This example uses the previously created\
    \ directory, named DP_DIR. Data Pump uses the directory path specified by the\
    \ directory object as the location on disk to which to write the dump file and\
    \ log file:\n\n```\n$ expdp mv_maint/foo directory=dp_dir tables=inv dumpfile=exp.dmp\
    \ logfile=exp.log\n```\n\nThe expdp utility creates a file named exp.dmp in the\
    \ /oradump directory, containing the information required to recreate the INV\
    \ table and populate it with data as it was at the time the export was taken.\
    \ Additionally, a log file named exp.log is created in the /oradump directory,\
    \ containing logging information associated with this export job.\n\nIf you don’t\
    \ specify a dump file name, Data Pump creates a file named expdat.dmp. If a file\
    \ named expdat.dmp already exists in the directory, then Data Pump throws an error.\
    \ If you don’t specify a log file name, then Data Pump creates one named export.log.\
    \ If a log file named export.log already exists, then Data Pump overwrites it.\n\
    \n![image](Images/sq.jpg) **Tip**   Although it’s possible to execute Data Pump\
    \ as the SYS user, I don’t recommend it for couple of reasons. First, SYS is required\
    \ to connect to the database with the AS SYSDBA clause. This requires a Data Pump\
    \ parameter file with the USERID parameter and quotes around the associated connect\
    \ string. This is unwieldy. Second, most tables owned by SYS cannot be exported\
    \ (there are a few exceptions, such as AUD$). If you attempt to export a table\
    \ owned by SYS, Data Pump will throw an ORA-39166 error and indicate that the\
    \ table doesn’t exist. This is confusing.\n\nImporting a Table\n\nOne of the key\
    \ reasons to export data is so that you can recreate database objects. You may\
    \ want to do this as part of a backup strategy or to replicate data to a different\
    \ database. Data Pump import uses an export dump file as its input and recreates\
    \ database objects contained in the export file. The procedure for importing is\
    \ similar to exporting:\n\n1.  Create a database directory object that points\
    \ to an OS directory that you want to read/write Data Pump files from.\n2.  Grant\
    \ read and write privileges on the directory object to the database user running\
    \ the export or import.\n3.  From the OS prompt, run the impdp command.\n\nSteps\
    \ 1 and 2 were covered in the prior section, “Taking an Export,” and therefore\
    \ will not be repeated here.\n\nBefore running the import job, drop the INV table\
    \ that was created previously.\n\n```\nSQL> drop table inv purge;\n```\n\nNext,\
    \ recreate the INV table from the export taken:\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=exp.dmp logfile=imp.log\n```\n\nYou should now have the INV table recreated\
    \ and populated with data as it was at the time of the export. Now is a good time\
    \ to inspect again [Figures 13-1](#9781430257288_Ch13.xhtml#Fig1) and [13-2](#9781430257288_Ch13.xhtml#Fig2).\
    \ Make sure you understand which files were created by expdb and which files were\
    \ used by impdp.\n\nUsing a Parameter File\n\nInstead of typing commands on the\
    \ command line, in many situations it’s better to store the commands in a file\
    \ and then reference the file when executing Data Pump export or import. Using\
    \ parameter files makes tasks more repeatable and less prone to error. You can\
    \ place the commands in a file once and then reference that file multiple times.\n\
    \nAdditionally, some Data Pump commands (such as FLASHBACK_TIME) require the use\
    \ of quotation marks; in these situations, it’s sometimes hard to predict how\
    \ the OS will interpret these. Whenever a command requires quotation marks, it’s\
    \ highly preferable to use a parameter file.\n\nTo use a parameter file, first\
    \ create an OS text file that contains the commands you want to use to control\
    \ the behavior of your job. This example uses the Linux/Unix vi command to create\
    \ a text file named exp.par:\n\n```\n$ vi exp.par\n```\n\nNow, place the following\
    \ commands in the exp.par file:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\n\
    dumpfile=exp.dmp\nlogfile=exp.log\ntables=inv\nreuse_dumpfiles=y\n```\n\nNext,\
    \ the export operation references the parameter file via the PARFILE command line\
    \ option:\n\n```\n$ expdp parfile=exp.par\n```\n\nData Pump processes the parameters\
    \ in the file as if they were typed on the command line. If you find yourself\
    \ repeatedly typing the same commands or using commands that require quotation\
    \ marks, or both, then consider using a parameter file to increase your efficiency.\n\
    \n![image](Images/sq.jpg) **Tip**   Don’t confuse a Data Pump parameter file with\
    \ the database initialization parameter file. A Data Pump parameter file instructs\
    \ Data Pump as to which user to connect to the database as, which directory locations\
    \ to read/write files to and from, what objects to include in the operation, and\
    \ so on. In contrast, a database parameter file establishes characteristics of\
    \ the instance upon database startup.\n\nExporting and Importing with Granularity\n\
    \nRecall from the section “Data Pump Architecture,” earlier in this chapter, that\
    \ there are several different modes in which you can invoke the export/import\
    \ utilities. For instance, you can instruct Data Pump to export/import in the\
    \ following modes:\n\n*   Entire database\n*   Schema level\n*   Table level\n\
    *   Tablespace level\n*   Transportable tablespace level\n\nBefore diving into\
    \ the many features of Data Pump, it’s useful to discuss these modes and ensure\
    \ you’re aware of how each operates. This will further lay the foundation for\
    \ understanding concepts introduced later in the chapter.\n\nExporting and Importing\
    \ an Entire Database\n\nWhen you export an entire database, this is sometimes\
    \ referred to as a full export. In this mode the resultant export file contains\
    \ everything required to make a copy of your database. Unless restricted by filtering\
    \ parameters (see the section “Filtering Data and Objects,” later in this chapter),\
    \ a full export consists of\n\n*   all DDL required to recreate tablespaces, users,\
    \ user tables, indexes, constraints, triggers, sequences, stored PL/SQL, and so\
    \ on.\n*   all table data (except the SYS user’s tables)\n\nA full export is initiated\
    \ with the FULL parameter set to Y and must be done with a user that has DBA privileges\
    \ or that has the DATAPUMP_EXP_FULL_DATABASE role granted to it. Here is an example\
    \ of taking a full export of a database:\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=full.dmp logfile=full.log full=y\n```\n\nAs the export is executing,\
    \ you should see this text in the output, indicating that a full-level export\
    \ is taking place:\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_FULL_01\":\n```\n\
    \nBe aware that a full export doesn’t export everything in the database:\n\n*\
    \   The contents of the SYS schema are not exported (there are a few exceptions\
    \ to this, such as the AUD$ table). Consider what would happen if you could export\
    \ the contents of the SYS schema from one database and import them into another.\
    \ The SYS schema contents would overwrite internal data dictionary tables/views\
    \ and thus corrupt the database. Therefore, Data Pump never exports objects owned\
    \ by SYS.\n*   Index data are not exported, but rather, the index DDL that contains\
    \ the SQL required to recreate the indexes during a subsequent import.\n\nOnce\
    \ you have a full export, you can use its contents to either recreate objects\
    \ in the original database (e.g., in the event a table is accidentally dropped)\
    \ or replicate the entire database or subsets of users/tables to a different database.\
    \ This next example assumes that the dump file has been copied to a different\
    \ database server and is now used to import all objects into the destination database:\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp logfile=fullimp.log\
    \ full=y\n```\n\n![image](Images/sq.jpg) **Tip**   To initiate a full database\
    \ import, you must have DBA privileges or be assigned the DATAPUMP_IMP_FULL_DATABASE\
    \ role.\n\nIn the output displayed on your screen, you should see an indication\
    \ that a full import is transpiring:\n\n```\nStarting \"MV_MAINT\".\"SYS_IMPORT_FULL_01\"\
    :\n```\n\nRunning a full-import database job has some implications to be aware\
    \ of:\n\n*   The import job will first attempt to recreate any tablespaces. If\
    \ a tablespace already exists, or if the directory path a tablespace depends on\
    \ doesn’t exist, then the tablespace creation statements will fail, and the import\
    \ job will move on to the next task.\n*   Next, the import job will alter the\
    \ SYS and SYSTEM user accounts to contain the same password that was exported.\
    \ Therefore, after you import from a production system, it’s prudent to change\
    \ the passwords for SYS and SYSTEM, to reflect the new environment.\n*   Additionally,\
    \ the import job will then attempt to create any users in the export file. If\
    \ a user already exists, an error is thrown, and the import job moves on to the\
    \ next task.\n*   Users will be imported with the same passwords that were taken\
    \ from the original database. Depending on your security standards, you may want\
    \ to change the passwords.\n*   Tables will be recreated. If a table already exists\
    \ and contains data, you must specify how you want the import job to handle this.\
    \ You can have the import job either skip, append, replace, or truncate the table\
    \ (see the section “Importing When Objects Already Exist,” later in this chapter).\n\
    *   After each table is created and populated, associated indexes are created.\n\
    *   The import job will also try to import statistics if available. Furthermore,\
    \ object grants are instantiated.\n\nIf everything runs well, the end result will\
    \ be a database that is logically identical to the source database in terms of\
    \ tablespaces, users, objects, and so on.\n\nSchema Level\n\nWhen you initiate\
    \ an export, unless otherwise specified, Data Pump starts a schema-level export\
    \ for the user running the export job. User-level exports are frequently used\
    \ to copy a schema or set of schemas from one environment to another. The following\
    \ command starts a schema-level export for the MV_MAINT user:\n\n```\n$ expdp\
    \ mv_maint/foo directory=dp_dir dumpfile=mv_maint.dmp logfile=mv_maint.log\n```\n\
    \nIn the output displayed on the screen, you should see some text indicating that\
    \ a schema-level export has been initiated:\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_SCHEMA_01\"\
    ...\n```\n\nYou can also initiate a schema-level export for users other than the\
    \ one running the export job with the SCHEMAS parameter. The following command\
    \ shows a schema-level export for multiple users:\n\n```\n$ expdp mv_maint/foo\
    \ directory=dp_dir dumpfile=user.dmp  schemas=heera,chaya\n```\n\nYou can initiate\
    \ a schema-level import by referencing a dump file that was taken with a schema-level\
    \ export:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=user.dmp\n```\n\
    \nWhen you initiate a schema-level import, there are some details to be aware\
    \ of:\n\n*   No tablespaces are included in a schema-level export.\n*   The import\
    \ job attempts to recreate any users in the dump file. If a user already exists,\
    \ an error is thrown, and the import job continues.\n*   The import job will reset\
    \ the users’ passwords, based on the password that was exported.\n*   Tables owned\
    \ by the users will be imported and populated. If a table already exists, you\
    \ must instruct Data Pump on how to handle this with the TABLE_EXISTS_ACTION parameter.\n\
    \nYou can also initiate a schema-level import when using a full-export dump file.\
    \ To do this, specify which schemas you want extracted from the full export:\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp schemas=heera,chaya\n\
    ```\n\nTable Level\n\nYou can instruct Data Pump to operate on specific tables\
    \ via the TABLES parameter. For example, say you want to export\n\n```\n$ expdp\
    \ mv_maint/foo directory=dp_dir dumpfile=tab.dmp \\\ntables=heera.inv,heera.inv_items\n\
    ```\n\nYou should see some text in the output indicating that a table-level export\
    \ is transpiring:\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLE_01...\n```\n\
    \nSimilarly, you can initiate a table-level import by specifying a table-level-created\
    \ dump file:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=tab.dmp\n\
    ```\n\nA table-level import only attempts to import the tables and specified data.\
    \ If a table already exists, an error is thrown, and the import job continues.\
    \ If a table already exists and contains data, you must specify how you want the\
    \ export job to handle this. You can have the import job either skip, append,\
    \ replace, or truncate the table with the TABLE_EXISTS_ACTION parameter.\n\nYou\
    \ can also initiate a table-level import when using a full-export dump file or\
    \ a schema-level export. To do this, specify which tables you want extracted from\
    \ the full- or schema-level export:\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=full.dmp tables=heera.inv\n```\n\nTablespace Level\n\nA tablespace-level\
    \ export/import operates on objects contained within specific tablespaces. This\
    \ example exports all objects contained in the USERS tablespace:\n\n```\n$ expdp\
    \ mv_maint/foo directory=dp_dir dumpfile=tbsp.dmp tablespaces=users\n```\n\nThe\
    \ text displayed in the output should indicate that a tablespace-level export\
    \ is occurring:\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLESPACE_01\"...\n\
    ```\n\nYou can initiate a tablespace-level import by specifying an export file\
    \ that was created with a tablespace-level export:\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=tbsp.dmp\n```\n\nYou can also initiate a tablespace-level\
    \ import by using a full export, but specifying the TABLESPACES parameter:\n\n\
    ```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tablespaces=users\n\
    ```\n\nA tablespace-level import will attempt to create any tables and indexes\
    \ within the tablespace. The import doesn’t try to recreate the tablespaces themselves.\n\
    \n![image](Images/sq.jpg) **Note**   There is also a transportable tablespace\
    \ mode export. See the section “Copying Data Files”, later in this chapter.\n\n\
    Transferring Data\n\nOne of the main uses of Data Pump is the copying of data\
    \ from one database to another. Often, source and destination databases are located\
    \ in data centers thousands of miles apart. Data Pump offers several powerful\
    \ features for efficiently copying data:\n\n*   Network link\n*   Copying data\
    \ files (transportable tablespaces)\n*   External tables (see [Chapter 14](#9781430257288_Ch14.xhtml))\n\
    \nUsing a network link allows you to take an export and import it into the destination\
    \ database without having to create a dump file. This is a very efficient way\
    \ of moving data.\n\nOracle also provides the transportable tablespace feature,\
    \ which lets you copy the data files from a source database to the destination\
    \ and then use Data Pump to transfer the associated metadata. These two techniques\
    \ are described in the following sections.\n\n![image](Images/sq.jpg) **Note**  \
    \ See [Chapter 14](#9781430257288_Ch14.xhtml) for a discussion of using external\
    \ tables to transfer data.\n\nExporting and Importing Directly Across the Network\n\
    \nSuppose you have two database environments—a production database running on\
    \ a Solaris box and a test database running on a Linux server. Your boss comes\
    \ to you with these requirements:\n\n*   Make a copy of the production database\
    \ on the Solaris box.\n*   Import the copy into the testing database on the Linux\
    \ server.\n*   Change the names of the schemas when importing so as to meet the\
    \ testing database standards for names.\n\nFirst, consider the steps required\
    \ to transfer data from one database to another, using the old exp/imp utilities.\
    \ The steps would look something like this:\n\n1.  Export the production database\
    \ (which creates a dump file on the database server).\n2.  Copy the dump file\
    \ to the testing database server.\n3.  Import the dump file into the testing database.\n\
    \nYou can perform those same steps using Data Pump. However, Data Pump provides\
    \ a much more efficient and transparent method for executing those steps. If you\
    \ have direct network connectivity between the production and testing database\
    \ servers, you can take an export and directly import it into your target database\
    \ without having to create or copy any dump files. Furthermore, you can rename\
    \ schemas on the fly as you perform the import. Additionally, it doesn’t matter\
    \ if the source database is running on an OS different from that of the target\
    \ database.\n\nAn example will help illustrate how this works. For this example,\
    \ the production database users are STAR2, CIA_APP, and CIA_SEL. You want to move\
    \ these users into a testing database and rename them STAR_JUL, CIA_APP_JUL, and\
    \ CIA_SEL_JUL. This task requires the following steps:\n\n1.  Create users in\
    \ the test database to be imported into. Here is a sample script that creates\
    \ the users in the testing database:\n\n    ```\n    define star_user=star_jul\n\
    \    define star_user_pwd=star_jul_pwd\n    define cia_app_user=cia_app_jul\n\
    \    define cia_app_user_pwd=cia_app_jul_pwd\n    define cia_sel_user=cia_sel_jul\n\
    \    define cia_sel_user_pwd=cia_sel_jul_pwd\n    --\n    create user &&star_user\
    \ identified by &&star_user_pwd;\n    grant connect,resource to &&star_user;\n\
    \    alter user &&star_user default tablespace dim_data;\n    --\n    create user\
    \ &&cia_app_user identified by &&cia_app_user_pwd;\n    grant connect,resource\
    \ to &&cia_app_user;\n    alter user &&cia_app_user default tablespace cia_data;\n\
    \    --\n    create user &&cia_sel_user identified by &&cia_app_user_pwd;\n  \
    \  grant connect,resource to &&cia_app_user;\n    alter user &&cia_sel_user default\
    \ tablespace cia_data;\n    ```\n\n2.  In your testing database, create a database\
    \ link that points to your production database. The remote user referenced in\
    \ the CREATE DATABASE LINK statement must have the DBA role granted to it in the\
    \ production database. Here is a sample CREATE DATABASE LINK script:\n\n    ```\n\
    \    create database link dk\n    connect to darl identified by foobar\n    using\
    \ 'dwdb1:1522/dwrep1';\n    ```\n\n3.  In your testing database, create a directory\
    \ object that points to the location where you want your log file to go:\n\n \
    \   ```\n    SQL> create or replace directory engdev as '/orahome/oracle/ddl/engdev';\n\
    \    ```\n\n4.  Run the import command on the testing box. This command references\
    \ the remote database via the NETWORK_LINK parameter. The command also instructs\
    \ Data Pump to map the production database user names to the newly created users\
    \ in the testing database.\n\n    ```\n    $ impdp darl/engdev directory=engdev\
    \ network_link=dk \\\n    schemas='STAR2,CIA_APP,CIA_SEL' \\\n    remap_schema=STAR2:STAR_JUL,CIA_APP:CIA_APP_JUL,CIA_SEL:CIA_SEL_JUL\n\
    \    ```\n\nThis technique allows you to move large amounts of data between disparate\
    \ databases without having to create or copy any dump files or data files. You\
    \ can also rename schemas on the fly via the REMAP_SCHEMA parameter. This is a\
    \ very powerful Data Pump feature that lets you transfer data quickly and efficiently.\n\
    \n![image](Images/sq.jpg) **Tip**   When replicating entire databases, also consider\
    \ using the RMAN duplicate database functionality.\n\nOracle Net VS. NETWORK_LINK\n\
    \nDon’t confuse exporting while connected to a remote database via Oracle Net\
    \ with exporting using the NETWORK_LINK parameter. When exporting while connected\
    \ to a remote database via Oracle Net, the objects being exported exist in the\
    \ remote database, and the dump file and log file are created on the remote server\
    \ in the directory specified by the DIRECTORY parameter. For instance, the following\
    \ command exports objects in the remote database and creates files on the remote\
    \ server:\n\n$ expdp mv_maint/foo@shrek2 directory=dp_dir dumpfile=sales.dmp\n\
    \nIn contrast, when you export using the NETWORK_LINK parameter, you are creating\
    \ dump files and log files locally, and the database objects being exported exist\
    \ in a remote database; for example,\n\n$ expdp mv_maint/foo network_link=shrek2\
    \ directory=dp_dir dumpfile=sales.dmp\n\nCopying Data Files\n\nOracle provides\
    \ a mechanism for copying data files from one database to another, in conjunction\
    \ with using Data Pump to transport the associated metadata. This is known as\
    \ the transportable tablespace feature. The amount of time this task requires\
    \ depends on how long it takes you to copy the data files to the destination server.\
    \ This technique is appropriate for moving data in DSS and data warehouse environments.\n\
    \n![image](Images/sq.jpg) **Tip**   Transporting tablespaces can also be used\
    \ (in conjunction with the RMAN CONVERT TABLESPACE command) to move tablespaces\
    \ to a destination server that has a platform different from that of the host.\n\
    \nFollow these steps to transport tablespaces:\n\n1.  Ensure that the tablespace\
    \ is self-contained. These are some common violations of the self-contained rule:\n\
    \n    *   An index in one tablespace can’t point to a table in another tablespace\
    \ that isn’t in the set of tablespaces being transported.\n    *   A foreign key\
    \ constraint is defined on a table in a tablespace that references a primary key\
    \ constraint on a table in a tablespace that isn’t in the set of tablespaces being\
    \ transported.\n\n    Run the following check to see if the set of tablespaces\
    \ being transported violates any of the self-contained rules:\n\n    ```\n   \
    \ SQL> exec dbms_tts.transport_set_check('INV_DATA,INV_INDEX', TRUE);\n    ```\n\
    \n    Now, see if Oracle detected any violations:\n\n    ```\n    SQL> select\
    \ * from transport_set_violations;\n    ```\n\n    If you don’t have any violations,\
    \ you should see this:\n\n    ```\n    no rows selected\n    ```\n\n    If you\
    \ do have violations, such as an index that is built on a table that exists in\
    \ a tablespace not being transported, then you’ll have to rebuild the index in\
    \ a tablespace that is being transported.\n\n2.  Make the tablespaces being transported\
    \ read-only:\n\n    ```\n    SQL> alter tablespace inv_data read only;\n    SQL>\
    \ alter tablespace inv_index read only;\n    ```\n\n3.  Use Data Pump to export\
    \ the metadata for the tablespaces being transported:\n\n    ```\n    $ expdp\
    \ mv_maint/foo directory=dp_dir dumpfile=trans.dmp \\\n    transport_tablespaces=INV_DATA,INV_INDEX\n\
    \    ```\n\n4.  Copy the Data Pump export dump file to the destination server.\n\
    5.  Copy the data file(s) to the destination database. Place the files in the\
    \ directory where you want them in the destination database server. The file name\
    \ and directory path must match the import command used in the next step.\n6.\
    \  Import the metadata into the destination database. Use the following parameter\
    \ file to import the metadata for the data files being transported:\n\n    ```\n\
    \    userid=mv_maint/foo\n    directory=dp_dir\n    dumpfile=trans.dmp\n    transport_datafiles=/ora01/dbfile/rcat/inv_data01.dbf,\n\
    \    /ora01/dbfile/rcat/inv_index01.dbf\n    ```\n\nIf everything goes well, you\
    \ should see some output indicating success:\n\n```\nJob \"MV_MAINT\".\"SYS_IMPORT_TRANSPORTABLE_01\"\
    \ successfully completed...\n```\n\nIf the data files that are being transported\
    \ have a block size different from that of the destination database, then you\
    \ must modify your initialization file (or use an ALTER SYSTEM command) and add\
    \ a buffer pool that contains the block size of the source data file. For example,\
    \ to add a 16KB buffer cache, place this in the initialization file:\n\n```\n\
    db_16k_cache_size=200M\n```\n\nYou can check a tablespace’s block size via this\
    \ query:\n\n```\nSQL> select tablespace_name, block_size from dba_tablespaces;\n\
    ```\n\nThe transportable tablespace mechanism allows you to quickly move data\
    \ files between databases, even if the databases use different block sizes or\
    \ have different endian formats. This section doesn’t discuss all the details\
    \ involved with transportable tablespaces; the focus of this chapter is to show\
    \ how to use Data Pump to transport data. See the *Oracle Database Administrator’s\
    \ Guide*, which can be freely downloaded from the Technology Network area of the\
    \ Oracle Web site ([http://otn.oracle.com](http://otn.oracle.com) ), for complete\
    \ details on transportable tablespaces.\n\n![image](Images/sq.jpg) **Note**  \
    \ To generate transportable tablespaces, you must use the Oracle Enterprise Edition.\
    \ You can use other editions of Oracle to import transportable tablespaces.\n\n\
    Features for Manipulating Storage\n\nData Pump contains many flexible features\
    \ for manipulating tablespaces and data files when exporting and importing. The\
    \ following sections show useful Data Pump techniques when working with these\
    \ important database objects.\n\nExporting Tablespace Metadata\n\nSometimes, you\
    \ may be required to replicate an environment—say, replicating a production environment\
    \ into a testing environment. One of the first tasks is to replicate the tablespaces.\
    \ To this end, you can use Data Pump to pull out just the DDL required to recreate\
    \ the tablespaces for an environment:\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\nfull=y include=tablespace\n```\n\nThe FULL parameter instructs\
    \ Data Pump to export everything in the database. However, when used with INCLUDE,\
    \ Data Pump exports only the objects specified with that command. In this combination\
    \ only metadata regarding tablespaces are exported; no data within the data files\
    \ are included with the export. You could add the parameter and value of CONTENT=METADATA_ONLY\
    \ to the INCLUDE command, but this would be redundant.\n\nNow, you can use the\
    \ SQLFILE parameter to view the DDL associated with the tablespaces that were\
    \ exported:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp sqlfile=tbsp.sql\n\
    ```\n\nWhen you use the SQLFILE parameter, nothing is imported. In this example\
    \ the prior command only creates a file named tbsp.sql, containing SQL statements\
    \ pertaining to tablespaces. You can modify the DDL and run it in the destination\
    \ database environment; or, if nothing needs to change, you can directly use the\
    \ dump file by importing tablespaces into the destination database.\n\nSpecifying\
    \ Different Data File Paths and Names\n\nAs previously discussed, you can use\
    \ the combination of the FULL and INCLUDE parameters to export only tablespace\
    \ metadata information:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ \\\nfull=y include=tablespace\n```\n\nWhat happens if you want to use the dump\
    \ file to create tablespaces on a separate database server that has different\
    \ directory structures? Data Pump allows you to change the data file directory\
    \ paths and file names in the import step with the REMAP_DATAFILE parameter.\n\
    \nFor example, say the source data files existed on a mount point named /ora03,\
    \ but on the database being imported to, the mount points are named with /ora01\\\
    . Here is a parameter file that specifies that only tablespaces beginning with\
    \ the string INV should be imported and that their corresponding data files names\
    \ be changed to reflect the new environment:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\n\
    dumpfile=inv.dmp\nfull=y\ninclude=tablespace:\"like 'INV%'\"\nremap_datafile=\"\
    '/ora03/dbfile/O12C/inv_data01.dbf':'/ora01/dbfile/O12C/tb1.dbf'\"\nremap_datafile=\"\
    '/ora03/dbfile/O12C/inv_index01.dbf':'/ora01/dbfile/O12C/tb2.dbf'\"\n```\n\nWhen\
    \ Data Pump creates the tablespaces, for any paths that match the first part of\
    \ the string (to the left of the colon [:]), the string is replaced with the text\
    \ in the next part of the string (to the right of the colon).\n\n![image](Images/sq.jpg) **Tip**  \
    \ When working with parameters that require both single and double quotation marks,\
    \ you’ll get predictable behavior when using a parameter file. In contrast, if\
    \ you were to try to enter in the various required quotation marks on the command\
    \ line, the OS may interpret and pass to Data Pump something other than what you\
    \ were expecting.\n\nImporting into a Tablespace Different from the Original\n\
    \nYou may occasionally be required to export a table and then import it into a\
    \ different user and a different tablespace. The source database could be different\
    \ from the destination database, or you could simply be trying to move data between\
    \ two users within the same database. You can easily handle this requirement with\
    \ the REMAP_SCHEMA and REMAP_TABLESPACE parameters.\n\nThis example remaps the\
    \ user as well as the tablespace. The original user and tablespaces are HEERA\
    \ and INV_DATA. This command imports the INV table into the CHAYA user and the\
    \ DIM_DATA tablespace:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ remap_schema=HEERA:CHAYA \\\nremap_tablespace=INV_DATA:DIM_DATA tables=heera.inv\n\
    ```\n\nThe REMAP_TABLESPACE feature doesn’t recreate tablespaces. It only instructs\
    \ Data Pump to place objects in tablespaces different from those they were exported\
    \ from. When importing, if the tablespace that you’re placing the object in doesn’t\
    \ exist, Data Pump throws an error.\n\nChanging the Size of Data Files\n\nYou\
    \ can change the size of the data files when importing by using the TRANSFORM\
    \ parameter with the PCTSPACE option. Say you’ve created an export of just the\
    \ tablespace metadata:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ full=y include=tablespace\n```\n\nNow, you want to create the tablespaces that\
    \ contain the string DATA in the tablespace name in a development database, but\
    \ you don’t have enough disk space to create the tablespaces as they were in the\
    \ source database. In this scenario, you can use the TRANSFORM parameter to specify\
    \ that the tablespaces be created as a percentage of the original size.\n\nFor\
    \ instance, if you want the tablespaces to be created at 20 percent of the original\
    \ size, issue the following command:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\n\
    dumpfile=inv.dmp\nfull=y\ninclude=tablespace:\"like '%DATA%'\"\ntransform=pctspace:20\n\
    ```\n\nThe tablespaces are created with data files 20 percent of their original\
    \ size. The extent allocation sizes are also 20 percent of their original definition.\
    \ This is important because Data Pump doesn’t check to see if the storage attributes\
    \ meet the minimum size restrictions for data files. This means that if the calculated\
    \ smaller size violates an Oracle minimum size (e.g., five blocks for the uniform\
    \ extent size), an error will be thrown during the import.\n\nThis feature is\
    \ useful when used to export production data and then import it into a smaller\
    \ database. In these scenarios, you may be filtering out some of the production\
    \ data via the SAMPLE parameter or QUERY parameters (see the section “Filtering\
    \ Data and Objects,” later in this chapter).\n\nChanging Segment and Storage Attributes\n\
    \nWhen importing, you can alter the storage attributes of a table by using the\
    \ TRANSFORM parameter. The general syntax for this parameter is\n\n```\nTRANSFORM=transform_name:value[:object_type]\n\
    ```\n\nWhen you use SEGMENT_ATTRIBUTES:N for the transformation name, you can\
    \ remove the following segment attributes during an import:\n\n*   Physical attributes\n\
    *   Storage attributes\n*   Tablespaces\n*   Logging\n\nYou may require this feature\
    \ when you’re importing into a development environment and don’t want the tables\
    \ to come in with all the storage attributes as they were in the production database.\
    \ For example, in development you may just have one tablespace in which you store\
    \ all your tables and indexes, whereas in production, you spread the tables and\
    \ indexes out in multiple tablespaces.\n\nHere is an example that removes the\
    \ segment attributes:\n\n```\n$ impdp mv_maint/foo directory=dp_dir  dumpfile=inv.dmp\
    \ \\\ntransform=segment_attributes:n\n```\n\nYou can remove just the storage clause\
    \ by using STORAGE:N:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ \\\ntransform=storage:n\n```\n\nFiltering Data and Objects\n\nData Pump has\
    \ a vast array of mechanisms for filtering data and metadata. You can influence\
    \ what is excluded or included in a Data Pump export or import in the following\
    \ ways:\n\n*   Use the QUERY parameter to export or import subsets of data.\n\
    *   Use the SAMPLE parameter to export a percentage of the rows in a table.\n\
    *   Use the CONTENT parameter to exclude or include data and metadata.\n*   Use\
    \ the EXCLUDE parameter to specifically name items to be excluded.\n*   Use the\
    \ INCLUDE parameter to name the items to be included (thereby excluding other\
    \ nondependent items not included in the list).\n*   Use parameters such as SCHEMAS\
    \ to specify that you only want a subset of the database’s objects (those that\
    \ belong to the specified user or users).\n\nExamples of each of these techniques\
    \ are described in the following sections.\n\n![image](Images/sq.jpg) **Note**  \
    \ You can’t use EXCLUDE and INCLUDE at the same time. These parameters are mutually\
    \ exclusive.\n\nSpecifying a Query\n\nYou can use the QUERY parameter to instruct\
    \ Data Pump to write to a dump file only rows that meet a certain criterion. You\
    \ may want to do this if you’re recreating a test environment and only need subsets\
    \ of the data. Keep in mind that this technique is unaware of any foreign key\
    \ constraints that may be in place, so you can’t blindly restrict the data sets\
    \ without considering parent–child relationships.\n\nThe QUERY parameter has this\
    \ general syntax for including a query:\n\n```\nQUERY = [schema.][table_name:]\
    \ query_clause\n```\n\nThe query clause can be any valid SQL clause. The query\
    \ must be enclosed by either double or single quotation marks. I recommend using\
    \ double quotation marks because you may need to have single quotation marks embedded\
    \ in the query to handle VARCHAR2 data. Also, you should use a parameter file\
    \ so that there is no confusion about how the OS interprets the quotation marks.\n\
    \nThis example uses a parameter file and limits the rows exported for two tables.\
    \ Here is the parameter file used when exporting:\n\n```\nuserid=mv_maint/foo\n\
    directory=dp_dir\ndumpfile=inv.dmp\ntables=inv,reg\nquery=inv:\"WHERE inv_desc='Book'\"\
    \nquery=reg:\"WHERE reg_id <=20\"\n```\n\nSay you place the previous lines of\
    \ code in a file named inv.par. The export job references the parameter file as\
    \ shown:\n\n```\n$ expdp parfile=inv.par\n```\n\nThe resulting dump file only\
    \ contains rows filtered by the QUERY parameters. Again, be mindful of any parent–child\
    \ relationships, and ensure that what gets exported won’t violate any constraints\
    \ on the import.\n\nYou can also specify a query when importing data. Here is\
    \ a parameter file that limits the rows imported into the INV table, based on\
    \ the INV_ID column:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\ndumpfile=inv.dmp\n\
    tables=inv,reg\nquery=inv:\"WHERE inv_id > 10\"\n```\n\nThis text is placed in\
    \ a file named inv2.par and is referenced during the import as follows:\n\n```\n\
    $ impdp parfile=inv2.par\n```\n\nAll the rows from the REG table are imported.\
    \ Only the rows in the INV table that have an INV_ID greater than 10 are imported.\n\
    \nExporting a Percentage of the Data\n\nWhen exporting, the SAMPLE parameter instructs\
    \ Data Pump to retrieve a certain percentage of rows, based on a number you provide.\
    \ Data Pump doesn’t keep track of parent–child relationships when exporting. Therefore,\
    \ this approach doesn’t work well when you have tables linked via foreign key\
    \ constraints and you’re trying to select a percentage of rows randomly.\n\nHere\
    \ is the general syntax for this parameter:\n\n```\nSAMPLE=[[schema_name.]table_name:]sample_percent\n\
    ```\n\nFor example, if you want to export 10 percent of the data in a table, do\
    \ so as follows:\n\n```\n$ expdp mv_maint/foo directory=dp_dir tables=inv sample=10\
    \ dumpfile=inv.dmp\n```\n\nThis next example exports two tables, but only 30 percent\
    \ of the REG table’s data:\n\n```\n$ expdp mv_maint/foo directory=dp_dir tables=inv,reg\
    \ sample=reg:30 dumpfile=inv.dmp\n```\n\n![image](Images/sq.jpg) **Note**   The\
    \ SAMPLE parameter is only valid for exports.\n\nExcluding Objects from the Export\
    \ File\n\nFor export the EXCLUDE parameter instructs Data Pump not to export specified\
    \ objects (whereas the INCLUDE parameter instructs Data Pump to include only specific\
    \ objects in the export file). The EXCLUDE parameter has this general syntax:\n\
    \n```\nEXCLUDE=object_type[:name_clause] [, ...]\n```\n\nThe OBJECT_TYPE is a\
    \ database object, such as TABLE or INDEX. To see which object types can be filtered,\
    \ view the OBJECT_PATH column of DATABASE_EXPORT_OBJECTS, SCHEMA_EXPORT_OBJECTS,\
    \ or TABLE_EXPORT_OBJECTS. For example, if you want to view what schema-level\
    \ objects can be filtered, run this query:\n\n```\nSELECT\n object_path\nFROM\
    \ schema_export_objects\nWHERE object_path NOT LIKE '%/%';\n```\n\nHere is a snippet\
    \ of the output:\n\n```\nOBJECT_PATH\n\nSTATISTICS\nSYNONYM\nSYSTEM_GRANT\nTABLE\n\
    TABLESPACE_QUOTA\nTRIGGER\n```\n\nThe EXCLUDE parameter instructs Data Pump export\
    \ to filter out specific objects from the export. For instance, say you’re exporting\
    \ a table but want to exclude the indexes and grants:\n\n```\n$ expdp mv_maint/foo\
    \ directory=dp_dir dumpfile=inv.dmp tables=inv exclude=index,grant\n```\n\nYou\
    \ can filter at a more granular level by using NAME_CLAUSE. The NAME_CLAUSE option\
    \ of EXCLUDE allows you to specify an SQL filter. To exclude indexes that have\
    \ names that start with the string “INV,” you use the following command:\n\n```\n\
    exclude=index:\"LIKE 'INV%'\"\n```\n\nThe previous line requires that you use\
    \ quotation marks; in these scenarios, I recommend that you use a parameter file.\
    \ Here is a parameter file that contains an EXCLUDE clause:\n\n```\nuserid=mv_maint/foo\n\
    directory=dp_dir\ndumpfile=inv.dmp\ntables=inv\nexclude=index:\"LIKE 'INV%'\"\n\
    ```\n\nA few aspects of the EXCLUDE clause may seem counterintuitive. For example,\
    \ consider the following export parameter file:\n\n```\nuserid=mv_maint/foo\n\
    directory=dp_dir\ndumpfile=sch.dmp\nexclude=schema:\"='HEERA'\"\n```\n\nIf you\
    \ attempt to exclude a user in this manner, an error is thrown. This is because\
    \ the default mode of export is SCHEMA level, and Data Pump can’t exclude and\
    \ include a schema at the same time. If you want to exclude a user from an export\
    \ file, specify the FULL mode, and exclude the user:\n\n```\nuserid=mv_maint/foo\n\
    directory=dp_dir\ndumpfile=sch.dmp\nexclude=schema:\"='HEERA'\"\nfull=y\n```\n\
    \nExcluding Statistics\n\nBy default, when you export a table object, any statistics\
    \ are also exported. You can prevent statistics from being imported via the EXCLUDE\
    \ parameter. Here is an example:\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\ntables=inv exclude=statistics\n```\n\nWhen importing, if\
    \ you attempt to exclude statistics from a dump file that didn’t originally include\
    \ the statistics, then you receive this error:\n\n```\nORA-39168: Object path\
    \ STATISTICS was not found.\n```\n\nYou also receive this error if the objects\
    \ in the exported dump file never had statistics generated for them.\n\nIncluding\
    \ Only Specific Objects in an Export File\n\nUse the INCLUDE parameter to include\
    \ only certain database objects in the export file. The following example exports\
    \ only the procedures and functions that a user owns:\n\n```\n$ expdp mv_maint/foo\
    \ dumpfile=proc.dmp directory=dp_dir include=procedure,function\n```\n\nThe proc.dmp\
    \ file that is created contains only the DDL required to recreate any procedures\
    \ and functions the user owns.\n\nWhen using INCLUDE, you can also specify that\
    \ only specific PL/SQL objects should be exported:\n\n```\n$ expdp mv_maint/foo\
    \ directory=dp_dir dumpfile=ss.dmp \\\ninclude=function:\\\"=\\'IS_DATE\\'\\\"\
    \n```\n\nWhen you’re exporting only specific PL/SQL objects, because of the issue\
    \ of having to escape quotation marks on the OS command line, I recommend using\
    \ a parameter file. When you use a parameter file, this is not a concern. The\
    \ following example shows the contents of a parameter file that exports specific\
    \ objects:\n\n```\ndirectory=dp_dir\ndumpfile=ss.dmp\ninclude=function:\"='ISDATE'\"\
    ,procedure:\"='DEPTREE_FILL'\"\n```\n\nIf you specify an object that doesn’t exist,\
    \ Data Pump throws an error but continues with the export operation:\n\n```\n\
    ORA-39168: Object path FUNCTION was not found.\n```\n\nExporting Table, Index,\
    \ Constraint, and Trigger DDL\n\nSuppose you want to export the DDL associated\
    \ with tables, indexes, constraints, and triggers in your database. To do this,\
    \ use the FULL export mode, specify CONTENT=METADATA_ONLY, and only include tables:\n\
    \n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=ddl.dmp \\\ncontent=metadata_only\
    \ full=y include=table\n```\n\nWhen you export an object, Data Pump also exports\
    \ any dependent objects. So, when you export a table, you also get indexes, constraints,\
    \ and triggers associated with the table.\n\nExcluding Objects from Import\n\n\
    In general, you can use the same techniques used to filter objects in exports\
    \ to exclude objects from being imported. Use the EXCLUDE parameter to exclude\
    \ objects from being imported. For example, to exclude triggers and procedures\
    \ from being imported, use this command:\n\n```\n$ impdp mv_maint/foo dumpfile=inv.dmp\
    \ directory=dp_dir exclude=TRIGGER,PROCEDURE\n```\n\nYou can further refine what\
    \ is excluded by adding an SQL clause. For example, say you want not to import\
    \ triggers that begin with the letter B. Here is what the parameter file looks\
    \ like:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\ndumpfile=inv.dmp\nschemas=HEERA\n\
    exclude=trigger:\"like 'B%'\"\n```\n\nIncluding Objects in Import\n\nYou can use\
    \ the INCLUDE parameter to reduce what is imported. Suppose you have a schema\
    \ from which you want to import tables that begin with the letter A. Here is the\
    \ parameter file:\n\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\ndumpfile=inv.dmp\n\
    schemas=HEERA\ninclude=table:\"like 'A%'\"\n```\n\nIf you place the previous text\
    \ in a file named h.par, then the parameter file can be invoked as follows:\n\n\
    ```\n$ impdp parfile=h.par\n```\n\nIn this example the HEERA schema must already\
    \ exist. Only tables that start with the letter A are imported.\n\nCommon Data\
    \ Pump Tasks\n\nThe following sections describe common features you can use with\
    \ Data Pump. Many of these features are standard with Data Pump, such as creating\
    \ a consistent export and taking action when imported objects already exist in\
    \ the database. Other features, such as compression and encryption, require the\
    \ Enterprise Edition of Oracle or an extra license, or both. I’ll point out these\
    \ requirements (if relevant) for the Data Pump element being covered.\n\nEstimating\
    \ the Size of Export Jobs\n\nIf you’re about to export a large amount of data,\
    \ you can estimate the size of the file that Data Pump creates before you run\
    \ the export. You may want to do this because you’re concerned about the amount\
    \ of space an export job needs.\n\nTo estimate the size, use the ESTIMATE_ONLY\
    \ parameter. This example estimates the size of the export file for an entire\
    \ database:\n\n```\n$ expdp mv_maint/foo estimate_only=y full=y logfile=n\n```\n\
    \nHere is a snippet of the output:\n\n```\nEstimate in progress using BLOCKS method...\n\
    Total estimation using BLOCKS method: 6.75 GB\n```\n\nSimilarly, you can specify\
    \ a schema name to get an estimate of the size required to export a user:\n\n\
    ```\n$ expdp mv_maint/foo estimate_only=y schemas=star2 logfile=n\n```\n\nHere\
    \ is an example of estimating the size required for two tables:\n\n```\n$ expdp\
    \ mv_maint/foo estimate_only=y tables=star2.f_configs,star2.f_installations \\\
    \nlogfile=n\n```\n\nListing the Contents of Dump Files\n\nData Pump has a very\
    \ robust method of creating a file that contains all the SQL that’s executed when\
    \ an import job runs. Data Pump uses the DBMS_METADATA package to create the DDL\
    \ that you can use to recreate objects in the Data Pump dump file.\n\nUse the\
    \ SQLFILE option of Data Pump import to list the contents of a Data Pump export\
    \ file. This example creates a file named expfull.sql, containing the SQL statements\
    \ that the import process calls (the file is placed in the directory defined by\
    \ the DPUMP_DIR2 directory object):\n\n```\n$ impdp hr/hr DIRECTORY=dpump_dir1\
    \ DUMPFILE=expfull.dmp \\\nSQLFILE=dpump_dir2:expfull.sql\n```\n\nIf you don’t\
    \ specify a separate directory (such as dpump_dir2, in the previous example),\
    \ then the SQL file is written to the location specified in the DIRECTORY option.\n\
    \n![image](Images/sq.jpg) **Tip**   You must run the previous command as a user\
    \ with DBA privileges or the schema that performed the Data Pump export. Otherwise,\
    \ you get an empty SQL file without the expected SQL statements in it.\n\nWhen\
    \ you use the SQLFILE option with an import, the impdp process doesn’t import\
    \ any data; it only creates a file that contains the SQL commands that would be\
    \ run by the import process. It’s sometimes handy to generate an SQL file for\
    \ the following reasons:\n\n*   Preview and verify the SQL statements before running\
    \ the import\n*   Run the SQL manually to precreate database objects\n*   Capture\
    \ the SQL that would be required to recreate database objects (users, tables,\
    \ index, and so on)\n\nIn regard to the last bulleted item, sometimes what’s checked\
    \ into the source code control repository doesn’t match what’s really been applied\
    \ to the production database. This procedure can be handy for troubleshooting\
    \ or documenting the state of the database at a point in time.\n\nCloning a User\n\
    \nSuppose you need to move a user’s objects and data to a new database. As part\
    \ of the migration, you want to rename the user. First, create a schema-level\
    \ export file that contains the user you want to clone. In this example the user\
    \ name is INV:\n\n```\n$ expdp mv_maint/foo directory=dp_dir schemas=inv dumpfile=inv.dmp\n\
    ```\n\nNow, you can use Data Pump import to clone the user. If you want to move\
    \ the user to a different database, copy the dump file to the remote database,\
    \ and use the REMAP_SCHEMA parameter to create a copy of a user. In this example\
    \ the INV user is cloned to the INV_DW user:\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ remap_schema=inv:inv_dw dumpfile=inv.dmp\n```\n\nThis command copies all structures\
    \ and data in the INV user to the INV_DW user. The resulting INV_DW user is identical,\
    \ in terms of objects, to the INV user. The duplicated schema also contains the\
    \ same password as the schema from which it was copied.\n\nIf you just want to\
    \ duplicate the metadata from one schema to another, use the CONTENT parameter\
    \ with the METADATA_ONLY option:\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ remap_schema=inv:inv_dw \\\ncontent=metadata_only dumpfile=inv.dmp\n```\n\n\
    The REMAP_SCHEMA parameter provides an efficient way to duplicate a schema, with\
    \ or without the data. During a schema duplication operation, if you want to change\
    \ the tablespace in which the objects reside, also use the REMAP_TABLESPACE parameter.\
    \ This allows you to duplicate a schema and also place the objects in a tablespace\
    \ different from that of the source objects.\n\nYou can also duplicate a user\
    \ from one database to another without first creating a dump file. To do this,\
    \ use the NETWORK_LINK parameter. See the section “Exporting and Importing Directly\
    \ Across the Network,” earlier in this chapter, for details on copying data directly\
    \ from one database to another.\n\nCreating a Consistent Export\n\nA consistent\
    \ export means that all data in the export file are consistent as of a time or\
    \ an SCN. When you’re exporting an active database with many parent-child tables,\
    \ you should ensure that you get a consistent snapshot of the data.\n\n![image](Images/sq.jpg) **Tip**  \
    \ If you’re using Oracle Database 11g Release 2 or higher, you can take a consistent\
    \ export by invoking the legacy mode parameter of CONSISTENT=Y. See the section“Data\
    \ Pump Legacy Mode,” later in this chapter, for details.\n\nYou create a consistent\
    \ export by using either the FLASHBACK_SCN or FLASHBACK_TIME parameter. This example\
    \ uses the FLASHBACK_SCN parameter to take an export. To determine the current\
    \ value of the SCN of your data set, issue this query:\n\n```\nSQL> select current_scn\
    \ from v$database;\n```\n\nHere is some typical output:\n\n```\n CURRENT_SCN\n\
    \n```\n\nThe following command takes a consistent full export of the database,\
    \ using the FLASHBACK_SCN parameter:\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ full=y flashback_scn=5715397 \\\ndumpfile=full.dmp\n```\n\nThe previous export\
    \ command ensures that all data exported are consistent with any transactions\
    \ committed in the database as of the specified SCN.\n\nWhen you use the FLASHBACK_SCN\
    \ parameter, Data Pump ensures that the data in the export file are consistent\
    \ as of the specified SCN. This means that any transactions committed after the\
    \ specified SCN aren’t included in the export file.\n\n![image](Images/sq.jpg) **Note**  \
    \ If you use the NETWORK_LINK parameter in conjunction with FLASHBACK_SCN, then\
    \ the export is taken with the SCN consistent with the database referenced in\
    \ the database link.\n\nYou can also use FLASHBACK_TIME to specify that the export\
    \ file should be created with consistent committed transactions as of a specified\
    \ time. When using FLASHBACK_TIME, Oracle determines the SCN that most closely\
    \ matches the time specified and uses that to produce an export consistent with\
    \ that SCN. The syntax for using FLASHBACK_TIME is as follows:\n\n```\nFLASHBACK_TIME=\"\
    TO_TIMESTAMP{<value>}\"\n```\n\nFor some OSs, double quotation marks appearing\
    \ directly on the command line must be escaped by a backslash (\\), because the\
    \ OS treats them as special characters. For this reason, it’s much more straightforward\
    \ to use a parameter file. Here are the contents of a parameter file that uses\
    \ FLASHBACK_TIME:\n\n```\ndirectory=dp_dir\ncontent=metadata_only\ndumpfile=inv.dmp\n\
    flashback_time=\"to_timestamp('24-jan-2013 07:03:00','dd-mon-yyyy hh24:mi:ss')\"\
    \n```\n\nDepending on your OS, the command line version of the previous example\
    \ must be specified as follows:\n\n```\nflashback_time=\\\"to_timestamp\\(\\'24-jan-2013\
    \ 07:03:00\\',\n\\'dd-mon-yyyy hh24:mi:ss\\'\\)\\\"\n```\n\nThis line of code\
    \ should be specified on one line. Here, the code has been placed on two lines\
    \ in order to fit on the page.\n\nYou can’t specify both FLASHBACK_SCN and FLASHBACK_TIME\
    \ when taking an export; these two parameters are mutually exclusive. If you attempt\
    \ to use both parameters at the same time, Data Pump throws the following error\
    \ message and halts the export job:\n\n```\nORA-39050: parameter FLASHBACK_TIME\
    \ is incompatible with parameter FLASHBACK_SCN\n```\n\nImporting When Objects\
    \ Already Exist\n\nWhen exporting and importing data, you often import into schemas\
    \ in which the objects have been created (tables, indexes, and so on). In this\
    \ situation, you should import the data but instruct Data Pump to try not to create\
    \ already existing objects.\n\nYou can achieve this with the TABLE_EXISTS_ACTION\
    \ and CONTENT parameters. The next example instructs Data Pump to append data\
    \ in any tables that already exist via the TABLE_EXISTS_ACTION=APPEND option.\
    \ Also used is the CONTENT=DATA_ONLY option, which instructs Data Pump not to\
    \ run any DDL to create objects (only to load data):\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=inv.dmp \\\ntable_exists_action=append content=data_only\n\
    ```\n\nExisting objects aren’t modified in any way, and any new data that exist\
    \ in the dump file are inserted into any tables.\n\nYou may wonder what happens\
    \ if you just use the TABLE_EXISTS_ACTION option and don’t combine it with the\
    \ CONTENT option:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ \\\ntable_exists_action=append\n```\n\nThe only difference is that Data Pump\
    \ attempts to run DDL commands to create objects if they exist. This doesn’t stop\
    \ the job from running, but you see an error message in the output, indicating\
    \ that the object already exists. Here is a snippet of the output for the previous\
    \ command:\n\n```\nTable \"MV_MAINT\".\"INV\" exists. Data will be appended ...\n\
    ```\n\nThe default for the TABLE_EXISTS_ACTION parameter is SKIP, unless you also\
    \ specify the parameter CONTENT=DATA_ONLY. If you use CONTENT=DATA_ONLY, then\
    \ the default for TABLE_EXISTS_ACTION is APPEND.\n\nThe TABLE_EXISTS_ACTION parameter\
    \ takes the following options:\n\n*   SKIP (default if not combined with CONTENT=DATA_ONLY)\n\
    *   APPEND (default if combined with CONTENT=DATA_ONLY)\n*   REPLACE\n*   TRUNCATE\n\
    \nThe SKIP option tells Data Pump not to process the object if it exists. The\
    \ APPEND option instructs Data Pump not to delete existing data, but rather, to\
    \ add data to the table without modifying any existing data. The REPLACE option\
    \ instructs Data Pump to drop and recreate objects; this parameter isn’t valid\
    \ when the CONTENT parameter is used with the DATA_ONLY option. The TRUNCATE parameter\
    \ tells Data Pump to delete rows from tables via a TRUNCATE statement.\n\nThe\
    \ CONTENT parameter takes the following options:\n\n*   ALL (default)\n*   DATA_ONLY\n\
    *   METADATA_ONLY\n\nThe ALL option instructs Data Pump to load both data and\
    \ metadata contained in the dump file; this is the default behavior. The DATA_ONLY\
    \ option tells Data Pump to load only table data into existing tables; no database\
    \ objects are created. The METADATA_ONLY option only creates objects; no data\
    \ are loaded.\n\nRenaming a Table\n\nStarting with Oracle Database 11g, you have\
    \ the option of renaming a table during import operations. There are many reasons\
    \ you may want to rename a table when importing it. For instance, you may have\
    \ a table in the target schema that has the same name as the table you want to\
    \ import. You can rename a table when importing by using the REMAP_TABLE parameter.\
    \ This example imports the table from the HEERA user INV table to the HEERA user\
    \ INVEN table:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\
    \ tables=heera.inv \\\nremap_table=heera.inv:inven\n```\n\nHere is the general\
    \ syntax for renaming a table:\n\n```\nREMAP_TABLE=[schema.]old_tablename[.partition]:new_tablename\n\
    ```\n\nNote that this syntax doesn’t allow you to rename a table into a different\
    \ schema. If you’re not careful, you may attempt to do the following (thinking\
    \ that you’re moving a table and renaming it in one operation):\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv \\\nremap_table=heera.inv:scott.inven\n\
    ```\n\nIn the prior example, you end up with a table in the HEERA schema named\
    \ SCOTT. That can be confusing.\n\n![image](Images/sq.jpg) **Note**   The process\
    \ of renaming a table wasn’t entirely bug free in Oracle Database 11g Release\
    \ 1 but has been corrected in Oracle Database 11g Release 2\\. See MOS Note 886762.1\
    \ for more details.\n\nRemapping Data\n\nStarting with Oracle Database 11g, when\
    \ either exporting or importing, you can apply a PL/SQL function to alter a column\
    \ value. For example, you may have an auditor who needs to look at the data, and\
    \ one requirement is that you apply a simple obfuscation function to sensitive\
    \ columns. The data don’t need to be encrypted; they just need to be changed enough\
    \ that the auditor can’t readily determine the value of the LAST_NAME column in\
    \ the CUSTOMERS table.\n\nThis example first creates a simple package that is\
    \ used to obfuscate the data:\n\n```\ncreate or replace package obfus is\n  function\
    \ obf(clear_string varchar2) return varchar2;\n  function unobf(obs_string varchar2)\
    \ return varchar2;\nend obfus;\n/\n--\ncreate or replace package body obfus is\n\
      fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ' ||\n            \
    \ 'abcdefghijklmnopqrstuvwxyz';\n  tostr varchar2(62)   := 'defghijklmnopqrstuvwxyzabc3456789012'\
    \ ||\n             'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n--\nfunction obf(clear_string\
    \ varchar2) return varchar2 is\nbegin\n  return translate(clear_string, fromstr,\
    \ tostr);\nend obf;\n--\nfunction unobf(obs_string varchar2) return varchar2 is\n\
    begin\n  return translate(obs_string, tostr, fromstr);\nend unobf;\nend obfus;\n\
    /\n```\n\nNow, when you import the data into the database, you apply the obfuscation\
    \ function to the LAST_NAME column of the CUSTOMERS table:\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=cust.dmp tables=customers  \\\nremap_data=customers.last_name:obfus.obf\n\
    ```\n\nSelecting LAST_NAME from CUSTOMERS shows that it has been imported in an\
    \ obfuscated manner:\n\n```\nSQL> select last_name from customers;\nLAST_NAME\n\
    \nyYZEJ\ntOXXSMU\nxERX\n```\n\nYou can manually apply the package’s UNOBF function\
    \ to see the real values of the column:\n\n```\nSQL> select obfus.unobf(last_name)\
    \ from customers;\nOBFUS.UNOBF(LAST_NAME)\n\nLopuz\nGennick\nKuhn\n```\n\nSuppressing\
    \ a Log File\n\nBy default, Data Pump creates a log file when generating an export\
    \ or an import. If you know that you don’t want a log file generated, you can\
    \ suppress it by specifying the NOLOGFILE parameter. Here is an example:\n\n```\n\
    $ expdp mv_maint/foo directory=dp_dir tables=inv nologfile=y\n```\n\nIf you choose\
    \ not to create a log file, Data Pump still displays status messages on the output\
    \ device. In general, I recommend that you create a log file with every Data Pump\
    \ operation. This gives you an audit trail of your actions.\n\nUsing Parallelism\n\
    \nUse the PARALLEL parameter to parallelize a Data Pump job. For instance, if\
    \ you know you have four CPUs on a box, and you want to set the degree of parallelism\
    \ to 4, use PARALLEL as follows:\n\n```\n$ expdp mv_maint/foo parallel=4 dumpfile=exp.dmp\
    \ directory=dp_dir full=y\n```\n\nTo take full advantage of the parallel feature,\
    \ ensure that you specify multiple files when exporting. The following example\
    \ creates one file for each thread of parallelism:\n\n```\n$ expdp mv_maint/foo\
    \ parallel=4 dumpfile=exp1.dmp,exp2.dmp,exp3.dmp,exp4.dmp\n```\n\nYou can also\
    \ use the %U substitution variable to instruct Data Pump to create dump files\
    \ automatically to match the degree of parallelism. The %U variable starts at\
    \ the value 01 and increments as additional dump files are allocated. This example\
    \ uses the %U variable:\n\n```\n$ expdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp\n\
    ```\n\nNow, say you need to import from the dump files created from an export.\
    \ You can either individually specify the dump files or, if the dump files were\
    \ created with the %U variable, use that on import:\n\n```\n$ impdp mv_maint/foo\
    \ parallel=4 dumpfile=exp%U.dmp\n```\n\nIn the prior example the import process\
    \ starts by looking for a file with the name exp01.dmp, then exp02.dmp, and so\
    \ on.\n\n![image](Images/sq.jpg) **Tip**   Oracle recommends that the degree of\
    \ parallelism not be set to more than two times the number of CPUs available on\
    \ the server.\n\nYou can also modify the degree of parallelism while the job is\
    \ running. First, attach in the interactive command mode to the job (see the section\
    \ “Interactive Command Mode,” later in this chapter) for which you want to modify\
    \ the degree of parallelism. Then, use the PARALLEL option. In this example the\
    \ job attached to is SYS_IMPORT_TABLE_01:\n\n```\n$ impdp mv_maint/foo attach=sys_import_table_01\n\
    Import> parallel=6\n```\n\nYou can check the degree of parallelism via the STATUS\
    \ command:\n\n```\nImport> status\n```\n\nHere is some sample output:\n\n```\n\
    Job: SYS_IMPORT_TABLE_01\nOperation: IMPORT\nMode: TABLE\nState: EXECUTING\nBytes\
    \ Processed: 0\nCurrent Parallelism: 6\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ The PARALLEL feature is only available in the Enterprise Edition of Oracle.\n\
    \nSpecifying Additional Dump Files\n\nIf you run out of space in the primary data\
    \ pump location, then you can specify additional data pump locations on the fly.\
    \ Use the ADD_FILE command from the interactive command prompt. Here is the basic\
    \ syntax for adding additional files:\n\n```\nADD_FILE=[directory_object:]file_name\
    \ [,...]\n```\n\nThis example adds another output file to an already existing\
    \ Data Pump export job:\n\n```\nExport> add_file=alt2.dmp\n```\n\nYou can also\
    \ specify a separate database directory object:\n\n```\nExport> add_file=alt_dir:alt3.dmp\n\
    ```\n\nReusing Output File Names\n\nBy default, Data Pump doesn’t overwrite an\
    \ existing dump file. For example, the first time you run this job, it will run\
    \ fine because there is no dump file named inv.dmp in the directory being used:\n\
    \n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\n```\n\nIf you attempt\
    \ to run the previous command again with the same directory and the same data\
    \ pump name, this error is thrown:\n\n```\nORA-31641: unable to create dump file\
    \ \"/oradump/inv.dmp\"\n```\n\nYou can either specify a new data pump name for\
    \ the export job or use the REUSE_DUMPFILES parameter to direct Data Pump to overwrite\
    \ an existing dump file; for example,\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp reuse_dumpfiles=y\n```\n\nYou should now be able to run the\
    \ Data Pump export regardless of an existing dump file with the same name in the\
    \ output directory. When you set REUSE_DUMPFILES to a value of y, if Data Pump\
    \ finds a dump file with the same name, it overwrites the file.\n\n![image](Images/sq.jpg) **Note**  \
    \ The default value for REUSE_DUMPFILES is n. The REUSE_DUMPFILES parameter is\
    \ available only in Oracle Database 11g and higher.\n\nCreating a Daily DDL File\n\
    \nSometimes, in database environments, changes occur to database objects in unexpected\
    \ ways. You may have a developer who somehow obtains the production user passwords\
    \ and decides to make a change on the fly, without telling anybody. Or a DBA may\
    \ decide not to follow the standard release process and make a change to an object\
    \ while troubleshooting an issue. These scenarios can be frustrating for production-support\
    \ DBAs. Whenever there is an issue, the first question raised is, “What changed?”\n\
    \nWhen you use Data Pump, it’s fairly simple to create a file that contains all\
    \ the DDL to recreate every object in your database. You can instruct Data Pump\
    \ to export or import just the metadata via the CONTENT=METADATA_ONLY option.\n\
    \nFor instance, in a production environment, you can set up a daily job to capture\
    \ this DDL. If there is ever a question about what changed and when, you can go\
    \ back and compare the DDL in the daily dump files.\n\nListed next is a simple\
    \ shell script that first exports the metadata content from the database and then\
    \ uses Data Pump import to create a DDL file from that export:\n\n```\n#!/bin/bash\n\
    # source OS variables, see Chapter 2 for details\n. /etc/oraset o12c\n#\nDAY=$(date\
    \ +%Y_%m_%d)\nSID=DWREP\n#---------------------------------------------------\n\
    # First create export dump file with metadata only\nexpdp mv_maint/foo dumpfile=${SID}.${DAY}.dmp\
    \ content=metadata_only \\\ndirectory=dp_dir full=y logfile=${SID}.${DAY}.log\n\
    #---------------------------------------------------\n# Now create DDL file from\
    \ the export dump file.\nimpdp mv_maint/foo directory=dp_dir dumpfile=${SID}.${DAY}.dmp\
    \ \\\nSQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log\n#\nexit 0\n```\n\
    \nThis code listing depends on a database directory object’s being created that\
    \ points to where you want the daily dump file to be written. You may also want\
    \ to set up another job that periodically deletes any files older than a certain\
    \ amount of time.\n\nCompressing Output\n\nWhen you use Data Pump to create large\
    \ files, you should consider compressing the output. As of Oracle Database 11g,\
    \ the COMPRESSION parameter can be one of the following values: ALL, DATA_ONLY,\
    \ METADATA_ONLY, or NONE. If you specify ALL, then both data and metadata are\
    \ compressed in the output. This example exports one table and compresses both\
    \ the data and metadata in the output file:\n\n```\n$ expdp dbauser/foo tables=locations\
    \ directory=datapump \\\ndumpfile=compress.dmp compression=all\n```\n\nIf you’re\
    \ using Oracle Database 10g, then the COMPRESSION parameter only has the METADATA_ONLY\
    \ and NONE values.\n\n![image](Images/sq.jpg) **Note**   The ALL and DATA_ONLY\
    \ options of the COMPRESS parameter require a license for the Oracle Advanced\
    \ Compression option.\n\nNew with Oracle Database 12c, you can specify a compression\
    \ algorithm. The choices are BASIC, LOW, MEDIUM, and HIGH. Here is an example\
    \ of using MEDIUM compression:\n\n```\n$ expdp mv_maint/foo dumpfile=full.dmp\
    \ directory=dp_dir full=y \\\ncompression=all compression_algorithm=MEDIUM\n```\n\
    \nUsing the COMPRESSION_ALGORITHM parameter can be especially useful if you’re\
    \ running low on disk space or exporting over a network connection (as it reduces\
    \ the number of bytes that need to be transferred).\n\n![image](Images/sq.jpg) **Note**  \
    \ The COMPRESSION_ALGORITHM parameter requires a license for the Oracle Advanced\
    \ Compression option.\n\nChanging Table Compression Characteristics on Import\n\
    \nStarting with Oracle Database 12c, you can change a table’s compression characteristics\
    \ when importing the table. This example changes the compression characteristics\
    \ for all tables imported in the job to ROW STORE COMPRESS ADVANCED. Because the\
    \ command in this example requires quotation marks, it’s placed in a parameter\
    \ file, as shown:\n\n```\nuserid=mv_maint/foo\ndumpfile=inv.dmp\ndirectory=dp_dir\n\
    transform=table_compression_clause:\"ROW STORE COMPRESS ADVANCED\"\n```\n\nAssume\
    \ that the parameter file is named imp.par. It can now be invoked as follows:\n\
    \n```\n$ impdp parfile=imp.par\n```\n\nAll tables included in the import job are\
    \ created as ROW STORE COMPRESS ADVANCED, and the data are compressed as they’re\
    \ loaded.\n\n![image](Images/sq.jpg) **Note**   Table-level compression requires\
    \ a license for the Oracle Advanced Compression option.\n\nEncrypting Data\n\n\
    One potential security issue with Data Pump dump files is that anybody with OS\
    \ access to the output file can search for strings in the file. On Linux/Unix\
    \ systems, you can do this with the strings command:\n\n```\n$ strings inv.dmp\
    \ | grep -i secret\n```\n\nHere is the output for this particular dump file:\n\
    \n```\nSecret Data<\ntop secret data<\ncorporate secret data<\n```\n\nThis command\
    \ allows you to view the contents of the dump file because the data are in regular\
    \ text and not encrypted. If you require that the data be secured, you can use\
    \ Data Pump’s encryption features.\n\nThis example uses the ENCRYPTION parameter\
    \ to secure all data and metadata in the output:\n\n```\n$ expdp mv_maint/foo\
    \ encryption=all directory=dp_dir dumpfile=inv.dmp\n```\n\nFor this command to\
    \ work, your database must have an encryption wallet in place and open. See the\
    \ *Oracle Advanced Security Administrator’s Guide*, available for download from\
    \ the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for more details on how to create and open a wallet.\n\n![image](Images/sq.jpg) **Note**  \
    \ The Data Pump ENCRYPTION parameter requires that you use the Enterprise Edition\
    \ of Oracle Database 11g or higher and also requires a license for the Oracle\
    \ Advanced Security option.\n\nThe ENCRYPTION parameter takes the following options:\n\
    \n*   ALL\n*   DATA_ONLY\n*   ENCRYPTED_COLUMNS_ONLY\n*   METADATA_ONLY\n*   NONE\n\
    \nThe ALL option enables encryption for both data and metadata. The DATA_ONLY\
    \ option encrypts just the data. The ENCRYPTED_COLUMNS_ONLY option specifies that\
    \ only columns encrypted in the database are written to the dump file in an encrypted\
    \ format. The METADATA_ONLY option encrypts just metadata in the export file.\n\
    \nExporting Views As Tables\n\nStarting with Oracle Database 12c, you can export\
    \ a view and later import it as a table. You may want to do this if you need to\
    \ replicate the data contained in a view to a historical reporting database.\n\
    \nUse the VIEWS_AS_TABLES parameter to export a view into a table structure. This\
    \ parameter has the following syntax:\n\n```\nVIEWS_AS_TABLES=[schema_name.]view_name[:template_table_name]\n\
    ```\n\nHere is an example:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=v.dmp\
    \ \\\nviews_as_tables=sales_rockies\n```\n\nThe dump file can now be used to import\
    \ a table named SALES_ROCKIES into a different schema or database.\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=v.dmp\n```\n\nIf you just want to import\
    \ the table (which was created from a view during the export), you can do so as\
    \ follows:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp tables=sales_rockies\n\
    ```\n\nThe table will have the same columns and data types as per the view definition.\
    \ The table will additionally contain rows of data that match what would have\
    \ been selected from the view at the time of the export.\n\nDisabling Logging\
    \ of Redo on Import\n\nStarting with Oracle Database 12c, you can specify that\
    \ objects be loaded with nologging of redo. This is achieved via the DISABLE_ARCHIVE_LOGGING\
    \ parameter:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\
    \ntransform=disable_archive_logging:Y\n```\n\nWhile performing the import, the\
    \ logging attributes for objects are set to NO; after the import the logging attributes\
    \ are set back to their original values. For operations that Data Pump can perform\
    \ with direct path (such as inserting into a table), this can reduce the amount\
    \ of redo generated during an import.\n\nInteractive Command Mode\n\nData Pump\
    \ provides an interactive command mode that allows you to monitor the status of\
    \ a Data Pump job and modify on the fly a number of job characteristics. The interactive\
    \ command mode is most useful for long-running Data Pump operations. In this mode,\
    \ you can also stop, restart, or terminate a currently running job. Each of these\
    \ activities is discussed in the following sections.\n\nEntering Interactive Command\
    \ Mode\n\nThere are two ways to access the interactive command mode prompt:\n\n\
    *   Press Ctrl+C in a Data Pump job that you started via expdp or impdp.\n*  \
    \ Use the ATTACH parameter to attach to a currently running job.\n\nWhen you run\
    \ a Data Pump job from the command line, you’re placed in the command-line mode.\
    \ You should see output displayed to your terminal as a job progresses. If you\
    \ want to exit command-line mode, press Ctrl+C. This places you in the interactive\
    \ command-interface mode. For an export job, the prompt is\n\n```\nExport>\n```\n\
    \nType in the HELP command to view the export interactive commands available (see\
    \ [Table 13-1](#9781430257288_Ch13.xhtml#Tab1)):\n\n[Table 13-1.](#9781430257288_Ch13.xhtml#_Tab1)\
    \ Export Interactive Commands\n\n| Command | Description |\n| --- | --- |\n| ADD_FILE\
    \ | Adds files to the export dump set |\n| CONTINUE_CLIENT | Continues with interactive\
    \ client mode |\n| EXIT_CLIENT | Exits the client session and returns to the OS\
    \ prompt; leaves the current job running |\n| FILESIZE | Defines file size for\
    \ any subsequently created dump files |\n| HELP | Displays interactive export\
    \ commands |\n| KILL_JOB | Terminates the current job |\n| PARALLEL | Increases\
    \ or decreases the degree of parallelism |\n| REUSE_DUMPFILES | Overwrites the\
    \ dump file if it exists (default is N) |\n| START_JOB | Restarts the attached\
    \ job |\n| STATUS | Displays the status of the currently attached job |\n| STOP_JOB\
    \ [=IMMEDIATE] | Stops a job from processing (you can later restart it). Using\
    \ the IMMEDIATE parameter quickly stops the job, but there may be some incomplete\
    \ tasks. |\n\n```\nExport> help\n```\n\nType EXIT to leave interactive command\
    \ mode:\n\n```\nExport> exit\n```\n\nYou should now be at the OS prompt.\n\nYou\
    \ can press Ctrl+C for either an export or an import job. For an import job the\
    \ interactive command mode prompt is\n\n```\nImport>\n```\n\nTo view all commands\
    \ available, type HELP:\n\n```\nImport> help\n```\n\nThe interactive command mode\
    \ import commands are summarized in [Table 13-2](#9781430257288_Ch13.xhtml#Tab2).\n\
    \n[Table 13-2.](#9781430257288_Ch13.xhtml#_Tab2) Import Interactive Commands\n\
    \n| Command | Description |\n| --- | --- |\n| CONTINUE_CLIENT | Continues with\
    \ interactive logging mode |\n| EXIT_CLIENT | Exits the client session and returns\
    \ to the OS prompt. Leaves the current job running |\n| HELP | Displays the available\
    \ interactive commands |\n| KILL_JOB | Terminates the job currently connected\
    \ to in the client |\n| PARALLEL | Increases or decreases the degree of parallelism\
    \ |\n| START_JOB | Restarts a previously stopped job. START_JOB=SKIP_CURRENT restarts\
    \ the job and skips any operations that were active when the job was stopped |\n\
    | STATUS | Specifies the frequency at which the job status is monitored. Default\
    \ mode is 0; the client reports job status changes whenever available in this\
    \ mode. |\n| STOP_JOB [=IMMEDIATE] | Stops a job from processing (you can later\
    \ restart it). Using the IMMEDIATE parameter quickly stops the job, but there\
    \ may be some incomplete tasks. |\n\nType EXIT to leave the Data Pump status utility:\n\
    \n```\nImport> exit\n```\n\nYou should now be at the OS prompt.\n\nAttaching to\
    \ a Running Job\n\nOne powerful feature of Data Pump is that you can attach to\
    \ a currently running job and view its progress and status. If you have DBA privileges,\
    \ you can even attach to a job if you aren’t the owner. You can attach to either\
    \ an import or an export job via the ATTACH parameter.\n\nBefore you attach to\
    \ a job, you must first determine the Data Pump job name (and owner name, if you’re\
    \ not the owner of the job). Run the following SQL query to display currently\
    \ running jobs:\n\n```\nSQL> select owner_name, operation, job_name, state from\
    \ dba_datapump_jobs;\n```\n\nHere is some sample output:\n\n```\nOWNER_NAME OPERATION      \
    \ JOB_NAME              STATE\n---------- --------------- --------------------  --------------------\n\
    MV_MAINT   EXPORT          SYS_EXPORT_SCHEMA_01  EXECUTING\n```\n\nIn this example\
    \ the MV_MAINT user can directly attach to the export job, as shown:\n\n```\n\
    $ expdp mv_maint/foo attach=sys_export_schema_01\n```\n\nIf you aren’t the owner\
    \ of the job, you attach to the job by specifying the owner name and the job name:\n\
    \n```\n$ expdp system/foobar attach=mv_maint.sys_export_schema_01\n```\n\nYou\
    \ should now see the Data Pump command-line prompt:\n\n```\nExport>\n```\n\nType\
    \ STATUS to view the status of the currently attached job:\n\n```\nExport> status\n\
    ```\n\nStopping and Restarting a Job\n\nIf you have a currently running Data Pump\
    \ job that you want to temporarily stop, you can do so by first attaching to the\
    \ interactive command mode. You may want to stop a job to resolve space issues\
    \ or performance issues and then, after resolving the issues, restart the job.\
    \ This example attaches to an import job:\n\n```\n$ impdp mv_maint/foo attach=sys_import_table_01\n\
    ```\n\nNow, stop the job, using the STOP_JOB parameter:\n\n```\nImport> stop_job\n\
    ```\n\nYou should see this output:\n\n```\nAre you sure you wish to stop this\
    \ job ([yes]/no):\n```\n\nType YES to proceed with stopping the job. You can also\
    \ specify that the job be stopped immediately:\n\n```\nImport> stop_job=immediate\n\
    ```\n\nWhen you stop a job with the IMMEDIATE option, there may be some incomplete\
    \ tasks associated with the job. To restart a job, attach to interactive command\
    \ mode, and issue the START_JOB command:\n\n```\nImport> start_job\n```\n\nIf\
    \ you want to resume logging job output to your terminal, issue the CONTINUE_CLIENT\
    \ command:\n\n```\nImport> continue_client\n```\n\nTerminating a Data Pump Job\n\
    \nYou can instruct Data Pump to permanently kill an export or import job. First,\
    \ attach to the job in interactive command mode, and then issue the KILL_JOB command:\n\
    \n```\nImport> kill_job\n```\n\nYou should be prompted with the following output:\n\
    \n```\nAre you sure you wish to stop this job ([yes]/no):\n```\n\nType YES to\
    \ permanently kill the job. Data Pump unceremoniously kills the job and drops\
    \ the associated status table from the user running the export or import.\n\n\
    Monitoring Data Pump Jobs\n\nWhen you have long-running Data Pump jobs, you should\
    \ occasionally check the status of the job to ensure it hasn’t failed become suspended,\
    \ and so on. There are several ways to monitor the status of Data Pump jobs:\n\
    \n*   Screen output\n*   Data Pump log file\n*   Querying data dictionary views\n\
    *   Database alert log\n*   Querying the status table\n*   Interactive command\
    \ mode status\n*   Using the process status (ps) OS utility\n\nThe most obvious\
    \ way to monitor a job is to view the status that Data Pump displays on the screen\
    \ as the job is running. If you’ve disconnected from the command mode, then the\
    \ status is no longer displayed on your screen. In this situation, you must use\
    \ another technique to monitor a Data Pump job.\n\nData Pump Log File\n\nBy default,\
    \ Data Pump generates a log file for every job. When you start a Data Pump job,\
    \ it’s good practice to name a log file that is specific to that job:\n\n```\n\
    $ impdp mv_maint/foo directory=dp_dir dumpfile=archive.dmp logfile=archive.log\n\
    ```\n\nThis job creates a file, named archive.log, that is placed in the directory\
    \ referenced in the database object DP_DIR. If you don’t explicitly name a log\
    \ file, Data Pump import creates one named import.log, and Data Pump export creates\
    \ one named export.log.\n\n![image](Images/sq.jpg) **Note**   The log file contains\
    \ the same information you see displayed interactively on your screen when running\
    \ a Data Pump job.\n\nData Dictionary Views\n\nA quick way to determine whether\
    \ a Data Pump job is running is to check the DBA_DATAPUMP_JOBS view for anything\
    \ running with a STATE that has an EXECUTING status:\n\n```\nselect job_name,\
    \ operation, job_mode, state\nfrom dba_datapump_jobs;\n```\n\nHere is some sample\
    \ output:\n\n```\nJOB_NAME                  OPERATION            JOB_MODE   STATE\n\
    ------------------------- -------------------- ---------- ---------------\nSYS_IMPORT_TABLE_04      \
    \ IMPORT               TABLE      EXECUTING\nSYS_IMPORT_FULL_02        IMPORT              \
    \ FULL       NOT RUNNING\n```\n\nYou can also query the DBA_DATAPUMP_SESSIONS\
    \ view for session information via the following query:\n\n```\nselect sid, serial#,\
    \ username, process, program\nfrom v$session s,\n     dba_datapump_sessions d\n\
    where s.saddr = d.saddr;\n```\n\nHere is some sample output, showing that several\
    \ Data Pump sessions are in use:\n\n```\n      SID    SERIAL#  USERNAME            \
    \ PROCESS         PROGRAM\n---------- ---------- -------------------- ---------------\
    \ ----------------------\n      1049       6451 STAGING              11306          \
    \ oracle@xengdb (DM00)\n      1058      33126 STAGING              11338          \
    \ oracle@xengdb (DW01)\n      1048      50508 STAGING              11396          \
    \ oracle@xengdb (DW02)\n```\n\nDatabase Alert Log\n\nIf a job is taking much longer\
    \ than you expected, look in the database alert log for any messages similar to\
    \ this:\n\n```\nstatement in resumable session 'SYS_IMPORT_SCHEMA_02.1' was suspended\
    \ due to\nORA-01652: unable to extend temp segment by 64 in tablespace REG_TBSP_3\n\
    ```\n\nThis message indicates that a Data Pump import job is suspended and is\
    \ waiting for space to be added to the REG_TBSP_3 tablespace. After you add space\
    \ to the tablespace, the Data Pump job automatically resumes processing. By default\
    \ a Data Pump job waits 2 hours for space to be added.\n\n![image](Images/sq.jpg) **Note**  \
    \ In addition to writing to the alert log, for each Data Pump job, Oracle creates\
    \ a trace file in the ADR_HOME/trace directory. This file contains information\
    \ such as the session ID and when the job started. The trace file is named with\
    \ the following format: <SID>_dm00_<process_ID>.trc.\n\nStatus Table\n\nEvery\
    \ time you start a Data Pump job, a status table is automatically created in the\
    \ account of the user running the job. For export jobs the table name depends\
    \ on what type of export job you’re running. The table is named with the format\
    \ SYS_<OPERATION>_<JOB_MODE>_NN, where OPERATION is either EXPORT or IMPORT. JOB_MODE\
    \ can be FULL, SCHEMA, TABLE, TABLESPACE, and so on.\n\nHere is an example of\
    \ querying the status table for particulars about a currently running job:\n\n\
    ```\nselect name, object_name, total_bytes/1024/1024 t_m_bytes\n,job_mode\n,state\
    \ ,to_char(last_update, 'dd-mon-yy hh24:mi')\nfrom SYS_EXPORT_TABLE_01\nwhere\
    \ state='EXECUTING';\n```\n\nInteractive Command Mode Status\n\nA quick way to\
    \ verify that Data Pump is running a job is to attach in interactive command mode\
    \ and issue a STATUS command; for example,\n\n```\n$ impdp mv_maint/foo attach=SYS_IMPORT_TABLE_04\n\
    Import> status\n```\n\nHere is some sample output:\n\n```\nJob: SYS_IMPORT_TABLE_04\n\
    Operation: IMPORT\nMode: TABLE\nState: EXECUTING\nBytes Processed: 0\nCurrent\
    \ Parallelism: 4\n```\n\nYou should see a state of EXECUTING, which indicates\
    \ that the job is actively running. Other items to inspect in the output are the\
    \ number of objects and bytes processed. Those numbers should increase as the\
    \ job progresses.\n\nOS Utilities\n\nYou can use the ps OS utility to display\
    \ jobs running on the server. For example, you can search for master and worker\
    \ processes, as follows:\n\n```\n$ ps -ef | egrep 'ora_dm|ora_dw' | grep -v egrep\n\
    ```\n\nHere is some sample output:\n\n```\noracle 29871   717   5 08:26:39 ?          11:42\
    \ ora_dw01_STAGE\noracle 29848   717   0 08:26:33 ?           0:08 ora_dm00_STAGE\n\
    oracle 29979   717   0 08:27:09 ?           0:04 ora_dw02_STAGE\n```\n\nIf you\
    \ run this command multiple times, you should see the processing time (seventh\
    \ column) increase for one or more of the current jobs. This is a good indicator\
    \ that Data Pump is still executing and doing work.\n\nData Pump Legacy Mode\n\
    \nThis feature is covered last in this chapter, but it’s quite useful, especially\
    \ if you’re an old-school DBA. As of Oracle Database 11g Release 2, Data Pump\
    \ allows you to use the old exp and imp utility parameters when invoking a Data\
    \ Pump job. This is known as legacy mode, and it’s a great feature.\n\nYou don’t\
    \ have to do anything special to use legacy mode Data Pump. As soon as Data Pump\
    \ detects a legacy parameter, it attempts to process the parameter as if it were\
    \ from the old exp/imp utilities. You can even mix and match old legacy parameters\
    \ with newer parameters; for example,\n\n```\n$ expdp mv_maint/foo consistent=y\
    \ tables=inv directory=dp_dir\n```\n\nIn the output, Data Pump indicates that\
    \ it has encountered legacy parameters and gives you the syntax for what it translated\
    \ the legacy parameter to in Data Pump syntax. For the previous command, here\
    \ is the output from the Data Pump session that shows what the consistent=y parameter\
    \ was translated into:\n\n```\nLegacy Mode Parameter: \"consistent=TRUE\" Location:\
    \ Command Line,\nReplaced with:\n\"flashback_time=TO_TIMESTAMP('2013-01-25 19:31:54',\
    \ 'YYYY-MM-DD HH24:MI:SS')\"\n```\n\nThis feature can be extremely handy, particularly\
    \ if you’re really familiar with the old legacy syntax and wonder how it’s implemented\
    \ in Data Pump.\n\nI recommend that you try to use the newer Data Pump syntax\
    \ whenever possible. However, you may run into situations in which you have legacy\
    \ exp/imp jobs and want to continue running the scripts as they are, without modification.\n\
    \n![image](Images/sq.jpg) **Note**   When Data Pump runs in legacy mode, it doesn’t\
    \ create an old exp-/imp-formatted file. Data Pump always creates a Data Pump\
    \ file and can only read Data Pump files.\n\nData Pump Mapping to the exp Utility\n\
    \nIf you’re used to the old exp/imp parameters, you may initially be confused\
    \ by some of the syntax semantics. However, after you use Data Pump, you’ll find\
    \ the newer syntax fairly easy to remember and use. [Table 13-3](#9781430257288_Ch13.xhtml#Tab3)\
    \ describes how the legacy export parameters map to Data Pump export.\n\nIn many\
    \ instances, there isn’t a one-to-one mapping. Often, Data Pump automatically\
    \ provides features that used to require a parameter in the legacy utilities.\
    \ For example, whereas you used to have to specify DIRECT=Y to get a direct path\
    \ export, Data Pump automatically uses direct path whenever possible.\n\n[Table\
    \ 13-3.](#9781430257288_Ch13.xhtml#_Tab3) Mapping of Old Export Parameters to\
    \ Data Pump\n\n| Original exp Parameter | Similar Data Pump expdp Parameter |\n\
    | --- | --- |\n| BUFFER | N/A |\n| COMPRESS | TRANSFORM |\n| CONSISTENT | FLASHBACK_SCN\
    \ or FLASHBACK_TIME |\n| CONSTRAINTS | EXCLUDE=CONSTRAINTS |\n| DIRECT | N/A;\
    \ Data Pump automatically uses direct path whenever possible. |\n| FEEDBACK |\
    \ STATUS in client output |\n| FILE | Database directory object and DUMPFILE |\n\
    | GRANTS | EXCLUDE=GRANT |\n| INDEXES | INCLUDE=INDEXES, INCLUDE=INDEXES |\n|\
    \ LOG | Database directory object and LOGFILE |\n| OBJECT_CONSISTENT | N/A |\n\
    | OWNER | SCHEMAS |\n| RECORDLENGTH | N/A |\n| RESUMABLE | N/A; Data Pump automatically\
    \ provides functionality. |\n| RESUMABLE_NAME | N/A |\n| RESUMABLE_TIMEOUT | N/A\
    \ |\n| ROWS | CONTENT=ALL |\n| STATISTICS | N/A; Data Pump export always exports\
    \ statistics for tables. |\n| TABLESPACES | TRANSPORT_TABLESPACES |\n| TRANSPORT_TABLESPACE\
    \ | TRANSPORT_TABLESPACES |\n| TRIGGERS | EXCLUDE=TRIGGER |\n| TTS_FULL_CHECK\
    \ | TRANSPORT_FULL_CHECK |\n| VOLSIZE | N/A; Data Pump doesn’t support tape devices.\
    \ |\n\nData Pump Mapping to the imp Utility\n\nAs with Data Pump export, Data\
    \ Pump import often doesn’t have a one-to-one mapping of the legacy utility parameter.\
    \ Data Pump import automatically provides many features of the old imp utility.\
    \ For example, COMMIT=Y isn’t required because Data Pump import automatically\
    \ commits after each table is imported. [Table 13-4](#9781430257288_Ch13.xhtml#Tab4)\
    \ describes how the legacy import parameters map to Data Pump import.\n\n[Table\
    \ 13-4.](#9781430257288_Ch13.xhtml#_Tab4) Mapping of Old Import Parameters to\
    \ Data Pump\n\n| Original imp Parameter | Similar Data Pump impdp Parameter |\n\
    | --- | --- |\n| BUFFER | N/A |\n| CHARSET | N/A |\n| COMMIT | N/A; Data Pump\
    \ import automatically commits after each table is exported. |\n| COMPILE | N/A;\
    \ Data Pump import compiles procedures after they’re created. |\n| CONSTRAINTS\
    \ | EXCLUDE=CONSTRAINT |\n| DATAFILES | TRANSPORT_DATAFILES |\n| DESTROY | REUSE_DATAFILES=y\
    \ |\n| FEEDBACK | STATUS in client output |\n| FILE | Database directory object\
    \ and DUMPFILE |\n| FILESIZE | N/A |\n| FROMUSER | REMAP_SCHEMA |\n| GRANTS |\
    \ EXCLUDE=OBJECT_GRANT |\n| IGNORE | TABLE_EXISTS_ACTION, with APPEND, REPLACE,\
    \ SKIP, or TRUNCATE |\n| INDEXES | EXCLUDE=INDEXES |\n| INDEXFILE | SQLFILE |\n\
    | LOG | Database directory object and LOGFILE |\n| RECORDLENGTH | N/A |\n| RESUMABLE\
    \ | N/A; this functionality is automatically provided. |\n| RESUMABLE_NAME | N/A\
    \ |\n| RESUMABLE_TIMEOUT | N/A |\n| ROWS=N | CONTENT, with METADATA_ONLY or ALL\
    \ |\n| SHOW | SQLFILE |\n| STATISTICS | N/A |\n| STREAMS_CONFIGURATION | N/A |\n\
    | STREAMS_INSTANTIATION | N/A |\n| TABLESPACES | TRANSPORT_TABLESPACES |\n| TOID_NOVALIDATE\
    \ | N/A |\n| TOUSER | REMAP_SCHEMA |\n| TRANSPORT_TABLESPACE | TRANSPORT_TABLESPACES\
    \ |\n| TTS_OWNERS | N/A |\n| VOLSIZE | N/A; Data Pump doesn’t support tape devices.\
    \ |\n\nSummary\n\nData Pump is an extremely powerful and feature-rich tool. If\
    \ you haven’t used Data Pump much, then I recommend that you take some time to\
    \ reread this chapter and work through the examples. This tool greatly simplifies\
    \ tasks such as moving users and data from one environment to another. You can\
    \ export and import subsets of users, filter and remap data via SQL and PL/SQL,\
    \ rename users and tablespaces, compress, encrypt, and parallelize, all with one\
    \ command. It really is that powerful.\n\nDBAs sometimes stick with the old exp/imp\
    \ utilities because that’s what they’re familiar with (I’m occasionally guilty\
    \ of this). If you’re running Oracle Database 11g Release 2, you can use the old\
    \ exp/imp parameters and options directly from the command line. Data Pump translates\
    \ these parameters on the fly to Data Pump–specific syntax. This feature nicely\
    \ facilitates the migration from the old to the new. For reference, I’ve also\
    \ provided a mapping of the old exp/imp syntax and how it relates to Data Pump\
    \ commands.\n\nAlthough Data Pump is an excellent tool for moving database objects\
    \ and data from one environment to another, sometimes you need to transfer large\
    \ quantities of data to and from OS flat files. You use external tables to achieve\
    \ this task. This is the topic of the next chapter in this book.\n\nCHAPTER 14\n\
    \n![image](Images/frontdot.jpg)\n\nExternal Tables\n\nSometimes, DBAs and developers\
    \ don’t grasp the utility of external tables. The Oracle external table feature\
    \ enables you to perform two distinct operations:\n\n*   Transparently select\
    \ information from OS comma-separated-value (CSV) files via SQL, which allows\
    \ you to do tasks such as loading these files into the database.\n*   Create platform-independent\
    \ dump files that can be used to transfer data. You can also create these files\
    \ as compressed and encrypt them for efficient and secure data transportation.\n\
    \n![image](Images/sq.jpg) **Tip**   CSV files are also commonly known as flat\
    \ files.\n\nOne common use of an external table is the selection of data from\
    \ an OS CSV (flat) file via SQL *Plus. When using an external table in this mode,\
    \ you must specify the type of data in the file and how the data are organized.\
    \ You can select from an external table but aren’t permitted to modify the contents\
    \ (no inserts, updates, or deletes).\n\nYou can also use an external table feature\
    \ that enables you to select data from the database and write that information\
    \ to a binary dump file. The definition of the external table determines what\
    \ tables and columns will be used to unload data. Using an external table in this\
    \ mode provides a method for extracting large amounts of data to a platform-independent\
    \ file that you can later load into a different database.\n\nAll that is required\
    \ to enable external tables is to first create a database directory object that\
    \ specifies the location of the OS file. Then, you use the CREATE TABLE...ORGANIZATION\
    \ EXTERNAL statement to make the database aware of OS files that can be used as\
    \ sources or targets of data.\n\nThis chapter starts by comparing using SQL*Loader—Oracle’s\
    \ traditional data-loading utility—with external tables for the loading of data\
    \ into the database. Several examples illustrate the flexibility and power of\
    \ using external tables as a loading and data-transformation tool. The chapter\
    \ finishes with an external table example of how to unload data into a dump file.\n\
    \nSQL*Loader vs. External Tables\n\nOne general use of an external table is to\
    \ employ SQL to load data from an OS file into a regular database table. This\
    \ facilitates the loading of large amounts of data from flat files into the database.\
    \ In older versions of Oracle, this type of loading was performed via SQL*Loader\
    \ or through custom Pro*C programs.\n\nAlmost anything you can do with SQL*Loader,\
    \ you can achieve with external tables. External tables are more flexible and\
    \ intuitive than SQL*Loader. Additionally, you can obtain very good performance\
    \ when loading data with external tables by using direct path and parallel features.\n\
    \nA quick comparison of SQL*Loader and external tables highlights the differences.\
    \ Listed next are the  steps that you use to load and transform data with SQL*Loader:\n\
    \n1.  Create a parameter file that SQL*Loader uses to interpret the format of\
    \ the data in the OS file.\n2.  Create a regular database table into which SQL*Loader\
    \ will insert records. The data will be staged here until they can be further\
    \ processed.\n3.  Run the SQL*Loader sqlldr utility to load data from the OS file\
    \ into the database table (created in step 2). When loading data, SQL*Loader has\
    \ some features that allow you to transform data. This step is sometimes frustrating\
    \ because it can take several trial-and-error runs to correctly map the parameter\
    \ file to the table and corresponding columns.\n4.  Create another table that\
    \ will contain the completely transformed data.\n5.  Run SQL to extract the data\
    \ from the staging table (created in step 2), and then transform and insert the\
    \ data into the production table (created in step 4).\n\nCompare the previous\
    \ SQL*Loader list to the following steps for loading and transforming data, using\
    \ external tables:\n\n1.  Execute a CREATE TABLE...ORGANIZATION EXTERNAL script\
    \ that maps the structure of the OS file to table columns. After this script is\
    \ run, you can directly use SQL to query the contents of the OS file.\n2.  Create\
    \ a regular table to hold the completely transformed data.\n3.  Run SQL statements\
    \ to load and fully transform the data from the external table (created in step\
    \ 1) into the table created in step 2.\n\nFor many shops, SQL*Loader underpins\
    \ large data-loading operations. It continues to be a good tool for that task.\
    \ However, you may want to investigate using external tables. External tables\
    \ have the following advantages:\n\n*   Loading data with external tables is more\
    \ straightforward and requires fewer steps.\n*   The interface for creating and\
    \ loading from external tables is SQL*Plus. Many DBAs/developers find SQL*Plus\
    \ more intuitive and powerful than SQL*Loader’s parameter file interface.\n* \
    \  You can view data (via SQL) in an external table before they’re loaded into\
    \ a database table.\n*   You can load, transform, and aggregate the data without\
    \ an intermediate staging table. For large amounts of data, this can be a huge\
    \ space savings.\n\nThe next several sections contain examples of using external\
    \ tables to read from OS files.\n\nLoading CSV Files into the Database\n\nYou\
    \ can load small or very large CSV flat files into the database, using external\
    \ tables and SQL. [Figure 14-1](#9781430257288_Ch14.xhtml#Fig1) shows the architectural\
    \ components involved with using an external table to view and load data from\
    \ an OS file. A directory object is required that specifies the location of the\
    \ OS file. The CREATE TABLE...ORGANIZATION EXTERNAL statement creates a database\
    \ object that SQL*Plus can use to directly select from the OS file.\n\n![9781430257288_Fig14-01.jpg](Images/9781430257288_Fig14-01.jpg)\n\
    \n[Figure 14-1](#9781430257288_Ch14.xhtml#_Fig1). Architectural components of\
    \ an external table used to read a flat file\n\nHere are the steps for using an\
    \ external table to access an OS flat file:\n\n1.  Create a database directory\
    \ object that points to the location of the CSV file.\n2.  Grant read and write\
    \ privileges on the directory object to the user creating the external table.\
    \ I usually use a DBA-privileged account, so I don’t need to perform this step.\n\
    3.  Run the CREATE TABLE...ORGANIZATION EXTERNAL statement.\n4.  Use SQL*Plus\
    \ to access the contents of the CSV file.\n\nIn this example the flat file is\
    \ named ex.csv and is located in the /u01/et directory. It contains the following\
    \ data:\n\n```\n5|2|0|0|12/04/2011|Half\n6|1|0|1|09/06/2012|Quarter\n7|4|0|1|08/10/2012|Full\n\
    8|1|1|0|06/15/2012|Quarter\n```\n\n![image](Images/sq.jpg) **Note**   Some of\
    \ the CSV file examples in this chapter are separated by characters other than\
    \ a comma, such as a pipe (|). The character used depends on the data and the\
    \ user supplying the CSV file. A comma isn’t always useful as the delimiter, as\
    \ the data being loaded may contain commas as valid characters within the data.\n\
    \nCreating a Directory Object and Granting Access\n\nFirst, create a directory\
    \ object that points to the location of the flat file on disk:\n\n```\nSQL> create\
    \ directory exa_dir as '/u01/et';\n```\n\nThis example uses a database account\
    \ that has the DBA role granted to it; therefore, you don’t need to grant READ\
    \ and WRITE on the directory object to the user (your account) that is accessing\
    \ the directory object. If you’re not using a DBA account to read from the directory\
    \ object, then grant these privileges to the account, using this object:\n\n```\n\
    SQL> grant read, write on directory exa_dir to reg_user;\n```\n\nCreating an External\
    \ Table\n\nThen, fashion the script that creates the external table that will\
    \ reference the flat file. The CREATE TABLE...ORGANIZATION EXTERNAL statement\
    \ provides the database with the following information:\n\n*   How to interpret\
    \ data in the flat file and a mapping of data in file to column definitions in\
    \ the database\n*   A DEFAULT DIRECTORY clause that identifies the directory object,\
    \ which in turn specifies the directory of the flat file on disk\n*   The LOCATION\
    \ clause, which identifies the name of the flat file\n\nThe next statement creates\
    \ a database object that looks like a table but that is able to retrieve data\
    \ directly from the flat file:\n\n```\ncreate table exadata_et(\n  exa_id        NUMBER\n\
     ,machine_count NUMBER\n ,hide_flag     NUMBER\n ,oracle        NUMBER\n ,ship_date    \
    \ DATE\n ,rack_type     VARCHAR2(32)\n)\norganization external (\n  type              oracle_loader\n\
      default directory exa_dir\n  access parameters\n  (\n    records delimited  by\
    \ newline\n    fields  terminated by '|'\n    missing field values are null\n\
        (exa_id\n    ,machine_count\n    ,hide_flag\n    ,oracle\n    ,ship_date char\
    \ date_format date mask \"mm/dd/yyyy\"\n    ,rack_type)\n   )\n  location ('ex.csv')\n\
    )\nreject limit unlimited;\n```\n\nAn external table named EXADATA_ET is created\
    \ when you execute this script. Now, use SQL*Plus to view the contents of the\
    \ flat file:\n\n```\nSQL> select * from exadata_et;\n\n    EXA_ID MACHINE_COUNT  HIDE_FLAG    \
    \ ORACLE SHIP_DATE  RACK_TYPE\n---------- ------------- ---------- ----------\
    \ ---------- --------------------\n         5             2          0          0\
    \ 04-DEC-11  Half\n         6             1          0          1 06-SEP-12  Quarter\n\
             7             4          0          1 10-AUG-12  Full\n         8            \
    \ 1          1          0 15-JUN-12  Quarter\n```\n\nGenerating SQL to Create\
    \ an External Table\n\nIf you’re currently working with SQL*Loader and want to\
    \ convert to using external tables, you can use SQL*Loader to generate the SQL\
    \ required to create the external table, using the EXTERNAL_TABLE option. A small\
    \ example will help demonstrate this process. Suppose you have the following table\
    \ DDL:\n\n```\ncreate table books\n(book_id number,\n book_desc varchar2(30));\n\
    ```\n\nIn this situation, you want to load the following data from a CSV file\
    \ into the BOOKS table. The data are in a file named books.dat and are as follows:\n\
    \n```\n1|RMAN Recipes\n2|Linux for DBAs\n3|SQL Recipes\n```\n\nYou also have a\
    \ books.ctl SQL*Loader control file that contains the following data:\n\n```\n\
    load data\nINFILE 'books.dat'\nINTO TABLE books\nAPPEND\nFIELDS TERMINATED BY\
    \ '|'\n(book_id,\n book_desc)\n```\n\nYou can use SQL*Loader with the EXTERNAL_TABLE=GENERATE_ONLY\
    \ clause to generate the SQL required to create an external table; for example,\n\
    \n```\n$ sqlldr dk/f00 control=books.ctl log=books.log external_table=generate_only\n\
    ```\n\nThe prior line of code doesn’t load any data. Rather it creates a file,\
    \ named books.log, that contains the SQL required to create an external table.\
    \ Here is a partial listing of the code generated:\n\n```\nCREATE TABLE \"SYS_SQLLDR_X_EXT_BOOKS\"\
    \n(\n  \"BOOK_ID\" NUMBER,\n  \"BOOK_DESC\" VARCHAR2(30)\n)\nORGANIZATION external\n\
    (\n  TYPE oracle_loader\n  DEFAULT DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000\n  ACCESS\
    \ PARAMETERS\n  (\n    RECORDS DELIMITED BY NEWLINE CHARACTERSET US7ASCII\n    BADFILE\
    \ 'SYS_SQLLDR_XT_TMPDIR_00000':'books.bad'\n    LOGFILE 'books.log_xt'\n    READSIZE\
    \ 1048576\n    FIELDS TERMINATED BY \"|\" LDRTRIM\n    REJECT ROWS WITH ALL NULL\
    \ FIELDS\n    (\n      \"BOOK_ID\" CHAR(255)\n        TERMINATED BY \"|\",\n      \"\
    BOOK_DESC\" CHAR(255)\n        TERMINATED BY \"|\"\n    )\n  )\n  location\n  (\n\
        'books.dat'\n  )\n)REJECT LIMIT UNLIMITED;\n```\n\nBefore you run the prior\
    \ code, create a directory that points to the location of the books.dat file;\
    \ for example,\n\n```\nSQL> create or replace directory SYS_SQLLDR_XT_TMPDIR_00000\n\
         as '/u01/sqlldr';\n```\n\nNow, if you run the SQL code generated by SQL*Loader,\
    \ you should be able to view the data in the SYS_SQLLDR_X_EXT_BOOKS table:\n\n\
    ```\nSQL> select * from SYS_SQLLDR_X_EXT_BOOKS;\n```\n\nHere is the expected output:\n\
    \n```\n   BOOK_ID BOOK_DESC\n---------- ------------------------------\n        \
    \ 1 RMAN Recipes\n         2 Linux for DBAs\n         3 SQL Recipes\n```\n\nThis\
    \ is a powerful technique, especially if you already have existing SQL*Loader\
    \ control files and want to ensure that you have the correct syntax when converting\
    \ to external tables.\n\nViewing External Table Metadata\n\nAt this point, you\
    \ can also view metadata regarding the external table. Query the DBA_EXTERNAL_TABLES\
    \ view for details:\n\n```\nselect\n owner\n,table_name\n,default_directory_name\n\
    ,access_parameters\nfrom dba_external_tables;\n```\n\nHere is a partial listing\
    \ of the output:\n\n```\nOWNER      TABLE_NAME      DEFAULT_DIRECTORY_NA ACCESS_PARAMETERS\n\
    ---------- --------------- -------------------- --------------------\nSYS        EXADATA_ET      EXA_DIR              records\
    \ delimited ...\n```\n\nAdditionally, you can select from the DBA_EXTERNAL_LOCATIONS\
    \ table for information regarding any flat files referenced in an external table:\n\
    \n```\nselect\n owner\n,table_name\n,location\nfrom dba_external_locations;\n\
    ```\n\nHere is some sample output:\n\n```\nOWNER      TABLE_NAME      LOCATION\n\
    ---------- --------------- --------------------\nSYS        EXADATA_ET      ex.csv\n\
    ```\n\nLoading a Regular Table from the External Table\n\nNow, you can load data\
    \ contained in the external table into a regular database table. When you do this,\
    \ you can take advantage of Oracle’s direct-path loading and parallel features.\
    \ This example creates a regular database table that will be loaded with data\
    \ from the external table:\n\n```\ncreate table exa_info(\n  exa_id        NUMBER\n\
     ,machine_count NUMBER\n ,hide_flag     NUMBER\n ,oracle        NUMBER\n ,ship_date    \
    \ DATE\n ,rack_type     VARCHAR2(32)\n) nologging parallel 2;\n```\n\nYou can\
    \ direct-path load this regular table (via the APPEND hint) from the contents\
    \ of the external table, as follows:\n\n```\nSQL> insert /*+ APPEND */ into exa_info\
    \ select * from exadata_et;\n```\n\nYou can verify that the table was direct-path\
    \ loaded by attempting to select from it before you commit the data:\n\n```\n\
    SQL> select * from exa_info;\n```\n\nHere is the expected error:\n\n```\nORA-12838:\
    \ cannot read/modify an object after modifying it in parallel\n```\n\nAfter you\
    \ commit the data, you can select from the table:\n\n```\nSQL> commit;\nSQL> select\
    \ * from exa_info;\n```\n\nThe other way to direct-path load a table is to use\
    \ the CREATE TABLE AS SELECT (CTAS) statement. A CTAS statement automatically\
    \ attempts to do a direct-path load. In this example the EXA_INFO table is created\
    \ and loaded in one statement:\n\n```\nSQL> create table exa_info nologging parallel\
    \ 2 as select * from exadata_et;\n```\n\nBy using direct-path loading and parallelism,\
    \ you can achieve loading performance similar to that of SQL*Loader. The advantage\
    \ of using SQL to create a table from an external table is that you can perform\
    \ complex data transformations using standard SQL*Plus features when building\
    \ your regular database table (EXA_INFO, in this example).\n\nAny CTAS statements\
    \ automatically process with the degree of parallelism that has been defined for\
    \ the underlying table. However, when you use INSERT AS SELECT statements, you\
    \ need to enable parallelism for the session:\n\n```\nSQL> alter session enable\
    \ parallel dml;\n```\n\nAs a last step, you should generate statistics for any\
    \ table that has been loaded with a large amount of data. Here is an example:\n\
    \n```\nexec dbms_stats.gather_table_stats(-\n ownname=>'SYS',-\n tabname=>'EXA_INFO',-\n\
     estimate_percent => 20, -\n cascade=>true);\n```\n\nPerforming Advanced Transformations\n\
    \nOracle provides sophisticated techniques for transforming data. This section\
    \ details how to use a pipelined function to transform data in an external table.\
    \ Listed next are the steps for doing this:\n\n1.  Create an external table.\n\
    2.  Create a record type that maps to the columns in the external table.\n3. \
    \ Create a table, based on the record type created in step 2.\n4.  Create a pipelined\
    \ function that is used to inspect each row as it’s loaded and to transform data,\
    \ based on business requirements.\n5.  Use an INSERT statement that selects from\
    \ the external table and that uses the pipelined function to transform data as\
    \ they’re loaded.\n\nThis example uses the same external table and CSV file created\
    \ in the section,  “Loading CSV Files into the Database,” earlier in this chapter.\
    \ Recall that the external table name is EXADATA_ET and that the CSV file name\
    \ is ex.csv. After you create the external table, then create a record type that\
    \ maps to the column names in the external table:\n\n```\ncreate or replace type\
    \ rec_exa_type\n\nis object\n(\n  exa_id        number\n ,machine_count number\n\
     ,hide_flag     number\n ,oracle        number\n ,ship_date     date\n ,rack_type    \
    \ varchar2(32)\n);\n/\n```\n\nNext, create a table based on the previous record\
    \ type:\n\n```\ncreate or replace type table_exa_type is table of rec_exa_type;\n\
    /\n```\n\nOracle PL/SQL allows you to use functions as a row source for SQL operations.\
    \ This feature is known as pipelining. It lets you use complex transformation\
    \ logic, combined with the power of SQL*Plus. For this example, you create a pipelined\
    \ function to transform selected column data as they’re loaded. Specifically,\
    \ this function adds 30 days to the SHIP_DATE when the ORACLE column has a 0 value:\n\
    \n```\ncreate or replace function exa_trans\nreturn table_exa_type pipelined is\n\
    begin\nfor r1 in\n   (select rec_exa_type(\n      exa_id, machine_count, hide_flag\n\
         ,oracle, ship_date, rack_type\n    ) exa_rec\n    from exadata_et) loop\n\
      if (r1.exa_rec.oracle = 0) then\n    r1.exa_rec.ship_date := r1.exa_rec.ship_date\
    \ + 30;\n  end if;\n pipe row (r1.exa_rec);\nend loop;\nreturn;\nend;\n/\n```\n\
    \nNow, you can use this function to load data into a regular database table. For\
    \ reference, here is the CREATE TABLE statement that instantiates the table to\
    \ be loaded:\n\n```\ncreate table exa_info(\n  exa_id        NUMBER\n ,machine_count\
    \ NUMBER\n ,hide_flag     NUMBER\n ,oracle        NUMBER\n ,ship_date     DATE\n\
     ,rack_type     VARCHAR2(32)\n) nologging parallel 2;\n```\n\nNext, use the pipelined\
    \ function to transform data selected from the external table and insert them\
    \ into the regular database table, in one step:\n\n```\nSQL> insert into exa_info\
    \ select * from table(exa_trans);\n```\n\nHere is the data that are loaded into\
    \ the EXA_INFO table for this example:\n\n```\nSQL> select * from exa_info;\n\
    ```\n\nHere is some sample output, showing that the rows with a value of 0 in\
    \ the ORACLE column have had 30 days added to the date:\n\n```\n    EXA_ID MACHINE_COUNT  HIDE_FLAG    \
    \ ORACLE SHIP_DATE  RACK_TYPE\n---------- ------------- ---------- ----------\
    \ ---------- -----------\n         5             2          0          0 03-JAN-12  Half\n\
             6             1          0          1 06-SEP-12  Quarter\n         7            \
    \ 4          0          1 10-AUG-12  Full\n         8             1          1          0\
    \ 15-JUL-12  Quarter\n```\n\nAlthough the example in this section is simple, you\
    \ can use the technique to apply any level of transformational logic. This technique\
    \ allows you to embed the transformation requirements in a pipelined PL/SQL function\
    \ that modifies data as each row is loaded.\n\nViewing Text Files from SQL\n\n\
    External tables allow you to use SQL SELECT statements to retrieve information\
    \ from OS flat files. For example, say you want to report on the contents of the\
    \ alert log file. First, create a directory object that points to the location\
    \ of the alert log:\n\n```\nSQL> select value from v$diag_info where name = 'Diag\
    \ Trace';\n```\n\nHere is the output for this example:\n\n```\n/ora01/app/oracle/diag/rdbms/o12c/o12c/trace\n\
    ```\n\nNext, create a directory object that points to the diagnostic trace directory:\n\
    \n```\nSQL> create directory t_loc as '/ora01/app/oracle/diag/rdbms/o12c/o12c/trace';\n\
    ```\n\nNow, create an external table that maps to the database alert log OS file.\
    \ In this example the database name is o12c, and thus the alert log file name\
    \ is alert_o12c.log:\n\n```\ncreate table alert_log_file(\n  alert_text varchar2(4000))\n\
    organization external\n( type              oracle_loader\n  default directory\
    \ t_loc\n  access parameters (\n    records delimited by newline\n    nobadfile\n\
        nologfile\n    nodiscardfile\n    fields terminated by '#$∼=ui$X'\n    missing\
    \ field values are null\n    (alert_text)\n  )\n  location ('alert_o12c.log')\n\
    )\nreject limit unlimited;\n```\n\nYou can query the table via SQL queries; for\
    \ example,\n\n```\nSQL> select * from alert_log_file where alert_text like 'ORA-%';\n\
    ```\n\nThis allows you to use SQL to view and report on the contents of the alert\
    \ log. You may find this a convenient way to provide SQL access to otherwise inaccessible\
    \ OS files.\n\nThe ACCESS PARAMETERS clause of an external table’s ORACLE_LOADER\
    \ access driver may look familiar if you’ve previously worked with SQL*Loader.\
    \ [Table 14-1](#9781430257288_Ch14.xhtml#Tab1) describes some of the more commonly\
    \ used access parameters. See the *Oracle Database Utilities Guide*, which can\
    \ be freely downloaded from the Technology Network area of the Oracle web site\
    \ ([http://otn.oracle.com](http://otn.oracle.com)), for a full list of access\
    \ parameters.\n\n[Table 14-1.](#9781430257288_Ch14.xhtml#_Tab1) Selected Access\
    \ Parameters for the ORACLE_LOADER Driver\n\n| Access Parameter | Description\
    \ |\n| --- | --- |\n| DELIMITED BY | Indicates which character delimits the fields\
    \ |\n| TERMINATED BY | Indicates how a field is terminated |\n| FIXED | Specifies\
    \ the size of records having a fixed length |\n| BADFILE | Name of the file that\
    \ stores records that can’t be loaded because of an error |\n| NOBADFILE | Specifies\
    \ that a file shouldn’t be created to hold records that can’t be loaded because\
    \ of errors |\n| LOGFILE | Name of the file in which general messages are recorded\
    \ when creating an external table |\n| NOLOGFILE | Specifies that no log file\
    \ should be created |\n| DISCARDFILE | Names the file to which records are written\
    \ that fail the LOAD WHEN clause |\n| NODISCARDFILE | Specifies that no discard\
    \ file should be created |\n| SKIP | Skips the specified number of records in\
    \ the file before loading |\n| PREPROCESSOR | Specifies the user-named program\
    \ that runs and modifies the contents of the file before Oracle loads the data\
    \ |\n| MISSING FIELD VALUES ARE NULL | Loads fields that have no data as NULL\
    \ values |\n\nUnloading and Loading Data Using an External Table\n\nExternal tables\
    \ may also be used to select data from a regular database table and create a binary\
    \ dump file. This is known as unloading data. The advantage of this technique\
    \ is that the dump file is platform independent and can be used to move large\
    \ amounts of data between servers of different platforms.\n\nYou can also encrypt\
    \ or compress data, or both, when creating the dump file. Doing so provides you\
    \ with an efficient and secure way of transporting databases between database\
    \ servers.\n\n[Figure 14-2](#9781430257288_Ch14.xhtml#Fig2) illustrates the components\
    \ involved in using an external table to unload and load data. On the source database\
    \ (database A), you create a dump file, using an external table that selects data\
    \ from a table named INV. After it’s created, you copy the dump file to a destination\
    \ server (database B) and subsequently load the file into the database, using\
    \ an external table.\n\n![9781430257288_Fig14-02.jpg](Images/9781430257288_Fig14-02.jpg)\n\
    \n[Figure 14-2](#9781430257288_Ch14.xhtml#_Fig2). Using external tables to unload\
    \ and load data\n\nA small example illustrates the technique of using an external\
    \ table to unload data. Here are the steps required:\n\n1.  Create a directory\
    \ object that specifies where you want the dump file placed on disk. If you’re\
    \ not using a DBA account, then grant read and write access to the directory object\
    \ to the database user that needs access.\n2.  Use the CREATE TABLE...ORGANIZATION\
    \ EXTERNAL...AS SELECT statement to unload data from the database into the dump\
    \ file.\n\nFirst, create a directory object. The next bit of code creates a directory\
    \ object, named DP, that points to the /oradump directory:\n\n```\nSQL> create\
    \ directory dp as '/oradump';\n```\n\nIf you’re not using a user with DBA privileges,\
    \ then explicitly grant access to the directory object to the required user:\n\
    \n```\nSQL> grant read, write on directory dp to larry;\n```\n\nThis example depends\
    \ on a table named INV; for reference, here is the DDL for the INV table:\n\n\
    ```\nCREATE TABLE inv\n(inv_id NUMBER,\n inv_desc VARCHAR2(30));\n```\n\nTo create\
    \ a dump file, use the ORACLE_DATAPUMP access driver of the CREATE TABLE...ORGANIZATION\
    \ EXTERNAL statement. This example unloads the INV table’s contents into the inv.dmp\
    \ file:\n\n```\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
      DEFAULT DIRECTORY dp\n  LOCATION ('inv.dmp')\n)\nAS SELECT * FROM inv;\n```\n\
    \nThe previous command creates two things:\n\n*   An external table named INV_ET,\
    \ based on the structure and data within the INV table\n*   A platform-independent\
    \ dump file named inv.dmp\n\nNow, you can copy the inv.dmp file to a separate\
    \ database server and base an external table on this dump file. The remote server\
    \ (to which you copy the dump file) can be a platform different from the server\
    \ on which you created the file. For example, you can create a dump file on a\
    \ Windows box, copy to a Unix/Linus server, and select from the dump file via\
    \ an external table. In this example the external table is named INV_DW:\n\n```\n\
    CREATE TABLE inv_dw\n(inv_id number\n,inv_desc varchar2(30))\nORGANIZATION EXTERNAL\
    \ (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  LOCATION ('inv.dmp')\n\
    );\n```\n\nAfter it’s created, you can access the external table data from SQL*Plus:\n\
    \n```\nSQL> select * from inv_dw;\n```\n\nYou can also create and load data into\
    \ regular tables, using the dump file:\n\n```\nSQL> create table inv as select\
    \ * from inv_dw;\n```\n\nThis provides a simple and efficient mechanism for transporting\
    \ data from one platform to another.\n\nEnabling Parallelism to Reduce Elapsed\
    \ Time\n\nTo maximize the unload performance when you create a dump file via an\
    \ external table, use the PARALLEL clause. This example creates two dump files,\
    \ in parallel:\n\n```\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
      DEFAULT DIRECTORY dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n)\nPARALLEL 2\nAS\
    \ SELECT * FROM inv;\n```\n\nTo access the data in the dump files, create a different\
    \ external table that references the two dump files:\n\n```\nCREATE TABLE inv_dw\n\
    (inv_id number\n,inv_desc varchar2(30))\nORGANIZATION EXTERNAL (\n  TYPE ORACLE_DATAPUMP\n\
      DEFAULT DIRECTORY dp\n  LOCATION ('inv1.dmp','inv2.dmp')\n);\n```\n\nYou can\
    \ now use this external table to select data from the dump files:\n\n```\nSQL>\
    \ select * from inv_dw;\n```\n\nCompressing a Dump File\n\nYou can create a compressed\
    \ dump file via an external table. For example, use the COMPRESS option of the\
    \ ACCESS PARAMETERS clause:\n\n```\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL\
    \ (\n  TYPE ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  ACCESS PARAMETERS (COMPRESSION\
    \ ENABLED BASIC)\n  LOCATION ('inv1.dmp')\n)\nAS SELECT * FROM inv;\n```\n\nYou\
    \ should see quite good compression ratios when using this option. In my testing,\
    \ the output dump file was 10 to 20 times smaller when compressed. Your mileage\
    \ may vary, depending on the type data being compressed.\n\nIn Oracle Database\
    \ 12c there are four levels of compression: BASIC, LOW, MEDIUM, and HIGH. Before\
    \ using compression, ensure that the COMPATIBLE initialization parameter is set\
    \ to 12.0.0 or higher.\n\n![image](Images/sq.jpg) **Note**   Using compression\
    \ requires the Oracle Enterprise Edition, along with the Advanced Compression\
    \ option.\n\nEncrypting a Dump File\n\nYou can also create an encrypted dump file,\
    \ using an external table. This example uses the ENCRYPTION option of the ACCESS\
    \ PARAMETERS clause:\n\n```\nCREATE TABLE inv_et\nORGANIZATION EXTERNAL (\n  TYPE\
    \ ORACLE_DATAPUMP\n  DEFAULT DIRECTORY dp\n  ACCESS PARAMETERS\n    (ENCRYPTION\
    \ ENABLED)\n  LOCATION ('inv1.dmp')\n)\nAS SELECT * FROM inv;\n```\n\nFor this\
    \ example to work, you need to have a security wallet in place and open for your\
    \ database.\n\n![image](Images/sq.jpg) **Note**   Using encryption requires the\
    \ Oracle Enterprise Edition along with the Advanced Security option.\n\nENABLING\
    \ AN ORACLE WALLET\n\nAn Oracle Wallet is the mechanism Oracle uses to enable\
    \ encryption. The wallet is an OS file that contains encryption keys. The wallet\
    \ is enabled via the following steps:\n\n1.  Modify the SQLNET.ORA file to contain\
    \ the location of the wallet:\n\n    ENCRYPTION_WALLET_LOCATION=\n\n    (SOURCE=(METHOD=FILE)\
    \ (METHOD_DATA=\n\n        (DIRECTORY=/ora01/app/oracle/product/12.1.0.1/db_1/network/admin)))\n\
    \n2.  Create the wallet file (ewallet.p12) with the ALTER SYSTEM command:\n\n\
    \    SQL> alter system set encryption key identified by foo;\n\n3.  Enable encryption:\n\
    \n    SQL> alter system set encryption wallet open identified by foo;\n\nSee the\
    \ *Oracle Advanced Security Administrator’s Guide*, which can be freely downloaded\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for full details on implementing encryption.\n\nYou enable compression and encryption\
    \ via the ACCESS PARAMETERS clause. [Table 14-2](#9781430257288_Ch14.xhtml#Tab2)\
    \ contains a listing of all access parameters available with the ORACLE_DATAPUMP\
    \ access driver.\n\n[Table 14-2.](#9781430257288_Ch14.xhtml#_Tab2) Parameters\
    \ of the ORACLE_DATAPUMP Access Driver\n\n| Access Parameter | Description |\n\
    | --- | --- |\n| COMPRESSION | Compresses the dump file; DISABLED is the default\
    \ value. |\n| ENCRYPTION | Encrypts the dump file; DISABLED is the default value.\
    \ |\n| NOLOGFILE | Suppresses the generation of a log file |\n| LOGFILE=[directory_object:]logfile_name\
    \ | Allows you to name a log file |\n| VERSION | Specifies the minimum version\
    \ of Oracle that can read the dump file |\n\nSummary\n\nI used to use SQL*Loader\
    \ for all types of data-loading tasks. In the past few years I’ve become an external\
    \ table convert. Almost anything you can do with SQL*Loader, you can also do with\
    \ an external table. The external table approach is advantageous because there\
    \ are fewer moving parts and because the interface is SQL*Plus. Most DBAs and\
    \ developers find SQL*Plus easier to use than a SQL*Loader control file.\n\nYou\
    \ can easily use an external table to enable SQL*Plus access to OS flat files.\
    \ You simply have to define the structure of the flat file in your CREATE TABLE...ORGANIZATION\
    \ EXTERNAL statement. After the external table is created, you can select directly\
    \ from the flat file, as if it were a database table. You can select from an external\
    \ table, but you can’t insert, update, or delete.\n\nWhen you create an external\
    \ table, if required, you can then create regular database tables by using CREATE\
    \ TABLE AS SELECT from the external table. Doing so provides a fast and effective\
    \ way to load data stored in external OS files.\n\nThe external table feature\
    \ also allows you to select data from a table and write them to a binary dump\
    \ file. The external table CREATE TABLE...ORGANIZATION EXTERNAL statement defines\
    \ which tables and columns are used to unload the data. A dump file created in\
    \ this manner is platform independent, meaning you can copy it to a server using\
    \ a different OS and seamlessly load the data. Additionally, the dump file can\
    \ be encrypted and compressed for secure and efficient transportation. You can\
    \ also use parallel features to reduce the amount of time it takes to create the\
    \ dump file.\n\nThe next chapter deals with materialized views. These database\
    \ objects provide you with a flexible, maintainable, and scalable mechanism for\
    \ aggregating and replicating data.\n\nCHAPTER 15\n\n![image](Images/frontdot.jpg)\n\
    \nMaterialized Views\n\nMaterialized view (MV) technology was introduced in Oracle\
    \ Database version 7\\. This feature was originally called snapshots, and you\
    \ can still see this nomenclature reflected in some data dictionary structures.\
    \ An MV allows you to execute an SQL query at a point in time and store the result\
    \ set in a table (either locally or in a remote database). After the MV is initially\
    \ populated, you can later rerun the MV query and store the fresh results in the\
    \ underlying table. There are two main uses for MVs:\n\n*   Replicating of data\
    \ to offload query workloads to separate reporting databases\n*   Improving performance\
    \ of queries by periodically computing and storing the results of complex aggregations\
    \ of data, which lets users query point-in-time results (of the complex aggregations)\n\
    \nThe MV can be a query based on tables, views, and other MVs. The base tables\
    \ are often referred to as master tables. When you create an MV, Oracle internally\
    \ creates a table (with the same name as the MV) as well as an MV object (visible\
    \ in DBA/ALL/USER_OBJECTS).\n\nUnderstanding MVs\n\n![image](Images/sq.jpg) **Note**  \
    \ The SALES table will be used as the basis for the majority of the examples in\
    \ this chapter.\n\nA good way of introducing MVs is to walk through how you’d\
    \ manually perform a task if the MV feature weren’t available. Suppose you have\
    \ a table that stores sales data:\n\n```\ncreate table sales(\n sales_id  number\n\
    ,sales_amt number\n,region_id number\n,sales_dtt date\n,constraint sales_pk primary\
    \ key(sales_id));\n--\ninsert into sales values(1,101,10,sysdate-10);\ninsert\
    \ into sales values(2,511,20,sysdate-20);\ninsert into sales values(3,11,30,sysdate-30);\n\
    commit;\n```\n\nAnd, you have a query that reports on historical daily sales:\n\
    \n```\nselect\nsum(sales_amt) sales_amt\n,sales_dtt\nfrom sales\ngroup by sales_dtt;\n\
    ```\n\nYou observe from a database performance report that this query is executed\
    \ thousands of times a day and is consuming a large amount of database resources.\
    \ The business users use the report to display historical sales information and\
    \ therefore don’t need the query to be reexecuted each time they run a report.\
    \ To reduce the amount of resources the query is consuming, you decide to create\
    \ a table and populate it as follows:\n\n```\ncreate table sales_daily as\nselect\n\
     sum(sales_amt) sales_amt\n,sales_dtt\nfrom sales\ngroup by sales_dtt;\n```\n\n\
    After the table is created, you put in a daily process to delete from it and completely\
    \ refresh it:\n\n```\n-- Step 1 delete from daily aggregated sales data:\ndelete\
    \ from sales_daily;\n--\n-- Step 2 repopulate table with a snapshot of aggregated\
    \ sales table:\ninsert into sales_daily\nselect\n sum(sales_amt) sales_amt\n,sales_dtt\n\
    from sales\ngroup by sales_dtt;\n```\n\nYou inform the users that they can have\
    \ subsecond query results by selecting from SALES_DAILY (instead of running the\
    \ query that directly selects and aggregates from the master SALES table):\n\n\
    ```\nSQL> select * from sales_daily;\n```\n\nThe prior procedure roughly describes\
    \ an MV complete refresh process. Oracle’s MV technology automates and greatly\
    \ enhances this process. This chapter covers the procedures for implementing both\
    \ basic and complex MV features. After reading this chapter and working through\
    \ the examples, you should be able to create MVs to replicate and aggregate data\
    \ in a wide variety of situations.\n\nBefore delving into the details of creating\
    \ MVs, it’s useful to cover basic terminology and helpful data dictionary views\
    \ related to MVs. The next two sections briefly describe the various MV features\
    \ and the many data dictionary views that contain MV metadata.\n\n![image](Images/sq.jpg) **Note**  \
    \ This chapter doesn’t cover topics such as multimaster replication and updatable\
    \ MVs. See the *Oracle Advanced Replication Guide*, which is available  for download\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for more details on those topics.\n\nMV Terminology\n\nA great many terms relate\
    \ to refreshing MVs. You should be familiar with these terms before delving into\
    \ how to implement the features. [Table 15-1](#9781430257288_Ch15.xhtml#Tab1)\
    \ defines the various terms relevant to MVs.\n\n[Table 15-1.](#9781430257288_Ch15.xhtml#_Tab1)\
    \ MV Terminology\n\n| Term | Meaning |\n| --- | --- |\n| Materialized view (MV)\
    \ | Database object used for replicating data and improving query performance\
    \ |\n| MV SQL statement | SQL query that defines what data are stored in the underlying\
    \ MV base table |\n| MV underlying table | Database table that has the same name\
    \ as the MV and that stores the result of the MV SQL query |\n| Master (base)\
    \ table | Table that an MV references in its FROM clause of the MV SQL statement\
    \ |\n| Complete refresh | Process in which an MV is deleted from and completely\
    \ refreshed with an MV SQL statement |\n| Fast refresh | Process during which\
    \ only DML changes (against base table) that have occurred since the last refresh\
    \ are applied to an MV |\n| MV log | Database object that tracks DML changes to\
    \ the MV base table. An MV log is required for fast refreshes. It can be based\
    \ on the primary key, ROWID, or object ID. |\n| Simple MV | MV based on a simple\
    \ query that can be fast refreshed |\n| Complex MV | MV based on a complex query\
    \ that isn’t eligible for fast refresh |\n| Build mode | Mode that specifies whether\
    \ the MV should be immediately populated or deferred |\n| Refresh mode | Mode\
    \ that specifies whether the MV should be refreshed on demand, on commit, or never\
    \ |\n| Refresh method | Option that specifies whether the MV refresh should be\
    \ complete or fast |\n| Query rewrite | Feature that allows the optimizer to choose\
    \ to use MVs (instead of base tables) to fulfill the requirements of a query (even\
    \ though the query doesn’t directly reference the MVs) |\n| Local MV | MV that\
    \ resides in the same database as the base table(s) |\n| Remote MV | MV that resides\
    \ in a database separate from that of the base table(s) |\n| Refresh group | Set\
    \ of MVs refreshed at the same consistent transactional point |\n\nRefer back\
    \ to [Table 15-1](#9781430257288_Ch15.xhtml#Tab1) as you read the rest of this\
    \ chapter. These terms and concepts are explained and expounded on in subsequent\
    \ sections.\n\nReferencing Useful Views\n\nWhen you’re working with MVs, sometimes\
    \ it’s hard to remember which data dictionary view to query under a particular\
    \ circumstance. A wide variety of data dictionary views are available. [Table\
    \ 15-2](#9781430257288_Ch15.xhtml#Tab2) contains a description of the MV-related\
    \ data dictionary views. Examples of using these views are shown throughout this\
    \ chapter where appropriate. These views are invaluable for troubleshooting, diagnosing\
    \ issues, and understanding your MV environment.\n\n[Table 15-2.](#9781430257288_Ch15.xhtml#_Tab2)\
    \ MV Data Dictionary View Definitions\n\n| Data Dictionary View | Meaning |\n\
    | --- | --- |\n| DBA/ALL/USER_MVIEWS | Information about MVs, such as owner, base\
    \ query, last refresh time, and so on |\n| DBA/ALL/USER_MVIEW_REFRESH_TIMES |\
    \ MV last refresh times, MV names, master table, and master owner |\n| DBA/ALL/USER_REGISTERED_MVIEWS\
    \ | All registered MVs; helps identify which MVs are using which MV logs |\n|\
    \ DBA/ALL/USER_MVIEW_LOGS | MV log information |\n| DBA/ALL/USER_BASE_TABLE_MVIEWS\
    \ | Base table names and last refresh dates for tables that have MV logs |\n|\
    \ DBA/ALL/USER_MVIEW_AGGREGATES | Aggregate functions that appear in SELECT clauses\
    \ for MVs |\n| DBA/ALL/USER_MVIEW_ANALYSIS | Information about MVs. Oracle recommends\
    \ that you use DBA/ALL/USER_MVIEWS instead of these views. |\n| DBA/ALL/USER_MVIEW_COMMENTS\
    \ | Any comments associated with MVs |\n| DBA/ALL/USER_MVIEW_DETAIL_PARTITION\
    \ | Partition and freshness information |\n| DBA/ALL/USER_MVIEW_DETAIL_SUBPARTITION\
    \ | Subpartition and freshness information |\n| DBA/ALL/USER_MVIEW_DETAIL_RELATIONS\
    \ | Local tables and MVs that an MV is dependent on |\n| DBA/ALL/USER_MVIEW_JOINS\
    \ | Joins between two columns in the WHERE clause of an MV definition |\n| DBA/ALL/USER_MVIEW_KEYS\
    \ | Columns or expressions in the SELECT clause of an MV definition |\n| DBA/ALL/USER_TUNE_MVIEW\
    \ | Result of executing the DBMS_ADVISOR.TUNE_MVIEW procedure |\n| V$MVREFRESH\
    \ | Information about MVs currently being refreshed |\n| DBA/ALL/USER_REFRESH\
    \ | Details about MV refresh groups |\n| DBA_RGROUP | Information about MV refresh\
    \ groups |\n| DBA_RCHILD | Children in an MV refresh group |\n\nCreating Basic\
    \ Materialized Views\n\nThis section covers how to create an MV. The two most\
    \ common configurations used are as follows:\n\n*   Creating complete refresh\
    \ MVs that are refreshed on demand\n*   Creating fast refresh MVs that are refreshed\
    \ on demand\n\nIt’s important to understand these basic configurations. They lay\
    \ the foundation for everything else you do with the MV feature. Therefore, this\
    \ section starts with these basic configurations. Later, the section covers more\
    \ advanced configurations.\n\nCreating a Complete Refreshable MV\n\nThis section\
    \ explains how to set up an MV that is periodically completely refreshed, which\
    \ is about the simplest example possible. Complete refreshes are appropriate for\
    \ MVs that have base tables in which significant portions of the rows change from\
    \ one refresh interval to the next. Complete refreshes are also required in situations\
    \ in which a fast refresh isn’t possible because of restrictions imposed by Oracle\
    \ (more on this later in this section; see also the section “Manually Refreshing\
    \ MVs from SQL *Plus,” later in this chapter).\n\n![image](Images/sq.jpg) **Note**  \
    \ To create an MV, you need both the CREATE MATERIALIZED VIEW system privilege\
    \ and the CREATE TABLE system privilege. If a user creating MVs doesn’t own the\
    \ base table, then SELECT access on the base table is also required.\n\nThe MV\
    \ example is this section is based on the previously created SALES table. Suppose\
    \ you wanted to create an MV that reports on daily sales. Use the CREATE MATERIALIZED\
    \ VIEW...AS SELECT statement to do  this. The following statement names the MV,\
    \ specifies its attributes, and defines the SQL query on which the MV is based:\n\
    \n```\ncreate materialized view sales_daily_mv\nsegment creation immediate\nrefresh\n\
    complete\non demand\nas\nselect\n sum(sales_amt) sales_amt\n,trunc(sales_dtt)\
    \ sales_dtt\nfrom sales\ngroup by trunc(sales_dtt);\n```\n\nThe SEGMENT CREATION\
    \ IMMEDIATE clause is available with Oracle 11g Release 2 and higher. This clause\
    \ instructs Oracle to create the segment and allocate an extent when you create\
    \ the MV. This was the behavior in previous versions of Oracle. If you don’t want\
    \ immediate segment creation, use the SEGMENT CREATION DEFERRED clause. If the\
    \ newly created MV contains any rows, then segments are created, and extents are\
    \ allocated, regardless of whether you use SEGMENT CREATION DEFERRED.\n\nLet’s\
    \ look at the USER_MVIEWS data dictionary to verify that the MV was created as\
    \ expected. Run this query:\n\n```\nselect mview_name, refresh_method, refresh_mode\n\
    ,build_mode, fast_refreshable\nfrom user_mviews\nwhere mview_name = 'SALES_DAILY_MV';\n\
    ```\n\nHere is the output for this MV:\n\n```\nMVIEW_NAME      REFRESH_ REFRES\
    \ BUILD_MOD FAST_REFRESHABLE\n--------------- -------- ------ --------- ------------------\n\
    SALES_DAILY_MV  COMPLETE DEMAND IMMEDIATE DIRLOAD_LIMITEDDML\n```\n\nIt’s also\
    \ informative to inspect the USER_OBJECTS and USER_SEGMENTS views to see what\
    \ has been created. When you query USER_OBJECTS, note that an MV and table object\
    \ have been created:\n\n```\nselect object_name, object_type\nfrom user_objects\n\
    where object_name like 'SALES_DAILY_MV'\norder by object_name;\n```\n\nHere is\
    \ the corresponding output:\n\n```\nOBJECT_NAME          OBJECT_TYPE\n--------------------\
    \ -----------------------\nSALES_DAILY_MV       MATERIALIZED VIEW\nSALES_DAILY_MV      \
    \ TABLE\n```\n\nThe MV is a logical container that stores data in a regular database\
    \ table. Querying the USER_SEGMENTS view shows the base table, its primary key\
    \ index, and the table that stores data returned by the MV query:\n\n```\nselect\
    \ segment_name, segment_type\nfrom user_segments\nwhere segment_name like '%SALES%'\n\
    order by segment_name;\n```\n\nHere is the output for this example:\n\n```\nSEGMENT_NAME              SEGMENT_TYPE\n\
    ------------------------- ------------------\nI_SNAP$_SALES_DAILY_MV    INDEX\n\
    SALES                     TABLE\nSALES_DAILY_MV            TABLE\nSALES_PK                  INDEX\n\
    ```\n\nIn the prior output the I_SNAP$_SALES_DAILY_MV is a unique index associated\
    \ with the MV that Oracle automatically creates to help improve refresh performance.\
    \ Recall that the MV feature was originally  called snapshots, and so sometimes\
    \ you’ll find objects with names derived from the early days of the feature.\n\
    \nFinally, let’s look at how to refresh the MV. Here are data contained in the\
    \ MV:\n\n```\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_daily_mv;\n\
    ```\n\nHere is the output:\n\n```\nSALES_AMT TO_CHAR(SALES_DTT,'D\n----------\
    \ --------------------\n       101 20-jan-2013\n       511 10-jan-2013\n        11\
    \ 31-dec-2012\n```\n\nNext, insert some additional data into the base SALES table:\n\
    \n```\ninsert into sales values(4,99,200,sysdate);\ninsert into sales values(5,127,300,sysdate);\n\
    commit;\n```\n\nNow, you attempt to initiate a fast refresh of the MV, using the\
    \ REFRESH procedure of the DBMS_MVIEW package. This example passes two parameters\
    \ to the REFRESH procedure: the name and the refresh method. The name is SALES_DAILY_MV,\
    \ and the parameter is F (for fast):\n\n```\nSQL> exec dbms_mview.refresh('SALES_DAILY_MV','F');\n\
    ```\n\nBecause this MV wasn’t created in conjunction with an MV log, a fast refresh\
    \ isn’t possible. The following error is thrown:\n\n```\nORA-23413: table \"MV_MAINT\"\
    .\"SALES\" does not have a materialized view log\n```\n\nInstead, a complete refresh\
    \ is initiated. The parameter passed in is C (for complete):\n\n```\nSQL> exec\
    \ dbms_mview.refresh('SALES_DAILY_MV','C');\n```\n\nThe output indicates success:\n\
    \n```\nPL/SQL procedure successfully completed.\n```\n\nNow, when you select from\
    \ the MV, it returns data showing that more information has been added:\n\n```\n\
    SQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy') from sales_daily_mv;\n\
    ```\n\nHere is the output:\n\n```\n SALES_AMT TO_CHAR(SALES_DTT,'D\n----------\
    \ --------------------\n       101 20-jan-2013\n       226 30-jan-2013\n      \
    \ 511 10-jan-2013\n        11 31-dec-2012\n```\n\n[Figure 15-1](#9781430257288_Ch15.xhtml#Fig1)\
    \ illustrates the architectural components involved with a complete refresh. If\
    \ you’re new to MVs, pause for a few minutes here, and make sure you understand\
    \ all the components.\n\n![9781430257288_Fig15-01.jpg](Images/9781430257288_Fig15-01.jpg)\n\
    \n[Figure 15-1](#9781430257288_Ch15.xhtml#_Fig1). Architectural components of\
    \ a complete refresh MV\n\nThis diagram illustrates that a complete refresh isn’t\
    \ difficult to understand. The numbers show the flow of data in the complete refresh\
    \ process:\n\n1.  Users/applications create transactions.\n2.  Data are committed\
    \ in the base table.\n3.  A complete refresh is manually initiated with the DBMS_MVIEW\
    \ package.\n4.  Data in the underlying MV are deleted and completely refreshed\
    \ with the contents of the base table.\n5.  Users can query data from the MV,\
    \ which contains a point-in-time snapshot of the base table’s data.\n\nIn the\
    \ next section, a more complicated example shows you how to set up a fast refreshable\
    \ MV.\n\nCreating a Fast Refreshable MV\n\nWhen you create a fast refreshable\
    \ MV, it first populates the MV table with the entire result set of the MV query.\
    \ After the initial result set is in place, only data modified (in the base table)\
    \ since the last refresh need to be applied to the MV. In other words, any updates,\
    \ inserts, or deletes from the master table that have occurred since the last\
    \ refresh are copied over. This feature is appropriate when you have a small number\
    \ of changes to a base table over a period of time compared with the total number\
    \ of rows in the table.\n\nHere are the steps for implementing a fast refreshable\
    \ MV:\n\n1.  Create a base table (if it  hasn’t already been created).\n2.  Create\
    \ an MV log on the base table.\n3.  Create an MV as fast refreshable.\n\nThis\
    \ example uses the previously created SALES table. A fast refreshable MV requires\
    \ an MV log on the base table. When a fast refresh occurs, the MV log must have\
    \ a unique way to identify which records have been modified and thus need to be\
    \ refreshed. You can do this with two different approaches. One method is to specify\
    \ the PRIMARY KEY clause when you create the MV log; the other is to specify the\
    \ ROWID clause. If the underlying base table has a primary key, then use the primary\
    \ key–based MV log. If the underlying base table has no primary key, then you\
    \ have to create the MV log, using ROWID. In most cases, you’ll probably have\
    \ a primary key defined for every base table. However, the reality is that some\
    \ systems are poorly designed or have some rare reason for a table not to have\
    \ a primary key.\n\nIn this example, a primary key is defined on the base table,\
    \ so you create the MV log with the PRIMARY KEY clause:\n\n```\nSQL> create materialized\
    \ view log on sales with primary key;\n```\n\nIf there was no primary key defined\
    \ on the base table, this error is thrown when attempting to create the MV log:\n\
    \n```\nORA-12014: table does not contain a primary key constraint\n```\n\nIf the\
    \ base table has no primary key, and you don’t have the option of adding one,\
    \ you must specify ROWID when you create the MV log:\n\n```\nSQL> create materialized\
    \ view log on sales with rowid;\n```\n\nWhen you use a primary key–based fast\
    \ refreshable MV, the primary key column(s) of the base table must be part of\
    \ the fast refreshable MV SELECT statement. Also, when creating a fast refreshable\
    \ MV, there are certain restrictions on what can be aggregated (see the section\
    \ “Creating a Fast Refreshable MV Based on a Complex Query,” later in the chapter).\
    \ For this example there will be no aggregated columns in the MV. This type of\
    \ MV would typically be used to replicate data from one environment to another:\n\
    \n```\ncreate materialized view sales_rep_mv\nsegment creation immediate\nrefresh\n\
      with primary key\n  fast\n  on demand\nas\nselect\n sales_id\n,sales_amt\n,trunc(sales_dtt)\
    \ sales_dtt\nfrom sales;\n```\n\nAt this point, it’s useful to inspect the objects\
    \ that are associated with the MV. The following query selects from USER_OBJECTS:\n\
    \n```\nselect object_name, object_type\nfrom user_objects\nwhere object_name like\
    \ '%SALES%'\norder by object_name;\n```\n\nHere are the objects that have been\
    \ created:\n\n```\nOBJECT_NAME          OBJECT_TYPE\n-------------------- -----------------------\n\
    MLOG$_SALES          TABLE\nRUPD$_SALES          TABLE\nSALES                TABLE\n\
    SALES_PK             INDEX\nSALES_PK1            INDEX\nSALES_REP_MV         TABLE\n\
    SALES_REP_MV         MATERIALIZED VIEW\n```\n\nA few objects in the previous output\
    \ require some explanation:\n\n*   MLOG$_SALES\n*   RUPD$_SALES\n*   SALES_PK1\n\
    \nFirst, when an MV log is created, a corresponding table is also created that\
    \ stores the rows in the base table that changed and how they changed (insert,\
    \ update, or delete). The MV log table name follows the format MLOG$_<base table\
    \ name>.\n\nA table is also created with the format RUPD$_<base table name>. Oracle\
    \ automatically creates this RUPD$ table when you create a fast refreshable MV,\
    \ using a primary key. The table is there to support the updatable MV feature.\
    \ You don’t have to worry about this table unless you’re dealing with updatable\
    \ MVs (see the *Oracle Advanced Replication Guide* for more details on updatable\
    \ MVs). If you’re not using the updatable MV feature, then you can ignore the\
    \ RUPD$ table.\n\nFurthermore, Oracle creates an index with the format <base table\
    \ name>_PK1\\. This index is automatically created for primary key–based MVs and\
    \ is based on the primary key column(s) of the base table. If this is a ROWID\
    \ instead of a primary key, then the index name has the format I_SNAP$_<table_name>\
    \ and is based on the ROWID. If you don’t explicitly name the primary key index\
    \ on the base table, then Oracle gives the MV table primary key index a system-generated\
    \ name, such as SYS_C008780.\n\nNow that you understand the underlying architectural\
    \ components, let’s look at the data in the MV:\n\n```\nselect sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\n\
    from sales_rep_mv\norder by 2;\n```\n\nHere is the output:\n\n```\nSALES_AMT TO_CHAR(SALES_DTT,'D\n\
    ---------- --------------------\n       511 10-jan-2013\n       101 20-jan-2013\n\
           127 30-jan-2013\n        99 30-jan-2013\n        11 31-dec-2012\n```\n\n\
    Let’s add two records to the base SALES table:\n\n```\ninsert into sales values(6,99,20,sysdate-6);\n\
    insert into sales values(7,127,30,sysdate-7);\ncommit;\n```\n\nAt this point,\
    \ it’s instructional to inspect the M$LOG table. You should see two records that\
    \ identify how the data in the SALES table have changed:\n\n```\nSQL> select count(*)\
    \ from mlog$_sales;\n```\n\nThere are two records:\n\n```\n  COUNT(*)\n\n```\n\
    \nNext, let’s refresh the MV. This MV is fast refreshable, so you call the REFRESH\
    \ procedure of the DBMS_MVIEW package with the F (for fast) parameter:\n\n```\n\
    SQL> exec dbms_mview.refresh('SALES_REP_MV','F');\n```\n\nA quick inspection of\
    \ the MV shows two new records:\n\n```\nselect sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\n\
    from sales_rep_mv\norder by 2;\n```\n\nHere is some sample output:\n\n```\nSALES_AMT\
    \ TO_CHAR(SALES_DTT,'D\n---------- --------------------\n       511 10-jan-2013\n\
           101 20-jan-2013\n       127 23-jan-2013\n        99 24-jan-2013\n      \
    \ 127 30-jan-2013\n        99 30-jan-2013\n        11 31-dec-2012\n```\n\nAdditionally,\
    \ the count of the MLOG$ has dropped to zero. After the MV refresh is complete,\
    \ those records are no longer required:\n\n```\nSQL> select count(*) from mlog$_sales;\n\
    ```\n\nHere is the output:\n\n```\n  COUNT(*)\n\n```\n\nYou can verify the last\
    \ method whereby an MV was refreshed by querying the USER_MVIEWS view:\n\n```\n\
    select mview_name, last_refresh_type, last_refresh_date\nfrom user_mviews\norder\
    \ by 1,3;\n```\n\nHere is some sample output:\n\n```\nMVIEW_NAME                LAST_REF\
    \ LAST_REFR\n------------------------- -------- ---------\nSALES_REP_MV              FAST    \
    \ 30-JAN-13\n```\n\n[Figure 15-2](#9781430257288_Ch15.xhtml#Fig2) illustrates\
    \ the architectural components involved with a fast refresh. The numbers in the\
    \ boxes represent the sequential flow of the fast refresh process. If you’re new\
    \ to MVs, pause for a few minutes here, and make sure you understand all the components.\n\
    \n![9781430257288_Fig15-02.jpg](Images/9781430257288_Fig15-02.jpg)\n\n[Figure\
    \ 15-2](#9781430257288_Ch15.xhtml#_Fig2). Architectural components of a fast refreshable\
    \ MV\n\nThe numbers in the diagram describe the flow of data for a fast refreshable\
    \ MV:\n\n1.  Users create transactions.\n2.  Data are committed in the base table.\n\
    3.  An internal trigger on the base table populates the MV log table.\n4.  A fast\
    \ refresh is initiated via the DBMS_MVIEW package.\n5.  DML changes that have\
    \ been created since the last refresh are applied to the MV. Rows no longer needed\
    \ by the MV are deleted from the MV log.\n6.  Users can query data from the MV,\
    \ which contains a point-in-time snapshot of the base table’s data.\n\nWhen you\
    \ have a good understanding of the architecture of a fast refresh, you won’t have\
    \ difficulty learning advanced MV concepts. If you’re new to MVs, it’s important\
    \ to realize that an MV’s data are stored in a regular database table. This will\
    \ help you understand architecturally what is and is not possible. For the most\
    \ part, because the MV and MV log are based on tables, most features available\
    \ with a regular database table can also be applied to the MV table and MV log\
    \ table. For instance, the following Oracle features are readily applied to MVs:\n\
    \n*   Storage and tablespace placement\n*   Indexing\n*   Partitioning\n*   Compression\n\
    *   Encryption\n*   Logging\n*   Parallelism\n\nThe next section shows examples\
    \ of how to create MVs with various features.\n\nGoing Beyond the Basics\n\nNumerous\
    \ MV features are available. Many are related to attributes that you can apply\
    \ to any table, such as storage, indexing, compression, and encryption. Other\
    \ features are related to the type of MV created and how it’s refreshed. These\
    \ features are described in the next several sections.\n\nCreating MVs and Specifying\
    \ Tablespace for MVs and Indexes\n\nEvery MV has an underlying table associated\
    \ with it. Additionally, depending on the type of MV, an index may be automatically\
    \ created. When you create an MV, you can specify the tablespace and storage characteristics\
    \ for both the underlying table and index. The next example shows how to specify\
    \ the tablespace to be used for the MV table and the index:\n\n```\ncreate materialized\
    \ view sales_mv\ntablespace users\nusing index tablespace users\nrefresh with\
    \ primary key\n  fast on demand\nas\nselect sales_id ,sales_amt, sales_dtt\nfrom\
    \ sales;\n```\n\nYou can also specify storage characteristics. For example, if\
    \ you know that you’re loading data into MVs that are based on tables that are\
    \ rarely updated (and thus, the MV is rarely updated), it’s appropriate to set\
    \ PCTUSED to a high value, such as 95; for example,\n\n```\ncreate materialized\
    \ view sales_mv\npctused 95\npctfree 5\ntablespace users\nusing index tablespace\
    \ users\nrefresh with primary key\n  fast on demand\nas\nselect sales_id ,sales_amt,\
    \ sales_dtt\nfrom sales;\n```\n\nCreating Indexes on MVs\n\nAn MV stores its data\
    \ in a regular database table. Therefore, you can create indexes on the underlying\
    \ table (just as you can for any other table). In general, follow the same guidelines\
    \ for creating an index on an MV table as you would a regular table (see [Chapter\
    \ 8](#9781430257288_Ch08.xhtml) for more details on creating indexes). Keep in\
    \ mind that although indexes can significantly improve query performance, overhead\
    \ is associated with maintaining the index for any inserts, updates, and deletes.\
    \ Indexes also consume disk space.\n\nListed next is an example of creating an\
    \ index based on a column in an MV. The syntax is the same as for creating an\
    \ index on a regular table:\n\n```\nSQL> create index sales_mv_idx1 on sales_mv(sales_dtt)\
    \ tablespace users;\n```\n\nYou can display the indexes created for an MV by querying\
    \ the USER_INDEXES view:\n\n```\nselect a.table_name, a.index_name\nfrom user_indexes\
    \ a\n    ,user_mviews  b\nwhere a.table_name = b.mview_name;\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ If you create, using the WITH PRIMARY KEY clause, a simple MV that selects from\
    \ a base table that has a ­primary key, Oracle automatically creates an index\
    \ on the corresponding primary key columns in the MV. If you create, using the\
    \ WITH ROWID clause, a simple MV that selects from a base table that has a primary\
    \ key, Oracle automatically creates an index named I_SNAP$_<table_name> on a hidden\
    \ column named M_ROW$$.\n\nPartitioning MVs\n\nYou can partition an MV table like\
    \ any other table in the database. If you work with large MVs, you may want to\
    \ consider partitioning to better manage and maintain a large table. Use the PARTITION\
    \ clause when you create the MV. This example builds an MV that is partitioned\
    \ by hash on SALES_ID:\n\n```\ncreate materialized view sales_mv\npartition by\
    \ hash (sales_id)\npartitions 4\nrefresh on demand complete with rowid\nas\nselect\
    \ sales_id, sales_amt, region_id, sales_dtt\nfrom sales;\n```\n\nThe result set\
    \ from the query is stored in a partitioned table. You can view the partition\
    \ details for this table in USER_TAB_PARTITIONS and USER_PART_TABLES (just like\
    \ any other partitioned table in your database). See [Chapter 12](#9781430257288_Ch12.xhtml)\
    \ for more details on partitioning strategies and maintenance.\n\nCompressing\
    \ an MV\n\nAs mentioned earlier, when you create an MV, an underlying table is\
    \ created to store the data. Because this table is a regular database table, you\
    \ can implement features such as compression; for example,\n\n```\ncreate materialized\
    \ view sales_mv\ncompress\nas\nselect sales_id, sales_amt\nfrom sales;\n```\n\n\
    You can confirm the compression details with the following query:\n\n```\nselect\
    \ table_name, compression, compress_for\nfrom user_tables\nwhere table_name='SALES_MV';\n\
    ```\n\nHere is the output:\n\n```\nTABLE_NAME                     COMPRESS COMPRESS_FOR\n\
    ------------------------------ -------- ------------\nSALES_MV                        \
    \ ENABLED  BASIC\n```\n\n![image](Images/sq.jpg) **Note**   Basic table compression\
    \ doesn’t require an extra license from Oracle, whereas ROW STORE COMPRESS ­ADVANCED\
    \ compression (prior to 12c this was enabled via COMPRESS FOR OLTP) calls for\
    \ the Advanced Compression option, which does require an extra license from Oracle.\
    \ See *Oracle Database Licensing Information*, available  from the Technology\
    \ Network area of the Oracle Web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for details.\n\nEncrypting MV Columns\n\nAs mentioned earlier, when you create\
    \ an MV, an underlying table is created to store the data. Because this table\
    \ is a regular database table, you can implement features such as encryption of\
    \ columns; for example,\n\n```\ncreate materialized view sales_mv\n(sales_id  \
    \ encrypt no salt\n,sales_amt  encrypt)\nas\nselect\n sales_id\n,sales_amt\nfrom\
    \ sales;\n```\n\nFor the previous statement to work, you must create and open\
    \ a security wallet for your database. This feature requires the Advanced Security\
    \ option from Oracle.\n\nYou can verify that encryption is in place by describing\
    \ the MV:\n\n```\nSQL> desc sales_mv\nName                        Null?    Type\n\
     ----------------------------------- ----------------------------\n SALES_ID                  \
    \ NOT NULL NUMBER ENCRYPT\n SALES_AMT                           NUMBER ENCRYPT\n\
    ```\n\nENABLING AN ORACLE WALLET\n\nAn Oracle Wallet is the mechanism Oracle uses\
    \ to enable encryption. The wallet is an OS file that contains encryption keys.\
    \ The wallet is enabled via the following steps:\n\n1.  Modify the SQLNET.ORA\
    \ file to contain the location of the wallet:\n\n    ENCRYPTION_WALLET_LOCATION=\n\
    \n    (SOURCE=(METHOD=FILE) (METHOD_DATA=\n\n        (DIRECTORY=/ora01/app/oracle/product/12.1.0.1/db_1/network/admin)))\n\
    \n2.  Create the wallet file (ewallet.p12) with the ALTER SYSTEM command:\n\n\
    \    SQL> alter system set encryption key identified by foo;\n\n3.  Enable encryption:\n\
    \n    SQL> alter system set encryption wallet open identified by foo;\n\nSee the\
    \ Oracle Advanced Security Administrator’s Guide, which can be freely downloaded\
    \ from the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for full details on implementing encryption.\n\nBuilding an MV on a Prebuilt\
    \ Table\n\nIn data warehouse environments, sometimes you need to create a table,\
    \ populate it with large quantities of data, and then transform it into an MV.\
    \ Or, you may be replicating a large table and find that it’s more efficient to\
    \ initially populate the remote MV by prebuilding the table with data, using Data\
    \ Pump. Listed next are the steps for building an MV on a prebuilt table:\n\n\
    1.  Create a table.\n2.  Populate it with data.\n3.  Create an MV on the table\
    \ created in step 1.\n\nHere is a simple example to illustrate the process. First,\
    \ you create a table:\n\n```\ncreate table sales_mv\n(sales_id    number\n,sales_amt\
    \ number);\n```\n\nNow, populate the table with data. For instance, in a data\
    \ warehouse environment, a table can be loaded using Data Pump, SQL*Loader, or\
    \ external tables.\n\nFinally, run the CREATE MATERIALIZED VIEW...ON PREBUILT\
    \ TABLE statement to turn the table into an MV. The MV name and the table name\
    \ must be identical. Additionally, each column in the query must correspond to\
    \ a column in the table; for example,\n\n```\ncreate materialized view sales_mv\n\
    on prebuilt table\nusing index tablespace users\nas\nselect sales_id, sales_amt\n\
    from sales;\n```\n\nNow, the SALES_MV object is an MV. If you attempt to drop\
    \ the SALES_MV table, the following error is thrown, indicating that SALES_MV\
    \ is now an MV:\n\n```\nSQL> drop table sales_mv;\nORA-12083: must use DROP MATERIALIZED\
    \ VIEW to drop \"MV_MAINT\".\"SALES_MV\"\n```\n\nThe prebuilt-table feature is\
    \ useful in data warehouse environments, in which typically there are long periods\
    \ when a base table isn’t being actively updated. This gives you time to load\
    \ a prebuilt table and ensure that its contents are identical to those of the\
    \ base table. After you create the MV on the prebuilt table, you can fast refresh\
    \ the MV and keep it in sync with the base table.\n\nIf your base table (specified\
    \ in the SELECT clause of the MV) is continuously being updated, then creating\
    \ an MV on a prebuilt table may not be a viable option. This is because there\
    \ is no way to ensure that the prebuilt table will stay in sync with the base\
    \ table.\n\n![image](Images/sq.jpg) **Note**   For MVs created on prebuilt tables,\
    \ if you subsequently issue a DROP MATERIALIZED VIEW statement, the underlying\
    \ table isn’t dropped. This has some interesting implications when you need to\
    \ modify a base table (such as adding a column). See the section “Modifying Base\
    \ Table DDL and Propagating to MVs,” later in this chapter, for details.\n\nCreating\
    \ an Unpopulated MV\n\nWhen you create an MV, you have the option of instructing\
    \ Oracle whether or not to initially populate the MV with data. For example, if\
    \ it takes several hours to initially build an MV, you may want to first define\
    \ the MV and then populate it as a separate job.\n\nThis example uses the BUILD\
    \ DEFERRED clause to instruct Oracle not to initially populate the MV with the\
    \ results of the query:\n\n```\ncreate materialized view sales_mv\ntablespace\
    \ users\nbuild deferred\nrefresh complete on demand\nas\nselect sales_id, sales_amt\n\
    from sales;\n```\n\nAt this point, querying the MV results in zero rows returned.\
    \ At some later point, you can initiate a complete refresh to populate the MV\
    \ with data.\n\nCreating an MV Refreshed on Commit\n\nYou may be required, when\
    \ data are modified in the master table, to have them immediately copied to an\
    \ MV. In this scenario, use the ON COMMIT clause when you create the MV. The master\
    \ table must have an MV log created on it for this technique to work:\n\n```\n\
    SQL> create materialized view log on sales with primary key;\n```\n\nNext, an\
    \ MV is created that refreshes on commit:\n\n```\ncreate materialized view sales_mv\n\
    refresh\non commit\nas\nselect sales_id, sales_amt from sales;\n```\n\nAs data\
    \ are inserted and committed in the master table, any changes are also available\
    \ in the MV that would be selected by the MV query.\n\nThe ON COMMIT refreshable\
    \ MV has a few restrictions you need to be aware of:\n\n*   The master table and\
    \ MV must be in the same database.\n*   You can’t execute distributed transaction\
    \ on the base table.\n*   This approach isn’t supported with MVs that contain\
    \ object types or Oracle-supplied types.\n\nAlso consider the overhead associated\
    \ with committing data simultaneously in two places; this can affect the performance\
    \ of a high-transaction OLTP system. Additionally, if there is any problem with\
    \ updating the MV, then the base table can’t commit a transaction. For example,\
    \ if the tablespace in which the MV is created becomes full (and can’t allocate\
    \ another extent), you see an error such as this when trying to insert into the\
    \ base table:\n\n```\nORA-12008: error in materialized view refresh path\nORA-01653:\
    \ unable to extend table MV_MAINT.SALES_MV by 16 in tablespace...\n```\n\nFor\
    \ these reasons, you should use this feature only when you’re sure it won’t affect\
    \ performance or availability.\n\n![image](Images/sq.jpg) **Note**   You can’t\
    \ specify that an MV be refreshed with both ON COMMIT and ON DEMAND. In addition,\
    \ ON COMMIT isn’t compatible with the START WITH and NEXT clauses of the CREATE\
    \ MATERIALIZED VIEW statement.\n\nCreating a Never Refreshable MV\n\nYou may never\
    \ want an MV to be refreshed. For example, you may want to guarantee that you\
    \ have a snapshot of a table at a point in time for auditing purposes. Specify\
    \ the NEVER REFRESH clause when you create the MV to achieve this:\n\n```\ncreate\
    \ materialized view sales_mv\nnever refresh\nas\nselect sales_id, sales_amt\n\
    from sales;\n```\n\nIf you attempt to refresh a nonrefreshable MV, you receive\
    \ this error:\n\n```\nORA-23538: cannot explicitly refresh a NEVER REFRESH materialized\
    \ view\n```\n\nYou can alter a never refreshable view to be refreshable. Use the\
    \ ALTER MATERIALIZED VIEW statement to do this:\n\n```\nSQL> alter materialized\
    \ view sales_mv refresh on demand complete;\n```\n\nYou can verify the refresh\
    \ mode and method with the following query:\n\n```\nSQL> select mview_name, refresh_mode,\
    \ refresh_method from user_mviews;\n```\n\nCreating MVs for Query Rewrite\n\n\
    Query rewrite allows the optimizer to recognize that an MV can be used to fulfill\
    \ the requirements of a query instead of using the underlying master (base) tables.\
    \ If you have an environment in which users frequently write their own queries\
    \ and are unaware of the available MVs, this feature can greatly help with performance.\
    \ There are three prerequisites for enabling query rewrite:\n\n*   Oracle Enterprise\
    \ Edition\n*   Setting database initialization parameter QUERY_REWRITE_ENABLED\
    \ to TRUE (the default value in 10g and higher)\n*   MV either created or altered\
    \ with the ENABLE QUERY REWRITE clause\n\nThis example creates an MV with query\
    \ rewrite enabled:\n\n```\ncreate materialized view sales_daily_mv\nsegment creation\
    \ immediate\nrefresh\ncomplete\non demand\nenable query rewrite\nas\nselect\n\
     sum(sales_amt) sales_amt\n,trunc(sales_dtt) sales_dtt\nfrom sales\ngroup by trunc(sales_dtt);\n\
    ```\n\nYou can verify that query rewrite is in use by examining a query’s explain\
    \ plan via the autotrace utility:\n\n```\nSQL> set autotrace trace explain\n```\n\
    \nNow, suppose a user runs the following query, unaware that an MV exists that\
    \ already aggregates the required data:\n\n```\nselect\n sum(sales_amt) sales_amt\n\
    ,trunc(sales_dtt) sales_dtt\nfrom sales\ngroup by trunc(sales_dtt);\n```\n\nHere\
    \ is a partial listing of autotrace output that verifies that query rewrite is\
    \ in use:\n\n```\n\n| Id  | Operation                    | Name           | Cost\
    \ (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT             |                |    \
    \ 3   (0)| 00:00:01 |\n|   1 |  MAT_VIEW REWRITE ACCESS FULL| SALES_DAILY_MV |    \
    \ 3   (0)| 00:00:01 |\n\n```\n\nAs you can see from the prior output, even though\
    \ the user selected directly from the SALES table, the optimizer determined that\
    \ it could more efficiently satisfy the results of the query by accessing the\
    \ MV.\n\nYou can tell if query rewrite is enabled for an MV by selecting the REWRITE_ENABLED\
    \ column from USER_MVIEWS:\n\n```\nselect mview_name, rewrite_enabled, rewrite_capability\n\
    from user_mviews\nwhere mview_name = 'SALES_DAILY_MV';\n```\n\nIf for any reason\
    \ a query isn’t using the query rewrite functionality, and you think it should\
    \ be, use the EXPLAIN_REWRITE procedure of the DBMS_MVIEW package to diagnose\
    \ issues.\n\nCreating a Fast Refreshable MV Based on a Complex Query\n\nIn many\
    \ situations, when you base an MV on a query that joins multiple tables, it’s\
    \ deemed complex and therefore is available only for a complete refresh. However,\
    \ in some scenarios, you can create a fast refreshable MV when you reference two\
    \ tables that are joined together in the MV query.\n\nThis section describes how\
    \ to use the EXPLAIN_MVIEW procedure of the DBMS_MVIEW to determine whether it’s\
    \ possible to fast refresh a complex query. To help you completely understand\
    \ the example, this section shows the SQL used to create the base tables. Say\
    \ you have two base tables, defined as follows:\n\n```\ncreate table region(\n\
     region_id number\n,reg_desc varchar2(30)\n,constraint region_pk primary key(region_id));\n\
    --\ncreate table sales(\n sales_id  number\n,sales_amt number\n,region_id number\n\
    ,sales_dtt date\n,constraint sales_pk primary key(sales_id)\n,constraint sales_fk1\
    \ foreign key (region_id) references region(region_id));\n```\n\nAdditionally,\
    \ REGION and SALES have MV logs created on them, as shown:\n\n```\ncreate materialized\
    \ view log on region with primary key;\ncreate materialized view log on sales\
    \ with primary key;\n```\n\nAlso, for this example, the base tables have these\
    \ data inserted into them:\n\n```\ninsert into region values(10,'East');\ninsert\
    \ into region values(20,'West');\ninsert into region values(30,'South');\ninsert\
    \ into region values(40,'North');\n--\ninsert into sales values(1,100,10,sysdate);\n\
    insert into sales values(2,200,20,sysdate-20);\ninsert into sales values(3,300,30,sysdate-30);\n\
    ```\n\nSuppose you want to create an MV that joins the REGION and SALES base tables\
    \ as follows:\n\n```\ncreate materialized view sales_mv\nas\nselect\n a.sales_id\n\
    ,b.reg_desc\nfrom sales  a\n    ,region b\nwhere a.region_id = b.region_id;\n\
    ```\n\nNext, let’s attempt to fast refresh the MV:\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n\
    ```\n\nThis error is thrown:\n\n```\nORA-12032: cannot use rowid column from materialized\
    \ view log...\n```\n\nThe error indicates that the MV has issues and can’t be\
    \ fast refreshed. To determine whether this MV can become fast refreshable, use\
    \ the output of the EXPLAIN_MVIEW procedure of the DBMS_MVIEW package. This procedure\
    \ requires that you first create an MV_CAPABILITIES_TABLE. Oracle provides a script\
    \ to do this. Run this script as the owner of the MV:\n\n```\nSQL> @?/rdbms/admin/utlxmv.sql\n\
    ```\n\nAfter you create the table, run the EXPLAIN_MVIEW procedure to populate\
    \ it:\n\n```\nSQL> exec dbms_mview.explain_mview(mv=>'SALES_MV',stmt_id=>'100');\n\
    ```\n\nNow, query MV_CAPABILITIES_TABLE to see what potential issues this MV may\
    \ have:\n\n```\nselect capability_name, possible, msgtxt, related_text\nfrom mv_capabilities_table\n\
    where capability_name like 'REFRESH_FAST_AFTER%'\nand statement_id = '100'\norder\
    \ by 1;\n```\n\nNext is a partial listing of the output. The P (for possible)\
    \ column contains an N (for no) for every fast refresh possibility:\n\n```\nCAPABILITY_NAME                P\
    \ MSGTXT                              RELATED_TEXT\n------------------------------\
    \ - ----------------------------------- ---------------\nREFRESH_FAST_AFTER_INSERT      N\
    \ the SELECT list does not have the   B\n                                 rowids\
    \ of all the detail tables\nREFRESH_FAST_AFTER_INSERT      N mv log must have\
    \ ROWID              MV_MAINT.REGION\nREFRESH_FAST_AFTER_INSERT      N mv log\
    \ must have ROWID              MV_MAINT.SALES\n```\n\nMSGTXT indicates the issues:\
    \ The MV logs need to be ROWID based, and the ROWID of the tables must appear\
    \ in the SELECT clause. So, first drop and recreate the MV logs with ROWID (instead\
    \ of a primary key):\n\n```\ndrop materialized view log on region;\ndrop materialized\
    \ view log on sales;\n--\ncreate materialized view log on region with rowid;\n\
    create materialized view log on sales with rowid;\n--\ndrop materialized view\
    \ sales_mv;\n--\ncreate materialized view sales_mv\nas\nselect\n a.rowid sales_rowid\n\
    ,b.rowid region_rowid\n,a.sales_id\n,b.reg_desc\nfrom sales  a\n    ,region b\n\
    where a.region_id = b.region_id;\n```\n\nNext, reset the MV_CAPABILITIES_TABLE,\
    \ and repopulate it via the EXPLAIN_MVIEW procedure:\n\n```\nSQL> delete from\
    \ mv_capabilities_table where statement_id=100;\nSQL> exec dbms_mview.explain_mview(mv=>'SALES_MV',stmt_id=>'100');\n\
    ```\n\nThe output shows that it’s now possible to fast refresh the MV:\n\n```\n\
    CAPABILITY_NAME                P MSGTXT                              RELATED_TEXT\n\
    ------------------------------ - ----------------------------------- ------------\n\
    REFRESH_FAST_AFTER_ANY_DML     Y\nREFRESH_FAST_AFTER_INSERT      Y\nREFRESH_FAST_AFTER_ONETAB_DML  Y\n\
    ```\n\nExecute the following statement to see if the fast refresh works:\n\n```\n\
    SQL> exec dbms_mview.refresh('SALES_MV','F');\nPL/SQL procedure successfully completed.\n\
    ```\n\nThe EXPLAIN_MVIEW procedure is a powerful tool that allows you to determine\
    \ whether a refresh capability is possible and, if it isn’t possible, why it isn’t\
    \ and how to potentially resolve the issue.\n\nViewing MV DDL\n\nTo quickly view\
    \ the SQL query on which an MV is based, select from the QUERY column of DBA/ALL/USER_MVIEWS.\
    \ If you’re using SQL*Plus, first set the LONG variable to a value large enough\
    \ to display the entire contents of a LONG column:\n\n```\nSQL> set long 5000\n\
    SQL> select query from dba_mviews where mview_name=UPPER('&&mview_name');\n```\n\
    \nTo view the entire DDL required to recreate an MV, use the DBMS_METADATA package\
    \ (you also need to set the LONG variable to a large value if using SQL*Plus):\n\
    \n```\nSQL> select dbms_metadata.get_ddl('MATERIALIZED_VIEW','SALES_MV') from\
    \ dual;\n```\n\nHere is a partial listing of the output for this example:\n\n\
    ```\nDBMS_METADATA.GET_DDL('MATERIALIZED_VIEW','SALES_MV')\n\n  CREATE MATERIALIZED\
    \ VIEW \"MV_MAINT\".\"SALES_MV\" (\"SALES_ROWID\", \"REGION_ROWID\",\n \"SALES_ID\"\
    , \"REG_DESC\")\n  ORGANIZATION HEAP PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS\
    \ 255\n```\n\nThis output shows the DDL that Oracle thinks is required to recreate\
    \ the MV. This is usually the most reliable way to generate the DDL associated\
    \ with an MV.\n\nDropping an MV\n\nYou may occasionally need to drop an MV. Perhaps\
    \ a view is no longer being used, or you may need to drop and recreate an MV to\
    \ change the underlying query on which the MV is based (such as adding a column).\
    \ Use the DROP MATERIALIZED VIEW command to drop an MV; for example,\n\n```\n\
    SQL> drop materialized view sales_mv;\n```\n\nWhen you drop an MV, the MV object,\
    \ the table object, and any corresponding indexes are also dropped. Dropping an\
    \ MV doesn’t affect any MV logs—an MV log is dependent only on the master table.\n\
    \nYou can also specify that the underlying table be preserved. You may want to\
    \ do this if you’re troubleshooting and need to drop the MV definition but keep\
    \ the MV table and data; for example,\n\n```\nSQL> drop materialized view sales_mv\
    \ preserve table;\n```\n\nIn this scenario, you can also use the underlying table\
    \ later as the basis for an MV by building the MV, using the ON PREBUILT TABLE\
    \ clause.\n\nIf the MV was originally built using the ON PREBUILT TABLE clause,\
    \ then when you drop the MV, the underlying table isn’t dropped. If you want the\
    \ underlying table dropped, you must use a DROP TABLE statement:\n\n```\nSQL>\
    \ drop materialized view sales_mv;\nSQL> drop table sales_mv;\n```\n\nModifying\
    \ MVs\n\nThe following sections describe common maintenance tasks associated with\
    \ MVs. Topics covered include how to modify an MV to reflect column changes that\
    \ have been applied to the base table sometime after the MV was initially created\
    \ and modifying attributes such as logging and parallelism.\n\nModifying Base\
    \ Table DDL and Propagating to MVs\n\nA common task involves adding a column to\
    \ or dropping a column from a base table (because business requirements have changed).\
    \ After the column is added to or dropped from the base table, you want those\
    \ DDL changes to be reflected in any dependent MVs. You have a few options for\
    \ propagating base table column changes to dependent MVs:\n\n*   Drop and recreate\
    \ the MV with the new column definitions.\n*   Drop the MV, but preserve the underlying\
    \ table, modify the MV table, and then recreate the MV (with the new column changes),\
    \ using the ON PREBUILT TABLE clause.\n*   If the MV was originally created using\
    \ the ON PREBUILT TABLE clause, drop the MV object, modify the MV table, and then\
    \ recreate the MV (with the new column changes), using the ON PREBUILT TABLE clause.\n\
    \nWith any of the prior options, you have to drop and recreate the MV so that\
    \ it’s aware of the column changes in the base table. These approaches are described\
    \ next.\n\nRecreating an MV to Reflect Base Table Modifications\n\nUsing the previously\
    \ created *SALES* table, suppose you have an MV log and an MV, created as shown:\n\
    \n```\ncreate materialized view log on sales with primary key;\n--\ncreate materialized\
    \ view sales_mv\nrefresh with primary key\n  fast on demand as\nselect sales_id\
    \ ,sales_amt, sales_dtt\nfrom sales;\n```\n\nThen, sometime later, a column is\
    \ added to the base table:\n\n```\nSQL> alter table sales add(sales_loc varchar2(30));\n\
    ```\n\nYou want the base table modification to be reflected in the MV. How do\
    \ you accomplish this task? You know the MV contains an underlying table that\
    \ stores the results. You decide to modify the underlying MV table directly:\n\
    \n```\nSQL> alter table sales_mv add(sales_loc varchar2(30));\n```\n\nThe alteration\
    \ is successful. You next refresh the MV but realize that the additional column\
    \ isn’t being refreshed. To understand why, recall that an MV is an SQL query\
    \ that stores its results in an underlying table. Therefore, to modify an MV,\
    \ you have to change the SQL query that the MV is based on. Because there is no\
    \ ALTER MATERIALIZED VIEW ADD/DROP/MODIFY <column> statement, you must do the\
    \ following to add/delete columns in an MV:\n\n1.  Alter the base table.\n2. \
    \ Drop and recreate the MV to reflect the changes in the base table.\n\n    ```\n\
    \    drop materialized view sales_mv;\n    --\n    create materialized view sales_mv\n\
    \    refresh with primary key\n      complete on demand as\n    select sales_id,\
    \ sales_amt, sales_dtt, sales_loc\n    from sales;\n    ```\n\nThis approach may\
    \ take a long time if large quantities of data are involved. You have downtime\
    \ for any application that accesses the MV while it’s being rebuilt. If you work\
    \ in a data warehouse environment, then because of the amount of time it takes\
    \ to refresh the MV completely, you may want to consider not dropping the underlying\
    \ table. This option is discussed in the next section.\n\nAltering an MV but Preserving\
    \ the Underlying Table\n\nWhen you drop an MV, you have the option of preserving\
    \ the underlying table and its data. You may find this approach advantageous when\
    \ you’re working with large MVs in data warehouse environments. Here are the steps:\n\
    \n1.  Alter the base table.\n2.  Drop the MV, but preserve the underlying table.\n\
    3.  Modify the underlying table.\n4.  Recreate the MV, using the ON PREBUILT TABLE\
    \ clause.\n\nHere is a simple example to illustrate this procedure:\n\n```\nSQL>\
    \ alter table sales add(sales_loc varchar2(30));\n```\n\nDrop the MV, but specify\
    \ that you want to preserve the underlying table:\n\n```\nSQL> drop materialized\
    \ view sales_mv preserve table;\n```\n\nNow, modify the underlying table:\n\n\
    ```\nSQL> alter table sales_mv add(sales_loc varchar2(30));\n```\n\nNext, create\
    \ the MV, using the ON PREBUILT TABLE clause:\n\n```\ncreate materialized view\
    \ sales_mv\non prebuilt table\nrefresh with primary key\n  complete on demand\
    \ as\nselect sales_id, sales_amt, sales_dtt, sales_loc\nfrom sales;\n```\n\nThis\
    \ allows you to redefine the MV without dropping and completely refreshing the\
    \ data. Be aware that if there is any DML activity against the base table during\
    \ the MV rebuild operation, those transactions aren’t reflected in the MV when\
    \ you attempt to refresh it. In data warehouse environments, you typically have\
    \ a known schedule for loading base tables and therefore should be able to perform\
    \ the MV alteration during a maintenance window in which no transactions are occurring\
    \ in the base table.\n\nAltering an MV Created on a Prebuilt Table\n\nIf you originally\
    \ created an MV using the ON PREBUILT TABLE clause, then you can perform a procedure\
    \ similar to the one shown in the previous section when preserving the underlying\
    \ table. Here are the steps for modifying an MV that was created using the ON\
    \ PREBUILT TABLE clause:\n\n1.  Alter the base table.\n2.  Drop the MV. For MVs\
    \ built on prebuilt tables, this doesn’t drop the underlying table.\n3.  Alter\
    \ the prebuilt table.\n4.  Recreate the MV on the prebuilt table.\n\nHere is a\
    \ simple example to illustrate this process. First, the base table is altered:\n\
    \n```\nSQL> alter table sales add(sales_loc varchar2(30));\n```\n\nThen, drop\
    \ the MV:\n\n```\nSQL> drop materialized view sales_mv;\n```\n\nFor MVs created\
    \ on prebuilt tables, this doesn’t drop the underlying table—only the MV object.\
    \ Next, add a column to the prebuilt table:\n\n```\nSQL> alter table sales_mv\
    \ add(sales_loc varchar2(30));\n```\n\nNow, you can rebuild the MV, using the\
    \ prebuilt table with the new column added:\n\n```\ncreate materialized view sales_mv\n\
    on prebuilt table\nrefresh with primary key\n  complete on demand as\nselect sales_id,\
    \ sales_amt, sales_dtt, sales_loc\nfrom sales;\n```\n\nThis process has the advantage\
    \ of allowing you to modify an MV definition without dropping the underlying table.\
    \ You have to drop the MV, alter the underlying table, and then recreate the MV\
    \ with the new definition. If the underlying table contains a large amount of\
    \ data, this method can prevent unwanted downtime.\n\nAs mentioned in the previous\
    \ section, you need to be aware that if there is any DML activity against the\
    \ base table during the MV rebuild operation, those transactions aren’t reflected\
    \ in the MV when you attempt to refresh it.\n\nToggling Redo Logging on an MV\n\
    \nRecall that an MV has an underlying database table. When you refresh an MV,\
    \ this initiates transactions in the underlying table that result in the generation\
    \ of redo (just as with a regular database table). In the event of a database\
    \ failure, you can restore and recover all the transactions associated with an\
    \ MV.\n\nBy default, redo logging is enabled when you create an MV. You have the\
    \ option of specifying that redo not be logged when an MV is refreshed. To enable\
    \ nologging, create the MV with the NOLOGGING option:\n\n```\ncreate materialized\
    \ view sales_mv\nnologging\nrefresh with primary key\n  fast on demand as\nselect\
    \ sales_id ,sales_amt, sales_dtt\nfrom sales;\n```\n\nYou can also alter an existing\
    \ MV into nologging mode:\n\n```\nSQL> alter materialized view sales_mv nologging;\n\
    ```\n\nIf you want to reenable logging, then do as follows:\n\n```\nSQL> alter\
    \ materialized view sales_mv logging;\n```\n\nTo verify that the MV has been switched\
    \ to NOLOGGING, query the USER_TABLES view:\n\n```\nselect a.table_name, a.logging\n\
    from user_tables a\n    ,user_mviews b\nwhere a.table_name = b.mview_name;\n```\n\
    \nThe advantage of enabling nologging is that refreshes take place more quickly.\
    \ The refresh mechanism uses a direct path insert, which, when combined with NOLOGGING,\
    \ eliminates most of the redo generation. The big downside is that if a media\
    \ failure occurs soon after an MV has been refreshed, you can’t recover the data\
    \ in the MV. In this scenario the first time you attempt to access the MV, you\
    \ receive an error such as\n\n```\nORA-01578: ORACLE data block corrupted (file\
    \ # 5, block # 899)\nORA-01110: data file 5: '/u01/dbfile/o12c/users02.dbf'\n\
    ORA-26040: Data block was loaded using the NOLOGGING option\n```\n\nIf you get\
    \ the previous error, then you’ll most likely have to rebuild the MV to make the\
    \ data accessible again. In many environments this may be acceptable. You save\
    \ on database resources by not generating redo for the MV, but the downside is\
    \ a longer restore process (in the event of a failure) that requires you to rebuild\
    \ the MV.\n\n![image](Images/sq.jpg) **Note**   If your database is in force logging\
    \ mode, then the NOLOGGING clause has no effect. The force logging mode is required\
    \ in environments using Data Guard.\n\nAltering Parallelism\n\nSometimes, an MV\
    \ is created with a high degree of parallelism to improve the performance of the\
    \ creation process:\n\n```\ncreate materialized view sales_mv\nparallel 4\nrefresh\
    \ with primary key\n  fast on demand as\nselect sales_id ,sales_amt, sales_dtt\n\
    from sales;\n```\n\nAfter you create the MV, you may not need the same degree\
    \ of parallelism associated with the underlying table. This is important because\
    \ queries against the MV will start parallel threads of execution. In other words,\
    \ you may require parallelism for building the MV quickly but do not want parallelism\
    \ used when subsequently querying the MV. You can alter an MV’s parallelism as\
    \ follows:\n\n```\nSQL> alter materialized view sales_mv parallel 1;\n```\n\n\
    You can check on the degree of parallelism by querying USER_TABLES:\n\n```\nSQL>\
    \ select table_name, degree from user_tables where table_name= upper('&mv_name');\n\
    ```\n\nMoving an MV\n\nAs the operating environment’s conditions change, you may\
    \ need to move an MV from one tablespace to another. In these scenarios, use the\
    \ ALTER MATERIALIZED VIEW...MOVE TABLESPACE statement. This example moves the\
    \ table associated with an MV to a different tablespace:\n\n```\nSQL> alter materialized\
    \ view sales_mv move tablespace users;\n```\n\nIf any indexes are associated with\
    \ the MV table, the move operation renders them unusable. You can check the status\
    \ of the indexes as follows:\n\n```\nselect a.table_name, a.index_name, a.status\n\
    from user_indexes a\n    ,user_mviews  b\nwhere a.table_name = b.mview_name;\n\
    ```\n\nYou must rebuild any associated indexes after moving the table; for example,\n\
    \n```\nSQL> alter index sales_pk2 rebuild;\n```\n\nManaging MV Logs\n\nMV logs\
    \ are required for fast refreshable MVs. The MV log is a table that stores DML\
    \ information for a master (base) table. The MV log is created in the same database\
    \ as the master table with the same user that owns the master table. You need\
    \ the CREATE TABLE privilege to create an MV log.\n\nThe MV log is populated by\
    \ an Oracle internal trigger (that you have no control over). This internal trigger\
    \ inserts a row into the MV log after an INSERT, UPDATE, or DELETE on the master\
    \ table. You can view the internal triggers in use by querying DBA/ALL/USER_INTERNAL_TRIGGERS.\n\
    \nAn MV log is associated with only one table, and each master table can have\
    \ only one MV log defined for it. You can create an MV log on a table or on another\
    \ MV. Multiple fast refreshable MVs can use one MV log.\n\nAfter an MV performs\
    \ a fast refresh, any records in the MV log that are no longer needed are deleted.\
    \ In the event that multiple MVs are using one MV log, then records are purged\
    \ from the MV log only once they aren’t required by any of the fast refreshable\
    \ MVs.\n\n[Table 15-3](#9781430257288_Ch15.xhtml#Tab3) defines the terms used\
    \ with MV logs. These terms are referred to in the following sections in this\
    \ chapter that relate to MV logs.\n\n[Table 15-3.](#9781430257288_Ch15.xhtml#_Tab3)\
    \ MV Log Terminology and Features\n\n| Term | Meaning |\n| --- | --- |\n| Materialized\
    \ view (MV) log | Database object that tracks DML changes to MV base table; required\
    \ for fast refreshes |\n| Primary key MV log | MV log that uses the base table\
    \ primary key to track DML changes |\n| ROWID MV log | MV log that uses the base\
    \ table ROWID to track DML changes |\n| Commit SCN MV log | MV log based on the\
    \ commit SCN instead of a timestamp; available in Oracle Database 11g Release\
    \ 2 and higher |\n| Object ID | Object identifier used to track DML changes |\n\
    | Filter column | Nonprimary key column referenced by an MV subquery; required\
    \ for some fast refresh scenarios |\n| Join column | Nonprimary key column that\
    \ defines a join in the subquery WHERE clause; required for some fast refresh\
    \ scenarios |\n| Sequence | Sequence value required for some fast refresh scenarios\
    \ |\n| New values | Specifies that old and new values be recorded in the MV log;\
    \ required for single-table aggregate views to be eligible for fast refresh |\n\
    \nCreating an MV Log\n\nFast refreshable views require an MV log to be created\
    \ on the master (base) table. Use the CREATE MATERIALIZED VIEW LOG command to\
    \ create an MV log. This example creates an MV log on the SALES table, specifying\
    \ that the primary key should be used to identify rows in the MV log:\n\n```\n\
    SQL> create materialized view log on sales with primary key;\n```\n\nYou can also\
    \ specify storage information, such as the tablespace name:\n\n```\ncreate materialized\
    \ view log on sales\npctfree 5\ntablespace users\nwith primary key;\n```\n\nWhen\
    \ you create an MV log on a table, Oracle creates a table to store the changes\
    \ since the last refresh to a base table. The name of the MV log table follows\
    \ this format: MLOG$_<master_table_name>. You can use the SQL*Plus DESCRIBE statement\
    \ to view the columns of the MV log:\n\n```\nSQL> desc mlog$_sales;\nName                              Null?    Type\n\
    -------------------------------- -------- ----------------------------\nSALES_ID                                  NUMBER\n\
    SNAPTIME$$                                DATE\nDMLTYPE$$                                \
    \ VARCHAR2(1)\nOLD_NEW$$                                 VARCHAR2(1)\nCHANGE_VECTOR$$                          \
    \ RAW(255)\nXID$$                                     NUMBER\n```\n\nYou can query\
    \ this underlying MLOG$ table to determine the number of transactions since the\
    \ last refresh. After each refresh the MV log table is purged. If multiple MVs\
    \ use the MV log, the log table isn’t purged until all dependent MVs are refreshed.\n\
    \nIf you create the MV log on a table with a primary key, then a RUPD$_<master_table_name>\
    \ table is also created. This table is used for updatable MVs. If you’re not using\
    \ the updatable MV feature, then this table is never used, and you can ignore\
    \ it.\n\nWhen you create an MV log, you can specify that it use one of the following\
    \ clauses to uniquely identify rows in the MV log table:\n\n*   WITH PRIMARY KEY\n\
    *   WITH ROWID\n*   WITH OBJECT ID\n\nIf the master table has a primary key, use\
    \ WITH PRIMARY KEY when you create the MV log. If the master table doesn’t have\
    \ a primary key, you have to use WITH ROWID to specify that a ROWID value be used\
    \ to uniquely identify MV log records. You can use WITH OBJECT ID when you create\
    \ an MV log on an object table.\n\nOracle uses the SNAPTIME$$ column to determine\
    \ which records need to be refreshed or purged, or both. As of Oracle Database\
    \ 11g Release 2, you have the option of creating a COMMIT SCN–based MV log (not\
    \ based on a timestamp). This type of MV log uses the SCN of a transaction to\
    \ determine which records need to be applied to any dependent MVs. COMMIT SCN–based\
    \ MV logs are more efficient than timestamp-based MV logs. If you’re using Oracle\
    \ Database 11g Release 2 or higher, then you should consider using COMMIT SCN–based\
    \ MV logs. Use the WITH COMMIT SCN clause to do this:\n\n```\nSQL> create materialized\
    \ view log on sales with commit scn;\n```\n\nYou can view whether an MV log is\
    \ SCN based by querying USER_MVIEW_LOGS:\n\n```\nSQL> select log_table, commit_scn_based\
    \ from user_mview_logs;\n```\n\n![image](Images/sq.jpg) **Note**   MV logs created\
    \ with COMMIT SCN do not have a SNAPTIME$$ column.\n\nIndexing MV Log Columns\n\
    \nSometimes, you may need better performance from your fast refreshing MVs. One\
    \ way to do this is through indexes on columns of the MV log table. In particular,\
    \ Oracle uses the SNAPTIME$$ column or the primary key column, or both, when refreshing\
    \ or purging. Therefore, indexes on these columns can improve performance:\n\n\
    ```\nSQL> create index mlog$_sales_idx1 on mlog$_sales(snaptime$$);\nSQL> create\
    \ index mlog$_sales_idx2 on mlog$_sales(sales_id);\n```\n\nYou shouldn’t add indexes\
    \ just because you think it may be a good idea. Only add indexes on the MV log\
    \ tables when you have known performance issues with fast refreshes. Keep in mind\
    \ that adding indexes consumes resources in the database. Oracle has to maintain\
    \ the index for DML operations on the table, and an index uses disk space.\n\n\
    Viewing Space Used by an MV Log\n\nYou should consider periodically checking the\
    \ space consumed by an MV log. If the space consumed is growing (and never shrinking),\
    \ you may have an issue with an MV’s not successfully refreshing and hence causing\
    \ the MV log never to be purged. Here is a query to check the space of MV logs:\n\
    \n```\nselect segment_name, tablespace_name\n,bytes/1024/1024 meg_bytes, extents\n\
    from dba_segments\nwhere segment_name like 'MLOG$%'\norder by meg_bytes;\n```\n\
    \nHere is some sample output:\n\n```\nSEGMENT_NAME         TABLESPACE_NAME                \
    \ MEG_BYTES    EXTENTS\n-------------------- ------------------------------ ----------\
    \ ----------\nMLOG$_USERS          MV_DATA                              1609      \
    \ 3218\nMLOG$_ASSET_ATTRS    MV_DATA                            3675.5       7351\n\
    ```\n\nThis output indicates that a couple of MV logs most likely have purging\
    \ issues. In this situation there are probably multiple MVs that are using the\
    \ MV log, and one of them isn’t refreshing on a daily basis, thus preventing the\
    \ log from being purged.\n\nYou may run into a situation in which an MV log hasn’t\
    \ been purged for quite some time. This can happen because you have multiple MVs\
    \ using the same MV log, and one of those MVs isn’t successfully refreshing anymore.\
    \ This can happen when a DBA builds a development environment and connects development\
    \ MVs to the production environment (it shouldn’t happen, but it does). At some\
    \ later point in time, the DBA drops the development database. The production\
    \ environment still has information regarding the remote development MV and won’t\
    \ purge MV log records because it thinks a fast refreshable MV needs the log data\
    \ to refresh.\n\nIn these scenarios, you should determine which MVs are using\
    \ the log (see the section “Determining How Many MVs Reference a Central MV Log,”\
    \ later in this chapter), and resolve any issues. After the problem is solved,\
    \ check the space being used by the log, and see if it can be shrunk (see the\
    \ next section, “Shrinking the Space in an MV Log”).\n\nShrinking the Space in\
    \ an MV Log\n\nIf an MV log doesn’t successfully delete records, it grows large.\
    \ After you resolve the issue, and the records are deleted from the MV log, you\
    \ can set the high-water mark for the MV log table to a high value. But, doing\
    \ so may cause performance issues and also unnecessarily consumes disk space.\
    \ In this situation, consider shrinking the space used by the MV log.\n\nIn this\
    \ example, MLOG$_SALES had a problem with purging records because of an associated\
    \ MV’s not successfully refreshing. This MV log subsequently grew large. The issue\
    \ was identified and resolved, and now the log’s space needs to be reduced. To\
    \ shrink the space in an MV log, first enable row movement on the appropriate\
    \ MV log MLOG$ table:\n\n```\nSQL> alter table mlog$_sales enable row movement;\n\
    ```\n\nNext, issue the ALTER MATERIALIZED VIEW LOG ON...SHRINK statement. Note\
    \ that the table name (after the keyword ON) is that of the master table:\n\n\
    ```\nSQL> alter materialized view log on sales shrink space;\n```\n\nThis statement\
    \ may take a long time, depending on the amount of space it shrinks. After the\
    \ statement finishes, you can disable row movement:\n\n```\nSQL> alter table mlog$_sales\
    \ disable row movement;\n```\n\nYou can verify that the space has been reduced\
    \ by running the query from the prior section, which selects from DBA_SEGMENTS.\n\
    \nChecking the Row Count of an MV Log\n\nAs mentioned earlier, sometimes there\
    \ are problems with an MV’s refreshing, and this results in the building up of\
    \ a large number of rows in the corresponding MV log table. This can happen when\
    \ multiple MVs are using one MV log, and one of the MVs can’t perform a fast refresh.\
    \ In this situation the MV log continues to grow until the issue is resolved.\n\
    \nOne way of detecting whether an MV log isn’t being purged is to check the row\
    \ counts of the MV log tables periodically. The following query uses SQL to generate\
    \ SQL that creates a script that checks row counts for MV log tables owned by\
    \ the currently connected user:\n\n```\nset head off pages 0 lines 132 trimspool\
    \ on\nspo mvcount_dyn.sql\nselect 'select count(*) || ' || '''' || ': ' || table_name\
    \ || ''''\n|| ' from ' || table_name || ';'\nfrom user_tables\nwhere table_name\
    \ like 'MLOG%';\nspo off;\n```\n\nThis script generates a script named mvcount_dyn.sql,\
    \ containing the SQL statements to select row counts from the MLOG$ tables. When\
    \ you’re inspecting row counts, you must be somewhat familiar with your application\
    \ and have an idea of what a normal row count is. Here is some sample code generated\
    \ by the previous script:\n\n```\nselect count(*) || ': MLOG$_SALES' from MLOG$_SALES;\n\
    select count(*) || ': MLOG$_REGION' from MLOG$_REGION;\n```\n\nMoving an MV Log\n\
    \nYou may need to move an MV log because the initial creation script didn’t specify\
    \ the correct tablespace. A common scenario is that the tablespace isn’t specified,\
    \ and the MV log is placed by default in a tablespace such as USERS. You can verify\
    \ the tablespace information with this query:\n\n```\nselect table_name, tablespace_name\n\
    from user_tables\nwhere table_name like 'MLOG%';\n```\n\nIf any MV log tables\
    \ need to be relocated, use the ALTER MATERIALIZED VIEW LOG ON <table_name> MOVE\
    \ statement. Note that you specify the name of the master table (and not the underlying\
    \ MLOG$ table) on which the MV is created:\n\n```\nSQL> alter materialized view\
    \ log on sales move tablespace users;\n```\n\nAlso keep in mind that when you\
    \ move a table, any associated indexes are rendered unusable (because the ROWID\
    \ of every record in the table has just changed). You can check the status of\
    \ the indexes as shown:\n\n```\nselect a.table_name, a.index_name, a.status\n\
    from user_indexes a\n    ,user_mview_logs b\nwhere a.table_name = b.log_table;\n\
    ```\n\nAny unusable indexes must be rebuilt. Here is an example of rebuilding\
    \ an index:\n\n```\nSQL> alter index mlog$_sales_idx2 rebuild;\n```\n\nDropping\
    \ an MV Log\n\nThere are a couple of reasons why you may want to drop an MV log:\n\
    \n*   You initially created an MV log, but requirements have changed and you no\
    \ longer need it.\n*   The MV log has grown large and is causing performance issues,\
    \ and you want to drop it to reset the size.\n\nBefore you drop an MV log, you\
    \ can verify the owner, master table, and MV log table with the following query:\n\
    \n```\nselect\n log_owner\n,master     -- master table\n,log_table\nfrom user_mview_logs;\n\
    ```\n\nUse the DROP MATERIALIZED VIEW LOG ON statement to drop an MV log. You\
    \ don’t need to know the name of the MV log, but you do need to know the name\
    \ of the master table on which the log was created. This example drops the MV\
    \ log on the SALES table:\n\n```\nSQL> drop materialized view log on sales;\n\
    ```\n\nYou should see the following message if successful:\n\n```\nMaterialized\
    \ view log dropped.\n```\n\nIf you have permissions, and you don’t own the table\
    \ on which the MV log is created, you can specify the schema name when dropping\
    \ the MV log:\n\n```\nSQL> drop materialized view log on <schema>.<table>;\n```\n\
    \nIf you’re cleaning up an environment and want to drop all MV logs associated\
    \ with a user, then use SQL to generate SQL to accomplish this. The following\
    \ script creates the SQL required to drop all MV logs owned by the currently connected\
    \ user:\n\n```\nset lines 132 pages 0 head off trimspool on\nspo drop_dyn.sql\n\
    select 'drop materialized view log on ' || master || ';'\nfrom user_mview_logs;\n\
    spo off;\n```\n\nThe previous SQL*Plus code creates a script named drop_dyn.sql,\
    \ containing the SQL statements that can be used to drop all MV logs for a user.\n\
    \nRefreshing MVs\n\nTypically, you refresh MVs at periodic intervals. You can\
    \ either refresh the MVs manually or automate this task. The following sections\
    \ cover these related topics:\n\n*   Manually refreshing MVs from SQL*Plus\n*\
    \   Automating refreshes, using a shell script and scheduling utility\n*   Automating\
    \ refreshes, using the built-in Oracle job scheduler\n\n![image](Images/sq.jpg) **Note**  \
    \ If you require that a group of MV be refreshed as a set, see the section “Managing\
    \ MVs in Groups,” later in this chapter.\n\nManually Refreshing MVs from SQL*Plus\n\
    \nYou’ll need to refresh an MV periodically so as to synchronize it with the base\
    \ table. To do this, use SQL*Plus to call the REFRESH procedure of the DBMS_MVIEW\
    \ package. The procedure takes two parameters: the MV name and the refresh method.\
    \ This example uses the EXEC[UTE] statement to call the procedure. The MV being\
    \ refreshed is SALES_MV, and the refresh method is F (for fast):\n\n```\nSQL>\
    \ exec dbms_mview.refresh('SALES_MV','F');\n```\n\nYou can also manually run a\
    \ refresh from SQL*Plus, using an anonymous block of PL/SQL. This example performs\
    \ a fast refresh:\n\n```\nSQL> begin\n     dbms_mview.refresh('SALES_MV','F');\n\
         end;\n     /\n```\n\nAdditionally, you can use a question mark (?) to invoke\
    \ the force refresh method. This instructs Oracle to perform a fast refresh if\
    \ possible. If a fast refresh isn’t possible, then Oracle performs a complete\
    \ refresh:\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV','?');\n```\n\nYou can\
    \ also use a C (for complete) to specifically execute the complete refresh method:\n\
    \n```\nSQL> exec dbms_mview.refresh('SALES_MV','C');\n```\n\nMVS VS. RESULT CACHE\n\
    \nStarting with Oracle Database 11g, Oracle has a result cache feature that stores\
    \ the result of a query in memory and makes that result set available to any subsequent\
    \ identical queries that are issued. If a subsequent identical query is issued,\
    \ and none of the underlying table data have changed since the original query\
    \ was issued, Oracle makes the result available to the subsequent query. For databases\
    \ with relatively static data and many identical queries being issued, using the\
    \ result cache can significantly improve performance.\n\nHow do MVs compare with\
    \ the result cache? Recall that an MV stores the result of a query in a table\
    \ and makes that result available to reporting applications. The two features\
    \ sound similar but differ in a couple of significant ways:\n\n1.  The result\
    \ cache stores results in memory. An MV stores results in a table.\n2.  The result\
    \ cache needs to be refreshed any time the underlying data in the tables change.\
    \ MVs are refreshed on commit or at a periodic interval (such as on a daily basis).\n\
    \nThe result cache can significantly improve performance if you have long-running\
    \ queries that operate on relatively static data. MVs are better suited for replicating\
    \ data and storing the results of complex queries that only require new results\
    \ on a periodic basis (such as daily, weekly, or monthly).\n\nAutomating Refreshes,\
    \ Using a Shell Script and Scheduling Utility\n\nMany MVs must be refreshed on\
    \ a daily basis. To achieve this, you can use a Linux/Unix utility (such as cron)\
    \ that calls a shell script to refresh the MVs. This approach\n\n*   is easy to\
    \ implement and maintain\n*   makes it easy to create a daily log file for auditing\n\
    *   sends e-mail when the job has problems or when the database isn’t available\n\
    \nHere is an example of a shell script that contains the logic to refresh an MV:\n\
    \n```\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\n\
    fi\n#\nHOSTNAME='uname -a | awk '{print$2}''\nMAILX='/bin/mailx'\nMAIL_LIST='dkuhn@gmail.com'\n\
    ORACLE_SID=$1\njobname=SALES_MV\n# Source oracle OS variables, see Chapter 2 for\
    \ details.\n. /etc/oraset $ORACLE_SID\n#\nsqlplus -s <<EOF\nmv_maint/foo\nWHENEVER\
    \ SQLERROR EXIT FAILURE\nexec dbms_mview.refresh('SALES_MV','C');\nEOF\n#\nif\
    \ [ $? -ne 0 ]; then\necho \"not okay\"\n$MAILX -s \"Problem with MV refresh on\
    \ $HOSTNAME $jobname\" $MAIL_LIST <<EOF\n$HOSTNAME $jobname MVs not okay.\nEOF\n\
    else\necho \"okay\"\n$MAILX -s \"MV refresh OK on $HOSTNAME $jobname\" $MAIL_LIST\
    \ <<EOF\n$HOSTNAME $jobname MVs okay.\nEOF\nfi\n#\nexit 0\n```\n\nFor this MV\
    \ refresh job, here is the corresponding cron entry that invokes it:\n\n```\n\
    25 16 * * * /orahome/oracle/bin/mvref_sales.bsh DWREP \\\n1>/orahome/oracle/bin/log/mvref_sales.log\
    \ 2>&1\n```\n\nThis job runs on a daily basis, at 4:25 pm. For details on using\
    \ cron to schedule jobs, see [Chapter 21](#9781430257288_Ch21.xhtml).\n\nCreating\
    \ an MV with a Refresh Interval\n\nWhen you initially create an MV, you have the\
    \ option of specifying START WITH and NEXT clauses, which instruct Oracle to set\
    \ up an internal database job (via the DBMS_JOB package) to initiate the refresh\
    \ of an MV on a periodic basis. If you omit START WITH and NEXT, then no job is\
    \ set up, and you have to use another technique (e.g., a scheduling utility such\
    \ as cron).\n\nI almost never specify START WITH and NEXT as a refresh mechanism.\
    \ I strongly prefer to use another scheduling utility, such as cron. When using\
    \ cron, it’s easy to create a log file that details how the job ran and whether\
    \ there were any issues. Also, when using cron, it’s easy to have the log file\
    \ e-mailed to a distribution list so that the support DBAs are aware of any issues.\n\
    \nRegardless, it’s important to understand how START WITH and NEXT work, because\
    \ sooner or later you’ll find yourself in an environment in which DBAs or developers\
    \ prefer to use the DBMS_JOB package for refreshes. When you’re troubleshooting\
    \ refresh issues, you must understand how this refresh mechanism works.\n\nThe\
    \ START WITH parameter specifies the date you want the first refresh of an MV\
    \ to occur. The NEXT parameter specifies a date expression that Oracle uses to\
    \ calculate the interval between refreshes. For instance, this MV initially refreshes\
    \ 1 minute in the future (sysdate+1/1440) and subsequently refreshes on a daily\
    \ basis (sysdate+1):\n\n```\ncreate materialized view sales_mv\nrefresh\nwith\
    \ primary key\nfast on demand\nstart with sysdate+1/1440\nnext sysdate+1\nas\n\
    select sales_id, sales_amt, sales_dtt\nfrom sales;\n```\n\nYou can view details\
    \ of the scheduled job by querying USER_JOBS:\n\n```\nselect job, schema_user\n\
    ,to_char(last_date,'dd-mon-yyyy hh24:mi:ss') last_date\n,to_char(next_date,'dd-mon-yyyy\
    \ hh24:mi:ss') next_date\n,interval, broken\nfrom user_jobs;\n```\n\nHere is some\
    \ sample output:\n\n```\nJOB  SCHEMA_USE LAST_DATE            NEXT_DATE            INTERVAL    \
    \ B\n---- ---------- -------------------- -------------------- ------------ -\n\
       1 MV_MAINT   28-jan-2013 14:55:33 29-jan-2013 14:55:33 sysdate+1    N\n```\n\
    \nYou can also view job information in the USER_REFRESH view:\n\n```\nselect rowner,\
    \ rname, job\n,to_char(next_date,'dd-mon-yyyy hh24:mi:ss')\n,interval, broken\n\
    from user_refresh;\n```\n\nHere is some sample output:\n\n```\nROWNER     RNAME      \
    \ JOB TO_CHAR(NEXT_DATE,'DD-MON-YYY INTERVAL     B\n---------- ---------- ----\
    \ ----------------------------- ------------ -\nMV_MAINT   SALES_MV      1 29-jan-2013\
    \ 14:55:33          sysdate+1    N\n```\n\nWhen you drop an MV, the associated\
    \ job is also removed. If you want to remove a job manually, use the REMOVE procedure\
    \ DBMS_JOB. This example removes job number 1, which was identified from the previous\
    \ queries:\n\n```\nSQL> exec dbms_job.remove(1);\n```\n\n![image](Images/sq.jpg) **Note**  \
    \ You can’t use START WITH or NEXT in conjunction with an MV that refreshes ON\
    \ COMMIT.\n\nEfficiently Performing a Complete Refresh\n\nWhen an MV does a complete\
    \ refresh, the default behavior is to use a DELETE statement to remove all records\
    \ from the MV table. After the delete is finished, records are selected from the\
    \ master table and inserted into the MV table. The delete and insert are done\
    \ as one transaction; this means that anybody selecting from the MV during the\
    \ complete refresh process sees the data as they existed before the DELETE statement.\
    \ Anybody accessing the MV immediately after the INSERT commits sees a fresh view\
    \ of the data.\n\nIn some scenarios, you may want to modify this behavior. If\
    \ a large amount of data are being refreshed, the DELETE statement can take a\
    \ long time. You have the option of instructing Oracle to perform the removal\
    \ of data as efficiently as possible via the ATOMIC_REFRESH parameter. When this\
    \ parameter is set to FALSE, it allows Oracle to use a TRUNCATE statement instead\
    \ of a DELETE when performing a complete refresh:\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV',method=>'C',atomic_refresh=>false);\n\
    ```\n\nTRUNCATE works faster than DELETE for large data sets because TRUNCATE\
    \ doesn’t have the overhead of generating redo. The disadvantage of using the\
    \ TRUNCATE statement is that a user selecting from the MV may see zero rows while\
    \ the refresh is taking place.\n\nHandling the ORA-12034 Error\n\nWhen you attempt\
    \ to perform a fast refresh of an MV, you may sometimes get the ORA-12034 error;\
    \ for example,\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n```\n\n\
    The statement subsequently throws this error message:\n\n```\nORA-12034: materialized\
    \ view log on \"MV_MAINT\".\"SALES\" younger than last refresh\n```\n\nTo resolve\
    \ this error, try to refresh the MV completely:\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV','C');\n\
    ```\n\nAfter the complete refresh has finished, you should be able to perform\
    \ a fast refresh without receiving an error:\n\n```\nSQL> exec dbms_mview.refresh('SALES_MV','F');\n\
    ```\n\nThe ORA-12034 error is thrown when Oracle determines that the MV log was\
    \ created after the last refresh took place in the associated MV. In other words,\
    \ the MV log is younger than the last refresh of MV. There are several possible\
    \ causes:\n\n*   The MV log was dropped and recreated.\n*   The MV log was purged.\n\
    *   The master table was reorganized.\n*   The master table was truncated.\n*\
    \   The previous refresh failed.\n\nIn this situation, Oracle knows that transactions\
    \ may have been created between the last refresh time of the MV and when the MV\
    \ log was created. In this scenario, you have to first perform a complete refresh\
    \ before you can start using the fast refresh mechanism.\n\nMonitoring MV Refreshes\n\
    \nThe following sections contain some very handy examples of how to monitor MV\
    \ refresh jobs. Examples include how to view the last refresh time, determine\
    \ whether a job is currently executing, establish the progress of a refresh job,\
    \ and check to see whether MVs haven’t refreshed within the last day. Scripts\
    \ such as these are invaluable for troubleshooting and diagnosing refresh problems.\n\
    \nViewing MVs’ Last Refresh Times\n\nWhen you’re troubleshooting issues with MVs,\
    \ usually the first item to check is the LAST_REFRESH_DATE in DBA/ALL/USER_MVIEWS.\
    \ Viewing this information allows you to see whether the MVs are refreshing on\
    \ schedule. Run this query as the owner of the MV to display the last refresh\
    \ date:\n\n```\nselect mview_name\n,to_char(last_refresh_date,'dd-mon-yy hh24:mi:ss')\n\
    ,refresh_mode, refresh_method\nfrom user_mviews\n```\n\nThe LAST_REFRESH_DATE\
    \ column of DBA/ALL/USER_MVIEWS shows the last date and time that an MV successfully\
    \ finished refreshing. The LAST_REFRESH_DATE is NULL if the MV has never successfully\
    \ refreshed.\n\nDetermining Whether a Refresh Is in Progress\n\nIf you need to\
    \ know what MVs are running, use this query:\n\n```\nSQL> select sid, serial#,\
    \ currmvowner, currmvname from v$mvrefresh;\n```\n\nHere is some sample output:\n\
    \n```\n      SID    SERIAL#  CURRMVOWNER             CURRMVNAME\n---------- ----------\
    \ ----------------------- --------------------\n       108       3037 MV_MAINT                SALES_MV\n\
    ```\n\nMonitoring Real-Time Refresh Progress\n\nIf you deal with large MVs, the\
    \ next query shows you the real-time progress of the refresh operation. When you’re\
    \ troubleshooting issues, this query can be very useful. Run the following script\
    \ as the user, with privileges on the internal SYS tables:\n\n```\ncolumn \"MVIEW\
    \ BEING REFRESHED\" format a25\ncolumn inserts format 9999999\ncolumn updates\
    \ format 9999999\ncolumn deletes format 9999999\n--\nselect\n  currmvowner_knstmvr\
    \ || '.' || currmvname_knstmvr \"MVIEW BEING REFRESHED\",\n  decode(reftype_knstmvr,\
    \ 1, 'FAST', 2, 'COMPLETE', 'UNKNOWN') reftype,\n  decode(groupstate_knstmvr,\
    \ 1, 'SETUP', 2, 'INSTANTIATE',\n     3, 'WRAPUP', 'UNKNOWN' ) STATE,\n  total_inserts_knstmvr\
    \ inserts,\n  total_updates_knstmvr updates,\n  total_deletes_knstmvr deletes\n\
    from x$knstmvr x\nwhere type_knst = 6\nand exists (select 1\n            from\
    \ v$session s\n            where s.sid=x.sid_knst\n            and s.serial#=x.serial_knst);\n\
    ```\n\nWhen an MV first starts refreshing, you see this output:\n\n```\nMVIEW\
    \ BEING REFRESHED     REFTYPE  STATE        INSERTS  UPDATES  DELETES\n-------------------------\
    \ -------- ----------- -------- -------- --------\nMV_MAINT.SALES_MV         UNKNOWN  SETUP              0        0        0\n\
    ```\n\nAfter a few seconds the MV reaches the INSTANTIATE state:\n\n```\nMV_MAINT.SALES_MV        \
    \ FAST     INSTANTIATE        0        0        0\n```\n\nAs the MV refreshes,\
    \ the INSERTS, UPDATES, and DELETES columns are updated appropriately:\n\n```\n\
    MV_MAINT.SALES_MV         FAST     INSTANTIATE      860      274        0\n```\n\
    \nWhen the MV is almost finished refreshing, it reaches the WRAPUP state:\n\n\
    ```\nMV_MAINT.SALES_MV         FAST     WRAPUP          5284     1518        0\n\
    ```\n\nAfter the MV has completed refreshing, the query returns no rows:\n\n```\n\
    no rows selected\n```\n\nAs you can imagine, this query can be quite useful for\
    \ troubleshooting and diagnosing MV refresh issues.\n\nChecking Whether MVs Are\
    \ Refreshing Within a Time Period\n\nWhen you’re dealing with MVs, it’s nice to\
    \ have an automated way of determining whether refreshes are occurring. Use the\
    \ following shell script to detect which MVs haven’t refreshed within the last\
    \ day and then send an e-mail if any are detected:\n\n```\n#!/bin/bash\n# Source\
    \ oracle OS variables, see Chapter 2 for details\n. /etc/oraset $1\n#\ncrit_var=$(sqlplus\
    \ -s <<EOF\nmv_maint/foo\nSET HEAD OFF FEED OFF\nSELECT count(*) FROM user_mviews\n\
    WHERE sysdate-last_refresh_date > 1;\nEOF)\n#\nif [ $crit_var -ne 0 ]; then\n\
      echo $crit_var\n  echo \"mv_ref refresh problem with $1\" | mailx -s \"mv_ref\
    \ problem\" \\\ndkuhn@gmail.com\nelse\n  echo $crit_var\n  echo \"MVs ok\"\nfi\n\
    #\nexit 0\n```\n\nThis script takes the output of the SQL*Plus statement and returns\
    \ it to the shell crit_var variable. If any MVs for the REP_MV user haven’t refreshed\
    \ within the last day, then the crit_var variable has a nonzero value. If crit_var\
    \ isn’t equal to zero, then an e-mail is sent, indicating that there is an issue.\n\
    \nCreating Remote MV Refreshes\n\nYou can create MVs that select from remote tables,\
    \ MVs, or views, or a combination of these. Doing so allows you to quickly and\
    \ efficiently replicate data. The setup for basing MVs on remote objects is as\
    \ follows:\n\n1.  Ensure that Oracle Net connectivity exists from the replicated\
    \ database environment to the database with the master tables. If you don’t have\
    \ this connectivity, you can’t replicate using MVs.\n2.  Obtain access to a user\
    \ account in the remote database that has access to the remote tables, MVs, or\
    \ views that you want to replicate.\n3.  For fast refreshes, create an MV log\
    \ on the master (base) table. You only need to do this if you intend to perform\
    \ fast refreshes.\n4.  Create a database link in the replicated database environment\
    \ that points to the master database.\n5.  Create MVs in the replicated database\
    \ environment that access remote master objects via the database link created\
    \ in step 4.\n\nHere is a simple example. First, ensure that you can establish\
    \ Oracle Net connectivity from the replicated environment to the master database.\
    \ You can verify connectivity and ensure that you can log in to the master database\
    \ by connecting via SQL*Plus from the replicated database environment to the remote\
    \ master. From the command prompt on the database that will contain the MVs, attempt\
    \ to connect to the user REP_MV in the master database named ENGDEV on the XENGDB\
    \ server:\n\n```\n$ sqlplus rep_mv/foo@'xengdb:1522/engdev'\n```\n\nWhen you’re\
    \ connected to the remote master database, also be sure you have access to the\
    \ tables that you base the MV on. In this example the name of the remote master\
    \ table is SALES:\n\n```\nSQL> select count(*) from sales;\n```\n\nNext, create\
    \ a database link in the database that will contain the MVs. The database link\
    \ points to the user in the remote master database:\n\n```\ncreate database link\
    \ engdev\nconnect to rep_mv identified by foo\nusing 'xengdb:1522/engdev';\n```\n\
    \nNow, create an MV that accesses the master SALES table:\n\n```\ncreate materialized\
    \ view sales_mv\nrefresh complete on demand\nas\nselect\n sales_id\n,sales_amt\n\
    from sales@engdev;\n```\n\nYou access the remote database by appending the @<database_link_name>\
    \ to the table name. This instructs Oracle to select from the remote table. The\
    \ remote table’s location is defined in the CREATE DATABASE LINK statement.\n\n\
    Understanding Remote-Refresh Architectures\n\nYou can use numerous configurations\
    \ with remotely refreshed MVs. This section details three common scenarios; you\
    \ can build on them to meet most remote-replication needs.\n\n[Figure 15-3](#9781430257288_Ch15.xhtml#Fig3)\
    \ shows a common configuration using MV logs on the master OLTP database. The\
    \ remote database uses MV logs to enable fast refreshes. This configuration is\
    \ typically used when you can’t report directly from an OLTP database because\
    \ of concern that the reporting activity will greatly hamper production performance.\
    \ This architecture is also useful when you have users on the other side of the\
    \ planet, and you want to replicate data to a database that is physically closer\
    \ to them so that they have acceptable reporting performance.\n\n![9781430257288_Fig15-03.jpg](Images/9781430257288_Fig15-03.jpg)\n\
    \n[Figure 15-3](#9781430257288_Ch15.xhtml#_Fig3). Remote refresh, using MV logs\
    \ at a master site\n\n[Figure 15-4](#9781430257288_Ch15.xhtml#Fig4) illustrates\
    \ a scenario in which you aren’t allowed to create MV logs on the master base\
    \ tables. This may happen because another team or organization owns the master\
    \ (base) database, and the owners are unwilling to let you create MV logs in the\
    \ master environment. In this case, you have to use complete MV refreshes to the\
    \ remote reporting database. This architecture is also appropriate when a large\
    \ percentage of the base table records are modified each day. In this situation\
    \ a complete refresh may be more efficient than a fast refresh (because you’re\
    \ replicating most of the data, not just a small subset).\n\n![9781430257288_Fig15-04.jpg](Images/9781430257288_Fig15-04.jpg)\n\
    \n[Figure 15-4](#9781430257288_Ch15.xhtml#_Fig4). Remote refresh, using complete\
    \ MV refreshes\n\n[Figure 15-5](#9781430257288_Ch15.xhtml#Fig5) shows a scenario\
    \ in which you replicate the base tables to a staging database and then replicate\
    \ from the staging database to a reporting database. This situation is common\
    \ when the network architecture is configured such that the reporting database\
    \ is placed on a network segment that can’t be directly connected to a hardened\
    \ production environment. In this case, you can build an intermediate database\
    \ that resides in a network that can connect to both the OLTP database and the\
    \ reporting database. Note that MV logs built are on the MVs in the secure staging\
    \ database. When refreshing in this configuration, you must coordinate the refresh\
    \ times of the staging and reporting databases so that there is no overlap during\
    \ the refresh.\n\n![9781430257288_Fig15-05.jpg](Images/9781430257288_Fig15-05.jpg)\n\
    \n[Figure 15-5](#9781430257288_Ch15.xhtml#_Fig5). Two-hop remote fast MV refresh\n\
    \n![image](Images/sq.jpg) **Note**   Sometimes, an MV built on another MV is called\
    \ a nested MV.\n\nViewing MV Base Table Information\n\nWhen you’re diagnosing\
    \ issues with MVs, it’s useful to view the MV and its associated remote master\
    \ table. Run the following query on the database that contains the MV to extract\
    \ master owner and table information:\n\n```\nselect\n owner        mv_owner\n\
    ,name         mv_name\n,master_owner mast_owner\n,master       mast_table\nfrom\
    \ dba_mview_refresh_times\norder by 1,2;\n```\n\nThe previous query reports on\
    \ each MV and the master table it’s based on. The base table can be local or remote.\n\
    \nDetermining How Many MVs Reference a Central MV Log\n\nSay you have one master\
    \ table with an MV log. Additionally, more than one remote MV uses the central\
    \ master MV log. [Figure 15-6](#9781430257288_Ch15.xhtml#Fig6) illustrates this\
    \ configuration.\n\n![9781430257288_Fig15-06.jpg](Images/9781430257288_Fig15-06.jpg)\n\
    \n[Figure 15-6](#9781430257288_Ch15.xhtml#_Fig6). Multiple remote MVs using the\
    \ same centralized MV log\n\nIn this situation, Oracle keeps records in the MV\
    \ log until all MVs have refreshed. For example, suppose MV A has a LAST_REFRESH_DATE\
    \ of July 1, 2013, and MV B has a LAST_REFRESH_DATE of September 1, 2013\\. Then,\
    \ MV A refreshes on October 1, 2013\\. The master log only purges records older\
    \ than September 1, 2013 (because the more recent log records are still needed\
    \ by MV B).\n\nIf an MV was dropped and unable to unregister itself from a master\
    \ MV log table, then records grow indefinitely in the master MV log table. To\
    \ resolve this issue, you need information regarding which MVs are tied to which\
    \ MV logs. This query displays the master table owner information and the SNAPID\
    \ (MV ID) of all dependent MVs:\n\n```\nselect mowner\n,master base_table\n,snapid,\
    \ snaptime\nfrom sys.slog$;\n```\n\nHere is some sample output that shows two\
    \ MVs connected to one MV log:\n\n```\nMOWNER          BASE_TABLE              \
    \ SNAPID SNAPTIME\n--------------- -------------------- ---------- ---------\n\
    INV_MGMT        PRODUCT_TAXONOMY            653 28-JAN-13\nINV_MGMT        COMPANY_ACCOUNTS            650\
    \ 28-JAN-13\nINV_MGMT        CMP_GRP_ASSOC               651 28-JAN-13\n```\n\n\
    The next query displays information regarding all MVs that have been created that\
    \ tie into an MV log. Run this query on the master site:\n\n```\nselect a.log_table,\
    \ a.log_owner\n,b.master mast_tab\n,c.owner  mv_owner\n,c.name   mview_name\n\
    ,c.mview_site, c.mview_id\nfrom dba_mview_logs a\n    ,dba_base_table_mviews b\n\
        ,dba_registered_mviews c\nwhere b.mview_id = c.mview_id\nand   b.owner    =\
    \ a.log_owner\nand   b.master   = a.master\norder by a.log_table;\n```\n\nHere\
    \ is some sample output:\n\n```\nLOG_TABLE           LOG_OWNE MAST_TAB      MV_OWN\
    \ MVIEW_NAME       MVIEW_S MVIEW_ID\n------------------- -------- -------------\
    \ ------ ---------------- ------- --------\nMLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC\
    \ REP_MV CMP_GRP_ASSOC_MV DWREP        651\nMLOG$_CMP_GRP_ASSOC INV_MGMT CMP_GRP_ASSOC\
    \ TSTDEV CMP_GRP_ASSOC_MV ENGDEV       541\n```\n\nWhen you drop a remote MV,\
    \ it should unregister from the master database. However, this doesn’t always\
    \ happen. A remote database may get wiped out (e.g., a short-term development\
    \ database), and the MV doesn’t get a chance to unregister itself (via the DROP\
    \ MATERIALIZED VIEW statement). In this situation the MV log is unaware that a\
    \ dependent MV is no longer available and therefore keeps records indefinitely.\n\
    \nTo purge unwanted MV information from the database that contains the MV log,\
    \ execute the PURGE_MVIEW_FROM_LOG procedure of DBMS_MVIEW. This example passes\
    \ in the ID of the MV to be purged:\n\n```\nSQL> exec dbms_mview.purge_mview_from_log(541);\n\
    ```\n\nThis statement should update the data dictionary and remove information\
    \ from the internal table SLOG$ and DBA_REGISTERED_MVIEWS. If the MV being purged\
    \ is the oldest MV associated with the MV log table, the associated old records\
    \ are also deleted from the MV log.\n\nIf a remote MV is no longer available but\
    \ is still registered with the MV log table, you can manually unregister it at\
    \ the master site. Use the UNREGISTER_MVIEW procedure of the DBMS_MVIEW package\
    \ to unregister a remote MV. To do this, you need to know the remote MV owner,\
    \ MV name, and MV site (available from the output of the previous query in this\
    \ section):\n\n```\nSQL> exec dbms_mview.unregister_mview('TSTDEV','CMP_GRP_ASSOC_MV','ENGDEV');\n\
    ```\n\nIf successful, the prior operation removes a record from DBA_REGISTERED_MVIEWS.\n\
    \nManaging MVs in Groups\n\nAn MV group is a useful feature that enables you to\
    \ refresh a set of MVs at a consistent transactional point in time. If you refresh\
    \ MVs based on master tables that have parent–child relationships, then you should\
    \ most likely use a refresh group. This method guarantees that you won’t have\
    \ any orphaned child records in your set of refreshed MVs. The following sections\
    \ describe how to create and maintain MV refresh groups.\n\n![image](Images/sq.jpg) **Note**  \
    \ You use the DBMS_REFRESH package to accomplish most of the tasks involved in\
    \ managing MV refresh groups. This package is fully documented in the Oracle Advanced\
    \ Replication Management API Reference Guide, which is available for download\
    \ from the Technology Network area of the Oracle Web site ([http://otn.oracle.com](http://otn.oracle.com)).\n\
    \nCreating an MV Group\n\nYou use the MAKE procedure of the DBMS_REFRESH package\
    \ to create an MV group. When you create an MV group, you must specify a name,\
    \ a comma-separated list of MVs in the group, the next date to refresh, and the\
    \ interval used to calculate the next refresh time. Here is an example of a group\
    \ that consists of two MVs:\n\n```\nbegin\n  dbms_refresh.make(\n    name      =>\
    \ 'SALES_GROUP'\n   ,list      => 'SALES_MV, SALES_DAILY_MV'\n   ,next_date =>\
    \ sysdate-100\n   ,interval  => 'sysdate+1'\n);\nend;\n/\n```\n\nWhen you create\
    \ an MV group, Oracle automatically creates a database job to manage the refresh\
    \ of the group. You can view the details of an MV group by querying from DBA/ALL/USER_REFRESH:\n\
    \n```\nSQL> select rname, job, next_date, interval from user_refresh;\n```\n\n\
    Here is some sample output:\n\n```\nRNAME       JOB NEXT_DATE                \
    \ INTERVAL\n--------------- ---- -------------------- ---------------\nSALES_GROUP        3\
    \ 20-OCT-12            sysdate+1\n```\n\nI hardly ever use the internal database\
    \ job as a refresh mechanism. Note that the NEXT_DATE value specified in the previous\
    \ SQL is sysdate-100, meaning that the only way the database job will kick off\
    \ the job is if the date somehow gets set to 100 days in the past. In this way,\
    \ the job scheduler never initiates the refresh.\n\nIn most environments the refresh\
    \ needs to start at a specific time. In these scenarios, you use a cron job or\
    \ some similar utility that has job-scheduling capabilities.\n\nAltering an MV\
    \ Refresh Group\n\nYou can alter characteristics of a refresh group, such as the\
    \ refresh date or interval. If you rely on a database job for your refresh mechanism,\
    \ then you may occasionally need to tweak your refresh characteristics. Use the\
    \ CHANGE function of the DBMS_REFRESH package to achieve this. The following example\
    \ changes the INTERVAL calculation:\n\n```\nSQL> exec dbms_refresh.change(name=>'SALES_GROUP',interval=>'SYSDATE+2');\n\
    ```\n\nAgain, you need to change refresh intervals only if you’re using the internal\
    \ database job to initiate the materialized group refresh. You can verify the\
    \ details of a refresh group’s interval and job information with this query:\n\
    \n```\nselect a.job, a.broken, b.rowner, b.rname, b.interval\nfrom dba_jobs    a\n\
        ,dba_refresh b\nwhere a.job = b.job\norder by a.job;\n```\n\nHere is the output\
    \ for this example:\n\n```\nJOB  B ROWNER     RNAME           INTERVAL\n---- -\
    \ ---------- --------------- ---------------\n   3 N MV_MAINT   SALES_GROUP    \
    \ SYSDATE+2\n```\n\nRefreshing an MV Group\n\nAfter you’ve created a group, you\
    \ can manually refresh it, using the REFRESH function of the DBMS_REFRESH package.\
    \ This example refreshes the group that you previously created:\n\n```\nSQL> exec\
    \ dbms_refresh.refresh('SALES_GROUP');\n```\n\nIf you inspect the LAST_REFRESH_DATE\
    \ column of USER_MVIEWS, you’ll note that all MVs in the group have the same refresh\
    \ time. This is the expected behavior because the MVs in the group are all refreshed\
    \ at a consistent transactional point in time.\n\nDBMS_MVIEW vs. DBMS_REFRESH\n\
    \nYou may have noted that you can use the DBMS_MVIEW package to refresh a group\
    \ of MVs. For instance, you can refresh a set of MVs in a list as follows, using\
    \ DBMS_MVIEW:\n\n```\nSQL> exec dbms_mview.refresh(list=>'SALES_MV,SALES_DAILY_MV');\n\
    ```\n\nThis method refreshes each MV in the list in a single transaction. It’s\
    \ the equivalent of using an MV group. However, when you use DBMS_MVIEW, you have\
    \ the option of setting the ATOMIC_REFRESH parameter to TRUE (default) or FALSE.\
    \ For example, here the ATOMIC_REFRESH parameter is set to FALSE:\n\n```\nSQL>\
    \ exec dbms_mview.refresh(list=>'SALES_MV,SALES_DAILY_MV',atomic_refresh=>false);\n\
    ```\n\nThis setting instructs DBMS_MVIEW to refresh each MV in the list as a separate\
    \ transaction. The setting also instructs complete refreshes of the MV to consider\
    \ using the TRUNCATE statement. The previous line of code is equivalent to the\
    \ following two lines:\n\n```\nSQL> exec dbms_mview.refresh(list=>'SALES_MV',\
    \ atomic_refresh=>false);\nSQL> exec dbms_mview.refresh(list=>'SALES_DAILY_MV',\
    \ atomic_refresh=>false);\n```\n\nCompare that with the behavior of DBMS_REFRESH,\
    \ which is the package you should use to set up and maintain an MV group. The\
    \ DBMS_REFRESH package always refreshes a group of MVs as a consistent transaction.\n\
    \nIf you always need a set of MVs to be refreshed as a transactionally consistent\
    \ group, use DBMS_REFRESH. If you need some flexibility as to whether a list of\
    \ MVs is refreshed as a consistent transaction (or not), use DBMS_MVIEW.\n\nDetermining\
    \ MVs in a Group\n\nWhen you’re investigating issues with an MV refresh group,\
    \ a good starting point is to display which MVs the group contains. Query the\
    \ data dictionary views DBA_RGROUP and DBA_RCHILD to see the MVs in a refresh\
    \ group:\n\n```\nselect a.owner\n ,a.name mv_group\n ,b.name mv_name\nfrom dba_rgroup\
    \ a\n    ,dba_rchild b\nwhere a.refgroup = b.refgroup\nand   a.owner    = b.owner\n\
    order by a.owner, a.name, b.name;\n```\n\nHere is a snippet of the output:\n\n\
    ```\nOWNER      MV_GROUP             MV_NAME\n---------- --------------------\
    \ --------------------\nMV_MAINT   SALES_GROUP          SALES_DAILY_MV\nMV_MAINT  \
    \ SALES_GROUP          SALES_MV\n```\n\nIn the DBA_RGROUP view, the NAME column\
    \ represents the name of the refresh group. The DBA_RCHILD view contains the name\
    \ of each MV in the refresh group.\n\nAdding an MV to a Refresh Group\n\nAs your\
    \ business requirements change, you occasionally need to add an MV to a group.\
    \ Use the ADD procedure of the DBMS_REFRESH package to accomplish this task:\n\
    \n```\nSQL> exec dbms_refresh.add(name=>'SALES_GROUP',list=>'PRODUCTS_MV,USERS_MV');\n\
    ```\n\nYou must specify a name and provide a comma-separated list of the MV names\
    \ to add. The newly added MVs are refreshed the next time the group is refreshed.\n\
    \nThe other way to add an MV to a group is to drop the group and recreate it with\
    \ the new MV. However, it’s usually preferable to add an MV.\n\nRemoving MVs from\
    \ a Refresh Group\n\nSometimes, you need to remove an MV from a group. To do this,\
    \ use the SUBTRACT function of the DBMS_REFRESH package. This example removes\
    \ one MV from a group:\n\n```\nSQL> exec dbms_refresh.subtract(name=>'SALES_GROUP',list=>'SALES_MV');\n\
    ```\n\nYou have to specify the name of the MV group and provide a comma-separated\
    \ list containing the names of the MVs you want to remove.\n\nThe other way to\
    \ remove an MV from a group is to drop the group and recreate it without the unwanted\
    \ MV(s). However, it’s usually preferable to remove an MV.\n\nDropping an MV Refresh\
    \ Group\n\nIf you need to drop an MV refresh group, use the DESTROY procedure\
    \ of the DBMS_REFRESH package. This example drops the MV group named SALES_GROUP:\n\
    \n```\nSQL> exec dbms_refresh.destroy('SALES_GROUP');\n```\n\nThis method only\
    \ drops the MV refresh-group object—it doesn’t drop any of the actual MVs. If\
    \ you need to also drop the MVs, use the DROP MATERIALIZED VIEW statement.\n\n\
    Summary\n\nSometimes, the term *materialized view* confuses people who are new\
    \ to the technology. Perhaps Oracle should have named this feature “periodically\
    \ purge and repopulate a table that contains the results of a query,” but that’s\
    \ probably too long a phrase. Regardless, when you understand the power of this\
    \ tool, you can use it to replicate and aggregate large amounts of data. You can\
    \ greatly improve the performance of queries by periodically computing and storing\
    \ the results of complex aggregations of data.\n\nMVs can be fast refreshable,\
    \ which means that they copy over only changes from the master table that have\
    \ occurred since the last refresh. To use this type of MV, you must create an\
    \ MV log on the master table. It’s not always possible to create an MV log; in\
    \ these scenarios the MV must be completely refreshed.\n\nIf need be, you can\
    \ also compress and encrypt the data with an MV. This allows for better space\
    \ management and security. Additionally, you can partition the underlying table\
    \ used by an MV, to allow for greater scalability, performance, and availability.\n\
    \nThe last several chapters have focused on specialized database features that\
    \ DBAs often use. These include large objects, partitioning, Data Pump, external\
    \ tables, and MVs. The book now shifts focus to one of the most important topics\
    \ a DBA must be familiar with: backup and recovery. User managed backups and RMAN\
    \ are covered in the next several chapters.\n\nCHAPTER 17\n\n![image](Images/frontdot.jpg)\n\
    \nConfiguring RMAN\n\nOracle Recovery Manager (RMAN) is Oracle’s flagship B&R\
    \ tool. RMAN is provided by default when you install the Oracle software (for\
    \ both the Standard Edition and Enterprise Edition). RMAN offers a robust and\
    \ flexible set of B&R features. The following list highlights some of the most\
    \ salient qualities:\n\n*   Easy-to-use commands for backup, restore, and recovery.\n\
    *   Ability to track which files have been backed up and where to. Manages the\
    \ deletion of obsolete backups and archive redo logs.\n*   Parallelization: Can\
    \ use multiple processes for backup, restore, and recovery.\n*   Incremental backups\
    \ that only back up changes since the previous backup.\n*   Recovery at the database,\
    \ tablespace, data file, table, or block level.\n*   Advanced compression and\
    \ encryption features.\n*   Integration with media managers for tape backups.\n\
    *   Backup validation and testing.\n*   Cross-platform data conversion.\n*   Data\
    \ Recovery Advisor, which assists with diagnosing failures and proposing solutions.\n\
    *   Ability to detect corrupt blocks in data files.\n*   Advanced reporting capabilities\
    \ from the RMAN command line.\n\nThe goal of this chapter is to present enough\
    \ information about RMAN that you can make reasonable decisions about how to implement\
    \ a solid backup strategy. The basic RMAN components are described first, after\
    \ which you walk through many of the decision points involved in implementing\
    \ RMAN.\n\n![image](Images/sq.jpg) **Note**   The RMAN-related chapters in this\
    \ book aren’t intended to be a complete reference on all aspects of B&R. That\
    \ would take an entire book. These chapters contain the basic information you\
    \ need to successfully use RMAN for B&R. If you require advanced RMAN information\
    \ regarding backup, restore, and recovery, see *RMAN Recipes for Oracle ­Database\
    \ 12c*, second edition, by Darl Kuhn (Apress, 2013).\n\nUnderstanding RMAN\n\n\
    RMAN consists of many different components. [Figure 17-1](#9781430257288_Ch17.xhtml#Fig1)\
    \ shows the interactions of the main RMAN pieces. Refer back to this diagram when\
    \ reading through this section.\n\n![9781430257288_Fig17-01.jpg](Images/9781430257288_Fig17-01.jpg)\n\
    \n[Figure 17-1](#9781430257288_Ch17.xhtml#_Fig1). RMAN architectural components\n\
    \nThe following list describes the RMAN architectural components:\n\n*   **DBA:**\
    \ Appears somewhat short and bald in the diagram, which isn’t far from the truth\
    \ (in my case).\n*   **Target database:** The database being backed up by RMAN.\
    \ You connect to the target database with the RMAN command-line T ARGET parameter\
    \ (see the next section for more details).\n*   **RMAN client:** The rman utility\
    \ from which you issue B ACKUP, R ESTORE, and R ECOVER commands. On most database\
    \ servers the rman utility is located in the ORACLE_HOME/bin directory (along\
    \ with all the other Oracle utilities, such as sqlplus and expdp).\n*   **Oracle\
    \ server processes:** When you execute the rman client and connect to the target\
    \ database, two Oracle server background processes are started. The first default\
    \ server process interacts with the PL/SQL packages to coordinate the backup activities.\
    \ The secondary polling process occasionally updates Oracle data dictionary structures.\n\
    *   **Channel** **(s):** The Oracle server processes for handling I/O between\
    \ files being backed up (or restored) and the backup device (disk or tape).\n\
    *   **PL/SQL packages:** RMAN uses two internal PL/SQL packages (owned by SYS)\
    \ to perform B&R tasks: DBMS_RCVMAN and DBMS_BACKUP_RESTORE. DBMS_RCVMAN accesses\
    \ information in the control file and passes that to the RMAN server processes.\
    \ The DBMS_BACKUP_RESTORE package performs most of RMAN’s work. For example, this\
    \ package creates the system calls that direct the channel processes to perform\
    \ B&R operations.\n*   **Memory buffers (PGA or SGA****):** RMAN uses a memory\
    \ area in the PGA (and sometimes in the SGA) as a buffer when reading from data\
    \ files and copying subsequent blocks to back up files.\n*   **Auxiliary database:**\
    \ A database to which RMAN restores target database data files for the purpose\
    \ of duplicating a database, creating a Data Guard standby database, or performing\
    \ a DBPITR.\n*   **Backup/Back up:** Can be either a noun or a verb. The physical\
    \ files (backup) that store the backed up files; or, the act of copying and archiving\
    \ (backing up) files. Backups can consist of backup sets and backup pieces or\
    \ image copies.\n*   **Backup set:** When you run an RMAN BACKUP command, by default,\
    \ it creates one or more backup sets. A backup set is a logical RMAN construct\
    \ that groups backup piece files. You can think of the relationship of a backup\
    \ set to a backup piece as similar to the relationship between a tablespace and\
    \ a data file: one is a logical construct, the other is a physical file.\n*  \
    \ **Backup piece file:** RMAN binary backup files. Each logical backup set consists\
    \ of one or more backup piece files. These are the physical files that RMAN creates\
    \ on disk or tape. They’re binary, proprietary format files that only RMAN can\
    \ read or write to. A backup piece can contain blocks from many different data\
    \ files. Backup piece files are typically smaller than data files, because backup\
    \ pieces only contain blocks that have been used in the data files.\n*   **Image\
    \ copy:** Initiated with the BACKUP AS COPY command. A type of backup in which\
    \ RMAN creates identical copies of a data file, archive redo log file, or control\
    \ file. Image copies can be operated on by OS utilities such as the Linux cp and\
    \ mv commands. Image copies are used as part of incrementally updated image backups.\
    \ Sometimes, it’s preferable to use image copies rather than backup sets if you\
    \ need to be able to restore quickly.\n*   **Recovery catalog:** An optional database\
    \ schema that contains tables used to store metadata information regarding RMAN\
    \ backup operations. Oracle strongly recommends using a recovery catalog, because\
    \ it provides more options for B&R.\n*   **Media manager:** Third-party software\
    \ that allows RMAN to back up files directly to tape. Backing up to tape is desirable\
    \ when you don’t have enough room to back up directly to disk or when disaster\
    \ recovery requirements necessitate a backup to storage that can be easily moved\
    \ offsite.\n*   **FRA:** An optional disk area that RMAN can use for backups.\
    \ You can also use the FRA to multiplex control files and online redo logs. You\
    \ instantiate a fast recovery with the database initialization parameters DB_RECOVERY_FILE_DEST_SIZE\
    \ and DB_RECOVERY_FILE_DEST.\n*   **Snapshot control fil** **e:** RMAN requires\
    \ a read-consistent view of the control file when either backing up the control\
    \ file or synchronizing with the recovery catalog (if it’s being used). In these\
    \ situations, RMAN first creates a temporary copy (snapshot) of the control file.\
    \ This allows RMAN to use a version of the control file that is guaranteed not\
    \ to change while backing up the control file or synchronizing with the recovery\
    \ catalog.\n\nYou can make several types of backups with RMAN:\n\n*   **Full backup:**\
    \ All modified blocks associated with the data file are backed up. A full backup\
    \ is not a backup of the entire database. For example, you can make a full backup\
    \ of one data file.\n*   **Incremental level 0 backup:** Backs up the same blocks\
    \ as a full backup. The only difference between a level 0 backup and a full backup\
    \ is that you can use a level 0 backup with other incremental backups, but not\
    \ a full backup.\n*   **Incremental level 1 backup:** Backs up only blocks that\
    \ have been modified since the previous backup. Level 1 incremental backups can\
    \ be either differential or cumulative. A differential level 1 backup is the default\
    \ and backs up all blocks that have been modified since the last level 0 or level\
    \ 1 backup. A cumulative level 1 backup backs up all blocks that have changed\
    \ since the last level 0 backup.\n*   **Incrementally updated backup:** First\
    \ creates an image copy of the data files, after which subsequent backups are\
    \ incremental backups that are merged with the image copy. This is an efficient\
    \ way to use image copies for backups. Media recoveries using incrementally updated\
    \ backups are fast because the image copy of the data file is used during the\
    \ restore.\n*   **Block change tracking:** Database feature that keeps track of\
    \ blocks that have changed in the database. A record of the changed blocks is\
    \ kept in a binary file. RMAN can use the contents of the binary file to improve\
    \ the performance of incremental backups: instead of having to scan all modified\
    \ blocks in a data file, RMAN can determine which blocks have changed from the\
    \ binary block change tracking.\n\nNow that you understand the RMAN architectural\
    \ components and the types of backups you can make, you’re ready to start up RMAN\
    \ and configure it for your environment.\n\nStarting RMAN\n\nTo connect to RMAN,\
    \ you need to establish\n\n*   OS environment variables\n*   access to a privileged\
    \ OS account or a database user with SYSDBA privileges\n\nThe easiest way to connect\
    \ to RMAN is to log in to the server on which the target database resides as the\
    \ owner of the Oracle software (usually named oracle, on Linux/Unix boxes). When\
    \ you log in as oracle, you need to establish several OS variables before you\
    \ can use utilities such as rman and sqlplus. Setting these required OS variables\
    \ is covered in detail in [Chapter 2](#9781430257288_Ch02.xhtml).\n\nAt minimum,\
    \ you need to set ORACLE_HOME and ORACLE_SID. Additionally, it’s convenient if\
    \ the PATH variable includes the directory ORACLE_HOME/bin. This is the directory\
    \ that contains the Oracle utilities.\n\nAfter you’ve established your OS variables,\
    \ you can invoke RMAN from the OS, as shown:\n\n```\n$ rman target /\n```\n\n\
    When connecting to RMAN, you don’t have to specify the AS SYSDBA clause (as you\
    \ do when connecting to a database as a privileged user in SQL*Plus). This is\
    \ because RMAN always requires that you connect as a database user with SYSDBA\
    \ privileges.\n\n![image](Images/sq.jpg) **Tip**   New in Oracle Database 12c,\
    \ the SYSBACKUP privilege allows you to assign privileges to a user that include\
    \ only the permissions needed to perform B&R operations. The SYSBACKUP privilege\
    \ contains the subset of SYSDBA privileges required for carrying out such operations.\n\
    \nThe previous example of logging in to RMAN uses OS authentication. This type\
    \ of authentication means that if you can log in to an authorized OS account (such\
    \ as the owner of the Oracle software, usually oracle), then you’re allowed to\
    \ connect to the database without having to provide a username and password. You\
    \ administer OS authentication by assigning special groups to OS accounts. When\
    \ you install the Oracle binaries in a Linux/Unix environment, you’re required\
    \ to specify at the time of installation the names of the OS groups that are assigned\
    \ the database privileges of SYSDBA, SYSOPER, SYSBACKUP—typically, the dba, oper,\
    \ and backupdba groups, respectively (see [Chapter 1](#9781430257288_Ch01.xhtml)\
    \ for details).\n\n(NOT) CALLING RMAN FROM SQL*PLUS\n\nI teach Oracle B&R classes\
    \ at a local institute of higher learning. Nearly every term, one of the students\
    \ asks why the following RMAN command doesn’t work:\n\nSQL> rman\n\nSP2-0042:\
    \ unknown command \"rman\" - rest of line ignored.\n\nThe answer is short: the\
    \ rman client is an OS utility, not an SQL*Plus function. You must invoke the\
    \ rman client from the OS prompt.\n\nIf you don’t have access to log in directly\
    \ to a server as the Oracle software owner, you need a privileged database user\
    \ account to connect to RMAN. Granting SYSDBA privileges to database users requires\
    \ that you first implement a password file. To create a password file on Linux/Unix\
    \ servers, first navigate to the ORACLE_HOME/dbs directory, and then use the orapwd\
    \ utility to create a password file:\n\n```\n$ cd $ORACLE_HOME/dbs\n$ orapwd file=orapw<ORACLE_SID>\
    \ password=<sys password>\n```\n\nBefore you grant SYSDBA to a database user,\
    \ ensure that the initialization parameter REMOTE_LOGIN_PASSWORDFILE is set to\
    \ EXCLUSIVE (the default):\n\n```\nSQL> show parameter remote_login_passwordfile\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nremote_login_passwordfile            string      EXCLUSIVE\n\
    ```\n\nYou can now grant the SYSDBA privilege to a database user:\n\n```\nSQL>\
    \ grant sysdba to lellison;\n```\n\nYou can view the users that have SYSDBA privileges\
    \ via the following query:\n\n```\nSQL> select * from v$pwfile_users;\n```\n\n\
    ![image](Images/sq.jpg) **Note**   If you want to connect remotely to RMAN via\
    \ Oracle Net, you need to first implement a password file.\n\nRMAN Architectural\
    \ Decisions\n\nIf archiving is enabled for your database (see [Chapter 5](#9781430257288_Ch05.xhtml)\
    \ for details on archiving), you can use RMAN out of the box to run commands such\
    \ as this to back up your entire target database:\n\n```\n$ rman target /\nRMAN>\
    \ backup database;\n```\n\nIf you experience a media failure, you can restore\
    \ all data files, as follows:\n\n```\nRMAN> shutdown immediate;\nRMAN> startup\
    \ mount;\nRMAN> restore database;\n```\n\nAfter your database is restored, you\
    \ can fully recover it:\n\n```\nRMAN> recover database;\nRMAN> alter database\
    \ open;\n```\n\nYou’re good to go, right? No, not quite. RMAN’s default attributes\
    \ are reasonably set for simple backup requirements. The RMAN out-of-the-box settings\
    \ may be appropriate for small development or test databases. But, for any type\
    \ of business critical database, you need to consider carefully where the backups\
    \ are stored, how long to store backups on disk or tape, which RMAN features are\
    \ appropriate for the database, and so on. The following sections in this chapter\
    \ walk you through many of the B&R architectural decisions necessary to implementing\
    \ RMAN in a production environment. RMAN has a vast and robust variety of options\
    \ for customizing B&R; and, typically, you don’t need to implement many of RMAN’s\
    \ features. However, each time you implement RMAN to back up a production database,\
    \ you should think through each decision point and decide whether you require\
    \ an attribute.\n\n[Table 17-1](#9781430257288_Ch17.xhtml#Tab1) summarizes the\
    \ RMAN implementation decisions and recommendations. Each of the decision points\
    \ in the table is elaborated on in subsequent sections. Many DBAs will have differing\
    \ opinions concerning some of these recommendations; that’s fine. The point is\
    \ that you need to consider each architectural aspect and determine what makes\
    \ sense for your business requirements.\n\n[Table 17-1.](#9781430257288_Ch17.xhtml#_Tab1)\
    \ Overview of Architectural Decisions and Recommendations\n\n| Decision Point\
    \ | Recommendation |\n| --- | --- |\n| Running the RMAN client remotely or locally\
    \ | Run the client locally on the target database server. |\n| Specifying the\
    \ backup user | Use SYS unless you have a security requirement that dictates otherwise.\
    \ |\n| Using online or offline backups | Depends on your business requirements.\
    \ Most production databases require online backups, which means that you must\
    \ enable archiving. |\n| Setting the archive redo log destination and file format\
    \ | If you’re using an FRA, archive logs are written there with a default format.\
    \ I prefer to use the LOG_ARCHIVE_DEST_N initialization parameter to specifically\
    \ set the location outside the FRA. |\n| Configuring the RMAN backup location\
    \ and file format | Depends on your business requirements. Some shops require\
    \ tape backups. If you’re using disk, place the backups in the FRA, or specify\
    \ a location via channel settings. I prefer not to use an FRA and to explicitly\
    \ specify the location and file format via a CONFIGURE command. |\n| Setting the\
    \ autobackup of the control file | Always enable autobackup of the control file.\
    \ |\n| Specifying the location of the autobackup of the control file | Either\
    \ place it in the FRA, or configure a location. I prefer to write the autobackup\
    \ of the control file to the same location as that of the database backups. |\n\
    | Backing up archive redo logs | Depends on your business requirements. For many\
    \ environments, I back up the archive redo logs on a daily basis, with the same\
    \ command I use to back up the database. |\n| Determining the location for the\
    \ snapshot control file | Use the default location. |\n| Using a recovery catalog\
    \ | Depends on your business requirements. For many environments, I don’t use\
    \ a recovery catalog. Oracle recommends that you do use a recovery catalog. If\
    \ the RMAN retention policy is greater than CONTROL_FILE_RECORD_KEEP_TIME, then\
    \ I recommend that you use a recovery catalog. |\n| Using a media manager | This\
    \ is required for backing up directly to tape. |\n| Setting the CONTROL_FILE_RECORD_KEEP_TIME\
    \ initialization parameter | Usually, the default of 7 days is sufficient. |\n\
    | Configuring RMAN’s backup retention policy | Depends on your database and business\
    \ requirements. For many environments, I use a backup retention redundancy of\
    \ 1 or 2. |\n| Configuring the archive redo logs’ deletion policy | Depends on\
    \ your database and business requirements. In many scenarios, applying the backup\
    \ retention policy to the archive redo logs is sufficient (this is the default\
    \ behavior). |\n| Setting the degree of parallelism | Depends on the available\
    \ hardware resources and business requirements. For most production servers, on\
    \ which there are multiple CPUs, I configure a degree of parallelism of 2 or more.\
    \ |\n| Using backup sets or image copies | I prefer backup sets. Backup sets are\
    \ generally smaller than image copies and easier to manage. |\n| Using incremental\
    \ backups | Use incremental backups for large databases when a small percentage\
    \ of the database changes between backups and when you want to conserve on disk\
    \ space. I often use incremental backups in data warehouse–type databases. |\n\
    | Using incrementally updated backups | Use this approach if you require image\
    \ copies of data files. |\n| Using block change tracking | Use this to improve\
    \ the performance of incremental backups. For large, data warehouse–type databases,\
    \ block change tracking can result in significant time savings for backups. |\n\
    | Configuring binary compression | Depends on your business requirements. Compressed\
    \ backups consume less space but require more CPU resources (and time) for backup\
    \ and restore operations. |\n| Configuring encryption | Depends on your business\
    \ requirements. |\n| Configuring miscellaneous settings | You can set many channel-related\
    \ properties, such as the backup set size and backup piece size. Configure as\
    \ needed. |\n| Configuring informational output | Configure the OS variable NLS_DATE_FORMAT\
    \ to display date and time. Use SET ECHO ON and SHOW ALL to display RMAN commands\
    \ and settings. |\n\nRunning the RMAN Client Remotely or Locally\n\nIt’s possible\
    \ to run the rman utility from a remote server and connect to a target database\
    \ via Oracle Net:\n\n```\n$ rman target sys/foo@remote_db\n```\n\nThis allows\
    \ you to run RMAN backups on disparate remote servers from one central location.\
    \ When you run RMAN remotely, the backup files are always created on the target\
    \ database server.\n\nWhenever possible, I run the rman client locally on the\
    \ target server and connect, like this:\n\n```\n$ rman target /\n```\n\nThis approach\
    \ is simple and adequate for most requirements. You don’t have to worry about\
    \ network issues or password files, and there are never compatibility issues with\
    \ the rman client and the target database. If you run RMAN remotely, you need\
    \ to be sure the remote rman executable is compatible with the target database.\
    \ For example, you may establish that the remote rman executable you’re running\
    \ is an Oracle Database 12c version of the RMAN client and need to determine if\
    \ it’s possible to connect that client to a remote Oracle Database 9i target database.\
    \ If you run the rman client locally on the target server, there is never a compatibility\
    \ issue because the rman client is always the same version as the target database.\n\
    \nSpecifying the Backup User\n\nAs discussed previously, RMAN requires that you\
    \ use a database user with SYSDBA privileges. Whether I’m running RMAN from the\
    \ command line or invoking RMAN in a script, in most scenarios, I connect directly\
    \ as SYS to the target database. For example, here is how I connect to RMAN from\
    \ the command line:\n\n```\n$ rman target /\n```\n\nSome DBAs don’t use this approach;\
    \ they opt to set up a user separate from SYS and cite security concerns as a\
    \ rationale for doing this.\n\nI prefer to use the SYS account directly, because\
    \ when connecting to RMAN locally on the server, there is no need to specify a\
    \ username and password. This means that you never have to hard-code usernames\
    \ and passwords into any backup scripts or specify a username and password on\
    \ the command line that can be viewed by rogue developers or managers looking\
    \ over your shoulder.\n\nUsing Online or Offline Backups\n\nMost production databases\
    \ have 24-7 availability requirements. Therefore, your only option is online RMAN\
    \ backups. Your database must be in archivelog mode for online backups. You need\
    \ to consider carefully to place archive redo logs, how to format them, how often\
    \ to back them up, and how long to retain them before deletion. These topics are\
    \ discussed in subsequent sections.\n\n![image](Images/sq.jpg) **Note**   If you\
    \ make offline backups, you must shut down your database with IMMEDIATE, NORMAL,\
    \ or TRANSACTIONAL and then place it in mount mode. RMAN needs the database in\
    \ mount mode so that it can read from and write to the control file.\n\nSetting\
    \ the Archive Redo Log Destination and File Format\n\nEnabling archive redo log\
    \ mode is a prerequisite for making online backups (see [Chapter 5](#9781430257288_Ch05.xhtml)\
    \ for a full discussion of architectural decisions regarding the archive redo\
    \ log destination and format and how to enable/disable archivelog mode).\n\nWhen\
    \ archivelog mode is enabled, Oracle writes the archive redo logs to one or more\
    \ of the following locations (you can configure archive redo logs to be written\
    \ to the FRA as well as to several other locations that you manually set via initialization\
    \ parameters):\n\n*   Default location\n*   FRA\n*   Location specified via the\
    \ LOG_ARCHIVE_DEST_N initialization parameter(s)\n\nIf you don’t use an FRA, and\
    \ if you don’t explicitly set the archive redo log destination via a LOG_ARCHIVE_DEST_N\
    \ initialization parameter, then by default the archive redo logs are written\
    \ to an OS-dependent location. On many Linux/Unix boxes the default location is\
    \ the ORACLE_HOME/dbs directory. The default file name format for archive redo\
    \ logs is %t_%s_%r.dbf.\n\nIf you enable an FRA (and don’t set LOG_ARCHIVE_DEST_N),\
    \ then, by default, the archive redo logs are written to a directory in the FRA.\
    \ The default file name format of the of archive redo log files created in the\
    \ FRA is an OMF format. The files are stored in a subdirectory given the same\
    \ name as the database’s unique name; for example,\n\n```\n/<fra>/<dbuname>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc\n\
    ```\n\nOracle recommends using an FRA. I prefer not to use an FRA because I don’t\
    \ like to be surprised with a hung database when there are issues with the FRA’s\
    \ filling up and not being purged of old files quickly enough. Instead, I use\
    \ the LOG_ARCHIVE_DEST_N parameter to set the location of the archive redo log\
    \ files. Here is an example:\n\n```\nlog_archive_dest_1='LOCATION=/oraarch1/CHNPRD'\n\
    ```\n\nI also prefer to use this format for the default archivelog file name:\n\
    \n```\nlog_archive_format='%t_%s_%r.arc'\n```\n\nSometimes, DBAs use .dbf as an\
    \ extension for both data files and archive redo log files. I prefer to use .arc\
    \ for the archive redo log files. The .arc extension avoids the potentially confusing\
    \ task of identifying a file as an archive redo log file or a live database data\
    \ file.\n\nConfiguring the RMAN Backup Location and File Format\n\nWhen you run\
    \ a BACKUP command for disk-based backups, RMAN creates backup pieces in one of\
    \ the following locations:\n\n*   Default location\n*   FRA\n*   Location specified\
    \ via the BACKUP... FORMAT command\n*   Location specified via the CONFIGURE CHANNEL...FORMAT\
    \ command\n\nOf these choices, I lean toward the last of them; I prefer specifying\
    \ a target location via a backup channel.\n\nDefault Location\n\nIf you don’t\
    \ configure any RMAN variables and don’t set up an FRA, by default RMAN allocates\
    \ one disk-based channel and writes the backup files to a default location. For\
    \ example, you can run the following command without configuring any RMAN parameters:\n\
    \n```\nRMAN> backup database;\n```\n\nThe default location varies by OS. In many\
    \ Linux/Unix environments the default location is ORACLE_HOME/dbs. The default\
    \ format of the name of the backup files created is an OMF format; for example,\n\
    \n```\n<ORACLE_HOME>/dbs/01ln9g7e_1_1\n```\n\n![image](Images/sq.jpg) **Tip**  \
    \ The default location is okay for small development databases. However, for most\
    \ other environments (especially production), you’ll need to plan ahead for how\
    \ much disk space you’ll need for backups and explicitly set the location for\
    \ the backups via one of the other methods (such as implementing an FRA or CONFIGURE\
    \ CHANNEL).\n\nFRA\n\nWhen backing up to disk, if you don’t explicitly instruct\
    \ RMAN to write the backups to a specific location (via the F ORMAT or C ONFIGURE\
    \ command), and you’re using an FRA, RMAN automatically writes the backup files\
    \ to directories in the FRA. The files are stored in a subdirectory with the same\
    \ name as the database’s unique name. Also, the default format of the name of\
    \ the backup files created in the FRA is an OMF format; for example,\n\n```\n\
    /<fra>/<dbuname>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp\n\
    ```\n\nI don’t usually use an FRA for the placement of RMAN backups. In many of\
    \ the environments I work in, there isn’t enough disk space on a single mount\
    \ point to accommodate the entirety of the database backups. In such situations,\
    \ you need to allocate two or more channels that point to different mount points.\
    \ Using an FRA in these environments is somewhat unwieldy.\n\nAlso, for performance\
    \ reasons, you may want to instruct RMAN to write to multiple disk locations.\
    \ If you can ensure that different mount points are based on different physical\
    \ disks and are written to by separate controllers, you can reduce I/O contention\
    \ by allocating multiple channels pointing to separate mount points.\n\nWhen you’re\
    \ using an FRA, RMAN automatically creates separate directories when backing up\
    \ a database for the first time on a given date. I prefer to have the backups\
    \ written to one directory and not separate the directories and backups by date.\
    \ I find it easier to manage, maintain, and troubleshoot the backups if I use\
    \ one standard directory for each database on each server.\n\nBACKUP…FORMAT\n\n\
    If you’ve configured an FRA and don’t want to place RMAN backup files in the FRA\
    \ automatically, you can directly specify where you want backups to be placed\
    \ when you issue the BACKUP command; for example,\n\n```\nRMAN> backup database\
    \ format '/u01/O12C/rman/rman_%U.bkp';\n```\n\nHere is a corresponding file generated\
    \ by RMAN:\n\n```\n/u01/O12C/rman/rman_0jnv0557_1_1.bkp\n```\n\nThe %U instructs\
    \ RMAN to dynamically construct a unique string for the backup file name. A unique\
    \ name is required in most situations, because RMAN won’t write over the top of\
    \ a file that already exists. This is important, because if you instruct RMAN\
    \ to write in parallel, it needs to create unique file names for each channel;\
    \ for example,\n\n```\nRMAN> configure device type disk parallelism 2;\n```\n\n\
    Now, when you run the BACKUP command, you see this message:\n\n```\nRMAN> backup\
    \ database format '/u01/O12C/rman/rman_%U.bkp';\n```\n\nRMAN allocates multiple\
    \ channels and writes in parallel to two different backup files. The U% in the\
    \ format string guarantees that unique file names are created.\n\nCONFIGURE CHANNEL…FORMAT\n\
    \nI don’t usually use the BACKUP...FORMAT syntax to specify the location for RMAN\
    \ backups. I prefer to use the CONFIGURE CHANNEL...FORMAT command. This is because\
    \ I’m frequently writing to multiple disk locations and need the flexibility to\
    \ specify directories located on different mount points. Here is a typical configuration\
    \ specifying CONFIGURE CHANNEL...FORMAT:\n\n```\nRMAN> configure device type disk\
    \ parallelism 3;\nRMAN> configure channel 1 device type disk format '/u01/O12C/rman/rman1_%U.bk';\n\
    RMAN> configure channel 2 device type disk format '/u02/O12C/rman/rman2_%U.bk';\n\
    RMAN> configure channel 3 device type disk format '/u03/O12C/rman/rman3_%U.bk';\n\
    ```\n\nIn these lines of code, you should configure the device-type parallelism\
    \ degree to match the number of channels that you allocated. RMAN only allocates\
    \ the number of channels as specified by the degree of parallelism; other configured\
    \ channels are ignored. For instance, if you specify a degree of parallelism of\
    \ 2, RMAN allocates only two channels, regardless of the number of channels you\
    \ configured via the C ONFIGURE CHANNEL command.\n\nIn this example of configuring\
    \ three channels, suppose the BACKUP command is issued, like this:\n\n```\nRMAN>\
    \ backup database;\n```\n\nRMAN allocates three channels, all on separate mount\
    \ points (/u01, /u02, /u03), and writes in parallel to the specified locations.\
    \ RMAN creates as many backup pieces in the three locations as it deems necessary\
    \ to create a backup of the database.\n\nIf you need to unconfigure a channel,\
    \ do so as follows:\n\n```\nRMAN> configure channel 3 device type disk clear;\n\
    ```\n\n![image](Images/sq.jpg) **Note**   Also consider what happens if you configure\
    \ a degree of parallelism higher than the number of preconfigured channels. RMAN\
    \ will open a channel for each degree of parallelism, and if the number of channels\
    \ opened is greater than the number of preconfigured channels, for the unconfigured\
    \ channels, RMAN will write backup files to the FRA (if configured) or the default\
    \ location.\n\nSetting the Autobackup of the Control File\n\nYou should always\
    \ configure RMAN to back up the control file automatically after running any RMAN\
    \ BACKUP or COPY command or after you make physical changes to the database that\
    \ result in updates to the control file (such as adding/removing a data file).\
    \ Use the SHOW command to display the current setting of the control file autobackup:\n\
    \n```\nRMAN> show controlfile autobackup;\n```\n\nHere is some sample output:\n\
    \n```\nRMAN configuration parameters for database with db_unique_name O12C are:\n\
    CONFIGURE CONTROLFILE AUTOBACKUP ON;\n```\n\nThe following line of code shows\
    \ how to enable automatic backup of the control file feature:\n\n```\nRMAN> configure\
    \ controlfile autobackup on;\n```\n\nThe automatic control file backup always\
    \ goes into its own backup set. When autobackup of the control file is enabled,\
    \ if you’re using an spfile, it’s automatically backed up along with the control\
    \ file.\n\nIf, for any reason, you want to disable automatic backup of the control\
    \ file, you can do so as follows:\n\n```\nRMAN> configure controlfile autobackup\
    \ off;\n```\n\n![image](Images/sq.jpg) **Note**   If autobackup of the control\
    \ file is off, then any time you back up data file 1 (SYSTEM tablespace data file),\
    \ RMAN automatically backs up the control file.\n\nSpecifying the Location of\
    \ the Autobackup of the Control File\n\nWhen you enable autobackup of the control\
    \ file, RMAN creates the backup of the control file in one of the following locations:\n\
    \n*   Default location\n*   FRA\n*   Location specified via the CONFIGURE CONTROLFILE\
    \ AUTOBACKUP FORMAT command\n\nIf you aren’t using an FRA, or if you haven’t specified\
    \ a location for the control file autobackups, the control file autobackup is\
    \ written to an OS-dependent default location. In Linux/Unix environments the\
    \ default location is ORACLE_HOME/dbs; for example,\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/dbs/c-3423216220-20130109-01\n\
    ```\n\nIf you’ve enabled an FRA, then RMAN automatically writes the control file\
    \ autobackup files to directories in the FRA, using an OMF format for the name;\
    \ for example,\n\n```\n/<fra>/<dbuname>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp\n\
    ```\n\nI don’t usually use the default location or the FRA for control file autobackups.\
    \ I prefer these backups to be placed in the same directory the database backups\
    \ are in. Here is an example:\n\n```\nRMAN> configure controlfile autobackup format\
    \ for device type disk to\n'/u01/O12C/rman/rman_ctl_%F.bk';\n```\n\nIf you want\
    \ to set the autobackup format back to the default, do so as follows:\n\n```\n\
    RMAN> configure controlfile autobackup format for device type disk clear;\n```\n\
    \nBacking Up Archive Redo Logs\n\nYou should back up your archive redo logs on\
    \ a regular basis. The archivelog files shouldn’t be removed from disk until you’ve\
    \ backed them up at least once. I usually like to keep on disk any archive redo\
    \ logs that have been generated since the last good RMAN backup.\n\nGenerally,\
    \ I instruct RMAN to back up the archive redo logs while the data files are being\
    \ backed up. This is a sufficient strategy in most situations. Here is the command\
    \ to back up the archive redo logs along with the data files:\n\n```\nRMAN> backup\
    \ database plus archivelog;\n```\n\nSometimes, if your database generates a great\
    \ deal of redo, you may need to back up your archive redo logs at a frequency\
    \ different from that of the data files. DBAs may back up the archive redo logs\
    \ two or three times a day; after the logs are backed up, the DBAs delete them\
    \ to make room for more current archivelog files.\n\nIn most situations, you don’t\
    \ need any archive redo logs that were generated before your last good backup.\
    \ For example, if a data file has experienced media failure, you need to restore\
    \ the data file from a backup and then apply any archive redo logs that were generated\
    \ during and after the backup of the data file.\n\nOn some occasions, you may\
    \ need archive redo logs that were generated before the last backup. For instance,\
    \ you may experience a media failure, attempt to restore your database from the\
    \ last good backup, find corruption in that backup, and therefore need to restore\
    \ from an older backup. At that point, you need a copy of all archive redo logs\
    \ that have been generated since that older backup was made.\n\nDetermining the\
    \ Location for the Snapshot Control File\n\nRMAN requires a read-consistent view\
    \ of the control file for the following tasks:\n\n*   Synchronizing with the recovery\
    \ catalog\n*   Backing up the current control file\n\nRMAN creates a snapshot\
    \ copy of the current control file that it uses as a read-consistent copy while\
    \ it’s performing these tasks. This ensures that RMAN is working from a copy of\
    \ the control file that isn’t being modified.\n\nThe default location of the snapshot\
    \ control file is OS specific. On Linux platforms the default location/format\
    \ is ORACLE_HOME/dbs/snapcf_@.f. Note that the default location isn’t in the FRA\
    \ (even if you’ve implemented an FRA).\n\nYou can display the current snapshot\
    \ control file details, using the SHOW command:\n\n```\nRMAN> show snapshot controlfile\
    \ name;\n```\n\nHere is some sample output:\n\n```\nCONFIGURE SNAPSHOT CONTROLFILE\
    \ NAME TO\n '/ora01/app/oracle/product/12.1.0.1/db_1/dbs/snapcf_o12c.f'; # default\n\
    ```\n\nFor most situations the default location and format of the snapshot control\
    \ file are sufficient. This file doesn’t use much space or have any intensive\
    \ I/O requirements. I recommend that you use the default setting.\n\nIf you have\
    \ a good reason to configure the snapshot control file to a nondefault location,\
    \ you can do so as follows:\n\n```\nRMAN> configure snapshot controlfile name\
    \ to '/u01/O12C/rman/snapcf.ctl';\n```\n\nIf you accidentally configure the snapshot\
    \ control file location to a nonexistent directory, then when running a BACKUP\
    \ or COPY command, the autobackup of the control file will fail, with this error:\n\
    \n```\nORA-01580: error creating control backup file ...\n```\n\nYou can set the\
    \ snapshot control file back to the default, like this:\n\n```\nRMAN> configure\
    \ snapshot controlfile name clear;\n```\n\nUsing a Recovery Catalog\n\nRMAN always\
    \ stores its latest backup operations in the target database control file. You\
    \ can set up an optional recovery catalog to store metadata regarding RMAN backups.\
    \ The recovery catalog is a separate schema (usually in a database different from\
    \ that of the target database) that contains database objects (tables, indexes,\
    \ and so on) that store the RMAN backup information. The recovery catalog doesn’t\
    \ store RMAN backup pieces—only backup metadata.\n\nThe main advantages of using\
    \ a recovery catalog are as follows:\n\n*   Provides a secondary repository for\
    \ RMAN metadata. If you lose all your control files and backups of your control\
    \ files, you can still retrieve RMAN metadata from the recovery catalog.\n*  \
    \ Stores RMAN metadata for a much longer period than is possible when you just\
    \ use a control file for the repository.\n*   Offers access to all RMAN features.\
    \ Some restore and recovery features are simpler when using a recovery catalog.\n\
    \nThe disadvantage of using a recovery catalog is that this is another database\
    \ you have to set up, maintain, and back up. Additionally, when you start a backup\
    \ and attempt to connect to the recovery catalog, if the recovery catalog isn’t\
    \ available for any reason (server down, network issues, and so on), you must\
    \ decide whether you want to continue with the backup without a recovery catalog.\n\
    \nYou must also be aware of versioning aspects when using a recovery catalog.\
    \ You need to make sure the version of the database you use to store the recovery\
    \ catalog is compatible with the version of the target database. When you upgrade\
    \ a target database, be sure the recovery catalog is upgraded (if necessary).\n\
    \n![image](Images/sq.jpg) **Note**   See [Chapter 18](#9781430257288_Ch18.xhtml)\
    \ for details on how to implement a recovery catalog.\n\nRMAN works fine with\
    \ or without a recovery catalog. For several of the databases I maintain, I don’t\
    \ use a recovery catalog; this eliminates having to set it up and maintain it.\
    \ For me, simplicity takes precedence over the features available with the recovery\
    \ catalog.\n\nHowever, if you have good business reasons for using a recovery\
    \ catalog, then implement and use one. The recovery catalog isn’t that difficult\
    \ to set up and maintain, and Oracle recommends that you use it.\n\nUsing a Media\
    \ Manager\n\nA media manager is required for RMAN to back up directly to tape.\
    \ Several vendors provide this feature (for a cost). Media managers are used in\
    \ large database environments, such as data warehouses, in which you may not have\
    \ enough room to back up a database to disk. You may also have a disaster recovery\
    \ requirement to back up directly to tape.\n\nIf you have such requirements, then\
    \ you should purchase a media management package and implement it. If you don’t\
    \ need to back up directly to tape, there’s no need to implement a media manager.\
    \ RMAN works fine backing up directly to disk.\n\nKeep in mind that many shops\
    \ use RMAN to back up directly to disk and then have the system administrator\
    \ back up the RMAN backups to tape afterward. If you do this, you have to be sure\
    \ your RMAN backups aren’t running while the tape backups are running (because\
    \ you may get partial files backed up to tape).\n\n![image](Images/sq.jpg) **Tip**  \
    \ See [Chapter 20](#9781430257288_Ch20.xhtml) for details on how to implement\
    \ Oracle Secure Backup as a media management layer.\n\nSetting the CONTROL_FILE_RECORD_KEEP_TIME\
    \ Initialization ­Parameter\n\nThe CONTROL_FILE_RECORD_KEEP_TIME initialization\
    \ parameter specifies the minimum number of days a reusable record in the control\
    \ file is retained before the record can be overwritten. The RMAN metadata are\
    \ stored in the reusable section of the control file and therefore are eventually\
    \ overwritten.\n\nIf you’re using a recovery catalog, then you don’t need to worry\
    \ about this parameter because RMAN metadata are stored in the recovery catalog\
    \ indefinitely. Therefore, when you use a recovery catalog, you can access any\
    \ historical RMAN metadata.\n\nIf you’re using only the control file as the RMAN\
    \ metadata repository, then the information stored there will eventually be overwritten.\
    \ The default value for CONTROL_FILE_RECORD_KEEP_TIME is 7 days:\n\n```\nSQL>\
    \ show parameter control_file_record_keep_time\n\nNAME                                \
    \ TYPE        VALUE\n------------------------------------ ----------- -----\n\
    control_file_record_keep_time        integer     7\n```\n\nYou can set the value\
    \ to anything from 0 to 365 days. Setting the value to 0 means that the RMAN metadata\
    \ information can be overwritten at any time.\n\nThe CONTROL_FILE_RECORD_KEEP_TIME\
    \ parameter was more critical in older versions of Oracle, in which it wasn’t\
    \ easy to repopulate the control file with RMAN information, in the event that\
    \ metadata were overwritten. Starting with Oracle Database 10g, you can use the\
    \ C ATALOG command to quickly make the control file aware of RMAN backup files.\n\
    \nIf you run daily backups, then I recommend that you leave this parameter at\
    \ 7 days. However, if you only back up your database once a month, or if, for\
    \ some reason, you have a retention policy greater than 7 days, and you’re not\
    \ using a recovery catalog, then you may want to consider increasing the value.\
    \ The downside to increasing this parameter is that if you have a significant\
    \ amount of RMAN backup activity, this can increase the size of your control file.\n\
    \nConfiguring RMAN’s Backup Retention Policy\n\nRMAN retention policies allow\
    \ you to specify how long you want to retain backups. RMAN has two mutually exclusive\
    \ methods of specifying a retention policy:\n\n*   Recovery window\n*   Number\
    \ of backups (redundancy)\n\nRecovery Window\n\nWith a recovery window, you specify\
    \ a number of days in the past for which you want to be able recover to any point\
    \ in that window. For example, if you specify a retention policy window of 5 days,\
    \ then RMAN doesn’t mark as obsolete backups of data files and archive redo logs\
    \ that are required to be able to restore to any point in that 5-day window:\n\
    \n```\nRMAN> configure retention  policy to recovery window of 5 days;\n```\n\n\
    For the specified recovery, RMAN may need backups older than the 5-day window\
    \ because it may need an older backup to start with to be able to recover to the\
    \ recovery point specified. For example, suppose your last good backup was made\
    \ 6 days ago, and now you want to recover to 4 days in the past. For this recovery\
    \ window, RMAN needs the backup from 6 days ago to restore and recover to the\
    \ point specified.\n\nRedundancy\n\nYou can also specify that RMAN keep a minimum\
    \ number of backups. For instance, if redundancy is set to 2, then RMAN doesn’t\
    \ mark as obsolete the latest two backups of data files and archive redo log files:\n\
    \n```\nRMAN> configure retention policy to redundancy 2;\n```\n\nI find that a\
    \ retention policy based on redundancy is easier to work with and more predictable\
    \ with regard to how long backups are retained. If I set redundancy to 2, I know\
    \ that RMAN won’t mark as obsolete the latest two backups. In contrast, the recovery\
    \ window retention policy depends on the frequency of the backups and the window\
    \ length to determine whether a backup is obsolete.\n\nDeleting Backups, Based\
    \ on Retention Policy\n\nYou can report on backups that RMAN has determined to\
    \ be obsolete per the retention policy, as follows:\n\n```\nRMAN> report obsolete;\n\
    ```\n\nTo delete obsolete backups, run the D ELETE OBSOLETE command:\n\n```\n\
    RMAN> delete obsolete;\n```\n\nYou’re prompted with this:\n\n```\nDo you really\
    \ want to delete the above objects (enter YES or NO)?\n```\n\nIf you’re scripting\
    \ the procedure, you can specify the delete not to prompt for input:\n\n```\n\
    RMAN> delete noprompt obsolete;\n```\n\nI usually have the D ELETE NOPROMPT OBSOLETE\
    \ command coded into the shell script that backs up the database. This instructs\
    \ RMAN to delete any obsolete backups and obsolete archive redo logs, as specified\
    \ by the retention policy (see the section “Segueing from Decisions to Action,”\
    \ later in this chapter, for an example of how to automate the deleting of obsolete\
    \ backups with a shell script).\n\nClearing the Retention Policy\n\nThe default\
    \ retention policy is redundancy of 1\\. You can completely disable the RMAN retention\
    \ policy via the TO N ONE command.\n\n```\nRMAN> configure retention policy to\
    \ none;\n```\n\nWhen the policy is set to NONE, no backups are ever considered\
    \ obsolete and therefore cannot be removed via the DELETE OBSOLETE command. This\
    \ normally is not the behavior you want. You want to let RMAN delete backups per\
    \ a retention policy based on a window or number of backups.\n\nTo set the retention\
    \ policy back to the default, use the CLEAR command:\n\n```\nRMAN> configure retention\
    \ policy clear;\n```\n\nConfiguring the Archive Redo Logs’ Deletion Policy\n\n\
    In most scenarios, I have RMAN delete the archive redo logs based on the retention\
    \ policy of the database backups. This is the default behavior. You can view the\
    \ database retention policy, using the SHOW command:\n\n```\nRMAN> show retention\
    \ policy;\nCONFIGURE RETENTION POLICY TO REDUNDANCY 1; # default\n```\n\nTo remove\
    \ archive redo logs (and backup pieces) based on the database retention policy,\
    \ run the following:\n\n```\nRMAN> delete obsolete;\n```\n\nAs of Oracle Database\
    \ 11g, you can specify an archive redo log deletion policy that is separate from\
    \ that of the database backups. This deletion policy applies to archive redo logs\
    \ both outside and in the FRA.\n\n![image](Images/sq.jpg) **Note**   Prior to\
    \ Oracle Database 11g the archive deletion policy only applied to archive redo\
    \ logs associated with a standby database.\n\nTo configure an archive redo log\
    \ deletion policy, use the C ONFIGURE ARCHIVELOG DELETION command. The following\
    \ command configures the archive redo deletion policy so that archive redo logs\
    \ aren’t deleted until they have been backed up twice to disk:\n\n```\nRMAN> configure\
    \ archivelog deletion policy to backed up 2 times to device type disk;\n```\n\n\
    To have RMAN delete obsolete archive redo logs, as defined by the archivelog deletion\
    \ policy, issue the following command:\n\n```\nRMAN> delete archivelog all;\n\
    ```\n\n![image](Images/sq.jpg) **Tip**   Run the C ROSSCHECK command before running\
    \ the D ELETE command. Doing so ensures that RMAN is aware of whether a file is\
    \ on disk.\n\nTo see whether a retention policy has been set specifically for\
    \ the archive redo log files, use this command:\n\n```\nRMAN> show archivelog\
    \ deletion policy;\n```\n\nTo clear the archive deletion policy, do this:\n\n\
    ```\nRMAN> configure archivelog deletion policy clear;\n```\n\nSetting the Degree\
    \ of Parallelism\n\nYou can significantly increase the performance of RMAN backup\
    \ and restore operations if your database server is equipped with the hardware\
    \ to support multiple channels. If your server has multiple CPUs and multiple\
    \ storage devices (disks or tape devices), then you can improve performance by\
    \ enabling multiple backup channels.\n\nIf you require better performance from\
    \ backup and restore operations and have hardware that facilitates parallel operations,\
    \ you should enable parallelism and perform tests to determine the optimal degree.\
    \ If your hardware can take advantage of parallel RMAN channels, there is little\
    \ downside to enabling parallelism.\n\nIf you have multiple CPUs, but just one\
    \ storage device location, you can enable multiple channels to write to and read\
    \ from one location. For example, if you’re backing up to an FRA, you can still\
    \ take advantage of multiple channels by enabling parallelism. Suppose you have\
    \ four CPUs on a server and want to enable a corresponding degree of parallelism:\n\
    \n```\nRMAN> configure device type disk parallelism 4;\n```\n\nYou can also write\
    \ to separate locations in parallel by configuring multiple channels associated\
    \ with different mount points; for example,\n\n```\nRMAN> configure device type\
    \ disk parallelism 4;\nRMAN> configure channel 1 device type disk format '/u01/O12C/rman/rman1_%U.bk';\n\
    RMAN> configure channel 2 device type disk format '/u02/O12C/rman/rman2_%U.bk';\n\
    RMAN> configure channel 3 device type disk format '/u03/O12C/rman/rman3_%U.bk';\n\
    RMAN> configure channel 4 device type disk format '/u04/O12C/rman/rman4_%U.bk';\n\
    ```\n\nThis code configures four channels that write to separate locations on\
    \ disk. When you configure separate channels for different locations, make sure\
    \ you enable the degree of parallelism to match the number of configured device\
    \ channels. If you allocate more channels than the specified degree of parallelism,\
    \ RMAN only writes to the number of channels specified by the degree of parallelism\
    \ and ignores the other channels.\n\nIf you need to clear the degree of parallelism,\
    \ you can do so as follows:\n\n```\nRMAN> configure device type disk clear;\n\
    ```\n\nSimilarly, to clear the channel device types, use the C LEAR command. This\
    \ example clears channel 4:\n\n```\nRMAN> configure channel 4 device type disk\
    \ clear;\n```\n\nUsing Backup Sets or Image Copies\n\nWhen you issue an RMAN BACKUP\
    \ command, you can specify that the backup be one of the following:\n\n*   Backup\
    \ set\n*   Image copy\n\nA backup set is the default type of RMAN backup. A backup\
    \ set contains backup pieces, which are binary files that only RMAN can write\
    \ to or read from. Backup sets are desirable because they’re generally smaller\
    \ than the data files being backed up. If you’re using Oracle Database 10g Release\
    \ 2 or higher, RMAN automatically attempts to create backup pieces with unused\
    \ block compression. In this mode, RMAN reads a bitmap to determine which blocks\
    \ are allocated and only reads from those blocks in the data files. This feature\
    \ is supported only for disk-based backup sets and Oracle Secure Backup tape backups.\n\
    \nIf you’re using a database version prior to Oracle Database 10g Release 2, by\
    \ default, backup sets are created, using null block compression (sometimes referred\
    \ to, more aptly, as block skipping). In this mode, RMAN checks blocks in the\
    \ data file; if the blocks haven’t been used, they aren’t backed up.\n\n![image](Images/sq.jpg) **Note**  \
    \ RMAN can also create backup sets using true binary compression. This is the\
    \ type of compression you get from an OS compression utility (such as zip). Oracle\
    \ supports several levels of binary compression. The B ASIC ­compression ­algorithm\
    \ is available without an additional license. Oracle provides further compression\
    \ features with the Oracle ­Advanced Compression option (see the section “Configuring\
    \ Binary Compression,” later in this chapter, for details on how to enable binary\
    \ compression).\n\nWhen you create a backup as a backup set, the binary backup\
    \ piece files can only be manipulated by RMAN processes. Some DBAs view this as\
    \ a disadvantage because they must use RMAN to back up and restore these files\
    \ (you have no direct access to or control over the backup pieces). But, these\
    \ perceptions aren’t warranted. Unless you hit a rare bug, RMAN is dependable\
    \ and works reliably in all backup-and-restore situations.\n\nContrast the backup\
    \ set with an image copy. An image copy creates a byte-for-byte identical copy\
    \ of each data file. The advantage of creating an image copy is that (if necessary)\
    \ you can manipulate the image copy without using RMAN (as with an OS copy utility).\
    \ Additionally, in the event of a media failure, an image copy is a fast method\
    \ of restoring data files, because RMAN only has to copy the file back from the\
    \ backup location (there is no reconstructing of the data file, because it’s an\
    \ exact copy).\n\nI almost always use backup sets for database backups, rather\
    \ than image copies. Usually, I require some form of RMAN compression (block skipping).\
    \ The size of the backup to disk is almost always a concern. Backup sets are more\
    \ efficient regarding disk space consumption. Because backup sets can take advantage\
    \ of RMAN compression, there is also less I/O involved, compared with an image\
    \ copy. In many environments, reducing the I/O so as not to impact other applications\
    \ is a concern.\n\nHowever, if you feel that you need direct control over the\
    \ backup files that RMAN creates, or you’re in an environment in which the speed\
    \ of the restore process is paramount, consider using image copies.\n\nUsing Incremental\
    \ Backups\n\nFor most of the databases I’m responsible for, I run a daily level\
    \ 0 backup. I don’t usually implement any type of incremental backup strategy.\n\
    \nIncremental backup strategies are appropriate for large databases in which only\
    \ a small portion of the database blocks change from one backup to the next. If\
    \ you’re in a data warehouse environment, you may want to consider an incremental\
    \ backup strategy, because it can greatly reduce the size of your backups. For\
    \ example, you may want to run a weekly level 0 backup and then run a daily level\
    \ 1 incremental backup.\n\n![image](Images/sq.jpg) **Note**   See [Chapter 18](#9781430257288_Ch18.xhtml)\
    \ for details on how to back up a database using incremental backups.\n\nUsing\
    \ Incrementally Updated Backups\n\nIncrementally updated backups are an efficient\
    \ way to implement an image copy backup strategy. This technique instructs RMAN\
    \ to first create image copies of data files; then, the next time the backup runs,\
    \ instead of creating a fresh set of image copies, RMAN makes an incremental backup\
    \ (changes to blocks since the image copy was created) and applies that incremental\
    \ backup to the image copies.\n\nIf you have the disk space available for full\
    \ image copies of your database and you want the flexibility to use the image\
    \ copies directly, in the event of a media failure, consider this backup strategy.\n\
    \nOne potential disadvantage of this approach is that if you’re required to restore\
    \ and recover to some point in the past, you can only restore and recover to the\
    \ point at which the image copies were last updated with the incremental backup.\n\
    \n![image](Images/sq.jpg) **Note**   See [Chapter 18](#9781430257288_Ch18.xhtml)\
    \ for details on how to back up a database using incrementally updated backups.\n\
    \nUsing Block Change Tracking\n\nThis feature keeps track of when a database block\
    \ changes. The idea is that if you’re using an incremental backup strategy, you\
    \ can enhance performance, because by implementing this feature, RMAN doesn’t\
    \ have to scan each block (under the high-water mark) in the data files to determine\
    \ whether it needs to be backed up. Rather, RMAN only has to access the block\
    \ change tracking file to find which blocks have changed since the last backup\
    \ and directly access those blocks. If you work in a large, data warehouse environment\
    \ and are using an incremental backup strategy, consider enabling block change\
    \ tracking to enhance performance.\n\n![image](Images/sq.jpg) **Note**   See [Chapter\
    \ 18](#9781430257288_Ch18.xhtml) for details on how to implement block change\
    \ tracking.\n\nConfiguring Binary Compression\n\nYou can configure RMAN to use\
    \ true binary compression when generating backup sets. You can enable compression\
    \ in one of two ways:\n\n*   Specify AS COMPRESSED BACKUPSET with the B ACKUP\
    \ command.\n*   Use a one-time C ONFIGURE command.\n\nHere is an example of backing\
    \ up with compression when issuing the B ACKUP command:\n\n```\nRMAN> backup as\
    \ compressed backupset database;\n```\n\nIn this example, compression is configured\
    \ for the disk device:\n\n```\nRMAN> configure device type disk backup type to\
    \ compressed backupset;\n```\n\nIf you need to clear the device-type compression,\
    \ issue this command:\n\n```\nRMAN> configure device type disk clear;\n```\n\n\
    I’ve found the default compression algorithm to be quite efficient. For a typical\
    \ database the backups are usually approximately four to five times smaller than\
    \ the regular backups. Of course, your compression results may vary, depending\
    \ on your data.\n\nWhy not compress all backups? Compressed backups consume more\
    \ CPU resources and take longer to create and restore from, but they result in\
    \ less I/O, spread out over a longer period. If you have multiple CPUs, and the\
    \ speed of making a backup isn’t an issue, then you should consider compressing\
    \ your backups.\n\nYou can view the type of compression enabled, using the S HOW\
    \ command:\n\n```\nRMAN> show compression algorithm;\n```\n\nHere is some sample\
    \ output:\n\n```\nCONFIGURE COMPRESSION ALGORITHM 'BASIC' AS OF RELEASE 'DEFAULT'\n\
    OPTIMIZE FOR LOAD TRUE ; # default\n```\n\nThe basic compression algorithm doesn’t\
    \ require an extra license from Oracle. If you’re using Oracle Database 11g Release\
    \ 2 or higher, and if you have a license for the Advanced Compression option,\
    \ then you have available three additional configurable levels of binary compression;\
    \ for example,\n\n```\nRMAN> configure compression algorithm 'HIGH';\nRMAN> configure\
    \ compression algorithm 'MEDIUM';\nRMAN> configure compression algorithm 'LOW';\n\
    ```\n\nIn my experience the prior compression algorithms are very efficient, both\
    \ in compression ratios and time taken to create backups.\n\nYou can query V$RMAN_COMPRESSION_ALGORITHM\
    \ to view details regarding the compression algorithms available for your release\
    \ of the database. To reset the current compression algorithm to the default of\
    \ BASIC, use the CLEAR command:\n\n```\nRMAN> configure compression algorithm\
    \ clear;\n```\n\nConfiguring Encryption\n\nYou may be required to encrypt backups.\
    \ Some shops especially require this for backups that contain sensitive data and\
    \ that are stored offsite. To use encryption when backing up, you must use the\
    \ Oracle Enterprise Edition, possess a license for the Advanced Security option,\
    \ and use Oracle Database 10g Release 2 or higher.\n\nIf you’ve configured a security\
    \ wallet (see the *Oracle Advanced Security Administrator’s Guide*, which can\
    \ be freely downloaded from the Technology Network area of the Oracle website\
    \ ([http://otn.oracle.com](http://otn.oracle.com), for details), you can configure\
    \ transparent encryption for backups, as shown:\n\n```\nRMAN> configure encryption\
    \ for database on;\n```\n\nAny backups that you make now will be encrypted. If\
    \ you need to restore from a backup, it’s automatically unencrypted (assuming\
    \ the same security wallet is in place as when you encrypted the backup). To disable\
    \ encryption, use the C ONFIGURE command:\n\n```\nRMAN> configure encryption for\
    \ database off;\n```\n\nYou can also clear the encryption setting with CLEAR:\n\
    \n```\nRMAN> configure encryption for database clear;\n```\n\nYou can query V$RMAN_ENCRYPTION_ALGORITHMS\
    \ to view details regarding the encryption algorithms available for your release\
    \ of the database.\n\nRUNNING SQL FROM WITHIN RMAN\n\nStarting with Oracle Database\
    \ 12c, you can run SQL statements (and see the results) directly from within RMAN:\n\
    \nRMAN> select * from v$rman_encryption_algorithms;\n\nPrior to 12c, you could\
    \ run the prior SQL statement with the RMAN sql command, but no results would\
    \ be displayed:\n\nRMAN> sql 'select * from v$rman_encryption_algorithms';\n\n\
    The RMAN sql command was meant more for running commands such as ALTER SYTEM:\n\
    \nRMAN> sql 'alter system switch logfile';\n\nNow, in 12c, you can run the SQL\
    \ directly:\n\nRMAN> alter system switch logfile;\n\nThis ability to run SQL from\
    \ within RMAN is a really nice enhancement; it allows you to see the results of\
    \ SQL queries and eliminates the need for specifying the sql keyword as well as\
    \ for placing quotation marks around the SQL command itself.\n\nConfiguring Miscellaneous\
    \ Settings\n\nRMAN provides a flexible number of channel configuration commands.\
    \ You will occasionally need to use them, depending on special circumstances and\
    \ the requirements for your database. Here are some of the options:\n\n*   Maximum\
    \ backup set size\n*   Maximum backup piece size\n*   Maximum rate\n*   Maximum\
    \ open files\n\nBy default the maximum backup set size is unlimited. You can use\
    \ the MAXSETSIZE parameter with the CONFIGURE or BACKUP command to specify the\
    \ overall maximum backup set size. Make sure the value of this parameter is at\
    \ least as great as the largest data file being backed up by RMAN. Here is an\
    \ example:\n\n```\nRMAN> configure maxsetsize to 2g;\n```\n\nSometimes, you may\
    \ want to limit the overall size of a backup piece because of physical limitations\
    \ of storage devices. Use the MAXPIECESIZE parameter of the CONFIGURE CHANNEL\
    \ or ALLOCATE CHANNEL command do this; for example,\n\n```\nRMAN> configure channel\
    \ device type disk maxpiecesize = 2g;\n```\n\nIf you need to set the maximum number\
    \ of bytes that RMAN reads each second on a channel, you can do so, using the\
    \ RATE parameter. This configures the maximum read rate for channel 1 to 200MB\
    \ per second:\n\n```\nconfigure channel 1 device type disk rate 200M;\n```\n\n\
    If you have a limit on the number of files you can have open simultaneously, you\
    \ can specify a maximum open files number via the MAXOPENFILES parameter:\n\n\
    ```\nRMAN> configure channel 1 device type disk maxopenfiles 32;\n```\n\nYou may\
    \ need to configure any of these settings when you need to make RMAN aware of\
    \ some OS or hardware limitation. You’ll rarely need to use these parameters but\
    \ should know of them.\n\n![image](Images/sq.jpg) **Note**   New with 12c, you\
    \ can configure the number of days RMAN will store output logging of commands\
    \ within V$RMAN_OUTPUT. You can configure the number of days worth of commands\
    \ to log via the CONFIGURE RMAN OUTPUT TO KEEP FOR command.\n\nConfiguring Informational\
    \ Output\n\nA good practice is to always set the OS NLS_DATE_FORMAT variable (before\
    \ running RMAN) so that both the date and time information are displayed in the\
    \ RMAN log instead of just the date, which is the default:\n\n```\nexport NLS_DATE_FORMAT='dd-mon-yyyy\
    \ hh24:mi:ss'\n```\n\nThis is useful during troubleshooting, especially when RMAN\
    \ fails, because we can use the exact date/time information for when the RMAN\
    \ error occurred and compare it with the alert.log and OS/MML logs to verify what\
    \ other events occurred in the database/server.\n\nAlso consider executing SET\
    \ ECHO ON to ensure that RMAN commands are displayed within the log before the\
    \ command is executed. Execute SHOW ALL as well to display the current settings\
    \ of RMAN variables. These settings are useful when troubleshooting and tuning.\n\
    \nCLEARING ALL RMAN CONFIGURATIONS\n\nThere is no CLEAR ALL command for resetting\
    \ all RMAN configurations back to the default values. However, you can easily\
    \ simulate this by running a script that contains CONFIGURE...CLEAR commands:\n\
    \nCONFIGURE RETENTION POLICY clear;\n\nCONFIGURE BACKUP OPTIMIZATION clear;\n\n\
    CONFIGURE DEFAULT DEVICE TYPE clear;\n\nCONFIGURE CONTROLFILE AUTOBACKUP clear;\n\
    \nCONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK clear;\n\nCONFIGURE\
    \ DEVICE TYPE DISK clear;\n\nCONFIGURE DATAFILE BACKUP COPIES FOR DEVICE TYPE\
    \ DISK clear;\n\nCONFIGURE CHANNEL 1 DEVICE TYPE DISK clear;\n\nCONFIGURE CHANNEL\
    \ 2 DEVICE TYPE DISK clear;\n\nCONFIGURE CHANNEL 3 DEVICE TYPE DISK clear;\n\n\
    CONFIGURE ARCHIVELOG BACKUP COPIES FOR DEVICE TYPE DISK clear;\n\nCONFIGURE MAXSETSIZE\
    \ clear;\n\nCONFIGURE ENCRYPTION FOR DATABASE clear;\n\nCONFIGURE ENCRYPTION ALGORITHM\
    \ clear;\n\nCONFIGURE COMPRESSION ALGORITHM clear;\n\nCONFIGURE RMAN OUTPUT clear;\
    \ # 12c\n\nCONFIGURE ARCHIVELOG DELETION POLICY clear;\n\nCONFIGURE SNAPSHOT CONTROLFILE\
    \ NAME clear;\n\nDepending on what you’ve set (and the version of your database),\
    \ you may need to set additional configurations.\n\nSegueing from Decision to\
    \ Action\n\nNow that you have a good understanding of what types of decisions\
    \ you should make before implementing RMAN, it’s instructional to view a script\
    \ that implements some of these components. I mainly work with Linux/Unix servers.\
    \ In these environments, I use shell scripts to automate the RMAN backups. These\
    \ shell scripts are automated through a scheduling utility such as cron.\n\nThis\
    \ section contains a typical shell script for RMAN backups. The shell script has\
    \ line numbers in the output for reference in the discussion of the architectural\
    \ decisions I made when writing the script. (If you copy the script, take out\
    \ the line numbers before running it.)\n\nFollowing is the script. [Table 17-2](#9781430257288_Ch17.xhtml#Tab2)\
    \ details every RMAN architectural decision point covered in this chapter, how\
    \ it’s implemented (or not) in the shell script, and the corresponding line number\
    \ in the shell script. The script doesn’t cover every aspect of how to use RMAN.\
    \ If you use the script, be sure to modify it to meet the requirements and RMAN\
    \ standards for your own environment:\n\n[Table 17-2.](#9781430257288_Ch17.xhtml#_Tab2)\
    \ Implementation of Architectural Decisions\n\n| Decision Point | Implementation\
    \ in Script | Line Number in Script |\n| --- | --- | --- |\n| Running the RMAN\
    \ client remotely or locally | Running script locally on the database server |\
    \ Line 26, connecting locally (not a network connection) |\n| Specifying the backup\
    \ user | Using SYS to connect | Line 27, starting rman connecting with forward\
    \ slash (/) |\n| Using online or offline backups | Online backup | N/A. Database\
    \ is assumed to be up during the backup |\n| Setting the archive redo log destination\
    \ and file format | LOG_ARCHIVE_DEST_N and LOG_ARCHIVE_FORMAT initialization parameters\
    \ set outside the script in a database parameter file | N/A; set outside the script\
    \ |\n| Configuring the RMAN backup location and file format | Using the CONFIGURE\
    \ command directly in the script | Lines 33–37 |\n| Setting the autobackup of\
    \ the control file | Enabled in the script | Line 32 |\n| Specifying the location\
    \ of the autobackup of the control file | Placed in the same directory as the\
    \ backups | Line 33 |\n| Backing up archive redo logs | Backing up with the rest\
    \ of the database; specifically, using the PLUS ARCHIVELOG clause | Line 38 |\n\
    | Determining the location for the snapshot control file | Using the default location\
    \ | N/A |\n| Using a recovery catalog | Not using | Line 26, connecting as nocatalog\
    \ |\n| Using a media manager | Not using | Lines 35–37, device type disk |\n|\
    \ Setting the CONTROL_FILE_RECORD_KEEP_TIME initialization parameter | Using the\
    \ default | N/A |\n| Configuring RMAN’s backup retention policy | Configuring\
    \ to a redundancy of 1, cross-checking, and deleting obsolete backups and archive\
    \ redo log files | Line 34, configuring; lines 30 and 31 cross-check; line 39,\
    \ using RMAN to delete old files |\n| Configuring the archive redo logs’ deletion\
    \ policy | Using the same retention policy applied to the backups | N/A |\n| Setting\
    \ the degree of parallelism | Setting a degree of 2 | Lines 35–37 |\n| Using backup\
    \ sets or image copies | Using backup sets | Line 38 |\n| Using incremental backups\
    \ | Incremental level 0, the same as a full backup | Line 38 |\n| Using incrementally\
    \ updated backups | Not using | N/A |\n| Using block change tracking | Not using\
    \ | N/A |\n| Configuring binary compression | Using basic compression | Line 38\
    \ |\n| Configuring encryption | Not using | N/A |\n| Configuring miscellaneous\
    \ settings | Not using | N/A |\n| Configuring informational output | Setting |\
    \ Lines 15, 28, and 29 |\n\n```\n  1\\. #!/bin/bash\n  2\\. HOLDSID=${1}  # SID\
    \ name\n  3\\. PRG=`basename $0`\n  4\\. USAGE=\"Usage: ${PRG} <database name>\
    \ \"\n  5\\. if [ -z \"${HOLDSID}\" ]; then\n  6.    echo \"${USAGE}\"\n  7.    exit\
    \ 1\n  8\\. fi\n  9\\. #----------------------------------------------\n 10\\\
    . # source environment variables (see Chapter 2 for details on oraset)\n 11\\\
    . /etc/oraset $HOLDSID\n 12\\. BOX=`uname -a | awk '{print$2}'`\n 13\\. MAILX='/bin/mailx'\n\
     14\\. MAIL_LIST=' dkuhn@gmail.com '\n 15\\. export NLS_DATE_FORMAT='dd-mon-yyyy\
    \ hh24:mi:ss'\n 16\\. date\n 17\\. #----------------------------------------------\n\
     18\\. LOCKFILE=/tmp/$PRG.lock\n 19\\. if [ -f $LOCKFILE ]; then\n 20.   echo\
    \ \"lock file exists, exiting...\"\n 21.   exit 1\n 22\\. else\n 23.   echo \"\
    DO NOT REMOVE, $LOCKFILE\" > $LOCKFILE\n 24\\. fi\n 25\\. #----------------------------------------------\n\
     26\\. rman nocatalog <<EOF\n 27\\. connect target /\n 28\\. set echo on;\n 29\\\
    . show all;\n 30\\. crosscheck backup;\n 31\\. crosscheck copy;\n 32\\. configure\
    \ controlfile autobackup on;\n 33\\. configure controlfile autobackup format for\
    \ device type disk to\n '/u01/O12C/rman/o12c_ctl_%F.bk';\n 34\\. configure retention\
    \ policy to redundancy 1;\n 35\\. configure           device type disk parallelism\
    \ 2;\n 36\\. configure channel 1 device type disk format '/u01/O12C/rman/o12c_%U.bk';\n\
     37\\. configure channel 2 device type disk format '/u02/O12C/rman/o12c_%U.bk';\n\
     38\\. backup as compressed backupset incremental level=0 database plus archivelog;\n\
     39\\. delete noprompt obsolete;\n 40\\. EOF\n 41\\. #----------------------------------------------\n\
     42\\. if [ $? -ne 0 ]; then\n 43.   echo \"RMAN problem...\"\n 44.   echo \"\
    Check RMAN backups\" | $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\n\
     45\\. else\n 46.   echo \"RMAN ran okay...\"\n 47\\. fi\n 48\\. #----------------------------------------------\n\
     49\\. if [ -f $LOCKFILE ]; then\n 50.   rm $LOCKFILE\n 51\\. fi\n 52\\. #----------------------------------------------\n\
     53\\. date\n 54\\. exit 0\n```\n\nA few aspects of this script need further discussion.\
    \ Line 11 sets the required OS variables by running a script named oraset (see\
    \ [Chapter 2](#9781430257288_Ch02.xhtml) for details on running oraset and sourcing\
    \ OS variables). Many DBAs choose to hard-code OS variables, such as ORACLE_HOME\
    \ and ORACLE_SID, into the script. However, you should avoid hard-coding variables\
    \ and instead use a script to source the required variables. Running a script\
    \ is much more flexible, especially when you have many databases on a box with\
    \ different versions of Oracle installed.\n\nLine 15 sets the NLS_DATE_FORMAT\
    \ OS variable to a value that includes hours, minutes, and seconds. This ensures\
    \ that when RMAN runs commands that are appropriate, it displays the date output\
    \ with a time component. This can be invaluable when you’re debugging and diagnosing\
    \ issues. By default, RMAN displays only the date component. Knowing just the\
    \ date when a command ran is rarely enough information to determine the timing\
    \ of the commands as they were executed. At minimum, you need to see hours and\
    \ minutes (along with the date).\n\nLines 18–24 check for the existence of a lock\
    \ file. You don’t want to run this script if it’s already running. The script\
    \ checks for the lock file, and, if it exists, the script exits. After the backup\
    \ has finished, the lock file is removed (lines 49–51).\n\nLine 28 sets the ECHO\
    \ parameter to on. This instructs RMAN to display in the output the command before\
    \ running it. This can be invaluable for debugging issues. Line 29 displays all\
    \ the configurable variables. This also comes in handy for troubleshooting issues\
    \ because you can see what the RMAN variables were set to before any commands\
    \ are executed.\n\nLines 32–37 use the CONFIGURE command. These commands run each\
    \ time the script is executed. Why do that? You only need to run a CONFIGURE command\
    \ once, and it’s stored in the control file—you don’t have to run it again, right?\
    \ That is correct. However, I’ve occasionally been burned when a DBA with poor\
    \ habits configured a setting for a database and didn’t tell anybody, and I didn’t\
    \ discover the misconfiguration until I attempted to make another backup. I strongly\
    \ prefer to place the C ONFIGURE commands in the script so that the behavior is\
    \ the same, regardless of what another DBA may have done outside the script. The\
    \ CONFIGURE settings in the script also act as a form of documentation: I can\
    \ readily look at the script and determine how settings have been configured.\n\
    \nLines 30 and 31 run CROSSCHECK commands. Why do that? Sometimes, files go missing,\
    \ or a rogue DBA may remove archive redo log files from disk with an OS command\
    \ outside RMAN. When RMAN runs, if it can’t find files that it thinks should be\
    \ in place, it throws an error and stops the backup. I prefer to run the CROSSCHECK\
    \ command and let RMAN reconcile which files it thinks should be on disk with\
    \ those that are actually on disk. This keeps RMAN running smoothly.\n\nYou run\
    \ DELETE NOPROMPT OBSOLETE on line 39\\. This removes all backup files and archive\
    \ redo log files that have been marked as OBSOLETE by RMAN, as defined by the\
    \ retention policy. This lets RMAN manage which files should be kept on disk.\
    \ I prefer to run the DELETE command after the backup has finished (as opposed\
    \ to running it before the backup). The retention policy is defined as 1, so if\
    \ you run DELETE after the backup, RMAN leaves one backup copy on disk. If you\
    \ run DELETE before the backup, RMAN leaves one copy of the backup on disk. After\
    \ the backup runs, there are be two copies of the backup on disk, which I don’t\
    \ have room for on this server.\n\nYou can execute the shell script from the Linux/Unix\
    \ scheduling utility cron, as follows:\n\n```\n0 16 * * * $HOME/bin/rmanback.bsh\
    \ INVPRD >$HOME/bin/log/INVPRDRMAN.log 2>&1\n```\n\nThe script runs daily at 1600\
    \ hours military time on the database server. A log file is created (INVPRDRMAN.log)\
    \ to capture any output and errors associated with the RMAN job. See [Chapter\
    \ 21](#9781430257288_Ch21.xhtml) for details on automating jobs through cron.\n\
    \nAgain, the script in this section is basic; you’ll no doubt want to enhance\
    \ and modify it to meet your requirements. This script gives you a starting point,\
    \ with concrete RMAN recommendations and how to implement them.\n\nSummary\n\n\
    RMAN is Oracle’s flagship B&R tool. If you’re still using the older, user-managed\
    \ backup technologies, then I strongly recommend that you switch to RMAN. RMAN\
    \ contains a powerful set of features that are unmatched by any other backup tool\
    \ available. RMAN is easy to use and configure. It will save you time and effort\
    \ and give you peace of mind when you’re implementing a rock-solid B&R strategy.\n\
    \nIf you’re new to RMAN, it may not be obvious which features should always be\
    \ enabled and implemented and, likewise, which aspects you’ll rarely need. This\
    \ chapter contains a checklist that walks you through each architectural decision\
    \ point. You may disagree with some of my conclusions, or some recommendations\
    \ may not meet your business requirements—that’s fine. The point is that you should\
    \ carefully consider each component and how to implement the features that make\
    \ sense.\n\nThe chapter ended with a real-world example of a script used to implement\
    \ RMAN in a production environment. Now that you have a good idea of RMAN’s features\
    \ and how to use them, you’re ready to start making backups. The next chapter\
    \ deals with RMAN backup scenarios.\n\nCHAPTER 18\n\n![image](Images/frontdot.jpg)\n\
    \nRMAN Backups and Reporting\n\n[Chapter 17](#9781430257288_Ch17.xhtml) provided\
    \ the details on configuring RMAN and using specialized features to control the\
    \ behavior of RMAN. After you consider which features you require, you’re ready\
    \ to create backups. RMAN can back up the following types of files:\n\n*   Data\
    \ files\n*   Control files\n*   Archived redo log files\n*   spfiles\n*   Backup\
    \ pieces\n\nFor most scenarios, you will use RMAN to back up data files, control\
    \ files, and archive redo log files. If you have the autobackup of the control\
    \ file feature enabled, then RMAN will automatically back up the control file\
    \ and the spfile (if you’re using one) when a BACKUP or COPY command is issued.\
    \ You can also back up the backup piece files that RMAN has created.\n\nRMAN does\
    \ not back up Oracle Net files, password files, block change tracking files, flashback\
    \ logs, or the Oracle binary files (files created when you installed Oracle).\
    \ If required, you should put in place OS backups that include those files.\n\n\
    ![image](Images/sq.jpg) **Tip**   Consider using Oracle Secure Backup to back\
    \ up OS files to tape (see [Chapter 20](#9781430257288_Ch20.xhtml) for details).\n\
    \nAlso note that RMAN does not back up online redo log files. If you were to back\
    \ up the online redo log files, it would be pointless to restore them. The online\
    \ redo log files contain the latest redo generated by the database. You would\
    \ not want to overwrite them from a backup with old redo information. When your\
    \ database is in archivelog mode, the online redo log files contain the most recently\
    \ generated transactions required to perform complete recovery.\n\nThis chapter\
    \ details many of the features related to running the RMAN BACKUP command. Also\
    \ covered are creating a recovery catalog and techniques for logging output and\
    \ reporting on RMAN backup operations. This chapter begins by discussing a few\
    \ common practices used to enhance what is displayed in the RMAN output when running\
    \ commands.\n\nPreparing to Run RMAN Backup Commands\n\nBefore running RMAN backups,\
    \ I usually set a few things so as to enhance what is shown in the output. You\
    \ don’t need to set these variables every time you log in and run an RMAN command.\
    \ However, when troubleshooting or debugging issues, it’s almost always a good\
    \ idea to perform the following tasks:\n\n*   Set NLS_DATE_FORMAT OS variable\n\
    *   Set ECHO\n*   Show RMAN variables\n\nThe bulleted items are discussed in the\
    \ following sections.\n\nSetting NLS_DATE_FORMAT\n\nBefore running any RMAN job,\
    \ I set the OS variable NLS_DATE_FORMAT to include a time (hours, minutes, seconds)\
    \ component; for example,\n\n```\n$ export NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\n\
    ```\n\nAdditionally, if I have a shell script that calls RMAN, I put the prior\
    \ line directly in the shell script (see the shell script at the end of [Chapter\
    \ 17](#9781430257288_Ch17.xhtml) for an example):\n\n```\nNLS_DATE_FORMAT='dd-mon-yyyy\
    \ hh24:mi:ss'\n```\n\nThis ensures that when RMAN displays a date, it always includes\
    \ the hours, minutes, and seconds as part of the output. By default, RMAN only\
    \ includes the date component (DD-MON-YY) in the output. For instance, without\
    \ setting NLS_DATE_FORMAT, when starting a backup, here is what RMAN displays:\n\
    \n```\nStarting backup at 11-JAN-13\n```\n\nWhen you set the NLS_DATE_FORMAT OS\
    \ variable to include a time component, the output will look like this instead:\n\
    \n```\nStarting backup at 11-jan-2013 16:43:04\n```\n\nWhen troubleshooting, it’s\
    \ essential to have a time component so that you can determine how long a command\
    \ took to run or how long a command was running before a failure occurred. Oracle\
    \ Support will almost always ask you to set this variable to include the time\
    \ component before capturing output and sending it to them.\n\nThe only downside\
    \ to setting the NLS_DATE_FORMAT is that if you set it to a value unknown to RMAN,\
    \ connectivity issues can occur. For example, here the NLS_DATE_FORMAT is set\
    \ to an invalid value:\n\n```\n$ export NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:sd'\n\
    $ rman target /\n```\n\nWhen set to an invalid value, you get this error when\
    \ logging in to RMAN:\n\n```\nRMAN-03999: Oracle error occurred while converting\
    \ a date: ORA-01821:\n```\n\nTo unset the NLS_DATE_FORMAT variable, set it to\
    \ a blank value, like so:\n\n```\n$ export NLS_DATE_FORMAT=''\n```\n\nSetting\
    \ ECHO Setting ECHO\n\nAnother value that I always set in any RMAN scripts is\
    \ the ECHO command, seen here:\n\n```\nRMAN> set echo on;\n```\n\nThis instructs\
    \ RMAN to display the command that it’s running in the output, so you can see\
    \ what RMAN command is running. along with any relevant error or output messages\
    \ associated with the command. This is especially important when you’re running\
    \ RMAN commands within scripts, because you’re not directly typing in a command\
    \ (and may not know what command was issued within the shell script). For example,\
    \ without SET ECHO ON, here is what is displayed in the output for a command:\n\
    \n```\nStarting backup at...\n```\n\nWith SET ECHO ON, this output shows the actual\
    \ command that was run:\n\n```\nbackup datafile 4;\nStarting backup at...\n```\n\
    \nFrom the prior output, you can see which command is running, when it started,\
    \ and so on.\n\nShowing Variables\n\nAnother good practice is to run the SHOW\
    \ ALL command within any script,  as follows:\n\n```\nRMAN> show all;\n```\n\n\
    This displays all the RMAN configurable variables. When troubleshooting, you may\
    \ not be aware of something that another DBA has configured. This gives you a\
    \ snapshot of the settings as they were when the RMAN session executed.\n\nRunning\
    \ Backups\n\nBefore you run an RMAN backup, make sure you read [Chapter 17](#9781430257288_Ch17.xhtml)\
    \ for details on how to configure RMAN with settings for a production environment.\
    \ For production databases, I mainly run RMAN from a shell script similar to the\
    \ one shown at the end of [Chapter 17](#9781430257288_Ch17.xhtml). Within the\
    \ shell script, I configure every aspect of RMAN that I want to use for a particular\
    \ database. If you run RMAN out of the box, with its default settings, you will\
    \ be able to back up your database. However, these settings will not be adequate\
    \ for most production database applications.\n\nBacking Up the Entire Database\n\
    \nIf you’re not sure where RMAN will be backing up your database files, you need\
    \ to read [Chapter 17](#9781430257288_Ch17.xhtml), because it describes how to\
    \ configure RMAN to create the backup files in the location of your choice. Here\
    \ is how I usually configure RMAN to write to specific locations on disk (note\
    \ that the CONFIGURE command must be executed before you run the BACKUP command):\n\
    \n```\nRMAN> configure channel 1 device type disk format '/u01/O12C/rman/rman1_%U.bk';\n\
    ```\n\nAfter a backup location is configured, I almost always use a command similar\
    \ to the one shown next to back up the entire database:\n\n```\nRMAN> backup incremental\
    \ level=0 database plus archivelog;\n```\n\nThis command ensures that RMAN will\
    \ back up all data files in the database, all available archive redo logs generated\
    \ prior to the backup, and all archive redo logs generated during the backup.\
    \ This command also ensures that you have all the data files and archive redo\
    \ logs that would be required to restore and recover your database.\n\nIf you\
    \ have the autobackup of the control file feature enabled (as shown next):\n\n\
    ```\nRMAN> configure controlfile autobackup on;\n```\n\nThen the last task RMAN\
    \ does as part of the backup is to generate a backup set that contains a backup\
    \ of the control file. This control file will contain all information regarding\
    \ the backup that took place and any archive redo logs that were generated during\
    \ the backup.\n\n![image](Images/sq.jpg) **Tip**   Always enable the autobackup\
    \ of the control file feature.\n\nThere are many nuances to the RMAN BACKUP command.\
    \ For production databases, I usually back up the database with the BACKUP INCREMENTAL\
    \ LEVEL=0 DATABASE PLUS ARCHIVELOG command. That’s generally sufficient. However,\
    \ you will encounter many situations in which you need to run a backup that uses\
    \ a specific RMAN feature, or you might troubleshoot an issue requiring that you\
    \ be aware of the other ways to invoke an RMAN backup. These aspects are discussed\
    \ in the next several sections.\n\nFull Backup vs. Incremental Level=0\n\nThe\
    \ term *RMAN full backup* sometimes causes confusion. A more apt way of phrasing\
    \ this task would be *RMAN backing up all modified blocks within one or more data\
    \ files*. The term *full* does not mean that all blocks are backed up or that\
    \ all data files are backed up. It simply means that all blocks that would be\
    \ required to rebuild a data file (in the event of a failure) are being backed\
    \ up. You can take a full backup of a single data file, and the contents of that\
    \ backup piece may be quite a bit smaller than the data file itself.\n\nThe term\
    \ *RMAN level 0 incremental backup* doesn’t exactly describe itself very well,\
    \ either. A level 0 incremental backup is backing up the same blocks as a full\
    \ backup. In other words, the following two commands back up the same blocks in\
    \ a database:\n\n```\nRMAN> backup as backupset full database;\nRMAN> backup as\
    \ backupset incremental level=0 database;\n```\n\nThe only difference between\
    \ the prior two commands is that an incremental level 0 backup can be used in\
    \ conjunction with other incremental backups, whereas a full backup cannot participate\
    \ in an incremental backup strategy. Therefore, I almost always prefer to use\
    \ the INCREMENTAL LEVEL=0 syntax (as opposed to a full backup); it gives me the\
    \ flexibility to use the level 0 incremental backup along with subsequent incremental\
    \ level 1 backups.\n\nBackup Sets vs. Image Copies\n\nThe default backup mode\
    \ of RMAN instructs it to back up only blocks that have been used in a data file;\
    \ these are known as backup sets. RMAN can also make byte-for-byte copies of the\
    \ data files; these are known as image copies. Creating a backup set is the default\
    \ type of backup that RMAN creates. The next command creates a backup set backup\
    \ of the database:\n\n```\nRMAN> backup database;\n```\n\nIf you prefer, you can\
    \ explicitly place the AS BACKUPSET command when creating backups:\n\n```\nRMAN>\
    \ backup as backupset database;\n```\n\nYou can instruct RMAN to create image\
    \ copies by using the AS COPY command. This command creates image copies of every\
    \ data file in the database:\n\n```\nRMAN> backup as copy database;\n```\n\nBecause\
    \ image copies are identical copies of the data files, they can be directly accessed\
    \ by the DBA with OS commands. For example, say you had a media failure, and you\
    \ didn’t want to use RMAN to restore an image copy. You could use an OS command\
    \ to copy the image copy of a data file to a location where it could be used by\
    \ the database. In contrast, a backup set consists of binary files that only the\
    \ RMAN utility can write to or read from.\n\nI prefer to use backup sets when\
    \ working with RMAN. The backup sets tend to be smaller than the data files and\
    \ can have true binary compression applied to them. Also, I don’t find it inconvenient\
    \ to use RMAN as the mechanism for creating backup files that only RMAN can restore.\
    \ Using RMAN with backup sets is efficient and very reliable.\n\nBacking Up Tablespaces\n\
    \nRMAN has the ability to back up at the database level (as shown in the prior\
    \ section), the tablespace level, or, even more granularly, at the data file level.\
    \ When you back up a tablespace, RMAN backs up any data files associated with\
    \ the tablespaces(s) that you specify. For instance, the following command will\
    \ back up all the data files associated with the SYSTEM and SYSAUX tablespaces:\n\
    \n```\nRMAN> backup tablespace system, sysaux;\n```\n\nOne scenario in which I\
    \ back up at the tablespace level is if I’ve recently created a new tablespace\
    \ and want to take a backup of just the data files associated with the newly added\
    \ tablespace. Note that when B&R issues, it’s often more efficient to work with\
    \ one tablespace (because it’s generally much faster to back up one tablespace\
    \ than the entire database).\n\nBacking Up Data Files\n\nYou may occasionally\
    \ need to back up individual data files. For example, when troubleshooting issues\
    \ with backups, it’s often helpful to attempt to successfully backup one data\
    \ file. You can specify data files by file name or by file number, as follows:\n\
    \n```\nRMAN> backup datafile '/u01/dbfile/o12c/system01.dbf';\n```\n\nIn this\
    \ example, file numbers are specified:\n\n```\nRMAN> backup datafile 1,4;\n```\n\
    \nHere are some other examples of backing up data files, using various features:\n\
    \n```\nRMAN> backup as copy datafile 4;\nRMAN> backup incremental level 1 datafile\
    \ 4;\n```\n\n![image](Images/sq.jpg) **Tip**   Use the RMAN REPORT SCHEMA command\
    \ to list tablespace, data file name, and data file number information.\n\nBacking\
    \ Up the Control File\n\nThe most reliable way to back up the control file is\
    \ to configure the autobackup feature:\n\n```\nRMAN> configure controlfile autobackup\
    \ on;\n```\n\nThis command ensures that the control file is automatically backed\
    \ up when a BACKUP or COPY command is issued. I usually enable the autobackup\
    \ of the control file feature and then never have to worry about explicitly issuing\
    \ a separate command to back up the control file. When in this mode the control\
    \ file is always created in its own backup set and backup piece after the data\
    \ file backup pieces have been created.\n\nIf you need to back up the control\
    \ file manually, you can do so like this:\n\n```\nRMAN> backup current controlfile;\n\
    ```\n\nThe location of the backup is either a default OS location, the FRA (if\
    \ using), or a manually configured location. As shown in [Chapter 17](#9781430257288_Ch17.xhtml),\
    \ I prefer to set the location of the control file backup piece to the same location\
    \ as that of the data file backups:\n\n```\nRMAN> configure controlfile autobackup\
    \ format for device type disk to\n'/u01/O12C/rman/rman_ctl_%F.bk';\n```\n\nBacking\
    \ up the spfile\n\nIf you have enabled the autobackup of the control file feature,\
    \ the spfile will be backed up automatically (along with the control file) anytime\
    \ a BACKUP or COPY command is issued. If you need to back up the spfile manually,\
    \ use the following command:\n\n```\nRMAN> backup spfile;\n```\n\nThe location\
    \ of the file that contains the backup of the spfile is dependent on what you\
    \ have configured for the autobackup of the control file (see the previous section\
    \ for an example). By default, if you don’t use an FRA, and you haven’t explicitly\
    \ configured a location via a channel, then for Linux/Unix servers, the backup\
    \ goes to the ORACLE_HOME/dbs directory.\n\n![image](Images/sq.jpg) **Note**  \
    \ RMAN can only back up the spfile if the instance was started using a spfile.\n\
    \nBacking Up Archive Redo Logs\n\nI don’t usually back up the archive redo logs\
    \ separately from the database backups. As mentioned earlier, I normally back\
    \ up the database files and the archive redo log files by using the following\
    \ command:\n\n```\nRMAN> backup incremental level=0 database plus archivelog;\n\
    ```\n\nHowever, you will occasionally find yourself in a situation in which you\
    \ need to take a special, one-off backup of the archive redo logs. You can issue\
    \ the following command to back up the archive redo logs files:\n\n```\nRMAN>\
    \ backup archivelog all;\n```\n\nIf you have a mount point that is nearly full,\
    \ and you determine that you want to back up the archive redo logs (so that they\
    \ exist in a backup file), but then you want to immediately delete the files (that\
    \ were just backed up) from disk, you can use the following syntax to back up\
    \ the archive redo logs and then have RMAN delete them from the storage media:\n\
    \n```\nRMAN> backup archivelog all delete input;\n```\n\nListed next are some\
    \ other ways in which you can back up the archive redo log files:\n\n```\nRMAN>\
    \ backup archivelog sequence 300;\nRMAN> backup archivelog sequence between 300\
    \ and 400 thread 1;\nRMAN> backup archivelog from time \"sysdate-7\" until time\
    \ \"sysdate-1\";\n```\n\nIf an archive redo log has been removed from disk manually\
    \ via an OS delete command, RMAN will throw the following error when attempting\
    \ to back up the nonexistent archive redo log file:\n\n```\nRMAN-06059: expected\
    \ archived log not found, loss of archived log compromises recoverability\n```\n\
    \nIn this situation, first run a CROSSCHECK command to let RMAN know which files\
    \ are physically available on disk:\n\n```\nRMAN> crosscheck archivelog all;\n\
    ```\n\nBacking Up FRA\n\nIf you use an FRA, one nice RMAN feature is that you\
    \ can back up all the files in that location with one command. If you’re using\
    \ a media manager and have a tape backup channel enabled, you can back up everything\
    \ in the FRA to tape, like this:\n\n```\nRMAN> backup device type sbt_tape recovery\
    \ area;\n```\n\nYou can also back up the FRA to a location on disk. Use the TO\
    \ DESTINATION command to accomplish this:\n\n```\nRMAN> backup recovery area to\
    \ destination '/u01/O12C/fra_back';\n```\n\nRMAN will automatically create directories\
    \ as required beneath the directory specified by the TO DESTINATION command.\n\
    \n![image](Images/sq.jpg) **Note**   The format of the subdirectory under the\
    \ directory <TO_DESTINATION> is db_uniuqe_name/backupset/YYYY_MM_DD.\n\nRMAN will\
    \ back up full backups, incremental backups, control file autobackups, and archive\
    \ redo log files. Keep in mind that flashback logs, online redo log files, and\
    \ the current control file are not backed up.\n\nExcluding Tablespaces from Backups\n\
    \nSuppose you have a tablespace that contains noncritical data, and you don’t\
    \ ever want to back it up. RMAN can be configured to exclude such tablespaces\
    \ from the backup. To determine if RMAN is currently configured to exclude any\
    \ tablespaces, run this command:\n\n```\nRMAN> show exclude;\nRMAN configuration\
    \ parameters for database with db_unique_name O12C are:\nRMAN configuration has\
    \ no stored or default parameters\n```\n\nUse the EXCLUDE command to instruct\
    \ RMAN as to which tablespaces not to back up:\n\n```\nRMAN> configure exclude\
    \ for tablespace users;\n```\n\nNow, for any database-level backups, RMAN will\
    \ exclude the data files associated with the USERS tablespace. You can instruct\
    \ RMAN to back up all data files and any excluded tablespaces with this command:\n\
    \n```\nRMAN> backup database noexclude;\n```\n\nYou can clear the exclude setting\
    \ via the following command:\n\n```\nRMAN> configure exclude for tablespace users\
    \ clear;\n```\n\nBacking Up Data Files Not Backed Up\n\nSuppose you have just\
    \ added several data files to your database, and you want to ensure that you have\
    \ a backup of them. You can issue the following command to instruct Oracle to\
    \ back up data files that have not yet been backed up:\n\n```\nRMAN> backup database\
    \ not backed up;\n```\n\nYou can also specify a time range for such files that\
    \ have not yet been backed up. Say you discover that your backups have not been\
    \ running for the last several days, and you want to back up everything that hasn’t\
    \ been backed up within the last 24 hours. The following command backs up all\
    \ data files that have not been backed up within the last day:\n\n```\nRMAN> backup\
    \ database not backed up since time='sysdate-1';\n```\n\nThe prior command is\
    \ also useful if, for any reason (a power failure in the data center, your backup\
    \ directory’s becoming full during backups, and so on), your backups aborted.\
    \ After you have resolved the issue that caused your backup job to fail, you can\
    \ issue the previous command, and RMAN will back up only the data files that have\
    \ not been backed up in the specified time period.\n\nSkipping Read-Only Tablespaces\n\
    \nBecause data in read-only tablespaces can’t change, you may only want to back\
    \ up read-only tablespaces once and then skip them in subsequent backups. Use\
    \ the SKIP READONLY command to achieve this:\n\n```\nRMAN> backup database skip\
    \ readonly;\n```\n\nKeep in mind that when you skip read-only tablespaces, you’ll\
    \ need to keep available a backup that contains these tablespaces. As long as\
    \ you only issue the RMAN command DELETE OBSOLETE, the RMAN backup set containing\
    \ the read-only tablespaces will be retained and not deleted, even if that RMAN\
    \ backup set contains other read-write tablespaces.\n\nSkipping Offline or Inaccessible\
    \ Files\n\nSuppose you have one data file that is missing or corrupt, and you\
    \ don’t have a backup of it, so you can’t restore and recover it. You can’t start\
    \ your database in this situation:\n\n```\nSQL> startup;\nORA-01157: cannot identify/lock\
    \ data file 6 - see DBWR trace file\nORA-01110: data file 6: '/u01/dbfile/o12c/reg_data01.dbf'\n\
    ```\n\nIn this scenario, you’ll have to take the data file offline before you\
    \ can start your database:\n\n```\nSQL> alter database datafile '/u01/dbfile/o12c/reg_data01.dbf'\
    \ offline for drop;\n```\n\nNow, you can open your database:\n\n```\nSQL> alter\
    \ database open;\n```\n\nSuppose you then attempt to run an RMAN backup:\n\n```\n\
    RMAN> backup database;\n```\n\nThe following error is thrown when RMAN encounters\
    \ a data file that it can’t back up:\n\n```\nRMAN-03002: failure of backup command\
    \ at ...\nRMAN-06056: could not access datafile 6\n```\n\nIn this situation, you’ll\
    \ have to instruct RMAN to exclude the offline data file from the backup. The\
    \ SKIP OFFLINE command instructs RMAN to ignore data files with an offline status:\n\
    \n```\nRMAN> backup database skip offline;\n```\n\nIf a file has gone completely\
    \ missing, use SKIP INACCESSIBLE to instruct RMAN to ignore files that are not\
    \ available on disk. This might happen if the data file was deleted using an OS\
    \ command. Here is an example of excluding inaccessible data files from the RMAN\
    \ backup:\n\n```\nRMAN> backup database skip inaccessible;\n```\n\nYou can skip\
    \ read-only, offline, and inaccessible data files with one command:\n\n```\nRMAN>\
    \ backup database skip readonly skip offline skip inaccessible;\n```\n\nWhen dealing\
    \ with offline and inaccessible files, you should figure out why the files are\
    \ offline or inaccessible and try to resolve any issues.\n\nBacking Up Large Files\
    \ in Parallel\n\nNormally, RMAN will only use one channel to back up a single\
    \ data file. When you enable parallelism, it allows RMAN to spawn multiple processes\
    \ to back up multiple files. However, even when parallelism is enabled, RMAN will\
    \ not use parallel channels simultaneously to back up one data file.\n\nStarting\
    \ with Oracle Database 11g, you can instruct RMAN to use multiple channels to\
    \ back up one data file in parallel. This is known as a multisection backup. This\
    \ feature can speed up the backups of very large data files. Use the SECTION SIZE\
    \ parameter to make a multisection backup. The following example configures two\
    \ parallel channels to back up one file:\n\n```\nRMAN> configure device type disk\
    \ parallelism 2;\nRMAN> configure channel 1 device type disk format '/u01/O12C/rman/r1%U.bk';\n\
    RMAN> configure channel 2 device type disk format '/u02/O12C/rman/r2%U.bk';\n\
    RMAN> backup section size 2500M datafile 10;\n```\n\nWhen this code runs, RMAN\
    \ will allocate two channels to back up the specified data file in parallel.\n\
    \n![image](Images/sq.jpg) **Note**   If you specify a section size greater than\
    \ the size of the data file, RMAN will not back up the file in parallel.\n\nAdding\
    \ RMAN Backup Information to the Repository\n\nSuppose you’ve had to re-create\
    \ your control file. The process of re-creating the control file wipes out any\
    \ information regarding RMAN backups. However, you want to make the newly created\
    \ control file aware of RMAN backups sitting on disk. In this situation, use the\
    \ CATALOG command to populate the control file with RMAN metadata. For example,\
    \ if all the RMAN backup files are kept in the /u01/O12C/rman directory, you can\
    \ make the control file aware of these backups files in the directory, as follows:\n\
    \n```\nRMAN> catalog start with '/u01/O12C/rman';\n```\n\nThis instructs RMAN\
    \ to look for any backup pieces, image copies, control file copies, and archive\
    \ redo logs in the specified directory, and, if found, to populate the control\
    \ file with the appropriate metadata. For this example two backup piece files\
    \ are found in the given directory:\n\n```\nsearching for all files that match\
    \ the pattern /u01/O12C/rman\n\nList of Files Unknown to the Database\n=====================================\n\
    File Name: /u01/O12C/rman/r1otlns90o_1_1.bk\nFile Name: /u01/O12C/rman/r1xyklnrveg_1_1.bk\n\
    \nDo you really want to catalog the above files (enter YES or NO)?\n```\n\nIf\
    \ you enter YES, then metadata regarding the backup files will be added to the\
    \ control file. In this way, the CATALOG command allows you to make the RMAN repository\
    \ (control file and recovery catalog) aware of files that RMAN can work with for\
    \ B&R.\n\nYou can also instruct RMAN to catalog any files in the FRA that the\
    \ control file isn’t currently aware of, like this:\n\n```\nRMAN> catalog recovery\
    \ area;\n```\n\nAdditionally, you can catalog specific files. This example instructs\
    \ RMAN to add metadata to the control file for a specific backup piece file:\n\
    \n```\nRMAN> catalog backuppiece '/u01/O12C/rman/r159nv562v_1_1.bk';\n```\n\n\
    Taking Backups of Pluggable Databases\n\nStarting with Oracle Database 12c, you\
    \ can create pluggable databases within a root container database (see [Chapter\
    \ 23](#9781430257288_Ch23.xhtml) for more details). If you’re using this option,\
    \ there are a few features to be aware of in regard to backups:\n\n*   While connected\
    \ to the root container, you can back up all the data files within the database\
    \ or just the root database data files; a specific pluggable database; or specific\
    \ tablespaces or data files, or a combination of these.\n*   While connected to\
    \ a pluggable database, you can only back up data files associated with that database.\n\
    \nThe bulleted items are detailed in the following two sections.\n\nWhile Connected\
    \ to the Root Container\n\nSuppose you’re connected to the root container as SYS\
    \ and want to back up all data files (including any data files with associated\
    \ pluggable databases). First, verify that you are indeed connected to the root\
    \ container as SYS:\n\n```\nRMAN> SELECT SYS_CONTEXT('USERENV', 'CON_ID')   AS\
    \ con_id,\n       SYS_CONTEXT('USERENV', 'CON_NAME')       AS cur_container,\n\
           SYS_CONTEXT('USERENV', 'CURRENT_SCHEMA') AS cur_user\n       FROM DUAL;\n\
    ```\n\nHere is some sample output:\n\n```\nCON_ID               CUR_CONTAINER        CUR_USER\n\
    -------------------- -------------------- --------------------\n1                    CDB$ROOT            \
    \ SYS\n```\n\nNow, to back up all data files, both in the root container and in\
    \ any associated pluggable databases, do so as follows:\n\n```\nRMAN> backup database;\n\
    ```\n\nIf you want to back up only the data files associated with the root container,\
    \ then specify ROOT:\n\n```\nRMAN> backup database root;\n```\n\nYou can also\
    \ back up a specific pluggable database:\n\n```\nRMAN> backup pluggable database\
    \ salespdb;\n```\n\nAdditionally, you can back up specific tablespaces within\
    \ a pluggable database:\n\n```\nRMAN> backup tablespace SALESPDB:SALES;\n```\n\
    \nAnd, you can specify the file name to back up any data file within the root\
    \ container or associated pluggable databases:\n\n```\nRMAN> backup datafile '/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf';\n\
    ```\n\nWhile Connected to a Pluggable Database\n\nFirst, start RMAN, and connect\
    \ to the pluggable database you want to back up. You must connect as a user with\
    \ SYSDBA or SYSBACKUP privileges. Also, there must be a listener running and a\
    \ password file in place. This example connects to the SALESPDB pluggable database:\n\
    \n```\n$ rman target sys/foo@salespdb\n```\n\nOnce connected to a pluggable database,\
    \ you can only back up data files specific to that database. Therefore, for this\
    \ example, the following command takes a backup of just data files associated\
    \ with the SALESPDB pluggable database:\n\n```\nRMAN> backup database;\n```\n\n\
    This example backs up the data files associated with the pluggable database SYSTEM\
    \ tablespace:\n\n```\nRMAN> backup tablespace system;\n```\n\nI should emphasize\
    \ again that when you are connected directly to a pluggable database, you can\
    \ only back up data files associated with that database. You can’t back up data\
    \ files associated with the root container or with any other pluggable databases\
    \ within the container. [Figure 18-1](#9781430257288_Ch18.xhtml#Fig1) illustrates\
    \ this concept. A connection as SYSDBA to the SALESPDB pluggable database can\
    \ only back up and view data files related to that database. The SYSDBA connection\
    \ can’t see outside its pluggable box in regard to data files and RMAN backups\
    \ of data files. In contrast, the SYSDBA connection to the root container can\
    \ back up all data files (root, seed, and all pluggable databases) as well as\
    \ access RMAN backups that were initiated from a connection to a pluggable database.\n\
    \n![9781430257288_Fig18-01.jpg](Images/9781430257288_Fig18-01.jpg)\n\n[Figure\
    \ 18-1](#9781430257288_Ch18.xhtml#_Fig1). Purview of a SYSDBA connection to root\
    \ container vs. a SYSDBA connection to a pluggable database\n\nCreating Incremental\
    \ Backups\n\nRMAN has three separate and distinct incremental backup features:\n\
    \n*   Incremental-level backups\n*   Incrementally updating backups\n*   Block\
    \ change tracking\n\nWith incremental-level backups, RMAN only backs up the blocks\
    \ that have been modified since a previous backup. Incremental backups can be\
    \ applied to the entire database, tablespaces, or data files. Incremental-level\
    \ backups are the most commonly used incremental feature with RMAN.\n\nIncrementally\
    \ updating backups is a separate feature from incremental-level backups. These\
    \ backups take image copies of the data files and then use incremental backups\
    \ to update the image copies. This gives you an efficient way to implement and\
    \ maintain image copies as part of your backup strategy. You only take the image\
    \ copy backup once, and then use incremental backups to keep the image copies\
    \ updated with the most recent transactions.\n\nBlock change tracking is another\
    \ feature designed to speed up the performance of incremental backups. The idea\
    \ here is that an OS file is used to record which blocks have changed since the\
    \ last backup. RMAN can use the block change tracking file to quickly identify\
    \ which blocks need to be backed up when performing incremental backups. This\
    \ feature can greatly improve the performance of incremental backups.\n\nTaking\
    \ Incremental-Level Backups\n\nRMAN implements incremental backups through levels.\
    \ Starting with Oracle Database 10g, there are only two documented levels of incremental\
    \ backups: level 0 and level 1\\. Prior versions of Oracle offer five levels,\
    \ 0–4\\. These levels (0–4) are still available but are not specified in the Oracle\
    \ documentation. You must first take a level 0 incremental backup to establish\
    \ a baseline, after which you can take a level 1 incremental backup.\n\n![image](Images/sq.jpg) **Note**  \
    \ A full backup backs up the same blocks as a level 0 backup. However, you can’t\
    \ use a full backup with ­incremental backups. Furthermore, you have to start\
    \ an incremental backup strategy with a level 0 backup. If you attempt to take\
    \ a level 1 backup, and no level 0 exists, RMAN will automatically take a level\
    \ 0 backup.\n\nHere is an example of taking an incremental level 0 backup:\n\n\
    ```\nRMAN> backup incremental level=0 database;\n```\n\nSuppose for the next several\
    \ backups you want to back up only the blocks that have changed since the last\
    \ incremental backup. This line of code takes a level 1 backup:\n\n```\nRMAN>\
    \ backup incremental level=1 database;\n```\n\nThere are two different types of\
    \ incremental backups: differential and cumulative. Which type you use depends\
    \ on your requirements. Differential backups (the default) are smaller but take\
    \ more time to recover from. Cumulative backups are larger than differential backups\
    \ but require less recovery time.\n\nA differential incremental level 1 backup\
    \ instructs RMAN to back up blocks that have changed since the last level 1 or\
    \ level 0 backup, whereas a cumulative incremental level 1 backup instructs RMAN\
    \ to back up blocks that have changed since the last level 0 backup. Cumulative\
    \ incremental backups, in effect, ignore any level 1 incremental backups.\n\n\
    ![image](Images/sq.jpg) **Note**   The RMAN incremental level 0 backups are used\
    \ to restore the data files, whereas the RMAN incremental level 1 backups are\
    \ used to recover the data files.\n\nWhen using incremental backups, I almost\
    \ always use the default, of differential. Usually, I don’t worry about the differences\
    \ between incremental and cumulative backups. If you require cumulative backups,\
    \ you must specify the key word CUMULATIVE. Here is an example of taking a cumulative\
    \ level 1 backup:\n\n```\nRMAN> backup incremental level=1 cumulative database;\n\
    ```\n\nHere are some examples of taking incremental backups at a more granular\
    \ level than the database:\n\n```\nRMAN> backup incremental level=0 tablespace\
    \ sysaux;\nRMAN> backup incremental level=1 tablespace sysaux plus archivelog;\n\
    RMAN> backup incremental from scn 4343352 datafile 3;\n```\n\nMaking Incrementally\
    \ Updating Backups\n\nThe basic idea behind an incrementally updating backup is\
    \ to create image copies of data files and then use incremental backups to update\
    \ the image copies. In this manner, you have image copies of your database that\
    \ are kept somewhat current. This can be an efficient way to combine image copy\
    \ backups with incremental backups.\n\nTo understand how this backup technique\
    \ works, you’ll need to inspect the commands that perform an incrementally updating\
    \ backup. The following lines of RMAN code are required to enable this feature:\n\
    \n```\nrun{recover copy of database with tag 'incupdate';\nbackup incremental\
    \ level 1 for recover of copy with tag 'incupdate' database;}\n```\n\nIn the first\
    \ line a tag is specified (this example uses incupdate). You can use whatever\
    \ you want for the tag name; the tag name lets RMAN associate the backup files\
    \ being used each time the commands are run. This code will perform as follows\
    \ the first time you run the script:\n\n*   RECOVER COPY generates a message saying\
    \ there’s nothing for it to do.\n*   If no image copies exist, the BACKUP INCREMENTAL\
    \ creates an image copy of the database data files.\n\nYou should see messages\
    \ such as this in the output when the RECOVER COPY and BACKUP INCREMENTAL commands\
    \ run the first time:\n\n```\nno copy of datafile 1 found to recover\n...\nno\
    \ parent backup or copy of datafile 1 found\n...\n```\n\nThe second time you run\
    \ the incrementally updating backup, it does as follows:\n\n*   RECOVER COPY again\
    \ generates a message saying it has nothing to do.\n*   BACKUP INCREMENTAL makes\
    \ an incremental level 1 backup and assigns it the tag name specified; this backup\
    \ will subsequently be used by the RECOVER COPY command.\n\nThe third time you\
    \ run the incrementally updating backup, it does this:\n\n*   Now that an incremental\
    \ backup has been created, the RECOVER COPY applies the incremental backup to\
    \ the image copies.\n*   BACKUP INCREMENTAL makes an incremental level 1 backup\
    \ and assigns it the tag name specified; this backup will subsequently be used\
    \ by the RECOVER COPY command.\n\nGoing forward, each time you run the two lines\
    \ of code, you will have a regularly repeating backup pattern. If you use image\
    \ copies for backups, you might consider using an incrementally updating backup\
    \ strategy, because with it, you avoid creating entire image copies whenever the\
    \ backup runs. The image copies are updated each time the backup runs with the\
    \ incremental changes from the previous backup.\n\nUsing Block Change Tracking\n\
    \nBlock change tracking is the process in which a binary file is used to record\
    \ changes to database data file blocks. The idea is that incremental backup performance\
    \ can be improved because RMAN can use the block change tracking file to pinpoint\
    \ which blocks have changed since the last backup. This saves a great deal of\
    \ time because otherwise RMAN would have to scan all the blocks that had been\
    \ backed up to determine if they’d changed since the last backup.\n\nListed next\
    \ are the steps for enabling block change tracking:\n\n1.  If not already enabled,\
    \ set the DB_CREATE_FILE_DEST parameter to a location (that already exists on\
    \ disk); for example,\n\n    ```\n    SQL> alter system set db_create_file_dest='/u01/O12C/bct'\
    \ scope=both;\n    ```\n\n2.  Enable block change tracking via the ALTER DATABASE\
    \ command:\n\n    ```\n    SQL> alter database enable block change tracking;\n\
    \    ```\n\nThis example creates a file with an OMF name in the directory specified\
    \ by DB_CREATE_FILE_DEST. In this example the file created is given this name:\n\
    \n```\n/u01/O12C/bct/O12C/changetracking/o1_mf_8h0wmng1_.chg\n```\n\nYou can also\
    \ enable block change tracking by directly specifying a file name, which does\
    \ not require that DB_CREATE_FILE_DEST be set; for example,\n\n```\nSQL> alter\
    \ database enable block change tracking using file '/u01/O12C/bct/btc.bt';\n```\n\
    \nYou can verify the details of block change tracking by running the following\
    \ query:\n\n```\nSQL> select * from v$block_change_tracking;\n```\n\nFor space-planning\
    \ purposes, the size of the block change tracking file is approximately 1/30,000\
    \ the size of the total size of the blocks being tracked in the database. Therefore,\
    \ the size of the block change tracking file is proportional to the size of the\
    \ database and not to the amount of redo generated.\n\nTo disable block change\
    \ tracking, run this command:\n\n```\nSQL> alter database disable block change\
    \ tracking;\n```\n\n![image](Images/sq.jpg) **Note**   When you disable block\
    \ change tracking, Oracle will automatically delete the block change tracking\
    \ file.\n\nChecking for Corruption in Data Files and Backups\n\nYou can use RMAN\
    \ to check for corruption in data files, archive redo logs, and control files.\
    \ You can also verify whether a backup set is restorable. The RMAN VALIDATE command\
    \ is used to perform these types of integrity checks. There are three ways you\
    \ can run the VALIDATE command:\n\n*   VALIDATE\n*   BACKUP...VALIDATE\n*   RESTORE...VALIDATE\n\
    \n![image](Images/sq.jpg) **Note**   The stand-alone VALIDATE command is available\
    \ in Oracle Database 11g and higher. The BACKUP...VALIDATE and RESTORE...VALIDATE\
    \ commands are available in Oracle Database 10g and higher.\n\nUsing VALIDATE\n\
    \nThe VALIDATE command can be used stand-alone to check for missing files or physical\
    \ corruption in database data files, archive redo log files, control files, spfiles,\
    \ and backup set pieces. For example, this command will validate all data files\
    \ and the control files:\n\n```\nRMAN> validate database;\n```\n\nYou can also\
    \ validate just the control file, as follows:\n\n```\nRMAN> validate current controlfile;\n\
    ```\n\nYou can validate the archive redo log files, like so:\n\n```\nRMAN> validate\
    \ archivelog all;\n```\n\nYou may want to combine all the prior integrity checks\
    \ into one command, as shown:\n\n```\nRMAN> validate database include current\
    \ controlfile plus archivelog;\n```\n\nUnder normal conditions the VALIDATE command\
    \ only checks for physical corruption. You can specify that you also want to check\
    \ for logical corruption by using the CHECK LOGICAL clause:\n\n```\nRMAN> validate\
    \ check logical database include current controlfile plus archivelog;\n```\n\n\
    VALIDATE has a variety of uses. Here are a few more examples:\n\n```\nRMAN> validate\
    \ database skip offline;\nRMAN> validate copy of database;\nRMAN> validate tablespace\
    \ system;\nRMAN> validate datafile 3 block 20 to 30;\nRMAN> validate spfile;\n\
    RMAN> validate backupset <primary_key_value>;\nRMAN> validate recovery area;\n\
    ```\n\nIf you’re using the Oracle Database 12c pluggable database feature, you\
    \ can validate specific databases within the container. While connected as SYS\
    \ to the root container, validate any associated pluggable databases:\n\n```\n\
    RMAN> validate pluggable database salespdb;\n```\n\nIf RMAN detects any corrupt\
    \ blocks, the V$DATABASE_BLOCK_CORRUPTION is populated. This view contains information\
    \ on the file number, block number, and number of blocks affected. You can use\
    \ this information to perform a block-level recovery (see [Chapter 19](#9781430257288_Ch19.xhtml)\
    \ for more details).\n\n![image](Images/sq.jpg) **Note**   Physical corruption\
    \ is a change to a block, such that its contents don’t match the physical format\
    \ that Oracle expects. By default, RMAN checks for physical corruption when backing\
    \ up, restoring, and validating data files. With logical corruption, a block is\
    \ in the correct format, but the contents aren’t consistent with what Oracle expects,\
    \ such as in a row piece or an index entry.\n\nUsing BACKUP…VALIDATE\n\nThe BACKUP...VALIDATE\
    \ command is very similar to the VALIDATE command, in that it can check to see\
    \ if data files are available and if the data files contain any corrupt blocks;\
    \ for example,\n\n```\nRMAN> backup validate database;\n```\n\nThis command doesn’t\
    \ actually create any backup files; it only reads the data files and checks for\
    \ corruption. Like the VALIDATE command, BACKUP VALIDATE, by default, only checks\
    \ for physical corruption. You can instruct it to check as well for logical corruption,\
    \ as shown:\n\n```\nRMAN> backup validate check logical database;\n```\n\nHere\
    \ are some variations of the BACKUP...VALIDATE command:\n\n```\nRMAN> backup validate\
    \ database current controlfile;\nRMAN> backup validate check logical database\
    \ current controlfile plus archivelog;\n```\n\nAlso like the VALIDATE command,\
    \ BACKUP...VALIDATE will populate V$DATABASE_BLOCK_CORRUPTION if it detects any\
    \ corrupt blocks. The information in this view can be used to determine which\
    \ blocks can potentially be restored by block-level recovery (see [Chapter 19](#9781430257288_Ch19.xhtml)\
    \ for more details.\n\nUsing RESTORE…VALIDATE\n\nThe RESTORE...VALIDATE command\
    \ is used to verify backup files that would be used in a restore operation. This\
    \ command validates backup sets, data file copies, and archive redo log files:\n\
    \n```\nRMAN> restore validate database;\n```\n\nNo actual files are restored when\
    \ using RESTORE...VALIDATE. This means that you can run the command while the\
    \ database is online and available.\n\nUsing a Recovery Catalog\n\nWhen you use\
    \ a recovery catalog, it’s possible to create the recovery catalog user in the\
    \ same database, on the same server, as your target database. However, that approach\
    \ isn’t recommended because you don’t want the availability of your target database\
    \ or of the server on which the target database resides to affect the recovery\
    \ catalog. Therefore, you should create the recovery catalog database on a server\
    \ different from that of your target database.\n\nCreating a Recovery Catalog\n\
    \nWhen I use a recovery catalog, I prefer to have a dedicated database that is\
    \ used only for the recovery catalog. This ensures that the recovery catalog isn’t\
    \ affected by any maintenance or downtime required by another application (and\
    \ vice versa).\n\nListed next are the steps for creating a recovery catalog:\n\
    \n1.  Create a database on a server different from that of your target database,\
    \ to be used for the recovery catalog. Make sure the database is adequately sized.\
    \ I’ve found that Oracle’s recommended sizes are usually much too small. Here\
    \ are some adequate recommendations:\n    *   SYSTEM tablespace: 500MB\n    *\
    \   SYSAUX tablespace: 500MB\n    *   TEMP tablespace: 500MB\n    *   UNDO tablespace:\
    \ 500MB\n    *   Online redo logs: 25MB each; three groups, multiplexed with two\
    \ members per group\n    *   RECCAT tablespace: 500MB\n2.  Create a tablespace\
    \ to be used by the recovery catalog user. I recommend giving the tablespace a\
    \ name such as RECCAT so that it’s readily identifiable as the tablespace that\
    \ contains the recovery catalog metadata:\n\n    ```\n    CREATE TABLESPACE reccat\n\
    \      DATAFILE '/u01/dbfile/O12C/reccat01.dbf' SIZE 500M\n      EXTENT MANAGEMENT\
    \ LOCAL UNIFORM SIZE 128k\n      SEGMENT SPACE MANAGEMENT AUTO;\n    ```\n\n3.\
    \  Create a user that will own the tables and other objects used to store the\
    \ target database metadata. I recommend giving the recovery catalog user a name\
    \ such as RCAT so that it’s readily identifiable as the user that owns the recovery\
    \ catalog objects. Also, grant the RECOVERY_CATALOG_OWNER role to the RCAT user\
    \ as well as CREATE SESSION:\n\n    ```\n    CREATE USER rcat IDENTIFIED BY foo\n\
    \    TEMPORARY TABLESPACE temp\n    DEFAULT TABLESPACE reccat\n    QUOTA UNLIMITED\
    \ ON reccat;\n    --\n    GRANT RECOVERY_CATALOG_OWNER TO rcat;\n    GRANT CREATE\
    \ SESSION TO rcat;\n    ```\n\n4.  Connect through RMAN as RCAT, and create the\
    \ recovery catalog objects:\n\n    ```\n    $ rman catalog rcat/foo\n    ```\n\
    \n5.  Now, run the CREATE CATALOG command:\n\n    ```\n    RMAN> create catalog;\n\
    \    RMAN> exit;\n    ```\n\n6.  This command may take a few minutes to run. When\
    \ it’s finished, you can verify that the tables were created with the following\
    \ query:\n\n    ```\n    $ sqlplus rcat/foo\n    SQL> select table_name from user_tables;\n\
    \    ```\n\n7.  Here is a small sample of the output:\n\n    ```\n    TABLE_NAME\n\
    \    ------------------------------\n    DB\n    NODE\n    CONF\n    DBINC\n \
    \   ```\n\nRegistering a Target Database\n\nNow, you can register a target database\
    \ with the recovery catalog. Log in to the target database server. Ensure that\
    \ you can establish Oracle Net connectivity to the recovery catalog database.\
    \ For instance, one approach is to populate the TNS_ADMIN/tnsnames.ora file with\
    \ an entry that points to the remote database. On the target database server,\
    \ register the recovery catalog, as follows:\n\n```\n$ rman target / catalog rcat/foo@rcat\n\
    ```\n\nWhen you connect, you should see verification that you’re connecting to\
    \ both the target and the recovery catalog:\n\n```\nconnected to target database:\
    \ O12C (DBID=3423216220)\nconnected to recovery catalog database\n```\n\nNext,\
    \ run the REGISTER DATABASE command:\n\n```\nRMAN> register database;\n```\n\n\
    Now, you can run backup operations and have the metadata about the backup tasks\
    \ written to both the control file and the recovery catalog. Make sure you connect\
    \ to the recovery catalog, along with the target database, each time you run RMAN\
    \ commands:\n\n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> backup database;\n\
    ```\n\nBacking Up the Recovery Catalog\n\nMake certain you include a strategy\
    \ for backing up and recovering the recovery catalog database. For the most protection,\
    \ be sure the recovery catalog database is in archivelog mode, and use RMAN to\
    \ back up the database.\n\nYou can also use a tool such as Data Pump to take a\
    \ snapshot of the database. The downside to using Data Pump is that you can potentially\
    \ lose some information in the recovery catalog that was created after the Data\
    \ Pump export.\n\nKeep in mind that if you experience a complete failure on your\
    \ recovery catalog database server, you can still use RMAN to back up your target\
    \ databases; you just can’t connect to the recovery catalog. Therefore, any scripts\
    \ that instruct RMAN to connect to the target and the recovery catalog must be\
    \ modified.\n\nAlso, if you completely lose a recovery catalog and don’t have\
    \ a backup, one option is to re-create it from scratch. As soon as you re-create\
    \ it, you reregister the target databases with the recovery catalog. You lose\
    \ any long-term historical recovery catalog metadata.\n\nSynchronizing the Recovery\
    \ Catalog\n\nYou may have an issue with the network that renders the recovery\
    \ catalog inaccessible. In the meantime, you connect to your target database and\
    \ perform backup operations. Sometime later, the network issues are resolved,\
    \ and you can again connect to the recovery catalog.\n\nIn this situation, you\
    \ need to resynchronize the recovery catalog with the target database so that\
    \ the recovery catalog is aware of any backup operations that aren’t stored in\
    \ it. Run the following command to ensure that the recovery catalog has the most\
    \ recent backup information:\n\n```\n$ rman target / catalog rcat/foo@rcat\nRMAN>\
    \ resync catalog;\n```\n\nKeep in mind that you have to resynchronize the catalog\
    \ only if, for some reason, you’re performing backup operations without connecting\
    \ to the catalog. Under normal conditions, you don’t have to run the RESYNC command.\n\
    \nRecovery Catalog Versions\n\nI recommend that you create a recovery catalog\
    \ for each version of the target databases that you’re backing up. Doing so will\
    \ save you some headaches with compatibility issues and upgrades. I’ve found it\
    \ easier to use a recovery catalog when the database version of the rman client\
    \ is the same version used when creating the catalog.\n\nYes, having multiple\
    \ versions of the recovery catalog can cause some confusion. However, if you’re\
    \ in an environment in which you have several different versions of the Oracle\
    \ database, then multiple recovery catalogs may be more convenient.\n\nDropping\
    \ a Recovery Catalog\n\nIf you determine that you’re not using a recovery catalog\
    \ and that you no longer need the data, you can drop it. To do so, connect to\
    \ the recovery catalog database as the catalog owner, and issue the DROP CATALOG\
    \ command:\n\n```\n$ rman catalog rcat/foo\nRMAN> drop catalog;\n```\n\nYou’re\
    \ prompted as follows:\n\n```\nrecovery catalog owner is RCAT\nenter DROP CATALOG\
    \ command again to confirm catalog removal\n```\n\nIf you enter the DROP CATALOG\
    \ command again, all the objects in the recovery catalog are removed from the\
    \ recovery catalog database.\n\nThe other way to drop a catalog is to drop the\
    \ owner. To do so, connect to the recovery catalog as a user with DBA privileges,\
    \ and issue the DROP USER statement:\n\n```\n$ sqlplus system/manager\nSQL> drop\
    \ user rcat cascade;\n```\n\nSQL*Plus doesn’t prompt you twice; it does as you\
    \ instructed and drops the user and its objects. Again, the only reason to do\
    \ this is when you’re certain you don’t need the recovery catalog or its data\
    \ any longer. Use caution when dropping a user or the recovery catalog: I recommend\
    \ that you take a Data Pump export of the recovery catalog owner before dropping\
    \ it.\n\nLogging RMAN Output\n\nWhen troubleshooting RMAN output or checking the\
    \ status of a backup job, it’s essential to have a record of what RMAN ran and\
    \ the status of each command. There are several methods for logging RMAN output.\
    \ Some are built-in aspects of the Linux/Unix OS. Others are RMAN-specific features:\n\
    \n*   Linux/Unix redirect output to file\n*   Linux/Unix logging commands\n* \
    \  RMAN SPOOL LOG command\n*   V$RMAN_OUTPUT view\n\nThese logging features are\
    \ discussed in the next sections.\n\nRedirecting Output to a File\n\nI run almost\
    \ all RMAN backup jobs from shell scripts. The shell scripts are usually run automatically\
    \ from a scheduling tool such as cron. When running RMAN commands in this fashion,\
    \ I always capture the output by instructing the shell command to redirect standard\
    \ output messaging and standard error messaging to a log file. This is done with\
    \ the redirection (>) character. This example runs a shell script (rmanback.bsh)\
    \ and redirects both standard output and standard error output to a log file named\
    \ rmanback.log:\n\n```\n$ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1\n\
    ```\n\nHere, 1> instructs standard output to be redirected to the specified file.\
    \ The 2>&1 instructs the shell script to send standard error output to the same\
    \ location as standard output.\n\n![image](Images/sq.jpg) **Tip**   For further\
    \ details on how DBAs use shell scripts and Linux features, see *Linux Recipes\
    \ for Oracle DBAs* by Darl Kuhn (Apress, 2008).\n\nCapturing Output with Linux/Unix\
    \ Logging Commands\n\nYou can instruct Linux/Unix to create a log file to capture\
    \ any output that is also being displayed on your screen. This can be done in\
    \ one of two ways:\n\n*   tee\n*   script\n\nCapturing Output with tee\n\nWhen\
    \ you start RMAN, you can send the output you see on your screen to an OS text\
    \ file, using the tee command:\n\n```\n$ rman | tee /tmp/rman.log\n```\n\nNow,\
    \ you can connect to the target database and run commands. All the output seen\
    \ on your screen will be logged to the /tmp/rman.log file:\n\n```\nRMAN> connect\
    \ target /\nRMAN> backup database;\nRMAN> exit;\n```\n\nThe tee party session\
    \ stops writing to the log file when you exit RMAN.\n\nCapturing Output with script\n\
    \nThe script command is useful because it instructs the OS to log any output that\
    \ appears at the terminal to a log file. To capture all output, run the script\
    \ command before connecting to RMAN:\n\n```\n$ script /tmp/rman.log\nScript started,\
    \ file is /tmp/rman.log\n$ rman target /\nRMAN> backup database;\nRMAN> exit;\n\
    ```\n\nTo end a script session, press Ctrl+D, or type exit. The /tmp/rman.log\
    \ file will contain all output that was displayed on your screen. The script command\
    \ is useful when you need to capture all the output from a particular time range.\
    \ For example, you may be running RMAN commands, exiting from RMAN, running SQL*Plus\
    \ commands, and so on. The script session lasts from the point at which you start\
    \ script to the point at which you press Ctrl+D.\n\nLogging Output to a File\n\
    \nAn easy way to capture RMAN output is to use the SPOOL LOG command to send the\
    \ output to a file. This example spools a log file from within RMAN:\n\n```\n\
    RMAN> spool log to '/tmp/rmanout.log'\nRMAN> set echo on;\nRMAN> <run RMAN commands>\n\
    RMAN> spool log off;\n```\n\nBy default the SPOOL LOG command will overwrite an\
    \ existing file. If you want to append to the log file, use the keyword APPEND:\n\
    \n```\nRMAN> spool log to '/tmp/rmanout.log' append\n```\n\nYou can also direct\
    \ output to a log file when starting RMAN on the command line, which will overwrite\
    \ an existing file:\n\n```\n$ rman target / log /tmp/rmanout.log\n```\n\nYou can\
    \ also append to the log file, as follows:\n\n```\n$ rman target / log /tmp/rmanout.log\
    \ append\n```\n\nWhen you use SPOOL LOG as shown in the previous examples, the\
    \ output goes to a file and not to your terminal. Therefore, I hardly ever use\
    \ SPOOL LOG when running RMAN interactively. The command is mainly a tool for\
    \ capturing output when running RMAN from scripts.\n\nQuerying for Output in the\
    \ Data Dictionary\n\nIf you don’t capture any RMAN output, you can still view\
    \ the most recent RMAN output by querying the data dictionary. The V$RMAN_OUTPUT\
    \ view contains messages recently reported by RMAN:\n\n```\nselect sid, recid,\
    \ output\nfrom v$rman_output\norder by recid;\n```\n\nThe V$RMAN_OUTPUT view is\
    \ an in-memory object that holds up to 32,768 rows. Information in this view is\
    \ cleared out when you stop and restart your database. The view is handy when\
    \ you’re using the RMAN SPOOL LOG command to spool output to a file and cannot\
    \ view what is happening at your terminal.\n\nRMAN Reporting\n\nThere are several\
    \ different methods for reporting on the RMAN environment:\n\n*   LIST command\n\
    *   REPORT command\n*   Query metadata via data dictionary views\n\nWhen first\
    \ learning RMAN, the difference between the LIST and REPORT commands may seem\
    \ confusing because the distinction between the two is not clear-cut. In general,\
    \ I use the LIST command to view information about existing backups and the REPORT\
    \ command to determine which files need to be backed or to display information\
    \ on obsolete or expired backups.\n\nI use SQL queries for specialized reports\
    \ (not available via LIST or REPORT) or for automating reports. For example, I’ll\
    \ generally implement an automated check via a shell script and SQL that reports\
    \ whether the RMAN backups have run within the last day.\n\nUsing LIST\n\nWhen\
    \ investigating issues with RMAN backups, usually one of the first tasks I undertake\
    \ is connecting to the target database and running the LIST BACKUP command. This\
    \ command allows you to view backup sets, backup pieces, and the files included\
    \ in the backup:\n\n```\nRMAN> list backup;\n```\n\nThe command shows all RMAN\
    \ backups recorded in the repository. You may want to spool the backups to an\
    \ output file so that you can save the output and then use an OS editor to search\
    \ through and look for specific strings in the output.\n\nTo get a summarized\
    \ view of backup information, use the LIST BACKUP SUMARY command:\n\n```\nRMAN>\
    \ list backup summary;\n```\n\nYou can also use the LIST command to report just\
    \ image copy information:\n\n```\nRMAN> list copy;\n```\n\nTo list all files that\
    \ have been backed up, and the associated backup set, issue the following command:\n\
    \n```\nRMAN> list backup by file;\n```\n\nThese commands display archive redo\
    \ logs on disk:\n\n```\nRMAN> list archivelog all;\nRMAN> list copy of archivelog\
    \ all;\n```\n\nAnd, this command lists the backups of the archive redo logs (and\
    \ which archive redo logs are contained in which backup pieces):\n\n```\nRMAN>\
    \ list backup of archivelog all;\n```\n\nThere are a great many ways in which\
    \ you can run the LIST command (and, likewise, the REPORT command, covered in\
    \ the next section). The prior methods are the ones you’ll run most of the time.\
    \ See the *Oracle Database Backup and Recovery Reference Guide*, available from\
    \ the Technology Network area of the Oracle web site ([http://otn.oracle.com](http://otn.oracle.com)),\
    \ for a complete list of options.\n\nUsing REPORT\n\nThe RMAN REPORT command is\
    \ useful for reporting on a variety of details. You can quickly view all the data\
    \ files associated with a database, as follows:\n\n```\nRMAN> report schema;\n\
    ```\n\nThe REPORT command provides detailed information about backups marked obsolete\
    \ via the RMAN retention policy; for example,\n\n```\nRMAN> report obsolete;\n\
    ```\n\nYou can report on data files that need to be backed up, as defined by the\
    \ retention policy, like this:\n\n```\nRMAN> report need backup;\n```\n\nThere\
    \ are several ways to report on data files that need to be backed up. Here are\
    \ some other examples:\n\n```\nRMAN> report need backup redundancy 2;\nRMAN> report\
    \ need backup redundancy 2 datafile 2;\n```\n\nThe REPORT command may also be\
    \ used for data files that have never been backed up or that may contain data\
    \ created from a NOLOGGING operation. For example, say you have direct-path loaded\
    \ data into a table, and the data file in which the table resides has not been\
    \ backed up. The following command will detect these conditions:\n\n```\nRMAN>\
    \ report unrecoverable;\n```\n\nUsing SQL\n\nThere are a number of data dictionary\
    \ views available for querying about backup information. [Table 18-1](#9781430257288_Ch18.xhtml#Tab1)\
    \ describes RMAN-related data dictionary views. These views are available regardless\
    \ of your use of a recovery catalog (the information in these views is derived\
    \ from the control file).\n\n[Table 18-1.](#9781430257288_Ch18.xhtml#_Tab1) Description\
    \ of RMAN Backup Data Dictionary Views\n\n| View Name | Information Provided |\n\
    | --- | --- |\n| V$RMAN_BACKUP_JOB_DETAILS | RMAN backup jobs |\n| V$BACKUP |\
    \ Backup status of online data files placed in backup mode (for hot backups) |\n\
    | V$BACKUP_ARCHIVELOG_DETAILS | Archive logs backed up |\n| V$BACKUP_CONTROLFILE_DETAILS\
    \ | Control files backed up |\n| V$BACKUP_COPY_DETAILS | Control file and data\
    \ file copies |\n| V$BACKUP_DATAFILE | Control files and data files backed up\
    \ |\n| V$BACKUP_DATAFILE_DETAILS | Data files backed up in backup sets, image\
    \ copies, and proxy copies |\n| V$BACKUP_FILES | Data files, control files, spfiles,\
    \ and archive redo logs backed up |\n| V$BACKUP_PIECE | Backup piece files |\n\
    | V$BACKUP_PIECE_DETAILS | Backup piece details |\n| V$BACKUP_SET | Backup sets\
    \ |\n| V$BACKUP_SET_DETAILS | Backup set details |\n\nSometimes, DBAs new to RMAN\
    \ have a hard time grasping the concept of backups, backup sets, backup pieces,\
    \ and data files and how they relate. I find the following query useful when discussing\
    \ RMAN backup components. This query will display backup sets, the backup pieces\
    \ with the set, and the data files that are backed up within the backup pieces:\n\
    \n```\nSET LINES 132 PAGESIZE 100\nBREAK ON REPORT ON bs_key ON completion_time\
    \ ON bp_name ON file_name\nCOL bs_key    FORM 99999 HEAD \"BS Key\"\nCOL bp_name  \
    \ FORM a40   HEAD \"BP Name\"\nCOL file_name FORM a40   HEAD \"Datafile\"\n--\n\
    SELECT\n s.recid                  bs_key\n,TRUNC(s.completion_time) completion_time\n\
    ,p.handle                 bp_name\n,f.name                   file_name\nFROM v$backup_set      s\n\
        ,v$backup_piece    p\n    ,v$backup_datafile d\n    ,v$datafile        f\n\
    WHERE p.set_stamp = s.set_stamp\nAND   p.set_count = s.set_count\nAND   d.set_stamp\
    \ = s.set_stamp\nAND   d.set_count = s.set_count\nAND   d.file#     = f.file#\n\
    ORDER BY\n s.recid\n,p.handle\n,f.name;\n```\n\nThe output here has been shortened\
    \ to fit on the page:\n\n```\nBS Key COMPLETIO BP Name                          Datafile\n\
    ------ --------- -------------------------------- ---------------------------------\n\
       159 11-JAN-13 /u01/O12C/rman/r16qnv59jj_1_1.bk /u01/dbfile/o12c/inv_data2.dbf\n\
                                                      /u01/dbfile/o12c/lob_data01.dbf\n\
                                                      /u01/dbfile/o12c/p14_tbsp.dbf\n\
                                                      /u01/dbfile/o12c/p15_tbsp.dbf\n\
                                                      /u01/dbfile/o12c/p16_tbsp.dbf\n\
    ```\n\nSometimes, it’s useful to report on the performance of RMAN backups. The\
    \ following query reports on the time taken for an RMAN backup per session.\n\n\
    ```\nCOL hours              FORM 9999.99\nCOL time_taken_display FORM a20\nSET\
    \ LINESIZE 132\n--\nSELECT\n session_recid\n,compression_ratio\n,time_taken_display\n\
    ,(end_time - start_time) * 24 as hours\n,TO_CHAR(end_time,'dd-mon-yy hh24:mi')\
    \ as end_time\nFROM v$rman_backup_job_details\nORDER BY end_time;\n```\n\nHere\
    \ is some sample output:\n\n```\nSESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS\
    \ END_TIME\n------------- ----------------- -------------------- -------- ------------------------\n\
               15                 1 00:05:08                  .09 11-jan-13 13:41\n\
               27        3.79407176 00:00:09                  .00 11-jan-13 13:52\n\
               33        1.19992137 00:05:01                  .08 11-jan-13 14:07\n\
    ```\n\nThe contents of V$RMAN_BACKUP_JOB_DETAILS are summarized by a session connection\
    \ to RMAN. Therefore, the report output is more accurate if you connect to RMAN\
    \ (establishing a session) and then exit out of RMAN after the backup job is complete.\
    \ If you remain connected to RMAN while running multiple backup jobs, the query\
    \ output reports on all backup activity while connected (for that session).\n\n\
    You should have an automated method of detecting whether or not RMAN backups are\
    \ running and if data files are being backed up. One reliable method of automating\
    \ such a task is to embed SQL into a shell script and then run the script on a\
    \ periodic basis from a scheduling utility such as cron.\n\nI typically run two\
    \ basic types of checks regarding the RMAN backups:\n\n*   Have the RMAN backups\
    \ run recently?\n*   Are there any data files that have not been backed up recently?\n\
    \nThe following shell script checks for these conditions. You’ll need to modify\
    \ the script and provide it with a username and password for a user that can query\
    \ the data dictionary objects referenced in the script and also change the e-mail\
    \ address of where messages are sent. When running the script, you’ll need to\
    \ pass in two variables: the Oracle SID and the threshold number of past days\
    \ that you want to check for the last time the backups ran or for when a data\
    \ file was backed up.\n\n```\n#!/bin/bash\n#\nif [ $# -ne 2 ]; then\n  echo \"\
    Usage: $0 SID threshold\"\n  exit 1\nfi\n# source oracle OS variables\n. /var/opt/oracle/oraset\
    \ $1\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT\
    \ COUNT(*) FROM\n(SELECT (sysdate - MAX(end_time)) delta\n FROM v\\$rman_backup_job_details)\
    \ a\nWHERE a.delta > $2;\nEOF)\n#\nif [ $crit_var -ne 0 ]; then\n  echo \"rman\
    \ backups not running on $1\" | mailx -s \"rman problem\" dkuhn@gmail.com\nelse\n\
      echo \"rman backups ran ok\"\nfi\n#--------------------------------------------\n\
    crit_var2=$(sqlplus -s <<EOF\n/ as sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*)\n\
    FROM\n(\nSELECT name\nFROM v\\$datafile\nMINUS\nSELECT DISTINCT\n f.name\nFROM\
    \ v\\$backup_datafile d\n    ,v\\$datafile        f\nWHERE d.file#     = f.file#\n\
    AND   d.completion_time > sysdate - $2);\nEOF)\n#\nif [ $crit_var2 -ne 0 ]; then\n\
      echo \"datafile not backed up on $1\" | mailx -s \"backup problem\" dkuhn@gmail.com\n\
    else\n  echo \"datafiles are backed up...\"\nfi\n#\nexit 0\n```\n\nFor example,\
    \ to check if backups have been running successfully within the past 2 days, run\
    \ the script (named rman_chk.bsh):\n\n```\n$ rman_chk.bsh INVPRD 2\n```\n\nThe\
    \ prior script is basic but effective. You can enhance it as required for your\
    \ RMAN environment.\n\nSummary\n\nRMAN offers many flexible and feature-rich options\
    \ for backups. By default, RMAN backs up only blocks that have been modified in\
    \ the database. The incremental features allow you to back up only blocks that\
    \ have been modified since the last backup. These incremental features are particularly\
    \ useful in reducing the size of backups in large database environments,  in which\
    \ only a small percentage of data in the database changes from one backup to the\
    \ next.\n\nYou can instruct RMAN to back up every block in each data file via\
    \ an image copy. An image copy is a block-for-block identical copy of the data\
    \ file. Image copies have the advantage of being able to restore the backup files\
    \ directly from the backup (without using RMAN). You can use the incrementally\
    \ updated backup feature to implement an efficient hybrid of image copy backups\
    \ and incremental backups.\n\nRMAN contains built-in commands for reporting on\
    \ many aspects of backups. The LIST command reports on backup activity. The REPORT\
    \ command is useful for determining which files need to be backed up, as dictated\
    \ by the retention policy.\n\nAfter you’ve successfully configured RMAN and created\
    \ backups, you are in a position to be able to restore and recover your database\
    \ in the event of a media failure. Restore and recovery topics are detailed in\
    \ the next chapter.\n\nCHAPTER 20\n\n![image](Images/frontdot.jpg)\n\nOracle Secure\
    \ Backup\n\nProtecting and securing data is a core responsibility of a DBA. DBAs\
    \ must be proficient in B&R skills. As shown in [Chapters 17](#9781430257288_Ch17.xhtml)\
    \ through [19](#9781430257288_Ch19.xhtml), you can use RMAN to manage and automate\
    \ the backup of Oracle databases. RMAN is easily configured to back up and restore\
    \ database files to and from disk.\n\nMost production database environments will\
    \ have an additional requirement of storing database backups on tape. If your\
    \ database server experiences a complete failure, you can use tape backups to\
    \ restore and recover. Furthermore, tape backups are easily transported outside\
    \ the data center to provide additional protection in the event that an entire\
    \ data center experiences a complete failure (such as a tornado or flood), the\
    \ idea being that the tapes are safely stored off-site and can be brought back\
    \ when disaster strikes.\n\nTo this end, Oracle offers a centralized tape backup\
    \ solution, Oracle Secure Backup (OSB). This tool is a full-feature enterprise\
    \ backup management system that automates the tape backup and restore of OS files.\
    \ More important to you as the DBA, OSB can also be configured as a media management\
    \ layer with RMAN. This means that you can implement RMAN and OSB together for\
    \ the backup and restore of database files directly to and from tape.\n\nThere\
    \ are myriad tape management solutions available. Why consider OSB? OSB is particularly\
    \ compelling if one of your main goals is database backups to tape. Because OSB\
    \ is an Oracle product, it is tightly integrated with RMAN. OSB is aware of the\
    \ Oracle database file format and can take advantage of block-level validation,\
    \ encrypting backups as they are written to tape, integration with Oracle’s Enterprise\
    \ Manager, and so on.\n\nOSB Editions and Features\n\nThere are two different\
    \ editions of OSB:\n\n*   Oracle Secure Backup Express\n*   Oracle Secure Backup\n\
    \nThe Oracle Secure Backup Express edition is free (well, “free” when you purchase\
    \ a license for the Oracle database). This edition contains core features, such\
    \ as backup and restore of OS files and RMAN integration, but is limited to use\
    \ on a single host with one directly attached tape device.\n\nThe Oracle Secure\
    \ Backup edition requires an extra license and is well suited for tape backup\
    \ and restore in a distributed server environment with heterogeneous filesystems\
    \ (Linux/Unix, Windows, and network-attached storage). The Oracle Secure Backup\
    \ edition contains the following additional features not available with the Express\
    \ edition:\n\n*   Backup and restore of database files in RAC environments\n*\
    \   Integrated with Oracle Enterprise Manager Grid Control (with Oracle Database\
    \ 10g Release 2 and higher)\n*   Supports multiple tape drives\n*   Encrypted\
    \ tape backups\n*   Fiber-attached device support\n*   Fast backup compression\
    \ (with Oracle Database 11g Release 1 and higher)\n*   RMAN medium-level compression\
    \ (with Oracle Database 11g Release 2 and higher)\n*   Networked backup of distributed\
    \ hosts and tape devices\n*   Automated cartridge system library software (ACSLS)\
    \ and automated rotation of tapes between multiple locations (vaulting)\n\nIf\
    \ you are a small shop with just one production database server, then Oracle Secure\
    \ Backup Express may satisfy your business requirements, whereas the full-fledged\
    \ Oracle Secure Backup edition is more suitable for environments with multiple\
    \ distributed hosts that need advanced data protection.\n\n![image](Images/sq.jpg) **Note**  \
    \ OSB is available on most Linux/Unix platforms as well as Windows. See the MOS\
    \ certification matrix for a current list ([https://support.oracle.com](https://support.oracle.com)).\n\
    \nOSB Terminology\n\nTake some time to familiarize yourself with the architectural\
    \ terms used with OSB. The following sections give a brief description of the\
    \ major OSB parts, starting with administrative domains.\n\nOSB Administrative\
    \ Domain and Servers\n\nAn administrative domain is a collection of servers (hosts)\
    \ that you manage as a single group for backup and restore operations. Within\
    \ an OSB administrative domain, each server can be assigned one or more of the\
    \ following roles:\n\n*   Administrative (admin) server\n*   Media server\n* \
    \  Client server (or client host)\n\nAs shown in [Figure 20-1](#9781430257288_Ch20.xhtml#Fig1),\
    \ for each administrative domain, there is only one admin server that controls\
    \ the backup, restore, and scheduling operations. An admin server manages one\
    \ or more media servers and one or more clients.\n\n![9781430257288_Fig20-01.jpg](Images/9781430257288_Fig20-01.jpg)\n\
    \n[Figure 20-1](#9781430257288_Ch20.xhtml#_Fig1). OSB administrative domain\n\n\
    A media server is a host that has at least one physical tape device connected\
    \ to it. Media servers are responsible for transferring data to and from the attached\
    \ tape devices.\n\nThe client host is the server on which reside the Oracle databases\
    \ and filesystem data that you want to back up (and potentially restore). For\
    \ a single-host environment a server can be the admin server, media server, and\
    \ client host in the OSB administrative domain.\n\nOSB Interfaces\n\nThere are\
    \ four tools you can use to run and manage OSB backup and restore tasks:\n\n*\
    \   Enterprise Manager Database Control and Grid Control or Enterprise Manager\
    \ 12c Cloud Control\n*   Oracle Secure Backup web tool\n*   Oracle Secure Backup\
    \ command-line tool (obtool)\n*   Recover Manager command-line tool (rman)\n\n\
    Although the graphical interfaces are somewhat intuitive and easy to use, I’m\
    \ a strong believer in learning how to run a tool from the command line. Doing\
    \ so gives you a better understanding of the underlying architecture, knowledge\
    \ that is invaluable when troubleshooting and diagnosing problems. In that vein,\
    \ this chapter focuses on using obtool and rman to configure and run OSB backup\
    \ and restore tasks.\n\n![image](Images/sq.jpg) **Tip**   For complete details\
    \ on all the OSB interfaces, see the *Oracle Secure Backup Administrator’s Guide*\
    \ and *Oracle Secure Backup Reference*, available at [www.oracle.com/technetwork/database/secure-backup/documentation/](http://www.oracle.com/technetwork/database/secure-backup/documentation/).\n\
    \nOSB Users and Classes\n\nAn OSB user is an account defined within an OSB administrative\
    \ domain. These users are separate from OS users. OSB user information is stored\
    \ in the OSB administrative domain server. You are required to enter a username\
    \ and password when accessing OSB through its interfaces, such as obtool or Oracle\
    \ Secure Backup web tool.\n\nAn OSB class is a set of privileges and rights granted\
    \ to a user. Each user can be assigned to only one OSB class. OSB classes help\
    \ maintain a consistent user experience across all servers in an administrative\
    \ domain.\n\nOSB Daemons\n\nOSB uses seven different background processes (daemons)\
    \ to manage the configuration, backup, and restore operations. The executables\
    \ that start the daemons are in the OSB_HOME/etc directory on each of the servers.\
    \ These processes are  as follows:\n\n*   Schedule daemon (obsheduled) runs only\
    \ on the admin server and manages the scheduled backups.\n*   Index daemon (obixd)\
    \ runs only on the admin server and manages the backup catalog for each client.\n\
    *   Apache web server daemon (obhttpd) runs only on the admin server and services\
    \ the Oracle Secure Backup web tool.\n*   Service daemon (observiced) runs on\
    \ the admin, media, and client servers. On the admin server, it runs jobs as requested\
    \ by the schedule daemon. When running on the media or client server, it allows\
    \ for remote administration of the host.\n*   Network data management protocol\
    \ (NDMP) daemon (obndmpd) runs on the admin, media, and client servers. It provides\
    \ data communication between servers in the administrative domain.\n*   Robot\
    \ daemon (obrobotd) runs only on the media server and helps manage communication\
    \ to tape devices.\n*   Proxy daemon (obproxyd) runs only on the client server\
    \ and verifies user access for system backup tape (SBT) backup and restore operations.\n\
    \nNow that you have a basic understanding of the OSB architecture, you are ready\
    \ to download and install theOSB software.\n\nDownload and Installation\n\nYou\
    \ can download the OSB software from the Technology Network area of the Oracle\
    \ web site ([www.oracle.com/technetwork/database/secure-backup/downloads/](http://www.oracle.com/technetwork/database/secure-backup/downloads/)).\n\
    \nFor the examples in this chapter, I downloaded OSB version 10.4.0.2.0 and saved\
    \ the zip file osb-10.4.0.2.0_linux32_cdrom120606.zip under a staging directory\
    \ stage/osb of my admin server in the OSB administrative domain. You can stage\
    \ this binary file in a location of your choice on your server.\n\nOracle recommends\
    \ installing the OSB software under the directory /usr/local/oracle/backup for\
