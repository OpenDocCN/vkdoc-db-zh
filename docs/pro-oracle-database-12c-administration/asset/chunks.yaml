    \ only checks for valid information in the header of each file that would be required\
    \ for a restore and recovery.\n\n## Summary\n\nAutomating routine database jobs\
    \ is a key strategy of the successful `DBA`. Automated jobs ensure that tasks\
    \ are repeatable and verifiable and that you’re quickly notified when there are\
    \ any problems. For example, your job as a `DBA` greatly depends on successfully\
    \ running backups and ensuring that the database is highly available. This chapter\
    \ includes several scripts and examples that detail how to run routine jobs at\
    \ defined frequencies.\n\nOracle provides the Oracle Scheduler utility (implemented\
