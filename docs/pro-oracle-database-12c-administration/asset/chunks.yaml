    \ Darl also teaches Oracle classes at Regis University and does volunteer work\
    \ for the Rocky Mountain Oracle Users Group.\n\nAbout the Technical Reviewers\n\
    \n![image](Images/9781430257288_unFig-02.jpg) **Fuad Arshad** has been a database\
    \ administrator for more than 16 years. He has experience in all aspects of the\
    \ Oracle database, from management to tuning, and is an Oracle Certified Expert.\
    \ He frequently blogs about Oracle (`http://www.fuadarshad.com`) as well as participating\
    \ in online forums and social media (`http://www.twitter.com/fuadar`). Fuad has\
    \ presented at the conferences Collaborate and Oracle OpenWorld on topics ranging\
    \ from Oracle Real Application Clusters to Oracle Database Appliance. Fuad currently\
