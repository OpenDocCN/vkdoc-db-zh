    Next is code from the example that uses the boilerplate code you’ll reuse. Note
    the use of mOpenHelper which is DatabaseHelper. As you can see, it builds on what
    has 58


    Chapter 7 ■ Using sQLite with android/Java


    already been constructed. If you examine the full code in the example, you’ll
    see that most of the code deals with the data to be stored rather than the SQLite
    interface.


    The code in bold is the code that actually updates the database. The db.insert
    method constructs the necessary SQLite syntax using the static values described
    previously in this chapter. The code directly below the bold code takes the return
    value from db.insert and puts it into a local variable called rowId. That’s exactly
    what it is—the unique id of the new row. If the process fails, -1 is returned.


    @Override


    public Uri insert(Uri uri, ContentValues initialValues) {


    // Validate the requested uri


    if (sUriMatcher.match(uri) != NOTES) {


    throw new IllegalArgumentException("Unknown URI " + uri);


    }


    ContentValues values;


    if (initialValues != null) {


    values = new ContentValues(initialValues);


    } else {


    values = new ContentValues();


    }


    Long now = Long.valueOf(System.currentTimeMillis());


    // Make sure that the fields are all set


    if (values.containsKey(NoteColumns.CREATED_DATE) == false) {


    values.put(NoteColumns.CREATED_DATE, now);


    }


    if (values.containsKey(NoteColumns.MODIFIED_DATE) == false) {


    values.put(NoteColumns.MODIFIED_DATE, now);


    }


    if (values.containsKey(NoteColumns.TITLE) == false) {


    Resources r = Resources.getSystem();


    values.put(NoteColumns.TITLE, r.getString(android.R.string.untitled));


    }


    if (values.containsKey(NoteColumns.NOTE) == false) {


    values.put(NoteColumns.NOTE, "");


    }


    **SQLiteDatabase db = mOpenHelper.getWritableDatabase();**


    **long rowId = db.insert(NOTES_TABLE_NAME, NoteColumns.NOTE, values);**


    if (rowId > 0) {


    Uri noteUri = ContentUris.withAppendedId(NoteColumns.CONTENT_URI, rowId);


    getContext().getContentResolver().notifyChange(noteUri, null);


    return noteUri;


    }


    throw new SQLException("Failed to insert row into " + uri);


    }


    Chapter 7 ■ Using sQLite with android/Java


    Summary


    This chapter shows you the basics of working with the SQLite built-in database
    in Android. Although there’s a lot of code in the example shown here, only a few
    lines of code are actually what you need to write for the SQLite interface. When
    you reuse the code for your own purposes, most of the code you write will be related
    to your own app and its data rather than to the database.


    **Chapter 8**


    **Using SQLite with Core**


    **Data (iOS and OS X)**


    Although SQLite is integrated tightly with PHP, Android, and iOS/OS X, the integration
    strategies differ somewhat. In a way, they form a logical progression. PHP supports
    SQLite as an extension to the language (no longer optional as of this writing).
    When you write your PHP code for SQLite, today’s best practice is to use the PHP
    data object (PDO) class.


    However, the rest of your code may very well be traditional procedural code: there
    is no assumption that you will be writing object-oriented code throughout.


    Android represents a slightly different approach to the idea of creating a general-purpose
    class (android.database). In the case of Android, a specific subclass database
    provides SQLite support (android.database.sqlite) along with the generalized data
    management support in android.database.


    It’s reasonable to think of SQLite in Android as a more object-oriented


    implementation than that of PHP. (This is a generalization and is not meant to
    ignore—or fan—arguments.) Despite these differences in approach, the SQLite code
    that you’ve seen in this book and other places is visible both in PHP and in Android
    in many cases.


    You’ll find familiar SQLite commands in the source code for PHP and Android apps—


    commands such as SELECT, DELETE, INSERT INTO, DELETE FROM, and so forth.


    Over in the world of iOS and OS X, the object-oriented approach goes deeper. Under
    normal circumstances, you as a developer don’t even see SQLite code. As is the
    case with PDO and android.database, there are common classes that are customized
    for various databases, but the SQLite code is placed inside these common classes
    and is rarely visible to you. This means that you’re not writing statements or
    commands such as SELECT, DELETE, and so forth. Instead, you’re writing code that
    interacts with the common classes and their subclasses for your app.


    Furthermore, there is one really critical distinction between the implementation
    in PDO and android.database when compared to iOS and OS X. That difference has
    to do with relationships which are conceptually exactly the same as they are in
    any other SQL


    environment, but they are implemented in a very different way which you’ll see
    in this chapter.


    Finally, there’s a key point that is critical to Core Data but doesn’t apply in
    the same way to the other environments. PDO and android.database wrap specific
    databases and provide access to them. Core Data works with a variety of databases,
    but its database 61


    Chapter 8 ■ Using sQLite with Core Data (ios anD os X)


    accesses go through Core Data itself: the underlying database is not exposed.
    Some people think of Core Data itself as a database, but it is not. Technically,
    it is an object graph and persistence framework. It uses a database (or, in the
    case of SQLite, a database library), but it is not a database itself. Its job
    is to hide the database so you can work with the objects that Core Data manages
    based on data in the database it uses.'
