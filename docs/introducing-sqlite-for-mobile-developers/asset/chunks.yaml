    editor. Here are the steps involved. Begin with your data model open as shown
    in Figure [10-1. (I](#index_split_001.html#122)t doesn’t matter if you’re looking
    at the graph or table view.) Choose Editor ➤ Create NSManagedObject Subclass to
    open the window shown in Figur[e 10-2](#index_split_001.html#125).


    Select the data model you want to use as shown in Figure [10-2.](#index_split_001.html#125)
    (Typically there’s only one.


    There may be several if you have been modifying your data model.)


    ![](index-125_1.jpg)


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC)


