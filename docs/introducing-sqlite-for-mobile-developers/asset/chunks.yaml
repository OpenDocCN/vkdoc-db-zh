    \ = $_POST[\"userid\"];\nprint $userid;\n// 这是相同的代码，提供诊断功能，显示所有 `POST` 变量及其键。另外，请注意\
    \ `$userid` 在此设置，以便在本文件后面使用。它是从前一个文件传来的隐藏字段，被复制到一个局部变量中。\n$db = 'sqlite:sqlitephp.sqlite';\n\
    $sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\");\necho \"<p>PDO 连接成功</p>\"\
    ;\n$query = $sqlite->prepare (\"INSERT INTO Score ('score', 'userid') VALUES (99,\
    \ $userid);\") or die (\"<h1>无法准备查询</h1>\");\necho \"<p>Prepare 准备成功</p>\";\n\
    ```\n"
