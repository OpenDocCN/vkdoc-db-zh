- fmt: "# Chapter 12 ■ Using the simple Database with a Core Data/ios app\n\n***Figure\
    \ 12-3.** A table-based detail view for scores*\n\n■ **Note** the values for scores\
    \ are UniX timestamps (seconds since January 1, 1970).\n\n`NSDate` in Cocoa and\
    \ Cocoa touch provide these values easily, and they offer different numerical\
    \ values for testing your code. The `MasterViewController` continues to use a\
    \ timestamp that is displayed as such.\n\nThis will entail three steps:\n\n1.\
    \  Create subclasses of `NSObject` for `User` and `Score`. (This was described\
    \ in Chapter 9.)\n2.  Modify `MasterViewController` to use the new subclasses.\n\
    3.  Replace the existing detail view controller in the storyboard with a table-view\
    \ controller-based detail view controller.\n4.  Modify the code in `DetailViewController`\
    \ to work with the table view controller-based detail view controller.\n5.  Modify\
    \ `MasterViewController` to pass a reference to the current `User` to the new\
    \ detail view controller so that its scores can be displayed.\n\nThese can be\
    \ done in any order after Step 1.\n\n## Use NSManagedObject Subclasses\n\nThe\
    \ code in `MasterViewController` creates a new `User` entity as described in the\
    \ previous section. Once you have subclasses available, you should use them. In\
    \ `insertNewObject` in `ManagedObjectController`, find the following line of code:\n\
    \n```swift\nlet newObject = NSEntityDescription.insertNewObjectForEntityForName\n\
    (entity.name!, inManagedObjectContext: context)\n```\n\nChange it to\n\n```swift\n\
    let newUser = NSEntityDescription.insertNewObjectForEntityForName\n(entity.name!,\
    \ inManagedObjectContext: context) as! User\n```\n\nIn the line that follows,\
    \ use the subclass instead of key-value coding. Instead of\n\n```swift\nnewManagedObject.setValue(NSDate().description,\
    \ forKey: \"name\")\n```\n\nUse the new subclass with the following line:\n\n\
    ```swift\nnewUser.name = NSDate().description\n```\n\n## Use a Table View Controller\
    \ for DetailViewController\n\nThe easiest way to do this is to remove the current\
    \ `DetailViewController` from the storyboard. (It is shown in Figure 12-4.)\n\n\
    ![](index-151_1.jpg)\n\n***Figure 12-4.** Locate the Detail View Controller in\
    \ the storyboard and remove it*\n\nThen drag a table view controller from the\
    \ object library at the right of the window into the storyboard. Place it where\
    \ the detail view controller was, and control-drag from the navigation controller\
    \ to the new table view controller. For the relationship, choose *root view controller*\
    \ (you’ll be asked as soon as you release the mouse button on the control-drag).\n\
    \n## Modify DetailViewController Code for DetailViewController\n\nThere are a\
    \ few changes to `DetailViewController`.\n\n### Using the Subclasses\n\nYou need\
    \ to modify the code so that `DetailViewController` is a subclass of `UITableViewController`\
    \ rather than `UIViewController`.\n\nChange this line at the top of the file from\n\
    \n```swift\nclass DetailViewController: UIViewController {\n```\n\nto the following:\n\
    \n```swift\nclass DetailViewController: UITableViewController {\n```\n\nAlso change\
    \ the storyboard so that the new `DetailViewController`’s type is `DetailViewController`\
    \ (it might not be).\n\nRemove references to the label from `DetailViewController`\
    \ (it’s called `DetailDescriptionLabel`).\n\nThere are a few housekeeping chores\
    \ to tidy up the code. Change the variable declaration for `detail` to `detailUser`\
    \ (at the top of the file).\n\n```swift\nvar detailUser: User? {\n    didSet {\n\
    \        // Update the view.\n        self.configureView()\n    }\n}\n```\n\n\
    ### Change configureCell to Use the Subclass\n\nHere is what `configureCell` should\
    \ look like now that it uses the `Score` subclass. Note that there’s a bit of\
    \ conversion going on as the `NSSet` of scores for a given user (a relationship)\
    \ is converted to an array (so that the nth element can be found for the table).\
    \ Then, the nth element (which is a `Score`) is examined to find its score value\
    \ (`Score.score`).\n\n```swift\nfunc configureCell(cell: UITableViewCell, atIndexPath\
    \ indexPath: NSIndexPath) {\n```"
