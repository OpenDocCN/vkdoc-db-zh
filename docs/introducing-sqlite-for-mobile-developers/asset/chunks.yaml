    \ 3-5 显示创建了三个新行，但输入的唯一数据位于第一行。你会注意到 `PK` 主键是自动填充的，即使在第三行也是如此：SQLite 已经处理了这一点，因为它是主键。\n\
    \n![](img/index-38_1.jpg)\n![](img/index-38_2.jpg)\n\n***图 3-5.** 图形化输入数据*\n\n\
    如果你想通过查询输入数据（以下是从命令行界面执行此操作的方法），你可以使用如图 3-6 所示的“查询”（Query）按钮来输入。\n\n***图 3-6.**\
