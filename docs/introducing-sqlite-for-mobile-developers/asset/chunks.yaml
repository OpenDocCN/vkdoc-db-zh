- fmt: "# Creating managedObjectContext in iOS\n\nFinally, the managed object context\
    \ is created. (Note that because of lazy initialization, \"finally\" may not be\
    \ accurate because the sequence of creating the Core Data stack components varies\
    \ depending on which one is the first one accessed.)\n\n`Chapter 9 ■ Using sQLite/Core\
    \ Data with swift (ios anD os X)`\n```swift\nlazy var managedObjectContext: NSManagedObjectContext\
    \ = {\n    // Returns the managed object context for the application\n    // (which\
    \ is already bound to the persistent store coordinator\n    // for the application.)\
    \ This property is optional since there\n    // are legitimate error conditions\
    \ that could cause the creation\n    // of the context to fail.\n    let coordinator\
    \ = self.persistentStoreCoordinator\n    var managedObjectContext = NSManagedObjectContext(concurrencyType:\
    \ .MainQueueConcurrencyType)\n    managedObjectContext.persistentStoreCoordinator\
    \ = coordinator\n    return managedObjectContext\n}()\n```\n\n## Setting Up the\
    \ Core Data Stack in AppDelegate for OS X\n\nThis code is from the Cocoa Application\
    \ for OS X template that’s built into Xcode. It consists of lazy var declarations\
    \ for the following:\n\n- `applicationDocumentsDirectory`. This is the directory\
    \ in which your data model will be placed inside your app.\n- `managedObjectModel`\n\
    - `persistentStoreCoordinator`\n- `managedObjectContext`\n\nBy using lazy vars,\
    \ the initialization code only runs when you actually need it. Thus, this code\
    \ in the template would never run unless you use Core Data. The comments from\
    \ the template code are included here.\n\n### Creating applicationDocumentsDirectory\
    \ in OS X\n\nThis code differs from iOS to reflect the fact that the file structures\
    \ differ. Its purpose is the same. The code shown in bold is created from your\
    \ settings when you set up the project. If you change your developer ID or project\
    \ name, you may have to change this.\n\n```swift\nlazy var applicationDocumentsDirectory:\
    \ NSURL = {\n    // The directory the application uses to store the Core Data\n\
    \    // store file. This code uses a directory named\n    // \"com.champlainarts.OSXProjectSwift\"\
    \ in the user's Application Support directory.\n    let urls = NSFileManager.defaultManager().URLsForDirectory(.ApplicationSupportDirectory,\
    \ inDomains: .UserDomainMask)\n    `Chapter 9 ■ Using sQLite/Core Data with swift\
    \ (ios anD os X)`\n    let appSupportURL = urls[urls.count - 1]\n    return appSupportURL.URLByAppendingPathComponent(\"\
    com.champlainarts.OSXProjectSwift\")\n}()\n```\n\n### Creating managedObjectModel\
