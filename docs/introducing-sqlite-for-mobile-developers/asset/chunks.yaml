    **the CrItICaL DataBaSe DeSIGN Step**


    the first step has almost nothing to do with your development environment.


    identifying your data, figuring out the relationships and defining validation
    rules don’t require anything more than thinking, discussion, and some sketching
    of the database. a key part of this step is naming the components (is it “Client”
    or “User”


    or “Customer”) in such a way that end users and people who develop and maintain
    the code will understand what’s going on.


    this is a critical and much-overlooked aspect of the development of any app that
    relies on data (whether it’s a relational database, a key-value store, or a flat
    file).


    this book focuses on sQLite, but if you’re not familiar with the concepts of data
    management and the design tools that are available, make certain that you get
    up to speed at least to a basic level quickly.


    There is a sort of progression in the integration of SQLite with PHP, Android/Java,
    and Core Data for iOS and OS X. With PHP, you are typically working with very
    visible SQLite code, and, as you will see, it is frequently procedural code for
    the most part. When you get to Core Data, you’ll be working with object-oriented
    code where the framework and its classes use SQLite code behind the scenes: you
    will rarely write SQLite code directly, but you’re using it all the time. Android
    and Java strike a middle ground so that the SQLite code is more visible than it
    is in Core Data, but it’s not as visible as it is when you’re using PHP.


    Although there are object-oriented ways of writing PHP code, by and large you
    are working in a procedural environment. However, in today’s world, the recommended
    best practice for integrating PHP with a database is to use the PHP data object
    (PDO) extension. That is an object-oriented class which encapsulates the code
    that you need to work with for a database. There are versions for SQLite and other
    major databases so your PDO code is relatively easy to port.


