- fmt: "# Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X)\n\nThe last\
    \ part of Core Data in the app delegate is the utility code to save the context\
    \ and its changes. If you don’t save the managed object context, the changes are\
    \ gone.\n\n```\nfunc saveContext () {\n    if managedObjectContext.hasChanges\
    \ {\n        do {\n            try managedObjectContext.save()\n        } catch\
    \ {\n            // Replace this implementation with code to handle the error\n\
    \            // appropriately.\n            // abort() causes the application\
    \ to generate a crash log and\n            // terminate. You\n            // should\
    \ not use this function in a shipping application, although it\n            //\
    \ may be useful during development.\n            let nserror = error as NSError\n\
    \            NSLog(\"Unresolved error \\(nserror), \\(nserror.userInfo)\")\n \
    \           abort()\n        }\n    }\n}\n```\n\nThis is one of the main reasons\
    \ for passing the managed object context to views that are created or managed\
    \ by the app delegate (see the section “Passing a Managed Object Context to a\
    \ View Controller in iOS”). If the view has the managed object context, as it\
    \ is processing changes to the view, it can save those changes with `managedObjectContext.save`.\n\
    \nHere is the standard code from a view controller that can save data.\n\n```\n\
    do {\n    try context.save()\n} catch {\n    // Replace this implementation with\
    \ code to handle the error\n    // appropriately.\n    // abort() causes the application\
    \ to generate a crash log\n    // and terminate. You should not use this function\
    \ in a\n    // shipping application, although it may be useful during development.\n\
    \    print(\"Unresolved error \\(error), \\(error.userInfo)\")\n    abort()\n\
    }\n```\n\n## Saving in OS X\n\nWith the menu bar and its commands in OS X, you\
    \ often are using a Save action to save data. Here is a typical `saveAction` function\
    \ from OS X.\n\n```\n@IBAction func saveAction(sender: AnyObject!) {\n    // Performs\
    \ the save action for the application, which is to send the\n    // save: message\n\
    \    // to the application's managed object context. Any encountered errors are\
    \ presented\n    // to the user.\n    if !managedObjectContext.commitEditing()\
    \ {\n        NSLog(\"\\(NSStringFromClass(self.dynamicType)) unable to commit\
    \ editing before saving\")\n    }\n    if managedObjectContext.hasChanges {\n\
    \        do {\n            try managedObjectContext.save()\n        } catch {\n\
    \            let nserror = error as NSError\n            NSApplication.sharedApplication().presentError(nserror)\n\
    \        }\n    }\n}\n```\n\n## Working with `NSManagedObject`\n\nIn any app that\
    \ uses Core Data, you’ll need a Core Data stack, and you create it pretty much\
    \ the same way each time except that you do customize the name of your project.\n\
    \n(If you’re building your app from one of the built-in Xcode templates, there\
    \ may be a Core Data check box you can use to automatically insert the Core Data\
    \ stack code as well as your project name.)\n\nBut what about your data? That’s\
    \ going to be managed by your Core Data stack, but surely it requires special\
