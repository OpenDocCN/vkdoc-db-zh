    S](#index_split_001.html#101)elect the data model you want to use as shown in
    Figur[e 9-2. (](#index_split_001.html#101)Typically there’s only one. There may
    be several if you have been modifying your data model.)


    ![](index-101_1.jpg)


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X)


    ***Figure 9-2.** Select your data model*


    After you click Next, choose the entity or entities you want to subclass (see
    Figur[e 9-3](#index_split_001.html#102)).


    By default, the entity or entities that you have selected in the graph or table
    view (as shown in Figur[e 9-1](#index_split_001.html#98)) are selected here. You
    don’t have to subclass everything.


    Sometimes, you choose to subclass the more complex entities and leave the others
    as NSManagedObject instances.


    ![](index-102_1.jpg)


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X)


    ***Figure 9-3.** Choose the entities to subclass*


    Click Next and choose where to save your new files as shown in Figur[e 9-4\. Als](#index_split_001.html#103)o
    choose the language you want for the subclass files. (You can mix and match Swift
    and Objective-C.)


    ![](index-103_1.jpg)


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X)


    ***Figure 9-4.** Choose where to save the subclass files and what language you
    want to use* You should double-check the group (for the Navigator) and the target,
    but usually they’re correct. The option for scalar properties requires a little
    explanation. By default, your entity attributes are converted into Swift or Objective-C
    properties using the native Cocoa or Cocoa Touch types. Thus, a Double is converted
    to NSNumber. NSNumber is a much more powerful construct than Double (for one thing,
    it’s a class). If you’re working a lot with such a property, sometimes the power
    of NSNumber gets in the way. Choosing to use scalar types will use the basic platform
    (non-object) types (such as Double) which may make your code simpler.


    If your project is basically written in Swift and you choose to create your subclass
    in Objective-C, you may be asked if you want to create a bridging header between
    the two languages as shown in Figure [9-5](#index_split_001.html#104). Yes, you
    do want to do this.


    ![](index-104_1.jpg)


    ![](index-104_2.jpg)


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X)


    ***Figure 9-5.** You can choose to create a bridging header*


    In a mixed-language project, don’t worry if you’re not asked about a bridging
    header.


    It only need to be created once, so after the first time, you won’t be asked again.


    The bridging header is created for you in the Build Settings of your project as
    shown in Figur[e 9-6. Y](#index_split_001.html#104)ou don’t need to do anything
    further.


    ***Figure 9-6.** Building settings with a bridging header*


    If you’re creating a Swift subclass, Xcode will create two files for each entity
    you have selected. The first is the basic file for the class (User in this case):
    it’s empty, and looks as follows:


    import Foundation


    import CoreData


    class User: NSManagedObject {


    // Insert code here to add functionality to your managed object subclass


    }


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X) It will be named
    User.swift. As the comment in the code indicates, you can add any code that you
    want to this new class that you’ve created.


    The companion file that Xcode creates for you is a *class extension*. (A Swift
    class extension is like an Objective-C category but without a name.) Its name
    will be in the following form:


    User+CoreDataProperties.swift


    The contents of the file will be as follows:


    import Foundation


    import CoreData


    extension User {


    @NSManaged var name: String?


    @NSManaged var email: String?


    @NSManaged var scores: NSManagedObject?


    }


    At runtime, the extension is merged with the basic class, so you’re able to access
    the name property for an instance of User by writing


    myName.name = "test"


    That’s all it takes to create an NSManagedObject subclass.'
