    \ {\n    let scoresArray = scores.allObjects as NSArray\n    let selectedRowArrayElement\
    \ = scoresArray[indexPath.row] as! Score\n    let scoreForSelectedRow = selectedRowArrayElement.score\n\
    \    cell.textLabel!.text = \"Score: \" + scoreForSelectedRow.description\n}\n\
    ```\n\n## 修改 MasterViewController 以将用户传递给 DetailViewController\n\n默认情况下，在主从细节视图列表中选择的对象会被传递给\
    \ `DetailViewController` 中的 `DetailItem`。该变量被声明为 `AnyObject?`。你需要将其更改为你已创建的新 `detailUser`\
    \ 变量。在 `prepareForSegue` 方法中，将 `controller.detailItem = object` 这一行修改为以下内容：\n\n\
    ```swift\ncontroller.detailUser = (object as! User)\n```\n\n现在你需要连接表格视图并支持相关协议。这段代码实际上在\
    \ `MasterViewController` 中，因为你在那里需要管理一个表格视图控制器。你只需将其复制到 `DetailViewController`\
    \ 即可。\n\n并且你需要在 `DetailViewController` 的顶部导入 `CoreData`。\n\n```swift\nimport CoreData\n\
    ```\n\n## 总结\n\n现在你已经掌握了一个应用的基础知识，该应用使用了内置的 SQLite 数据库、Xcode Core Data 模型编辑器和\
    \ Core Data 框架来操作数据库，并利用 iOS 的 Cocoa Touch 框架将所有部分整合在一起。\n\n通过 PHP 和 Core Data\
    \ 的实践以及对 Android 的概述，你可以看到存在一些语言（PHP 等）以及框架（Cocoa Touch 和 Cocoa）和应用程序编程接口（API）（Android），它们都构建在\
    \ SQLite 之上。SQLite 的 SQL 语法被暴露的程度各不相同，从很少（Core Data）到大量（PHP），以及各种中间路径（如 Android）。\n\
    \n重要的是你要理解其中的原理和功能。\n\n同时请记住，在构建任何数据库驱动的应用时，你能放入数据库的功能越多，你需要编写的代码就越少。充分利用验证选项、`GROUP\
    \ BY` 子句以及其他你能找到的一切功能。你编写的代码越少，所花费的时间（编写和调试！）就越少。\n\n## 索引\n\n### **A, B**\n\n\
    - 和模板，136\n- `timeStamp` 命名，137\n\n#### AppDelegate\n\n##### iOS\n\n- `configureCell`，143\n\
