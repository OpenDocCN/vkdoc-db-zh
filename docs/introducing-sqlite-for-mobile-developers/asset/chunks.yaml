    ## 在 iOS 中创建获取请求


    在 iOS 中，标准做法是在应用委托中创建 Core 数据栈，正如本章前面"构建 Core 数据应用结构"一节所示。除了 Core 数据栈，你通常还会使用获取请求，将数据从持久化存储提取到托管对象上下文中。（在
    OS X 上，你使用绑定而非视图控制器和获取请求。）


    这段代码相当常见。这里，它用于获取具有给定名称（`Event`）的所有实体。实体描述从托管对象上下文中检索（该行已加粗），并且获取结果控制器是引用该托管对象上下文创建的。为`fetchedResultsController`创建了一个名为`_fetchedResultsController`的支撑变量。这种设计模式经常被使用：如果支撑变量（以下划线开头）存在，则按需返回它。如果不存在，则创建获取结果控制器，并将其设置到下划线支撑变量中以备下次需要时使用。


    ```swift

    var fetchedResultsController: NSFetchedResultsController {

    if _fetchedResultsController != nil {

    return _fetchedResultsController!

    }

    let fetchRequest = NSFetchRequest()

    // 根据需要编辑实体名称。

    let entity = NSEntityDescription.entityForName("Event", inManagedObjectContext:
    self.managedObjectContext!)

    fetchRequest.entity = entity

    // 将批处理大小设置为合适的数值。

    fetchRequest.fetchBatchSize = 20

    // 根据需要编辑排序键。

    let sortDescriptor = NSSortDescriptor(key: "timeStamp", ascending: false)

    fetchRequest.sortDescriptors = [sortDescriptor]

    // 根据需要编辑分区名称键路径和缓存名称。

    // 分区名称键路径为 nil 表示“无分区”。

    let aFetchedResultsController = NSFetchedResultsController(fetchRequest: fetchRequest,
    managedObjectContext: self.managedObjectContext!, sectionNameKeyPath: nil, cacheName:
    "Master")

    aFetchedResultsController.delegate = self

    _fetchedResultsController = aFetchedResultsController

    do {

    try _fetchedResultsController!.performFetch()

    } catch {

    // 请用适当的错误处理代码替换此实现。

    // abort()会导致应用程序生成崩溃日志并终止。

    // 在发布的应用程序中不应使用此函数，尽管在开发过程中可能很有用。

    print("Unresolved error \(error), \(error.userInfo)")

    abort()

    }

    return _fetchedResultsController!

    }

    var _fetchedResultsController: NSFetchedResultsController? = nil

    ```


    如果你已在第 8 章所述的数据模型中创建了获取请求，你可以用它来创建一个`fetchedResultsController`。


