  raw: 'If you’re coming from another language, the square brackets and the use of
    nil (and the necessity of initializing pointers properly) may be the two biggest
    changes you have to get used to when referring to Core Data objects which may
    or may not exist (the nature of databases, like that of networks, means that you
    can’t rely on things being in existence).


    Structuring a Core Data App with Objective-C


    The basic Core Data stack (persistent store coordinator, data model, and managed
    object context) typically is placed in a location that is available throughout
    the app. The most common case (used in Master-Detail Application and Single View
    Application templates built into Xcode) places the Core Data stack in AppDelegate.
    AppDelegate typically creates views and other objects within the app. If they
    will need parts of the Core Data stack, AppDelegate passes them down to the view
    controllers and views either when they are created or when AppDelegate is managing
    them after they have been created by others.


    Passing a Managed Object Context to a View


    Controller in iOS


    Here is how the Master-Detail Application template for iOS passes the managed
    object context to the view controller. (This code uses Objective-C dot syntax.)


    (BOOL)application:(UIApplication *)application


    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {


    // Override point for customization after application launch.


    UISplitViewController *splitViewController =


    (UISplitViewController *)self.window.rootViewController;


    UINavigationController *navigationController =


    [splitViewController.viewControllers lastObject];


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC) navigationController.topViewController.navigationItem.leftBarButtonItem
    =


    splitViewController.displayModeButtonItem;


    splitViewController.delegate = self;


    UINavigationController *masterNavigationController =


    splitViewController.viewControllers[0];


    MasterViewController *controller = (MasterViewController *)


    masterNavigationController.topViewController;


    **controller.managedObjectContext = self.managedObjectContext;**


    return YES;


    }


    The views are created from a storyboard, and this code starts from the basic window
    and steps down until it finds the navigation controller at the left of the split
    view controller. From there, it steps down to the MasterViewController inside
    the navigation controller. Having gotten that controller, it then sets the managedObjectContext
    property of the masterViewController to the managedObjectContext created in the
    Core Data stack in AppDelegate. This is the standard way of doing this.


    You can also get to the Core Data stack by finding the app delegate and then accessing
    one of the stack objects. This breaks idea of encapsulation because you’re looking
    inside the app delegate. However, you’ll find some sample code that does this
    in various places, and a (weak) argument can be made for doing it this way if
    you only rarely—like once—need to access the stack. Here’s the code for this other
    way of getting to the stack.


    AppDelegate *appDelegate = (AppDelegate *)


    [[UIApplication sharedApplication] delegate];


    // use appDelegate.managedObjectContext or some other stack property


    Setting up the Core Data Stack in AppDelegate for iOS


    This code is from the Single View Application template that’s built into Xcode.
    It consists of lazy var declarations for:


    •


    applicationDocumentsDirectory. This is the directory in which


