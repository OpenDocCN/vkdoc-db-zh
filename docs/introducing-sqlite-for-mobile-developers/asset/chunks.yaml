    # 理解 SQLite 是什么


    （如果用户这样做，你构建的应用程序必须能够找到该文件——或许需要用户的帮助。）用户也可以删除数据库文件。因为它是自包含的，所以这非常简单，并且不会损坏其他
    SQLite 数据库。当然，用户可能能够删除数据库这一事实意味着，在你的实现中，你可能希望隐藏它或将其放置在受保护的位置。如果你这样做，通常需要利用特定于平台的功能，例如隐藏文件夹，但
    `SQLite` 文件本身仍然是一个普通文件，可以被移动和复制到其他设备。


    因为数据库文件是自包含的，所以它既包含数据库数据，也包含其模式（如果你不是数据库领域的人，可理解为结构）。部分由于每个数据库都是自包含的，`SQLite`
    被称为 `serverless`（无服务器的，即没有单独的服务器进程）。


    `SQLite` 数据库存储在单个文件中的事实，导致了 `SQLite` 的一种常见用途：在用户看来只是一个简单文件的内部，实现结构和数据库功能。


    `注意`：虽然 `SQLite` 最初采用单数据库/单文件结构，但现在它支持预写式日志 (`WAL`) 作为一种选项。`WAL` 是一种通过使用多个文件来优化数据库性能的技术。关于
    `WAL` 的更多内容见第 [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4) 章。


    ## SQLite 支持事务并符合 ACID


    `Transaction`（事务）在数据库领域有一个非常具体的含义，超越了其在英语中的通常含义。它指的是作为一个整体一起执行（通常是顺序执行，但不一定）的一系列步骤。这些步骤合在一起构成一个事务，重要的是整个事务要么成功，要么失败。如果任何步骤失败，整个事务就失败。事务失败的结果是，数据库被
    `回滚` 到事务开始前的状态。


    当一个数据库支持事务时，事务的任何部分失败都意味着整个事务失败，数据库被设置为事务开始前的状态。所有这些都发生在一个符合 `ACID` 的数据库中，例如 `SQLite`。


    正如你在第 [1](http://dx.doi.org/10.1007/978-1-4842-1766-5_1) 章所见，使用数据库时，有很多代码你不需要编写。


    ### ACID


    `ACID` 是当今评判大多数数据库是否支持事务的标准。`ACID` 是一个首字母缩写词。


    -   *原子性*。这是事务的"全有或全无"特性。它作为一个整体成功或失败，永远不可能部分成功。

    -   *一致性*。在处理事务时，数据库将从一个有效状态开始，并以一个有效状态结束。换句话说，事务不会因为事务的结果而违反数据库规则（如属性的可选性），但在事务过程中可能会违反这些规则。

    -   *隔离性*。这意味着事务可以顺序或并发地运行。它们不会相互干扰。（`隔离性` 要求数据库实现一种管理并发的方法，以便操作可以是顺序或并发的。）

    -   *持久性*。这意味着，一旦完成，事务就持续存在。实际上，这通常意味着它被提交到磁盘。


    在 `SQLite` 中（与许多其他 `SQL` 实现一样），事务由一系列 `SQL` 语句组成，并用以下语句括起来：


    ```

    BEGIN TRANSACTION

    ```


    和


    ```

    END TRANSACTION

    ```


    关于事务的更多内容见第 [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4) 章。你将了解如何定义事务以及如何指定失败事务回滚到的点。在该章中，你还会看到关于
    `WAL` 如何实现原子性和持久性的更详细描述。


    ## 移动设备上的并发和 ACID 事务


    你可能认为，当你为手机等移动设备编写程序时，只有单一用户，因此关于事务和 `ACID` 合规性的讨论不适用。然而，并发问题在移动设备上或许比在其他情况下更值得关注。


    为什么你必须考虑移动设备上的事务及其失败？原因在于你在移动设备上执行的许多最频繁的任务都涉及网络访问。正如任何曾在突然高速驶入隧道的火车上尝试打电话的人所知，网络可用性在移动设备上可能会突然消失。


    # 第 3 章 使用 SQLite 基础：存储和检索数据


    `SQLite` 是一个轻量级库，包含一个数据库引擎，允许你使用 `SQL` 的一个非常大的子集来存储和检索数据。作为用户，你最熟悉的可能是应用程序界面或数据库管理系统
    (`DBMS`) 的界面，该界面提供了对数据库本身的访问。在幕后，你的命令（无论是文本还是图形）都被转换为 `SQLite` 语法。


    本章向你展示创建表、向其中添加数据以及检索这些数据的基础知识。这是一个高级概述，让你体验一下 `SQLite`。下一章将深入探讨你可以使用的一些选项和变体。在本章中，你将看到图形用户界面
    (`GUI`) 和 `sqlite3` 命令行界面，它们都是 `SQLite` 的一部分。在后续章节中，通常只会看到 `SQLite` 界面，因为它包含了
    `SQLite` 命令。在大多数 `SQLite` 的图形编辑器中，你都有直接输入 `SQLite` 代码的选项，因此这些命令在任何一种环境中都应该适用。


    ## 术语和定义


    `SQLite` 在本书中以多种方式使用，正如它在其它文档和讨论中一样。以下是 `SQLite` 世界中各项内容的指南：


    -   `SQLite`。如本书所用，`SQLite` 指代任何版本的 SQLite。你可以在 `sqlite.org` 找到源代码和预编译的二进制文件。单独使用时，它指的是
    `SQLite` 项目及其任何版本。

    -   `SQLite 3` 指的是撰写本文时的当前 `SQLite` 版本。因此，`SQLite 3` 是 `SQLite` 的第三个主要版本。在本书中，`SQLite
    3` 指代该版本，以区别于其他版本（例如 `SQLite 2`）。

    -   `SQLite 3.9.2` 是 `SQLite` 当前的发布版本。与任何维护中的软件产品一样，它会根据需要进行修订，因此使用主版本号-次版本号-构建号的编号约定。在本书中，不指代具体的发布版本（`3.9.2`），因为它可能会发生变化。

    -   `sqlite3`（无空格，全小写）是一个命令行实用程序，用于帮助你构建和调试 `SQLite` 数据库及语法。你可以从 `sqlite.php`
    下载它，但如果你的操作系统 (`OS`) 或其他环境中已安装了 `SQLite`，`sqlite3` 很可能已经存在。


    当你阅读关于数据库和关系数据库的各种材料时，可能会遇到数据库管理系统 (`DBMSs`) 和关系数据库管理系统 (`RDBMSs`)。当今大多数数据库都是关系数据库，而且几乎都基于
    `SQL`。也有其他类型的数据库，但目前使用并不广泛。当今一个特别有趣的数据管理方法是处理非结构化数据，但这超出了本书的范围。


    ## 使用 `sqlite3`


    `sqlite3` 是一个命令行实用程序，是 `SQLite 3` 的一部分（`sqlite2` 版本已不再适用）。它在 `OS X` 上运行（使用终端），或者作为
    `sqlite3.exe` 在 `Windows` 上运行。

    '
- fmt: '# Chapter 3: Using SQLite Basics: Storing and Retrieving Data


    It allows you to experiment with SQLite code directly, and it is used in this
    book as a touchstone for SQLite syntax. (When you use a third-party tool such
    as a graphical editor, you may encounter slight variations in the syntax such
    as whether or not a semicolon is required at the end of a statement—it is in SQLite.)
    You end your `sqlite3` session with a `.quit` or `.exit`. Note the initial period
    because both are `sqlite3` commands, but no semicolon at the end because they
    are not SQLite syntax (requiring a semicolon).


    Most of the `sqlite3` code in this book is shown with the prompt at the beginning
    of each line so that you can see which commands are multiline commands. Remember
    that you always need a semicolon at the end of a command—you can place it alone
    on the last line if you’ve forgotten to enter it before.


    `sqlite3` works with a temporary database that it creates for you, or alternatively,
    you can manage your own databases. These commands are shown here because they
    are `sqlite3` commands and not SQLite syntax.


    In the following subsections, we will review the basic `sqlite3` commands that
    you need to use the most. You can find more information about the `sqlite3` commands
    at [www.sqlite.org/cli.html.](http://www.sqlite.org/cli.html)


    > **Note:** Commands inside `sqlite3` start with a period.


    ## Run sqlite3 and Let It Create a New Database


    Just type `sqlite3`. When you are finished, type `.exit` or `.quit`. Here is a
    simple sample session.


    ```

    Jesses-Mac-Pro:~ jessefeiler$ sqlite3


    SQLite version 3.8.10.2 2015-05-20 18:17:19

    Enter ".help" for usage hints.

    Connected to a transient in-memory database.

    Use ".open FILENAME" to reopen on a persistent database.

    sqlite> .exit

    ```


    ## Create and Name a New sqlite3 Database


    The command `sqlite3 mydatabase` will create a new database called `mydatabase`.


    ```

    Jesses-Mac-Pro:~ jessefeiler$ sqlite3 mydatabase


    SQLite version 3.8.10.2 2015-05-20 18:17:19

    Enter ".help" for usage hints.

    sqlite> .quit

    ```


    ## Delete the Database


    By default, the database is created at the root level of the user (as long as
    that’s the directory set in your command-line editor). Therefore, you can delete
    it from the Finder if you’re on OS X. Just go to your root level (i.e., next to
    folders such as Desktop, Documents, Downloads, Library, Movies, Music, Pictures,
    Public, and Sites) and delete the database you have just created.


    ## Run sqlite3 and Open an Existing Database


    To open an existing database use the `.open` command. If you want to change your
    directory in Terminal (or whatever your command-line editor is, use your standard
    command (it often is `cd`). In Terminal on OS X, after you type `cd`, just drag
    the folder into which you want to place your files into Terminal: it will pick
    up the path and insert it into your code.


    ```

    Jesses-Mac-Pro:~ jessefeiler$ sqlite3


    SQLite version 3.8.10.2 2015-05-20 18:17:19

    Enter ".help" for usage hints.

    Connected to a transient in-memory database.

    Use ".open FILENAME" to reopen on a persistent database.

    sqlite> .open testdb

    sqlite> .quit

    ```


    ## Experimenting with SQLite Syntax


    The SQLPro for SQLite editor is useful to demonstrate SQLite syntax because, like
    a number of other SQLite editors, you can use a higher-level interface such as
    a graphical user interface (GUI) to manipulate your database, but you can also
    see the underlying SQLite code that is generated. It is that SQLite code with
    which you’ll be working in the rest of this book.


    This section lets you explore SQLite syntax, but remember that most of the SQLite
    code you’ll be creating is going to be embedded in an app that you write (or within
    a framework, DBMS, or library that is included in your app).


    There are a number of lightweight SQL editors available on Web (just search for
    "SQLite editor"). Because `sqlite` files are cross-platform, you can use these
    editors to work with any `sqlite` file that you have (subject, of course, to security
    constraints implemented by the operating system). In this chapter, SQLPro for
    SQLite is used as an example of a simple GUI placed on top of SQLite. It is available
    at [www.sqlitepro.com.](http://www.sqlitepro.com/)


    This will show you how Table 3-1 (shown previously in Chapter 1 and repeated here)
    is created from a user’s point of view.


    **Table 3-1.** SimpleTable


    | PK | Name | Origin |

    |----|------|--------|

    |    | Cecelia | Australia |

    |    | Leif | Iceland |

    |    | Charlotte | United States |


    Because a graphical editor provides you with a view of what you’re doing to your
    database, it may be easier to use than a command-line interface where there is
    no guidance beyond the command-line prompt. If you prefer to start out with the
    command line, rest assured that in this chapter you’ll see the graphical representation
    of the table as you create it, but you’ll also see the SQLite syntax that is generated
    at each step.


    > **Note:** DB Browser is another editing tool for SQLite. It is available for
    Windows, Mac OS X, and Linux at [http://sqlitebrowser.org](http://sqlitebrowser.org/).


    SQLite uses a subset of SQL (a very large subset at that). In addition, there
    are some minor modifications to standard SQL syntax (and, to be quite blunt, just
    about every DBMS makes some minor modifications of one kind or another). Rest
    assured, the SQL shown in this chapter applies in almost every environment. If
    you download a SQL editor from the Web (i.e., a standard SQL editor and not a
    SQLite editor), you may actually be using syntax that differs very slightly from
    SQLite.


    In particular, the very common MySQL DBMS has several popular editors—many of
    them free—but you might find a few minor differences. Most people (including me)
    function quite well without worrying about these distinctions: if they do crop
    up they’re simple to solve. What may be the most important point to remember is
    that SQLite syntax as it is implemented in SQLite is available at `sqlite.org`.
    SQL itself is not a standard in the way the HTML is, and that’s why you may encounter
    these variations.


    ## About Primary Keys


    Each row in a SQLite table has a `rowid`—a unique identifier that lets you access
    that specific row. Often, a unique `rowid` is created automatically for a table.
    It may not even be visible to users. Ideally, a primary key is not only unique
    but also meaningless.


    In fact, a meaningless primary key is generally more useful than one with meaning.
    If the primary key is a person’s name, birthday, or address, it can change. Only
    a totally meaningless value that has no dependency on anything else can successfully
    serve as a primary key.


    That is one of the reasons that database developers often hide their primary keys—or,
    in the case of SQLite, they let the database take care of it behind the scenes.
    If you do not want SQLite to do this for you, the check box in SQLPro for SQLite
    lets you use the behind-the-scenes mechanism. It is exposed in this example in
    order to use it in demonstrating relationships in Chapter 4.


    ## Exploring Your sqlite3 Database with a Graphical SQLite Editor


    When you first open your graphical SQLite editor, you’ll probably see an empty
    database (or even no database at all). As is the case with any modern app, you
    may be given the opportunity to reopen the last opened database or to navigate
    to an existing database.


    > **Tip:** Remember than a SQLite database is in its own file usually with a `sqlite`
    extension.'
