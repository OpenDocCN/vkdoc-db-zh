    ## Summary


    ## Index


    ![](index-11_1.jpg)


    ## About the Author


    `Jesse Feiler` is a developer, consultant, and author specializing in database
    technologies and location-based apps. He has worked with databases and data management
    on computers from mainframes to iPhone, iPad, and Apple TV using data management
    tools from DB2 (IBM) and DMSII (Burroughs) to Enterprise Objects Framework and
    Core Data, MySQL, Oracle, and, of course, SQLite.


    In the early days of the web, he built the page caching mechanism for the Prodigy
    web browser for Mac using a relational database library similar in some ways to
    SQLite.


    He is the creator of Minutes Machine the meeting management app, as well as Saranac
    River Trail app a guide to the Trail that includes location-based updates as well
    as social media tools. His apps are available in the App Store and are published
    by Champlain Arts Corp (champlainarts.com). As a consultant, he has worked with
    small businesses and nonprofits on projects such as production control, publishing,
    marketing and project management usually involving FileMaker and other databases.


    His books include:


    *iOS Programming with Swift for Dummies* (Wiley, 2015)

    *Swift for Dummies (Wiley, 2015)*

    *iOS App Development for Dummies* (Wiley, 2014)

    *iWork for Dummies* (Wiley, 2012)


    Videos include:


    *Mixed Language App Development with Objective-C and Swift* (O’Reilly, 2015)

    *iOS Developer’s Guide to Views and View Controller* (O’Reilly, 2015)

    *Learning Objective-C Programing* (O’Reilly, 2015)


    He is heard regularly on WAMC Public Radio for the Northeast’s The Roundtable,
    and is the founder of Friends of Saranac River Trail. A native of Washington DC,
    he has lived in New York City and currently lives in Plattsburgh NY.


    He can be reached at northcountryconsulting.com (consulting) and champlainarts.com
    (app development).


    ![](index-12_1.jpg)

    ![](index-12_2.jpg)


    ## About the Technical Reviewers


    Trained in computer engineering, multimedia, and graphic design, `Aaron Crabtree`
    has spent the last 15 years working in the industry. Experience has taught Aaron
    that, in most cases, programmatically creating each piece of an application is
    necessary for greater flexibility and control. Drop him a line on Twitter: @aaron_crabtree


    `Cliff Wootton` is a former Interactive TV systems architect at BBC News. The
    “News Loops” service developed there was nominated for a BAFTA and won a Royal
    Television Society Award for Technical Innovation. An invited speaker on pre-processing
    for video compression at the Apple WWDC conference. Taught post graduate MA students
    about real-world computing, multimedia, video compression, metadata and researching
    the deployment of next generation interactive TV systems based on open standards.
    Currently working on R&D projects investigating new Interactive TV technologies,
    involved with MPEG standards working groups, writing more books on the topic and
    speaking at conferences when not lecturing on Multimedia at the University of
    the Arts in London.


    ## Acknowledgments


    What I love most about working with databases is putting the pieces of the puzzle
    together – what a friend of mine used to call “making order out of chaos.” When
    it comes to thinking about SQLite, there are many pieces to put together – everything
    from the first work on relational databases back in the 1960s to the idea of lightweight
    code libraries that can fit appropriately onto heavy-duty computers, as well as
    small battery-powered mobile phones and autonomous satellites designed to explore
    other worlds far from the relative safety of their home planet.


    This book has been made possible, first and foremost, by D. Richard Hipp who began
    (and continues) the SQLite project starting in 2000. The many people who have
    added and tested code are too many to thank, but you know who you are.


    Closer to home, Jeff Pepper at Apress has been great to work with (again), as
    has Mark Powers. Together with Carole Jelen at Waterside Productions, they have
    all made it possible to provide this basic introduction to SQLite.


    ## Introduction


    I have worked with databases of many types on many platforms. Despite the fact
    that almost all of them have been based on the relational model. I’ve had some
    excursions into ancient database structures such as IMS (a hierarchical database)
    and, more recently into unstructured data, but in every case it has been a matter
    of a basic principle: finding the simplest way to organize data so that it makes
    sense. (As I often say to clients, “The data doesn’t lie.” When you lay data out
    this way, that way, and every which way, I’ve found that gradually its inherent
    structure becomes clear – if there is one. If there isn’t an inherent structure,
    what may become clear is some structure no one has ever thought of for the data.
    And sometimes, the data stubbornly refuses to reveal a structure that we can understand.


    This may sound very highfalutin and esoteric, but I do think that our job as database
    designers ultimately becomes a job of finding patterns. If we cannot find a logically
    inherent and inevitable pattern, the best choice is to find the best pattern that
    is usable for the task at hand.


    We can’t produce these data models without knowing something (a lot, in fact)
    about the ways to organize data, and, today that comes down to the relational
    model and the tools of SQL. This process is iterative (woe betide the design team
    that adopts a partial database model too early), and it relies on flexible tools
    as well as imagination and constant questioning of everyone working on a project.'
