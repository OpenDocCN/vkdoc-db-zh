    # ChapTer 6 ■ USIng SQLITe wITh php


    ## Summary


    This chapter shows the basic steps involved in connecting to a SQLite database.


    1. Specify the database to use.

    2. Create a query to use in retrieving data.

    3. Run the query.

    4. Fetch data from the query results.

    5. Use the results in your code.


    These steps apply to SQLite, but they also apply (sometimes with slightly different
    terminology and definitely different syntax) to the other languages and frameworks
    you use to retrieve SQLite data. Furthermore, these same basic steps apply to
    other databases than SQLite. This is the basic paradigm for retrieving data from
    a database.


    The following chapters show you how to use other languages than PHP to make your
    SQLite database connections.


    # Chapter 7 ■ Using SQLite with Android/Java


    In part because it’s lightweight and in the public domain, SQLite is an obvious
    choice for many projects where there are constraints on space, power, and cost.
    For those and other reasons, it’s built into a variety of operating systems and
    is used on many devices.


    This chapter shows you some of the key elements of using SQLite with Android.


    It’s built into `android.database.sqlite`, so it’s there for you to use. The basics
    of using SQLite are the same whether you’re using PHP to build a web site (see
    Chapters [6](http://dx.doi.org/10.1007/978-1-4842-1766-5_6) [and 10)](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)
    or you’re using Core Data on iOS or OS X (see Chapters [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8)
    [and 12).](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)


    ## Integrating SQLite with Any Operating System, Framework, or Language


    No matter what development platform you’re using, integrating SQLite in your app
    is always the same (and, indeed, this applies to any database).


    1. Design your database. This is not a SQLite issue. See the sidebar, “The Critical
    Database Design Step.”

    2. Connect your app to the database at runtime.

    3. Use the connection to add, delete, insert, or update data.

    4. Use the results of the operation in your app. This may consist of refreshing
    the interface by adding or removing items, or it may consist of working with the
    data in a new item or anything else you and your users require. This is not a
    SQLite issue.


    ## Chapter 7 ■ Using sQLite with android/Java


    ### the CrItICaL DataBaSe DeSIGN Step


    the first step has almost nothing to do with your development environment. identifying
    your data, figuring out the relationships and defining validation rules don’t
    require anything more than thinking, discussion, and some sketching of the database.
    a key part of this step is naming the components (is it “Client” or “User” or
    “Customer”) in such a way that end users and people who develop and maintain the
    code will understand what’s going on. this is a critical and much-overlooked aspect
    of the development of any app that relies on data (whether it’s a relational database,
    a key-value store, or a flat file). this book focuses on sQLite, but if you’re
    not familiar with the concepts of data management and the design tools that are
    available, make certain that you get up to speed at least to a basic level quickly.


    There is a sort of progression in the integration of SQLite with PHP, Android/Java,
    and Core Data for iOS and OS X. With PHP, you are typically working with very
    visible SQLite code, and, as you will see, it is frequently procedural code for
    the most part. When you get to Core Data, you’ll be working with object-oriented
    code where the framework and its classes use SQLite code behind the scenes: you
    will rarely write SQLite code directly, but you’re using it all the time. Android
    and Java strike a middle ground so that the SQLite code is more visible than it
    is in Core Data, but it’s not as visible as it is when you’re using PHP.


    Although there are object-oriented ways of writing PHP code, by and large you
    are working in a procedural environment. However, in today’s world, the recommended
    best practice for integrating PHP with a database is to use the PHP data object
    (`PDO`) extension. That is an object-oriented class which encapsulates the code
    that you need to work with for a database. There are versions for SQLite and other
    major databases so your `PDO` code is relatively easy to port.


    Chapt[er 6 sho](http://dx.doi.org/10.1007/978-1-4842-1766-5_6)wed you the coding
    basics of using SQLite with PHP. Here is the summary of the steps. This is only
    a summary. In practice, you’ll flesh out the `foreach` loop and you’ll probably
    replace `or die` with a `try`/`catch` block.


    ```

    $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');


    $query = $sqlite->prepare (...SQLite query...);


    $query->execute() or die ("Can''t execute");


    $result = $query->fetchAll() or die ("Can''t fetchAll");


    foreach ($result as $row) {


    ...work with each result row


    }

    ```


    ## Using Android and SQLite


    The Android NotePad example is an excellent example of the integration of SQLite
    with Android. You can download it fr[om https://android.googlesource.com/platform/development/+/05523fb0b48280a5364908b00768ec71edb847a2/samples/NotePad/src/com/example/android/notepad/NotePadProvider.java](https://android.googlesource.com/platform/development/+/05523fb0b48280a5364908b00768ec71edb847a2/samples/NotePad/src/com/example/android/notepad/NotePadProvider.java).


    The `NotePadProvider` code in that example extends `ContentProvider` which encapsulates
    the basic SQLite functionality that you need. This is the sort of code that you’ll
    need in your own app. You can read the code, but here are some key points to look
    for. You’ll need to implement them in your own app with your own values and strings
    (like the names of your columns, table, and database).


    ### Using the Static Values


    If you’re new this environment, you may have to do a bit of searching to find
    the many static variables that are used. Here’s a quick guide to where they may
    be.


    #### Static Values May Be in the APIs


    The `android.provider.BaseColumns` API is used by Android content providers throughout
    the system. Structured data is used throughout Android and many other operating
    systems (the Cocoa and Cocoa Touch table classes provide somewhat similar functionality).
    In the example code, two static values from `BaseColumns` are used frequently.
    Both are strings. `_COUNT` is the number of rows in a directory, and `_ID` is
    a unique id for a row.


    #### Static Values May Be in Imported Files.


    `NotePad.java` contains the `NotePad` class. That class itself contains the `NoteColumns`
    class.


    It contains these static values (among others):


    ```

    public static final String TITLE = "title";

    public static final String NOTE = "note";

    public static final String CREATED_DATE = "created";

    public static final String MODIFIED_DATE = "modified";

    ```


