  trans: '# 第 8 章：在 Core Data 中使用 SQLite（iOS 和 OS X）


    ![](img/index-75_1.jpg)


    **图 8-1.** 向你的项目中添加一个新的数据模型


    > **注意：** 数据模型编辑器内置于 `Xcode` 中，这是苹果项目的集成开发环境。本章假设你了解 `Xcode` 的基础知识。如果还不了解，请访问
    `developer.apple.com` 查找文档并下载 `Xcode`。它也可以在 Mac App Store 中免费获取。


    你从一个空的数据模型开始，如图 8-2 所示。


    ![](img/index-76_1.jpg)


    **图 8-2.** 从一个新的数据模型开始


    Core Data 模型编辑器的中心区域让你可以创建数据模型。编辑器有两种样式可供使用：*表格样式* 和 *图形样式*（本节稍后会看到两种样式）。当你处理数据模型时，编辑窗口右侧会有一个数据模型检查器。它将包含你在
    Core Data 模型编辑器中所选内容的相关数据。（在图 8-2 的情况下，没有选中任何具有附加信息的内容。）


    在数据模型编辑器的左侧，你可以管理三组对象。


    -   **实体** 在后台是 `SQLite` 表。

    -   **获取请求** 是类似于你可以在 `SQLite` 中创建的预定义查询。它们可以包含在查询时被替换的变量。

    -   **配置** 在内部使用。对于基本开发，你不需要做任何事情，因为默认配置就能工作。


    要向 Core Data 模型编辑器添加新对象，你可以使用窗口左下角的 `+` 按钮。`+` 旁边的小向下三角形让你可以选择添加实体、获取请求或配置。你的选择会保持有效——这意味着在你选择添加获取请求后，`+`
    将会继续添加其他获取请求，直到你更改默认值。


    ![](img/index-77_1.jpg)


    ## 使用实体


    添加新实体后，它将出现在编辑窗口的中心，包含三个部分（参见图 8-3）：


    -   **属性** 在后台是 `SQLite` 列。

    -   **关系** 是你习惯的 `SQL` 中的逻辑关系。在 Core Data 中，它们有一个根本性的区别，这将在本章后面的“管理关系”中解释。

    -   **获取属性** 允许你从不同的持久存储中获取属性。它们面向高级用户，本 Core Data 入门介绍中不涉及。


    **图 8-3.** 添加一个新实体


    实体最重要的一个方面或许是，当你在运行时获取它时，它是作为 `NSManagedObject`（或其子类）的实例被获取的。作为该获取的结果，实体成为一个类实例，其属性成为该实例的属性。你将在第
    [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9) 章看到如何创建子类。


    ![](img/index-78_1.jpg)


    > **注意：** 实际上，当你使用 Core Data 获取对象时，它最初是作为 *故障* 被获取的。这不是一个错误。它代表了 Core Data 为继续执行所需的绝对最小信息量。基本上，它是一个
    `NSManagedObject` 或其子类的实例，但持久化属性尚未填充。这意味着你可以以某些方式使用它，但当你真正需要数据时，故障会 *触发*，然后数据被填充进去。当故障已触发且数据已填充后，故障被认为是
    *已实现*。这发生在后台，因此除了查看调试信息时，在 Core Data 的上下文中，“故障” 并不表示错误。故障机制是 Core Data 优化性能的方式之一。'
- fmt: 'When you select an entity in the sidebar, you see its details in the center
    of the editing window. You can add new attributes using the `+` below the attributes
    table. Initially, each attribute will have a placeholder name such as `attribute`
    or `attribute1`. To add details to your entity (or to any other object selected
    in the Core Data model editor), select it and open the Data Model inspector at
    the right of the window as shown in Figure 8-4.


    **Figure 8-4.** Use the Data Model inspector


    You can rename the entity. You can also provide additional details that are useful
    in using it with your code. There are more details on this topic in Chapters 9
    and 10.


    # Chapter 8 ■ Using SQLite with Core Data (iOS and OS X)


    ## Working with Attributes


    You can (and should) rename your attributes using meaningful names. (See sidebar
    “Naming Core Data Model Objects.”)


    ### Naming Core Data Model Objects


    By convention, Core Data entity names begin with a capital letter. Furthermore,
    they are typically singular. Thus, an entity that keeps track of users would typically
    be called `User` and an entity that keeps track of scores for users would typically
    be called `Score`.


    If you have a `to-many` relationship from `User` to `Score` so that one user can
    have many scores, the *relationship* is named `scores` (plural).


    These have been conventions for some time in Core Data (and they’re not unlike
    conventions and best practices in other environments). With Xcode Core Data, this
    convention has become a requirement: you can’t name an entity `user` (lowercase),
    and you can’t name an attribute in that entity to `Name` (uppercase).


    Note that although the Core Data conventions are similar to conventions in other
    environments, that similarity extends to the existence of standards for capitalization,
    number (plural/singular), and so forth. The details such as whether or not to
    capitalize do vary.


    Each attribute must have a type. The types that are available in Core Data are
    as follows:


    *   `Integer16`, `Integer32`, and `Integer64`

    *   `Decimal`

    *   `Double`

    *   `Float`

    *   `String`

    *   `Boolean`

    *   `Binary Data`

    *   `Transformable`


    There is an initial `Undefined` value, but when you try to save the data model,
    you’ll be required to change it to an appropriate value.


    ![](index-80_1.jpg)


    # Chapter 8 ■ Using SQLite with Core Data (iOS and OS X)


    > **Tip** These types apply to Core Data no matter what data management tool you
    use to manage its persistent stores. If you compare this list to the list of types
    in SQLite, you can see that because these types don’t provide a one-to-one match
    to SQLite types, Core Data itself must provide the mapping. In practice, this
    means that type checking is done in Core Data, and it is stricter than SQLite
    libraries alone where one of the guiding principles is that “any column can still
    store any type of data” (http://www.sqlite.org/datatype3).


    The `Transformable` data type is just what its name implies: you can transform
    one type to another. It’s typically used to store data types such as images and
    other resources that can be stored as a generic data type and then used by the
    app directly as the resource type with Core Data providing the transformation
    in both directions behind the scenes.


    Figure 8-5 shows attributes and their types for an entity. Note that when first
    created, it is called `Entity`. You can rename it by double-clicking it in the
    sidebar.


    **Figure 8-5.** Name and set the type for each attribute


    ## Managing Relationships


    When you design a relational database, you set up relationships among your data
    objects.


    There are many ways of drawing these relationships on paper, on white boards,
    or in various graphical relational data editors. These relationships are implemented
    in queries when you write a clause such as


    `WHERE department.employee_name = corporate.manager_name`


    ![](index-81_1.jpg)


    # Chapter 8 ■ Using SQLite with Core Data (iOS and OS X)'
