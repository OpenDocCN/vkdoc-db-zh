- fmt: "# Structuring a Core Data App with Objective-C\n\nIf you’re coming from another\
    \ language, the square brackets and the use of `nil` (and the necessity of initializing\
    \ pointers properly) may be the two biggest changes you have to get used to when\
    \ referring to Core Data objects which may or may not exist (the nature of databases,\
    \ like that of networks, means that you can’t rely on things being in existence).\n\
    \nThe basic Core Data stack (`persistentStoreCoordinator`, data model, and `managedObjectContext`)\
