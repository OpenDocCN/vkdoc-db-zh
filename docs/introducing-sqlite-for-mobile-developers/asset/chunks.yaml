    ## Creating a Fetch Request in iOS


    In iOS, the standard practice is to create the Core Data stack in the app delegate
    as shown previously in this chapter in "Structuring a Core Data App." In addition
    to the Core Data stack, you typically use fetch requests to fetch data from the
    persistent store into the managed object context. (On OS X, you use binding instead
    of view controllers and fetch requests.)


    This code is fairly common. Here, it is used to fetch all entities with a given
    name (`Event`). The entity description is retrieved from the managed object context
    (the line is shown in bold) and the fetched results controller is created with
    a reference to that managed object context. A backing variable for the `fetchedResultsController`
    is created with the name `_fetchedResultsController`. This design pattern is frequently
    used: if the backing variable (starting with the underscore) exists, it is returned
    on request. If it does not exist, the fetched results controller is created and
    the underscore backing variable is set to it for the next time it’s needed.


    ```swift

    var fetchedResultsController: NSFetchedResultsController {

    if _fetchedResultsController != nil {

    return _fetchedResultsController!

    }

    let fetchRequest = NSFetchRequest()

    // Edit the entity name as appropriate.

    let entity = NSEntityDescription.entityForName("Event", inManagedObjectContext:
    self.managedObjectContext!)

    fetchRequest.entity = entity

    // Set the batch size to a suitable number.

    fetchRequest.fetchBatchSize = 20

    // Edit the sort key as appropriate.

    let sortDescriptor = NSSortDescriptor(key: "timeStamp", ascending: false)

    fetchRequest.sortDescriptors = [sortDescriptor]

    // Edit the section name key path and cache name if appropriate.

    // nil for section name key path means "no sections".

    let aFetchedResultsController = NSFetchedResultsController(fetchRequest: fetchRequest,
    managedObjectContext: self.managedObjectContext!, sectionNameKeyPath: nil, cacheName:
    "Master")

    aFetchedResultsController.delegate = self

    _fetchedResultsController = aFetchedResultsController

    do {

    try _fetchedResultsController!.performFetch()

    } catch {

    // Replace this implementation with code to handle the error appropriately.

    // abort() causes the application to generate a crash log and terminate.

    // You should not use this function in a shipping application, although it may
    be useful during development.

    print("Unresolved error \(error), \(error.userInfo)")

    abort()

    }

    return _fetchedResultsController!

    }

    var _fetchedResultsController: NSFetchedResultsController? = nil

    ```


    If you have created a fetch request in your data model as described in Chapter
    8, you can use it to create a `fetchedResultsController`.


