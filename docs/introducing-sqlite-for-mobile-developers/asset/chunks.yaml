  raw: 'The basic Core Data stack (persistent store coordinator, data model, and managed
    object context) typically is placed in a location that is available throughout
    the app. The most common case (used in Master-Detail Application and Single View
    Application templates built into Xcode) places the Core Data stack in AppDelegate.
    AppDelegate typically creates views and other objects within the app. If they
    will need parts of the Core Data stack, AppDelegate passes them down to the views
    either when they are created or when AppDelegate is managing them after they have
    been created by others.


    Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os X) Passing a Managed
    Object Context to a View


    Controller in iOS


    Here is how the Master-Detail Application template for iOS passes the managed
    object context to the view. (As is the case with Apple’s code samples and much
    new code that’s written today, this is Swift code.)


    func application(application: UIApplication,


    didFinishLaunchingWithOptions


    launchOptions: [NSObject: AnyObject]?) -> Bool {


    // Override point for customization after application launch.


    let splitViewController = self.window!.rootViewController


    as! UISplitViewController


    let navigationController =


    splitViewController.viewControllers[splitViewController.


    viewControllers.count-1]


    as! UINavigationController


    navigationController.topViewController!.navigationItem.leftBarButtonItem =


    splitViewController.displayModeButtonItem()


    splitViewController.delegate = self


    let masterNavigationController = splitViewController.viewControllers[0]


    as! UINavigationController


    let controller = masterNavigationController.topViewController


    as! MasterViewController


    **controller.managedObjectContext = self.managedObjectContext**


    return true


    }


    The views are created from a storyboard, and this code starts from the basic window
    and steps down until it finds the navigation controller at the left of the split
    view controller. From there, it steps down to the MasterViewController inside
    the navigation controller. Having gotten that controller, it then sets the managedObjectContext
    property of MasterViewController to the managedObjectContext created in the Core
    Data stack in AppDelegate (that is the line of code shown in bold). This is the
    standard way of doing this.


    You can also get to the Core Data stack by finding the app delegate and then accessing
    one of the stack objects from inside the AppDelegate. This breaks the idea of
    encapsulation because you’re looking inside the app delegate. However, you’ll
    find some sample code that does this in various places, and a (weak) argument
    can be made for doing it this way if you only rarely—like once—need to access
    the stack. Here’s the code for this other way of getting to the stack.


    let appDelegate = UIApplication.sharedApplication().delegate as! AppDelegate


    // use appDelegate.managedObjectContext or some other stack property


