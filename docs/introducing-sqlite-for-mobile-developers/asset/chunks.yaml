    \ fetchRequest] entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription\
    \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
    \    NSError *error = nil;\n    if (![context save:&error]) {\n        NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
    }\n```\n\nYou use this code (or code very much like it) whenever you create a\
    \ new `NSManagedObject`. The beginning of this code just locates the managed object\
    \ context. It might be a property in the class you’re working with. If it isn’t\
    \ you may need to add a local property which is created (or passed through) when\
