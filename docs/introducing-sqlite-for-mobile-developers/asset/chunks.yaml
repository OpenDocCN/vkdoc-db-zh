    当你在侧边栏中选择一个实体时，其详细信息会显示在编辑窗口的中央。你可以使用属性表下方的 `+` 按钮来添加新属性。初始时，每个属性会有一个占位符名称，如 `attribute`
    或 `attribute1`。要为你的实体（或在 Core Data 模型编辑器中选择的任何其他对象）添加详细信息，请选中它，然后打开窗口右侧的数据模型检查器，如图
    8-4 所示。


    **图 8-4.** 使用数据模型检查器


    你可以重命名实体。你还可以提供一些在代码中使用时有用的附加详细信息。有关此主题的更多详细信息，请参见第 9 章和第 10 章。


    # 第 8 章 ■ 在 iOS 和 OS X 中使用 Core Data 与 SQLite


    ## 处理属性


    你可以（并且应该）使用有意义的名称来重命名你的属性。（参见侧边栏“命名 Core Data 模型对象”。）


    ### 命名 Core Data 模型对象


    按照惯例，Core Data 实体的名称以大写字母开头。此外，它们通常是单数形式。因此，一个跟踪用户的实体通常被称为 `User`，而一个跟踪用户分数的实体通常被称为
    `Score`。


    如果你在 `User` 和 `Score` 之间有一个`对多`关系，使得一个用户可以有多个分数，那么该*关系*被命名为 `scores`（复数形式）。


    这些在 Core Data 中已经是一段时间内的惯例（并且它们与其他环境中的惯例和最佳实践并无不同）。在 Xcode Core Data 中，这个惯例已成为一项要求：你不能将实体命名为
    `user`（小写），也不能将该实体中的属性命名为 `Name`（大写）。


    请注意，尽管 Core Data 的惯例与其他环境中的惯例相似，但这种相似性仅限于存在大小写、单复数等标准。是否要大写等具体细节是存在差异的。


    每个属性都必须有一个类型。Core Data 中可用的类型如下：


    *   `Integer16`、`Integer32` 和 `Integer64`

    *   `Decimal`

    *   `Double`

    *   `Float`

    *   `String`

    *   `Boolean`

    *   `Binary Data`

    *   `Transformable`


    存在一个初始的 `Undefined` 值，但当你尝试保存数据模型时，将被要求将其更改为适当的值。


    ![](img/index-80_1.jpg)


    # 第 8 章 ■ 在 iOS 和 OS X 中使用 Core Data 与 SQLite


    > **提示** 无论你使用何种数据管理工具来管理其持久存储，这些类型都适用于 Core Data。如果将此列表与 SQLite 中的类型列表进行比较，你可以看到，由于这些类型并未与
    SQLite 类型提供一一对应的关系，Core Data 本身必须提供映射。在实践中，这意味着类型检查是在 Core Data 中完成的，并且比单独的 SQLite
    库更严格，后者的一个指导原则是“任何列仍然可以存储任何类型的数据”（http://www.sqlite.org/datatype3）。


    `Transformable` 数据类型正如其名：你可以将一种类型转换为另一种类型。它通常用于存储诸如图像和其他资源之类的数据类型，这些资源可以存储为通用数据类型，然后由应用程序直接作为资源类型使用，Core
    Data 在幕后双向提供转换。


    图 8-5 显示了一个实体的属性及其类型。请注意，首次创建时，它被称为 `Entity`。你可以通过双击侧边栏中的它来重命名。


    **图 8-5.** 为每个属性命名并设置类型


    ## 管理关系


    当你设计关系数据库时，需要在数据对象之间建立关系。


    在纸上、白板上或各种图形化关系数据编辑器中绘制这些关系的方式有很多种。当你编写诸如


    `WHERE department.employee_name = corporate.manager_name`


    这样的子句时，这些关系在查询中实现。


    ![](img/index-81_1.jpg)


    # 第 8 章 ■ 在 iOS 和 OS X 中使用 Core Data 与 SQLite

