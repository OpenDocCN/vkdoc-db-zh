- fmt: "In Core Data, relationships are part of the data model. Core Data manages\
    \ them (it generates the `WHERE` clauses as needed). This means you don’t have\
    \ to write the `WHERE` clauses yourself (in part because you don’t write SQLite\
    \ syntax yourself so there’s no place to write them). Once you have two entities\
    \ created in your data model, you can build a relationship between them using\
    \ the Xcode Core Data model editor. (Yes, you can create self-joins within a single\
    \ table, but that’s a more advanced topic.) The easiest way to create a relationship\
    \ is to switch to the graph style (using the `Editor Style` controls at the lower\
    \ right of the editing area). You may have to rearrange the entities so that it’s\
    \ easy to see the two you care about at the same time. Then, control-drag from\
    \ one entity to the other as shown in Figure [8-6.](#index_split_000.html#81)\n\
    \n***Figure 8-6.** Create a relationship*\n\nNew relationships are given default\
    \ names: double-click to change the name. You need to specify details of the relationship,\
    \ so open the `Data Model` inspector at the right of the window as shown in Figure\
    \ [8-7](#index_split_000.html#82). This is another place to change a relationship\
    \ name rather than double-clicking it in the table or graph editor.\n\n![](index-82_1.jpg)\n\
    \n![](index-82_2.jpg)\n\nChapter 8 ■ Using sQLite with Core Data (ios anD os X)\n\
    \n***Figure 8-7.** Refine your relationships*\n\nRelationships are bidirectional,\
    \ but you configure each side of the relationship in the graph view and then modify\
    \ it in the `Data Model` inspector. Figure [8-7](#index_split_000.html#82) shows\
    \ the `scores` relationship highlighted. The most important item in the `Data\
    \ Model` inspect is the `name`. You can change it here or by double-clicking it\
    \ in the graph view.\n\nYou frequently want to change the `Type` setting, switching\
    \ between `To One` and `To Many`. As you do, you’ll see the arrows at the end\
    \ of the relationship change from single to double arrows (this is standard relational\
    \ diagram notation). `Type` is sometimes referred to as *cardinality*.\n\nFigure\
    \ [8-8](#index_split_000.html#82) shows a new relationship from `User` to `Score`\
    \ that is a to-many relationship (note the double arrows); the inverse is a to-one\
    \ relationship (note the single arrow on the `User` side).\n\n***Figure 8-8.**\
    \ Specify the cardinality of relationships*\n\n![](index-83_1.jpg)\n\nChapter\
    \ 8 ■ Using sQLite with Core Data (ios anD os X)\n\nIn configuring relationships,\
    \ people often switch back and forth between the graph view and the table view\
    \ using the control at the bottom right of the window. Figure [8-9](#index_split_001.html#83)\
    \ shows the table view.\n\n***Figure 8-9.** Use the table view for relationships*\n\
    \nDelete rules let you specify what happens when you try to delete one end of\
    \ the relationship. In brief, you can specify that deleting the source of a relationship\
    \ can have any of these outcomes:\n\n- **Cascade**. Deleting one end of the relationship\
    \ deletes all related objects.\n- **Nullify**. Deleting one end of the relationship,\
    \ causes references to it in the remaining object(s) to be set to `null`.\n- **Deny**.\
    \ You can’t delete one end of the relationship. You have to work your way up to\
    \ it by deleting the child objects so that there are no related objects left,\
    \ but you must write your own code to implement that.\n- **No Action**. You can\
    \ delete one end of the relationship even if it creates dangling pointers.\n\n\
    Chapter 8 ■ Using sQLite with Core Data (ios anD os X)\n\n## Summary\n\nThis chapter\
    \ provides an introduction to Core Data, the framework that implements access\
    \ to SQLite for OS X, iOS, watchOS, and tvOS. You’ve seen how to build your data\
    \ model using Xcode Data Model editor, and how to build relationships that are\
    \ implemented for you when Core Data creates the appropriate `WHERE` clauses in\
    \ the `SELECT` statements it produces and runs.\n\nCompared to PHP and Android,\
    \ this aspect of SQLite data modeling is much more graphical than text oriented.\
    \ However, if you like writing traditional code, have no fear. Chapters [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)\
    \ and [10](http://dx.doi.org/10.1007/978-1-4842-1766-5_10) show the Objective-C\
    \ and Swift code to implement your SQLite data model.\n\n## Chapter 9: Using SQLite/Core\
    \ Data with Swift (iOS and OS X)\n\nAfter looking at the Xcode Core Data model\
    \ editor which lets you build your Core Data environment graphically, it’s time\
    \ to move to the code that implements it. Core Data wraps the persistent store,\
    \ which in many cases is the built-in SQLite library for OS X, iOS, watchOS, and\
    \ tvOS.\n\nThis chapter looks at the Core Data stack—the objects that do the work\
    \ in all cases. It also looks at the specific objects that you may use in implementing\
    \ your own app.\n\nThe SQLite syntax that is exposed in other environments is\
    \ still working here, and, as you saw in Chapter [8, in the dis](http://dx.doi.org/10.1007/978-1-4842-1766-5_8)cussion\
    \ of data types, SQLite is doing the work.\n\n### Looking at the Core Data Stack\n\
    \nThe Core Data stack is a set of three objects that work together to provide\
    \ functionality. They are as follows:\n\n- **Managed Object Model**. This is what\
    \ you saw built graphically in Chapter [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8).\
    \ It’s very similar to what is often referred to as a database schema. (A schema\
    \ is described in a formal language rather than graphically.) Remember that relationships\
    \ are explicitly defined in a Core Data data model whereas in SQLite (and in SQL\
    \ in general) the relationships are implemented in the `WHERE` clauses that you\
    \ write.\n- **Persistent Store Coordinator**. Each SQLite table is usually represented\
    \ as a persistent store in Core Data. This one-to-one correspondence of persistent\
    \ store and database table is sufficient in most cases. However, you can have\
    \ multiple persistent stores to improve performance or provide other optimizations.\
    \ As far as the Core Data stack is concerned, one of the three key elements is\
    \ a persistent store coordinator which coordinates all of the persistent stores\
    \ for a given Core Data app.\n  In most cases, the persistent store coordinator\
    \ handles a single persistent store. However, the full name (persistent store\
    \ coordinator) is still used because in more complex solutions the persistent\
    \ store coordinator does actually manage several persistent stores. It is the\
    \ persistent store coordinator and its persistent stores that do the transformation\
    \ from the flat SQLite database file to the objects that you work with in your\
    \ Core Data app. Accordingly, there are options you use when you create a persistent\
    \ store that specify what the underlying data is (XML on OS X, SQLite on any of\
    \ the platforms, in-memory stores, and others that may be created in the future).\
    \ The defined store types are `NSSQLiteStoreType`, `NSXMLStoreType` (OS X), `NSBinaryStoreType`\
    \ (OS X), and `NSInMemoryStoreType` (OS X).\n- **Managed Object Context.** A managed\
    \ object context is like a scratch pad: it contains data that has been retrieved\
    \ from a persistent store and that has (perhaps) been modified by your app. When\
    \ you are finished with modifications, you save the managed object context. If\
    \ you want to cancel the operation, you simply destroy the managed object context.\n\
    \nThe Core Data stack consists of these three objects, and they relate to one\
    \ another to create a single entity.\n\n### Fetching Data to the Core Data Stack\n\
    \nFetch requests can be created in Xcode Core Data model editor or in your code.\
    \ They retrieve data from a persistent store (through a persistent store coordinator)\
    \ and place it in a managed object context. Fetch requests are not part of the\
    \ Core Data stack, and that fact is reflected in the standard architecture for\
    \ Core Data (described in the following section).\n\n### Structuring a Core Data\
    \ App"
