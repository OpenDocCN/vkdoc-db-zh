    ```objective-c

    [newManagedObject setValue:@"New User" forKey:@"name"];

    ```

    如果为属性设置的值无效，托管对象上下文的保存将会失败。特别是在 Xcode 数据模型编辑器中声明了验证规则时，这种情况更容易发生。在完善验证规则之前，您可能需要适当地处理错误。（当然，如果允许用户输入，可能会发生大量用户生成的错误。）


    ■ **提示** 如果您真的想深入了解 Core Data，请研究幕后必须生成的 SQLite 语法以实现此处展示的代码。它确实会被执行，但您无需手动输入。


    ## 使用 NSManagedObject 的子类


    您可以创建 `NSManagedObject` 的子类，而不是直接使用 `NSManagedObject` 实例。如果您创建子类（过程将在下文描述），主要好处是，您可以使用如下代码为
    `newManagedObject` 设置值，而不是像上一节那样使用键值编码 `setValue:forKey:`：


    ```objective-c

    newManagedObject.name = "New User"

    ```


    使用 Xcode Core Data 模型编辑器可以轻松创建 `NSManagedObject` 的新子类。以下是涉及的步骤。从打开的数据模型开始，如图 10-1
    所示。（查看图表视图还是表格视图并不重要。）选择“编辑器” ➤ “创建 NSManagedObject 子类”以打开如图 10-2 所示的窗口。


    ![选择数据模型](index-125_1.jpg)


    ***图 10-2. 选择您的数据模型***


    单击“下一步”后，选择要子类化的实体，如图 10-3 所示。默认情况下，在图表或表格视图中选中的实体（如图 10-1 所示）会在此处被选中。您不必为所有实体创建子类。有时，您会选择为更复杂的实体创建子类，而将其他实体保留为
    `NSManagedObject` 实例。


    ![选择实体步骤1](index-126_1.jpg)


    ![选择实体步骤2](index-126_2.jpg)


    ***图 10-3. 选择要子类化的实体***


    单击“下一步”，选择保存新文件的位置，如图 10-4 所示。同时选择子类文件的编程语言。（您可以混合使用 Swift 和 Objective-C。）


    ***图 10-4. 选择保存子类文件的位置和所需语言***


    ![选择保存位置和语言](index-127_1.jpg)


    您应仔细检查组（用于导航器）和目标，但通常它们都是正确的。“使用标量属性”选项需要稍作解释。默认情况下，您的实体属性会使用原生 Cocoa 或 Cocoa
    Touch 类型转换为 Swift 或 Objective-C 属性。因此，`Double` 会被转换为 `NSNumber`。`NSNumber` 是比
    `Double` 强大得多的构造（首先，它是一个类）。如果您大量使用此类属性，有时 `NSNumber` 的强大功能反而会带来不便。选择使用标量类型将使用基本的平台（非对象）类型，这可能会使您的代码更简单。


    如果您的项目主要用 Swift 编写，而您选择用 Objective-C 创建子类，系统可能会询问您是否要在两种语言之间创建桥接头文件，如图 10-5 所示。是的，您需要这样做。


    ***图 10-5. 您可以选择创建桥接头文件***


    在混合语言项目中，如果没有被询问关于桥接头文件，请不要担心。它只需要创建一次，因此第一次之后就不会再被询问。


    桥接头文件会在您的项目构建设置中为您创建，如图 10-6 所示。您无需进行任何进一步操作。


    ![包含桥接头的构建设置](index-128_1.jpg)


    ***图 10-6. 包含桥接头的构建设置***


    如果您创建的是 Objective-C 子类，Xcode 将为您选择的每个实体创建两个文件。与 Swift 不同，它们将是头文件（.h）和实现文件（.m）。


    第一个是接口文件，如下所示：


    ```objective-c

    #import "User.h"


    NS_ASSUME_NONNULL_BEGIN


    @interface User (CoreDataProperties)


    @property (nullable, nonatomic, retain) NSString *email;


    @property (nullable, nonatomic, retain) NSString *name;


    @property (nullable, nonatomic, retain) NSSet<NSManagedObject *> *scores;


    @end


    @interface User (CoreDataGeneratedAccessors)


    - (void)addScoresObject:(NSManagedObject *)value;


    - (void)removeScoresObject:(NSManagedObject *)value;


    - (void)addScores:(NSSet<NSManagedObject *> *)values;


    - (void)removeScores:(NSSet<NSManagedObject *> *)values;


    @end


    NS_ASSUME_NONNULL_END

    ```


    这与 Swift 中的扩展文件不同。首先，它被 `NS_ASSUME_NONNULL_BEGIN` 和 `NS_ASSUME_NONNULL_END` 包裹。这些宏实现了
    Objective-C 中的一个特性，该特性会反馈到 Swift 中。在带有这些括号的节内，所有指针都被假定为非空（`non-null`），因此在代码中依赖此假定是安全的。（从
    Swift 使用时，这些属性将被转换为使用 `!` 的强制解包属性。）在 `.h` 文件内部，您将看到类别 `CoreDataProperties` 的属性声明，其中声明了
    `User` 实体的两个属性（`email` 和 `name`）。关系（`scores`）以 `NSSet` 的形式呈现。请注意，由于此节被括号标记为非空，因此属性需要显式标记为可空（`nullable`）。


    这看起来可能是自相矛盾的，但随着代码的增长，您会发现将可空性作为例外而非默认值，会使您的代码更简洁、更健壮。


    配套的 `.m` 文件如下所示：


    ```objective-c

    #import "User+CoreDataProperties.h"


    @implementation User (CoreDataProperties)


    @dynamic email;


    @dynamic name;


    @dynamic scores;


    @end

    ```


    `@dynamic` 表示承诺该属性将在运行时（当从持久存储中检索时）被填充。


    这就是在 Objective-C 中创建 `NSManagedObject` 子类的全部过程。


    ■ **注意** 要了解如何使用您的子类，请参见第 12 章。


    ## 总结


    本章向您展示了如何在 OS X 和 iOS 上使用 Objective-C（Cocoa 和 Cocoa Touch 的原始语言）来使用 SQLite/Core
    Data。


    ## 第 11 章：在 PHP 网站中使用简单数据库


    本书是关于 SQLite 的入门介绍，但即使只是入门，SQLite（以及作为其关键组件的 SQL 本身）的基础知识也并非特别复杂。


    确实，当您开始构建功能越来越多（以及越来越健壮的错误检查）的复杂应用时，您的代码会变得更长、更复杂。对许多人来说，关系数据库世界具有吸引力的地方在于，基本元素就是基础。您以各种组合方式使用和重用它们来构建越来越强大的应用。


    《SQLite 入门指南》的最后两章为您提供了两个基于 SQLite 构建的应用。在本章中，您将看到如何在 SQLite 上构建一个基于 PHP 的应用，在第
    12 章中，您将看到如何为 iOS 构建一个大致可比的应用。'
