    Implementing the PHP Web Site


    Because the web is designed as a state-less structure, each web page is self-contained.


    Today, there are many strategies for building continuity into web sites, not the
    least of which are PHP sessions, cookies, or passing data from one PHP page to
    another (often with a POST request), but basically each page is still a state-less
    entity. That means that when you go to a page (i.e., when you run the PHP code
    that generates the page), the page is generated from data that’s in the PHP file
    and, possibly, retrieved from a database.


    In the typical pattern, the user clicks a button or uses another interface element
    to load a new page from PHP code. In order to do this, key data is passed from
    the first page to the second, or, as noted, relevant data may be cached in cookies
    or passed in parameters.


    ■ **Note** the example used here is called phpsql. the various files are numbered
    1, 2, and 3\. if you are reading on a mobile device, depending on the font you
    are using, it may not be clear that the file names are a combination of phpsql
    followed by a number. in some fonts, it may look like phpsq followed by a two-digit
    number (the letter l sometimes looks like number 1).


    Chapter 11 ■ Using the simple Database with a php web site


    Thus, there are three PHP files used in this example.


    •


    phpsql1.php builds the page shown in Figure [11-3](#index_split_001.html#134).
    It uses a SQLite database call to retrieve the values for the drop-down


    menu. When you click Submit, key values (in this case, the


    selected user) are passed on to the next page.


    •


    phpsql2.php builds the page shown in Figure [11-4](#index_split_001.html#135).
    It receives the selected user and then queries the database to get the value


    for the user. As you’ll see, this query joins Table [11-1](#index_split_001.html#131)
    (User) and Table [11-2](#index_split_001.html#131) (Score). The name comes from
    User and the score comes from Score. This join is handled by matching rowid in
    User


    to userid in Score (you’ll see this later in this chapter). If you click


    the Add a score button, control passes to the next page.


    •


    phpsql3.php adds data for the user selected in Figur[e 11-3](#index_split_001.html#134).


    In order for this to happen, phpql2.php passes the selected


    userid/rowid to phpsql3.php. Because User and Score have been'
