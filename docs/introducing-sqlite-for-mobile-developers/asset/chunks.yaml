    Over time, conditions change, users have suggestions, and the Power That Be (whoever
    that (or “they”) may be in your life) decides to change the rules for employment,
    cars, the conditions that apply to license plate numbers, or any other things
    that strike his or her fancy.


    The code that took only a few lines of code and a couple of minutes to write needs
    to be rewritten. And, although there is no clear research on the matter, it seems
    that these changes take place at the last minute before a product (or version)
    launch and they must be done immediately.


    Parlez-vous Python? Sprechen Sie Scala?


    The line or two that implement the rules for one of the data conditions may have
    been written by someone who’s no longer around. Even if you wrote them, time may
    have passed and you may not remember exactly what you were trying to implement
    (yes, commenting your code is a desirable feature, but life happens . . .)


    Those few lines of code may have been modeled on some code from a friend that
    does exactly (or almost) what you want. Maintaining even the best-written code
    is a challenge for everyone involved from the first author to the updater to the
    manager and—eventually the user or manager who asks for “just a little tweak.”


    Today, databases are remarkably standardized in their structure—perhaps more so
    than almost any other concept in the world of information technology. The idea
    of a relational database was first proposed in 1970 by Edgar Codd, of IBM’s San
    Jose Research Laboratory, and his proposal has become the basis for modern database
    implementations (see article titled “A Relational Model of Data for Large Shared
    Data Banks,” Communications of the `ACM`, `13(6)`, `377–387` (June 1970)).


    In 1974, Donald D. Chamberlin and Raymond F. Boyce (also from `IBM`) wrote a paper
    titled “SEQUEL: A Structured English Query Language” for the `ACM` (Association
    for Computing Machinery) `SIGFIDET` Workshop on Data Description, Access and Control.


    The relational model (proposed by Codd), together with `SQL`, has become the basis
    for modern database implementations. Books by `C. J. Date` and others together
    with Codd’s original work on the relational model remain the cornerstones of relational
    database theory today.


    > **Note**: The name `SQL` is derived from `SeQUeL` which turned out to be a trademark
    of the Hawker Siddeley aircraft company. Today, many people suggest that `SQL`
    is not an abbreviation or acronym but is a name in and of itself. Others suggest
    that `SQL` is an acronym for Structured Query Language.


    The basic concepts of `SQL` are few. You can visualize them by thinking of a spreadsheet
    with its rows and columns. (You can also conceptualize them using mathematical
    set theory and other concepts, but spreadsheets are easier for many people to
    think about today.)


    Following are the basic `SQL` concepts:


    *   **Table**. A table is much like a simple spreadsheet with rows and columns.
    (It’s not like a complex spreadsheet that may include several tables. For this
    discussion, think simple—just rows and columns in a single table.) A table is
    sometimes referred to as a *relation*, but more often *table* is used.

    *   **Column**. A column represents a single data element such as “address” or
    “name.” In the database world, a column may be called a *field*. In the world
    of programming, a column may be called an *attribute* or *property*.

    *   **Row**. A row represents single observations or set of values with one for
    each column. Thus, a row in this imaginary simple spreadsheet might represent
    a person’s data. In the database world, a row may be called a *record* or *tuple*.


    To retrieve data from a relational database table, you run a *query*. A query
    is a set of logical instructions that manipulate a given table in such a way as
    to retrieve the data that you want. The result of a query is another table. The
    resulting table may be empty (if no data satisfies the query), it may be some
    or all of the data in the table, and, in some complex queries, it may be larger
    than the basic table. The results of a query are sometimes called a *view* or
    a *result set*.


    These concepts and terms apply to most databases today regardless of the language
    in which they are implemented and, perhaps more important, regardless of the database
    engine or database management system (`DBMS`) in which they are implemented.


    Furthermore, databases are sometimes implemented as part of frameworks and languages.
    Thus, in `PHP`, you can use `PDO` (PHP Data Objects) starting with `PHP 5.1` to
    access `SQLite`. For `iOS`, you can use the `Core Data` framework to work with
    `SQLite` and other data managers. In these cases as well as others, the idea has
    been to abstract as much as possible into a framework or other wrapper so that
    switching databases does not require massive rewrites of code.


    `SQLite` implements most of the `SQL` standard. The exceptions are listed here:
    [https://sqlite.org/omitted.html](https://sqlite.org/omitted.html).


    ## Looking Inside a Relational Table and Query


    For the remainder of this chapter and several that follow, we are going to use
    a simple example to learn how to create `SQL` tables and queries. Table `1-1`
    shows a simple table that can be used to demonstrate the basic concepts of `SQL`,
    queries, and relational tables. It shows some data for a few people and their
    country of origin. The names of the columns (fields) are `PK`, `Name`, and `Origin`.
    The values of `Name` are `Cecelia`, `Leif`, and `Charlotte`; the values for `Origin`
    are `Australia`, `Iceland`, and `United States`.


    `Table 1-1. SimpleTable`


    | PK | Name     | Origin       |

    |----|----------|--------------|

    | 1  | Cecelia  | Australia    |

    | 2  | Leif     | Iceland      |

    | 3  | Charlotte| United States|


    > **Note**: In a relational database, the columns have names, but rows are not
    named. In the simple table shown in table `1-1`, the first column (named `PK`)
    has three values: `1`, `2`, and `3`. These values happen to correspond to the
    row numbers, but the sample would work just as well if they were named `Chair`,
    `Tree`, and `15`.


    You can retrieve data from a table by using a query. As noted previously, the
    result of a query is a table—perhaps an empty one, perhaps some of the data of
    the original table, and, in some cases, more data than in the original table.
    This section shows some typical basic queries. In later chapters, you’ll see more
    about queries as well as details about how to structure them. For now, this is
