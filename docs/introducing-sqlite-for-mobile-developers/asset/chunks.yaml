    将你的数据库上传到你的 Web 服务器。它应该在你的桌面 Finder（OS X）或“开始”菜单（Windows）中可见。在此示例中，它被上传到你网站的根目录。


    ## PDO 与旧版 PHP/SQLite 数据库连接'
- fmt: "# Connecting to Your SQLite Database\n\nThere have been two main ways of connecting\
    \ SQLite to your database. The older one is a procedural style, and the newer\
    \ one (since that long-ago year of 2005) is object-based. The PDO extension (PHP\
    \ Data Object) is more robust and a better choice in every case except when you\
    \ are tasked with modifying old PHP code that accesses SQLite databases in the\
    \ older style.\n\nIf you are leary of using object-oriented programming, rest\
    \ assured that `PDO` is indeed object-oriented, but it works very well with standard\
    \ PHP code. You don’t have to convert all of your code to objects and classes:\
    \ you can use `PDO` for your SQLite database and, unless you really know what\
    \ you’re looking for, you may not even realize that you’re using an object.\n\n\
    `PDO` is an extension to SQLite, but the extension is built into the current versions;\
    \ in fact, you need to make an effort to not have it available. It is described\
    \ in this section, although you may find sample code in various places on the\
    \ web, remember that `PDO` is now over ten years old, and it’s the current version.\
    \ You may have difficulties opening older SQLite databases with the older style\
    \ of code. (If you find `sqlite_open` in code you’re looking at, that’s the older—non-`PDO`—style.)\n\
    \nThere are five steps involved and we will discuss them in detail shortly.\n\n\
    1.  **Create a new PDO instance**. It contains the name of the database to which\
    \ you want to connect.\n2.  **Create a query**. It typically is placed in a variable\
    \ called `$query`, but you can use any name you want. The query is created by\
    \ calling the `prepare` method on your `PDO` instance. If it succeeds, it returns\
    \ a `PDOStatement` object.\n3.  **Execute the query**. You do this by calling\
    \ the `execute` method on the query (`PDOStatement`) that you have just created\
    \ as in `$query->execute()`. It returns `TRUE` or `FALSE` but it does not return\
    \ any values to you (yet).\n4.  **Fetch the results from the executed query**.\
    \ (Now you have the data.) The data is typically stored in an array variable called\
    \ `$results`. You can use `$query->fetch()` to fetch the next row of results.\
    \ You can use `$query->fetchAll()` to get an array of all results. Which method\
    \ you choose is up to you and depends on your specific needs (and how much data\
    \ you expect to retrieve). By default, the fetched results are in an associative\
    \ array with elements identified by SQL column names.\n5.  **Use the results of\
    \ the query that you prepared, executed, and then fetched**.\n\nHere are the details\
    \ of each step.\n\nYou start with a PHP file that you want to use to access your\
    \ SQLite with the five steps shown here. If you name this file `phpsql.php` and\
    \ upload it to your web site, you can access it with `http://mywebsite/phpsql.php`.\
    \ The full file is shown later in this chapter.\n\nHere are the relevant components\
    \ in detail.\n\n## 1. Create a New PDO Object\n\nCreate a new `PDO` object and\
    \ place it in a local variable. Often, that variable is named `$sqlite`, but you\
    \ can use any name you want. When you create the new `PDO` object, you must pass\
    \ in the name of the SQLite file, including any paths relative to the location\
    \ on the server where your PHP file is. The quoted name starts with the data source\
    \ name (DSN) `sqlite:`. This is part of the quoted string that includes the file’s\
    \ location.\n\nFollowing is an example:\n```php\n$sqlite = new PDO('sqlite:sqlitephp.sqlite');\n\
    ```\n\nThere is another style you can use. It may or may not be clearer for you\
    \ (and the people who will revise your code in the future). These are interchangeable.\n\
    ```php\n$db = 'sqlite:sqlitephp.sqlphpproject';\n$sqlite = new PDO($db);\n```\n\
    \n> **Note** There are other DSN strings including `mysql`, `pgsql` (postgres),\
    \ `msql`, `sybase`, or `dblib` (SQLServer or Sybase), `odbc`, `ibm` (IBM DB2),\
    \ `informix`, `firebird` (Firebird or Interbase).\n\n### Handle Errors Properly\n\
    \nIt’s a good practice for your users (and for yourself when debugging) to handle\
    \ errors neatly. The `or die` clause does that in a very basic level. You provide\
    \ a string that is displayed. In the case of PHP code generating a web page, the\
    \ quoted string can include HTML formatting as in this example:\n```php\n$sqlite\
    \ = new PDO('sqlite:sqlitephp.sqlite')\nor die (\"<h1>Can't open database</h1>\"\
    );\n```\n\nFor debugging purposes you may want to provide a diagnostic message\
    \ when `or die` doesn’t fail. You can always take these messages out before moving\
    \ to production but they’ll help you follow along with each step to see whether\
    \ or not it succeeds.\n```php\necho \"<p>Success on PDO</p>\";\n```\n\nIt’s better\
    \ ultimately to use a `try/catch` block, but `or die` is more concise and is used\
    \ to simplify the code in this book.\n\n## 2. Create and Prepare the Query\n\n\
    You use the same queries that you use directly in an interactive editor like `sqlite3`\
    \ in any other environment. The only difference with `PDO` is that you create\
    \ the query in a single step before you use it.\n\nHere is an example of creating\
    \ a query, storing it in a variable, and catching failures as well as logging\
    \ successes (the latter only for debugging). Note that you have to use the `prepare`\
    \ method on the instance of `PDO` that you have created — in this case it’s `$sqlite`.\n\
    ```php\n$query = $sqlite->prepare (\"select Name from users;\")\nor die (\"<h1>Can't\
    \ prepare</h1>\");\n\necho \"<p>Success on prepare</p>\";\n```\n\n## 3. Execute\
    \ the Query\n\nNow that you have created a query, with the `prepare` method of\
    \ your `PDO` instance, call the `execute` method on that query to actually run\
    \ it. As usual, catch errors and, for debugging, print out successes as well.\
    \ Here is the code. Note in this example that the `or die` clause doesn’t use\
    \ any specific HTML formatting. That is only to show you that it can be done either\
    \ way.\n```php\n$query->execute() or die (\"Can't execute\");\n\necho \"<p>Success\
    \ on execute</p>\";\n```\n\n## 4. Fetch the Results\n\nThe `execute` method returns\
    \ `TRUE` or `FALSE`, but the data isn’t available until you fetch it. (If you’ve\
    \ used other databases before, you’ll recognize this pattern.) You can get all\
    \ of the rows at once with `fetchAll`, or you can get each one separately with\
    \ `fetch`.\n\nThe `fetch` version gets one row at a time. By default, it returns\
    \ the next row of the results set as an array indexed by column name as well as\
    \ by a zero-relative column number reflecting the items in your SQLite `SELECT`\
    \ statement. There is also an optional `$cursor_offset` parameter which lets you\
    \ jump around in the results set.\n\nThe `fetchAll` version gets all of the data\
    \ at once as an array. You’ll see both `fetchAll` and `fetch` in the following\
    \ step.\n\n## 5. Use the Results\n\nYou loop through the returned array elements\
    \ in your code. In either case, you `echo` the result value(s) in your PHP code,\
    \ combining the returned value with any HTML you want to use. For example, in\
    \ the `fetchAll` scenario, you loop through each returned row, placing each row\
    \ into a local variable (typically called `$row`, but you can use any name you\
    \ want).\n\nHere is the relevant fetching and looping code. (It refers to the\
    \ `Users` table shown previously in Table 6-1.)\n```php\n$result = $query->fetchAll()\
    \ or die (\"Can't fetchAll\");\n\necho \"Success on fetchAll \"; // for debugging\n\
    \nforeach ($result as $row) {\n    echo \"<p>Name: {$row['Name']}</p>\";\n}\n\
    ```\n\nPutting together all of the steps in this chapter you can get a PHP file\
    \ such as the following. Remember to customize it for your database name and the\
    \ column name(s) you want to display. The code to customize is shown in bold.\n\
    \n> **Note** Customize the HTML for the page you want to create, but also see\
    \ Chapter 11, which adds more typically used HTML code that works well with SQLite.\n\
    ```php\n<html>\n<head>\n</head>\n<body>\n<?php\n$sqlite = new PDO('sqlite:**sqlitephp.sqlite**')\n\
