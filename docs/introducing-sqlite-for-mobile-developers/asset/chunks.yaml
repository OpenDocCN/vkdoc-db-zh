  trans: '

    你开始了解 SQL 是如何工作的了。像 `WHERE` 和 `FROM` 这样的基本子句，其语法是反复使用的。这段语法中唯一的新东西是 `UPDATE` 命令，它接受一个表名。这里的其他内容你都已经见过了。


    如果你尝试重新运行上一节中的查询，你会看到 `Users` 和 `Scores` 表中的数据。


    ```

    sqlite> select * from users;

    Rex|rex@champlainarts.com

    Anni|anni@champlainarts.com

    Toby|toby@champlainarts.com


    sqlite> select * from scores;

    Rex|0

    Anni|0

    George|0


    sqlite>

    ```


    如果实际上 George 和 Toby 是两个不同的人，那么数据对不上是正常的。但如果情况是 Toby 决定现在使用他的中间名 George，那么 George
    和 Toby 实际上是同一个人。如何将 Toby 的所有数据转移到 George 名下呢？


    重新输入或者使用 `UPDATE` 是一种处理方法，但更好的方法是利用 SQLite 内置的主键作为*外键*。


    ## 使用外键


    如果你跟着操作了，就可以使用以下语法看到两个表中的 `rowid` 和 `name` 值。对于 `Users` 表，语法如下。表 4-3 显示了数据。


    ```

    sqlite> select rowid, name from users;

    1|Rex

    2|Anni

    3|Toby

    ```


    ### 表 4-3. Users 表


    | rowid | 名称 | 电子邮箱 |

    | :--- | :--- | :--- |

    | 1 | Rex | rex@champlainarts.com |

    | 2 | Anni | anni@champlainarts.com |

    | 3 | Toby | toby@champlainarts.com |


    对于 `Scores` 表，语法如下：


    ```

    sqlite> select rowid, name from scores;

    1|Rex

    2|Anni

    3|George

    ```


    表 4-4 显示了分数。


    ### 表 4-4. Scores 表


    | rowid | 名称 | 分数 |

    | :--- | :--- | :--- |

    | 1 | Rex | 0 |

    | 2 | Anni | 0 |

    | 3 | George | 0 |


    解决方案是使用一个*外键*。外键是一个表中的值，用于标识另一个表中的行。在这个案例中，你希望 `Users` 表中的 `rowid` 3 (Toby) 用于匹配
    `Scores` 表中的 `rowid` 3 (George)。名称虽然不同（George 和 Toby），但你希望这种关联能够生效，以反映他们是同一个人的两个不同值这一事实。


    > **注意**

    > `rowid` 3 是你想要在两个文件之间建立关联的值，这只是基于这些文件构建顺序的偶然结果。本章后面，你会看到这些数字可以有不同的值，但目前，你看到的可能就是这里显示的相同值。


    解决方案是创建一个新列——在数据库领域中通常被称为 `FK` 或 `Foreign Key`（外键）。有时数据库设计师会根据其来源给它命名，例如 `scorekey`
    或 `scoreid`，以及 `userkey` 或 `userid`。因此，如果你查看 `Scores` 表，可能会看到主键或 `rowid`，以及一个独立的
    `userkey`。如果你把 `Users` 表中的 `rowid` 值作为起点（因为那很可能是第一个被创建的表），那么你希望在 `Scores` 表中有一个匹配的
    `userid` 值。


    要给现有表添加一列，你需要使用 `ALTER TABLE` 命令。你需要指定要修改的表名、要添加的列名以及该列的类型。以下是用于创建一个名为 `userid`
    的新列的语法：


    ```sql

    ALTER TABLE Scores ADD COLUMN userid integer;

    ```


    要查看此命令的结果，请在 `sqlite3` 中使用 `.schema` 命令。（因为它是一个 `sqlite3` 命令，所以以句点开头，并且末尾不需要分号。该命令接受一个参数，即你想要查看的表名。）如果你现在运行它，结果如下。你会看到
    `userid` 已经被添加进去了。


    ```

    sqlite> .schema scores

    CREATE TABLE scores (Name char(128),

    score integer

    , userid integer);

    sqlite>

    ```


    现在，你需要为你刚刚添加到 `Scores` 表中的 `userid` 列输入数据。`Scores` 表中的 `userid` 值应该是 `Users` 表中对应记录的值。目前它们碰巧是相同的，但你很快就会改变它们。


    以下是为 `Scores` 表中的 `rowid` 输入数据的语法。基本上，这与你将名称从 Toby 更改为 George 的方式相同。

    '
- fmt: 'sqlite> `update scores set userid = 1 where name = ''Rex'';`


    sqlite> `update scores set userid = 2 where name = ''Anni'';`


    sqlite> `update scores set userid = 3 where name = ''George'';`


    For now, just verify that the data in `Scores` is as shown here (both in SQLite
    and in Table [4-5](#index_split_000.html#48)).


    sqlite> `select rowid, userid, name, score from Scores;`


    1|1|Rex|0

    2|2|Anni|0

    3|3|George|0


    sqlite>


    **Table 4-5.** Scores Table with userid Added


    | Rowid | userid | Name | Score |

    |-------|--------|------|-------|

    | Rex   | Anni   | George |       |


    ## ChApTeR 4 ■ WoRkIng WITh The ReLATIonAL MoDeL AnD SQLITe


    The names in this table are no longer relevant because the relationship between
    `Scores` and `Users` is based on `rowid` in `Users` matching `userid` in `Scores`.
    In SQLite, the `ALTER TABLE` command does not let you drop a column: The recommended
    workaround is to drop the table and create a new one (more appropriately in many
    cases, export the data, import it to a new table, and then drop the old table).
    So, for now you can just ignore the `Name` column in `Scores`. From your perspective,
    `Scores` can look like Table [4-6](#index_split_000.html#49) (even though there’s
    a no-longer-needed column in the actual table).


    **Table 4-6.** Scores Table with userid Added and Name Ignored


    | rowid | userid | Score |

    |-------|--------|-------|

    |       |        |       |


    ### Joining the Tables


    The simplest way to get the data you want is to use a `WHERE` clause to specify
    that you want data where `users.rowid` matches `scores.userid`. (Remember that
    SQLite automatically creates `users.rowid` when you don’t provide a primary key,
    but you must enter the appropriate values of `users.rowid` into the `scores.userid`
    column to make the relationship work.)


    If you have done that (and if you’ve followed the steps in this chapter you have
    done so), the following code will give you what you want:


    sqlite> `select users.name, scores.score from users, scores where users.rowid
    = scores.userid;`


    Rex|0

    Anni|0

    Toby|0


    sqlite>


    There are several important points to notice here:


    - The names come from `Users`; the `Name` field in `Scores` is no longer used.
    For that reason, even though you still may have George as a name in `Scores`,
    `userid` 3, which started out as Toby, is shown as George (assuming it’s the same
    person with just a name change that is correct).

    - Only the matching records are shown. Add some new records to `Users` or `Scores`:
    they won’t show up unless the `rowid` in `Users` matches the `userid` in `Scores`.

    - If a record in `Scores` has no `userid`, it won’t show up.


    ## ChApTeR 4 ■ WoRkIng WITh The ReLATIonAL MoDeL AnD SQLITe


    ### Summary


    You can build on this general structure, just as is, by adding more data. Experiment
    with combinations of new records, and matching and nonmatching ids for users and
    scores.


    Add a `Scores` record for an existing user so that a person has two records but
    with the correct names from `Names`.


    In Chapter [5](http://dx.doi.org/10.1007/978-1-4842-1766-5_5) you’ll explore more
    ways to enhance `SELECT` statements.


    ## Chapter 5 Using SQLite Features—What You Can Do with SELECT Statements


    There’s more to `SELECT` statements than just getting data. In addition to join
    clauses (discussed briefly in Chapter [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)),
    you can order and group data as well as provide intermediate tables for doing
    what, in effect, are subselect operations. If you are used to *procedural programming*
    where you describe each step of a process (do this . . . do that, . . . if this
    is true do the other thing or else do that thing . . .), you may notice that SQL
    and relational databases encourage you to think in *declarative programming* ways
    (get me everything that is X, do something to all the Xs . . .).


    When you are working in the world of declarative programming, the more you can
    put into the declarations the better off you’ll be. Translated into English, this
    means all of the following:


    - Instead of writing code to test for valid data, attempt to enforce the validation
    rules in the database or framework. (The Xcode Core Data model editor takes this
    to a graphical limit.)'
