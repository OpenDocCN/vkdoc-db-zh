  trans: '# 第四章：使用关系模型与 SQLite


    你可以使用之前用过的语法来检索数据。若要从 `Users` 表中获取 `name` 和 `email` 地址，请使用以下代码：


    ***表 4-2.** 分数表*


    **姓名**


    **分数**


    **Rex**


    **0**


    **Anni**


    **0**


    **Toby**


    **0**


    `sqlite> select name, email from users where name = "Anni";`

    `Anni|anni@champlainarts.com`

    `sqlite>`


    你可以用类似的方式从 `Scores` 表中获取 `score`：


    `sqlite> select name, score from scores where name = "Anni";`

    `Anni|0`

    `sqlite>`


    ## 关联表格


    你需要一种方法在单个 `SELECT` 语句中引用两个表（这就是 *别名* 发挥作用的地方）。你还需要实际实现这种关联，而这又涉及到主键。本节将涵盖这两个主题。


    ### 使用别名在 SELECT 语句中标识多个表


    挑战在于将表格和别名结合起来使用。你需要为 Anni 选择数据，但这里有一个问题：`Scores` 和 `Users` 表都有名为 `Name` 的列。如果你使用
    `where name = "Anni"` 这样的条件，SQLite 将无法知道你指的是哪个 `Name` 列。你可以在 `SELECT` 语句中通过标识列来区分这两个列。具体如何标识并不重要，因此你可以这样写：


    ```

    select a.name, email, score

    from users a, scores b

    where a.name = "Anni" and b.name = "Anni";

    ```


    你为每个表使用了一个 *别名*。在 *FROM* 子句中，别名跟在表名后面；在 *SELECT* 和 *WHERE* 子句中，别名位于表名之前，并用句点与表名分隔。因此，在
    `SELECT` 命令和 `WHERE` 子句中，你得到 `select a.name` 和 `where a.name = "Anni"`，而在 *FROM*
    子句中，你得到 `FROM users a`。


    虽然你可以使用任何想要的别名，但如果使用实际名称或其缩写，可以使代码更易于阅读，如下所示：


    ```

    select users.name, email, score

    from users, scores

    where users.name = "Anni" and scores.name = "Anni";

    ```


    含义明确（只在一个表中出现）的名称不需要别名。


    如果你对数据和数据库有较多工作经验，就会认识到这种结构非常脆弱。一切都依赖于两个表中的名称相同。如果任何地方出现拼写错误，数据就无法匹配。即使没有拼写错误，如果名称更改（由于各种现实原因，这确实会发生）会怎样呢？你可能会得到一些使用早期名称的
    `Scores` 记录和另一些使用后期名称的记录。


    在继续探讨这个问题之前，值得看看 SQLite 已经在幕后做了什么：它将帮助你解决因名称更改而出现的问题。


    ### 使用 `rowid` 主键


    在第 [3 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_3)中，讨论了用于唯一标识表中每一行的 **主键**。


    它们在检索数据时非常有用，尤其是在数据本身可能不正确或由于修订或其他情况而与你认为的情况不同时。如果你没有指定主键，SQLite 已经为每个表中的每一行创建了一个唯一的键。它被称为
    *rowid*，你可以在任何你没有提供主键的表中看到它。对于本节所示的 `Users` 表，你可以使用以下代码访问主键：


    ```

    sqlite> select name, rowid from users;

    Rex|1

    Anni|2

    Toby|3

    sqlite>

    ```


    `Scores` 表的代码显示了其主键。


    ```

    sqlite> select name, rowid from scores;

    Rex|1

    Anni|2

    Toby|3

    sqlite>

    ```


    ## 更改一个表中的名称


    为了更改存储在表一行的数据，你需要使用 `UPDATE` 命令。因此，如果你想将数据库中的 Toby 改为 George，你可以使用如下语法：


    ```

    sqlite> UPDATE scores

    ...> SET name = "George"

    ...> WHERE name = ''Toby'';

    ```'
- fmt: 'You’re starting to see how SQL works. The basic clauses such as `WHERE` and
    `FROM` are used over and over again with the same syntax. The only thing that’s
    new in this syntax is the `UPDATE` command which takes a single table name. Everything
    else here you have already seen.


    If you try to rerun the queries from the previous section, you’ll see the data
    from `Users` and `Scores`.


    ```

    sqlite> select * from users;

    Rex|rex@champlainarts.com

    Anni|anni@champlainarts.com

    Toby|toby@champlainarts.com


    sqlite> select * from scores;

    Rex|0

    Anni|0

    George|0


    sqlite>

    ```


    If, in fact, George and Toby are two different people, it’s correct that things
    don’t work properly. But if it’s the case that Toby has decided to go by his middle
    name of George now, George and Toby are actually the same person. How do you move
    all of Toby’s data to George?


    Retyping or using `UPDATE` is one way to handle this, but the better way is to
    use the built-in SQLite primary key as a *foreign key*.


    ## Using a Foreign Key


    If you have followed along, you’ll be able to see the `rowid` and `name` values
    in both tables using the following syntax. For `Users`, here is the syntax. Table
    4-3 shows the data.


    ```

    sqlite> select rowid, name from users;

    1|Rex

    2|Anni

    3|Toby

    ```


    ### Table 4-3. Users Table


    | rowid | Name | E-mail |

    | :--- | :--- | :--- |

    | 1 | Rex | rex@champlainarts.com |

    | 2 | Anni | anni@champlainarts.com |

    | 3 | Toby | toby@champlainarts.com |


    For `Scores`, this is the syntax:


    ```

    sqlite> select rowid, name from scores;

    1|Rex

    2|Anni

    3|George

    ```


    Table 4-4 shows the scores.


    ### Table 4-4. Scores Table


    | rowid | Name | Score |

    | :--- | :--- | :--- |

    | 1 | Rex | 0 |

    | 2 | Anni | 0 |

    | 3 | George | 0 |


    The solution is to use a *foreign key*. A foreign key is a value in one table
    that identifies a row in another table. In this case, you want `rowid` 3 in `Users`
    (Toby) to be used to match `rowid` 3 in `Scores` (George). The names are different
    (George and Toby), but you want that relationship to work to reflect the fact
    that they are two different values for the same person.


    > **Note**

    > The fact that `rowid` 3 is the value you want to relate from one file to another
    is happenstance based on the sequence in which these files have been constructed.
    Later in this chapter, you’ll see how those numbers can have different values,
    but for now, you will probably see the same values shown here.


    The solution is to create a new column—it’s usually called `FK` or `Foreign Key`
    in the database world. Sometimes database designers give it a name that identifies
    its source such as `scorekey` or `scoreid` and `userkey` or `userid`. Thus, if
    you’re looking at the `Scores` table, you could see the primary key or `rowid`
    alongside a separate `userkey`. If you take the values of `rowid` in `Users` to
    be the starting point (since that’s probably the first table to be created), you
    then want to have a matching value for `userid` in `Scores`.


    To add a column to an existing table, you use the `ALTER TABLE` command. You specify
    the name of the table to alter, the name of the column to add, and the type of
    that column. Here’s the syntax to use to create a new column called `userid`.


    ```sql

    ALTER TABLE Scores ADD COLUMN userid integer;

    ```


    To see the result of this command, use the `.schema` command in `sqlite3`. (Because
    it’s a `sqlite3` command, it starts with a period and doesn’t require a semicolon
    at the end. The command takes one parameter which is the name of the table you
    want to examine.) Here’s the result if you run it now. You’ll see that `userid`
    has been added.


    ```

    sqlite> .schema scores

    CREATE TABLE scores (Name char(128),

    score integer

    , userid integer);

    sqlite>

    ```


    Now you need to enter data for the `userid` column that you just added to `Scores`.
    The `userid` values in `Scores` should be the value of the corresponding record
    in `Users`. At the moment they’re the same, but you’ll soon change them.


    Here is the syntax to enter data for `rowid` in `Scores`. Basically, this is the
    same way in which you changed the name from Toby to George.'
