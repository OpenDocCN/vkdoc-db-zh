  trans: "\n# 第 9 章 ■ 在 Swift（iOS 和 OS X）中使用 SQLite/Core Data\n\nCore Data 在应用委托中的最后一部分是用于保存上下文及其更改的工具代码。如果不保存被管理对象上下文，这些更改就会丢失。\n\
    \n```\nfunc saveContext () {\n    if managedObjectContext.hasChanges {\n     \
    \   do {\n            try managedObjectContext.save()\n        } catch {\n   \
    \         // 用适当的代码替换此实现以处理错误。\n            // abort() 会导致应用程序生成崩溃日志并终止。\n   \
    \         // 在已发布的应用程序中不应使用此函数，尽管它在开发过程中可能很有用。\n            let nserror = error\
    \ as NSError\n            NSLog(\"Unresolved error \\(nserror), \\(nserror.userInfo)\"\
    )\n            abort()\n        }\n    }\n}\n```\n\n这是将被管理对象上下文传递给由应用委托创建或管理的视图的主要原因之一（参见“在\
    \ iOS 中将被管理对象上下文传递给视图控制器”部分）。如果视图拥有被管理对象上下文，那么当它在处理视图的更改时，就可以使用 `managedObjectContext.save`\
    \ 来保存这些更改。\n\n以下是一个可以保存数据的标准视图控制器代码示例。\n\n```\ndo {\n    try context.save()\n\
    } catch {\n    // 用适当的代码替换此实现以处理错误。\n    // abort() 会导致应用程序生成崩溃日志并终止。\n    //\
    \ 在已发布的应用程序中不应使用此函数，尽管它在开发过程中可能很有用。\n    print(\"Unresolved error \\(error), \\\
    (error.userInfo)\")\n    abort()\n}\n```\n\n## 在 OS X 中保存\n\n凭借 OS X 中的菜单栏及其命令，你经常使用“保存”操作来保存数据。以下是一个典型的\
    \ OS X `saveAction` 函数。\n\n```\n@IBAction func saveAction(sender: AnyObject!)\
    \ {\n    // 为应用程序执行保存操作，即向应用程序的被管理对象上下文发送 save: 消息。\n    // 遇到的任何错误都会呈现给用户。\n\
    \    if !managedObjectContext.commitEditing() {\n        NSLog(\"\\(NSStringFromClass(self.dynamicType))\
    \ unable to commit editing before saving\")\n    }\n    if managedObjectContext.hasChanges\
    \ {\n        do {\n            try managedObjectContext.save()\n        } catch\
    \ {\n            let nserror = error as NSError\n            NSApplication.sharedApplication().presentError(nserror)\n\
    \        }\n    }\n}\n```\n\n## 使用 `NSManagedObject`\n\n在任何使用 Core Data 的应用程序中，你都需要一个\
    \ Core Data 栈，并且每次创建它的方式基本相同，除了你会自定义项目的名称。\n\n（如果你是从 Xcode 的内置模板之一构建应用，可能会有一个\
    \ Core Data 复选框，可用于自动插入 Core Data 栈代码以及你的项目名称。）\n\n那么你的数据呢？这将由你的 Core Data 栈来管理，但它肯定需要特殊的编码。事实上，与\
    \ Core Data 的常见情况一样，SQLite 语法在幕后为你处理好了。你已经拥有一个数据模型（要么是模板自带的，要么是经过你修改的），如果你没有，你需要使用\
    \ 文件 ➤ 新建 ➤ 文件 来创建一个数据模型。\n\n`Note` 在 OS X 中，通常不使用视图控制器；而是使用绑定。该主题在 developer.apple.com\
    \ 中有介绍。\n\n数据模型中的每个实体将在运行时转换为一个类的实例。这些实例中的每一个都是 `NSManagedObject` 或其子类的实例。本节将向你介绍基础知识。\n\
    \n本节中的示例使用本书前面使用的相同的两个实体：`User` 和 `Score`。`图 9-1.` 显示了它们在 Xcode Core Data 模型编辑器图形视图中的样子。\n\
    \n![](img/index-98_1.jpg)\n\n`图 9-1.` 数据模型中的 User 和 Score 实体\n\n### 创建新的 `NSManagedObject`\
    \ 实例\n\n有几种方法可以创建新的 Core Data 实例。最常见的一种可以在 iOS 的 Master-Detail Application 模板中找到。以下是那里使用的代码。它连接到\
    \ MasterViewController 视图中的一个 +。用户可以点击 + 来创建一个新对象。\n"
- fmt: "# Chapter 9 ■ Using SQLite/Core Data with Swift (iOS and OS X)\n\n```swift\n\
    func insertNewObject(sender: AnyObject) {\n\n    let context = self.fetchedResultsController.managedObjectContext\n\
    \n    let entity = self.fetchedResultsController.fetchRequest.entity!\n\n    let\
    \ newManagedObject =\n        NSEntityDescription.insertNewObjectForEntityForName(entity.name!,\n\
    \                                                           inManagedObjectContext:\
    \ context)\n\n    do {\n\n        try context.save()\n\n    } catch {\n\n    \
    \    abort()\n\n    }\n\n}\n```\n\nYou use this code (or code very much like it)\
    \ whenever you create a new `NSManagedObject`. The beginning of this code just\
    \ locates the managed object context. It might be a property in the class you’re\
    \ working with such as a `fetchedResultsController`. If it isn’t you may need\
    \ to add a local property which is created (or passed through) when your class\
    \ is instantiated or when the instance is loaded from a storyboard.\n\nNext, you\
    \ create an entity description, a subclass of `NSEntityDescription`. This encapsulates\
    \ the entity information that you manage in your data model. In the code shown\
    \ here, the entity description (called `entity`) is retrieved from a fetched results\
    \ controller.\n\nThe third line of the code actually creates a new instance called\
    \ `newManagedObject`. That line of code is worth examining in detail. It’s really\
    \ quite simple, but it’s the heart of Core Data.\n\n```swift\nlet newManagedObject\
    \ =\n    NSEntityDescription.insertNewObjectForEntityForName(entity.name!,\n \
    \                                                      inManagedObjectContext:\
    \ context)\n```\n\nYou use a class method of `NSEntityDescription` to create the\
    \ new object—`insertNewObjectForEntityForName`. You need the name of the new object\
    \ to be created and you need the managed object context into which to put it.\n\
    \nIf you know the name of the object you want to create, you can omit the line\
    \ creating `entity` (the second line of this code) and change this line of code\
    \ to refer to it by name as in the following snippet.\n\n```swift\nlet newManagedObject\
    \ =\n    NSEntityDescription.insertNewObjectForEntityForName(\"User\",\n     \
    \                                                  inManagedObjectContext: context)\n\
    ```\n\nObviously, this code is less reusable, but it works.\n\nAfter you have\
    \ created that new managed object you save the managed object context into which\
    \ you inserted it.\n\n```swift\ndo {\n    try context.save()\n} catch {\n    abort()\n\
    }\n```\n\nAs noted in comments through the template code as well as elsewhere\
    \ in this book, don’t use `abort()` in a shipping app. Instead, catch the error\
    \ and log it, let the user know that there’s a problem (if the user can do something\
    \ about it), or just fix the problem in your code.\n\nThat’s all it takes to create\
    \ a new managed object.\n\nIf you want to set a value for an attribute defined\
    \ for the entity in your data model, you can use key-value coding to do so with\
    \ a line of code such as the following:\n\n```swift\nnewManagedObject.setValue(\"\
    New User\", forKey: \"name\")\n```\n\nIf the value to which you set the property\
    \ is invalid, the save of the managed object context will fail. This will happen\
    \ particularly if you’ve declared validation rules in the Xcode Data Model editor.\
    \ Until you shake down the validation rules, you may have to deal with errors\
    \ appropriately. (And, of course, if you are allowing user input, a whole host\
    \ of user-generated errors may occur.)\n\n`Tip`: If you really want to gain an\
    \ appreciation of Core Data, work through the SQLite syntax that must be generated\
    \ behind the scenes to implement the code shown here. It definitely is being executed,\
    \ but you don't have to type it in.\n\n## Working with a Subclass of `NSManagedObject`\n\
    \nYou can create a subclass of `NSManagedObject` instead of using an instance\
    \ of `NSManagedObject` itself. If you create a subclass (the process is described\
    \ next), the chief benefit is that instead of using key-value coding, you can\
    \ set a value for `newManagedObject` using code such as the following:\n\n```swift\n\
    newManagedObject.name = \"New User\"\n```\n\nCreating a new subclass of `NSManagedObject`\
    \ is easy with Xcode Core Data model editor. Here are the steps involved. Begin\
    \ with your data model open as shown in Figure 9-1. (It doesn’t matter if you’re\
    \ looking at the graph or table view.) Choose **Editor**"
