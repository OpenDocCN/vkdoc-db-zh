    ChapTer 6 ■ USIng SQLITe wITh php


    ■ **Note** This chapter focuses on the basics of php/SQLite integration. For an
    example of how they can be used on a series of web pages, see Cha[pter 11.](http://dx.doi.org/10.1007/978-1-4842-1766-5_11)
    In order to test the code in this chapter, you will need a basic text editor—preferably
    one such as BBedit, which highlights syntax for you so you can spot minor typos
    easily. You also need a server to which you can upload your php files as well
    as a SQLite database. If you are maintaining a web site, you have access to such
    a server in order to post your hTML pages. It may or may not have php installed.
    Most servers do, but for security reasons some limit access. If you have any difficulties,
    check with your server administrator.


    **DeFINING “SINGLe USer” FOr php**


    SQLite is designed for a single user. It is often used together with php to implement
    a website. Does that mean that your php/SQLite web site is designed for a


    single user?


    The answer is “yes,” but the details may surprise you. when you use php in a web
    page, there is a single user—it is the web server. Depending on your app, SQLite
    may or may not be a good choice (it almost always is a good choice for prototyping
    and testing). Static databases work well most of the time if they are not enormous.


    apps that need to update a database can quickly run into trouble if you use SQLite
    and there are more than a handful of users (it also depends on how frequently
    your users are updating the data).


    Putting PHP and SQLite Together: The Basics


    PHP is perhaps the most widely used server-side programming language. Strictly
    speaking, it is a scripting language which means that it is interpreted at runtime
    (in practical terms, that usually means web page load time). The output from the
    PHP script is typically a web page in this scenario. As the PHP script is running,
    it can do a wide variety of things including communicating with other processes
    and devices, and in the SQLite context, it can communicate with a SQLite database
    that resides on the web server.


    Verifying PHP in Your Environment


    Start by verifying that you have PHP installed on your server and that you can
    access it.


    (If you already are using PHP for web sites or other files, you can skip this
    step.) 46


    ChapTer 6 ■ USIng SQLITe wITh php


    Here is the code for a simple PHP-based web page. It simply requests a display
    of the current PHP status information on the server. If it doesn’t work, check
    with your administrator because you won’t be able to experiment with SQLite and
    PHP if the PHP


    piece is missing. In addition to PHP, you may also have to verify that SQLite
    is available on the server, but in many (probably most) cases it is.


    ■ **Caution** Unlike SQLite, php is case-sensitive, so be careful with your capitalization.


    This is a good reason for standardizing on case-sensitive names for column names
    in your SQLite code even though it doesn’t matter to SQLite. when you start manipulating
    the data with php, it will matter.


    This is the sample code to use to test PHP. The code in boldface is the PHP code
    inside the HTML code—it is delimited by <?PHP and ?>. It simply calls the phpinfo()
    function. Place this code in a file on your server. This file should have the
    php extension (it is usually lower-case, but on many servers the case won’t matter).
    If you name this test.php and upload it to the root of your web site (next to
    index.html or index.php in most cases) you can access it—including running the
    embedded PHP code—by going to


    [http://mywebsite/test.php](http://mywebsite/test.php).


    <!DOCTYPE html>


    <html>


    <head>


    <title>Chapter6</title>


    <meta name="generator" content="BBEdit 11.1" />


    </head>


    <body>


    **<?PHP**


    **phpinfo();**


    **?>**


    </body>


    </html>


    Preparing the SQLite Database


    You can use almost any of the SQLite commands with PHP, but, in practice, the
    most common commands you use are those that manage data in a table that already
    exists. In some environments, it may be an empty table that is populated by your
    web site as it is visited by users.


    ChapTer 6 ■ USIng SQLITe wITh php


    Here is the code to prepare the pair of databases used in Chapter [4\. T](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)hey
    will be used again in this chapter. Several sections are worth paying particular
    attention to. They are shown in bold.


    •


    In this example, sqlite3 is launched using a database called


    sqlitephp.sqlite. If it doesn’t exist, sqlite3 creates it. Normally,


    sqlite or db is used as the extension. (If you use your own


    extension, you may have issues in uploading it to your web site.)


    •


    The Users table is created. Note that the Name column cannot be


    null—you must have a name. Data already used in Chapt[er 4 is](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)


    filled in. (It is shown here as Ta[ble 6-1.)](#index_split_000.html#59)


