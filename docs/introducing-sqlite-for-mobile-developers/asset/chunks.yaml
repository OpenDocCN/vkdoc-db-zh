    ■ **注意** `Core Data` 能够与包括 `SQLite` 在内的多种数据库协同工作，但通过将这些数据库封装在其自身的框架类中，它为不同的数据库类型提供了一致性。因此，尽管在
    `iOS` 和 `OS X` 上最常见 `Core Data` 用法中，底层的数据库是 `SQLite`，你并不能简单地将一个现有的 `SQLite` 数据库直接塞进
    `Core Data`。如果你有一个现有的数据库（`SQLite` 或任何其他类型）并想将其迁移到 `Core Data`，最简单的方法是将其卸载，然后重新加载到你创建的
    `Core Data` 模型中。在很多情况下，你可以使用实用工具来完成卸载；而重新加载可能需要一小段代码来与 `Core Data` 交互。在任何情况下，拥有卸载和重新加载任何类型数据库的能力都是一种最佳实践。这不仅在从一种数据库管理器迁移到另一种时很方便，对于调试、审计和其他需求也同样有用。


    ## Core Data 框架简介


    与 `PDO` 和 `android.database` （非常）大致类似的通用代码就是 `Core Data` 框架。它由一系列类组成——本章将描述关键类以及用于数据模型的图形编辑器。


    ### Core Data 的起源


    Core Data 是一个框架——一组协同工作、可以一起安装到你应用程序中的类。它与 `Cocoa`（用于 `OS X` 的用户界面 (`UI`) 框架）和
    `Cocoa Touch`（用于 `iPad`、`iPod touch` 和 `iPhone` 的 `UI` 框架）配合使用。它也用于 `tvOS` 和 `watchOS`。它为标准数据库提供了一个完全面向对象的接口。它最初于
    1994 年在 `Next` 公司编写为企业对象框架 (`EOF`)，并支持 `Oracle`、`Sybase`、`Informix` 和兼容 `ODBC`
    的服务器以及 `OpenBase Lite`。如今，它在所有平台上都支持内置的 `SQLite` 库，在 `Mac` 上还支持 `XML`。


    ## 第 8 章 在 iOS 和 OS X 中结合 SQLite 使用 Core Data


    Core Data 源自 `EOF`，但在许多方面有很大不同。仍然保留的主要相似之处之一是用于描述关系数据的图形用户界面。


    如今，它作为 `Xcode` 的一部分，体现为 `数据模型检查器` 和 `Xcode Core Data 模型编辑器`。


    *   两者都是完全面向对象的，尽管你可以编写代码来管理它们，但存储的对象及其属性在 `Xcode Core Data 模型编辑器` 中以图形方式表示。如果你确实编写代码，那是标准的
    `Objective-C` 或 `Swift` 代码，而不是 `SQL` 或 `SQLite`。

    *   除了存储的对象和属性本身之外，用于设计数据、其对象及其关系的图形用户界面直接源自 `EOF` 工具。你可以编写代码来管理数据及其对象，但该代码是 `Swift`
    或 `Objective-C`，而不是 `SQL` 或 `SQLite`。


    也许 `EOF` 和 `Core Data` 最重要的方面是非常相关的。


    作为开发者，`Core Data` 有三个重要的方面。


    *   用于构建和维护包括关系在内的数据模型的图形用户界面。这就是 `Xcode Core Data 模型编辑器`。它在 `Xcode` 内部运行。

    *   使 `Core Data` 为你工作的运行时对象。它们统称为 `Core Data` 栈 (`Core Data stack`)。

    *   你经常与 `Core Data` 一起使用的其他对象。


    本章讨论第一个方面。第 9 章将讨论第二个和第三个方面。


    ### 使用 Core Data 模型编辑器


    从一个 `Xcode` 项目开始，可以是基于内置的 `Xcode` 模板，也可以是基于你自己的项目。许多内置模板在设置项目时都有一个使用 `Core Data`
    的选项。如果你选择了这个选项，你的项目中就已经有一个数据模型了。


    否则，你需要向项目中添加一个数据模型。使用 `文件->新建->文件` 打开如图 8-1 所示的面板，并根据情况从 `iOS`、`watchOS`、`tvOS`
    或 `OS X` 的 `Core Data` 部分选择 `数据模型`。

    '
- fmt: '# Chapter 8: Using SQLite with Core Data (iOS and OS X)


    ![](index-75_1.jpg)


    **Figure 8-1.** Add a new data model to your project


    > **Note:** Data Model editor is built into `Xcode`, the integrated development
    environment for Apple projects. This chapter assumes you know the basics of `Xcode`.
    If you don’t, visit `developer.apple.com` to find the documentation and download
    `Xcode`. It’s also available for free in the Mac App Store.


    You start from an empty data model as shown in Figure [8-2](#index_split_000.html#76).


    ![](index-76_1.jpg)


    **Figure 8-2.** Start from a new data model


    The center of the Core Data model editor lets you create your data model. There
    are two styles you can use for the editor: a *table style* and a *graph style*
    (you’ll see both later in this section). When you are working on a data model,
    there’s a Data Model inspector available at the right of the editing window. It
    will contain relevant data for anything that you have selected in the Core Data
    model editor. (In the case of Figure [8-2](#index_split_000.html#76), nothing
    is selected that has additional information.)


    At the left of the Data Model editor, you have three sets of objects you can manage.


    - **Entities** are `SQLite` tables behind the scenes.

    - **Fetch requests** are prepared queries similar to those you can create in `SQLite`.
    They can contain variables that are substituted at query time.

    - **Configurations** are used internally. For basic development, you don’t need
    to do anything because the default configuration will work.


    To add a new object to the Core Data model editor, you can use the `+` button
    at the lower left of the window. The small down-pointing triangle next to the
    `+` lets you choose to add an entity, fetch request, or configuration. Your choice
    is sticky—this means that after you’ve chosen to add a fetch request, the `+`
    will add other fetch requests until you change the default.


    ![](index-77_1.jpg)


    ## Using Entities


    After you add a new entity, it will appear in the center of the editing window
    with its three sections (see Figure 8-3):


    - **Attributes** are `SQLite` columns behind the scenes.

    - **Relationships** are the logical relationships you’re used to in `SQL`. In
    Core Data, they have a fundamental difference which is explained in “Managing
    Relationships” later in this chapter.

    - **Fetched properties** allow you to fetch properties from a different persistent
    store. They are for advanced users and aren’t covered in this introduction to
    Core Data.


    **Figure 8-3.** Add a new entity


    Perhaps the most important aspect of an entity is that, when you fetch it at runtime,
    it is fetched as an instance of `NSManagedObject` (or a subclass thereof). As
    a result of that fetch, the entity becomes a class instance, and its attributes
    become properties of the instance. You’ll see how to create subclasses in Chapter
    [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9).


    ![](index-78_1.jpg)


    > **Note:** Actually, when you fetch an object with Core Data, it is initially
    fetched as a *fault*. That’s not an error. It represents the absolutely bare minimum
    of information that Core Data needs to proceed. Basically, it is an instance of
    `NSManagedObject` or a subclass thereof but without the persistent properties
    filled in. This means that you can use it in some ways, but when you actually
    need the data, the fault is said to *fire*, and the data is filled in. When the
    fault has fired and the data has been filled in, the fault is said to be *realized*.
    This happens behind the scenes, so you don’t need to be aware of it except that
    in looking at debugging statements, get used to recognizing that in the context
    of Core Data, “fault” doesn’t mean an error. Faulting is one of the ways in which
    Core Data optimizes performance.'
