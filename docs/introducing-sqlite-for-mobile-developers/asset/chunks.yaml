- fmt: "## 在 OS X 中创建 `persistentStoreCoordinator`\n\nXcode 会为你创建这个（或者如果你正在构建自己的 Core\
    \ Data 栈，你也可以自己创建）。注意加粗的那行：它取自你的项目设置，你需要为你自己的项目更改它。\n\n```objective-c\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    // 应用程序的持久化存储协调器。此实现\n    // 创建并返回一个协调器，已为应用程序\n\
    \    // 添加了存储。（如果需要，会创建存储目录。）\n    if (_persistentStoreCoordinator) {\n      \
    \  return _persistentStoreCoordinator;\n    }\n\n    NSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\n    NSURL *applicationDocumentsDirectory\
    \ = [self applicationDocumentsDirectory];\n    BOOL shouldFail = NO;\n    NSError\
    \ *error = nil;\n    NSString *failureReason = @\"创建或加载应用程序保存数据时出错。\";\n\n   \
    \ // 确保应用程序文件目录存在\n    NSDictionary *properties = [applicationDocumentsDirectory\n\
    \        resourceValuesForKeys:@[NSURLIsDirectoryKey] error:&error];\n\n    if\
    \ (properties) {\n        if (![properties[NSURLIsDirectoryKey] boolValue]) {\n\
    \            failureReason = [NSString stringWithFormat:\n                @\"\
    预期是一个存储应用程序数据的文件夹，却找到了一个文件 (%@)。\",\n                [applicationDocumentsDirectory\
    \ path]];\n            shouldFail = YES;\n        }\n    } else if ([error code]\
    \ == NSFileReadNoSuchFileError) {\n        error = nil;\n        [fileManager\
    \ createDirectoryAtPath:[applicationDocumentsDirectory path]\n            withIntermediateDirectories:YES\
    \ attributes:nil error:&error];\n    }\n\n    if (!shouldFail && !error) {\n \
    \       NSPersistentStoreCoordinator *coordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\n            initWithManagedObjectModel:[self managedObjectModel]];\n\
    \        NSURL *url = [applicationDocumentsDirectory\n            URLByAppendingPathComponent:@\"\
    OSXCoreDataObjC.storedata\"];\n        if (![coordinator addPersistentStoreWithType:NSXMLStoreType\
    \ configuration:nil\n            URL:url options:nil error:&error]) {\n      \
    \      coordinator = nil;\n        }\n        _persistentStoreCoordinator = coordinator;\n\
    \    }\n\n    if (shouldFail || error) {\n        // 报告我们遇到的任何错误。\n        NSMutableDictionary\
    \ *dict = [NSMutableDictionary dictionary];\n        dict[NSLocalizedDescriptionKey]\
