    \ SQLite 的情况下，一个数据库库），但它本身并不是一个数据库。它的职责是隐藏数据库，以便你可以使用 Core Data 基于其所使用的数据库中的数据管理的对象进行工作。"
- fmt: '■ **Note** `Core Data` can work with a variety of databases including `SQLite`，
    but in wrapping those databases in its own framework classes， it provides some
    consistency across different database types. thus， although in the most common
    uses of `Core Data` on `iOS` and `OS X` it is `SQLite` that is the underlying
    database， you can’t simply slide an existing `SQLite` database into `Core Data`.
    if you have an existing database (`SQLite` or any other) and want to move it to
    `Core Data`， the simplest way is to unload it and reload it into the `Core Data`
    model that you create. You can do this using utilities for the unload in many
    cases; the reloading may require a brief section of code to interact with `Core
    Data`. having the facilities to unload and reload databases of any type is a best
    practice in all cases. it can come in handy not only for moving from one database
    manager to another but also for debugging， auditing， and other needs.


    ## Introducing the Core Data Framework


    The common code that is (very) roughly analogous to `PDO` and `android.database`
    is the `Core Data` framework. It consists of a number of classes—this chapter
    describes the key classes along with the graphical editor for a data model.


    ### Where Core Data Came From


    Core data is a framework—a collection of classes that work together and can be
    installed together in your app. it is used with `Cocoa` (the user interface (`UI`)
    framework for `OS X`) and `Cocoa Touch` (the `UI` framework for `iPad`， `iPod
    touch`， and `iPhone`). it’s also used with `tvOS` and `watchOS`. it provides a
    fully object-oriented interface to standard databases. it was originally written
    at `Next` in 1994 as enterprise objects Framework (`EOF`)， and it supported `Oracle`，
    `Sybase`， `Informix`， and `ODBC`-compliant servers along with `OpenBase Lite`.
    today， it supports the built-in `SQLite` library on all the platforms as well
    as `XML` on `Mac`.


    ## Chapter 8 Using SQLite with Core Data (iOS and OS X)


    Core Data descends from `EOF`， but it is very different in many ways. among the
    major similarities that remain are the graphical user interface for describing
    relational data.


    today， it is part of `Xcode` as `Data Model Inspector` and `Xcode Core Data model
    editor`.


    *   Both are totally object-oriented with the stored objects and their properties
    being represented graphically in the `Xcode Core Data model editor` although you
    can write code to manage them if you want. if you do write code， it is standard
    `Objective-C` or `Swift` code rather than `SQL` or `SQLite`.

    *   in addition to the stored objects and properties themselves， the graphical
    user interface used to design the data， its objects， and their relationships descends
    directly from `EOF` tools. You can write code to manage the data and its objects，
    but that code is `Swift` or `Objective-C` and not `SQL` or `SQLite`.


    perhaps the most important aspects of both `EOF` and `Core Data` are very much
    related.


    There are three aspects of `Core Data` that matter to you as a developer.


    *   The graphical user interface for building and maintaining a data model including
    relationships. This is the `Xcode Core Data model editor`. It runs inside `Xcode`.

    *   The runtime objects that make `Core Data` work for you. They are collectively
    referred to as the `Core Data stack`.

    *   Other objects that you frequently use with `Core Data`.


    This chapter addresses the first one. Chapter 9 discusses the second and third.


    ### Using the Core Data Model Editor


    Start with an `Xcode` project either from a built-in `Xcode` template or from
    your own project. Many of the built-in templates have an option to use `Core Data`
    when you set up the project. If you have chosen this option， you have a data model
    already in your project.


    Otherwise， you need to add a data model to your project. Use `File->New->File`
    to open the sheet shown in Figure 8-1 and select `Data Model` from the `Core Data`
    section for `iOS`， `watchOS`， `tvOS`， or `OS X` as appropriate.'
