    \ value = '.$row[\"name\"].'>';\n// 隐藏字段非常重要：它是连接到下一个 PHP 文件 (`phpsql2.php`) 的链接。\n\
    // `name` 的值将从该文件开头的 `POST` 变量中检索。\n// `userid` 以 `userid` 作为名称从 `SELECT` 元素传入，而\
    \ `username`（用于下一个页面的标题）在此处传入。`SELECT` 对用户可见，但这个隐藏字段不可见。\necho '</select> <br\
    \ >';\necho '<input type=\"submit\" value=\"提交\">';\necho '</form>';\n// `SELECT`\
    \ 元素的名称是 `userid`。当下一个文件解包 `POST` 值时，它将是下拉菜单中所选项的键。你可能想自定义提交按钮。\n?>\n</body>\n\
    </html>\n```\n\n## 显示所选数据 (`phpsql2.php`)\n\n这是构建如图 11-4 所示页面的代码。\n\n```php\n\
    <html>\n<head>\n</head>\n<body>\n<?php\nprint \"POST 值<br/>\";\nforeach ($_POST\
    \ as $key => $value) {\n    echo \"$key &nbsp;&nbsp;&nbsp $value <br />\";\n}\n\
    print \"--POST 值结束<br/>\";\n$name = $_POST['name'];\nprint \"name = $name <br/>\"\
    ;\n// 此代码对调试很有用：它打印出所有的 `POST` 键和值。当你对代码满意后，请将其移除。设置局部变量 `$name` 并`不是`用于调试。随后的\
    \ print 语句是调试用的，但你需要从前一个页面的隐藏字段中获取 `username`，以便在此页面的标题中显示它。你可以在需要时从 `POST` 变量中提取它，但许多人更喜欢在文件开头就加载\
    \ `POST` 变量。\n$db = 'sqlite:sqlitephp.sqlite';\n$sqlite = new PDO($db) or die\
    \ (\"<h1>无法打开数据库</h1>\");\necho \"<p>PDO 连接成功</p>\";\necho \"userid \".$_POST[\"\
    userid\"];\n$useridToFind = $_POST['userid'];\necho \"useridToFind = $useridToFind\"\
    ;\n$query = $sqlite->prepare (\"select name, score from Score s, User u where\
    \ s.userid = u.rowid and $useridToFind = s.userid ORDER BY Score;\") or die (\"\
    <h1>无法准备查询</h1>\");\necho \"<p>Prepare 准备成功</p>\";\n$query->execute() or die (\"\
    无法执行\");\necho \"<p>Execute 执行成功</p>\";\n$result = $query->fetchAll() or die (\"\
    无法 fetchAll\");\necho \"fetchAll 获取成功<br />\"; // 用于调试\nforeach ($result as $row)\
    \ {\n    echo \"<h1>\".$row['name'].\" 的分数</h1>\";\n    $userName = $row['name'];\n\
    \    echo $row['name'], \" - \", $row['score'];\n}\necho '<form method=\"post\"\
    \ action=\"phpsql3.php\">';\necho \"<input type='hidden' name='userid' value=$useridToFind>\"\
    ;\n// 这是另一个隐藏字段——这次是将 `userid` 向前传递给下一个 PHP 文件。\necho '<input type=\"submit\"\
    \ value=\"添加分数\">';\necho '</form>';\n?>\n</body>\n</html>\n```\n\n## 添加新数据 (`phpsql3.php`)\n\
    \n现在是向文件添加新数据的时候了。这涉及到将基本的 SQLite `INSERT` 语法与你之前在 PHP 页面中使用的相同类型的代码结合起来。你应该开始习惯这一点：使用\
