  trans: "\n# 第 12 章 ■ 在 Core Data/iOS 应用中使用简单数据库\n\n***图 12-3.** 用于显示分数的基于表格的详情视图*\n\
    \n■ **注意** 分数值是 Unix 时间戳（自 1970 年 1 月 1 日以来的秒数）。\n\nCocoa 和 Cocoa Touch 中的 `NSDate`\
    \ 可以方便地提供这些值，它们也为测试代码提供了不同的数值。`MasterViewController` 继续使用显示为时间戳的值。\n\n这将包含三个步骤：\n\
    \n1.  为 `User` 和 `Score` 创建 `NSObject` 的子类。（这已在第 9 章描述。）\n2.  修改 `MasterViewController`\
    \ 以使用新的子类。\n3.  在故事板中用基于表视图控制器的详情视图控制器替换现有的详情视图控制器。\n4.  修改 `DetailViewController`\
    \ 中的代码，使其与基于表视图控制器的详情视图控制器配合工作。\n5.  修改 `MasterViewController`，将对当前 `User` 的引用传递给新的详情视图控制器，以便可以显示其分数。\n\
    \n第一步之后，这些步骤可以按任何顺序完成。\n\n## 使用 NSManagedObject 子类\n\n`MasterViewController` 中的代码按照前一节的描述创建了一个新的\
    \ `User` 实体。一旦有了可用的子类，你就应该使用它们。在 `ManagedObjectController` 的 `insertNewObject`\
    \ 方法中，找到以下代码行：\n\n```swift\nlet newObject = NSEntityDescription.insertNewObjectForEntityForName\n\
    (entity.name!, inManagedObjectContext: context)\n```\n\n将其改为：\n\n```swift\nlet\
    \ newUser = NSEntityDescription.insertNewObjectForEntityForName\n(entity.name!,\
    \ inManagedObjectContext: context) as! User\n```\n\n在接下来的一行中，使用子类而不是键值编码。将\n\n\
    ```swift\nnewManagedObject.setValue(NSDate().description, forKey: \"name\")\n\
    ```\n\n替换为使用新子类的以下代码行：\n\n```swift\nnewUser.name = NSDate().description\n```\n\
    \n## 为 DetailViewController 使用表视图控制器\n\n最简单的方法是从故事板中移除当前的 `DetailViewController`。（如图\
    \ 12-4 所示。）\n\n![](img/index-151_1.jpg)\n\n***图 12-4.** 在故事板中找到详情视图控制器并将其移除*\n\
    \n然后，从窗口右侧的对象库中拖动一个表视图控制器到故事板中。将其放置在原详情视图控制器的位置，并从导航控制器按住 Control 键拖动到新的表视图控制器。对于关系，选择\
    \ *root view controller*（当你松开 Control 键拖动时，系统会立即提示你选择）。\n\n## 修改 DetailViewController\
    \ 的代码\n\n`DetailViewController` 需要进行一些更改。\n\n### 使用子类\n\n你需要修改代码，使 `DetailViewController`\
    \ 成为 `UITableViewController` 的子类，而不是 `UIViewController`。\n\n将文件顶部的这一行从\n\n```swift\n\
    class DetailViewController: UIViewController {\n```\n\n改为：\n\n```swift\nclass\
    \ DetailViewController: UITableViewController {\n```\n\n同时修改故事板，使新的 `DetailViewController`\
    \ 的类型是 `DetailViewController`（它可能还不是）。\n\n从 `DetailViewController` 中移除对标签的引用（它被称为\
    \ `DetailDescriptionLabel`）。\n\n有一些清理代码的整理工作要做。将 `detail` 的变量声明改为 `detailUser`（在文件顶部）。\n\
    \n```swift\nvar detailUser: User? {\n    didSet {\n        // 更新视图。\n        self.configureView()\n\
    \    }\n}\n```\n\n### 修改 configureCell 以使用子类\n\n以下是 `configureCell` 现在的样子，因为它使用了\
    \ `Score` 子类。请注意，这里有一些转换过程：给定用户（一种关系）的 `NSSet` 形式的分数集被转换为数组（以便可以找到表格中第 n 个元素）。然后，检查第\
    \ n 个元素（它是一个 `Score`）以找到其分数值（`Score.score`）。\n\n```swift\nfunc configureCell(cell:\
    \ UITableViewCell, atIndexPath indexPath: NSIndexPath) {\n```\n"
- fmt: "# Chapter 12 ■ Using the Simple Database with a Core Data/iOS App\n\n```swift\n\
    if let scores = detailUser?.scores {\n    let scoresArray = scores.allObjects\
    \ as NSArray\n    let selectedRowArrayElement = scoresArray[indexPath.row] as!\
    \ Score\n    let scoreForSelectedRow = selectedRowArrayElement.score\n    cell.textLabel!.text\
    \ = \"Score: \" + scoreForSelectedRow.description\n}\n```\n\n## Modify MasterViewController\
    \ to Pass the User to DetailViewController\n\nBy default, the object selected\
    \ in the master detail view list is passed to `DetailItem` in `DetailViewController`.\
    \ It’s declared as `AnyObject?`. You’ll need to change it to use the new `detailUser`\
    \ variable you’ve created. In `prepareForSegue`, change the line `controller.detailItem\
    \ = object` to the following:\n\n```swift\ncontroller.detailUser = (object as!\
    \ User)\n```\n\nYou now need to connect the table and support the relevant protocols.\
    \ This code is actually in `MasterViewController` because you need to manage a\
    \ table view controller there. You’ll just need to copy it to `DetailViewController`.\n\
    \nAnd you’ll need to import `CoreData` at the top of `DetailViewController`.\n\
    \n```swift\nimport CoreData\n```\n\n## Summary\n\nYou now have the basics of an\
    \ app that uses the built-in SQLite database, the Xcode Core Data model editor\
    \ and Core Data framework to work with the database, and the Cocoa Touch framework\
    \ for iOS to bring it all together.\n\nWhat you’ve seen in working with PHP and\
    \ Core Data and in the summary of Android is that there are languages (PHP and\
    \ others) as well as frameworks (Cocoa Touch and Cocoa) and application programming\
    \ interfaces (APIs) (Android) that build on SQLite. The degree to which the SQL\
    \ syntax for SQLite is exposed varies from very little (Core Data) to a great\
    \ deal (PHP) and various middle roads such as Android.\n\nWhat is important is\
    \ that you understand the principles and functionality.\n\nRemember, too, that\
    \ in building any database-driven app, the more that you can put into your database\
    \ the less code you have to write. Take advantage of validation options, `GROUP\
    \ BY` clauses, and everything else that you can find. The less code you write\
    \ the less time it will take (to write and to debug!).\n\n## Index\n\n### **A,\
