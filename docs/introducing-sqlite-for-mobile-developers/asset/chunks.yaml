    ## 关于技术评审


    `Aaron Crabtree` 接受过计算机工程、多媒体和图形设计方面的培训，在该行业工作了 15 年。经验告诉 Aaron，在大多数情况下，为了获得更大的灵活性和控制权，以编程方式创建应用程序的每个部分是必要的。在
    Twitter 上给他发消息：@aaron_crabtree


    `Cliff Wootton` 是 BBC News 的前交互式电视系统架构师。在那里开发的“News Loops”服务获得了 BAFTA 提名，并赢得了皇家电视学会技术创新奖。他作为特邀演讲者参加了
    Apple WWDC 大会的视频压缩预处理主题演讲。曾教授研究生 MA 学生关于实际计算、多媒体、视频压缩、元数据以及研究基于开放标准的下一代交互式电视系统的部署。目前正在从事研发项目，探索新的交互式电视技术，参与
    MPEG 标准工作组，撰写更多相关书籍，并在伦敦艺术大学讲授多媒体课程之余在会议上发表演讲。


    ## 致谢


    我最喜欢数据库工作的地方就是把拼图的碎片拼凑起来——我的一个朋友过去称之为“从混乱中创造秩序”。当涉及到思考 SQLite 时，有很多碎片需要拼凑——从 20
    世纪 60 年代关系型数据库的早期工作，到可以适当适配重型计算机以及小型电池供电移动电话和旨在探索远离家园相对安全的其他世界的自主卫星的轻量级代码库理念。


    这本书的出版首先要归功于 D. Richard Hipp，他于 2000 年开始（并持续）了 SQLite 项目。众多贡献和测试代码的人不胜枚举，但你们知道自己是谁。


    更贴近来说，Apress 的 Jeff Pepper 再次合作非常愉快，Mark Powers 也是如此。与 Waterside Productions 的
    Carole Jelen 一起，他们共同使得提供这本 SQLite 基础入门书籍成为可能。


    ## 引言


    我曾使用过多种类型、多种平台上的数据库。尽管几乎所有的数据库都基于关系模型。我也曾涉足过一些古老的数据库结构，如 IMS（一种层次型数据库），以及最近接触过非结构化数据，但在每种情况下，这都关乎一个基本原则：找到组织数据的最简单方式，使其有意义。（正如我常对客户说的，“数据不会说谎。”当你将数据以这种方式、那种方式以及各种方式排列时，我发现其内在结构会逐渐变得清晰——如果存在的话。如果没有内在结构，可能清晰呈现的是某种从未有人想到过的数据结构。而有时，数据固执地拒绝揭示我们能理解的结构。


    这听起来可能非常自命不凡和深奥，但我确实认为，作为数据库设计师，我们的工作最终是寻找模式的工作。如果我们找不到逻辑上内在且必然的模式，最好的选择是为手头的任务找到最可用的最佳模式。


    如果不了解组织数据的方式（事实上是很多），我们就无法生成这些数据模型，而如今，这归结于关系模型和 SQL 工具。这个过程是迭代性的（过早采用部分数据库模型的设计团队要遭殃了），它依赖于灵活的工具，以及想象力，并不断质疑项目中的每个人。

