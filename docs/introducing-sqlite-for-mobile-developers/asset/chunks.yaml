    ## Understanding What SQLite Is


    Chapter 1 provided an overview of relational databases and SQL that applies to
    most modern databases regardless of the environment in which you find them (Oracle,
    MySQL, Microsoft SQL Server, or others). That generality is important because
    SQLite is part of that picture. In this chapter, however, the focus is just on
    SQLite and the features of SQLite that you may or may not find in other database
    environments. Whereas a lot of Chapter 1 may be familiar to long-time database
    users, much of this chapter may not be because even if it is not SQLite-only,
    many of the features described in this chapter are not present in other database
    environments. (To be quite fair, many features of other database environments
    are not found in SQLite.)


    ### Putting a Database in Perspective


    A relational database typically lives inside some kind of containing object. Often,
    the container is a `database management system` (`DBMS`). (You may sometimes see
    references to a `relational database management system` (`RDBMS`). For most purposes
    in today’s world, most `DBMS`s are `RDBMS`s.)


    A database management system such as Oracle provides functionality that goes beyond
    the database itself, such as user interfaces or developer interfaces; diagnostic,
    debugging, and maintenance tools; and even sophisticated data display functionality.


    In some cases, a database is part of a language, object-oriented class, or framework
    that, itself, may or may not be a `DBMS`. For example, `PHP` has a database class
    just as does the `Android SDK` (Yes, one is a language and one is an operating
    system, but each can provide an object-oriented database class.) You’ll find more
    about these classes in Chapters 6 and 7.


    On the other hand, `Cocoa` and `Cocoa Touch` provide a `Core Data` framework for
    both `iOS` and `Mac`. I describe `Core Data` later in Chapters 8 and 9.


    For most of this book, the focus is on SQLite itself, but beginning with Chapter
    6, you’ll see how to access it when it is inside a `DBMS`, class, or framework.


    ### Defining SQLite


    `SQLite` is a software library written in C. It was developed by D. Richard Hipp
    in 2000 originally as part of a contract with the U.S. Navy that was implemented
    by General Dynamics. Today, it consists of some 184,000 lines of code.'
  raw: 'You can specify the condition you want to use for selecting data with a clause
    that begins with WHERE. For example, you could use that first column (PK) to select
    a single row.


    SELECT Name FROM SimpleTable WHERE PK = 2


    You can also form a condition that is more complex:


    SELECT Name FROM SimpletTable WHERE PK < 3


    Looking at Other Query Choices


    These are the simplest possible examples: more complex ones will be shown throughout
    the book, but the basic pattern will remain as follows:


    SELECT this FROM table WHERE condition


    You can use several tables as your data source. Thus, if you have names and origins
    as shown in Table [1-1](#index_split_000.html#19) in a single table, you could
    have another table with each person’s birthday. You could create a single SELECT
    statement to retrieve both the name and birthday for anyone; to do so you would
    have to use two tables. (Don’t worry, this is an example you’ll see in Chapter
    [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4).) As noted previously, the
    result of a SELECT query is itself a table. Thus, you can write a SELECT query
    that executes a SELECT statement to create a table and then selects data from
    that resulting table.


    With this brief overview of relational databases and SQL, it’s time to move on
    to SQLite itself.


    **Chapter 2**


    **Understanding What**


    **SQLite Is**


    Chapter [1 pr](http://dx.doi.org/10.1007/978-1-4842-1766-5_1)ovided an overview
    of relational databases and SQL that applies to most modern databases regardless
    of the environment in which you find them (Oracle, MySQL, Microsoft SQL Server,
    or others). That generality is important because SQLite is part of that picture.
    In this chapter, however, the focus is just on SQLite and the features of SQLite
    that you may or may not find in other database environments. Whereas a lot of
    Chapter [1](http://dx.doi.org/10.1007/978-1-4842-1766-5_1)


    may be familiar to long-time database users, much of this chapter may not be because
    even if it is not SQLite-only, many of the features described in this chapter
    are not present in other database environments. (To be quite fair, many features
    of other database environments are not found in SQLite.)


    Putting a Database in Perspective


    A relational database typically lives inside some kind of containing object. Often,
    the container is a *database management system* (DBMS). (You may sometimes see
    references to a relational database management system (RDBMS). For most purposes
    in today’s world, most DBMSs are RDBMSs.)


    A database management system such as Oracle provides functionality that goes beyond
    the database itself, such as user interfaces or developer interfaces; diagnostic,
    debugging, and maintenance tools; and even sophisticated data display functionality.


    In some cases, a database is part of a language, object-oriented class, or framework
    that, itself, may or may not be a DBMS. For example, PHP has a database class
    just as does the Android SDK (Yes, one is a language and one is an operating system,
    but each can provide an object-oriented database class.) You’ll find more about
    these classes in Chapters [6](http://dx.doi.org/10.1007/978-1-4842-1766-5_6) and
    [7.](http://dx.doi.org/10.1007/978-1-4842-1766-5_7)


    On the other hand, Cocoa and Cocoa Touch provide a Core Data framework for both
    iOS and Mac. I describe Core Data later in Chapters [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8)
    [and 9.](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)


    For most of this book, the focus is on SQLite itself, but beginning with Chapter
    [6](http://dx.doi.org/10.1007/978-1-4842-1766-5_6), you’ll see how to access it
    when it is inside a DBMS, class, or framework.


    Chapter 2 ■ Understanding What sQLite is


    Defining SQLite


    SQLite is a software library written in C. It was developed by D. Richard Hipp
    in 2000


    originally as part of a contract with the U.S. Navy that was implemented by General
    Dynamics. Today, it consists of some 184,000 lines of code.'
  trans: '

    # 第 2 章


    ## 理解 SQLite 是什么


    第 1 章概述了关系数据库和 SQL，这些内容适用于大多数现代数据库，无论它们处于何种环境（Oracle、MySQL、Microsoft SQL Server
    或其他）。这种通用性很重要，因为 SQLite 是其中的一部分。然而，在本章中，重点将只放在 SQLite 本身以及你可能在其他数据库环境中找不到的 SQLite
    特性上。尽管第 1 章的许多内容对于长期的数据库用户来说可能很熟悉，但本章的大部分内容可能并非如此，因为即使不是 SQLite 独有，本章描述的许多特性在其他数据库环境中并不存在。（平心而论，其他数据库环境的许多特性在
    SQLite 中也找不到。）


    ### 正确看待数据库


    关系数据库通常存在于某种容器对象内部。通常，这个容器是一个 `数据库管理系统` (`DBMS`)。（你有时可能会看到 `关系数据库管理系统` (`RDBMS`)
    的提法。在当今世界的大多数情况下，大多数 `DBMS` 都是 `RDBMS`。）


    像 Oracle 这样的数据库管理系统提供的功能超出了数据库本身，例如用户界面或开发者界面；诊断、调试和维护工具；甚至复杂的数据显示功能。


    在某些情况下，数据库是某种语言、面向对象的类或框架的一部分，而这个框架本身可能是一个 `DBMS`，也可能不是。例如，`PHP` 就有一个数据库类，就像 `Android
    SDK` 也有一个一样（是的，一个是语言，一个是操作系统，但它们都可以提供面向对象的数据库类。）。你将在第 6 章和第 7 章中找到关于这些类的更多信息。


    另一方面，`Cocoa` 和 `Cocoa Touch` 为 `iOS` 和 `Mac` 提供了一个 `Core Data` 框架。我将在后面的第 8 章和第
    9 章中描述 `Core Data`。


    在本书的大部分内容中，重点是 SQLite 本身，但从第 6 章开始，你将看到当它位于 `DBMS`、类或框架内部时如何访问它。


    ### 定义 SQLite


    `SQLite` 是一个用 C 语言编写的软件库。它由 D. Richard Hipp 于 2000 年开发，最初是美国海军合同的一部分，由通用动力公司实施。如今，它由大约
    184,000 行代码组成。

