  trans: "\n在 Core Data 中，**关系**是数据模型的一部分。Core Data 会管理它们（根据需要生成 `WHERE` 子句）。这意味着你无需自己编写\
    \ `WHERE` 子句（部分原因在于你不会自己编写 SQLite 语法，因此没有地方可以写它们）。一旦在数据模型中创建了两个**实体**，就可以使用 Xcode\
    \ 的 Core Data 模型编辑器在它们之间建立关系。（是的，你可以在单个表中创建自连接，但这是一个更高级的话题。）创建关系最简单的方法是切换到图形样式（使用编辑区右下角的\
    \ `编辑器样式` 控件）。你可能需要重新排列实体，以便同时轻松看到你关心的两个实体。然后，从一个实体按住 Control 键拖拽到另一个实体，如图 8-6.\
    \ 所示。\n\n***图 8-6.** 创建一个关系*\n\n新关系会被赋予默认名称：双击可更改名称。你需要指定关系的详细信息，因此请打开窗口右侧的 `数据模型`\
    \ 检查器，如图 8-7 所示。这也是除了在表或图形编辑器中双击之外，另一个可以更改关系名称的地方。\n\n![](img/index-82_1.jpg)\n\
    \n![](img/index-82_2.jpg)\n\n第 8 章 ■ 在 iOS 和 OS X 中使用 Core Data 与 SQLite\n\n***图\
    \ 8-7.** 完善你的关系*\n\n关系是双向的，但你需要在图形视图中配置关系的每一侧，然后在 `数据模型` 检查器中进行修改。图 8-7 显示了高亮显示的\
    \ `scores` 关系。`数据模型` 检查器中最重要的项目是 `名称`。你可以在这里更改它，也可以在图形视图中双击更改。\n\n你经常需要更改 `类型`\
    \ 设置，在 `对一` 和 `对多` 之间切换。当你这样做时，你会看到关系末端的箭头从单箭头变为双箭头（这是标准关系图表示法）。`类型` 有时被称为 *基数*。\n\
    \n图 8-8 显示了从 `User` 到 `Score` 的新关系，这是一个对多关系（注意双箭头）；其逆关系是一个对一关系（注意 `User` 端的单箭头）。\n\
    \n***图 8-8.** 指定关系的基数*\n\n![](img/index-83_1.jpg)\n\n第 8 章 ■ 在 iOS 和 OS X 中使用\
    \ Core Data 与 SQLite\n\n在配置关系时，人们经常使用窗口右下角的控件在图形视图和表视图之间来回切换。图 8-9 显示了表视图。\n\n\
    ***图 8-9.** 在关系中使用表视图*\n\n删除规则让你指定当尝试删除关系的一端时会发生什么。简而言之，你可以指定删除关系的源对象可能产生以下任何结果：\n\
    \n- **级联**。删除关系的一端会删除所有相关的对象。\n- **置空**。删除关系的一端，会导致剩余对象中对它的引用被设置为 `null`。\n- **拒绝**。你无法删除关系的一端。你必须通过删除子对象来逐步处理，直到没有相关对象留下，但你必须编写自己的代码来实现这一点。\n\
    - **无操作**。即使会产生悬垂指针，你也可以删除关系的一端。\n\n第 8 章 ■ 在 iOS 和 OS X 中使用 Core Data 与 SQLite\n\
    \n## 总结\n\n本章介绍了 Core Data，这个框架为 OS X、iOS、watchOS 和 tvOS 实现了对 SQLite 的访问。你已经学习了如何使用\
    \ Xcode 数据模型编辑器构建你的数据模型，以及如何构建关系——当 Core Data 在它生成并运行的 `SELECT` 语句中创建相应的 `WHERE`\
    \ 子句时，这些关系会为你实现。\n\n与 PHP 和 Android 相比，SQLite 数据建模的这一方面更具图形化而非面向文本的特性。然而，如果你喜欢编写传统代码，也无需担心。章节\
    \ [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9) 和 [10](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)\
    \ 展示了实现你的 SQLite 数据模型的 Objective-C 和 Swift 代码。\n\n## 第 9 章：在 Swift 中使用 SQLite/Core\
    \ Data (iOS 和 OS X)\n\n在了解了让你能够以图形方式构建 Core Data 环境的 Xcode Core Data 模型编辑器之后，现在该转向实现它的代码了。Core\
    \ Data 封装了**持久化存储**，在许多情况下，对于 OS X、iOS、watchOS 和 tvOS，这指的是内置的 SQLite 库。\n\n本章将介绍\
    \ **Core Data 栈**——在所有情况下执行工作的对象。它还将探讨你在实现自己的应用程序时可能使用的特定对象。\n\n在其他环境中暴露的 SQLite\
    \ 语法在这里仍然有效，正如你在第 [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8) 章关于数据类型的讨论中所看到的，实际工作是由\
    \ SQLite 完成的。\n\n### 了解 Core Data 栈\n\nCore Data 栈是一组协同工作以提供功能的对象的集合。它们如下：\n\n\
    - **托管对象模型**。这就是你在第 [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8) 章中看到的以图形方式构建的东西。它非常类似于通常所说的数据库模式。（模式是用形式化语言而非图形方式描述的。）请记住，关系在\
    \ Core Data 数据模型中是显式定义的，而在 SQLite（以及一般的 SQL）中，关系是通过你编写的 `WHERE` 子句来实现的。\n- **持久化存储协调器**。每个\
    \ SQLite 表通常表示为 Core Data 中的一个持久化存储。这种持久化存储和数据库表之间的一一对应关系在大多数情况下是足够的。然而，你可以拥有多个持久化存储以提高性能或提供其他优化。就\
    \ Core Data 栈而言，三个关键元素之一是持久化存储协调器，它负责协调给定 Core Data 应用程序的所有持久化存储。\n  在大多数情况下，持久化存储协调器处理单个持久化存储。然而，仍然使用其全称（持久化存储协调器），因为在更复杂的解决方案中，持久化存储协调器实际上管理多个持久化存储。正是持久化存储协调器及其持久化存储，完成了从平面的\
    \ SQLite 数据库文件到你在 Core Data 应用程序中使用的对象的转换。因此，在创建持久化存储时，你可以使用一些选项来指定底层数据是什么（在 OS\
    \ X 上是 XML，在任何平台上都可以是 SQLite，内存存储，以及未来可能创建的其他类型）。定义的存储类型包括 `NSSQLiteStoreType`、`NSXMLStoreType`\
    \ (OS X)、`NSBinaryStoreType` (OS X) 和 `NSInMemoryStoreType` (OS X)。\n- **托管对象上下文**。托管对象上下文就像一个暂存区：它包含从持久化存储检索到的、并且可能已经被你的应用程序修改过的数据。当你完成修改后，你就保存托管对象上下文。如果你想取消操作，只需销毁托管对象上下文即可。\n\
    \nCore Data 栈由这三个对象组成，它们相互关联以创建一个单一的实体。\n\n### 获取数据到 Core Data 栈\n\n获取请求可以在 Xcode\
    \ Core Data 模型编辑器或你的代码中创建。它们从持久化存储（通过持久化存储协调器）检索数据，并将其放置到托管对象上下文中。获取请求不是 Core\
    \ Data 栈的一部分，这一事实体现在 Core Data 的标准架构中（将在下一节描述）。\n\n### 构建一个 Core Data 应用程序\n"
- fmt: "The basic Core Data stack (persistent store coordinator, data model, and managed\
    \ object context) typically is placed in a location that is available throughout\
    \ the app. The most common case (used in Master-Detail Application and Single\
    \ View Application templates built into Xcode) places the Core Data stack in `AppDelegate`.\
    \ `AppDelegate` typically creates views and other objects within the app. If they\
    \ will need parts of the Core Data stack, `AppDelegate` passes them down to the\
    \ views either when they are created or when `AppDelegate` is managing them after\
    \ they have been created by others.\n\n## Chapter 9 ■ Using sQLite/Core Data with\
    \ swift (ios anD os X) Passing a Managed Object Context to a View Controller in\
    \ iOS\n\nHere is how the Master-Detail Application template for iOS passes the\
    \ managed object context to the view. (As is the case with Apple’s code samples\
    \ and much new code that’s written today, this is Swift code.)\n\n```\nfunc application(application:\
    \ UIApplication,\n    didFinishLaunchingWithOptions launchOptions: [NSObject:\
    \ AnyObject]?) -> Bool {\n    // Override point for customization after application\
    \ launch.\n    let splitViewController = self.window!.rootViewController as! UISplitViewController\n\
    \    let navigationController = splitViewController.viewControllers[splitViewController.viewControllers.count-1]\
    \ as! UINavigationController\n    navigationController.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitViewController.displayModeButtonItem()\n    splitViewController.delegate\
    \ = self\n    let masterNavigationController = splitViewController.viewControllers[0]\
    \ as! UINavigationController\n    let controller = masterNavigationController.topViewController\
    \ as! MasterViewController\n    controller.managedObjectContext = self.managedObjectContext\n\
    \    return true\n}\n```\n\nThe views are created from a storyboard, and this\
    \ code starts from the basic window and steps down until it finds the navigation\
    \ controller at the left of the split view controller. From there, it steps down\
    \ to the `MasterViewController` inside the navigation controller. Having gotten\
    \ that controller, it then sets the `managedObjectContext` property of `MasterViewController`\
    \ to the `managedObjectContext` created in the Core Data stack in `AppDelegate`\
    \ (that is the line of code shown in bold). This is the standard way of doing\
    \ this.\n\nYou can also get to the Core Data stack by finding the app delegate\
    \ and then accessing one of the stack objects from inside the `AppDelegate`. This\
    \ breaks the idea of encapsulation because you’re looking inside the app delegate.\
    \ However, you’ll find some sample code that does this in various places, and\
    \ a (weak) argument can be made for doing it this way if you only rarely—like\
    \ once—need to access the stack. Here’s the code for this other way of getting\
    \ to the stack.\n\n```\nlet appDelegate = UIApplication.sharedApplication().delegate\
    \ as! AppDelegate\n// use appDelegate.managedObjectContext or some other stack\
    \ property\n```\n\n## Chapter 9 ■ Using sQLite/Core Data with swift (ios anD os\
    \ X) Setting Up the Core Data Stack in AppDelegate for iOS\n\nThis code is from\
