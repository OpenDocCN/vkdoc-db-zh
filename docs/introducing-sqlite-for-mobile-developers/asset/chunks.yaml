- fmt: '# Chapter 3: Using SQLite Basics – Storing and Retrieving Data


    > **Note:** When a table name includes a blank, you need to place it in quotes.
    Note that in this example, the original `SimpleTable` has been renamed `Simple
    Table` so it needs to be quoted in the query. In SQLpro for SQLite, the gear wheel
    below the table list has a `Rename` command you can use to create or avoid this
    situation.


    ## Using SQLite3


    Following is the `sqlite3` code to enter all three records:


    ```sql

    INSERT INTO SimpleTable (PK, Name, Origin) VALUES (1, "Cecelia", "Australia");

    INSERT INTO SimpleTable (PK, Name, Origin) VALUES (2, "Leif", "Iceland");

    sqlite> INSERT INTO SimpleTable (PK, Name, Origin) VALUES (5, "Charlotte", "United
    States");

    ```


    ## Retrieving Data


    If you want to retrieve data from the table, you use a `SELECT` query. Here is
    an example:


    ```sql

    SELECT * FROM SimpleTable WHERE Name = "Leif"

    ```


    ## Using a Graphical User Interface


    You can type it into the Query pane as shown in Figure 3-7.


    ![Figure 3-7](index-40_1.jpg)


    **Figure 3-7.** Selecting data with a query


    ## Using sqlite3


    Here’s the code in `sqlite3`. Note how the data is formatted on return with vertical
    lines between the columns.


    ```

    sqlite> SELECT * FROM SimpleTable WHERE Name = "Leif";

    2|Leif|Iceland

    sqlite>

    ```


    ## Deleting Data


    If you are playing around with data, you may wind up with data you don’t want.
    In particular, you may be encountering errors because the `PK` field must be unique
    so you can’t re-enter data you’ve already entered.


    Here’s how to delete a row with `PK` value 1.


    ```sql

    DELETE FROM SimpleTable WHERE PK = 1;

    ```


    ## Summary


    This chapter has shown you the basics of creating a table, inserting data into
    it, and then retrieving it. Remember that these are only the basics: in later
    chapters, you’ll see more features of SQLite, but, throughout, the same basic
    SQLite commands you’ve seen in this chapter will recur with variations and options.
    (As a reminder, those commands are `CREATE`, `INSERT`, and `SELECT`.)


    # Chapter 4: Working with the Relational Model and SQLite


    You’ve seen how to create a table, add rows to it, insert data into it, and then
    retrieve the data. Granted, there’s not much data involved so far, but these are
    the basics of database management. Along the way you’ve seen that SQLite (like
    many other libraries and data managers) is typically embedded in a framework,
    language, class, or database management system (`DBMS`). As noted, today, most
    `DBMS`s are relational database management systems (`RDBMS`s). They are based
    on the relational model first proposed in 1970 by E. F. Codd, and they typically
    use SQL or a derivative (like SQLite!) to create, manage, and query the relational
    database.


    You’ve seen how to use one of the many graphical editors for SQLite (you can find
    them on the Web searching for “SQLite editor” and perhaps including your operating
    system in the search). You’ve also seen how to use basic SQLite syntax directly
    to create tables and work with their data. This chapter adds another tool to the
    mix: `sqlite3` which is a command-line tool distributed as part of SQLite.


    > **Note:** Most databases today use the relational model, so `DBMS` and `RDBMS`
    are more or less interchangeable terms. This chapter lets you see what is *not*
    interchangeable: it is only about relational databases (like SQLite). A relational
    database is a database in which two tables can be *related* to one another. It
    is the *tables* that are related, and the relationship is created based on *data*
    in each of the related tables. Thus, although in most of this book `DBMS` is used,
    in this chapter, because the topic is relational data, we use the term `RDBMS`.
    Relationships connect two tables, so in order to talk about relationships we need
    to start with two tables.


    Relationships can become very complex (and very powerful) as they are built. For
    that reason, some people shy away from them, but there is no reason to be concerned.


    This chapter provides an overview of how relationships work, why you should use
    them, and how easy it is to create them. Relationships usually involve two or
    more tables, so this chapter begins by showing you how to create two tables that
    are logically related.


    Then you’ll see how to use SQLite to actually relate them. (A relationship can
    actually be created from a single table back to itself. That is called a *self-join*.)


    ## Building the Users Table


    Consider the case of keeping score in a multiuser game. You can build on the basics
    from Chapter 3 to create a table like `SimpleTable`. In this case, the table is
    for users. From a data management point of view, there’s little difference between
    a table with names and birthplaces and a table with names and e-mail addresses.
    (The main difference is that the second table will be more useful in tracking
    game scores, which is what this example is all about.)


    There’s another difference that you’ll see when you look at the table as shown
    in Table 4-1 and compare it to `SimpleTable` (Table 3-1 in Chapter 3). The explicit
    primary key (column `PK`) is missing. This table uses the SQLite built-in mechanism
    for creating a primary key with a unique value for each row. Keep that thought
    in mind, because we’ll return to it shortly.


    **Table 4-1.** Users Table


    | Name | E-mail |

    | :--- | :--- |

    | Rex | rex@champlainarts.com |

    | Anni | anni@champlainarts.com |

    | Toby | toby@champlainarts.com |


    > **Note:** As noted previously, capitalization doesn’t matter in SQLite except
    within parentheses. By convention, SQL keywords are capitalized. In this book,
    names of tables and columns are typically capitalized in the text; in the sample
    code they may or may not be to reinforce the fact that it doesn’t matter to SQLite.
    In practice, it’s a very good idea to settle on a convention to use. That’s because
    many languages today do recognize the difference between upper- and lowercase
    letters. Thus, when you switch between writing SQLite code where `UseR` and `user`
    and `USER` are the same to Swift, objective-C, python, C, and others where case
    matters, you may inadvertently introduce errors for yourself or others by not
    adhering to a standard. (In addition, standard rules for naming and capitalization
    make your code easier to read and maintain in the future.)


    This is a good start, and you have already seen the code to create such a table
    in Chapter 3. With the revised column names and data, here’s how you can create
    and populate the table.


    ```

    sqlite> create table users (

    ...> Name char (128) not null,

    ...> email char (128)

    ...> );

    sqlite> insert into users (Name, email) VALUES ("Rex", "rex@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Anni", "anni@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Toby", "toby@champlainarts.com");

    sqlite> select * from users;

    Rex|rex@champlainarts.com

    Anni|anni@champlainarts.com

    Toby|toby@champlainarts.com

    sqlite>

    ```


    Now you need the related table which will keep track of scores.


    ## Building the Scores Table


    Building the `Scores` table is basically the same code. For the sake of simplicity,
    you can let each user start with a score of zero. With that assumption, here is
    the code.


    ```

    sqlite> create table scores (

    ...> Name char(128),

    ...> score integer

    ...> );

    sqlite> insert into scores (name, score) VALUES ("Rex", 0);

    sqlite> insert into scores (name, score) VALUES ("Anni", 0);

    sqlite> insert into scores (name, score) VALUES ("Toby", 0);

    sqlite> select * from scores;

    Rex|0

    Anni|0

    Toby|0

    sqlite>

    ```


    Table 4-2 shows the data in `Scores` at this point.'
