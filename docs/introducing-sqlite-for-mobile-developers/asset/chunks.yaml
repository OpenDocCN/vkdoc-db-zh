  raw: 'There have been two main ways of connecting SQLite to your database. The older
    one is a procedural style, and the newer one (since that long-ago year of 2005)
    is object-based. The pDO extension (php Data Object) is more robust and a better
    choice in every case except when you are tasked with modifying old php code that
    accesses SQLite databases in the older style.


    If you are leary of using object-oriented programming, rest assured that pDO is
    indeed object-oriented, but it works very well with standard php code. You don’t
    have to convert all of your code to objects and classes: you can use pDO for your
    SQLite database and, unless you really know what you’re looking for, you may not
    even realize that you’re using an object.


    pDO is an extension to SQLite, but the extension is built into the current versions;
    in fact, you need to make an effort to not have it available. It is described
    in this section. although you may find sample code in various places on the web,
    remember that pDO is now over ten years old, and it’s the current version. You
    may have difficulties opening older SQLite databases with the older style of code.
    (If you find sqlite_open in code you’re looking at, that’s the older—non-pDO—style.)


    Connecting to Your SQLite Database


    There are five steps involved and we will discuss them in detail shortly.


    1.


    **Create a new PDO instance**. It contains the name of the database


    to which you want to connect.


    2.


    **Create a query**. It typically is placed in a variable called $query,


    but you can use any name you want. The query is created by


    calling the prepare method on your PDO instance. If it succeeds,


    it returns a PDOStatement object.


    3.


    **Execute the query**. You do this by calling the execute method


    on the query (PDOStatement) that you have just created as in


    $query->execute(); It returns TRUE or FALSE but it does not


    return any values to you (yet).


    4.


    **Fetch the results from the executed query**. (Now you have


    the data.) The data is typically stored in an array variable called


    $results. You can use $query->fetch(); to fetch the next row


    of results. You can use $query->fetchAll(); to get an array of all


    results. Which method you choose is up to you and depends on


    your specific needs (and how much data you expect to retrieve).


    By default, the fetched results are in an associative array with


    elements identified by SQL column names.


    5.


    **Use the results of the query that you prepared, executed, and**


    **then fetched**.


    ChapTer 6 ■ USIng SQLITe wITh php


    Here are the details of each step.


    You start with a PHP file that you want to use to access your SQLite with the
    five steps shown here. If you name this file phpsql.php and upload it to your
    web site, you can access it w[ith http://mywebsite/phpsql.php](http://mywebsite/phpsql.php).
    The full file is shown later in this chapter.


    Here are the relevant components in detail.


    1\. Create a New PDO Object


    Create a new PDO object and place it in a local variable. Often, that variable
    is named $sqlite, but you can use any name you want. When you create the new PDO
    object, you must pass in the name of the SQLite file, including any paths relative
    to the location on the server where your PHP file is. The quoted name starts with
    the data source name (DSN) sqlite:. This is part of the quoted string that includes
    the file’s location.


    Following is an example:


    $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');


    There is another style you can use. It may or may not be clearer for you (and
    the people who will revise your code in the future). These are interchangeable.


    $db = ''sqlite:sqlitephp.sqlphpproject'';


    $sqlite = new PDO($db);


    ■ **Note** There are other DSn strings including mysql, pgsql (postgres), msql,
    sybase, or dblib (SQLServer or Sybase), odbc, ibm (IBM DB2), informix, firebird
    (Firebird or Interbase).


    **haNDLe errOrS prOperLY**


    It’s a good practice for your users (and for yourself when debugging) to handle
    errors neatly. The “or die” clause does that in a very basic level. You provide
    a string that is displayed. In the case of php code generating a web page, the
    quoted string can include hTML formatting as in this example:


    $sqlite = new PDO(''sqlite:sqlitephp.sqlite'')


    or die ("<h1>Can''t open database</h1>");


    For debugging purposes you may want to provide a diagnostic message when or die
    doesn’t fail. You can always take these messages out before moving to production
    but they’ll help you follow along with each step to see whether or not it succeeds.


    echo "<p>Success on PDO</p>";


    It’s better ultimately to use a try/catch block, but or die is more concise and
    is used to simplify the code in this book.


    ChapTer 6 ■ USIng SQLITe wITh php


    2\. Create and Prepare the Query


    You use the same queries that you use directly in an interactive editor like sqlite3
    in any other environment. The only difference with PDO is that you create the
    query in a single step before you use it.


    Here is an example of creating a query, storing it in a variable, and catching
    failures as well as logging successes (the latter only for debugging). Note that
    you have to use the prepare method on the instance of PDO that you have created
    — in this case it’s $sqlite.


    $query = $sqlite->prepare ("select Name from users;")


    or die ("<h1>Can''t prepare</h1>");


    echo "<p>Success on prepare</p>";


    3\. Execute the Query


    Now that you have created a query, with the prepare method of your PDO instance,
    call the execute method on that query to actually run it. As usual, catch errors
    and, for debugging, print out successes as well. Here is the code. Note in this
    example that the or die clause doesn’t use any specific HTML formatting. That
    is only to show you that it can be done either way.


    $query->execute() or die ("Can''t execute");


    echo "<p>Success on execute</p>";


    4\. Fetch the Results


    The execute method returns TRUE or FALSE, but the data isn’t available until you
    fetch it.


    (If you’ve used other databases before, you’ll recognize this pattern.) You can
    get all of the rows at once with fetchAll, or you can get each one separately
    with fetch.


    The fetch version gets one row at a time. By default, it returns the next row
    of the results set as an array indexed by column name as well as by a zero-relative
    column number reflecting the items in your SQLite SELECT statement. There is also
    an optional $cursor_offset parameter which lets you jump around in the results
    set.


    The fetchAll version gets all of the data at once as an array. You’ll see both
    fetchAll and fetch in the following step.


    5\. Use the Results


    You loop through the returned array elements in your code. In either case, you
    echo the result value(s) in your PHP code, combining the returned value with any
    HTML you want to use. For example, in the fetchAll scenario, you loop through
    each returned row, placing each row into a local variable (typically called $row,
    but you can use any name you want).


    ChapTer 6 ■ USIng SQLITe wITh php


    Here is the relevant fetching and looping code. (It refers to the Users table
    shown previously in Ta[ble 6-1.)](#index_split_000.html#59)


    $result = $query->fetchAll() or die ("Can''t fetchAll");


    echo "Success on fetchAll "; // for debugging


    foreach ($result as $row) {


    echo "<p>Name: {$row[''Name'']}</p>";


    }


    Putting together all of the steps in this chapter you can get a PHP file such
    as the following. Remember to customize it for your database name and the column
    name(s) you want to display. The code to customize is shown in bold.


