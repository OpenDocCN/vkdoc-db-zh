    \ iOS 的特性而设计的。OS X 有一个单独的特性，即绑定，它也能非常方便地与核心数据协同工作。然而，它与 iOS 上使用的基于表格的界面不同。\n\n\
    现在，是时候继续前进了，使用核心数据/iOS 来实现第 11 章中的 PHP 代码。\n\n## 故事仍在继续…\n\n第 8 章提供了使用 Xcode 核心数据模型编辑器的指南。你看到了从\
    \ Xcode 附带的主从应用程序模板创建新项目所涉及的步骤，然后将其转换为更复杂的数据结构。在本章末尾，你有了两个实体和连接它们的两种关系。图 12-1\
    \ 显示了在核心数据模型编辑器中，第 8 章结束时的数据库情况。（注意，在边栏中同时选择了 `Score` 和 `User`，因此编辑器中显示的属性和关系是这两个实体的并集——用数据库术语来说，就是使用的属性和关系的并集。）\n\
    \n![](img/index-145_1.jpg)\n\n`图 12-1. 从第 9 章的数据库开始`\n\n如果你想跟随本章操作，你可以复制该数据库，也可以下载本章的示例文件。（对于本章，已创建了一个名为\
    \ `Scores` 的新项目，但项目名称完全由你决定。）核心数据模型中的两个实体 `User` 和 `Score` 与你一直使用的表相同。核心数据的一个重要部分是，它会为你管理主键和外键。SQLite\
    \ 确实会为你创建一个主键（`rowid`），除非你明确表示不想使用它。使用 SQLite 的核心数据也会这样做，但这是在幕后发生的。如果你用实用工具打开一个核心数据的\
    \ SQLite 文件，你会看到数据库中的这些键。\n\n> **警告** 你可以查看 SQLite 数据库，但请记住核心数据在管理它们。不要对它们进行修改。在最好的情况下，你会立即破坏你的核心数据项目。在最坏的情况下，你会制造一个定时炸弹，它会在你（和你的用户）最意想不到、最没有时间处理的时候爆炸。如果你已经有一个\
    \ SQLite 数据库并想将其导入核心数据，最简单的方法是导出数据（可能导出为中性格式，如 CSV——或逗号分隔值），然后将其导入到你的核心数据应用程序中。\n\
    \n## 为 Core Data 调整数据模型和模板\n\n需要修改数据模型，使其不再依赖显式键（核心数据在后台使用它们），并且需要对现有代码进行一些微调，使其能正常运行。\n\
    \n### 摆脱键并修订数据模型\n\n第 8 章中使用的数据模型旨在匹配本书中各种项目使用的基础数据。在本章中，可以修改该数据模型，以摆脱核心数据不需要的一些额外负担。具体来说，你可以进行的主要更改是移除主键。核心数据管理自己的主键，因此没有理由重复这个。\n\
    \n“但是等等！”你可能会想。“没有主键，我如何将分数与用户关联起来？”\n\n当精通数据库的开发人员初次使用核心数据时，这个问题非常常见。多年来（对许多人来说是几十年），我们一直依赖那些主键。摆脱它们很困难——这几乎是一种生理上的不适。重要的是要记住，你的目标是关联两个实体——在这里，是将特定分数与特定用户关联起来。一边的主键和另一边的外键使得这成为可能，但它们是一个实现问题：你想做的是将特定分数与特定用户关联起来。\n\
    \n来自第 8 章的数据模型（如图 12-1 所示）省略了这些键——包括主键和外键。缺少这些键在第 8 章中没有造成困难，现在也没有问题。到目前为止使用的数据库表视图被设计为在各种平台上实现，但对于构建核心数据应用程序，可以修改它们以省略不再需要的键。\n\
    \n将 `timeStamp` 改为 `name`\n"
- fmt: '# 使用 Core Data/iOS 应用的简单数据库


    ## 修改数据模型


    如果你修改了第9章（`http://dx.doi.org/10.1007/978-1-4842-1766-5_9`）的代码或 Xcode Master-Detail
    Application 模板，你很可能已将 `Event` 实体改为 `User`，并将 `timeStamp` 日期属性替换为 `name` 字符串属性。不一定非要按此顺序操作，但这可能是你已完成的步骤。接着，你可能创建了一个新实体
    `Score`。


    另一种可能是将 `Event` 改为 `Score` 并创建 `User` 作为新实体。还有一种情况是删除 `Event`，并为 `User` 和 `Score`
    都创建新实体。无论哪种方式，你最终应该得到如图12-1所示的数据模型。


    使用 Xcode 中的查找导航器在项目中搜索 `timeStamp`。如果你已经更改了数据模型，唯一能找到的引用将是 `MasterViewController`
    的 `insertNewObject` 函数中的初始化代码。如果你已将 `timeStamp` 改为 `name`，你将得到以下代码行：


    ```swift

    newManagedObject.setValue(NSDate(), forKey: "name")

    ```

    （这段代码最初是 `forKey: "timeStamp"`）。


    新属性是字符串，而不是日期。你可以很容易地解决这个问题：只需使用大多数 `NSObject` 实例（及其子类）的 `description` 函数。该函数返回实例的字符串值。因此，将该行修改为：


    ```swift

    newManagedObject.setValue(NSDate().description, forKey: "name")

    ```

    它仍然会设置当前日期，但这次它将作为字符串（`description`）而非 `NSDate` 实例使用。


    ## 在你的设备或模拟器上创建新数据库


    从模拟器或你的设备上移除该应用。你会收到一个警告，提示将删除其所有数据：这正是你想要做的。你已经更改了数据模型，用先前数据模型创建的数据将无法工作。（Core
    Data 中有迁移例程，但它们超出了 *Introducing SQLite* 的范围。）


    ## 向应用添加 Score 表和界面


    第一步是查看你当前拥有的内容。然后你可以继续添加 `Score` 详细信息。


    ### 确保你可以在 Master View Controller 中用 `+` 添加新用户


    如果你在点击主视图控制器左上角的 `+` 时没有看到时间戳，你可能已将 `Event` 实体替换为 `Score`。控制使用 `+` 创建哪个实体的代码位于
    `MasterViewController.swift` 的 `fetchedResultController` 中。


    以下是相关代码行：


    ```swift

    let entity = NSEntityDescription.entityForName

    ("User", inManagedObjectContext: self.managedObjectContext!)

    ```

    在 Xcode 模板中，它最初是：


    ```swift

    let entity = NSEntityDescription.entityForName

    ("Event", inManagedObjectContext: self.managedObjectContext!)

    ```

    经过你的修订，你可能最终得到：


    ```swift

    let entity = NSEntityDescription.entityForName

    ("Score", inManagedObjectContext: self.managedObjectContext!)

    ```

    你需要创建 `User` 实体，所以确保在必要时修订了代码。


    ![image](index-148_1.jpg)


    ## 使用详细视图


    当你现在运行应用时，你将能够向用户列表（原事件列表，但你只是更改了名称）添加新项目。当你添加一个新用户时，你可以点击/轻触它以在详细视图控制器中查看其详细信息，如图12-2所示。


    **图12-2.** 在详细视图（右）中查看详细信息，主视图在左侧


    确保你所看到的内容与图12-2（至少大致匹配——这是一台横向的 iPhone 6 Plus）相符。一旦完成，你就可以继续了。


    ## 为 Score 使用详细视图


    此处的目标是用表控制器替换现有的详细视图，该控制器显示给定用户的所有分数，并让你能够添加新分数。图12-3展示了你的目标。


    ![image](index-149_1.png)'
  raw: 'If you’ve modified the Chapter [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)
    version of the code or the Xcode Master-Detail Application template, you have
    probably changed the Event entity to User and replaced the timeStamp date attribute
    with a name string attribute. It’s not necessary to do this in this order, but
    it’s what you may have done. Then, you may have created a new entity, Score.


    It’s also possible to change Event to Score and create User as a new entity. In
    another scenario, you can delete Event and create new entities for both User and
    Score. Either way, you should wind up with the data model shown in Figure [12-1](#index_split_001.html#145).


    Use the find navigator in Xcode to search your project for timeStamp. If you’ve
    already changed the data model, the only reference you will find is the initialization
    code in MasterViewController’s insertNewObject function. If you have changed timeStamp
    to name, you’ll wind up with the following line of code:


    newManagedObject.setValue(NSDate(), forKey: "name")


    (This code started out with forKey: "timeStamp").


    The new attribute is a string, not a date. You can get around this problem quite
    easily: simply use the description function of most NSObject instances (and their
    descendants). That function returns a string value of whatever the instance is.
    Thus, change the line to read


    newManagedObject.setValue(NSDate().description, forKey: "name")


    It’s still going to set the current date, but this time it will be used as a string
    (description) rather than a NSDate instance.


    Chapter 12 ■ Using the simple Database with a Core Data/ios app Create a New Database
    on Your Device or Simulator


    Remove the app from the simulator or from your device. You’ll get a warning that
    you will remove all its data: that’s exactly what you want to do. You’ve changed
    the data model, and data that was created with a previous data model won’t work.
    (There are migration routines in Core Data, but they are beyond the scope of *Introducing
    SQLite*.) Add the Score Table and Interface to the App


    The first step is to see what you have now. Then you can move on to adding Score
    detail information.


    Making Sure You Can Add New Users with + in the


    Master View Controller


    If you’re not seeing timestamps when you click + at the top left of the master
    view controller, you may have replaced the Event entity with Score. The code that
    controls which entity you create with the + is in fetchedResultController in MasterViewController.swift.


    Following is the relevant line of code:


    let entity = NSEntityDescription.entityForName


    ("User", inManagedObjectContext: self.managedObjectContext!)


    This started out in the Xcode template as:


    let entity = NSEntityDescription.entityForName


    ("Event", inManagedObjectContext: self.managedObjectContext!)


    With your revisions, you may have wound up with:


    let entity = NSEntityDescription.entityForName


    ("Score", inManagedObjectContext: self.managedObjectContext!)


    You want to create User entities, so make sure that you revise the code if necessary.


    ![](index-148_1.jpg)


    Chapter 12 ■ Using the simple Database with a Core Data/ios app


    Working with the Detail View


    When you run the app now, you’ll be able to add new items to the list of users
    (formerly the list of events but all you’ve done is change the name). When you
    add a new user, you can click/tap on it to see its details in the Detail View
    Controller as shown in Figure [12-2.](#index_split_001.html#148)


    ***Figure 12-2.** See detail information in the detail view (right) with the master
    view at the left* Make certain that what you see matches Figur[e 12-2](#index_split_001.html#148)
    (at least mostly—this is a landscape-oriented iPhone 6 Plus. Once you’ve done
    that, you can move on.


    Working with the Detail View for Score


    The goal here is to replace the existing detail view with a table controller that
    displays all the scores for a given user and gives you the ability to add new
    ones. Figur[e 12-3 sho](#index_split_001.html#149)ws what you’re aiming for.


    ![](index-149_1.png)'
