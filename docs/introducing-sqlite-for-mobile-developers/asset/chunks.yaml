- fmt: "# 理解SQLite是什么\n\nSQLite处于公共领域，因此任何人都可以使用。更多详情和下载源代码的链接可在sqlite.org找到。\n\n\
    你可以将源代码编译成一个库，然后在你的应用程序中使用。尽管你可能会看到将SQLite称为DBMS的说法，但从严格意义上讲，它只是一个库。包含该库的容器（一个类、一个框架或一个完整的DBMS）提供了更广泛的DBMS功能。\n\
    \n## SQLite是DBMS吗？\n\n在某种程度上，这个问题只有在能以某种影响你设计或实现基于SQLite项目的方式回答时才显得重要。然而，如果你追溯关于SQLite的参考资料，你会看到它通常（正确地）被称为一个库或一个数据库引擎。\n\
    \n从一开始，其代码就被设计为紧凑和可复用的。\n\n（这里提及它源自美国海军是有相关性的——当你在海上航行时，所有资源都是有限的，包括电力、空间和重量。此外，在现代舰船中，技术组件必须协同工作，即使它们来自不同的供应商。这就是SQLite的环境。）\n\
    \n无论你担心的是舰船上的有限资源，还是运行Android或iOS等操作系统的移动设备上的有限资源，或是像可编程信标这样的小型移动设备上的有限资源……甚至超级计算机上的有限资源（“有限”总是相对的），SQLite在许多情况下都是一个不错的选择。\n\
    \n以下部分重点介绍了SQLite实现这一使命的一些主要特性，这些特性在你将其用于你所选择的容器（DBMS、类、框架或基础库）时都很重要。当你为移动设备开展基于SQLite的项目时，这些特性对你很重要。\n\
    \n本节讨论的特性实际上都围绕着一个事实：SQLite是一个被设计为供单一用户处理数据库功能的库。\n\n（在你放弃之前，请继续阅读以了解SQLite如何在多用户和多进程环境中表现良好。）以下是需要考虑的特性：\n\
    \n*   SQLite是为单一用户设计的\n*   SQLite是自包含的\n*   SQLite支持事务并符合ACID标准\n\n> **注意** 你可以在sqlite.org上找到关于这些主题的更多详细信息。\n\
    \n## SQLite是为单一用户设计的\n\nSQLite与大多数DBMS的最大区别之一在于，SQLite是为单一用户设计的。大多数DBMS管理多个用户，包括各种安全特性，允许或阻止对特定SQL命令和功能的访问。对许多人来说更重要的是，DBMS管理资源争用，以便多个用户可以显然地同时使用相同的数据。\n\
    \n*显然*是这里的关键词，因为尽管每个用户通常认为他或她拥有对数据库的独占访问权，但实际上，在幕后，DBMS管理着并发性，以便在某些情况下，当一个用户正在更新记录时，它会锁定该记录以防止第二个用户访问它。\n\
    \n### 单一用户不意味着单线程\n\nSQLite在自己的环境中管理并发性。这意味着它可能同时运行多个线程来执行其自身任务，但这些线程是在SQLite环境内部管理的。它们不代表单独的用户。\n\
    \n### 在多用户环境中使用SQLite\n\n当SQLite是为单一用户设计时，你怎么能拥有多个用户呢？答案很简单：你自己管理多个用户。有多种方法可以做到这一点，但一般来说，你需要将多用户管理推送到嵌入SQLite的应用程序、类或语言中。应用程序通常具有相互通信的能力（受安全性和平台限制）。因此，尽管SQLite不会管理用户A和用户B试图同时修改相同*数据*的情况，但你的应用程序可以做到这一点。\n\
    \n典型的并发策略包括拥有一个管理并发性的主进程，或者拥有一种机制，使得多个独立进程无需主进程即可通信。你在诸如Dropbox之类的应用程序以及许多基于云的应用程序中可以找到许多独立进程的例子。（对于Dropbox和基于云的应用程序，可能有一个进程持续在云端的某处运行，并且可能在活动的客户端上运行单独的进程。控制权是驻留在中央进程中还是分布在客户端（和主机）中，取决于具体的实现。）\n\
    \n因此，SQLite完全有能力在多用户世界中运行；它只需要在自身实现了多用户功能的应用程序或其他进程内运行即可。\n\n## SQLite是自包含的\n\n\
    SQLite在两个方面是自包含的。\n\n*   代码本身是自包含的ANSI-C代码。它对C库的使用极少。事实上，它只使用：\n    *   `memset()`\n\
    \    *   `memcpy()`\n    *   `memcmp()`\n    *   `strcmp()`\n    *   `malloc()`\n\
    \    *   `free()`\n    *   `realloc()`\n*   数据存储本身是自包含的、可移植的且与平台无关。\n\n### 自包含代码\n\
    \n自包含代码意味着当你将SQLite库包含到你的项目中时（直接包含或通过语言、类或框架包含），你就拥有了所需的一切。你不需要包含额外的库。\n\n你不必担心版本问题，并且一旦你拥有了一个编译好的SQLite库，你通常可以在不依赖于组件变更的情况下重用它。\n\
    \n（不过请记住，在大多数情况下，SQLite是嵌入在语言、类、框架或DBMS中的，因此你需要时不时更新的是容器。）由于SQLite处于公共领域，你不必担心许可证或许可费用。（然而，你也可以按照sqlite.org上的描述获得许可证。该选项是为一些需要向管理层证明他们确实有权使用SQLite的用户提供的。）\n\
    \n请记住，SQLite通常包含在你正在使用的类、框架或语言中，因此这个特性（在很大程度上使得这种可包含性成为可能）对你可能是不可见的。\n\n> **注意**\
    \ 如果你访问sqlite.org，你会发现SQLite源代码的各种下载选项。有选项可以下载分段的源代码，这些源代码在最终构建中会合并（*amalgamated*）。这样做主要是为了适应那些难以一次性处理完整构建的开发环境。\n\
    \n### 自包含数据\n\nSQLite用于数据库的数据存储被设计为自包含且跨平台的。这意味着在大多数情况下，你可以将SQLite文件从一个环境传输到另一个环境而不会出现问题。（这个警告是必要的，因为你可能会在特定配置中遇到问题，但对于许多（如果不是大多数）SQLite用户来说，验证数据库是否可以移动的第一步就是实际移动它——这通常是有效的。）在其最基本（和原始）的形式中，每个SQLite数据库都存储在一个单一文件中。\n\
    \n该文件在任何平台上都是可读和可写的（受文件系统环境约束）。例如，如果你将文件放在只读磁盘上，你无法用SQLite写入它。（这可能听起来很牵强，但这种事情确实会发生。）\n\
    \n由于数据库存储在单个文件中，用户可以看到它并在需要时移动它。"
  raw: 'SQLite is in the public domain, so it can be used by anyone. Further details
    and links to download the source code are available at sqlite.org.


    You can compile the source code into a library that, in turn, you can use in an
    application program. Although you may find references to SQLite as a DBMS, it
    is, strictly speaking, just this library. The container in which that library
    is compiled (a class, a framework, or a full-fledged DBMS) provides the larger
    DBMS functionalities.


    **IS SQLIte a DBMS?**


    in some ways, this only matters if that question can be answered in a way that
    influences the way you design or implement your sQLite-based project. however,
    if you track down references to sQLite, you’ll see that it is usually referred
    to (correctly) as a library or as a database engine.


    The code has been designed from the beginning to be compact and reusable


    (that reference to its origin with the U.S. Navy is relevant here—when you’re
    on a ship at sea, every resource is limited, including power, space, and weight.
    Furthermore, in modern ships, technological components must function together
    even if their origins are with multiple vendors. That’s the SQLite environment.


    Whether you are worried about the limited resources on a ship, on a mobile device
    running an operating system such as Android or iOS, or on a small mobile device
    such as a programmable beacon . . . or even the limited resources on a supercomputer
    (“limited” is always relative), SQLite is a good choice in many cases.


    The following sections highlight some of the major features of SQLite that implement
    this mandate and that are important to you as you use it in whatever container
    you choose (DBMS, class, framework, or basic library). These features are important
    to you as you undertake a SQLite-based project for a mobile device.


    The features discussed in this section actually all revolve around the fact that
    SQLite is a library that is designed to be used by a single user to handle database
    functionality.


    (Before you throw up your hands, read on to see how SQLite can function very well
    in a multiuser and multiprocess environment.) The following are the features to
    consider:


    •


    SQLite is designed for a single user


    •


    SQLite is self-contained


    •


    SQLite supports transactions and is ACID-compliant


    ■ **Note** You can find more details on these topics at sqlite.org.


    Chapter 2 ■ Understanding What sQLite is


    SQLite Is Designed for a Single User


    One of the biggest differences between SQLite and most DBMSs is that SQLite is
    designed for a single user. Most DBMSs manage multiple users including various
    security features that allow or block access to specific SQL commands and features.
    Even more important to many people, a DBMS manages contention for resources so
    that several users can apparently use the same data concurrently.


    *Apparently* is the key word here because although each user typically thinks
    that he or she has unique access to the database, in fact, behind the scenes the
    DBMS manages concurrency so that in some cases, it has locked a record to prevent
    access to it by a second user while another user is updating it.


    Single User Doesn’t Mean Single-Thread


    SQLite manages concurrency within its own environment. This means that it may
    have multiple threads running at the same time to perform its own tasks, but those
    threads are managed within the SQLite environment itself. They do not represent
    separate users.


    Using SQLite with Multiple Users


    How can you have multiple users when SQLite is designed for a single user? The
    answer is simple: you manage multiple users yourself. There are a number of ways
    of doing this, but in general, what you do is to push the multiuser management
    onto the app, class, or language into which SQLite is embedded. Apps typically
    have the ability to communicate with one another (subject to security and platform
    constraints). Thus, although SQLite is not going to manage the case of User A
    and User B attempting to modify the same *data* at the same time, your app can
    do so.


    Typical concurrency strategies involve either having a master process that manages
    the concurrency or having a mechanism whereby multiple independent processes communicate
    without a master process. You find many examples of multiple independent processes
    in apps such as Dropbox and in many cloud-based apps. (In the case of Dropbox
    and cloud-based apps, there may be a process continually running somewhere in
    the cloud and, perhaps separate processes running on active clients. Whether or
    not control resides in a central process or is distributed among the clients (and
    master) varies depending on the specific implementation.)


    Thus, SQLite is perfectly capable of functioning in a multiuser world; it just
    needs to be running inside apps or other processes that themselves implement the
    multiuser features.


    Chapter 2 ■ Understanding What sQLite is


    SQLite Is Self-Contained


    SQLite is self-contained in two ways.


    •


    The code itself is self-contained ANSI-C code. It makes minimal


    use of C libraries. In fact, the only ones it uses are


    •


    memset()


    •


    memcpy()


    •


    memcmp()


    •


    strcmp()


    •


    malloc()


    •


    free()


    •


    realloc()


    •


    The data store itself is self-contained, portable, and


    platform-agnostic.


    Self-Contained Code


    Self-contained code means that when you include the SQLite library in your project
    (either directly or through a language, class, or framework), you have everything
    you need. You don’t need to include additional libraries.


    You don’t have to worry about versions, and, once you have a compiled SQLite library,
    you can generally reuse it without being dependent on changes in components.


    (Remember, though, that in most cases SQLite is embedded in a language, class,
    framework, or DBMS so the container is what you will need to update from time
    to time.) Because SQLite is in the public domain, you don’t have to worry about
    licenses or license fees. (You can, however, obtain a license as described on
    sqlite.org. That option is provided for some users who need to demonstrate to
    their management that they actually have the right to use SQLite.)


    Remember that SQLite is often contained within a class, framework, or language
    that you are using so this feature (which to a large extent makes such containability
    possible) may not be visible to you.


    ■ **Note** if you go to sqlite.org, you’ll find the various download options for
    the sQLite source code. there are options to download it in sections that are
    combined ( *amalgamated*) in the final build. this is done primarily to accommodate
    development environments that have trouble handling the full build at one time.


    Chapter 2 ■ Understanding What sQLite is


    Self-Contained Data


    The data store that SQLite uses for a database is designed to be self-contained
    and cross-platform. This means that you can transfer a SQLite file from one environment
    to another without problems in most cases. (That caveat is necessary because you
    may encounter issues in specific configurations, but for many if not most SQLite
    users, the first step in verifying that a database can be moved is to actually
    move it—this usually works.) In its most basic (and original) form, each SQLite
    database is stored in a single file.


    The file is readable and writable on any platform (subject to environmental constraints
    on the file). For example, if you place the file on a read-only disk, you can’t
    write to it with SQLite. (This may sound far-fetched, but such things do happen.)


    With the database in a single file, users can see it and move it around if they
    want.'
