    it is so lightweight and flexible. You can put up a SQLite database with basic
    functionality very quickly. That’s where this book comes in. If you have the data
    and the mission to come up with something that uses the data – website, mobile
    app, or standalone software product – SQLite can be just what you want.


    SQLite runs on many operating systems. With SQLite, you’re working with a database
    that you can move around from one platform to another and one development environment
    to another. Your prototyping, experimentation, and development can proceed without
    committing yourself to anything besides the relational model and SQLite. You may
    move on to other relational tools, and your little SQLite app may turn into a
    production app for a multitude of devices or for a single many-multi-threaded
    corporate data center.


    This flexibility and very low barrier to entry are two of the features that many
    people including me find attractive in SQLite.


    I hope that you’ll find this book useful. There’s more information on SQLite at
    sqlite.org, and there’s more information (and downloadable examples from the book)
    on my website at northcountryconsulting.com.


    —Jesse Feiler


