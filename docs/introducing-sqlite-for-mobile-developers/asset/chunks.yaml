    Synthesizing Properties in AppDelegate.m


    Properties are declared in header files, but they must be synthesized in the body
    files. The


    @synthesize compiler directive typically involves creating a backing variable
    with the name of the property and accessing it directly when you’re in the body.
    Properties that are exposed in the header file are accessed as properties using
    dot notation, and behind-the-scenes property accessors work with the backing variables
    (the underscored variables).


    Except for special cases such as Core Data, a lot of this is done for you automatically
    if you want the default backing variable names.


    @synthesize managedObjectContext = _managedObjectContext;


    @synthesize managedObjectModel = _managedObjectModel;


    @synthesize persistentStoreCoordinator = _persistentStoreCoordinator;


    Creating **applicationDocumentsDirectory** in iOS


    This code uses the default file manager to find the document directory for your
    app. If you want to change the location of your data model’s directory, change
    it here in the code shown in bold. Either use a different directory or create
    one of your own (and be careful when you’re not using the default directory).


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC)


    - (NSURL *)applicationDocumentsDirectory {


    // The directory the application uses to store the Core Data store file.


    // This code uses a directory named "com.champlainarts.SingleViewAppOC" in the


    // application''s documents directory.


    **return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory**
    **inDomains:NSUserDomainMask] lastObject];**


    }


    Creating **managedObjectModel** in iOS and OS X


    Here the managedObjectModel code is created as needed. The line shown in bold
    is created when you use the template. If you change your project’s name, change
    this line of code. Also note that, by default, the core data model is stored in
    the app bundle. The xcdatamodeld file that you build with Xcode Core Data model
    editor is compiled into a momd file during the build process.


    - (NSManagedObjectModel *)managedObjectModel {


    // The managed object model for the application. It is a fatal error for the


    // application not to be able to find and load its model.


    if (_managedObjectModel != nil) {


    return _managedObjectModel;


    }


    **NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"SingleViewAppOC"**


    **withExtension:@"momd"];**


    _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL


    :modelURL];


    return _managedObjectModel;


    }


    Creating **persistentStoreCoordinator** in iOS


    This code creates a persistent store coordinator based on your managed object
    model. The first line shown in bold is created based on your project name, and
    it contains the location of the SQLite database file. You normally don’t move
    this file, but this is another place where you might have to change the file name
    if you have changed the project name.


    Note that in using the data model, if self.managedObjectModel does not exist yet,
    it will be created after the reference here. Notice that this is done differently
    than it is in Swift.


    It’s also worth pointing out the line where the SQLiteStoreType is chosen for
    the new persistent store. It’s shown in the second bold line.


