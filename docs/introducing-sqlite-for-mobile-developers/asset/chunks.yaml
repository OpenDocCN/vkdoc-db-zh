    Summary


    You now have the basics of an app that uses the built-in SQLite database, the
    Xcode Core Data model editor and Core Data framework to work with the database,
    and the Cocoa Touch framework for iOS to bring it all together.


    What you’ve seen in working with PHP and Core Data and in the summary of


    Android is that there are languages (PHP and others) as well as frameworks (Cocoa
    Touch and Cocoa) and application programming interfaces (APIs) (Android) that
    build on SQLite. The degree to which the SQL syntax for SQLite is exposed varies
    from very little (Core Data) to a great deal (PHP) and various middle roads such
    as Android.


    What is important is that you understand the principles and functionality.


    Remember, too, that in building any database-driven app, the more that you can
    put into your database the less code you have to write. Take advantage of validation
    options, GROUP


    BY clauses, and everything else that you can find. The less code you write the
    less time it will take (to write and to debug!).


