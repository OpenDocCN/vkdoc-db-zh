  trans: '# 在 PHP 中使用 SQLite


    SQLite 本身非常轻量级：在许多情况下，它对用户及其设备造成的负担极小。这种简洁结构与轻量级实现的结合，使得 SQLite 成为网站中使用的流行工具。由于它是单用户实现，常用于存储单个用户的数据，但正如之前提到的，它也可以用来为使用任何更强大
    SQL 实现构建的大型系统进行原型设计。


    无论你正在进行单用户项目还是为更大规模的系统制作原型，SQLite 都是一个不错的选择，并且它与 PHP 配合得很好。本章将简要概述（或回顾）PHP；然后展示如何使用
    PHP 在网页上实现[第 3 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_3)和[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中所示的基本表。


    > **注意** 本章重点介绍 `php`/SQLite 集成的基础知识。关于如何在一系列网页中使用的示例，请参见[第 11 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_11)。为了测试本章的代码，你需要一个基本的文本编辑器——最好是像
    BBEdit 这样的编辑器，它能为你高亮显示语法，以便轻松发现小错误。你还需要一个服务器来上传你的 `php` 文件以及一个 SQLite 数据库。如果你正在维护一个网站，你会拥有访问这样一个服务器的权限来发布你的
    `html` 页面。服务器上可能安装了也可能没有安装 `php`。大多数服务器都有，但出于安全原因，有些会限制访问。如果你遇到任何困难，请咨询你的服务器管理员。


    ## 为 PHP 定义“单用户”


    SQLite 是为单用户设计的。它常与 `php` 一起用于实现网站。这是否意味着你的 `php`/SQLite 网站是为单用户设计的？


    答案是“是的”，但细节可能会让你感到惊讶。当你在网页中使用 `php` 时，存在一个单一用户——那就是 Web 服务器。根据你的应用程序不同，SQLite
    可能是一个好选择，也可能不是（但对于原型设计和测试来说，它几乎总是一个好选择）。静态数据库在大多数情况下如果数据量不大，都能很好地工作。


    如果你的应用需要更新数据库，并且使用 SQLite，当用户数量稍多时（这也取决于用户更新数据的频率），你可能会很快遇到麻烦。


    ## 将 PHP 与 SQLite 结合：基础知识


    `PHP` 可能是使用最广泛的服务器端编程语言。严格来说，它是一种脚本语言，这意味着它在运行时（在实际应用中，通常指网页加载时）被解释执行。在这种场景下，`PHP`
    脚本的输出通常是一个网页。当 `PHP` 脚本运行时，它可以执行各种各样的操作，包括与其他进程和设备通信，在 SQLite 的上下文中，它可以与驻留在 Web
    服务器上的 SQLite 数据库进行通信。


    ## 验证你的环境中的 PHP


    首先验证你的服务器上是否安装了 `PHP`，并且你可以访问它。（如果你已经使用 `PHP` 处理网站或其他文件，可以跳过此步骤。）


    下面是一个简单的基于 `PHP` 的网页代码。它只是请求在服务器上显示当前的 `PHP` 状态信息。如果它不起作用，请咨询你的管理员，因为如果缺少 `PHP`
    部分，你将无法试验 SQLite 和 `PHP`。除了 `PHP`，你可能还需要验证服务器上是否可用 SQLite，但在许多（可能是大多数）情况下都是可用的。


    > **警告** 与 SQLite 不同，`php` 是大小写敏感的，所以请注意你的大小写。这也是一个很好的理由，在你的 SQLite 代码中标准化使用区分大小写的列名，尽管这对
    SQLite 来说无关紧要。当你开始用 `php` 操作数据时，大小写就会很重要了。


    这是用于测试 `PHP` 的示例代码。粗体部分是 HTML 代码中的 `PHP` 代码——它由 `<?PHP` 和 `?>` 界定。它只是调用了 `phpinfo()`
    函数。将此代码放在你服务器上的一个文件中。这个文件应该具有 `php` 扩展名（通常是小写，但在许多服务器上大小写无关紧要）。如果你将其命名为 `test.php`
    并上传到你网站的根目录（大多数情况下与 `index.html` 或 `index.php` 在一起），你可以通过访问 [`mywebsite/test.php`](http://mywebsite/test.php)
    来访问它——包括运行其中嵌入的 `PHP` 代码。


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <title>Chapter6</title>

    <meta name="generator" content="BBEdit 11.1" />

    </head>

    <body>

    <?PHP

    phpinfo();

    ?>

    </body>

    </html>

    ```


    ## 准备 SQLite 数据库


    你可以使用几乎任何 SQLite 命令配合 `PHP`，但在实践中，最常用的命令是那些管理已存在表中数据的命令。在某些环境中，它可能是一个空表，当用户访问你的网站时，由你的网站填充数据。


    以下是准备[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中使用的一对数据库的代码。它们将在本章中再次使用。有几部分值得特别注意。它们以粗体显示。


    *   在此示例中，使用名为 `sqlitephp.sqlite` 的数据库启动 `sqlite3`。如果它不存在，`sqlite3` 会创建它。通常，使用
    `.sqlite` 或 `.db` 作为扩展名。（如果你使用自己的扩展名，在上传到网站时可能会遇到问题。）

    *   创建了 `Users` 表。注意 `Name` 列不能为空——你必须有一个名字。[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中使用过的数据被填入。（这里显示为表
    6-1。）

    *   创建表并插入数据后，使用 `SELECT` 语句显示数据。注意明确请求了 `rowid`：典型的 `SELECT *` 会显示除像 `rowid`
    这样的隐藏列之外的所有列。

    *   你需要看到 `rowid` 值以便将它们插入 `Scores` 表中。`insert` 语句将 `rowid` 值插入 `Scores` 表，以便可以使用这种关系。表
    6-2 显示了 `Scores` 表。

    *   最后，一个 `SELECT` 语句使用来自 `Users` 和 `Scores` 表的数据，通过 `rowid`（用户表）与 `userid`（分数表）相关联，显示了姓名和分数。表
    6-3 显示了数据。


    完整的 `sqlite3` 代码如下所示。


    **表 6-1.** 用户表


