  trans: "\n基本的 Core Data 栈（包括持久化存储协调器、数据模型和托管对象上下文）通常被放置于应用程序中全局可访问的位置。最常见的做法（如 Xcode\
    \ 内置的 Master-Detail Application 和 Single View Application 模板所示）是将 Core Data 栈置于\
    \ `AppDelegate` 中。`AppDelegate` 通常负责创建应用程序内的视图和其他对象。如果这些视图或对象需要使用 Core Data 栈的部分功能，`AppDelegate`\
    \ 会在它们被创建时或创建后由其管理时，将相关部分传递下去。\n\n## 第 9 章 ■ 在 Swift 中使用 SQLite/Core Data（iOS\
    \ 和 OS X）在 iOS 中将托管对象上下文传递给视图控制器\n\n以下是 iOS 的 Master-Detail Application 模板将托管对象上下文传递给视图的方式。（与\
    \ Apple 的代码示例以及当今编写的大量新代码一样，这是 Swift 代码。）\n\n```\nfunc application(application:\
    \ UIApplication,\n    didFinishLaunchingWithOptions launchOptions: [NSObject:\
    \ AnyObject]?) -> Bool {\n    // 应用程序启动后的自定义切入点。\n    let splitViewController\
    \ = self.window!.rootViewController as! UISplitViewController\n    let navigationController\
    \ = splitViewController.viewControllers[splitViewController.viewControllers.count-1]\
    \ as! UINavigationController\n    navigationController.topViewController!.navigationItem.leftBarButtonItem\
    \ = splitViewController.displayModeButtonItem()\n    splitViewController.delegate\
    \ = self\n    let masterNavigationController = splitViewController.viewControllers[0]\
    \ as! UINavigationController\n    let controller = masterNavigationController.topViewController\
    \ as! MasterViewController\n    controller.managedObjectContext = self.managedObjectContext\n\
    \    return true\n}\n```\n\n视图是从故事板创建的，此代码从基本的窗口开始，逐级向下查找，直到找到分割视图控制器左侧的导航控制器。然后，它再深入到导航控制器内的\
    \ `MasterViewController`。获取到该控制器后，便将 `MasterViewController` 的 `managedObjectContext`\
    \ 属性设置为在 `AppDelegate` 的 Core Data 栈中创建的 `managedObjectContext`（即以粗体显示的那行代码）。这是标准做法。\n\
    \n你也可以通过查找应用程序委托，然后从 `AppDelegate` 内部访问栈对象之一来获取 Core Data 栈。这破坏了封装的思想，因为你在探查应用程序委托的内部。然而，你会在各处发现一些示例代码这样做，如果你只是偶尔（比如只用一次）需要访问栈，那么这种做法也有一个（较弱的）理由支持。以下是这种获取栈方式的代码。\n\
    \n```\nlet appDelegate = UIApplication.sharedApplication().delegate as! AppDelegate\n\
    // 使用 appDelegate.managedObjectContext 或其他栈属性\n```\n\n## 第 9 章 ■ 在 Swift 中使用 SQLite/Core\
    \ Data（iOS 和 OS X）在 iOS 的 AppDelegate 中设置 Core Data 栈\n\n此代码来自 Xcode 内置的 Single\
    \ View Application 模板。它包含对以下内容的 `lazy var` 声明：\n\n-   `applicationDocumentsDirectory`。这是数据模型将放置在应用程序内的目录。它只是一个实用函数。\n\
    -   `managedObjectModel`\n-   `persistentStoreCoordinator`\n-   `managedObjectContext`\n\
    \n通过使用 `lazy var`，初始化代码仅在实际需要时才运行。因此，除非你使用 Core Data，否则模板中的这段代码永远不会运行。此处包含了模板代码的注释。\n\
    \n### 在 iOS 中创建 `applicationDocumentsDirectory`\n\n此代码使用默认的文件管理器来查找应用程序的文档目录。\n\
    \n如果你想更改数据模型目录的位置，请在粗体显示的代码处进行更改。可以使用不同的目录或创建自己的目录（不使用默认目录时请小心）。\n\n```\nlazy\
    \ var applicationDocumentsDirectory: NSURL = {\n```\n"
- fmt: "# Core Data 基础设置\n\n以下代码展示了应用程序如何设置 Core Data 的核心组件。\n\n## 准备 Core Data 存储目录\n\
    \n这是应用程序用于存储 Core Data 数据库文件的目录。\n```swift\n// The directory the application uses\
    \ to store the Core Data store file.\n// This code uses a directory named \"com.champlainarts.SingleViewCoreDataSwift\"\
    \n// in the application's documents Application Support directory.\nlet urls =\
    \ NSFileManager.defaultManager().URLsForDirectory(.DocumentDirectory, inDomains:\
    \ .UserDomainMask)\nreturn urls[urls.count-1]\n}()\n```\n\n## 在 iOS 中创建 managedObjectModel\n\
    \n这里的 `managedObjectModel` 代码按需创建。加粗显示的行是在使用模板时生成的。如果更改了项目名称，请相应地修改此行代码。另外请注意，默认情况下，Core\
    \ Data 模型存储在应用包中。你使用 Xcode Core Data 模型编辑器构建的 `.xcdatamodeld` 文件在编译过程中会被编译成 `.momd`\
    \ 文件。\n```swift\nlazy var managedObjectModel: NSManagedObjectModel = {\n    //\
    \ The managed object model for the application. This property is not optional.\n\
    \    // It is a fatal error for the application not to be able to find and load\
    \ its model.\n    let modelURL = NSBundle.mainBundle().URLForResource(\"SingleViewCoreDataSwift\"\
    , withExtension: \"momd\")!\n    return NSManagedObjectModel(contentsOfURL: modelURL)!\n\
    }()\n```\n\n## 在 iOS 中创建 persistentStoreCoordinator\n\n这段代码基于你的托管对象模型 (`managedObjectModel`)\
    \ 创建一个持久化存储协调器。\n加粗的第二行是根据你的项目名称生成的，它包含了 SQLite 数据库文件的路径。你通常不会移动此文件，但如果你更改了项目名称，这里可能是另一个需要修改文件名的地方。\n\
    请注意，在使用数据模型时，如果 `self.managedObjectModel` 尚不存在，它将在此处被引用后创建。\n另外，需要特别指出的是选择 `SQLiteStoreType`\
    \ 作为新持久化存储的类型，这在第三个加粗的行中显示。\n```swift\nlazy var persistentStoreCoordinator: NSPersistentStoreCoordinator\
    \ = {\n    // The persistent store coordinator for the application. This implementation\n\
    \    // creates and returns a coordinator, having added the store for the\n  \
    \  // application to it. This property is optional since there are\n    // legitimate\
    \ error conditions that could cause the creation of the\n    // store to fail.\n\
    \    // Create the coordinator and store\n    let coordinator = NSPersistentStoreCoordinator(managedObjectModel:\
    \ self.managedObjectModel)\n    let url = self.applicationDocumentsDirectory.URLByAppendingPathComponent(\"\
    SingleViewCoreData.sqlite\")\n    var failureReason = \"There was an error creating\
    \ or loading the application's saved data.\"\n    do {\n        try coordinator.addPersistentStoreWithType(NSSQLiteStoreType,\
    \ configuration: nil, URL: url, options: nil)\n    } catch {\n        // Report\
    \ any error we got.\n        var dict = [String: AnyObject]()\n        dict[NSLocalizedDescriptionKey]\
    \ = \"Failed to initialize the application's saved data\"\n        dict[NSLocalizedFailureReasonErrorKey]\
    \ = failureReason\n        dict[NSUnderlyingErrorKey] = error as NSError\n   \
    \     let wrappedError = NSError(domain: \"YOUR_ERROR_DOMAIN\", code: 9999, userInfo:\
    \ dict)\n        // Replace this with code to handle the error appropriately.\n\
    \        // abort() causes the application to generate a crash log\n        //\
    \ and terminate. You should not use this function in a\n        // shipping application,\
    \ although it may be useful during development.\n        NSLog(\"Unresolved error\
    \ \\(wrappedError), \\(wrappedError.userInfo)\")\n        abort()\n    }\n   \
    \ return coordinator\n}()\n```\n\n## 解释：do/try/catch 代码块\n\n如果你不熟悉 Swift 2，可能没见过\
    \ `do/try/catch` 代码块。这在现代 Swift 代码中越来越常用，因此这段代码可以作为你将来编写其他 `do/try/catch` 代码的模板。其核心在于\
    \ `catch` 部分。该代码的重要部分如下：\n\n1.  捕获错误。\n2.  创建一个空字典（这里是 `var dict`）。\n3.  填充字典。这段代码将根据你的目的进行定制。\n\
    4.  使用你在第 2 和第 3 步创建的 domain、code 和 dictionary 创建一个新的 `NSError` 实例。\n5.  使用 `NSLog`\
    \ 报告错误和字典。"
