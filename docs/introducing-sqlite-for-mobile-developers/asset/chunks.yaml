    Separating Headers and Bodies in Objective-C


    In `Swift` and many other modern languages, there is a single file for each class.
    In Objective-C there are two files—a header file with a `.h` extension and a body
    file with a `.m` extension.


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC) Looking at
    Method Declarations


    The syntax for method declarations is different from `Swift`. The quickest way
    to see the difference is to look at the examples in the section “Setting Up the
    Core Data Stack in AppDelegate for iOS.”


    Handling `nil` in Objective-C


    In object-oriented languages, there are often references to instances of objects
    which, in most cases, are stored on the *heap* (i.e., in an area of memory that
    can be used as needed by the app). It is different from the *stack* which is a
    last in-first out (LIFO) abstract memory structure. (“Abstract” in the sense that
    it behaves as if it was a single structure but it need not be in some implementations.)
    Stack data typically belongs to a specific function so that when the function
    completes, the stack can be *cut back* with its variables removed from memory.


    Instances of objects are allocated in the heap and are not automatically cut back.
    They need to be removed by one means or another. In Objective-C, several strategies
    to clean up unused memory have been implemented over time. The current version
    relies on reference counting: when an instance is allocated, its reference count
    is set to 1\. Every time that instance is used, the using code typically increases
    the reference count. When each code use of the instance completes, the reference
    count is reduced by 1\. When the reference count reaches 0, the operating system
    can reuse the memory.


    This memory management strategy relies on software engineers to manage the reference
    counts. Over time, automated and semi-automated tools have been provided. However,
    you can still find code with the primary memory management tools: `retain` and
    `release` which increase and decrease the reference count by 1.


    With automatic reference counting (`ARC`), a great deal of this is automated.


    In Objective-C, instances of objects are accessed with pointers. The traditional
    `C` language pointer syntax (an asterisk—`*`) is used. Thus, you will see declarations
    in Objective-C such as


    ```

    NSView *myView;

    ```


    or


    ```

    NSView* myView;

    ```


    The location of the asterisk doesn’t matter. This declares a pointer variable
    called `myView` which points to an instance of `NSView`.


    Probably.


    Rather than pointing to an instance of `NSView`, `myView` could be `nil`. You’ll
    find plenty of code in Objective-C to test if a pointer is `nil` before using
    it. That’s a good practice.


    In the lifetime of an Objective-C object, it can pass through several states.
    First, it is declared as in


    ```

    NSView *myView;

    ```


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC) Then it is
    initialized to something. This can happen in a separate statement or in a combined
    statement.


    ```

    NSView *myView;


    myView = nil;

    ```


    or


    ```

    NSView *myView = nil;

    ```


    If there is a period of time between the declaration and its being set to something
    valid (such as `nil` or an actual instance), the pointer is undefined. If you
    use it, your app’s behavior could be anything, but “crash” is likely to be part
    of the description. The problem of dangling pointers in Objective-C has existed
    for many years, and there have been many ways to address it. Today, with Objective-C,
    `ARC` is the primary way in which the problem is addressed. With `Swift`, this
    is one of the primary reasons for implementing optionals—so that it’s impossible
    to have these dangling pointers.'
