- fmt: "# Using the Simple Database with a PHP Web Site\n\n## Looking at the Basic\
    \ PHP/SQLite Structure\n\nYou'll use the same basic structure for all of your\
    \ PHP/SQLite files. Depending on your preferences, you may use different PHP syntax\
    \ particularly when it comes to entering HTML that will be passed through (the\
    \ choice is staying in the world of PHP and using `echo` or leaving PHP for a\
    \ section and just using HTML until you need to come back to PHP). Many people\
    \ use both styles.\n\nHere's the basic structure. (Obviously you'll typically\
    \ add your own code for the `HEAD` element and other such parts of the file.)\
    \ Diagnostics are left in this file. It's easiest to leave them in until you're\
    \ certain you've got the control flow correct. (Also, remember that the `or die`\
    \ syntax is a placeholder for robust error catching with a good user interface.)\n\
    \nJoined on `rowid` in `User` and `userid` in `Score`, they have the same value\
    \ so it doesn't matter which one is passed to `phpsql3.php`. Each of the files\
    \ is described in the following sections. You'll find the full code first and\
    \ then a discussion of the key components.\n\n```php\n<html>\n<head>\n</head>\n\
    <body>\n<?php\n$db = 'sqlite:sqlitephp.sqlite';\n// This should be customized\
    \ to the name of your database. sqlite: is part of the PHP\n// data object (PDO)\
    \ syntax. It must precede the file name.\n$sqlite = new PDO($db) or die (\"<h1>Can't\
    \ open database</h1>\");\necho \"<p>Success on PDO</p>\";\n$query = $sqlite->prepare;\
    \ // insert your query here\n// This should be customized with the query you want\
    \ to run. At the end of this chapter, you'll see another pattern you can use.\
    \ Instead of prepare and execute, you can simply execute a single query with the\
    \ PDO query statement.\necho \"<p>Success on prepare</p>\";\n$query->execute()\
    \ or die (\"Can't execute\");\necho \"<p>Success on execute</p>\";\n$result =\
    \ $query->fetchAll() or die (\"Can't fetchAll\");\necho \"Success on fetchAll<br\
    \ />\"; // for debugging\n// Remember that fetchAll fetches all the data for the\
    \ query—not all the data from the table.\n// Do something with the results. The\
    \ foreach is just an example.\nforeach ($result as $row) {\n    echo $row['rowid'],\
    \ \" , \", $row['name'];\n}\n// This section definitely needs to be customized\
    \ for each use. Here you see a diagnostic that just repeats the data that's been\
    \ retrieved. It's often useful to use code like this at this point.\n?>\n<h1>Select\
    \ the user</h1>\n<form method=\"post\" action=\"phpsql2.php\">\n// Customize this\
    \ with the name of the next PHP file in the chain (the next page for the user).\n\
    <?php\n// Here is where you integrate PHP and SQLite – customize as you wish.\n\
    echo '<input type=\"submit\" value=\"Submit\">';\necho '</form>';\n// If you are\
    \ using a form, make certain you terminate it and add the Submit button.\n// Note\
    \ that you can start the form in HTML and finish it in PHP as shown here.\n?>\n\
    </body>\n</html>\n```\n\n## Building the Drop-Down Selection List (`phpsql1.php`)\n\
    \nHere is the full listing of `phpsqlite.php`. Comments and description are interspersed,\
    \ but remember to refer to the previous section “Looking at the Basics PHP/SQLite\
    \ Structure” for general details. This code builds the page shown in Figure 11-3.\n\
    \n```php\n<html>\n<head>\n</head>\n<body>\n<?php\n$db = 'sqlite:sqlitephp.sqlite';\n\
    $sqlite = new PDO($db) or die (\"<h1>Can't open database</h1>\");\necho \"<p>Success\
    \ on PDO</p>\";\n$query = $sqlite->prepare (\"select name, rowid from User;\"\
    ) or die (\"<h1>Can't prepare</h1>\");\n// The query will be: SELECT name, rowid\
    \ FROM User;\necho \"<p>Success on prepare</p>\";\n$query->execute() or die (\"\
    Can't execute\");\necho \"<p>Success on execute</p>\";\n$result = $query->fetchAll()\
    \ or die (\"Can't fetchAll\");\necho \"Success on fetchAll<br />\";\n?>\n<h1>Select\
    \ the user</h1>\n<form method=\"post\" action=\"phpsql2.php\">\n<?php\necho \"\
    <select name='userid'>\";\nforeach ($result as $row) {\n    echo \"<option value\
    \ = \".$row['rowid'].\">\".$row['name'].\"</option>\";\n}\necho '<input type =\
    \ \"hidden\" name = \"name\" value = '.$row[\"name\"].'>';\n// The hidden field\
    \ is very important: it's the link to the next PHP file (`phpsql2.php`).\n// The\
    \ value of `name` will be retrieved from the `POST` variables at the beginning\
    \ of that file.\n// `userid` is passed in from the `SELECT` element under the\
    \ name of `userid`, and `username` (used in a title on the next page) is passed\
    \ in here. The `SELECT` is visible to the user, but this hidden field is not.\n\
    echo '</select> <br >';\necho '<input type=\"submit\" value=\"Submit\">';\necho\
    \ '</form>';\n// The name of the `SELECT` element is `userid`. When the next file\
    \ unwraps the `POST` values, it will be the key for the item chosen in the drop-down\
    \ menu. You may want to customize the Submit button.\n?>\n</body>\n</html>\n```\n\
    \n## Showing the Selected Data (`phpsql2.php`)\n\nThis is the code to build the\
    \ page shown in Figure 11-4.\n\n```php\n<html>\n<head>\n</head>\n<body>\n<?php\n\
    print \"POST values<br/>\";\nforeach ($_POST as $key => $value) {\n    echo \"\
    $key &nbsp;&nbsp;&nbsp $value <br />\";\n}\nprint \"--end POST values<br/>\";\n\
    $name = $_POST['name'];\nprint \"name = $name <br/>\";\n// This code is useful\
    \ for debugging: it prints out all of the `POST` keys and values. Remove it when\
    \ you're happy with the code. Setting the local variable `$name` is `not` for\
    \ debugging. The print statement that follows is, but you need to pick up the\
    \ `username` from the hidden field on the previous page to show it in a title\
    \ on this page. You could pick it out of the `POST` variables when you need it,\
    \ but many people prefer to unload the `POST` variables at the beginning of a\
    \ file.\n$db = 'sqlite:sqlitephp.sqlite';\n$sqlite = new PDO($db) or die (\"<h1>Can't\
    \ open database</h1>\");\necho \"<p>Success on PDO</p>\";\necho \"userid \".$_POST[\"\
    userid\"];\n$useridToFind = $_POST['userid'];\necho \"useridToFind = $useridToFind\"\
    ;\n$query = $sqlite->prepare (\"select name, score from Score s, User u where\
    \ s.userid = u.rowid and $useridToFind = s.userid ORDER BY Score;\") or die (\"\
    <h1>Can't prepare</h1>\");\necho \"<p>Success on prepare</p>\";\n$query->execute()\
    \ or die (\"Can't execute\");\necho \"<p>Success on execute</p>\";\n$result =\
    \ $query->fetchAll() or die (\"Can't fetchAll\");\necho \"Success on fetchAll<br\
    \ />\"; // for debugging\nforeach ($result as $row) {\n    echo \"<h1>Scores for\
    \ \".$row['name'].\" </h1>\";\n    $userName = $row['name'];\n    echo $row['name'],\
    \ \" - \", $row['score'];\n}\necho '<form method=\"post\" action=\"phpsql3.php\"\
    >';\necho \"<input type='hidden' name='userid' value=$useridToFind>\";\n// This\
    \ is another hidden field — this time passing `userid` forward to the next PHP\
    \ file.\necho '<input type=\"submit\" value=\"Add a score\">';\necho '</form>';\n\
    ?>\n</body>\n</html>\n```\n\n## Adding New Data (`phpsql3.php`)\n\nNow it's time\
    \ to add new data to the file. It's a matter of combining basic SQLite syntax\
    \ for `INSERT` with the same type of code you've used in previous PHP pages. You\
    \ should be getting used to this: using PHP and SQLite is the same pattern over\
    \ and over again.\n\nFollowing is the code for `phpsql3.php`:\n\n```php\n<html>\n\
    <head>\n</head>\n<body>\n<?php\nprint \"POST values<br/>\";\nforeach ($_POST as\
    \ $key => $value) {\n    echo \"$key $value <br />\";\n}\nprint \"--end POST values<br/>\"\
    ;\n$userid = $_POST[\"userid\"];\nprint $userid;\n// This is the same code that\
    \ provides diagnostics showing all of the `POST` variables with their keys. Also,\
    \ note that `$userid` is set here to be used later in this file. It's the hidden\
    \ field passed from the previous file copied to a local variable.\n$db = 'sqlite:sqlitephp.sqlite';\n\
    $sqlite = new PDO($db) or die (\"<h1>Can't open database</h1>\");\necho \"<p>Success\
    \ on PDO</p>\";\n$query = $sqlite->prepare (\"INSERT INTO Score ('score', 'userid')\
    \ VALUES (99, $userid);\") or die (\"<h1>Can't prepare</h1>\");\necho \"<p>Success\
    \ on prepare</p>\";\n```"
