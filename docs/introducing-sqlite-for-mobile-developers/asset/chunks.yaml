    # Summary


    This chapter shows you how to work with `SQLite`/`Core Data` on OS X and iOS using
    `Swift`—the more modern of languages for `Cocoa` and `Cocoa Touch`. There is still
    plenty of `Objective-C` code around, and Chapter [10 shows](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)
    that code.


    ## `Chapter 10`: Using `SQLite`/`Core Data` with `Objective-C` (iOS and Mac)


    The `Core Data` stack described in detail in Chapter [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)
    is front and center in this chapter but in the context of `Objective-C`. Yes,
    using `Swift` and `Objective-C` with `SQLite` are very similar processes, but
    the details of the implementation are just different enough that they’re treated
    in separate chapters so that you can find what you’re looking for without flipping
    back and forth. If you’ve already read Chapter [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)
    (or, conversely, if you’ve read Chapter [10](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)
    before you get to Chapter [9](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)),
    feel free to skip anything that’s redundant as you become bilingual in `SQLite`
    and both Apple languages.


    `Objective-C` is the original language for what has become `Cocoa` and `Cocoa
    Touch`. It was designed for `NeXTSTEP` in the early 1980s. This was the time when
    object-oriented programming was becoming the primary way of developing software.
    A variety of languages were designed to implement this new paradigm. Some were
    built from the ground up, and others were built on top of then-existing languages
    such as `C`. (There even is an `Object COBOL` language.)


    `Objective-C` was the only language for development on `NeXTSTEP` and later `Cocoa`
    and `Cocoa Touch`. In 2014, `Swift` was added to the mix. Like `Objective-C` before
    it, it is based on the programming styles and languages of the time, but in the
    case of `Swift`, those languages are “`Objective-C`, `Rust`, `Haskell`, `Ruby`,
    `Python`, `C#`, `CLU`, and far too many others to list,” according to Chris Lattner
    as quoted in Wikipedia. (Lattner was the original developer of `Swift`.)


    There are important differences in the languages’ implementations of the `Core
    Data` stack, but the architecture is the same for both.


    ### Chapter 10 ■ Using `SQLite`/`Core Data` with `Objective-C` (iOS and Mac):
    Looking at the Core Data Stack


    The `Core Data` stack is a set of three objects that provide functionality. They
    are as follows:


    *   **Managed Object Model**. This is what you saw built graphically in Chapter
    [8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8). It’s very similar to what
    is often referred to as a database schema. (A schema is described in a formal
    language rather than graphically.) Remember that relationships are explicitly
    defined in a `Core Data` model whereas in `SQLite` (and in `SQL` in general) the
    relationships are implemented in the `WHERE` clauses that you write.

    *   **Persistent Store Coordinator**. Each `SQLite` table is usually represented
    as a persistent store in `Core Data`. This one-to-one correspondence of persistent
    store and database table is sufficient in most cases. However, you can have multiple
    persistent stores to improve performance or provide other optimizations. As far
    as the `Core Data` stack is concerned, one of the three key elements is a persistent
    store coordinator which coordinates all of the persistent stores for a given `Core
    Data` app.


    In most cases, the persistent store coordinator handles a single persistent store.
    However, the full name (persistent store coordinator) is still used because in
    more complex solutions the persistent store coordinator does actually manage several
    persistent stores. It is the persistent store coordinator and its persistent stores
    that do the transformation from the flat `SQLite` database file to the objects
    that you work with in your `Core Data` app. Accordingly, there are options you
    use when you create a persistent store that specify what the underlying'
