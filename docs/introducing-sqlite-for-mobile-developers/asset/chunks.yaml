    *   SQLite 是自包含的\n*   SQLite 支持事务并符合 ACID 标准\n\n> **注意** 你可以在[sqlite.org](https://sqlite.org)上找到关于这些主题的更多详细信息。\n\
    \n## SQLite 是为单一用户设计的\n\nSQLite 与大多数 DBMS 的最大区别之一在于，SQLite 是为单一用户设计的。大多数 DBMS\
    \ 管理多个用户，包括各种安全特性，允许或阻止对特定 SQL 命令和功能的访问。对许多人来说更重要的是，DBMS 管理资源争用，以便多个用户可以*显然*地同时使用相同的数据。\n\
    \n*显然*是这里的关键词，因为尽管每个用户通常认为他或她拥有对数据库的独占访问权，但实际上，在幕后，DBMS 管理着并发性，以便在某些情况下，当一个用户正在更新记录时，它会锁定该记录以防止第二个用户访问它。\n\
    \n### 单一用户不意味着单线程\n\nSQLite 在自己的环境中管理并发性。这意味着它可能同时运行多个线程来执行其自身任务，但这些线程是在 SQLite\
    \ 环境内部管理的。它们不代表单独的用户。\n\n### 在多用户环境中使用 SQLite\n\n当 SQLite 是为单一用户设计时，你怎么能拥有多个用户呢？答案很简单：你自己管理多个用户。有多种方法可以做到这一点，但一般来说，你需要将多用户管理推送到嵌入\
    \ SQLite 的应用程序、类或语言中。应用程序通常具有相互通信的能力（受安全性和平台限制）。因此，尽管 SQLite 不会管理用户 A 和用户 B 试图同时修改相同*数据*的情况，但你的应用程序可以做到这一点。\n\
    \n典型的并发策略包括拥有一个管理并发性的主进程，或者拥有一种机制，使得多个独立进程无需主进程即可通信。你在诸如 Dropbox 之类的应用程序以及许多基于云的应用程序中可以找到许多独立进程的例子。（对于\
    \ Dropbox 和基于云的应用程序，可能有一个进程持续在云端的某处运行，并且可能在活动的客户端上运行单独的进程。控制权是驻留在中央进程中还是分布在客户端（和主机）中，取决于具体的实现。）\n\
    \n因此，SQLite 完全有能力在多用户世界中运行；它只需要在自身实现了多用户功能的应用程序或其他进程内运行即可。\n\n## SQLite 是自包含的\n\
    \nSQLite 在两个方面是自包含的。\n\n*   代码本身是自包含的 ANSI-C 代码。它对 C 库的使用极少。事实上，它只使用：\n    * \
    \  `memset()`\n    *   `memcpy()`\n    *   `memcmp()`\n    *   `strcmp()`\n  \
    \  *   `malloc()`\n    *   `free()`\n    *   `realloc()`\n*   数据存储本身是自包含的、可移植的且与平台无关的。\n\
    \n### 自包含代码\n\n自包含代码意味着当你将 SQLite 库包含到你的项目中时（直接包含或通过语言、类或框架包含），你就拥有了所需的一切。你不需要包含额外的库。\n\
    \n你不必担心版本问题，并且一旦你拥有了一个编译好的 SQLite 库，你通常可以在不依赖于组件变更的情况下重用它。\n\n（不过请记住，在大多数情况下，SQLite\
    \ 是嵌入在语言、类、框架或 DBMS 中的，因此你需要时不时更新的是容器。）由于 SQLite 处于公共领域，你不必担心许可证或许可费用。（然而，你也可以按照[sqlite.org](https://sqlite.org)上的描述获得许可证。该选项是为一些需要向管理层证明他们确实有权使用\
    \ SQLite 的用户提供的。）\n\n请记住，SQLite 通常包含在你正在使用的类、框架或语言中，因此这个特性（在很大程度上使得这种可包含性成为可能）对你可能是不可见的。\n\
    \n> **注意** 如果你访问[sqlite.org](https://sqlite.org)，你会发现 SQLite 源代码的各种下载选项。有选项可以下载分段的源代码，这些源代码在最终构建中会合并（*amalgamated*）。这样做主要是为了适应那些难以一次性处理完整构建的开发环境。\n\
    \n### 自包含数据\n\nSQLite 用于数据库的数据存储被设计为自包含且跨平台的。这意味着在大多数情况下，你可以将 SQLite 文件从一个环境传输到另一个环境而不会出现问题。（这个警告是必要的，因为你可能会在特定配置中遇到问题，但对于许多（如果不是大多数）SQLite\
    \ 用户来说，验证数据库是否可以移动的第一步就是实际移动它——这通常是有效的。）在其最基本（和原始）的形式中，每个 SQLite 数据库都存储在一个单一文件中。\n\
    \n该文件在任何平台上都是可读和可写的（受文件系统环境约束）。例如，如果你将文件放在只读磁盘上，你无法用 SQLite 写入它。（这可能听起来很牵强，但这种事情确实会发生。）\n\
    \n由于数据库存储在单个文件中，用户可以看到它并在需要时移动它。\n"
- fmt: '# Understanding What SQLite Is


    (If they do so, the app that you are building must be able to find the file—perhaps
    with the user’s help.) Users can also delete the database file. Because it is
    self-contained, that’s very simple, and it doesn’t corrupt other SQLite databases.
    Of course, the fact that a user may be able to delete the database means that
    in your implementation, you may want to hide it or place it in protected places.
    If you do that, you often take advantage of platform-specific features such as
    hidden folders, but the `SQLite` file itself remains an ordinary file that can
    be moved around and copied to other devices.


    Because the database file is self-contained, it contains both the database data
    and its schema (structure if you’re not from the database world). In part because
    each database is self-contained, `SQLite` is referred to as `serverless` (there
    is no separate server process).


    The fact that a `SQLite` database can be stored in a single file leads to a common
    use of `SQLite` to implement structure and database functionality inside what
    appears to the user to be a simple file.


    `Note` although `SQLite` began with the one-database/one-file structure, it now
    supports write-ahead logging (`WAL`) as an option. `WAL` is a technique that optimizes
    database performance using multiple files. there is more on `WAL` in Chapter [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4).


    ## SQLite Supports Transactions and Is ACID-Compliant


    `Transaction` in the world of databases has a very specific meaning over and above
    its regular meaning in English. It refers to a set of steps that are done together
    (usually in sequence, but not necessarily so). Together, these steps are a transaction,
    and what’s important is that the transaction as a whole either succeeds or fails.
    If any of the steps fails, the entire transaction fails. As a result of transaction
    failure, the database is said to be `rolled back` to its condition before the
    transaction began.


    When a database supports transactions, the failure of any part of a transaction
    means the entire transaction fails and the database is set to whatever it was
    before the transaction started. All of this happens in an `ACID`-compliant database
    such as `SQLite`.


    As you saw in Chapter [1](http://dx.doi.org/10.1007/978-1-4842-1766-5_1), there’s
    a lot of code you don’t have to write when you’re using a database.


    ### ACID


    `ACID` is the standard by which most databases are judged today to determine if
    they support transactions. `ACID` is an acronym.


    - *Atomicity*. This is the all-or-nothing aspect of a transaction. It succeeds
    or fails as a whole and can never be partially successful.

    - *Consistency*. In processing a transaction, the database will start from a valid
    state and end in a valid state. In other words, a transaction will not violate
    database rules such as the optionality of attributes as a result of a transaction,
    but those rules may be violated during the course of the transaction.

    - *Isolation*. This means that transactions can be run sequentially or concurrently.
    They will not interfere with one another. (`Isolation` requires that a database
    implement a method for managing concurrency so the operations can be either sequential
    or concurrent.)

    - *Durability*. This means that, on completion, the transaction persists. In practical
    terms, this generally means that it is committed to disk.


    In `SQLite` (as in many other implementations of `SQL`), a transaction consists
    of a number of `SQL` statements bracketed by


    ```

    BEGIN TRANSACTION

    ```


    and


    ```

    END TRANSACTION

    ```


    There is more on transactions in Chapter [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4).
    You’ll see how to define them and how to specify the point to which a failed transaction
    is rolled back. In that chapter, you’ll also see a larger description of how `WAL`
    implements atomicity and durability.


    ## Concurrency and ACID Transactions on Mobile Devices


    You may think that when you’re writing for a mobile device such as a phone, there’s
    only a single user and this discussion of transactions and `ACID` compliance doesn’t
    apply. however, the issues of concurrency apply perhaps even more on mobile devices
    than in other cases.


    the reason why you have to think about transactions and their failures on mobile
    devices is that many of the most frequent tasks you perform on mobile devices
    involve network access. as anyone who has tried to carry on a phone conversation
    in a train that suddenly speeds through a tunnel knows, network availability can
    suddenly disappear on a mobile device.


    # Chapter 3 Using SQLite Basics: Storing and Retrieving Data


    `SQLite` is a lightweight library containing a database engine that lets you use
    a very large subset of `SQL` to store and retrieve data. As a user, you are most
    likely to be familiar with an application interface or the interface of a database
    management system (`DBMS`) that provides an interface to the database itself.
    Behind the scenes, your commands (whether text or graphical) are translated into
    `SQLite` syntax.


    This chapter shows you the basics of creating a table, adding data to it, and
    retrieving that data. It’s a high-level overview to give you a taste of `SQLite`.
    The next chapter will drill down into some options and variations you can use.
    In this chapter, you’ll see both a graphical user interface (`GUI`) and the `sqlite3`
    command-line interface that are part of `SQLite`. In subsequent chapters, you’ll
    usually see only the `SQLite` interface because it includes the `SQLite` commands.
    In most graphical editors for `SQLite`, you have an option to type in the `SQLite`
    code directly, so those commands should work for you in either environment.


    ## Terminology and Definitions


    `SQLite` is used in various ways in this book as it is used in other documentation
    and discussions. Following is a guide to what’s what in the world of `SQLite`:


    - `SQLite`. As used in this book, `SQLite` refers to any version of `SQLite`.
    You can find source code and precompiled binaries at `sqlite.org`. When used alone,
    it refers to the `SQLite` project and any of its versions.

    - `SQLite 3` is the current version of `SQLite` as of this writing. Thus, `SQLite
    3` is the third major release of `SQLite`. In this book, `SQLite 3` refers to
    that version as opposed to other versions (e.g., `SQLite 2`).

    - `SQLite 3.9.2` is the current release version of `SQLite`. As with any maintained
    software products, it is being revised as needed, so the numbering convention
    of major-minor-build is used. In this book, the specific release (`3.9.2`) is
    not referred to because it is subject to change.

    - `sqlite3` (no spaces and all lower-case) is a command-line utility to help you
    build and debug `SQLite` databases and syntax. You can download it from `sqlite.php`,
    but if you have `SQLite` installed in your operating system (`OS`) or other environment,
    `sqlite3` is probably there.


    As you read various materials about databases and relational databases, you may
    encounter database management systems (`DBMSs`) and relational database management
    systems (`RDBMSs`). Most databases today are relational databases, and almost
    all of them are based on `SQL`. There are other types of databases, but they’re
    not widely used at the moment. A particularly interesting approach to data management
    today is unstructured data, but that is outside the scope of this book.


    ## Using `sqlite3`


    `sqlite3` is a command-line utility that is part of `SQLite 3` (the `sqlite2`
    version is no longer applicable). It runs on `OS X` (using Terminal) or as `sqlite3.exe`,
    which runs on `Windows`.'
