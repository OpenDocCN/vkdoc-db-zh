    in Figure [10-3](#index_split_001.html#126). By default, the entity or entities
    that you have selected in the graph or table view (as shown in Figure [10-1) ar](#index_split_001.html#122)e
    selected here. You don’t have to subclass everything.


    Sometimes, you choose to subclass the more complex entities and leave the others
    as NSManagedObject instances.


    ![](index-126_1.jpg)


    ![](index-126_2.jpg)


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC)


    ***Figure 10-3.** Choose the entities to subclass*


    Click Next and choose where to save your new files as shown in Figure [10-4](#index_split_001.html#126).
    Also choose the language you want for the subclass files. (You can mix and match
    Swift and Objective-C.)


    ***Figure 10-4.** Choose where to save the subclass files and what language you
    want to use* 117


    ![](index-127_1.jpg)


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC)


    You should double-check the group (for the Navigator) and the target, but usually
    they’re correct. The option for scalar properties requires a little explanation.
    By default, your entity attributes are converted into Swift or Objective-C properties
    using the native Cocoa or Cocoa Touch types. Thus, a Double is converted to NSNumber.
    NSNumber is a much more powerful construct than Double (for one thing, it’s a
    class). If you’re working a lot with such a property, sometimes the power of NSNumber
    gets in the way. Choosing to use scalar types will use the basic platform (non-object)
    types which may make your code simpler.


    If your project is basically written in Swift and you choose to create your subclass
    in Objective-C, you may be asked if you want to create a bridging header between
    the two languages as shown in Figur[e 10-5](#index_split_001.html#127). Yes, you
    do want to do so.


    ***Figure 10-5.** You can choose to create a bridging header*


    In a mixed-language project, don’t worry if you’re not asked about a bridging
    header.


    It only need to be created once, so after the first time, you won’t be asked.


    The bridging header is created for you in the Build Settings of your project as
    shown in Figur[e 10-6. Y](#index_split_001.html#128)ou don’t need to do anything
    further.


    ![](index-128_1.jpg)


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC)


    ***Figure 10-6.** Building settings with a bridging header*


    If you’re creating an Objective-C subclass, Xcode will create two files for each
    entity you have selected. As opposed to Swift, these will be the header (.h) and
    body (.m) files.


    The first is the interface file, and it looks as follows:


    #import "User.h"


    NS_ASSUME_NONNULL_BEGIN


    @interface User (CoreDataProperties)


    @property (nullable, nonatomic, retain) NSString *email;


    @property (nullable, nonatomic, retain) NSString *name;


    @property (nullable, nonatomic, retain) NSSet<NSManagedObject *> *scores;


    @end


    @interface User (CoreDataGeneratedAccessors)


    - (void)addScoresObject:(NSManagedObject *)value;


    - (void)removeScoresObject:(NSManagedObject *)value;


    - (void)addScores:(NSSet<NSManagedObject *> *)values;


    - (void)removeScores:(NSSet<NSManagedObject *> *)values;


    @end


    NS_ASSUME_NONNULL_END


    }


    Chapter 10 ■ Using sQLite/Core Data with objeCtive-C (ios anD MaC) This is different
    from the extension file in Swift. First of all it is bracketed in NS_ASSUME_NONNULL_BEGIN
    and NS_ASSUME_NONNULL_END. These implement a feature in Objective-C that comes
    back from Swift. Inside a section with these brackets, all pointers are assumed
    to be non-null so it’s safe to rely on that in your code. (When used from Swift,
    these properties will be converted as forced-unwrapped properties with !.) Inside
    the .h file you’ll see the property declaration of the category


    (CoreDataProperties) which declares the two attributes of the User entity (email
    and name). The relationship (scores) comes across as an NSSet. Note that because
    this section is bracketed as nonnull, the properties need to explicitly be marked
    as being nullable.


    This may seem as self-defeating, but as your code grows, you’ll see that making
    nullability an exception rather than a default makes your code cleaner and more
    robust.


    The companion .m file looks as follows:


    #import "User+CoreDataProperties.h"


    @implementation User (CoreDataProperties)


    @dynamic email;


    @dynamic name;


    @dynamic scores;


    @end


    @dynamic represents a promise that the property will be filled in at runtime (when
    it is retrieved from the persistent store).


    That’s all it takes to create an NSManagedObject subclass in Objective-C.


    ■ **Note** to see how to use your subclasses, see Cha[pter 12.](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)


    Summary


    This chapter shows you how to work with SQLite/Core Data on OS X and iOS using
    Objective-C—the original of language for Cocoa and Cocoa Touch.


    **Chapter 11**


    **Using the Simple Database**


    **with a PHP Web Site**


    This book is an introduction to SQLite, but, even though it’s just an introduction,
    the basics of SQLite (and SQL itself which is a key component) aren’t particularly
    complex.


    True, as you start to build more and more complex apps with more and more features
    (and more and more robust error checking), your code will get lengthier and more
    complex. What’s attractive to many people about the world of relational databases
    is that the basic elements are just that—basic. You use and reuse them in various
    combinations to build more and more powerful apps.


    These last two chapters of the *Introducing SQLite* provide you with two apps
    that are built on SQLite. In this chapter, you’ll see how you can build a PHP-based
    app on SQLite, and in Chapt[er 12 y](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)ou’ll
    see how to build a roughly comparable app for iOS.'
