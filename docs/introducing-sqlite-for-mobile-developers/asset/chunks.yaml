  trans: "\n# 在 PHP 网站中使用简单数据库\n\n## 查看基础 PHP/SQLite 结构\n\n所有 PHP/SQLite 文件都将使用相同的基础结构。根据你的偏好，尤其是在处理需要传递的\
    \ HTML 内容时，你可能会使用不同的 PHP 语法（选择是停留在 PHP 世界中使用 `echo`，还是暂时离开 PHP 代码段，仅使用 HTML，直到需要切回\
    \ PHP）。许多人两种风格都会使用。\n\n以下是基础结构。（显然，你通常需要为 `HEAD` 元素和文件的其他类似部分添加自己的代码。）此文件中保留了诊断代码。在确定控制流正确之前，保留它们是最简单的。（另外，请记住，`or\
    \ die` 语法是健壮错误捕获和良好用户界面的占位符。）\n\n通过在 `User` 表的 `rowid` 和 `Score` 表的 `userid` 上进行连接，它们具有相同的值，因此传递哪个值给\
    \ `phpsql3.php` 并不重要。每个文件都将在以下部分中描述。你将首先看到完整代码，然后是对关键组件的讨论。\n\n```php\n<html>\n\
    <head>\n</head>\n<body>\n<?php\n$db = 'sqlite:sqlitephp.sqlite';\n// 这应该自定义为你的数据库名称。sqlite:\
    \ 是 PHP\n// 数据对象（PDO）语法的一部分。它必须位于文件名之前。\n$sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\"\
    );\necho \"<p>PDO 连接成功</p>\";\n$query = $sqlite->prepare; // 在此处插入你的查询\n// 这应该自定义为你想运行的查询。在本章末尾，你将看到另一种可以使用的模式。除了\
    \ prepare 和 execute，你可以直接使用 PDO query 语句执行单个查询。\necho \"<p>Prepare 准备成功</p>\"\
    ;\n$query->execute() or die (\"无法执行\");\necho \"<p>Execute 执行成功</p>\";\n$result\
    \ = $query->fetchAll() or die (\"无法 fetchAll\");\necho \"fetchAll 获取成功<br />\"\
    ; // 用于调试\n// 记住，fetchAll 获取的是查询的所有数据——而不是表中的所有数据。\n// 对结果进行处理。foreach 只是一个例子。\n\
    foreach ($result as $row) {\n    echo $row['rowid'], \" , \", $row['name'];\n\
    }\n// 这部分代码绝对需要为每个用途进行自定义。这里你看到的只是一个重复显示已检索数据的诊断信息。在此处使用类似这样的代码通常很有用。\n?>\n<h1>选择用户</h1>\n\
    <form method=\"post\" action=\"phpsql2.php\">\n// 使用链中下一个 PHP 文件（用户的下一个页面）的名称来自定义此处。\n\
    <?php\n// 这里是你整合 PHP 和 SQLite 的地方——按你的意愿自定义。\necho '<input type=\"submit\" value=\"\
    提交\">';\necho '</form>';\n// 如果你使用表单，请确保正确结束它并添加提交按钮。\n// 注意，你可以如这里所示，在 HTML 中开始表单并在\
    \ PHP 中完成它。\n?>\n</body>\n</html>\n```\n\n## 构建下拉选择列表 (`phpsql1.php`)\n\n以下是 `phpsqlite.php`\
    \ 的完整列表。注释和说明穿插其中，但请记住参考前面的部分“查看基础 PHP/SQLite 结构”以获取一般细节。此代码构建了如图 11-3 所示的页面。\n\
    \n```php\n<html>\n<head>\n</head>\n<body>\n<?php\n$db = 'sqlite:sqlitephp.sqlite';\n\
    $sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\");\necho \"<p>PDO 连接成功</p>\"\
    ;\n$query = $sqlite->prepare (\"select name, rowid from User;\") or die (\"<h1>无法准备查询</h1>\"\
    );\n// 查询将是：SELECT name, rowid FROM User;\necho \"<p>Prepare 准备成功</p>\";\n$query->execute()\
    \ or die (\"无法执行\");\necho \"<p>Execute 执行成功</p>\";\n$result = $query->fetchAll()\
    \ or die (\"无法 fetchAll\");\necho \"fetchAll 获取成功<br />\";\n?>\n<h1>选择用户</h1>\n\
    <form method=\"post\" action=\"phpsql2.php\">\n<?php\necho \"<select name='userid'>\"\
