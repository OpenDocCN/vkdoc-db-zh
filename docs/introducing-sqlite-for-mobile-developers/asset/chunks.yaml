    of the features that people want to use as they integrate PHP and SQLite. In particular,
    you’ll see how to retrieve and enter data through the PHP code and SQLite, and
    you’ll see how to handle the integration of SQLite database data with PHP such
    as in building a drop-down menu (the HTML SELECT element) based on data retrieved
    from the database.


    Reviewing the Database


    The data in this chapter is the same relational data that’s been used previously
    in this book, but there are a few tweaks you should be aware of. They are described
    in this section.


    The database consists of three tables that can be used to track values for people.
    The naming here suggests that they may be used to track scores for users, but
    that’s only one possibility. If you reuse these tables, feel free to rename the
    properties as you wish. Also, note that by and large *attribute*, *property*,
    *column*, and *field* are used interchangeably to refer to the data stored in
    a database. *Attribute* is often used in databases, and *property* is used to
    refer to objects in object-oriented programming. *Column* is used in the context
    of relational tables, and the use of *field* dates back to paper forms.


    Chapter 11 ■ Using the simple Database with a php web site


    ■ **Note** the biggest change in this chapter from previous versions is standardization
    on capitalization: table names are capitalized, and the names of properties and
    attributes as well as relationships are not. where a table contains multiple entries
    (such as users in the User table), the table name is capitalized and singular.
    these are styles that are enforced in apple’s Core Data framework, and they are
    consistent with best practices that many people use. "many" does not mean all:
    particularly with regard to whether a table of users is called User or Users,
    there are two logical approaches to take, and there are many people who argue
    vehemently for one or the other. adopting one approach or the other isn’t really
    a solution for many people because we don’t work on isolated projects. when client
    a insists on singular names and client b insists on plural names you often take
    the most practical approach (use the style that each client wants)


    The first table, User, tracks information for people. As set up in this demo,
    it consists of names and e-mail addresses. It uses a unique rowid for each row.
    rowid is generated by SQLite. It is shown in Ta[ble 11-1](#index_split_001.html#131).


    ***Table 11-1.** User Table*


    **rowid**


    **Name**


    **E-mail**


    Rex


    rex@champlainarts.com


    Anni


    anni@champlainarts.com


    Toby


    toby@champlainarts.com


    The Score table keeps track of values for a user. It references the user in question
    with the userid attribute. This matches the rowid attribute of the relevant record
    in User.


    In that way, you can join the Score and User tables to get both the score and
    name for an individual (see Table [11-2](#index_split_001.html#131)).


    ***Table 11-2.** Score Table*


    **userid**


    **score**


    ![](index-132_1.jpg)


    Chapter 11 ■ Using the simple Database with a php web site


    When the Score and User tables are related based on the userid/rowid relationship,
    a table like the one shown in Ta[ble 11-3](#index_split_001.html#132) can be created.
    Note that this is created using WHERE clauses in a SELECT statement: the table
    only exists at runtime.


    ***Table 11-3.** Related Users and Scores Tables*


    **Name**


    **Score**


    Rex


    Anni


    Toby


    If you want to build your table with a tool such as SQLPro for SQLite, the database
    will look like Figure [11-1 when the](#index_split_001.html#132) Score table is
    highlighted so you can see its rows (userid and score). rowid (the SQLite-generated
    primary key) is not shown by default in this display. Also, note that the tables
    are presented in alphabetical order.


    ***Figure 11-1.** Score table and its rows*


