  trans: '

    # 第 3 章：使用 SQLite 基础 —— 存储和检索数据


    > **注意：** 当表名包含空格时，你需要将其放入引号中。请注意，在此示例中，原 `SimpleTable` 已被重命名为 `Simple Table`，因此在查询中需要用引号括起来。在
    SQLpro for SQLite 中，表列表下方的齿轮图标有一个 `重命名` 命令，你可以用来创建或避免这种情况。


    ## 使用 SQLite3


    以下是输入所有三条记录的 `sqlite3` 代码：


    ```sql

    INSERT INTO SimpleTable (PK, Name, Origin) VALUES (1, "Cecelia", "Australia");

    INSERT INTO SimpleTable (PK, Name, Origin) VALUES (2, "Leif", "Iceland");

    sqlite> INSERT INTO SimpleTable (PK, Name, Origin) VALUES (5, "Charlotte", "United
    States");

    ```


    ## 检索数据


    如果你想从表中检索数据，你需要使用 `SELECT` 查询。这是一个例子：


    ```sql

    SELECT * FROM SimpleTable WHERE Name = "Leif"

    ```


    ## 使用图形用户界面


    你可以将其输入到查询窗格中，如图 3-7 所示。


    ![图 3-7](img/index-40_1.jpg)


    **图 3-7.** 使用查询选择数据


    ## 使用 sqlite3


    这是 `sqlite3` 中的代码。注意返回的数据格式化时，列之间用竖线分隔。


    ```

    sqlite> SELECT * FROM SimpleTable WHERE Name = "Leif";

    2|Leif|Iceland

    sqlite>

    ```


    ## 删除数据


    如果你在操作数据，可能会最终得到不需要的数据。特别是，你可能会遇到错误，因为 `PK` 字段必须是唯一的，所以你不能重新输入已经输入过的数据。


    以下是删除 `PK` 值为 1 的行的方法。


    ```sql

    DELETE FROM SimpleTable WHERE PK = 1;

    ```


    ## 总结


    本章向你展示了创建表、向其中插入数据然后检索数据的基础知识。请记住，这些仅仅是基础：在后面的章节中，你将看到 SQLite 的更多功能，但贯穿始终，你在本章中看到的相同基本
    SQLite 命令会以各种变体和选项重现。（提醒一下，这些命令是 `CREATE`、`INSERT` 和 `SELECT`。）


    # 第 4 章：使用关系模型和 SQLite


    你已经看到了如何创建表、向其添加行、向其中插入数据，然后检索数据。诚然，到目前为止涉及的数据量不大，但这些是数据库管理的基础。在此过程中，你已经看到 SQLite（像许多其他库和数据管理器一样）通常嵌入到框架、语言、类或数据库管理系统（`DBMS`）中。如前所述，如今，大多数
    `DBMS` 都是关系数据库管理系统（`RDBMS`）。它们基于 E. F. Codd 于 1970 年首次提出的关系模型，并且通常使用 SQL 或其衍生物（如
    SQLite！）来创建、管理和查询关系数据库。


    你已经看到了如何使用众多 SQLite 图形化编辑器之一（你可以在网上搜索“SQLite editor”，可能还会包含你的操作系统来找到它们）。你也看到了如何直接使用基本的
    SQLite 语法来创建表和处理其数据。本章增加了另一个工具：`sqlite3`，这是一个作为 SQLite 一部分分发的命令行工具。


    > **注意：** 如今大多数数据库都使用关系模型，因此 `DBMS` 和 `RDBMS` 在某种程度上是可互换的术语。本章让你看到什么是*不可互换*的：它仅适用于关系数据库（如
    SQLite）。关系数据库是两个表可以*相关*的数据库。是*表*彼此关联，并且这种关系是基于相关表中的*数据*创建的。因此，尽管本书大部分地方使用了 `DBMS`，但在本章中，因为主题是关系数据，我们使用术语
    `RDBMS`。关系连接两个表，因此为了讨论关系，我们需要从两个表开始。


    随着关系的构建，它们会变得非常复杂（也非常强大）。因此，有些人会回避它们，但没有理由担心。


    本章概述了关系如何工作、为什么应该使用它们以及创建它们是多么容易。关系通常涉及两个或多个表，因此本章首先向你展示如何创建两个逻辑上相关的表。


    然后你将看到如何使用 SQLite 来实际关联它们。（关系实际上可以从单个表关联回自身。这称为*自连接*。）


    ## 构建 Users 表


    考虑在多人游戏中记录分数的情况。你可以基于第 3 章的基础知识来创建一个类似 `SimpleTable` 的表。在这种情况下，表是用于用户的。从数据管理的角度来看，一个包含名字和出生地的表与一个包含名字和电子邮件地址的表差别不大。（主要区别在于第二个表在跟踪游戏分数方面更有用，而这正是本例的重点。）


    当你查看表 4-1 所示的表并将其与 `SimpleTable`（第 3 章中的表 3-1）进行比较时，会看到另一个区别。显式主键（列 `PK`）缺失了。此表使用
    SQLite 内置的机制来为每一行创建一个具有唯一值的主键。请记住这一点，因为我们稍后会回到这一点。


    **表 4-1.** 用户表


    | 姓名 | 电子邮箱 |

    | :--- | :--- |

    | Rex | rex@champlainarts.com |

    | Anni | anni@champlainarts.com |

    | Toby | toby@champlainarts.com |


    > **注意：** 如前所述，在 SQLite 中，除了括号内，大小写无关紧要。按照惯例，SQL 关键字大写。在本书中，表名和列名在文本中通常大写；在示例代码中，它们可能大写也可能不大写，以强化“这对
    SQLite 来说无关紧要”这一事实。在实践中，确定一个要遵循的惯例是一个非常好的主意。这是因为当今许多语言确实能识别大写和小写字母的区别。因此，当你在编写
    SQLite 代码（其中 `UseR`、`user` 和 `USER` 是相同的）和 Swift、Objective-C、Python、C 等其他语言（其中大小写重要）之间切换时，不遵守标准可能会无意中为自己或他人引入错误。（此外，命名和大小写的标准规则使你的代码在未来更易于阅读和维护。）


    这是一个良好的开端，并且你已经在第 3 章中看到了创建此类表的代码。根据修改后的列名和数据，以下是创建和填充该表的方法。


    ```

    sqlite> create table users (

    ...> Name char (128) not null,

    ...> email char (128)

    ...> );

    sqlite> insert into users (Name, email) VALUES ("Rex", "rex@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Anni", "anni@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Toby", "toby@champlainarts.com");

    sqlite> select * from users;

    Rex|rex@champlainarts.com

    Anni|anni@champlainarts.com

    Toby|toby@champlainarts.com

    sqlite>

    ```


    现在你需要相关的表来跟踪分数。


    ## 构建 Scores 表


    构建 `Scores` 表基本上是相同的代码。为了简单起见，你可以让每个用户从零分开始。在这个假设下，代码如下。


    ```

    sqlite> create table scores (

    ...> Name char(128),

    ...> score integer

    ...> );

    sqlite> insert into scores (name, score) VALUES ("Rex", 0);

    sqlite> insert into scores (name, score) VALUES ("Anni", 0);

    sqlite> insert into scores (name, score) VALUES ("Toby", 0);

    sqlite> select * from scores;

    Rex|0

    Anni|0

    Toby|0

    sqlite>

    ```


    表 4-2 显示了此时 `Scores` 表中的数据。

    '
- fmt: '# Chapter 4: Working with the Relational Model and SQLite


    You can retrieve the data with syntax you’ve used previously. To get a `name`
    and `email` address from `Users`, use the following code:


    ***Table 4-2.** Scores Table*


    **Name**


    **Score**


    **Rex**


    **0**


    **Anni**


    **0**


    **Toby**


    **0**


    `sqlite> select name, email from users where name = "Anni";`

    `Anni|anni@champlainarts.com`

    `sqlite>`


    You get the `score` from `Scores` in a similar way:


    `sqlite> select name, score from scores where name = "Anni";`

    `Anni|0`

    `sqlite>`


    ## Relating the Tables


    You need to have a way to refer to two tables in a single `SELECT` statement (that’s
    where aliases come into play). You also need to actually implement the relationship,
    and that’s where primary keys come into play again. This section covers both topics.


    ### Using Aliases to Identify Multiple Tables in a SELECT Statement


    The challenge is to tables and aliases together. You need to select the data for
    Anni, but there’s a problem here: Both `Scores` and `Users` have columns called
    `Name`. If you use a condition such as `where name = "Anni"`, SQLite won’t know
    which `Name` column you mean. You can distinguish between those two columns by
    identifying them in your `SELECT` statement. It doesn’t matter how you identify
    them, so you could write the following:


    ```

    select a.name, email, score

    from users a, scores b

    where a.name = "Anni" and b.name = "Anni";

    ```


    You qualify each table with an *alias*. In the *FROM* clause, the alias follows
    the table name, and in the *SELECT* and *WHERE* clauses, the alias precedes the
    table name and is separated from it by a period. Thus in the `SELECT` command
    and `WHERE` clause, you get `select a.name` and `where a.name = "Anni"` and in
    the *FROM* clause you get `FROM users a`.


    Although you can use anything you want as the alias; it can make your code easier
    to read if you use the actual name or an abbreviation for it as in the following:


    ```

    select users.name, email, score

    from users, scores

    where users.name = "Anni" and scores.name = "Anni";

    ```


    Names that are unambiguous (they only occur in one table) don’t need aliases.


    This structure is very fragile as you will recognize if you’ve done much work
    with data and databases. Everything relies on the names being the same in both
    tables. If there’s a misspelling anywhere the data won’t match. And even without
    typos, what happens if a name changes (this happens for a variety of real-world
    reasons). You could wind up with a handful of `Scores` records that use the earlier
    name and another group of records that use the later name.


    Before moving on to explore this issue, it’s worthwhile to take a look at what’s
    already been done by SQLite behind the scenes: it will help you solve the problems
    that are unfolding as names change.


    ### Using the `rowid` Primary Key


    In Chapter [3, primary keys](http://dx.doi.org/10.1007/978-1-4842-1766-5_3) that
    uniquely identify each row in a table were discussed.


    They’re very useful in retrieving data, particularly in cases where the data itself
    may be incorrect or may have changed from what you think it is, due to revisions
    or other circumstances. If you don’t specify a primary key, SQLite has gone ahead
    and created a unique key for each row in each table. It’s called *rowid*, and
    you can see it in any table for which you have not provided a primary key. With
    the `Users` table shown in this section, you can access the primary keys with
    the following code:


    ```

    sqlite> select name, rowid from users;

    Rex|1

    Anni|2

    Toby|3

    sqlite>

    ```


    This code for `Scores` shows its primary keys.


    ```

    sqlite> select name, rowid from scores;

    Rex|1

    Anni|2

    Toby|3

    sqlite>

    ```


    ## Changing a Name in One Table


    In order to change data that’s been stored in a row of a table, you use the `UPDATE`
    command. Thus, if you want to change Toby to George in the database, you would
    use syntax like the following:


    ```

    sqlite> UPDATE scores

    ...> SET name = "George"

    ...> WHERE name = ''Toby'';

    ```'
