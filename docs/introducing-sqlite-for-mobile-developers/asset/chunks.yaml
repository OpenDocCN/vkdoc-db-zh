    `SQL` is case-insensitive.


    **`SQL` Action: `SELECT`**


    There are a number of verbs in `SQL`, but `SELECT` is used to select data from
    a table. Commands start with that word.


    **`SQL` Data to Select: List of Column Names**


    You can start to form a `SELECT` statement by listing the names of the columns
    you want to select. Thus, to retrieve data from the `Name` column, you would start
    the `SELECT` statement with:


    ```sql

    SELECT Name

    ```


    To select data from several columns, you can specify a comma-delimited list as
    in the following case:


    ```sql

    SELECT Name, Origin

    ```


    You can select all columns with an asterisk as in:


    ```sql

    SELECT *

    ```


    **`SQL` Data Source: Table Name**


    You can specify the data source using a clause beginning with `FROM`. Following
    is an example:


    ```sql

    SELECT Name FROM SimpleTable

    ```


