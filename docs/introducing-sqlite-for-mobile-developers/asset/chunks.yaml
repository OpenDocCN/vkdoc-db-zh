    \ SQLite 接口编写的只有几行代码。当你为自己的目的重用这些代码时，你编写的大部分代码将与你自己的应用及其数据相关，而不是与数据库本身相关。\n\n\
    # 第 8 章 ■ 在 iOS 和 OS X 中使用 SQLite 与 Core Data\n\n尽管 SQLite 与 PHP、Android 和 iOS/OS\
    \ X 紧密结合，但集成策略有所不同。在某种程度上，它们形成了一个逻辑上的递进关系。PHP 将 SQLite 作为语言的扩展来支持（在撰写本文时已不再是可选组件）。当你为\
    \ SQLite 编写 PHP 代码时，当今的最佳实践是使用 PHP 数据对象（`PDO`）类。\n\n然而，你代码的其他部分很可能是传统的过程式代码：并没有假设你会全程编写面向对象的代码。\n\
    \nAndroid 在创建通用类（`android.database`）的理念上采取了稍有不同的方法。在 Android 的情况下，一个特定的子类数据库提供\
    \ SQLite 支持（`android.database.sqlite`），同时在`android.database`中提供通用的数据管理支持。\n\n\
    可以合理地认为，Android 中的 SQLite 实现比 PHP 更具面向对象性。（这是一个概括，并非旨在忽视或煽动争论。）尽管实现方式存在这些差异，但你在本书和其他地方看到的\
    \ SQLite 代码在 PHP 和 Android 中许多情况下都是可见的。\n\n你将在 PHP 和 Android 应用的源代码中找到熟悉的 SQLite\
    \ 命令——如`SELECT`、`DELETE`、`INSERT INTO`、`DELETE FROM`等命令。\n\n在 iOS 和 OS X 的世界里，面向对象的方法走得更远。在正常情况下，作为开发人员，你甚至看不到\
    \ SQLite 代码。就像`PDO`和`android.database`一样，存在针对各种数据库定制的通用类，但 SQLite 代码被放置在这些通用类内部，很少对你可见。这意味着你不需要编写诸如`SELECT`、`DELETE`之类的语句或命令。相反，你编写的是与通用类及其为你的应用定制的子类交互的代码。\n\
    \n此外，与`PDO`和`android.database`中的实现相比，iOS 和 OS X 中的实现有一个非常关键的区别。这个区别与关系有关，它们在概念上与其他任何\
    \ SQL 环境中的关系完全相同，但实现方式却大不相同，你将在本章中看到。\n\n最后，有一个关键点对 Core Data 至关重要，但不以同样的方式适用于其他环境。`PDO`和`android.database`封装特定的数据库并提供对它们的访问。Core\
