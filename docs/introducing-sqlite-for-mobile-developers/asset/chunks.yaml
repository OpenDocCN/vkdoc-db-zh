    Working with **NSManagedObject**


    In any app that uses Core Data, you’ll need a Core Data stack, and you create
    it pretty much the same way each time except that you do customize the name of
    your project. (If you’re building your app from one of the built-in Xcode templates,
    there may be a Core Data check box you can use to automatically insert the Core
    Data stack code as well as your project name.)


    But what about your data? That’s going to be managed by your Core Data stack,
    but surely it requires special coding. The fact is that, as is often the case
    with Core Data, the SQLite syntax is handled for you behind the scenes. You already
    have a data model (either from the template as-is or with your modifications)
    and if you don’t you need to create one using File ➤ New ➤ File.


    ■ **Note** in os X, view controllers are not generally used; instead, bindings
    are used. that topic is covered in developer.apple.com.


