    sqlite> `update scores set userid = 2 where name = ''Anni'';`


    sqlite> `update scores set userid = 3 where name = ''George'';`


    目前，只需验证 `Scores` 表中的数据是否如这里所示（无论是在 SQLite 中，还是在表 4-5 中）。


    sqlite> `select rowid, userid, name, score from Scores;`


    1|1|Rex|0

    2|2|Anni|0

    3|3|George|0


    sqlite>


    **表 4-5.** 添加了用户 ID 的 Scores 表


    | 行 ID | 用户 ID | 姓名 | 分数 |

    |-------|--------|------|-------|

    | Rex   | Anni   | George |       |


    ## 第 4 章 ■ 处理关系模型与 SQLite


    此表中的姓名不再具有关联意义，因为 `Scores` 表和 `Users` 表之间的关系是基于 `Users` 表的 `rowid` 与 `Scores`
    表的 `userid` 相匹配而建立的。在 SQLite 中，`ALTER TABLE` 命令不允许你删除列：推荐的解决方法是删除旧表并创建一个新表（在许多情况下，更合适的方法是导出数据，导入到新表，然后删除旧表）。因此，目前你可以忽略
    `Scores` 表中的 `Name` 列。从你的角度看，`Scores` 表可以如表 4-6 所示（尽管在实际表中仍存在一个不再需要的列）。


    **表 4-6.** 添加了用户 ID 并忽略姓名的 Scores 表


    | 行 ID | 用户 ID | 分数 |

    |-------|--------|-------|

    |       |        |       |


    ### 连接表


    获取所需数据最简单的方法是使用 `WHERE` 子句来指定你需要 `users.rowid` 与 `scores.userid` 相匹配的数据。（请记住，当你没有提供主键时，SQLite
    会自动创建 `users.rowid`，但你必须将适当的 `users.rowid` 值输入到 `scores.userid` 列中，才能使关系生效。）


    如果你已经这样做了（并且如果你遵循了本章的步骤，那么你已经做到了），那么下面的代码将给出你想要的结果：


    sqlite> `select users.name, scores.score from users, scores where users.rowid
    = scores.userid;`


    Rex|0

    Anni|0

    Toby|0


    sqlite>


    这里有几点需要注意：


    - 姓名来自 `Users` 表；`Scores` 表中的 `Name` 字段不再使用。因此，即使你可能在 `Scores` 表中仍然有 George 这个名字，`userid`
    为 3 的记录（最初对应的是 Toby）也会显示为 George（假设这是同一个人，只是名字被正确更改了）。

    - 只显示匹配的记录。向 `Users` 或 `Scores` 表添加一些新记录：除非 `Users` 表中的 `rowid` 与 `Scores` 表中的
    `userid` 匹配，否则它们不会显示。

    - 如果 `Scores` 表中的某条记录没有 `userid`，它将不会显示。


    ## 第 4 章 ■ 处理关系模型与 SQLite


    ### 小结


    你可以在此通用结构的基础上，通过添加更多数据来扩展。尝试组合使用新记录，以及用户和分数的匹配与非匹配 ID。


    为一个现有用户添加一条 `Scores` 记录，使得一个人有两条记录，但姓名来自 `Names` 表是正确的。


    在第 [5](http://dx.doi.org/10.1007/978-1-4842-1766-5_5) 章中，你将探索更多增强 `SELECT` 语句的方法。


    ## 第 5 章 使用 SQLite 功能——SELECT 语句能做什么


    `SELECT` 语句的功能远不止获取数据。除了连接子句（在第 [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)
    章中简要讨论过），你还可以对数据进行排序和分组，并提供中间表来进行类似于子查询的操作。如果你习惯于*过程式编程*（描述过程的每个步骤……做这个……做那个……如果这个为真则做另一件事否则做那件事……），你可能会注意到
    SQL 和关系数据库鼓励你用*声明式编程*的思维方式来思考（获取所有是 X 的东西，对所有 X 做某事……）。


    当你在声明式编程的世界里工作时，你能放入声明中的东西越多，你就越有利。用英语来说，这意味着以下所有内容：


    -   与其编写代码来测试有效数据，不如尝试在数据库或框架中强制执行验证规则。（Xcode Core Data 模型编辑器将此推向了图形化的极限。）

    '
- fmt: '# 使用 SQLite 的 SELECT 语句功能


    ## 概述：采用声明式思维


    与其循环遍历数据集中的每个项目并测试值以决定采用哪个过程分支，不如获取所有的 X 并对它们执行操作。（实际上，你是将 `if` 语句移入了 `SELECT`
    语句中。）


    本章探讨了许多可以改进你代码的 SQL 子句。请记住，实际上你是在编写一些函数式代码，但以声明式的方式进行，从而达到声明式的目标：对组内（或 `SELECT`
    结果中）的每个项目执行相同的操作。


    你还将学习如何在 SQLite 语句中使用变量。这可以显著提升你的 SQLite 性能。这个概念在 PHP、Android 和 Core Data 中都有实现，更不用说在许多常见数据库中了。


    ## 查看测试数据


    本章的示例中使用了一些测试数据。这些数据实际上是在测试第 12 章的 Score 应用程序时生成的。所使用的表是 `Score`，用到的值包括 `rowid`（主键）、`userid`（用户编号，外键）和
    `score`（具体分数）。一个给定的用户可以有多个分数，但每个 `user` 和 `rowid` 是唯一的。


    以下是使用的基本数据：


    ```

    sqlite> select rowid, userid, score from Score;

    1|1|10

    2|2|20

    3|3|30

    4|1|99

    5|1|99

    6|1|9

    7|1|99

    8|1|99

    9|1|17

    10|1|31

    11|1|23

    12|1|50

    24|2|16

    25|3|8

    26|2|99

    27|1|3

    sqlite>

    ```


    ## 排序使数据更易用


    行号是有序的，但要以有意义的方式查看数据，按如下方式排序是合理的：


    ```

    sqlite> select rowid, userid, score from Score order by userid;

    1|1|10

    4|1|99

    5|1|99

    6|1|9

    7|1|99

    8|1|99

    9|1|17

    10|1|31

    11|1|23

    12|1|50

    27|1|3

    2|2|20

    24|2|16

    26|2|99

    3|3|30

    25|3|8

    sqlite>

    ```


    ## 分组可整合数据


    当你对数据进行分组时，会将每个组值的数据合并为单个项。


    如果你想查找 `score` 的最大值，可以使用以下代码：


    ```

    sqlite> select max(score) from Score;

    ```


    > **注意** 在本例和其他示例中，请随时参考基本数据列表以理解结果。


    如果对数据进行分组，你可以获得每个 `userid` 的最大值，如下所示：


    ```

    sqlite> select userid, max(score) from Score group by userid;

    1|99

    2|99

    3|30

    sqlite>

    ```


    生活不仅仅关乎最大值和最小值：SQLite 还能帮你找到中间值（平均值）。如果这些分数代表团队而不是用户，那么根据平均分获胜的将是第 1 队：


    ```

    sqlite> select userid, avg(score) from Score group by userid;

    1|49.0

    2|45.0

    3|19.0

    sqlite>

    ```


    下次当你想写循环来计算平均值或查找最大值、最小值时，请记住 `group by`。事实上，如果你在使用像 SQLite 这样支持 SQL（即使是比 SQLite
    更基础、功能更弱的 SQL）的关系数据库，下次当你开始写循环来处理查询结果时，试着问问自己：“我能否在查询内部完成这个操作？”


    ## 在查询中使用变量


    在第 6 章中，你将看到如何在 PHP 数据对象（PDO）中使用 SQLite。它在你的 PHP 代码中是一个单例对象，但它绝对是一个拥有自身方法的对象。正如你将在下一章看到的，查询数据库的过程包括使用四个方法。


    - `new PDO` 创建 PDO 并连接到你的 SQLite 数据库。

    - `prepare` 以你的 SQLite 查询作为其参数。

    - `execute` 执行查询。

    - `$query->fetchAll` 从查询中检索数据。


    还有一个简单的 `query()` 调用，它一步完成查询的创建和执行。


    许多数据库支持这种流程——创建可重复使用的查询，以及创建一次性运行的查询。当你意识到可以在查询内部创建变量时，逐步创建、准备和执行查询的过程的优势就变得清晰了。


    因此，可用于从用户表中获取所有名字的基本查询可以是：

    `$query = $sqlite->prepare("select * from users;");`


    检索具有特定 `name` 值的记录的查询可以是：

    `$query = $sqlite->prepare("select * from users where Name = ''Rex'';");`

    此时，使用一步完成“准备”和“执行”的调用似乎更容易：

    `$query = $sqlite->query("select * from users where Name = ''Rex''");`


    然而，如果你使用变量，独立语句的威力和效率就会变得清晰。这里有一个例子。从 `new PDO` 和 `prepare` 开始，但在查询中使用一个变量，如 `:name`。


    ```

    $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');

    $query = $sqlite->prepare("select * from users where name = :name;");

    ```


    你不必立即使用 `$query`，但当你决定使用它时，可以用如下代码为 `:name` 填充值：

    `$query->bindValue('':name'', "Rex");`


    或者，如果你想使用一个变量：

    ```

    $theName = "Rex";

    $query->bindValue('':name'', $theName);

    ```


    然后执行查询：

    `$query->execute()`


    你可以在稍后更改绑定的值并重新执行查询：

    ```

    $query->bindValue('':name'', "Anni");

    $query->execute()

    ```


    这个过程节省了一些内存，并且效率高得多。查询可以在缺失数据尚未存在时进行准备，这样当你回来执行它时，需要做的工作就少得多。


    ## 总结


    在本章中，你看到了一些可以在 SQLite 的 `SELECT` 语句中使用的额外技巧。任何可以移入查询中的操作，都意味着你需要编写和调试的代码会少一些。


    有了这些背景知识，现在是时候学习在 PHP、Android 和 OpenDoc 中使用 SQLite 了。它们完成相同的事情，但方法略有不同。


    保持不变的是 SQLite。


    # 使用 PHP 操作 SQLite


    SQLite 以及 SQL 本身的基础很简单。这是一个重复的流程：为表中的每个数据元素创建列来定义表。然后为每一行在每个列中添加值。你可以使用基本的 `SELECT`
    语句从单个表中检索数据。通过使用 `WHERE` 子句将一个表中的值与另一个表（或在自连接的情况下是同一个表）中的相应值进行匹配，来连接两个表。


    SQL 及其所有实现（包括 SQLite）的复杂性来自于这些基本构建块的组合。此外，我们经常处理非常大的表（数百万甚至数十亿行）也是增加复杂性的因素，但基础是简单的。


    > **注意** SQLite 的单个数据库限制是 140TB，这个限制往往在行数成为问题之前就达到了。sqlite.org 有一个关于限制的页面：[www.sqlite.org/limits.html](http://www.sqlite.org/limits.html)。它指出这些限制在很大程度上未经测试，部分原因是
    SQLite 开发人员无法访问能够管理如此大数据量的硬件。如果你真的考虑管理如此大量的数据，你可能需要对硬件和软件解决方案进行认真的分析，但请记住，无论你最终选择什么解决方案，SQLite
    都可以成为一个完美的原型设计工具。'
  raw: 'Rather than looping through each item in a set of data and testing


    a value to determine which procedural branch to take, get all the


    Xs and do something to each of them. (In effect, you move the if


    statement into the SELECT statement.)


    This chapter examines a number of SQL clauses that can improve your code. Bear
    in mind that in effect you are writing some functional code, but in a declarative
    way, so that you can get to the declarative goal of doing the same thing to every
    item in a group (or in a SELECT result).


    You’ll also see how to use variables in SQLite statements. This can dramatically
    improve your SQLite performance. The concept is implemented in PHP, Android, and
    Core Data not to mention in many common databases.


    Chapter 5 ■ Using sQLite FeatUres—What YoU Can Do With seLeCt statements Looking
    at the Test Data


    In this chapter, we use some test data in the examples. It’s actually some data
    generated in testing the Score app in Chapt[er 12\. T](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)he
    table that is used is Score, and the values that are used here are rowid (a primary
    key), userid (a user number and foreign key), and score (a specific score). A
    given user can have multiple scores, but each user and rowid is unique.


    Following is the basic data used:


    sqlite> **select rowid, userid, score from Score;**


    1|1|10


    2|2|20


    3|3|30


    4|1|99


    5|1|99


    6|1|9


    7|1|99


    8|1|99


    9|1|17


    10|1|31


    11|1|23


    12|1|50


    24|2|16


    25|3|8


    26|2|99


    27|1|3


    sqlite>


    Ordering Data Makes It Easier to Use


    The row numbers are in order, but to look at the data in a meaningful way, it
    makes sense to order it as in the following:


    sqlite> **select rowid, userid, score from Score order by userid;**


    1|1|10


    4|1|99


    5|1|99


    6|1|9


    7|1|99


    8|1|99


    9|1|17


    10|1|31


    11|1|23


    12|1|50


    27|1|3


    Chapter 5 ■ Using sQLite FeatUres—What YoU Can Do With seLeCt statements 2|2|20


    24|2|16


    26|2|99


    3|3|30


    25|3|8


    sqlite>


    Grouping Data Can Consolidate It


    When you group data, you consolidate it into a single item for each value of the
    group.


    If you want to find the maximum value of score, you can use the following code:
    sqlite> **select max (score) from Score;**


    sqlite>


    ■ **Note** in this and the other examples, feel free to refer back to the basic
    list of data to understand the results.


    If you group the data, you can get the maximum value for each userid as in the
    following:


    sqlite> **select userid, max(score) from Score group by userid;**


    1|99


    2|99


    3|30


    sqlite>


    Life isn’t just about the biggest and smallest: SQLite helps you find the middle
    of road (the average). If these scores represent teams rather than users, the
    winning team based on average scores would be Team 1:


    sqlite> **select userid, avg (score) from Score group by userid;**


    **1|49.0**


    2|45.0


    3|19.0


    sqlite>


    Remember group by the next time you’re tempted to write a loop to calculate an
    average or find the maximum or minimum value. In fact, it you’re using a relational
    database such as SQLite, which supports SQL (even one more basic and less powerful
    than SQLite), try to catch yourself the next time you start to write a loop to
    process the results of a query, and ask yourself: “Can I do this inside the query
    itself?”


    Chapter 5 ■ Using sQLite FeatUres—What YoU Can Do With seLeCt statements Using
    Variables in Queries


    In Chapt[er 6, y](http://dx.doi.org/10.1007/978-1-4842-1766-5_6)ou’ll see how
    to use SQLite with the PHP data object (PDO). It’s a singleton object in your
    PHP code, but it is definitely an object with its own methods. As you’ll see in
    the next chapter, the process of querying the database consists of using four
    methods.


    •


    new PDO creates the PDO and connects it to your SQLite database.


    •


    prepare takes as its parameter your SQLite query


    •


    execute performs the query


    •


    $query->fetchAll retrieves the data from the query


    There is also a simple query () call that creates and performs the query all at
    once.


    Many databases support this type of process—creating a query that can be used
    and reused as well as creating a query to run once. The reason for exposing the
    step-by-step query create, prepare, and execute process becomes clear when you
    realize that you can create variables inside the query.


    Thus, the basic query that can be used to get all the names from a user table
    can be $query = $sqlite->prepare ("select * from users;");


    The name to retrieve the record for a record with a specific value for name could
    be $query = $sqlite->prepare ("select * from users where Name = "Rex";"); At this
    point it may seem that it would be easier to use the one-step call which does
    the “prepare” and “execute” together.


    $query = sqlite->query ("select * from users where Name = "Rex"); However, the
    power and efficiency of the separate statements become clear if you use a variable.
    Here’s an example. Begin with new PDO and prepare but, inside your query, use
    a variable such as :name.


    $sqlite = new PDO(''sqlite:**sqlitephp.sqlite**'');


    $query = $sqlite->prepare ("select * from users where name = :name;") ; You don’t
    have to use $query right away, but whenever you do decide to use it, fill in the
    value for :id with code such as the following:


    $query->bindValue ('':name'', "Rex");


    or, if you want to use a variable,


    $theName = "Rex";


    $query->bindValue('':name'', $theName);


    Chapter 5 ■ Using sQLite FeatUres—What YoU Can Do With seLeCt statements Then
    execute the query:


    $query>execute()


    You can come back later and change the bound value and re-execute the query: $query->bindValue
    ('':name'', "Anni");


    $query>execute()


    This process saves some memory and is much more efficient. The query can be prepared
    with the missing data not yet present so that when you come back to execute it,
    there’s much less work to do.


    Summary


    In this chapter you’ve seen some of the extra tweaks you can use with SELECT statements
    in SQLite. Everything that you can move into the query means a little less code
    for you to write and debug.


    With this background, it’s time to move into using SQLite with PHP, Android, and
    OpenDoc. Each of them does the same thing, but their approaches are a little different.


    What remains the same is SQLite.


    **Chapter 6**


    **Using SQLite with PHP**


    The basics of SQLite and, indeed, of SQL itself, are simple. It’s a repetitive
    routine of creating tables with a column for each data element in the table. You
    then add rows to each table with a value for each column. You can retrieve data
    from a single table with a basic SELECT statement. Join two tables by using a
    WHERE clause to match a value in one table with a corresponding value in another
    table (or in the same table in the case of a self-join).


    The complexity of SQL and all of its implementations including SQLite comes from
    combinations of these basic building blocks. In addition, the fact that we are
    often dealing with very large tables (millions and even billions of rows) are
    factors that can add complexity to the mix, but the basics are simple.


    ■ **Note** There is a SQLite limit of 140 terabytes per database, and that limit
    would tend to be reached before the number of rows becomes an issue. sqlite.org
    has a page on limits at [www.sqlite.org/limits.html](http://www.sqlite.org/limits.html).
    It notes that these limits are for the most part untested in part due to SQLite
    developers not having access to hardware capable of managing those amounts of
    data. If you really are contemplating managing that amount of data, you may want
    to do a serious analysis of hardware and software solutions, but remember that
    whatever solution you end up with, SQLite can make a perfect prototyping tool.'
  trans: '# 使用 SQLite 的 SELECT 语句功能


    ## 概述：采用声明式思维


    与其循环遍历数据集中的每个项目并测试值以决定采用哪个过程分支，不如获取所有的 X 并对它们执行操作。（实际上，你是将 `if` 语句移入了 `SELECT`
    语句中。）


    本章探讨了许多可以改进你代码的 SQL 子句。请记住，实际上你是在编写一些函数式代码，但以声明式的方式进行，从而达到声明式的目标：对组内（或 `SELECT`
    结果中）的每个项目执行相同的操作。


    你还将学习如何在 SQLite 语句中使用变量。这可以显著提升你的 SQLite 性能。这个概念在 PHP、Android 和 Core Data 中都有实现，更不用说在许多常见数据库中了。


    ## 查看测试数据


    本章的示例中使用了一些测试数据。这些数据实际上是在测试第 12 章的 Score 应用程序时生成的。所使用的表是 `Score`，用到的值包括 `rowid`（主键）、`userid`（用户编号，外键）和
    `score`（具体分数）。一个给定的用户可以有多个分数，但每个 `user` 和 `rowid` 是唯一的。


    以下是使用的基本数据：


    ```

    sqlite> select rowid, userid, score from Score;

    1|1|10

    2|2|20

    3|3|30

    4|1|99

    5|1|99

    6|1|9

    7|1|99

    8|1|99

    9|1|17

    10|1|31

    11|1|23

    12|1|50

    24|2|16

    25|3|8

    26|2|99

    27|1|3

    sqlite>

    ```


    ## 排序使数据更易用


    行号是有序的，但要以有意义的方式查看数据，按如下方式排序是合理的：


    ```

    sqlite> select rowid, userid, score from Score order by userid;

    1|1|10

    4|1|99

    5|1|99

    6|1|9

    7|1|99

    8|1|99

    9|1|17

    10|1|31

    11|1|23

    12|1|50

    27|1|3

    2|2|20

    24|2|16

    26|2|99

    3|3|30

    25|3|8

    sqlite>

    ```


    ## 分组可整合数据


    当你对数据进行分组时，会将每个组值的数据合并为单个项。


    如果你想查找 `score` 的最大值，可以使用以下代码：


    ```

    sqlite> select max(score) from Score;

    ```


    > **注意** 在本例和其他示例中，请随时参考基本数据列表以理解结果。


    如果对数据进行分组，你可以获得每个 `userid` 的最大值，如下所示：


    ```

    sqlite> select userid, max(score) from Score group by userid;

    1|99

    2|99

    3|30

    sqlite>

    ```


    生活不仅仅关乎最大值和最小值：SQLite 还能帮你找到中间值（平均值）。如果这些分数代表团队而不是用户，那么根据平均分获胜的将是第 1 队：


    ```

    sqlite> select userid, avg(score) from Score group by userid;

    1|49.0

    2|45.0

    3|19.0

    sqlite>

    ```


    下次当你想写循环来计算平均值或查找最大值、最小值时，请记住 `group by`。事实上，如果你在使用像 SQLite 这样支持 SQL（即使是比 SQLite
    更基础、功能更弱的 SQL）的关系数据库，下次当你开始写循环来处理查询结果时，试着问问自己：“我能否在查询内部完成这个操作？”


    ## 在查询中使用变量


    在第 6 章中，你将看到如何在 PHP 数据对象（PDO）中使用 SQLite。它在你的 PHP 代码中是一个单例对象，但它绝对是一个拥有自身方法的对象。正如你将在下一章看到的，查询数据库的过程包括使用四个方法。


    - `new PDO` 创建 PDO 并连接到你的 SQLite 数据库。

    - `prepare` 以你的 SQLite 查询作为其参数。

    - `execute` 执行查询。

    - `$query->fetchAll` 从查询中检索数据。


    还有一个简单的 `query()` 调用，它一步完成查询的创建和执行。


    许多数据库支持这种流程——创建可重复使用的查询，以及创建一次性运行的查询。当你意识到可以在查询内部创建变量时，逐步创建、准备和执行查询的过程的优势就变得清晰了。


    因此，可用于从用户表中获取所有名字的基本查询可以是：

    `$query = $sqlite->prepare("select * from users;");`


    检索具有特定 `name` 值的记录的查询可以是：

    `$query = $sqlite->prepare("select * from users where Name = ''Rex'';");`

    此时，使用一步完成“准备”和“执行”的调用似乎更容易：

    `$query = $sqlite->query("select * from users where Name = ''Rex''");`


    然而，如果你使用变量，独立语句的威力和效率就会变得清晰。这里有一个例子。从 `new PDO` 和 `prepare` 开始，但在查询中使用一个变量，如 `:name`。


    ```

    $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');

    $query = $sqlite->prepare("select * from users where name = :name;");

    ```


    你不必立即使用 `$query`，但当你决定使用它时，可以用如下代码为 `:name` 填充值：

    `$query->bindValue('':name'', "Rex");`


    或者，如果你想使用一个变量：

    ```

    $theName = "Rex";

    $query->bindValue('':name'', $theName);

    ```


    然后执行查询：

    `$query->execute()`


    你可以在稍后更改绑定的值并重新执行查询：

    ```

    $query->bindValue('':name'', "Anni");

    $query->execute()

    ```


    这个过程节省了一些内存，并且效率高得多。查询可以在缺失数据尚未存在时进行准备，这样当你回来执行它时，需要做的工作就少得多。


    ## 总结


    在本章中，你看到了一些可以在 SQLite 的 `SELECT` 语句中使用的额外技巧。任何可以移入查询中的操作，都意味着你需要编写和调试的代码会少一些。


    有了这些背景知识，现在是时候学习在 PHP、Android 和 OpenDoc 中使用 SQLite 了。它们完成相同的事情，但方法略有不同。


    保持不变的是 SQLite。


    # 使用 PHP 操作 SQLite


    SQLite 以及 SQL 本身的基础很简单。这是一个重复的流程：为表中的每个数据元素创建列来定义表。然后为每一行在每个列中添加值。你可以使用基本的 `SELECT`
    语句从单个表中检索数据。通过使用 `WHERE` 子句将一个表中的值与另一个表（或在自连接的情况下是同一个表）中的相应值进行匹配，来连接两个表。


    SQL 及其所有实现（包括 SQLite）的复杂性来自于这些基本构建块的组合。此外，我们经常处理非常大的表（数百万甚至数十亿行）也是增加复杂性的因素，但基础是简单的。


    > **注意** SQLite 的单个数据库限制是 140TB，这个限制往往在行数成为问题之前就达到了。sqlite.org 有一个关于限制的页面：[www.sqlite.org/limits.html](http://www.sqlite.org/limits.html)。它指出这些限制在很大程度上未经测试，部分原因是
    SQLite 开发人员无法访问能够管理如此大数据量的硬件。如果你真的考虑管理如此大量的数据，你可能需要对硬件和软件解决方案进行认真的分析，但请记住，无论你最终选择什么解决方案，SQLite
    都可以成为一个完美的原型设计工具。'
- fmt: '# Using SQLite with PHP


    SQLite itself is very lightweight: it imposes a minimal burden on users and their
    devices in many cases. That combination of a simple structure and a lightweight
    implementation makes SQLite a popular tool for use in web sites. Because it is
    a single-user implementation, it is often used for a single user’s data, but,
    as noted previously, it also can be used to prototype an implementation of a much
    larger system using a more powerful SQL implementation of any sort.


    Whether you are working with a single-user project or a prototype for something
    larger, SQLite is a good choice, and it fits nicely with PHP. This chapter provides
    a brief overview (or refresher) of PHP; it then moves on to show you how the basic
    tables shown in Chapters [3](http://dx.doi.org/10.1007/978-1-4842-1766-5_3) [and
    4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4) can be implemented on web pages
    with PHP.


    > **Note** This chapter focuses on the basics of `php`/SQLite integration. For
    an example of how they can be used on a series of web pages, see [Chapter 11](http://dx.doi.org/10.1007/978-1-4842-1766-5_11).
    In order to test the code in this chapter, you will need a basic text editor—preferably
    one such as BBEdit, which highlights syntax for you so you can spot minor typos
    easily. You also need a server to which you can upload your `php` files as well
    as a SQLite database. If you are maintaining a web site, you have access to such
    a server in order to post your `html` pages. It may or may not have `php` installed.
    Most servers do, but for security reasons some limit access. If you have any difficulties,
    check with your server administrator.


    ## Defining "Single User" for PHP


    SQLite is designed for a single user. It is often used together with `php` to
    implement a website. Does that mean that your `php`/SQLite web site is designed
    for a single user?


    The answer is “yes,” but the details may surprise you. When you use `php` in a
    web page, there is a single user—it is the web server. Depending on your app,
    SQLite may or may not be a good choice (it almost always is a good choice for
    prototyping and testing). Static databases work well most of the time if they
    are not enormous.


    Apps that need to update a database can quickly run into trouble if you use SQLite
    and there are more than a handful of users (it also depends on how frequently
    your users are updating the data).


    ## Putting PHP and SQLite Together: The Basics


    `PHP` is perhaps the most widely used server-side programming language. Strictly
    speaking, it is a scripting language which means that it is interpreted at runtime
    (in practical terms, that usually means web page load time). The output from the
    `PHP` script is typically a web page in this scenario. As the `PHP` script is
    running, it can do a wide variety of things including communicating with other
    processes and devices, and in the SQLite context, it can communicate with a SQLite
    database that resides on the web server.


    ## Verifying PHP in Your Environment


    Start by verifying that you have `PHP` installed on your server and that you can
    access it. (If you already are using `PHP` for web sites or other files, you can
    skip this step.)


    Here is the code for a simple `PHP`-based web page. It simply requests a display
    of the current `PHP` status information on the server. If it doesn’t work, check
    with your administrator because you won’t be able to experiment with SQLite and
    `PHP` if the `PHP` piece is missing. In addition to `PHP`, you may also have to
    verify that SQLite is available on the server, but in many (probably most) cases
    it is.


    > **Caution** Unlike SQLite, `php` is case-sensitive, so be careful with your
    capitalization. This is a good reason for standardizing on case-sensitive names
    for column names in your SQLite code even though it doesn’t matter to SQLite.
    When you start manipulating the data with `php`, it will matter.


    This is the sample code to use to test `PHP`. The code in boldface is the `PHP`
    code inside the HTML code—it is delimited by `<?PHP` and `?>`. It simply calls
    the `phpinfo()` function. Place this code in a file on your server. This file
    should have the `php` extension (it is usually lower-case, but on many servers
    the case won’t matter). If you name this `test.php` and upload it to the root
    of your web site (next to `index.html` or `index.php` in most cases) you can access
    it—including running the embedded `PHP` code—by going to [http://mywebsite/test.php](http://mywebsite/test.php).


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <title>Chapter6</title>

    <meta name="generator" content="BBEdit 11.1" />

    </head>

    <body>

    <?PHP

    phpinfo();

    ?>

    </body>

    </html>

    ```


    ## Preparing the SQLite Database


    You can use almost any of the SQLite commands with `PHP`, but, in practice, the
    most common commands you use are those that manage data in a table that already
    exists. In some environments, it may be an empty table that is populated by your
    web site as it is visited by users.


    Here is the code to prepare the pair of databases used in Chapter [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4).
    They will be used again in this chapter. Several sections are worth paying particular
    attention to. They are shown in bold.


    *   In this example, `sqlite3` is launched using a database called `sqlitephp.sqlite`.
    If it doesn’t exist, `sqlite3` creates it. Normally, `.sqlite` or `.db` is used
    as the extension. (If you use your own extension, you may have issues in uploading
    it to your web site.)

    *   The `Users` table is created. Note that the `Name` column cannot be null—you
    must have a name. Data already used in [Chapter 4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)
    is filled in. (It is shown here as Table 6-1.)

    *   After creating the table and inserting the data, the data is shown with a
    `SELECT` statement. Note that the `rowid` is specifically requested: The typical
    `SELECT *` shows all columns except a hidden column such as `rowid`.

    *   You need to see the `rowid` values in order to insert them into `Scores`.
    The `insert` statement inserts the `rowid` values into `Scores` so that the relationship
    can be used. Table 6-2 shows the `Scores` table.

    *   Finally, a `SELECT` statement shows the name and score using data from both
    `Users` and `Scores` that is related using `rowid` (users) to `userid` (scores).
    Table 6-3 shows the data.


    The entire `sqlite3` code is shown here.


    **Table 6-1.** Users Table


    | **rowid** | **Name** | **E-mail** |

    | :--- | :--- | :--- |

    | | Rex | rex@champlainarts.com |

    | | Anni | anni@champlainarts.com |

    | | Toby | toby@champlainarts.com |


    **Table 6-2.** Scores Table


    | **userid** | **Score** |

    | :--- | :--- |

    | | |

    | | |


    **Table 6-3.** Related Users and Scores Tables


    | **Name** | **Score** |

    | :--- | :--- |

    | Rex | |

    | Anni | |

    | Toby | |


    ```sql

    Jesses-Mac-Pro:~ jessefeiler$ sqlite3 sqlitephp.sqlite

    SQLite version 3.8.10.2 2015-05-20 18:17:19

    Enter ".help" for usage hints.

    sqlite> create table users (Name char (128) not null, email char (128));

    sqlite> insert into users (Name, email) VALUES ("Rex", "rex@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Anni", "anni@champlainarts.com");

    sqlite> insert into users (Name, email) VALUES ("Toby", "toby@champlainarts.com");

    sqlite> select rowid, name from users;

    1|Rex

    2|Anni

    3|Toby

    sqlite> create table scores (userid integer, score integer);

    sqlite> insert into scores (userid, score) VALUES (1, 10);

    sqlite> insert into scores (userid, score) VALUES (2, 20);

    sqlite> insert into scores (userid, score) VALUES (3, 30);

    sqlite> select name, score from users, scores where userid = users.rowid;

    Rex|10

    Anni|20

    Toby|30

    sqlite>

    ```


    Upload your database to your web server. It should be visible on your desktop
    in the Finder (OS X) or Start (Windows). In this example, it is uploaded to the
    root of your web site.


    ## PDO vs. Older PHP/SQLite Database Connections'
