- '# 第 4 章：使用关系模型和 SQLite


  你已经看到了如何创建表、向其添加行、向其中插入数据，然后检索数据。诚然，到目前为止涉及的数据量不大，但这些是数据库管理的基础。在此过程中，你已经看到 SQLite（像许多其他库和数据管理器一样）通常嵌入到框架、语言、类或数据库管理系统（`DBMS`）中。如前所述，如今，大多数
  `DBMS` 都是关系数据库管理系统（`RDBMS`）。它们基于 E. F. Codd 于 1970 年首次提出的关系模型，并且通常使用 SQL 或其衍生物（如
  SQLite！）来创建、管理和查询关系数据库。


  你已经看到了如何使用众多 SQLite 图形化编辑器之一（你可以在网上搜索“SQLite editor”，可能还会包含你的操作系统来找到它们）。你也看到了如何直接使用基本的
  SQLite 语法来创建表和处理其数据。本章增加了另一个工具：`sqlite3`，这是一个作为 SQLite 一部分分发的命令行工具。


  > **注意：** 如今大多数数据库都使用关系模型，因此 `DBMS` 和 `RDBMS` 在某种程度上是可互换的术语。本章让你看到什么是*不可互换*的：它仅适用于关系数据库（如
  SQLite）。关系数据库是两个表可以*相关*的数据库。是*表*彼此关联，并且这种关系是基于相关表中的*数据*创建的。因此，尽管本书大部分地方使用了 `DBMS`，但在本章中，因为主题是关系数据，我们使用术语
  `RDBMS`。关系连接两个表，因此为了讨论关系，我们需要从两个表开始。


  随着关系的构建，它们会变得非常复杂（也非常强大）。因此，有些人会回避它们，但没有理由担心。


  本章概述了关系如何工作、为什么应该使用它们以及创建它们是多么容易。关系通常涉及两个或多个表，因此本章首先向你展示如何创建两个逻辑上相关的表。


  然后你将看到如何使用 SQLite 来实际关联它们。（关系实际上可以从单个表关联回自身。这称为*自连接*。）


  ## 构建 Users 表


  考虑在多人游戏中记录分数的情况。你可以基于第 3 章的基础知识来创建一个类似 `SimpleTable` 的表。在这种情况下，表是用于用户的。从数据管理的角度来看，一个包含名字和出生地的表与一个包含名字和电子邮件地址的表差别不大。（主要区别在于第二个表在跟踪游戏分数方面更有用，而这正是本例的重点。）


  当你查看表 4-1 所示的表并将其与 `SimpleTable`（第 3 章中的表 3-1）进行比较时，会看到另一个区别。显式主键（列 `PK`）缺失了。此表使用
  SQLite 内置的机制来为每一行创建一个具有唯一值的主键。请记住这一点，因为我们稍后会回到这一点。


  **表 4-1.** 用户表


  | 姓名 | 电子邮箱 |

  | :--- | :--- |

  | Rex | rex@champlainarts.com |

  | Anni | anni@champlainarts.com |

  | Toby | toby@champlainarts.com |


  > **注意：** 如前所述，在 SQLite 中，除了括号内，大小写无关紧要。按照惯例，SQL 关键字大写。在本书中，表名和列名在文本中通常大写；在示例代码中，它们可能大写也可能不大写，以强化“这对
  SQLite 来说无关紧要”这一事实。在实践中，确定一个要遵循的惯例是一个非常好的主意。这是因为当今许多语言确实能识别大写和小写字母的区别。因此，当你在编写 SQLite
  代码（其中 `UseR`、`user` 和 `USER` 是相同的）和 Swift、Objective-C、Python、C 等其他语言（其中大小写重要）之间切换时，不遵守标准可能会无意中为自己或他人引入错误。（此外，命名和大小写的标准规则使你的代码在未来更易于阅读和维护。）


  这是一个良好的开端，并且你已经在第 3 章中看到了创建此类表的代码。根据修改后的列名和数据，以下是创建和填充该表的方法。


  ```

  sqlite> create table users (

  ...> Name char (128) not null,

  ...> email char (128)

  ...> );

  sqlite> insert into users (Name, email) VALUES ("Rex", "rex@champlainarts.com");

  sqlite> insert into users (Name, email) VALUES ("Anni", "anni@champlainarts.com");

  sqlite> insert into users (Name, email) VALUES ("Toby", "toby@champlainarts.com");

  sqlite> select * from users;

  Rex|rex@champlainarts.com

  Anni|anni@champlainarts.com

  Toby|toby@champlainarts.com

  sqlite>

  ```


  现在你需要相关的表来跟踪分数。


  ## 构建 Scores 表


  构建 `Scores` 表基本上是相同的代码。为了简单起见，你可以让每个用户从零分开始。在这个假设下，代码如下。


  ```

  sqlite> create table scores (

  ...> Name char(128),

  ...> score integer

  ...> );

  sqlite> insert into scores (name, score) VALUES ("Rex", 0);

  sqlite> insert into scores (name, score) VALUES ("Anni", 0);

  sqlite> insert into scores (name, score) VALUES ("Toby", 0);

  sqlite> select * from scores;

  Rex|0

  Anni|0

  Toby|0

  sqlite>

  ```


  表 4-2 显示了此时 `Scores` 表中的数据。



  '
- '# 第四章：使用关系模型与 SQLite


  你可以使用之前用过的语法来检索数据。若要从 `Users` 表中获取 `name` 和 `email` 地址，请使用以下代码：


  ***表 4-2.** 分数表*


  **姓名**


  **分数**


  **Rex**


  **0**


  **Anni**


  **0**


  **Toby**


  **0**


  `sqlite> select name, email from users where name = "Anni";`

  `Anni|anni@champlainarts.com`

  `sqlite>`


  你可以用类似的方式从 `Scores` 表中获取 `score`：


  `sqlite> select name, score from scores where name = "Anni";`

  `Anni|0`

  `sqlite>`


  ## 关联表格


  你需要一种方法在单个 `SELECT` 语句中引用两个表（这就是 *别名* 发挥作用的地方）。你还需要实际实现这种关联，而这又涉及到主键。本节将涵盖这两个主题。


  ### 使用别名在 SELECT 语句中标识多个表


  挑战在于将表格和别名结合起来使用。你需要为 Anni 选择数据，但这里有一个问题：`Scores` 和 `Users` 表都有名为 `Name` 的列。如果你使用
  `where name = "Anni"` 这样的条件，SQLite 将无法知道你指的是哪个 `Name` 列。你可以在 `SELECT` 语句中通过标识列来区分这两个列。具体如何标识并不重要，因此你可以这样写：


  ```

  select a.name, email, score

  from users a, scores b

  where a.name = "Anni" and b.name = "Anni";

  ```


  你为每个表使用了一个 *别名*。在 *FROM* 子句中，别名跟在表名后面；在 *SELECT* 和 *WHERE* 子句中，别名位于表名之前，并用句点与表名分隔。因此，在
  `SELECT` 命令和 `WHERE` 子句中，你得到 `select a.name` 和 `where a.name = "Anni"`，而在 *FROM*
  子句中，你得到 `FROM users a`。


  虽然你可以使用任何想要的别名，但如果使用实际名称或其缩写，可以使代码更易于阅读，如下所示：


  ```

  select users.name, email, score

  from users, scores

  where users.name = "Anni" and scores.name = "Anni";

  ```


  含义明确（只在一个表中出现）的名称不需要别名。


  如果你对数据和数据库有较多工作经验，就会认识到这种结构非常脆弱。一切都依赖于两个表中的名称相同。如果任何地方出现拼写错误，数据就无法匹配。即使没有拼写错误，如果名称更改（由于各种现实原因，这确实会发生）会怎样呢？你可能会得到一些使用早期名称的
  `Scores` 记录和另一些使用后期名称的记录。


  在继续探讨这个问题之前，值得看看 SQLite 已经在幕后做了什么：它将帮助你解决因名称更改而出现的问题。


  ### 使用 `rowid` 主键


  在第 [3 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_3)中，讨论了用于唯一标识表中每一行的 **主键**。


  它们在检索数据时非常有用，尤其是在数据本身可能不正确或由于修订或其他情况而与你认为的情况不同时。如果你没有指定主键，SQLite 已经为每个表中的每一行创建了一个唯一的键。它被称为
  *rowid*，你可以在任何你没有提供主键的表中看到它。对于本节所示的 `Users` 表，你可以使用以下代码访问主键：


  ```

  sqlite> select name, rowid from users;

  Rex|1

  Anni|2

  Toby|3

  sqlite>

  ```


  `Scores` 表的代码显示了其主键。


  ```

  sqlite> select name, rowid from scores;

  Rex|1

  Anni|2

  Toby|3

  sqlite>

  ```


  ## 更改一个表中的名称


  为了更改存储在表一行的数据，你需要使用 `UPDATE` 命令。因此，如果你想将数据库中的 Toby 改为 George，你可以使用如下语法：


  ```

  sqlite> UPDATE scores

  ...> SET name = "George"

  ...> WHERE name = ''Toby'';

  ```



  你开始了解 SQL 是如何工作的了。像 `WHERE` 和 `FROM` 这样的基本子句，其语法是反复使用的。这段语法中唯一的新东西是 `UPDATE` 命令，它接受一个表名。这里的其他内容你都已经见过了。


  如果你尝试重新运行上一节中的查询，你会看到 `Users` 和 `Scores` 表中的数据。


  ```

  sqlite> select * from users;

  Rex|rex@champlainarts.com

  Anni|anni@champlainarts.com

  Toby|toby@champlainarts.com


  sqlite> select * from scores;

  Rex|0

  Anni|0

  George|0


  sqlite>

  ```


  如果实际上 George 和 Toby 是两个不同的人，那么数据对不上是正常的。但如果情况是 Toby 决定现在使用他的中间名 George，那么 George
  和 Toby 实际上是同一个人。如何将 Toby 的所有数据转移到 George 名下呢？


  重新输入或者使用 `UPDATE` 是一种处理方法，但更好的方法是利用 SQLite 内置的主键作为*外键*。


  ### 使用外键


  如果你跟着操作了，就可以使用以下语法看到两个表中的 `rowid` 和 `name` 值。对于 `Users` 表，语法如下。表 4-3 显示了数据。


  ```

  sqlite> select rowid, name from users;

  1|Rex

  2|Anni

  3|Toby

  ```


  #### 表 4-3. Users 表


  | rowid | 名称 | 电子邮箱 |

  | :--- | :--- | :--- |

  | 1 | Rex | rex@champlainarts.com |

  | 2 | Anni | anni@champlainarts.com |

  | 3 | Toby | toby@champlainarts.com |


  对于 `Scores` 表，语法如下：


  ```

  sqlite> select rowid, name from scores;

  1|Rex

  2|Anni

  3|George

  ```


  表 4-4 显示了分数。


  #### 表 4-4. Scores 表


  | rowid | 名称 | 分数 |

  | :--- | :--- | :--- |

  | 1 | Rex | 0 |

  | 2 | Anni | 0 |

  | 3 | George | 0 |


  解决方案是使用一个*外键*。外键是一个表中的值，用于标识另一个表中的行。在这个案例中，你希望 `Users` 表中的 `rowid` 3 (Toby) 用于匹配
  `Scores` 表中的 `rowid` 3 (George)。名称虽然不同（George 和 Toby），但你希望这种关联能够生效，以反映他们是同一个人的两个不同值这一事实。


  > **注意**

  > `rowid` 3 是你想要在两个文件之间建立关联的值，这只是基于这些文件构建顺序的偶然结果。本章后面，你会看到这些数字可以有不同的值，但目前，你看到的可能就是这里显示的相同值。


  解决方案是创建一个新列——在数据库领域中通常被称为 `FK` 或 `Foreign Key`（外键）。有时数据库设计师会根据其来源给它命名，例如 `scorekey`
  或 `scoreid`，以及 `userkey` 或 `userid`。因此，如果你查看 `Scores` 表，可能会看到主键或 `rowid`，以及一个独立的
  `userkey`。如果你把 `Users` 表中的 `rowid` 值作为起点（因为那很可能是第一个被创建的表），那么你希望在 `Scores` 表中有一个匹配的
  `userid` 值。


  要给现有表添加一列，你需要使用 `ALTER TABLE` 命令。你需要指定要修改的表名、要添加的列名以及该列的类型。以下是用于创建一个名为 `userid`
  的新列的语法：


  ```sql

  ALTER TABLE Scores ADD COLUMN userid integer;

  ```


  要查看此命令的结果，请在 `sqlite3` 中使用 `.schema` 命令。（因为它是一个 `sqlite3` 命令，所以以句点开头，并且末尾不需要分号。该命令接受一个参数，即你想要查看的表名。）如果你现在运行它，结果如下。你会看到
  `userid` 已经被添加进去了。


  ```

  sqlite> .schema scores

  CREATE TABLE scores (Name char(128),

  score integer

  , userid integer);

  sqlite>

  ```


  现在，你需要为你刚刚添加到 `Scores` 表中的 `userid` 列输入数据。`Scores` 表中的 `userid` 值应该是 `Users` 表中对应记录的值。目前它们碰巧是相同的，但你很快就会改变它们。


  以下是为 `Scores` 表中的 `rowid` 输入数据的语法。基本上，这与你将名称从 Toby 更改为 George 的方式相同。




  sqlite> `update scores set userid = 1 where name = ''Rex'';`


  sqlite> `update scores set userid = 2 where name = ''Anni'';`


  sqlite> `update scores set userid = 3 where name = ''George'';`


  目前，只需验证 `Scores` 表中的数据是否如这里所示（无论是在 SQLite 中，还是在表 4-5 中）。


  sqlite> `select rowid, userid, name, score from Scores;`


  1|1|Rex|0

  2|2|Anni|0

  3|3|George|0


  sqlite>


  **表 4-5.** 添加了用户 ID 的 Scores 表


  | 行 ID | 用户 ID | 姓名 | 分数 |

  |-------|--------|------|-------|

  | Rex   | Anni   | George |       |


  ## 第 4 章 ■ 处理关系模型与 SQLite


  此表中的姓名不再具有关联意义，因为 `Scores` 表和 `Users` 表之间的关系是基于 `Users` 表的 `rowid` 与 `Scores` 表的
  `userid` 相匹配而建立的。在 SQLite 中，`ALTER TABLE` 命令不允许你删除列：推荐的解决方法是删除旧表并创建一个新表（在许多情况下，更合适的方法是导出数据，导入到新表，然后删除旧表）。因此，目前你可以忽略
  `Scores` 表中的 `Name` 列。从你的角度看，`Scores` 表可以如表 4-6 所示（尽管在实际表中仍存在一个不再需要的列）。


  **表 4-6.** 添加了用户 ID 并忽略姓名的 Scores 表


  | 行 ID | 用户 ID | 分数 |

  |-------|--------|-------|

  |       |        |       |


  ## 连接表


  获取所需数据最简单的方法是使用 `WHERE` 子句来指定你需要 `users.rowid` 与 `scores.userid` 相匹配的数据。（请记住，当你没有提供主键时，SQLite
  会自动创建 `users.rowid`，但你必须将适当的 `users.rowid` 值输入到 `scores.userid` 列中，才能使关系生效。）


  如果你已经这样做了（并且如果你遵循了本章的步骤，那么你已经做到了），那么下面的代码将给出你想要的结果：


  sqlite> `select users.name, scores.score from users, scores where users.rowid =
  scores.userid;`


  Rex|0

  Anni|0

  Toby|0


  sqlite>


  这里有几点需要注意：


  - 姓名来自 `Users` 表；`Scores` 表中的 `Name` 字段不再使用。因此，即使你可能在 `Scores` 表中仍然有 George 这个名字，`userid`
  为 3 的记录（最初对应的是 Toby）也会显示为 George（假设这是同一个人，只是名字被正确更改了）。

  - 只显示匹配的记录。向 `Users` 或 `Scores` 表添加一些新记录：除非 `Users` 表中的 `rowid` 与 `Scores` 表中的 `userid`
  匹配，否则它们不会显示。

  - 如果 `Scores` 表中的某条记录没有 `userid`，它将不会显示。


  ## 第 4 章 ■ 处理关系模型与 SQLite


  ### 小结


  你可以在此通用结构的基础上，通过添加更多数据来扩展。尝试组合使用新记录，以及用户和分数的匹配与非匹配 ID。


  为一个现有用户添加一条 `Scores` 记录，使得一个人有两条记录，但姓名来自 `Names` 表是正确的。


  在第 [5](http://dx.doi.org/10.1007/978-1-4842-1766-5_5) 章中，你将探索更多增强 `SELECT` 语句的方法。


  ## 第 5 章 使用 SQLite 功能——SELECT 语句能做什么


  `SELECT` 语句的功能远不止获取数据。除了连接子句（在第 [4](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)
  章中简要讨论过），你还可以对数据进行排序和分组，并提供中间表来进行类似于子查询的操作。如果你习惯于*过程式编程*（描述过程的每个步骤……做这个……做那个……如果这个为真则做另一件事否则做那件事……），你可能会注意到
  SQL 和关系数据库鼓励你用*声明式编程*的思维方式来思考（获取所有是 X 的东西，对所有 X 做某事……）。


  当你在声明式编程的世界里工作时，你能放入声明中的东西越多，你就越有利。用英语来说，这意味着以下所有内容：


  -   与其编写代码来测试有效数据，不如尝试在数据库或框架中强制执行验证规则。（Xcode Core Data 模型编辑器将此推向了图形化的极限。）



  '
- '# 使用 SQLite 的 SELECT 语句功能


  ## 概述：采用声明式思维


  与其循环遍历数据集中的每个项目并测试值以决定采用哪个过程分支，不如获取所有的 X 并对它们执行操作。（实际上，你是将 `if` 语句移入了 `SELECT` 语句中。）


  本章探讨了许多可以改进你代码的 SQL 子句。请记住，实际上你是在编写一些函数式代码，但以声明式的方式进行，从而达到声明式的目标：对组内（或 `SELECT`
  结果中）的每个项目执行相同的操作。


  你还将学习如何在 SQLite 语句中使用变量。这可以显著提升你的 SQLite 性能。这个概念在 PHP、Android 和 Core Data 中都有实现，更不用说在许多常见数据库中了。


  ## 查看测试数据


  本章的示例中使用了一些测试数据。这些数据实际上是在测试第 12 章的 Score 应用程序时生成的。所使用的表是 `Score`，用到的值包括 `rowid`（主键）、`userid`（用户编号，外键）和
  `score`（具体分数）。一个给定的用户可以有多个分数，但每个 `user` 和 `rowid` 是唯一的。


  以下是使用的基本数据：


  ```

  sqlite> select rowid, userid, score from Score;

  1|1|10

  2|2|20

  3|3|30

  4|1|99

  5|1|99

  6|1|9

  7|1|99

  8|1|99

  9|1|17

  10|1|31

  11|1|23

  12|1|50

  24|2|16

  25|3|8

  26|2|99

  27|1|3

  sqlite>

  ```


  ## 排序使数据更易用


  行号是有序的，但要以有意义的方式查看数据，按如下方式排序是合理的：


  ```

  sqlite> select rowid, userid, score from Score order by userid;

  1|1|10

  4|1|99

  5|1|99

  6|1|9

  7|1|99

  8|1|99

  9|1|17

  10|1|31

  11|1|23

  12|1|50

  27|1|3

  2|2|20

  24|2|16

  26|2|99

  3|3|30

  25|3|8

  sqlite>

  ```


  ## 分组可整合数据


  当你对数据进行分组时，会将每个组值的数据合并为单个项。


  如果你想查找 `score` 的最大值，可以使用以下代码：


  ```

  sqlite> select max(score) from Score;

  ```


  > **注意** 在本例和其他示例中，请随时参考基本数据列表以理解结果。


  如果对数据进行分组，你可以获得每个 `userid` 的最大值，如下所示：


  ```

  sqlite> select userid, max(score) from Score group by userid;

  1|99

  2|99

  3|30

  sqlite>

  ```


  生活不仅仅关乎最大值和最小值：SQLite 还能帮你找到中间值（平均值）。如果这些分数代表团队而不是用户，那么根据平均分获胜的将是第 1 队：


  ```

  sqlite> select userid, avg(score) from Score group by userid;

  1|49.0

  2|45.0

  3|19.0

  sqlite>

  ```


  下次当你想写循环来计算平均值或查找最大值、最小值时，请记住 `group by`。事实上，如果你在使用像 SQLite 这样支持 SQL（即使是比 SQLite
  更基础、功能更弱的 SQL）的关系数据库，下次当你开始写循环来处理查询结果时，试着问问自己：“我能否在查询内部完成这个操作？”


  ## 在查询中使用变量


  在第 6 章中，你将看到如何在 PHP 数据对象（PDO）中使用 SQLite。它在你的 PHP 代码中是一个单例对象，但它绝对是一个拥有自身方法的对象。正如你将在下一章看到的，查询数据库的过程包括使用四个方法。


  - `new PDO` 创建 PDO 并连接到你的 SQLite 数据库。

  - `prepare` 以你的 SQLite 查询作为其参数。

  - `execute` 执行查询。

  - `$query->fetchAll` 从查询中检索数据。


  还有一个简单的 `query()` 调用，它一步完成查询的创建和执行。


  许多数据库支持这种流程——创建可重复使用的查询，以及创建一次性运行的查询。当你意识到可以在查询内部创建变量时，逐步创建、准备和执行查询的过程的优势就变得清晰了。


  因此，可用于从用户表中获取所有名字的基本查询可以是：

  `$query = $sqlite->prepare("select * from users;");`


  检索具有特定 `name` 值的记录的查询可以是：

  `$query = $sqlite->prepare("select * from users where Name = ''Rex'';");`

  此时，使用一步完成“准备”和“执行”的调用似乎更容易：

  `$query = $sqlite->query("select * from users where Name = ''Rex''");`


  然而，如果你使用变量，独立语句的威力和效率就会变得清晰。这里有一个例子。从 `new PDO` 和 `prepare` 开始，但在查询中使用一个变量，如 `:name`。


  ```

  $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');

  $query = $sqlite->prepare("select * from users where name = :name;");

  ```


  你不必立即使用 `$query`，但当你决定使用它时，可以用如下代码为 `:name` 填充值：

  `$query->bindValue('':name'', "Rex");`


  或者，如果你想使用一个变量：

  ```

  $theName = "Rex";

  $query->bindValue('':name'', $theName);

  ```


  然后执行查询：

  `$query->execute()`


  你可以在稍后更改绑定的值并重新执行查询：

  ```

  $query->bindValue('':name'', "Anni");

  $query->execute()

  ```


  这个过程节省了一些内存，并且效率高得多。查询可以在缺失数据尚未存在时进行准备，这样当你回来执行它时，需要做的工作就少得多。


  ## 总结


  在本章中，你看到了一些可以在 SQLite 的 `SELECT` 语句中使用的额外技巧。任何可以移入查询中的操作，都意味着你需要编写和调试的代码会少一些。


  有了这些背景知识，现在是时候学习在 PHP、Android 和 OpenDoc 中使用 SQLite 了。它们完成相同的事情，但方法略有不同。


  保持不变的是 SQLite。


  '
- '# 使用 PHP 操作 SQLite


  SQLite 以及 SQL 本身的基础很简单。这是一个重复的流程：为表中的每个数据元素创建列来定义表。然后为每一行在每个列中添加值。你可以使用基本的 `SELECT`
  语句从单个表中检索数据。通过使用 `WHERE` 子句将一个表中的值与另一个表（或在自连接的情况下是同一个表）中的相应值进行匹配，来连接两个表。


  SQL 及其所有实现（包括 SQLite）的复杂性来自于这些基本构建块的组合。此外，我们经常处理非常大的表（数百万甚至数十亿行）也是增加复杂性的因素，但基础是简单的。


  > **注意** SQLite 的单个数据库限制是 140TB，这个限制往往在行数成为问题之前就达到了。sqlite.org 有一个关于限制的页面：[www.sqlite.org/limits.html](http://www.sqlite.org/limits.html)。它指出这些限制在很大程度上未经测试，部分原因是
  SQLite 开发人员无法访问能够管理如此大数据量的硬件。如果你真的考虑管理如此大量的数据，你可能需要对硬件和软件解决方案进行认真的分析，但请记住，无论你最终选择什么解决方案，SQLite
  都可以成为一个完美的原型设计工具。


  '
- "# 在 PHP 中使用 SQLite\n\nSQLite 本身非常轻量级：在许多情况下，它对用户及其设备造成的负担极小。这种简洁结构与轻量级实现的结合，使得\
  \ SQLite 成为网站中使用的流行工具。由于它是单用户实现，常用于存储单个用户的数据，但正如之前提到的，它也可以用来为使用任何更强大 SQL 实现构建的大型系统进行原型设计。\n\
  \n无论你正在进行单用户项目还是为更大规模的系统制作原型，SQLite 都是一个不错的选择，并且它与 PHP 配合得很好。本章将简要概述（或回顾）PHP；然后展示如何使用\
  \ PHP 在网页上实现[第 3 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_3)和[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中所示的基本表。\n\
  \n> **注意** 本章重点介绍 `php`/SQLite 集成的基础知识。关于如何在一系列网页中使用的示例，请参见[第 11 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_11)。为了测试本章的代码，你需要一个基本的文本编辑器——最好是像\
  \ BBEdit 这样的编辑器，它能为你高亮显示语法，以便轻松发现小错误。你还需要一个服务器来上传你的 `php` 文件以及一个 SQLite 数据库。如果你正在维护一个网站，你会拥有访问这样一个服务器的权限来发布你的\
  \ `html` 页面。服务器上可能安装了也可能没有安装 `php`。大多数服务器都有，但出于安全原因，有些会限制访问。如果你遇到任何困难，请咨询你的服务器管理员。\n\
  \n### 为 PHP 定义“单用户”\n\nSQLite 是为单用户设计的。它常与 `php` 一起用于实现网站。这是否意味着你的 `php`/SQLite\
  \ 网站是为单用户设计的？\n\n答案是“是的”，但细节可能会让你感到惊讶。当你在网页中使用 `php` 时，存在一个单一用户——那就是 Web 服务器。根据你的应用程序不同，SQLite\
  \ 可能是一个好选择，也可能不是（但对于原型设计和测试来说，它几乎总是一个好选择）。静态数据库在大多数情况下如果数据量不大，都能很好地工作。\n\n如果你的应用需要更新数据库，并且使用\
  \ SQLite，当用户数量稍多时（这也取决于用户更新数据的频率），你可能会很快遇到麻烦。\n\n## 将 PHP 与 SQLite 结合：基础知识\n\n`PHP`\
  \ 可能是使用最广泛的服务器端编程语言。严格来说，它是一种脚本语言，这意味着它在运行时（在实际应用中，通常指网页加载时）被解释执行。在这种场景下，`PHP` 脚本的输出通常是一个网页。当\
  \ `PHP` 脚本运行时，它可以执行各种各样的操作，包括与其他进程和设备通信，在 SQLite 的上下文中，它可以与驻留在 Web 服务器上的 SQLite\
  \ 数据库进行通信。\n\n## 验证你的环境中的 PHP\n\n首先验证你的服务器上是否安装了 `PHP`，并且你可以访问它。（如果你已经使用 `PHP` 处理网站或其他文件，可以跳过此步骤。）\n\
  \n下面是一个简单的基于 `PHP` 的网页代码。它只是请求在服务器上显示当前的 `PHP` 状态信息。如果它不起作用，请咨询你的管理员，因为如果缺少 `PHP`\
  \ 部分，你将无法试验 SQLite 和 `PHP`。除了 `PHP`，你可能还需要验证服务器上是否可用 SQLite，但在许多（可能是大多数）情况下都是可用的。\n\
  \n> **警告** 与 SQLite 不同，`php` 是大小写敏感的，所以请注意你的大小写。这也是一个很好的理由，在你的 SQLite 代码中标准化使用区分大小写的列名，尽管这对\
  \ SQLite 来说无关紧要。当你开始用 `php` 操作数据时，大小写就会很重要了。\n\n这是用于测试 `PHP` 的示例代码。粗体部分是 HTML 代码中的\
  \ `PHP` 代码——它由 `<?PHP` 和 `?>` 界定。它只是调用了 `phpinfo()` 函数。将此代码放在你服务器上的一个文件中。这个文件应该具有\
  \ `php` 扩展名（通常是小写，但在许多服务器上大小写无关紧要）。如果你将其命名为 `test.php` 并上传到你网站的根目录（大多数情况下与 `index.html`\
  \ 或 `index.php` 在一起），你可以通过访问 [`mywebsite/test.php`](http://mywebsite/test.php) 来访问它——包括运行其中嵌入的\
  \ `PHP` 代码。\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<title>Chapter6</title>\n\
  <meta name=\"generator\" content=\"BBEdit 11.1\" />\n</head>\n<body>\n<?PHP\nphpinfo();\n\
  ?>\n</body>\n</html>\n```\n\n### 准备 SQLite 数据库\n\n你可以使用几乎任何 SQLite 命令配合 `PHP`，但在实践中，最常用的命令是那些管理已存在表中数据的命令。在某些环境中，它可能是一个空表，当用户访问你的网站时，由你的网站填充数据。\n\
  \n以下是准备[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中使用的一对数据库的代码。它们将在本章中再次使用。有几部分值得特别注意。它们以粗体显示。\n\
  \n*   在此示例中，使用名为 `sqlitephp.sqlite` 的数据库启动 `sqlite3`。如果它不存在，`sqlite3` 会创建它。通常，使用\
  \ `.sqlite` 或 `.db` 作为扩展名。（如果你使用自己的扩展名，在上传到网站时可能会遇到问题。）\n*   创建了 `Users` 表。注意 `Name`\
  \ 列不能为空——你必须有一个名字。[第 4 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_4)中使用过的数据被填入。（这里显示为表\
  \ 6-1。）\n*   创建表并插入数据后，使用 `SELECT` 语句显示数据。注意明确请求了 `rowid`：典型的 `SELECT *` 会显示除像 `rowid`\
  \ 这样的隐藏列之外的所有列。\n*   你需要看到 `rowid` 值以便将它们插入 `Scores` 表中。`insert` 语句将 `rowid` 值插入\
  \ `Scores` 表，以便可以使用这种关系。表 6-2 显示了 `Scores` 表。\n*   最后，一个 `SELECT` 语句使用来自 `Users`\
  \ 和 `Scores` 表的数据，通过 `rowid`（用户表）与 `userid`（分数表）相关联，显示了姓名和分数。表 6-3 显示了数据。\n\n完整的\
  \ `sqlite3` 代码如下所示。\n\n**表 6-1.** 用户表\n\n| **rowid** | **Name** | **E-mail** |\n\
  | :--- | :--- | :--- |\n| 1 | Rex | rex@champlainarts.com |\n| 2 | Anni | anni@champlainarts.com\
  \ |\n| 3 | Toby | toby@champlainarts.com |\n\n**表 6-2.** 分数表\n\n| **userid** | **Score**\
  \ |\n| :--- | :--- |\n| 1 | 10 |\n| 2 | 20 |\n| 3 | 30 |\n\n**表 6-3.** 关联的用户与分数表\n\
  \n| **Name** | **Score** |\n| :--- | :--- |\n| Rex | 10 |\n| Anni | 20 |\n| Toby\
  \ | 30 |\n\n```sql\nJesses-Mac-Pro:~ jessefeiler$ sqlite3 sqlitephp.sqlite\nSQLite\
  \ version 3.8.10.2 2015-05-20 18:17:19\nEnter \".help\" for usage hints.\nsqlite>\
  \ create table users (Name char (128) not null, email char (128));\nsqlite> insert\
  \ into users (Name, email) VALUES (\"Rex\", \"rex@champlainarts.com\");\nsqlite>\
  \ insert into users (Name, email) VALUES (\"Anni\", \"anni@champlainarts.com\");\n\
  sqlite> insert into users (Name, email) VALUES (\"Toby\", \"toby@champlainarts.com\"\
  );\nsqlite> select rowid, name from users;\n1|Rex\n2|Anni\n3|Toby\nsqlite> create\
  \ table scores (userid integer, score integer);\nsqlite> insert into scores (userid,\
  \ score) VALUES (1, 10);\nsqlite> insert into scores (userid, score) VALUES (2,\
  \ 20);\nsqlite> insert into scores (userid, score) VALUES (3, 30);\nsqlite> select\
  \ name, score from users, scores where userid = users.rowid;\nRex|10\nAnni|20\n\
  Toby|30\nsqlite>\n```\n\n将你的数据库上传到你的 Web 服务器。它应该在你的桌面 Finder（OS X）或“开始”菜单（Windows）中可见。在此示例中，它被上传到你网站的根目录。\n\
  \n### PDO 与旧版 PHP/SQLite 数据库连接\n\n\n## 连接到你的 SQLite 数据库\n\n连接 SQLite 到你的数据库主要有两种方式。较旧的方式是过程式风格，而较新的方式（自那遥远的\
  \ 2005 年起）是基于对象的。PDO 扩展（PHP 数据对象）在大多数情况下都更稳健，是更好的选择，除非你需要修改那些以旧式风格访问 SQLite 数据库的旧\
  \ PHP 代码。\n\n如果你对使用面向对象编程有所顾虑，请放心，`PDO` 确实是面向对象的，但它与标准 PHP 代码配合得非常好。你不需要将所有代码都转换为对象和类：你可以将\
  \ `PDO` 用于你的 SQLite 数据库，并且，除非你特意寻找，否则你甚至可能不会意识到你正在使用一个对象。\n\n`PDO` 是 SQLite 的一个扩展，但这个扩展已内置在当前版本中；事实上，你需要刻意努力才能让它不可用。本节将对其进行描述，虽然你可能会在网上的各种地方找到示例代码，但请记住\
  \ `PDO` 至今已有十多年历史，并且是当前版本。你可能会在使用旧式代码打开较旧的 SQLite 数据库时遇到困难。（如果你在查阅的代码中发现 `sqlite_open`，那就是较旧的——非\
  \ `PDO`——风格。）\n\n这个过程涉及五个步骤，我们稍后将详细讨论。\n\n1.  **创建一个新的 PDO 实例**。它包含你想要连接的数据库的名称。\n\
  2.  **创建一个查询**。通常将其放在一个名为 `$query` 的变量中，但你可以使用任何名称。通过调用你的 `PDO` 实例上的 `prepare` 方法来创建查询。如果成功，它会返回一个\
  \ `PDOStatement` 对象。\n3.  **执行查询**。你通过在你刚刚创建的查询（`PDOStatement`）上调用 `execute` 方法来完成，如\
  \ `$query->execute()`。它会返回 `TRUE` 或 `FALSE`，但（目前）不会返回任何值给你。\n4.  **从执行后的查询中获取结果**。（现在你拥有数据了。）数据通常存储在一个名为\
  \ `$results` 的数组变量中。你可以使用 `$query->fetch()` 来获取下一行结果。你可以使用 `$query->fetchAll()`\
  \ 来获取所有结果的一个数组。选择哪种方法取决于你以及你的具体需求（以及你预期检索多少数据）。默认情况下，获取的结果是一个关联数组，元素由 SQL 列名标识。\n\
  5.  **使用你准备、执行并获取的查询结果**。\n\n以下是每个步骤的细节。\n\n你从一个 PHP 文件开始，你将使用此处显示的五个步骤通过该文件访问你的\
  \ SQLite。如果你将此文件命名为 `phpsql.php` 并将其上传到你的网站，你可以通过 `http://mywebsite/phpsql.php`\
  \ 访问它。完整的文件将在本章后面展示。\n\n以下是相关组件的详细说明。\n\n## 1. 创建一个新的 PDO 对象\n\n创建一个新的 `PDO` 对象并将其放入一个局部变量中。通常，该变量名为\
  \ `$sqlite`，但你可以使用任何名称。创建新的 `PDO` 对象时，必须传入 SQLite 文件的名称，包括相对于服务器上你的 PHP 文件位置的任何路径。引号内的名称以数据源名称（DSN）`sqlite:`\
  \ 开头。这是包含文件位置的引号字符串的一部分。\n\n以下是一个例子：\n```php\n$sqlite = new PDO('sqlite:sqlitephp.sqlite');\n\
  ```\n\n你还可以使用另一种风格。对你（以及将来修改你代码的人）来说，这种风格可能更清晰，也可能不会。这两种风格是可以互换的。\n```php\n$db =\
  \ 'sqlite:sqlitephp.sqlphpproject';\n$sqlite = new PDO($db);\n```\n\n> **注意** 还有其他\
  \ DSN 字符串，包括 `mysql`、`pgsql`（postgres）、`msql`、`sybase` 或 `dblib`（SQLServer 或 Sybase）、`odbc`、`ibm`（IBM\
  \ DB2）、`informix`、`firebird`（Firebird 或 Interbase）。\n\n#### 正确处理错误\n\n为了你的用户（以及你在调试时），优雅地处理错误是一个好习惯。`or\
  \ die` 子句在非常基础的层面上做到了这一点。你提供一个将被显示的字符串。在 PHP 代码生成网页的情况下，引号内的字符串可以包含 HTML 格式，如下例所示：\n\
  ```php\n$sqlite = new PDO('sqlite:sqlitephp.sqlite')\nor die (\"<h1>无法打开数据库</h1>\"\
  );\n```\n\n出于调试目的，当 `or die` 没有失败时，你可能仍想提供一条诊断信息。你总可以在投入生产之前删除这些信息，但它们将帮助你跟踪每一步，查看其是否成功。\n\
  ```php\necho \"<p>PDO 成功</p>\";\n```\n\n最终，最好使用 `try/catch` 块，但 `or die` 更简洁，并在本书中用于简化代码。\n\
  \n### 2. 创建并准备查询\n\n你使用的查询与你在任何其他环境中（如 `sqlite3` 交互式编辑器）直接使用的查询相同。与 `PDO` 的唯一区别在于，你在使用查询之前先创建它。\n\
  \n以下是一个创建查询、将其存储在变量中并捕获失败以及记录成功（后者仅用于调试）的例子。注意，你必须在你创建的 `PDO` 实例上调用 `prepare` 方法——本例中是\
  \ `$sqlite`。\n```php\n$query = $sqlite->prepare (\"select Name from users;\")\n\
  or die (\"<h1>无法准备</h1>\");\n\necho \"<p>准备成功</p>\";\n```\n\n### 3. 执行查询\n\n现在你已经通过\
  \ `PDO` 实例的 `prepare` 方法创建了一个查询，你可以在该查询上调用 `execute` 方法来实际运行它。像往常一样，捕获错误，并在调试时打印出成功信息。以下是代码。请注意，在此示例中，`or\
  \ die` 子句没有使用任何特定的 HTML 格式。这只是为了向你展示两种方式都可以实现。\n```php\n$query->execute() or die\
  \ (\"无法执行\");\n\necho \"<p>执行成功</p>\";\n```\n\n### 4. 获取结果\n\n`execute` 方法返回 `TRUE`\
  \ 或 `FALSE`，但在你获取它之前数据不可用。（如果你以前使用过其他数据库，你会认出这种模式。）你可以使用 `fetchAll` 一次性获取所有行，或者使用\
  \ `fetch` 单独获取每一行。\n\n`fetch` 版本一次获取一行。默认情况下，它将结果集的下一行作为一个数组返回，该数组既按列名索引，也按一个反映你的\
  \ SQLite `SELECT` 语句中项目的、从零开始的列号索引。还有一个可选的 `$cursor_offset` 参数，允许你在结果集中跳转。\n\n`fetchAll`\
  \ 版本一次性获取所有数据作为一个数组。你将在下一步中看到 `fetchAll` 和 `fetch`。\n\n### 5. 使用结果\n\n你在代码中循环遍历返回的数组元素。无论哪种情况，你都在\
  \ PHP 代码中 `echo` 结果值，将返回的值与你想要使用的任何 HTML 结合起来。例如，在 `fetchAll` 场景中，你循环遍历返回的每一行，将每一行放入一个局部变量中（通常称为\
  \ `$row`，但你可以使用任何名称）。\n\n以下是相关的获取和循环代码。（它引用了先前在表 6-1 中显示的 `Users` 表。）\n```php\n\
  $result = $query->fetchAll() or die (\"无法 fetchAll\");\n\necho \"fetchAll 成功 \"\
  ; // 用于调试\n\nforeach ($result as $row) {\n    echo \"<p>姓名: {$row['Name']}</p>\"\
  ;\n}\n```\n\n将本章所有步骤组合在一起，你可以得到一个如下所示的 PHP 文件。请记得为你的数据库名称和你想要显示的列名进行定制。需要定制的代码以粗体显示。\n\
  \n> **注意** 为你想要创建的页面定制 HTML，但也请参阅第 11 章，其中添加了更多与 SQLite 配合良好的常用 HTML 代码。\n```php\n\
  <html>\n<head>\n</head>\n<body>\n<?php\n$sqlite = new PDO('sqlite:**sqlitephp.sqlite**')\n\
  or die (\"<h1>无法打开数据库</h1>\");\n\necho \"<p>PDO 成功</p>\";\n\n$query = $sqlite->prepare\
  \ (\"select Name from users;\")\n```\n\n\n```\n否则终止 (\"<h1>无法准备</h1>\");\n\necho\
  \ \"<p>准备成功</p>\";\n\n$query->execute() or die (\"无法执行\");\n\necho \"<p>执行成功</p>\"\
  ;\n\n$result = $query->fetchAll() or die (\"无法获取所有结果\");\n\necho \"成功获取所有结果 \";\n\
  \nforeach ($result as $row) {\n\necho \"<p>\".$row['Name'].\"</p>\";\n\n}\n\n?>\n\
  \n</body>\n\n</html>\n```\n\n"
- '# 第 6 章 ■ 在 PHP 中使用 SQLite


  ## 总结


  本章展示了连接到 SQLite 数据库所涉及的基本步骤。


  1.  指定要使用的数据库。

  2.  创建用于检索数据的查询。

  3.  运行查询。

  4.  从查询结果中获取数据。

  5.  在代码中使用结果。


  这些步骤适用于 SQLite，但也适用于你用来检索 SQLite 数据的其他语言和框架（有时术语略有不同，语法肯定不同）。此外，这些相同的基本步骤也适用于 SQLite
  以外的数据库。这是从数据库检索数据的基本范式。


  后续章节将展示如何使用 PHP 以外的其他语言来建立 SQLite 数据库连接。


  '
- '# 第 7 章 ■ 在 Android/Java 中使用 SQLite


  部分原因是其轻量级且属于公共领域，SQLite 是许多对空间、功耗和成本有约束的项目的明显选择。由于这些及其他原因，它被内置到各种操作系统中，并在许多设备上使用。


  本章向你展示在 Android 中使用 SQLite 的一些关键要素。


  它被内置在 `android.database.sqlite` 中，因此你可以直接使用。使用 SQLite 的基础知识是相同的，无论你是使用 PHP 构建网站（参见第[6](http://dx.doi.org/10.1007/978-1-4842-1766-5_6)章和第[10](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)章），还是在
  iOS 或 OS X 上使用 Core Data（参见第[8](http://dx.doi.org/10.1007/978-1-4842-1766-5_8)章和第[12](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)章）。


  ## 将 SQLite 与任何操作系统、框架或语言集成


  无论你使用什么开发平台，将 SQLite 集成到你的应用程序中总是相同的（实际上，这适用于任何数据库）。


  1.  设计你的数据库。这不是 SQLite 特有的问题。请参阅旁注，“关键的数据库设计步骤”。

  2.  在运行时将你的应用程序连接到数据库。

  3.  使用连接来添加、删除、插入或更新数据。

  4.  在你的应用程序中使用操作结果。这可能包括通过添加或删除项目来刷新界面，或者可能包括处理新项目中的数据，或你和用户所需的任何其他内容。这不是 SQLite
  特有的问题。


  ## 第 7 章 ■ 在 Android/Java 中使用 SQLite


  ### 关键的数据库设计步骤


  第一步几乎与你的开发环境无关。识别你的数据、弄清楚关系并定义验证规则，只需要思考、讨论和对数据库进行一些草图绘制。此步骤的一个关键部分是为组件命名（是“Client”、“User”还是“Customer”），以便最终用户以及开发和维护代码的人员能够理解发生了什么。对于任何依赖数据的应用程序（无论是关系数据库、键值存储还是平面文件）的开发来说，这都是一个关键且经常被忽视的方面。本书专注于
  SQLite，但如果你不熟悉数据管理的概念和可用的设计工具，请确保至少快速达到基本水平。


  在将 SQLite 与 PHP、Android/Java 以及用于 iOS 和 OS X 的 Core Data 集成方面，存在某种递进关系。使用 PHP 时，你通常处理非常可见的
  SQLite 代码，正如你将看到的，它大部分通常是过程式代码。当你使用 Core Data 时，你将使用面向对象的代码，框架及其类在幕后使用 SQLite 代码：你很少直接编写
  SQLite 代码，但你一直在使用它。Android 和 Java 则取了一个中间地带，因此 SQLite 代码比在 Core Data 中更可见，但不如使用
  PHP 时那么可见。


  尽管有面向对象的 PHP 代码编写方式，但大体上你是在过程式环境中工作。然而，在当今世界，将 PHP 与数据库集成的推荐最佳实践是使用 PHP 数据对象（`PDO`）扩展。这是一个面向对象的类，它封装了你需要用来处理数据库的代码。它有针对
  SQLite 和其他主要数据库的版本，因此你的 `PDO` 代码相对容易移植。


  第[6](http://dx.doi.org/10.1007/978-1-4842-1766-5_6)章向你展示了在 PHP 中使用 SQLite 的编码基础。以下是步骤总结。这只是一个总结。在实践中，你将充实
  `foreach` 循环，并且可能会用 `try`/`catch` 块替换 `or die`。


  ```

  $sqlite = new PDO(''sqlite:sqlitephp.sqlite'');


  $query = $sqlite->prepare (...SQLite 查询...);


  $query->execute() or die ("无法执行");


  $result = $query->fetchAll() or die ("无法获取所有结果");


  foreach ($result as $row) {


  ...处理每一行结果


  }

  ```


  ## 使用 Android 和 SQLite


  Android 的 NotePad 示例是展示 SQLite 与 Android 集成的绝佳例子。你可以从 [`android.googlesource.com/platform/development/+/05523fb0b48280a5364908b00768ec71edb847a2/samples/NotePad/src/com/example/android/notepad/NotePadProvider.java`](https://android.googlesource.com/platform/development/+/05523fb0b48280a5364908b00768ec71edb847a2/samples/NotePad/src/com/example/android/notepad/NotePadProvider.java)
  下载它。


  该示例中的 `NotePadProvider` 代码扩展了 `ContentProvider`，后者封装了你需要的基本 SQLite 功能。这是你自己的应用程序中需要的那种代码。你可以阅读代码，但这里有一些需要注意的关键点。你需要在自己的应用程序中用你自己的值和字符串（比如你的列名、表名和数据库名）来实现它们。


  ### 使用静态值


  如果你是这个环境的新手，你可能需要做一点搜索来找到使用的众多静态变量。这里有一个快速指南，告诉你它们可能在哪里。


  #### 静态值可能在 API 中


  `android.provider.BaseColumns` API 被 Android 系统中的内容提供者广泛使用。结构化数据在整个 Android 和许多其他操作系统中被使用（Cocoa
  和 Cocoa Touch 的表类提供了有些类似的功能）。在示例代码中，来自 `BaseColumns` 的两个静态值被频繁使用。两者都是字符串。`_COUNT`
  是目录中的行数，`_ID` 是行的唯一 ID。


  #### 静态值可能在导入的文件中。


  `NotePad.java` 包含 `NotePad` 类。该类本身包含 `NoteColumns` 类。


  它包含以下静态值（以及其他）：


  ```

  public static final String TITLE = "title";

  public static final String NOTE = "note";

  public static final String CREATED_DATE = "created";

  public static final String MODIFIED_DATE = "modified";

  ```


  #### 静态值可能在主文件中


  '
- "# 第 7 章 ■ 在 Android/Java 中使用 SQLite\n\n以下是`NoteBookProvider.java`文件中`NoteBookProvider`类的一些静态值。\n\
  \n```java\nprivate static final String TAG = \"NotePadProvider\";\n\nprivate static\
  \ final String DATABASE_NAME = \"notepad.db\";\n\nprivate static final int DATABASE_VERSION\
  \ = 2;\n\nprivate static final String NOTES_TABLE_NAME = \"notes\";\n\nprivate static\
  \ HashMap<String, String> sNotesProjectionMap;\n\nprivate static HashMap<String,\
  \ String> sLiveFolderProjectionMap;\n\nprivate static final int NOTES = 1;\n\nprivate\
  \ static final int NOTE_ID = 2;\n\nprivate static final int LIVE_FOLDER_NOTES =\
  \ 3;\n\nprivate static final UriMatcher sUriMatcher;\n```\n\n## 扩展 SQLiteOpenHelper\n\
  \n你需要声明一个继承自`SQLiteOpenHelper`的类，并实现自己的`onCreate`函数。以下是示例中你需要使用的代码：\n\n```java\n\
  private static class DatabaseHelper extends SQLiteOpenHelper {\n\n    DatabaseHelper(Context\
  \ context) {\n        super(context, DATABASE_NAME, null, DATABASE_VERSION);\n \
  \   }\n\n    @Override\n    public void onCreate(SQLiteDatabase db) {\n        db.execSQL(\"\
  CREATE TABLE \" + NOTES_TABLE_NAME + \" (\"\n                + NoteColumns._ID +\
  \ \" INTEGER PRIMARY KEY,\"\n                + NoteColumns.TITLE + \" TEXT,\"\n\
  \                + NoteColumns.NOTE + \" TEXT,\"\n                + NoteColumns.CREATED_DATE\
  \ + \" INTEGER,\"\n                + NoteColumns.MODIFIED_DATE + \" INTEGER\"\n\
  \                + \");\");\n    }\n\n    // 上面的代码将创建如下表结构，其中 COLid 在运行时是 NoteColumns._ID\
  \ 的值\n    // CREATE TABLE notes (COLid INTEGER PRIMARY KEY, title TEXT,\n    //\
  \ note TEXT, created INTEGER, modified INTEGER);\n\n    @Override\n    public void\
  \ onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {\n        Log.w(TAG,\
  \ \"Upgrading database from version \" + oldVersion + \" to \"\n               \
  \ + newVersion + \", which will destroy all old data\");\n        db.execSQL(\"\
  DROP TABLE IF EXISTS notes\");\n        onCreate(db);\n    }\n}\n```\n\n`private\
  \ DatabaseHelper mOpenHelper;`\n\n上面这行代码很容易被忽略。它在本文件的示例代码中贯穿始终：它是`SQLiteOpenHelper`的本地实例。采用这种结构，如果你重用这段代码，可以在`DatabaseHelper`内部进行更改（例如，使用你自己的字符串名称），而对其他代码只需做极少的改动。\n\
  \n接下来是示例中使用你将重用的样板代码的部分。注意`mOpenHelper`的使用，它就是`DatabaseHelper`。如你所见，它建立在已经构建好的结构之上。如果你检查示例中的完整代码，会发现大部分代码处理的是要存储的数据，而不是\
  \ SQLite 接口。\n\n**粗体**显示的代码是实际更新数据库的代码。`db.insert`方法使用本章前面描述的静态值构建必要的 SQLite 语法。紧接在粗体代码下方的代码获取`db.insert`的返回值并将其放入一个名为`rowId`的局部变量中。这正是它的含义——新行的唯一\
  \ ID。如果操作失败，则返回-1。\n\n```java\n@Override\npublic Uri insert(Uri uri, ContentValues\
  \ initialValues) {\n    // 验证请求的 URI\n    if (sUriMatcher.match(uri) != NOTES) {\n\
  \        throw new IllegalArgumentException(\"Unknown URI \" + uri);\n    }\n\n\
  \    ContentValues values;\n    if (initialValues != null) {\n        values = new\
  \ ContentValues(initialValues);\n    } else {\n        values = new ContentValues();\n\
  \    }\n\n    Long now = Long.valueOf(System.currentTimeMillis());\n\n    // 确保字段都已设置\n\
  \    if (values.containsKey(NoteColumns.CREATED_DATE) == false) {\n        values.put(NoteColumns.CREATED_DATE,\
  \ now);\n    }\n\n    if (values.containsKey(NoteColumns.MODIFIED_DATE) == false)\
  \ {\n        values.put(NoteColumns.MODIFIED_DATE, now);\n    }\n\n    if (values.containsKey(NoteColumns.TITLE)\
  \ == false) {\n        Resources r = Resources.getSystem();\n        values.put(NoteColumns.TITLE,\
  \ r.getString(android.R.string.untitled));\n    }\n\n    if (values.containsKey(NoteColumns.NOTE)\
  \ == false) {\n        values.put(NoteColumns.NOTE, \"\");\n    }\n\n    SQLiteDatabase\
  \ db = mOpenHelper.getWritableDatabase();\n    long rowId = db.insert(NOTES_TABLE_NAME,\
  \ NoteColumns.NOTE, values);\n\n    if (rowId > 0) {\n        Uri noteUri = ContentUris.withAppendedId(NoteColumns.CONTENT_URI,\
  \ rowId);\n        getContext().getContentResolver().notifyChange(noteUri, null);\n\
  \        return noteUri;\n    }\n\n    throw new SQLException(\"Failed to insert\
  \ row into \" + uri);\n}\n```\n\n## 总结\n\n本章向你展示了在 Android 中使用内置 SQLite 数据库的基础知识。尽管这里的示例中包含大量代码，但实际你需要为\
  \ SQLite 接口编写的只有几行代码。当你为自己的目的重用这些代码时，你编写的大部分代码将与你自己的应用及其数据相关，而不是与数据库本身相关。\n\n"
- '# 第 8 章 ■ 在 iOS 和 OS X 中使用 SQLite 与 Core Data


  尽管 SQLite 与 PHP、Android 和 iOS/OS X 紧密结合，但集成策略有所不同。在某种程度上，它们形成了一个逻辑上的递进关系。PHP 将 SQLite
  作为语言的扩展来支持（在撰写本文时已不再是可选组件）。当你为 SQLite 编写 PHP 代码时，当今的最佳实践是使用 PHP 数据对象（`PDO`）类。


  然而，你代码的其他部分很可能是传统的过程式代码：并没有假设你会全程编写面向对象的代码。


  Android 在创建通用类（`android.database`）的理念上采取了稍有不同的方法。在 Android 的情况下，一个特定的子类数据库提供 SQLite
  支持（`android.database.sqlite`），同时在`android.database`中提供通用的数据管理支持。


  可以合理地认为，Android 中的 SQLite 实现比 PHP 更具面向对象性。（这是一个概括，并非旨在忽视或煽动争论。）尽管实现方式存在这些差异，但你在本书和其他地方看到的
  SQLite 代码在 PHP 和 Android 中许多情况下都是可见的。


  你将在 PHP 和 Android 应用的源代码中找到熟悉的 SQLite 命令——如`SELECT`、`DELETE`、`INSERT INTO`、`DELETE
  FROM`等命令。


  在 iOS 和 OS X 的世界里，面向对象的方法走得更远。在正常情况下，作为开发人员，你甚至看不到 SQLite 代码。就像`PDO`和`android.database`一样，存在针对各种数据库定制的通用类，但
  SQLite 代码被放置在这些通用类内部，很少对你可见。这意味着你不需要编写诸如`SELECT`、`DELETE`之类的语句或命令。相反，你编写的是与通用类及其为你的应用定制的子类交互的代码。


  此外，与`PDO`和`android.database`中的实现相比，iOS 和 OS X 中的实现有一个非常关键的区别。这个区别与关系有关，它们在概念上与其他任何
  SQL 环境中的关系完全相同，但实现方式却大不相同，你将在本章中看到。


  最后，有一个关键点对 Core Data 至关重要，但不以同样的方式适用于其他环境。`PDO`和`android.database`封装特定的数据库并提供对它们的访问。Core
  Data 可以与多种数据库协作，但其数据库访问是通过 Core Data 本身进行的：底层数据库并不暴露。有些人认为 Core Data 本身就是一个数据库，但它不是。从技术上讲，它是一个对象图和持久化框架。它使用一个数据库（或者，在
  SQLite 的情况下，一个数据库库），但它本身并不是一个数据库。它的职责是隐藏数据库，以便你可以使用 Core Data 基于其所使用的数据库中的数据管理的对象进行工作。



  ■ **注意** `Core Data` 能够与包括 `SQLite` 在内的多种数据库协同工作，但通过将这些数据库封装在其自身的框架类中，它为不同的数据库类型提供了一致性。因此，尽管在
  `iOS` 和 `OS X` 上最常见 `Core Data` 用法中，底层的数据库是 `SQLite`，你并不能简单地将一个现有的 `SQLite` 数据库直接塞进
  `Core Data`。如果你有一个现有的数据库（`SQLite` 或任何其他类型）并想将其迁移到 `Core Data`，最简单的方法是将其卸载，然后重新加载到你创建的
  `Core Data` 模型中。在很多情况下，你可以使用实用工具来完成卸载；而重新加载可能需要一小段代码来与 `Core Data` 交互。在任何情况下，拥有卸载和重新加载任何类型数据库的能力都是一种最佳实践。这不仅在从一种数据库管理器迁移到另一种时很方便，对于调试、审计和其他需求也同样有用。


  ## Core Data 框架简介


  与 `PDO` 和 `android.database` （非常）大致类似的通用代码就是 `Core Data` 框架。它由一系列类组成——本章将描述关键类以及用于数据模型的图形编辑器。


  ### Core Data 的起源


  Core Data 是一个框架——一组协同工作、可以一起安装到你应用程序中的类。它与 `Cocoa`（用于 `OS X` 的用户界面 (`UI`) 框架）和 `Cocoa
  Touch`（用于 `iPad`、`iPod touch` 和 `iPhone` 的 `UI` 框架）配合使用。它也用于 `tvOS` 和 `watchOS`。它为标准数据库提供了一个完全面向对象的接口。它最初于
  1994 年在 `Next` 公司编写为企业对象框架 (`EOF`)，并支持 `Oracle`、`Sybase`、`Informix` 和兼容 `ODBC` 的服务器以及
  `OpenBase Lite`。如今，它在所有平台上都支持内置的 `SQLite` 库，在 `Mac` 上还支持 `XML`。


  ## 第 8 章 在 iOS 和 OS X 中结合 SQLite 使用 Core Data


  Core Data 源自 `EOF`，但在许多方面有很大不同。仍然保留的主要相似之处之一是用于描述关系数据的图形用户界面。


  如今，它作为 `Xcode` 的一部分，体现为 `数据模型检查器` 和 `Xcode Core Data 模型编辑器`。


  *   两者都是完全面向对象的，尽管你可以编写代码来管理它们，但存储的对象及其属性在 `Xcode Core Data 模型编辑器` 中以图形方式表示。如果你确实编写代码，那是标准的
  `Objective-C` 或 `Swift` 代码，而不是 `SQL` 或 `SQLite`。

  *   除了存储的对象和属性本身之外，用于设计数据、其对象及其关系的图形用户界面直接源自 `EOF` 工具。你可以编写代码来管理数据及其对象，但该代码是 `Swift`
  或 `Objective-C`，而不是 `SQL` 或 `SQLite`。


  也许 `EOF` 和 `Core Data` 最重要的方面是非常相关的。


  作为开发者，`Core Data` 有三个重要的方面。


  *   用于构建和维护包括关系在内的数据模型的图形用户界面。这就是 `Xcode Core Data 模型编辑器`。它在 `Xcode` 内部运行。

  *   使 `Core Data` 为你工作的运行时对象。它们统称为 `Core Data` 栈 (`Core Data stack`)。

  *   你经常与 `Core Data` 一起使用的其他对象。


  本章讨论第一个方面。第 9 章将讨论第二个和第三个方面。


  ## 使用 Core Data 模型编辑器


  从一个 `Xcode` 项目开始，可以是基于内置的 `Xcode` 模板，也可以是基于你自己的项目。许多内置模板在设置项目时都有一个使用 `Core Data`
  的选项。如果你选择了这个选项，你的项目中就已经有一个数据模型了。


  否则，你需要向项目中添加一个数据模型。使用 `文件->新建->文件` 打开如图 8-1 所示的面板，并根据情况从 `iOS`、`watchOS`、`tvOS`
  或 `OS X` 的 `Core Data` 部分选择 `数据模型`。



  '
