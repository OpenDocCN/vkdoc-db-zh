  **面向移动开发者的 SQLite 入门指南**


  *《面向移动开发者的 SQLite 入门指南》*是一本面向 `iOS` 和 `Android` 开发者的 `SQLite` 基础入门指南。本书包含 `SQL`
  的简单介绍、关于何时使用 `SQLite` 的讨论，以及专门介绍如何将 `SQLite` 与最常用的编程语言（`Java`、`PHP`、`Swift` 和 `Objective-C`）结合使用的章节。接着，本书介绍了如何为
  `Android` 或 `iOS` 应用程序添加简单的数据库功能，最后一章讨论了如何管理应用程序的生命周期。


  **你将学到：**


  - `SQLite` 的基础知识

  - 有效使用 `SQLite` 所需的 `SQL` 知识

  - 如何将数据库功能集成到你的移动应用中

  - 如何维护应用程序


