- "# 使用 SQLite 基础：存储与检索数据\n\n如果你有多个 SQLite 数据库，那你就拥有多个文件。（可能存在一些相关文件——参见第 4 章的“预写式日志”。）在你的数据库窗口中，通常会看到数据库中项目的列表（如果存在的话）。你通常关心的主要项目包括：\n\
