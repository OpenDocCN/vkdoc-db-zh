  \ \"timeStamp\", ascending: false)\nfetchRequest.sortDescriptors = [sortDescriptor]\n\
  // 根据需要编辑分区名称键路径和缓存名称。\n// 分区名称键路径为 nil 表示“无分区”。\nlet aFetchedResultsController\
  \ = NSFetchedResultsController(fetchRequest: fetchRequest, managedObjectContext:\
  \ self.managedObjectContext!, sectionNameKeyPath: nil, cacheName: \"Master\")\n\
  aFetchedResultsController.delegate = self\n_fetchedResultsController = aFetchedResultsController\n\
  do {\ntry _fetchedResultsController!.performFetch()\n} catch {\n// 请用适当的错误处理代码替换此实现。\n\
  // abort()会导致应用程序生成崩溃日志并终止。\n// 在发布的应用程序中不应使用此函数，尽管在开发过程中可能很有用。\nprint(\"Unresolved\
  \ error \\(error), \\(error.userInfo)\")\nabort()\n}\nreturn _fetchedResultsController!\n\
  }\nvar _fetchedResultsController: NSFetchedResultsController? = nil\n```\n\n如果你已在第\
  \ 8 章所述的数据模型中创建了获取请求，你可以用它来创建一个`fetchedResultsController`。\n\n## 保存托管对象上下文\n\n尽管这在\
  \ iOS 和 OS X 中基本相同，但仍有一些细微差别。\n\n### 在 iOS 中保存\n\n\n\n# 第 9 章 ■ 在 Swift（iOS 和 OS\
  \ X）中使用 SQLite/Core Data\n\nCore Data 在应用委托中的最后一部分是用于保存上下文及其更改的工具代码。如果不保存被管理对象上下文，这些更改就会丢失。\n\
  \n```\nfunc saveContext () {\n    if managedObjectContext.hasChanges {\n       \
  \ do {\n            try managedObjectContext.save()\n        } catch {\n       \
  \     // 用适当的代码替换此实现以处理错误。\n            // abort() 会导致应用程序生成崩溃日志并终止。\n         \
  \   // 在已发布的应用程序中不应使用此函数，尽管它在开发过程中可能很有用。\n            let nserror = error as NSError\n\
  \            NSLog(\"Unresolved error \\(nserror), \\(nserror.userInfo)\")\n   \
  \         abort()\n        }\n    }\n}\n```\n\n这是将被管理对象上下文传递给由应用委托创建或管理的视图的主要原因之一（参见“在\
  \ iOS 中将被管理对象上下文传递给视图控制器”部分）。如果视图拥有被管理对象上下文，那么当它在处理视图的更改时，就可以使用 `managedObjectContext.save`\
  \ 来保存这些更改。\n\n以下是一个可以保存数据的标准视图控制器代码示例。\n\n```\ndo {\n    try context.save()\n} catch\
  \ {\n    // 用适当的代码替换此实现以处理错误。\n    // abort() 会导致应用程序生成崩溃日志并终止。\n    // 在已发布的应用程序中不应使用此函数，尽管它在开发过程中可能很有用。\n\
  \    print(\"Unresolved error \\(error), \\(error.userInfo)\")\n    abort()\n}\n\
  ```\n\n### 在 OS X 中保存\n\n凭借 OS X 中的菜单栏及其命令，你经常使用“保存”操作来保存数据。以下是一个典型的 OS X `saveAction`\
  \ 函数。\n\n```\n@IBAction func saveAction(sender: AnyObject!) {\n    // 为应用程序执行保存操作，即向应用程序的被管理对象上下文发送\
  \ save: 消息。\n    // 遇到的任何错误都会呈现给用户。\n    if !managedObjectContext.commitEditing()\
  \ {\n        NSLog(\"\\(NSStringFromClass(self.dynamicType)) unable to commit editing\
  \ before saving\")\n    }\n    if managedObjectContext.hasChanges {\n        do\
  \ {\n            try managedObjectContext.save()\n        } catch {\n          \
  \  let nserror = error as NSError\n            NSApplication.sharedApplication().presentError(nserror)\n\
  \        }\n    }\n}\n```\n\n## 使用 `NSManagedObject`\n\n在任何使用 Core Data 的应用程序中，你都需要一个\
  \ Core Data 栈，并且每次创建它的方式基本相同，除了你会自定义项目的名称。\n\n（如果你是从 Xcode 的内置模板之一构建应用，可能会有一个 Core\
  \ Data 复选框，可用于自动插入 Core Data 栈代码以及你的项目名称。）\n\n那么你的数据呢？这将由你的 Core Data 栈来管理，但它肯定需要特殊的编码。事实上，与\
  \ Core Data 的常见情况一样，SQLite 语法在幕后为你处理好了。你已经拥有一个数据模型（要么是模板自带的，要么是经过你修改的），如果你没有，你需要使用\
  \ 文件 ➤ 新建 ➤ 文件 来创建一个数据模型。\n\n`Note` 在 OS X 中，通常不使用视图控制器；而是使用绑定。该主题在 developer.apple.com\
  \ 中有介绍。\n\n数据模型中的每个实体将在运行时转换为一个类的实例。这些实例中的每一个都是 `NSManagedObject` 或其子类的实例。本节将向你介绍基础知识。\n\
  \n本节中的示例使用本书前面使用的相同的两个实体：`User` 和 `Score`。`图 9-1.` 显示了它们在 Xcode Core Data 模型编辑器图形视图中的样子。\n\
  \n![](img/index-98_1.jpg)\n\n`图 9-1.` 数据模型中的 User 和 Score 实体\n\n### 创建新的 `NSManagedObject`\
  \ 实例\n\n有几种方法可以创建新的 Core Data 实例。最常见的一种可以在 iOS 的 Master-Detail Application 模板中找到。以下是那里使用的代码。它连接到\
  \ MasterViewController 视图中的一个 +。用户可以点击 + 来创建一个新对象。\n\n\n\n# 第 9 章 ■ 在 Swift 中使用\
  \ SQLite/Core Data（iOS 和 OS X）\n\n```swift\nfunc insertNewObject(sender: AnyObject)\
  \ {\n\n    let context = self.fetchedResultsController.managedObjectContext\n\n\
  \    let entity = self.fetchedResultsController.fetchRequest.entity!\n\n    let\
  \ newManagedObject =\n        NSEntityDescription.insertNewObjectForEntityForName(entity.name!,\n\
  \                                                           inManagedObjectContext:\
  \ context)\n\n    do {\n\n        try context.save()\n\n    } catch {\n\n      \
  \  abort()\n\n    }\n\n}\n```\n\n每当创建一个新的 `NSManagedObject` 时，你都会使用这段代码（或非常类似的代码）。这段代码的开头部分只是定位托管对象上下文。它可能是你正在使用的类中的一个属性，例如\
  \ `fetchedResultsController`。如果不是，你可能需要添加一个本地属性，这个属性在你的类实例化时或从故事板加载实例时被创建（或传递）。\n\
  \n接下来，你创建一个实体描述，它是 `NSEntityDescription` 的一个子类。它封装了你在数据模型中管理的实体信息。在此处显示的代码中，实体描述（名为\
  \ `entity`）是从一个获取结果控制器中检索到的。\n\n代码的第三行实际创建了一个名为 `newManagedObject` 的新实例。这行代码值得详细审视。它其实相当简单，但它是\
  \ Core Data 的核心。\n\n```swift\nlet newManagedObject =\n    NSEntityDescription.insertNewObjectForEntityForName(entity.name!,\n\
  \                                                       inManagedObjectContext:\
  \ context)\n```\n\n你使用 `NSEntityDescription` 的一个类方法来创建新对象——`insertNewObjectForEntityForName`。你需要指定要创建的新对象的名称以及将其放入的托管对象上下文。\n\
  \n如果你知道要创建的对象名称，可以省略创建 `entity` 的那行代码（此代码的第二行），并像下面的代码片段那样，通过名称来引用它。\n\n```swift\n\
  let newManagedObject =\n    NSEntityDescription.insertNewObjectForEntityForName(\"\
  User\",\n                                                       inManagedObjectContext:\
  \ context)\n```\n\n显然，这段代码的可重用性较差，但它可以工作。\n\n在你创建了那个新的托管对象之后，你将插入了它的托管对象上下文保存下来。\n\
  \n```swift\ndo {\n    try context.save()\n} catch {\n    abort()\n}\n```\n\n正如模板代码中的注释以及本书其他地方所指出的，**不要**在发布的应用程序中使用\
  \ `abort()`。相反，应该捕获错误并记录它，让用户知道存在问题（如果用户能对此做些什么的话），或者直接在你的代码中修复问题。\n\n这就是创建一个新的托管对象所需的全部步骤。\n\
  \n如果你想为在数据模型中为实体定义的属性设置一个值，你可以使用键值编码（key-value coding）来做，使用类似以下的一行代码：\n\n```swift\n\
  newManagedObject.setValue(\"New User\", forKey: \"name\")\n```\n\n如果你为属性设置的值是无效的，保存托管对象上下文将会失败。如果你在\
  \ Xcode 数据模型编辑器中声明了验证规则，这种情况尤其会发生。在你彻底调试好验证规则之前，你可能需要适当地处理错误。（当然，如果你允许用户输入，可能会发生大量用户生成的错误。）\n\
  \n`提示`：如果你真的想深入理解 Core Data，请梳理一下在幕后必须生成的 SQLite 语法，以实现此处展示的代码。它肯定正在被执行，但你不需要手动输入它。\n\
  \n## 使用 `NSManagedObject` 的子类\n\n你可以创建 `NSManagedObject` 的一个子类，而不是直接使用 `NSManagedObject`\
  \ 的实例。如果你创建了一个子类（过程将在后面描述），主要好处是，你可以使用像下面这样的代码来为 `newManagedObject` 设置值，而不必使用键值编码：\n\
  \n```swift\nnewManagedObject.name = \"New User\"\n```\n\n使用 Xcode Core Data 模型编辑器可以轻松地创建一个新的\
  \ `NSManagedObject` 子类。以下是涉及的步骤。首先打开你的数据模型，如图 9-1 所示。（你是在看图表视图还是表格视图并不重要。）选择 **Editor**\n\
  \n\n# 第九章：在 Swift (iOS 和 OS X) 中使用 SQLite/Core Data\n\n### 选择你的数据模型\n\n选择“Create\
  \ NSManagedObject Subclass”来打开图 9-2 所示的窗口。选择要使用的数据模型，如图 9-2 所示（通常只有一个。如果你一直在修改数据模型，可能会有多个。）\n\
  \n![](img/index-101_1.jpg)\n\n**图 9-2. 选择你的数据模型**\n\n### 选择要生成子类的实体\n\n点击“Next”后，选择想要为其创建子类的实体（见图\
  \ 9-3）。\n\n默认情况下，你在图形或表格视图（如图 9-1 所示）中选择的实体会被选中。你不必为所有实体都创建子类。\n\n有时，你会选择为更复杂的实体创建子类，而将其他的保留为\
  \ `NSManagedObject` 实例。\n\n![](img/index-102_1.jpg)\n\n**图 9-3. 选择要创建子类的实体**\n\n\
  ### 保存子类文件\n\n点击“Next”，选择新文件的保存位置，如图 9-4 所示。同时为子类文件选择你想要的编程语言。（你可以混合搭配使用 Swift 和\
  \ Objective-C。）\n\n![](img/index-103_1.jpg)\n\n**图 9-4. 选择子类文件的保存位置和你想要使用的语言**\n\
  \n你应该仔细检查一下分组（用于导航器）和目标，但通常它们都是正确的。\n\n### 关于标量属性的选项\n\n“Use scalar types for scalar\
  \ property types”这个选项需要稍作解释。默认情况下，你的实体属性会被转换为使用原生 Cocoa 或 Cocoa Touch 类型（如 `NSNumber`\
  \ 对应 `Double`）的 Swift 或 Objective-C 属性。因此，一个 `Double` 会被转换为 `NSNumber`。`NSNumber`\
  \ 是一个比 `Double` 强大得多的结构（首先，它是一个类）。如果你经常处理这样的属性，有时 `NSNumber` 的强大功能反而会碍事。选择使用标量类型将使用基本平台（非对象）类型（如\
  \ `Double`），这可能会让你的代码更简单。\n\n### 桥接头文件\n\n如果你的项目基本上是用 Swift 编写的，而你选择用 Objective-C\
  \ 创建子类，系统可能会询问你是否要在两种语言之间创建一个桥接头文件（Bridging Header），如图 9-5 所示。是的，你应该这样做。\n\n![](img/index-104_1.jpg)\n\
  \n![](img/index-104_2.jpg)\n\n**图 9-5. 你可以选择创建桥接头文件**\n\n在一个混合语言的项目中，如果没有被询问关于桥接头文件的事，也不必担心。它只需要创建一次，所以第一次之后，就不会再被询问了。\n\
  \n桥接头文件会在你的项目构建设置中为你创建好，如图 9-6 所示。你不需要再做任何事情。\n\n**图 9-6. 带有桥接头文件的构建设置**\n\n###\
  \ 生成的 Swift 文件\n\n如果你创建的是 Swift 子类，`Xcode` 会为你选择的每个实体创建两个文件。第一个是类的基础文件（本例中是 `User`）：它是空的，内容如下：\n\
  \n```swift\nimport Foundation\nimport CoreData\n\nclass User: NSManagedObject {\n\
  \n    // 在此处插入代码，为你的托管对象子类添加功能\n\n}\n```\n\n文件将被命名为 `User.swift`。正如代码中的注释所示，你可以向这个新创建的类添加任何你想要的代码。\n\
  \n`Xcode` 为你创建的配套文件是一个 *类扩展*。（Swift 的类扩展类似于 Objective-C 的 category，但没有名称。）它的名称格式如下：\n\
  \n`User+CoreDataProperties.swift`\n\n文件内容如下：\n\n```swift\nimport Foundation\nimport\
  \ CoreData\n\nextension User {\n\n    @NSManaged var name: String?\n    @NSManaged\
  \ var email: String?\n    @NSManaged var scores: NSManagedObject?\n\n}\n```\n\n\
  在运行时，这个扩展会与基础类合并，因此你可以通过以下方式访问 `User` 实例的 `name` 属性：\n\n```swift\nmyName.name =\
  \ \"test\"\n```\n\n这就是创建 `NSManagedObject` 子类的全部过程。\n\n\n**注意**：关于如何使用子类，请参见[第 12\
  \ 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_12)。\n\n# 总结\n\n本章向你展示了如何使用`Swift`——`Cocoa`和`Cocoa\
  \ Touch`更现代的语言——在 OS X 和 iOS 上操作`SQLite`/`Core Data`。目前仍有大量`Objective-C`代码存在，而[第\
  \ 10 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)介绍了相关代码。\n\n## `第 10 章`：使用`Objective-C`操作`SQLite`/`Core\
  \ Data`（iOS 和 Mac）\n\n第[9 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)详细描述的`Core\
  \ Data`栈是本章的核心，但背景是`Objective-C`。是的，使用`Swift`和`Objective-C`操作`SQLite`的过程非常相似，但实现细节的差异足以使它们被分置于不同的章节，这样你无需来回翻页就能找到所需内容。如果你已经阅读了第[9\
  \ 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)（或者相反，如果你在阅读第[9 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_9)之前先读了[第\
  \ 10 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_10)），请随意跳过任何重复的内容，以便你在掌握`SQLite`和这两种\
  \ Apple 语言时游刃有余。\n\n`Objective-C`是后来演变为`Cocoa`和`Cocoa Touch`的原始语言。它在 20 世纪 80 年代初为`NeXTSTEP`设计。当时，面向对象编程正成为软件开发的主要方式。多种语言被设计出来以实现这一新范式。有些是从头构建的，而另一些则构建在当时已有的语言（如`C`）之上。（甚至还有`Object\
  \ COBOL`语言。）\n\n`Objective-C`曾是`NeXTSTEP`以及后来的`Cocoa`和`Cocoa Touch`开发的唯一语言。2014\
  \ 年，`Swift`加入其中。如同之前的`Objective-C`一样，它也基于当时的编程风格和语言，但就`Swift`而言，这些语言是“`Objective-C`、`Rust`、`Haskell`、`Ruby`、`Python`、`C#`、`CLU`，以及太多无法列举的语言”，维基百科引用\
  \ Chris Lattner 的话说道。（Lattner 是`Swift`的原始开发者。）\n\n两种语言在`Core Data`栈的实现上存在重要差异，但其架构对两者而言是相同的。\n\
  \n### 第 10 章 ■ 使用`Objective-C`操作`SQLite`/`Core Data`（iOS 和 Mac）：审视 Core Data 栈\n\
  \n`Core Data`栈是一组提供功能的三个对象。如下所示：\n\n*   **托管对象模型**。这是你在第[8 章](http://dx.doi.org/10.1007/978-1-4842-1766-5_8)中看到以图形方式构建的内容。它非常类似于通常被称为数据库模式的东西。（模式是用形式化语言而非图形描述的。）请记住，在`Core\
  \ Data`模型中关系是显式定义的，而在`SQLite`（以及一般的`SQL`）中，关系是在你编写的`WHERE`子句中实现的。\n*   **持久化存储协调器**。每个`SQLite`表在`Core\
  \ Data`中通常表示为一个持久化存储。持久化存储和数据库表之间的这种一对一映射在大多数情况下是足够的。然而，你可以拥有多个持久化存储以提高性能或提供其他优化。就`Core\
  \ Data`栈而言，三个关键元素之一是持久化存储协调器，它协调给定`Core Data`应用程序的所有持久化存储。\n\n在大多数情况下，持久化存储协调器处理单个持久化存储。然而，其全称（持久化存储协调器）仍在使用，因为在更复杂的解决方案中，持久化存储协调器确实管理多个持久化存储。正是持久化存储协调器及其持久化存储完成了从扁平的`SQLite`数据库文件到你在`Core\
  \ Data`应用程序中操作的对象的转换。因此，在创建持久化存储时，你会使用一些选项来指定底层的...\n\n\n# Core Data 存储类型与架构\n\n\
  数据可以是（在 OS X 上为 XML，在任意平台上为 SQLite，以及内存存储，未来可能创建的其他类型）。\n\n已定义的存储类型包括：\n\n-   `NSSQLLiteStoreType`\n\
  -   `NSXMLStoreType` (OS X)\n-   `NSBinaryStoreType` (OS X)\n-   `NSInMemoryStoreType`\
  \ (OS X)\n\n## 托管对象上下文\n\n**托管对象上下文**就像一个暂存器：它包含从持久存储中检索出的数据，并且可能已被你的应用程序修改。当你完成修改后，就保存托管对象上下文。如果想要取消操作，直接销毁该托管对象上下文即可。\n\
  \nCore Data 栈由这三个对象组成，它们相互关联以创建一个单一实体。\n\n## 获取数据到 Core Data 栈\n\n获取请求可以在 Xcode\
  \ 的 Core Data 模型编辑器中创建，也可以在代码中创建。它们从持久存储（通过持久存储协调器）中检索数据，并将其放入托管对象上下文。获取请求不是 Core\
  \ Data 栈的一部分，这一点在 Core Data 的标准架构中有所体现（将在下一节描述）。\n\n# Objective-C 语言要点\n\nObjective-C\
  \ 在许多方面看起来像你可能熟悉的其他编程语言，但存在一些差异。Objective-C 对许多人来说看起来尤其不同。以下是一些主要区别。关于 Objective-C\
  \ 的更多信息可在 developer.apple.com 上找到。此外，本章中的代码片段将为你提供一些关键示例，但这里的重点是 SQLite 及其语法以及 Core\
  \ Data。\n\n## 使用带引号的字符串\n\n在 Objective-C 中，带引号的字符串以 `@` 开头，例如 `@\"myString\"`。\n\
  \n## Objective-C 是一种消息传递语言\n\n最重要的区别在于 Objective-C 是一种 **基于消息** 的语言，并且它是 **动态**\
  \ 的。在当今许多面向对象的编程语言中，你使用如下语法调用类的方法或函数：\n\n```\nmyObject.myFunction ();\n```\n\n与调用\
  \ **函数** 或 **方法**（尽管有细微差别，但这里这两个术语可以互换使用）不同，在 Objective-C 中，你是向一个对象发送 **消息**。这个消息的名称可能让你认为它是一个函数调用，但本质上并非如此。在\
  \ Objective-C 中，前面那行代码会写作：\n\n```\n[myObject myFunction];\n```\n\n`myFunction` **消息**\
  \ 被发送给了 `myObject`。\n\n## 在 Objective-C 中使用括号\n\n如上一节所示，Objective-C 看起来不同。消息被括号包围。接收者是括号内的第一个项目，消息选择器是第二个。（消息选择器标识要发送的消息。它通常看起来像函数或方法的名称，但它不是一个带引号的字符串。）接收者或消息选择器都可以是运行时计算的表达式——因此它具有动态性。\n\
  \n方括号长期以来对某些人来说是阅读 Objective-C 的一个障碍。因此，出现了一些变体。苹果收购 NeXT 后，在经典 Objective-C 方括号之外引入了\
  \ **现代语法**。那个特定的变体不再被支持，但 Objective-C 2.0（2006）引入了 **点语法**，其中方括号被更易接受的语法取代。这两种变体都可以与经典\
  \ Objective-C 表示法共存，因为它们不会改变编译器内部发生的事情。本章“在 iOS 中将托管对象上下文传递给视图控制器”一节中的代码对 Objective-C\
  \ 使用了点语法。\n\n### 链式消息\n\n与 Swift 和其他语言一样，如果语句产生结果，你可以将它们链接在一起。因此，你可以编写这段代码（假设 `myFunction`\
  \ 返回一个能响应 `myFunction2` 的对象）。\n\n```\n((myObject.myFunction ()).myFunction2 ()\n\
  ```\n\n这等同于编写\n\n```\nx = myObject.myFunction ();\ny = x.myFunction2 ();\n```\n\n\
  而且，在 Objective-C 中你可以写\n\n`[[myObject myFunction] myFunction2]`\n\n这等同于书写\n\n```\n\
  x = [myObject myFunction];\n\ny = [x myFunction2];\n```\n\n**以分号结束语句**\n\nObjective-C\
  \ 语句以分号结尾。（你可以在 `Swift` 语句末尾加上分号，但这是可选的。如果在同一行上有两条 `Swift` 语句，则是必需的：第一条语句和第二条语句之间用分号分隔。）\n\
  \n**在 Objective-C 中分隔头文件与实现文件**\n\n在 `Swift` 及许多其他现代语言中，每个类对应一个单独的文件。而在 Objective-C\
  \ 中有两个文件——一个扩展名为 `.h` 的头文件和一个扩展名为 `.m` 的实现文件。\n\n第 10 章 ■ 在 Objective-C（iOS 和 Mac）中使用\
  \ SQLite/Core Data\n**查看方法声明**\n\n方法声明的语法与 `Swift` 不同。最快了解差异的方法是查阅“在 iOS 的 AppDelegate\
  \ 中设置 Core Data 栈”一节中的示例。\n\n**在 Objective-C 中处理 `nil`**\n\n在面向对象语言中，通常会有指向对象实例的引用，这些实例在大多数情况下存储在*堆*上（即，应用程序可以按需使用的一块内存区域）。这与*栈*不同，后者是一种后进先出（LIFO）的抽象内存结构。（“抽象”是指其行为表现得像是一个单一结构，但在某些实现中并不一定如此。）栈数据通常属于某个特定函数，因此当函数执行完毕时，栈可以被*回缩*，其变量也随之从内存中移除。\n\
  \n对象的实例在堆上分配，不会自动回缩。它们需要通过某种方式移除。在 Objective-C 中，随着时间的推移，已经实现了几种清理未使用内存的策略。当前的版本依赖于引用计数：当分配一个实例时，其引用计数被设为\
  \ 1。每次使用该实例时，使用它的代码通常会增加引用计数。当每次使用实例的代码执行完毕时，引用计数减少 1。当引用计数达到 0 时，操作系统就可以重用这块内存。\n\
  \n这种内存管理策略依赖于软件工程师来管理引用计数。随着时间的推移，已经提供了自动化和半自动化的工具。然而，你仍然会看到使用主要内存管理工具的代码：`retain`\
  \ 和 `release`，它们分别将引用计数增加和减少 1。\n\n通过自动引用计数（`ARC`），这在很大程度上实现了自动化。\n\n在 Objective-C\
  \ 中，通过指针访问对象的实例。使用的是传统的 `C` 语言指针语法（星号——`*`）。因此，在 Objective-C 中你会看到如下声明：\n\n```\n\
  NSView *myView;\n```\n\n或\n\n```\nNSView* myView;\n```\n\n星号的位置无关紧要。这声明了一个名为 `myView`\
  \ 的指针变量，它指向一个 `NSView` 的实例。\n\n**大概吧。**\n\n`myView` 可能并未指向 `NSView` 的实例，而是 `nil`。你会发现\
  \ Objective-C 中有大量代码会在使用指针之前检查其是否为 `nil`。这是一个好习惯。\n\n在 Objective-C 对象的生命周期中，它会经历几个状态。首先，它被声明，如：\n\
  \n```\nNSView *myView;\n```\n\n第 10 章 ■ 在 Objective-C（iOS 和 Mac）中使用 SQLite/Core\
  \ Data\n然后它被初始化为某个值。这可以在一个单独的语句中发生，也可以在一个组合语句中发生。\n\n```\nNSView *myView;\n\nmyView\
  \ = nil;\n```\n\n或\n\n```\nNSView *myView = nil;\n```\n\n如果在声明和被设置为某个有效值（例如 `nil`\
  \ 或一个实际的实例）之间存在一段时间，那么该指针是未定义的。如果你使用它，你的应用程序的行为可能是任何情况，但“崩溃”很可能是描述的一部分。Objective-C\
  \ 中的悬垂指针问题已存在多年，并且已有许多方法来解决它。如今，在 Objective-C 中，`ARC` 是解决该问题的主要方式。而在 `Swift` 中，实现可选类型（optionals）的主要原因之一就是为了杜绝这类悬垂指针。\n\
  \n\n# 使用 Objective-C 构建 Core Data 应用\n\n如果你是从其他语言转过来的，那么方括号的使用、`nil` 的处理（以及正确初始化指针的必要性）可能是你在处理可能存在也可能不存在的\
  \ Core Data 对象时需要适应的两大最大变化（数据库和网络的本质意味着你不能依赖事物总是存在）。\n\n基本的 Core Data 栈（`persistentStoreCoordinator`、数据模型和\
  \ `managedObjectContext`）通常放置在应用全局可访问的位置。最常见的情况（Xcode 内置的 Master-Detail Application\
  \ 和 Single View Application 模板中使用）是将 Core Data 栈放在 `AppDelegate` 中。`AppDelegate`\
  \ 通常负责创建应用内的视图和其他对象。如果这些视图和对象需要使用 Core Data 栈的某些部分，`AppDelegate` 会在它们创建时，或者在 `AppDelegate`\
  \ 管理由他人创建的对象时，将栈传递给视图控制器和视图。\n\n### 在 iOS 中将托管对象上下文传递给视图控制器\n\n以下是 iOS 的 Master-Detail\
  \ Application 模板将托管对象上下文传递给视图控制器的方式。（此代码使用 Objective-C 的点语法。）\n\n```objective-c\n\
  - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // Override point for customization after application launch.\n\
  \    UISplitViewController *splitViewController = (UISplitViewController *)self.window.rootViewController;\n\
  \    UINavigationController *navigationController = [splitViewController.viewControllers\
  \ lastObject];\n    navigationController.topViewController.navigationItem.leftBarButtonItem\
  \ = splitViewController.displayModeButtonItem;\n    splitViewController.delegate\
  \ = self;\n    UINavigationController *masterNavigationController = splitViewController.viewControllers[0];\n\
  \    MasterViewController *controller = (MasterViewController *)masterNavigationController.topViewController;\n\
  \    controller.managedObjectContext = self.managedObjectContext;\n    return YES;\n\
  }\n```\n\n视图是从故事板创建的，这段代码从基本窗口开始，逐步向下查找，直到找到分割视图控制器左侧的导航控制器。然后，它再深入到导航控制器内部的 `MasterViewController`。获取到该控制器后，它便将\
  \ `MasterViewController` 的 `managedObjectContext` 属性设置为在 `AppDelegate` 的 Core Data\
  \ 栈中创建的 `managedObjectContext`。这是标准做法。\n\n你也可以通过找到应用委托，然后访问栈中的某个对象来获取 Core Data\
  \ 栈。这破坏了封装性，因为你正在窥视应用委托的内部。不过，你会在各种地方找到一些示例代码是这样做的，如果你只是偶尔——比如仅一次——需要访问栈，那么这样做也可以提出一个（较弱的）理由。以下是这种获取栈方式的代码。\n\
  \n```objective-c\nAppDelegate *appDelegate = (AppDelegate *)[[UIApplication sharedApplication]\
  \ delegate];\n// use appDelegate.managedObjectContext or some other stack property\n\
  ```\n\n## 在 iOS 的 AppDelegate 中设置 Core Data 栈\n\n这段代码来自 Xcode 内置的 Single View Application\
  \ 模板。它由以下各项的懒加载 `var` 声明组成：\n\n*   `applicationDocumentsDirectory`。这是你的数据模型在应用内部的存放目录。\n\
  *   `managedObjectModel`\n*   `persistentStoreCoordinator`\n*   `managedObjectContext`\n\
  \n通过使用懒加载 `var`，初始化代码只在你实际需要时才运行。因此，除非你使用了 Core Data，否则模板中的这段代码永远不会运行。这里包含了模板代码的注释。\n\
  \n#### 创建应用委托头文件\n\n这是在 Objective-C 中创建 `AppDelegate` 的代码。请注意，`import` 语句与 Swift\
  \ 不同。同时，像 `@property` 这样的编译器指令……\n\n\n\n## Objective-C 中的接口声明与属性合成\n\n`@interface`\
  \ 和 `@end` 在 Swift 中不存在。方法声明（如 `saveContext` 和 `applicationDocumentsDirectory`）是\
  \ Objective-C 中声明的很好示例。\n\n```objective-c\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\
  \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
  \ nonatomic) UIWindow *window;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
  \ *managedObjectContext;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
  \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
  \ *persistentStoreCoordinator;\n\n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\
  \n@end\n```\n\n## 在 AppDelegate.m 中合成属性\n\n属性在头文件中声明，但必须在实现文件中合成。`@synthesize` 编译器指令通常会创建一个与属性同名的后备变量，并在实现内部直接访问它。在头文件中暴露的属性使用点语法访问，而底层的属性访问器则与后备变量（带下划线的变量）协同工作。\n\
  \n除了像 Core Data 这样的特殊情况，如果你希望使用默认的后备变量名，大部分工作都会自动为你完成。\n\n```objective-c\n@synthesize\
  \ managedObjectContext = _managedObjectContext;\n@synthesize managedObjectModel\
  \ = _managedObjectModel;\n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n\
  ```\n\n## 在 iOS 中创建 applicationDocumentsDirectory\n\n此代码使用默认的文件管理器来查找应用的文档目录。如果你想更改数据模型目录的位置，请在此处修改粗体所示的代码。可以使用不同的目录或创建自己的目录（当你不使用默认目录时请务必小心）。\n\
  \n```objective-c\n- (NSURL *)applicationDocumentsDirectory {\n    // 应用程序用于存储 Core\
  \ Data 商店文件的目录。\n    // 此代码使用应用程序文档目录中一个名为 \"com.champlainarts.SingleViewAppOC\"\
  \ 的目录。\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\n\
  \                                                   inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n```\n\n## 在 iOS 和 OS X 中创建 managedObjectModel\n\n这里的 `managedObjectModel`\
  \ 代码按需创建。粗体所示的行是在使用模板时生成的。如果你更改了项目名称，请修改这行代码。另外请注意，默认情况下，Core Data 模型存储在应用包中。你使用\
  \ Xcode Core Data 模型编辑器构建的 `.xcdatamodeld` 文件在构建过程中会被编译成 `.momd` 文件。\n\n```objective-c\n\
  - (NSManagedObjectModel *)managedObjectModel {\n    // 应用程序的托管对象模型。如果应用无法找到并加载其模型，这是一个致命错误。\n\
  \    if (_managedObjectModel != nil) {\n        return _managedObjectModel;\n  \
  \  }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"SingleViewAppOC\"\
  \n                                              withExtension:@\"momd\"];\n    _managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n    return _managedObjectModel;\n\
  }\n```\n\n## 在 iOS 中创建 persistentStoreCoordinator\n\n此代码根据你的托管对象模型创建一个持久化存储协调器。第一行粗体所示的代码是根据你的项目名称生成的，它包含了\
  \ SQLite 数据库文件的位置。你通常不会移动这个文件，但如果你更改了项目名称，这是另一个可能需要更改文件名的地方。\n\n请注意，在使用数据模型时，如果\
  \ `self.managedObjectModel` 尚不存在，它将在此处的引用之后被创建。注意这与 Swift 中的做法不同。\n\n另外，值得指出的是选择新持久化存储的\
  \ `SQLiteStoreType` 的那一行。它在第二行粗体中显示。\n\n```objective-c\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n    // 应用程序的持久化存储协调器。此实现创建并返回一个协调器，并为应用添加了存储。\n\
  \    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
  \    }\n    // 创建协调器和存储\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"SingleViewAppOC.sqlite\"];\n    NSError *error\
  \ = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
  \ initWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType\n                               \
  \                    configuration:nil\n                                       \
  \                      URL:storeURL\n                                          \
  \               options:nil\n                                                  \
  \         error:&error]) {\n        /*\n         此处错误的典型原因包括：\n         * 父目录不存在、无法创建或不允许写入。\n\
  \         * 持久化存储不可访问，原因是设备锁定时的权限或数据保护。\n         * 设备空间不足。\n         * 存储无法迁移到当前模型版本。\n\
  \         检查错误消息以确定实际问题是什么。\n         */\n        NSLog(@\"未解决的错误 %@, %@\", error,\
  \ [error userInfo]);\n        abort();\n    }\n    return _persistentStoreCoordinator;\n\
  }\n```\n\n\n\n## 创建持久化存储协调器\n\n以下是应用程序的持久化存储协调器的实现。此实现创建并返回一个协调器，并将应用程序的存储添加到其中。\n\
  \n```objective-c\nif (_persistentStoreCoordinator != nil) {\n    return _persistentStoreCoordinator;\n\
  }\n\n// Create the coordinator and store\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc]\n    initWithManagedObjectModel:[self managedObjectModel]];\n\nNSURL *storeURL\
  \ = [[self applicationDocumentsDirectory]\n    URLByAppendingPathComponent:@\"SingleViewAppOC.sqlite\"\
  ];\n\nNSError *error = nil;\nNSString *failureReason = @\"There was an error creating\
  \ or loading the application's saved data.\";\n\nif (![_persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType\n                               \
  \                 configuration:nil\n                                          \
  \                URL:storeURL\n                                                \
  \        options:nil\n                                                         \
  \ error:&error]) {\n    // Report any error we got.\n    NSMutableDictionary *dict\
  \ = [NSMutableDictionary dictionary];\n    dict[NSLocalizedDescriptionKey] = @\"\
  Failed to initialize the application's saved data\";\n    dict[NSLocalizedFailureReasonErrorKey]\
  \ = failureReason;\n    dict[NSUnderlyingErrorKey] = error;\n\n    error = [NSError\
  \ errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999 userInfo:dict];\n\n    // Replace\
  \ this with code to handle the error appropriately.\n    // abort() causes the application\
  \ to generate a crash log and terminate. You\n    // should not use this function\
  \ in a shipping application, although it may be\n    // useful during development.\n\
  \    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
  }\n\nreturn _persistentStoreCoordinator;\n}\n```\n\n## 在 iOS 中创建托管对象上下文\n\n最后，创建托管对象上下文。它整合了持久化存储协调器，而持久化存储协调器又引用了托管对象模型。这样，你就拥有了完整的\
  \ Core Data 栈。\n\n### 第 10 章 ■ 在 iOS 和 Mac 中使用 SQLite/Core Data 与 Objective-C\n\n\
  ```objective-c\n- (NSManagedObjectContext *)managedObjectContext {\n    // Returns\
  \ the managed object context for the application (which is already\n    // bound\
  \ to the persistent store coordinator for the application.)\n    if (_managedObjectContext\
  \ != nil) {\n        return _managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n    if (!coordinator) {\n \
  \       return nil;\n    }\n\n    _managedObjectContext = [[NSManagedObjectContext\
  \ alloc]\n        initWithConcurrencyType:NSMainQueueConcurrencyType];\n    [_managedObjectContext\
  \ setPersistentStoreCoordinator:coordinator];\n\n    return _managedObjectContext;\n\
  }\n```\n\n## 在 OS X 的 AppDelegate 中设置 Core Data 栈\n\n这段代码来自 Xcode 内置的 OS X Cocoa\
  \ 应用程序模板。它包含的声明提供了与 Swift 中延迟声明类似的功能。这些声明用于以下内容：\n\n* `applicationDocumentsDirectory`。这是你的数据模型将放置在应用程序内部的目录。\n\
  * `managedObjectModel`\n* `persistentStoreCoordinator`\n* `managedObjectContext`\n\
  \n#### 在 OS X 中创建 `applicationDocumentsDirectory`\n\n此代码与 iOS 版本不同，以反映文件结构不同的事实。其目的是相同的。粗体显示的代码是根据你设置项目时的设置创建的。如果你更改了开发者\
  \ ID 或项目名称，可能需要更改此处。\n\n```objective-c\n- (NSURL *)applicationDocumentsDirectory\
  \ {\n    // The directory the application uses to store the Core Data store file.\n\
  \    // This code uses a directory named \"com.champlainarts.OSXProjectOC\" in\n\
  \    // the user's Application Support directory.\n\n    // 第 10 章 ■ 在 iOS 和 Mac\
  \ 中使用 SQLite/Core Data 与 Objective-C\n    NSURL *appSupportURL = [[[NSFileManager\
  \ defaultManager]\n        URLsForDirectory:NSApplicationSupportDirectory inDomains:NSUserDomainMask]\n\
  \        lastObject];\n\n    return [appSupportURL\n        URLByAppendingPathComponent:@\"\
  com.champlainarts.OSXProjectOC\"];\n}\n```\n\n#### 在 OS X 中创建 `managedObjectModel`\n\
  \n除了项目名称外，此代码与 iOS 版本相同。iOS 版本中粗体显示的代码在 OS X 中会更改为以下内容（假设你的项目名称是合适的）。\n\n```objective-c\n\
  NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"SingleViewAppOC\"\n \
  \                                          withExtension:@\"momd\"];\n```\n\n\n\n\
  #### 在 OS X 中创建 `persistentStoreCoordinator`\n\nXcode 会为你创建这个（或者如果你正在构建自己的 Core\
  \ Data 栈，你也可以自己创建）。注意加粗的那行：它取自你的项目设置，你需要为你自己的项目更改它。\n\n```objective-c\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n    // 应用程序的持久化存储协调器。此实现\n    // 创建并返回一个协调器，已为应用程序\n\
  \    // 添加了存储。（如果需要，会创建存储目录。）\n    if (_persistentStoreCoordinator) {\n        return\
  \ _persistentStoreCoordinator;\n    }\n\n    NSFileManager *fileManager = [NSFileManager\
  \ defaultManager];\n    NSURL *applicationDocumentsDirectory = [self applicationDocumentsDirectory];\n\
  \    BOOL shouldFail = NO;\n    NSError *error = nil;\n    NSString *failureReason\
  \ = @\"创建或加载应用程序保存数据时出错。\";\n\n    // 确保应用程序文件目录存在\n    NSDictionary *properties\
  \ = [applicationDocumentsDirectory\n        resourceValuesForKeys:@[NSURLIsDirectoryKey]\
  \ error:&error];\n\n    if (properties) {\n        if (![properties[NSURLIsDirectoryKey]\
  \ boolValue]) {\n            failureReason = [NSString stringWithFormat:\n     \
  \           @\"预期是一个存储应用程序数据的文件夹，却找到了一个文件 (%@)。\",\n                [applicationDocumentsDirectory\
  \ path]];\n            shouldFail = YES;\n        }\n    } else if ([error code]\
  \ == NSFileReadNoSuchFileError) {\n        error = nil;\n        [fileManager createDirectoryAtPath:[applicationDocumentsDirectory\
  \ path]\n            withIntermediateDirectories:YES attributes:nil error:&error];\n\
  \    }\n\n    if (!shouldFail && !error) {\n        NSPersistentStoreCoordinator\
  \ *coordinator = [[NSPersistentStoreCoordinator alloc]\n            initWithManagedObjectModel:[self\
  \ managedObjectModel]];\n        NSURL *url = [applicationDocumentsDirectory\n \
  \           URLByAppendingPathComponent:@\"OSXCoreDataObjC.storedata\"];\n     \
  \   if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil\n\
  \            URL:url options:nil error:&error]) {\n            coordinator = nil;\n\
  \        }\n        _persistentStoreCoordinator = coordinator;\n    }\n\n    if\
  \ (shouldFail || error) {\n        // 报告我们遇到的任何错误。\n        NSMutableDictionary\
  \ *dict = [NSMutableDictionary dictionary];\n        dict[NSLocalizedDescriptionKey]\
  \ = @\"初始化应用程序保存数据失败\";\n        dict[NSLocalizedFailureReasonErrorKey] = failureReason;\n\
  \        if (error) {\n            dict[NSUnderlyingErrorKey] = error;\n       \
  \ }\n        error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999 userInfo:dict];\n\
  \        [[NSApplication sharedApplication] presentError:error];\n    }\n\n    return\
  \ _persistentStoreCoordinator;\n}\n```\n\n#### 在 OS X 中创建 `managedObjectContext`\n\
  \n这段代码与 iOS 中的相同。\n\n### 第 10 章：在 Objective-C（iOS 和 Mac）中使用 SQLite/Core Data\n\n\
  ## 在 iOS 中创建获取请求\n\n在 iOS 中，标准做法是在应用委托中创建 Core Data 栈，如本章前面“在 iOS 的 AppDelegate\
  \ 中设置 Core Data 栈”和“在 OS X 的 AppDelegate 中设置 Core Data 栈”所示。除了 Core Data 栈，你通常还使用获取请求来将数据从持久化存储提取到托管对象上下文中。（在\
  \ OS X 上，你使用绑定而不是视图控制器和获取请求。）\n\n这段代码相当常见。这里，它用于获取具有给定名称（`Event`）的所有实体。实体描述是从托管对象上下文中获取的（该行以粗体显示），而获取结果控制器是使用对该托管对象上下文的引用创建的。为\
  \ `fetchedResultsController` 创建了一个名为 `_fetchedResultsController` 的支持变量。这种设计模式经常被使用：如果支持变量（以下划线开头）存在，则在请求时返回它。如果不存在，则创建获取结果控制器，并将带下划线的支持变量设置为它，以便下次需要时使用。\n\
  \n```objective-c\n- (NSFetchedResultsController *)fetchedResultsController {\n \
  \   if (_fetchedResultsController != nil) {\n        return _fetchedResultsController;\n\
  \    }\n\n    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  \
  \  // 根据需要编辑实体名称。\n    // ...\n}\n```\n\n\n\n# 第 10 章 ■ 在 Objective-C（iOS 与 Mac）中使用\
  \ SQLite/Core Data\n\n```\nNSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  Event\" inManagedObjectContext:self.managedObjectContext];\n[fetchRequest setEntity:entity];\n\
  \n// 将批处理大小设置为合适的数值。\n[fetchRequest setFetchBatchSize:20];\n\n// 根据需要编辑排序键。\nNSSortDescriptor\
  \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"timeStamp\" ascending:NO];\n\
  [fetchRequest setSortDescriptors:@[sortDescriptor]];\n\n// 根据需要编辑分区名键路径和缓存名称。\n\
  // 分区名键路径为 nil 表示“无分区”。\nNSFetchedResultsController *aFetchedResultsController =\
  \ [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
  \ sectionNameKeyPath:nil cacheName:@\"Master\"];\naFetchedResultsController.delegate\
  \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n\nNSError\
  \ *error = nil;\nif (![self.fetchedResultsController performFetch:&error]) {\n \
  \   // 请用适当的错误处理代码替换此实现。\n    // abort() 会导致应用程序生成崩溃日志并终止。在\n    // 发布的应用程序中不应使用此函数，尽管在\n\
  \    // 开发阶段可能有用。\n    NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n   \
  \ abort();\n}\nreturn _fetchedResultsController;\n}\n```\n\n如果你按照第 8 章所述在数据模型中创建了获取请求，就可以用它来创建一个\
  \ `fetchedResultsController`。\n\n## 保存托管对象上下文\n\n虽然在 iOS 和 OS X 中这基本相同，但仍存在一些细微差别。\n\
  \n### 在 iOS 中保存\n\n```\n- (void)saveContext {\n    NSManagedObjectContext *managedObjectContext\
  \ = self.managedObjectContext;\n    if (managedObjectContext != nil) {\n       \
  \ NSError *error = nil;\n        if ([managedObjectContext hasChanges] && ![managedObjectContext\
  \ save:&error]) {\n            // 请用适当的错误处理代码替换此实现。\n            // abort() 会导致应用程序生成崩溃日志并\n\
  \            终止。在\n            // 发布的应用程序中不应使用此函数，尽管在\n            // 开发阶段可能有用。\n\
  \            NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n            abort();\n\
  \        }\n    }\n}\n```\n\n### 在 OS X 中保存\n\n在 OS X 中，借助菜单栏及其命令，你经常使用“存储”操作来保存数据。以下是\
  \ OS X 中一个典型的 `saveAction` 函数。\n\n```\n- (IBAction)saveAction:(id)sender {\n   \
  \ // 执行应用程序的保存操作，即向应用程序的\n    托管对象上下文发送\n    // save: 消息。遇到的任何错误都会\n    // 呈现给用户。\n\
  \    if (![[self managedObjectContext] commitEditing]) {\n        NSLog(@\"%@:%@\
  \ 在存储前无法提交编辑\", [self class], NSStringFromSelector(_cmd));\n    }\n    NSError *error\
  \ = nil;\n    if ([[self managedObjectContext] hasChanges] && ![[self managedObjectContext]\
  \ save:&error]) {\n        [[NSApplication sharedApplication] presentError:error];\n\
  \    }\n}\n```\n\n## 使用 NSManagedObject\n\n在任何使用 Core Data 的应用程序中，你都需要一个 Core Data\
  \ 栈，而且每次创建它的方式几乎相同，只是你需要自定义项目名称。（如果你是从某个内置的 Xcode 模板构建应用程序，可能会有一个 Core Data 复选框，用于自动插入\
  \ Core Data 栈代码以及你的项目名称。）\n\n那么你的数据呢？数据将由你的 Core Data 栈管理，但它肯定需要特殊的编码。事实上，就像 Core\
  \ Data 的许多方面一样，SQLite 语法是在后台为你处理的。你已经有了一个数据模型（可能是模板自带的，也可能是你修改过的），如果你还没有，你需要通过“文件”\
  \ ➤ “新建” ➤ “文件”来创建一个。\n\n**注意** 在 OS X 中，通常不使用视图控制器；而是使用绑定（bindings）。该主题在 developer.apple.com\
  \ 上有介绍。\n\n![](img/index-122_1.jpg)\n\n数据模型中的每个实体都将在运行时转换为一个类的实例。每个这样的实例都是 `NSManagedObject`\
  \ 或其子类的实例。本节将介绍其基础知识。\n\n本节中的示例使用了本书前面用过的两个实体：`User` 和 `Score`。图 10-1 在 Xcode Core\
  \ Data 模型编辑器的图表视图中显示了它们。\n\n**图 10-1.** 数据模型中的 User 和 Score 实体\n\n### 创建新的 NSManagedObject\
  \ 实例\n\n有几种方法可以创建新的 Core Data 实例。最常见的方法之一可以在 Objective-C 的 Master-Detail Application\
  \ 模板中找到。以下是其中使用的代码。它连接到 `MasterViewController` 视图中的一个 + 号按钮，但界面上的任何对象都可以连接到类似的操作。（这发生在\
  \ `MasterViewController.ViewDidLoad` 中。）\n\n```\n- (void)insertNewObject:(id)sender\
  \ {\n    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];\n\
  \    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]\
  \ entity];\n    NSManagedObject *newManagedObject = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:context];\n    NSError *error = nil;\n    if (![context\
  \ save:&error]) {\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }\n}\n```\n\n无论何时创建新的 `NSManagedObject`，你都会使用这段代码（或非常类似的代码）。这段代码的开头只是定位托管对象上下文。它可能是你所使用类中的一个属性。如果不是，你可能需要添加一个局部属性，该属性在类实例化或实例从故事板加载时被创建（或传递）。\n\
  \n接下来，你创建一个实体描述，它是 `NSEntityDescription` 的子类。它封装了你在数据模型中管理的实体信息。在此处显示的代码中，实体描述（称为\
  \ `entity`）是从获取结果控制器中检索到的。\n\n代码的第四行实际创建了一个名为 `newManagedObject` 的新实例。这行代码值得仔细研究。它实际上非常简单，但却是\
  \ Core Data 的核心。\n\n```\nNSManagedObject *newManagedObject = [NSEntityDescription\
  \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
  ```\n\n你使用 `NSEntityDescription` 的类方法 `insertNewObjectForEntityForName` 来创建新对象。你需要要创建的新对象的名称，以及要将其放入的托管对象上下文。\n\
  \n如果你知道要创建的对象的名称，可以省略创建 `entity` 的那一行（此代码的第二行），并将这行代码改为按名称引用它。\n\n```\nNSManagedObject\
  \ *newManagedObject = [NSEntityDescription insertNewObjectForEntityForName: \"User\"\
  \ inManagedObjectContext:context];\n```\n\n显然，这段代码的可重用性较差，但它可以工作。\n\n创建完这个新的托管对象后，你需要保存插入它的托管对象上下文：\n\
  \n```\nNSError *error = nil;\nif (![context save:&error]) {\n    NSLog(@\"未解决的错误\
  \ %@, %@\", error, [error userInfo]);\n    abort();\n}\n```\n\n正如模板代码中的注释以及本书其他地方所述，在发布的应用程序中不要使用\
  \ `abort()`。而应捕获错误并记录它，让用户知道存在问题（如果用户可以解决的话），或者直接在代码中修复问题。\n\n这就是创建一个新的托管对象所需的全部步骤。\n\
  \n如果你想为数据模型中为实体定义的属性设置值，你可以使用键值编码（key-value coding）来实现，就像下面这样的代码行：\n\n\n# Core Data\
  \ 中的 NSManagedObject 子类化\n\n```objective-c\n[newManagedObject setValue:@\"New User\"\
  \ forKey:@\"name\"];\n```\n如果为属性设置的值无效，托管对象上下文的保存将会失败。特别是在 Xcode 数据模型编辑器中声明了验证规则时，这种情况更容易发生。在完善验证规则之前，您可能需要适当地处理错误。（当然，如果允许用户输入，可能会发生大量用户生成的错误。）\n\
  \n■ **提示** 如果您真的想深入了解 Core Data，请研究幕后必须生成的 SQLite 语法以实现此处展示的代码。它确实会被执行，但您无需手动输入。\n\
  \n## 使用 NSManagedObject 的子类\n\n您可以创建 `NSManagedObject` 的子类，而不是直接使用 `NSManagedObject`\
  \ 实例。如果您创建子类（过程将在下文描述），主要好处是，您可以使用如下代码为 `newManagedObject` 设置值，而不是像上一节那样使用键值编码 `setValue:forKey:`：\n\
  \n```objective-c\nnewManagedObject.name = \"New User\"\n```\n\n使用 Xcode Core Data\
  \ 模型编辑器可以轻松创建 `NSManagedObject` 的新子类。以下是涉及的步骤。从打开的数据模型开始，如图 10-1 所示。（查看图表视图还是表格视图并不重要。）选择“编辑器”\
  \ ➤ “创建 NSManagedObject 子类”以打开如图 10-2 所示的窗口。\n\n![选择数据模型](img/index-125_1.jpg)\n\
  \n***图 10-2. 选择您的数据模型***\n\n单击“下一步”后，选择要子类化的实体，如图 10-3 所示。默认情况下，在图表或表格视图中选中的实体（如图\
  \ 10-1 所示）会在此处被选中。您不必为所有实体创建子类。有时，您会选择为更复杂的实体创建子类，而将其他实体保留为 `NSManagedObject` 实例。\n\
  \n![选择实体步骤 1](img/index-126_1.jpg)\n\n![选择实体步骤 2](img/index-126_2.jpg)\n\n***图 10-3.\
  \ 选择要子类化的实体***\n\n单击“下一步”，选择保存新文件的位置，如图 10-4 所示。同时选择子类文件的编程语言。（您可以混合使用 Swift 和 Objective-C。）\n\
  \n***图 10-4. 选择保存子类文件的位置和所需语言***\n\n![选择保存位置和语言](img/index-127_1.jpg)\n\n您应仔细检查组（用于导航器）和目标，但通常它们都是正确的。“使用标量属性”选项需要稍作解释。默认情况下，您的实体属性会使用原生\
  \ Cocoa 或 Cocoa Touch 类型转换为 Swift 或 Objective-C 属性。因此，`Double` 会被转换为 `NSNumber`。`NSNumber`\
  \ 是比 `Double` 强大得多的构造（首先，它是一个类）。如果您大量使用此类属性，有时 `NSNumber` 的强大功能反而会带来不便。选择使用标量类型将使用基本的平台（非对象）类型，这可能会使您的代码更简单。\n\
  \n如果您的项目主要用 Swift 编写，而您选择用 Objective-C 创建子类，系统可能会询问您是否要在两种语言之间创建桥接头文件，如图 10-5 所示。是的，您需要这样做。\n\
  \n***图 10-5. 您可以选择创建桥接头文件***\n\n在混合语言项目中，如果没有被询问关于桥接头文件，请不要担心。它只需要创建一次，因此第一次之后就不会再被询问。\n\
  \n桥接头文件会在您的项目构建设置中为您创建，如图 10-6 所示。您无需进行任何进一步操作。\n\n![包含桥接头的构建设置](img/index-128_1.jpg)\n\
  \n***图 10-6. 包含桥接头的构建设置***\n\n如果您创建的是 Objective-C 子类，Xcode 将为您选择的每个实体创建两个文件。与 Swift\
  \ 不同，它们将是头文件（.h）和实现文件（.m）。\n\n第一个是接口文件，如下所示：\n\n```objective-c\n#import \"User.h\"\
  \n\nNS_ASSUME_NONNULL_BEGIN\n\n@interface User (CoreDataProperties)\n\n@property\
  \ (nullable, nonatomic, retain) NSString *email;\n\n@property (nullable, nonatomic,\
  \ retain) NSString *name;\n\n@property (nullable, nonatomic, retain) NSSet<NSManagedObject\
  \ *> *scores;\n\n@end\n\n@interface User (CoreDataGeneratedAccessors)\n\n- (void)addScoresObject:(NSManagedObject\
  \ *)value;\n\n- (void)removeScoresObject:(NSManagedObject *)value;\n\n- (void)addScores:(NSSet<NSManagedObject\
  \ *> *)values;\n\n- (void)removeScores:(NSSet<NSManagedObject *> *)values;\n\n@end\n\
  \nNS_ASSUME_NONNULL_END\n```\n\n这与 Swift 中的扩展文件不同。首先，它被 `NS_ASSUME_NONNULL_BEGIN`\
  \ 和 `NS_ASSUME_NONNULL_END` 包裹。这些宏实现了 Objective-C 中的一个特性，该特性会反馈到 Swift 中。在带有这些括号的节内，所有指针都被假定为非空（`non-null`），因此在代码中依赖此假定是安全的。（从\
  \ Swift 使用时，这些属性将被转换为使用 `!` 的强制解包属性。）在 `.h` 文件内部，您将看到类别 `CoreDataProperties` 的属性声明，其中声明了\
  \ `User` 实体的两个属性（`email` 和 `name`）。关系（`scores`）以 `NSSet` 的形式呈现。请注意，由于此节被括号标记为非空，因此属性需要显式标记为可空（`nullable`）。\n\
  \n这看起来可能是自相矛盾的，但随着代码的增长，您会发现将可空性作为例外而非默认值，会使您的代码更简洁、更健壮。\n\n配套的 `.m` 文件如下所示：\n\n\
  ```objective-c\n#import \"User+CoreDataProperties.h\"\n\n@implementation User (CoreDataProperties)\n\
  \n@dynamic email;\n\n@dynamic name;\n\n@dynamic scores;\n\n@end\n```\n\n`@dynamic`\
  \ 表示承诺该属性将在运行时（当从持久存储中检索时）被填充。\n\n这就是在 Objective-C 中创建 `NSManagedObject` 子类的全部过程。\n\
  \n■ **注意** 要了解如何使用您的子类，请参见第 12 章。\n\n## 总结\n\n本章向您展示了如何在 OS X 和 iOS 上使用 Objective-C（Cocoa\
  \ 和 Cocoa Touch 的原始语言）来使用 SQLite/Core Data。\n\n## 第 11 章：在 PHP 网站中使用简单数据库\n\n本书是关于\
  \ SQLite 的入门介绍，但即使只是入门，SQLite（以及作为其关键组件的 SQL 本身）的基础知识也并非特别复杂。\n\n确实，当您开始构建功能越来越多（以及越来越健壮的错误检查）的复杂应用时，您的代码会变得更长、更复杂。对许多人来说，关系数据库世界具有吸引力的地方在于，基本元素就是基础。您以各种组合方式使用和重用它们来构建越来越强大的应用。\n\
  \n《SQLite 入门指南》的最后两章为您提供了两个基于 SQLite 构建的应用。在本章中，您将看到如何在 SQLite 上构建一个基于 PHP 的应用，在第\
  \ 12 章中，您将看到如何为 iOS 构建一个大致可比的应用。\n\n# 第 11 章：将简单数据库用于 PHP 网站\n\n本章选择的应用程序展示了人们在集成\
  \ PHP 和 SQLite 时希望使用的许多功能。具体来说，您将了解如何通过 PHP 代码和 SQLite 检索及输入数据，并了解如何处理 SQLite 数据库数据与\
  \ PHP 的集成，例如如何根据从数据库中检索的数据构建下拉菜单（HTML `SELECT` 元素）。\n\n## 回顾数据库\n\n本章的数据与之前本书中使用的相同关系型数据，但有一些您应该注意的微调。本节将对此进行描述。\n\
  \n该数据库由三个表组成，可用于跟踪人员的值。这里的命名暗示它们可能用于跟踪用户的分数，但这只是一种可能性。如果您重用这些表，可以随意重命名属性。此外，请注意，在绝大多数情况下，*属性（attribute）*、*属性（property）*、*列（column）*\
  \ 和 *字段（field）* 可互换使用，指代数据库中存储的数据。*属性（attribute）* 常用于数据库，*属性（property）* 用于指代面向对象编程中的对象。*列（column）*\
  \ 在关系表的上下文中使用，而 *字段（field）* 的用法可以追溯到纸质表格。\n\n### 关于命名约定的说明\n\n■ **注意**：本章相对于之前版本的最大变化是标准化了大小写：表名大写，属性、关系名不大写。当一个表包含多个条目（例如\
  \ `User` 表中的用户）时，表名大写且为单数。这些是苹果 `Core Data` 框架强制执行的样式，与许多人使用的最佳实践一致。\"许多人\"并不意味着\"\
  所有人\"：特别是关于用户表是称为 `User` 还是 `Users`，有两种逻辑方法可取，并且有很多人强烈支持其中一种或另一种。对许多人来说，采用一种方法或另一种方法并不是真正的解决方案，因为我们并非在孤立的项目上工作。当客户\
  \ A 坚持使用单数名称而客户 B 坚持使用复数名称时，您通常会采取最实用的方法（使用每个客户想要的样式）。\n\n#### User 表\n\n第一个表 `User`\
  \ 跟踪人员信息。在本演示中设置，它包含姓名和电子邮件地址。它为每一行使用一个唯一的 `rowid`。`rowid` 由 SQLite 生成。如表 11-1 所示。\n\
  \n**表 11-1. User 表**\n\n| rowid | 名称 | 电子邮件 |\n| :--- | :--- | :--- |\n| 1 | Rex\
  \ | rex@champlainarts.com |\n| 2 | Anni | anni@champlainarts.com |\n| 3 | Toby |\
  \ toby@champlainarts.com |\n\n#### Score 表\n\n`Score` 表跟踪用户的值。它使用 `userid` 属性引用相关用户。这与\
  \ `User` 表中相关记录的 `rowid` 属性相匹配。\n\n这样，您可以连接 `Score` 和 `User` 表，以获取个人的分数和姓名（见表 11-2）。\n\
  \n**表 11-2. Score 表**\n\n| userid | 分数 |\n| :--- | :--- |\n| 1 | ![](img/index-132_1.jpg)\
  \ |\n| 2 | 500 |\n| 3 | 750 |\n\n当 `Score` 和 `User` 表基于 `userid`/`rowid` 关系关联时，可以创建如表\
  \ 11-3 所示的表。请注意，这是使用 `SELECT` 语句中的 `WHERE` 子句创建的：该表仅在运行时存在。\n\n**表 11-3. 关联的用户和分数表**\n\
  \n| 名称 | 分数 |\n| :--- | :--- |\n| Rex | 1000 |\n| Anni | 500 |\n| Toby | 750 |\n\
  \n如果您想使用 SQLPro for SQLite 等工具构建表，当 `Score` 表高亮显示以便您可以看到其行（`userid` 和 `score`）时，数据库将如图\
  \ 11-1 所示。默认情况下，此显示中不显示 `rowid`（SQLite 生成的主键）。另外，请注意表是按字母顺序呈现的。\n\n**图 11-1. Score\
  \ 表及其行**\n\n![](img/index-133_1.jpg)\n\n\n## 预览网站\n\n在图 11-2 中，您可以看到 `User` 表及其行。\n\
  \n**图 11-2. `User` 表及其行**\n\n本章展示如何构建一个 PHP 网站来查询和更新数据库。\n\n这是一个简单的过程，但它涵盖了集成 PHP\
  \ 和 SQLite 最常用的许多方面。首先，您可以看到一个简单的页面（其中包含的诊断信息将在本章中解释）。其核心是下拉列表，允许您选择一个用户。这是通过 HTML\
  \ `SELECT` 元素实现的，下拉列表的值来自数据库。\n\n图 11-3 显示了该应用程序的外观。它包含诊断消息。\n\n（您将在本章后面看到代码，并且可以按照引言中的描述下载它。）\n\
  \n![](img/index-134_1.jpg)\n\n**图 11-3. 从数据库创建下拉列表**\n\n在图 11-4 中，您此时可以看到表中的数据。（那些值为\
  \ 99 的数据是用于调试的。您将提供自己的数据。）\n\n![](img/index-135_1.jpg)\n\n**图 11-4. 显示数据**\n\n在图\
  \ 11-4 中，您可以看到一个用于添加更多数据的按钮。图 11-5 显示了结果。（别担心，代码将在本章后面展示：在添加数据的确认背后，有很多事情在幕后进行。）\n\
  \n![](img/index-136_1.jpg)\n\n**图 11-5. 您可以添加新数据**\n\n## 实现 PHP 网站\n\n由于 Web 被设计为无状态结构，每个网页都是自包含的。\n\
  \n如今，有很多策略用于在网站中构建连续性，其中包括 PHP 会话、`cookie`，或者将数据从一个 PHP 页面传递到另一个页面（通常通过 `POST` 请求），但基本上每个页面仍然是一个无状态实体。这意味着当您访问一个页面（即，当您运行生成该页面的\
  \ PHP 代码时），页面是根据 PHP 文件中可能从数据库检索的数据生成的。\n\n在典型的模式中，用户单击按钮或使用另一个界面元素来加载来自 PHP 代码的新页面。为了实现这一点，关键数据从第一页传递到第二页，或者，如前所述，相关数据可能被缓存在\
  \ `cookie` 中或在参数中传递。\n\n> **注意**：这里使用的示例名为 `phpsql`。各个文件编号为 1、2 和 3。如果您在移动设备上阅读，根据您使用的字体，文件名可能看起来不像是\
  \ `phpsql` 后跟一个数字。在某些字体中，它可能看起来像是 `phpsq` 后跟一个两位数（字母 `l` 有时看起来像数字 1）。\n\n因此，本示例中使用了三个\
  \ PHP 文件。\n\n*   `phpsql1.php` 构建了如图 11-3 所示的页面。它使用 SQLite 数据库调用来检索下拉菜单的值。当您单击“提交”时，关键值（在本例中是所选用户）会传递到下一页。\n\
  *   `phpsql2.php` 构建了如图 11-4 所示的页面。它接收所选用户，然后查询数据库以获取该用户的值。正如您将看到的，这个查询连接了表 11-1\
  \ (`User`) 和表 11-2 (`Score`)。名字来自 `User`，分数来自 `Score`。这个连接是通过匹配 `User` 表中的 `rowid`\
  \ 和 `Score` 表中的 `userid` 来处理的（您将在本章后面看到这一点）。如果单击“添加分数”按钮，控制权将传递到下一页。\n*   `phpsql3.php`\
  \ 为图 11-3 中选择的用户添加数据。为此，`phpsql2.php` 将所选的 `userid`/`rowid` 传递给 `phpsql3.php`。因为\
  \ `User` 和 `Score` 表...\n\n\n\n# 在 PHP 网站中使用简单数据库\n\n## 查看基础 PHP/SQLite 结构\n\n所有\
  \ PHP/SQLite 文件都将使用相同的基础结构。根据你的偏好，尤其是在处理需要传递的 HTML 内容时，你可能会使用不同的 PHP 语法（选择是停留在 PHP\
  \ 世界中使用 `echo`，还是暂时离开 PHP 代码段，仅使用 HTML，直到需要切回 PHP）。许多人两种风格都会使用。\n\n以下是基础结构。（显然，你通常需要为\
  \ `HEAD` 元素和文件的其他类似部分添加自己的代码。）此文件中保留了诊断代码。在确定控制流正确之前，保留它们是最简单的。（另外，请记住，`or die`\
  \ 语法是健壮错误捕获和良好用户界面的占位符。）\n\n通过在 `User` 表的 `rowid` 和 `Score` 表的 `userid` 上进行连接，它们具有相同的值，因此传递哪个值给\
  \ `phpsql3.php` 并不重要。每个文件都将在以下部分中描述。你将首先看到完整代码，然后是对关键组件的讨论。\n\n```php\n<html>\n\
  <head>\n</head>\n<body>\n<?php\n$db = 'sqlite:sqlitephp.sqlite';\n// 这应该自定义为你的数据库名称。sqlite:\
  \ 是 PHP\n// 数据对象（PDO）语法的一部分。它必须位于文件名之前。\n$sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\"\
  );\necho \"<p>PDO 连接成功</p>\";\n$query = $sqlite->prepare; // 在此处插入你的查询\n// 这应该自定义为你想运行的查询。在本章末尾，你将看到另一种可以使用的模式。除了\
  \ prepare 和 execute，你可以直接使用 PDO query 语句执行单个查询。\necho \"<p>Prepare 准备成功</p>\";\n\
  $query->execute() or die (\"无法执行\");\necho \"<p>Execute 执行成功</p>\";\n$result = $query->fetchAll()\
  \ or die (\"无法 fetchAll\");\necho \"fetchAll 获取成功<br />\"; // 用于调试\n// 记住，fetchAll\
  \ 获取的是查询的所有数据——而不是表中的所有数据。\n// 对结果进行处理。foreach 只是一个例子。\nforeach ($result as $row)\
  \ {\n    echo $row['rowid'], \" , \", $row['name'];\n}\n// 这部分代码绝对需要为每个用途进行自定义。这里你看到的只是一个重复显示已检索数据的诊断信息。在此处使用类似这样的代码通常很有用。\n\
  ?>\n<h1>选择用户</h1>\n<form method=\"post\" action=\"phpsql2.php\">\n// 使用链中下一个 PHP\
  \ 文件（用户的下一个页面）的名称来自定义此处。\n<?php\n// 这里是你整合 PHP 和 SQLite 的地方——按你的意愿自定义。\necho '<input\
  \ type=\"submit\" value=\"提交\">';\necho '</form>';\n// 如果你使用表单，请确保正确结束它并添加提交按钮。\n\
  // 注意，你可以如这里所示，在 HTML 中开始表单并在 PHP 中完成它。\n?>\n</body>\n</html>\n```\n\n### 构建下拉选择列表\
  \ (`phpsql1.php`)\n\n以下是 `phpsqlite.php` 的完整列表。注释和说明穿插其中，但请记住参考前面的部分“查看基础 PHP/SQLite\
  \ 结构”以获取一般细节。此代码构建了如图 11-3 所示的页面。\n\n```php\n<html>\n<head>\n</head>\n<body>\n<?php\n\
  $db = 'sqlite:sqlitephp.sqlite';\n$sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\"\
  );\necho \"<p>PDO 连接成功</p>\";\n$query = $sqlite->prepare (\"select name, rowid from\
  \ User;\") or die (\"<h1>无法准备查询</h1>\");\n// 查询将是：SELECT name, rowid FROM User;\n\
  echo \"<p>Prepare 准备成功</p>\";\n$query->execute() or die (\"无法执行\");\necho \"<p>Execute\
  \ 执行成功</p>\";\n$result = $query->fetchAll() or die (\"无法 fetchAll\");\necho \"fetchAll\
  \ 获取成功<br />\";\n?>\n<h1>选择用户</h1>\n<form method=\"post\" action=\"phpsql2.php\"\
  >\n<?php\necho \"<select name='userid'>\";\nforeach ($result as $row) {\n    echo\
  \ \"<option value = \".$row['rowid'].\">\".$row['name'].\"</option>\";\n}\necho\
  \ '<input type = \"hidden\" name = \"name\" value = '.$row[\"name\"].'>';\n// 隐藏字段非常重要：它是连接到下一个\
  \ PHP 文件 (`phpsql2.php`) 的链接。\n// `name` 的值将从该文件开头的 `POST` 变量中检索。\n// `userid` 以\
  \ `userid` 作为名称从 `SELECT` 元素传入，而 `username`（用于下一个页面的标题）在此处传入。`SELECT` 对用户可见，但这个隐藏字段不可见。\n\
  echo '</select> <br >';\necho '<input type=\"submit\" value=\"提交\">';\necho '</form>';\n\
  // `SELECT` 元素的名称是 `userid`。当下一个文件解包 `POST` 值时，它将是下拉菜单中所选项的键。你可能想自定义提交按钮。\n?>\n\
  </body>\n</html>\n```\n\n## 显示所选数据 (`phpsql2.php`)\n\n这是构建如图 11-4 所示页面的代码。\n\n```php\n\
  <html>\n<head>\n</head>\n<body>\n<?php\nprint \"POST 值<br/>\";\nforeach ($_POST\
  \ as $key => $value) {\n    echo \"$key &nbsp;&nbsp;&nbsp $value <br />\";\n}\n\
  print \"--POST 值结束<br/>\";\n$name = $_POST['name'];\nprint \"name = $name <br/>\"\
  ;\n// 此代码对调试很有用：它打印出所有的 `POST` 键和值。当你对代码满意后，请将其移除。设置局部变量 `$name` 并`不是`用于调试。随后的 print\
  \ 语句是调试用的，但你需要从前一个页面的隐藏字段中获取 `username`，以便在此页面的标题中显示它。你可以在需要时从 `POST` 变量中提取它，但许多人更喜欢在文件开头就加载\
  \ `POST` 变量。\n$db = 'sqlite:sqlitephp.sqlite';\n$sqlite = new PDO($db) or die (\"\
  <h1>无法打开数据库</h1>\");\necho \"<p>PDO 连接成功</p>\";\necho \"userid \".$_POST[\"userid\"\
  ];\n$useridToFind = $_POST['userid'];\necho \"useridToFind = $useridToFind\";\n\
  $query = $sqlite->prepare (\"select name, score from Score s, User u where s.userid\
  \ = u.rowid and $useridToFind = s.userid ORDER BY Score;\") or die (\"<h1>无法准备查询</h1>\"\
  );\necho \"<p>Prepare 准备成功</p>\";\n$query->execute() or die (\"无法执行\");\necho \"\
  <p>Execute 执行成功</p>\";\n$result = $query->fetchAll() or die (\"无法 fetchAll\");\n\
  echo \"fetchAll 获取成功<br />\"; // 用于调试\nforeach ($result as $row) {\n    echo \"\
  <h1>\".$row['name'].\" 的分数</h1>\";\n    $userName = $row['name'];\n    echo $row['name'],\
  \ \" - \", $row['score'];\n}\necho '<form method=\"post\" action=\"phpsql3.php\"\
  >';\necho \"<input type='hidden' name='userid' value=$useridToFind>\";\n// 这是另一个隐藏字段——这次是将\
  \ `userid` 向前传递给下一个 PHP 文件。\necho '<input type=\"submit\" value=\"添加分数\">';\necho\
  \ '</form>';\n?>\n</body>\n</html>\n```\n\n### 添加新数据 (`phpsql3.php`)\n\n现在是向文件添加新数据的时候了。这涉及到将基本的\
  \ SQLite `INSERT` 语法与你之前在 PHP 页面中使用的相同类型的代码结合起来。你应该开始习惯这一点：使用 PHP 和 SQLite 的模式是不断重复的。\n\
  \n以下是 `phpsql3.php` 的代码：\n\n```php\n<html>\n<head>\n</head>\n<body>\n<?php\nprint\
  \ \"POST 值<br/>\";\nforeach ($_POST as $key => $value) {\n    echo \"$key $value\
  \ <br />\";\n}\nprint \"--POST 值结束<br/>\";\n$userid = $_POST[\"userid\"];\nprint\
  \ $userid;\n// 这是相同的代码，提供诊断功能，显示所有 `POST` 变量及其键。另外，请注意 `$userid` 在此设置，以便在本文件后面使用。它是从前一个文件传来的隐藏字段，被复制到一个局部变量中。\n\
  $db = 'sqlite:sqlitephp.sqlite';\n$sqlite = new PDO($db) or die (\"<h1>无法打开数据库</h1>\"\
  );\necho \"<p>PDO 连接成功</p>\";\n$query = $sqlite->prepare (\"INSERT INTO Score ('score',\
  \ 'userid') VALUES (99, $userid);\") or die (\"<h1>无法准备查询</h1>\");\necho \"<p>Prepare\
  \ 准备成功</p>\";\n```\n\n\n\n这是代码的核心部分。注意，`99` 用于调试。在此文件的某处，你会放置你的用户界面代码以提供实际值。你可以在这里实现，也可以在前面的文件（`phpsql2.php`）中提供用户界面，并与“添加分数”按钮结合使用。它可以弹出一个对话框，或者从当前游戏中获取一个值，或者任何对你和用户来说有意义的实现方式。如果你从前一个文件获取值，请将其存储在隐藏字段中，并像其他地方处理\
  \ `userid` 和 `name` 那样传递过来。\n\n`$query->execute()` 或 die (`\"无法执行\"`);\n\n`echo\
  \ \"<p>执行成功</p>\";`\n\n`//$result = $query->fetchAll()` 或 die (`\"无法获取所有结果\"`);\n\
  \n`//echo \"获取所有结果成功<br />\";`\n\n# 第 11 章 ■ 在 PHP 网站中使用简单数据库\n\n这段代码被注释掉了，以提醒你它用于检索数据的情况，而这里*不需要*它。`execute`\
  \ 会成功或失败，但没有单独的结果集。\n\n`?>`\n\n`<h1>已添加新分数</h1>`\n\n`</body>`\n\n`</html>`\n\n##\
  \ 在 PHP 和 PDO 中使用 Try/Catch 块\n\n本文件中使用的成功测试采用了传统的 PHP 和 PDO 编码方式。你可以使用更现代的 `try`/`catch`\
  \ 块编码。（本章前面用作占位符的 `or die` 代码完全可以转换为此风格。）以下是通用模式：\n\n```php\ntry {\n    $sqlite->query(\"\
  DELETE FROM Score WHERE rowid = $rowIDToDelete\");\n} catch (PDOException $e) {\n\
  \    echo $e->getMessage();\n}\n```\n\n这段代码假设“删除”按钮在一个隐藏字段中传递了要删除分数的 `rowid`。请记住，除非你选择提供主键，否则\
  \ `rowid` 由 SQLite 提供。大多数情况下，你会发现使用默认的 SQLite `rowid` 对于这类需要删除特定行的场景很有用。\n\n另外请注意，对于单个查询，这种语法可能比\
  \ `prepare` 和 `execute` 更简单。当你需要重用一个查询时，通常 `prepare` 和 `execute` 更好。\n\n## 总结\n\n\
  本章提供了一个在 PHP 中使用 SQLite 数据库的简单模型。这个过程很简单。\n\n1.  让用户选择要查看的数据。\n2.  显示请求的数据。\n3.\
  \  允许用户添加新数据。\n\n最后一步并非在所有情况下都需要，但另一个步骤经常需要：允许用户删除第 2 步中显示的请求数据。你会在该页面添加一个“删除”按钮。将其放在表单内，并将控制权传递给执行删除操作的另一个页面。\n\
  \n删除操作看起来会非常类似于 `phpsql3.php`，只是你将使用 `DELETE` 而不是 `INSERT`。（前一节“在 PHP 和 PDO 中使用\
  \ Try/Catch 块”中有一个 `DELETE` 语句的例子。）\n\n# 第 12 章 ■ 在核心数据/iOS 应用程序中使用简单数据库\n\n本章将向你展示如何使用核心数据构建一个\
  \ iOS 应用程序，以重新实现第 11 章中展示的 PHP 页面。从核心数据的角度来看，此应用程序的基础知识同样适用于 OS X 和 iOS，但主从应用程序模板是专门为利用\
  \ iOS 的特性而设计的。OS X 有一个单独的特性，即绑定，它也能非常方便地与核心数据协同工作。然而，它与 iOS 上使用的基于表格的界面不同。\n\n现在，是时候继续前进了，使用核心数据/iOS\
  \ 来实现第 11 章中的 PHP 代码。\n\n## 故事仍在继续…\n\n第 8 章提供了使用 Xcode 核心数据模型编辑器的指南。你看到了从 Xcode\
  \ 附带的主从应用程序模板创建新项目所涉及的步骤，然后将其转换为更复杂的数据结构。在本章末尾，你有了两个实体和连接它们的两种关系。图 12-1 显示了在核心数据模型编辑器中，第\
  \ 8 章结束时的数据库情况。（注意，在边栏中同时选择了 `Score` 和 `User`，因此编辑器中显示的属性和关系是这两个实体的并集——用数据库术语来说，就是使用的属性和关系的并集。）\n\
  \n![](img/index-145_1.jpg)\n\n`图 12-1. 从第 9 章的数据库开始`\n\n如果你想跟随本章操作，你可以复制该数据库，也可以下载本章的示例文件。（对于本章，已创建了一个名为\
  \ `Scores` 的新项目，但项目名称完全由你决定。）核心数据模型中的两个实体 `User` 和 `Score` 与你一直使用的表相同。核心数据的一个重要部分是，它会为你管理主键和外键。SQLite\
  \ 确实会为你创建一个主键（`rowid`），除非你明确表示不想使用它。使用 SQLite 的核心数据也会这样做，但这是在幕后发生的。如果你用实用工具打开一个核心数据的\
  \ SQLite 文件，你会看到数据库中的这些键。\n\n> **警告** 你可以查看 SQLite 数据库，但请记住核心数据在管理它们。不要对它们进行修改。在最好的情况下，你会立即破坏你的核心数据项目。在最坏的情况下，你会制造一个定时炸弹，它会在你（和你的用户）最意想不到、最没有时间处理的时候爆炸。如果你已经有一个\
  \ SQLite 数据库并想将其导入核心数据，最简单的方法是导出数据（可能导出为中性格式，如 CSV——或逗号分隔值），然后将其导入到你的核心数据应用程序中。\n\
  \n## 为 Core Data 调整数据模型和模板\n\n需要修改数据模型，使其不再依赖显式键（核心数据在后台使用它们），并且需要对现有代码进行一些微调，使其能正常运行。\n\
  \n### 摆脱键并修订数据模型\n\n第 8 章中使用的数据模型旨在匹配本书中各种项目使用的基础数据。在本章中，可以修改该数据模型，以摆脱核心数据不需要的一些额外负担。具体来说，你可以进行的主要更改是移除主键。核心数据管理自己的主键，因此没有理由重复这个。\n\
  \n“但是等等！”你可能会想。“没有主键，我如何将分数与用户关联起来？”\n\n当精通数据库的开发人员初次使用核心数据时，这个问题非常常见。多年来（对许多人来说是几十年），我们一直依赖那些主键。摆脱它们很困难——这几乎是一种生理上的不适。重要的是要记住，你的目标是关联两个实体——在这里，是将特定分数与特定用户关联起来。一边的主键和另一边的外键使得这成为可能，但它们是一个实现问题：你想做的是将特定分数与特定用户关联起来。\n\
  \n来自第 8 章的数据模型（如图 12-1 所示）省略了这些键——包括主键和外键。缺少这些键在第 8 章中没有造成困难，现在也没有问题。到目前为止使用的数据库表视图被设计为在各种平台上实现，但对于构建核心数据应用程序，可以修改它们以省略不再需要的键。\n\
  \n将 `timeStamp` 改为 `name`\n\n\n\n# 使用 Core Data/iOS 应用的简单数据库\n\n## 修改数据模型\n\n如果你修改了第\
  \ 9 章（`http://dx.doi.org/10.1007/978-1-4842-1766-5_9`）的代码或 Xcode Master-Detail Application\
  \ 模板，你很可能已将 `Event` 实体改为 `User`，并将 `timeStamp` 日期属性替换为 `name` 字符串属性。不一定非要按此顺序操作，但这可能是你已完成的步骤。接着，你可能创建了一个新实体\
  \ `Score`。\n\n另一种可能是将 `Event` 改为 `Score` 并创建 `User` 作为新实体。还有一种情况是删除 `Event`，并为 `User`\
  \ 和 `Score` 都创建新实体。无论哪种方式，你最终应该得到如图 12-1 所示的数据模型。\n\n使用 Xcode 中的查找导航器在项目中搜索 `timeStamp`。如果你已经更改了数据模型，唯一能找到的引用将是\
  \ `MasterViewController` 的 `insertNewObject` 函数中的初始化代码。如果你已将 `timeStamp` 改为 `name`，你将得到以下代码行：\n\
  \n```swift\nnewManagedObject.setValue(NSDate(), forKey: \"name\")\n```\n（这段代码最初是\
  \ `forKey: \"timeStamp\"`）。\n\n新属性是字符串，而不是日期。你可以很容易地解决这个问题：只需使用大多数 `NSObject` 实例（及其子类）的\
  \ `description` 函数。该函数返回实例的字符串值。因此，将该行修改为：\n\n```swift\nnewManagedObject.setValue(NSDate().description,\
  \ forKey: \"name\")\n```\n它仍然会设置当前日期，但这次它将作为字符串（`description`）而非 `NSDate` 实例使用。\n\
  \n### 在你的设备或模拟器上创建新数据库\n\n从模拟器或你的设备上移除该应用。你会收到一个警告，提示将删除其所有数据：这正是你想要做的。你已经更改了数据模型，用先前数据模型创建的数据将无法工作。（Core\
  \ Data 中有迁移例程，但它们超出了 *Introducing SQLite* 的范围。）\n\n### 向应用添加 Score 表和界面\n\n第一步是查看你当前拥有的内容。然后你可以继续添加\
  \ `Score` 详细信息。\n\n#### 确保你可以在 Master View Controller 中用 `+` 添加新用户\n\n如果你在点击主视图控制器左上角的\
  \ `+` 时没有看到时间戳，你可能已将 `Event` 实体替换为 `Score`。控制使用 `+` 创建哪个实体的代码位于 `MasterViewController.swift`\
  \ 的 `fetchedResultController` 中。\n\n以下是相关代码行：\n\n```swift\nlet entity = NSEntityDescription.entityForName\n\
  (\"User\", inManagedObjectContext: self.managedObjectContext!)\n```\n在 Xcode 模板中，它最初是：\n\
  \n```swift\nlet entity = NSEntityDescription.entityForName\n(\"Event\", inManagedObjectContext:\
  \ self.managedObjectContext!)\n```\n经过你的修订，你可能最终得到：\n\n```swift\nlet entity = NSEntityDescription.entityForName\n\
  (\"Score\", inManagedObjectContext: self.managedObjectContext!)\n```\n你需要创建 `User`\
  \ 实体，所以确保在必要时修订了代码。\n\n![image](img/index-148_1.jpg)\n\n#### 使用详细视图\n\n当你现在运行应用时，你将能够向用户列表（原事件列表，但你只是更改了名称）添加新项目。当你添加一个新用户时，你可以点击/轻触它以在详细视图控制器中查看其详细信息，如图\
  \ 12-2 所示。\n\n**图 12-2.** 在详细视图（右）中查看详细信息，主视图在左侧\n\n确保你所看到的内容与图 12-2（至少大致匹配——这是一台横向的\
  \ iPhone 6 Plus）相符。一旦完成，你就可以继续了。\n\n#### 为 Score 使用详细视图\n\n此处的目标是用表控制器替换现有的详细视图，该控制器显示给定用户的所有分数，并让你能够添加新分数。图\
  \ 12-3 展示了你的目标。\n\n![image](img/index-149_1.png)\n\n\n\n# 第 12 章 ■ 在 Core Data/iOS\
  \ 应用中使用简单数据库\n\n***图 12-3.** 用于显示分数的基于表格的详情视图*\n\n■ **注意** 分数值是 Unix 时间戳（自 1970\
  \ 年 1 月 1 日以来的秒数）。\n\nCocoa 和 Cocoa Touch 中的 `NSDate` 可以方便地提供这些值，它们也为测试代码提供了不同的数值。`MasterViewController`\
  \ 继续使用显示为时间戳的值。\n\n这将包含三个步骤：\n\n1.  为 `User` 和 `Score` 创建 `NSObject` 的子类。（这已在第 9\
  \ 章描述。）\n2.  修改 `MasterViewController` 以使用新的子类。\n3.  在故事板中用基于表视图控制器的详情视图控制器替换现有的详情视图控制器。\n\
  4.  修改 `DetailViewController` 中的代码，使其与基于表视图控制器的详情视图控制器配合工作。\n5.  修改 `MasterViewController`，将对当前\
  \ `User` 的引用传递给新的详情视图控制器，以便可以显示其分数。\n\n第一步之后，这些步骤可以按任何顺序完成。\n\n## 使用 NSManagedObject\
  \ 子类\n\n`MasterViewController` 中的代码按照前一节的描述创建了一个新的 `User` 实体。一旦有了可用的子类，你就应该使用它们。在\
  \ `ManagedObjectController` 的 `insertNewObject` 方法中，找到以下代码行：\n\n```swift\nlet newObject\
  \ = NSEntityDescription.insertNewObjectForEntityForName\n(entity.name!, inManagedObjectContext:\
  \ context)\n```\n\n将其改为：\n\n```swift\nlet newUser = NSEntityDescription.insertNewObjectForEntityForName\n\
  (entity.name!, inManagedObjectContext: context) as! User\n```\n\n在接下来的一行中，使用子类而不是键值编码。将\n\
  \n```swift\nnewManagedObject.setValue(NSDate().description, forKey: \"name\")\n\
  ```\n\n替换为使用新子类的以下代码行：\n\n```swift\nnewUser.name = NSDate().description\n```\n\n\
  ### 为 DetailViewController 使用表视图控制器\n\n最简单的方法是从故事板中移除当前的 `DetailViewController`。（如图\
  \ 12-4 所示。）\n\n![](img/index-151_1.jpg)\n\n***图 12-4.** 在故事板中找到详情视图控制器并将其移除*\n\n\
  然后，从窗口右侧的对象库中拖动一个表视图控制器到故事板中。将其放置在原详情视图控制器的位置，并从导航控制器按住 Control 键拖动到新的表视图控制器。对于关系，选择\
  \ *root view controller*（当你松开 Control 键拖动时，系统会立即提示你选择）。\n\n### 修改 DetailViewController\
  \ 的代码\n\n`DetailViewController` 需要进行一些更改。\n\n#### 使用子类\n\n你需要修改代码，使 `DetailViewController`\
  \ 成为 `UITableViewController` 的子类，而不是 `UIViewController`。\n\n将文件顶部的这一行从\n\n```swift\n\
  class DetailViewController: UIViewController {\n```\n\n改为：\n\n```swift\nclass DetailViewController:\
  \ UITableViewController {\n```\n\n同时修改故事板，使新的 `DetailViewController` 的类型是 `DetailViewController`（它可能还不是）。\n\
  \n从 `DetailViewController` 中移除对标签的引用（它被称为 `DetailDescriptionLabel`）。\n\n有一些清理代码的整理工作要做。将\
  \ `detail` 的变量声明改为 `detailUser`（在文件顶部）。\n\n```swift\nvar detailUser: User? {\n \
  \   didSet {\n        // 更新视图。\n        self.configureView()\n    }\n}\n```\n\n\
  ### 修改 configureCell 以使用子类\n\n以下是 `configureCell` 现在的样子，因为它使用了 `Score` 子类。请注意，这里有一些转换过程：给定用户（一种关系）的\
  \ `NSSet` 形式的分数集被转换为数组（以便可以找到表格中第 n 个元素）。然后，检查第 n 个元素（它是一个 `Score`）以找到其分数值（`Score.score`）。\n\
  \n```swift\nfunc configureCell(cell: UITableViewCell, atIndexPath indexPath: NSIndexPath)\
  \ {\n```\n\n\n\n# 第 12 章 ■ 在 Core Data/iOS 应用中使用简单数据库\n\n```swift\nif let scores\
  \ = detailUser?.scores {\n    let scoresArray = scores.allObjects as NSArray\n \
  \   let selectedRowArrayElement = scoresArray[indexPath.row] as! Score\n    let\
  \ scoreForSelectedRow = selectedRowArrayElement.score\n    cell.textLabel!.text\
  \ = \"Score: \" + scoreForSelectedRow.description\n}\n```\n\n### 修改 MasterViewController\
  \ 以将用户传递给 DetailViewController\n\n默认情况下，在主从细节视图列表中选择的对象会被传递给 `DetailViewController`\
  \ 中的 `DetailItem`。该变量被声明为 `AnyObject?`。你需要将其更改为你已创建的新 `detailUser` 变量。在 `prepareForSegue`\
  \ 方法中，将 `controller.detailItem = object` 这一行修改为以下内容：\n\n```swift\ncontroller.detailUser\
  \ = (object as! User)\n```\n\n现在你需要连接表格视图并支持相关协议。这段代码实际上在 `MasterViewController`\
  \ 中，因为你在那里需要管理一个表格视图控制器。你只需将其复制到 `DetailViewController` 即可。\n\n并且你需要在 `DetailViewController`\
  \ 的顶部导入 `CoreData`。\n\n```swift\nimport CoreData\n```\n\n## 总结\n\n现在你已经掌握了一个应用的基础知识，该应用使用了内置的\
  \ SQLite 数据库、Xcode Core Data 模型编辑器和 Core Data 框架来操作数据库，并利用 iOS 的 Cocoa Touch 框架将所有部分整合在一起。\n\
  \n通过 PHP 和 Core Data 的实践以及对 Android 的概述，你可以看到存在一些语言（PHP 等）以及框架（Cocoa Touch 和 Cocoa）和应用程序编程接口（API）（Android），它们都构建在\
  \ SQLite 之上。SQLite 的 SQL 语法被暴露的程度各不相同，从很少（Core Data）到大量（PHP），以及各种中间路径（如 Android）。\n\
  \n重要的是你要理解其中的原理和功能。\n\n同时请记住，在构建任何数据库驱动的应用时，你能放入数据库的功能越多，你需要编写的代码就越少。充分利用验证选项、`GROUP\
  \ BY` 子句以及其他你能找到的一切功能。你编写的代码越少，所花费的时间（编写和调试！）就越少。\n\n## 索引\n\n### **A, B**\n\n-\
