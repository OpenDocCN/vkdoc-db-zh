- fmt: '### Temporary Objects


    堆（heap）的一个适用场景是临时对象，例如临时表和表变量。当我们使用这些对象时，通常创建时没有考虑为其构建聚集索引。结果就是我们使用的堆表比想象中要多。


    回想一下上次创建表变量或临时表的时候。创建对象时的语法是否明确指定了`CLUSTERED`索引或使用了默认配置的`PRIMARY KEY`？如果没有，那么该临时对象就是作为堆创建的。这并不是什么大问题。这在大多数工作负载中很常见——不一定需要改变你的编码实践。正如本节示例所演示的，堆和聚集索引的临时对象在性能上的差异可能微不足道。


    在这个例子中，让我们从一个简单的临时表用例开始。该示例使用`Sales.SalesOrderHeader`表，根据`SalesPersonID`检索几行数据，然后将其插入临时表。这个临时表将用于返回`Sales.SalesOrderDetail`表中所有与临时表结果匹配的行。将使用两个版本的示例来演示在临时表上使用堆或聚集索引如何不影响查询执行。


    在第一个版本示例（如清单[11-1](#338675_3_En_11_Chapter.xhtml#PC1)所示）中，临时表是使用堆构建的。这是人们创建临时对象的常用方法。如图[11-1](#338675_3_En_11_Chapter.xhtml#Fig1)中的执行计划所示，当访问临时表（由箭头标识）时，使用表扫描来访问对象中的行。这种行为在堆中是预期的。因为行是无序的，所以在首先检查所有行之前，无法访问特定的行。为了找到`Sales.SalesOrderDetail`表中与临时表匹配的所有行，执行计划使用了带有索引查找的嵌套循环。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig1_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig1_HTML.jpg)


    图 11-1


    堆临时对象的执行计划


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    ```


    清单 11-1

    使用堆的临时对象


    在脚本的第二个版本中（如清单[11-2](#338675_3_En_11_Chapter.xhtml#PC2)所示），临时表改为在`SalesOrderID`列上创建聚集索引。索引是两个脚本之间的唯一区别。这种差异导致执行计划略有变化。图[11-2](#338675_3_En_11_Chapter.xhtml#Fig2)显示了聚集索引版本的执行计划。两个计划的区别在于，对临时表使用了聚集索引扫描而不是表扫描。虽然这是不同的操作，但两者所做的工作本质上是相同的。在查询执行期间，访问临时对象中的所有行，同时将它们与`Sales.SalesOrderDetail`中的行进行连接。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    ```


    清单 11-2

    使用聚集索引的临时对象


    ### Note


    自 SQL Server 2014 起，表变量也可以拥有聚集和非聚集索引。要求是在声明变量时创建索引。在表变量定义之后，不允许对其进行 DDL 操作。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig2_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig2_HTML.jpg)


    图 11-2

    聚集临时对象的执行计划


    在本章节类似的查询中，堆和聚集索引的临时表执行计划几乎相同。与所有规则一样，可能存在性能不同的例外情况。使用堆可能影响性能的一个好例子是在其执行中利用排序的
    T-SQL 语法。清单[11-3](#338675_3_En_11_Chapter.xhtml#PC3)展示了一个在`WHERE`子句中使用`EXISTS`的具体例子。图[11-3](#338675_3_En_11_Chapter.xhtml#Fig3)显示了该查询的执行计划。在嵌套循环连接解析`EXISTS`谓词之前，数据必须首先排序。在这种情况下，使用堆阻碍了查询的性能，因为堆表强制进行排序操作。对于小型数据集，性能差异可能不明显。随着数据集大小的增加，像包含排序操作这样的小变化会加剧查询的性能影响。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig3_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig3_HTML.jpg)


    图 11-3

    `EXISTS`示例执行计划


    ```sql

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    ```


    清单 11-3

    `EXISTS`示例


    ### Other Heap Scenarios


    通常，其他适合使用堆的场景很少且相隔很远。临时对象有意义的原因在于数据访问的频率较低，相比于构建一个支持性能的结构（例如聚集索引）所需的时间而言。这种情况也可以延伸到暂存表，因为数据在移动到最终目的地之前通常会被插入和修改几次。


    在高插入量的环境中，使用堆来避免维护 B 树的开销似乎是有意义的。这种场景的问题在于，插入带来的收益被访问数据的需求所抵消，这需要其他的非聚集索引，而这些索引又需要维护排序顺序。


    当面临在表上使用堆的情况时，首先应证明聚集索引是数据存储的负担，然后再使用它们。在考虑堆之前，也应考虑较新的索引结构（如聚集列存储索引或内存优化表）是否能提供所需的性能。


    本节的重点是，堆在现实世界中的使用比许多人意识到的更为频繁。尽管大多数实践都反对使用它们，但确实存在一些案例和场景它们是合适的，而在另一些场景中，有无堆都没有关系。随着讨论转向聚集索引，你将会明白为什么通常默认使用聚集索引是更好的主意，而在堆无关紧要（例如大多数临时对象用例）或堆性能优于聚集索引的情况下才使用堆。'
  raw: '### Temporary Objects


    One of the situations in which heaps are useful is with temporary objects, such
    as temporary tables and table variables. When we use these objects, we often create
    them without thinking or considering building a clustered index on them. The result
    is that we use more heaps on tables than we think we do.


    Consider for a moment the last time you created a table variable or a temporary
    table. Did the syntax for the object specifically create a `CLUSTERED` index or
    a `PRIMARY KEY` with the default configuration? If not, then the temporary object
    was created as a heap. This isn’t really a problem. It is common in most workloads—not
    necessarily a call to arms to change your coding practices. As will be demonstrated
    in the examples in this section, the performance difference between a temporary
    object with a heap and a clustered index can be immaterial.


    For this example, let’s start with a simple use case for a temporary table. The
    example uses the table `Sales.SalesOrderHeader` from which we’ll retrieve a few
    rows based on a `SalesPersonID` and then insert them into a temporary table. The
    temporary table will be used to return all rows from `Sales.SalesOrderDetail`
    that match the results in the temporary table. Two versions of the example will
    be used to demonstrate how using a heap or a clustered index on the temporary
    table doesn’t change the query execution.


    In the first version of the example, shown in Listing [11-1](#338675_3_En_11_Chapter.xhtml#PC1),
    the temporary table is built using a heap. This is the method that people often
    use to create temporary objects. As the execution plan in Figure [11-1](#338675_3_En_11_Chapter.xhtml#Fig1)
    shows, when the temporary table is accessed, identified by the arrow, a table
    scan is used to access the rows in the object. This behavior is expected with
    a heap. Since the rows aren’t ordered, there is no way to access specific rows
    without checking all the rows first. To find all the rows in `Sales.SalesOrderDetail`
    that match those in the temporary table, the execution plan uses a nested loop
    with an index seek.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig1_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Execution plan for heap temporary object


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    Listing 11-1

    Temporary Object with Heap

    ```


    In the second version of the script, shown in Listing [11-2](#338675_3_En_11_Chapter.xhtml#PC2),
    the temporary table is created instead with a clustered index on the `SalesOrderID`
    column. The index is the only difference between the two scripts. This difference
    results in a slight change in the execution plan. Figure [11-2](#338675_3_En_11_Chapter.xhtml#Fig2)
    shows the clustered index version of the execution plan. The difference between
    the two plans is that instead of a table scan, there is a clustered index scan
    against the temporary table. While these are different operations, the work done
    by both is essentially the same. During query execution, all rows in the temporary
    object are accessed while joining them to rows in `Sales.SalesOrderDetail`.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    Listing 11-2

    Temporary Object with Clustered Index

    ```


    ### Note


    Since SQL Server 2014, table variables can have both clustered and nonclustered
    indexes on them. The requirement is that the indexes are created when the variable
    is declared. DDL operations are not allowed on table variables after they are
    defined.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig2_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Execution plan for clustered temporary object


    In queries similar to the example in this section, the execution plans for temporary
    tables with heaps and clustered indexes are nearly the same. As with all rules,
    there may be exceptions where performance will differ. A good example of when
    using a heap can affect performance is the T-SQL syntax that leverages a sort
    in its execution. Listing [11-3](#338675_3_En_11_Chapter.xhtml#PC3) shows a specific
    example using `EXISTS` in the `WHERE` clause. Figure [11-3](#338675_3_En_11_Chapter.xhtml#Fig3)
    shows the execution plan for the query. Before the nested loop joins to resolve
    the `EXISTS` predicate, the data must first be sorted. In this case, the use of
    a heap has hindered the performance of the query because the heap table forces
    a sort operation. With small datasets, the performance difference may not be noticeable.
    As the size of the dataset increases, little changes such as the inclusion of
    a sort operation can compound the performance of your queries.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig3_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig3_HTML.jpg)


    Figure 11-3


    EXISTS example execution plan


    ```

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    Listing 11-3

    EXISTS Example

    ```


    ### Other Heap Scenarios


    Generally, the other scenarios where using heaps makes sense are few and far between.
    The reason using temporary objects makes sense is because of the low frequency
    in which the data will be accessed compared to the amount of time it will take
    to create a structure, such as a clustered index, to support the performance.
    This scenario can also carry over the staging tables, since the data is usually
    inserted and modified a couple times before moving it to its final destination.


    In high-insert environments, it might seem to make sense to use heaps to avoid
    the overhead of maintaining the B-tree. The trouble with this scenario is that
    the gains on inserts are offset by the need to access the data, which requires
    other nonclustered indexes, which then have sort orders to maintain.


    When confronted with a situation for using heaps on your tables, first look at
    whether clustered indexes can be proven to be a burden on the storage of the data
    before using them. And before looking to the heap, also consider whether newer
    indexing structures such as clustered columnstore indexes or memory-optimized
    tables provide the performance required.


    The main point of this section is that heaps are used more often in the real world
    than many people realize. While most practices rail against their use, there are
    some cases and situations where they are a good fit and others where it doesn’t
    matter whether they are there or not. As the discussion moves into clustered indexes,
    you will see why it is usually a good idea to default to clustered indexes and
    use heaps in situations where either it won’t matter, such as most use cases with
    temporary objects, or they outperform clustered indexes.'
  trans: '

    ### 临时对象


    堆（heap）的一个适用场景是临时对象，例如临时表和表变量。当我们使用这些对象时，通常创建时没有考虑为其构建聚集索引。结果就是我们使用的堆表比想象中要多。


    回想一下上次创建表变量或临时表的时候。创建对象时的语法是否明确指定了`CLUSTERED`索引或使用了默认配置的`PRIMARY KEY`？如果没有，那么该临时对象就是作为堆创建的。这并不是什么大问题。这在大多数工作负载中很常见——不一定需要改变你的编码实践。正如本节示例所演示的，堆和聚集索引的临时对象在性能上的差异可能微不足道。


    在这个例子中，让我们从一个简单的临时表用例开始。该示例使用`Sales.SalesOrderHeader`表，根据`SalesPersonID`检索几行数据，然后将其插入临时表。这个临时表将用于返回`Sales.SalesOrderDetail`表中所有与临时表结果匹配的行。将使用两个版本的示例来演示在临时表上使用堆或聚集索引如何不影响查询执行。


    在第一个版本示例（如清单 11-1 所示）中，临时表是使用堆构建的。这是人们创建临时对象的常用方法。如图 11-1 中的执行计划所示，当访问临时表（由箭头标识）时，使用表扫描来访问对象中的行。这种行为在堆中是预期的。因为行是无序的，所以在首先检查所有行之前，无法访问特定的行。为了找到`Sales.SalesOrderDetail`表中与临时表匹配的所有行，执行计划使用了带有索引查找的嵌套循环。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig1_HTML.jpg](img/338675_3_En_11_Fig1_HTML.jpg)


    图 11-1

    堆临时对象的执行计划


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    ```


    清单 11-1

    使用堆的临时对象


    在脚本的第二个版本中（如清单 11-2 所示），临时表改为在`SalesOrderID`列上创建聚集索引。索引是两个脚本之间的唯一区别。这种差异导致执行计划略有变化。图
    11-2 显示了聚集索引版本的执行计划。两个计划的区别在于，对临时表使用了聚集索引扫描而不是表扫描。虽然这是不同的操作，但两者所做的工作本质上是相同的。在查询执行期间，访问临时对象中的所有行，同时将它们与`Sales.SalesOrderDetail`中的行进行连接。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    ```


    清单 11-2

    使用聚集索引的临时对象


    ### 注意


    自 SQL Server 2014 起，表变量也可以拥有聚集和非聚集索引。要求是在声明变量时创建索引。在表变量定义之后，不允许对其进行 DDL 操作。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig2_HTML.jpg](img/338675_3_En_11_Fig2_HTML.jpg)


    图 11-2

    聚集临时对象的执行计划


    在本章节类似的查询中，堆和聚集索引的临时表执行计划几乎相同。与所有规则一样，可能存在性能不同的例外情况。使用堆可能影响性能的一个好例子是在其执行中利用排序的
    T-SQL 语法。清单 11-3 展示了一个在`WHERE`子句中使用`EXISTS`的具体例子。图 11-3 显示了该查询的执行计划。在嵌套循环连接解析`EXISTS`谓词之前，数据必须首先排序。在这种情况下，使用堆阻碍了查询的性能，因为堆表强制进行排序操作。对于小型数据集，性能差异可能不明显。随着数据集大小的增加，像包含排序操作这样的小变化会加剧查询的性能影响。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig3_HTML.jpg](img/338675_3_En_11_Fig3_HTML.jpg)


    图 11-3

    `EXISTS`示例执行计划


    ```sql

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    ```


    清单 11-3

    `EXISTS`示例


    ### 其他堆场景


    通常，其他适合使用堆的场景很少且相隔很远。临时对象有意义的原因在于数据访问的频率较低，相比于构建一个支持性能的结构（例如聚集索引）所需的时间而言。这种情况也可以延伸到暂存表，因为数据在移动到最终目的地之前通常会被插入和修改几次。


    在高插入量的环境中，使用堆来避免维护 B 树的开销似乎是有意义的。这种场景的问题在于，插入带来的收益被访问数据的需求所抵消，这需要其他的非聚集索引，而这些索引又需要维护排序顺序。


    当面临在表上使用堆的情况时，首先应证明聚集索引是数据存储的负担，然后再使用它们。在考虑堆之前，也应考虑较新的索引结构（如聚集列存储索引或内存优化表）是否能提供所需的性能。


    本节的重点是，堆在现实世界中的使用比许多人意识到的更为频繁。尽管大多数实践都反对使用它们，但确实存在一些案例和场景它们是合适的，而在另一些场景中，有无堆都没有关系。随着讨论转向聚集索引，你将会明白为什么通常默认使用聚集索引是更好的主意，而在堆无关紧要（例如大多数临时对象用例）或堆性能优于聚集索引的情况下才使用堆。

    '
- fmt: '## Clustered Indexes


    Throughout this book, the value of and preference for using a clustered index
    as the structure for organizing the data pages of a table has been discussed.
    Clustered indexes organize the data in their tables based on the key columns for
    the clustered indexes. All the data pages for the index are stored logically according
    to the key columns. The benefit of this is optimal access to the data through
    the key columns.


    New tables should almost always be built with clustered indexes. The question,
    though, when building the tables is what should be selected for the key columns
    in the clustered index. There are a few characteristics that most often are attributed
    to well-defined clustered indexes. These characteristics are:

    - Static

    - Narrow

    - Unique

    - Ever-increasing


    There are a number of reasons that each of these attributes helps create a well-defined
    clustered index.


    First, a clustered index should be static. The key columns defined for the clustered
    index should be expected to be static for the lifetime of the row. By using a
    static value, the position of the row in the index will not change when the row
    is updated. When nonstatic key columns are used, the position of the row in the
    clustered index can change, which may require the row to be inserted on a different
    page. Also, nonclustered indexes would need to be modified to change the key columns’
    values stored in those indexes, since clustered index key columns are included
    in nonclustered indexes. All of this together leads to the potential for fragmentation
    in the clustered and nonclustered indexes on a table.


    The next attribute that a clustered index should have is that it is narrow. Ideally,
    there should be only a single column for the clustered index key. These columns
    should be defined with the smallest data type reasonable for that data being stored
    in the table. Narrow clustered indexes are important because the clustered index
    key for every row is included in all nonclustered indexes associated with the
    table. The wider the clustered index key, the wider all nonclustered indexes will
    be, and the more pages they will require. As discussed in other sections, the
    more pages in an index, the more resources are required to use the index. This
    can affect the performance of queries.


    Clustered indexes should also be unique. Clustered indexes store a single row
    in a single location in the index; for duplicate rows within the key columns of
    a clustered index, the uniquifier provides the uniqueness required for the row.
    When the uniquifier is added to a row, it is extended by 4 bytes, which changes
    how narrow the clustered index is and results in the same concerns that are associated
    with a non-narrow clustered index. You can find more information on the uniquifier
    in Chapter [2](#338675_3_En_2_Chapter.xhtml).


    Lastly, a well-defined clustered index will be based on an ever-increasing value.
    Using an ever-increasing clustered key causes new rows to be added to the end
    of the clustered index. Placing new rows at the end of the B-tree reduces the
    fragmentation that would likely occur if the rows were inserted in the middle
    of the clustered index.


    One additional consideration when selecting the clustered index key columns is
    that they represent the columns in the row that will most frequently be used to
    access the row. Are there specific columns or values that will most often be used
    to retrieve rows from the table? If so, these columns are good candidates for
    the clustering index key. In the end, queries against the table will perform best
    when they can access data through the path of least resistance.


    While considering the previous guidelines for selecting clustered index strategies,
    there are a number of patterns that can be used to identify and model clustered
    indexes. The clustered index patterns are:

    - Identity Sequence

    - Natural Key

    - Foreign Key

    - Multiple Column

    - Globally Unique Identifier


    In the rest of this section, we’ll walk you through each of the patterns, describing
    each and how to identify when to utilize the pattern.


    ### Identity Sequence


    The most frequent pattern for building a clustered index is to pair it with a
    column on a table that has been configured to be ever-increasing using either
    the `IDENTITY` property or the `SEQUENCE` object. In this pattern, the `IDENTITY`
    column is often also the `PRIMARY KEY` on the table. The data type is usually
    an integer, which includes `tinyint`, `smallint`, `int`, and `bigint`. The primary
    benefit of this pattern is that it achieves all the attributes of a well-defined
    clustered index. It is static, narrow, unique, and ever-increasing. When you consider
    how the data in the table will be accessed, in most cases the key value will most
    often be used to access rows in the table.


    One distinction of the Identity Sequence pattern is that the column used for the
    clustered index key has no relationship between the data in the row and the clustered
    index key. To implement the pattern, a new column is added to the table that contains
    the `IDENTITY` property or `SEQUENCE` default. This column is then set as the
    clustered index key and often the `PRIMARY KEY` as well.


    Examples of this pattern can be found in nearly all databases. Creating a table
    with this pattern would look similar to the `CREATE TABLE` statements in Listing
    [11-4](#338675_3_En_11_Chapter.xhtml#PC4). Both tables are built to contain fruit:
    two apple rows, a banana row, and a grape row are inserted. The `Color` column
    would not have been a good clustering key since it does not identify the rows
    in the table. The `FruitName` column could have identified the rows in the table,
    except it isn’t unique across the table, which would have required the uniquifier
    and lead to a larger clustering key. Indexing the table to the Identity Sequence
    pattern, a `FruitID` column is created.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''IndexStrategiesFruit_Identity'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Identity

    CREATE TABLE dbo.IndexStrategiesFruit_Identity

    (

    FruitID int IDENTITY(1,1)

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Idnt PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Identity(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Identity;

    IF OBJECT_ID(''IndexStrategiesFruit_Sequence'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Sequence

    IF OBJECT_ID(''FruitSequence'') IS NOT NULL

    DROP SEQUENCE FruitSequence

    CREATE SEQUENCE FruitSequence AS INTEGER

    START WITH 1;

    CREATE TABLE dbo.IndexStrategiesFruit_Sequence

    (

    FruitID int DEFAULT NEXT VALUE FOR FruitSequence

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Seq PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Sequence(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Sequence;

    ```

    *Listing 11-4: Creating and Populating Table for Identity Sequence Pattern*


    One of the effects of using the Identity Sequence pattern is that the value for
    the clustering key column has no relationship to the information that it represents.
    In the query output from Listing [11-1](#338675_3_En_11_Chapter.xhtml#PC1), which
    is shown in Figure [11-4](#338675_3_En_11_Chapter.xhtml#Fig4), the value of 1
    is assigned to the first row inserted for both resultsets. Then, a value of 2
    is assigned for the next row and so on. As more rows are added, the `FruitID`
    column increments and doesn’t require any single piece of information in the record
    in order to designate the instance of information.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig4_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig4_HTML.jpg)


    *Figure 11-4: Results for Identity Sequence pattern*'
