    ```


    清单 8-16 使用非聚集索引时的无序结果


    在这些示例中，你只看了 SQL Server 如何流式传输查询结果的几个可能变化的条件。虽然索引这次可能提供所需顺序的查询结果，但不能保证这种情况不会改变。不要依赖索引来强制排序。不要依赖*投机取巧*来获得所需顺序的结果。要依赖
    `ORDER BY` 子句来获得要求的排序结果。


    ## 迷思 7：填充因子在插入时应用于索引


    当在索引上设置填充因子时，它会在索引构建、重建或重组时应用。不幸的是，关于这个迷思，许多人认为填充因子会在记录插入表时应用。在本节中，我们将研究这个迷思，并看到这是不正确的。


    为了开始拆解这个迷思，让我们看看大多数人的想法。在这个迷思中，人们认为如果在向表中添加行时指定了填充因子，那么插入操作中会使用该填充因子。为了破除这部分迷思，请执行清单
    8-17 中的代码。在此脚本中，创建了一个表 `dbo.MythSeven`，其聚集索引的填充因子为 50%。这意味着索引中的每个页面应留下 50% 的空间为空。表构建好后，你将向表中插入记录。最后，你将通过
    `sys.dm_db_index_physical_stats` DMV 检查每个页面的平均可用空间。查看脚本结果，包含在图 8-14 中，索引使用了每个页面的
    95% 的空间，而不是在创建聚集索引时指定的 50%。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig14_HTML.jpg](img/338675_3_En_8_Fig14_HTML.jpg)


    图 8-14 关于插入时填充因子的迷思


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythSeven'') IS NOT NULL

    DROP TABLE dbo.MythSeven;

    GO

    CREATE TABLE dbo.MythSeven

    (

    RowID int NOT NULL

    ,Column1 varchar(500)

    );

    GO

    ALTER TABLE dbo.MythSeven ADD CONSTRAINT

    PK_MythSeven PRIMARY KEY CLUSTERED (RowID) WITH(FILLFACTOR = 50);

    GO

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythSeven

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, REPLICATE(''X'', 500)

    FROM L6;

    GO

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0;

    ```


    清单 8-17 创建并填充 MythSeven 表


    有时当这个迷思被澄清后，人们的看法会反过来，认为填充因子被破坏了或不起作用。这也不正确。填充因子不会在数据修改期间应用于索引。如前所述，它是在索引被重建、重组或创建时应用的。为了演示这一点，你可以使用清单
    8-18 中包含的脚本来重建 `dbo.MythSeven` 上的聚集索引。


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX PK_MythSeven ON dbo.MythSeven REBUILD

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0

    ```


    清单 8-18 在 MythSeven 表上重建聚集索引


    重建聚集索引后，该索引将具有指定的填充因子，或接近指定的值，如图 8-15 所示。重建后，表上的平均使用空间从 95% 变为 51%。这种变化与为索引指定的填充因子一致。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig15_HTML.jpg](img/338675_3_En_8_Fig15_HTML.jpg)


    图 8-15 索引重建后关于填充因子的迷思


    当涉及到填充因子时，围绕这个索引属性有许多迷思。理解填充因子的关键是记住它何时以及如何被应用。它不是索引在使用时强制应用的属性。相反，它是一个在索引创建或重建时用于分布数据的属性。'
- fmt: '### Myth 8: Deleting from Heaps Results in Unrecoverable Space


    Heaps are an interesting structure in SQL Server. In Chapter [2](#338675_3_En_2_Chapter.xhtml),
    you examined how they aren’t really an index but just a collection of pages for
    storing data. One of the index maintenance tasks that will be a part of the next
    chapter is recovering space from heap tables. As will be more deeply discussed
    in that chapter, when rows are deleted from a heap, the pages associated with
    those rows are not removed from the heap. This is generally referred to as bloat
    within the heap.


    An interesting side effect of the concept of heap bloat is the myth that bloat
    never gets reused. The space stays in the heap and is not recoverable until the
    heap is rebuilt. Fortunately, for heaps and database administrators, this isn’t
    the case. When data is removed from a heap, the space that the data previously
    held is made available for future inserts into the table.


    To demonstrate how this works, you’ll build a table using the code in Listing
    [8-19](#338675_3_En_8_Chapter.xhtml#PC19). The demonstration creates a heap named
    `MythEight` and then inserts 400 records, which results in 100 pages of data.
    This page count can be validated with the `page_count` column in the first resultset
    in Figure [8-16](#338675_3_En_8_Chapter.xhtml#Fig16). The next part of the script
    deletes every other row that was inserted into the heap. Generally, this should
    leave each page with half as many rows as it had previously, shown in the second
    resultset in Figure [8-16](#338675_3_En_8_Chapter.xhtml#Fig16). The last part
    of the script reinserts 200 rows into the `MythEight` table, returning the row
    count to 400 records and reusing the previously used pages that had data removed
    from them. There is a slight growth in the page count from the last resultset
    in Figure [8-16](#338675_3_En_8_Chapter.xhtml#Fig16), but most of the new rows
    fit into the space already allocated.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig16_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig16_HTML.jpg)


    Figure 8-16: Heap reuse query results


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythEight'') IS NOT NULL

    DROP TABLE dbo.MythEight;

    CREATE TABLE dbo.MythEight

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    DELETE FROM dbo.MythEight

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 200 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    ```


    Listing 8-19: Reusing Data from the MythEight Heap


    As the demonstration for this myth shows, space in a heap that previously held
    data is released for reuse by the table. For heaps that have a lot of data coming
    in and out of the table, there isn’t a significant need to monitor for page reuse,
    and the myth can be considered inaccurate. With heaps that have a lot of data
    removed without the intention to replace the data, you are able to recover the
    space with `ALTER TABLE ... REBUILD`. The syntax and impact of this statement
    are discussed in the next chapter.


    ### Myth 9: Every Table Should Have a Heap/Clustered Index


    The last myth to consider is twofold. On the one hand, some people will recommend
    you should build all your tables with heaps. On the other hand, others will recommend
    that you create clustered indexes on all your tables. The trouble is that this
    viewpoint will exclude considering the benefits that each of the structures can
    offer on a table. The viewpoint makes a religious-styled argument for or against
    ways to store data in your databases without any consideration for the actual
    data that is being stored and how it is being used.


    Some of the arguments against the use of clustered indexes are as follows:


    *   Fragmentation negatively impacts performance through additional I/O.

    *   The modification of a single record can impact multiple records in the clustered
    index when a page split is triggered.

    *   Excessive key lookups will negatively impact performance through additional
    I/O.


    Of course, there are some arguments against using heaps:


    *   Excessive forwarded records negatively impact performance through additional
    I/O.

    *   Removing forwarded records requires a rebuild of the entire table.

    *   Nonclustered indexes are required for efficient filtered data access.

    *   Heaps don’t automatically release pages when data is removed.


    The negative impacts associated with either clustered indexes or heaps aren’t
    the only things to consider when deciding between one and the other. Each has
    circumstances where they will outperform the other.


    For instance, clustered indexes perform best in the following circumstances:


    *   The key on the table is a unique, ever-increasing key value.

    *   The table has a key column that has a high degree of uniqueness.

    *   Ranges of data in a table will be accessed via queries.

    *   Records in the table will be inserted and deleted at a high rate.


    On the other hand, heaps are ideal for some of the following situations:


    *   Data in the table will be used only for a limited amount of time where index
    creation time exceeds query time on the data.

    *   Key values will change frequently, which in turn would change the position
    of the record in an index.

    *   You are inserting copious numbers of records into a staging table.

    *   The primary key is a nonascending value, such as a unique identifier.


    Although this section doesn’t include a demonstration of why this myth is false,
    it is important to remember that both heaps and clustered indexes are available
    and should be used appropriately. Knowing which type of index to choose is a matter
    of testing, not a matter of doctrine.


    A good resource to consider for those in the “cluster everything camp” is the
    Fast Track Data Warehouse Architecture white paper ([`https://msdn.microsoft.com/en-us/library/hh918452.aspx`](https://msdn.microsoft.com/en-us/library/hh918452.aspx)).
    The white paper addresses some significant performance improvements that can be
    found with heaps and also the point in which these improvements dissipate. The
    white paper helps show how changes in I/O system technologies, with flash and
    cache-based devices, can change patterns and practices in regard to heaps and
    clustered indexes. This helps to promote the idea of validating myths and best
    practices from time to time.


    ## Index Best Practices


    Similar to myths are the indexing best practices. A best practice should be considered
    the default recommendation that can be applied when there isn’t enough information
    available to validate proceeding in another direction. Best practices are not
    the only option and are just a place to start from when working with any technology.


    When using a best practice provided from someone else, such as those appearing
    in this chapter, it is important to check them out for yourself first. Always
    take them with a grain of salt. You can trust that best practices will steer you
    in the correct direction, but you need to verify that it is appropriate to follow
    the practice.


    Given the preceding precautions, there are a number of best practices that can
    be considered when working with indexes. This section will review these best practices
    and discuss what they are and what they mean.'
