  trans: '

    # 3. 索引元数据与统计信息


    既然你已经理解了索引的逻辑和物理基础，接下来应该了解索引统计信息的存储方式。这些统计信息有助于深入了解 SQL Server 如何能够利用以及正在如何利用索引。它们也提供了解读索引可能未被选中及其运行状况所需的信息。本章将让你更深入地理解这些信息在何处以及如何被收集。你将研究一些可用的附加
    `DBCC` 命令和动态管理对象（DMO），并了解这些信息是如何产生的。


    本章涵盖的统计信息涉及四个信息领域。第一个领域是列级统计信息。这为查询优化器提供列内以及索引内数据分布情况的信息。下一个领域是索引使用情况统计信息。此处的信息有助于深入了解索引是否被使用以及如何被使用。第三个领域是操作统计信息。这些信息与使用情况统计信息类似，但提供了更深入的洞察。最后一个信息领域是物理统计信息，它提供了索引物理特性的洞察，以及索引在数据库内是如何分布的。


    此外，在本章中，你将回顾列存储索引可用的元数据和统计信息，并探索所收集的信息。这些信息有助于理解列存储索引存储了什么，以及它可能如何影响针对列存储索引的查询性能。


    ## 列级统计信息


    让我们首先看一下统计信息的第一个领域：列级统计信息。在索引方面，这是 SQL Server 中最重要的领域之一。列级统计信息提供有关数据及其值在索引键列上分布情况的信息。SQL
    Server 使用这些信息来确定索引内值的预期频率和分布；这被称为 *基数*。


    通过基数，查询优化器制定基于成本的执行计划，以找到执行所提交请求的最佳执行计划。如果索引的统计信息不正确或不再代表索引中的数据，则创建的计划很可能效率低下。理解统计信息并能够与之交互非常重要，以确保你环境中的索引不仅存在，而且能提供预期的效益。


    ### 注意


    通常，当重建索引以“修复”性能问题时，碎片通常不是问题的原因或直接解决方案。重建时，索引会获得新的统计信息，并且与这些索引相关的执行计划需要重新编译，这两者中的任何一个都可能是性能问题的原因，而非任何索引碎片。


    在 SQL Server 中有许多与统计信息交互的方法。在接下来的章节中，你将回顾一些最常见的机制。对于每种方法，你将了解它是什么、提供什么以及使用每种方法的价值。


    ### DBCC SHOW_STATISTICS


    第一种，也可能是最熟悉的，与统计信息交互的方式是通过 `DBCC` 命令 `SHOW_STATISTICS`。此命令将返回所请求的数据库对象（表或索引视图）的统计信息。返回的信息是一个统计信息对象，包含三个不同的组件：头信息、直方图和密度向量。这些组件都为
    SQL Server 提供了索引中可用数据的理解。


    可以使用清单 3-1 中的 `DBCC` 语法返回统计信息对象。此语法接受表或索引视图的名称作为统计信息的来源，然后返回目标。目标可以是索引的名称，也可以是创建的列级统计信息。


    ```

    DBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )

    [ WITH [  ]

    清单 3-1

    DBCC SHOW_STATISTICS 语法

    ```


    `DBCC` 命令可以包含四个选项：`NO_INFOMSGS`、`STAT_HEADER`、`DENSITY_VECTOR`、`HISTOGRAM`。这些选项中的任何一个或全部都可以包含在逗号分隔的列表中。


    `NO_INFOMSGS` 选项会在 `DBCC` 命令执行时抑制所有信息性消息。这些是严重级别从 0 到 10 的错误消息，其中 10 是最高严重级别的错误。在大多数情况下，由于这些错误消息是信息性的，在使用此
    `DBCC` 语句时它们没有价值。


    `STAT_HEADER`、`DENSITY_VECTOR`、`HISTOGRAM` 选项限制了 `DBCC` 命令的输出。如果包含了一个或多个选项，则只返回所包含项对应的统计信息组件。如果这些选项都没有被选中，则包含所有组件。还有一个
    `STATS_STREAM` 选项，这里不讨论，因为它不受支持，并且在未来版本中可能不再包含。


    定义了 `DBCC` 命令后，让我们逐一介绍每个统计信息组件。每个组件都将被定义，然后将探索来自 AdventureWorks2017 数据库的内容示例。你将要查看的结果可以通过清单
    3-2 创建。


    ```

    USE AdventureWorks2017

    GO

    DBCC SHOW_STATISTICS ( ''Sales.SalesOrderDetail''

    , PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID )

    清单 3-2

    针对 Sales.SalesOrderDetail 表上索引的 DBCC SHOW_STATISTICS

    ```'
- fmt: '## Stats Header


    The stats header is the metadata portion of the statistics object. These columns,
    listed in Table [3-1](#338675_3_En_3_Chapter.xhtml#Tab1), are primarily informational.
    They inform on the number of rows that were considered when building the statistics
    and how those rows were selected through filtering. Table [3-1](#338675_3_En_3_Chapter.xhtml#Tab1)
    also includes information on when the statistics were last updated, which can
    be useful when investigating potential issues with the quality of statistics.


    Table 3-1: Stats Header Columns from `DBCC SHOW_STATISTICS`


    | Column Name | Description |

    | --- | --- |

    | `Name` | Name of the statistics object. For index statistics, this is the same
    name as the index. |

    | `Updated` | Date and time that the statistics were last updated. |

    | `Rows` | Total number of rows in the table or indexed view when the statistics
    were last updated. For filtered statistics or indexes, the count pertains to the
    number of rows that matched the filter criteria. |

    | `Rows Sampled` | Total number of rows sampled for statistics calculations. Histogram
    and density values are estimates when the `Rows Sampled` value is less than the
    value in `Rows`. |

    | `Steps` | Number of steps in the histogram. Each step spans a range of column
    values followed by an upper-bound column value. The histogram steps are defined
    on the first key column in the statistics. The maximum number of steps is 200.
    |

    | `Density` | Calculated as 1/*distinct values* for all values in the first key
    column of the statistics object, excluding the histogram boundary values. As of
    SQL Server 2008, this value is no longer used by SQL Server. |

    | `Average Key Length` | Average number of bytes per value for all the key columns
    in the statistics object. |

    | `String Index` | Indicates whether the statistics object contains string summary
    statistics to improve the cardinality estimates for query predicates that use
    the `LIKE` operator. |

    | `Filter Expression` | When populated, this is the predicate for the subset of
    table rows included in the statistics object. |

    | `Unfiltered Rows` | Total number of rows in the table before applying the filter
    expression. If `Filter Expression` is `NULL`, `Unfiltered Rows` is equal to `Rows`.
    |

    | `Persisted Sample Percent` | Added in SQL Server 2016, shows the sample percentage
    to use for updates to the statistics. If zero, then there is no sample percentage
    set for the statistics. |


    Reviewing the stats header information for `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    on `Sales.SalesOrderDetail`, shown in Figure [3-1](#338675_3_En_3_Chapter.xhtml#Fig1),
    you’ll see a number of items of interest. First, since the `Rows` and `Rows Sampled`
    values are the same, you know that the statistics are not based on estimates.
    Next, the statistics were last updated on October 27, 2017 (though this value
    may differ in your database). Another item is that there are 163 steps, of a possible
    max 200 steps, in the statistics histogram. The number of steps is equal to ranges.
    In this case, 163 steps mean there are 163 ranges, each with an upper-bound value
    in the statistics. The upper-bound value defines the max value within the range.
    If step 1 had an upper-bound value of 42, then step 1 would cover values 0–42.
    The next step would then start with 43 and include values up through its upper-bound.
    Note the lack of a filtered expression and unfiltered rows; neither the index
    nor statistics are filtering out rows. Lastly, the `Persisted Sample Percent`
    is set to 0, which means all rows were sampled for the statistics, which can be
    confirmed by comparing `Rows` with `Rows Sampled`.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig1_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig1_HTML.jpg)


    Figure 3-1: Stats header for index on `Sales.SalesOrderDetail` table


    ## Density Vector


    The next portion of the statistics components is the density vector. The density
    vector describes the columns within a statistics object. There is a row for each
    key value in the statistics or index object. For instance, if there are two columns
    in an index named `SaleOrderID` and `SalesOrderDetailID`, there will be two rows
    in the density vector. The density vector will have a row for `SaleOrderID` and
    a row for `SaleOrderID` and `SalesOrderDetailID`, shown in Figure [3-2](#338675_3_En_3_Chapter.xhtml#Fig2).
    There are three pieces of information available for density vector: the density,
    average length, and columns included in the vector (column names detailed in Table
    [3-2](#338675_3_En_3_Chapter.xhtml#Tab2)).


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig2_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig2_HTML.jpg)


    Figure 3-2: Sample of the density vector for index on `Sales.SalesOrderDetail`
    table


    The value of the density vector is that it helps the query optimizer adjust cardinality
    for multiple column statistics objects. As we’ll discuss in the next section,
    the ranges within the histogram are based solely on the first column of the statistics
    object, and the density provides an adjustment between when single or multicolumn
    queries are executed. While the focus for updating statistics is often on changes
    in the histogram, the density vector provides a valuable means to adjust ranges
    in the histogram to adjust for differences in the distribution of data in beyond
    the first column of the index.


    Table 3-2: Density Vector Columns from `DBCC SHOW_STATISTICS`


    | Column Name | Description |

    | --- | --- |

    | `All Density` | Returns the density for each prefix of columns in the statistics
    object, one row per density. The density is calculated as 1/*distinct column values*.
    The closer the density is to 1, the more uniform the values in the columns. |

    | `Average Length` | Average length, in bytes, to store the column values for
    each level of the density vector. |

    | `Columns` | Names of columns in each density vector level. |'
