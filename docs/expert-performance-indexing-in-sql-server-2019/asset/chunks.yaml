    ### Uncompressed Indexes


    As discussed earlier in this chapter and in other parts of the book, it is usually
    beneficial to utilize some level of compression on all indexes. With row compression,
    the indexes generally store fixed-length data as variable length, while page compression
    examines data and reduces duplication to compress further. In many cases, databases
    can be compressed to 25–75 percent of their current size through compression.
    That size reduction increases the amount of data SQL Server can process through
    the CPU. Often times, the additional CPU cost to compress data is more than offset
    by the decrease in CPU effort to process the uncompressed data volume.


    When examining databases for uncompressed indexes, the query in Listing [14-37](#338675_3_En_14_Chapter.xhtml#PC37)
    provides a list per database with the filegroup, partition boundary, row count,
    and size for each index. This information is especially useful because it can
    help identify the largest indexes where compression could provide the greatest
    gain. Review the list and determine which indexes to start compressing, keeping
    in mind whether there are data types, such as varchar(max), that will compress
    and may lead to compression failures, as discussed earlier in this chapter.


    ```

    WITH partitioning

    AS (SELECT dds.data_space_id,

    dds.partition_scheme_id,

    ds.name,

    dds.destination_id AS partition_number,

    CASE

    WHEN prv.value IS NOT NULL THEN

    CONCAT(

    IIF(pf.boundary_value_on_right = 1, ''Less than '', ''Greater than or equal to
    ''),

    CAST(prv.value AS VARCHAR(MAX))

    )

    WHEN pf.boundary_value_on_right = 1 THEN ''Greater than MAX boundary''

    ELSE ''Less than MIN boundary'' END AS Boundary

    FROM sys.destination_data_spaces AS dds

    INNER JOIN sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id

    INNER JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id

    INNER JOIN sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id

    LEFT OUTER JOIN sys.partition_range_values AS prv ON pf.function_id = prv.function_id

    AND prv.boundary_id = dds.destination_id)

    SELECT S.name AS schema_name,

    T.name AS table_name,

    I.name AS index_name,

    I.index_id,

    P.partition_number,

    P.data_compression_desc,

    I.type_desc,

    IIF(DS.type_desc = ''PARTITION_SCHEME'', PS.name, DS.name) AS file_group,

    PS.Boundary AS partition_boundary,

    DS.type_desc AS data_space_type,

    P.rows,

    CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024\. AS DECIMAL(20, 3)) AS
    mb_size

    FROM sys.tables AS T

    INNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id

    INNER JOIN sys.indexes AS I ON T.object_id = I.object_id

    INNER JOIN sys.partitions AS P ON I.object_id = P.object_id

    AND I.index_id = P.index_id

    INNER JOIN sys.dm_db_partition_stats AS dps ON P.object_id = dps.object_id

    AND P.index_id = dps.index_id

    AND P.partition_number = dps.partition_number

    LEFT OUTER JOIN partitioning AS PS ON I.data_space_id = PS.partition_scheme_id

    AND P.partition_number = PS.partition_number

    INNER JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id

    WHERE P.data_compression_desc = ''NONE'';

    GO

    Listing 14-37

    Query to Identify Uncompressed Indexes

    ```


    ### Note


    It bears repeating that the DTA is a good tool for determining useful indexes
    to add to a database. While there may be more pride in designing indexes for a
    database by hand without the need of a tool, it isn’t practical to ignore useful
    recommendations. Use the DTA as a starting point to discover indexing suggestions
    that would have taken hours to determine without the tool in place.'
  trans: '

    ### 未压缩索引


    正如本章及本书其他部分先前所讨论的，通常对所有索引采用某种程度的压缩是有益的。使用行压缩时，索引通常将定长数据存储为变长数据，而页压缩则会检查数据并减少重复以进一步压缩。在许多情况下，数据库可以通过压缩减少到当前大小的
    25%到 75%。这种大小缩减增加了 SQL Server 通过 CPU 可以处理的数据量。通常，压缩数据所增加的额外 CPU 成本，远低于处理未压缩数据量所减少的
    CPU 开销。


    在检查数据库中的未压缩索引时，清单 14-37 中的查询会按数据库提供每个索引的文件组、分区边界、行数和大小列表。此信息特别有用，因为它可以帮助识别最大的索引，在这些索引上压缩可能带来最大的收益。请审阅该列表并确定从哪些索引开始压缩，同时需注意是否存在如
    `varchar(max)` 这样的数据类型，它们会压缩并可能导致压缩失败，如本章前面所讨论的。


    ```sql

    WITH partitioning

    AS (SELECT dds.data_space_id,

    dds.partition_scheme_id,

    ds.name,

    dds.destination_id AS partition_number,

    CASE

    WHEN prv.value IS NOT NULL THEN

    CONCAT(

    IIF(pf.boundary_value_on_right = 1, ''Less than '', ''Greater than or equal to
    ''),

    CAST(prv.value AS VARCHAR(MAX))

    )

    WHEN pf.boundary_value_on_right = 1 THEN ''Greater than MAX boundary''

    ELSE ''Less than MIN boundary'' END AS Boundary

    FROM sys.destination_data_spaces AS dds

    INNER JOIN sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id

    INNER JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id

    INNER JOIN sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id

    LEFT OUTER JOIN sys.partition_range_values AS prv ON pf.function_id = prv.function_id

    AND prv.boundary_id = dds.destination_id)

    SELECT S.name AS schema_name,

    T.name AS table_name,

    I.name AS index_name,

    I.index_id,

    P.partition_number,

    P.data_compression_desc,

    I.type_desc,

    IIF(DS.type_desc = ''PARTITION_SCHEME'', PS.name, DS.name) AS file_group,

    PS.Boundary AS partition_boundary,

    DS.type_desc AS data_space_type,

    P.rows,

    CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024\. AS DECIMAL(20, 3)) AS
    mb_size

    FROM sys.tables AS T

    INNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id

    INNER JOIN sys.indexes AS I ON T.object_id = I.object_id

    INNER JOIN sys.partitions AS P ON I.object_id = P.object_id

    AND I.index_id = P.index_id

    INNER JOIN sys.dm_db_partition_stats AS dps ON P.object_id = dps.object_id

    AND P.index_id = dps.index_id

    AND P.partition_number = dps.partition_number

    LEFT OUTER JOIN partitioning AS PS ON I.data_space_id = PS.partition_scheme_id

    AND P.partition_number = PS.partition_number

    INNER JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id

    WHERE P.data_compression_desc = ''NONE'';

    GO

    ```

    清单 14-37：用于识别未压缩索引的查询


    ### 注意


    需要再次强调的是，DTA（数据库引擎优化顾问）是确定可添加到数据库中有用索引的好工具。虽然手动为数据库设计索引而不依赖工具可能带来更多成就感，但忽略有用的建议是不切实际的。应将
    DTA 作为起点，用以发现那些若没有该工具可能需要花费数小时才能确定的索引建议。

    '
- fmt: "## Database Engine Tuning Advisor\n\nThe `Database Engine Tuning Advisor (DTA)`\
    \ was discussed in Chapter [7](#338675_3_En_7_Chapter.xhtml). In that chapter,\
    \ we discussed the two modes for using the `DTA`: the `GUI` interface and the\
    \ command-line utility. While tuning queries is often a process of reviewing statistics\
    \ and evaluating execution plans, the `DTA` provides means to accelerate this\
    \ analysis by using the trace files from the monitoring process in the previous\
    \ chapter to identify potentially useful indexing recommendations. This process\
    \ is able to accomplish the tuning with minimal impact on the production environment\
    \ since all the recommendations are derived from analysis on a nonproduction environment.\n\
    \nThe basic process for using the `DTA` index analysis can be broken out into\
    \ five different steps, shown in Figure [14-18](#338675_3_En_14_Chapter.xhtml#Fig18):\n\
    \n1.  Collect a workload.\n2.  Gather the metadata.\n3.  Perform the tuning.\n\
    4.  Consider recommendations and review.\n5.  Deploy changes.\n\nThrough this\
    \ process, we can get a jump start on indexing and begin working with recommendations\
    \ that relate to existing performance issues.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig18_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig18_HTML.jpg)\n\
    \nFigure 14-18: Steps for using the `DTA` index analysis.\n\nThe first step in\
    \ the process is to collect a workload. If we followed the process in the index\
    \ monitoring process from the previous chapter, we should have already collected\
    \ this information. There are two standard scenarios that workloads should represent.\
    \ To begin, collect a workload that represents a typical day, because even a normal\
    \ day can have underlying performance issues that tuning can help alleviate. Second,\
    \ gather a workload during times where performance problems are known to exist.\
    \ This will be useful for providing recommendations that we may be able to achieve\
    \ through manual tuning.\n\nAfter the workload is collected, the next step is\
    \ to gather the necessary metadata to start the tuning sessions. There are two\
    \ components to gathering metadata. The first is to create an XML input file for\
    \ the `dta` session. The XML input file contains the production and nonproduction\
    \ server names and information on where the workload is and what type of tuning\
    \ options to utilize (Listing [14-38](#338675_3_En_14_Chapter.xhtml#PC38) shows\
    \ a sample). For more information on tuning options, see Chapter [7](#338675_3_En_7_Chapter.xhtml).\
    \ The second part of this step is the effect on tuning from the first piece. When\
    \ the tuning occurs, `SQL Server` will gather the schema and statistics for the\
    \ database from the production database(s) and move that information to the nonproduction\
    \ server. While the database won’t have the production data, it will have the\
    \ information necessary to make indexing recommendations.\n\n```\nSTR8-SQL-PRD\n\
    AdventureWorks2017\nc:\\temp\\IndexingMethod.trc\nSTR8-SQL-TEST \nIDX\nNONE\n\
    NONE\n```\n\nListing 14-38: Sample XML Input File for `DTA`.\n\n### Note\n\nWe\
    \ can find more information on the XML input file configuration in `Books Online`\
    \ at [`https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor%253Fview%253Dsql-server-ver15).\n\
    \nThe next step is the actual execution of the `DTA` tuning session. To run the\
    \ session, execute the `dta` command using the `-ix` command-line option, shown\
    \ in Listing [14-39](#338675_3_En_14_Chapter.xhtml#PC39). Since all the configuration\
    \ information for the session is located in the XML file, there is no need to\
    \ add any additional parameters.\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\
    \n```\n\nListing 14-39: `DTA` Command with XML Input File.\n\nAfter the tuning\
    \ session completes, we will receive a list of index recommendations. This isn’t\
    \ the last step in this portion of the process. Before any recommendations from\
    \ the `DTA` can be implemented, they must be reviewed. While using this tool will\
    \ accelerate the index analysis process, all the recommendations need to be reviewed\
    \ and vetted to verify that they make sense and don’t overload a table with more\
    \ indexes than `SQL Server` can support for the workload.\n\nThe last step is\
    \ to deploy the indexing recommendations. This step is technically outside the\
    \ scope of this phase of the Indexing Method. At this time, though, we should\
    \ be familiar with the indexing changes that will be implemented. Add these changes\
    \ to the existing list of indexing changes from other analysis and prepare them\
    \ for implementation, which is discussed in the next chapter.\n\n## Unused Indexes\n\
    \nOne of the necessary and potentially dangerous steps during index analysis is\
    \ the determination of indexes to remove. Some indexes will be removed because\
    \ of consolidation or because they are duplicates. Often these have less risk\
    \ than when other indexes are dropped. The indexes in this other category are\
    \ those that are unused.\n\nThe easiest manner for identifying indexes that are\
    \ not used is to check the list of indexes in each database against the `dbo.index_usage_stats_history`\
    \ table in the `IndexingMethod` database. If there are any unused indexes in the\
    \ database, the query in Listing [14-40](#338675_3_En_14_Chapter.xhtml#PC40) will\
    \ identify them. One word of caution with unused indexes: In this analysis, `heaps`\
    \ and `clustered indexes` are ignored, along with any `unique indexes` and `primary\
    \ keys`. Indexes with these properties are often related to other business rules,\
    \ and their removal should be based on other factors. Figure [14-19](#338675_3_En_14_Chapter.xhtml#Fig19)\
    \ shows an example of unused indexes in the `AdventureWorks2017` database.\n\n\
    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig19_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig19_HTML.jpg)\n\
    \nFigure 14-19: Output for query identifying missing foreign key indexes.\n\n\
    ```\nSELECT OBJECT_NAME(we.object_id) AS table_name,\n       COALESCE(we.name,\
    \ SPACE(0)) AS index_name,\n       ps.partition_number,\n       ps.row_count,\n\
    \       CAST((ps.reserved_page_count * 8) / 1024\\. AS DECIMAL(12, 2)) AS size_in_mb,\n\
    \       COALESCE(ius.user_seeks, 0) AS user_seeks,\n       COALESCE(ius.user_scans,\
    \ 0) AS user_scans,\n       COALESCE(ius.user_lookups, 0) AS user_lookups,\n \
    \      we.type_desc\nFROM sys.all_objects t\nINNER JOIN sys.indexes we ON t.object_id\
    \ = we.object_id\nINNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id\n\
    \                                          AND we.index_id = ps.index_id\nLEFT\
    \ OUTER JOIN sys.dm_db_index_usage_stats ius ON ius.database_id = DB_ID()\n  \
    \                                                 AND we.object_id = ius.object_id\n\
    \                                                   AND we.index_id = ius.index_id\n\
    WHERE we.type_desc NOT IN ( 'HEAP', 'CLUSTERED' )\n  AND we.is_unique = 0\n  AND\
    \ we.is_primary_key = 0\n  AND we.is_unique_constraint = 0\n  AND COALESCE(ius.user_seeks,\
    \ 0) <= 0\n  AND COALESCE(ius.user_scans, 0) <= 0\n  AND COALESCE(ius.user_lookups,\
    \ 0) <= 0\nORDER BY OBJECT_NAME(we.object_id),\n         we.name;\n```\n\nListing\
    \ 14-40: Query for Unused Indexes.\n\nWhile this section didn’t discuss it, there\
    \ are two additional scenarios for identifying unused indexes. These are lightly\
    \ used indexes or no longer used indexes. A similar process can be used for these\
    \ situations: instead of looking for indexes that have never been used, filter\
    \ for low usage rates or no use in a period of weeks or months. But don’t just\
    \ remove these indexes automatically. If the index is lightly used, verify how\
    \ the index is being used before dropping it. It may be used once a day, but it\
    \ might be tied to critical processes. Also, with no longer used indexes, verify\
    \ that the index isn’t part of a seasonal process. Removing indexes tied to seasonal\
    \ activity can create more of a burden than just maintaining them in off-peak\
    \ times."
  raw: "## Database Engine Tuning Advisor\n\nThe Database Engine Tuning Advisor (DTA)\
    \ was discussed in Chapter [7](#338675_3_En_7_Chapter.xhtml). In that chapter,\
    \ we discussed the two modes for using the DTA: the GUI interface and the command-line\
    \ utility. While tuning queries is often a process of reviewing statistics and\
    \ evaluating execution plans, the DTA provides means to accelerate this analysis\
    \ by using the trace files from the monitoring process in the previous chapter\
    \ to identify potentially useful indexing recommendations. This process is able\
    \ to accomplish the tuning with minimal impact on the production environment since\
    \ all the recommendations are derived from analysis on a nonproduction environment.\n\
    \nThe basic process for using the DTA index analysis can be broken out into five\
    \ different steps, shown in Figure [14-18](#338675_3_En_14_Chapter.xhtml#Fig18):\n\
    \n1.  Collect a workload.\n\n2.  Gather the metadata.\n\n3.  Perform the tuning.\n\
    \n4.  Consider recommendations and review.\n\n5.  Deploy changes.\n\nThrough this\
    \ process, we can get a jump start on indexing and begin working with recommendations\
    \ that relate to existing performance issues.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig18_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig18_HTML.jpg)\n\
    \nFigure 14-18\n\nSteps for using the DTA index analysis\n\nThe first step in\
    \ the process is to collect a workload. If we followed the process in the index\
    \ monitoring process from the previous chapter, we should have already collected\
    \ this information. There are two standard scenarios that workloads should represent.\
    \ To begin, collect a workload that represents a typical day, because even a normal\
    \ day can have underlying performance issues that tuning can help alleviate. Second,\
    \ gather a workload during times where performance problems are known to exist.\
    \ This will be useful for providing recommendations that we may be able to achieve\
    \ through manual tuning.\n\nAfter the workload is collected, the next step is\
    \ to gather the necessary metadata to start the tuning sessions. There are two\
    \ components to gathering metadata. The first is to create an XML input file for\
    \ the `dta` session. The XML input file contains the production and nonproduction\
    \ server names and information on where the workload is and what type of tuning\
    \ options to utilize (Listing [14-38](#338675_3_En_14_Chapter.xhtml#PC38) shows\
    \ a sample). For more information on tuning options, see Chapter [7](#338675_3_En_7_Chapter.xhtml).\
    \ The second part of this step is the effect on tuning from the first piece. When\
    \ the tuning occurs, SQL Server will gather the schema and statistics for the\
    \ database from the production database(s) and move that information to the nonproduction\
    \ server. While the database won’t have the production data, it will have the\
    \ information necessary to make indexing recommendations.\n\n```\n\nSTR8-SQL-PRD\n\
    \nAdventureWorks2017\n\nc:\\temp\\IndexingMethod.trc\n\nSTR8-SQL-TEST \nIDX\n\
    NONE\nNONE\n\nListing 14-38\nSample XML Input File for DTA\n```\n\n### Note\n\n\
    We can find more information on the XML input file configuration in Books Online\
    \ at [`https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor%253Fview%253Dsql-server-ver15).\n\
    \nThe next step is the actual execution of the DTA tuning session. To run the\
    \ session, execute the `dta` command using the `-ix` command-line option, shown\
    \ in Listing [14-39](#338675_3_En_14_Chapter.xhtml#PC39). Since all the configuration\
    \ information for the session is located in the XML file, there is no need to\
    \ add any additional parameters.\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\
    \nListing 14-39\nDTA Command with XML Input File\n```\n\nAfter the tuning session\
    \ completes, we will receive a list of index recommendations. This isn’t the last\
    \ step in this portion of the process. Before any recommendations from the DTA\
    \ can be implemented, they must be reviewed. While using this tool will accelerate\
    \ the index analysis process, all the recommendations need to be reviewed and\
    \ vetted to verify that they make sense and don’t overload a table with more indexes\
    \ than SQL Server can support for the workload.\n\nThe last step is to deploy\
    \ the indexing recommendations. This step is technically outside the scope of\
    \ this phase of the Indexing Method. At this time, though, we should be familiar\
    \ with the indexing changes that will be implemented. Add these changes to the\
    \ existing list of indexing changes from other analysis and prepare them for implementation,\
    \ which is discussed in the next chapter.\n\n## Unused Indexes\n\nOne of the necessary\
    \ and potentially dangerous steps during index analysis is the determination of\
    \ indexes to remove. Some indexes will be removed because of consolidation or\
    \ because they are duplicates. Often these have less risk than when other indexes\
    \ are dropped. The indexes in this other category are those that are unused.\n\
    \nThe easiest manner for identifying indexes that are not used is to check the\
    \ list of indexes in each database against the `dbo.index_usage_stats_history`\
    \ table in the `IndexingMethod` database. If there are any unused indexes in the\
    \ database, the query in Listing [14-40](#338675_3_En_14_Chapter.xhtml#PC40) will\
    \ identify them. One word of caution with unused indexes: In this analysis, heaps\
    \ and clustered indexes are ignored, along with any unique indexes and primary\
    \ keys. Indexes with these properties are often related to other business rules,\
    \ and their removal should be based on other factors. Figure [14-19](#338675_3_En_14_Chapter.xhtml#Fig19)\
    \ shows an example of unused indexes in the `AdventureWorks2017` database.\n\n\
    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig19_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig19_HTML.jpg)\n\
    \nFigure 14-19\n\nOutput for query identifying missing foreign key indexes\n\n\
    ```\nSELECT OBJECT_NAME(we.object_id) AS table_name,\nCOALESCE(we.name, SPACE(0))\
    \ AS index_name,\nps.partition_number,\nps.row_count,\nCAST((ps.reserved_page_count\
    \ * 8) / 1024\\. AS DECIMAL(12, 2)) AS size_in_mb,\nCOALESCE(ius.user_seeks, 0)\
    \ AS user_seeks,\nCOALESCE(ius.user_scans, 0) AS user_scans,\nCOALESCE(ius.user_lookups,\
    \ 0) AS user_lookups,\nwe.type_desc\nFROM sys.all_objects t\nINNER JOIN sys.indexes\
    \ we ON t.object_id = we.object_id\nINNER JOIN sys.dm_db_partition_stats ps ON\
    \ we.object_id = ps.object_id\nAND we.index_id = ps.index_id\nLEFT OUTER JOIN\
    \ sys.dm_db_index_usage_stats ius ON ius.database_id = DB_ID()\nAND we.object_id\
    \ = ius.object_id\nAND we.index_id = ius.index_id\nWHERE we.type_desc NOT IN (\
    \ 'HEAP', 'CLUSTERED' )\nAND we.is_unique = 0\nAND we.is_primary_key = 0\nAND\
    \ we.is_unique_constraint = 0\nAND COALESCE(ius.user_seeks, 0) <= 0\nAND COALESCE(ius.user_scans,\
    \ 0) <= 0\nAND COALESCE(ius.user_lookups, 0) <= 0\nORDER BY OBJECT_NAME(we.object_id),\n\
    we.name;\nListing 14-40\nQuery for Unused Indexes\n```\n\nWhile this section didn’t\
    \ discuss it, there are two additional scenarios for identifying unused indexes.\
    \ These are lightly used indexes or no longer used indexes. A similar process\
    \ can be used for these situations: instead of looking for indexes that have never\
    \ been used, filter for low usage rates or no use in a period of weeks or months.\
    \ But don’t just remove these indexes automatically. If the index is lightly used,\
    \ verify how the index is being used before dropping it. It may be used once a\
    \ day, but it might be tied to critical processes. Also, with no longer used indexes,\
    \ verify that the index isn’t part of a seasonal process. Removing indexes tied\
    \ to seasonal activity can create more of a burden than just maintaining them\
    \ in off-peak times."
  trans: "\n## 数据库引擎调优顾问\n\n`数据库引擎调优顾问 (DTA)` 在第 7 章中讨论过。在那一章，我们讨论了使用 `DTA` 的两种模式：`GUI`\
    \ 界面和命令行实用程序。虽然调优查询通常是一个审查统计数据和评估执行计划的过程，但 `DTA` 提供了加速此分析的方法，它利用前一章监控过程中的跟踪文件来识别潜在有用的索引建议。这个过程能够在对生产环境影响最小的情况下完成调优，因为所有建议都源自对非生产环境的分析。\n\
    \n使用 `DTA` 索引分析的基本过程可以分为五个不同的步骤，如图 14-18 所示：\n\n1.  收集工作负载。\n2.  收集元数据。\n3.  执行调优。\n\
    4.  考虑建议并进行审查。\n5.  部署更改。\n\n通过这个过程，我们可以在索引优化方面快速入门，并开始处理与现有性能问题相关的建议。\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig18_HTML.jpg](img/338675_3_En_14_Fig18_HTML.jpg)\n\
    \n图 14-18：使用 `DTA` 索引分析的步骤。\n\n该过程的第一步是收集工作负载。如果我们遵循了前一章索引监控过程中的步骤，我们应该已经收集了这些信息。工作负载应代表两种标准场景。首先，收集代表典型一天的工作负载，因为即使是正常的一天也可能存在潜在的性能问题，调优可以帮助缓解。其次，收集已知存在性能问题时段的工作负载。这将有助于提供我们可能通过手动调优实现的建议。\n\
    \n收集工作负载后，下一步是收集必要的元数据以开始调优会话。收集元数据有两个组成部分。第一是为 `dta` 会话创建一个 XML 输入文件。XML 输入文件包含生产和非生产服务器的名称，以及关于工作负载位置和要使用的调优选项类型的信息（清单\
    \ 14-38 显示了一个示例）。有关调优选项的更多信息，请参见第 7 章。此步骤的第二部分是第一部分对调优的影响。当调优发生时，`SQL Server`\
    \ 将从生产数据库收集数据库的架构和统计信息，并将该信息移动到非生产服务器。虽然数据库不会有生产数据，但它将拥有生成索引建议所需的信息。\n\n```\n\
    STR8-SQL-PRD\nAdventureWorks2017\nc:\\temp\\IndexingMethod.trc\nSTR8-SQL-TEST\
    \ \nIDX\nNONE\nNONE\n```\n\n清单 14-38：`DTA` 的 XML 输入文件示例。\n\n### 注意\n\n我们可以在 `联机丛书`\
    \ 的 [`https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/tools/dta/xml-input-file-reference-database-engine-tuning-advisor%253Fview%253Dsql-server-ver15)\
    \ 找到有关 XML 输入文件配置的更多信息。\n\n下一步是实际执行 `DTA` 调优会话。要运行会话，请使用 `-ix` 命令行选项执行 `dta` 命令，如清单\
    \ 14-39 所示。由于会话的所有配置信息都位于 XML 文件中，因此无需添加任何其他参数。\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\
    \n```\n\n清单 14-39：带有 XML 输入文件的 `DTA` 命令。\n\n调优会话完成后，我们将收到一个索引建议列表。这不是此部分流程的最后一步。在实施\
    \ `DTA` 提供的任何建议之前，必须对其进行审查。虽然使用此工具将加速索引分析过程，但所有建议都需要经过审查和验证，以确保它们合理，并且不会在表上堆积超过\
    \ `SQL Server` 针对该工作负载所能支持的更多索引。\n\n最后一步是部署索引建议。严格来说，此步骤超出了索引方法此阶段的范围。不过，此时我们应该对将要实施的索引更改很熟悉。将这些更改添加到从其他分析得出的现有索引更改列表中，并为实施做好准备，这将在下一章中讨论。\n\
    \n## 未使用的索引\n\n在索引分析过程中，一个必要且可能危险的步骤是确定要删除的索引。有些索引会因为整合或因为是重复项而被删除。通常，这些索引被删除的风险低于其他索引被删除的情况。这类“其他”索引指的是那些未使用的索引。\n\
    \n识别未使用索引的最简单方法是检查每个数据库中的索引列表，并与 `IndexingMethod` 数据库中的 `dbo.index_usage_stats_history`\
    \ 表进行对比。如果数据库中有任何未使用的索引，清单 14-40 中的查询将识别它们。关于未使用索引的一个注意事项是：在此分析中，`堆` 和 `聚集索引`\
    \ 会被忽略，同样被忽略的还有任何 `唯一索引` 和 `主键`。具有这些属性的索引通常与其他业务规则相关，其删除应基于其他因素。图 14-19 显示了 `AdventureWorks2017`\
    \ 数据库中未使用索引的示例。\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig19_HTML.jpg](img/338675_3_En_14_Fig19_HTML.jpg)\n\
    \n图 14-19：识别缺失外键索引的查询输出。\n\n```\nSELECT OBJECT_NAME(we.object_id) AS table_name,\n\
    \       COALESCE(we.name, SPACE(0)) AS index_name,\n       ps.partition_number,\n\
    \       ps.row_count,\n       CAST((ps.reserved_page_count * 8) / 1024\\. AS DECIMAL(12,\
    \ 2)) AS size_in_mb,\n       COALESCE(ius.user_seeks, 0) AS user_seeks,\n    \
    \   COALESCE(ius.user_scans, 0) AS user_scans,\n       COALESCE(ius.user_lookups,\
    \ 0) AS user_lookups,\n       we.type_desc\nFROM sys.all_objects t\nINNER JOIN\
    \ sys.indexes we ON t.object_id = we.object_id\nINNER JOIN sys.dm_db_partition_stats\
    \ ps ON we.object_id = ps.object_id\n                                        \
    \  AND we.index_id = ps.index_id\nLEFT OUTER JOIN sys.dm_db_index_usage_stats\
    \ ius ON ius.database_id = DB_ID()\n                                         \
    \          AND we.object_id = ius.object_id\n                                \
    \                   AND we.index_id = ius.index_id\nWHERE we.type_desc NOT IN\
    \ ( 'HEAP', 'CLUSTERED' )\n  AND we.is_unique = 0\n  AND we.is_primary_key = 0\n\
    \  AND we.is_unique_constraint = 0\n  AND COALESCE(ius.user_seeks, 0) <= 0\n \
    \ AND COALESCE(ius.user_scans, 0) <= 0\n  AND COALESCE(ius.user_lookups, 0) <=\
    \ 0\nORDER BY OBJECT_NAME(we.object_id),\n         we.name;\n```\n\n清单 14-40：查询未使用索引。\n\
    \n虽然本节没有讨论，但还有两种识别未使用索引的场景。这些是使用率很低的索引或不再使用的索引。对于这些情况，可以使用类似的过程：不是寻找从未使用过的索引，而是过滤出使用率低的索引或在数周或数月内没有使用的索引。但不要自动删除这些索引。如果索引使用率很低，在删除它之前，请验证该索引是如何被使用的。它可能每天只使用一次，但可能与关键流程相关。同样，对于不再使用的索引，请验证它是否属于季节性流程的一部分。删除与季节性活动相关的索引可能带来的负担比仅仅在非高峰时段维护它们更大。\n"
- fmt: '# Index Plan Usage


    In previous sections of this chapter, we discussed the concept of checking the
    plan cache to analyze and investigate index usages. While statistics can show
    that there was a seek or a scan against an index, it doesn’t provide us with enough
    detail to know what columns to add or what caused the index to use a scan over
    a seek. To gather this information, we need to turn to the execution plan. And
    the place where we can get some of the best execution plans for your databases
    and SQL Server instance is the plan cache. In this section, for index analysis,
    we’ll be looking at two queries that can be used to retrieve execution plans from
    the plan cache.


    The first query is one that will be used when we need to retrieve all the plans
    for a specific index. Suppose we need to determine what processes, or T-SQL statements,
    are using one of the indexes on a table that is used once or twice a day. For
    this, we can turn to the plan cache with the query in Listing 14-41 and check
    whether the plan for that query is still in the cache. To use the query, replace
    the index name in the variable `@IndexName` and execute it to return a list of
    plans that use the index. Be cautious if we have a database where there are many
    indexes with the same name, since index names need to be unique only on a per-table
    basis. If all of the indexes are named `IX_1` and `IX_2`, we will need to verify
    the table name in the search to be sure we have the correct index.


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    GO

    DECLARE @IndexName sysname = ''PK_SalesOrderHeader_SalesOrderID'';

    SET @IndexName = QUOTENAME(@IndexName, ''['');

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    , IndexSearch

    AS (SELECT qp.query_plan,

    cp.usecounts,

    ix.query(''.'') AS StmtSimple

    FROM sys.dm_exec_cached_plans cp

    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY qp.query_plan.nodes(''//StmtSimple'') AS p(ix)

    WHERE query_plan.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1)

    SELECT StmtSimple.value(''StmtSimple[1]/@StatementText'', ''VARCHAR(4000)'') AS
    sql_text,

    obj.value(''@Database'', ''sysname'') AS database_name,

    obj.value(''@Schema'', ''sysname'') AS schema_name,

    obj.value(''@Table'', ''sysname'') AS table_name,

    obj.value(''@Index'', ''sysname'') AS index_name,

    ixs.query_plan

    FROM IndexSearch ixs

    CROSS APPLY StmtSimple.nodes(''//Object'') AS o(obj)

    WHERE obj.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1;

    ```


    **Listing 14-41** Query Plan Cache for Index Usage


    At other times, searching for just the name of an index will be too broad of a
    search of the plan cache. In these cases, we can use the query in Listing 14-42.
    This query adds in the name of a physical operator to the plan cache search. For
    instance, suppose we are investigating Full Scans/sec and we know what index is
    causing the spike in the performance counter. Searching for just the index may
    return dozens of execution plans. Alternatively, we could add a search for a particular
    operator, such as an index scan, using the `@op` variable in the query provided.


    ```sql

    DECLARE @IndexName sysname = ''IX_SalesOrderHeader_SalesPersonID'';

    DECLARE @op sysname = ''Index Scan'';

    ;WITH XMLNAMESPACES (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT cp.plan_handle,

    DB_NAME(dbid) + ''.'' + OBJECT_SCHEMA_NAME(objectid, dbid) + ''.'' + OBJECT_NAME(objectid,
    dbid) AS database_object,

    qp.query_plan,

    c1.value(''@PhysicalOp'', ''nvarchar(50)''),

    c2.value(''@Index'', ''nvarchar(max)'')

    FROM sys.dm_exec_cached_plans cp

    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY query_plan.nodes(''//RelOp'') r(c1)

    OUTER APPLY c1.nodes(''IndexScan/Object'') AS o(c2)

    WHERE c2.value(''@Index'', ''nvarchar(max)'') = QUOTENAME(@IndexName, ''['')

    AND c1.exist(''@PhysicalOp[. = sql:variable("@op")]'') = 1;

    ```


    **Listing 14-42** Query Plan Cache for Index Usage and Physical Operation


    Both of these queries provide mechanisms for getting in and investigating indexes
    in their environment and seeing exactly how SQL Server is using them. This information
    can be easily leveraged to identify when problems are occurring and why and then
    provide a path to resolving indexing issues without a lot of the guesswork that
    many use today.


    # Summary


    As this chapter showed, we can use the information collected from monitoring indexes
    to analyze indexes to examine and identify indexes. The results from this analysis
    help to determine what types of indexes to modify and where. Indexing tools such
    as the Database Engine Tuning Advisor and missing index DMOs can be leveraged
    to discover “the low-hanging fruit,” giving us a head start on analysis that we
    may not have discovered otherwise. By following the processes laid out in this
    index analysis, we can build a stable, repeatable indexing process that can help
    improve the performance of your database platform and achieve stable performance
    over time.


    # 15. Indexing Methodology


    Throughout this book, we’ve discussed what indexes are, what they do, patterns
    for building them, and many other aspects for determining how a SQL Server database
    should be indexed. All that information is necessary for the last piece in indexing
    your databases, which is a methodology for managing indexes. To do this, you need
    a process for applying that knowledge to determine the indexes that are best for
