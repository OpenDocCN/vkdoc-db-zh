    代码清单 9-10：为 DELETE 操作创建表


    现在，为了演示由 `DELETE` 操作引起的碎片，你将使用代码清单 9-12 中的代码删除表中每隔 50 条记录中的其他 50 条记录。和之前一样，你将使用代码清单
