- fmt: '# 1. Index Fundamentals


    The goal of this book is to help you improve the performance of your databases
    through the use of indexes. In order to accomplish this, you must first understand
    what indexes are and why you need them. You need to understand the differences
    between how data in a clustered index, columnstore index, and heap table is stored.
    You also will look at how nonclustered and other index types are built and how
    indexes interact with other indexes. This chapter will provide the building blocks
    for understanding the logical design of indexes.


    ## Why Build Indexes?


    The most important asset any business owns is its data. Databases exist to store
    that data. A key piece in providing the data is delivering it efficiently. Being
    able to efficiently access data improves the value that the business gains from
    the data. The way to do that is through indexes.


    Indexes are the means to providing an efficient access path between the user and
    the data. By providing this access path, the user can ask for data from the database,
    and the database will know where to go to retrieve the data and how to do so with
    minimal effort.


    Why not just have all the data in a table and return it when it is needed? Why
    go through the exercise of creating indexes? Returning data when needed is actually
    the point of indexes; they provide the path that is necessary to get to the data
    in the quickest manner possible. Without indexes to provide a map to where data
    is located, database systems have to search through all of the available data
    to know that the required data has been accessed. In today’s world where terabytes
    of data is common, it’s important to be able to quickly and efficiently get to
    the data needed.


    To illustrate, let’s consider an analogy that is often used to describe indexes—a
    library. When you go to the library, there are shelves upon shelves of books.
    In this library, a common task repeated over and over is finding a book. Most
    often you are particular on the book that you need, and you have a few options
    for finding that book.


    In the library, books are stored on the shelves using the Dewey Decimal Classification
    system. This system assigns a number to a book based on its subject. Once the
    value is assigned, the book is stored in numerical order within the library. For
    instance, books on science are in the range of 500–599. From there, if you wanted
    a book on mathematics, you would look for books with a classification of 510–519.
    Then to find a book on geometry, you’d look for books numbered 516. With this
    classification system, finding a book on any subject is easy and efficient. Once
    you know the number of the book you are looking for, you can go directly to the
    stack in the library where the books with 516 are located, instead of wandering
    through the library until you happen upon the geometry books. This is exactly
    how indexes work; they provide an ordered manner to store information that allows
    users to easily find the data.


    What happens, though, if you want to find all the books in a library written by
    Jason Strate? You could make an educated guess that they are all categorized under
    databases, but you would have to know that for certain. The only way to do that
    would be to walk through the library and check every stack. The library has a
    solution for this problem—the card catalog.


    Most card catalogs are available through computer terminals these days, but back
    when I was a kid, they consisted of individual cards that were ordered by author,
    title, subject, and category. Using the card catalog, you would be able to find
    the Dewey Decimal number for any book. For instance, searching by author, you
    could find all books written by Jason Strate. Thus, instead of wandering through
    the stacks and checking each book to see whether I wrote it, you could instead
    go to the specific books in the library written by me. In essence, this is also
    how indexes work. The index provides a location of data so that queries can go
    directly to the data.


    Without these mechanisms, finding books in a library, or information in a database,
    would be difficult. Instead of going straight to the information, you’d wander
    through the library aisle to aisle trying to find what you need. In smaller libraries,
    such as Little Free Libraries, this isn’t much of a problem, since there are so
    few books. But as the library gets larger and settles into a building, it just
    isn’t efficient to browse all the stacks. And when there is research that needs
    to be done and books need to be found, there isn’t time to browse through everything.


    This analogy has hopefully provided you with the basis to understand the purpose
    and the need for indexes. In the following sections, I’ll dissect this analogy
    a bit more and pair it with the different indexing options that are available
    in SQL Server databases.


    ## Major Index Types


    You can categorize indexes in different ways. However, it’s essential to understand
    the four major categories described in this particular section: heaps, clustered,
    columnstore, and nonclustered indexes. Heaps, clustered indexes, and clustered
    columnstore indexes directly affect how data in the underlying tables are stored.
    Nonclustered indexes are independent of data storage. The first step toward understanding
    indexing is to grasp this categorization scheme.


    ### Heap Tables


    As mentioned in the library analogy, in a Little Free Library, the books available
    change often; usually there are only one or two short shelves of books. In these
    cases, the owner doesn’t spend time organizing the books under the Dewey Decimal
    system. Instead, the books are placed on the shelves as they are acquired. In
    this case, there is no order to how the books are stored in the library. When
    SQL Server stores data in a table in a similar fashion, when the data lacks an
    ordered structure, it is referred to as a *heap*.


    In a heap, the first row added to the index is the first record in the table,
    the second row is the second record in the table, the third row is the third record
    in the table, and so on. There is nothing in the data that is used to specify
    the order in which the data has been added. The data and records are in the table
    without any particular order.


    When a table is first created, the initial storage structure is called a *heap*.
    This is probably the simplest storage structure. Rows are inserted into the table
    in the order in which they are added. A table uses a heap until a clustered index
    or clustered columnstore index is created on the table or the table is created
    as memory-optimized, discussed in Chapter [7](#338675_3_En_7_Chapter.xhtml). A
    table can be a heap only if there are no other index types that define how the
    base data is stored on the table. Only a single heap structure is allowed per
    table.


    ### Note


    Most people don’t consider heaps to be indexes. That’s fine. In the context of
    this discussion, we will treat them as indexes as they assist in determining where
    data will be located and how it will be accessed by queries.'
