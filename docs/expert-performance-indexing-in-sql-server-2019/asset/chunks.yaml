- fmt: '### Note


    After SQL Server 2014, the behavior for these columns changed. On bulk inserts,
    only a single page is recorded for the `leaf_allocation_count`.


    At the start of this section, there was a reference to using page allocations
    to monitor for page splits and to identify where modifications to the fill factor
    can be useful. To understand this, you first need to generate page splits on the
    `dbo.AllocationCycle` table. You can do so using the script in Listing [3-41](#338675_3_En_3_Chapter.xhtml#PC41).
    This script increases the length of the `FillerData` column on every third row
    to 1,000 characters.


    ```sql

    USE AdventureWorks2017;

    GO

    UPDATE  dbo.AllocationCycle

    SET     FillerData = REPLICATE(''x'',1000)

    WHERE   ID % 3 = 1;

    ```

    **Listing 3-41** T-SQL Script to Increase Page Allocations


    Once the data is modified, the results from executing the `sys.dm_db_index_operational_stats`
    query in Listing [3-40](#338675_3_En_3_Chapter.xhtml#PC40) change drastically.
    With the size of the rows expanding, the number of pages allocated jumps up to
    9,849 with a total of 35 nonleaf pages (Figure [3-28](#338675_3_En_3_Chapter.xhtml#Fig28)).
    Since the order of the rows hasn’t changed, this activity is related to page splits
    from expanding the sizes of the rows. By monitoring these statistics, indexes
    affected by this pattern of activity can be identified.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig28_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig28_HTML.jpg)

    **Figure 3-28** Query results for update page allocations


    ### Compression


    While not the most exciting set of columns, there are two columns in `sys.dm_db_index_operational_stats`
    that are used for monitoring compression. These columns, listed in Table [3-18](#338675_3_En_3_Chapter.xhtml#Tab18),
    count the number of attempts that have been made at compressing a page and then
    the number of successful attempts in doing so. The primary value in these columns
    is providing feedback on `PAGE`-level compression. Failures can lead to decisions
    to remove compression because it is usually not practical to have compression
    enabled when there is a high rate of failure with compression.


    **Table 3-18** Compression Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `page_compression_attempt_count` | bigint | Number of pages that were evaluated
    for `PAGE`-level compression for specific partitions of a table, index, or indexed
    view. Includes pages that were not compressed because significant savings could
    not be achieved. |

    | `page_compression_success_count` | bigint | Number of data pages that were compressed
    by using `PAGE`-level compression for specific partitions of a table, index, or
    indexed view. |


    Page compression can fail when the cost to compress the data exceeds the value
    in uncompressing that data later. This is typically found in data that has low
    patterns of repeating data, such as images. When image data is compressed, it
    often does not receive sufficient benefit from the compression, and SQL Server
    will not store the page as a compressed page. To demonstrate this, execute the
    code in Listing [3-42](#338675_3_En_3_Chapter.xhtml#PC42), which creates a table
    with page compression enabled and inserts a number of images into it.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    CREATE TABLE dbo.PageCompression(

    ProductPhotoID int NOT NULL,

    ThumbNailPhoto varbinary(max) NULL,

    LargePhoto varbinary(max) NULL,

    CONSTRAINT PK_PageCompression PRIMARY KEY CLUSTERED (ProductPhotoID))

    WITH (DATA_COMPRESSION = PAGE);

    INSERT INTO dbo.PageCompression

    SELECT ProductPhotoID

    ,ThumbNailPhoto

    ,LargePhoto

    FROM Production.ProductPhoto;

    ```

    **Listing 3-42** T-SQL Script to create table with page compression


    The insert into the table doesn’t fail, but are all the pages compressed? To find
    out, execute the script in Listing [3-43](#338675_3_En_3_Chapter.xhtml#PC43);
    it returns the `page_compression_attempt_count` and `page_compression_success_count`
    columns. As the results show (Figure [3-29](#338675_3_En_3_Chapter.xhtml#Fig29)),
    7 pages were successfully compressed, but another 46 pages failed to compress.
    With this ratio of success to failures for page compression, it is easy to see
    that the value of page compression on the clustered index on `dbo.PageCompression`
    is not very high.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig29_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig29_HTML.jpg)

    **Figure 3-29** Query results for compression


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_compression_attempt_count

    ,page_compression_success_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.PageCompression''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```

    **Listing 3-43** Query for page compression attempts in `sys.dm_db_index_operational_stats`'
