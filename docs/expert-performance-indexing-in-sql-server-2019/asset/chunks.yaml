  trans: '

    # 索引交叉模式 vs. 多列模式


    ## 索引交叉模式


    为了演示索引交叉模式并让 SQL Server 使用索引交叉，下一个示例在 `LastName` 列上创建了一个索引（清单 11-17）。创建了索引 `IX_Contacts_LastName`
    后，结果与未创建该索引时相比发生了显著变化。第一个显著变化是读取次数。从之前执行的 68 次读取减少到了仅 5 次读取（图 11-22）。读取次数减少的原因是
    SQL Server 在查询计划中利用了索引交叉（图 11-23）。索引 `IX_Contacts_FirstName` 和 `IX_Contacts_LastName`
    被用来满足查询，而无需返回聚集索引检索查询数据。之所以能实现这一点，是因为这两个索引可以完全满足查询需求。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig23_HTML.jpg](img/338675_3_En_11_Fig23_HTML.jpg)

    **图 11-23** 索引交叉模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig22_HTML.jpg](img/338675_3_En_11_Fig22_HTML.jpg)

    **图 11-22** 索引交叉模式的统计信息 I/O 结果


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_LastName ON dbo.Contacts (LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    **清单 11-17** 索引交叉模式


    索引交叉是 SQL Server 的一项功能，当来自同一表的多个非聚集索引可以为查询提供结果时，它会利用此功能来更好地满足查询。在为索引交叉设计索引时，目标是基于“搜索列模式”创建多个索引，这些索引可以以多种组合方式一起使用，以支持各种筛选条件。关于索引交叉模式需要记住的一个关键点是，你无法告诉
    SQL Server 何时使用索引交叉；它会在请求、底层索引和数据适合时选择使用它。


    ## 多列模式


    前两节中的示例都专注于仅包含单个键列的索引。然而，非聚集索引最多可以有 16 列。虽然“窄”是良好定义的聚集索引的一个属性，但同样的原则并不总是适用于非聚集索引。相反，非聚集索引应包含尽可能多的必要列，以便被尽可能多的查询使用。如果许多查询使用相同的列作为谓词，通常将它们全部包含在一个索引中是一个好主意。


    演示使用多列模式的索引的一个简单方法是使用与上一节相同的查询并应用此模式。在该查询中，构建了两个索引，分别在 `FirstName` 和 `LastName`
    列上。对于多列模式，新索引将同时包含这两个列（清单 11-18）。


    如统计数据所示（图 11-24），通过使用多列模式，返回请求结果所需的读取次数有所减少。从索引交叉模式的 5 次读取减少到多列模式的仅 2 次读取。此外，执行计划（如图
    11-25 所示）也已简化。现在只对索引 `IX_Contacts_FirstNameLastName` 进行索引查找。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig25_HTML.jpg](img/338675_3_En_11_Fig25_HTML.jpg)

    **图 11-25** 多列模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig24_HTML.jpg](img/338675_3_En_11_Fig24_HTML.jpg)

    **图 11-24** 多列模式的统计信息 I/O 结果


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstNameLastName

    ON dbo.Contacts (FirstName, LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    **清单 11-18** 多列模式


    在为数据库设计索引时，实现多列模式与实现搜索列模式同样重要。通过将最常用于谓词的列组合在一起，此模式有助于减少使用的索引数量。虽然这种模式确实与索引交叉模式的某些价值相矛盾，但两者之间的关键是平衡。在某些情况下，对于查询谓词变化很多的表，依赖单列索引上的索引交叉将提供最佳性能。在其他时候，具有特定列顺序的更宽的索引将是有益的。尝试这两种模式，并以提供最佳整体性能的方式应用它们。请记住，如果索引效果不佳，总是可以将其移除。

    '
- fmt: '### Covering Index


    The next indexing pattern to be aware of is the Covering Index pattern. With the
    Covering Index pattern, columns outside the predicates are added to an index’s
    key columns to allow those values to be returned as part of the `SELECT` clauses
    of queries. This pattern has been a standard indexing practice for a while with
    SQL Server. Enhancements in how indexes can be created, though, make this pattern
    less useful than it was in the past. I am discussing it here because it is a common
    pattern that most already know.


    To begin looking at the Covering Index pattern, we’ll first need an example to
    define the problem that the index solves. To show the issue, the next test query
    will include the `IsActive` column in the `SELECT` list (Listing [11-19](#338675_3_En_11_Chapter.xhtml#PC19)).
    With this column added, the I/O statistics increase again from two reads to five
    reads, shown in Figure [11-26](#338675_3_En_11_Chapter.xhtml#Fig26). The change
    in performance is directly related to the change in the execution plan (see Figure
    [11-27](#338675_3_En_11_Chapter.xhtml#Fig27)) that includes a key lookup and a
    nested loop. As with the previous examples, as items not included in the nonclustered
    index are added to the query, they need to be retrieved from the clustered index,
    which contains all the data for the table.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig27_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig27_HTML.jpg)


    Figure 11-27

    Execution plan for Covering Index pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig26_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig26_HTML.jpg)


    Figure 11-26

    Statistics I/O results for Covering Index pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 11-19

    Covering Index Pattern

    ```


    Ideally, you want an index in place that can accommodate the filters on the index
    and can also rerun the columns requested in the `SELECT` list. The Covering Index
    pattern can fulfill these requirements. Even though `IsActive` is not one of the
    predicates for the query, it can be added to the index, and SQL Server can use
    that key column to return the column values with the query. To demonstrate the
    Covering Index pattern, let’s create an index that has `FirstName`, `LastName`,
    and `IsActive` as the key columns (see Listing [11-20](#338675_3_En_11_Chapter.xhtml#PC20)).
    With the index `IX_Contacts_FirstNameLastName` in place, the reads return to two
    per execution (see Figure [11-28](#338675_3_En_11_Chapter.xhtml#Fig28)). The execution
    plan is also now using only an index seek (see Figure [11-29](#338675_3_En_11_Chapter.xhtml#Fig29)).


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig29_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig29_HTML.jpg)


    Figure 11-29

    Execution plan for Covering Index pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig28_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig28_HTML.jpg)


    Figure 11-28

    Statistics I/O results for Covering Index pattern


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts(FirstName,
    LastName,

    IsActive);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 11-20

    Covering Index Pattern

    ```


    The Covering Index pattern can be quite useful and has the potential to improve
    performance in many areas. In the last few years, the use of this pattern has
    diminished. This change in use is primarily being driven by the availability of
    the option to include columns in indexes, which was introduced with SQL Server
    2005.


    #### Note


    Some consider covering indexes and indexes with included columns the same thing.
    While very similar, the key difference between the two is the location of the
    columns as part of the key or data included in the index.


    ### Included Columns


    The Included Columns pattern is a close cousin to the Covering Index pattern.
    The Included Columns pattern leverages the `INCLUDE` clause of the `CREATE` and
    `ALTER INDEX` syntax. The clause allows nonkey columns to be added to nonclustered
    indexes, similar to how nonkey data is stored on clustered indexes. This is the
    primary difference between the Included Columns and Covering Index patterns, where
    the additional columns in the Covering Index are key columns on the index. Like
    clustered indexes, the nonkey columns that are part of the `INCLUDE` clause are
    not sorted, although they can be used as predicates in some queries.


    The use case for the Included Columns pattern comes from the flexibility that
    it provides. It is generally the same as the Covering Index pattern, and sometimes
    the names are used interchangeably. The key difference, which is demonstrated
    in this section, is that the Covering Index pattern is limited by the sort order
    of all the columns in the index. The Included Columns pattern can avoid this potential
    issue by including nonkey data, thereby increasing its flexibility of use.


    Before demonstrating the flexibility of the Included Columns pattern, let’s first
    examine another index against the `dbo.Contacts` table. In Listing [11-21](#338675_3_En_11_Chapter.xhtml#PC21),
    the query is filtering just on a `FirstName` value of Catherine and returning
    the `ContactID`, `FirstName`, `LastName`, and `EmailAddress` columns. This query
    request differs from the other examples because it now includes the `EmailAddress`
    column. Since this column is not included in any of the other nonclustered indexes,
    none of them can fully satisfy the query. As a result, the execution plan utilizes
    `IX_Contacts_FirstName` to identify the Catherine rows and then looks up the rest
    of the data from the clustered index, shown in Figure [11-30](#338675_3_En_11_Chapter.xhtml#Fig30).
    With the key lookup, the reads for the query also increase to 68 reads (see Figure
    [11-31](#338675_3_En_11_Chapter.xhtml#Fig31)), as they have in previous examples.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig31_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig31_HTML.jpg)


    Figure 11-31

    Execution plan for Included Columns pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig30_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig30_HTML.jpg)


    Figure 11-30

    Statistics I/O results for Included Columns pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 11-21

    Included Columns Pattern

    ```


    To improve the performance of this query, another index based on either the Multiple
    Column pattern or the Covering Index pattern could be created. The trouble with
    these options, though, is that the resulting index would have the same limitations
    as the queries that they could improve. Instead, a new index based on the Included
    Columns pattern will be created. This new index, shown in Listing [11-22](#338675_3_En_11_Chapter.xhtml#PC22),
    has `FirstName` as the key column and includes `LastName`, `IsActive`, and `EmailAddress`
    as the nonkey columns. Even though the `IsActive` column is not used in the index,
    it is being included to allow additional flexibility for the index, which a later
    example in this section will utilize. With the index in place, the performance
    of the query in Listing [11-22](#338675_3_En_11_Chapter.xhtml#PC22) improves significantly.
    In this example, the reads drop from the previous 68 per execution to 3 reads
    (see Figure [11-32](#338675_3_En_11_Chapter.xhtml#Fig32)). In the execution plan,
    the key lookup and nested loop are no longer needed; instead, there is just the
    index seek, which is now using the index `IX_Contacts_FirstNameINC` (see Figure
    [11-33](#338675_3_En_11_Chapter.xhtml#Fig33)).'
