    `INSERT` 和 `UPDATE` 事务中被重用，这可能导致这些页面随后在物理上变得无序。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig10_HTML.jpg](img/338675_3_En_9_Fig10_HTML.jpg)


    图 9-10：DELETE 后的碎片化结果


