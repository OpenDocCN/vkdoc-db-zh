  raw: '### Note


    One of the improvements to SQL Server 2017 Enterprise Edition is the ability to
    perform online index rebuilds when the index contains columns with large object
    (LOB) data types.


    Combining all these pieces into the template from the beginning of this section
    to create an index defragmentation script provides similar functionality to that
    of the maintenance plan tasks. With the ability to set the size and fragmentation
    levels in which the defragmentation occurs, this script removes the fragmentation
    from indexes that really need the work done on them vs. just defragmenting every
    index in the database. Using Extended Events on `AdventureWorks2017` to trace
    the output of the script reveals that the `ALTER INDEX` syntax for the results
    of the previous queries is similar to that in Listing [9-31](#338675_3_En_9_Chapter.xhtml#PC31).


    ```

    ALTER INDEX ALL ON [HumanResources].[EmployeePayHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [HumanResources].[JobCandidate] REORGANIZE; WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [dbo].[AllocationCycle] REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [dbo].[PageCompression] REORGANIZE; WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [Sales].[SalesPersonQuotaHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    Listing 9-31

    Index Defragmentation Statements

    ```


    As the code in this section demonstrated, using a T-SQL script can be much more
    complicated than just using the maintenance plan tasks. The upside to the complexity
    is that once the script is complete, it can be wrapped in a stored procedure and
    used on all your SQL Server instances. This script is meant as a first step in
    automating defragmentation with T-SQL scripts. It doesn’t account for partitioned
    tables and doesn’t check to see whether the index is being used before rebuilding
    or reorganizing the index. On the upside, rather than driving a truck through
    your databases and re-indexing everything, a scripted solution can intelligently
    decide how and when to defragment your indexes.


    ### Note


    For a complete index defragmentation solution, check out Ola Hallengren’s index
    maintenance scripts at [`https://ola.hallengren.com`](https://ola.hallengren.com).


    ### Preventing Fragmentation


    Fragmentation within an index is not always a foregone conclusion. There are some
    methods that can be utilized to mitigate the rate in which fragmentation occurs.
    When you have indexes that are often affected by fragmentation, it is advisable
    to investigate why the fragmentation is occurring. There a few strategies that
    can help mitigate fragmentation; these are fill factor, data typing, and default
    values.


    #### Fill Factor


    Fill factor is an option that can be used when building or rebuilding indexes.
    This property is used to determine how much space per page should be left available
    in the index when it is first created or the next time it is rebuilt. For instance,
    with a fill factor of 75, about 25 percent of every data page is left empty.


    If an index encounters a significant or frequent amount of fragmentation, it is
    worthwhile to adjust the fill factor to mitigate the fragmentation. By doing this,
    the activities that are causing fragmentation should be less impactful, which
    should reduce the frequency that the index needs to be defragmented.


    By default, SQL Server creates all indexes with a fill factor of 0. This is a
    recommended value for both the server and database levels. Not all indexes are
    created equal, and fill factor should be applied as it is needed, not as a blanket
    insurance policy. Also, a fill factor of 0 is the same as a fill factor of 100.


    The one downside of fill factor is that leaving space available in data pages
    means that the index will require more data pages for all the records in the index.
    More pages means more I/O and possibly less utilization of the index if there
    are alternate indexes to select from.


    #### Data Typing


    Another way to avoid fragmentation is through appropriate data typing. This strategy
    applies to data types that can change length depending on the data that they contain.
    These are data types such as `VARCHAR` and `NVARCHAR`, which have lengths that
    can change over time.


    In many cases, variable-length data types are a great fit for columns in a table.
    Issues arise when the volatility of the data is high and the length of the data
    is volatile as well. As the data changes length, there can be page splits, which
    lead to fragmentation. If the length volatility occurs across significant portions
    of the index, then there may also be significant numbers of page splits and thus
    fragmentation.


    A great example of bad data typing comes from my experience with the first data
    warehouse that I worked with. The original design for many of the tables included
    a column with a data type of `VARCHAR(10)`. The column was populated with dates
    in the format of `yyyymmdd`, with values similar to 20191011\. As part of the
    import process, the date values were updated into a format of `yyyy-mm-dd`. When
    the import was moved to production and millions of rows were being processed at
    a time, the increase in the length of the column from eight to ten characters
    led to an astounding level of fragmentation because of page splits. Resolving
    the problem was as simple as changing the data type of the column from `VARCHAR(10)`
    to `CHAR(10)`.


    Such simple solutions can apply to many databases. It just requires a bit of investigation
    into why the fragmentation is occurring.


    #### Default Values


    The proper application of default values may not seem to be something that can
    assist in preventing fragmentation, but there are some scenarios in which it can
    have a significant effect on fragmentation. The poster child for this type of
    mitigation is when databases utilize the `uniqueidentifier` data type.


    In most cases, `uniqueidentifier` values are generated using the `NEWID()` function.
    This function creates a globally unique identifier (GUID) that should be unique
    across the entire planet. This is useful for generating unique identifiers for
    rows but is likely scoped larger than that of your database. In many cases, the
    unique value probably needs to be unique for the server or just the table.


    The main problem with the `NEWID()` function is that generating the GUID is not
    a sequential process. As demonstrated at the beginning of the chapter, using this
    function to generate values for the clustered index key can lead to severe levels
    of fragmentation.


    An alternative to the `NEWID()` function is the `NEWSEQUENTIALID()` function .
    This function returns a GUID just like the other function but with a couple variations
    on how the values are generated. First, each GUID generated by the function on
    a server is sequential to the last value. The second variation is that the GUID
    value generated is unique only to the server that is generating it. If another
    SQL Server instance generates a GUID with this function for the same table, it
    is possible that duplicate values will be generated and the values will not be
    sequential since these are scoped to the server level.


    With these restrictions in mind, if a table must use the `uniqueidentifier` data
    type, the `NEWSEQUENTIALID()` function is an excellent alternative to the `NEWID()`
    function. The values will be sequential, and the amount of fragmentation encountered
    will be much lower and less frequent.'
