    审视图 3-6 中的结果，可以深入了解 `modification_counter` 列是如何填充的。总结来说，任何插入、更新或删除操作都被视为对索引和统计信息的一次更改。查看查询
    1 的结果，更改的 40 行导致 `CIX_SalesOrderHeaderStats_OrderDate` 的 `modification_counter`
    增加到 40。类似地，当查询 2 和 3 中的 `SalesOrderNumber` 被更改时，无论值是否实际发生变化，每个查询都导致 `modification_counter`
    增加了 50。增加记录数会导致所有三个索引的 `modification_counter` 值都增加 11,465，这与插入的记录数相符。最后，在查询 5
    的结果中，你看到 20,000 条记录被删除。有趣的是，在最后一个查询的结果中，来自 `CIX_SalesOrderHeaderStats` 的统计信息被更新，以更好地反映索引中值的变化。


    虽然 `sys.dm_db_stats_properties` 不会提供表中所有不同记录的列表及其可能对统计信息产生的影响，但它确实提供了详细信息，可以识别索引及其支持的统计信息上的变更量。当试图确定索引的统计信息是否可能过时时，这个动态管理对象非常有用。


    ### sys.dm_db_stats_histogram


    虽然可以通过 `DBCC SHOW_STATISTICS` 获取统计信息的直方图，但 SQL Server 2016 引入了动态管理对象函数 `sys.dm_db_stats_histogram`。该函数返回类似于
    `DBCC` 命令的输出，其额外好处是可以与其他动态管理对象联接，以提高这些数据的可用性。该函数的语法如清单 3-9 所示，它接受一个 `object_id`
    和 `stats_id`，输出中返回的列如表 3-7 所示。


    **表 3-7**

    `sys.dm_db_stats_histogram` 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 相关对象的 ID。 |

    | `stats_id` | `int` | 统计信息的 ID。对于索引，此 ID 与索引 ID 匹配。 |

    | `step_number` | `int` | 直方图中的步骤编号。最大值 200。 |

    | `range_high_key` | `sql_variant` | 直方图步骤的上限列值。该列值也称为 *键值*。 |

    | `range_rows` | `real` | 估计的行数，其列值落在直方图步骤内，不包括上限。 |

    | `equal_rows` | `real` | 估计的行数，其列值等于直方图步骤的上限。 |

    | `distinct_range_rows` | `bigint` | 估计的行数，其列值在直方图步骤内是唯一的，不包括上限。 |

    | `average_range_rows` | `real` | 直方图步骤内具有重复列值的行的平均数，不包括上限（当 `distinct_range_rows
    > 0` 时为 `range_rows/distinct_range_rows`）。 |


    ```

    sys.dm_db_stats_histogram (object_id, stats_id)

