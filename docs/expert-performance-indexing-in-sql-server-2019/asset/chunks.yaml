    ### 单例查找


    在 `SELECT` 活动上收集的下一个统计列是 `singleton_lookup_count`。每当使用键查找（以前称为书签查找）时，此列中的值就会增加。一般来说，这与在
    `sys.dm_db_index_usage_stats` 的 `user_lookups` 列中收集的信息类型相同。然而，`user_lookups` 和
    `singleton_lookup_count` 之间存在显著差异。当使用键查找时，`user_lookups` 会增加 1，以指示索引操作已被使用。而对于
    `singleton_lookup_count`，使用键查找操作的每一行都会导致此列中的值增加 1。


