    5%，则可能存在与该等待类型相关的瓶颈，应进行进一步调查。同样地，如果任何等待类型的等待时间超过总时间的 1%，也应考虑进行进一步分析，但应优先处理那些等待时间更高的项目。在审查等待统计信息时，需要特别注意的一点是，如果等待所花费的时间主要是由于信号等待时间
