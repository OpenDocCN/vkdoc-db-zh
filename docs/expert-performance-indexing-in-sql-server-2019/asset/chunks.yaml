    After creating the table, you’ll use the script in Listing [2-3](#338675_3_En_2_Chapter.xhtml#PC3)
    to show how SQL Server stored the records in the table and how you can examine
    them with sys.dm_db_database_page_allocations. As Figure [2-13](#338675_3_En_2_Chapter.xhtml#Fig13)
    shows, there is one Index Allocation Map page allocated to the table, which is
    within a mixed page allocation. This means the multiple indexes can use that extent
    to allocate these pages. And then there are eight pages allocated to the first
    data page extent of the index starting at page 312 and another four pages allocated
    from an extent starting at page 320. Additionally, you see that there are four
    pages allocated but not assigned a page type on the extent at page 320\. This
    demonstrates and confirms what was discussed in the previous section on heap structures.
    There’s an index allocation map and extents with data pages allocated to that
    map.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig13_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig13_HTML.jpg)


