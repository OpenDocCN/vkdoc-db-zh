    [3-10](#338675_3_En_3_Chapter.xhtml#PC10), you can get the histogram for all statistics
    on `Sales.SalesOrderDetail`. This provides information on all of the steps and
    their range values. Scroll through the results, shown in Figure [3-7](#338675_3_En_3_Chapter.xhtml#Fig7),
    to rows 163 and 164; and you’ll see where the `range_high_key` value changes from
    numeric to character data with the change between the statistics and steps.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig7_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig7_HTML.jpg)

    **Figure 3-7**

    Query results for `sys.dm_db_stats_histogram` on `Sales.SalesOrderDetail`


    ```

    USE AdventureWorks2017;

    GO

    SELECT h.object_id,

    h.stats_id,

    h.step_number,

    h.range_high_key,

    h.range_rows,

    h.equal_rows,

    h.distinct_range_rows,

    h.average_range_rows

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_histogram(s.object_id, s.stats_id) h

    WHERE s.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-10

    sys.dm_db_stats_histogram Query for Sales.SalesOrderDetail

    ```


    This new function is a great addition to your abilities to view and inspect histograms.
    For example, if you had multiple indexes and statistics on a column, you could
    write a query that includes just those statistics and then filter the `range_high_key`
    to only include the steps that match the records that you are concerned about.
    At that point, you can see the `average_range_rows` and get an understanding on
    why SQL Server may have chosen one index over another.'
