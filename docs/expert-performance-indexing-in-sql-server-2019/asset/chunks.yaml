    # Myth 6: Indexes Always Output in the Same Order


    One of the more common myths that pertain to indexes is that they guarantee the
    output order of results from queries. This is not correct. As previously described
    in this book, the purpose of indexes is to provide an efficient access path to
    the data. That purpose does not guarantee the order in which the data will be
    accessed. The trouble with this myth is that, oftentimes, SQL Server will appear
    to maintain order when queries are executed under certain conditions, but when
    those conditions change, the execution plans change, and the results are returned
    in the order that the data is processed vs. the order that the end user might
    desire.


    To explore this myth, you’ll first look at how conditions can change on a query
    that is using clustered index. In Listing [8-15](#338675_3_En_8_Chapter.xhtml#PC15),
    there is a single query, repeated twice, for the `Sales.SalesOrderHeader` and
    `Sales.SalesOrderDetail` tables that is performing a simple aggregation. This
    is something that might appear in many types of use cases for SQL Server.


    ```sql

    USE AdventureWorks2017

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1000)

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1)

    GO

    Listing 8-15

    Unordered Results with Clustered Index

    ```


    The conditions in which the two queries execute vary a bit. The first query is
    running under the standard SQL Server cost model and generates an execution that
    performs a couple index scans and a stream aggregation to return the results,
    shown in Figure [8-9](#338675_3_En_8_Chapter.xhtml#Fig9). The results from the
    query, provided in Figure [8-10](#338675_3_En_8_Chapter.xhtml#Fig10), provide
    support that SQL Server will return data in the desired output, provided that
    the `SaleOrderID` column is the column that the user wants sorted.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig10_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Results from default aggregation execution plan


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig9_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Default aggregation execution plan


    But what happens if the conditions on the SQL Server change but the business rules
    do not? The second query executed in Listing [8-15](#338675_3_En_8_Chapter.xhtml#PC15)
    is the same query, but with a change in conditions. For this example, the DBCC
    command `SETCPUWEIGHT` is leveraged to change the cost of the execution plan.
    The change in cost results in the use of the parallel execution plan, shown in
    Figure [8-11](#338675_3_En_8_Chapter.xhtml#Fig11). A side effect of the parallel
    plan is a change in the order in which the results of the query are returned,
    shown in Figure [8-12](#338675_3_En_8_Chapter.xhtml#Fig12). While the results
    appear to still be ordered and the logic of the query hasn’t changed, the first
    records returned are different. This occurs because one of the parallel threads
    returned its results faster than some others.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig12_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Aggregation execution plan with parallelism


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig11_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Aggregation execution plan with parallelism'
