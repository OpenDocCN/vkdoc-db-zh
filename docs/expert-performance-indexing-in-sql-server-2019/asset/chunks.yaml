- fmt: '## What’s in This Book?


    From beginning to end, this book provides information that helps build your skills
    from a novice at indexing to an expert. The chapters are laid out such that you
    can start at any place to fill in the gaps in your knowledge and build out from
    there. Whether you can barely spell index, need to understand the fundamentals,
    or need to build an indexing methodology, the information is available here.


    Chapter [1](#338675_3_En_1_Chapter.xhtml) covers index fundamentals. It lays the
    groundwork for all of the following chapters. This chapter provides information
    regarding the types of indexes available in SQL Server. It covers some of the
    Primary index types and defines what these are and how to build them. The chapter
    also explores the options available that can change the structure of indexes.
    From fill factor to included columns, the available attributes are defined and
    explained.


    Chapter [2](#338675_3_En_2_Chapter.xhtml) picks up where the previous chapter
    left off. Going beyond defining the indexes available, the chapter looks at the
    physical and logical structure of indexes and the components that make up indexes.
    This internal understanding of indexes provides the basis for grasping why indexes
    behave in certain ways in certain situations. As you examine the structures of
    indexes, you’ll become familiar with the tools you can use to begin digging into
    these structures on your own.


    Armed with an understanding of the indexes available and how they are built, Chapter
    [3](#338675_3_En_3_Chapter.xhtml) explores the statistics that are stored on the
    indexes and how to use this information; these statistics provide insight into
    how SQL Server is utilizing indexes. The chapter also provides information necessary
    to decipher why an index may not be selected and why it is behaving in a certain
    way. You will gain a deeper understanding of how this information is collected
    by SQL Server through dynamic management views and what data is worthwhile to
    review.


    Not every index type is fully discussed in the first chapter; the types not discussed
    are covered in Chapters [4](#338675_3_En_4_Chapter.xhtml), [5](#338675_3_En_5_Chapter.xhtml),
    and [6](#338675_3_En_6_Chapter.xhtml). Beyond the rowstore and columnstore index
    structures, there are a few other index types which are Extensible Markup Language
    (XML), spatial, full-text, and semantic search. These indexes are applicable to
    specific situations. In these chapters, you’ll look into these other index types
    to understand what they have to offer. You’ll also look at situations where they
    should be implemented.


    In a similar fashion to the previous three chapters, Chapter [7](#338675_3_En_7_Chapter.xhtml)
    takes a dive into memory-optimized tables. Memory-optimized tables were new to
    SQL Server 2014 and provided a unique capability to provide improved performance
    with tables that reside in memory when online. This chapter will look at how indexes
    function on these types of tables and what restrictions still remain.


    Chapter [8](#338675_3_En_8_Chapter.xhtml) identifies and debunks some commonly
    held myths about indexes. Also, it outlines some best practices in regard to indexing
    a table. As you move into using tools and strategies to build indexes in the chapters
    that follow, this information will be important to remember.


    With a firm grasp of the options for indexing, the next thing that needs to be
    addressed is maintenance. In Chapter [9](#338675_3_En_9_Chapter.xhtml), you’ll
    look at what needs to be considered when maintaining indexes in your environment.
    We’ll look at both the fragmentation of the indexes and the underlying statistics
    that supports how SQL Server determines how the index can be used.


    SQL Server is not without tools to automate your ability to build indexes. Chapter
    [10](#338675_3_En_10_Chapter.xhtml) explores these tools and looks at ways that
    you can begin building indexes in your environment today with minimal effort.
    The four tools discussed are the missing index dynamic management views (DMVs),
    Database Engine Tuning Advisor (DTA), Query Store, and Automatic Database Tuning.
    You’ll look at the benefits and issues regarding these tools and get some guidance
    on how to use them effectively in your environment.


    The tools alone won’t give you everything you need to index your databases. In
    Chapter [11](#338675_3_En_11_Chapter.xhtml), you’ll begin to look at how to determine
    the indexes that are needed for a database and a table. There are a number of
    strategies for selecting what indexes to build within a database. They can be
    built according to recommendations by the query optimizer. They also should be
    built to support metadata structures such as foreign keys. For each strategy of
    indexing, there are a number of considerations to take into account when deciding
    whether or not to build the index.


    Part of effective indexing is writing queries that can utilize an index on a query.
    Chapter [12](#338675_3_En_12_Chapter.xhtml) discusses a number of strategies for
    indexing. Sometimes when querying data, the indexes that you assume will be used
    are not used after all. These situations are usually tied into how a query is
    structured or the data that is being retrieved. Indexes can be skipped due to
    SARGability issues (where the query isn’t being properly selective on the index).
    They can also be skipped over due to tipping point issues, such as when the number
    of reads to retrieve data from an index potentially exceeds the reads to scan
    that or another index. These issues affect index selection as well as the effectiveness
    and justification for some indexes.


    Today’s DBA isn’t in a position where they have only a single table to index.
    A database can have tens, hundreds, or thousands of tables, and all of them need
    to have the proper indexes. Beginning in Chapter [13](#338675_3_En_13_Chapter.xhtml),
    you’ll learn some methods to approach indexing for a single database but also
    for all of the databases on a server and servers within your environment.


    ## What’s New in This Edition?


    With three new versions of SQL Server released since the last edition of this
    book, there have been a significant number of changes to how indexes can be applied
    to your databases and data. Some of the key changes to SQL Server that involve
    indexing are as follows:


    *   Changes in indexing restrictions to memory-optimized tables and columnstore
    indexes

    *   Improvements to maintenance processes for indexes including improved processing
    and ability to pause and restart index rebuilds

    *   New tools to review query execution to identify and automate index selection

    *   Improvements to partitioning and statistics

    *   Changes in dynamic management objects (DMOs) available that improve capabilities
    to inspect indexes and data pages


    All of these changes and more are spread throughout the book in all of the chapters.
    Even though there have been a number of releases of SQL Server since the last
    edition, the primary focus will be on SQL Server 2019 as the current state of
    SQL Server. Where applicable, information will be included to indicate features
    made available since the last edition, namely, calling out changes from SQL Server
    2016 and 2017.


    ## Summary


    As previously mentioned, data is important, and indexes provide the way for you
    to get to that data. Through the chapters in this book, you will become armed
    with what you need to know about the indexes in your environment. You will also
    learn how to find the information you need to improve the performance of your
    environment.


    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer'
