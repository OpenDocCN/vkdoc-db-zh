    Table 3-14


    Access Pattern Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `range_scan_count` | bigint | Cumulative count of range and table scans started
    on the index or heap. |

    | `singleton_lookup_count` | bigint | Cumulative count of single row retrievals
    from the index or heap. |

    | `forwarded_fetch_count` | bigint | Count of rows that were fetched through a
    forwarding record. |


    #### Range Scan


    Range scans occur whenever a range of rows or a table scan is used to access data.
    When considering a range of rows, it can be anywhere from 1 to 1,000 or more rows.
    The number of rows in the range is not material in how SQL Server accesses the
    data. With table scans, the number of rows is also not important, but you already,
    likely, assume that it includes all records in the table. In `sys.dm_db_index_operational_stats`,
    these values are stored in the column `range_scan_count`.


    To see this information collected in `range_scan_count`, execute the code in Listing
    [3-13](#338675_3_En_3_Chapter.xhtml#PC13) and Listing [3-15](#338675_3_En_3_Chapter.xhtml#PC15)
    from the previous section. Before doing this, take the AdventureWorks2017 database
    offline and then bring it back online which will reset the statistics returned
    from the DMOs. In these two code samples, four queries will be executed. The first
    two will result in index seeks in the query plan, shown in Figure [3-9](#338675_3_En_3_Chapter.xhtml#Fig9).
    And the second two queries result in index scans, as shown in the execution plans
    in Figure [3-11](#338675_3_En_3_Chapter.xhtml#Fig11). Running the code in Listing
    [3-25](#338675_3_En_3_Chapter.xhtml#PC25) will show, as displayed in Figure [3-18](#338675_3_En_3_Chapter.xhtml#Fig18),
    that all four queries used a range scan to retrieve the data from the table.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig18_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Query results for range_scan_count


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.range_scan_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 3-25

    Query for range_scan_count from sys.dm_db_index_operational_stats

    ```


    #### Singleton Lookup


    The next statistics column collected on `SELECT` activity is `singleton_lookup_count`.
    Values in this column are increased whenever the key lookup, formerly bookmark
    lookup, is used. In general terms, this is the same type of information as collected
    in the column `user_lookups` in `sys.dm_db_index_usage_stats`. There is a significant
    difference, though, between `user_lookups` and `singleton_lookup_count`. When
    a key lookup is used, `user_lookups` will increment by one to indicate that the
    index operation had been used. With `singleton_lookup_count`, for every row that
    uses the key lookup operation, the value in this column will increase by one.


    For instance, running the code in Listing [3-17](#338675_3_En_3_Chapter.xhtml#PC17)
    will result in a key lookup. This can be validated by examining the execution
    plan, shown in Figure [3-13](#338675_3_En_3_Chapter.xhtml#Fig13). The statistics
    from this were discussed previously and shown in Figure [3-19](#338675_3_En_3_Chapter.xhtml#Fig19).
    The new information to look at can be investigated by running the T-SQL statement
    in Listing [3-26](#338675_3_En_3_Chapter.xhtml#PC26). In the results, you can
    see that instead of there being a value of 1 in `singleton_lookup_count`, the
    value is 243\. This is an important distinction for this column. Rather than knowing
    that key lookups have occurred, this statistic provides information on the scope
    of the lookups. You could consider that if the ratio of singleton lookups to range
    scans was high, there may be other indexing alternatives to consider.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig19_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Query results for singleton_lookup_count


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.singleton_lookup_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios. singleton_lookup_count DESC;

    Listing 3-26

    Query for singleton_lookup_count from sys.dm_db_index_operational_stats

    ```'
