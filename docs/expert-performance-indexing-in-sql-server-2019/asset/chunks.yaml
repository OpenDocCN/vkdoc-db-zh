  trans: '

    # DDL 命令


    更新统计信息的另一种方式是通过 DDL 命令 `UPDATE STATISTICS`，如清单 9-33 所示。`UPDATE STATISTICS` 语句允许对每个统计信息进行精细调优的更新，并提供了多种选项来控制如何收集和构建统计信息。


    ```

    UPDATE STATISTICS table_or_indexed_view_name

    [

    {

    { index_or_statistics_name }

    | ( { index_or_statistics_name } [ ,...n ] )

    }

    ]

    [    WITH

    [

    FULLSCAN

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | SAMPLE number { PERCENT | ROWS }

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | RESAMPLE

    [ ON PARTITIONS ( { <partition_number> | <range> } [, ...n] ) ] ]

    [ [ , ] [ ALL | COLUMNS | INDEX ]

    [ [ , ] NORECOMPUTE ]

    [ [ , ] INCREMENTAL = { ON | OFF } ]

    [ [ , ] MAXDOP = max_degree_of_parallelism ]

    ] ;

    ```

    *清单 9-33* `UPDATE STATISTICS` 语法


    使用 `UPDATE STATISTICS` 时设置的第一个参数是 `table_or_indexed_view_name`。此参数引用将要更新其统计信息的表。使用
    `UPDATE STATISTICS` 命令，一次只能更新一个表或视图的统计信息。


    下一个参数是 `index_or_statistics_name`。此参数用于确定是更新单个统计信息、统计信息列表，还是表上的所有统计信息。若要仅更新单个统计信息，请在表或视图名称之后包含该统计信息的名称。对于统计信息列表，统计信息名称包含在括号内的逗号分隔列表中。如果未命名任何统计信息，则所有统计信息都将被视为更新对象。


    设置好参数后，就需要向 `UPDATE STATISTICS` 命令添加适用的选项。这正是该语法强大和灵活之处所在。这些参数允许根据统计信息中可用的数据对其进行精细调优，从而为正确的表和正确的索引获取合适的统计信息：


    *   `FULLSCAN`：构建统计信息对象时，扫描表或视图中的所有行和页。对于大表，这在创建统计信息时可能会影响性能。基本上，这等同于执行 `SAMPLE
    100 PERCENT` 操作。

    *   `SAMPLE`：使用表或视图中行的计数或百分比样本来创建统计信息对象。当未选择采样率时，SQL Server 将根据表中的行数确定合适的采样率。

    *   `RESAMPLE`：使用上次更新统计信息时的采样率进行更新。例如，如果上次更新使用了 `FULLSCAN`，那么 `RESAMPLE` 也将导致
    `FULLSCAN`。

    *   `PERSIST_SAMPLE_PERCENT`：确定是否应将定义的采样率持久化到统计信息中，作为未来未指定默认值时的默认值。

    *   `ALL | COLUMNS | INDEX`：确定应更新列统计信息、索引统计信息，还是两者都更新。

    *   `NORECOMPUTE`：禁用查询优化器请求自动更新统计信息的选项。这对于锁定不应更改或在当前采样下是最优的统计信息很有用。在对频繁修改数据的表使用此选项时需谨慎，并确保有其他机制可以在需要时更新统计信息。

    *   `INCREMENTAL`：启用时，统计信息将创建为按分区统计信息，这允许使用 `ON PARTITIONS` 子句按分区更新统计信息。

    *   `MAXDOP`：确定统计信息更新操作的最大并行度，并覆盖服务器的最大并行度配置。


    此列表中的前三个选项是互斥的。您只能选择其中一个选项。选择多个选项将导致错误。


    由于 `UPDATE STATISTICS` 是 DDL 命令，可以很容易地实现自动化，方式类似于对索引进行碎片整理。为简洁起见，未提供示例脚本，但索引碎片维护的模板可以作为一个起点。如前一节所述，`sp_updatestats`
    在底层使用了 `UPDATE STATISTICS`。此 DDL 命令是一种强大的方式，可以根据需要更新数据库中的统计信息，而无需执行超出实际必要的操作。延续上一节的类比，使用
    `UPDATE STATISTICS` 相当于用一件手工编织的毛毯替换了原来的毯子和羽绒被。


    # 总结


    在本章中，您了解了表索引编制过程中涉及的一些维护注意事项。这些注意事项可归结为管理索引碎片和管理其统计信息。关于索引碎片，您看到了索引可能产生碎片的方式、为何这是一个问题以及消除碎片的策略。这些维护任务对于确保
    SQL Server 能够充分利用索引至关重要。除了维护活动之外，索引上的统计信息也必须进行维护。过时或不准确的统计信息可能导致执行计划与表中的数据不匹配。如果没有合适的执行计划，无论索引如何，性能都会受到影响。


    # 10. 索引工具


    在索引编制方面，Microsoft 目前在 SQL Server 中内置了两个工具，可用于帮助识别可以改善数据库性能的索引。它们是缺失索引动态管理对象 (DMO)
    和数据库引擎优化顾问 (DTA)。这两个工具对于辅助索引数据库都很有用，并且在调优数据库时可以提供有价值的输入。Microsoft 正在开发一个新的自动索引管理工具，目前在
    Azure SQL Database 中可用。在撰写本文时，该工具未包含在 SQL Server 2019 中。


    本章深入探讨了缺失索引和数据库引擎优化顾问这两种索引工具。本章分为两个部分，分别描述每个工具的功能。然后，我们将逐步介绍如何使用这些工具来提供索引方面的帮助。在整个章节中，您还将了解到使用这些工具各自的优缺点。

    '
- fmt: '## Missing Indexes


    The missing index DMOs are a set of management objects that provide indexing feedback
    from the query optimizer. When the query optimizer compiles an execution plan,
    it can identify when materializing statistics for a set of columns into a physical
    index would improve performance. In these situations, the query optimizer will
    compile the results and store the information in the missing index DMOs.


    There are a couple of benefits that the missing index DMOs provide. First, the
    missing index information is collected from the query optimizer without any action
    required on your part. Unlike Extended Events and other performance monitoring
    tools, you don’t need to configure and enable it in order for information to be
    collected. The other thing to consider is that the missing index information is
    based on actual activity occurring on the SQL Server instance. The index suggestions
    aren’t based on a test load you believe might happen in production but rather
    on the production load itself. As the usage patterns of the data in a database
    change, so too will the missing index recommendations.


    Despite the benefits provided by the missing index DMOs, you must take into account
    a few considerations when using them. The limitations on the missing index DMOs
    can be summarized into the following categories:


    *   Size of queue


    *   Depth of analysis


    *   Accuracy


    *   Type of indexes


    The size of the queue for missing indexes is one of the limitations that is easy
    to miss. Regardless of the number of databases on the SQL Server instance, there
    can be no more than 600 missing index groups. Once 600 missing index groups have
    been identified, the query optimizer will stop reporting new missing index suggestions.
    It will not make any determinations to decide whether a new possible missing index
    is of better quality than items already reported; the information is just not
    collected.


    ### Note


    As with other dynamic management objects, the information within the missing index
    DMOs resets when SQL Server restarts and gets dropped for a database whenever
    the database is brought offline.


    When considering the information in missing indexes, the depth of the analysis
    is a limitation that needs to be considered whenever you are reviewing the suggestions.
    The query optimizer considers only the current plan and whether the missing index
    would benefit the execution plan. Sometimes, adding the missing index to the database
    will result in a new plan with a new missing index suggestion. These suggestions
    are only a first pass at improving performance on an execution plan. The other
    half of this limitation is that the missing index details don’t include tests
    to determine whether the order of the columns in the missing index suggestion
    is optimal. When looking at missing index suggestions, it will be necessary to
    test in order to determine the proper column order.


    The third limitation of the missing index suggestion is the accuracy of the information
    returned with the statistics. There are two things that need to be considered
    with this limitation. First, when the queries use inequality predicates, the cost
    information is less effective than those returned with equality predicates. Second,
    it is possible to return the same missing index suggestion with multiple cost
    estimates. How and where the missing index would be leveraged may change the cost
    estimate that is calculated. For each cost estimate, a missing index suggestion
    will be logged.


    Lastly, the missing index tool is limited in the types of indexes it can suggest.
    The main limitation is index types and the inability of missing indexes to suggest
    clustered, XML, spatial, or columnstore indexes. The suggestions also will not
    include information on when to make an index filtered. Along these same lines,
    suggestions may, at times, contain only `INCLUDE` columns. When this happens,
    one of the `INCLUDE` columns will need to be designated as the key column.


    ### Note


    Missing index information for a table will be dropped whenever there are metadata
    operations made on the table. For instance, when a column is added to a table,
    the missing index information will be dropped. A less obvious example is when
    an index on a table changes. In this case as well, the missing index information
    will be dropped.


    ### Explaining the DMOs


    There are four DMOs that can be used to return information on missing indexes.
    Each DMO provides a portion of the information needed to build indexes that the
    query optimizer can use to improve the performance of a query. The DMOs for missing
    indexes are as follows:


    *   `sys.dm_db_missing_index_details`


    *   `sys.dm_db_missing_index_columns`


    *   `sys.dm_db_missing_index_group_stats`


    *   `sys.dm_db_missing_index_group`


    In the next four sections, I’ll review each of the dynamic management objects
    and look at how each provides information on how to identify missing indexes.


    #### sys.dm_db_missing_index_details


    The DMO `sys.dm_db_missing_index_details` is a dynamic management view that returns
    a list of missing index suggestions . Each row in the dynamic management view
    (DMV) provides a single suggested missing index. The columns in Table [10-1](#338675_3_En_10_Chapter.xhtml#Tab1)
    provide information on the database and the table to create the index on. It also
    includes the columns that should comprise the key and the included columns for
    the index.


    Table 10-1


    Columns in `sys.dm_db_missing_index_details`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `index_handle` | `int` | Unique identifier for each missing index suggestions.
    This is the key value for this DMV. |

    | `database_id` | `smallint` | Identifies the database where the table with the
    missing index resides. |

    | `object_id` | `int` | Identifies the table where the index is missing. |

    | `equality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to equality predicates. |

    | `inequality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to inequality predicates. |

    | `included_columns` | `nvarchar(4000)` | Comma-separated list of columns needed
    as covering columns for the query. |

    | `statement` | `nvarchar(4000)` | Name of the table where the index is missing.
    |


    There are two columns in `sys.dm_db_missing_index_details` that are used to identify
    key columns on missing index suggestions. These are `equality_columns` and `inequality_columns`.
    The `equality_columns` are generated when there is a comparison in the query plan
    that makes a direct comparison. For instance, when the filter for a query is `ColumnA
    = @Parameter`, this is an equality predicate. The `inequality_columns` details
    are created when any nonequal filter is used in a query plan. Examples of this
    are when there are greater than, less than, or `NOT IN` comparisons being used.


    When it comes to the `included_columns` information, this is generated when there
    are columns that are not part of the filter but that would be used to allow the
    index to cover the query request using a single index. Included columns are covered
    in more depth in Chapter [8](#338675_3_En_8_Chapter.xhtml). Suffice it to say,
    the use of included columns will help prevent the query plan from having to use
    a key lookup in the execution plan if the missing index is created.'
