    ### STATS_DATE


    当谈到统计信息时，一个被问及的最重要问题是这些统计信息是否已过时。判断统计信息是否过时的一种常用方法是使用 `STATS_DATE` 函数。`STATS_DATE`
    函数提供了统计信息最近一次更新的日期。该函数的语法如清单 3-4 所示，它接受一个 `object_id` 和一个 `stats_id`。对于索引而言，`stats_id`
    与 `index_id` 是同一个值。


    ```

    STATS_DATE ( object_id , stats_id )

    ```

    **清单 3-4**

    **STATS_DATE 语法**


    虽然 `STATS_DATE` 函数常被用于识别过时的统计信息，但对于此任务来说，这种方法并不有效。统计信息上次更新的日期并不一定反映数据变化的速率。一个数年未更新、统计信息有数月之久的表，其统计信息可能并未过时；而一个持续进行插入、更新和删除操作，其统计信息在昨日刚更新过的表，其统计信息可能已不再能代表索引中的实际值。尽管该函数对于统计信息变化缓慢的索引可能有用，但鉴于上述示例，应谨慎使用。


    ### sys.dm_db_stats_properties


    一个更好的用于识别统计信息变化率的方法是使用 `sys.dm_db_stats_properties` DMO（动态管理对象），它提供了一个能反映数据变化情况的限定符。这个
    DMO 在 SQL Server 2008 中引入，提供了自统计信息上次更新以来发生变化的行数的详细信息。`sys.dm_db_stats_properties`
    的语法如清单 3-5 所示，它接受一个 `object_id` 和一个 `stats_id`。与 `STATS_DATE` 一样，`stats_id` 与
    `index_id` 是同一个值。表 3-6 列出了 `sys.dm_db_stats_properties` 中的列。


    **表 3-6**

    **sys.dm_db_stats_properties 的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 所讨论对象的 ID。 |

    | `stats_id` | `int` | 统计信息的 ID。对于索引，此 ID 与索引 ID 匹配。 |

    | `last_updated` | `datetime2(7)` | 统计信息上次更新的日期和时间。 |

    | `rows` | `bigint` | 统计信息上次更新时，表或索引视图中的总行数。对于筛选统计信息或索引，此计数指的是符合筛选条件的行数。 |

    | `rows_sampled` | `bigint` | 用于统计信息计算的采样行总数。当 `rows_sampled` 值小于 `rows` 中的值时，直方图和密度值是估计值。
    |

    | `steps` | `int` | 直方图中的步数。每个步跨越一个列值范围，后跟一个上限列值。直方图步长基于统计信息中的第一个关键列定义。最大步数为 200。
    |

    | `unfiltered_rows` | `bigint` | 应用筛选表达式之前表中的总行数。如果 `筛选表达式` 为 `NULL`，则 `unfiltered_rows`
    等于 `rows`。 |

    | `modification_counter` | `bigint` | 自上次为该表更新统计信息以来，插入、删除或更新的行总数计数。 |

    | `persisted_sample_percent` | `Float` | 在 SQL Server 2016 中添加。 |


    ```

    sys.dm_db_stats_properties (object_id, stats_id)

    ```

    **清单 3-5**

    **sys.dm_db_stats_properties 的语法**


    由于 `sys.dm_db_stats_properties` 提供了更好质量的方式来理解统计信息是否过时，让我们来看一下输出，看看表中的值变化如何影响 `modification_counter`
    列。为此，你将首先使用清单 3-6 创建表 `dbo.SalesOrderHeaderStats` 及其一些索引。为了研究 `modification_counter`，你将使用清单
    3-7 中的查询来查看该列的变化。从图 3-5 中，你可以看到表中有 20,000 行数据，对于列出的每个索引和统计信息，当前的 `modification_counter`
    值均为 0。


    ![在 dbo.SalesOrderHeaderStats 上执行 sys.dm_db_stats_properties 的查询结果](img/338675_3_En_3_Fig5_HTML.jpg)

    **图 3-5**

    **在 dbo.SalesOrderHeaderStats 上执行 sys.dm_db_stats_properties 的查询结果**


    ```

    USE AdventureWorks2017

    GO

    SELECT

    OBJECT_SCHEMA_NAME(s.object_id)

    +''.''+OBJECT_NAME(s.object_id) AS object_name

    ,s.name as statistics_name

    ,x.last_updated

    ,x.rows

    ,x.rows_sampled

    ,x.steps

    ,x.unfiltered_rows

    ,x.modification_counter

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_properties(s.object_id, s.stats_id) x

