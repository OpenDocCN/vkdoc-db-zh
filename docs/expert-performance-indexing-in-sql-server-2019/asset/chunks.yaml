    代码清单 9-12：执行 DELETE 操作


    关于 `DELETE` 操作的最后一点注意事项是，碎片可能不会在 `DELETE` 操作后立即显现。当记录要被删除时，它们首先被标记为删除，然后记录本身才被实际删除。在标记为删除期间，该记录被视为幽灵记录。在此阶段，记录在逻辑上已被删除，但在物理上仍然存在于索引中。在未来的某个时间点，在事务提交且
    `CHECKPOINT` 完成后，幽灵清理进程将物理删除该行。此时，碎片将显示在索引中。


