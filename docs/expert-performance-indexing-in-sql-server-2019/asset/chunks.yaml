    | page_type_flag_bits | 页面头中的类型标志位。 |

    | page_type_flag_bits_desc | 页面头中类型标志位的描述。 |

    | page_flag_bits | 页面头中的标志位。 |

    | page_flag_bits_desc | 页面头中标志位的文本描述。 |

    | page_lsn | 与上次页面修改关联的日志序列号。 |

    | page_level | 页面在索引中的级别。 |

    | object_id | 与页面关联的对象的 ID。 |

    | index_id | 索引的 ID。 |

    | partition_id | 分区的 ID。 |

    | alloc_unit_id | 分配单元的 ID。 |

    | is_encrypted | 指示页面是否已加密。 |

    | has_checksum | 指示页面是否具有校验和值。 |

    | checksum | 页面的校验和值。 |

    | is_iam_page | 指示页面是否为索引分配映射页面。 |

    | is_mixed_extent | 指示页面是否为混合区的一部分。 |

    | has_ghost_records | 指示页面是否有幽灵记录。 |

    | has_version_records | 指示页面是否有版本记录。 |

    | has_persisted_version_records | 指示页面是否有持久化的版本记录。 |

    | pfs_page_id | 与此页面关联的 PFS 页面的页面 ID。 |

    | pfs_is_allocated | 指示 PFS 页面是否已分配此页面。 |

    | pfs_alloc_percent | 由 PFS 页面指示的分配百分比。 |

    | pfs_status | PFS 状态的位值。 |

    | pfs_status_desc | PFS 状态的文本描述。 |

    | gam_page_id | 与此页面关联的 GAM 页面的页面 ID。 |

    | gam_status | 指示此页面 GAM 状态的 ID 值。 |

    | gam_status_desc | 此页面 GAM 状态的文本描述。 |

    | sgam_page_id | 与此页面关联的 SGAM 页面的页面 ID。 |

    | sgam_status | 指示此页面 SGAM 状态的 ID 值。 |

    | sgam_status_desc | 此页面 SGAM 状态的文本描述。 |

    | diff_map_page_id | 与此页面关联的差异映射页面的页面 ID。 |

    | diff_status | 指示此页面差异映射状态的 ID 值。 |

    | diff_status_desc | 此页面差异映射状态的文本描述。 |

    | ml_map_page_id | 与此页面关联的最小日志记录页面的页面 ID。 |

    | ml_status | 指示此页面最小日志记录页面状态的 ID 值。 |

    | ml_status_desc | 此页面最小日志记录页面状态的文本描述。 |

    | prev_page_file_id | 下一个页面的文件 ID。 |

    | prev_page_page_id | 下一个页面的页面 ID。 |

    | next_page_file_id | 上一个页面的文件 ID。 |

    | next_page_page_id | 上一个页面的页面 ID。 |

    | fixed_length | 未知。 |

    | slot_count | 已使用和未使用的槽的总数。 |

    | ghost_rec_count | 页面上标记为幽灵的记录数。 |

    | free_bytes | 页面上的可用字节数。 |

    | free_bytes_offset | 数据区域末尾可用空间的偏移量。 |

    | reserved_bytes | 页面上的保留字节数。 |

    | reserved_bytes_by_xdes_id | 由 m_xdesID 贡献给 m_reservedCnt 的空间。 |

    | xdes_id | 由 m_reserved 贡献的最新事务。 |


    您可以使用此头信息来识别不同结构（如 PFS 页面）之间页面的相互关系，或使用它来检查页面以验证校验和、槽数或可用空间。要演示，请运行列表 2-7 中的代码，该代码检索先前创建的两个表的所有页面分配，并为所有已分配的页面检索页面头信息。


    ```

    SELECT T.name,

    DPA.page_type_desc,

    DPI.page_id,

    DPI.pfs_page_id,

    DPI.gam_page_id,

    DPI.sgam_page_id,

    DPI.diff_map_page_id,

    DPI.ml_map_page_id,

    DPI.prev_page_page_id,

    DPI.next_page_page_id,

    DPI.fixed_length,

    DPI.slot_count,

    DPI.free_bytes

    FROM sys.dm_db_database_page_allocations(DB_ID(), NULL, NULL, NULL, ''DETAILED'')
    DPA

    INNER JOIN sys.tables T ON T.object_id = DPA.object_id

    CROSS APPLY sys.dm_db_page_info(DPA.database_id, DPA.allocated_page_file_id, DPA.allocated_page_page_id,
    DEFAULT) DPI;

    Listing 2-7

    使用 sys.dm_db_page_info 的查询

    ```


    执行后，您将获得与图 2-16 类似的结果。在这些结果中，我们看到了 `dbo.IndexInternalsTwo` 相同的前后页面连接，但没有列出 `dbo.IndexInternalsone`
    的页面 ID。此外，两个表的 PFS、GAM、SGAM、DIFF 和 ML 页面都被识别出来，它们是相同的，因为数据库小于需要多个此类页面类型的阈值。最后，您将看到每个页面的槽数、长度和可用字节数。值得注意的是，页面
    329（即 `dbo.IndexInternalsTwo` 的索引页面）有六个槽，每个槽对应索引页面在聚集索引中管理的一个页面。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig16_HTML.jpg](img/338675_3_En_2_Fig16_HTML.jpg)


    图 2-16


    来自 `sys.dm_db_page_info` 的页面头结果


    ### DBCC 命令


    虽然您可以使用本章前面描述的动态管理函数对数据结构进行大量探索，但有时您会希望深入挖掘。要在 SQL Server 中实现这一点，您可以使用以下 DBCC
    命令：


    * `DBCC EXTENTINFO`

    * `DBCC IND`

    * `DBCC PAGE`


    在接下来的几节中，我们将探讨这些命令，并回顾一些在数据库中利用它们的示例。'
- fmt: '### DBCC EXTENTINFO


    首先要探索的`DBCC`命令是`DBCC EXTENTINFO`。与`sys.dm_db_database_page_allocations`类似，此命令提供有关数据库内区分配的信息。它能识别区如何被分配，以及所使用的区是混合区还是统一区。清单[2-8](#338675_3_En_2_Chapter.xhtml#PC8)展示了使用`DBCC
    EXTENTINFO`的语法。使用该命令时，有四个可填充的参数；这些参数在表[2-5](#338675_3_En_2_Chapter.xhtml#Tab5)中定义。


    **表 2-5 DBCC EXTENTINFO 参数**


    | 参数 | 描述 |

    | --- | --- |

    | `database_name | database_id` | 指定将要检索页面的数据库名称或数据库ID。如果为此参数提供值0或未设置参数，则将使用当前数据库。
    |

    | `table_name | table_object_id` | 通过提供表名或表的`object_ID`来指定输出中返回哪个表。如果未提供值，输出将包含所有表的结果。
    |

    | `index_name | index_id` | 通过提供索引名称或`index_ID`来指定输出中返回哪个索引。如果提供-1或未提供值，则输出将包含表上所有索引的结果。
    |

    | `partition_id` | 通过提供分区号来指定输出中返回索引的哪个分区。如果提供0或未提供值，则输出将包含索引上所有分区的结果。 |


    ```

    DBCC EXTENTINFO ( {database_name | database_id | 0}

    , {table_name | table_object_id}, { index_name | index_id | -1}

    , { partition_id | 0}

    Listing 2-8

    DBCC EXTENTINFO Syntax

    ```


    执行`DBCC EXTENTINFO`时，会返回一个数据集。结果包含表[2-6](#338675_3_En_2_Chapter.xhtml#Tab6)中定义的列。对于每个区分配，结果中会有一行。由于区由八个页面组成，当存在单页分配时（例如使用混合区时），一个区最多可能有八个分配。当使用统一区时，该区将只有一个区分配并返回一行。


    **表 2-6 DBCC EXTENTINFO 输出列**


    | 参数 | 描述 |

    | --- | --- |

    | `file_id` | 页面所在的文件号。 |

    | `page_id` | 页面的页码。 |

    | `pg_alloc` | 从区分配给对象的页数。 |

    | `ext_size` | 区的大小。 |

    | `object_id` | 表的对象ID。 |

    | `index_id` | 与堆或索引关联的索引ID。 |

    | `partition_number` | 堆或索引的分区号。 |

    | `partition_id` | 堆或索引的分区ID。 |

    | `iam_chain_type` | 区所使用的IAM链类型。值可以是行内数据、LOB数据和溢出数据。 |

    | `pfs_bytes` | 字节数组，用于标识空闲空间量、是否存在幽灵记录、页面是否为IAM页面、是否已分配以及是否是混合区的一部分。 |


    为了演示该命令的工作原理，让我们通过几个示例来观察区是如何分配的。在第一个示例（清单[2-9](#338675_3_En_2_Chapter.xhtml#PC9)）中，我们将重用上一节的`dbo.IndexInternalsOne`，并针对它运行`DBCC
    EXTENTINFO`命令。


    ```

    USE Chapter2Internals

    GO

    DBCC EXTENTINFO(0, IndexInternalsOne, -1)

    Listing 2-9

    DBCC EXTENTINFO dbo.IndexInternalsOne

    ```


    在`DBCC`命令的结果中（如图[2-17](#338675_3_En_2_Chapter.xhtml#Fig17)所示），你可以看到总共有13个页面分配给了该表。这些结果中值得关注的是`pg_alloc`和`ext_size`列。在第一行中，分配的页面是9个，包括索引分配映射页面和区的8个页面。在第二行中，分配了4个页面，这是插入表中的12条记录的剩余部分。两行的区大小都应为8，因为分配的是统一区。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig17_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig17_HTML.jpg)


    **图 2-17 dbo.IndexInternalsOne 中页面的 DBCC EXTENTINFO 结果**


    在 SQL Server 2016 之前的版本中，行为会有很大不同，因为它会在第一个区填满之前，为每个事务利用单页分配。此行为变化是因为跟踪标志 1118
    的行为已成为 SQL Server 的默认行为。


    尽管`DBCC EXTENTINFO`没有提供像`sys.dm_db_database_page_allocations`那样多的细节，但它对于识别分配给表的区非常有用，尤其是在使用
    SQL Server 2012 之前的版本时。'
  raw: '#### DBCC EXTENTINFO


    The first `DBCC` command to explore is `DBCC EXTENTINFO. S`imilar to `sys.dm_db_database_page_allocations,
    this command` provides information about extent allocations that occur within
    a database. This identifies how extents have been allocated and whether the extents
    being used are mixed or uniform. Listing [2-8](#338675_3_En_2_Chapter.xhtml#PC8)
    shows the syntax for using `DBCC EXTENTINFO`. When using the command, there are
    four parameters that can be populated; these are defined in Table [2-5](#338675_3_En_2_Chapter.xhtml#Tab5).


    Table 2-5


    DBCC EXTENTINFO Parameters


    | Parameter | Description |

    | --- | --- |

    | `database_name &#124; database_id` | Specifies either the database name or the
    database ID where the page will be retrieved. If the value 0 is provided for this
    parameter or the parameter is not set, then the current database will be used.
    |

    | `table_name &#124; table_object_id` | Specifies which table to return in the
    output by providing either the table name or the `object_ID` for the table. If
    no value is provided, the output will include results for all tables. |

    | `index_name &#124; index_id` | Specifies which index to return in the output
    by providing either the index name or the `index_ID`. If -1 or no value is provided,
    then the output will include results for all indexes on the table. |

    | `partition_id` | Specifies which partition of the index to return in the output
    by providing the partition number. If 0 or no value is provided, then the output
    will include results for all partitions on the index. |


    ```

    DBCC EXTENTINFO ( {database_name | database_id | 0}

    , {table_name | table_object_id}, { index_name | index_id | -1}

    , { partition_id | 0}

    Listing 2-8

    DBCC EXTENTINFO Syntax

    ```


    When executing `DBCC EXTENTINFO`, a dataset is returned. The results include the
    columns defined in Table [2-6](#338675_3_En_2_Chapter.xhtml#Tab6). For every extent
    allocation, there will be one row in the results. Since extents are comprised
    of eight pages, there can be as many as eight allocations for an extent when there
    are single-page allocations, such as when mixed extents are used. When uniform
    extents are used, there will be only one extent allocation and one row returned
    for the extent.


    Table 2-6


    DBCC EXTENTINFO Output Columns


    | Parameter | Description |

    | --- | --- |

    | `file_id` | File number where the page is located. |

    | `page_id` | Page number for the page. |

    | `pg_alloc` | Number of pages allocated from the extent to the object. |

    | `ext_size` | Size of the extent. |

    | `object_id` | Object ID for the table. |

    | `index_id` | Index ID associated with the heap or index. |

    | `partition_number` | Partition number for the heap or index. |

    | `partition_id` | Partition ID for the heap or index. |

    | `iam_chain_type` | The type of IAM chain the extent is used for. Values can
    be in-row data, LOB data, and overflow data. |

    | `pfs_bytes` | Bytes array that identifies the amount of free space, whether
    there are ghost records, whether the page is an IAM page, whether it is allocated,
    and whether it is part of a mixed extent. |


    To demonstrate how the command works, let’s walk through a couple examples to
    observe how extents are allocated. In the first example, shown in Listing [2-9](#338675_3_En_2_Chapter.xhtml#PC9),
    we’ll reuse the `dbo.IndexInternalsOne from the last section and run the DBCC
    EXTENTINFO` command against `that`.


    ```

    USE Chapter2Internals

    GO

    DBCC EXTENTINFO(0, IndexInternalsOne, -1)

    Listing 2-9

    DBCC EXTENTINFO dbo.IndexInternalsOne

    ```


    In the results from the `DBCC` command, shown in Figure [2-17](#338675_3_En_2_Chapter.xhtml#Fig17),
    you can see that there are 13 total pages allocated to the table. The items of
    interest in these results are the `pg_alloc` and `ext_size` columns. In the first
    row, the pages allocated are nine, accounting for the index allocation map page
    and eight pages of the extent. In the second row, there are 4 pages allocated,
    which is the balance of the 12 records inserted into the table. Both rows should
    have 8 for the extent size, since uniform extents are allocated.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig17_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig17_HTML.jpg)


    Figure 2-17


    DBCC EXTENTINFO for pages in dbo.IndexInternalsOne


    In SQL Server versions prior to SQL Server 2016, the behavior will be quite different
    since it will leverage single-page allocations for each transaction until the
    first extent is filled. This behavior change is due to the behavior of trace flag
    1118 becoming default behavior for SQL Server.


    Though DBCC EXTENTINFO doesn’t provide as much detail as s`ys.dm_db_database_page_allocations`,
    it can be useful for identifying extents assigned to a table, especially when
    using SQL Server versions prior to SQL Server 2012.'
  trans: '

    ### DBCC EXTENTINFO


    首先要探索的`DBCC`命令是`DBCC EXTENTINFO`。与`sys.dm_db_database_page_allocations`类似，此命令提供有关数据库内区分配的信息。它能识别区如何被分配，以及所使用的区是混合区还是统一区。清单
    2-8 展示了使用`DBCC EXTENTINFO`的语法。使用该命令时，有四个可填充的参数；这些参数在表 2-5 中定义。


    **表 2-5 DBCC EXTENTINFO 参数**


    | 参数 | 描述 |

    | --- | --- |

    | `database_name | database_id` | 指定将要检索页面的数据库名称或数据库 ID。如果为此参数提供值 0 或未设置参数，则将使用当前数据库。
    |

    | `table_name | table_object_id` | 通过提供表名或表的`object_ID`来指定输出中返回哪个表。如果未提供值，输出将包含所有表的结果。
    |

    | `index_name | index_id` | 通过提供索引名称或`index_ID`来指定输出中返回哪个索引。如果提供-1 或未提供值，则输出将包含表上所有索引的结果。
    |

    | `partition_id` | 通过提供分区号来指定输出中返回索引的哪个分区。如果提供 0 或未提供值，则输出将包含索引上所有分区的结果。 |


    ```

    DBCC EXTENTINFO ( {database_name | database_id | 0}

    , {table_name | table_object_id}, { index_name | index_id | -1}

    , { partition_id | 0}

    Listing 2-8

    DBCC EXTENTINFO Syntax

    ```


    执行`DBCC EXTENTINFO`时，会返回一个数据集。结果包含表 2-6 中定义的列。对于每个区分配，结果中会有一行。由于区由八个页面组成，当存在单页分配时（例如使用混合区时），一个区最多可能有八个分配。当使用统一区时，该区将只有一个区分配并返回一行。


    **表 2-6 DBCC EXTENTINFO 输出列**


    | 参数 | 描述 |

    | --- | --- |

    | `file_id` | 页面所在的文件号。 |

    | `page_id` | 页面的页码。 |

    | `pg_alloc` | 从区分配给对象的页数。 |

    | `ext_size` | 区的大小。 |

    | `object_id` | 表的对象 ID。 |

    | `index_id` | 与堆或索引关联的索引 ID。 |

    | `partition_number` | 堆或索引的分区号。 |

    | `partition_id` | 堆或索引的分区 ID。 |

    | `iam_chain_type` | 区所使用的 IAM 链类型。值可以是行内数据、LOB 数据和溢出数据。 |

    | `pfs_bytes` | 字节数组，用于标识空闲空间量、是否存在幽灵记录、页面是否为 IAM 页面、是否已分配以及是否是混合区的一部分。 |


    为了演示该命令的工作原理，让我们通过几个示例来观察区是如何分配的。在第一个示例（清单 2-9）中，我们将重用上一节的`dbo.IndexInternalsOne`，并针对它运行`DBCC
    EXTENTINFO`命令。


    ```

    USE Chapter2Internals

    GO

    DBCC EXTENTINFO(0, IndexInternalsOne, -1)

    Listing 2-9

    DBCC EXTENTINFO dbo.IndexInternalsOne

    ```


    在`DBCC`命令的结果中（如图 2-17 所示），你可以看到总共有 13 个页面分配给了该表。这些结果中值得关注的是`pg_alloc`和`ext_size`列。在第一行中，分配的页面是
    9 个，包括索引分配映射页面和区的 8 个页面。在第二行中，分配了 4 个页面，这是插入表中的 12 条记录的剩余部分。两行的区大小都应为 8，因为分配的是统一区。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig17_HTML.jpg](img/338675_3_En_2_Fig17_HTML.jpg)


    **图 2-17 dbo.IndexInternalsOne 中页面的 DBCC EXTENTINFO 结果**


    在 SQL Server 2016 之前的版本中，行为会有很大不同，因为它会在第一个区填满之前，为每个事务利用单页分配。此行为变化是因为跟踪标志 1118
    的行为已成为 SQL Server 的默认行为。


    尽管`DBCC EXTENTINFO`没有提供像`sys.dm_db_database_page_allocations`那样多的细节，但它对于识别分配给表的区非常有用，尤其是在使用
    SQL Server 2012 之前的版本时。

    '
- fmt: '## DBCC IND


    下一个可用于调查索引及其关联页面的命令是 `DBCC IND`。该命令返回与请求对象关联的所有页面的列表，可以限定在数据库、表或索引级别，这也类似于 `sys.dm_db_database_page_allocations`。清单
    [2-10](#338675_3_En_2_Chapter.xhtml#PC10) 展示了使用 `DBCC IND` 的语法。使用此命令时，有三个可以填充的参数；这些参数在表
    [2-7](#338675_3_En_2_Chapter.xhtml#Tab7) 中定义。


    表 2-7

    `DBCC IND` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `database_name | database_id` | 指定将检索页面列表的数据库名称或数据库 ID。如果为此参数提供值 0 或未设置参数，则将使用当前数据库。
    |

    | `table_name | table_object_id` | 通过提供表名或表的 `object_ID` 来指定输出中返回哪个表。如果未提供值，输出将包含所有表的结果。
    |

    | `index_name | index_id` | 通过提供索引名称或 `index_ID` 来指定输出中返回哪个索引。如果提供 -1 或未提供值，输出将包含该表上所有索引的结果。
    |


    ```

    DBCC IND ( {''dbname'' | dbid}, {''table_name'' | table_object_id},

    {''index_name'' | index_id | -1})

    ```

    清单 2-10

    `DBCC IND` 语法


    `DBCC IND` 在执行时返回一个数据集。对于分配给请求对象的每个页面，数据集中都返回一行；列定义在表 [2-8](#338675_3_En_2_Chapter.xhtml#Tab8)
    中。与之前的 `DBCC EXTENTINFO` 不同，`DBCC IND` 在结果中显式返回 IAM 页面。


    表 2-8

    `DBCC IND` 输出列


    | 列 | 描述 |

    | --- | --- |

    | `PageFID` | 页面所在的文件编号。 |

    | `PagePID` | 页面的页码。 |

    | `IAMFID` | IAM 页面所在的文件 ID。 |

    | `IAMPID` | 数据文件中页面的页 ID。 |

    | `ObjectID` | 关联表的 object ID。 |

    | `IndexID` | 与堆或索引关联的索引 ID。 |

    | `PartitionNumber` | 堆或索引的分区号。 |

    | `PartitionID` | 堆或索引的分区 ID。 |

    | `iam_chain_type` | 区用于的 IAM 链类型。值可以是行内数据、LOB 数据和溢出数据。 |

    | `PageType` | 标识页面类型的数字。这些类型在表 [2-9](#338675_3_En_2_Chapter.xhtml#Tab9) 中列出。
    |

    | `IndexLevel` | 页面在页面组织结构中存在的级别。级别从 0 到 N 组织，其中 0 是索引的最低级别，N 是索引根。 |

    | `NextPageFID` | 该索引级别上一个页面所在的文件编号。 |

    | `NextPagePID` | 该索引级别上一个页面的页码。 |

    | `PrevPageFID` | 该索引级别上上一个页面所在的文件编号。 |

    | `PrevPagePID` | 该索引级别上上一个页面的页码。 |


    在 `DBCC EXTENTINFO` 的结果中有一个 `PageType` 列。该列标识通过 `DBCC` 命令返回的页面类型。页面类型可以包括数据、索引、GAM
    或本章前面讨论的任何其他页面类型。表 [2-9](#338675_3_En_2_Chapter.xhtml#Tab9) 显示了页面类型及其标识值的完整列表。


    表 2-9

    页面类型映射


    | 页面类型 | 描述 |

    | --- | --- |

    | 1 | 数据页。 |

    | 2 | 索引页。 |

    | 3 | 大型对象页。 |

    | 4 | 大型对象页。 |

    | 8 | 全局分配映射页。 |

    | 9 | 共享全局分配映射页。 |

    | 10 | 索引分配映射页。 |

    | 11 | 页面空闲空间页。 |

    | 13 | 引导页。 |

    | 15 | 文件头页。 |

    | 16 | 差异更改映射页。 |

    | 17 | 最小日志记录页。 |


    使用 `DBCC IND` 的主要好处是它提供了表或索引的所有页面的列表及其在数据库中的位置。你可以使用它来帮助调查索引的行为以及页面最终的位置。为了将这些信息付诸实践，我们将演练几个场景。


    对于第一个示例，你将重新查看上一节中创建的表，并检查每个表的输出与 `DBCC EXTENTINFO` 输出的比较。代码示例包含对 `IndexInternalsOne`
    和 `IndexInternalsTwo` 的 `DBCC IND` 命令，如清单 [2-11](#338675_3_En_2_Chapter.xhtml#PC11)
    所示。传入的数据库 ID 为 0 表示当前数据库，索引 ID 设置为 -1 以返回所有索引的页面。


    ```

    USE Chapter2Internals;

    GO

    DBCC IND (0, ''IndexInternalsOne'',-1);

    ```

    清单 2-11

    `DBCC IND` 示例


    在 `DBCC EXTENTINFO` 示例中，表 `IndexInternalsOne` 有两个区分配，如图 [2-17](#338675_3_En_2_Chapter.xhtml#Fig17)
    所示。这些结果表明有 13 个页面分配给了该表。`DBCC IND` 的结果如图 [2-18](#338675_3_En_2_Chapter.xhtml#Fig18)
    所示，详细列出了属于两个区分配的所有页面。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig18_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig18_HTML.jpg)

    图 2-18

    dbo.IndexInternalsOne 的 DBCC IND 结果


    在这些结果中，有一个 IAM 页和十二个数据页分配给了该表。虽然 `DBCC EXTENTINFO` 提供了页面 312 作为区分配的开始，包含九个页面，但基于此无法确定
    IAM 页在哪里。它实际上位于另一个结果未列出的区中，而 `DBCC IND` 的结果将其识别为位于页面 235。使用 `DBCC IND` 列出索引页面的好处在于，你可以获得确切的页码，而无需做任何猜测。此外，请注意结果中的索引级别返回为第
    0 级，没有中间级别。如前所述，堆结构是扁平的，页面没有特定的顺序。


    如前所述，前面示例中的表是在堆结构中组织的。对于下一个示例，你将观察在检查具有聚集索引的表时，`DBCC IND` 的输出是什么。在清单 [2-12](#338675_3_En_2_Chapter.xhtml#PC12)
    中，首先创建表 `dbo.IndexInternalsThree`，并在 `RowID` 列上创建聚集索引。然后，你将插入四行。最后，示例在该表上执行 `DBCC
    IND`。


