  trans: "\n### 维护计划\n\n第一个可用的自动化选项是通过**维护计划**进行碎片整理，这为你提供了一种快速创建和安排索引维护的方法，该计划将重新组织或重建你的索引。针对每种索引碎片整理类型，维护计划中都有一个对应的任务可用。\n\
    \n创建维护计划有几种方式。为了简洁起见，我们假设你熟悉 SQL Server 中的维护计划，因此将重点介绍与整理索引相关的特定任务。\n\n#### 重新组织索引任务\n\
    \n第一个可用的任务是**重新组织索引任务**。此任务为上一节中的 `ALTER INDEX REORGANIZE` 语法提供了一个封装器。配置完成后，此任务将重新组织所有符合任务条件的索引。\n\
    \n使用重新组织索引任务时，有几个属性需要配置（参见图 9-22）：\n\n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig22_HTML.jpg](img/338675_3_En_9_Fig22_HTML.jpg)\n\
    \n图 9-22：重新组织索引任务的属性窗口\n\n*   `Connection`：任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`：任务将连接以进行重新组织的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不为联机的数据库。\n*   `Object`：确定重新组织是针对表、视图，还是表和视图。\n*   `Selection`：指定此任务影响的表或索引。当在“对象”框中选择了“表和视图”时，此选项不可用。\n\
    *   `Compact large objects`：确定重新组织是否使用选项 `ALTER INDEX LOB_COMPACTION = ON`。\n\
    *   `Scan type`：指示你希望 SQL Server 如何收集剩余选项的统计信息。可用选项为 `快速`、`已采样` 或 `详细`。\n*   `Optimize\
    \ index only if`：提供通过碎片百分比、页数以及索引在过去 7 天内是否被使用来限制重新组织的能力。\n\n索引统计信息选项是 SQL Server\
    \ 2016 新增的，是对该功能的一个极佳补充。在没有 DBA 积极管理服务器内索引的环境中，这是确保索引得到维护的一个绝佳选项。\n\n#### 重建索引任务\n\
    \n另一个可用的任务是**重建索引任务**。此任务为 `ALTER INDEX REBUILD` 语法提供了一个封装器。配置完成后，此任务将重建所有符合任务条件的索引。\n\
    \n与重新组织索引任务类似，重建索引任务在使用前也有许多属性需要配置（参见图 9-23）：\n\n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig23_HTML.jpg](img/338675_3_En_9_Fig23_HTML.jpg)\n\
    \n图 9-23：重建索引任务的属性窗口\n\n*   `Connection`：任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`：任务将连接以进行重建的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不为联机的数据库。\n*   `Object`：确定重建是针对表、视图，还是表和视图。\n*   `Selection`：指定此任务影响的表或索引。当在“对象”框中选择了“表和视图”时，此选项不可用。\n\
    *   `Default free space per page`：指定重建是否应使用索引上的当前填充因子。\n*   `Change free space\
    \ per page to`：允许重建在重建索引时指定一个新的填充因子。\n*   `Sort results in tempdb`：确定重建是否使用选项\
    \ `ALTER INDEX SORT_IN_TEMPDB = ON`。\n*   `MAXDOP`：确定重建的最大并行度，这决定了 SQL Server\
    \ 用于重建索引的最大 CPU 线程数。\n*   `Keep index online while re-indexing`：确定重建是否使用选项 `ALTER\
    \ INDEX ONLINE = ON`。对于无法联机重建的索引，有一个选项可确定是跳过还是离线重建索引。此外，你可以设置 `Low Priority Used`\
    \ 来确定阻塞是否会取消索引重建，以及它是自行取消还是取消阻塞者，以及在多长时间之后取消。\n*   `Scan type`：指示你希望 SQL Server\
    \ 如何收集剩余选项的统计信息。可用选项为 `快速`、`已采样` 或 `详细`。\n*   `Optimize index only if`：提供通过碎片百分比、页数以及索引在过去\
    \ 7 天内是否被使用来限制重建的能力。\n\n并且与重新组织任务一样，索引统计信息选项是随 SQL Server 2016 添加的。同样地，这些更改使重建任务成为适合那些没有专用数据库管理资源的环境，或者当你希望保持索引维护简单且无需管理过程的自定义代码时的一个可行选择。\n\
    \n#### 维护计划摘要\n\n维护计划提供了一种立即开始消除索引碎片的方法。任务可以在几分钟内配置和安排。自 SQL Server 2016 增强功能加入以来，它们是管理索引维护的一个绝佳选择。使用其他选项（例如\
    \ T-SQL 脚本）的唯一真正原因是当你需要额外功能时，如自定义日志记录或自定义恢复逻辑。\n\n### T-SQL 脚本\n\n数据库碎片整理的另一种方法是使用\
    \ T-SQL 脚本来智能地整理索引碎片。在本节中，我们将介绍整理单个数据库中所有索引碎片的必要步骤。此选择的主要优点是能够将所有内容保持在单一过程中，并且两个任务不可能同时影响同一个索引。脚本将挑选最能从碎片整理中受益的索引，确定是重建还是重新组织，并忽略那些获益很少或没有获益的索引。\n\
    \n为了实现过滤，你将应用一些碎片整理最佳实践，以帮助确定是否要整理索引碎片以及应采用何种方法。你将使用的指导原则如下：\n\n*   重新组织碎片少于 30%\
    \ 的索引。\n*   重建碎片为 30% 或更高的索引。\n*   忽略页数少于 1,000 的索引。\n*   如果你拥有企业版，并且在维护期间需要访问数据，请使用联机重建。\n\
    *   如果正在重建聚集索引，则重建表中的所有索引。\n"
- fmt: '### Note


    Just because an index is fragmented doesn’t mean that it should be always be defragmented.
    When dealing with indexes for small tables, there isn’t always a lot of benefit
    in defragmenting the index. For instance, an index having fewer than eight pages
    will fit into one extent, and thus there is no benefit in terms of reduced I/O
    from defragmenting that index. Some Microsoft documentation and SQL Server experts
    recommend not defragmenting tables with fewer than 1,000 pages. Whether that value
    is appropriate for your database is dependent on your database, but it is a starting
    point for building index maintenance strategies.


    There are a few steps that a defragmentation script will perform to intelligently
    defragment the indexes:


    1.  Collect fragmentation data.

    2.  Determine what indexes to defragment.

    3.  Build the defragmentation statement.


    Before starting on the fragmentation steps, you need a template for the index
    maintenance script. The template, shown in Listing [9-27](#338675_3_En_9_Chapter.xhtml#PC27),
    declares a number of variables and utilizes a `CURSOR` to loop through each of
    the indexes and perform the necessary index maintenance. The variables are set
    at the `DECLARE` statement with the thresholds defined at the start of this section.
    Also in the template is a `table` variable that is used to store intermediate
    results on the state of fragmentation in the database.


    ```sql

    DECLARE @MaxFragmentation TINYINT=30

    ,@MinimumPages SMALLINT=1000

    ,@SQL nvarchar(max)

    ,@ObjectName NVARCHAR(300)

    ,@IndexName NVARCHAR(300)

    ,@CurrentFragmentation DECIMAL(9, 6)

    DECLARE @FragmentationState TABLE

    (

    SchemaName SYSNAME

    ,TableName SYSNAME

    ,object_id INT

    ,IndexName SYSNAME

    ,index_id INT

    ,page_count BIGINT

    ,avg_fragmentation_in_percent FLOAT

    ,avg_page_space_used_in_percent FLOAT

    ,type_desc VARCHAR(255)

    )

    INSERT INTO @FragmentationState


    DECLARE INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR


    OPEN INDEX_CURSE

    WHILE 1=1

    BEGIN

    FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName

    ,@CurrentFragmentation

    IF @@FETCH_STATUS  0

    BREAK


    EXEC sp_ExecuteSQL @SQL

    END

    CLOSE INDEX_CURSE

    DEALLOCATE INDEX_CURSE

    Listing 9-27

    Index Defragmentation Script Template

    ```


    To get started, you need to collect fragmentation data on the indexes and populate
    them into the `table` variable. In the script in Listing [9-28](#338675_3_En_9_Chapter.xhtml#PC28),
    the DMF `sys.dm_db_index_physical_stats` is used with the `SAMPLED` option. This
    option is used to minimize the impact that executing the DMF will have on the
    database. Included in the results are the schema, table, and index names to identify
    the index that is being reported on, along with the `object_id` and `index_id`.
    Statistical columns on the index fragmentation from the DMF are included in the
    columns `page_count`, `avg_fragmentation_in_percent`, and `avg_page_space_used_in_percent`.
    The last column in the results is `has_LOB_column`. This column is the result
    of a correlated subquery that determines whether any of the columns in the index
    are LOB types, which disallow online index rebuilds.


    ```sql

    SELECT

    s.name as SchemaName

    ,t.name as TableName

    ,t.object_id

    ,we.name as IndexName

    ,we.index_id

    ,x.page_count

    ,x.avg_fragmentation_in_percent

    ,x.avg_page_space_used_in_percent

    ,we.type_desc

    FROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, ''SAMPLED'') x

    INNER JOIN sys.tables t ON x.object_id = t.object_id

    INNER JOIN sys.schemas s ON t.schema_id = s.schema_id

    INNER JOIN sys.indexes we ON x.object_id = we.object_id AND x.index_id = we.index_id

    WHERE x.index_id > 0

    AND x.avg_fragmentation_in_percent > 0

    AND alloc_unit_type_desc = ''IN_ROW_DATA''

    Listing 9-28

    Script to Collect Fragmentation Data

    ```


    The results of the query in Listing [9-28](#338675_3_En_9_Chapter.xhtml#PC28)
    will vary for every reader. In general, the results should be similar to those
    in Figure [9-24](#338675_3_En_9_Chapter.xhtml#Fig24), which include clustered,
    nonclustered, and XML indexes from the `AdventureWorks2017` database.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig24_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig24_HTML.jpg)


    **Figure 9-24** Query results for table fragmentation data


    The next step in the defragmentation script is to build the list of indexes that
    need to be defragmented. The list of indexes, created through Listing [9-29](#338675_3_En_9_Chapter.xhtml#PC29),
    is used to populate the cursor. The cursor then loops through each of the indexes
    to perform the defragmentation. One point of interest in the script is that for
    clustered indexes, all the underlying indexes will be rebuilt. This isn’t a requirement
    when defragmenting indexes, but it is something that can be considered. When there
    are just a few indexes on a table, this may be a worthwhile way to manage them.
    As the count of indexes increases, this may become less appealing. The results
    from this query should look similar to those in Figure [9-25](#338675_3_En_9_Chapter.xhtml#Fig25).


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig25_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig25_HTML.jpg)


    **Figure 9-25** Indexes for rebuild/reorganize operations


    ```sql

    SELECT  QUOTENAME(x.SchemaName)+''.''+QUOTENAME(x.TableName)

    ,CASE WHEN x.type_desc = ''CLUSTERED'' THEN ''ALL''

    ELSE QUOTENAME(x.IndexName) END

    ,x.avg_fragmentation_in_percent

    FROM    @FragmentationState x

    LEFT OUTER JOIN @FragmentationState y ON x.object_id = y.object_id AND y.index_id
    = 1

    WHERE   (

    x.type_desc = ''CLUSTERED''

    AND y.type_desc = ''CLUSTERED''

    )

    OR y.index_id IS NULL

    ORDER BY x.object_id

    ,x.index_id

    Listing 9-29

    Script to Identify Fragmented Indexes

    ```


    The last part of the template is where the magic happens. In other words, the
    script in Listing [9-30](#338675_3_En_9_Chapter.xhtml#PC30) is used to construct
    the `ALTER INDEX` statement that is used to defragment the index. At this point,
    the level of fragmentation is checked to determine whether to issue a `REBUILD`
    or `REORGANIZATION`. For indexes that can support `ONLINE` index rebuilds, a `CASE`
    statement adds the appropriate syntax.


    ```sql

    SET @SQL = CONCAT(''ALTER INDEX '', @IndexName,'' ON '',@ObjectName,

    CASE WHEN @CurrentFragmentation <= 30 THEN '' REORGANIZE;''

    ELSE '' REBUILD'' END,

    CASE WHEN CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition'')) LIKE ''Enterprise%''

    OR CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition)) LIKE ''Developer%''

    THEN '' WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) '' END, '';'');

    Listing 9-30

    Script to Build Index Defragmentation Statements

    ```'
  raw: '### Note


    Just because an index is fragmented doesn’t mean that it should be always be defragmented.
    When dealing with indexes for small tables, there isn’t always a lot of benefit
    in defragmenting the index. For instance, an index having fewer than eight pages
    will fit into one extent, and thus there is no benefit in terms of reduced I/O
    from defragmenting that index. Some Microsoft documentation and SQL Server experts
    recommend not defragmenting tables with fewer than 1,000 pages. Whether that value
    is appropriate for your database is dependent on your database, but it is a starting
    point for building index maintenance strategies.


    There are a few steps that a defragmentation script will perform to intelligently
    defragment the indexes:


    1.  Collect fragmentation data.


    2.  Determine what indexes to defragment.


    3.  Build the defragmentation statement.


    Before starting on the fragmentation steps, you need a template for the index
    maintenance script. The template, shown in Listing [9-27](#338675_3_En_9_Chapter.xhtml#PC27),
    declares a number of variables and utilizes a `CURSOR` to loop through each of
    the indexes and perform the necessary index maintenance. The variables are set
    at the `DECLARE` statement with the thresholds defined at the start of this section.
    Also in the template is a `table` variable that is used to store intermediate
    results on the state of fragmentation in the database.


    ```

    DECLARE @MaxFragmentation TINYINT=30

    ,@MinimumPages SMALLINT=1000

    ,@SQL nvarchar(max)

    ,@ObjectName NVARCHAR(300)

    ,@IndexName NVARCHAR(300)

    ,@CurrentFragmentation DECIMAL(9, 6)

    DECLARE @FragmentationState TABLE

    (

    SchemaName SYSNAME

    ,TableName SYSNAME

    ,object_id INT

    ,IndexName SYSNAME

    ,index_id INT

    ,page_count BIGINT

    ,avg_fragmentation_in_percent FLOAT

    ,avg_page_space_used_in_percent FLOAT

    ,type_desc VARCHAR(255)

    )

    INSERT INTO @FragmentationState


    DECLARE INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR


    OPEN INDEX_CURSE

    WHILE 1=1

    BEGIN

    FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName

    ,@CurrentFragmentation

    IF @@FETCH_STATUS  0

    BREAK


    EXEC sp_ExecuteSQL @SQL

    END

    CLOSE INDEX_CURSE

    DEALLOCATE INDEX_CURSE

    Listing 9-27

    Index Defragmentation Script Template

    ```


    To get started, you need to collect fragmentation data on the indexes and populate
