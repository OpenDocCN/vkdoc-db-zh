  raw: "### Creating a Full-Text Example\n\nNow that you understand the concept of\
    \ FTS, let’s look at the indexing strategy. Full-text indexes are essentially\
    \ the backbone of searching and querying the data. This data can be a number of\
    \ data types including `char`, `varchar`, `nchar`, `nvarchar`, `xml`, and `varbinary`.\
    \ While it is possible to use `text`, `ntext`, and `image, it's best to avoid\
    \ their use since they are on the deprecation list`. The data types varchar, nvarchar,\
    \ and varbinary provide equivalent types, respectively. In fact, utilizing `varchar(max)`\
    \ on most 64-bit systems has outperformed other data types in tests by the DataCAT\
    \ team, as described in “Best Practices for Integrated Full Text Search (iFTS)\
    \ in SQL 2008” ([`https://techcommunity.microsoft.com/t5/DataCAT/Best-Practices-for-Integrated-Full-Text-Search-iFTS-in-SQL-2008/ba-p/305000`](https://techcommunity.microsoft.com/t5/DataCAT/Best-Practices-for-Integrated-Full-Text-Search-iFTS-in-SQL-2008/ba-p/305000)).\n\
    \nFor the remainder of this section on full-text search indexing, the contents\
    \ of the white paper “Optimizing Your Query Plans with the SQL Server 2014 Cardinality\
    \ Estimator” by Joseph Sack have been inserted into the sample table using the\
    \ script in Listing [7-1](#338675_3_En_7_Chapter.xhtml#PC1). I’ll use the document\
    \ to demonstrate full-text indexing. You can find the document in Books Online\
    \ or download it from [`http://bit.ly/1II5UfU`](http://bit.ly/1II5UfU) and place\
    \ it in the directory `c:\\temp`. Additionally, the full-text catalog feature\
    \ needs to be installed in order to successfully run all the code in this chapter.\
    \ Full-text catalog is not a feature that is installed by default, so you may\
    \ need to address that first.\n\n### Note\n\nFor all versions of SQL Server, to\
    \ build full-text index on Microsoft Office documents, the Filter Pack IFilters\
    \ must be installed. Download and install Microsoft Office 2010 Filter Packs from\
    \ [`https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server`](https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server).\
    \ Be sure to follow the additional steps to run sp_fulltext_service and restart\
    \ the SQL Server instance.\n\n### Creating a Full-Text Catalog\n\nUsing AdventureWorks2017,\
    \ a table can be prepared that will be used for full-text searching. Using the\
    \ `varbinary(max)` data type allows the import of most document types and images.\
    \ In Listing [7-1](#338675_3_En_7_Chapter.xhtml#PC1), the `CREATE TABLE` and `INSERT`\
    \ statements prepare the objects needed to create a full-text search index.\n\n\
    ```\nUSE AdventureWorks2017\nGO\nDROP TABLE IF EXISTS dbo.SQLServerDocuments;\n\
    CREATE TABLE dbo.SQLServerDocuments (\nSQLServerDocumentsID INT IDENTITY(1, 1),\n\
    DocType VARCHAR(6),\nDOC VARBINARY(MAX),\nCONSTRAINT PK_SQLServerDocuments PRIMARY\
    \ KEY CLUSTERED\n(SQLServerDocumentsID)\n);\nGO\nDECLARE @worddoc VARBINARY(MAX);\n\
    SELECT  @worddoc = CAST(bulkcolumn AS VARBINARY(MAX))\nFROM    OPENROWSET(BULK\
    \ 'c:\\temp\\Optimizing Your Query Plans with the SQL Server 2014 Cardinality\
    \ Estimator.docx', SINGLE_BLOB) AS x;\nINSERT  INTO dbo.SQLServerDocuments\n(DocType,\
    \ DOC)\nVALUES  ('docx', @worddoc);\nGO\nListing 7-1\nCREATE TABLE and INSERT\
    \ Statements Used with Full-Text Search\n```\n\nWhen creating an FTS index, a\
    \ full-text catalog must first be created. Since SQL Server 2008, the catalog\
    \ is now contained in the database as a definition. The catalog itself is now\
    \ a virtual object and greatly enhances the performance by eliminating I/O bottlenecks.\
    \ A catalog contains all the properties that are searchable.\n\nThe catalog is\
    \ the link to the full-text index. Before we get started, let’s review the syntax\
    \ for `CREATE FULLTEXT CATALOG`, which is shown in Listing [7-2](#338675_3_En_7_Chapter.xhtml#PC2).\n\
    \n```\nCREATE FULLTEXT CATALOG \nWITH \nAS DEFAULT\nAUTHORIZATION \nACCENT_SENSITIVITY\
    \ = ;\nListing 7-2\nThe CREATE FULLTEXT CATALOG Syntax\n```\n\nThe first option\
    \ that should be considered in the creation of a catalog is the `AS DEFAULT` setting.\
    \ Commonly, full-text indexes are created without thought of the catalog to which\
    \ they should be applied. If the catalog is omitted in the index creation, the\
    \ catalog that has been set as the default will be used.\n\nAuthorization and\
    \ accent sensitivity are specific in the `CREATE` command. When omitting the authorization\
    \ option, ownership will fall under `dbo`. This is the same for most objects in\
    \ SQL Server when ownership is not declared. It is recommended that you assign\
    \ ownership for managing security and grouping objects under the proper areas.\
    \ When specifying a user for ownership, you must specify a username matching one\
    \ of the following:\n\n*   The name of the user running the statement\n\n*   The\
    \ name of a user that the user executing the command has impersonate permissions\
    \ for\n\n*   The database owner or system administrator\n\nAccent sensitivity\
    \ dictates whether the catalog will be accent sensitive or insensitive. For example,\
    \ with accent insensitive, the words “piñata” and “pinata” will be treated as\
    \ the same words. Be sure to research whether accent sensitivity should be on\
    \ or off prior to the creation of the catalog. If this option is changed, the\
    \ full-text indexes on the catalog must be rebuilt.\n\nFor creating a full-text\
    \ catalog on the white paper, execute the statement in Listing [7-3](#338675_3_En_7_Chapter.xhtml#PC3).\
    \ For this catalog, we’ll use the default options for the syntax, which sets accent\
    \ sensitivity to the collation of the table.\n\n```\nCREATE FULLTEXT CATALOG WhitePaperCatalog\
    \ AS DEFAULT;\nListing 7-3\nCreating a New Full-Text Catalog\n```\n\n### Creating\
    \ a Full-Text Index\n\nWith the catalog created and the decision made for how\
    \ you want to handle catalogs, accent sensitivity, and ownership, now you need\
    \ to make some decisions and apply some restrictions to the creation of the full-text\
    \ index. The most critical of these decisions is the requirement of a key index."
