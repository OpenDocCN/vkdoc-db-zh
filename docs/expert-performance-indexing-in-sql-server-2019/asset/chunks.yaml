    导致碎片化的最后一类操作是数据库收缩。数据库可以使用 `DBCC SHRINKDATABASE` 或 `DBCC SHRINKFILE` 进行收缩。这些操作可用于减小数据库或其文件的大小。使用它们时，数据文件末尾的页会重新定位到文件的起始部分。就其预期目的而言，收缩操作可以是有效的工具。


    不幸的是，这些收缩操作没有考虑被移动数据页的性质。对于收缩操作来说，数据页就是数据页。该操作的优先级是让数据文件末尾的页在文件开头找到位置。如前所述，当索引的页在物理上未按顺序存储时，该索引就被视为碎片化的。


    为了演示收缩操作可能造成的碎片化损害，你将创建一个数据库并在其上执行收缩操作；代码见清单 [9-14](#338675_3_En_9_Chapter.xhtml#PC14)。在此示例中，有两个表：`FirstTable`
