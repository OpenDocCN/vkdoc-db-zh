  trans: '# 索引 I/O


    I/O 是 SQL Server 中容易出现性能瓶颈的一个领域；同样，也有多种解决方案可以帮助缓解这些瓶颈。从本章的角度来看，您关注的是碎片化对 I/O 的影响。


    由于页拆分通常是导致碎片化的原因，它们为开始研究碎片化对 I/O 的影响提供了一个很好的切入点。回顾一下，当发生页拆分时，页面上一半的内容会被移出该页面并移动到另一个页面上。一般来说，如果原始页面是
    100% 满的，那么拆分后的两个页面都会大约 50% 满。本质上，从存储中读取相同数量的信息（在页拆分之前只需一次 I/O）现在将需要两次 I/O。这种 I/O
    的增加会推高读取和写入操作，从而可能对性能产生负面影响。


    为了验证碎片化对 I/O 的这种影响，让我们逐步分析另一个碎片化示例。这次您将创建一个表，填充一些数据，并执行更新以生成页拆分和碎片化。清单 9-22 中的代码将执行这些操作。该脚本的最后部分将查询
    `sys.dm_db_partition_stats` 以返回已为索引保留的页数。执行清单 9-21 中的碎片化脚本。您会看到此时索引的碎片化程度超过 99%，而清单
    9-14 的结果显示索引使用了 209 页。结果请参见图 9-20。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig20_HTML.jpg](img/338675_3_En_9_Fig20_HTML.jpg)


    图 9-20: `CLUS_IndexIO` 的碎片化情况


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.IndexIO'') IS NOT NULL

    DROP TABLE dbo.IndexIO;

    CREATE TABLE dbo.IndexIO

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.IndexIO (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_IndexIO ON dbo.IndexIO(RowID);

    UPDATE dbo.IndexIO

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```


    清单 9-22: 构建索引 I/O 示例的脚本


    ```sql

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.IndexIO''),NULL,NULL,''DETAILED'')

    ```


    清单 9-21: 查看索引 I/O 示例的碎片化情况


    但是，从索引中移除碎片化会对索引中的页数产生显著影响吗？正如演示将展示的那样，减少碎片化确实会产生影响。


    接下来要做的是从索引中移除碎片化。为此，请执行清单 9-23 中的 `ALTER INDEX` 语句以移除碎片化。在本章的剩余部分，我们将讨论从索引中移除碎片化的机制，因此目前暂不解释此语句。该命令的效果是索引中的所有碎片化都已被移除。图
    9-21 显示了清单 9-23 的结果。结果显示，索引使用的页数从 585 页减少到了 417 页。移除碎片化的效果是显著的，索引中的页数减少了近 30%。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig21_HTML.jpg](img/338675_3_En_9_Fig21_HTML.jpg)


    图 9-21: 重建操作后的页数


    ```sql

    USE AdventureWorks2017

    GO

    ALTER INDEX CLUS_IndexIO ON dbo.IndexIO REBUILD

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```


    清单 9-23: 重建索引以移除碎片化的脚本


    这证明碎片化会对索引中的页数产生影响。索引中的页数越多，获取所需数据所需的读取操作就越多。减少页数有助于让 SQL Server 数据库在相同的读取次数内处理更多数据，或者通过减少页数来提高读取相同信息的速度。


    # 连续读取


    碎片化对性能的另一个负面影响与连续读取有关。在 SQL Server 中，连续读取会影响其利用预读操作的能力。预读允许 SQL Server 请求预计将会使用的页面进入内存。SQL
    Server 不必等待为页面生成 I/O 请求，而是可以将大块页面读入内存，预期这些数据页将在未来被查询使用。


    回到索引，我们之前讨论过索引内的碎片化是如何因索引中物理数据页连续性的中断而产生的。每当物理页出现中断时，I/O 操作就必须改变从 SQL Server 读取数据的位置。这就是碎片化如何对连续读取造成阻碍的。


    ## 碎片整理选项


    SQL Server 提供了多种方法来移除或缓解索引中的碎片化。每种方法都有其相关的优点和缺点。在本节中，您将了解这些选项以及选择每种选项的原因。


    # 索引重建


    从索引中移除碎片化的第一种方法是重建索引。重建索引会构建索引的一个新的、连续的副本。当新索引完成后，现有索引会被删除。索引重建操作通过 `CREATE INDEX`
    或 `ALTER INDEX` 语句完成。通常，碎片化程度超过 30% 的索引被认为是重建索引的良好候选对象。请注意，在大多数数据库中，碎片化程度在 30%
    及以下通常不会对性能产生大的负面影响。使用 30% 是一个很好的起点，但如果性能在索引碎片化低于 30% 时显示出更显著的负面影响，则应审查并调整每个数据库和索引的使用情况。


    执行索引重建的主要好处是，最终得到的新索引具有连续的页面。当索引高度碎片化时，有时解决碎片化问题的最佳方法就是简单地从头开始重建索引。重建索引的另一个好处是，可以在重建过程中修改索引选项。最后，对于大多数索引，在重建过程中索引可以保持在线状态。'
- fmt: "### Note\n\nSince SQL Server 2012, clustered indexes with `varchar(max)`,\
    \ `nvarchar(max)`, `varbinary(max)`, and `XML` data types can be rebuilt online.\
    \ Clustered indexes still cannot be rebuilt online when they contain the following\
    \ data types: `image`, `ntext`, or `text`. Also, online rebuilds are limited to\
    \ SQL Server Enterprise, Developer, and Evaluation Editions. Additionally, online\
    \ rebuilds require double the space for the index since both the old and new versions\
    \ of the index need to exist to complete the rebuild, which can be a problem with\
    \ larger tables.\n\nThe first option for rebuilding an index is to use the `CREATE\
    \ INDEX` statement, shown in Listing 9-24. This is accomplished through the use\
    \ of the `DROP_EXISTING` index option. There are a few reasons to choose the `CREATE\
    \ INDEX` option instead of `ALTER INDEX`:\n\n*   The index definition needs to\
    \ be changed, such as when the columns need to be added or removed or their order\
    \ needs to change.\n*   The index needs to be moved from one filegroup to another.\n\
    *   The index partitioning needs to be modified.\n\n```sql\nCREATE [ UNIQUE ]\
    \ [ CLUSTERED | NONCLUSTERED ] INDEX index_name\nON  ( column [ ASC | DESC ] [\
    \ ,...n ] )\n[ INCLUDE ( column_name [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n\
    \ ] ) ]\n[ ON { partition_scheme_name ( column_name )\n| filegroup_name\n| default\n\
    }\n]\n[ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | \"\
    NULL\" } ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON | OFF }\n| ONLINE = { ON | OFF }\n\
    | RESUMABLE = {ON | OF }\n| MAX_DURATION =  [MINUTES]\n```\nListing 9-24: Index\
    \ Rebuild with `CREATE INDEX`\n\nThe other option is the `ALTER INDEX` statement,\
    \ shown in Listing 9-25. This option utilizes the `REBUILD` option in the syntax.\
    \ Conceptually, this accomplishes that same thing as the `CREATE INDEX` statement\
    \ but with the following benefits:\n\n*   More than one index on a table can be\
    \ rebuilt in a single statement.\n*   A single partition of an index can be rebuilt.\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n\
    [ WITH (  [ ,...n ] ) ]\n| [ PARTITION = partition_number\n[ WITH ( \n[ ,...n\
    \ ] )\n]\n]\n]\n```\nListing 9-25: Index Rebuild with `ALTER INDEX`\n\nThe primary\
    \ downside to index rebuilds is the amount of space that is required for the index\
    \ during the rebuild operation. At a minimum, there should be 120 percent of the\
    \ size of the current index available within the database for the rebuilt index.\
    \ The reason for this is that the current index will not be dropped until after\
    \ the rebuild is completed. For a short time, the index will exist twice in the\
    \ database.\n\nThere are two ways to mitigate some of the space required for an\
    \ index during a rebuild. First, the `SORT_IN_TEMPDB` index option can be used\
    \ to reduce the amount of space needed for intermediate results. You will still\
    \ need room in the database for two copies of the index, but the 20 percent buffer\
    \ won’t be necessary. The second way to mitigate space is to disable the index\
    \ prior to the rebuild. Disabling an index drops the index and data pages from\
    \ an index while retaining the index metadata. This will allow a rebuild of the\
    \ index in the space that the index previously occupied. Be aware that the disabling\
    \ option applies only to nonclustered indexes.\n\nA new option with SQL Server\
    \ 2019 is the ability to resume index builds. When you are building an index online,\
    \ you can set the `RESUMABLE` option to `ON` and the `MAX_DURATION` to the number\
    \ of minutes you want the index to run until it should stop. When the index rebuild\
    \ stops, the old index remains available, and the completed portion of the rebuild\
    \ is stored until a time when the rebuild is restarted. Additionally, if an index\
    \ rebuild fails with the `RESUMABLE` option set to `ON`, this will allow the index\
    \ rebuild to be restarted. This can be extremely useful if the transaction log\
    \ runs out of space or someone kills the index rebuild operation.\n\n#### Index\
    \ Reorganization\n\nAn alternative to an index rebuild is to reorganize an index.\
    \ This type of defragmentation happens just as it sounds. Data pages in the index\
    \ are reordered across the pages already allocated to the index. After the reorganization\
    \ is complete, the physical order of pages in an index matches the logical order\
    \ of pages. Indexes should be reorganized when they are not heavily fragmented.\
    \ In general, indexes fragmented less than 30 percent are reorganization candidates.\n\
    \nTo reorganize an index, the `ALTER INDEX` syntax is used (see Listing 9-26)\
    \ with the `REORGANIZE` option. Along with that option, the reorganization allows\
    \ for a single partition to be reorganized. The `REBUILD` option does not allow\
    \ this.\n\n```sql\nALTER INDEX { index_name | ALL }\nON \n| REORGANIZE\n[ PARTITION\
    \ =partition_number ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n```\nListing\
    \ 9-26: Index Reorganization with `ALTER INDEX`\n\nThere are a couple of benefits\
    \ to using the `REORGANIZE` option. First, indexes are online or available for\
    \ use by the optimizer in a new execution plan or in cached execution plans for\
    \ the duration of the reorganization. Second, the process is designed around minimal\
    \ resource usage, which significantly lowers the chance that locking and blocking\
    \ issues will occur during the transaction.\n\nThe downside to index reorganizations\
    \ is that the reorganization uses only the data pages already allocated to the\
    \ index. With fragmentation, the extents allocated to one index can often be intertwined\
    \ with the extents allocated to other indexes. Reordering the data pages won’t\
    \ make the data pages any more contiguous than they currently are, but it will\
    \ make certain that the pages allocated are sorted in the same order as the data\
    \ itself.\n\n#### Drop and Create\n\nThe third way to defragment an index is to\
    \ simply drop the index and re-create it. We include this option for completeness,\
    \ but note that it is not widely practiced or advised. There are a few reasons\
    \ that illustrate why dropping and creating can be a bad idea.\n\nFirst, if the\
    \ index is a clustered index, then all the other indexes will need to be rebuilt\
    \ when the clustered index is dropped. Clustered indexes and heaps use different\
    \ structures for identifying rows and storing data. The nonclustered indexes on\
    \ the table will need information on where the record is and will need to be re-created\
    \ to obtain this information.\n\nSecond, if the index is a primary key or unique,\
    \ there are likely other dependents on the index. For instance, the index may\
    \ be referenced in a foreign key. Also, the index could be tied to a business\
    \ rule, such as uniqueness, that cannot be removed from the table, even in a maintenance\
    \ window.\n\nThe third reason to avoid this method is that it requires knowledge\
    \ of all properties on an index. With the other strategies, the index retains\
    \ all the existing index properties. By having to re-create the index, there is\
    \ a risk that a property or two may not be retained in the DDL for the index and\
    \ important aspects of an index could be lost.\n\nLastly, after an index is dropped\
    \ from that table, it cannot be used. This should be an obvious issue, but it’s\
    \ often overlooked when considering this option. The purpose of an index is usually\
    \ the performance improvements that it brings; removing it from the table takes\
    \ those improvements with it.\n\n### Defragmentation Strategies\n\nSo far we’ve\
    \ discussed how fragmentation occurs, why it is an issue, and how it can be removed\
    \ from indexes. It is important to apply this knowledge to the indexes in your\
    \ databases. In this section, you will learn two ways in which the defragmentation\
    \ of indexes can be automated."
