    of rows have been modified. At this point, SQL Server will schedule an update
    to the statistics. As the number of rows in the table increases, then the 20 percent
    threshold decreases, which accommodates the need to update statistics more frequently
    when there are larger numbers of rows within a table. At about 500,000 rows, the
    percentage drops to about 5 percent and then less than 1 percent for over 1 billion
    rows. This is the behavior that was previously available through trace flag 2371,
    which is on by default since SQL Server 2016.


    When the statistics update occurs, there are two modes in which it can be accomplished:
    synchronously and asynchronously. By default, statistics update synchronously.
    This means that when statistics are deemed out-of-date and require an update,
    the query optimizer will wait until after the statistics have been updated before
    it will compile an execution plan for the query. This is extremely useful for
    tables that have data that is volatile. For instance, the statistics for a table
    before and after a `TRUNCATE TABLE` would be quite different. Optionally, statistics
    can be built asynchronously through enabling the `AUTO_UPDATE_STATISTICS_ASYNC`
    property. This changes how the query optimizer reacts when an update statistics
    event is triggered. Instead of waiting for the statistics update to complete,
    the query optimizer will compile an execution plan based on the existing statistics
    and use the updated statistics for future queries after the update completes.
    For databases with high volumes of queries and data being pushed through, this
    is often the preferred manner of updating statistics. Instead of occasional pauses
    in transactional throughput, the queries will flow through unencumbered, and plans
    will update as improved information is available.


    If you are in an environment that disabled `AUTO_UPDATE_STATISTICS` in previous
    SQL Server versions, you should consider enabling it now with `AUTO_UPDATE_STATISTICS_ASYNC`.
    The most common reason to disable `AUTO_UPDATE_STATISTICS` in the past was the
    delay caused by the update of statistics. With the option to enable `AUTO_UPDATE_STATISTICS_ASYNC`,
    those performance concerns can likely be mitigated.


    #### Preventing Auto Update


    Depending on the indexes on a table , there will be times in which automatically
    updating the indexes will do more harm than good. For instance, an automatic statistics
    update on a large table may lead to performance issues while the statistics object
    is updated. In that situation, the existing statistics object may be good enough
    until the next maintenance window. There are a number of ways in which `AUTO_UPDATE_STATISTICS`
    can be disabled on an individual statistics object rather than across the entire
    database:


    *   Executing an `sp_autostats` system store procedure on the statistics object


    *   Using the `NORECOMPUTE` option on the `UPDATE STATISTICS` or `CREATE STATISTICS`
    statement


    *   Using `STATISTICS_NORECOMPUTE` on the `CREATE INDEX` statement


    Each of these options can be used to disable or enable the `AUTO_UPDATE_STATISTICS`
    option on indexes. Before disabling this feature, always be sure to validate that
    the statistics update is truly necessary.


    #### In-Memory Statistics


    When considering statistics, one area where statistics are created and used a
    bit differently are with in-memory tables. It’s important to understand that statistics
    cannot be generated automatically on in-memory tables and that they always require
    a full scan. Add to this, natively compiled stored procedures on in-memory tables
    retrieve statistics only when the stored procedure is compiled or when SQL Server
    restarts. This means that when considering the impact of statistics on indexes,
    in-memory tables require additional care in timing the maintenance for the statistics.


    ### Manually Maintaining Statistics


    There will be times when the automated processes for maintaining statistics will
    not be good enough. This is often tied to situations where the data is changing
    but not enough has changed to trigger a statistics update. A good example of when
    this can happen is when update statements change the cardinality of the table
    without affecting a large number of rows. For instance, if 10 percent of a table
    was changed from a large number of values to a single value, then the plan for
    querying the data could end up being suboptimal. In situations like this, you
    need to be able to get in and manually update statistics. As with index fragmentation,
    there are two methods for manually maintaining statistics:


    *   Maintenance plans


    *   T-SQL scripts


    In the next sections, you’ll look at each of these methods and walk through how
    they can be implemented.'
  trans: '

    # 索引统计信息维护


    在第 3 章中，我们讨论了在索引上收集的统计信息。这些统计信息为查询优化器提供了至关重要的信息，用于编译查询的执行计划。当这些信息过时或不准确时，数据库将提供次优或不准确的查询计划。


    在大多数情况下，索引统计信息不需要太多维护。在本节中，我们将探讨 SQL Server 中可用于创建和更新统计信息的过程。我们还将了解在自动过程跟不上索引内数据变化速度的情况下，如何维护统计信息。


    ## 自动维护统计信息


    在 SQL Server 中构建和维护统计信息最简单的方法就是让 SQL Server 来完成。有三个数据库属性控制着 SQL Server 是否会自动构建和维护统计信息：


    *   `AUTO_CREATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS_ASYNC`


    默认情况下，前两个属性在数据库中是启用的。最后一个选项默认是禁用的。在大多数情况下，这三个属性都应该启用。


    ### 自动创建


    第一个数据库属性是 `AUTO_CREATE_STATISTICS`。此属性指导 SQL Server 自动为没有统计信息的列创建单列统计信息。从索引的角度来看，此属性没有影响。当创建索引时，会为该索引创建一个统计信息对象。


    ### 自动更新


    接下来的两个属性是 `AUTO_UPDATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS_ASYNC`。从高层面上看，这两个属性非常相似。当超过内部阈值时，SQL
    Server 将启动统计信息对象的更新。进行更新是为了使统计信息对象中的值与表中的基数保持同步。


    触发统计信息更新的阈值可能因表而异。该阈值基于几个与已更改行数相关的计算。对于空表，当向表中添加超过 500 行时，将触发统计信息更新。如果表的行数超过 500
    行，那么当修改的行数达到 500 行加上最多 20% 的行基数时，统计信息将被更新。此时，SQL Server 将安排更新统计信息。随着表中行数的增加，20%
    的阈值会降低，这适应了当表中行数较多时需要更频繁更新统计信息的需求。在大约 50 万行时，百分比降至约 5%，在超过 10 亿行时降至不到 1%。这是以前通过跟踪标志
    2371 可实现的行为，自 SQL Server 2016 起该标志默认开启。


    当统计信息更新发生时，有两种模式可以完成：同步和异步。默认情况下，统计信息是同步更新的。这意味着当统计信息被认定为过时需要更新时，查询优化器会等待统计信息更新完成后再为查询编译执行计划。这对于数据易变的表非常有用。例如，在
    `TRUNCATE TABLE` 操作前后，表的统计信息可能大不相同。可以选择通过启用 `AUTO_UPDATE_STATISTICS_ASYNC` 属性来异步构建统计信息。这改变了查询优化器在触发更新统计信息事件时的反应方式。查询优化器不再等待统计信息更新完成，而是根据现有统计信息编译执行计划，并在更新完成后为未来的查询使用更新后的统计信息。对于查询量大、数据吞吐量高的数据库，这通常是更新统计信息的首选方式。交易吞吐量不会偶尔停顿，查询会畅通无阻地执行，执行计划会在获得改进的信息后更新。


    如果您在以前的 SQL Server 版本环境中禁用了 `AUTO_UPDATE_STATISTICS`，现在应考虑启用它并同时启用 `AUTO_UPDATE_STATISTICS_ASYNC`。过去禁用
    `AUTO_UPDATE_STATISTICS` 的最常见原因是更新统计信息导致的延迟。有了启用 `AUTO_UPDATE_STATISTICS_ASYNC`
    的选项，这些性能问题很可能得到缓解。


    ### 防止自动更新


    根据表上的索引情况，有时自动更新索引会弊大于利。例如，在大型表上自动更新统计信息可能会在更新统计信息对象时导致性能问题。在这种情况下，现有的统计信息对象可能足够好，可以等到下一个维护窗口。有几种方法可以禁用单个统计信息对象上的
    `AUTO_UPDATE_STATISTICS`，而不是在整个数据库上禁用：


    *   对统计信息对象执行 `sp_autostats` 系统存储过程

    *   在 `UPDATE STATISTICS` 或 `CREATE STATISTICS` 语句中使用 `NORECOMPUTE` 选项

    *   在 `CREATE INDEX` 语句中使用 `STATISTICS_NORECOMPUTE`


    这些选项中的每一个都可以用来禁用或启用索引上的 `AUTO_UPDATE_STATISTICS` 选项。在禁用此功能之前，请务必验证统计信息更新是否确实必要。


    ### 内存中统计信息


    在考虑统计信息时，有一个领域对统计信息的创建和使用方式有些不同，那就是内存中表。重要的是要理解，无法自动在内存中表上生成统计信息，并且它们总是需要完全扫描。此外，内存中表上的原生编译存储过程仅在存储过程编译时或
    SQL Server 重启时获取统计信息。这意味着在考虑统计信息对索引的影响时，内存中表需要额外注意安排统计信息维护的时机。


    ## 手动维护统计信息


    有时，用于维护统计信息的自动过程可能不够好。这通常与数据正在变化但变化量不足以触发统计信息更新的情况有关。一个很好的例子是，当更新语句改变了表的基数，但影响的行数并不多。例如，如果一个表的
    10% 的数据从许多不同的值更改为单个值，那么最终查询数据的执行计划可能不是最优的。在这种情况下，您需要能够手动更新统计信息。与索引碎片整理一样，有两种手动维护统计信息的方法：


    *   维护计划

    *   T-SQL 脚本


    在接下来的部分中，您将了解每种方法，并逐步了解如何实现它们。

    '
- fmt: "## 维护计划\n\n在维护计划中，有一个允许进行统计信息维护的任务。这个任务名为“更新统计信息任务”，其名称恰如其分地说明了它的功能。使用此任务时，可以配置许多属性来控制其行为（参见图[9-26](#338675_3_En_9_Chapter.xhtml#Fig26)）：\n\
    \n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig26_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig26_HTML.jpg)\n\
    \n图 9-26\n\n更新统计信息任务的属性窗口\n\n*   `Connection`：任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`：任务将连接到以进行重建的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定的数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不处于联机状态的数据库。\n*   `Object`：确定重建是针对表、视图，还是表和视图。\n*   `Selection`：指定此任务影响的表或索引。当在`Object`框中选择了“表和视图”时，此选项不可用。\n\
    *   `Update`：对于每个表，确定是更新所有现有统计信息、仅列统计信息（使用`WITH COLUMN`子句），还是仅索引统计信息（使用`WITH INDEX`子句）。\n\
    *   `Scan type`：在完整扫描索引的所有叶级页与“按...抽样”之间选择，后者将扫描一定百分比或数量的行来构建统计信息对象。\n\n与之前讨论的维护计划不同，“更新统计信息任务”没有更深层次的控件来帮助确定是否应更新统计信息。一个有用的选项是将统计信息更新限制在指定的日期范围内，这将减少每次执行期间更新的统计信息数量。在很大程度上，缺少该选项并不是一个决定性的问题。统计信息更新不像索引那样每次更新都需要足够的空间来重建整个索引。然而，能够保留当前的抽样扫描类型会更好，因为这可能对性能产生影响，并且采用一刀切的方法可能无法带来期望的性能。\n\
    \n## T-SQL 脚本\n\n通过 T-SQL，有几种替代方法可以更新统计信息：使用存储过程或使用 DDL 语句。每种方法都有其优缺点。在接下来的部分中，您将了解每种方法以及为什么它可能是一种有价值的方法。\n\
    \n### 存储过程\n\n在 `master` 数据库中，有一个名为 `sp_updatestats` 的系统存储过程，可用于更新数据库中的所有统计信息。由于它是一个系统存储过程，因此可以从任何数据库调用它，以更新调用该过程的数据库中的统计信息。\n\
    \n当执行 `sp_updatestats` 时，它会运行下一节将介绍的 `UPDATE STATISTICS` 语句，并使用 `ALL` 选项。该存储过程接受一个名为\
    \ `resample` 的参数，如代码清单 [9-32](#338675_3_En_9_Chapter.xhtml#PC32) 所示。`resample`\
    \ 参数仅接受值 `resample`。如果提供了此值，则存储过程使用 `UPDATE STATISTICS` 的 `RESAMPLE` 选项。否则，存储过程使用\
    \ SQL Server 中的默认采样算法。\n\n```\nsp_updatestats [ [ @resample = ] 'resample']\n\
    ```\n\n代码清单 9-32\n`sp_updatestats` 语法\n\n使用 `sp_updatestats` 的一个好处是，它将仅更新那些数据已发生修改的项的统计信息。将检查用于触发自动统计信息更新的内部计数器，以确保只更新已更改的统计信息。此外，`resample`\
    \ 选项使用统计信息最近使用的采样率。\n\n在需要更新统计信息的情况下，`sp_updatestats` 是一个极好的工具，用于仅更新那些自上次更新以来可能已过时的统计信息。“更新统计信息任务”就像一张覆盖整个数据库的巨大毯子，而\
    \ `sp_updatestats` 则像一条恰到好处地覆盖所需之处的被子。"
  raw: "#### Maintenance Plans\n\nWithin maintenance plans , there is a task that\
    \ allows statistics maintenance. This task is the Update Statistics Task, aptly\
    \ named for exactly what it accomplishes. When using this task, there are a number\
    \ of properties that can be configured to control its behavior (see Figure [9-26](#338675_3_En_9_Chapter.xhtml#Fig26)):\n\
    \n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig26_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig26_HTML.jpg)\n\
    \nFigure 9-26\n\nProperties window for Update Statistics Task\n\n*   ***Connection***:\
    \ The SQL Server instance the task will connect to when it executes.\n\n*   ***Database(s)***:\
    \ The databases the task will connect to for rebuilding. The options for this\
    \ property are\n    *   All databases.\n\n    *   All system databases.\n\n  \
    \  *   All user databases.\n\n    *   These specific databases (a list of available\
    \ databases is included and one must be selected).\n\n    *   Ignore databases\
    \ where the state is not online.\n\n*   ***Object***: Determines whether the rebuild\
    \ will be against tables, views, or tables and views.\n\n*   ***Selection***:\
    \ Specifies the tables or indexes affected by this task. This is not available\
    \ when Tables and Views is selected in the Object box.\n\n*   ***Update***: For\
    \ each table, determines whether all existing statistics, column statistics only\
    \ (using `WITH COLUMN` clause), or index statistics only (using `WITH INDEX` clause)\
    \ are updated.\n\n*   ***Scan type***: A choice between a full scan of all leaf-level\
    \ pages of the indexes and “Sample by,” which will scan a percentage or number\
    \ of rows to build the statistics object.\n\nUnlike the maintenance plans previously\
    \ discussed, the Update Statistics Task doesn’t have deeper controls to help determine\
    \ whether the statistics should be updated. A useful option would be to limit\
    \ the statistics updates to a specified date range, which would reduce the number\
    \ of statistics updated during each execution. For the most part, the lack of\
    \ that option is not a deal-breaker. Statistics updates aren’t like indexes where\
    \ each update requires enough space to rebuild the entire index. However, it would\
    \ be good to be able to retain the current sample scan type since that can have\
    \ an effect on performance and may not result in desired performance with a one-size-fits-all\
    \ approach.\n\n#### T-SQL Scripts\n\nThrough T-SQL, there are a couple alternative\
    \ approaches for updating statistics: using stored procedure or using DDL statements.\
    \ Each of these approaches has pros and cons. In the next sections, you’ll look\
    \ at each one and why it may be a worthwhile approach.\n\n##### Stored Procedure\n\
    \nWithin the master database , there is a system stored procedure named `sp_updatestats`\
    \ that allows for updating all statistics within a database. Since it is a system\
    \ stored procedure, it can be called from any database to update the statistics\
    \ in the database in which it is called from.\n\nWhen `sp_updatestats` is executed,\
    \ it runs the `UPDATE STATISTICS` statement, described in the next section, using\
    \ the `ALL` option. The stored procedure accepts a single parameter named `resample`,\
    \ shown in Listing [9-32](#338675_3_En_9_Chapter.xhtml#PC32). The `resample` parameter\
    \ accepts only the value `resample`. If this value is supplied, then the stored\
    \ procedure uses the `RESAMPLE` option of `UPDATE STATISTICS`. Otherwise, the\
    \ stored procedure uses the default sampling algorithm in SQL Server.\n\n```\n\
    sp_updatestats [ [ @resample = ] 'resample']\nListing 9-32\nsp_updatestats Syntax\n\
    ```\n\nOne benefit to using `sp_updatestats` is that it will update the statistics\
    \ only for items in which there have been modifications to the data. The internal\
    \ counter that is used to trigger automatic statistics updates is checked to make\
    \ certain that only statistics that have been changed will be updated. Additionally,\
    \ the resample option uses the most recently used sample rate for the statistics.\n\
    \nIn situations where a statistics update is needed, the `sp_updatestats` is a\
    \ great tool for updating statistics on just those that have the potential for\
    \ being out-of-date since the last update. Where the Update Statistics Task is\
    \ an oversized blanket that smothers the entire database, `sp_updatestats` is\
    \ a comforter that covers just the right places."
