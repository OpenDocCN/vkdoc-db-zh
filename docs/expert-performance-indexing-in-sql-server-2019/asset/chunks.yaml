  trans: "\n# DMF 列描述与使用示例\n\n## DMF 列描述\n\n| DMF 列 | 描述 |\n| --- | --- |\n| `database_id`\
    \ | 数据库的 ID。 |\n| `object_id` | 表或视图的对象 ID。 |\n| `index_id` | 索引的 ID。 |\n| `partition_id`\
    \ | 索引的分区号。 |\n| `rowset_id` | 索引的分区 ID。 |\n| `allocation_unit_id` | 分配单元的 ID。\
    \ |\n| `allocation_unit_type` | 分配单元的类型。 |\n| `allocation_unit_type_desc` | 分配单元的描述。\
    \ |\n| `data_clone_id` | 未知。 |\n| `clone_state` | 未知。 |\n| `clone_state_desc`\
    \ | 未知。 |\n| `extent_file_id` | 区的文件 ID。 |\n| `extent_page_id` | 区的页 ID。 |\n|\
    \ `allocated_page_iam_file_id` | 与该页关联的索引分配映射页的文件 ID。 |\n| `allocated_page_iam_page_id`\
    \ | 与该页关联的索引分配映射页的页 ID。 |\n| `allocated_page_file_id` | 已分配页的文件 ID。 |\n| `allocated_page_page_id`\
    \ | 已分配页的页 ID。 |\n| `is_allocated` | 指示页是否已分配。 |\n| `is_iam_page` | 指示页是否是索引分配页。\
    \ |\n| `is_mixed_page_allocation` | 指示页是否已分配。 |\n| `page_free_space_percent` |\
    \ 页上空闲空间的百分比。 |\n| `page_type` | 已分配页的页类型 ID。 |\n| `page_type_desc` | 页类型的描述。\
    \ |\n| `page_level` | B 树索引中页的级别。 |\n| `next_page_file_id` | 下一页的文件 ID。 |\n| `next_page_page_id`\
    \ | 下一页的页 ID。 |\n| `previous_page_file_id` | 上一页的文件 ID。 |\n| `previous_page_page_id`\
    \ | 上一页的页 ID。 |\n| `is_page_compressed` | 指示页是否已压缩。 |\n| `has_ghost_records` |\
    \ 指示页是否包含幽灵记录。 |\n\n## sys.dm_db_database_page_allocations 的用例\n\n使用这个 DMF，我们可以研究几个用例，以帮助展示如何利用\
    \ `sys.dm_db_database_page_allocations`。首先，你需要为此章节创建一个数据库，以及一个包含十二行数据的表，使用清单 2-2\
    \ 中的脚本。\n\n```sql\nUSE master;\nGO\nCREATE DATABASE Chapter2Internals;\nGO\nUSE\
    \ Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsOne\n(\nRowID INT IDENTITY(1,\
    \ 1),\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsOne\nDEFAULT\
    \ VALUES;\nGO 12\n```\n\n**清单 2-2**\n创建包含 12 行的 dbo.IndexInternalsOne 的脚本\n\n\
    创建表之后，你将使用清单 2-3 中的脚本来展示 SQL Server 如何存储表中的记录，以及如何使用 `sys.dm_db_database_page_allocations`\
    \ 检查它们。如图 2-13 所示，有一个索引分配映射页分配给了该表，该页位于混合页分配中。这意味着多个索引可以使用该区来分配这些页。然后，有八个页分配给了索引的第一个数据页区，起始页码为\
    \ 312，另外四个页分配自一个起始页码为 320 的区。此外，你还可以看到在起始页码为 320 的区上有四个页已分配但尚未分配页类型。这演示并证实了上一节关于堆结构的讨论。存在一个索引分配映射以及分配给该映射的、包含数据页的区。\n\
    \n![图 2-13: dbo.IndexInternalsOne 的区分配结果](img/338675_3_En_2_Fig13_HTML.jpg)\n\n\
    ```sql\nSELECT DPA.extent_file_id,\n       DPA.extent_page_id,\n       DPA.page_type_desc,\n\
    \       DPA.allocation_unit_type_desc,\n       DPA.is_iam_page,\n       DPA.is_mixed_page_allocation,\n\
    \       COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsOne'), NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n\
    \         DPA.extent_page_id,\n         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n\
    \         DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n\n**清单 2-3**\n使用 `sys.dm_db_database_page_allocations`\
    \ 查看区分配\n\n索引分配映射页总是混合区的一部分，因为该分配决定了多个表的索引映射。为了演示，你可以运行清单 2-4 中的脚本，该脚本创建第二个表，该表包含一个通过主键实现的聚集索引。查看图\
    \ 2-14 中的结果，六行数据被添加到了一个起始页码为 328 的区，绕过了上一个表中已分配但未使用的四个页。然而，索引分配映射页属于与 `dbo.IndexInternalsOne`\
    \ 相同的区，该区起始页码为 232，表明这个区确实是混合的。此外，你还会看到为该表分配了一个索引页以支持聚集索引的 B 树结构。\n\n![图 2-14:\
    \ dbo.IndexInternalsTwo 的区分配结果](img/338675_3_En_2_Fig14_HTML.jpg)\n\n```sql\n\
    USE Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsTwo\n(\nRowID INT IDENTITY(1,\
    \ 1) PRIMARY KEY,\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsTwo\n\
    DEFAULT VALUES;\nGO 6\n\nSELECT DPA.extent_file_id,\n       DPA.extent_page_id,\n\
    \       DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n       DPA.is_iam_page,\n\
    \       DPA.is_mixed_page_allocation,\n       COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n\
    \         DPA.extent_page_id,\n         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n\
    \         DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n\n**清单 2-4**\n创建包含 12 行的 `dbo.IndexInternalsTwo`\
    \ 的脚本\n\n除了区级别的详细信息，你还可以使用这个 DMF 深入到页级别来研究索引，以了解分配给表的所有页以及它们与索引中其他页的关联顺序。使用清单\
    \ 2-5 中的脚本，你可以在图 2-15 中再次看到，起始页码为 232 的区包含了分配给索引分配映射的页 235 和 236。分配给起始页码为 312\
    \ 的区的页包括页 312、313 等，这与起始页码为 328 的区类似，后者包括页 328、329 等。除此之外，你还可以查看每个页在 B 树中的页级别以及页之间的连接，从而验证在索引中上下移动以及在数据页之间逐页移动的能力。\n\
    \n![图 2-15: 查看所有已分配页的区分配结果](img/338675_3_En_2_Fig15_HTML.jpg)\n\n```sql\nSELECT\
    \ DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n       DPA.object_id,\n\
    \       DPA.index_id,\n       DPA.extent_page_id,\n       DPA.allocated_page_iam_page_id,\n\
    \       DPA.allocated_page_page_id,\n       DPA.page_level,\n       DPA.next_page_page_id,\n\
    \       DPA.previous_page_page_id\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), NULL, NULL, 'DETAILED') DPA\n```\n\n**清单\
    \ 2-5**\n用于查看所有已分配页的脚本\n"
- fmt: '## sys.dm_db_page_info


    另一个帮助我们理解索引如何操作的动态管理函数是`sys.dm_db_page_info`。此 DMF 提供数据库页面的页头行信息。这些信息包括槽数、可用字节、最小日志记录状态、幽灵记录以及页面链接详情。


    列表 [2-6](#338675_3_En_2_Chapter.xhtml#PC6) 展示了使用 `sys.dm_db_page_info` 的语法。执行需要四个参数，定义见表
    [2-3](#338675_3_En_2_Chapter.xhtml#Tab3)。虽然微软说明这些参数可以为 NULL，但事实并非如此，当提供 NULL 值时该函数会报错。


    表 2-3


    `sys.dm_db_database_page_allocations` 的参数


    | 参数 | 描述 |

    | --- | --- |

    | `@DatabaseId` | 要返回页面头信息的数据库。 |

    | `@FileID` | 要返回页面的 `FileId`。 |

    | `@PageId` | 要返回页面的 `Page_id`。 |

    | `@Mode` | 定义返回数据的模式。选项有 `DETAILED` 和 `LIMITED`。`LIMITED` 模式下，信息仅限于页面元数据。`DETAILED`
    模式下，将填充页面描述列。 |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {FileId}, {PageId}, {DETAILED | LIMITED})

    Listing 2-6

    sys.dm_db_page_info 语法

    ```


    执行 `sys.dm_db_page_info` 时，结果包含表 [2-4](#338675_3_En_2_Chapter.xhtml#Tab4) 中定义的列。对于每个请求的页面，结果中都会有一行头信息。


    表 2-4


    `sys.dm_db_page_info` 的列


    | 列名 | 描述 |

    | --- | --- |

    | database_id | 数据库的 ID。 |

    | file_id | 数据文件的 ID。 |

    | page_id | 页面的 ID。 |

    | page_header_version | 页面头的版本。 |

    | page_type | 页面类型的 ID。 |

    | page_type_desc | 页面类型的文本描述。 |

    | page_type_flag_bits | 页面头中的类型标志位。 |

    | page_type_flag_bits_desc | 页面头中类型标志位的描述。 |

    | page_flag_bits | 页面头中的标志位。 |

    | page_flag_bits_desc | 页面头中标志位的文本描述。 |

    | page_lsn | 与上次页面修改关联的日志序列号。 |

    | page_level | 页面在索引中的级别。 |

    | object_id | 与页面关联的对象的 ID。 |

    | index_id | 索引的 ID。 |

    | partition_id | 分区的 ID。 |

    | alloc_unit_id | 分配单元的 ID。 |

    | is_encrypted | 指示页面是否已加密。 |

    | has_checksum | 指示页面是否具有校验和值。 |

    | checksum | 页面的校验和值。 |

    | is_iam_page | 指示页面是否为索引分配映射页面。 |

    | is_mixed_extent | 指示页面是否为混合区的一部分。 |

    | has_ghost_records | 指示页面是否有幽灵记录。 |

    | has_version_records | 指示页面是否有版本记录。 |

    | has_persisted_version_records | 指示页面是否有持久化的版本记录。 |

    | pfs_page_id | 与此页面关联的 PFS 页面的页面 ID。 |

    | pfs_is_allocated | 指示 PFS 页面是否已分配此页面。 |

    | pfs_alloc_percent | 由 PFS 页面指示的分配百分比。 |

    | pfs_status | PFS 状态的位值。 |

    | pfs_status_desc | PFS 状态的文本描述。 |

    | gam_page_id | 与此页面关联的 GAM 页面的页面 ID。 |

    | gam_status | 指示此页面 GAM 状态的 ID 值。 |

    | gam_status_desc | 此页面 GAM 状态的文本描述。 |

    | sgam_page_id | 与此页面关联的 SGAM 页面的页面 ID。 |

    | sgam_status | 指示此页面 SGAM 状态的 ID 值。 |

    | sgam_status_desc | 此页面 SGAM 状态的文本描述。 |

    | diff_map_page_id | 与此页面关联的差异映射页面的页面 ID。 |

    | diff_status | 指示此页面差异映射状态的 ID 值。 |

    | diff_status_desc | 此页面差异映射状态的文本描述。 |

    | ml_map_page_id | 与此页面关联的最小日志记录页面的页面 ID。 |

    | ml_status | 指示此页面最小日志记录页面状态的 ID 值。 |

    | ml_status_desc | 此页面最小日志记录页面状态的文本描述。 |

    | prev_page_file_id | 下一个页面的文件 ID。 |

    | prev_page_page_id | 下一个页面的页面 ID。 |

    | next_page_file_id | 上一个页面的文件 ID。 |

    | next_page_page_id | 上一个页面的页面 ID。 |

    | fixed_length | 未知。 |

    | slot_count | 已使用和未使用的槽的总数。 |

    | ghost_rec_count | 页面上标记为幽灵的记录数。 |

    | free_bytes | 页面上的可用字节数。 |

    | free_bytes_offset | 数据区域末尾可用空间的偏移量。 |

    | reserved_bytes | 页面上的保留字节数。 |

    | reserved_bytes_by_xdes_id | 由 m_xdesID 贡献给 m_reservedCnt 的空间。 |

    | xdes_id | 由 m_reserved 贡献的最新事务。 |


    您可以使用此头信息来识别不同结构（如 PFS 页面）之间页面的相互关系，或使用它来检查页面以验证校验和、槽数或可用空间。要演示，请运行列表 [2-7](#338675_3_En_2_Chapter.xhtml#PC7)
    中的代码，该代码检索先前创建的两个表的所有页面分配，并为所有已分配的页面检索页面头信息。


    ```

    SELECT T.name,

    DPA.page_type_desc,

    DPI.page_id,

    DPI.pfs_page_id,

    DPI.gam_page_id,

    DPI.sgam_page_id,

    DPI.diff_map_page_id,

    DPI.ml_map_page_id,

    DPI.prev_page_page_id,

    DPI.next_page_page_id,

    DPI.fixed_length,

    DPI.slot_count,

    DPI.free_bytes

    FROM sys.dm_db_database_page_allocations(DB_ID(), NULL, NULL, NULL, ''DETAILED'')
    DPA

    INNER JOIN sys.tables T ON T.object_id = DPA.object_id

    CROSS APPLY sys.dm_db_page_info(DPA.database_id, DPA.allocated_page_file_id, DPA.allocated_page_page_id,
    DEFAULT) DPI;

    Listing 2-7

    使用 sys.dm_db_page_info 的查询

    ```


    执行后，您将获得与图 [2-16](#338675_3_En_2_Chapter.xhtml#Fig16) 类似的结果。在这些结果中，我们看到了 `dbo.IndexInternalsTwo`
    相同的前后页面连接，但没有列出 `dbo.IndexInternalsone` 的页面 ID。此外，两个表的 PFS、GAM、SGAM、DIFF 和 ML
    页面都被识别出来，它们是相同的，因为数据库小于需要多个此类页面类型的阈值。最后，您将看到每个页面的槽数、长度和可用字节数。值得注意的是，页面 329（即 `dbo.IndexInternalsTwo`
    的索引页面）有六个槽，每个槽对应索引页面在聚集索引中管理的一个页面。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig16_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig16_HTML.jpg)


    图 2-16


    来自 `sys.dm_db_page_info` 的页面头结果


    ### DBCC 命令


    虽然您可以使用本章前面描述的动态管理函数对数据结构进行大量探索，但有时您会希望深入挖掘。要在 SQL Server 中实现这一点，您可以使用以下 DBCC
    命令：


    * `DBCC EXTENTINFO`

    * `DBCC IND`

    * `DBCC PAGE`


    在接下来的几节中，我们将探讨这些命令，并回顾一些在数据库中利用它们的示例。'
  raw: '#### sys.dm_db_page_info


    Another dynamic management function that helps us understand how indexes operate
    is sys.dm_db_page_info. This DMF provides page header row information for database
    pages. This information includes number of slots, free bytes, minimally logged
    status, ghost records, and page linking details.


    Listing [2-6](#338675_3_En_2_Chapter.xhtml#PC6) shows the syntax for using `sys.`dm_db_page_info.
    The execution requires four parameters, which are defined in Table [2-3](#338675_3_En_2_Chapter.xhtml#Tab3).
    While Microsoft states that these parameters can be NULL, that is not the case,
    and the function errors when NULL values are provided.


    Table 2-3


    Parameters for sys.dm_db_database_page_allocations


    | Parameter | Description |

    | --- | --- |

    | `@DatabaseId` | Database from which to return the page header information. |

    | `@FileID` | `FileId` for the page that will be returned. |

    | `@PageId` | `Page_id` for the page that will be returned. |

    | `@Mode` | Defines the mode for returning data. The options are `DETAILED` and
    `LIMITED`.  With `LIMITED`, the information is limited to page metadata.  Under
    the `DETAILED` mode, page descriptive columns will be populated. |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {FileId}, {PageId}, {DETAILED | LIMITED})

    Listing 2-6

    sys.dm_db_page_info Syntax

    ```


    When executing sys.dm_db_page_info, results include the columns defined in Table
    [2-4](#338675_3_En_2_Chapter.xhtml#Tab4). For every page requested, there will
    be one row of header information in the results.


    Table 2-4


    Columns for sys.dm_db_page_info


    | Column Name | Description |

    | --- | --- |

    | database_id | ID of the database. |

    | file_id | ID of the data file. |

    | page_id | ID of the page. |

    | page_header_version | Version of the page header. |

    | page_type | ID for the page type. |

    | page_type_desc | Text description of the page type. |

    | page_type_flag_bits | Type flag bits in the page header. |

    | page_type_flag_bits_desc | Type flag bits description in the page header. |

    | page_flag_bits | Flag bits in the page header. |

    | page_flag_bits_desc | Flag bits text description in the page header. |

    | page_lsn | Log sequence number associated with last page modification. |

    | page_level | Level of the page in the index. |

    | object_id | ID of the object associated with the page. |

    | index_id | ID of the index. |

    | partition_id | ID of the partition. |

    | alloc_unit_id | ID of the allocation unit. |

    | is_encrypted | Indicates whether a page is encrypted. |

    | has_checksum | Indicates whether a page has a checksum value. |

    | checksum | Checksum value for a page. |

    | is_iam_page | Indicates whether a page is the index allocation page. |

    | is_mixed_extent | Indicates whether a page is part of a mixed extent. |

    | has_ghost_records | Indicates whether the page has ghost records. |

    | has_version_records | Indicates whether the page has version records. |

    | has_persisted_version_records | Indicates whether the page has persisted version
    records. |

    | pfs_page_id | Page ID of the PFS page associated with this page. |

    | pfs_is_allocated | Indicates whether the PFS page has allocated this page. |

    | pfs_alloc_percent | Allocation percentage as indicated by the PFS page. |

    | pfs_status | Bit value for the PFS status. |

    | pfs_status_desc | Text description of the PFS status. |

    | gam_page_id | Page ID of the GAM page associated with this page. |

    | gam_status | ID value indicating the GAM status of this page. |

    | gam_status_desc | Text description of the GAM status of this page. |

    | sgam_page_id | Page ID of the SGAM page associated with this page. |

    | sgam_status | ID value indicating the SGAM status of this page. |

    | sgam_status_desc | Text description of the SGAM status of this page. |

    | diff_map_page_id | Page ID of the differential map page associated with this
    page. |

    | diff_status | ID value indicating the differential map status of this page.
    |

    | diff_status_desc | Text description of the differential map status of this page.
    |

    | ml_map_page_id | Page ID of the minimally logged page associated with this page.
    |

    | ml_status | ID value indicating the minimally logged page status of this page.
    |

    | ml_status_desc | Text description of the minimally logged page status of this
    page. |

    | prev_page_file_id | File ID for the next page. |

    | prev_page_page_id | Page ID for the next page. |

    | next_page_file_id | File ID for the previous page. |

    | next_page_page_id | Page ID for the previous page. |

    | fixed_length | Unknown. |

    | slot_count | Total number of used and unused slots. |

    | ghost_rec_count | Number of records marked as ghost on the page. |

    | free_bytes | Number of free bytes on the page. |

    | free_bytes_offset | Offset of free space at the end of data area. |

    | reserved_bytes | Number of reserved bytes on the page. |

    | reserved_bytes_by_xdes_id | Space contributed by m_xdesID to m_reservedCnt.
    |

    | xdes_id | Latest transaction contributed by m_reserved. |


    You can use this header information to identify how pages are interrelated between
    different structures, such as PFS pages, or use it to inspect pages to verify
    checksum or number of slots and free space. To demonstrate, run the code in Listing
    [2-7](#338675_3_En_2_Chapter.xhtml#PC7), which retrieves all page allocations
    for the two previously created tables and retrieves page header information for
    all of the assigned pages.


    ```

    SELECT T.name,

    DPA.page_type_desc,

    DPI.page_id,

    DPI.pfs_page_id,

    DPI.gam_page_id,

    DPI.sgam_page_id,

    DPI.diff_map_page_id,

    DPI.ml_map_page_id,

    DPI.prev_page_page_id,

    DPI.next_page_page_id,

    DPI.fixed_length,

    DPI.slot_count,

    DPI.free_bytes

    FROM sys.dm_db_database_page_allocations(DB_ID(), NULL, NULL, NULL, ''DETAILED'')
    DPA

    INNER JOIN sys.tables T ON T.object_id = DPA.object_id

    CROSS APPLY sys.dm_db_page_info(DPA.database_id, DPA.allocated_page_file_id, DPA.allocated_page_page_id,
    DEFAULT) DPI;

    Listing 2-7

    Query Using sys.dm_db_page_info

    ```


    Once executed, you’ll have results similar to those in Figure [2-16](#338675_3_En_2_Chapter.xhtml#Fig16).
    In these results, we see the same previous and next page connections for dbo.IndexInternalsTwo,
    but no page IDs listed for dbo.IndexInternalsone. Additionally, the PFS, GAM,
    SGAM, DIFF, and ML pages are identified for both tables, which are the same since
    the database is smaller than the threshold required for having multiples of these
    page types. Lastly, you’ll see the number of slots, length, and free bytes per
    page. Of note, page 329, which is the index page for dbo.IndexInternalsTwo, has
    six slots, one for each page that the index page manages in the clustered index.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig16_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Page header results from sys.dm_db_page_info


    ### DBCC Commands


    While you can do a lot of exploration of data structures with the dynamic management
    functions previously described in this chapter, there will be some occasions where
    you will want to dig deeper. To accomplish this in SQL Server, you can use the
    following DBCC commands:


    *   DBCC EXTENTINFO


    *   DBCC IND


    *   DBCC PAGE


    In the next few sections, we’ll explore these commands and review some examples
    of leveraging them in databases.'
  trans: '## sys.dm_db_page_info


    另一个帮助我们理解索引如何运作的动态管理函数是`sys.dm_db_page_info`。此 DMF 提供数据库页面的页头行信息。这些信息包括槽数、可用字节、最小日志记录状态、幽灵记录以及页面链接详情。


    列表 2-6 展示了使用 `sys.dm_db_page_info` 的语法。执行需要四个参数，定义见表 2-3。虽然微软说明这些参数可以为 NULL，但事实并非如此，当提供
    NULL 值时该函数会报错。


    表 2-3


    `sys.dm_db_page_info` 的参数


    | 参数 | 描述 |

    | --- | --- |

    | `@DatabaseId` | 要返回页面头信息的数据库。 |

    | `@FileID` | 要返回页面的 `FileId`。 |

    | `@PageId` | 要返回页面的 `Page_id`。 |

    | `@Mode` | 定义返回数据的模式。选项有 `DETAILED` 和 `LIMITED`。`LIMITED` 模式下，信息仅限于页面元数据。`DETAILED`
    模式下，将填充页面描述列。 |


    ```

    SELECT * FROM sys.dm_db_page_info ({database_id},

    {FileId}, {PageId}, {DETAILED | LIMITED})

    Listing 2-6

    sys.dm_db_page_info 语法

    ```


    执行 `sys.dm_db_page_info` 时，结果包含表 2-4 中定义的列。对于每个请求的页面，结果中都会有一行头信息。


    表 2-4


    `sys.dm_db_page_info` 的列


    | 列名 | 描述 |

    | --- | --- |

    | database_id | 数据库的 ID。 |

    | file_id | 数据文件的 ID。 |

