    ## 选择性 XML 索引


    选择性 XML 索引在 SQL Server 2012 中引入，旨在解决主/辅助 XML 索引的一个重大问题。XML 文档可能非常庞大。对整个文档应用索引会在创建索引以及长期维护索引时带来显著的性能影响。此外，这些过大的索引也会加剧组织中常见的存储难题。同时，当索引变得过大时，其性能可能不如它较小时那么好。鉴于此，便引入了选择性
    XML 索引。


    选择性 XML 索引允许您定义想要索引的 XML 文档子集。这使得索引更小、更灵活，并且针对 XML 中的特定路径进行了定向。当索引创建时，文档会被解析，XML
    被“分解”。分解后的值随后存储在数据库中的标准关系存储中。除了选择性 XML 索引，您还可以基于定义选择性 XML 索引的路径内的节点添加辅助索引。


    选择性 XML 索引相比标准 XML 索引能带来巨大的性能优势。但是，如果您有即席查询，可能会查询 XML 文档中各种不同的元素，那么标准 XML 索引的性能可能会好得多。同样，如果您有大量的节点路径，标准
    XML 索引的性能表现也可能更佳。


    ### 创建选择性 XML 索引


    要创建选择性 XML 索引，您必须满足以下条件：


    *   表必须具有聚集主键。

    *   键大小限制为 128 字节。

    *   键列限制为 15 个。


    选择性 XML 索引不会用于您 XQuery 语句中的 `query()` 或 `modify()` 方法。它将支持 `exist()`、`value()`
    和 `nodes()`。如果您同时使用 `query()` 和 `modify()`，它仅能辅助进行简单的节点查找。


    要查看选择性 XML 索引的实际效果，您需要创建一个。清单 4-6 中的脚本在选择性 XML 索引中创建了一个路径。在此例中，由于我们仅访问 XML 文档中的年度销售额，我们将选择性
    XML 索引限制在该 XML 路径上。


    ```sql

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSales]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'');

    ```

    **清单 4-6** 创建选择性 XML 索引的脚本


    创建选择性 XML 索引后，我们将再次回到清单 4-2 中的示例查询，以查看其对执行计划的影响。如图 4-7 所示，估计子树成本与使用辅助 XML 索引时相当，但使用选择性
    XML 索引时略高。要理解 SQL Server 为何做出此选择，请运行清单 4-4 中的代码以查看存储占用空间。如图 4-8 所示，选择性 XML 索引明显小于辅助
    XML 索引。它没有可能访问 41 个页面和 9,113 条记录，而是限制在跨 5 个页面的 701 条记录，这证明了在选择性 XML 索引上进行聚集索引扫描的额外成本是合理的。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig8_HTML.jpg](img/338675_3_En_4_Fig8_HTML.jpg)

    **图 4-8** 创建选择性 XML 索引后的物理统计信息


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig7_HTML.jpg](img/338675_3_En_4_Fig7_HTML.jpg)

    **图 4-9** 使用选择性 XML 索引的 XML 查询成本


    虽然这为 XML 索引提供了一个大幅改进的机会，但有一个重要的限制需要考虑。如果您的查询发生变化，导致选择性 XML 索引无法覆盖该查询，那么性能将会下降。虽然这是显而易见的，但我们通常在使用索引时无需考虑这一点，因为传统索引覆盖列中的所有数据。


    为了演示此场景，让我们在查询中添加另一个 XML 元素来过滤 `BusinessType`。如清单 4-7 所示，我们将在 `WHERE` 子句中添加 `exist()`，并删除之前创建的主/辅助
    XML 索引，以防止它们干扰输出。通常，如果您有选择性 XML 索引，就不会再同时拥有主/辅助 XML 索引。


    ```sql

    DROP INDEX IF EXISTS [SXML_Store_Demographics] ON [Sales].[Store];

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store];

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1

    AND Demographics.exist(''/StoreSurvey/BusinessType[.="OS"]'') = 1

    ```

    **清单 4-7** 查询 `[Sales].[Store]` 的 `AnnualSales` 和 `BusinessType`


    运行清单 4-7 中的代码后，我们看到查询性能已大幅下降。性能下降的原因是包含了带有 `XPath` 过滤器的 `XML Reader`，这增加了估计子树成本，如图
    4-9 所示。这并不像我们第一次迭代该查询时那么糟糕，因为选择性 XML 索引仍在协助减少需要使用函数扫描整个 XML 文档的记录数量。但这确实是一种性能下降，并且对于大表来说，这可能导致严重问题。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig9_HTML.jpg](img/338675_3_En_4_Fig9_HTML.jpg)

    **图 4-9** 使用选择性 XML 索引但未包含 XML 元素的查询成本


    ### 扩展选择性 XML 索引


    幸运的是，选择性 XML 索引提供了灵活性来规避和调整此类问题。具体来说，清单 4-8 中所示的 `FOR` 子句可以扩展以包含多个 XML 节点和路径。在此例中，我们将
    `BusinessType` 添加到索引中。正如预期并且如图 4-10 所示，对此索引的更改通过将第二个聚集索引扫描操作添加到选择性 XML 索引，将估计子树成本降至
    0.108，从而提高了查询性能。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig10_HTML.jpg](img/338675_3_En_4_Fig10_HTML.jpg)

    **图 4-10** 在两个元素上使用选择性 XML 索引的查询成本


    ```sql

    DROP INDEX IF EXISTS [SEL_XML_Store_Demographics_AnnualSales] ON [Sales].[Store];

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSalesBusinessType]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'',

    BusinessType = ''/StoreSurvey/BusinessType'');

    ```

    **清单 4-8** 创建选择性 XML 索引的脚本


    正如我们之前所做的，我们将再次通过运行清单 4-4 来检查扩展索引对存储的影响。回顾图 4-11，我们看到即使增加了索引中的元素数量，也并未显著改变索引的存储占用空间。它仍然是跨
    6 个（而不是 5 个）页面的 701 条记录。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig11_HTML.jpg](img/338675_3_En_4_Fig11_HTML.jpg)

    **图 4-11** 在两个元素上创建选择性 XML 索引后的物理统计信息

