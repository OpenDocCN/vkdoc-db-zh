    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    Listing 5-3

    Creating a Table to Hold GEOMETRY-Related Data

    ```


    The `GEOM` column will store the `GEOMETRY` data. This column will be used to
    query the data from SQL Server Management Studio to show the imaging that can
    be done from other applications.'
  trans: '# 创建空间索引


    ### 覆盖规则

    覆盖规则是细分（tessellation）过程中应用的最基本的规则。不要与常用术语 `covering index`（覆盖索引）混淆，该规则指出，任何被完全覆盖的单元格不会为该对象单独记录。被覆盖的单元格会为对象进行计数。不存储已覆盖的单元格可节省处理时间和数据存储空间与时间。


    ### 每对象单元格规则

    每对象单元格规则是一个更深入的规则，它对可为特定对象计数的单元格数量施加了限制。在图 5-2 中，显示的圆形在级别 1 覆盖了 2 个单元格，在级别 2 覆盖了
    14 个单元格。由于每对象单元格的默认值是 16，因此该圆形被细分到了第二层。如果该圆形在级别 2 确实覆盖了超过 16 个单元格，则细分不会继续到级别 2。由于该对象在级别
    3 会覆盖远超过 16 个单元格，细分在此处停止。调整每对象单元格数可以增强索引的准确性。根据存储的数据调整此值可能非常有效。鉴于每对象单元格规则的重要性，该设置可通过动态管理视图
    `sys.spatial_index_tessellations` 公开访问。你将在本章后面回顾此设置。


    ![`../images/338675_3_En_5_Chapter/338675_3_En_5_Fig2_HTML.jpg`](img/338675_3_En_5_Fig2_HTML.jpg)


    图 5-2：一个对象及其在网格层内覆盖多少个单元格的视觉表示


    ### 最深单元格规则

    细分过程的最后一个规则是最深单元格规则。如前所述，每一层网格及其内部的单元格都在每个更深层中被引用。因此，在图 5-2 中，级别 2 中定义的单元格是有效完全引用任何其他级别（在本例中为级别
    1）所需的唯一单元格。此规则不可打破，并且已内置于优化器从索引检索数据的处理过程中。


    对于 `GEOGRAPHY` 类型，还有一个额外的挑战，即通过细分过程将形式投影到扁平化的表示中。此过程首先将 `GEOGRAPHY` 网格划分为两个半球。每个半球被投影到一个四棱锥的各个面上并被扁平化，然后两者被连接到一个非欧几里得平面上。此过程完成后，该平面被分解为前述的网格层次结构。


    `Create Spatial Index`（创建空间索引）语句具有与普通聚集或非聚集索引相同的大部分选项。但是，此索引类型还需要一些特定选项，如表 5-1
    所列。


    表 5-1：空间索引选项


    | 选项名称 | 描述 |

    | --- | --- |

    | `USING` | `USING` 子句指定空间数据类型。这将是 `GEOMETRY_GRID` 或 `GEOGRAPHY_GRID`，且不能为 `NULL`。
    |

    | `WITH GEOMETRY_GRID,` `GEOGRAPHY_GRID` | `WITH` 选项包括根据列数据类型为 `GEOMETRY_GRID`
    或 `GEOGRAPHY_GRID` 设置细分架构。 |

    | `BOUNDING_BOX` | `BOUNDING_BOX` 用于 `GEOMETRY` 数据类型中，以定义单元格的边界框。此选项没有默认值，在 `GEOMETRY`
    数据类型上创建索引时必须指定。清单 5-1 中的 `CREATE SPATIAL INDEX IDX_CITY_GEOM` 展示了此选项的语法。设置 `BOUNDING_BOX`
    是通过设置 `xmin`、`ymin`、`xmax` 和 `ymax` 坐标来完成的，如下所示：`BOUNDING_BOX = (XMIN = xmin,
    YMIN = ymin, XMAX = xmax, YMAX = ymax)`。 |

    | `GRIDS` | `GRIDS` 选项用于更改每个网格层的密度。所有层的默认密度为中等，但可以更改为低或高，以进一步调整空间索引和密度设置。 |


    以清单 5-1 中的 `CREATE TABLE` 语句为例。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE CITY_MAPS (

    ID BIGINT PRIMARY KEY

    IDENTITY(1, 1),

    CITYNAME NVARCHAR(150),

    CITY_GEOM GEOMETRY

    );

    GO

    ```


    清单 5-1：包含 `GEOMETRY` 数据类型的 `CREATE TABLE`


    此表将包含主键、城市名称，然后是一个 `GEOMETRY` 列，用于保存城市本身的地图数据。城市的密度可能会影响细分过程中每对象单元格规则的调整，以及网格层次结构中各层的密度。


    要为 `CITY_GEOM` 列创建索引，将使用清单 5-2 中的 `CREATE` 语句，其前两层网格层密度为 `LOW`，第三和第四层为 `MEDIUM`
    和 `HIGH`。这种密度变化允许随着网格层级的深入，调整索引中的对象和覆盖单元格。每对象单元格设置表示一个对象最多可覆盖 24 个单元格。边界框坐标也已设置。


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_CITY_GEOM

    ON CITY_MAPS (CITY_GEOM)

    USING GEOMETRY_GRID

    WITH (

    BOUNDING_BOX = ( xmin=-50, ymin=-50, xmax=500, ymax=500 ),

    GRIDS = (LOW, LOW, MEDIUM, HIGH),

    CELLS_PER_OBJECT = 24,

    PAD_INDEX  = ON );

    ```


    清单 5-2：在 `GEOMETRY` 列上定义空间索引


    要利用和测试创建的索引，你需要查看估计的和实际的执行计划，以确定索引是否已被使用。对于空间数据，查看查询将产生的实际结果也是有益的。SQL Server Management
    Studio 有一个内置的空间数据查看器，可用于查看空间数据。


    清单 5-3 创建了一个可从空间索引中受益的表。该表旨在存储来自美国人口普查局的邮政编码和其他数据。此表将在 `AdventureWorks2014` 数据库中创建。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.tl_2017_us_county (

    STATEFP CHAR(2) NULL,

    COUNTYFP CHAR(3) NULL,

    COUNTYNS CHAR(8) NULL,

    GEOID CHAR(5) NULL,

    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    ```


    清单 5-3：创建一个用于保存 `GEOMETRY` 相关数据的表


    `GEOM` 列将存储 `GEOMETRY` 数据。此列将用于从 SQL Server Management Studio 查询数据，以显示可以从其他应用程序完成的成像。'
- fmt: '### Note


    For the examples in this chapter, a shape file and the tool `OGR2OGR` are required.
    The shape file will come from TIGER/Line Shapefile, 2017, nation, US, Current
    County and Equivalent National Shapefile available at [`www2.census.gov/geo/tiger/TIGER2017/COUNTY/tl_2017_us_county.zip`](https://www2.census.gov/geo/tiger/TIGER2017/COUNTY/tl_2017_us_county.zip).
    And `OGR2OGR` is available in `OSGeo4W` from [`http://download.osgeo.org/osgeo4w/osgeo4w-setup-x86_64.exe`](http://download.osgeo.org/osgeo4w/osgeo4w-setup-x86_64.exe).
    When installing the application, only install the `GDAL` package. After installation,
    run the PowerShell command `[Environment]::SetEnvironmentVariable(“GDAL_DATA”,
    “C:\OSGeo4W64\share\gdal”, “Machine”)` to set an environment variable. Finally,
    from the directory where the geography files were extracted to, run the command
    `C:\OSGeo4W64\bin\ogr2ogr -f “MSSQLSpatial” MSSQL:“server=localhost;database=AdventureWorks2017;trusted_connection=yes;”
    -nln “tl_2017_us_county” -a_srs “ESPG:4269” -lco “GEOM_TYPE=geography” -lco “GEOM_NAME=geog4269”
    “tl_2017_us_county.shp” -s_srs EPSG:4269 -t_srs EPSG:26713`.


    Reviewing the actual data from a query of a `GEOMETRY` data type column is not
    useful in the normal grid and tabular resultset from within `SSMS`. To take advantage
    of the spatial data features, using the Spatial Results tab in `SSMS` is much
    more effective. Given the table from Listing [5-3](#338675_3_En_5_Chapter.xhtml#PC3),
    a simple `SELECT` on the column `GEOM` can be executed, and the results of the
    `SELECT` statement will automatically generate the Spatial Results tab. For example,
    the query in Listing [5-4](#338675_3_En_5_Chapter.xhtml#PC4) will result in an
    image generated of the state of Washington, coding each county area in a different
    color.


    ```

    USE AdventureWorks2017

    GO

    SELECT  *

    FROM    dbo.tl_2017_us_county AS tuc

    WHERE   tuc.STATEFP = ''41'';

    Listing 5-4

    Initial Query for Pulling Back Spatial Data

    ```


    Click the Spatial Results tab in the result window of `SSMS` to reveal the image
    generated by the query. You should see something like that in Figure [5-3](#338675_3_En_5_Chapter.xhtml#Fig3).


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig3_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig3_HTML.jpg)

    **Figure 5-3**

    Output from spatial query against county data


    The query in Listing [5-4](#338675_3_En_5_Chapter.xhtml#PC4) used a standard column,
    `STATEFP`, to filter the information so that you are looking only at counties
    within a particular state. Before using this data, though, it’s a good idea to
    ensure that you are working with only good shapes within the `GEOM` column. It
    is possible to have improper data stored, so cleaning your data may be required.
    To do this, you can use the `MakeValid()` method to modify any `GEOMETRY` instances,
    making them valid. According to the documentation from Microsoft, using the function
    can cause shapes to “shift slightly,” but the extent to which it may affect the
    shapes under your control is unclear. Executing Listing [5-5](#338675_3_En_5_Chapter.xhtml#PC5)
    will result in an update to any invalid `GEOMETRY` instances in the `GEOM` column.


    ```

    USE AdventureWorks2017

    GO

    UPDATE  dbo.tl_2017_us_county

    SET     GEOM = GEOM.MakeValid();

    Listing 5-5

    Using MakeValid() to Correct Any Invalid GEOMETRY Instances

    ```


    The `MakeValid()` method should be used sparingly, and all invalid `GEOMETRY`
    instances that are found should be reviewed in a production setting. You should
    plan on reviewing your shapes after using the `MakeValid()` function because it
    could possibly modify those shapes.


    You can also use the spatial columns to filter the data being returned based on
    the behavior of locations and distances. Listing [5-6](#338675_3_En_5_Chapter.xhtml#PC6)
    shows an example of invoking one of the special methods that have been defined
    to work with spatial information. The query returns the ten counties closest to
    the county of Tulsa in Oklahoma (see Figure [5-4](#338675_3_En_5_Chapter.xhtml#Fig4)).


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig4_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig4_HTML.jpg)

    **Figure 5-4**

    Narrowing the results of the ZIP code data using `STDistance()`


    ```

    USE AdventureWorks2017

    GO

    DECLARE @polygon GEOMETRY;

    SELECT  @polygon = tuc.GEOM

    FROM    dbo.tl_2017_us_county AS tuc

    WHERE   tuc.NAME = ''Tulsa'';

    SELECT TOP 10

    tuc.GEOM,

    tuc.GEOM.STDistance(@polygon),

    tuc.NAME

    FROM    dbo.tl_2017_us_county AS tuc

    WHERE   tuc.GEOM.STDistance(@polygon) IS NOT NULL

    AND tuc.GEOM.STDistance(@polygon) < 1

    ORDER BY tuc.GEOM.STDistance(@polygon);

    Listing 5-6

    Query for the Top Ten Closest ZIP Codes to a Given Point

    ```


    The query from Listing [5-6](#338675_3_En_5_Chapter.xhtml#PC6) creates the execution
    plan shown in Figure [5-5](#338675_3_En_5_Chapter.xhtml#Fig5).


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig5_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig5_HTML.jpg)

    **Figure 5-5**

    Execution plan generated from `STDistance()` without indexing


    If you review the Spatial Results tab, the northeast corner of Oklahoma containing
    the ten counties will look like Figure [5-4](#338675_3_En_5_Chapter.xhtml#Fig4).
    However, the query’s execution plan shown in Figure [5-5](#338675_3_En_5_Chapter.xhtml#Fig5)
    is less than ideal, with an index scan on the clustered index created from the
    primary key and a high-cost `filter` operation. With the use of the `STDistance`
    predicate, the query is a candidate for using an index on the `GEOMETRY` column,
    so an index should be added.'
