  trans: '

    ### 误区 8：从堆中删除数据会导致不可恢复的空间


    堆在 SQL Server 中是一种有趣的结构。在第 2 章中，你了解到它们并非真正的索引，而只是用于存储数据的页面集合。下一章将涉及的索引维护任务之一，就是从堆表中回收空间。正如将在该章更深入讨论的那样，当从堆中删除行时，与这些行关联的页面并不会从堆中移除。这通常被称为堆内部的膨胀。


    关于堆膨胀概念的一个有趣副作用是，存在一个误区，认为这些膨胀的空间永远不会被重用。空间会一直保留在堆中，并且在堆重建之前无法恢复。幸运的是，对于堆和数据库管理员来说，情况并非如此。当数据从堆中移除时，该数据先前占用的空间会被释放出来，供表未来的插入操作使用。


    为了演示其工作原理，你将使用清单 8-19 中的代码创建一个表。该演示创建了一个名为 `MythEight` 的堆，然后插入 400 条记录，这将产生 100
    个数据页面。可以通过图 8-16 中第一个结果集的 `page_count` 列来验证此页面计数。脚本的下一部分删除插入到堆中的每隔一行。通常，这将使每个页面保留的行数减少为原来的一半，如图
    8-16 中的第二个结果集所示。脚本的最后一部分重新向 `MythEight` 表插入 200 行，将行数恢复为 400 条记录，并重用那些已移除数据的先前页面。从图
    8-16 中的最后一个结果集可以看到页面计数略有增长，但大多数新行都适配到了已分配的空间中。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig16_HTML.jpg](img/338675_3_En_8_Fig16_HTML.jpg)


    图 8-16：堆重用查询结果


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythEight'') IS NOT NULL

    DROP TABLE dbo.MythEight;

    CREATE TABLE dbo.MythEight

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    DELETE FROM dbo.MythEight

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 200 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    ```


    清单 8-19：重用 MythEight 堆中的数据空间


    正如针对此误区的演示所示，堆中先前存储数据的空间会被释放，以供表重用。对于有大量数据频繁进出表的堆而言，并没有显著的必要去监控页面重用问题，因此可以认为该误区不准确。对于有大量数据被移除且无意替换数据的堆，你可以使用
    `ALTER TABLE ... REBUILD` 来回收空间。该语句的语法和影响将在下一章讨论。


    ### 误区 9：每个表都应该使用堆/聚集索引


    最后一个需要考虑的误区是双重的。一方面，有些人会建议你应该使用堆来构建所有表。另一方面，另一些人会建议你在所有表上创建聚集索引。问题在于，这种观点会排除考虑每种结构能为表带来的好处。这种观点是基于对数据库中存储数据方式的一种近乎教条式的争论，支持或反对某一种方式，却没有考虑实际存储的数据及其使用方式。


    一些反对使用聚集索引的论点如下：


    *   碎片化会通过额外的 I/O 操作对性能产生负面影响。

    *   当触发页拆分时，修改单条记录可能会影响聚集索引中的多条记录。

    *   过多的键查找会通过额外的 I/O 操作对性能产生负面影响。


    当然，也有一些反对使用堆的论点：


    *   过多的转发记录会通过额外的 I/O 操作对性能产生负面影响。

    *   移除转发记录需要重建整个表。

    *   需要非聚集索引来实现高效的筛选数据访问。

    *   堆在数据被移除时不会自动释放页面。


    在决定使用聚集索引还是堆时，与两者相关的负面影响并非唯一需要考虑的因素。每种结构都有其优于对方的情况。


    例如，聚集索引在以下情况下表现最佳：


    *   表的键是唯一的、单调递增的键值。

    *   表具有一个唯一性程度高的键列。

    *   将通过查询访问表中的数据范围。

    *   表中的记录将以高速率插入和删除。


    另一方面，堆在以下一些情况下是理想选择：


    *   表中的数据仅会使用有限的时间，其中索引创建时间超过数据的查询时间。

    *   键值会频繁更改，这反过来会改变记录在索引中的位置。

    *   你正在向一个暂存表中插入大量记录。

    *   主键是非升序值，例如唯一标识符。


    虽然本节没有包含演示为何此误区是错误的，但重要的是要记住，堆和聚集索引都是可用的，并且应该被适当地使用。了解选择哪种索引类型是一个测试的问题，而不是教条的问题。


    对于那些属于“为所有表都创建聚集索引阵营”的人，一个很好的参考资料是《Fast Track 数据仓库架构》白皮书（[`https://msdn.microsoft.com/en-us/library/hh918452.aspx`](https://msdn.microsoft.com/en-us/library/hh918452.aspx)）。该白皮书阐述了使用堆可以实现的一些显著性能改进，同时也指出了这些改进效果消失的临界点。它有助于展示
    I/O 系统技术（如闪存和基于缓存的设备）的变化如何改变关于堆和聚集索引的模式和实践。这有助于提倡一种观点：应不时地验证那些误区和最佳实践。


    ## 索引最佳实践


    与误区类似的是索引最佳实践。最佳实践应被视为一种默认建议，可以在没有足够信息来验证其他方向时应用。最佳实践并非唯一的选择，而只是在使用任何技术时的一个起点。


    当使用他人提供的最佳实践时，例如本章中出现的那些，首先自己进行验证是很重要的。始终对它们持保留态度。你可以相信最佳实践会将你引向正确的方向，但你需要验证遵循该实践是否合适。


    鉴于前面的注意事项，在使用索引时可以考虑许多最佳实践。本节将回顾这些最佳实践，并讨论它们是什么以及它们的含义。

    '
- fmt: '### Index to Your Current Workload


    The most important aspect of indexing your databases is to index to how you are
    using your databases today, not based on yesterday, not based on the data you
    expect years in the future, but today.


    The indexing that you build for today will likely not be the indexing that will
    be needed in databases in the future. For this reason, the first best practice
    is to continuously review, analyze, and implement changes to the indexes in your
    environment. Realize that regardless of how similar two databases are, if the
    data in the databases and users are not the same, then the indexing for the two
    databases will likely need to be different. A detailed conversation on monitoring
    and analyzing indexes is in Chapters [13](#338675_3_En_13_Chapter.xhtml) and [14](#338675_3_En_14_Chapter.xhtml).


    With this bit out of the way, let’s look at some other best practices for indexing.


    ### Use Clustered Indexes on Primary Keys by Default


    The next best practice is to use `clustered indexes` on `primary keys` by default.
    This may seem to run contrary to the nineth myth presented in this chapter. Myth
    9 discussed whether to choose `clustered indexes` or `heaps` as a matter of doctrine.
    Whether the database was built with one or the other, the myth would have you
    believe that if your table design doesn’t match the myth, it should be changed
    regardless of the situation. This best practice recommends using `clustered indexes`
    on `primary keys` as a starting point.


    By clustering the `primary key` of a table by default, there is an increased likelihood
    that the indexing choice will be appropriate for the table. As stated earlier
    in this chapter, `clustered indexes` control how the data in a table is stored.
    Many `primary keys`, possibly most, are built on a column that utilizes the `identity
    property` that increments as each new record is added to the table. Choosing a
    `clustered index` for the `primary key` will provide the most efficient method
    to access the data.


    ### Specify Fill Factors


    `Fill factor` controls the amount of free space left on the data pages of an index
    after an index is built or defragmented. This free space is made available to
    allow for records on the page to expand with the risk that the change in record
    size may result in a `page split`. This is an extremely useful property of indexes
    to use for index maintenance. Modifying the `fill factor` can mitigate the risk
    of fragmentation. A more thorough discussion of `fill factor` is presented in
    Chapter [6](#338675_3_En_6_Chapter.xhtml). For the purposes of best practices,
    you are concerned with the ability to set the `fill factor` at the database and
    index levels.


    #### Database-Level Fill Factor


    As already mentioned, one of the properties of SQL Server is the option to set
    a default `fill factor` for indexes. This setting is a SQL Server–wide setting
    and can be altered in the properties of SQL Server on the Database Properties
    page. By default, this value is set to zero, which equates to 100. Do not modify
    the default `fill factor` to anything other than 0, or 100, which has the same
    impact. Doing so will change the `fill factor` for every index in the database
    to the new value; this will add the specified amount of free space to all indexes
    the next time indexes are created, rebuilt, or reorganized.


    On the surface, this may seem like a good idea, but this will blindly increase
    the size of all indexes by the specified amount. The increased size of the indexes
    will require more `I/O` to perform the same work as before the change. For many
    indexes, making this change would result in a needless waste of resources.


    #### Index-Level Fill Factor


    At the index level, you should modify the `fill factor` for indexes that are frequently
    becoming heavily fragmented. Decreasing the `fill factor` will increase the amount
    of free space in the index and provide additional space to compensate for the
    changes in record length leading to fragmentation. Managing `fill factor` at the
    index level is appropriate since it provides the ability to tune the index precisely
    to the needs of the database.


    ### Index Foreign Key Columns


    When a `foreign key` is created on a table, the `foreign key` column in the table
    should be indexed. This is necessary to assist the `foreign key` in determining
    which records in the parent table are constrained to each record in the referenced
    table. This is important when changes are being made against the referenced table.
    The changes in the referenced table may need to check all the rows that match
    the record in the parent table. If an index does not exist, then a scan of the
    column will occur. On a large parent table, this could result in a significant
    amount of `I/O` and potentially some `concurrency issues`.


    An example of this issue would be `state` and `address` tables. There would likely
    be thousands or millions of records in the `address` table and maybe a hundred
    records in the `state` table. The `address` table would include a column that
    is referenced by the `state` table. Consider whether one of the records in the
    `state` table needed to be deleted. If there wasn’t an index on the `foreign key`
    column in the `address` table, then how would the `address` table identify the
    rows that would be affected by deleting the `state` record? Without an index,
    SQL Server would have to check every record in the `address` table. If the column
    is indexed, SQL Server would be able to perform a `range scan` across the records
    that match to the value being deleted from the `state` table.


    By indexing your `foreign key` columns, performance issues, such as the one described
    in this section, can be avoided. The best practice with `foreign keys` is to index
    their columns. Chapter [11](#338675_3_En_11_Chapter.xhtml) includes more details
    on this best practice and a code example.


    ### Balance Index Count


    As previously discussed in this book, indexes are extremely useful for improving
    the performance when accessing information in a record. Unfortunately, indexes
    are not without costs. The costs to having indexes go beyond just space within
    your database. When you build an index, you need to consider some of the following:


    *   How frequently will records be inserted or deleted?

    *   How frequently will the key columns be updated?

    *   How often will the index be used?

    *   What processes does the index support?

    *   How many other indexes are on the table?


    These are just some of the first considerations that need to be accounted for
    when building indexes. After the index is built, how much time will be spent updating
    and maintaining the index? Will you modify the index more frequently than the
    index is used to return results for queries? How many columns are in the table,
    and are there more indexes than columns?


    The trouble with balancing the index count on a table is that there is no precise
    number that can be recommended. Deciding on the number of indexes that it makes
    sense to have on a table is a per-table decision. You don’t want too few, which
    may result in excessive scans of the `clustered index` or `heap` to return results.
    Also, the table shouldn’t have too many indexes, where more time is being spent
    keeping the index current than returning results. My rule of thumb on transactional
    systems is that if a table has more than ten indexes on it, it is increasingly
    likely that there are too many indexes on the table.'
