    quite a bit simpler. Instead of numerous operators, the plan was simplified to
    three operators.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig60_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig60_HTML.jpg)


    Figure 11-60


    Execution plan for Indexed View pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig59_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig59_HTML.jpg)


    Figure 11-59


    Statistics I/O results for Indexed View pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    Listing 11-46

    Indexed View

    ```'
  trans: '## 索引视图


    在许多情况下，数据库中数据的存储方式并不能完全代表用户需要从数据库中检索的信息。为了解决这个问题，您可以构建查询，将用户所需的数据提取到结果集中，以便他们更轻松地使用。在执行这些活动的过程中，您可以对数据进行聚合，以提供用户所需详细程度的结果。


    例如，用户可能希望查看数据库中所有订单中某个产品的总销售额，但不包括明细项目的信息。在大多数情况下，检索此信息并不是问题。然而，在某些情况下，动态执行该聚合可能会在数据库中造成瓶颈。虽然索引有助于简化聚合，但它们有时无法提供所需的性能提升以达到要求的性能。


    解决此问题的一个可能方案是在数据库中的视图上创建索引。可以创建视图来提供所需的摘要和聚合，并且可以使用索引将视图中的信息物化为聚合形式。为视图创建索引时，查询的结果会以与存储任何表大致相同的方式存储在数据库中。通过预先存储此信息，使用视图中聚合的查询可以获得改进的响应时间。


    在了解如何实现视图之前，让我们先看看前面概述的检索产品摘要信息的问题。在这种情况下，假设需要在产品子类别级别获取所有产品的摘要信息。为此提供的查询（如清单
    11-44 所示）需要提供 `LineTotal` 和 `OrderQty` 值的总和聚合，然后是 `UnitPrice` 的平均值。虽然该查询的读取次数并非特别高（参见图
    11-57），但假设在此数据库中，该次数被认为对于发布到生产的查询来说太高了。检查执行计划（如图 11-58 所示），您会发现虽然它并非过于复杂，但该计划包含多个步骤，因此不被认为是一个简单的计划。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig58_HTML.jpg](img/338675_3_En_11_Fig58_HTML.jpg)

    **图 11-58** 昂贵聚合的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig57_HTML.jpg](img/338675_3_En_11_Fig57_HTML.jpg)

    **图 11-57** 昂贵聚合的 Statistics I/O 结果


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.ProductSubcategorySummary'') IS NOT NULL

    DROP VIEW dbo.ProductSubcategorySummary;

    SET STATISTICS IO ON;

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    ```

    **清单 11-44** 昂贵的聚合查询


    如前所述，此性能问题的解决方案可以通过为清单 11-43 中的查询创建视图并向该视图添加索引来找到。为视图添加索引时需要考虑许多事情。一些更重要的注意事项如下：


    *   视图中的所有列必须是确定性的。

    *   必须使用 `SCHEMA_BINDING` 视图选项创建视图。

    *   聚集索引必须创建为唯一的。

    *   视图中引用的表必须使用双部分命名。

    *   如果要聚合值，则必须包含 `COUNT_BIG()` 函数。

    *   某些聚合（例如 `AVG()`）在索引视图中是不允许的。


    创建索引视图时的额外注意事项包含在联机文档（Books Online）主题“创建索引视图”（[`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?)）中。


    创建索引视图的第一步是创建基础视图。考虑到列出的注意事项，清单 11-44 中的查询不能直接转换为视图。必须更改查询以移除 `AVG` 函数并包含 `COUNT_BIG`
    函数。虽然此更改从输出中移除了一个所需的数据元素，但在为视图创建索引后，您将能够计算该值。此外，视图定义必须包含 `WITH SCHEMABINDING`
    选项。最终结果是清单 11-45 中的视图定义。最后一步是使用 `Production.ProductSubcategory` 表中的 `Name` 列在该表上创建唯一的聚集索引。


    ```

    USE AdventureWorks2017

    GO

    CREATE VIEW dbo.ProductSubcategorySummary

    WITH SCHEMABINDING

    AS

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,SUM(sod.UnitPrice) AS TotalUnitPrice

    ,COUNT_BIG(*) AS Occurrences

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name;

    GO

    CREATE UNIQUE CLUSTERED INDEX CLIX_ProductSubcategorySummary

    ON dbo.ProductSubcategorySummary(Name)

    ```

    **清单 11-45** 索引视图


    索引视图就位后，下一步是测试该视图与原始查询相比的性能如何。在执行清单 11-46 中的代码之前，首先查看第二个查询，该查询使用 `TotalUnitPrice`
    和 `Occurrences` 列来生成 `AvgUnitPrice`。虽然您不能在索引视图的定义中包含 `AVG` 函数，但只需付出最少的努力就可以得到相同的结果。


    执行清单 11-46 中的查询后，您会注意到它们的性能比清单 11-44 中的示例要好得多。不再需要超过 1,200 次读取，现在只需要 2 次读取（参见图
    11-59），并且执行计划（图 11-60）也简单得多。该计划从众多运算符简化为仅三个运算符。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig60_HTML.jpg](img/338675_3_En_11_Fig60_HTML.jpg)

    **图 11-60** 索引视图模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig59_HTML.jpg](img/338675_3_En_11_Fig59_HTML.jpg)

    **图 11-59** 索引视图模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    ```

    **清单 11-46** 索引视图'
- fmt: 'Another peculiar thing occurred in the execution that you may notice. Both
    the query against the base tables and the query against the view performed identically
    after implementing the indexed view. This is one of the added benefits of indexed
    views. When SQL Server is determining the execution plan for the first query,
    it is able to deduce that there is an indexed view that can cover the same logic
    as the query, even though the calculation for the average column is not the same.


    Indexed views are an extremely useful tool when multiple tables need to be joined
    together in a single unit to reduce the I/O required to join the data at runtime.
    While there are a number of restrictions associated with indexed views, there
    are numerous benefits, including the ability to use indexed views in situations
    like the one in Listing 11-46. When you have views and queries with the same shape
    that are used frequently, consider whether an inclusion of the view can provide
    the benefit that indexes on the base tables do not provide.


    ### Summary


    This chapter focused on how and when to apply indexes to tables in a number of
    situations. Each example demonstrated how to apply a particular index pattern
    to the situation to improve the performance with indexing. The chapter covered
    the limited, yet valid, instances for using heaps. It then went on to identify
    the various options and manners for building clustered indexes. With nonclustered
    indexes, the example demonstrated the options for adding to your clustered indexes
    in order to add performance on columns outside of the clustering key. The chapter
    also included an example of implementing columnstore indexes and discussed when
    to apply this type of index. Overall, these patterns provide the groundwork for
    identifying the types of indexes that are required on tables in databases, and
    they provide the basis for being able to compare and contrast one index to another.


    # 12. Query Strategies


    In the previous chapter, we looked at strategies to identify potential indexes
    for your databases. That, though, is often only half the story. Once the indexes
    have been created, you would expect performance within the database to improve,
    leading you then to the next bottleneck. Unfortunately, coding practices and selectivity
    can sometimes negatively influence the application of indexes to queries. And
    sometimes how the database and tables are being accessed will prevent the use
    of some of the most beneficial indexes in your databases.


    This chapter covers a number of querying strategies where indexes may not be used
    as you may have expected. These scenarios are:


    *   `LIKE` comparison

    *   Concatenation

    *   Computed columns

    *   Scalar functions

    *   Data conversions


    In each scenario, we’ll look at the circumstances around them and why they don''t
    work as expected. Then we’ll see some ways to mitigate the issues and some tips
    on how to use the right index in the right place. By the end of the chapter, we’ll
    be more prepared to recognize situations that will hamper your ability to index
    the database for performance, and we’ll have the tools to begin mitigating these
    risks.


    ## LIKE Comparison


    When looking at the impact of queries on the use of indexes, the first place to
    start is with the `LIKE` comparison. The `LIKE` comparison allows searches in
    columns on any single character or pattern. If you need to find all the values
    in a table that start with the letters `AAA` or `BBB`, the `LIKE` comparison provides
    this functionality. In these searches, the query can read through the index and
    find the values that match to the characters or pattern, since the index is sorted.
    Problems can arise when using this comparison in queries to find values that contain
    or end with a character or pattern.


    In this situation, the sort of the index becomes immaterial because statistics
    are collected only on the left edge of character values. The likelihood that the
    letter `B` appears in the first value in the index is equal to it appearing in
    the last value in the index. To determine which records in the table have a `B`
    in the column, all rows must be checked. There are no statistics available to
    identify the likelihood or location occurrences. Without reliable statistics to
    use, SQL Server will not know what index to use to satisfy a query and may end
    up using a poor execution plan.


    To understand the problems that can occur with the `LIKE` comparison, we’ll walk
    through a few demonstrations that show both scenarios and their related statistics.
    Let’s start with querying the `Person.Address` table for records where `AddressLine1`
    starts with 710 (see Listing 12-1). A review of the `STATISTICS IO` output in
    Figure 12-1 shows the query required three logical reads. Examining the execution
    plan in Figure 12-2 shows an index seek on the nonclustered index, which results
    in three logical reads.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig2_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig2_HTML.jpg)

    **Figure 12-2**

    Execution plan for addresses beginning with 710


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig1_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig1_HTML.jpg)

    **Figure 12-1**

    STATISTICS IO for addresses beginning with 710


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''710%'';

    ```

    *Listing 12-1*

    Query for Addresses Beginning with 710


    In this situation, the `LIKE` comparison worked well and the execution plan, statistics,
    and I/O were all appropriate for the request. Unfortunately, as mentioned, this
    isn’t the only manner in which `LIKE` comparisons can be used. The comparison
    can be used to find values within a column. Consider a scenario where you need
    to find all the addresses that match a specific street name of a road, such as
    Longbrook (see Listing 12-2). With this query, the execution plan uses a scan
    on the nonclustered index and requires 216 logical reads, as shown in Figure 12-3.
    Figure 12-4 shows the execution plan.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig4_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig4_HTML.jpg)

    **Figure 12-4**

    Execution plan for addresses containing “Longbrook”


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig3_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig3_HTML.jpg)

    **Figure 12-3**

    STATISTICS IO for addresses containing “Longbrook”


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''%Longbrook%'';

    ```

    *Listing 12-2*

    Query for Addresses Containing “Longbrook”'
