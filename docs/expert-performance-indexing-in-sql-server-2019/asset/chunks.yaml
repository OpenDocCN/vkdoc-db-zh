- fmt: '### Note


    There are many negative opinions regarding the value of the Database Engine Tuning
    Advisor. In my opinion, this is a tool that fills a role and provided a sufficient
    workload is used with the tool, it will return worthwhile recommendations. These
    recommendations provide a better starting point for tuning a database than starting
    with nothing.


    ## Database Engine Tuning Advisor


    The other indexing tool available in SQL Server is the Database Engine Tuning
    Advisor. This tool allows SQL Server to analyze a workload from a file, a table,
    the plan cache, or Query Store. The output of the `DTA` can assist in providing
    recommendations for indexing and configuring partitions for the workload. The
    chief benefit of using the tool is that it doesn’t require a deep understanding
    of the underlying databases to make the recommendations.


    Whether working with a single query or a full day’s workload, `DTA` provides index
    recommendations for the following types of objects:


    - Rowstore and columnstore tables for both clustered and nonclustered indexes

    - Aligned or nonaligned partitions

    - Views could support indexing


    With the sessions in `DTA`, you’re able to really focus the recommendations on
    what you expect from your environment. You are able to leverage workload based
    on your environment, whether transactional or analytical and set the focus on
    both reads and writes so that you get index recommendations that align to your
    needs. You even have the ability to modify the environment to look for indexing
    recommendations for changes in disk space.


    Once the analysis is completed, `DTA` provides a number of reports and outputs.
    This information allows you to review the recommendations and develop an understanding
    for how it will impact the database.


    Although the `DTA` has quite a few capabilities, there are also a number of limitations
    on the tools. The following are some of these limitations:


    - Not able to recommend indexes on system tables.

    - Cannot add or drop unique indexes or indexes that enforce primary key or unique
    constraints.

    - May provide variations in recommendations on some workloads. The `DTA` samples
    data while it executes, which will influence the recommendations.

    - Unable to tune trace tables on remote servers.

    - Constraints placed on tuning workloads can have a negative impact on suggestions
    if the tuning session exceeds the constraints.


    ### Note


    The `DTA` often suffers a bad rap as an indexing tool. This is mostly because
    of abuse and misuse by others who have used it. When using the tool, be sure to
    validate any change that is recommended and test any changes thoroughly before
    applying them in a production environment.


    ### Explaining the DTA


    There are two ways in which users can interact with the `DTA`. These are the graphical
    user interface (`GUI`) and the command-line utility. Both of these methods offer
    most of the same capabilities. Depending on your comfort level, you can choose
    either.


    The `GUI` tool, which we will use throughout most of this chapter, provides a
    wrapper for the `DTA`. It allows you to select from the available options, and
    it enables you to view the tuning sessions that were previously executed. If you
    want to view tuning results, the `GUI` is well-suited to the task. Tuning sessions
    can be configured and executed through the `GUI`.


    The command-line utility provides the same capabilities as the `GUI` when it comes
    to configuring and executing sessions. The command-line utility can be configured
    through either switches or an XML configuration file. Both of these options allow
    database administrators (`DBAs`) and developers to build processes to automate
    tuning activities for reviewing and analyzing workloads and to build an index
    tuning process that allows the `DBA` to work with results instead of going through
    the motions of setting up and configuring the tuning sessions. You will learn
    more about integrating the `DTA` utility into a performance tuning methodology
    in Chapter [15](#338675_3_En_15_Chapter.xhtml).


    With both tools, two general areas of configuration need to occur. The first determines
    how the tuning session will interact and makes suggestions with the physical design
    structures (`PDSs`). The second determines which type of partitioning strategy
    the `DTA` should employ when trying to tune the database.


    There are two parts to the options on how physical design structure suggestions
    will be generated. The first option you configure is which type of `PDS` to utilize
    in the tuning. The physical design structure can be augmented to include considering
    filtered and columnstore indexes. The options for physical design structure use
    are as follows:


    - Indexes and indexed views.

    - Indexes (default option).

    - Evaluate utilization of existing `PDSs` only.

    - Indexed views.

    - Nonclustered indexes.


    The next `PDS` option is the partitioning to consider in the index tuning. `DTA`
    offers to use no partitioning, aligned partitioning, or full partitioning. With
    full partitioning, recommendations will consider whether a table should include
    indexes that are partitioned and nonpartitioned.


    The last `PDS` option determines which objects to keep within the database. This
    option can help ensure that the tuning recommendations do not adversely affect
    tuning that was previously tested and deployed. The following are the options
    for `PDS` items to retain in the database:


    - Do not keep any existing `PDSs`.

    - Keep all existing `PDSs` (default option).

    - Keep aligned partitioning.

    - Keep indexes only.

    - Keep clustered indexes only.


    Outside these options, there are some few other options that can be configured.
    These options configure how long the tuning session will run which can be important
    if you need to run through a lot of databases, or with a large workload, you want
    to prevent it from running too long. Additionally, you can define the max disk
    space for the recommendations and max columns for each index. The last setup option
    indicates whether index recommendations can or must be able to be deployed online.


    ### Note


    Before following along in the next section, run the code in Listing [10-1](#338675_3_En_10_Chapter.xhtml#PC1).
    If the index in Listing [10-3](#338675_3_En_10_Chapter.xhtml#PC3) has been created,
    drop the index using the `DROP INDEX` statement provided in Listing [10-4](#338675_3_En_10_Chapter.xhtml#PC4).


    ```

    DROP INDEX IF EXISTS Sales.SalesOrderHeader.missing_index_SalesOrderHeader;

    Listing 10-4

    DDL Statement to Drop Index missing_index_SalesOrderHeader

    ```'
