  trans: '### sys.spatial_indexes


    `sys.spatial_indexes` 目录视图也与 `sys.indexes` 类似。该目录视图为数据库中的每个空间索引返回一行。该目录视图的主要区别在于它提供了关于空间索引的附加信息。此视图包含有关空间索引是几何索引还是地理索引的信息。


    ### sys.spatial_index_tessellations


    `sys.spatial_index_tessellations` 目录视图是对 `sys.spatial_indexes` 目录视图的补充。该目录视图详细说明了与空间索引关联的边框和网格。


    ### sys.column_store_dictionaries


    `sys.column_store_dictionaries` 目录视图支持列存储索引。该目录视图为列存储索引中的每一列返回一行。数据描述了为该列构建的字典的结构和类型。


    ### sys.column_store_segments


    `sys.column_store_segments` 目录视图通过为列存储索引中的每一列至少返回一行来支持列存储索引。列可以有多个段，每个段大约包含一百万行。目录视图中的行描述了该段的基本信息（例如，该段是否包含空值以及该段的最小和最大数据
    ID 是什么）。


    ### sys.column_store_row_groups


    `sys.column_store_row_groups` 目录视图通过返回每个段的行组详细信息来支持列存储段的维护。该目录视图返回有关行组中行数的信息，以及行组的当前状态及其在数据库中的物理位置。


    ### sys.hash_indexes


    `sys.hash_indexes` 目录视图与 `sys.indexes` 类似，但包含一个专门针对内存优化表上哈希索引的附加列。该附加列是 `bucket_count`，用于存储为索引创建的存储桶数量。在哈希索引的上下文中，`buckets`
    指的是为存储索引中的值而创建的位置数量。存储桶与索引值之间的关系详见第 2 章和第 7 章。


    ### sys.fulltext_catalogs


    `sys.fulltext_catalogs` 目录视图为数据库中的每个全文目录包含一行。


    ### sys.fulltext_indexes


    `sys.fulltext_indexes` 目录视图为数据库中的每个全文索引包含一行。该视图描述了索引所属的全文目录，并提供了有关索引状态及其更新方式的详细信息。


    ### sys.fulltext_index_columns


    `sys.fulltext_index_columns` 目录视图支持 `sys.fulltext_indexes`。它为与全文索引关联的每一列包含一行。


    ## 本章小结


    本章介绍了许多与索引相关的基础知识。您了解了 SQL Server 中可用的索引类型。从堆、非聚集索引到空间索引，您了解了索引的类型，并将其与现实世界中索引的类比——杜威十进制分类法联系起来。这个例子有助于说明每种索引类型如何相互作用，以及在何种场景下一种类型比另一种能提供价值。


    接下来，您了解了索引的数据定义语言。索引可以通过 DDL 创建、修改和删除。DDL 有许多选项可用于精细调整索引的结构，以帮助提高其在数据库中的实用性。


    本章还包括了关于 SQL Server 中索引的元数据（或目录视图）的信息。每个目录视图都提供了有关索引结构和组成的信息。这些信息可以帮助研究和了解可用的视图。


    本章的细节为后续章节将要讨论的内容提供了框架。通过利用这些信息，您将能够更深入地研究您的索引，并开始应用适当的策略来索引您的数据库。


    脚注 1


    # 2. 索引存储基础


    前一章讨论了索引的逻辑设计和语法，本章将重点讨论索引的物理实现。了解索引在实现和存储级别的布局和相互作用方式，将帮助您更好地认识索引提供的优势以及它们为何以特定方式表现。


    为了达到这种理解，本章将从数据存储的一些基础知识开始。首先，您将了解数据页及其布局。此次检查将详细说明数据页的组成及其内部包含的内容。同时，您将检查可用于检查索引中页面的动态管理函数和
    `DBCC` 命令。


    然后，您将了解 SQL Server 中为存储组织页面的三种方式。这些存储方法与堆、聚集索引、非聚集索引和列存储索引相关。对于每种结构类型，您将检查页面在索引中是如何组织的。您还将检查与每种索引类型相关的要求和限制。


    完成本章后，您将对索引存储的基础知识有更深入的理解。利用这些信息，您将能够更好地处理、理解并预判数据库中索引的行为。


    ## 存储基础


    SQL Server 使用多种结构在数据库内存储和组织数据。在本章和本书的上下文中，您将了解与表和索引直接相关的存储结构。您将首先关注页面和区，以及它们之间的相互关系。然后，您将了解
    SQL Server 中可用的不同类型的页面，并将它们与索引联系起来。'
- fmt: '### Pages


    最基本的存储区域是页面。SQL Server 使用页面来存储数据库中的所有内容。从表中的行到最低级别用于映射索引的结构，一切都存储在页面上。


    当为数据库数据文件分配空间时，所有空间都被划分为页面。在分配期间，每个页面被创建为使用 8 KB（8,192 字节）的空间，页面编号从 0 开始，每分配一个页面递增
    1。当 SQL Server 与数据库文件交互时，可以执行输入/输出（I/O）操作的最小单位是页面级别。


    一个页面有三个主要组件：页面头、记录和偏移数组，如图 `2-1` 所示。所有页面都以页面头开始。页面头大小为 96 字节，包含有关页面的元信息，例如页面编号、所属对象和页面类型。如果行将存储在页面上（例如数据和索引页面），页面的末尾将包含一个偏移数组。偏移数组大小为
    36 字节，提供指向页面上行起始字节位置的指针。在这两个区域之间是 8,060 字节的空间，用于存储记录和其他页面数据。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig1_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig1_HTML.jpg)


    图 2-1：页面结构


    如果页面包含偏移数组，则它从页面末尾开始。随着行被添加到页面，该行被添加到页面记录区域的第一个空闲位置。之后，该页面的起始位置存储在偏移数组的最后一个可用位置中。对于添加的每一行，行的数据存储在离页面开头更远的位置，而偏移量存储在离页面末尾更远的位置，如图
    `2-2` 所示。从页面末尾向后读取，偏移量可用于识别页面上每一行（有时称为`槽`）的起始位置。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig2_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig2_HTML.jpg)


    图 2-2：行放置和偏移数组


    虽然页面的基本原理相同，但页面有多种使用方式。这些用途包括存储数据页、索引结构和大对象。这些用途以及它们如何与 SQL Server 数据库交互将在本章后面讨论。


    ### Extents


    在页面之上，数据库的下一个基本结构是`区`。这些是八个页面的组。一个区就是在数据文件中物理上连续的八个数据页。所有页面都属于一个区，并且一个区不能少于或多于八个页面。SQL
    Server 数据库使用的区有两种类型：`混合区`和`统一区`。


    在混合区中，页面可以分配给多个对象。例如，当一个表首次创建并且分配给该表的页面少于八个时，它将构建为一个混合区。只要表的总大小小于八个页面，该表就会使用混合区，如图
    `2-3` 所示。通过使用混合区，数据库可以减少分配给小型表的空间量。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig3_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig3_HTML.jpg)


    图 2-3：混合区


    一旦表中的页面数量超过八个，它将开始使用统一区。在统一区中，该区中的所有页面都分配给数据库中的单个对象（参见图 `2-4`）。因此，对象的页面将是连续的，这增加了可以在一次读取中读取的对象页面数量。关于连续读取的好处的更多信息，请参见第
    `6` 章。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig4_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig4_HTML.jpg)


    图 2-4：统一区


    自 SQL Server 2016 以来，所有数据库的所有区分配都默认使用统一区。可以使用`MIXED_PAGE_ALLOCATION`数据库选项修改此行为，该选项将默认分配使用混合区。在
    SQL Server 2014 及更早版本中，行为相反，默认分配混合区。并且可以在这些版本中使用跟踪标志 `1118` 修改此行为，该标志会将 SQL Server
    修改为使用统一区，这与当前的默认行为相同。虽然这可能有点令人困惑，但重要的是要记住 SQL Server 默认使用统一区，这缓解了大量的页面分配争用问题。


    ### Page Types


    在数据库中，页面有多种使用方式。对于每一种用途，都有一个与页面关联的类型，用于定义页面的使用方式。SQL Server 数据库中可用的页面类型有：


    *   文件头页

    *   引导页

    *   页面可用空间（PFS）页

    *   全局分配映射（GAM）页

    *   共享全局分配映射（SGAM）页

    *   差异更改映射（DIFF）页

    *   最小日志（ML）页

    *   索引分配映射（IAM）页

    *   数据页

    *   索引页

    *   大对象（文本和图像）页


    接下来的几节将扩展页面类型并解释它们的使用方式。虽然并非所有页面类型都直接涉及索引，但将定义和解释每一种类型，以帮助提供整体图景。对于每个数据库，页面布局都有相似之处。例如，在每个数据库的第一个文件中，页面布局如图
    `2-5` 所示。可用的页面类型比图中显示的要多，但正如对每种页面类型的考察将显示的，只有最初几个页面中的类型是固定的。许多其他类型以由数据库中的数据决定的模式出现。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig5_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig5_HTML.jpg)


    图 2-5：数据文件页面


    ### Note


    数据库日志文件不使用页面架构。页面结构仅适用于数据库数据文件。日志文件架构的讨论超出了本书的范围。


    ### File Header Page


    任何数据库数据文件中的第一页是文件头页，如图 `2-5` 所示。由于这是第一页，其编号始终为 `0`。文件头页包含有关数据库文件的元数据信息。此页上的信息包括：


    *   文件 ID

    *   文件组 ID

    *   文件的当前大小

    *   最大文件大小

    *   扇区大小

    *   LSN 信息


    文件头页上还有许多关于文件的其他细节，但基本上这些信息对于索引内部结构无关紧要。


    ### Boot Page


    引导页类似于文件头页，因为它提供元数据信息。不过，此页提供的是数据库本身的元数据信息，而不是数据文件的。每个数据库有一个引导页，它位于数据库的第一个数据文件的第
    `9` 页（参见图 `2-5`）。引导页上的一些信息包括数据库的当前版本、数据库的创建日期和版本、数据库名称、数据库 ID 和兼容性级别。


    引导页上的一个重要属性是 `dbi_dbccLastKnownGood` 属性。此属性提供了上次已知成功完成的 `DBCC CHECKDB` 的日期。虽然数据库维护不在本书的范围内，但定期对数据库进行一致性检查对于验证数据是否保持可用至关重要。'
  raw: '### Pages


    The most basic storage area is a page. Pages are used by SQL Server to store everything
    in the database. Everything from the rows in tables to the structures used to
    map out indexes at the lowest levels is stored on a page.


    When space is allocated to database data files, all the space is divided into
    pages. During allocation, each page is created to use 8 KB (8,192 bytes) of space,
    and pages are numbered starting at 0, incrementing 1 for every page allocated.
    When SQL Server interacts with the database files, the smallest unit in which
    an input/output (I/O) operation can occur is at the page level.


    There are three primary components to a page: the page header, records, and the
    offset array, as shown in Figure [2-1](#338675_3_En_2_Chapter.xhtml#Fig1). All
    pages begin with the page header. The header is 96 bytes and contains meta-information
    about the page, such as the page number, the owning object, and the type of page.
    If rows will be stored on the pages, such as with data and index pages, the end
    of the page will contain an offset array. The offset array is 36 bytes and provides
    pointers to the byte location of the start of rows on the page. Between these
    two areas are 8,060 bytes where records and other page data are stored.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig1_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Page structure


    If the page includes an offset array, it begins at the end of the page. As rows
    are added to a page, the row is added to the first open position in the records
    area of the page. After this, the starting location of the page is stored in the
    last available position in the offset array. For every row added, the data for
    the row is stored further away from the start of the page, and the offset is stored
    further away from the end of the page, as shown in Figure [2-2](#338675_3_En_2_Chapter.xhtml#Fig2).
    Reading from the end of the page backward, the offset can be used to identify
    the starting position of every row, sometimes referred to as a *slot*, on the
    page.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig2_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Row placement and offset array


    While the basics of pages are the same, there are a number of ways in which pages
    are used. These uses include storing data pages, index structures, and large objects.
    These uses and how they interact with a SQL Server database will be discussed
    later in this chapter.


    ### Extents


    Moving up from pages, the next basic structure of the database are *extents*.
    These are groups of eight pages. An extent is simply eight physically contiguous
    data pages in a data file. All pages belong to an extent, and extents can’t have
    fewer or more than eight pages. There are two types of extents used by SQL Server
    databases: *mixed* and *uniform* extents.


    In mixed extents, the pages can be allocated to multiple objects. For example,
    when a table is first created and there are fewer than eight pages allocated to
    the table, it will be built as a mixed extent. The table will use mixed extents
    as long as the total size of the table is less than eight pages, as shown in Figure
    [2-3](#338675_3_En_2_Chapter.xhtml#Fig3). By using mixed extents, databases can
    reduce the amount of space allocated to small tables.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig3_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Mixed extent


    Once the number of pages in a table exceeds eight pages, it will begin using uniform
    extents. In a uniform extent, all pages in the extent are allocated to a single
    object in the database (see Figure [2-4](#338675_3_En_2_Chapter.xhtml#Fig4)).
    Because of this, pages for an object will be contiguous, which increases the number
    of pages of an object that can be read in a single read. For more information
    on the benefits of contiguous reads, see Chapter [6](#338675_3_En_6_Chapter.xhtml).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig4_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Uniform extent


    Since SQL Server 2016, the use of uniform extents has become default behavior
    for all extent allocations for all databases. The behavior can be modified using
    the MIXED_PAGE_ALLOCATION database option, which will default the allocations
    to use mixed extents. With SQL Server 2014 and earlier versions, the behavior
    was opposite and defaulted to allocating mixed extents. And this behavior could
    be modified in those versions using trace flag 1118, which would modify SQL Server
    to using uniform extents, as is the current default behavior. While this may be
    a bit confusing, the important thing to remember is that SQL Server defaults to
    using uniform extents which mitigates a significant amount of page allocation
    contention issues.


    ## Page Types


    There are many ways in which a page can be used in a database. For each of these
    uses, there is a type associated with the page that defines how the page is being
    used. The page types available in a SQL Server database are


    *   File header page


    *   Boot page


    *   Page Free Space (PFS) page


    *   Global Allocation Map (GAM) page


    *   Shared Global Allocation Map (SGAM) page


    *   Differential Changed Map (DIFF) page


    *   Minimally Logged (ML) page


    *   Index Allocation Map (IAM) page


    *   Data page


    *   Index page


    *   Large object (Text and Image) page


    The next few sections will expand on the types of pages and explain how they are
    used. While not all of page types deal directly with indexing, each will be defined
    and explained to help provide an understanding of the total picture. With every
    database, there are similarities in which the pages are laid out. For instance,
    in the first file of every database, the pages are laid out as shown in Figure
    [2-5](#338675_3_En_2_Chapter.xhtml#Fig5). There are more page types available
    than the figure indicates, but as the examinations of each page type will show,
    only those in the first few pages are fixed. Many of the others appear in patterns
    that are dictated by the data in the database.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig5_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Data file pages


    ### Note


    Database log files don’t use the page architecture. Page structures apply only
    to database data files. A discussion of log file architecture is outside the scope
    of this book.


    ### File Header Page


    The first page in any database data file is the file header page, shown in Figure
    [2-5](#338675_3_En_2_Chapter.xhtml#Fig5). Since this is the first page, it is
    always numbered 0\. The file header page contains metadata information about the
    database file. The information on this page includes


    *   File ID


    *   Filegroup ID


    *   Current size of the file


    *   Max file size


    *   Sector size


    *   LSN information


    There are a number of other details about the file on the file header page, but
    basically the information is immaterial to indexing internals.


    ### Boot Page


    The boot page is similar to the file header page in that it provides metadata
    information. This page, though, provides metadata information for the database
    itself instead of for the data file. There is one boot page per database, and
    it is located on page 9 in the first data file for a database (see Figure [2-5](#338675_3_En_2_Chapter.xhtml#Fig5)).
    Some of the information on the boot page includes the current version of the database,
    the create date and version for the database, the database name, the database
    ID, and the compatibility level.


    One important attribute on the boot page is the attribute `dbi_dbccLastKnownGood`.
    This attribute provides the date that the last known `DBCC CHECKDB` completed
    successfully. While database maintenance isn’t within the scope of this book,
    regular consistency checks of a database are critical to verifying that data remains
    available.'
