  raw: '![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig33_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig33_HTML.jpg)


    Figure 11-33


    Execution plan for Included Columns pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig32_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig32_HTML.jpg)


    Figure 11-32


    Statistics I/O results for Included Columns pattern


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameINC ON dbo.Contacts(FirstName)

    INCLUDE (LastName, IsActive, EmailAddress);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 11-22

    Included Columns Pattern

    ```


    While the number of reads is slightly higher with an index created with the Included
    Columns pattern, there is flexibility with the index that offsets that difference.
    With each of the examples in this chapter, a new index has been added to the table
    `dbo.Contacts`. At this point, there are six indexes on the table, each serving
    a different purpose and four leading with the same column, `FirstName`. Each of
    these indexes takes up space and requires maintenance when the data in `dbo.Contacts`
    is modified. In active tables, this amount of indexing could have a negative impact
    on all activity on the table.


    The Included Columns pattern can assist with this issue. In cases where there
    are multiple indexes with the same leading key column, it is possible to consolidate
    those indexes into a single index using the Included Columns pattern with some
    of the key columns added to the index instead as nonkey columns. To demonstrate,
    first remove all the indexes that start with `FirstName`, except for the one created
    using the Included Columns pattern (script provided in Listing [11-23](#338675_3_En_11_Chapter.xhtml#PC23)).


    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastName ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstName ON dbo.Contacts

    GO

    Listing 11-23

    Dropping Indexes in Included Columns Pattern

    ```


    The `dbo.Contact` table now has only three indexes on it. There is the clustered
    index on the `ContactID` column, a nonclustered index on `LastName`, and an index
    on `FirstName` with the columns `LastName`, `IsActive`, and `EmailAddress` included
    as data on the index. With these indexes in place, the queries from the previous
    patterns, shown in Listing [11-24](#338675_3_En_11_Chapter.xhtml#PC24), need to
    be tested against the table.


    There are two points to pay attention to regarding how the queries perform with
    the Included Columns pattern vs. with the other patterns. First, all the execution
    plans for the queries, shown in Figure [11-34](#338675_3_En_11_Chapter.xhtml#Fig34),
    are utilizing index seek operations. The seek operation is expected for the query
    that is just filtering on `FirstName`, but it can also be used when there is an
    additional filter on `LastName`. SQL Server can do this because underneath the
    index seek, it is performing a range scan of the rows that match the first predicate
    and then removing the `LastName` results that don’t have the value of `Cox`. The
    second item to notice is the number of reads for each of the queries, shown in
    Figure [11-35](#338675_3_En_11_Chapter.xhtml#Fig35). The reads increased from
    two to three. While this constitutes a 50 percent increase in reads, the performance
    change is not significant enough to justify creating four indexes when one index
    can adequately provide the needed performance.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig35_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig35_HTML.jpg)


    Figure 11-35


    Execution plan for Included Columns pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig34_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig34_HTML.jpg)


    Figure 11-34


    Statistics I/O results for Included Columns pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 11-24

    Other Queries Against Included Columns Pattern

    ```


    The Included Columns pattern for building nonclustered indexes is an important
    pattern to utilize when creating indexes. When used with specific queries that
    result in lookup operations, it provides improved read and execution performance.
    It also provides opportunities to consolidate similar queries to reduce the number
    of indexes on the table while still providing performance improvements over situations
    where the indexes do not exist.'
