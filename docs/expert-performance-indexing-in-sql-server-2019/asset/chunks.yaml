    ### 行版本


    `sys.dm_db_index_operational_stats` 中的最后一组列报告了由于快照隔离列而在索引内产生的版本计数。这些列是 SQL Server
    2019 新增的。虽然本书不会演示它们在快照隔离级别中的使用，但为了完整性，它们仍包含在本章中。


    表 3-20


    `sys.dm_db_index_operational_stats` 中的行版本列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `version_generated_inrow` | `bigint` | 快照隔离事务保留的行内版本记录数。 |

    | `version_generated_offrow` | `bigint` | 快照隔离事务保留的离行版本记录数。 |

    | `ghost_version_inrow` | `bigint` | 快照隔离事务保留的行内幻影版本记录数。 |

    | `ghost_version_offrow` | `bigint` | 快照隔离事务保留的离行幻影版本记录数。 |

    | `insert_over_ghost_version_inrow` | `bigint` | 快照隔离事务保留的在幻影版本记录之上执行的行内插入操作数。
    |

    | `insert_over_ghost_version_offrow` | `bigint` | 快照隔离事务保留的在幻影版本记录之上执行的离行插入操作数。
    |


    ### 索引操作统计摘要


    本节讨论了 DMO `sys.dm_db_index_operational_stats` 中可用的统计信息。虽然它不是一个被广泛使用的 DMO，但它确实提供了大量关于索引的低级细节，可用于深入探究索引的行为方式。从关于
    DML 和 `SELECT` 活动的列，到锁争用，再到压缩，此 DMO 中的列提供了丰富的信息。


    ## 索引物理统计


    SQL Server 收集的最后一个领域的统计信息是索引物理统计。这些统计信息报告索引的当前结构信息，以及插入、更新和删除操作对索引产生的物理影响。这些统计信息收集在
    DMO `sys.dm_db_index_physical_stats` 中。


    与 `sys.dm_db_index_operational_stats` 一样，`sys.dm_db_index_physical_stats` 是一个动态管理函数（DMF）。要使用此
    DMF，在使用时需要提供一些参数。清单 3-46 详细说明了此 DMF 的参数。


    ```sql

    sys.dm_db_index_physical_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | NULL | 0 | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    , { mode | NULL | DEFAULT }

    )

    ```

    清单 3-46

    `sys.dm_db_index_physical_stats` 的参数


    `sys.dm_db_index_physical_stats` 的 `mode` 参数接受以下五个值之一：`DEFAULT`, `NULL`, `LIMITED`,
    `SAMPLED`, 或 `DETAILED`。`DEFAULT`, `NULL`, 和 `LIMITED` 实际上是相同的值，将一并描述。表 3-21 列出了这些参数。

    '
- fmt: '### Note


    DMF `sys.dm_db_index_physical_stats` 可以接受 Transact SQL 函数 `DB_ID()` 和 `OBJECT_ID()`
    的使用。这些函数分别用于参数 `database_id` 和 `object_id`。


    **表 3-21**


    **sys.dm_db_index_physical_stats 的参数**


    | 参数名 | 描述 |

    | --- | --- |

    | LIMITED | 扫描页面数量最少的最快模式。对于索引，仅扫描 B 树的父级页面。在堆中，仅检查相关的 PFS 和 IAM 页面。 |

    | SAMPLED | 此模式基于索引或堆中所有页面的 1% 样本返回统计信息。如果索引或堆少于 10,000 个页面，则使用 DETAILED 模式而非
    SAMPLED。 |

    | DETAILED | 此模式扫描索引的所有页面（叶级和非叶级）并返回所有统计信息。 |


    执行时，DMF 会报告三个领域的信息：头部列、行统计信息和碎片统计信息。需要注意的一点是：此 DMF 在执行时收集它所报告的信息。如果您的系统使用强度很高，此
    DMF 可能会干扰生产工作负载。


    ### Header Columns


    从 `sys.dm_db_index_physical_stats` 返回的第一组列是头部列。这些列提供元数据和描述性信息，说明结果行中包含的信息类型。头部列如表
    [3-22](#338675_3_En_3_Chapter.xhtml#Tab22) 所示。查看头部列时，最重要的信息是 `alloc_unit_type_desc`
    和 `index_level`。这两列提供了有关正在报告的数据类型以及统计信息在索引中的来源位置的信息。


    **表 3-22**


    **sys.dm_db_index_physical_stats 的头部列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | database_id | `smallint` | 表或视图的数据库 ID。 |

    | object_id | `int` | 表或视图的对象 ID。 |

    | index_id | `int` | 索引的索引 ID。 |

    | partition_number | `int` | 所属对象（表、视图或索引）内的基于 1 的分区号。 |

    | index_type_desc | `nvarchar(60)` | 索引类型的描述。 |

    | hobt_id | `bigint` | 索引或分区的堆或 B 树 ID。 |

    | alloc_unit_type_desc | `nvarchar(60)` | 分配单元类型的描述。 |

    | index_depth | `tinyint` | 索引级别数。 |

    | index_level | `tinyint` | 索引的当前级别。 |


    ### Row Statistics


    `sys.dm_db_index_physical_stats` 中的第二组列是行统计信息列。这些列提供索引中包含的行的统计信息，如表 [3-23](#338675_3_En_3_Chapter.xhtml#Tab23)
    所示。从索引中的页面数到记录计数，这些列提供了一些这方面的通用统计信息。这些列中有几个值得关注的项目非常有用。


    **表 3-23**


    **sys.dm_db_index_physical_stats 的行统计信息列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | page_count | `bigint` | 索引或数据页面的总数。 |

    | record_count | `bigint` | 记录总数。 |

    | ghost_record_count | `bigint` | 分配单元中准备由后台清理任务清除的幽灵记录数。 |

    | version_ghost_record_count | `bigint` | 分配单元中由未完成的快照隔离事务保留的幽灵记录数。 |

    | min_record_size_in_bytes | `int` | 最小记录大小（字节）。 |

    | max_record_size_in_bytes | `int` | 最大记录大小（字节）。 |

    | avg_record_size_in_bytes | `float` | 平均记录大小（字节）。 |

    | forwarded_record_count | `bigint` | 堆中具有指向另一个数据位置的前向指针的记录数。 |

    | compressed_page_count | `bigint` | 压缩页面的数量。 |


    第一个值得关注的列是 `ghost_record_count` 和 `version_ghost_record_count`。这些列提供了在 `sys.dm_db_index_operational_stats`
    中找到的 `ghost_record_count` 的细分。


    下一个要检查的列是 `forwarded_record_count`。此列统计了堆中前向记录的数量。这在 `sys.dm_db_index_operational_stats`
    的 `forwarded_fetch_count` 列中有所讨论。在那个 DMF 中，计数是因为前向记录被访问的次数。而在 `sys.dm_db_index_operational_stats`
    中，该计数指的是表中存在的前向记录的数量。


    最后一个要查看的列是 `compressed_page_count`。压缩页面计数提供了索引中所有已压缩页面的计数。这有助于衡量通过 `PAGE` 级压缩来压缩页面的价值。


    ### Fragmentation Statistics


    DMF 中的最后一组统计信息是碎片统计信息。在大多数情况下，碎片是人们最常查阅 `sys.dm_db_index_physical_stats` 的原因。当在索引中插入或修改行，导致该行不再适合其应放置的页面时，就会发生索引碎片。此时，页面会拆分，将一半的页面移动到另一个页面。由于拆分后的页面之后通常没有连续的可用页面，该页面会被移动到可用的空闲页面。这会导致索引中出现间隙，页面本应是连续的，从而阻止
    SQL Server 在磁盘上读取索引时执行顺序读取。


    有四个列提供了分析索引内碎片状态所需的信息，如表 [3-24](#338675_3_En_3_Chapter.xhtml#Tab24) 所示。每一列都有助于查看碎片的程度，并帮助确定如何解决或减轻碎片。


    **表 3-24**


    **sys.dm_db_index_physical_stats 的碎片统计信息列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | `IN_ROW_DATA` 分配单元中索引的逻辑碎片或堆的范围碎片。
    |

    | `fragment_count` | `bigint` | `IN_ROW_DATA` 分配单元叶级别中的片段数。 |

    | `avg_fragment_size_in_pages` | `float` | `IN_ROW_DATA` 分配单元叶级别中一个片段的平均页面数。 |

    | `avg_page_space_used_in_percent` | `float` | 所有页面中已使用的平均可用数据存储空间百分比。 |


    第一个碎片列是 `avg_fragmentation_in_percent`。此列提供了索引中碎片数量的百分比计数。随着碎片的增加，SQL Server 可能需要更多的物理
    I/O 来从数据库中检索数据。使用此列，您可以通过重建或重新组织索引来制定维护计划以减轻碎片。一般准则是重新组织碎片少于 30% 的索引，并重建碎片超过 30%
    的索引。


    下一列 `fragment_count` 统计了索引中的所有片段数。索引中创建的每个片段，此列都会汇总其页面计数。


    第三列是 `avg_fragment_size_in_pages`。此列代表每个片段中的平均页面数。此值越高，并且越接近 `page_count`，SQL
    Server 读取数据所需的 I/O 就越少。


    最后一列是 `avg_page_space_used_in_percent`。此列提供了页面上可用空间量的信息。DML 活动少的索引应尽可能接近 100%。如果索引上没有预期的更新，目标应该是让索引尽可能紧凑。'
  raw: '### Note


    The DMF `sys.dm_db_index_physical_stats` can accept the use of the Transact SQL
    functions `DB_ID()` and `OBJECT_ID()`. These functions can be used for the parameters
    `database_id` and `object_id`, respectively.


    Table 3-21


    Parameters for sys.dm_db_index_physical_stats


    | Parameter Name | Description |

    | --- | --- |

    | LIMITED | The fastest mode that scans the smallest number of pages. For an index,
    only the parent-level pages of the B-tree are scanned. In a heap, only the associated
    PFS and IAM pages are examined. |

    | SAMPLED | This mode returns statistics based on a 1 percent sample of all the
    pages in the index or heap. If the index or heap has fewer than 10,000 pages,
    DETAILED mode is used instead of SAMPLED. |

    | DETAILED | This mode scans all pages, both leaf and nonleaf, of an index and
    returns all statistics. |


    When executed, there are three areas of information that are reported from the
    DMF: header columns, row statistics, and fragmentation statistics. One word of
    caution: This DMF gathers the information that it reports as it is executed. If
    your system is heavily used, this DMF can interfere with production workloads.


    ### Header Columns


    The first set of columns returned from `sys.dm_db_index_physical_stats` are the
    header columns. These columns provide metadata and descriptive information around
    the types of information that are included in that row of the results. The header
    columns for this are listed in Table [3-22](#338675_3_En_3_Chapter.xhtml#Tab22).
    The most important information to pay attention to when looking at the header
    columns are the `alloc_unit_type_desc` and `index_level`. These two columns provide
    information on what type of data is being reported on and where in the index the
    statistics are originating from.


    Table 3-22


    Header Columns for sys.dm_db_index_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | database_id | `smallint` | Database ID of the table or view. |

    | object_id | `int` | Object ID of the table or view that the index is on. |

    | index_id | `int` | Index ID of an index. |

    | partition_number | `int` | 1-based partition number within the owning object:
    a table, view, or index. |

    | index_type_desc | `nvarchar(60)` | Description of the index type. |

    | hobt_id | `bigint` | Heap or B-tree ID of the index or partition. |

    | alloc_unit_type_desc | `nvarchar(60)` | Description of the allocation unit type.
    |

    | index_depth | `tinyint` | Number of index levels. |

    | index_level | `tinyint` | Current level of the index. |


    ### Row Statistics


    The second group of columns in `sys.dm_db_index_physical_stats` are the row statistics
    columns. These columns provide statistics on the rows contained in the index,
    shown in Table [3-23](#338675_3_En_3_Chapter.xhtml#Tab23). From the number of
    pages in the index to the record count, these columns provide some general statistics
    along these lines. There are a few items of interest in these columns that can
    be quite useful.


    Table 3-23


    Row Statistics Columns for sys.dm_db_index_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | page_count | `bigint` | Total number of index or data pages. |

    | record_count | `bigint` | Total number of records. |

    | ghost_record_count | `bigint` | Number of ghost records ready for removal by
    the ghost cleanup task in the allocation unit. |

    | version_ghost_record_count | `bigint` | Number of ghost records retained by
    an outstanding snapshot isolation transaction in an allocation unit. |

    | min_record_size_in_bytes | `int` | Minimum record size in bytes. |

    | max_record_size_in_bytes | `int` | Maximum record size in bytes. |

    | avg_record_size_in_bytes | `float` | Average record size in bytes. |

    | forwarded_record_count | `bigint` | Number of records in a heap that have forward
    pointers to another data location. |

    | compressed_page_count | `bigint` | The number of compressed pages. |


    The first items of interest are the columns `ghost_record_count` and `version_ghost_record_count`.
    These columns provide a breakdown of the `ghost_record_count` found in `sys.dm_db_index_operational_stats`.


    The next column to check is `forwarded_record_count`. This column provides an
    accounting to the number of forwarded records in a heap. This was discussed some
    in `sys.dm_db_index_operational_stats` with the `forwarded_fetch_count` column.
    In that DMF, the count was because of the number of times that forwarded records
    were accessed. In `sys.dm_db_index_operational_stats`, the count refers to the
    number of forwarded records that exist within the table.


    The last column to look at is `compressed_page_count`. The compressed page count
    provides a count of all the pages in an index that have been compressed. This
    helps provide a measure of value in having pages compressed by `PAGE`-level compression.


    ### Fragmentation Statistics


    The last group of statistics in the DMF are the fragmentation statistics. For
    the most part, fragmentation is what most frequently turns people to looking at
    `sys.dm_db_index_physical_stats`. Fragmentation occurs in indexes when rows are
    inserted or modified in an index where the row no longer fits on the page where
    the index should be placed. When this happens, the page is split to move half
    of the page to another page. Since there usually isn’t a contiguous page available
    after the page that has been split, the page gets moved to an available free page.
    This results in gaps in an index where pages are expected to be continuous, preventing
    SQL Server from completing sequential reads while reading an index on disk.


    There are four columns, shown in Table [3-24](#338675_3_En_3_Chapter.xhtml#Tab24),
    that provide the information needed to analyze the state of fragmentation within
    an index. Each of these helps provide a view on the extent of the fragmentation
    and assists in determining how to resolve or mitigate the fragmentation.


    Table 3-24


    Fragmentation Statistics Columns for sys.dm_db_index_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | Logical fragmentation for indexes
    or extent fragmentation for heaps in the `IN_ROW_DATA` allocation unit. |

    | `fragment_count` | `bigint` | Number of fragments in the leaf level of an `IN_ROW_DATA`
    allocation unit. |

    | `avg_fragment_size_in_pages` | `float` | Average number of pages in one fragment
    in the leaf level of an `IN_ROW_DATA` allocation unit. |

    | `avg_page_space_used_in_percent` | `float` | Average percentage of available
    data storage space used in all pages. |


    The first fragment column is the `avg_fragmentation_in_percent`. This column provides
    a percent count of the amount of fragmentation in an index. As fragmentation increases,
    SQL Server will likely see an increase in the amount of physical I/Os required
    to retrieve data from the database. Using this column, you can build a maintenance
    plan to mitigate fragmentation by either rebuilding or reorganizing the index.
    The general guideline is to reorganize indexes with less than 30 percent fragmentation
    and to rebuild indexes with more than 30 percent fragmentation.


    The next column, `fragment_count`, provides a count of all the fragments in an
    index. For each fragment created in an index, this column will summarize a count
    of those pages.


    The third column is `avg_fragment_size_in_pages`. This column represents the average
    number of pages that are in each fragment. The higher this value is and the closer
    it is to `page_count`, the less I/O that SQL Server requires to read the data.


    The last column is `avg_page_space_used_in_percent`. This column provides information
    on the amount of space available on pages. An index with little DML activity should
    be as close to 100 percent as possible. If there are no updates expected on an
    index, the goal should be to have the index as compacted as possible.'
  trans: '### 注意


    DMF `sys.dm_db_index_physical_stats` 可以接受 Transact SQL 函数 `DB_ID()` 和 `OBJECT_ID()`
    的使用。这些函数分别用于参数 `database_id` 和 `object_id`。


    **表 3-21**


    **sys.dm_db_index_physical_stats 的参数**


    | 参数名 | 描述 |

    | --- | --- |

    | LIMITED | 扫描页面数量最少的最快模式。对于索引，仅扫描 B 树的父级页面。在堆中，仅检查相关的 PFS 和 IAM 页面。 |

    | SAMPLED | 此模式基于索引或堆中所有页面的 1% 样本返回统计信息。如果索引或堆少于 10,000 个页面，则使用 DETAILED 模式而非
    SAMPLED。 |

    | DETAILED | 此模式扫描索引的所有页面（叶级和非叶级）并返回所有统计信息。 |


    执行时，DMF 会报告三个领域的信息：头部列、行统计信息和碎片统计信息。需要注意的一点是：此 DMF 在执行时收集它所报告的信息。如果您的系统使用强度很高，此
    DMF 可能会干扰生产工作负载。


    ### 头部列


    从 `sys.dm_db_index_physical_stats` 返回的第一组列是头部列。这些列提供元数据和描述性信息，说明结果行中包含的信息类型。头部列如表
    3-22 所示。查看头部列时，最重要的信息是 `alloc_unit_type_desc` 和 `index_level`。这两列提供了有关正在报告的数据类型以及统计信息在索引中的来源位置的信息。


    **表 3-22**


    **sys.dm_db_index_physical_stats 的头部列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | database_id | `smallint` | 表或视图的数据库 ID。 |

    | object_id | `int` | 表或视图的对象 ID。 |

    | index_id | `int` | 索引的索引 ID。 |

    | partition_number | `int` | 所属对象（表、视图或索引）内的基于 1 的分区号。 |

    | index_type_desc | `nvarchar(60)` | 索引类型的描述。 |

    | hobt_id | `bigint` | 索引或分区的堆或 B 树 ID。 |

    | alloc_unit_type_desc | `nvarchar(60)` | 分配单元类型的描述。 |

    | index_depth | `tinyint` | 索引级别数。 |

    | index_level | `tinyint` | 索引的当前级别。 |


    ### 行统计信息


    `sys.dm_db_index_physical_stats` 中的第二组列是行统计信息列。这些列提供索引中包含的行的统计信息，如表 3-23 所示。从索引中的页面数到记录计数，这些列提供了一些这方面的通用统计信息。这些列中有几个值得关注的项目非常有用。


    **表 3-23**


    **sys.dm_db_index_physical_stats 的行统计信息列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | page_count | `bigint` | 索引或数据页面的总数。 |

    | record_count | `bigint` | 记录总数。 |

    | ghost_record_count | `bigint` | 分配单元中准备由后台清理任务清除的幽灵记录数。 |

    | version_ghost_record_count | `bigint` | 分配单元中由未完成的快照隔离事务保留的幽灵记录数。 |

    | min_record_size_in_bytes | `int` | 最小记录大小（字节）。 |

    | max_record_size_in_bytes | `int` | 最大记录大小（字节）。 |

    | avg_record_size_in_bytes | `float` | 平均记录大小（字节）。 |

    | forwarded_record_count | `bigint` | 堆中具有指向另一个数据位置的前向指针的记录数。 |

    | compressed_page_count | `bigint` | 压缩页面的数量。 |


    第一个值得关注的列是 `ghost_record_count` 和 `version_ghost_record_count`。这些列提供了在 `sys.dm_db_index_operational_stats`
    中找到的 `ghost_record_count` 的细分。


    下一个要检查的列是 `forwarded_record_count`。此列统计了堆中前向记录的数量。这在 `sys.dm_db_index_operational_stats`
    的 `forwarded_fetch_count` 列中有所讨论。在那个 DMF 中，计数是因为前向记录被访问的次数。而在 `sys.dm_db_index_operational_stats`
    中，该计数指的是表中存在的前向记录的数量。


    最后一个要查看的列是 `compressed_page_count`。压缩页面计数提供了索引中所有已压缩页面的计数。这有助于衡量通过 `PAGE` 级压缩来压缩页面的价值。


    ### 碎片统计信息


    DMF 中的最后一组统计信息是碎片统计信息。在大多数情况下，碎片是人们最常查阅 `sys.dm_db_index_physical_stats` 的原因。当在索引中插入或修改行，导致该行不再适合其应放置的页面时，就会发生索引碎片。此时，页面会拆分，将一半的页面移动到另一个页面。由于拆分后的页面之后通常没有连续的可用页面，该页面会被移动到可用的空闲页面。这会导致索引中出现间隙，页面本应是连续的，从而阻止
    SQL Server 在磁盘上读取索引时执行顺序读取。


    有四个列提供了分析索引内碎片状态所需的信息，如表 3-24 所示。每一列都有助于查看碎片的程度，并帮助确定如何解决或减轻碎片。


    **表 3-24**


    **sys.dm_db_index_physical_stats 的碎片统计信息列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | `IN_ROW_DATA` 分配单元中索引的逻辑碎片或堆的范围碎片。
    |

    | `fragment_count` | `bigint` | `IN_ROW_DATA` 分配单元叶级别中的片段数。 |

    | `avg_fragment_size_in_pages` | `float` | `IN_ROW_DATA` 分配单元叶级别中一个片段的平均页面数。 |

    | `avg_page_space_used_in_percent` | `float` | 所有页面中已使用的平均可用数据存储空间百分比。 |


    第一个碎片列是 `avg_fragmentation_in_percent`。此列提供了索引中碎片数量的百分比计数。随着碎片的增加，SQL Server 可能需要更多的物理
    I/O 来从数据库中检索数据。使用此列，您可以通过重建或重新组织索引来制定维护计划以减轻碎片。一般准则是重新组织碎片少于 30% 的索引，并重建碎片超过 30%
    的索引。


    下一列 `fragment_count` 统计了索引中的所有片段数。索引中创建的每个片段，此列都会汇总其页面计数。


    第三列是 `avg_fragment_size_in_pages`。此列代表每个片段中的平均页面数。此值越高，并且越接近 `page_count`，SQL
    Server 读取数据所需的 I/O 就越少。


    最后一列是 `avg_page_space_used_in_percent`。此列提供了页面上可用空间量的信息。DML 活动少的索引应尽可能接近 100%。如果索引上没有预期的更新，目标应该是让索引尽可能紧凑。'
- fmt: '### Index Physical Stats Summary


    The primary purpose in looking at `sys.dm_db_index_physical_stats` is to help
    guide index maintenance. Through this DMF, statistics at every level of an index
    can be analyzed. Through this, the appropriate amount of maintenance for each
    level of an index can be identified. Whether the need is to defragment the index,
    modify the fill factor, or pad the index, the information in `sys.dm_db_index_physical_stats`
    can help guide this activity.


    ## Columnstore Statistics


    As discussed in the last chapter, columnstore indexes use a structure quite different
    from the typical B-tree or heap, sometimes considered rowstores. Due to these
    differences, there are some differences in the statistics collected for these
    indexes that relate to the underlying architecture and how it is accessed. To
    provide visibility to these different aspects, there are two DMOs that focus on
    the physical and operational statistics for columnstore statistics.


    ### Columnstore Physical Stats


    The first piece to look at is the physical statistics being collected on columnstore
    indexes. This information can be accessed through the DMO `sys.dm_db_column_store_row_group_physical_stats`.
    This DMO has a row-per-rowgroup within a columnstore index. Recalling in the last
    chapter, there will be a rowgroup per column and up to one per million records
    in the table.


    #### Header Columns


    As you’ve started with the previous sections, we’ll start with the header columns
    for the DMO. Since there is a row-per-rowgroup, each row will include `object_id`,
    `index_id`, `partition_number`, `row_group_id`, and `delta_store_hobt_id`. These
    columns are defined further in Table 3-25. Like other indexes, the `partition_number`
    validates that columnstore indexes can be partitioned. For nonpartitioned columnstore
    indexes, the partition number will be 1.


    Table 3-25

    Header Columns in `sys.dm_db_column_store_row_group_physical_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `row_group_id` | `bigint` | ID of the rowgroup. |

    | `delta_store_hobt_id` | `bigint` | ID of hobt_id of the rowgroup deltastore.  If
    NULL, there is not an associated deltastore for the rowgroup. |


    #### Statistics Columns


    The statistics columns for `sys.dm_db_column_store_row_group_physical_stats` provide
    a lot of metadata for columnstore indexes that can assist in understanding how
    the columnstore is constructed. The statistics, defined in Table 3-26, provide
    insight necessary for managing your columnstore indexes. For example, you can
    leverage `total_rows` and `deleted_rows` to determine the portion of a rowgroup
    that is still active. In some cases, aggressive modifications on a rowgroup could
    leave empty rowgroups on your tables. Also, when the rowgroups are smaller than
    the million rows, the `state`, `trim_reason`, and `transition_to_compressed` information
    can help identify how rowgroups are being compressed. For instance, if you have
    a large number of small rowgroups that are being closed due to `BULKLOAD`, it
    may be worthwhile to rebuild those rowgroups or make modification to the load
    process to try to aim for rowgroups with more rows.


    Table 3-26

    Stats Columns in `sys.dm_db_column_store_row_group_physical_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `state` | `tinyint` | ID number associated with `state_description`. |

    | `state_desc` | `nvarchar(60)` | Description of the rowgroup state, which can
    be `INVISIBLE`, `OPEN`, `CLOSED`, `COMPRESSED`, or `TOMBSTONE`. |

    | `total_rows` | `bigint` | Full count of rows in the rowgroup including any row
    that has been marked deleted. |

    | `deleted_rows` | `bigint` | Number of rows in the rowgroup marked for deletion.
    |

    | `size_in_bytes` | `bigint` | Size of the rowgroup in bytes. |

    | `trim_reason` | `tinyint` | ID number associated with the `trim_reason_desc`.
    |

    | `trim_reason_desc` | `nvarchar(60)` | Description of why a `COMPRESSED` rowgroup
    has less than the million-row maximum of rows, which can be `NO_TRIM`, `BULKLOAD`,
    `ROERG`, `DICTIONARY SIZE`, `MEMORY LIMITATION`, `RESIDUAL ROW GROUP`, `STATS
    MISMATCH`, or `SPILLOVER`. |

    | `transition_to_compressed_state` | `tinyint` | ID number associated with the
    `transition_to_compressed_state_desc`. |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | Description of how
    the rowgroup transitions from a deltastore to a rowgroup, which includes `NOT
    APPLICABLE`, `INDEX BUILD`, `TUPLE MOVER`, `REORG NORMAL`, `REORG FORCED`, `BULKLOAD`,
    or `MERGE`. |

    | `has_vertipaq_optimization` | `bit` | Boolean identifying whether Vertipaq optimization
    was used during compression.  When not used, compression will not be as efficient
    as when it is used. |

    | `generation` | `bigint` | Rowgroup generation associated with this rowgroup.
    |

    | `created_time` | `datetime2` | Clock time for when this rowgroup was created.
    |

    | `closed_time` | `datetime2` | Clock time for when this rowgroup was closed.
    |


    ### Columnstore Operational Stats


    The other piece for columnstore indexes is to look at their operational statistics
    through the DMO `sys.dm_db_column_store_row_group_operational_stats`. This DMO
    also returns one row per rowgroup within a columnstore index. Recalling in the
    last chapter, there will be a rowgroup per column and up to one per million records
    in the table.


    #### Header Columns


    The header columns for `sys.dm_db_column_store_row_group_operational_stats` are
    similar to those of the columnstore physical stats DMO. The exception is that
    there isn’t a deltastore reference, meaning this DMO returns the columns `object_id`,
    `index_id`, `partition_number`, and `row_group_id`. These columns are defined
    in Table 3-27.


    Table 3-27

    Header Columns in `sys.dm_db_column_store_row_group_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `row_group_id` | `bigint` | ID of the rowgroup. |'
  raw: '### Index Physical Stats Summary


    The primary purpose in looking at `sys.dm_db_index_physical_stats` is to help
    guide index maintenance. Through this DMF, statistics at every level of an index
    can be analyzed. Through this, the appropriate amount of maintenance for each
    level of an index can be identified. Whether the need is to defragment the index,
    modify the fill factor, or pad the index, the information in `sys.dm_db_index_physical_stats`
    can help guide this activity.


    ## Columnstore Statistics


    As discussed in the last chapter, columnstore indexes use a structure quite different
    from the typical B-tree or heap, sometimes considered rowstores. Due to these
    differences, there are some differences in the statistics collected for these
    indexes that relate to the underlying architecture and how it is accessed. To
    provide visibility to these different aspects, there are two DMOs that focus on
    the physical and operational statistics for columnstore statistics.


    ### Columnstore Physical Stats


    The first piece to look at is the physical statistics being collected on columnstore
    indexes. This information can be accessed through the DMO sys.dm_db_column_store_row_group_physical_stats.
    This DMO has a row-per-rowgroup within a columnstore index. Recalling in the last
    chapter, there will be a rowgroup per column and up to one per million records
    in the table.


    #### Header Columns


    As you’ve started with the previous sections, we’ll start with the header columns
    for the DMO. Since there is a row-per-rowgroup, each row will include `object_id`,
    `index_id`, `partition_number, row_group_id, and delta_store_hobt_id`. These columns
    are defined further in Table [3-25](#338675_3_En_3_Chapter.xhtml#Tab25). Like
    other indexes, the `partition_number` validates that columnstore indexes can be
    partitioned. For nonpartitioned columnstore indexes, the partition number will
    be 1.


    Table 3-25


    Header Columns in sys.dm_db_column_store_row_group_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `row_group_id` | `bigint` | ID of the rowgroup. |

    | `delta_store_hobt_id` | `bigint` | ID of hobt_id of the rowgroup deltastore.  If
    NULL, there is not an associated deltastore for the rowgroup. |


    #### Statistics Columns


    The statistics columns for sys.dm_db_column_store_row_group_physical_stats provide
    a lot of metadata for columnstore indexes that can assist in understanding how
    the columnstore is constructed. The statistics, defined in Table [3-26](#338675_3_En_3_Chapter.xhtml#Tab26),
    provide insight necessary for managing your columnstore indexes. For example,
    you can leverage total_rows and deleted_rows to determine the portion of a rowgroup
    that is still active. In some cases, aggressive modifications on a rowgroup could
    leave empty rowgroups on your tables. Also, when the rowgroups are smaller than
    the million rows, the state, trim reason, and transition to compressed information
    can help identify how rowgroups are being compressed. For instance, if you have
    a large number of small rowgroups that are being closed due to BULKLOAD, it may
    be worthwhile to rebuild those rowgroups or make modification to the load process
    to try to aim for rowgroups with more rows.


    Table 3-26


    Stats Columns in sys.dm_db_column_store_row_group_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `state` | `tinyint` | ID number associated with state_description. |

    | `state_desc` | `nvarchar(60)` | Description of the rowgroup state, which can
    be INVISIBLE, OPEN, CLOSED, COMPRESSED, or TOMBSTONE. |

    | `total_rows` | `bigint` | Full count of rows in the rowgroup including any row
    that has been marked deleted. |

    | `deleted_rows` | `bigint` | Number of rows in the rowgroup marked for deletion.
    |

    | `size_in_bytes` | `bigint` | Size of the rowgroup in bytes. |

    | `trim_reason` | `tinyint` | ID number associated with the trim_reason_desc.
    |

    | `trim_reason_desc` | `nvarchar(60)` | Description of why a COMPRESSED rowgroup
    has less than the million-row maximum of rows, which can be NO_TRIM, BULKLOAD,
    ROERG, DICTIONARY SIZE, MEMORY LIMITATION, RESIDUAL ROW GROUP, STATS MISMATCH,
    or SPILLOVER. |

    | `transition_to_compressed_state` | `tinyint` | ID number associated with the
    transition_to_compressed_state_desc. |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | Description of how
    the rowgroup transitions from a deltastore to a rowgroup, which includes NOT APPLICABLE,
    INDEX BUILD, TUPLE MOVER, REORG NORMAL, REORG FORCED, BULKLOAD, or MERGE. |

    | `has_vertipaq_optimization` | `bit` | Boolean identifying whether Vertipaq optimization
    was used during compression.  When not used, compression will not be as efficient
    as when it is used. |

    | `generation` | `bigint` | Rowgroup generation associated with this rowgroup.
    |

    | `created_time` | `datetime2` | Clock time for when this rowgroup was created.
    |

    | `closed_time` | `datetime2` | Clock time for when this rowgroup was closed.
    |


    ### Columnstore Operational Stats


    The other piece for columnstore indexes is to look at their operational statistics
    through the DMO sys.dm_db_column_store_row_group_operational_stats. This DMO also
    returns one row per rowgroup within a columnstore index. Recalling in the last
    chapter, there will be a rowgroup per column and up to one per million records
    in the table.


    #### Header Columns


    The header columns for sys.dm_db_column_store_row_group_operational_stats are
    similar to those of the columnstore physical stats DMO. The exception is that
    there isn’t a deltastore reference, meaning this DMO returns the columns `object_id`,
    `index_id`, `partition_number, and row_group_id.` These columns are defined in
    Table [3-27](#338675_3_En_3_Chapter.xhtml#Tab27).


    Table 3-27


    Header Columns in sys.dm_db_column_store_row_group_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | object_id | int | ID of the table or view on which the index is defined. |

    | index_id | int | ID of the index. |

    | partition_number | int | 1-based partition number within the index or heap.
    |

    | row_group_id | bigint | ID of the rowgroup. |'
  trans: '

    ### 索引物理统计信息摘要


    查看 `sys.dm_db_index_physical_stats` 的主要目的是帮助指导索引维护。通过这个 DMF，可以分析索引每个级别的统计信息。据此，可以确定针对索引每个级别所需的维护量。无论是需要对索引进行碎片整理、修改填充因子，还是填充索引，`sys.dm_db_index_physical_stats`
    中的信息都可以帮助指导这些活动。


    ## 列存储统计信息


    如前一章所述，列存储索引使用的结构与典型的 B 树或堆（有时称为行存储）截然不同。由于这些差异，针对这些索引收集的统计信息也存在一些不同，这与其底层架构及访问方式相关。为了呈现这些不同的方面，有两个
    DMO 专门关注列存储统计信息的物理和操作统计信息。


    ### 列存储物理统计信息


    首先需要查看的是针对列存储索引收集的物理统计信息。可以通过 DMO `sys.dm_db_column_store_row_group_physical_stats`
    访问此信息。此 DMO 为列存储索引中的每个行组返回一行。回顾前一章，表中每列以及每百万条记录最多会有一个行组。


    #### 头列


    如同之前章节的开头，我们首先介绍此 DMO 的头列。由于是每个行组对应一行，因此每行将包含 `object_id`、`index_id`、`partition_number`、`row_group_id`
    和 `delta_store_hobt_id`。这些列在表 3-25 中有进一步定义。与其他索引类似，`partition_number` 验证了列存储索引可以进行分区。对于非分区的列存储索引，分区号将为
    1。


    表 3-25

    `sys.dm_db_column_store_row_group_physical_stats` 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 定义了索引的表或视图的 ID。 |

    | `index_id` | `int` | 索引的 ID。 |

    | `partition_number` | `int` | 索引或堆内的基于 1 的分区号。 |

    | `row_group_id` | `bigint` | 行组的 ID。 |

    | `delta_store_hobt_id` | `bigint` | 行组增量存储的 hobt_id。 如果为 NULL，则该行组没有关联的增量存储。
    |


    #### 统计信息列


    `sys.dm_db_column_store_row_group_physical_stats` 的统计信息列提供了大量列存储索引的元数据，有助于理解列存储的构建方式。表
    3-26 中定义的统计信息提供了管理列存储索引所必需的洞察。例如，您可以利用 `total_rows` 和 `deleted_rows` 来确定行组中仍处于活动状态的部分。在某些情况下，对行组进行激进的修改可能会导致表中存在空行组。此外，当行组小于一百万行时，`state`、`trim_reason`
    和 `transition_to_compressed` 信息可以帮助识别行组的压缩方式。例如，如果有大量因 `BULKLOAD` 而关闭的小行组，那么重建这些行组或修改加载过程以尝试达到包含更多行的行组可能是值得的。


    表 3-26

    `sys.dm_db_column_store_row_group_physical_stats` 中的统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `state` | `tinyint` | 与 `state_description` 关联的 ID 号。 |

    | `state_desc` | `nvarchar(60)` | 行组状态的描述，可以是 `INVISIBLE`、`OPEN`、`CLOSED`、`COMPRESSED`
    或 `TOMBSTONE`。 |

    | `total_rows` | `bigint` | 行组中行的完整计数，包括任何已被标记为删除的行。 |

    | `deleted_rows` | `bigint` | 行组中标记为删除的行数。 |

    | `size_in_bytes` | `bigint` | 行组的大小（字节）。 |

    | `trim_reason` | `tinyint` | 与 `trim_reason_desc` 关联的 ID 号。 |

    | `trim_reason_desc` | `nvarchar(60)` | 描述为什么 `COMPRESSED` 行组的行数少于百万行的最大值，可以是
    `NO_TRIM`、`BULKLOAD`、`ROERG`、`DICTIONARY SIZE`、`MEMORY LIMITATION`、`RESIDUAL ROW
    GROUP`、`STATS MISMATCH` 或 `SPILLOVER`。 |

    | `transition_to_compressed_state` | `tinyint` | 与 `transition_to_compressed_state_desc`
    关联的 ID 号。 |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | 描述行组如何从增量存储转换为行组，包括
    `NOT APPLICABLE`、`INDEX BUILD`、`TUPLE MOVER`、`REORG NORMAL`、`REORG FORCED`、`BULKLOAD`
    或 `MERGE`。 |

    | `has_vertipaq_optimization` | `bit` | 布尔值，标识压缩期间是否使用了 Vertipaq 优化。 当未使用时，压缩效率不如使用时高。
    |

    | `generation` | `bigint` | 与此行组关联的行组代。 |

    | `created_time` | `datetime2` | 创建此行组时的时钟时间。 |

    | `closed_time` | `datetime2` | 关闭此行组时的时钟时间。 |


    ### 列存储操作统计信息


    关于列存储索引的另一部分是通过 DMO `sys.dm_db_column_store_row_group_operational_stats` 查看其操作统计信息。此
    DMO 同样为列存储索引中的每个行组返回一行。回顾前一章，表中每列以及每百万条记录最多会有一个行组。


    #### 头列


    `sys.dm_db_column_store_row_group_operational_stats` 的头列与列存储物理统计信息 DMO 类似。不同之处在于它没有增量存储引用，这意味着此
    DMO 返回的列是 `object_id`、`index_id`、`partition_number` 和 `row_group_id`。这些列在表 3-27
    中定义。


    表 3-27

    `sys.dm_db_column_store_row_group_operational_stats` 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 定义了索引的表或视图的 ID。 |

    | `index_id` | `int` | 索引的 ID。 |

    | `partition_number` | `int` | 索引或堆内的基于 1 的分区号。 |

    | `row_group_id` | `bigint` | 行组的 ID。 |

    '
- fmt: '## Statistics Columns


    The interesting information for `sys.dm_db_column_store_row_group_operational_stats`
    comes from the stats columns. In these columns, defined in Table 3-28, there are
    details about the number of scans for the rowgroup, the number of times the delete
    rows were scanned, and the number of times the partition for the columnstore was
    scanned. This can help you identify how useful the rowgroup and its min and max
    values are for the queries that access the table and determine when the number
    of deleted rows might be becoming a hindrance to the usefulness of the rowgroup
    when they are being excessively accessed. Additionally, you can see if there are
    locks and blocking transactions negatively impacting the accessibility of the
    rowgroup, helping you know when there are potential IO or transactional bottlenecks
    that need to be addressed.


    ### Table 3-28

    Stats Columns in `sys.dm_db_column_store_row_group_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `scan_count` | int | Number of scans through the rowgroup since the last SQL
    restart. |

    | `delete_buffer_scan_count` | int | Number of times the delete buffer was used
    to determine deleted rows in this rowgroup. This includes accessing the in-memory
    hashtable and the underlying B-tree. |

    | `index_scan_count` | int | Number of times the columnstore index partition was
    scanned. This is the same for all rowgroups in the partition. |

    | `rowgroup_lock_count` | bigint | Cumulative count of lock requests for this
    rowgroup since the last SQL restart. |

    | `rowgroup_lock_wait_count` | bigint | Cumulative number of times the database
    engine waited on this rowgroup lock since the last SQL restart. |

    | `rowgroup_lock_wait_in_ms` | bigint | Cumulative number of milliseconds the
    database engine waited on this rowgroup lock since the last SQL restart. |


    ## Summary


    In this chapter, you looked at the statistical information available in SQL Server
    on indexes. From statistics on cardinality to the physical layout of an index,
    you learned what information is available and how to retrieve it. For the most
    part, this information is the tip of the iceberg. In upcoming chapters, you’ll
    leverage this information by looking at the statistics that have been captured
    and leveraging them to improve your ability to index your database.


    # 4. XML Indexes


    The past couple chapters focused on indexing what is commonly referred to as *structured
    data*, where there is a common schema and organization around the data and its
    storage. In this chapter and the next few chapters, the indexing focus shifts
    to unstructured and semistructured data. With both structured and unstructured
    data, the task of indexing is to gain optimal efficiency for retrieving and manipulating
    data, but the data types that represent these types of data have differences in
    how they are stored in the database. These differences dictate how and why indexing
    is implemented as well as how the indexes are used by the query optimizer.


    SQL Server has a specialized data type for storing the most common type of unstructured
    and semistructured data, XML. This chapter explores the types of indexes offered
    by SQL Server for dealing with XML data. The chapter will also show the impact
    of those indexes on the types of queries that can be written against XML data
    using XQuery and the impact on the choices made by the optimizer.


    ## XML Data


    Extensible Markup Language (XML) was developed through the 1990s and introduced
    as a standard by the World Wide Web Consortium in February 1998. XML data has
    been stored in databases for years but until SQL Server 2005 did not have a dedicated
    data type or access methods. When introduced, the XML data type extended the capabilities
    of SQL Server to appropriately manage this different data structure. With the
    acceptance of XML, the use and size of the total XML content within SQL Server
    databases grew. The growth was spurred by the advantages that XML offered application
    developers.


    ### Benefits


    The introduction of the XML data type allowed for the full capability of XML storage
    inside an SQL Server database. This included the ability to retrieve XML contents
    based on queries written against the XML itself. The strongest support that XML
    offers developers is that it is both text-based and, nominally, self-documenting.
    Being text-based means that XML is easily passed from one application to another,
    regardless of underlying operating system or programming language. The self-documenting
    nature of XML means that you don’t need to actually have a structure defined in
    the same way as columns and tables are defined within a database. Instead, the
    elements and properties of the XML will tell you what they are. XML is referred
    to as *semistructured* because there is generally a template defining an expected
    structure in order to help validate that any given set of XML is considered to
    be well-formed.


    Indexing XML can be a huge benefit if you are doing a lot XML processing on your
    system. The largest benefit for XML indexes will be in situations where you have
    large amounts of XML stored but you’re retrieving only small subsets of that XML.
    XML indexes benefit this situation greatly. If you have a lot of queries on your
    XML, you may also see improvements here when XML indexes are implemented.


    ### Cautions


    Although the XML data type sounds like a perfect fit for every instance of XML,
    some considerations should be contemplated when designing a column in SQL Server
    that will be storing XML. One of the most critical is that the XML content should
    be well-formed. This ensures that the XML data type and features provided to utilize
    the data most efficiently are used to their full advantage. XML columns are stored
    as binary large objects, more commonly known as BLOBs. This storage means that
    runtime querying of the content is resource-intensive and slow in most cases.
    With any task that involves data retrieval, efficiency of that retrieval is of
    concern. In SQL Server, indexing is paramount to how efficient or nonefficient
    this can be. A complete lack of indexing or too many indexes will affect any data
    manipulation task. The XML data type also falls into this requirement. XML indexing
    is unique compared to the other indexing methods in SQL Server.


    ## XML Indexes


    XML indexes fall into two main categories: Primary/Secondary and Selective XML
    indexes. The main difference between these index types is how much of the XML
    data is included within the index. For Primary/Secondary indexes, all paths, nodes,
    and values are included in the index. This works well when it is unknown what
    portions of the XML will be most accessed. Alternatively, if only a limited portion
    of the XML will be accessed, then a Selective XML index can provide better performance
    since the volume of data indexed is reduced. The next two sections will explore
    and fully explain these categories of XML indexes.'
