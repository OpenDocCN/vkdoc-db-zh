- fmt: '## Scalar Functions


    The previous few sections discussed filtering query results by searching within
    column values or by combining values across columns. This section looks at the
    effect of scalar functions used in the `WHERE` clauses of queries. Scalar functions
    provide the ability to transform values to other values that can be more useful
    than the original value when querying the database.


    User-defined scalar functions can also be created and used in the `WHERE` clause.
    The trouble with both system- and user-defined scalar functions is that if they
    transform the column where the index exists, then SQL Server is unable to use
    them efficiently. Because the values of the calculations are not known until runtime,
    the query optimizer does not have statistics to determine the frequency of values
    in the index or information on where the calculated values are located in the
    index or table.


    To demonstrate the effect of scalar functions on queries, consider the two queries
    in Listing [12-10](#338675_3_En_12_Chapter.xhtml#PC10) that return information
    from `Person.Person`. Both queries will return all rows that have the value `Gustavo`
    in the `FirstName` column. The difference between the two queries is that the
    second query will use the `RTRIM` function in the `WHERE` clause on the `FirstName`
    column.


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo'';

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE RTRIM(FirstName) = ''Gustavo'';

    ```


    **Listing 12-10** Queries on `FirstName` Gustavo


    As the second execution plan in Figure [12-18](#338675_3_En_12_Chapter.xhtml#Fig18)
    shows, when the scalar function is added to the `WHERE` clause, the execution
    plan continues to use the same index as the first plan did, but leverages an index
    scan instead of an index seek. This change increases the I/Os from 2 to 99 (shown
    in Figure [12-17](#338675_3_En_12_Chapter.xhtml#Fig17)), which is similar to other
    examples. In this example, just excluding the scalar function, as in the first
    query, can provide the same results as with the function in place. That won’t
    be the case for all queries, but the way to allow indexes to be best used is to
    move the scalar function from the key columns to the parameters of a query.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig18_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig18_HTML.jpg)

    **Figure 12-18** Execution plans for Gustavo queries


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig17_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig17_HTML.jpg)

    **Figure 12-17** Execution plans for Gustavo queries


    A good example of how scalar functions can be moved off of key columns and into
    the parameters is when the functions `MONTH` and `YEAR` are used. Suppose a query
    needs to return all the sales orders for the year 2001 and for December. This
    could be accomplished with the first `SELECT` query in Listing [12-11](#338675_3_En_12_Chapter.xhtml#PC11).
    Unfortunately, using the `MONTH` and `YEAR` functions changes the value of `OrderDate`,
    and the index that was built is used but with a scan instead of a seek (see the
    first execution plan in Figure [12-20](#338675_3_En_12_Chapter.xhtml#Fig20)).
    This issue can be avoided by changing the query in such a way that, instead of
    using the functions, you filter against a range of values, such as in the second
    `SELECT` statement in Listing [12-11](#338675_3_En_12_Chapter.xhtml#PC11). As
    the second execution shows, the query is able to return the results with a seek
    instead of a scan, providing a significant reduction in reads, from 73 to 3, as
    shown in Figure [12-19](#338675_3_En_12_Chapter.xhtml#Fig19).


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig20_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig20_HTML.jpg)

    **Figure 12-20** Execution plans for date queries


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig19_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig19_HTML.jpg)

    **Figure 12-19** Execution plans for date queries


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesSalesOrderHeader_OrderDate ON Sales.SalesOrderHeader(OrderDate);

    SET STATISTICS IO ON;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = 12

    AND YEAR(OrderDate) = 2012;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE OrderDate BETWEEN ''20121201'' AND ''20121231'';

    SET STATISTICS IO OFF;

    ```


    **Listing 12-11** Queries on `FirstName` Gustavo


    It won’t always be possible to remove scalar functions from the `WHERE` clause
    of queries. One good example of this is if leading spaces were added to a column
    that should not be included when comparing the column values to parameters. In
    such a situation, you will need to think a little more “outside the box.” One
    possible solution is to use a computed column with an index on it, as suggested
    in the previous section.


    The important thing to remember when dealing with scalar functions in the `WHERE`
    clause is that if the function changes the value of a column, any index on the
    column most likely won’t be able to be used as efficiently as possible with the
    query. If the table is small and the queries will be infrequent, this may not
    be a significant problem. For larger systems, this may be the reason behind unexpected
    high numbers of scans on indexes and can lead to issues with blocking and deadlocks.


    ## Data Conversion


    One last area where queries can negatively affect how indexes are used is when
    the data types of columns change within a `JOIN` operation or `WHERE` clause.
    When data types don’t match in either of those conditions, SQL Server needs to
    convert the values in the columns to the same data types. If the data conversion
    is not included in the syntax of the query, SQL Server will attempt the data conversion
    behind the scenes.


    The reason that data conversions can have a negative effect on query performance
    is along the same lines as the issues related to scalar functions. If a column
    in an index needs to be changed from `varchar` to `int`, the statistics and other
    information for this index won’t be useful in determining the frequency and location
    of values. For instance, the number 10 and the string `"10"` would likely be sorted
    into entirely different positions in the same index. To illustrate the effect
    that data conversions can have on a query, start by executing the code in Listing
    [12-12](#338675_3_En_12_Chapter.xhtml#PC12).


    ```sql

    USE AdventureWorks2017

    GO

    SELECT BusinessEntityID

    ,CAST(FirstName as varchar(50)) as FirstName

    ,CAST(MiddleName as varchar(50)) as MiddleName

    ,CAST(LastName as varchar(50)) as LastName

    INTO PersonPerson

    FROM Person.Person;

    CREATE CLUSTERED INDEX IX_PersonPerson_ContactID ON PersonPerson (BusinessEntityID);

    CREATE INDEX IX_PersonContact_FirstName ON PersonPerson(FirstName);

    ```


    **Listing 12-12** Data Conversion Setup


    Listing [12-12](#338675_3_En_12_Chapter.xhtml#PC12) will create a table with `varchar`
    data in it. It will then add two indexes to the table that will be used in the
    demonstration queries. The two sample queries, shown in Listing [12-13](#338675_3_En_12_Chapter.xhtml#PC13),
    will be used to show how data conversions can affect the performance and utilization
    of an index. For both queries, the `RECOMPILE` option is being utilized to prevent
    bad parameter sniffing, which occurs when the option is not being used.'
  raw: '## Scalar Functions


    The previous few sections discussed filtering query results by searching within
    column values or by combining values across columns. This section looks at the
    effect of scalar functions used in the `WHERE` clauses of queries. Scalar functions
    provide the ability to transform values to other values that can be more useful
    than the original value when querying the database.


    User-defined scalar functions can also be created and used in the `WHERE` clause.
    The trouble with both system- and user-defined scalar functions is that if they
    transform the column where the index exists, then SQL Server is unable to use
    them efficiently. Because the values of the calculations are not known until runtime,
    the query optimizer does not have statistics to determine the frequency of values
    in the index or information on where the calculated values are located in the
    index or table.


    To demonstrate the effect of scalar functions on queries, consider the two queries
    in Listing [12-10](#338675_3_En_12_Chapter.xhtml#PC10) that return information
    from `Person.Person`. Both queries will return all rows that have the value `Gustavo`
    in the `FirstName` column. The difference between the two queries is that the
    second query will use the `RTRIM` function in the `WHERE` clause on the `FirstName`
    column.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo'';

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE RTRIM(FirstName) = ''Gustavo'';

    Listing 12-10

    Queries on FirstName Gustavo

    ```


    As the second execution plan in Figure [12-18](#338675_3_En_12_Chapter.xhtml#Fig18)
    shows, when the scalar function is added to the `WHERE` clause, the execution
    plan continues to use the same index as the first plan did, but leverages an index
    scan instead of an index seek. This change increases the I/Os from 2 to 99 (shown
    in Figure [12-17](#338675_3_En_12_Chapter.xhtml#Fig17)), which is similar to other
    examples. In this example, just excluding the scalar function, as in the first
    query, can provide the same results as with the function in place. That won’t
    be the case for all queries, but the way to allow indexes to be best used is to
    move the scalar function from the key columns to the parameters of a query.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig18_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig18_HTML.jpg)


    Figure 12-18


    Execution plans for Gustavo queries


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig17_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig17_HTML.jpg)


    Figure 12-17


    Execution plans for Gustavo queries


    A good example of how scalar functions can be moved off of key columns and into
    the parameters is when the functions `MONTH` and `YEAR` are used. Suppose a query
    needs to return all the sales orders for the year 2001 and for December. This
    could be accomplished with the first `SELECT` query in Listing [12-11](#338675_3_En_12_Chapter.xhtml#PC11).
    Unfortunately, using the `MONTH` and `YEAR` functions changes the value of `OrderDate`,
    and the index that was built is used but with a scan instead of a seek (see the
    first execution plan in Figure [12-20](#338675_3_En_12_Chapter.xhtml#Fig20)).
    This issue can be avoided by changing the query in such a way that, instead of
    using the functions, you filter against a range of values, such as in the second
    `SELECT` statement in Listing [12-11](#338675_3_En_12_Chapter.xhtml#PC11). As
    the second execution shows, the query is able to return the results with a seek
    instead of a scan, providing a significant reduction in reads, from 73 to 3, as
    shown in Figure [12-19](#338675_3_En_12_Chapter.xhtml#Fig19).


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig20_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig20_HTML.jpg)


    Figure 12-20


    Execution plans for date queries


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig19_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig19_HTML.jpg)


    Figure 12-19


    Execution plans for date queries


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesSalesOrderHeader_OrderDate ON Sales.SalesOrderHeader(OrderDate);

    SET STATISTICS IO ON;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = 12

    AND YEAR(OrderDate) = 2012;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE OrderDate BETWEEN ''20121201'' AND ''20121231'';

    SET STATISTICS IO OFF;

    Listing 12-11

    Queries on FirstName Gustavo

    ```


    It won’t always be possible to remove scalar functions from the `WHERE` clause
    of queries. One good example of this is if leading spaces were added to a column
    that should not be included when comparing the column values to parameters. In
    such a situation, you will need to think a little more “outside the box.” One
    possible solution is to use a computed column with an index on it, as suggested
    in the previous section.


    The important thing to remember when dealing with scalar functions in the `WHERE`
    clause is that if the function changes the value of a column, any index on the
    column most likely won’t be able to be used as efficiently as possible with the
    query. If the table is small and the queries will be infrequent, this may not
    be a significant problem. For larger systems, this may be the reason behind unexpected
    high numbers of scans on indexes and can lead to issues with blocking and deadlocks.


    ## Data Conversion


    One last area where queries can negatively affect how indexes are used is when
    the data types of columns change within a `JOIN` operation or `WHERE` clause.
    When data types don’t match in either of those conditions, SQL Server needs to
    convert the values in the columns to the same data types. If the data conversion
    is not included in the syntax of the query, SQL Server will attempt the data conversion
    behind the scenes.


    The reason that data conversions can have a negative effect on query performance
    is along the same lines as the issues related to scalar functions. If a column
    in an index needs to be changed from `varchar` to `int`, the statistics and other
    information for this index won’t be useful in determining the frequency and location
    of values. For instance, the number 10 and the string `"10"` would likely be sorted
    into entirely different positions in the same index. To illustrate the effect
    that data conversions can have on a query, start by executing the code in Listing
    [12-12](#338675_3_En_12_Chapter.xhtml#PC12).


    ```

    USE AdventureWorks2017

    GO

    SELECT BusinessEntityID

    ,CAST(FirstName as varchar(50)) as FirstName

    ,CAST(MiddleName as varchar(50)) as MiddleName

    ,CAST(LastName as varchar(50)) as LastName

    INTO PersonPerson

    FROM Person.Person;

    CREATE CLUSTERED INDEX IX_PersonPerson_ContactID ON PersonPerson (BusinessEntityID);

    CREATE INDEX IX_PersonContact_FirstName ON PersonPerson(FirstName);

    Listing 12-12

    Data Conversion Setup

    ```


    Listing [12-12](#338675_3_En_12_Chapter.xhtml#PC12) will create a table with `varchar`
    data in it. It will then add two indexes to the table that will be used in the
    demonstration queries. The two sample queries, shown in Listing [12-13](#338675_3_En_12_Chapter.xhtml#PC13),
    will be used to show how data conversions can affect the performance and utilization
    of an index. For both queries, the `RECOMPILE` option is being utilized to prevent
    bad parameter sniffing, which occurs when the option is not being used.'
  trans: '## 标量函数


    前面几个章节讨论了通过搜索列值或组合跨列的值来过滤查询结果。本节将探讨在查询的 `WHERE` 子句中使用标量函数所带来的影响。标量函数提供了将值转换为其他值的能力，这些转换后的值在查询数据库时可能比原始值更有用。


    用户定义的标量函数也可以在 `WHERE` 子句中创建和使用。系统定义和用户定义的标量函数都存在的问题是，如果它们转换了索引所在的列，那么 SQL Server
    就无法高效地使用这些函数。因为计算值的结果只有在运行时才能确定，查询优化器没有统计信息来确定索引中值的频率，也没有关于计算值在索引或表中位置的信息。


    为了演示标量函数对查询的影响，请考虑代码清单 12-10 中的两个查询，它们返回来自 `Person.Person` 的信息。两个查询都将返回 `FirstName`
    列中值为 `Gustavo` 的所有行。两个查询的区别在于，第二个查询将在 `WHERE` 子句中对 `FirstName` 列使用 `RTRIM` 函数。


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo'';

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE RTRIM(FirstName) = ''Gustavo'';

    ```


    **代码清单 12-10** 针对 `FirstName` Gustavo 的查询


    如图 12-18 中的第二个执行计划所示，当在 `WHERE` 子句中添加标量函数后，执行计划继续使用与第一个计划相同的索引，但采用了索引扫描而不是索引查找。这一变化使
    I/O 从 2 增加到 99（如图 12-17 所示），这与其它示例类似。在此示例中，正如第一个查询那样，只要排除标量函数，就能获得与使用函数相同的结果。但这并不适用于所有查询，而让索引得到最佳使用的方法是将标量函数从键列移动到查询的参数中。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig18_HTML.jpg](img/338675_3_En_12_Fig18_HTML.jpg)

    **图 12-18** Gustavo 查询的执行计划


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig17_HTML.jpg](img/338675_3_En_12_Fig17_HTML.jpg)

    **图 12-17** Gustavo 查询的执行计划


    关于如何将标量函数从键列移动到参数中的一个好例子，是使用 `MONTH` 和 `YEAR` 函数时。假设一个查询需要返回 2001 年 12 月的所有销售订单。这可以通过代码清单
    12-11 中的第一个 `SELECT` 查询来实现。不幸的是，使用 `MONTH` 和 `YEAR` 函数会改变 `OrderDate` 的值，尽管建立的索引仍然被使用，但使用的是扫描而非查找（参见图
    12-20 中的第一个执行计划）。这个问题可以通过改变查询方式来避免，即不使用函数，而是针对一个值范围进行筛选，如代码清单 12-11 中的第二个 `SELECT`
    语句所示。如第二个执行计划所示，查询能够通过查找而非扫描来返回结果，读取次数显著减少，从 73 降至 3，如图 12-19 所示。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig20_HTML.jpg](img/338675_3_En_12_Fig20_HTML.jpg)

    **图 12-20** 日期查询的执行计划


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig19_HTML.jpg](img/338675_3_En_12_Fig19_HTML.jpg)

    **图 12-19** 日期查询的执行计划


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesSalesOrderHeader_OrderDate ON Sales.SalesOrderHeader(OrderDate);

    SET STATISTICS IO ON;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = 12

    AND YEAR(OrderDate) = 2012;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE OrderDate BETWEEN ''20121201'' AND ''20121231'';

    SET STATISTICS IO OFF;

    ```


    **代码清单 12-11** 针对 `FirstName` Gustavo 的查询


    从查询的 `WHERE` 子句中移除标量函数并不总是可行的。一个很好的例子是，当某个列的值前被添加了前导空格，而在将列值与参数进行比较时不应包含这些空格。在这种情况下，你需要更“跳出框架”地思考。一种可能的解决方案是使用计算列并在其上建立索引，正如前一节所建议的那样。


    在处理 `WHERE` 子句中的标量函数时，需要记住的重要一点是：如果函数改变了列的值，那么该列上的任何索引很可能都无法被查询尽可能高效地使用。如果表很小且查询不频繁，这可能不是大问题。但对于大型系统，这可能是导致索引扫描次数意外增多的原因，并可能引发阻塞和死锁问题。


    ## 数据类型转换


    查询可能对索引使用方式产生负面影响的最后一个领域，是在 `JOIN` 操作或 `WHERE` 子句中更改列的数据类型时。当数据类型在这些情况下不匹配时，SQL
    Server 需要将列中的值转换为相同的数据类型。如果数据类型转换未包含在查询语法中，SQL Server 会在后台尝试进行转换。


    数据转换对查询性能产生负面影响的原因与标量函数相关的问题类似。如果索引中的一个列需要从 `varchar` 转换为 `int`，那么该索引的统计信息和其他信息将无法用于确定值的频率和位置。例如，数字
    10 和字符串 `"10"` 在同一个索引中很可能被排序到完全不同的位置。为了说明数据转换对查询可能产生的影响，首先执行代码清单 12-12 中的代码。


    ```sql

    USE AdventureWorks2017

    GO

    SELECT BusinessEntityID

    ,CAST(FirstName as varchar(50)) as FirstName

    ,CAST(MiddleName as varchar(50)) as MiddleName

    ,CAST(LastName as varchar(50)) as LastName

    INTO PersonPerson

    FROM Person.Person;

    CREATE CLUSTERED INDEX IX_PersonPerson_ContactID ON PersonPerson (BusinessEntityID);

    CREATE INDEX IX_PersonContact_FirstName ON PersonPerson(FirstName);

    ```


    **代码清单 12-12** 数据类型转换设置


    代码清单 12-12 将创建一个包含 `varchar` 数据的表。然后，它将向该表添加两个索引，用于演示查询。代码清单 12-13 中显示的两个示例查询，将用于展示数据类型转换如何影响索引的性能和利用率。这两个查询都使用了
    `RECOMPILE` 选项，以防止在未使用该选项时可能发生的参数嗅探问题。'
- fmt: '### Note


    关于参数嗅探的更多信息，请阅读 Paul White 在 [SQLPerformance.com](http://sqlperformance.com) 上的文章
    [《Parameter Sniffing, Embedding, and the RECOMPILE Options》](http://sqlperformance.com/2013/08/t-sql-queries/parameter-sniffing-embedding-and-the-recompile-options)。


    第一个 `SELECT` 查询使用了 `nvarchar` 数据类型的 `@FirstName` 变量。此数据类型与表 `PersonContact` 中列的
    `varchar` 数据类型不匹配，因此必须将表中的列从 `varchar` 转换为 `nvarchar`。该查询的执行计划（图 [12-21](#338675_3_En_12_Chapter.xhtml#Fig21)）显示，查询使用非聚集索引的索引查找来满足查询，并且谓词正在将列中的数据转换为
    `nvarchar`，同时对非聚集索引中未包含的列进行聚集索引键查找。另请注意，第一个查询的开销占批处理总开销（仅这两个查询）的 40%。


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    DECLARE @FirstName nvarchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    GO

    DECLARE @FirstName varchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    ```


    **Listing 12-13** 隐式转换查询


    ### Note


    执行计划中为运算符显示的附加信息可在 SQL Server Management Studio 的“属性”窗口中找到。“属性”窗口包含了有关操作的有用信息，包括用于估计行数和实际行数的列。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig21_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig21_HTML.jpg)


    **Figure 12-21** 包含隐式数据转换的执行计划


    图 [12-22](#338675_3_En_12_Chapter.xhtml#Fig22) 的执行计划中另一个需要注意的项是，第一个查询的 `SELECT`
    操作上包含的警告。随着 SQL Server 2012 的发布，现在执行计划中包含了涉及隐式转换的新警告消息。警告消息显示为一个带有感叹号的黄色三角形。检查运算符的属性将包含运算符的属性和警告消息。这些消息包含详细说明正在转换的列以及与问题相关的信息。在本例中，问题是
    `SeekPlan ConvertIssue`。换句话说，SQL Server 没有关于转换后数据的统计信息来构建了解谓词中值频率的执行计划。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig22_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig22_HTML.jpg)


    **Figure 12-22** 隐式转换附带的警告


    列表 [12-13](#338675_3_En_12_Chapter.xhtml#PC13) 中的第二个 `SELECT` 查询使用了 `varchar`
    数据类型的变量。由于此数据类型已经与表中列的数据类型匹配，因此可以使用非聚集索引。如图 [12-23](#338675_3_En_12_Chapter.xhtml#Fig23)
    的执行计划所示，通过匹配的数据类型，查询优化器可以构建一个了解索引中行位置的计划，并执行查找来获取它们。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig23_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig23_HTML.jpg)


    **Figure 12-23** 无数据转换的执行计划


    尽管第二个查询中的操作更多，复杂性似乎更高（特别是包含键查找时），这可能会导致预期性能更差，但事实并非如此。如果我们查看图 [12-24](#338675_3_En_12_Chapter.xhtml#Fig24)
    中 `STATISTICS IO` 显示的逻辑读取，就可以看到这一点。对于第一个查询，使用聚集索引扫描时的读取次数是 89 次逻辑读取。第二个查询在访问两个索引时仅有
    18 次读取。读取次数的差异是因为扫描聚集索引所需的读取次数比查找结果所需行子集并查找聚集中缺失列所需的读取次数更多。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig24_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig24_HTML.jpg)


    **Figure 12-24** 隐式转换查询的 `STATISTICS IO`


    在本节中，讨论主要集中在隐式数据转换上。虽然这些转换可能比显式数据转换更隐蔽，但相同的缓解概念和方法也适用于这些数据转换。由于它们更具意图性，因此应该更少发生。即便如此，在执行数据转换时，也要密切注意数据类型，因为它们的变化方式会影响查询性能和索引利用率。


    ## Summary


    在本章中，我们研究了查询对索引能否提供预期性能改进的影响。有时特定类型的索引可能不适合某种情况，例如在大表中搜索字符值内的值。在其他情况下，在正确的位置应用正确类型的索引或函数可以显著影响查询是否能利用索引。


    在本章的许多示例中，索引的不当使用是当它使用索引扫描而不是索引查找操作时。对于这些场景，索引查找是理想的索引操作。但这并不总是如此，有些情况下对索引的扫描明显比查找操作更理想。重要的是要记住环境所针对的事务类型以及正在访问的表的大小。


    本章的主要要点是，在编写查询时应谨慎。在开发数据库代码时所做的选择，可能会完全破坏为正确索引数据库所做的工作。确保用充分利用索引最大效能的代码来补充你的索引。'
  raw: '### Note


    For more information on parameter sniffing, read Paul White’s “Parameter Sniffing,
    Embedding, and the RECOMPILE Options” article on [SQLPerformance.​com](http://sqlperformance.com)
    at [`http://sqlperformance.com/2013/08/t-sql-queries/parameter-sniffing-embedding-and-the-recompile-options`](http://sqlperformance.com/2013/08/t-sql-queries/parameter-sniffing-embedding-and-the-recompile-options).


    The first `SELECT` query uses the `@FirstName` variable with the `nvarchar` data
    type. This data type does not match the data type for the column in the table
    `PersonContact`, so the column in the table must be converted from `varchar` to
    `nvarchar`. The execution plan for the query (Figure [12-21](#338675_3_En_12_Chapter.xhtml#Fig21))
    shows that the query is using an index seek on the nonclustered index to satisfy
    the query, and the predicate is converting the data in the column to `nvarchar`,
    with a key lookup on the clustered index for the columns not in the nonclustered
    index. Also note that the cost for the first query is 40 percent of the total
    batch, which is just the two queries.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    DECLARE @FirstName nvarchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    GO

    DECLARE @FirstName varchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    Listing 12-13

    Implicit Conversion Queries

    ```


    ### Note


    The additional information shown for the operators in the execution plans is available
    in the Properties window in SQL Server Management Studio. The Properties windows
    is full of useful information about the operations from the columns that are used
    for estimated and actual row counts.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig21_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig21_HTML.jpg)


    Figure 12-21


    Execution plans with implicit data conversion


    One other item to note in the execution plan in Figure [12-22](#338675_3_En_12_Chapter.xhtml#Fig22)
    is the warning included on the `SELECT` operation for the first query. With the
    release of SQL Server 2012, there are now new warning messages included in execution
    plans that contain implicit conversions. The warning message appears as a yellow
    triangle with an exclamation point in it. Checking the properties for the operator
    will include properties of the operator and the warning message. These messages
    include information detailing what column is being converted and the issue associated
    with the problem. In this case, the issue is `SeekPlan ConvertIssue`. In other
    words, SQL Server doesn’t have statistics on the converted data to build an execution
    plan that knows the frequency of the values in the predicate.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig22_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig22_HTML.jpg)


    Figure 12-22


    Warning included with implicit conversion


    The second `SELECT` query in Listing [12-13](#338675_3_En_12_Chapter.xhtml#PC13)
    uses a variable with a `varchar` data type. Since this data type already matches
    the data type of the column in the table, the nonclustered index can be used.
    As the execution plan in Figure [12-23](#338675_3_En_12_Chapter.xhtml#Fig23) shows,
    with matching data types the query optimizer can build a plan that knows where
    the rows in the index are and can perform a seek to obtain them.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig23_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig23_HTML.jpg)


    Figure 12-23


    Execution plans without data conversion


    Even though there are more operations in the second query and the complexity seems
    higher which might be expected to perform worse, especially with the inclusion
    of the key lookup, this isn’t the case. We can see this if we review the logical
    reads from `STATISTICS IO`, shown in Figure [12-24](#338675_3_En_12_Chapter.xhtml#Fig24).
    For the first query, the number of reads was 89 logical reads with an index scan
    on the clustered index. The second query had only 18 reads while accessing two
    indexes. The difference in the reads is because scanning the clustered index requires
    more reads than it takes to find the subset of rows required in the results and
    looking up missing columns from the clustered index.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig24_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig24_HTML.jpg)


    Figure 12-24


    STATISTICS IO for implicit conversion queries


    In this section, the discussion mostly focused on implicit data conversions. While
    these can be more silent than explicit data conversions, the same concepts and
    mitigations apply to these data conversions. Since they are more intentional,
    they should be less frequent. Even so, when performing data conversions, pay close
    attention to the data types because how they are changed will impact query performance
    and index utilization.


    ## Summary


    In this chapter, we examined the effect that queries can have on whether indexes
    can provide the expected performance improvements. There are times when a specific
    type of index may not be appropriate for a situation, such as searching for values
    within character values in large tables. In other situations, applying the right
    type of index or function in the right place can have a significant impact on
    whether the query can utilize an index.


    In many of the examples in this chapter, the offending usage of an index was when
    it utilized a scan on the index instead of a seek operation. For these scenarios,
    index seeks were the ideal index operation. This won’t always be the case and
    there are situations where scans against an index are significantly more ideal
    than seek operations. It’s important to remember what type of transactions the
    environment is geared for and the size of the tables that are being accessed.


    The main takeaway from this chapter is that you should take care when writing
    queries. The choices made when developing database code can completely unravel
    the work done to properly index a database. Be sure to complement your indexes
    with code that leverages them to their max.'
