  trans: '# 13. 监控索引


    在本书中，我们已经讨论了索引是什么、它们的作用、构建索引的模式，以及确定 SQL Server 数据库应如何建立索引的许多其他方面。所有这些信息都是数据库索引建立过程中的最后一部分——分析数据库以确定所需索引——的必要基础。为此，本章及随后两章将整合我们需要的信息，以实施一套索引方法论。


    首先，在本章中，我们将讨论一种可用于监控索引的通用实践。它将包含可以采取的步骤，用以观察索引的行为并理解它们如何影响你的环境。此方法论可应用于单个数据库、一个服务器，或你的整个
    SQL Server 环境。无论数据库支持何种操作或业务，都可以采用类似的监控流程。


    监控索引背后的主要目标是能够收集有关索引的信息。这些信息将来自多种来源。这些监控来源应该很熟悉，因为它们常用于与索引类似的调优任务，例如性能调优。对于某些来源，信息会随时间推移而收集，以提供总体趋势的概览。对于其他来源，在特定时间点的快照就足够了。随时间推移收集信息以提供比较性能的基准非常重要；这将帮助我们了解索引使用情况和有效性何时发生变化。


    如前所述，有多种来源可用于收集信息以监控你的索引。本章将讨论的来源是


    *   性能计数器

    *   动态管理对象

    *   事件跟踪


    对于这些来源中的每一个，后续章节将描述需要收集的内容，并提供关于如何收集这些信息的指导。在本章结束时，我们将拥有一个框架，该框架能够提供启动分析阶段所需的信息。


    ### 注意


    本章的所有监控信息都将收集在一个名为 `IndexingMethod` 的数据库中。脚本可以在该数据库中运行，也可以在你自己的性能监控数据库中运行。


    ## 性能计数器


    索引监控信息的第一个来源是 SQL Server 性能计数器。性能计数器是 Microsoft 提供的指标，用于测量服务器上应用程序和硬件中事件的发生速率或资源的状态。对于其中一些性能计数器，存在通用准则，可用于指示何时可能存在索引问题。对于其他计数器，其速率或级别的变化可能表明需要更改服务器上的索引。


    使用性能计数器的主要问题在于，它们代表的是服务器级别或 SQL Server 实例级别的计数器状态。它们并不指示具体是在哪个数据库或表级别发生了潜在的索引问题。然而，考虑到可用于监控索引和识别潜在索引需求的其他工具，这种详细程度是可以接受且有用的。在此级别收集计数器信息的一个优势是，我们被迫考虑全局情况以及所有索引对性能的综合影响。在孤立的情况下，一张表上几个性能不佳的索引可能是可以接受的。然而，如果再加上其他索引不佳的表，总体性能可能会达到一个临界点，此时需要处理索引问题。借助性能计数器提供的服务器级别统计数据，我们将能够识别何时达到了这个临界点。


    SQL Server 和 Windows Server 都有大量的性能计数器可用。然而，从索引的角度来看，许多性能计数器可以被排除。最有用的性能计数器是那些与索引操作或访问方式相关的操作映射的计数器，例如转送记录和索引搜索。有关最有用的索引相关性能计数器的定义，请参见
    `表 13-1`。收集每个计数器的原因以及它们如何影响索引决策将在下一章讨论。


    ### 表 13-1


    索引相关性能计数器


    | 选项名称 | 描述 |

    | --- | --- |

    | `Access Methods\Forwarded Records/sec` | 每秒通过转送记录指针获取的记录数。 |

    | `Access Methods\FreeSpace Page Fetches/sec` | 每秒在分配给对象的页中获取页以插入或修改记录的次数。 |

    | `Access Methods\FreeSpace Scans/sec` | 每秒启动的扫描次数，用于在分配给对象的页中搜索空闲空间以插入或修改记录。
    |

    | `Access Methods\Full Scans/sec` | 每秒无限制的完整扫描次数。这些可以是基表扫描或完整索引扫描。 |

    | `Access Methods\Index Searches/sec` | 每秒索引搜索次数。这些搜索用于启动范围扫描、获取单个索引记录以及重新定位索引。
    |

    | `Access Methods\Page compression attempts/sec` | 每秒使用 PAGE 压缩尝试压缩页的次数，这将包括失败的页面压缩。
    |

    | `Access Methods\Pages compressed/sec` | 每秒使用 PAGE 压缩成功压缩的页数。 |

    | `Access Methods\Page Splits/sec` | 每秒由于索引页溢出而发生的页拆分次数。 |

    | `Buffer Manager\Page Lookups/sec` | 在缓冲池中查找页的请求数。 |

    | `Locks(*)\Lock Wait Time (ms)` | 上一秒中锁的总等待时间（以毫秒计）。 |

    | `Locks(*)\Lock Waits/sec` | 每秒需要调用方等待的锁请求数。 |

    | `Locks(*)\Number of Deadlocks/sec` | 每秒导致死锁的锁请求数。 |

    | `SQL Statistics\ Batch Requests/sec` | 每秒收到的 Transact-SQL 命令批次数。 |'
- fmt: "There are a number of ways to collect performance counters. For the monitoring\
    \ in this chapter, we’ll use the DMV `sys.dm_os_performance_counters`. This DMV\
    \ returns a row for all the SQL Server counters for an instance. The values returned\
    \ are the raw values for the counters, so depending on the type of counter, the\
    \ value can be a point-in-time state value or an ever-accumulating aggregate.\n\
    \nTo begin collecting performance counter information for monitoring, we’ll first\
    \ need to create a table for storing this information. The table definition in\
    \ Listing 13-1 provides for this need. When collecting the performance counters,\
    \ we will use a table that stores the counter name with the value and then datestamps\
    \ each row to identify when the information was collected.\n\n```\nUSE IndexingMethod;\n\
    GO\nCREATE TABLE dbo.IndexingCounters\n(\n    counter_id INT IDENTITY(1, 1),\n\
    \    create_date DATETIME2(0),\n    server_name VARCHAR(128) NOT NULL,\n    object_name\
    \ VARCHAR(128) NOT NULL,\n    counter_name VARCHAR(128) NOT NULL,\n    instance_name\
    \ VARCHAR(128) NULL,\n    Calculated_Counter_value FLOAT NULL,\n    CONSTRAINT\
    \ PK_IndexingCounters\n        PRIMARY KEY CLUSTERED (counter_id)\n);\nGO\nCREATE\
    \ NONCLUSTERED INDEX IX_IndexingCounters_CounterName\nON dbo.IndexingCounters\
    \ (counter_name)\nINCLUDE (create_date, server_name, object_name, Calculated_Counter_value);\n\
    ```\nListing 13-1\nPerformance Counter Snapshot Table\n\nFor the purposes of collecting\
    \ information for monitoring indexing, we’ll take the information from `sys.dm_os_performance_counters`\
    \ and calculate the appropriate values from the DMV. These would be the same values\
    \ that are available when viewing performance counter information from other tools,\
    \ such as Performance Monitor. There are a few steps required to populate `dbo.IndexingCounters`.\
    \ As mentioned, the DMV contains raw counter values. To calculate these values\
    \ properly, it is necessary to take a snapshot of the values in the DMV and then\
    \ wait a number of seconds before calculating the counter value. In Listing 13-2,\
    \ the counter value is calculated after 10 seconds. Once the time has expired,\
    \ the counters are calculated and inserted into the `dbo.IndexingCounters` tables.\
    \ This script should be scheduled and executed frequently. Ideally, we should\
    \ collect this information every 1–5 minutes.\n\n### Note\n\nPerformance counter\
    \ information can be collected more frequently. For instance, Performance Monitor\
    \ defaults to every 15 seconds. For the purposes of index monitoring, that frequency\
    \ is not necessary.\n\n```\nDROP TABLE IF EXISTS #Counters;\nSELECT pc.object_name,\n\
    \       pc.counter_name\nINTO   #Counters\nFROM   sys.dm_os_performance_counters\
    \ pc\nWHERE  pc.cntr_type IN ( 272696576, 1073874176 )\n       AND (\n       \
    \     pc.object_name LIKE '%:Access Methods%'\n            AND (\n           \
    \     pc.counter_name LIKE 'Forwarded Records/sec%'\n                OR pc.counter_name\
    \ LIKE 'FreeSpace Scans/sec%'\n                OR pc.counter_name LIKE 'FreeSpace\
    \ Page Fetches/sec%'\n                OR pc.counter_name LIKE 'Full Scans/sec%'\n\
    \                OR pc.counter_name LIKE 'Index Searches/sec%'\n             \
    \   OR pc.counter_name LIKE 'Page Splits/sec%'\n                OR pc.counter_name\
    \ LIKE 'Page compression attempts/sec%'\n                OR pc.counter_name LIKE\
    \ 'Pages compressed/sec%'\n            )\n       )\n       OR (\n            pc.object_name\
    \ LIKE '%:Buffer Manager%'\n            AND (\n                pc.counter_name\
    \ LIKE 'Page life expectancy%'\n                OR pc.counter_name LIKE 'Page\
    \ lookups/sec%'\n            )\n       )\n       OR (\n            pc.object_name\
    \ LIKE '%:Locks%'\n            AND (\n                pc.counter_name LIKE 'Lock\
    \ Wait Time (ms)%'\n                OR pc.counter_name LIKE 'Lock Waits/sec%'\n\
    \                OR pc.counter_name LIKE 'Number of Deadlocks/sec%'\n        \
    \    )\n       )\n       OR (\n            pc.object_name LIKE '%:SQL Statistics%'\n\
    \            AND pc.counter_name LIKE 'Batch Requests/sec%'\n       )\nGROUP BY\
    \ pc.object_name,\n         pc.counter_name;\nDROP TABLE IF EXISTS #Baseline;\n\
    SELECT GETDATE() AS sample_time,\n       pc1.object_name,\n       pc1.counter_name,\n\
    \       pc1.instance_name,\n       pc1.cntr_value,\n       pc1.cntr_type,\n  \
    \     x.cntr_value AS base_cntr_value\nINTO   #Baseline\nFROM   sys.dm_os_performance_counters\
    \ pc1\n       INNER JOIN #Counters c\n              ON c.object_name = pc1.object_name\n\
    \                 AND c.counter_name = pc1.counter_name\n       OUTER APPLY (SELECT\
    \ cntr_value\n                    FROM   sys.dm_os_performance_counters pc2\n\
    \                    WHERE  pc2.cntr_type           = 1073939712\n           \
    \                AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)\n     \
    \                      AND pc1.object_name         = pc2.object_name\n       \
    \                    AND pc1.instance_name       = pc2.instance_name) x;\nWAITFOR\
    \ DELAY '00:00:15';\nINSERT INTO dbo.IndexingCounters (\n    create_date,\n  \
    \  server_name,\n    object_name,\n    counter_name,\n    instance_name,\n   \
    \ Calculated_Counter_value\n)\nSELECT GETDATE(),\n       LEFT(pc1.object_name,\
    \ CHARINDEX(':', pc1.object_name) - 1),\n       SUBSTRING(pc1.object_name, 1 +\
    \ CHARINDEX(':', pc1.object_name), LEN(pc1.object_name)),\n       pc1.counter_name,\n\
    \       pc1.instance_name,\n       CASE\n           WHEN pc1.cntr_type = 65792\
    \ THEN pc1.cntr_value\n           WHEN pc1.cntr_type = 272696576 THEN\n      \
    \         COALESCE((1. * pc1.cntr_value - x.cntr_value) / NULLIF(DATEDIFF(s, sample_time,\
    \ GETDATE()), 0), 0)\n           WHEN pc1.cntr_type = 537003264 THEN COALESCE((1.\
    \ * pc1.cntr_value) / NULLIF(base.cntr_value, 0), 0)\n           WHEN pc1.cntr_type\
    \ = 1073874176 THEN\n               COALESCE(\n                   (1. * pc1.cntr_value\
    \ - x.cntr_value) / NULLIF(base.cntr_value - x.base_cntr_value, 0)\n         \
    \          / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),\n               \
    \    0\n               )\n       END AS real_cntr_value\nFROM   sys.dm_os_performance_counters\
    \ pc1\n       INNER JOIN #Counters c\n              ON c.object_name = pc1.object_name\n\
    \                 AND c.counter_name = pc1.counter_name\n       OUTER APPLY (SELECT\
    \ cntr_value,\n                           base_cntr_value,\n                 \
    \          sample_time\n                    FROM   #Baseline b\n             \
    \       WHERE  b.object_name   = pc1.object_name\n                           AND\
    \ b.counter_name  = pc1.counter_name\n                           AND b.instance_name\
    \ = pc1.instance_name) x\n       OUTER APPLY (SELECT cntr_value\n            \
    \        FROM   sys.dm_os_performance_counters pc2\n                    WHERE\
    \  pc2.cntr_type           = 1073939712\n                           AND UPPER(pc1.counter_name)\
    \ = UPPER(pc2.counter_name)\n                           AND pc1.object_name  \
    \       = pc2.object_name\n                           AND pc1.instance_name  \
    \     = pc2.instance_name) base;\n```\nListing 13-2\nPerformance Counter Snapshot\
    \ Script"
  raw: 'There are a number of ways to collect performance counters. For the monitoring
    in this chapter, we’ll use the DMV `sys.dm_os_performance_counters`. This DMV
    returns a row for all the SQL Server counters for an instance. The values returned
    are the raw values for the counters, so depending on the type of counter, the
    value can be a point-in-time state value or an ever-accumulating aggregate.


    To begin collecting performance counter information for monitoring, we’ll first
    need to create a table for storing this information. The table definition in Listing
    [13-1](#338675_3_En_13_Chapter.xhtml#PC1) provides for this need. When collecting
    the performance counters, we will use a table that stores the counter name with
    the value and then datestamps each row to identify when the information was collected.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCounters

    (

    counter_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    Calculated_Counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCounters

    PRIMARY KEY CLUSTERED (counter_id)

    );

    GO

    CREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName

    ON dbo.IndexingCounters (counter_name)

    INCLUDE (create_date, server_name, object_name, Calculated_Counter_value);

    Listing 13-1

    Performance Counter Snapshot Table

    ```


    For the purposes of collecting information for monitoring indexing, we’ll take
    the information from `sys.dm_os_performance_counters` and calculate the appropriate
    values from the DMV. These would be the same values that are available when viewing
    performance counter information from other tools, such as Performance Monitor.
    There are a few steps required to populate `dbo.IndexingCounters`. As mentioned,
    the DMV contains raw counter values. To calculate these values properly, it is
    necessary to take a snapshot of the values in the DMV and then wait a number of
    seconds before calculating the counter value. In Listing [13-2](#338675_3_En_13_Chapter.xhtml#PC2),
    the counter value is calculated after 10 seconds. Once the time has expired, the
    counters are calculated and inserted into the `dbo.IndexingCounters` tables .
    This script should be scheduled and executed frequently. Ideally, we should collect
    this information every 1–5 minutes.


    ### Note


    Performance counter information can be collected more frequently. For instance,
    Performance Monitor defaults to every 15 seconds. For the purposes of index monitoring,
    that frequency is not necessary.


    ```

    DROP TABLE IF EXISTS #Counters;

    SELECT pc.object_name,

    pc.counter_name

    INTO #Counters

    FROM sys.dm_os_performance_counters pc

    WHERE pc.cntr_type IN ( 272696576, 1073874176 )

    AND (

    pc.object_name LIKE ''%:Access Methods%''

    AND (

    pc.counter_name LIKE ''Forwarded Records/sec%''

    OR pc.counter_name LIKE ''FreeSpace Scans/sec%''

    OR pc.counter_name LIKE ''FreeSpace Page Fetches/sec%''

    OR pc.counter_name LIKE ''Full Scans/sec%''

    OR pc.counter_name LIKE ''Index Searches/sec%''

    OR pc.counter_name LIKE ''Page Splits/sec%''

    OR pc.counter_name LIKE ''Page compression attempts/sec%''

    OR pc.counter_name LIKE ''Pages compressed/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Buffer Manager%''

    AND (

    pc.counter_name LIKE ''Page life expectancy%''

    OR pc.counter_name LIKE ''Page lookups/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Locks%''

    AND (

    pc.counter_name LIKE ''Lock Wait Time (ms)%''

    OR pc.counter_name LIKE ''Lock Waits/sec%''

    OR pc.counter_name LIKE ''Number of Deadlocks/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:SQL Statistics%''

    AND pc.counter_name LIKE ''Batch Requests/sec%''

    )

    GROUP BY pc.object_name,

    pc.counter_name;

    DROP TABLE IF EXISTS #Baseline;

    SELECT GETDATE() AS sample_time,

    pc1.object_name,

    pc1.counter_name,

    pc1.instance_name,

    pc1.cntr_value,

    pc1.cntr_type,

    x.cntr_value AS base_cntr_value

    INTO #Baseline

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) x;

    WAITFOR DELAY ''00:00:15'';

    INSERT INTO dbo.IndexingCounters (

    create_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    Calculated_Counter_value

    )

    SELECT GETDATE(),

    LEFT(pc1.object_name, CHARINDEX('':'', pc1.object_name) - 1),

    SUBSTRING(pc1.object_name, 1 + CHARINDEX('':'', pc1.object_name), LEN(pc1.object_name)),

    pc1.counter_name,

    pc1.instance_name,

    CASE

    WHEN pc1.cntr_type = 65792 THEN pc1.cntr_value

    WHEN pc1.cntr_type = 272696576 THEN

    COALESCE((1\. * pc1.cntr_value - x.cntr_value) / NULLIF(DATEDIFF(s, sample_time,
    GETDATE()), 0), 0)

    WHEN pc1.cntr_type = 537003264 THEN COALESCE((1\. * pc1.cntr_value) / NULLIF(base.cntr_value,
    0), 0)

    WHEN pc1.cntr_type = 1073874176 THEN

    COALESCE(

    (1\. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value - x.base_cntr_value,
    0)

    / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),


    ) END AS real_cntr_value

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value,

    base_cntr_value,

    sample_time

    FROM #Baseline b

    WHERE b.object_name   = pc1.object_name

    AND b.counter_name  = pc1.counter_name

    AND b.instance_name = pc1.instance_name

    ) x

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) base;

    Listing 13-2

    Performance Counter Snapshot Script

    ```'
  trans: "\n收集性能计数器的方式有多种。本章的监控将使用动态管理视图 `sys.dm_os_performance_counters`。该 DMV 会为实例的所有\
    \ SQL Server 计数器返回一行。返回的值是计数器的原始值，因此根据计数器的类型，该值可能是一个时间点状态值，也可能是一个持续累加的聚合值。\n\n\
    为了开始收集用于监控的性能计数器信息，我们首先需要创建一个表来存储这些信息。清单 13-1 中的表定义满足了此需求。在收集性能计数器时，我们将使用一个表来存储计数器名称及其值，并为每行添加日期戳以标识信息收集的时间。\n\
    \n```\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCounters\n(\n    counter_id\
    \ INT IDENTITY(1, 1),\n    create_date DATETIME2(0),\n    server_name VARCHAR(128)\
    \ NOT NULL,\n    object_name VARCHAR(128) NOT NULL,\n    counter_name VARCHAR(128)\
    \ NOT NULL,\n    instance_name VARCHAR(128) NULL,\n    Calculated_Counter_value\
    \ FLOAT NULL,\n    CONSTRAINT PK_IndexingCounters\n        PRIMARY KEY CLUSTERED\
    \ (counter_id)\n);\nGO\nCREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName\n\
    ON dbo.IndexingCounters (counter_name)\nINCLUDE (create_date, server_name, object_name,\
    \ Calculated_Counter_value);\n```\n清单 13-1\n性能计数器快照表\n\n为了收集用于索引监控的信息，我们将从 `sys.dm_os_performance_counters`\
    \ 获取信息，并从该 DMV 计算出相应的值。这些值与从其他工具（如性能监视器）查看性能计数器信息时可用的值相同。要填充 `dbo.IndexingCounters`\
    \ 需要几个步骤。如前所述，DMV 包含的是原始计数器值。为了正确计算这些值，有必要对 DMV 中的值进行快照，然后等待若干秒后再计算计数器值。在清单 13-2\
    \ 中，计数器值在 10 秒后计算。一旦时间到期，计数器将被计算并插入到 `dbo.IndexingCounters` 表中。此脚本应被计划并频繁执行。理想情况下，我们应该每\
    \ 1-5 分钟收集一次此信息。\n\n### 注意\n\n性能计数器信息可以更频繁地收集。例如，性能监视器默认为每 15 秒收集一次。出于索引监控的目的，不需要那么高的频率。\n\
    \n```\nDROP TABLE IF EXISTS #Counters;\nSELECT pc.object_name,\n       pc.counter_name\n\
    INTO   #Counters\nFROM   sys.dm_os_performance_counters pc\nWHERE  pc.cntr_type\
    \ IN ( 272696576, 1073874176 )\n       AND (\n            pc.object_name LIKE\
    \ '%:Access Methods%'\n            AND (\n                pc.counter_name LIKE\
    \ 'Forwarded Records/sec%'\n                OR pc.counter_name LIKE 'FreeSpace\
    \ Scans/sec%'\n                OR pc.counter_name LIKE 'FreeSpace Page Fetches/sec%'\n\
    \                OR pc.counter_name LIKE 'Full Scans/sec%'\n                OR\
    \ pc.counter_name LIKE 'Index Searches/sec%'\n                OR pc.counter_name\
    \ LIKE 'Page Splits/sec%'\n                OR pc.counter_name LIKE 'Page compression\
    \ attempts/sec%'\n                OR pc.counter_name LIKE 'Pages compressed/sec%'\n\
    \            )\n       )\n       OR (\n            pc.object_name LIKE '%:Buffer\
    \ Manager%'\n            AND (\n                pc.counter_name LIKE 'Page life\
    \ expectancy%'\n                OR pc.counter_name LIKE 'Page lookups/sec%'\n\
    \            )\n       )\n       OR (\n            pc.object_name LIKE '%:Locks%'\n\
    \            AND (\n                pc.counter_name LIKE 'Lock Wait Time (ms)%'\n\
    \                OR pc.counter_name LIKE 'Lock Waits/sec%'\n                OR\
    \ pc.counter_name LIKE 'Number of Deadlocks/sec%'\n            )\n       )\n \
    \      OR (\n            pc.object_name LIKE '%:SQL Statistics%'\n           \
    \ AND pc.counter_name LIKE 'Batch Requests/sec%'\n       )\nGROUP BY pc.object_name,\n\
    \         pc.counter_name;\nDROP TABLE IF EXISTS #Baseline;\nSELECT GETDATE()\
    \ AS sample_time,\n       pc1.object_name,\n       pc1.counter_name,\n       pc1.instance_name,\n\
    \       pc1.cntr_value,\n       pc1.cntr_type,\n       x.cntr_value AS base_cntr_value\n\
    INTO   #Baseline\nFROM   sys.dm_os_performance_counters pc1\n       INNER JOIN\
    \ #Counters c\n              ON c.object_name = pc1.object_name\n            \
    \     AND c.counter_name = pc1.counter_name\n       OUTER APPLY (SELECT cntr_value\n\
    \                    FROM   sys.dm_os_performance_counters pc2\n             \
    \       WHERE  pc2.cntr_type           = 1073939712\n                        \
    \   AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)\n                  \
    \         AND pc1.object_name         = pc2.object_name\n                    \
    \       AND pc1.instance_name       = pc2.instance_name) x;\nWAITFOR DELAY '00:00:15';\n\
    INSERT INTO dbo.IndexingCounters (\n    create_date,\n    server_name,\n    object_name,\n\
    \    counter_name,\n    instance_name,\n    Calculated_Counter_value\n)\nSELECT\
    \ GETDATE(),\n       LEFT(pc1.object_name, CHARINDEX(':', pc1.object_name) - 1),\n\
    \       SUBSTRING(pc1.object_name, 1 + CHARINDEX(':', pc1.object_name), LEN(pc1.object_name)),\n\
    \       pc1.counter_name,\n       pc1.instance_name,\n       CASE\n          \
    \ WHEN pc1.cntr_type = 65792 THEN pc1.cntr_value\n           WHEN pc1.cntr_type\
    \ = 272696576 THEN\n               COALESCE((1. * pc1.cntr_value - x.cntr_value)\
    \ / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0), 0)\n           WHEN pc1.cntr_type\
    \ = 537003264 THEN COALESCE((1. * pc1.cntr_value) / NULLIF(base.cntr_value, 0),\
    \ 0)\n           WHEN pc1.cntr_type = 1073874176 THEN\n               COALESCE(\n\
    \                   (1. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value\
    \ - x.base_cntr_value, 0)\n                   / NULLIF(DATEDIFF(s, sample_time,\
    \ GETDATE()), 0),\n                   0\n               )\n       END AS real_cntr_value\n\
    FROM   sys.dm_os_performance_counters pc1\n       INNER JOIN #Counters c\n   \
    \           ON c.object_name = pc1.object_name\n                 AND c.counter_name\
    \ = pc1.counter_name\n       OUTER APPLY (SELECT cntr_value,\n               \
    \            base_cntr_value,\n                           sample_time\n      \
    \              FROM   #Baseline b\n                    WHERE  b.object_name  \
    \ = pc1.object_name\n                           AND b.counter_name  = pc1.counter_name\n\
    \                           AND b.instance_name = pc1.instance_name) x\n     \
    \  OUTER APPLY (SELECT cntr_value\n                    FROM   sys.dm_os_performance_counters\
    \ pc2\n                    WHERE  pc2.cntr_type           = 1073939712\n     \
    \                      AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)\n\
    \                           AND pc1.object_name         = pc2.object_name\n  \
    \                         AND pc1.instance_name       = pc2.instance_name) base;\n\
    ```\n清单 13-2\n性能计数器快照脚本\n"
- fmt: "# 监控 SQL Server 索引性能\n\n首次为索引收集性能计数器时，我们无法将这些计数器与其他合理的 SQL Server 值进行比较。然而，随着时间的推移，我们可以保留之前的性能计数器样本以便进行对比。作为监控的一部分，我们将负责识别性能计数器值代表您环境典型活动的时段。为了存储这些值，请将它们插入到一个类似于清单\
    \ [13-3](#338675_3_En_13_Chapter.xhtml#PC3) 的表中。该表包含开始和结束日期以指示基线所代表的范围。此外，还有最小值、最大值、平均值和标准差列用于存储从收集的计数器中获取的值。最小值和最大值有助于理解性能计数器的变化情况。平均值提供了计数器值“良好”时大概是多少的概念。标准差让我们了解计数器值的变异性。数字越低，表示计数器值越频繁地聚集在平均值附近。数值越高则表明计数器值变化更频繁，且通常更接近最小值和最大值。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCountersBaseline\n\
    (\ncounter_baseline_id INT IDENTITY(1, 1),\nstart_date DATETIME2(0),\nend_date\
    \ DATETIME2(0),\nserver_name VARCHAR(128) NOT NULL,\nobject_name VARCHAR(128)\
    \ NOT NULL,\ncounter_name VARCHAR(128) NOT NULL,\ninstance_name VARCHAR(128) NULL,\n\
    minimum_counter_value FLOAT NULL,\nmaximum_counter_value FLOAT NULL,\naverage_counter_value\
    \ FLOAT NULL,\nstandard_deviation_counter_value FLOAT NULL,\nCONSTRAINT PK_IndexingCountersBaseline\n\
    PRIMARY KEY CLUSTERED (counter_baseline_id)\n);\nGO\n```\n清单 13-3 性能计数器基线表\n\n\
    将值填充到 `dbo.IndexingCountersBaseline` 时，填充过程有两个步骤。首先，我们需要从性能计数器中收集一个代表典型周的样本。如果没有典型的周，则选取本周并为其收集样本。一旦我们有了典型周，下一步就是将信息聚合到基线表中。聚合信息就是对\
    \ `dbo.IndexingCounters` 表中一段日期范围内的信息进行汇总。在清单 [13-4](#338675_3_En_13_Chapter.xhtml#PC4)\
    \ 中，数据来自 2019 年 8 月 1 日至 8 月 15 日。下一步是验证基线。仅仅因为过去一周的平均值显示每秒转发记录数（Forwarded Records/sec）为\
    \ 100，并不意味着该值对您的基线是良好的。运用您对服务器和数据库的经验来影响基线中的值。如果近期趋势低于或高于正常水平，请根据需要调整基线。\n\n```sql\n\
    USE IndexingMethod;\nGO\nDECLARE @StartDate DATETIME = '20190911',\n        @EndDate\
    \   DATETIME = '20190918';\nINSERT INTO dbo.IndexingCountersBaseline (\n    start_date,\n\
    \    end_date,\n    server_name,\n    object_name,\n    counter_name,\n    instance_name,\n\
    \    minimum_counter_value,\n    maximum_counter_value,\n    average_counter_value,\n\
    \    standard_deviation_counter_value\n)\nSELECT MIN(create_date),\n       MAX(create_date),\n\
    \       server_name,\n       object_name,\n       counter_name,\n       instance_name,\n\
    \       MIN(Calculated_Counter_value),\n       MAX(Calculated_Counter_value),\n\
    \       AVG(Calculated_Counter_value),\n       STDEV(Calculated_Counter_value)\n\
    FROM dbo.IndexingCounters\nWHERE create_date BETWEEN @StartDate AND @EndDate\n\
    GROUP BY server_name,\n         object_name,\n         counter_name,\n       \
    \  instance_name;\n```\n清单 13-4 填充计数器基线表\n\n还有其他方法可以收集和查看 SQL Server 实例的性能计数器。我们可以使用\
    \ Windows 应用程序 **Performance Monitor** 实时查看性能计数器。它还可以用于将性能计数器记录到二进制或文本文件中。命令行实用程序\
    \ `Logman` 也可用于与 **Performance Monitor** 交互，以创建数据收集器并根据需要启动和停止它们。此外，`PowerShell`\
    \ 也可以用来辅助收集性能计数器。\n\n所有这些替代方案都是收集数据库和索引性能计数器的有效选项。关键在于，如果我们想要监控索引，就必须收集必要的信息以了解潜在的索引问题何时可能出现。选择一个最顺手的工具，今天就开始收集这些计数器吧。\n\
    \n## 动态管理对象\n\n监控索引性能的一些最佳信息包含在动态管理对象（DMO）中。这些 DMO 包含有关索引的逻辑和物理使用情况以及整体物理结构的信息。对于监控，有四个\
    \ DMO 提供有关索引使用情况的信息：`sys.dm_db_index_usage_stats`、`sys.dm_db_index_operational_stats`、`sys.dm_db_index_physical_stats`\
    \ 和 `sys.dm_os_wait_stats`。在本节中，我们将逐步介绍使用这些 DMO 监控索引的过程。\n\n接下来的前三节将讨论 `sys.dm_db_index_*`\
    \ DMO。第 [3](#338675_3_En_3_Chapter.xhtml) 章定义并演示了这些 DMO 的内容。需要记住的一点是，这些 DMO 可能会因为服务器上的各种操作（例如重启服务或重建索引）而被清空。第四个\
    \ DMO `sys.dm_os_wait_stats` 与索引监控相关，并提供有助于索引分析的信息。\n\n### 警告\n\n索引 DMO 没有行级别的信息来精确指示收集索引信息的时间何时被重置。因此，可能会出现报告统计数据略高于或低于实际值的情况。虽然这应该不会对分析结果产生重大影响，但这是需要记住的一点。"
  raw: 'The first time we collect performance counters for your indexes, we won’t
    be able to compare the counters to other reasonable values for your SQL Server.
    As time goes on, though, we can retain previous performance counter samples to
    make comparisons. As part of monitoring, we will be responsible for identifying
    periods in which values for the performance counters represent the typical activity
    for your environment. To store these values, insert them into a table similar
    to the one in Listing [13-3](#338675_3_En_13_Chapter.xhtml#PC3). This table has
    start and end dates to indicate the range that the baseline represents. Also,
    there are minimum, maximum, average, and standard deviation columns to store values
    from the collected counters. The minimum and maximum values will allow for an
    understanding of how the performance counters vary. The average value provides
    an idea of what the counter value will be when it is “good.” The standard deviation
    allows us to understand the variability of the counter values. The lower the number,
    the more frequently the counter values cluster around the average value. Higher
    values indicate that the counter values vary more frequently and are often nearer
    to the minimum and maximum values.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCountersBaseline

    (

    counter_baseline_id INT IDENTITY(1, 1),

    start_date DATETIME2(0),

    end_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    minimum_counter_value FLOAT NULL,

    maximum_counter_value FLOAT NULL,

    average_counter_value FLOAT NULL,

    standard_deviation_counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCountersBaseline

    PRIMARY KEY CLUSTERED (counter_baseline_id)

    );

    GO

    Listing 13-3

    Performance Counter Baseline Table

    ```


    When populating the values into `dbo.IndexingCountersBaseline`, there are two
    steps to the population process. First, we need to collect a sample from the performance
    counters that represents a typical week. If there are no typical weeks, pick this
    week and collect samples for it. Once we have the typical week, the next step
    is to aggregate the information into the baseline table. Aggregating the information
    is a matter of summarizing the information in the table `dbo.IndexingCounters`
    for a range of days. In Listing [13-4](#338675_3_En_13_Chapter.xhtml#PC4), the
    data is from August 1 to August 15, 2019\. The next step is to validate the baseline.
    Just because the average for the past week states that the Forwarded Records/sec
    value is at 100 doesn’t mean that value is good for your baseline. Use your experience
    with your servers and databases to influence the values in the baseline. Make
    adjustments to the baseline as needed if there is a recent trend below or above
    what is normal.


    ```

    USE IndexingMethod;

    GO

    DECLARE @StartDate DATETIME = ''20190911'',

    @EndDate       DATETIME = ''20190918'';

    INSERT INTO dbo.IndexingCountersBaseline (

    start_date,

    end_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    minimum_counter_value,

    maximum_counter_value,

    average_counter_value,

    standard_deviation_counter_value

    )

    SELECT MIN(create_date),

    MAX(create_date),

    server_name,

    object_name,

    counter_name,

    instance_name,

    MIN(Calculated_Counter_value),

    MAX(Calculated_Counter_value),

    AVG(Calculated_Counter_value),

    STDEV(Calculated_Counter_value)

    FROM dbo.IndexingCounters

    WHERE create_date BETWEEN @StartDate AND @EndDate

    GROUP BY server_name,

    object_name,

    counter_name,

    instance_name;

    Listing 13-4

    Populate Counter Baseline Table

    ```


    There are other ways to collect and view performance counters for your SQL Server
    instances . We can use the Windows application Performance Monitor to view performance
    counters in real time. It can also be used to log performance counters to a binary
    or text file. The command-line utility Logman can also be used to interact with
    Performance Monitor to create data collectors and start and stop them as needed.
    Also, PowerShell is a possibility for assisting in the collection of performance
    counters.


    All these alternatives are valid options for collecting performance counters on
    your databases and indexes. The key is that if we want to monitor your indexes,
    we must collect the information necessary to know when potential indexing issues
    may arise. Pick a tool that is most comfortable to use and start collecting these
    counters today.


    ## Dynamic Management Objects


    Some of the best index performance information for monitoring is included in dynamic
    management objects (DMOs). The DMO s contain information on logical and physical
    uses for the indexes and overall physical structure. For monitoring, there are
    four DMOs that provide information on the usage of the indexes: `sys.dm_db_index_usage_stats`,
    `sys.dm_db_index_operational_stats`, `sys.dm_db_index_physical_stats`, and `sys.dm_os_wait_stats`.
    In this section, we’ll walk through a process to monitor your indexes using each
    of these DMOs.


    The first three following sections will discuss the `sys.dm_db_index_*` DMOs.
    Chapter [3](#338675_3_En_3_Chapter.xhtml) defined and demonstrated the contents
    of the DMOs. One thing to remember with these DMOs is that they can be flushed
    through various operations on the server, such as restarting the service or recreating
    the index. The fourth DMO, `sys.dm_os_wait_stats`, relates to index monitoring
    and provides information that can help during index analysis.


    ### Warning


    The indexing DMOs don’t have information at the row level to precisely indicate
    when the information collected for the index has been reset. Because of this,
    there can be situations where the statistics reported can be slightly higher or
    lower than they actually are. While this shouldn’t greatly affect the outcome
    during analysis, it is something to keep in mind.'
