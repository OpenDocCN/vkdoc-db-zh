    需要考虑的第二种情况是，当查询的业务规则发生变化时。例如，可能一组结果最初没有被过滤，但在对应用程序进行更改后，查询可能改为使用不同的索引集。这也可能导致结果顺序发生变化，例如当查询从使用聚集索引变为使用非聚集索引时。


    为了演示这种行为变化，请执行清单 8-16 中的代码。此代码运行两个查询。两个查询都返回 `SalesOrderID`、`CustomerID` 和 `Status`。出于示例目的，业务规则规定结果必须按
    `SalesOrderID` 排序。在这种情况下，第一个查询的结果按照业务规则进行排序，如图 8-13 顶部所示。但在第二个查询中，当逻辑变为通过添加筛选器来请求更少的行时，结果不再有序，如图
    8-13 底部所示。变化的原因来自于 SQL Server 用于执行查询的索引发生了变化。索引的变化导致结果以那些索引对数据进行排序的方式被处理和排序。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig13_HTML.jpg](img/338675_3_En_8_Fig13_HTML.jpg)


    图 8-13 展示筛选对排序影响的查询结果


    ```

    USE AdventureWorks2017

