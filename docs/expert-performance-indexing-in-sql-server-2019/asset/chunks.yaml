    ### Locking Contention


    当 SQL Server 数据库中的数据被使用时，它会被锁定，以确保用户请求数据的一致性，并防止其他人收到不正确的结果。有时，一个用户的锁定可能会干扰另一个用户。为了最好地监控锁，`sys.dm_db_index_operational_stats`
    提供了详细说明锁计数和等待锁发生所花费时间的列。表 [3-15](#338675_3_En_3_Chapter.xhtml#Tab15) 列出了三组列。`sys.dm_db_index_operational_stats`
    中跟踪了三种类型的锁，以提供对锁争用的洞察：行锁、页锁和索引锁升级。


    *表 3-15 sys.dm_db_index_operational_stats 中的索引争用列*


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `row_lock_count` | `bigint` | 累计请求的行锁数量。 |

    | `row_lock_wait_count` | `bigint` | 数据库引擎等待行锁的累计次数。 |

    | `row_lock_wait_in_ms` | `bigint` | 数据库引擎等待行锁的总毫秒数。 |

    | `page_lock_count` | `bigint` | 累计请求的页锁数量。 |

    | `page_lock_wait_count` | `bigint` | 数据库引擎等待页锁的累计次数。 |

    | `page_lock_wait_in_ms` | `bigint` | 数据库引擎等待页锁的总毫秒数。 |

    | `index_lock_promotion_attempt_count` | `bigint` | 数据库引擎尝试升级锁的累计次数。 |

    | `index_lock_promotion_count` | `bigint` | 数据库引擎升级锁的累计次数。 |


    #### Row Lock


    第一组列由行锁列组成。这些列包括 `row_lock_count`、`row_lock_wait_count` 和 `row_lock_wait_in_ms`。通过这些列，你可以衡量发生的行锁数量，以及在获取行锁时是否存在任何争用。行锁争用通常可以通过其对事务性能的影响（如阻塞和死锁）观察到。


    为了演示如何收集这些信息，请执行清单 [3-29](#338675_3_En_3_Chapter.xhtml#PC29) 中的代码。在此脚本中，基于 `ProductID`
    从 `Sales.SalesOrderDetail` 表中检索行。在 AdventureWorks2017 数据库中，该查询检索 44 行。


    ```sql

    USE AdventureWorks2017

    GO

    ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 710;

    ```


    *清单 3-29 用于生成行锁的 T-SQL 脚本*


    要观察查询获取的行锁，请使用清单 [3-30](#338675_3_En_3_Chapter.xhtml#PC30) 中提供的查询中的行锁列。在这些结果中，你可以看到针对
    `Sales.SalesOrderDetail` 的查询返回的每一行，在 `sys.dm_db_index_operational_stats` 的结果中都包含一个锁，如图
    [3-21](#338675_3_En_3_Chapter.xhtml#Fig21) 所示。因此，在索引 `IX_SalesOrderDetail_ProductID`
    上放置了 44 个行锁。


    请注意，`row_lock_wait_count` 和 `row_lock_wait_in_ms` 列没有返回任何信息。这是因为该脚本没有被任何其他查询阻塞。如果清单
    [3-29](#338675_3_En_3_Chapter.xhtml#PC29) 中的查询被另一个事务阻塞，那么这些列中的值将会增加。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig21_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig21_HTML.jpg)


    *图 3-21 行锁的查询结果*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.row_lock_count

    ,ios.row_lock_wait_count

    ,ios.row_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```


    *清单 3-30 从 sys.dm_db_index_operational_stats 查询行锁*'
  raw: '#### Forwarded Fetch


    The last column of statistics collected on `SELECT` activity is `forwarded_fetch`
    `_count`. As discussed in Chapter [2](#338675_3_En_2_Chapter.xhtml), forwarded
    records occur in heaps when a record increases in size and can no longer fit on
    the page that it is currently on. The column `forwarded_fetch_count` increases
    by one every time a record forward operation occurs.


    To demonstrate, the code in Listing [3-27](#338675_3_En_3_Chapter.xhtml#PC27)
    builds a table with a heap and populates it with some values. Then an `UPDATE`
    statement increases the size of every third row. The size of the new row will
    exceed the available space on the page, resulting in a forwarded record.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    UPDATE dbo.ForwardedRecords

    SET VALUE = REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    Listing 3-27

    T-SQL Script for Forwarded Records

    ```


    Once the script is completed, the `sys.dm_db_index_operational_stats` script in
    Listing [3-28](#338675_3_En_3_Chapter.xhtml#PC28) can be used to view the number
    of times that forwarded records have been fetched. In this case, the 222 records
    that were forwarded resulted in a `forwarded_fetch_count` of 222, shown in Figure
    [3-20](#338675_3_En_3_Chapter.xhtml#Fig20). This column is useful when looking
    into the performance counter Forwarded Records/sec. Reviewing this column will
    help identify which heap is leading to the counter activity, providing a focus
    on the exact table to investigate.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig20_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Query result for forwarded_fetch_count


    ```

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.forwarded_fetch_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''dbo.ForwardedRecords''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.forwarded_fetch_count DESC

    Listing 3-28

    Query for forwarded_fetch_count from sys.dm_db_index_operational_stats

    ```


    ### Locking Contention


    As data is used within SQL Server databases, it is locked to provide consistency
    in the data that users are requesting and to prevent others from receiving incorrect
    results. At times, locking for one user can interfere with another user. To best
    monitor locking, `sys.dm_db_index_operational_stats` provides columns that detail
    the counts on locks and time spent waiting for locks to occur. Table [3-15](#338675_3_En_3_Chapter.xhtml#Tab15)
    lists three groups of columns. There are three types of locks that are tracked
    in `sys.dm_db_index_operational_stats` to provide insight into locking contention:
    row locks, page locks, and index lock promotion.


    Table 3-15


    Index Contention Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `row_lock_count` | `bigint` | Cumulative number of row locks requested. |

    | `row_lock_wait_count` | `bigint` | Cumulative number of times the database engine
    waited on a row lock. |

    | `row_lock_wait_in_ms` | `bigint` | Total number of milliseconds the database
    engine waited on a row lock. |

    | `page_lock_count` | `bigint` | Cumulative number of page locks requested. |

    | `page_lock_wait_count` | `bigint` | Cumulative number of times the database
    engine waited on a page lock. |

    | `page_lock_wait_in_ms` | `bigint` | Total number of milliseconds the database
    engine waited on a page lock. |

    | `index_lock_promotion_attempt_count` | `bigint` | Cumulative number of times
    the database engine tried to escalate locks. |

    | `index_lock_promotion_count` | `bigint` | Cumulative number of times the database
    engine escalated locks. |


    #### Row Lock


    The first set of columns consists of the row lock columns. These columns include
    `row_lock_count`, `row_lock_wait_count`, and `row_lock_wait_in_ms`. Through these
    columns, you are able to measure the number of locks that occur on a row and then
    whether there was any contention when acquiring the row lock. Row lock contention
    can often be observed by its effect on transaction performance through blocking
    and deadlocking.


    To demonstrate how this information is collected, execute the code in Listing
    [3-29](#338675_3_En_3_Chapter.xhtml#PC29). In this script, rows from the `Sales.SalesOrderDetail`
    table are retrieved based on `ProductID`. In the AdventureWorks2017 database,
    the query retrieves 44 rows.


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 710;

    Listing 3-29

    T-SQL Script to Generate Row Locks

    ```


    To observe the row locks that were acquired by the query, use the row lock columns
    in the query provided in Listing [3-30](#338675_3_En_3_Chapter.xhtml#PC30). In
    these results, you see that for each row that was returned by the query against
    `Sales.SalesOrderDetail`, there is one lock included in the results of `sys.dm_db_index_operational_stats`,
    shown in Figure [3-21](#338675_3_En_3_Chapter.xhtml#Fig21). As a result, there
    were 44 row locks placed on the index `IX_SalesOrderDetail_ProductID`.


    Note that there is no information returned for the `row_lock_wait_count` and `row_lock_wait_in_ms`
    columns. This is because the script was not blocked by any other query. Had the
    query in Listing [3-29](#338675_3_En_3_Chapter.xhtml#PC29) been blocked by another
    transaction, then the values in these columns would have incremented.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig21_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Query results for row locks


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.row_lock_count

    ,ios.row_lock_wait_count

    ,ios.row_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 3-30

    Query for Row Locks in sys.dm_db_index_operational_stats

    ```'
