    The query includes a number of calculations to help identify when there are issues
    with specific wait types. To best understand the information provided, see the
    definitions provided in Table [14-1](#338675_3_En_14_Chapter.xhtml#Tab1). These
    calculations and their definitions will help focus the performance issues related
    to wait statistics.


    When reviewing the results of the wait statistics query, shown in Figure [14-11](#338675_3_En_14_Chapter.xhtml#Fig11),
    there are two thresholds to watch. First, if any of the waits exceed 5 percent
    of the total wait time, there is likely a bottleneck related to that wait type,
    and further investigation into the wait should happen. Similarly, if any of the
    waits exceed 1 percent of the time, they should be considered for further analysis
    but not before reviewing the items with higher waits. One thing to pay close attention
    to when reviewing wait statistics is that if the time spent on the wait is mostly
    because of signal wait time, then the resource contention can be better resolved
    by first focusing on CPU pressure on the server.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig11_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig11_HTML.jpg)


