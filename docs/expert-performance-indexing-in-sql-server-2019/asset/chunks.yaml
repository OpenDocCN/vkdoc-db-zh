  trans: '

    ### 注意事项


    `SEQUENCE` 是 SQL Server 2012 中引入的新对象。通过序列，可以生成一系列数值，这些数值可以是升序或降序的。序列不与任何特定的表关联。如果你不熟悉
    `SEQUENCE` 的使用，出于性能和控制目的，建议你考虑使用序列而非 `IDENTITY`。这些内容超出了本书的讨论范围。


    ### 自然键


    在某些情况下，在数据中使用自然键作为聚簇键，与向表中添加一个标识列以用于标识列模式（Identity Column pattern）同样有效。自然键是数据中一个能唯一标识一行与其他所有行不同的列。当数据中存在一个自然键，且该键符合明确定义的聚簇键的属性时，就可以确定使用自然键是有效的。当使用自然键作为聚簇键时，它们不太可能是始终递增的，但它们仍然应该是唯一的、窄的且静态的。


    自然键可以替代标识列的一个常见例子是，查看包含一到两个字符缩写来表示其所代表信息的表。这些缩写可能代表订单状态、产品尺寸，或州/省列表。与在标识列模式中使用
    4 字节的 `int` 相比，在自然键模式中使用 `char(1)` 或 `char(2)` 数据类型将产生比前者更窄的聚簇键。另一个例子是在日期表中使用
    yyyymmdd 或时间戳格式的日期。


    自然键模式还有一个额外的好处，即提供更易于解读的键值。当使用标识列模式时，聚簇键值为 1 或 7 并没有内在含义。这些值是无意义的——故意如此。而使用自然键模式时，`O`
    和 `C` 的缩写则代表真实信息（分别代表“已打开”和“已关闭”）。


    作为一个自然键模式的简单示例，让我们考虑一个包含州及其缩写的表。我们还将包括每个州所在的国家名称。清单 11-5 展示了创建并填充该表的 SQL。该表有一个
    `StateAbbreviation` 列，其类型为 `char(2)`。由于对于每个州来说，这是一个窄的、唯一的且静态的值，因此聚簇索引是创建在此列上的。接下来，为这个虚构数据库所需的四个州添加了几行数据。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesNatural

    (

    StateAbbreviation char(2)

    ,StateName varchar(25)

    ,Country varchar(25)

    ,CONSTRAINT PK_State_StateAbbreviation PRIMARY KEY CLUSTERED (StateAbbreviation)

    );

    INSERT INTO dbo.IndexStrategiesNatural(StateAbbreviation, StateName, Country)

    VALUES(''MN'',''Minnesota'',''United States'')

    ,(''FL'',''Florida'',''United States'')

    ,(''WI'',''Wisconsin'',''United States'')

    ,(''NH'',''New Hampshire'',''United States'');

    SELECT StateAbbreviation, StateName, Country

    FROM dbo.IndexStrategiesNatural;

    ```


    清单 11-5 为自然键模式创建并填充表


    在自然键匹配自然键模式的情况下，清单 11-5 中的技术可以是选择聚簇键列的一种有用方式。查看 `dbo.IndexStrategiesNatural` 的内容（如图
    11-5 所示），表中存在四行数据，并且在其他表中使用 `StateAbbreviation` 作为外键值可能是有用的，因为 `MN` 这个值具有某种内在含义。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig5_HTML.jpg](img/338675_3_En_11_Fig5_HTML.jpg)

    图 11-5 自然键模式的结果


    这种模式看起来似乎很理想，并且比标识列模式更有价值——特别是因为聚簇键的值有助于描述数据。然而，使用这种模式也有一些缺点，这些缺点与能使其成为明确定义的聚簇键的属性有关。


    首先，让我们考虑聚簇键的唯一性。假设数据库和表的使用场景永不改变，那么可以相信这些值将保持唯一。但是，当数据库需要在国际环境中使用时会发生什么？如果需要包含其他国家/地区的州，例如荷兰，那么出现数据问题的潜在可能性就很大。在荷兰，FL
    是弗莱福兰（Flevopolder）的缩写，NH 是北荷兰省（Noord-Holland）的缩写。将一个本该送往弗莱福兰的订单发送到佛罗里达（Florida），可能会带来严重的业务后果。为了保持唯一性，需要在自然键和聚簇键中添加一些超出这两个字符缩写的内容。


    改变自然键进而会影响聚簇键的“窄度”。可能有两种方法可以解决这个问题。第一个选项是在自然键中添加另一列，以标识州缩写属于哪个国家。第二个选项是增大州缩写的大小，在同一列中包含国家缩写。无论采用哪种解决方案，聚簇键的大小都将超过
    4 字节，而使用 `int` 数据类型和标识列模式则可以维持一个窄的聚簇键。


    此外，要始终考虑自然键是否真的是静态的。州缩写可以改变。虽然这种情况不太常见——美国上一次改变发生在 1987 年，当时所有州缩写都被标准化了——但对于几乎所有类型的自然键来说，偶尔都会发生变化。一个例子是南斯拉夫及其六个共和国，它们后来成为了独立的国家。另一个例子是苏联，它演变成了俄罗斯联邦，进而导致许多其他国家的成立。诸如州和国家缩写这样的值看起来可能是静态的，但在更大的尺度上是存在变化的。同时，着眼于你的应用程序，代表工作流状态的状态码今天可能是准确的，但未来可能会有新的、不同的含义。


    最后，有时表面的自然键可能由不应广泛分发的数据构成。多年来，政府标识符（如社会安全号码）经常被用作数据库中的自然键，尤其是在医疗和教育系统中。虽然这能充分标识个人，但这绝对不是应该让数据库用户轻易获取的信息。在大多数现代数据库中，政府标识符现在需要加密，当这类自然键被用于聚簇索引并可能作为主键时，这会导致巨大的问题。


    自然键模式对于选择索引列是设计聚簇索引的一个有效模式。如示例所示，它可以是唯一的、窄的且静态的。在将自然键用于聚簇索引之前，请查看该表当前和未来的应用。

    '
- fmt: '# Foreign Key


    外键模式是创建聚集索引时最常被忽视的模式之一，它使用外键列作为表的聚集键。虽然该模式并非适用于所有外键场景，但在设计具有一对多关系的主表与明细表时非常有用。外键模式包含了构成良好聚集键的所有属性，不过其中几个属性需要注意。


    ## 实施外键模式


    实施此模式的方式类似于实施标识列模式。该模式包含两个表，其列设置了 `IDENTITY` 属性。清单 11-6 展示了一个示例。示例中创建了三个表：第一个是主表
    `dbo.IndexStrategiesHeader`，其聚集索引建立在 `HeaderID` 列上。第二个表是明细表的第一个版本 `dbo.IndexStrategiesDetail_ICP`，它被设计为主表的子表，聚集索引使用标识列模式构建，并在
    `HeaderID` 列上建立了索引以提高性能。第三个表也是明细表 `dbo.IndexStrategiesDetail_FKP`，它使用外键模式设计。其聚集索引并非建立在带有
    `IDENTITY` 属性的列上，而是包含两列：第一列来自父表 `HeaderID`，第二列是该表的主键 `DetailID`。为了提供示例数据，使用了 `sys.indexes`
    和 `sys.index_columns` 来填充所有表。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesHeader

    (

    HeaderID int IDENTITY(1,1)

    ,FillerData char(250)

    ,CONSTRAINT PK_Header_HeaderID PRIMARY KEY CLUSTERED (HeaderID)

    );

    CREATE TABLE dbo.IndexStrategiesDetail_ICP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_ICP_DetailID PRIMARY KEY CLUSTERED (DetailID)

    ,CONSTRAINT FK_Detail_ICP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    CREATE INDEX IX_Detail_ICP_HeaderID ON dbo.IndexStrategiesDetail_ICP (HeaderID)

    CREATE TABLE dbo.IndexStrategiesDetail_FKP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_FKP_DetailID PRIMARY KEY NONCLUSTERED (DetailID)

    ,CONSTRAINT CLUS_Detail_FKP_HeaderIDDetailID UNIQUE CLUSTERED (HeaderID, DetailID)

    ,CONSTRAINT FK_Detail_FKP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    GO

    INSERT INTO dbo.IndexStrategiesHeader(FillerData)

    SELECT CONVERT(varchar,object_id)+name

    FROM sys.indexes

    INSERT INTO dbo.IndexStrategiesDetail_ICP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    INSERT INTO dbo.IndexStrategiesDetail_FKP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    ```

    清单 11-6

    为外键模式创建和填充表


    ## 性能比较


    现在，我们有了采用两种聚集索引模式设计的三个表：标识序列和外键模式。此模式的关键在于，根据表常见的使用模式，数据应尽可能高效地返回。在此类场景中，有两种常见的用例：第一种是返回主表中的一行及其对应的所有明细行；第二种是返回主表中的多行及其在明细表中的所有相关行。


    ### 用例 1：返回单行主数据


    首先，我们考察返回主表中一行及其相关明细行的性能差异。清单 11-7 中的代码对这两种聚集索引模式执行了此用例。正如预期，两个查询返回的数据集是相同的，差异体现在统计信息和查询计划上。首先，查看在用例
    1 中使用 `STATISTICS IO` 时的统计输出（如图 11-6 所示）。标识列模式的读取次数为四次，而外键模式的读取次数为两次。虽然这些数字很小，但这是两倍的差异，如果这些是高度频繁使用的查询，可能会对数据库产生显著影响。执行计划的差异则更为明显（如图
    11-7 所示）。对于第一个查询，需要对明细表执行索引查找、键查找和嵌套循环。相比之下，第二个查询使用聚集索引查找获取了相同的信息。此示例清楚地表明，外键模式的性能优于标识列模式。


    图 11-7

    外键模式下单行主数据的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig7_HTML.jpg](../images/338675_3_En_11_Chapter/338675_3_En_11_Fig7_HTML.jpg)


    图 11-6

    外键模式下单行主数据的结果


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig6_HTML.jpg](../images/338675_3_En_11_Chapter/338675_3_En_11_Fig6_HTML.jpg)


    ```sql

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    ```

    清单 11-7

    外键模式下的单行主数据查询


    ### 用例 2：返回多行主数据


    基于第一个用例的成功，我们考察第二个用例。如清单 11-8 所示，此查询将从主表中检索多行，并从明细表中检索与主行 `HeaderID` 匹配的数据。同样，使用两种聚集索引模式的查询返回的数据相同，但执行性能存在差异。第一个差异体现在
    `STATISTICS IO` 输出中（如图 11-8 所示）。第一次执行中，主表上有 158 次读取，明细表上有 44 次读取。相比之下，外键模式的主表读取次数为四次，明细表读取次数为八次，显然外键模式性能更佳。事实上，外键模式的读取次数比标识列模式低一个数量级。性能差异的原因可以通过图
    11-9 所示的执行计划来解释。在执行计划中，第一个查询需要对明细表执行 `clustered index scan` 以返回明细行。而使用外键模式的第二个查询则不需要此操作，它使用了聚集索引查找。


    图 11-9

    外键模式下多行主数据的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig9_HTML.jpg](../images/338675_3_En_11_Chapter/338675_3_En_11_Fig9_HTML.jpg)


    图 11-8

    外键模式下多行主数据的结果


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig8_HTML.jpg](../images/338675_3_En_11_Chapter/338675_3_En_11_Fig8_HTML.jpg)'
  raw: '### Foreign Key


    One of the most often overlooked patterns for creating clustered indexes is to
    use a foreign key column in the clustering keys for the table. The Foreign Key
    pattern is not appropriate for all foreign keys but does have its use in designs
    where there is a one-to-many relationship between information in a header table
    and the related detail information. The Foreign Key pattern contains all the attributes
    that are part of a well-defined clustering key. There are, though, a few caveats
    with a few of the attributes.


    Implementing this pattern is similar to the way you implement the Identity Column
    pattern. The pattern contains two tables that have columns with the `IDENTITY`
    property set on them. Listing [11-6](#338675_3_En_11_Chapter.xhtml#PC6) shows
    an example. In the example, there are three tables created. The first is the header
    table, named `dbo.IndexStrategiesHeader`, with a clustered index built on the
    `HeaderID` column. The next table is the first version of the detail table, named
    `dbo.IndexStrategiesDetail_ICP`. The table is designed as a child to the header
    table, the clustered index is built using the Identity Column pattern, and an
    index on the `HeaderID` column is used to improve performance. The third table
    is also a detail table, named `dbo.IndexStrategiesDetail_FKP`; this table is designed
    using the Foreign Key pattern. Instead of clustering the table on the column with
    the `IDENTITY` property, the clustered index includes two columns. The first column
    is the column from the parent table, `HeaderID`, and the second is the primary
    key for this table, `DetailID`. To provide sample data, `sys.indexes` and `sys.index_columns`
    are used to populate all the tables.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesHeader

    (

    HeaderID int IDENTITY(1,1)

    ,FillerData char(250)

    ,CONSTRAINT PK_Header_HeaderID PRIMARY KEY CLUSTERED (HeaderID)

    );

    CREATE TABLE dbo.IndexStrategiesDetail_ICP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_ICP_DetailID PRIMARY KEY CLUSTERED (DetailID)

    ,CONSTRAINT FK_Detail_ICP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    CREATE INDEX IX_Detail_ICP_HeaderID ON dbo.IndexStrategiesDetail_ICP (HeaderID)

    CREATE TABLE dbo.IndexStrategiesDetail_FKP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_FKP_DetailID PRIMARY KEY NONCLUSTERED (DetailID)

    ,CONSTRAINT CLUS_Detail_FKP_HeaderIDDetailID UNIQUE CLUSTERED (HeaderID, DetailID)

    ,CONSTRAINT FK_Detail_FKP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    GO

    INSERT INTO dbo.IndexStrategiesHeader(FillerData)

    SELECT CONVERT(varchar,object_id)+name

    FROM sys.indexes

    INSERT INTO dbo.IndexStrategiesDetail_ICP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    INSERT INTO dbo.IndexStrategiesDetail_FKP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    Listing 11-6

    Creating and Populating Tables for Foreign Key Pattern

    ```


    At this point, you have three tables designed using the two clustered index patterns,
    Identity Sequence and Foreign Key. The key to this pattern is to design the table
    as such that in their common usage patterns the data will be returned as efficiently
    as possible. There are two use cases that are common in this type of a scenario.
    The first is returning the header and all the detail rows for one row in the header
    table. The second is to return multiple rows from the header table and all the
    related rows from the detail table.


    First, let’s examine the differences in performance for returning one row from
    the header table and all the related detail rows. The code in Listing [11-7](#338675_3_En_11_Chapter.xhtml#PC7)
    executes this use case against both clustered indexing patterns. As expected,
    the dataset returned by both queries is the same. The difference lies in the statistics
    and query plan for the two queries. First, let’s look at the statistics output
    when `STATISTICS IO` is used during the first use case (shown in Figure [11-6](#338675_3_En_11_Chapter.xhtml#Fig6)).
    The reads for the Identity Column pattern show that there were four reads as opposed
    to two reads by the Foreign Key pattern. While these numbers are low, this is
    a twofold difference that could impact your database significantly if these are
    highly utilized queries. The big difference in execution, though, can be seen
    when reviewing the execution plans for the two queries (Figure [11-7](#338675_3_En_11_Chapter.xhtml#Fig7)).
    For the first query, to retrieve the results, an index seek, key lookup, and nested
    loop are required against the detail table. Compare this to the second query,
    which obtains the same information using a clustered index seek. This example
    clearly indicates that the Foreign Key pattern performs better than the Identity
    Column pattern.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig7_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Execution plans for single header row on Foreign Key pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig6_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Results for single header row on Foreign Key pattern


    ```

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    Listing 11-7

    Single Header Row on Foreign Key Pattern

    ```


    With the success of the first use case, let’s examine the second use case. In
    this example, shown in Listing [11-8](#338675_3_En_11_Chapter.xhtml#PC8), the
    queries will retrieve multiple rows from the header table and will retrieve the
    data from the detail table that matches the `HeaderID` from the header rows. Again,
    the data returned by the queries using both of the clustered index patterns is
    the same, and there are performance differences between the two executions. The
    first difference is in the `STATISTICS IO` output, shown in Figure [11-8](#338675_3_En_11_Chapter.xhtml#Fig8).
    In the first execution, there are 158 reads on the header table and 44 reads on
    the detail table. Comparing those to the four reads on the header and eight reads
    on the detail for the Foreign Key pattern, it’s clear that the Foreign Key pattern
    performs better. In fact, the reads are a magnitude lower for the Foreign Key
    over the Identity Column pattern. The reason for the performance difference can
    be explained through the execution plan shown in Figure [11-9](#338675_3_En_11_Chapter.xhtml#Fig9).
    In the execution plan, the first query requires a `clustered index scan` on the
    detail table to return the rows from the detail table. The second query, using
    the Foreign Key pattern, does not require this and uses a clustered index seek.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig9_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Execution plans for multiple header row on Foreign Key pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig8_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Results for multiple header row on Foreign Key pattern'
