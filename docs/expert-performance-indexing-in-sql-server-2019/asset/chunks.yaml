  trans: '### 锁存竞争


    锁定并非索引可能遇到的唯一竞争类型。除了锁定，还存在**锁存竞争**。锁存器是短小、轻量的数据同步对象。从高层次看，锁存器在活动执行期间对内存对象提供控制。锁存器的一个例子是将数据从磁盘传输到内存时。如果在此过程中出现磁盘瓶颈，锁存等待会在磁盘传输完成前累积。这些信息的价值在于，当锁存等待发生时，相关列（如表
    3-16 所示）提供了一种机制，可将等待追踪到具体的索引，从而使你能够作为索引管理的一部分，重点关注索引的存储位置。


    表 3-16


    `sys.dm_db_index_operational_stats` 中的锁存活动列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_latch_wait_count` | `bigint` | 因锁存竞争导致数据库引擎等待的累计次数。 |

    | `page_latch_wait_in_ms` | `bigint` | 因锁存竞争导致数据库引擎等待的累计毫秒数。 |

    | `page_io_latch_wait_count` | `bigint` | 数据库引擎在 I/O 页面锁存上等待的累计次数。 |

    | `page_io_latch_wait_in_ms` | `bigint` | 数据库引擎在页面 I/O 锁存上等待的累计毫秒数。 |

    | `tree_page_latch_wait_count` | `bigint` | `page_latch_wait_count` 的子集，仅包括高级
    B 树页面。对于堆表，此值始终为 0。 |

    | `tree_page_latch_wait_in_ms` | `bigint` | `page_latch_wait_in_ms` 的子集，仅包括高级
    B 树页面。对于堆表，此值始终为 0。 |

    | `tree_page_io_latch_wait_count` | `bigint` | `page_io_latch_wait_count` 的子集，仅包括高级
    B 树页面。对于堆表，此值始终为 0。 |

    | `tree_page_io_latch_wait_in_ms` | `bigint` | `page_io_latch_wait_in_ms` 的子集，仅包括高级
    B 树页面。对于堆表，此值始终为 0。 |


    #### 页面 I/O 锁存


    当涉及页面 I/O 锁存时，会收集两组数据：页面级锁存和树页面锁存。页面级锁存发生在需要检索索引叶子级别的数据页（即数据页）时（与之相对，树页面锁存发生在索引的所有其他级别）。这两种统计信息都是对将数据移入缓冲区时创建的锁存次数以及任何相关延迟时间的度量。每当
    `page_io_latch_wait_in_ms` 或 `tree_page_io_latch_wait_in_ms` 中累积了时间，它就与 `PAGEIOLATCH_*
    wait` 等待类型的等待时间增加相关。


    为了更好地理解页面 I/O 锁存的发生方式以及可收集的统计信息，我们将回顾一个示例，该示例将导致这些等待发生。在这个演示中，你将通过清单 3-34 中的脚本返回
    `Sales.SalesOrderDetail`、`Sales.SalesOrderHeader` 和 `Production.Product` 中的所有数据。执行脚本前，将清除缓冲区缓存，以强制
    SQL Server 必须从磁盘检索数据页。请确保仅在非生产服务器上使用此脚本，因为清除缓冲区缓存不会影响其他进程。


    ```

    USE AdventureWorks2017

    GO

    DBCC DROPCLEANBUFFERS

    GO

    SELECT *

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID;

    清单 3-34

    生成页面 I/O 锁存的 T-SQL 脚本

    ```


    当查询完成时，在将表和索引的页面填充到缓冲区缓存的过程中，会发生许多页面 I/O 锁存。要查看页面 I/O 锁存，请使用清单 3-35 中的脚本，针对 `sys.dm_db_index_operational_stats`
    中的页面 I/O 锁存列进行查询。结果如图 3-25 所示，表明示例查询中的所有三个表都发生了页面 I/O 锁存等待，其中 `Sales.SalesOrderHeader`
    表上甚至产生了整整 1 毫秒的等待。此处的结果高度依赖于底层存储，因此如果你的数字截然不同，那可能是硬件性能差异，而不是查询问题。如果它们异常高，你可能需要考虑对磁盘系统进行一些分析。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig25_HTML.jpg](img/338675_3_En_3_Fig25_HTML.jpg)


    图 3-25


    页面 I/O 锁存的查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_io_latch_wait_count

    ,page_io_latch_wait_in_ms

    ,CAST(1\. * page_io_latch_wait_in_ms

    / NULLIF(page_io_latch_wait_count ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''Sales.SalesOrderHeader'')

    OR i.object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    OR i.object_id = OBJECT_ID(''Production.Product'')

    ORDER BY 5 DESC;

    清单 3-35

    在 sys.dm_db_index_operational_stats 中查询页面 I/O 锁存统计信息

    ```'
- fmt: '### Page Latch


    另一种可能发生在数据库中与索引相关的锁存是页面锁存。页面锁存涵盖发生在非数据页上的任何锁存。页面锁存包括 GAM 和 SGAM 页面的分配以及 `DBCC`
    和备份活动。随着页面被不同资源分配，可能会发生争用，而监控页面锁存可以揭示这种活动。


    对于索引而言，页面锁存可能发生的一种常见场景是，由于频繁的插入或页面分配，索引上出现“热点”。为了演示这个场景，你将在代码清单 [3-36](#338675_3_En_3_Chapter.xhtml#PC36)
    中创建表 `dbo.PageLatchDemo`。接下来，使用你首选的负载生成工具，执行代码清单 [3-37](#338675_3_En_3_Chapter.xhtml#PC37)
    中的代码五次。为了生成本例的负载，在 SQL Server Management Studio 中运行五个查询窗口，每个窗口运行负载查询的一个副本。通过此示例，数百行数据将被快速插入到同一系列的页面中，并进行大量页面分配。由于这些插入非常接近，将产生一个“热点”，从而导致页面锁存争用。


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.PageLatchDemo

    (FillerData)

    SELECT  t.object_id % 2

    FROM sys.tables t;

    GO 5000

    Listing 3-37

    T-SQL Script to Generate Page Latch Load

    ```


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageLatchDemo'') IS NOT NULL

    DROP TABLE dbo.PageLatchDemo;

    CREATE TABLE dbo.PageLatchDemo

    (

    PageLatchDemoID INT IDENTITY (1,1)

    ,FillerData  bit

    ,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID PRIMARY KEY CLUSTERED  (PageLatchDemoID)

    );

    Listing 3-36

    T-SQL Script to Generate Page Latch Scenario

    ```


    为了验证页面锁存争用确实发生，请使用代码清单 [3-38](#338675_3_En_3_Chapter.xhtml#PC38) 提供的脚本。图 [3-26](#338675_3_En_3_Chapter.xhtml#Fig26)
    中显示的结果表明存在大量的页面锁存及其相关的延迟。在此示例中，每次页面锁存的延迟超过 20 毫秒。在更关键的情况下，这些值会高得多，并将帮助你识别索引何时干扰了对索引数据的访问或写入。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig26_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Query results for page latch


    ```

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_latch_wait_count

    ,page_latch_wait_in_ms

    ,CAST(100\. * page_latch_wait_in_ms

    / NULLIF(page_latch_wait_count ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''dbo.PageLatchDemo'');

    Listing 3-38

    Query for Page Latch Statistics in sys.dm_db_index_operational_stats

    ```


    ### Note


    页面 I/O 和页面锁存争用高度依赖于硬件。本节中演示查询的结果不会与显示的结果完全匹配。


    ### Page Allocation Cycle


    由于 DML 活动，叶子和非叶子页面会不时地从索引中分配或释放。监控页面分配是监控索引的重要组成部分（有关选项，请参见表 [3-17](#338675_3_En_3_Chapter.xhtml#Tab17)）。通过此监控，可以了解索引在维护窗口之间的“呼吸”情况。这种呼吸活动是通过插入和页面拆分分配给索引的页面与通过删除移除或合并页面之间的关系。通过监控此活动，你可以更好地维护索引，并了解何时增加索引的
    `FILLFACTOR` 值是有用的。


    Table 3-17


    Page Allocation Cycle Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_allocation_count` | `bigint` | 索引或堆中叶子级别页面分配的累计计数。 |

    | `nonleaf_allocation_count` | `bigint` | 由叶子级别以上的页面拆分引起的页面分配的累计计数。 |

    | `leaf_page_merge_count` | `bigint` | 叶子级别页面合并的累计计数。 |

    | `nonleaf_page_merge_count` | `bigint` | 叶子级别以上页面合并的累计计数。 |


    作为表上如何发生页面分配的示例，请执行代码清单 [3-39](#338675_3_En_3_Chapter.xhtml#PC39) 中的脚本。在此脚本中，创建了表
    `dbo.AllocationCycle`。随后，将 100,000 行插入表中。由于这是一个新表，页面分配上没有争用，数据以有序的方式添加。此时，页面已分配给表，并且分配与这些插入直接相关。此脚本将运行一分钟或更长时间。执行此操作时，请确保未启用“包含实际执行计划”。


    ```

    USE AdventureWorks2017;

    GO

    SET NOCOUNT ON

    DROP TABLE IF EXISTS dbo.AllocationCycle;

    CREATE TABLE dbo.AllocationCycle (

    ID INT IDENTITY,

    FillerData VARCHAR(1000),

    CreateDate DATETIME,

    CONSTRAINT PK_AllocationCycle PRIMARY KEY CLUSTERED (ID)

    );

    GO

    INSERT INTO dbo.AllocationCycle (FillerData, CreateDate)

    VALUES (NEWID(), GETDATE());

    GO 100000

    Listing 3-39

    T-SQL Script to Generate Page Allocations

    ```


    要验证分配情况，可以检查 `sys.dm_db_index_operational_stats` 中的叶子和非叶子分配列 `leaf_allocation_count`
    和 `nonleaf_allocation_count`。使用代码清单 [3-40](#338675_3_En_3_Chapter.xhtml#PC40)
    中的脚本，你可以看到叶子级别有 758 个分配，非叶子级别有 3 个分配（见图 [3-27](#338675_3_En_3_Chapter.xhtml#Fig27)）。这是使用这些列时要记住的一个重要点：分配的页面中有一部分可能与插入相关。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig27_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Query results for insert page allocations


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,ios.leaf_allocation_count

    ,ios.nonleaf_allocation_count

    ,ios.leaf_page_merge_count

    ,ios.nonleaf_page_merge_count

    FROM sys.dm_db_index_operational_stats(DB_ID(), OBJECT_ID(''dbo.AllocationCycle''),
    NULL,NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    Listing 3-40

    Query for Page Latch Statistics in sys.dm_db_index_operational_stats

    ```'
  raw: '#### Page Latch


    The other kind of latching related to indexes that can occur in databases is page
    latching. Page latching covers any latching that occurs on nondata pages. Page
    latches include allocation of GAM and SGAM pages and `DBCC` and backup activities.
    As pages are allocated by different resources, contention can occur, and monitoring
    page latches can uncover this activity.


    When it comes to an index, one common scenario in which page latches can occur
    is when a “hotspot” develops on an index because of frequent inserts or page allocations.
    To demonstrate this scenario, you’ll create the table `dbo.PageLatchDemo` in Listing
    [3-36](#338675_3_En_3_Chapter.xhtml#PC36). Next, using your preferred load generator
    tool, execute five sessions of the code in Listing [3-37](#338675_3_En_3_Chapter.xhtml#PC37).
    To generate the load for this example, five query windows in SQL Server Management
    Studio run a copy of the load query. Through this example, hundreds of rows will
    be inserted quickly into the same series of pages, and numerous page allocations
    will be made. Since these inserts will be so close, a “hotspot” will be created,
    which will lead to page latch contention.


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.PageLatchDemo

    (FillerData)

    SELECT  t.object_id % 2

    FROM sys.tables t;

    GO 5000

    Listing 3-37

    T-SQL Script to Generate Page Latch Load

    ```


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageLatchDemo'') IS NOT NULL

    DROP TABLE dbo.PageLatchDemo;

    CREATE TABLE dbo.PageLatchDemo

    (

    PageLatchDemoID INT IDENTITY (1,1)

    ,FillerData  bit

    ,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID PRIMARY KEY CLUSTERED  (PageLatchDemoID)

    );

    Listing 3-36

    T-SQL Script to Generate Page Latch Scenario

    ```


    To verify that the page latch contention did occur, use the script provided in
    Listing [3-38](#338675_3_En_3_Chapter.xhtml#PC38). The results, provided in Figure
    [3-26](#338675_3_En_3_Chapter.xhtml#Fig26), show that there were numerous page
    latches and delays associated with them. In this example, the delay per page latch
    was over 20 milliseconds. In more critical situations, these values will be much
    higher and will help you identify when an index is interfering with accessing
    or writing data to an index.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig26_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Query results for page latch


    ```

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_latch_wait_count

    ,page_latch_wait_in_ms

    ,CAST(100\. * page_latch_wait_in_ms

    / NULLIF(page_latch_wait_count ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''dbo.PageLatchDemo'');

    Listing 3-38

    Query for Page Latch Statistics in sys.dm_db_index_operational_stats

    ```


    ### Note


    Page I/O and page latch contentions are highly dependent on hardware. Your results
    for the demonstration queries in this section will not identically match the results
    shown.


    ### Page Allocation Cycle


    As a result of the DML activity, leaf and nonleaf pages are allocated or deallocated
    from indexes from time to time. Monitoring page allocations is an important part
    of monitoring an index (see Table [3-17](#338675_3_En_3_Chapter.xhtml#Tab17) for
    options). Through this monitoring, it is possible to get a handle on how an index
    is “breathing” between maintenance windows. This breathing activity is the relationship
    between pages allocated to indexes through inserts and page splits and then the
    removal, or merging, of pages through deletes. By monitoring this activity, you
    can better maintain your indexes and get an idea of when it would be useful to
    increase the index `FILLFACTOR` value.


    Table 3-17


    Page Allocation Cycle Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_allocation_count` | `bigint` | Cumulative count of leaf-level page allocations
    in the index or heap. |

    | `nonleaf_allocation_count` | `bigint` | Cumulative count of page allocations
    caused by page splits above the leaf level. |

    | `leaf_page_merge_count` | `bigint` | Cumulative count of page merges at the
    leaf level. |

    | `nonleaf_page_merge_count` | `bigint` | Cumulative count of page merges above
    the leaf level. |


    As an example of how page allocation occurs on a table, execute the script in
    Listing [3-39](#338675_3_En_3_Chapter.xhtml#PC39). In this script, the table `dbo.AllocationCycle`
    is created. Afterward, 100,000 rows are inserted into the table. Since this is
    a new table, there is no contention on page allocations, and data is added in
    an orderly fashion. At this point, pages have been allocated to the table, and
    the allocations relate specifically to these inserts. This script will run for
    a minute or more. Be sure that Include Actual Execution Plan is not enabled when
    this is executed.


    ```

    USE AdventureWorks2017;

    GO

    SET NOCOUNT ON

    DROP TABLE IF EXISTS dbo.AllocationCycle;

    CREATE TABLE dbo.AllocationCycle (

    ID INT IDENTITY,

    FillerData VARCHAR(1000),

    CreateDate DATETIME,

    CONSTRAINT PK_AllocationCycle PRIMARY KEY CLUSTERED (ID)

    );

    GO

    INSERT INTO dbo.AllocationCycle (FillerData, CreateDate)

    VALUES (NEWID(), GETDATE());

    GO 100000

    Listing 3-39

    T-SQL Script to Generate Page Allocations

    ```


    To verify the allocations, you can check the leaf and nonleaf allocation columns
    `leaf_allocation_count` and `nonleaf_allocation_count` from `sys.dm_db_index_operational_stats`.
    Using the script in Listing [3-40](#338675_3_En_3_Chapter.xhtml#PC40), you see
    that there are 758 allocations at the leaf level and 3 at the nonleaf level (see
    Figure [3-27](#338675_3_En_3_Chapter.xhtml#Fig27)). This is an important point
    to remember whenever using these columns: a portion of the pages allocated can
    be insert-related.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig27_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Query results for insert page allocations


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,ios.leaf_allocation_count

    ,ios.nonleaf_allocation_count

    ,ios.leaf_page_merge_count

    ,ios.nonleaf_page_merge_count

    FROM sys.dm_db_index_operational_stats(DB_ID(), OBJECT_ID(''dbo.AllocationCycle''),
    NULL,NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    Listing 3-40

    Query for Page Latch Statistics in sys.dm_db_index_operational_stats

    ```'
