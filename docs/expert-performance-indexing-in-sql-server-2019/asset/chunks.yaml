- fmt: '# 索引模式对比测试与分析


    ## 第一个测试：基于 `RoleName` 的查询


    针对示例表的第一个测试将查询所有三张表以获取员工姓名和工作角色信息。清单 [11-10] 中显示的查询基于 `dbo.JobRole` 表中的 `RoleName`
    来检索信息。在代码中，`EmployeeJobRole` 表的两个版本使用不同的聚簇键创建。这导致执行计划存在显著差异，如图 [11-10] 和图 [11-11]
    所示。第一个执行计划使用应用了标识列模式的表，比第二个查询的执行计划更复杂，并且占用了另一个计划 61% 的成本。第二个计划基于多列模式设置其聚簇键，操作更少，占执行成本的
    39%。两个计划的主要区别在于，使用多列模式允许聚簇索引基于一个可能经常用于访问表中行的列（本例中是 `JobRoleID` 列）来覆盖表访问。使用另一种模式则无法提供此优势，并且代表了一种不太可能使用的数据访问路径（除非可能需要删除行时）。


    ![图 11-11：多列模式的执行计划](images/338675_3_En_11_Chapter/338675_3_En_11_Fig11_HTML.jpg)

    *Figure 11-11: Execution plan for Multiple Column pattern*


    ![图 11-10：标识列模式的执行计划](images/338675_3_En_11_Chapter/338675_3_En_11_Fig10_HTML.jpg)

    *Figure 11-10: Execution plan for Identity Column pattern*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    ```

    *Listing 11-10: Script for Multiple Column Pattern*


    ## 第二个测试：基于 `EmployeeName` 的查询


    尽管第一个测试结果益处显著，但当查看其他可用的方法时，其优势就不那么令人印象深刻了。例如，假设不使用 `RoleName` 作为谓词，而是使用 `EmployeeName`
    作为谓词。清单 [11-11] 中的脚本演示了此场景。与上次测试脚本相反，这次的结果对于任一聚簇索引设计都没有差异（见图 [11-12] 和图 [11-13]）。图中执行计划相同的原因在于，在多列模式中优化聚簇索引键时选择了偏向
    `JobRoleID`。当使用 `EmployeeID` 列访问数据时，非聚簇索引承担了大部分工作，从而为每个查询生成了良好的、相似的计划。第二次测试的结果并不否定多列模式的使用，但它们确实强调了在执行预期工作负载测试后，才应选择引导聚簇键的列。


    ![图 11-13：多列模式的执行计划](images/338675_3_En_11_Chapter/338675_3_En_11_Fig13_HTML.jpg)

    *Figure 11-13: Execution plan for Multiple Column pattern*


    ![图 11-12：标识列模式的执行计划](images/338675_3_En_11_Chapter/338675_3_En_11_Fig12_HTML.jpg)

    *Figure 11-12: Execution plan for Identity Column pattern*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    ```

    *Listing 11-11: Script for Multiple Column Pattern*


    ## 多列模式的实现与属性


    多列模式的实现方式有多种。可以反转聚簇索引中的关键列，这将改变为测试脚本生成的执行计划。虽然此模式可能有益处，但在使用时应谨慎，并在使用前充分了解预期的工作负载。


    总结多列模式，让我们回顾一下定义良好的聚簇索引的属性。首先，值是静态的。如果发生更改，很可能是删除记录并插入新记录。这实际上仍然是一种更新操作。为了缓解此风险，尝试用最不可能更改或填充变化最小的值来引导聚簇索引。其次是聚簇键是否窄。在此示例中，键大多是窄的，由两个
    4 字节列组成。如果使用更大的列或超过两列，则需要仔细考虑这是否是正确的方法。下一个属性是值是否唯一。在此场景中是唯一的，在现实世界的任何场景中都应该如此。如果不是，那么此模式自然不具备资格。与其他非标识列模式一样，此模式不提供始终递增的聚簇键。


    ## 注意事项


    最后需要注意的是，数据仓库中的事实表常常忍不住使用多列模式。在这些情况下，事实表中的所有维度键都被放入聚簇索引中。这样做的目的是强制事实行的唯一性。其效果是创建一个极宽的聚簇键，然后将其添加到表上的所有非聚簇索引中。很可能聚簇键中的每个维度列在事实表上都有一个单独的索引。结果，这些索引浪费了大量空间，并且由于其大小，其性能比通过非聚簇唯一索引来约束事实表的唯一性要差得多。'
  raw: 'The first test against the example tables will look at querying against all
    three tables to retrieve information on employee names and job roles. These queries,
    shown in Listing [11-10](#338675_3_En_11_Chapter.xhtml#PC10), retrieve information
    based on the `RoleName` from `dbo.JobRole`. In the code, the two versions of the
    `EmployeeJobRole` table are created with different clustering keys. This results
    in a drastic difference in the execution plans, shown in Figure [11-10](#338675_3_En_11_Chapter.xhtml#Fig10)
    and Figure [11-11](#338675_3_En_11_Chapter.xhtml#Fig11), from the test queries.
    The first execution plan using the table with the Identity Column pattern applied
    to it is more complex than the execution plan for the second query and has 61
    percent of the cost compared to the other plan. The second plan, which has its
    clustering keys based on the Multiple Column pattern, has fewer operations and
    accounts for 39 percent of the execution. The main difference between the two
    plans is that using the Multiple Column pattern allows the clustered index to
    cover table access based on a column that is likely to be used to frequently access
    rows in the table, in this case the `JobRoleID` column. Using the other pattern
    does not provide this benefit and represents a data access path that will not
    likely be used, except maybe when needing to delete the row.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig11_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig11_HTML.jpg)


    Figure 11-11


    Execution plan for Multiple Column pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig10_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Execution plan for Identity Column pattern


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    Listing 11-10

    Script for Multiple Column Pattern

    ```


    While the benefits are significant with the first test results, they are less
    impressive when looking at some other methods that can be used. For instance,
    say that instead of using `RoleName` as the predicate, the `EmployeeName` was
    the predicate. The script in Listing [11-11](#338675_3_En_11_Chapter.xhtml#PC11)
    demonstrates this scenario. Contrary to the last test script, the results this
    time are no different than the others for either clustered index design (see Figure
    [11-12](#338675_3_En_11_Chapter.xhtml#Fig12) and Figure [11-13](#338675_3_En_11_Chapter.xhtml#Fig13)).
    The cause of the identical plans in the figure is based on the decision to optimize
    the clustering index keys in the Multiple Column pattern to favor the `JobRoleID`.
    When the `EmployeeID` column is used to access the data, the nonclustered index
    provides most of the heavy lifting, and a good, similar, plan for each query is
    created. The results of this second test do not discount the use of the Multiple
    Column pattern, but they do highlight that the column to lead the clustering key
    should be selected after performing tests with the expected workload.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig13_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Execution plan for Multiple Column pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig12_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Execution plan for Identity Column pattern


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    Listing 11-11

    Script for Multiple Column Pattern

    ```


    There are various ways in which the Multiple Column pattern can be implemented.
    The key columns in the clustered index can be reversed, which would change the
    execution plans generated for the test scripts. While this pattern can be beneficial,
    be cautious when using it and fully understand the workload expected before using
    it.


    To wrap up the Multiple Column pattern, let’s review the attributes of a well-defined
    clustered index. First, the values are static. If there were to be a change, it
    would likely be deleting a record and inserting a new record. This is still effectively
    an update to mitigate this risk attempt to lead the clustered index with the value
    least likely to change or have variations in population. The second is whether
    the clustering key is narrow. In this example, the key was mostly narrow. It was
    comprised of two 4-byte columns. If using larger columns or more than two columns,
    carefully consider if this is the right approach. The next attribute is whether
    the values are unique. They are in this scenario and should be in any scenario
    in the real world. If not, then this pattern is naturally disqualified. Like with
    the other non-Identity Column patterns, this pattern does not provide an ever-increasing
    clustering key.


    As a final note, fact tables in data warehouses often succumb to the temptation
    to use the Multiple Column pattern. In these cases, all the dimension keys in
    the fact table are placed in the clustered index. The aim in doing this is to
    enforce uniqueness on the fact rows. The effect is the creation of an extremely
    wide clustering key, which is then added to all the nonclustered indexes on the
    table. Most likely, each of the dimension columns in the clustered key will have
    a separate index on the fact table. As a result, these indexes waste a lot of
    space and, because of their size, perform much worse than if the uniqueness on
    the fact table were constrained by a nonclustered unique index.'
