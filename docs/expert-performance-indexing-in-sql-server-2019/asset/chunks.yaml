- fmt: '# 索引类型


    假设你需要一种方法，能够搜索图书馆中所有书籍的目录。目录提供了书籍的层级视图。有章节概述书籍的主要部分，随后是子章节标题，提供章节内容的更多细节。这种关系模型与XML文档的设计相似；有节点以及它们之间的关系，共同定义了信息的结构。


    正如在讨论卡片目录时提到的，逐一查看图书馆中的每一本书以找到Jason Strate撰写的书，这效率不高。如果为了查明任何书籍中的任何章节是否由Ted Krueger撰写，而逐一查看图书馆的所有书籍，效率就更低了。每本书可能都有不止一章，这意味着每本书都需要检查多个值，并且在检查之前无法确定需要查看多少章。


    解决这个问题的一种方法是列出图书馆中的每一本书，并列出每本书的所有章节。每本书在列表中有一个或多个章节条目。这提供了与卡片目录相同的优点，但适用于一些非标准的信息。在数据库中，这正是*XML索引*和为JavaScript对象表示法（JSON）建立索引所能实现的。


    对于XML文档中的每个节点，都会在XML索引中创建一个条目。这些信息持久保存在内部表中，SQL Server可以使用这些表来确定XML文档是否包含正在查询的数据。类似地，对于JSON，要索引的值通过计算列上的索引具体化。


    创建和维护XML索引可能相当昂贵。每次更新索引时，它都需要将XML文档的所有节点分解到XML索引中。XML文档越大，这个过程的成本就越高。但是，如果XML列中的数据将经常被查询，那么创建和维护XML索引的成本可以通过在运行时无需分解所有XML文档而迅速抵消。


    ## 空间索引


    每个图书馆都有地图。有些地图覆盖海洋；有些则覆盖大陆、国家、州或城市。图书馆里可以找到各种地图，每张地图可能对相同区域提供不同的视图和信息。所有这些地图都存在两个基本挑战。首先，你可能想知道哪些地图重叠或包含相同的信息。例如，你可能对所有包含明尼苏达州的地图感兴趣。第二个挑战是，当你想要找到图书馆中所有在特定地点编写或出版的书籍时。同样，在这种情况下，在明尼阿波利斯25英里范围内编写了多少本书？


    这两者都带来了一个问题，因为传统上，数据库中的数据是相当一维的，这意味着数据代表离散的事实。在物理世界中，数据通常存在于不止一个维度。地图是二维的，建筑物和楼层平面图是三维的。为了解决这个问题，SQL
    Server提供了创建*spatial indexes*的功能。


    空间索引将提供的空间信息分解为数据的四级表示。这种表示允许SQL Server在记录中绘制空间信息（包括`geometry`和`geography`），以确定行在哪里重叠以及一个点与另一个点的接近程度。


    空间索引存在一些限制。主要限制是空间索引必须创建在具有主键的表上。没有主键，空间索引的创建将不会成功。此外，在创建空间索引时，它们被限制使用并行处理；并且一次只能在一个表上构建一个空间索引，这影响了它们的创建速度。另外，空间索引不能在索引视图上使用。这些以及其他限制在第[5](#338675_3_En_5_Chapter.xhtml)章中有介绍。


    与XML索引类似，空间索引有与其大小相关的前期成本和维护成本。好处是，当需要使用查询空间数据的特定方法来查询空间数据时，空间索引的价值可以很快体现出来。空间索引将在第[5](#338675_3_En_5_Chapter.xhtml)章中更深入地讨论。


    ## 哈希和范围索引


    当书籍进入图书馆时，有时它们被归还的频率超过了被放回书架的速度。将书籍分类并放回原处需要时间。在这些时候，图书馆管理员通常会在那里跟踪归还的书籍。对于这些书籍，图书馆管理员通常能记住归还书籍队列中哪些书在哪里，并能在不使用卡片目录的情况下找到你想要的书。这本质上就是内存优化表使用哈希和范围索引所做的事情。唯一的区别是，借助哈希和范围索引，数百万行（或书籍）可以保存在内存中，而无需依赖基于磁盘的结构来支持它们。


    哈希索引允许内存优化表提供表中数据的点查找。换句话说，索引（或图书馆管理员）每次需要时都能准确记住表中书籍的位置并为书建立索引。


    或者，范围索引为内存优化表提供了高效识别项目范围的能力。例如，如果索引（或图书馆管理员）需要所有在上午8点到12点之间归还的书籍，索引将能够扫描行，而不是以逐行操作的方式访问行。


    对于范围索引和哈希索引，有几点需要考虑。首先，哈希和范围索引只允许在内存优化表上使用。关于记住书籍位置的引用，正是哈希和范围索引与其他索引类型的不同之处。在磁盘和内存之间，聚集索引的结构相对不变。而对于哈希和范围索引，其结构是专门为快速内存访问而设计的，并仅利用磁盘来支持事务一致性以及在数据库上线时在内存中重建索引的能力。


    ## 全文搜索


    最后一个要探讨的场景是在书中查找特定术语的想法。卡片目录在提供按作者、主题或标题查找书籍的信息方面做得很好。一本书的主题并不是你可能想用来搜索书籍的唯一关键词。许多书的后面都有关键词索引，帮助你在书中查找其他主题。当这本书完成时，将会有一个索引，其中会有`full-text
    search`这个条目，并附有指向本页以及本书中讨论此内容的其他页的引用。


    试想一下，如果图书馆里的每本书都有一个关键词索引。此外，让我们把所有这些关键词放到它们自己的卡片目录中。有了这个卡片目录，你将能够找到图书馆中每一本提及`full-text
    search`的书籍，以及讨论此内容的每一页的引用。一般来说，这就是全文搜索实现所提供的功能，只是它几乎涵盖了书中的所有词语。


    # 索引变体


    至此，你已经了解了SQL Server中可用的不同类型的索引。这些并不是定义索引的唯一方式。还有一些索引属性可用于创建先前讨论的索引类型的变体。实现这些变体有助于实施与数据相关的业务规则，并可以提高索引的性能。'
  raw: '### JSON and XML Indexes


    Suppose you needed a method to be able to search the table of contents for all
    the books in the library. A table of contents provides a hierarchical view of
    a book. There are chapters that outline the main sections for the book, which
    are followed by subchapter heads that provide more details of the contents of
    the chapter. This relationship model is similar to how XML documents are designed;
    there are nodes and a relation between them that define the structure of the information.


    As discussed with the card catalog, it would not be efficient to look through
    every book in the library to find those that were written by Jason Strate. It
    would be even less efficient to look through all the books in the library to find
    out whether any of the chapters in any of the books were written by Ted Krueger.
    Each book probably has more than one chapter, resulting in multiple values that
    would need to be checked for each book and no certainty as to how many chapters
    would need to be looked at before checking.


    One method of solving this problem would be to make a list of every book in the
    library and list all the chapters for each book. Each book would have one or more
    chapter entries in the list. This provides the same benefit that a card catalog
    provides, but for some less than standard information. In a database, this is
    what *XML indexes* and indexing JavaScript Object Notation (JSON) can accomplish.


    For every node in an XML document, an entry is made in the XML index. This information
    is persisted in internal tables that SQL Server can use to determine whether the
    XML document contains the data that is being queried. Similarly with JSON, the
    values to index are materialized with an index on a calculated column.


    Creating and maintaining XML indexes can be quite costly. Every time the index
    is updated, it needs to shred all the nodes of the XML document into the XML index.
    The larger the XML document, the more costly this process will be. However, if
    data in an XML column will be queried often, the cost of creating and maintaining
    an XML index can be offset quickly by removing the need to shred all the XML documents
    at runtime.


    ### Spatial Indexes


    Every library has maps. Some maps cover the oceans; others are for continents,
    countries, states, or cities. Various maps can be found in a library, each providing
    a different view and information of perhaps the same areas. There are two basic
    challenges that exist with all these maps. First, you may want to know which maps
    overlap or include the same information. For instance, you may be interested in
    all the maps that include Minnesota. The second challenge is when you want to
    find all the books in the library that were written or published at a specific
    place. Again, in this case, how many books were written within 25 miles of Minneapolis?


    Both of these present a problem because, traditionally, data in a database is
    fairly one-dimensional, meaning that data represents discrete facts. In the physical
    world, data often exists in more than one dimension. Maps are two-dimensional,
    and buildings and floor plans are three-dimensional. To solve this problem, SQL
    Server provides the capabilities for *spatial indexes* .


    Spatial indexes dissect the spatial information that is provided into a four-level
    representation of the data. This representation allows SQL Server to plot out
    the spatial information, both geometry and geography, in the record to determine
    where rows overlap and the proximity of one point to another point.


    There are a few restrictions that exist with spatial indexes. The main restriction
    is that spatial indexes must be created on tables that have primary keys. Without
    a primary key, the spatial index creation will not succeed. Additionally when
    creating spatial indexes, they are restricted from utilizing parallel processing;
    and only a single spatial index can be built on a table at a time, which impacts
    the speed in which they can be created. Also, spatial indexes cannot be used on
    indexed views. These and other restrictions are covered in Chapter [5](#338675_3_En_5_Chapter.xhtml).


    Similar to XML indexes, spatial indexes have up-front and maintenance costs associated
    with their sizes. The benefit is that when spatial data needs to be queried using
    specific methods for querying spatial data, the value of the spatial index can
    be quickly realized. Spatial indexes will be discussed in more depth in Chapter
    [5](#338675_3_En_5_Chapter.xhtml).


    ### Hash and Range Indexes


    As books come into the library, sometimes the frequency in which they are returned
    exceeds the rate in which they are placed back into the stacks. It takes time
    to sort the books and put them where they go. At these times, a librarian is often
    there keeping track of what is returned. For these books, the librarian can often
    remember which books are where in the queue of returned books and get the book
    you want without the use of the card catalog. This is in essence what memory-optimized
    tables do with hash and range indexes. The only difference is that with hash and
    range indexes, millions of rows, or books, can be kept in memory without needing
    to rely on disk-based structures to support them.


    A hash index allows a memory-optimized table to provide point lookups of data
    within the table. In other words, the index, or the librarian, can remember exactly
    where the book is in the table and index each time it is needed.


    Alternatively, a range index provides memory-optimized tables with the capability
    to efficiently identify ranges of items. For instance, if the index, or librarian,
    needed all the books returned between 8 a.m. and 12 p.m., the index would be able
    to scan across the rows vs. accessing rows in row-by-row operations.


    For both range and hash indexes, there are a few things to consider. First, hash
    and range indexes are allowed only on memory-optimized tables. The reference to
    remembering where the books are is really what is different about hash and range
    indexes over other index types. Between disk and memory, the structure of a clustered
    index is relatively unchanged. With hash and range indexes, the structure is designed
    specifically for fast memory access and leverages disk solely to support transaction
    consistency and the ability to rebuild the index in memory when the database comes
    online.


    ### Full-Text Search


    The last scenario to consider is the idea of finding specific terms within books.
    Card catalogs do a good job of providing information on finding books by author,
    title, or subject. The subject of a book isn’t the only keyword you may want to
    use to search for books. At the back of many books are keyword indexes to help
    you find other subjects within a book. When this book is completed, there will
    be an index, and it will have the entry full-text search in it with a reference
    to this page and other pages where this is discussed in this book.


    Consider for a moment if every book in the library had a keyword index. Furthermore,
    let’s take all those keywords and place them in their own card catalog. With this
    card catalog, you’d be able to find every book in the library with references
    to every page that discusses full-text searches. Generally speaking, this is what
    an implementation of a full-text search provides except it covers nearly all words
    in the books.


    ## Index Variations


    Up to this point, you’ve looked at the different types of indexes available within
    SQL Server. These aren’t the only ways in which indexes can be defined. There
    are a few index properties that can be used to create variations on the types
    of indexes discussed previously. Implementing these variations can assist in implementing
    business rules associated with the data and can help improve the performance of
    the index.'
  trans: '# 索引类型


    假设你需要一种方法，能够搜索图书馆中所有书籍的目录。目录提供了书籍的层级视图。有章节概述书籍的主要部分，随后是子章节标题，提供章节内容的更多细节。这种关系模型与
    XML 文档的设计相似；有节点以及它们之间的关系，共同定义了信息的结构。


    正如在讨论卡片目录时提到的，逐一查看图书馆中的每一本书以找到 Jason Strate 撰写的书，这效率不高。如果为了查明任何书籍中的任何章节是否由 Ted
    Krueger 撰写，而逐一查看图书馆的所有书籍，效率就更低了。每本书可能都有不止一章，这意味着每本书都需要检查多个值，并且在检查之前无法确定需要查看多少章。


    解决这个问题的一种方法是列出图书馆中的每一本书，并列出每本书的所有章节。每本书在列表中有一个或多个章节条目。这提供了与卡片目录相同的优点，但适用于一些非标准的信息。在数据库中，这正是*XML
    索引*和为 JavaScript 对象表示法（JSON）建立索引所能实现的。


    对于 XML 文档中的每个节点，都会在 XML 索引中创建一个条目。这些信息持久保存在内部表中，SQL Server 可以使用这些表来确定 XML 文档是否包含正在查询的数据。类似地，对于
    JSON，要索引的值通过计算列上的索引具体化。


    创建和维护 XML 索引可能相当昂贵。每次更新索引时，它都需要将 XML 文档的所有节点分解到 XML 索引中。XML 文档越大，这个过程的成本就越高。但是，如果
    XML 列中的数据将经常被查询，那么创建和维护 XML 索引的成本可以通过在运行时无需分解所有 XML 文档而迅速抵消。


    ## 空间索引


    每个图书馆都有地图。有些地图覆盖海洋；有些则覆盖大陆、国家、州或城市。图书馆里可以找到各种地图，每张地图可能对相同区域提供不同的视图和信息。所有这些地图都存在两个基本挑战。首先，你可能想知道哪些地图重叠或包含相同的信息。例如，你可能对所有包含明尼苏达州的地图感兴趣。第二个挑战是，当你想要找到图书馆中所有在特定地点编写或出版的书籍时。同样，在这种情况下，在明尼阿波利斯
    25 英里范围内编写了多少本书？


    这两者都带来了一个问题，因为传统上，数据库中的数据是相当一维的，这意味着数据代表离散的事实。在物理世界中，数据通常存在于不止一个维度。地图是二维的，建筑物和楼层平面图是三维的。为了解决这个问题，SQL
    Server 提供了创建*spatial indexes*的功能。


    空间索引将提供的空间信息分解为数据的四级表示。这种表示允许 SQL Server 在记录中绘制空间信息（包括`geometry`和`geography`），以确定行在哪里重叠以及一个点与另一个点的接近程度。


    空间索引存在一些限制。主要限制是空间索引必须创建在具有主键的表上。没有主键，空间索引的创建将不会成功。此外，在创建空间索引时，它们被限制使用并行处理；并且一次只能在一个表上构建一个空间索引，这影响了它们的创建速度。另外，空间索引不能在索引视图上使用。这些以及其他限制在第
    5 章中有介绍。


    与 XML 索引类似，空间索引有与其大小相关的前期成本和维护成本。好处是，当需要使用查询空间数据的特定方法来查询空间数据时，空间索引的价值可以很快体现出来。空间索引将在第
    5 章中更深入地讨论。


    ## 哈希和范围索引


    当书籍进入图书馆时，有时它们被归还的频率超过了被放回书架的速度。将书籍分类并放回原处需要时间。在这些时候，图书馆管理员通常会在那里跟踪归还的书籍。对于这些书籍，图书馆管理员通常能记住归还书籍队列中哪些书在哪里，并能在不使用卡片目录的情况下找到你想要的书。这本质上就是内存优化表使用哈希和范围索引所做的事情。唯一的区别是，借助哈希和范围索引，数百万行（或书籍）可以保存在内存中，而无需依赖基于磁盘的结构来支持它们。


    哈希索引允许内存优化表提供表中数据的点查找。换句话说，索引（或图书馆管理员）每次需要时都能准确记住表中书籍的位置并为书建立索引。


    或者，范围索引为内存优化表提供了高效识别项目范围的能力。例如，如果索引（或图书馆管理员）需要所有在上午 8 点到 12 点之间归还的书籍，索引将能够扫描行，而不是以逐行操作的方式访问行。


    对于范围索引和哈希索引，有几点需要考虑。首先，哈希和范围索引只允许在内存优化表上使用。关于记住书籍位置的引用，正是哈希和范围索引与其他索引类型的不同之处。在磁盘和内存之间，聚集索引的结构相对不变。而对于哈希和范围索引，其结构是专门为快速内存访问而设计的，并仅利用磁盘来支持事务一致性以及在数据库上线时在内存中重建索引的能力。


    ## 全文搜索


    最后一个要探讨的场景是在书中查找特定术语的想法。卡片目录在提供按作者、主题或标题查找书籍的信息方面做得很好。一本书的主题并不是你可能想用来搜索书籍的唯一关键词。许多书的后面都有关键词索引，帮助你在书中查找其他主题。当这本书完成时，将会有一个索引，其中会有`full-text
    search`这个条目，并附有指向本页以及本书中讨论此内容的其他页的引用。


    试想一下，如果图书馆里的每本书都有一个关键词索引。此外，让我们把所有这些关键词放到它们自己的卡片目录中。有了这个卡片目录，你将能够找到图书馆中每一本提及`full-text
    search`的书籍，以及讨论此内容的每一页的引用。一般来说，这就是全文搜索实现所提供的功能，只是它几乎涵盖了书中的所有词语。


    # 索引变体


    至此，你已经了解了 SQL Server 中可用的不同类型的索引。这些并不是定义索引的唯一方式。还有一些索引属性可用于创建先前讨论的索引类型的变体。实现这些变体有助于实施与数据相关的业务规则，并可以提高索引的性能。'
- fmt: '## Primary Key


    在图书馆的类比中，我讨论了所有书籍都有杜威十进制分类号。这个唯一的数字标识了每本书及其在图书馆中的位置。类似地，可以定义一个表上的索引来唯一标识表中的记录。为此，索引被创建为主键。杜威十进制分类号和主键之间有一些差异，但从概念上讲，它们是相同的。


    主键用于标识表中的记录。因此，表中不能有任何记录具有相同的主键值。通常，主键会在单个列上创建，但它也可以由多个列组成。


    使用主键时还需要记住一些其他事项。首先，主键是标识表中每条记录的唯一值。因此，主键中的所有值都必须填充。主键中不允许有 null 值。此外，一个表上只能有一个主键。表中可能有其他标识信息，但只能将单个列或列集标识为主键。最后，虽然不是必需的，但主键通常建立在聚集索引上。默认情况下，主键将是聚集的，但可以覆盖此行为，并且如果已存在聚集索引，则此行为将被忽略。关于为何这样做的更多信息将包含在第
    8 章中。


    ## Unique Index


    如前所述，可能有不止一个列或列集可用于唯一标识表中的记录。这类似于在图书馆中有不止一种方法可以唯一标识一本书。除了杜威十进制分类号，一本书还可以通过其 ISBN
    来识别。在数据库中，这类信息可以用 **唯一索引** 来表示。


    与主键类似，索引被约束为在索引中只出现一个值。唯一索引与之相似，它提供了一种机制来唯一标识表中的记录，并且也可以跨单个列或多个列创建。


    主键和唯一索引之间的一个主要区别是当引入 null 值的可能性时的行为。唯一索引允许被索引的列中包含 null 值。null 值被视为一个离散值，在唯一索引的键列中只允许一种
    null 值的组合。


    ## Included Columns


    假设你想找到 Douglas Adams 写的所有书，并了解每本书有多少页。你最初可能倾向于先在卡片目录中查找书籍，然后找到每本书并记下页数。这样做会相当耗时。如果你手头就有这些信息，而不是查找每本书，那将更好地利用你的时间。对于卡片目录，你实际上不需要为了页数而找到每本书，因为大多数卡片目录在索引卡上就包含了页数。在索引方面，通过
    **包含列** 在索引列之外添加信息。


    当构建非聚集索引时，有一个选项可以将包含列添加到索引中。这些列作为未排序的数据存储在索引中的已排序数据内。包含列不能包含已在索引的初始排序列列表中使用的任何列。


    在查询方面，允许用户查找排序列之外的信息。如果查询所需的所有信息都在包含列中，则查询不需要访问表的堆或聚集索引来完成结果。与卡片目录示例类似，包含列可以显著提高查询性能。


    ## Partitioned Indexes


    涵盖大量数据的书籍可能会相当大。如果你查看字典或莎士比亚全集，这些书通常很厚。书可以变得很大，以至于将它们包含在单个卷中是不切实际的。最好的例子是百科全书。


    百科全书很少包含在一本书中。原因很简单——书的大小和装订的宽度将超出几乎任何人的处理能力。此外，在百科全书中查找所有以字母 *S* 开头的主题所需的时间大大减少，因为你可以直接找到
    S 卷，而不必翻阅一本巨大的书来找到它们的起始位置。


    这个问题不仅限于书籍。表也存在类似的问题。表及其索引可能达到使其难以在合理时间内继续维护索引的程度。此外，如果表有数百万或数十亿行，能够扫描表的有限部分而不是整个表，可以提供显著的性能改进。为了解决表上的这个问题，索引能够被
    **分区**。


    **分区** 可以发生在聚集和非聚集索引上。它允许索引根据函数提供的值进行拆分。通过这样做，索引中的数据在物理上被分离到多个分区中，而索引本身仍然是一个逻辑对象。


    ## Filtered Indexes


    默认情况下，非聚集索引为与其关联的表中的每一行包含一条记录。在大多数情况下，这是理想的，并为索引提供了协助列中任何值选择性的机会。


    在某些非典型情况下，将表中的所有记录包含在索引中并不理想。例如，最常查询的值集可能只代表表中的少数行。在这种情况下，限制索引中的行数将减少查询需要执行的工作量，从而提高查询性能。另一种情况是，某个值的选择性相对于表中的行数较低。这可能是活动状态或已发货的布尔值；对这些值进行索引不会显著提高性能，但过滤到仅这些记录将为查询改进提供显著的机会。


    为了协助这些场景，可以 **筛选** 非聚集索引以减少其包含的记录数。构建索引时，可以定义为基于一个简单的比较来包含或排除记录，从而减少索引的大小。


    除了上述性能改进之外，使用筛选索引还有其他好处。第一个改进是降低了存储成本。由于筛选索引中的记录较少，因为过滤，索引中的数据会更少，这需要更少的存储空间。另一个好处是降低了维护成本。类似于存储成本的降低，由于需要维护的数据更少，因此维护索引所需的时间也更少。'
  raw: '### Primary Key


    In the library analogy, I discussed how all the books have a Dewey Decimal number.
    This unique number identifies each book and where it is in the library. In a similar
    fashion, one index on a table can be defined to uniquely identify records within
    a table. To do this, an index is created as the primary key. There are some differences
    between the Dewey Decimal number and a primary key, but conceptually they are
    the same.


    A primary key is used to identify a record within a table. For this reason, none
    of the records in a table can have the same primary key value. Typically, a primary
    key will be created on a single column, though it can be composed of multiple
    columns.


    There are a few other things that need to be remembered when using a primary key.
    First, a primary key is a unique value that identifies each record in a table.
    Because of this, all values within a primary key must be populated. No null values
    are allowed in a primary key. Also, there can be only one primary key on a table.
    There may be other identifying information in a table, but only a single column
    or set of columns can be identified as the primary key. Lastly, although it is
    not required, a primary key will typically be built on a clustered index. The
    primary key will be clustered by default, but this behavior can be overridden
    and will be ignored if a clustered index already exists. More information on why
    this is done will be included in Chapter [8](#338675_3_En_8_Chapter.xhtml).


    ### Unique Index


    As mentioned previously, there can be more than a single column or set of columns
    that can be used to uniquely identify a record in a table. This is similar to
    the fact that there is more than one way to uniquely identify a book in a library.
    Besides the Dewey Decimal number, a book can also be identified through its ISBN.
    Within a database, this type of information can be represented with a *unique
    index* .


    Similar to the primary key, an index is constrained so that only a single value
    appears within the index. A unique index is similar in that it provides a mechanism
    to uniquely identify records in a table and can also be created across a single
    column or multiple columns.


    One chief difference between a primary key and a unique index is the behavior
    when the possibility of null values is introduced. A unique index will allow null
    values within the columns being indexed. A null value is considered a discrete
    value, and only one combination of null values is allowed across the key column
    in a unique index.


    ### Included Columns


    Suppose you want to find all the books written by Douglas Adams and find out how
    many pages are in each book. You may at first be inclined to look up the books
    in the card catalog and then find each book and write down the number of pages.
    Doing this would be fairly time-consuming. It would be a better use of your time
    if instead of looking up each book, you had that information on hand. With a card
    catalog, you wouldn’t actually need to find each book for a page count, though,
    since most card catalogs include the page count on the index card. When it comes
    to indexing, including information outside the indexed columns is done through
    *included columns* .


    When a nonclustered index is built, there is an option to add included columns
    into the index. These columns are stored as nonsorted data within the sorted data
    in the index. Included columns cannot include any columns that have been used
    in the initial sorted column list of the index.


    In terms of querying, included columns allow users to look up information outside
    the sorted columns. If everything they need for the query is in the included columns,
    the query does not need to access the heap or clustered index for the table to
    complete the results. Similar to the card catalog example, included columns can
    significantly improve the performance of a query.


    ### Partitioned Indexes


    Books that cover a lot of data can get fairly large. If you look at a dictionary
    or the complete works of William Shakespeare, these are often quite thick. Books
    can get large enough that the idea of containing them in a single volume just
    isn’t practical. The best example of this is an encyclopedia.


    It is rare that an encyclopedia is contained in a single book. The reason is quite
    simple—the size of the book and the width of the binding would be beyond the ability
    of nearly anyone to manage. Also, the time it takes to find all the subjects in
    the encyclopedia that start with the letter *S* is greatly improved because you
    can go directly to the S volume instead of paging through an enormous book to
    find where they start.


    This problem isn’t limited to books. A problem similar to this exists with tables.
    Tables and their indexes can get to a point where their size makes it difficult
    to continue to maintain the indexes in a reasonable time period. Along with that,
    if the table has millions or billions of rows, being able to scan across limited
    portions of the table vs. the whole table can provide significant performance
    improvements. To solve this problem on a table, indexes have the ability to be
    partitioned.


    *Partitioning* can occur on both clustered and nonclustered indexes. It allows
    an index to be split along the values supplied by a function. By doing this, the
    data in the index is physically separated into multiple partitions, while the
    index itself is still a single logical object.


    ### Filtered Indexes


    By default, nonclustered indexes contain one record in them for every row in the
    table for which the index is associated. In most cases, this is ideal and provides
    the index an opportunity to assist in selectivity for any value in the column.


    There are atypical situations where including all the records in a table in an
    index is less than ideal. For instance, the set of values most often queried may
    represent a small number of rows in a table. In this case, limiting the rows in
    the index will reduce the amount of work a query needs to perform, resulting in
    an improvement in the performance of the query. Another could be where the selectivity
    of a value is low compared to the number of rows in the table. This could be an
    active status or shipped Boolean values; indexing on these values wouldn’t drastically
    improve performance, but filtering to just those records would provide a significant
    opportunity for query improvement.


    To assist in these scenarios, nonclustered indexes can be filtered to reduce the
    number of records they contain. When the index is built, it can be defined to
    include or exclude records based on a simple comparison that reduces the size
    of the index.


    Besides the performance improvements outlined, there are other benefits to using
    filtered indexes. The first improvement is reduced storage costs. Since filtered
    indexes have fewer records in them, because of the filtering, there will be less
    data in the index, which requires less storage space. Another benefit is reduced
    maintenance costs. Similar to the reduced storage costs, since there is less data
    to maintain, less time is required to maintain the index.'
  trans: '## 主键


    在图书馆的类比中，我提到了所有书籍都有杜威十进制分类号。这个唯一的数字标识了每本书及其在图书馆中的位置。类似地，可以定义表上的一个索引来唯一标识表中的记录。为此，索引被创建为**主键**。杜威十进制分类号和主键之间有一些差异，但从概念上讲，它们是相同的。


    主键用于标识表中的记录。因此，表中不能有任何记录具有相同的主键值。通常，主键会在单个列上创建，但它也可以由多个列组成。


    使用主键时还需要记住一些其他事项。首先，主键是标识表中每条记录的唯一值。因此，主键中的所有值都必须填充。主键中不允许有 null 值。此外，一个表上只能有一个主键。表中可能有其他标识信息，但只能将单个列或列集标识为主键。最后，虽然不是必需的，但主键通常建立在聚集索引上。默认情况下，主键将是聚集的，但可以覆盖此行为，并且如果已存在聚集索引，则此行为将被忽略。关于为何这样做的更多信息将包含在第
    8 章中。


    ## 唯一索引


    如前所述，可能有不止一个列或列集可用于唯一标识表中的记录。这类似于在图书馆中有不止一种方法可以唯一标识一本书。除了杜威十进制分类号，一本书还可以通过其 ISBN
    来识别。在数据库中，这类信息可以用 **唯一索引** 来表示。


    与主键类似，索引被约束为在索引中只出现一个值。唯一索引与之相似，它提供了一种机制来唯一标识表中的记录，并且也可以跨单个列或多个列创建。


    主键和唯一索引之间的一个主要区别是当引入 null 值的可能性时的行为。唯一索引允许被索引的列中包含 null 值。null 值被视为一个离散值，在唯一索引的键列中只允许一种
    null 值的组合。


    ## 包含列


    假设你想找到 Douglas Adams 写的所有书，并了解每本书有多少页。你最初可能倾向于先在卡片目录中查找书籍，然后找到每本书并记下页数。这样做会相当耗时。如果你手头就有这些信息，而不是查找每本书，那将更好地利用你的时间。对于卡片目录，你实际上不需要为了页数而找到每本书，因为大多数卡片目录在索引卡上就包含了页数。在索引方面，通过
    **包含列** 在索引列之外添加信息。


    当构建非聚集索引时，有一个选项可以将包含列添加到索引中。这些列作为未排序的数据存储在索引中的已排序数据内。包含列不能包含已在索引的初始排序列列表中使用的任何列。


    在查询方面，允许用户查找排序列之外的信息。如果查询所需的所有信息都在包含列中，则查询不需要访问表的堆或聚集索引来完成结果。与卡片目录示例类似，包含列可以显著提高查询性能。


    ## 分区索引


    涵盖大量数据的书籍可能会相当大。如果你查看字典或莎士比亚全集，这些书通常很厚。书可以变得很大，以至于将它们包含在单个卷中是不切实际的。最好的例子是百科全书。


    百科全书很少包含在一本书中。原因很简单——书的大小和装订的宽度将超出几乎任何人的处理能力。此外，在百科全书中查找所有以字母 *S* 开头的主题所需的时间大大减少，因为你可以直接找到
    S 卷，而不必翻阅一本巨大的书来找到它们的起始位置。


    这个问题不仅限于书籍。表也存在类似的问题。表及其索引可能达到使其难以在合理时间内继续维护索引的程度。此外，如果表有数百万或数十亿行，能够扫描表的有限部分而不是整个表，可以提供显著的性能改进。为了解决表上的这个问题，索引能够被
    **分区**。


    **分区** 可以发生在聚集和非聚集索引上。它允许索引根据函数提供的值进行拆分。通过这样做，索引中的数据在物理上被分离到多个分区中，而索引本身仍然是一个逻辑对象。


    ## 筛选索引


    默认情况下，非聚集索引为与其关联的表中的每一行包含一条记录。在大多数情况下，这是理想的，并为索引提供了协助列中任何值选择性的机会。


    在某些非典型情况下，将表中的所有记录包含在索引中并不理想。例如，最常查询的值集可能只代表表中的少数行。在这种情况下，限制索引中的行数将减少查询需要执行的工作量，从而提高查询性能。另一种情况是，某个值的选择性相对于表中的行数较低。这可能是活动状态或已发货的布尔值；对这些值进行索引不会显著提高性能，但过滤到仅这些记录将为查询改进提供显著的机会。


    为了协助这些场景，可以 **筛选** 非聚集索引以减少其包含的记录数。构建索引时，可以定义为基于一个简单的比较来包含或排除记录，从而减少索引的大小。


    除了上述性能改进之外，使用筛选索引还有其他好处。第一个改进是降低了存储成本。由于筛选索引中的记录较少，因为过滤，索引中的数据会更少，这需要更少的存储空间。另一个好处是降低了维护成本。类似于存储成本的降低，由于需要维护的数据更少，因此维护索引所需的时间也更少。'
- fmt: '## Compression and Indexing


    Today’s libraries have a lot of books in them. As the number of books increases,
    there comes a point where it becomes more and more difficult to manage the library
    with the existing staff and resources. Because of this, there are a number of
    ways that libraries find to store books, or the information within them, to allow
    better management without increasing the resources required to maintain the library.
    As an example, books can be stored on microfiche or made available only through
    electronic means. This provides the benefits of reducing the amount of space needed
    to store the materials and allows library patrons a means to look at more books
    more quickly.


    Similarly, indexes can reach the point of becoming difficult to manage when they
    get too large. Also, the time required to access the records can increase beyond
    acceptable levels. There are two types of compression available in SQL Server:
    row-level and page-level compression.


    With `row-level compression`, an index compresses each record at the row level.
    When row-level compression is enabled, a number of changes are made to each record.
    To begin with, the metadata for the row is stored in an alternative format that
    decreases the amount of information stored on each column, but because of another
    change, it may actually increase the size of the overhead. The main changes to
    the records are numerical data changes from fixed to variable length and blank
    spaces at the end of fixed-length string data types that are not stored. Another
    change is that null or zero values do not require any space to be stored.


    `Page-level compression` is similar to row-level compression, but it also includes
    compression across a group of rows. When page-level compression is enabled, similarities
    between string values in columns are identified and compressed. This will be discussed
    in detail in Chapter [2](#338675_3_En_2_Chapter.xhtml).


    With both row-level and page-level compression, there are some things to be taken
    into consideration. To begin with, compressing a record takes additional central
    processing unit (CPU) time. Although the row will take up less space, the CPU
    is the primary resource used to handle the compression task before it can be stored.
    Along with that, depending on the type of data in your tables and indexes, the
    effectiveness of the compression will vary.


    ## Index Data Definition Language


    Similar to the richness in types and variations of indexes available in SQL Server,
    there is also a rich data definition language (DDL) that surrounds building indexes.
    In this section, you will examine the DDL for building indexes. First, you’ll
    look at the `CREATE` statement and its options and pair them with the concepts
    discussed previously in this chapter.


    For the sake of brevity, I won’t discuss the backward-compatible features of the
    index DDL; you can find information on those features in SQL Docs for SQL Server
    2012. I’ll discuss XML and spatial indexes and full-text search further in later
    chapters.


    ### Creating an Index


    Before an index can exist within your database, it must first be created. This
    is accomplished with the `CREATE INDEX` syntax shown in Listing [1-1](#338675_3_En_1_Chapter.xhtml#PC1).
    As the syntax illustrates, most of the index types and variations previously discussed
    are available through the basic syntax.


    ```sql

    CREATE [ UNIQUE ] [ CLUSTERED | NONCLUSTERED ] INDEX index_name

    ON  ( column [ ASC | DESC ] [ ,...n ] )

    [ INCLUDE ( column_name [ ,...n ] ) ]

    [ WHERE  ]

    [ WITH (  [ ,...n ] ) ]

    [ ON { partition_scheme_name ( column_name )

    | filegroup_name

    | default

    }

    ]

    [ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | "NULL" }
    ]

    [ ; ]

    -- Listing 1-1

    -- CREATE INDEX Syntax

    ```


    The choice between `CLUSTERED` and `NONCLUSTERED` indexing determines whether
    an index will be built as one of those two basic types. Excluding either of these
    types will default the index to nonclustered.


    The uniqueness of the index is determined by the `UNIQUE` keyword; including it
    within the `CREATE INDEX` syntax will make the index unique. The syntax for creating
    an index as a primary key will be included later in this chapter.


    The `<object>` option determines the base object over which the index will be
    built. The syntax allows for indexes to be created on either tables or views.
    The specification of the object can include the database name and schema name,
    if needed.


    After specifying the object for the index, the sorted columns of an index are
    listed. These columns are usually referred to as the *key columns*. Each column
    can appear in the index only a single time. By default, the columns will be sorted
    in the index in ascending order, but descending order can be specified instead.
    An index can include up to 32 columns as part of the index key with a total size
    not to excess 1,700 bytes. Prior to SQL Server 2016, it was 16 columns and 900
    bytes.


    As an option, `included` columns can be specified on any nonclustered index, which
    are added after the key columns for the index. There is no option for either ascending
    or descending since `included` columns are not sorted. Between the key and nonkey
    columns, there can be up to 1,023 columns in an index. The size restriction on
    the key columns does not affect `included` columns.


    If an index will be filtered, this information is specified next. The filtering
    criteria are added to an index through a `WHERE` clause. The `WHERE` clause can
    use any of the following comparisons: `IS`, `IS NOT`, `=`, `<>`, `!=`, `>`, `>=`,
    `!>`, `<`, `<=`, and `!<`. Also, a filtered index cannot use comparisons against
    a `computed` column, a user-defined type (`UDT`) column, a `spatial` data type
    column, or a `HierarchyID` data type column.


    You can use a number of options when creating an index. In Listing [1-1](#338675_3_En_1_Chapter.xhtml#PC1),
    there is a segment for adding index options, noted by the tag `<relational_index_option>`.
    These index options control both how indexes are created and how they will function
    in some scenarios. Listing [1-2](#338675_3_En_1_Chapter.xhtml#PC2) provides the
    DDL for the available options available for `CREATE INDEX`.


    ```sql

    PAD_INDEX = { ON | OFF }

    | FILLFACTOR = fillfactor

    | SORT_IN_TEMPDB = { ON | OFF }

    | IGNORE_DUP_KEY = { ON | OFF }

    | STATISTICS_NORECOMPUTE = { ON | OFF }

    | STATISTICS_INCREMENTAL = { ON | OFF }

    | DROP_EXISTING = { ON | OFF }

    | ONLINE = { ON | OFF }

    | RESUMABLE = {ON | OF }

    | MAX_DURATION =  [MINUTES]

    | ALLOW_ROW_LOCKS = { ON | OFF }

    | ALLOW_PAGE_LOCKS = { ON | OFF }

    | MAXDOP = max_degree_of_parallelism

    | DATA_COMPRESSION = { NONE | ROW | PAGE}

    [ ON PARTITIONS ( {  |  }

    [ , ...n ] ) ]

    -- Listing 1-2

    -- CREATE INDEX Options

    ```'
