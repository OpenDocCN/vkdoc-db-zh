- fmt: '# Index Intersection vs. Multiple Column Patterns


    ## Index Intersection Pattern


    To demonstrate the Index Intersection pattern and have SQL Server use index intersection,
    the next example creates an index on the `LastName` column (Listing 11-17). With
    the index `IX_Contacts_LastName` created, the results change significantly from
    when the index had not been created. The first significant change is in the number
    of reads. Instead of the 68 reads that occurred in the previous execution, there
    are only 5 reads (Figure 11-22). The cause of the reduction in reads is from SQL
    Server leveraging index intersection in the query plan (Figure 11-23). The indexes
    `IX_Contacts_FirstName` and `IX_Contacts_LastName` were used to satisfy the query
    without returning to the clustered index to retrieve data for the query. This
    happened because the two indexes can satisfy the query completely.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig23_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig23_HTML.jpg)

    **Figure 11-23** Execution plan for Index Intersection pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig22_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig22_HTML.jpg)

    **Figure 11-22** Statistics I/O results for Index Intersection pattern


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_LastName ON dbo.Contacts (LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    **Listing 11-17** Index Intersection Pattern


    Index intersection is a feature of SQL Server that it uses to better satisfy queries
    when more than one nonclustered index from the same table can provide the results
    for the queries. When indexing for index intersection, the aim is to have multiple
    indexes based on the Search Columns pattern that can be used together in numerous
    combinations to allow for a variety of filters. One key thing to remember with
    the Index Intersection pattern is that you can’t tell SQL Server when to use index
    intersection; it will opt to use it when it is appropriate for the request, underlying
    indexes, and data.


    ## Multiple Column Pattern


    The examples in the previous two sections focused on indexes that included a single
    key column in the index. Nonclustered indexes, though, can have up to 16 columns.
    While being narrow was an attribute of a well-defined clustered index, the same
    does not always apply to nonclustered indexes. Instead, nonclustered indexes should
    contain as many columns as necessary to be used by the most queries possible.
    If many queries will use the same columns as predicates, it is often a good idea
    to include them all in a single index.


    A simple method for demonstrating an index using the Multiple Column pattern is
    to use the same query from the previous section and apply this pattern to it.
    In that query, two indexes were built, one each on the `FirstName` and `LastName`
    columns. For the Multiple Column pattern, the new index will include both the
    columns together (Listing 11-18).


    As the statistics indicate (Figure 11-24), by using the Multiple Column pattern,
    there is a reduction in the number of reads necessary to return the request results.
    Instead of five reads from the Index Intersection pattern, there are only two
    reads with the Multiple Column pattern. Additionally, the execution plan (shown
    in Figure 11-25) has been simplified. There is only an index seek on the index
    `IX_Contacts_FirstNameLastName`.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig25_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig25_HTML.jpg)

    **Figure 11-25** Execution plan for Multiple Column pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig24_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig24_HTML.jpg)

    **Figure 11-24** Statistics I/O results for Multiple Column pattern


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstNameLastName

    ON dbo.Contacts (FirstName, LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    **Listing 11-18** Multiple Column Pattern


    The Multiple Column pattern is as important to implement as the Search Columns
    pattern when indexing your databases. This pattern can help reduce the number
    of indexes used by putting the columns together that are most often used in predicates.
    While this pattern does contradict some of the value of the Index Intersection
    pattern, the key between them is balance. In some cases, relying on index intersection
    on single-column indexes will provide the best performance for a table with many
    variations on the query predicates. In other times, wider indexes with specific
    orders to the columns will be beneficial. Try both patterns and apply them in
    the manner that provides the best overall performance. Remember indexes can always
    be removed if they don’t work out.'
