    shown in Figure [8-12](#338675_3_En_8_Chapter.xhtml#Fig12). While the results
    appear to still be ordered and the logic of the query hasn’t changed, the first
    records returned are different. This occurs because one of the parallel threads
    returned its results faster than some others.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig12_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Aggregation execution plan with parallelism


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig11_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Aggregation execution plan with parallelism'
  trans: '# 注意


    动态管理函数 `sys.dm_db_database_page_allocations` 是 `DBCC IND` 的替代品。该函数在 SQL Server
    2012 中引入，相比其 DBCC 前身，为检查数据库中对象的页面分配提供了改进的接口。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig7_HTML.jpg](img/338675_3_En_8_Fig7_HTML.jpg)


    图 8-7


    `sys.dm_db_database_page_allocations` 的输出


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFive'') IS NOT NULL

    DROP TABLE dbo.MythFive

    CREATE TABLE dbo.MythFive

    (

    RowID int PRIMARY KEY CLUSTERED

    ,TestValue varchar(20) NOT NULL

    );

    GO

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (1, ''FirstRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (3, ''SecondRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (2, ''ThirdRecordAdded'');

    GO

    SELECT database_id, object_id, index_id, extent_page_id, allocated_page_page_id,
    page_type_desc

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.MythFive''),
    1, NULL, ''DETAILED'')

    WHERE page_type_desc IS NOT NULL

    GO

    代码清单 8-13

    创建并填充 MythFive 表

    ```


    要揭穿这个误解，可以使用 `DBCC PAGE` 命令来揭示证据。为此，请使用在代码清单 8-13 中识别的、`page_type_desc` 为 `DATA_PAGE`
    的 `PagePID`。由于该表只有一个数据页，数据就位于该页。（有关 DBCC 命令的更多信息，请参见第 2 章。）


    对于本示例，代码清单 8-14 显示了查看表中数据所需的 T-SQL。此命令输出大量信息，其中包含一些在本示例中无用的头信息。你需要的部分位于末尾，包含页面的内存转储，如图
    8-8 所示。在内存转储中，记录按它们在页面上的放置顺序显示。如从最右列阅读所示，记录是按添加到表中的顺序排列的，而不是它们在聚集索引中出现的顺序。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig8_HTML.jpg](img/338675_3_En_8_Fig8_HTML.jpg)


    图 8-8


    `DBCC PAGE` 输出的页面内容部分


    ```sql

    DBCC TRACEON (3604);

    GO

    DBCC PAGE (AdventureWorks2017, 1, 59624, 2);

    GO

    代码清单 8-14

    创建并填充 MythFive 表

    ```


    基于此证据，很容易看出聚集索引并不按索引的物理顺序存储记录。如果扩展此示例，你将能够看到页面是按物理顺序排列的，但页面上的行则不是。


    # 误解 6：索引总是以相同的顺序输出


    关于索引的一个更常见的误解是，它们保证查询结果集的输出顺序。这是不正确的。正如本书前面所述，索引的目的是提供一种高效的数据访问路径。这个目的并不保证数据被访问的顺序。这个误解的问题在于，在某些条件下执行查询时，SQL
    Server 通常会显得能维持顺序，但当这些条件改变时，执行计划就会改变，结果会按照数据处理的顺序返回，而不是最终用户期望的顺序。


    为了探讨这个误解，你将首先查看在使用聚集索引的查询上条件如何变化。在代码清单 8-15 中，有一个针对 `Sales.SalesOrderHeader` 和
    `Sales.SalesOrderDetail` 表的简单聚合查询，该查询重复了两次。这可能会出现在 SQL Server 的多种用例中。


    ```sql

    USE AdventureWorks2017

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1000)

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1)

    GO

    代码清单 8-15

    使用聚集索引的无序结果

    ```


    这两个查询的执行条件略有不同。第一个查询在标准的 SQL Server 成本模型下运行，生成的执行计划执行几次索引扫描和流聚合来返回结果，如图 8-9 所示。该查询的结果（如图
    8-10 所示）支持了这样一点：如果 `SaleOrderID` 列是用户希望排序的列，SQL Server 将按期望的输出顺序返回数据。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig10_HTML.jpg](img/338675_3_En_8_Fig10_HTML.jpg)


    图 8-10


    默认聚合执行计划的结果


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig9_HTML.jpg](img/338675_3_En_8_Fig9_HTML.jpg)


    图 8-9


    默认聚合执行计划


    但是，如果 SQL Server 上的条件改变了，而业务规则没有改变，会发生什么？在代码清单 8-15 中执行的第二个查询是同一个查询，但条件发生了变化。对于本示例，利用了
    DBCC 命令 `SETCPUWEIGHT` 来改变执行计划的成本。成本的变化导致使用了并行执行计划，如图 8-11 所示。并行计划的一个副作用是查询结果返回的顺序发生了变化，如图
    8-12 所示。虽然结果看起来仍然有序，并且查询的逻辑没有改变，但首先返回的记录不同了。这是因为其中一个并行线程比其他线程更快地返回了其结果。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig12_HTML.jpg](img/338675_3_En_8_Fig12_HTML.jpg)


    图 8-12


    带并行度的聚合执行计划结果


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig11_HTML.jpg](img/338675_3_En_8_Fig11_HTML.jpg)


    图 8-11


    带并行度的聚合执行计划'
- fmt: '## Warning


    不要在生产代码中使用 `DBCC SETCPUWEIGHT` 来控制并行性或出于任何其他原因。此 `DBCC` 命令严格用于控制 SQL Server 中的环境变量以测试和验证执行计划。


    需要考虑的第二个情况是，当查询的业务规则发生变化时。例如，可能一组结果最初没有被过滤，但在对应用程序进行更改后，查询可能改为使用不同的索引集。这也可能导致结果顺序发生变化，例如当查询从使用聚集索引变为使用非聚集索引时。


    为了演示这种行为变化，请执行清单 [8-16](#338675_3_En_8_Chapter.xhtml#PC16) 中的代码。此代码运行两个查询。两个查询都返回
    `SalesOrderID`、`CustomerID` 和 `Status`。出于示例目的，业务规则规定结果必须按 `SalesOrderID` 排序。在这种情况下，第一个查询的结果按照业务规则进行排序，如图
    [8-13](#338675_3_En_8_Chapter.xhtml#Fig13) 顶部所示。但在第二个查询中，当逻辑变为通过添加筛选器来请求更少的行时，结果不再有序，如图
    [8-13](#338675_3_En_8_Chapter.xhtml#Fig13) 底部所示。变化的原因来自于 SQL Server 用于执行查询的索引发生了变化。索引的变化导致结果以那些索引对数据进行排序的方式被处理和排序。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig13_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig13_HTML.jpg)


    图 8-13 展示筛选对排序影响的查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    WHERE CustomerID IN (11020, 11021, 11022)

    GO

    ```


    清单 8-16 使用非聚集索引时的无序结果


    在这些示例中，你只看了 SQL Server 如何流式传输查询结果的几个可能变化的条件。虽然索引这次可能提供所需顺序的查询结果，但不能保证这种情况不会改变。不要依赖索引来强制排序。不要依赖小聪明来获得所需顺序的结果。要依赖
    `ORDER BY` 子句来获得要求的排序结果。


    ## Myth 7: Fill Factor Is Applied to Indexes During Inserts


    当在索引上设置填充因子时，它会在索引构建、重建或重组时应用。不幸的是，关于这个误解，许多人认为填充因子会在记录插入表时应用。在本节中，我们将研究这个误解，并看到这是不正确的。


    为了开始拆解这个误解，让我们看看大多数人的想法。在这个误解中，人们认为如果在向表中添加行时指定了填充因子，那么插入操作中会使用该填充因子。为了破除这部分误解，请执行清单
    [8-17](#338675_3_En_8_Chapter.xhtml#PC17) 中的代码。在此脚本中，创建了一个表 `dbo.MythSeven`，其聚集索引的填充因子为
    50%。这意味着索引中的每个页面应留下 50% 的空间为空。表构建好后，你将向表中插入记录。最后，你将通过 `sys.dm_db_index_physical_stats`
    DMV 检查每个页面的平均可用空间。查看脚本结果，包含在图 [8-14](#338675_3_En_8_Chapter.xhtml#Fig14) 中，索引使用了每个页面的
    95% 的空间，而不是在创建聚集索引时指定的 50%。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig14_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig14_HTML.jpg)


    图 8-14 关于插入时填充因子的误解


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythSeven'') IS NOT NULL

    DROP TABLE dbo.MythSeven;

    GO

    CREATE TABLE dbo.MythSeven

    (

    RowID int NOT NULL

    ,Column1 varchar(500)

    );

    GO

    ALTER TABLE dbo.MythSeven ADD CONSTRAINT

    PK_MythSeven PRIMARY KEY CLUSTERED (RowID) WITH(FILLFACTOR = 50);

    GO

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythSeven

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, REPLICATE(''X'', 500)

    FROM L6;

    GO

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0;

    ```


    清单 8-17 创建并填充 MythSeven 表


    有时当这个误解被澄清后，人们的看法会反过来，认为填充因子被破坏了或不起作用。这也不正确。填充因子不会在数据修改期间应用于索引。如前所述，它是在索引被重建、重组或创建时应用的。为了演示这一点，你可以使用清单
    [8-18](#338675_3_En_8_Chapter.xhtml#PC18) 中包含的脚本来重建 `dbo.MythSeven` 上的聚集索引。


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX PK_MythSeven ON dbo.MythSeven REBUILD

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0

    ```


    清单 8-18 在 MythSeven 表上重建聚集索引


    重建聚集索引后，该索引将具有指定的填充因子，或接近指定的值，如图 [8-15](#338675_3_En_8_Chapter.xhtml#Fig15) 所示。重建后，表上的平均使用空间从
    95% 变为 51%。这种变化与为索引指定的填充因子一致。


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig15_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig15_HTML.jpg)


    图 8-15 索引重建后关于填充因子的误解


    当涉及到填充因子时，围绕这个索引属性有许多误解。理解填充因子的关键是记住它何时以及如何被应用。它不是索引在使用时强制应用的属性。相反，它是一个在索引创建或重建时用于分布数据的属性。'
  raw: '### Warning


    Do not use `DBCC SETCPUWEIGHT` in production code to control parallelism or for
    any other reason. This `DBCC` command is strictly available to control environmental
    variables within SQL Server to test and validate execution plans.


    The second condition to consider is when business rules change for a query. For
    instance, maybe a set of results wasn’t originally filtered, but after a change
    to the application, the query may change to using a different set of indexes.
    This can also result in a change in the order of the results, such as when a query
    changes from using a clustered index to a nonclustered index.


    To demonstrate this change in behavior, execute the code in Listing [8-16](#338675_3_En_8_Chapter.xhtml#PC16).
    This code runs two queries. Both of the queries return `SalesOrderID`, `CustomerID`,
    and `Status`. For the purposes of the example, the business rule dictates that
    the results must be sorted by `SalesOrderID`. In this case, the results from the
    first query are sorted as the business rule states, shown at the top of Figure
    [8-13](#338675_3_En_8_Chapter.xhtml#Fig13). But in the second query, when the
    logic changes to request fewer rows by adding a filter, the results are no longer
    ordered, shown at the bottom of Figure [8-13](#338675_3_En_8_Chapter.xhtml#Fig13).
    The cause of the change comes from a change in the indexes that SQL Server is
    using to execute the query. The change in indexes drives the results to be processed,
    and ordered, in the manner in which those indexes sort the data.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig13_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Query results demonstrating effect of filtering on order


    ```

    USE AdventureWorks2017

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    WHERE CustomerID IN (11020, 11021, 11022)

    GO

    Listing 8-16

    Unordered Results with Nonclustered Index

    ```


    In these examples, you looked at just a couple of the conditions that can change
    when it comes to how SQL Server will stream the results from a query. While an
    index might provide results from the query in the order desired this time, there
    is no guarantee that this will not change. Don’t rely on indexes to enforce ordering.
    Don’t rely on being clever to get the results ordered as desired. Rely on the
    `ORDER BY` clause to get the results ordered as required.


    ### Myth 7: Fill Factor Is Applied to Indexes During Inserts


    When the fill factor is set on an index, it is applied to the index when the index
    is built, rebuilt, or reorganized. Unfortunately, with this myth, many people
    believe that fill factor is applied as records are inserted into a table. In this
    section, we’ll investigate this myth and see that it is not correct.


    To begin pulling this myth apart, let’s look at what most people believe. In the
    myth, the thought is that if a fill factor has been specified when rows are added
    to a table, the fill factor is used during the inserts. To dispel this portion
    of the myth, execute the code in Listing [8-17](#338675_3_En_8_Chapter.xhtml#PC17).
    In this script, the table `dbo.MythSeven` is created with a clustered index with
    a 50 percent fill factor. That means that 50 percent of every page in the index
    should be left empty. With the table built, you’ll insert records into the table.
    Finally, you’ll check the average amount of space available on each page through
    the `sys.dm_db_index_physical_stats` DMV. Looking at the results of the script,
    included in Figure [8-14](#338675_3_En_8_Chapter.xhtml#Fig14), the index is using
    95 percent of every page vs. the 50 percent that was specified in the creation
    of the clustered index.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig14_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Fill factor myth on inserts


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythSeven'') IS NOT NULL

    DROP TABLE dbo.MythSeven;

    GO

    CREATE TABLE dbo.MythSeven

    (

    RowID int NOT NULL

    ,Column1 varchar(500)

    );

    GO

    ALTER TABLE dbo.MythSeven ADD CONSTRAINT

    PK_MythSeven PRIMARY KEY CLUSTERED (RowID) WITH(FILLFACTOR = 50);

    GO

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythSeven

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, REPLICATE(''X'', 500)

    FROM L6;

    GO

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0;

    Listing 8-17

    Create and Populate MythSeven Table

    ```


    Sometimes when this myth is dispelled, the belief is reversed, and it is believed
    that fill factor is broken or doesn’t work. This is also incorrect. Fill factor
    isn’t applied to indexes during data modifications. As stated previously, it is
    applied when the index is rebuilt, reorganized, or created. To demonstrate this,
    you can rebuild the clustered index on `dbo.MythSeven` with the script included
    in Listing [8-18](#338675_3_En_8_Chapter.xhtml#PC18).


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX PK_MythSeven ON dbo.MythSeven REBUILD

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0

    Listing 8-18

    Rebuild Clustered Index on MythSeven Table

    ```


    After the clustered index is rebuilt, the index will have the specified fill factor,
    or close to the value specified, as shown in Figure [8-15](#338675_3_En_8_Chapter.xhtml#Fig15).
    The average space used on the table, after the rebuild, changed from 95 to 51
    percent. This change is in alignment with the fill factor that was specified for
    the index.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig15_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Fill factor myth after index rebuild


    When it comes to fill factor, there are a number of myths surrounding the index
    property. The key to understanding fill factor is to remember when and how it
    is applied. It isn’t a property enforced on an index as it is used. It is, instead,
    a property used to distribute data within an index when it is created or rebuilt.'
