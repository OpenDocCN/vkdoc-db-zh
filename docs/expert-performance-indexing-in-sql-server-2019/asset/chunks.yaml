    有关全文索引的更多信息，请阅读第 6 章。


    ## 连接


    另一个可能严重破坏索引策略的场景是使用连接（concatenation）。*连接* 是指将两个或多个值附加在一起。当这种情况发生在 `WHERE` 子句中时，常常会导致意想不到的性能问题。


    为了演示此场景，考虑一个查找名为 Gustavo Achong 的人的查询。搜索此值需要使用 `FirstName` 和 `LastName` 列，这两个列用一个空格连接在一起。清单
    12-4 显示了此查询。代码清单中还包括一个在这些列上创建索引的脚本。为此查询生成的执行计划，如图 12-8 所示，表明使用了新索引，但操作是扫描（scan）而非更理想的查找（seek）。即使索引的前导左边缘与连接值的左侧值匹配，索引也无法确定在索引中的何处可以找到这些值。这导致索引使用
    99 次逻辑读取来返回查询结果，如图 12-7 所示。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig8_HTML.jpg](img/338675_3_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Execution plan for concatenation


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig7_HTML.jpg](img/338675_3_En_12_Fig7_HTML.jpg)


    Figure 12-7


    STATISTICS IO for concatenation


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    Listing 12-4

    Query with Concatenation

    ```


    如前所述，使用索引扫描并不一定是坏事。然而，当存在大量并发用户或正在发生数据修改时，使用扫描可能会导致性能问题。对于拥有数百万或更多记录的大型表来说，这可能导致数据库缺乏可扩展性。


    你可能认为去掉名字和姓氏之间的空格是个好主意（见清单 12-5），因为这样就使用了我们创建的索引中的两个列。此解决方案的主要问题是它不起作用。正如图 12-10
    中的执行计划所示，它与连接值中包含空格的情况几乎相同，逻辑读取次数也是相同的 99 次（如图 12-9 所示）。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig10_HTML.jpg](img/338675_3_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Execution plan for concatenation without spaces


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig9_HTML.jpg](img/338675_3_En_12_Fig9_HTML.jpg)


    Figure 12-9


    STATISTICS IO for concatenation without spaces


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    Listing 12-5

    Concatenation Without Spaces

    ```


    修复连接值问题的最好方法可能是消除连接的需要。与其搜索值 `Gustavo Achong`，不如分别搜索名字 `Gustavo` 和姓氏 `Achong`（见清单
    12-6）。进行此更改后，查询就能够使用非聚集索引上的查找操作，并仅用两次逻辑读取返回结果（见图 12-11）。这些结果明显优于值连接在一起时的表现。执行计划见图
    12-12。

    '
- fmt: '![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig12_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig12_HTML.jpg)

    **Figure 12-12** Execution plan with concatenation removed


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig11_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig11_HTML.jpg)

    **Figure 12-11** STATISTICS IO for concatenation removed


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo''

    AND LastName = ''Achong'';

    ```

    **Listing 12-6** Query with Concatenation Removed


    At times, you won’t have the option to remove concatenation from a query. In these
    cases, there is another way to resolve index performance issues: the concatenated
    values can be added to the table as a computed column. This solution, along with
    some of its issues, is discussed in the next section.


    ## Computed Columns


    Sometimes one or more columns in a table are defined as an expression. These types
    of columns are referred to as `computed columns`. Computed columns can be useful
    when you need a column to hold the result of a function or calculation that will
    change over time based on the other columns in the table. Rather than spending
    the CPU cycles to make certain that all modifications to a table always include
    changes to all the related columns, the components can be changed and the results
    computed when queried.


    Note that computed columns cannot leverage the indexes on the source columns for
    the computed column. To demonstrate, add two computed columns to the `Person.Person`
    table using Listing [12-7](#338675_3_En_12_Chapter.xhtml#PC7). The first column
    will concatenate `FirstName` and `LastName` together, as they were concatenated
    in the previous section. The second column will multiply `ContactID` by `EmailPromotion`;
    this calculation doesn’t mean anything, but it will show how this can be used
    with other calculation types.


    ```

    USE AdventureWorks2017

    GO

    ALTER TABLE Person.Person

    ADD FirstLastName AS (FirstName + '' '' + LastName)

    ,CalculateValue AS (BusinessEntityID ∗ EmailPromotion);

    ```

    **Listing 12-7** Add Computed Columns to Person.Person


    With the columns in place, the next step is to execute a couple of queries against
    the table. Execute two queries against the table using Listing [12-8](#338675_3_En_12_Chapter.xhtml#PC8).
    The first query is similar to the first and last name query from the previous
    section (when searching for Gustavo Achong). The second query will return all
    records with the `CalculateValue` of 198.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName, FirstLastName

    FROM Person.Person

    WHERE FirstLastName = ''Gustavo Achong'';

    SELECT BusinessEntityID, CalculateValue

    FROM Person.Person

    WHERE CalculateValue = 198;

    ```

    **Listing 12-8** Computed Column Queries


    After executing both queries, the execution plans in Figure [12-14](#338675_3_En_12_Chapter.xhtml#Fig14)
    show that both used scan operations to return the query results. These results
    are less than ideal for the same reasons mentioned earlier in this chapter, since
    they can lead to blocking and utilize more I/O than should be necessary for the
    query request. By more I/O, the query results for both require read I/Os from
    scanning the entire table, shown in Figure [12-13](#338675_3_En_12_Chapter.xhtml#Fig13).


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig14_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig14_HTML.jpg)

    **Figure 12-14** Computed column execution plans


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig13_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig13_HTML.jpg)

    **Figure 12-13** STATISTICS IO for computed columns


    An indexing option available for computed columns is to index the computed columns
    themselves, which even SQL Server suggests as missing indexes in Figure [12-4](#338675_3_En_12_Chapter.xhtml#Fig4).
    As the query for `FirstLastName` shows, the query can use any of the indexes on
    the table. The restriction is that they can’t use them any better than if the
    expression for the computed column was in the query itself. Indexing the computed
    columns, as shown in Listing [12-9](#338675_3_En_12_Chapter.xhtml#PC9), provides
    the necessary distribution and record information to allow queries, such as those
    in Listing [12-8](#338675_3_En_12_Chapter.xhtml#PC8), to use seeks instead of
    scans. The index materializes the values in the computed column, allowing quick
    access to the data, which results in a significant reduction in I/O from 99 to
    5 reads and 3,878 to 2 reads, shown in Figure [12-15](#338675_3_En_12_Chapter.xhtml#Fig15).
    Figure [12-16](#338675_3_En_12_Chapter.xhtml#Fig16) shows the execution plan.


    ### Note


    When indexing a computed column, the expression for the column must be deterministic.
    This means that every time the expression executes with the same variables, it
    will always return the same results. As an example, using `GETDATE()` in a computed
    column expression would not be deterministic.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig16_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig16_HTML.jpg)

    **Figure 12-16** Indexed computed column execution plans


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig15_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig15_HTML.jpg)

    **Figure 12-15** STATISTICS IO for indexed computed column


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_PersonPerson_FirstLastName ON Person.Person(FirstLastName);

    CREATE INDEX IX_PersonPerson_CalculateValue ON Person.Person(CalculateValue);

    ```

    **Listing 12-9** Computed Column Indexes


    As this section demonstrates, computed columns can be extremely useful when expressions
    are needed to define values as part of a table. For instance, if an application
    can only send in searches where the first and last names were combined, computed
    columns can provide the data in the format that the application is sending. The
    columns can use underlying indexes to return results but usually can’t fully use
    the statistics and underlying sort of the data in those indexes because of the
    expression in the column definition. By leveraging and indexing computed columns,
    you gain the benefit of having the data in the state the application needs it
    while maintaining the best performance possible.'
