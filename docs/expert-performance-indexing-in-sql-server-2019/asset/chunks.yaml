- fmt: "# Syntax\n\nThe syntax in Listing [7-4](#338675_3_En_7_Chapter.xhtml#PC4)\
    \ is used to create the full-text index. Table [7-1](#338675_3_En_7_Chapter.xhtml#Tab1)\
    \ describes the different options available.\n\n```\nCREATE FULLTEXT INDEX ON\
    \ \n()\nKEY INDEX \nON \nWITH \nCHANGE_TRACKING = \nSTOPLIST = ;\nListing 7-4\n\
    CREATE FULLTEXT INDEX Syntax\n```\n\nIn most other `CREATE INDEX` statements,\
    \ the basic syntax and options are alike with slight modifications. With FTS index\
    \ creation, you can see there is a completely different set of options and considerations.\
    \ The initial `CREATE FULLTEXT INDEX` is the same as any `CREATE INDEX`, with\
    \ the given table required and then column to index. After this, the other options\
    \ are not typical to normal index creations.\n\nTable 7-1\nFull-Text Index Options\n\
    \n| Option Name | Description |\n| --- | --- |\n| `TYPE COLUMN` | Specifies the\
    \ name of the column that holds the document type for documents loaded in BLOB\
    \ types, such as `.doc`, `.pdf`, and `.xls`. This option is used only for `varbinary`,\
    \ `varbinary(max)`, and `image` data types. If this option is specified on any\
    \ other data type, the `CREATE FULLTEXT INDEX` statement will throw an error.\
    \ |\n| `LANGUAGE` | Alters the default language that is used for the index with\
    \ the following variations and options:•     The language can be specified as\
    \ string, integer, or hexadecimal.•     If a language is specified, the language\
    \ is used when a query is run using the index.•     When a language is specified\
    \ as a string value, the `syslanguages` system table must correspond to the language.•     If\
    \ a double-byte value is used, it is converted to hexadecimal at creation time.•     Word\
    \ breakers and stemmers for the specific language must be enabled, or an SQL Server\
    \ error will be generated.•     Non-BLOB and non-XML columns containing multiple\
    \ languages should follow the 0 `×` 0 neutral language setting.•     For BLOB\
    \ and XML types, language types in the documents themselves will be used. For\
    \ example, a Word document with a language type of Russian or LCID 1049 will force\
    \ the same setting in the index. Use `sys.fulltext_languages` to review all the\
    \ language types and LCID codings available. |\n| `KEY INDEX` | Every full-text\
    \ index requires an adjoining unique, single-key, non-null column to be designated.\
    \ Specify the column in the same table using this option. |\n| `FULLTEXT_CATALOG_NAME`\
    \ | If the full-text index is not to be created using the default catalog, specify\
    \ the catalog name using this option. |\n| `CHANGE_TRACKING` | Determines how\
    \ and when an index is populated. Options are `MANUAL`, `AUTO`, and `OFF [NO_POPULATION]`.\
    \ The `MANUAL` setting requires `ALTER FULLTEXT INDEX ... START UPDATE POPULATION`\
    \ to be executed before the index is populated. The `AUTO` setting populates the\
    \ index at creation time and automatically updates based on changes that are made\
    \ ongoing. This is the default setting if `CHANGE_TRACKING` is omitted in the\
    \ `CREATE` statement. The `OFF [NO_POPULATION]` setting is used to completely\
    \ turn population off for the index, and SQL Server will not retain a list of\
    \ changes. The index is populated upon creation one time unless the `NO_POPULATION`\
    \ is specified. |\n| `STOPLIST` | Specifies a StopList that will essentially stop\
    \ certain words from being indexed. `OFF`, `SYSTEM`, and a custom StopList are\
    \ available options. The `OFF` setting will not use a StopList and will have more\
    \ overhead on performance of population of the index. The `SYSTEM` is the default\
    \ StopList created already. A user-created StopList is a StopList that was created\
    \ that can be used in association with an index. |\n| `SEARCH PROPERTY LIST` |\
    \ Specifies the search property list to associate with the full-text index. Property\
    \ lists allow greater control of full-text search by allowing differentiation\
    \ of search between properties of a document, such as title or tags. |\n\n# Key\
    \ Indexes\n\nChoosing the key index can be a straightforward choice given the\
    \ restrictions of the key index being a unique, single-key, and non-nullable column.\
    \ A primary key will commonly work well for this, like the primary key shown in\
    \ Listing [7-1](#338675_3_En_7_Chapter.xhtml#PC1) on the `dbo.SQLServerDocuments`\
    \ table. However, consideration should be given to the size of the key. Ideally,\
    \ a 6-byte key is recommended and documented as optimal to reduce overhead on\
    \ I/O and CPU resource consumption. Recall that one of the restrictions of the\
    \ unique key is that it cannot exceed 900 bytes. If this maximum restriction is\
    \ met, the population will fail. Resolving the problem could force a new index\
    \ and alteration of the table itself to occur. This could create costly downtime\
    \ for tables that are in high-use situations.\n\n# Population\n\nChange tracking\
    \ in full-text indexing should be weighed heavily when creating full-text indexes.\
    \ The default setting of `AUTO` may have overhead that can affect the performance\
    \ negatively if the contents of the column being indexed change frequently. For\
    \ example, a system that is storing shipping invoices that never change and are\
    \ inserted only once a month would not likely benefit from `AUTO` being set. A\
    \ `MANUAL` population would most likely be better run at a given time by using\
    \ the SQL Server Agent based on the loading of the contents in the table. Although\
    \ not common, some systems are static and loaded only one time. This would be\
    \ an ideal situation for using the `OFF` setting, with the initial population\
    \ being performed only at that time.\n\nThe last option for population is incremental\
    \ population. It is an alternative to manual population. Incremental population\
    \ is the same concept as an incremental update to data. As you run through the\
    \ data and changes are made, they are tracked. Think of merge replication as a\
    \ comparison. Merge replication retains changes by the use of triggers and insert/update/delete\
    \ tracking rows into merge system tables. At a given point in time, a DBA can\
    \ set a synchronization schedule to process those changes and replicate them to\
    \ the subscribers. This is the same way incremental population functions. By using\
    \ a `timestamp` column in the table, the changes are tracked. Only those that\
    \ are found needing a change are processed. This does mean the requirement for\
    \ a timestamp column on the table must be met in order to perform incremental\
    \ populations. For data that has an extreme amount of change, this may not be\
    \ ideal. However, for data that changes randomly and seldomly, incremental population\
    \ may be suited for the installation."
