- fmt: '# Index Statistics Maintenance


    In Chapter [3](#338675_3_En_3_Chapter.xhtml), we discussed the statistics collected
    on indexes. These statistics provide crucial information that the query optimizer
    uses to compile execution plans for queries. When this information is out-of-date
    or inaccurate, the database will provide suboptimal or inaccurate query plans.


    For the most part, index statistics do not require much maintenance. In this section,
    we’ll look at the processes within SQL Server that can be used to create and update
    statistics. We’ll also look at how you can maintain statistics in situations where
    the automated processes cannot keep up with the rate of data change within an
    index.


    ## Automatically Maintaining Statistics


    The easiest way to build and maintain statistics in SQL Server is to just let
    SQL Server do it. There are three database properties that control whether SQL
    Server will automatically build and maintain statistics:


    *   `AUTO_CREATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS_ASYNC`


    By default, the first two properties are enabled in databases. The last option
    is disabled by default. In most cases, all three of these properties should be
    enabled.


    ### Automatic Creation


    The first database property is `AUTO_CREATE_STATISTICS`. This database property
    directs SQL Server to automatically create single-column statistics that do not
    have statistics. From the perspective of indexes, this property does not have
    an impact. When an index is created, a statistics object is created for the index.


    ### Automatic Updating


    The next two properties are `AUTO_UPDATE_STATISTICS` and `AUTO_UPDATE_STATISTICS_ASYNC`.
    At a high level, these two properties are quite similar. When an internal threshold
    is surpassed, SQL Server will initiate an update of the statistics object. The
    update occurs to keep the values within the statistics object current with the
    cardinality of values within the table.


    The threshold for triggering a statistics update can change from table to table.
    The threshold is based on a couple of calculations relating to the number of rows
    that have changed. For an empty table, when more than 500 rows are added to the
    table, a statistics update will be triggered. If the table has more than 500 rows,
    then statistics will be updated when 500 rows plus at most 20 percent of the cardinality
    of rows have been modified. At this point, SQL Server will schedule an update
    to the statistics. As the number of rows in the table increases, then the 20 percent
    threshold decreases, which accommodates the need to update statistics more frequently
    when there are larger numbers of rows within a table. At about 500,000 rows, the
    percentage drops to about 5 percent and then less than 1 percent for over 1 billion
    rows. This is the behavior that was previously available through trace flag 2371,
    which is on by default since SQL Server 2016.


    When the statistics update occurs, there are two modes in which it can be accomplished:
    synchronously and asynchronously. By default, statistics update synchronously.
    This means that when statistics are deemed out-of-date and require an update,
    the query optimizer will wait until after the statistics have been updated before
    it will compile an execution plan for the query. This is extremely useful for
    tables that have data that is volatile. For instance, the statistics for a table
    before and after a `TRUNCATE TABLE` would be quite different. Optionally, statistics
    can be built asynchronously through enabling the `AUTO_UPDATE_STATISTICS_ASYNC`
    property. This changes how the query optimizer reacts when an update statistics
    event is triggered. Instead of waiting for the statistics update to complete,
    the query optimizer will compile an execution plan based on the existing statistics
    and use the updated statistics for future queries after the update completes.
    For databases with high volumes of queries and data being pushed through, this
    is often the preferred manner of updating statistics. Instead of occasional pauses
    in transactional throughput, the queries will flow through unencumbered, and plans
    will update as improved information is available.


    If you are in an environment that disabled `AUTO_UPDATE_STATISTICS` in previous
    SQL Server versions, you should consider enabling it now with `AUTO_UPDATE_STATISTICS_ASYNC`.
    The most common reason to disable `AUTO_UPDATE_STATISTICS` in the past was the
    delay caused by the update of statistics. With the option to enable `AUTO_UPDATE_STATISTICS_ASYNC`,
    those performance concerns can likely be mitigated.


    ### Preventing Auto Update


    Depending on the indexes on a table, there will be times in which automatically
    updating the indexes will do more harm than good. For instance, an automatic statistics
    update on a large table may lead to performance issues while the statistics object
    is updated. In that situation, the existing statistics object may be good enough
    until the next maintenance window. There are a number of ways in which `AUTO_UPDATE_STATISTICS`
    can be disabled on an individual statistics object rather than across the entire
    database:


    *   Executing an `sp_autostats` system store procedure on the statistics object

    *   Using the `NORECOMPUTE` option on the `UPDATE STATISTICS` or `CREATE STATISTICS`
    statement

    *   Using `STATISTICS_NORECOMPUTE` on the `CREATE INDEX` statement


    Each of these options can be used to disable or enable the `AUTO_UPDATE_STATISTICS`
    option on indexes. Before disabling this feature, always be sure to validate that
    the statistics update is truly necessary.


    ### In-Memory Statistics


    When considering statistics, one area where statistics are created and used a
    bit differently are with in-memory tables. It’s important to understand that statistics
    cannot be generated automatically on in-memory tables and that they always require
    a full scan. Add to this, natively compiled stored procedures on in-memory tables
    retrieve statistics only when the stored procedure is compiled or when SQL Server
    restarts. This means that when considering the impact of statistics on indexes,
    in-memory tables require additional care in timing the maintenance for the statistics.


    ## Manually Maintaining Statistics


    There will be times when the automated processes for maintaining statistics will
    not be good enough. This is often tied to situations where the data is changing
    but not enough has changed to trigger a statistics update. A good example of when
    this can happen is when update statements change the cardinality of the table
    without affecting a large number of rows. For instance, if 10 percent of a table
    was changed from a large number of values to a single value, then the plan for
    querying the data could end up being suboptimal. In situations like this, you
    need to be able to get in and manually update statistics. As with index fragmentation,
    there are two methods for manually maintaining statistics:


    *   Maintenance plans

    *   T-SQL scripts


    In the next sections, you’ll look at each of these methods and walk through how
    they can be implemented.'
