- fmt: '### Index Physical Stats


    用于监控索引的最后一个索引 DMO 是`sys.dm_db_index_physical_stats`。这个 DMO 提供了数据库中索引当前物理结构的统计信息。这些信息的价值在于确定索引的碎片化程度，这将在第[6](#338675_3_En_6_Chapter.xhtml)章中详细讨论。从监控的角度来看，我们收集物理统计信息是为了辅助后续分析。目标是识别可能影响索引存储效率的潜在问题，反之，索引的存储方式也会影响查询性能。


    物理统计 DMO 的统计数据收集方式与其他 DMO 略有不同。这个 DMO 与其他 DMO 的主要区别在于收集信息时可能对数据库产生的影响。其他两个 DMO
    引用内存表，而`index_physical_stats`会读取索引中的页以确定索引的实际碎片化和物理布局。有关使用`sys.dm_db_index_physical_stats`的影响，请参阅第[3](#338675_3_En_3_Chapter.xhtml)章。为了适应这种差异，统计数据仅存储在历史表中；不会计算历史检索点之间的差异值。此外，由于
    DMO 中包含的统计数据的性质，计算差值几乎没有价值。


    开始收集索引物理统计信息的第一步是创建前面提到的历史表。这个表如代码清单[13-11](#338675_3_En_13_Chapter.xhtml#PC11)所示，使用了与
    DMO 相同的模式，并增加了`create_date`列。


    ### Tip


    在生成 DMO 所需的表模式时，使用了 SQL Server 2012 中引入的一个表值函数。函数`sys.dm_exec_describe_first_result_set`可用于识别查询的列名和数据类型。


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_physical_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT,

    object_id INT,

    index_id INT,

    partition_number INT,

    index_type_desc NVARCHAR(60),

    alloc_unit_type_desc NVARCHAR(60),

    index_depth TINYINT,

    index_level TINYINT,

    avg_fragmentation_in_percent FLOAT,

    fragment_count BIGINT,

    avg_fragment_size_in_pages FLOAT,

    page_count BIGINT,

    avg_page_space_used_in_percent FLOAT,

    record_count BIGINT,

    ghost_record_count BIGINT,

    version_ghost_record_count BIGINT,

    min_record_size_in_bytes INT,

    max_record_size_in_bytes INT,

    avg_record_size_in_bytes FLOAT,

    forwarded_record_count BIGINT,

    compressed_page_count BIGINT,

    hobt_id BIGINT NULL,

    columnstore_delete_buffer_state TINYINT NULL,

    columnstore_delete_buffer_state_desc NVARCHAR(60) NULL,

    version_record_count BIGINT NULL,

    inrow_version_record_count BIGINT NULL,

    inrow_diff_version_record_count BIGINT NULL,

    total_inrow_version_payload_size_in_bytes BIGINT NULL,

    offrow_regular_version_record_count BIGINT NULL,

    offrow_long_term_version_record_count BIGINT NULL,

    CONSTRAINT PK_IndexPhysicalStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexPhysicalStatsHistory

    UNIQUE

    (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    alloc_unit_type_desc,

    index_depth,

    index_level

    )

    );

    ```


    代码清单 13-11 索引物理统计历史表


    `index_physical_stats`历史记录的收集方式与前两个 DMO 不同。由于它只是历史记录，因此不需要捕获快照信息来构建两个快照之间的差异值。相反，如代码清单[13-12](#338675_3_En_13_Chapter.xhtml#PC12)所示，当前统计数据直接插入历史表。此外，由于`index_physical_stats`在收集统计信息时会在索引上执行物理操作，因此在生成历史信息时需要注意几点。首先，脚本将通过一个由`CURSOR`驱动的循环独立地从每个数据库收集信息。这为每个数据库的统计信息收集提供了批处理分离，并限制了
    DMO 的影响。其次，我们应确保查询在非核心时段执行。每日维护窗口开始时是理想时间。重要的是，这些信息应在碎片整理或重新索引之前收集，因为这些操作会改变 DMO
    提供的信息。通常，此信息作为碎片整理过程的一个步骤收集，这将在第[6](#338675_3_En_6_Chapter.xhtml)章中讨论。如果是这样，则无需收集两次信息。为碎片整理收集并存储它，以便日后用于监控索引。


    ```sql

    USE IndexingMethod;

    GO

    DECLARE @DatabaseID INT;

    DECLARE DatabaseList CURSOR FAST_FORWARD FOR

    SELECT database_id

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND database_id > 4;

    OPEN DatabaseList;

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO dbo.index_physical_stats_history (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    )

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    FROM sys.dm_db_index_physical_stats(@DatabaseID, NULL, NULL, NULL, ''SAMPLED'');

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    END;

    CLOSE DatabaseList;

    DEALLOCATE DatabaseList;

    ```


    代码清单 13-12 索引物理统计历史记录填充


    ### Wait Statistics


    另一个提供与索引相关信息的 DMO 是`sys.dm_os_wait_stats`。这个 DMO 收集 SQL Server 为了启动或继续执行查询或其他请求而正在等待的资源信息。大多数性能调优方法都包含一个收集和分析等待统计信息的过程。从索引的角度来看，有许多等待资源可能表明
    SQL Server 实例上存在索引问题。通过监控这些统计信息，我们可以了解这些问题何时可能存在。表[13-2](#338675_3_En_13_Chapter.xhtml#Tab2)提供了一个简短的等待类型列表，这些类型最常表明可能存在索引问题。


    与性能计数器类似，等待统计信息是反映 SQL Server 实例整体信息的一般健康指标。它们并不直接指向资源；相反，它们收集的是 SQL Server 实例上何时等待特定资源的信息。'
  raw: '### Index Physical Stats


    The last indexing DMO for monitoring indexes is `sys.dm_db_index_physical_stats`.
    This DMO provides statistics on the current physical structure of the indexes
    in the databases. The value of this information is in determining the fragmentation
    of the index, which is discussed more in Chapter [6](#338675_3_En_6_Chapter.xhtml).
    From a monitoring perspective, we are collecting the physical statistics to aid
    with later analysis. The goal is to identify potential issues that may be affecting
    the efficiency in how the index is stored, or vice versa, thus impacting query
    performance because of how the index is stored.


    With the physical stats DMO, the statistics are collected a bit differently than
    with the other DMOs. The main difference between this DMO and the others is the
    impact that can be placed on the database while collecting the information. While
    the other two reference in-memory tables, `index_physical_stats` reads the pages
    in the index to determine the actual fragmentation and physical layout of the
    indexes. Reference back to Chapter [3](#338675_3_En_3_Chapter.xhtml) for more
    about the impact of using `sys.dm_db_index_physical_stats`. To accommodate this
    difference, the statistics are stored only in a history table; the deltas between
    the points in which the history is retrieved are not determined. Also, because
    of the nature of the statistics contained in the DMO, there would be little value
    in calculating delta values.


    The first piece needed to begin collecting statistics on index physical stats
    is the previously mentioned history table. This table, shown in Listing [13-11](#338675_3_En_13_Chapter.xhtml#PC11),
    uses the same schema as the DMO, with the addition of the `create_date` column.


    ### Tip


    When generating the table schema needed for the DMOs, a table-valued function
    first introduced in SQL Server 2012 was utilized. The function `sys.dm_exec_describe_first_result_set`
    can be used to identify the column names and data types for a query.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_physical_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT,

    object_id INT,

    index_id INT,

    partition_number INT,

    index_type_desc NVARCHAR(60),

    alloc_unit_type_desc NVARCHAR(60),

    index_depth TINYINT,

    index_level TINYINT,

    avg_fragmentation_in_percent FLOAT,

    fragment_count BIGINT,

    avg_fragment_size_in_pages FLOAT,

    page_count BIGINT,

    avg_page_space_used_in_percent FLOAT,

    record_count BIGINT,

    ghost_record_count BIGINT,

    version_ghost_record_count BIGINT,

    min_record_size_in_bytes INT,

    max_record_size_in_bytes INT,

    avg_record_size_in_bytes FLOAT,

    forwarded_record_count BIGINT,

    compressed_page_count BIGINT,

    hobt_id BIGINT NULL,

    columnstore_delete_buffer_state TINYINT NULL,

    columnstore_delete_buffer_state_desc NVARCHAR(60) NULL,

    version_record_count BIGINT NULL,

    inrow_version_record_count BIGINT NULL,

    inrow_diff_version_record_count BIGINT NULL,

    total_inrow_version_payload_size_in_bytes BIGINT NULL,

    offrow_regular_version_record_count BIGINT NULL,

    offrow_long_term_version_record_count BIGINT NULL,

    CONSTRAINT PK_IndexPhysicalStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexPhysicalStatsHistory

    UNIQUE

    (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    alloc_unit_type_desc,

    index_depth,

    index_level

    )

    );

    Listing 13-11

    Index Physical Stats History Table

    ```


    The collection of the history for `index_physical_stats` differs from the previous
    two DMOs. Since it’s just history, there is no need to capture the snapshot information
    to build the delta between the two snapshots for the history. Instead, the current
    statistics are inserted directly into the history table, as shown in Listing [13-12](#338675_3_En_13_Chapter.xhtml#PC12).
    Also, since `index_physical_stats` performs physical operations on the index while
    collecting the statistics, there are a few things to keep in mind when generating
    the history information. First, the script will collect information from each
    database independently from the other databases through a `CURSOR`-drive loop.
    This provides a batched separation between the collections of statistics for each
    database and limits the impact of the DMO. Second, we should be certain that the
    query is executed during noncore hours. The start of the daily maintenance window
    would be ideal. It is important that this information is collected prior to defragmentation
    or re-indexing since these operations will change the information provided by
    the DMO. Usually, this information is collected as a step in the defragmentation
    process, which is discussed in Chapter [6](#338675_3_En_6_Chapter.xhtml). If so,
    there’s no need to collect the information twice. Collect it for defragmentation
    and store it for later use in monitoring indexes.


    ```

    USE IndexingMethod;

    GO

    DECLARE @DatabaseID INT;

    DECLARE DatabaseList CURSOR FAST_FORWARD FOR

    SELECT database_id

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND database_id > 4;

    OPEN DatabaseList;

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO dbo.index_physical_stats_history (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    )

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    FROM sys.dm_db_index_physical_stats(@DatabaseID, NULL, NULL, NULL, ''SAMPLED'');

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    END;

    CLOSE DatabaseList;

    DEALLOCATE DatabaseList;

    Listing 13-12

    Index Physical Stats History Population

    ```


    ### Wait Statistics


    One other DMO that provides information related to indexing is `sys.dm_os_wait_stats`.
    This DMO collects information related to resources that SQL Server is waiting
    on in order to start or continue executing a query or other request. Most performance
    tuning methodologies include a process for collecting and analyzing wait statistics.
    From an indexing perspective, there are a number of wait resources that can indicate
    that there may be indexing issues on the SQL Server instance. By monitoring these
    statistics, we can be informed when these issues may exist. Table [13-2](#338675_3_En_13_Chapter.xhtml#Tab2)
    provides a short list of wait types that most often indicate that indexing issues
    may exist.


    Similar to performance counters, wait statistics are general indicators of health
    that reflect information about the SQL Server instance as a whole. They do not
    point directly to resources; instead, they collect information on when there was
    a wait for a specific resource on the SQL Server instance.'
  trans: '

    ### 索引物理统计


    用于监控索引的最后一个索引 DMO 是`sys.dm_db_index_physical_stats`。这个 DMO 提供了数据库中索引当前物理结构的统计信息。这些信息的价值在于确定索引的碎片化程度，这将在第
    6 章中详细讨论。从监控的角度来看，我们收集物理统计信息是为了辅助后续分析。目标是识别可能影响索引存储效率的潜在问题，反之，索引的存储方式也会影响查询性能。


    物理统计 DMO 的统计数据收集方式与其他 DMO 略有不同。这个 DMO 与其他 DMO 的主要区别在于收集信息时可能对数据库产生的影响。其他两个 DMO
    引用内存表，而`index_physical_stats`会读取索引中的页以确定索引的实际碎片化和物理布局。有关使用`sys.dm_db_index_physical_stats`的影响，请参阅第
    3 章。为了适应这种差异，统计数据仅存储在历史表中；不会计算历史检索点之间的差异值。此外，由于 DMO 中包含的统计数据的性质，计算差值几乎没有价值。


    开始收集索引物理统计信息的第一步是创建前面提到的历史表。这个表如代码清单 13-11 所示，使用了与 DMO 相同的模式，并增加了`create_date`列。


    ### 提示


    在生成 DMO 所需的表模式时，使用了 SQL Server 2012 中引入的一个表值函数。函数`sys.dm_exec_describe_first_result_set`可用于识别查询的列名和数据类型。


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_physical_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT,

    object_id INT,

    index_id INT,

    partition_number INT,

    index_type_desc NVARCHAR(60),

    alloc_unit_type_desc NVARCHAR(60),

    index_depth TINYINT,

    index_level TINYINT,

    avg_fragmentation_in_percent FLOAT,

    fragment_count BIGINT,

    avg_fragment_size_in_pages FLOAT,

    page_count BIGINT,

    avg_page_space_used_in_percent FLOAT,

    record_count BIGINT,

    ghost_record_count BIGINT,

    version_ghost_record_count BIGINT,

    min_record_size_in_bytes INT,

    max_record_size_in_bytes INT,

    avg_record_size_in_bytes FLOAT,

    forwarded_record_count BIGINT,

    compressed_page_count BIGINT,

    hobt_id BIGINT NULL,

    columnstore_delete_buffer_state TINYINT NULL,

    columnstore_delete_buffer_state_desc NVARCHAR(60) NULL,

    version_record_count BIGINT NULL,

    inrow_version_record_count BIGINT NULL,

    inrow_diff_version_record_count BIGINT NULL,

    total_inrow_version_payload_size_in_bytes BIGINT NULL,

    offrow_regular_version_record_count BIGINT NULL,

    offrow_long_term_version_record_count BIGINT NULL,

    CONSTRAINT PK_IndexPhysicalStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexPhysicalStatsHistory

    UNIQUE

    (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    alloc_unit_type_desc,

    index_depth,

    index_level

    )

    );

    ```


    代码清单 13-11 索引物理统计历史表


    `index_physical_stats`历史记录的收集方式与前两个 DMO 不同。由于它只是历史记录，因此不需要捕获快照信息来构建两个快照之间的差异值。相反，如代码清单
    13-12 所示，当前统计数据直接插入历史表。此外，由于`index_physical_stats`在收集统计信息时会在索引上执行物理操作，因此在生成历史信息时需要注意几点。首先，脚本将通过一个由`CURSOR`驱动的循环独立地从每个数据库收集信息。这为每个数据库的统计信息收集提供了批处理分离，并限制了
    DMO 的影响。其次，我们应确保查询在非核心时段执行。每日维护窗口开始时是理想时间。重要的是，这些信息应在碎片整理或重新索引之前收集，因为这些操作会改变 DMO
    提供的信息。通常，此信息作为碎片整理过程的一个步骤收集，这将在第 6 章中讨论。如果是这样，则无需收集两次信息。为碎片整理收集并存储它，以便日后用于监控索引。


    ```sql

    USE IndexingMethod;

    GO

    DECLARE @DatabaseID INT;

    DECLARE DatabaseList CURSOR FAST_FORWARD FOR

    SELECT database_id

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND database_id > 4;

    OPEN DatabaseList;

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO dbo.index_physical_stats_history (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    )

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    FROM sys.dm_db_index_physical_stats(@DatabaseID, NULL, NULL, NULL, ''SAMPLED'');

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    END;

    CLOSE DatabaseList;

    DEALLOCATE DatabaseList;

    ```


    代码清单 13-12 索引物理统计历史记录填充


    ### 等待统计信息


    另一个提供与索引相关信息的 DMO 是`sys.dm_os_wait_stats`。这个 DMO 收集 SQL Server 为了启动或继续执行查询或其他请求而正在等待的资源信息。大多数性能调优方法都包含一个收集和分析等待统计信息的过程。从索引的角度来看，有许多等待资源可能表明
    SQL Server 实例上存在索引问题。通过监控这些统计信息，我们可以了解这些问题何时可能存在。表 13-2 提供了一个简短的等待类型列表，这些类型最常表明可能存在索引问题。


    与性能计数器类似，等待统计信息是反映 SQL Server 实例整体信息的一般健康指标。它们并不直接指向资源；相反，它们收集的是 SQL Server 实例上何时等待特定资源的信息。

    '
- fmt: '### Note


    许多来自第三方供应商的性能监控工具会收集等待统计信息作为其监控的一部分。如果您的环境中已经安装了某个工具，请检查是否可以从该工具中检索等待统计信息。


    表 13-2 与索引相关的等待统计信息


    | 选项名称 | 描述 |

    | --- | --- |

    | `CXPACKET` | 同步并行查询中涉及的线程。此等待类型意味着并行查询正尝试在并行查询的操作符之间同步数据，可能表明工作负载不平衡或某个工作线程被前一个请求阻塞。
    |

    | `IO_COMPLETION` | 表示等待I/O操作（通常是同步的），例如排序以及引擎需要执行同步I/O的各种情况。此等待类型代表非数据页I/O。 |

    | `LCK_M_*` | 当任务正在等待获取索引或表上的锁时发生。 |

    | `PAGEIOLATCH_*` | 当任务正在等待位于I/O请求中的缓冲区的闩锁时发生。长时间的等待可能表明磁盘子系统存在问题。 |


    收集等待统计信息的过程遵循使用快照表和历史表的模式。为此，数据首先收集到快照表中，快照之间的增量存储在历史表中。快照表和历史表（如清单[13-13](#338675_3_En_13_Chapter.xhtml#PC13)所示）包含支持快照和历史模式所需的列。


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.wait_stats_snapshot

    (

    wait_stats_snapshot_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_snapshot

    PRIMARY KEY CLUSTERED (wait_stats_snapshot_id)

    );

    CREATE TABLE dbo.wait_stats_history

    (

    wait_stats_history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_history

    PRIMARY KEY CLUSTERED (wait_stats_history_id)

    );

    ```

    清单 13-13 等待统计信息快照表和历史表


    要收集等待统计信息，需要查询 `sys.dm_os_wait_stats` 的输出。与本章讨论的其他DMO不同，在插入数据之前需要对信息进行一些汇总。在SQL
    Server的早期版本中，`wait_stats` DMO包含两个等待类型为 `MISCELLANEOUS` 的行。为了适应这种差异，清单[13-14](#338675_3_En_13_Chapter.xhtml#PC14)中的示例脚本使用聚合来解决此问题。`wait_stats_snapshot`
    与其他快照的另一个区别在于收集信息的频率。`Wait_stats` 报告有关请求的资源何时不可用的信息。能够将此信息与一天中的特定时间联系起来可能至关重要。因此，`wait_stats`
    信息应大约每小时收集一次。


    ```

    USE IndexingMethod;

    GO

    TRUNCATE TABLE dbo.wait_stats_snapshot

    INSERT INTO dbo.wait_stats_snapshot (

    create_date,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    )

    SELECT GETDATE(),

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    ```

    清单 13-14 等待统计信息快照填充


    每次收集快照时，都需要将其与上一个快照之间的增量添加到 `wait_stats_history` 表中。为了确定 `sys.dm_os_wait_stats`
    中的信息何时已被重置，使用了 `waiting_tasks_count` 列。如果该列中的值低于上一个快照，则表示DMO中的信息已被重置。清单[13-15](#338675_3_En_13_Chapter.xhtml#PC15)提供了填充历史表的代码。


    虽然只有少数几种等待类型指向索引问题，但历史表将显示遇到的所有等待类型的结果。原因是对资源的等待需要与发生的其他等待总数进行比较。例如，如果 `CXPACKET`
    是服务器上相对等待时间最低的等待类型，那么研究查询并确定可以减少此等待类型发生的索引就没有太大价值，因为其他问题可能会更显著地影响性能。


    ```

    USE IndexingMethod;

    GO

    WITH WaitStatCTE

    AS (SELECT create_date,

    DENSE_RANK() OVER (ORDER BY create_date DESC) AS HistoryID,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM dbo.wait_stats_snapshot)

    INSERT INTO dbo.wait_stats_history

    SELECT w1.create_date,

    w1.wait_type,

    w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0),

    w1.wait_time_ms - COALESCE(w2.wait_time_ms, 0),

    w1.max_wait_time_ms - COALESCE(w2.max_wait_time_ms, 0),

    w1.signal_wait_time_ms - COALESCE(w2.signal_wait_time_ms, 0)

    FROM WaitStatCTE w1

    LEFT OUTER JOIN WaitStatCTE w2 ON w1.wait_type = w2.wait_type

    AND w1.waiting_tasks_count >= COALESCE(w2.waiting_tasks_count, 0)

    AND w2.HistoryID = 2

    WHERE w1.HistoryID = 1

    AND w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0) > 0;

    ```

    清单 13-15 等待统计信息历史填充


    ### 数据清理


    虽然索引分析需要所有监控信息，但这些信息并不需要无限期保留。如果没有在合理时间后清理收集信息的任务，监控过程就不完整。一个普遍可接受的清理计划是在3天后清除快照，在90天后清除历史信息。


    快照信息仅用于准备历史信息，在创建增量后确实不再需要。由于SQL Agent作业可能出错，并且收集点可能与前一个相隔一天，因此3天的窗口通常可以提供支持该过程并适应任何可能出现问题所需的灵活空间。


    历史表中的数据比快照信息更重要，需要保留更长时间。这些信息为索引分析期间的活动提供支持。保留此信息的窗口期应与通常完成三轮或更多轮索引方法所需的时间相匹配。这样，保留的信息可以在该过程的几个周期中用作参考。


    安排清理过程时，应至少每天一次，并在非核心处理时间进行。这将最小化每次执行删除的信息量，并减少删除操作与服务器上其他活动可能发生的争用。删除脚本（如清单[13-16](#338675_3_En_13_Chapter.xhtml#PC16)所示）涵盖了本节讨论的每个表。


    ```

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.wait_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.wait_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    ```

    清单 13-16 索引监控快照和历史清理'
  raw: '### Note


    Many performance monitoring tools from third-party vendors collect wait statistics
    as a part of their monitoring. If there is a tool already installed in your environment,
    check to see whether wait statistics information can be retrieved from that tool.


    Table 13-2


    Index-Related Wait Statistics


    | Option Name | Description |

    | --- | --- |

    | `CXPACKET` | Synchronizes threads involved in a parallel query. This wait type
    means a parallel query is attempting to synchronize data within a paralle query
    between operators and can indicate an unbalanced workload or a worker is blocked
    by a preceding request. |

    | `IO_COMPLETION` | Indicates a wait for I/O for operation (typically synchronous)
    like sorts and various situations where the engine needs to do a synchronous I/O.
    This wait type represents nondata page I/Os. |

    | `LCK_M_*` | Occurs when a task is waiting to acquire a lock on an index or table.
    |

    | `PAGEIOLATCH_*` | Occurs when a task is waiting on a latch for a buffer that
    is in an I/O request. Long waits may indicate problems with the disk subsystem.
    |


    The process for collecting wait statistics follows the pattern of using snapshot
    and history tables. To do this, the data will be collected first in a snapshot
    table with the deltas between snapshots stored in a history table. The snapshot
    and history tables, shown in Listing [13-13](#338675_3_En_13_Chapter.xhtml#PC13),
    contain the columns needed to support the snapshot and history patterns.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.wait_stats_snapshot

    (

    wait_stats_snapshot_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_snapshot

    PRIMARY KEY CLUSTERED (wait_stats_snapshot_id)

    );

    CREATE TABLE dbo.wait_stats_history

    (

    wait_stats_history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_history

    PRIMARY KEY CLUSTERED (wait_stats_history_id)

    );

    Listing 13-13

    Wait Statistics Snapshot and History Table

    ```


    To collect the wait statistics information, the output from `sys.dm_os_wait_stats`
    is queried. Unlike the other DMOs discussed in this chapter, there is some summarization
    of the information that needs to occur prior to inserting the data. In a previous
    version of SQL Server, the `wait_stats` DMO contains two rows for the wait type
    `MISCELLANEOUS`. To accommodate for this variance, the sample script in Listing
    [13-14](#338675_3_En_13_Chapter.xhtml#PC14) uses aggregations to get around the
    issue. Another difference between `wait_stats_snapshot` and the other snapshots
    is the frequency in which the information should be collected. `Wait_stats` reports
    information on when requested resources were not available. Being able to tie
    this information to specific times of the day can be critical. As such, `wait_stats`
    information should be collected about once every hour.


    ```

    USE IndexingMethod;

    GO

    TRUNCATE TABLE dbo.wait_stats_snapshot

    INSERT INTO dbo.wait_stats_snapshot (

    create_date,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    )

    SELECT GETDATE(),

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    Listing 13-14

    Wait Statistics Snapshot Population

    ```


    With each snapshot collected, the delta between it and the previous snapshot needs
    to be added in the `wait_stats_history` table. For determining when the information
    in `sys.dm_os_wait_stats` has been reset, the column `waiting_tasks_count` is
    utilized. If the value in the column is lower than the previous snapshot, the
    information in the DMO is reset. Listing [13-15](#338675_3_En_13_Chapter.xhtml#PC15)
    provides the code for populating the history table.


    While there are only a few wait types that point toward indexing issues, the history
    table will show results for all the wait types that are encountered. The reason
    is that waits on resources need to be compared to the total number of other waits
    that occur. For instance, if `CXPACKET` is the lowest relative wait on the server,
    there isn’t much value in researching the queries and determining the indexing
    that could reduce the occurrence of this wait type since other issues would likely
    impact performance more significantly.


    ```

    USE IndexingMethod;

    GO

    WITH WaitStatCTE

    AS (SELECT create_date,

    DENSE_RANK() OVER (ORDER BY create_date DESC) AS HistoryID,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM dbo.wait_stats_snapshot)

    INSERT INTO dbo.wait_stats_history

    SELECT w1.create_date,

    w1.wait_type,

    w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0),

    w1.wait_time_ms - COALESCE(w2.wait_time_ms, 0),

    w1.max_wait_time_ms - COALESCE(w2.max_wait_time_ms, 0),

    w1.signal_wait_time_ms - COALESCE(w2.signal_wait_time_ms, 0)

    FROM WaitStatCTE w1

    LEFT OUTER JOIN WaitStatCTE w2 ON w1.wait_type = w2.wait_type

    AND w1.waiting_tasks_count >= COALESCE(w2.waiting_tasks_count, 0)

    AND w2.HistoryID = 2

    WHERE w1.HistoryID = 1

    AND w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0) > 0;

    Listing 13-15

    Wait Statistics History Population

    ```


    ### Data Cleanup


    While all the information for monitoring is needed for the index analysis, this
    information is not needed indefinitely. The process for monitoring would not be
    complete without tasks in place to clean up the information collected after a
    reasonable amount of time. A generally acceptable schedule for cleaning up information
    is to purge snapshots after 3 days and history information after 90 days.


    The snapshot information is used simply to prepare the history information and
    is really not needed after the delta is created. Since SQL Agent jobs can error
    and collection points may be a day apart from the previous, a 3-day window generally
    provides the leeway needed to support the process and accommodate any issues that
    may arise.


    The data in the history tables is more crucial than the snapshot information and
    needs to be kept longer. This information feeds the activities during index analysis.
    The window for retaining this information should match the amount of time that
    it generally takes to go through the Indexing Method three or more times. This
    way, the information retained can be used for reference in a few cycles of the
    process.


    When scheduling the cleanup process, it should be at least daily and during noncore
    processing hours. This will minimize the amount of information deleted in each
    execution and reduce the possible contention of the delete with other activity
    on the server. The delete script, shown in Listing [13-16](#338675_3_En_13_Chapter.xhtml#PC16),
    covers each of the tables discussed throughout this section.


    ```

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.wait_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.wait_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    Listing 13-16

    Index Monitoring Snapshot and History Cleanup

    ```'
  trans: '### 注意


    许多来自第三方供应商的性能监控工具会收集等待统计信息作为其监控的一部分。如果您的环境中已经安装了某个工具，请检查是否可以从该工具中检索等待统计信息。


    **表 13-2 与索引相关的等待统计信息**


    | 选项名称 | 描述 |

    | --- | --- |

    | `CXPACKET` | 同步并行查询中涉及的线程。此等待类型意味着并行查询正尝试在并行查询的操作符之间同步数据，可能表明工作负载不平衡或某个工作线程被前一个请求阻塞。
    |

    | `IO_COMPLETION` | 表示等待 I/O 操作（通常是同步的），例如排序以及引擎需要执行同步 I/O 的各种情况。此等待类型代表非数据页 I/O。
    |

    | `LCK_M_*` | 当任务正在等待获取索引或表上的锁时发生。 |

    | `PAGEIOLATCH_*` | 当任务正在等待位于 I/O 请求中的缓冲区的闩锁时发生。长时间的等待可能表明磁盘子系统存在问题。 |


    收集等待统计信息的过程遵循使用快照表和历史表的模式。为此，数据首先收集到快照表中，快照之间的增量存储在历史表中。快照表和历史表（如清单 13-13 所示）包含支持快照和历史模式所需的列。


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.wait_stats_snapshot

    (

    wait_stats_snapshot_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_snapshot

    PRIMARY KEY CLUSTERED (wait_stats_snapshot_id)

    );

    CREATE TABLE dbo.wait_stats_history

    (

    wait_stats_history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    wait_type NVARCHAR(60) NOT NULL,

    waiting_tasks_count BIGINT NOT NULL,

    wait_time_ms BIGINT NOT NULL,

    max_wait_time_ms BIGINT NOT NULL,

    signal_wait_time_ms BIGINT NOT NULL,

    CONSTRAINT PK_wait_stats_history

    PRIMARY KEY CLUSTERED (wait_stats_history_id)

    );

    ```

    **清单 13-13 等待统计信息快照表和历史表**


    要收集等待统计信息，需要查询 `sys.dm_os_wait_stats` 的输出。与本章讨论的其他 DMO 不同，在插入数据之前需要对信息进行一些汇总。在
    SQL Server 的早期版本中，`wait_stats` DMO 包含两个等待类型为 `MISCELLANEOUS` 的行。为了适应这种差异，清单 13-14
    中的示例脚本使用聚合来解决此问题。`wait_stats_snapshot` 与其他快照的另一个区别在于收集信息的频率。`Wait_stats` 报告有关请求的资源何时不可用的信息。能够将此信息与一天中的特定时间联系起来可能至关重要。因此，`wait_stats`
    信息应大约每小时收集一次。


    ```

    USE IndexingMethod;

    GO

    TRUNCATE TABLE dbo.wait_stats_snapshot

    INSERT INTO dbo.wait_stats_snapshot (

    create_date,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    )

    SELECT GETDATE(),

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM sys.dm_os_wait_stats;

    ```

    **清单 13-14 等待统计信息快照填充**


    每次收集快照时，都需要将其与上一个快照之间的增量添加到 `wait_stats_history` 表中。为了确定 `sys.dm_os_wait_stats`
    中的信息何时已被重置，使用了 `waiting_tasks_count` 列。如果该列中的值低于上一个快照，则表示 DMO 中的信息已被重置。清单 13-15
    提供了填充历史表的代码。


    虽然只有少数几种等待类型指向索引问题，但历史表将显示遇到的所有等待类型的结果。原因是对资源的等待需要与发生的其他等待总数进行比较。例如，如果 `CXPACKET`
    是服务器上相对等待时间最低的等待类型，那么研究查询并确定可以减少此等待类型发生的索引就没有太大价值，因为其他问题可能会更显著地影响性能。


    ```

    USE IndexingMethod;

    GO

    WITH WaitStatCTE

    AS (SELECT create_date,

    DENSE_RANK() OVER (ORDER BY create_date DESC) AS HistoryID,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms

    FROM dbo.wait_stats_snapshot)

    INSERT INTO dbo.wait_stats_history

    SELECT w1.create_date,

    w1.wait_type,

    w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0),

    w1.wait_time_ms - COALESCE(w2.wait_time_ms, 0),

    w1.max_wait_time_ms - COALESCE(w2.max_wait_time_ms, 0),

    w1.signal_wait_time_ms - COALESCE(w2.signal_wait_time_ms, 0)

    FROM WaitStatCTE w1

    LEFT OUTER JOIN WaitStatCTE w2 ON w1.wait_type = w2.wait_type

    AND w1.waiting_tasks_count >= COALESCE(w2.waiting_tasks_count, 0)

    AND w2.HistoryID = 2

    WHERE w1.HistoryID = 1

    AND w1.waiting_tasks_count - COALESCE(w2.waiting_tasks_count, 0) > 0;

    ```

    **清单 13-15 等待统计信息历史填充**


    ### 数据清理


    虽然索引分析需要所有监控信息，但这些信息并不需要无限期保留。如果没有在合理时间后清理收集信息的任务，监控过程就不完整。一个普遍可接受的清理计划是在 3 天后清除快照，在
    90 天后清除历史信息。


    快照信息仅用于准备历史信息，在创建增量后确实不再需要。由于 SQL Agent 作业可能出错，并且收集点可能与前一个相隔一天，因此 3 天的窗口通常可以提供支持该过程并适应任何可能出现问题所需的灵活空间。


    历史表中的数据比快照信息更重要，需要保留更长时间。这些信息为索引分析期间的活动提供支持。保留此信息的窗口期应与通常完成三轮或更多轮索引方法所需的时间相匹配。这样，保留的信息可以在该过程的几个周期中用作参考。


    安排清理过程时，应至少每天一次，并在非核心处理时间进行。这将最小化每次执行删除的信息量，并减少删除操作与服务器上其他活动可能发生的争用。删除脚本（如清单 13-16
    所示）涵盖了本节讨论的每个表。


    ```

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.wait_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.wait_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    ```

    **清单 13-16 索引监控快照和历史清理**'
- fmt: '## Event Tracing


    The last set of information that should be collected for monitoring indexes is
    event tracing. The trace information collects SQL statements that represent production
    activity that can be used during index analysis to identify indexes that could
    be useful based on the query activity in your production environment and on the
    data that is being stored there. While the statistics collected so far provide
    information on the effect of activity on indexes and other resource use on the
    SQL Server instance, event tracing collects the activity that is causing those
    statistics. With SQL Server, there are two methods that can be used to collect
    event tracing data:


    *   SQL Trace

    *   Extended Events


    For the purposes of completeness, both methods will be discussed. In my opinion,
    only Extended Events should be used to collect event tracing data in SQL Server.
    This is due to how well Extended Events are incorporated into SQL Server to help
    prevent it from causing performance issues while monitoring. And the level of
    detail that it can retrieve goes far beyond the capabilities of SQL Trace.


    ### SQL Trace


    SQL Trace, and by extension SQL Profiler, is the original tracing tool for SQL
    Server. It’s one of the most common tools that DBAs have in their back pockets
    and can easily collect events in SQL Server. With SQL Trace, there are a number
    of areas to be careful of when collecting information. First, SQL Trace will likely
    collect a lot of information, and this will need to be accommodated. In other
    words, the more active the server and the databases, the larger the trace (`.trc`)
    files will be. Along these same lines, don’t collect the trace information on
    drives that are already heavily used or dedicated to data or transaction log files.
    Doing this can, and likely will, impact the performance of I/O on those drives.
    The end goal for monitoring is to improve the performance of the system; care
    needs to be taken to minimize the impact of monitoring.


    Finally, SQL Trace and SQL Profiler were deprecated in SQL Server 2012. This doesn’t
    mean that these tools no longer function, but they are slated for removal in a
    future SQL Server release. While SQL Trace is deprecated, it is still the ideal
    tool in some scenarios for collecting trace information, such as for building
    workloads for the Database Engine Tuning Advisor.


    ### Note


    It is always advisable to keep apprised of deprecated features within SQL Server.
    For more information on deprecated features, see SQL Docs at [`https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view%253Dsql-server-ver15).


    There are four basic steps to creating a SQL Trace session:


    1.  Build the trace session.

    2.  Assign the events and columns to the session.

    3.  Add filters to the session.

    4.  Start the SQL Trace session.


    The next few pages will cover these steps and describe the components used in
    creating the SQL Trace session in SQL Server 2019. The script should work in earlier
    versions of SQL Server.


    To begin monitoring with SQL Trace, a trace session must first be created. Sessions
    are created using the `sp_trace_create` stored procedure. This procedure accepts
    a number of parameters that configure how the session will collect information.
    In the example session, shown in Listing 13-17, the SQL Trace session will create
    files that automatically failover when they reach the 50 MB file size limit. The
    file size is limited to allow for better file management. In most environments,
    it’s easier to copy many 50 MB files compared to files that are 1 GB or more.
    Also, the trace files are being created in `c:\temp` with the file name `IndexingMethod`.
    Be sure to create this folder if it doesn’t exist. Note that this name can be
    changed to anything that suits the needs of the server and databases where the
    monitoring is being set up.


    ```

    USE master;

    GO

    DECLARE @rc INT,

    @TraceID INT,

    --Maximum .trc file size in MB

    @maxfilesize BIGINT = 50,

    --File name and path, minus the extension

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'';

    EXEC @rc = sp_trace_create @TraceID OUTPUT, 0, @FileName, @maxfilesize, NULL;

    IF (@rc != 0)

    RAISERROR(''Error creating trace file'', 16, 1);

    SELECT *

    FROM sys.traces

    WHERE id = @TraceID;

    ```


    Listing 13-17: Create SQL Trace Session


    After creating the SQL Trace session, the next step is to add events to the session.
    There are two events that will collect the information that is of most value to
    index monitoring: `RPC:Completed` and `SQL:BatchCompleted`. `RPC:Completed` returns
    results whenever a remote procedure call completes; the best example of this is
    the completion of a stored procedure. The other event, `SQL:BatchCompleted`, occurs
    when ad hoc and prepared batches are completed. Between these two events, all
    the completed SQL statements on the server will be collected.


    To add events to the SQL Trace session, we use the `sp_trace_setevent` stored
    procedure. The stored procedure adds events and the column requested from the
    event to the trace with each execution of the stored procedure. For two events
    with 15 columns each, the stored procedure will need to be executed 30 times.
    For the example session, shown in Listing 13-18, the following columns are being
    collected for each of the sessions:


    *   `ApplicationName`

    *   `ClientProcessID`

    *   `CPU`

    *   `DatabaseID`

    *   `DatabaseName`

    *   `Duration`

    *   `EndTime`

    *   `HostName`

    *   `LoginName`

    *   `NTUserName`

    *   `Reads`

    *   `SPID`

    *   `StartTime`

    *   `TextData`

    *   `Writes`


    We can find the codes for the events and columns in system catalog views. Events
    are listed in view `sys.trace_events`. The columns available are listed in `sys.trace_columns`.
    The columns view also includes an indicator to identify whether the values from
    the column can be filtered, which is useful in the next step in creating SQL Trace
    sessions.'
  raw: '## Event Tracing


    The last set of information that should be collected for monitoring indexes is
    event tracing. The trace information collects SQL statements that represent production
    activity that can be used during index analysis to identify indexes that could
    be useful based on the query activity in your production environment and on the
    data that is being stored there. While the statistics collected so far provide
    information on the effect of activity on indexes and other resource use on the
    SQL Server instance, event tracing collects the activity that is causing those
    statistics. With SQL Server, there are two methods that can be used to collect
    event tracing data:


    *   SQL Trace


    *   Extended Events


    For the purposes of completeness, both methods will be discussed. In my opinion,
    only Extended Events should be used to collect event tracing data in SQL Server.
    This is due to how well Extended Events are incorporated into SQL Server to help
    prevent it from causing performance issues while monitoring. And the level of
    detail that it can retrieve goes far beyond the capabilities of SQL Trace.


    ### SQL Trace


    SQL Trace, and by extension SQL Profiler, is the original tracing tool for SQL
    Server. It’s one of the most common tools that DBAs have in their back pockets
    and can easily collect events in SQL Server. With SQL Trace, there are a number
    of areas to be careful of when collecting information. First, SQL Trace will likely
    collect a lot of information, and this will need to be accommodated. In other
    words, the more active the server and the databases, the larger the trace (.`trc`)
    files will be. Along these same lines, don’t collect the trace information on
    drives that are already heavily used or dedicated to data or transaction log files.
    Doing this can, and likely will, impact the performance of I/O on those drives.
    The end goal for monitoring is to improve the performance of the system; care
    needs to be taken to minimize the impact of monitoring.


    Finally, SQL Trace and SQL Profiler were deprecated in SQL Server 2012\. This
    doesn’t mean that these tools no longer function, but they are slated for removal
    in a future SQL Server release. While SQL Trace is deprecated, it is still the
    ideal tool in some scenarios for collecting trace information, such as for building
    workloads for the Database Engine Tuning Advisor.


    ### Note


    It is always advisable to keep apprised of deprecated features within SQL Server.
    For more information on deprecated features, see SQL Docs at [`https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view%253Dsql-server-ver15).


    There are four basic steps to creating a SQL Trace session:


    1.  Build the trace session.


    2.  Assign the events and columns to the session.


    3.  Add filters to the session.


    4.  Start the SQL Trace session.


    The next few pages will cover these steps and describe the components used in
    creating the SQL Trace session in SQL Server 2019\. The script should work in
    earlier versions of SQL Server.


    To begin monitoring with SQL Trace, a trace session must first be created. Sessions
    are created using the `sp_trace_create` stored procedure. This procedure accepts
    a number of parameters that configure how the session will collect information.
    In the example session, shown in Listing 13-17, the SQL Trace session will create
    files that automatically failover when they reach the 50 MB file size limit. The
    file size is limited to allow for better file management. In most environments,
    it’s easier to copy many 50 MB files compared to files that are 1 GB or more.
    Also, the trace files are being created in `c:\temp` with the file name `IndexingMethod.
    Be sure to create this folder if it doesn’t exist`. Note that this name can be
    changed to anything that suits the needs of the server and databases where the
    monitoring is being set up.


    ```

    USE master;

    GO

    DECLARE @rc INT,

    @TraceID INT,

    --Maximum .trc file size in MB

    @maxfilesize BIGINT = 50,

    --File name and path, minus the extension

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'';

    EXEC @rc = sp_trace_create @TraceID OUTPUT, 0, @FileName, @maxfilesize, NULL;

    IF (@rc  0)

    RAISERROR(''Error creating trace file'', 16, 1);

    SELECT *

    FROM sys.traces

    WHERE id = @TraceID;

    Listing 13-17

    Create SQL Trace Session

    ```


    After creating the SQL Trace session, the next step is to add events to the session.
    There are two events that will collect the information that is of most value to
    index monitoring: RPC:Completed and SQL:BatchCompleted. RPC:Completed returns
    results whenever a remote procedure call completes; the best example of this is
    the completion of a stored procedure. The other event, SQL:BatchCompleted, occurs
    when ad hoc and prepared batches are completed. Between these two events, all
    the completed SQL statements on the server will be collected.


    To add events to the SQL Trace session, we use the `sp_trace_set` event stored
    procedure. The stored procedure adds events and the column requested from the
    event to the trace with each execution of the stored procedure. For two events
    with 15 columns each, the stored procedure will need to be executed 30 times.
    For the example session, shown in Listing [13-18](#338675_3_En_13_Chapter.xhtml#PC18),
    the following columns are being collected for each of the sessions:


    *   `ApplicationName`


    *   `ClientProcessID`


    *   `CPU`


    *   `DatabaseID`


    *   `DatabaseName`


    *   `Duration`


    *   `EndTime`


    *   `HostName`


    *   `LoginName`


    *   `NTUserName`


    *   `Reads`


    *   `SPID`


    *   `StartTime`


    *   `TextData`


    *   `Writes`


    We can find the codes for the events and columns in system catalog views. Events
    are listed in view `sys.trace_events`. The columns available are listed in `sys.trace_columns`.
    The columns view also includes an indicator to identify whether the values from
    the column can be filtered, which is useful in the next step in creating SQL Trace
    sessions.'
  trans: '## 事件追踪


    为监控索引而应收集的最后一类信息是事件追踪。追踪信息收集代表生产活动的 SQL 语句，这些语句可用于在索引分析期间，根据生产环境中的查询活动以及存储在其中的数据，识别可能有用的索引。虽然迄今为止收集的统计信息提供了活动对索引的影响以及
    SQL Server 实例上其他资源使用情况的信息，但事件追踪收集的正是导致这些统计信息产生的活动本身。对于 SQL Server，有两种方法可用于收集事件追踪数据：


    *   SQL Trace

    *   Extended Events


    为保证完整性，两种方法都将被讨论。在我看来，在 SQL Server 中只应使用**Extended Events**来收集事件追踪数据。这是由于**扩展事件**被很好地集成到
    SQL Server 中，有助于防止监控本身引发性能问题。并且它能获取的细节程度远远超出了 SQL Trace 的能力。


    ### SQL Trace


    SQL Trace，以及由此衍生的 SQL Profiler，是 SQL Server 最初的追踪工具。它是 DBA 们最常用的工具之一，可以轻松收集 SQL
    Server 中的事件。使用 SQL Trace 收集信息时，需要注意几个方面。首先，SQL Trace 很可能会收集大量信息，这需要做好准备。换句话说，服务器和数据库活动越活跃，追踪（`.trc`）文件就越大。同样，不要在已经负载很重或专门用于数据或事务日志文件的驱动器上收集追踪信息。这样做可能会（并且很可能将会）影响这些驱动器上
    I/O 的性能。监控的最终目标是提升系统性能；必须注意最小化监控带来的影响。


    最后，SQL Trace 和 SQL Profiler 在 SQL Server 2012 中已被**弃用**。这并不意味着这些工具不再有效，但它们计划在未来版本的
    SQL Server 中被移除。尽管 SQL Trace 已被弃用，但在某些场景下（例如为数据库引擎优化顾问构建工作负载），它仍然是收集追踪信息的理想工具。


    ### 注意


    随时了解 SQL Server 中的**已弃用**功能始终是明智的。有关已弃用功能的更多信息，请参阅 SQL Docs 中的[`https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017?view%253Dsql-server-ver15)。


    创建 SQL Trace 会话有四个基本步骤：


    1.  构建跟踪会话。

    2.  为会话分配事件和列。

    3.  向会话添加筛选器。

    4.  启动 SQL Trace 会话。


    接下来的几页将涵盖这些步骤，并描述在 SQL Server 2019 中创建 SQL Trace 会话所使用的组件。该脚本应适用于早期版本的 SQL Server。


    要开始使用 SQL Trace 进行监控，首先必须创建一个跟踪会话。会话使用`sp_trace_create`存储过程创建。此过程接受多个参数，用于配置会话收集信息的方式。在示例会话（如清单
    13-17 所示）中，SQL Trace 会话将创建文件，这些文件在达到 50 MB 文件大小限制时会自动进行故障转移。限制文件大小是为了便于文件管理。在大多数环境中，复制许多个
    50 MB 的文件比复制 1 GB 或更大的文件更容易。此外，追踪文件在`c:\temp`中创建，文件名为`IndexingMethod`。如果此文件夹不存在，请务必创建。请注意，此名称可以更改为适合设置监控的服务器和数据库需求的任何名称。


    ```

    USE master;

    GO

    DECLARE @rc INT,

    @TraceID INT,

    --Maximum .trc file size in MB

    @maxfilesize BIGINT = 50,

    --File name and path, minus the extension

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'';

    EXEC @rc = sp_trace_create @TraceID OUTPUT, 0, @FileName, @maxfilesize, NULL;

    IF (@rc != 0)

    RAISERROR(''Error creating trace file'', 16, 1);

    SELECT *

    FROM sys.traces

    WHERE id = @TraceID;

    ```


    清单 13-17：创建 SQL Trace 会话


    创建 SQL Trace 会话后，下一步是向会话添加事件。有两个事件对于索引监控最具价值：`RPC:Completed`和`SQL:BatchCompleted`。`RPC:Completed`在远程过程调用完成时返回结果；最好的例子是存储过程的完成。另一个事件`SQL:BatchCompleted`在即席和预编译批处理完成时发生。通过这两个事件，服务器上所有已完成的
    SQL 语句都将被收集。


    要将事件添加到 SQL Trace 会话，我们使用`sp_trace_setevent`存储过程。每次执行此存储过程，都会向跟踪中添加一个事件以及从该事件请求的列。对于两个事件，每个事件有
    15 列，则需要执行该存储过程 30 次。对于示例会话（如清单 13-18 所示），每个会话正在收集以下列：


    *   `ApplicationName`

    *   `ClientProcessID`

    *   `CPU`

    *   `DatabaseID`

    *   `DatabaseName`

    *   `Duration`

    *   `EndTime`

    *   `HostName`

    *   `LoginName`

    *   `NTUserName`

    *   `Reads`

    *   `SPID`

    *   `StartTime`

    *   `TextData`

    *   `Writes`


    我们可以在系统目录视图中找到事件和列的代码。事件列在视图`sys.trace_events`中。可用的列列在`sys.trace_columns`中。列视图还包括一个指示符，用于标识是否可以筛选该列的值，这在创建
    SQL Trace 会话的下一步中非常有用。'
- fmt: '## 添加事件和列到 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

    EXEC sp_trace_setevent @TraceID, 10, 17, @on;

    EXEC sp_trace_setevent @TraceID, 10, 18, @on;

    EXEC sp_trace_setevent @TraceID, 10, 3, @on;

    EXEC sp_trace_setevent @TraceID, 10, 35, @on;

    EXEC sp_trace_setevent @TraceID, 10, 6, @on;

    EXEC sp_trace_setevent @TraceID, 10, 8, @on;

    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    Listing 13-18

    Add Events and Columns to SQL Trace Session

    ```


    下一步是从 SQL Trace 会话中过滤掉不需要的事件。没有必要为所有数据库和所有应用程序，在每次 SQL Trace 会话中始终收集所有语句。事实上，在清单[13-19](#338675_3_En_13_Chapter.xhtml#PC19)中，来自系统数据库（数据库
    ID 小于 5）的事件已从会话中移除。用于过滤 SQL Trace 会话的存储过程是 `sp_trace_setfilter`。该存储过程接受来自 `sys.trace_columns`
    的列 ID。可以过滤未包含在事件中的列，并且筛选器适用于所有事件。


    ## 添加筛选器到 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    Listing 13-19

    Add Filters to SQL Trace Session

    ```


    设置 SQL Trace 监控的最后一步是启动跟踪。此任务使用 `sp_trace_setstatus` 存储过程完成，如清单[13-20](#338675_3_En_13_Chapter.xhtml#PC20)所示。通过此过程，可以启动、暂停和停止
    SQL Trace 会话。一旦跟踪启动，它将在提供的文件位置开始创建 `.trc` 文件，SQL Trace 监控的配置即告完成。当 SQL Trace 会话的收集期结束时，将使用状态代码
    2（而非 1）运行此脚本来终止会话。清单[13-21](#338675_3_En_13_Chapter.xhtml#PC21)提供了此脚本。


    ## 启动 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    Listing 13-20

    Start SQL Trace Session

    ```


    ### 注意


    SQL Server 专家通常认为使用数据库引擎优化顾问不够时髦，更愿意手动分析数据库并确定所需索引。这种偏见错过了发现容易实现的成果或通过更改聚集索引位置来提高性能的情况。


    ## 停止 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    Listing 13-21

    Stop SQL Trace Session

    ```


    本节中的 SQL Trace 会话示例相当基础。在您的环境中，我们可能需要一个更智能的进程，该进程在指定的时间段内收集每个跟踪文件中的信息，而不是使用文件大小来控制文件滚动速率。这些对从
    SQL Trace 收集信息以进行监控的更改，应该不会影响您在本章后续部分按预期目的使用 SQL Trace 信息的能力。关于 SQL Trace 信息，还有最后一项需要考虑。跟踪信息不需要像性能计数器和
    DMO 信息那样持续收集。相反，SQL Trace 信息通常更适合收集 4-8 小时，这段时间代表了您的数据库平台上常规的一天活动。使用 SQL Trace，我们可能收集过多信息，这会使分析阶段不堪重负并延迟索引建议。'
  raw: '```

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

