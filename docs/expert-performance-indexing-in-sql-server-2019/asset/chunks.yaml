    DBA 也认为，任何情况下都不应在任何数据库上使用此操作。最常被推荐的准则是，在执行收缩数据库操作时要极其谨慎。此外，不要陷入这样的循环：收缩数据库以回收空间，导致碎片，然后通过碎片整理索引来扩展数据库。这只是浪费时间和资源，而这些资源本可以更好地用于解决真正的性能和维护问题。


    ### Fragmentation Variants


    传统上，当人们讨论索引碎片时，主要关注点是聚集索引或非聚集索引内部的碎片。这并不是考虑索引碎片时需要记住的唯一因素。你还需要考虑表或索引是否存在膨胀、转发行或分段，每一种都是索引碎片概念的变体。在本节中，我们将回顾另外两个可能需要在表上进行碎片化维护的领域：


    *   堆膨胀与转发行


    *   列存储碎片'
  raw: '#### Shrink Operations


    The last type of operation that leads to fragmentation is when databases are shrunk.
    Databases can be shrunk using either `DBCC SHRINKDATABASE` or `DBCC SHRINKFILE`.
    These operations can be used to shrink the size of a database or its files. When
    they are used, the pages at the end of a data file are relocated toward the beginning
    of the data file. For their intended purpose, shrink operations can be effective
    tools.


    Unfortunately, these shrink operations do not take into account the nature of
    the data pages that are being moved. To the shrink operation, a data page is a
    data page. The priority of the operation is that pages at the end of the data
    file find a place at the beginning of the data file. As discussed, when the pages
    of an index are not physically stored in order, the index is considered fragmented.


    To demonstrate the fragmentation damage that a shrink operation can cause, you’ll
    create a database and perform a shrink on it; the code appears in Listing [9-14](#338675_3_En_9_Chapter.xhtml#PC14).
    In this example, there are two tables: `FirstTable` and `SecondTable`. Some records
    will be inserted into each table. The inserts will alternate back and forth with
    three inserts into `FirstTable` and two inserts into `SecondTable`. Through these
    inserts, there will be alternating bands of pages allocated to the two tables.
    Next, `SecondTable` will be dropped, which will result in unallocated data pages
    between each of the bands of pages for `FirstTable`. Using Listing [9-13](#338675_3_En_9_Chapter.xhtml#PC13)
    again will show that a small amount of fragmentation exists on `FirstTable`**,**
    shown in Figure [9-11](#338675_3_En_9_Chapter.xhtml#Fig11).


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig11_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Fragmentation of FirstTable after inserts


    ```

    USE master

    GO

    IF EXISTS (SELECT * FROM sys.databases WHERE name = ''Fragmentation'')

    DROP DATABASE Fragmentation

    GO

    CREATE DATABASE Fragmentation

    GO

    Use Fragmentation

    GO

    IF OBJECT_ID(''dbo.FirstTable'') IS NOT NULL

    DROP TABLE dbo.FirstTable;

    CREATE TABLE dbo.FirstTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_FirstTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    CREATE TABLE dbo.SecondTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_SecondTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    GO

    Listing 9-14

    Shrink Operation Database Preparation

    ```


    ```

    Use Fragmentation

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.FirstTable''),NULL,NULL,''DETAILED'')

    Listing 9-13

    View Index Fragmentation from Shrink

    ```


    With the database prepared, the next step is to shrink the database, the purpose
    of which is to recover the space that `SecondTable` has been allocated and trim
    down the size of the database to only what is needed. To perform the shrink operation,
    use the code in Listing [9-15](#338675_3_En_9_Chapter.xhtml#PC15). When the `SHRINKDATABASE`
    operation completes, you can see in Figure [9-12](#338675_3_En_9_Chapter.xhtml#Fig12)
    that running the code from Listing [9-13](#338675_3_En_9_Chapter.xhtml#PC13) causes
    the fragmentation for the index to increase from just over 2 percent fragmentation
    to more than 35 percent fragmentation. This is a significant change in fragmentation
    on a database with just a single table. Consider the effect of a shrink operation
    on a database with dozens, hundreds, or thousands of indexes.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig12_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Fragmentation of FirstTable after shrink operation


    ```

    DBCC SHRINKDATABASE (Fragmentation)

    Listing 9-15

    Shrink Operation

    ```


    This has been a simple example of the damage in terms of fragmentation that a
    shrink operation can have on an index. As was evident even with this example,
    the shrink operation led to a significant amount of fragmentation. Most SQL Server
    database administrators will agree that shrink operations should be an extremely
    rare operation on any database. Many DBAs are also of the opinion that this operation
    should never be used on any database for any reason. The guideline that is most
    often recommended is to be extremely cautious when shrink database operations
    are performed. Also, don’t get caught in a cycle of shrinking a database to recover
    space and causing fragmentation and then expanding the database through defragmenting
    the indexes. This is only a waste of time and resources that could be better spent
    on real performance and maintenance issues.


    ### Fragmentation Variants


    Traditionally, when people discuss index fragmentation, the primary focus is on
    fragmentation within the clustered or nonclustered index. This isn’t the only
    consideration to keep in mind when considering index fragmentation. You also need
    to consider whether the table or index has bloat, forwarding, or segmentation,
    each of which is a variation on the idea of index fragmentation. In this section,
    we’ll review two other areas in which fragmentation-type maintenance can be required
    on tables:


    *   Heap bloat and forwarding


    *   Columnstore fragmentation'
  trans: '

    ## 收缩操作


    导致碎片化的最后一类操作是数据库收缩。数据库可以使用 `DBCC SHRINKDATABASE` 或 `DBCC SHRINKFILE` 命令进行收缩。这些操作可用于减小数据库或其数据文件的大小。当执行这些操作时，数据文件末尾的页会被重新定位到文件的起始部分。就其预期目的而言，收缩操作可以是一种有效的工具。


    不幸的是，这些收缩操作并未考虑被移动数据页的性质。对于收缩操作来说，数据页就是数据页。该操作的优先级是为数据文件末尾的页在文件开头找到位置。如前所述，当索引的页在物理上未按顺序存储时，该索引就被视为存在碎片化。


    为了演示收缩操作可能造成的碎片化损害，你将创建一个数据库并在其上执行收缩操作；相关代码见清单 9-14。在此示例中，有两个表：`FirstTable` 和
    `SecondTable`。将向每个表插入一些记录。插入操作将交替进行，先向 `FirstTable` 插入三条记录，再向 `SecondTable` 插入两条记录。通过这些插入操作，将为两个表分配交替的页带。接下来，`SecondTable`
    将被删除，这将在 `FirstTable` 的每个页带之间留下未分配的数据页。再次使用清单 9-13 查询将显示 `FirstTable` 上存在少量碎片，如图
    9-11 所示。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig11_HTML.jpg](img/338675_3_En_9_Fig11_HTML.jpg)


    图 9-11

    插入操作后 FirstTable 的碎片情况


    ```

    USE master

    GO

    IF EXISTS (SELECT * FROM sys.databases WHERE name = ''Fragmentation'')

    DROP DATABASE Fragmentation

    GO

    CREATE DATABASE Fragmentation

    GO

    Use Fragmentation

    GO

    IF OBJECT_ID(''dbo.FirstTable'') IS NOT NULL

    DROP TABLE dbo.FirstTable;

    CREATE TABLE dbo.FirstTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_FirstTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    CREATE TABLE dbo.SecondTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_SecondTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    GO

    清单 9-14

    收缩操作数据库准备脚本

    ```


    ```

    Use Fragmentation

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.FirstTable''),NULL,NULL,''DETAILED'')

    清单 9-13

    查看由收缩操作导致的索引碎片

    ```


    准备好数据库后，下一步是收缩数据库，目的是回收 `SecondTable` 已分配的空间，并将数据库的大小精简到仅需的大小。要执行收缩操作，请使用清单 9-15
    中的代码。当 `SHRINKDATABASE` 操作完成后，你可以从图 9-12 中看到，运行清单 9-13 的代码导致索引的碎片率从略高于 2% 增加到超过
    35%。对于一个只有一张表的数据库来说，这是一个显著的碎片率变化。试想一下收缩操作对拥有数十个、数百个或数千个索引的数据库的影响。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig12_HTML.jpg](img/338675_3_En_9_Fig12_HTML.jpg)


    图 9-12

    收缩操作后 FirstTable 的碎片情况


    ```

    DBCC SHRINKDATABASE (Fragmentation)

    清单 9-15

    收缩操作

    ```


    这是一个关于收缩操作可能对索引造成碎片化损害的简单示例。即使在这个示例中也很明显，收缩操作导致了显著的碎片。大多数 SQL Server 数据库管理员会同意，收缩操作应该是任何数据库上极其罕见的操作。许多
    DBA 也认为，在任何情况下都不应在任何数据库上使用此操作。最常被推荐的准则是，在执行收缩数据库操作时要极其谨慎。此外，不要陷入这样的循环：收缩数据库以回收空间，导致碎片化，然后通过碎片整理索引来扩展数据库。这只是浪费时间和资源，而这些资源本可以更好地用于解决真正的性能和维护问题。


    ### 碎片变体


    传统上，当人们讨论索引碎片时，主要关注点是聚集索引或非聚集索引内部的碎片。这并不是考虑索引碎片时需要记住的唯一因素。你还需要考虑表或索引是否存在膨胀、转发行或分段，每一种都是索引碎片概念的变体。在本节中，我们将回顾另外两个可能需要在表上进行碎片化维护的领域：


    *   堆膨胀与转发行


    *   列存储碎片

    '
- fmt: '## Heap Bloat and Forwarding


    The first area we’ll cover is heap bloat and forwarding. As discussed in Chapter
    [3](#338675_3_En_3_Chapter.xhtml), heaps are collections of unordered pages in
    which data for a table is stored. As new rows are added to the table, the heap
    grows, and new pages are allocated. Insert and update operations can cause changes
    to heaps that can require maintenance on the table.


    To begin, you’ll look at bloating within a heap. For heaps, bloating occurs when
    records are deleted from the heap without being reused for new records. As discussed
    in Chapter [8](#338675_3_En_8_Chapter.xhtml), this isn’t a matter of records going
    to new pages but an overall decline in the number of records in the table. The
    pages will be reused, but when they aren’t, the pages remain allocated, and this
    can have an impact on performance.


    To demonstrate this activity, let’s review the script in Listing [9-16](#338675_3_En_9_Chapter.xhtml#PC16).
    In the script, it starts with a heap table that has 400 records inserted into
    it, and then half the records are deleted, leaving 200 records in the table. As
    shown in Figure [9-13](#338675_3_En_9_Chapter.xhtml#Fig13), the record count for
    the table reflects these changes, but in both cases the DMV results show that
    there are 100 pages associated with the table. This is because pages are not removed
    from a heap unless maintenance activities force this to occur. Through the `ALTER
    TABLE` statement on `dbo.HeapTable` with the `REBUILD` option, the table is rebuilt,
    and the excess pages are flushed.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig13_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig13_HTML.jpg)


    #### Figure 9-13


    Results from deleting from a heap


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.HeapTable'') IS NOT NULL

    DROP TABLE dbo.HeapTable;

    CREATE TABLE dbo.HeapTable

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapTable (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    DELETE FROM dbo.HeapTable

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    ALTER TABLE dbo.HeapTable REBUILD;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    ```


    #### Listing 9-16

    Impact of Deletes on Heap Page Allocations


    To help emphasize that the pages are still in the table, Figure [9-14](#338675_3_En_9_Chapter.xhtml#Fig14)
    shows the pages that are read when counting all rows in the table, further demonstrating
    that there are 100 pages being accessed. When considering the impact on performance
    for heaps after a delete, if there is an excessive number of pages in a heap compared
    to the amount of data, this will increase the amount of effort required by SQL
    Server to execute the query. In the case of this demonstration, the `COUNT(*)`
    queries are processing twice the amount of data that is required.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig14_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig14_HTML.jpg)


    #### Figure 9-14


    I/O impact from deletes on a heap


    The other area of consideration for the maintenance of heaps is the volume of
    forwarded records in the table. Forwarded records, discussed in Chapter [3](#338675_3_En_3_Chapter.xhtml),
    are records within a heap that no longer fit in the original location in which
    they were added to the heap. To accommodate the change in the size of the record,
    the record is stored on another page, and the previous record location includes
    a pointer to the new location.


    The impact of this change is an increase in the number of pages in the heap, because
    new pages are added for existing records, and it takes an additional I/O operation
    to go from the first page to the forwarded page when looking up a record. While
    this may not appear to be a huge issue, in aggregate the accumulated impact of
    forwarded records increases the amount of I/O for a system and adds to latency
    in query execution.


    To demonstrate the impact of forwarded records on queries, execute the code in
    Listing [9-17](#338675_3_En_9_Chapter.xhtml#PC17). This script creates a table
    with a heap, runs a number of queries, updates the records to cause forwarding
    of heap records to occur, and then completes by reexecuting the previous collection
    of queries.


    ```sql

    SET NOCOUNT ON

    IF OBJECT_ID(''dbo.ForwardedRecords'') IS NOT NULL

    DROP TABLE dbo.ForwardedRecords;

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    CREATE NONCLUSTERED INDEX IX_ForwardedRecords_ID ON dbo.ForwardedRecords(ID);

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    SET STATISTICS IO ON

    PRINT ''*** No forwarded records''

    SELECT * FROM dbo.ForwardedRecords;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID = 40;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID BETWEEN 40 AND 60;

    SET STATISTICS IO OFF

    UPDATE dbo.ForwardedRecords

    SET VALUE =REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    SET STATISTICS IO ON

    PRINT ''*** With forwarded records''

    SELECT * FROM dbo.ForwardedRecords;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID = 40;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID BETWEEN 40 AND 60;

    SET STATISTICS IO OFF

    ```


    #### Listing 9-17

    Forwarded Record Impact on Query Performance


    There are three queries from Listing [9-17](#338675_3_En_9_Chapter.xhtml#PC17)
    that are included to demonstrate the impact of forwarded records on heaps:


    *   `SELECT *`: To demonstrate the impact of an index scan

    *   `SELECT` with equality predicate: To demonstrate the impact on a singleton
    lookup

    *   `SELECT` with inequality predicate: To demonstrate the impact on a range lookup


    For the `SELECT *` query, before the forwarded records are in the heap, the query
    executes with 99 reads, shown in Figure [9-15](#338675_3_En_9_Chapter.xhtml#Fig15).
    After the forwarded records are introduced, the reads increase to 561. This increase
    is because of the new pages added to the heap to accommodate the increases in
    the row sizes. With the second query, the singleton lookup grows from three reads
    to four reads, which represents the additional read required to go from the original
    location for the record to the forwarding location. In the last query, the range
    query with the lookup executes with 23 reads, but after the forwarded records
    are added to the table, the reads jump to 30 reads.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig15_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig15_HTML.jpg)


    #### Figure 9-15


    I/O statistics for forwarded record queries


    The overall effect of the forwarded records is an increase in reads. While the
    increase may not be significant from a per-query basis, over time the impact adds
    up. Scans of heaps with forwarded records access more pages, and lookups require
    an extra I/O. Reducing the impact of forwarded records in heaps is an important
    part of maintaining indexes and maintaining performance.'
