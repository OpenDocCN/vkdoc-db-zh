    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    SET STATISTICS IO OFF;

    SELECT OBJECT_NAME(object_id) as table_name

    ,CASE index_id

    WHEN INDEXPROPERTY(object_id , ''IX_Contacts_CertificationDate'', ''IndexID'')
    THEN ''Filtered Index''

    WHEN 1 THEN ''Clustered Index''

    ELSE ''Other Indexes'' END As index_type

    ,index_id

    ,in_row_data_page_count

    ,in_row_reserved_page_count

    ,in_row_used_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = OBJECT_ID(''dbo.Contacts'');

    Listing 11-26

    Filtered Indexes Pattern

    ```


    Including only a subset of the rows in a table within an index has a number of
    advantages. One advantage is that since the index is smaller, there are fewer
    pages in the index, which translates directly to lower storage requirements for
    the database. Along the same lines, if there are fewer pages in the index, there
    are fewer opportunities for index fragmentation and less effort required to maintain
    the index. The final advantage of filtered indexes relates to performance and
    plan quality. Since the values in the filtered index are limited, the statistics
    for the index are limited as well. Since there are fewer pages to traverse in
    the filtered index, a scan against a filtered index is almost always less of an
    issue than a scan on the clustered index or heap.'
  trans: '### 过滤索引


    在数据库的某些表中，存在一些具有特定值的行，这些行在应用程序使用的数据库结果集中很少或永远不会被返回。在这些情况下，将这些行作为结果集可返回的选项移除可能是有益的。在其他一些情况下，识别表中的数据子集并创建索引可能很有用。通过利用覆盖查询需要返回结果的那数百或数千行的索引，你可以避免扫描表中数百万或数十亿条记录。这两种情况都描述了使用**过滤索引**模式可以提高性能的场景。


    顾名思义，过滤索引模式利用了 SQL Server 2005 引入的过滤索引功能。使用过滤索引时，会向非聚集索引添加一个 `WHERE` 子句，以减少索引中包含的行数。通过只包含符合
    `WHERE` 子句过滤条件的行，查询引擎在构建执行计划时只需考虑这些行；此外，扫描一系列行的成本低于索引包含所有行时的情况。


    为了说明使用过滤索引的价值，考虑这样一个场景：表中只有一小部分行在被过滤的列上有值。代码清单 11-25 考虑了查询的变体。第一个版本返回 `CertificationDate`
    有值的行。第二个版本仅返回 `CertificationDate` 在 2005 年 1 月 1 日 和 2005 年 2 月 1 日 之间的行。对于这两个查询，表上都没有索引能提供最优的执行计划，因为在执行过程中会访问索引的所有
    2,866 个页面（见图 11-36）。检查两个执行计划（图 11-37）显示，使用了 `dbo.Contacts` 的聚集索引扫描来查找符合 `CertificationDate`
    谓词的行。正如缺失索引提示所建议的，在 `CertificationDate` 列上创建索引可以提高查询性能。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig37_HTML.jpg](img/338675_3_En_11_Fig37_HTML.jpg)


    图 11-37. 过滤索引模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig36_HTML.jpg](img/338675_3_En_11_Fig36_HTML.jpg)


    图 11-36. 过滤索引模式的统计信息 I/O 结果


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    ```


    代码清单 11-25. 过滤索引模式


    在应用缺失索引建议之前，你应该考虑该索引在此查询及未来查询中将如何使用。在此场景下，假设永远不会有查询在 `CertificationDate` 值为 `NULL`
    时使用它。那么，在索引中存储所有 `NULL` 行的空值有意义吗？根据上述假设，这没有意义；这样做会浪费数据库中的空间，并且如果因为扫描读取量过高而选择了其他索引，导致跳过
    `CertificationDate` 上的索引，可能会产生非最优的执行计划。


    在此场景下，对索引中的行进行过滤是有意义的。为此，像创建任何其他索引一样创建索引，但要添加一个 `WHERE` 子句（见代码清单 11-26）。创建过滤索引时，关于
    `WHERE` 子句有几点需要注意。首先，`WHERE` 子句必须是确定性的。它不能根据子句内函数的结果而随时间变化。例如，不能使用 `GETDATE()`
    函数，因为其返回的值每毫秒都在变化。第二个限制是只允许简单的比较逻辑。这意味着不能使用 `BETWEEN` 和 `LIKE` 比较。有关过滤索引的限制和约束的更多信息，请参阅第
    2 章。


    执行来自代码清单 11-26 的 `CertificationDate` 查询显示，过滤索引对查询性能有显著影响。在产生的读取次数方面，现在只有 2 次读取，而应用索引前是
    2,866 次读取（见图 11-38）。此外，执行计划现在对两个查询都使用索引查找，而不是聚集索引扫描，如图 11-39 所示。虽然这些结果是预期的，但关于索引的另一个考虑是，新索引仅由两个页面组成。如图
    11-40 所示，整个索引所需的页面数量远少于聚集索引和其他非聚集索引。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig40_HTML.jpg](img/338675_3_En_11_Fig40_HTML.jpg)


    图 11-40. 过滤索引的页面数比较


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig39_HTML.jpg](img/338675_3_En_11_Fig39_HTML.jpg)


    图 11-39. 过滤索引模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig38_HTML.jpg](img/338675_3_En_11_Fig38_HTML.jpg)


    图 11-38. 过滤索引模式的统计信息 I/O 结果


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_CertificationDate ON dbo.Contacts(CertificationDate)

    INCLUDE (FirstName, LastName)

    WHERE CertificationDate IS NOT NULL;

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    SET STATISTICS IO OFF;

    SELECT OBJECT_NAME(object_id) as table_name

    ,CASE index_id

    WHEN INDEXPROPERTY(object_id , ''IX_Contacts_CertificationDate'', ''IndexID'')
    THEN ''Filtered Index''

    WHEN 1 THEN ''Clustered Index''

    ELSE ''Other Indexes'' END As index_type

    ,index_id

    ,in_row_data_page_count

    ,in_row_reserved_page_count

    ,in_row_used_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = OBJECT_ID(''dbo.Contacts'');

    ```


    代码清单 11-26. 过滤索引模式


    仅在索引中包含表中的一部分行具有多个优势。一个优势是，由于索引更小，索引中的页面更少，这直接转化为数据库的存储需求降低。同样地，如果索引中的页面更少，索引碎片的机会就更少，维护索引所需的努力也更小。过滤索引的最后一个优势与性能和计划质量有关。由于过滤索引中的值是有限的，索引的统计信息也是有限的。由于需要遍历过滤索引中的页面更少，对过滤索引的扫描几乎总是比对聚集索引或堆的扫描问题更小。'
- fmt: '## Filtered Indexes Pattern


    There are a few situations where using the Filtered Indexes pattern can and should
    be used when creating indexes. The first situation is when you need to place an
    index on a column that is configured as sparse. In this case, the expected number
    of rows that will have the value will be small compared to the total number of
    rows. One of the benefits of using sparse columns is avoiding the storage costs
    associated with storing `NULL` values in these columns. Make certain that the
    indexes on these columns don’t store the `NULL` values by not using filtered indexes.
    The second situation is when you need to enforce uniqueness on a column that can
    have multiple `NULL` values in it. Creating the filtered index as unique where
    the key columns are not `NULL` will bypass the restrictions on uniqueness that
    allow only a single `NULL` value in the columns. In this case, you can ensure
    that Social Security Numbers in a table are unique when they are provided.


    The last situation that is a good fit for filtered indexes is when queries need
    to be run that don’t fit the normal index profile for a table. In this case, there
    might be a query for a one-off report that needs to retrieve a few thousand rows
    from the database. Instead of running the report and dealing with the potential
    scan of the clustered index or heap, create filtered indexes that mimic the predicates
    of the query. This will allow the query to be quickly executed, without having
    to spend the time building indexes that contain values the query would never have
    considered.


    As this section has detailed, the Filtered Indexes pattern is one that can be
    useful in a variety of situations. Be sure to consider it in your indexing. Often,
    when the first use for a filtered index is found, there are others that start
    appearing, and we’ll identify situations with selecting and modifying data, as
    earlier, that can benefit from its use.


    ### Foreign Keys


    The last nonclustered index pattern is the Foreign Keys pattern. This is the only
    pattern that relates directly to objects in the database design. Foreign keys
    provide a mechanism to constrain values in one table to the values in rows in
    another table. This relationship provides referential integrity that is critical
    in most database deployments. However, foreign keys can sometimes be the cause
    of performance issues in databases without anyone realizing that they are interfering
    with performance.


    Since foreign keys provide a constraint on the values that are possible for a
    column, there is a check that is done when the values need to be validated. There
    are two types of validations that can occur with a foreign key. The first happens
    on the parent table, `dbo.ParentTable`, and the second happens on the child table,
    `dbo.ChildTable` (see Figure [11-41](#338675_3_En_11_Chapter.xhtml#Fig41)). Validations
    occur on `dbo.ParentTable` whenever rows are modified in `dbo.ChildTable`. In
    these cases, the `ParentID` value from `dbo.ChildTable` is validated with a lookup
    of the value in `dbo.ParentTable`. Usually, this does not result in a performance
    issue since `ParentID` in `dbo.ParentTable` will likely be the primary key in
    the table and also the column upon which the table is clustered. The other validations
    occur on `dbo.ChildTable` when there are modifications to `dbo.ParentTable`. For
    instance, if one of the rows in `dbo.ParentTable` were to be deleted, then `dbo.ChildTable`
    would need to be checked to see whether the `ParentID` value is being used in
    that table. This validation is where the Foreign Keys pattern needs to be applied.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig41_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig41_HTML.jpg)


    Figure 11-41 Foreign key relationship


    To demonstrate the Foreign Keys pattern, you will first need a couple tables for
    the examples. The code in Listing [11-27](#338675_3_En_11_Chapter.xhtml#PC27)
    builds two tables, `dbo.Customer` and `dbo.SalesOrderHeader`. For these tables,
    a foreign key relationship exists between them on the `CustomerID` columns. For
    every `dbo.SalesOrderHeader` row, there is a customer associated with the row.
    Conversely, every row in `dbo.Customer` can relate to one or more rows in `dbo.SalesOrderHeader`.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Customer(

    CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_Customer_CustomerID PRIMARY KEY CLUSTERED (CustomerID)

    );

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int

    ,OrderDate datetime

    ,DueDate datetime

    ,CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_SalesOrderHeader_SalesOrderID

    PRIMARY KEY CLUSTERED (SalesOrderID)

    ,CONSTRAINT GK_SalesOrderHeader_CustomerID_FROM_Customer

    FOREIGN KEY (CustomerID) REFERENCES dbo.Customer(CustomerID)

    );

    INSERT INTO dbo.Customer (CustomerID)

    SELECT CustomerID

    FROM Sales.Customer;

    INSERT INTO dbo.SalesOrderHeader

    (SalesOrderID, OrderDate, DueDate, CustomerID)

    SELECT SalesOrderID, OrderDate, DueDate, CustomerID

    FROM Sales.SalesOrderHeader;

    Listing 11-27 Setup for Foreign Keys Pattern

    ```


    In the example, you want to observe what happens in `dbo.SalesOrderHeader` when
    a row in `dbo.Customer` is modified. To demonstrate activity on `dbo.Customer`,
    the script in Listing [11-28](#338675_3_En_11_Chapter.xhtml#PC28) executes a `DELETE`
    on the table on the row where `CustomerID` equals 701\. This row should have no
    rows in `dbo.SalesOrderHeader`. Even though this is the case, the foreign key
    does require that a check be made to determine whether there are rows in `dbo.SalesOrderHeader`
    for that `CustomerID`. If so, then SQL Server would error on the delete. Since
    there are no rows in `dbo.SalesOrderHeader`, the row in `dbo.Customer` can be
    deleted.'
