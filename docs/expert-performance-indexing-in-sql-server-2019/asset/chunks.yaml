  trans: '

    ### 当前工作负载的索引指南


    对数据库进行索引的最重要方面，是依据您**当前**使用数据库的方式，而非过去的方式，也不是基于未来数年的数据预期，而是立足当下。


    您为当前需求建立的索引，很可能并非数据库未来所需的索引。因此，第一条最佳实践是：持续审查、分析并实施对环境中索引的更改。请认识到，无论两个数据库多么相似，只要其中的数据和用户群体不同，这两个数据库的索引策略就可能需要有所区别。关于监控和分析索引的详细讨论，请参阅第
    13 章和第 14 章。


    明确了这一点后，让我们来看看索引的其他最佳实践。


    ### 默认情况下在主键上使用聚集索引


    下一条最佳实践是：默认情况下在`主键`上使用`聚集索引`。这可能看起来与本章提出的第九个误解相悖。第九个误解讨论的是将`聚集索引`还是`堆`作为教条性选择。无论数据库最初采用哪种方式构建，该误解会让你认为，如果你的表设计与此不符，就应该不顾情况地进行更改。此最佳实践建议，将`主键`上使用`聚集索引`作为起点。


    默认对表的`主键`进行聚集，会增加索引选择适合该表的可能性。如本章前文所述，`聚集索引`控制着表中数据的存储方式。许多（可能是大多数）`主键`建立在利用`标识属性`的列上，该属性会随着每条新记录添加到表中而递增。为`主键`选择`聚集索引`将提供访问数据的最有效方法。


    ### 指定填充因子


    `填充因子`控制索引构建或碎片整理后，索引数据页上保留的可用空间量。保留此可用空间是为了允许页面上的记录扩展，但存在记录大小变化可能导致`页拆分`的风险。这是用于索引维护的一个极其有用的索引属性。修改`填充因子`可以减轻碎片化的风险。关于`填充因子`的更深入讨论见第
    6 章。就最佳实践而言，您需要关注能够在数据库和索引级别设置`填充因子`的能力。


    #### 数据库级别的填充因子


    如前所述，SQL Server 的特性之一是允许为索引设置默认的`填充因子`。此设置是 SQL Server 范围内的设置，可在 SQL Server 属性的“数据库属性”页面中修改。默认情况下，此值设置为
    0，这等同于 100。**不要**将默认`填充因子`修改为 0 或 100 以外的值（0 和 100 效果相同）。这样做会将数据库中每个索引的`填充因子`更改为新值；下次创建、重建或重组索引时，这将为所有索引增加指定数量的可用空间。


    表面上看，这似乎是个好主意，但这将盲目地将所有索引的大小增加指定量。索引大小的增加将需要更多的`I/O`来完成与变更前相同的工作。对于许多索引而言，进行此项更改将导致资源不必要的浪费。


    #### 索引级别的填充因子


    在索引级别，您应修改那些频繁出现严重碎片化的索引的`填充因子`。降低`填充因子`将增加索引中的可用空间量，并提供额外空间以补偿导致碎片化的记录长度变化。在索引级别管理`填充因子`是合适的，因为它提供了根据数据库需求精确调整索引的能力。


    ### 为外键列创建索引


    当在表上创建`外键`时，应为该表中的`外键`列创建索引。这对于辅助`外键`确定父表中哪些记录受约束于被引用表中的每条记录是必要的。这在针对被引用表进行更改时非常重要。被引用表中的更改可能需要检查所有与父表中记录匹配的行。如果不存在索引，则将对该列执行扫描操作。在大型父表上，这可能导致大量的`I/O`操作，并可能引发一些`并发问题`。


    此类问题的一个例子是`州`表和`地址`表。`地址`表中可能有数千或数百万条记录，而`州`表中可能有大约一百条记录。`地址`表将包含一个被`州`表引用的列。试想，如果需要删除`州`表中的一条记录。若`地址`表中`外键`列上没有索引，那么`地址`表将如何识别会受删除`州`记录操作影响的行？没有索引，SQL
    Server 将不得不检查`地址`表中的每一条记录。如果该列有索引，SQL Server 就能够对匹配要从`州`表中删除的值的记录执行`范围扫描`。


    通过为`外键`列创建索引，可以避免诸如本节所述的性能问题。`外键`的最佳实践是为其列创建索引。第 11 章包含有关此最佳实践的更多细节和一个代码示例。


    ### 平衡索引数量


    如本书先前所讨论，索引对于提高访问记录中信息的性能极为有用。不幸的是，索引并非没有代价。拥有索引的代价不仅限于数据库内的空间。构建索引时，您需要考虑以下一些因素：


    *   记录插入或删除的频率如何？

    *   键列更新的频率如何？

    *   索引被使用的频率如何？

    *   索引支持哪些流程？

    *   表上还有多少其他索引？


    这些仅是构建索引时需要考虑的首要因素。索引构建后，更新和维护索引将花费多少时间？您修改索引的频率是否会超过索引用于返回查询结果的频率？表中有多少列，索引数量是否超过了列数？


    平衡表上索引数量的难点在于，无法推荐一个精确的数字。决定一个表上合理的索引数量是一个**逐表决策**的过程。您不希望索引太少，这可能导致对`聚集索引`或`堆`进行过度扫描以返回结果。同时，表也不应有过多的索引，导致花费在保持索引最新上的时间比回返结果的时间还要多。对于事务处理系统，我的经验法则是：如果一个表上有超过十个索引，那么该表上的索引数量很可能就过多了。

    '
- fmt: '## Summary


    This chapter looked at some myths surrounding indexes as well as some best practices.
    For both areas, you investigated what some commonly held beliefs are and were
    presented some details around each of them.


    With the myths, you looked at a number of ideas that are generally believed about
    indexes that are in fact not true. The myths covered clustered indexes, fill factor,
    the column makeup of indexes, and more. The key to how to view anything that is
    believed about indexes that may be a myth is to take it upon yourself to test
    it.


    You also looked at best practices. The best practices provided in the chapter
    should be the basis on which indexes for your databases can be built. I defined
    what a best practice is and what it is not. Then I discussed a number of best
    practices that can be considered when indexing your databases.


    # 9. Index Maintenance


    Like anything in life, indexes require maintenance. Over time, the performance
    benefits of indexes can wane or, through data modifications, their sizes and the
    underlying statistics can drift and bloat. To prevent these issues, indexes must
    be maintained. If you do so, your database will remain a lean, mean query-running
    machine.


    When it comes to maintenance, there are five areas to consider:


    - Index fragmentation

    - Heap bloat and forwarding

    - Columnstore fragmentation

    - Statistics

    - In-memory statistics


    Each plays a key role in maintaining a properly indexed and well-performing database.


    This chapter explores all these areas. You’ll learn about issues that arise from
    not maintaining indexes and review strategies for implementing a maintenance process.
    To illustrate how fragmentation occurs, there will be a number of simple demos.
    The statistics conversation will expand on the items discussed in Chapter 3 and
    lay out how to update statistics to keep them accurate.


    ## Index Fragmentation


    The first maintenance issue that can lead to a degradation of index performance
    is index fragmentation. Fragmentation happens when the pages in an index are no
    longer physically sequential.


    While index fragmentation generated a much greater concern in previous versions
    of SQL Server and with old storage systems, it is still something to be concerned
    with in SQL Server. The main issue that arises with fragmentation is an increase
    in the amount of space required to store the index due to pages being split and
    in many cases left half empty. This excess space impacts the amount of space the
    database uses on disk, within memory, and through the CPU as it processes the
    data.


    There are a few events in SQL Server that can lead to index fragmentation:


    - `INSERT` operations

    - `UPDATE` operations

    - `DELETE` operations

    - `DBCC SHRINKDATABASE` operations


    As you can see, except for selecting data from the database, pretty much everything
    that you can do to an index can lead to fragmentation. Unless your database is
    read-only, you must pay attention to fragmentation and address it in an index
    before it becomes an issue.


    ### Fragmentation Operations


    The best way to understand fragmentation is to see it in action. In Chapter 3,
    you looked at the information returned by the dynamic management object (DMO)
    `sys.dm_index_physical_stats`. In this section, you’ll review a number of scripts
    that cause fragmentation and then use the DMO to investigate the amount of fragmentation
    that has occurred.


    As mentioned, fragmentation occurs when physical pages within an index are not
    sequential. When an insert occurs and the new row is not placed at the ending
    of the pages for the index, the new row will be placed on a page that already
    has other rows on it. If there is not enough room on the page for the new row,
    then the page will split—leading to fragmentation of the index. Fragmentation
    is the physical result of page splits in the index.


    #### Insert Operations


    The first operation that can lead to index fragmentation is an `INSERT` operation.
    This isn’t usually considered the most likely operation to result in fragmentation,
    but there are database design patterns that can lead to fragmentation. There are
    two areas in which `INSERT` operations can lead to fragmentation: clustered and
    nonclustered indexes.


    The most common pattern for designing clustered indexes is to place the index
    on a single column with a value that is ever-increasing. This is often done using
    an `int` data type and the `IDENTITY` property. When this pattern is followed,
    the chances of fragmentation occurring during inserts are relatively rare. Unfortunately,
    this isn’t the only clustered index pattern that exists, and the others lead to
    fragmentation. For example, using business keys or `uniqueidentifier` data type
    values often causes fragmentation.


    Clustered indexes that use `uniqueidentifier` data type values often use the `NEWID()`
    function to generate a random, unique value to serve as the clustering key. This
    value is unique but not ever-increasing. The most recent value generated may or
    may not be after the previous value. Because of this, when a new row is inserted
    into the clustered index, it is most likely to be placed between a number of other
    rows already in the index. And, as mentioned, if there isn’t enough room in the
    index, fragmentation will occur.


    To demonstrate fragmentation caused by the use of `uniqueidentifier` data type
    values, try the code in Listing 9-1. This code creates a table named `dbo.UsingUniqueidentifier`.
    It is populated with rows from `sys.columns`, and then a clustered index is added.
    At this point, all the pages in the indexes are physically sequential. Run the
    code in Listing 9-2 to view the results shown in Figure 9-1; these results show
    that the average fragmentation for the index is 0.00 percent.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig1_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig1_HTML.jpg)

    **Figure 9-1** Starting fragmentation results (results may vary)


    ```sql

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_frag_in_percent

    ,fragment_count AS frag_count

    ,avg_fragment_size_in_pages AS avg_frag_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UsingUniqueidentifier''),NULL,NULL,''DETAILED'')

    ```

    **Listing 9-2** View INSERT Index Fragmentation


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UsingUniqueidentifier'') IS NOT NULL

    DROP TABLE dbo.UsingUniqueidentifier;

    CREATE TABLE dbo.UsingUniqueidentifier

    (

    RowID uniqueidentifier CONSTRAINT DF_GUIDValue DEFAULT NEWID()

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UsingUniqueidentifier(RowID);

    ```

    **Listing 9-1** Populate Uniqueidentifier Table


    With the table built with a clustered index based on `uniqueidentifier` data types,
    you are now ready to perform an `INSERT` into the table to see the effect that
    the insert has on the index. To demonstrate, insert all the rows in `sys.objects`
    into `dbo.UsingUniqueidentifier` using the code in Listing 9-3. After the insert,
    you can review the fragmentation of the index in the results, using Listing 9-2
    again. Your results should be similar to those shown in Figure 9-2, which shows
    fragmentation in the clustered index at over 70 percent at index level 0 after
    adding 689 rows to the table.'
  raw: '## Summary


    This chapter looked at some myths surrounding indexes as well as some best practices.
    For both areas, you investigated what some commonly held beliefs are and were
    presented some details around each of them.


    With the myths, you looked at a number of ideas that are generally believed about
    indexes that are in fact not true. The myths covered clustered indexes, fill factor,
    the column makeup of indexes, and more. The key to how to view anything that is
    believed about indexes that may be a myth is to take it upon yourself to test
    it.


    You also looked at best practices. The best practices provided in the chapter
    should be the basis on which indexes for your databases can be built. I defined
    what a best practice is and what it is not. Then I discussed a number of best
    practices that can be considered when indexing your databases.


    # 9. Index Maintenance


    Like anything in life, indexes require maintenance. Over time, the performance
    benefits of indexes can wane or, through data modifications, their sizes and the
    underlying statistics can drift and bloat. To prevent these issues, indexes must
    be maintained. If you do so, your database will remain a lean, mean query-running
    machine.


    When it comes to maintenance, there are five areas to consider:


    *   Index fragmentation


    *   Heap bloat and forwarding


    *   Columnstore fragmentation


    *   Statistics


    *   In-memory statistics


    Each plays a key role in maintaining a properly indexed and well-performing database.


    This chapter explores all these areas. You’ll learn about issues that arise from
    not maintaining indexes and review strategies for implementing a maintenance process.
    To illustrate how fragmentation occurs, there will be a number of simple demos.
    The statistics conversation will expand on the items discussed in Chapter [3](#338675_3_En_3_Chapter.xhtml)
    and lay out how to update statistics to keep them accurate.


    ## Index Fragmentation


    The first maintenance issue that can lead to a degradation of index performance
    is index fragmentation. Fragmentation happens when the pages in an index are no
    longer physically sequential.


    While index fragmentation generated a much greater concern in previous versions
    of SQL Server and with old storage systems, it is still something to be concerned
    with in SQL Server. The main issue that arises with fragmentation is an increase
    in the amount of space required to store the index due to pages being split and
    in many cases left half empty. This excess space impacts the amount of space the
    database uses on disk, within memory, and through the CPU as it processes the
    data.


    There are a few events in SQL Server that can lead to index fragmentation:


    *   `INSERT` operations


    *   `UPDATE` operations


    *   `DELETE` operations


    *   `DBCC SHRINKDATABASE` operations


    As you can see, except for selecting data from the database, pretty much everything
    that you can do to an index can lead to fragmentation. Unless your database is
    read-only, you must pay attention to fragmentation and address it in an index
    before it becomes an issue.


    ### Fragmentation Operations


    The best way to understand fragmentation is to see it in action. In Chapter [3](#338675_3_En_3_Chapter.xhtml),
    you looked at the information returned by the dynamic management object (DMO)
    `sys.dm_index_physical_stats`. In this section, you’ll review a number of scripts
    that cause fragmentation and then use the DMO to investigate the amount of fragmentation
    that has occurred.


    As mentioned, fragmentation occurs when physical pages within an index are not
    sequential. When an insert occurs and the new row is not placed at the ending
    of the pages for the index, the new row will be placed on a page that already
    has other rows on it. If there is not enough room on the page for the new row,
    then the page will split—leading to fragmentation of the index. Fragmentation
    is the physical result of page splits in the index.


    #### Insert Operations


    The first operation that can lead to index fragmentation is an `INSERT` operation.
    This isn’t usually considered the most likely operation to result in fragmentation,
    but there are database design patterns that can lead to fragmentation. There are
    two areas in which `INSERT` operations can lead to fragmentation: clustered and
    nonclustered indexes.


    The most common pattern for designing clustered indexes is to place the index
    on a single column with a value that is ever-increasing. This is often done using
    an `int` data type and the `IDENTITY` property. When this pattern is followed,
    the chances of fragmentation occurring during inserts are relatively rare. Unfortunately,
    this isn’t the only clustered index pattern that exists, and the others lead to
    fragmentation. For example, using business keys or `uniqueidentifier` data type
    values often causes fragmentation.


    Clustered indexes that use `uniqueidentifier` data type values often use the `NEWID()`
    function to generate a random, unique value to serve as the clustering key. This
    value is unique but not ever-increasing. The most recent value generated may or
    may not be after the previous value. Because of this, when a new row is inserted
    into the clustered index, it is most likely to be placed between a number of other
    rows already in the index. And, as mentioned, if there isn’t enough room in the
    index, fragmentation will occur.


    To demonstrate fragmentation caused by the use of `uniqueidentifier` data type
    values, try the code in Listing [9-1](#338675_3_En_9_Chapter.xhtml#PC1). This
    code creates a table named `dbo.UsingUniqueidentifier`. It is populated with rows
    from `sys.columns`, and then a clustered index is added. At this point, all the
    pages in the indexes are physically sequential. Run the code in Listing [9-2](#338675_3_En_9_Chapter.xhtml#PC2)
    to view the results shown in Figure [9-1](#338675_3_En_9_Chapter.xhtml#Fig1);
    these results show that the average fragmentation for the index is 0.00 percent.


