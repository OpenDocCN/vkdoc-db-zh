    ### 注意


    自 SQL Server 2014 之后，这些列的行为发生了变化。在批量插入时，`leaf_allocation_count` 仅记录单个页。


    在本节开头，曾提到使用页分配来监视页拆分，并识别在何处修改填充因子可能有用。要理解这一点，您首先需要在 `dbo.AllocationCycle` 表上生成页拆分。您可以使用清单
    3-41 中的脚本来实现。此脚本将每第三行的 `FillerData` 列长度增加到 1,000 个字符。


    ```sql

    USE AdventureWorks2017;

    GO

    UPDATE  dbo.AllocationCycle

    SET     FillerData = REPLICATE(''x'',1000)

    WHERE   ID % 3 = 1;

    ```

    **清单 3-41** 用于增加页分配的 T-SQL 脚本


    数据修改后，执行清单 3-40 中的 `sys.dm_db_index_operational_stats` 查询的结果会发生巨大变化。随着行大小的扩展，分配的页数激增至
    9,849，其中包含 35 个非叶页（图 3-28）。由于行的顺序没有改变，此活动与因行大小扩展而引起的页拆分有关。通过监视这些统计信息，可以识别受此类活动模式影响的索引。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig28_HTML.jpg](img/338675_3_En_3_Fig28_HTML.jpg)

    **图 3-28** 更新页分配的查询结果


    ### 压缩


    虽然不是最令人兴奋的一组列，但 `sys.dm_db_index_operational_stats` 中有两个列用于监视压缩。如表 3-18 所示，这些列统计了尝试压缩页的次数以及成功压缩的次数。这些列的主要价值在于提供关于
    `PAGE` 级别压缩的反馈。压缩失败可能导致决定移除压缩，因为当压缩失败率很高时启用压缩通常是不切实际的。


    **表 3-18** `sys.dm_db_index_operational_stats` 中的压缩列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_compression_attempt_count` | bigint | 针对表、索引或索引视图的特定分区，评估 `PAGE` 级别压缩的页数。包括因无法实现显著节省而未压缩的页。
    |

    | `page_compression_success_count` | bigint | 针对表、索引或索引视图的特定分区，使用 `PAGE` 级别压缩成功压缩的数据页数。
    |


    当压缩数据的成本超过日后解压缩数据的价值时，页面压缩可能会失败。这通常发生在重复数据模式较少的数据中，例如图像。当图像数据被压缩时，通常无法从压缩中获得足够的好处，因此
    SQL Server 不会将该页存储为压缩页。为了演示这一点，请执行清单 3-42 中的代码，该代码创建了一个启用了页面压缩的表，并向其中插入了若干图像。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    CREATE TABLE dbo.PageCompression(

    ProductPhotoID int NOT NULL,

    ThumbNailPhoto varbinary(max) NULL,

    LargePhoto varbinary(max) NULL,

    CONSTRAINT PK_PageCompression PRIMARY KEY CLUSTERED (ProductPhotoID))

    WITH (DATA_COMPRESSION = PAGE);

    INSERT INTO dbo.PageCompression

    SELECT ProductPhotoID

    ,ThumbNailPhoto

    ,LargePhoto

    FROM Production.ProductPhoto;

    ```

    **清单 3-42** 用于创建带页面压缩的表的 T-SQL 脚本


    向表中的插入操作并未失败，但是否所有页面都被压缩了呢？要找出答案，请执行清单 3-43 中的脚本；它返回 `page_compression_attempt_count`
    和 `page_compression_success_count` 列。如结果所示（图 3-29），有 7 个页面被成功压缩，但另外有 46 个页面压缩失败。根据页面压缩的成功与失败比例，可以很容易地看出页面压缩对于
    `dbo.PageCompression` 上的聚集索引的价值并不高。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig29_HTML.jpg](img/338675_3_En_3_Fig29_HTML.jpg)

    **图 3-29** 压缩的查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_compression_attempt_count

    ,page_compression_success_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.PageCompression''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```

    **清单 3-43** 查询 `sys.dm_db_index_operational_stats` 中的页面压缩尝试

