    虽然行锁和页锁对于识别何时存在争用很有用，但关于锁有一个信息是它们无法提供的。DMO 中没有收集关于正在放置的锁类型的信息。所有锁可能是共享锁，也可能是排他锁。锁等待计数提供了关于表上不兼容锁的频率以及这些锁的持续时间的范围，但锁本身并未被识别。


    ### Lock Escalation


    关于锁争用，最后需要注意的一点是数据库中发生的锁升级数量。当为事务获取的锁数量超过 SQL Server 实例上的锁阈值时，锁将升级到更高级别。这种升级可能发生在页、分区和表级别。数据库中发生锁升级的原因有很多。一个原因是锁需要内存，因此锁越多，需要的内存就越多，管理锁所需的资源也就越多。另一个原因是，许多单独的低级别锁为阻塞升级为死锁提供了机会。由于这些原因，关注锁升级非常重要。


    为了帮助理解锁升级，让我们使用本节前面演示查询的修改版本。不过，这次不是选择 44 行，而是更新所有 `ProductID` 小于或等于 712 的行（见清单
    [3-32]）。更新操作只会将 `ProductID` 更改为当前值，以避免永久更改 AdventureWorks2017 中的数据。


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    ```

    *清单 3-32 生成锁提升的 T-SQL 脚本*


    现在，通过示例脚本的执行，你需要使用清单 [3-33] 中的脚本查看 `sys.dm_db_index_operational_stats` 中的统计信息，以确定是否发生了任何锁升级。如脚本输出所示（图
    [3-24]），列 `index_lock_promotion_attempt_count` 为 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    和 `IX_SalesOrderDetail_ProductID` 记录了四次事件。这意味着触发了四次锁升级的机会。查看 `index_lock_promotion_count`
    列，`IX_SalesOrderDetail_ProductID` 上发生了一次锁升级。用不太技术的术语解释结果，对于这两个索引，SQL Server 有四次考虑锁升级是否适用于该查询。在对
    `IX_SalesOrderDetail_ProductID` 进行第四次检查时，SQL Server 确定需要锁升级，于是锁被升级了。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig24_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig24_HTML.jpg)

    *图 3-24 锁升级的查询结果*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```

    *清单 3-33 查询 `sys.dm_db_index_operational_stats` 中的锁升级*


    监控锁升级与监控行锁和页锁密不可分。当行锁和页锁争用增加时，无论是通过锁等待频率增加还是持续时间延长，评估锁升级都可以帮助识别 SQL Server 考虑升级锁的次数以及这些锁何时被升级。在某些情况下，如果表索引不当，锁升级可能更频繁地发生，并导致阻塞增加，甚至可能引发死锁。'
  raw: '#### Page Lock


    The next set of columns are the page lock columns. The columns in this group have
    similar characteristics to the row lock columns, with the exception that they
    are scoped at the page level instead of the row level. For every page that relates
    to an accessed row, a page lock is acquired. These columns are `page_lock_count`,
    `page_lock_wait_count`, and `page_lock_wait_in_ms`. When monitoring for locking
    contention on an index, it is important to look at both the page and row levels
    to identify whether the contention is on the individual rows being accessed or
    possibly different rows accessed on the same pages.


    To review the differences, let’s continue with the query from Listing [3-29](#338675_3_En_3_Chapter.xhtml#PC29)
    but retrieve the page lock statistics that were collected in `sys.dm_db_index_operational_stats`
    for the query. This information is available using the script in Listing [3-31](#338675_3_En_3_Chapter.xhtml#PC31).
    The results this time are a bit different than those for the row locks. For the
    page locks, see Figure [3-22](#338675_3_En_3_Chapter.xhtml#Fig22); there are only
    two page locks on the index `IX_SalesOrderDetail_ProductID`. Along with that,
    there are 44 page locks on `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`,
    which did not encounter any row locks.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig22_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Query results for page locks


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.page_lock_count

    ,ios.page_lock_wait_count

    ,ios.page_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 3-31

    Query for Page Locks in sys.dm_db_index_operational_stats

    ```


    The statistics for the locking behavior may not make sense initially, until you
    consider the activity that occurred when the query (from Listing [3-29](#338675_3_En_3_Chapter.xhtml#PC29))
    executed. When the query executed, it utilized an index seek and a key lookup
    (see the execution plan in Figure [3-23](#338675_3_En_3_Chapter.xhtml#Fig23)).
    The index seek on `IX_SalesOrderDetail_ProductID` accounts for the 2 page locks
    and the 44 row locks. There were 44 rows that matched the predicate for the query,
    and they spanned 2 pages. The 44 page locks on `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    are the result of the key lookup operations that occurred for all the rows from
    `IX_SalesOrderDetail_ProductID`. Together, the row and page lock columns help
    describe the activity that occurred.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig23_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Execution plan for SELECT query


    While row locking and page locking are useful for identifying when contention
    exists, there is one piece about locking that it does not provide. There is no
    information collected in the DMO about the types of locks that are being placed.
    All the locks could be shared locks, or they could also be exclusive locks. The
    lock wait count provides scope around the frequency of incompatible locks on the
    tables and the duration of those locks, but the locks themselves are not identified.


    #### Lock Escalation


    The last piece with locking contention to pay attention to is the amount of lock
    escalation that is occurring in the database. When the number of locks acquired
    for a transaction exceeds the locking threshold on an SQL Server instance, the
    locks will escalate to the next higher level of locking. This escalation can happen
    at the page, partition, and table levels. There are a number of reasons for escalating
    locks on a database. One reason is that locks require memory, so the more locks
    there are, the more memory is required and the more resources are needed to manage
    locks. Another reason is that many individual low-level locks open the opportunity
    for blocking to escalate into deadlocking. For these reasons, it is important
    to pay attention to lock escalations.


    To help provide an understanding of lock escalation, let’s use a modification
    of the demo query that was used previously in this section. Instead of selecting
    44 rows, though, you’ll update all the rows where `ProductID` is less than or
    equal to 712 (see Listing [3-32](#338675_3_En_3_Chapter.xhtml#PC32)). The update
    will just change `ProductID` to its current value so as not to permanently change
    the data in AdventureWorks2017.


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    Listing 3-32

    T-SQL Script to Generate Lock Promotion

    ```


    Now with the example script execution, you’ll need to review the statistics in
    `sys.dm_db_index_operational_stats` to see whether there were any lock escalations
    by using the script in Listing [3-33](#338675_3_En_3_Chapter.xhtml#PC33). As the
    output from the script shows (Figure [3-24](#338675_3_En_3_Chapter.xhtml#Fig24)),
    the column `index_lock_promotion_attempt_count` recorded four events for `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    and `IX_SalesOrderDetail_ProductID`. This means that there were four opportunities
    for lock escalation that were triggered. Looking at the column `index_lock_promotion_count`,
    there was one lock escalation on `IX_SalesOrderDetail_ProductID`. Translating
    the results into less technical terms, for the two indexes there were four times
    when SQL Server considered whether a lock escalation was appropriate for the query.
    At the fourth check on `IX_SalesOrderDetail_ProductID`, SQL Server determined
    that a lock escalation was needed, and the lock was escalated.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig24_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Query results for lock escalation


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 3-33

    Query for Lock Escalation in sys.dm_db_index_operational_stats

    ```


    Monitoring lock escalation goes hand in hand with monitoring row and page locks.
    When row and page lock contention increases, either through increased frequency
    or through duration of lock waits, evaluating lock escalation can help identify
    the number of times SQL Server considers escalating locks and when those locks
    have been escalated. In some cases where tables are improperly indexed, locks
    can escalate more frequently and lead to increased blocking and potentially deadlocking.'
  trans: '### 页锁


    下一组列是页锁列。这一组中的列具有与行锁列相似的特性，不同之处在于它们的作用域是页级别而不是行级别。对于涉及被访问行的每个页，都会获取一个页锁。这些列是 `page_lock_count`、`page_lock_wait_count`
    和 `page_lock_wait_in_ms`。在监控索引上的锁争用时，同时查看页级别和行级别非常重要，以确定争用是发生在被访问的单个行上，还是可能发生在同一页面上被访问的不同行上。


    为了回顾差异，让我们继续使用清单 [3-29] 中的查询，但检索为该查询在 `sys.dm_db_index_operational_stats` 中收集的页锁统计信息。此信息可使用清单
    [3-31] 中的脚本获取。这次的结果与行锁的结果有些不同。对于页锁，请参见图 [3-22]；索引 `IX_SalesOrderDetail_ProductID`
    上只有两个页锁。此外，在 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上有 44 个页锁，而该索引没有遇到任何行锁。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig22_HTML.jpg](img/338675_3_En_3_Fig22_HTML.jpg)

    *图 3-22 页锁的查询结果*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.page_lock_count

    ,ios.page_lock_wait_count

    ,ios.page_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```

    *清单 3-31 查询 `sys.dm_db_index_operational_stats` 中的页锁*


    锁行为的统计信息最初可能没有意义，直到你考虑了查询（来自清单 [3-29]）执行时发生的活动。当查询执行时，它使用了索引查找和键查找（参见图 [3-23]
    中的执行计划）。在 `IX_SalesOrderDetail_ProductID` 上的索引查找解释了那 2 个页锁和 44 个行锁。有 44 行匹配查询的谓词，它们跨越了
    2 个页。在 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上的 44 个页锁是针对来自 `IX_SalesOrderDetail_ProductID`
    的所有行执行的键查找操作的结果。行锁列和页锁列共同帮助描述了所发生的活动。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig23_HTML.jpg](img/338675_3_En_3_Fig23_HTML.jpg)

    *图 3-23 `SELECT` 查询的执行计划*


    虽然行锁和页锁对于识别何时存在争用很有用，但关于锁有一个信息是它们无法提供的。DMO 中没有收集关于正在放置的锁类型的信息。所有锁可能是共享锁，也可能是排他锁。锁等待计数提供了关于表上不兼容锁的频率以及这些锁的持续时间的范围，但锁本身并未被识别。


    ### 锁升级


    关于锁争用，最后需要注意的一点是数据库中发生的锁升级数量。当为事务获取的锁数量超过 SQL Server 实例上的锁阈值时，锁将升级到更高级别。这种升级可能发生在页、分区和表级别。数据库中发生锁升级的原因有很多。一个原因是锁需要内存，因此锁越多，需要的内存就越多，管理锁所需的资源也就越多。另一个原因是，许多单独的低级别锁为阻塞升级为死锁提供了机会。由于这些原因，关注锁升级非常重要。


    为了帮助理解锁升级，让我们使用本节前面演示查询的修改版本。不过，这次不是选择 44 行，而是更新所有 `ProductID` 小于或等于 712 的行（见清单
    [3-32]）。更新操作只会将 `ProductID` 更改为当前值，以避免永久更改 AdventureWorks2017 中的数据。


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    ```

    *清单 3-32 生成锁提升的 T-SQL 脚本*


    现在，通过示例脚本的执行，你需要使用清单 [3-33] 中的脚本查看 `sys.dm_db_index_operational_stats` 中的统计信息，以确定是否发生了任何锁升级。如脚本输出所示（图
    [3-24]），列 `index_lock_promotion_attempt_count` 为 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    和 `IX_SalesOrderDetail_ProductID` 记录了四次事件。这意味着触发了四次锁升级的机会。查看 `index_lock_promotion_count`
    列，`IX_SalesOrderDetail_ProductID` 上发生了一次锁升级。用不太技术的术语解释结果，对于这两个索引，SQL Server 有四次考虑锁升级是否适用于该查询。在对
    `IX_SalesOrderDetail_ProductID` 进行第四次检查时，SQL Server 确定需要锁升级，于是锁被升级了。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig24_HTML.jpg](img/338675_3_En_3_Fig24_HTML.jpg)

    *图 3-24 锁升级的查询结果*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```

    *清单 3-33 查询 `sys.dm_db_index_operational_stats` 中的锁升级*


    监控锁升级与监控行锁和页锁密不可分。当行锁和页锁争用增加时，无论是通过锁等待频率增加还是持续时间延长，评估锁升级都可以帮助识别 SQL Server 考虑升级锁的次数以及这些锁何时被升级。在某些情况下，如果表索引不当，锁升级可能更频繁地发生，并导致阻塞增加，甚至可能引发死锁。'
- fmt: '### Latch Contention


    Locking isn’t the only type of contention that indexes can encounter. In addition
    to locking, there is latch contention. Latches are short, lightweight data synchronization
    objects. From a high level, latches provide controls on memory objects while activities
    are executing. One example of a latch is when data is transferred from disk to
    memory. If there are disk bottlenecks while this occurs, latch waits will accumulate
    while the disk transfer completes. The value in this information is that when
    latch waits are occurring, the columns (shown in Table [3-16](#338675_3_En_3_Chapter.xhtml#Tab16))
    provide a mechanism to track the waits down to specific indexes, thus allowing
    you to focus on where indexes are stored as part of index management.


    Table 3-16


    Latch Activity Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `page_latch_wait_count` | `bigint` | Cumulative number of times the database
    engine waited because of latch contention. |

    | `page_latch_wait_in_ms` | `bigint` | Cumulative number of milliseconds the database
    engine waited because of latch contention. |

    | `page_io_latch_wait_count` | `bigint` | Cumulative number of times the database
    engine waited on an I/O page latch. |

    | `page_io_latch_wait_in_ms` | `bigint` | Cumulative number of milliseconds the
    database engine waited on a page I/O latch. |

    | `tree_page_latch_wait_count` | `bigint` | Subset of `page_latch_wait_count`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_latch_wait_in_ms` | `bigint` | Subset of `page_latch_wait_in_ms`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_io_latch_wait_count` | `bigint` | Subset of `page_io_latch_wait_count`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_io_latch_wait_in_ms` | `bigint` | Subset of `page_io_latch_wait_in_ms`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |


    #### Page I/O Latch


    When it comes to page I/O latches, two sets of data are collected: page-level
    latching and tree page latching. Page-level latching occurs when data pages at
    the leaf levels of an index, the data pages, need to be retrieved (as opposed
    to tree page latching, which happens at all the other levels of the index). Both
    of these statistics are measures of the number of latches created while moving
    data into the buffer and any time related to delays. Whenever time is accumulated
    in `page_io_latch_wait_in_ms` or `tree_page_io_latch_wait_in_ms`, it correlates
    to increases in wait times for the `PAGEIOLATCH_* wait` types.


    To better understand how page I/O latches occur and the statistics you can collect,
    you’ll review an example that will cause these waits to occur. In this demonstration,
    you’ll return all the data from `Sales.SalesOrderDetail`, `Sales.SalesOrderHeader`,
    and `Production.Product` via the script in Listing [3-34](#338675_3_En_3_Chapter.xhtml#PC34).
    Before executing the script, the buffer cache will be purged to force SQL Server
    to have to retrieve the data for the pages from disk. Be sure to use this script
    only on a nonproduction server where clearing the buffer cache will not impact
    other processes.


    ```

    USE AdventureWorks2017

    GO

    DBCC DROPCLEANBUFFERS

    GO

    SELECT *

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID;

    Listing 3-34

    T-SQL Script to Generate Page I/O Latch

    ```


    When the query completes, a number of page I/O latches will have occurred while
    populating the pages for the tables and indexes into the buffer cache. To review
    the page I/O latches, query against `sys.dm_db_index_operational_stats` on the
    page I/O latch columns using the script in Listing [3-35](#338675_3_En_3_Chapter.xhtml#PC35).
    The results, shown in Figure [3-25](#338675_3_En_3_Chapter.xhtml#Fig25), indicate
    that there were page I/O latch waits on all three of the tables in the example
    query, including a whole 1 millisecond incurred on `Sales.SalesOrderHeader`. The
    results here are highly dependent on the underlying storage, so if your numbers
    are radically different, that’s a difference in hardware performance vs. an issue
    with the query. If they are excessively high, you may want to consider some analysis
    of the disk system.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig25_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Query results for page I/O latch


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_io_latch_wait_count

    ,page_io_latch_wait_in_ms

    ,CAST(1\. * page_io_latch_wait_in_ms

    / NULLIF(page_io_latch_wait_count ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''Sales.SalesOrderHeader'')

    OR i.object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    OR i.object_id = OBJECT_ID(''Production.Product'')

    ORDER BY 5 DESC;

    Listing 3-35

    Query for Page I/O Latch Statistics in sys.dm_db_index_operational_stats

    ```'
