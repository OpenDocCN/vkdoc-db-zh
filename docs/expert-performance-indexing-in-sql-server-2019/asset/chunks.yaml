    # 5. 空间索引


    接下来我们需要探讨的索引类型是空间索引，它与空间数据类型相关。SQL Server 2008 引入的空间数据类型提升了 SQL Server 的存储能力，允许存储定义形状和位置信息的数据。在这些增强功能出现之前，空间数据通常作为字符串或数值存储，在数据库中没有实际意义，并且需要进行繁琐的转换和计算才能将信息解析为有用的内容。


    作为空间数据支持的一部分，SQL Server 引入了`GEOMETRY`和`GEOGRAPHY`数据类型。这些类型分别支持平面数据和大地测量数据。平面数据由二维平面上的线、点和多边形组成，而大地测量数据由相同的元素组成，但在大地测量椭球体上——这是描述地球地图的一个专业术语。简单来说，你可以这样理解这两种数据类型：`GEOMETRY`是所描述形状的平面表示，而`GEOGRAPHY`则包含一个圆形的全球表示。


    空间数据索引在创建和解释方式上是独特的。每个索引由一组网格组成。这些网格由一组单元格构成，布局有点像方形的电子表格。网格最大可以是 16 × 16，最小可以是
    4 × 4。网格内的单元格包含定义所存储空间数据对象的值。`GEOGRAPHY`和`GEOMETRY`数据类型在这种索引方式中存在明显的区别。`GEOMETRY`数据类型需要一个边界框，这是对索引定义区域大小的限制。`GEOGRAPHY`数据类型没有边界框，因为它基本上是以地球的大小为界的。


    本章将探讨空间索引、其行为及其在查询中的使用，以帮助提升你的空间数据的性能。


    ## 空间数据如何被索引


    构成空间索引的网格实际上是相互嵌套的。在顶层，即第 1 层，你可以拥有例如一个 4 × 4 的网格。该第 1 层网格中的每个单元格又包含另一个网格，由为该层定义的单元格数量组成，在本例中是
    4 × 4。这第二个网格定义了第 2 层。第 2 层中的每个单元格都有一个定义第 3 层的网格，而那里的单元格包含另一个网格，即第 4 层。图 5-1 展示了`GEOMETRY`索引如何由这四个层级组成。索引随后由这四个网格组成，每个网格都由一系列单元格构成。这种分层和网格层次结构称为`分解`，在索引创建时生成。


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig1_HTML.jpg](img/338675_3_En_5_Fig1_HTML.jpg)


    图 5-1

    GEOMETRY 索引存储和单元格的网格存储表示


    如图 5-1 所示，最多可能有 40 亿个单元格。这在创建索引并确定创建时使用的密度非常重要。每一层或级别都可以有指定的密度。有三种密度级别（低=4 × 4，中=8
    × 8，高=16 × 16）。如果在创建索引时省略密度，默认为中等。调整密度最常用于优化索引的实际空间。并非所有层都需要高密度。通过不使用超过你需要的密度来节省空间。


    所有这些之所以必要，是因为这些网格内信息的实际存储使用的是与存储标准索引相同的 B 树。但存储中的定义，以及显然对这些定义的检索，在空间索引中与标准索引中完全不同。为了将信息放入
    B 树，需要在网格之上进行额外的处理。


    SQL Server 执行的索引过程的下一步是镶嵌。`镶嵌`是将对象放置或适配到从第 1 层开始的网格层次结构中的过程。根据涉及的对象，此过程可能只需要网格的第一层，但也可能需要所有四层。镶嵌本质上是获取空间列中的所有数据，并将其放置到网格的单元格中，同时保留所接触的每个单元格。然后，当评估请求时，索引确切地知道如何返回查找每个网格中的单元格，使用
    B 树。


    到目前为止，我已经介绍了网格中的单元格如何填充以及整个镶嵌过程是如何实现的。然而，仅拥有网格存储中的单元格和镶嵌过程在理论上并不理想，因为基于需要保留的极端数量的接触单元格，存在单元格被误用或未被高效使用的可能。对于`GEOMETRY`数据类型及其上创建的索引，需要边界框，因为
    SQL Server 需要一个有限的空间。创建这样的框是通过使用坐标`xmin`、`xmax`和`ymin`、`ymax`来完成的。结果可以可视化为一个正方形，其左下角的
    x 坐标和 y 坐标以及右上角的 x 坐标和 y 坐标确定。在确定`GEOMETRY`数据类型索引的边界框时，最关键的是确保所有对象都在边界框内，同时不要使边界框过大，导致大量空单元格，这是一个需要平衡的操作。索引仅对边界框内的对象或形状有效。如果边界框内不包含对象，可能会严重影响性能并导致空间查询性能不佳。


    此外，为了在镶嵌过程中保持高效使用索引的能力，应用了一些规则。这些规则如下：

    '
- fmt: '# Creating Spatial Indexes


    ### Covering rule

    The covering rule is the most basic rule applied in tessellation. Not to be confused
    with the common term `covering index`, this rule states that any cell that is
    completely covered is not recorded individually for that object. Covered cells
    are counted for the object. Not storing covered cells saves processing and data
    storage time and space.


    ### Cells-per-object rule

    The cells-per-object rule is a more in-depth rule that applies a limit to the
    number of cells that can be counted for a specific object. In Figure [5-2](#338675_3_En_5_Chapter.xhtml#Fig2),
    the circle shown covers 2 cells in level 1 and 14 in level 2. The circle is tessellated
    to the second layer because of a cells-per-object default of 16. If the circle
    did cover more than 16 cells at level 2, tessellation would not continue through
    to level 2. Since the object would cover a lot more than 16 cells at level 3,
    tessellation stops here. Tuning the cells per object can enhance the accuracy
    of an index. Tuning this value based on the data stored can be very effective.
    Given the importance of the cells-per-object rule, the setting is exposed in a
    dynamic management view, `sys.spatial_index_tessellations`. You will review this
    setting later in this chapter.


    ![`../images/338675_3_En_5_Chapter/338675_3_En_5_Fig2_HTML.jpg`](images/338675_3_En_5_Chapter/338675_3_En_5_Fig2_HTML.jpg)


    Figure 5-2: Visual representation of an object and how many cells the object covers
    within the grid layers


    ### Deepest cell rule

    The last rule of the tessellation process is the deepest cell rule. As discussed,
    each layer of grids and the cells within them are referenced in each deeper layer.
    So in Figure [5-2](#338675_3_En_5_Chapter.xhtml#Fig2), cells defined in level
    2 are the only ones needed to completely refer to any other levels, in this case
    level 1, effectively. This rule cannot be broken and is built into the optimizer’s
    processing of retrieving the data from the index.


    With the `GEOGRAPHY` type, there is the added challenge of projecting the form
    in a flattened representation through the tessellation process. This process first
    divides the `GEOGRAPHY` grid into two hemispheres. Each hemisphere is projected
    onto the facets of a quadrilateral pyramid and flattened, and then the two are
    joined into a non-Euclidean plane. Once this process is complete, the plane is
    decomposed into the aforementioned grid hierarchy.


    The `Create Spatial Index` statement has most of the same options of a normal
    clustered or nonclustered index. However, there are specific options that are
    also required for this index type, as listed in Table [5-1](#338675_3_En_5_Chapter.xhtml#Tab1).


    Table 5-1: Spatial Index Options


    | Option Name | Description |

    | --- | --- |

    | `USING` | The `USING` clause specifies the spatial data type. This will be `GEOMETRY_GRID`
    or `GEOGRAPHY_GRID` and cannot be `NULL`. |

    | `WITH GEOMETRY_GRID,` `GEOGRAPHY_GRID` | The `WITH` options include the setting
    of the tessellation schema for either the `GEOMETRY_GRID` or the `GEOGRAPHY_GRID`
    based on the column data type. |

    | `BOUNDING_BOX` | The `BOUNDING_BOX` is used in the `GEOMETRY` data type to define
    the bounding box of the cells. This option does not have defaults and must be
    specified when creating indexes on the `GEOMETRY` data type. The `CREATE SPATIAL
    INDEX IDX_CITY_GEOM` (in Listing [5-1](#338675_3_En_5_Chapter.xhtml#PC1)) shows
    the syntax for this option. Setting the `BOUNDING_BOX` is done by setting the
    `xmin` and `ymin` and `xmax` and `ymax` coordinates, like so: `BOUNDING_BOX =
    (XMIN = xmin, YMIN = ymin, XMAX = xmax, YMAX = ymax)`. |

    | `GRIDS` | The `GRIDS` option is used for altering the density of each grid layer.
    All layer defaults are medium density but can be altered to low or high to further
    tune spatial indexes and density settings. |


    Take the `CREATE TABLE` statement in Listing [5-1](#338675_3_En_5_Chapter.xhtml#PC1)
    as an example.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE CITY_MAPS (

    ID BIGINT PRIMARY KEY

    IDENTITY(1, 1),

    CITYNAME NVARCHAR(150),

    CITY_GEOM GEOMETRY

    );

    GO

    ```


    Listing 5-1: `CREATE TABLE` with a `GEOMETRY` Data Type


    This table will consist of the primary key, the city name, and then a `GEOMETRY`
    column that holds map data for the city itself. The city’s density may affect
    tuning the cells-per-object rule in tessellation as well as the density of each
    layer in the grid hierarchy.


    To index the `CITY_GEOM` column, the `CREATE` statement in Listing [5-2](#338675_3_En_5_Chapter.xhtml#PC2)
    would be used with a grid layer density of `LOW` for the first two layers and
    then `MEDIUM` and `HIGH` for the third and fourth layers. This density change
    allows for tuning the object in the index and the covering cells as the layers
    go deeper in the grid. The cells-per-object setting is 24 maximum cells an object
    can cover. The bounding box coordinates are also set.


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_CITY_GEOM

    ON CITY_MAPS (CITY_GEOM)

    USING GEOMETRY_GRID

    WITH (

    BOUNDING_BOX = ( xmin=-50, ymin=-50, xmax=500, ymax=500 ),

    GRIDS = (LOW, LOW, MEDIUM, HIGH),

    CELLS_PER_OBJECT = 24,

    PAD_INDEX  = ON );

    ```


    Listing 5-2: Definition of a Spatial Index on a `GEOMETRY` Column


    To utilize and test the index created, you will need to review the estimated and
    actual execution plans to determine whether the index has been used. In the case
    of spatial data, reviewing the actual results that a query will yield is also
    beneficial. SQL Server Management Studio has a built-in spatial data viewer that
    can be used for reviewing spatial data.


    Listing [5-3](#338675_3_En_5_Chapter.xhtml#PC3) creates a table that can benefit
    from spatial indexing. The table is created to store ZIP codes and other data
    from the US Census Bureau. This table will be created in the `AdventureWorks2014`
    database.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.tl_2017_us_county (

    STATEFP CHAR(2) NULL,

    COUNTYFP CHAR(3) NULL,

    COUNTYNS CHAR(8) NULL,

    GEOID CHAR(5) NULL,

    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    ```


    Listing 5-3: Creating a Table to Hold `GEOMETRY`-Related Data


    The `GEOM` column will store the `GEOMETRY` data. This column will be used to
    query the data from SQL Server Management Studio to show the imaging that can
    be done from other applications.'
