  trans: '

    第二种方法是启动一个扩展事件（Extended Events）会话，捕获事务信息，然后在可用调用堆栈上对该信息进行分组。如代码清单 14-29 所定义的会话，它会在并行等待发生时检索所有此类事件，并按其
    T-SQL 堆栈进行分组。运行脚本前，请确保 `CXPACKET` 等待类型的值与查询中的值相匹配；对于 SQL Server 2019，该值为 `265`。T-SQL
    堆栈包含了所有促成最终执行点的 SQL 语句。例如，深入分析一个执行堆栈可以提供关于一个正在执行函数（该函数又执行单个 T-SQL 语句）的存储过程的信息。这提供了可用于追踪并行等待发生位置的信息。这些语句使用
    `histogram`（直方图）目标进行分组，这使我们能够最小化收集的数据量，并专注于导致系统上最多 `CXPACKET` 等待的项目。


    ```sql

    USE master;

    GO

    SELECT name,

    map_key,

    map_value

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types''

    AND map_value = ''CXPACKET'';

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''ex_cxpacket''

    )

    DROP EVENT SESSION ex_cxpacket ON SERVER;

    GO

    CREATE EVENT SESSION [ex_cxpacket]

    ON SERVER

    ADD EVENT sqlos.wait_info

    (ACTION (

    sqlserver.plan_handle,

    sqlserver.tsql_stack)

    WHERE ([wait_type] = (265)

    AND [sqlserver].[is_system] = (0)))

    ADD TARGET package0.histogram

    (SET filtering_event_name = N''sqlos.wait_info'', slots = (2048), source = N''sqlserver.tsql_stack'',
    source_type = (1))

    WITH (STARTUP_STATE = ON);

    GO

    ALTER EVENT SESSION ex_cxpacket ON SERVER STATE = START;

    GO

    ```


    代码清单 14-29 用于捕获 CXPACKET 的扩展事件会话


    一旦扩展事件会话收集了一段时间的数据，就可以更仔细地查看等待最多的会话。代码清单 14-30 提供了所有已收集的 `CXPACKET` 等待的列表，以及与之关联的语句和查询计划。一旦我们知道了这些信息，就可以调查正在使用的索引，以确定哪些索引导致了低选择性或意外的扫描。


    ```sql

    WITH XData

    AS (SELECT CAST(target_data AS XML) AS TargetData

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''ex_cxpacket''

    AND target_name = ''histogram''),

    ParsedEvent

    AS (SELECT c.value(''(@count)[1]'', ''bigint'') AS event_count,

    c.value(''xs:hexBinary(substring((value/frames/frame/@handle)[1],3))'', ''varbinary(255)'')
    AS sql_handle,

    c.value(''(value/frames/frame/@offsetStart)[1]'', ''int'') AS statement_start_offset,

    c.value(''(value/frames/frame/@offsetEnd)[1]'', ''int'') AS statement_end_offset

    FROM XData d

    CROSS APPLY TargetData.nodes(''//Slot'') t(c) )

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.event_count,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (IIF(e.statement_end_offset = -1, LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2, e.statement_end_offset)

    - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM ParsedEvent e

    CROSS APPLY sys.dm_exec_sql_text(e.sql_handle) st

    CROSS APPLY (

    SELECT plan_handle

    FROM sys.dm_exec_query_stats qs

    WHERE e.sql_handle = qs.sql_handle

    GROUP BY plan_handle

    ) x

    CROSS APPLY sys.dm_exec_query_plan(x.plan_handle) qp

    ORDER BY e.event_count DESC;

    ```


    代码清单 14-30 用于查看 CXPACKET 扩展事件会话数据的查询


    #### IO_COMPLETION


    当 SQL Server 正在等待非数据页 I/O（例如索引页）的 I/O 操作完成时，会发生 `IO_COMPLETION` 等待类型。尽管此等待与非数据操作相关，但当此等待在
    SQL Server 实例中较高时，仍可采取一些与索引相关的操作。


    首先，检查服务器上 `Full Scans/sec`（全表扫描/秒）的状态。如果该性能计数器存在问题，其下的操作可能会渗透到用于管理索引的非数据页上。当这两者都较高时，应额外重点分析
    `Full Scans/sec` 问题。


    我们可以采取的第二个操作是检查 SQL Server 实例内的缺失索引信息。该信息在第 7 章中讨论。添加缺失索引可以将数据消耗的压力转移到新的结构上，在那里查询可能不再需要等待非数据
    I/O 完成，因为查询现在利用了不同的索引。


    接下来，考虑索引上发生的页面拆分量；页面拆分在重新分配页面到新页面时会影响非数据页。大量的页面拆分活动将导致高非数据页 I/O，这可能是这些等待的来源或与之相关。


    最后，如果 `IO_COMPLETION` 问题的原因不明显，请使用扩展事件会话进行调查。此类分析超出了本书的范围，因为这些原因很可能与索引无关。调查 `CXPACKET`
    的方法可以适用，并将作为调查的起点。

    '
- fmt: '# SQL Server 中与索引相关的等待类型


    ## LCK_M_∗


    `LCK_M_∗` 系列等待类型指的是在 SQL Server 实例上发生的等待。这些不仅是锁的使用，还包括锁产生等待的时间。`LCK_M_∗` 中的每个等待类型都对应一种特定的锁类型，例如排他锁或共享锁。要解读不同的等待类型，请使用表
    **14-2**。当 `LCK_M_∗` 等待类型增加时，它们总是伴随着“锁等待时间（毫秒）”和“每秒锁等待次数”的增加，因此可以利用这些计数器来帮助调查此类等待。


    在调查性能计数器或不同锁类型的增加时，请参考表 **14-2**。结合等待类型和性能计数器来精确定位具体问题。例如，当性能计数器指向“锁等待时间（毫秒）”问题时，寻找
    `LCK_M_∗` 上长时间运行的等待。使用 SQL Server Management Studio 中的向导创建“计数查询锁”会话，并通过 `query_hash`
    确定是哪个锁和哪些查询导致了问题。同样地，如果问题是“每秒锁等待次数”，则寻找那些锁次数最多的操作。


    表 14-2


    LCK_M_∗ 等待类型


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `LCK_M_BU` | 批量更新。 |

    | `LCK_M_IS` | 意向共享。 |

    | `LCK_M_IU` | 意向更新。 |

    | `LCK_M_IX` | 意向排他。 |

    | `LCK_M_RIn_NL` | 在当前和上一个键之间插入范围锁，当前键值上使用 `NULL` 锁。 |

    | `LCK_M_RIn_S` | 在当前和上一个键之间插入范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RIn_U` | 在当前和上一个键之间插入范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RIn_X` | 在当前和上一个键之间插入范围锁，当前键值上使用排他锁。 |

    | `LCK_M_RS_S` | 在当前和上一个键之间共享范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RS_U` | 在当前和上一个键之间共享范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RX_S` | 在当前和上一个键之间排他范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RX_U` | 在当前和上一个键之间排他范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RX_X` | 在当前和上一个键之间排他范围锁，当前键值上使用排他锁。 |

    | `LCK_M_S` | 共享。 |

    | `LCK_M_SCH_M` | 架构修改。 |

    | `LCK_M_SCH_S` | 架构共享。 |

    | `LCK_M_SIU` | 共享带意向更新。 |

    | `LCK_M_SIX` | 共享带意向排他。 |

    | `LCK_M_U` | 更新。 |

    | `LCK_M_UIX` | 更新带意向排他。 |

    | `LCK_M_X` | 排他。 |


    表 **14-2** 中的所有锁都可以带有 `_ABORT_BLOCKERS` 和 `_LOW_PRIORITY` 后缀，这些后缀与联机索引和分区切换操作中添加的低优先级选项有关。此功能自
    SQL Server 2014 起可用。如果你看到带有这些后缀的锁，请检查正在发生的索引维护操作。当等待时间过长时，可能需要调整维护计划。


    ## PAGEIOLATCH_∗


    最后一个与索引相关的等待是 `PAGEIOLATCH_∗` 等待类型。此等待指的是当 SQL Server 从索引中检索数据页并将其放入内存时发生的等待。SQL
    Server 使用这些计数器来跟踪查询准备好检索数据页到数据页在内存中可用之间的时间。与 `LCK_M_∗` 等待一样，有许多不同的 `PAGEIOLATCH_∗`
    类型，定义见表 **14-3**。


    首先，监控当前位于缓冲区高速缓存中的索引，以识别哪些索引可用。此外，检查“页寿命/秒（PLE）”计数器，该计数器当前未在监控部分收集。在 PLE 变化前后，审查缓冲区中分配给索引的页，有助于识别哪些索引正在将信息推出内存。然后调查查询计划并调整查询或索引，以减少满足查询所需的数据量。


    表 14-3


    PAGEIOLATCH_∗ 等待类型


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `PAGEIOLATCH_DT` | IO 闩锁（销毁模式）。 |

    | `PAGEIOLATCH_EX` | IO 闩锁（排他模式）。 |

    | `PAGEIOLATCH_KP` | IO 闩锁（保持模式）。 |

    | `PAGEIOLATCH_SH` | IO 闩锁（共享模式）。 |

    | `PAGEIOLATCH_UP` | IO 闩锁（更新模式）。 |


    解决 `PAGEIOLATCH_∗` 问题的第二个策略是更加重视“全表扫描/秒”分析。通常，导致此等待类型增加的索引与数据库中正在使用的全表扫描有关。通过在执行计划中更加注重减少对全表扫描的需求，需要拉入内存的数据量就会减少，从而导致此等待类型下降。


    在某些情况下，与 `PAGEIOLATCH_∗` 相关的问题与索引无关。问题可能仅仅是磁盘性能缓慢。要验证是否是这种情况，请监控服务器计数器“物理磁盘：磁盘读取秒数”和“物理磁盘：磁盘写入秒数”，以及
    SQL Server 的虚拟文件统计信息。如果这些统计信息持续偏高，则需将调查范围扩展到索引之外，转向硬件和 I/O 存储层。除了改进磁盘性能外，还可以通过增加可用内存来减少此等待统计信息，这可以降低数据页被推出内存的可能性。'
  raw: '#### LCK_M_∗


    The LCK_M_∗ collection of wait types refers to waits that are occurring on the
    SQL Server instance. These are not just the use of locks but also the times when
    locks have waits associated with them. Each wait type in LCK_M_∗ references a
    distinct type of lock, such as exclusive or shared locks. To decipher the different
    wait types, use Table [14-2](#338675_3_En_14_Chapter.xhtml#Tab2). When the LCK_M_∗
    wait types increase, they will always be in conjunction with increases in Lock
    Wait Time(ms) and Lock Waits/sec, allowing these counters to help investigate
    this wait type.


    When investigating increases in either the performance counters or the different
    lock types, see Table [14-2](#338675_3_En_14_Chapter.xhtml#Tab2). Use the combination
    of the wait types and the performance counters to hone in on specific issues.
    For instance, when the performance counters are pointing to Lock Wait Time(ms)
    issues, look for long-running waits on LCK_M_∗. Use the wizard in SQL Server Management
    Studio to create the Count Query Lock session and determine which lock and which
    queries, through the `query_hash`, are causing the issue. Similarly, if the issue
    is with Lock Waits/sec, look for those with the most numerous locks.


    Table 14-2


    LCK_M_∗ Wait Types


    | Wait Type | Lock Type |

    | --- | --- |

    | LCK_M_BU | Bulk Update. |

    | LCK_M_IS | Intent Shared. |

    | LCK_M_IU | Intent Update. |

    | LCK_M_IX | Intent Exclusive. |

    | LCK_M_RIn_NL | Insert Range lock between the current and previous key with `NULL`
    lock on the current key value. |

    | LCK_M_RIn_S | Insert Range lock between the current and previous key with Shared
    lock on the current key value. |

    | LCK_M_RIn_U | Insert Range lock between the current and previous key with Update
    lock on the current key value. |

    | LCK_M_RIn_X | Insert Range lock between the current and previous key with Exclusive
    lock on the current key value. |

    | LCK_M_RS_S | Shared Range lock between the current and previous key with Shared
    lock on the current key value. |

    | LCK_M_RS_U | Shared Range lock between the current and previous key with Update
    lock on the current key value. |

    | LCK_M_RX_S | Exclusive Range lock between the current and previous key with
    Shared lock on the current key value. |

    | LCK_M_RX_U | Exclusive Range lock between the current and previous key with
    Update lock on the current key value. |

    | LCK_M_RX_X | Exclusive Range lock between the current and previous key with
    Exclusive lock on the current key value. |

    | LCK_M_S | Shared. |

    | LCK_M_SCH_M | Schema Modify. |

    | LCK_M_SCH_S | Schema Share. |

    | LCK_M_SIU | Shared with Intent Update. |

    | LCK_M_SIX | Shared with Intent Exclusive. |

    | LCK_M_U | Update. |

    | LCK_M_UIX | Update with Intent Exclusive. |

    | LCK_M_X | Exclusive. |


    All of the locks in Table [14-2](#338675_3_En_14_Chapter.xhtml#Tab2) can appear
    with the suffixes _ABORT_BLOCKERS and _LOW_PRIORITY which are related to the low
    priority options added to online index and partition switching operations. This
    capability has been available since SQL Server 2014\. If you see locks with these
    suffixes, review the index maintenance operations that are occurring. When the
    waits are excessive, the schedule of the maintenance will likely need to be adjusted.


    #### PAGEIOLATCH_∗


    The final index-related wait is PAGEIOLATCH_∗ wait types. This wait refers to
    the waits that occur when SQL Server is retrieving data pages from indexes and
    placing them into memory. The time in which the query is ready to retrieve the
    data pages and when they are available in memory is tracked by SQL Server with
    these counters. As with LCK_M_∗ waits, there are a number of different PAGEIOLATCH_∗,
    which are defined in Table [14-3](#338675_3_En_14_Chapter.xhtml#Tab3).


    First, monitor the indexes that are currently in the buffer cache to identify
    which indexes are available. Also, review the Page Life Expectancy/sec (PLE) counter,
    which is not currently collected in the monitoring section. Reviewing the allocation
    of pages to indexes in the buffer before and after changes in the PLE can help
    identify which indexes are pushing information out of memory. Then investigate
    query plans and tune the queries or indexes to reduce the amount of data needed
    to satisfy the queries.


    Table 14-3


    PAGEIOLATCH_∗ Wait Types


    | Wait Type | Lock Type |

    | --- | --- |

    | PAGEIOLATCH_DT | IO Latch in Destroy mode. |

    | PAGEIOLATCH_EX | IO Latch in Exclusive mode. |

    | PAGEIOLATCH_KP | IO Latch in Keep mode. |

    | PAGEIOLATCH_SH | IO Latch in Shared mode. |

    | PAGEIOLATCH_UP | IO Latch in Update mode. |


    The second tactic to addressing PAGEIOLATCH_∗ is to put more emphasis on the Full
    Scans/sec analysis. Often, indexes that lead to increases in this wait type are
    related to full scans that are in use by the database. By placing more emphasis
    on reducing the need for full scans in execution plans, less data will need to
    be pulled into memory, leading to a decrease in this wait type.


    In some cases, the issues related to PAGEIOLATCH_∗ are unrelated to indexing.
    The issue can simply be a matter of slow disk performance. To verify whether this
    is the case, monitor the performance of the server counters for Physical disk:
    disk seconds/read and Physical disk: disk seconds/write and the virtual file stats
    for SQL Server. If these statistics are continually high, expand the investigation
    outside of indexing to hardware and the I/O storage level. Besides improving disk
    performance, this wait statistic can be reduced by increasing the available memory,
    which can decrease the likelihood that the data page will be pushed out of memory.'
  trans: '# SQL Server 中与索引相关的等待类型


    ## LCK_M_∗


    `LCK_M_∗` 系列等待类型指的是在 SQL Server 实例上发生的等待。这些不仅是锁的使用，还包括锁产生等待的时间。`LCK_M_∗` 中的每个等待类型都对应一种特定的锁类型，例如排他锁或共享锁。要解读不同的等待类型，请使用表
    **14-2**。当 `LCK_M_∗` 等待类型增加时，它们总是伴随着“锁等待时间（毫秒）”和“每秒锁等待次数”的增加，因此可以利用这些计数器来帮助调查此类等待。


    在调查性能计数器或不同锁类型的增加时，请参考表 **14-2**。结合等待类型和性能计数器来精确定位具体问题。例如，当性能计数器指向“锁等待时间（毫秒）”问题时，寻找
    `LCK_M_∗` 上长时间运行的等待。使用 SQL Server Management Studio 中的向导创建“计数查询锁”会话，并通过 `query_hash`
    确定是哪个锁和哪些查询导致了问题。同样地，如果问题是“每秒锁等待次数”，则寻找那些锁次数最多的操作。


    表 14-2


    LCK_M_∗ 等待类型


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `LCK_M_BU` | 批量更新。 |

    | `LCK_M_IS` | 意向共享。 |

    | `LCK_M_IU` | 意向更新。 |

    | `LCK_M_IX` | 意向排他。 |

    | `LCK_M_RIn_NL` | 在当前和上一个键之间插入范围锁，当前键值上使用 `NULL` 锁。 |

    | `LCK_M_RIn_S` | 在当前和上一个键之间插入范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RIn_U` | 在当前和上一个键之间插入范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RIn_X` | 在当前和上一个键之间插入范围锁，当前键值上使用排他锁。 |

    | `LCK_M_RS_S` | 在当前和上一个键之间共享范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RS_U` | 在当前和上一个键之间共享范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RX_S` | 在当前和上一个键之间排他范围锁，当前键值上使用共享锁。 |

    | `LCK_M_RX_U` | 在当前和上一个键之间排他范围锁，当前键值上使用更新锁。 |

    | `LCK_M_RX_X` | 在当前和上一个键之间排他范围锁，当前键值上使用排他锁。 |

    | `LCK_M_S` | 共享。 |

    | `LCK_M_SCH_M` | 架构修改。 |

    | `LCK_M_SCH_S` | 架构共享。 |

    | `LCK_M_SIU` | 共享带意向更新。 |

    | `LCK_M_SIX` | 共享带意向排他。 |

    | `LCK_M_U` | 更新。 |

    | `LCK_M_UIX` | 更新带意向排他。 |

    | `LCK_M_X` | 排他。 |


    表 **14-2** 中的所有锁都可以带有 `_ABORT_BLOCKERS` 和 `_LOW_PRIORITY` 后缀，这些后缀与联机索引和分区切换操作中添加的低优先级选项有关。此功能自
    SQL Server 2014 起可用。如果你看到带有这些后缀的锁，请检查正在发生的索引维护操作。当等待时间过长时，可能需要调整维护计划。


    ## PAGEIOLATCH_∗


    最后一个与索引相关的等待是 `PAGEIOLATCH_∗` 等待类型。此等待指的是当 SQL Server 从索引中检索数据页并将其放入内存时发生的等待。SQL
    Server 使用这些计数器来跟踪查询准备好检索数据页到数据页在内存中可用之间的时间。与 `LCK_M_∗` 等待一样，有许多不同的 `PAGEIOLATCH_∗`
    类型，定义见表 **14-3**。


    首先，监控当前位于缓冲区高速缓存中的索引，以识别哪些索引可用。此外，检查“页寿命/秒（PLE）”计数器，该计数器当前未在监控部分收集。在 PLE 变化前后，审查缓冲区中分配给索引的页，有助于识别哪些索引正在将信息推出内存。然后调查查询计划并调整查询或索引，以减少满足查询所需的数据量。


    表 14-3


    PAGEIOLATCH_∗ 等待类型


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `PAGEIOLATCH_DT` | IO 闩锁（销毁模式）。 |

    | `PAGEIOLATCH_EX` | IO 闩锁（排他模式）。 |

    | `PAGEIOLATCH_KP` | IO 闩锁（保持模式）。 |

    | `PAGEIOLATCH_SH` | IO 闩锁（共享模式）。 |

    | `PAGEIOLATCH_UP` | IO 闩锁（更新模式）。 |


    解决 `PAGEIOLATCH_∗` 问题的第二个策略是更加重视“全表扫描/秒”分析。通常，导致此等待类型增加的索引与数据库中正在使用的全表扫描有关。通过在执行计划中更加注重减少对全表扫描的需求，需要拉入内存的数据量就会减少，从而导致此等待类型下降。


    在某些情况下，与 `PAGEIOLATCH_∗` 相关的问题与索引无关。问题可能仅仅是磁盘性能缓慢。要验证是否是这种情况，请监控服务器计数器“物理磁盘：磁盘读取秒数”和“物理磁盘：磁盘写入秒数”，以及
    SQL Server 的虚拟文件统计信息。如果这些统计信息持续偏高，则需将调查范围扩展到索引之外，转向硬件和 I/O 存储层。除了改进磁盘性能外，还可以通过增加可用内存来减少此等待统计信息，这可以降低数据页被推出内存的可能性。'
- fmt: '### Buffer Allocation


    The final area to look at when determining the server state with indexing is to
    look at the data pages that are in the buffer cache. This isn’t a typical area
    that people usually look at when considering indexing, but it provides a wealth
    of information regarding what SQL Server is putting into memory. The basic question
    that this can answer for the SQL Server instance is, does the data in the buffer
    represent the data most important to the applications using the SQL Server?


    The first part of answering this question is to review which databases have how
    many pages in memory. This might not seem that important, but the amount of memory
    being used by the different databases can sometimes be surprising. Before indexes
    were added to the backup tables in the `MSDB` database, it wouldn’t be uncommon
    for those tables to push all the data in the backup tables into memory. If the
    data in the tables wasn’t trimmed often, this could be a lot of information not
    critical to the business applications consuming an unnecessary amount of data.


    For the second part of the question, we will need to engage the owners and subject-matter
    experts for the applications using the SQL Server instance. If the answers from
    these folks don’t match the information that is in the buffer, this provides a
    list of databases for which we can focus the index tuning effort.


    Along those same lines, many applications have logging databases where error and
    processing events are stored for troubleshooting at a later date. When issues
    arise, instead of going to log files, the developers can simply query the database
    and extract the events they need to perform their troubleshooting. But what if
    these tables aren’t properly indexed or the queries aren’t SARGable? Log tables
    with millions or billions of rows may be pushed into memory, pushing the data
    from the line-of-business applications out of memory and potentially causing worse
    issues. If the data in the buffer isn’t being checked, there is no way to know
    what is in memory and if it is the right stuff.


    Checking the data in memory is a relatively simple task that utilizes the DMO
    `sys.dm_os_buffer_descriptors`. This DMO lists each data page that is in memory
    and describes the information on the page. By counting each page for each database,
    the total number of pages and the size of memory allocated to the database can
    be determined. Using the query in Listing [14-31](#338675_3_En_14_Chapter.xhtml#PC31),
    we can see in Figure [14-12](#338675_3_En_14_Chapter.xhtml#Fig12) that the `ContsoRetailDW`
    database occupies the most memory on the server with the `IndexingMethod` database
    currently using 8.84 MB of space.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig12_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig12_HTML.jpg)


    Figure 14-12: Results for buffer allocation for each database query


    ```

    SELECT LEFT(CASE database_id

    WHEN 32767 THEN ''ResourceDb''

    ELSE DB_NAME(database_id) END, 20) AS Database_Name,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_Pool_MB

    FROM sys.dm_os_buffer_descriptors

    GROUP BY DB_NAME(database_id),

    database_id

    ORDER BY Buffered_Page_Count DESC;

    ```


    Listing 14-31: Buffer Allocation for Each Database


    Once the databases in memory have been identified, it is also useful to determine
    what objects in the database are in memory. For the similar reason as looking
    to see what databases are in memory, identifying the objects in memory helps with
    identifying the tables and indexes to focus on when indexing. Retrieving the memory
    use per table and index also utilizes `sys.dm_os_buffer_descriptors` but includes
    mapping the rows to `allocation_unit_id` values in the catalog views `sys.allocation_units`
    and `sys.partitions`.


    Through the query in Listing [14-32](#338675_3_En_14_Chapter.xhtml#PC32), the
    memory used by each of the user tables and indexes is returned. In the results
    in Figure [14-13](#338675_3_En_14_Chapter.xhtml#Fig13), the tables FactSales and
    FactOnlineSales are taking up a substantial amount of memory. If this was unexpected
    and it wasn’t obvious these were fact tables, we would definitely want to understand
    more about why they were taking up so much memory. This can lead us to other questions,
    such as: What is this data? Why is it so large? Is the space used by the table
    impacting the ability of other databases to use memory optimally with their indexes?
    In these cases, we need to investigate the indexes on these tables because the
    tables that are most in memory ought to have the best-honed indexing profiles.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig13_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig13_HTML.jpg)


    Figure 14-13: Results for buffer allocation for each table/index query


    ```

    WITH BufferAllocation

    AS (SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND (au.type = 1 OR au.type = 3)

    UNION ALL

    SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND au.type = 2)

    SELECT t.name,

    we.name,

    we.type_desc,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_MB

    FROM sys.tables t

    INNER JOIN BufferAllocation ba ON t.object_id = ba.object_id

    LEFT JOIN sys.indexes we ON ba.object_id = we.object_id

    AND ba.index_id = we.index_id

    INNER JOIN sys.dm_os_buffer_descriptors bd ON ba.allocation_unit_id = bd.allocation_unit_id

    WHERE bd.database_id = DB_ID()

    GROUP BY t.name,

    we.index_id,

    we.name,

    we.type_desc

    ORDER BY Buffered_Page_Count DESC;

    ```


    Listing 14-32: Buffer Allocation by Table/Index


    ## Schema Discovery


    After investigating the state of the server and its indexing needs, the next step
    in the index analysis process is to investigate the schema of the databases to
    determine whether there are schema-related indexing issues that can be addressed.
    For these issues, we are primarily going to focus on a few key details that can
    be discovered through catalog views.'
