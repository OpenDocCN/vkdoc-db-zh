  trans: '### 缓冲区分配


    在通过索引确定服务器状态时，最后一个需要审视的方面是查看位于缓冲区缓存中的数据页。这并非人们在考虑索引时通常会查看的典型区域，但它提供了关于 SQL Server
    正将哪些数据放入内存的丰富信息。对于 SQL Server 实例，这个分析可以回答的基本问题是：缓冲区中的数据是否代表了使用该 SQL Server 的应用程序最关键的数据？


    回答这个问题的第一步是回顾哪些数据库在内存中占有多少页面。这看起来可能并不十分重要，但不同数据库所使用的内存量有时会令人惊讶。在为 `MSDB` 数据库中的备份表添加索引之前，这些表将所有备份数据推入内存的情况并不少见。如果表中的数据没有被频繁清理，这可能导致大量非关键业务数据占用不必要的内存量。


    对于问题的第二部分，我们需要与使用该 SQL Server 实例的应用程序的所有者及主题专家进行沟通。如果这些人的反馈与缓冲区中的信息不符，这就为我们提供了一份数据库列表，我们可以集中精力对这些数据库进行索引调优。


    同样的道理，许多应用程序拥有用于存储错误和处理事件的日志数据库，以便日后进行故障排查。当问题出现时，开发人员可以简单地查询数据库并提取所需的事件进行故障排查，而无需去查看日志文件。但是，如果这些表没有正确索引，或者查询不是
    SARGable（可搜索参数）的，会怎么样呢？拥有数百万或数十亿行的日志表可能会被推入内存，从而将来自关键业务应用程序的数据挤出内存，并可能导致更严重的问题。如果不检查缓冲区中的数据，就无法知道内存中存储的是什么，以及它是否是正确的数据。


    检查内存中的数据是一项相对简单的任务，它利用了 DMO `sys.dm_os_buffer_descriptors`。此 DMO 列出了内存中的每个数据页，并描述了页面上的信息。通过对每个数据库的每个页面进行计数，可以确定分配给该数据库的总页数和内存量。使用代码清单
    14-31 中的查询，我们可以从图 14-12 中看到，`ContosoRetailDW` 数据库在服务器上占用的内存最多，而 `IndexingMethod`
    数据库当前使用了 8.84 MB 的空间。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig12_HTML.jpg](img/338675_3_En_14_Fig12_HTML.jpg)


    图 14-12：每个数据库缓冲区分配查询的结果


    ```

    SELECT LEFT(CASE database_id

    WHEN 32767 THEN ''ResourceDb''

    ELSE DB_NAME(database_id) END, 20) AS Database_Name,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_Pool_MB

    FROM sys.dm_os_buffer_descriptors

    GROUP BY DB_NAME(database_id),

    database_id

    ORDER BY Buffered_Page_Count DESC;

    ```


    代码清单 14-31：每个数据库的缓冲区分配


    一旦识别出内存中的数据库，确定数据库中哪些对象位于内存中也很有用。与查看哪些数据库在内存中的原因类似，识别内存中的对象有助于确定在索引调优时应重点关注哪些表和索引。检索每个表和索引的内存使用情况同样利用了
    `sys.dm_os_buffer_descriptors`，但需要将行映射到目录视图 `sys.allocation_units` 和 `sys.partitions`
    中的 `allocation_unit_id` 值。


    通过代码清单 14-32 中的查询，返回了每个用户表和索引所使用的内存在图 14-13 的结果中，表 `FactSales` 和 `FactOnlineSales`
    占用了大量的内存。如果这出乎意料，并且这些事实表不那么显而易见，我们肯定需要进一步了解它们为何占用如此多的内存。这可以引导我们提出其他问题，例如：这些数据是什么？为什么如此庞大？该表占用的空间是否影响了其他数据库为其索引优化使用内存的能力？在这些情况下，我们需要调查这些表上的索引，因为最常驻留内存的表理应拥有最精良的索引配置。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig13_HTML.jpg](img/338675_3_En_14_Fig13_HTML.jpg)


    图 14-13：每个表/索引缓冲区分配查询的结果


    ```

    WITH BufferAllocation

    AS (SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND (au.type = 1 OR au.type = 3)

    UNION ALL

    SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND au.type = 2)

    SELECT t.name,

    we.name,

    we.type_desc,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_MB

    FROM sys.tables t

    INNER JOIN BufferAllocation ba ON t.object_id = ba.object_id

    LEFT JOIN sys.indexes we ON ba.object_id = we.object_id

    AND ba.index_id = we.index_id

    INNER JOIN sys.dm_os_buffer_descriptors bd ON ba.allocation_unit_id = bd.allocation_unit_id

    WHERE bd.database_id = DB_ID()

    GROUP BY t.name,

    we.index_id,

    we.name,

    we.type_desc

    ORDER BY Buffered_Page_Count DESC;

    ```


    代码清单 14-32：按表/索引划分的缓冲区分配


    ## Schema 发现


    在调查了服务器状态及其索引需求之后，索引分析过程的下一步是调查数据库的架构（Schema），以确定是否存在可解决的与架构相关的索引问题。对于这些问题，我们将主要关注一些可通过目录视图发现的关键细节。'
- fmt: '## Identify Heaps


    如前所述，在表上使用聚集索引通常比将表存储为堆更为理想。当堆被优先考虑时，应当是在已证明聚集索引的使用会对其性能产生负面影响的情况下。在调查堆时，最好考虑行数以及堆的利用率。当一个堆的行数较少或未被使用时，费力对其进行聚集可能毫无意义。


    要识别堆，请使用目录视图`sys.indexes`和`sys.partitions`。性能信息可在表`dbo.index_usage_stats_history`中找到。它可以结合使用以形成清单[14-33](#338675_3_En_14_Chapter.xhtml#PC33)中的查询，该查询提供图[14-14](#338675_3_En_14_Chapter.xhtml#Fig14)中的输出。


    结果显示`dbo.DatabaseLog`有一定数量的行。下一步是检查该表的架构。如果表上已存在主键，则它是聚集索引键的良好候选。如果没有，请检查其他键列，例如业务键。如果没有键列，向表中添加代理键可能是值得的。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig14_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig14_HTML.jpg)


    图 14-14 识别堆的查询输出


    ```

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(we.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(we.object_id))
    AS object_name,

    we.index_id,

    p.rows,

    SUM(h.user_seeks) AS user_seeks,

    SUM(h.user_scans) AS user_scans,

    SUM(h.user_lookups) AS user_lookups,

    SUM(h.user_updates) AS user_updates

    FROM sys.indexes we

    INNER JOIN sys.partitions p ON we.index_id = p.index_id

    AND we.object_id = p.object_id

    LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON p.object_id
    = h.object_id

    AND p.index_id = h.index_id

    WHERE type_desc = ''HEAP''

    GROUP BY we.index_id,

    p.rows,

    we.object_id

    ORDER BY p.rows DESC;

    ```

    清单 14-33 识别堆的查询


    ## Duplicate Indexes


    下一个需要审查的架构问题是重复索引。除了少数情况外，数据库中无需存在重复索引。它们浪费空间，并耗费资源进行维护，却没有任何益处。要确定一个索引是否是另一个的副本，请检查索引的键列和包含列。如果这些值匹配，则认为该索引是重复的。


    要发现重复索引，`sys.indexes`视图与`sys.index_columns`目录视图结合使用。使用清单[14-34](#338675_3_En_14_Chapter.xhtml#PC34)中的代码比较这些视图，将提供重复索引的列表。查询结果如图[14-15](#338675_3_En_14_Chapter.xhtml#Fig15)所示，显示在`AdventureWorks2017`数据库中，索引`AK_Document_rowguid`和`UQ__Document__F73921F7C5112C2E`是重复的。


    发现重复项后，应从数据库中删除这两个索引之一。虽然其中一个索引会有活动，但删除任一索引都会将活动转移到另一个索引。在删除任一索引之前，请检查索引的非列属性，以确保不会丢失索引的重要方面。例如，如果其中一个索引被指定为唯一，请确保保留的索引仍具有该属性。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig15_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig15_HTML.jpg)


    图 14-15 识别重复索引的查询输出


    ```

    USE AdventureWorks2017;

    GO

    WITH IndexSchema

    AS (SELECT we.object_id,

    we.index_id,

    we.name,

    ISNULL(we.filter_definition, '''') AS filter_definition,

    we.is_unique,

    (

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH('''')

    ) + COALESCE((

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND we.index_id = ic_key.index_id

    AND ic_key.is_included_column = 0

    WHERE we.object_id = ic.object_id

    AND ic.index_id = 1

    AND ic.is_included_column = 0

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    ''''

    ) + CASE

    WHEN we.is_unique = 1 THEN ''U''

    ELSE '''' END AS index_columns_keys_ids,

    CASE

    WHEN we.index_id IN ( 0, 1 ) THEN ''ALL-COLUMNS''

    ELSE COALESCE((

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND ic_key.index_id = 1

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND ic.is_included_column = 1

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    SPACE(0)

    ) END AS included_columns_ids

    FROM sys.tables t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    INNER JOIN sys.data_spaces ds ON we.data_space_id = ds.data_space_id

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id

    AND we.index_id = ps.index_id)

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(is1.object_id))
    AS object_name,

    is1.name AS index_name,

    is2.name AS duplicate_index_name

    FROM IndexSchema is1

    INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id

    AND is1.index_id <> is2.index_id

    AND is1.index_columns_keys_ids = is2.index_columns_keys_ids

    AND is1.included_columns_ids = is2.included_columns_ids

    AND is1.filter_definition = is2.filter_definition

    AND is1.is_unique = is2.is_unique;

    ```

    清单 14-34 识别重复索引的查询


    ## Note


    重叠索引查询的最初灵感来自Paul Nielsen在[`http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx`](http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx)上的博客文章。'
  raw: '### Identify Heaps


    As discussed previously, it is often more ideal to utilize clustered indexes on
    tables as opposed to storing tables as heaps. When heaps are preferred, it should
    be when the use of a clustered index has been shown to negatively impact performance
    as opposed to a heap. When investigating heaps, it is best to consider the number
    of rows and the utilization of the heap. When a heap has a low number of rows
    or is not being used, taking the effort to cluster its table may be rather pointless.


    To identify heaps, use the catalog views `sys.indexes` and `sys.partitions`. The
    performance information is available in the table `dbo.index_usage_stats_history`.
    It can be used in conjunction to form the query in Listing [14-33](#338675_3_En_14_Chapter.xhtml#PC33),
    which provides the output in Figure [14-14](#338675_3_En_14_Chapter.xhtml#Fig14).


    The results show that `dbo.DatabaseLog` has a number of rows. The next step is
    to review the schema of the table. If there is a primary key already on the table,
    it’s a good candidate for the clustering index key. If not, check for another
    key column, such as a business key. If there is no key column, it may be worthwhile
    to add a surrogate key to the table.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig14_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig14_HTML.jpg)


    Figure 14-14


    Output for query identifying heaps


    ```

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(we.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(we.object_id))
    AS object_name,

    we.index_id,

    p.rows,

    SUM(h.user_seeks) AS user_seeks,

    SUM(h.user_scans) AS user_scans,

    SUM(h.user_lookups) AS user_lookups,

    SUM(h.user_updates) AS user_updates

    FROM sys.indexes we

    INNER JOIN sys.partitions p ON we.index_id = p.index_id

    AND we.object_id = p.object_id

    LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON p.object_id
    = h.object_id

    AND p.index_id = h.index_id

    WHERE type_desc = ''HEAP''

    GROUP BY we.index_id,

    p.rows,

    we.object_id

    ORDER BY p.rows DESC;

    Listing 14-33

    Query to Identify Heaps

    ```


    ### Duplicate Indexes


    The next schema issue to review is duplicate indexes . Except for rare occasions,
    there is no need to have duplicate indexes in your databases. They waste space
    and cost resources to maintain without providing any benefit. To determine that
    an index is a duplicate of another, review the key columns and included columns
    of the index. If these values match, the index is considered a duplicate.


    To uncover duplicate indexes, the `sys.indexes` view is used in conjunction with
    the `sys.index_columns` catalog view. Comparing these views to each other using
    the code in Listing [14-34](#338675_3_En_14_Chapter.xhtml#PC34) will provide a
    list of the indexes that are duplicates. The results from the query, displayed
    in Figure [14-15](#338675_3_En_14_Chapter.xhtml#Fig15), show that in the `AdventureWorks2017`
    database the indexes `AK_Document_rowguid` and UQ__Document__F73921F7C5112C2E
    are duplicates.


    When duplicates are found, one of the two indexes should be removed from the database.
    While one of the indexes will have index activity, removing either will shift
    the activity from one to the other. Before removing either index, review the noncolumn
    properties of the index to make sure important aspects of the index are not lost.
    For instance, if one of the indexes is designated as unique, be sure that the
    index retained still has that property.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig15_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig15_HTML.jpg)


    Figure 14-15


    Output for query identifying duplicate indexes


    ```

    USE AdventureWorks2017;

    GO

    WITH IndexSchema

    AS (SELECT we.object_id,

    we.index_id,

    we.name,

    ISNULL(we.filter_definition, “) AS filter_definition,

    we.is_unique,

    (

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH(")

    ) + COALESCE((

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND we.index_id = ic_key.index_id

    AND ic_key.is_included_column = 0

    WHERE we.object_id = ic.object_id

    AND ic.index_id = 1

    AND ic.is_included_column = 0

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH(")

    ),

    "

    ) + CASE

    WHEN we.is_unique = 1 THEN ''U''

    ELSE " END AS index_columns_keys_ids,

    CASE

    WHEN we.index_id IN ( 0, 1 ) THEN ''ALL-COLUMNS''

    ELSE COALESCE((

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND ic_key.index_id = 1

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND ic.is_included_column = 1

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH(")

    ),

    SPACE(0)

    ) END AS included_columns_ids

    FROM sys.tables t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    INNER JOIN sys.data_spaces ds ON we.data_space_id = ds.data_space_id

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id

    AND we.index_id = ps.index_id)

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(is1.object_id))
    AS object_name,

    is1.name AS index_name,

    is2.name AS duplicate_index_name

    FROM IndexSchema is1

    INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id

    AND is1.index_id  is2.index_id

    AND is1.index_columns_keys_ids = is2.index_columns_keys_ids

    AND is1.included_columns_ids = is2.included_columns_ids

    AND is1.filter_definition = is2.filter_definition

    AND is1.is_unique = is2.is_unique;

    Listing 14-34

    Query to Identify Duplicate Indexes

    ```


    ### Note


    The original inspiration for the overlapping index query is from the blog post
    at [`http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx`](http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx)
    by Paul Nielsen.'
  trans: '## 识别堆表


    如前所述，在表上使用聚集索引通常比将表存储为堆表更为理想。当堆表被优先考虑时，应当是在已证明聚集索引的使用会对其性能产生负面影响的情况下。在调查堆表时，最好考虑行数以及堆表的利用率。当一个堆表的行数较少或未被使用时，费力对其进行聚集可能毫无意义。


    要识别堆表，请使用目录视图`sys.indexes`和`sys.partitions`。性能信息可在表`dbo.index_usage_stats_history`中找到。它可以结合使用以形成清单
    14-33 中的查询，该查询提供图 14-14 中的输出。


    结果显示`dbo.DatabaseLog`有一定数量的行。下一步是检查该表的架构。如果表上已存在主键，则它是聚集索引键的良好候选。如果没有，请检查其他键列，例如业务键。如果没有键列，向表中添加代理键可能是值得的。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig14_HTML.jpg](img/338675_3_En_14_Fig14_HTML.jpg)


    图 14-14 识别堆表的查询输出


    ```

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(we.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(we.object_id))
    AS object_name,

    we.index_id,

    p.rows,

    SUM(h.user_seeks) AS user_seeks,

    SUM(h.user_scans) AS user_scans,

    SUM(h.user_lookups) AS user_lookups,

    SUM(h.user_updates) AS user_updates

    FROM sys.indexes we

    INNER JOIN sys.partitions p ON we.index_id = p.index_id

    AND we.object_id = p.object_id

    LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON p.object_id
    = h.object_id

    AND p.index_id = h.index_id

    WHERE type_desc = ''HEAP''

    GROUP BY we.index_id,

    p.rows,

    we.object_id

    ORDER BY p.rows DESC;

    ```

    清单 14-33 识别堆表的查询


    ## 重复索引


    下一个需要审查的架构问题是重复索引。除了少数情况外，数据库中无需存在重复索引。它们浪费空间，并耗费资源进行维护，却没有任何益处。要确定一个索引是否是另一个的副本，请检查索引的键列和包含列。如果这些值匹配，则认为该索引是重复的。


    要发现重复索引，`sys.indexes`视图与`sys.index_columns`目录视图结合使用。使用清单 14-34 中的代码比较这些视图，将提供重复索引的列表。查询结果如图
    14-15 所示，显示在`AdventureWorks2017`数据库中，索引`AK_Document_rowguid`和`UQ__Document__F73921F7C5112C2E`是重复的。


    发现重复项后，应从数据库中删除这两个索引之一。虽然其中一个索引会有活动，但删除任一索引都会将活动转移到另一个索引。在删除任一索引之前，请检查索引的非列属性，以确保不会丢失索引的重要方面。例如，如果其中一个索引被指定为唯一，请确保保留的索引仍具有该属性。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig15_HTML.jpg](img/338675_3_En_14_Fig15_HTML.jpg)


    图 14-15 识别重复索引的查询输出


    ```

    USE AdventureWorks2017;

    GO

    WITH IndexSchema

    AS (SELECT we.object_id,

    we.index_id,

    we.name,

    ISNULL(we.filter_definition, '''') AS filter_definition,

    we.is_unique,

    (

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH('''')

    ) + COALESCE((

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND we.index_id = ic_key.index_id

    AND ic_key.is_included_column = 0

    WHERE we.object_id = ic.object_id

    AND ic.index_id = 1

    AND ic.is_included_column = 0

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    ''''

    ) + CASE

    WHEN we.is_unique = 1 THEN ''U''

    ELSE '''' END AS index_columns_keys_ids,

    CASE

    WHEN we.index_id IN ( 0, 1 ) THEN ''ALL-COLUMNS''

    ELSE COALESCE((

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND ic_key.index_id = 1

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND ic.is_included_column = 1

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    SPACE(0)

    ) END AS included_columns_ids

    FROM sys.tables t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    INNER JOIN sys.data_spaces ds ON we.data_space_id = ds.data_space_id

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id

    AND we.index_id = ps.index_id)

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(is1.object_id))
    AS object_name,

    is1.name AS index_name,

    is2.name AS duplicate_index_name

    FROM IndexSchema is1

    INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id

    AND is1.index_id <> is2.index_id

    AND is1.index_columns_keys_ids = is2.index_columns_keys_ids

    AND is1.included_columns_ids = is2.included_columns_ids

    AND is1.filter_definition = is2.filter_definition

    AND is1.is_unique = is2.is_unique;

    ```

    清单 14-34 识别重复索引的查询


    ## 注


    重叠索引查询的最初灵感来自 Paul Nielsen 在[`http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx`](http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx)上的博客文章。'
- fmt: "### Overlapping Indexes\n\nAfter identifying duplicate indexes, the next step\
    \ is to look for overlapping indexes. An index is considered to be overlapping\
    \ another index when its key columns make up all or part of another index’s key\
    \ columns. Included columns are not considered when looking at overlapping columns;\
    \ the focus for this evaluation is only on the key columns.\n\nTo identify overlapping\
    \ indexes, the same catalog views, `sys.indexes` and `sys.index_columns`, are\
    \ used. For each index, its key columns will be compared using the `LIKE` operator\
    \ and a wildcard to the key columns of the other indexes on the table. When there\
    \ is a match, it will be flagged as an overlapping index. The query for this check\
    \ is provided in Listing 14-35, with the results from executing against the `AdventureWorks2017`\
    \ database shown in Figure 14-16.\n\nDecisions on handling overlapping indexes\
    \ are not as cut and dry as the duplicate indexes. To help illustrate overlapping\
    \ indexes, the `index IX_SameAsPK` was creating on the column `DocumentNode`.\
    \ This is the same column that is used as the clustering key for the table `Production.Document`.\
    \ What this example shows, though, is that a nonclustered index can be considered\
    \ an overlapping index of a clustered index. In some cases, it might be advisable\
    \ to remove the overlapping nonclustered index. In all reality, the clustered\
    \ index has the same key, and the pages are sorted in the same manner. We can\
    \ find the same values in both. The gray area comes in when considering the size\
    \ of the rows in the clustered index. If the rows are wide enough, if just querying\
    \ for the clustering key, it will at times be more beneficial to use the nonclustered\
    \ index. In this manner, we will need to spend more time analyzing indexes. This\
    \ same gray area will apply to comparisons between two nonclustered indexes as\
    \ well.\n\nWhen reviewing overlapping indexes, there are a few other things to\
    \ note. Be sure to retain the index properties, such as whether the index is unique.\
    \ Also, watch the included columns. The included columns are not considered in\
    \ the overlapping comparison. There may be unique sets of included columns between\
    \ the two indexes. Watch for this and merge the included columns as appropriate.\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig16_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16: Output for query identifying overlapping indexes\n\n```sql\nWITH\
    \ IndexSchema\nAS (SELECT we.object_id,\n           we.index_id,\n           we.name,\n\
    \           (\n               SELECT CASE key_ordinal\n                      \
    \    WHEN 0 THEN NULL\n                          ELSE QUOTENAME(column_id, '(')\n\
    \                      END\n               FROM   sys.index_columns ic\n     \
    \          WHERE  ic.object_id = we.object_id\n                      AND ic.index_id\
    \ = we.index_id\n               ORDER  BY key_ordinal,\n                     \
    \    column_id\n               FOR XML PATH('')\n           ) AS index_columns_keys\n\
    \    FROM   sys.tables t\n           INNER JOIN sys.indexes we\n             \
    \     ON t.object_id = we.object_id\n    WHERE  we.type_desc IN ( 'CLUSTERED',\
    \ 'NONCLUSTERED', 'HEAP' ))\nSELECT QUOTENAME(DB_NAME()) AS database_name,\n \
    \      QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + '.' + QUOTENAME(OBJECT_NAME(is1.object_id))\
    \ AS object_name,\n       STUFF((\n           SELECT ', ' + c.name\n         \
    \  FROM   sys.index_columns ic\n                  INNER JOIN sys.columns c\n \
    \                        ON ic.object_id = c.object_id\n                     \
    \       AND ic.column_id = c.column_id\n           WHERE  ic.object_id = is1.object_id\n\
    \                  AND ic.index_id = is1.index_id\n           ORDER  BY ic.key_ordinal,\n\
    \                     ic.column_id\n           FOR XML PATH('')\n       ),\n \
    \      1,\n       2,\n       '') AS index_columns,\n       STUFF((\n         \
    \  SELECT ', ' + c.name\n           FROM   sys.index_columns ic\n            \
    \      INNER JOIN sys.columns c\n                         ON ic.object_id = c.object_id\n\
    \                            AND ic.column_id = c.column_id\n           WHERE\
    \  ic.object_id = is1.object_id\n                  AND ic.index_id = is1.index_id\n\
    \                  AND ic.is_included_column = 1\n           ORDER  BY ic.column_id\n\
    \           FOR XML PATH('')\n       ),\n       1,\n       2,\n       '') AS included_columns,\n\
    \       is1.name AS index_name,\n       SUM(CASE\n             WHEN is1.index_id\
    \ = h.index_id THEN\n               ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans,\
    \ 0) + ISNULL(h.user_lookups, 0)\n               + ISNULL(h.user_updates, 0)\n\
    \           END) index_activity,\n       is2.name AS duplicate_index_name,\n \
    \      SUM(CASE\n             WHEN is2.index_id = h.index_id THEN\n          \
    \     ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans, 0) + ISNULL(h.user_lookups,\
    \ 0)\n               + ISNULL(h.user_updates, 0)\n           END) duplicate_index_activity\n\
    FROM   IndexSchema is1\n       INNER JOIN IndexSchema is2\n              ON is1.object_id\
    \ = is2.object_id\n                 AND is1.index_id > is2.index_id\n        \
    \         AND (\n                     is1.index_columns_keys LIKE is2.index_columns_keys\
    \ + '%'\n                     AND is2.index_columns_keys LIKE is2.index_columns_keys\
    \ + '%'\n                 )\n       LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history\
    \ h\n                    ON is1.object_id = h.object_id\nGROUP  BY is1.object_id,\n\
    \          is1.name,\n          is2.name,\n          is1.index_id;\n```\n*Listing\
    \ 14-35: Query to Identify Overlapping Indexes*\n\n### Unindexed Foreign Keys\n\
    \nForeign keys are useful for enforcing constraints within a database. When there\
    \ are parent and child relationships between tables, foreign keys provide the\
    \ mechanism to verify that child tables aren’t referencing parent values that\
    \ don’t exist. Likewise, the foreign key makes certain that a parent value can’t\
    \ be removed while child values are still in use. To support these validations,\
    \ the columns for the parent and child values between the tables need to be indexed.\
    \ If one or the other is not indexed, SQL Server can’t optimize the operation\
    \ with a seek and is forced to use a scan to verify that the values are not in\
    \ the related table.\n\nVerifying that foreign keys are indexed involves a process\
    \ similar to the duplicate and overlapping indexes process. Along with the `sys.indexes`\
    \ and `sys.index_columns` catalog views, the `sys.foreign_key_columns` view is\
    \ used to provide an index template that the foreign key would rely upon. This\
    \ is pulled together in the query in Listing 14-36 with results from the `AdventureWorks2017`\
    \ database shown in Figure 14-17.\n\nThe common practice is that every foreign\
    \ key should be indexed, always. This, though, is not actually the case for every\
    \ foreign key. There are a couple things to consider before adding the index.\
    \ First, how many rows are in the child table? If the row count is low, adding\
    \ the index may not provide a performance gain. If the uniqueness of the column\
    \ is fairly low, statistics may justify a scan of every row regardless of the\
    \ index. In these cases, it could be argued that if the size of the table is small,\
    \ the cost of the index is also small, and there is nothing to lose from adding\
    \ the index. The other consideration is whether data will be deleted from the\
    \ table and when activities that require validation of the foreign key will occur.\
    \ With large tables with many columns and foreign keys, performance may suffer\
    \ from having yet another index to maintain on the table. The index would probably\
    \ be of value, but is it of enough value to justify creating it?\n\nWhile those\
    \ are good considerations when indexing foreign keys, the majority of the time,\
    \ we will want to index your foreign keys. Similar to the recommendation for clustering\
    \ tables, index your foreign keys unless we have performance documentation showing\
    \ that indexing the foreign keys negatively impacts performance.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig17_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig17_HTML.jpg)\n\
    \nFigure 14-17: Output for query identifying missing foreign key indexes"
  raw: '### Overlapping Indexes


    After identifying duplicate indexes, the next step is to look for overlapping
    indexes. An index is considered to be overlapping another index when its key columns
    make up all or part of another index’s key columns. Included columns are not considered
    when looking at overlapping columns; the focus for this evaluation is only on
    the key columns.


    To identify overlapping indexes , the same catalog views, `sys.indexes` and `sys.index_columns`,
    are used. For each index, its key columns will be compared using the `LIKE` operator
    and a wildcard to the key columns of the other indexes on the table. When there
    is a match, it will be flagged as an overlapping index. The query for this check
    is provided in Listing [14-35](#338675_3_En_14_Chapter.xhtml#PC35), with the results
    from executing against the `AdventureWorks2017` database shown in Figure [14-16](#338675_3_En_14_Chapter.xhtml#Fig16).


    Decisions on handling overlapping indexes are not as cut and dry as the duplicate
    indexes. To help illustrate overlapping indexes, the `index IX_SameAsPK` was creating
    on the column `DocumentNode`. This is the same column that is used as the clustering
    key for the table `Production.Document`. What this example shows, though, is that
    a nonclustered index can be considered an overlapping index of a clustered index.
    In some cases, it might be advisable to remove the overlapping nonclustered index.
    In all reality, the clustered index has the same key, and the pages are sorted
    in the same manner. We can find the same values in both. The gray area comes in
    when considering the size of the rows in the clustered index. If the rows are
    wide enough, if just querying for the clustering key, it will at times be more
    beneficial to use the nonclustered index. In this manner, we will need to spend
    more time analyzing indexes. This same gray area will apply to comparisons between
    two nonclustered indexes as well.


    When reviewing overlapping indexes, there are a few other things to note. Be sure
    to retain the index properties, such as whether the index is unique. Also, watch
    the included columns. The included columns are not considered in the overlapping
    comparison. There may be unique sets of included columns between the two indexes.
    Watch for this and merge the included columns as appropriate.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig16_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig16_HTML.jpg)


    Figure 14-16


    Output for query identifying overlapping indexes


    ```

    WITH IndexSchema

    AS (SELECT we.object_id,

    we.index_id,

    we.name,

    (

    SELECT CASE key_ordinal

    WHEN 0 THEN NULL

    ELSE QUOTENAME(column_id, ''('') END

    FROM sys.index_columns ic

    WHERE ic.object_id = we.object_id

    AND ic.index_id = we.index_id

    ORDER BY key_ordinal,

    column_id

    FOR XML PATH(")

    ) AS index_columns_keys

    FROM sys.tables t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    WHERE we.type_desc IN ( ''CLUSTERED'', ''NONCLUSTERED'', ''HEAP'' ))

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(is1.object_id))
    AS object_name,

    STUFF((

    SELECT '', '' + c.name

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE ic.object_id = is1.object_id

    AND ic.index_id = is1.index_id

    ORDER BY ic.key_ordinal,

    ic.column_id

    FOR XML PATH(")

    ),

    1,

    2,

    "

    ) AS index_columns,

    STUFF((

    SELECT '', '' + c.name

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE ic.object_id = is1.object_id

    AND ic.index_id = is1.index_id

    AND ic.is_included_column = 1

    ORDER BY ic.column_id

    FOR XML PATH(")

    ),

    1,

    2,

    "

    ) AS included_columns,

    is1.name AS index_name,

    SUM(CASE

    WHEN is1.index_id = h.index_id THEN

    ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans, 0) + ISNULL(h.user_lookups, 0)

    + ISNULL(h.user_updates, 0) END

    ) index_activity,

    is2.name AS duplicate_index_name,

    SUM(CASE

    WHEN is2.index_id = h.index_id THEN

    ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans, 0) + ISNULL(h.user_lookups, 0)

    + ISNULL(h.user_updates, 0) END

    ) duplicate_index_activity

    FROM IndexSchema is1

    INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id

    AND is1.index_id > is2.index_id

    AND (

    is1.index_columns_keys LIKE is2.index_columns_keys + ''%''

    AND is2.index_columns_keys LIKE is2.index_columns_keys + ''%''

    )

    LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON is1.object_id
    = h.object_id

    GROUP BY is1.object_id,

    is1.name,

    is2.name,

    is1.index_id;

    Listing 14-35

    Query to Identify Overlapping Indexes

    ```


    ### Unindexed Foreign Keys


    Foreign keys are useful for enforcing constraints within a database. When there
    are parent and child relationships between tables, foreign keys provide the mechanism
    to verify that child tables aren’t referencing parent values that don’t exist.
    Likewise, the foreign key makes certain that a parent value can’t be removed while
    child values are still in use. To support these validations, the columns for the
    parent and child values between the tables need to be indexed. If one or the other
    is not indexed, SQL Server can’t optimize the operation with a seek and is forced
    to use a scan to verify that the values are not in the related table.


    Verifying that foreign keys are indexed involves a process similar to the duplicate
    and overlapping indexes process. Along with the `sys.indexes` and `sys.index_columns`
    catalog views, the `sys.foreign_key_columns` view is used to provide an index
    template that the foreign key would rely upon. This is pulled together in the
    query in Listing [14-36](#338675_3_En_14_Chapter.xhtml#PC36) with results from
    the `AdventureWorks2017` database shown in Figure [14-17](#338675_3_En_14_Chapter.xhtml#Fig17).


    The common practice is that every foreign key should be indexed, always. This,
    though, is not actually the case for every foreign key. There are a couple things
    to consider before adding the index. First, how many rows are in the child table?
    If the row count is low, adding the index may not provide a performance gain.
    If the uniqueness of the column is fairly low, statistics may justify a scan of
    every row regardless of the index. In these cases, it could be argued that if
    the size of the table is small, the cost of the index is also small, and there
    is nothing to lose from adding the index. The other consideration is whether data
    will be deleted from the table and when activities that require validation of
    the foreign key will occur. With large tables with many columns and foreign keys,
    performance may suffer from having yet another index to maintain on the table.
    The index would probably be of value, but is it of enough value to justify creating
    it?


    While those are good considerations when indexing foreign keys, the majority of
    the time, we will want to index your foreign keys. Similar to the recommendation
    for clustering tables, index your foreign keys unless we have performance documentation
    showing that indexing the foreign keys negatively impacts performance.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig17_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig17_HTML.jpg)


    Figure 14-17


    Output for query identifying missing foreign key indexes'
  trans: "\n### 重叠索引\n\n识别重复索引后，下一步是查找重叠索引。当一个索引的键列完全或部分构成另一个索引的键列时，该索引就被视为与另一个索引重叠。在查看重叠列时，不考虑包含列；此评估的重点仅在于键列。\n\
    \n为了识别重叠索引，使用了相同的目录视图：`sys.indexes` 和 `sys.index_columns`。对于每个索引，其键列将使用 `LIKE`\
    \ 运算符和通配符与其他索引在表上的键列进行比较。当匹配时，它将被标记为重叠索引。此检查的查询如清单 14-35 所示，在 `AdventureWorks2017`\
    \ 数据库上执行的结果如图 14-16 所示。\n\n处理重叠索引的决策不像处理重复索引那样非黑即白。为了帮助说明重叠索引，在列 `DocumentNode`\
    \ 上创建了索引 `index IX_SameAsPK`。这是用于表 `Production.Document` 聚集键的同一列。然而，这个例子表明，非聚集索引也可以被视为聚集索引的重叠索引。在某些情况下，移除重叠的非聚集索引可能是可取的。实际上，聚集索引具有相同的键，并且页面的排序方式相同。我们可以在两者中找到相同的值。灰色地带在于考虑聚集索引中行的大小。如果行足够宽，仅查询聚集键时，使用非聚集索引有时会更有益。这样，我们将需要花费更多时间来分析索引。这个相同的灰色地带也适用于两个非聚集索引之间的比较。\n\
    \n在审查重叠索引时，还有几点需要注意。务必保留索引属性，例如索引是否唯一。另外，注意包含列。包含列在重叠比较中不被考虑。两个索引之间可能存在唯一的包含列集。请注意这一点，并在适当时合并包含列。\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig16_HTML.jpg](img/338675_3_En_14_Fig16_HTML.jpg)\n\
    \n图 14-16：识别重叠索引的查询输出\n\n```sql\nWITH IndexSchema\nAS (SELECT we.object_id,\n\
    \           we.index_id,\n           we.name,\n           (\n               SELECT\
    \ CASE key_ordinal\n                          WHEN 0 THEN NULL\n             \
    \             ELSE QUOTENAME(column_id, '(')\n                      END\n    \
    \           FROM   sys.index_columns ic\n               WHERE  ic.object_id =\
    \ we.object_id\n                      AND ic.index_id = we.index_id\n        \
    \       ORDER  BY key_ordinal,\n                         column_id\n         \
    \      FOR XML PATH('')\n           ) AS index_columns_keys\n    FROM   sys.tables\
    \ t\n           INNER JOIN sys.indexes we\n                  ON t.object_id =\
    \ we.object_id\n    WHERE  we.type_desc IN ( 'CLUSTERED', 'NONCLUSTERED', 'HEAP'\
    \ ))\nSELECT QUOTENAME(DB_NAME()) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id))\
    \ + '.' + QUOTENAME(OBJECT_NAME(is1.object_id)) AS object_name,\n       STUFF((\n\
    \           SELECT ', ' + c.name\n           FROM   sys.index_columns ic\n   \
    \               INNER JOIN sys.columns c\n                         ON ic.object_id\
    \ = c.object_id\n                            AND ic.column_id = c.column_id\n\
    \           WHERE  ic.object_id = is1.object_id\n                  AND ic.index_id\
    \ = is1.index_id\n           ORDER  BY ic.key_ordinal,\n                     ic.column_id\n\
    \           FOR XML PATH('')\n       ),\n       1,\n       2,\n       '') AS index_columns,\n\
    \       STUFF((\n           SELECT ', ' + c.name\n           FROM   sys.index_columns\
    \ ic\n                  INNER JOIN sys.columns c\n                         ON\
    \ ic.object_id = c.object_id\n                            AND ic.column_id = c.column_id\n\
    \           WHERE  ic.object_id = is1.object_id\n                  AND ic.index_id\
    \ = is1.index_id\n                  AND ic.is_included_column = 1\n          \
    \ ORDER  BY ic.column_id\n           FOR XML PATH('')\n       ),\n       1,\n\
    \       2,\n       '') AS included_columns,\n       is1.name AS index_name,\n\
    \       SUM(CASE\n             WHEN is1.index_id = h.index_id THEN\n         \
    \      ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans, 0) + ISNULL(h.user_lookups,\
    \ 0)\n               + ISNULL(h.user_updates, 0)\n           END) index_activity,\n\
    \       is2.name AS duplicate_index_name,\n       SUM(CASE\n             WHEN\
    \ is2.index_id = h.index_id THEN\n               ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans,\
    \ 0) + ISNULL(h.user_lookups, 0)\n               + ISNULL(h.user_updates, 0)\n\
    \           END) duplicate_index_activity\nFROM   IndexSchema is1\n       INNER\
    \ JOIN IndexSchema is2\n              ON is1.object_id = is2.object_id\n     \
    \            AND is1.index_id > is2.index_id\n                 AND (\n       \
    \              is1.index_columns_keys LIKE is2.index_columns_keys + '%'\n    \
    \                 AND is2.index_columns_keys LIKE is2.index_columns_keys + '%'\n\
    \                 )\n       LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history\
    \ h\n                    ON is1.object_id = h.object_id\nGROUP  BY is1.object_id,\n\
    \          is1.name,\n          is2.name,\n          is1.index_id;\n```\n*清单 14-35：识别重叠索引的查询*\n\
    \n### 未索引的外键\n\n外键对于在数据库中实施约束非常有用。当表之间存在父子关系时，外键提供了一种机制来验证子表不会引用不存在的父值。同样，外键确保父值在子值仍在使用时无法被删除。为了支持这些验证，父表和子表之间的列需要被索引。如果其中一个未被索引，SQL\
    \ Server 就无法通过寻址来优化操作，而被迫使用扫描来验证相关表中是否存在这些值。\n\n验证外键是否被索引的过程类似于重复索引和重叠索引的过程。除了\
    \ `sys.indexes` 和 `sys.index_columns` 目录视图外，还使用了 `sys.foreign_key_columns` 视图来提供外键所依赖的索引模板。这在清单\
    \ 14-36 的查询中整合在一起，`AdventureWorks2017` 数据库的执行结果如图 14-17 所示。\n\n通常的做法是，每个外键都应该始终被索引。然而，并非每个外键都是如此。在添加索引之前需要考虑几件事。首先，子表中有多少行？如果行数很少，添加索引可能不会带来性能提升。如果列的唯一性相当低，统计信息可能会证明无论是否有索引都需要扫描每一行。在这些情况下，可能会认为如果表的大小很小，索引的成本也很小，添加索引并无损失。另一个考虑是是否会从表中删除数据，以及需要验证外键的活动何时发生。对于具有许多列和外键的大表，性能可能会因为表上需要维护的又一个索引而受到影响。该索引可能具有价值，但它是否足够有价值来证明创建它是合理的？\n\
    \n虽然这些是索引外键时需要考虑的重要因素，但在大多数情况下，我们还是希望为外键创建索引。类似于对聚集表的建议，除非有性能文档表明索引外键会对性能产生负面影响，否则请为外键创建索引。\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig17_HTML.jpg](img/338675_3_En_14_Fig17_HTML.jpg)\n\
    \n图 14-17：识别缺失外键索引的查询输出\n"
- fmt: '### Uncompressed Indexes


    As discussed earlier in this chapter and in other parts of the book, it is usually
    beneficial to utilize some level of compression on all indexes. With row compression,
    the indexes generally store fixed-length data as variable length, while page compression
    examines data and reduces duplication to compress further. In many cases, databases
    can be compressed to 25–75 percent of their current size through compression.
    That size reduction increases the amount of data SQL Server can process through
    the CPU. Often times, the additional CPU cost to compress data is more than offset
    by the decrease in CPU effort to process the uncompressed data volume.


    When examining databases for uncompressed indexes, the query in Listing 14-37
    provides a list per database with the filegroup, partition boundary, row count,
    and size for each index. This information is especially useful because it can
    help identify the largest indexes where compression could provide the greatest
    gain. Review the list and determine which indexes to start compressing, keeping
    in mind whether there are data types, such as `varchar(max)`, that will compress
    and may lead to compression failures, as discussed earlier in this chapter.


    ```sql

    WITH cIndexes

    AS (SELECT we.object_id,

    we.name,

    (

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH('''')

    ) AS indexed_compare

    FROM sys.indexes we),

    cForeignKeys

    AS (SELECT fk.name AS foreign_key_name,

    ''PARENT'' AS foreign_key_type,

    fkc.parent_object_id AS object_id,

    STUFF((

    SELECT '', '' + QUOTENAME(c.name)

    FROM sys.foreign_key_columns ifkc

    INNER JOIN sys.columns c ON ifkc.parent_object_id = c.object_id

    AND ifkc.parent_column_id = c.column_id

    WHERE fk.object_id = ifkc.constraint_object_id

    ORDER BY ifkc.constraint_column_id

    FOR XML PATH('''')

    ),

    1,

    2,

    ''''

    ) AS fk_columns,

    (

    SELECT QUOTENAME(ifkc.parent_column_id, ''('')

    FROM sys.foreign_key_columns ifkc

    WHERE fk.object_id = ifkc.constraint_object_id

    ORDER BY ifkc.constraint_column_id

    FOR XML PATH('''')

    ) AS fk_columns_compare

    FROM sys.foreign_keys fk

    INNER JOIN sys.foreign_key_columns fkc ON fk.object_id = fkc.constraint_object_id

    WHERE fkc.constraint_column_id = 1),

    cRowCount

    AS (SELECT object_id,

    SUM(row_count) AS row_count

    FROM sys.dm_db_partition_stats ps

    WHERE index_id IN ( 1, 0 )

    GROUP BY object_id)

    SELECT QUOTENAME(DB_NAME()),

    QUOTENAME(OBJECT_SCHEMA_NAME(fk.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(fk.object_id))
    AS ObjectName,

    fk.foreign_key_name,

    fk_columns,

    row_count

    FROM cForeignKeys fk

    INNER JOIN cRowCount rc ON fk.object_id = rc.object_id

    LEFT OUTER JOIN cIndexes we ON fk.object_id = we.object_id

    AND we.indexed_compare LIKE fk.fk_columns_compare + ''%''

    WHERE we.name IS NULL

    ORDER BY row_count DESC,

    OBJECT_NAME(fk.object_id),

    fk.fk_columns;

    ```

    Listing 14-36: Query to Identify Unindexed Foreign Keys


    ```sql

    WITH partitioning

    AS (SELECT dds.data_space_id,

    dds.partition_scheme_id,

    ds.name,

    dds.destination_id AS partition_number,

    CASE

    WHEN prv.value IS NOT NULL THEN

    CONCAT(

    IIF(pf.boundary_value_on_right = 1, ''Less than '', ''Greater than or equal to
    ''),

    CAST(prv.value AS VARCHAR(MAX))

    )

    WHEN pf.boundary_value_on_right = 1 THEN ''Greater than MAX boundary''

    ELSE ''Less than MIN boundary'' END AS Boundary

    FROM sys.destination_data_spaces AS dds

    INNER JOIN sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id

    INNER JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id

    INNER JOIN sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id

    LEFT OUTER JOIN sys.partition_range_values AS prv ON pf.function_id = prv.function_id

    AND prv.boundary_id = dds.destination_id)

    SELECT S.name AS schema_name,

    T.name AS table_name,

    I.name AS index_name,

    I.index_id,

    P.partition_number,

    P.data_compression_desc,

    I.type_desc,

    IIF(DS.type_desc = ''PARTITION_SCHEME'', PS.name, DS.name) AS file_group,

    PS.Boundary AS partition_boundary,

    DS.type_desc AS data_space_type,

    P.rows,

    CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024\. AS DECIMAL(20, 3)) AS
    mb_size

    FROM sys.tables AS T

    INNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id

    INNER JOIN sys.indexes AS I ON T.object_id = I.object_id

    INNER JOIN sys.partitions AS P ON I.object_id = P.object_id

    AND I.index_id = P.index_id

    INNER JOIN sys.dm_db_partition_stats AS dps ON P.object_id = dps.object_id

    AND P.index_id = dps.index_id

    AND P.partition_number = dps.partition_number

    LEFT OUTER JOIN partitioning AS PS ON I.data_space_id = PS.partition_scheme_id

    AND P.partition_number = PS.partition_number

    INNER JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id

    WHERE P.data_compression_desc = ''NONE'';

    GO

    ```

    Listing 14-37: Query to Identify Uncompressed Indexes


    ### Note


    It bears repeating that the DTA is a good tool for determining useful indexes
    to add to a database. While there may be more pride in designing indexes for a
    database by hand without the need of a tool, it isn’t practical to ignore useful
    recommendations. Use the DTA as a starting point to discover indexing suggestions
    that would have taken hours to determine without the tool in place.'
