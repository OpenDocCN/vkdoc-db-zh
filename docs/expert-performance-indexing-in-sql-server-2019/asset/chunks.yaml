    查看索引中数据操作语言活动的价值在于帮助你了解索引中的数据正在发生什么变化。例如，如果一个非聚集索引经常被更新，检查索引中的列可能有助于确定列的易变性是否与索引带来的好处相匹配。查看具有大量数据操作语言活动的索引，并思考这些活动是否符合你对数据库平台的理解，这是一个很好的做法。


    ## SELECT 活动


    在数据操作语言活动之后，下一个可以查看的信息区域是关于 `SELECT` 活动的信息。`SELECT` 活动列（如表 3-14 所示）标识了查询执行时使用的物理操作类型。SQL
    Server 收集三种访问类型的信息：范围扫描、单例查找和转送记录。


    表 3-14

    `sys.dm_db_index_operational_stats` 中的访问模式列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `range_scan_count` | bigint | 在索引或堆上启动的范围扫描和表扫描的累计计数。 |

    | `singleton_lookup_count` | bigint | 从索引或堆中进行单行检索的累计计数。 |

    | `forwarded_fetch_count` | bigint | 通过转送记录获取的行数计数。 |


    ### 范围扫描


    当使用行范围或表扫描来访问数据时，就会发生范围扫描。考虑行范围时，它可能涉及 1 到 1000 行或更多。范围中的行数对于 SQL Server 如何访问数据并不重要。对于表扫描，行数也不重要，但你可能已经假设它包括表中的所有记录。在
    `sys.dm_db_index_operational_stats` 中，这些值存储在 `range_scan_count` 列中。


    要查看在 `range_scan_count` 中收集的此信息，请执行上一节中的清单 3-13 和清单 3-15 中的代码。在此之前，请先将 AdventureWorks2017
    数据库脱机，然后再将其联机，这将重置从动态管理对象返回的统计信息。在这两个代码示例中，将执行四个查询。前两个查询将在查询计划中导致索引查找，如图 3-9 所示。后两个查询将导致索引扫描，如图
    3-11 中的执行计划所示。运行清单 3-25 中的代码将显示（如图 3-18 所示），所有四个查询都使用了范围扫描从表中检索数据。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig18_HTML.jpg](img/338675_3_En_3_Fig18_HTML.jpg)


    图 3-18

