    pattern can fulfill these requirements. Even though `IsActive` is not one of the
    predicates for the query, it can be added to the index, and SQL Server can use
    that key column to return the column values with the query. To demonstrate the
    Covering Index pattern, let’s create an index that has `FirstName`, `LastName`,
    and `IsActive` as the key columns (see Listing [11-20](#338675_3_En_11_Chapter.xhtml#PC20)).
