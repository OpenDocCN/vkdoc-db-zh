    While there are many more aspects of memory-optimized tables that can be discussed,
    this overview is intended to provide some of the most basic aspects. The rest
    of this chapter will examine indexing of memory-optimized tables. While memory-optimized
    tables are completely in memory, indexes are still required. Being in memory doesn’t
    prevent the need to find specific data or filter resultsets. And as mentioned
    in Chapter [1](#338675_3_En_1_Chapter.xhtml), indexes provide the mechanism for
    providing a path to data.


    To support indexing of memory-optimized tables, SQL Server supports two indexing
    options. These are hash and range indexes. Each memory-optimized table can support
    up to eight indexes. If a primary key is defined, this will be supported by one
    of the two index types and be one of the allowed indexes. If there is no primary
    key defined, the table must be created with at least one index. Additionally,
    memory-optimized tables do not allow indexing changes after creation, so you will
    need to define all indexes for a memory-optimized table when it is created.


    The remainder of this chapter will focus on the hash and range types of indexes
    with considerations for building each of them against a memory-optimized table.


    ### Note


    Index operations for memory-optimized tables are nonlogged activities since they
    occur only within memory and have no impact on the state of the data stored in
    the table.


    ## Hash Indexes


    The first index type for memory-optimized tables is the hash index. Hash indexes
    separate the data in the table into a fixed number of buckets. Rows inserted into
    the table then use a hash function to assign rows to the available buckets. These
    buckets provide the ability for queries to return specific rows based on the point
    lookup operations. Hash indexes are designed for types of query workloads where
    individual rows from the tables need to be retrieved.


    When creating hash indexes, the number of buckets to create is a function of the
    number of rows planned, or expected, for the table. If there will be a large number
    of rows, a larger bucket count is required. This is an important part of creating
    and tuning hash indexes on memory-optimized tables. As the number of rows in each
    bucket increases, the time required to retrieve data increases. The ratio of rows
    to buckets is something that needs to be carefully considered.


    It is generally recommended to over-allocate buckets to hash indexes, with the
    range of buckets recommended to be between two and five times the number of rows.
    While this is the recommended practice, it is important to consider how you will
    be using the tables within your environment and size the buckets accordingly.


    To demonstrate the impact of bucket size, Listing [6-4](#338675_3_En_6_Chapter.xhtml#PC4)
    creates two memory-optimized tables. Both tables have 1,000,000 rows in them,
    with the first table having 1,000 buckets and the second having 1,000,000 buckets.
    With this configuration, there will be approximately 1,000 rows per bucket for
    the first table and 1 row per bucket in the second table.


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_low'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_low

    CREATE TABLE dbo.SalesOrderHeader_low(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_Hash_low PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_low

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high

    CREATE TABLE dbo.SalesOrderHeader_high(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

