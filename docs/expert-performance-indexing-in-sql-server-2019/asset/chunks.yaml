    ```


    Through the two use cases in this section, we can see how the Foreign Key pattern
    can outperform the Identity Column pattern. However, there are things that need
    to be considered in databases before implementing this pattern. The chief question
    that needs to be answered is whether rows will most often be retrieved going through
    the primary key of the detail table or its foreign key relationship to the header
    table. Not all foreign keys are suited for this clustered index pattern; it is
    valid only when there is a header-to-detail relationship between tables.


    As mentioned, there are a few caveats regarding the attributes of a well-defined
    clustered index when using the Foreign Key pattern. In regard to being narrow,
    the pattern is not as narrow as the Identity Column pattern. Instead of a single
    integer-based column, two of them make up the clustering keys. When using the
    `int` data type, this will increase the size of the clustering key from 4 bytes
    to 8 bytes. While not an overly large value, it will impact the size of the nonclustered
    indexes on the table. In most cases, the clustering keys under the Foreign Key
    pattern will be static. There is a chance that the header row for some detail
    rows will need to change from time to time, maybe when two orders are logged and
    need to be merged for shipping. For this reason, the Foreign Key pattern isn’t
    entirely static. The key can change, but it shouldn’t change frequently. If there
    are frequent changes, you should reconsider using this clustered index pattern.
    The last attribute that has a caveat is whether the clustering keys are ever-increasing.
    In general, this should be the case. The typical insert pattern is to create a
    header and the detail records. In this situation, the header rows are created
    and inserted sequentially, followed by their detail records. If there is a delay
    in writing the detail records or more detail records are added to a header row
    at a later date, the key won’t be ever-increasing. As a result, there could be
    additional fragmentation and maintenance associated with this clustered index
    pattern.


    The Foreign Key pattern is not a clustered index pattern that will be applicable
    in all databases. When it is, though, it is quite beneficial and can alleviate
    performance issues that may not be as obvious as other issues. It is important
    to consider using this pattern when designing clustered indexes and to review
    the caveats associated with it to determine whether it is the right fit.


    ### Multiple Column


    The next pattern that can be used to design clustered indexes is the Multiple
    Column pattern. In this pattern, two or more tables have a relationship to a third
    table that allows for many-to-many relationships to exist between the information.
    For instance, there might be a table that stores employee information and another
    that contains job roles. To represent the relationship, a third table is used.
    Through the Multiple Column pattern, instead of using a new column with the `IDENTITY`
    property on it, the columns used for the relationship serve as the clustering
    keys.


    The Multiple Column pattern is similar to the Foreign Key pattern and provides
    many of the same performance enhancements as the previous pattern. As you will
    soon see, there is often one column or another in the many-to-many relationship
    table that is the best candidate for clustering key. Similar to the other patterns,
    this pattern also adheres to most of the attributes for a well-defined clustered
    index. The pattern is unique and mostly narrow and static; these properties will
    be apparent as you walk through an example of the Multiple Column pattern.


    To demonstrate the Multiple Column pattern, let’s begin by defining a few tables
    and their relationships. To start, there are tables that will store information
    about employees and job roles, named `dbo.Employee` and `dbo.JobRole`, respectively.
    Two tables named `dbo.EmployeeJobRole_ICP` and `dbo.EmployeeJobRole_MCP` are used
    to represent the Identity Column and Multiple Column patterns in the example relationships
    (see Listing [11-9](#338675_3_En_11_Chapter.xhtml#PC9)). The example script includes
    insert statements to provide some sample data to use. Also, nonclustered indexes
    are created on the tables to provide a real-world scenario.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Employee (

    EmployeeID int IDENTITY(1,1)

    ,EmployeeName varchar(100)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_Employee PRIMARY KEY CLUSTERED (EmployeeID));

    CREATE INDEX IX_Employee_EmployeeName ON dbo.Employee(EmployeeName);

    CREATE TABLE dbo.JobRole (

    JobRoleID int IDENTITY(1,1)

    ,RoleName varchar(25)

    ,FillerData varchar(200)

    ,CONSTRAINT PK_JobRole PRIMARY KEY CLUSTERED (JobRoleID));

    CREATE INDEX IX_JobRole_RoleName ON dbo.JobRole(RoleName);

    CREATE TABLE dbo.EmployeeJobRole_ICP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRole_ICP PRIMARY KEY CLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT UIX_EmployeeJobRole_ICP UNIQUE (EmployeeID, JobRoleID))

    CREATE INDEX IX_EmployeeJobRole_ICP_EmployeeID ON dbo.EmployeeJobRole_ICP(EmployeeID);

    CREATE INDEX IX_EmployeeJobRole_ICP_JobRoleID ON dbo.EmployeeJobRole_ICP(JobRoleID);

    CREATE TABLE dbo.EmployeeJobRole_MCP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRoleID PRIMARY KEY NONCLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT CUIX_EmployeeJobRole_ICP UNIQUE CLUSTERED (EmployeeID, JobRoleID));

    CREATE INDEX IX_EmployeeJobRole_MCP_JobRoleID ON dbo.EmployeeJobRole_MCP(JobRoleID);

    INSERT INTO dbo.Employee (EmployeeName)

    SELECT OBJECT_SCHEMA_NAME(object_id)+''|''+name

    FROM sys.tables;

    INSERT INTO dbo.JobRole (RoleName)

    VALUES (''Cook''),(''Butcher''),(''Candlestick Maker'');

    INSERT INTO dbo.EmployeeJobRole_ICP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    INSERT INTO dbo.EmployeeJobRole_MCP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    Listing 11-9

    Multiple Column Pattern Script

    ```'
