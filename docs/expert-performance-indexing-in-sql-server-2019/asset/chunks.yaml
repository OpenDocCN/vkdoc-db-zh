- fmt: '### Note


    本节中的列存储示例使用了适用于零售业的 Microsoft Contoso BI 演示数据集。该数据库包含一个拥有超过 800 万条记录的事实表。可从此处下载：`www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`。


    使用列存储索引的关键在于能够正确识别应应用它们的场景。虽然对某些 OLTP 数据库使用列存储索引可能有用，但这并非其目标场景。尽管列存储索引的性能在 OLTP
    数据库中可能有用，但与此索引类型相关的限制妨碍了它在 OLTP 数据库中的有效使用。列存储索引主要对数据仓库有用，因为那里需要跨大量行进行聚合，并且返回的列较少。通过列式存储和内置压缩，这种索引类型提供了一种尽可能快地访问所需数据的方法，而无需加载不属于查询的列。在数据仓库中，列存储索引主要针对事实表而非维度表。当用于大型表时，列存储索引才能真正证明其价值。表越大，列存储索引比传统索引提升的性能就越多。此外，在考虑数据仓库查询时，它们有一个共同的特点，即聚合和可用列的子集。通过聚合，列存储索引的批处理模式提供了更大的性能改进。查询中的列越少，意味着加载到内存中的数据就越少，因为查询上下文中只使用被访问的列。


    当发现使用列存储索引的场景时，首先需要考虑几件事。由于列存储索引可以是聚集的也可以是非聚集的，第一个决定是使用哪种类型。使用聚集列存储索引时，表中的所有数据都随索引存储，这意味着数据库中只有一份数据副本。因为它包含所有数据，所以表中所有列的结果都会出现在列存储索引中。在大多数情况下，这是首选。


    或者，列存储索引可以是非聚集的。这提供了限制索引中包含的列数的能力。在某些情况下，如果表有很多列，这可能很有用。非聚集索引依赖于表中存在聚集索引，这意味着非聚集列存储索引会增加表的总体存储空间占用。


    创建非聚集列存储索引时有更多的考虑因素，因此在构建它们时需要记住一些准则。首先，非聚集列存储索引中列的顺序无关紧要。每列都与其他列分开存储，直到在执行期间再次具体化在一起时，它们之间才建立关系。接下来要记住的是，将被列存储索引利用的表中所有列都必须出现在列存储索引中。如果查询中的某列未出现在非聚集列存储索引中，则无法使用该索引。


    如果你使用的是 SQL Server 2017 之前的版本，重要的是要记住非聚集列存储索引是只读的，任何构建了非聚集列存储索引的表或分区都将被置于只读状态。要修改表，需要禁用或删除非聚集列存储索引，然后在更新完成后重新构建或创建它。此限制不影响聚集列存储索引，并且从
    SQL Server 2017 开始，对非聚集列存储索引的此限制已被取消。


    影响两种类型列存储索引的一个限制是创建索引所需的时间长度。在许多情况下，创建列存储索引所需的时间可能是创建聚集或非聚集索引的四到五倍。有关列存储索引的更多信息，请参见第
    [2](#338675_3_En_2_Chapter.xhtml) 章。


    在展示列存储索引的价值之前，让我们先看一个针对使用传统索引的数据仓库执行查询的演示。在清单 [11-30](#338675_3_En_11_Chapter.xhtml#PC30)
    中，该查询按 `CalendarQuarter` 和 `ProductCategoryName` 对 `SalesQuantity` 值进行汇总。执行该查询并不需要大量时间；图
    [11-46](#338675_3_En_11_Chapter.xhtml#Fig46) 显示耗时 4,293 毫秒（或 4.2 秒），在 dbo.FactSales
    上有略少于 20,000 次的读取。对于当前的记录量来说，结果是合理的，但请考虑如果表的行数增加 10 倍或 100 倍会怎样。在什么时候 4.2 秒的执行时间会增长到超出可接受的执行时间？'
  raw: '### Note


    The columnstore examples in this section utilize the Microsoft Contoso BI Demo
    Dataset for Retail Industry. This database has a fact table with more than 8 million
    records. It is available for download at [`www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`](http://www.microsoft.com/download/en/details.aspx%253Fdisplaylang%253Den%2526id%253D18279).


    The key to using columnstore indexes is to be able to properly identify the situations
    where they should be applied. While it could be useful with some OLTP databases
    to use the columnstore index, this is not the target scenario. While the performance
    of the columnstore index could be useful in an OLTP database, the restrictions
    associated with this index type prevent using it in a meaningful way in OLTP databases.
    The columnstore index is primarily useful for data warehouses, where aggregations
    across numerous rows are required and few columns will be returned. With the column-wise
    storage and built-in compression, this index type provides a way to get to the
    data requested as fast as possible without having to load columns that are not
    part of the query. Within your data warehouse, columnstore indexes are geared
    toward fact tables vs. dimension tables. Columnstore indexes really prove their
    worth when they are used on large tables. The larger the table, the more a columnstore
    index will be able to improve performance over traditional indexes. Additionally,
    when considering data warehouse queries, one common quality that they share is
    aggregations and subsets of the available columns. Through the aggregations, the
    batch mode processing of columnstore indexes provides greater performance improvements.
    The fewer columns in the queries means less data is loaded into memory, as only
    the columns being accessed are used in the context of the query.


    When a scenario for using a columnstore index is discovered, there are a couple
    of things to first consider. Since columnstore indexes can be both clustered and
    nonclustered, the first decision is which type to use. With clustered columnstore
    indexes, all the data in the table is stored with the index, meaning that only
    one copy of the data appears in the database. Since it is all the data, the results
    in all the columns from the table appear in the columnstore index. In most cases,
    this will be preferred.


    Alternatively, the columnstore index can be nonclustered. This provides the ability
    to limit the number of columns that are part of the index. In some cases, where
    the table has many columns, this may be useful. The nonclustered index will rely
    on a clustered index being part of the table, which means that nonclustered columnstore
    indexes increase the overall storage footprint of the table.


    Nonclustered columnstore indexes have more considerations when creating them,
    so there are a number of guidelines to remember when building the them. First,
    the order of the columns in the nonclustered columnstore index does not matter.
    Each column is stored separate from the other columns, and there are no relationships
    between them until they are materialized together again during execution. The
    next thing to remember is that all columns in the table that will be leveraged
    by the columnstore index must appear in the columnstore index. If a column from
    a query does not appear in the nonclustered columnstore index, then the index
    cannot be used.


    If you are using SQL Server versions prior to SQL Server 2017, it’s important
    to remember that nonclustered columnstore indexes are read-only, and any table
    or partition that has a nonclustered columnstore index built upon it will be placed
    in a read-only state. To modify the table, the nonclustered columnstore index
    will need to be disabled or dropped and then rebuilt or created after the updates
    are completed. This limitation does not affect clustered columnstore indexes and
    was lifted from nonclustered columnstore indexes with SQL Server 2017.


    A limitation that affects both types of columnstore indexes is length of time
    that it takes to create the index. In many cases, it can take four to five times
    longer to create a columnstore index than it does to build a clustered or nonclustered
    index. For more information on columnstore indexes, see Chapter [2](#338675_3_En_2_Chapter.xhtml).


    Before demonstrating the value in columnstore indexes, let’s look at a demonstration
    of a query against a data warehouse with traditional indexing. In Listing [11-30](#338675_3_En_11_Chapter.xhtml#PC30),
    the query is summarizing `SalesQuantity` values by `CalendarQuarter` and `ProductCategoryName`.
    Executing the query does not take a substantial amount of time; Figure [11-46](#338675_3_En_11_Chapter.xhtml#Fig46)
    shows an elapsed time of 4,293 ms (or 4.2 seconds), with a little less than 20,000
    reads on dbo.FactSales. The results are reasonable for the current volume of records,
    but consider if the table had 10 or 100 times as many rows. At what point would
    the 4.2 seconds of execution grow outside the acceptable execution time?'
  trans: '### 注意


    本节中的列存储示例使用了适用于零售业的 Microsoft Contoso BI 演示数据集。该数据库包含一个拥有超过 800 万条记录的事实表。可从此处下载：`www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`。


    使用列存储索引的关键在于能够正确识别应应用它们的场景。虽然对某些 OLTP 数据库使用列存储索引可能有用，但这并非其目标场景。尽管列存储索引的性能在 OLTP
    数据库中可能有用，但与此索引类型相关的限制妨碍了它在 OLTP 数据库中的有效使用。列存储索引主要对数据仓库有用，因为那里需要跨大量行进行聚合，并且返回的列较少。通过列式存储和内置压缩，这种索引类型提供了一种尽可能快地访问所需数据的方法，而无需加载不属于查询的列。在数据仓库中，列存储索引主要针对事实表而非维度表。当用于大型表时，列存储索引才能真正证明其价值。表越大，列存储索引比传统索引提升的性能就越多。此外，在考虑数据仓库查询时，它们有一个共同的特点，即聚合和可用列的子集。通过聚合，列存储索引的批处理模式提供了更大的性能改进。查询中的列越少，意味着加载到内存中的数据就越少，因为查询上下文中只使用被访问的列。


    当发现使用列存储索引的场景时，首先需要考虑几件事。由于列存储索引可以是聚集的也可以是非聚集的，第一个决定是使用哪种类型。使用聚集列存储索引时，表中的所有数据都随索引存储，这意味着数据库中只有一份数据副本。因为它包含所有数据，所以表中所有列的结果都会出现在列存储索引中。在大多数情况下，这是首选。


    或者，列存储索引可以是非聚集的。这提供了限制索引中包含的列数的能力。在某些情况下，如果表有很多列，这可能很有用。非聚集索引依赖于表中存在聚集索引，这意味着非聚集列存储索引会增加表的总体存储空间占用。


    创建非聚集列存储索引时有更多的考虑因素，因此在构建它们时需要记住一些准则。首先，非聚集列存储索引中列的顺序无关紧要。每列都与其他列分开存储，直到在执行期间再次具体化在一起时，它们之间才建立关系。接下来要记住的是，将被列存储索引利用的表中所有列都必须出现在列存储索引中。如果查询中的某列未出现在非聚集列存储索引中，则无法使用该索引。


    如果你使用的是 SQL Server 2017 之前的版本，重要的是要记住非聚集列存储索引是只读的，任何构建了非聚集列存储索引的表或分区都将被置于只读状态。要修改表，需要禁用或删除非聚集列存储索引，然后在更新完成后重新构建或创建它。此限制不影响聚集列存储索引，并且从
    SQL Server 2017 开始，对非聚集列存储索引的此限制已被取消。


    影响两种类型列存储索引的一个限制是创建索引所需的时间长度。在许多情况下，创建列存储索引所需的时间可能是创建聚集或非聚集索引的四到五倍。有关列存储索引的更多信息，请参见第
    2 章。


    在展示列存储索引的价值之前，让我们先看一个针对使用传统索引的数据仓库执行查询的演示。在清单 11-30 中，该查询按 `CalendarQuarter` 和
    `ProductCategoryName` 对 `SalesQuantity` 值进行汇总。执行该查询并不需要大量时间；图 11-46 显示耗时 4,293
    毫秒（或 4.2 秒），在 dbo.FactSales 上有略少于 20,000 次的读取。对于当前的记录量来说，结果是合理的，但请考虑如果表的行数增加 10
    倍或 100 倍会怎样。在什么时候 4.2 秒的执行时间会增长到超出可接受的执行时间？'
- fmt: '### 注意


    由于执行计划的大小，它们不包含在列存储索引示例中。并且由于本节依赖 CPU 时间来演示性能，因此会多次运行以确保磁盘到内存的性能不是影响因素。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig46_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig46_HTML.jpg)

    图 11-46  聚集索引在事实表上的 Statistics I/O 结果


    ```

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    ,COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 11-30 列存储索引


    ### 在 `dbo.FactSales` 上测试非聚集列存储索引的性能


    为了测试在 `dbo.FactSales` 上使用非聚集列存储索引的性能，让我们向表中添加一个新索引。如本节指南所述，`dbo.FactSales` 中的所有列都被添加到列存储索引中，如清单
    [11-31](#338675_3_En_11_Chapter.xhtml#PC31) 所示。有了索引后，查询性能发生了显著变化。从时间角度看，查询在 286
    毫秒内完成，如图 [11-47](#338675_3_En_11_Chapter.xhtml#Fig47) 所示，这比没有非聚集列存储索引时的性能提升了超过
    15 倍。此外，I/O 次数从近 20,000 次下降到 2,608 次。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig47_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig47_HTML.jpg)

    图 11-47  非聚集列存储索引的 Statistics I/O 结果


    ```

    USE ContosoRetailDW

    GO

    CREATE NONCLUSTERED COLUMNSTORE INDEX IX_FactSales_CStore ON dbo.FactSales (

    SalesKey, DateKey, channelKey, StoreKey, ProductKey, PromotionKey, CurrencyKey,
    UnitCost, UnitPrice,

    SalesQuantity, ReturnQuantity, ReturnAmount, DiscountQuantity, DiscountAmount,
    TotalCost, SalesAmount,

    ETLLoadID, LoadDate, UpdateDate);

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 11-31 添加非聚集列存储索引


    ### 使用聚集列存储索引


    如前所述，聚集列存储索引是首选；既然这是首选，让我们看看在 `dbo.FactSales` 上使用聚集列存储索引的影响。由于您正在表上创建聚集索引，我们将使用清单
    [11-32](#338675_3_En_11_Chapter.xhtml#PC32) 中的脚本创建一个名为 `dbo.FactSales_CCI` 的新表，用
    `dbo.FactSales` 中的相同数据填充它，并向其添加聚集列存储索引。


    当您使用与前面示例相同的聚合查询时，聚集列存储的性能价值是显而易见的。考虑到执行时间（如图 [11-48](#338675_3_En_11_Chapter.xhtml#Fig48)
    所示），它进一步下降到 164 毫秒，比带有聚集索引的事实表快 26 倍以上。I/O 也减少了，执行时仅有 1,309 次 I/O。虽然 I/O 占用与非聚集列存储类似，但请记住，聚集列存储只存储一次，并且其中的值可以被修改。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig48_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig48_HTML.jpg)

    图 11-48  聚集列存储索引的 Statistics I/O 结果


    ```

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactSales_CCI'') IS NOT NULL

    DROP TABLE FactSales_CCI

    CREATE TABLE dbo.FactSales_CCI(

    SalesKey int NOT NULL,

    DateKey datetime NOT NULL,

    channelKey int NOT NULL,

    StoreKey int NOT NULL,

    ProductKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    UnitCost money NOT NULL,

    UnitPrice money NOT NULL,

    SalesQuantity int NOT NULL,

    ReturnQuantity int NOT NULL,

    ReturnAmount money NULL,

    DiscountQuantity int NULL,

    DiscountAmount money NULL,

    TotalCost money NOT NULL,

    SalesAmount money NOT NULL,

    ETLLoadID int NULL,

    LoadDate datetime NULL,

    UpdateDate datetime NULL

    )

    INSERT INTO dbo.FactSales_CCI

    SELECT * FROM dbo.FactSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactSales_CStore ON dbo.FactSales_CCI

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales_CCI fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 11-32 创建带有聚集列存储索引的事实表


    随着 SQL Server 的最新添加，列存储索引在数据仓库的索引方式上是一项重大改进。这些性能改进打开了将数据库扩展到比传统索引可能实现的范围更远的机会。以前只能汇总数百万行结果的场景，现在将能够扩展到数十亿行。此外，由于所有列都可以包含在列存储索引中，在数据仓库中持续维护和调整索引的工作和要求大大减少。


    ### 注意


    下一节使用了 WorldWideImporters 数据库，可以从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)
    下载。'
  raw: '### Note


    Because of the size of the execution plans, they are not being included in the
    columnstore index examples. And since this section is relying on CPU time to demonstrate
    performance, they are run multiple times to ensure that disk to memory performance
    is not a factor.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig46_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig46_HTML.jpg)


    Figure 11-46


    Statistics I/O results for clustered index on fact table


    ```

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    ,COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    Listing 11-30

    Columnstore Index

    ```


    To test the performance with a nonclustered columnstore index on `dbo.FactSales`,
    let’s add a new index to the table. As stated in the guidelines in this section,
    all the columns in `dbo.FactSales` are added to the columnstore index, shown in
    Listing [11-31](#338675_3_En_11_Chapter.xhtml#PC31). With the index in place,
    the performance of the query changes dramatically. From a timing perspective,
    the query completes in 286 ms, shown in Figure [11-47](#338675_3_En_11_Chapter.xhtml#Fig47),
    which is an improvement of over 15 times the performance without the nonclustered
    columnstore index. Additionally, the number of I/Os dropped from nearly 20,000
    to 2,608.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig47_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig47_HTML.jpg)


    Figure 11-47


    Statistics I/O results for nonclustered columnstore index


    ```

    USE ContosoRetailDW

    GO

    CREATE NONCLUSTERED COLUMNSTORE INDEX IX_FactSales_CStore ON dbo.FactSales (

    SalesKey, DateKey, channelKey, StoreKey, ProductKey, PromotionKey, CurrencyKey,
    UnitCost, UnitPrice,

    SalesQuantity, ReturnQuantity, ReturnAmount, DiscountQuantity, DiscountAmount,
    TotalCost, SalesAmount,

    ETLLoadID, LoadDate, UpdateDate);

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    Listing 11-31

    Adding Nonclustered Columnstore Index

    ```


    As mentioned, the clustered columnstore index is preferred; since this is the
    preference, let’s look at the impact of using a clustered columnstore index on
    `dbo.FactSales`. Since you are creating a clustered index on the table, we’ll
    use the script in Listing [11-32](#338675_3_En_11_Chapter.xhtml#PC32) to create
    a new table called `dbo.FactSales_CCI`, populate it with the same data in `dbo.FactSales`,
    and add the clustered columnstore index to it.


    When you use the same aggregate query from the previous examples, the performance
    value of the clustered columnstore is evident. Considering the execution time
    (shown in Figure [11-48](#338675_3_En_11_Chapter.xhtml#Fig48)), it drops further
    to 164 ms, which is more than 26 times faster than the fact table with the clustered
    index. The I/Os are reduced as well with only 1,309 I/Os for the execution. While
    the I/O footprint is similar to the nonclustered columnstore, remember that the
    clustered columnstore is stored only a single time and the values in it can be
    modified.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig48_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig48_HTML.jpg)


    Figure 11-48


    Statistics I/O results for clustered columnstore index


    ```

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactSales_CCI'') IS NOT NULL

    DROP TABLE FactSales_CCI

    CREATE TABLE dbo.FactSales_CCI(

    SalesKey int NOT NULL,

    DateKey datetime NOT NULL,

    channelKey int NOT NULL,

    StoreKey int NOT NULL,

    ProductKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    UnitCost money NOT NULL,

    UnitPrice money NOT NULL,

    SalesQuantity int NOT NULL,

    ReturnQuantity int NOT NULL,

    ReturnAmount money NULL,

    DiscountQuantity int NULL,

    DiscountAmount money NULL,

    TotalCost money NOT NULL,

    SalesAmount money NOT NULL,

    ETLLoadID int NULL,

    LoadDate datetime NULL,

    UpdateDate datetime NULL

    )

    INSERT INTO dbo.FactSales_CCI

    SELECT * FROM dbo.FactSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactSales_CStore ON dbo.FactSales_CCI

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales_CCI fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    Listing 11-32

    Create Fact Table with Clustered Columnstore Index

    ```


    With the recent additions to SQL Server, columnstore indexes are a significant
    improvement in the way in which data warehouses are indexed. These performance
    improvements open opportunities to scale the databases even further than is possible
    with traditional indexes. Scenarios where only millions of rows are able to be
    summarized in results will now be able to scale to billions of rows. Additionally,
    since all columns can be included in the columnstore indexes, the effort and requirement
    for continuous maintenance and tuning of indexes in data warehouses are dramatically
    reduced.


    ### Note


    The next section utilizes the WorldWideImporters databases which can be downloaded
    from [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0).'
