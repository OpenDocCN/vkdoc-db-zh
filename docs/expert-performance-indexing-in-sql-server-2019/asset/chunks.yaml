  trans: '## 统计信息列


    `sys.dm_db_column_store_row_group_operational_stats` 中有趣的信息来自统计信息列。在这些列中（定义见表
    3-28），包含了有关行组扫描次数、已删除行扫描次数以及列存储分区扫描次数的详细信息。这可以帮助你识别行组及其最小值和最大值对于访问该表的查询有多大用处，并确定何时删除的行数可能因其被过度访问而开始妨碍行组的可用性。此外，你还可以查看是否存在锁和阻塞事务对行组的可访问性产生负面影响，从而帮助你了解是否存在需要处理的潜在
    I/O 或事务瓶颈。


    ### 表 3-28

    `sys.dm_db_column_store_row_group_operational_stats` 中的统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `scan_count` | int | 自上次 SQL 重启以来，对该行组进行扫描的次数。 |

    | `delete_buffer_scan_count` | int | 使用删除缓冲区来确定此行组中已删除行的次数。这包括访问内存中的哈希表和底层的 B
    树。 |

    | `index_scan_count` | int | 扫描列存储索引分区的次数。此分区中所有行组的此值均相同。 |

    | `rowgroup_lock_count` | bigint | 自上次 SQL 重启以来，对此行组的锁请求的累计次数。 |

    | `rowgroup_lock_wait_count` | bigint | 自上次 SQL 重启以来，数据库引擎等待此行组锁的累计次数。 |

    | `rowgroup_lock_wait_in_ms` | bigint | 自上次 SQL 重启以来，数据库引擎等待此行组锁的累计毫秒数。 |


    ## 本章小结


    在本章中，你了解了 SQL Server 中有关索引的可用统计信息。从基数的统计信息到索引的物理布局，你学习了哪些信息是可用的以及如何获取它们。在很大程度上，这些信息只是冰山一角。在接下来的章节中，你将利用这些信息，通过查看已捕获的统计信息，并借助它们来提高为数据库创建索引的能力。


    # 4. XML 索引


    过去的几章重点介绍了对通常称为 *结构化数据* 的索引，这类数据有共同的模式和围绕其数据及存储的组织方式。在本章及接下来的几章中，索引的重点将转向非结构化和半结构化数据。无论是结构化还是非结构化数据，索引的任务都是为了获取检索和操作数据的最佳效率，但代表这些类型的数据的数据类型在数据库中的存储方式上存在差异。这些差异决定了索引的实现方式和原因，也决定了查询优化器如何使用这些索引。


    SQL Server 有一种专门的数据类型用于存储最常见的非结构化和半结构化数据类型，即 XML。本章探讨 SQL Server 为处理 XML 数据提供的索引类型。本章还将展示这些索引对使用
    XQuery 编写的查询类型的影响，以及对优化器决策的影响。


    ## XML 数据


    可扩展标记语言（XML）在 20 世纪 90 年代发展起来，并于 1998 年 2 月被万维网联盟确立为标准。XML 数据在数据库中存储多年，但在 SQL
    Server 2005 之前一直没有专门的数据类型或访问方法。当引入时，XML 数据类型扩展了 SQL Server 的功能，以适当管理这种不同的数据结构。随着
    XML 的普及，SQL Server 数据库中使用的 XML 内容及其总量不断增长。这种增长得益于 XML 为应用程序开发人员提供的优势。


    ### 优势


    XML 数据类型的引入使得在 SQL Server 数据库内部实现完整的 XML 存储能力成为可能。这包括能够基于针对 XML 本身编写的查询来检索 XML
    内容。XML 为开发人员提供的最强大支持在于它既是基于文本的，而且从表面上看是自我描述的。基于文本意味着 XML 可以轻松地从一个应用程序传递到另一个应用程序，而不管底层的操作系统或编程语言如何。自我描述的特性意味着你不需要像在数据库中定义列和表那样实际定义一个结构。相反，XML
    的元素和属性会告诉你它们是什么。XML 被称为 *半结构化* 数据，因为通常会有一个模板定义预期的结构，以帮助验证任何给定的 XML 是否是格式良好的。


    如果你的系统上要进行大量的 XML 处理，那么对 XML 进行索引可能会带来巨大的好处。XML 索引的最大好处在于，当你存储大量 XML 数据但只检索其中一小部分时。XML
    索引对这种情况大有裨益。如果你的 XML 上有很多查询，在实施 XML 索引后，你也可能会看到这方面的改进。


    ### 注意事项


    尽管 XML 数据类型听起来适用于每种 XML 实例，但在设计 SQL Server 中将要存储 XML 的列时，应考虑一些因素。最关键的一点是 XML 内容应该是格式良好的。这确保了
    XML 数据类型及其提供的功能（用于最高效地利用数据）能够充分发挥优势。XML 列存储为二进制大对象，更常见的称呼是 BLOB。这种存储意味着在大多数情况下，对内容的运行时查询是资源密集型且缓慢的。对于任何涉及数据检索的任务，其检索效率都是一个需要关注的问题。在
    SQL Server 中，索引对于效率的高低至关重要。完全没有索引或索引过多都会影响任何数据操作任务。XML 数据类型也符合这一要求。与其他 SQL Server
    索引方法相比，XML 索引是独特的。


    ## XML 索引


    XML 索引主要分为两大类：主/辅助索引和选择性 XML 索引。这些索引类型之间的主要区别在于索引中包含了多少 XML 数据。对于主/辅助索引，所有路径、节点和值都包含在索引中。当不清楚
    XML 的哪些部分会被最频繁访问时，这种方式效果很好。或者，如果只访问 XML 的有限部分，那么选择性 XML 索引可以提供更好的性能，因为索引的数据量减少了。接下来的两节将探讨并全面解释这两类
    XML 索引。'
- fmt: '### Primary/Secondary XML Indexes


    顾名思义，Primary/Secondary XML 索引包含两种类型：Primary 和 Secondary 索引。这两种索引类型在 XML 文档内提供的索引关系类似于聚簇索引和非聚簇索引之间的关系。在实现
    XML 索引时，一些基本规则适用于每种类型：


    *   虽然一个表上可以存在多个 Primary XML 索引，但一个列上只能存在一个 Primary XML 索引。

    *   Primary XML 索引无法在没有包含 XML 列的表的主键上的聚簇索引的情况下存在。此聚簇索引对于表分区是必需的，并且 XML 索引可以使用相同的分区方案和功能。

    *   Primary XML 索引包含 XML 内容的所有路径、标签和值。

    *   Secondary XML 索引无法在没有 Primary XML 索引的情况下存在。

    *   Secondary XML 索引扩展了 Primary 索引，包含路径、值和属性。


    为了演示 Primary/Secondary XML 索引，我们将使用 `AdventureWorks2017` 数据库和 `[Sales].[Store]`
    表。该表在 `[Demographics]` 上已有一个现有的 Primary XML 索引，需要使用代码清单 [4-1](#338675_3_En_4_Chapter.xhtml#PC1)
    中的代码将其删除。


    ```sql

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    Listing 4-1

    删除 [Sales].[Store] 上现有的 Primary XML 索引

    ```


    使用这个表，我们首先获取执行一个示例查询的成本基准。在代码清单 [4-2](#338675_3_En_4_Chapter.xhtml#PC2) 的查询中，我们将查询
    `[Sales].[Store]` 以查找年度销售额等于 $1,500,000 的商店。对于返回少于 200 条记录的查询，其成本为 12.751，如图 [4-1](#338675_3_En_4_Chapter.xhtml#Fig1)
    所示，这是相当昂贵的。这是由于 `XML Reader with XPath filter` 必须为所有行拆分整个 XML 文档以找到请求的记录，这是一个极其缓慢且资源密集的过程。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig1_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig1_HTML.jpg)


    图 4-1


    没有 XML 索引时的 XML 查询成本


    ```sql

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    Listing 4-2

    在 [Sales].[Store] 上查询 AnnualSales

    ```


    ### 注意


    本章将使用估计子树成本与逻辑读取的比较来演示 XML 索引的价值。虽然本书中的大多数分析侧重于通过使用索引来减少 I/O，但解析 XML 通常是一个计算成本高昂的操作，这就是为什么我们将重点关注查询成本。你也可以选择查看统计时间来比较
    CPU 时间的变化。


    这种方法在表中数据量较少时成本高昂但效率尚可。然而，在实际应用中，表可能变得非常大，超过扫描多个 XML 文档的有效点。例如，想象一个销售点系统将收据信息存储在每个销售的
    XML 文档中。对于这种数据量，性能将迅速开始受到影响。


    #### Primary XML 索引


    现在我们知道了在没有任何 XML 索引的情况下示例查询的成本，让我们看看添加 Primary XML 索引后会发生什么。使用代码清单 [4-3](#338675_3_En_4_Chapter.xhtml#PC3)
    中的 `CREATE INDEX` 代码创建 Primary XML 索引。有关此语法的更多信息请参见第 [1](#338675_3_En_1_Chapter.xhtml)
    章。这将在 `Demographic` 列上创建一个 Primary XML 索引。


    ```sql

    CREATE PRIMARY XML INDEX [PXML_Store_Demographics] ON [Sales].[Store]

    ([Demographics])

    Listing 4-3

    在 [Sales].[Store] 上创建 Primary XML 索引

    ```


    如前所述，当创建 Primary XML 索引时，所有路径、标签和节点都会被索引。对于这些项目中的每一个，都会在 XML 索引中创建一条记录，其中包含该项目以及有关该项目在
    XML 文档中的出现方式和与该项目关联的表中行的信息。理解这一点很重要，因为 XML 索引通常会显著增加基础表的存储占用空间。为了演示这一点，请运行代码清单
    [4-4](#338675_3_En_4_Chapter.xhtml#PC4) 中的代码以查看每个索引的记录数和页数。如图 [4-2](#338675_3_En_4_Chapter.xhtml#Fig2)
    中的结果所示，Primary XML 索引中的记录数大大超过了表中的记录数，倍数达到 13。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig2_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig2_HTML.jpg)


    图 4-2


    创建 Primary XML 索引后的物理统计信息


    ```sql

    SELECT [i].[name]

    ,[i].[index_id]

    ,[IPS].[index_level]

    ,[IPS].[index_type_desc]

    ,[IPS].[fragment_count]

    ,[IPS].[avg_page_space_used_in_percent]

    ,[IPS].[record_count]

    ,[IPS].[page_count]

    FROM [sys].[dm_db_index_physical_stats](DB_ID(N''AdventureWorks2017''), OBJECT_ID(N''Sales.Store''),
    NULL, NULL, ''DETAILED'') AS [IPS]

    INNER JOIN [sys].[indexes] AS [i]

    ON [i].[object_id] = [IPS].[object_id]

    AND [i].[index_id] = [IPS].[index_id]

    WHERE [IPS].[index_type_desc] <> ''NONCLUSTERED INDEX''

    ORDER BY [i].[index_id]

    ,[IPS].[index_level];

    Listing 4-4

    在 [Sales].[Store] 上创建 Primary XML 索引后的统计信息

    ```


    有了 Primary XML 索引后，让我们执行来自代码清单 [4-2](#338675_3_En_4_Chapter.xhtml#PC2) 的代码。检查执行计划，你可以看到执行计划呈现出一个极其不同的模式，如图
    [4-3](#338675_3_En_4_Chapter.xhtml#Fig3) 所示。估计子树成本从超过 12 减少到 0.1535；`XML Reader
    with XPath filter` 被 `Primary XML 索引`上的 `clustered index scan` 取代。在底层，查询仍在扫描表，但它以少得多的工作量完成此操作。对于更大的表，这种索引变化将显著减少查询本身的总持续时间。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig3_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig3_HTML.jpg)


    图 4-3


    具有 Primary XML 索引时的 XML 查询成本


    你现在可以看到优化器能够做出更均衡的选择。`PointOfSale` 表上的 `clustered index scan` 的估计成本实际上与针对你创建的
    XML 索引的 `clustered index seek` 一样高。查询引擎中工作位置的这种转变将带来性能的提升。


    ### 警告


    如果你创建然后删除一个 Primary XML 索引，任何 Secondary XML 索引也将被删除，因为它们依赖于 Primary 索引。此操作不会显示警告。'
  raw: '### Primary/Secondary XML Indexes


    As the name implies, there are two types of indexes that fall under Primary/Secondary
    XML indexes, which are Primary and Secondary indexes. These two index types provide
    an indexing relationship within the XML documents similar to the relationship
    between clustered and nonclustered indexes. When implementing XML indexes, some
    basic rules apply to each:


    *   Only one Primary XML index can exist on a column, though multiple Primary
    XML indexes can exist on a table.


    *   Primary XML indexes cannot exist without a clustered index on the primary
    key of the table that the XML column is in. This clustered index is required for
    partitioning the table, and the XML index can use the same partitioning scheme
    and functioning.


    *   Primary XML indexes include all paths, tags, and values of the XML content.


    *   A Secondary XML index cannot exist without a Primary XML index.


    *   A Secondary XML index extends the Primary index including paths, values, and
    properties.


    To demonstrate the Primary/Secondary XML indexes, we’ll use the AdventureWorks2017
    database and the table [Sales].[Store]. This table has an existing Primary XML
    index on [Demographics] that will need to be dropped using the code in Listing
    [4-1](#338675_3_En_4_Chapter.xhtml#PC1).


    ```

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    Listing 4-1

    Drop the Existing Primary XML Index on [Sales].[Store]

    ```


    Using this table, let’s first get a benchmark of the cost to execute an example
    query. In the query, in Listing [4-2](#338675_3_En_4_Chapter.xhtml#PC2), we’ll
    query [Sales].[Store] for the stores with annual sales equal to $1,500,000. For
    a query returning less than 200 records, the cost is 12.751, shown in Figure [4-1](#338675_3_En_4_Chapter.xhtml#Fig1),
    which is quite expensive. This is due to the XML Reader with XPath filter, which
    had to shred the entire XML document for all rows to find the requested records,
    which is an extremely slow and resource-intensive process.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig1_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig1_HTML.jpg)


    Figure 4-1


    XML query cost with no XML indexes


    ```

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    Listing 4-2

    Query on [Sales].[Store] for AnnualSales

    ```


    ### Note


    This chapter will use comparisons of estimated subtree cost vs. logical reads
    to demonstrate the value of XML indexes. While most analysis in this book focuses
    on reducing IO through the use of indexes, parsing XML is generally a computationally
    expensive operation which is why we will focus on query cost. You could alternatively
    look at statistics time to compare the CPU time changes.


    This query approach is costly, yet efficient with a small amount of data in the
    table. However, in real life, tables can become quite large, surpassing the point
    in which scanning through multiple XML documents is efficient. For instance, imagine
    if a point-of-sale system stored receipt information in XML documents for each
    sale. With this kind of data volume, performance would begin to suffer quickly.


    #### Primary XML Index


    Now that we know the cost of our example query without any XML indexes, let’s
    look at what happens when we add a Primary XML index. Using the `CREATE INDEX`
    code in Listing [4-3](#338675_3_En_4_Chapter.xhtml#PC3), create the Primary XML
    index. More information on this syntax is in Chapter [1](#338675_3_En_1_Chapter.xhtml).
    This will create a Primary XML index on the Demographic column.


    ```

    CREATE PRIMARY XML INDEX [PXML_Store_Demographics] ON [Sales].[Store]

    ([Demographics])

    Listing 4-3

    Primary XML Index on [Sales].[Store]

    ```


    As previously stated, when the Primary XML index is created, all of the paths,
    tags, and nodes are indexed. For each of these items, a record is created in the
    XML index that contains that item along with information on how that item appears
    in the XML document and which row in the table is associated with the item. It’s
    important to understand this because XML indexes will often dramatically increase
    the storage footprint of the underlying table. To demonstrate, run the code in
    Listing [4-4](#338675_3_En_4_Chapter.xhtml#PC4) to see the number of records and
    pages for each index. As the results in Figure [4-2](#338675_3_En_4_Chapter.xhtml#Fig2)
    demonstrate, the number of records in the Primary XML index greatly exceeds the
    number of records in the table by a factor of 13.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig2_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Physical stats after creating Primary XML index


    ```

    SELECT [i].[name]

    ,[i].[index_id]

    ,[IPS].[index_level]

    ,[IPS].[index_type_desc]

    ,[IPS].[fragment_count]

    ,[IPS].[avg_page_space_used_in_percent]

    ,[IPS].[record_count]

    ,[IPS].[page_count]

    FROM [sys].[dm_db_index_physical_stats](DB_ID(N''AdventureWorks2017''), OBJECT_ID(N''Sales.Store''),
    NULL, NULL, ''DETAILED'') AS [IPS]

    INNER JOIN [sys].[indexes] AS [i]

    ON [i].[object_id] = [IPS].[object_id]

    AND [i].[index_id] = [IPS].[index_id]

    WHERE [IPS].[index_type_desc]  ''NONCLUSTERED INDEX''

    ORDER BY [i].[index_id]

    ,[IPS].[index_level];

    Listing 4-4

    Primary XML Index on [Sales].[Store]

    ```


    With the Primary XML index in place, let’s execute the code from Listing [4-2](#338675_3_En_4_Chapter.xhtml#PC2).
    Reviewing the execution plan, you can see that the execution plan takes on an
    extremely different pattern, as shown in Figure [4-3](#338675_3_En_4_Chapter.xhtml#Fig3).
    Instead of an estimated subtree cost of over 12, this has been reduced to 0.1535;
    and the XML Reader with XPath filter is replaced by a clustered index scan of
    the Primary XML index. Under the covers, the query is still scanning the table,
    but it is doing so with much less effort. With larger tables, this indexing change
    will dramatically decrease the total duration of the query itself.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig3_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig3_HTML.jpg)


    Figure 4-3


    XML query cost with Primary XML index


    You can now see that the optimizer is able to make choices that are more evenly
    balanced. The `clustered index scan` of the `PointOfSale` table is actually as
    high an estimated cost as the `clustered index seek` against the XML index you
    created. This shift in where the work is occurring within the query engine will
    result in improved performance.


    ### Caution


    If you create and then drop a primary XML index, any Secondary XML indexes will
    also be dropped because they are dependent on the primary. No warning will be
    shown for this action.'
  trans: '

    ### 主/次 XML 索引


    顾名思义，主/次 XML 索引包含两种类型：主索引和次索引。这两种索引类型在 XML 文档内提供的索引关系类似于聚簇索引和非聚簇索引之间的关系。在实现 XML
    索引时，一些基本规则适用于每种类型：


    *   虽然一个表上可以存在多个主 XML 索引，但一个列上只能存在一个主 XML 索引。

    *   主 XML 索引无法在没有包含 XML 列的表的主键上的聚簇索引的情况下存在。此聚簇索引对于表分区是必需的，并且 XML 索引可以使用相同的分区方案和功能。

    *   主 XML 索引包含 XML 内容的所有路径、标签和值。

    *   次 XML 索引无法在没有主 XML 索引的情况下存在。

    *   次 XML 索引扩展了主索引，包含路径、值和属性。


    为了演示主/次 XML 索引，我们将使用 `AdventureWorks2017` 数据库和 `[Sales].[Store]` 表。该表在 `[Demographics]`
    上已有一个现有的主 XML 索引，需要使用代码清单 4-1 中的代码将其删除。


    ```sql

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    Listing 4-1

    删除 [Sales].[Store] 上现有的主 XML 索引

    ```


    使用这个表，我们首先获取执行一个示例查询的成本基准。在代码清单 4-2 的查询中，我们将查询 `[Sales].[Store]` 以查找年度销售额等于 $1,500,000
    的商店。对于返回少于 200 条记录的查询，其成本为 12.751，如图 4-1 所示，这是相当昂贵的。这是由于 `XML Reader with XPath
    filter` 必须为所有行拆分整个 XML 文档以找到请求的记录，这是一个极其缓慢且资源密集的过程。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig1_HTML.jpg](img/338675_3_En_4_Fig1_HTML.jpg)


    图 4-1


    没有 XML 索引时的 XML 查询成本


    ```sql

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    Listing 4-2

    在 [Sales].[Store] 上查询 AnnualSales

    ```


    ### 注意


    本章将使用估计子树成本与逻辑读取的比较来演示 XML 索引的价值。虽然本书中的大多数分析侧重于通过使用索引来减少 I/O，但解析 XML 通常是一个计算成本高昂的操作，这就是为什么我们将重点关注查询成本。你也可以选择查看统计时间来比较
    CPU 时间的变化。


    这种方法在表中数据量较少时成本高昂但效率尚可。然而，在实际应用中，表可能变得非常大，超过扫描多个 XML 文档的有效点。例如，想象一个销售点系统将收据信息存储在每个销售的
    XML 文档中。对于这种数据量，性能将迅速开始受到影响。


    #### 主 XML 索引


    现在我们知道了在没有任何 XML 索引的情况下示例查询的成本，让我们看看添加主 XML 索引后会发生什么。使用代码清单 4-3 中的 `CREATE INDEX`
    代码创建主 XML 索引。有关此语法的更多信息请参见第 1 章。这将在 `Demographic` 列上创建一个主 XML 索引。


    ```sql

    CREATE PRIMARY XML INDEX [PXML_Store_Demographics] ON [Sales].[Store]

    ([Demographics])

    Listing 4-3

    在 [Sales].[Store] 上创建主 XML 索引

    ```


    如前所述，当创建主 XML 索引时，所有路径、标签和节点都会被索引。对于这些项目中的每一个，都会在 XML 索引中创建一条记录，其中包含该项目以及有关该项目在
    XML 文档中的出现方式和与该项目关联的表中行的信息。理解这一点很重要，因为 XML 索引通常会显著增加基础表的存储占用空间。为了演示这一点，请运行代码清单
    4-4 中的代码以查看每个索引的记录数和页数。如图 4-2 中的结果所示，主 XML 索引中的记录数大大超过了表中的记录数，倍数达到 13。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig2_HTML.jpg](img/338675_3_En_4_Fig2_HTML.jpg)


    图 4-2


    创建主 XML 索引后的物理统计信息


    ```sql

    SELECT [i].[name]

    ,[i].[index_id]

    ,[IPS].[index_level]

    ,[IPS].[index_type_desc]

    ,[IPS].[fragment_count]

    ,[IPS].[avg_page_space_used_in_percent]

    ,[IPS].[record_count]

    ,[IPS].[page_count]

    FROM [sys].dm_db_index_physical_stats, OBJECT_ID(N''Sales.Store''), NULL, NULL,
    ''DETAILED'') AS [IPS]

    INNER JOIN [sys].[indexes] AS [i]

    ON [i].[object_id] = [IPS].[object_id]

    AND [i].[index_id] = [IPS].[index_id]

    WHERE [IPS].[index_type_desc] <> ''NONCLUSTERED INDEX''

    ORDER BY [i].[index_id]

    ,[IPS].[index_level];

    Listing 4-4

    在 [Sales].[Store] 上创建主 XML 索引后的统计信息

    ```


    有了主 XML 索引后，让我们执行来自代码清单 4-2 的代码。检查执行计划，你可以看到执行计划呈现出一个极其不同的模式，如图 4-3 所示。估计子树成本从超过
    12 减少到 0.1535；`XML Reader with XPath filter` 被 `主 XML 索引` 上的 `聚簇索引扫描` 取代。在底层，查询仍在扫描表，但它以少得多的工作量完成此操作。对于更大的表，这种索引变化将显著减少查询本身的总持续时间。


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig3_HTML.jpg](img/338675_3_En_4_Fig3_HTML.jpg)


    图 4-3


    具有主 XML 索引时的 XML 查询成本


    你现在可以看到优化器能够做出更均衡的选择。`PointOfSale` 表上的 `聚簇索引扫描` 的估计成本实际上与针对你创建的 XML 索引的 `聚簇索引查找`
    一样高。查询引擎中工作位置的这种转变将带来性能的提升。


    ### 警告


    如果你创建然后删除一个主 XML 索引，任何次 XML 索引也将被删除，因为它们依赖于主索引。此操作不会显示警告。

    '
- fmt: "# Secondary XML Index\n\nSecondary XML indexes provide the ability to further\
    \ improve querying XML data. With Secondary XML indexes, you’ll choose between\
    \ the `PATH`, `VALUE`, and `PROPERTY` types when building the index. These options\
    \ determine which elements from the Primary XML index will be included in the\
    \ Secondary XML index, providing performance improvements based on the types of\
    \ queries that are often run against the XML documents. For instance, if more\
    \ queries are accessing property elements, then the `PROPERTY` type for the Secondary\
    \ XML index would be appropriate.\n\n## Creating a Secondary XML Index\n\nGoing\
    \ back to our example query in Listing 4-2, the existing function call we are\
    \ using employs both a path and a value. Since we are first searching for a path\
    \ to check a value and other paths are not being accessed, we’ll create a Secondary\
    \ XML index using `PATH`. The syntax for the `CREATE INDEX` statement is provided\
    \ in Listing 4-5. Note that the `CREATE INDEX` syntax now includes a `USING` statement\
    \ that references the Primary XML index and has the `FOR PATH` clause.\n\n```sql\n\
    CREATE XML INDEX [SXML_Store_Demographics] ON [Sales].[Store] (Demographics)\n\
    USING XML INDEX [PXML_Store_Demographics]\nFOR PATH;\n```\n\n**Listing 4-5** \
    \ \nCreating a Secondary Index\n\n## Execution Plan Comparison\n\nOnce you have\
    \ created the Secondary XML index, we’ll run our example query from Listing 4-2\
    \ again to see how the execution plan is changed. As shown in Figure 4-4, the\
    \ execution plan is again dramatically improved. The estimated subtree cost has\
    \ been reduced by about half from 0.1535 to 0.0888, and the clustered index scan\
    \ on the Primary XML index is replaced with an index seek on the Secondary XML\
    \ index. Now the highest-cost item on the query is the clustered index scan on\
    \ the table’s clustered index. In essence, through the use of the Secondary XML\
    \ index, we’ve nearly removed the expense associated with accessing the XML data.\n\
    \n![XML query cost with Secondary XML index](images/338675_3_En_4_Chapter/338675_3_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4**  \nXML query cost with Secondary XML index\n\n## Index Size and\
    \ Structure\n\nWith the Secondary XML index, you’ll find that it will in some\
    \ cases be nearly as large as the Primary XML index. This is demonstrated by running\
    \ the code in Listing 4-4, which shows in Figure 4-5 that the same number of records\
    \ is in the Primary and Secondary XML indexes. In this case, this is to be expected\
    \ since all of the data in the XML documents is values at XML paths. The advantage\
    \ of the Secondary XML index in this case is an ordering based on those paths\
    \ that allow the XML indexes to be more selective, as previously discussed.\n\n\
    ![Physical stats after creating Secondary XML index](images/338675_3_En_4_Chapter/338675_3_En_4_Fig5_HTML.jpg)\n\
    \n**Figure 4-5**  \nPhysical stats after creating Secondary XML index\n\n## Maintaining\
    \ XML Indexes\n\nAlthough `sys.dm_db_index_physical_stats` is beneficial for finding\
    \ information needed to maintain all indexes, including XML indexes, there is\
    \ a system view specifically for XML indexing named `sys.xml_indexes`. This system\
    \ view shows all the options that have been applied to an XML index. Information\
    \ returned by the view can be useful in further maintaining an index, by knowing\
    \ the type and other options set. This view is inherited from `sys.indexes` and\
    \ returns the same columns and information as `sys.indexes`.\n\nAs shown in Figure\
    \ 4-6, the following additional columns also exist:\n\n![Results from sys.xml_indexes\
    \ query](images/338675_3_En_4_Chapter/338675_3_En_4_Fig6_HTML.jpg)\n\n**Figure\
    \ 4-6**  \nResults from `sys.xml_indexes` query\n\n- `using_xml_index_id`: The\
    \ parent index to a Secondary index. As discussed, Secondary indexes require a\
    \ Primary index to exist before creation. This column will be `NULL` for Primary\
    \ XML indexes and used only for Secondary indexes.\n- `secondary_type`: A flag\
    \ specifying the type upon which a Secondary index is based. Each Secondary index\
    \ is based on a specific type (`V` = `VALUE`, `P` = `PATH`, `R` = `PROPERTY`).\
    \ For Primary XML indexes, this column is `NULL`.\n- `secondary_type_desc`: A\
    \ description of the Secondary index type. The values for the description map\
    \ to those described in the `secondary_type` column.\n\n## Storage and Performance\
    \ Considerations\n\nWe need to consider the storage impact of Primary and Secondary\
    \ XML indexes because the more data that is in the table and the more often we\
    \ `INSERT`, `UPDATE`, and `DELETE` that data, the more of an impact these indexes\
    \ will have on those operations. You’ll want to weigh the performance improvement\
    \ of a Secondary XML index against the time it will take to maintain it to decide\
    \ whether to create the index. Strive to strike a balance between hardware resources,\
    \ storage, index usefulness, number of indexes created, and number of times an\
    \ index may actually be needed when building Primary and Secondary XML indexes."
  raw: '#### Secondary XML Index


    Secondary XML indexes provide the ability to further improve querying XML data.
    With Secondary XML indexes, you’ll choose between the PATH, VALUE, and PROPERTY
    types when building the index. What these options do is determine which elements
    from the Primary XML index will be included in the Secondary XML index. These
    options provide performance improvements based on the types of queries that are
    often run against the XML documents. For instance, if more queries are accessing
    property elements, then the PROPERTY type for the Secondary XML index would be
    appropriate.


    Going back to our example query in Listing [4-2](#338675_3_En_4_Chapter.xhtml#PC2),
    the existing function call we are using is using both a path and value. Since
    we are first searching for a path to check a value and other paths are not being
    accessed, we’ll create a Secondary XML index using PATH. The syntax for the CREATE
    INDEX statement is provided in Listing [4-5](#338675_3_En_4_Chapter.xhtml#PC5).
    Note that the CREATE INDEX syntax now includes a USING statement that references
    the Primary XML index and has the FOR PATH clause.


    ```

    CREATE XML INDEX [SXML_Store_Demographics] ON [Sales].[Store] (Demographics)

    USING XML INDEX [PXML_Store_Demographics]

    FOR PATH;

    Listing 4-5

    Creating a Secondary Index

    ```


    Once you have created the Secondary XML index, we’ll run our example query from
    Listing [4-2](#338675_3_En_4_Chapter.xhtml#PC2) again to see how the execution
    plan is changed. As shown in Figure [4-4](#338675_3_En_4_Chapter.xhtml#Fig4),
    the execution plan is again dramatically improved. The estimated subtree cost
    has been reduced by about half from 0.1535 to 0.0888, and the clustered index
    scan on the Primary XML index is replaced with an index seek on the Secondary
    XML index. Now the highest-cost item on the query is the clustered index scan
    on the table’s clustered index. In essence, through the use of the Secondary XML
    index, we’ve nearly removed the expense associated with accessing the XML data.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig4_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig4_HTML.jpg)


    Figure 4-4


    XML query cost with Secondary XML index


    With the Secondary XML index, you’ll find that it will in some cases be nearly
    as large as the Primary XML index. This is demonstrated by running the code in
    Listing [4-4](#338675_3_En_4_Chapter.xhtml#PC4), which shows in Figure [4-5](#338675_3_En_4_Chapter.xhtml#Fig5)
    that the same number of records is in the Primary and Secondary XML indexes. In
    this case, this is to be expected since all of the data in the XML documents is
    values at XML paths. The advantage of the Secondary XML index in this case is
    an ordering based on those paths that allow the XML indexes to be more selective,
    as previously discussed.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig5_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Physical stats after creating Secondary XML index


    Although `sys.dm_db_index_physical_stats` is beneficial for finding information
    needed to maintain all indexes, including XML indexes, there is a system view
    specifically for XML indexing named `sys.xml_indexes`. This system view shows
    all the options that have been applied to an XML index. Information returned by
    the view can be useful in further maintaining an index, by knowing the type and
    other options set. This view is inherited from `sys.indexes` and returns the same
    columns and information as `sys.indexes`. Shown in Figure [4-6](#338675_3_En_4_Chapter.xhtml#Fig6),
    the following additional columns also exist:


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig6_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Results from sys.xml_indexes query


    *   using_xml_index_id : The parent index to a Secondary index. As discussed,
    Secondary indexes require a Primary index to exist before creation. This column
    will be `NULL` for Primary XML indexes and used only for Secondary indexes.


    *   secondary_type: A flag specifying the type upon which a Secondary index is
    based. Each Secondary index is based on a specific type (`V` = `VALUE`, `P` =
    `PATH`, `R` = `PROPERTY`). For Primary XML indexes, this column is `NULL`.


    *   secondary_type_desc: A description of the Secondary index type. The values
    for the description map to those described in the `secondary_type` column.


    We need to consider the storage impact of Primary and Secondary XML indexes because
    the more data that is in the table and the more often we `INSERT`, `UPDATE`, and
    `DELETE` that data, the more of an impact these indexes will have on those operations.
    You’ll want to weigh the performance improvement of a Secondary XML index against
    the time it will take to maintain it to decide whether to create the index. Strive
    to strike a balance between hardware resources, storage, index usefulness, number
    of indexes created, and number of times an index may actually be needed when building
    Primary and Secondary XML indexes.'
  trans: "\n# 辅助 XML 索引\n\n辅助 XML 索引提供了进一步优化 XML 数据查询的能力。构建辅助 XML 索引时，您可以在`PATH`、`VALUE`和`PROPERTY`类型之间进行选择。这些选项决定了主\
    \ XML 索引中的哪些元素将被包含在辅助 XML 索引中，从而根据针对 XML 文档经常运行的查询类型来提供性能改进。例如，如果更多的查询正在访问属性元素，那么为辅助\
    \ XML 索引选择`PROPERTY`类型将是合适的。\n\n## 创建辅助 XML 索引\n\n回到我们示例查询（清单 4-2），我们当前使用的函数调用同时涉及路径和值。由于我们首先是搜索路径以检查值，并且没有访问其他路径，因此我们将使用`PATH`创建一个辅助\
    \ XML 索引。`CREATE INDEX`语句的语法如清单 4-5 所示。请注意，`CREATE INDEX`语法现在包含一个`USING`语句，该语句引用了主\
    \ XML 索引，并带有`FOR PATH`子句。\n\n```sql\nCREATE XML INDEX [SXML_Store_Demographics]\
    \ ON [Sales].[Store] (Demographics)\nUSING XML INDEX [PXML_Store_Demographics]\n\
    FOR PATH;\n```\n\n**清单 4-5**  \n创建辅助索引\n\n## 执行计划对比\n\n创建辅助 XML 索引后，我们将再次运行清单\
    \ 4-2 中的示例查询，以查看执行计划如何变化。如图 4-4 所示，执行计划再次得到了显著改善。估计的子树成本从 0.1535 降低到了 0.0888，降幅约一半，并且对主\
    \ XML 索引的聚集索引扫描被对辅助 XML 索引的索引查找所取代。现在查询中成本最高的项是对表聚集索引的聚集索引扫描。本质上，通过使用辅助 XML 索引，我们几乎消除了访问\
    \ XML 数据所带来的开销。\n\n![使用辅助 XML 索引的 XML 查询成本](img/338675_3_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4**  \n使用辅助 XML 索引的 XML 查询成本\n\n## 索引大小与结构\n\n使用辅助 XML 索引，您会发现它在某些情况下几乎与主\
    \ XML 索引一样大。通过运行清单 4-4 中的代码可以证明这一点，如图 4-5 所示，主索引和辅助 XML 索引中的记录数量相同。在这种情况下，这是意料之中的，因为\
    \ XML 文档中的所有数据都是 XML 路径上的值。在这种情况下，辅助 XML 索引的优势在于基于这些路径的排序，这使得 XML 索引更具选择性，如前所述。\n\
    \n![创建辅助 XML 索引后的物理统计信息](img/338675_3_En_4_Fig5_HTML.jpg)\n\n**图 4-5**  \n创建辅助\
    \ XML 索引后的物理统计信息\n\n## 维护 XML 索引\n\n虽然`sys.dm_db_index_physical_stats`对于查找维护所有索引（包括\
    \ XML 索引）所需的信息很有用，但还有一个专门用于 XML 索引的系统视图，名为`sys.xml_indexes`。此系统视图显示已应用于 XML 索引的所有选项。通过了解索引的类型和其他设置，该视图返回的信息对于进一步维护索引非常有用。此视图继承自`sys.indexes`，并返回与`sys.indexes`相同的列和信息。\n\
    \n如图 4-6 所示，还存在以下附加列：\n\n![sys.xml_indexes 查询结果](img/338675_3_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6**  \n`sys.xml_indexes`查询结果\n\n- `using_xml_index_id`：辅助索引的父索引。如前所述，辅助索引在创建前需要存在一个主索引。此列对于主\
    \ XML 索引为`NULL`，并且仅用于辅助索引。\n- `secondary_type`：指定辅助索引所基于类型的标志。每个辅助索引都基于特定类型（`V`\
    \ = `VALUE`, `P` = `PATH`, `R` = `PROPERTY`）。对于主 XML 索引，此列为`NULL`。\n- `secondary_type_desc`：辅助索引类型的描述。描述的值映射到`secondary_type`列中描述的值。\n\
    \n## 存储与性能考量\n\n我们需要考虑主索引和辅助 XML 索引的存储影响，因为表中的数据越多，我们对数据执行`INSERT`、`UPDATE`和`DELETE`操作的频率越高，这些索引对这些操作的影响就越大。您需要权衡辅助\
    \ XML 索引带来的性能提升与其维护所需的时间，以决定是否创建索引。在构建主索引和辅助 XML 索引时，努力在硬件资源、存储空间、索引实用性、创建的索引数量以及索引实际可能需要的次数之间取得平衡。\n"
- fmt: '## Selective XML Indexes


    Introduced in SQL Server 2012, Selective XML indexes address a significant problem
    with Primary/Secondary XML indexes. XML documents can be extremely large. Applying
    an index to the entire document has major performance implications both for creating
    the index and for maintaining it over time. Also, these excessively large indexes
    can add to the storage woes that are a frequent problem within organizations.
    Also, when an index becomes excessively large, it may not function as well as
    it did when it was smaller. Because of all this, the Selective XML index was introduced.


    Selective XML indexes allow you to define a subset of the XML document that you
    want to index. This makes for smaller, more agile indexes that are targeted to
    specific paths within the XML. When the index gets created, the document is parsed,
    and the XML is shredded. The shredded values are then stored in standard relational
    storage within your database. In addition to the Selective XML index, you can
    add Secondary indexes based on the nodes within the path that defines the Selective
    XML index.


    Selective XML indexes can achieve large performance benefits over a standard XML
    index. However, if you have ad hoc queries that may go for all sorts of different
    elements within the XML document, the standard XML index may perform much better.
    Also, if you have a large number of node paths, you may see better performance
    from the standard XML index.


    ### Creating a Selective XML Index


    To create a Selective XML index, you must meet the following criteria:


    *   The table must have a clustered primary key.

    *   The key size is limited to 128 bytes.

    *   The key columns are limited to 15.


    The Selective XML will not be used for `query()` or `modify()` method within your
    XQuery statements. It will support `exist()`, `value()`, and `nodes()`. If you
    use `query()` and `modify()` together, it will assist in a simple node lookup,
    but that’s all.


    To see the Selective XML index in action, you’ll need to create one. The script
    in Listing 4-6 creates a path within the Selective XML index. In this case, since
    we are only accessing annual sales in the XML document, we’ll limit our Selective
    XML index to that XML path.


    ```sql

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSales]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'');

    ```

    **Listing 4-6** Script for Creating a Selective XML Index


    After creating the Selective XML index, we’ll return to our example query from
    Listing 4-2 again to see the impact on the execution plan. As shown in Figure
    4-7, the estimated subtree cost is comparable to having the Secondary XML index
    in place, but it’s slightly more expensive with the Selective XML index. To understand
    why SQL Server made this choice, run the code in Listing 4-4 to see the storage
    footprint. As Figure 4-8 shows, the Selective XML index is substantially smaller
    than the Secondary XML index. Instead of potentially accessing 41 pages and 9,113
    records, the Selective XML index is limited to 701 records across 5 pages, which
    justifies the extra cost for the clustered index scan on the Selective XML index.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig8_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig8_HTML.jpg)

    **Figure 4-8** Physical stats after creating Selective XML index


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig7_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig7_HTML.jpg)

    **Figure 4-7** XML query cost with Selective XML index


    While this provides a much improved opportunity for XML indexing, there is an
    important restriction that should be considered. If your queries change to the
    point where the Selective XML index doesn’t cover the query, then performance
    will degrade. While this is an obvious statement, we don’t often have to consider
    this with indexes since traditionally indexes cover all data within a column.


    To demonstrate this scenario, let’s add another XML element to the query to filter
    on `BusinessType`. Shown in Listing 4-7, we’ll add the `exist()` to the `WHERE`
    clause and also drop the previously created Primary/Secondary XML indexes to prevent
    them from interfering with the output. Generally, if you have Selective XML indexes,
    you would not also have Primary/Secondary XML indexes.


    ```sql

    DROP INDEX IF EXISTS [SXML_Store_Demographics] ON [Sales].[Store];

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store];

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1

    AND Demographics.exist(''/StoreSurvey/BusinessType[.="OS"]'') = 1

    ```

    **Listing 4-7** Query on `[Sales].[Store]` for `AnnualSales` and `BusinessType`


    After running the code in Listing 4-7, we see that the performance of the query
    has degraded substantially. The reason for the degradation is the inclusion of
    the `XML Reader` with `XPath` filter, which increases the estimated subtree cost,
    as shown in Figure 4-9. This isn’t as terrible as the first iteration we had with
    this query, because the Selective XML index is still assisting with reducing the
    number of records where the entire XML document needs to be scanned with the function.
    But it is a degradation, and with large tables, this could cause a significant
    issue.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig9_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig9_HTML.jpg)

    **Figure 4-9** XML query cost with Selective XML index and XML element not included


    ### Extending the Selective XML Index


    Fortunately, Selective XML indexes provide flexibility to get around and tune
    for issues such as this. Specifically, the `FOR` clause, shown in Listing 4-8,
    can be extended to include multiple XML nodes and paths. In this case, we are
    adding `BusinessType` to the index. As expected, and shown in Figure 4-10, the
    change in this index improves the performance of the query by dropping the estimated
    subtree cost to 0.108 by adding a second clustered index scan operation on the
    Selective XML index.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig10_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig10_HTML.jpg)

    **Figure 4-10** XML query cost with Selective XML index on two elements


    ```sql

    DROP INDEX IF EXISTS [SEL_XML_Store_Demographics_AnnualSales] ON [Sales].[Store];

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSalesBusinessType]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'',

    BusinessType = ''/StoreSurvey/BusinessType'');

    ```

    **Listing 4-8** Script for Creating a Selective XML Index


    And as we’ve looked at previously, we’ll again review the storage impact of extending
    the index by running Listing 4-4. Reviewing Figure 4-11, we see that even by increasing
    the number of elements in the index, we haven’t significantly changed the storage
    footprint of the index. It’s still 701 records across 6, instead of 5, pages.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig11_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig11_HTML.jpg)

    **Figure 4-11** Physical stats after creating Selective XML index on two elements'
  raw: '### Selective XML Indexes


    Introduced in SQL Server 2012, Selective XML indexes address a significant problem
    with Primary/Secondary XML indexes. XML documents can be extremely large. Applying
    an index to the entire document has major performance implications both for creating
    the index and for maintaining it over time. Also, these excessively large indexes
    can add to the storage woes that are a frequent problem within organizations.
    Also, when an index becomes excessively large, it may not function as well as
    it did when it was smaller. Because of all this, the Selective XML index was introduced.


    Selective XML indexes allow you to define a subset of the XML document that you
    want to index. This makes for smaller, more agile indexes that are targeted to
    specific paths within the XML. When the index gets created, the document is parsed,
    and the XML is shredded. The shredded values are then stored in standard relational
    storage within your database. In addition to the Selective XML index, you can
    add Secondary indexes based on the nodes within the path that defines the Selective
    XML index.


    Selective XML indexes can achieve large performance benefits over a standard XML
    index. However, if you have ad hoc queries that may go for all sorts of different
    elements within the XML document, the standard XML index may perform much better.
    Also, if you have a large number of node paths, you may see better performance
    from the standard XML index.


    To create a Selective XML index, you must meet the following criteria:


    *   The table must have a clustered primary key.


    *   The key size is limited to 128 bytes.


    *   The key columns are limited to 15.


    The Selective XML will not be used for `query()` or `modify()` method within your
    XQuery statements. It will support `exist()`, `value()`, and `nodes()`. If you
    use `query()` and `modify()` together, it will assist in a simple node lookup,
    but that’s all.


    To see the Selective XML index in action, you’ll need to create one. The script
    in Listing [4-6](#338675_3_En_4_Chapter.xhtml#PC6) creates a path within the Selective
    XML index. In this case, since we are only accessing annual sales in the XML document,
    we’ll limit our Selective XML index to that XML path.


    ```

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSales]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'');

    Listing 4-6

    Script for Creating a Selective XML Index

    ```


    After creating the Selective XML index, we’ll return to our example query from
    Listing [4-2](#338675_3_En_4_Chapter.xhtml#PC2) again to see the impact on the
    execution plan. As shown in Figure [4-7](#338675_3_En_4_Chapter.xhtml#Fig7), the
    estimated subtree cost is comparable to having the Secondary XML index in place,
    but it’s slightly more expensive with the Selective XML index. To understand why
    SQL Server made this choice, run the code in Listing [4-4](#338675_3_En_4_Chapter.xhtml#PC4)
    to see the storage footprint. As Figure [4-8](#338675_3_En_4_Chapter.xhtml#Fig8)
    shows, the Selective XML index is substantially smaller than the Secondary XML
    index. Instead of potentially accessing 41 pages and 9,113 records, the Selective
    XML index is limited to 701 records across 5 pages, which justifies the extra
    cost for the clustered index scan on the Selective XML index.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig8_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Physical stats after creating Selective XML index


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig7_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig7_HTML.jpg)


    Figure 4-7


    XML query cost with Selective XML index


    While this provides a much improved opportunity for XML indexing, there is an
    important restriction that should be considered. If your queries change to the
    point where the Selective XML index doesn’t cover the query, then performance
    will degrade. While this is an obvious statement, we don’t often have to consider
    this with indexes since traditionally indexes cover all data within a column.


    To demonstrate this scenario, let’s add another XML element to the query to filter
    on BusinessType. Shown in Listing [4-7](#338675_3_En_4_Chapter.xhtml#PC7), we’ll
    add the exist() to the WHERE clause and also drop the previously created Primary/Secondary
    XML indexes to prevent them from interfering with the output. Generally, if you
    have Selective XML indexes, you would not also have Primary/Secondary XML indexes.


    ```

    DROP INDEX IF EXISTS [SXML_Store_Demographics] ON [Sales].[Store];

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store];

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1

    AND Demographics.exist(''/StoreSurvey/BusinessType[.="OS"]'') = 1

    Listing 4-7

    Query on [Sales].[Store] for AnnualSales and BusinessType

    ```


    After running the code in Listing [4-7](#338675_3_En_4_Chapter.xhtml#PC7), we
    see that the performance of the query has degraded substantially. The reason for
    the degradation is the inclusion of the XML Reader with XPath filter, which increases
    the estimated subtree cost, as shown in Figure [4-9](#338675_3_En_4_Chapter.xhtml#Fig9).
    This isn’t as terrible as the first iteration we had with this query, because
    the Selective XML index is still assisting with reducing the number of records
    where the entire XML document needs to be scanned with the function. But it is
    a degradation, and with large tables, this could cause a significant issue.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig9_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig9_HTML.jpg)


    Figure 4-9


    XML query cost with Selective XML index and XML element not included


    Fortunately, Selective XML indexes provide flexibility to get around and tune
    for issues such as this. Specifically, the FOR clause, shown in Listing [4-8](#338675_3_En_4_Chapter.xhtml#PC8),
    can be extended to include multiple XML nodes and paths. In this case, we are
    adding BusinessType to the index. As expected, and shown in Figure [4-10](#338675_3_En_4_Chapter.xhtml#Fig10),
    the change in this index improves the performance of the query by dropping the
    estimated subtree cost to 0.108 by adding a second clustered index scan operation
    on the Selective XML index.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig10_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig10_HTML.jpg)


    Figure 4-10


    XML query cost with Selective XML index on two elements


    ```

    DROP INDEX IF EXISTS [SEL_XML_Store_Demographics_AnnualSales] ON [Sales].[Store];

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSalesBusinessType]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'',

    BusinessType = ''/StoreSurvey/BusinessType'');

    Listing 4-8

    Script for Creating a Selective XML Index

    ```


    And as we’ve looked at previously, we’ll again review the storage impact of extending
    the index by running Listing [4-4](#338675_3_En_4_Chapter.xhtml#PC4). Reviewing
    Figure [4-11](#338675_3_En_4_Chapter.xhtml#Fig11), we see that even by increasing
    the number of elements in the index, we haven’t significantly changed the storage
    footprint of the index. It’s still 701 records across 6, instead of 5, pages.


    ![../images/338675_3_En_4_Chapter/338675_3_En_4_Fig11_HTML.jpg](images/338675_3_En_4_Chapter/338675_3_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Physical stats after creating Selective XML index on two elements'
