    Reviewing the results in Figure [3-6](#338675_3_En_3_Chapter.xhtml#Fig6) provides
    some interesting insight into how the `modification_counter` column is populated.
    To summarize, any insert, update, or delete is considered a single change for
    the index and statistics. Looking at the results for query 1, the 40 rows changed
    the result in `modification_counter` for `CIX_SalesOrderHeaderStats_OrderDate`
    to increase to 40. Similarly, when `SalesOrderNumber` is changed in queries 2
    and 3, each query results in an increase of 50 to `modification_counter`, whether
    the value changed or not. Increasing the number of records causes all three indexes
    to increase the `modification_counter` value by 11,465, which coincides with the
    number of records inserted. Finally, in the query 5 results, you see the 20,000
    records were deleted. Interestingly enough, in the results for the last query,
    the statistics from `CIX_SalesOrderHeaderStats` were updated to better reflect
    the changes in values in the index.


