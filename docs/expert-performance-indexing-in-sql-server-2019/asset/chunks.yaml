    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    Listing 13-18

    Add Events and Columns to SQL Trace Session

    ```


    The next step is to filter out unneeded events from the SQL Trace session. There
    is no need to collect all statements all the time for all databases and all applications
    with every SQL Trace session. In fact, in Listing [13-19](#338675_3_En_13_Chapter.xhtml#PC19),
    events from the system databases, those with a database ID less than 5, are removed
    from the session. The stored procedure for filtering SQL Trace sessions is `sp_trace_setfilter`.
    The stored procedure accepts the ID for columns from `sys.trace_columns`. Columns
    not included in the events can be filtered, and filters apply to all events.


    ```

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    Listing 13-19

    Add Filters to SQL Trace Session

    ```


    The last step in setting up the monitoring for SQL Trace is to start the trace.
    This task is accomplished using the `sp_trace_setstatus` stored procedure, shown
    in Listing [13-20](#338675_3_En_13_Chapter.xhtml#PC20). Through this procedure,
    SQL Trace sessions can be started, paused, and stopped. Once the trace is started,
    it will start to create .`trc` files in the file location provided, and the configuration
    for SQL Trace monitoring will be complete. When the collection period for the
    SQL Trace session completes, this script will be used with the status code 2 instead
    of 1 to terminate the session. Listing [13-21](#338675_3_En_13_Chapter.xhtml#PC21)
    provides this script.


    ```

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    Listing 13-20

    Start SQL Trace Session

    ```


    ### Note


    SQL Server experts often find it unfashionable to use the Database Engine Tuning
    Advisor, preferring instead to manually analyze the database and determine the
    indexes needed. This bias misses the opportunity to uncover low-hanging fruit
    or situations where changing the location of the clustered index can improve performance.


    ```

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    Listing 13-21

    Stop SQL Trace Session

    ```


    The SQL Trace session example in this section is fairly basic. In your environment,
    we may need to have a more intelligent process that collects information in each
    trace file for a specified amount of time instead of using a file size to control
    the file rollover rate. These types of changes to collecting information from
    SQL Trace for monitoring indexes should have no impact on your ability to use
    the SQL Trace information for the purposes intended later in this chapter. There
    is one last item to consider with the SQL Trace information. Trace information
    does not need to constantly be gathered, like performance counter and DMO information.
    Instead, the SQL Trace information is often better suited to being collected for
    a 4–8-hour period that represents a regular day of activity on your database platform.
    With SQL Trace, we can collect too much information, which can overwhelm the analyze
    phase and delay indexing recommendations.'
  trans: '## 添加事件和列到 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

    EXEC sp_trace_setevent @TraceID, 10, 17, @on;

    EXEC sp_trace_setevent @TraceID, 10, 18, @on;

    EXEC sp_trace_setevent @TraceID, 10, 3, @on;

    EXEC sp_trace_setevent @TraceID, 10, 35, @on;

    EXEC sp_trace_setevent @TraceID, 10, 6, @on;

    EXEC sp_trace_setevent @TraceID, 10, 8, @on;

    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    Listing 13-18

    向 SQL Trace 会话添加事件和列

    ```


    下一步是从 SQL Trace 会话中过滤掉不需要的事件。没有必要在所有数据库和所有应用程序的每次 SQL Trace 会话中始终收集所有语句。事实上，在清单
    13-19 中，来自系统数据库（数据库 ID 小于 5）的事件已从会话中移除。用于过滤 SQL Trace 会话的存储过程是 `sp_trace_setfilter`。该存储过程接受来自
    `sys.trace_columns` 的列 ID。可以过滤未包含在事件中的列，并且筛选器适用于所有事件。


    ## 向 SQL Trace 会话添加筛选器


    ```sql

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    Listing 13-19

    向 SQL Trace 会话添加筛选器

    ```


    设置 SQL Trace 监控的最后一步是启动跟踪。此任务使用 `sp_trace_setstatus` 存储过程完成，如清单 13-20 所示。通过此过程，可以启动、暂停和停止
    SQL Trace 会话。一旦跟踪启动，它将在提供的文件位置开始创建 `.trc` 文件，SQL Trace 监控的配置即告完成。当 SQL Trace 会话的收集期结束时，将使用状态代码
    2（而非 1）运行此脚本来终止会话。清单 13-21 提供了此脚本。


    ## 启动 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    Listing 13-20

    启动 SQL Trace 会话

    ```


    ### 注意


    SQL Server 专家通常认为使用数据库引擎优化顾问不够时髦，更愿意手动分析数据库并确定所需索引。这种偏见错过了发现容易实现的成果或通过更改聚集索引位置来提高性能的情况。


    ## 停止 SQL Trace 会话


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    Listing 13-21

    停止 SQL Trace 会话

    ```


    本节中的 SQL Trace 会话示例相当基础。在您的环境中，我们可能需要一个更智能的进程，该进程在指定的时间段内收集每个跟踪文件中的信息，而不是使用文件大小来控制文件滚动速率。这些对从
    SQL Trace 收集信息以进行监控的更改，应该不会影响您在本章后续部分按预期目的使用 SQL Trace 信息的能力。关于 SQL Trace 信息，还有最后一项需要考虑。跟踪信息不需要像性能计数器和
    DMO 信息那样持续收集。相反，SQL Trace 信息通常更适合收集 4-8 小时，这段时间代表了您的数据库平台上常规的一天活动。使用 SQL Trace，我们可能收集过多信息，这会使分析阶段不堪重负并延迟索引建议。'
- fmt: '## Extended Events


    Extended Events，在 SQL Server 2008 中引入，是 SQL Server 中首选的跟踪工具；它的功能更强大，但奇怪的是不如 SQL
    Trace 流行。如果可以选择，请使用 Extended Events 而不是 SQL Trace 创建跟踪。有两种方法可以创建 Extended Events
    会话。第一种是通过 T-SQL，本章将进行演示。第二种方法是在 SQL Server Management Studio 中使用包含向导的 GUI 来构建新会话；该
    GUI 在 SQL Server 2012 中引入，因此已经存在了相当长的时间。在会话创建方面的最佳实践在很大程度上与 SQL Trace 相同。例如，请务必在数据和日志文件所在驱动器以外的驱动器上收集会话日志。


    我们将在 Extended Events 中创建的跟踪将收集与 SQL Trace 相同的通用信息。主要区别将是会话的创建方式以及事件和列的某些名称。代替
    `RPC:Completed` 和 `SQL:BatchCompleted`，在 Extended Events 中要捕获的事件分别是 `rpc_completed`
    和 `sql_batch_completed`。这些事件各自捕获自己的列或数据元素集，这些列在表 13-3 中列出。


    **表 13-3**


    **Extended Events 列**


    | 事件 | 列 |

    | --- | --- |

    | `rpc_completed` | •    `connection_reset_option`•    `cpu_time`•    `data_stream`•    `duration`•    `logical_reads`•    `object_name`•    `output_parameters`•    `physical_reads`•    `result`•    `row_count`•    `statement`•    `writes`
    |

    | `sql_batch_completed` | •    `batch_text`•    `cpu_time`•    `duration`•    `logical_reads`•    `physical_reads`•    `result`•    `row_count`•    `writes`
    |


    此外，我们将在 Extended Events 会话中包含一些作为全局字段或操作提供的附加数据，这些字段可用于扩展每个事件中包含的默认信息。这些类似于上一个
    SQL Trace 会话中包含的元素。要包含的全局字段是：


    *   `client_app_name`

    *   `client_hostname`

    *   `database_id`

    *   `database_name`

    *   `nt_username`

    *   `process_id`

    *   `session_id`

    *   `sql_text`

    *   `username`


    定义了会话后，下一步是创建会话。Extended Events 利用 T-SQL 数据定义语言（DDL）而不是存储过程来创建会话。清单 13-22 中的代码提供了会话的
    DDL 并启动了会话。对于添加的每个事件，使用 `ADD EVENT` 语法，并使用 `ACTION` 子句包含全局字段。为方便起见，会话被设计为将输出存储在
    SQL Server 的默认日志文件夹中，文件名为 `EventTracingforIndexTuning`。


    ```sql

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    ```


    **清单 13-22 创建并启动 Extended Events 会话**


    与 SQL Trace 会话类似，Extended Events 会话可以启动和停止。没有必要暂停它们，因为会话的元数据独立于会话是否正在运行而存在。清单
    13-22 包含启动跟踪的语法。清单 13-23 显示了停止跟踪的代码。此外，如果 SQL Server 重新启动，Extended Events 跟踪会话将被保留，并且可以配置为重新启动，这与在重新启动时消失的
    SQL Trace 不同。


    ```sql

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    ```


    **清单 13-23 停止 Extended Events 会话**


    这个 Extended Events 会话相当简单。它的优点是能够轻松捕获 SQL Server 实例的工作负载。使用来自跟踪的工作负载，我们可以开始了解
    SQL Server 是如何被查询的，以及将有助于改善环境性能的索引类型。


    ## Query Store


    Query Store 在 SQL Server 2016 中引入，是一个每个数据库的数据存储，包含执行计划信息和相关的执行统计信息。虽然它不一定提供直接的索引调优信息，但此功能的未来发展可能会提供自动索引功能。这是基于
    Azure SQL Database 中 SQL Server 现有的可用更改，详情请参阅 [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-server-ver15%2523automatic-index-management)。如前所述，在撰写本文时，此功能在
    SQL Server 2019 中不可用。


    尽管缺乏直接的索引监控优势，但 Query Store 中有一些功能对于索引非常有用。首先，由于它类似于计划缓存，因此可以修改用于计划缓存的查询以与 Query
    Store 一起使用。在大多数情况下，这将返回与计划缓存相同的信息。使用 Query Store 的另一个好处是，在执行计划因性能提升而被其他执行计划替换的情况下，有时可能与索引相关。这可能是由于索引的统计信息不佳，或者缺乏最佳索引来提供所需的性能而不替换计划。对于这两种情况，通过监控
    Query Store 活动来识别这些性能问题，可以深入了解环境中所需的索引。


    出于监控索引的目的，这些原因提供了另一个值得利用 Query Store 的理由。要在数据库上启用 Query Store，请使用清单 13-24 中的代码。虽然深入探讨
    Query Store 本身超出了本书的范围，但在数据收集频率、存储数据量、丢弃数据的速率以及 Query Store 当前是否可写等方面，具有很大的灵活性。绝对值得进一步阅读
    Apress 出版的关于 SQL Server 2019 的 Query Store 的资料。


    ```sql

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    ```


    **清单 13-24 在 AdventureWorks2017 上启用 Query Store**


    ## 总结


    在本章中，我们介绍了监控索引的步骤。监控索引是一般平台监控的延伸，但它是为确定我们是否有合适的索引以及分析索引提供基础的重要部分。通过监控，我回顾了如何收集动态管理数据和性能计数器。在下一章中，我们将研究如何应用这些信息来分析我们是否有正确的索引。'
  raw: '### Extended Events


    Extended Events , introduced in SQL Server 2008, is the preferred tracing tool
    in SQL Server; it’s more functional but oddly less popular than SQL Trace. Given
    the opportunity to choose, create traces with Extended Events over SQL Trace.
    There are two ways to create Extended Events sessions. The first is through T-SQL,
    which will be demonstrated in this chapter. The second uses a GUI in SQL Server
    Management Studio that includes wizards for building a new session; the GUI was
    introduced in SQL Server 2012, so it’s been around quite some time. The best practices
    in session creation are the same as SQL Trace for the most part. For instance,
    be sure to collect session logs on drives other than those in which data and log
    files are stored.


    The trace we’ll create in Extended Events will collect the same general information
    as SQL Trace. The main differences will be how the session is created and some
    of the names of events and columns. Instead of RPC:Completed and SQL:BatchCompleted,
    the events to capture in Extended Events are `rpc_completed` and `sql_batch_completed`,
    respectively. Each of these events captures their own set of columns, or data
    elements, which are listed in Table [13-3](#338675_3_En_13_Chapter.xhtml#Tab3).


    Table 13-3


    Extended Events Columns


    | Event | Columns |

    | --- | --- |

    | `rpc_completed` | •    `connection_reset_option`•    `cpu_time`•    `data_stream`•    `duration`•    `logical_reads`•    `object_name`•    `output_parameters`•    `physical_reads`•    `result`•    `row_count`•    `statement`•    `writes`
    |

    | `sql_batch_completed` | •    `batch_text`•    `cpu_time`•    `duration`•    `logical_reads`•    `physical_reads`•    `result`•    `row_count`•    `writes`
    |


    Additionally, we’ll include some additional data in the Extended Events session
    that is available as global fields, or actions, which can be used to extend the
    default information included in each event. These are similar to the elements
    included in the SQL Trace session from the previous session. The global fields
    to be included are


    *   `client_app_name`


    *   `client_hostname`


    *   `database_id`


    *   `database_name`


    *   `nt_username`


    *   `process_id`


    *   `session_id`


    *   `sql_text`


    *   `username`


    With the session defined, the next step is to create the sessions. Extended Events
    leverages the T-SQL data definition language (DDL) instead of stored procedures
    to create sessions. The code in Listing [13-22](#338675_3_En_13_Chapter.xhtml#PC22)
    provides the DDL for the session and starts the session. For each event added,
    the `ADD EVENT` syntax is used, and the `ACTION` clause is used to include the
    global fields. For convenience, the session is designed to store the output in
    the default log folder for SQL Server in the file `EventTracingforIndexTuning`.


    ```

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    Listing 13-22

    Create and Start Extended Events Session

    ```


    Similar to SQL Trace sessions, Extended Events sessions can be started and stopped.
    There is no need to pause them since the metadata for a session exists independent
    from whether the session is running. Listing [13-22](#338675_3_En_13_Chapter.xhtml#PC22)
    includes the syntax for starting the trace. Listing [13-23](#338675_3_En_13_Chapter.xhtml#PC23)
    shows the code to stop the trace. Additionally, if SQL Server restarts, the Extended
    Events tracing session will be retained and can be configured to restart, unlike
    SQL Trace which disappears on restart.


    ```

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    Listing 13-23

    Create and Start Extended Events Session

    ```


    This Extended Events session is pretty simple. The nice thing about it is its
    ability to easily capture workloads from your SQL Server instances. Using the
    workloads from tracing, we can begin to understand how the SQL Server is being
    queried and the types of indexes that will help improve the performance of our
    environment.


    ## Query Store


    Introduced in SQL Server 2016, Query Store is a per-database data store that contains
    execution plan information and related execution statistics. While it doesn’t
    necessarily provide direct index tuning information, advances in this feature
    may provide automated indexing capabilities in the future. This is based on the
    existing changes available to SQL Server in Azure SQL Database, which is detailed
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-server-ver15%2523automatic-index-management).
    As previously noted, this feature is not available in SQL Server 2019 at the time
    of this writing.


    Despite the lack of direct index monitoring benefits, there are a few things that
    can be useful for indexing within the Query Store. The first is that since it
    is similar to the plan cache, queries used against the plan cache can be modified
    to use with the Query Store. In most cases, this will return the same information
    as the plan cache. An additional benefit to using Query Store is that in situations
    where execution plans are being replaced by other execution plans for improved
    performance, this can sometimes be index-related. This could be due to poor statistics
    available for the indexes or a lack of the best indexes to provide desired performance
    without replace plans. For either scenario, identifying these performance issues
    by monitoring Query Store activity can provide insight into indexes needed in
    an environment.


    For the purposes of monitoring indexes, those reasons provide an additional worthwhile
    reason to leverage Query Store. To enable Query Store on a database, leverage
    the code in Listing [13-24](#338675_3_En_13_Chapter.xhtml#PC24). While a deep
    dive into Query Store is itself outside the context of this book, there is a lot
    of flexibility that can be leveraged around how frequently data is collected,
    how much data is stored, what the rate of dropping data is, and whether the Query
    Store is currently writable. It is definitely worthwhile to read further in Query
    Store for SQL Server 2019 by Apress.


    ```

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    Listing 13-24

    Enable Query Store on AdventureWorks2017

    ```


    ## Summary


    In this chapter, we walked through the steps to monitor your indexes. Monitoring
    indexes is an extension of general platform monitoring but an important part of
    providing the foundation for determining whether we have the right indexes and
    for analyzing your indexes. Through the monitoring, I reviewed how to gather dynamic
    management data and performance counters. In the next chapter, we’ll look at how
    we can apply this information to analyze whether we have the right indexes.'
  trans: '

    ## 扩展事件


    扩展事件（Extended Events），在 SQL Server 2008 中引入，是 SQL Server 中首选的跟踪工具；它的功能更强大，但奇怪的是不如
    SQL Trace 流行。如果可以选择，请使用 Extended Events 而不是 SQL Trace 创建跟踪。有两种方法可以创建 Extended
    Events 会话。第一种是通过 T-SQL，本章将进行演示。第二种方法是在 SQL Server Management Studio 中使用包含向导的 GUI
    来构建新会话；该 GUI 在 SQL Server 2012 中引入，因此已经存在了相当长的时间。在会话创建方面的最佳实践在很大程度上与 SQL Trace
    相同。例如，请务必在数据和日志文件所在驱动器以外的驱动器上收集会话日志。


    我们将在 Extended Events 中创建的跟踪将收集与 SQL Trace 相同的通用信息。主要区别将是会话的创建方式以及事件和列的某些名称。代替
    `RPC:Completed` 和 `SQL:BatchCompleted`，在 Extended Events 中要捕获的事件分别是 `rpc_completed`
    和 `sql_batch_completed`。这些事件各自捕获自己的列或数据元素集，这些列在表 13-3 中列出。


    **表 13-3**


    **扩展事件列**


    | 事件 | 列 |

    | --- | --- |

    | `rpc_completed` | •    `connection_reset_option`•    `cpu_time`•    `data_stream`•    `duration`•    `logical_reads`•    `object_name`•    `output_parameters`•    `physical_reads`•    `result`•    `row_count`•    `statement`•    `writes`
    |

    | `sql_batch_completed` | •    `batch_text`•    `cpu_time`•    `duration`•    `logical_reads`•    `physical_reads`•    `result`•    `row_count`•    `writes`
    |


    此外，我们将在 Extended Events 会话中包含一些作为全局字段或操作提供的附加数据，这些字段可用于扩展每个事件中包含的默认信息。这些类似于上一个
    SQL Trace 会话中包含的元素。要包含的全局字段是：


    *   `client_app_name`

    *   `client_hostname`

    *   `database_id`

    *   `database_name`

    *   `nt_username`

    *   `process_id`

    *   `session_id`

    *   `sql_text`

    *   `username`


    定义了会话后，下一步是创建会话。Extended Events 利用 T-SQL 数据定义语言（DDL）而不是存储过程来创建会话。清单 13-22 中的代码提供了会话的
    DDL 并启动了会话。对于添加的每个事件，使用 `ADD EVENT` 语法，并使用 `ACTION` 子句包含全局字段。为方便起见，会话被设计为将输出存储在
    SQL Server 的默认日志文件夹中，文件名为 `EventTracingforIndexTuning`。


    ```sql

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    ```


    **清单 13-22 创建并启动扩展事件会话**


    与 SQL Trace 会话类似，扩展事件会话可以启动和停止。没有必要暂停它们，因为会话的元数据独立于会话是否正在运行而存在。清单 13-22 包含启动跟踪的语法。清单
    13-23 显示了停止跟踪的代码。此外，如果 SQL Server 重新启动，扩展事件跟踪会话将被保留，并且可以配置为重新启动，这与在重新启动时消失的 SQL
    Trace 不同。


    ```sql

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    ```


    **清单 13-23 停止扩展事件会话**


    这个扩展事件会话相当简单。它的优点是能够轻松捕获 SQL Server 实例的工作负载。使用来自跟踪的工作负载，我们可以开始了解 SQL Server 是如何被查询的，以及将有助于改善环境性能的索引类型。


    ## 查询存储


    查询存储（Query Store）在 SQL Server 2016 中引入，是一个每个数据库的数据存储，包含执行计划信息和相关的执行统计信息。虽然它不一定提供直接的索引调优信息，但此功能的未来发展可能会提供自动索引功能。这是基于
    Azure SQL Database 中 SQL Server 现有的可用更改，详情请参阅 [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-server-ver15%2523automatic-index-management)。如前所述，在撰写本文时，此功能在
    SQL Server 2019 中不可用。


    尽管缺乏直接的索引监控优势，但查询存储中有一些功能对于索引非常有用。首先，由于它类似于计划缓存，因此可以修改用于计划缓存的查询以与查询存储一起使用。在大多数情况下，这将返回与计划缓存相同的信息。使用查询存储的另一个好处是，在执行计划因性能提升而被其他执行计划替换的情况下，有时可能与索引相关。这可能是由于索引的统计信息不佳，或者缺乏最佳索引来提供所需的性能而不替换计划。对于这两种情况，通过监控查询存储活动来识别这些性能问题，可以深入了解环境中所需的索引。


    出于监控索引的目的，这些原因提供了另一个值得利用查询存储的理由。要在数据库上启用查询存储，请使用清单 13-24 中的代码。虽然深入探讨查询存储本身超出了本书的范围，但在数据收集频率、存储数据量、丢弃数据的速率以及查询存储当前是否可写等方面，具有很大的灵活性。绝对值得进一步阅读
    Apress 出版的关于 SQL Server 2019 的查询存储的资料。


    ```sql

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    ```


    **清单 13-24 在 AdventureWorks2017 上启用查询存储**


    ## 总结


    在本章中，我们介绍了监控索引的步骤。监控索引是一般平台监控的延伸，但它是为确定我们是否有合适的索引以及分析索引提供基础的重要部分。通过监控，我回顾了如何收集动态管理数据和性能计数器。在下一章中，我们将研究如何应用这些信息来分析我们是否有正确的索引。

    '
- fmt: '# 14. `Index Analysis`


    In the previous chapter, we discussed what information should be collected when
    monitoring indexes. All of that information is necessary for the next piece of
    indexing your databases, which is determining which indexes to apply. In this
    chapter, we will take all the information gathered while monitoring and use it
    to analyze the state of performance and the value of the existing indexes. The
    end goal of the index analysis is to build a list of indexes to create, modify,
    and, potentially, drop from the databases. In many cases, the analysis of the
    indexes will appear to border on art. There are many decisions in which you will
    use previous performance to anticipate future indexing needs. In the end, though,
    with every change proposed, there will be supporting evidence before and after
    the indexing solutions to statistically support or disprove the value of the index
    which makes index analysis more science than art.


    The general process of index analysis is broken out into a number of components.
    Each component contains a process in which the analysis will start from high levels
    to identify the needed focus and hone the analysis into existing issues. The analysis
    components are as follows:


    *   Review of `server state`


    *   `Schema discovery`


    *   `Database Engine Tuning Advisor`


    *   Unused indexes


    *   Index plan usage


    Before any exercise in analyzing the indexes of a database can take place, we
    first need to know the current deployment state. The tactics that can be used
    for a database in deployment vs. a database already deployed to the production
    environment will be roughly the same. There is a significant difference between
    the two, though, when it comes to where and how the statistics are gathered.


    For a database that has not been developed, the focus will be on how users are
    expected to use the database and application after it is deployed. Tests and workloads
    against the database will focus on validating that the indexing in the database
    supports those activities. The activity that is chosen for the testing will likely
    be the result of estimations and projections of what users will do with the application.
    Determining the activity will be the responsibility of the business analysts who
    develop the requirements for the application.


    Once the database has been deployed, the monitoring shifts from what the activity
    could be to what the activity is. The rate in which users adopt features and what
    the distribution of the data is with that activity will be known. At this point,
    the indexes developed during testing and planning may not be correct for the workload.
    The first round of using the `Indexing Method` on the database after deployment
    may lead to significant indexing changes. The key with indexing databases that
    have been deployed is that the analysis needs to be against the statistics of
    the workload in production. Doing so will provide the necessary guidance for implementing
    indexes that provide the best benefit to the database and pair them with the features
    that users are using and the frequency in which they use them.


    Going through the index analysis with databases in either deployment state will
    provide a set of indexes that are optimal for what is currently known and understood
    about the database. When the indexes are applied, your mileage with them can,
    and will, vary. An index may provide the perfect access path for data for the
    activity in the database last month. But with the new release, new clients, or
    changes in user behavior, they may not continue to be optimal. As is often heard
    with stock purchases, past performance does not dictate future results.


    Fortunately, with a well-practiced use of the `Indexing Method`, we will be able
    to provide the indexing your environment needs. In this chapter, the focus is
    on databases that are already deployed to production. As mentioned, these tactics
    will work with databases and servers in both states, development and production,
    but for simplicity, a production environment will be the default perspective and
    approach.


    As we move through each of the areas in the index analysis, we will get a list
    of indexes to either create, modify, delete, or investigate further. For the indexes
    that require further investigation, we will use subsequent portions of the index
    analysis process to determine how to progress and handle the index.


    ### Note


    In this chapter, it will be important to run the monitoring scripts from Chapter
    `13` between the scripts that create the workload and the queries to review the
    statistics. Depending on the schedule used for collecting the statistics, it could
    be hours before the statistics are collected which will prevent the queries for
    statistics from providing the anticipated results.


    ## Review of `Server State`


    The first step in index analysis is to review the state of the server. Review
    both the host server environment and the `SQL Server` instance environment to
    identify whether there are conditions indicating that there may be indexing issues.
    By starting at a high level and not looking directly at tables and individual
    indexes, we can avoid getting blinded by the trees in the forest. Often, when
    there are hundreds of indexes in dozens of databases, it is easy to get overly
    focused on an index or table that looks poorly indexed, only to later discover
    that the table has fewer than a hundred rows in a database with billions of rows
    in other tables.


    When analyzing the server state, we will look at the following three areas:


    *   `Performance counters`


    *   `Wait statistics`


    *   `Buffer allocation`


    Each of these areas provides an idea of where to start focusing the index analysis
    process. They let the database platform determine where the performance issues
    related to indexing may reside.


    ### `Performance Counters`


    The first set of information collected for index monitoring included the `performance
    counters`. Naturally, we want to look at these `performance counters` first when
    performing index analysis. Tracking `performance counters` over a monitoring period
    and over time will not provide prescriptive guidance on what to do about indexing
    issues, but it will provide a point for discovering performance issues and thus
    where to begin.


    For each of the counters, we’ll discuss some general guidelines. These guidelines
    are generalities that should be taken with a grain of salt. Use them to initially
    guide whether the counter is outside what might be normal on other database platforms.
    If there is a reason that counters on your platform trend higher than typical,
    that is the purpose of maintaining the baseline tables. Work with the counter
    values that are valid for your environment as opposed to those that work best
    for others.


    There are two ways in which `performance counters` should be analyzed. The first
    is to use `Excel` and/or `Power BI` to view graphs and trend lines based on the
    `performance counters`. The second is to review the `performance counters` with
    a query that takes a snapshot of the information in the `performance counter`
    table. The second approach is the approach used in this chapter. The guidelines
    for the snapshot queries apply to both approaches.


    ### Note


    For simplicity, the snapshot analysis queries in this section will be scoped to
    the database level. In most cases, we will need to execute them against every
    database on the `SQL Server` instance. Options for accomplishing this are using
    `sp_MSForEachDB` and extending the cursors.'
