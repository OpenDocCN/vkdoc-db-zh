    Using the DTA utility is fairly easy. You’ll look at two scenarios of using the
    tool that provide different outcomes. In the first scenario, you’ll use the DTA
    utility to recommend indexing changes with allowing only nonclustered indexing
    changes. For the second scenario, the DTA utility will be configured to recommend
    any change to the indexing that would improve the performance of the workload.
    In both scenarios, you’ll use the plan cache for SQL Server as the workload source.
    To populate the plan cache, execute the query in Listing [10-7](#338675_3_En_10_Chapter.xhtml#PC7).


    ```

