    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''IndexStrategiesFruit_Identity'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Identity

    CREATE TABLE dbo.IndexStrategiesFruit_Identity

    (

    FruitID int IDENTITY(1,1)

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Idnt PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Identity(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Identity;

    IF OBJECT_ID(''IndexStrategiesFruit_Sequence'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Sequence

    IF OBJECT_ID(''FruitSequence'') IS NOT NULL

    DROP SEQUENCE FruitSequence

    CREATE SEQUENCE FruitSequence AS INTEGER

    START WITH 1;

    CREATE TABLE dbo.IndexStrategiesFruit_Sequence

    (

    FruitID int DEFAULT NEXT VALUE FOR FruitSequence

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Seq PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Sequence(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Sequence;

    Listing 11-4

    Creating and Populating Table for Identity Sequence Pattern

    ```


    One of the effects of using the Identity Sequence pattern is that the value for
    the clustering key column has no relationship to the information that it represents.
    In the query output from Listing [11-1](#338675_3_En_11_Chapter.xhtml#PC1), which
    is shown in Figure [11-4](#338675_3_En_11_Chapter.xhtml#Fig4), the value of 1
    is assigned to the first row inserted for both resultsets. Then, a value of 2
    is assigned for the next row and so on. As more rows are added, the `FruitID`
    column increments and doesn’t require any single piece of information in the record
    in order to designate the instance of information.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig4_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Results for Identity Sequence pattern'
  trans: '## 聚簇索引


    本书中已经讨论过使用聚簇索引作为表数据页组织结构的价值和偏好。聚簇索引根据其键列来组织表中的数据。索引的所有数据页都依据键列进行逻辑存储。这样做的好处是能够通过键列实现对数据的最佳访问。


    新建表时，几乎总是应该构建聚簇索引。然而，在构建表时的问题是，应该为聚簇索引的键列选择什么。定义良好的聚簇索引通常具有一些最常见的特性。这些特性是：

    - 静态

    - 窄

    - 唯一

    - 单调递增


    这些属性中的每一个都有助于创建定义良好的聚簇索引，原因如下。


    首先，聚簇索引应该是静态的。为聚簇索引定义的键列应该在行的生命周期内保持静态。通过使用静态值，当行更新时，其在索引中的位置不会改变。如果使用非静态键列，行在聚簇索引中的位置可能会改变，这可能要求该行被插入到不同的页面上。此外，非聚簇索引也需要被修改，以更改存储在这些索引中的键列值，因为聚簇索引键列被包含在非聚簇索引中。所有这些因素综合起来，可能导致表上的聚簇和非聚簇索引出现碎片。


    聚簇索引应具备的下一个属性是“窄”。理想情况下，聚簇索引键应仅包含单个列。这些列应使用适合表中存储数据的最小合理数据类型来定义。窄的聚簇索引很重要，因为每一行的聚簇索引键都包含在与该表关联的所有非聚簇索引中。聚簇索引键越宽，所有非聚簇索引也会越宽，并且需要的页面就越多。正如其他章节所讨论的，索引中的页面越多，使用该索引所需的资源就越多。这可能会影响查询的性能。


    聚簇索引还应该是唯一的。聚簇索引在索引中的单个位置存储单行；对于聚簇索引键列内的重复行，**唯一标识符**提供了行所需的唯一性。当唯一标识符被添加到一行时，该行会扩展
    4 个字节，这会改变聚簇索引的“窄”度，并导致与非窄聚簇索引相同的担忧。您可以在第 2 章中找到有关唯一标识符的更多信息。


    最后，一个定义良好的聚簇索引将基于一个单调递增的值。使用单调递增的聚簇键会导致新行被添加到聚簇索引的末尾。将新行放在 B 树的末尾，可以减少如果行被插入到聚簇索引中间可能导致的碎片。


    选择聚簇索引键列时的另一个考虑因素是，它们代表行中最常用于访问该行的列。是否有特定的列或值将最常用于从表中检索行？如果有，这些列是聚簇索引键的良好候选。最终，当查询能够通过阻力最小的路径访问数据时，它们的性能将达到最佳。


    在考虑上述选择聚簇索引策略的指导原则时，有一些模式可用于识别和建模聚簇索引。聚簇索引的模式包括：

    - 标识序列

    - 自然键

    - 外键

    - 多列

    - 全局唯一标识符


    在本节剩余部分，我们将引导您了解每种模式，描述它们以及如何识别何时使用该模式。


    ### 标识序列


    构建聚簇索引最常见的模式是将其与表中配置为单调递增的列配对，该列使用 `IDENTITY` 属性或 `SEQUENCE` 对象。在此模式中，`IDENTITY`
    列通常也是表上的 `PRIMARY KEY`。数据类型通常是整数，包括 `tinyint`、`smallint`、`int` 和 `bigint`。此模式的主要优点是它实现了定义良好的聚簇索引的所有属性。它是静态的、窄的、唯一的且单调递增的。当考虑数据将如何被访问时，在大多数情况下，键值将最常用于访问表中的行。


    标识序列模式的一个区别在于，用作聚簇索引键的列与行中的数据和聚簇索引键之间没有关系。为了实现该模式，会向表中添加一个新列，该列包含 `IDENTITY` 属性或
    `SEQUENCE` 默认值。然后将此列设置为聚簇索引键，通常也设置为 `PRIMARY KEY`。


    几乎所有数据库中都能找到此模式的示例。创建一个使用此模式的表看起来类似于代码清单 11-4 中的 `CREATE TABLE` 语句。两个表都设计用于存储水果：插入了两行苹果、一行香蕉和一行葡萄。`Color`
    列不会是一个好的聚簇键，因为它不能唯一标识表中的行。`FruitName` 列本可以标识表中的行，但它在整个表中不是唯一的，这将需要使用唯一标识符，并导致更大的聚簇键。按照标识序列模式对表进行索引，创建了一个
    `FruitID` 列。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''IndexStrategiesFruit_Identity'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Identity

    CREATE TABLE dbo.IndexStrategiesFruit_Identity

    (

    FruitID int IDENTITY(1,1)

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Idnt PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Identity(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Identity;

    IF OBJECT_ID(''IndexStrategiesFruit_Sequence'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Sequence

    IF OBJECT_ID(''FruitSequence'') IS NOT NULL

    DROP SEQUENCE FruitSequence

    CREATE SEQUENCE FruitSequence AS INTEGER

    START WITH 1;

    CREATE TABLE dbo.IndexStrategiesFruit_Sequence

    (

    FruitID int DEFAULT NEXT VALUE FOR FruitSequence

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Seq PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Sequence(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Sequence;

    ```

    *代码清单 11-4: 为标识序列模式创建和填充表*


    使用标识序列模式的效果之一是，聚簇键列的值与其所代表的信息之间没有关联。在代码清单 11-1 的查询输出中（如图 11-4 所示），对于两个结果集，值 1
    都分配给了插入的第一行。然后，值 2 分配给下一行，依此类推。随着更多行的添加，`FruitID` 列会递增，并且不需要记录中的任何特定信息来指定该信息实例。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig4_HTML.jpg](img/338675_3_En_11_Fig4_HTML.jpg)


    *图 11-4: 标识序列模式的结果*'
- fmt: '### Note


    `SEQUENCE` was a new object in SQL Server 2012. Through sequences, ranges of numeric
    values can be generated, which are either ascending or descending. A sequence
    is not associated with any specific table. If you are unfamiliar with using `SEQUENCE`,
    it is recommended that you consider using sequences over `IDENTITY` for performance
    and control purposes. They are outside the context of this book.


    ### Natural Key


    In some cases, using a natural key in the data for the clustering key is as valid
    as adding an identity column to the table to use for the Identity Sequence pattern.
    A natural key is a column in the data that can uniquely identify one row from
    all the other rows. The cases where using a natural key is valid can be identified
    when there is a natural key in the data that meets the attributes of a well-defined
    clustering key. When using natural keys for clustering keys, they are not likely
    to be ever-increasing, but they should still be unique, narrow, and static.


    A common example of when a natural key may be used instead of an identity column
    is when looking at tables that contain one- or two-character abbreviations for
    the information they represent. These abbreviations may be for the status of an
    order, the size of a product, or a list of states or provinces. Compared to using
    an `int`, which is 4 bytes, in the Identity Column pattern, using a `char(1)`
    or `char(2)` data type with the Natural Key pattern will result in a clustering
    key that is more narrow than the former. Another example is using dates in the
    yyyymmdd or timestamp format on date tables.


    The Natural Key pattern also has the additional benefit of providing an easier-to-decipher
    key value. When using the Identity Sequence pattern, there is no inherent meaning
    when the clustering key has a value of 1 or 7. These values are meaningless—intentionally
    so. With the Natural Key pattern, the abbreviations of `O` and `C` represent real
    information (Opened and Closed, respectively).


    As a simple example of the Natural Key pattern, let’s consider a table that contains
    states and their abbreviations. We’ll also include the name of the country for
    the states. Listing 11-5 shows the SQL to create and populate the table. The table
    has a `StateAbbreviation` column, which is a `char(2)`. Since this is a narrow,
    unique, and static value for each state, the clustered index is created on the
    column. Next, a few rows are added to the table for the four states that the fictitious
    database requires.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesNatural

    (

    StateAbbreviation char(2)

    ,StateName varchar(25)

    ,Country varchar(25)

    ,CONSTRAINT PK_State_StateAbbreviation PRIMARY KEY CLUSTERED (StateAbbreviation)

    );

    INSERT INTO dbo.IndexStrategiesNatural(StateAbbreviation, StateName, Country)

    VALUES(''MN'',''Minnesota'',''United States'')

    ,(''FL'',''Florida'',''United States'')

    ,(''WI'',''Wisconsin'',''United States'')

    ,(''NH'',''New Hampshire'',''United States'');

    SELECT StateAbbreviation, StateName, Country

    FROM dbo.IndexStrategiesNatural;

    ```


    Listing 11-5 Creating and Populating Table for Natural Key Pattern


    In situations where the natural key matches the Natural Key pattern, the technique
    in Listing 11-5 can be a useful way of selecting the clustering key column. Reviewing
    the contents of `dbo.IndexStrategiesNatural` (shown in Figure 11-5), the four
    rows are in the table, and using `StateAbbreviation` in another table as a foreign
    key value can be useful since the value `MN` has some inherent meaning.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig5_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig5_HTML.jpg)

    Figure 11-5 Results for Natural Key pattern


    This pattern may seem ideal and more worthwhile than the Identity Column pattern—especially
    since the value of the clustering key helps describe the data. However, there
    are a few downsides to using this pattern, which relate to the attributes that
    can make it a well-defined clustering key.


    First, let’s consider the uniqueness of the clustering key. Provided that the
    use cases for the database and table never change, there can be trust that the
    values will remain unique. What happens, though, when the database needs to be
    used in an international context? If states for other countries such as the Netherlands
    need to be included, there is a great potential for data issues. In the Netherlands,
    FL is the abbreviation for Flevopolder, and NH is the abbreviation for Noord-Holland.
    Sending an order to Florida that should go to Flevopolder can have serious business
    consequences. To retain the uniqueness, something outside of the two-character
    abbreviation would need to be added to the natural key and clustering key.


    Changing the natural key would then affect the narrowness of the clustering key.
    There are probably two approaches that could be taken to address this problem.
    The first option is to add another column to the natural key to identify whether
    a state abbreviation belongs to one country or another. The second option is to
    increase the size of the state abbreviation to include a country abbreviation
    in the same column. With either of the solutions, the size of the clustering key
    will exceed the 4 bytes used to maintain a narrow clustering key through the use
    of an `int` data type and the Identity Column pattern.


    Additionally, always consider whether natural keys are truly static. State abbreviations
    can change. While this doesn’t happen too often—the last change in the United
    States happened in 1987 when state abbreviations were all standardized—it will
    happen occasionally with nearly all types of natural keys. One example is the
    country of Yugoslavia with its six republics, which became their own countries.
    Another is the Soviet Union, which evolved into the Russian Federation, which
    led to the formation of numerous other countries. As static as values such as
    state and country abbreviations may seem, on a grander scale there is variance.
    Also, looking to your applications, status codes that represent the states of
    a workflow may be accurate today but could have new and different meanings in
    the future.


    Lastly, sometimes apparent natural keys can be made of data that shouldn’t be
    widely distributed. For years, government identifiers, like Social Security Number,
    were often used for natural keys in databases, often in healthcare and educational
    systems. While this did an adequate job of identifying an individual, it definitely
    isn’t information that should be easily available to database users. In most modern
    databases, government identifiers now need to be encrypted, which can cause immense
    problems when these types of natural keys are used for clustered indexes and potentially
    as primary keys.


    The Natural Key pattern for selecting what an index does is a valid pattern for
    designing clustered indexes. As the example showed, it can be unique, narrow,
    and static. Look at the current and future applications of the table before using
    a natural key for the clustered index.'
