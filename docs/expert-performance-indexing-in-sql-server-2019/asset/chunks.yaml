  trans: '

    ## 操作流程


    除了目录视图外，还提供了四个内部存储过程，用于进一步分析空间索引。这些过程会返回索引上设置的所有属性的完整列表。这四个存储过程及其参数如下：


    ```

    sp_help_spatial_GEOMETRY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput''

    [ , [ @query_sample = ] ''query_sample'']

    sp_help_spatial_GEOMETRY_index_xml [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ]''{ 0 | 1 }]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    sp_help_spatial_GEOGRAPHY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    sp_help_spatial_GEOGRAPHY_index_xml [@tabname = ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    ```


    清单 5-10 展示了如何执行这些存储过程的示例。该示例返回了关于清单 5-7 中创建的 `GEOMETRY` 索引 `IDX_COUNTY_GEOM` 的信息。图
    5-9 展示了结果。


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig9_HTML.jpg](img/338675_3_En_5_Fig9_HTML.jpg)


    **图 5-9** `sp_help_spatial_GEOMETRY_index` 示例及结果（结果可能有所不同）


    ```

    USE AdventureWorks2017

    GO

    DECLARE @Sample GEOMETRY

    = ''POLYGON((-90.0 -180.0, -90.0 180.0, 90.0 180.0, 90.0 -180.0, -90.0 -180.0))'';

    EXEC sp_help_spatial_GEOMETRY_index ''dbo.tl_2017_us_county'', ''IDX_COUNTY_GEOM'',
    0, @Sample;

    清单 5-10

    调查几何索引

    ```


    这些信息对于调整索引以使其运行得更好非常有用。返回的信息其功能类似于索引的统计信息。你可以看到索引的各个层级中有多少对象可用。你还可以看到它如何返回与提供的查询样本匹配的数据。看到特定数量的相交对象与查询样本匹配，可以告诉你索引是否会返回给定对象。通过将索引中的对象与匹配的对象进行比较，你还可以看到索引中有多少百分比的对象未被查询样本返回。所有这些都有助于你了解索引满足查询需求的程度。


    ## 调整空间索引


    正如你在清单 5-7 中看到的，创建空间索引时，你有一些选项。操作这些选项可以让你调整空间索引的行为。需要进行一些实验才能找到一组正确的选项，以使索引达到最佳性能。结合使用执行计划和查询性能指标，就像本章前面所做的那样。


    对于 `GEOMETRY` 列，你可以向索引添加一个边界框。这限制了索引覆盖的区域，可以让你创建一个比通用索引更能帮助满足特定查询条件的索引。例如，如果我像清单
    5-11 所示更改边界框并重建索引，我看到执行时间减少了大约 10%。


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2017_us_county

    (

    GEOM

    )USING  GEOMETRY_GRID

    WITH (

    BOUNDING_BOX =(-96.9, -95.3, 36.4, 36.6),

    GRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = ON,

    ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];

    GO

    清单 5-11

    调整空间索引的边界框

    ```


    通过更改边界框，一些对象被排除在索引之外。根据你的数据和索引中使用的参数，过滤掉更多项目可能不会提高性能。由于空间索引的这种复杂性，测试和验证你是否达到了预期的性能改进至关重要。当然，为某些县改进查询的修改可能会导致美国其他县的查询性能下降。可以看出，这里没有简单的答案。


    另一个可以进行的调整是更改索引的网格。如果不确定数据分布情况，也不确定任何一次查询可能获得多少匹配项，那么到目前为止示例中的选择是一个相当标准的选择。如果你的查询包含结果的比例较高，不同的网格分布可能会带来更高的速度。这在很大程度上是一个实验的问题。但是，就像边界框一样，为一个数据集更改网格分布可能会损害另一个数据集。你必须进行严格的测试才能正确设置。


    使用相同的例子，如果我将第 1 级网格改为 `HIGH` 详细网格，我将损失 10%的性能，使查询运行变慢。将其改为 `MEDIUM` 对执行时间既无益也无害。在这种情况下，以任何组合调整网格级别都没有带来速度的显著提升，但在网格的第
    1 级或第 2 级使用 `HIGH` 级别的详细程度会对性能产生负面影响。实验完成后，在此情况下我将选择保持默认网格不变。


    ## 空间索引的限制


    空间索引提供了一些独特的特性和限制。以下是空间索引限制的完整列表：


    - 空间索引要求存在聚集索引。

    - 空间索引只能创建在类型为 `GEOMETRY` 或 `GEOGRAPHY` 的列上。

    - 空间索引只能定义在具有主键的表上。表上主键列的最大数量为 15。

    - 索引键记录的最大大小为 895 字节。超过此大小会引发错误。

    - 不支持使用数据库引擎优化顾问。

    - 无法对空间索引执行联机重建。

    - 无法在索引视图上指定空间索引。

    - 在支持的表中，每个空间列上最多只能创建 249 个空间索引。在同一空间列上创建多个空间索引可能有用，例如，用于在单个列中索引不同的细分参数。

    - 一次只能创建一个空间索引。

    - 空间数据的索引构建不能使用可用的进程并行度。


    ## 总结


    为空间数据建立索引是一种复杂的数据存储和操作形式。本章主要介绍了空间数据如何被处理和存储，以帮助管理和审查数据库中空间数据类型的实现。


    有了空间索引，你现在能够快速确定点是否位于区域内，或者区域是否与其他区域重叠。空间索引允许查询快速计算空间函数的结果，而无需完全渲染每个空间要素。请记住，务必检查执行计划以确保空间索引确实在使用中。

    '
- fmt: '# 6. Indexing Memory-Optimized Tables


    The past few chapters have focused on specialized indexing-related data types
    in SQL Server. SQL Server also offers specialized tables that reside in memory
    called memory-optimized, or in-memory, tables. Introduced in SQL Server 2014,
    these tables reside fully within memory while SQL Server is running relying on
    disk-based structures only for ensuring the ability to recover from service restarts.


    With memory-optimized tables being primarily memory based, this has a significant
    impact on the traditional structures of a table and its indexes. In this chapter,
    you’ll look at how the changes for memory-optimized tables affect your ability
    to index these tables and how to create the ideal indexes.


    ### Note

    Depending on the source and conversation, memory-optimized tables are also referred
    to as in-memory OLTP and Hekaton. This book will use the term `memory-optimized
    tables` since it aligns to the terminology used in Microsoft Books Online.


    ## Memory-Optimized Tables Overview

    Before digging into the indexing options for memory-optimized tables, let’s start
    with the basics of memory-optimized tables. A memory-optimized table is a new
    table type introduced in SQL Server 2014. Unlike traditional tables, along with
    their indexes, memory-optimized tables reside entirely in memory. Memory-optimized
    tables are supported through disk structures but are not reliant on them for transactional
    processing. This differs compared to traditional tables, where the table is based
    on disk storage and typically only a portion of the table and its indexes are
    in memory.


    The value provided by memory-optimized tables is the performance gains that creating
    tables in this fashion provides for a database. By hosting and managing the entire
    table in memory, transactions do not need to wait for the disk to bring data to
    memory for transaction processing to proceed.


    The implementation of memory-optimized tables results in a few changes to the
    way in which tables are architected in SQL Server. First, since the tables are
    now memory resident, it makes more sense for them to be structured in a manner
    that is optimal for accessing the data in memory vs. retrieving a subset of the
    data from disk. For this reason, memory-optimized tables use hash and range indexes
    vs. B-trees for storing data. Additionally, the tables don’t synchronize to disk
    or move around in memory like a traditional table, removing the need for latching
    between disk and memory structures.


    To create memory-optimized tables in a database, there are a few things that need
    to be prepared within a database. To begin, a filegroup dedicated to memory-optimized
    data needs to be added to the database with a file to support the memory-optimized
    tables. Additionally, the database should have the property `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    enabled in most scenarios. This property hints to all transactions against memory-optimized
    tables to set the isolation level to `SNAPSHOT`. In Listing 6-1, the database
    `MemOptIndexing` is prepared using these settings.


    ```

    USE master

    GO

    IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

    DROP DATABASE MemOptIndexing

    GO

    CREATE DATABASE MemOptIndexing

    GO

    ALTER DATABASE MemOptIndexing

    ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

    --This file location may change in your environment

    ALTER DATABASE MemOptIndexing

    ADD FILE (name=''memoryOptimizedData'',

    filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

    TO FILEGROUP memoryOptimizedFG

    ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

    GO

    ```


    Listing 6-1 Preparing Database for Memory-Optimized Tables'
