    # 8. 索引的误区与最佳实践


    在前几章中，我们已经定义了索引并展示了其结构。在接下来的章节中，你将学习构建索引并确保其按预期运行的策略。本章将消除一些常见的误区，并展示如何为创建索引奠定基础。


    误区会在尝试构建索引时带来不必要的负担。了解与索引相关的误区可以防止你使用适得其反的索引策略。本章讨论的索引误区如下：


    *   数据库不需要索引。

    *   主键始终是聚集索引。

    *   在线索引操作不会阻塞。

    *   在多列索引中，任何列都可以被筛选。

    *   聚集索引按物理顺序存储记录。

    *   索引总是以相同的顺序输出。

    *   在插入时，填充因子应用于索引。

    *   从堆中删除会导致不可恢复的空间。

    *   每个表都应该是堆或拥有聚集索引。


    在审视误区时，看看最佳实践也是一个好主意。最佳实践在许多方面与误区相似，因为它们都是普遍持有的观念。主要的区别在于，最佳实践经得起推敲，并且在构建索引时是有用的建议。本章将探讨以下最佳实践：


    *   根据当前工作负载建立索引。

    *   默认在主键上使用聚集索引。

    *   正确设定数据库级别的填充因子。

    *   正确设定索引级别的填充因子。

    *   为唯一键和外键列建立索引。

    *   平衡索引数量。


    ## 索引误区


    人们在构建数据库和索引时遇到的问题之一就是处理误区。索引起源于许多不同的地方。有些来自 SQL Server 及其工具的早期版本，或者基于以前的功能。另一些则来自他人的建议，这些建议是基于某个特定数据库的条件，而这些条件与其他数据库不匹配。


    索引误区的问题在于它们混淆了索引策略的思路。在可以通过构建索引来解决严重性能问题的情况下，误区有时会阻止人们考虑这种方法。在接下来的几个小节中，我们将讨论许多关于索引的误区，我会尽力破除它们。


    ### 误区 1：数据库不需要索引


    通常，在一个正在开发的应用程序中，会创建一个或多个数据库来存储应用程序的数据。在许多开发过程中，重点是添加新功能，并期望“性能问题会自行解决”。一个不幸的结果是，许多数据库在开发和部署时没有构建索引，因为人们认为它们不需要。


    除此之外，还有一些数据库开发人员相信他们的数据库与其他数据库有些不同。以下是不时听到的一些原因：


    *   “这是一个小型数据库，不会有太多数据。”

    *   “这只是一个概念验证，不会长期存在。”

    *   “这不是一个重要应用，所以性能不重要。”

    *   “整个数据库已经能放入内存；索引只会让它需要更多内存。”

    *   “我将只用这个数据库插入数据；我永远不会查看结果。”


    这些理由中的每一个都很容易反驳。在当今的大数据世界里，即使是预期很小的数据库，在被采用后也可能快速增长。除此之外，数据库的小巧绝对是相对而言的。任何概念验证或不重要的数据库和应用程序，如果没有人需要或没有人愿意为其功能投入资源，就不会被创建。那些人很可能期望他们要求的功能能够按预期执行。最后，将数据库放入内存并不意味着它会很快。正如前几章所讨论的，索引为数据提供了替代访问路径，旨在减少访问数据所需的页面数量。没有这些替代路径，数据访问很可能需要读取表的每一个页面。


    这些原因可能不是你听到的关于你的数据库的理由，但它们很可能类似。围绕这个误区的核心观点是，索引无助于数据库更好地执行。打破这种借口最有力的方法之一，就是通过针对特定场景展示索引的好处。


    为了演示，让我们看一下代码清单 8-1。这个代码示例创建了表 `MythOne`。接下来，你会看到一个几乎任何应用程序中都会有的查询。在代码清单 8-2 的查询输出中，查询产生了
    1,496 次读取。


    ```

    USE AdventureWorks2017;

    GO

    SELECT * INTO MythOne

    FROM Sales.SalesOrderDetail;

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    ```

    **代码清单 8-1** 没有索引的表


    ```

    Table ''MythOne''. Scan count 1, logical reads 1496, physical reads 0, read-ahead
    reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```

    **代码清单 8-2** 没有索引的表的 I/O 统计信息


    可以说 1,496 次读取的输入/输出 (I/O) 并不算多。考虑到当今世界一些数据库的大小和数据量，这可能是真的。但查询的 I/O 不应与世界其他地方的性能进行比较；它需要与其潜在的
    I/O、应用程序的需求以及部署它的平台进行比较。


    改进上一个演示中的查询，只需在表的 `CarrierTrackingNumber` 列上添加一个索引。要查看为 `MythOne` 添加索引的效果，请执行代码清单
    8-3 中的代码。创建索引后，查询的读取次数从 1,496 次减少到 15 次，如代码清单 8-4 所示。仅通过一个索引，查询的 I/O 就降低了近两个数量级。可以说，在这种情况下，索引提供了巨大的价值。


    ```

    CREATE INDEX IX_CarrierTrackingNumber ON MythOne (CarrierTrackingNumber)

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    ```

    **代码清单 8-3** 为 MythOne 添加索引


    ```

    Table ''MythOne''. Scan count 1, logical reads 15 physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```

    **代码清单 8-4** 有索引的表的 I/O 统计信息


    我在这些示例中展示了索引确实能带来好处。如果你遇到对在数据库上构建索引有抵触情绪的情况，试着找出抵触的真正原因，并提供一个类似于本节中的示例。在第 11 章，我们将讨论可用于确定在数据库中创建哪些索引的方法。

    '
- fmt: '### Myth 2: Primary Keys Are Always Clustered


    The next myth that is quite prevalent is the idea that primary keys are always
    clustered. While this is true in many cases, you cannot assume that all primary
    keys are also clustered indexes. Earlier in this book, we discussed how a table
    can have only a single clustered index on it. If a primary key is created after
    the clustered index is built, then the primary key is to be created as a nonclustered
    index.


    To illustrate the indexing behavior of primary keys, we’ll use a script that includes
    building two tables. We’ll build the first table, named `dbo.MythTwo1`, and then
    create a primary key on the `RowID` column. For the second table, named `dbo.MythTwo2`,
    after it is created, the script will build a clustered index before creating the
    primary key. The code for this is in Listing 8-5.


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.MythTwo1

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    ALTER TABLE dbo.MythTwo1

    ADD CONSTRAINT PK_MythTwo1 PRIMARY KEY (RowID);

    GO

    CREATE TABLE dbo.MythTwo2

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    CREATE CLUSTERED INDEX CL_MythTwo2 ON dbo.MythTwo2 (RowID);

    ALTER TABLE dbo.MythTwo2

    ADD CONSTRAINT PK_MythTwo2 PRIMARY KEY (RowID);

    GO

    SELECT OBJECT_NAME(object_id) AS table_name

    ,name

    ,index_id

    ,type

    ,type_desc

    ,is_unique

    ,is_primary_key

    FROM sys.indexes

    WHERE object_id IN (OBJECT_ID(''dbo.MythTwo1''),OBJECT_ID(''dbo.MythTwo2''));

    ```


    Listing 8-5: Two Ways to Create Primary Keys


    After running the code segment, the final query will return results like those
    shown in Figure 8-1. This figure shows that `PK_MythTwo1`, which is the primary
    key on the first table, was created as a clustered index. Then on the second table,
    `PK_MythTwo2` was created as a nonclustered index.


    ![Primary key sys.indexes output](images/338675_3_En_8_Chapter/338675_3_En_8_Fig1_HTML.jpg)


    Figure 8-1: Primary key sys.indexes output


    The behavior discussed in this section is important to remember when building
    primary keys and clustered indexes. If you have a situation where they need to
    be separated, the primary key will need to be defined after the clustered index
    or as a `NONCLUSTERED` index.


    ### Myth 3: Online Index Operations Don’t Block


    One of the advantages of SQL Server Enterprise Edition is the ability to build
    indexes online. During an online index build, the table on which the index is
    being created will still be available for queries and data modifications. This
    feature is extremely useful when a database needs to be accessed and maintenance
    windows are short to nonexistent.


    A common myth with online index rebuilds is that they don’t cause any blocking.
    Of course, like any of these myths, this one is false. When using an online index
    operation, there is an intent shared lock held on the table for the main portion
    of the build. At the finish, either a shared lock, for a nonclustered index, or
    a schema modification lock, for a clustered index, is held for a short time while
    the operation moves in the updated index. This differs from an offline index build
    where the shared or schema modification lock is held for the duration of the index
    build.


    Of course, you will want to see this in action; to accomplish this, you will create
    a table and use Extended Events to monitor the locks that are applied to the table
    while creating indexes with and without the `ONLINE` options. To start this demo,
    execute the code in Listing 8-6. This script creates the table `dbo.MythThree`
    and populates it with 10 million records. The last item it returns is the `object_id`
    for the table, which is needed for the subsequent parts of the demo. For this
    example, the `object_id` for `dbo.MythThree` is `624721278`.


    #### Note

    The demos for this myth all require SQL Server Enterprise or Developer Edition.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.MythThree

    (

    RowID int NOT NULL

    ,Column1 uniqueidentifier

    );

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 10000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythThree

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    SELECT OBJECT_ID(''dbo.MythThree'')

    GO

    ```


    Listing 8-6: MythThree Table Create Script


    To monitor those events in this scenario, you’ll use Extended Events to capture
    the `lock_acquired` and `lock_released` events fired during index creation. Open
    sessions in SSMS for the code in Listing 8-7 and Listing 8-8. Before running,
    update the `session_id` from Listing 8-8 for the `session_id` in Listing 8-7;
    for this scenario, the `session_id` is `42`. Apply the same update with the `object_id`.
    After the Extended Events session is running, you can use the live view to monitor
    the locks as they occur.


    ```sql

    IF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name = ''MythThreeXevents'')

    DROP EVENT SESSION [MythThreeXevents] ON SERVER

    GO

    CREATE EVENT SESSION [MythThreeXevents] ON SERVER

    ADD EVENT sqlserver.lock_acquired(SET collect_database_name=(1)

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278)),

    ADD EVENT sqlserver.lock_released(

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278))

    ADD TARGET package0.ring_buffer

    GO

    ALTER EVENT SESSION [MythThreeXevents] ON SERVER STATE = START

    GO

    ```


    Listing 8-7: Extended Events Session for Lock Acquired and Released


    In the example from Listing 8-8, two indexes are created, one built `ONLINE` and
    the other with the default option, or offline. To see what locks are acquired
    and released, observe the locking behavior in the live viewer. By default, only
    the name and timestamp appear in the live viewer. The live viewer allows for customizing
    the columns that are displayed. In Figure 8-2, the columns `object_id`, `mode`,
    `resource_type`, and `sql_text` have been added to the defaults `name` and `timestamp`.
    To add additional columns, right-click a column header and select “Choose columns.”


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_MythThree_ONLINE ON MythThree (Column1) WITH (ONLINE = ON);

    GO

    CREATE INDEX IX_MythThree ON MythThree (Column1);

    GO

    ```


    Listing 8-8: Online Index Operations on Nonclustered Index Creation


    When the index is created with the `ONLINE` option, note that in Figure 8-2 `SCH_S`
    (`Schema_Shared`) and `S` (`Shared`) locks are acquired and released within milliseconds
    of each other. Because these locks are acquired and released throughout the index
    creation process, other transactions can continue to occur against the table.
    The `SCH_S` locks ensure that the schema of the table does not change, while the
    `S` locks pages from inserts, updates, and deletes. Because these locks are acquired
    for very short amounts of time, they allow the table to be available throughout
    the index creation process.'
  raw: '### Myth 2: Primary Keys Are Always Clustered


    The next myth that is quite prevalent is the idea that primary keys are always
    clustered. While this is true in many cases, you cannot assume that all primary
    keys are also clustered indexes. Earlier in this book, we discussed how a table
    can have only a single clustered index on it. If a primary key is created after
    the clustered index is built, then the primary key is to be created as a nonclustered
    index.


    To illustrate the indexing behavior of primary keys, we’ll use a script that includes
    building two tables. We’ll build the first table, named `dbo.MythTwo1`, and then
    create a primary key on the `RowID` column. For the second table, named `dbo.MythTwo2`,
    after it is created, the script will build a clustered index before creating the
    primary key. The code for this is in Listing [8-5](#338675_3_En_8_Chapter.xhtml#PC5).


    ```

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.MythTwo1

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    ALTER TABLE dbo.MythTwo1

    ADD CONSTRAINT PK_MythTwo1 PRIMARY KEY (RowID);

    GO

    CREATE TABLE dbo.MythTwo2

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    CREATE CLUSTERED INDEX CL_MythTwo2 ON dbo.MythTwo2 (RowID);

    ALTER TABLE dbo.MythTwo2

    ADD CONSTRAINT PK_MythTwo2 PRIMARY KEY (RowID);

    GO

    SELECT OBJECT_NAME(object_id) AS table_name

    ,name

    ,index_id

    ,type

    ,type_desc

    ,is_unique

    ,is_primary_key

    FROM sys.indexes

    WHERE object_id IN (OBJECT_ID(''dbo.MythTwo1''),OBJECT_ID(''dbo.MythTwo2''));

    Listing 8-5

    Two Ways to Create Primary Keys

    ```


    After running the code segment, the final query will return results like those
    shown in Figure [8-1](#338675_3_En_8_Chapter.xhtml#Fig1). This figure shows that
    `PK_MythTwo1`, which is the primary key on the first table, was created as a clustered
    index. Then on the second table, `PK_MythTwo2` was created as a nonclustered index.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig1_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Primary key sys.indexes output


    The behavior discussed in this section is important to remember when building
    primary keys and clustered indexes. If you have a situation where they need to
    be separated, the primary key will need to be defined after the clustered index
    or as a NONCLUSTERED index.


    ### Myth 3: Online Index Operations Don’t Block


    One of the advantages of SQL Server Enterprise Edition is the ability to build
    indexes online. During an online index build, the table on which the index is
    being created will still be available for queries and data modifications. This
    feature is extremely useful when a database needs to be accessed and maintenance
    windows are short to nonexistent.


    A common myth with online index rebuilds is that they don’t cause any blocking.
    Of course, like any of these myths, this one is false. When using an online index
    operation, there is an intent shared lock held on the table for the main portion
    of the build. At the finish, either a shared lock, for a nonclustered index, or
    a schema modification lock, for a clustered index, is held for a short time while
    the operation moves in the updated index. This differs from an offline index build
    where the shared or schema modification lock is held for the duration of the index
    build.


    Of course, you will want to see this in action; to accomplish this, you will create
    a table and use Extended Events to monitor the locks that are applied to the table
    while creating indexes with and without the `ONLINE` options. To start this demo,
    execute the code in Listing [8-6](#338675_3_En_8_Chapter.xhtml#PC6). This script
    creates the table `dbo.MythThree` and populates it with 10 million records. The
    last item it returns is the `object_id` for the table, which is needed for the
    subsequent parts of the demo. For this example, the `object_id` for `dbo.MythThree`
    is 624721278.


    ### Note


    The demos for this myth all require SQL Server Enterprise or Developer Edition.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.MythThree

    (

    RowID int NOT NULL

    ,Column1 uniqueidentifier

    );

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 10000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythThree

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    SELECT OBJECT_ID(''dbo.MythThree'')

    GO

    Listing 8-6

    MythThree Table Create Script

    ```


    To monitor those events in this scenario, you’ll use Extended Events to capture
    the `lock_acquired` and `lock_released` events fired during index creation. Open
    sessions in SSMS for the code in Listing [8-7](#338675_3_En_8_Chapter.xhtml#PC7)
    and Listing [8-8](#338675_3_En_8_Chapter.xhtml#PC8). Before running, update the
    `session_id` from Listing [8-8](#338675_3_En_8_Chapter.xhtml#PC8) for the `session_id`
    in Listing [8-7](#338675_3_En_8_Chapter.xhtml#PC7); for this scenario, the `session_id`
    is `42`. Apply the same update with the `object_id`. After the Extended Events
    session is running, you can use the live view to monitor the locks as they occur.


    ```

    IF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name = ''MythThreeXevents'')

    DROP EVENT SESSION [MythThreeXevents] ON SERVER

    GO

    CREATE EVENT SESSION [MythThreeXevents] ON SERVER

    ADD EVENT sqlserver.lock_acquired(SET collect_database_name=(1)

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278)),

    ADD EVENT sqlserver.lock_released(

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278))

    ADD TARGET package0.ring_buffer

    GO

    ALTER EVENT SESSION [MythThreeXevents] ON SERVER STATE = START

    GO

    Listing 8-7

    Extended Events Session for Lock Acquired and Released

    ```


    In the example from Listing [8-8](#338675_3_En_8_Chapter.xhtml#PC8), two indexes
    are created, one built ONLINE and the other with the default option, or offline.
    To see what locks are acquired and released, observe the locking behavior in the
    live viewer. By default, only the name and timestamp appear in the live viewer.
    The live viewer allows for customizing the columns that are displayed. In Figure
    [8-2](#338675_3_En_8_Chapter.xhtml#Fig2), the columns `object_id`, `mode`, `resource_type`,
    and `sql_text` have been added to the defaults `name` and `timestamp`. To add
    additional columns, right-click a column header and select “Choose columns.”


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_MythThree_ONLINE ON MythThree (Column1) WITH (ONLINE = ON);

    GO

    CREATE INDEX IX_MythThree ON MythThree (Column1);

    GO

    Listing 8-8

    Online Index Operations on Nonclustered Index Creation

    ```


    When the index is created with the ONLINE option, note that in Figure [8-2](#338675_3_En_8_Chapter.xhtml#Fig2)
    `SCH_S` (`Schema_Shared`) and `S` (`Shared`) locks are acquired and released within
    milliseconds of each other. Because these locks are acquired and released throughout
    the index creation process, other transactions can continue to occur against the
    table. The SCH_S locks ensure that the schema of the table does not change, while
    the S locks pages from inserts, updates, and deletes. Because these locks are
    acquired for very short amounts of time, they allow the table to be available
    throughout the index creation process.'
  trans: '### 误解二：主键总是聚集的


    下一个相当普遍的误解是认为主键总是聚集的。尽管在许多情况下确实如此，但不能假设所有主键也都是聚集索引。在本书前面，我们讨论过一个表只能有一个聚集索引。如果主键是在聚集索引建立之后创建的，那么主键将被创建为非聚集索引。


    为了说明主键的索引行为，我们将使用一个脚本，其中包含构建两个表。我们将构建第一个名为 `dbo.MythTwo1` 的表，然后在 `RowID` 列上创建主键。对于第二个名为
    `dbo.MythTwo2` 的表，在创建之后，脚本将在创建主键之前先构建一个聚集索引。相关代码见**代码清单 8-5**。


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.MythTwo1

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    ALTER TABLE dbo.MythTwo1

    ADD CONSTRAINT PK_MythTwo1 PRIMARY KEY (RowID);

    GO

    CREATE TABLE dbo.MythTwo2

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    CREATE CLUSTERED INDEX CL_MythTwo2 ON dbo.MythTwo2 (RowID);

    ALTER TABLE dbo.MythTwo2

    ADD CONSTRAINT PK_MythTwo2 PRIMARY KEY (RowID);

    GO

    SELECT OBJECT_NAME(object_id) AS table_name

    ,name

    ,index_id

    ,type

    ,type_desc

    ,is_unique

    ,is_primary_key

    FROM sys.indexes

    WHERE object_id IN (OBJECT_ID(''dbo.MythTwo1''),OBJECT_ID(''dbo.MythTwo2''));

    ```


    **代码清单 8-5**：两种创建主键的方式


    运行该代码段后，最终的查询将返回类似**图 8-1** 所示的结果。该图显示，第一个表上的主键 `PK_MythTwo1` 被创建为聚集索引。然后在第二个表上，`PK_MythTwo2`
    被创建为非聚集索引。


    ![主键 sys.indexes 输出结果](img/338675_3_En_8_Fig1_HTML.jpg)


    **图 8-1**：主键 sys.indexes 输出结果


    在构建主键和聚集索引时，记住本节讨论的行为非常重要。如果遇到需要将它们分开的情况，则需要在聚集索引之后定义主键，或者将其定义为 `NONCLUSTERED`
    索引。


    ### 误解三：在线索引操作不会阻塞


    SQL Server 企业版的优势之一是能够在线构建索引。在在线索引构建期间，正在创建索引的表仍可用于查询和数据修改。当数据库需要被访问且维护窗口很短或几乎没有时，此功能非常有用。


    关于在线索引重建的一个常见误解是它不会引起任何阻塞。当然，与所有这些误解一样，这个也是错误的。使用在线索引操作时，在构建的主要部分期间，表上会持有意向共享锁。在结束时，会短暂持有共享锁（对于非聚集索引）或架构修改锁（对于聚集索引），以便操作将更新后的索引移入。这与离线索引构建不同，离线构建在整个索引构建期间都会持有共享锁或架构修改锁。


    当然，您会希望看到实际效果；为此，您将创建一个表，并使用 Extended Events 来监控在使用和不使用 `ONLINE` 选项创建索引时应用于表的锁。要开始此演示，请执行**代码清单
    8-6** 中的代码。此脚本创建表 `dbo.MythThree` 并用 1000 万条记录填充它。它返回的最后一项是表的 `object_id`，这对于演示的后续部分是必需的。在此示例中，`dbo.MythThree`
    的 `object_id` 是 `624721278`。


    #### 注意

    本误解的所有演示都需要 SQL Server 企业版或开发者版。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.MythThree

    (

    RowID int NOT NULL

    ,Column1 uniqueidentifier

    );

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 10000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythThree

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    SELECT OBJECT_ID(''dbo.MythThree'')

    GO

    ```


    **代码清单 8-6**：MythThree 表创建脚本


    为了在此场景中监控这些事件，您将使用 Extended Events 来捕获索引创建期间触发的 `lock_acquired` 和 `lock_released`
    事件。在 SSMS 中为**代码清单 8-7** 和 **代码清单 8-8** 的代码打开查询窗口。运行前，请将 **代码清单 8-8** 中的 `session_id`
    更新为 **代码清单 8-7** 中的 `session_id`；在此场景中，`session_id` 为 `42`。同样更新 `object_id`。在
    Extended Events 会话运行后，您可以使用实时视图来监控锁的发生情况。


    ```sql

    IF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name = ''MythThreeXevents'')

    DROP EVENT SESSION [MythThreeXevents] ON SERVER

    GO

    CREATE EVENT SESSION [MythThreeXevents] ON SERVER

    ADD EVENT sqlserver.lock_acquired(SET collect_database_name=(1)

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278)),

    ADD EVENT sqlserver.lock_released(

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278))

    ADD TARGET package0.ring_buffer

    GO

    ALTER EVENT SESSION [MythThreeXevents] ON SERVER STATE = START

    GO

    ```


    **代码清单 8-7**：用于锁获取和释放的 Extended Events 会话


    在**代码清单 8-8** 的示例中，创建了两个索引，一个 `ONLINE` 构建，另一个使用默认选项（即离线）构建。要查看获取和释放了哪些锁，请在实时查看器中观察锁定行为。默认情况下，实时查看器中只显示名称和时间戳。实时查看器允许自定义显示的列。在**图
    8-2** 中，除了默认的 `name` 和 `timestamp` 列外，还添加了 `object_id`、`mode`、`resource_type`
    和 `sql_text` 列。要添加其他列，请右键单击列标题并选择“选择列”。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_MythThree_ONLINE ON MythThree (Column1) WITH (ONLINE = ON);

    GO

    CREATE INDEX IX_MythThree ON MythThree (Column1);

    GO

    ```


    **代码清单 8-8**：非聚集索引创建的在线索引操作


    当使用 `ONLINE` 选项创建索引时，请注意在**图 8-2** 中，`SCH_S`（`Schema_Shared`）和 `S`（`Shared`）锁在毫秒级的时间内被获取和释放。因为这些锁在整个索引创建过程中被获取和释放，所以其他事务可以继续对表进行操作。`SCH_S`
    锁确保表的架构不发生变化，而 `S` 锁则阻止插入、更新和删除操作的页面。由于这些锁被持有非常短的时间，它们允许表在整个索引创建过程中保持可用。'
- fmt: '### Note


    If you do not see any results from the Extended Events session, it’s likely due
    to a mismatch between the `object_id` for `MythThree` and the `object_id` traced
    through the Extended Events session.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig2_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig2_HTML.jpg)

    *Figure 8-2 Index creation with ONLINE option*


    With the default index creation, which does not use the `ONLINE` option, the `S`
    locks are held for the entirety of the index build. Shown in Figure [8-3](#338675_3_En_8_Chapter.xhtml#Fig3),
    the `S` lock is taken before the `SCH_S` lock and isn’t released until after the
    index is build. The result is that the index is unavailable during the index build.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig3_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig3_HTML.jpg)

    *Figure 8-3 Index creation without ONLINE option*


    ### Myth 4: Any Column Can Be Filtered in Multicolumn Indexes


    The next common myth with indexes is that regardless of the position of the column
    in an index, the index can use that column in an ordered search to filter data
    within the index. As with the other myths discussed so far in this chapter, this
    one is also incorrect. An index does not need to use all the columns in an index.
    It does, however, need to start with the leftmost column in an index when performing
    an ordered search and use the columns from left to right, in their order, within
    the index. This is why the order of the columns in an index is so important.


    To demonstrate this myth, you will run through a few examples, shown in Listing
    [8-9](#338675_3_En_8_Chapter.xhtml#PC9). In the script, a table is created based
    on `Sales.SalesOrderHeader` with a primary key on `SalesOrderID`. To test the
    myth of searching all columns through multicolumn indexes, an index with the columns
    `OrderDate`, `DueDate`, and `ShipDate` is created.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFour'') IS NOT NULL

    DROP TABLE dbo.MythFour

    GO

    SELECT SalesOrderID, OrderDate, DueDate, ShipDate

    INTO dbo.MythFour

    FROM Sales.SalesOrderHeader;

    GO

    ALTER TABLE dbo.MythFour

    ADD CONSTRAINT PK_MythFour PRIMARY KEY CLUSTERED (SalesOrderID);

    GO

    CREATE NONCLUSTERED INDEX IX_MythFour ON dbo.MythFour (OrderDate, DueDate, ShipDate);

    GO

    ```

    *Listing 8-9 Multicolumn Index Myth*


    With the test objects in place, the next thing to check is the behavior of the
    queries against the table that could potentially use the nonclustered index. First,
    we’ll run a query that uses the leftmost column in the index. Listing [8-10](#338675_3_En_8_Chapter.xhtml#PC10)
    gives the code for this. As shown in Figure [8-4](#338675_3_En_8_Chapter.xhtml#Fig4),
    by filtering on the leftmost column, the query uses a seek operation on `IX_MythFour`.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig4_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig4_HTML.jpg)

    *Figure 8-4 Execution plan for leftmost column in index*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OrderDate FROM dbo.MythFour

    WHERE OrderDate = ''2011-07-17 00:00:00.000''

    ```

    *Listing 8-10 Query Using Leftmost Column in Index*


    Next, you’ll look at what happens when querying from the other side of the index
    key columns. In Listing [8-11](#338675_3_En_8_Chapter.xhtml#PC11), the query filters
    the results on the rightmost column of the index. The execution plan for this
    query, shown in Figure [8-5](#338675_3_En_8_Chapter.xhtml#Fig5), uses a scan operation
    on `IX_MythFour`. Instead of being able to go directly to the records that match
    the `OrderDate`, the query needs to check all records to determine which match
    the filter. While the index is used, it isn’t able to filter the rows based on
    the sort within the index.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig5_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig5_HTML.jpg)

    *Figure 8-5 Execution plan for rightmost column in index*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT ShipDate FROM dbo.MythFour

    WHERE ShipDate = ''2011-07-17 00:00:00.000''

    ```

    *Listing 8-11 Query Using Rightmost Column in Index*


    At this point, we’ve seen that the leftmost column can be used for filtering and
    that filtering on the rightmost column can use the index but cannot use it optimally
    with a seek operation. The last validation is to check the behavior of columns
    in an index that are not on the left or right side of the index. In Listing [8-12](#338675_3_En_8_Chapter.xhtml#PC12),
    a query is included that uses the middle column in the index `IX_MythFour`. As
    with any execution plan, the execution plan for the middle column query, shown
    in Figure [8-6](#338675_3_En_8_Chapter.xhtml#Fig6), uses the index but also uses
    a scan operation. The query is able to use the index but not in an optimal fashion.


    ![../images/338675_3_En_8_Chapter/338675_3_En_8_Fig6_HTML.jpg](images/338675_3_En_8_Chapter/338675_3_En_8_Fig6_HTML.jpg)

    *Figure 8-6 Execution plan for middle column in index*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM dbo.MythFour

    WHERE DueDate = ''2011-07-17 00:00:00.000''

    ```

    *Listing 8-12 Query Using Middle Column in Index*


    The myth of how columns in a multicolumn index can be used is one that can sometimes
    be confusing. As the examples showed, queries can use the index regardless of
    which columns of the index are being filtered. The key is to effectively use the
    index. To accomplish this goal, filtering must start on the leftmost column of
    the index. And when that isn’t the typical use case, either reorder the columns
    of the index or create additional indexes.


    ### Myth 5: Clustered Indexes Store Records in Physical Order


    One of the more pervasive myths commonly held is the idea that a clustered index
    stores the records in a table in their physical order when on disk. This myth
    seems to be primarily driven by confusion between what is stored on a page and
    where records are stored on those pages. As was discussed in Chapter [2](#338675_3_En_2_Chapter.xhtml),
    there is a difference between data pages and records. As a refresher, you’ll see
    a simple demonstration that dispels this myth.


    To begin this example, execute the code in Listing [8-13](#338675_3_En_8_Chapter.xhtml#PC13).
    The code in the example will create a table named `dbo.MythFive`. Then, it will
    add three records to the table. The last part of the script will output, using
    `sys.dm_db_database_page_allocations`, the page location for the table. In this
    example, the page with the records inserted into `dbo.MythFive` is page 59624,
    shown in Figure [8-7](#338675_3_En_8_Chapter.xhtml#Fig7).'
