  trans: '### 页自由空间页面


    为了跟踪页面是否有空间可用于插入行，每个数据文件都包含页自由空间（`PFS`）页面。这些页面是数据文件的第二页（见图 2-5），并在此后每隔 8,088 页出现一次，用于跟踪数据库中的自由空间量。`PFS`
    页面上的每个字节代表数据文件中的一个后续页面，并提供有关该页面的一些简单分配信息；即，它确定页面上自由空间的大致数量。


    当数据库引擎需要存储 `LOB` 数据或堆的数据时，它需要知道下一个可用页面在哪里，以及当前已分配页面的填充程度。此功能由 `PFS` 页面提供。每个字节内都有标志，用于标识当前已使用的空间量。位
    0-2 确定页面是否处于以下自由空间状态之一：


    *   页面为空。

    *   填充 1-50%。

    *   填充 51-80%。

    *   填充 81-95%。

    *   填充 96-100%。


    除了自由空间，`PFS` 页面还包含位来标识页面的其他几种信息类型。例如，位 3 确定页面上是否存在影子记录。位 4 标识页面是否是索引分配映射的一部分（本章稍后描述）。位
    5 说明页面是否位于混合区中。最后，位 6 标识页面是否已被分配。


    通过这些附加标志或位，`SQL Server` 可以从高级别确定页面的使用内容和方式。它可以确定页面当前是否已分配。如果没有，它是否可用于 `LOB` 或堆数据？如果当前已分配，则
    `PFS` 页面就提供本节前面描述的第一个目的。


    最后，当影子清理进程运行时，该进程不需要检查数据库中的每个页面以寻找要清理的记录。相反，可以检查 `PFS` 页面，并且只需要访问那些包含影子记录的页面。


    ### 注意


    索引本身处理非 `LOB` 数据和索引的自由空间和页面分配。这些结构的页面分配由结构的定义决定。


    ### 全局分配映射页面


    与 `PFS` 页面类似的是全局分配映射（`GAM`）页面。该页面确定一个区是否已被指定用作统一区。`GAM` 页面的次要目的是帮助确定该区是否空闲且可用于分配。


    每个 `GAM` 页面提供其后续 `GAM` 间隔内所有区的映射。一个 `GAM` 间隔由 `GAM` 页面之后的 64,000 个区或 4 `GB` 组成。`GAM`
    页面上的每个位代表 `GAM` 页面后的一个区。第一个 `GAM` 页面位于数据库文件的第 2 页（见图 2-5）。


    为了确定一个区是否已分配为统一区，`SQL Server` 会检查 `GAM` 页面中代表该区的位。如果该区已分配，则该位设置为 `0`。当设置为 `1`
    时，该区空闲且可用于其他目的。


    ### 共享全局分配映射页面


    与 `GAM` 页面几乎完全相同的是共享全局分配映射（`SGAM`）页面。页面之间的主要区别在于，`SGAM` 页面确定一个区是否被分配为混合区。与 `GAM`
    页面一样，`SGAM` 页面也用于确定页面是否可用于分配。


    每个 `SGAM` 页面提供其后续 `SGAM` 间隔内所有区的映射。一个 `SGAM` 间隔由 `SGAM` 页面之后的 64,000 个区或 4 `GB`
    组成。`SGAM` 页面上的每个位代表 `SGAM` 页面后的一个区。第一个 `SGAM` 页面位于数据库文件 `GAM` 页面之后的第 3 页（见图 2-5）。


    `SGAM` 页面确定一个区何时已被分配用作混合区。如果该区为此目的而分配并且有空闲页面，则该位设置为 `1`。当设置为 `0` 时，表示该区未用作混合区，或者是所有页面都在使用中的混合区。


    ### 差异更改映射页面


    接下来讨论的是差异更改映射（`DCM`）页面。该页面用于确定 `GAM` 间隔中的一个区是否已更改。当一个区发生更改时，位值从 `0` 更改为 `1`。这些位存储在
    `DCM` 页面的位图行中，每个位代表一个区。


    `DCM` 页面用于跟踪在完整数据库备份之间哪些区发生了更改。每当进行完整数据库备份时，`DCM` 页面上的所有位都会重置为 `0`。当关联的区内发生更改时，该位会更改回
    `1`。


    `DCM` 页面的主要用途是为差异备份提供已修改区的列表。无需检查数据库中的每个页面或区以查看其是否已更改，`DCM` 页面提供了要备份的区列表。


    第一个 `DCM` 页面位于数据文件的第 6 页。后续的 `DCM` 页面出现在数据文件的每个 `GAM` 间隔中。


    ### 最小日志记录页面


    在 `DCM` 页面之后的是最小日志记录（`ML`）页面，以前称为大容量更改映射页面。`ML` 页面用于指示 `GAM` 间隔中的一个区何时已被最小日志记录操作修改。任何受最小日志记录操作影响的区，其位值将设置为
    `1`，而未受影响的将设置为 `0`。这些位存储在 `ML` 页面的位图行中，每个位代表 `GAM` 间隔中的一个区。


    正如 `ML` 页面的前名称（`大容量更改映射`）所暗示的，这些页面与 `BULK_LOGGED` 恢复模型结合使用。当数据库使用此恢复模型时，`ML` 页面用于标识自上次事务日志备份以来通过最小日志记录操作修改的区。当事务日志备份完成时，`ML`
    页面上的位将重置为 `0`。


    第一个 `ML` 页面位于数据文件的第 7 页。后续的 `ML` 页面出现在数据文件的每个 `GAM` 间隔中。


    ### 索引分配映射页面


    到目前为止讨论的大多数页面都提供有关它们所覆盖页面上是否有数据的信息。比页面是否开放和可用更重要的是，`SQL Server` 需要知道页面上的信息是否与特定表或索引相关联。提供此信息的页面是索引分配映射（`IAM`）页面。


    每个表或索引首先从一个 `IAM` 页面开始。该页面指示先前讨论的 `GAM` 间隔内哪些区与该表或索引相关联。如果一个表或索引跨越多个 `GAM` 间隔，则该表或索引将有多个
    `IAM` 页面。


    `IAM` 页面将四种类型的页面与表或索引相关联。这些是数据页、索引页、大对象页和小大对象页。`IAM` 页面通过 `IAM` 页面上的位图行实现页面与表或索引的关联。


    除了位图行之外，`IAM` 页面上还有一个 `IAM` 头行。`IAM` 头提供表或索引的 `IAM` 页面的序列号。它还包含 `IAM` 页面所关联的 `GAM`
    间隔的起始页。最后，该行包含一个单页分配数组。当分配给表或索引的空间少于一个区时使用此数组。


    理解 `IAM` 页面的价值在于，它提供了一个映射和根，通过它，表或索引的所有页面汇集在一起。当需要确定表或索引的所有区时，就会使用此页面。'
- fmt: '### Data Page


    Data pages are the most prevalent type of pages in any database. Data pages are
    used to store the data from rows in the database’s tables. Except for a few data
    types, all data for a record is located on data pages. The exception to this rule
    is columns that store data in LOB data types. That information is stored on large
    object pages, discussed later in this section.


    An understanding of data pages is important in relation to indexing internals.
    The understanding is important because data pages are the most common pages that
    will be looked at when looking at the internals of an index. When you get to the
    lowest levels of the index, data pages will always be found.


    ### Index Page


    Similar to data pages are index pages. These pages provide information on the
    structure of indexes and where data pages are located. For clustered indexes,
    the index pages are used to build the hierarchy of pages that are used to navigate
    the clustered index. With nonclustered indexes, index pages perform the same function
    but are also used to store the key values that comprise the index.


    As mentioned, index pages are used to build the hierarchy of pages within an index.
    To accomplish this, the data contained in an index page provides a mapping of
    key values and page addresses. The key value is the key value from the index that
    the first sorted row on the child table contains, and the page address identifies
    where to locate this.


    Index pages are constructed similarly to other page types. The page has a page
    header that contains all the standard information, such as page type, allocation
    unit, partition ID, and allocation status. The row offset array contains pointers
    to where the index data rows are located on the page. The index data rows contain
    two pieces of information: the key value and a page address (these were described
    earlier).


    Understanding index pages is important since they provide a map of how all the
    data pages in an index are hooked together.


    ### Large Object Page


    As previously discussed, the limit for data on a single page is 8 KB. The maximum
    size, though, for some data types can be as high as 2 GB. For these data types,
    another storage mechanism is required to store the data. For this, there is a
    large object page type.


    The data types that can utilize LOB pages include `text`, `ntext`, `image`, `nvarchar(max)`,
    `varchar(max)`, `varbinary(max)`, and `xml`. When the data for one of these data
    types is stored on a data page, the LOB page will be used if the size of the row
    will exceed 8 KB. In these cases, the column will contain references to the LOB
    pages required for the data, and it will be stored on LOB pages instead (see Figure
    [2-6](#338675_3_En_2_Chapter.xhtml#Fig6)).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig6_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig6_HTML.jpg)


    Figure 2-6

    Data page link to the LOB page


    ## Organizing Pages


    So far you’ve looked at the low-level components that make up the internals for
    indexing. While these pieces are important to indexing, the structures in which
    these components are organized are where the value of indexing is realized. SQL
    Server utilizes a number of different organizational structures for storing data
    in the database.


    The organizational structures in SQL Server are:

    ```

    * Heap

    * Balanced-tree (B-tree)

    * Columnar

    ```


    These structures all map to specific index types that will be discussed later
    in this chapter. In this section, you’ll examine each of the ways to organize
    pages to build that understanding.


    ### Note


    In the structures for organizing indexes, the levels of the index that contain
    index pages are considered *nonleaf* levels. When referencing levels that contain
    data pages, the levels are called *leaf levels*.


    ### Heap Structure


    The default structure for organizing pages is called a *heap*. Heaps occur when
    a B-tree structure, discussed in the next section, is not used to organize the
    data pages in a table. Conceptually, a heap can be envisioned to be a pile of
    data pages in no particular order, as shown in Figure [2-7](#338675_3_En_2_Chapter.xhtml#Fig7).
    In the example, the only way to retrieve all of the “Madison” records is to check
    each page to see whether “Madison” is on the page.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig7_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig7_HTML.jpg)


    Figure 2-7

    Heap pile example


    From an internals perspective, though, heaps are more than a pile of pages. While
    unsorted, heaps have a few key components that organize the pages for easy access.
    All heaps start with an IAM page, shown in Figure [2-8](#338675_3_En_2_Chapter.xhtml#Fig8).
    IAM pages, as discussed, map out which extents and single-page allocations within
    a GAM interval are associated with an index. For a heap, the IAM page is the only
    mechanism for associating data pages and extents to a heap. As mentioned, the
    heap structure does not enforce any sort of ordering on the pages that are associated
    with the heap. The first page available in a heap is the first page found in the
    database file for the heap.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig8_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig8_HTML.jpg)


    Figure 2-8

    Heap structure


    The IAM page lists all the data pages associated with the heap. The data pages
    for the heap store the rows for the table, with the use of LOB pages as needed.
    When the IAM page has no more pages available to allocate in the GAM interval,
    a new IAM page is allocated to the heap, and the next set of pages and their corresponding
    rows are added to the heap, as detailed in Figure [2-1](#338675_3_En_2_Chapter.xhtml#Fig1).
    As the image shows, a heap structure is flat. From top to bottom, there is only
    ever one level from the IAM pages to the data pages of the structure.


    While a heap provides a mechanism for organizing pages, it does not relate to
    an index type. A heap structure is used when a table does not have a clustered
    index. When a heap stores rows in a table, the rows are inserted without an enforced
    order. This happens because, as opposed to a clustered index, a sort order based
    on specific columns does not exist on a heap.'
