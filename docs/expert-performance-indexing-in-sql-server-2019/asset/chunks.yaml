    in a table and the impact that might have on statistics, it does provide details
    that identify the volume of change on an index and the statistics that support
    it. When trying to determine whether an index has statistics that may be out-of-date,
    this DMO is extremely useful.


    ### sys.dm_db_stats_histogram


    While getting the histogram for statistics can be done with `DBCC SHOW_STATISTICS`,
    SQL Server 2016 introduced the DMO function `sys.dm_db_stats_histogram`. This
    function returns output similar to the `DBCC` command with the added benefit that
    it can be joined with other DMOs to increase the usability of this data. The syntax
    for the function, shown in Listing [3-9](#338675_3_En_3_Chapter.xhtml#PC9), accepts
    an `object_id` and `stats_id` with the columns listed in Table [3-7](#338675_3_En_3_Chapter.xhtml#Tab7)
    returned in the output.


    **Table 3-7**

    Columns for `sys.dm_db_stats_histogram`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the object in question. |

    | `stats_id` | `int` | ID of the statistics. For indexes, the ID matches the index
    ID. |

    | `step_number` | `int` | Number of steps in the histogram. Max value 200. |

    | `range_high_key` | `sql_variant` | Upper-bound column value for a histogram
    step. The column value is also called a *key value*. |

    | `range_rows` | `real` | Estimated number of rows whose column value falls within
    a histogram step, excluding the upper bound. |

    | `equal_rows` | `real` | Estimated number of rows whose column value equals the
    upper bound of the histogram step. |

    | `distinct_range_rows` | `bigint` | Estimated number of rows with a distinct
    column value within a histogram step, excluding the upper bound. |

    | `average_range_rows` | `real` | Average number of rows with duplicate column
    values in the histogram step, excluding the upper bound (`range_rows/distinct_range_rows
    for distinct_range_rows > 0`). |


    ```

    sys.dm_db_stats_histogram (object_id, stats_id)

    Listing 3-9

    Syntax for sys.dm_db_stats_histogram

    ```


