  trans: '

    ### 注意


    在我曾工作过的一个环境中，一些较少使用的`索引`从数据库中被移除了。这些索引通常每天只使用一次。但那唯一的一次使用，却是一个对业务至关重要的导入过程，基本上没有这些`索引`就无法执行。如果在移除这些`索引`之前做了影响分析，本可以避免许多棘手的问题。


    ### 状态报告


    在实施阶段的另一端是状态顾名思义，状态报告是一份向经理和同事提供关于`索引`变更实际影响反馈的文件。这份文件不需要非常深入，但它需要涵盖一些关键点。状态报告应包含以下信息：


    *   所有已完成的`索引`变更

    *   变更部署的状态

    *   简要性能回顾

    *   关于已注意到的任何性能回退的信息

    *   在部署过程中学到的经验

    *   遇到的问题总结


    编写状态报告时，不要过于纠结细节。如果一切顺利，在不久的将来还会有额外的监控和分析阶段。最终，状态报告需要传达两点。第一，它提供对`索引`部署中成功与失败的诚实评估。第二，也是最重要的，它列出了通过`索引`变更现在正在实现哪些收益。这一点最为重要，因为这是管理层需要看到的`索引`工作投资回报率，以便能够证明在`索引`上所花费的时间和精力是合理的。


    ### 注意


    作为顾问，我做过的最成功的其中一件事就是不断向客户更新我所做的`索引`变更的影响。一张显示变更前后性能对比的图表，对于我协助的一些团队来说，有时看起来像是“自我吹捧”，但聘请我来的管理层发现，这对于识别聘请顾问的投资回报率，以及向上级传达为解决业务性能问题所付出的努力，都极其有用。


    ### 部署脚本


    分析阶段的主要交付成果是你环境中数据库计划的`索引`变更列表。在实施阶段，需要对这些`索引`进行评审并为部署做准备。作为为部署准备`索引`的一部分，需要执行三个步骤：


    1.  准备数据库架构的部署和回滚方案。

    2.  将`索引`变更保存到源代码控制中。

    3.  分享同行评审和影响分析的结果。


    #### 准备数据库架构的部署和回滚方案


    通常，在分析阶段结束时，你会得到一份提议的`索引`变更列表。这个列表在阶段结束时通常还不能直接用于部署。从那时点到执行变更之间，需要将`索引`变更调整到可以用于部署的状态。


    在构建部署脚本时，务必遵循“无害”原则对待数据库。换句话说，你需要构建足够智能的脚本，使得它们可以多次执行并产生相同的结果。此外，这意味着应提供脚本来撤销任何正在实施的`索引`变更。切勿假设表之前的`索引`状态已存储在源代码控制中。务必检查以确认已知现有状态，并在需要时开发脚本以恢复到该状态。


    部署脚本还需要注意所使用的`SQL Server`版本。例如，如果你使用的是`Enterprise Edition`，对于需要以新特性重建的`索引`，请利用在线`索引`重建功能。如果对`索引`合适，`Enterprise
    Edition`还允许对`索引`进行压缩，这在许多情况下可以节省空间并提升性能。


    #### 将索引变更保存到源代码仓库


    如前所述，表上`索引`的当前状态应存放在源代码仓库中。如果还没有，那么在这次实施阶段迭代中，是时候这样做了。源代码仓库提供了一个存储数据库代码或架构的地方，使你的组织能够确定在特定日期时间`索引`、表或存储过程的架构是什么。从应用程序的角度来看，源代码通常管理良好。开发人员通常会快速选择一个工具并将其用于他们的应用程序。


    源代码仓库允许你将数据库架构恢复到某个时间点。如果你的组织内有任何开发团队，他们很可能已经有一个期望的仓库。这可能是一个内部仓库，如`Perforce`，或一个外部可用的解决方案，如`GitHub`。


    #### 包含影响分析的同行评审


    在执行步骤之前要做的最后一件事是寻求对`索引`变更的同行评审。最糟糕的情况莫过于在真空中工作，不理解所提议的变更对使用数据库的应用程序的整体影响。专注于`索引`目标很容易导致视野狭隘，而忽略了当前部署的业务目标，或者忽视了在`索引`分析中不明显的一些东西。


    避免这些陷阱的最佳方法是找一位同行来评审`索引`变更。向同行提供`索引`部署脚本和影响分析，并一起过一遍这些变更。你的同行不一定需要了解环境的一切，只需要对`索引`有基本了解即可。同行评审的目的是解释每一项变更。在这个对话中，你的同行充当一个共鸣板，你向其解释`索引`需求。这起到了双重作用。首先，你的同行将能够就`索引`变更提供反馈。其次，通过讨论这些变更，你可能会听到自己描述某个`索引`变更时，感觉它听起来不太对劲。


    在某些环境中，你可能找不到可以求助的同行来评审`索引`。在这些情况下，考虑找你的经理进行同行评审。如果那也不可能，与你的经理谈谈利用你技术网络中的同行。利用论坛和社交网络找到一个或一群愿意与你一起评审变更的同行。使用像`Twitter`这样的社交网络联系技术同行并评审一些`索引`变更，总比完全没有同行评审要好得多。


    完成同行评审后，`索引`就准备好进入实施阶段的下一个步骤：实际将`索引`应用到数据库的步骤。


    ### 注意


    在`SQL Server`社区中，`Twitter`是较为活跃的社交网络工具之一。使用标签 `` `#sql` `` 和 `` `#sqlserver` ``
    来查找关于`SQL Server`的通用信息。当寻找关于`SQL Server`的特定问题答案时，你可以使用标签 `` `#sqlhelp` ``。`Twitter`还允许你通过在推文中包含某人的`Twitter`账号来将其加入对话。例如，本书作者可以通过`Twitter`账号
    `` `@stratesql` `` 联系到。

    '
- fmt: '

    ## Execution


    The last piece of the Implement phase is the execution of the T-SQL scripts that
    will apply the indexing changes to the database. These scripts should already
    be prepared through the Deploy Scripts step, and the scope of the changes should
    be well known from the Communication step. Thus, the Execution step should be
    relatively painless as the preparation work is already completed.


    From an execution standpoint, the manner of execution is completely dependent
    on your organization’s change control process. In some environments, there are
    automated processes where scripts can be loaded to a deployment mechanism and
    executed on a schedule. In others, the DBAs simply open `SQL Server Management
    Studio` and execute each script until all the changes are completed. Whatever
    the mechanism, the key is that at this stage the indexes get deployed.


    As the deployment progresses, be sure to catalog the changes made and any issues
    that arise during execution. Pay attention to unintended blocking on the databases.
    If indexes are being deployed in an offline state, be sure to select an execution
    window that is during the database maintenance window. Remember even online index
    operations can cause short-lived blocking.


    ## Repeat


    At the beginning of this chapter, the discussion started by looking at the three
    phases of the Indexing Method. The diagram for the process (Figure [15-1](#338675_3_En_15_Chapter.xhtml#Fig1))
    shows the three phases in an endless loop, with each phase leading to the next.
    This choice in layout was intentional. Indexing is not a fixed-point activity.
    Once the first round of the Indexing Method is completed, it is important to start
    the next round of indexing.


    It can be tempting, when databases are properly tuned, to let the practice of
    indexing slip and to focus on other priorities. Unfortunately, new features are
    often added to applications as frequently as new data is added to the database.
    Both of these events will change the way in which indexes are used by the database
    and the effectiveness of the current state of “good” indexes.


    To maintain the desired performance of the database platform, indexes must be
    continuously reviewed. This isn’t to say that a full-time resource always needs
    to be assigned to monitoring, analyzing, and implementing indexes. There does,
    though, need to be an acceptance that at some interval an evaluation of the state
    of indexing will be completed.


    ## Summary


    As this chapter showed, the Indexing Method is quite similar to the Scientific
    Method. Within your database platform, statistics can be collected on indexes
    in order to identify where indexing issues may exist. These statistics can then
    be further utilized to determine the types of indexes to modify and where. Indexing
    tools such as the `Database Engine Tuning Advisor` and `missing index DMOs` can
    be leveraged to discover “the low-hanging fruit,” giving you a head start on analysis
    that you may not have discovered otherwise. By following the phases laid out in
    the Indexing Method, you can build a stable, repeatable indexing process that
    can help improve the performance of your database platform and achieve stable
    performance over time.


