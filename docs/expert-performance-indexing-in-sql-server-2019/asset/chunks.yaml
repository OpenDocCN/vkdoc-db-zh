    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 11-32 创建带有聚集列存储索引的事实表


    随着 SQL Server 的最新发展，列存储索引在数据仓库的索引方式上是一项重大改进。这些性能提升为将数据库扩展到传统索引难以企及的范围打开了机会。以前只能汇总数百万行结果的场景，现在将能够扩展到数十亿行。此外，由于所有列都可以包含在列存储索引中，在数据仓库中持续维护和调整索引的工作和要求大大减少。


    ### 注意


    下一节使用了 WorldWideImporters 数据库，可以从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)
    下载。'
- fmt: '## JSON Indexing


    SQL Server 2016 introduced the ability to process JSON (JavaScript Object Notation)
    data within SQL Server. JSON defines methods of structuring data that are easy
    for both applications and people to read and write. Due to this ease, it’s become
    very popular within application development.


    Instead of tags and attributes that are used in XML, JSON leverages brackets,
    colons, and quotes to define entity-attribute relationships. As an example, Listing
    [11-33](#338675_3_En_11_Chapter.xhtml#PC33) contains an XML document that defines
    extra information regarding an employee of WideWorldImporters. That same information
    represented by JSON is shown in Listing [11-34](#338675_3_En_11_Chapter.xhtml#PC34).
    Comparing the two, the JSON is quite a bit easier to read and understand than
    the same data represented as XML.


    ```

    {

    "OtherLanguages": ["Polish","Chinese","Japanese"] ,

    "HireDate":"2008-04-19T00:00:00",

    "Title":"Team Member",

    "PrimarySalesTerritory":"Plains",

    "CommissionRate":"0.98"

    }

    Listing 11-34

    JSON Example

    ```


    ```

    Polish

    Chines

    Japanese


    2008-04-19T00:00:00

    Team Member

    Plains

    0.98


    Listing 11-33

    XML Example

    ```


    While SQL Server can now process JSON data, Microsoft implemented JSON a bit different
    than how XML and spatial were implemented. Instead of a dedicated data type, JSON
    data is stored in columns defined with the data types `varchar(max)` and `nvarchar(max)`.
    Then the information within the data can be retrieved using the functions `JSON_VALUE`
    or `JSON_QUERY`. The advantage of this implementation is that there are no special
    indexing types associated with JSON data, which is why there isn’t a chapter dedicated
    to JSON indexing. Instead, JSON data takes advantage of existing indexing capabilities
    by using computed columns persisted through indexes.


    Before we start with how to index JSON data, let’s start with an example of how
    the JSON functions work and their effect on performance. To start, create the
    table `dbo.People` from `Application.People` in `WideWorldImporters`, provided
    in Listing [11-35](#338675_3_En_11_Chapter.xhtml#PC35). In that table, we’ll include
    a column for `HireDate` that retrieves the `HireDate` from the JSON document in
    `CustomFields`.


    ```

    USE WideWorldImporters;

    GO

    DROP TABLE IF EXISTS dbo.People;

    CREATE TABLE [dbo].[People]

    (

    [PersonID] [INT] NOT NULL,

    [FullName] [NVARCHAR](50) NOT NULL,

    [CustomFields] [NVARCHAR](MAX) NULL,

    [HireDate] AS JSON_VALUE([CustomFields], N''$.HireDate''),

    [Junk] [VARCHAR](4000) NULL,

    CONSTRAINT [PK_People]

    PRIMARY KEY CLUSTERED ([PersonID])

    );

    GO

    INSERT INTO dbo.People

    (

    PersonID,

    FullName,

    CustomFields,

    Junk

    )

    SELECT PersonID,

    FullName,

    CustomFields,

    REPLICATE(''x'', 4000) AS Junk

    FROM Application.People;

    GO

    Listing 11-35

    JSON Example Setup

    ```


    If we query `dbo.People`, using the code in Listing [11-36](#338675_3_En_11_Chapter.xhtml#PC36),
    we’ll find that we get the desired results from the JSON data, through the computed
    column. Unfortunately, to retrieve these results, SQL Server is the clustered
    index, shown in Figure [11-50](#338675_3_En_11_Chapter.xhtml#Fig50). The impact
    of this scan is that all 1,111 rows in the table are accessed which the statistics
    output in Figure [11-49](#338675_3_En_11_Chapter.xhtml#Fig49) indicates and leads
    to 762 reads for the query.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig50_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig50_HTML.jpg)

    Figure 11-50

    Execution plan for computed JSON column


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig49_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig49_HTML.jpg)

    Figure 11-49

    Statistics I/O results for computed JSON column


    ```

    USE WideWorldImporters;

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL;

    Listing 11-36

    Query Computed JSON Column

    ```


    To alleviate the performance impact of the computed JSON column, we can add an
    index to the computed column, as shown in Listing [11-37](#338675_3_En_11_Chapter.xhtml#PC37),
    and then execute the query against `dbo.People` again. This time the performance
    is greatly improved. Instead of 762 reads, Figure [11-51](#338675_3_En_11_Chapter.xhtml#Fig51)
    shows that there are only 3 reads. Additionally, the execution plan in Figure
    [11-52](#338675_3_En_11_Chapter.xhtml#Fig52) indicates that an index seek on the
    index added was used.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig52_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig52_HTML.jpg)

    Figure 11-52

    Execution plan for computed and indexed JSON column


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig51_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig51_HTML.jpg)

    Figure 11-51

    Statistics I/O results for computed and indexed JSON column


    ```

    USE WideWorldImporters;

    GO

    CREATE INDEX IX_People_HireDate ON dbo.People (HireDate);

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL

    Listing 11-37

    Index and Query JSON Computed Column

    ```


    By leveraging computed columns, JSON data can be easily and efficiently accessed
    within your databases. And rather than needing to learn about new indexing technologies
    to gain that efficiency, you are able to leverage existing features. This makes
    it easier to both adopt and support JSON and efficient query access to that data.


    ## Index Storage Strategies


    The strategies in the chapter up to this point have primarily focused on improving
    the performance queries using indexes through the key and nonkey column design
    of the index. There are other options that can be used in conjunction to column
    selection that can be considered in the design of indexes. These alternative strategies
    all relate to the way in which indexes are stored in the database.


    There are two options available for addressing how an index stores its data. The
    basic premise for both of these options is that the smaller the index, the fewer
    pages that it will contain and the fewer reads and writes that will be required
    when querying the data. The first option available is row compression, and the
    second is page compression. Both of these options provide the potential for substantial
    storage savings and performance improvements.


    ### Note

    The use of row and page compressions is limited to SQL Server Enterprise Edition.'
