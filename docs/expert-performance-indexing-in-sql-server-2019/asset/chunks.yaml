- fmt: "# DMF Column Descriptions and Usage Examples\n\n## DMF Column Descriptions\n\
    \n| DMF Column | Description |\n| --- | --- |\n| `database_id` | ID of the database.\
    \ |\n| `object_id` | Object ID for the table or view. |\n| `index_id` | ID for\
    \ the index. |\n| `partition_id` | Partition number for the index. |\n| `rowset_id`\
    \ | Partition ID for the index. |\n| `allocation_unit_id` | ID of the allocation\
    \ unit. |\n| `allocation_unit_type` | Type of allocation unit. |\n| `allocation_unit_type_desc`\
    \ | Description of the allocation unit. |\n| `data_clone_id` | Unknown. |\n| `clone_state`\
    \ | Unknown. |\n| `clone_state_desc` | Unknown. |\n| `extent_file_id` | File ID\
    \ of the extent. |\n| `extent_page_id` | Page ID for the extent. |\n| `allocated_page_iam_file_id`\
    \ | File ID for the index allocation map page associated with the page. |\n| `allocated_page_iam_page_id`\
    \ | Page ID for the index allocation map page associated with the page. |\n| `allocated_page_file_id`\
    \ | File ID of the allocated page. |\n| `allocated_page_page_id` | Page ID for\
    \ the allocated page. |\n| `is_allocated` | Indicates whether a page is allocated.\
    \ |\n| `is_iam_page` | Indicates whether a page is the index allocation page.\
    \ |\n| `is_mixed_page_allocation` | Indicates whether a page is allocated. |\n\
    | `page_free_space_percent` | Percentage of space free on the page. |\n| `page_type`\
    \ | Page type ID for the allocated page. |\n| `page_type_desc` | Description of\
    \ the page type. |\n| `page_level` | Level of the page in the B-tree index. |\n\
    | `next_page_file_id` | File ID for the next page. |\n| `next_page_page_id` |\
    \ Page ID for the next page. |\n| `previous_page_file_id` | File ID for the previous\
    \ page. |\n| `previous_page_page_id` | Page ID for the previous page. |\n| `is_page_compressed`\
    \ | Indicates whether the page is compressed. |\n| `has_ghost_records` | Indicates\
    \ whether the page has ghost records. |\n\n## Use Cases for sys.dm_db_database_page_allocations\n\
    \nWith this DMF, there are a couple of use cases we can investigate that can help\
    \ to demonstrate leveraging `sys.dm_db_database_page_allocations`. To begin, you\
    \ want to create a database for this chapter and a table that has twelve rows\
    \ in it using Listing 2-2.\n\n```sql\nUSE master;\nGO\nCREATE DATABASE Chapter2Internals;\n\
    GO\nUSE Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsOne\n(\nRowID INT\
    \ IDENTITY(1, 1),\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsOne\n\
    DEFAULT VALUES;\nGO 12\n```\n\n**Listing 2-2**\nScript for Creating dbo.IndexInternalsOne\
    \ with 12 Rows\n\nAfter creating the table, you’ll use the script in Listing 2-3\
    \ to show how SQL Server stored the records in the table and how you can examine\
    \ them with `sys.dm_db_database_page_allocations`. As Figure 2-13 shows, there\
    \ is one Index Allocation Map page allocated to the table, which is within a mixed\
    \ page allocation. This means the multiple indexes can use that extent to allocate\
    \ these pages. And then there are eight pages allocated to the first data page\
    \ extent of the index starting at page 312 and another four pages allocated from\
    \ an extent starting at page 320. Additionally, you see that there are four pages\
    \ allocated but not assigned a page type on the extent at page 320. This demonstrates\
    \ and confirms what was discussed in the previous section on heap structures.\
    \ There’s an index allocation map and extents with data pages allocated to that\
    \ map.\n\n![Figure 2-13: Extent allocation results for dbo.IndexInternalsOne](images/338675_3_En_2_Chapter/338675_3_En_2_Fig13_HTML.jpg)\n\
    \n```sql\nSELECT DPA.extent_file_id,\n       DPA.extent_page_id,\n       DPA.page_type_desc,\n\
    \       DPA.allocation_unit_type_desc,\n       DPA.is_iam_page,\n       DPA.is_mixed_page_allocation,\n\
    \       COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsOne'), NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n\
    \         DPA.extent_page_id,\n         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n\
    \         DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n\n**Listing 2-3**\nExtent Allocation with\
    \ `sys.dm_db_database_page_allocations`\n\nIndex allocation map pages are always\
    \ part of a mixed extent, since the allocation determines the index mapping for\
    \ multiple tables. To demonstrate, you can run the script in Listing 2-4 which\
    \ creates a second table that includes a clustered index via a primary key. Reviewing\
    \ the results in Figure 2-14, the six rows were added to an extent that starts\
    \ at page 328, bypassing the four pages that were allocated, but not used in the\
    \ previous table. The index allocation map page though belongs to the same extent\
    \ as that of `dbo.IndexInternalsOne`, which starts at page 232, showing that this\
    \ extent is indeed mixed. Additionally, you’ll see that an index page is allocated\
    \ to the table to support the B-tree structure of the clustered index.\n\n![Figure\
    \ 2-14: Extent allocation results for dbo.IndexInternalsTwo](images/338675_3_En_2_Chapter/338675_3_En_2_Fig14_HTML.jpg)\n\
    \n```sql\nUSE Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsTwo\n(\n\
    RowID INT IDENTITY(1, 1) PRIMARY KEY,\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO\
    \ dbo.IndexInternalsTwo\nDEFAULT VALUES;\nGO 6\n\nSELECT DPA.extent_file_id,\n\
    \       DPA.extent_page_id,\n       DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n\
    \       DPA.is_iam_page,\n       DPA.is_mixed_page_allocation,\n       COUNT(*)\
    \ AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsTwo'),\
    \ NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n         DPA.extent_page_id,\n\
    \         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n     \
    \    DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n\n**Listing 2-4**\nScript for Creating `dbo.IndexInternalsTwo`\
    \ with 12 Rows\n\nBeyond extent-level details, you can use this DMF to investigate\
    \ indexes down to the page level to understand all pages allocated to the table\
    \ and the order in which they relate to other pages in an index. Using the script\
    \ in Listing 2-5, you can once again see, in Figure 2-15, that the extent starting\
    \ on page 232 includes the allocated pages 235 and 236 for the index allocation\
    \ maps. And the page allocated to the extent starting at page 312 includes pages\
    \ 312, 313, and so on which is similar to the extent starting at page 328 which\
    \ includes pages 328, 329, and so on. Add to this the ability to see per page\
    \ the page level within the B-tree and the connections between pages, verifying\
    \ the ability to move up and down the index and from page to page at the data\
    \ pages.\n\n![Figure 2-15: Extent allocation results for reviewing all allocated\
    \ pages](images/338675_3_En_2_Chapter/338675_3_En_2_Fig15_HTML.jpg)\n\n```sql\n\
    SELECT DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n       DPA.object_id,\n\
    \       DPA.index_id,\n       DPA.extent_page_id,\n       DPA.allocated_page_iam_page_id,\n\
    \       DPA.allocated_page_page_id,\n       DPA.page_level,\n       DPA.next_page_page_id,\n\
    \       DPA.previous_page_page_id\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), NULL, NULL, 'DETAILED') DPA\n```\n\n**Listing\
    \ 2-5**\nScript for Reviewing All Allocated Pages"
