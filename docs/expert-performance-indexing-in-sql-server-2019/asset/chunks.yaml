    ## 清单 13-9

    ### 填充索引操作统计信息快照


    填充快照之后的下一步是填充历史记录表。如前所述，历史记录表的目的是存储两个快照之间**增量**的统计信息。这些增量信息提供了有关发生了哪些操作的信息，它们还有助于对操作进行时间范围限定，以便在需要时，可以更集中地关注核心时段与非核心时段的操作。识别统计信息何时已重置的业务规则与索引使用情况统计信息类似：如果索引上的任何统计信息返回负值，则将忽略前一个快照中的该行。此外，任何返回全零值的行也将不被包含在内。清单
    13-10 展示了用于生成历史增量信息的代码。

