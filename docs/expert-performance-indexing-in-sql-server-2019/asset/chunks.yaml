    树结构，如图 [2-20](#338675_3_En_2_Chapter.xhtml#Fig20) 所示。B 树从 IAM 页开始，即页码 1:237。此页链接到页面
    1:361，这是一个位于索引级别 1 的索引页。随后，页面 1:360、1:362、1:363 和 1:364 位于索引级别 0，并彼此双向链接。


