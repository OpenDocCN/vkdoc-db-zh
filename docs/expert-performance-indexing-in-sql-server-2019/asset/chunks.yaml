  trans: '### 聚集索引


    第二种索引类型是 `聚集索引`。`聚集索引`使用 `B 树` 来存储数据。从所有实际目的来看，`聚集索引` 是 `堆表` 的对立面。当在表上构建 `聚集索引`
    时，`堆表` 会被 `B 树` 结构所取代，根据 `聚集索引` 的键列来组织数据页。`聚集索引` 的 `B 树` 包含了表中所有行数据的数据页。


    在考虑索引列时，`聚集索引` 有一些限制。第一个限制是键列的总长度不能超过 900 字节。其次，`聚集索引` 中的聚类键必须是唯一的。如果聚类键中的列不唯一，SQL
    Server 在存储该行时会添加一个隐藏的唯一标识符列。该唯一标识符是一个 4 字节的数值，被添加到非唯一的聚类键中以强制实现唯一性。唯一标识符的大小不计入
    900 字节的限制内。


    构建 `聚集索引` 时，有几件事需要考虑。首先，每个表只能有一个 `聚集索引`。由于 `聚集索引` 是按照聚类键的顺序存储的，并且行数据与键存储在一起，因此无法在表上再进行第二种方式的排序。此外，在已包含
    `堆表` 的现有表上构建 `聚集索引` 时，请确保有足够的空间来存放数据的第二个副本。在索引构建完成之前，两个数据副本都将存在。


    正如后续章节将讨论的，通常更倾向于在所有表上创建 `聚集索引`。这种偏好并非绝对，有些情况下 `聚集索引` 并不合适。你需要在自己的数据库中进行调查，以确定哪种结构最佳。只需将此偏好作为一个起点即可。


    ### 非聚集索引


    接下来要讨论的索引类型是 `非聚集索引`。`非聚集索引` 在几个方面与 `聚集索引` 相似。首先，`非聚集索引` 使用 `B 树` 结构来存储数据。它们的键列同样限制在
    900 字节以内。


    除了与 `聚集索引` 的相似之处外，它们也有一些区别。首先，一个表上可以有多个 `非聚集索引`。事实上，一个表上最多可以有 999 个 `非聚集索引`，每个索引不超过
    16 列。这个上限并非鼓励创建如此多的索引；它只是表明了可以创建的 `非聚集索引` 的总数。然而，借助筛选索引，有时可能值得在表上创建比传统认为合适的数量更多的索引。此外，`非聚集索引`
    的叶级并非存储实际数据，而是指向表上 `堆表` 或 `聚集索引` 中数据所在位置的页面引用。


    ### 列存储索引


    本节讨论的最后一种索引类型是 `列存储索引`。顾名思义，`列存储索引` 使用 `列存储` 结构。`列存储索引` 可以是 `聚集` 类型，也可以是 `非聚集`
    类型。


    两种类型的 `列存储索引` 都有许多限制需要考虑。首先，并非所有数据类型都可用于 `列存储索引`。不能使用的数据类型包括：`binary`、`varbinary`、`ntext`、`text`、`image`、`nvarchar(max)`、`varchar(max)`、`uniqueidentifier`、`rowversion`、`sql_variant`、`decimal`（精度大于
    18 位）、`datetimeoffset`、`xml` 以及基于 CLR 的类型。虽然表中的所有列都应该添加到 `聚集索引` 中，但 `列存储索引` 有
    1,024 列的限制。此外，由于 `列存储索引` 的特性，索引不能是唯一的、聚集的、包含包含列，也不能指定升序或降序。同时，一个表上只能有一个 `列存储索引`。这个限制不是问题，因为建议将表中的每个列都包含在
    `列存储索引` 中。


    另外，对于 `非聚集列存储索引`，还有一些额外的限制。首先，`列存储索引` 是只读的。一旦创建，就不能修改表中的数据。因此，通常值得对基础表进行分区，以减少需要包含在
    `列存储索引` 中的数据量，并允许在向表中添加新数据时重建索引。


    另一方面，`聚集列存储索引` 拥有一些 `非聚集列存储索引` 所没有的额外功能。`聚集列存储索引` 是可写的，这是通过一个隐藏的 `堆表` —— `增量存储`
    实现的，它会在收到新行时存储它们，并随着时间的推移将它们压缩成 `列存储` 行组。`聚集列存储索引` 中的 `聚集` 表示它是表中所有数据的存储结构。这意味着除了
    `列存储索引` 之外，没有其他结构（如 `堆表`）包含数据。


    使用 `列存储索引` 时，SQL Server 中有一些功能无法与之结合使用。由于 `列存储` 使用其自身的压缩技术，它不能与行压缩或页压缩结合使用。它不能与复制、更改跟踪或更改数据捕获一起使用。这些技术与
    `列存储` 结合没有意义，因为它们有助于读写场景，而 `列存储索引` 是只读的。最后的功能限制是 `filestream` 和 `filetable`，它们不能与
    `列存储` 一起使用。


    ## 本章小结


    在本章中，你了解了用作索引构建块的组成部分。现在你已具备必要的基础，能够创建出符合你预期和期望行为的索引。回顾一下，你了解了 SQL Server 用于在数据库中存储数据的不同类型页面，以及这些页面如何在区中组合在一起。然后你了解了可用于组织页面的结构，不是为了物理存储，而是以逻辑方式访问这些页面上的数据。接着你了解了通过
    `DBCC` 命令调查索引页面和结构的可用工具。本章最后回顾了索引结构与可用索引类型之间的关联。


