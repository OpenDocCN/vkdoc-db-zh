  trans: '# 14. `索引分析`


    在前一章中，我们讨论了监控索引时应收集哪些信息。所有这些信息对于数据库索引化的下一个环节——确定应用哪些索引——都是必要的。在本章中，我们将利用监控期间收集的所有信息，来分析性能现状和现有索引的价值。索引分析的最终目标是建立一个索引清单，包括需要创建、修改以及可能从数据库中删除的索引。在许多情况下，索引分析似乎近乎一门艺术。许多决策需要依据过去的性能来预判未来的索引需求。然而，对于每一个提出的变更，在索引解决方案实施前后，都会有统计数据支持或反驳该索引的价值，这使得索引分析更像是一门科学而非艺术。


    索引分析的通用流程分为多个组成部分。每个组成部分都包含一个从宏观层面入手以确定所需关注点，并逐步将分析聚焦于现有问题的过程。分析组成部分如下：


    *   审查 `服务器状态`


    *   `模式发现`


    *   `数据库引擎优化顾问`


    *   未使用的索引


    *   索引计划使用情况


    在进行任何数据库索引分析之前，我们首先需要了解当前的部署状态。用于尚未开发的数据库的策略与已部署到生产环境的数据库大致相同。然而，两者在统计信息收集的地点和方式上存在显著差异。


    对于尚未开发的数据库，重点将放在数据库和应用程序部署后预期用户如何使用上。针对数据库的测试和工作负载将侧重于验证数据库中的索引是否支持这些活动。测试所选择的活动很可能源于对用户将如何使用应用程序的估计和预测。确定这些活动将是业务分析师的职责，他们负责制定应用程序的需求。


    一旦数据库部署完成，监控的重点就从“活动可能是什么”转变为“活动实际是什么”。用户采用功能的速度以及该活动中数据的分布情况都将变得可知。此时，测试和规划期间开发的索引可能并不适合实际工作负载。部署后首次使用数据库上的
    `索引方法` 可能会导致重大的索引变更。对于已部署的数据库进行索引化的关键在于，分析必须基于生产环境中工作负载的统计数据。这样做将为实施能为数据库带来最佳效益的索引提供必要的指导，并将其与用户正在使用的功能及其使用频率相结合。


    无论数据库处于何种部署状态，通过索引分析都能得到一组针对当前已知和理解的数据库情况最优的索引。当索引应用后，其效果可能会，并且将会，有所不同。一个索引可能为上个月数据库中的活动提供了完美的数据访问路径。但随着新版本发布、新客户端增加或用户行为改变，它们可能不再是最优的。正如股票购买时常听到的：过往业绩并不代表未来结果。


    幸运的是，通过熟练运用 `索引方法`，我们将能够提供您的环境所需的索引。本章的重点是已经部署到生产的数据库。如前所述，这些策略适用于开发和生产两种状态的数据库和服务器，但为简便起见，默认将以生产环境为视角和方法。


    在我们逐步分析每个领域时，我们将得到一份索引清单，包括需要创建、修改、删除或进一步调查的索引。对于需要进一步调查的索引，我们将使用索引分析流程的后续部分来决定如何推进和处理该索引。


    ### 注意


    在本章中，在创建工作负载的脚本和用于查看统计信息的查询之间，运行第 `13` 章的监控脚本将非常重要。根据收集统计信息所使用的计划，可能要等数小时才能收集到统计信息，这将导致统计信息查询无法提供预期的结果。


    ## 审查 `服务器状态`


    索引分析的第一步是审查服务器的状态。同时审查主机服务器环境和 `SQL Server` 实例环境，以识别是否存在表明可能存在索引问题的状况。通过从宏观层面入手，而不是直接查看表和单个索引，我们可以避免只见树木不见森林。通常，当数十个数据库中有数百个索引时，很容易过度专注于一个看起来索引不佳的索引或表，结果后来才发现该表所在的数据库中其他表有数十亿行数据，而它却只有不到一百行。


    分析服务器状态时，我们将查看以下三个领域：


    *   `性能计数器`


    *   `等待统计信息`


    *   `缓冲区分配`


    这些领域中的每一个都提供了从何处开始聚焦索引分析过程的思路。它们让数据库平台能够确定与索引相关的性能问题可能存在于何处。


    ### `性能计数器`


    为索引监控收集的第一组信息包括 `性能计数器`。自然地，在进行索引分析时，我们首先要查看这些 `性能计数器`。在监控期间和随时间推移跟踪 `性能计数器` 不会提供关于如何处理索引问题的具体指导，但它会提供一个发现性能问题的切入点，从而确定从何处开始。


    对于每个计数器，我们将讨论一些通用准则。这些准则是一般性建议，应持保留态度。使用它们来初步判断计数器是否超出了其他数据库平台上的正常范围。如果您的平台上计数器值高于典型值有特定原因，那正是维护基线表的目的。请使用对您的环境有效的计数器值，而不是对他人最有效的值。


    `性能计数器` 应以两种方式进行分析。第一种是使用 `Excel` 和/或 `Power BI` 基于 `性能计数器` 查看图表和趋势线。第二种是通过查询来审查
    `性能计数器`，该查询获取 `性能计数器` 表中信息的快照。本章采用的是第二种方法。快照查询的准则同样适用于这两种方法。


    ### 注意


    为简便起见，本节中的快照分析查询将限定在数据库级别。大多数情况下，我们需要针对 `SQL Server` 实例上的每个数据库执行它们。实现此目的的方法是使用
    `sp_MSForEachDB` 并扩展游标。'
- fmt: '## Forwarded Records per Second


    如第[2](#338675_3_En_2_Chapter.xhtml)章所讨论，当堆表记录被更新且不再适合存储在其原始页面时，就会发生转发记录。在这些情况下，原始记录中会放置一个指向新记录位置的指针。性能计数器`Forwarded
    Records/sec`衡量的是服务器上访问转发行的速率。通常，`Forwarded Records/sec`的比率不应超过`Batch Requests/sec`的10%。这个比率可能有误导性，因为`Forwarded
    Records`代表行级数据的访问，而`Batch Requests`代表更高层的操作。然而，该比率可以作为`Forwarded Records/sec`可能超过建议水平的一个指标。


    转发记录的快照查询（如清单[14-1](#338675_3_En_14_Chapter.xhtml#PC1)所示）提供了`Forwarded Records/sec`计数器和比率计算的列。在此查询中，值被聚合为最小值、平均值和最大值。比率是针对每组收集的计数器计算的，然后再进行聚合。最后一列`PctViolation`显示了`Forward
    Records`与`Batch Requests`的比率超过10%准则的时间百分比。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))
    AS ForwardedRecords,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Forwarded Records/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(ForwardedRecords) AS MinForwardedRecords,

    AVG(ForwardedRecords) AS AvgForwardedRecords,

    MAX(ForwardedRecords) AS MaxForwardedRecords,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```

    **清单 14-1 转发记录计数器分析**


    在审查快照查询的输出时，需要对返回的信息提出几个问题。首先，检查计数器和比率的最小值和最大值。最小值是否接近或为零？最大值有多高？它与监控期间收集的先前值相比如何？计数器和比率的平均值更接近最小值还是最大值？如果转发记录的数量和峰值在增加，那么就需要进行进一步的分析。接下来，考虑`PctViolation`列。百分比是否大于1%？如果是，则有必要对转发记录进行进一步分析。如果需要更深入地研究`Forward
    Records`，下一步是将分析从服务器级别转移到数据库级别。


    为了提供一些转发记录活动的示例，请执行清单[14-2](#338675_3_En_14_Chapter.xhtml#PC2)中的脚本。此脚本将创建一个带有堆的表。然后它将向表中插入记录并更新这些记录，导致记录扩展并引发记录转发。最后，一个查询将访问转发的记录，导致转发记录访问操作。


    ```sql

    USE AdventureWorks2017

    GO

    DROP TABLE IF EXISTS dbo.HeapExample;

    GO

    CREATE TABLE dbo.HeapExample (

    ID INT IDENTITY,

    FillerData VARCHAR(2000)

    );

    INSERT INTO dbo.HeapExample (FillerData)

    SELECT REPLICATE(''X'',100)

    FROM sys.all_objects

    UPDATE dbo.HeapExample

    SET FillerData = REPLICATE(''X'',2000)

    WHERE ID % 5 = 1

    GO

    SELECT *

    FROM dbo.HeapExample

    WHERE ID % 3 = 1

    GO 2

    ```

    **清单 14-2 转发记录示例**


    一旦确定需要对数据库进行`Forwarded Records/sec`分析，该过程将利用动态管理对象（DMO）中的可用信息。有两个DMO有助于确定转发记录问题的范围和程度。它们是`sys.dm_db_index_physical_stats`和`sys.dm_db_index_operational_stats`。对于分析，`sys.dm_db_index_operational_stats`信息将来自监控表`dbo.index_operational_stats_history`。分析过程（如清单[14-3](#338675_3_En_14_Chapter.xhtml#PC3)所示）涉及识别数据库中的所有堆，然后检查堆的物理结构。此信息随后与`dbo.index_operational_stats_history`中收集的信息连接。索引的物理状态是从`sys.dm_db_index_operational_stats`中检索的，因为需要该DMO的`DETAILED`选项来获取转发记录信息。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..#HeapList'') IS NOT NULL

    DROP TABLE #HeapList

    CREATE TABLE #HeapList

    (

    database_id int

    ,object_id int

    ,page_count INT

    ,avg_page_space_used_in_percent DECIMAL(6,3)

    ,record_count INT

    ,forwarded_record_count INT

    )

    DECLARE HEAP_CURS CURSOR FORWARD_ONLY FOR

    SELECT object_id

    FROM sys.indexes i

    WHERE index_id = 0

    DECLARE @IndexID INT

    OPEN HEAP_CURS

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO #HeapList

    SELECT

    DB_ID()

    ,object_id

    ,page_count

    ,CAST(avg_page_space_used_in_percent AS DECIMAL(6,3))

    ,record_count

    ,forwarded_record_count

    FROM

    sys.dm_db_index_physical_stats(DB_ID(), @IndexID, 0, NULL,''DETAILED'') ;

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    END

    CLOSE HEAP_CURS

    DEALLOCATE HEAP_CURS

    SELECT

    QUOTENAME(DB_NAME(database_id))

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id)) AS ObjectName

    ,page_count

    ,avg_page_space_used_in_percent

    ,record_count

    ,forwarded_record_count

    ,x.forwarded_fetch_count

    ,CAST(100.*forwarded_record_count/record_count AS DECIMAL(6,3)) AS forwarded_record_pct

    ,CAST(1.*x.forwarded_fetch_count/forwarded_record_count AS DECIMAL(12,3)) AS forwarded_row_ratio

    FROM #HeapList h

    CROSS APPLY(

    SELECT SUM(forwarded_fetch_count) AS forwarded_fetch_count

    FROM IndexingMethod.dbo.index_operational_stats_history i

    WHERE h.database_id = i.database_id

    AND h.object_id = i.OBJECT_ID

    AND i.index_id = 0) x

    WHERE forwarded_record_count > 0

    ORDER BY page_count DESC

    ```

    **清单 14-3 转发记录快照查询**


    快照查询的结果（如图[14-1](#338675_3_En_14_Chapter.xhtml#Fig1)所示）提供了数据库中所有存在任何转发记录的堆的信息。通过这些结果，可以识别出存在转发和转发记录问题的堆。首先要关注的列是`page_count`和`record_count`。具有许多转发记录问题的记录的堆将比那些记录少的堆更重要。在调查此计数器时，专注于那些能对转发记录问题提供最大缓解的表是值得的。列`forwarded_record_count`和`forwarded_fetch_count`分别提供了表中已被转发的记录数量以及这些转发记录被访问的次数。这些列提供了问题规模的范围。最后要查看的列是`forwarded_record_pct`和`forwarded_row_ratio`。这些列详细说明了被转发的记录的百分比以及每个转发行被访问的次数。'
  raw: '#### Forwarded Records per Second


    As discussed in Chapter [2](#338675_3_En_2_Chapter.xhtml), forwarded records occur
    when heap records are updated and no longer fit on the page in which they were
    originally stored. In these situations, a pointer is placed in the original record
    to the new record location. The performance counter Forwarded Records/sec measures
    the rate in which forwarded rows are accessed on the server. Generally, the ratio
    of Forwarded Records/sec should not exceed 10 percent of Batch Requests/sec. This
    ratio can be a misnomer since Forwarded Records represents the access of data
    at the row level and Batch Requests represents a higher-scoped operation. The
    ratio, though, provides an indicator of when the balance of Forwarded Records/sec
    may be exceeding an advisable level.


    The snapshot query for forwarded records, shown in Listing [14-1](#338675_3_En_14_Chapter.xhtml#PC1),
    provides columns for the Forwarded Records/sec counter and the ratio calculation.
    In this query, the values are aggregated into minimum, average, and maximum values.
    The ratio is calculated on each set of collected counters and aggregated after
    that calculation. The final column, `PctViolation`, shows the percentage of time
    in which the Forward Records to Batch Requests ratio exceeds the 10 percent guideline.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))
    AS ForwardedRecords,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Forwarded Records/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(ForwardedRecords) AS MinForwardedRecords,

    AVG(ForwardedRecords) AS AvgForwardedRecords,

    MAX(ForwardedRecords) AS MaxForwardedRecords,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1\. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-1

    Forwarded Records Counter Analysis

    ```


    When reviewing the output from the snapshot query, there are a few things to ask
    about the information returned. First, review the minimum and maximum values for
    the counter and ratio. Is the minimum value close to or at zero? How high is the
    maximum? How does it compare to previous values collected during monitoring? Is
    the average value for the counter and ratio closer to the minimum or maximum value?
    If the volume and peaks of forwarded records is increasing, then further analysis
    is warranted. Next, consider the `PctViolation` column. Is the percentage greater
    than 1 percent? If so, further analysis of forwarded records is warranted. If
    there is a need to dig deeper into Forward Records, the next step is to move the
    analysis from the server level to the databases.


    To provide an example of some forwarded record activity, execute the script in
    Listing [14-2](#338675_3_En_14_Chapter.xhtml#PC2). This script will create a table
    with a heap. Then it will insert records into the table and update those records,
    causing records to be expanded and leading to record forwarding. Finally, a query
    will access the forwarded records, causing forwarded record access operations.


    ```

    USE AdventureWorks2017

    GO

    DROP TABLE IF EXISTS dbo.HeapExample;

    GO

    CREATE TABLE dbo.HeapExample (

    ID INT IDENTITY,

    FillerData VARCHAR(2000)

    );

    INSERT INTO dbo.HeapExample (FillerData)

    SELECT REPLICATE(''X'',100)

    FROM sys.all_objects

    UPDATE dbo.HeapExample

    SET FillerData = REPLICATE(''X'',2000)

    WHERE ID % 5 = 1

    GO

    SELECT *

    FROM dbo.HeapExample

    WHERE ID % 3 = 1

    GO 2

    Listing 14-2

    Forwarded Records Example

    ```


    Once determining that Forwarded Records/sec analysis needs to go into the database,
    the process will leverage information available in the DMO. There are two DMOs
    that will help to determine the scope and extent of forwarded record issues. These
    are `sys.dm_db_index_physical_stats` and `sys.dm_db_index_operational_stats`.
    For the analysis, the `sys.dm_db_index_operational_stats` information will come
    from the monitoring table `dbo.index_operational_stats_history`. The analysis
    process, shown in Listing [14-3](#338675_3_En_14_Chapter.xhtml#PC3), involves
    identifying all the heaps in a database and then checking the physical structure
    of the heap. This information is then joined to the information collected in `dbo.index_operational_stats_history`.
    The physical stature of the index is retrieved from `sys.dm_db_index_operational_stats`
    because the `DETAILED` option for the DMO is required to get the forwarded record
    information.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..#HeapList'') IS NOT NULL

    DROP TABLE #HeapList

    CREATE TABLE #HeapList

    (

    database_id int

    ,object_id int

    ,page_count INT

    ,avg_page_space_used_in_percent DECIMAL(6,3)

    ,record_count INT

    ,forwarded_record_count INT

    )

    DECLARE HEAP_CURS CURSOR FORWARD_ONLY FOR

    SELECT object_id

    FROM sys.indexes i

    WHERE index_id = 0

    DECLARE @IndexID INT

    OPEN HEAP_CURS

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO #HeapList

    SELECT

    DB_ID()

    ,object_id

    ,page_count

    ,CAST(avg_page_space_used_in_percent AS DECIMAL(6,3))

    ,record_count

    ,forwarded_record_count

    FROM

    sys.dm_db_index_physical_stats(DB_ID(), @IndexID, 0, NULL,''DETAILED'') ;

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    END

    CLOSE HEAP_CURS

    DEALLOCATE HEAP_CURS

    SELECT

    QUOTENAME(DB_NAME(database_id))

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id)) AS ObjectName

    ,page_count

    ,avg_page_space_used_in_percent

    ,record_count

    ,forwarded_record_count

    ,x.forwarded_fetch_count

    ,CAST(100.*forwarded_record_count/record_count AS DECIMAL(6,3)) AS forwarded_record_pct

    ,CAST(1.*x.forwarded_fetch_count/forwarded_record_count AS DECIMAL(12,3)) AS forwarded_row_ratio

    FROM #HeapList h

    CROSS APPLY(

    SELECT SUM(forwarded_fetch_count) AS forwarded_fetch_count

    FROM IndexingMethod.dbo.index_operational_stats_history i

    WHERE h.database_id = i.database_id

    AND h.object_id = i.OBJECT_ID

    AND i.index_id = 0) x

    WHERE forwarded_record_count > 0

    ORDER BY page_count DESC

    Listing 14-3

    Forwarded Records Snapshot Query

    ```


    The results of the snapshot query, shown in Figure [14-1](#338675_3_En_14_Chapter.xhtml#Fig1),
    provide information on all the heaps in a database that have any forwarded records.
    Through these results, the heaps that have issues with forwarding and forwarded
    records can be identified. The first columns to pay attention to are `page_count`
    and `record_count`. Heaps with many records with forwarded record issues will
    be more important than those with few rows. It is worthwhile to focus on those
    tables that will provide the greatest relief to forwarded records when investigating
    this counter. The columns `forwarded_record_count` and `forwarded_fetch_count`
    provide a count of the number of records in a table that have been forwarded and
    the number of times those forwarded records have been accessed, respectively.
    These columns provide a scope to the size of the problem. The last columns to
    look at are `forwarded_record_pct` and `forwarded_row_ratio`. These columns detail
    the percentage of columns that are forwarded and how many times each of the forwarded
    rows has been accessed.'
