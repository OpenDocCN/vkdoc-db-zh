    There are a couple of benefits that the missing index DMOs provide. First, the
    missing index information is collected from the query optimizer without any action
    required on your part. Unlike Extended Events and other performance monitoring
    tools, you don’t need to configure and enable it in order for information to be
    collected. The other thing to consider is that the missing index information is
    based on actual activity occurring on the SQL Server instance. The index suggestions
    aren’t based on a test load you believe might happen in production but rather
    on the production load itself. As the usage patterns of the data in a database
    change, so too will the missing index recommendations.


    Despite the benefits provided by the missing index DMOs, you must take into account
    a few considerations when using them. The limitations on the missing index DMOs
    can be summarized into the following categories:


    *   Size of queue


    *   Depth of analysis


    *   Accuracy


    *   Type of indexes


    The size of the queue for missing indexes is one of the limitations that is easy
    to miss. Regardless of the number of databases on the SQL Server instance, there
    can be no more than 600 missing index groups. Once 600 missing index groups have
    been identified, the query optimizer will stop reporting new missing index suggestions.
    It will not make any determinations to decide whether a new possible missing index
    is of better quality than items already reported; the information is just not
    collected.


    ### Note


    As with other dynamic management objects, the information within the missing index
    DMOs resets when SQL Server restarts and gets dropped for a database whenever
    the database is brought offline.


    When considering the information in missing indexes, the depth of the analysis
    is a limitation that needs to be considered whenever you are reviewing the suggestions.
    The query optimizer considers only the current plan and whether the missing index
    would benefit the execution plan. Sometimes, adding the missing index to the database
    will result in a new plan with a new missing index suggestion. These suggestions
    are only a first pass at improving performance on an execution plan. The other
    half of this limitation is that the missing index details don’t include tests
    to determine whether the order of the columns in the missing index suggestion
    is optimal. When looking at missing index suggestions, it will be necessary to
    test in order to determine the proper column order.


    The third limitation of the missing index suggestion is the accuracy of the information
    returned with the statistics. There are two things that need to be considered
    with this limitation. First, when the queries use inequality predicates, the cost
    information is less effective than those returned with equality predicates. Second,
    it is possible to return the same missing index suggestion with multiple cost
    estimates. How and where the missing index would be leveraged may change the cost
    estimate that is calculated. For each cost estimate, a missing index suggestion
    will be logged.


    Lastly, the missing index tool is limited in the types of indexes it can suggest.
    The main limitation is index types and the inability of missing indexes to suggest
    clustered, XML, spatial, or columnstore indexes. The suggestions also will not
    include information on when to make an index filtered. Along these same lines,
    suggestions may, at times, contain only `INCLUDE` columns. When this happens,
    one of the `INCLUDE` columns will need to be designated as the key column.


    ### Note


    Missing index information for a table will be dropped whenever there are metadata
    operations made on the table. For instance, when a column is added to a table,
    the missing index information will be dropped. A less obvious example is when
    an index on a table changes. In this case as well, the missing index information
    will be dropped.


    ### Explaining the DMOs


    There are four DMOs that can be used to return information on missing indexes.
    Each DMO provides a portion of the information needed to build indexes that the
    query optimizer can use to improve the performance of a query. The DMOs for missing
    indexes are as follows:


    *   `sys.dm_db_missing_index_details`


    *   `sys.dm_db_missing_index_columns`


    *   `sys.dm_db_missing_index_group_stats`


    *   `sys.dm_db_missing_index_group`


    In the next four sections, I’ll review each of the dynamic management objects
    and look at how each provides information on how to identify missing indexes.


    #### sys.dm_db_missing_index_details


    The DMO `sys.dm_db_missing_index_details` is a dynamic management view that returns
    a list of missing index suggestions . Each row in the dynamic management view
    (DMV) provides a single suggested missing index. The columns in Table [10-1](#338675_3_En_10_Chapter.xhtml#Tab1)
    provide information on the database and the table to create the index on. It also
    includes the columns that should comprise the key and the included columns for
    the index.


    Table 10-1


    Columns in sys.dm_db_missing_index_details


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `index_handle` | `int` | Unique identifier for each missing index suggestions.
    This is the key value for this DMV. |

    | `database_id` | `smallint` | Identifies the database where the table with the
    missing index resides. |

    | `object_id` | `int` | Identifies the table where the index is missing. |

    | `equality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to equality predicates. |

    | `inequality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to inequality predicates. |

    | `included_columns` | `nvarchar(4000)` | Comma-separated list of columns needed
    as covering columns for the query. |

    | `statement` | `nvarchar(4000)` | Name of the table where the index is missing.
    |


    There are two columns in `sys.dm_db_missing_index_details` that are used to identify
    key columns on missing index suggestions. These are `equality_columns` and `inequality_columns`.
    The `equality_columns` are generated when there is a comparison in the query plan
    that makes a direct comparison. For instance, when the filter for a query is `ColumnA
    = @Parameter`, this is an equality predicate. The `inequality_columns` details
    are created when any nonequal filter is used in a query plan. Examples of this
    are when there are greater than, less than, or `NOT IN` comparisons being used.


    When it comes to the `included_columns` information, this is generated when there
    are columns that are not part of the filter but that would be used to allow the
    index to cover the query request using a single index. Included columns are covered
    in more depth in Chapter [8](#338675_3_En_8_Chapter.xhtml). Suffice it to say,
    the use of included columns will help prevent the query plan from having to use
    a key lookup in the execution plan if the missing index is created.'
  trans: '

    ## 缺失索引


    缺失索引动态管理对象（DMOs）是一组管理对象，用于从查询优化器提供索引反馈。当查询优化器编译执行计划时，它可以识别出将一组列的统计信息物化为物理索引将改善性能的情况。在这些情况下，查询优化器将编译结果并将信息存储在缺失索引
    DMOs 中。


    缺失索引 DMOs 有几点好处。首先，缺失索引信息是从查询优化器收集的，无需你采取任何操作。与扩展事件和其他性能监控工具不同，你不需要配置和启用它来收集信息。另一个需要考虑的因素是，缺失索引信息是基于
    SQL Server 实例上实际发生的活动。索引建议不是基于你认为可能在生产中发生的测试负载，而是基于生产负载本身。随着数据库中数据使用模式的变化，缺失索引建议也会随之改变。


    尽管缺失索引 DMOs 提供了诸多好处，但在使用它们时，你必须考虑到一些注意事项。缺失索引 DMOs 的局限性可以总结为以下几个类别：


    *   队列大小

    *   分析深度

    *   准确性

    *   索引类型


    缺失索引队列的大小是一个容易被忽视的限制。无论 SQL Server 实例上有多少个数据库，缺失索引组的数量最多不能超过 600 个。一旦识别出 600 个缺失索引组，查询优化器将停止报告新的缺失索引建议。它不会判断一个新的可能缺失索引是否比已报告的质量更高；这些信息根本不会被收集。


    ### 注意


    与其他动态管理对象一样，缺失索引 DMOs 中的信息会在 SQL Server 重启时重置，并且在数据库脱机时，该数据库的缺失索引信息也会被清除。


    在考虑缺失索引信息时，分析深度是在审查建议时需要考虑的一个限制。查询优化器只考虑当前计划以及缺失索引是否对执行计划有益。有时，将缺失索引添加到数据库中会导致产生新的计划，并伴随一个新的缺失索引建议。这些建议只是针对改进执行计划性能的初步方案。这个限制的另一面是，缺失索引详细信息不包括测试来确定缺失索引建议中的列顺序是否最优。在查看缺失索引建议时，需要通过测试来确定正确的列顺序。


    缺失索引建议的第三个限制是返回统计信息的准确性。关于这个限制，有两点需要考虑。首先，当查询使用不等式谓词时，其成本信息不如使用等式谓词返回的信息有效。其次，可能会返回具有多个成本估算的相同缺失索引建议。缺失索引的利用方式和位置可能会改变计算的成本估算。对于每个成本估算，都会记录一个缺失索引建议。


    最后，缺失索引工具在建议的索引类型上存在限制。主要的限制是索引类型，以及缺失索引无法建议聚集索引、XML 索引、空间索引或列存储索引。这些建议也不会包含有关何时创建筛选索引的信息。同样地，有时建议可能只包含
    `INCLUDE` 列。当这种情况发生时，需要将其中一个 `INCLUDE` 列指定为键列。


    ### 注意


    每当对表进行元数据操作时，该表的缺失索引信息将被清除。例如，当向表添加列时，缺失索引信息将被清除。一个不太明显的例子是当表上的索引发生变化时。在这种情况下，缺失索引信息同样会被清除。


    ### 解释动态管理对象


    有四个 DMOs 可用于返回有关缺失索引的信息。每个 DMO 提供构建索引所需的部分信息，查询优化器可以利用这些索引来提高查询性能。用于缺失索引的 DMOs
    如下：


    *   `sys.dm_db_missing_index_details`

    *   `sys.dm_db_missing_index_columns`

    *   `sys.dm_db_missing_index_group_stats`

    *   `sys.dm_db_missing_index_group`


    在接下来的四个小节中，我将逐一回顾这些动态管理对象，并探讨每个对象如何提供有关如何识别缺失索引的信息。


    #### sys.dm_db_missing_index_details


    DMO `sys.dm_db_missing_index_details` 是一个动态管理视图，返回缺失索引建议的列表。该动态管理视图（DMV）中的每一行提供一个单独的缺失索引建议。表
    10-1 中的列提供了有关数据库和要创建索引的表的信息。它还包括应构成索引键和包含列的列。


    表 10-1


    `sys.dm_db_missing_index_details` 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `index_handle` | `int` | 每个缺失索引建议的唯一标识符。这是此 DMV 的键值。 |

    | `database_id` | `smallint` | 标识包含缺失索引的表所在的数据库。 |

    | `object_id` | `int` | 标识缺少索引的表。 |

    | `equality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与等式谓词。 |

    | `inequality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与不等式谓词。 |

    | `included_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列是查询所需的覆盖列。 |

    | `statement` | `nvarchar(4000)` | 缺少索引的表的名称。 |


    在 `sys.dm_db_missing_index_details` 中，有两列用于标识缺失索引建议的键列。它们是 `equality_columns`
    和 `inequality_columns`。当查询计划中存在直接比较时，会生成 `equality_columns`。例如，当查询的筛选条件是 `ColumnA
    = @Parameter` 时，这就是一个等式谓词。当在查询计划中使用任何不等于筛选器时，会创建 `inequality_columns` 的详细信息。例如，使用大于、小于或
    `NOT IN` 比较的情况。


    关于 `included_columns` 信息，当存在不属于筛选条件但允许索引通过单个索引覆盖查询请求的列时，就会生成此信息。包含列在第 8 章中有更深入的介绍。简而言之，如果创建了缺失索引，使用包含列将有助于防止查询计划在执行计划中使用键查找。

    '
- fmt: '### sys.dm_db_missing_index_columns


    下一个 DMO 是 `sys.dm_db_missing_index_columns`，它是一个动态管理函数。此函数为 `sys.dm_db_missing_index_details`
    中列出的每个缺失索引返回一个列列表。要使用此 DMF，需将一个 `index_handle` 作为参数传入函数。结果集中的每一行都代表来自 `sys.dm_db_missing_index_details`
    的缺失索引建议中的一个列，并重复 `equality_columns`、`inequality_columns` 和 `included_columns`
    中的信息。表 10-2 列出了 `sys.dm_db_missing_index_columns` 的输出。


    表 10-2


    sys.dm_db_missing_index_columns 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `column_id` | `int` | 列的 ID。 |

    | `column_name` | `sysname` | 表列的名称。 |

    | `column_usage` | `varchar(20)` | 描述该列在索引中的使用方式。 |


    此 DMF 的主要信息是 `column_usage` 列。对于每一行，此列将返回以下值之一：`EQUALITY`、`INEQUALITY` 或 `INCLUDE`。这些值映射到
    `sys.dm_db_missing_index_details` 中的 `equality_columns`、`inequality_columns` 和
    `included_columns`。根据前一个 DMV 中的使用类型，此 DMF 中的用法将是相同的。


    ### sys.dm_db_missing_index_groups


    DMV `sys.dm_db_missing_index_groups` 是下一个缺失索引 DMO。此 DMV 返回一个缺失索引组与缺失索引建议配对的列表。表
    10-3 列出了 `sys.dm_db_missing_index_groups` 的列。尽管此 DMV 支持在缺失索引建议中建立多对多关系，但它们总是以一对一关系建立。


    表 10-3


    sys.dm_db_missing_index_groups 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `index_group_handle` | `int` | 标识一个缺失索引组。此值连接到 `sys.dm_db_missing_index_group_stats`
    中的 `group_handle`。 |

    | `index_handle` | `int` | 标识一个缺失索引句柄。此值连接到 `sys.dm_db_missing_index_details`
    中的 `index_handle`。 |


    ### sys.dm_db_missing_index_group_stats


    最后一个缺失索引 DMO 是 DMV `sys.dm_db_missing_index_group_stats`。此 DMV 中的信息包含有关查询优化器期望如何使用缺失索引（如果已构建）的统计信息。由此，使用表
    10-4 中的列，您可以确定哪些缺失索引将提供最大收益以及索引将被使用的范围。


    表 10-4


    sys.dm_db_missing_index_group_stats 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `group_handle` | `int` | 每个缺失索引组的唯一标识符。这是此 DMV 的键值。所有将从使用该缺失索引组中受益的查询都包含在此组中。
    |

    | `unique_compiles` | `bigint` | 将从此缺失索引组受益的执行计划编译和重新编译的计数。 |

    | `user_seeks` | `bigint` | 如果缺失索引已构建，用户查询中本应发生的查找次数。 |

    | `user_scans` | `bigint` | 如果缺失索引已构建，用户查询中本应发生的扫描次数。 |

    | `last_user_seek` | `datetime` | 如果缺失索引已构建，来自用户查询的上次用户查找的日期和时间。 |

    | `last_user_scan` | `datetime` | 如果缺失索引已构建，来自用户查询的上次用户扫描的日期和时间。 |

    | `avg_total_user_cost` | `float` | 可以由组中的索引降低的用户查询的平均成本。 |

    | `avg_user_impact` | `float` | 如果实施此缺失索引组，用户查询可能体验到的平均百分比收益。 |

    | `system_seeks` | `bigint` | 如果缺失索引已构建，系统查询中本应发生的查找次数。 |

    | `system_scans` | `bigint` | 如果缺失索引已构建，系统查询中本应发生的扫描次数。 |

    | `last_system_seek` | `datetime` | 如果缺失索引已构建，来自系统查询的上次系统查找的日期和时间。 |

    | `last_system_scan` | `datetime` | 如果缺失索引已构建，来自系统查询的上次系统扫描的日期和时间。 |

    | `avg_total_system_cost` | `float` | 可以由组中的索引降低的系统查询的平均成本。 |

    | `avg_system_impact` | `float` | 如果实施此缺失索引组，系统查询可能体验到的平均百分比收益。 |'
  raw: '#### sys.dm_db_missing_index_columns


    The next DMO is `sys.dm_db_missing_index_columns`, which is a dynamic management
    function (DMF) . This function returns a list of columns for each missing index
    listed in `sys.dm_db_missing_index_details`. To use the DMF, an `index_handle`
    is passed into the function as a parameter. Each row in the resultset represents
    a column in the missing index suggestion from `sys.dm_db_missing_index_details`
    and repeats the information in `equality_columns`, `inequality_columns`, and `included_columns`.
    Table [10-2](#338675_3_En_10_Chapter.xhtml#Tab2) lists the output for `sys.dm_db_missing_index_columns`.


    Table 10-2


    Columns in sys.dm_db_missing_index_columns


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `column_id` | `int` | ID of the column. |

    | `column_name` | `sysname` | Name of the table column. |

    | `column_usage` | `varchar(20)` | Description of how the column will be used
    in the index. |


    The primary information in this DMF is the `column_usage` column. For every row,
    this column will return one of the following values: `EQUALITY`, `INEQUALITY`,
    or `INCLUDE`. These values map to `equality_columns`, `inequality_columns`, and
    `included_columns` in `sys.dm_db_missing_index_details`. Depending on the type
    of usage in the former DMV, the use will be the same for this DMF.


    #### sys.dm_db_missing_index_groups


    The DMV `sys.dm_db_missing_index_groups` is the next missing index DMO. The DMV
    returns a list of missing index groups paired with missing index suggestions.
    Table [10-3](#338675_3_En_10_Chapter.xhtml#Tab3) lists the columns for `sys.dm_db_missing_index_groups`.
    Although this DMV supports the ability for many-to-many relationships within missing
    index suggestions, they are always made in a one-to-one relationship.


    Table 10-3


    Columns in sys.dm_db_missing_index_groups


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `index_group_handle` | `int` | Identifies a missing index group. This value
    joins to `group_handle` in `sys.dm_db_missing_index_group_stats`. |

    | `index_handle` | `int` | Identifies a missing index handle. This value joins
    to `index_handle` in `sys.dm_db_missing_index_details`. |


    #### sys.dm_db_missing_index_group_stats


    The last missing index DMO is the DMV `sys.dm_db_missing_index_group_stats`. The
    information in this DMV contains statistics on how the query optimizer would expect
    to use the missing index if it were built. From this, using the columns in Table
    [10-4](#338675_3_En_10_Chapter.xhtml#Tab4), you can determine which missing indexes
    would provide the greatest benefit and the scope to which the index will be used.


    Table 10-4


    Columns in sys.dm_db_missing_index_group_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `group_handle` | `int` | Unique identifier for each missing index group. This
    is the key value for this DMV. All queries that would benefit from using the missing
    index group are included in this group. |

    | `unique_compiles` | `bigint` | Count of the execution plan compilations and
    recompilations that would benefit from this missing index group. |

    | `user_seeks` | `bigint` | Count of seeks in user queries that would have occurred
    if the missing index had been built. |

    | `user_scans` | `bigint` | Count of scans in user queries that would have occurred
    if the missing index had been built. |

    | `last_user_seek` | `datetime` | Date and time of last user seek from user queries
    that would have occurred if the missing index had been built. |

    | `last_user_scan` | `datetime` | Date and time of last user scans from user queries
    that would have occurred if the missing index had been built. |

    | `avg_total_user_cost` | `float` | Average cost of the user queries that could
    be reduced by the index in the group. |

    | `avg_user_impact` | `float` | Average percentage benefit that user queries could
    experience if this missing index group had been implemented. |

    | `system_seeks` | `bigint` | Count of seeks in system queries that would have
    occurred if the missing index had been built. |

    | `system_scans` | `bigint` | Count of scans in system queries that would have
    occurred if the missing index had been built. |

    | `last_system_seek` | `datetime` | Date and time of last system seek from system
    queries that would have occurred if the missing index had been built. |

    | `last_system_scan` | `datetime` | Date and time of last system scans from system
    queries that would have occurred if the missing index had been built. |

    | `avg_total_system_cost` | `float` | Average cost of the system queries that
    could be reduced by the index in the group. |

    | `avg_system_impact` | `float` | Average percentage benefit that system queries
    could experience if this missing index group had been implemented. |'
  trans: '### sys.dm_db_missing_index_columns


    下一个 DMO 是 `sys.dm_db_missing_index_columns`，它是一个**动态管理函数**。此函数为 `sys.dm_db_missing_index_details`
    中列出的每个缺失索引返回一个列列表。要使用此 DMF，需将一个 `index_handle` 作为参数传入函数。结果集中的每一行都代表来自 `sys.dm_db_missing_index_details`
    的缺失索引建议中的一个列，并重复 `equality_columns`、`inequality_columns` 和 `included_columns`
    中的信息。表 10-2 列出了 `sys.dm_db_missing_index_columns` 的输出。


    **表 10-2**


    **sys.dm_db_missing_index_columns 中的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `column_id` | `int` | 列的 ID。 |

    | `column_name` | `sysname` | 表列的名称。 |

    | `column_usage` | `varchar(20)` | 描述该列在索引中的使用方式。 |


    此 DMF 的主要信息是 `column_usage` 列。对于每一行，此列将返回以下值之一：`EQUALITY`、`INEQUALITY` 或 `INCLUDE`。这些值映射到
    `sys.dm_db_missing_index_details` 中的 `equality_columns`、`inequality_columns` 和
    `included_columns`。根据前一个 DMV 中的使用类型，此 DMF 中的用法将是相同的。


    ### sys.dm_db_missing_index_groups


    DMV `sys.dm_db_missing_index_groups` 是下一个缺失索引 DMO。此 DMV 返回一个缺失索引组与缺失索引建议配对的列表。表
    10-3 列出了 `sys.dm_db_missing_index_groups` 的列。尽管此 DMV 支持在缺失索引建议中建立多对多关系，但它们总是以一对一关系建立。


    **表 10-3**


    **sys.dm_db_missing_index_groups 中的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `index_group_handle` | `int` | 标识一个缺失索引组。此值连接到 `sys.dm_db_missing_index_group_stats`
    中的 `group_handle`。 |

    | `index_handle` | `int` | 标识一个缺失索引句柄。此值连接到 `sys.dm_db_missing_index_details`
    中的 `index_handle`。 |


    ### sys.dm_db_missing_index_group_stats


    最后一个缺失索引 DMO 是 DMV `sys.dm_db_missing_index_group_stats`。此 DMV 中的信息包含有关查询优化器期望如何使用缺失索引（如果已构建）的统计信息。由此，使用表
    10-4 中的列，您可以确定哪些缺失索引将提供最大收益以及索引将被使用的范围。


    **表 10-4**


    **sys.dm_db_missing_index_group_stats 中的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `group_handle` | `int` | 每个缺失索引组的唯一标识符。这是此 DMV 的键值。所有将从使用该缺失索引组中受益的查询都包含在此组中。
    |

    | `unique_compiles` | `bigint` | 将从此缺失索引组受益的执行计划编译和重新编译的计数。 |

    | `user_seeks` | `bigint` | 如果缺失索引已构建，用户查询中本应发生的查找次数。 |

    | `user_scans` | `bigint` | 如果缺失索引已构建，用户查询中本应发生的扫描次数。 |

    | `last_user_seek` | `datetime` | 如果缺失索引已构建，来自用户查询的上次用户查找的日期和时间。 |

    | `last_user_scan` | `datetime` | 如果缺失索引已构建，来自用户查询的上次用户扫描的日期和时间。 |

    | `avg_total_user_cost` | `float` | 可以由组中的索引降低的用户查询的平均成本。 |

    | `avg_user_impact` | `float` | 如果实施此缺失索引组，用户查询可能体验到的平均百分比收益。 |

    | `system_seeks` | `bigint` | 如果缺失索引已构建，系统查询中本应发生的查找次数。 |

    | `system_scans` | `bigint` | 如果缺失索引已构建，系统查询中本应发生的扫描次数。 |

    | `last_system_seek` | `datetime` | 如果缺失索引已构建，来自系统查询的上次系统查找的日期和时间。 |

    | `last_system_scan` | `datetime` | 如果缺失索引已构建，来自系统查询的上次系统扫描的日期和时间。 |

    | `avg_total_system_cost` | `float` | 可以由组中的索引降低的系统查询的平均成本。 |

    | `avg_system_impact` | `float` | 如果实施此缺失索引组，系统查询可能体验到的平均百分比收益。 |'
- fmt: '### Using the DMOs


    Now that the missing index DMOs have been explained, it is time to look at how
    they can be used together to provide missing index suggestions. You may have noticed
    that the results of the missing index DMOs have been referred to as suggestions
    instead of recommendations. This variation in wording is intentional. Typically,
    when someone receives a recommendation, it is fully thought through and ready
    to be implemented. This is not so with the missing index DMOs; thus, they are
    referred to as suggestions.


    With the suggestions from the missing index DMOs, you have a starting point to
    begin looking at and building new indexes. There are two things that are important
    to consider when looking at missing index suggestions. First, variations of each
    missing index suggestion may appear multiple times in the results. It is not recommended
    that each of these variations be implemented. Common patterns within the suggestions
    should be found. An index that covers a few of the suggestions is usually ideal.
    Second, when more than one column is suggested, the order of the columns needs
    to be tested to determine which is optimal.


    To help explain how the missing index DMOs work and are related to one another,
    I’ll walk you through an example that includes a few SQL statements. These statements,
    shown in Listing 10-1, execute a few queries against the `SalesOrderHeader` table
    in the `AdventureWorks2017` database. For each of the queries, the filtering is
    on either the `DueDate` or `OrderDate` column, or both.


    ```

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE DueDate = ''2014-07-01 00:00:00.000''

    AND OrderDate = ''2014-06-19 00:00:00.000''

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT DueDate, OrderDate FROM Sales.SalesOrderHeader

    WHERE DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    ```

    **Listing 10-1**

    SQL Statements to Generate Missing Index Suggestions


    If you examine the execution plan for any of the example queries, you’ll see that
    they each use a clustered index scan to satisfy the query. Figure 10-1 shows the
    execution plan for the first query. In this execution plan, there is an indication
    that there is a missing index that could help improve the performance of the query
    and an index scan across the table’s clustered index.


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig1_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig1_HTML.jpg)


    **Figure 10-1**

    Execution plan for first query from Listing 10-1


    To see more details on this missing index suggestion, you need to look at the
    missing index DMOs. A query against the missing index DMOs will look similar to
    Listing 10-2. The query includes the equality, inequality, and included column
    information that was described earlier. The query includes two calculations not
    previously described: the calculations for `Impact` and `Score`.


    The `Impact` calculation helps identify missing index suggestions that will have
    the highest overall impact across multiple query executions. This is calculated
    by adding the potential seeks and scans on the missing index based on the average
    impact; the resulting value represents the total improvement across all queries
    that might have used the index. The higher the value, the more improvement the
    index could provide.


    The `Score` calculation also helps to identify missing index suggestions that
    will improve query performance. The difference between `Impact` and `Score` is
    the inclusion of the average total user cost. For the `Score` calculation, the
    average total user cost is multiplied by the `Impact` score and divided by 100.
    The inclusion of the cost value helps differentiate between expensive and inexpensive
    queries when deciding whether to consider the missing index. For instance, a missing
    index suggestion that provides an 80 percent improvement on queries with an average
    cost value of 1,000 would likely provide a better return that a 90 percent improvement
    for a query with an average cost value of 1.


    ```

    SELECT

    DB_NAME(database_id) AS database_name

    ,OBJECT_NAME(object_id, database_id) AS table_name

    ,mid.equality_columns

    ,mid.inequality_columns

    ,mid.included_columns

    ,(migs.user_seeks + migs.user_scans) * migs.avg_user_impact AS Impact

    ,migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) AS Score

    ,migs.user_seeks

    ,migs.user_scans

    FROM sys.dm_db_missing_index_details mid

    INNER JOIN sys.dm_db_missing_index_groups mig ON mid.index_handle = mig.index_handle

    INNER JOIN sys.dm_db_missing_index_group_stats migs ON mig.index_group_handle
    = migs.group_handle

    WHERE DB_NAME(database_id) = ''AdventureWorks2017''

    ORDER BY migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) DESC

    ```

    **Listing 10-2**

    Query for Missing Index DMOs


    Figure 10-2 shows some results from executing this query.


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig2_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig2_HTML.jpg)


    **Figure 10-2**

    Results from missing index query


    With the results from the missing index query, shown in Figure 10-2, there are
    a few items to consider from these suggestions. First, there are quite a few similarities
    between the suggestions. The predicate columns between each of the suggestions
    include the `OrderDate` and `DueDate`, except for one missing index. Since the
    column order has not been tested, the optimal column order could go either way.
    To satisfy the missing index suggestion, one possible index could have the key
    column `DueDate` followed by `OrderDate`. This configuration would create an index
    that would satisfy all four of the missing index items.


    The next item to look at is `included_columns`. For two of the suggestions, there
    are `included_columns` values listed. On the fourth missing index suggestion,
    it suggests including the column `OrderDate`. Since it will be one of the key
    columns of the index, it doesn’t need to be included. The other column, from the
    third missing index suggestion, is the `CustomerID` column. While only one index
    needs this column, as an included column, the addition of this column would likely
    be negligible since it is a narrow column. You would also want to add this column
    to the index.


    After looking at these results, you’ve seen four missing index suggestions and
    ended up with a suggestion for one index that can cover all four of the missing
    index items. If you build the index using a DDL statement similar to that in Listing
    10-3, you will end up with an index that solves these missing indexes. If we execute
    the queries in Listing 10-1 again, we see that all of the queries are using index
    seeks on the new index, shown in Figure 10-3.


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig3_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig3_HTML.jpg)


    **Figure 10-3**

    Execution plans for queries after missing index creation


    ```

    CREATE NONCLUSTERED INDEX missing_index_SalesOrderHeader

    ON Sales.SalesOrderHeader([DueDate], [OrderDate])

    INCLUDE ([CustomerID])

    ```

    **Listing 10-3**

    Index from Missing Index DMOs'
