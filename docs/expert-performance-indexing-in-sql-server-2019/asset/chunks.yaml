    | IGNORE_DUP_KEY = { ON | OFF }\n| STATISTICS_NORECOMPUTE = { ON | OFF }\n| STATISTICS_INCREMENTAL\
    \ = { ON | OFF }\n| ONLINE = { ON [ (  ) ] | OFF }\n| RESUMABLE = { ON | OFF }\n\
    | MAX_DURATION =  [MINUTES}\n| ALLOW_ROW_LOCKS = { ON | OFF }\n| ALLOW_PAGE_LOCKS\
    \ = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n| DATA_COMPRESSION = {\
    \ NONE | ROW | PAGE }\n[ ON PARTITIONS ( { [ TO ] } [ , ...n ] ) ]\nListing 1-5\n\
    ALTER INDEX Rebuild Options\n```\n\nFor REORGANIZE, the options for ALTER INDEX\
    \ are limited to LOB_COMPACTION, shown in Listing [1-7](#338675_3_En_1_Chapter.xhtml#PC7).\
    \ With LOB_COMPACTION, when set to ON, the reorganization will attempt to compact\
    \ large object (LOB) pages, allowing space within the index associated with these\
    \ pages to be reduced and released. Without activating this, the reorganization\
    \ will not release these pages."
  trans: "# SQL Server 索引操作指南\n\n每个选项都允许对索引创建过程进行不同级别的控制。表 1-1 列出了所有可用于 `CREATE INDEX`\
    \ 的选项。在后面的章节中，我将讨论应用它们的示例和策略。你可以在 SQL Server 的 SQL 文档中找到有关 `CREATE INDEX` 语法及其使用示例的更多信息。\n\
    \n**表 1-1：CREATE INDEX 语法选项**\n\n| 选项名称 | 描述 |\n| --- | --- |\n| `FILLFACTOR`\
    \ | 定义索引创建时，其每个数据页中应保留的空白空间量。此选项仅在索引创建或重建时应用。 |\n| `PAD_INDEX` | 指定是否应将索引的 `FILLFACTOR`\
    \ 应用于索引的非叶数据页。当需要缓解导致过度非叶级页拆分的数据操作语言（DML）操作时，使用 `PAD_INDEX` 选项。 |\n| `SORT_IN_TEMPDB`\
    \ | 确定是否在 `tempdb` 数据库中存储构建索引时产生的临时结果。此选项会增加所需的空间量。 |\n| `IGNORE_DUP_KEY` | 更改在向表中执行插入操作时遇到重复键时的行为。启用时，违反键约束的行将失败。当默认行为被禁用时，整个插入操作将失败。\
    \ |\n| `STATISTICS_NORECOMPUTE` | 指定在创建索引时是否应重新创建与该索引相关的任何统计信息。 |\n| `STATISTICS_INCREMENTAL`\
    \ | 指定为索引收集的统计信息是应在整个索引上创建还是在每个分区上创建。 |\n| `DROP_EXISTING` | 确定当表中已存在同名索引时的行为。默认情况下，当设置为\
    \ `OFF` 时，索引创建将失败。当设置为 `ON` 时，索引创建将覆盖现有索引。 |\n| `ONLINE` | 确定在索引操作期间，表及其索引是否可用于查询和数据修改。启用时，锁定最小化，并且在索引创建期间主要持有意向共享锁。禁用时，锁定将在操作期间阻止对索引和基础表的数据修改。`ONLINE`\
    \ 是仅适用于企业版的功能。 |\n| `RESUMABLE` | 标识索引操作是否可恢复。SQL Server 2019 新增功能。 |\n| `MAX_DURATION`\
    \ | 确定可恢复索引操作在暂停前执行的最长时间（分钟）。SQL Server 2019 新增功能。 |\n| `ALLOW_ROW_LOCKS` | 确定是否允许在索引上使用行锁。默认情况下，允许。\
    \ |\n| `ALLOW_PAGE_LOCKS` | 确定是否允许在索引上使用页锁。默认情况下，允许。 |\n| `MAXDOP` | 覆盖索引操作期间服务器级别的最大并行度设置。该设置决定了索引操作期间索引可以利用的最大处理器数量。\
    \ |\n| `DATA_COMPRESSION` | 确定在索引上使用的数据压缩类型。默认情况下，不启用压缩。通过此选项，可以指定页面压缩和行压缩类型。\
    \ |\n\n为了演示 `CREATE INDEX` 语法，让我们在 `AdventureWorks2017` 数据库的 `Sales.SalesOrderDetail`\
    \ 表上构建一个索引。该索引的键列是 `ProductId`，并包含 `OrderQty` 和 `UnitPrice` 作为非键列。此外，该索引将使用 `PAGE`\
    \ 压缩。清单 1-3 中的代码构建了这个索引。\n\n```\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Sales_SalesOrderDetail_ProductId\n\
    ON Sales.SalesOrderDetail (ProductID)\nINCLUDE (OrderQty, UnitPrice)\nWITH (DATA_COMPRESSION\
    \ = PAGE);\n```\n**清单 1-3：CREATE INDEX 示例**\n\n## 修改索引\n\n索引创建后，有时需要对其进行修改。修改现有索引的原因有几个。首先，作为持续索引维护的一部分，索引可能需要重建或重新组织。其次，一些索引选项（例如压缩类型）可能需要更改。在这些情况下，可以修改索引，并更改索引的选项。\n\
    \n要修改索引，你需要使用 `ALTER INDEX` 语法。清单 1-4 展示了修改索引的基本语法。\n\n```\nALTER INDEX { index_name\
    \ | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL] [ WITH ( <rewsoptions> [ ,...n\
    \ ] ) ]\n| [ PARTITION = partition_number [ WITH ( <rowsoptions> [ ,...n ] ) ]\
    \ ] ]\n| DISABLE\n| REORGANIZE\n[ PARTITION = partition_number ]\n[ WITH ( LOB_COMPACTION\
    \ = { ON | OFF } ) ]\n| SET ( <set_index_options> [ ,...n ] )\n| RESUME [WITH\
    \ (<resumable_index_options>[,...n])]\n| PAUSE\n| ABORT\n} [ ; ]\n```\n**清单 1-4：ALTER\
    \ INDEX 语法**\n\n当使用 `ALTER INDEX` 语法进行索引维护时，语法中有两个选项可以使用。它们是 `REBUILD` 和 `REORGANIZE`。`REBUILD`\
    \ 选项使用现有的索引结构和选项重新创建索引。它也可用于启用已禁用的索引。`REORGANIZE` 选项重新排序索引的叶级页。这类似于重新洗牌一副牌，使它们恢复顺序排列。这两个选项都将在第\
    \ 6 章中更深入地讨论。\n\n此外，`ALTER INDEX` 语法可用于禁用索引。这是通过 `ALTER INDEX` 语法下的 `DISABLE`\
    \ 选项实现的。禁用的索引将不会被数据库引擎使用或提供。索引被禁用后，只能通过再次使用 `REBUILD` 选项修改索引来重新启用它。\n\n除了这些功能外，许多通过\
    \ `CREATE INDEX` 语法可用的索引选项也可用于 `ALTER INDEX` 语法。`ALTER INDEX` 语法可用于修改索引的压缩。它还可用于更改填充因子或填充索引设置。根据索引不断变化的需求，可以使用此语法更改任何可用选项，尽管在选项的使用方式上存在一些限制。当你\
    \ `REBUILD ALL` 索引分区时，可以修改与 `CREATE INDEX` 语法相同的选项，如清单 1-5 所示。然而，当你 `REBUILD`\
    \ 单个分区时，可用的选项列表会大大减少，如清单 1-6 所示。这是因为整个索引没有改变，只是分区，而不可用的选项适用于整个索引。\n\n```\nPAD_INDEX\
    \ = { ON | OFF }\n| FILLFACTOR = fillfactor\n| SORT_IN_TEMPDB = { ON | OFF }\n\
    | IGNORE_DUP_KEY = { ON | OFF }\n| STATISTICS_NORECOMPUTE = { ON | OFF }\n| STATISTICS_INCREMENTAL\
    \ = { ON | OFF }\n| ONLINE = { ON [ ( <online_options> ) ] | OFF }\n| RESUMABLE\
    \ = { ON | OFF }\n| MAX_DURATION = <time> [MINUTES}\n| ALLOW_ROW_LOCKS = { ON\
    \ | OFF }\n| ALLOW_PAGE_LOCKS = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n\
    | DATA_COMPRESSION = { NONE | ROW | PAGE }\n[ ON PARTITIONS ( { <partition_number>\
    \ [ TO <partition_number> ] } [ , ...n ] ) ]\n```\n**清单 1-5：ALTER INDEX 重建选项**\n\
    \n```\nSORT_IN_TEMPDB = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n|\
    \ RESUMABLE = { ON | OFF }\n| MAX_DURATION = <time> [MINUTES}\n| DATA_COMPRESSION\
    \ = { NONE | ROW | PAGE } }\n| ONLINE = { ON [ ( <online_options> ) ] | OFF }\n\
    ```\n**清单 1-6：ALTER INDEX 单分区重建选项**\n\n对于 `REORGANIZE`，`ALTER INDEX` 的选项仅限于 `LOB_COMPACTION`，如清单\
    \ 1-7 所示。当 `LOB_COMPACTION` 设置为 `ON` 时，重新组织将尝试压缩大型对象（LOB）页，从而减少和释放与这些页关联的索引中的空间。不激活此选项，重新组织将不会释放这些页。"
- fmt: "# ALTER INDEX 与 DROP INDEX 操作详解\n\n## ALTER INDEX 语法\n\n与 `CREATE INDEX` 语法相似，从\
    \ SQL Server 2019 开始，可以恢复已暂停的 `ALTER INDEX` 语句。清单 1-8 显示，对于 `ALTER INDEX` 语法，可用的选项与\
    \ `CREATE INDEX` 类似，但包含了下一节将讨论的低优先级锁等待。\n\n```\nLOB_COMPACTION = { ON | OFF }\n\
    Listing 1-7\nALTER INDEX Reorganize Options\n```\n\n```\nMAXDOP = max_degree_of_parallelism\n\
    | MAX_DURATION = [MINUTES]\n| \nListing 1-8\nALTER INDEX Resumable Options\n```\n\
    \n低优先级锁等待为 `ALTER INDEX` 语法提供了预定义行为的能力，使其在被 SCH-M 锁阻止时，按照清单 1-9 所示的方式进行响应。此功能支持\
    \ REBUILD、REORGANIZE 和可恢复选项。该选项允许 `ALTER INDEX` 在设定的时间后终止阻碍其操作的自身或其他事务。当有一系列 `ALTER\
    \ INDEX` 语句等待执行，而其中某个被其他事务阻塞时，此功能非常有用。\n\n```\nWAIT_AT_LOW_PRIORITY ( MAX_DURATION\
    \ =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE | SELF | BLOCKERS } )\nListing 1-9\n\
    ALTER INDEX Low Priority Lock Wait Options\n```\n\n值得一提的是，有一种索引修改无法通过 `ALTER INDEX`\
    \ 语法实现。更改索引时，无法修改键列和包含列。要实现此目的，需要使用带有 `DROP_EXISTING` 选项的 `CREATE INDEX` 语法。\n\
    \n作为 `ALTER INDEX` 语法的示例，我们将禁用上一节创建的索引。使用清单 1-10 中的脚本，索引将被禁用，并且如前所述，索引作为元数据仍然存在，但没有底层数据结构。有关\
    \ `ALTER INDEX` 语法及其使用示例的更多信息，你可以在 SQL Docs 中搜索。\n\n```\nUSE AdventureWorks2017;\n\
    GO\nALTER INDEX IX_Sales_SalesOrderDetail_ProductId\nON Sales.SalesOrderDetail\n\
    DISABLE;\nListing 1-10\nALTER INDEX Example\n```\n\n## 删除索引\n\n有时你将不再需要某个索引。索引可能因为数据库使用模式的改变而变得不必要，或者它可能与另一个索引过于相似，以至于其存在价值不足。\n\
    \n要 *删除*（即移除）一个索引，需使用 `DROP INDEX` 语法。该语法包含索引名称以及索引所基于的表或对象。清单 1-11 展示了删除索引的语法。从\
    \ SQL Server 2016 开始，`DROP INDEX` 语法支持 `IF EXISTS` 子句，允许你在不事先检查索引是否存在的情况下进行删除操作。\n\
    \n```\nDROP INDEX [ IF EXISTS ]\nindex_name ON \n[ WITH (  [ ,...n ] ) ]\nListing\
    \ 1-11\nDROP INDEX Syntax\n```\n\n除了直接删除索引，你还可以包含一些额外的选项。这些选项主要适用于删除聚集索引。清单 1-12\
    \ 详细列出了可用于 `DROP INDEX` 操作的选项。\n\n```\nMAXDOP = max_degree_of_parallelism\n| ONLINE\
    \ = { ON | OFF }\n| MOVE TO { partition_scheme_name ( column_name )\n| filegroup_name\n\
    | \"default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n| filestream_filegroup_name\n\
    | \"default\" } ]\nListing 1-12\nDROP INDEX Options\n```\n\n当删除聚集索引时，表的基础结构将从聚集变为堆。聚集索引定义了表基础数据的存储位置。当从聚集结构更改为堆结构时，SQL\
    \ Server 需要知道将堆结构放置在哪里。如果位置不是默认文件组，则必须指定。堆的位置可以是单个文件组，也可以由分区方案定义。此信息通过 `MOVE TO`\
    \ 选项设置。与数据位置一起，`FILESTREAM` 位置也可能需要通过这些选项来设置。\n\n删除索引操作的性能影响可能是你需要考虑的因素。因此，`DROP\
    \ INDEX` 语法中包含选项，可用于指定要使用的最大处理器数量，以及操作是否应在线完成。这两个选项的功能与 `CREATE INDEX` 语法中同名选项的功能相似。\n\
    \n要移除前两节中使用的索引，我们可以使用清单 1-13 中的代码来删除它。有关 `DROP INDEX` 语法及其使用示例的更多信息，你可以在 SQL Docs\
    \ 中搜索。\n\n```\nUSE AdventureWorks2017;\nGO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductId\
    \ ON Sales.SalesOrderDetail;\nListing 1-13\nALTER INDEX Example\n```\n\n## 索引元数据\n\
    \n在深入探讨索引策略之前，了解 SQL Server 中关于索引的可用信息非常重要。当需要了解或知道索引是如何构建时，可以查询目录视图来提供此信息。索引有四个可用的目录视图。用户和系统数据库中都包含这些目录视图，并且只会返回在查询的数据库中特有的特定索引。每个目录视图都为每个索引提供重要详细信息。\n\
    \n### sys.indexes\n\n`sys.indexes` 目录视图提供数据库中每个索引的信息。对于每个表、索引或表值函数，该目录视图中都有一行。这提供了数据库中所有索引的完整记录。\n\
    \n`sys.indexes` 中的信息在几个方面很有用。首先，该目录视图包含索引的名称。此外，它还标识索引类型，说明索引是聚集的、非聚集的等。同时，该视图还包含索引定义的属性，包括填充因子、筛选器定义、唯一性标志以及其他用于定义索引的项目。\n\
    \n### sys.index_columns\n\n`sys.index_columns` 目录视图列出了索引中包含的所有列。对于作为索引一部分的每个键列和包含列，该目录视图中都有一行。对于索引中的每一列，该视图包含列的顺序以及列在索引中的排序顺序。\n\
    \n### sys.index_resumable_operations\n\n`sys.index_resumable_operations` 目录视图列出了可恢复索引重新生成操作的执行状态。对于每个暂停或当前正在执行的索引重新生成，该目录视图中都有一条记录。该视图描述了可恢复索引重新生成操作的\
    \ DDL，并提供了一个状态来标识其是正在运行还是已暂停。\n\n### sys.xml_indexes\n\n目录视图 `sys.xml_indexes`\
    \ 类似于 `sys.indexes`。该目录视图为数据库中的每个 XML 索引返回一行。该目录视图的主要区别在于它还提供了一些额外信息。该视图包含有关 XML\
    \ 索引是主 XML 索引还是次级 XML 索引的信息。如果 XML 索引是次级 XML 索引，该目录视图会包含该次级索引的类型。\n\n### sys.selective_xml_index_paths\n\
    \n`sys.selective_xml_index_paths` 目录视图是 `sys.indexes` 中索引的一个子集，仅包含选择性 XML 索引。每个为\
    \ XPath 创建的选择性 XML 索引在该目录视图中都有一条记录。\n\n### sys.selective_xml_index_namespaces\n\
    \n`sys.selective_xml_index_namespaces` 目录视图标识与选择性 XML 索引关联的命名空间。对于与 XML 索引关联的每个命名空间，该目录视图中都有一条记录，标识该命名空间并说明它是否是默认命名空间。"
  raw: "```\nLOB_COMPACTION = { ON | OFF }\nListing 1-7\nALTER INDEX Reorganize Options\n\
    ```\n\nSimilar to the CREATE INDEX syntax, starting with SQL Server 2019, it is\
    \ possible to resume ALTER INDEX statements. Listing [1-8](#338675_3_En_1_Chapter.xhtml#PC8)\
    \ shows that for the ALTER INDEX syntax, the options available are similar to\
    \ CREATE INDEX with the exception of the inclusion of the low priority lock wait,\
    \ which is discussed in the next paragraph.\n\n```\nMAXDOP = max_degree_of_parallelism\n\
    | MAX_DURATION = [MINUTES]\n| \nListing 1-8\nALTER INDEX Resumable Options\n```\n\
    \nThe low priority lock wait provides the ALTER INDEX syntax the ability to predefine\
    \ how it will behave when blocked by a SCH-M lock, shown in Listing [1-9](#338675_3_En_1_Chapter.xhtml#PC9).\
    \ This is supported on REBUILD, REORGANIZE, and resumable options. This option\
    \ allows the ALTER INDEX to terminate its own or other transactions that are blocking\
    \ the ALTER INDEX operation after a set amount of time. This can be useful when\
    \ you have a queue of ALTER INDEX statements waiting to execute and one of them\
    \ gets held up by another transaction.\n\n```\nWAIT_AT_LOW_PRIORITY ( MAX_DURATION\
    \ =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE | SELF | BLOCKERS } )\nListing 1-9\n\
    ALTER INDEX Low Priority Lock Wait Options\n```\n\nIt is worth mentioning that\
    \ there is one type of index modification that is not possible with the `ALTER\
    \ INDEX` syntax. When altering an index, the key and included columns cannot be\
    \ changed. To accomplish this, the `CREATE INDEX` syntax is used with the `DROP_EXISTING`\
    \ option.\n\nAs an example of the ALTER INDEX syntax, we’ll disable the index\
    \ built in the last section. Using the script in Listing [1-10](#338675_3_En_1_Chapter.xhtml#PC10),\
    \ the index is disabled, and as previously mentioned the index still exists as\
    \ metadata without the underlying data structure. For more information on the\
    \ `ALTER INDEX` syntax and examples of its use, you can search for it in SQL Docs.\n\
    \n```\nUSE AdventureWorks2017;\nGO\nALTER INDEX IX_Sales_SalesOrderDetail_ProductId\n\
    ON Sales.SalesOrderDetail\nDISABLE;\nListing 1-10\nALTER INDEX Example\n```\n\n\
    ### Dropping an Index\n\nThere will be times when you no longer need an index.\
    \ The index may no longer be necessary because of changing usage patterns of the\
    \ database, or the index may be similar enough to another index that it isn’t\
    \ useful enough to warrant its existence.\n\nTo *drop* , or remove, an index,\
    \ you use the `DROP INDEX` syntax. This syntax includes the name of the index\
    \ and the table, or object, that the index is built against. Listing [1-11](#338675_3_En_1_Chapter.xhtml#PC11)\
    \ shows the syntax for dropping an index. Starting with SQL Server 2016, DROP\
    \ INDEX syntax supports the IF EXISTS clause, allowing you to drop indexes without\
    \ first checking to verify that the indexes exist.\n\n```\nDROP INDEX [ IF EXISTS\
    \ ]\nindex_name ON \n[ WITH (  [ ,...n ] ) ]\nListing 1-11\nDROP INDEX Syntax\n\
    ```\n\nBesides just dropping an index, you can include a few additional options.\
    \ These options primarily apply to dropping clustered indexes. Listing [1-12](#338675_3_En_1_Chapter.xhtml#PC12)\
    \ details the options available to use for a `DROP INDEX` operation.\n\n```\n\
    MAXDOP = max_degree_of_parallelism\n| ONLINE = { ON | OFF }\n| MOVE TO { partition_scheme_name\
    \ ( column_name )\n| filegroup_name\n| \"default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n\
    | filestream_filegroup_name\n| \"default\" } ]\nListing 1-12\nDROP INDEX Options\n\
    ```\n\nWhen a clustered index is dropped, the base structure of the table will\
    \ change from clustered to heap. When built, a clustered index defines where the\
    \ base data for a table is stored. When making a change from the clustered to\
    \ the heap structure, SQL Server needs to know where to place the heap structure.\
    \ If the location is anywhere other than the default filegroup, it will need to\
    \ be specified. The location for the heap can be a single filegroup or defined\
    \ by a partitioning scheme. This information is set through the `MOVE TO` option.\
    \ Along with the data location, the `FILESTREAM` location may also need to be\
    \ set through these options.\n\nThe performance impact of the drop index operation\
    \ may be something that you need to consider. Because of this, there are options\
    \ in the `DROP INDEX` syntax to specify the maximum number of processors to utilize\
    \ along with whether the operation should be completed online. Both of these options\
    \ function similar to the options of the same name in the `CREATE INDEX` syntax.\n\
    \nTo remove the index used in the last two sections, we can use the code in Listing\
    \ [1-13](#338675_3_En_1_Chapter.xhtml#PC13) to drop the index. For more information\
    \ on the `DROP INDEX` syntax and examples of its use, you can search in SQL Docs.\n\
    \n```\nUSE AdventureWorks2017;\nGO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductId\
    \ ON Sales.SalesOrderDetail;\nListing 1-13\nALTER INDEX Example\n```\n\n## Index\
    \ Metadata\n\nBefore going too deep into indexing strategies, it is important\
    \ to understand the information available in SQL Server on the indexes. When there\
    \ is a need to understand or know how an index is built, there are catalog views\
    \ that can be queried to provide this information. Four catalog views are available\
    \ for indexes. User and system databases have these catalog views in them, and\
    \ only specific indexes that are unique to each database in which they are queried\
    \ will be returned. Each of these catalog views provides important details for\
    \ each index.\n\n### sys.indexes\n\nThe `sys.indexes` catalog view provides information\
    \ on each index in a database. For every table, index, or table-valued function,\
    \ there is one row within the catalog view. This provides a full accounting of\
    \ all indexes in a database.\n\nThe information in `sys.indexes` is useful in\
    \ a few ways. First, the catalog view includes the name of the index. Along with\
    \ that is the type of the index, identifying whether the index is clustered, nonclustered,\
    \ and so forth. Along with that information are the properties on the definition\
    \ of the index. This includes the fill factor, the filter definition, the uniqueness\
    \ flag, and the other items that were used to define the index.\n\n### sys.index_columns\n\
    \nThe `sys.index_columns` catalog view lists all the columns included in an index.\
    \ For each key and included column that is a part of an index, there is one row\
    \ in this catalog view. For each of the columns in the index, the order of columns\
    \ is included along with the order in which the column is sorted in the index.\n\
    \n### sys.index_resumable_operations\n\nThe sys.index_resumable_operations catalog\
    \ view lists the execution status for resumable index rebuilds. For each index\
    \ rebuild that is paused or currently executing, there is a record in this catalog\
    \ view. The view describes the DDL for the resumable index rebuild operation and\
    \ provides a state to identify if it is running or paused.\n\n### sys.xml_indexes\n\
    \nThe catalog view `sys.xml_indexes` is similar to `sys.indexes`. This catalog\
    \ view returns one row per XML index in a database. The chief difference with\
    \ this catalog view is that it also provides some additional information. The\
    \ view includes information on whether the XML index is a Primary or Secondary\
    \ XML index. If the XML index is a Secondary XML index, the catalog view includes\
    \ a type for the Secondary index.\n\n### sys.selective_xml_index_paths\n\nThe\
    \ `sys.selective_xml_index_paths` catalog view is a subset of the indexes in `sys.indexes`,\
    \ which contains only Selective XML indexes. For each Selective XML created for\
    \ an XPath, there is one entry in this catalog view.\n\n### sys.selective_xml_index_namespaces\n\
    \nThe sys.selective_xml_index_namespaces catalog view identifies the namespace\
    \ associated with Selective XML indexes. For each namespace associated with an\
    \ XML index, there is an entry in this catalog view identifying the namespace\
    \ and indicating if it is the default."
  trans: "\n# ALTER INDEX 与 DROP INDEX 操作详解\n\n## ALTER INDEX 语法\n\n与 `CREATE INDEX`\
    \ 语法相似，从 SQL Server 2019 开始，可以恢复已暂停的 `ALTER INDEX` 语句。清单 1-8 显示，对于 `ALTER INDEX`\
    \ 语法，可用的选项与 `CREATE INDEX` 类似，但包含了下一节将讨论的低优先级锁等待。\n\n```\nLOB_COMPACTION = { ON\
    \ | OFF }\nListing 1-7\nALTER INDEX Reorganize Options\n```\n\n```\nMAXDOP = max_degree_of_parallelism\n\
    | MAX_DURATION = [MINUTES]\n| \nListing 1-8\nALTER INDEX Resumable Options\n```\n\
    \n低优先级锁等待为 `ALTER INDEX` 语法提供了预定义行为的能力，使其在被 SCH-M 锁阻止时，按照清单 1-9 所示的方式进行响应。此功能支持\
    \ REBUILD、REORGANIZE 和可恢复选项。该选项允许 `ALTER INDEX` 在设定的时间后终止阻碍其操作的自身或其他事务。当有一系列 `ALTER\
    \ INDEX` 语句等待执行，而其中某个被其他事务阻塞时，此功能非常有用。\n\n```\nWAIT_AT_LOW_PRIORITY ( MAX_DURATION\
    \ =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE | SELF | BLOCKERS } )\nListing 1-9\n\
    ALTER INDEX Low Priority Lock Wait Options\n```\n\n值得一提的是，有一种索引修改无法通过 `ALTER INDEX`\
    \ 语法实现。更改索引时，无法修改键列和包含列。要实现此目的，需要使用带有 `DROP_EXISTING` 选项的 `CREATE INDEX` 语法。\n\
    \n作为 `ALTER INDEX` 语法的示例，我们将禁用上一节创建的索引。使用清单 1-10 中的脚本，索引将被禁用，并且如前所述，索引作为元数据仍然存在，但没有底层数据结构。有关\
    \ `ALTER INDEX` 语法及其使用示例的更多信息，你可以在 SQL Docs 中搜索。\n\n```\nUSE AdventureWorks2017;\n\
    GO\nALTER INDEX IX_Sales_SalesOrderDetail_ProductId\nON Sales.SalesOrderDetail\n\
    DISABLE;\nListing 1-10\nALTER INDEX Example\n```\n\n## 删除索引\n\n有时你将不再需要某个索引。索引可能因为数据库使用模式的改变而变得不必要，或者它可能与另一个索引过于相似，以至于其存在价值不足。\n\
    \n要 *删除*（即移除）一个索引，需使用 `DROP INDEX` 语法。该语法包含索引名称以及索引所基于的表或对象。清单 1-11 展示了删除索引的语法。从\
    \ SQL Server 2016 开始，`DROP INDEX` 语法支持 `IF EXISTS` 子句，允许你在不事先检查索引是否存在的情况下进行删除操作。\n\
    \n```\nDROP INDEX [ IF EXISTS ]\nindex_name ON \n[ WITH (  [ ,...n ] ) ]\nListing\
    \ 1-11\nDROP INDEX Syntax\n```\n\n除了直接删除索引，你还可以包含一些额外的选项。这些选项主要适用于删除聚集索引。清单 1-12\
    \ 详细列出了可用于 `DROP INDEX` 操作的选项。\n\n```\nMAXDOP = max_degree_of_parallelism\n| ONLINE\
    \ = { ON | OFF }\n| MOVE TO { partition_scheme_name ( column_name )\n| filegroup_name\n\
    | \"default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n| filestream_filegroup_name\n\
    | \"default\" } ]\nListing 1-12\nDROP INDEX Options\n```\n\n当删除聚集索引时，表的基础结构将从聚集变为堆。聚集索引定义了表基础数据的存储位置。当从聚集结构更改为堆结构时，SQL\
    \ Server 需要知道将堆结构放置在哪里。如果位置不是默认文件组，则必须指定。堆的位置可以是单个文件组，也可以由分区方案定义。此信息通过 `MOVE TO`\
    \ 选项设置。与数据位置一起，`FILESTREAM` 位置也可能需要通过这些选项来设置。\n\n删除索引操作的性能影响可能是你需要考虑的因素。因此，`DROP\
    \ INDEX` 语法中包含选项，可用于指定要使用的最大处理器数量，以及操作是否应在线完成。这两个选项的功能与 `CREATE INDEX` 语法中同名选项的功能相似。\n\
    \n要移除前两节中使用的索引，我们可以使用清单 1-13 中的代码来删除它。有关 `DROP INDEX` 语法及其使用示例的更多信息，你可以在 SQL Docs\
    \ 中搜索。\n\n```\nUSE AdventureWorks2017;\nGO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductId\
    \ ON Sales.SalesOrderDetail;\nListing 1-13\nALTER INDEX Example\n```\n\n## 索引元数据\n\
    \n在深入探讨索引策略之前，了解 SQL Server 中关于索引的可用信息非常重要。当需要了解或知道索引是如何构建时，可以查询目录视图来提供此信息。索引有四个可用的目录视图。用户和系统数据库中都包含这些目录视图，并且只会返回在查询的数据库中特有的特定索引。每个目录视图都为每个索引提供重要详细信息。\n\
    \n### sys.indexes\n\n`sys.indexes` 目录视图提供数据库中每个索引的信息。对于每个表、索引或表值函数，该目录视图中都有一行。这提供了数据库中所有索引的完整记录。\n\
    \n`sys.indexes` 中的信息在几个方面很有用。首先，该目录视图包含索引的名称。此外，它还标识索引类型，说明索引是聚集的、非聚集的等。同时，该视图还包含索引定义的属性，包括填充因子、筛选器定义、唯一性标志以及其他用于定义索引的项目。\n\
    \n### sys.index_columns\n\n`sys.index_columns` 目录视图列出了索引中包含的所有列。对于作为索引一部分的每个键列和包含列，该目录视图中都有一行。对于索引中的每一列，该视图包含列的顺序以及列在索引中的排序顺序。\n\
    \n### sys.index_resumable_operations\n\n`sys.index_resumable_operations` 目录视图列出了可恢复索引重新生成操作的执行状态。对于每个暂停或当前正在执行的索引重新生成，该目录视图中都有一条记录。该视图描述了可恢复索引重新生成操作的\
    \ DDL，并提供了一个状态来标识其是正在运行还是已暂停。\n\n### sys.xml_indexes\n\n目录视图 `sys.xml_indexes`\
    \ 类似于 `sys.indexes`。该目录视图为数据库中的每个 XML 索引返回一行。该目录视图的主要区别在于它还提供了一些额外信息。该视图包含有关 XML\
    \ 索引是主 XML 索引还是次级 XML 索引的信息。如果 XML 索引是次级 XML 索引，该目录视图会包含该次级索引的类型。\n\n### sys.selective_xml_index_paths\n\
    \n`sys.selective_xml_index_paths` 目录视图是 `sys.indexes` 中索引的一个子集，仅包含选择性 XML 索引。每个为\
    \ XPath 创建的选择性 XML 索引在该目录视图中都有一条记录。\n\n### sys.selective_xml_index_namespaces\n\
    \n`sys.selective_xml_index_namespaces` 目录视图标识与选择性 XML 索引关联的命名空间。对于与 XML 索引关联的每个命名空间，该目录视图中都有一条记录，标识该命名空间并说明它是否是默认命名空间。\n"
- fmt: '### sys.spatial_indexes


    The `sys.spatial_indexes` catalog view is also similar to `sys.indexes`. This
    catalog view returns one row for every spatial index in a database. The main difference
    with this catalog view is that it provides additional information on spatial indexes.
    The view includes information on whether the spatial index is a geometric or geographic
    index.


    ### sys.spatial_index_tessellations


    The `sys.spatial_index_tessellations` catalog view augments the `sys.spatial_indexes`
    catalog view. This catalog view details the bounding boxes and grids associated
    with a spatial index.


    ### sys.column_store_dictionaries


    The `sys.column_store_dictionaries` catalog view supports columnstore indexes.
    This catalog view returns one row for each column in a columnstore index. The
    data describes the structure and type of dictionary built for the column.


    ### sys.column_store_segments


    The `sys.column_store_segments` catalog view supports columnstore indexes by returning
    at least one row for every column in a columnstore index. Columns can have multiple
    segments of approximately 1 million rows each. The rows in the catalog view describe
    base information on the segment (e.g., whether the segment has null values and
    what the minimum and maximum data IDs are for the segment).


    ### sys.column_store_row_groups


    The `sys.column_store_row_groups` catalog view supports maintenance of columnstore
    segments by return per-segment rowgroup details. This catalog view returns information
    on the number of rows in the rowgroup along with the current state of the rowgroup
    and its physical location in the database.


    ### sys.hash_indexes


    The `sys.hash_indexes` catalog view is similar to `sys.indexes` but contains an
    additional column that pertains specifically to hash indexes on memory-optimized
    tables. The additional column is `bucket_count`, for the count of the number of
    buckets created for the index. In the context of a hash index, `buckets` refer
    to the number of locations that are created to store values in the index. The
    relationship between buckets and indexed values is detailed in Chapters [2](#338675_3_En_2_Chapter.xhtml)
    and [7](#338675_3_En_7_Chapter.xhtml).


    ### sys.fulltext_catalogs


    The `sys.fulltext_catalogs` catalog view contains one row for every full-text
    catalog in a database.


    ### sys.fulltext_indexes


    The `sys.fulltext_indexes` catalog view contains one row for every full-text index
    in a database. The view describes the full-text catalog that the index is a part
    of and provides details on the state of the index and how it is being updated.


    ### sys.fulltext_index_columns


    The `sys.fulltext_index_columns` catalog view supports `sys.fulltext_indexes`.
    It contains one row for every column associated with a full-text index.


    ## Summary


    This chapter presented a number of fundamentals related to indexes. You looked
    at the type of indexes available within SQL Server. From heaps to nonclustered
    to spatial indexes, you looked at the type of the index and related it to the
    library Dewey Decimal system as a real-world analogy to indexing. This example
    helped illustrate how each of the index types interacted with the others and the
    scenarios where one type can provide value over another.


    Next, you looked at the data definition language for indexes. Indexes can be created,
    modified, and dropped through the DDL. DDL has a lot of options that can be used
    to finely tune how an index is structured to help improve its usefulness within
    a database.


    This chapter also included information on the metadata, or catalog views, available
    on indexes within SQL Server. Each of the catalog views provides information on
    the structure and makeup of the index. This information can assist in researching
    and understanding the view that is available.


    The details in this chapter provide the framework for what will be discussed in
    later chapters. By leveraging this information, you’ll be able to look deeper
    into your indexes and start applying the appropriate strategies to index your
    databases.


    Footnotes [1](#338675_3_En_1_Chapter.xhtml#Fn1_source)


    # 2. Index Storage Fundamentals


    Where the previous chapter discussed the logical design and syntax of indexes,
    this chapter will focus on the physical implementation of indexes. An understanding
    of the way in which indexes are laid out and interact with each other at the implementation
    and storage level will help you become better acquainted with the benefits that
    indexes provide and why they behave in certain ways.


    To get to this understanding, the chapter will start with some of the basics about
    data storage. First, you’ll look at data pages and how they are laid out. This
    examination will detail what comprises a data page and what can be found within
    it. Also, you’ll examine the dynamic management functions (DMFs) and `DBCC` commands
    that can be used to inspect pages in the index.


    From there, you’ll look at the three ways in which pages are organized for storage
    within SQL Server. These storage methods relate back to heap, clustered, nonclustered,
    and columnstore indexes. For each type of structure, you’ll examine how the pages
    are organized within the index. You’ll also examine the requirements and restrictions
    associated with each index type.


    You will finish this chapter with a deeper understanding of the fundamentals of
    index storage. With this information, you’ll be better able to deal with, understand,
    and expect behaviors from the indexes in your databases.


    ## Storage Basics


    SQL Server uses a number of structures to store and organize data within databases.
    In the context of this book and chapter, you’ll look at the storage structures
    that relate directly to tables and indexes. You’ll start by focusing on pages
    and extents and how they relate to one another. Then you’ll look at the different
    types of pages available in SQL Server and relate each of them back to indexes.'
