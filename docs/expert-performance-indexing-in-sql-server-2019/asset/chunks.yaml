    values followed by an upper-bound column value. The histogram steps are defined
    on the first key column in the statistics. The maximum number of steps is 200.
    |

    | `Density` | Calculated as 1/*distinct values* for all values in the first key
    column of the statistics object, excluding the histogram boundary values. As of
    SQL Server 2008, this value is no longer used by SQL Server. |

    | `Average Key Length` | Average number of bytes per value for all the key columns
    in the statistics object. |

    | `String Index` | Indicates whether the statistics object contains string summary
    statistics to improve the cardinality estimates for query predicates that use
    the `LIKE` operator. |

    | `Filter Expression` | When populated, this is the predicate for the subset of
    table rows included in the statistics object. |

    | `Unfiltered Rows` | Total number of rows in the table before applying the filter
    expression. If `Filter Expression` is `NULL`, `Unfiltered Rows` is equal to `Rows`.
    |

    | `Persisted Sample Percent` | Added in SQL Server 2016, shows the sample percentage
    to use for updates to the statistics.  If zero, then there is no sample percentage
    set for the statistics. |


    Reviewing the stats header information for `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    on `Sales.SalesOrderDetail`, shown in Figure [3-1](#338675_3_En_3_Chapter.xhtml#Fig1),
    you’ll see a number of items of interest. First, since the `Rows` and `Rows Sampled`
    values are the same, you know that the statistics are not based on estimates.
    Next, the statistics were last updated on October 27, 2017 (though this value
    may differ in your database). Another item is that there are 163 steps, of a possible
    max 200 steps, in the statistics histogram. The number of steps is equal to ranges.
    In this case, 163 steps mean there are 163 ranges, each with an upper-bound value
    in the statistics. The upper-bound value defines the max value within the range.
    If step 1 had an upper-bound value of 42, then step 1 would cover values 0–42\.
    The next step would then start with 43 and include values up through its upper-bound.
    Note the lack of a filtered expression and unfiltered rows; neither the index
    nor statistics are filtering out rows. Lastly, the Persisted Sample Percent is
    set to 0, which means all rows were sampled for the statistics, which can be confirmed
    by comparing Rows with Rows Sampled.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig1_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Stats header for index on Sales.SalesOrderDetail table


    #### Density Vector


    The next portion of the statistics components is the density vector. The density
    vector describes the columns within a statistics object. There is a row for each
    key value in the statistics or index object. For instance, if there are two columns
    in an index named `SaleOrderID` and `SalesOrderDetailID`, there will be two rows
    in the density vector. The density vector will have a row for `SaleOrderID` and
    a row for `SaleOrderID` and `SalesOrderDetailID`, shown in Figure [3-2](#338675_3_En_3_Chapter.xhtml#Fig2).
    There are three pieces of information available for density vector: the density,
    average length, and columns included in the vector (column names detailed in Table
    [3-2](#338675_3_En_3_Chapter.xhtml#Tab2)).


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig2_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Sample of the density vector for index on Sales.SalesOrderDetail table


    The value of the density vector is that it helps the query optimizer adjust cardinality
    for multiple column statistics objects. As we’ll discuss in the next section,
    the ranges within the histogram are based solely on the first column of the statistics
    object, and the density provides an adjustment between when single or multicolumn
    queries are executed. While the focus for updating statistics is often on changes
    in the histogram, the density vector provides a valuable means to adjust ranges
    in the histogram to adjust for differences in the distribution of data in beyond
    the first column of the index.


    Table 3-2


    Density Vector Columns from DBCC SHOW_STATISTICS


    | Column Name | Description |

    | --- | --- |

    | `All Density` | Returns the density for each prefix of columns in the statistics
    object, one row per density. The density is calculated as 1/*distinct column values*.
    The closer the density is to 1, the more uniform the values in the columns. |

    | `Average Length` | Average length, in bytes, to store the column values for
    each level of the density vector. |

    | `Columns` | Names of columns in each density vector level. |'
  trans: '## 统计信息头


    统计信息头是统计信息对象的元数据部分。这些列（列于表 3-1 中）主要是信息性的。它们告知在构建统计信息时考虑了多少行，以及这些行是如何通过筛选选定的。表
    3-1 还包含了统计信息上次更新的时间信息，这在调查统计信息质量的潜在问题时非常有用。


    表 3-1：`DBCC SHOW_STATISTICS` 的统计信息头列


    | 列名 | 描述 |

    | --- | --- |

    | `Name` | 统计信息对象的名称。对于索引统计信息，这与索引名称相同。 |

    | `Updated` | 统计信息上次更新的日期和时间。 |

    | `Rows` | 统计信息上次更新时，表或索引视图中的总行数。对于筛选的统计信息或索引，计数指的是符合筛选条件的行数。 |

    | `Rows Sampled` | 用于统计信息计算的抽样行总数。当 `Rows Sampled` 的值小于 `Rows` 中的值时，直方图和密度值是估计值。
    |

    | `Steps` | 直方图中的步数。每个步长跨越一个列值范围，后跟一个上限列值。直方图步长在统计信息的第一个关键列上定义。最大步数为 200。 |

    | `Density` | 计算为 1/*唯一值数量*，针对统计信息对象第一个关键列中的所有值，不包括直方图边界值。从 SQL Server 2008 开始，SQL
    Server 不再使用此值。 |

    | `Average Key Length` | 统计信息对象中所有关键列的每个值的平均字节数。 |

    | `String Index` | 指示统计信息对象是否包含字符串摘要统计信息，以改进使用 `LIKE` 运算符的查询谓词的基数估计。 |

    | `Filter Expression` | 当填充时，这是包含在统计信息对象中的表行子集的谓词。 |

    | `Unfiltered Rows` | 应用筛选表达式之前表中的总行数。如果 `Filter Expression` 为 `NULL`，则 `Unfiltered
    Rows` 等于 `Rows`。 |

    | `Persisted Sample Percent` | 在 SQL Server 2016 中添加，显示用于更新统计信息的抽样百分比。如果为零，则表示没有为统计信息设置抽样百分比。
    |


    查看 `Sales.SalesOrderDetail` 表上 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    的统计信息头信息（如图 3-1 所示），你会看到一些值得关注的项目。首先，由于 `Rows` 和 `Rows Sampled` 值相同，你知道统计信息并非基于估计。其次，统计信息最后更新于
    2017 年 10 月 27 日（尽管你数据库中的此值可能不同）。另一个项目是，统计信息直方图中有 163 步，最大可能步数为 200。步数等于范围数。在这种情况下，163
    步意味着有 163 个范围，每个范围在统计信息中都有一个上限值。上限值定义了该范围内的最大值。如果第 1 步的上限值是 42，那么第 1 步将覆盖值 0–42。下一步将从
    43 开始，并包含直到其上限值的值。请注意缺少筛选表达式和未筛选行数；索引和统计信息都没有筛选掉行。最后，`Persisted Sample Percent`
    设置为 0，这意味着所有行都用于统计信息的抽样，这可以通过比较 `Rows` 和 `Rows Sampled` 来确认。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig1_HTML.jpg](img/338675_3_En_3_Fig1_HTML.jpg)


    图 3-1：`Sales.SalesOrderDetail` 表上索引的统计信息头


    ## 密度向量


    统计信息组件的下一部分是密度向量。密度向量描述了统计信息对象内的列。对于统计信息或索引对象中的每个关键值，都有一行。例如，如果一个名为 `SaleOrderID`
    和 `SalesOrderDetailID` 的索引中有两列，密度向量中将有两行。密度向量将有一行用于 `SaleOrderID`，另一行用于 `SaleOrderID`
    和 `SalesOrderDetailID`，如图 3-2 所示。密度向量有三部分信息可用：密度、平均长度以及包含在向量中的列（列名详见表 3-2）。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig2_HTML.jpg](img/338675_3_En_3_Fig2_HTML.jpg)


    图 3-2：`Sales.SalesOrderDetail` 表上索引的密度向量示例


    密度向量的价值在于它帮助查询优化器调整多列统计信息对象的基数。正如我们将在下一节讨论的，直方图中的范围仅基于统计信息对象的第一列，而密度则提供了在执行单列或多列查询时的调整。虽然更新统计信息的重点通常在于直方图的变化，但密度向量提供了一种宝贵的方法，用于调整直方图中的范围，以适应超出索引第一列的数据分布差异。


    表 3-2：`DBCC SHOW_STATISTICS` 的密度向量列


    | 列名 | 描述 |

    | --- | --- |

    | `All Density` | 返回统计信息对象中每个列前缀的密度，每密度一行。密度计算为 1/*不同列值数量*。密度越接近 1，列中的值越均匀。 |

    | `Average Length` | 存储密度向量每个级别的列值的平均长度（以字节为单位）。 |

    | `Columns` | 每个密度向量级别中的列名。 |'
- fmt: '### Histogram


    DBCC SHOW_STATISTICS 输出的最后一部分是直方图。直方图提供了查询优化器用于确定基数的统计对象的详细信息。构建直方图时，SQL Server
    会基于统计样本或表/视图中的所有行计算一系列聚合值。这些聚合值衡量值出现的频率，并将值分组为不超过 200 个段或*步骤*。对于每个步骤，都会计算统计列的分布，包括步骤中的行数、步骤的上界、匹配上界的行数、步骤中的不同行数以及步骤中重复值的平均数。表
    [3-3](#338675_3_En_3_Chapter.xhtml#Tab3) 列出了与这些聚合值对应的列。利用这些信息，查询优化器能够估算索引中值范围返回的行数，从而使其能够计算检索行的相关成本。


    **表 3-3**

    **DBCC SHOW_STATISTICS 中的直方图列**


    | 列名 | 描述 |

    | --- | --- |

    | `RANGE_HI_KEY` | 直方图步骤的上界列值。该列值也称为*键值*。 |

    | `RANGE_ROWS` | 列值落在直方图步骤内（不包括上界）的估计行数。 |

    | `EQ_ROWS` | 列值等于直方图步骤上界的估计行数。 |

    | `DISTINCT_RANGE_ROWS` | 直方图步骤内（不包括上界）具有不同列值的估计行数。 |

    | `AVG_RANGE_ROWS` | 直方图步骤内（不包括上界，计算公式为 `RANGE_ROWS/DISTINCT_RANGE_ROWS`，当 `DISTINCT_RANGE_ROWS
    > 0` 时）重复列值的平均行数。 |


    如第一部分所述，直方图中有 163 个步骤。在图 [3-2](#338675_3_En_3_Chapter.xhtml#Fig2) 中（包含直方图的一些行），您可以看到
    `Sales.SalesOrderDetail` 表中的部分步骤是如何聚合的。如果您查看图 [3-3](#338675_3_En_3_Chapter.xhtml#Fig3)
    中的第二项，它显示了 `RANGE_HI_KEY` 值为 43692；这意味着 43660 到 43692 之间的所有 `SalesOrderID` 值都包含在这些估算中。基于
    `RANGE_ROWS` 值，此系列中有 282 行，其中包含 32 个不同行。将这些数字转换到 `SalesOrderDetail` 表，即有 32 个不同的
    `SalesOrderID` 值，其间有 282 个 `SalesOrderDetailID` 项。最后，对于 `SalesOrderID` 43692，有
    28 个 `SalesOrderDetailID` 项。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig3_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig3_HTML.jpg)

    **图 3-3**

    **Sales.SalesOrderDetail 表上索引的直方图示例**


    最后需要查看的一列是 `AVG_RANGE_ROWS`。该列中的值非常重要，当统计信息过时时可能会导致很多问题。它说明了从统计信息中检索单个值或值范围时预期的行数。要检查范围平均值的准确性，请执行清单
    [3-3](#338675_3_En_3_Chapter.xhtml#PC3)，该查询将聚合第二步骤中的一些值。完成后，结果（如图 [3-4](#338675_3_En_3_Chapter.xhtml#Fig4)
    所示）将显示平均值与 8.8125 的平均范围行数值非常接近。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig4_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig4_HTML.jpg)

    **图 3-4**

    **AVG_RANGE_ROWS 估算验证结果**


    ```

    USE AdventureWorks2017

    GO

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43672 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43680;

    ```

    **清单 3-3**

    **查询以验证 AVG_RANGE_ROWS 估算值**


    当索引的统计信息受到质疑时，此直方图是一个宝贵的工具。如果需要确定查询为何以特定方式运行，或者需要检查查询计划为何如此估算行数，则可以使用直方图来验证这些行为和结果。


    ### Catalog Views


    使用 `DBCC SHOW_STATISTICS` 提供了关于查询优化统计信息的最详细信息。但是，它依赖于用户知道统计信息的存在。对于索引统计信息，由于所有索引都有统计信息，因此很容易知道。列级统计信息则需要一种替代方法来发现。这通过两个目录视图完成：`sys.stats`
    和 `sys.stats_columns`。


    #### sys.stats


    目录视图 `sys.stats` 为数据库中存在的每个查询优化统计对象返回一行。无论统计信息是基于索引还是列创建的，该统计对象都会列在视图中。表 [3-4](#338675_3_En_3_Chapter.xhtml#Tab4)
    列出了 `sys.stats` 中的列。


    **表 3-4**

    **sys.stats 的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 这些统计信息所属对象的 ID。 |

    | `name` | `sysname` | 统计信息的名称。对于每个 `object_id`，此值必须唯一。 |

    | `stats_id` | `int` | 统计信息的 ID（在对象内唯一）。 |

    | `auto_created` | `bit` | 统计信息是由查询处理器自动创建的。 |

    | `user_created` | `bit` | 统计信息是由用户显式创建的。 |

    | `no_recompute` | `bit` | 统计信息是使用 `NORECOMPUTE` 选项创建的。 |

    | `has_filter` | `bit` | 指示统计信息是否基于筛选器或行子集进行聚合。 |

    | `filter_definition` | `nvarchar(max)` | 筛选统计信息中包含的行子集的表达式。 |

    | `is_temporary` | `bit` | 指示统计信息是否为临时统计信息。在 SQL Server 2012 中添加。 |

    | `is_incremental` | `bit` | 指示统计信息是否为增量统计信息。在 SQL Server 2014 中添加。 |

    | `has_persisted_sample` | `bit` | 指示统计信息是否具有持久化的采样率。在 SQL Server 2019 中添加。 |

    | `stats_generation_method` | `int` | 标识统计信息生成方法的标志。在 SQL Server 2019 中添加。 |

    | `stats_generation_method_desc` | `varchar(80)` | 标识统计信息生成方法的文本描述。在 SQL Server
    2019 中添加。 |


    #### sys.stats_columns


    作为 `sys.stats` 的配套视图，目录视图 `sys.stats_columns` 为统计对象中的每一列提供一行。表 [3-5](#338675_3_En_3_Chapter.xhtml#Tab5)
    列出了 `sys.stats_columns` 中的列。


    **表 3-5**

    **sys.stats_columns 的列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 此列所属对象的 ID。 |

    | `stats_id` | `int` | 此列所属统计信息的 ID。 |

    | `stats_column_id` | `int` | 在一组统计列中的 1 基序号。 |

    | `column_id` | `int` | 来自 `sys.columns` 的列 ID。 |'
  raw: '#### Histogram


    The last piece from the DBCC SHOW_STATISTICS output is the histogram. The histogram
    provides the details of the statistics object that the query optimizer uses to
    determine cardinality. When building the histogram, SQL Server calculates a number
    of aggregates that are based on either a statistics sample or all the rows in
    the table or view. The aggregates measure the frequency in which values occur
    and group the values into no more than 200 segments, or *steps*. For each of these
    steps, a distribution of the statistics columns is computed that includes the
    number of rows in the step, the upper bound of the step, the number of rows matching
    the upper bound, the distinct rows in the step, and the average number of duplicate
    values in the step. Table [3-3](#338675_3_En_3_Chapter.xhtml#Tab3) lists the columns
    that match these aggregates. With this information, the query optimizer is able
    to estimate the number of rows returned for ranges of values in an index, thus
    allowing it to calculate a cost associated with retrieving the row.


    Table 3-3


    Histogram Columns from DBCC SHOW_STATISTICS


    | Column Name | Description |

    | --- | --- |

    | `RANGE_HI_KEY` | Upper-bound column value for a histogram step. The column value
    is also called a *key value*. |

    | `RANGE_ROWS` | Estimated number of rows whose column value falls within a histogram
    step, excluding the upper bound. |

    | `EQ_ROWS` | Estimated number of rows whose column value equals the upper bound
    of the histogram step. |

    | `DISTINCT_RANGE_ROWS` | Estimated number of rows with a distinct column value
    within a histogram step, excluding the upper bound. |

    | `AVG_RANGE_ROWS` | Average number of rows with duplicate column values within
    a histogram step, excluding the upper bound (`RANGE_ROWS/DISTINCT_RANGE_ROWS for
    DISTINCT_RANGE_ROWS > 0`). |


    As mentioned in the first section, there are 163 steps in the histogram. In Figure
    [3-2](#338675_3_En_3_Chapter.xhtml#Fig2), which includes a number of rows from
    the histogram, you can see how a few of the steps in `Sales.SalesOrderDetail`
    are aggregated. If you look at the second item in Figure [3-3](#338675_3_En_3_Chapter.xhtml#Fig3),
    it shows the `RANGE_HI_KEY` value of 43692; this means that all `SalesOrderID`
    values between 43660 and 43692 are included in these estimates. There are 282
    rows in this series, based on the `RANGE_ROWS` value, with 32 distinct rows in
    the series. Translating these numbers to the `SalesOrderDetail` table, there are
    32 distinct `SalesOrderID` values with 282 `SalesOrderDetailID` items between
    them. Lastly, there are 28 `SalesOrderDetailID` items for `SalesOrderID` 43692.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig3_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Sample of the histogram for index on Sales.SalesOrderDetail table


    This leaves one last column to look at: `AVG_RANGE_ROWS`. The value in this column
    is quite important and can result in a lot of pain when statistics are out-of-date.
    It states how many rows can be expected when any one value or range of values
    from the statistics are retrieved. To check the accuracy of the range average,
    execute Listing [3-3](#338675_3_En_3_Chapter.xhtml#PC3), which will aggregate
    some of the values in the second step. After it is complete, the results (shown
    in Figure [3-4](#338675_3_En_3_Chapter.xhtml#Fig4)) will show that the averages
    closely match the average range rows value of 8.8125.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig4_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Results of AVG_RANGE_ROWS estimate validation


    ```

    USE AdventureWorks2017

    GO

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43672 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43680;

    Listing 3-3

    Query to Check AVG_RANGE_ROWS Estimate

    ```


    This histogram is a valuable tool to use when the statistics of an index are in
    question. If there is a need to determine why a query is behaving in a specific
    manner or you need to check why a query plan is estimating rows as it is, the
    histogram can be used to validate these behaviors and results.


    ### Catalog Views


    Using `DBCC SHOW_STATISTICS` provides the most detailed information on query optimization
    statistics. It does, however, rely on the user knowing that the statistics exist.
    With index statistics, it is easy to know about the statistics since all indexes
    have statistics. Column-level statistics require an alternative method for discovering
    the statistics. This is accomplished through two catalog views: `sys.stats` and
    `sys.stats_columns`.


    #### sys.stats


    The catalog view `sys.stats` returns one row for every query optimization statistics
    object that exists within the database. Whether the statistic was created based
    on an index or column, the statistics object is listed in the view. Table [3-4](#338675_3_En_3_Chapter.xhtml#Tab4)
    lists the columns in `sys.stats`.


    Table 3-4


    Columns for sys.stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the object to which these statistics belong. |

    | `name` | `sysname` | Name of the statistics. This value must be unique for every
    `object_id`. |

    | `stats_id` | `int` | ID of the statistics (unique within the object). |

    | `auto_created` | `bit` | Statistics were autocreated by the query processor.
    |

    | `user_created` | `bit` | Statistics were explicitly created by the user. |

    | `no_recompute` | `bit` | Statistics were created with the `NORECOMPUTE` option.
    |

    | has_filter | `bit` | Indicates whether the statistics are aggregated based on
    a filter or subset of rows. |

    | `filter_definition` | `nvarchar(max)` | Expression for the subset of rows included
    in filtered statistics. |

    | `is_temporary` | `bit` | Indicates whether the statistics are temporary.  Added
    in SQL Server 2012. |

    | `is_is_incremental` | `bit` | Indicates whether the statistics are temporary.  Added
    in SQL Server 2014. |

    | `has_persisted_sample` | `bit` | Indicates whether the statistics have a persisted
    sample rate.  Added in SQL Server 2019. |

    | `stats_generation_method` | `int` | Flag identifying the generation method for
    the statistics. Added in SQL Server 2019. |

    | `stats_generattion_method_desc` | `varchar(80)` | Text description identifying
    the generation method for the statistics. Added in SQL Server 2019. |


    #### sys.stats_columns


    As a companion to sys.stats, the catalog view `sys.stats_columns` provides one
    row for every column within a statistics object. Table [3-5](#338675_3_En_3_Chapter.xhtml#Tab5)
    lists the columns in `sys.stats_columns` .


    Table 3-5


    Columns for sys.stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | int | ID of the object of which this column is part. |

    | `stats_id` | int | ID of the statistics of which this column is part. |

    | `stats_column_id` | int | 1-based ordinal within a set of stats columns. |

    | `column_id` | int | ID of the column from `sys.columns.` |'
