  trans: '

    虽然聚簇列存储索引与非聚簇列存储索引的列式结构保持不变，但两者之间存在一些重要区别需要了解。聚簇列存储索引包含一个名为 `deltastore` 的附加结构，用于支持对索引的写操作。虽然两种列存储索引的数据段都是只读的，但
    `deltastore` 允许对索引执行插入、更新和删除操作。此外，聚簇列存储索引是数据的基础副本；它不依赖聚簇索引或堆来保存数据的完整副本，所有数据都存储在聚簇列存储索引中。而非聚簇列存储索引则需要基于其使用的数据建立传统的聚簇索引，通常会在数据库中形成数据的副本。


    ### 警告


    下一节中使用的工具未公开且不受支持。它们不会出现在 `SQL Server 联机丛书中`，其功能可能在不通知的情况下发生变化。话虽如此，这些工具已存在相当长的时间，且有许多博客文章描述了它们的行为。您可以在
    [`www.sqlskills.com`](http://www.sqlskills.com) 找到使用这些工具的更多资源。当使用旧版本的 `SQL Server`
    时，理解这些工具将非常重要，因为之前描述的 `DMF` 可能不可用。


    ## 检查页面


    本章第一部分概述了 `SQL Server` 数据库中的页面类型。在此基础上，您还了解了用于组织和管理数据库内页面关系的结构。下一节中，您将学习如何使用动态管理函数和
    `DBCC` 命令来检查数据库中的页面。对于当前版本的 `SQL Server`，您可以使用 `DMF`，但在旧版本上则需要使用 `DBCC` 命令。


    通过使用这些工具，您将获得基础，从而能够在本章及本书后续部分研究 `索引` 的行为。同时，这也为您提供了自行探索数据库中 `索引` 和数据的知识。


    ### 动态管理函数


    有两个动态管理函数可用于检查 `SQL Server` 数据库中的页面，分别是：


    *   `sys.dm_db_database_page_allocations`

    *   `sys.dm_db_page_info`


    #### sys.dm_db_database_page_allocations


    `DMF sys.dm_db_database_page_allocations` 提供有关数据库中页面分配的信息。该函数可用于调查 `索引` 及其关联的页面，也可用于识别区的分配方式以及所使用的区是混合区还是统一区。


    此 `DMF` 提供的数据类似于 `DBCC EXTENTINFO` 和 `DBCC IND`（后文将描述）所提供的数据。使用 `DMF` 的一个优势是结果可以过滤，并可与其他
    `DMF` 合并。此外，它还提供分配给 `索引` 的所有页面的详细信息，即使这些页面上没有数据。其输出的一个限制是只返回与数据分配相关的页面，例如数据页、`索引`
    页和 `IAM` 页。


    清单 2-1 展示了使用 `sys.dm_db_database_page_allocations` 的语法。执行需要五个参数，其定义见表 2-1。


    **表 2-1**

    **sys.dm_db_database_page_allocations 的参数**


    | 参数 | 描述 |

    | --- | --- |

    | `@DatabaseId` | 要返回其表和索引页面列表的数据库。此参数是必需的，接受 `DB_ID()` 函数的使用。 |

    | `@TableId` | 要返回其页面列表的表的 `Object_id`。此参数是必需的，接受 `OBJECT_ID()` 函数的使用。也可使用 `NULL`
    来返回所有表。 |

    | `@IndexId` | 页面列表来源表的 `Index_id`。此参数是必需的，接受使用 `NULL` 来返回所有索引的信息。 |

    | `@PartionId` | 页面列表返回的分区的 ID。此参数是必需的，接受使用 `NULL` 来返回所有索引的信息。 |

    | `@Mode` | 定义返回数据的模式。选项为 `DETAILED` 和 `LIMITED`。`LIMITED` 模式下，信息仅限于页面元数据，例如页面分配和关系信息。`DETAILED`
    模式下，会提供额外信息，例如页面类型和页面间关系链。 |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {TableId | NULL}, {IndexId | NULL}, { PartitionId | NULL },

    {DETAILED | LIMITED})

    ```

    清单 2-1

    `sys.dm_db_database_page_allocations` 语法


    执行 `sys.dm_db_database_page_allocations` 时，结果包含表 2-2 中定义的列。对于每次页面分配，结果中将有一行对应。


    **表 2-2**

    **sys.dm_db_database_page_allocations 的列**

