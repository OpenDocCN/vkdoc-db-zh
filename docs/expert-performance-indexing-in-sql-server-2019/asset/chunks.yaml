    # 包含列模式


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig33_HTML.jpg](img/338675_3_En_11_Fig33_HTML.jpg)


    ### 图 11-33

    包含列模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig32_HTML.jpg](img/338675_3_En_11_Fig32_HTML.jpg)


    ### 图 11-32

    包含列模式的统计 I/O 结果


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameINC ON dbo.Contacts(FirstName)

    INCLUDE (LastName, IsActive, EmailAddress);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    清单 11-22

    包含列模式

    ```


    虽然使用 `包含列` 模式创建的索引，其读取次数略有增加，但该索引的灵活性足以抵消这种差异。在本章的每个示例中，都向 `dbo.Contacts` 表添加了一个新索引。至此，该表上共有六个索引，每个索引服务于不同的目的，其中四个以相同的列
    `FirstName` 作为引导列。每个索引都占用空间，并且在 `dbo.Contacts` 表中的数据被修改时需要进行维护。在活跃的表中，如此数量的索引可能会对表上的所有活动产生负面影响。


    `包含列` 模式可以帮助解决这个问题。在存在多个具有相同引导键列的索引的情况下，可以使用 `包含列` 模式，将其中一些键列作为非键列添加到索引中，从而将这些索引合并为一个索引。为了演示，首先删除所有以
    `FirstName` 开头的索引，但保留使用 `包含列` 模式创建的那个索引（脚本见 清单 11-23）。


    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastName ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstName ON dbo.Contacts

    GO

    清单 11-23

    在包含列模式中删除索引

    ```


    现在，`dbo.Contact` 表上只剩下三个索引：`ContactID` 列上的聚集索引，`LastName` 列上的非聚集索引，以及一个以 `FirstName`
    为引导列、并包含 `LastName`、`IsActive` 和 `EmailAddress` 列作为索引数据的索引。在这些索引就位后，需要针对该表测试来自先前模式中的查询，如
    清单 11-24 所示。


    关于查询在 `包含列` 模式下与在其他模式下的性能表现，有两点需要注意。首先，如 图 11-34 所示，所有查询的执行计划都利用了索引查找操作。对于仅在 `FirstName`
    上进行筛选的查询，使用索引查找是预期的；但当存在额外的 `LastName` 筛选条件时，也可以使用索引查找。SQL Server 能够做到这一点，是因为在索引查找之下，它执行了一个范围扫描，先匹配第一个谓词的行，然后移除
    `LastName` 值不为 `Cox` 的结果。第二个需要注意的点是每个查询的读取次数，如 图 11-35 所示。读取次数从两次增加到了三次。虽然这构成了
    50% 的读取增加，但其性能变化不足以证明创建四个索引是合理的，因为一个索引已能充分提供所需的性能。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig35_HTML.jpg](img/338675_3_En_11_Fig35_HTML.jpg)


    ### 图 11-35

    包含列模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig34_HTML.jpg](img/338675_3_En_11_Fig34_HTML.jpg)


    ### 图 11-34

    包含列模式的统计 I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    清单 11-24

    针对包含列模式的其他查询

    ```


    用于构建非聚集索引的 `包含列` 模式，是在创建索引时需要运用的一个重要模式。当与会导致查找操作的特定查询一起使用时，它可以改善读取和执行性能。它还提供了整合相似查询的机会，从而减少表上的索引数量，同时仍能提供优于不存在这些索引的情况下的性能改进。

