  trans: '## 总结


    本章探讨了围绕索引的一些**常见误解**以及一些**最佳实践**。针对这两个方面，你研究了普遍持有的信念是什么，并了解了围绕每个信念的详细情况。


    关于误解，你了解了许多人们普遍相信但事实上并不正确的关于索引的观点。这些误解涵盖了聚集索引、填充因子、索引的列组成等等。如何看待任何可能是误解的关于索引的信念，其关键在于要亲自去**测试**它。


    你还了解了最佳实践。本章提供的最佳实践应该是为你数据库构建索引的基础。我定义了什么**是**最佳实践，什么**不是**。然后，我讨论了在为数据库建立索引时可以考虑的若干最佳实践。


    # 9. 索引维护


    就像生活中的任何事物一样，索引也需要维护。随着时间的推移，索引的性能优势可能会减弱，或者由于数据修改，它们的大小和底层统计信息可能会发生漂移和膨胀。为了防止这些问题，必须对索引进行维护。如果你这样做，你的数据库将保持为一个精简、高效的查询运行机器。


    在维护方面，需要考虑五个领域：


    - 索引碎片化

    - 堆膨胀和转发行

    - 列存储索引碎片化

    - 统计信息

    - 内存中统计信息


    每个领域在维护一个索引良好、性能优异的数据库中都扮演着关键角色。


    本章将探讨所有这些领域。你将了解不维护索引所带来的问题，并回顾实施维护过程的策略。为了说明碎片化是如何发生的，会提供一些简单的演示。关于统计信息的讨论将扩展第
    3 章中讨论的内容，并说明如何更新统计信息以保持其准确性。


    ## 索引碎片化


    第一个可能导致索引性能下降的维护问题是索引碎片化。当索引中的页在物理上不再连续时，就会发生碎片化。


    虽然索引碎片化在以前版本的 SQL Server 和旧存储系统中引起过更大的关注，但在 SQL Server 中它仍然值得关注。碎片化导致的主要问题是，由于页被拆分，并且在许多情况下留下一半为空，因此存储索引所需的空间量增加。这种额外的空间会影响数据库在磁盘上使用的空间量、在内存中的占用量，并在
    CPU 处理数据时产生影响。


    SQL Server 中有几个事件可能导致索引碎片化：


    - `INSERT` 操作

    - `UPDATE` 操作

    - `DELETE` 操作

    - `DBCC SHRINKDATABASE` 操作


    如你所见，除了从数据库中选择数据之外，几乎你对索引所能做的任何操作都可能导致碎片化。除非你的数据库是只读的，否则你必须注意碎片化问题，并在索引问题变得严重之前解决它。


    ### 碎片化操作


    理解碎片化的最好方式是亲眼看到它发生。在第 3 章中，你研究了动态管理对象 (DMO) `sys.dm_index_physical_stats` 返回的信息。在本节中，你将回顾一些导致碎片化的脚本，然后使用该
    DMO 来调查已发生的碎片化程度。


    如前所述，当索引中的物理页不连续时，就会发生碎片化。当发生插入操作，并且新行没有放置在索引的末尾时，新行将被放置在一个已经有其他行的页上。如果该页上没有足够的空间容纳新行，那么该页将被拆分——导致索引碎片化。碎片化是索引中页拆分的物理结果。


    #### 插入操作


    第一个可能导致索引碎片化的操作是 `INSERT` 操作。这通常不被认为是最有可能导致碎片化的操作，但某些数据库设计模式确实会导致碎片化。`INSERT`
    操作可能导致碎片化的领域有两个：聚集索引和非聚集索引。


    设计聚集索引最常见的模式是将索引放在一个值**始终递增**的单个列上。这通常使用 `int` 数据类型和 `IDENTITY` 属性来实现。当遵循这种模式时，在插入过程中发生碎片化的可能性相对较小。不幸的是，这并不是唯一存在的聚集索引模式，其他模式会导致碎片化。例如，使用业务键或
    `uniqueidentifier` 数据类型值通常会导致碎片化。


    使用 `uniqueidentifier` 数据类型值的聚集索引通常使用 `NEWID()` 函数来生成一个随机的唯一值作为聚集键。该值是唯一的，但不是始终递增的。最新生成的值可能在前一个值之前，也可能在之后。因此，当将新行插入到聚集索引中时，它很可能被放置在索引中已存在的许多其他行之间。而且，如前所述，如果索引中没有足够的空间，就会发生碎片化。


    为了演示使用 `uniqueidentifier` 数据类型值导致的碎片化，请尝试清单 9-1 中的代码。此代码创建一个名为 `dbo.UsingUniqueidentifier`
    的表。它用来自 `sys.columns` 的行填充，然后添加一个聚集索引。此时，索引中的所有页在物理上都是连续的。运行清单 9-2 中的代码以查看图 9-1
    所示的结果；这些结果显示索引的平均碎片化百分比为 0.00%。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig1_HTML.jpg](img/338675_3_En_9_Fig1_HTML.jpg)

    **图 9-1** 初始碎片化结果（结果可能有所不同）


    ```sql

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_frag_in_percent

    ,fragment_count AS frag_count

    ,avg_fragment_size_in_pages AS avg_frag_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UsingUniqueidentifier''),NULL,NULL,''DETAILED'')

    ```

    **清单 9-2** 查看插入操作后的索引碎片化


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UsingUniqueidentifier'') IS NOT NULL

    DROP TABLE dbo.UsingUniqueidentifier;

    CREATE TABLE dbo.UsingUniqueidentifier

    (

    RowID uniqueidentifier CONSTRAINT DF_GUIDValue DEFAULT NEWID()

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UsingUniqueidentifier(RowID);

    ```

    **清单 9-1** 填充 Uniqueidentifier 表


    表构建好并基于 `uniqueidentifier` 数据类型创建聚集索引后，你现在可以向表中执行 `INSERT` 操作，以查看插入对索引的影响。为了演示，使用清单
    9-3 中的代码将 `sys.objects` 中的所有行插入到 `dbo.UsingUniqueidentifier` 中。插入之后，你可以使用清单 9-2
    再次查看索引的碎片化情况。你的结果应该与图 9-2 所示的类似，该图显示在向表中添加了 689 行之后，索引级别 0 处的聚集索引碎片化超过了 70%。'
- fmt: '### INSERT Operations


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.objects

    ```

    **Listing 9-3** INSERT into Uniqueidentifier Table


    As this code sample demonstrated, clustered indexes that are based on values that
    are not ever-increasing result in fragmentation. The best example of this type
    of behavior is through the use of `uniqueidentifier`s. This can also happen when
    the clustering key is a computed value or based on a business key. When looking
    at business keys, if a random purchase order is assigned to an order, then that
    value will likely behave similar to a `uniqueidentifier` data type value.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig2_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig2_HTML.jpg)


    **Figure 9-2** Post-INSERT fragmentation results (percentage results may vary)


    The other way in which `INSERT` operations can affect fragmentation is on the
    nonclustered indexes. While the clustered index values may be ever-increasing
    values, the values for the columns in the nonclustered index won’t necessarily
    have that same quality. A good example of this is when indexing the name of a
    product in a nonclustered index. The next record inserted into the table may start
    with the letter `M` and will need to be placed near the middle of the nonclustered
    index. If there isn’t room at that location, a page split will occur, and fragmentation
    will result.


    To demonstrate this behavior, add a nonclustered index to the table `dbo.UsingUniqueidentifier`
    that you used in the previous demonstrations. Listing 9-4 shows the schema for
    the new index. Before inserting more records to see the effect of inserting into
    a nonclustered index, run Listing 9-2 again. Your results should be similar to
    those in Figure 9-3.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig3_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig3_HTML.jpg)


    **Figure 9-3** Nonclustered index fragmentation results


    ```

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UsingUniqueidentifier(Name) INCLUDE (JunkValue);

    ```

    **Listing 9-4** Create Nonclustered Index


    At this point, you need to insert more records into `dbo.UsingUniqueidentifier`.
    Use Listing 9-3 again to insert more records into the table and then use Listing
    9-4 to view the state of fragmentation in the nonclustered index. With this complete,
    your nonclustered index has gone from no fragmentation to more than 40 percent
    fragmentation, as shown in Figure 9-4.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig4_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig4_HTML.jpg)


    **Figure 9-4** Nonclustered Post-INSERT fragmentation results


    Whenever you perform `INSERT` operations, there is always a way in which fragmentation
    can occur. This will happen on both clustered and nonclustered indexes.


    ### Update Operations


    Another operation that can lead to fragmentation is an `UPDATE` operation. There
    are two main ways in which an `UPDATE` operation will result in fragmentation.
    First, the data in the record no longer fits on the page on which it currently
    resides. Second, the key value for the index changes, and the index location for
    the new key value is not on the same page or doesn’t fit on the page where the
    record is destined. In both of these cases, the page splits, and fragmentation
    occurs.


    To demonstrate how these situations lead to fragmentation, you’ll first look at
    how increasing the size of a record in an update can lead to fragmentation. For
    this, you’ll create a new table and insert a number of records into it. Then you’ll
    add a clustered index to the table. The code for this is in Listing 9-5. Using
    the script from Listing 9-6 again, you can see that there is no fragmentation
    on the clustered index, as the results in Figure 9-5 show. One thing to pay attention
    to with these fragmentation results is that the average page space used is almost
    90 percent. Because of this, any significant growth in record size will likely
    fill the available space on the pages.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig5_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Initial UPDATE fragmentation results


    ```

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UpdateOperations''),NULL,NULL,''DETAILED'')

    ```

    **Listing 9-6** View UPDATE Index Fragmentation


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UpdateOperations'') IS NOT NULL

    DROP TABLE dbo.UpdateOperations;

    CREATE TABLE dbo.UpdateOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UpdateOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UpdateOperations(RowID);

