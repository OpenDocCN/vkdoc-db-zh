    One thing to remember with the last two scenarios is that the table being tuned
    was tuned in a vacuum. There were no constraints or foreign key relationships
    on the table that need to be considered. In the real world, this won’t be the
    way your database is designed, and foreign key relationships will affect how recommendations
    are provided. Also, the load for these scenarios contained only two queries. When
    building your workloads, be sure to use a sample that is representative of your
    environment.


    Through the DTA scenarios provided in this section, you’ve laid a foundation for
    using tools in your index tuning activities. Not only can the DTA identify missing
    indexes, but, given a workload, it can also help identify where clustered indexes
    and partitioning can assist with performance. The physical changes that DTA can
    provide could be extremely useful when you quickly need to address performance
    issues with a database.


    ## Summary


    This chapter walked you through using the built-in indexing tools available in
    SQL Server. Each of these tools can be a great addition to your SQL Server tool
    belt. They allow you to dig in and start making informed indexing decisions without
    expending a lot of effort.


    When it comes to the missing index DMOs, you are working with index suggestions
    based on existing activity on the SQL Server instance. These are real-world applications,
    and they represent areas where you can almost immediately begin to build solutions
    to improve performance.


    The DTA, while not as readily available as the missing index DMOs, allows you
    to tune indexes from a single query to a full workload with minimal effort. The
    new option to tune the contents of the plan cache allows you to leverage the work
    currently being done in an environment to build recommendations without the need
    to create a workload.


    # 11. Indexing Strategies


    Indexing databases is often thought of as an art where the database is the canvas
    and the indexes are the paints that come together to form a beautiful tapestry
    of storage and performance. A little color here, a little color there, and paintings
    will take shape. In much the same way, a clustered index on a table and then a
    few nonclustered indexes can result in screaming performance as beautiful as any
    masterpiece. Going a little too abstract or minimalist with your indexing might
    make you feel good, but the performance will let you know it isn’t too useful.


    As colorful as this analogy is, there is more science behind designing and applying
    indexes than there is artistry. A few columns pulled together because they might
    work well together is often less beneficial than an index built upon well-established
    patterns. The indexes that are based on tried-and-true practices are often the
    best solutions. In this chapter, we’ll walk through a number of patterns to help
    identify potential indexes.


    ## Heaps


    There are few valid cases for using heaps in your databases. The general rule
    of thumb for most DBAs is that all tables in a database should be built with clustered
    indexes instead of heaps. While this practice rings true in many situations, there
    are situations when using a heap is acceptable and preferred. This section looks
    at one of these scenarios and discusses the other situations in generalities.
    The reason for being generic is that it is difficult to make blanket statements
    about when to use a heap instead of a clustered index (which will be explained
    more later in the section).'
