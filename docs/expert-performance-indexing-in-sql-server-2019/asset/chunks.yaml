    ### 注意


    对于数据库引擎调优顾问的价值存在许多负面看法。在我看来，这个工具填补了一个角色，并且只要为其提供足够的工作负载，它就会返回有价值的建议。这些调优建议为数据库调优提供了一个比从零开始更好的起点。


    ## 数据库引擎调优顾问


    SQL Server 中另一个可用的索引工具是**数据库引擎调优顾问**。该工具允许 SQL Server 分析来自文件、表、计划缓存或查询存储的工作负载。`DTA`的输出可以为工作负载的索引和分区配置提供调优建议。使用该工具的主要好处是，它不需要对底层数据库有深入的理解就能提出建议。


    无论是处理单个查询还是完整的一天工作负载，`DTA`都会为以下类型的对象提供索引建议：


    -   用于聚集索引和非聚集索引的行存储和列存储表

    -   对齐或非对齐分区

    -   可支持索引的视图


    通过`DTA`中的会话，你可以真正地将建议聚焦于你对环境的期望。你能够根据你的环境（无论是事务型还是分析型）利用工作负载，并将重点放在读取和写入上，从而获得符合你需求的索引建议。你甚至可以修改环境设置，以查找因磁盘空间变化而产生的索引建议。


    一旦分析完成，`DTA`会提供多个报告和输出。这些信息使你能够审阅建议，并理解它将对数据库产生的影响。


    尽管`DTA`具备相当多的功能，但该工具也存在一些限制。以下列举了其中一部分：


    -   无法在系统表上推荐索引。

    -   无法添加或删除唯一索引，或强制主键/唯一约束的索引。

    -   对于某些工作负载，建议可能会有所变化。`DTA`在执行时会采样数据，这将影响最终的建议。

    -   无法对远程服务器上的跟踪表进行调优。

    -   对调优工作负载施加的约束如果超出范围，可能会对建议产生负面影响。


    ### 注意


    `DTA`作为一个索引工具常常受到诟病。这主要是由于其他人的滥用和误用造成的。在使用该工具时，请务必验证其推荐的任何更改，并在将其应用于生产环境之前进行彻底的测试。


    ### 解释 DTA


    用户可以通过两种方式与`DTA`交互：图形用户界面（`GUI`）和命令行实用程序。这两种方法提供了大部分相同的功能。根据你的熟练程度，可以选择其中任意一种。


    `GUI`工具（我们将在本章大部分内容中使用）为`DTA`提供了一个封装界面。它允许你从可用选项中进行选择，并使你能够查看先前执行的调优会话。如果你想查看调优结果，`GUI`非常适合这项任务。调优会话可以通过`GUI`进行配置和执行。


    命令行实用程序在配置和执行会话方面提供了与`GUI`相同的功能。命令行实用程序可以通过命令开关或 XML 配置文件进行配置。这两种选项都允许数据库管理员（`DBA`）和开发人员构建流程，以自动化用于审查和分析工作负载的调优活动，并建立一个索引调优流程，使`DBA`能够处理结果，而无需亲自完成设置和配置调优会话的繁琐过程。在第
    15 章中，你将了解更多关于将`DTA`实用程序集成到性能调优方法中的内容。


    对于这两种工具，都需要进行两个主要方面的配置。第一个方面决定调优会话将如何与物理设计结构（`PDS`）交互并提出建议。第二个方面决定`DTA`在尝试调优数据库时应采用何种分区策略。


    关于如何生成物理设计结构建议的选项包含两个部分。你配置的第一个选项是在调优中使用哪种类型的`PDS`。物理设计结构可以扩展，以包含对筛选索引和列存储索引的考虑。物理设计结构使用的选项如下：


    -   索引和索引视图。

    -   索引（默认选项）。

    -   仅评估现有`PDS`的利用率。

    -   索引视图。

    -   非聚集索引。


    下一个`PDS`选项是在索引调优中要考虑的分区方式。`DTA`提供不使用分区、使用对齐分区或使用完整分区三种选项。使用完整分区时，建议将考虑表是否应包含已分区和未分区的索引。


    最后一个`PDS`选项决定哪些对象应保留在数据库中。此选项有助于确保调优建议不会对先前测试和部署的调优产生不利影响。以下是用于保留在数据库中的`PDS`项的选项：


    -   不保留任何现有`PDS`。

    -   保留所有现有`PDS`（默认选项）。

    -   保留对齐分区。

    -   仅保留索引。

    -   仅保留聚集索引。


    除了这些选项之外，还可以配置一些其他选项。这些选项配置调优会话运行的时长，如果你需要运行大量数据库或处理大型工作负载，希望防止其运行过长时间，这一点可能很重要。此外，你可以定义建议的最大磁盘空间和每个索引的最大列数。最后一个设置选项指示索引建议是否可以或必须能够在线部署。


    ### 注意


    在继续下一节之前，请运行清单 10-1 中的代码。如果清单 10-3 中的索引已被创建，请使用清单 10-4 中提供的 `DROP INDEX` 语句删除该索引。


    ```

    DROP INDEX IF EXISTS Sales.SalesOrderHeader.missing_index_SalesOrderHeader;

    Listing 10-4

    用于删除索引 missing_index_SalesOrderHeader 的 DDL 语句

    ```

    '
- fmt: '# Using the DTA GUI


    As mentioned earlier in the chapter, one of the ways to interact with the DTA
    is through the GUI. In this section, you’ll look at a scenario demonstrating how
    to use the DTA for index tuning. There are a few methods for launching the tool.
    The first option is within SQL Server Management Studio (SSMS). Within SSMS, you
    can choose Tools ➤ Database Engine Tuning Advisor from the menu bar. The other
    option is to open the Database Engine Tuning Advisor 18 from Microsoft SQL Server
    Tools 18 on the Start menu.


    After launching the DTA, you will be prompted to connect to a SQL Server instance.
    Once connected, the tool will open a new tuning session for configuration. Figure
    [10-4](#338675_3_En_10_Chapter.xhtml#Fig4) shows a DTA session.


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig4_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig4_HTML.jpg)

    *Figure 10-4. General configuration screen from the Database Engine Tuning Advisor*


    In the session launch screen on the General options tab, there are a few things
    to configure initially. To start, there is the session name. The session name
    can be any value you desire. The default value includes your username with the
    date and time. Next, select the type of workload that will be used. There are
    four options for the workload:


    *   `File`: A file containing SQL Trace output, an XML configuration, or SQL scripts.

    *   `Table`: SQL Server database table containing SQL Trace output. Before using
    the table, be sure the trace populating it has been completed.

    *   `Plan cache`: The plan cache of the SQL Server that the tuning session is
    connected to. This capability was introduced in SQL Server 2012 and provides a
    powerful mechanism to tune execution plans that are being used in your SQL Server
    environment.

    *   `Query Store`: The Query Store for the selected database(s) that the tuning
    session is connected to. This option was introduced in SQL Server 2016 and similar
    to the plan cache provides an excellent mechanism for tuning a real-world workload
    with minimal effort.


    Each of the workloads can be used to provide recommendations. Through each of
    these workload sources, there is an opportunity to tune pretty much any type of
    workload that is needed. For the purposes of this exercise, select the plan cache
    option.


    The next step is to select the database and tables to tune. With large databases,
    it will be critical to select only the tables that are part of the workload and
    for which index recommendations are needed. When the DTA executes, it will generate
    statistics based on information in the table, and the fewer tables that need to
    be considered, the faster the tuning session can complete. Check the box in the
    “Select databases and tables to tune” section next to the `AdventureWorks2017`
    database before continuing.


    # Caution


    Do not use the DTA in your production SQL Server environment. The tool uses brute-force
    tactics to identify index recommendations and create hypothetical indexes to support
    this effort. Running the tool in production can adversely affect the performance
    of other workloads on the server. Consider running the DTA from a command line
    and on a remote SQL Server for analyzing production databases. This technique
    will be demonstrated later in this chapter and discussed further in Chapter [15](#338675_3_En_15_Chapter.xhtml).


    With the General options configured, the next step is to configure the Tuning
    Options settings. On the screen shown in Figure [10-5](#338675_3_En_10_Chapter.xhtml#Fig5),
    deselect the “Limit tuning time” option. For the other options, leave them as
    the default selections. These should be as follows:


    *   `Physical design structures (PDS) to use in database`: Indexes

    *   `Partitioning strategy to employ`: No partitioning

    *   `Physical design structures (PDS) to keep in database`: Keep all existing
    PDS


    The next step is to start the Database Engine Tuning Advisor. This can be accomplished
    through the toolbar or the menu, by selecting Actions ➤ Start Analysis. After
    starting the DTA, the Progress tab will open, as shown in Figure [10-6](#338675_3_En_10_Chapter.xhtml#Fig6).


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig6_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig6_HTML.jpg)

    *Figure 10-6. Progress screen from the Database Engine Tuning Advisor*


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig5_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig5_HTML.jpg)

    *Figure 10-5. Tuning Options configuration screen from Database Engine Tuning
    Advisor*


    After a few minutes, the tuning session will complete, though this will depend
    entirely on your computer’s workload. With the indexes from Listing [10-1](#338675_3_En_10_Chapter.xhtml#PC1),
    the results should be similar to those in Figure [10-7](#338675_3_En_10_Chapter.xhtml#Fig7).
    In these results, there are two recommendations. While the names will vary in
    your environment, the recommendations should be as follows:


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig7_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig7_HTML.jpg)

    *Figure 10-7. Recommendations from the Database Engine Tuning Advisor*


    *   Index on `OrderDate` and then `DueDate` including `CustomerID`

    *   `Statistics on OrderDate` and then `DueDate`


    This index is similar to the suggestion previously found with the missing index
    DMOs. In situations where there are multiple recommendations provided, you will
    need to go through the same considerations that were part of reviewing the suggestions
    from the missing index DMOs, such as “Can the recommendations be consolidated?”
    Additionally, when statistics are recommended, do they match an index that will
    be created enough that the index can provide the statistics required for queries?
    To remove any item from the list of recommendations, simply deselect the check
    box, and it will not be included in any of the recommendation outputs.


    At this point, there are a few options that can be used to apply the indexes:


    *   `Apply the indexes`: To apply the indexes, select Actions in the menu bar
    and select Apply Recommendations. In the Apply Recommendations window that comes
    up, leave the default, Apply Now, selected and click OK.

    *   `Apply the indexes in the future`: To apply the indexes in the future, select
    Actions in the menu bar and select Apply Recommendations. In the Apply Recommendations
    window that comes up, select “Schedule for later.” Alter the scheduled date as
    desired and click OK. This will create the SQL Agent job. Ensure the SQL Agent
    is running and the agent service account has the required permissions to apply
    the indexes.'
  raw: '### Using the DTA GUI


    As mentioned earlier in the chapter, one of the ways to interact with the DTA
    is through the GUI. In this section, you’ll look at a scenario demonstrating how
    to use the DTA for index tuning. There are a few methods for launching the tool.
    The first option is within SQL Server Management Studio (SSMS). Within SSMS, you
    can choose Tools ➤ Database Engine Tuning Advisor from the menu bar. The other
    option is to open the Database Engine Tuning Advisor 18 from Microsoft SQL Server
    Tools 18 on the Start menu.


    After launching the DTA, you will be prompted to connect to a SQL Server instance.
    Once connected, the tool will open a new tuning session for configuration. Figure
    [10-4](#338675_3_En_10_Chapter.xhtml#Fig4) shows a DTA session.


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig4_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig4_HTML.jpg)


    Figure 10-4


    General configuration screen from the Database Engine Tuning Advisor


    In the session launch screen on the General options tab, there are a few things
    to configure initially. To start, there is the session name. The session name
    can be any value you desire. The default value includes your username with the
    date and time. Next, select the type of workload that will be used. There are
    four options for the workload :


    *   ***File***: A file containing SQL Trace output, an XML configuration, or SQL
    scripts.


    *   ***Table***: SQL Server database table containing SQL Trace output. Before
    using the table, be sure the trace populating it has been completed.


    *   ***Plan cache***: The plan cache of the SQL Server that the tuning session
    is connected to. This capability was introduced in SQL Server 2012 and provides
    a powerful mechanism to tune execution plans that are being used in your SQL Server
    environment.


    *   ***Query Store***: The Query Store for the selected database(s) that the tuning
    session is connected to. This option was introduced in SQL Server 2016 and similar
    to the plan cache provides an excellent mechanism for tuning a real-world workload
    with minimal effort.


    Each of the workloads can be used to provide recommendations. Through each of
    these workload sources, there is an opportunity to tune pretty much any type of
    workload that is needed. For the purposes of this exercise, select the plan cache
    option.


    The next step is to select the database and tables to tune. With large databases,
    it will be critical to select only the tables that are part of the workload and
    for which index recommendations are needed. When the DTA executes, it will generate
    statistics based on information in the table, and the fewer tables that need to
    be considered, the faster the tuning session can complete. Check the box in the
    “Select databases and tables to tune” section next to the `AdventureWorks2017`
    database before continuing.


    ### Caution


    Do not use the DTA in your production SQL Server environment. The tool uses brute-force
    tactics to identify index recommendations and create hypothetical indexes to support
    this effort. Running the tool in production can adversely affect the performance
    of other workloads on the server. Consider running the DTA from a command line
    and on a remote SQL Server for analyzing production databases. This technique
    will be demonstrated later in this chapter and discussed further in Chapter [15](#338675_3_En_15_Chapter.xhtml).


    With the General options configured, the next step is to configure the Tuning
    Options settings. On the screen shown in Figure [10-5](#338675_3_En_10_Chapter.xhtml#Fig5),
    deselect the “Limit tuning time” option. For the other options, leave them as
    the default selections . These should be as follows:


    *   ***Physical design structures (PDS) to use in database*****:** Indexes


    *   ***Partitioning strategy to employ*****:** No partitioning


    *   ***Physical design structures (PDS) to keep in database*****:** Keep all existing
    PDS


    The next step is to start the Database Engine Tuning Advisor. This can be accomplished
    through the toolbar or the menu, by selecting Actions ➤ Start Analysis. After
    starting the DTA, the Progress tab will open, as shown in Figure [10-6](#338675_3_En_10_Chapter.xhtml#Fig6).


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig6_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Progress screen from the Database Engine Tuning Advisor


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig5_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Tuning Options configuration screen from Database Engine Tuning Advisor


    After a few minutes, the tuning session will complete, though this will depend
    entirely on your computer’s workload. With the indexes from Listing [10-1](#338675_3_En_10_Chapter.xhtml#PC1),
    the results should be similar to those in Figure [10-7](#338675_3_En_10_Chapter.xhtml#Fig7).
    In these results, there are two recommendations. While the names will vary in
    your environment, the recommendations should be as follows:


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig7_HTML.jpg](images/338675_3_En_10_Chapter/338675_3_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Recommendations from the Database Engine Tuning Advisor


    *   Index on `OrderDate` and then `DueDate` including `CustomerID`


    *   `Statistics on OrderDate` and then `DueDate`


    This index is similar to the suggestion previously found with the missing index
    DMOs. In situations where there are multiple recommendations provided, you will
    need to go through the same considerations that were part of reviewing the suggestions
    from the missing index DMOs, such as “Can the recommendations be consolidated?”
    Additionally, when statistics are recommended, do they match an index that will
    be created enough that the index can provide the statistics required for queries?
    To remove any item from the list of recommendations, simply deselect the check
    box, and it will not be included in any of the recommendation outputs.


    At this point, there are a few options that can be used to apply the indexes :


    *   ***Apply the indexes***: To apply the indexes, select Actions in the menu
    bar and select Apply Recommendations. In the Apply Recommendations window that
    comes up, leave the default, Apply Now, selected and click OK.


    *   ***Apply the indexes in the future***: To apply the indexes in the future,
    select Actions in the menu bar and select Apply Recommendations. In the Apply
    Recommendations window that comes up, select “Schedule for later.” Alter the scheduled
    date as desired and click OK. This will create the SQL Agent job. Ensure the SQL
    Agent is running and the agent service account has the required permissions to
    apply the indexes.'
  trans: '

    # 使用 DTA GUI


    正如本章前面提到的，与 DTA 交互的方式之一是通过 GUI。在本节中，您将通过一个场景了解如何使用 DTA 进行索引调优。有几种启动该工具的方法。第一种选择是在
    SQL Server Management Studio (SSMS) 中。在 SSMS 中，您可以从菜单栏选择 **工具** ➤ **数据库引擎调优顾问**。另一种选择是在
    **开始** 菜单中打开 **Microsoft SQL Server Tools 18** 下的 **Database Engine Tuning Advisor
    18**。


    启动 DTA 后，系统会提示您连接到 SQL Server 实例。连接后，该工具将打开一个新的调优会话进行配置。图 10-4 展示了一个 DTA 会话。


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig4_HTML.jpg](img/338675_3_En_10_Fig4_HTML.jpg)

    *图 10-4. 数据库引擎调优顾问的常规配置屏幕*


    在会话启动屏幕的“常规选项”选项卡上，有几项内容需要初始配置。首先是**会话名称**。会话名称可以是您希望的任何值。默认值包含您的用户名以及日期和时间。接下来，选择将使用的**工作负载类型**。工作负载有四个选项：


    *   `文件`：包含 SQL 跟踪输出、XML 配置或 SQL 脚本的文件。

    *   `表`：包含 SQL 跟踪输出的 SQL Server 数据库表。在使用该表之前，请确保填充它的跟踪已完成。

    *   `计划缓存`：调优会话所连接到的 SQL Server 的计划缓存。此功能在 SQL Server 2012 中引入，提供了一个强大的机制来调优您
    SQL Server 环境中正在使用的执行计划。

    *   `查询存储`：调优会话所连接到的所选数据库的查询存储。此选项在 SQL Server 2016 中引入，与计划缓存类似，提供了一个出色的机制，以最少的精力调优实际工作负载。


    每种工作负载都可以用于提供建议。通过这些工作负载来源中的任何一个，都有机会调优几乎任何需要的工作负载类型。出于本练习的目的，请选择“计划缓存”选项。


    下一步是选择要调优的数据库和表。对于大型数据库，只选择属于工作负载且需要索引建议的表至关重要。当 DTA 执行时，它将基于表中的信息生成统计信息，需要考虑的表越少，调优会话就能越快完成。在继续之前，勾选“选择要调优的数据库和表”部分中
    `AdventureWorks2017` 数据库旁边的复选框。


    # 注意


    请不要在您的生产 SQL Server 环境中使用 DTA。该工具使用**穷举策略**来识别索引建议并创建**假设索引**来支持此工作。在生产环境中运行该工具可能会对服务器上的其他工作负载性能产生不利影响。考虑从命令行运行
    DTA 并在远程 SQL Server 上分析生产数据库。本章稍后将演示此技术，并在第 15 章中进一步讨论。


    配置好常规选项后，下一步是配置“调优选项”设置。在图 10-5 所示的屏幕上，取消选中“限制调优时间”选项。对于其他选项，保留其默认选择。这些选项应如下所示：


    *   `要在数据库中使用的物理设计结构 (PDS)`：索引

    *   `要采用的分区策略`：不分区

    *   `要在数据库中保留的物理设计结构 (PDS)`：保留所有现有 PDS


    下一步是启动数据库引擎调优顾问。这可以通过工具栏或菜单完成，方法是选择 **操作** ➤ **开始分析**。启动 DTA 后，“进度”选项卡将打开，如图 10-6
    所示。


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig6_HTML.jpg](img/338675_3_En_10_Fig6_HTML.jpg)

    *图 10-6. 数据库引擎调优顾问的进度屏幕*


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig5_HTML.jpg](img/338675_3_En_10_Fig5_HTML.jpg)

    *图 10-5. 数据库引擎调优顾问的调优选项配置屏幕*


    几分钟后，调优会话将完成，但这完全取决于您计算机的工作负载。使用清单 10-1 中的索引，结果应与图 10-7 中的类似。在这些结果中，有两项建议。虽然在您环境中的名称会有所不同，但建议应如下：


    ![../images/338675_3_En_10_Chapter/338675_3_En_10_Fig7_HTML.jpg](img/338675_3_En_10_Fig7_HTML.jpg)

    *图 10-7. 来自数据库引擎调优顾问的建议*


    *   在 `OrderDate` 和 `DueDate` 上包含 `CustomerID` 的索引

    *   在 `OrderDate` 和 `DueDate` 上的统计信息


    该索引类似于之前使用缺失索引 DMO 找到的建议。当提供多个建议时，您将需要经历与审查缺失索引 DMO 的建议相同的考虑因素，例如“这些建议可以合并吗？”。此外，当建议创建统计信息时，它们是否与将创建的索引足够匹配，以便该索引能提供查询所需的统计信息？要从建议列表中删除任何项目，只需取消选中其复选框，它就不会包含在任何建议输出中。


    此时，有几个选项可用于应用索引：


    *   `应用索引`：要应用索引，请在菜单栏中选择 **操作**，然后选择 **应用建议**。在弹出的“应用建议”窗口中，保留默认的“立即应用”选项，然后单击
    **确定**。

    *   `将来应用索引`：要在将来应用索引，请在菜单栏中选择 **操作**，然后选择 **应用建议**。在弹出的“应用建议”窗口中，选择“计划稍后应用”。根据需要修改计划的日期，然后单击
    **确定**。这将创建 SQL Agent 作业。请确保 SQL Agent 正在运行，并且代理服务帐户具有应用索引所需的权限。

    '
- fmt: '### 保存建议


    要保存建议，请单击菜单栏中的“保存建议”图标，然后按下组合键 `Ctrl+S`；或者，在菜单栏中选择“操作” ➤ “保存建议”。


    如果建议被保存，它们将创建一个类似于清单 [10-5](#338675_3_En_10_Chapter.xhtml#PC5) 中的脚本。在应用来自 DTA
    的索引之前，建议将索引的名称更改为符合您组织索引命名标准的名称。您还需要考虑是否对索引应用压缩；通常，建议这样做。至于统计信息，则不那么重要，原因有二。首先，`SQL
    Server` 会在后台根据需要创建统计信息，无需您自行构建。其次，索引包含统计信息，通常能提供所需的内容。


    ```

    use [AdventureWorks2017]

    go

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderHeader_8_1922105888__K4_K3_11]
    ON [Sales].[SalesOrderHeader]

    (

    [DueDate] ASC,

    [OrderDate] ASC

    )

    INCLUDE([CustomerID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    go

    Listing 10-5

    Database Engine Tuning Advisor Index Recommendations

    ```


    通过其 `GUI` 使用 `DTA`，您可以快速处理工作负荷。返回的建议提供了比使用缺失索引 `DMO` 更高一级的索引调优。本质上，它们提供了一种强力索引操作来提升性能，而无需改进代码。与其花费数小时进行调优，而这些调优可以通过添加几个新索引来解决，不如将您的时间集中在超出仅仅添加索引范畴的性能调优问题上。


    ### 注意


    当 `DTA` 在处理过程中被终止时，有时会留下假设索引，这些索引是它在调查可能改善环境的索引时使用的。假设索引是一种只包含统计信息而不包含数据的索引。可以通过
    `sys.indexes` 中的 `is_hypothetical` 列来识别这些索引。如果它们存在于您的环境中，则应始终将其删除。


    ### 使用 DTA 实用工具


    `GUI` 并不是在 `SQL Server` 环境中使用 `DTA` 的唯一方法。另一种方法是通过命令行使用 `DTA` 实用工具。`DTA` 实用工具虽然缺乏交互式界面，但其灵活性足以在脚本和自动化中运用
    `DTA` 实用工具。


    使用 `DTA` 实用工具的语法（如清单 [10-6](#338675_3_En_10_Chapter.xhtml#PC6) 所示）包含多个参数。这些参数（在表
    [10-5](#338675_3_En_10_Chapter.xhtml#Tab5) 中定义）使得 `DTA` 实用工具具备与 `GUI` 相同的功能和灵活性。配置信息通过参数传递，而无需点击多个屏幕。


    表 10-5

    DTA 实用工具参数'
  raw: '*   ***Save recommendations***: To save recommendations, click the Save Recommendations
    icon in the menu bar and press the key combination Ctrl+S; or, select Actions
    ➤ Save Recommendations in the menu bar.


    If the recommendations are saved, they will create a script like the one in Listing
    [10-5](#338675_3_En_10_Chapter.xhtml#PC5). Before applying indexes from the DTA,
    it is recommended that the names of indexes be changed to match your organization’s
    index naming standards. You will want to also consider whether to apply compression
    to the index; generally, it is recommended to do so. And when it comes to statistics,
    it’s not as important to add these for a couple reasons. First, SQL Server will
    create statistics as needed behind the scenes, removing the need for you to build
    your own statistics. Second, indexes include statistics and usually provide what
    is required.


    ```

    use [AdventureWorks2017]

    go

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderHeader_8_1922105888__K4_K3_11]
    ON [Sales].[SalesOrderHeader]

    (

    [DueDate] ASC,

    [OrderDate] ASC

    )

    INCLUDE([CustomerID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    go

    Listing 10-5

    Database Engine Tuning Advisor Index Recommendations

    ```


    By using the DTA through its GUI, you are able to make quick work of a workload.
    The recommendations returned provide a level of index tuning above using the missing
    index DMOs. In essence, they provide a brute-force indexing exercise to improve
    performance without improving code. Instead of spending many hours on tuning that
    can be resolved with a few new indexes, you can focus your time on performance
    tuning issues that are beyond just adding an index.


    ### Note


    When the DTA is terminated while processing, it will sometimes leave behind hypothetical
    indexes that were used while it was investigating possible indexes that could
    improve an environment. A hypothetical index is an index that contains only statistics
    and no data. These indexes can be identified through the `is_hypothetical` column
    in `sys.indexes`. If they exist in your environment, they should always be dropped.


    ### Using the DTA Utility


    The GUI isn’t the only way to use the DTA within your SQL Server environment.
    The other method is through the command line with the DTA utility. What DTA utility
    lacks in an interactive interface, it makes up for with the flexibility to leverage
    the DTA utility in scripts and automation.


    The syntax for using the DTA utility, shown in Listing [10-6](#338675_3_En_10_Chapter.xhtml#PC6),
    includes a number of arguments. These arguments, defined in Table [10-5](#338675_3_En_10_Chapter.xhtml#Tab5),
    allow the DTA utility to contain the same features and flexibility of the GUI.
    Instead of clicking through a number of screens, the configuration information
    is passed in through the arguments.


    Table 10-5


    DTA Utility Arguments'
