- fmt: '### LOB Access


    `sys.dm_db_index_operational_stats` 中的下一组列与大型对象（LOBs）相关。它们提供了关于获取的页数以及这些页大小的信息。此外，还有一些列用于衡量被推离行和拉入行的
    LOB 数据量。表 [3-19](#338675_3_En_3_Chapter.xhtml#Tab19) 列出了此组中的所有这些列及其他列。


    表 3-19


    `sys.dm_db_index_operational_stats` 中的 LOB 访问列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `lob_fetch_in_pages` | `bigint` | 从 `LOB_DATA` 分配单元中检索的 LOB 页的累计计数。这些页包含存储在类型为
    `text`, `ntext`, `image`, `varchar(max)`, `nvarchar(max)`, `varbinary(max)`, 和
    `xml` 的列中的数据。 |

    | `lob_fetch_in_bytes` | `bigint` | 检索的 LOB 数据字节的累计计数。 |

    | `lob_orphan_create_count` | `bigint` | 为批量操作创建的孤立 LOB 值的累计计数。 |

    | `lob_orphan_insert_count` | `bigint` | 在批量操作期间插入的孤立 LOB 值的累计计数。 |

    | `row_overflow_fetch_in_pages` | `bigint` | 从 `ROW_OVERFLOW_DATA` 分配单元中检索的行溢出数据页的累计计数。
    |

    | `row_overflow_fetch_in_bytes` | `bigint` | 检索的行溢出数据字节的累计计数。 |

    | `column_value_push_off_row_count` | `bigint` | 为使插入或更新的行适应页面而被推离行的 LOB 数据和行溢出数据的列值的累计计数。
    |

    | `column_value_pull_in_row_count` | `bigint` | 被拉入行的 LOB 数据和行溢出数据的列值的累计计数。这发生在更新操作释放记录中的空间，并提供机会将一个或多个来自
    `LOB_DATA` 或 `ROW_OVERFLOW_DATA` 分配单元的离行值拉回到 `IN_ROW_DATA` 分配单元时。 |


    LOB 访问列可用于确定大型对象活动的量级，以及数据何时可能从大型对象存储移动到行内溢出存储。当您遇到与检索或更新 LOB 数据相关的性能问题时，这一点很重要。例如，`lob_fetch_in_bytes`
    列衡量了 SQL Server 为索引检索的 LOB 列的字节数。


    为了演示一些 LOB 活动，运行清单 [3-44](#338675_3_En_3_Chapter.xhtml#PC44) 中的脚本。此脚本并未涵盖所有可能的活动，但涵盖了基础部分。脚本开始时创建了表
    `dbo.LOBAccess`，其中包含使用大型对象数据类型的列 `LOBValue`。针对该表的第一个操作插入了十行足够窄的数据，使得 `LOBValue`
    值可以与行一起存储在数据页上。第二个操作增加了 `LOBValue` 列的大小，迫使其扩展到数据行 8 KB 的最大限制之外。最后一个操作从表中检索所有行。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.LOBAccess'') IS NOT NULL

    DROP TABLE dbo.LOBAccess;

    CREATE TABLE dbo.LOBAccess

    (

    ID INT IDENTITY(1,1) PRIMARY KEY CLUSTERED

    ,LOBValue VARCHAR(MAX)

    ,FillerData CHAR(2000) DEFAULT(REPLICATE(''X'',2000))

    ,FillerDate DATETIME DEFAULT(GETDATE())

    );

    INSERT INTO dbo.LOBAccess (LOBValue)

    SELECT TOP 10 ''Short Value''

    FROM Production.ProductPhoto;

    UPDATE dbo.LOBAccess

    SET LOBValue = REPLICATE(''Long Value'',8000);

    SELECT * FROM dbo.LOBAccess;

    ```

    清单 3-44

    用于创建包含 LOB 数据的表的 T-SQL 脚本


    使用表 [3-20](#338675_3_En_3_Chapter.xhtml#Tab20) 中列出的 LOB 访问列，您可以观察清单 [3-45](#338675_3_En_3_Chapter.xhtml#PC45)
    中的脚本底层发生的情况。如图 [3-30](#338675_3_En_3_Chapter.xhtml#Fig30) 中的输出所示，`column_value_push_off_row_count`
    列跟踪了索引上的十次行操作，其中行将行内数据移动到大型对象存储中。此操作与增加行长度的 `UPDATE` 语句同时发生。累计的另外两个统计信息，`lob_fetch_in_pages`
    和 `lob_fetch_in_bytes`，详细说明了在 `SELECT` 语句期间检索的页数和数据大小。正如这些统计信息所示，LOB 访问统计信息提供了
    LOB 活动的精细跟踪。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig30_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig30_HTML.jpg)


    图 3-30


    LOB 访问的查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,lob_fetch_in_pages

    ,lob_fetch_in_bytes

    ,lob_orphan_create_count

    ,lob_orphan_insert_count

    ,row_overflow_fetch_in_pages

    ,row_overflow_fetch_in_bytes

    ,column_value_push_off_row_count

    ,column_value_pull_in_row_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.LOBAccess''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```

    清单 3-45

    用于查询 `sys.dm_db_index_operational_stats` 中 LOB 访问的脚本


    ### Row Version


    `sys.dm_db_index_operational_stats` 中的最后一组列报告了由于快照隔离列而在索引内产生的版本计数。这些列是 SQL Server
    2019 新增的。虽然本书不会演示它们在快照隔离级别中的使用，但为了完整性，它们仍包含在本章中。


    表 3-20


    `sys.dm_db_index_operational_stats` 中的行版本列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `version_generated_inrow` | `bigint` | 快照隔离事务保留的行内版本记录数。 |

    | `version_generated_offrow` | `bigint` | 快照隔离事务保留的离行版本记录数。 |

    | `ghost_version_inrow` | `bigint` | 快照隔离事务保留的行内幻影版本记录数。 |

    | `ghost_version_offrow` | `bigint` | 快照隔离事务保留的离行幻影版本记录数。 |

    | `insert_over_ghost_version_inrow` | `bigint` | 快照隔离事务保留的在幻影版本记录之上执行的行内插入操作数。
    |

    | `insert_over_ghost_version_offrow` | `bigint` | 快照隔离事务保留的在幻影版本记录之上执行的离行插入操作数。
    |


    ### Index Operational Stats Summary


    本节讨论了 DMO `sys.dm_db_index_operational_stats` 中可用的统计信息。虽然它不是一个被广泛使用的 DMO，但它确实提供了大量关于索引的低级细节，可用于深入探究索引的行为方式。从关于
    DML 和 `SELECT` 活动的列，到锁争用，再到压缩，此 DMO 中的列提供了丰富的信息。


    ## Index Physical Statistics


    SQL Server 收集的最后一个领域的统计信息是索引物理统计。这些统计信息报告索引的当前结构信息，以及插入、更新和删除操作对索引产生的物理影响。这些统计信息收集在
    DMO `sys.dm_db_index_physical_stats` 中。


    与 `sys.dm_db_index_operational_stats` 一样，`sys.dm_db_index_physical_stats` 是一个动态管理函数（DMF）。要使用此
    DMF，在使用时需要提供一些参数。清单 [3-46](#338675_3_En_3_Chapter.xhtml#PC46) 详细说明了此 DMF 的参数。


    ```sql

    sys.dm_db_index_physical_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | NULL | 0 | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    , { mode | NULL | DEFAULT }

    )

    ```

    清单 3-46

    `sys.dm_db_index_physical_stats` 的参数


    `sys.dm_db_index_physical_stats` 的 `mode` 参数接受以下五个值之一：`DEFAULT`, `NULL`, `LIMITED`,
    `SAMPLED`, 或 `DETAILED`。`DEFAULT`, `NULL`, 和 `LIMITED` 实际上是相同的值，将一并描述。表 [3-21](#338675_3_En_3_Chapter.xhtml#Tab21)
    列出了这些参数。'
  raw: '### LOB Access


    The next group of columns in `sys.dm_db_index_operational_stats` pertains to large
    objects (LOBs). They provide information on the number of pages fetched and the
    size of those pages. Also, there are columns that measure the amount of LOB data
    that is pushed off and pulled into rows. Table [3-19](#338675_3_En_3_Chapter.xhtml#Tab19)
    lists all these columns and others in this group.


    Table 3-19


    LOB Access Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `lob_fetch_in_pages` | `bigint` | Cumulative count of LOB pages retrieved from
    the `LOB_DATA` allocation unit. These pages contain data that is stored in columns
    of type `text`, `ntext`, `image`, `varchar(max)`, `nvarchar(max)`, `varbinary(max)`,
    and `xml`. |

    | `lob_fetch_in_bytes` | `bigint` | Cumulative count of LOB data bytes retrieved.
    |

    | `lob_orphan_create_count` | `bigint` | Cumulative count of orphan LOB values
    created for bulk operations. |

    | `lob_orphan_insert_count` | `bigint` | Cumulative count of orphan LOB values
    inserted during bulk operations. |

    | `row_overflow_fetch_in_pages` | `bigint` | Cumulative count of row-overflow
    data pages retrieved from the `ROW_OVERFLOW_DATA` allocation unit. |

    | `row_overflow_fetch_in_bytes` | `bigint` | Cumulative count of row-overflow
    data bytes retrieved. |

    | `column_value_push_off_row_count` | `bigint` | Cumulative count of column values
    for LOB data and row-overflow data that is pushed off-row to make an inserted
    or updated row fit within a page. |

    | `column_value_pull_in_row_count` | `bigint` | Cumulative count of column values
    for LOB data and row-overflow data that is pulled in-row. This occurs when an
    update operation frees up space in a record and provides an opportunity to pull
    in one or more off-row values from the `LOB_DATA` or `ROW_OVERFLOW_DATA` allocation
    unit to the `IN_ROW_DATA` allocation unit. |


    The LOB access columns can be useful in determining the volume of large object
    activity and when data may be moving from large object to in-row-overflow storage.
    This is important when you are seeing performance issues related to retrieving
    or updating LOB data. For instance, the column `lob_fetch_in_bytes` measures the
    bytes from LOB columns retrieved by SQL Server for the index.


    To demonstrate some LOB activity, run the script in Listing [3-44](#338675_3_En_3_Chapter.xhtml#PC44).
    This script doesn’t represent all the possible activity, but it does cover the
    basics. At the start of the script, the table `dbo.LOBAccess` is created with
    the column `LOBValue`, which uses a large object data type. The first operation
    against the table inserts ten rows that are narrow enough that the `LOBValue`
    values can be stored on the data page with the rows. The second operation increases
    the size of the `LOBValue` column forcing it to expand outside the 8 KB max for
    a data row. The final operation retrieves all the rows from the table.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.LOBAccess'') IS NOT NULL

    DROP TABLE dbo.LOBAccess;

    CREATE TABLE dbo.LOBAccess

    (

    ID INT IDENTITY(1,1) PRIMARY KEY CLUSTERED

    ,LOBValue VARCHAR(MAX)

    ,FillerData CHAR(2000) DEFAULT(REPLICATE(''X'',2000))

    ,FillerDate DATETIME DEFAULT(GETDATE())

    );

    INSERT INTO dbo.LOBAccess (LOBValue)

    SELECT TOP 10 ''Short Value''

    FROM Production.ProductPhoto;

    UPDATE dbo.LOBAccess

    SET LOBValue = REPLICATE(''Long Value'',8000);

    SELECT * FROM dbo.LOBAccess;

    Listing 3-44

    T-SQL Script to create table with LOB data

    ```


    Using the LOB access columns listed in Table [3-20](#338675_3_En_3_Chapter.xhtml#Tab20),
    you can observe what happens under the covers with the script in Listing [3-45](#338675_3_En_3_Chapter.xhtml#PC45).
    As the output in Figure [3-30](#338675_3_En_3_Chapter.xhtml#Fig30) shows, the
    column `column_value_push_off_row_count` tracked ten row operations on the index
    where the row moved in-row data off into large object storage. The operation coincided
    with the update that increased the length of the rows. The other two statistics
    that were accumulated, `lob_fetch_in_pages` and `lob_fetch_in_bytes`, detail the
    number of pages and the size of the data retrieved during the `SELECT` statement.
    As these statistics show, the LOB access statistics provide granular tracking
    of LOB activity.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig30_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig30_HTML.jpg)


    Figure 3-30


    Query results for LOB access


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,lob_fetch_in_pages

    ,lob_fetch_in_bytes

    ,lob_orphan_create_count

    ,lob_orphan_insert_count

    ,row_overflow_fetch_in_pages

    ,row_overflow_fetch_in_bytes

    ,column_value_push_off_row_count

    ,column_value_pull_in_row_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.LOBAccess''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    Listing 3-45

    Query for LOB access in sys.dm_db_index_operational_stats

    ```


    ### Row Version


    The last group of columns in `sys.dm_db_index_operational_stats` report on version
    counts within indexes due to snapshot isolation columns. These columns are new
    to SQL Server 2019\. While this book won’t demonstrate their use within snapshot
    isolation levels, they are included in the chapter for completeness.


    Table 3-20


    Row Version Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `version_generated_inrow` | `bigint` | Number of in-row version records retained
    by snapshot isolation transaction. |

    | `version_generated_offrow` | `bigint` | Number of off-row version records retained
    by snapshot isolation transaction. |

    | `ghost_version_inrow` | `bigint` | Number of in-row ghost version records retained
    by snapshot isolation transaction. |

    | `ghost_version_offrow` | `bigint` | Number of off-row ghost version records
    retained by snapshot isolation transaction. |

    | `insert_over_ghost_version_inrow` | `bigint` | Number of in-row inserts over
    ghost version records retained by snapshot isolation transaction. |

    | `insert_over_ghost_version_offrow` | `bigint` | Number of off-row inserts over
    ghost version records retained by snapshot isolation transaction. |


    ### Index Operational Stats Summary


    This section discussed the statistics available in the DMO `sys.dm_db_index_operational_stats`.
    While it isn’t a DMO that is widely used, it does provide a lot of low-level detail
    regarding indexes that can be leveraged to dig deep into how indexes are behaving.
    From the columns on DML and `SELECT` activity to locking contention to compression,
    the columns in this DMO provide a wealth of information.


    ## Index Physical Statistics


    The last area of statistics that SQL Server collects is the index physical stats.
    These statistics report information about the current structure of the index along
    with the physical effect of insert, update, and delete operations on indexes.
    These statistics are collected in the DMO `sys.dm_db_index_physical_stats`.


    Just like `sys.dm_db_index_operational_stats`, `sys.dm_db_index_physical_stats`
    is a dynamic management function. To use the DMF, a number of parameters need
    to be supplied when it is used. Listing [3-46](#338675_3_En_3_Chapter.xhtml#PC46)
    details the parameters for the DMF.


    ```

    sys.dm_db_index_physical_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | NULL | 0 | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    , { mode | NULL | DEFAULT }

    )

    Listing 3-46

    Parameters for sys.dm_db_index_physical_stats

    ```


    The mode parameter for `sys.dm_db_index_physical_stats` accepts one of five values:
    `DEFAULT`, `NULL`, `LIMITED`, `SAMPLED`, or `DETAILED`. `DEFAULT`, `NULL`, and
    `LIMITED` are in effect the same value and will be described together. Table [3-21](#338675_3_En_3_Chapter.xhtml#Tab21)
    lists the parameters.'
  trans: '

    ### LOB 访问


    `sys.dm_db_index_operational_stats` 中的下一组列与大型对象（LOBs）相关。它们提供了关于获取的页数以及这些页大小的信息。此外，还有一些列用于衡量被推离行和拉入行的
    LOB 数据量。表 3-19 列出了此组中的所有这些列及其他列。


    表 3-19


    `sys.dm_db_index_operational_stats` 中的 LOB 访问列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `lob_fetch_in_pages` | `bigint` | 从 `LOB_DATA` 分配单元中检索的 LOB 页的累计计数。这些页包含存储在类型为
    `text`, `ntext`, `image`, `varchar(max)`, `nvarchar(max)`, `varbinary(max)`, 和
    `xml` 的列中的数据。 |

    | `lob_fetch_in_bytes` | `bigint` | 检索的 LOB 数据字节的累计计数。 |

    | `lob_orphan_create_count` | `bigint` | 为批量操作创建的孤立 LOB 值的累计计数。 |

    | `lob_orphan_insert_count` | `bigint` | 在批量操作期间插入的孤立 LOB 值的累计计数。 |

    | `row_overflow_fetch_in_pages` | `bigint` | 从 `ROW_OVERFLOW_DATA` 分配单元中检索的行溢出数据页的累计计数。
    |

    | `row_overflow_fetch_in_bytes` | `bigint` | 检索的行溢出数据字节的累计计数。 |

    | `column_value_push_off_row_count` | `bigint` | 为使插入或更新的行适应页面而被推离行的 LOB 数据和行溢出数据的列值的累计计数。
    |

    | `column_value_pull_in_row_count` | `bigint` | 被拉入行的 LOB 数据和行溢出数据的列值的累计计数。这发生在更新操作释放记录中的空间，并提供机会将一个或多个来自
    `LOB_DATA` 或 `ROW_OVERFLOW_DATA` 分配单元的离行值拉回到 `IN_ROW_DATA` 分配单元时。 |


    LOB 访问列可用于确定大型对象活动的量级，以及数据何时可能从大型对象存储移动到行内溢出存储。当您遇到与检索或更新 LOB 数据相关的性能问题时，这一点很重要。例如，`lob_fetch_in_bytes`
    列衡量了 SQL Server 为索引检索的 LOB 列的字节数。


    为了演示一些 LOB 活动，运行清单 3-44 中的脚本。此脚本并未涵盖所有可能的活动，但涵盖了基础部分。脚本开始时创建了表 `dbo.LOBAccess`，其中包含使用大型对象数据类型的列
    `LOBValue`。针对该表的第一个操作插入了十行足够窄的数据，使得 `LOBValue` 值可以与行一起存储在数据页上。第二个操作增加了 `LOBValue`
    列的大小，迫使其扩展到数据行 8 KB 的最大限制之外。最后一个操作从表中检索所有行。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.LOBAccess'') IS NOT NULL

    DROP TABLE dbo.LOBAccess;

    CREATE TABLE dbo.LOBAccess

    (

    ID INT IDENTITY(1,1) PRIMARY KEY CLUSTERED

    ,LOBValue VARCHAR(MAX)

    ,FillerData CHAR(2000) DEFAULT(REPLICATE(''X'',2000))

    ,FillerDate DATETIME DEFAULT(GETDATE())

    );

    INSERT INTO dbo.LOBAccess (LOBValue)

    SELECT TOP 10 ''Short Value''

    FROM Production.ProductPhoto;

    UPDATE dbo.LOBAccess

    SET LOBValue = REPLICATE(''Long Value'',8000);

    SELECT * FROM dbo.LOBAccess;

    ```

    清单 3-44

    用于创建包含 LOB 数据的表的 T-SQL 脚本


    使用表 3-20 中列出的 LOB 访问列，您可以观察清单 3-45 中的脚本底层发生的情况。如图 3-30 中的输出所示，`column_value_push_off_row_count`
    列跟踪了索引上的十次行操作，其中行将行内数据移动到大型对象存储中。此操作与增加行长度的 `UPDATE` 语句同时发生。累计的另外两个统计信息，`lob_fetch_in_pages`
    和 `lob_fetch_in_bytes`，详细说明了在 `SELECT` 语句期间检索的页数和数据大小。正如这些统计信息所示，LOB 访问统计信息提供了
    LOB 活动的精细跟踪。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig30_HTML.jpg](img/338675_3_En_3_Fig30_HTML.jpg)


    图 3-30


    LOB 访问的查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,lob_fetch_in_pages

    ,lob_fetch_in_bytes

    ,lob_orphan_create_count

    ,lob_orphan_insert_count

    ,row_overflow_fetch_in_pages

    ,row_overflow_fetch_in_bytes

    ,column_value_push_off_row_count

    ,column_value_pull_in_row_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.LOBAccess''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```

