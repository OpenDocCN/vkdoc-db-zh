  raw: '#### DBCC IND


    The next command that can be used to investigate indexes and their associated
    pages is `DBCC IND`. This command returns a list of all the pages associated with
    the requested object, which can be scoped to the database, table, or index level,
    also similar to `sys.dm_db_database_page_allocations`. Listing [2-10](#338675_3_En_2_Chapter.xhtml#PC10)
    shows the syntax for using `DBCC IND`. When using the command, there are three
    parameters that can be populated; these are defined in Table [2-7](#338675_3_En_2_Chapter.xhtml#Tab7).


    Table 2-7


    DBCC IND Parameters


    | Parameter | Description |

    | --- | --- |

    | `database_name &#124; database_id` | Specifies either the database name or the
    database ID where the page list will be retrieved. If the value 0 is provided
    for this parameter or the parameter is not set, then the current database will
    be used. |

    | `table_name &#124; table_object_id` | Specifies which table to return in the
    output by providing either the table name or the `object_ID` for the table. If
    no value is provided, the output will include results for all tables. |

    | `index_name &#124; index_id` | Specifies which index to return in the output
    by providing either the index name or the `index_ID`. If -1 or no value is provided,
    the output will include results for all indexes on the table. |


    ```

    DBCC IND ( {''dbname'' | dbid}, {''table_name'' | table_object_id},

    {''index_name'' | index_id | -1})

    Listing 2-10

    DBCC IND Syntax

    ```


    `DBCC IND` returns a dataset when executed. For every page that is allocated to
    the requested objects, one row is returned in the dataset; the columns are defined
    in Table [2-8](#338675_3_En_2_Chapter.xhtml#Tab8). Unlike the previous `DBCC EXTENTINFO`,
    `DBCC IND` does explicitly return the IAM page in the results.


    Table 2-8


    DBCC IND Output Columns


    | Column | Description |

    | --- | --- |

    | `PageFID` | File number where the page is located. |

    | `PagePID` | Page number for the page. |

    | `IAMFID` | File ID where the IAM page is located. |

    | `IAMPID` | Page ID for the page in the data file. |

    | `ObjectID` | Object ID for the associated table. |

    | `IndexID` | Index ID associated with the heap or index. |

    | `PartitionNumber` | Partition number for the heap or index. |

    | `PartitionID` | Partition ID for the heap or index. |

    | `iam_chain_type` | The type of IAM chain the extent is used for. Values can
    be in-row data, LOB data, and overflow data. |

    | `PageType` | Number identifying the page type. These are listed in Table [2-9](#338675_3_En_2_Chapter.xhtml#Tab9).
    |

    | `IndexLevel` | Level at which the page exists in the page organizational structure.
    The levels are organized from 0 to N, where 0 is the lowest level of the index
    and N is the index root. |

    | `NextPageFID` | File number where the next page at the index level is located.
    |

    | `NextPagePID` | Page number for the next page at the index level. |

    | `PrevPageFID` | File number where the previous page at the index level is located.
    |

    | `PrevPagePID` | Page number for the previous page at the index level. |


    Within the results from `DBCC EXTENTINFO` is a `PageType` column. This column
    identifies what type of page is returned through the `DBCC` command. The page
    types can include data, index, GAM, or any other of the page types discussed earlier
    in the chapter. Table [2-9](#338675_3_En_2_Chapter.xhtml#Tab9) shows a full list
    of the page types and the value identifying the page type.


    Table 2-9


    Page Type Mappings


    | Page Type | Description |

    | --- | --- |

    | 1 | Data page. |

    | 2 | Index page. |

    | 3 | Large object page. |

    | 4 | Large object page. |

    | 8 | Global Allocation Map page. |

    | 9 | Share Global Allocation Map page. |

    | 10 | Index Allocation Map page. |

    | 11 | Page Free Space page. |

    | 13 | Boot page. |

    | 15 | File header page. |

    | 16 | Differential Changed Map page. |

    | 17 | Minimally Logged page. |


    The primary benefit of using `DBCC IND` is that it provides a list of all pages
    for a table or index with their locations in the database. You can use this to
    help investigate how indexes are behaving and where pages are ending up. To put
    this information into action, we’ll walk through a couple of scenarios.


    For the first example, you’ll revisit the tables created in the last section and
    examine the output for each of these in comparison to the `DBCC EXTENTINFO` output.
    The code example includes `DBCC IND` commands for `IndexInternalsOne` and `IndexInternalsTwo`,
    shown in Listing [2-11](#338675_3_En_2_Chapter.xhtml#PC11). The database ID passed
    in is 0 for the current database, and the index ID is set to -1 to return pages
    for all indexes.


    ```

    USE Chapter2Internals;

    GO

    DBCC IND (0, ''IndexInternalsOne'',-1);

    Listing 2-11

    DBCC IND Example

    ```


    In the `DBCC EXTENTINFO` example, there were two extent allocations for the table
    `IndexInternalsOne`, shown in Figure [2-17](#338675_3_En_2_Chapter.xhtml#Fig17).
    These results show that there were 13 pages allocated to the table. The `DBCC
    IND` results, shown in Figure [2-18](#338675_3_En_2_Chapter.xhtml#Fig18), detail
    all the pages that were part of two extent allocations.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig18_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig18_HTML.jpg)


    Figure 2-18


    DBCC IND for dbo.IndexInternalsOne


    In these results, there was a single IAM page and twelve data pages allocated
    to the table. Where DBCC EXTENTINFO provided page 312 as the start of the extent
    allocations, containing nine pages, it was not possible to identify where the
    IAM page was based on that. It was instead in another extent that the results
    did not list, and the results for DBCC IND identify it as being on page 235\.
    The benefit of using DBCC IND for listing the pages for an index is that you get
    the exact page numbers without having to make any guesses. Also, note that the
    index level in the results returns as level 0 with no intermediate levels. As
    stated earlier, heap structures are flat, and the pages are in no particular order.


    As mentioned, the tables in the previous example were organized in a heap structure.
    For the next example, you’ll observe what the output from `DBCC IND` is when examining
    a table with a clustered index. In Listing [2-12](#338675_3_En_2_Chapter.xhtml#PC12),
    first the table `dbo.IndexInternalsThree` is created with a clustered index on
    the `RowID` column. Then, you’ll insert four rows. Finally, the example executes
    `DBCC IND` on the table.


    ```

    USE Chapter2Internals

    GO

    CREATE TABLE dbo.IndexInternalsThree

    (

    RowID INT IDENTITY(1,1)

    ,FillerData CHAR(8000)

    ,CONSTRAINT PK_IndexInternalsThree  PRIMARY KEY CLUSTERED (RowID)

    )

    GO

    INSERT INTO dbo.IndexInternalsThree DEFAULT VALUES

    GO 4

    DBCC IND (0, ''IndexInternalsThree'',-1)

    Listing 2-12

    DBCC IND Clustered Index Example

    ```


    Figure [2-19](#338675_3_En_2_Chapter.xhtml#Fig19) shows the results from this
    example involving `dbo.IndexInternalsThree`. Notice the change in how `IndexLevel`
    is being returned as compared to the previous example (Figure [2-18](#338675_3_En_2_Chapter.xhtml#Fig18)).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig19_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig19_HTML.jpg)


    Figure 2-19


    DBCC IND for dbo.IndexInternalsThree


    In this example, the index level for the third row in the results has an `IndexLevel`
    of 1 and also a `PageType` of 2, which is an index page. With these results, there
    is enough information to rebuild the B-tree structure for the index, as shown
    in Figure [2-20](#338675_3_En_2_Chapter.xhtml#Fig20). The B-tree starts with the
    IAM page, which is page number 1:237\. This page is linked to page 1:361, which
    is an index page at index level 1\. Following that, pages 1:360, 1:362, 1:363,
    and 1:364 are at index level 0 and doubly linked to each other.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig20_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig20_HTML.jpg)


    Figure 2-20'
