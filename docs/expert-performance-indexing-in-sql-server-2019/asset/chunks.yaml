    #### CXPACKET


    `CXPACKET` 等待类型发生在由于并行查询执行（也称为并行 (`parallelism`)）而产生等待时。并行查询可能遇到 `CXPACKET` 等待主要有两种场景。第一种情况是，并行查询中的某个运算符由于调度器上已有其他线程在运行而无法执行。第二种情况是，并行线程中的某个运算符的线程执行时间比其他线程长，导致其他线程必须等待该较慢的线程完成。第一种原因是并行等待的更常见原因，但它超出了本书的范围，通常与配置设置和查询调优有关。而第二种原因则可以通过索引来解决。通常情况下，通过解决导致
    `CXPACKET` 等待的第二个原因，也可以减轻第一个并行等待的原因。'
