- fmt: '#### Forwarded Fetch


    `SELECT` activity统计信息的最后一列是 `forwarded_fetch_count`。正如第 [2](#338675_3_En_2_Chapter.xhtml)
    章所讨论的，转发出现在堆中，当记录大小增加且无法再适应当前所在页面时。每当发生一次记录转发操作，`forwarded_fetch_count` 列就会增加一。


    为了演示，清单 [3-27](#338675_3_En_3_Chapter.xhtml#PC27) 中的代码构建了一个带有堆的表并填充了一些值。然后，`UPDATE`
    语句将每三行的大小增加。新行的大小将超过页面上的可用空间，从而导致转发出的记录。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    UPDATE dbo.ForwardedRecords

    SET VALUE = REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    ```


    *清单 3-27 用于转发出记录的 T-SQL 脚本*


    脚本完成后，清单 [3-28](#338675_3_En_3_Chapter.xhtml#PC28) 中的 `sys.dm_db_index_operational_stats`
    脚本可用于查看转发出的记录被提取的次数。在这种情况下，转发出的 222 条记录导致 `forwarded_fetch_count` 为 222，如图 [3-20](#338675_3_En_3_Chapter.xhtml#Fig20)
    所示。当查看性能计数器 Forwarded Records/sec 时，此列非常有用。查看此列将有助于识别哪个堆导致了计数器活动，从而将调查重点放在确切的表上。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig20_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig20_HTML.jpg)


    *图 3-20 forwarded_fetch_count 的查询结果*


    ```sql

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.forwarded_fetch_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''dbo.ForwardedRecords''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.forwarded_fetch_count DESC

    ```


