    ### Index Intersection


    Search Columns 模式的目的是创建一个索引，以最小化查询的页面读取次数并提升其性能。然而，有时查询会超出演示的单个列示例。额外的列可能成为谓词的一部分，或在
    `SELECT` 语句中返回。解决此问题的方法之一是创建包含额外列的非聚集索引。当存在可以满足 `WHERE` 子句中每个谓词的索引时，SQL Server
    可以利用多个非聚集索引，通过聚簇键匹配来查找两个索引之间的行。此操作称为索引交叉。


    为了演示 Index Intersection 模式，让我们首先回顾当过滤扩展到多个列时会发生什么。清单 [11-16](#338675_3_En_11_Chapter.xhtml#PC16)
