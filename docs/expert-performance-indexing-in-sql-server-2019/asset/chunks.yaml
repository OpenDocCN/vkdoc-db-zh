  trans: '

    ## 十六进制行打印选项


    十六进制行打印选项比第一个打印选项更为有用。它包含了页面头部信息，并在此基础上进行了扩展，提供了页面上实际行的详细信息。当你需要查看某一行以确定其在页面上的大小以及它为何可能比预期要大时，这些信息将非常有价值。


    ## 十六进制数据打印选项


    `DBCC PAGE` 的第三个可用打印选项是十六进制数据打印选项，其中 `print_option` 等于 `2`。此打印选项与前一个选项类似，同样以页面头部-仅打印选项的输出开始，并在此基础上进行补充。通过此选项添加的信息包括页面数据部分和偏移量数组的十六进制输出。对于数据部分，页面以其在实际页面上的原始形式完整、未经格式化地输出。当你希望以原始形式查看页面时，这种格式的输出非常有用。


    为了演示十六进制数据打印选项，你将使用清单 2-18 中的脚本。其中使用 `DBCC PAGE` 命令从 `dbo.IndexInternalsFour`
    中检索包含最后一行的页面。该行在 `FillerData` 列中包含 25 个数字 5。


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,2)

    ```


    清单 2-18 使用十六进制数据打印选项的 DBCC PAGE


    结果如图 2-24 所示，输出包含数据部分中的一大块字符。该块包含三个组成部分。最左边是页面地址信息，例如 `0x0000003BCEBF8000`。页面地址标识了信息在页面上的位置。中间部分包含该页面部分中的十六进制数据。字符块的右侧包含十六进制数据的字符表示。在大多数情况下，这些数据是难以辨认的，除非存储的是来自字符数据类型（如
    `char` 和 `nchar`）的字符数据。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig24_HTML.jpg](img/338675_3_En_2_Fig24_HTML.jpg)


    图 2-24 十六进制数据打印选项的 DBCC PAGE 输出


    起初，十六进制数据打印选项似乎不如其他打印选项有用。在许多情况下，确实如此。此打印选项的真正价值在于 `DBCC PAGE` 并不试图为你解读页面。它按原样显示页面。使用其他打印选项时，输出有时会重新排序以符合预期的插槽顺序；第
    8 章将展示一个这样的例子。


    ## 行数据打印选项


    `DBCC PAGE` 的最后一个可用打印选项是行数据打印选项，其中 `print_option` 等于 `3`。此打印选项的输出可能会根据所请求的页面类型而变化。对于大多数页面，返回的基本信息与十六进制行打印选项返回的信息相同：即按行分割的十六进制格式数据。然而，当涉及数据页和索引页时，输出就有所不同了。对于这些页面类型，此打印选项提供了一些关于页面的极其有用的信息。


    ### 注意


    你可以将 `WITH TABLERESULTS` 选项与 `DBCC PAGE` 一起使用，以将命令的结果输出到结果集，而不是消息。当你希望将 `DBCC`
    命令返回的结果插入表中时，此选项非常有用。


    为了展示数据页和索引页输出的差异，让我们逐步分析另一个例子。此示例将使用清单 2-10 中创建的表 `dbo.IndexInternalsFour`。在此打印选项的演示中，如清单
    2-19 所示，你将对表的一个数据页和索引页执行 `DBCC PAGE`。


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,378,3) -- 数据页

    DBCC PAGE(0,1,377,3) -- 索引页

    ```


    清单 2-19 使用行数据打印选项的 DBCC PAGE


    比较数据页的结果（如图 2-25 所示）与十六进制数据打印选项的输出（如图 2-24 所示），有一个主要区别。在插槽的十六进制内存转储下方，行中的所有列详细信息都被解码并以可读格式呈现。它从插槽
    0 列 1 开始，该列包含 `RowID` 列，显示其值为 5。下一列，即第 2 列，是 `FillerData` 列，其中包含 25 个数字 5。对于这些列中的每一列，都注明了物理长度以及该值在行内的偏移量。页面数据部分提供的最后一个值是
    `KeyHashValue`。此值实际上并不存储在页面上。相反，它是当页面放入内存时根据页面上的键创建的哈希值。此值显示在 SQL Server 用于向最终用户报告页面信息的工具中；在调查死锁时，你可能之前见过这个值。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig25_HTML.jpg](img/338675_3_En_2_Fig25_HTML.jpg)


    图 2-25 数据页行数据打印选项的 DBCC PAGE 输出


    对于索引页，消息输出与其他页面类型没有变化。不同之处在于结果集。它不仅返回消息输出，还返回一个表。该表为页面上的每个索引行返回一行。查看索引页的输出，如图
    2-26 所示，返回了两行。第一行表明页面 1:376 是索引页的子页面。它还显示索引的键值是 `RowID`，对于第一个索引行其值为 `NULL`。这意味着这是索引的开始，没有值限制子页面上的第一个值。第二行映射到页面
    1:378，键值为 5。在这种情况下，键值表明子页面上的第一行的 `RowID` 为 5。由于键值可能因索引而异，使用这些选项的 `DBCC PAGE` 命令的结果也会相应变化。对于每个索引变体，输出都将返回与该索引相关的值。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig26_HTML.jpg](img/338675_3_En_2_Fig26_HTML.jpg)


    图 2-26 索引页行数据打印选项的 DBCC PAGE 输出


    行数据打印选项是 `DBCC PAGE` 命令最有用的选项之一。对于数据页，它提供了对页面上存储的数据、其占用空间及其位置的全面洞察。这让你能直接理解为何只有某些行能放入页面，以及例如为何可能发生了页拆分。来自索引页输出的结果集同样有用。能够将索引行映射到页面并返回键值，可以深入了解索引的组织方式以及页面的布局。


    ## 页面碎片


    正如本章通篇讨论的，SQL Server 将数据库中的信息存储在 8 KB 的页面上。通常，表中的记录限制在该大小内；如果它们小于 8 KB，SQL Server
    会在一个页面上存储多条记录。每页存储多条记录的问题之一是处理页面上所有记录的总大小超过 8 KB 空间的情况。在这些情况下，SQL Server 必须改变页面上记录的存储方式。根据页面的组织方式，SQL
    Server 将通过两种方式来处理这些情况：转发记录和页拆分。

    '
- fmt: '### Note


    This discussion does not consider two situations where single records can be larger
    than a page. These other situations are row-overflow and large objects. With row
    overflow, SQL Server will allow a single record on a page to exceed the 8 KB in
    certain situations. Also, when large object values exceed the 8 KB size, they
    utilize LOB pages instead of data pages. These do not have a direct impact on
    the page fragmentation discussed in this section.


    ### Forwarded Records


    The first method for managing records when they exceed the size of a data page
    is through forwarded records. This method applies only when the heap structure
    is used. With forwarded records, when a row is updated and no longer fits on the
    data page, SQL Server will move that record to a new data page in the heap and
    add pointers between the two locations. The first pointer identifies the page
    on which the record now exists, often called the forwarded record pointer. The
    second is on the new page, pointing back to the original page on which the forwarded
    record existed; it’s called the back pointer.


    As an example of how this works, let’s walk through a logical example of how forwarding
    operates. Consider a page, numbered 100, that exists on a table using a heap (see
    Figure 2-27). This page has four rows on it, and each row is approximately 2 KB
    in size, totaling 8 KB in space used. If the second row is updated to 2.5 KB in
    size, it will no longer be able to fit on the page. SQL Server selects another
    page in the heap or allocates a new page to the heap, the page numbered 101 in
    this case. The second row is then written to that page, and the pointer to the
    new page replaces the row on page 100.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig27_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig27_HTML.jpg)


    Figure 2-27


    Forwarded record process diagram


    Taking this logical example further, the next thing to do is examine how records
    are forwarded on a table. For example, create a table named `dbo.HeapForwardedRecords`,
    shown in Listing 2-20. To represent the rows from the logical example, you’ll
    use the `sys.objects` table to add 24 rows to `dbo.HeapForwardedRecords`. Each
    of these rows has a `RowID` to identify the row and 2,000 characters, resulting
    in four rows per page in the table. Using `sys.dm_db_index_physical_stats`, you
    can verify (see Figure 2-28) that there are six pages in the table with a total
    of 24 records.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig28_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig28_HTML.jpg)


    Figure 2-28


    Physical state of `dbo.HeapForwardedRecords` before forwarding records


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.HeapForwardedRecords

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapForwardedRecords (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-20

    Forwarded Record Scenario

    ```


    The next step in the demonstration is to cause forwarded records in the table.
    To do this, you’ll update every other row in the table to expand the values of
    `FillerData` from 2,000 to 2,500 characters, shown in Listing 2-21. As a result,
    two of the rows will be too large to fit in the space remaining on the pages where
    these rows are located. Instead of 8 KB of data, there will be about 9 KB being
    written to the 8 KB page.


    As a result, SQL Server will need to move records off the page to complete the
    updates. Since moving one of the records off the page will leave enough room on
    the page for the second row, only one record will be forwarded. The output from
    `sys.dm_db_index_physical_stats` (see Figure 2-29) verifies that this is the case.
    The page count increases to nine, and six records are logged as being forwarded.
    One item of particular interest is the record count. While the number of rows
    in the table did not increase, there are now six additional records in the table.
    This is because the original record for the row is still in the original position
    with a pointer to another record elsewhere that contains the data for the row.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig29_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig29_HTML.jpg)


    Figure 2-29


    Physical state of `dbo.HeapForwardedRecords` after forwarding records


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.HeapForwardedRecords

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-21

    Script to Cause Forwarded Records

    ```


    The problem with forwarded records is that they cause rows in the table to have
    records in two locations, resulting in an increase in the amount of I/O activity
    required when retrieving data from and writing data to the table. The larger the
    table and the higher the number of forwarded records, the more likely that forwarded
    records can have a negative impact on performance.'
  raw: '### Note


    This discussion does not consider two situations where single records can be larger
    than a page. These other situations are row-overflow and large objects. With row
    overflow, SQL Server will allow a single record on a page to exceed the 8 KB in
    certain situations. Also, when large object values exceed the 8 KB size, they
    utilize LOB pages instead of data pages. These do not have a direct impact on
    the page fragmentation discussed in this section.


    ### Forwarded Records


    The first method for managing records when they exceed the size of a data page
    is through forwarded records. This method applies only when the heap structure
    is used. With forwarded records, when a row is updated and no longer fits on the
    data page, SQL Server will move that record to a new data page in the heap and
    add pointers between the two locations. The first pointer identifies the page
    on which the record now exists, often called the *forwarded record pointer*. The
    second is on the new page, pointing back to the original page on which the forwarded
    record existed; it’s called the *back pointer*.


    As an example of how this works, let’s walk through a logical example of how forwarding
    operates. Consider a page, numbered 100, that exists on a table using a heap (see
    Figure [2-27](#338675_3_En_2_Chapter.xhtml#Fig27)). This page has four rows on
    it, and each row is approximately 2 KB in size, totaling 8 KB in space used. If
    the second row is updated to 2.5 KB in size, it will no longer be able to fit
    on the page. SQL Server selects another page in the heap or allocates a new page
    to the heap, the page numbered 101 in this case. The second row is then written
    to that page, and the pointer to the new page replaces the row on page 100.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig27_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig27_HTML.jpg)


    Figure 2-27


    Forwarded record process diagram


    Taking this logical example further, the next thing to do is examine how records
    are forwarded on a table. For example, create a table named `dbo.HeapForwardedRecords`,
    shown in Listing [2-20](#338675_3_En_2_Chapter.xhtml#PC20). To represent the rows
    from the logical example, you’ll use the `sys.objects` table to add 24 rows to
    `dbo.HeapForwardedRecords`. Each of these rows has a `RowID` to identify the row
    and 2,000 characters, resulting in four rows per page in the table. Using `sys.dm_db_index_physical_stats`,
    you can verify (see Figure [2-28](#338675_3_En_2_Chapter.xhtml#Fig28)) that there
    are six pages in the table with a total of 24 records.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig28_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig28_HTML.jpg)


    Figure 2-28


    Physical state of dbo.HeapForwardedRecords before forwarding records


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.HeapForwardedRecords

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapForwardedRecords (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-20

    Forwarded Record Scenario

    ```


    The next step in the demonstration is to cause forwarded records in the table.
    To do this, you’ll update every other row in the table to expand the values of
    `FillerData` from 2,000 to 2,500 characters, shown in Listing [2-21](#338675_3_En_2_Chapter.xhtml#PC21).
    As a result, two of the rows will be too large to fit in the space remaining on
    the pages where these rows are located. Instead of 8 KB of data, there will be
    about 9 KB being written to the 8 KB page.


    As a result, SQL Server will need to move records off the page to complete the
    updates. Since moving one of the records off the page will leave enough room on
    the page for the second row, only one record will be forwarded. The output from
    `sys.dm_db_index_physical_stats` (see Figure [2-29](#338675_3_En_2_Chapter.xhtml#Fig29))
    verifies that this is the case. The page count increases to nine, and six records
    are logged as being forwarded. One item of particular interest is the record count.
    While the number of rows in the table did not increase, there are now six additional
    records in the table. This is because the original record for the row is still
    in the original position with a pointer to another record elsewhere that contains
    the data for the row.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig29_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig29_HTML.jpg)


    Figure 2-29


    Physical state of dbo.HeapForwardedRecords after forwarding records


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.HeapForwardedRecords

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-21

    Script to Cause Forwarded Records

    ```


    The problem with forwarded records is that they cause rows in the table to have
    records in two locations, resulting in an increase in the amount of I/O activity
    required when retrieving data from and writing data to the table. The larger the
    table and the higher the number of forwarded records, the more likely that forwarded
    records can have a negative impact on performance.'
  trans: '### 注意


    本次讨论不考虑单条记录可能大于一个页面的两种情况。这些其他情况是行溢出和大对象。在行溢出的情况下，SQL Server 会在某些情况下允许页面上的单条记录超过
    8 KB。此外，当大对象值超过 8 KB 大小时，它们会使用 LOB 页面而非数据页面。这些情况对本节讨论的页面碎片没有直接影响。


    ### 转发记录


    当记录大小超过数据页面时，管理它们的第一种方法是通过**转发记录**。此方法仅在使用**堆**结构时适用。对于转发记录，当一行被更新且不再适合数据页面时，SQL
    Server 会将该记录移动到堆中的一个新数据页面，并在两个位置之间添加指针。第一个指针标识记录现在所在的页面，通常称为转发记录指针。第二个指针位于新页面上，指回转发记录原来所在的原始页面；它被称为反向指针。


    为了说明其工作原理，让我们逐步了解转发操作的一个逻辑示例。考虑一个使用堆结构的表中的页面，编号为 100（见图 2-27）。此页面上有四行，每行大小约为 2
    KB，总共使用了 8 KB 的空间。如果第二行被更新为 2.5 KB 大小，它将无法再容纳在此页面上。SQL Server 会选择堆中的另一个页面，或为堆分配一个新页面，在此案例中是编号为
    101 的页面。然后，第二行被写入该页面，并且指向新页面的指针替换了第 100 页上的该行。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig27_HTML.jpg](img/338675_3_En_2_Fig27_HTML.jpg)


    图 2-27


    转发记录过程示意图


    进一步扩展这个逻辑示例，接下来要做的是检查表中的记录是如何被转发的。例如，创建一个名为 `dbo.HeapForwardedRecords` 的表，如代码清单
    2-20 所示。为了表示逻辑示例中的行，你将使用 `sys.objects` 表向 `dbo.HeapForwardedRecords` 添加 24 行。这些行中的每一行都有一个
    `RowID` 来标识该行以及 2000 个字符，导致表中每页有四行。使用 `sys.dm_db_index_physical_stats`，你可以验证（见图
    2-28）该表有六个页面，总共 24 条记录。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig28_HTML.jpg](img/338675_3_En_2_Fig28_HTML.jpg)


    图 2-28


    转发记录前 `dbo.HeapForwardedRecords` 的物理状态


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.HeapForwardedRecords

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapForwardedRecords (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    代码清单 2-20

    转发记录场景

    ```


    演示的下一步是在表中制造转发记录。为此，你将更新表中的每隔一行，将 `FillerData` 的值从 2000 个字符扩展到 2500 个字符，如代码清单
    2-21 所示。结果，其中两行会变得太大，无法容纳在它们所在页面的剩余空间中。将会有大约 9 KB 的数据要写入 8 KB 的页面，而不是 8 KB。


    因此，SQL Server 需要将记录移出页面才能完成更新。由于将一条记录移出页面会为页面留下足够空间来容纳第二行，因此只会转发一条记录。`sys.dm_db_index_physical_stats`
    的输出（见图 2-29）证实了这一点。页面数增加到九个，并且有六条记录被记录为已转发。一个特别值得关注的项目是记录数。虽然表中的行数没有增加，但现在表中多了六条额外的记录。这是因为行的原始记录仍然在原始位置，带有一个指向其他地方包含该行数据的另一条记录的指针。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig29_HTML.jpg](img/338675_3_En_2_Fig29_HTML.jpg)


    图 2-29


    转发记录后 `dbo.HeapForwardedRecords` 的物理状态


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.HeapForwardedRecords

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    代码清单 2-21

    制造转发记录的脚本

    ```


    转发记录的问题在于，它们导致表中的行在两个位置有记录，从而增加了从表中检索数据和向表写入数据时所需的 I/O 活动量。表越大，转发记录数量越多，转发记录对性能产生负面影响的可能性就越大。'
- fmt: "## Page Splits\n\nThe second approach for handling pages where the size of\
    \ the rows on the page exceeds the size of the page is performing the page split.\
    \ A page split is used on any index that is implemented under the B-tree index\
    \ structure, which includes clustered and nonclustered indexes. With page splits,\
    \ if a row is updated to a size that will no longer fit on the data page on which\
    \ it currently exists, SQL Server will take half the records on the page and place\
    \ them on a new page. Then SQL Server will attempt to write the data for the row\
    \ to the page again. If the data will then fit on the page, the page will be written.\
    \ If not, then the process will be repeated until it fits on the page.\n\nTo explain\
    \ how page splits operate, let’s walk through an update that results in a page\
    \ split. Similar to the previous section, consider a table with a page numbered\
    \ 100 (see Figure [2-30](#338675_3_En_2_Chapter.xhtml#Fig30)). There are four\
    \ rows stored on page 100, and each is approximately 2 KB in size. Suppose that\
    \ one of the rows, such as the second row, is updated to 2.5 KB in size. The data\
    \ for the page will be 8.5 KB, which exceeds the available space, which causes\
    \ a page split to occur. To split the page, a new page is allocated, numbered\
    \ 101, and half the rows on the page (the third and fourth row) are written to\
    \ the new page. At this point, the second row can be written to the page since\
    \ there is now 4 KB of open space on the page.\n\n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig30_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig30_HTML.jpg)\n\
    \nFigure 2-30: Page split process diagram\n\nTo demonstrate how page splits occur\
    \ on a table, let’s walk through an example similar to the one already described,\
    \ which causes page splits to occur on the table. To start the example, create\
    \ the table `dbo.ClusteredPageSplits`, provided in Listing [2-22](#338675_3_En_2_Chapter.xhtml#PC22).\
    \ Into this table you’ll insert 24 records that are about 2 KB in length. This\
    \ should result in four rows per page and six data pages allocated to the table.\
    \ Look at the information on index level 0, which is the leaf level. Since the\
    \ table is using a B-tree, through the clustered index there will be an additional\
    \ page that is used for the index tree structure. On index level 1, there are\
    \ six records, which reference the six pages in the index. You can confirm this\
    \ information with Figure [2-31](#338675_3_En_2_Chapter.xhtml#Fig31).\n\n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig31_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig31_HTML.jpg)\n\
    \nFigure 2-31: Physical state of `dbo.ClusteredPageSplits` before page splits\n\
    \n```\nUSE AdventureWorks2017\nGO\nCREATE TABLE dbo.ClusteredPageSplits\n(\n \
    \   RowId INT IDENTITY(1,1)\n    ,FillerData VARCHAR(2500)\n    ,CONSTRAINT PK_ClusteredPageSplits\
    \ PRIMARY KEY CLUSTERED (RowId)\n);\nINSERT INTO dbo.ClusteredPageSplits (FillerData)\n\
    SELECT TOP 24 REPLICATE('X',2000)\nFROM sys.objects;\nDECLARE @ObjectID INT =\
    \ OBJECT_ID('dbo.ClusteredPageSplits');\nSELECT object_id, index_type_desc, index_level,\
    \ page_count, record_count\nFROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID,\
    \ NULL, NULL, 'DETAILED');\n```\n\nListing 2-22: Page Split Scenario\n\nCausing\
    \ the page splits on the table can be done by updating some of the records to\
    \ exceed the size of the page. You’ll do this by issuing an `UPDATE` statement\
    \ that increases the `FillerData` column in every other row from 2,000 to 2,500\
    \ characters in length, using the script in Listing [2-23](#338675_3_En_2_Chapter.xhtml#PC23).\
    \ The resulting rows on each page will be 9 KB in size, which, like the previous\
    \ example, exceeds the available page size, thus causing SQL Server to use page\
    \ spits to free up space on the page.\n\nInvestigating the results (Figure [2-32](#338675_3_En_2_Chapter.xhtml#Fig32))\
    \ after the page splits have occurred shows the effect of the page splits on the\
    \ table. For starters, instead of 6 pages at the leaf level of the index, at index\
    \ level 0 there are 12 pages. As mentioned, when a page split occurs, the page\
    \ is split in half, and a new page is added. Since all the data pages were updated\
    \ in the table, all the pages were split, resulting in a doubling of the pages\
    \ at the leaf level. The only change at index level 0 was the addition of six\
    \ pages to reference the new pages in the index.\n\n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig32_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig32_HTML.jpg)\n\
    \nFigure 2-32: Physical state of `dbo.ClusteredPageSplits` after page splits\n\
    \n```\nUSE AdventureWorks2017\nGO\nUPDATE dbo.ClusteredPageSplits\nSET FillerData\
    \ = REPLICATE('X',2500)\nWHERE RowId % 2 = 0;\nDECLARE @ObjectID INT = OBJECT_ID('dbo.ClusteredPageSplits');\n\
    SELECT object_id, index_type_desc, index_level, page_count, record_count\nFROM\
    \ sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, 'DETAILED');\n\
    ```\n\nListing 2-23: Script to Cause Page Splits\n\nThere are two distinctions\
    \ between page splits and forwarded records that are worth mentioning. First,\
    \ when the page splits occurred, the number of records on the data pages did not\
    \ increase. A page split moves the location of records to make room for the records\
    \ within the logical index ordering. The second is that page splits do not increase\
    \ the record count. Since page splits have made room for the records, there is\
    \ no need for additional records to point to where data is stored.\n\nPage splits\
    \ can lead to performance issues similar to forwarded records. These performance\
    \ issues occur both when the page split is occurring and afterward. During the\
    \ page splits, the page that is being split needs to be locked exclusively while\
    \ the records are split between two pages. This means that there can be contention\
    \ when someone needs to access a row other than the one being updated when the\
    \ page split happens. After the page is split, the physical order of the data\
    \ pages in the index is almost always not in their logical order within the index.\
    \ This interrupts SQL Server’s ability to perform contiguous reads, decreasing\
    \ the amount of data that can be read in single operations. Also, the more pages\
    \ that need to be read into memory for a query to execute, the slower the query\
    \ will perform compared to the same results on fewer pages.\n\n## Index Characteristics\n\
    \nThe first part of this chapter discussed the physical structures that are used\
    \ to store indexes. In those sections, a clear line between the types of indexes\
    \ available and these structures was not defined. In this section, the main index\
    \ types for SQL Server will be discussed, along with the indexing structure that\
    \ they use. For each, you’ll learn about the requirements and restrictions associated\
    \ with the indexes.\n\n### Heap\n\nThe first index type to discuss is the heap.\
    \ As pointed out earlier in the book, a heap is not actually a type of index.\
    \ It is instead the result of the lack of a clustered index on a table. A heap\
    \ index will, as the name implies, use the heap structure for organizing pages\
    \ in a table.\n\nThere is only a single requirement for creating a table with\
    \ a heap. The requirement is that a clustered index can’t already be created on\
    \ the table. If there is a clustered index, then a heap will not be used. Heaps\
    \ and clustered indexes are mutually exclusive. Also, provided there is not a\
    \ clustered index, there can be only a single heap on a table. The heap is used\
    \ to store the data pages for the index, and this is done only once.\n\nThe primary\
    \ concern when using heaps is that the data in the heaps is not ordered. There\
    \ is no column that determines the sort for the data on the pages. The result\
    \ of this is that, without other supporting nonclustered indexes, queries will\
    \ always be forced to scan the information in the table."
  raw: '### Page Splits


    The second approach for handling pages where the size of the rows on the page
    exceeds the size of the page is performing the page split. A page split is used
    on any index that is implemented under the B-tree index structure, which includes
    clustered and nonclustered indexes. With page splits, if a row is updated to a
    size that will no longer fit on the data page on which it currently exists, SQL
    Server will take half the records on the page and place them on a new page. Then
    SQL Server will attempt to write the data for the row to the page again. If the
    data will then fit on the page, the page will be written. If not, then the process
    will be repeated until it fits on the page.


    To explain how page splits operate, let’s walk through an update that results
    in a page split. Similar to the previous section, consider a table with a page
    numbered 100 (see Figure [2-30](#338675_3_En_2_Chapter.xhtml#Fig30)). There are
    four rows stored on page 100, and each is approximately 2 KB in size. Suppose
    that one of the rows, such as the second row, is updated to 2.5 KB in size. The
    data for the page will be 8.5 KB, which exceeds the available space, which causes
    a page split to occur. To split the page, a new page is allocated, numbered 101,
    and half the rows on the page (the third and fourth row) are written to the new
    page. At this point, the second row can be written to the page since there is
    now 4 KB of open space on the page.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig30_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig30_HTML.jpg)


    Figure 2-30


    Page split process diagram


    To demonstrate how page splits occur on a table, let’s walk through an example
    similar to the one already described, which causes page splits to occur on the
    table. To start the example, create the table `dbo.ClusteredPageSplits`, provided
    in Listing [2-22](#338675_3_En_2_Chapter.xhtml#PC22). Into this table you’ll insert
    24 records that are about 2 KB in length. This should result in four rows per
    page and six data pages allocated to the table. Look at the information on index
    level 0, which is the leaf level. Since the table is using a B-tree, through the
    clustered index there will be an additional page that is used for the index tree
    structure. On index level 1, there are six records, which reference the six pages
    in the index. You can confirm this information with Figure [2-31](#338675_3_En_2_Chapter.xhtml#Fig31).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig31_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig31_HTML.jpg)


    Figure 2-31


    Physical state of dbo.ClusteredPageSplits before page splits


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ClusteredPageSplits

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    ,CONSTRAINT PK_ClusteredPageSplits PRIMARY KEY CLUSTERED (RowId)

    );

    INSERT INTO dbo.ClusteredPageSplits (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-22

    Page Split Scenario

    ```


    Causing the page splits on the table can be done by updating some of the records
    to exceed the size of the page. You’ll do this by issuing an `UPDATE` statement
    that increases the `FillerData` column in every other row from 2,000 to 2,500
    characters in length, using the script in Listing [2-23](#338675_3_En_2_Chapter.xhtml#PC23).
    The resulting rows on each page will be 9 KB in size, which, like the previous
    example, exceeds the available page size, thus causing SQL Server to use page
    spits to free up space on the page.


    Investigating the results (Figure [2-32](#338675_3_En_2_Chapter.xhtml#Fig32))
    after the page splits have occurred shows the effect of the page splits on the
    table. For starters, instead of 6 pages at the leaf level of the index, at index
    level 0 there are 12 pages. As mentioned, when a page split occurs, the page is
    split in half, and a new page is added. Since all the data pages were updated
    in the table, all the pages were split, resulting in a doubling of the pages at
    the leaf level. The only change at index level 0 was the addition of six pages
    to reference the new pages in the index.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig32_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig32_HTML.jpg)


    Figure 2-32


    Physical state of dbo.ClusteredPageSplits after page splits


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.ClusteredPageSplits

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    Listing 2-23

    Script to Cause Page Splits

    ```


    There are two distinctions between page splits and forwarded records that are
    worth mentioning. First, when the page splits occurred, the number of records
    on the data pages did not increase. A page split moves the location of records
    to make room for the records within the logical index ordering. The second is
    that page splits do not increase the record count. Since page splits have made
    room for the records, there is no need for additional records to point to where
    data is stored.


    Page splits can lead to performance issues similar to forwarded records. These
    performance issues occur both when the page split is occurring and afterward.
    During the page splits, the page that is being split needs to be locked exclusively
    while the records are split between two pages. This means that there can be contention
    when someone needs to access a row other than the one being updated when the page
    split happens. After the page is split, the physical order of the data pages in
    the index is almost always not in their logical order within the index. This interrupts
    SQL Server’s ability to perform contiguous reads, decreasing the amount of data
    that can be read in single operations. Also, the more pages that need to be read
    into memory for a query to execute, the slower the query will perform compared
    to the same results on fewer pages.


    ## Index Characteristics


    The first part of this chapter discussed the physical structures that are used
    to store indexes. In those sections, a clear line between the types of indexes
    available and these structures was not defined. In this section, the main index
    types for SQL Server will be discussed, along with the indexing structure that
    they use. For each, you’ll learn about the requirements and restrictions associated
    with the indexes.


    ### Heap


    The first index type to discuss is the heap . As pointed out earlier in the book,
    a heap is not actually a type of index. It is instead the result of the lack of
    a clustered index on a table. A heap index will, as the name implies, use the
    heap structure for organizing pages in a table.


    There is only a single requirement for creating a table with a heap. The requirement
    is that a clustered index can’t already be created on the table. If there is a
    clustered index, then a heap will not be used. Heaps and clustered indexes are
    mutually exclusive. Also, provided there is not a clustered index, there can be
    only a single heap on a table. The heap is used to store the data pages for the
    index, and this is done only once.


    The primary concern when using heaps is that the data in the heaps is not ordered.
    There is no column that determines the sort for the data on the pages. The result
    of this is that, without other supporting nonclustered indexes, queries will always
    be forced to scan the information in the table.'
  trans: "## 页面拆分\n\n处理页面上行数据大小超过页面大小的第二种方法是执行页面拆分。页面拆分适用于任何在 B 树索引结构下实现的索引，这包括聚集索引和非聚集索引。通过页面拆分，如果某行被更新到不再适合其当前所在数据页的大小，SQL\
    \ Server 将获取该页面上一半的记录，并将它们放置到一个新页面上。然后，SQL Server 会再次尝试将该行的数据写入页面。如果此时数据能放入页面，则该页面将被写入。如果不能，则重复此过程直到数据能放入页面。\n\
    \n为了解释页面拆分如何操作，我们来逐步看一个导致页面拆分的更新操作。与上一节类似，考虑一个包含编号为 100 的页面的表（参见图 2-30）。页面 100\
    \ 上存储了四行数据，每行大约 2KB 大小。假设其中一行，比如第二行，被更新到 2.5KB 大小。页面数据总量将达到 8.5KB，超过了可用空间，从而导致页面拆分发生。为了拆分页面，系统会分配一个新页面，编号为\
    \ 101，并将原页面上一半的行（第三和第四行）写入新页面。此时，第二行就可以被写入原页面，因为原页面现在有 4KB 的空闲空间。\n\n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig30_HTML.jpg](img/338675_3_En_2_Fig30_HTML.jpg)\n\
    \n图 2-30：页面拆分过程图\n\n为了演示页面拆分如何在表上发生，我们来看一个与前面描述类似的例子，它会导致表上发生页面拆分。首先，创建表`dbo.ClusteredPageSplits`，如清单\
    \ 2-22 所示。向此表中插入 24 条长度约为 2KB 的记录。这将导致每页四行，并为该表分配六个数据页。查看索引级别 0（即叶级）的信息。由于该表使用了\
    \ B 树，通过聚集索引会有一个额外的页面用于索引树结构。在索引级别 1 上，有六条记录，它们引用了索引中的六个页面。你可以通过图 2-31 确认此信息。\n\
    \n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig31_HTML.jpg](img/338675_3_En_2_Fig31_HTML.jpg)\n\
    \n图 2-31：页面拆分前 `dbo.ClusteredPageSplits` 的物理状态\n\n```\nUSE AdventureWorks2017\n\
    GO\nCREATE TABLE dbo.ClusteredPageSplits\n(\n    RowId INT IDENTITY(1,1)\n   \
    \ ,FillerData VARCHAR(2500)\n    ,CONSTRAINT PK_ClusteredPageSplits PRIMARY KEY\
    \ CLUSTERED (RowId)\n);\nINSERT INTO dbo.ClusteredPageSplits (FillerData)\nSELECT\
    \ TOP 24 REPLICATE('X',2000)\nFROM sys.objects;\nDECLARE @ObjectID INT = OBJECT_ID('dbo.ClusteredPageSplits');\n\
    SELECT object_id, index_type_desc, index_level, page_count, record_count\nFROM\
    \ sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, 'DETAILED');\n\
    ```\n\n清单 2-22：页面拆分场景\n\n可以通过将某些记录更新到超过页面大小来导致表上的页面拆分。我们将通过执行一个`UPDATE`语句来完成此操作，该语句使用清单\
    \ 2-23 中的脚本，将每隔一行的`FillerData`列长度从 2000 个字符增加到 2500 个字符。结果，每页上的行大小将达到 9KB，如同前面的例子一样，这超过了可用页面大小，从而导致\
    \ SQL Server 使用页面拆分来释放页面上的空间。\n\n调查页面拆分发生后的结果（图 2-32）显示了页面拆分对表的影响。首先，在索引的叶级，页面数量不再是\
    \ 6 个，而是在索引级别 0 上有 12 个页面。如前所述，当发生页面拆分时，页面被对半拆分，并添加一个新页面。由于表中所有数据页都被更新，所有页面都被拆分，导致叶级页面数量翻倍。索引级别\
    \ 0 上唯一的变化是增加了六个页面来引用索引中的新页面。\n\n![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig32_HTML.jpg](img/338675_3_En_2_Fig32_HTML.jpg)\n\
    \n图 2-32：页面拆分后 `dbo.ClusteredPageSplits` 的物理状态\n\n```\nUSE AdventureWorks2017\n\
    GO\nUPDATE dbo.ClusteredPageSplits\nSET FillerData = REPLICATE('X',2500)\nWHERE\
    \ RowId % 2 = 0;\nDECLARE @ObjectID INT = OBJECT_ID('dbo.ClusteredPageSplits');\n\
    SELECT object_id, index_type_desc, index_level, page_count, record_count\nFROM\
    \ sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, 'DETAILED');\n\
    ```\n\n清单 2-23：导致页面拆分的脚本\n\n页面拆分和转寄记录之间有两个值得提及的区别。首先，当页面拆分发生时，数据页上的记录数量并未增加。页面拆分移动了记录的位置，以便为逻辑索引顺序内的记录腾出空间。第二，页面拆分不会增加记录计数。由于页面拆分已经为记录腾出了空间，因此不需要额外的记录来指向数据存储的位置。\n\
    \n页面拆分可能导致与转寄记录类似的性能问题。这些性能问题既发生在页面拆分进行时，也发生在拆分完成后。在页面拆分期间，正在被拆分的页面在记录被分割到两个页面之间时需要被独占锁定。这意味着，当页面拆分发生时，如果有人需要访问除正在更新的行之外的行，就可能出现争用。页面拆分后，索引中数据页的物理顺序几乎总是不符合其在索引中的逻辑顺序。这会中断\
    \ SQL Server 执行连续读取的能力，降低了单次操作可以读取的数据量。此外，与在较少页面上查询相同结果相比，执行查询需要读入内存的页面越多，查询性能就越慢。\n\
    \n## 索引特性\n\n本章第一部分讨论了用于存储索引的物理结构。在这些部分中，并未明确定义可用索引类型与这些结构之间的界限。本节将讨论 SQL Server\
    \ 的主要索引类型，以及它们使用的索引结构。对于每种类型，你将了解到与之相关的要求和限制。\n\n### 堆\n\n第一个要讨论的索引类型是堆。正如本书前面指出的，堆实际上并不是一种索引类型。相反，它是表上缺少聚集索引的结果。堆索引，顾名思义，将使用堆结构来组织表中的页面。\n\
    \n创建具有堆的表只有一个要求。这个要求是：表上不能已经创建了聚集索引。如果存在聚集索引，那么就不会使用堆。堆和聚集索引是互斥的。此外，只要没有聚集索引，一个表上只能有一个堆。堆用于存储索引的数据页，并且这个操作只执行一次。\n\
    \n使用堆时的主要问题是堆中的数据是无序的。没有任何列决定页面上数据的排序结果是，如果没有其他支持的非聚集索引，查询将总是被迫扫描表中的信息。"
- fmt: '### Clustered Index


    The second index type is the `clustered index`. `Clustered indexes` utilize a
    `B-tree` for storing data. For all practical purposes, a `clustered index` is
    the opposite of a `heap`. When a `clustered index` is built on a table, the `heap`
    is replaced with the `B-tree` structure, organizing the pages according to the
    key columns of the `clustered index`. The `B-tree` for a `clustered index` includes
    data pages with all the data for the rows in the table.


    `Clustered indexes` have a few restrictions when considering the columns for the
    index. The first restriction is that the total length for the key columns cannot
    exceed 900 bytes. Second, the clustering key in a `clustered index` must be unique.
    If columns in a clustering key are not unique, SQL Server will add a hidden uniquifier
    column to the row when it is stored. The uniquifier is a 4-byte numeric value
    that is added to nonunique clustering keys to enforce uniqueness. The uniquifier
    size is not considered part of the 900-byte limit.


    When building `clustered indexes`, there are a few things to consider. First,
    there can be only a single `clustered index` per table. Since the `clustered index`
    is stored in the order of the clustering key and the data in the row is stored
    with the key, there can’t be an alternative sort on top of the table sorting it
    in a second manner. Also, when building a `clustered index` on an existing table
    with a `heap`, be sure to have enough space available for a second copy of the
    data. Until the build of the index is completed, both copies of the data will
    exist.


    As will be discussed in later chapters, it is often preferable to create `clustered
    indexes` on all tables. This preference is not an absolute, and there are situations
    where `clustered indexes` are not appropriate. You will need to investigate in
    your own databases to determine which structure is best. Simply use this preference
    as a starting point.


    ### Nonclustered Index


    The next index type to discuss is the `nonclustered index`. `Nonclustered indexes`
    are similar to `clustered indexes` in a couple ways. For starters, `nonclustered
    indexes` use the `B-tree` structure for storing data. They are also limited to
    900 bytes for their key columns.


    Beyond the similarities to `clustered indexes`, there are some differences. First,
    there can be more than one `nonclustered index` on a table. In fact, there can
    be up to 999 `nonclustered indexes` on a table, each with no more than 16 columns.
    This upper limit isn’t an invitation to create that many indexes; it is just an
    indication to the total number of `nonclustered indexes` that can be created.
    However, with filtered indexes, it may sometimes be worthwhile to create more
    indexes on a table than was traditionally considered appropriate. Also, instead
    of having a leaf level where data is stored in the `B-tree`, `nonclustered indexes`
    have page references to the locations in either the `heap` or `clustered index`
    on the table where the data is located.


    ### Columnstore Index


    The last index type discussed in this section is the `columnstore index`. `Columnstore
    indexes` use the `columnstore` structure, as the name implies. `Columnstore indexes`
    can be of both `clustered` and `nonclustered` types.


    A number of restrictions need to be considered with both types of `columnstore
    indexes`. The first is that not all data types are available to be used in `columnstore
    indexes`. The data types that cannot be used are `binary`, `varbinary`, `ntext`,
    `text`, `image`, `nvarchar(max)`, `varchar(max)`, `uniqueidentifier`, `rowversion`,
    `sql_variant`, `decimal` (with greater than 18 digits), `datetimeoffset`, `xml`,
    and CLR-based types. While all columns in a table should be added to a `clustered
    index`, there is a limit of 1,024 columns in a `columnstore index`. Also, because
    of the nature of `columnstore indexes`, the index cannot be unique, be clustered,
    contain included columns, or have an ascending or descending order designated.
    Also, there can be only a single `columnstore index` on a table. This restriction
    is not a problem since it is advisable to include every column in a table in the
    `columnstore index`.


    Additionally, with `nonclustered` `columnstore indexes`, there are a couple of
    additional restrictions. To begin with, a `columnstore index` is read-only. Once
    it has been created, there can be no data modifications to the data in the table.
    For this reason, it is often worthwhile to partition the underlying table to reduce
    the amount of data that needs to be contained in a `columnstore index` and to
    allow rebuilding of the index when new data is added to the table.


    `Clustered columnstore indexes`, on the other hand, have some additional capabilities
    beyond `nonclustered columnstore indexes`. `Clustered columnstores` are writeable,
    which is allowed through a `deltastore` that is a hidden `heap` table that stores
    new rows as they are received and compresses them into `columnstore` rowgroups
    over time. The distinction of `clustered` in the case of `clustered columnstore
    indexes` indicates that it is the structure that all the data in a table is stored
    in. This means there are no other structures, such as a `heap`, that contain data
    in addition to the `columnstore index`.


    When using `columnstore indexes`, there are some features within SQL Server that
    they cannot be combined with. Since `columnstore` uses its own compression technology,
    it can’t be combined with row or page compression. It can’t be used with replication,
    change tracking, or change data capture. These technologies would not make sense
    with `columnstore` since they assist in read-write scenarios, while `columnstore
    indexes` are read-only. The last feature restrictions are `filestream` and `filetable`,
    which can’t be used with `columnstore`.


    ## Summary


    In this chapter, you looked at the components that are used as the building blocks
    for indexes. Now you have the fundamental foundation necessary to create indexes
    that will behave in the ways that you expect and anticipate. To review, you looked
    at the different types of pages that SQL Server uses to store data in the database
    and how these pages are arranged together in extents. Then you looked at the available
    structures for organizing pages, not for physical storage but in a logical fashion
    in order to access the data on those pages. Then you looked at the tools available
    for investigating the pages and structures of indexes through `DBCC` commands.
    The chapter concluded with a review of how the structures for indexes are associated
    with the available index types.


    Footnotes [1](#338675_3_En_2_Chapter.xhtml#Fn1_source)'
