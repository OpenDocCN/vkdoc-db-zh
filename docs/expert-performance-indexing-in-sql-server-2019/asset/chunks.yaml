- fmt: '# 3. Index Metadata and Statistics


    Now that you understand the logical and physical fundamentals of indexes, you
    should look at the way in which statistics are stored for indexes. These statistics
    provide insight into how SQL Server can utilize and is utilizing indexes. It also
    provides the information needed to decipher why an index may not be selected and
    how it is behaving. This chapter will provide you with a deeper understanding
    about where and how this information is collected. You’ll investigate some additional
    `DBCC` commands and dynamic management objects (DMOs) that are available and see
    how that information comes to be.


    There are four domains of information that the statistics in this chapter will
    cover. The first domain is column-level statistics. This provides the query optimizer
    with information on the population of data within a column and, thus, an index.
    The next domain is index usage statistics. Information here provides insight into
    whether and how an index is being used. The third domain is operational statistics.
    This information is similar to usage statistics but provides deeper insight. The
    last domain of information is physical statistics, and it provides insight into
    the physical characteristics of the index and how the index is distributed within
    the database.


    Additionally, in this chapter, you’ll review the metadata and statistics that
    are available for columnstore indexes and explore the information that is collected.
    This information provides an understanding of what is being stored by the columnstore
    index and how it might impact the performance of queries against columnstore indexes.


    ## Column-Level Statistics


    Let’s begin by looking at the first domain of statistics information, column-level
    statistics. This area is one of the most important within SQL Server when it comes
    to indexes. Column-level statistics provide information on how data and its values
    are distributed across the key column(s) of an index. SQL Server uses this information
    to determine the anticipated frequency and distribution of values within an index;
    this is referred to as *cardinality* .


    Through cardinality, the query optimizer develops cost-based execution plans to
    find the best execution plan for executing the submitted request. If the statistics
    for an index are incorrect or no longer represent the data in the index, then
    the plan that is created will, likely, be inefficient. It is important to understand
    and be able to interact with statistics to be certain that indexes in your environment
    not only exist but also provide their expected benefits.


    ### Note


    Often when indexes are rebuilt to “fix” performance issues, the fragmentation
    is usually not the cause or direct solution to the issue. When rebuilt, indexes
    receive new statistics, and execution plans related to those indexes need to be
    recompiled, either of which is the likely cause of the performance issue vs. any
    index fragmentation.


    There are many ways to interact with statistics within SQL Server. You’ll review
    some of the most common mechanisms in the sections to follow. With each of these
    methods, you’ll look what they are, what they provide, and the value in using
    each method.


    ### DBCC SHOW_STATISTICS


    The first, and likely most familiar, way to interact with statistics is through
    the `DBCC` command `SHOW_STATISTICS`. This command will return the statistics
    for the requested database object, either a table or an indexed view. The information
    returned is a statistics object that includes three different components: the
    header, the histogram, and the density vector. Each of these components provides
    SQL Server with an understanding of the data available in the index.


    Returning the statistics object can be done with the `DBCC` syntax in Listing
    [3-1](#338675_3_En_3_Chapter.xhtml#PC1). This syntax accepts the name of the table
    or indexed view for the statistics, and then the target is returned. The target
    is either the name of the index or the column-level statistics that were created.


    ```

    DBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )

    [ WITH [  ]

    Listing 3-1

    DBCC SHOW_STATISTICS Syntax

    ```


    There are four options that can be included with the `DBCC` command: `NO_INFOMSGS`,
    `STAT_HEADER`, `DENSITY_VECTOR`, `and HISTOGRAM`. Any or all of these options
    can be included in a comma-separated list.


    The option `NO_INFOMSGS` suppresses all informational messages when the `DBCC`
    command is executed. These are error messages generated with severity from 0 to
    10, with 10 being the highest severity error. In most cases, since these error
    messages are informational, they are not of value when using this `DBCC` statement.


    The options `STAT_HEADER`, `DENSITY_VECTOR`, `and HISTOGRAM` limit the output
    from the `DBCC` command. If one or more of the options are included, then only
    the statistics components for the items included will be returned. If none of
    these is selected, then all the components are included. There is STATS_STREAM
    option that won’t be discussed because it is not supported and may not be included
    in future releases.


    With the `DBCC` command defined, let’s walk through each of the statistics components.
    Each will be defined, and then an example of their contents from the AdventureWorks2017
    database will be explored. The results that you’ll be reviewing can be created
    with Listing [3-2](#338675_3_En_3_Chapter.xhtml#PC2).


    ```

    USE AdventureWorks2017

    GO

    DBCC SHOW_STATISTICS ( ''Sales.SalesOrderDetail''

    , PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID )

    Listing 3-2

    DBCC SHOW_STATISTICS for Index on Sales.SalesOrderDetail Table

    ```'
