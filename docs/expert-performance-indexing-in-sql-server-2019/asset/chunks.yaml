    现在你有了一个可供操作的表，让我们来看看当表中的数据发生变化时会发生什么。在示例中，你将查看五个不同的查询，如清单 3-8 所示。第一个查询更新 `OrderDate`
    列，导致 40 行被更改。第二个查询更新了 50 行，其中 `SalesOrderNumber` 被更新为其当前包含的相同值。第三个查询再次更新 `SalesOrderNumber`
    列，但为相同的 50 行反转了该值。第四个查询向表中插入了 11,465 条记录。最后一个查询从表中删除了前 20,000 条记录。在每两个查询之间，执行清单
    3-7 中的代码；这样做将产生如图 3-6 所示的输出。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig6_HTML.jpg](img/338675_3_En_3_Fig6_HTML.jpg)

