  raw: '## Index Plan Usage


    In previous sections of this chapter, we discussed the concept of checking the
    plan cache to analyze and investigate index usages. While statistics can show
    that there was a seek or a scan against an index, it doesn’t provide us with enough
    detail to know what columns to add or what caused the index to use a scan over
    a seek. To gather this information, we need to turn to the execution plan. And
    the place where we can get some of the best execution plans for your databases
    and SQL Server instance is the plan cache. In this section, for index analysis,
    we’ll be looking at two queries that can be used to retrieve execution plans from
    the plan cache.


    The first query is one that will be used when we need to retrieve all the plans
    for a specific index. Suppose we need to determine what processes, or T-SQL statements,
    are using one of the indexes on a table that is used once or twice a day. For
    this, we can turn to the plan cache with the query in Listing [14-41](#338675_3_En_14_Chapter.xhtml#PC41)
    and check whether the plan for that query is still in the cache. To use the query,
    replace the index name in the variable `@IndexName` and execute it to return a
    list of plans that use the index. Be cautious if we have a database where there
    are many indexes with the same name, since index names need to be unique only
    on a per-table basis. If all of the indexes are named `IX_1` and `IX_2`, we will
    need to verify the table name in the search to be sure we have the correct index.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    GO

    DECLARE @IndexName sysname = ''PK_SalesOrderHeader_SalesOrderID'';

    SET @IndexName = QUOTENAME(@IndexName, ''['');

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    , IndexSearch

    AS (SELECT qp.query_plan,

    cp.usecounts,

    ix.query(''.'') AS StmtSimple

    FROM sys.dm_exec_cached_plans cp

    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY qp.query_plan.nodes(''//StmtSimple'') AS p(ix)

    WHERE query_plan.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1)

    SELECT StmtSimple.value(''StmtSimple[1]/@StatementText'', ''VARCHAR(4000)'') AS
    sql_text,

    obj.value(''@Database'', ''sysname'') AS database_name,

    obj.value(''@Schema'', ''sysname'') AS schema_name,

    obj.value(''@Table'', ''sysname'') AS table_name,

    obj.value(''@Index'', ''sysname'') AS index_name,

    ixs.query_plan

    FROM IndexSearch ixs

    CROSS APPLY StmtSimple.nodes(''//Object'') AS o(obj)

    WHERE obj.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1;

    Listing 14-41

    Query Plan Cache for Index Usage

    ```


    At other times, searching for just the name of an index will be too broad of a
    search of the plan cache. In these cases, we can use the query in Listing [14-42](#338675_3_En_14_Chapter.xhtml#PC42).
    This query adds in the name of a physical operator to the plan cache search. For
    instance, suppose we are investigating Full Scans/sec and we know what index is
    causing the spike in the performance counter. Searching for just the index may
    return dozens of execution plans. Alternatively, we could add a search for a particular
    operator, such as an index scan, using the `@op` variable in the query provided.


    ```

    DECLARE @IndexName sysname = ''IX_SalesOrderHeader_SalesPersonID'';

    DECLARE @op sysname = ''Index Scan'';

    ;WITH XMLNAMESPACES (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT cp.plan_handle,

    DB_NAME(dbid) + ''.'' + OBJECT_SCHEMA_NAME(objectid, dbid) + ''.'' + OBJECT_NAME(objectid,
    dbid) AS database_object,

    qp.query_plan,

    c1.value(''@PhysicalOp'', ''nvarchar(50)''),

    c2.value(''@Index'', ''nvarchar(max)'')

    FROM sys.dm_exec_cached_plans cp

    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY query_plan.nodes(''//RelOp'') r(c1)

    OUTER APPLY c1.nodes(''IndexScan/Object'') AS o(c2)

    WHERE c2.value(''@Index'', ''nvarchar(max)'') = QUOTENAME(@IndexName, ''['')

    AND c1.exist(''@PhysicalOp[. = sql:variable("@op")]'') = 1;

    Listing 14-42

    Query Plan Cache for Index Usage and Physical Operation

    ```


    Both of these queries provide mechanisms for getting in and investigating indexes
    in their environment and seeing exactly how SQL Server is using them. This information
    can be easily leveraged to identify when problems are occurring and why and then
    provide a path to resolving indexing issues without a lot of the guesswork that
    many use today.


    ## Summary


    As this chapter showed, we can use the information collected from monitoring indexes
    to analyze indexes to examine and identify indexes. The results from this analysis
    help to determine what types of indexes to modify and where. Indexing tools such
    as the Database Engine Tuning Advisor and missing index DMOs can be leveraged
    to discover “the low-hanging fruit,” giving us a head start on analysis that we
    may not have discovered otherwise. By following the processes laid out in this
    index analysis, we can build a stable, repeatable indexing process that can help
    improve the performance of your database platform and achieve stable performance
    over time.


    # 15. Indexing Methodology


    Throughout this book, we’ve discussed what indexes are, what they do, patterns
    for building them, and many other aspects for determining how a SQL Server database
    should be indexed. All that information is necessary for the last piece in indexing
    your databases, which is a methodology for managing indexes. To do this, you need
    a process for applying that knowledge to determine the indexes that are best for
    your environment and provide the greatest gain to performance.


    In this last chapter, we’ll discuss a general practice that can be used to build
    an indexing methodology. You’ll look at the steps necessary to manage indexes.
    This methodology can be applied to a single database, a server, or your entire
    SQL Server environment. Regardless of the type of operations or business the database
    supports, you can use the same methodology for building indexes.'
  trans: '

    # 索引计划用法


    在本章前面的部分，我们讨论了通过检查计划缓存来分析和调查索引使用情况的概念。虽然统计数据可以显示针对某个索引执行了查找或扫描，但它没有为我们提供足够的细节来了解应该添加哪些列，或者是什么原因导致索引使用扫描而非查找。要收集这些信息，我们需要转向执行计划。而能为你的数据库和
    SQL Server 实例获取一些最佳执行计划的地方，就是计划缓存。在本节中，为了进行索引分析，我们将介绍两个可用于从计划缓存中检索执行计划的查询。


    第一个查询用于我们需要检索特定索引的所有相关计划的情况。假设我们需要确定哪些进程或 T-SQL 语句正在使用表上的某个索引，而该索引每天只使用一两次。为此，我们可以使用代码清单
    14-41 中的查询来查询计划缓存，并检查该查询的计划是否仍在缓存中。要使用此查询，请将变量 `@IndexName` 中的索引名称替换掉，然后执行它以返回使用该索引的计划列表。如果我们的数据库中有许多同名的索引，请务必谨慎，因为索引名称只需在表级别唯一。如果所有索引都命名为
    `IX_1` 和 `IX_2`，我们将需要在搜索中验证表名，以确保我们获取的是正确的索引。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    GO

    DECLARE @IndexName sysname = ''PK_SalesOrderHeader_SalesOrderID'';

    SET @IndexName = QUOTENAME(@IndexName, ''['');

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    , IndexSearch

    AS (SELECT qp.query_plan,

    cp.usecounts,

    ix.query(''.'') AS StmtSimple

    FROM sys.dm_exec_cached_plans cp

    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY qp.query_plan.nodes(''//StmtSimple'') AS p(ix)

    WHERE query_plan.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1)

    SELECT StmtSimple.value(''StmtSimple[1]/@StatementText'', ''VARCHAR(4000)'') AS
    sql_text,

    obj.value(''@Database'', ''sysname'') AS database_name,

    obj.value(''@Schema'', ''sysname'') AS schema_name,

    obj.value(''@Table'', ''sysname'') AS table_name,

    obj.value(''@Index'', ''sysname'') AS index_name,

    ixs.query_plan

    FROM IndexSearch ixs

    CROSS APPLY StmtSimple.nodes(''//Object'') AS o(obj)

    WHERE obj.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1;

    ```


    **代码清单 14-41** 查询计划缓存以获取索引用法


    其他时候，仅按索引名称搜索对计划缓存来说范围太广。在这些情况下，我们可以使用代码清单 14-42 中的查询。此查询在计划缓存搜索中增加了物理运算符的名称。例如，假设我们正在调查“全表扫描/秒”，并且我们知道是哪个索引导致了该性能计数器的峰值。仅搜索索引可能会返回数十个执行计划。或者，我们可以在提供的查询中使用
    `@op` 变量来添加对特定运算符（例如索引扫描）的搜索。


    ```sql

    DECLARE @IndexName sysname = ''IX_SalesOrderHeader_SalesPersonID'';

    DECLARE @op sysname = ''Index Scan'';

    ;WITH XMLNAMESPACES (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT cp.plan_handle,

    DB_NAME(dbid) + ''.'' + OBJECT_SCHEMA_NAME(objectid, dbid) + ''.'' + OBJECT_NAME(objectid,
    dbid) AS database_object,

    qp.query_plan,

    c1.value(''@PhysicalOp'', ''nvarchar(50)''),

    c2.value(''@Index'', ''nvarchar(max)'')

    FROM sys.dm_exec_cached_plans cp

    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY query_plan.nodes(''//RelOp'') r(c1)

    OUTER APPLY c1.nodes(''IndexScan/Object'') AS o(c2)

    WHERE c2.value(''@Index'', ''nvarchar(max)'') = QUOTENAME(@IndexName, ''['')

    AND c1.exist(''@PhysicalOp[. = sql:variable("@op")]'') = 1;

    ```


    **代码清单 14-42** 查询计划缓存以获取索引用法和物理运算符


    这两个查询都提供了机制，让我们能够进入环境并调查索引，确切地查看 SQL Server 如何使用它们。这些信息可以轻松利用来识别问题何时发生以及原因，从而为解决索引问题提供一条路径，而无需像现在许多人那样进行大量猜测。


    # 本章小结


    正如本章所示，我们可以利用从监控索引收集到的信息来分析索引，以检查和识别索引。此分析的结果有助于确定要修改的索引类型以及修改位置。诸如数据库引擎优化顾问和缺失索引
    DMO 之类的索引工具可以用来发现“唾手可得的成果”，为我们提供分析的起点，这些可能原本无法发现。通过遵循本章索引分析中概述的流程，我们可以建立一个稳定、可重复的索引流程，这有助于提高数据库平台的性能，并随时间推移实现稳定的性能。


    # 15. 索引方法论


    在整本书中，我们讨论了索引是什么、它们的作用、构建索引的模式，以及决定 SQL Server 数据库应如何索引的许多其他方面。所有这些信息对于索引数据库的最后一部分——即管理索引的方法论——都是必要的。为此，你需要一个流程，将这些知识应用到确定最适合你环境并能带来最大性能提升的索引上。


    在这最后一章中，我们将讨论一种可用于构建索引方法论的通用实践。你将了解管理索引所需的各个步骤。此方法论可以应用于单个数据库、服务器或整个 SQL Server
    环境。无论数据库支持何种类型的业务操作，你都可以使用相同的方法论来构建索引。

    '
- fmt: '## The Indexing Method


    Before you can begin creating and dropping indexes, you first need a process to
    analyze current and potential indexes. This process needs to provide a way to
    observe your databases and determine the indexes that are appropriate for your
    databases. As mentioned in previous chapters, indexing should be more of a science
    than an art. The information needed to properly index a database is available;
    through some research, you can identify potential indexes. Similar to how scientists
    use the Scientific Method to prove theories, database administrators and developers
    can use the Indexing Method to prove what indexes a database requires.


    The Indexing Method used in this book is comprised of three phases: Monitor, Analyze,
    and Implement (see Figure [15-1](#338675_3_En_15_Chapter.xhtml#Fig1)). Within
    each component are a number of steps that, when completed, help to provide the
    appropriate indexing for the database. At the completion of the Implement phase,
    the Indexing Method restarts the first phase, making indexing a continuous and
    iterative process.


    When starting with the Monitor phase, the primary activity is to observe the indexes.
    The observations entail reviewing both the performance and the behavior of the
    indexes (i.e., the indexing concepts described in Chapter [13](#338675_3_En_13_Chapter.xhtml)).
    SQL Server will use the indexes that it finds most beneficial from those available.
    By observing this behavior, you can identify the indexes that are most often used
    and how they are used.


    After the observations, the Analyze phase of the Indexing Method begins. In the
    Analyze phase, detailed in Chapter [14](#338675_3_En_14_Chapter.xhtml), the statistics
    collected in the previous phase are used to determine what indexes are best suited
    for the database. The goal is to identify what indexes need to be created, dropped,
    and modified. Along with this, the impacts of any indexing changes are also identified.


    The last phase of the Indexing Method is the Implementation phase. In this phase,
    the indexes from the last phase are applied, or deployed, to the databases. For
    every database and environment, the deployment process may be different. For instance,
    the process for deploying indexes on third-party databases differs from applications
    owned by your company. Within this phase, though, there are core concepts that
    apply to all environments; outside of physically building the indexes, you will
    need to communicate the change plan and possible effects of the change. Then,
    you need to track the changes over time. There is more to implementing indexes
    than just executing a `CREATE INDEX` statement.


    ![../images/338675_3_En_15_Chapter/338675_3_En_15_Fig1_HTML.jpg](images/338675_3_En_15_Chapter/338675_3_En_15_Fig1_HTML.jpg)


    Figure 15-1

    Indexing Method cycle


    After the last phase completes, the Indexing Method begins again with the first
    phase. In this way, indexing is a continuous and iterative process. The indexes
    that provide the best performance today may not be the best indexes for tomorrow.
    Two events primarily contribute to the need for changing indexes over time. The
    first is data usage, where the functions and features of applications can change
    over time, so the purpose of the application can also change. Second, the data
    population and distribution can, and usually will, change over time. With these
    changes, indexes may shift out of usage, and other data access paths may be required.
    Data changes aren’t the only things that can cause index use to change; the optimization
    in a future SQL Server version or service pack may change how the optimizer uses
    indexes.


    Now that the basics of the Indexing Method are covered, the remainder of this
    chapter will focus on the Implement portion. The concepts for the Monitor and
    Analyze phases are covered in Chapters [13](#338675_3_En_13_Chapter.xhtml) and
    [14](#338675_3_En_14_Chapter.xhtml), respectively. It’s important too that as
    you learn more about indexes, you will discover new patterns that can be used
    to identify indexes. As you learn more about indexing and your databases, you
    will find other ways to look at performance and usage statistics that provide
    more, or better informed, guidance. Use this book and the information you learn
    to continue to expand your indexing methodology.


    ## Implement


    The final phase of the Indexing Method is the Implement phase. This phase does
    as the name implies: it implements the indexing changes that were determined as
    necessary through the Analyze phase. There isn’t much to this phase from a process
    perspective, but there are some important steps that need to be done during the
    Implement phase that will help build out a successful process. The aim of the
    entire process is to improve the performance of the database environment. With
    this aim, there are three key points to remember during implementation:


    *   Communication

    *   Source code control (e.g., via deployment scripts)

    *   Execution


    While the last step is the only one where the database is modified, the other
    two help ensure that the changes will be noticed and that you can continue to
    use the Indexing Method in the future.


    ### Communication


    The first hurdle in modifying the indexes on any database is the need to communicate
    with management and users of the database your intent to change the database.
    Modifications to the database can often raise red flags, especially when they
    are being prescribed by nonowners of the application the database supports. Preparing
    for and implementing open lines of communication between the owners of applications
    and the database administration team will help not only in the indexing process
    but in other areas of mutual interest. Without this communication, teams can be
    blindsided by the indexing changes, which may impact something that the analysis
    did not uncover or a feature that is planned but not yet released.


    When it comes to communication, there are basically two items that need to be
    prepared for the owners of the databases: an impact analysis of the indexing changes
    and a status report of the changes after implementation.


    #### Impact Analysis


    When preparing for changes to indexing on a database, it is important to highlight
    the intended changes to the application performance. Historically, this has often
    been a guessing game. There was not a lot of easily accessed information that
    would indicate where an index is being used, how it is being used, and the frequency
    of use.


    With the processes laid out in the Monitor phase, you gain the ability to confidently
    know the use of an index. You can determine when it was last used and what operations
    were included. There is information that can also be used to identify the trend
    in which an index will no longer be used or is being used more frequently.


    Through the Analyze phase, steps were laid out that allow the identification of
    execution plans that are utilizing different indexes. Use these steps to identify
    where an index change will have an impact and then perform sample executions of
    the T-SQL statements before and after the indexing changes are made.


    In the end, the impact analysis will function in two important roles within the
    Implement phase. First, it will communicate to managers and peers the intent of
    the indexing changes, informing them of the changes to validate what is being
    done and allowing them the chance for feedback. Second, the impact analysis provides
    an insurance policy in case an index change has an unexpected negative impact.
    This isn’t to say that there won’t be negative repercussions to poor indexing
    recommendations, but with others involved and the impact documented, it is more
    likely that a negative impact can be mitigated quicker and possibly identified
    before actual implementation.'
