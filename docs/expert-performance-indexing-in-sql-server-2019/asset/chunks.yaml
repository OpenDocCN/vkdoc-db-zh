    ## Summary


    This chapter covered the need to be able to search and index the unstructured
    and semistructured data that can now be stored within SQL Server. XML indexes
    provide developers and database administrators with the options to improve the
    performance of searches through XML documents. This benefits queries both by filtering
    data in XML documents and by retrieving the data for display. Selective XML indexes
    offer the opportunity to get a more granular and detailed approach to your XML
    indexing. Just remember that XML indexes require quite considerable additional
    disk space, so you should plan your systems accordingly.


    # 5. Spatial Indexing


    The next type of indexing we need to look at is spatial indexing, which relates
    to the spatial data types. Introduced in SQL Server 2008, spatial data types advance
    the storage capabilities of SQL Server allowing data that defines shape and location
    information. Before these enhancements, spatial data was often stored as string
    or numeric values without meaning within the database and required cumbersome
    conversions and calculations to resolve the information into something meaningful.


    As part of the spatial data support, SQL Server introduced the `GEOMETRY` and
    `GEOGRAPHY` data types. These types support planar and geodetic data, respectively.
    Planar data is composed of lines, points, and polygons on a 2D plane, while geodetic
    data is composed of the same but on a geodetic ellipsoid, a fancy term describing
    a map of Earth. In simple terms, you can look at these two data types like so:
    `GEOMETRY` is a flat representation of the shape described, and `GEOGRAPHY` encompasses
    a rounded global representation.


    Spatial data indexes are unique in how they are created and interpreted. Each
    index is composed of a set of grids. These grids consist of a set of cells, laid
    out kind of like a square spreadsheet. The grids can be up to 16 × 16 and as small
    as 4 × 4. The cells within the grid contain the values that define the objects
    that define the spatial data being stored. There is a distinct difference between
    the `GEOGRAPHY` and `GEOMETRY` data types in this type of indexing. The `GEOMETRY`
    data type requires a bounding box, which is a limit on the size of the area defined
    by the index. The `GEOGRAPHY` data type does not have a bounding box since it’s
    basically bound by the size of the planet.


    This chapter will explore spatial indexes, their behaviors, and their use within
    queries to help enhance the performance of your spatial data.


    ## How Spatial Data Is Indexed


    The grids that make up a spatial index are actually nested within each other.
    At the top layer, known as level 1, you can have, for example, a 4 × 4 grid. Each
    cell within that level 1 grid then contains another grid, consisting of the number
    of cells defined for that level, in this example 4 × 4. This second grid defines
    level 2. The cells in level 2 each have a grid that defines level 3, and the cells
    there contain another grid, level 4. Figure 5-1 shows how a `GEOMETRY` index consists
    of these four levels. The index is then made up of these four grids, each one
    being composed of a series of cells. This layering and grid hierarchy, called
    `decomposing`, is created when the index is created.


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig1_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig1_HTML.jpg)


    Figure 5-1

    Grid storage representation of the GEOMETRY index storage and cells


    As many as 4 billion cells are possible, as shown in Figure 5-1. This is important
    when creating the index and determining what density to use at creation. Each
    layer, or level, can have a specified density. There are three levels of density
    (low = 4 × 4, medium = 8 × 8, and high = 16 × 16). If the density is omitted at
    the time an index is created, the default is medium. Manipulating the density
    is most commonly useful for tuning the actual space of the index. All layers may
    not be required at a high density. Save space by not using more density than you
    need.


    All this is necessary because the actual storage of the information from within
    these grids is the same B-tree that is used to store standard indexes. But the
    definitions within the storage, and obviously the retrieval of those definitions,
    are radically different within spatial indexes than they are within standard indexes.
    To get the information into the B-tree, additional processing on top of the grid
    is necessary.


    The next step in the indexing process that SQL Server performs is tessellation.
    `Tessellation` is the process that places or fits the objects into the grid hierarchy
    starting at layer 1. This process may require only the first layer of the grid
    but can require all four depending on the objects involved. Tessellation is essentially
    taking all the data from the spatial column and placing it onto the grids in cells
    while retaining each cell that is touched. The index then knows exactly how to
    go back to find the cells in each grid when a request is evaluated, using the
    B-tree.


    So far, I’ve gone over how the cells in a grid are filled and how the overall
    tessellation process is achieved. Having the cells in a grid storage and tessellation
    process, however, doesn’t sit well in theory because there are openings for the
    cells to be misused or not used efficiently based on the extreme number of touched
    cells to retain. With the `GEOMETRY` data type and indexes created on it, the
    bounding box is required because SQL Server needs a finite space. Creating such
    a box is done by using the coordinates `xmin`, `xmax` and `ymin`, `ymax`. The
    result can be visualized as a square having the x-coordinate and y-coordinate
    of the lower-left corner and the x-coordinate and y-coordinate of the upper-right
    corner. What is most critical when determining the bounding box with an index
    on a `GEOMETRY` data type is to ensure that all the objects are within the bounding
    box, without making the bounding box excessively large, with lots and lots of
    empty cells, a balancing act. An index will be effective only for the objects,
    or shapes, within the bounding box. Not containing objects within a bounding box
    could severely impact performance and cause poor performance with spatial queries.


    Furthermore, to retain the ability to use an index efficiently in the tessellation
    process, rules are applied. These rules are as follows:'
