    # 引言


    Today’s world is all about the data. From the applications to manage our lives
    to the analytics we use to guide our decisions, data is everywhere. Behind data,
    databases provide the engine to get to our data, but without the right indexes
    we lack the fuel to access our data efficiently.


    When it comes to indexes, no single structure aids in retrieving data from a database
    more than an index. New features in SQL Server provide new and unique ways to
    leverage and access your data, but without going back to the basics and ensuring
    that the data is properly indexed, you’ll find that even the new features fail
    to live up to expectations.


    Indexes represent both how data is stored and the access paths by which data can
    be retrieved from your database. Without indexes, a database is an unordered mess
    minus the roadmap to find the information you want.


    Throughout my experience working on data platforms, one of the most common resolutions
    that I provide for performance tuning and application outages is to provide the
    right indexes for the underlying databases. Often, the effort of adding an index
    or two to the most accessed tables within a database provides significant performance
    improvements—much more so than tuning the database at a per SQL statement level.
    This is because an index affects many SQL statements that are being run against
    the database lifting performance across the workload.


    Managing indexes may seem like an easy task. Unfortunately, their seeming simplicity
    is often the key to why they are overlooked. Often, there is an assumption from
    developers that the database administrators will take care of indexing. Or there
    is an assumption by the database administrators that the developers are building
    the necessary indexes as they develop features in their applications. While these
    are primarily cases of miscommunication, people need to know how to determine
    what indexes are necessary and the value of those indexes. This book provides
    that information.


    Outside of the aforementioned scenarios is the fact that applications and the
    data they use change over time. Features created and used to tune the database
    may not be as useful as expected, or a small feature change may lead to a big
    change in how the application and underlying databases are used. All of this change
    affects the database and what needs to be accessed. As time goes on, databases
    and their indexes need to be reviewed to determine if the current indexing is
    accurate for the new load. This book also provides information in this regard.'
