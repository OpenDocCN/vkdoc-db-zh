- fmt: '### Globally Unique Identifier


    The last, and definitely least beneficial, or popular, pattern for selecting a
    clustered index column is to use a globally unique identifier, also known as a
    GUID. The GUID pattern involves using a uniquely generated value to provide a
    unique value for each row in a table. This value is not integer-based and is often
    chosen because it can be generated at any location (within the topology of an
    application) and has a guarantee that it will be unique. The problem this pattern
    solves is the need to be able to generate new unique values while disconnecting
    from the source that typically controls the list of unique values. Unfortunately,
    the GUID pattern causes nearly as many issues as it solves.


    There are two main methods for generating GUID values. The first is through the
    `NEWID()` function. This function generates a 16-byte hexadecimal value that is
    partially based on the MAC address of the computer creating it at the time. Each
    value generated is unique and can start with any value from 0 to 9 or a to f.
    The next value created can be either ahead of or after the previous value in a
    sort. There is no guarantee that the next value is ever-increasing. The second
    option for generating a GUID is through `NEWSEQUENTIALID()`. This function also
    creates a 16-byte hexadecimal value. Unlike the other function, `NEWSEQUENTIALID()`
    creates new values that are greater than the previous value generated since the
    computer was last started. The last point is important: when the server restarts,
    it is possible that new values with `NEWSEQUENTIALID()` will be less than the
    value created before the restart. The logic for `NEWSEQUENTIALID()` ensures sequential
    values only from the time in which the server is started.


    As discussed, using the GUID pattern does not provide for an ever-increasing value.
    With either `NEWID()` or `NEWSEQUENTIALID()` , there is no guarantee that the
    next value will always be greater than the last value. Along with that, it does
    not provide a narrow index. When storing a GUID as a `uniqueidentifier`, it requires
    16 bytes of storage. This is the size of four `int`s or two `bigint`s. Comparatively,
    the GUID is quite large, and that value will be placed in all nonclustered indexes
    on the table. The space used for the GUID pattern can sometimes be worse than
    this, though. In some cases, when the GUID pattern is poorly implemented, the
    GUID value is stored as characters that require 36 bytes to store or 72 bytes
    if using a Unicode data type.


    Even with the failings of the GUID pattern, it does achieve some of the other
    attributes of a well-defined clustering key. First, the value is unique. With
    both the `NEWID()` and `NEWSEQUENTIALID()` functions, the values generated for
    the GUID value are unique. The value is also static since the GUID value generated
    has no business, meaning there is no reason for it to change the value.


    To demonstrate impact of implementing the GUID pattern, let’s examine its use
    on a table with a comparison to a couple other implementations. In this scenario,
    shown in Listing [11-12](#338675_3_En_11_Chapter.xhtml#PC12), there are three
    tables. Table `dbo.IndexStrategiesGUID_ICP` is designed using the Identity Column
    pattern. Table `dbo.IndexStrategiesGUID_UniqueID` is built with the GUID pattern
    using a `uniqueidentifier`, as best practices dictate. The last script contains
    table `dbo.IndexStrategiesGUID_String`, which uses a `varchar(36)` to store the
    GUID value. The last method is not the proper way to implement the GUID pattern,
    and the analysis will help highlight that. With all three tables built, insert
    statements will populate 250,000 rows to each table. The final statement in the
    scenario retrieves the number of pages used by each of the tables.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesGUID_ICP (

    RowID int IDENTITY(1,1)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_ICP PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_UniqueID (

    RowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_String (

    RowID varchar(36) DEFAULT(NEWID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_String (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    SELECT OBJECT_NAME(object_ID) as table_name, in_row_used_page_count, in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.IndexStrategiesGUID_ICP'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_UniqueID'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_String''))

    ORDER BY 1

    ```

    Listing 11-12

    Script for GUID Pattern Scenario


    Figure [11-14](#338675_3_En_11_Chapter.xhtml#Fig14) shows some output from this
    query.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig14_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig14_HTML.jpg)


    Figure 11-14

    Page counts for GUID pattern


    Unlike the other scenarios, the use of the GUID pattern is much like the Identity
    Column pattern. There are two primary differences. First, the GUID pattern does
    not provide a narrow clustering key. For the clustering key with the `uniqueidentifier`
    data type, the change in size of the clustering key requires around 400 more pages
    to store the same information (see Figure [11-14](#338675_3_En_11_Chapter.xhtml#Fig14)).
    Even worse, when improperly storing the GUID in the `varchar` data type, the table
    requires about 1,100 more pages. Without a doubt, using the GUID pattern amounts
    to a lot of wasted space in the clustered index, which would also be included
    in any nonclustered indexes on the table. The second issue with the GUID pattern
    is tied with the ever-increasing attribute of clustered indexes. As already discussed,
    GUIDs are not presented in an ordered fashion. The next value can be greater or
    less than the previous value, and this leads to a random placement of rows within
    a table, which results in fragmentation. For more information on index fragmentation
    as a result of GUIDs, read Chapter [6](#338675_3_En_6_Chapter.xhtml).


    In regard to the last two attributes of a well-defined clustering key, the GUID
    pattern does well with those. The value is static and should not be expected to
    change over time. The value is also unique. It should, in fact, be unique throughout
    the entire database. Even though the GUID pattern does achieve the two attributes
    of a well-defined clustered index, they do not mitigate the aforementioned issues
    with this pattern. The GUID pattern should be a pattern of last resort when determining
    how to build the clustered index for a table.


    ### Note

    Using the new `sp_sequence_get_range` stored procedure in conjunction with `SEQUENCE`s
    can be a valid replacement in applications using the `uniqueidentifier` pattern
    that would like to migrate to using an Identity Column pattern for clustered index
    design.'
  raw: '### Globally Unique Identifier


    The last, and definitely least beneficial, or popular, pattern for selecting a
    clustered index column is to use a globally unique identifier, also known as a
    GUID. The GUID pattern involves using a uniquely generated value to provide a
    unique value for each row in a table. This value is not integer-based and is often
    chosen because it can be generated at any location (within the topology of an
    application) and has a guarantee that it will be unique. The problem this pattern
    solves is the need to be able to generate new unique values while disconnecting
    from the source that typically controls the list of unique values. Unfortunately,
    the GUID pattern causes nearly as many issues as it solves.


    There are two main methods for generating GUID values. The first is through the
    `NEWID()` function. This function generates a 16-byte hexadecimal value that is
    partially based on the MAC address of the computer creating it at the time. Each
    value generated is unique and can start with any value from 0 to 9 or a to f.
    The next value created can be either ahead of or after the previous value in a
    sort. There is no guarantee that the next value is ever-increasing. The second
    option for generating a GUID is through `NEWSEQUENTIALID()`. This function also
    creates a 16-byte hexadecimal value. Unlike the other function, `NEWSEQUENTIALID()`
    creates new values that are greater than the previous value generated since the
    computer was last started. The last point is important: when the server restarts,
    it is possible that new values with `NEWSEQUENTIALID()` will be less than the
    value created before the restart. The logic for `NEWSEQUENTIALID()` ensures sequential
    values only from the time in which the server is started.


    As discussed, using the GUID pattern does not provide for an ever-increasing value.
    With either `NEWID()` or `NEWSEQUENTIALID(),` there is no guarantee that the next
    value will always be greater than the last value. Along with that, it does not
    provide a narrow index. When storing a GUID as a `uniqueidentifier`, it requires
    16 bytes of storage. This is the size of four `int`s or two `bigint`s. Comparatively,
    the GUID is quite large, and that value will be placed in all nonclustered indexes
    on the table. The space used for the GUID pattern can sometimes be worse than
    this, though. In some cases, when the GUID pattern is poorly implemented, the
    GUID value is stored as characters that require 36 bytes to store or 72 bytes
    if using a Unicode data type.


    Even with the failings of the GUID pattern, it does achieve some of the other
    attributes of a well-defined clustering key. First, the value is unique. With
    both the `NEWID()` and `NEWSEQUENTIALID()` functions, the values generated for
    the GUID value are unique. The value is also static since the GUID value generated
    has no business, meaning there is no reason for it to change the value.


    To demonstrate impact of implementing the GUID pattern, let’s examine its use
    on a table with a comparison to a couple other implementations. In this scenario,
    shown in Listing [11-12](#338675_3_En_11_Chapter.xhtml#PC12), there are three
    tables. Table `dbo.IndexStrategiesGUID_ICP` is designed using the Identity Column
    pattern. Table `dbo.IndexStrategiesGUID_UniqueID` is built with the GUID pattern
    using a `uniqueidentifier`, as best practices dictate. The last script contains
    table `dbo.IndexStrategiesGUID_String`, which uses a `varchar(36)` to store the
    GUID value. The last method is not the proper way to implement the GUID pattern,
    and the analysis will help highlight that. With all three tables built, insert
    statements will populate 250,000 rows to each table. The final statement in the
    scenario retrieves the number of pages used by each of the tables.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesGUID_ICP (

    RowID int IDENTITY(1,1)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_ICP PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_UniqueID (

    RowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_String (

    RowID varchar(36) DEFAULT(NEWID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_String (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    SELECT OBJECT_NAME(object_ID) as table_name, in_row_used_page_count, in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.IndexStrategiesGUID_ICP'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_UniqueID'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_String''))

    ORDER BY 1

    Listing 11-12

    Script for GUID Pattern Scenario

    ```


    Figure [11-14](#338675_3_En_11_Chapter.xhtml#Fig14) shows some output from this
    query.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig14_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig14_HTML.jpg)


    Figure 11-14


    Page counts for GUID pattern


    Unlike the other scenarios, the use of the GUID pattern is much like the Identity
    Column pattern. There are two primary differences. First, the GUID pattern does
    not provide a narrow clustering key. For the clustering key with the `uniqueidentifier`
    data type, the change in size of the clustering key requires around 400 more pages
    to store the same information (see Figure [11-14](#338675_3_En_11_Chapter.xhtml#Fig14)).
    Even worse, when improperly storing the GUID in the `varchar` data type, the table
    requires about 1,100 more pages. Without a doubt, using the GUID pattern amounts
    to a lot of wasted space in the clustered index, which would also be included
    in any nonclustered indexes on the table. The second issue with the GUID pattern
    is tied with the ever-increasing attribute of clustered indexes. As already discussed,
    GUIDs are not presented in an ordered fashion. The next value can be greater or
    less than the previous value, and this leads to a random placement of rows within
    a table, which results in fragmentation. For more information on index fragmentation
    as a result of GUIDs, read Chapter [6](#338675_3_En_6_Chapter.xhtml).


    In regard to the last two attributes of a well-defined clustering key, the GUID
    pattern does well with those. The value is static and should not be expected to
    change over time. The value is also unique. It should, in fact, be unique throughout
    the entire database. Even though the GUID pattern does achieve the two attributes
    of a well-defined clustered index, they do not mitigate the aforementioned issues
    with this pattern. The GUID pattern should be a pattern of last resort when determining
    how to build the clustered index for a table.


    ### Note


    Using the new `sp_sequence_get_range` stored procedure in conjunction with `SEQUENCE`s
    can be a valid replacement in applications using the `uniqueidentifier` pattern
    that would like to migrate to using an Identity Column pattern for clustered index
    design.'
  trans: '### 全局唯一标识符


    最后一种，也肯定是最不常用或最不受欢迎的、用于选择聚集索引列的模式是使用全局唯一标识符，也称为 GUID。GUID 模式涉及使用唯一生成的值来为表中的每一行提供唯一值。这个值不是基于整数的，选择它通常是因为它可以在任何位置（在应用程序的拓扑结构内）生成，并且保证是唯一的。该模式解决的问题是，需要在与通常控制唯一值列表的源断开连接时，能够生成新的唯一值。不幸的是，GUID
    模式引发的问题几乎和它解决的问题一样多。


    生成 GUID 值主要有两种方法。第一种是通过 `NEWID()` 函数。此函数生成一个 16 字节的十六进制值，该值部分基于创建时计算机的 MAC 地址。生成的每个值都是唯一的，并且可以以
    0 到 9 或 a 到 f 之间的任何值开头。下一个创建的值在排序中可能位于前一个值之前或之后。无法保证下一个值是永远递增的。生成 GUID 的第二个选项是通过
    `NEWSEQUENTIALID()`。此函数也创建一个 16 字节的十六进制值。与前一个函数不同，`NEWSEQUENTIALID()` 创建的新值大于自计算机上次启动以来生成的前一个值。最后一点很重要：当服务器重新启动时，使用
    `NEWSEQUENTIALID()` 生成的新值有可能小于重启前创建的值。`NEWSEQUENTIALID()` 的逻辑确保值仅在服务器启动后的时间段内是顺序的。


    如前所述，使用 GUID 模式并不能保证提供一个永远递增的值。无论是使用 `NEWID()` 还是 `NEWSEQUENTIALID()`，都无法保证下一个值总是大于上一个值。此外，它不能提供一个窄索引。当将
    GUID 存储为 `uniqueidentifier` 时，它需要 16 字节的存储空间。这相当于四个 `int` 或两个 `bigint` 的大小。相比之下，GUID
    相当大，并且这个值会被包含在表上所有的非聚集索引中。然而，GUID 模式占用的空间有时可能比这更糟。在某些情况下，如果 GUID 模式实现不当，GUID 值会存储为字符，这需要
    36 字节来存储，或者如果使用 Unicode 数据类型则需要 72 字节。


    即使 GUID 模式存在这些缺陷，它确实实现了良好定义聚集键的其他一些属性。首先，该值是唯一的。使用 `NEWID()` 和 `NEWSEQUENTIALID()`
    函数，为 GUID 生成的值都是唯一的。该值也是静态的，因为生成的 GUID 值没有业务含义，意味着没有理由去更改它。


    为了演示实现 GUID 模式的影响，让我们通过与另外几种实现的对比来检验它在一个表上的使用。在此场景中，如清单 11-12 所示，有三个表。表 `dbo.IndexStrategiesGUID_ICP`
    使用标识列模式设计。表 `dbo.IndexStrategiesGUID_UniqueID` 使用 `uniqueidentifier` 按照最佳实践构建，采用
    GUID 模式。最后一个脚本包含表 `dbo.IndexStrategiesGUID_String`，它使用 `varchar(36)` 来存储 GUID
    值。后一种方法不是实现 GUID 模式的正确方式，接下来的分析将帮助突出这一点。在三个表都构建完成后，插入语句将向每个表填充 250,000 行。场景中的最后一条语句检索每个表所使用的页数。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesGUID_ICP (

    RowID int IDENTITY(1,1)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_ICP PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_UniqueID (

    RowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_String (

    RowID varchar(36) DEFAULT(NEWID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_String (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    SELECT OBJECT_NAME(object_ID) as table_name, in_row_used_page_count, in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.IndexStrategiesGUID_ICP'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_UniqueID'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_String''))

    ORDER BY 1

    ```

    清单 11-12

    GUID 模式场景的脚本


    图 11-14 显示了此查询的一些输出。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig14_HTML.jpg](img/338675_3_En_11_Fig14_HTML.jpg)


    图 11-14

    GUID 模式的页数统计


    与其他场景不同，GUID 模式的使用很像标识列模式。主要有两个区别。首先，GUID 模式不能提供一个窄聚集键。对于使用 `uniqueidentifier`
    数据类型的聚集键，聚集键大小的变化导致存储相同信息需要大约多 400 个页（见图 11-14）。更糟糕的是，如果以 `varchar` 数据类型不当存储 GUID，表需要大约多
    1,100 个页。毫无疑问，使用 GUID 模式会导致聚集索引中浪费大量空间，这些空间也会被包含在表上的任何非聚集索引中。GUID 模式的第二个问题与聚集索引的永远递增属性有关。如前所述，GUID
    不是按顺序呈现的。下一个值可能大于或小于前一个值，这导致行在表中的随机放置，从而产生碎片。有关 GUID 导致索引碎片的更多信息，请阅读第 6 章。


    关于良好定义聚集键的最后两个属性，GUID 模式表现良好。该值是静态的，不应预期随时间改变。该值也是唯一的。事实上，它应该在整个数据库中是唯一的。即使 GUID
    模式确实实现了良好定义聚集索引的这两个属性，它们也不能缓解上述该模式的问题。在确定如何为表构建聚集索引时，GUID 模式应该是最后的手段。


    ### 注意

    对于使用 `uniqueidentifier` 模式但希望迁移到使用标识列模式进行聚集索引设计的应用程序，结合使用 `SEQUENCE` 和新的 `sp_sequence_get_range`
    存储过程可以成为一种有效的替代方案。'
- fmt: '## Nonclustered Indexes


    在前两部分中，讨论集中于堆和聚集索引，它们用于决定如何存储数据。对于堆，数据以未排序的方式存储。对于聚集索引，数据根据一组列进行排序。在几乎所有数据库中，都需要其他访问表中数据的方法，这些方法与数据存储的排序顺序不一致。这就是非聚集索引的用途。除了堆或聚集索引外，非聚集索引提供了另一种访问表中数据的方法。


    在本节中，我们将回顾与非聚集索引相关的若干模式。这些模式将有助于识别何时以及何地考虑构建非聚集索引。对于每种模式，我们将介绍其主要组成部分和可加以利用的场景。与聚集索引模式类似，每个非聚集索引模式都将包括一个或多个场景，以展示该模式的优势。将讨论的非聚集索引模式有：


    - Search Columns

    - Index Intersection

    - Multiple Column

    - Covering Index

    - Included Columns

    - Filtered Indexes

    - Foreign Keys


    在查看这些模式之前，有一些适用于所有非聚集索引的指南。这些指南不同于定义良好的聚集索引的属性。对于属性，关键目标之一是尽可能遵守它们。而对于非聚集索引指南，它们形成了一系列考量因素，这些因素有助于加强索引的合理性，但可能不会使索引的使用失效。设计索引时需要考虑的一些最常见因素如下：


    - *非聚集索引键列的更改频率如何？* 数据更改越频繁，非聚集索引中的行可能就越需要更改其在索引中的位置。

    - *索引将改善哪些频繁执行的查询？* 索引提供的整体提升越大，数据库平台的整体运行就会越好。

    - *索引支持哪些业务需求？* 支持关键业务操作但使用不频繁的索引有时比频繁使用的索引更重要。

    - *维护索引的时间成本与查询数据的时间成本相比如何？* 存在一个临界点，超过该点后，索引带来的性能提升会被创建和碎片整理索引所花费的时间以及它所需的空间所抵消。


    正如引言中提到的，索引常常感觉像是一门艺术。幸运的是，科学或统计学可以用来证明索引的价值。在回顾这些模式时，我们将研究可以应用它们的场景，并使用一些科学方法——在这种情况下是指标——来确定索引是否提供价值。用于判断索引的两件事将是执行期间的读取操作数量和执行计划的复杂性。


    ### Search Columns


    设计非聚集索引最基本和常见的模式是根据已定义或预期的搜索模式来构建它们。Search Columns 模式应该是最广为人知的模式，但也往往容易被忽视。


    如果查询将通过名字搜索包含联系人的表，那么就为名字列建立索引。如果地址表将通过城市或州进行搜索，那么就为那些列建立索引。Search Columns 模式的主要目标是减少对聚集索引的扫描，并将这些操作转移到非聚集索引上，后者可以通过非聚集索引提供更直接的数据访问路径。


    为了演示 Search Columns 模式，让我们使用本节提到的第一个场景，即联系人表。为简单起见，示例将使用一个名为 `dbo.Contacts` 的表，其中包含来自
    `AdventureWorks2017` 表 `Person.Person` 的数据（参见清单 [11-13](#338675_3_En_11_Chapter.xhtml#PC13)）。大约应有
    19,972 行插入到 `dbo.Contacts` 中，尽管具体数字取决于你的 `AdventureWorks2017` 数据库的新鲜度。


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.Contacts (

    ContactID INT IDENTITY(1, 1),

    FirstName NVARCHAR(50),

    LastName NVARCHAR(50),

    IsActive BIT,

    EmailAddress NVARCHAR(50),

    CertificationDate DATETIME,

    FillerData CHAR(1000),

    CONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED (ContactID));

    INSERT INTO dbo.Contacts (

    FirstName,

    LastName,

    IsActive,

    EmailAddress,

    CertificationDate )

    SELECT pp.FirstName,

    pp.LastName,

    IIF(pp.BusinessEntityID / 10 = 1, 1, 0),

    pea.EmailAddress,

    IIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate, NULL)

    FROM Person.Person pp

    INNER JOIN Person.EmailAddress pea

    ON pp.BusinessEntityID = pea.BusinessEntityID;

    ```

    *Listing 11-13*

    *Setup for Search Columns Pattern*


    在表 `dbo.Contacts` 建立后，对该表的第一个测试是在没有构建任何非聚集索引的情况下查询它。在示例中，如清单 [11-14](#338675_3_En_11_Chapter.xhtml#PC14)
    所示，查询是搜索名字为 Catherine 的行。执行查询显示 `dbo.Contacts` 中有 22 行符合条件（见图 [11-15](#338675_3_En_11_Chapter.xhtml#Fig15)）。为了检索这
    22 行，SQL Server 最终读取了 2,866 个页，这是表中的所有页。如图 [11-16](#338675_3_En_11_Chapter.xhtml#Fig16)
    所示，页读取是对 `dbo.Contacts` 上的 `PK_Contacts` 进行索引扫描的结果。查询的目标是从 19,000 多行中检索 22 行，因此检查表中每一页以查找
    `FirstName` 为 Catherine 的行并不是最优的方法，并且是可以避免的。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig16_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig16_HTML.jpg)

    *Figure 11-16*

    *Execution plan for Search Columns pattern*


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig15_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig15_HTML.jpg)

    *Figure 11-15*

    *Statistics I/O results for Search Columns pattern*


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    ```

    *Listing 11-14*

    *Search Columns Pattern*


    通过向 `dbo.Contacts` 添加一个非聚集索引，相对容易地就能实现最优地检索所有 Catherine 行的目标。在下一个脚本（清单 [11-15](#338675_3_En_11_Chapter.xhtml#PC15)）中，在
    `FirstName` 列上创建了一个非聚集索引。除了对 `FirstName` 的过滤外，查询还需要返回 `ContactID`。由于非聚集索引包含聚集索引键，因此
    `ContactID` 的值默认包含在索引中。'
  raw: '## Nonclustered Indexes


    In the previous two sections, the discussion focused on heaps and clustered indexes,
    which are used to determine how to store the data. With heaps, the data is stored
    unsorted. With clustered indexes, data is sorted based on one set of columns.
    In nearly all databases, there will need to be other ways of accessing the data
    in the table that don’t align with the sort order in which the data is stored.
    This is where nonclustered indexes come in. Nonclustered indexes provide another
    method for accessing data in addition to the heap or clustered index to locate
    data in a table.


    In this section, we’ll review a number of patterns that are associated with nonclustered
    indexes. These patterns will help identify when and where to consider building
    nonclustered indexes. For each pattern, we’ll go through the chief components
    and situations where it may be leveraged. Similar to the clustered index patterns,
    each nonclustered index pattern will include a scenario or two to demonstrate
    the benefit of the pattern. The nonclustered index patterns that will be discussed
    are


    *   Search Columns


    *   Index Intersection


    *   Multiple Column


    *   Covering Index


    *   Included Columns


    *   Filtered Indexes


    *   Foreign Keys


    Before you review the patterns, there are a number of guidelines that will apply
    to all the nonclustered indexes. These guidelines differ from the attributes of
    well-defined clustered indexes. With the attributes, one of the key goals was
    to adhere to them as much as possible. With the nonclustered indexing guidelines,
    they form a number of considerations that will help strengthen the case for an
    index but may not disqualify the use of the index. Some of the most common considerations
    to think of when designing indexes are the following:


    *   *What is the frequency of change for the nonclustered index key columns?*
    The more frequent the data changes, the more often the row in the nonclustered
    may need to change its position in the index.


    *   *What frequent queries will the index improve?* The greater the overall lift
    an index provides, the better the database platform will operate as a whole.


    *   *What business needs does the index support?* Infrequently used indexes that
    support critical business operations can sometimes be more important than frequently
    used indexes.


    *   *What is the cost in time to maintain the index vs. the cost in time to query
    the data?* There can be a point where the performance gain from an index is outweighed
    by the time spent creating and defragmenting an index and the space that it requires.


    As mentioned in the introduction, indexing can often feel like art. Fortunately,
    science or statistics can be used to demonstrate the value of indexes. As each
    of these patterns is reviewed, we’ll look at scenarios where they can be applied
    and use some science, or metrics in this case, to determine whether the index
    provides value. The two things that will be used to judge indexes will be reads
    during the execution and complexity of the execution plan.


    ### Search Columns


    The most basic and common pattern for designing nonclustered indexes is to build
    them based on defined or expected search patterns. The Search Columns pattern
    should be the most widely known pattern but also happens to be easily, and often,
    overlooked.


    If queries will be searching tables with contacts in them by first name, then
    index the first name column. If the address table will have searches against it
    by city or state, then index those columns. The primary goal of the Search Columns
    pattern is to reduce scans against the clustered index and move those operations
    to a nonclustered index that can provide more direct route to the data through
    a nonclustered index.


    To demonstrate the Search Columns pattern, let’s use the first scenario mentioned
    in this section, a contact table. For simplicity, the examples will use a table
    named `dbo.Contacts` that contains data from the `AdventureWorks2017` table `Person.Person`
    (see Listing [11-13](#338675_3_En_11_Chapter.xhtml#PC13)). There should be about
    19,972 rows inserted into `dbo.Contacts`, though this will vary depending on the
    freshness of your `AdventureWorks2017` database.


    ```

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.Contacts (

    ContactID INT IDENTITY(1, 1),

    FirstName NVARCHAR(50),

    LastName NVARCHAR(50),

    IsActive BIT,

    EmailAddress NVARCHAR(50),

    CertificationDate DATETIME,

    FillerData CHAR(1000),

    CONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED (ContactID));

    INSERT INTO dbo.Contacts (

    FirstName,

    LastName,

    IsActive,

    EmailAddress,

    CertificationDate )

    SELECT pp.FirstName,

    pp.LastName,

    IIF(pp.BusinessEntityID / 10 = 1, 1, 0),

    pea.EmailAddress,

    IIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate, NULL)

    FROM Person.Person pp

    INNER JOIN Person.EmailAddress pea

    ON pp.BusinessEntityID = pea.BusinessEntityID;

    Listing 11-13

    Setup for Search Columns Pattern

    ```


    With the table `dbo.Contacts` in place, the first test against the table is to
    query the table with no nonclustered indexes built on it. In the example, shown
    in Listing [11-14](#338675_3_En_11_Chapter.xhtml#PC14), the query is searching
    for rows with the first name of Catherine. Executing the query shows that there
    are 22 rows in `dbo.Contacts` that match the criteria (see Figure [11-15](#338675_3_En_11_Chapter.xhtml#Fig15)).
    To retrieve the 22 rows, SQL Server ended up reading 2,866 pages, which is all
    the pages in the table. And as Figure [11-16](#338675_3_En_11_Chapter.xhtml#Fig16)
    indicates, the page reads were the result of an index scan against `PK_Contacts`
    on `dbo.Contacts`. The aim of the query is to retrieve 22 out of the more than
    19,000 rows, so checking every page in the table for rows with Catherine for `FirstName`
    is not an optimal approach and is one that can be avoided.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig16_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig16_HTML.jpg)


    Figure 11-16


    Execution plan for Search Columns pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig15_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig15_HTML.jpg)


    Figure 11-15


    Statistics I/O results for Search Columns pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 11-14

    Search Columns Pattern

    ```


    Achieving the aim of retrieving all the rows for Catherine optimally is relatively
    simple by adding a nonclustered index to `dbo.Contacts`. In the next script (Listing
    [11-15](#338675_3_En_11_Chapter.xhtml#PC15)), a nonclustered index is created
    on the `FirstName` column. Besides the filter on `FirstName`, the query needs
    to also return `ContactID`. Since nonclustered indexes include the clustering
    index key, the value in `ContactID` is included in the index by default.'
