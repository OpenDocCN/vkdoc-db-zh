    ## 注意


    清单 6-1 中指示的文件流文件位置可能需要根据您的环境进行更改。


    要查看如何创建内存优化表，请查看清单 6-2 中的代码。在此代码示例中，您创建了表 `dbo.SalesOrderHeader`。在表架构中有两点需要注意。首先，将表创建为内存优化表的选项是
    `MEMORY_OPTIMIZED=ON` 选项。其次，是在表上包含一个 `NONCLUSTERED HASH` 索引，用于索引内存中的数据。除了这些项，该表与在
    SQL Server 中创建的任何其他表基本相同。


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int NOT NULL,

    OrderDate datetime,

    DueDate datetime,

    ShipDate datetime,

    [Status] tinyint,

    CONSTRAINT IX_SalesOrderHeader_Hash PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 35000))

    WITH (MEMORY_OPTIMIZED = ON)

    IF  OBJECT_ID(''tempdb..#tempHeader'') IS NOT NULL

    DROP TABLE #tempHeader

    SELECT SalesOrderID

    ,OrderDate

    ,DueDate

    ,ShipDate

    ,[Status]

    INTO #tempHeader

    FROM AdventureWorks2017.sales.SalesOrderHeader

    INSERT INTO dbo.SalesOrderHeader

    SELECT SalesOrderID

    ,OrderDate

    ,DueDate

    ,ShipDate

    ,[Status]

    FROM #tempHeader

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    PRINT ''Memory Optimized Table''

    SELECT *

    FROM dbo.SalesOrderHeader

    ORDER BY SalesOrderID

    PRINT ''Traditional Table''

    SELECT *

    FROM AdventureWorks2017.sales.SalesOrderHeader

    ORDER BY SalesOrderID

    SET STATISTICS IO OFF

    SET STATISTICS TIME OFF

    Listing 6-2

    Create Memory-Optimized Table

    ```


    清单 6-2 中的附加代码将数据插入 `MemOptIndexing.dbo.SalesOrderHeader` 并查询相同的数据。为了演示查询内存优化表中数据的影响，还包含了一个针对
    `AdventureWorks2017.sales.SalesOrderHeader` 的类似查询。检查清单 6-3 中显示的结果，可以得出一些关于内存优化表的见解。首先，内存优化表没有
    I/O 影响。虽然 `AdventureWorks2017.sales.SalesOrderHeader` 查询需要 689 次读取，但 `MemOptIndexing.dbo.SalesOrderHeader`
    没有读取。其次，`MemOptIndexing.dbo.SalesOrderHeader` 的 CPU 时间要低得多，为 16 毫秒，而针对 `AdventureWorks2017.sales.SalesOrderHeader`
    的查询的 CPU 时间为 78 毫秒。


