    Depending on the source and conversation, memory-optimized tables are also referred
    to as in-memory OLTP and Hekaton. This book will use the term *memory-optimized
    tables* since it aligns to the terminology used in Microsoft Books Online.


    ## Memory-Optimized Tables Overview


    Before digging into the indexing options for memory-optimized tables, let’s start
    with the basics of memory-optimized tables. A memory-optimized table is a new
    table type introduced in SQL Server 2014\. Unlike traditional tables, along with
    their indexes, memory-optimized tables reside entirely in memory. Memory-optimized
    tables are supported through disk structures but are not reliant on them for transactional
    processing. This differs compared to traditional tables, where the table is based
    on disk storage and typically only a portion of the table and its indexes are
    in memory.


    The value provided by memory-optimized tables is the performance gains that creating
    tables in this fashion provides for a database. By hosting and managing the entire
    table in memory, transactions do not need to wait for the disk to bring data to
    memory for transaction processing to proceed.


    The implementation of memory-optimized tables results in a few changes to the
    way in which tables are architected in SQL Server. First, since the tables are
    now memory resident, it makes more sense for them to be structured in a manner
    that is optimal for accessing the data in memory vs. retrieving a subset of the
    data from disk. For this reason, memory-optimized tables use hash and range indexes
    vs. B-trees for storing data. Additionally, the tables don’t synchronize to disk
    or move around in memory like a traditional table, removing the need for latching
    between disk and memory structures.


    To create memory-optimized tables in a database, there are a few things that need
    to be prepared within a database. To begin, a filegroup dedicated to memory-optimized
    data needs to be added to the database with a file to support the memory-optimized
    tables. Additionally, the database should have the property `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    enabled in most scenarios. This property hints to all transactions against memory-optimized
    tables to set the isolation level to `SNAPSHOT`. In Listing [6-1](#338675_3_En_6_Chapter.xhtml#PC1),
    the database `MemOptIndexing` is prepared using these settings.


    ```

    USE master

    GO

    IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

    DROP DATABASE MemOptIndexing

    GO

    CREATE DATABASE MemOptIndexing

    GO

    ALTER DATABASE MemOptIndexing

    ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

    --This file location may change in your environment

    ALTER DATABASE MemOptIndexing

    ADD FILE (name=''memoryOptimizedData'',

    filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

    TO FILEGROUP memoryOptimizedFG

    ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

    GO

    Listing 6-1

    Preparing Database for Memory-Optimized Tables

    ```'
  trans: '# 6. 索引内存优化表


    过去的几章重点介绍了 SQL Server 中专门用于索引的相关数据类型。SQL Server 还提供了一种驻留在内存中的特殊表，称为内存优化表或内存中表。这些表于
    SQL Server 2014 中引入，在 SQL Server 运行时完全驻留在内存中，仅依赖基于磁盘的结构来确保能够从服务重启中恢复。


    由于内存优化表主要基于内存，这对表及其索引的传统结构产生了重大影响。在本章中，你将了解内存优化表的变更如何影响你对这些表进行索引的能力，以及如何创建理想的索引。


    ### 注意

    根据来源和对话场景的不同，内存优化表也被称为内存中 OLTP 和 Hekaton。本书将使用术语 `内存优化表`，因为它与 Microsoft 在线手册中使用的术语一致。


    ## 内存优化表概述

    在深入研究内存优化表的索引选项之前，让我们先从内存优化表的基础知识开始。内存优化表是 SQL Server 2014 引入的一种新表类型。与传统表（及其索引）不同，内存优化表完全驻留在内存中。内存优化表通过磁盘结构得到支持，但不依赖这些结构进行事务处理。这与传统表不同，传统表基于磁盘存储，并且通常只有一部分表及其索引位于内存中。


    内存优化表提供的价值在于，以这种方式创建表能为数据库带来的性能提升。通过在内存中托管和管理整个表，事务无需等待磁盘将数据加载到内存中即可进行事务处理。


    内存优化表的实现导致 SQL Server 中表的架构方式发生了一些变化。首先，由于表现在常驻内存，让它们采用最适合访问内存中数据的结构，而不是从磁盘检索部分数据，这样更有意义。因此，内存优化表使用哈希索引和范围索引，而不是
    B 树来存储数据。此外，这些表不像传统表那样同步到磁盘或在内存中移动，从而消除了磁盘和内存结构之间的锁存需求。


    要在数据库中创建内存优化表，需要在数据库内准备几项内容。首先，需要向数据库添加一个专用于内存优化数据的文件组，并附带一个文件以支持内存优化表。此外，在大多数场景下，数据库应启用
    `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` 属性。此属性提示针对内存优化表的所有事务都将隔离级别设置为 `SNAPSHOT`。在代码清单
    6-1 中，使用这些设置准备了数据库 `MemOptIndexing`。


    ```

    USE master

    GO

    IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

    DROP DATABASE MemOptIndexing

    GO

    CREATE DATABASE MemOptIndexing

    GO

    ALTER DATABASE MemOptIndexing

    ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

    --此文件位置在您的环境中可能有所不同

    ALTER DATABASE MemOptIndexing

    ADD FILE (name=''memoryOptimizedData'',

    filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

    TO FILEGROUP memoryOptimizedFG

    ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

    GO

    ```


    代码清单 6-1 为内存优化表准备数据库'
- fmt: '## 注意


    [清单 6-1](#338675_3_En_6_Chapter.xhtml#PC1) 中指示的文件流文件位置可能需要根据您的环境进行更改。


    要查看如何创建内存优化表，请查看[清单 6-2](#338675_3_En_6_Chapter.xhtml#PC2)中的代码。在此代码示例中，您创建了表 `dbo.SalesOrderHeader`。在表架构中有两点需要注意。首先，将表创建为内存优化表的选项是
    `MEMORY_OPTIMIZED=ON` 选项。其次，是在表上包含一个 `NONCLUSTERED HASH` 索引，用于索引内存中的数据。除了这些项，该表与在
    SQL Server 中创建的任何其他表基本相同。


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int NOT NULL,

    OrderDate datetime,

    DueDate datetime,

    ShipDate datetime,

    [Status] tinyint,

