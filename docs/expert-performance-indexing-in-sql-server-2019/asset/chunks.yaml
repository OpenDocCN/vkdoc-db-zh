  trans: '

    ## JSON 索引


    SQL Server 2016 引入了在 SQL Server 中处理 JSON（JavaScript Object Notation）数据的能力。JSON
    定义了一种易于应用程序和人类读写的数据结构化方法。由于这种便利性，它在应用程序开发中变得非常流行。


    JSON 没有使用 XML 中的标签和属性，而是利用方括号、冒号和引号来定义实体-属性关系。例如，清单 11-33 包含了一个 XML 文档，其中定义了 WideWorldImporters
    公司某位员工的额外信息。用 JSON 表示的相同信息如清单 11-34 所示。比较两者，JSON 比 XML 表示的数据更易于阅读和理解。


    ```

    {

    "OtherLanguages": ["Polish","Chinese","Japanese"] ,

    "HireDate":"2008-04-19T00:00:00",

    "Title":"Team Member",

    "PrimarySalesTerritory":"Plains",

    "CommissionRate":"0.98"

    }

    清单 11-34

    JSON 示例

    ```


    ```

    Polish

    Chines

    Japanese


    2008-04-19T00:00:00

    Team Member

    Plains

    0.98


    清单 11-33

    XML 示例

    ```


    虽然 SQL Server 现在可以处理 JSON 数据，但 Microsoft 实现 JSON 的方式与 XML 和空间数据的实现方式略有不同。JSON
    数据没有专门的数据类型，而是存储在定义为 `varchar(max)` 和 `nvarchar(max)` 数据类型的列中。然后可以使用 `JSON_VALUE`
    或 `JSON_QUERY` 函数检索数据中的信息。这种实现方式的优点是，没有与 JSON 数据相关的特殊索引类型，这就是为什么没有专门介绍 JSON 索引的章节。相反，JSON
    数据通过使用持久化计算列的索引，利用了现有的索引功能。


    在开始介绍如何为 JSON 数据创建索引之前，我们先通过一个示例了解 JSON 函数的工作原理及其对性能的影响。首先，根据清单 11-35 提供的代码，从
    `WideWorldImporters` 数据库中的 `Application.People` 表创建 `dbo.People` 表。在该表中，我们将包含一个
    `HireDate` 列，用于从 `CustomFields` 列的 JSON 文档中提取 `HireDate`。


    ```

    USE WideWorldImporters;

    GO

    DROP TABLE IF EXISTS dbo.People;

    CREATE TABLE [dbo].[People]

    (

    [PersonID] [INT] NOT NULL,

    [FullName] NVARCHAR NOT NULL,

    [CustomFields] NVARCHAR NULL,

    [HireDate] AS JSON_VALUE([CustomFields], N''$.HireDate''),

    [Junk] VARCHAR NULL,

    CONSTRAINT [PK_People]

    PRIMARY KEY CLUSTERED ([PersonID])

    );

    GO

    INSERT INTO dbo.People

    (

    PersonID,

    FullName,

    CustomFields,

    Junk

    )

    SELECT PersonID,

    FullName,

    CustomFields,

    REPLICATE(''x'', 4000) AS Junk

    FROM Application.People;

    GO

    清单 11-35

    JSON 示例设置

    ```


    如果我们使用清单 11-36 中的代码查询 `dbo.People`，我们会发现通过计算列，我们从 JSON 数据中得到了期望的结果。不幸的是，为了检索这些结果，SQL
    Server 执行了聚集索引扫描，如图 11-50 所示。此扫描的影响是访问了表中的所有 1,111 行，图 11-49 中的统计输出表明了这一点，并导致查询产生了
    762 次读取。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig50_HTML.jpg](img/338675_3_En_11_Fig50_HTML.jpg)

    图 11-50

    计算 JSON 列的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig49_HTML.jpg](img/338675_3_En_11_Fig49_HTML.jpg)

    图 11-49

    计算 JSON 列的统计 I/O 结果


    ```

    USE WideWorldImporters;

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL;

    清单 11-36

    查询计算 JSON 列

    ```


    为了减轻计算 JSON 列对性能的影响，我们可以为该计算列添加索引，如清单 11-37 所示，然后再次执行针对 `dbo.People` 的查询。这次性能得到了极大改善。读取次数从
    762 次减少到图 11-51 显示的仅 3 次。此外，图 11-52 中的执行计划表明使用了在添加的索引上的索引查找。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig52_HTML.jpg](img/338675_3_En_11_Fig52_HTML.jpg)

    图 11-52

    计算并创建索引的 JSON 列的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig51_HTML.jpg](img/338675_3_En_11_Fig51_HTML.jpg)

    图 11-51

    计算并创建索引的 JSON 列的统计 I/O 结果


    ```

    USE WideWorldImporters;

    GO

    CREATE INDEX IX_People_HireDate ON dbo.People (HireDate);

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL

    清单 11-37

    为 JSON 计算列创建索引并进行查询

    ```


    通过利用计算列，JSON 数据可以在数据库中轻松高效地访问。而且，无需学习新的索引技术来获得这种效率，您就能够利用现有功能。这使得采用和维护 JSON 以及实现对该数据的高效查询访问变得更加容易。


    ## 索引存储策略


    本章至此介绍的策略主要集中在通过索引的键列和非键列设计来提升查询性能。在索引设计时，还可以考虑与列选择结合使用的其他选项。这些替代策略都与索引在数据库中的存储方式有关。


    有两种选项可用于处理索引如何存储其数据。这两种选项的基本前提是，索引越小，其包含的页就越少，查询数据时所需的读写操作也就越少。第一个可用选项是行压缩，第二个是页压缩。这两个选项都有潜力显著节省存储空间并提升性能。


    ### 注意

    行压缩和页压缩的使用仅限于 SQL Server 企业版。

    '
- fmt: '### Row Compression


    #### 工作原理


    第一种减小索引大小的方法是减小索引中行的大小。行压缩通过改变行中数据的存储方式来实现这一点。行压缩可用于堆表或聚集/非聚集索引。启用行压缩后，行上会发生一些变化。具体如下：


    *   修改行的元数据。

    *   定长字符数据以变长格式存储。

    *   基于数字的数据类型以变长格式存储。


    通过元数据的更改，为每个列存储的信息通常比非行压缩记录要少。行开销中多余的位被移除，信息被精简以减少浪费。不过这种更改有一个例外：对定长数据类型的一些更改可能会导致更大的行开销，以容纳数据长度和偏移量值所需的额外信息。


    对于定长字符数据，列值末尾的空白会被移除。这些信息不会丢失，且定长数据类型（如`char`和`nchar`）的行为不受影响。区别仅在于数据的存储方式。对于二进制数据，值末尾的零会被移除，类似于空白处理。从列中移除字符的信息存储在行开销中。


    数字数据类型可能是行压缩中变化最大的数据类型。对于这些数据类型，数据类型以其可能的最小形式存储。这意味着一个`bigint`数据类型的列，通常需要8字节，但如果存储的值在0到255之间，则只需要1字节。当值为256时，该列将以2字节存储该值。这个递进过程一直持续到需要以8字节存储值为止。这适用于所有基于数字的数据类型，包括`smallint`、`int`、`bigint`、`decimal`、`numeric`、`smallmoney`、`money`、`float`、`real`、`datetime`、`datetime2`、`datetimeoffset`和`timestamp`。


    #### 示例设置


    为了演示，你首先需要一个用于实现压缩的表，如代码清单[11-38](#338675_3_En_11_Chapter.xhtml#PC38)所示。此脚本创建了两个表：`dbo.NoCompression`和`dbo.RowCompression`。让我们使用这些表来演示行压缩对表大小（通过聚集索引）和查询性能的影响。


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.NoCompression'') IS NOT NULL

    DROP TABLE dbo.NoCompression;

    IF OBJECT_ID(''dbo.RowCompression'') IS NOT NULL

    DROP TABLE dbo.RowCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.NoCompression

    FROM Sales.SalesOrderDetail;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.RowCompression

    FROM Sales.SalesOrderDetail;

    Listing 11-38

    行压缩的设置

    ```


    #### 实施与性能影响


    行压缩的实现依赖于在`CREATE`或`ALTER INDEX`语句中使用`DATA_COMPRESSION`索引选项。压缩可用于聚集或非聚集索引。对于行压缩，`ROW`选项如代码清单[11-39](#338675_3_En_11_Chapter.xhtml#PC39)所示。在此示例中，向两个示例表都添加了聚集索引。在此表上使用行压缩的影响令人印象深刻；聚集索引所需的页面数量减少了35%以上（见图[11-53](#338675_3_En_11_Chapter.xhtml#Fig53)）。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig53_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig53_HTML.jpg)


    图 11-53

    行压缩输出


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_NoCompression ON dbo.NoCompression

    (SalesOrderID, SalesOrderDetailID);

    CREATE CLUSTERED INDEX CLIX_RowCompression ON dbo.RowCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = ROW);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.RowCompression''));

    Listing 11-39

    实现行压缩

    ```


    存储不是唯一得到改进的地方；查询性能也有所提高。为了演示这一优势，请执行代码清单[11-40](#338675_3_En_11_Chapter.xhtml#PC40)中的代码。在此脚本中，针对上一个示例中的表执行了两个查询。虽然查询的业务规则相同，但启用了行压缩的表在页面读取量上减少了36%以上。仅仅通过向索引添加压缩，查询所需的资源就减少了，并且无需更改查询设计即可提高性能（图[11-54](#338675_3_En_11_Chapter.xhtml#Fig54)）。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig54_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig54_HTML.jpg)


    图 11-54

    行压缩查询统计信息


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.NoCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.RowCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    Listing 11-40

    行压缩查询

    ```


    #### 实施考虑因素


    在索引上实施行压缩时，有许多事项需要考虑。首先，任何压缩使用所实现的压缩量将因所使用的数据类型和存储的数据而异。改进会（也应该）因表和时间而异。如果行的最大可能大小超过8,060字节（包括数据大小和行开销），则无法启用压缩。非聚集索引不会继承聚集索引或堆表的压缩设置；这必须在创建索引时指定。但是，如果未指定，聚集索引将继承其创建所在堆表的压缩设置。


    行压缩是一种用于更改索引存储方式的有用机制。它减小了行的大小，具有提高查询性能和减少索引存储需求的双重好处。实施行压缩时主要需要关注的是与其使用相关的额外开销；这种开销表现为CPU利用率的小幅增加，这通常会被减少的查询处理工作量所抵消，如图[11-54](#338675_3_En_11_Chapter.xhtml#Fig54)所示。除非你能证明行压缩导致了问题，否则至少在索引上始终利用行压缩可能是最佳选择。'
  raw: '### Row Compression


    The first way to reduce the size of an index is by reducing the size of the row
    on the index. Row compression achieves this by altering the way in which data
    is stored in a row. Row compression can be used on heaps or clustered and nonclustered
    indexes. There are a few things that occur on a row when row compression is enabled.
    These are as follows:


    *   Modification of the metadata for the row.


    *   Fixed-length character data is stored in a variable-length format.


    *   Numeric-based data types are stored in variable-length format.


    With the metadata changes, the information stored for each column is generally
    reduced compared to a nonrow compression record. Excessive bits in the row overhead
    are removed, and the information is streamlined to reduce waste. There is an exception
    to this change, though: some of the changes to fixed-length data types may result
    in a larger row overhead to accommodate for the additional information required
    for data length and offset values.


    For fixed-length character data, white space is removed from the end of values
    in the column. This information is not lost, and the behavior of fixed-length
    data types, such as `char` and `nchar`, is unaffected. The difference is only
    in the manner in which the data is stored. For binary data, trailing zeros on
    the value are removed, similar to white space. Information on the characters removed
    from a column is stored in the row overhead.


    Numeric data types are probably the most changed data types with row compression.
    For these data types, the data type is stored in the smallest form possible for
    the data type. This means a column with the `bigint` data type, which typically
    requires 8 bytes, would require only 1 byte if the value stored is between 0 and
    255\. At the value 256, the column would then store the value in 2 bytes. This
    progression continues until the need to store the value in 8 bytes is reached.
    This applies to all the numeric-based data types, including `smallint`, `int`,
    `bigint`, `decimal`, `numeric`, `smallmoney`, `money`, `float`, `real`, `datetime`,
    `datetime2`, `datetimeoffset`, and `timestamp`.


    To demonstrate, you first need a table on which to implement compression, which
    is provided in Listing [11-38](#338675_3_En_11_Chapter.xhtml#PC38). This script
    creates two tables, `dbo.NoCompression` and `dbo.RowCompression`. Let’s use these
    tables to demonstrate the effect of row compression on the size of the table,
    through the clustered index, and on query performance.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.NoCompression'') IS NOT NULL

    DROP TABLE dbo.NoCompression;

    IF OBJECT_ID(''dbo.RowCompression'') IS NOT NULL

    DROP TABLE dbo.RowCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.NoCompression

    FROM Sales.SalesOrderDetail;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.RowCompression

    FROM Sales.SalesOrderDetail;

    Listing 11-38

    Setup for Row Compression

    ```


    Implementation of row compression relies on the use of `DATA_COMPRESSION` index
    options on the `CREATE` or `ALTER INDEX` statement. Compression can be used on
    either clustered or nonclustered indexes. For row compression, the `ROW` option
    is shown in Listing [11-39](#338675_3_En_11_Chapter.xhtml#PC39). In this example,
    a clustered index is added to both of the example tables. The impact of using
    row compression on this table is impressive; there is a reduction of more than
    35 percent in the number of pages required for the clustered index (see Figure
    [11-53](#338675_3_En_11_Chapter.xhtml#Fig53)).


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig53_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig53_HTML.jpg)


    Figure 11-53


    Row compression output


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_NoCompression ON dbo.NoCompression

    (SalesOrderID, SalesOrderDetailID);

    CREATE CLUSTERED INDEX CLIX_RowCompression ON dbo.RowCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = ROW);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.RowCompression''));

    Listing 11-39

    Implementing Row Compression

    ```


    Storage isn’t the only place where there is an improvement; there is also an improvement
    in query performance. To demonstrate this benefit, execute the code in Listing
    [11-40](#338675_3_En_11_Chapter.xhtml#PC40). In this script, two queries are executed
    against the tables from the previous example. While the business rules for the
    queries are identical, there is more than a 36 percent reduction in page reads
    for the table with row compression. By just adding compression to the index, the
    resources required for the query are reduced, and performance is improved without
    a change to the query design (Figure [11-54](#338675_3_En_11_Chapter.xhtml#Fig54)).


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig54_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig54_HTML.jpg)


    Figure 11-54


    Row compression query statistics


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.NoCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.RowCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    Listing 11-40

    Row Compression Query

    ```


    There are a number of things that need to be considered when implementing row
    compression on an index. First, the amount of compression achieved by any use
    of compression will vary depending on the data types implemented and the data
    being stored. The improvement will, and should be expected to, vary per table
    and over time. Compression can’t be enabled if the maximum possible size of the
    row exceeds 8,060 bytes (including the size of the data and the row overhead).
    Nonclustered indexes will not inherit the compression settings of the clustered
    index or heap; this must be specified when the index is created. However, clustered
    indexes will inherit the compression settings of the heap they are being created
    on if none is specified.


    Row compression is a useful mechanism for altering how indexes are stored. It
    reduces the size of rows, which has the dual benefit of improving query performance
    and reducing storage requirements for indexes. The main thing to be concerned
    with when implementing row compression is the additional overhead associated with
    its use; this overhead materializes as a slight increase in CPU utilization which
    is usually offset by the reduced effort to process the query, as shown in Figure
    [11-54](#338675_3_En_11_Chapter.xhtml#Fig54). Unless you can prove that row compression
    is causing issues, it’s probably best to always leverage row compression at a
    minimum on indexes.'
  trans: '

    ### 行压缩


    #### 工作原理


    减小索引大小的第一种方法是减小索引中行的大小。行压缩通过改变行中数据的存储方式来实现这一点。行压缩可用于堆表或聚集/非聚集索引。启用行压缩后，行上会发生一些变化。具体如下：


    *   修改行的元数据。

    *   定长字符数据以变长格式存储。

    *   基于数字的数据类型以变长格式存储。


    通过元数据的更改，为每个列存储的信息通常比非行压缩记录要少。行开销中多余的位被移除，信息被精简以减少浪费。不过这种更改有一个例外：对定长数据类型的一些更改可能会导致更大的行开销，以容纳数据长度和偏移量值所需的额外信息。


    对于定长字符数据，列值末尾的空白会被移除。这些信息不会丢失，且定长数据类型（如`char`和`nchar`）的行为不受影响。区别仅在于数据的存储方式。对于二进制数据，值末尾的零会被移除，类似于空白处理。从列中移除字符的信息存储在行开销中。


    数字数据类型可能是行压缩中变化最大的数据类型。对于这些数据类型，数据类型以其可能的最小形式存储。这意味着一个`bigint`数据类型的列，通常需要 8 字节，但如果存储的值在
    0 到 255 之间，则只需要 1 字节。当值为 256 时，该列将以 2 字节存储该值。这个递进过程一直持续到需要以 8 字节存储值为止。这适用于所有基于数字的数据类型，包括`smallint`、`int`、`bigint`、`decimal`、`numeric`、`smallmoney`、`money`、`float`、`real`、`datetime`、`datetime2`、`datetimeoffset`和`timestamp`。


    #### 示例设置


    为了演示，你首先需要一个用于实现压缩的表，如代码清单 11-38 所示。此脚本创建了两个表：`dbo.NoCompression`和`dbo.RowCompression`。让我们使用这些表来演示行压缩对表大小（通过聚集索引）和查询性能的影响。


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.NoCompression'') IS NOT NULL

    DROP TABLE dbo.NoCompression;

    IF OBJECT_ID(''dbo.RowCompression'') IS NOT NULL

    DROP TABLE dbo.RowCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.NoCompression

    FROM Sales.SalesOrderDetail;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.RowCompression

    FROM Sales.SalesOrderDetail;

    代码清单 11-38

    行压缩的设置

    ```


    #### 实施与性能影响


    行压缩的实现依赖于在`CREATE`或`ALTER INDEX`语句中使用`DATA_COMPRESSION`索引选项。压缩可用于聚集或非聚集索引。对于行压缩，`ROW`选项如代码清单
    11-39 所示。在此示例中，向两个示例表都添加了聚集索引。在此表上使用行压缩的影响令人印象深刻；聚集索引所需的页面数量减少了 35%以上（见图 11-53）。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig53_HTML.jpg](img/338675_3_En_11_Fig53_HTML.jpg)


    图 11-53

    行压缩输出


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_NoCompression ON dbo.NoCompression

    (SalesOrderID, SalesOrderDetailID);

    CREATE CLUSTERED INDEX CLIX_RowCompression ON dbo.RowCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = ROW);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.RowCompression''));

    代码清单 11-39

    实现行压缩

    ```


    存储不是唯一得到改进的地方；查询性能也有所提高。为了演示这一优势，请执行代码清单 11-40 中的代码。在此脚本中，针对上一个示例中的表执行了两个查询。虽然查询的业务规则相同，但启用了行压缩的表在页面读取量上减少了
    36%以上。仅仅通过向索引添加压缩，查询所需的资源就减少了，并且无需更改查询设计即可提高性能（图 11-54）。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig54_HTML.jpg](img/338675_3_En_11_Fig54_HTML.jpg)


    图 11-54

    行压缩查询统计信息


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.NoCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.RowCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    代码清单 11-40

    行压缩查询

    ```


    #### 实施考虑因素


    在索引上实施行压缩时，有许多事项需要考虑。首先，任何压缩使用所实现的压缩量将因所使用的数据类型和存储的数据而异。改进会（也应该）因表和时间而异。如果行的最大可能大小超过
    8,060 字节（包括数据大小和行开销），则无法启用压缩。非聚集索引不会继承聚集索引或堆表的压缩设置；这必须在创建索引时指定。但是，如果未指定，聚集索引将继承其创建所在堆表的压缩设置。


    行压缩是一种用于更改索引存储方式的有用机制。它减小了行的大小，具有提高查询性能和减少索引存储需求的双重好处。实施行压缩时主要需要关注的是与其使用相关的额外开销；这种开销表现为
    CPU 利用率的小幅增加，这通常会被减少的查询处理工作量所抵消，如图 11-54 所示。除非你能证明行压缩导致了问题，否则至少在索引上始终利用行压缩可能是最佳选择。

