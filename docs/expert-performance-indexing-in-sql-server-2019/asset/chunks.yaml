  trans: '### 注意


    索引存在碎片，并不意味着就应该总是对其进行碎片整理。对于小表的索引，进行碎片整理通常不会有太多益处。例如，少于 8 个页面的索引将适合存储在一个区（extent）中，因此对其进行碎片整理在减少
    I/O 方面并无好处。一些微软文档和 SQL Server 专家建议不要对少于 1,000 个页面的表进行碎片整理。该值是否适用于您的数据库取决于您的数据库，但它可以作为构建索引维护策略的起点。


    碎片整理脚本将执行几个步骤来智能地整理索引：


    1.  收集碎片数据。

    2.  确定要整理哪些索引。

    3.  构建碎片整理语句。


    在开始碎片整理步骤之前，您需要一个索引维护脚本的模板。如清单 9-27 所示的模板声明了多个变量，并使用一个 `CURSOR`（游标）来遍历每个索引并执行必要的索引维护。变量在
    `DECLARE`（声明）语句中设置，阈值在本节开头定义。模板中还有一个 `table`（表）变量，用于存储数据库碎片状态的中间结果。


    ```sql

    DECLARE @MaxFragmentation TINYINT=30

    ,@MinimumPages SMALLINT=1000

    ,@SQL nvarchar(max)

    ,@ObjectName NVARCHAR(300)

    ,@IndexName NVARCHAR(300)

    ,@CurrentFragmentation DECIMAL(9, 6)

    DECLARE @FragmentationState TABLE

    (

    SchemaName SYSNAME

    ,TableName SYSNAME

    ,object_id INT

    ,IndexName SYSNAME

    ,index_id INT

    ,page_count BIGINT

    ,avg_fragmentation_in_percent FLOAT

    ,avg_page_space_used_in_percent FLOAT

    ,type_desc VARCHAR(255)

    )

    INSERT INTO @FragmentationState


    DECLARE INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR


    OPEN INDEX_CURSE

    WHILE 1=1

    BEGIN

    FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName

    ,@CurrentFragmentation

    IF @@FETCH_STATUS  0

    BREAK


    EXEC sp_ExecuteSQL @SQL

    END

    CLOSE INDEX_CURSE

    DEALLOCATE INDEX_CURSE

    清单 9-27

    索引碎片整理脚本模板

    ```


    首先，您需要收集索引的碎片数据，并将其填充到 `table`（表）变量中。在清单 9-28 的脚本中，使用了 DMF（动态管理函数）`sys.dm_db_index_physical_stats`
    并指定了 `SAMPLED`（抽样）选项。此选项用于最小化执行该 DMF 对数据库的影响。结果中包含了架构、表和索引名称，用于标识正在报告的索引，以及 `object_id`
    和 `index_id`。来自 DMF 的关于索引碎片的统计列包括在 `page_count`、`avg_fragmentation_in_percent`
    和 `avg_page_space_used_in_percent` 列中。结果中的最后一列是 `has_LOB_column`。此列是关联子查询的结果，用于确定索引中的任何列是否为
    LOB（大型对象）类型，而 LOB 类型不允许联机索引重建。


    ```sql

    SELECT

    s.name as SchemaName

    ,t.name as TableName

    ,t.object_id

    ,we.name as IndexName

    ,we.index_id

    ,x.page_count

    ,x.avg_fragmentation_in_percent

    ,x.avg_page_space_used_in_percent

    ,we.type_desc

    FROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, ''SAMPLED'') x

    INNER JOIN sys.tables t ON x.object_id = t.object_id

    INNER JOIN sys.schemas s ON t.schema_id = s.schema_id

    INNER JOIN sys.indexes we ON x.object_id = we.object_id AND x.index_id = we.index_id

    WHERE x.index_id > 0

    AND x.avg_fragmentation_in_percent > 0

    AND alloc_unit_type_desc = ''IN_ROW_DATA''

    清单 9-28

    收集碎片数据的脚本

    ```


    清单 9-28 的查询结果因每个读者而异。通常，结果应类似于图 9-24，其中包含来自 `AdventureWorks2017` 数据库的聚集索引、非聚集索引和
    XML 索引。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig24_HTML.jpg](img/338675_3_En_9_Fig24_HTML.jpg)


    **图 9-24** 表碎片数据的查询结果


    碎片整理脚本的下一步是构建需要整理的索引列表。通过清单 9-29 创建的索引列表用于填充游标。然后，游标遍历每个索引以执行碎片整理。脚本中一个值得注意的点是，对于聚集索引，所有底层索引都将被重建。这在整理索引碎片时不是必须的，但可以作为一个考虑选项。当表上只有少数几个索引时，这可能是一种值得采用的管理方式。随着索引数量的增加，这种方法的吸引力可能会降低。此查询的结果应类似于图
    9-25 中的结果。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig25_HTML.jpg](img/338675_3_En_9_Fig25_HTML.jpg)


    **图 9-25** 用于重建/重组操作的索引


    ```sql

    SELECT  QUOTENAME(x.SchemaName)+''.''+QUOTENAME(x.TableName)

    ,CASE WHEN x.type_desc = ''CLUSTERED'' THEN ''ALL''

    ELSE QUOTENAME(x.IndexName) END

    ,x.avg_fragmentation_in_percent

    FROM    @FragmentationState x

    LEFT OUTER JOIN @FragmentationState y ON x.object_id = y.object_id AND y.index_id
    = 1

    WHERE   (

    x.type_desc = ''CLUSTERED''

    AND y.type_desc = ''CLUSTERED''

    )

    OR y.index_id IS NULL

    ORDER BY x.object_id

    ,x.index_id

    清单 9-29

    识别碎片化索引的脚本

    ```


    模板的最后一部分是实现核心功能的地方。换句话说，清单 9-30 中的脚本用于构建用于整理索引碎片的 `ALTER INDEX`（修改索引）语句。此时，会检查碎片级别以确定是发出
    `REBUILD`（重建）还是 `REORGANIZATION`（重组）命令。对于支持 `ONLINE`（联机）索引重建的索引，`CASE`（情况）语句会添加适当的语法。


    ```sql

    SET @SQL = CONCAT(''ALTER INDEX '', @IndexName,'' ON '',@ObjectName,

    CASE WHEN @CurrentFragmentation <= 30 THEN '' REORGANIZE;''

    ELSE '' REBUILD'' END,

    CASE WHEN CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition'')) LIKE ''Enterprise%''

    OR CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition)) LIKE ''Developer%''

    THEN '' WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) '' END, '';'');

    清单 9-30

    构建索引碎片整理语句的脚本

    ```'
- fmt: '# 使用T-SQL脚本进行索引碎片整理


    ### 注意事项


    SQL Server 2017 企业版的一项改进是能够在索引包含大对象（LOB）数据类型列时执行在线索引重建。


    将所有这些部分结合到本节开头的模板中，以创建索引碎片整理脚本，可提供与维护计划任务类似的功能。通过能够设置发生碎片整理的大小和碎片级别，该脚本从真正需要对其执行工作的索引中移除碎片，而不是仅仅整理数据库中的每个索引。在
    `AdventureWorks2017` 数据库上使用 Extended Events 来跟踪脚本输出，发现之前查询结果的 `ALTER INDEX` 语法与清单
    [9-31](#338675_3_En_9_Chapter.xhtml#PC31) 中的类似。


    ```sql

    ALTER INDEX ALL ON [HumanResources].[EmployeePayHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [HumanResources].[JobCandidate] REORGANIZE; WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [dbo].[AllocationCycle] REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [dbo].[PageCompression] REORGANIZE; WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [Sales].[SalesPersonQuotaHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ```

    *清单 9-31 索引碎片整理语句*


    正如本节代码所演示的，使用 T-SQL 脚本可能比仅使用维护计划任务复杂得多。复杂性的优点在于，一旦脚本完成，就可以将其封装在存储过程并用于您所有的 SQL
    Server 实例。该脚本旨在作为使用 T-SQL 脚本自动化碎片整理的第一步。它没有考虑分区表，也没有在重建或重组索引之前检查索引是否正在被使用。好处在于，与对数据库进行“卡车式”的全面重新索引不同，脚本化解决方案可以智能地决定如何以及何时整理索引碎片。


    ### 注意事项


    要获取完整的索引碎片整理解决方案，请查看 Ola Hallengren 的索引维护脚本：[`https://ola.hallengren.com`](https://ola.hallengren.com)。


    ## 预防碎片


    索引内的碎片并不总是必然发生的。可以利用一些方法来减缓碎片发生的速率。当您拥有经常受到碎片影响的索引时，建议调查碎片产生的原因。有几种策略可以帮助缓解碎片：填充因子、数据类型和默认值。


    ### 填充因子


    填充因子是在构建或重建索引时可以使用的一个选项。此属性用于确定在首次创建索引或下次重建索引时，索引中每个数据页应保留多少可用空间。例如，填充因子为 75 时，每个数据页大约留出
    25% 的空白空间。


    如果索引遇到大量或频繁的碎片，调整填充因子以缓解碎片是值得的。通过这样做，导致碎片的活动影响应该会减小，从而降低需要整理索引碎片的频率。


    默认情况下，SQL Server 创建所有索引时填充因子为 0。这是服务器和数据库级别的推荐值。并非所有索引都是相同的，填充因子应根据需要应用，而不是作为一项全面的保险策略。此外，填充因子
    0 与填充因子 100 相同。


    填充因子的一个缺点是，在数据页中留出可用空间意味着索引需要更多的数据页来存储所有记录。更多的页面意味着更多的 I/O，并且如果存在可选的备用索引，索引的利用率可能会降低。


    ### 数据类型


    避免碎片的另一种方法是通过适当的数据类型选择。此策略适用于长度可能根据其包含的数据而改变的数据类型。这些数据类型如 `VARCHAR` 和 `NVARCHAR`，它们的长度会随时间变化。


    在许多情况下，可变长度数据类型非常适合表中的列。当数据的波动性较高且数据长度也易变时，问题就会出现。随着数据长度的变化，可能会发生页拆分，从而导致碎片。如果长度波动发生在索引的大部分区域，那么页拆分的数量也可能很大，从而导致碎片。


    一个关于不良数据类型的绝佳例子来自我使用第一个数据仓库的经验。许多表的原始设计包括一个数据类型为 `VARCHAR(10)` 的列。该列填充了格式为 `yyyymmdd`
    的日期，值类似于 `20191011`。作为导入过程的一部分，日期值被更新为 `yyyy-mm-dd` 格式。当导入过程投入生产并一次处理数百万行时，列长度从
    8 个字符增加到 10 个字符，由于页拆分，导致了惊人的碎片水平。解决问题的办法很简单，就是将列的数据类型从 `VARCHAR(10)` 改为 `CHAR(10)`。


    如此简单的解决方案可以应用于许多数据库。这只需要对碎片产生的原因进行一些调查。


    ### 默认值


    正确应用默认值似乎不能帮助防止碎片，但在某些情况下，它可能对碎片产生显著影响。此类缓解措施的典型代表是数据库使用 `uniqueidentifier` 数据类型时。


    在大多数情况下，`uniqueidentifier` 值是使用 `NEWID()` 函数生成的。此函数创建一个全局唯一标识符（GUID），该标识符在整个地球范围内都应该是唯一的。这对于为行生成唯一标识符很有用，但其作用域可能大于您的数据库。在许多情况下，唯一值可能只需要对服务器或仅对表唯一。


    `NEWID()` 函数的主要问题是生成 GUID 不是一个顺序过程。正如本章开头所演示的，使用此函数为聚集索引键生成值可能导致严重的碎片。


    `NEWID()` 函数的一个替代方案是 `NEWSEQUENTIALID()` 函数。此函数像另一个函数一样返回 GUID，但在值的生成方式上有几个不同之处。首先，在服务器上，该函数生成的每个
    GUID 都是前一个值的顺序值。第二个变化是，生成的 GUID 值仅对生成它的服务器是唯一的。如果另一个 SQL Server 实例为同一表使用此函数生成
    GUID，则可能会生成重复的值，并且这些值不会是顺序的，因为它们的作用域是服务器级别。


