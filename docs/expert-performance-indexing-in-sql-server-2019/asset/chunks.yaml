- fmt: '# SQL Server中的CXPACKET等待与索引优化


    ## 关于并行等待


    存在第二种并行等待名为`CXCONSUMER`，它标识与并行操作符相关的等待，这些操作符正在等待线程向操作符发送行。这通常不是一个可操作的等待，超出了本书的讨论范围。


    解决`CXPACKET`等待的两种常见方法是调整服务器属性“最大并行度”和“并行查询的成本阈值”。与并行等待的第一个原因一样，使用这些服务器属性来解决并行问题也超出了本书的范围。有效利用这两个属性的方法是存在的，但本书的重点是索引，而非限制并行度和成本。简单来说，“最大并行度”限制了单个查询在并行处理期间可以使用的CPU核心总数。而“并行查询的成本阈值”则提高了SQL
    Server确定查询可以使用并行处理的阈值，但不限制并行的范围。


    本书范围内的是通过索引来缓解`CXPACKET`等待，这可以与查询调优相结合。要解决并行运行查询的索引问题，我们首先需要识别正在使用并行的查询。有多种方法可以识别参与并行操作的查询和索引。


    ### 检查执行计划缓存


    第一种方法是检查在先前执行中使用了并行的执行计划。通过这种方法，可以查询计划缓存以识别包含并行操作符的执行计划。这提供了一个理想的查询列表，可以调优它们以减少I/O消耗或消除对并行查询的需求。对并行查询的需求有时可归因于底层表上的索引不当。例如，在表上利用扫描的并行操作，可以通过一个支持查询中谓词或排序的索引来缓解。清单`14-26`提供了一个查询计划缓存中利用并行的执行计划列表。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ) AS [database_name],

    IIF([p].[objectid]  0,

    CONCAT(

    QUOTENAME(DB_NAME([p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))

    ),

    NULL) AS [object_name],

    [cp].[objtype],

    [p].[query_plan],

    [cp].[usecounts] AS [use_counts],

    [cp].[plan_handle],

    CAST('''' AS XML) AS [sql_text]

    FROM [sys].[dm_exec_cached_plans] AS [cp]

    CROSS APPLY [sys].[dm_exec_query_plan]([cp].[plan_handle]) AS [p]

    CROSS APPLY [sys].[dm_exec_sql_text]([cp].[plan_handle]) AS [q]

    WHERE [cp].[cacheobjtype] = ''Compiled Plan''

    AND [p].[query_plan].[exist](''//RelOp[@Parallel = "1"]'') = 1

    ORDER BY COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ),

    [cp].[usecounts] DESC;

    ```

    清单 `14-26`

    计划缓存中利用并行的执行计划


    ## 警告


    本章包含多个针对计划缓存和查询存储执行的查询。这些是通过`DMOs`访问的，它们提供了对SQL Server中执行计划的访问，允许对服务器上当前和最近的执行活动进行调查。虽然这些信息非常有用，但在生产系统上执行此代码时请务必小心。对这些视图执行过于昂贵的查询可能会影响SQL
    Server的性能。请务必在非生产环境中测试并监控此类查询，然后再在生产环境中使用。


    ### 查询查询存储


    下一种方法类似于使用计划缓存，但是改为查询查询存储。假设查询存储正在数据库上运行，`sys.query_store_plan`中有一个列标识并行计划。结合其他几个`DMOs`，你可以获得一个包含并行操作符的T-SQL语句列表。清单`14-27`提供了一个从查询存储返回并行查询的查询，其中包含该T-SQL语句的执行次数统计。使用查询存储的一个优点是，它可以将结果限制在单个数据库内。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SELECT IIF([qsq].[object_id]  0,

    CONCAT(

    QUOTENAME(DB_NAME()),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),

    ''.'',

    QUOTENAME(OBJECT_NAME([qsq].[object_id]))

    ),

    NULL) AS [object_name],

    CAST([qsp].[query_plan] AS XML) AS [query_plan],

    [deqs].[execution_count],

    CAST('''' AS XML) AS [sql_text],

    [qsp].[engine_version],

    [qsp].[compatibility_level],

    [qsq].[query_parameterization_type_desc],

    [qsp].[is_forced_plan],

    [deqs].[total_worker_time]

    FROM [sys].[query_store_plan] AS [qsp]

    INNER JOIN [sys].[query_store_query] AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]

    INNER JOIN [sys].[query_store_query_text] AS [qsqt] ON [qsq].[query_text_id] =
    [qsqt].[query_text_id]

    INNER JOIN sys.[dm_exec_query_stats] AS deqs ON [last_compile_batch_sql_handle]
    = [deqs].[sql_handle]

    WHERE [qsp].[is_parallel_plan] = 1

    ORDER BY [deqs].[execution_count] DESC,

    [deqs].[total_worker_time] DESC;

    ```

    清单 `14-27`

    查询存储中利用并行的执行计划


    ### 检查当前执行的计划


    调查并行等待的另一种方法是研究当前正在执行的计划。此信息在`DMO sys.dm_os_tasks`中可用，它返回当前正在使用多个工作线程的等待；清单`14-28`提供了一个检索此信息的示例查询。此查询提供了一个当前正在执行的并行计划列表。


    ```sql

    WITH executing

    AS (SELECT er.session_id,

    er.request_id,

    MAX(ISNULL(exec_context_id, 0)) AS number_of_workers,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle

    FROM sys.dm_exec_requests er

    INNER JOIN sys.dm_os_tasks t ON er.session_id = t.session_id

    INNER JOIN sys.dm_exec_sessions es ON er.session_id = es.session_id

    WHERE es.is_user_process = 0x1

    GROUP BY er.session_id,

    er.request_id,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle)

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.session_id,

    e.request_id,

    e.number_of_workers,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (CASE

    WHEN e.statement_end_offset = -1 THEN LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2

    ELSE e.statement_end_offset END - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM executing e

    CROSS APPLY sys.dm_exec_sql_text(e.plan_handle) st

    CROSS APPLY sys.dm_exec_query_plan(e.plan_handle) qp

    WHERE number_of_workers > 0;

    ```

    清单 `14-28`

    当前正在执行的并行查询'
  raw: '### Note


    There is a second parallelism wait named CXCONSUMER that identifies waits associated
    with parallel operators waiting for threads to send rows to the operator. This
    is generally not an actionable wait and is outside the context of this book.


    Two approaches that are common for addressing CXPACKET waits are to adjust the
    max degree of parallelism and cost threshold for parallelism server properties.
    As with the first cause of parallelism waits, addressing parallelism with these
    server properties is outside the context of the book. There are valid approaches
    for utilizing these two properties, but the focus here is on indexing rather than
    constraining the degree and cost of parallelism. For a simple explanation, the
    max degree of parallelism limits the total number of cores that any single query
    can use during parallel processing. Alternatively, the cost threshold for parallelism
    increases the threshold in which SQL Server determines that a query can use parallelism,
    without limiting the scope of the parallelism.


    What is within the context here is mitigating CXPACKET waits through indexing,
    which can be paired with query tuning. To address the indexing for queries running
    in parallel, we need to first identify the queries that are using parallelism.
    There are a number of ways that we can identify queries and indexes participating
    in parallel operations.


    The first method is to examine execution plans that have used parallelism in previous
    executions. For this approach, the plan cache is able to be queried to identify
    the execution plans that were created that contain parallel operators. This provides
    an ideal list of queries that tune to reduce the I/O consumed or remove the need
    for a parallel query. The need for the parallel query can sometimes be attributed
    to improper indexing on the underlying tables. For instance, a parallel operation
    on a table that leverages a scan may be alleviated with an index that supports
    the predicates or sorts within the query. The query in Listing [14-26](#338675_3_En_14_Chapter.xhtml#PC26)
    provides a list of execution plans in the plan cache that utilize parallelism.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ) AS [database_name],

    IIF([p].[objectid]  0,

    CONCAT(

    QUOTENAME(DB_NAME([p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))

    ),

    NULL) AS [object_name],

    [cp].[objtype],

    [p].[query_plan],

    [cp].[usecounts] AS [use_counts],

    [cp].[plan_handle],

    CAST('''' AS XML) AS [sql_text]

    FROM [sys].[dm_exec_cached_plans] AS [cp]

    CROSS APPLY [sys].[dm_exec_query_plan]([cp].[plan_handle]) AS [p]

    CROSS APPLY [sys].[dm_exec_sql_text]([cp].[plan_handle]) AS [q]

    WHERE [cp].[cacheobjtype] = ''Compiled Plan''

    AND [p].[query_plan].[exist](''//RelOp[@Parallel = "1"]'') = 1

    ORDER BY COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ),

    [cp].[usecounts] DESC;

    Listing 14-26

    Execution Plans in the Plan Cache That Utilize Parallelism

    ```


    ### Warning


    This chapter features a number of queries that are executed against the plan cache
    and Query Store. These are accessed through DMOs that provide access to the execution
    plans in SQL Server, which allows for investigations into current and recent execution
    activity on the server. While this information is extremely useful, take care
    when executing this code on production systems. An overly expensive query against
    these can impact the performance of your SQL Server. Be sure to monitor these
    types of queries and test them in nonproduction environments before using in a
    production environment.


    The next method is similar to using the plan cache, but instead to query the Query
    Store. Provided this is running on the database, there is a column in sys.query_store_plan
    that identifies parallel plans. Using this with a few other DMOs gets you a list
    of T-SQL statements that have parallel operators. A query that returns parallel
    queries from the Query Store is provided in Listing [14-27](#338675_3_En_14_Chapter.xhtml#PC27),
    which includes a count of the number of executions for the T-SQL statement. One
    advantage to using the Query Store is that it limits the results down to a single
    database.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SELECT IIF([qsq].[object_id]  0,

    CONCAT(

    QUOTENAME(DB_NAME()),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),

    ''.'',

    QUOTENAME(OBJECT_NAME([qsq].[object_id]))

    ),

    NULL) AS [object_name],

    CAST([qsp].[query_plan] AS XML) AS [query_plan],

    [deqs].[execution_count],

    CAST('''' AS XML) AS [sql_text],

    [qsp].[engine_version],

    [qsp].[compatibility_level],

    [qsq].[query_parameterization_type_desc],

    [qsp].[is_forced_plan],

    [deqs].[total_worker_time]

    FROM [sys].[query_store_plan] AS [qsp]

    INNER JOIN [sys].[query_store_query] AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]

    INNER JOIN [sys].[query_store_query_text] AS [qsqt] ON [qsq].[query_text_id] =
    [qsqt].[query_text_id]

    INNER JOIN sys.[dm_exec_query_stats] AS deqs ON [last_compile_batch_sql_handle]
    = [deqs].[sql_handle]

    WHERE [qsp].[is_parallel_plan] = 1

    ORDER BY [deqs].[execution_count] DESC,

    [deqs].[total_worker_time] DESC;

    Listing 14-27

    Execution Plans in the Query Store That Utilize Parallelism

    ```


    Another method for parallelism waits is to investigate plans that are currently
    executing. This information is available in the DMO sys.dm_os_tasks which returns
    waits which are currently using multiple workers; a sample query to retrieve this
    information is provided in Listing [14-28](#338675_3_En_14_Chapter.xhtml#PC28).
    This query provides a list of currently executing parallel plans.


    ```

    WITH executing

    AS (SELECT er.session_id,

    er.request_id,

    MAX(ISNULL(exec_context_id, 0)) AS number_of_workers,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle

    FROM sys.dm_exec_requests er

    INNER JOIN sys.dm_os_tasks t ON er.session_id = t.session_id

    INNER JOIN sys.dm_exec_sessions es ON er.session_id = es.session_id

    WHERE es.is_user_process = 0x1

    GROUP BY er.session_id,

    er.request_id,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle)

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.session_id,

    e.request_id,

    e.number_of_workers,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (CASE

    WHEN e.statement_end_offset = -1 THEN LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2

    ELSE e.statement_end_offset END - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM executing e

    CROSS APPLY sys.dm_exec_sql_text(e.plan_handle) st

    CROSS APPLY sys.dm_exec_query_plan(e.plan_handle) qp

    WHERE number_of_workers > 0;

    Listing 14-28

    Parallel Queries Currently Executing

    ```'
  trans: '# SQL Server 中的 CXPACKET 等待与索引优化


    ## 关于并行等待


    存在另一种名为 `CXCONSUMER` 的并行等待，它指示与正在等待线程向操作符发送行的并行操作符相关的等待。这通常不是一个可操作的等待，超出了本书的讨论范围。


    解决 `CXPACKET` 等待的两种常见方法是调整服务器属性“最大并行度”和“并行查询的成本阈值”。与并行等待的第一个原因一样，使用这些服务器属性来解决并行问题也超出了本书的范围。存在有效利用这两个属性的方法，但本书的重点是索引，而非限制并行度和成本。简而言之，“最大并行度”限制了单个查询在并行处理期间可以使用的
    CPU 核心总数。而“并行查询的成本阈值”则提高了 SQL Server 确定查询可以使用并行处理的阈值，但不限制并行的范围。


    本书范围内的是通过索引来缓解 `CXPACKET` 等待，这可以与查询调优相结合。要解决并行运行查询的索引问题，我们首先需要识别正在使用并行的查询。有多种方法可以识别参与并行操作的查询和索引。


    ### 检查执行计划缓存


    第一种方法是检查在先前执行中使用了并行的执行计划。通过这种方法，可以查询计划缓存以识别包含并行操作符的执行计划。这提供了一个理想的查询列表，可以调优它们以减少
    I/O 消耗或消除对并行查询的需求。对并行查询的需求有时可归因于底层表上的索引不当。例如，在表上利用扫描的并行操作，可以通过一个支持查询中谓词或排序的索引来缓解。清单
    `14-26` 提供了一个查询计划缓存中利用并行的执行计划列表。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].value[1]'', ''nvarchar(128)'')

    ) AS [database_name],

    IIF([p].[objectid]  0,

    CONCAT(

    QUOTENAME(DB_NAME([p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))

    ),

    NULL) AS [object_name],

    [cp].[objtype],

    [p].[query_plan],

    [cp].[usecounts] AS [use_counts],

    [cp].[plan_handle],

    CAST('''' AS XML) AS [sql_text]

    FROM [sys].[dm_exec_cached_plans] AS [cp]

    CROSS APPLY [sys].dm_exec_query_plan AS [p]

    CROSS APPLY [sys].dm_exec_sql_text AS [q]

    WHERE [cp].[cacheobjtype] = ''Compiled Plan''

    AND [p].[query_plan].exist = 1

    ORDER BY COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].value[1]'', ''nvarchar(128)'')

    ),

    [cp].[usecounts] DESC;

    ```

    清单 `14-26`

    计划缓存中利用并行的执行计划


    ## 警告


    本章包含多个针对计划缓存和查询存储执行的查询。这些是通过 `DMOs` 访问的，它们提供了对 SQL Server 中执行计划的访问，允许对服务器上当前和最近的执行活动进行调查。虽然这些信息非常有用，但在生产系统上执行此代码时请务必小心。对这些视图执行过于昂贵的查询可能会影响
    SQL Server 的性能。请务必在非生产环境中测试并监控此类查询，然后再在生产环境中使用。


    ### 查询查询存储


    下一种方法类似于使用计划缓存，但是改为查询查询存储。假设查询存储正在数据库上运行，`sys.query_store_plan` 中有一个列标识并行计划。结合其他几个
    `DMOs`，你可以获得一个包含并行操作符的 T-SQL 语句列表。清单 `14-27` 提供了一个从查询存储返回并行查询的查询，其中包含该 T-SQL 语句的执行次数统计。使用查询存储的一个优点是，它可以将结果限制在单个数据库内。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SELECT IIF([qsq].[object_id]  0,

    CONCAT(

    QUOTENAME(DB_NAME()),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),

    ''.'',

    QUOTENAME(OBJECT_NAME([qsq].[object_id]))

    ),

    NULL) AS [object_name],

    CAST([qsp].[query_plan] AS XML) AS [query_plan],

    [deqs].[execution_count],

    CAST('''' AS XML) AS [sql_text],

    [qsp].[engine_version],

    [qsp].[compatibility_level],

    [qsq].[query_parameterization_type_desc],

    [qsp].[is_forced_plan],

    [deqs].[total_worker_time]

    FROM [sys].[query_store_plan] AS [qsp]

    INNER JOIN [sys].[query_store_query] AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]

    INNER JOIN [sys].[query_store_query_text] AS [qsqt] ON [qsq].[query_text_id] =
    [qsqt].[query_text_id]

    INNER JOIN sys.[dm_exec_query_stats] AS deqs ON [last_compile_batch_sql_handle]
    = [deqs].[sql_handle]

    WHERE [qsp].[is_parallel_plan] = 1

    ORDER BY [deqs].[execution_count] DESC,

    [deqs].[total_worker_time] DESC;

    ```

    清单 `14-27`

    查询存储中利用并行的执行计划


    ### 检查当前执行的计划


    调查并行等待的另一种方法是研究当前正在执行的计划。此信息在 `DMO sys.dm_os_tasks` 中可用，它返回当前正在使用多个工作线程的等待；清单
    `14-28` 提供了一个检索此信息的示例查询。此查询提供了一个当前正在执行的并行计划列表。


    ```sql

    WITH executing

    AS (SELECT er.session_id,

    er.request_id,

    MAX(ISNULL(exec_context_id, 0)) AS number_of_workers,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle

    FROM sys.dm_exec_requests er

    INNER JOIN sys.dm_os_tasks t ON er.session_id = t.session_id

    INNER JOIN sys.dm_exec_sessions es ON er.session_id = es.session_id

    WHERE es.is_user_process = 0x1

    GROUP BY er.session_id,

    er.request_id,

    er.sql_handle,

    er.statement_start_offset,

    er.statement_end_offset,

    er.plan_handle)

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.session_id,

    e.request_id,

    e.number_of_workers,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (CASE

    WHEN e.statement_end_offset = -1 THEN LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2

    ELSE e.statement_end_offset END - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM executing e

    CROSS APPLY sys.dm_exec_sql_text(e.plan_handle) st

    CROSS APPLY sys.dm_exec_query_plan(e.plan_handle) qp

    WHERE number_of_workers > 0;

    ```

    清单 `14-28`

    当前正在执行的并行查询'
- fmt: 'The second way is to start an Extended Events session, capture transaction
    information, and then group that information on the available call stack. The
    session, defined in Listing 14-29, retrieves all the parallel waits as they occur
    and groups them by their T-SQL stack. Before running the script, ensure that the
    value for the `CXPACKET` wait type matches the value in the query; for SQL Server
    2019, the value is `265`. The T-SQL stack contains all the SQL statements that
    contribute to a final execution point. For example, drilling through an execution
    stack can provide information on a stored procedure that is executing a function
    that executes a single T-SQL statement. This provides information that can be
    used to track where the parallel wait is occurring. These statements are grouped
    using the `histogram` target, which allows us to minimize the size of the collection
    and focus on the items causing the most `CXPACKET` waits on the system.


    ```sql

    USE master;

    GO

    SELECT name,

    map_key,

    map_value

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types''

    AND map_value = ''CXPACKET'';

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''ex_cxpacket''

    )

    DROP EVENT SESSION ex_cxpacket ON SERVER;

    GO

    CREATE EVENT SESSION [ex_cxpacket]

    ON SERVER

    ADD EVENT sqlos.wait_info

    (ACTION (

    sqlserver.plan_handle,

    sqlserver.tsql_stack)

    WHERE ([wait_type] = (265)

    AND [sqlserver].[is_system] = (0)))

    ADD TARGET package0.histogram

    (SET filtering_event_name = N''sqlos.wait_info'', slots = (2048), source = N''sqlserver.tsql_stack'',
    source_type = (1))

    WITH (STARTUP_STATE = ON);

    GO

    ALTER EVENT SESSION ex_cxpacket ON SERVER STATE = START;

    GO

    ```


    Listing 14-29 Extended Events Session for CXPACKET


    Once the Extended Events session has collected data for a while, the sessions
    with the most waits can be looked at more closely. Listing 14-30 provides a list
    of all the `CXPACKET` waits that have been collected and the statements and query
    plans associated with them. Once we know these, investigate the indexes being
    used to determine which are resulting in low selectivity or unexpected scans.


    ```sql

    WITH XData

    AS (SELECT CAST(target_data AS XML) AS TargetData

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''ex_cxpacket''

    AND target_name = ''histogram''),

    ParsedEvent

    AS (SELECT c.value(''(@count)[1]'', ''bigint'') AS event_count,

    c.value(''xs:hexBinary(substring((value/frames/frame/@handle)[1],3))'', ''varbinary(255)'')
    AS sql_handle,

    c.value(''(value/frames/frame/@offsetStart)[1]'', ''int'') AS statement_start_offset,

    c.value(''(value/frames/frame/@offsetEnd)[1]'', ''int'') AS statement_end_offset

    FROM XData d

    CROSS APPLY TargetData.nodes(''//Slot'') t(c) )

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.event_count,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (IIF(e.statement_end_offset = -1, LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2, e.statement_end_offset)

    - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM ParsedEvent e

    CROSS APPLY sys.dm_exec_sql_text(e.sql_handle) st

    CROSS APPLY (

    SELECT plan_handle

    FROM sys.dm_exec_query_stats qs

    WHERE e.sql_handle = qs.sql_handle

    GROUP BY plan_handle

    ) x

    CROSS APPLY sys.dm_exec_query_plan(x.plan_handle) qp

    ORDER BY e.event_count DESC;

    ```


    Listing 14-30 Query to View CXPACKET Extended Events Session


    #### IO_COMPLETION


    The `IO_COMPLETION` wait type happens when SQL Server is waiting for I/O operations
    to complete for non–data page I/Os, such as index pages. Even though this wait
    is related to nondata operations, there are still some indexing-related actions
    that can be taken when this wait is high for the SQL Server instance.


    First, review the state of `Full Scans/sec` on the server. If there is an issue
    with that performance counter, the operations under that counter could bleed through
    to nondata pages that are being used to manage the indexes. In cases where the
    two of these are high, place additional emphasis on analyzing `Full Scans/sec`
    issues.


    The second action that we can take is to review the missing index information
    within the SQL Server instance. That information is discussed in Chapter 7. Adding
    missing indexes can shift the pressure of the data being consumed to new structures
    where the query may no longer need to wait for the nondata I/Os to complete since
    the query now leverages a different index.


    Next, consider the volume of page splits occurring on the index; page splits affect
    nondata pages when they reallocate the pages to new pages. Heavy page split activity
    will result in high non–data page I/Os which can be the source of or related to
    these waits.


    Finally, if the cause of the `IO_COMPLETION` issues is not apparent, investigate
    them with an Extended Events session. This type of analysis is outside the scope
    of this book since these causes would likely be non-index-related. The method
    used for investigating `CXPACKET` could apply and would be a place to start the
    investigation.'
