    ## 索引操作与 `user_updates`


    最后一个索引操作是 `user_updates`。`user_updates` 列不仅限于表上的更新操作。实际上，它涵盖了在表上发生的所有 `INSERT`、`UPDATE`
    和 `DELETE` 操作。为了演示这一点，你可以执行代码清单 3-19 中的代码。这段代码将向 `SalesOrderDetail` 表插入一条记录，然后更新该记录，最后从表中删除该记录。由于外键关系导致这些操作的执行计划比较复杂，本示例中未包含它们。


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO Sales.SalesOrderDetail

    (SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID, UnitPrice,
    UnitPriceDiscount, ModifiedDate)

    SELECT SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID,
    UnitPrice, UnitPriceDiscount, GETDATE() AS ModifiedDate

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderDetailID = 1;

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''999-99-9999''

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    DELETE FROM Sales.SalesOrderDetail

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    ```


    *代码清单 3-19: 索引更新查询*


    代码清单执行完成后，表上发生了三个操作。对于每个操作，`sys.dm_db_index_usage_stats` 都在 `user_updates` 列累积了一个计数。执行代码清单
    3-20 中的代码，以查看索引上发生的活动。结果将与图 3-15 中的类似。除了对 `SalesOrderDetail` 的聚集索引进行的更改外，对非聚集索引进行的更新也包含在内。能够看到对表进行插入、更新或删除操作的影响，有助于理解用户的影响以及数据的易变性。


    ![images/338675_3_En_3_Chapter/338675_3_En_3_Fig15_HTML.jpg](img/338675_3_En_3_Fig15_HTML.jpg)


