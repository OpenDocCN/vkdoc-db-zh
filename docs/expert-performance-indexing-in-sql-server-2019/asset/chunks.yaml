  trans: '

    # 列存储碎片化


    列存储索引是 SQL Server 较新的功能之一。列存储索引的一个有趣特性是其段的只读性质。如第 2 章所述，当新的列存储索引被添加到增量表时，增量表最终会被压缩成列存储格式。此外，由于段是只读的，删除操作不会立即影响段，这导致包含不再属于表中数据的只读段碎片产生。


    为了演示这两个概念，请执行代码清单 9-18 中的代码来准备一个具有聚集列存储索引的表。表建立后，将插入两组行。第一组包含 1,000 行，然后重新组织索引以强制行组压缩为列存储格式。第二组包含
    105,000 行，超过了自动触发使用列存储格式的 104,000 阈值。如图 9-16 所示，插入的记录全部被压缩为列存储格式。


    ### 注意


    根据你的环境，代码清单 9-18 中的脚本可能需要运行一段时间。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig16_HTML.jpg](img/338675_3_En_9_Fig16_HTML.jpg)


    图 9-16 列存储行组结果集


    ```sql

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactOnlineSalesCI'') IS NOT NULL

    DROP TABLE dbo.FactOnlineSalesCI

    CREATE TABLE dbo.FactOnlineSalesCI(

    [OnlineSalesKey] [int] NOT NULL,

    [DateKey] [datetime] NOT NULL,

    [StoreKey] [int] NOT NULL,

    [ProductKey] [int] NOT NULL,

    [PromotionKey] [int] NOT NULL,

    [CurrencyKey] [int] NOT NULL,

    [CustomerKey] [int] NOT NULL,

    [SalesOrderNumber] nvarchar NOT NULL,

    [SalesOrderLineNumber] [int] NULL,

    [SalesQuantity] [int] NOT NULL,

    [SalesAmount] [money] NOT NULL,

    [ReturnQuantity] [int] NOT NULL,

    [ReturnAmount] [money] NULL,

    [DiscountQuantity] [int] NULL,

    [DiscountAmount] [money] NULL,

    [TotalCost] [money] NOT NULL,

    [UnitCost] [money] NULL,

    [UnitPrice] [money] NULL,

    [ETLLoadID] [int] NULL,

    [LoadDate] [datetime] NULL,

    [UpdateDate] [datetime] NULL

    )

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT *

    FROM dbo.FactOnlineSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactOnlineSalesCI_CCI ON dbo.FactOnlineSalesCI

    DECLARE @we int= 1

    WHILE @we <= 5

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 1000 *

    FROM dbo.FactOnlineSales

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REORGANIZE

    WITH (COMPRESS_ALL_ROW_GROUPS =ON)

    SET @we += 1

    END

    WHILE @we <= 10

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 105000 *

    FROM dbo.FactOnlineSales

    SET @we += 1

    END

    SELECT*

    FROM sys.column_store_row_groups

    WHERE object_id=OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

    ```

    代码清单 9-18 准备列存储表


    此时有趣的一点是，创建的行组远小于行组的最大大小（约 1 百万行）。由于它们较小，可能有机会通过增加每个行组的记录数来优化它们使用的页数。这可以通过维护列存储索引并重建它来实现。为了展示重建列存储索引的价值，请执行代码清单
    9-19 中的代码。通过这个，你可以看到重建前的逻辑读取在两次扫描操作中为 83,423，然后在重建后下降到 833 次逻辑读取，如图 9-17 所示。这几乎是访问页数减少了
    100%。如果你考虑这种类型的维护对使用列存储索引的大型事实表的影响，这类页的过度分配将极大地影响性能。此外，比较图 9-16 和 9-18，表在重建列存储索引后行组也少得多，从
    34 个减少到 14 个。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig18_HTML.jpg](img/338675_3_En_9_Fig18_HTML.jpg)


    图 9-18 列存储索引重建后的行组统计信息


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig17_HTML.jpg](img/338675_3_En_9_Fig17_HTML.jpg)


    图 9-17 列存储表插入操作的 I/O 统计信息


    ```sql

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    SET STATISTICS IO OFF

    SELECT *

    FROM sys.column_store_row_groups

    WHERE object_id = OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

    ```

    代码清单 9-19 插入操作对列存储表的影响


    列存储索引发生的另一种碎片化类型是通过删除操作。虽然这被称为*碎片化*，但实际上当对列存储索引执行删除时，行并不会从索引中移除；它们只是被标记为已删除。因此，分配给聚集列存储索引的页，如果其所有记录都被删除，仍将在索引中保持活动状态。


    为了展示其影响，你将使用代码清单 9-20 中的脚本从表中删除所有 2007 年的数据。然后，另一个语句将重建列存储索引。在这些操作之间，你将运行一个聚合查询，以观察删除操作对查询
    I/O 的影响。


    ```sql

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    DELETE FROM dbo.FactOnlineSalesCI

    WHERE DateKey <''2008-01-01''

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    SET STATISTICS IO OFF

    ```

    代码清单 9-20 对聚集列存储索引的删除操作


    运行这些查询并重建索引后，结果相当有趣。如果从第一个查询开始，聚合查询有 659 次逻辑读取，如图 9-19 所示。删除一年的数据后，聚合查询需要 79,982
    次逻辑读取，这比返回行数少 365 行的原始查询还要多。这是因为管理已删除行所需的页增加了。重建后，I/O 次数显著下降到 444 次逻辑读取。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig19_HTML.jpg](img/338675_3_En_9_Fig19_HTML.jpg)


    图 9-19 删除操作演示的统计 I/O 结果


    通过添加新行和删除现有行，有理由考虑列存储索引的维护需求。影响这些索引的问题与传统聚集索引的不同，但它们同样重要。


    ### 碎片化问题


    你已经看到了索引可能碎片化的多种方式，但还没有讨论为什么这很重要。索引内的碎片化可能成为问题有几个重要原因：


    *   索引 I/O


    *   连续读取


    随着索引碎片化的增加，这两个方面都会影响索引的性能表现。在一些最坏的情况下，碎片化程度可能非常严重，以至于查询优化器将停止在查询计划中使用该索引。

    '
- fmt: '# Index I/O


    I/O is an area of SQL Server where it is easy to have performance bottlenecks;
    likewise, there are a multitude of solutions to help mitigate the bottlenecks.
    From the perspective of this chapter, you are concerned with the effect of fragmentation
    on I/O.


    Since page splits are often the cause of fragmentation, they provide a good place
    to start investigating the effect of fragmentation on I/O. To review, when a page
    split occurs, half the contents on the page are moved off the page and onto another
    page. Generally speaking, if the original page was 100 percent full, then both
    pages would be about 50 percent full. In essence, it will take two I/Os to read
    from storage the same amount of information that required one I/O prior to the
    page split. This increase in I/Os will drive up reads and writes and thus can
    have a negative effect on performance.


    To validate that effect of fragmentation on I/O, let’s walk through another fragmentation
    example. This time you’ll build a table, populate it with some data, and perform
    an update to generate page splits and fragmentation. The code in Listing [9-22](#338675_3_En_9_Chapter.xhtml#PC22)
    will perform these operations. The last portion of the script will query `sys.dm_db_partition_stats`
    to return the number of pages that have been reserved for the index. Execute the
    fragmentation script from Listing [9-21](#338675_3_En_9_Chapter.xhtml#PC21). You’ll
    see the index at this point is more than 99 percent fragmented, and the results
    from Listing [9-14](#338675_3_En_9_Chapter.xhtml#PC14) show the index is using
    209 pages. See Figure [9-20](#338675_3_En_9_Chapter.xhtml#Fig20) for the results.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig20_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig20_HTML.jpg)


    Figure 9-20: Fragmentation of `CLUS_IndexIO`


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.IndexIO'') IS NOT NULL

    DROP TABLE dbo.IndexIO;

    CREATE TABLE dbo.IndexIO

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.IndexIO (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_IndexIO ON dbo.IndexIO(RowID);

    UPDATE dbo.IndexIO

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```


    Listing 9-22: Script to Build Index I/O Example


    ```sql

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.IndexIO''),NULL,NULL,''DETAILED'')

    ```


    Listing 9-21: View Index Fragmentation for I/O Example


    But would removing the fragmentation from the index have a noticeable impact on
    the number of pages in the index? As the demo will demonstrate, reducing fragmentation
    does have an impact.


    Continuing, the next thing to do is to remove the fragmentation from the index.
    To accomplish this, execute the `ALTER INDEX` statement in Listing [9-23](#338675_3_En_9_Chapter.xhtml#PC23)
    to remove the fragmentation. In the rest of the chapter, we’ll discuss the mechanics
    of removing fragmentation from an index, so for the time being, this statement
    won’t be explained. The effect of this command is that all the fragmentation has
    been removed from the index. Figure [9-21](#338675_3_En_9_Chapter.xhtml#Fig21)
    shows the results from Listing [9-23](#338675_3_En_9_Chapter.xhtml#PC23). They
    show that the number of pages that the index is using dropped from 585 to 417.
    The effect of removing the fragmentation is an impressive reduction of almost
    30 percent in pages in the index.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig21_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig21_HTML.jpg)


    Figure 9-21: Page count resulting from rebuild operations


    ```sql

    USE AdventureWorks2017

    GO

    ALTER INDEX CLUS_IndexIO ON dbo.IndexIO REBUILD

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```


    Listing 9-23: Script to Rebuild Index to Remove Fragmentation


    This proves that fragmentation can have an effect on the number of pages in an
    index. The more pages in an index, the more reads are required to get the data
    you need. Reducing the count of pages can help with allowing SQL Server databases
    to process more data in the same number of reads or to improve the speed in which
    they read the same information across fewer pages.


    # Contiguous Reads


    The other negative effect that fragmentation can have on performance relates to
    contiguous reads. Within SQL Server, contiguous reads affect its ability to utilize
    read-ahead operations. Read-ahead allows SQL Server to request pages into memory
    that are expected to be used. Rather than waiting for an I/O request to be generated
    for the page, SQL Server can read large blocks of pages into memory with the expectation
    that the data pages will be used by the query in the future.


    Going back to indexes, we previously discussed how fragmentation within an index
    occurs as a result of breaks in the continuity of physical data pages in an index.
    Every time there is a break in the physical pages, I/O operations must change
    the place in which data is being read from SQL Server. This is how fragmentation
    creates a hindrance in contiguous reads.


    ## Defragmentation Options


    SQL Server offers a number of ways in which fragmentation can be removed or mitigated
    within an index. Each of the methods has pros and cons associated with using it.
    In this section, you’ll look at the options and the reasons for using each one.


    # Index Rebuild


    The first method for removing fragmentation from an index is to rebuild the index.
    Rebuilding an index builds a new contiguous copy of the index. When the new index
    is complete, the existing index is dropped. Index rebuild operations are accomplished
    through either a `CREATE INDEX` or `ALTER INDEX` statement. Typically, indexes
    with more than 30 percent fragmentation are considered good candidates for index
    rebuilds. Note that 30 percent and lower levels of fragmentation in most databases
    will not show as a large negative impact on performance. The usage of 30 percent
    is a good starting point, but each database and index usage should be reviewed
    and adjusted if performance shows more negative effects with less than 30 percent
    fragmentation of the index.


    The chief benefit of performing an index rebuild is that the resulting new index
    has contiguous pages. When an index is highly fragmented, sometimes the best way
    to resolve the fragmentation is to simply start over with the index and rebuild.
    Another benefit of rebuilding an index is that the index options can be modified
    during the rebuild. Lastly, for most indexes, the index can remain online while
    it is being rebuilt.'
