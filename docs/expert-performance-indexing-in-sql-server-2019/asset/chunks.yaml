    the DMV `sys.dm_db_index_usage_stats` will be counted into the `user_seeks` column.
    Listing [3-14](#338675_3_En_3_Chapter.xhtml#PC14) provides a query to investigate
    this. If you are following along, you should see the results in Figure [3-10](#338675_3_En_3_Chapter.xhtml#Fig10).
    As the results show, the value in the `user_seeks` column is 5, which matches
    the count of operations from Listing [3-13](#338675_3_En_3_Chapter.xhtml#PC13).
    Based on this, you know that two queries were executed using the index and both
    were able to utilize the index to go directly to rows that were requested.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig10_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Query results for index_seeks


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.last_user_seek

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-14

    Query for index_seeks from sys.dm_db_index_usage_stats

    ```


    The next usage column is `user_scans` . The value of this column is increased
    whenever a query executes, and it must scan through every row of an index. For
    instance, consider a query on sales details that is unfiltered and must return
    all records or a query that is filtered on a column that is unindexed. Both of
    these queries, shown in Listing [3-15](#338675_3_En_3_Chapter.xhtml#PC15), are
    asking SQL Server for either everything it has in a table or a few rows that it
    doesn’t have a location on. The only way to accommodate this request would be
    through a scan of the `SalesOrderDetail` table. Figure [3-11](#338675_3_En_3_Chapter.xhtml#Fig11)
    shows the execution plans for these two queries.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig11_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Query plans for seek queries


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM  Sales.SalesOrderDetail;

    SELECT * FROM  Sales.SalesOrderDetail

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    Listing 3-15

    Index Scan Queries

    ```


    When index scans occur, they can be seen in `sys.dm_db_index_usage_stats`. The
    query in Listing [3-16](#338675_3_En_3_Chapter.xhtml#PC16) provides a view in
    the DMV to see the accumulation of the scans. Since there were two scans, one
    for each of the two queries, the results in Figure [3-12](#338675_3_En_3_Chapter.xhtml#Fig12)
    show that there have been two operations under `user_scans`. This information
    can be useful when trying to troubleshoot situations where there are large numbers
    of scans on a table. By looking at this information, you are able to find the
    indexes with high scans and then begin to look at why queries using those indexes
    are using scans over more optimal operations such as index seeks.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig12_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Query results for index_scans


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_scans

    ,ius.last_user_scan

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-16

    Query for index_scans from sys.dm_db_index_usage_stats

    ```


    The third column in the DMV is `user_lookups` . User lookups occur when a seek
    on a nonclustered index occurs but the index does not have all of the required
    columns in it to satisfy the query. When this happens, the query must look up
    the columns from the clustered index. An example would be a query against the
    `SalesOrderDetail` table that is returning the `ProductID` and `CarrierTrackingNumber`
    columns, which is filtered on `ProductID`; Listing [3-17](#338675_3_En_3_Chapter.xhtml#PC17)
    shows this query. Figure [3-13](#338675_3_En_3_Chapter.xhtml#Fig13) shows the
    query plan from this query. The query plan shows a seek on the nonclustered index
    and a key lookup on the clustered index.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig13_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Query plans for seek and key lookup


    ```

    USE AdventureWorks2017

    GO

    SELECT ProductID, CarrierTrackingNumber

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 778

    GO

    Listing 3-17

    Index Lookup Query

    ```


    In `sys.dm_db_index_usage_stats`, there will be a tally of one for both `user_seeks`
    and `user_lookups`. To access these values, use Listing [3-18](#338675_3_En_3_Chapter.xhtml#PC18),
    which will return the results in Figure [3-14](#338675_3_En_3_Chapter.xhtml#Fig14).
    Patterns between these columns can help with determining proper clustering keys
    or identifying when to modify indexes to avoid the key lookups. Key lookups aren’t
    necessarily bad but can be a performance bottleneck if overused and left unchecked.
    I’ll discuss more on what to look for in regard to `user_lookups` in later chapters.'
  trans: '## 用户列


    `sys.dm_db_index_usage_stats` 中的下一组列是用户列。用户列有助于深入了解索引如何在查询计划中被具体使用。这些列列于表 3-9
    中；它们包含每种操作发生次数的统计信息以及最后一次发生的时间。


    **表 3-9 sys.dm_db_index_usage_stats 中的用户列**


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `user_seeks` | `bigint` | 用户查询执行查找操作的总次数。 |

    | `user_scans` | `bigint` | 用户查询执行扫描操作的总次数。 |

    | `user_lookups` | `bigint` | 用户查询执行书签/键查找操作的总次数。 |

    | `user_updates` | `bigint` | 用户查询执行更新操作的总次数。 |

    | `last_user_seek` | `datetime` | 最后一次用户查找的日期和时间。 |

    | `last_user_scan` | `datetime` | 最后一次用户扫描的日期和时间。 |

    | `last_user_lookup` | `datetime` | 最后一次用户查找的日期和时间。 |

    | `last_user_update` | `datetime` | 最后一次用户更新的日期和时间。 |


    `sys.dm_db_index_usage_stats` 监视四种类型的索引操作。这些操作通过 `user_seeks`、`user_scans`、`user_lookups`
    和 `user_updates` 列来体现。


    第一个索引用法列是 `user_seeks`。每当查询执行并返回单个行或行范围，且该查询具有直接访问路径时，就会发生此列对应的操作。例如，如果查询执行并检索单个订单或一小段订单范围的所有销售明细，类似于清单
    3-13 中的查询，则这些查询的查询计划将使用查找操作（参见图 3-9）。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig9_HTML.jpg](img/338675_3_En_3_Fig9_HTML.jpg)

    图 3-9 查找查询的查询计划


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659;

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43659 AND 44659;

    清单 3-13 索引查找查询

    ```


    运行清单 3-13 中的查询后，DMV `sys.dm_db_index_usage_stats` 中的 `user_seeks` 列计数将会增加。清单 3-14
    提供了一个查询来检查这一点。如果你跟着操作，应该会看到如图 3-10 所示的结果。结果显示，`user_seeks` 列的值为 5，这与清单 3-13 中的操作次数相符。据此，你知道有两个查询使用了索引执行，并且两者都能利用索引直接定位到请求的行。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig10_HTML.jpg](img/338675_3_En_3_Fig10_HTML.jpg)

    图 3-10 index_seeks 的查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.last_user_seek

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    清单 3-14 查询 sys.dm_db_index_usage_stats 中的 index_seeks

    ```


    下一个用法列是 `user_scans`。每当查询执行且必须扫描索引的每一行时，此列的值就会增加。例如，考虑一个对销售明细的、未经过滤的查询，它必须返回所有记录，或者一个在未建索引列上进行过滤的查询。清单
    3-15 所示的这两个查询，要么是向 SQL Server 请求表中的所有内容，要么是请求它无法定位的少数几行。满足此请求的唯一方法就是扫描 `SalesOrderDetail`
    表。图 3-11 展示了这两个查询的执行计划。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig11_HTML.jpg](img/338675_3_En_3_Fig11_HTML.jpg)

    图 3-11 扫描查询的查询计划


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM  Sales.SalesOrderDetail;

    SELECT * FROM  Sales.SalesOrderDetail

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    清单 3-15 索引扫描查询

    ```


    当发生索引扫描时，可以在 `sys.dm_db_index_usage_stats` 中看到它们。清单 3-16 中的查询提供了一个在 DMV 中查看扫描累积情况的方法。由于有两个扫描，每个查询对应一个，图
    3-12 的结果显示在 `user_scans` 下已有两次操作。在尝试排查表上存在大量扫描的情况时，此信息非常有用。通过查看此信息，你能够找到扫描次数高的索引，然后开始研究为什么使用这些索引的查询会采用扫描，而不是更优的操作（如索引查找）。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig12_HTML.jpg](img/338675_3_En_3_Fig12_HTML.jpg)

    图 3-12 index_scans 的查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_scans

    ,ius.last_user_scan

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    清单 3-16 查询 sys.dm_db_index_usage_stats 中的 index_scans

    ```


    DMV 中的第三列是 `user_lookups`。当在非聚集索引上发生查找，但该索引不包含满足查询所需的所有列时，就会发生用户查找。发生这种情况时，查询必须从聚集索引中查找这些列。一个例子是对
    `SalesOrderDetail` 表的查询，它返回 `ProductID` 和 `CarrierTrackingNumber` 列，并在 `ProductID`
    上进行过滤；清单 3-17 显示了此查询。图 3-13 显示了此查询的查询计划。该查询计划显示了在非聚集索引上的查找和在聚集索引上的键查找。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig13_HTML.jpg](img/338675_3_En_3_Fig13_HTML.jpg)

    图 3-13 查找和键查找的查询计划


    ```

    USE AdventureWorks2017

    GO

    SELECT ProductID, CarrierTrackingNumber

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 778

    GO

    清单 3-17 索引查找查询

    ```


    在 `sys.dm_db_index_usage_stats` 中，`user_seeks` 和 `user_lookups` 的计数都将增加一。要访问这些值，请使用清单
    3-18，它将返回图 3-14 中的结果。这些列之间的模式有助于确定合适的聚簇键，或识别何时需要修改索引以避免键查找。键查找不一定不好，但如果过度使用且不加检查，可能会成为性能瓶颈。关于在
    `user_lookups` 方面需要关注什么，我将在后续章节中进一步讨论。'
- fmt: '![images/338675_3_En_3_Chapter/338675_3_En_3_Fig14_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig14_HTML.jpg)


    **Figure 3-14**: Query results for `index_lookups`


    ```sql

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.user_lookups

    ,ius.last_user_lookup

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    ```


    *Listing 3-18: Query for `index_lookups` from `sys.dm_db_index_usage_stats`*


    ## Index Operations and `user_updates`


    The last of the index operations is `user_updates`. The `user_updates` column
    is not limited to update operations on a table. In actuality, it covers all `INSERT`,
    `UPDATE`, and `DELETE` operations that occur on a table. To demonstrate this,
    you can execute the code in Listing [3-19](#338675_3_En_3_Chapter.xhtml#PC19).
    This code will insert a record into the `SalesOrderDetail` table, then update
    the record, and finally delete the record from the table. Since the execution
    plans for these are complex because of foreign key relationships, they have not
    been included in this example.


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO Sales.SalesOrderDetail

    (SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID, UnitPrice,
    UnitPriceDiscount, ModifiedDate)

    SELECT SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID,
    UnitPrice, UnitPriceDiscount, GETDATE() AS ModifiedDate

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderDetailID = 1;

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''999-99-9999''

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    DELETE FROM Sales.SalesOrderDetail

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    ```


    *Listing 3-19: Index Update Queries*


    At the completion of the execution of the code listing, there were three operations
    that occurred on the table. For each of these operations, `sys.dm_db_index_usage_stats`
    accumulated one tick in the `user_updates` column. Execute the code in Listing
    [3-20](#338675_3_En_3_Chapter.xhtml#PC20) to see the activity that occurred on
    the index. The results will be similar to those in Figure [3-15](#338675_3_En_3_Chapter.xhtml#Fig15).
    Besides the changes made to the clustered index for `SalesOrderDetail`, the updates
    made to the nonclustered indexes are also included. Being able to see the effects
    of an insert, update, or delete on a table can help provide an understanding of
    the impact of users and the volatility of your data.


    ![images/338675_3_En_3_Chapter/338675_3_En_3_Fig15_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig15_HTML.jpg)


    **Figure 3-15**: Query results for `index_updates`


    ```sql

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_updates

    ,ius.last_user_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    ```


    *Listing 3-20: Query for `index_updates` from `sys.dm_db_index_usage_stats`*


    ### System Columns


    The last set of columns in `sys.dm_db_index_usage_stats` is the system columns.
    The system columns return the same general information as the user columns, except
    these values are from the perspective of background processes. Whenever something
    triggers within SQL Server, such as a triggered statistics update, that activity
    will be tracked through these columns. Table [3-10](#338675_3_En_3_Chapter.xhtml#Tab10)
    lists the system columns.


    **Table 3-10**: System Columns in `sys.dm_db_index_usage_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | Number of seeks by system queries. |

    | `system_scans` | `bigint` | Number of scans by system queries. |

    | `system_lookups` | `bigint` | Number of lookups by system queries. |

    | `system_updates` | `bigint` | Number of updates by system queries. |

    | `last_system_seek` | `datetime` | Time of last system seek. |

    | `last_system_scan` | `datetime` | Time of last system scan. |

    | `last_system_lookup` | `datetime` | Time of last system lookup. |

    | `last_system_update` | `datetime` | Time of last system update. |


    For the most part, these columns can be ignored. It is good, though, to understand
    how they are aggregated. To see an example, execute the code in Listing [3-21](#338675_3_En_3_Chapter.xhtml#PC21),
    which may run up to a minute. This will change a majority of the rows in the `SalesOrderDetail`
    table. Since more than 20 percent of the rows have changed, an automatic statistics
    update will be triggered. The statistics update is not directly related to user
    activity and is instead a background, or system, process.


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    ```


    *Listing 3-21: Update for `Sales.SalesOrderDetail`*


    After the update has completed, run the T-SQL statements in Listing [3-22](#338675_3_En_3_Chapter.xhtml#PC22).
    This code will return results from `sys.stats` and the system columns from `sys.dm_db_index_usage_stats`,
    shown in Figure [3-16](#338675_3_En_3_Chapter.xhtml#Fig16). Within these is the
    `system_scans` column which shows three system scans have occurred on `Sales.SalesOrderDetail`.
    These related to statistics updates, one of which occurred on the `UnitPriceDiscount`
    column. Looking at the times when the statistics were created, you can see that
    they were on `CarrierTrackingNumber`, then `SalesOrderDetailId`, `ModifiedDate`,
    and finally `UnitPriceDiscount`.


    ![images/338675_3_En_3_Chapter/338675_3_En_3_Fig16_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig16_HTML.jpg)


    **Figure 3-16**: `sys.stats` and `sys.dm_db_index_usage_stats` system columns
    query results


    ```sql

    USE AdventureWorks2017

    GO

    SELECT S.object_id,

    S.name,

    S.auto_created,

    STATS_DATE(S.object_id, S.stats_id),

    X.stats_column_names

    FROM sys.stats S

    CROSS APPLY

    (

    SELECT STRING_AGG(C.name, '','') AS stats_column_names

    FROM sys.stats_columns SC

    INNER JOIN sys.columns C

    ON C.object_id = SC.object_id

    AND C.column_id = SC.column_id

    WHERE S.object_id = SC.object_id

    AND S.stats_id = SC.stats_id

    ) X

    WHERE S.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    SELECT OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.system_seeks

    ,ius.system_scans

    ,ius.system_lookups

    ,ius.system_updates

    ,ius.last_system_seek

    ,ius.last_system_scan

    ,ius.last_system_lookup

    ,ius.last_system_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    ```


    *Listing 3-22: Query for System Columns in `sys.dm_db_index_usage_stats`*


    From a usefulness perspective, there isn’t much of anything that can be gleaned
    from these columns. They are just the result of background processes and are more
    there to inform what is happening with indexes in the background.


    ### Index Usage Stats Summary


    In this section, I discussed the statistics found in DMV `sys.dm_db_index_usage_stats`.
    This DMV provides some extremely useful statistics about how and if indexes are
    being used in the database. By monitoring these statistics over the long run,
    you will be able to understand which indexes are providing some of the most value.
    Strategies for using all these columns to index for performance will be discussed
    in Chapter [8](#338675_3_En_8_Chapter.xhtml).'
