    should be used when creating indexes. The first situation is when you need to
    place an index on a column that is configured as sparse. In this case, the expected
    number of rows that will have the value will be small compared to the total number
    of rows. One of the benefits of using sparse columns is avoiding the storage costs
    associated with storing `NULL` values in these columns. Make certain that the
    indexes on these columns don’t store the `NULL` values by not using filtered indexes.
    The second situation is when you need to enforce uniqueness on a column that can
