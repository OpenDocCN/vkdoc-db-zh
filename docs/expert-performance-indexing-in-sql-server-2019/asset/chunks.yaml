    Using the Search Columns pattern is probably the most important first step in
    applying nonclustered indexing patterns on your databases. It provides the alternative
    paths for accessing data that can be the difference between getting your data
    from a couple pages vs. thousands of pages. The Search Columns example in this
    section shows building an index on a single column. The next few patterns will
    expand on this foundation.


    ### Index Intersection


    The aim of the Search Columns pattern is to create an index that will minimize
    the page reads for a query and improve the performance of it. Sometimes, though,
    the queries go beyond the single column example that was demonstrated. Additional
    columns may be part of the predicate or returned in the `SELECT` statement. One
    of the ways to address this is to create nonclustered indexes that include the
    additional columns. When there are indexes that can satisfy each of the predicates
    in the `WHERE` clause, SQL Server can utilize multiple nonclustered indexes to
    find the rows between both that match on the clustering key. This operation is
    called Index Intersection.


    To demonstrate the Index Intersection pattern, let’s first review what happens
    when the filtering is expanded to cover multiple columns. The code in Listing
    [11-16](#338675_3_En_11_Chapter.xhtml#PC16) includes the expanded `SELECT` statement
    and `WHERE` clause, expanding the predicate to include rows where `LastName` is
    Cox.


    The change in the query results in a significant change in performance over the
    previous section’s results. With the additional column in the query, there are
    68 pages read to satisfy the query vs. the 2 pages when `LastName` was not included
    (Figure [11-19](#338675_3_En_11_Chapter.xhtml#Fig19)). The increase in pages read
    is because of the change in the execution plan (Figure [11-20](#338675_3_En_11_Chapter.xhtml#Fig20)).
    In the execution plan, an additional two operations are added to the execution
    of the query: a key lookup and a nested loop. These operators are added because
    the index `IX_Contacts_FirstName` can’t provide all the information needed to
    satisfy the query. SQL Server determines that it is still cheaper to use `IX_Contacts_FirstName`
    and look up the missing information from the clustered index than to scan the
    clustered index. The problem that you can run into is that for every row that
    matches on the nonclustered index, a lookup has to be done on the clustered index.
    While key lookups aren’t always a problem, they can drive up the CPU and I/O costs
    for a query unnecessarily.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig20_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig20_HTML.jpg)


    Figure 11-20


    Execution plan for Index Intersection pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig19_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig19_HTML.jpg)


    Figure 11-19


    Statistics I/O results for Index Intersection pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 11-16

    Index Intersection Pattern

    ```


    Leveraging the Index Intersection pattern is one of a few ways that the performance
    of the query in Listing [11-16](#338675_3_En_11_Chapter.xhtml#PC16) can be improved.
    An index intersection occurs when SQL Server can utilize multiple nonclustered
    indexes on the same table to satisfy the requirements for a query. In the case
    of the query in Listing [11-16](#338675_3_En_11_Chapter.xhtml#PC16), the most
    direct path for finding `FirstName`s was through the index `IX_Contacts_FirstName`.
    At that point, though, to filter and return the `LastName` column, SQL Server
    used the clustered index and performed a lookup on each row, similar to the image
    on the left side of Figure [11-21](#338675_3_En_11_Chapter.xhtml#Fig21). Alternatively,
    if there had been an index for the `LastName` column, SQL Server could have used
    that index with `IX_Contacts_FirstName`. In essence, through the Index Intersection
    pattern, SQL Server is able to perform operations similar to joins between indexes
    on the same table to find rows that overlap between the two, as shown on the right
    of Figure [11-21](#338675_3_En_11_Chapter.xhtml#Fig21).


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig21_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig21_HTML.jpg)


    Figure 11-21'
  trans: '

    执行清单 11-15 中的脚本所得的结果，与在表中添加非聚集索引之前相比，发生了显著变化。非聚集索引不再读取表中的每个页面，而是将查询使用的页面数量减少到两个（见图
    11-17）。这里的减少是显著的，突显了使用非聚集索引为表中聚簇索引键以外的列提供更直接信息访问方式的力量和价值。执行中还有一处变化：执行计划不再扫描 `PK_Index`，而是对
    `IC_Contacts_FirstName` 进行索引查找，如图 11-18 所示。操作符的改变进一步证明非聚集索引有助于提高查询性能。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig18_HTML.jpg](img/338675_3_En_11_Fig18_HTML.jpg)


    图 11-18

    Search Columns 模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig17_HTML.jpg](img/338675_3_En_11_Fig17_HTML.jpg)


    图 11-17

    Search Columns 模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstName ON dbo.Contacts (FirstName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 11-15

    Search Columns Pattern

    ```


    使用 Search Columns 模式可能是在数据库上应用非聚集索引模式最重要的第一步。它提供了访问数据的替代路径，这可能是从几个页面与数千个页面获取数据之间的区别。本节中的
    Search Columns 示例展示了在单个列上构建索引。接下来的几个模式将扩展这个基础。


    ### Index Intersection


    Search Columns 模式的目的是创建一个索引，以最小化查询的页面读取次数并提升其性能。然而，有时查询会超出演示的单个列示例。额外的列可能成为谓词的一部分，或在
    `SELECT` 语句中返回。解决此问题的方法之一是创建包含额外列的非聚集索引。当存在可以满足 `WHERE` 子句中每个谓词的索引时，SQL Server
    可以利用多个非聚集索引，通过聚簇键匹配来查找两个索引之间的行。此操作称为索引交叉。


    为了演示 Index Intersection 模式，让我们首先回顾当过滤扩展到多个列时会发生什么。清单 11-16 中的代码包含了扩展的 `SELECT`
    语句和 `WHERE` 子句，将谓词扩展到包括 `LastName` 为 Cox 的行。


    查询的改变导致性能与上一节的结果相比发生了显著变化。由于查询中增加了列，满足查询需要读取 68 个页面，而未包含 `LastName` 时只需 2 个页面（见图
    11-19）。页面读取增加的原因是执行计划的改变（见图 11-20）。在执行计划中，为查询的执行添加了两个额外操作：键查找和嵌套循环。添加这些操作是因为索引
    `IX_Contacts_FirstName` 无法提供满足查询所需的所有信息。SQL Server 判定使用 `IX_Contacts_FirstName`
    并从聚簇索引中查找缺失的信息仍然比扫描聚簇索引更廉价。你可能会遇到的问题是，对于在非聚集索引上匹配的每一行，都必须在聚簇索引上执行一次查找。虽然键查找并不总是问题，但它们可能会不必要地推高查询的
    CPU 和 I/O 成本。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig20_HTML.jpg](img/338675_3_En_11_Fig20_HTML.jpg)


    图 11-20

    Index Intersection 模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig19_HTML.jpg](img/338675_3_En_11_Fig19_HTML.jpg)


    图 11-19

    Index Intersection 模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 11-16

    Index Intersection Pattern

    ```


    利用 Index Intersection 模式是改进清单 11-16 中查询性能的几种方法之一。当 SQL Server 能够利用同一表上的多个非聚集索引来满足查询要求时，就会发生索引交叉。对于清单
    11-16 中的查询，查找 `FirstName` 最直接的路径是通过索引 `IX_Contacts_FirstName`。然而，此时为了过滤并返回 `LastName`
    列，SQL Server 使用了聚簇索引并对每一行执行了查找操作，类似于图 11-21 左侧的图像。或者，如果存在一个 `LastName` 列的索引，SQL
    Server 本可以将其与 `IX_Contacts_FirstName` 一起使用。本质上，通过 Index Intersection 模式，SQL Server
    能够执行类似于在同一表上的索引之间进行联接的操作，以找到两者之间重叠的行，如图 11-21 右侧所示。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig21_HTML.jpg](img/338675_3_En_11_Fig21_HTML.jpg)


    图 11-21

