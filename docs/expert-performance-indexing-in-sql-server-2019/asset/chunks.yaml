    The monitoring process for this DMO, which is similar to the other DMOs, consists
    of the following steps:


    1.  Create a table to hold snapshot information.


    2.  Insert the current state of the DMO into the snapshot table.


    3.  Compare the most recent snapshot to the previous snapshot and insert the delta
    between the rows in the output into a history table.


    To build the process, we’ll first need to create the snapshot and history tables.
    The schema for these tables will be identical and will contain all the columns
    from the DMO and a `create_date` column (see Listing [13-5](#338675_3_En_13_Chapter.xhtml#PC5)).
    For consistency with the source DMO, the columns for the table will match the
    schema of the DMO.


    ```

