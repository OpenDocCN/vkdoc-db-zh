    Wait Statistics Query Column Definitions


    | Option Name | Description |

    | --- | --- |

    | wait_type | Wait statistics that incurred the wait. |

    | total_time_ms | Total amount of time measured by the query in milliseconds.
    |

    | waiting_tasks_count | Count of the number of waits for this wait type. |

    | wait_time_ms | Time in milliseconds accumulated for this wait type. This includes
    the time spent on signal_wait_time_ms. |

    | avg_wait_time_ms | Average time per wait type in milliseconds. |

    | pct_time_in_wait | Percent of total time spent for this wait type. |

    | signal_wait_time_ms | Time in milliseconds accumulated after the wait type was
    available and no longer waiting before it was running. This is the time spent
    in the RUNNABLE state. |

    | pct_time_runnable | Percentage of time spent for this wait type in the RUNNABLE
    state. |


    Once wait states with issues have been identified, the next step is to review
    the wait and the recommended courses of actions for the wait. Since this chapter
    focuses on more index-centric wait types, we’ll focus on those definitions. To
    learn more about the other wait types, review the Books Online topic for `sys.dm_os_wait_stats`
    (Transact-SQL).


    #### CXPACKET


    The CXPACKET wait type occurs when there are waits due to parallel query execution,
    otherwise known as *parallelism*. There are two main scenarios when parallel queries
    can experience CXPACKET waits. The first is when an operator in a parallel query
    is waiting due from being able to execute due to other threads already running
    on the scheduler. The second is when a thread from an operator in a parallel thread
    takes longer to execute than the rest of the threads and the rest of the threads
    have to wait for the slower thread to complete. The first cause is the more common
    cause for parallel waits, but it is outside the scope of this book and generally
    tied to configuration settings and query tuning. The second cause, though, can
    be addressed through indexing. And often, by addressing the second reason for
    CXPACKET waits, the first cause of parallel waits can be mitigated.'
