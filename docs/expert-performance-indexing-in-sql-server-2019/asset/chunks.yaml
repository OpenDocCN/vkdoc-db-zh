    通过以上两个例子，你研究了如何使用`DBCC IND`来调查与表或索引关联的数据页。正如示例所示，该命令提供了表或索引所有数据页的信息，包括IAM页。这些数据页包含页码以标识它们在数据库中的位置。数据页之间的关系也被包含在内，甚至包括用于遍历B树索引的下一页和上一页的页码。


    如前所述，`sys.dm_db_database_page_allocations`可以提供相同的信息甚至更多。为了演示这一点，清单[2-13]展示了如何从`sys.dm_db_database_page_allocations`获取`DBCC
    IND`的信息。如果你比较输出，会注意到它们几乎相同；只在少数情况下`NULL`和0的返回值有所不同。有了这个能力，你应该优先使用DMF而不是`DBCC`命令。


    ```

    USE Chapter2Internals;

    GO

    SELECT

    allocated_page_file_id AS PageFID

    ,allocated_page_page_id AS PagePID

    ,allocated_page_iam_file_id AS IAMFID

    ,allocated_page_iam_page_id AS IAMPID

    ,object_id AS ObjectID

    ,index_id AS IndexID

    ,partition_id AS PartitionNumber

    ,rowset_id AS PartitionID

    ,allocation_unit_type_desc AS iam_chain_type

    ,page_type AS PageType

    ,page_level AS IndexLevel

    ,next_page_file_id AS NextPageFID

    ,next_page_page_id AS NextPagePID

    ,previous_page_file_id AS PrevPageFID

    ,previous_page_page_id AS PrevPagePID

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsTwo''),
    1, NULL, ''DETAILED'')

    WHERE is_allocated = 1;

    GO

    DBCC IND (0,''dbo.IndexInternalsTwo'',1)

    ```

    *清单 2-13*

    *从 sys.dm_db_database_page_allocations 获取 DBCC IND 输出*


    ## DBCC PAGE


    最后一个可用于检查数据页的命令是`DBCC PAGE`。虽然其他两个命令提供与表和索引相关的数据页信息，但`DBCC PAGE`的输出提供了查看数据页内容的能力。此外，即使使用动态管理函数，你仍然需要使用`DBCC
    PAGE`，因为它的许多功能尚未通过DMF提供。清单[2-14]展示了使用`DBCC PAGE`的语法。


    ```

    DBCC PAGE ( { database_name | database_id | 0}, file_number, page_number

    [,print_option ={0|1|2|3} ])

    ```

    *清单 2-14*

    *DBCC PAGE 语法*


    `DBCC PAGE`命令接受多个参数。通过这些参数，命令能够确定请求的数据库和特定数据页，然后以请求的格式返回。表[2-10]详细列出了`DBCC PAGE`的参数。


    *表 2-10*


    *DBCC PAGE 参数*


    | 参数 | 描述 |

    | --- | --- |

    | `database_name` &#124; `database_id` | 指定将要检索数据页的数据库名称或数据库ID。如果此参数的值为0或未设置参数，将使用当前数据库。
    |

    | `file_number` | 指定将要从中检索数据页的数据库中数据文件的文件号。 |

    | `page_number` | 指定数据库文件中将要检索的数据页的页码。 |

    | `print_option` | 指定输出应如何返回。有四种打印选项可用：<br>***0—仅页头***：仅返回页头信息。<br>***1—十六进制行***：返回页头信息、页上的所有行以及偏移数组。在此输出中，每一行都单独返回。<br>***2—十六进制数据***：返回页头信息、页上的所有行以及偏移数组。与选项1不同，输出将所有行显示为单个数据块。<br>***3—数据行***：返回页头信息、页上的所有行以及偏移数组。此选项与其他选项的不同之处在于，行中列的数据按照其列名列出并转换。<br>此参数是可选的，当未选择任何选项时，默认使用0。
    |


    ### 注意


    默认情况下，`DBCC PAGE`命令将其消息输出到SQL Server事件日志。在大多数情况下，这不是理想的输出机制。跟踪标志3604允许你修改此行为。通过使用此跟踪标志，`DBCC`语句的输出将返回到SQL
    Server Management Studio (SSMS)中的“消息”选项卡。


    通过`DBCC PAGE`及其打印选项，可以检索数据页上的所有内容。你可能希望查看数据页内容的原因有几个。首先，查看索引或数据页可以帮助你理解索引为何以某种方式运行。你可以深入了解行内数据的结构，这可能导致行比预期更大。行的大小对索引的行为有重要影响，因为随着行变大，存储索引所需的数据页数量也会增加。索引数据页数量的增加会增加使用索引所需的资源，从而导致查询时间变长，并且在某些情况下，改变索引的使用方式或选择。使用`DBCC
    PAGE`的另一个原因是观察在某些操作发生时数据页会发生什么变化。正如本章后面的示例所示，`DBCC PAGE`可用于揭示在页面拆分和转发明文记录操作期间发生的情况。


    为了帮助演示如何使用`DBCC PAGE`，你将使用每种打印选项运行几个演示。这些演示将基于清单[2-15]中的代码，该代码使用`sys.dm_db_database_page_allocations`来确定示例的页码。对于每个示例，你将查看结果在不同数据页类型之间的差异方式。虽然你的数据库中的页码可能略有不同，但演示基于一个页码为238的IAM页、一个页码为377的索引页，以及页码为376和378的数据页，如图[2-21]所示。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig21_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig21_HTML.jpg)


    *图 2-21*

    *dbo.IndexInternalsFour 的数据页分配*


    ```

    USE [Chapter2Internals];

    GO

    CREATE TABLE dbo.IndexInternalsFour (

    RowID INT IDENTITY(1, 1) NOT NULL,

    FillerData VARCHAR(2000) NULL,

    CONSTRAINT PK_IndexInternalsFour

    PRIMARY KEY CLUSTERED ([RowID] ASC));

    INSERT INTO dbo.IndexInternalsFour (FillerData)

    VALUES (REPLICATE(1, 2000)),

    (REPLICATE(2, 2000)), (REPLICATE(3, 2000)),

    (REPLICATE(4, 2000)), (REPLICATE(5, 25));

    SELECT allocated_page_file_id AS PageFID,

    allocated_page_page_id AS PagePID,

    allocated_page_iam_file_id AS IAMFID,

    allocated_page_iam_page_id AS IAMPID,

    index_id AS IndexID,

    allocation_unit_type_desc AS iam_chain_type,

    page_type_desc,

    page_level AS IndexLevel,

    next_page_file_id AS NextPageFID,

    next_page_page_id AS NextPagePID,

    previous_page_file_id AS PrevPageFID,

    previous_page_page_id AS PrevPagePID

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsFour''),
    1, NULL, ''DETAILED'')

    WHERE is_allocated = 1;

    ```

    *清单 2-15*

    *用于 DBCC PAGE 示例的 DBCC IND 查询*'
  raw: 'DBCC IND for dbo.IndexInternalsThree


    Through both of these examples, you examined how to use `DBCC IND` to investigate
    the pages associated with a table or an index. As the examples showed, the command
    provides the information on all the pages of the table or index, including the
    IAM page. These pages include the page numbers to identify where they are in the
    database. The relationships between the pages are also included, even the next
    and previous page numbers that are used to navigate the index for B-tree indexes.


    As previously noted, `sys.dm_db_database_page_allocations` can provide this same
    information and much more. To demonstrate this, Listing [2-13](#338675_3_En_2_Chapter.xhtml#PC13)
    shows how to get DBCC IND information from the `sys.dm_db_database_page_allocations.`
    If you compare the outputs, you’ll note that they are nearly identical; there
    are a few instances where `NULL` and 0 are returned differently. With this ability,
    you should use the DMF in favor of using the `DBCC` command.


    ```

    USE Chapter2Internals;

    GO

    SELECT

    allocated_page_file_id AS PageFID

    ,allocated_page_page_id AS PagePID

    ,allocated_page_iam_file_id AS IAMFID

    ,allocated_page_iam_page_id AS IAMPID

    ,object_id AS ObjectID

    ,index_id AS IndexID

    ,partition_id AS PartitionNumber

    ,rowset_id AS PartitionID

    ,allocation_unit_type_desc AS iam_chain_type

    ,page_type AS PageType

    ,page_level AS IndexLevel

    ,next_page_file_id AS NextPageFID

    ,next_page_page_id AS NextPagePID

    ,previous_page_file_id AS PrevPageFID

    ,previous_page_page_id AS PrevPagePID

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsTwo''),
    1, NULL, ''DETAILED'')

    WHERE is_allocated = 1;

    GO

    DBCC IND (0,''dbo.IndexInternalsTwo'',1)

    Listing 2-13

    DBCC IND Output from sys.dm_db_database_page_allocations

    ```


    #### DBCC PAGE


    The last command available for examining pages is `DBCC PAGE`. While the other
    two commands provide information on the pages associated with tables and indexes,
    the output from `DBCC PAGE` provides a look at the contents of a page. Also, even
    with the dynamic management functions, you’ll still need to use DBCC PAGE since
    much of its capabilities are not yet available through DMFs. Listing [2-14](#338675_3_En_2_Chapter.xhtml#PC14)
    shows the syntax for using `DBCC PAGE`.


    ```

    DBCC PAGE ( { database_name | database_id | 0}, file_number, page_number

    [,print_option ={0|1|2|3} ])

    Listing 2-14

    DBCC PAGE Syntax

    ```


    `The DBCC` PAGE command accepts a number of parameters. Through the parameters,
    the command is able to determine the database and specific page requested, which
    is then returned in the requested format. Table [2-10](#338675_3_En_2_Chapter.xhtml#Tab10)
    details the parameters for `DBCC PAGE`.


    Table 2-10


    DBCC PAGE Parameters


    | Parameter | Description |

    | --- | --- |

    | database_name &#124; database_id | Specifies either the database name or the
    database ID where the page will be retrieved. If the value 0 is provided for this
    parameter or the parameter is not set, the current database will be used. |

    | `file_number` | Specifies the file number for the data file in the database
    from where the page will be retrieved. |

    | `page_number` | Specifies the page number in the database file that will be
    retrieved. |

    | `print_option` | Specifies how the output should be returned. There are four
    print options available:***0—page header*** *o**nly***: Returns only the page
    header information.***1—hex rows***: Returns the page header information, all
    the rows on the page, and the offset array. In this output, each row is returned
    individually.***2—hex data***: Returns the page header information, all the rows
    on the page, and the offset array. Unlike option 1, the output shows all the rows
    as a single block of data.***3—data rows***: Returns the page header information,
    all the rows on the page, and the offset array. This option differs from the other
    options in that the data in the columns for the row is translated as listed with
    their column names.This parameter is optional, and 0 is used as the default when
    no option is selected. |


    ### Note


    By default, the `DBCC PAGE` command outputs its messages to the SQL Server event
    log. In most situations, this is not the ideal output mechanism. Trace flag 3604
    allows you to modify this behavior. By utilizing this trace flag, the output from
    the `DBCC` statements returns to the Messages tab in SQL Server Management Studio
    (SSMS).


    Through `DBCC PAGE` and its print options, everything that is on a page can be
    retrieved. There are a few reasons why you might want to look at the contents
    of a page. To start with, looking at an index or data page can help you understand
    why an index is behaving in one manner or another. You gain insight into how the
    data within the row is structured, which may cause rows to be larger than expected.
    The sizes of rows do have an important impact on how indexes behave since as a
    row gets larger, the number of pages required to store the index increases. An
    increase in the number of pages for an index increases the resources required
    to use the index, which results in longer query times and, in some cases, a change
    in how or which indexes will be utilized. Another reason to use `DBCC PAGE` is
    to observe what happens to a data page when certain operations occur. As the examples
    later in this chapter will illustrate, `DBCC PAGE` can be used to uncover what
    happens during page splits and forwarded record operations.


    To help demonstrate how to use `DBCC PAGE`, you’ll run through a few demonstrations
    with each of the print options. These demos will be based on the code in Listing
    [2-15](#338675_3_En_2_Chapter.xhtml#PC15), which uses `sys.dm_db_database_page_allocations`
    to identify page numbers for the examples. For each example, you’ll look at some
    of the ways the results can differ between page types. While the page numbers
    in your database may differ slightly, the demos are based on an IAM page of 238,
    index page of 377, and data pages of 376 and 378, as shown in Figure [2-21](#338675_3_En_2_Chapter.xhtml#Fig21).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig21_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig21_HTML.jpg)


    Figure 2-21


    Page allocations for dbo.IndexInternalsFour


    ```

    USE [Chapter2Internals];

    GO

    CREATE TABLE dbo.IndexInternalsFour (

    RowID INT IDENTITY(1, 1) NOT NULL,

    FillerData VARCHAR(2000) NULL,

    CONSTRAINT PK_IndexInternalsFour

    PRIMARY KEY CLUSTERED ([RowID] ASC));

    INSERT INTO dbo.IndexInternalsFour (FillerData)

    VALUES (REPLICATE(1, 2000)),

    (REPLICATE(2, 2000)), (REPLICATE(3, 2000)),

    (REPLICATE(4, 2000)), (REPLICATE(5, 25));

    SELECT allocated_page_file_id AS PageFID,

    allocated_page_page_id AS PagePID,

    allocated_page_iam_file_id AS IAMFID,

    allocated_page_iam_page_id AS IAMPID,

    index_id AS IndexID,

    allocation_unit_type_desc AS iam_chain_type,

    page_type_desc,

    page_level AS IndexLevel,

    next_page_file_id AS NextPageFID,

    next_page_page_id AS NextPagePID,

    previous_page_file_id AS PrevPageFID,

    previous_page_page_id AS PrevPagePID

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsFour''),
    1, NULL, ''DETAILED'')

    WHERE is_allocated = 1;

    Listing 2-15

    DBCC IND Query for DBCC PAGE Examples

    ```'
