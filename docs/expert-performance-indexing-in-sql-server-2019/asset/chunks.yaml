  trans: '

    ## 每秒锁等待数


    下一个计数器 `Lock Waits/sec` 的分析方法与 `Lock Wait Time (ms)` 类似。`Lock Waits/sec` 计数器用于衡量无法立即满足的锁请求数量。对于这些请求，SQL
    Server 会等待，直到行或页可用于加锁后才授予锁。与另一个计数器一样，该计数器也没有关于何谓“良好”值的具体准则。对于这些情况，我们应该参考基线，并与之对比分析，以确定计数器何时超出了正常操作范围。


    `Lock Waits/sec` 的分析包括与 `Lock Wait Time(ms)` 相同的最小值、最大值、平均值和标准差聚合。这些值按每个计数器表 `dbo.IndexingCounters`
    和基线表 `dbo.IndexingCountersBaseline` 进行聚合，如代码清单 14-21 所示。图 14-9 显示了该查询的结果。


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Waits/sec'', Calculated_Counter_value, NULL)) LockWaits

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Waits/sec''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaits) AS MinLockWait,

    AVG(LockWaits) AS AvgLockWait,

    MAX(LockWaits) AS MaxLockWait,

    STDEV(LockWaits) AS StdDevLockWait

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Waits/sec''

    ORDER BY instance_name,

    CounterDate DESC;

    ```

    **代码清单 14-21 锁等待计数器分析**


    有时会出现这样的情况，例如图 14-9 中包含的情况，`Lock Wait/sec` 不是问题，但 `Lock Wait Time(ms)` 却存在问題。这些情况指向了长时间持续的阻塞情形。另一方面，监控
    `Lock Waits/sec` 很重要，因为它能指示出是否存在大范围的阻塞。这种阻塞可能持续时间不长，但范围广泛；单个长时间的阻塞就可能引发严重的性能问题。


    ![锁等待计数器分析示例结果](img/338675_3_En_14_Fig9_HTML.jpg)

    *图 14-9 锁等待计数器分析示例结果*


    在存在大范围阻塞的情况下（由 `Lock Waits/sec` 的高值指示），分析将需要使用 DMO `sys.dm_db_index_operational_stats`
    来调查索引的统计信息。通过监控流程，这些信息将存储在表 `dbo.index_operational_stats_history` 中。使用代码清单 14-22
    中的查询，可以确定等待的锁的数量和百分比。与 `Lock Wait Time(ms)` 一样，此计数器分析也查看行级和页级的统计信息。


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_count) AS row_lock_count,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    ISNULL(SUM(row_lock_wait_count) / NULLIF(SUM(row_lock_count), 0), 0) AS pct_row_lock_wait,

    SUM(page_lock_count) AS page_lock_count,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    ISNULL(SUM(page_lock_wait_count) / NULLIF(SUM(page_lock_count), 0), 0) AS pct_page_lock_wait

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```

    **代码清单 14-22 锁等待快照查询**


    锁等待次数占锁总数百分比高的索引是进行索引优化的首要目标。通常，当数据库中存在过多的锁等待时，终端用户会感受到应用程序运行缓慢，在某些更糟的情况下，会出现应用程序超时。分析此计数器的目的是识别可以优化的索引，然后调查这些索引的使用位置。一旦完成这项工作，就需要解决导致锁产生的根源，并优化索引和查询以减少索引上的锁。

    '
- fmt: '### Number of Deadlocks per Second


    In extreme cases, poor indexing and excessive lock blocking can lead to deadlocks.
    Deadlocks occur in situations where locks have been placed by two or more transactions
    in which the locking order of one of the transactions is prevented from acquiring
    and/or releasing its locks because of the locks of the other transactions. There
    are a number of ways to address deadlocking, one of which is to improve indexing.


    To determine whether deadlocks are occurring on the SQL Server instance, review
    the performance counters collected during the monitoring process. The query in
    Listing 14-23 provides an overview of the deadlock rate during the monitoring
    window. The query returns aggregate values for the minimum, average, maximum,
    and standard deviation for the deadlocks on the server.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    Calculated_Counter_value AS NumberDeadlocks

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Number of Deadlocks/sec'')

    SELECT server_name,

    MIN(NumberDeadlocks) AS MinNumberDeadlocks,

    AVG(NumberDeadlocks) AS AvgNumberDeadlocks,

    MAX(NumberDeadlocks) AS MaxNumberDeadlocks,

    STDEV(NumberDeadlocks) AS StdDevNumberDeadlocks

    FROM CounterSummary

    GROUP BY server_name;

    ```

    Listing 14-23

    Number of Deadlocks Counter Analysis


    In general, a well-tuned database platform should not have any deadlocks occurring.
    When they occur, each should be investigated to determine the root cause for the
    deadlock. Before a deadlock can be examined, though, the deadlock first needs
    to be retrieved. There are a number of ways in which deadlock information can
    be collected from SQL Server. These include trace flags, SQL Profiler, and event
    notifications. Another method is through Extended Events, using the built-in `system_health`
    session. The query in Listing 14-24 returns a list of all the deadlocks that are
    currently in the `ring_buffer` for that session.


    ```

    USE IndexingMethod;

    GO

    WITH deadlock

    AS (SELECT CAST(target_data AS XML) AS target_data

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''system_health''

    AND target_name = ''ring_buffer'')

    SELECT c.value(''(@timestamp)[1]'', ''datetime'') AS event_timestamp,

    c.query(''data/value/deadlock'')

    FROM deadlock d

    CROSS APPLY target_data.nodes(''//RingBufferTarget/event'') AS t(c)

    WHERE c.exist(''.[@name = "xml_deadlock_report"]'') = 1;

    ```

    Listing 14-24

    System-Health Deadlock Query


    When deadlocks have been identified, they are returned in an XML document. For
    most, reading the XML documents is not a natural way to examine a deadlock. Instead,
    it is often preferable to review the deadlock graph that is associated with the
    deadlock, such as the one shown in Figure 14-10. To obtain a deadlock graph for
    any of the deadlocks returned by Listing 14-22, open the deadlock XML document
    in SQL Server Management Studio and then save the file with an `.xdl` extension.
    When the file is reopened, it will open with the deadlock graph instead of as
    an XML document.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig10_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig10_HTML.jpg)

    Figure 14-10

    Deadlock graph in SQL Server Management Studio


    Once deadlocks are identified, it is important to determine why they occur to
    prevent them from reoccurring. A common issue that causes deadlocks is the order
    of operations between numerous transactions. This cause is often difficult to
    resolve since it may require rewriting parts of applications. To address deadlocks,
    one of the easiest approaches is to decrease the amount of time in which the transaction
    occurs. Indexing the tables that are accessed is a typical approach that can resolve
    deadlocks in many cases by shrinking the window in which deadlocks can be created.


    ### Wait Statistics


    The analysis process for wait statistics is similar to that of performance counters.
    For both sets of data, the information points to areas where resources are potentially
    being taxed, identifying the resources and indicating next steps. A lot of the
    same processes for performance counters apply to wait statistics. One main difference
    between the two sets of information is that wait statistics are looked at as a
    whole, and their value is determined as a relationship of themselves to other
    wait statistics on the SQL Server instance.


    Because of this difference, when reviewing wait statistics, there is only a single
    query required for analysis of the wait stats. Before using the wait statistics
    analysis query, provided in Listing 14-25, there are a few aspects to wait statistics
    analysis that should be explained. First, as the list of ignore wait stats shows,
    there are some wait states that accumulate regardless of the activity on the server.
    For these, there isn’t any value in investigating behavior related to them, either
    because they are just the ticking of CPU time on the server or they are related
    to internal operations that can’t be affected. Second, the value in wait statistics
    is in looking at them in relationship to the time that has transpired on the server.
    While one wait state being higher than another is important, without knowing the
    amount of time that has transpired, there is no scale by which to measure the
    pressure the wait state is having on the server. To accommodate for this, the
    waits from the first set of results in the monitoring table are ignored, and the
    date between them and the last collection point is used to calculate the time
    that has transpired. The length of time that a wait state occurred compared to
    the total time provides the values needed to determine the pressure of the wait
    state on the SQL Server instance.'
