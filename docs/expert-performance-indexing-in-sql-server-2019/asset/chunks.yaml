    In this last chapter, we’ll discuss a general practice that can be used to build
    an indexing methodology. You’ll look at the steps necessary to manage indexes.
    This methodology can be applied to a single database, a server, or your entire
    SQL Server environment. Regardless of the type of operations or business the database
