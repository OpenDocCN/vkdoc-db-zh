    在使用哈希索引时，理解 `SQL Server` 如何在哈希中使用桶是很重要的。需要注意的一点是，即使有足够的桶让每个表拥有自己的桶，也并不意味着每一行都会获得一个桶。要查看本章中创建的哈希索引的统计信息，请运行代码清单
    6-7 中的查询，该查询访问 `DMV` `sys.dm_db_xtp_hash_index_stats`。此 `DMV` 提供了有关桶的数量以及这些桶填充情况的信息。


    ```

    USE MemOptIndexing

    GO

    SELECT OBJECT_NAME(hs.object_id) AS object_name

    ,i.name as index_name

    ,hs.total_bucket_count

    ,hs.empty_bucket_count

    ,FLOOR((CAST(empty_bucket_count as float)/total_bucket_count) * 100) AS empty_bucket_percent

    ,hs.avg_chain_length

    ,hs.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS hs

    INNER JOIN sys.indexes AS i ON hs.object_id=i.object_id AND hs.index_id=i.index_id

    代码清单 6-7

    用于查看哈希索引统计信息的查询

    ```


    回顾代码清单 6-7 的结果（在图 6-3 中提供），您可以看到有几个有趣的项需要注意。首先，指定为 `1,000` 个桶的第一个索引（`SalesOrderHeader_low`）实际上有
    `1,024` 个桶。这是因为桶是在与 2 的幂对齐的分配中创建的。这也是为什么 `SalesOrderHeader_high` 上那个 `1,000,000`
    个桶的索引有 `1,048,576` 个桶的原因。下一个有趣的部分是 `SalesOrderHeader_high` 上哈希索引中空桶的数量。在有 `1,000,000`
    行和超过一百万个桶的情况下，仍然有 `37%` 的桶是空的。这种情况的发生是因为在确定性哈希函数中，在所有桶被使用之前，一些哈希值在值范围内会重复。这是在构建哈希索引时需要考虑的事情，特别是在旨在实现桶与行
    `1:1` 比例的情况下。


