    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    ```

    *清单 11-14*

    *Search Columns 模式*


    通过向 `dbo.Contacts` 添加一个非聚集索引，相对容易地就能实现最优地检索所有 Catherine 行的目标。在下一个脚本（清单 11-15）中，在
    `FirstName` 列上创建了一个非聚集索引。除了对 `FirstName` 的过滤外，查询还需要返回 `ContactID`。由于非聚集索引包含聚集索引键，因此
    `ContactID` 的值默认包含在索引中。

