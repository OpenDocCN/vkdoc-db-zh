    ```

    **清单 14-3 转发记录快照查询**


    快照查询的结果（如图 14-1 所示）提供了数据库中所有存在任何转发记录的堆的信息。通过这些结果，可以识别出存在转发和转发记录问题的堆。首先要关注的列是`page_count`和`record_count`。具有许多转发记录问题的记录的堆将比那些记录少的堆更重要。在调查此计数器时，专注于那些能对转发记录问题提供最大缓解的表是值得的。列`forwarded_record_count`和`forwarded_fetch_count`分别提供了表中已被转发的记录数量以及这些转发记录被访问的次数。这些列提供了问题规模的范围。最后要查看的列是`forwarded_record_pct`和`forwarded_row_ratio`。这些列详细说明了被转发的记录的百分比以及每个转发行被访问的次数。

    '
- fmt: "In the example table, the statistics indicate that there is an issue with\
    \ forwarded records. The table has more than 16 percent of its rows forwarded.\
    \ Each of these rows has been accessed three times, based on the `forwarded_fetch_count`.\
    \ From the code sample, there have been only three queries executed on the table,\
    \ meaning that every time there has been data access, all of the forwarded rows\
    \ are being accessed. When analyzing the indexes in this database, mitigating\
    \ the forwarded records for this table would be worthwhile. Do pay special attention\
    \ to whether forwarded records are being accessed. Mitigating forwarded records\
    \ on a table that has very high forwarded records but no forwarded record access\
    \ would not be worth the effort and would have no impact on the `Forwarded Records/sec`\
    \ counter.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig1_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1** Forwarded record snapshot query results\n\n## Forwarded Records\
    \ Mitigation\n\nWhen heaps that have forwarded record issues have been identified,\
    \ there are generally two ways in which the forwarded record can be mitigated.\
    \ The first approach is to change the data types for the columns that are variable\
    \ to fixed-length data types. For instance, the `varchar` data type would be changed\
    \ to `char`. This approach is not always ideal since it can result in more space\
    \ being required by the table, and some queries may not accommodate the extra\
    \ space at the end of character fields and could return incorrect results. The\
    \ second option is to add a clustered index to the table, which would remove the\
    \ heap as the organizational method for storing the data in the table. The downside\
    \ to this approach is in identifying the appropriate key column to cluster the\
    \ table on. If there is a primary key on the table, it can usually suffice as\
    \ the clustering index key.\n\nThere is a third option. The heap can be rebuilt,\
    \ which will rewrite the heap back to the database file and remove all the forwarded\
    \ records (using the script in Listing [14-4](#338675_3_En_14_Chapter.xhtml#PC4)).\
    \ This is generally considered a poor approach to resolving forwarded records\
    \ in heaps since it doesn’t provide a meaningful permanent fix to the issue. Remember,\
    \ forwarded records aren’t necessarily bad. They do, though, provide a potential\
    \ performance problem when the ratio of operations for forwarded records starts\
    \ to increase as compared to batch requests.\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nALTER TABLE dbo.HeapExample REBUILD\n```\n**Listing 14-4** Rebuild Heap Script\n\
    \n### FreeSpace Scans and Page Fetches per Second\n\nThe performance counter `FreeSpace\
    \ Scans/sec` is another performance counter that is related to heaps. This counter\
    \ represents the activity that happens when records are being inserted into a\
    \ table with a heap. During inserts into heaps, there can be activity on the `GAM`,\
    \ `SGAM`, and `PFS` pages. If the rate of inserts is high enough, contention can\
    \ happen on these pages. Analyzing the values of the `FreeSpace Scans/sec` and\
    \ `FreeSpace Page Fetches/sec` counters provides an opportunity to keep track\
    \ of this activity, determine when the volume of activity is increasing, and determine\
    \ when heaps may need to be analyzed further. Used in conjunction, `FreeSpace\
    \ Scans/sec` and `FreeSpace Page Fetches/sec` counters indicate the frequency\
    \ and volume of scan activity on heaps, respectively.\n\nListing [14-5](#338675_3_En_14_Chapter.xhtml#PC5)\
    \ provides the query to analyze the `FreeSpace Scans/sec` counter. It provides\
    \ a snapshot of `FreeSpace Scans` activity on the SQL Server instance. The query\
    \ provides aggregations of the counter with minimum, average, and maximum values.\
    \ Similar to the previous counter, this counter also follows recommended guidelines\
    \ of one `FreeSpace Scans/sec` for every ten `Batch Requests`. The `PctViolation`\
    \ column measures the percentage of time that the counter exceeds the guideline.\n\
    \n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'FreeSpace Scans/sec',\
    \ Calculated_Counter_value, NULL)) FreeSpaceScans,\n           MAX(IIF(counter_name\
    \ = 'FreeSpace Page Fetches/sec', Calculated_Counter_value, NULL)) FreeSpacePageFetches,\n\
    \           MAX(IIF(counter_name = 'FreeSpace Scans/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 10) AS ForwardedRecordRatio\n    FROM dbo.IndexingCounters\n  \
    \  WHERE counter_name IN ( 'FreeSpace Scans/sec', 'FreeSpace Page Fetches/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(FreeSpaceScans) AS MinFreeSpaceScans,\n      \
    \ AVG(FreeSpaceScans) AS AvgFreeSpaceScans,\n       MAX(FreeSpaceScans) AS MaxFreeSpaceScans,\n\
    \       MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,\n       AVG(FreeSpacePageFetches)\
    \ AS AvgFreeSpacePageFetches,\n       MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,\n\
    \       MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n       AVG(ForwardedRecordRatio)\
    \ AS AvgForwardedRecordRatio,\n       MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,\n\
    \       FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n**Listing\
    \ 14-5** FreeSpace Scans Counter Analysis\n\n#### Identifying Heaps with High\
    \ Insert Rates\n\nWhen the `FreeSpace Scans/sec` number is high, the analysis\
    \ will focus on determining which heaps in the databases have the highest rate\
    \ of inserts. To identify the tables with the highest inserts on heaps, use the\
    \ information in the monitoring tables from `sys.dm_db_index_operational_stats`.\
    \ The column with the information on inserts is `leaf_insert_count`. The query\
    \ in Listing [14-6](#338675_3_En_14_Chapter.xhtml#PC6) provides a list of the\
    \ heaps in the monitoring table `dbo.index_operational_stats_history` with the\
    \ most indexes.\n\n```sql\nUSE IndexingMethod\nGO\nSELECT\n    QUOTENAME(DB_NAME(database_id))\
    \ AS database_name\n    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id))\
    \ + '.'\n    + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName\n\
    \    , SUM(leaf_insert_count) AS leaf_insert_count\n    , SUM(leaf_allocation_count)\
    \ AS leaf_allocation_count\nFROM dbo.index_operational_stats_history\nWHERE index_id\
    \ = 0\n  AND database_id > 4\n  and QUOTENAME(OBJECT_NAME(object_id, database_id))\
    \ IS NOT NULL\nGROUP BY object_id, database_id\nORDER BY leaf_insert_count DESC\n\
    ```\n**Listing 14-6** FreeSpace Scans Snapshot Query\n\nReviewing the table in\
    \ the demonstration script in Listing [14-3](#338675_3_En_14_Chapter.xhtml#PC3)\
    \ with the `FreeSpace Scans` snapshot query yields the results in Figure [14-2](#338675_3_En_14_Chapter.xhtml#Fig2).\
    \ As this example shows, there were thousands of inserts into the heap. While\
    \ only a single table is shown in the results, the tables that appear at the height\
    \ of this list are going to be the ones most often contributing to `FreeSpace\
    \ Scans/sec`.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig2_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig2_HTML.jpg)\n\
    \n**Figure 14-2** FreeSpace Scans per second snapshot query results\n\n#### Mitigation\
    \ Strategy\n\nOnce the contributing heaps are identified, the best method for\
    \ mitigating the heaps is to create a clustered index on the tables with the most\
    \ inserts. Since the counter is based on scans of free space on the `GAM`, `SGAM`,\
    \ and `PFS` pages, building clustered indexes on the heap tables will move the\
    \ allocation of pages to `IAM` pages, which are dedicated to each clustered index,\
    \ as compared to heaps where they will compete for page allocations with other\
    \ heaps."
  raw: 'In the example table, the statistics indicate that there is an issue with
    forwarded records. The table has more than 16 percent of its rows forwarded. Each
    of these rows has been accessed three times, based on the forwarded_fetch_count.
    From the code sample, there have been only three queries executed on the table,
    meaning that every time there has been data access, all of the forwarded rows
    are being accessed. When analyzing the indexes in this database, mitigating the
    forwarded records for this table would be worthwhile. Do pay special attention
    to whether forwarded records are being accessed. Mitigating forwarded records
    on a table that has very high forwarded records but no forwarded record access
    would not be worth the effort and would have no impact on the Forwarded Records/sec
    counter.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig1_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig1_HTML.jpg)


    Figure 14-1


    Forwarded record snapshot query results


    When heaps that have forwarded record issues have been identified, there are generally
    two ways in which the forwarded record can be mitigated. The first approach is
    to change the data types for the columns that are variable to fixed-length data
    types. For instance, the `varchar` data type would be changed to `char`. This
    approach is not always ideal since it can result in more space being required
    by the table, and some queries may not accommodate the extra space at the end
    of character fields and could return incorrect results. The second option is to
    add a clustered index to the table, which would remove the heap as the organizational
    method for storing the data in the table. The downside to this approach is in
    identifying the appropriate key column to cluster the table on. If there is a
    primary key on the table, it can usually suffice as the clustering index key.
    There is a third option. The heap can be rebuilt, which will rewrite the heap
    back to the database file and remove all the forwarded records (using the script
    in Listing [14-4](#338675_3_En_14_Chapter.xhtml#PC4)). This is generally considered
    a poor approach to resolving forwarded records in heaps since it doesn’t provide
    a meaningful permanent fix to the issue. Remember, forwarded records aren’t necessarily
    bad. They do, though, provide a potential performance problem when the ratio of
    operations for forwarded records starts to increase as compared to batch requests.


    ```

    USE AdventureWorks2017

    GO

    ALTER TABLE dbo.HeapExample REBUILD

    Listing 14-4

    Rebuild Heap Script

    ```


    #### FreeSpace Scans and Page Fetches per Second


    The performance counter FreeSpace Scans/sec is another performance counter that
    is related to heaps. This counter represents the activity that happens when records
    are being inserted into a table with a heap. During inserts into heaps, there
    can be activity on the GAM, SGAM, and PFS pages. If the rate of inserts is high
    enough, contention can happen on these pages. Analyzing the values of the FreeSpace
    Scans/sec and FreeSpace Page Fetches/sec counters provides an opportunity to keep
    track of this activity, determine when the volume of activity is increasing, and
    determine when heaps may need to be analyzed further. Used in conjunction, FreeSpace
    Scans/sec and FreeSpace Page Fetches/sec counters indicate the frequency and volume
    of scan activity on heaps, respectively.


    Listing [14-5](#338675_3_En_14_Chapter.xhtml#PC5) provides the query to analyze
    the FreeSpace Scans/sec counter. It provides a snapshot of FreeSpace Scans activity
    on the SQL Server instance. The query provides aggregations of the counter with
    minimum, average, and maximum values. Similar to the previous counter, this counter
    also follows recommended guidelines of one FreeSpace Scans/sec for every ten Batch
    Requests. The `PctViolation` column measures the percentage of time that the counter
    exceeds the guideline.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))
    FreeSpaceScans,

    MAX(IIF(counter_name = ''FreeSpace Page Fetches/sec'', Calculated_Counter_value,
    NULL)) FreeSpacePageFetches,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''FreeSpace Scans/sec'', ''FreeSpace Page Fetches/sec'',
    ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FreeSpaceScans) AS MinFreeSpaceScans,

    AVG(FreeSpaceScans) AS AvgFreeSpaceScans,

    MAX(FreeSpaceScans) AS MaxFreeSpaceScans,

    MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,

    AVG(FreeSpacePageFetches) AS AvgFreeSpacePageFetches,

    MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1\. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-5

    FreeSpace Scans Counter Analysis

    ```


    When the FreeSpace Scans/sec number is high, the analysis will focus on determining
    which heaps in the databases have the highest rate of inserts. To identify the
    tables with the highest inserts on heaps, use the information in the monitoring
    tables from `sys.dm_db_index_operational_stats`. The column with the information
    on inserts is `leaf_insert_count`. The query in Listing [14-6](#338675_3_En_14_Chapter.xhtml#PC6)
    provides a list of the heaps in the monitoring table `dbo.index_operational_stats_history`
    with the most indexes.


    ```

    USE IndexingMethod

    GO

    SELECT

    QUOTENAME(DB_NAME(database_id)) AS database_name

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName

    , SUM(leaf_insert_count) AS leaf_insert_count

    , SUM(leaf_allocation_count) AS leaf_allocation_count

    FROM dbo.index_operational_stats_history

    WHERE index_id = 0

    AND database_id > 4

    and QUOTENAME(OBJECT_NAME(object_id, database_id)) IS NOT NULL

    GROUP BY object_id, database_id

    ORDER BY leaf_insert_count DESC

    Listing 14-6

    FreeSpace Scans Snapshot Query

    ```


    Reviewing the table in the demonstration script in Listing [14-3](#338675_3_En_14_Chapter.xhtml#PC3)
    with the FreeSpace Scans snapshot query yields the results in Figure [14-2](#338675_3_En_14_Chapter.xhtml#Fig2).
    As this example shows, there were thousands of inserts into the heap. While only
    a single table is shown in the results, the tables that appear at the height of
    this list are going to be the ones most often contributing to FreeSpace Scans/sec.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig2_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig2_HTML.jpg)


    Figure 14-2


    FreeSpace Scans per second snapshot query results


    Once the contributing heaps are identified, the best method for mitigating the
    heaps is to create a clustered index on the tables with the most inserts. Since
    the counter is based on scans of free space on the GAM, SGAM, and PFS pages, building
    clustered indexes on the heap tables will move the allocation of pages to IAM
    pages, which are dedicated to each clustered index, as compared to heaps where
    they will compete for page allocations with other heaps.'
  trans: "\n在示例表中，统计数据表明转发行存在一个问题。该表超过 16%的行是转发行。根据 `forwarded_fetch_count`，这些行每行都被访问了三次。从代码样本来看，仅在表上执行了三个查询，这意味着每次数据访问时，所有转发行都会被访问。在分析此数据库中的索引时，为该表缓解转发行问题将是值得的。请特别注意转发行是否正在被访问。对于转发行比例极高但没有转发行访问的表，进行缓解处理则得不偿失，并且不会对\
    \ `Forwarded Records/sec` 计数器产生任何影响。\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig1_HTML.jpg](img/338675_3_En_14_Fig1_HTML.jpg)\n\
    \n**图 14-1** 转发行快照查询结果\n\n## 转发行缓解\n\n一旦识别出存在转发行问题的堆表，通常有两种方法可以缓解转发行。第一种方法是将列的可变长度数据类型更改为固定长度数据类型。例如，将\
    \ `varchar` 数据类型改为 `char`。这种方法并不总是理想的，因为它可能导致表需要更多空间，并且某些查询可能无法适应字符字段末尾的额外空间，从而返回错误结果。第二种选择是向表添加聚集索引，这将移除作为表数据存储组织方式的堆表。这种方法的缺点在于确定用于聚集表的合适键列。如果表上有主键，它通常可以作为聚集索引键。\n\
    \n还有第三种选择。可以重建堆表，这会将堆表重写回数据库文件并移除所有转发行（使用清单 14-4 中的脚本）。这通常被认为是解决堆表中转发行的一种较差方法，因为它无法提供有意义的永久性修复。请记住，转发行不一定是坏事。然而，当与批处理请求相比，转发行操作的比例开始增加时，它们确实会带来潜在的性能问题。\n\
    \n```sql\nUSE AdventureWorks2017\nGO\nALTER TABLE dbo.HeapExample REBUILD\n```\n\
    **清单 14-4** 重建堆表脚本\n\n### 每秒空闲空间扫描和页面获取次数\n\n性能计数器 `FreeSpace Scans/sec` 是另一个与堆表相关的性能计数器。该计数器表示在向堆表插入记录时发生的活动。在向堆表插入数据期间，可能会在\
    \ `GAM`、`SGAM` 和 `PFS` 页面上产生活动。如果插入速率足够高，可能会在这些页面上发生争用。分析 `FreeSpace Scans/sec`\
    \ 和 `FreeSpace Page Fetches/sec` 计数器的值，可以跟踪此活动，确定活动量何时增加，以及何时可能需要进一步分析堆表。结合使用时，`FreeSpace\
    \ Scans/sec` 和 `FreeSpace Page Fetches/sec` 计数器分别表示堆表上扫描活动的频率和数量。\n\n清单 14-5 提供了分析\
    \ `FreeSpace Scans/sec` 计数器的查询。它提供了 SQL Server 实例上 `FreeSpace Scans` 活动的快照。该查询提供了计数器的最小值、平均值和最大值聚合。与前一个计数器类似，此计数器也遵循建议指南：每十个\
    \ `Batch Requests` 对应一个 `FreeSpace Scans/sec`。`PctViolation` 列衡量计数器超出指南的时间百分比。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'FreeSpace Scans/sec',\
    \ Calculated_Counter_value, NULL)) FreeSpaceScans,\n           MAX(IIF(counter_name\
    \ = 'FreeSpace Page Fetches/sec', Calculated_Counter_value, NULL)) FreeSpacePageFetches,\n\
    \           MAX(IIF(counter_name = 'FreeSpace Scans/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 10) AS ForwardedRecordRatio\n    FROM dbo.IndexingCounters\n  \
    \  WHERE counter_name IN ( 'FreeSpace Scans/sec', 'FreeSpace Page Fetches/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(FreeSpaceScans) AS MinFreeSpaceScans,\n      \
    \ AVG(FreeSpaceScans) AS AvgFreeSpaceScans,\n       MAX(FreeSpaceScans) AS MaxFreeSpaceScans,\n\
    \       MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,\n       AVG(FreeSpacePageFetches)\
    \ AS AvgFreeSpacePageFetches,\n       MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,\n\
    \       MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n       AVG(ForwardedRecordRatio)\
    \ AS AvgForwardedRecordRatio,\n       MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,\n\
    \       FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n**清单 14-5**\
    \ 空闲空间扫描计数器分析\n\n#### 识别高插入速率的堆表\n\n当 `FreeSpace Scans/sec` 数值很高时，分析将侧重于确定数据库中哪些堆表的插入速率最高。要识别堆表上插入最多的表，请使用来自\
    \ `sys.dm_db_index_operational_stats` 的监控表中的信息。包含插入信息的列是 `leaf_insert_count`。清单\
    \ 14-6 中的查询提供了监控表 `dbo.index_operational_stats_history` 中具有最多索引的堆表列表。\n\n```sql\n\
    USE IndexingMethod\nGO\nSELECT\n    QUOTENAME(DB_NAME(database_id)) AS database_name\n\
    \    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.'\n    + QUOTENAME(OBJECT_NAME(object_id,\
    \ database_id)) AS ObjectName\n    , SUM(leaf_insert_count) AS leaf_insert_count\n\
    \    , SUM(leaf_allocation_count) AS leaf_allocation_count\nFROM dbo.index_operational_stats_history\n\
    WHERE index_id = 0\n  AND database_id > 4\n  and QUOTENAME(OBJECT_NAME(object_id,\
    \ database_id)) IS NOT NULL\nGROUP BY object_id, database_id\nORDER BY leaf_insert_count\
    \ DESC\n```\n**清单 14-6** 空闲空间扫描快照查询\n\n审查清单 14-3 演示脚本中的表以及 `FreeSpace Scans` 快照查询，得到图\
    \ 14-2 中的结果。如本例所示，有数千次插入到堆表中。虽然结果中只显示了一个表，但在此列表中排名靠前的表将是最常导致 `FreeSpace Scans/sec`\
    \ 升高的表。\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig2_HTML.jpg](img/338675_3_En_14_Fig2_HTML.jpg)\n\
    \n**图 14-2** 每秒空闲空间扫描快照查询结果\n\n#### 缓解策略\n\n一旦识别出导致问题的堆表，缓解堆表的最佳方法是在插入最多的表上创建聚集索引。由于该计数器基于对\
    \ `GAM`、`SGAM` 和 `PFS` 页面上空闲空间的扫描，在堆表上构建聚集索引会将页面分配移至 `IAM` 页面（每个聚集索引专用），而在堆表情况下，它们会与其他堆表竞争页面分配。\n"
- fmt: "#### Full Scans per Second\n\n通过性能计数器 Full Scans/sec，可以测量在聚集索引、非聚集索引和堆上执行的全表扫描次数。在执行计划中，该计数器在索引扫描和表扫描期间被触发。全表扫描的发生率越高，就越可能引发与之相关的性能问题。从性能角度看，这会影响\
    \ Page Life Expectancy 值，因为数据会在内存中被换出，并且当数据需要被载入内存时，可能产生 I/O 争用。\n\n使用清单 [14-7](#338675_3_En_14_Chapter.xhtml#PC7)\
    \ 中的查询，可以分析当前监控窗口内 Full Scans/sec 的状态。与之前的计数器一样，考虑此计数器与 Batch Requests/sec 计数器之间的关系非常重要。当\
    \ Full Scans/sec 与 Batch Requests/sec 的比率超过每一千比一时，Full Scans/sec 可能存在问题，需要进一步审查。\n\
    \n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Full Scans/sec',\
    \ Calculated_Counter_value, NULL)) FullScans,\n           MAX(IIF(counter_name\
    \ = 'Full Scans/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 1000) AS FullRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Full Scans/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n           server_name)\n\
    SELECT server_name,\n       MIN(FullScans) AS MinFullScans,\n       AVG(FullScans)\
    \ AS AvgFullScans,\n       MAX(FullScans) AS MaxFullScans,\n       MIN(FullRatio)\
    \ AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n       MAX(FullRatio)\
    \ AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*),\
    \ '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n-- Listing\
    \ 14-7\n-- Full Scans Counter Analysis\n```\n\n在演示如何检查高 Full Scans/sec 计数器值的根本原因之前，让我们先设置一些示例统计信息。清单\
    \ [14-8](#338675_3_En_14_Chapter.xhtml#PC8) 将提供一些可以通过前一节详述的监控过程收集到的全表扫描次数。请务必在执行示例脚本后，运行那些收集监控信息的脚本。\n\
    \n```\nUSE AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC ('SELECT * INTO #temp\
    \ FROM Sales.SalesOrderHeader')\nGO 1000\n-- Listing 14-8\n-- Full Scans Example\
    \ Query\n```\n\n主要目标是确定 Full Scans/sec 计数器受到哪些索引的影响。一旦识别出索引，就需要分析它们是否适用于该操作，或者是否需要其他性能调优策略来减少在全扫描操作中使用索引。用于调查全扫描的\
    \ DMO 是监控表中的 `sys.dm_db_index_usage_stats`；在监控中，这被存储在 `dbo.index_usage_stats_history`\
    \ 表中。\n\n可以使用清单 [14-9](#338675_3_En_14_Chapter.xhtml#PC9) 所示的查询来识别索引。快照结果排除了那些没有行的索引。这些索引仍然被用于全扫描，但减轻这些索引上的扫描对性能的影响不大。为了对结果排序，索引上的扫描次数乘以表中的行数。这种排序方式使输出结果侧重于那些可能对降低\
    \ Full Scans/sec 值影响不大，但能为索引性能带来最大提升的索引。\n\n```\nUSE IndexingMethod;\nGO\nSELECT\
    \ QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \ != DB_ID()\n  AND OBJECT_NAME(uh.object_id, uh.database_id) IS NOT NULL\n  AND\
    \ x.RankID = 1\nGROUP BY uh.database_id,\n         uh.object_id,\n         uh.index_id,\n\
    \         x.record_count\nORDER BY SUM(uh.user_scans) * x.record_count DESC;\n\
    GO\n-- Listing 14-9\n-- Full Scans Snapshot Query\n```\n\nFull Scans 快照查询的结果将类似于图\
    \ [14-3](#338675_3_En_14_Chapter.xhtml#Fig3) 中的输出。有了这个输出，下一步就是确定哪些索引需要进一步分析。当前分析的目的是为后续分析识别问题索引。一旦识别出来，下一步就是确定它们在何处被使用，以及如何在这些地方减少全扫描，这将在本章后面的“索引计划使用”部分进行演示。\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig3_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3\nFull Scans 快照查询结果"
  raw: '#### Full Scans per Second


    Through the performance counter Full Scans/sec, the number of full scans on clustered
    and nonclustered indexes and heaps is measured. Within execution plans, this counter
    is triggered during index scans and table scans. The higher the rate in which
    full scans are performed, the more likely that there can be performance issues
    related to full scans. From a performance perspective, this can impact the Page
    Life Expectancy value as data is churned in memory, and there may be I/O contention
    as data needs to be brought into memory.


    Using the query in Listing [14-7](#338675_3_En_14_Chapter.xhtml#PC7), the current
    state of Full Scans/sec can be analyzed for the current monitoring window. As
    with the previous counters, it is important to consider the relationship between
    this counter and the Batch Requests/sec counter. When the ratio of Full Scans/sec
    to Batch Requests/sec exceeds one for every thousand, there may be an issue with
    Full Scans/sec, which merits further review.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value, NULL)) FullScans,

    MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 1000) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Full Scans/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FullScans) AS MinFullScans,

    AVG(FullScans) AS AvgFullScans,

    MAX(FullScans) AS MaxFullScans,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1\. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-7

    Full Scans Counter Analysis

    ```


    Before demonstrating how to examine the underlying causes for high Full Scans/sec
    counter values, let’s set up some example statistics. Listing [14-8](#338675_3_En_14_Chapter.xhtml#PC8)
    will provide a number of full scans that can be collected through the monitoring
    process detailed in the previous section. Be certain to execute the scripts that
    collect the monitoring information after executing the example script.


    ```

    USE AdventureWorks2017

    GO

    SET NOCOUNT ON

    EXEC (''SELECT * INTO #temp FROM Sales.SalesOrderHeader'')

    GO 1000

    Listing 14-8

    Full Scans Example Query

    ```


    The primary goal is to identify which indexes the Full Scans/sec counter is being
    affected by. Once the indexes are identified, they need to be analyzed to determine
    whether they are the proper indexes for that operation or whether there are other
    performance tuning tactics required to reduce the use of the index in a full-scan
    operation. The DMO to use for investigating full scans is `sys.dm_db_index_usage_stats`
    from the monitoring tables; from the monitoring, this is stored in the `dbo.index_usage_stats_history`
    table.


    The indexes can be identified using the query shown in Listing [14-9](#338675_3_En_14_Chapter.xhtml#PC9).
    The snapshot results exclude any indexes with no rows in them. Those indexes are
    still being utilized for full scans, but mitigating the scans on those indexes
    would not greatly impact performance. To sort the results, the number of scans
    on the indexes is multiplied by the number of rows in the table. Sorting in this
    manner weighs the output to put focus on those indexes that might not have a high
    impact on reducing the Full Scans/sec value but will provide the greatest lift
    to index performance.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_scans) AS user_scans,

    SUM(uh.user_seeks) AS user_seeks,

    x.record_count

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id

    ) x

    WHERE uh.database_id > 4

    AND uh.database_id  DB_ID()

    AND OBJECT_NAME(uh.object_id, uh.database_id) IS NOT NULL

    AND x.RankID = 1

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    ORDER BY SUM(uh.user_scans) * x.record_count DESC;

    GO

    Listing 14-9

    Full Scans Snapshot Query

    ```


    The results of the Full Scans snapshot query will look similar to the output in
    Figure [14-3](#338675_3_En_14_Chapter.xhtml#Fig3). With this output, the next
    step is to identify which indexes require further analysis. The purpose of the
    current analysis is to identify problem indexes for later analysis. Once identified,
    the next step is to determine where they are being utilized and how to mitigate
    the full scans in those places, which is demonstrated later in this chapter in
    the Index Plan Usage section.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig3_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Full Scans snapshot query results'
  trans: "\n#### 每秒全表扫描次数\n\n通过性能计数器 `Full Scans/sec`，可以测量在聚集索引、非聚集索引和堆上执行的全表扫描次数。在执行计划中，该计数器在索引扫描和表扫描期间被触发。全表扫描的发生率越高，就越可能引发与之相关的性能问题。从性能角度看，这会影响\
    \ `Page Life Expectancy` 值，因为数据会在内存中被换出，并且当数据需要被载入内存时，可能产生 I/O 争用。\n\n使用清单 14-7\
    \ 中的查询，可以分析当前监控窗口内 `Full Scans/sec` 的状态。与之前的计数器一样，考虑此计数器与 `Batch Requests/sec`\
    \ 计数器之间的关系非常重要。当 `Full Scans/sec` 与 `Batch Requests/sec` 的比率超过每一千比一时，`Full Scans/sec`\
    \ 可能存在问题，需要进一步审查。\n\n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT\
    \ create_date,\n           server_name,\n           MAX(IIF(counter_name = 'Full\
    \ Scans/sec', Calculated_Counter_value, NULL)) FullScans,\n           MAX(IIF(counter_name\
    \ = 'Full Scans/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 1000) AS FullRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Full Scans/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n           server_name)\n\
    SELECT server_name,\n       MIN(FullScans) AS MinFullScans,\n       AVG(FullScans)\
    \ AS AvgFullScans,\n       MAX(FullScans) AS MaxFullScans,\n       MIN(FullRatio)\
    \ AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n       MAX(FullRatio)\
    \ AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*),\
    \ '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n-- 清单\
    \ 14-7\n-- Full Scans 计数器分析\n```\n\n在演示如何检查高 `Full Scans/sec` 计数器值的根本原因之前，让我们先设置一些示例统计信息。清单\
    \ 14-8 将提供一些可以通过前一节详述的监控过程收集到的全表扫描次数。请务必在执行示例脚本后，运行那些收集监控信息的脚本。\n\n```\nUSE AdventureWorks2017\n\
    GO\nSET NOCOUNT ON\nEXEC ('SELECT * INTO #temp FROM Sales.SalesOrderHeader')\n\
    GO 1000\n-- 清单 14-8\n-- Full Scans 示例查询\n```\n\n主要目标是确定 `Full Scans/sec` 计数器受到哪些索引的影响。一旦识别出索引，就需要分析它们是否适用于该操作，或者是否需要其他性能调优策略来减少在全扫描操作中使用索引。用于调查全扫描的\
    \ DMO 是监控表中的 `sys.dm_db_index_usage_stats`；在监控中，这被存储在 `dbo.index_usage_stats_history`\
    \ 表中。\n\n可以使用清单 14-9 所示的查询来识别索引。快照结果排除了那些没有行的索引。这些索引仍然被用于全扫描，但减轻这些索引上的扫描对性能的影响不大。为了对结果排序，索引上的扫描次数乘以表中的行数。这种排序方式使输出结果侧重于那些可能对降低\
    \ `Full Scans/sec` 值影响不大，但能为索引性能带来最大提升的索引。\n\n```\nUSE IndexingMethod;\nGO\nSELECT\
    \ QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \ != DB_ID()\n  AND OBJECT_NAME(uh.object_id, uh.database_id) IS NOT NULL\n  AND\
    \ x.RankID = 1\nGROUP BY uh.database_id,\n         uh.object_id,\n         uh.index_id,\n\
    \         x.record_count\nORDER BY SUM(uh.user_scans) * x.record_count DESC;\n\
    GO\n-- 清单 14-9\n-- Full Scans 快照查询\n```\n\n`Full Scans` 快照查询的结果将类似于图 14-3 中的输出。有了这个输出，下一步就是确定哪些索引需要进一步分析。当前分析的目的是为后续分析识别问题索引。一旦识别出来，下一步就是确定它们在何处被使用，以及如何在这些地方减少全扫描，这将在本章后面的“索引计划使用”部分进行演示。\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig3_HTML.jpg](img/338675_3_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3\nFull Scans 快照查询结果\n"
- fmt: "#### Index Searches per Second\n\nThe alternative to scanning indexes is to\
    \ perform a seek against the index. The performance counter `Index Searches/sec`\
    \ provides reporting on the rate of index seek on the SQL Server instance. This\
    \ can include operations such as range scans and key lookups. In most environments,\
    \ it is preferable to see high `Index Searches/sec` counter values. Along those\
    \ lines, the higher this performance counter is in relationship to `Full Scans/sec`,\
    \ the better.\n\nThe analysis of `Index Searches/sec` will begin with reviewing\
    \ the performance counter information collected over time (shown in Listing 14-10).\
    \ As mentioned, the ratio of `Index Searches/sec` to `Full Scans/sec` is one of\
    \ the metrics that can be used to evaluate whether `Index Searches/sec` is indicating\
    \ a potential indexing issue. The guideline for evaluating the ratio between the\
    \ two counters is to look for 1,000 `Index Searches/sec` for every one `Full Scans/sec`.\
    \ The analysis query provides this calculation, along with determining the amount\
    \ of time in which the counter values exceeded this ratio, through the column\
    \ `PctViolation`.\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS\
    \ (SELECT create_date,\n           server_name,\n           MAX(IIF(counter_name\
    \ = 'Index Searches/sec', Calculated_Counter_value, NULL)) IndexSearches,\n  \
    \         MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 1000) AS SearchToScanRatio\n    FROM dbo.IndexingCounters\n   \
    \ WHERE counter_name IN ( 'Index Searches/sec', 'Full Scans/sec' )\n    GROUP\
    \ BY create_date,\n             server_name)\nSELECT server_name,\n       MIN(IndexSearches)\
    \ AS MinIndexSearches,\n       AVG(IndexSearches) AS AvgIndexSearches,\n     \
    \  MAX(IndexSearches) AS MaxIndexSearches,\n       MIN(SearchToScanRatio) AS MinSearchToScanRatio,\n\
    \       AVG(SearchToScanRatio) AS AvgSearchToScanRatio,\n       MAX(SearchToScanRatio)\
    \ AS MaxSearchToScanRatio,\n       FORMAT(1. * SUM(IIF(SearchToScanRatio > 1,\
    \ 1, NULL)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY\
    \ server_name;\n```\nListing 14-10: Index Searches Counter Analysis\n\nIf the\
    \ analysis indicates an issue with index searches, the first step is to verify\
    \ that the analysis for `Full Scans/sec` in the previous section was completed.\
    \ That analysis will provide the most insight into which indexes have many full\
    \ scans, which would contribute to high ratios for `Index Searches/sec`.\n\nTo\
    \ help demonstrate how to examine the `Index Searches/sec` counter values, we’ll\
    \ run the query in Listing 14-11. This query will provide a number of full scans\
    \ that can be collected through the monitoring process detailed in the previous\
    \ section. Be certain to execute the scripts that collect the monitoring information\
    \ after executing the example script.\n\n```sql\nUSE AdventureWorks2017\nGO\n\
    SET NOCOUNT ON\nEXEC('SELECT SOH.SalesOrderID, SOD.SalesOrderDetailID\n      INTO\
    \ #temp\n      FROM Sales.SalesOrderHeader SOH\n      INNER JOIN Sales.SalesOrderDetail\
    \ SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n      WHERE SOH.SalesOrderID = 43659')\n\
    GO 1000\n```\nListing 14-11: Full Scans Example Query\n\nOnce that analysis is\
    \ complete, we can begin to identify where there are issues with the ratios of\
    \ scans to seeks at the index level. Using the query in Listing 14-12, indexes\
    \ with a high ratio of scans to seeks can be identified. Similar to the performance\
    \ counter guideline of 1,000 seeks to every one scan, the query returns results\
    \ for those indexes with fewer than 1,000 seeks for every scan. Since full-scan\
    \ issues should have been identified in the previous section, the analysis also\
    \ removes any indexes that do not have seeks against them.\n\n```sql\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
    \ 0) AS SeekScanRatio,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \  DB_ID()\n  AND x.RankID = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n\
    \         uh.object_id,\n         uh.index_id,\n         x.record_count\nHAVING\
    \ 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0)  0\nORDER BY 1. * SUM(uh.user_seeks)\
    \ / NULLIF(SUM(uh.user_scans), 0) DESC,\n         SUM(uh.user_scans) DESC;\nGO\n\
    ```\nListing 14-12: Index Searches Snapshot Query\n\nViewing the results of the\
    \ snapshot query, shown in Figure 14-4, there is just a single index identified\
    \ where the seek-to-scan ratio is close to 1. This is the case since in the previous\
    \ section we executed about 1,000 scans against `Sales.SalesOrderHeader`, but\
    \ none against `Sales.SalesOrderDetail`, even though both of these tables and\
    \ their indexes were accessed in Listing 14-11. The advantage of considering `Index\
    \ Searches` in conjunction with `Full Scans` is they help to offset the severity\
    \ by identifying the frequency in which more desirable activity is occurring.\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig4_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4: Index search snapshot query sample results\n\nWhen delving into\
    \ further analysis, there are a few things we’ll want to pay attention to that\
    \ might indicate an issue with the indexes identified. First is the current seek\
    \ vs. scan behavior new to the index; in other words, has the variance been on\
    \ a common trend that has slowly been getting worse? If the change is sudden,\
    \ there could be a plan that is no longer using the index as it once did, maybe\
    \ because of a coding change or bad parameter sniffing. Second is when the change\
    \ has been gradual; look at increased data volumes and whether a query or feature\
    \ within the database is being used more than it was previously. This can also\
    \ hint at changes in how people are using the database and its applications, which\
    \ is sometimes gradual until it reaches the point where indexing, and the performance\
    \ the indexes support, suffers."
  raw: '#### Index Searches per Second


    The alternative to scanning indexes is to perform a seek against the index. The
    performance counter Index Searches/sec provides reporting on the rate of index
    seek on the SQL Server instance. This can include operations such as range scans
    and key lookups. In most environments, it is preferable to see high Index Searches/sec
    counter values. Along those lines, the higher this performance counter is in relationship
    to Full Scans/sec, the better.


    The analysis of Index Searches/sec will begin with reviewing the performance counter
    information collected over time (shown in Listing [14-10](#338675_3_En_14_Chapter.xhtml#PC10)).
    As mentioned, the ratio of Index Searches/sec to Full Scans/sec is one of the
    metrics that can be used to evaluate whether Index Searches/sec is indicating
    a potential indexing issue. The guideline for evaluating the ratio between the
    two counters is to look for 1,000 Index Searches/sec for every one Full Scans/sec.
    The analysis query provides this calculation, along with determining the amount
    of time in which the counter values exceeded this ratio, through the column `PctViolation`.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Index Searches/sec'', Calculated_Counter_value, NULL))
    IndexSearches,

    MAX(IIF(counter_name = ''Index Searches/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value,
    NULL)), 0) * 1000) AS SearchToScanRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Index Searches/sec'', ''Full Scans/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(IndexSearches) AS MinIndexSearches,

    AVG(IndexSearches) AS AvgIndexSearches,

    MAX(IndexSearches) AS MaxIndexSearches,

    MIN(SearchToScanRatio) AS MinSearchToScanRatio,

    AVG(SearchToScanRatio) AS AvgSearchToScanRatio,

    MAX(SearchToScanRatio) AS MaxSearchToScanRatio,

    FORMAT(1\. * SUM(IIF(SearchToScanRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'') AS
    PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-10

    Index Searches Counter Analysis

    ```


    If the analysis indicates an issue with index searches, the first step is to verify
    that the analysis for Full Scans/sec in the previous section was completed. That
    analysis will provide the most insight into which indexes have many full scans,
    which would contribute to high ratios for Index Searches/sec.


    To help demonstrate how to examine the Index Searches/sec counter values, we’ll
    run the query in Listing [14-11](#338675_3_En_14_Chapter.xhtml#PC11). This query
    will provide a number of full scans that can be collected through the monitoring
    process detailed in the previous section. Be certain to execute the scripts that
    collect the monitoring information after executing the example script.


    ```

    USE AdventureWorks2017

    GO

    SET NOCOUNT ON

    EXEC(''SELECT SOH.SalesOrderID, SOD.SalesOrderDetailID

    INTO #temp

    FROM Sales.SalesOrderHeader SOH

    INNER JOIN Sales.SalesOrderDetail SOD ON SOH.SalesOrderID = SOD.SalesOrderID

    WHERE SOH.SalesOrderID = 43659'')

    GO 1000

    Listing 14-11

    Full Scans Example Query

    ```


    Once that analysis is complete, we can begin to identify where there are issues
    with the ratios of scans to seeks at the index level. Using the query in Listing
    [14-12](#338675_3_En_14_Chapter.xhtml#PC12), indexes with a high ratio of scans
    to seeks can be identified. Similar to the performance counter guideline of 1,000
    seeks to every one scan, the query returns results for those indexes with fewer
    than 1,000 seeks for every scan. Since full-scan issues should have been identified
    in the previous section, the analysis also removes any indexes that do not have
    seeks against them.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_scans) AS user_scans,

    SUM(uh.user_seeks) AS user_seeks,

    1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) AS SeekScanRatio,

    x.record_count

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id

    ) x

    WHERE uh.database_id > 4

    AND uh.database_id  DB_ID()

    AND x.RankID = 1

    AND x.record_count > 0

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    HAVING 1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0)  0

    ORDER BY 1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) DESC,

    SUM(uh.user_scans) DESC;

    GO

    Listing 14-12

    Index Searches Snapshot Query

    ```


    Viewing the results of the snapshot query, shown in Figure [14-4](#338675_3_En_14_Chapter.xhtml#Fig4),
    there is just a single index identified where the seek-to-scan ratio is close
    to 1. This is the case since in the previous section we executed about 1,000 scans
    against Sales.SalesOrderHeader, but none against Sales.SalesOrderDetail, even
    though both of these tables and their indexes were accessed in Listing [14-11](#338675_3_En_14_Chapter.xhtml#PC11).
    The advantage of considering Index Searches in conjunction with Full Scans is
    they help to offset the severity by identifying the frequency in which more desirable
    activity is occurring.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig4_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Index search snapshot query sample results


    When delving into further analysis, there are a few things we’ll want to pay attention
    to that might indicate an issue with the indexes identified. First is the current
    seek vs. scan behavior new to the index; in other words, has the variance been
    on a common trend that has slowly been getting worse? If the change is sudden,
    there could be a plan that is no longer using the index as it once did, maybe
    because of a coding change or bad parameter sniffing. Second is when the change
    has been gradual; look at increased data volumes and whether a query or feature
    within the database is being used more than it was previously. This can also hint
    at changes in how people are using the database and its applications, which is
    sometimes gradual until it reaches the point where indexing, and the performance
    the indexes support, suffers.'
  trans: "#### 每秒索引搜索次数\n\n扫描索引的替代方法是直接对索引执行寻址操作。性能计数器 `Index Searches/sec` 用于报告 SQL\
    \ Server 实例上索引寻址操作的速率。这可能包括范围扫描和键查找等操作。在大多数环境中，通常希望看到较高的 `Index Searches/sec`\
    \ 计数器值。因此，该性能计数器相对于 `Full Scans/sec` 的值越高越好。\n\n对 `Index Searches/sec` 的分析将从审查随时间收集的性能计数器信息开始（如代码清单\
    \ 14-10 所示）。如前所述，`Index Searches/sec` 与 `Full Scans/sec` 的比率是可用于评估 `Index Searches/sec`\
    \ 是否指示潜在索引问题的指标之一。评估这两个计数器之间比率的准则是：每出现 1 次 `Full Scans/sec`，应对应约 1,000 次 `Index\
    \ Searches/sec`。分析查询通过 `PctViolation` 列提供了此计算，并确定了计数器值超出此比率的时间比例。\n\n```sql\n\
    USE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n      \
    \     server_name,\n           MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value,\
    \ NULL)) IndexSearches,\n           MAX(IIF(counter_name = 'Index Searches/sec',\
    \ Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Full Scans/sec', Calculated_Counter_value, NULL)), 0) * 1000) AS SearchToScanRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Index Searches/sec',\
    \ 'Full Scans/sec' )\n    GROUP BY create_date,\n             server_name)\nSELECT\
    \ server_name,\n       MIN(IndexSearches) AS MinIndexSearches,\n       AVG(IndexSearches)\
    \ AS AvgIndexSearches,\n       MAX(IndexSearches) AS MaxIndexSearches,\n     \
    \  MIN(SearchToScanRatio) AS MinSearchToScanRatio,\n       AVG(SearchToScanRatio)\
    \ AS AvgSearchToScanRatio,\n       MAX(SearchToScanRatio) AS MaxSearchToScanRatio,\n\
    \       FORMAT(1. * SUM(IIF(SearchToScanRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n代码清单 14-10:\
    \ 索引搜索计数器分析\n\n如果分析表明索引搜索存在问题，第一步是确认已完成前一章节中对 `Full Scans/sec` 的分析。该分析将更深入地揭示哪些索引存在大量全表扫描，这正是导致\
    \ `Index Searches/sec` 比率较高的原因。\n\n为了帮助演示如何检查 `Index Searches/sec` 计数器值，我们将运行代码清单\
    \ 14-11 中的查询。此查询将提供通过前一节详述的监控过程可收集到的全表扫描次数。请务必在执行示例脚本后，运行收集监控信息的脚本。\n\n```sql\n\
    USE AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC('SELECT SOH.SalesOrderID, SOD.SalesOrderDetailID\n\
    \      INTO #temp\n      FROM Sales.SalesOrderHeader SOH\n      INNER JOIN Sales.SalesOrderDetail\
    \ SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n      WHERE SOH.SalesOrderID = 43659')\n\
    GO 1000\n```\n代码清单 14-11: 全表扫描示例查询\n\n完成该分析后，我们就可以开始识别索引级别上扫描与寻址比率存在问题的地方。使用代码清单\
    \ 14-12 中的查询，可以识别出扫描与寻址比率较高的索引。类似于性能计数器准则（每 1 次扫描对应 1,000 次寻址），该查询返回的结果针对的是那些每出现\
    \ 1 次扫描，寻址次数少于 1,000 次的索引。由于全表扫描问题应在前一节中已被识别，因此分析也排除了没有任何寻址操作的索引。\n\n```sql\n\
    USE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n\
    \       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + '.'\n  \
    \     + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,\n\
    \       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n       SUM(uh.user_seeks)\
    \ AS user_seeks,\n       1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
    \ 0) AS SeekScanRatio,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \  DB_ID()\n  AND x.RankID = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n\
    \         uh.object_id,\n         uh.index_id,\n         x.record_count\nHAVING\
    \ 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0)  0\nORDER BY 1. * SUM(uh.user_seeks)\
    \ / NULLIF(SUM(uh.user_scans), 0) DESC,\n         SUM(uh.user_scans) DESC;\nGO\n\
    ```\n代码清单 14-12: 索引搜索快照查询\n\n查看快照查询的结果（如图 14-4 所示），仅识别出一个索引的寻址与扫描比率接近 1。这种情况的发生是因为在上一节中，我们对\
    \ `Sales.SalesOrderHeader` 执行了大约 1,000 次扫描，但对 `Sales.SalesOrderDetail` 则没有扫描，尽管代码清单\
    \ 14-11 中访问了这两个表及其索引。结合 `Full Scans` 来考虑 `Index Searches` 的优势在于，它们通过识别更理想活动发生的频率，有助于抵消问题的严重性。\n\
    \n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig4_HTML.jpg](img/338675_3_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4: 索引搜索快照查询示例结果\n\n在进行更深入分析时，我们需要注意一些可能表明已识别索引存在问题的迹象。首先是索引当前新的寻址与扫描行为；换句话说，这种差异是否沿着一个逐渐恶化的共同趋势发展？如果变化是突然的，可能是某个执行计划不再像以前那样使用该索引，原因可能是代码变更或不良的参数探测。其次是当变化是渐进时；应审视数据量的增长，以及数据库中的某个查询或功能是否比以前使用得更频繁。这也可能暗示人们使用数据库及其应用程序的方式发生了变化，这种变化有时是渐进的，直到达到某个临界点，导致索引及其支持的性能受到影响。"
- fmt: '#### Page Splits per Second


    类似于聚集索引是堆的另一面，页面拆分是前转记录的另一面。关于页面拆分的深入讨论包含在第 2 章中。不过，就本章而言，当聚集或非聚集索引需要在索引页面的顺序中为数据腾出空间以将其放置到正确位置时，就会发生页面拆分。页面拆分可能非常耗费资源，因为单个页面被分成两个或多个页面，并且涉及锁定，可能还会导致阻塞。页面拆分越频繁，索引发生阻塞的可能性就越大，性能也会受到影响。此外，页面拆分导致的碎片化会降低单次操作中可以执行的读取大小。


    为了开始分析页面拆分的性能计数器，我们使用计数器 `Page Splits/sec`。代码清单 14-13 中的查询提供了一种汇总页面拆分活动的方法。该查询包括性能计数器的最小值、最大值和平均水平。此外，还包含了
    `Page Splits/sec` 与 `Batch Requests/sec` 的比率。在识别 SQL Server 实例上是否存在页面拆分问题时，经验法则是寻找每
    20 个 `Batch Requests/sec` 超过 1 个 `Page Splits/sec` 的时间段。当然，与其他计数器一样，请通过 `PctViolation`
    关注计数器超过阈值的时间量。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL)) PageSplits,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 20) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Splits/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageSplits) AS MinPageSplits,

    AVG(PageSplits) AS AvgPageSplits,

    MAX(PageSplits) AS MaxPageSplits,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```

    **代码清单 14-13** 页面拆分计数器分析


    要确定哪些索引受到页面拆分的影响，我们可以考虑几个值。其中几个值来自 `sys.dm_db_index_operational_stats` 或来自索引监控过程的
    `dbo.index_operational_stats_history`。这些列报告索引上发生的每次页面分配，无论是来自 B 树末尾的插入还是中间的页面拆分。由于我们只关心作为页面拆分一部分的操作，接下来的两列提供了是否正在发生由页面拆分引起的碎片的信息。为了确定碎片，监控表
    `dbo.index_physical_stats_history` 中包含了来自 `sys.dm_db_index_physical_stats` 的列
    `avg_fragmentation_in_percent`。对于平均碎片，返回两个值。第一个是索引报告的最新碎片值；第二个是所有收集到的碎片值的平均值。参见代码清单
    14-14。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    SUM(leaf_allocation_count) AS leaf_insert_count,

    SUM(nonleaf_allocation_count) AS nonleaf_allocation_count,

    MAX(IIF(RankID = 1, x.avg_fragmentation_in_percent, NULL)) AS last_fragmenation,

    AVG(x.avg_fragmentation_in_percent) AS average_fragmenation

    FROM dbo.index_operational_stats_history oh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    CAST(ph.avg_fragmentation_in_percent AS DECIMAL(6, 3)) AS avg_fragmentation_in_percent

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = oh.database_id

    AND ph.object_id = oh.object_id

    AND ph.index_id = oh.index_id

    ) x

    WHERE database_id > 4

    AND database_id <> DB_ID()

    AND oh.index_id <> 0

    AND (

    leaf_allocation_count > 0

    OR nonleaf_allocation_count > 0

    )

    GROUP BY object_id,

    database_id

    ORDER BY leaf_insert_count DESC;

    ```

    **代码清单 14-14** 页面拆分快照查询


    以这种方式调查页面拆分提供了一种查看分配数量并将其与碎片信息配对的方法。一个具有低碎片和高 `leaf_insert_count` 的表，例如图 14-5
    中所示的表 `dbo.IndexingCounters`，从页面拆分的角度来看并不是问题。另一方面，`dbo.index_operational_stats_history`
    确实显示了高碎片量和 `leaf_insert_count`。值得进一步研究该索引。虽然代码清单 14-14 中的脚本通常不会显示 IndexingMethod
    数据库的索引结果，但该脚本已从列表中的内容进行了修改，以提供一些可供检查的结果。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig5_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig5_HTML.jpg)


    **图 14-5** 页面拆分快照查询示例结果


    识别出需要更多分析的索引后，下一步是缓解。有许多方法可以减轻索引上的页面拆分。首先是审查索引的碎片历史。如果索引需要定期重建，首先可以做的事情之一是降低索引上的填充因子。减少填充因子将在重建索引后增加页面上的剩余空间，这将减少页面拆分的可能性。减少碎片的第二个策略是考虑索引中的列。这些列是否高度易变且值是否发生剧烈变化？例如，基于
    `create_date` 的索引不太可能有页面拆分问题。但基于 `update_date` 的索引则容易产生碎片。如果索引的使用率不能证明其存在是合理的，那么删除该索引可能是值得的。或者，在多列索引中，将易变列移动到索引的右侧或将它们添加为包含列。减轻页面拆分的第三种方法可以是识别索引的使用位置。减轻索引上页面拆分的最后一种方法是审查索引使用的数据类型。在某些情况下，可变长度数据类型可能比固定长度数据类型更合适。'
  raw: '#### Page Splits per Second


    Similar to how clustered indexes are the other side of heaps, page splits are
    the other side of forwarded records. An in-depth discussion of page splits is
    included in Chapter [2](#338675_3_En_2_Chapter.xhtml). For the purposes of this
    chapter, though, page splits occur when a clustered or nonclustered index needs
    to make room in the ordering of the pages of the index to place data into its
    proper position. Page splits can be resource-intensive because the single page
    is divided into two or more pages and involves locking and, potentially, blocking.
    The more frequent the page splits, the more likely that indexes will incur blocking
    and performance will suffer. Also, the fragmentation caused by page splits reduces
    the size of reads that can be performed in single operations.


    To begin analyzing the performance counters for a page split, the counter Page
    Splits/sec is utilized. The query in Listing [14-13](#338675_3_En_14_Chapter.xhtml#PC13)
    provides a method for summarizing page split activity. The query includes the
    minimum, maximum, and average levels of the performance counter. Along with that,
    a ratio of Page Splits/sec to Batch Requests/sec is included. When identifying
    whether there are issues with page splits on a SQL Server instance, the general
    rule of thumb is to look for times in which there is more than one page split/sec
    for every 20 batch requests/sec. Of course, as with the other counter, pay attention
    to the amount of time, through `PctViolation`, that the counter exceeded the threshold.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL)) PageSplits,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 20) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Splits/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageSplits) AS MinPageSplits,

    AVG(PageSplits) AS AvgPageSplits,

    MAX(PageSplits) AS MaxPageSplits,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1\. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-13

    Page Splits Counter Analysis

    ```


    To determine the indexes that are being affected by page splits, we can consider
    a few values. A couple of the values come from `sys.dm_db_index_operational_stats`
    or `dbo.index_operational_stats_history` from the index monitoring process. These
    columns report each page allocation that occurs on an index, whether from inserts
    at the end of the B-tree or page splits in the middle of it. Since we care only
    about operations that are part of page splits, the next two columns provide information
    on whether fragmentation from page splits is occurring. To determine fragmentation,
    the column `avg_fragmentation_in_percent` from `sys.dm_db_index_physical_stats`
    is included in the monitoring table `dbo.index_physical_stats_history`. For the
    average fragmentation, there are two values returned. The first is the last fragmentation
    value reported for the index; the second is the average of all the fragmentation
    values collected. See Listing [14-14](#338675_3_En_14_Chapter.xhtml#PC14).


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    SUM(leaf_allocation_count) AS leaf_insert_count,

    SUM(nonleaf_allocation_count) AS nonleaf_allocation_count,

    MAX(IIF(RankID = 1, x.avg_fragmentation_in_percent, NULL)) AS last_fragmenation,

    AVG(x.avg_fragmentation_in_percent) AS average_fragmenation

    FROM dbo.index_operational_stats_history oh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    CAST(ph.avg_fragmentation_in_percent AS DECIMAL(6, 3)) AS avg_fragmentation_in_percent

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = oh.database_id

    AND ph.object_id = oh.object_id

    AND ph.index_id = oh.index_id

    ) x

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND oh.index_id  0

    AND (

    leaf_allocation_count > 0

    OR nonleaf_allocation_count > 0

    )

    GROUP BY object_id,

    database_id

    ORDER BY leaf_insert_count DESC;

    Listing 14-14

    Page Splits Snapshot Query

    ```


    Investigating page splits in this manner provides a way to see the number of allocations
    and pairs that information with fragmentation. A table with low fragmentation
    and a high `leaf_insert_count`, such as the table `dbo.IndexingCounters` shown
    in Figure [14-5](#338675_3_En_14_Chapter.xhtml#Fig5), is not a concern from a
    page split perspective. On the other hand, `dbo.index_operational_stats_history`
    does show a high amount of fragmentation and `leaf_insert_count`. It would be
    worthwhile to investigate that index further. While the scripting in Listing [14-14](#338675_3_En_14_Chapter.xhtml#PC14)
    doesn’t typically show index results for the IndexingMethod database, the script
    was modified from what is in the listing to provide some results to examine.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig5_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig5_HTML.jpg)


    Figure 14-5


    Page Split snapshot query sample results


    With the indexes requiring more analysis identified, the next step is mitigation.
    There are a number of ways to mitigate page splits on indexes. The first is to
    review the fragmentation history for the index. If the index needs to be rebuilt
    on a regular basis, one of the first things that can be done is to decrease the
    fill factor on the index. Reducing the fill factor will increase the space remaining
    on pages after rebuilding indexes, which will reduce the likelihood for page splits.
    The second strategy for reducing fragmentation is to consider the columns in the
    index. Are the columns highly volatile and do the values change dramatically?
    For instance, an index on `create_date` would likely not have page split issues.
    But one on `update_date` would be prone to fragmentation. If the usage rates for
    the index don’t justify the index, it might be worthwhile to remove that index.
    Or, in multicolumn indexes, move the volatile columns to the right side of the
    index or add them as included columns. A third approach to mitigating page splits
    can be to identify where the index is being used. One final approach to mitigating
    page splits on indexes is to review the data types being used by the index. In
    some cases, a variable data type might be better suited to being a fixed-length
    data type.'
  trans: '#### 每秒页面拆分数


    类似于聚集索引是堆的另一面，页面拆分是前转记录的另一面。关于页面拆分的深入讨论包含在第 2 章中。不过，就本章而言，当聚集或非聚集索引需要在索引页面的顺序中为数据腾出空间以将其放置到正确位置时，就会发生页面拆分。页面拆分可能非常耗费资源，因为单个页面被分成两个或多个页面，并且涉及锁定，可能还会导致阻塞。页面拆分越频繁，索引发生阻塞的可能性就越大，性能也会受到影响。此外，页面拆分导致的碎片化会降低单次操作中可以执行的读取大小。


    为了开始分析页面拆分的性能计数器，我们使用计数器 `Page Splits/sec`。代码清单 14-13 中的查询提供了一种汇总页面拆分活动的方法。该查询包括性能计数器的最小值、最大值和平均水平。此外，还包含了
    `Page Splits/sec` 与 `Batch Requests/sec` 的比率。在识别 SQL Server 实例上是否存在页面拆分问题时，经验法则是寻找每
    20 个 `Batch Requests/sec` 超过 1 个 `Page Splits/sec` 的时间段。当然，与其他计数器一样，请通过 `PctViolation`
    关注计数器超过阈值的时间量。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL)) PageSplits,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 20) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Splits/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageSplits) AS MinPageSplits,

    AVG(PageSplits) AS AvgPageSplits,

    MAX(PageSplits) AS MaxPageSplits,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```

    **代码清单 14-13** 页面拆分计数器分析


    要确定哪些索引受到页面拆分的影响，我们可以考虑几个值。其中几个值来自 `sys.dm_db_index_operational_stats` 或来自索引监控过程的
    `dbo.index_operational_stats_history`。这些列报告索引上发生的每次页面分配，无论是来自 B 树末尾的插入还是中间的页面拆分。由于我们只关心作为页面拆分一部分的操作，接下来的两列提供了是否正在发生由页面拆分引起的碎片的信息。为了确定碎片，监控表
    `dbo.index_physical_stats_history` 中包含了来自 `sys.dm_db_index_physical_stats` 的列
    `avg_fragmentation_in_percent`。对于平均碎片，返回两个值。第一个是索引报告的最新碎片值；第二个是所有收集到的碎片值的平均值。参见代码清单
    14-14。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    SUM(leaf_allocation_count) AS leaf_insert_count,

    SUM(nonleaf_allocation_count) AS nonleaf_allocation_count,

    MAX(IIF(RankID = 1, x.avg_fragmentation_in_percent, NULL)) AS last_fragmenation,

    AVG(x.avg_fragmentation_in_percent) AS average_fragmenation

    FROM dbo.index_operational_stats_history oh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    CAST(ph.avg_fragmentation_in_percent AS DECIMAL(6, 3)) AS avg_fragmentation_in_percent

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = oh.database_id

    AND ph.object_id = oh.object_id

    AND ph.index_id = oh.index_id

    ) x

    WHERE database_id > 4

    AND database_id <> DB_ID()

    AND oh.index_id <> 0

    AND (

    leaf_allocation_count > 0

    OR nonleaf_allocation_count > 0

    )

    GROUP BY object_id,

    database_id

    ORDER BY leaf_insert_count DESC;

    ```

    **代码清单 14-14** 页面拆分快照查询


    以这种方式调查页面拆分提供了一种查看分配数量并将其与碎片信息配对的方法。一个具有低碎片和高 `leaf_insert_count` 的表，例如图 14-5
    中所示的表 `dbo.IndexingCounters`，从页面拆分的角度来看并不是问题。另一方面，`dbo.index_operational_stats_history`
    确实显示了高碎片量和 `leaf_insert_count`。值得进一步研究该索引。虽然代码清单 14-14 中的脚本通常不会显示 IndexingMethod
    数据库的索引结果，但该脚本已从列表中的内容进行了修改，以提供一些可供检查的结果。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig5_HTML.jpg](img/338675_3_En_14_Fig5_HTML.jpg)


    **图 14-5** 页面拆分快照查询示例结果


    识别出需要更多分析的索引后，下一步是缓解。有许多方法可以减轻索引上的页面拆分。首先是审查索引的碎片历史。如果索引需要定期重建，首先可以做的事情之一是降低索引上的填充因子。减少填充因子将在重建索引后增加页面上的剩余空间，这将减少页面拆分的可能性。减少碎片的第二个策略是考虑索引中的列。这些列是否高度易变且值是否发生剧烈变化？例如，基于
    `create_date` 的索引不太可能有页面拆分问题。但基于 `update_date` 的索引则容易产生碎片。如果索引的使用率不能证明其存在是合理的，那么删除该索引可能是值得的。或者，在多列索引中，将易变列移动到索引的右侧或将它们添加为包含列。减轻页面拆分的第三种方法可以是识别索引的使用位置。减轻索引上页面拆分的最后一种方法是审查索引使用的数据类型。在某些情况下，可变长度数据类型可能比固定长度数据类型更合适。'
- fmt: "#### Page Lookups per Second\n\nThe performance counter `Page Lookups/sec`\
    \ measures the number of requests made in the SQL Server instance to retrieve\
    \ individual pages from the buffer pool. When this counter is high, it often means\
    \ that there is inefficiency in query plans, which can often be addressed through\
    \ execution plan analysis. Often, high levels of `Page Lookups/sec` are attributed\
    \ to plans with large numbers of page lookups and row lookups per execution. Generally\
    \ speaking, in terms of performance issues, the value of `Page Lookups/sec` should\
    \ not exceed a ratio of 100 operations for each `Batch Request/sec`.\n\nThe initial\
    \ analysis of `Page Lookups/sec` involves looking at both `Page Lookups/sec` and\
    \ `Batch Request/sec`. To start, use the query shown in Listing [14-15](#338675_3_En_14_Chapter.xhtml#PC15);\
    \ the analysis will include the minimum, maximum, and average `Page Lookups/sec`\
    \ values over the data from the monitoring period. Next, the minimum, maximum,\
    \ and average values of the ratio are included, with the `PctViolation` column,\
    \ for the ratio of `Page Lookups/sec` to `Batch Request/sec` in each time period.\
    \ The violation calculation verified whether the ratio of operations exceeds 100\
    \ to 1.\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Page Lookups/sec',\
    \ Calculated_Counter_value, NULL)) PageLookups,\n           MAX(IIF(counter_name\
    \ = 'Page Lookups/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 100) AS PageLookupRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Page Lookups/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(PageLookups) AS MinPageLookups,\n       AVG(PageLookups)\
    \ AS AvgPageLookups,\n       MAX(PageLookups) AS MaxPageLookups,\n       MIN(PageLookupRatio)\
    \ AS MinPageLookupRatio,\n       AVG(PageLookupRatio) AS AvgPageLookupRatio,\n\
    \       MAX(PageLookupRatio) AS MaxPageLookupRatio,\n       FORMAT(1. * SUM(IIF(PageLookupRatio\
    \ > 1, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\n**Listing 14-15**\nPage Lookups Counter Analysis\n\nAs\
    \ with the other counters, when the analysis dictates that there are potential\
    \ problems with the counter, the next step is to dig deeper. There are three approaches\
    \ that can be taken to address high `Page Lookups/sec` values. The first is to\
    \ query `sys.dm_exec_query_stats` to identify queries that are executed often\
    \ with high I/O; we can find more information on this DMV at `http://msdn.microsoft.com/en-us/library/ms189741.aspx`.\
    \ Those queries need to reviewed, and a determination needs to be made whether\
    \ the queries are utilizing an excessive amount of I/O. Another approach is to\
    \ review the database in the SQL Server instance for missing indexes. The third\
    \ approach, which will be detailed in this section, is to review the occurrences\
    \ of lookups on clustered indexes and heaps.\n\nTo investigate lookups on clustered\
    \ indexes and heaps, the primary source for this information is the DMO `sys.dm_db_index_usage_stats`.\
    \ Thanks to the monitoring implemented in the previous chapter, this information\
    \ is available in the table `dbo.index_usage_stats_history`. To perform the analysis,\
    \ use the query in Listing [14-16](#338675_3_En_14_Chapter.xhtml#PC16); we’ll\
    \ review lookups, seeks, and scans that have occurred from a user perspective.\
    \ With these values, the query calculates the ratio of user lookups to user seeks\
    \ and returns all that have a ratio higher than 100 to 1.\n\n```sql\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_lookups) AS user_lookups,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       x.record_count,\n       CAST(1. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks)\
    \ = 0, 1, SUM(uh.user_seeks)) AS DECIMAL(18, 2)) AS LookupSeekRatio\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id) x\nWHERE uh.database_id > 4\n  AND x.RankID\
    \ = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n         uh.object_id,\n\
    \         uh.index_id,\n         x.record_count\nHAVING CAST(1. * SUM(uh.user_lookups)\
    \ / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks)) AS DECIMAL(18, 2)) > 100\n\
    ORDER BY 1. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))\
    \ DESC;\nGO\n```\n**Listing 14-16**\nPage Lookups Snapshot Query\n\nOnce indexes\
    \ with issues are identified, the next step is to determine how and where the\
    \ indexes are being used, the process for which is described later in this chapter."
  raw: '#### Page Lookups per Second


    The performance counter Page Lookups/sec measures the number of requests made
    in the SQL Server instance to retrieve individual pages from the buffer pool.
    When this counter is high, it often means that there is inefficiency in query
    plans, which can often be addressed through execution plan analysis. Often, high
    levels of Page Lookups/sec are attributed to plans with large numbers of page
    lookups and row lookups per execution. Generally speaking, in terms of performance
    issues, the value of Page Lookups/sec should not exceed a ratio of 100 operations
    for each Batch Request/sec.


    The initial analysis of Page Lookups/sec involves looking at both Page Lookups/sec
    and Batch Request/sec. To start, use the query shown in Listing [14-15](#338675_3_En_14_Chapter.xhtml#PC15);
    the analysis will include the minimum, maximum, and average Page Lookups/sec values
    over the data from the monitoring period. Next, the minimum, maximum, and average
    values of the ratio are included, with the `PctViolation` column, for the ratio
    of Page Lookups/sec to Batch Request/sec in each time period. The violation calculation
    verified whether the ratio of operations exceeds 100 to 1.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Lookups/sec'', Calculated_Counter_value, NULL))
    PageLookups,

    MAX(IIF(counter_name = ''Page Lookups/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 100) AS PageLookupRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Lookups/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageLookups) AS MinPageLookups,

    AVG(PageLookups) AS AvgPageLookups,

    MAX(PageLookups) AS MaxPageLookups,

    MIN(PageLookupRatio) AS MinPageLookupRatio,

    AVG(PageLookupRatio) AS AvgPageLookupRatio,

    MAX(PageLookupRatio) AS MaxPageLookupRatio,

    FORMAT(1\. * SUM(IIF(PageLookupRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-15

    Page Lookups Counter Analysis

    ```


    As with the other counters, when the analysis dictates that there are potential
    problems with the counter, the next step is to dig deeper. There are three approaches
    that can be taken to address high Page Lookups/sec values. The first is to query
    `sys.dm_exec_query_stats` to identify queries that are executed often with high
    I/O; we can find more information on this DMV at [`http://msdn.microsoft.com/en-us/library/ms189741.aspx`](http://msdn.microsoft.com/en-us/library/ms189741.aspx).
    Those queries need to reviewed, and a determination needs to be made whether the
    queries are utilizing an excessive amount of I/O. Another approach is to review
    the database in the SQL Server instance for missing indexes. The third approach,
    which will be detailed in this section, is to review the occurrences of lookups
    on clustered indexes and heaps.


    To investigate lookups on clustered indexes and heaps, the primary source for
    this information is the DMO `sys.dm_db_index_usage_stats`. Thanks to the monitoring
    implemented in the previous chapter, this information is available in the table
    `dbo.index_usage_stats_history`. To perform the analysis, use the query in Listing
    [14-16](#338675_3_En_14_Chapter.xhtml#PC16); we’ll review lookups, seeks, and
    scans that have occurred from a user perspective. With these values, the query
    calculates the ratio of user lookups to user seeks and returns all that have a
    ratio higher than 100 to 1.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_lookups) AS user_lookups,

    SUM(uh.user_seeks) AS user_seeks,

    SUM(uh.user_scans) AS user_scans,

    x.record_count,

    CAST(1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    AS DECIMAL(18, 2)) AS LookupSeekRatio

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id) x

    WHERE uh.database_id > 4

    AND x.RankID = 1

    AND x.record_count > 0

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    HAVING CAST(1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    AS DECIMAL(18, 2)) > 100

    ORDER BY 1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    DESC;

    GO

    Listing 14-16

    Page Lookups Snapshot Query

    ```


    Once indexes with issues are identified, the next step is to determine how and
    where the indexes are being used, the process for which is described later in
    this chapter.'
  trans: "\n#### 每秒页面查找次数\n\n性能计数器 `Page Lookups/sec` 用于衡量在 SQL Server 实例中，为从缓冲池中检索单个数据页而发出的请求数量。当此计数器值较高时，通常意味着查询计划中存在低效问题，这通常可以通过执行计划分析来解决。通常，`Page\
    \ Lookups/sec` 值过高可归因于那些每次执行都涉及大量页面查找和行查找的计划。一般来说，就性能问题而言，`Page Lookups/sec` 的值不应超过每秒批处理请求数\
    \ (`Batch Request/sec`) 的 100 倍。\n\n对 `Page Lookups/sec` 的初步分析需要同时查看 `Page Lookups/sec`\
    \ 和 `Batch Request/sec`。首先，使用清单 14-15 中所示的查询；该分析将包含监测期间内 `Page Lookups/sec` 的最小值、最大值和平均值。其次，查询结果中还包括了每个时间段内\
    \ `Page Lookups/sec` 与 `Batch Request/sec` 比率的最小值、最大值和平均值，并包含一个 `PctViolation`\
    \ 列，用于标识该比率。违规计算用于验证操作比率是否超过了 100:1。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH\
    \ CounterSummary\nAS (SELECT create_date,\n           server_name,\n         \
    \  MAX(IIF(counter_name = 'Page Lookups/sec', Calculated_Counter_value, NULL))\
    \ PageLookups,\n           MAX(IIF(counter_name = 'Page Lookups/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 100) AS PageLookupRatio\n    FROM dbo.IndexingCounters\n    WHERE\
    \ counter_name IN ( 'Page Lookups/sec', 'Batch Requests/sec' )\n    GROUP BY create_date,\n\
    \             server_name)\nSELECT server_name,\n       MIN(PageLookups) AS MinPageLookups,\n\
    \       AVG(PageLookups) AS AvgPageLookups,\n       MAX(PageLookups) AS MaxPageLookups,\n\
    \       MIN(PageLookupRatio) AS MinPageLookupRatio,\n       AVG(PageLookupRatio)\
    \ AS AvgPageLookupRatio,\n       MAX(PageLookupRatio) AS MaxPageLookupRatio,\n\
    \       FORMAT(1. * SUM(IIF(PageLookupRatio > 1, 1, 0)) / COUNT(*), '0.00%') AS\
    \ PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n**清单 14-15**\n\
    页面查找计数器分析\n\n与其他计数器一样，当分析表明该计数器存在潜在问题时，下一步就是深入挖掘。有三种方法可以解决 `Page Lookups/sec`\
    \ 值过高的问题。第一种是查询 `sys.dm_exec_query_stats` 以识别那些经常执行且具有高 I/O 的查询；我们可以在 `http://msdn.microsoft.com/en-us/library/ms189741.aspx`\
    \ 上找到关于此 DMV 的更多信息。需要审查这些查询，并确定它们是否使用了过量的 I/O。第二种方法是检查 SQL Server 实例中的数据库是否存在缺失索引。第三种方法，也是本节将要详细介绍的，是检查聚集索引和堆上发生的查找操作。\n\
    \n要调查聚集索引和堆上的查找操作，主要信息来源是 DMO `sys.dm_db_index_usage_stats`。得益于前一章实施的监控，这些信息已保存在表\
    \ `dbo.index_usage_stats_history` 中。要执行分析，请使用清单 14-16 中的查询；我们将从用户角度审查发生的查找、 Seek\
    \ 和 Scan 操作。利用这些值，该查询计算用户查找与用户 Seek 的比率，并返回所有比率高于 100:1 的记录。\n\n```sql\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_lookups) AS user_lookups,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       x.record_count,\n       CAST(1. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks)\
    \ = 0, 1, SUM(uh.user_seeks)) AS DECIMAL(18, 2)) AS LookupSeekRatio\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id) x\nWHERE uh.database_id > 4\n  AND x.RankID\
    \ = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n         uh.object_id,\n\
    \         uh.index_id,\n         x.record_count\nHAVING CAST(1. * SUM(uh.user_lookups)\
    \ / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks)) AS DECIMAL(18, 2)) > 100\n\
    ORDER BY 1. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))\
    \ DESC;\nGO\n```\n**清单 14-16**\n页面查找快照查询\n\n一旦识别出有问题的索引，下一步就是确定这些索引在何处以及如何被使用，该过程将在本章后面描述。\n"
- fmt: "# Page Compression\n\nThe performance counters `Page compression attempts/sec`\
    \ and `Pages compressed/sec` measure the number of pages compressed and attempted\
    \ to be compressed. When the rate of `Pages compressed/sec` decreases in comparison\
    \ to the `Page compression attempts/sec`, it indicates failures in SQL Server\
    \ compression algorithm to save data pages in a compressed state. While there\
    \ is data that is better off uncompressed, in cases where the CPU cost to decompress\
    \ exceeds the point where there is value in compressing the data, which often\
    \ happens on data that appears random like the raw output of an image file. The\
    \ trouble with compression failures is that SQL Server already spent time, specifically\
    \ CPU resources, attempting compress the page. Generally, when more than 5 percent\
    \ of page compression attempts start to fail, it’s worthwhile identifying what\
    \ indexes the failures are occurring on.\n\nTo analyze if there is an issue with\
    \ page compression, we’ll first want to look at the counters for page compression.\
    \ Using the query shown in Listing 14-17, we can review the minimum, maximum,\
    \ and average `Page compression attempts/sec` and `Pages compressed/sec` values\
    \ from the monitoring period. Additionally, the ratio of `Pages compressed/sec`\
    \ to `Page compression attempts/sec` is included with the minimum, maximum, and\
    \ average values. The `PctViolation` column lets us know the percentage of time\
    \ the 5 percent threshold is violated.\n\n```sql\nUSE IndexingMethod;\nGO\nWITH\
    \ CounterSummary\nAS (SELECT create_date,\n           server_name,\n         \
    \  MAX(IIF(counter_name = 'Page compression attempts/sec', Calculated_Counter_value,\
    \ NULL)) PageCompressionAttempts,\n           MAX(IIF(counter_name = 'Pages compressed/sec',\
    \ Calculated_Counter_value, NULL)) PagesCompressed,\n           MAX(IIF(counter_name\
    \ = 'Page compression attempts/sec', Calculated_Counter_value, NULL))\n      \
    \     / (NULLIF(MAX(IIF(counter_name = 'Pages compressed/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 100.) AS CompressionRate\n    FROM dbo.IndexingCounters\n    WHERE\
    \ counter_name IN ( 'Page compression attempts/sec', 'Pages compressed/sec')\n\
    \    GROUP BY create_date,\n             server_name)\nSELECT server_name,\n \
    \      MIN(PageCompressionAttempts) AS MinPageCompressionAttempts,\n       AVG(PageCompressionAttempts)\
    \ AS AvgPageCompressionAttempts,\n       MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,\n\
    \       MIN(PagesCompressed) AS MinPagesCompressed,\n       AVG(PagesCompressed)\
    \ AS AvgPagesCompressed,\n       MAX(PagesCompressed) AS MaxPagesCompressed,\n\
    \       MIN(CompressionRate) AS MinCompressionRate,\n       AVG(CompressionRate)\
    \ AS AvgCompressionRate,\n       MAX(CompressionRate) AS MaxCompressionRate,\n\
    \       FORMAT(1. * SUM(IIF(CompressionRate < 95, 1, 0)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n\nListing\
    \ 14-17: Page Compression Counter Analysis\n\nIf there is an indication that page\
    \ compression failures are high or gaining in frequency, it’s worth digging deeper\
    \ within the databases to determine which tables and indexes are failing to page\
    \ compress. Using the data that we’ve been storing for the indexes, we can determine\
    \ which specific index has page compression failure, or the lowest page compression\
    \ success rate, using the query in Listing 14-18. The results would look similar\
    \ to those in Figure 14-6. That index was created with all of the columns from\
    \ `Person.Person`, which included some `XML` and `varchar(max)` columns. The success\
    \ rate for page compressions for this index is just over 50 percent which is a\
    \ rather terrible result.\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig6_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6: Page Split snapshot query sample results\n\n```sql\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(object_id,\
    \ database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName,\n\
    \       oh.index_id,\n       SUM(oh.page_compression_attempt_count) AS page_compression_attempt_count,\n\
    \       SUM(oh.page_compression_success_count) AS page_compression_success_count,\n\
    \       SUM(1. * oh.page_compression_success_count / NULLIF(oh.page_compression_attempt_count,\
    \ 0)) AS page_compression_success_rate\nFROM dbo.index_operational_stats_history\
    \ oh\nWHERE database_id > 4\n  AND database_id <> DB_ID()\n  AND oh.page_compression_attempt_count\
    \ > 0\nGROUP BY object_id,\n         database_id,\n         index_id;\n```\n\n\
    Listing 14-18: Page Compression Snapshot Query\n\nOnce indexes with issues are\
    \ identified, the next step is to determine whether page compression is appropriate\
    \ for the index. Indexes that contain data types such as `XML` or `varchar(max)`\
    \ are poor candidates for page compression, as we saw in Figure 14-6."
  raw: '#### Page Compression


    The performance counters Page compression attempts/sec and Pages compressed/sec
    measure the number of pages compressed and attempted to be compressed. When the
    rate of Pages Compressed/sec decreases in comparison to the Page Compressions/sec,
    it indicates failures in SQL Server compression algorithm to save data pages in
    a compressed state. While there is data that is better off uncompressed, in cases
    where the CPU cost to decompress exceeds the point where there is value in compressing
    the data, which often happens on data that appears random like the raw output
    of an image file. The trouble with compression failures is that SQL Server already
    spent time, specifically CPU resources, attempting compress the page. Generally,
    when more than 5 percent of page compression attempts start to fail, it’s worthwhile
    identifying what indexes the failures are occurring on.


    To analyze if there is an issue with page compression, we’ll first want to look
    at the counters for page compression. Using the query shown in Listing [14-17](#338675_3_En_14_Chapter.xhtml#PC17),
    we can review the minimum, maximum, and average Page compression attempts/sec
    and Pages compressed/sec values from the monitoring period. Additionally, the
    ratio of Pages compressed/sec to Page compression attempts/sec is included with
    the minimum, maximum, and average values. The `PctViolation` column lets us know
    the percentage of time the 5 percent threshold is violated.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page compression attempts/sec'', Calculated_Counter_value,
    NULL)) PageCompressionAttempts,

    MAX(IIF(counter_name = ''Pages compressed/sec'', Calculated_Counter_value, NULL))
    PagesCompressed,

    MAX(IIF(counter_name = ''Page compression attempts/sec'', Calculated_Counter_value,
    NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Pages compressed/sec'', Calculated_Counter_value,
    NULL)), 0) * 100.) AS CompressionRate

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page compression attempts/sec'', ''Pages compressed/sec'')

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageCompressionAttempts) AS MinPageCompressionAttempts,

    AVG(PageCompressionAttempts) AS AvgPageCompressionAttempts,

    MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,

    MIN(PagesCompressed) AS MinPagesCompressed,

    AVG(PagesCompressed) AS AvgPagesCompressed,

    MAX(PagesCompressed) AS MaxPagesCompressed,

    MIN(CompressionRate) AS MinCompressionRate,

    AVG(CompressionRate) AS AvgCompressionRate,

    MAX(CompressionRate) AS MaxCompressionRate,

    FORMAT(1\. * SUM(IIF(CompressionRate < 95, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 14-17

    Page Compression Counter Analysis

    ```


    If there is an indication that page compression failures are high or gaining in
    frequency, it’s worth digging deeper within the databases to determine which tables
    and indexes are failing to page compress. Using the data that we’ve been storing
    for the indexes, we can determine which specific index has page compression failure,
    or the lowest page compression success rate, using the query in Listing [14-18](#338675_3_En_14_Chapter.xhtml#PC18).
    The results would look similar to those in Figure [14-6](#338675_3_En_14_Chapter.xhtml#Fig6).
    That index was created with all of the columns from Person.Person, which included
    some XML and varchar(max) columns. The success rate for page compressions for
    this index is just over 50 percent which is a rather terrible result.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig6_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig6_HTML.jpg)


    Figure 14-6


    Page Split snapshot query sample results


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    oh.index_id,

    SUM(oh.page_compression_attempt_count) AS page_compression_attempt_count,

    SUM(oh.page_compression_success_count) AS page_compression_success_count,

    SUM(1\. * oh.page_compression_success_count / NULLIF(oh.page_compression_attempt_count,
    0)) AS page_compression_success_rate

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND oh.page_compression_attempt_count > 0

    GROUP BY object_id,

    database_id,

    index_id;

    Listing 14-18

    Page Compression Snapshot Query

    ```


    Once indexes with issues are identified, the next step is to determine whether
    page compression is appropriate for the index. Indexes that contain data types
    such as XML or varchar(max) are poor candidates for page compression, as we saw
    in Figure [14-6](#338675_3_En_14_Chapter.xhtml#Fig6).'
  trans: "# 页面压缩\n\n性能计数器`Page compression attempts/sec`和`Pages compressed/sec`分别用于测量已压缩和尝试压缩的页面数量。当`Pages\
    \ compressed/sec`的比率相较于`Page compression attempts/sec`下降时，这表明 SQL Server 压缩算法在以压缩状态保存数据页面方面存在失败。虽然有些数据本就不适合压缩，但在解压所需的\
    \ CPU 开销超过数据压缩所带来的价值时（这种情况常见于像图像文件原始输出这类看似随机的数据），便会出现问题。压缩失败的麻烦之处在于，SQL Server\
    \ 已经花费了时间（特别是 CPU 资源）尝试压缩页面。通常，当超过 5%的页面压缩尝试开始失败时，就值得去识别失败发生在哪些索引上。\n\n要分析页面压缩是否存在问题，我们首先需要查看页面压缩的计数器。使用清单\
    \ 14-17 所示的查询，我们可以审查监控期间`Page compression attempts/sec`和`Pages compressed/sec`的最小值、最大值和平均值。此外，该查询还包含了`Pages\
    \ compressed/sec`与`Page compression attempts/sec`的比率的最小值、最大值和平均值。`PctViolation`列让我们知道有多少百分比的时间违反了\
    \ 5%的阈值。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Page compression\
    \ attempts/sec', Calculated_Counter_value, NULL)) PageCompressionAttempts,\n \
    \          MAX(IIF(counter_name = 'Pages compressed/sec', Calculated_Counter_value,\
    \ NULL)) PagesCompressed,\n           MAX(IIF(counter_name = 'Page compression\
    \ attempts/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Pages compressed/sec', Calculated_Counter_value, NULL)), 0) * 100.) AS CompressionRate\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Page compression\
    \ attempts/sec', 'Pages compressed/sec')\n    GROUP BY create_date,\n        \
    \     server_name)\nSELECT server_name,\n       MIN(PageCompressionAttempts) AS\
    \ MinPageCompressionAttempts,\n       AVG(PageCompressionAttempts) AS AvgPageCompressionAttempts,\n\
    \       MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,\n       MIN(PagesCompressed)\
    \ AS MinPagesCompressed,\n       AVG(PagesCompressed) AS AvgPagesCompressed,\n\
    \       MAX(PagesCompressed) AS MaxPagesCompressed,\n       MIN(CompressionRate)\
    \ AS MinCompressionRate,\n       AVG(CompressionRate) AS AvgCompressionRate,\n\
    \       MAX(CompressionRate) AS MaxCompressionRate,\n       FORMAT(1. * SUM(IIF(CompressionRate\
    \ < 95, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\n\n清单 14-17：页面压缩计数器分析\n\n如果表明页面压缩失败率很高或频率在增加，那么值得在数据库内部进行更深入的挖掘，以确定哪些表和索引未能成功进行页面压缩。利用我们一直存储的索引数据，我们可以使用清单\
    \ 14-18 中的查询来确定哪些特定索引存在页面压缩失败，或者页面压缩成功率最低。结果将类似于图 14-6 所示。该索引是基于`Person.Person`表的所有列创建的，其中包含一些`XML`和`varchar(max)`列。该索引的页面压缩成功率略高于\
    \ 50%，这是一个相当糟糕的结果。\n\n![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig6_HTML.jpg](img/338675_3_En_14_Fig6_HTML.jpg)\n\
    \n图 14-6：页面拆分快照查询示例结果\n\n```sql\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id))\
    \ AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id))\
    \ + '.' + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName,\n    \
    \   oh.index_id,\n       SUM(oh.page_compression_attempt_count) AS page_compression_attempt_count,\n\
    \       SUM(oh.page_compression_success_count) AS page_compression_success_count,\n\
    \       SUM(1. * oh.page_compression_success_count / NULLIF(oh.page_compression_attempt_count,\
    \ 0)) AS page_compression_success_rate\nFROM dbo.index_operational_stats_history\
    \ oh\nWHERE database_id > 4\n  AND database_id <> DB_ID()\n  AND oh.page_compression_attempt_count\
    \ > 0\nGROUP BY object_id,\n         database_id,\n         index_id;\n```\n\n\
    清单 14-18：页面压缩快照查询\n\n一旦识别出有问题的索引，下一步就是确定页面压缩是否适用于该索引。包含诸如`XML`或`varchar(max)`等数据类型的索引是页面压缩的较差候选对象，正如我们在图\
    \ 14-6 中所看到的。"
- fmt: '#### Lock Wait Time


    一些性能计数器可以根据其使用情况来判断索引是否存在压力。其中一个这样的计数器是`Lock Wait Time (ms)`。该计数器以毫秒为单位，衡量`SQL
    Server`在等待对表、索引或页实施锁所花费的时间。这个计数器没有公认的优良阈值。一般来说，这个值越低越好，但“低”的含义完全取决于数据库平台和访问它的应用程序。


    由于没有关于`Lock Wait Time(ms)`的值在何种水平上是好是坏的指导，因此评估该计数器的最佳方法是将其与基准值进行比较。在这种情况下，收集基准对于能够监控与`Lock
    Wait Time`相关的索引性能何时发生变得极其重要。使用清单[14-19](#338675_3_En_14_Chapter.xhtml#PC19)中的查询，可以将`Lock
    Wait Time (ms)`值与可用的基准值进行比较。对于基准期和监控期的值，都提供了计数器值的最小值、最大值、平均值和标准差的聚合。这些聚合有助于提供计数器状态的概况，以及它是否相较于基线有所增加或减少。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Wait Time (ms)'', Calculated_Counter_value, NULL))
    / 1000 LockWaitTime

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Wait Time (ms)''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaitTime) AS MinLockWaitTime,

    AVG(LockWaitTime) AS AvgLockWaitTime,

    MAX(LockWaitTime) AS MaxLockWaitTime,

    STDEV(LockWaitTime) AS StdDevLockWaitTime

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Wait Time (ms)''

    ORDER BY instance_name,

    CounterDate DESC;

    ```

    清单 14-19

    `Lock Wait Time` 计数器分析


    例如，在图[14-7](#338675_3_En_14_Chapter.xhtml#Fig7)中，平均和最大锁等待时间已从基准值下降，这是期望的结果。如果平均锁等待时间相较于基线有所增加，则可能需要引起关注，特别是当增加量达到数十毫秒时。此外，如果最大值范围有所增加，这也值得进一步调查。等待获取锁所花费的时间持续越长，就越可能影响用户。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig7_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig7_HTML.jpg)


    图 14-7

    `Lock Wait Time` 计数器分析示例结果


    在调查`Lock Wait Time`时，使用清单[14-20](#338675_3_En_14_Chapter.xhtml#PC20)中的查询来识别哪些索引产生了最多的`Lock
    Wait Time`至关重要。此信息可以从`DMO sys.dm_db_index_operational_stats`或监控表`dbo.index_operational_stats_history`中找到。用于检查`Lock
    Wait Time`的列是`row_lock_wait_count`、`row_lock_wait_in_ms`、`page_lock_wait_count`和`page_lock_wait_in_ms`。这些列报告了每个索引的等待次数和这些等待的时间。正如列名所示，锁在行级和页级都存在；通常，锁类型的变化与索引上的查找和扫描操作相关。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    SUM(row_lock_wait_in_ms) / 1000\. AS row_lock_wait_in_sec,

    ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000.,
    0) AS avg_row_lock_wait_in_sec,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    SUM(page_lock_wait_in_ms) / 1000\. AS page_lock_wait_in_sec,

    ISNULL(SUM(page_lock_wait_in_ms) / NULLIF(SUM(page_lock_wait_count), 0) / 1000.,
    0) AS avg_page_lock_wait_in_sec

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```

    清单 14-20

    `Lock Wait Time` 快照查询


    查看图[14-8](#338675_3_En_14_Chapter.xhtml#Fig8)所示的快照查询结果，有几点需要指出。首先，在此示例中，所有锁都发生在表的页上，而不是行级。这可能导致更大范围的阻塞，因为锁定的不仅仅是正在访问的行。其次，平均页锁时间约为7秒。对于大多数环境来说，这是一个过长的锁定时间。基于此信息，我们应进一步调查该表上的聚集索引（`index_id=1`）`Sales.SalesOrderDetail`。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig8_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig8_HTML.jpg)


    图 14-8

    `Lock Wait Time` 索引分析示例结果


    当我们需要更深入地研究索引及其用法时，下一步是确定哪些执行计划正在使用该索引。然后优化查询或索引以减少锁定。在某些情况下，如果索引对表不关键，删除该索引并让其他索引来满足查询可能更好。'
  raw: '#### Lock Wait Time


    Some performance counters can be used to determine whether there is pressure on
    the indexes based on their usage. One such counter is Lock Wait Time (ms). This
    counter measures the amount of time, in milliseconds, that SQL Server spends waiting
    to implement a lock on a table, index, or page. There aren’t any good guidance
    values for this counter. Generally, the lower this value, the better, but what
    “low” means is entirely dependent on the database platform and the applications
    that are accessing it.


    Since there are no guidelines for the level at which the values from Lock Wait
    Time(ms) are good or bad, the best method for evaluating the counter is to compare
    it to the baseline values. In this case, collecting a baseline becomes incredibly
    important in terms of being able to monitor when index performance related to
    Lock Wait Time has occurred. Using the query in Listing [14-19](#338675_3_En_14_Chapter.xhtml#PC19),
    the Lock Wait Time (ms) value is compared to the available baseline values. For
    both the baseline and the values from the monitoring period, an aggregate of the
    counter values is provided for the minimum, maximum, average, and standard deviation.
    These aggregations assist in providing a profile of the state of the counter and
    whether it has increased or decreased compared to the baseline.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Wait Time (ms)'', Calculated_Counter_value, NULL))
    / 1000 LockWaitTime

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Wait Time (ms)''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaitTime) AS MinLockWaitTime,

    AVG(LockWaitTime) AS AvgLockWaitTime,

    MAX(LockWaitTime) AS MaxLockWaitTime,

    STDEV(LockWaitTime) AS StdDevLockWaitTime

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Wait Time (ms)''

    ORDER BY instance_name,

    CounterDate DESC;

    Listing 14-19

    Lock Wait Time Counter Analysis

    ```


    As an example, in Figure [14-7](#338675_3_En_14_Chapter.xhtml#Fig7), the average
    and maximum Lock Wait Times have decreased from the baseline values which is what
    would be desired. In the case where there was an increase in the average lock
    wait over the baseline, there could be a cause for concern, especially if that
    increase is in tens of milliseconds. Also, if there were an increase in the range
    to the maximum value, it would be something else to investigate. The more the
    duration of time spent waiting to acquire locks increases, the more it is likely
    going to impact users.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig7_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig7_HTML.jpg)


    Figure 14-7


    Lock Wait Time counter analysis sample results


    When investigating Lock Wait Time, it is important to identify which indexes are
    generating the most Lock Wait Time by using the query in Listing [14-20](#338675_3_En_14_Chapter.xhtml#PC20).
    This information is found in the DMO `sys.dm_db_index_operational_stats` or the
    monitoring table `dbo.index_operational_stats_history`. The columns reviewed for
    Lock Wait Time are `row_lock_wait_count`, `row_lock_wait_count`, `row_lock_wait_count`,
    and `page_lock_wait_in_ms`. These columns report the number of waits per index
    and the time for those waits. As the columns indicate, there are locks at both
    the row and page levels; most often the variations between the lock types correlate
    with seek and scan operations on the index.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    SUM(row_lock_wait_in_ms) / 1000\. AS row_lock_wait_in_sec,

    ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000.,
    0) AS avg_row_lock_wait_in_sec,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    SUM(page_lock_wait_in_ms) / 1000\. AS page_lock_wait_in_sec,

    ISNULL(SUM(page_lock_wait_in_ms) / NULLIF(SUM(page_lock_wait_count), 0) / 1000.,
    0) AS avg_page_lock_wait_in_sec

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    Listing 14-20

    Lock Wait Time Snapshot Query

    ```


    Looking at the results of the snapshot query, shown in Figure [14-8](#338675_3_En_14_Chapter.xhtml#Fig8),
    there are a couple things to point out. First, in this example, all the locks
    are occurring across the pages of the table, not at the row level. This can result
    in larger-scale blocking since more than the rows being accessed will be locked.
    Also, the average page lock is about 7 seconds. For most environments, this is
    an excessive amount of time for locking. Based on this information, we should
    definitely further investigate the clustered index (`index_id=1`) on the table
    `Sales.SalesOrderDetail`.


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig8_HTML.jpg](images/338675_3_En_14_Chapter/338675_3_En_14_Fig8_HTML.jpg)


    Figure 14-8


    Lock Wait Time index analysis sample results


    When we need to dig deeper into an index and its usage, the next step is to determine
    which execution plans are utilizing the index. Then optimize either the queries
    or the index to reduce locking. In some cases, if the index is not critical to
    the table, it might be better to remove the index and allow other indexes to satisfy
    the queries.'
  trans: '#### 锁等待时间


    一些性能计数器可以根据其使用情况来判断索引是否存在压力。其中一个这样的计数器是 `Lock Wait Time (ms)`。该计数器以毫秒为单位，衡量 `SQL
    Server` 在等待对表、索引或页实施锁所花费的时间。这个计数器没有公认的优良阈值。一般来说，这个值越低越好，但“低”的含义完全取决于数据库平台和访问它的应用程序。


    由于没有关于 `Lock Wait Time(ms)` 的值在何种水平上是好是坏的指导，因此评估该计数器的最佳方法是将其与基准值进行比较。在这种情况下，收集基准对于能够监控与
    `Lock Wait Time` 相关的索引性能何时发生变得极其重要。使用清单 14-19 中的查询，可以将 `Lock Wait Time (ms)` 值与可用的基准值进行比较。对于基准期和监控期的值，都提供了计数器值的最小值、最大值、平均值和标准差的聚合。这些聚合有助于提供计数器状态的概况，以及它是否相较于基线有所增加或减少。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Wait Time (ms)'', Calculated_Counter_value, NULL))
    / 1000 LockWaitTime

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Wait Time (ms)''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaitTime) AS MinLockWaitTime,

    AVG(LockWaitTime) AS AvgLockWaitTime,

    MAX(LockWaitTime) AS MaxLockWaitTime,

    STDEV(LockWaitTime) AS StdDevLockWaitTime

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Wait Time (ms)''

    ORDER BY instance_name,

    CounterDate DESC;

    ```

    清单 14-19

    `Lock Wait Time` 计数器分析


    例如，在图 14-7 中，平均和最大锁等待时间已从基准值下降，这是期望的结果。如果平均锁等待时间相较于基线有所增加，则可能需要引起关注，特别是当增加量达到数十毫秒时。此外，如果最大值范围有所增加，这也值得进一步调查。等待获取锁所花费的时间持续越长，就越可能影响用户。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig7_HTML.jpg](img/338675_3_En_14_Fig7_HTML.jpg)


    图 14-7

    `Lock Wait Time` 计数器分析示例结果


    在调查 `Lock Wait Time` 时，使用清单 14-20 中的查询来识别哪些索引产生了最多的 `Lock Wait Time` 至关重要。此信息可以从
    `DMO sys.dm_db_index_operational_stats` 或监控表 `dbo.index_operational_stats_history`
    中找到。用于检查 `Lock Wait Time` 的列是 `row_lock_wait_count`、`row_lock_wait_in_ms`、`page_lock_wait_count`
    和 `page_lock_wait_in_ms`。这些列报告了每个索引的等待次数和这些等待的时间。正如列名所示，锁在行级和页级都存在；通常，锁类型的变化与索引上的查找和扫描操作相关。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    SUM(row_lock_wait_in_ms) / 1000\. AS row_lock_wait_in_sec,

    ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000.,
    0) AS avg_row_lock_wait_in_sec,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    SUM(page_lock_wait_in_ms) / 1000\. AS page_lock_wait_in_sec,

    ISNULL(SUM(page_lock_wait_in_ms) / NULLIF(SUM(page_lock_wait_count), 0) / 1000.,
    0) AS avg_page_lock_wait_in_sec

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```

    清单 14-20

    `Lock Wait Time` 快照查询


    查看图 14-8 所示的快照查询结果，有几点需要指出。首先，在此示例中，所有锁都发生在表的页上，而不是行级。这可能导致更大范围的阻塞，因为锁定的不仅仅是正在访问的行。其次，平均页锁时间约为
    7 秒。对于大多数环境来说，这是一个过长的锁定时间。基于此信息，我们应进一步调查该表上的聚集索引（`index_id=1`）`Sales.SalesOrderDetail`。


    ![../images/338675_3_En_14_Chapter/338675_3_En_14_Fig8_HTML.jpg](img/338675_3_En_14_Fig8_HTML.jpg)


    图 14-8

    `Lock Wait Time` 索引分析示例结果


    当我们需要更深入地研究索引及其用法时，下一步是确定哪些执行计划正在使用该索引。然后优化查询或索引以减少锁定。在某些情况下，如果索引对表不关键，删除该索引并让其他索引来满足查询可能更好。'
- fmt: '## Lock Waits per Second


    The next counter, `Lock Waits/sec`, has a similar approach for analysis to that
    of `Lock Wait Time (ms)`. With `Lock Waits/sec`, the counter measures the number
    of lock requests that could not be satisfied immediately. For these requests,
    SQL Server waited until the row or page was available for the lock before granting
    the lock. As with the other counter, this counter does not have any specific guidelines
    on what "good" values are. For these, we should turn to the baseline and compare
    and contrast against it to determine when the counter is outside normal operations.


    The analysis of `Lock Waits/sec` includes the same minimum, maximum, average,
    and standard deviation aggregations as used for `Lock Wait Time(ms)`. These values
    are aggregated for both the per-counter table `dbo.IndexingCounters` and the baseline
    table `dbo.IndexingCountersBaseline`, shown in Listing 14-21. Figure 14-9 displays
    the results from the query.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Waits/sec'', Calculated_Counter_value, NULL)) LockWaits

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Waits/sec''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaits) AS MinLockWait,

    AVG(LockWaits) AS AvgLockWait,

    MAX(LockWaits) AS MaxLockWait,

    STDEV(LockWaits) AS StdDevLockWait

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Waits/sec''

    ORDER BY instance_name,

    CounterDate DESC;

    ```

    **Listing 14-21 Lock Waits Counter Analysis**


    There will be times, such as those included in Figure 14-9, when `Lock Wait/sec`
    is not an issue, but there were issues with `Lock Wait Time(ms)`. Those cases
    point to long duration blocking situations. On the other hand, `Lock Wait/sec`
    is important to monitor since it will indicate when there is widespread blocking.
    The blocking may not be long in duration, but it is widespread; a single long
    block can cause significant performance issues.


    ![Lock Waits counter analysis sample results](images/338675_3_En_14_Chapter/338675_3_En_14_Fig9_HTML.jpg)

    *Figure 14-9 Lock Waits counter analysis sample results*


    In a situation with widespread blocking, as indicated by high values for `Lock
    Wait/sec`, the analysis will require investigating the statistics of indexes using
    the DMO `sys.dm_db_index_operational stats`. With the monitoring process, this
    information will be available in the table `dbo.index_operational_stats_history`.
    Using the query in Listing 14-22, the count and percentage of locks that wait
    can be determined. As with `Lock Wait Time(ms)`, this counter analysis also looks
    at statistics at the row and page levels.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_count) AS row_lock_count,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    ISNULL(SUM(row_lock_wait_count) / NULLIF(SUM(row_lock_count), 0), 0) AS pct_row_lock_wait,

    SUM(page_lock_count) AS page_lock_count,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    ISNULL(SUM(page_lock_wait_count) / NULLIF(SUM(page_lock_count), 0), 0) AS pct_page_lock_wait

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```

    **Listing 14-22 Lock Waits Snapshot Query**


    Indexes that have a high percentage of lock waits to locks are prime for index
    tuning. Often, when there are excessive lock waits on a database, the end users
    will see slowness in the applications and, in some of the worse cases, time-outs
    in the applications. The aim of analyzing this counter is to identify indexes
    that can be optimized and then to investigate where the indexes are being used.
    Once this is done, address the causes for the locks and tune the indexes and queries
    to reduce the locking on the index.'
