  trans: '### `sys.dm_db_incremental_stats_properties`


    正如第 9 章所讨论的，随着增量索引维护的引入，统计信息也需要支持增量更新的能力以配合该特性。作为 `sys.dm_db_stats_properties`
    的配套函数，`sys.dm_db_incremental_stats_properties` 提供了对增量统计信息和索引的统计属性的可见性。`sys.dm_db_incremental_stats_properties`
    的语法（如代码清单 3-11 所示）包含与其他函数相同的两个参数：`object_id` 和 `stats_id`。返回的列与表 3-6 中的列相同，只是此函数多了一个
    `partition_number` 列，用于指示增量统计信息所属的分区。


    ```

    sys.dm_db_incremental_stats_properties (object_id, stats_id)

    代码清单 3-11

    sys.dm_db_incremental_stats_properties 的语法

    ```


    ### 统计信息 DDL


    本节主要讨论了索引级别的统计信息。索引统计信息在创建索引时自动创建，并在删除索引时自动删除。统计信息也可以在非索引列上创建，并能提供重要价值。在非索引列上手动创建或删除统计信息时，可以使用两条
    DDL 语句来完成：`CREATE STATISTICS` 和 `DROP STATISTICS`。由于它们超出了本书的范围，这里将不作讨论。第三条 DDL
    语句 `UPDATE STATISTICS` 适用于所有统计信息，包括索引级别的统计信息。由于 `UPDATE STATISTICS` 主要与索引维护相关，它将在第
    7 章中讨论。


    ### 列级统计信息总结


    查询优化统计信息是索引的重要组成部分。它们为查询优化器构建基于成本的查询计划提供了必要的信息。通过这个过程，SQL Server 可以根据计算出的成本识别出高质量的执行计划。在本节中，你了解了统计信息的存储方式，以及可用于调查和开始理解为索引存储的统计信息的工具。


    ## 索引使用统计信息


    下一个要了解的信息领域是索引使用统计信息。索引使用统计信息是通过 DMO `sys.dm_db_index_usage_stats` 累积的。此 DMO 返回不同类型索引操作的计数以及最后一次执行该操作的时间。通过这些信息，你可以判断索引的使用频率以及使用的时效性。


    DMO `sys.dm_db_index_usage_stats` 是一个动态管理视图 (DMV)。因此，它不需要任何参数。它可以通过任何 `JOIN` 运算符与其他表或视图进行联接。索引在首次使用后或自统计信息重置以来，会出现在此
    DMV 中。


    ### 注意


    除了重启 SQL Server 服务外，关闭或分离数据库也会重置 `sys.dm_db_index_usage_stats` 中为索引累积的所有统计信息。


    在 DMV `sys.dm_db_index_usage_stats` 中，提供了三种类型的数据：标题列、用户统计信息和系统统计信息。在接下来的几节中，你将探索每一类数据，以了解它们包含的信息以及如何使用这些信息。


    ### 标题列


    DMV 的标题列提供参考信息，可用于确定统计信息是为哪个索引累积的。表 3-8 列出了这些列。这些列主要用于将 DMV 与系统目录视图和其他 DMO 进行联接。


    表 3-8


    `sys.dm_db_index_usage_stats` 中的标题列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 定义表或视图的数据库的 ID。 |

    | `object_id` | `int` | 定义索引的表或视图的 ID。 |

    | `index_id` | `int` | 索引的 ID。 |


    使用 `sys.dm_db_index_usage_stats` 首先可以做的事情之一，就是检查自上次重置 DMV 中的统计信息以来，索引是否已被使用。利用标题列，类似于代码清单
    3-12 中的 T-SQL 语句，可以提供未被使用的索引列表。如果你使用的是 AdventureWorks2017 数据库，你的结果将类似于图 3-8。这些结果返回了未被使用的索引。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig8_HTML.jpg](img/338675_3_En_3_Fig8_HTML.jpg)


    图 3-8


    `sys.dm_db_index_usage_stats` 标题列查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT TOP 10 OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.database_id

    ,ius.object_id

    ,ius.index_id

    FROM sys.indexes i

    LEFT JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.index_id IS NULL

    AND OBJECTPROPERTY(i.object_id, ''IsUserTable'') = 1

    ORDER BY table_name, index_name

    代码清单 3-12

    查询 sys.dm_db_index_usage_stats 中标题列的语句

    ```


    这类信息对于管理数据库中的索引非常有用。它是识别一段时间内未被使用的索引的绝佳资源。这种索引管理策略将在后续章节中进一步讨论。'
- fmt: '## User Columns


    The next set of columns in the DMV `sys.dm_db_index_usage_stats` is the user columns.
    The user columns provide insight into how indexes are being specifically used
    within query plans. The columns are listed in Table 3-9; they include statistics
    on how many times each operation occurred and the time at which the last one occurred.


    **Table 3-9 User Columns in sys.dm_db_index_usage_stats**


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `user_seeks` | `bigint` | Aggregate count of seeks by user queries. |

    | `user_scans` | `bigint` | Aggregate count of scans by user queries. |

    | `user_lookups` | `bigint` | Aggregate count of bookmark/key lookups by user
    queries. |

    | `user_updates` | `bigint` | Aggregate count of updates by user queries. |

    | `last_user_seek` | `datetime` | Date and time of last user seek. |

    | `last_user_scan` | `datetime` | Date and time of last user scan. |

    | `last_user_lookup` | `datetime` | Date and time of last user lookup. |

    | `last_user_update` | `datetime` | Date and time of last user update. |


    `sys.dm_db_index_usage_stats` monitors four types of index operations. These are
    represented through the columns `user_seeks`, `user_scans`, `user_lookups`, and
    `user_updates`.


    The first of the index usage columns is `user_seeks`. The operations for this
    column occur whenever a query executes and returns a single row or range of rows
    for which it has a direct access path. For instance, if a query executes and retrieves
    all the sales details for a single order or a small range of orders, similar to
    the queries in Listing 3-13, the query plan for these would use a seek operation
    (see Figure 3-9).


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig9_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig9_HTML.jpg)

    Figure 3-9 Query plans for seek queries


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659;

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43659 AND 44659;

    Listing 3-13 Index Seek Queries

    ```


    After running the queries from Listing 3-13, the DMV `sys.dm_db_index_usage_stats`
    will be counted into the `user_seeks` column. Listing 3-14 provides a query to
    investigate this. If you are following along, you should see the results in Figure
    3-10. As the results show, the value in the `user_seeks` column is 5, which matches
    the count of operations from Listing 3-13. Based on this, you know that two queries
    were executed using the index and both were able to utilize the index to go directly
    to rows that were requested.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig10_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig10_HTML.jpg)

    Figure 3-10 Query results for index_seeks


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.last_user_seek

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-14 Query for index_seeks from sys.dm_db_index_usage_stats

    ```


    The next usage column is `user_scans`. The value of this column is increased whenever
    a query executes, and it must scan through every row of an index. For instance,
    consider a query on sales details that is unfiltered and must return all records
    or a query that is filtered on a column that is unindexed. Both of these queries,
    shown in Listing 3-15, are asking SQL Server for either everything it has in a
    table or a few rows that it doesn’t have a location on. The only way to accommodate
    this request would be through a scan of the `SalesOrderDetail` table. Figure 3-11
    shows the execution plans for these two queries.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig11_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig11_HTML.jpg)

    Figure 3-11 Query plans for seek queries


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM  Sales.SalesOrderDetail;

    SELECT * FROM  Sales.SalesOrderDetail

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    Listing 3-15 Index Scan Queries

    ```


    When index scans occur, they can be seen in `sys.dm_db_index_usage_stats`. The
    query in Listing 3-16 provides a view in the DMV to see the accumulation of the
    scans. Since there were two scans, one for each of the two queries, the results
    in Figure 3-12 show that there have been two operations under `user_scans`. This
    information can be useful when trying to troubleshoot situations where there are
    large numbers of scans on a table. By looking at this information, you are able
    to find the indexes with high scans and then begin to look at why queries using
    those indexes are using scans over more optimal operations such as index seeks.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig12_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig12_HTML.jpg)

    Figure 3-12 Query results for index_scans


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_scans

    ,ius.last_user_scan

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-16 Query for index_scans from sys.dm_db_index_usage_stats

    ```


    The third column in the DMV is `user_lookups`. User lookups occur when a seek
    on a nonclustered index occurs but the index does not have all of the required
    columns in it to satisfy the query. When this happens, the query must look up
    the columns from the clustered index. An example would be a query against the
    `SalesOrderDetail` table that is returning the `ProductID` and `CarrierTrackingNumber`
    columns, which is filtered on `ProductID`; Listing 3-17 shows this query. Figure
    3-13 shows the query plan from this query. The query plan shows a seek on the
    nonclustered index and a key lookup on the clustered index.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig13_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig13_HTML.jpg)

    Figure 3-13 Query plans for seek and key lookup


    ```

    USE AdventureWorks2017

    GO

    SELECT ProductID, CarrierTrackingNumber

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 778

    GO

    Listing 3-17 Index Lookup Query

    ```


    In `sys.dm_db_index_usage_stats`, there will be a tally of one for both `user_seeks`
    and `user_lookups`. To access these values, use Listing 3-18, which will return
    the results in Figure 3-14. Patterns between these columns can help with determining
    proper clustering keys or identifying when to modify indexes to avoid the key
    lookups. Key lookups aren’t necessarily bad but can be a performance bottleneck
    if overused and left unchecked. I’ll discuss more on what to look for in regard
    to `user_lookups` in later chapters.'
