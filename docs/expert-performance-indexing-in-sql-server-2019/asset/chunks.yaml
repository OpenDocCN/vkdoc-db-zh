- fmt: '### `sys.dm_db_incremental_stats_properties`


    With incremental index maintenance, which is discussed in Chapter [9](#338675_3_En_9_Chapter.xhtml),
    statistics also require the ability for incremental updates to support that feature.
    As a companion to `sys.dm_db_stats_properties`, the function `sys.dm_db_incremental_stats_properties`
    provides visibility to stats properties of incremental statistics and indexes.
    The syntax for `sys.dm_db_incremental_stats_properties`, shown in Listing [3-11](#338675_3_En_3_Chapter.xhtml#PC11),
    includes the same two parameters as the other functions, `object_id` and `stats_id`.
    The columns returned are identical to those in Table [3-6](#338675_3_En_3_Chapter.xhtml#Tab6)
    except this function includes a `partition_number` column indicating the partition
    for the incremental statistics.


    ```

    sys.dm_db_incremental_stats_properties (object_id, stats_id)

    Listing 3-11

    Syntax for sys.dm_db_incremental_stats_properties

    ```


    ### Statistics DDL


    This section has primarily focused on discussing index-level statistics. Index
    statistics are automatically created when an index is created and automatically
    dropped when the index is dropped. Statistics can also be created and provide
    significant value on nonindexed columns. When manually creating or dropping statistics
    on nonindexed columns, there are two DDL statements that can be used to accomplish
    this: `CREATE STATISTICS` and `DROP STATISTICS`. Since they are outside the scope
    of this book, they will not be discussed. The third DDL statement, `UPDATE STATISTICS`,
    applies to all statistics including the index-level statistics. Since `UPDATE
    STATISTICS` is primarily tied to index maintenance, it is discussed in Chapter
    [7](#338675_3_En_7_Chapter.xhtml).


    ### Column-Level Statistics Summary


    Query optimization statistics are a vital piece of indexing. They provide the
    information that the query optimizer requires in order to build cost-based query
    plans. Through this process, SQL Server can identify high-quality plans through
    their calculated costs. In this section, you looked at how statistics are stored
    and the tools you can use in order to investigate and begin to understand the
    statistics that are stored for an index.


    ## Index Usage Statistics


    The next domain of information to take a look at is index usage stats. Index usage
    statistics are accumulated through the DMO `sys.dm_db_index_usage_stats`. This
    DMO returns counts of different types of index operations and when the operation
    was last performed. Through this information, you can discern how frequently an
    index is being used and how current that usage is.


    The DMO `sys.dm_db_index_usage_stats` is a dynamic management view (DMV). Because
    of this, it does not require any parameters. It can be joined to other tables
    or views through any of the `JOIN` operators. Indexes appear within the DMV after
    the indexes have been used for the first time or since the reset of the statistics.


    ### Note


    Along with restarting the SQL Server service, closing or detaching a database
    will reset all the statistics for an index that have been accumulated in `sys.dm_db_index_usage_stats`.


    Within the DMV `sys.dm_db_index_usage_stats`, three types of data are provided:
    header columns, user statistics, and system statistics. In the next few sections,
    you will explore each to gain an understanding of what information they hold and
    how you can use it.


    ### Header Columns


    The header columns for the DMV provide referential information that can be used
    to determine for which index the statistics were accumulated. Table [3-8](#338675_3_En_3_Chapter.xhtml#Tab8)
    lists the columns that are part of this. These columns are primarily used to join
    the DMV to system catalog views and other DMOs.


    Table 3-8


    Header Columns in `sys.dm_db_index_usage_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database in which the table or view is
    defined. |

    | `object_id` | `int` | ID of the table or view in which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |


    One of the first things that can be done with `sys.dm_db_index_usage_stats` is
    to check to see whether an index has been used since the last time the statistics
    in the DMV were reset. Using the header columns, similar to the T-SQL statement
    in Listing [3-12](#338675_3_En_3_Chapter.xhtml#PC12), can provide a list of the
    indexes that have not been used. If you are using the AdventureWorks2017 database,
    your results will look similar to those in Figure [3-8](#338675_3_En_3_Chapter.xhtml#Fig8).
    In these results, indexes that have not been used are returned.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig8_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig8_HTML.jpg)


    Figure 3-8


    `sys.dm_db_index_usage_stats` header columns query results


    ```sql

    USE AdventureWorks2017

    GO

    SELECT TOP 10 OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.database_id

    ,ius.object_id

    ,ius.index_id

    FROM sys.indexes i

    LEFT JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.index_id IS NULL

    AND OBJECTPROPERTY(i.object_id, ''IsUserTable'') = 1

    ORDER BY table_name, index_name

    Listing 3-12

    Query for Header Columns in sys.dm_db_index_usage_stats

    ```


    This type of information can be useful for managing the indexes in your databases.
    It is an excellent resource for identifying the indexes that have not been used
    in a while. This strategy of index management is discussed further in later chapters.'
  raw: '### sys.dm_db_incremental_stats_properties


    With incremental index maintenance, which is discussed in Chapter [9](#338675_3_En_9_Chapter.xhtml),
    statistics also require the ability for incremental updates to support that feature.
    As a companion to sys.dm_db_stats_properties, the function sys.dm_db_incremental_stats_properties
    provides visibility to stats properties of incremental statistics and indexes.
    The syntax for sys.dm_db_incremental_stats_properties, shown in Listing [3-11](#338675_3_En_3_Chapter.xhtml#PC11),
    includes the same two parameters as the other functions, object_id and stats_id.
    The columns returned are identical to those in Table [3-6](#338675_3_En_3_Chapter.xhtml#Tab6)
    except this function includes a partition_number column indicating the partition
    for the incremental statistics.


    ```

    sys.dm_db_incremental_stats_properties (object_id, stats_id)

    Listing 3-11

    Syntax for sys.dm_db_incremental_stats_properties

    ```


    ### Statistics DDL


    This section has primarily focused on discussing index-level statistics. Index
    statistics are automatically created when an index is created and automatically
    dropped when the index is dropped. Statistics can also be created and provide
    significant value on nonindexed columns. When manually creating or dropping statistics
    on nonindexed columns, there are two DDL statements that can be used to accomplish
    this: `CREATE` and `DROP STATISTICS`. Since they are outside the scope of this
    book, they will not be discussed. The third DDL statement, `UPDATE STATISTICS`,
    applies to all statistics including the index-level statistics. Since `UPDATE
    STATISTICS` is primarily tied to index maintenance, it is discussed in Chapter
    [7](#338675_3_En_7_Chapter.xhtml).


