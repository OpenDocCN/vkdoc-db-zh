    上所有统计信息的直方图。这提供了有关所有步骤及其范围值的信息。滚动浏览如图 3-7 所示的结果，到第 163 和 164 行；你会看到 `range_high_key`
    值从数字数据变为字符数据，这发生在统计信息和步骤变化时。


