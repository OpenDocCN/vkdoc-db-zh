    It’s important not to interpret the results of the last script to indicate that
    a `1:1` ratio of buckets to rows is the best practice. If you run another set
    of queries that retrieves more than a single row, in this case the rows between
    `42` and `420` being returned as shown in Listing [6-6](#338675_3_En_6_Chapter.xhtml#PC6),
    the performance profile changes. In this case, the performance advantage shifts
    to buckets with more rows. The results now are `86,973 μs` for the query on the
    first table vs. `101,127 μs` for the second table’s query, as shown in Figure
    [6-2](#338675_3_En_6_Chapter.xhtml#Fig2).


    ![../images/338675_3_En_6_Chapter/338675_3_En_6_Fig2_HTML.jpg](images/338675_3_En_6_Chapter/338675_3_En_6_Fig2_HTML.jpg)


    Figure 6-2

    Duration for memory-optimized table queries with hash indexes


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    PRINT ''Memory Optimized Table with 1000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_low

    WHERE SalesOrderID BETWEEN 42 AND 420

    ORDER BY SalesOrderID

    PRINT ''Memory Optimized Table with 1,000,000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 42 AND 420

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    Listing 6-6

    Query Memory-Optimized Tables with Hash Indexes

    ```


    When working with hash indexes, it is important to understand how `SQL Server`
    is using the buckets in the hash. One important thing to note is that just because
    there are enough buckets for each table to have their own bucket, that doesn’t
    mean each row will get its own bucket. To review the statistics for hash indexes
    created in this chapter, run the query in Listing [6-7](#338675_3_En_6_Chapter.xhtml#PC7)
    that accesses the `DMV` `sys.dm_db_xtp_hash_index_stats`. This `DMV` provides
    information on the number of buckets and how those buckets are populated.


    ```

    USE MemOptIndexing

    GO

    SELECT OBJECT_NAME(hs.object_id) AS object_name

    ,i.name as index_name

    ,hs.total_bucket_count

    ,hs.empty_bucket_count

    ,FLOOR((CAST(empty_bucket_count as float)/total_bucket_count) * 100) AS empty_bucket_percent

    ,hs.avg_chain_length

    ,hs.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS hs

    INNER JOIN sys.indexes AS i ON hs.object_id=i.object_id AND hs.index_id=i.index_id

    Listing 6-7

    Query to Review Hash Index Statistics

    ```


    Reviewing the results of Listing [6-7](#338675_3_En_6_Chapter.xhtml#PC7), provided
    in Figure [6-3](#338675_3_En_6_Chapter.xhtml#Fig3), you can see there are a few
    interesting items to notice. To start, the first index with the `1,000` buckets
    specified (`SalesOrderHeader_low`) actually has `1,024` buckets for the index.
    This is because buckets are created in allocations that align to the power of
    two. This is the same reason there are `1,048,576` buckets for the `1,000,000`
    bucket index on `SalesOrderHeader_high`. The next interesting piece is the number
    of empty buckets in the hash index on `SalesOrderHeader_high`. With `1,000,000`
    rows and more than a million buckets, there are still `37` percent of the buckets
    that are empty. This happens because with the deterministic hashing function,
    some hashed values are repeated within the range of values before all the buckets
    are utilized. This is something to consider when building hash indexes, especially
    when aiming to have a `1:1` ratio of buckets to rows.


    ![../images/338675_3_En_6_Chapter/338675_3_En_6_Fig3_HTML.jpg](images/338675_3_En_6_Chapter/338675_3_En_6_Fig3_HTML.jpg)


    Figure 6-3

    Output from hash bucket statistics query


    ### Note


    The query performance details were captured using an `Extended Events` session
    based on the `Query Detail Tracking` template with a filter for the session that
    included the demonstration queries. You can find more information on building
    sessions at [`www.simple-talk.com/sql/database-administration/getting-started-with-extended-events-in-sql-server-2012/`](http://www.simple-talk.com/sql/database-administration/getting-started-with-extended-events-in-sql-server-2012/).


    Hash indexes with memory-optimized tables are an important indexing choice when
    there will be many queries that will access individual rows and seek operations
    that will provide optimal plans. When building the tables and hash indexes, focus
    on setting the number of buckets to a size that presents a reasonable ratio of
    rows to buckets with consideration for the number of rows that will be retrieved
    through queries.


    ## Range Indexes


    The second type of index that is supported for memory-optimized tables is the
    range index. Range indexes are used to support, as the name implies, range scans
    of data, along with ordered scans. They leverage a variation of a `B-tree`, which
    `Microsoft` is calling a `Bw-tree`. The key difference between these two structures
    is the reference between the nodes in the `Bw-tree`, which refers to memory locations
    vs. physical page location. When it comes to determining whether to include a
    range index on a memory-optimized table, the primary consideration will be whether
    there will be range scans or `ORDER BY` statements that the table needs to support.'
