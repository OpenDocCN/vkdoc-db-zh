    ##### 页面头——仅打印选项


    `DBCC PAGE` 的第一个可用打印选项是页面头，其中 `print_option` 等于 0。使用此选项时，`DBCC` 命令的输出中仅返回页面头。所有
    `DBCC PAGE` 请求都会返回页面头；使用此选项只是将结果限制为仅包含页面头。页面头包含两个部分。


    第一部分是缓冲区信息。缓冲区提供关于页面当前在 SQL Server 内存中位置的信息。要读取页面，必须首先从磁盘检索页面并将其放入内存。此部分提供了可用于查找页面内存地址的地址。


    第二部分是实际的页面头。页面头包含许多描述页面及其内容的属性。并非所有属性目前都被 SQL Server 使用，但有许多属性值得了解。这些关键属性在表 2-11
    中列出并定义。


    表 2-11


    页面头关键属性定义


    | 属性 | 定义 |

    | --- | --- |

    | `m_pageId` | 页面的文件 ID 和页码。 |

    | `m_type` | 返回的页面类型；参见表 2-5 中的页面类型列表。 |

    | `Metadata: AllocUnitId` | 映射自目录视图 `sys.allocation_units` 的分配单元 ID。 |

    | `Metadata: PartitionId` | 表或索引的分区 ID。这映射到目录视图 `sys.partitions` 中的 `partition_ID`。
    |

    | `Metadata: ObjectId` | 表的对象 ID。这映射到目录视图 `sys.tables` 中的 `object_ID`。 |

    | `Metadata: IndexId` | 表或索引的索引 ID。这映射到目录视图 `sys.indexes` 中的 `index_ID`。 |

    | `m_prevPage` | 索引结构中的前一页。这在 B 树索引中用于允许沿索引级别读取连续页面。 |

    | `m_nextPage` | 索引结构中的下一页。这在 B 树索引中用于允许沿索引级别读取连续页面。 |

    | `m_slotCnt` | 页面上的槽数或行数。 |

    | `Allocation Status` | 列出所请求页面的 GAM、SGAM、PFS、DIFF（或 DCM）和 ML（或 BCM）页面的位置。它还包括来自这些元数据页面中每个页面的状态。
    |


    为了演示 `DBCC PAGE` 的页面头-仅选项的使用，可以使用清单 2-16 中的代码。你的结果应与图 2-22 中的类似。在这些结果中，你可以在页面顶部看到页码，表明它是页面
    1:377。`m_type` 为 2，这对应于索引页。`m_slotCnt` 显示页面上有两行。参考图 2-22，行数应与将数据页 1:376 和 1:378
    映射到索引所需的两个索引记录相关。最后，分配状态显示该页面在 GAM 页面上已分配，根据 PFS 页面它已填满 0%，并且根据 DCM 页面，该页面自上次完整备份以来已被更改。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig22_HTML.jpg](img/338675_3_En_2_Fig22_HTML.jpg)


    图 2-22


    页面头-仅打印选项的 DBCC PAGE 输出


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,0)

    清单 2-16

    使用页面头-仅打印选项的 DBCC PAGE

    ```


    正如页面头-仅选项所示，页面头中有很多有用的信息。实际上，它提供了足够的信息来设想此页面如何与索引中的其他页面及其占用的区相关联。此信息与 `sys.dm_db_page_info`
    类似，但从此时起，`DBCC PAGE` 提供的信息比 DMF 更多。


    ##### 十六进制行打印选项


    `DBCC PAGE` 的下一个可用打印选项是十六进制行打印选项，其中 `print_option` 等于 1。此打印选项扩展了前一个选项，在输出中添加了页面上每个槽的条目以及描述页面上每个槽位置的偏移量数组。


    页面的数据部分针对页面上的每一行重复，并包含与该行相关的所有元数据和数据。对于元数据，该行包括槽号、页面偏移量、记录类型和记录属性。这些信息有助于定义行以及除了数据大小之外还有什么因素影响行大小。在槽的末尾是该行的内存转储。内存转储以十六进制格式显示该行，虽然人类不易阅读，但包含该行的所有数据。有关属性及其定义的更多信息，请参见表
    2-12。


    偏移量数组是十六进制行选项结果中包含的最后一部分信息。偏移量数组包含表中每行的两个信息片段。第一个信息是槽号及其十六进制表示。第二个信息是该槽在页面上的字节位置。有了这两个信息片段，就可以定位并返回页面上的任何行。


    表 2-12


    十六进制行关键属性定义


    | 属性 | 定义 |

    | --- | --- |

    | 槽 | 页面上行的位置。计数从 0 开始，紧接在页面头之后。 |

    | 偏移量 | 页面上行的物理字节位置。 |

    | 长度 | 页面上行的长度。 |

    | 记录类型 | 行的类型。一些可能的值是 `INDEX_RECORD` 和 `PRIMARY_RECORD`。 |

    | 记录属性 | 影响行大小的属性列表。这些可以包括 `NULL_BITMAP` 和 `VARIABLE_COLUMNS` 数组。 |

    | 记录大小 | 页面上行的长度。 |

    | 内存转储 | 页面上数据的内存位置。对于十六进制行选项，它仅限于该槽中的信息。提供内存地址，随后是存储在槽中的数据的十六进制转储。 |


    对于十六进制行的示例，你将继续研究上一节中查看的索引页（1:279）。这次，你将使用十六进制行打印选项，即在 `DBCC PAGE` 中使用 `print_option`
    为 1，如清单 2-17 所示。


    `DBCC PAGE` 命令的结果将比上一次执行更长，因为这次它包含了带有页面头的行数据。为了专注于新信息，缓冲区和页面头结果已在图 2-23 的示例输出中被排除。在数据部分，显示了两个槽，槽
    0 和槽 1。这些槽映射到页面上的两个索引行，这可以通过每行的记录类型为 `INDEX_RECORD` 来验证。这些行的十六进制数据包含索引记录的页面和范围信息，但此打印选项不会翻译这些信息。最后一部分是包含表上两行的槽信息的偏移量表。请注意，偏移量以
    0 结尾并从底部开始向上计数。这与本章前面描述偏移量数组的方式相匹配。行在头部之后开始递增向上，而偏移量数组从页面末尾开始向后递增。通过这种方式，可以在不重新组织页面的情况下向表添加新行。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig23_HTML.jpg](img/338675_3_En_2_Fig23_HTML.jpg)


    图 2-23


    十六进制行打印选项的 DBCC PAGE 输出


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,1)

    清单 2-17

    使用十六进制行打印选项的 DBCC PAGE

    ```

