    上放置了 44 个行锁。


    请注意，`row_lock_wait_count` 和 `row_lock_wait_in_ms` 列没有返回任何信息。这是因为该脚本没有被任何其他查询阻塞。如果清单
    3-29 中的查询被另一个事务阻塞，那么这些列中的值将会增加。


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig21_HTML.jpg](img/338675_3_En_3_Fig21_HTML.jpg)


    *图 3-21 行锁的查询结果*


