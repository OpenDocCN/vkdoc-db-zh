    这个新函数极大地增强了你查看和检查直方图的能力。例如，如果你在某个列上有多个索引和统计信息，你可以编写一个仅包含这些统计信息的查询，然后筛选 `range_high_key`，只包含与你关注的记录相匹配的步骤。那时，你可以查看
    `average_range_rows` 并了解为什么 SQL Server 可能选择了一个索引而不是另一个。

