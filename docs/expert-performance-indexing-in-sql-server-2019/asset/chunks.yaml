    找到有关构建会话的更多信息。


    内存优化表的哈希索引是一种重要的索引选择，特别是当有许多查询将访问单个行，并且寻求操作将提供最优计划时。在构建表和哈希索引时，请重点将桶的数量设置为一个合理的行与桶的比例大小，同时考虑将通过查询检索的行数。


    ## 范围索引


    内存优化表支持的第二种索引类型是范围索引。范围索引，顾名思义，用于支持数据的范围扫描以及有序扫描。它们利用了一种变体的 `B 树`，微软称之为 `Bw 树`。这两种结构之间的关键区别在于
    `Bw 树` 中的节点引用指向的是内存位置而非物理页面位置。在决定是否在内存优化表上包含范围索引时，主要的考虑因素将是该表是否需要支持范围扫描或 `ORDER
    BY` 语句。'
- fmt: '### Note


    You can find more information on Bw-trees at [`http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf`](http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf).


    To create a range index on a memory-optimized table, you declare the index within
    the schema of the table by indicating a `NONCLUSTERED` index with the key values.
    As shown in Listing [6-8](#338675_3_En_6_Chapter.xhtml#PC8), the index `IX_SalesOrderHeader`
    is a range index on the `SalesOrderID` column. Unlike hash indexes, there are
    no other configuration items to consider, and the indexes don’t need any bucket
    consideration when they are created.


    ```sql

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high_range'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high_range

    CREATE TABLE dbo.SalesOrderHeader_high_range(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high_range PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000)

    ,INDEX IX_SalesOrderHeader NONCLUSTERED (SalesOrderID)

    )

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high_range

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    ```

    Listing 6-8

    Create Table with Range Index


    To demonstrate the value of the range index on memory-optimized tables, let’s
    use the table created in Listing [6-8](#338675_3_En_6_Chapter.xhtml#PC8) on some
    queries that will leverage range scans. For this, you will use Listing [6-9](#338675_3_En_6_Chapter.xhtml#PC9),
    which queries the new table (`dbo.SalesOrderHeader_high_range`) and the table
    previously created with just a hash index (`dbo.SalesOrderHeader_high`). By executing
    a query against both of those tables for the rows with `SalesOrderID BETWEEN 100
    AND 10000`, you can see there is a big difference in the execution time. The query
    with just the hash index on the table runs in 216 ms (see Figure [6-4](#338675_3_En_6_Chapter.xhtml#Fig4)),
    while the query against the table with the range index runs in 97 ms. In this
    case, range indexes provide a substantial performance improvement.


    ![../images/338675_3_En_6_Chapter/338675_3_En_6_Fig4_HTML.jpg](images/338675_3_En_6_Chapter/338675_3_En_6_Fig4_HTML.jpg)


    Figure 6-4

    Duration for memory-optimized table queries with range scan


    ```sql

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SELECT *

    FROM dbo.SalesOrderHeader_high_range

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```

    Listing 6-9

    Query Memory-Optimized Tables with Range Scan


    In a similar fashion, `ORDER BY` statements are also greatly improved when range
    indexes on memory-optimized tables are available. Using the code in Listing [6-10](#338675_3_En_6_Chapter.xhtml#PC10),
    you run two queries against the same tables from the previous demonstration. In
    this case, using the output in Figure [6-5](#338675_3_En_6_Chapter.xhtml#Fig5),
    you see that the range scan took 462 μs compared to the 240,733 μs that the hash
    index requires. Again, you get a substantial performance improvement through the
    use of the range index.


    ![../images/338675_3_En_6_Chapter/338675_3_En_6_Fig5_HTML.jpg](images/338675_3_En_6_Chapter/338675_3_En_6_Fig5_HTML.jpg)


    Figure 6-5

    Duration for memory-optimized table queries with TOP clause and ORDER BY


    ```sql

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high

    ORDER BY SalesOrderID

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high_range

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```

    Listing 6-10

    Query Memory-Optimized Tables with ORDER BY Statement


    Similar to hash indexes, range indexes provide a substantial performance improvement
    opportunity when creating memory-optimized tables. The need to perform range scans
    and order results is a common scenario in many applications. These operations
    are greatly improved by the use of range indexes.


    ## Summary


    This chapter looked at the types of indexes available for memory-optimized tables.
    These options, which include `hash` and `range` indexes, are the power behind
    the ability for memory-optimized tables to provide the incredible performance
    that they deliver. As demonstrated, each index type aligns to different querying
    patterns on your tables, and it is important to understand those patterns to build
    the right indexes for your memory-optimized tables and the workloads that they
    support.


    # 7. Full-Text Indexing


    SQL Server supports mechanisms that allow you to store large amounts of unstructured
    text information. Since SQL Server 2008, one of those mechanisms has been the
    `MAX` length used with the variable-length character data types `VARCHAR` and
    `NVARCHAR`. This means you can store up to 2 GB worth of character information
    within a single column. While SQL Server can store this information, the 1,700-byte
    limit for nonclustered indexes and 900-byte limit on clustered indexes make indexing
    through traditional means a challenge. Fortunately, SQL Server offers another
    indexing mechanism for searching within these large data types, where full-text
    indexing comes into play.


    ## Full-Text Indexing


    Full-text search indexing is another indexing feature in SQL Server, outside the
    normal indexing methods and objects. This chapter will briefly describe the full-text
    search architecture, storage, and indexing for optimal performance.


    Full-text search (`FTS`) allows you to store large amounts of text-based content.
    This content can include a number of document types including formats such as
    Word document (`.docx`) files. This storage is then in `BLOB` (binary large object)
    columns instead of plain-text data. The ability to search and store content of
    an unstructured nature provides a number of opportunities in a database management
    system.


    Document retention is one such opportunity; it allows you to store documents for
    vast lengths of time at a much lower cost. The search abilities allow for querying
    this content for all types of needs. Imagine a shipping company that creates thousands
    of shipping documents from a template created in plain text. Those documents create
    a massive initiative for retention purposes to ensure shipments can be tracked
    for later needs. Storage warehouse rooms cost money to maintain. When the task
    of researching a specific shipment arises, the hours taken for that task are significant.


    Now imagine this shipping company is using the `FTS` feature and an indexing structure.
    The documents are scanned with systems that read the text into a system that later
    inserts this data into a SQL Server database. This allows for a full-text search
    of specific account numbers, shipping invoices, and any distinct text in the documents
    needed for later review. An index just like a book index can be created, making
    it even quicker to find specific documents. Going further, `FTS` lets you search
    for specific content in the documents themselves. If a request comes in to find
    all shipping documents that were sent by a specific freight company on a specific
    trailer, the `FTS` capabilities allow the information to be retrieved in a fraction
    of the time as compared to a manual process.'
