    `SeekPlan ConvertIssue`。换句话说，SQL Server 没有关于转换后数据的统计信息来构建了解谓词中值频率的执行计划。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig22_HTML.jpg](img/338675_3_En_12_Fig22_HTML.jpg)


    **图 12-22** 隐式转换附带的警告


    清单 12-13 中的第二个 `SELECT` 查询使用了 `varchar` 数据类型的变量。由于此数据类型已经与表中列的数据类型匹配，因此可以使用非聚集索引。如图
    12-23 的执行计划所示，通过匹配的数据类型，查询优化器可以构建一个了解索引中行位置的计划，并执行查找来获取它们。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig23_HTML.jpg](img/338675_3_En_12_Fig23_HTML.jpg)


    **图 12-23** 无数据转换的执行计划


    尽管第二个查询中的操作更多，复杂性似乎更高（特别是包含键查找时），这可能会导致预期性能更差，但事实并非如此。如果我们查看图 12-24 中 `STATISTICS
