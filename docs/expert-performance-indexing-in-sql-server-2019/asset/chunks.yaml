  trans: '

    ### 数据页


    数据页是任何数据库中最常见的页面类型。数据页用于存储数据库表中行的数据。除少数数据类型外，记录的所有数据都位于数据页上。此规则的例外是存储在 LOB 数据类型中的列。这些信息存储在大对象页中，本节稍后将进行讨论。


    理解数据页对于理解索引内部结构非常重要。这种理解之所以重要，是因为在查看索引内部结构时，数据页是最常被查阅的页面。当你深入到索引的最低层级时，总会找到数据页。


    ### 索引页


    与数据页类似的是索引页。这些页面提供关于索引结构以及数据页位置的信息。对于聚集索引，索引页用于构建用于导航聚集索引的页面层次结构。对于非聚集索引，索引页执行相同的功能，但也用于存储构成索引的键值。


    如前所述，索引页用于构建索引内的页面层次结构。为实现这一点，索引页中包含的数据提供了键值和页面地址的映射。键值是子表中第一个排序行所包含的索引中的键值，页面地址则标识了该行的位置。


    索引页的构造与其他页面类型类似。页面有一个页面头，其中包含所有标准信息，如页面类型、分配单元、分区 ID 和分配状态。行偏移数组包含指向索引数据行在页面上位置的指针。索引数据行包含两条信息：键值和一个页面地址（如前所述）。


    理解索引页很重要，因为它们提供了索引中所有数据页如何连接在一起的映射图。


    ### 大对象页


    如前所述，单个页面上数据的限制是 `8 KB`。然而，某些数据类型的大小上限可达 `2 GB`。对于这些数据类型，需要另一种存储机制来存储数据。为此，存在大对象页面类型。


    可以使用 LOB 页的数据类型包括 `text`、`ntext`、`image`、`nvarchar(max)`、`varchar(max)`、`varbinary(max)`
    和 `xml`。当这些数据类型中的一种数据存储在数据页上时，如果行的大小超过 `8 KB`，将使用 LOB 页。在这些情况下，该列将包含对数据所需 LOB
    页的引用，并且数据将存储在 LOB 页上（参见图 2-6）。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig6_HTML.jpg](img/338675_3_En_2_Fig6_HTML.jpg)


    图 2-6

    数据页链接到 LOB 页


    ## 组织页面


    到目前为止，你已经了解了构成索引内部结构的低级别组件。虽然这些部分对索引很重要，但组织这些组件的结构才是索引价值的体现。SQL Server 使用多种不同的组织结构在数据库中存储数据。


    SQL Server 中的组织结构包括：

    ```

    * 堆 (Heap)

    * 平衡树 (B-tree)

    * 列存储 (Columnar)

    ```


    这些结构都映射到特定的索引类型，将在本章后面讨论。在本节中，你将研究每种组织页面的方法以建立理解。


    ### 注意


    在组织索引的结构中，包含索引页的索引层级被视为*非叶*级。当指包含数据页的层级时，这些层级被称为*叶级*。


    ### 堆结构


    组织页面的默认结构称为*堆*。当未使用 B 树结构（下一节将讨论）来组织表中的数据页时，就会形成堆。从概念上讲，可以将堆想象成一堆无特定顺序的数据页，如图
    2-7 所示。在该示例中，检索所有“Madison”记录的唯一方法是检查每个页面，查看“Madison”是否在该页面上。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig7_HTML.jpg](img/338675_3_En_2_Fig7_HTML.jpg)


    图 2-7

    堆示例


    然而，从内部结构角度来看，堆不仅仅是一堆页面。虽然未排序，但堆有几个关键组件来组织页面以便于访问。所有堆都以一个 IAM 页开始，如图 2-8 所示。如前所述，IAM
    页映射出 GAM 间隔内哪些区和单页分配与索引相关联。对于堆，IAM 页是将数据页和区与堆关联的唯一机制。如前所述，堆结构不对与堆关联的页面强制任何排序顺序。堆中的第一个可用页面是在数据库文件中为该堆找到的第一个页面。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig8_HTML.jpg](img/338675_3_En_2_Fig8_HTML.jpg)


    图 2-8

    堆结构


    IAM 页列出了与堆关联的所有数据页。堆的数据页存储表的行，并根据需要使用 LOB 页。当 IAM 页在 GAM 间隔内没有更多页面可供分配时，会为堆分配一个新的
    IAM 页，并将下一组页面及其对应的行添加到堆中，如图 2-1 所示。如图所示，堆结构是扁平的。从上到下，从 IAM 页到结构的数据页始终只有一层。


    虽然堆提供了一种组织页面的机制，但它并不对应于索引类型。当表没有聚集索引时，会使用堆结构。当堆存储表中的行时，行是在没有强制顺序的情况下插入的。这是因为，与聚集索引不同，堆上不存在基于特定列的排序顺序。

    '
- fmt: '## B-Tree Structure


    The second available structure that can be used for indexing is the Balanced-tree,
    or `B-tree`, structure. It is the most commonly used structure for organizing
    indexes in SQL Server and is used by both clustered and nonclustered indexes.


    In a `B-tree`, pages are organized in a hierarchical tree structure, as shown
    in Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9). Within the structure, pages
    are sorted to optimize searches for information within the structure. Along with
    the sorting, relationships between pages are maintained to allow sequential access
    to pages across the levels of the index.


    Similar to heaps, `B-tree`s start with an `IAM` page that identifies where the
    first page of the `B-tree` is located within the `GAM` interval. The first page
    of the `B-tree` is an index page and is often referred to as the `root level`
    of the index. As an index page, the `root level` contains key values and page
    addresses for the next pages in the index. Depending on the size of the index,
    the next level of the index may be data pages or additional index pages.


    If the number of index rows required to sort all the rows on the data pages exceeds
    the space available, then the root page will be followed by another level of index
    pages. Additional levels of index pages in a `B-tree` are referred to as `intermediate
    levels`. In many cases, indexes built with a `B-tree` structure will not require
    more than one or two `intermediate levels`. Even with a wide indexing key, millions
    to billions of rows can be sorted with just a few levels.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig9_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig9_HTML.jpg)

    Figure 2-9: B-tree structure


    The next level of pages below the root and intermediate levels of the indexes,
    referred to as the `nonleaf levels`, is the `leaf level` (see Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9)).
    The `leaf level` contains all the data pages for the index. The data pages are
    where all the key values and the nonkey values for the row are stored. Nonkey
    values are never stored on the index pages.


    Another differentiator between heaps and `B-tree`s is the ability within the index
    levels to perform sequential page reads. Pages contain previous page and next
    page properties in the page headers. With index and data pages, these properties
    are populated and can be used to traverse the `B-tree` to find the next requested
    row from the `B-tree` without returning to the root level of the index. To illustrate
    this, consider a situation where you request the rows with key values between
    925 and 3,025 from the index shown in Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9).
    Through a `B-tree`, this operation can be done by traversing the `B-tree` down
    to key value 925, shown in Figure [2-10](#338675_3_En_2_Chapter.xhtml#Fig10).
    After that, the rows through key value 3,025 can be retrieved by accessing all
    pages after the first page in order, finishing the operation when the last key
    value is encountered.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig10_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig10_HTML.jpg)

    Figure 2-10: B-tree sequential read


    One option available for tables and indexes is the ability to partition these
    structures. Partitioning changes the physical implementation of the index and
    how the index and data pages are organized. From the perspective of the `B-tree`
    structure, each partition in an index has its own `B-tree`. If a table is partitioned
    into three different partitions, there will then be three `B-tree` structures
    for the index.


    ## Columnstore Structure


    Columnstore, first introduced with SQL Server 2012, introduces a new organizational
    structure, which is based on Microsoft’s Vertipaq technology. The columnstore
    structure is used by the clustered and nonclustered columnstore index types. The
    columnstore structure diverges from the traditional method of storing and indexing
    data from a row-wise to a column-wise format. This means that instead of storing
    all the values for a row with all the other values in the row, the values are
    stored with the values of the same column grouped together. For instance, in the
    example in Figure [2-11](#338675_3_En_2_Chapter.xhtml#Fig11), instead of four
    row “groups” stored on the page, three column “groups” are stored.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig11_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig11_HTML.jpg)

    Figure 2-11: Row-wise vs. column-wise storage


    The physical implementation of the columnstore structure does not introduce any
    new page types; it instead utilizes existing page types. Like other structures,
    a columnstore begins with an `IAM` page, shown in Figure [2-12](#338675_3_En_2_Chapter.xhtml#Fig12).
    From the `IAM` page are `LOB` pages that contain the columnstore information.
    For each column stored in the columnstore, there are one or more segments. Segments
    contain up to about 1 million rows worth of data for the columns that they represent.
    An `LOB` page can contain one or more segments, and the segments can span multiple
    `LOB` pages.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig12_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig12_HTML.jpg)

    Figure 2-12: Columnstore structure


    Within each segment is a hash dictionary that is used to map the data that comprises
    the segment of the columnstore. The hash dictionary also contains the minimum
    and maximum values for the data in the segment. This information is used by SQL
    Server during query execution to eliminate segments during query execution.


    One of the advantages of the columnstore structure is its ability to leverage
    compression. Since each segment of the columnstore structure contains the same
    type of data, both from a data type and from a value perspective, SQL Server has
    a greater likelihood of being able to utilize compression on the data. The compression
    used by the columnstore is similar to page-level compression. It utilizes dictionary
    compression to remove similar values throughout the segment. There are two main
    differences between page and columnstore compressions. First, while page compression
    is optional, columnstore compression is mandatory and cannot be disabled. Second,
    page compression is limited to compressing the values on a single page. Alternately,
    columnstore compression is for the entire segment, which may span multiple pages
    or could have multiple segments on the same page. Regardless of the number of
    pages or segments on a page, columnstore compression is contained to the segment.


    Another advantage of the columnstore is that only the columns requested from the
    columnstore are returned. It is often recommended not to use `SELECT *` when writing
    queries; instead, the best practice is to only `SELECT` the columns that are required.
    Unfortunately, even when this practice is followed, indexes based on heaps and
    `B-tree`s read all the columns for the row from disk into memory. The practice
    reduces some network traffic and streamlines execution, but it doesn’t assist
    with the bottleneck of reading data from disk. Columnstore indexes address this
    issue by reading from disk only the columns that are requested and moving that
    data into memory. Along these same lines, according to Microsoft, queries often
    access only 10–15 percent of the available columns in a table.^[²](#fn2) The reduction
    in the columns retrieved from a columnstore structure will have a significant
    impact on performance and I/O.'
  raw: '### B-Tree Structure


    The second available structure that can be used for indexing is the Balanced-tree,
    or *B-tree*, structure. It is the most commonly used structure for organizing
    indexes in SQL Server and is used by both clustered and nonclustered indexes.


    In a B-tree, pages are organized in a hierarchical tree structure, as shown in
    Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9). Within the structure, pages are
    sorted to optimize searches for information within the structure. Along with the
    sorting, relationships between pages are maintained to allow sequential access
    to pages across the levels of the index.


    Similar to heaps, B-trees start with an IAM page that identifies where the first
    page of the B-tree is located within the GAM interval. The first page of the B-tree
    is an index page and is often referred to as the *root level* of the index. As
    an index page, the root level contains key values and page addresses for the next
    pages in the index. Depending on the size of the index, the next level of the
    index may be data pages or additional index pages.


    If the number of index rows required to sort all the rows on the data pages exceeds
    the space available, then the root page will be followed by another level of index
    pages. Additional levels of index pages in a B-tree are referred to as *intermediate
    levels*. In many cases, indexes built with a B-tree structure will not require
    more than one or two intermediate levels. Even with a wide indexing key, millions
    to billions of rows can be sorted with just a few levels.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig9_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig9_HTML.jpg)


    Figure 2-9


    B-tree structure


    The next level of pages below the root and intermediate levels of the indexes,
    referred to as the *nonleaf levels*, is the *leaf level* (see Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9)).
    The leaf level contains all the data pages for the index. The data pages are where
    all the key values and the nonkey values for the row are stored. Nonkey values
    are never stored on the index pages.


    Another differentiator between heaps and B-trees is the ability within the index
    levels to perform sequential page reads. Pages contain previous page and next
    page properties in the page headers. With index and data pages, these properties
    are populated and can be used to traverse the B-tree to find the next requested
    row from the B-tree without returning to the root level of the index. To illustrate
    this, consider a situation where you request the rows with key values between
    925 and 3,025 from the index shown in Figure [2-9](#338675_3_En_2_Chapter.xhtml#Fig9).
    Through a B-tree, this operation can be done by traversing the B-tree down to
    key value 925, shown in Figure [2-10](#338675_3_En_2_Chapter.xhtml#Fig10). After
    that, the rows through key value 3,025 can be retrieved by accessing all pages
    after the first page in order, finishing the operation when the last key value
    is encountered.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig10_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig10_HTML.jpg)


    Figure 2-10


    B-tree sequential read


    One option available for tables and indexes is the ability to partition these
    structures. Partitioning changes the physical implementation of the index and
    how the index and data pages are organized. From the perspective of the B-tree
    structure, each partition in an index has its own B-tree. If a table is partitioned
    into three different partitions, there will then be three B-tree structures for
    the index.


    ### Columnstore Structure


    Columnstore, first introduced with SQL Server 2012, introduces a new organizational
    structure, which is based on Microsoft’s Vertipaq technology. The columnstore
    structure is used by the clustered and nonclustered columnstore index types. The
    columnstore structure diverges from the traditional method of storing and indexing
    data from a row-wise to a column-wise format. This means that instead of storing
    all the values for a row with all the other values in the row, the values are
    stored with the values of the same column grouped together. For instance, in the
    example in Figure [2-11](#338675_3_En_2_Chapter.xhtml#Fig11), instead of four
    row “groups” stored on the page, three column “groups” are stored.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig11_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Row-wise vs. column-wise storage


    The physical implementation of the columnstore structure does not introduce any
    new page types; it instead utilizes existing page types. Like other structures,
    a columnstore begins with an IAM page, shown in Figure [2-12](#338675_3_En_2_Chapter.xhtml#Fig12).
    From the IAM page are LOB pages that contain the columnstore information. For
    each column stored in the columnstore, there are one or more segments. Segments
    contain up to about 1 million rows worth of data for the columns that they represent.
    An LOB page can contain one or more segments, and the segments can span multiple
    LOB pages.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig12_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Columnstore structure


    Within each segment is a hash dictionary that is used to map the data that comprises
    the segment of the columnstore. The hash dictionary also contains the minimum
    and maximum values for the data in the segment. This information is used by SQL
    Server during query execution to eliminate segments during query execution.


    One of the advantages of the columnstore structure is its ability to leverage
    compression. Since each segment of the columnstore structure contains the same
    type of data, both from a data type and from a value perspective, SQL Server has
    a greater likelihood of being able to utilize compression on the data. The compression
    used by the columnstore is similar to page-level compression. It utilizes dictionary
    compression to remove similar values throughout the segment. There are two main
    differences between page and columnstore compressions. First, while page compression
    is optional, columnstore compression is mandatory and cannot be disabled. Second,
    page compression is limited to compressing the values on a single page. Alternately,
    columnstore compression is for the entire segment, which may span multiple pages
    or could have multiple segments on the same page. Regardless of the number of
    pages or segments on a page, columnstore compression is contained to the segment.


    Another advantage of the columnstore is that only the columns requested from the
    columnstore are returned. It is often recommended not to use `SELECT *` when writing
    queries; instead, the best practice is to only SELECT the columns that are required.
    Unfortunately, even when this practice is followed, indexes based on heaps and
    B-trees read all the columns for the row from disk into memory. The practice reduces
    some network traffic and streamlines execution, but it doesn’t assist with the
    bottleneck of reading data from disk. Columnstore indexes address this issue by
    reading from disk only the columns that are requested and moving that data into
    memory. Along these same lines, according to Microsoft, queries often access only
    10–15 percent of the available columns in a table.^([²](#fn2)) The reduction in
    the columns retrieved from a columnstore structure will have a significant impact
    on performance and I/O.'
  trans: '## B 树结构


    第二种可用于索引的结构是平衡树，即 `B 树` 结构。它是 SQL Server 中组织索引最常用的结构，聚集索引和非聚集索引都使用此结构。


    在 `B 树` 中，页以层次化树状结构组织，如图 2-9 所示。在此结构内，页经过排序以优化对结构内信息的搜索。除了排序之外，还维护页之间的关系，以允许跨索引层级顺序访问页。


    与堆类似，`B 树` 以一个 `IAM` 页开始，该页标识了 `B 树` 的第一页在 `GAM` 区间内的位置。`B 树` 的第一页是一个索引页，通常被称为索引的
    `根层级`。作为索引页，`根层级` 包含索引中下一页的键值和页地址。根据索引的大小，索引的下一层级可能是数据页或其他的索引页。


    如果对数据页上的所有行进行排序所需的索引行数超出了可用空间，则根页后面将跟随另一个层级的索引页。`B 树` 中额外的索引页层级被称为 `中间层级`。在许多情况下，使用
    `B 树` 结构构建的索引不需要超过一两个 `中间层级`。即使索引键很宽，仅用几个层级也可以对数百万到数十亿行进行排序。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig9_HTML.jpg](img/338675_3_En_2_Fig9_HTML.jpg)

    图 2-9：B 树结构


    索引的根层级和中间层级下面的下一层页，被称为 `非叶层级`，是 `叶层级`（见图 2-9）。`叶层级` 包含索引的所有数据页。数据页是存储行的所有键值和非键值的地方。非键值从不存储在索引页上。


    堆和 `B 树` 的另一个区别在于索引层级内执行顺序页读取的能力。页在页头中包含前一页和后一页属性。对于索引页和数据页，这些属性会被填充，并可用于遍历 `B
    树` 以从 `B 树` 中找到下一个请求的行，而无需返回到索引的根层级。为了说明这一点，考虑一种情况，你从图 2-9 所示的索引中请求键值在 925 到 3,025
    之间的行。通过 `B 树`，此操作可以通过遍历 `B 树` 直到键值 925 来完成，如图 2-10 所示。之后，可以通过按顺序访问第一页之后的所有页面来检索直至键值
    3,025 的行，当遇到最后一个键值时结束操作。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig10_HTML.jpg](img/338675_3_En_2_Fig10_HTML.jpg)

    图 2-10：B 树顺序读取


    表和索引有一个可用的选项，即能够对这些结构进行分区。分区改变了索引的物理实现以及索引页和数据页的组织方式。从 `B 树` 结构的角度来看，索引中的每个分区都有自己的
    `B 树`。如果一个表被分区为三个不同的分区，那么该索引就会有三个 `B 树` 结构。


    ## 列存储结构


    列存储（Columnstore）最早随 SQL Server 2012 引入，它引入了一种新的组织结构，该结构基于 Microsoft 的 Vertipaq
    技术。列存储结构被聚集和非聚集列存储索引类型所使用。列存储结构从传统的行式存储和索引数据方法转变为列式格式。这意味着，不是将一行的所有值与该行中的其他所有值存储在一起，而是将值与同一列的值分组存储在一起。例如，在图
    2-11 的示例中，页面上存储的不是四个行“组”，而是三个列“组”。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig11_HTML.jpg](img/338675_3_En_2_Fig11_HTML.jpg)

    图 2-11：行式存储与列式存储


    列存储结构的物理实现并没有引入任何新的页类型；它利用的是现有的页类型。与其他结构一样，列存储以一个 `IAM` 页开始，如图 2-12 所示。从 `IAM`
    页开始是 `LOB` 页，这些页包含列存储信息。对于存储在列存储中的每一列，都有一个或多个段。段包含其代表的列最多约 100 万行的数据。一个 `LOB`
    页可以包含一个或多个段，并且段可以跨越多个 `LOB` 页。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig12_HTML.jpg](img/338675_3_En_2_Fig12_HTML.jpg)

    图 2-12：列存储结构


    每个段内都有一个哈希字典，用于映射构成该列存储段的数据。该哈希字典还包含段中数据的最小值和最大值。此信息由 SQL Server 在查询执行期间使用，以在查询执行过程中消除段。


    列存储结构的优势之一是其利用压缩的能力。由于列存储结构的每个段包含相同类型的数据（无论是从数据类型还是值的角度来看），SQL Server 更有可能对数据使用压缩。列存储使用的压缩类似于页级压缩。它利用字典压缩来消除整个段中的相似值。页压缩和列存储压缩之间有两个主要区别。首先，页压缩是可选的，而列存储压缩是强制性的且无法禁用。其次，页压缩仅限于压缩单个页上的值。而列存储压缩是针对整个段的，该段可能跨越多个页，或者同一页面上可能有多个段。无论页面数量或一个页面上的段数量如何，列存储压缩都仅限于该段内。


    列存储的另一个优势是只返回从列存储请求的列。通常建议在编写查询时不要使用 `SELECT *`；相反，最佳实践是只 `SELECT` 需要的列。不幸的是，即使遵循了此实践，基于堆和
    `B 树` 的索引也会从磁盘读取行的所有列到内存中。这种实践减少了一些网络流量并简化了执行，但它无助于缓解从磁盘读取数据的瓶颈。列存储索引通过仅从磁盘读取请求的列并将该数据移动到内存中来解决此问题。同样地，根据
    Microsoft 的说法，查询通常只访问表中可用列的 10-15%。^² 从列存储结构中检索的列的减少将对性能和 I/O 产生重大影响。'
- fmt: 'While the columnar structure is unchanged between clustered and nonclustered
    columnstore indexes, there are a few points of distinction between the two that
    are important to be aware of. A clustered columnstore index has an additional
    structure, called the `deltastore`, which allows write operations on the index.
    While segments of both types of columnstore are read-only, the `deltastore` allows
    insert, update, and delete actions against the index. Also, a clustered columnstore
    is the base copy of the data; it doesn’t have a clustered index or heap that it
    relies on for a full copy of the data. All data is stored in a clustered columnstore
    index. Alternatively, the nonclustered columnstore index requires a traditional
    clustered index on the data it is using and generally represents a duplication
    of the data in the database.


    ### Warning


    The tools used in the next section are undocumented and unsupported. They do not
    appear in `Books Online`, and their functionality can change without notice. That
    being said, these tools have been around for quite some time, and there are many
    blog posts that describe their behavior. You can find additional resources for
    using these tools at [`www.sqlskills.com`](http://www.sqlskills.com). When using
    older versions of `SQL Server`, it will be important to understand these tools,
    since the previously described `DMF`s may not be available.


    ## Examining Pages


    The first part of this chapter outlined the types of pages found in `SQL Server`
    databases. On top of that, you’ve looked at the structures available for organizing
    and managing the relationship between pages within your databases. In this next
    section, you will look at how to use dynamic management functions and `DBCC` commands
    to examine pages in your database. For current versions of `SQL Server`, you’ll
    be able to use the `DMF`s, but on older releases you’ll need to use the `DBCC`
    commands.


    By using these tools, you’ll gain the foundation from which you’ll be able to
    look at the behaviors of `indexes` in this chapter and throughout the rest of
    the book. Also, this will provide you with the knowledge to do your own exploration
    of `indexes` and data in your databases.


    ### Dynamic Management Functions


    There are two dynamic management functions you’ll be using to examine the pages
    within your `SQL Server` databases. These are


    *   `sys.dm_db_database_page_allocations`


    *   `sys.dm_db_page_info`


    #### sys.dm_db_database_page_allocations


    The `DMF sys.dm_db_database_page_allocations` provides information on page allocations
    within a database. The function can be used to investigate `indexes` and their
    associated pages. It can also be used to identify how extents have been allocated
    and whether the extents being used are mixed or uniform.


    The `DMF` provides data similar to that which is provided from `DBCC EXTENTINFO`
    and `DBCC IND`, which are described later. An advantage of using the `DMF` is
    that the results can be filtered and merged with other `DMF`s. Additionally, it
    provides details on all pages allocated to an `index` even those without data
    on them. One restriction of the output is that it only returns pages associated
    with data allocation, such as the data, `index`, and `IAM` pages.


    Listing 2-1 shows the syntax for using `sys.dm_db_database_page_allocations`.
    The execution requires five parameters, which are defined in Table 2-1.


    **Table 2-1**

    **Parameters for sys.dm_db_database_page_allocations**


    | Parameter | Description |

    | --- | --- |

    | `@DatabaseId` | Database from which to return the page listing for tables and
    indexes. The parameter is required and accepts the use of the `DB_ID()` function.
    |

    | `@TableId` | `Object_id` for the table from which to return the page listing.
    The parameter is required and accepts the use of the `OBJECT_ID()` function. `NULL`
    can also be used to return all tables. |

    | `@IndexId` | `Index_id` from the table that the page list is from. The parameter
    is required and accepts the use of `NULL` to return information for all indexes.
    |

    | `@PartionId` | ID of the partition that the page list is returning. The parameter
    is required and accepts the use of `NULL` to return information for all indexes.
    |

    | `@Mode` | Defines the mode for returning data. The options are `DETAILED` and
    `LIMITED`. With `LIMITED`, the information is limited to page metadata, such as
    page allocation and relationship information. Under the `DETAILED` mode, additional
    information is provided, such as page type and interpage relationship chains.
    |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {TableId | NULL}, {IndexId | NULL}, { PartitionId | NULL },

    {DETAILED | LIMITED})

    ```

    Listing 2-1

    `sys.dm_db_database_page_allocations` Syntax


    When executing `sys.dm_db_database_page_allocations`, results include the columns
    defined in Table 2-2. For every page allocation, there will be one row in the
    results.


    **Table 2-2**

    **Columns for sys.dm_db_database_page_allocations**'
