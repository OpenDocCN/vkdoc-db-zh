    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 35000))

    WITH (MEMORY_OPTIMIZED = ON)

    IF  OBJECT_ID(''tempdb..#tempHeader'') IS NOT NULL

    DROP TABLE #tempHeader

    SELECT SalesOrderID

    ,OrderDate

    ,DueDate

    ,ShipDate

