  trans: "### 注意事项\n\n本章的示例需要一个 shape 文件和 `OGR2OGR` 工具。该 shape 文件来自 TIGER/Line Shapefile，2017\
    \ 年，全国，美国，当前县及同等全国 Shapefile，可从 [`www2.census.gov/geo/tiger/TIGER2017/COUNTY/tl_2017_us_county.zip`](https://www2.census.gov/geo/tiger/TIGER2017/COUNTY/tl_2017_us_county.zip)\
    \ 获取。而 `OGR2OGR` 可在 `OSGeo4W` 中从 [`http://download.osgeo.org/osgeo4w/osgeo4w-setup-x86_64.exe`](http://download.osgeo.org/osgeo4w/osgeo4w-setup-x86_64.exe)\
    \ 获取。安装应用程序时，仅需安装 `GDAL` 包。安装完成后，运行 PowerShell 命令 `[Environment]::SetEnvironmentVariable(“GDAL_DATA”,\
    \ “C:\\OSGeo4W64\\share\\gdal”, “Machine”)` 以设置一个环境变量。最后，从解压地理文件的目录，运行命令 `C:\\\
    OSGeo4W64\\bin\\ogr2ogr -f “MSSQLSpatial” MSSQL:“server=localhost;database=AdventureWorks2017;trusted_connection=yes;”\
    \ -nln “tl_2017_us_county” -a_srs “ESPG:4269” -lco “GEOM_TYPE=geography” -lco\
    \ “GEOM_NAME=geog4269” “tl_2017_us_county.shp” -s_srs EPSG:4269 -t_srs EPSG:26713`。\n\
    \n在 `SSMS` 的常规网格和表格结果集中查看查询 `GEOMETRY` 数据类型列的实际数据用处不大。要利用空间数据特性，使用 `SSMS` 中的“空间结果”选项卡则有效得多。给定清单\
    \ 5-3 中的表，可以对 `GEOM` 列执行一个简单的 `SELECT` 语句，该语句的结果将自动生成“空间结果”选项卡。例如，清单 5-4 中的查询将生成华盛顿州的图像，并为每个县区域使用不同的颜色编码。\n\
    \n```\nUSE AdventureWorks2017\nGO\nSELECT  *\nFROM    dbo.tl_2017_us_county AS\
    \ tuc\nWHERE   tuc.STATEFP = '41';\n清单 5-4\n用于检索空间数据的初始查询\n```\n\n点击 `SSMS` 结果窗口中的“空间结果”选项卡，以显示查询生成的图像。你应该能看到类似图\
    \ 5-3 中的内容。\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig3_HTML.jpg](img/338675_3_En_5_Fig3_HTML.jpg)\n\
    **图 5-3**\n针对县数据进行空间查询的输出\n\n清单 5-4 中的查询使用了一个标准列 `STATEFP` 来过滤信息，以便只查看特定州内的县。不过，在使用这些数据之前，最好确保你处理的\
    \ `GEOM` 列中的形状都是有效的。数据存储不当的情况是可能存在的，因此可能需要清理你的数据。为此，你可以使用 `MakeValid()` 方法来修改任何\
    \ `GEOMETRY` 实例，使其变得有效。根据微软的文档，使用此函数可能导致形状“略微偏移”，但它对形状可能产生的影响程度尚不明确。执行清单 5-5 将更新\
    \ `GEOM` 列中任何无效的 `GEOMETRY` 实例。\n\n```\nUSE AdventureWorks2017\nGO\nUPDATE  dbo.tl_2017_us_county\n\
    SET     GEOM = GEOM.MakeValid();\n清单 5-5\n使用 MakeValid() 纠正任何无效的 GEOMETRY 实例\n\
    ```\n\n`MakeValid()` 方法应谨慎使用，并且在生产环境中应审查所有发现的无效 `GEOMETRY` 实例。在使用 `MakeValid()`\
    \ 函数后，你应该计划审查你的形状，因为它可能会修改这些形状。\n\n你还可以使用空间列，根据位置和距离的行为来过滤返回的数据。清单 5-6 展示了一个调用为处理空间信息而定义的特殊方法之一的示例。该查询返回距离俄克拉荷马州塔尔萨县最近的十个县（参见图\
    \ 5-4）。\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig4_HTML.jpg](img/338675_3_En_5_Fig4_HTML.jpg)\n\
    **图 5-4**\n使用 `STDistance()` 缩小邮政编码数据的结果\n\n```\nUSE AdventureWorks2017\nGO\n\
    DECLARE @polygon GEOMETRY;\nSELECT  @polygon = tuc.GEOM\nFROM    dbo.tl_2017_us_county\
    \ AS tuc\nWHERE   tuc.NAME = 'Tulsa';\nSELECT TOP 10\n        tuc.GEOM,\n    \
    \    tuc.GEOM.STDistance(@polygon),\n        tuc.NAME\nFROM    dbo.tl_2017_us_county\
    \ AS tuc\nWHERE   tuc.GEOM.STDistance(@polygon) IS NOT NULL\n        AND tuc.GEOM.STDistance(@polygon)\
    \ < 1\nORDER BY tuc.GEOM.STDistance(@polygon);\n清单 5-6\n查询距离给定点最近的前十名邮政编码\n```\n\
    \n清单 5-6 中的查询创建了图 5-5 所示的执行计划。\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig5_HTML.jpg](img/338675_3_En_5_Fig5_HTML.jpg)\n\
    **图 5-5**\n使用 `STDistance()` 但未建立索引生成的执行计划\n\n如果你查看“空间结果”选项卡，俄克拉荷马州东北角包含这十个县的区域看起来会像图\
    \ 5-4。然而，图 5-5 中显示的查询执行计划并不理想，它包含了在主键上创建的聚集索引的索引扫描，以及一个高成本的 `filter` 操作。由于使用了\
    \ `STDistance` 谓词，该查询适合在 `GEOMETRY` 列上使用索引，因此应该添加一个索引。"
- fmt: "## Supporting Methods with Indexes\n\nWith `GEOMETRY` and `GEOGRAPHY` data\
    \ types, only certain methods are supported with the use of indexes. The `STDistance()`\
    \ method will support indexing, which would benefit the query shown in Listing\
    \ `5-6`. Before diving deeply into indexing the query, the methods that do support\
    \ indexing should be pointed out. These methods have rules in how respective predicates\
    \ are written. The following is a list of supported methods for the `GEOMETRY`\
    \ type:\n\n*   `GEOMETRY.STContains() = 1`\n*   `GEOMETRY.STDistance() < number`\n\
    *   `GEOMETRY.STDistance() <= number`\n*   `GEOMETRY.STEquals() = 1`\n*   `GEOMETRY.STIntersects()\
    \ = 1`\n*   `GEOMETRY.STOverlaps() = 1`\n*   `GEOMETRY.STTouches() = 1`\n*   `GEOMETRY.STWithin()\
    \ = 1`\n\nAnd the following are the supported methods for the `GEOGRAPHY` type:\n\
    \n*   `GEOGRAPHY.STIntersects() = 1`\n*   `GEOGRAPHY.STEquals() = 1`\n*   `GEOGRAPHY.STDistance()\
    \ < number`\n*   `GEOGRAPHY.STDistance() <= number`\n\nFor both `GEOMETRY` and\
    \ `GEOGRAPHY`, to return any result that is not null, the first parameter and\
    \ the second parameter must have the same spatial reference identifier (SRID),\
    \ which is a spatial reference system based on a specific ellipsoid used to flatten\
    \ or round the earth.\n\nRecall that the query used in Figure `5-6` to return\
    \ the counties around Tulsa uses the `STDistance()` method in the expression `STDistance(@polygon)\
    \ < 1`. Based on the methods supported and analyzing the options and `CREATE`\
    \ syntax for spatial indexing, you could use the `INDEX CREATE` statement shown\
    \ in Listing `5-7` in an attempt to optimize the query.\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nCREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2017_us_county\n(\nGEOM\n)\
    \ USING  GEOMETRY_GRID\nWITH (\nBOUNDING_BOX =(-91.513079, -87.496494, 36.970298,\
    \ 36.970298),\nGRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4\
    \ = HIGH),\nCELLS_PER_OBJECT = 16,\nPAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING\
    \ = OFF,\nALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];\nGO\n```\n\
    Listing `5-7`\n`CREATE` Statement for a Spatial Index\n\nExecuting the query in\
    \ Listing `5-6` results in the much different execution plan, shown in Figure\
    \ `5-6`. It results in a shorter duration when executing and returning the results,\
    \ plus spatial results. The largest difference in the execution plan is the use\
    \ of the index `IDX_COUNTY_GEOM`.\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig6_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig6_HTML.jpg)\n\
    Figure 5-6\nOptimized details of a tuned execution plan using spatial data\n\n\
    You can see an overall improvement and more optimal execution plan from the creation\
    \ of the spatial index. The index and optimal execution plan are good, but validating\
    \ the actual improvement by checking the overall duration in execution time should\
    \ not be skipped. Capturing the execution time using Extended Events, an overall\
    \ review of the execution of the statement can be retrieved. In the case of the\
    \ query that searches for the counties near Tulsa, the results with the index\
    \ in place return 500 milliseconds. Dropping the index and executing the same\
    \ query returns 1,500 milliseconds for total execution time. This test is extremely\
    \ basic, but it’s a solid foundation upon which you can begin to form a strategy\
    \ for indexing existing spatial data to improve overall performance.\n\n## Understanding\
    \ Statistics, Properties, and Information\n\nIndexes in general have many data\
    \ management views and functions that make the administration of the indexes much\
    \ easier and more efficient than manual statistics gathering. With spatial indexes,\
    \ there are additional catalog views that are added to assist in the unique settings\
    \ and administration of them. In addition to the views, there are also some built-in\
    \ procedures that you can invoke to get information about spatial indexes.\n\n\
    ### The Views\n\nThere are two catalog views: `sys.spatial_index` and `sys.spatial_index_tessellation`.\
    \ The `sys.spatial_index` view provides the type and tessellation scheme as well\
    \ as basic information about each spatial index. The `spatial_index_type` column\
    \ returned by `sys.spatial_index` returns a 1 for `GEOMETRY` indexes and a 2 for\
    \ `GEOGRAPHY` indexes. Listing `5-8` is an example query against the view, and\
    \ Figure `5-7` shows the results.\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig7_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig7_HTML.jpg)\n\
    Figure 5-7\nQuerying sys.spatial_indexes and results showing IDX_WIZIP_GEOM index\n\
    \n```sql\nUSE AdventureWorks2017\nGO\nSELECT  name,\n        type_desc,\n    \
    \    spatial_index_type,\n        spatial_index_type_desc,\n        tessellation_scheme\n\
    FROM    sys.spatial_indexes;\n```\nListing `5-8`\nQuery to Retrieve Metadata About\
    \ Spatial Indexes\n\nNow query the `sys.spatial_index_tessellation` view to see\
    \ the parameters of the index and the tessellation scheme. Listing `5-9` is the\
    \ query, and Figure `5-8` shows the results.\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig8_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig8_HTML.jpg)\n\
    Figure 5-8\nQuerying sys.spatial_index_tessellations and partial results\n\n```sql\n\
    USE AdventureWorks2017\nGO\nSELECT  tessellation_scheme,\n        bounding_box_xmax,\n\
    \        bounding_box_xmin,\n        bounding_box_ymax,\n        bounding_box_ymin,\n\
    \        level_1_grid_desc,\n        level_2_grid_desc,\n        level_3_grid_desc,\n\
    \        level_4_grid_desc,\n        cells_per_object\nFROM    sys.spatial_index_tessellations;\n\
    ```\nListing `5-9`\nQuery to Retrieve Information About Tessellation\n\nBoth of\
    \ these catalog views can be joined on the `object_id` to become extremely useful\
    \ for tuning and maintenance tasks. At times, it may prove effective to manipulate\
    \ and re-create indexes as needed when the spatial data dictates."
  raw: '## Supporting Methods with Indexes


    With `GEOMETRY` and `GEOGRAPHY` data types, only certain methods are supported
    with the use of indexes. The `STDistance()` method will support indexing, which
    would benefit the query shown in Listing [5-6](#338675_3_En_5_Chapter.xhtml#PC6).
    Before diving deeply into indexing the query, the methods that do support indexing
    should be pointed out. These methods have rules in how respective predicates are
    written. The following is a list of supported methods for the `GEOMETRY` type:


    *   `GEOMETRY.STContains() = 1`


    *   `GEOMETRY.STDistance() < number`


    *   `GEOMETRY.STDistance() <= number`


    *   `GEOMETRY.STEquals() = 1`


    *   `GEOMETRY.STIntersects() = 1`


    *   `GEOMETRY.STOverlaps() = 1`


    *   `GEOMETRY.STTouches() = 1`


    *   `GEOMETRY.STWithin() = 1`


    *And the following are the supported methods for the* `GEOGRAPHY` *type:*


    *   `GEOGRAPHY.STIntersects() = 1`


    *   `GEOGRAPHY.STEquals() = 1`


    *   `GEOGRAPHY.STDistance() < number`


    *   `GEOGRAPHY.STDistance() <= number`


    For both `GEOMETRY` and `GEOGRAPHY`, to return any result that is not null, the
    first parameter and the second parameter must have the same spatial reference
    identifier (SRID), which is a spatial reference system based on a specific ellipsoid
    used to flatten or round the earth.


    Recall that the query used in Figure [5-6](#338675_3_En_5_Chapter.xhtml#Fig6)
    to return the counties around Tulsa uses the `STDistance()` method in the expression
    `STDistance(@polygon) < 1`. Based on the methods supported and analyzing the options
    and `CREATE` syntax for spatial indexing, you could use the `INDEX CREATE` statement
    shown in Listing [5-7](#338675_3_En_5_Chapter.xhtml#PC7) in an attempt to optimize
    the query.


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2017_us_county

    (

    GEOM

    ) USING  GEOMETRY_GRID

    WITH (

    BOUNDING_BOX =(-91.513079, -87.496494, 36.970298, 36.970298),

    GRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF,

    ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];

    GO

    Listing 5-7

    CREATE Statement for a Spatial Index

    ```


    Executing the query in Listing [5-6](#338675_3_En_5_Chapter.xhtml#PC6) results
    in the much different execution plan, shown in Figure [5-6](#338675_3_En_5_Chapter.xhtml#Fig6).
    It results in a shorter duration when executing and returning the results, plus
    spatial results. The largest difference in the execution plan is the use of the
    index `IDX_COUNTY_GEOM`.


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig6_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Optimized details of a tuned execution plan using spatial data


    You can see an overall improvement and more optimal execution plan from the creation
    of the spatial index. The index and optimal execution plan are good, but validating
    the actual improvement by checking the overall duration in execution time should
    not be skipped. Capturing the execution time using Extended Events, an overall
    review of the execution of the statement can be retrieved. In the case of the
    query that searches for the counties near Tulsa, the results with the index in
    place return 500 milliseconds. Dropping the index and executing the same query
    returns 1,500 milliseconds for total execution time. This test is extremely basic,
    but it’s a solid foundation upon which you can begin to form a strategy for indexing
    existing spatial data to improve overall performance.


    ## Understanding Statistics, Properties, and Information


    Indexes in general have many data management views and functions that make the
    administration of the indexes much easier and more efficient than manual statistics
    gathering. With spatial indexes, there are additional catalog views that are added
    to assist in the unique settings and administration of them. In addition to the
    views, there are also some built-in procedures that you can invoke to get information
    about spatial indexes.


    ### The Views


    There are two catalog views: `sys.spatial_index` and `sys.spatial_index_tessellation`
    . The `sys.spatial_index` view provides the type and tessellation scheme as well
    as basic information about each spatial index. The `spatial_index_type` column
    returned by `sys.spatial_index` returns a 1 for `GEOMETRY` indexes and a 2 for
    `GEOGRAPHY` indexes. Listing [5-8](#338675_3_En_5_Chapter.xhtml#PC8) is an example
    query against the view, and Figure [5-7](#338675_3_En_5_Chapter.xhtml#Fig7) shows
    the results.


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig7_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Querying sys.spatial_indexes and results showing IDX_WIZIP_GEOM index


    ```

    USE AdventureWorks2017

    GO

    SELECT  name,

    type_desc,

    spatial_index_type,

    spatial_index_type_desc,

    tessellation_scheme

    FROM    sys.spatial_indexes;

    Listing 5-8

    Query to Retrieve Metadata About Spatial Indexes

    ```


    Now query the `sys.spatial_index_tessellation` view to see the parameters of the
    index and the tessellation scheme. Listing [5-9](#338675_3_En_5_Chapter.xhtml#PC9)
    is the query, and Figure [5-8](#338675_3_En_5_Chapter.xhtml#Fig8) shows the results.


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig8_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Querying sys.spatial_index_tessellations and partial results


    ```

    USE AdventureWorks2017

    GO

    SELECT  tessellation_scheme,

    bounding_box_xmax,

    bounding_box_xmin,

    bounding_box_ymax,

    bounding_box_ymin,

    level_1_grid_desc,

    level_2_grid_desc,

    level_3_grid_desc,

    level_4_grid_desc,

    cells_per_object

    FROM    sys.spatial_index_tessellations;

    Listing 5-9

    Query to Retrieve Information About Tessellation

    ```


    Both of these catalog views can be joined on the `object_id` to become extremely
    useful for tuning and maintenance tasks. At times, it may prove effective to manipulate
    and re-create indexes as needed when the spatial data dictates.'
  trans: "## 使用索引支持的方法\n\n对于 `GEOMETRY` 和 `GEOGRAPHY` 数据类型，只有某些方法在利用索引时得到支持。`STDistance()`\
    \ 方法将支持索引，这将对清单 `5-6` 所示的查询有益。在深入探讨索引查询之前，应首先指出那些确实支持索引的方法。这些方法在编写各自的谓词时有特定规则。以下是\
    \ `GEOMETRY` 类型的支持方法列表：\n\n*   `GEOMETRY.STContains() = 1`\n*   `GEOMETRY.STDistance()\
    \ < number`\n*   `GEOMETRY.STDistance() <= number`\n*   `GEOMETRY.STEquals() =\
    \ 1`\n*   `GEOMETRY.STIntersects() = 1`\n*   `GEOMETRY.STOverlaps() = 1`\n*  \
    \ `GEOMETRY.STTouches() = 1`\n*   `GEOMETRY.STWithin() = 1`\n\n以下是 `GEOGRAPHY`\
    \ 类型的支持方法：\n\n*   `GEOGRAPHY.STIntersects() = 1`\n*   `GEOGRAPHY.STEquals() =\
    \ 1`\n*   `GEOGRAPHY.STDistance() < number`\n*   `GEOGRAPHY.STDistance() <= number`\n\
    \n对于 `GEOMETRY` 和 `GEOGRAPHY`，要返回任何非空结果，第一个参数和第二个参数必须具有相同的空间参考标识符（SRID），这是一个基于特定椭球体（用于将地球扁平化或圆化）的空间参考系统。\n\
    \n回想一下，图 `5-6` 中用于返回塔尔萨周边县的查询，在表达式 `STDistance(@polygon) < 1` 中使用了 `STDistance()`\
    \ 方法。基于支持的方法并分析空间索引的选项和 `CREATE` 语法，你可以使用清单 `5-7` 中所示的 `INDEX CREATE` 语句来尝试优化查询。\n\
    \n```sql\nUSE AdventureWorks2017\nGO\nCREATE SPATIAL INDEX IDX_COUNTY_GEOM ON\
    \ dbo.tl_2017_us_county\n(\nGEOM\n) USING  GEOMETRY_GRID\nWITH (\nBOUNDING_BOX\
    \ =(-91.513079, -87.496494, 36.970298, 36.970298),\nGRIDS =(LEVEL_1 = LOW,LEVEL_2\
    \ = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),\nCELLS_PER_OBJECT = 16,\nPAD_INDEX\
    \  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF,\nALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS\
    \  = ON) ON [PRIMARY];\nGO\n```\n清单 `5-7`\n空间索引的 `CREATE` 语句\n\n执行清单 `5-6` 中的查询会产生一个非常不同的执行计划，如图\
    \ `5-6` 所示。它导致执行和返回结果的持续时间更短，并且还包含空间结果。执行计划中最大的区别是使用了索引 `IDX_COUNTY_GEOM`。\n\n\
    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig6_HTML.jpg](img/338675_3_En_5_Fig6_HTML.jpg)\n\
    图 5-6\n使用空间数据调整后的执行计划的优化细节\n\n你可以看到从空间索引的创建中获得的整体改进和更优的执行计划。索引和最优执行计划固然很好，但不应跳过通过检查整体执行时间持续时间来验证实际改进这一步。使用扩展事件捕获执行时间，可以检索语句执行的整体审查情况。对于搜索塔尔萨附近县的查询案例，有索引时结果返回时间为\
    \ 500 毫秒。删除索引并执行相同查询，总执行时间为 1500 毫秒。此测试极其基础，但它是一个坚实的基础，你可以在此基础上开始制定为现有空间数据建立索引以提高整体性能的策略。\n\
    \n## 理解统计信息、属性与信息\n\n索引通常有许多数据管理视图和函数，使索引的管理比手动收集统计信息更容易、更高效。对于空间索引，还添加了额外的目录视图来协助其独特的设置和管理。除了视图之外，还有一些可以调用的内置过程来获取有关空间索引的信息。\n\
    \n### 视图\n\n有两个目录视图：`sys.spatial_index` 和 `sys.spatial_index_tessellation`。`sys.spatial_index`\
    \ 视图提供了类型和细分方案以及每个空间索引的基本信息。`sys.spatial_index` 返回的 `spatial_index_type` 列对于 `GEOMETRY`\
    \ 索引返回 1，对于 `GEOGRAPHY` 索引返回 2。清单 `5-8` 是一个针对该视图的查询示例，图 `5-7` 显示了结果。\n\n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig7_HTML.jpg](img/338675_3_En_5_Fig7_HTML.jpg)\n\
    图 5-7\n查询 sys.spatial_indexes 并显示 IDX_WIZIP_GEOM 索引的结果\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nSELECT  name,\n        type_desc,\n        spatial_index_type,\n        spatial_index_type_desc,\n\
    \        tessellation_scheme\nFROM    sys.spatial_indexes;\n```\n清单 `5-8`\n用于检索空间索引元数据的查询\n\
    \n现在查询 `sys.spatial_index_tessellation` 视图以查看索引的参数和细分方案。清单 `5-9` 是查询，图 `5-8` 显示了结果。\n\
    \n![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig8_HTML.jpg](img/338675_3_En_5_Fig8_HTML.jpg)\n\
    图 5-8\n查询 sys.spatial_index_tessellations 及部分结果\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nSELECT  tessellation_scheme,\n        bounding_box_xmax,\n        bounding_box_xmin,\n\
    \        bounding_box_ymax,\n        bounding_box_ymin,\n        level_1_grid_desc,\n\
    \        level_2_grid_desc,\n        level_3_grid_desc,\n        level_4_grid_desc,\n\
    \        cells_per_object\nFROM    sys.spatial_index_tessellations;\n```\n清单 `5-9`\n\
    用于检索细分信息的查询\n\n这两个目录视图都可以通过 `object_id` 进行联接，对于调整和维护任务非常有用。有时，当空间数据要求时，按需操作和重新创建索引可能被证明是有效的。"
- fmt: '## The Procedures


    In addition to the catalog views, four other procedures have been provided internally
    for further analysis of the spatial indexes. These procedures return a complete
    listing of properties that are set on the indexes. The four procedures and their
    parameters are as follows:


    ```

    sp_help_spatial_GEOMETRY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput''

    [ , [ @query_sample = ] ''query_sample'']

    sp_help_spatial_GEOMETRY_index_xml [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ]''{ 0 | 1 }]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    sp_help_spatial_GEOGRAPHY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    sp_help_spatial_GEOGRAPHY_index_xml [@tabname = ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    ```


    Listing 5-10 is an example showing how to execute these stored procedures. The
    example returns information about the `GEOMETRY` index `IDX_COUNTY_GEOM` created
    earlier in Listing 5-7. Figure 5-9 shows the results.


    ![../images/338675_3_En_5_Chapter/338675_3_En_5_Fig9_HTML.jpg](images/338675_3_En_5_Chapter/338675_3_En_5_Fig9_HTML.jpg)


    **Figure 5-9** `sp_help_spatial_GEOMETRY_index` example and results (results may
    vary)


    ```

    USE AdventureWorks2017

    GO

    DECLARE @Sample GEOMETRY

    = ''POLYGON((-90.0 -180.0, -90.0 180.0, 90.0 180.0, 90.0 -180.0, -90.0 -180.0))'';

    EXEC sp_help_spatial_GEOMETRY_index ''dbo.tl_2017_us_county'', ''IDX_COUNTY_GEOM'',
    0, @Sample;

    Listing 5-10

    Investigating the Geometry Index

    ```


    This information can be useful for adjusting the index to make it function better.
    The information returned functions in a similar way to the statistics for an index.
    You can see how many objects are available in each of the levels of the index.
    You can also see how it returns data that matches the provided query sample. Seeing
    that a particular number of intersecting objects match the query sample shows
    you whether a given object will be returned by the index. You can also see the
    percentage of objects in the index that are not returned from the query sample
    by comparing the objects in the index to the ones that match. All this helps you
    understand how well the index is meeting your query requirements.


    ## Tuning Spatial Indexes


    As you saw in Listing 5-7, when a spatial index is created, you have some options.
    Manipulating these options allows you to adjust the behavior of your spatial index.
    Some experimentation will be necessary to arrive at the right set of options for
    the optimal behavior of your index. Use a combination of the execution plan and
    the query performance metrics just as you did earlier in this chapter.


    For a `GEOMETRY` column, you can add a bounding box to the index. This limits
    the area that the index covers, which can allow you to create an index that can
    help satisfy certain query criteria better than a general index. For example,
    if I change the bounding box and re-create the index as in Listing 5-11, I see
    about a 10 percent reduction in execution time.


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2017_us_county

    (

    GEOM

    )USING  GEOMETRY_GRID

    WITH (

    BOUNDING_BOX =(-96.9, -95.3, 36.4, 36.6),

    GRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = ON,

    ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];

    GO

    Listing 5-11

    Adjusting the Bounding Box of the Spatial Index

    ```


    By changing the bounding box, some objects are excluded from the index. Depending
    on your data and the parameters used in the index, performance may not improve
    with more items filtered out from the index. Due to this complexity with spatial
    indexes, it is important to test and verify that you achieve the performance improvements
    you are seeking. Of course, making changes to improve the queries for one set
    of counties could lead to poor performance for other counties in the United States.
    As you can see, there is no easy answer here.


    Another adjustment you can make is to change the grids of the index. The choice
    made in the examples so far is a fairly standard choice if you’re not sure how
    your data is distributed and if you’re unsure of how many matches you’re likely
    to get from any one query. If your query has a higher percentage of inclusive
    results, a different distribution on the grids can result in higher speed. It’s
    largely a question of experimentation. But, just as with the bounding box, changing
    the grid distribution for one dataset could hurt another. You’ll have to perform
    rigorous testing to get this right.


    Using the same example, if I were to make the level 1 grid into a `HIGH` detailed
    grid, I would lose 10 percent of my performance, making the query run slower.
    Changing it to `MEDIUM` neither benefited nor hurt the execution time. In this
    case, adjusting the grid levels in any combination didn’t result in a significant
    improvement in speed, but having the `HIGH` level of detail on either level 1
    or level 2 of the grid would negatively impact performance. With this experiment
    complete, I would choose to leave the default grids alone in this instance.


    ## Restrictions on Spatial Indexes


    Spatial indexes provide some unique features and restrictions. The following is
    a comprehensive list of restrictions for spatial indexing:


    - Spatial indexes require an existing clustered index.

    - A spatial index can be created only on a column of type `GEOMETRY` or `GEOGRAPHY`.

    - Spatial indexes can be defined only on a table that has a primary key. The maximum
    number of primary key columns on the table is 15.

    - The maximum size of index key records is 895 bytes. Larger sizes raise an error.

    - The use of Database Engine Tuning Advisor is not supported.

    - You cannot perform an online rebuild of a spatial index.

    - Spatial indexes cannot be specified on indexed views.

    - You can create only up to 249 spatial indexes on any of the spatial columns
    in a supported table. Creating more than one spatial index on the same spatial
    column can be useful, for example, to index different tessellation parameters
    in a single column.

    - You can create only one spatial index at a time.

    - An index build of spatial data cannot use available process parallelism.


    ## Summary


    Indexing spatial data is a complicated form of data storage and manipulation.
    This chapter covered the main points of how spatial data is processed and stored
    to help in managing and reviewing an implementation of the spatial data types
    in databases.


    With spatial indexes, you now have the ability to quickly determine whether points
    lie within regions or whether regions overlap other regions. Instead of having
    to fully render each spatial artifact, spatial indexes allow queries to quickly
    calculate the results of the spatial function. Remember to always examine the
    execution plan to ensure that the spatial index is actually being used.'
