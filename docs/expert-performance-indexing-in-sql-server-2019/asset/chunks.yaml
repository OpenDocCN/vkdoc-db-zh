- fmt: '## Hex Rows Print Option


    The hex rows print option is a bit more useful than the first print option. It
    includes the page header information but expands on it to provide insight into
    the actual rows on the page. This information can prove valuable when you want
    to look at a row to determine its size on the page and why it may be larger than
    expected.


    ## Hex Data Print Option


    The third print option available for `DBCC PAGE` is the hex data print option,
    where `print_option` equals `2`. This print option, like the previous option,
    starts with the output from the page header–only print option and adds to it.
    The information added through this option includes the hex output of the data
    section of the page and the offset array. With the data section, the page is output
    complete and unformatted as it appears on the actual page. The output in this
    format can be useful when you want to see the page in its raw form.


    To demonstrate the hex data print option, you’ll use the script in Listing 2-18.
    In it the `DBCC PAGE` command is used to retrieve the page from `dbo.IndexInternalsFour`
    that contains the last row. This row contains 25 fives in the `FillerData` column.


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,2)

    ```


    Listing 2-18 DBCC PAGE with Hex Data Print Option


    In the results, shown in Figure 2-24, the output contains a large block of characters
    in the data section. The block contains three components. On the far left is page
    address information, such as `0x0000003BCEBF8000`. The page address identifies
    where on the page the information is located. The middle section contains the
    hex data that is contained in that section of the page. The right side of the
    character block contains the character representation of the hex data. For the
    most part, this data is not legible, except when it comes to character data being
    stored from character data types, such as `char` and `nchar`.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig24_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig24_HTML.jpg)


    Figure 2-24 DBCC PAGE output for hex data print option


    Initially, the hex data print option may seem less useful than the other print
    options. In many situations, this will be the case. The true value in this print
    option is that `DBCC PAGE` doesn’t try to interpret the page for you. It displays
    the page as is. With the other print options, the output will sometimes be reordered
    to conform to expected slot orders; an example of this is demonstrated in Chapter
    8.


    ## Row Data Print Option


    The last print option available for `DBCC PAGE` is the row data print option,
    where `print_option` equals `3`. The output from this print option can change
    depending on the type of page that is being requested. The basic information returned
    for most pages is identical to that returned from the hex rows print option: the
    data split per row in the hex format. The output varies, though, when it comes
    to data pages and index pages. For these page types, this print option provides
    some extremely useful information about the page.


    ### Note


    You can use the `WITH TABLERESULTS` option with `DBCC PAGE` to output the results
    from the command to a resultset instead of messages. This option is useful when
    you want to insert the results returned from the `DBCC` command into a table.


    To show the differences between the data and index page outputs, let’s walk through
    another example. This example will use the table `dbo.IndexInternalsFour` that
    was created in Listing 2-10. In the demo for this print option, shown in Listing
    2-19, you’ll execute `DBCC PAGE` against one of the data pages and the index page
    for the table.


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,378,3) -- Data page

    DBCC PAGE(0,1,377,3) -- Index page

    ```


    Listing 2-19 DBCC PAGE with Row Data Print Option


    Comparing the results from the data page, shown in Figure 2-25, to the output
    from the hex data print option, shown in Figure 2-24, there is one major difference.
    Underneath the hex memory dump for the slot, all the column details from the row
    are decoded and presented in a legible format. It starts with slot 0 column 1,
    which contains the `RowID` column, which it shows to have a value of 5. The next
    column, column 2, is the `FillerData` column, which contains 25 fives. For each
    of these columns, the physical length is noted along with the offset of the value
    within the row. The last value provided on the data section of the page is the
    `KeyHashValue`. This value isn’t actually stored on the page. Instead, it is a
    hash value that was created when the page was placed in memory based on the keys
    on the page. This value is shown in tools that are used by SQL Server to report
    information about pages back to the end user; you may have seen this value before
    while investigating deadlocks.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig25_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig25_HTML.jpg)


    Figure 2-25 DBCC PAGE output for row data print option for data page


    With the index page, there isn’t a change in the message output from other page
    types. Instead, the difference with this page is the resultset. Instead of just
    a message output, a table is also returned. The table returns one row for every
    index row on the page. Reviewing the output for the index page, shown in Figure
    2-26, there are two rows returned. The first row indicates that page 1:376 is
    the child page to the index page. It also shows that the key value for the index
    is `RowID`, which is `NULL` for the first index row. This means that this is the
    start of the index and no values are limiting the first values on the child page.
    The second row maps to page 1:378 with a key value of 5. In this case, the key
    value indicates that the first row on the child page has a `RowID` of 5. Since
    the key value can change from index to index, the results from the `DBCC PAGE`
    command with these options will change as well. For every index variation, the
    output will return the relevant values for the index.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig26_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig26_HTML.jpg)


    Figure 2-26 DBCC PAGE output for row data print option for index page


    The row data print option is one of the most useful options for the `DBCC PAGE`
    command. For data pages, it provides total insight into the data stored on the
    page, how much space it takes up, and its position. This allows you a direct line
    into understanding why only certain rows may be fitting on the page and why, for
    instance, a page split may have occurred. The resultset from the index page output
    is equally as useful. The ability to map the index rows to pages and return the
    key values can provide much insight into how the index is organized and how the
    pages are laid out.


    ## Page Fragmentation


    As discussed throughout this chapter, SQL Server stores information in the database
    on 8 KB pages. In general, records in tables are limited to that size; if they
    are smaller than 8 KB, SQL Server stores more than one record per page. One of
    the problems with storing more than a single record per page is handling situations
    where the total size of all the records on a page exceeds 8 KB of space. In these
    situations, SQL Server must change how the records on a page are stored. Depending
    on how the pages are organized, there are two ways in which SQL Server will handle
    the situations: forwarded records and page splits.'
