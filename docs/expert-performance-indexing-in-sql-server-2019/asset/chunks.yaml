  trans: "\n# 语法\n\n代码清单 7-4 中的语法用于创建全文索引。表 7-1 描述了可用的不同选项。\n\n```\nCREATE FULLTEXT\
    \ INDEX ON \n()\nKEY INDEX \nON \nWITH \nCHANGE_TRACKING = \nSTOPLIST = ;\n代码清单\
    \ 7-4\nCREATE FULLTEXT INDEX 语法\n```\n\n在大多数其他的 `CREATE INDEX` 语句中，基本语法和选项类似，仅有细微修改。而对于\
    \ FTS 索引创建，你会看到一套完全不同的选项和考量。初始的 `CREATE FULLTEXT INDEX` 与任何 `CREATE INDEX` 相同，都需要指定表以及要索引的列。此后，其他选项则与常规索引创建不同。\n\
    \n表 7-1\n全文索引选项\n\n| 选项名称 | 描述 |\n| --- | --- |\n| `TYPE COLUMN` | 指定列的名称，该列保存以\
    \ BLOB 类型（如 `.doc`、`.pdf` 和 `.xls`）加载的文档的文档类型。此选项仅用于 `varbinary`、`varbinary(max)`\
    \ 和 `image` 数据类型。如果在任何其他数据类型上指定了此选项，`CREATE FULLTEXT INDEX` 语句将抛出错误。 |\n| `LANGUAGE`\
    \ | 更改用于索引的默认语言，并包含以下变体和选项：•     语言可以指定为字符串、整数或十六进制。•     如果指定了语言，则在使用该索引运行查询时将使用该语言。•     当语言指定为字符串值时，`syslanguages`\
    \ 系统表必须与该语言对应。•     如果使用双字节值，它将在创建时转换为十六进制。•     必须启用特定语言的分词器和词干分析器，否则将生成 SQL\
    \ Server 错误。•     包含多种语言的非 BLOB 和非 XML 列应遵循 0 `×` 0 中性语言设置。•     对于 BLOB 和 XML\
    \ 类型，将使用文档本身中的语言类型。例如，语言类型为俄语或 LCID 为 1049 的 Word 文档将强制在索引中使用相同的设置。使用 `sys.fulltext_languages`\
    \ 查看所有可用的语言类型和 LCID 编码。 |\n| `KEY INDEX` | 每个全文索引都需要指定一个相邻的唯一、单键、非空列。使用此选项在同一表中指定该列。\
    \ |\n| `FULLTEXT_CATALOG_NAME` | 如果不使用默认目录创建全文索引，请使用此选项指定目录名称。 |\n| `CHANGE_TRACKING`\
    \ | 确定如何以及何时填充索引。选项为 `MANUAL`、`AUTO` 和 `OFF [NO_POPULATION]`。`MANUAL` 设置需要在填充索引之前执行\
    \ `ALTER FULLTEXT INDEX ... START UPDATE POPULATION`。`AUTO` 设置在创建时填充索引，并根据持续进行的更改自动更新。如果在\
    \ `CREATE` 语句中省略了 `CHANGE_TRACKING`，这是默认设置。`OFF [NO_POPULATION]` 设置用于完全关闭索引的填充，SQL\
    \ Server 将不保留更改列表。除非指定了 `NO_POPULATION`，否则索引在创建时会填充一次。 |\n| `STOPLIST` | 指定一个停用词列表，该列表本质上会阻止某些词被索引。可用选项有\
    \ `OFF`、`SYSTEM` 和自定义停用词列表。`OFF` 设置将不使用停用词列表，并且在填充索引时性能开销更大。`SYSTEM` 是已创建的默认停用词列表。用户创建的停用词列表是已创建的、可与索引关联使用的停用词列表。\
    \ |\n| `SEARCH PROPERTY LIST` | 指定要与全文索引关联的搜索属性列表。属性列表通过允许区分文档属性（如标题或标签）之间的搜索，提供对全文搜索的更精细控制。\
    \ |\n\n# 关键索引\n\n选择关键索引可能是一个直接的选择，因为关键索引必须是唯一、单键且不可为空的列。主键通常很适合此用途，就像代码清单 7-1\
    \ 中 `dbo.SQLServerDocuments` 表上显示的主键。然而，应考虑关键索引的大小。理想情况下，推荐使用 6 字节的键，并记录为最佳选择，以减少\
    \ I/O 和 CPU 资源消耗的开销。回想一下，唯一键的限制之一是它不能超过 900 字节。如果达到此最大限制，填充将失败。解决问题可能需要创建新索引并修改表本身。对于高使用率的表，这可能会造成昂贵的停机时间。\n\
    \n# 填充\n\n创建全文索引时，应仔细权衡全文索引中的更改跟踪。默认设置 `AUTO` 可能会有开销，如果被索引列的内容频繁更改，可能会对性能产生负面影响。例如，一个存储每月仅插入一次且永不更改的运输发票的系统，可能不会从设置为\
    \ `AUTO` 中受益。`MANUAL` 填充很可能会基于表中内容的加载情况，使用 SQL Server Agent 在给定时间更好地运行。虽然不常见，但有些系统是静态的且只加载一次。这是使用\
    \ `OFF` 设置的理想情况，仅在当时执行初始填充。\n\n填充的最后一个选项是增量填充。它是手动填充的替代方法。增量填充与数据的增量更新概念相同。当你处理数据并进行更改时，这些更改会被跟踪。可以以合并复制作为比较。合并复制通过使用触发器和插入/更新/删除跟踪行到合并系统表来保留更改。在给定的时间点，DBA\
    \ 可以设置同步计划来处理这些更改并将其复制到订阅者。增量填充的功能方式与此相同。通过在表中使用 `timestamp` 列来跟踪更改。只处理那些被发现需要更改的行。这确实意味着必须满足在表上存在时间戳列的要求才能执行增量填充。对于更改极其频繁的数据，这可能不是理想选择。然而，对于随机且很少更改的数据，增量填充可能适合安装。\n"
- fmt: "## StopLists\n\nStopLists are extremely useful in managing what not to populate.\
    \ This can improve the population performance by bypassing what are known as `noise\
    \ words`. As an example, consider the sentence “A dog chewed through the fiber\
    \ going to the SAN causing the disaster and recovery plans to be used for the\
    \ SQL Server instance.” In this sentence, you would most likely want `fiber`,\
    \ `SAN`, `disaster`, `recovery`, and `SQL` or `Server` indexed. The `A`, `the`,\
    \ `to`, and `be` words would not be ideal. These are considered noise words and\
    \ are not part of the population process. As you can imagine, the use of StopList\
    \ can be extremely helpful in the overall population performance and parsing of\
    \ the content. Use of the StopList can be specific to languages as well. For example,\
    \ `la` in French would be specified over `the` in English.\n\nTo create a custom\
    \ StopList, use the `CREATE FULLTEXT STOPLIST` statement as shown in Listing 7-5.\
    \ The system default StopList can be used to pregenerate all the noise words already\
    \ identified as such. For the white paper example, the name of the StopList would\
    \ be `WhitePaperStopList`.\n\n```\nCREATE FULLTEXT STOPLIST WhitePaperStopList\
    \ FROM SYSTEM STOPLIST;\nListing 7-5\nCreating a Full-Text StopList\n```\n\nTo\
    \ view the StopList, use the system views `sys.fulltext_stoplists` and `sys.fulltext_stopwords`.\
    \ The `sys.fulltext_stoplists` view will hold metadata related to the stoplists\
    \ that are created on the SQL Server instance. Determine the `stoplist_id` to\
    \ join to `sys.fulltext_stopwords` to show a complete listing of the words. Alone,\
    \ this StopList is no better than the system default StopList. To add words to\
    \ the StopList, use the `ALTER FULLTEXT STOPLIST` statement in Listing 7-6’s example.\
    \ That example removes `Downtime` as a word to be excluded.\n\n```\nALTER FULLTEXT\
    \ STOPLIST WhitePaperStopList ADD 'Downtime' LANGUAGE 1033;\nListing 7-6\nModifying\
    \ a Full-Text Stoplist\n```\n\nTo review the StopList words, run the query shown\
    \ in Listing 7-7.\n\n```\nSELECT  lists.stoplist_id,\n        lists.name,\n  \
    \      words.stopword\nFROM    sys.fulltext_stoplists AS lists\nJOIN    sys.fulltext_stopwords\
    \ AS words\n  ON lists.stoplist_id = words.stoplist_id\nWHERE   words.language\
    \ = 'English'\nORDER BY lists.name;\nListing 7-7\nUsing sys.fulltext_stoplists\
    \ to Review StopList Words\n```\n\nYou can see the query results in Figure 7-1;\
    \ the word `Downtime` has been successfully added.\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig1_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\nQuery results of a StopList\n\nWith the catalog, StopList, and key\
    \ index availability within the primary key `SQLServerDocumentsID` in the table\
    \ created in Listing 7-1, you can create a full-text index on the `DOC` column\
    \ in the same table from Listing 7-1. To create a full-text index, use the `CREATE\
    \ FULLTEXT INDEX` statement (see Listing 7-8).\n\n```\nCREATE FULLTEXT INDEX ON\
    \ dbo.SQLServerDocuments\n(\n  DOC\n  TYPE COLUMN DocType\n)\nKEY INDEX PK_SQLServerDocuments\n\
    ON WhitePaperCatalog\nWITH STOPLIST = WhitePaperStopList;\nListing 7-8\nCREATE\
    \ FULLTEXT INDEX Statement\n```\n\nOnce the index is created, population will\
    \ begin since there was no option added for `CHANGE_TRACKING`. Later in the chapter,\
    \ I’ll show how to monitor the catalog and see the status. It might take a while\
    \ to load depending on the size of your document. The default `AUTO` setting takes\
    \ effect. To query the content of the `SQLServerDocuments` table and `DOC` column,\
    \ you can run a `CONTAINS` statement to return a specific word. Listing 7-9 shows\
    \ an example of such a statement.\n\n```\nSELECT  ssd.DOC,\n        ssd.DocType\n\
    FROM    dbo.SQLServerDocuments AS ssd\nWHERE   CONTAINS (ssd.DOC, 'statistic');\n\
    Listing 7-9\nUsing CONTAINS to Query for a Specific Word\n```\n\nFigure 7-2 shows\
    \ the execution plan from the query.\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig2_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\nExecution plan of CONTAINS and FTS index usage\n\nBy searching by\
    \ means of `CONTAINS`(ssd.DOC,`'statistic')`, the execution plan in Figure 7-2\
    \ shows the operation on `FulltextMatch`. It also returns the white paper with\
    \ a document type of `.docx` as a match for this word search."
  raw: '#### StopLists


    StopLists are extremely useful in managing what not to populate. This can improve
    the population performance by bypassing what are known as *noise words* . As an
    example, consider the sentence “A dog chewed through the fiber going to the SAN
    causing the disaster and recovery plans to be used for the SQL Server instance.”
    In this sentence, you would most likely want *fiber*, *SAN*, *disaster*, *recovery*,
    and *SQL* or *Server* indexed. The *A*, *the*, *to,* and *be* words would not
    be ideal. These are considered noise words and are not part of the population
    process. As you can imagine, the use of StopList can be extremely helpful in the
    overall population performance and parsing of the content. Use of the StopList
    can be specific to languages as well. For example, *la* in French would be specified
    over *the* in English.


    To create a custom StopList, use the `CREATE FULLTEXT STOPLIST` statement as shown
    in Listing [7-5](#338675_3_En_7_Chapter.xhtml#PC5). The system default StopList
    can be used to pregenerate all the noise words already identified as such. For
    the white paper example, the name of the StopList would be `WhitePaperStopList`.


    ```

    CREATE FULLTEXT STOPLIST WhitePaperStopList FROM SYSTEM STOPLIST;

    Listing 7-5

    Creating a Full-Text StopList

    ```


    To view the StopList, use the system views `sys.fulltext_stoplists` and `sys.fulltext_stopwords`.
    The `sys.fulltext_stoplists` view will hold metadata related to the stoplists
    that are created on the SQL Server instance. Determine the `stoplist_id` to join
    to `sys.fulltext_stopwords` to show a complete listing of the words. Alone, this
    StopList is no better than the system default StopList. To add words to the StopList,
    use the `ALTER FULLTEXT STOPLIST` statement in Listing [7-6](#338675_3_En_7_Chapter.xhtml#PC6)’s
    example. That example removes *Downtime* as a word to be excluded.


    ```

    ALTER FULLTEXT STOPLIST WhitePaperStopList ADD ''Downtime'' LANGUAGE 1033;

    Listing 7-6

    Modifying a Full-Text Stoplist

    ```


    To review the StopList words, run the query shown in Listing [7-7](#338675_3_En_7_Chapter.xhtml#PC7).


    ```

    SELECT  lists.stoplist_id,

    lists.name,

    words.stopword

    FROM    sys.fulltext_stoplists AS lists

    JOIN    sys.fulltext_stopwords AS words

    ON lists.stoplist_id = words.stoplist_id

    WHERE   words.language = ''English''

    ORDER BY lists.name;

    Listing 7-7

    Using sys.fulltext_stoplists to Review StopList Words

    ```


    You can see the query results in Figure [7-1](#338675_3_En_7_Chapter.xhtml#Fig1);
    the word *Downtime* has been successfully added.


    ![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig1_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Query results of a StopList


    With the catalog, StopList, and key index availability within the primary key
    `SQLServerDocumentsID` in the table created in Listing [7-1](#338675_3_En_7_Chapter.xhtml#PC1),
    you can create a full-text index on the `DOC` column in the same table from Listing
    [7-1](#338675_3_En_7_Chapter.xhtml#PC1). To create a full-text index, use the
    `CREATE FULLTEXT INDEX` statement (see Listing [7-8](#338675_3_En_7_Chapter.xhtml#PC8)).


    ```

    CREATE FULLTEXT INDEX ON dbo.SQLServerDocuments

    (

    DOC

    TYPE COLUMN DocType

    )

    KEY INDEX PK_SQLServerDocuments

    ON WhitePaperCatalog

    WITH STOPLIST = WhitePaperStopList;

    Listing 7-8

    CREATE FULLTEXT INDEX Statement

    ```


    Once the index is created, population will begin since there was no option added
    for `CHANGE_TRACKING`. Later in the chapter, I’ll show how to monitor the catalog
    and see the status. It might take a while to load depending on the size of your
    document. The default `AUTO` setting takes effect. To query the content of the
    `SQLServerDocuments` table and `DOC` column, you can run a `CONTAINS` statement
    to return a specific word. Listing [7-9](#338675_3_En_7_Chapter.xhtml#PC9) shows
    an example of such a statement.


    ```

    SELECT  ssd.DOC,

    ssd.DocType

    FROM    dbo.SQLServerDocuments AS ssd

    WHERE   CONTAINS (ssd.DOC, ''statistic'');

    Listing 7-9

    Using CONTAINS to Query for a Specific Word

    ```


    Figure [7-2](#338675_3_En_7_Chapter.xhtml#Fig2) shows the execution plan from
    the query.


    ![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig2_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Execution plan of CONTAINS and FTS index usage


    By searching by means of `CONTAINS`(ssd.DOC,`''statistic'')`, the execution plan
    in Figure [7-2](#338675_3_En_7_Chapter.xhtml#Fig2) shows the operation on `FulltextMatch`.
    It also returns the white paper with a document type of `.docx` as a match for
    this word search.'
  trans: "\n## 停用词列表\n\n停用词列表在管理哪些内容**不应**被填充方面极其有用。通过绕过所谓的 `噪声词`，它可以提升填充性能。举个例子，考虑这个句子：“A\
    \ dog chewed through the fiber going to the SAN causing the disaster and recovery\
    \ plans to be used for the SQL Server instance.” 在这个句子中，你很可能希望 `fiber`、`SAN`、`disaster`、`recovery`\
    \ 以及 `SQL` 或 `Server` 被索引。而 `A`、`the`、`to` 和 `be` 这些词就不那么理想。它们被视为噪声词，不属于填充过程的一部分。正如你可以想象的那样，停用词列表的使用对于整体填充性能和内容解析非常有帮助。停用词列表的使用也可以是特定于语言的。例如，法语中的\
    \ `la` 会取代英语中的 `the` 被指定。\n\n要创建自定义停用词列表，请使用 `CREATE FULLTEXT STOPLIST` 语句，如代码清单\
    \ 7-5 所示。系统默认的停用词列表可用于预生成所有已被识别为噪声词的词汇。在本白皮书示例中，该停用词列表将被命名为 `WhitePaperStopList`。\n\
    \n```\nCREATE FULLTEXT STOPLIST WhitePaperStopList FROM SYSTEM STOPLIST;\n代码清单\
    \ 7-5\n创建全文停用词列表\n```\n\n要查看停用词列表，可以使用系统视图 `sys.fulltext_stoplists` 和 `sys.fulltext_stopwords`。`sys.fulltext_stoplists`\
    \ 视图保存着在 SQL Server 实例上创建的停用词列表相关的元数据。确定 `stoplist_id` 以便与 `sys.fulltext_stopwords`\
    \ 进行联接，从而显示完整的单词列表。单独来看，这个停用词列表并不比系统默认的更好。要向停用词列表中添加单词，请使用如代码清单 7-6 示例中的 `ALTER\
    \ FULLTEXT STOPLIST` 语句。该示例移除了 `Downtime` 这个要排除的单词。\n\n```\nALTER FULLTEXT STOPLIST\
    \ WhitePaperStopList ADD 'Downtime' LANGUAGE 1033;\n代码清单 7-6\n修改全文停用词列表\n```\n\
    \n要查看停用词列表单词，请运行代码清单 7-7 所示的查询。\n\n```\nSELECT  lists.stoplist_id,\n        lists.name,\n\
    \        words.stopword\nFROM    sys.fulltext_stoplists AS lists\nJOIN    sys.fulltext_stopwords\
    \ AS words\n  ON lists.stoplist_id = words.stoplist_id\nWHERE   words.language\
    \ = 'English'\nORDER BY lists.name;\n代码清单 7-7\n使用 sys.fulltext_stoplists 查看停用词列表单词\n\
    ```\n\n你可以在图 7-1 中看到查询结果；单词 `Downtime` 已被成功添加。\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig1_HTML.jpg](img/338675_3_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1\n停用词列表的查询结果\n\n有了目录、停用词列表，以及代码清单 7-1 创建的表中主键 `SQLServerDocumentsID` 的可用键索引，你就可以在同一个表的\
    \ `DOC` 列上创建全文索引。要创建全文索引，请使用 `CREATE FULLTEXT INDEX` 语句（参见代码清单 7-8）。\n\n```\n\
    CREATE FULLTEXT INDEX ON dbo.SQLServerDocuments\n(\n  DOC\n  TYPE COLUMN DocType\n\
    )\nKEY INDEX PK_SQLServerDocuments\nON WhitePaperCatalog\nWITH STOPLIST = WhitePaperStopList;\n\
    代码清单 7-8\nCREATE FULLTEXT INDEX 语句\n```\n\n索引一旦创建，填充就会开始，因为没有为 `CHANGE_TRACKING`\
    \ 添加选项。本章后面部分，我将展示如何监控目录并查看状态。加载时间可能取决于文档的大小。默认的 `AUTO` 设置生效。要查询 `SQLServerDocuments`\
    \ 表和 `DOC` 列的内容，你可以运行 `CONTAINS` 语句来返回特定的单词。代码清单 7-9 展示了一个此类语句的示例。\n\n```\nSELECT\
    \  ssd.DOC,\n        ssd.DocType\nFROM    dbo.SQLServerDocuments AS ssd\nWHERE\
    \   CONTAINS (ssd.DOC, 'statistic');\n代码清单 7-9\n使用 CONTAINS 查询特定单词\n```\n\n图 7-2\
    \ 显示了该查询的执行计划。\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig2_HTML.jpg](img/338675_3_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2\nCONTAINS 和 FTS 索引使用的执行计划\n\n通过 `CONTAINS`(ssd.DOC,`'statistic')` 方式进行搜索，图\
    \ 7-2 中的执行计划显示了对 `FulltextMatch` 的操作。它也将文档类型为 `.docx` 的白皮书作为此单词搜索的匹配项返回。\n"
- fmt: "## Full-Text Search Index Catalog Views and Properties\n\nSQL Server provides\
    \ a wealth of information about indexes in general. Performance, configurations,\
    \ usage, and storage are just a few. As with normal index objects, full-text indexes\
    \ require the same attention and detail to maintenance and options set to ensure\
    \ they consistently benefit the overall performance rather than hinder it.\n\n\
    Table [7-2](#338675_3_En_7_Chapter.xhtml#Tab2) describes the catalog views available\
    \ to full-text search.\n\nTable 7-2: Full-Text Catalog Views\n\n| Catalog View\
    \ Name | Description |\n| --- | --- |\n| `sys.fulltext_catalogs` | Lists all full-text\
    \ catalogs and high-level properties. |\n| `sys.fulltext_document_types` | Returns\
    \ a complete list of document types that are available for indexing. Each of these\
    \ document types will be registered on the instance of SQL Server. |\n| `sys.fulltext_index_catalog_usages`\
    \ | |\n| `sys.fulltext_index_columns` | Lists all columns that are indexed. |\n\
    | `sys.fulltext_index_fragments` | Lists all details of the full-text index fragments\
    \ (storage of the inverted index data). |\n| `sys.fulltext_indexes` | Lists every\
    \ full-text index and properties set on the indexes. |\n| `sys.fulltext_languages`\
    \ | Lists all the available languages on the instance to full-text indexing. |\n\
    | `sys.fulltext_semantic_language_statistics_database` | Lists semantic language\
    \ statistics databases installed. |\n| `sys.fulltext_semantic_languages` | List\
    \ all of the languages with statistics models registered. |\n| `sys.fulltext_stoplists`\
    \ | Lists every StopList created. |\n| `sys.fulltext_stopwords` | Lists all StopWords\
    \ in the database. |\n| `sys.fulltext_system_stopwords` | Lists the preloaded\
    \ system StopWords. |\n\nFor informational purposes, while reviewing catalogs,\
    \ properties, and status results for population, invoke the `FULLTEXTCATALOGPROPERTY`\
    \ function, as shown in Listing [7-10](#338675_3_En_7_Chapter.xhtml#PC10).\n\n\
    ```sql\nFULLTEXTCATALOGPROPERTY ('catalog_name' ,'property')\n-- Listing 7-10\n\
    -- Querying Properties from Full-Text Index\n```\n\nThe returned information will\
    \ provide a wealth of detail on the state of the catalog including population\
    \ status. The `catalog_name` parameter will take any catalog created, and then\
    \ a listing of properties can be utilized to return the specific information required.\
    \ Table [7-3](#338675_3_En_7_Chapter.xhtml#Tab3) lists the properties you can\
    \ pass.\n\nTable 7-3: Full-Text Catalog Properties\n\n| Property Name | Description\
    \ |\n| --- | --- |\n| `AccentSensitivity` | Catalog’s current accent sensitivity\
    \ setting. This returns 0, which means insensitive, and 1, which means sensitive.\
    \ |\n| `IndexSize` | Logical size in megabytes of the catalog. |\n| `ItemCount`\
    \ | The total items that have been indexed in the catalog. |\n| `LogSize` | Backward\
    \ capability property. This returns 0. |\n| `MergeStatus` | Returns 0 if no master\
    \ merge is in progress and 1 if a master merge is in progress. |\n| `PopulateCompletionAge`\
    \ | The elapsed time since index population, in seconds, measured since 01/01/1990\
    \ 00:00:00. This will always return 0 if the population has not run yet. |\n|\
    \ `PopulateStatus` | `PopulateStatus` can return ten different values:<br>`0`:\
    \ Idle.<br>`1`: Full population in progress.<br>`2`: Paused.<br>`3`: The population\
    \ has been throttled.<br>`4`: The population is recovering.<br>`5`: The status\
    \ is shut down.<br>`6`: Incremental population is currently in progress.<br>`7`:\
    \ The status is currently building an index.<br>`8`: The disk is full.<br>`9`:\
    \ Change tracking. |\n| `UniqueKeyCount` | Number of individual full-text index\
    \ keys in the catalog. |\n| `ImportStatus` | Returns 0 when the full-text catalog\
    \ is not being imported and 1 when it is being imported. |\n\nFor example, to\
    \ show the population status of the `WhitePaperCatalog` catalog used earlier,\
    \ you can use the statement in Listing [7-11](#338675_3_En_7_Chapter.xhtml#PC11).\
    \ The result should be 0 for idle, since the index only has the single document\
    \ and no other queries are running against the index.\n\n```sql\nSELECT FULLTEXTCATALOGPROPERTY('WhitePaperCatalog','PopulateStatus');\n\
    -- Listing 7-11\n-- FULLTEXTCATALOGPROPERTY to Return Population Status of a Catalog\n\
    ```\n\nCatalogs and the referencing indexes can be reviewed by executing `sys.fulltext_index_catalog_usages`.\
    \ This catalog view returns all the indexes that have been referenced from it,\
    \ as shown in Listing [7-12](#338675_3_En_7_Chapter.xhtml#PC12).\n\n```sql\nSELECT\
    \  OBJECT_NAME(ficu.object_id) [Object Name],\n        ficu.index_id,\n      \
    \  ficu.fulltext_catalog_id\nFROM    sys.fulltext_index_catalog_usages AS ficu;\n\
    -- Listing 7-12\n-- Utilizing sys.fulltext_index_catalog_usages\n```\n\nFigure\
    \ [7-3](#338675_3_En_7_Chapter.xhtml#Fig3) shows the results, which show SQLServerDocuments\
    \ is using a catalog associated with itself, while JobCandidate, ProductReview,\
    \ and Document are using a shared full-text catalog. It is important to note that\
    \ you are able to use a single catalog across multiple tables.\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig3_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig3_HTML.jpg)\n\
    Figure 7-3: Results from `sys.fulltext_index_catalog_usages`\n\nFor detailed information\
    \ on all catalogs and settings currently applied to them, query `sys.fulltext_catalogs`.\
    \ This catalog view is helpful in determining the default catalog and property\
    \ status indicators, such as `is_importing` that shows whether the catalog is\
    \ in the process of being imported.\n\nFor a detailed review of the full-text\
    \ indexes in the database, you can use `sys.fulltext_indexes` along with joining\
    \ catalog views to create a more meaningful resultset. Important information from\
    \ this catalog view consists of the full-text catalog name and properties; change\
    \ tracking property, crawl type, and state; and the StopList set to be used.\n\
    \nThe query in Listing [7-13](#338675_3_En_7_Chapter.xhtml#PC13) returns an information\
    \ resultset of all indexes including catalog and StopList information for the\
    \ index.\n\n```sql\nSELECT  idx.is_enabled,\n        idx.change_tracking_state,\n\
    \        idx.crawl_type_desc,\n        idx.crawl_end_date [Last Crawl],\n    \
    \    cat.name,\n        CASE WHEN cat.is_accent_sensitivity_on = 0 THEN 'Accent\
    \ InSensitive'\n             WHEN cat.is_accent_sensitivity_on = 1 THEN 'Accent\
    \ Sensitive'\n        END [Accent Sensitivity],\n        lists.name,\n       \
    \ lists.modify_date [Last Modified Date of StopList]\nFROM    sys.fulltext_indexes\
    \ idx\n        INNER JOIN sys.fulltext_catalogs cat\n            ON idx.fulltext_catalog_id\
    \ = cat.fulltext_catalog_id\n        INNER JOIN sys.fulltext_stoplists lists\n\
    \            ON idx.stoplist_id = lists.stoplist_id;\n-- Listing 7-13\n-- Using\
    \ All the Catalog Views for Full-Text Index Information\n```\n\nFigure [7-4](#338675_3_En_7_Chapter.xhtml#Fig4)\
    \ shows the results of the catalog view query. This can be extremely useful when\
    \ tuning full-text catalogs. For instance, if the index is out-of-date, you’ll\
    \ be able to identify when it was last updated or crawled. Or if you’d tuned a\
    \ full-text index to remove noise by adding to the StopList, knowing when that\
    \ change occurred in relation to the last crawl can help identify why the performance\
    \ did not improve.\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig4_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig4_HTML.jpg)\n\
    Figure 7-4: Query results for full-text index information\n\n## Summary\n\nThis\
    \ chapter outlined how to create and query from a full-text index. The need to\
    \ be able to filter and query on large documents and free-form text is just as\
    \ important as being able to use traditional structured indexes. With full-text\
    \ indexing, you can examine not only the contents of a column but also the contents\
    \ of a file within a column, allowing applications to much better identify documents\
    \ and other artifacts that match contextually with the requests being submitted."
  raw: '### Full-Text Search Index Catalog Views and Properties


    SQL Server provides a wealth of information about indexes in general. Performance,
    configurations, usage, and storage are just a few. As with normal index objects,
    full-text indexes require the same attention and detail to maintenance and options
    set to ensure they consistently benefit the overall performance rather than hinder
    it.


    Table [7-2](#338675_3_En_7_Chapter.xhtml#Tab2) describes the catalog views available
    to full-text search.


    Table 7-2


    Full-Text Catalog Views


    | Catalog View Name | Description |

    | --- | --- |

    | `sys.fulltext_catalogs` | Lists all full-text catalogs and high-level properties.
    |

    | `sys.fulltext_document_types` | Returns a complete list of document types that
    are available for indexing. Each of these document types will be registered on
    the instance of SQL Server. |

    | `sys.fulltext_index_catalog_usages` |   |

    | `sys.fulltext_index_columns` | Lists all columns that are indexed. |

    | `sys.fulltext_index_fragments` | Lists all details of the full-text index fragments
    (storage of the inverted index data). |

    | `sys.fulltext_indexes` | Lists every full-text index and properties set on the
    indexes. |

    | `sys.fulltext_languages` | Lists all the available languages on the instance
    to full-text indexing. |

    | `sys.`fulltext_semantic_language_statistics_database | Lists semantic language
    statistics databases installed. |

    | `sys.`fulltext_semantic_languages | List all of the languages with statistics
    models registered. |

    | `sys.fulltext_stoplists` | Lists every StopList created. |

    | `sys.fulltext_stopwords` | Lists all StopWords  in the database. |

    | `sys.fulltext_system_stopwords` | Lists the preloaded system StopWords. |


    For informational purposes, while reviewing catalogs, properties, and status results
    for population, invoke the `FULLTEXTCATALOGPROPERTY` function, as shown in Listing
    [7-10](#338675_3_En_7_Chapter.xhtml#PC10).


    ```

    FULLTEXTCATALOGPROPERTY (''catalog_name'' ,''property'')

    Listing 7-10

    Querying Properties from Full-Text Index

    ```


    The returned information will provide a wealth of detail on the state of the catalog
    including population status. The `catalog_name` parameter will take any catalog
    created, and then a listing of properties can be utilized to return the specific
    information required. Table [7-3](#338675_3_En_7_Chapter.xhtml#Tab3) lists the
    properties you can pass.


    Table 7-3


    Full-Text Catalog Properties


    | Property Name | Description |

    | --- | --- |

    | `AccentSensitivity` | Catalog’s current accent sensitivity setting. This returns
    0, which means insensitive, and 1, which means sensitive. |

    | `IndexSize` | Logical size in megabytes of the catalog. |

    | `ItemCount` | The total items that have been indexed in the catalog. |

    | `LogSize` | Backward capability property. This returns 0. |

    | `MergeStatus` | Returns 0 if no master merge is in progress and 1 if a master
    merge is in progress. |

    | `PopulateCompletionAge` | The elapsed time since index population, in seconds,
    measured since 01/01/1990 00:00:00\. This will always return 0 if the population
    has not run yet. |

    | `PopulateStatus` | `PopulateStatus` can return ten different values:***0***:
    Idle.***1***: Full population in progress.***2***: Paused.***3***: The population
    has been throttled.***4***: The population is recovering.***5***: The status is
    shut down.***6***: Incremental population is currently in progress.***7***: The
    status is currently building an index.***8***: The disk is full.***9***: Change
    tracking. |

    | `UniqueKeyCount` | Number of individual full-text index keys in the catalog.
    |

    | `ImportStatus` | Returns 0 when the full-text catalog is not being imported
    and 1 when it is being imported. |


    For example, to show the population status of the `WhitePaperCatalog` catalog
    used earlier, you can use the statement in Listing [7-11](#338675_3_En_7_Chapter.xhtml#PC11).
    The result should be 0 for idle, since the index only has the single document
    and no other queries are running against the index.


    ```

    SELECT FULLTEXTCATALOGPROPERTY(''WhitePaperCatalog'',''PopulateStatus'');

    Listing 7-11

    FULLTEXTCATALOGPROPERTY to Return Population Status of a Catalog

    ```


    Catalogs and the referencing indexes can be reviewed by executing `sys.fulltext_index_catalog_usages`.
    This catalog view returns all the indexes that have been referenced from it, as
    shown in Listing [7-12](#338675_3_En_7_Chapter.xhtml#PC12).


    ```

    SELECT  OBJECT_NAME(ficu.object_id) [Object Name],

    ficu.index_id,

    ficu.fulltext_catalog_id

    FROM    sys.fulltext_index_catalog_usages AS ficu;

    Listing 7-12

    Utilizing sys.fulltext_index_catalog_usages

    ```


    Figure [7-3](#338675_3_En_7_Chapter.xhtml#Fig3) shows the results, which show
    SQLServerDocuments is using a catalog associated with itself, while JobCandidate,
    ProductReview, and Document are using a shared full-text catalog. It is important
    to note that you are able to use a single catalog across multiple tables.


    ![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig3_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Results from sys.fulltext_index_catalog_usages


    For detailed information on all catalogs and settings currently applied to them,
    query `sys.fulltext_catalogs`. This catalog view is helpful in determining the
    default catalog and property status indicators, such as `is_importing` that shows
    whether the catalog is in the process of being imported.


    For a detailed review of the full-text indexes in the database, you can use `sys.fulltext_indexes`
    along with joining catalog views to create a more meaningful resultset. Important
    information from this catalog view consists of the full-text catalog name and
    properties; change tracking property, crawl type, and state; and the StopList
    set to be used.


    The query in Listing [7-13](#338675_3_En_7_Chapter.xhtml#PC13) returns an information
    resultset of all indexes including catalog and StopList information for the index.


    ```

    SELECT  idx.is_enabled,

    idx.change_tracking_state,

    idx.crawl_type_desc,

    idx.crawl_end_date [Last Crawl],

    cat.name,

    CASE WHEN cat.is_accent_sensitivity_on = 0 THEN ''Accent InSensitive''

    WHEN cat.is_accent_sensitivity_on = 1 THEN ''Accent Sensitive''

    END [Accent Sensitivity],

    lists.name,

    lists.modify_date [Last Modified Date of StopList]

    FROM    sys.fulltext_indexes idx

    INNER JOIN sys.fulltext_catalogs cat

    ON idx.fulltext_catalog_id = cat.fulltext_catalog_id

    INNER JOIN sys.fulltext_stoplists lists

    ON idx.stoplist_id = lists.stoplist_id;

    Listing 7-13

    Using All the Catalog Views for Full-Text Index Information

    ```


    Figure [7-4](#338675_3_En_7_Chapter.xhtml#Fig4) shows the results of the catalog
    view query. This can be extremely useful when tuning full-text catalogs. For instance,
    if the index is out-of-date, you’ll be able to identify when it was last updated
    or crawled. Or if you’d tuned a full-text index to remove noise by adding to the
    StopList, knowing when that change occurred in relation to the last crawl can
    help identify why the performance did not improve.


    ![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig4_HTML.jpg](images/338675_3_En_7_Chapter/338675_3_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Query results for full-text index information


    ## Summary


    This chapter outlined how to create and query from a full-text index. The need
    to be able to filter and query on large documents and free-form text is just as
    important as being able to use traditional structured indexes. With full-text
    indexing, you can examine not only the contents of a column but also the contents
    of a file within a column, allowing applications to much better identify documents
    and other artifacts that match contextually with the requests being submitted.'
  trans: "\n## 全文搜索索引目录视图与属性\n\nSQL Server 提供了大量关于索引的通用信息。性能、配置、使用情况和存储只是其中几个方面。与普通索引对象一样，全文索引同样需要关注其维护和选项设置，以确保它们始终对整体性能有益，而不是阻碍。\n\
    \n表 7-2 描述了可用于全文搜索的目录视图。\n\n表 7-2：全文目录视图\n\n| 目录视图名称 | 描述 |\n| --- | --- |\n|\
    \ `sys.fulltext_catalogs` | 列出所有全文目录及其高级属性。 |\n| `sys.fulltext_document_types`\
    \ | 返回可用于索引的文档类型的完整列表。这些文档类型中的每一个都将在 SQL Server 实例上注册。 |\n| `sys.fulltext_index_catalog_usages`\
    \ | |\n| `sys.fulltext_index_columns` | 列出所有已编入索引的列。 |\n| `sys.fulltext_index_fragments`\
    \ | 列出全文索引片段（倒排索引数据的存储）的所有详细信息。 |\n| `sys.fulltext_indexes` | 列出每个全文索引及其上设置的属性。\
    \ |\n| `sys.fulltext_languages` | 列出实例上可用于全文索引的所有可用语言。 |\n| `sys.fulltext_semantic_language_statistics_database`\
    \ | 列出已安装的语义语言统计数据库。 |\n| `sys.fulltext_semantic_languages` | 列出所有注册了统计模型的语言。\
    \ |\n| `sys.fulltext_stoplists` | 列出创建的每个停止列表。 |\n| `sys.fulltext_stopwords` |\
    \ 列出数据库中的所有停用词。 |\n| `sys.fulltext_system_stopwords` | 列出预加载的系统停用词。 |\n\n出于信息目的，在检查目录、属性和填充状态结果时，可以调用\
    \ `FULLTEXTCATALOGPROPERTY` 函数，如代码清单 7-10 所示。\n\n```sql\nFULLTEXTCATALOGPROPERTY\
    \ ('catalog_name' ,'property')\n-- 代码清单 7-10\n-- 查询全文索引的属性\n```\n\n返回的信息将提供有关目录状态的丰富细节，包括填充状态。`catalog_name`\
    \ 参数可以接受任何已创建的目录，然后可以通过使用属性列表来返回所需的特定信息。表 7-3 列出了您可以传递的属性。\n\n表 7-3：全文目录属性\n\n\
    | 属性名称 | 描述 |\n| --- | --- |\n| `AccentSensitivity` | 目录当前的重音敏感性设置。返回 0 表示不敏感，1\
    \ 表示敏感。 |\n| `IndexSize` | 目录的逻辑大小（兆字节）。 |\n| `ItemCount` | 已在目录中编入索引的总项目数。 |\n\
    | `LogSize` | 向后兼容属性。返回 0。 |\n| `MergeStatus` | 如果未进行主合并则返回 0，如果正在进行主合并则返回 1。\
    \ |\n| `PopulateCompletionAge` | 自上次索引填充以来经过的时间（秒），自 1990-01-01 00:00:00 起算。如果尚未运行填充，则始终返回\
    \ 0。 |\n| `PopulateStatus` | `PopulateStatus` 可以返回十种不同的值：<br>`0`：空闲。<br>`1`：正在进行完全填充。<br>`2`：已暂停。<br>`3`：填充已被限制。<br>`4`：填充正在恢复。<br>`5`：状态为已关闭。<br>`6`：正在进行增量填充。<br>`7`：当前正在构建索引。<br>`8`：磁盘已满。<br>`9`：更改跟踪。\
    \ |\n| `UniqueKeyCount` | 目录中独立的全文索引键的数量。 |\n| `ImportStatus` | 当全文目录未被导入时返回 0，当正在导入时返回\
    \ 1。 |\n\n例如，要显示前面使用的 `WhitePaperCatalog` 目录的填充状态，您可以使用代码清单 7-11 中的语句。结果应为 0（空闲），因为索引只有一个文档且没有其他查询正在该索引上运行。\n\
    \n```sql\nSELECT FULLTEXTCATALOGPROPERTY('WhitePaperCatalog','PopulateStatus');\n\
    -- 代码清单 7-11\n-- 使用 FULLTEXTCATALOGPROPERTY 返回目录的填充状态\n```\n\n可以通过执行 `sys.fulltext_index_catalog_usages`\
    \ 来查看目录及其引用的索引。此目录视图返回所有引用过它的索引，如代码清单 7-12 所示。\n\n```sql\nSELECT  OBJECT_NAME(ficu.object_id)\
    \ [对象名称],\n        ficu.index_id,\n        ficu.fulltext_catalog_id\nFROM    sys.fulltext_index_catalog_usages\
    \ AS ficu;\n-- 代码清单 7-12\n-- 使用 sys.fulltext_index_catalog_usages\n```\n\n图 7-3\
    \ 显示了结果，其中 SQLServerDocuments 正在使用与其自身关联的目录，而 JobCandidate、ProductReview 和 Document\
    \ 正在使用共享的全文目录。重要的是要注意，您能够跨多个表使用单个目录。\n\n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig3_HTML.jpg](img/338675_3_En_7_Fig3_HTML.jpg)\n\
    图 7-3：`sys.fulltext_index_catalog_usages` 的查询结果\n\n有关当前应用于所有目录及其设置的详细信息，请查询 `sys.fulltext_catalogs`。此目录视图有助于确定默认目录和属性状态指示器，例如显示目录是否正在导入过程中的\
    \ `is_importing`。\n\n要详细查看数据库中的全文索引，您可以使用 `sys.fulltext_indexes` 并连接其他目录视图以创建更有意义的结果集。从此目录视图获取的重要信息包括全文目录名称和属性；更改跟踪属性、爬网类型和状态；以及要使用的停止列表。\n\
    \n代码清单 7-13 中的查询返回所有索引的信息结果集，包括目录和索引的停止列表信息。\n\n```sql\nSELECT  idx.is_enabled,\n\
    \        idx.change_tracking_state,\n        idx.crawl_type_desc,\n        idx.crawl_end_date\
    \ [上次爬网时间],\n        cat.name,\n        CASE WHEN cat.is_accent_sensitivity_on\
    \ = 0 THEN '重音不敏感'\n             WHEN cat.is_accent_sensitivity_on = 1 THEN '重音敏感'\n\
    \        END [重音敏感性],\n        lists.name,\n        lists.modify_date [停止列表的最后修改日期]\n\
    FROM    sys.fulltext_indexes idx\n        INNER JOIN sys.fulltext_catalogs cat\n\
    \            ON idx.fulltext_catalog_id = cat.fulltext_catalog_id\n        INNER\
    \ JOIN sys.fulltext_stoplists lists\n            ON idx.stoplist_id = lists.stoplist_id;\n\
    -- 代码清单 7-13\n-- 使用所有目录视图获取全文索引信息\n```\n\n图 7-4 显示了目录视图查询的结果。这在调整全文目录时非常有用。例如，如果索引已过期，您将能够确定其上次更新或爬网的时间。或者，如果您通过添加到停止列表来调整全文索引以去除噪声，了解该更改相对于上次爬网发生的时间有助于识别为什么性能没有改善。\n\
    \n![../images/338675_3_En_7_Chapter/338675_3_En_7_Fig4_HTML.jpg](img/338675_3_En_7_Fig4_HTML.jpg)\n\
    图 7-4：全文索引信息的查询结果\n\n## 总结\n\n本章概述了如何创建全文索引并从中进行查询。能够对大型文档和自由格式文本进行过滤和查询，与能够使用传统的结构化索引同样重要。利用全文索引，您不仅可以检查列的内容，还可以检查列中文件的内容，从而使应用程序能够更好地识别与所提交请求在上下文中匹配的文档和其他人工制品。\n"
- fmt: '# 8. Indexing Myths and Best Practices


    In the past few chapters, we’ve defined indexes and showed how they are structured.
    In the upcoming chapters, you’ll be looking at strategies to build indexes and
    ensure that they behave as expected. In this chapter, we’ll dispel some common
    myths and show how to build the foundation for creating indexes.


    Myths result in an unnecessary burden when attempting to build an index. Knowing
    the myths associated with indexes can prevent you from using indexing strategies
    that will be counterproductive. The following are the indexing myths discussed
    in this chapter:


    *   Databases don’t need indexes.

    *   Primary keys are always clustered.

    *   Online index operations don’t block.

    *   Any column can be filtered in multicolumn indexes.

    *   Clustered indexes store records in physical order.

    *   Indexes always output in the same order.

    *   Fill factor is applied to indexes during inserts.

    *   Deleting from heaps results in unrecoverable space.

    *   Every table should be a heap or have a clustered index.


    When reviewing myths, it’s also a good idea to take a look at best practices.
    Best practices are like myths in many ways in the sense that they are commonly
    held beliefs. The primary difference is that best practices stand up to scrutiny
    and are useful recommendations when building indexes. This chapter will examine
    the following best practices:


    *   Index to your current workload.

    *   Use clustered indexes on primary keys by default.

    *   Properly target database-level fill factors.

    *   Properly target index-level fill factors.

    *   Index unique and foreign key columns.

    *   Balance index count.


    ## Index Myths


    One of the problems that people encounter when building databases and indexes
    is dealing with myths. Indexing myths originate from many different places. Some
    come from previous versions of SQL Server and its tools or are based on former
    functionality. Others come from the advice of others, based on conditions in a
    specific database that don’t match those of other databases.


    The trouble with indexing myths is that they cloud the water of indexing strategies.
    In situations where an index can be built to resolve a serious performance issue,
    a myth can sometimes prevent the approach from being considered. Throughout the
    next few sections, we’ll cover a number of myths regarding indexing, and I’ll
    do my best to dispel them.


    ### Myth 1: Databases Don’t Need Indexes


    Usually, in an application that is being developed, one or more databases are
    created to store data for the application. In many development processes, the
    focus is on adding new features with the expectation that “performance will work
    itself out.” An unfortunate result is that there are many databases that get developed
    and deployed without indexes being built because of the belief that they aren’t
    needed.


    Along with this, there are database developers who believe their databases are
    somehow unique from other databases. The following are some reasons that are heard
    from time to time:


    *   “It’s a small database that won’t get much data.”

    *   “It’s just a proof of concept and won’t be around for long.”

    *   “It’s not an important application, so performance isn’t important.”

    *   “The whole database already fits into memory; indexes will just make it require
    more memory.”

    *   “I am going to use this database only for inserting data; I will never look
    at the results.”


    Each of these reasons is easy to break down. In today’s world of big data, even
    databases that are expected to be small can start growing quickly as they are
    adopted. Besides that, small in terms of a database is definitely in the eye of
    the beholder. Any proof of concept or unimportant database and application wouldn’t
    have been created if there wasn’t a need or someone wasn’t interested in expending
    resources for the features. Those same people likely expect that the features
    they asked for will perform as expected. Lastly, fitting a database into memory
    doesn’t mean it will be fast. As was discussed in previous chapters, indexes provide
    alternative access paths for data, with the aim of decreasing the number of pages
    required to access the data. Without these alternative routes, data access will
    likely require reading every page of a table.


    These reasons may not be the ones you hear concerning your databases, but they
    will likely be similar. The general idea surrounding this myth is that indexes
    don’t help the database perform better. One of the strongest ways to break apart
    this excuse is by demonstrating the benefits of indexing against a given scenario.


    To demonstrate, let’s look at the code in Listing 8-1. This code sample creates
    the table `MythOne`. Next, you will find a query similar to one in almost any
    application. In the output from the query, in Listing 8-2, the query generated
    1,496 reads.


    ```

    USE AdventureWorks2017;

    GO

    SELECT * INTO MythOne

    FROM Sales.SalesOrderDetail;

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    ```

    **Listing 8-1** Table with No Index


    ```

    Table ''MythOne''. Scan count 1, logical reads 1496, physical reads 0, read-ahead
    reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```

    **Listing 8-2** I/O Statistics for Table with No Index


    It could be argued that 1,496 isn’t a lot of input/output (I/O). This might be
    true given the size of some databases and the amount of data in today’s world.
    But the I/O of a query shouldn’t be compared to the performance of the rest of
    the world; it needs to be compared to its potential I/O, the needs of the application,
    and the platform on which it is deployed.


    Improving the query from the previous demonstration is as simple as adding an
    index on the table on the `CarrierTrackingNumber` column. To see the effect of
    adding an index to `MythOne`, execute the code in Listing 8-3. With the index
    created, the reads for the query were reduced from 1,496 to 15 reads, shown in
    Listing 8-4. With just a single index, the I/O for the query was reduced by nearly
    two orders of magnitude. Suffice it to say, an index in this situation provides
    a significant amount of value.


    ```

    CREATE INDEX IX_CarrierTrackingNumber ON MythOne (CarrierTrackingNumber)

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    ```

    **Listing 8-3** Adding an Index to MythOne


    ```

    Table ''MythOne''. Scan count 1, logical reads 15 physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```

    **Listing 8-4** I/O Statistics for Table with an Index


    I’ve shown in these examples that indexes do provide a benefit. If you encounter
    a situation where there is angst for building indexes on a database, try to break
    down the real reason for the pushback and provide an example similar to the one
    presented in this section. In Chapter 11, we’ll discuss approaches that can be
    used to determine what indexes to create in a database.'
  raw: '# 8. Indexing Myths and Best Practices


    In the past few chapters, we’ve defined indexes and showed how they are structured.
    In the upcoming chapters, you’ll be looking at strategies to build indexes and
    ensure that they behave as expected. In this chapter, we’ll dispel some common
    myths and show how to build the foundation for creating indexes.


    Myths result in an unnecessary burden when attempting to build an index. Knowing
    the myths associated with indexes can prevent you from using indexing strategies
    that will be counterproductive. The following are the indexing myths discussed
    in this chapter:


    *   Databases don’t need indexes.


    *   Primary keys are always clustered.


    *   Online index operations don’t block.


    *   Any column can be filtered in multicolumn indexes.


    *   Clustered indexes store records in physical order.


    *   Indexes always output in the same order.


    *   Fill factor is applied to indexes during inserts.


    *   Deleting from heaps results in unrecoverable space.


    *   Every table should be a heap or have a clustered index.


    When reviewing myths, it’s also a good idea to take a look at best practices.
    Best practices are like myths in many ways in the sense that they are commonly
    held beliefs. The primary difference is that best practices stand up to scrutiny
    and are useful recommendations when building indexes. This chapter will examine
    the following best practices:


    *   Index to your current workload.


    *   Use clustered indexes on primary keys by default.


    *   Properly target database-level fill factors.


    *   Properly target index-level fill factors.


    *   Index unique and foreign key columns.


    *   Balance index count.


    ## Index Myths


    One of the problems that people encounter when building databases and indexes
    is dealing with myths. Indexing myths originate from many different places. Some
    come from previous versions of SQL Server and its tools or are based on former
    functionality. Others come from the advice of others, based on conditions in a
    specific database that don’t match those of other databases.


    The trouble with indexing myths is that they cloud the water of indexing strategies.
    In situations where an index can be built to resolve a serious performance issue,
    a myth can sometimes prevent the approach from being considered. Throughout the
    next few sections, we’ll cover a number of myths regarding indexing, and I’ll
    do my best to dispel them.


    ### Myth 1: Databases Don’t Need Indexes


    Usually, in an application that is being developed, one or more databases are
    created to store data for the application. In many development processes, the
    focus is on adding new features with the expectation that “performance will work
    itself out.” An unfortunate result is that there are many databases that get developed
    and deployed without indexes being built because of the belief that they aren’t
    needed.


    Along with this, there are database developers who believe their databases are
    somehow unique from other databases. The following are some reasons that are heard
    from time to time:


    *   “It’s a small database that won’t get much data.”


    *   “It’s just a proof of concept and won’t be around for long.”


    *   “It’s not an important application, so performance isn’t important.”


    *   “The whole database already fits into memory; indexes will just make it require
    more memory.”


    *   “I am going to use this database only for inserting data; I will never look
    at the results.”


    Each of these reasons is easy to break down. In today’s world of big data, even
    databases that are expected to be small can start growing quickly as they are
    adopted. Besides that, small in terms of a database is definitely in the eye of
    the beholder. Any proof of concept or unimportant database and application wouldn’t
    have been created if there wasn’t a need or someone wasn’t interested in expending
    resources for the features. Those same people likely expect that the features
    they asked for will perform as expected. Lastly, fitting a database into memory
    doesn’t mean it will be fast. As was discussed in previous chapters, indexes provide
    alternative access paths for data, with the aim of decreasing the number of pages
    required to access the data. Without these alternative routes, data access will
    likely require reading every page of a table.


    These reasons may not be the ones you hear concerning your databases, but they
    will likely be similar. The general idea surrounding this myth is that indexes
    don’t help the database perform better. One of the strongest ways to break apart
    this excuse is by demonstrating the benefits of indexing against a given scenario.


    To demonstrate, let’s look at the code in Listing [8-1](#338675_3_En_8_Chapter.xhtml#PC1).
    This code sample creates the table `MythOne`. Next, you will find a query similar
    to one in almost any application. In the output from the query, in Listing [8-2](#338675_3_En_8_Chapter.xhtml#PC2),
    the query generated 1,496 reads.


    ```

    Table ''MythOne''. Scan count 1, logical reads 1496, physical reads 0, read-ahead
    reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Listing 8-2

    I/O Statistics for Table with No Index

    ```


    ```

    USE AdventureWorks2017;

    GO

    SELECT * INTO MythOne

    FROM Sales.SalesOrderDetail;

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    Listing 8-1

    Table with No Index

    ```


    It could be argued that 1,496 isn’t a lot of input/output (I/O). This might be
    true given the size of some databases and the amount of data in today’s world.
    But the I/O of a query shouldn’t be compared to the performance of the rest of
    the world; it needs to be compared to its potential I/O, the needs of the application,
    and the platform on which it is deployed.


    Improving the query from the previous demonstration is as simple as adding an
    index on the table on the `CarrierTrackingNumber` column . To see the effect of
    adding an index to `MythOne`, execute the code in Listing [8-3](#338675_3_En_8_Chapter.xhtml#PC3).
    With the index created, the reads for the query were reduced from 1,496 to 15
    reads, shown in Listing [8-4](#338675_3_En_8_Chapter.xhtml#PC4). With just a single
    index, the I/O for the query was reduced by nearly two orders of magnitude. Suffice
    it to say, an index in this situation provides a significant amount of value.


    ```

    Table ''MythOne''. Scan count 1, logical reads 15 physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Listing 8-4

    I/O Statistics for Table with an Index

    ```


    ```

    CREATE INDEX IX_CarrierTrackingNumber ON MythOne (CarrierTrackingNumber)

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    Listing 8-3

    Adding an Index to MythOne

    ```


    I’ve shown in these examples that indexes do provide a benefit. If you encounter
    a situation where there is angst for building indexes on a database, try to break
    down the real reason for the pushback and provide an example similar to the one
    presented in this section. In Chapter [11](#338675_3_En_11_Chapter.xhtml), we’ll
    discuss approaches that can be used to determine what indexes to create in a database.'
