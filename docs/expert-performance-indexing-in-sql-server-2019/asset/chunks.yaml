    page, reducing the repeated prefix-compressed values.


    For a demonstration of the benefits of page compression, let’s expand on the example
    from the row compression section. To start the example, execute the script in
    Listing [11-41](#338675_3_En_11_Chapter.xhtml#PC41). This creates the `dbo.PageCompression`
    table similar to the tables from the previous example.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.PageCompression

    FROM Sales.SalesOrderDetail;

    Listing 11-41

    Setup for Page Compression

    ```


    Implementing page compression is nearly the same as row compression. Both utilize
    the `DATA_COMPRESSION` option, with the `PAGE` option for page compression. To
    see the effect of page compression on the tables, execute the code in Listing
    [11-42](#338675_3_En_11_Chapter.xhtml#PC42). In this example, the effect of page
    compression has significantly more impact on the table than was observed with
    row compression. This time the number of pages used by the table decreases by
    55 percent, as shown in Figure [11-55](#338675_3_En_11_Chapter.xhtml#Fig55).


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig55_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig55_HTML.jpg)


    Figure 11-55


    Page compression output


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_PageCompression ON dbo.PageCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = PAGE);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.PageCompression''));

    Listing 11-42

    Implementing Page Compression

    ```


    The improvements from page compression are not limited to just storing the index.
    These improvements continue to querying the table. Comparing the previous results
    against `dbo.NoCompression` to those against `dbo.PageCompression` (Listing [11-43](#338675_3_En_11_Chapter.xhtml#PC43))
    shows that the savings in reads continue with page compression. In this case,
    the reads decreased to 29 (see Figure [11-56](#338675_3_En_11_Chapter.xhtml#Fig56)),
    which is more than a 55 percent decrease in I/O cost.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig56_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig56_HTML.jpg)


    Figure 11-56


    Page compression query statistics


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.PageCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    Listing 11-43

    Page Compression Query

    ```


    The considerations for page compression are similar in nature to those for row
    compression with the addition of a few additional items. First, because of the
    nature in which page compression is implemented, there are times when SQL Server
    will decide that the rate of compression for a page is not sufficient to justify
    the cost of compressing the page. In these cases, SQL Server will attempt to compress
    the page but will record a failure of the page compression and store the page
    without the benefit of page compression over row compression. It is important
    to monitor the rate in which page compression attempts do not succeed since they
    can indicate when there is low value in using page compression on an index. This
    is discussed further in Chapter [3](#338675_3_En_3_Chapter.xhtml).


    Next, the CPU cost for page compression is much higher than with row compression
    or without compression. If there are not sufficient CPU resources available, this
    can lead to other performance issues. Lastly, page compression is not ideal for
    tables and indexes that expect frequent data modifications. Compressing and uncompressing
    a page to modify a single row can have a significant impact on CPU.


    Both row and page compression can provide substantial cost savings to indexing
    solutions. Consider both when looking at index designs. Doing so will provide
    performance improvements in situations where other solutions may not have yielded
    the desired results.


    ### Note


    You can find additional considerations related to compression in the Books Online
    topic “Data Compression” at [`https://docs.microsoft.com/en-us/sql/relational-databases/data-compression/data-compression`](https://docs.microsoft.com/en-us/sql/relational-databases/data-compression/data-compression).'
  trans: '

    ### 页面压缩


    减少索引大小的另一种方法是使用可变长度数据类型并消除页面上的重复值。SQL Server 通过索引上的页面压缩选项实现这一点。与行压缩类似，此压缩类型可应用于堆表、聚集索引和非聚集索引。页面压缩包含三个组成部分：


    *   行压缩

    *   前缀压缩

    *   字典压缩


    页面压缩的行压缩组件与行压缩选项完全相同。在压缩页面之前，首先会对页面上的行进行压缩。


    页面压缩的下一步是通过前缀压缩完成的。前缀压缩扫描各列，移除相似的值，并将它们分组存储在页面头部。例如，如果若干列的值都以 `abc` 开头，则该值会被放置在页面头部，并在列中用一个位置标识符替换原值，以指示哪些值已被替换。如果另一列包含值
    `abcd`，则会包含对页面头部 `abc` 值的引用，将该列的值更改为 `0d`。此过程对所有列持续进行，以移除最常见的模式并减少每行每列存储的信息量。


    页面压缩的最后一步是字典压缩。通过字典压缩，检查所有列中的值是否存在重复值。延续前面的例子，如果多行中的两列存在与 `0d` 值匹配的值，那么该值会被放置在页面头部，并在那些列中存储对该值的引用。这在整个页面范围内执行，减少了重复的前缀压缩值。


    为了演示页面压缩的优势，让我们扩展行压缩部分的示例。首先，执行 `清单 11-41` 中的脚本。这将创建一个类似于之前示例中表的 `dbo.PageCompression`
    表。


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.PageCompression

    FROM Sales.SalesOrderDetail;

    ```


    `清单 11-41` 页面压缩设置


    实施页面压缩与行压缩几乎相同。两者都使用 `DATA_COMPRESSION` 选项，其中页面压缩使用 `PAGE` 选项。要查看页面压缩对表的影响，请执行
    `清单 11-42` 中的代码。在此示例中，页面压缩对表的影响比行压缩观察到的要显著得多。这次表使用的页面数量减少了 55%，如 `图 11-55` 所示。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig55_HTML.jpg](img/338675_3_En_11_Fig55_HTML.jpg)


    `图 11-55` 页面压缩输出


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_PageCompression ON dbo.PageCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = PAGE);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.PageCompression''));

    ```


    `清单 11-42` 实施页面压缩


    页面压缩的改进不仅限于存储索引。这些改进还延续到查询表时。将之前针对 `dbo.NoCompression` 的结果与针对 `dbo.PageCompression`
    的结果（`清单 11-43`）进行比较表明，页面压缩继续节省了读取量。在这种情况下，读取量降至 29（见 `图 11-56`），这相当于 I/O 成本降低了
    55% 以上。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig56_HTML.jpg](img/338675_3_En_11_Fig56_HTML.jpg)


    `图 11-56` 页面压缩查询统计信息


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.PageCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    ```


    `清单 11-43` 页面压缩查询


    页面压缩的注意事项与行压缩的注意事项性质相似，只是增加了几个额外的事项。首先，由于页面压缩的实现方式，有时 SQL Server 会判定页面的压缩率不足以证明压缩该页面的成本是合理的。在这些情况下，SQL
    Server 会尝试压缩页面，但会记录页面压缩失败，并存储该页面，使其无法获得相对于行压缩的页面压缩优势。监控页面压缩尝试未能成功的比率非常重要，因为这可以表明在索引上使用页面压缩的价值很低。这一点在
    `第 3 章` 有进一步讨论。


    其次，页面压缩的 CPU 成本远高于行压缩或没有压缩的情况。如果没有足够的 CPU 资源可用，这可能会导致其他性能问题。最后，对于预期会频繁修改数据的表和索引，页面压缩并不理想。为了修改单行而压缩和解压缩页面可能会对
    CPU 产生显著影响。


    行压缩和页面压缩都能为索引解决方案带来显著的成本节省。在设计索引时，可以考虑同时使用这两种技术。在其他解决方案可能未产生理想结果的情况下，这样做将提供性能改进。


    ### 注意


    你可以在在线丛书（Books Online）主题“数据压缩”（`https://docs.microsoft.com/en-us/sql/relational-databases/data-compression/data-compression`）中找到与压缩相关的其他注意事项。

    '
- fmt: '## Indexed Views


    In many cases, the way in which data is stored in the database does not fully
    represent the information that the users need to retrieve from the database. To
    solve this, you can build queries to pull the data that users need together into
    resultsets that they can more easily consume. In the process of performing these
    activities, you can aggregate data to provide the results at the level of detail
    in which users require.


    As an example, users may want to see the total amount sold for a product across
    all the orders in a database but without including information on the detail items.
    In most situations, retrieving this information is not an issue. However, in some
    cases, performing that aggregation on the fly can create bottlenecks in the database.
    While indexes can assist in streamlining the aggregations, they sometimes do not
    provide the needed cost improvement to achieve the required performance.


    One possible solution for this issue is to create indexes on a view in the database.
    The view can be created to provide the summary and aggregations that are required,
    and an index can be used to materialize the information in the view into an aggregated
    form. When indexing a view, the results of the query are stored in the database
    in much the same way as any table is stored. By storing this information ahead
    of time, queries that use the aggregations in the view can obtain improved response
    time.


    Before looking at how to implement a view, let’s first walk through the problem
    outlined earlier with retrieving summary information for products. In this case,
    suppose that there is a need for summary information for all products at the product
    subcategory level. The query for this, provided in Listing [11-44](#338675_3_En_11_Chapter.xhtml#PC44),
    would need to provide a sum aggregation of the `LineTotal` `OrderQty` values and
    then an average of the `UnitPrice`. While the number of reads for the query isn’t
    substantially high (see Figure [11-57](#338675_3_En_11_Chapter.xhtml#Fig57)),
    suppose that in this database it was considered too high for a query to be released
    into production. Examining the execution plan, provided in Figure [11-58](#338675_3_En_11_Chapter.xhtml#Fig58),
    you see that while not overly complicated, the plan includes a number of steps
    and would not be considered a trivial plan.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig58_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig58_HTML.jpg)

    **Figure 11-58** Execution plan for expensive aggregation


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig57_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig57_HTML.jpg)

    **Figure 11-57** Statistics I/O results for expensive aggregation


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.ProductSubcategorySummary'') IS NOT NULL

    DROP VIEW dbo.ProductSubcategorySummary;

    SET STATISTICS IO ON;

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    ```

    **Listing 11-44** Expensive Aggregation Query


    As mentioned, a solution for this performance problem can be found through creating
    a view for the query in Listing [11-43](#338675_3_En_11_Chapter.xhtml#PC43) and
    adding an index to the view. There are a number of things to consider when adding
    indexes to views. Some of the more important considerations are the following:


    *   All columns in the view must be deterministic.

    *   The view must be created using the `SCHEMA_BINDING` view option.

    *   The clustered index must be created as unique.

    *   Tables referenced in the view must use two-part naming.

    *   If aggregating values, the `COUNT_BIG()` function must be included.

    *   Some aggregations, such as `AVG()`, are disallowed in indexed views.


    Additional consideration when creating indexed views is included in the Books
    Online topic “Create Indexed Views” ([`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?)).


    The first step in creating an indexed view is to create the underlying view. Given
    the considerations listed, the query in Listing [11-44](#338675_3_En_11_Chapter.xhtml#PC44)
    cannot be directly turned into a view. The query must be changed to remove the
    `AVG` function and include the `COUNT_BIG` function. While this change removes
    one of the required data elements from the output, you will be able to calculate
    that value after indexing the view. Along with that, the view definition must
    include the `WITH SCHEMABINDING` option. The end result is the view definition
    in Listing [11-45](#338675_3_En_11_Chapter.xhtml#PC45). The last step is to create
    a unique clustered index on the table using the `Name` column from the `Production.ProductSubcategory`
    table.


    ```

    USE AdventureWorks2017

    GO

    CREATE VIEW dbo.ProductSubcategorySummary

    WITH SCHEMABINDING

    AS

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,SUM(sod.UnitPrice) AS TotalUnitPrice

    ,COUNT_BIG(*) AS Occurrences

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name;

    GO

    CREATE UNIQUE CLUSTERED INDEX CLIX_ProductSubcategorySummary

    ON dbo.ProductSubcategorySummary(Name)

    ```

    **Listing 11-45** Indexed View


    With the indexed view in place, the next step is to test how the view performs
    compared to the original query. Before executing the code in Listing [11-46](#338675_3_En_11_Chapter.xhtml#PC46),
    first look at the second query that is using the `TotalUnitPrice` and `Occurrences`
    columns to generate `AvgUnitPrice`. While you can’t include the `AVG` function
    in the definitions for indexed views, you can arrive at the same results with
    minimal effort.


    After executing the queries in Listing [11-46](#338675_3_En_11_Chapter.xhtml#PC46),
    you will notice that the queries performed substantially better than in the example
    in Listing [11-44](#338675_3_En_11_Chapter.xhtml#PC44). Instead of more than 1,200
    reads, there are only 2 reads required (see Figure [11-59](#338675_3_En_11_Chapter.xhtml#Fig59)),
    and the execution plan (Figure [11-60](#338675_3_En_11_Chapter.xhtml#Fig60)) is
    quite a bit simpler. Instead of numerous operators, the plan was simplified to
    three operators.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig60_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig60_HTML.jpg)

    **Figure 11-60** Execution plan for Indexed View pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig59_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig59_HTML.jpg)

    **Figure 11-59** Statistics I/O results for Indexed View pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    ```

    **Listing 11-46** Indexed View'
