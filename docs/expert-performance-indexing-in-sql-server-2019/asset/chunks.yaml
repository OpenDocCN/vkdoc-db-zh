    At the completion of the execution of the code listing, there were three operations
    that occurred on the table. For each of these operations, `sys.dm_db_index_usage_stats`
    accumulated one tick in the `user_updates` column. Execute the code in Listing
    [3-20](#338675_3_En_3_Chapter.xhtml#PC20) to see the activity that occurred on
    the index. The results will be similar to those in Figure [3-15](#338675_3_En_3_Chapter.xhtml#Fig15).
    Besides the changes made to the clustered index for `SalesOrderDetail`, the updates
    made to the nonclustered indexes are also included. Being able to see the effects
    of an insert, update, or delete on a table can help provide an understanding of
    the impact of users and the volatility of your data.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig15_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Query results for index_updates


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_updates

    ,ius.last_user_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-20

    Query for index_updates from sys.dm_db_index_usage_stats

    ```


    ### System Columns


    The last set of columns in `sys.dm_db_index_usage_stats` is the system columns.
    The system columns return the same general information as the user columns, except
    these values are from the perspective of background processes. Whenever something
    triggers within SQL Server, such as a triggered statistics update, that activity
    will be tracked through these columns. Table [3-10](#338675_3_En_3_Chapter.xhtml#Tab10)
    lists the system columns.


    Table 3-10


    System Columns in sys.dm_db_index_usage_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | Number of seeks by system queries. |

    | `system_scans` | `bigint` | Number of scans by system queries. |

    | `system_lookups` | `bigint` | Number of lookups by system queries. |

    | `system_updates` | `bigint` | Number of updates by system queries. |

    | `last_system_seek` | `datetime` | Time of last system seek. |

    | `last_system_scan` | `datetime` | Time of last system scan. |

    | `last_system_lookup` | `datetime` | Time of last system lookup. |

    | `last_system_update` | `datetime` | Time of last system update. |


    For the most part, these columns can be ignored. It is good, though, to understand
    how they are aggregated. To see an example, execute the code in Listing [3-21](#338675_3_En_3_Chapter.xhtml#PC21),
    which may run up to a minute. This will change a majority of the rows in the `SalesOrderDetail`
    table. Since more than 20 percent of the rows have changed, an automatic statistics
    update will be triggered. The statistics update is not directly related to user
    activity and is instead a background, or system, process.


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    Listing 3-21

    Update for Sales.SalesOrderDetail

    ```


    After the update has completed, run the T-SQL statements in Listing [3-22](#338675_3_En_3_Chapter.xhtml#PC22).
    This code will return results from sys.stats and the system columns from sys.dm_db_index_usage_stats,
    shown in Figure [3-16](#338675_3_En_3_Chapter.xhtml#Fig16). Within these is the
    `system_scans` column which shows three system scans have occurred on Sales.SalesOrderDetail.
    These related to statistics updates, one of which occurred on the UnitPriceDiscount
    column. Looking at the times when the statistics were created, you can see that
    they were on CarrierTrackingNumber, then SalesOrderDetailId, ModifiedDate, and
    finally UnitPriceDiscount.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig16_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig16_HTML.jpg)


    Figure 3-16


    sys.stats and sys.dm_db_index_usage_stats system columns query results


    ```

    USE AdventureWorks2017

    GO

    SELECT S.object_id,

    S.name,

    S.auto_created,

    STATS_DATE(S.object_id, S.stats_id),

    X.stats_column_names

    FROM sys.stats S

    CROSS APPLY

    (

    SELECT STRING_AGG(C.name, '','') AS stats_column_names

    FROM sys.stats_columns SC

    INNER JOIN sys.columns C

    ON C.object_id = SC.object_id

    AND C.column_id = SC.column_id

    WHERE S.object_id = SC.object_id

    AND S.stats_id = SC.stats_id

    ) X

    WHERE S.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    SELECT OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.system_seeks

    ,ius.system_scans

    ,ius.system_lookups

    ,ius.system_updates

    ,ius.last_system_seek

    ,ius.last_system_scan

    ,ius.last_system_lookup

    ,ius.last_system_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 3-22

    Query for System Columns in sys.dm_db_index_usage_stats

    ```


    From a usefulness perspective, there isn’t much of anything that can be gleaned
    from these columns. They are just the result of background processes and are more
    there to inform what is happening with indexes in the background.


    ### Index Usage Stats Summary


    In this section, I discussed the statistics found in DMV `sys.dm_db_index_usage_stats`.
    This DMV provides some extremely useful statistics about how and if indexes are
    being used in the database. By monitoring these statistics over the long run,
    you will be able to understand which indexes are providing some of the most value.
    Strategies for using all these columns to index for performance will be discussed
    in Chapter [8](#338675_3_En_8_Chapter.xhtml).'
