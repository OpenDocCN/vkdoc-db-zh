    \ [ [ @resample = ] 'resample']\n```\n代码清单 9-32\n`sp_updatestats` 语法\n\n使用 `sp_updatestats`\
    \ 的一个好处是，它将仅更新那些数据已发生修改的项的统计信息。将检查用于触发自动统计信息更新的内部计数器，以确保只更新已更改的统计信息。此外，`resample`\
    \ 选项使用统计信息最近使用的采样率。\n\n在需要更新统计信息的情况下，`sp_updatestats` 是一个极好的工具，用于仅更新那些自上次更新以来可能已过时的统计信息。“更新统计信息任务”就像一张覆盖整个数据库的巨大毯子，而\
    \ `sp_updatestats` 则像一条恰到好处地覆盖所需之处的被子。"
- fmt: '# DDL Command


    The other option for updating statistics is through the DDL command `UPDATE STATISTICS`,
    shown in Listing [9-33](#338675_3_En_9_Chapter.xhtml#PC33). The `UPDATE STATISTICS`
    statement allows for finely tuned statistics updates on a per-statistics basis
    with a number of options for how to collect and build statistics information.


    ```

    UPDATE STATISTICS table_or_indexed_view_name

    [

    {

    { index_or_statistics_name }

    | ( { index_or_statistics_name } [ ,...n ] )

    }

    ]

    [    WITH

    [

    FULLSCAN

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | SAMPLE number { PERCENT | ROWS }

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | RESAMPLE

    [ ON PARTITIONS ( { <partition_number> | <range> } [, ...n] ) ] ]

    [ [ , ] [ ALL | COLUMNS | INDEX ]

    [ [ , ] NORECOMPUTE ]

    [ [ , ] INCREMENTAL = { ON | OFF } ]

    [ [ , ] MAXDOP = max_degree_of_parallelism ]

    ] ;

    ```

    *Listing 9-33* `UPDATE STATISTICS` Syntax


    The first parameter to set when using `UPDATE STATISTICS` is `table_or_indexed_view_name`.
    This parameter references the table in which the statistics will be updated. With
    the `UPDATE STATISTICS` command, only one table or view can have its statistics
    updated at a time.


    The next parameter is `index_or_statistics_name`. This parameter is used to determine
    whether a single statistic, list of statistics, or all statistics on a table will
    be updated. To update just a single statistic, include the name of the statistic
    after the name of the table or view. For a list of statistics, the names of the
    statistics are included in a comma-separated list within parentheses. If no statistics
    are named, then all statistics will be considered for updating.


    After the parameters are set, it is time to add applicable options to the `UPDATE
    STATISTICS` command. This is where the power and flexibility of the syntax really
    shines. These parameters allow the statistics to be finely tuned to the data available
    in them to get the right statistics for the right table and the right index:


    *   `FULLSCAN`: When the statistics object is built, all rows and pages in the
    table or view are scanned. For large tables, this may have an effect on performance
    while creating the statistics. Basically, this is the same as performing a `SAMPLE
    100 PERCENT` operation.

    *   `SAMPLE`: The statistics object is created using either a count or a percentage
    sample of the rows in the table or view. When the sample rate is not selected,
    SQL Server will determine an appropriate sample rate based on the number of rows
    in the table.

    *   `RESAMPLE`: Updates the statistics using the sample rate from the last time
    that the statistics were updated. For instance, if that last update used a `FULLSCAN`,
    then a `RESAMPLE` will result in a `FULLSCAN` as well.

    *   `PERSIST_SAMPLE_PERCENT`: Determines whether the defined sample rate should
    be persisted into the statistics as their future default value for when default
    values are not specified.

    *   `ALL | COLUMNS | INDEX`: Determines whether column statistics, index statistics,
    or both should be updated.

    *   `NORECOMPUTE`: Disables the option for the query optimizer to request an automatic
    update to the statistics. This is useful for locking in statistics that shouldn’t
    change or are optimal with the current sample. Take caution when using this on
    tables that have frequent data modifications and make certain there are other
    mechanisms in place to update the statistics as needed.

    *   `INCREMENTAL`: When enabled, statistics are created as per-partition statistics
    which allows statistics to be updated per partition using the `ON PARTITIONS`
    clause.

    *   `MAXDOP`: Determines the max degree of parallelism for the statistics update
    operation and overrides the max degree of parallelism configuration for the server.


    The first three options in this list are mutually exclusive. You are able to select
    only one of the options. Selecting more than one of those options will generate
    an error.


    Since `UPDATE STATISTICS` is a DDL command, it can easily be automated in a fashion
    similar to that used to defragment indexes. For brevity, a sample script is not
    included, but the template for the index fragmentation maintenance could be used
    as a starting point. As mentioned in the previous section, `sp_updatestats` uses
    `UPDATE STATISTICS` under the covers. This DDL command is a powerful way to update
    statistics as needed in your databases without doing more than is really necessary.
    To continue the analogy from the previous section, using `UPDATE STATISTICS` replaces
    the blanket and comforter with a handmade sweater.


    # Summary


    In this chapter, you learned about a number of maintenance considerations that
    are part of indexing a table. These break down to managing the fragmentation of
    indexes and managing their statistics. With index fragmentation, you saw ways
    in which indexes can become fragmented, why it is an issue, and strategies to
    remove the fragmentation. These maintenance tasks are critical for making certain
    that SQL Server can use indexes to the best of its ability. Along with the maintenance
    activity, the statistics on the indexes must also be maintained. Out-of-date or
    inaccurate statistics can lead to execution plans that do not match the data in
    the table. Without proper execution plans, performance will suffer regardless
    of the indexes in place.


    # 10. Indexing Tools


    When it comes to indexing, Microsoft currently has two tools built into SQL Server
    that can be used to help identify indexes that can improve database performance.
    These are the missing index dynamic management objects (DMOs) and the Database
    Engine Tuning Advisor (DTA). Both tools are useful to assist with indexing databases
    and can provide valuable input when working on tuning a database. Microsoft is
    developing a new Automatic Index Management tool, which is currently available
    in Azure SQL Database. This is not included in SQL Server 2019 at the time of
    this writing.


    This chapter delves into both the missing index and Database Engine Tuning Advisor
    indexing tools. The chapter is divided into two sections that each describe the
    capabilities of each tool. We then walk through how the tools can be used to provide
    assistance with indexing. Throughout the chapter, you will also learn about the
    pros and cons of using each of these tools.'
