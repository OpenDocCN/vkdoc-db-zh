  trans: '## 索引方法


    在你开始创建和删除索引之前，首先需要一个流程来分析当前和潜在的索引。这个流程需要提供一种方式来观察你的数据库，并确定哪些索引适合你的数据库。正如前面章节所提到的，索引工作应更像一门科学，而非艺术。正确索引数据库所需的信息是可得的；通过一些研究，你就可以识别出潜在的索引。类似于科学家使用科学方法来证明理论，数据库管理员和开发人员可以使用索引方法来证明数据库需要哪些索引。


    本书中使用的索引方法由三个阶段组成：监控、分析和实施（见图 15-1）。每个阶段都包含若干步骤，完成后可帮助为数据库提供适当的索引。在实施阶段完成后，索引方法会重新启动第一阶段，使索引成为一个持续的、迭代的过程。


    从监控阶段开始时，主要活动是观察索引。观察包括审查索引的性能和行为（即第 13 章中描述的索引概念）。SQL Server 会从可用的索引中选择它认为最有益的索引。通过观察这种行为，你可以识别出最常用的索引以及它们是如何被使用的。


    观察之后，索引方法的分析阶段开始。在分析阶段（详见第 14 章），使用前一阶段收集的统计数据来确定哪些索引最适合数据库。目标是确定需要创建、删除和修改哪些索引。同时，任何索引更改的影响也会被识别出来。


    索引方法的最后阶段是实施阶段。在这个阶段，上一阶段确定的索引被应用或部署到数据库中。对于每个数据库和环境，部署过程可能不同。例如，在第三方数据库上部署索引的过程与公司自有应用程序的过程就不同。不过，在此阶段内，存在适用于所有环境的核心概念；除了物理构建索引之外，你还需要沟通变更计划和变更可能带来的影响。然后，你需要跟踪随时间推移的变更情况。实施索引不仅仅是执行一条`CREATE
    INDEX`语句那么简单。


    ![../images/338675_3_En_15_Chapter/338675_3_En_15_Fig1_HTML.jpg](img/338675_3_En_15_Fig1_HTML.jpg)


    图 15-1

    索引方法循环


    在最后一个阶段完成后，索引方法再次从第一阶段开始。这样，索引就成了一个持续的、迭代的过程。今天能提供最佳性能的索引，明天可能就不再是最佳索引了。主要有两个事件导致需要随时间改变索引。第一个是数据使用模式，应用程序的功能和特性会随时间变化，因此应用程序的目的也可能改变。第二，数据量和数据分布会（而且通常将会）随时间变化。随着这些变化，某些索引可能会不再被使用，而可能需要其他的访问数据路径。数据变化并不是唯一可能导致索引使用情况变化的因素；未来
    SQL Server 版本或服务包中的优化器改进也可能改变优化器使用索引的方式。


    既然索引方法的基本原理已经介绍完毕，本章的剩余部分将重点放在实施部分。监控和分析阶段的概念分别在第 13 章和第 14 章中介绍。同样重要的是，随着你对索引了解的深入，你会发现新的模式，用于识别索引。随着你对索引和数据库的了解越来越多，你会发现其他看待性能和使用统计信息的方法，这些方法能提供更丰富或更明智的指导。请利用本书和你学到的信息，不断扩展你的索引方法论。


    ## 实施


    索引方法的最后阶段是实施阶段。此阶段正如其名：它实施通过分析阶段确定为必要的索引变更。从流程角度看，这个阶段没有太多内容，但在实施阶段需要完成一些重要的步骤，以帮助建立一个成功的流程。整个流程的目标是改善数据库环境的性能。围绕这个目标，在实施过程中需要记住三个关键点：


    *   沟通

    *   源代码控制（例如，通过部署脚本）

    *   执行


    虽然只有最后一步会实际修改数据库，但另外两点有助于确保变更会被注意到，并且你未来能够继续使用索引方法。


    ### 沟通


    在任何数据库上修改索引的第一个障碍是需要与管理层和数据库用户沟通你变更数据库的意图。对数据库的修改常常会引起警惕，尤其是当这些修改是由数据库所支持应用程序的非所有者提出时。在应用程序所有者和数据库管理团队之间建立并实施开放的沟通渠道，不仅有助于索引过程，也有利于其他共同关注的领域。没有这种沟通，团队可能会对索引变更措手不及，而这些变更可能会影响分析中未发现的功能，或影响计划中但尚未发布的功能。


    在沟通方面，基本上需要为数据库所有者准备两项内容：索引变更的影响分析，以及变更实施后的状态报告。


    #### 影响分析


    在准备对数据库索引进行变更时，突出这些变更对应用程序性能的预期影响非常重要。历史上，这常常是一个猜测的过程。没有太多容易获取的信息能指明某个索引在何处被使用、如何被使用以及使用的频率。


    通过监控阶段列出的流程，你能够自信地了解索引的使用情况。你可以确定它上次被使用的时间以及涉及的操作。还有一些信息可用于识别索引将不再被使用或使用频率增加的趋势。


    通过分析阶段，列出了一些步骤，允许识别使用不同索引的执行计划。使用这些步骤来确定索引变更将在何处产生影响，然后在索引变更实施前后对 T-SQL 语句进行示例执行。


    最终，影响分析将在实施阶段发挥两个重要作用。首先，它将向管理者和同事传达索引变更的意图，告知他们变更内容以验证正在做的事情，并让他们有机会提供反馈。其次，影响分析为索引变更可能带来的意外负面影响提供了一份保险单。这并不是说糟糕的索引建议就不会有负面影响，但有了他人的参与和记录的影响，负面影响更有可能被更快地缓解，甚至在实施前就被发现。'
- fmt: '### Note


    In one environment that I worked in, some lightly used `Indexes` were removed
    from the database. They were generally used once per day. That one time was for
    a business-critical import process that basically couldn’t perform without those
    `Indexes`. Had an impact analysis been done prior to removing those `Indexes`,
    a lot of tough questions could have been avoided.


    ### Status Report


    On the opposite end of the Implement phase is the status report. As the name implies,
    the status report is a document that provides feedback to managers and peers about
    the actual impact of `index` changes. This document does not need to be very deep,
    but it does need to cover some key points. The status report should cover the
    following information:


    *   All `index` changes made

    *   Status on deployment of changes

    *   Brief performance review

    *   Information on any regressions noted

    *   What was learned in the deployment process

    *   Summary of issues encountered


    Don’t get too mired in the details while writing the status report. If all goes
    well, there will be additional Monitor and Analyze phases in the near future.
    In the end, the status report needs to communicate two things. First, it provides
    an honest assessment of the successes and failures in the `indexing` deployment.
    Second, and most importantly, it lists what benefits are now being realized by
    the `indexing` changes. This is most important because it is the ROI that managers
    need to see to be able to justify the time and effort spent on `indexing`.


    ### Note


    One of the most successful things I did as a consultant was constantly updating
    customers about the impact of `indexing` changes I’d make. A graph with before
    and after performance often looked like a “self-pat on the back” with some of
    the teams I was assisting, but the management that brought me in found it incredibly
    useful in identifying the ROI of bringing in consultants but also communicating
    further up the line the effort being placed in resolving business concerns with
    performance.


    ### Deployment Scripts


    The primary deliverable from the Analyze phase is a list of `index` changes that
    are planned for the databases in your environment. During the Implement phase,
    those `Indexes` need to be reviewed and prepared for deployment. As part of preparing
    the `Indexes` for deployment, three steps need to occur:


    1.  Prepare the deployment and rollback of the schema.

    2.  Save `index` changes to source code control.

    3.  Share results of peer review with impact analysis.


    #### Prepare Deployment and Rollback of Schema


    Usually, at the completion of the Analyze phase, you have a list of the `index`
    changes that are being proposed. This list typically is not in a state that can
    be used for deployment at the end of the phase. Between that point and the execution
    of the changes, the `indexing` changes need to be put into a state that can be
    used for their deployment.


    When building the deployment scripts, be sure to observe the idea of “doing no
    harm” to the database. In other words, you need to build scripts that are intelligent
    enough that they can be executed multiple times with the identical results. Also,
    this means that scripts should be available to reverse any `indexing` changes
    being made. Never assume that the previous `indexing` state of a table is being
    stored in source code control. Check to be certain that the existing state is
    known and develop scripts to revert to that state if needed.


    The deployment scripts also need to be aware of the edition of `SQL Server` that
    is being used. For instance, if you are using `Enterprise Edition`, leverage online
    `index` rebuilds for `Indexes` that are being rebuilt with new characteristics.
    If appropriate for the `index`, `Enterprise Edition` also allows for compression
    on the `index`, which can save space and improve performance in many cases.


    #### Save Index Changes to Source Code Repository


    As mentioned, the current state of the `Indexes` on tables should be in a source
    code repository. If they are not, then with this iteration through the Implement
    phase, it’s time to do so. Source code repositories offer a place to store the
    code, or schema, for a database to allow your organization to determine what the
    `index`, table, or store procedure schema was at a specific date and time. Source
    code is often well managed from an application perspective. Developers are usually
    quick to choose a tool and leverage it for their applications.


    Source code repositories allow you to recover to a point in time for the database
    schema. If there are any development teams within your organization, they likely
    already have a desired repository in place. This may be an internal repository
    like `Perforce` or an externally available solution like `GitHub`.


    #### Peer Review with Impact Analysis


    The last thing to do before the Execution step is to seek a peer review of the
    `indexing` changes. There is nothing worse than working in a vacuum and not understanding
    the whole impact of the changes that are being proposed against the applications
    that use the databases. It is easy to get a tunnel vision by focusing on the `indexing`
    goal and miss the business goals of the current deployment or overlook something
    that wasn’t apparent in the `index` analysis.


    The best way to avoid these pitfalls is to find a peer to review the `indexing`
    changes. Bring to the peer the `index` deployment scripts and the impact analysis
    and go over the changes. Your peer doesn’t necessarily need to know everything
    about the environment, just a basic understanding of `indexing`. The aim of the
    peer review is to explain each change. In this dialogue, your peer serves as a
    sounding board as you explain the `indexing` need. This serves a dual role. First,
    your peer will be able to provide feedback on the `indexing` change. Second, by
    discussing the changes, you may hear yourself describe an `indexing` change that
    doesn’t sound correct when it is explained.


    In some environments, you may not have a peer that you can turn to review the
    `Indexes`. In these cases, consider going to your manager for the peer review.
    If that is not possible, talk to your manager about leveraging peers in your technical
    network. Leverage the forums and social networks to find either a peer or group
    of peers that will be willing to review your changes with you. Using social networks,
    such as `Twitter`, to connect with a technical peer and review some `indexing`
    changes is much better than not having a peer review at all.


    With the peer review complete, the `Indexes` are ready for the next step in the
    Implement phase: the step where the `Indexes` are actually applied to the databases.


    ### Note


    Within the `SQL Server` community, `Twitter` is one of the more active social
    networking tools. Use hashtags `` `#sql` `` and `` `#sqlserver` `` to find general
    information on `SQL Server`. When looking for answers to questions specifically
    about `SQL Server`, you can utilize the hashtag `` `#sqlhelp` ``. `Twitter` also
    allows you to add people to your conversation by including their `Twitter` handle
    in the tweet. For instance, the author of this book is available through the twitter
    handle `` `@stratesql` ``.'
