    the DMF `sys.dm_db_index_physical_stats` is used with the `SAMPLED` option. This
    option is used to minimize the impact that executing the DMF will have on the
    database. Included in the results are the schema, table, and index names to identify
    the index that is being reported on, along with the `object_id` and `index_id`.
    Statistical columns on the index fragmentation from the DMF are included in the
    columns `page_count`, `avg_fragmentation_in_percent`, and `avg_page_space_used_in_percent`.
    The last column in the results is `has_LOB_column`. This column is the result
    of a correlated subquery that determines whether any of the columns in the index
    are LOB types, which disallow online index rebuilds.


    ```

    SELECT

    s.name as SchemaName

    ,t.name as TableName

    ,t.object_id

    ,we.name as IndexName

    ,we.index_id

    ,x.page_count

    ,x.avg_fragmentation_in_percent

    ,x.avg_page_space_used_in_percent

    ,we.type_desc

    FROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, ''SAMPLED'') x

    INNER JOIN sys.tables t ON x.object_id = t.object_id

    INNER JOIN sys.schemas s ON t.schema_id = s.schema_id

    INNER JOIN sys.indexes we ON x.object_id = we.object_id AND x.index_id = we.index_id

    WHERE x.index_id > 0

    AND x.avg_fragmentation_in_percent > 0

    AND alloc_unit_type_desc = ''IN_ROW_DATA''

    Listing 9-28

    Script to Collect Fragmentation Data

    ```


    The results of the query in Listing [9-28](#338675_3_En_9_Chapter.xhtml#PC28)
