    ### 系统列


    `sys.dm_db_index_usage_stats` 中的最后一组列是系统列。系统列返回与用户列大致相同的信息，只不过这些值是从后台进程的角度来看的。每当
    SQL Server 中触发某些操作时，例如触发了统计信息更新，该活动都将通过这些列进行跟踪。表 3-10 列出了系统列。


    **表 3-10**: `sys.dm_db_index_usage_stats` 中的系统列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | 系统查询的查找次数。 |

    | `system_scans` | `bigint` | 系统查询的扫描次数。 |

    | `system_lookups` | `bigint` | 系统查询的查找次数。 |

    | `system_updates` | `bigint` | 系统查询的更新次数。 |

    | `last_system_seek` | `datetime` | 上次系统查找的时间。 |

    | `last_system_scan` | `datetime` | 上次系统扫描的时间。 |

    | `last_system_lookup` | `datetime` | 上次系统查找的时间。 |

    | `last_system_update` | `datetime` | 上次系统更新的时间。 |


    在大多数情况下，可以忽略这些列。不过，了解它们的聚合方式是有益的。要查看一个示例，请执行代码清单 3-21 中的代码，这可能需要运行一分钟。这将更改 `SalesOrderDetail`
    表中的大部分行。由于更改的行数超过 20%，将触发自动统计信息更新。统计信息更新与用户活动没有直接关系，而是一个后台或系统进程。


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    ```


    *代码清单 3-21: 更新 `Sales.SalesOrderDetail`*


    更新完成后，运行代码清单 3-22 中的 T-SQL 语句。这段代码将从 `sys.stats` 返回结果，并从 `sys.dm_db_index_usage_stats`
    返回系统列，如图 3-16 所示。其中包含 `system_scans` 列，该列显示在 `Sales.SalesOrderDetail` 上发生了三次系统扫描。这些与统计信息更新有关，其中一次发生在
    `UnitPriceDiscount` 列上。查看统计信息创建的时间，可以看到它们依次是在 `CarrierTrackingNumber`、`SalesOrderDetailId`、`ModifiedDate`，最后是
    `UnitPriceDiscount` 上创建的。


    ![images/338675_3_En_3_Chapter/338675_3_En_3_Fig16_HTML.jpg](img/338675_3_En_3_Fig16_HTML.jpg)


    **图 3-16**: `sys.stats` 和 `sys.dm_db_index_usage_stats` 系统列查询结果


    ```sql

