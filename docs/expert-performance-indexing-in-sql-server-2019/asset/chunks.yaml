  trans: '

    ### 覆盖索引


    接下来要了解的索引模式是**覆盖索引**模式。在覆盖索引模式下，谓词之外的列会被添加到索引的键列中，以便将这些值作为查询的 `SELECT` 子句的一部分返回。这种模式在
    SQL Server 中已成为标准索引实践有一段时间了。然而，随着索引创建方式的改进，这种模式已不如过去那样有用了。我在这里讨论它是因为这是一个大多数人都知道的常见模式。


    要开始研究覆盖索引模式，我们首先需要一个示例来定义该索引所解决的问题。为了展示问题，下一个测试查询将在 `SELECT` 列表中包含 `IsActive`
    列（代码清单 11-19）。添加此列后，I/O 统计信息再次从两次读取增加到五次读取，如图 11-26 所示。性能的变化与执行计划的变化（参见图 11-27）直接相关，该计划包括一个键查找和一个嵌套循环。与之前的示例一样，当查询中添加了非聚集索引中未包含的项时，它们需要从聚集索引中检索，因为聚集索引包含表的所有数据。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig27_HTML.jpg](img/338675_3_En_11_Fig27_HTML.jpg)


    图 11-27

    覆盖索引模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig26_HTML.jpg](img/338675_3_En_11_Fig26_HTML.jpg)


    图 11-26

    覆盖索引模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    代码清单 11-19

    覆盖索引模式

    ```


    理想情况下，你希望有一个索引能够适应索引上的筛选器，同时也能够返回 `SELECT` 列表中请求的列。覆盖索引模式可以满足这些要求。即使 `IsActive`
    不是查询的谓词之一，也可以将其添加到索引中，SQL Server 可以使用该键列来随查询一起返回该列的值。为了演示覆盖索引模式，让我们创建一个以 `FirstName`、`LastName`
    和 `IsActive` 作为键列的索引（参见代码清单 11-20）。有了索引 `IX_Contacts_FirstNameLastName` 之后，每次执行的读取次数降回两次（参见图
    11-28）。执行计划现在也仅使用索引查找（参见图 11-29）。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig29_HTML.jpg](img/338675_3_En_11_Fig29_HTML.jpg)


    图 11-29

    覆盖索引模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig28_HTML.jpg](img/338675_3_En_11_Fig28_HTML.jpg)


    图 11-28

    覆盖索引模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts(FirstName,
    LastName,

    IsActive);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    代码清单 11-20

    覆盖索引模式

    ```


    覆盖索引模式非常有用，并且有潜力在许多领域提高性能。在过去的几年里，这种模式的使用已经减少。这种用法的变化主要是由 SQL Server 2005 引入的索引中包含列这一选项的可用性所驱动的。


    #### 注意


    有些人认为覆盖索引和带包含列的索引是同一回事。虽然非常相似，但两者的关键区别在于列的位置：是作为索引键的一部分，还是作为索引包含的数据。


    ### 包含列


    **包含列**模式是覆盖索引模式的近亲。包含列模式利用了 `CREATE` 和 `ALTER INDEX` 语法中的 `INCLUDE` 子句。该子句允许将非键列添加到非聚集索引中，类似于非键数据存储在聚集索引上的方式。这是包含列模式和覆盖索引模式之间的主要区别，在覆盖索引模式中，附加列是索引的键列。与聚集索引类似，作为
    `INCLUDE` 子句一部分的非键列不会被排序，尽管它们可以在某些查询中用作谓词。


    包含列模式的用例来自于它提供的灵活性。它的用法通常与覆盖索引模式相同，有时这两个名称可以互换使用。关键区别（将在本节中演示）在于，覆盖索引模式受限于索引中所有列的排序顺序。包含列模式可以通过包含非键数据来避免这个潜在问题，从而增加其使用的灵活性。


    在演示包含列模式的灵活性之前，让我们首先检查针对 `dbo.Contacts` 表的另一个索引。在代码清单 11-21 中，查询仅筛选 `FirstName`
    值为 Catherine，并返回 `ContactID`、`FirstName`、`LastName` 和 `EmailAddress` 列。此查询请求与其他示例不同，因为它现在包含了
    `EmailAddress` 列。由于此列未包含在任何其他非聚集索引中，因此没有索引能完全满足该查询。结果，执行计划使用 `IX_Contacts_FirstName`
    来识别 Catherine 的行，然后从聚集索引中查找其余数据，如图 11-30 所示。由于进行了键查找，查询的读取次数也增加到 68 次读取（参见图 11-31），这与之前的示例一样。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig31_HTML.jpg](img/338675_3_En_11_Fig31_HTML.jpg)


    图 11-31

    包含列模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig30_HTML.jpg](img/338675_3_En_11_Fig30_HTML.jpg)


    图 11-30

    包含列模式的 Statistics I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    代码清单 11-21

    包含列模式

    ```


    为了提高此查询的性能，可以基于多列模式或覆盖索引模式创建另一个索引。然而，这些选项的问题在于，最终生成的索引将与它们所能改进的查询具有相同的限制。相反，我们将创建一个基于包含列模式的新索引。这个新索引，如代码清单
    11-22 所示，以 `FirstName` 作为键列，并包含 `LastName`、`IsActive` 和 `EmailAddress` 作为非键列。尽管
    `IsActive` 列未在索引中使用，但将其包含在内是为了允许索引具有额外的灵活性，本节后面的一个示例将利用这一点。索引就位后，代码清单 11-22 中查询的性能显著提高。在此示例中，每次执行的读取次数从之前的
    68 次下降到 3 次（参见图 11-32）。在执行计划中，不再需要键查找和嵌套循环；取而代之的只是索引查找，现在使用的是索引 `IX_Contacts_FirstNameINC`（参见图
    11-33）。

    '
- fmt: '# Included Columns Pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig33_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig33_HTML.jpg)


    ### Figure 11-33

    Execution plan for Included Columns pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig32_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig32_HTML.jpg)


    ### Figure 11-32

    Statistics I/O results for Included Columns pattern


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameINC ON dbo.Contacts(FirstName)

    INCLUDE (LastName, IsActive, EmailAddress);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 11-22

    Included Columns Pattern

    ```


    While the number of reads is slightly higher with an index created with the `Included
    Columns` pattern, there is flexibility with the index that offsets that difference.
    With each of the examples in this chapter, a new index has been added to the table
    `dbo.Contacts`. At this point, there are six indexes on the table, each serving
    a different purpose and four leading with the same column, `FirstName`. Each of
    these indexes takes up space and requires maintenance when the data in `dbo.Contacts`
    is modified. In active tables, this amount of indexing could have a negative impact
    on all activity on the table.


    The `Included Columns` pattern can assist with this issue. In cases where there
    are multiple indexes with the same leading key column, it is possible to consolidate
    those indexes into a single index using the `Included Columns` pattern with some
    of the key columns added to the index instead as nonkey columns. To demonstrate,
    first remove all the indexes that start with `FirstName`, except for the one created
    using the `Included Columns` pattern (script provided in [Listing 11-23](#338675_3_En_11_Chapter.xhtml#PC23)).


    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastName ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstName ON dbo.Contacts

    GO

    Listing 11-23

    Dropping Indexes in Included Columns Pattern

    ```


    The `dbo.Contact` table now has only three indexes on it. There is the clustered
    index on the `ContactID` column, a nonclustered index on `LastName`, and an index
    on `FirstName` with the columns `LastName`, `IsActive`, and `EmailAddress` included
    as data on the index. With these indexes in place, the queries from the previous
    patterns, shown in [Listing 11-24](#338675_3_En_11_Chapter.xhtml#PC24), need to
    be tested against the table.


    There are two points to pay attention to regarding how the queries perform with
    the `Included Columns` pattern vs. with the other patterns. First, all the execution
    plans for the queries, shown in [Figure 11-34](#338675_3_En_11_Chapter.xhtml#Fig34),
    are utilizing index seek operations. The seek operation is expected for the query
    that is just filtering on `FirstName`, but it can also be used when there is an
    additional filter on `LastName`. SQL Server can do this because underneath the
    index seek, it is performing a range scan of the rows that match the first predicate
    and then removing the `LastName` results that don’t have the value of `Cox`. The
    second item to notice is the number of reads for each of the queries, shown in
    [Figure 11-35](#338675_3_En_11_Chapter.xhtml#Fig35). The reads increased from
    two to three. While this constitutes a 50 percent increase in reads, the performance
    change is not significant enough to justify creating four indexes when one index
    can adequately provide the needed performance.


