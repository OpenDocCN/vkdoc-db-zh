    `INSERT` 操作影响碎片化的另一种方式是通过非聚集索引。虽然聚集索引的值可能是始终递增的，但非聚集索引中的列值不一定具有同样的特性。一个很好的例子是在非聚集索引中为产品名称创建索引。插入表中的下一条记录可能以字母
    `M` 开头，因此需要放置到非聚集索引的中间位置。如果该位置没有空间，就会发生页面拆分，从而导致碎片化。


    为了演示这种行为，请向你在之前演示中使用的 `dbo.UsingUniqueidentifier` 表添加一个非聚集索引。清单 9-4 显示了新索引的架构。在插入更多记录以查看向非聚集索引插入的影响之前，请再次运行清单
    9-2。你的结果应与图 9-3 中的类似。


