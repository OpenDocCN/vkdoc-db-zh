  trans: "### 注意\n\n自 SQL Server 2012 起，包含 `varchar(max)`、`nvarchar(max)`、`varbinary(max)`\
    \ 和 `XML` 数据类型的聚集索引可以在线重建。当聚集索引包含以下数据类型时，仍然无法在线重建：`image`、`ntext` 或 `text`。此外，在线重建仅限于\
    \ SQL Server 企业版、开发版和评估版。另外，在线重建需要索引双倍的空间，因为新旧版本的索引都需要存在以完成重建，这对于较大的表可能是个问题。\n\
    \n重建索引的第一种选择是使用 `CREATE INDEX` 语句，如代码清单 9-24 所示。这是通过使用 `DROP_EXISTING` 索引选项实现的。选择\
    \ `CREATE INDEX` 选项而非 `ALTER INDEX` 有以下几个原因：\n\n*   需要更改索引定义，例如需要添加或删除列，或者需要更改列的顺序。\n\
    *   需要将索引从一个文件组移动到另一个文件组。\n*   需要修改索引分区。\n\n```sql\nCREATE [ UNIQUE ] [ CLUSTERED\
    \ | NONCLUSTERED ] INDEX index_name\nON  ( column [ ASC | DESC ] [ ,...n ] )\n\
    [ INCLUDE ( column_name [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n ] ) ]\n[\
    \ ON { partition_scheme_name ( column_name )\n| filegroup_name\n| default\n}\n\
    ]\n[ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | \"NULL\"\
    \ } ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON | OFF }\n| ONLINE = { ON | OFF }\n| RESUMABLE\
    \ = {ON | OF }\n| MAX_DURATION =  [MINUTES]\n```\n代码清单 9-24：使用 `CREATE INDEX`\
    \ 重建索引\n\n另一种选择是使用 `ALTER INDEX` 语句，如代码清单 9-25 所示。此选项在语法中使用了 `REBUILD` 选项。从概念上讲，这与\
    \ `CREATE INDEX` 语句完成的工作相同，但具有以下优点：\n\n*   可以在单条语句中重建表上的多个索引。\n*   可以重建索引的单个分区。\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n\
    [ WITH (  [ ,...n ] ) ]\n| [ PARTITION = partition_number\n[ WITH ( \n[ ,...n\
    \ ] )\n]\n]\n]\n```\n代码清单 9-25：使用 `ALTER INDEX` 重建索引\n\n索引重建的主要缺点是重建操作期间索引所需的空间量。至少，数据库中应有当前索引大小\
    \ 120% 的空间可用于重建后的索引。原因是在重建完成之前不会删除当前索引。在短时间内，索引将在数据库中存在两份副本。\n\n有两种方法可以缓解重建期间索引所需的部分空间。首先，可以使用\
    \ `SORT_IN_TEMPDB` 索引选项来减少中间结果所需的空间量。你仍然需要在数据库中为索引的两个副本留出空间，但 20% 的缓冲区将不再是必需的。第二种缓解空间的方法是在重建前禁用索引。禁用索引会从索引中删除索引和数据页，同时保留索引元数据。这将允许在索引先前占用的空间中重建索引。请注意，禁用选项仅适用于非聚集索引。\n\
    \nSQL Server 2019 的一个新功能是能够恢复索引构建。当你在线构建索引时，可以将 `RESUMABLE` 选项设置为 `ON`，并将 `MAX_DURATION`\
    \ 设置为你希望索引运行直到停止的分钟数。当索引重建停止时，旧索引仍然可用，并且重建已完成的部分将被存储，直到重建重新启动。此外，如果索引重建在 `RESUMABLE`\
    \ 选项设置为 `ON` 的情况下失败，这将允许重新启动索引重建。如果事务日志空间用完或有人终止了索引重建操作，这可能非常有用。\n\n#### 索引重组\n\
    \n索引重建的另一种替代方法是重组索引。这种类型的碎片整理正如其名。索引中的数据页在已分配给索引的页面中重新排序。重组完成后，索引中页面的物理顺序与页面的逻辑顺序相匹配。当索引碎片化不严重时，应对其进行重组。通常，碎片化程度低于\
    \ 30% 的索引是重组的候选对象。\n\n要重组索引，需使用 `ALTER INDEX` 语法（见代码清单 9-26）和 `REORGANIZE` 选项。除了该选项外，重组允许对单个分区进行重组。`REBUILD`\
    \ 选项不允许这样做。\n\n```sql\nALTER INDEX { index_name | ALL }\nON \n| REORGANIZE\n[\
    \ PARTITION =partition_number ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n\
    ```\n代码清单 9-26：使用 `ALTER INDEX` 进行索引重组\n\n使用 `REORGANIZE` 选项有几个好处。首先，在重组期间，索引保持在线状态或可供优化器在新执行计划或缓存的执行计划中使用。其次，该过程设计为资源使用最少，这大大降低了事务期间发生锁定和阻塞问题的可能性。\n\
    \n索引重组的缺点是重组仅使用已分配给索引的数据页。存在碎片时，分配给一个索引的区通常可能与分配给其他索引的区交织在一起。重新排序数据页不会使数据页比当前更连续，但会确保分配的页面按照与数据本身相同的顺序排序。\n\
    \n#### 删除和创建\n\n第三种索引碎片整理方法是直接删除索引并重新创建它。我们包含此选项是为了完整性，但请注意它并不被广泛实践或建议。有几个原因说明为什么删除和创建可能是个坏主意。\n\
    \n首先，如果索引是聚集索引，那么在删除聚集索引时，所有其他索引都需要重建。聚集索引和堆使用不同的结构来标识行和存储数据。表上的非聚集索引需要记录位置信息，并且需要重新创建以获取此信息。\n\
    \n其次，如果索引是主键或唯一索引，则很可能有其他依赖项依赖于该索引。例如，该索引可能在外键中被引用。此外，该索引可能与业务规则（如唯一性）相关联，即使在维护窗口也无法从表中移除。\n\
    \n避免此方法的第三个原因是它需要了解索引上的所有属性。使用其他策略时，索引会保留所有现有索引属性。通过必须重新创建索引，存在某些属性可能未在索引的 DDL\
    \ 中保留的风险，从而可能丢失索引的重要方面。\n\n最后，从表中删除索引后，它就无法使用了。这应该是显而易见的问题，但在考虑此选项时经常被忽视。索引的目的通常是它带来的性能改进；将其从表中移除也带走了这些改进。\n\
    \n### 碎片整理策略\n\n到目前为止，我们已经讨论了碎片如何产生、为何成为问题以及如何从索引中移除它。将这些知识应用到数据库中的索引非常重要。在本节中，你将学习两种可以自动化索引碎片整理的方法。"
- fmt: "### Maintenance Plans\n\nThe first automation option available is defragmentation\
    \ through maintenance plans, which offer the opportunity to quickly create and\
    \ schedule maintenance for your indexes that will either reorganize or rebuild\
    \ your indexes. For each of the types of index defragmentation, there is a task\
    \ available in the maintenance plans.\n\nThere are a couple of ways in which maintenance\
    \ plans can be created. For the purposes of brevity, we will assume you are familiar\
    \ with maintenance plans in SQL Server and thus will focus on the specific tasks\
    \ related to defragmenting indexes.\n\n#### Reorganize Index Task\n\nThe first\
    \ task available is the Reorganize Index Task. This task provides a wrapper for\
    \ the `ALTER INDEX REORGANIZE` syntax from the previous section. Once configured,\
    \ this task will reorganize all the indexes that match the criteria for the task.\n\
    \nThere are a few properties that need to be configured when using the Reorganize\
    \ Index Task (see Figure [9-22](#338675_3_En_9_Chapter.xhtml#Fig22)):\n\n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig22_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig22_HTML.jpg)\n\
    \nFigure 9-22: Properties window for Reorganize Index Task\n\n*   `Connection`:\
    \ The SQL Server instance the task will connect to when it executes.\n*   `Database(s)`:\
    \ The databases the task will connect to for reorganizing. The options for this\
    \ property are:\n    *   All databases.\n    *   All system databases.\n    *\
    \   All user databases.\n    *   These specific databases (a list of available\
    \ databases is included and one must be selected).\n    *   Ignore databases where\
    \ the state is not online.\n*   `Object`: Determines whether the reorganization\
    \ will be against tables, views, or tables and views.\n*   `Selection`: Specifies\
    \ the tables or indexes affected by this task. This is not available when Tables\
    \ and Views is selected in the Object box.\n*   `Compact large objects`: Determines\
    \ whether the reorganization uses the option `ALTER INDEX LOB_COMPACTION = ON`.\n\
    *   `Scan type`: Indicates how you want SQL Server to gather the statistics for\
    \ the remaining options. The available options are `Fast`, `Sampled`, or `Detailed`.\n\
    *   `Optimize index only if`: Provides ability to limit reorganization by percent\
    \ fragmentation, page count, and whether the index was used in the last 7 days.\n\
    \nThe index stats options were new for SQL Server 2016 and are a great addition\
    \ to this feature. In environments that don’t have DBAs actively managing the\
    \ indexes within a server, this is a great option for ensuring indexes are being\
    \ maintained.\n\n#### Rebuild Index Task\n\nThe other task available is the Rebuild\
    \ Index Task. This task provides a wrapper for the `ALTER INDEX REBUILD` syntax.\
    \ Once configured, this task rebuilds all the indexes that match the criteria\
    \ for the task.\n\nSimilar to the Reorganize Index Task, the Rebuild Index Task\
    \ has a number of properties that need to be configured before using it (see Figure\
    \ [9-23](#338675_3_En_9_Chapter.xhtml#Fig23)):\n\n![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig23_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig23_HTML.jpg)\n\
    \nFigure 9-23: Properties window for Rebuild Index Task\n\n*   `Connection`: The\
    \ SQL Server instance the task will connect to when it executes.\n*   `Database(s)`:\
    \ The databases the task will connect to for rebuilding. The options for this\
    \ property are:\n    *   All databases.\n    *   All system databases.\n    *\
    \   All user databases.\n    *   These specific databases (a list of available\
    \ databases is included and one must be selected).\n    *   Ignore databases where\
    \ the state is not online.\n*   `Object`: Determines whether the rebuild will\
    \ be against tables, views, or tables and views.\n*   `Selection`: Specifies the\
    \ tables or indexes affected by this task. This is not available when Tables and\
    \ Views is selected in the Object box.\n*   `Default free space per page`: Specifies\
    \ whether the rebuild should use the current fill factor on the index.\n*   `Change\
    \ free space per page to`: Allows the rebuild to specify a new fill factor when\
    \ the index is rebuilt.\n*   `Sort results in tempdb`: Determines whether the\
    \ rebuild uses the option `ALTER INDEX SORT_IN_TEMPDB = ON`.\n*   `MAXDOP`: Determines\
    \ the max degree of parallelism for the rebuild, which determines the max number\
    \ of CPU threads SQL Server can use to rebuild the index.\n*   `Keep index online\
    \ while re-indexing`: Determines whether the rebuild uses the option `ALTER INDEX\
    \ ONLINE = ON`. For indexes that cannot be rebuilt online, there is an option\
    \ to determine whether to skip or rebuild the index offline. Along with that,\
    \ you can set `Low Priority Used` to determine if blocking will cancel an index\
    \ rebuild and whether it cancels itself or blockers and after how much time.\n\
    *   `Scan type`: Indicates how you want SQL Server to gather the statistics for\
    \ the remaining options. The available options are `Fast`, `Sampled`, or `Detailed`.\n\
    *   `Optimize index only if`: Provides ability to limit rebuild by percent fragmentation,\
    \ page count, and whether the index was used in the last 7 days.\n\nAnd like the\
    \ reorganization task, the index stats options were added in with SQL Server 2016.\
    \ And in similar fashion, these changes make the rebuild task a viable option\
    \ for environments that don’t have dedicated database administration resources\
    \ or when you are looking to keep the index maintenance simple and without custom\
    \ code to manage the process.\n\n#### Maintenance Plan Summary\n\nMaintenance\
    \ plans offer a way to get started with removing fragmentation from your indexes\
    \ right away. The tasks can be configured and scheduled in a matter of minutes.\
    \ Since the addition of the SQL Server 2016 enhancements, there are a great choice\
    \ for managing index maintenance. The only real reason to use other options, such\
    \ as T-SQL scripts, is when you need additional functionality like custom logging\
    \ or custom resume logic.\n\n### T-SQL Scripts\n\nAn alternative approach to defragmenting\
    \ databases is to use a T-SQL script to defragment the indexes intelligently.\
    \ In this section, we’ll walk through the steps necessary to defragment all the\
    \ indexes in a single database. The main advantage of this choice is the ability\
    \ to keep everything in a single process, and there’s no chance that both tasks\
    \ could affect an index. The script will pick the indexes that will best benefit\
    \ from defragmentation, determine whether to rebuild or reorganize, and ignore\
    \ those that would receive little or no benefit.\n\nTo accomplish the filtering,\
    \ you’ll apply some defragmentation best practices that help determine whether\
    \ to defragment the index and what method should be applied. The guidelines that\
    \ you will use are the following:\n\n*   Reorganize indexes with less than 30\
    \ percent fragmentation.\n*   Rebuild indexes with 30 percent or more fragmentation.\n\
    *   Ignore indexes that have less than 1,000 pages.\n*   If you have Enterprise\
    \ Edition, use online rebuilds when the data needs to be accessible during maintenance.\n\
    *   If the clustered index is being rebuilt, rebuild all indexes in the table."
