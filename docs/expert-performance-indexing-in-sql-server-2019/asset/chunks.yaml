    **清单 9-3** 向 Uniqueidentifier 表执行 INSERT


    正如这个代码示例所示，基于并非始终递增的值建立的聚集索引会导致碎片化。这类行为最典型的例子就是使用 `uniqueidentifier`。当聚集键是计算值或基于业务键时，也可能发生这种情况。在业务键的情况下，如果为订单分配了一个随机的采购订单号，那么该值的行为方式很可能与
    `uniqueidentifier` 数据类型值类似。


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig2_HTML.jpg](img/338675_3_En_9_Fig2_HTML.jpg)


