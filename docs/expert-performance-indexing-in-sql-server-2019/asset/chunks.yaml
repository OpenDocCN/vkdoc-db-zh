- fmt: '##### Page Header–Only Print Option


    The first print option available for `DBCC PAGE` is the page header only where
    `print_option` equals 0\. With this option, only the page header is returned in
    the output from the `DBCC` command. The page header is returned with all `DBCC
    PAGE` requests; using this option just limits the results to only the page header.
    Two sections are returned as part of the page header.


    The first section returned is the buffer information. The buffer provides information
    on where the page is currently located in memory in SQL Server. To read a page,
    the page must first be retrieved from disk and placed in memory. This section
    provides the address that could be used to find the memory location of the page.


    The second section is the actual page header. The page header contains a number
    of attributes that describe the page and the contents of the page. Not all the
    attributes are currently in use by SQL Server, but there are a number of attributes
    that are worth understanding. These key attributes are listed and defined in Table
    [2-11](#338675_3_En_2_Chapter.xhtml#Tab11).


    Table 2-11


    Page Header Key Attribute Definitions


    | Attribute | Definition |

    | --- | --- |

    | `m_pageId` | File ID and page number for the page. |

    | `m_type` | The type of page returned; see the page type list in Table [2-5](#338675_3_En_2_Chapter.xhtml#Tab5).
    |

    | `Metadata: AllocUnitId` | Allocation unit ID that maps from the catalog view
    `sys.allocation_units`. |

    | `Metadata: PartitionId` | Partition ID for the table or index. This maps to
    `partition_ID` in the catalog view `sys.partitions`. |

    | `Metadata: ObjectId` | Object ID for the table. This maps to the `object_ID`
    in the catalog view `sys.tables`. |

    | `Metadata: IndexId` | Index ID for the table or index. This maps to the `index_ID`
    in the catalog view `sys.indexes`. |

    | `m_prevPage` | Previous page in the index structure. This is used in B-tree
    indexes to allow reading sequential pages along index levels. |

    | `m_nextPage` | Next page in the index structure. This is used in B-tree indexes
    to allow reading sequential pages along index levels. |

    | `m_slotCnt` | Number of slots, or rows, on the page. |

    | `Allocation Status` | Lists the locations of the GAM, SGAM, PFS, DIFF (or DCM),
    and ML (or BCM) pages for the page requested. It also includes the status for
    each from those metadata pages. |


    To demonstrate the use of `DBCC PAGE` for the page header–only option, the code
    in Listing [2-16](#338675_3_En_2_Chapter.xhtml#PC16) can be used. Your results
    should be similar to those in Figure [2-22](#338675_3_En_2_Chapter.xhtml#Fig22).
    In these results, you can see the page number at the top of the page indicating
    that it is page 1:377\. The `m_type` is 2, which translates to being an index
    page. The `m_slotCnt` shows that there are two rows on the page. Referring to
    Figure [2-22](#338675_3_En_2_Chapter.xhtml#Fig22), the row count would correlate
    to the two index records needed to map data pages 1:376 and 1:378 to the index.
    Finally, the allocation statuses show that the page is allocated on the GAM page,
    it is 0 percent full (per PFS page), and the page has been changed since the last
    full backup (per the DCM page).


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig22_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig22_HTML.jpg)


    Figure 2-22


    DBCC PAGE output for page header–only print option


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,0)

    Listing 2-16

    DBCC PAGE with Page Header–Only Print Option

    ```


    As the page header–only option shows, there is a lot of useful information in
    the page header. In fact, you are provided with enough information to envision
    how this page relates to the other pages in the index and the extent it occupies.
    This information is similar to `sys.dm_db_page_info`, but from this point forward,
    `DBCC PAGE` provides more information than the DMF.


    ##### Hex Rows Print Option


    The next print option available for `DBCC PAGE` is the hex rows print option,
    where `print_option` equals 1\. This print option expands on the previous option
    adding into the output an entry for every slot on the page and the offset array
    that describes the location of each slot on the page.


    The data section of the page repeats for every row that is on the page and contains
    all the metadata and the data associated with that row. For the metadata, the
    row includes the slot number, page offset, record type, and record attributes.
    This information helps define the row and what contributes besides the size of
    the data to the row size. At the end of the slot is a memory dump of the row.
    The memory dump displays the row in a hex format that, while not easily read by
    humans, contains all the data for the row. For more on the attributes and their
    definitions, see Table [2-12](#338675_3_En_2_Chapter.xhtml#Tab12).


    The offset array is the last section of information included in the hex rows option
    results. The offset array contains two pieces of information for each row on the
    table. The first piece of information is the slot number with its hex representation.
    The second piece is the byte location for the slot on the page. With these two
    pieces of information, any row on the page can be located and returned.


    Table 2-12


    Hex Rows Key Attribute Definitions


    | Attribute | Definition |

    | --- | --- |

    | Slot | The position of the row on the page. The count is 0 based and starts
    immediately after the page header. |

    | Offset | Physical byte location of the row on the page. |

    | Length | The length of the row on the page. |

    | Record Type | The type of row. Some possible values are `INDEX_RECORD` and `PRIMARY_RECORD`.
    |

    | Record Attributes | List of attributes on the row that contribute to the size
    of the row. These can include the `NULL_BITMAP` and `VARIABLE_COLUMNS` array.
    |

    | Record Size | The length of the row on the page. |

    | Memory Dump | The memory location for the data on the page. For the hex rows
    option, it is limited to the information in that slot. The memory address is provided,
    and afterward a hex dump of the data is stored in the slot. |


    For the hex rows example, you’ll continue to investigate the index page (1:279)
    that you looked at in the previous section. This time, you’ll use the hex rows
    print option, which is when a `print_option` of 1 is used in `DBCC PAGE`, as shown
    in Listing [2-17](#338675_3_En_2_Chapter.xhtml#PC17).


    The results for the `DBCC PAGE` command will be longer than the previous execution
    since this time it includes the row data with the page header. To focus on the
    new information, the buffer and page header results have been excluded in the
    sample output in Figure [2-23](#338675_3_En_2_Chapter.xhtml#Fig23). In the data
    section, there are two slots shown, slot 0 and slot 1\. These slots map to the
    two index rows on the page, which can be verified through the record type of `INDEX_RECORD`
    for each of the rows. The hex data for the rows contains the page and range information
    for the index record, but that isn’t translated with this print option. The last
    section has the offset table containing the slot information for both of the rows
    on the table. Note that the offset ends with 0 and counts up from the bottom.
    This matches to how the offset array was described earlier in the chapter. The
    rows start after the header incrementing up, while the offset array starts at
    the end of the page incrementing backward. In this manner, new rows can be added
    to the table without reorganizing the page.


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig23_HTML.jpg](images/338675_3_En_2_Chapter/338675_3_En_2_Fig23_HTML.jpg)


    Figure 2-23


    DBCC PAGE output for hex rows print option


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,1)

    Listing 2-17

    DBCC PAGE with Hex Rows Print Option

    ```'
  raw: '##### Page Header–Only Print Option


    The first print option available for `DBCC PAGE` is the page header only where
    `print_option` equals 0\. With this option, only the page header is returned in
    the output from the `DBCC` command. The page header is returned with all `DBCC
    PAGE` requests; using this option just limits the results to only the page header.
    Two sections are returned as part of the page header.


    The first section returned is the buffer information. The buffer provides information
    on where the page is currently located in memory in SQL Server. To read a page,
    the page must first be retrieved from disk and placed in memory. This section
    provides the address that could be used to find the memory location of the page.


    The second section is the actual page header. The page header contains a number
    of attributes that describe the page and the contents of the page. Not all the
    attributes are currently in use by SQL Server, but there are a number of attributes
    that are worth understanding. These key attributes are listed and defined in Table
    [2-11](#338675_3_En_2_Chapter.xhtml#Tab11).


    Table 2-11


    Page Header Key Attribute Definitions


    | Attribute | Definition |

    | --- | --- |

    | `m_pageId` | File ID and page number for the page. |

    | `m_type` | The type of page returned; see the page type list in Table [2-5](#338675_3_En_2_Chapter.xhtml#Tab5).
    |

    | `Metadata: AllocUnitId` | Allocation unit ID that maps from the catalog view
    `sys.allocation_units`. |

    | `Metadata: PartitionId` | Partition ID for the table or index. This maps to
    `partition_ID` in the catalog view `sys.partitions`. |

    | `Metadata: ObjectId` | Object ID for the table. This maps to the `object_ID`
    in the catalog view `sys.tables`. |

    | `Metadata: IndexId` | Index ID for the table or index. This maps to the `index_ID`
    in the catalog view `sys.indexes`. |

    | `m_prevPage` | Previous page in the index structure. This is used in B-tree
    indexes to allow reading sequential pages along index levels. |

    | `m_nextPage` | Next page in the index structure. This is used in B-tree indexes
    to allow reading sequential pages along index levels. |

    | `m_slotCnt` | Number of slots, or rows, on the page. |

    | `Allocation Status` | Lists the locations of the GAM, SGAM, PFS, DIFF (or DCM),
    and ML (or BCM) pages for the page requested. It also includes the status for
    each from those metadata pages. |


