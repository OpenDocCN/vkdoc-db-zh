    ### Note


    The DMF `sys.dm_db_index_operational stats` can accept the use of the Transact
    SQL functions `DB_ID()` and `OBJECT_ID()`. These functions can be used for the
    parameters `database_id` and `object_id`, respectively.


    ### Header Columns


    To start looking at the statistics, you need to identify the header columns that
    will be used with all the resulting queries. For every row that is returned through
    the DMF, there will be a `database_id`, `object_id`, `index_id`, and `partition_number`.
    These columns are defined further in Table [3-12](#338675_3_En_3_Chapter.xhtml#Tab12).
    As is implied through the `partition_number`, the granularity of the results for
    this DMF is at the partition level. For nonpartitioned indexes, the partition
    number will be 1.


    Table 3-12


    Header Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database on which the table or view is
    defined. |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `hobt_id` | `bigint` | ID used to identify the heap or B-tree (hobt) associated
    with an index partition.  New since SQL Server 2016. |


    The header columns provide the basis for understanding to which indexes the statistics
    apply. This will help provide perspective regarding the statistics returned. Also,
    they can be used to join to catalog views, such as `sys.indexes`, to provide the
    names of the indexes.


    The useful information in this DMF comes in the rest of the columns returned by
    the function. The information that can be returned provides insight into DML activity,
    the page allocation cycle, data access patterns, index contention, and disk activity.
    In the following sections, you’ll look into the columns of the DMF that provide
    statistics for this information.


    ### DML Activity


    The place to begin when investigating the operation stats on an index is with
    the DML activity on the index. Table [3-13](#338675_3_En_3_Chapter.xhtml#Tab13)
    lists the columns that represent this activity. These columns provide a count
    of the number of rows that are affected by DML operations. The statistics that
    follow are similar to those in `sys.dm_db_index_usage` but with a few differences
    in perspective that will be discussed next.


    Table 3-13


    DML Activity Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_insert_count` | `bigint` | Cumulative count of leaf-level rows inserted.
    |

    | `leaf_delete_count` | `bigint` | Cumulative count of leaf-level rows deleted.
    |

    | `leaf_update_count` | `bigint` | Cumulative count of leaf-level rows updated.
    |

    | `leaf_ghost_count` | `bigint` | Cumulative count of leaf-level rows that are
    marked to be deleted but not yet removed. |

    | `nonleaf_insert_count` | `bigint` | Cumulative count of inserts above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_delete_count` | `bigint` | Cumulative count of deletes above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_update_count` | `bigint` | Cumulative count of updates above the leaf
    level. For heaps, this value will always be `0`. |


    Within `sys.dm_db_index_operational_stats`, there are two areas where DML activity
    can be tracked. These are at the leaf and nonleaf levels. These areas of DML activity
    were discussed in Chapter [2](#338675_3_En_2_Chapter.xhtml); for more information
    on leaf and nonleaf pages, refer to that chapter.


    The difference between these two types of data changes is important to help identify
    whether there are changes as a result of DML operations. This means that leaf-level
    DML activity is a direct result of `INSERT`, `UPDATE`, and `DELETE` statements.
    The nonleaf-level DML activity happens when leaf-level activity results in a change
    in how the index is structured and isn’t something that can be directly impacted
    with an `INSERT`, `UPDATE`, or `DELETE` statement.


    Both leaf-level and nonleaf-level DML activities are broken apart into statistics
    based on the type of DML operation that has occurred. As previously indicated,
    DML activity monitors `INSERT`, `UPDATE`, and `DELETE` activities. For each of
    these operations, there is a column in `sys.dm_db_index_operational_stats`. Additionally,
    there is a column that counts records that have been ghosted off the leaf-level
    DML activity.


    During `DELETE` operations, rows affected by the statement are deleted in a two-phase
    operation. Initially, the records are marked for deletion. When this occurs, the
    records are referred to as being *ghosted*; the rows in this state are counted
    in `leaf_ghost_count`. At regular intervals, a cleanup thread within SQL Server
    will go through and perform an actual delete operation on rows marked as ghosted.
    At that point, the records will be counted in the `leaf_delete_count`. This process
    helps in the performance of delete operations since the actual delete of a row
    happens after the transaction is committed. Also, in the event of transaction
    rollback, the ghost flag on a row is all that needs to change rather than an attempt
    to re-create the row in the table. This activity occurs only at the leaf level;
    nonleaf pages are deleted whenever all the rows associated with the pages have
    been deleted or otherwise removed.'
  trans: '## 索引操作统计


    需要考虑的第三类统计信息是索引操作统计。这些统计信息通过 DMO `sys.dm_db_index_operational_stats` 呈现给用户。从高层次来看，此
    DMO 提供了关于索引上发生的 I/O、锁、闩锁和访问方法的低层级信息。通过这些低层级信息，您可以识别可能遇到性能问题的索引，并开始理解导致这些性能问题的原因。在本节末尾，您将理解此
    DMO 提供的统计信息，并了解如何通过这些统计信息来调查索引。


    与上一节中的 DMO 不同，`sys.dm_db_index_operational_stats` 是一个动态管理函数（DMF）。因此，此 DMF 在使用时需要提供多个参数。表
    3-11 详细说明了此 DMF 的参数。


    表 3-11


    sys.dm_db_index_operational_stats 的参数


    | 参数名称 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 索引所在数据库的 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有数据库的索引信息。此参数中可以使用
    `DB_ID` 函数。 |

    | `object_id` | `int` | 应为其返回统计信息的表或视图的对象 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回数据库中所有表或视图的索引信息。
    |

    | `index_id` | `int` | 应为其返回统计信息的索引的索引 ID。提供值 `-1`、`NULL` 或 `DEFAULT` 将返回表或视图上所有索引的统计信息。
    |

    | `partition_number` | `int` | 应为其返回统计信息的索引上的分区号。提供值 `0`、`NULL` 或 `DEFAULT` 将返回索引上所有分区的统计信息。
    |


    通过这些参数，可以按需广泛或精细地聚焦于索引统计信息。这种灵活性非常有用，因为 `sys.dm_db_index_operational_stats` 不允许使用
    `CROSS APPLY` 或 `OUTER APPLY` 运算符。将参数传递给 DMF 时，其语法如清单 3-23 所定义。


    ```

    sys.dm_db_index_operational_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | 0 | NULL | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    )

    ```


    清单 3-23

    索引操作统计语法


    ### 注意


    DMF `sys.dm_db_index_operational_stats` 可以接受 Transact SQL 函数 `DB_ID()` 和 `OBJECT_ID()`
    的使用。这些函数可分别用于参数 `database_id` 和 `object_id`。


    ### 头列


    要开始查看统计信息，您需要识别将用于所有结果查询的头列。对于通过 DMF 返回的每一行，都会有一个 `database_id`、`object_id`、`index_id`
    和 `partition_number`。这些列在表 3-12 中有进一步定义。正如 `partition_number` 所暗示的，此 DMF 的结果粒度在分区级别。对于非分区索引，分区号将为
    1。


    表 3-12


    sys.dm_db_index_operational_stats 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 定义表或视图的数据库的 ID。 |

    | `object_id` | `int` | 定义索引的表或视图的 ID。 |

    | `index_id` | `int` | 索引的 ID。 |

    | `partition_number` | `int` | 索引或堆内的分区号（基于 1）。 |

    | `hobt_id` | `bigint` | 用于标识与索引分区关联的堆或 B 树（hobt）的 ID。 自 SQL Server 2016 新增。 |


    头列提供了理解统计信息所适用索引的基础。这将有助于理解返回统计信息的上下文。此外，它们可用于连接到目录视图，例如 `sys.indexes`，以提供索引的名称。


    此 DMF 中的有用信息来自函数返回的其余列。可返回的信息提供了对 DML 活动、页面分配周期、数据访问模式、索引争用和磁盘活动的深入洞察。在以下部分中，您将研究提供此信息统计的
    DMF 列。


    ### DML 活动


    调查索引操作统计的起点是索引上的 DML 活动。表 3-13 列出了代表此活动的列。这些列提供了受 DML 操作影响的行数的计数。接下来的统计信息类似于 `sys.dm_db_index_usage`
    中的统计信息，但在视角上有一些差异，接下来将进行讨论。


    表 3-13


    sys.dm_db_index_operational_stats 中的 DML 活动列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `leaf_insert_count` | `bigint` | 插入的叶级行的累计计数。 |

    | `leaf_delete_count` | `bigint` | 删除的叶级行的累计计数。 |

    | `leaf_update_count` | `bigint` | 更新的叶级行的累计计数。 |

    | `leaf_ghost_count` | `bigint` | 标记为删除但尚未移除的叶级行的累计计数。 |

    | `nonleaf_insert_count` | `bigint` | 叶级以上级别的插入操作累计计数。对于堆，此值始终为 `0`。 |

    | `nonleaf_delete_count` | `bigint` | 叶级以上级别的删除操作累计计数。对于堆，此值始终为 `0`。 |

    | `nonleaf_update_count` | `bigint` | 叶级以上级别的更新操作累计计数。对于堆，此值始终为 `0`。 |


    在 `sys.dm_db_index_operational_stats` 中，有两个区域可以跟踪 DML 活动：叶级和非叶级。这些 DML 活动区域在第
    2 章中讨论过；有关叶级和非叶级页面的更多信息，请参阅该章。


    理解这两种数据更改之间的区别对于帮助识别更改是否由 DML 操作引起非常重要。这意味着叶级 DML 活动是 `INSERT`、`UPDATE` 和 `DELETE`
    语句的直接结果。而非叶级 DML 活动发生在叶级活动导致索引结构发生变化时，并非能通过 `INSERT`、`UPDATE` 或 `DELETE` 语句直接影响的。


    叶级和非叶级 DML 活动都根据已发生的 DML 操作类型细分为统计信息。如前所述，DML 活动监控 `INSERT`、`UPDATE` 和 `DELETE`
    活动。对于这些操作中的每一个，`sys.dm_db_index_operational_stats` 中都有一个对应的列。此外，还有一个列用于计数已从叶级
    DML 活动中“幽灵化”的记录。


    在 `DELETE` 操作期间，受语句影响的行通过两阶段操作被删除。最初，记录被标记为删除。发生这种情况时，这些记录被称为已幽灵化；处于此状态的行会计入 `leaf_ghost_count`。在固定的时间间隔，SQL
    Server 中的一个清理线程将遍历并对标记为幽灵化的行执行实际的删除操作。此时，这些记录将会计入 `leaf_delete_count`。此过程有助于提高删除操作的性能，因为实际的行删除发生在事务提交之后。此外，在事务回滚的情况下，只需要更改行上的幽灵标志，而无需尝试在表中重新创建该行。此活动仅发生在叶级；一旦与非叶页面关联的所有行都被删除或以其他方式移除，非叶页面就会被删除。'
- fmt: 'As mentioned, this DML activity on this DMF is similar to that found in `sys.dm_db_index_usage_stats`.
    While it is similar, there are some stark differences. The first difference is
    that the information in `sys.dm_db_index_operational_stats` is much more granular
    than that in `sys.dm_db_index_usage_stats`. Operational stats report down to the
    leaf and nonleaf levels; usage stats do not. Along with the granularity is the
    difference in how the counts are tabulated. Usage stats count one for every plan
    that performs the operation on the index; whether 0 or 100 rows, the stats are
    collected. Operational stats differ in that the count increments for every row
    that has the DML operation performed. To summarize the difference, usage stats
    aggregate when the index is used, and operational stats aggregate based on how
    much of the index is used.


    The code in Listing 3-24 illustrates how operational stats are tabulated. In the
    listing, 79 rows are added to the table `dbo.Karaoke`. Then 44 rows are deleted
    from the table. This is followed by 35 rows being updated in the table. The last
    query returns operational stats based on the DML activity. Figure 3-17 shows the
    results of the final query.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig17_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig17_HTML.jpg)


    Figure 3-17

    DML activity query results (result may vary on your system)


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.Karaoke'') IS NOT NULL

    DROP TABLE dbo.Karaoke;

    CREATE TABLE dbo.Karaoke

    (

    KaraokeID INT

    ,Duet BIT

    ,CONSTRAINT PK_Karaoke_KaraokeID PRIMARY KEY CLUSTERED (KaraokeID)

    );

    INSERT INTO dbo.Karaoke

    SELECT ROW_NUMBER() OVER (ORDER BY t.object_id)

    ,t.object_id % 2

    FROM sys.tables t;

    DELETE FROM dbo.Karaoke

    WHERE  Duet = 0;

    UPDATE dbo.Karaoke

    SET    Duet = 0

    WHERE  Duet = 1;

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    AS table_name

    ,i.name AS index_name

    ,ios.leaf_insert_count

    ,ios.leaf_update_count

    ,ios.leaf_delete_count

    ,ios.leaf_ghost_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),NULL,NULL,NULL) ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    WHERE ios.object_id = OBJECT_ID(''dbo.Karaoke'')

    ORDER BY ios.range_scan_count DESC;

    ```

    Listing 3-24

    DML Activity Script


    The value in looking at the DML activity in an index is to help you understand
    what is happening to the data in an index. For example, if a nonclustered index
    is being updated often, it may be beneficial to look at the columns in the index
    to determine whether the volatility of the columns matches the benefit of the
    index. It is good to look at the indexes with high amounts of DML activity and
    consider whether the activity matches your own understanding of the database platform.


    ## SELECT Activity


    After DML activity, the next area of information that can be looked at is the
    information on `SELECT` activity. The `SELECT` activity columns, shown in Table
    3-14, identify the type of physical operation that was used when queries were
    executed. There are three types of access that SQL Server collects information
    on: range scans, singleton lookups, and forwarded records.


    Table 3-14

    Access Pattern Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `range_scan_count` | bigint | Cumulative count of range and table scans started
    on the index or heap. |

    | `singleton_lookup_count` | bigint | Cumulative count of single row retrievals
    from the index or heap. |

    | `forwarded_fetch_count` | bigint | Count of rows that were fetched through a
    forwarding record. |


    ### Range Scan


    Range scans occur whenever a range of rows or a table scan is used to access data.
    When considering a range of rows, it can be anywhere from 1 to 1,000 or more rows.
    The number of rows in the range is not material in how SQL Server accesses the
    data. With table scans, the number of rows is also not important, but you already,
    likely, assume that it includes all records in the table. In `sys.dm_db_index_operational_stats`,
    these values are stored in the column `range_scan_count`.


    To see this information collected in `range_scan_count`, execute the code in Listing
    3-13 and Listing 3-15 from the previous section. Before doing this, take the AdventureWorks2017
    database offline and then bring it back online which will reset the statistics
    returned from the DMOs. In these two code samples, four queries will be executed.
    The first two will result in index seeks in the query plan, shown in Figure 3-9.
    And the second two queries result in index scans, as shown in the execution plans
    in Figure 3-11. Running the code in Listing 3-25 will show, as displayed in Figure
    3-18, that all four queries used a range scan to retrieve the data from the table.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig18_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig18_HTML.jpg)


    Figure 3-18

    Query results for `range_scan_count`


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.range_scan_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```

    Listing 3-25

    Query for `range_scan_count` from `sys.dm_db_index_operational_stats`


    ### Singleton Lookup


    The next statistics column collected on `SELECT` activity is `singleton_lookup_count`.
    Values in this column are increased whenever the key lookup, formerly bookmark
    lookup, is used. In general terms, this is the same type of information as collected
    in the column `user_lookups` in `sys.dm_db_index_usage_stats`. There is a significant
    difference, though, between `user_lookups` and `singleton_lookup_count`. When
    a key lookup is used, `user_lookups` will increment by one to indicate that the
    index operation had been used. With `singleton_lookup_count`, for every row that
    uses the key lookup operation, the value in this column will increase by one.


    For instance, running the code in Listing 3-17 will result in a key lookup. This
    can be validated by examining the execution plan, shown in Figure 3-13. The statistics
    from this were discussed previously and shown in Figure 3-19. The new information
    to look at can be investigated by running the T-SQL statement in Listing 3-26.
    In the results, you can see that instead of there being a value of 1 in `singleton_lookup_count`,
    the value is 243. This is an important distinction for this column. Rather than
    knowing that key lookups have occurred, this statistic provides information on
    the scope of the lookups. You could consider that if the ratio of singleton lookups
    to range scans was high, there may be other indexing alternatives to consider.


    ![../images/338675_3_En_3_Chapter/338675_3_En_3_Fig19_HTML.jpg](images/338675_3_En_3_Chapter/338675_3_En_3_Fig19_HTML.jpg)


    Figure 3-19

    Query results for `singleton_lookup_count`


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.singleton_lookup_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios. singleton_lookup_count DESC;

    ```

    Listing 3-26

    Query for `singleton_lookup_count` from `sys.dm_db_index_operational_stats`'
