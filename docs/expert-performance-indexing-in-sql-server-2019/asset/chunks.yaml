  trans: '

    在执行过程中，你可能还会注意到另一个奇特的现象。在实施索引视图后，针对基础表的查询和针对视图的查询执行情况完全一致。这是索引视图带来的额外好处之一。当 SQL
    Server 确定第一个查询的执行计划时，它能够推断出存在一个索引视图可以覆盖与该查询相同的逻辑，即使平均值列的计算方式并不相同。


    当需要将多个表连接在一个单元中以减少运行时连接数据所需的 I/O 时，索引视图是一个非常有用的工具。尽管索引视图有许多限制，但它也带来了诸多好处，包括能够在类似清单
    11-46 所示的情况下使用索引视图。当你频繁使用具有相同结构的视图和查询时，请考虑引入视图是否能提供基础表上索引所无法提供的优势。


    ### 本章小结


    本章重点介绍在多种情况下如何以及何时对表应用索引。每个示例都演示了如何将特定的索引模式应用于相应场景，以通过索引来提升性能。本章涵盖了使用堆的有限但有效的实例。接着，介绍了构建聚集索引的各种选项和方式。关于非聚集索引，示例展示了在聚集键之外的列上提升性能时，向聚集索引添加选项的方法。本章还包含了一个实现列存储索引的示例，并讨论了何时应用此类索引。总的来说，这些模式为识别数据库中表所需索引的类型奠定了基础，并提供了比较和对比不同索引的基础。


    # 第 12 章 查询策略


    在上一章中，我们探讨了识别数据库潜在索引的策略。然而，这往往只是故事的一半。一旦索引创建完成，你会期望数据库内的性能得到提升，从而转向下一个瓶颈。不幸的是，编码实践和选择性有时会对索引在查询中的应用产生负面影响。有时，数据库和表的访问方式会阻碍你使用数据库中某些最有益的索引。


    本章涵盖了许多查询策略，在这些策略中，索引可能不会如你所预期的那样被使用。这些场景包括：


    *   `LIKE` 比较

    *   字符串连接

    *   计算列

    *   标量函数

    *   数据转换


    在每种场景中，我们将审视其周围的情况以及它们为何不能按预期工作。然后，我们将看到一些缓解问题的方法，以及关于如何在正确的地方使用正确索引的技巧。到本章结束时，我们将更有准备地识别那些会阻碍你为性能而对数据库进行索引的情况，并且我们将拥有开始缓解这些风险的工具。


    ## LIKE 比较


    在考察查询对索引使用的影响时，首先要看的就是 `LIKE` 比较。`LIKE` 比较允许在列中搜索任何单个字符或模式。如果你需要查找表中所有以字母 `AAA`
    或 `BBB` 开头的值，`LIKE` 比较提供了此功能。在这些搜索中，查询可以读取索引并找到匹配字符或模式的值，因为索引是排序的。当在查询中使用此比较来查找包含或以某个字符或模式结尾的值时，问题就会出现。


    在这种情况下，索引的排序变得无关紧要，因为统计数据仅在字符值的左边缘收集。字母 `B` 出现在索引第一个值中的可能性与其出现在索引最后一个值中的可能性是相等的。为了确定表中哪些记录在列中包含
    `B`，必须检查所有行。没有可用的统计数据来识别出现的可能性或位置。由于没有可靠的统计数据可用，SQL Server 将不知道使用哪个索引来满足查询，最终可能使用一个较差的执行计划。


    为了理解 `LIKE` 比较可能出现的问题，我们将通过几个演示来展示两种场景及其相关统计信息。首先，让我们从查询 `Person.Address` 表中 `AddressLine1`
    以 710 开头的记录开始（见清单 12-1）。查看图 12-1 中的 `STATISTICS IO` 输出显示，该查询需要三次逻辑读取。检查图 12-2
    中的执行计划显示，在非聚集索引上进行了索引查找，这导致了三次逻辑读取。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig2_HTML.jpg](img/338675_3_En_12_Fig2_HTML.jpg)

    **图 12-2**

    地址以 710 开头的执行计划


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig1_HTML.jpg](img/338675_3_En_12_Fig1_HTML.jpg)

    **图 12-1**

    地址以 710 开头的 STATISTICS IO


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''710%'';

    ```

    *清单 12-1*

    查询以 710 开头的地址


    在这种情况下，`LIKE` 比较运行良好，执行计划、统计信息和 I/O 都符合请求要求。不幸的是，如前所述，这不是使用 `LIKE` 比较的唯一方式。该比较也可用于查找列内的值。考虑一个场景，你需要查找与特定街道名称（如
    Longbrook）匹配的所有地址（见清单 12-2）。对于此查询，执行计划在非聚集索引上使用扫描，需要 216 次逻辑读取，如图 12-3 所示。图 12-4
    显示了执行计划。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig4_HTML.jpg](img/338675_3_En_12_Fig4_HTML.jpg)

    **图 12-4**

    包含“Longbrook”的地址的执行计划


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig3_HTML.jpg](img/338675_3_En_12_Fig3_HTML.jpg)

    **图 12-3**

    包含“Longbrook”的地址的 STATISTICS IO


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''%Longbrook%'';

    ```

    *清单 12-2*

    查询包含“Longbrook”的地址

    '
- fmt: '在本场景中，表和索引都很小。索引查找（index seek）与索引扫描（index scan）之间的差异并不十分显著。试想一下，如果此场景发生在你的生产系统中，并且涉及数据库中较大的表之一。此时，SQL
    Server 无法快速过滤出匹配搜索值的记录，而必须遍历所有行。虽然完成时间可能只需几十秒，但这为阻塞（blocking）和死锁（deadlocking）问题打开了机会，从而进一步减慢环境中的查询速度。


    避免这种情况的一个流行方法是规定通配符绝不允许出现在搜索条件的左边缘。不幸的是，这是一个相当不切实际的期望。世界上很少有业务经理会同意要求他们的用户输入所有可能的街道号码组合，以尝试找到匹配街道名称搜索的每一个地址。光是读一下这个要求就觉得很傻。


    针对此场景，一个虽不流行但更合适且有用的解决方案是在表上创建全文索引。全文索引不如非聚集索引（nonclustered indexes）流行的一个影响因素是它们的构建和创建方式存在差异，这使得大多数人对它们不太熟悉。使用全文索引时，一个或多个列中的词汇会被编入目录，并记录它们在表中的位置。这使得查询能够快速搜索列值中的离散值，而无需检查索引中的所有记录。


    要在 `Person.Address` 表上使用全文索引，必须首先创建一个全文目录（full-text catalog），如清单 [12-3](#338675_3_En_12_Chapter.xhtml#PC3)
    所示。之后，创建全文索引，并包含将在查询中搜索的列。最后，需要修改查询以使用全文谓词函数之一。在此示例中，你将使用 `CONTAINS` 函数。


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

    CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

    KEY INDEX PK_Address_AddressID;

    GO

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE CONTAINS (AddressLine1,''Longbrook'');

    Listing 12-3

    Query for Addresses Using CONTAINS

    ```


    有了全文索引后，搜索名为 Longbrook 的街道的性能，与第一次搜索（查询以 710 开头的地址）类似。在图 [12-6](#338675_3_En_12_Chapter.xhtml#Fig6)
    的执行计划中，查询不再扫描非聚集索引，而是使用聚集索引上的查找（seek）操作，并结合针对全文索引的表值函数查找。因此，使用 `LIKE` 比较时有 216
    次逻辑读取，而使用全文索引仅需 12 次逻辑读取（如图 [12-5](#338675_3_En_12_Chapter.xhtml#Fig5) 所示）。读取次数的差异带来了性能的显著提升。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig6_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Execution plan for addresses using CONTAINS


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig5_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig5_HTML.jpg)


    Figure 12-5


    STATISTICS IO for addresses using CONTAINS


    有关全文索引的更多信息，请阅读第 [6](#338675_3_En_6_Chapter.xhtml) 章。


    ## 连接


    另一个可能严重破坏索引策略的场景是使用连接（concatenation）。*连接* 是指将两个或多个值附加在一起。当这种情况发生在 `WHERE` 子句中时，常常会导致意想不到的性能问题。


    为了演示此场景，考虑一个查找名为 Gustavo Achong 的人的查询。搜索此值需要使用 `FirstName` 和 `LastName` 列，这两个列用一个空格连接在一起。清单
    [12-4](#338675_3_En_12_Chapter.xhtml#PC4) 显示了此查询。代码清单中还包括一个在这些列上创建索引的脚本。为此查询生成的执行计划，如图
    [12-8](#338675_3_En_12_Chapter.xhtml#Fig8) 所示，表明使用了新索引，但操作是扫描（scan）而非更理想的查找（seek）。即使索引的前导左边缘与连接值的左侧值匹配，索引也无法确定在索引中的何处可以找到这些值。这导致索引使用
    99 次逻辑读取来返回查询结果，如图 [12-7](#338675_3_En_12_Chapter.xhtml#Fig7) 所示。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig8_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Execution plan for concatenation


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig7_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig7_HTML.jpg)


    Figure 12-7


    STATISTICS IO for concatenation


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    Listing 12-4

    Query with Concatenation

    ```


    如前所述，使用索引扫描并不一定是坏事。然而，当存在大量并发用户或正在发生数据修改时，使用扫描可能会导致性能问题。对于拥有数百万或更多记录的大型表来说，这可能导致数据库缺乏可扩展性。


    你可能认为去掉名字和姓氏之间的空格是个好主意（见清单 [12-5](#338675_3_En_12_Chapter.xhtml#PC5)），因为这样就使用了我们创建的索引中的两个列。此解决方案的主要问题是它不起作用。正如图
    [12-10](#338675_3_En_12_Chapter.xhtml#Fig10) 中的执行计划所示，它与连接值中包含空格的情况几乎相同，逻辑读取次数也是相同的
    99 次（如图 [12-9](#338675_3_En_12_Chapter.xhtml#Fig9) 所示）。


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig10_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Execution plan for concatenation without spaces


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig9_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig9_HTML.jpg)


    Figure 12-9


    STATISTICS IO for concatenation without spaces


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    Listing 12-5

    Concatenation Without Spaces

    ```


    修复连接值问题的最好方法可能是消除连接的需要。与其搜索值 `Gustavo Achong`，不如分别搜索名字 `Gustavo` 和姓氏 `Achong`（见清单
    [12-6](#338675_3_En_12_Chapter.xhtml#PC6)）。进行此更改后，查询就能够使用非聚集索引上的查找操作，并仅用两次逻辑读取返回结果（见图
    [12-11](#338675_3_En_12_Chapter.xhtml#Fig11)）。这些结果明显优于值连接在一起时的表现。执行计划见图 [12-12](#338675_3_En_12_Chapter.xhtml#Fig12)。'
  raw: 'In this scenario, the table and index were both small. The difference between
    an index seek and an index scan was not too extreme. Consider if this scenario
    was happening in your production system with one of the larger tables in your
    databases. Instead of being able to quickly filter out records that match the
    search values, SQL Server is required to look through all rows. And while that
    time may be just tens of seconds to complete, it opens the opportunity for blocking
    and deadlocking issues, which will further slow down queries in your environment.


    A popular method of avoiding this situation is to declare that wildcards are never
    allowed on the left edge of searches. Unfortunately, this is a fairly unrealistic
    expectation. There are few business managers in the world that would agree to
    require their users to enter all possible street number combinations in an attempt
    to find every address that matched the street name search. Just reading it here
    sounds silly.


    A less popular but much more appropriate and useful solution to this scenario
    is to create a full-text index on the table. A contributing factor to full-text
    indexes being less popular than nonclustered indexes is because of the difference
    in building and creating them, which has made them less familiar to most people.
    With a full-text index, words within one or more columns are cataloged, along
    with their position in the table. This enables the query to search quickly for
    the discrete values within a column value without having to check all the records
    in an index.


    To use a full-text index on the `Person.Address` table, you must first build a
    full-text catalog, as shown in Listing [12-3](#338675_3_En_12_Chapter.xhtml#PC3).
    After that, the full-text index is created and includes the column that will be
    searched in the queries. Lastly, the query needs to be modified to use one of
    the full-text predicate functions. In this example, you will be using the `CONTAINS`
    function.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

    CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

    KEY INDEX PK_Address_AddressID;

    GO

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE CONTAINS (AddressLine1,''Longbrook'');

    Listing 12-3

    Query for Addresses Using CONTAINS

    ```


    With the full-text index in place, the performance of the search for streets named
    Longbrook is similar to the first search where the query was looking for addresses
    starting with 710\. In the execution plan in Figure [12-6](#338675_3_En_12_Chapter.xhtml#Fig6),
    instead of a scan of the nonclustered index, the query is using a seek operation
    on the clustered index with a table-valued function lookup against the full-text
    index. As a result, instead of the 216 logical reads when using the `LIKE` comparison,
    using the full-text index requires only 12 logical reads (shown in Figure [12-5](#338675_3_En_12_Chapter.xhtml#Fig5)).
    The difference in reads provides a substantial improvement in performance over
    the first search attempt.


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig6_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Execution plan for addresses using CONTAINS


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig5_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig5_HTML.jpg)


    Figure 12-5


    STATISTICS IO for addresses using CONTAINS


    For more information on full-text indexes, read Chapter [6](#338675_3_En_6_Chapter.xhtml).


    ## Concatenation


    Another scenario that can wreak havoc on indexing strategies is the use of concatenation.
    *Concatenation* is when two or more values are appended to one another. When this
    happens in a `WHERE` clause, it can often lead to poor performance that wasn’t
    expected.


    To demonstrate this scenario, consider a query for someone with the name Gustavo
    Achong. Searching for this value requires using the `FirstName` and `LastName`
    columns, which are concatenated together with a space between the columns. Listing
    [12-4](#338675_3_En_12_Chapter.xhtml#PC4) shows the query. A script to build an
    index on these columns is also included in the code listing. The execution plan
    generated for this query, shown in Figure [12-8](#338675_3_En_12_Chapter.xhtml#Fig8),
    shows that the new index is used but operation is a scan instead of a seek, which
    would be more desirable. Even though the leading left edge of the index matches
    the left-side values of the concatenated values, the index is not able to determine
    where to find the values in the index. This results in the index using 99 logical
    reads to return the query results, shown in Figure [12-7](#338675_3_En_12_Chapter.xhtml#Fig7).


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig8_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Execution plan for concatenation


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig7_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig7_HTML.jpg)


    Figure 12-7


    STATISTICS IO for concatenation


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    Listing 12-4

    Query with Concatenation

    ```


    As mentioned, using a scan on the index is not necessarily a bad thing. However,
    using a scan when there are a lot of concurrent users or data modifications occurring
    could lead to a performance issue. When it comes to larger tables with millions
    or more records, this can possibly lead to a lack of scalability for the database.


    You might think that removing the space between the first and last names is a
    good idea (see Listing [12-5](#338675_3_En_12_Chapter.xhtml#PC5)), since then
    it’s using the two columns from the index we created. The major issue with this
    solution is that it doesn’t work. As the execution plan in Figure [12-10](#338675_3_En_12_Chapter.xhtml#Fig10)
    shows, it’s nearly identical to the one with the space in the concatenated value
    with the same 99 reads as well (shown in Figure [12-9](#338675_3_En_12_Chapter.xhtml#Fig9)).


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig10_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Execution plan for concatenation without spaces


    ![../images/338675_3_En_12_Chapter/338675_3_En_12_Fig9_HTML.jpg](images/338675_3_En_12_Chapter/338675_3_En_12_Fig9_HTML.jpg)


    Figure 12-9


    STATISTICS IO for concatenation without spaces


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    Listing 12-5

    Concatenation Without Spaces

    ```


    Probably the best way to fix issues with concatenated values is to remove the
    need to concatenate. Instead of searching for the value `Gustavo Achong`, search
    for the first name `Gustavo` and the last name `Achong` (see Listing [12-6](#338675_3_En_12_Chapter.xhtml#PC6)).
    When this change is made, the query is then able to use a seek operation on the
    nonclustered index and return the results with only two logical reads (see Figure
    [12-11](#338675_3_En_12_Chapter.xhtml#Fig11)). These results are a definite improvement
    over when the values were concatenated together. See Figure [12-12](#338675_3_En_12_Chapter.xhtml#Fig12)
    for the execution plan.'
