    If key values for a clustered index change often, that may indicate that the key
    values selected for the clustered index are inappropriate.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig7_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig7_HTML.jpg)


    Figure 9-7: UPDATE fragmentation results after adding nonclustered index


    ```sql

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UpdateOperations(Name) INCLUDE (JunkValue);

    ```


    Listing 9-8: Create Nonclustered Index for UPDATE Operations


    At this point, you need to modify some key values. Using Listing [9-9](#338675_3_En_9_Chapter.xhtml#PC9),
    perform `UPDATE` activity on the table and update one of every nine rows. To simulate
    changing the key values, the `UPDATE` statement reverses the characters in the
    column. This small amount of activity is enough to cause a significant amount
    of fragmentation. As the results in Figure [9-8](#338675_3_En_9_Chapter.xhtml#Fig8)
    illustrate, the nonclustered index went from no fragmentation to more than 30
    percent fragmentation.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig8_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig8_HTML.jpg)


    Figure 9-8: UPDATE fragmentation results after changing index key values


    One thing to note is that the fragmentation on the clustered index did not change
    with these updates. Not all updates will result in fragmentation—only those that
    move data around because of space being unavailable on the pages where the records
    are currently stored.


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET Name = REVERSE(Name)

    WHERE RowID % 9 = 1

    ```


    Listing 9-9: UPDATE Operation to Change Index Key Value


    ## Delete Operations


    The third type of operation that causes fragmentation is `DELETE` operation. Deletes
    are a bit different in nature in that they create fragmentation within a database.
    Instead of relocating pages because of page splits, a delete can lead to pages
    being removed from an index. Gaps will then appear in the physical sequence of
    pages for the index. Since the pages are no longer physically sequential, they
    are considered fragmented—especially since once the pages are deallocated from
    the index, they can be reallocated to other indexes for a more traditional form
    of fragmentation.


    To demonstrate this type of behavior, create a table, populate it with a number
    of records, and then add a clustered index. Listing [9-10](#338675_3_En_9_Chapter.xhtml#PC10)
    shows the script for these tasks. Run the script followed by the script from Listing
    [9-11](#338675_3_En_9_Chapter.xhtml#PC11) to get the current fragmentation for
    the clustered index. Your results should match those in Figure [9-9](#338675_3_En_9_Chapter.xhtml#Fig9).
    As you can see from the average fragmentation in percent column (`avg_fragmentation_in_percent`),
    there is no fragmentation currently in the index.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig9_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig9_HTML.jpg)


    Figure 9-9: Fragmentation results before DELETE operation


    ```sql

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.DeleteOperations''),NULL,NULL,''DETAILED'')

    ```


    Listing 9-11: View DELETE Index Fragmentation


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.DeleteOperations'') IS NOT NULL

    DROP TABLE dbo.DeleteOperations;

    CREATE TABLE dbo.DeleteOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.DeleteOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.DeleteOperations(RowID);

    ```


    Listing 9-10: Creating a Table for DELETE Operation


    Now, to demonstrate fragmentation caused by `DELETE` operations, you’ll delete
    every other 50 records in the table using the code in Listing [9-12](#338675_3_En_9_Chapter.xhtml#PC12).
    As before, you’ll use Listing [9-11](#338675_3_En_9_Chapter.xhtml#PC11) to view
    the state of fragmentation in the index. The results, shown in Figure [9-10](#338675_3_En_9_Chapter.xhtml#Fig10),
    indicate that the `DELETE` operation resulted in about 13 percent fragmentation.
    With `DELETE` operations, the rate in which fragmentation usually occurs isn’t
    too fast. Also, since the fragmentation is not the result of page splits, the
    order of the pages does not become physically out of order. Instead, there are
    gaps in the contiguous pages. However, pages left empty could be reused in future
    `INSERT` and `UPDATE` transactions which could result in the pages then being
    physically out of order.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig10_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig10_HTML.jpg)


    Figure 9-10: Fragmentation results after DELETE


    ```sql

    USE AdventureWorks2017

    GO

    DELETE dbo.DeleteOperations

    WHERE RowID % 100 BETWEEN 1 AND 50

    ```


    Listing 9-12: Performing DELETE Operation


    As a final note on `DELETE` operations, the fragmentation may not appear immediately
    after the `DELETE` operation. When records are to be deleted, they are first marked
    for deletion before the record itself is actually deleted. While it is marked
    for deletion, the record is considered to be a ghost record. During this stage,
    the record is logically deleted but is physically still present in the index.
    At a future point, after the transaction has been committed and a `CHECKPOINT`
    has completed, the ghost cleanup process will physically remove the row. At this
    time, the fragmentation will show in the index.'
