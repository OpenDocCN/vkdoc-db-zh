    use any of the following comparisons: `IS` , `IS NOT` , `=` , `<>` , `!=` , `>`
    , `>=` , `!>` , `<` , `<=` , and `!<`. Also, a filtered index cannot use comparisons
    against a `computed` column, a user-defined type (`UDT`) column, a `spatial` data
    type column, or a `HierarchyID` data type column.


    You can use a number of options when creating an index. In Listing [1-1](#338675_3_En_1_Chapter.xhtml#PC1),
    there is a segment for adding index options, noted by the tag `<relational_index_option>`.
    These index options control both how indexes are created and how they will function
    in some scenarios. Listing [1-2](#338675_3_En_1_Chapter.xhtml#PC2) provides the
    DDL for the available options available for CREATE INDEX.


    ```

    PAD_INDEX = { ON | OFF }

    | FILLFACTOR = fillfactor

    | SORT_IN_TEMPDB = { ON | OFF }

    | IGNORE_DUP_KEY = { ON | OFF }

    | STATISTICS_NORECOMPUTE = { ON | OFF }

    | STATISTICS_INCREMENTAL = { ON | OFF }

    | DROP_EXISTING = { ON | OFF }

    | ONLINE = { ON | OFF }

    | RESUMABLE = {ON | OF }

    | MAX_DURATION =  [MINUTES]

    | ALLOW_ROW_LOCKS = { ON | OFF }

    | ALLOW_PAGE_LOCKS = { ON | OFF }

    | MAXDOP = max_degree_of_parallelism

    | DATA_COMPRESSION = { NONE | ROW | PAGE}

    [ ON PARTITIONS ( {  |  }

    [ , ...n ] ) ]

    Listing 1-2

    CREATE INDEX Options

    ```'
  trans: '

    ## 压缩与索引


    如今的图书馆收藏了大量的书籍。随着书籍数量的增加，会达到一个临界点，使得用现有的人员和资源管理图书馆变得越来越困难。因此，图书馆想出了多种方法来存储书籍或其中的信息，以便在不需要增加维护图书馆所需资源的情况下实现更好的管理。例如，书籍可以存储在缩微胶片上，或者仅通过电子方式提供。这样做的好处是减少了存储资料所需的空间，并让图书馆读者能够更快地查看更多书籍。


    同样，当索引变得过大时，也会达到难以管理的程度。此外，访问记录所需的时间也可能增加到超出可接受的水平。SQL Server 中提供两种类型的压缩：行级压缩和页面级压缩。


    使用 `行级压缩` 时，索引在行级别压缩每条记录。启用行级压缩后，会对每条记录进行多项更改。首先，行的元数据以替代格式存储，这减少了每列存储的信息量，但由于另一项更改，它实际上可能会增加开销的大小。对记录的主要更改包括：将数值数据从固定长度更改为可变长度，并且不存储固定长度字符串数据类型的末尾空白字符。另一项更改是，NULL
    或零值不需要任何存储空间。


    `页面级压缩` 类似于行级压缩，但它还包括跨一组行的压缩。启用页面级压缩后，会识别并压缩列中字符串值之间的相似性。这将在第 2 章中详细讨论。


    无论是行级压缩还是页面级压缩，都需要考虑一些事项。首先，压缩记录需要额外的中央处理器 (CPU) 时间。虽然行将占用更少的空间，但在存储之前，CPU 是处理压缩任务所使用的主要资源。此外，根据表中索引的数据类型，压缩的效果会有所不同。


    ## 索引数据定义语言


    与 SQL Server 中丰富多样的索引类型和变体类似，用于构建索引的数据定义语言 (DDL) 也非常丰富。在本节中，你将研究用于构建索引的 DDL。首先，你将查看
    `CREATE` 语句及其选项，并将它们与本章前面讨论的概念配对。


    为简洁起见，我不讨论索引 DDL 的向后兼容功能；你可以在 SQL Server 2012 的 SQL 文档中找到有关这些功能的信息。我将在后面的章节中进一步讨论
    XML 和空间索引以及全文搜索。


    ### 创建索引


    在索引可以存在于你的数据库中之前，必须首先创建它。这是通过清单 1-1 所示的 `CREATE INDEX` 语法完成的。如语法所示，之前讨论的大多数索引类型和变体都可以通过基本语法使用。


    ```sql

    CREATE [ UNIQUE ] [ CLUSTERED | NONCLUSTERED ] INDEX index_name

    ON <object> ( column [ ASC | DESC ] [ ,...n ] )

    [ INCLUDE ( column_name [ ,...n ] ) ]

    [ WHERE <filter_predicate> ]

    [ WITH ( <relational_index_option> [ ,...n ] ) ]

    [ ON { partition_scheme_name ( column_name )

    | filegroup_name

    | default

    }

    ]

    [ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | "NULL" }
    ]

    [ ; ]

    -- 清单 1-1

    -- CREATE INDEX 语法

    ```


    在 `CLUSTERED` 和 `NONCLUSTERED` 索引之间进行选择，决定了索引将构建为这两种基本类型中的哪一种。排除这两种类型中的任何一种都会将索引默认为非聚集索引。


    索引的唯一性由 `UNIQUE` 关键字决定；将其包含在 `CREATE INDEX` 语法中将使索引具有唯一性。创建索引作为主键的语法将在本章后面介绍。


    `<object>` 选项确定将在其上构建索引的基础对象。该语法允许在表或视图上创建索引。如果需要，对象的指定可以包括数据库名称和模式名称。


    指定索引对象后，列出索引的排序列。这些列通常称为 *键列*。每列在索引中只能出现一次。默认情况下，列将在索引中按升序排序，但也可以指定降序排序。一个索引最多可以包含
    32 列作为索引键的一部分，总大小不得超过 1,700 字节。在 SQL Server 2016 之前，是 16 列和 900 字节。


    作为选项，可以在任何非聚集索引上指定 `included` 列，这些列在索引键列之后添加。由于 `included` 列不参与排序，因此没有升序或降序的选项。在键列和非键列之间，一个索引最多可以包含
    1,023 列。键列的大小限制不影响 `included` 列。


    如果索引将被筛选，则接下来指定此信息。通过 `WHERE` 子句向索引添加筛选条件。`WHERE` 子句可以使用以下任何比较运算符：`IS`、`IS NOT`、`=`、`<>`、`!=`、`>`、`>=`、`!>`、`<`、`<=`
    和 `!<`。此外，筛选索引不能使用对 `computed` 列、用户定义类型 (`UDT`) 列、`spatial` 数据类型列或 `HierarchyID`
    数据类型列的比较。


    在创建索引时，可以使用多个选项。在清单 1-1 中，有一个用于添加索引选项的部分，由标签 `<relational_index_option>` 标出。这些索引选项既控制索引的创建方式，也控制它们在某些场景下的运行方式。清单
    1-2 提供了 `CREATE INDEX` 的可用选项的 DDL。


    ```sql

    PAD_INDEX = { ON | OFF }

    | FILLFACTOR = fillfactor

    | SORT_IN_TEMPDB = { ON | OFF }

    | IGNORE_DUP_KEY = { ON | OFF }

    | STATISTICS_NORECOMPUTE = { ON | OFF }

    | STATISTICS_INCREMENTAL = { ON | OFF }

    | DROP_EXISTING = { ON | OFF }

    | ONLINE = { ON | OFF }

    | RESUMABLE = { ON | OFF }

    | MAX_DURATION = <time> [MINUTES]

    | ALLOW_ROW_LOCKS = { ON | OFF }

    | ALLOW_PAGE_LOCKS = { ON | OFF }

    | MAXDOP = max_degree_of_parallelism

    | DATA_COMPRESSION = { NONE | ROW | PAGE}

    [ ON PARTITIONS ( { <partition_number> | <range> }

    [ , ...n ] ) ]

    -- 清单 1-2

    -- CREATE INDEX 选项

    '
- fmt: "# SQL Server 索引操作指南\n\nEach of the options allows for different levels of\
    \ control on the index creation process. Table [1-1](#338675_3_En_1_Chapter.xhtml#Tab1)\
    \ lists all the options available for `CREATE INDEX`. In later chapters, I’ll\
    \ discuss examples and strategies for applying them. You can find more information\
    \ on the `CREATE INDEX` syntax and examples of its use in SQL Docs for SQL Server.\n\
    \n**Table 1-1: CREATE INDEX Syntax Options**\n\n| Option Name | Description |\n\
    | --- | --- |\n| `FILLFACTOR` | Defines the amount of empty space to leave in\
    \ each data page of an index when it is created. This is applied only at the time\
    \ an index is created or rebuilt. |\n| `PAD_INDEX` | Specifies whether the `FILLFACTOR`\
    \ for the index should be applied to the nonleaf data pages for the index. The\
    \ `PAD_INDEX` option is used when data manipulation language (DML) operations\
    \ that lead to excessive nonleaf-level page splitting need to be mitigated. |\n\
    | `SORT_IN_TEMPDB` | Determines whether to store temporary results from building\
    \ the index in the `tempdb` database. This option will increase the amount of\
    \ space required. |\n| `IGNORE_DUP_KEY` | Changes the behavior when duplicate\
    \ keys are encountered when performing inserts into a table. When enabled, rows\
    \ violating the key constraint will fail. When the default behavior is disabled,\
    \ the entire insert will fail. |\n| `STATISTICS_NORECOMPUTE` | Specifies whether\
    \ any statistics related to the index should be re-created when the index is created.\
    \ |\n| `STATISTICS_INCREMENTAL` | Specifies whether statistics collected for the\
    \ index should be created on the index as a whole or per partition. |\n| `DROP_EXISTING`\
    \ | Determines the behavior when an index of the same name on the table already\
    \ exists. By default, when `OFF`, the index creation will fail. When set to `ON`,\
    \ the index creation will overwrite the existing index. |\n| `ONLINE` | Determines\
    \ whether a table and its indexes are available for queries and data modification\
    \ during index operations. When enabled, locking is minimized, and an intent shared\
    \ is the primary lock held during index creation. When disabled, the locking will\
    \ prevent data modifications to the index and underlying table for the duration\
    \ of the operation. `ONLINE` is an Enterprise Edition–only feature. |\n| `RESUMABLE`\
    \ | Identifies whether an indexing operation will be resumable. New for SQL Server\
    \ 2019. |\n| `MAX_DURATION` | Determines the max number of minutes for a resumable\
    \ indexing operation to execute for until pausing. New for SQL Server 2019. |\n\
    | `ALLOW_ROW_LOCKS` | Determines whether row locks are allowed on an index. By\
    \ default, they are allowed. |\n| `ALLOW_PAGE_LOCKS` | Determines whether page\
    \ locks are allowed on an index. By default, they are allowed. |\n| `MAXDOP` |\
    \ Overrides the server-level maximum degree of parallelism during the index operation.\
    \ The setting determines the maximum number of processors that an index can utilize\
    \ during an index operation. |\n| `DATA_COMPRESSION` | Determines the type of\
    \ data compression to use on the index. By default, no compression is enabled.\
    \ With this, both page- and row-level compression types can be specified. |\n\n\
    To demonstrate the `CREATE INDEX` syntax, let’s build an index on the table `Sales.SalesOrderDetail`\
    \ in `AdventureWorks2017`. The key column for the index is `ProductId` with the\
    \ columns `OrderQty` and `UnitPrice` included as nonkey columns. Additionally,\
    \ the index will be `PAGE` compressed. The code in Listing [1-3](#338675_3_En_1_Chapter.xhtml#PC3)\
    \ builds this index.\n\n```\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Sales_SalesOrderDetail_ProductId\n\
    ON Sales.SalesOrderDetail (ProductID)\nINCLUDE (OrderQty, UnitPrice)\nWITH (DATA_COMPRESSION\
    \ = PAGE);\n```\n**Listing 1-3: CREATE INDEX Example**\n\n## Altering an Index\n\
    \nAfter an index has been created, there will be a need, from time to time, to\
    \ modify the index. There are a few reasons to alter an existing index. First,\
    \ the index may need to be rebuilt or reorganized as part of ongoing index maintenance.\
    \ Also, some of the index options, such as the type of compression, may need to\
    \ change. In these cases, the index can be altered, and the options for the indexes\
    \ are modified.\n\nTo modify an index, you use the `ALTER INDEX` syntax. Listing\
    \ [1-4](#338675_3_En_1_Chapter.xhtml#PC4) shows the basic syntax for altering\
    \ indexes.\n\n```\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION\
    \ = ALL] [ WITH ( <rewsoptions> [ ,...n ] ) ]\n| [ PARTITION = partition_number\
    \ [ WITH ( <rowsoptions> [ ,...n ] ) ] ] ]\n| DISABLE\n| REORGANIZE\n[ PARTITION\
    \ = partition_number ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n| SET ( <set_index_options>\
    \ [ ,...n ] )\n| RESUME [WITH (<resumable_index_options>[,...n])]\n| PAUSE\n|\
    \ ABORT\n} [ ; ]\n```\n**Listing 1-4: ALTER INDEX Syntax**\n\nWhen using the `ALTER\
    \ INDEX` syntax for index maintenance, there are two options in the syntax that\
    \ can be used. These options are `REBUILD` and `REORGANIZE`. The `REBUILD` option\
    \ re-creates the index using the existing index structure and options. It can\
    \ also be used to enable a disabled index. The `REORGANIZE` option re-sorts the\
    \ leaf-level pages of an index. This is similar to reshuffling the cards in a\
    \ deck to get them back in sequential order. Both of these options will be discussed\
    \ more thoroughly in Chapter [6](#338675_3_En_6_Chapter.xhtml).\n\nAdditionally,\
    \ the `ALTER INDEX` syntax can be used to disable an index. This is accomplished\
    \ through the `DISABLE` option under the `ALTER INDEX` syntax. A disabled index\
    \ will not be used or made available by the database engine. After an index is\
    \ disabled, it can be reenabled only by altering the index again with the `REBUILD`\
    \ option.\n\nBeyond those functions, many of the index options available through\
    \ the `CREATE INDEX` syntax are also available with the `ALTER INDEX` syntax.\
    \ The `ALTER INDEX` syntax can be used to modify the compression of an index.\
    \ It can also be used to change the fill factor or the pad index settings. Depending\
    \ on the changing needs for the index, this syntax can be used to change any of\
    \ the available options, though there are some limitations with how the options\
    \ are used. When you `REBUILD ALL` partitions on an index, you can modify all\
    \ of the same options that were available with the `CREATE INDEX` syntax, as shown\
    \ in Listing [1-5](#338675_3_En_1_Chapter.xhtml#PC5). However, when you `REBUILD`\
    \ a single partition, the list of options available is greatly reduced, as shown\
    \ in Listing [1-6](#338675_3_En_1_Chapter.xhtml#PC6). This is because the overall\
    \ index isn’t changing, just the partition and the unavailable options apply to\
    \ the entire index.\n\n```\nPAD_INDEX = { ON | OFF }\n| FILLFACTOR = fillfactor\n\
    | SORT_IN_TEMPDB = { ON | OFF }\n| IGNORE_DUP_KEY = { ON | OFF }\n| STATISTICS_NORECOMPUTE\
    \ = { ON | OFF }\n| STATISTICS_INCREMENTAL = { ON | OFF }\n| ONLINE = { ON [ (\
    \ <online_options> ) ] | OFF }\n| RESUMABLE = { ON | OFF }\n| MAX_DURATION = <time>\
    \ [MINUTES}\n| ALLOW_ROW_LOCKS = { ON | OFF }\n| ALLOW_PAGE_LOCKS = { ON | OFF\
    \ }\n| MAXDOP = max_degree_of_parallelism\n| DATA_COMPRESSION = { NONE | ROW |\
    \ PAGE }\n[ ON PARTITIONS ( { <partition_number> [ TO <partition_number> ] } [\
    \ , ...n ] ) ]\n```\n**Listing 1-5: ALTER INDEX Rebuild Options**\n\n```\nSORT_IN_TEMPDB\
    \ = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n| RESUMABLE = { ON | OFF\
    \ }\n| MAX_DURATION = <time> [MINUTES}\n| DATA_COMPRESSION = { NONE | ROW | PAGE\
    \ } }\n| ONLINE = { ON [ ( <online_options> ) ] | OFF }\n```\n**Listing 1-6: ALTER\
    \ INDEX Single Partition Rebuild Options**\n\nFor `REORGANIZE`, the options for\
    \ `ALTER INDEX` are limited to `LOB_COMPACTION`, shown in Listing [1-7](#338675_3_En_1_Chapter.xhtml#PC7).\
    \ With `LOB_COMPACTION`, when set to `ON`, the reorganization will attempt to\
    \ compact large object (LOB) pages, allowing space within the index associated\
    \ with these pages to be reduced and released. Without activating this, the reorganization\
    \ will not release these pages."
