  trans: '

    ## 筛选索引模式


    在创建索引时，有几种情况可以并且应该使用筛选索引模式。第一种情况是需要为配置为稀疏的列创建索引。在这种情况下，预计有值的行数与总行数相比会很少。使用稀疏列的好处之一是避免了在这些列中存储
    `NULL` 值所带来的存储成本。通过使用筛选索引来排除 `NULL` 值，可以确保这些列上的索引不存储 `NULL`。第二种情况是需要对一个可能包含多个
    `NULL` 值的列强制实施唯一性。创建筛选索引时，如果键列不为 `NULL`，则可以将其设为唯一索引，从而绕过通常只允许列中存在单个 `NULL` 值的唯一性限制。通过这种方式，你可以确保表中的社会安全号码在提供时不重复。


    筛选索引适用的最后一种情况是，当需要运行的查询不符合表的正常索引配置文件时。例如，可能有一个一次性报告查询需要从数据库中检索几千行数据。与其运行报告并处理可能发生的聚集索引或堆扫描，不如创建模仿查询谓词的筛选索引。这样可以让查询快速执行，而无需花费时间去构建那些包含查询永远用不到的值的索引。


    正如本节详细说明的，筛选索引模式在多种情况下都非常有用。请务必在设计索引时考虑它。通常，当发现筛选索引的第一个用途后，其他用途也会开始显现，我们将在前面提到的查询和修改数据等场景中，识别出哪些情况能从中受益。


    ### 外键模式


    最后一种非聚集索引模式是外键模式。这是唯一直接与数据库设计中的对象相关联的模式。外键提供了一种机制，用于将一个表中的值约束为另一个表中行的值。这种关系提供了参照完整性，这在大多数数据库部署中至关重要。然而，外键有时可能是数据库性能问题的根源，而大家可能并未意识到它们正在干扰性能。


    由于外键对列的可能值施加了约束，因此在需要验证值时会进行检查。外键验证有两种类型。第一种发生在父表 `dbo.ParentTable` 上，第二种发生在子表
    `dbo.ChildTable` 上（参见图 11-41）。每当在 `dbo.ChildTable` 中修改行时，都会在 `dbo.ParentTable`
    上进行验证。在这些情况下，`dbo.ChildTable` 中的 `ParentID` 值会通过查找 `dbo.ParentTable` 中的值进行验证。通常，这不会导致性能问题，因为
    `dbo.ParentTable` 中的 `ParentID` 很可能是该表的主键，也是表的聚集列。另一种验证发生在对 `dbo.ParentTable`
    进行修改时。例如，如果 `dbo.ParentTable` 中的一行被删除，则需要检查 `dbo.ChildTable` 以确定该表中是否正在使用该 `ParentID`
    值。正是在这种验证时，才需要应用外键模式。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig41_HTML.jpg](img/338675_3_En_11_Fig41_HTML.jpg)


    图 11-41 外键关系


    为了演示外键模式，首先需要几个表作为示例。清单 11-27 中的代码创建了两个表 `dbo.Customer` 和 `dbo.SalesOrderHeader`。这两个表之间存在基于
    `CustomerID` 列的外键关系。每个 `dbo.SalesOrderHeader` 行都关联一个客户。反过来，`dbo.Customer` 中的每一行可以关联到
    `dbo.SalesOrderHeader` 中的一个或多个行。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Customer(

    CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_Customer_CustomerID PRIMARY KEY CLUSTERED (CustomerID)

    );

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int

    ,OrderDate datetime

    ,DueDate datetime

    ,CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_SalesOrderHeader_SalesOrderID

    PRIMARY KEY CLUSTERED (SalesOrderID)

    ,CONSTRAINT GK_SalesOrderHeader_CustomerID_FROM_Customer

    FOREIGN KEY (CustomerID) REFERENCES dbo.Customer(CustomerID)

    );

    INSERT INTO dbo.Customer (CustomerID)

    SELECT CustomerID

    FROM Sales.Customer;

    INSERT INTO dbo.SalesOrderHeader

    (SalesOrderID, OrderDate, DueDate, CustomerID)

    SELECT SalesOrderID, OrderDate, DueDate, CustomerID

    FROM Sales.SalesOrderHeader;

    清单 11-27 外键模式设置

    ```


    在示例中，你希望观察当 `dbo.Customer` 中的一行被修改时，`dbo.SalesOrderHeader` 中会发生什么。为了演示在 `dbo.Customer`
    上的活动，清单 11-28 中的脚本在 `CustomerID` 等于 701 的行上对表执行 `DELETE` 操作。该行在 `dbo.SalesOrderHeader`
    中应该没有对应的行。尽管如此，外键仍要求检查 `dbo.SalesOrderHeader` 中是否存在该 `CustomerID` 的行。如果有，SQL Server
    将在删除时报错。由于 `dbo.SalesOrderHeader` 中没有对应的行，因此 `dbo.Customer` 中的该行可以被删除。

    '
- fmt: '# 外键模式与列存储索引


    ## 外键模式


    执行计划识别出了删除操作的几个潜在性能问题。首先，仅删除一行时，总共发生了 4,516 次读取（参见图 [11-42](#338675_3_En_11_Chapter.xhtml#Fig42)）。在这些读取中，有
    3 次发生在 `dbo.Customer` 表上，而有 4,513 次发生在 `dbo.SalesOrderHeader` 表上。其原因是 `dbo.SalesOrderHeader`
    表上必须执行一次 `clustered index scan`（聚集索引扫描），如图 [11-43](#338675_3_En_11_Chapter.xhtml#Fig43)
    所示。发生扫描的原因是，检查哪些行使用了值为 701 的 `Customer` 的唯一方法是扫描表中的所有行。没有索引能提供更快的路径来验证该值是否被使用。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig43_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig43_HTML.jpg)

    Figure 11-43: 外键模式的执行计划


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig42_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig42_HTML.jpg)

    Figure 11-42: 外键模式的统计 I/O 结果


    ```

    USE AdventureWorks2017

    GO

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON;

    DELETE FROM dbo.Customer

    WHERE CustomerID = 701;

    -- Listing 11-28: Foreign Keys Pattern

    ```


    通过外键模式可以简单地提升 `dbo.Customer` 表上 `DELETE` 操作的性能。在 `dbo.SalesOrderHeader` 表的 `CustomerID`
    列上创建一个索引，将为下一次删除操作的验证提供一个参考点（参见清单 [11-29](#338675_3_En_11_Chapter.xhtml#PC29)）。审查建立索引后的执行情况会得到截然不同的结果。`dbo.SalesOrderHeader`
    表上的读取次数从 4,513 次减少到现在的仅两次（参见图 [11-44](#338675_3_En_11_Chapter.xhtml#Fig44)）。当然，这种变化是因为在
    `CustomerID` 列上创建了索引（参见图 [11-45](#338675_3_En_11_Chapter.xhtml#Fig45)）。删除操作不再执行聚集索引扫描，而是可以利用
    `dbo.SalesOrderHeader` 表上的索引查找。


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig45_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig45_HTML.jpg)

    Figure 11-45: 外键模式的执行计划（优化后）


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig44_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig44_HTML.jpg)

    Figure 11-44: 外键模式的统计 I/O 结果（优化后）


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesOrderHeader_CustomerID ON dbo.SalesOrderHeader(CustomerID);

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON

    DELETE FROM dbo.Customer

    WHERE CustomerID = 700

    -- Listing 11-29: Foreign Keys Pattern

    ```


    在表之间建立外键关系时，牢记外键模式非常重要。这些关系的目的是验证数据，你需要确保支持该活动的索引已就位。不要将此模式用作从数据库中移除验证的借口；相反，应将其视为正确索引数据库的机会。如果需要查询某个列来验证和约束数据，那么当数据需要用于其他目的时，应用程序也很可能会访问它。


    ## 列存储索引


    随着数据库规模的增长，越来越多的情况下，传统的聚集和非聚集索引无法为计算结果提供所需的性能。这在大型数据仓库中尤其令人头疼，为此，SQL Server 2012
    引入了列存储索引。前面的章节讨论了列存储如何利用基于列的存储与基于行的存储。本节将介绍一些关于聚集和非聚集版本列存储索引的指导原则，以及如何识别何时应该构建列存储索引。在介绍完指导原则后，将提供一个实现列存储索引的示例。'
  raw: 'The execution identifies a couple potential performance problems with the
    delete. First, with only one row being deleted, there are a total of 4,516 reads
    (see Figure [11-42](#338675_3_En_11_Chapter.xhtml#Fig42)). Of the reads, 3 occur
    on `dbo.Customer`, while 4,513 occur on `dbo.SalesOrderHeader`. The reason for
    this is the `clustered index scan` that had to occur on `dbo.SalesOrderHeader`
    (shown in Figure [11-43](#338675_3_En_11_Chapter.xhtml#Fig43)). The scan occurred
    because the only way to check which rows were using `Customer` equal to 701 is
    to scan all the rows in the table. There is no index that can provide a faster
    path to verifying whether the value was being used.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig43_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig43_HTML.jpg)


    Figure 11-43


    Execution plan for Foreign Keys pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig42_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig42_HTML.jpg)


    Figure 11-42


    Statistics I/O results for Foreign Keys pattern


    ```

    USE AdventureWorks2017

    GO

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON;

    DELETE FROM dbo.Customer

    WHERE CustomerID = 701;

    Listing 11-28

    Foreign Keys Pattern

    ```


    Improving the performance of the `DELETE` on `dbo.Customer` can be done simply
    through the Foreign Keys pattern. An index built on `dbo.SalesOrderHeader` on
    the `CustomerID` column will provide a reference point for validation with the
    next delete operation (see Listing [11-29](#338675_3_En_11_Chapter.xhtml#PC29)).
    Reviewing the execution with the index in place yields quite different results.
    Instead of 4,513 reads on `dbo.SalesOrderHeader`, there are now only two reads
    against that table (see Figure [11-44](#338675_3_En_11_Chapter.xhtml#Fig44)).
    This change is, of course, because of the index that was created on the `CustomerID`
    column (see Figure [11-45](#338675_3_En_11_Chapter.xhtml#Fig45)). Instead of a
    clustered index scan, the delete operation can utilize an index seek on `dbo.SalesOrderHeader`.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig45_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig45_HTML.jpg)


    Figure 11-45


    Execution plan for Foreign Keys pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig44_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig44_HTML.jpg)


    Figure 11-44


    Statistics I/O results for Foreign Keys pattern


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesOrderHeader_CustomerID ON dbo.SalesOrderHeader(CustomerID);

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON

    DELETE FROM dbo.Customer

    WHERE CustomerID = 700

    Listing 11-29

    Foreign Keys Pattern

    ```


    The Foreign Keys pattern is important to keep in mind with building foreign key
    relationships between tables. The purpose of those relationships is to validate
    data, and you need to be certain that the indexes to support that activity are
    in place. Don’t use this pattern as an excuse to remove validation from your databases;
    instead, use it as an opportunity to properly index your databases. If the column
    needs to be queried to validate and constrain the data, it will likely be accessed
    by applications when the data needs to be used for other purposes.


    ## Columnstore Index


    As the size of databases have grown, there are more and more situations where
    traditional clustered and nonclustered indexes don’t adequately provide the performance
    needed for calculating results. This is primarily a pain with large data warehouses,
    and for this problem, the columnstore index was introduced in SQL Server 2012\.
    Previous chapters discussed how the columnstore utilizes column-based storage
    vs. row-based storage. This section looks at some guidelines with both clustered
    and nonclustered versions of columnstore indexes and how to recognize when to
    build a columnstore index. After the guidelines, an example implementing a columnstore
    index will be provided.'
