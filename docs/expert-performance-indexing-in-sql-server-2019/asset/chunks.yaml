- fmt: '# 13. Monitoring Indexes


    Throughout this book, we’ve discussed what indexes are, what they do, patterns
    for building them, and many other aspects for determining how a SQL Server database
    should be indexed. All of that information is necessary for the final piece in
    indexing your databases, analyzing your databases to determine which indexes are
    required. For this, this chapter and the two following will pull together the
    information we need to implement an indexing methodology.


    To start, in this chapter, we’ll discuss a general practice that can be used for
    monitoring indexes. It’ll include steps that can be taken to observe the behavior
    of indexes and understand how they impact your environment. This methodology can
    be applied to a single database, a server, or your entire SQL Server environment.
    Regardless of the type of operations or business that the database supports, similar
    monitoring processes can be used.


    The main goal behind monitoring indexes is creating the ability to collect information
    about indexes. This information will come from a variety of sources. The sources
    for monitoring should be familiar because they are often used with tasks similar
    to indexing, such as performance tuning. For some sources, the information will
    be collected over time to provide an idea of general trends. For other sources,
    a snapshot at a specific point in time is sufficient. It is important to collect
    information over time to provide a baseline against which to compare performance;
    this will help us know when changes in index usage and effectiveness have occurred.


    As mentioned, there are a number of sources from which information will be collected
    to monitor your indexes. The sources that will be discussed in this chapter are


    *   Performance counters


    *   Dynamic management objects


    *   Event tracing


    For each of these sources, the subsequent sections will describe what is to be
    collected and will provide guidance on how to collect this information. At the
    end of the chapter, we will have a framework that is capable of providing the
    information necessary to start the Analyze phase.


    ### Note


    All the monitoring information from this chapter will be collected in a database
    named `IndexingMethod`. The scripts can be run in that database or your own performance
    monitoring database.


    ## Performance Counters


    The first source of monitoring information for indexes is SQL Server performance
    counters. Performance counters are metrics provided by Microsoft to measure the
    rate of events or state of resources within applications and hardware on the server.
    With some of the performance counters, there are general guidelines that can be
    used to indicate when a problem with indexing may exist. For the others, changes
    in the rate or level of the performance counter may indicate a need to change
    the indexing on a server.


    The primary issue with using performance counters is that they represent the server-level,
    or SQL Server instance–level, state of the counters. They do not indicate at a
    database or table level where possible indexing issues are occurring. This level
    of detail, though, is acceptable and useful when considering the other tools available
    for monitoring your indexing and identifying potential indexing needs. One advantage
    to collecting counter information at this level is that we are forced to consider
    the whole picture and the effect of all the indexes on performance. In an isolated
    situation, a couple of poorly performing indexes on a table might be acceptable.
    However, in conjunction with other tables with poor indexing, the aggregate performance
    may reach a tipping point where indexes need to be addressed. With the server-level
    statistics provided by performance counters, we will be able to identify when
    this point has been reached.


    There are a large number of performance counters available for both SQL Server
    and Windows Server. From the perspective of indexing, though, many of the performance
    counters can be eliminated. The performance counters that are most useful are
    those that map to operations related to how indexes operate or are accessed, such
    as forwarded records and index searches. For a definition of the performance counters
    that are most useful with indexing, see `Table 13-1`. The reasons for collecting
    each of the counters and how they impact indexing decisions will be discussed
    in the next chapter.


    ### Table 13-1


    Index-Related Performance Counters


    | Option Name | Description |

    | --- | --- |

    | `Access Methods\Forwarded Records/sec` | Number of records per second fetched
    through forwarded record pointers. |

    | `Access Methods\FreeSpace Page Fetches/sec` | Number of pages fetched per second
    within allocated pages to an object to insert or modify a record. |

    | `Access Methods\FreeSpace Scans/sec` | Number of scans per second initiated
    to search for free space within allocated pages to an object to insert or modify
    a record. |

    | `Access Methods\Full Scans/sec` | Number of unrestricted full scans per second.
    These can be either base-table or full-index scans. |

    | `Access Methods\Index Searches/sec` | Number of index searches per second. These
    are used to start range scans and single index record fetches and to reposition
    an index. |

    | `Access Methods\Page compression attempts/sec` | Number of page compression
    attempts per second using PAGE compression, this will include failed page compressions.
    |

    | `Access Methods\Pages compressed/sec` | Number of pages compressed per second
    using PAGE compression |

    | `Access Methods\Page Splits/sec` | Number of page splits per second that occur
    as the result of overflowing index pages. |

    | `Buffer Manager\Page Lookups/sec` | Number of requests to find a page in the
    buffer pool. |

    | `Locks(*)\Lock Wait Time (ms)` | Total wait time (in milliseconds) for locks
    in the last second. |

    | `Locks(*)\Lock Waits/sec` | Number of lock requests per second that required
    the caller to wait. |

    | `Locks(*)\Number of Deadlocks/sec` | Number of lock requests per second that
    resulted in a deadlock. |

    | `SQL Statistics\ Batch Requests/sec` | Number of Transact-SQL command batches
    received per second. |'
