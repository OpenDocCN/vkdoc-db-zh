    ## 清单 13-8

    ### 索引操作统计信息快照表


    创建好这些表后，下一步是捕获`sys.dm_db_index_operational_stats`中的当前快照信息。可以使用清单 13-9 中的脚本来填充这些信息。由于索引方法（Indexing
    Method）旨在捕获服务器上所有数据库的索引信息，因此`sys.dm_db_index_operational_stats`的参数都设置为`NULL`。这将返回服务器上所有数据库中所有表的所有索引的所有分区的结果。与索引使用情况统计信息一样，这些信息应大约每
    4 小时捕获一次，其中一次计划捕获点应安排在服务器索引维护之前。


