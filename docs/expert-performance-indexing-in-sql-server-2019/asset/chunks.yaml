- fmt: '### Filtered Indexes


    In some tables in your databases, there are rows with certain values that will
    rarely, or never, be returned in the resultset as part of the applications using
    the databases. In these cases, it might be beneficial to remove the rows as an
    option to be returned by the resultset. In some other situations, it may be useful
    to identify a subset of data in a table and create indexes. Instead of querying
    across millions or billions of records in the table, you can utilize indexes that
    cover the hundreds or thousands of rows that the query needs to return results.
    Both of these situations identify scenarios where using the Filtered Indexes pattern
    can help improve performance.


    The Filtered Indexes pattern utilizes, as the name suggests, the filtered index
    feature that was introduced with SQL Server 2005\. When using filtered indexes,
    a `WHERE` clause is added to a nonclustered index to reduce the rows that are
    contained within the index. By including only the rows that match the filter of
    the `WHERE` clause, the query engine has to consider only those rows in building
    an execution plan; moreover, the cost of scanning a range of rows is less expensive
    than if all the rows were included in the index.


    To illustrate the value in using filtered indexes, consider a scenario where only
    a small subset of the table has values in the column that is being filtered. Listing
    11-25 considers variations of a query. In the first version, the rows where `CertificationDate`
    has a value are returned. The second version returns only rows that have a `CertificationDate`
    between January 1, 2005, and February 1, 2005\. With both of these queries, there
    is no index on the table that will provide an optimal plan for execution since
    all 2,866 pages of the index are accessed during execution (see Figure 11-36).
    Examining both execution plans (Figure 11-37) shows that a clustered index scan
    of `dbo.Contacts` is utilized to find the rows that match the `CertificationDate`
    predicate. An index on the `CertificationDate` column could, as the missing index
    hint suggests, improve the performance of the query.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig37_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig37_HTML.jpg)


    Figure 11-37. Execution plan for Filtered Indexes pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig36_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig36_HTML.jpg)


    Figure 11-36. Statistics I/O results for Filtered Indexes pattern


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    ```

    Listing 11-25. Filtered Indexes Pattern


    Before applying the missing index suggestion, you should consider how the index
    will be used in this and future queries. In this scenario, assume that there will
    never be a query that uses `CertificationDate` when the value is `NULL`. Does
    it make sense then to store the empty values for all the `NULL` rows in the index?
    Given the stated assumption, it doesn’t make sense; doing so would waste space
    in the database and potentially lead to execution plans that were not optimal
    if the index on `CertificationDate` was skipped because the reads for a scan were
    high enough that other indexes were selected.


    In this scenario, it makes sense to filter the rows in the index. To do so, the
    index is created like any other index, except that a `WHERE` clause is added to
    the index (see Listing 11-26). When creating filtered indexes, there are a few
    things to keep in mind about the `WHERE` clause. To start with, the `WHERE` clause
    must be deterministic. It can’t change over time depending on the results of functions
    within the clause. For instance, the `GETDATE()` function can’t be used since
    the value returned changes every millisecond. The second restriction is that only
    simple comparison logic is allowed. This means that the `BETWEEN` and `LIKE` comparisons
    can’t be used. For more information on the restrictions and limitations with filtered
    indexes, refer to Chapter 2.


    Executing the `CertificationDate` queries from Listing 11-26 shows that the filtered
    index provides a significant impact on the performance for the query. In regard
    to the reads incurred, there are now only 2 reads as opposed to the 2,866 reads
    before the index was applied (see Figure 11-38). Also, the execution plans now
    use index seeks for both queries instead of the clustered index scans, as shown
    in Figure 11-39. While these results are to be expected, the other consideration
    with the index is that the new index is comprised of only two pages. As you can
    see in Figure 11-40, the number of pages required for the entire index is substantially
    less than the clustered index and the other nonclustered indexes.


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig40_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig40_HTML.jpg)


    Figure 11-40. Page count comparison for filtered index


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig39_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig39_HTML.jpg)


    Figure 11-39. Execution plan for Filtered Indexes pattern


    ![../images/338675_3_En_11_Chapter/338675_3_En_11_Fig38_HTML.jpg](images/338675_3_En_11_Chapter/338675_3_En_11_Fig38_HTML.jpg)


    Figure 11-38. Statistics I/O results for Filtered Indexes pattern


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_CertificationDate ON dbo.Contacts(CertificationDate)

    INCLUDE (FirstName, LastName)

    WHERE CertificationDate IS NOT NULL;

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    SET STATISTICS IO OFF;

    SELECT OBJECT_NAME(object_id) as table_name

    ,CASE index_id

    WHEN INDEXPROPERTY(object_id , ''IX_Contacts_CertificationDate'', ''IndexID'')
    THEN ''Filtered Index''

    WHEN 1 THEN ''Clustered Index''

    ELSE ''Other Indexes'' END As index_type

    ,index_id

    ,in_row_data_page_count

    ,in_row_reserved_page_count

    ,in_row_used_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = OBJECT_ID(''dbo.Contacts'');

    ```

    Listing 11-26. Filtered Indexes Pattern


    Including only a subset of the rows in a table within an index has a number of
    advantages. One advantage is that since the index is smaller, there are fewer
    pages in the index, which translates directly to lower storage requirements for
    the database. Along the same lines, if there are fewer pages in the index, there
    are fewer opportunities for index fragmentation and less effort required to maintain
    the index. The final advantage of filtered indexes relates to performance and
    plan quality. Since the values in the filtered index are limited, the statistics
    for the index are limited as well. Since there are fewer pages to traverse in
    the filtered index, a scan against a filtered index is almost always less of an
    issue than a scan on the clustered index or heap.'
