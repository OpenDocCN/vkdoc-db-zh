- fmt: '# Columnstore Fragmentation


    Columnstore indexes are one of SQL Server’s newer features. An interesting component
    of columnstore indexes is the read-only nature of the segments. As discussed in
    Chapter [2](#338675_3_En_2_Chapter.xhtml), when new columnstore indexes are added
    to a delta table, the delta table is eventually compressed into a columnstore
    format. Also, since the segments are read-only, deletes don’t immediately impact
    the segments, resulting in fragments of the read-only segments that contain data
    that is no longer part of the table.


    To demonstrate both of these concepts, execute the code in Listing [9-18](#338675_3_En_9_Chapter.xhtml#PC18)
    to prepare a table with a clustered columnstore index. After the table is built,
    the two sets of rows are inserted. The first set contains 1,000 rows, and the
    index is reorganized to force the rowgroup to compress to columnstore format.
    The second set contains 105,000 rows, which is more than the 104,000 threshold
    that automatically triggers use of the columnstore format. As shown in Figure
    [9-16](#338675_3_En_9_Chapter.xhtml#Fig16), the inserted records are all compressed
    to columnstore format.


    ### Note


    Depending on your environment, the script in Listing [9-18](#338675_3_En_9_Chapter.xhtml#PC18)
    can take a while to run.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig16_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig16_HTML.jpg)


    Figure 9-16 Columnstore rowgroup resultset


    ```sql

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactOnlineSalesCI'') IS NOT NULL

    DROP TABLE dbo.FactOnlineSalesCI

    CREATE TABLE dbo.FactOnlineSalesCI(

    [OnlineSalesKey] [int] NOT NULL,

    [DateKey] [datetime] NOT NULL,

    [StoreKey] [int] NOT NULL,

    [ProductKey] [int] NOT NULL,

    [PromotionKey] [int] NOT NULL,

    [CurrencyKey] [int] NOT NULL,

    [CustomerKey] [int] NOT NULL,

    [SalesOrderNumber] [nvarchar](20) NOT NULL,

    [SalesOrderLineNumber] [int] NULL,

    [SalesQuantity] [int] NOT NULL,

    [SalesAmount] [money] NOT NULL,

    [ReturnQuantity] [int] NOT NULL,

    [ReturnAmount] [money] NULL,

    [DiscountQuantity] [int] NULL,

    [DiscountAmount] [money] NULL,

    [TotalCost] [money] NOT NULL,

    [UnitCost] [money] NULL,

    [UnitPrice] [money] NULL,

    [ETLLoadID] [int] NULL,

    [LoadDate] [datetime] NULL,

    [UpdateDate] [datetime] NULL

    )

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT *

    FROM dbo.FactOnlineSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactOnlineSalesCI_CCI ON dbo.FactOnlineSalesCI

    DECLARE @we int= 1

    WHILE @we <= 5

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 1000 *

    FROM dbo.FactOnlineSales

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REORGANIZE

    WITH (COMPRESS_ALL_ROW_GROUPS =ON)

    SET @we += 1

    END

    WHILE @we <= 10

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 105000 *

    FROM dbo.FactOnlineSales

    SET @we += 1

    END

    SELECT*

    FROM sys.column_store_row_groups

    WHERE object_id=OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

    ```

    Listing 9-18 Prepare Columnstore Table


    The piece that is interesting at this point is that the rowgroups created are
    much smaller than the max size for a rowgroup, of about 1 million rows. And since
    they are smaller, there may be an opportunity to optimize the number of pages
    that they use by increasing the number of records per rowgroup. This can be done
    by maintaining the columnstore index and rebuilding it. To show the value in rebuilding
    columnstore indexes, execute the code in Listing [9-19](#338675_3_En_9_Chapter.xhtml#PC19).
    Through this, you can see that the logical reads before the rebuild are 83,423
    over two scan operations and then drop to 833 logical reads after the rebuild,
    shown in Figure [9-17](#338675_3_En_9_Chapter.xhtml#Fig17). This is an almost
    100 percent drop in pages accessed. If you consider the effect of this type of
    maintenance over large fact tables using columnstore indexes, these types of excessive
    allocation of pages will greatly impact performance. Additionally, comparing Figures
    [9-16](#338675_3_En_9_Chapter.xhtml#Fig16) and [9-18](#338675_3_En_9_Chapter.xhtml#Fig18),
    the table also has far fewer rowgroups, from 34 to 14 after the columnstore index
    rebuild.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig18_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig18_HTML.jpg)


    Figure 9-18 Rowgroup statistics after columnstore index rebuild


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig17_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig17_HTML.jpg)


    Figure 9-17 I/O statistics for columnstore table inserts


    ```sql

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    SET STATISTICS IO OFF

    SELECT *

    FROM sys.column_store_row_groups

    WHERE object_id = OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

    ```

    Listing 9-19 Impact of Inserts on Columnstore Table


    The next type of fragmentation that occurs with columnstore indexes is through
    delete operations. While this is called *fragmentation*, in actuality when deletes
    occur on columnstore indexes, the rows are not removed from the indexes; they
    are only marked as deleted. Because of this, pages allocated to a clustered columnstore
    index that have all their records deleted will still be active within the index.


    To show how this impacts, you’ll use the script in Listing [9-20](#338675_3_En_9_Chapter.xhtml#PC20)
    to delete all the 2007 data from the table. Then another statement will rebuild
    the columnstore index. Between these operations, you’ll run an aggregate query
    to provide an operation to see the impact of deletes on the I/O of queries.


    ```sql

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    DELETE FROM dbo.FactOnlineSalesCI

    WHERE DateKey <''2008-01-01''

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    SET STATISTICS IO OFF

    ```

    Listing 9-20 Delete Operations on a Clustered Columnstore Index


    After running these queries and the index is rebuilt, the results are fairly interesting.
    If you start with the first query, there are 659 logical reads for the aggregate
    query, shown in Figure [9-19](#338675_3_En_9_Chapter.xhtml#Fig19). Deleting a
    year’s worth of data results in the aggregate query requiring 79,982 logical reads,
    which is an increase from the original query with 365 fewer rows returned. This
    is because of the pages required to manage the deleted rows. After rebuilding,
    the number of I/Os drops significantly to 444 logical reads.


    ![../images/338675_3_En_9_Chapter/338675_3_En_9_Fig19_HTML.jpg](images/338675_3_En_9_Chapter/338675_3_En_9_Fig19_HTML.jpg)


    Figure 9-19 Statistics I/O results for delete operation demonstration


    Through the addition of new rows and the deletion of existing rows, there are
    reasons to consider the maintenance requirements of columnstore indexes. The issues
    that affect these indexes are not the same as those of traditional clustered indexes,
    but they are significant nonetheless.


    ### Fragmentation Issues


    You’ve seen a number of ways in which indexes can become fragmented, but there
    hasn’t been a discussion about why this is important. There are a couple important
    reasons why fragmentation within indexes can be a problem:


    *   Index I/O


    *   Contiguous reads


    As the fragmentation of an index increases, each of these two areas affects the
    index’s ability to perform well. In some worst-case scenarios, the level of fragmentation
    can be so severe that the query optimizer will stop using the index in query plans.'
