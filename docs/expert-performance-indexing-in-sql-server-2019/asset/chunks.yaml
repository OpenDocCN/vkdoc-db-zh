- fmt: '## Index Operational Statistics


    The third area of statistics to consider is index operational stats. These statistics
    are presented to users through the DMO `sys.dm_db_index_operational_stats`. From
    a high level, this DMO provides low-level information on I/O, locking, latching,
    and access methods that occur on indexes. Through this low-level information,
    you can identify indexes that may be encountering performance issues and start
    to understand what is leading to those performance issues. At the end of this
    section, you will understand the statistics provided in the DMO and know how to
    investigate indexes through these statistics.


    Unlike the DMO in the previous section, `sys.dm_db_index_operational_stats` is
    a dynamic management function (DMF). Because of this, the DMF requires a number
    of parameters to be supplied when it is used. Table [3-11](#338675_3_En_3_Chapter.xhtml#Tab11)
    details the parameters for the DMF.


    Table 3-11


    Parameters for sys.dm_db_index_operational_stats


    | Parameter Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database where the indexes reside. Providing
    the value `0`, `NULL`, or `DEFAULT` will return index information for all databases.
    The function `DB_ID` can be used in this parameter. |

    | `object_id` | `int` | Object ID of the table or view for which statistics should
    be returned. Providing the value `0`, `NULL`, or `DEFAULT` will return index information
    for all tables or views in the database. |

    | `index_id` | `int` | Index ID of the index for which statistics should be returned.
    Providing the value `-1`, `NULL`, or `DEFAULT` will return statistics for all
    indexes on the table or view. |

    | `partition_number` | `int` | Partition number on an index in which statistics
    should be returned. Providing the value `0`, `NULL`, or `DEFAULT` will return
    statistics information for all partitions on an index. |


    Through the parameters, statistics on indexes can be as widely or narrowly focused
    as necessary. This flexibility is useful since `sys.dm_db_index_operational_stats`
    does not allow the use of the `CROSS APPLY` or `OUTER APPLY` operator. When passing
    the parameters into the DMF, the syntax for doing so is defined in Listing [3-23](#338675_3_En_3_Chapter.xhtml#PC23).


    ```

    sys.dm_db_index_operational_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | 0 | NULL | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    )

    ```


    Listing 3-23

    Index Operational Stats Syntax


    ### Note


    The DMF `sys.dm_db_index_operational_stats` can accept the use of the Transact
    SQL functions `DB_ID()` and `OBJECT_ID()`. These functions can be used for the
    parameters `database_id` and `object_id`, respectively.


    ### Header Columns


    To start looking at the statistics, you need to identify the header columns that
    will be used with all the resulting queries. For every row that is returned through
    the DMF, there will be a `database_id`, `object_id`, `index_id`, and `partition_number`.
    These columns are defined further in Table [3-12](#338675_3_En_3_Chapter.xhtml#Tab12).
    As is implied through the `partition_number`, the granularity of the results for
    this DMF is at the partition level. For nonpartitioned indexes, the partition
    number will be 1.


    Table 3-12


    Header Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database on which the table or view is
    defined. |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `hobt_id` | `bigint` | ID used to identify the heap or B-tree (hobt) associated
    with an index partition.  New since SQL Server 2016. |


    The header columns provide the basis for understanding to which indexes the statistics
    apply. This will help provide perspective regarding the statistics returned. Also,
    they can be used to join to catalog views, such as `sys.indexes`, to provide the
    names of the indexes.


    The useful information in this DMF comes in the rest of the columns returned by
    the function. The information that can be returned provides insight into DML activity,
    the page allocation cycle, data access patterns, index contention, and disk activity.
    In the following sections, you’ll look into the columns of the DMF that provide
    statistics for this information.


    ### DML Activity


    The place to begin when investigating the operation stats on an index is with
    the DML activity on the index. Table [3-13](#338675_3_En_3_Chapter.xhtml#Tab13)
    lists the columns that represent this activity. These columns provide a count
    of the number of rows that are affected by DML operations. The statistics that
    follow are similar to those in `sys.dm_db_index_usage` but with a few differences
    in perspective that will be discussed next.


    Table 3-13


    DML Activity Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_insert_count` | `bigint` | Cumulative count of leaf-level rows inserted.
    |

    | `leaf_delete_count` | `bigint` | Cumulative count of leaf-level rows deleted.
    |

    | `leaf_update_count` | `bigint` | Cumulative count of leaf-level rows updated.
    |

    | `leaf_ghost_count` | `bigint` | Cumulative count of leaf-level rows that are
    marked to be deleted but not yet removed. |

    | `nonleaf_insert_count` | `bigint` | Cumulative count of inserts above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_delete_count` | `bigint` | Cumulative count of deletes above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_update_count` | `bigint` | Cumulative count of updates above the leaf
    level. For heaps, this value will always be `0`. |


    Within `sys.dm_db_index_operational_stats`, there are two areas where DML activity
    can be tracked. These are at the leaf and nonleaf levels. These areas of DML activity
    were discussed in Chapter [2](#338675_3_En_2_Chapter.xhtml); for more information
    on leaf and nonleaf pages, refer to that chapter.


    The difference between these two types of data changes is important to help identify
    whether there are changes as a result of DML operations. This means that leaf-level
    DML activity is a direct result of `INSERT`, `UPDATE`, and `DELETE` statements.
    The nonleaf-level DML activity happens when leaf-level activity results in a change
    in how the index is structured and isn’t something that can be directly impacted
    with an `INSERT`, `UPDATE`, or `DELETE` statement.


    Both leaf-level and nonleaf-level DML activities are broken apart into statistics
    based on the type of DML operation that has occurred. As previously indicated,
    DML activity monitors `INSERT`, `UPDATE`, and `DELETE` activities. For each of
    these operations, there is a column in `sys.dm_db_index_operational_stats`. Additionally,
    there is a column that counts records that have been ghosted off the leaf-level
    DML activity.


    During `DELETE` operations, rows affected by the statement are deleted in a two-phase
    operation. Initially, the records are marked for deletion. When this occurs, the
    records are referred to as being ghosted; the rows in this state are counted in
    `leaf_ghost_count`. At regular intervals, a cleanup thread within SQL Server will
    go through and perform an actual delete operation on rows marked as ghosted. At
    that point, the records will be counted in the `leaf_delete_count`. This process
    helps in the performance of delete operations since the actual delete of a row
    happens after the transaction is committed. Also, in the event of transaction
    rollback, the ghost flag on a row is all that needs to change rather than an attempt
    to re-create the row in the table. This activity occurs only at the leaf level;
    nonleaf pages are deleted whenever all the rows associated with the pages have
    been deleted or otherwise removed.'
