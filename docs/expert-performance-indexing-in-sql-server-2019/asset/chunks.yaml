    *   引导页

    *   页面可用空间（PFS）页

    *   全局分配映射（GAM）页

    *   共享全局分配映射（SGAM）页

    *   差异更改映射（DIFF）页

    *   最小日志（ML）页

    *   索引分配映射（IAM）页

    *   数据页

    *   索引页

    *   大对象（文本和图像）页


    接下来的几节将扩展页面类型并解释它们的使用方式。虽然并非所有页面类型都直接涉及索引，但将定义和解释每一种类型，以帮助提供整体图景。对于每个数据库，页面布局都有相似之处。例如，在每个数据库的第一个文件中，页面布局如图
    `2-5` 所示。可用的页面类型比图中显示的要多，但正如对每种页面类型的考察将显示的，只有最初几个页面中的类型是固定的。许多其他类型以由数据库中的数据决定的模式出现。


    ![../images/338675_3_En_2_Chapter/338675_3_En_2_Fig5_HTML.jpg](img/338675_3_En_2_Fig5_HTML.jpg)


    图 2-5：数据文件页面


    ### 注意


    数据库日志文件不使用页面架构。页面结构仅适用于数据库数据文件。日志文件架构的讨论超出了本书的范围。


    ### 文件头页


    任何数据库数据文件中的第一页是文件头页，如图 `2-5` 所示。由于这是第一页，其编号始终为 `0`。文件头页包含有关数据库文件的元数据信息。此页上的信息包括：


    *   文件 ID

    *   文件组 ID

    *   文件的当前大小

    *   最大文件大小

    *   扇区大小

    *   LSN 信息


    文件头页上还有许多关于文件的其他细节，但基本上这些信息对于索引内部结构无关紧要。


    ### 引导页


    引导页类似于文件头页，因为它提供元数据信息。不过，此页提供的是数据库本身的元数据信息，而不是数据文件的。每个数据库有一个引导页，它位于数据库的第一个数据文件的第
    `9` 页（参见图 `2-5`）。引导页上的一些信息包括数据库的当前版本、数据库的创建日期和版本、数据库名称、数据库 ID 和兼容性级别。


    引导页上的一个重要属性是 `dbi_dbccLastKnownGood` 属性。此属性提供了上次已知成功完成的 `DBCC CHECKDB` 的日期。虽然数据库维护不在本书的范围内，但定期对数据库进行一致性检查对于验证数据是否保持可用至关重要。

    '
- fmt: '### Page Free Space Page


    To track whether pages have space available for inserting rows, each data file
    contains Page Free Space (`PFS`) pages. These pages, which are the second page
    of the data file (see Figure [2-5](#338675_3_En_2_Chapter.xhtml#Fig5)) and located
    every 8,088 pages after that, track the amount of free space in the database.
    Each byte on the `PFS` page represents one subsequent page in the data file and
    provides some simple allocation information regarding the page; namely, it determines
    the approximate amount of free space on the page.


    When the database engine needs to store `LOB` data or data for heaps, it needs
    to know where the next available page is and how full the currently allocated
    pages are. This functionality is provided by `PFS` pages. Within each byte are
    flags that identify the current amount of space that is being used. Bits 0–2 determine
    whether the page is in one of the following free space states:


    *   Page is empty.

    *   1–50 percent full.

    *   51–80 percent full.

    *   81–95 percent full.

    *   96–100 percent full.


    Along with free space, `PFS` pages also contain bits to identify a few other types
    of information for a page. For instance, bit 3 determines whether there are ghost
    records on a page. Bit 4 identifies whether the page is part of the Index Allocation
    Map, described later in this chapter. Bit 5 states whether the page is in a mixed
    extent. And finally, bit 6 identifies whether a page has been allocated.


    Through the additional flags, or bits, `SQL Server` can determine what and how
    a page is being used from a high level. It can determine whether it is currently
    allocated. If not, is it available for `LOB` or heap data? If it is currently
    allocated, the `PFS` page then provides the first purpose described earlier in
    this section.


    Finally, when the ghost cleanup process runs, the process doesn’t need to check
    every page in a database for records to clean up. Instead, the `PFS` page can
    be checked, and only those pages with ghost records need to be accessed.


    ### Note


    The indexes themselves handle free space and page allocation for non-`LOB` data
    and indexes. The allocation of pages for these structures is determined by the
    definition of the structure.


    ### Global Allocation Map Page


    Similar to the `PFS` page is the Global Allocation Map (`GAM`) page. This page
    determines whether an extent has been designated for use as a uniform extent.
    A secondary purpose of the `GAM` page is helping determine whether the extent
    is free and available for allocation.


    Each `GAM` page provides a map of all subsequent extents in each `GAM` interval.
    A `GAM` interval consists of the 64,000 extents, or 4 `GB`, that follow the `GAM`
    page. Each bit on the `GAM` page represents one extent following the `GAM` page.
    The first `GAM` page is located on page 2 of the database file (see Figure [2-5](#338675_3_En_2_Chapter.xhtml#Fig5)).


    To determine whether an extent has been allocated to a uniform extent, `SQL Server`
    checks the bit in the `GAM` page that represents the extent. If the extent is
    allocated, then the bit is set to `0`. When it is set to `1`, the extent is free
    and available for other purposes.


    ### Shared Global Allocation Map Page


    Nearly identically to the `GAM` page is the Shared Global Allocation Map (`SGAM`)
    page. The primary difference between the pages is that the `SGAM` page determines
    whether an extent is allocated as a mixed extent. Like the `GAM` page, the `SGAM`
    page is also used to determine whether pages are available for allocation.


    Each `SGAM` page provides a map of all subsequent extents in each `SGAM` interval.
    An `SGAM` interval consists of the 64,000 extents, or 4 `GB`, that follow the
    `SGAM` page. Each bit on the `SGAM` page represents one extent following the `SGAM`
    page. The first `SGAM` page is located on page 3, after the `GAM` page of the
    database file (see Figure [2-5](#338675_3_En_2_Chapter.xhtml#Fig5)).


    The `SGAM` pages determine when an extent has been allocated for use as a mixed
    extent. If the extent is allocated for this purpose and has a free page, the bit
    is set to `1`. When it is set to `0`, either the extent is not used as a mixed
    extent or it is a mixed extent with all pages in use.


    ### Differential Changed Map Page


    The next page to discuss is the Differential Changed Map (`DCM`) page. This page
    is used to determine whether an extent in a `GAM` interval has changed. When an
    extent changes, a bit value is changed from `0` to `1`. These bits are stored
    in a bitmap row on the `DCM` page with each bit representing an extent.


    `DCM` pages are used to track which extents have changed between full database
    backups. Whenever a full database backup occurs, all the bits on the `DCM` page
    are reset to `0`. The bit then changes back to `1` when a change occurs within
    the associated extent.


    The primary use for `DCM` pages is to provide a list of extents that have been
    modified for differential backups. Instead of checking every page or extent in
    the database to see whether it has changed, the `DCM` pages provide the list of
    extents to back up.


    The first `DCM` page is located at page 6 of the data file. Subsequent `DCM` pages
    occur for each `GAM` interval in the data file.


    ### Minimally Logged Page


    After the `DCM` page is the Minimally Logged (`ML`) page, formerly known as the
    Bulk Changed Map page. The `ML` page is used to indicate when an extent in a `GAM`
    interval has been modified by a minimally logged operation. Any extent that is
    affected by a minimally logged operation will have its bit value set to `1`, and
    those that have not will be set to `0`. The bits are stored in a bitmap row on
    the `ML` page with each bit representing an extent in the `GAM` interval.


    As the former name of `ML` pages implied (`Bulk Changed Map`), these pages are
    used in conjunction with the `BULK_LOGGED` recovery model. When the database uses
    this recovery model, the `ML` page is used to identify extents that were modified
    with a minimally logged operation since the last transaction log backup. When
    the transaction log backup completes, the bits on the `ML` page are reset to `0`.


    The first `ML` page is located at page 7 of the data file. Subsequent `ML` pages
    occur for each `GAM` interval in the data file.


    ### Index Allocation Map Page


    Most of the pages discussed so far provide information about whether there is
    data on the pages they cover. More important than whether a page is open and available,
    `SQL Server` needs to know whether the information on a page is associated to
    a specific table or index. The pages that provide this information are the Index
    Allocation Map (`IAM`) pages.


    Every table or index first starts with an `IAM` page. This page indicates which
    extents within a `GAM` interval, discussed previously, are associated with the
    table or index. If a table or index crosses more than one `GAM` interval, there
    will be more than one `IAM` page for the table or index.


    There are four types of pages that an `IAM` page associates with a table or index.
    These are data, index, large object, and small-large object pages. The `IAM` page
    accomplishes the association of the pages to the table or index through a bitmap
    row on the `IAM` page.


    Besides the bitmap row, there is also an `IAM` header row on the `IAM` page. The
    `IAM` header provides the sequence number of `IAM` pages for a table or index.
    It also contains the starting page for the `GAM` interval that the `IAM` page
    is associated with. Finally, the row contains a single-page allocation array.
    This is used when less than an extent has been allocated to a table or index.


    The value in understanding the `IAM` page is that it provides a map and root through
    which all the pages of a table or indexes come together. This page is used when
    all of the extents for a table or index need to be determined.'
