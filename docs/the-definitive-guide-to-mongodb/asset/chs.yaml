  \ 21:21:22.018 dbexit: really exiting now\n```\n\n在此示例中，`repair` 检测到 `admin` 数据库可能是在旧版\
  \ MongoDB 下创建的，需要升级其存储格式以匹配当前运行的服务器版本。\n\n请注意，在带有 `--repair` 选项运行 `mongod` 工具后服务器退出是正常现象；要使其重新上线，只需再次启动它且不指定\
  \ `--repair` 选项即可。\n\n修复过程完成后，您应该能够像往常一样启动服务器，然后从备份中恢复任何丢失的数据。\n\n如果您正在尝试修复一个大型数据库，可能会发现驱动器磁盘空间不足，因为\
  \ MongoDB 可能需要在同一驱动器上（参见上例中的 `.../$tmp_repairDatabase_0/..` 目录）创建数据库文件的临时副本。\n\n\
  为了克服这个潜在问题，MongoDB 修复工具支持一个名为 `--repairpath` 的额外命令行参数。您可以使用此参数指定一个有足够空间的驱动器，来存放重建过程中创建的临时文件，如下例所示：\n\
  \n```\n$ mongod -f /etc/mongodb.conf --repair --repairpath /mnt/bigdrive/tempdir\n\
  ```\n\n\n\n#### 验证单个集合\n\n有时，你可能怀疑正在运行的服务器上的数据出了问题。在这种情况下，你可以使用 MongoDB 附带的一些工具来帮助你判断目标服务器是否已损坏或受损。\n\
  \n你可以使用 `validate` 选项来验证数据库中一个集合的内容。下一个示例展示了如何对一个包含一百万条记录的集合运行 `validate` 选项：\n\n\
  ```\n$mongo\n> use blog\nswitched to db blog\n>db.posts.ensureIndex({Author:1})\n\
  > db.posts.validate()\n{\n     \"ns\" : \"blog.posts\",\n     \"firstExtent\" :\
  \ \"0:f000 ns:blog.posts\",\n     \"lastExtent\" : \"0:2b9000 ns:blog.posts\",\n\
  \     \"extentCount\" : 6,\n     \"datasize\" : 6717520,\n     \"nrecords\" : 29997,\n\
  \     \"lastExtentSize\" : 8388608,\n     \"padding\" : 1,\n     \"firstExtentDetails\"\
  \ : {\n          \"loc\" : \"0:f000\",\n          \"xnext\" : \"0:11000\",\n   \
  \       \"xprev\" : \"null\",\n          \"nsdiag\" : \"blog.posts\",\n        \
  \  \"size\" : 8192,\n          \"firstRecord\" : \"0:f0b0\",\n          \"lastRecord\"\
  \ : \"0:10e50\"\n     },\n     \"lastExtentDetails\" : {\n          \"loc\" : \"\
  0:2b9000\",\n          \"xnext\" : \"null\",\n          \"xprev\" : \"0:b9000\"\
  ,\n          \"nsdiag\" : \"blog.posts\",\n          \"size\" : 8388608,\n     \
  \     \"firstRecord\" : \"0:2b90b0\",\n          \"lastRecord\" : \"0:6ec830\"\n\
  \     },\n     \"deletedCount\" : 4,\n     \"deletedSize\" : 3983552,\n     \"nIndexes\"\
  \ : 2,\n     \"keysPerIndex\" : {\n          \"blog.posts.$_id_\" : 29997,\n   \
  \       \"blog.posts.$Author_1\" : 29997\n     },\n     \"valid\" : true,\n    \
  \ \"errors\" : [ ],\n     \"warning\" : \"Some checks omitted for speed. use {full:true}\
  \ option to do more thorough scan.\",\n     \"ok\" : 1\n}\n```\n\n前面的示例大约需要 30 秒才能完成。默认情况下，`validate`\
  \ 选项会检查数据文件和索引，并在完成时提供有关集合的一些统计信息。该选项会告诉你数据文件或索引是否有任何问题，但它不会检查每个文档的正确性。如果你需要检查每个文档，那么你可以（如输出中所建议的）运行带\
  \ `{full: true}` 选项的 `validate`，通过向函数调用添加 `true` 参数来调用，如下所示：`db.posts.validate(true)`。\n\
  \n如果你有一个非常大的数据库，并且只想验证索引，你也可以使用 `validate` 选项。在当前版本（2.6.0）中，shell 中没有为此提供辅助命令。但这并不妨碍你，因为你可以轻松地使用\
  \ `runCommand` 选项完成这个索引验证：\n\n```\n$mongo\n>use blog\n>db.runCommand({validate:\"\
  posts\", scandata:false})\n```\n\n在这种情况下，服务器不会扫描数据文件；它只是报告存储的有关集合的信息。\n\n#### 修复集合验证错误\n\
  \n如果你对集合运行验证时出现了错误（这将在验证文档的 `errors` 部分注明），你有几种修复数据的选择。再次强调，拥有良好的备份其重要性无论如何强调都不为过。在直接恢复备份之前，你应该查看\
  \ MongoDB 实例的日志，看看是否有任何关于错误性质的附加信息；如果有，这应指导你采取后续步骤。\n\n##### 修复集合的索引\n\n如果验证过程显示索引已损坏，请使用\
  \ `reIndex()` 函数对受影响的集合重新索引。在下面的示例中，你使用 `reIndex()` 函数对博客的 `posts` 集合重新索引，之前你已经为该集合添加了\
  \ `author` 索引：\n\n```\n$mongo\n>use blog\n> db.posts.reIndex()\n{\n     \"nIndexesWas\"\
  \ : 2,\n     \"msg\" : \"indexes dropped for collection\",\n     \"nIndexes\" :\
  \ 2,\n     \"indexes\" : [\n          {\n               \"key\" : {\n          \
  \          \"_id\" : 1\n               },\n               \"ns\" : \"blog.posts\"\
  ,\n               \"name\" : \"_id_\"\n          },\n          {\n             \
  \  \"key\" : {\n                    \"Author\" : 1\n               },\n        \
  \       \"ns\" : \"blog.posts\",\n               \"name\" : \"Author_1\"\n     \
  \     }\n     ],\n     \"ok\" : 1\n}\n```\n\nMongoDB 服务器将删除集合上所有当前的索引并重建它们；但是，如果你使用数据库的\
  \ `repair` 选项，它也会对数据库中的所有集合运行 `reIndex()` 函数。\n\n##### 修复集合的数据文件\n\n修复数据库中所有数据文件的最佳（也是最危险的）方法是使用服务器的\
  \ `--repair` 选项或 shell 中的 `db.repairDatabase()` 命令。后者会修复单个数据库中的所有集合文件，然后重新索引所有已定义的索引。然而，`repairDatabase()`\
  \ 不适合在正在运行的服务器上运行，因为在重建数据文件时，它会阻止任何对数据的请求。这会导致在数据库修复完成期间阻塞所有读写操作。以下代码片段展示了使用 `repairDatabase()`\
  \ 函数的语法：\n\n```\n$mongo\n>use blog\n>db.repairDatabase()\n{ \"ok\" : 1 }\n```\n\n\
  > Warning\nMongoDB 的修复是一个强力选项。它试图修复和重建你的数据结构和索引。它通过尝试从磁盘读取然后重建整个数据结构来实现这一点。如果可能，你应该尝试从备份中恢复；`repairDatabase()`\
  \ 应仅作为最后手段使用。\n\n##### 压实集合的数据文件\n\n由于 MongoDB 内部分配数据文件的方式，你可能会遇到俗称的“瑞士奶酪”问题，意思是磁盘数据结构中留下了小的空数据存储空间段。这可能是个问题，因为它意味着你的数据文件中有一大部分未被使用。虽然重建整个数据结构的修复可能会有帮助，但也可能带来其他意外后果。`compact`\
  \ 命令将对现有数据文件中给定集合的数据结构进行碎片整理和重组，但它不会回收磁盘空间。\n\n```\n$mongo\n>use blog\n> db.runCommand({compact:\"\
  posts\"})\n{ \"ok\" : 1 }\n```\n\n\n\n#### 升级 MongoDB\n\n有时，新版 MongoDB 需要你升级数据库文件的格式。MongoDB,\
  \ Inc. 的团队了解在运行中的生产服务上执行升级所造成的影响（包括由此产生的停机时间）；然而，有时为了支持需求旺盛的新功能，升级是必须进行的。\n\n**警告**\n\
  \n在尝试任何升级过程之前，**务必**对你的数据进行完整备份。此外，你还应始终查阅发布说明，这些说明可在 [`http://docs.mongodb.org/manual/release-notes/`](http://docs.mongodb.org/manual/release-notes/)\
  \ 获取。\n\nMongoDB 的开发者会尽量预见升级过程中可能出现的所有问题；尽管如此，你也必须采取措施保护自己。升级通常会以新格式重写系统中的每一段数据，这意味着该过程中哪怕最微小的问题都可能带来灾难性的后果。\n\
  \n以下列表将引导你完成升级数据库服务器所需的正确步骤：\n\n1.  备份你的数据并确保备份是可用的。如果可能，将备份恢复到另一台服务器并验证其完好无损。\n\
  2.  停止你的应用程序或将其流量导向另一台服务器。\n3.  停止你的 MongoDB 服务器。\n4.  将你的 MongoDB 服务器代码升级到所需版本。\n\
  5.  使用 `mongo` shell 对数据执行初步的健全性检查。\n6.  如果有任何可疑之处，使用验证工具检查数据。\n7.  当你确信一切看起来正常时，重新启用你的应用程序。\n\
  8.  在重新开放服务或将流量导回此服务器之前，仔细测试你的应用程序。\n\n#### MongoDB 的滚动升级\n\n拥有副本集的一大优点是，它可用于执行滚动升级。这是一种旨在最小化此类重大变更所带来的潜在停机时间和影响的方法。除了遵循下面概述的流程外，你还应始终进行备份并在非生产环境中进行测试。一旦你已尽职调查以确保系统是可恢复的，就可以遵循此流程：\n\
  \n1.  逐个停止并升级每一个从节点。\n2.  在主节点上运行 `rs.stepDown()` 命令。一个已升级的从节点将接替成为主节点。\n3.  升级原主节点。\n\
  \n#### 监控 MongoDB\n\nMongoDB 发行版包含一个名为 `mongostat` 的简单状态监控工具。此工具主要用于提供服务器上正在发生什么的简明概览（参见图\
  \ 9-5）。\n\n![A978-1-4302-5822-3_9_Fig5_HTML.jpg](img/A978-1-4302-5822-3_9_Fig5_HTML.jpg)\n\
  *图 9–5. 使用 `mongostat` 实用工具监控 MongoDB 状态*\n\n此工具生成的统计信息虽然不全面，但确实提供了 MongoDB 安装运行状况的良好概览。例如，此显示让你可以看到数据库操作执行的频率、索引的命中率以及应用程序因等待数据库锁释放而被阻塞的时间量。\n\
  \n主要关注的列是前六列，它们显示了 `mongod` 服务器处理特定操作（例如插入或查询）的速率。在诊断安装问题时值得留意的其他列包括：\n\n*   `Pagefaults`：表示你的\
  \ MongoDB 实例需要从磁盘读取数据以完成查询。这通常是性能不佳的指标，表明你日常操作通常需要的所有数据无法容纳在 MongoDB 可用的 RAM 中。你应该检查是否存在可能正在扫描所有文档而未使用索引的查询，或者你可能需要迁移到具有更多可用\
  \ RAM 的服务器。\n*   `queues`：表示正在排队等待执行的操作数量。由于 MongoDB 允许一个写入器（插入、更新和删除）和多个读取器（查询），这可能导致读查询被性能不佳的写入操作阻塞的情况。更糟糕的是，你可能陷入多个读写操作被一个性能不佳的写入操作阻塞的境地。检查哪些查询可能阻塞了其他查询的执行。\n\
  *   `% locked`：显示给定集合占用写锁的时间百分比。此处的数字非常高表明你正在执行一个或多个几乎占据整个时间窗口的写入操作。高 `% locked`\
  \ 很可能会影响所有查询的性能。检查是否存在性能不佳的写入操作，或者你的系统是否在发生页面错误，这可能表明需要更多 RAM。这也可能与模式问题有关，例如文档中存在非常大的数组，并且请记住，在\
  \ MongoDB 2.2 之前，锁是在每个实例级别进行的，因此升级可能有助于通过更新的并发性改进来降低此值。\n\n##### 编写你自己的统计监控工具\n\n\
  `mongostat` 提供的许多信息与你从 `db.serverStatus()` 调用中获得的信息相同。创建一个使用此 API 每隔几秒轮询服务器并将结果放入\
  \ MongoDB 集合的服务并非难事。\n\n结合应用一些索引、精心构建的查询和一个绘图包，你将能使用这样的简单实时监控器来生成历史日志。\n\nMongoDB\
  \ 还有许多第三方适配器可用，这些适配器允许你使用常见的开源或商业监控系统，包括 Nagios、Ganglia 和 Cacti 等工具。如前所述，MongoDB\
  \ 手册在其网站上有一个页面，分享了有关 MongoDB 可用监控接口的最新信息（有关此主题的更多信息，请参阅 [`http://docs.mongodb.org/manual/administration/monitoring/`](http://docs.mongodb.org/manual/administration/monitoring/)）。\n\
  \n#### 使用 MongoDB 管理服务 (MMS)\n\n到目前为止讨论的大部分统计信息也可通过 MongoDB 管理服务（也称为 MMS）获取。MMS\
  \ 是由 MongoDB, Inc. 提供的监控服务。它提供了一个可以安装在本地机器上的代理。安装后，你可以通过 MMS 网页添加你的服务器，以指示代理监控它们。监控开始后，你就可以深入查看特定主机，查看该\
  \ MongoDB 实例的性能统计图。你可以监控从单个 MongoDB 实例到副本集，一直到完整的分片集群（包括配置服务器和 `mongos`）的所有内容。MMS\
  \ 还提供了查看这些组中所有单独成员的功能，或者查看每个组的汇总统计信息。然后，你可以根据特定的性能要求或 MongoDB 实例中发生的事件配置警报并将其发送给你。你可以在\
  \ `mms.mongodb.com` 注册 MMS，我们强烈建议你这样做。没有什么比能够深入了解每个 MongoDB 节点的具体运行情况更强大的了（参见图 9-6\
  \ 的示例）。\n\n![A978-1-4302-5822-3_9_Fig6_HTML.jpg](img/A978-1-4302-5822-3_9_Fig6_HTML.jpg)\n\
  *图 9–6. 通过 MMS 查看统计信息*\n\n\n#### 总结\n\n让您的 MongoDB 保持顺畅运行通常只需很少的精力。在本章中，您已经了解了如何使用\
  \ MongoDB 发行版自带的工具来管理和维护您的系统，以及如何及时发现并处理可能出现的问题。\n\n通过学习本章，您现在应该已经掌握了备份、恢复、升级和监控\
  \ MongoDB 实例的技能。您应该熟悉诸如 `mongodump` 和 `mongorestore` 之类的工具，知道如何仅从特定集合导入或导出数据，并熟悉一些管理命令，这些命令可用于从您的\
  \ MongoDB 实例中获取性能和使用情况统计信息。\n\n最后，必须强调（您可能也从前面的内容中领会到了），本章最重要的收获是：作为数据库系统的管理员，您的首要职责是确保为数据提供可靠的备份和恢复方案。\n\
  \n### 10. 优化\n\n#### 摘要\n\n有一个半开玩笑的说法，据说出自一位不知名的推特用户：“如果一个 MongoDB 查询运行时间超过 0 毫秒，那就说明出问题了。”\
  \ 这种言论典型地反映了该产品在 2009 年首次亮相时所引发的各种热议。\n\n现实情况是 MongoDB 的速度非常快。但如果您给它提供了错误的数据结构，或者没有为集合建立正确的索引，MongoDB\
  \ 就会像任何数据存储系统一样，性能急剧下降。\n\nMongoDB 还包含一些高级功能，这些功能需要一些调优才能以最佳效率运行。\n\n您的数据模式设计也会对性能产生重大影响；在本章中，我们将探讨一些技术，将您的数据塑造成能够最大限度发挥\
  \ MongoDB 优势、同时最小化其劣势的形式。\n\n在探讨如何提高服务器上运行的查询性能或优化数据结构之前，我们将首先了解 MongoDB 与运行硬件之间的交互方式以及影响性能的因素。然后，我们将研究索引以及如何利用它们来提高查询性能，同时学习如何对您的\
  \ MongoDB 实例进行性能分析，以确定哪些查询（如果有的话）运行不佳。\n\n#### 为优化性能调整服务器硬件\n\n通常，您可以对数据库服务器进行的最快、最经济的优化就是为其配置大小合适的硬件。如果数据库服务器内存太少或使用慢速硬盘，可能会严重影响数据库性能。虽然某些限制对于开发环境（服务器可能运行在开发者的本地工作站上）来说是可以接受的，但对于生产应用来说可能就无法接受了，在生产环境中，必须仔细计算硬件配置才能获得最佳性能。\n\
  \n##### 理解 MongoDB 如何使用内存\n\nMongoDB 使用 `内存映射文件 I/O` 来访问其底层数据存储。这种文件 I/O 方法有一些您应该了解的特性，因为它们可能会影响您运行\
  \ MongoDB 的操作系统类型以及您安装的内存容量。\n\n内存映射文件的第一个显著特性是，在现代 64 位操作系统上，可以管理的最大文件大小在 Linux\
  \ 上约为 128TB（受 Linux 虚拟内存地址限制），在 Windows 上约为 8TB（启用日志时为 4TB），这是 Windows 对内存映射文件的限制。在\
  \ 32 位操作系统上，您只能使用最多 2GB 的数据，因此除非运行小型开发环境，否则不建议使用 32 位操作系统。\n\n第二个显著特性是，内存映射文件使用操作系统的虚拟内存系统，根据需要将数据库文件的所需部分映射到\
  \ `RAM` 中。这可能会造成一种略显惊人的印象，即 MongoDB 用尽了您系统的所有 `RAM`。但这并非实际情况，因为 MongoDB 会与其他应用程序共享虚拟地址空间。并且操作系统会在需要时将内存释放给其他进程。使用\
  \ `空闲内存总量` 作为内存消耗过多的指标并不是一个好的做法，因为一个好的操作系统会确保几乎没有“空闲”内存。您所有昂贵的内存都会通过缓存或缓冲 `磁盘 I/O`\
  \ 得到充分利用。空闲内存就是浪费的内存。\n\n通过提供足够容量的内存，MongoDB 可以将更多所需的数据映射到内存中，从而减少对昂贵 `磁盘 I/O` 的需求。\n\
  \n一般来说，您分配给 MongoDB 的内存越多，其运行速度就越快。但是，如果您的数据库只有 2GB，那么增加超过 2-3GB 的内存不会带来太大差别，因为整个数据库无论如何都会驻留在\
  \ RAM 中。\n\n##### 理解工作集大小\n\n现在我们需要讨论与 MongoDB 实例性能调优相关的更复杂的问题之一，即 `工作集大小`。这个大小代表了\
  \ MongoDB 实例中存储的、在“常规使用过程中”将被访问的数据量。仅这个短语就表明这是一个主观的度量，并且难以获得精确的数值。\n\n尽管难以量化，但理解工作集大小的影响将帮助您更好地优化\
  \ MongoDB 实例。主要原则是，对于大多数安装环境，只有一部分数据需要在常规操作中访问。了解您将经常处理数据的哪一部分，可以让您正确规划硬件大小，从而提升性能。\n\
  \n\n##### 选择合适的数据库服务器硬件\n\n目前存在一种普遍趋势，即倾向于采用低功耗（节能）系统来托管服务。然而，许多低功耗服务器为了实现更低的功耗，采用了笔记本或便携式电脑的组件。不幸的是，质量较低的服务器硬件，特别是可能使用更便宜的磁盘驱动器。这类驱动器不适合于重负荷的服务器应用，因为其磁盘转速低，这会减慢数据传入和传出驱动器的速率。此外，请确保你使用的是值得信赖、信誉良好的供应商，他们能组装出针对服务器操作进行优化的系统。值得一提的是，如今也有更快、更现代的驱动器，例如`SSD`，它们能提供显著的性能提升。如果条件允许，`MongoDB,\
  \ Inc.` 团队推荐使用 `RAID10` 来兼顾性能和冗余。对于云服务用户来说，从 `Amazon` 等提供商获取 `Provisioned IOPS`\
  \ 等资源是提升磁盘性能和可靠性的绝佳途径。\n\n如果你计划使用复制或任何需要通过网络连接进行频繁读取的备份系统，你应该考虑安装一块额外的网卡并组建一个独立的网络，以便服务器之间能够相互通信。这样可以减少用于连接应用程序和服务器的网络接口上所传输和接收的数据量，这同样会影响应用程序的性能。\n\
  \n在购买硬件时，可能最需要关注的是 `RAM`。因为 `MongoDB` 使用 `内存映射文件`，拥有足够的空间来存放必要数据，并使其能被快速访问，是确保高性能的好方法。这里就涉及到了之前讨论过的\
  \ `工作集` 概念。在购买硬件时，关键是预估你需要为数据分配多少空间。最后，请记住，你不需要去买 512GB 的 `RAM` 并安装在一台服务器上；你可以使用\
  \ `分片`（在第 12 章中讨论）来分散数据负载。\n\n#### 评估查询性能\n\n`MongoDB` 有两个主要工具用于优化查询性能：`explain()`\
  \ 和 `MongoDB Profiler`（分析器）。分析器是一个很好的工具，可用于发现那些性能不佳的查询，并筛选出待进一步检查的候选查询；而 `explain()`\
  \ 则适用于深入调查单个查询，以便确定其执行情况如何。\n\n熟悉 `MySQL` 的用户可能也熟悉 `慢查询日志` 的使用，它可以帮助你发现那些耗时较长的查询；`MongoDB`\
  \ 使用分析器来提供此功能。\n\n##### MongoDB 分析器\n\n`MongoDB 分析器` 是一个工具，它会记录所有满足触发条件的查询的统计信息和执行计划详情。你可以通过使用\
  \ `--profile` 和 `--slowms` 选项来启动 `MongoD` 进程，从而在每个数据库上单独启用此工具，或对所有数据库启用（稍后会详细解释这些值的含义）。如果你是以配置文件方式启动\
  \ `MongoD` 进程，这些选项也可以添加到你的 `mongodb.conf` 文件中。\n\n一旦分析器被启用，`MongoDB` 会为应用程序提交的每个查询，插入一个包含其性能和执行细节信息的文档到一个名为\
  \ `system.profile` 的特殊固定集合中。你可以使用标准的集合查询命令来检查此集合中记录的每个查询的详情。\n\n`system.profile`\
  \ 集合的数据量上限为 1024KB，因此分析器不会用日志信息填满磁盘。这个上限足以记录即使是最复杂查询的数千条分析记录。\n\n警告\n\n当分析器启用时，它会影响服务器的性能，因此除非你正在针对某个观测到的问题进行分析，否则不建议在生产服务器上让其持续运行。不要为了能查看最近执行的查询而将其设为永久运行。\n\
  \n###### 启用和禁用数据库分析器\n\n启用 `MongoDB` 分析器很简单：\n\n```\n$mongo\n>use blog\n>db.setProfilingLevel(1)\n\
  ```\n\n禁用分析器同样简单：\n\n```\n$mongo\n>use blog\n>db.setProfilingLevel(0)\n```\n\n`MongoDB`\
  \ 也可以仅对执行时间超过指定值的查询启用分析器。以下示例仅记录执行时间超过半秒的查询：\n\n```\n$mongo\n>use blog\n>db.setProfilingLevel(1,500)\n\
  ```\n\n如上所示，对于分析级别 1，你可以提供一个以毫秒（`ms`）为单位的最大查询执行时间值。如果查询运行时间超过此时长，则会被分析并记录；否则，将被忽略。这提供了与\
  \ `MySQL` 的 `慢查询日志` 相同的功能。\n\n最后，你可以通过将分析器级别设置为 2 来启用对所有查询的分析。\n\n```\n$mongo\n\
  >use blog\n>db.setProfilingLevel(2)\n```\n\n\n###### 查找慢查询\n\n`system.profile`集合中的一个典型记录如下所示：\n\
  ```\n> db.system.profile.find()\n{\n    \"op\" : \"query\",\n    \"ns\" : \"blog.system.profile\"\
  ,\n    \"query\" : {\n    },\n    \"ntoreturn\" : 0,\n    \"ntoskip\" : 0,\n   \
  \ \"nscanned\" : 1,\n    \"keyUpdates\" : 0,\n    \"numYield\" : 0,\n    \"lockStats\"\
  \ : {\n        \"timeLockedMicros\" : {\n            \"r\" : NumberLong(60),\n \
  \           \"w\" : NumberLong(0)\n        },\n        \"timeAcquiringMicros\" :\
  \ {\n            \"r\" : NumberLong(4),\n            \"w\" : NumberLong(3)\n   \
  \     }\n    },\n    \"nreturned\" : 1,\n    \"responseLength\" : 370,\n    \"millis\"\
  \ : 12,\n    \"ts\" : ISODate(\"2013-05-18T05:40:27.106Z\"),\n    \"client\" : \"\
  127.0.0.1\",\n    \"user\" : \"\"\n}\n```\n每条记录都包含一些字段，以下列表概述了它们是什么以及其作用：\n*   `op`:\
  \ 显示操作类型；可以是 `query`、`insert`、`update`、`command` 或 `delete`。\n*   `query`: 正在运行的查询。\n\
  *   `ns`: 执行此查询的完整命名空间。\n*   `ntoreturn`: 要返回的文档数量。\n*   `nscanned`: 为返回此文档而扫描的索引条目数。\n\
  *   `ntoskip`: 跳过的文档数量。\n*   `keyUpdates`: 此查询更新的索引键数量。\n*   `numYields`: 此查询将锁让给其他查询的次数。\n\
  *   `lockStats`: 获取此数据库读写锁或处于读写锁中所花费的微秒数。\n*   `nreturned`: 返回的文档数量。\n*   `responseLength`:\
  \ 响应的字节长度。\n*   `millis`: 执行查询所花费的毫秒数。\n*   `ts`: 显示查询执行时间的 UTC 时间戳。\n*   `client`:\
  \ 执行此查询的客户端的连接详情。\n*   `user`: 执行此操作的用户。\n\n由于 `system.profile` 集合只是一个普通集合，你可以使用\
  \ MongoDB 的查询工具来快速定位有问题的查询。\n\n下一个示例查找所有执行时间超过 10 毫秒的查询。在这种情况下，你可以直接在 `system.profile`\
  \ 集合中查询 `millis > 10` 的情况，然后按执行时间降序排序结果：\n```\n> db.system.profile.find({millis:{$gt:10}}).sort({millis:-1})\n\
  { \"op\" : \"query\", \"ns\" : \"blog.system.profile\", \"query\" : { }, \"ntoreturn\"\
  \ : 0, \"ntoskip\" : 0, \"nscanned\" : 1, \"keyUpdates\" : 0, \"numYield\" : 0,\
  \ \"lockStats\" : { \"timeLockedMicros\" : { \"r\" : NumberLong(60), \"w\" : NumberLong(0)\
  \ }, \"timeAcquiringMicros\" : { \"r\" : NumberLong(4), \"w\" : NumberLong(3) }\
  \ }, \"nreturned\" : 1, \"responseLength\" : 370, \"millis\" : 12, \"ts\" : ISODate(\"\
  2013-05-18T05:40:27.106Z\"), \"client\" : \"127.0.0.1\", \"allUsers\" : [ ], \"\
  user\" : \"\" }\n```\n如果你还知道问题发生在一个特定的时间范围内，那么你可以使用 `ts` 字段添加查询条件，将范围限制到所需的时间段。\n\
  \n###### 增大性能分析集合的大小\n\n如果你发现无论出于何种原因，你的性能分析集合太小了，可以增大其大小。\n\n首先，你需要禁用你希望调整其性能分析集合大小的数据库上的性能分析功能，以确保在操作过程中没有数据写入其中：\n\
  ```\n$mongo\n>use blog\n>db.setProfilingLevel(0)\n```\n接下来，你需要删除现有的 `system.profile`\
  \ 集合：\n```\n>db.system.profile.drop()\n```\n删除集合后，你现在可以使用 `createCollection` 命令创建新的性能分析集合，并指定所需的大小（以字节为单位）。以下示例创建了一个大小上限为\
  \ 50MB 的集合。它使用的记法将 50 字节通过每次规模扩大乘以 1024，从字节转换为千字节，再转换为兆字节：\n```\n>db.createCollection(\
  \ \"system.profile\", { capped: true, size: 50 * 1024 * 1024 } )\n{ \"ok\" : 1 }\n\
  ```\n有了新的更大的定容量集合后，你现在可以重新启用性能分析：\n```\n>db.setProfilingLevel(2)\n```\n\n##### 使用\
  \ explain() 分析特定查询\n\n如果你怀疑某个查询的性能不如预期，可以使用 `explain()` 修饰符来查看 MongoDB 执行该查询的确切方式。\n\
  \n当你在查询中添加 `explain()` 修饰符时，MongoDB 在执行时会返回一个描述查询处理方式的文档，而不是指向结果的游标。以下查询针对一个博客文章数据库运行，并表明该查询必须扫描\
  \ 13,325 条记录才能形成一个返回所有文章的游标：\n```\n$mongo\n>use blog\n> db.posts.find().explain()\n\
  {\n    \"cursor\" : \"BasicCursor\",\n    \"isMultiKey\" : false,\n    \"n\" : 13235,\n\
  \    \"nscannedObjects\" : 13235,\n    \"nscanned\" : 13235,\n    \"nscannedObjectsAllPlans\"\
  \ : 13235,\n    \"nscannedAllPlans\" : 13235,\n    \"scanAndOrder\" : false,\n \
  \   \"indexOnly\" : false,\n    \"nYields\" : 0,\n    \"nChunkSkips\" : 0,\n   \
  \ \"millis\" : 0,\n    \"indexBounds\" : {\n    },\n    \"server\" : \"Pixl.local:27017\"\
  \n}\n```\n你可以在表 10-1 中看到 `explain()` 返回的字段列表。\n\n表 10-1. explain() 返回的元素\n\n| 元素\
  \ | 描述 |\n| --- | --- |\n| `Cursor` | 指示为枚举结果而创建的游标类型。通常，是以下之一：`BasicCursor`（自然顺序读取游标）、`BtreeCursor`（索引游标）或\
  \ `GeoSearchCursor`（使用地理空间索引的查询）。 |\n| `indexBounds` | 指示索引查找中使用的最小/最大值。 |\n| `nScanned`\
  \ | 指示为找到查询中所有对象而扫描的索引条目数。 |\n| `nScannedObjects` | 指示实际扫描的对象数量，而不仅仅是它们的索引条目。 |\n\
  | `n` | 指示游标上的项目数（即要返回的项目数）。 |\n| `millis` | 指示执行查询所花费的毫秒数。 |\n| `nscannedAllPlans`\
  \ | 指示所有尝试执行计划的 `nscanned` 值。 |\n| `nscannedObjectsAllPlans` | 指示所有尝试执行计划的 `nScannedObjects`\
  \ 值。 |\n| `scanAndOrder` | 一个真/假值，指示文档是否需要读取才能排序，而不是利用索引。 |\n| `indexOnly` | 指示无需扫描文档即可返回查询结果；所有被查询和被返回的字段都在一个索引上。\
  \ |\n| `nYields` | 此查询让出其读锁以允许写操作执行的次数。 |\n| `nChunkSkips` | 由于活跃的分片迁移而跳过的文档数量。\
  \ |\n| `server` | 执行此查询的服务器。 |\n\n\n## 使用分析器和 explain() 优化查询\n\n现在，让我们通过一个真实的优化场景，看看如何使用\
  \ MongoDB 的 `profiler` 和 `explain()` 工具来解决一个真实应用程序中的问题。\n\n本章讨论的示例基于一个小型的博客应用程序示例。这个数据库有一个函数，用于获取与特定标签相关的博客文章；在这个例子中，标签是\
  \ `even`。假设你注意到这个函数运行缓慢，那么你需要确定是否存在性能问题。\n\n让我们先编写一个小程序，用数据填充前面提到的数据库，以便我们有数据可以运行查询，从而演示优化过程。\n\
  \n```php\n<?php\n// 连接到数据库\n$mongo = new MongoClient();\n$db=$mongo->blog;\n\n//\
  \ 首先，获取第一个作者 ID\n// 我们将用它来伪造一个作者\n$author = $db->authors->findOne();\nif(!$author){\n\
  \    die(\"数据库中没有作者\");\n}\n\nfor( $i = 1; $i < 10000; $i++){\n    $blogpost=array();\n\
  \    $blogpost['author'] = $author['_id'];\n    $blogpost['Title'] = \"完全虚假的博客文章编号\
  \ {$i}\";\n    $blogpost['Message'] = \"一些用于创建博客文章数据库的虚假文本\";\n    $blogpost['Tags']\
  \ = array();\n    if($i%2){\n        // 奇数编号的博客\n        $blogpost['Tags'] = array(\"\
  blog\", \"post\", \"odd\", \"tag{$i}\");\n    } else {\n        // 偶数编号的博客\n   \
  \     $blogpost['Tags'] = array(\"blog\", \"post\", \"even\", \"tag{$i}\");\n  \
  \  }\n    $db->posts->insert($blogpost);\n}\n?>\n```\n\n这个程序找到 `blog` 数据库的 `authors`\
  \ 集合中的第一个作者，然后假装该作者极其高产。它瞬间创建了 10,000 篇虚假的博客文章。这些文章读起来并不十分有趣；不过，它们被交替分配了 `odd` 和\
  \ `even` 标签。这些标签将用于演示如何优化一个简单的查询。\n\n下一步是将程序保存为 `fastblogger.php`，然后使用命令行 PHP 工具运行它：\n\
  \n```shell\n$php fastblogger.php\n```\n\n接下来，你需要启用数据库分析器（profiler），你将使用它来确定是否可以改进示例中的查询：\n\
  \n```shell\n$ mongo\n> use blog\n切换到数据库 blog\n> show collections\nauthors\nposts\n\
  ...\nsystem.profile\ntagcloud\n...\nusers\n> db.setProfilingLevel(2)\n{ \"was\"\
  \ : 0, \"slowms\" : 100, \"ok\" : 1 }\n```\n\n现在等待片刻让命令生效，打开所需的集合，然后执行其他任务。接下来，你需要模拟博客网站访问所有带有\
  \ `even` 标签的博客文章。通过执行一个网站可用于实现此功能的查询来完成此操作：\n\n```javascript\n$Mongo\nuse blog\n\
  $db.posts.find({Tags:\"even\"})\n...\n```\n\n如果你查询 `profiler` 集合以获取超过 5ms 的结果，你应该会看到类似这样的内容：\n\
  \n```javascript\n>db.system.profile.find({millis:{$gt:5}}).sort({millis:-1})\n{\
  \ \"op\" : \"query\", \"ns\" : \"blog.posts\", \"query\" : { \"tags\" : \"even\"\
  \ }, \"ntoreturn\" : 0, \"ntoskip\" : 0, \"nscanned\" : 19998, \"keyUpdates\" :\
  \ 0, \"numYield\" : 0, \"lockStats\" : { \"timeLockedMicros\" : { \"r\" : NumberLong(12869),\
  \ \"w\" : NumberLong(0) }, \"timeAcquiringMicros\" : { \"r\" : NumberLong(5), \"\
  w\" : NumberLong(3) } }, \"nreturned\" : 0, \"responseLength\" : 20, \"millis\"\
  \ : 12, \"ts\" : ISODate(\"2013-05-18T09:04:32.974Z\"), \"client\" : \"127.0.0.1\"\
  , \"allUsers\" : [ ], \"user\" : \"\" }...\n```\n\n这里返回的结果显示，一些查询花费的时间超过了 0ms（记住本章开头的引用）。\n\
  \n接下来，你需要重构第一个（也是性能最差的）查询，以便查看返回了什么。前面的输出表明性能不佳的查询正在查询 `blog.posts`，并且查询项是 `{Tags:\"\
  even\"}`。最后，你可以看到这个查询执行需要高达 15ms。\n\n重构后的查询如下所示：\n\n```javascript\n>db.posts.find({Tags:\"\
  even\"})\n{ \"_id\" : ObjectId(\"4c727cbd91a01b2a14010000\"), \"author\" : ObjectId(\"\
  4c637ec8b8642fea02000000\"), \"Title\" : \"完全虚假的博客文章编号 2\", \"Message\" : \"一些用于创建博客文章数据库的虚假文本\"\
  , \"Tags\" : [ \"blog\", \"post\", \"even\", \"tag2\" ] }\n{ \"_id\" : ObjectId(\"\
  4c727cbd91a01b2a14030000\"), \"author\" : ObjectId(\"4c637ec8b8642fea02000000\"\
  ), \"Title\" : \"完全虚假的博客文章编号 4\", \"Message\" : \"一些用于创建博客文章数据库的虚假文本\", \"Tags\"\
  \ : [ \"blog\", \"post\", \"even\", \"tag4\" ] }\n{ \"_id\" : ObjectId(\"4c727cbd91a01b2a14050000\"\
  ), \"author\" : ObjectId(\"4c637ec8b8642fea02000000\"), \"Title\" : \"完全虚假的博客文章编号\
  \ 6\", \"Message\" : \"一些用于创建博客文章数据库的虚假文本\", \"Tags\" : [ \"blog\", \"post\", \"\
  even\", \"tag6\" ] }\n...\n```\n\n这个输出应该不足为奇；这个查询是专门为了演示如何发现并修复慢查询而创建的。\n\n目标是弄清楚如何让查询运行得更快，因此使用\
  \ `explain()` 函数来确定 MongoDB 是如何执行此查询的：\n\n```javascript\n> db.posts.find({Tags:\"\
  even\"}).explain()\n{\n    \"cursor\" : \"BasicCursor\",\n    \"isMultiKey\" : false,\n\
  \    \"n\" : 14997,\n    \"nscannedObjects\" : 29997,\n    \"nscanned\" : 29997,\n\
  \    \"nscannedObjectsAllPlans\" : 29997,\n    \"nscannedAllPlans\" : 29997,\n \
  \   \"scanAndOrder\" : false,\n    \"indexOnly\" : false,\n    \"nYields\" : 0,\n\
  \    \"nChunkSkips\" : 0,\n    \"millis\" : 27,\n    \"indexBounds\" : {\n    },\n\
  \    \"server\" : \"Pixl.local:27017\"\n}\n```\n\n你可以从这里的输出中看到，查询没有使用任何索引。`explain()`\
  \ 函数显示查询正在使用一个 “`BasicCursor`”，这意味着查询只是对集合的记录进行简单的扫描。具体来说，它正在逐一扫描数据库中的所有记录（总共 9999\
  \ 条）来查找标签；这个过程耗时 27ms。这听起来可能时间不长，但如果你在网站的热门页面上使用此查询，它将增加磁盘 I/O 的负载，以及对 Web 服务器造成巨大压力。因此，该查询将导致与\
  \ Web 浏览器的连接在页面创建期间保持打开状态的时间更长。\n\n> **注意**\n> 如果你看到详细的查询解释显示扫描的记录数（`nscanned`）远大于返回的记录数（`n`），那么该查询很可能是一个需要创建索引的候选者。\n\
  \n下一步是确定在 `Tags` 字段上添加索引是否能提高查询性能：\n\n```javascript\n> db.posts.ensureIndex({Tags:1})\n\
  ```\n\n现在再次运行 `explain()` 函数，看看添加索引的效果：\n\n```javascript\n> db.posts.find({Tags:\"\
  even\"}).explain()\n{\n    \"cursor\" : \"BtreeCursor Tags_1\",\n    \"isMultiKey\"\
  \ : true,\n    \"n\" : 14997,\n    \"nscannedObjects\" : 14997,\n    \"nscanned\"\
  \ : 14997,\n    \"nscannedObjectsAllPlans\" : 14997,\n    \"nscannedAllPlans\" :\
  \ 14997,\n    \"scanAndOrder\" : false,\n    \"indexOnly\" : false,\n    \"nYields\"\
  \ : 0,\n    \"nChunkSkips\" : 0,\n    \"millis\" : 4,\n    \"indexBounds\" : {\n\
  \        \"Tags\" : [\n            [\n                \"even\",\n              \
  \  \"even\"\n            ]\n        ]\n    },\n    \"server\" : \"Pixl.local:27017\"\
  \n}\n```\n\n查询的性能已显著改善。你可以看到查询现在正在使用由 `Tags_1` 索引驱动的 `BtreeCursor`。扫描的记录数从 29,997\
  \ 条减少到了你期望查询返回的 14,997 条，执行时间降至 4ms。\n\n> **注意**\n> MongoDB 使用的也是最常见的一种索引类型是 btree（二叉树）。`BtreeCursor`\
  \ 是一种 MongoDB 数据游标，它使用二叉树索引在文档之间导航。Btree 索引在数据库系统中非常常见，因为它们提供快速的插入和删除操作，同时在遍历或排序数据时也能提供合理的性能。\n\
  \n\n\n#### 管理索引\n\n您现在已经了解到，精心选择的索引的引入能带来多大的影响。\n\n正如您在第 3 章中所学，MongoDB 的索引既用于查询（`find`、`findOne`），也用于排序。如果您打算在集合上执行大量排序操作，那么您应该添加与您的排序规范相对应的索引。如果您在排序规范中的字段没有索引的集合上使用`sort()`，并且排序数据量超过了内部排序缓冲区的最大大小，您可能会收到错误信息。因此，为排序创建索引是一个好主意。在接下来的章节中，我们将再次涉及基础知识，但也添加一些与如何管理和操作系统中的索引相关的细节。我们还将介绍这些索引如何与一些示例相关联。\n\
  \n当您为集合添加索引时，MongoDB 必须维护它，并在每次执行任何写操作（例如，`更新`、`插入`或`删除`）时更新它。如果集合上的索引过多，可能会对写入性能产生负面影响。\n\
  \n索引最适合用于大部分访问是读取访问的集合。对于写入密集型的集合（例如日志系统中使用的集合），引入索引会降低可流入集合的每秒文档峰值。\n\n**警告**\n\
  \n目前，每个集合最多只能有 64 个索引。\n\n##### 列出索引\n\nMongoDB 有一个简单的辅助函数 `getIndexes()`，用于列出给定集合的索引。执行后，它将打印一个\
  \ JSON 数组，其中包含给定集合上每个索引的详细信息，包括它们引用的字段或元素，以及您可能在该索引上设置的任何选项。\n\n```\n$mongo\n>use\
  \ blog\n>db.posts.getIndexes()\n[\n       {\n               \"v\" : 1,\n       \
  \        \"key\" : {\n                       \"_id\" : 1\n               },\n  \
  \             \"ns\" : \"blog.posts\",\n               \"name\" : \"_id_\"\n   \
  \    }\n]\n```\n\nMongoDB 在每个数据库内部维护一个名为 `system.indexes` 的特殊集合。此集合跟踪数据库中所有集合上创建的所有索引。\n\
  \n`system.indexes` 集合就像任何普通集合一样。您可以列出其内容、对其运行查询，以及执行通常可以与典型集合一起完成的任务。\n\n以下示例列出了您的简单数据库中的索引：\n\
  \n```\n$mongo\n>use blog\n>db.system.indexes.find()\n{ \"v\" : 1, \"key\" : { \"\
  _id\" : 1 }, \"ns\" : \"blog.posts\", \"name\" : \"_id_\" }\n{ \"v\" : 1, \"key\"\
  \ : { \"_id\" : 1 }, \"ns\" : \"blog.authors\", \"name\" : \"_id_\" }\n```\n\n`blog`\
  \ 数据库没有任何用户定义的索引，但您可以看到为您的两个集合 `posts` 和 `authors` 自动创建的两个 `_id` 字段索引。您无需执行任何操作来创建或删除这些标识符索引；MongoDB\
  \ 会在集合创建或删除时自动创建和删除它们。\n\n当您在元素上定义索引时，MongoDB 将构建一个内部的 B 树索引，用于高效地定位文档。如果找不到合适的索引，MongoDB\
  \ 将扫描集合中的所有文档以查找满足查询条件的记录。\n\n##### 创建简单索引\n\nMongoDB 提供了 `ensureIndex()` 函数，用于向集合添加新索引。此函数首先检查是否已使用相同的规范创建了索引。如果已创建，则\
  \ `ensureIndex()` 仅返回该索引。这意味着您可以按需要多次调用 `ensureIndex()`，但它不会导致为您的集合创建大量额外的索引。\n\n\
  以下示例定义了一个简单的索引：\n\n```\n$mongo\n>use blog\n>db.posts.ensureIndex({Tags:1})\n```\n\
  \n此示例在 `Tags` 字段上创建了一个简单的升序 B 树索引。要创建降序索引，只需做一处小更改：\n\n```\n>db.posts.ensureIndex({Tags:-1})\n\
  ```\n\n要索引嵌入式文档中的字段，您可以使用标准的点表示法寻址方案；也就是说，如果您有一个位于 `comments` 子文档内部的 `count` 字段，您可以使用以下语法来索引它：\n\
  \n```\n>db.posts.ensureIndex({\"comments.count\":1})\n```\n\n如果您指定的文档字段是数组类型，那么该索引将把数组的所有元素作为单独的索引项包含在内。这被称为多键索引，每个文档都链接到索引中的多个值。如果您回顾并检查我们之前查询的\
  \ `explain()` 输出，您可以在那里看到对此的提及。\n\nMongoDB 有一个特殊的操作符 `all`，用于执行您希望仅选择包含您提供的所有项的文档的查询。在\
  \ `blog` 数据库示例中，您有一个 `posts` 集合，其中有一个名为 `Tags` 的元素。该元素内部包含了与帖子关联的所有标签。以下查询查找所有同时包含\
  \ `sailor` 和 `moon` 标签的文章：\n\n```\n>db.posts.find({Tags:{$all: ['sailor', 'moon']}})\n\
  ```\n\n如果在 `Tags` 字段上没有多键索引，查询引擎将不得不扫描集合中的每个文档，以查看是否存在任一术语，如果存在，则检查两个术语是否都存在。\n\n\
  ##### 创建复合索引\n\n为查询中提到的每个字段单独创建一个索引可能很有诱惑力。虽然这可能会在不需太多思考的情况下加快查询速度，但不幸的是，这对数据库的添加和删除数据操作会产生显著影响，因为每次都需要更新这些索引。同样重要的是要注意，在\
  \ MongoDB 2.4 及更早版本中，一次只会使用一个索引来满足查询结果，因此添加多个小型索引通常无助于查询执行。\n\n复合索引提供了一种很好的方法来减少集合上的索引数量，允许您将多个字段组合到一个索引中，因此您应该尽可能尝试使用复合索引。\n\
  \n复合索引主要有两种类型：子文档索引和手动定义的复合索引。\n\nMongoDB 有一些规则，使其能够使用复合索引来处理不使用所有组件键的查询。理解这些规则使您能够构建一组复合索引，以涵盖您希望针对集合执行的所有查询，而无需单独索引每个元素（从而避免了前面提到的对插入/更新性能的影响）。\n\
  \n复合索引可能无效的一个领域是在使用索引进行排序时。除非术语列表和排序方向与索引结构完全匹配，否则排序无法很好地利用复合索引。\n\n当您使用子文档作为索引键时，用于构建多键索引的元素顺序与它们在子文档的内部\
  \ BSON 表示中出现的顺序相匹配。在许多情况下，这不能让您对索引创建过程进行充分控制。\n\n为了克服这一限制，同时保证查询使用以所需方式构建的索引，您需要确保使用与形成查询时相同的子文档结构来创建索引，如以下示例所示：\n\
  \n```\n>db.articles.find({author:{name: 'joe', email: 'joe@blogger.com'}))\n```\n\
  \n您也可以通过命名您希望在索引中组合的所有字段，然后指定组合它们的顺序来显式创建复合索引。以下示例说明了如何手动构建复合索引：\n\n```\n>db.posts.ensureIndex({\"\
  author.name\":1, \"author.email\":1})\n```\n\n\n#### 指定索引选项\n\n在创建索引时，你可以指定几个有趣的选项，例如创建唯一索引或启用后台索引；在接下来的章节中，你将了解更多关于这些选项的信息。你将这些选项作为额外参数传递给\
  \ `ensureIndex()` 函数，如下例所示：\n\n`>db.posts.ensureIndex({author:1}, {option1:true,\
  \ option2:true, ..... })`\n\n##### 使用 `{background:true}` 在后台创建索引\n\n当你首次使用 `ensureIndex()`\
  \ 函数指示 MongoDB 创建索引时，服务器必须读取集合中的所有数据并创建指定的索引。默认情况下，索引构建在前台进行，并且在索引操作完成之前，该集合数据库上的所有操作都会被阻塞。\n\
  \nMongoDB 还包含一个特性，允许在后台执行此初始索引构建。在索引构建期间，该数据库上其他连接的操作不会被阻塞。在索引构建完成之前，没有查询会使用该索引，但服务器将允许读写操作继续进行。一旦索引操作完成，所有需要该索引的查询将立即开始使用它。值得注意的是，虽然索引可以在后台构建，但这会花费更长的时间来完成。\n\
  \n因此，你可能希望考虑其他构建索引的策略。最好的策略可能是在副本集中轮流执行构建。为此，你一次停止一个辅助节点，然后在没有其 `--replSet` 参数且使用不同端口的情况下启动它，暂时使其成为独立节点。然后，你可以在这个辅助节点上安全地执行索引构建。一旦索引构建完成，正常启动该辅助节点，让它重新加入副本集并追上数据。对所有辅助成员重复此过程。最后，停止主节点，执行相同的移除\
  \ `--replSet` 参数并构建索引的过程，然后让它像往常一样重新加入副本集。通过以这种方式轮换你的副本集，你可以在不造成停机或中断的情况下构建索引！\n\
  \n**注意**\n\n索引将在后台构建。但是，如果你从 MongoDB shell 发出命令，发起请求的连接将被阻塞。在此连接上发出的命令在索引操作完成之前不会返回。乍一看，这似乎与它是一个后台索引的概念相矛盾。但是，如果你同时打开另一个\
  \ MongoDB shell，你会发现该集合上的查询和更新在索引构建进行时可以无障碍地运行。只有发起连接被阻塞。这与你使用简单的 `ensureIndex()`\
  \ 命令所看到的行为不同，后者不在后台运行，因此第二个 MongoDB shell 上的操作也会被阻塞。\n\n**终止索引进程**\n\n如果你认为索引进程已挂起或花费了太长时间，也可以终止当前的索引进程。你可以通过调用\
  \ `killOp()` 函数来实现：\n\n`> db.killOp(<operation id>)`\n\n要运行 `killOp`，你需要知道该操作的操作\
  \ ID。你可以通过运行 `db.currentOp()` 命令来获取 MongoDB 实例上当前所有正在运行的操作的列表。\n\n请注意，当你调用 `killOp()`\
  \ 命令时，部分构建的索引也将被移除。这可以防止损坏或无关的数据在数据库中累积。\n\n##### 使用唯一键 `{unique:true}` 创建索引\n\n\
  当你指定 `unique` 选项时，MongoDB 会创建一个索引，其中所有键都必须是不同的。这意味着，如果你尝试插入一个索引键与现有文档的键相匹配的文档，MongoDB\
  \ 将返回错误。这对于你希望确保没有两个人可以拥有相同身份（即相同的 `userid`）的字段非常有用。\n\n但是，如果你希望向一个已填充数据的现有集合添加唯一索引，你必须确保已经对键进行了去重。在这种情况下，如果任何两个键不是唯一的，你创建索引的尝试将会失败。\n\
  \n`unique` 选项适用于简单索引和复合索引，但不适用于多键值索引，在那些情况下它们意义不大。\n\n如果插入的文档缺少被指定为唯一键的字段，那么 MongoDB\
  \ 会自动插入该字段，但将其值设置为 `null`。这意味着你只能向这样的集合插入一个缺少键字段的文档；任何额外的 `null` 值都将意味着键不是唯一的，正如所要求的那样。\n\
  \n##### 使用 `{dropdups:true}` 自动删除重复项\n\n如果你想为一个你知道存在重复键的字段创建唯一索引，可以指定 `dropdups`\
  \ 选项。此选项指示 MongoDB 删除会导致索引创建失败的文档。在这种情况下，MongoDB 将保留其在集合自然排序中找到的第一个文档，但会删除任何其他会导致索引约束冲突的文档。\n\
  \n**警告**\n\n使用 `dropdups` 选项时需要非常小心，因为它会导致文档从你的集合中删除。\n\n在使用此选项之前，你应该非常清楚集合中的数据；否则，你可能会遇到意想不到（更不用说不希望）的行为。对你打算设为唯一键的集合运行分组查询是一个非常好的主意；这将使你在执行此选项之前能够确定被视为重复项的文档数量。\n\
  \n##### 使用 `{sparse:true}` 创建稀疏索引\n\n有时，只为包含给定字段条目的文档创建索引是值得的。例如，假设你想索引电子邮件，并且你知道并非所有电子邮件都会有抄送或密送字段。如果你在抄送或密送上创建索引，除非你指定稀疏索引，否则所有文档都将被添加一个“null”值。这可以作为一种节省空间的机制，因为你只在有效文档上建立索引，而不是所有文档。当然，这对运行并使用稀疏索引的任何查询都有影响；因为有些文档可能不会在查询中被评估到。\n\
  \n## TTL 索引\n\n在计算术语中，TTL（生存时间）是指通过指定一个时间点来给特定数据或请求赋予有效寿命的一种方式。这对于存储在 MongoDB 实例中的数据也很有用，因为通常希望旧数据能被自动删除。要创建\
  \ TTL 索引，必须向单个（非复合）索引添加 `expireAfterSeconds` 标志和一个秒数值。这将表明，任何索引字段值大于给定 TTL 值的文档，都将在下一次\
  \ TTL 删除任务执行时被删除。由于删除任务每 60 秒运行一次，你的旧文档被移除可能会有延迟。\n\n**警告**\n\n被索引的字段必须是 BSON 日期类型；否则，它不会被评估并删除。BSON\
  \ 日期在从 shell 查询时会显示为 `ISODate`，如下一个示例所示。\n\n例如，假设我们想自动删除博客的 `comments` 集合中创建时间戳超过一定时间的任何文档。这是\
  \ `comments` 集合中的一个示例文档：\n\n```javascript\n>db.comments.find();\n{\n    \"_id\"\
  \ : ObjectId(\"519859b32fee8059a95eeace\"),\n    \"author\" : \"david\",\n    \"\
  body\" : \"foo\",\n    \"ts\" : ISODate(\"2013-05-19T04:48:51.540Z\"),\n    \"tags\"\
  \ : [ ]\n}\n```\n\n假设我们希望删除任何超过 28 天的评论。我们计算出 28 天是 2,419,200 秒。然后我们按如下方式创建索引：\n\
  \n```javascript\n>db.comments.ensureIndex({ts:1},{ expireAfterSeconds: 2419200})\n\
  ```\n\n当这个文档的时间戳比当前系统时间早超过 2,419,200 秒时，它就会被删除。你可以使用以下语法创建一个时间戳早于 2,419,200 秒的文档来进行测试：\n\
  \n```javascript\ndate = new Date(new Date().getTime()-2419200000);\ndb.comments.insert({\
  \ \"author\" : \"test\", \"body\" : \"foo\", \"ts\" : date, \"tags\" : [] });\n\
  ```\n\n现在只需等待一分钟，该文档就应该被删除了。\n\n**注意**\n\n当你设置 TTL 索引时，MongoDB 会在给定集合上设置 `usePowerOf2Sizes`\
  \ 标志。这将标准化每个文档的存储空间。这允许在文档被删除后，未来的文档能更有效地重用这些空间。\n\n## 文本搜索索引\n\nMongoDB 2.4 引入了一种新的索引类型——文本索引，它允许你执行全文搜索！第\
  \ 8 章详细讨论了文本索引功能，但在这里我们快速总结一下，因为我们正在研究优化。文本搜索长期以来一直是 MongoDB 中期望的功能，因为它允许你在大段文本中搜索特定的单词或文本。文本搜索相关性最好的例子是博客文章正文的搜索功能。这种搜索允许你在一个文本字段（如正文）或更多（如正文和评论）文本字段中查找单词或短语。因此，要创建文本索引，我们运行以下命令：\n\
  \n```javascript\n>db.posts.ensureIndex( { body: \"text\" } )\n```\n\n**注意**\n\n\
  文本搜索不区分大小写，这意味着它会忽略大小写；“MongoDB” 和 “mongodb” 被视为相同的文本。\n\n现在我们可以使用 `text` 命令通过文本索引进行搜索。为此，我们使用\
  \ `runCommand` 语法来使用 `text` 命令并提供要搜索的值：\n\n```javascript\n>db.posts.runCommand(\
  \ \"text\", { search: \"MongoDB\" } )\n```\n\n你的文本搜索结果将按相关性顺序返回给你。\n\n**警告**\n\n\
  MongoDB 文本搜索仍然相对较新，并且正在快速发展中。\n\n## 删除索引\n\n你可以选择删除集合中的所有索引或仅删除一个特定索引。使用以下函数从集合中删除所有索引：\n\
  \n```javascript\n>db.posts.dropIndexes()\n```\n\n要从集合中删除单个索引，你使用的语法镜像了使用 `ensureIndex()`\
  \ 创建索引时的语法：\n\n```javascript\n>db.posts.dropIndex({\"author.name\":1, \"author.email\"\
  :1});\n```\n\n## 重新索引集合\n\n如果你怀疑集合中的索引已损坏——例如，如果你的查询得到不一致的结果——那么你可以强制对受影响的集合进行重新索引。\n\
  \n这将强制 MongoDB 删除并重新创建指定集合上的所有索引（有关如何检测和解决索引问题的更多信息，请参见第 9 章），如下例所示：\n\n```javascript\n\
  > db.posts.reIndex()\n{\n    \"nIndexesWas\" : 2,\n    \"msg\" : \"indexes dropped\
  \ for collection\",\n    \"nIndexes\" : 2,\n    \"indexes\" : [\n        {\n   \
  \         \"key\" : {\n                \"_id\" : 1\n            },\n           \
  \ \"ns\" : \"blog.posts\",\n            \"name\" : \"_id_\"\n        },\n      \
  \  {\n            \"key\" : {\n                \"Tags\" : 1\n            },\n  \
  \          \"ns\" : \"blog.posts\",\n            \"name\" : \"Tags_1\"\n       \
  \ }\n    ],\n    \"ok\" : 1\n}\n```\n\n输出列出了命令已重建的所有索引，包括键。此外，`nIndexWas:` 字段显示在运行命令之前存在的索引数量，而\
  \ `nIndex:` 字段给出了命令完成后索引的总数。如果这两个值不相同，则意味着在重新创建集合中的某些索引时存在问题。\n\n## MongoDB 如何选择将使用的索引\n\
  \n当数据库系统需要运行查询时，它必须组装一个查询计划，这是它为执行查询必须运行的一系列步骤。每个查询可能有多个能同样好地产生相同结果的查询计划。然而，每个计划中可能包含执行起来比其他计划更昂贵的操作。例如，扫描集合中的所有记录是一项昂贵的操作，任何采用这种方法的计划都可能很慢。这些计划还可以包括用于查询和排序操作的替代索引列表。\n\
  \n道路方向可以很好地说明这个概念。如果你想从一个角落到达街区对角线的另一侧，那么“先左转，然后右转”和“先右转，然后左转”都是到达对面角落同样有效的计划。然而，如果其中一条路线有两个停车标志，而另一条没有，那么前一种方法是成本更高的计划，而后者是最佳计划。集合扫描在执行查询时就可以被视为潜在的停车标志。\n\
  \nMongoDB 自带一个名为查询分析器的组件。该组件获取一个查询及其目标集合，然后生成一组 MongoDB 要执行的计划。本章前面描述的 `explain()`\
  \ 函数列出了为给定查询使用的计划以及生成的替代计划集。\n\nMongoDB 还自带一个查询优化器组件。该组件的工作是选择最适合运行特定查询的执行计划。在大多数关系数据库系统中，查询优化器使用关于表中键分布的统计信息、记录数、可用索引、先前选择的有效性以及一系列权重因素来计算每种方法的成本。然后它选择成本最低的计划来使用。\n\
  \nMongoDB 中的查询优化器同时比典型的 RDBMS 查询分析器更简单也更聪明。例如，它不使用基于成本的方法来选择执行计划；相反，它并行运行所有计划，并使用最先返回结果的那个计划，在第一个计划完成后终止所有其他计划。因此，MongoDB\
  \ 中的查询分析器使用一种简单的机制（简单）来确保它总是获得最快的结果（聪明），并且这些计划的结果会被缓存并重用接下来的 1000 次写入，直到执行了 explain\
  \ 或者对该集合添加、删除或重新索引了任何索引。\n\n\n#### 使用 `hint()` 强制使用特定索引\n\nMongoDB 中的查询优化器会从一组候选索引中为查询选择最佳索引。它使用前面概述的方法来尝试为给定的查询匹配最佳索引或索引集。然而，在某些情况下，查询优化器可能没有做出正确的选择，此时可能需要给它一点帮助。\n\
  \n在这种情况下，您可以向查询优化器提供一个提示，引导它做出不同的选择。例如，如果您使用 `explain()` 来显示查询正在使用哪些索引，并且您认为对于某个特定查询希望使用不同的索引，那么您可以强制查询优化器这样做。\n\
  \n让我们看一个例子。假设您有一个名为 `author` 的子文档索引，其中包含 `name` 和 `email` 字段。同时假设您定义了以下索引：\n\n```\n\
  >db.posts.ensureIndex({author.name:1, author.email:1})\n```\n\n您可以使用以下提示来强制查询优化器使用已定义的索引：\n\
  \n```\n>db.posts.find({author:{name:'joe', email: 'joe@mongodb.com'}}).hint({author.name:1,\
  \ author.email:1})\n```\n\n如果出于某些原因，您希望强制查询不使用任何索引，即希望使用集合文档扫描作为选择记录的方式，可以使用以下提示来实现：\n\
  \n```\n>db.posts.find({author:{name: 'joe', email: 'joe@mongodb.com'}}).hint({$natural:1})\n\
  ```\n\n#### 优化小对象的存储\n\n索引是加速数据查询的关键。但另一个可能影响应用程序性能的因素是其访问的数据大小。与具有固定模式的数据库系统不同，MongoDB\
  \ 将每条记录的所有模式数据存储在记录本身内部。因此，对于字段数据量大的大型记录，模式数据与记录数据的比率较低；然而，对于数据值较小的小型记录，这个比率可能会大得惊人。\n\
  \n考虑一个 MongoDB 非常适用的应用程序类型中常见的问题：日志记录。MongoDB 出色的写入速率使得将事件流作为小型文档写入集合变得非常高效。然而，如果您想进一步优化执行此功能的速度，可以做一些事情。\n\
  \n首先，您可以考虑批量插入。MongoDB 提供了多文档 `insert()` 调用。您可以使用此调用将多个事件同时放入一个集合。这减少了通过数据库接口 API\
  \ 的往返次数。\n\n其次（也是更重要的），您可以减小字段名称的大小。如果字段名称更小，MongoDB 在必须将数据刷新到磁盘之前，可以在内存中打包更多的事件记录。这使得整个系统更加高效。\n\
  \n例如，假设您有一个集合用于记录三个字段：时间戳、计数器和一个用于指示数据来源的四字符字符串。您的数据总存储大小如表 10–2 所示。\n\n表 10–2.\
  \ 日志示例集合存储大小\n\n| 字段 | 大小 |\n| --- | --- |\n| Timestamp | 8 bytes |\n| Integer |\
  \ 4 bytes |\n| string | 4 bytes |\n| 总计 | 16 bytes |\n\n如果您使用 `ts`、`n` 和 `src` 作为字段名，那么字段名的总大小是\
  \ 6 字节。与数据大小相比，这是一个相对较小的值。但现在假设您决定将字段命名为 `WhenTheEventHappened`、`NumberOfEvents`\
  \ 和 `SourceOfEvents`。在这种情况下，字段名的总大小是 48 字节，是数据本身大小的三倍。如果您向一个集合写入了 1TB 的数据，那么您将存储\
  \ 750GB 的字段名，而实际数据只有 250GB。\n\n这不仅仅是浪费磁盘空间。它还会影响系统性能的所有其他方面，包括索引大小、数据传输时间，以及（可能更重要的）使用宝贵的系统\
  \ RAM 来缓存数据文件。\n\n在日志记录应用程序中，您还需要在写入记录时避免在集合上添加索引；如前所述，维护索引需要时间和资源。相反，您应该在开始分析数据之前立即添加索引。\n\
  \n最后，您应该考虑使用一种将事件流拆分到多个集合中的模式。例如，您可以将每天的事件写入一个单独的集合。较小的集合索引和分析所需的时间更少。\n\n#### 总结\n\
  \n在本章中，我们研究了一些用于追踪 MongoDB 查询中性能缓慢问题的工具，以及针对由此浮现的慢速查询的潜在加速解决方案。我们还探讨了一些优化数据存储的方法。例如，我们研究了如何确保充分利用\
  \ MongoDB 服务器可用的资源。\n\n本章描述的具体技术使您能够优化数据并调整存储数据的 MongoDB 系统。最佳方法因应用程序而异，并且取决于许多因素，包括应用程序类型、数据访问模式、读写比率等。\n\
  \n### 11. 复制\n\n摘要\n\n与许多关系型数据库的“表亲”一样，MongoDB 支持将数据库内容实时或近实时地复制到另一台服务器。MongoDB\
  \ 的复制功能设置和使用简单。它们也是 MongoDB 的关键特性之一，与分片一起，支撑着该数据库作为 Web 2.0 和基于云的数据存储的说法。\n\n在许多场景下您可能需要使用复制，因此\
  \ MongoDB 中的复制支持必须足够灵活以应对所有情况。MongoDB, Inc. 的 MongoDB 架构师们投入了大量精力，确保其实现的复制满足当今的所有需求。\n\
  \n在本章中，我们将介绍 MongoDB 内部复制的基础知识，包括以下主题：\n\n*   什么是 MongoDB 中的复制？\n*   什么是主节点（primary）？\n\
  *   什么是副本节点（secondary）？\n*   什么是 `oplog`？\n\n注意\n\n复制是 MongoDB 中一个持续演进的功能，随着产品的发展，您可以预期复制的工作方式会发生一些变化。特别是在数据库服务器集群方面。本书第一版和第二版之间已经发生了许多变化。MongoDB,\
  \ Inc. 正投入大量精力确保 MongoDB 满足并超越每个人对可扩展性和可用性的期望；复制支持是 MongoDB, Inc. 依赖以帮助其实现这些期望的关键功能之一。\n\
  \n在详细查看复制设置之前，让我们回顾一下各种设置旨在实现的目标。我们还将概述当前 MongoDB 中复制功能运作的一些基础知识，并了解 `oplog` 及其在副本集成员之间数据复制中的作用。这些主题构成了理解复制的基础。\n\
  \n#### 阐明 MongoDB 的复制目标\n\n除其他用途外，复制可用于实现可扩展性、持久性/可靠性和隔离性。在接下来的章节中，我们将探讨如何利用复制来实现这些目标，同时指出需要避免的潜在陷阱和错误。\n\
  \n\n##### 提升可扩展性\n\n对于 Web 应用程序而言，可扩展性是一个关键的设计需求，尤其是那些严重依赖后端数据库的应用。复制技术可以通过两种方式帮助你构建更具扩展性的应用：\n\
  \n*   **提高冗余性**：复制能够通过使你在多个数据中心部署应用来提高冗余度。这种方式确保每个数据中心都有数据的本地副本，从而使应用能够高速访问数据。用户随后可以被连接到离他们最近的数据中心，从而最大限度地降低延迟。\n\
  *   **提升性能**：在某些情况下，复制可以帮助你提升应用的原始性能。这尤其适用于以下场景：你拥有一个大型 Web 应用，其数据集以读取操作为主，并且你希望将查询分发到多个数据库服务器以提高并行处理能力。或者，当查询负载的工作集差异很大时，例如报表或聚合操作。\n\
  \n注意\n\nMongoDB 还支持一个名为 `分片` 的功能，旨在帮助你创建更具扩展性的应用，无论是否使用复制，都能实现真正的高可扩展性。有关在 MongoDB\
  \ 中结合使用 `分片` 和复制的更多信息，请参阅 第 12 章。\n\n##### 提升持久性/可靠性\n\n复制通常用于帮助防范硬件故障或数据库损坏，并在执行备份或其他可能产生高影响的维护活动时提供灵活性，且对系统的影响很小甚至为零——因为这些任务可以在副本集的成员上单独执行，而不会影响整个副本集。人们以这种方式使用复制的一些具体示例包括：\n\
  \n*   当你希望拥有一个以延迟模式运行的数据库副本时。你可能希望保护自己免受应用程序缺陷的影响，或者通过对比两个数据集查询结果的差异，提供一个简单的机制来生成趋势信息。这还可以为人为错误提供一个安全缓冲，并避免从备份中完全恢复的需要。\n\
  *   当你希望有一个备用系统以防故障时。在正常的备份方案在系统故障时恢复时间过长的情况下，你可能希望运行一个副本作为备份。\n*   当你需要一个用于管理目的的冗余系统时。你可能希望运行一个副本，以便在执行备份或升级等管理任务时可以在节点之间进行轮换。\n\
  \n##### 提供隔离性\n\n有些进程如果直接在生产数据库上运行，会显著影响该数据库的性能或可用性。你可以使用复制创建同步副本来将这些进程与生产数据库隔离开来，例如：\n\
  \n*   当你希望运行报表或备份而不影响生产系统的性能时：维护一个隐藏的辅助副本可以使你的报表系统查询与生产环境隔离，并确保月末报表不会延迟或以其他方式影响你的正常操作。\n\
  \n#### 复制基础\n\n正如你所见，副本集（或 `replSet`）是一种设置多个 MongoDB 实例以包含相同数据的方法，用于实现冗余和其他相关措施。除了了解这一点，你还应该理解\
  \ MongoDB 是如何实现其复制的，这样你才会知道如何最好地管理自己的副本集。\n\n你已经了解了 MongoDB 中复制的目标，如果你读过本书的第一版或者从早期就开始使用\
  \ MongoDB，你就会知道曾经有几种不同的方法可以实现复制，包括：\n\n*   主/从复制\n*   主/主复制\n*   副本对\n\n这些复制方法都已被副本集的概念所取代。在\
  \ MongoDB 中，副本集由一个 `主` 节点和多个 `从` 节点或 `仲裁` 节点组成。一个副本集应包含奇数个成员，这意味着最少三个。这个要求的产生是因为\
  \ MongoDB 副本集有一条规则：`主` 节点必须能够看到大多数其他节点才能继续保持其 `主` 节点地位。这条规则是为了避免出现“脑裂”情况，即由于网络潜在故障而出现两个主节点，如图\
  \ 11-1 所示。\n\n![A978-1-4302-5822-3_11_Fig1_HTML.jpg](img/A978-1-4302-5822-3_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 脑裂问题\n\n##### 什么是主节点？\n\n在副本集的语境中，`主` 节点是特定时刻你副本集的唯一真实数据源。它是集合中唯一可以写入数据的节点，所有其他节点都从它复制数据。`主`\
  \ 节点是由大多数有投票权的成员（称为法定人数）一致同意选举产生的。\n\n一旦 `主` 节点被选出，所有 `从` 节点都将使用它作为其复制的真实数据源，因此所有写入操作都必须定向到这个成员。\n\
  \n##### 什么是从节点？\n\n`从` 节点是一个承载数据的非主节点，理论上（除少数例外情况）它可以成为 `主` 节点。它是一个可以读取数据的节点，并尽可能接近实时地从其集合的\
  \ `主` 节点复制数据。默认情况下，如果你直接连接到 `从` 节点而没有设置任何读取偏好，你将无法执行读取操作。这样做是为了强调：对非主节点的任何读取，如果复制存在延迟，你读取的可能是旧数据。你可以使用命令\
  \ `rs.slaveOk()` 来设置当前连接允许从 `从` 节点读取。或者，如果你使用的是驱动程序，你可以设置一个读取偏好，我们将在本章后面讨论。\n\n\
  注意\n\n`主` 节点的概念是并且应该是短暂的。也就是说，理想情况下，你不应该有哪个节点是“固定”主节点的概念。在副本集中，所有 `从` 节点都在写入与 `主`\
  \ 节点相同的数据，以跟上复制进度。因此，如果 `从` 节点的性能明显较差，那么在它们被提升为 `主` 节点时，可能无法应对负载。\n\n##### 什么是仲裁节点？\n\
  \n`仲裁` 节点是一个不承载数据的节点，用于提供额外的投票以帮助在副本集选举中维持多数票。它不会投出决定性的一票或指定哪个节点是 `主` 节点，但它参与投票并可以成为决定\
  \ `主` 节点的法定人数的一员。`仲裁` 节点最好用于帮助避免前面描述的“脑裂”问题。考虑图 11-2 所示的图表。通过在站点 A 添加一个 `仲裁` 节点，我们总是可以有一方能够形成多数票。这意味着在网络中断的情况下，我们不会最终有两个主节点！我们可以通过在第三个站点\
  \ C 放置一个 `仲裁` 节点来进一步增加冗余。这样，如果站点 A 宕机，我们仍然可以从站点 B 和 C 的节点中形成多数票。使用这样的第三个站点，我们就能在失去与任何一个站点的连接时继续运行。\n\
  \n![A978-1-4302-5822-3_11_Fig2_HTML.jpg](img/A978-1-4302-5822-3_11_Fig2_HTML.jpg)\n\
  \n图 11-2. 解决后的脑裂问题\n\n\n#### 深入探究操作日志\n\n简而言之，操作日志是一个固定大小的集合，它以滚动记录的方式保存主节点对其数据库所做更改的顺序。这样做的目的是为了能够将这些更改重放到从节点上，以确保所有数据库副本保持一致。副本集中的每个成员都维护自己的操作日志，从节点会查询主节点（或其他更新更及时的从节点）的操作日志，获取新的条目并应用到自己的所有数据库副本上。\n\
  \n操作日志会为每个条目创建一个时间戳。这使得从节点能够追踪在上一次读取时已经读取到操作日志的哪个位置，以及还需要获取哪些条目来同步数据。如果你停止一个从节点并在较短时间后重新启动它，它将使用主节点的操作日志来获取其离线期间错过的所有更改。\n\
  \n由于拥有一个无限大的操作日志是不现实的，因此操作日志的大小是有限制或封顶的。\n\n你可以将操作日志视为主节点近期活动的一个窗口；如果这个窗口太小，那么在操作被应用到从节点之前，它们就会从操作日志中被清除。如果当前实例上尚未创建操作日志，`--oplogSize`\
  \ 启动选项允许你以 MB 为单位设置操作日志的大小。对于 Linux 或 64 位 Windows 系统，默认情况下，`oplogSize` 将被设置为可用于数据存储的磁盘可用空间的百分之五。如果你的系统写入/更新操作非常密集，那么你可能需要增加此大小，以确保从节点能够在合理的离线时间内不丢失数据。\n\
  \n例如，如果你有一个每天从从节点进行的备份，该备份需要一小时完成，那么操作日志的大小必须设置为允许从节点离线一小时，再加上额外的时间以提供一个安全裕量。\n\n\
  在计算合适的操作日志大小时，考虑到主节点上所有数据库的更新速率至关重要。\n\n你可以通过运行以下在主节点实例上的 `db.printReplicationInfo()`\
  \ 命令，来了解关于操作日志合适大小的一些信息：\n\n```\n$mongo\n\n>db.printReplicationInfo()\nconfigured\
  \ oplog size: 15000MB\nlog length start to end: 6456672secs (1793.52hrs)\noplog\
  \ first event time: Wed Mar 20 2013 17:00:43 GMT+1100 (EST)\noplog last event time:\
  \ Mon Jun 03 2013 09:31:55 GMT+1000 (EST)\nnow: Mon Jun 03 2013 20:22:20 GMT+1000\
  \ (EST)\n```\n\n该命令显示了操作日志的当前大小，以及以当前更新速率将其填满所需的时间。根据这些信息，你可以评估是否需要增加或减少操作日志的大小。你还可以通过查看\
  \ MongoDB 监控服务（MMS）中的 `repl lag` 部分，了解副本集中给定成员落后于主节点的程度。如果你尚未安装 MMS，我强烈建议你现在就安装，因为随着你的\
  \ MongoDB 集群规模变大、扩展性增强，像 MMS 提供的此类统计数据变得越来越重要。更多背景信息，你应该查阅第 9 章中关于 MMS 的部分。\n\n\
  #### 实现副本集\n\n在本节中，你将学习如何设置一个简单的副本集配置。你还将学习如何向集群中添加和移除成员。如前所述，副本集基于单一主服务器和若干个从服务器或仲裁服务器的概念，这些服务器将复制来自主服务器的写操作（参见图\
  \ 11-3）。\n\n![A978-1-4302-5822-3_11_Fig3_HTML.jpg](img/A978-1-4302-5822-3_11_Fig3_HTML.jpg)\n\
  \n图 11-3. 使用副本集实现的集群\n\n副本集还具有活跃成员和被动成员的概念。被动的从节点服务器在当前主节点不可用时，不参与选举新的主节点；相反，它们的作用与隐藏成员相同，可以用作报告或备份数据集。\n\
  \n副本集的成员服务器不需要在启动时指定为集合成员。配置是通过常规服务器接口发送的服务器级命令完成的。这使得创建允许对机器集群进行动态配置和管理的配置管理工具变得更加容易。\n\
  \n在接下来的章节中，你将学习如何完成以下任务：\n*   创建副本集。\n*   向副本集添加服务器。\n*   向副本集添加仲裁节点。\n*   检查副本集状态并执行相关操作。\n\
  *   配置副本集的各个成员。\n*   从你的应用程序连接到副本集。\n*   在应用程序内设置读取偏好。\n*   在应用程序内设置写关注。\n*   将副本集标签与读取偏好和写关注结合使用。\n\
  *   使用 Web 界面检查副本集的状态。\n\n##### 创建副本集\n\n学习如何创建副本集的最佳方法是看一个例子。在下面的示例中，你将创建一个名为 `testset`\
  \ 的副本集。该集合将有三个成员（两个活跃成员和一个被动成员）。表 11-1 列出了该集合的成员。\n\n表 11-1. 配置副本集\n\n| 服务 | 守护进程\
  \ | 地址 | 数据库路径 |\n| --- | --- | --- | --- |\n| 活跃成员 1 | `mongod` | `[hostname]:27021`\
  \ | `/db/active1/data` |\n| 活跃成员 2 | `mongod` | `[hostname]:27022` | `/db/active2/data`\
  \ |\n| 被动成员 1 | `mongod` | `[hostname]:27023` | `/db/passive1/data` |\n\n副本集允许你使用\
  \ `localhost` 作为标识符，但这仅在所有机器都位于同一台服务器上时才有效。这是因为副本集的每个成员都必须能够通过主机名联系到所有其他 MongoDB\
  \ 实例，复制功能才能正常运行。\n\n通常在使用副本集时，我们使用主机名；你可以使用 `hostname` 命令查找当前的主机名，如下例所示：\n\n```\n\
  $hostname\nPixl.local\n```\n\n在下面的示例中，请将 `[hostname]` 替换为你自己系统上运行 `hostname` 命令所返回的值。\n\
  \n\n\n#### 启动并运行副本集成员\n\n第一步是让第一个活动成员启动并运行。为此，打开终端窗口并输入以下命令：\n\n```\n$ mkdir -p\
  \ /db/active1/data\n$ mongod --dbpath /db/active1/data --port 27021 --replSet testset\n\
  ```\n\n`--replSet` 选项告诉该实例它要加入的副本集名称。由于这是副本集的第一个成员，你可以给它提供任何其他成员的地址，即使该成员尚未启动。只需要一个成员地址，但也可以用逗号分隔提供其他成员的地址，如下例所示：\n\
  \n```\n$ mongod --dbpath /db/active1/data --port 27021 --replSet testset\n```\n\n\
  注意\n\n如果你不想在独立的 shell 实例中运行每一个 MongoDB 实例，可以添加 `--fork` 和 `--logpath <file>` 选项，以告诉此实例在后台启动自身，并将其日志输出到指定的文件。\n\
  \n为了保持简单，本示例将只使用一个地址。下一步是让其他成员启动并运行。为此，再打开两个终端窗口，然后在第一个窗口中输入以下命令以启动并运行第二个成员：\n\n\
  ```\n$ mkdir -p /db/active2/data\n$ mongod --dbpath /db/active2/data --port 27022\
  \ --replSet testset\n```\n\n接下来，在第二个窗口中输入以下命令以启动并运行最后一个（被动）成员：\n\n```\n$ mkdir -p\
  \ /db/passive1/data\n$ mongod --dbpath /db/passive1/data --port 27023 --replSet\
  \ testset\n```\n\n至此，你已经运行了三个服务器实例并相互通信；然而，你的副本集还没有完全运行起来，因为你尚未初始化副本集，也没有指示每个成员其角色和职责。\n\
  \n为此，你需要连接到其中一台服务器并初始化副本集。以下代码选择连接到第一台服务器：\n\n```\n$mongo [hostname]:27021\n```\n\
  \n接下来，你需要初始化此集合的第一个成员，以创建其操作日志（oplog）和一个默认的配置文档。你可以在日志文件中看到 MongoD 实例提示你需要这样做：\n\
  \n```\nMon Jun 3 21:25:23.712 [rsStart] replSet can't get local.system.replset config\
  \ from self or any seed (EMPTYCONFIG)\nMon Jun 3 21:25:23.712 [rsStart] replSet\
  \ info you may need to run replSetInitiate -- rs.initiate() in the shell -- if that\
  \ is not already done\n```\n\n因此，运行 `rs.initiate` 命令：\n\n```\n> rs.initiate()\n\
  {\n     \"info2\" : \"no configuration explicitly specified -- making one\",\n \
  \    \"me\" : \"[hostname]:27021\",\n     \"info\" : \"Config now saved locally.\
  \ Should come online in about a minute.\",\n     \"ok\" : 1\n}\n```\n\n最后，你应该检查副本集的状态，以确定它是否已正确设置：\n\
  \n```\n>rs.status()\n{\n     \"set\" : \"testset\",\n     \"date\" : ISODate(\"\
  2013-06-03T11:28:58Z\"),\n     \"myState\" : 1,\n     \"members\" : [\n        \
  \  {\n               \"_id\" : 0,\n               \"name\" : \"[hostname]:27021\"\
  ,\n               \"health\" : 1,\n               \"state\" : 1,\n             \
  \  \"stateStr\" : \"PRIMARY\",\n               \"uptime\" : 264,\n             \
  \  \"optime\" : {\n                    \"t\" : 1370258919,\n                   \
  \ \"i\" : 1\n               },\n               \"optimeDate\" : ISODate(\"2013-06-03T11:28:39Z\"\
  ),\n               \"self\" : true\n          }\n     ],\n     \"ok\" : 1\n}\n```\n\
  \n此处的输出表明一切正常：你已成功配置、设置并初始化了一个新的副本集。请记住，你应该使用你自己机器的名称代替 `[hostname]`，因为 \"localhost\"\
  \ 或 \"127.0.0.1\" 都将无法工作。\n\n#### 向副本集添加服务器\n\n现在你已经启动了新的副本集，你需要开始向其添加成员。让我们从添加你的第一个辅助节点开始。你可以通过简单地添加\
  \ `rs.add()` 命令并提供此实例的主机名和端口来实现。为此，连接到你的主节点并运行以下命令：\n\n```\n$ mongo [hostname]:27021\n\
  > rs.add(\"[hostname]:27021\")\n{ \"ok\" : 1 }\n```\n\n你需要等待一两分钟，以便该节点自行上线、创建自己的操作日志并做好准备。在等待期间，你可以使用\
  \ `rs.status()` 监控进度，直到此节点作为辅助节点上线：\n\n```\n>use admin\n>rs.status() {\n\"set\"\
  \ : \"testset\",\n\"date\" : ISODate(\"2013-06-03T11:36:37Z\"),\n\"myState\" : 1,\n\
  \"members\" : [\n{\n\"_id\" : 0,\n\"name\" : \"[hostname]:27021\",\n\"health\" :\
  \ 1,\n\"state\" : 1,\n\"stateStr\" : \"PRIMARY\",\n\"uptime\" : 723,\n\"optime\"\
  \ : {\n\"t\" : 1370259331,\n\"i\" : 1\n},\n\"optimeDate\" : ISODate(\"2013-06-03T11:35:31Z\"\
  ),\n\"self\" : true\n},\n{\n\"_id\" : 1,\n\"name\" : \"[hostname]:27022\",\n\"health\"\
  \ : 1,\n\"state\" : 2,\n\"stateStr\" : \"SECONDARY\",\n\"uptime\" : 66,\n\"optime\"\
  \ : {\n\"t\" : 1370259331,\n\"i\" : 1\n},\n\"optimeDate\" : ISODate(\"2013-06-03T11:35:31Z\"\
  ),\n\"lastHeartbeat\" : ISODate(\"2013-06-03T11:36:35Z\"),\n\"lastHeartbeatRecv\"\
  \ : ISODate(\"2013-06-03T11:36:36Z\"),\n\"pingMs\" : 0,\n\"syncingTo\" : \"[hostname]:27021\"\
  \n}\n],\n\"ok\" : 1\n}\n```\n\n现在让我们利用第三个被动成员。首先照常用 `rs.add()` 添加成员：\n\n```\n$ mongo\
  \ [hostname]:27022\n> rs.add(\"[hostname]:27022\")\n{ \"ok\" : 1 }\n```\n\n现在我们需要复制配置文档并进行修改。运行以下命令创建一个名为\
  \ `conf` 的文档，它包含你当前的副本集配置。\n\n```\n> conf = rs.conf()\n{\n\"_id\" : \"testset\"\
  ,\n\"version\" : 3,\n\"members\" : [\n{\n\"_id\" : 0,\n\"host\" : \"[hostname]:27021\"\
  \n},\n{\n\"_id\" : 1,\n\"host\" : \"[hostname]:27022\"\n},\n{\n\"_id\" : 2,\n\"\
  host\" : \"[hostname]:27023\"\n}\n]\n}\n```\n\n现在你的配置文档已加载，你需要修改它。我们希望将该节点设置为隐藏，并赋予其优先级为\
  \ 0，这样它就不会被选举为主节点。请注意，该文档有一个 `members` 数组，其中包含副本集每个成员的文档。你需要使用数组运算符 [] 选择你希望访问的成员。因此，要为第三个成员创建\
  \ `hidden : true` 的值，我们需要更新索引为 2 的数组元素（记住，数组从 0 开始）。运行以下命令：\n\n```\n> conf.members[2].hidden\
  \ = true\ntrue\n```\n\n现在我们可以使用相同的命令设置优先级值为 0：\n\n```\n> conf.members[2].priority\
  \ = 0\n0\n```\n\n你可以通过简单地执行你存放配置文档的变量名来输出此配置文档：\n\n```\n> conf\n{\n\"_id\" : \"\
  testset\",\n\"version\" : 3,\n\"members\" : [\n{\n\"_id\" : 0,\n\"host\" : \"[hostname]:27021\"\
  \n},\n{\n\"_id\" : 1,\n\"host\" : \"[hostname]:27022\"\n},\n{\n\"_id\" : 2,\n\"\
  host\" : \"[hostname]:27023\",\n\"hidden\" : true,\n\"priority\" : 0\n}\n]\n}\n\
  ```\n\n如你所见，此成员现在设置了隐藏值且优先级为 0。现在我们需要做的就是更新副本集配置以使用此文档。我们通过发出 `rs.reconfig` 命令并将新的配置文档作为参数来实现这一点。\n\
  \n```\n> rs.reconfig(conf)\nTue Jun 4 20:01:45.234 DBClientCursor::init call() failed\n\
  Tue Jun 4 20:01:45.235 trying reconnect to 127.0.0.1:27021\nTue Jun 4 20:01:45.235\
  \ reconnect 127.0.0.1:27021 ok\nreconnected to server after rs command (which is\
  \ normal)\n```\n\n你的整个副本集丢失了连接然后又重新连接了！这是因为重新配置造成的。对副本集的任何更改都可能导致副本集重新配置自身并进行新的选举，在大多数情况下，这会使之前的主节点退回到其角色。现在如果我们重新运行\
  \ `rs.conf()` 命令，你就可以看到你的新副本集配置已生效。\n\n```\n> rs.conf()\n{\n\"_id\" : \"testset\"\
  ,\n\"version\" : 4,\n\"members\" : [\n{\n\"_id\" : 0,\n\"host\" : \"[hostname]:27021\"\
  \n},\n{\n\n\n\n`\"_id\" : 1`,\n`\"host\" : \"[hostname]:27022\"`\n`}`,\n`{`\n`\"\
  _id\" : 2`,\n`\"host\" : \"[hostname]:27023\"`,\n`\"priority\" : 0`,\n`\"hidden\"\
  \ : true`\n}`\n`]`\n`}`\n\n请注意，此副本集配置的版本号现已增加。这是作为重新配置的一部分自动发生的，以确保任何副本集成员不会持有错误的配置文档。\n\
  \n您现在应该拥有一个完全配置好且可工作的三成员副本集，其中包含一个活跃的主节点和一个隐藏的“被动节点”。\n\n##### 添加仲裁节点\n\n将一个仲裁节点添加为副本集的投票成员是一个简单的过程。让我们先启动一个新成员。\n\
  \n```\n$ mkdir -p /db/arbiter1/data\n$ mongod --dbpath /db/arbiter1/data --port\
  \ 27024 --replSet testset –rest\n```\n\n现在您已经创建了一个新成员，只需使用 `rs.addArb()` 命令添加新的仲裁节点即可：\n\
  \n```\n> rs.addArb(\"[hostname]:27024\")\n{ \"ok\" : 1 }\n```\n\n如果您现在运行 `rs.status()`，您将在输出中看到您的仲裁节点：\n\
  \n```\n{\n  \"_id\" : 3,\n  \"name\" : \"Pixl.local:27024\",\n  \"health\" : 1,\n\
  \  \"state\" : 7,\n  \"stateStr\" : \"ARBITER\",\n  \"uptime\" : 721,\n  \"lastHeartbeat\"\
  \ : ISODate(\"2013-06-07T11:21:01Z\"),\n  \"lastHeartbeatRecv\" : ISODate(\"2013-06-07T11:21:00Z\"\
  ),\n  \"pingMs\" : 0\n}\n```\n\n您可能已经发现这里有个问题；我们现在有四个节点。这是个偶数，而偶数可不好！如果我们继续这样运行，您的\
  \ MongoDB 节点将开始记录以下日志：\n\n```\n[rsMgr] replSet total number of votes is even - add\
  \ arbiter or give one member an extra vote\n```\n\n要解决这个问题，我们知道成员数量必须是奇数；因此一个可能的解决方案是按照日志消息的建议再添加一个仲裁节点，但这并非严格意义上的优雅做法，因为我们增加了不必要的额外复杂性。最佳解决方案是让其中一个现有节点停止投票，并使其不被视为法定人数的一部分。我们可以通过将隐藏的辅助节点的投票数设置为零来实现这一点。其设置方式与我们设置隐藏和优先级值的方式相同。\n\
  \n```\nconf = rs.conf()\nconf.members[2].votes = 0\nrs.reconfig(conf)\n```\n\n就是这样。我们现在已将我们的被动节点设置为真正的被动：它永远不会成为主节点；它被客户端视为副本集的一部分；并且它不能参与选举或被计入多数票。要测试这一点，您可以尝试关闭被动节点，仲裁节点和您的其他两个节点将继续运行，主节点保持不变；而在此之前，主节点会退位，声称它无法看到多数节点。\n\
  \n##### 副本集链式同步\n\n您已经看到，通常情况下，副本集的成员会尝试从该集合的主节点同步数据。但这并非辅助节点唯一的同步来源；它们也可以从其他辅助节点同步。通过这种方式，您的辅助节点可以形成一个“同步链”，其中每个节点都从副本集中的其他辅助节点同步最新数据。\n\
  \n##### 管理副本集\n\nMongoDB 提供了多个命令来管理副本集的配置和状态。下表显示了可用的命令，您可使用这些命令在副本集中创建、操作和检查集群状态。\n\
  \n**表 11-2. 用于操作和检查副本集的命令**\n\n| 命令 | 描述 |\n| --- | --- |\n| `rs.help()` | 返回此表中的命令列表。\
  \ |\n| `rs.status()` | 返回有关副本集当前状态的信息。此命令列出每个成员服务器及其状态信息，包括上次联系时间。此调用可用于提供整个集群的简单健康检查。\
  \ |\n| `rs.initiate()` | 使用默认参数初始化副本集。 |\n| `rs.initiate(replSetcfg)` | 使用配置描述初始化副本集。\
  \ |\n| `rs.add(\"host:port\")` | 使用提供主机名和（可选）特定端口的简单字符串将成员服务器添加到副本集。 |\n| `rs.add(membercfg)`\
  \ | 使用配置描述将成员服务器添加到副本集。如果要指定特定属性（例如，新成员服务器的优先级），则必须使用此方法。 |\n| `rs.addArb(\"host:port\"\
  )` | 添加一个新的成员服务器作为仲裁节点运行。该成员无需使用 `--replSet` 选项启动；任何可访问机器上运行的任何 `mongod` 实例都可以执行此任务。请确保该服务器可由副本集的所有成员访问。\
  \ |\n| `rs.stepDown()` | 当您在副本集的主成员上运行此命令时，会使主服务器放弃其角色，并强制集群选举新的主服务器。请注意，只有活跃的辅助服务器才有资格成为新的主服务器，如果在等待\
  \ 60 秒后没有其他候选成员可用，则原始主服务器可能会被重新选举。 |\n| `rs.syncFrom(\"host:port\")` | 使一个辅助节点从给定成员同步。可用于形成同步链。\
  \ |\n| `rs.freeze(secs)` | 冻结给定成员，使其在指定的秒数内没有资格成为主节点。 |\n| `rs.remove(\"host:port\"\
  )` | 从副本集中移除给定成员。 |\n| `rs.slaveOk()` | 设置此连接，使其允许从辅助节点读取。 |\n| `rs.conf()` | 重新显示当前副本集的配置结构。此命令对于获取副本集的配置结构非常有用。可以修改此配置结构，然后再次提供给\
  \ `rs.initiate()` 以更改结构的配置。此技术提供了从副本集中移除成员服务器的唯一受支持方式；目前没有直接方法可用。 |\n| `db.isMaster()`\
  \ | 此函数不特定于副本集；相反，它是一个通用的复制支持函数，允许应用程序或驱动程序确定特定连接的实例是否是复制拓扑中的主服务器/主节点。 |\n\n以下各节将更详细地介绍上表中列出的一些更常用的命令，提供有关其功能和使用方法的更多细节。\n\
  \n\n\n###### 使用 `rs.status( )` 检查实例状态\n\n正如你从我们之前向副本集添加成员的探索中应该意识到的，`rs.status()`\
  \ 可能是你在处理副本集时最常用的命令。它允许你检查当前所连接实例的状态，包括它在副本集中的角色：\n\n```\n>rs.status()\n> rs.status();\n\
  {\n     \"set\" : \"testset\",\n     \"date\" : ISODate(\"2013-06-04T10:57:24Z\"\
  ),\n     \"myState\" : 1,\n     \"members\" : [\n          {\n               \"\
  _id\" : 0,\n               \"name\" : \"[hostname]:27021\",\n               \"health\"\
  \ : 1,\n               \"state\" : 1,\n               \"stateStr\" : \"PRIMARY\"\
  ,\n               \"uptime\" : 4131,\n               \"optime\" : Timestamp(1370340105,\
  \ 1),\n               \"optimeDate\" : ISODate(\"2013-06-04T10:01:45Z\"),\n    \
  \           \"self\" : true\n          },\n          {\n               \"_id\" :\
  \ 1,\n               \"name\" : \"[hostname]:27022\",\n               \"health\"\
  \ : 1,\n               \"state\" : 2,\n               \"stateStr\" : \"SECONDARY\"\
  ,\n               \"uptime\" : 3339,\n               \"optime\" : Timestamp(1370340105,\
  \ 1),\n               \"optimeDate\" : ISODate(\"2013-06-04T10:01:45Z\"),\n    \
  \           \"lastHeartbeat\" : ISODate(\"2013-06-04T10:57:23Z\"),\n           \
  \    \"lastHeartbeatRecv\" : ISODate(\"2013-06-04T10:57:23Z\"),\n              \
  \ \"pingMs\" : 0,\n               \"syncingTo\" : \"[hostname]:27021\"\n       \
  \   },\n          {\n               \"_id\" : 2,\n               \"name\" : \"[hostname]:27023\"\
  ,\n               \"health\" : 1,\n               \"state\" : 2,\n             \
  \  \"stateStr\" : \"SECONDARY\",\n               \"uptime\" : 3339,\n          \
  \     \"optime\" : Timestamp(1370340105, 1),\n               \"optimeDate\" : ISODate(\"\
  2013-06-04T10:01:45Z\"),\n               \"lastHeartbeat\" : ISODate(\"2013-06-04T10:57:22Z\"\
  ),\n               \"lastHeartbeatRecv\" : ISODate(\"2013-06-04T10:57:23Z\"),\n\
  \               \"pingMs\" : 0,\n               \"syncingTo\" : \"[hostname]:27021\"\
  \n          }\n     ],\n     \"ok\" : 1\n}\n```\n\n示例中显示的每个字段都有其含义，如表 11-3 所述。这些值可用于了解副本集当前成员的状态。\n\
  \n**表 11-3.** `rs.status` 字段的值\n\n| 值 | 描述 |\n| --- | --- |\n| `_id` | 此成员作为副本集一部分的\
  \ ID |\n| `Name` | 成员的主机名 |\n| `Health` | `replSet` 的健康值 |\n| `State` | 状态的数字值 |\n\
  | `StateStr` | 此副本集成员状态的字符串表示 |\n| `Uptime` | 此成员已运行的时间 |\n| `optime` | 在此成员上应用的最后一条操作的时间，格式为时间戳和一个整数值\
  \ |\n| `optimeDate` | 最后应用操作的日期 |\n| `lastHeartbeat` | 发送的最后一次心跳的日期 |\n| `lastHeartbeatRecv`\
  \ | 接收的最后一次心跳的日期 |\n| `pingMs` | 运行 `rs.status()` 的成员与每个远程成员之间的 ping 时间 |\n| `syncingTo`\
  \ | 此节点正在同步以匹配的副本集成员 |\n\n在前面的示例中，`rs.status()` 命令是针对主服务器成员运行的。此命令返回的信息显示主服务器以 `myState`\
  \ 值为 `1` 运行；换句话说，“成员正作为主节点（主服务器）运行。”\n\n###### 使用 `rs.stepDown( )` 强制进行新一轮选举\n\n\
  你可以使用 `rs.stepDown()` 命令强制主服务器下台 60 秒；该命令还会强制选举新的主服务器。该命令在以下情况下很有用：\n\n*   当你需要将托管主实例的服务器离线时，无论是为了调查服务器还是实施硬件升级或维护。\n\
  *   当你想针对数据结构运行诊断过程时。\n*   当你想模拟主节点故障的影响并强制你的集群进行故障转移时，以便测试你的应用程序如何响应此类事件。\n\n以下示例显示了如果你对\
  \ `testset` 副本集运行 `rs.stepDown()` 命令时返回的输出：\n\n```\n> rs.stepDown()\n> rs.status()\n\
  {\n     \"set\" : \"testset\",\n     \"date\" : ISODate(\"2013-06-04T11:19:01Z\"\
  ),\n     \"myState\" : 2,\n     \"members\" : [\n          {\n               \"\
  _id\" : 0,\n               \"name\" : \"[hostname]:27021\",\n               \"health\"\
  \ : 1,\n               \"state\" : 2,\n               \"stateStr\" : \"SECONDARY\"\
  ,\n               \"uptime\" : 5428,\n               \"optime\" : Timestamp(1370340105,\
  \ 1),\n               \"optimeDate\" : ISODate(\"2013-06-04T10:01:45Z\"),\n    \
  \           \"self\" : true\n          },\n          {\n               \"_id\" :\
  \ 1,\n               \"name\" : \"[hostname]:27022\",\n               \"health\"\
  \ : 1,\n               \"state\" : 2,\n               \"stateStr\" : \"SECONDARY\"\
  ,\n               \"uptime\" : 4636,\n               \"optime\" : Timestamp(1370340105,\
  \ 1),\n               \"optimeDate\" : ISODate(\"2013-06-04T10:01:45Z\"),\n    \
  \           \"lastHeartbeat\" : ISODate(\"2013-06-04T11:19:00Z\"),\n           \
  \    \"lastHeartbeatRecv\" : ISODate(\"2013-06-04T11:19:00Z\"),\n              \
  \ \"pingMs\" : 0,\n               \"syncingTo\" : \"[hostname]:27021\"\n       \
  \   },\n          {\n               \"_id\" : 2,\n               \"name\" : \"[hostname]:27023\"\
  ,\n               \"health\" : 1,\n               \"state\" : 2,\n             \
  \  \"stateStr\" : \"SECONDARY\",\n               \"uptime\" : 4636,\n          \
  \     \"optime\" : Timestamp(1370340105, 1),\n               \"optimeDate\" : ISODate(\"\
  2013-06-04T10:01:45Z\"),\n               \"lastHeartbeat\" : ISODate(\"2013-06-04T11:19:01Z\"\
  ),\n               \"lastHeartbeatRecv\" : ISODate(\"2013-06-04T11:19:00Z\"),\n\
  \               \"pingMs\" : 0,\n               \"lastHeartbeatMessage\" : \"db\
  \ exception in producer: 10278 dbclient error communicating with server: [hostname]:27021\"\
  ,\n               \"syncingTo\" : \"[hostname]:27021\"\n          }\n     ],\n \
  \    \"ok\" : 1\n}\n```\n\n在此示例中，你针对主服务器运行了 `rs.stepDown()` 命令。`rs.status()` 命令的输出显示，副本集的所有成员现在都是辅助节点。如果你随后运行\
  \ `rs.status()`，你应该会看到另一个成员已晋升为主节点（假设它符合条件）。\n\n###### 确定成员是否为主服务器\n\n`db.isMaster()`\
  \ 命令并非严格用于副本集。然而，该命令非常有用，因为它允许应用程序测试当前连接是否连接到主服务器：\n\n```\n>db.isMaster()\n{\n \
  \    \"setName\" : \"testset\",\n     \"ismaster\" : true,\n     \"secondary\" :\
  \ false,\n     \"hosts\" : [\n          \"[hostname]:27022\",\n          \"[hostname]:27021\"\
  \n     ],\n     \"primary\" : \"[hostname]:27022\",\n     \"me\" : \"[hostname]:27022\"\
  ,\n     \"maxBsonObjectSize\" : 16777216,\n     \"maxMessageSizeBytes\" : 48000000,\n\
  \     \"localTime\" : ISODate(\"2013-06-04T11:22:28.771Z\"),\n     \"ok\" : 1\n\
  }\n```\n\n如果你此时对你的 `testset` 副本集集群运行 `isMaster()`，它会显示你运行命令的服务器不是主/主服务器（`\"ismaster\"\
  \ == false`）。如果你运行此命令的服务器实例是副本集的成员，该命令还会返回该集合中已知服务器实例的映射，包括各个服务器在该集合中的角色。\n\n\n\
  ##### 配置副本集成员选项\n\n副本集功能包含多个可用于控制副本集成员行为的选项。当运行 `rs.initiate(replSetcfg)` 或 `rs.add(membercfg)`\
  \ 时，必须提供一个描述副本集成员特性的配置结构：\n\n```json\n{\n  _id: <setname>,\n  members: [\n    {\n\
  \      _id: <ordinal>,\n      host: <hostname[:port]>,\n      [ priority: <priority>,\
  \ ],\n      [ arbiterOnly: true, ],\n      [ votes: <n>, ],\n      [ hidden: true,\
  \ ],\n      [ tags: { document }, ],\n      [ slaveDelay: <seconds>, ],\n      [\
  \ buildIndexes: true, ]\n    },\n    ...\n  ],\n  settings: {\n    [ chainingAllowed:\
  \ <boolean>, ],\n    [ getLastErrorModes: <modes>, ],\n    [ getLastErrorDefaults:\
  \ <lasterrdefaults>, ]\n  }\n}\n```\n\n对于 `rs.initiate()`，应提供完整的配置结构，如上所示。配置结构本身包含三个顶层级别：`_id`、`members`\
  \ 和 `settings`。`_id` 是副本集的名称，在创建副本集成员时通过 `--replSet` 命令行选项提供。`members` 数组由一组描述集合中每个成员的结构组成；这是在使用\
  \ `rs.add()` 命令向集合中添加单个服务器时提供的成员结构。最后，`settings` 数组包含应用于整个副本集的选项。\n\n###### members\
  \ 结构的组织\n\n`members` 结构包含配置副本集每个成员实例所需的所有条目；您可以在表 11-4 中看到所有这些条目。\n\n**表 11-4：配置成员服务器属性**\n\
  \n| 选项 | 描述 |\n| --- | --- |\n| `members.$._id` | （必需）整数：此元素指定成员结构在 `members` 数组中的序数位置。此元素的可能值包括大于或等于\
  \ `0` 的整数。此值允许您寻址特定的成员结构，以便可以执行添加、删除和覆盖操作。 |\n| `members.$.host` | （必需）字符串：此元素以\
  \ `host:port` 的形式指定服务器的名称；请注意，主机部分不能是 `localhost` 或 `127.0.0.1`。 |\n| `members.$.priority`\
  \ | （可选）浮点数：此元素表示在为新的主服务器进行选举时分配给服务器的权重。如果主服务器变得不可用，则将根据此值提升一个辅助服务器。任何优先级非零的辅助服务器都被认为是活动的并有资格成为主服务器。因此，将此值设置为零会强制辅助服务器变为被动状态。如果多个辅助服务器共享相等的优先权，则将进行投票，仲裁者（如果已配置）可能被要求解决任何死锁。此元素的默认值为\
  \ `1.0`。 |\n| `members.$.arbiterOnly` | （可选）布尔值：此成员作为选举新主服务器的仲裁者运行。它不涉及副本集的任何其他功能，并且不需要使用\
  \ `--replSet` 命令行选项启动。系统中任何正在运行的 `mongod` 进程都可以执行此任务。此元素的默认值为 `false`。 |\n| `members.$.votes`\
  \ | （可选）整数：此元素指定实例可以投出的将其他实例选举为主服务器的票数；此元素的默认值为 `1`。 |\n| `members.$.hidden` | （可选）布尔值：这会将节点从\
  \ `db.isMaster()` 的输出中隐藏，从而防止即使在使用辅助读取偏好设置时也在该节点上发生读取操作。 |\n| `members.$.tags` |\
  \ （可选）文档：这允许您为副本集标记的读取偏好设置设置标签。 |\n| `members.$.slaveDelay` | （可选）整数：这允许您将从节点设置为落后于主节点指定的秒数。\
  \ |\n| `members.$.buildIndexes` | （可选）布尔值：此选项用于禁用索引的构建。理论上可能成为主节点的节点上永远不应设置此选项。此功能对于备份节点等非常有用，当索引不重要且您希望节省空间时。\
  \ |\n\n###### 探索 Settings 结构中的可用选项\n\n表 11-5 列出了 `settings` 结构中可用的副本集属性。这些设置全局应用于整个副本集；您使用这些属性来配置副本集成员如何相互通信。\n\
  \n**表 11-5：用于服务器间通信的 Settings 结构属性**\n\n| 选项 | 描述 |\n| --- | --- |\n| `settings.chainingAllowed`\
  \ | （可选）布尔值：允许您指定是否允许成员从其他辅助节点复制。默认为 true |\n| `settings.getLastErrorModes` | （可选）模式：用于设置自定义写关注点，如本章后面所述。\
  \ |\n| `settings.getLastErrorDefaults` | （可选）默认值：用于设置自定义写关注点 |\n\n##### 从应用程序连接到副本集\n\
  \n从 PHP 连接到副本集与连接到单个 MongoDB 实例类似。唯一的区别是它可以提供单个副本集实例地址或副本集成员列表；连接库将找出哪个服务器是主服务器并将查询定向到该机器，即使主服务器不是您提供的成员之一。因此，最好在连接字符串中指定多个成员；这样，您可以消除仅从一个可能离线的成员中发现的风险。以下示例显示了如何从\
  \ PHP 应用程序连接到副本集：\n\n```php\n<?php\n$m = new MongoClient(\"mongodb://localhost:27021,localhost:27022\"\
  ,\n    array(\"replicaSet\" => \"testSet\"));\n...\n?>\n```\n\n#### 在应用程序中设置读偏好\n\
  \nMongoDB 中的读偏好是一种选择希望从副本集的哪个成员读取数据的方式。通过向驱动程序指定读偏好，可以告诉它对副本集的特定成员（或多个成员）运行查询。目前，驱动程序上可以设置五种读偏好模式，如表\
  \ 11-6 所示。\n\n**表 11-6. 读偏好选项**\n\n| 选项 | 描述 |\n| --- | --- |\n| `Primary` | 读操作将只被定向到主节点。如果与标签读偏好显式结合使用，此读偏好将被阻塞。这也是默认的读偏好。\
  \ |\n| `PrimaryPreferred` | 读操作将被定向到主节点，除非没有可用的主节点；此时读操作将被定向到一个从节点。 |\n| `Secondary`\
  \ | 读操作将只被定向到从节点。如果没有可用的从节点，此选项将引发异常。 |\n| `SecondaryPreferred` | 读操作将被定向到从节点，除非没有可用的从节点；此时读操作将被定向到主节点。这对应于旧的“slaveOk”从节点读方法的行为。\
  \ |\n| `Nearest` | 从最近的节点读取，无论它是主节点还是从节点。`Nearest` 使用网络延迟来确定使用哪个节点。 |\n\n> **注意**\n\
  >\n> 如果设置了可能导致读操作来自从节点的读偏好，必须意识到这些数据可能不是最新的；某些操作可能尚未从主节点复制过来。\n\n在 PHP 中，可以使用连接对象上的\
  \ `setReadPreference()` 命令来设置读偏好，如下所示：\n```php\n<?php\n$m = new MongoClient(\"mongodb://localhost:27021,localhost:27022\"\
  , array(\"replicaSet\" => \"testSet\"));\n$m->setReadPreference(MongoClient::RP_SECONDARY_PREFERRED,\
  \ array());\n...\n?>\n```\n从现在开始，您在该连接上进行的任何查询都将针对集群中的从节点运行。您也可以通过向 URI 添加读偏好标签来设置读偏好。指定读偏好为\
  \ `nearest` 的 URI 如下所示：\n```\nmongodb://localhost:27021,localhost:27022?readPreference=nearest\n\
  ```\n\n#### 在应用程序中设置写关注点\n\n写关注点是一个与读偏好类似的概念。使用写关注点来指定在数据被视为“完成”之前，需要已安全提交到多少个节点。此测试使用\
  \ MongoDB 的 Get Last Error（GLE）机制来检查连接上发生的最后一个错误。您可以设置几种写关注点模式，以配置对写入在执行时被持久化的确信程度。每种模式如表\
  \ 11-7 所示。\n\n**表 11-7. MongoDB 写关注点级别**\n\n| 选项 | 描述 |\n| --- | --- |\n| `W=0`\
  \ 或 `Unacknowledged` | 即发即忘的写入。写入将被发送，但不会尝试确认它是否已提交。 |\n| `W=1` 或 `Acknowledged`\
  \ | 写入必须得到主节点的确认。这是默认值。 |\n| `W=N` 或 `Replica Set Acknowledged` | 主节点必须确认写入，并且 N-1\
  \ 个成员必须从主节点复制此写入。此选项更健壮，但如果副本集中的成员存在复制延迟，或者由于故障等原因导致在提交写入时没有足够多的成员在线，可能会导致延迟。 |\n\
  | `W=Majority` | 写入必须写入主节点并由足够多的成员复制，使得集合中的大多数成员已确认该写入。与 `w=n` 一样，这在故障或存在复制延迟时可能导致问题。\
  \ |\n| `J=true` 或 `Journaled` | 可与 `w=` 写关注点结合使用，以指定写入必须持久化到日志中才被视为已确认。 |\n\n为了在插入操作时使用写关注点，只需向给定的\
  \ `insert()` 函数添加 `w` 选项，如下所示：\n```\n$col->insert($document, array(\"w\" => 1));\n\
  ```\n这尝试向我们的集合插入一个文档，并使用 `w=1` 值来确认写入。\n\n#### 使用标签实现读偏好和写关注点\n\n除了刚刚讨论的读偏好和写关注点选项外，还有另一种方法可以使用——标签。此机制允许您在副本集的成员上设置自定义标签，然后在读偏好和写关注点设置中使用这些标签，以更精细地引导操作。那么，我们马上开始吧。您可以通过将标签添加到副本集配置文件的\
  \ `tags` 部分来设置标签。首先为副本集配置添加 `sites` 为 `a` 和 `b` 的标签：\n```\nconf = rs.conf()\nconf.members[0].tags\
  \ = {site : \"a\"}\nconf.members[1].tags = {site : \"b\"}\nconf.members[2].tags\
  \ = {site : \"a\"}\nrs.reconfigure(conf)\n```\n现在我们可以查看新的配置，可以看到我们已经设置了两个站点；它们定义在每个配置文档的\
  \ `tags` 部分中。\n```\nrs.conf()\n{\n     \"_id\" : \"testset\",\n     \"version\"\
  \ : 8,\n     \"members\" : [\n          {\n               \"_id\" : 0,\n       \
  \        \"host\" : \"Pixl.local:27021\",\n               \"tags\" : {\n       \
  \             \"site\" : \"a\"\n               }\n          },\n          {\n  \
  \             \"_id\" : 1,\n               \"host\" : \"Pixl.local:27022\",\n  \
  \             \"tags\" : {\n                    \"site\" : \"b\"\n             \
  \  }\n          },\n          {\n               \"_id\" : 2,\n               \"\
  host\" : \"Pixl.local:27023\",\n               \"priority\" : 0,\n             \
  \  \"hidden\" : true,\n               \"tags\" : {\n                    \"site\"\
  \ : \"a\"\n               }\n          },\n          {\n               \"_id\" :\
  \ 3,\n               \"host\" : \"Pixl.local:27024\",\n               \"arbiterOnly\"\
  \ : true\n          }\n     ]\n}\n```\n现在让我们开始使用新的标签！我们可以设置读偏好为副本集中位于站点 `a` 的最近成员。\n\
  ```\n$m->setReadPreference(MongoClient::RP_NEAREST, array( array('site' => 'a'),\
  \ ));\n```\n处理完读偏好后，我们开始处理写关注点。写关注点稍微复杂一些，因为我们需要先修改副本集配置以添加额外的 `getLastErrorModes`。在本例中，我们想创建一个写关注点，要求给定的写入必须提交到足够多的节点，以确保已写入两个不同的站点。这意味着写入必须至少提交到站点\
  \ `a` 和站点 `b`。为此，我们需要将 `getLastErrorModes` 变量设置为一个文档，其中包含我们的新写关注点名称和一个规则，说明我们希望它被写入两个不同的“site”标签。操作如下：\n\
  ```\nconf = rs.conf()\nconf.settings.getLastErrorModes = { bothSites : { \"site\"\
  : 2 } }\nrs.reconfig(conf)\n```\n现在我们需要插入文档并指定新的写关注点。\n```\n$col->insert($document,\
  \ array(\"w\" => \"bothSites\"));\n```\n就是这么简单。现在我们可以保证写入被提交到两个站点！假设我们想让这成为对集群进行任何写入时的默认写关注点。\n\
  ```\nconf = rs.conf()\nconf.settings.getLastErrorDefaults = { bothSites : 1 }\n\
  rs.reconfig(conf)\n```\n现在，我们进行的任何写入都将使用默认的写关注点 `bothSites`。这样，如果我们只是执行一个普通的插入操作！\n\
  \n\n#### 概要\n\nMongoDB 提供了一套丰富的工具，用于实现冗余且稳健的复制拓扑结构。在本章中，你了解了其中的许多工具，包括使用它们的一些原因和动机。你还学习了如何设置多种不同的复制集拓扑结构。此外，你还学习了如何使用命令行工具和内置的\
  \ Web 界面来检查复制系统的状态。最后，你学习了如何设置和配置读取首选项与写入关注点，以确保从正确的位置读取数据并向正确的位置写入数据。\n\n请花必要的时间评估本章描述的每一种选项和功能，确保在尝试将复制集用于生产环境之前，构建出最适合你特定需求的复制集。在单机上使用\
  \ MongoDB 创建测试环境非常容易，正如我们在本章中所做的那样。因此，我们强烈建议你尝试每种方法，确保你完全理解每种方法的优点和局限性，包括它在处理你的特定数据和应用程序时的性能表现。\n\
  \n### 12. 分片\n\n#### 摘要\n\n无论你是在构建下一个 Facebook 还是仅仅一个简单的数据库应用程序，如果你的应用取得成功，很可能在某个时刻你需要对其进行扩展。如果你不想持续更换硬件（或者你开始接近单块硬件所能处理的极限），那么你会希望使用一种能根据需要逐步向系统增加容量的技术。分片是一种可以将数据分布在多台机器上的技术，但它以一种模仿应用程序访问单个数据库的方式实现这一点。\n\
  \n无论你是在构建下一个 Facebook 还是仅仅一个简单的数据库应用程序，如果你的应用取得成功，很可能在某个时刻你需要对其进行扩展。如果你不想持续更换硬件（或者你开始接近单块硬件所能处理的极限），那么你会希望使用一种能根据需要逐步向系统增加容量的技术。分片是一种可以将数据分布在多台机器上的技术，但它以一种模仿应用程序访问单个数据库的方式实现这一点。\n\
  \n分片技术非常适合基于云计算的平台，由 MongoDB 实现的分片是动态、负载敏感的自动扩展的理想选择，你可以根据需要增加容量，并在不需要时缩减容量。\n\n\
  本章将引导你完成在 MongoDB 中实现分片的过程，并探讨 MongoDB 分片实现中提供的一些高级功能，例如标签分片和哈希分片键。\n\n#### 探索分片的必要性\n\
  \n当万维网刚刚起步时，网站数量、用户数量以及在线信息量都很少。网络由几千个网站组成，用户数量仅为数万或至多几十万，主要集中在学术和研究社区。在早期，数据往往很简单：由超链接连接在一起的手工维护的\
  \ HTML 文档。构成网络的协议最初的设计目标是提供一种为存储在互联网上不同服务器的文档创建可导航引用的方法。\n\n即使是像雅虎这样的当前知名品牌，与如今的服务相比，当时在网上的存在也微乎其微。这家公司最初成立所围绕的产品是雅虎目录，不过是一组指向热门网站的手动编辑的链接网络。这些链接由一小群热情洋溢的人（被称为“冲浪者”）维护。雅虎目录中的每个页面都是一个简单的\
  \ HTML 文档，存储在文件系统目录树中，并使用简单的文本编辑器进行维护。\n\n但随着网络规模开始爆炸式增长——网站和访问者的数量开始近乎垂直地上升——可用资源的巨大体积迫使早期的网络先驱们从简单的文档转向从独立数据存储生成更复杂的动态页面。\n\
  \n搜索引擎开始爬取网络，并汇集链接数据库，如今这些数据库已拥有数千亿个链接和数百亿个存储页面。\n\n这些发展推动了向由不断发展的内容管理系统管理和维护的数据集的迁移，这些数据集主要存储在数据库中以便于访问。\n\
  \n与此同时，出现了存储不仅仅是文档和链接集的新型服务。例如，音频、视频、事件和各种其他数据开始进入这些巨大的数据存储区。这个过程通常被描述为“数据的工业化”——在许多方面，它与\
  \ 19 世纪以制造业为中心的工业革命有相似之处。\n\n最终，网络上每一家成功的公司都会面临如何访问这些庞大数据库中存储的数据的问题。他们发现，单台数据库服务器每秒能处理的查询数量是有限的，网络接口和磁盘驱动器每秒能与网络服务器传输的数据量也是有限的。提供网络服务的公司很快就会发现自己超出了单台服务器、网络或磁盘阵列的性能极限。在这种情况下，他们被迫分割和分发其庞大的数据集合。通常的解决方案是将这些巨大的数据块分割成更小的部分，以便更可靠、更快速地管理。同时，这些公司需要保持对其大型机器集群中保存的全部数据执行操作的能力。\n\
  \n你在第 11 章中详细了解过的复制，可以成为克服其中一些扩展问题的有效工具，使你能够在多台服务器中创建数据的多个相同副本。这使你（在正确的情况下）能够将服务器负载分散到更多机器上。\n\
  \n然而不久之后，你会遇到另一个问题：组成你数据集的单个表或集合变得如此之大，以至于其大小超出了单个数据库系统有效管理它们的能力。例如，Facebook 曾透露它每天收到超过\
  \ 3 亿张照片！而且该网站已经运营了近 10 年。\n\n一年下来就是 1095 亿张照片，如此大量的数据存放在一个表中是不可行的。因此，Facebook 和之前的许多公司一样，研究了将该记录集分布到大量数据库服务器上的方法。Facebook\
  \ 采用的解决方案是现实世界中记录较好（且公开）的分片实现之一。\n\n#### 水平与垂直数据分区\n\n数据分区是一种将数据分割到多个独立数据存储区的机制。这些数据存储区可以是共存的（在同一系统上）也可以是远程的（在不同系统上）。共存分区的动机是减少单个索引的大小，并减少更新记录所需的\
  \ I/O 量。远程分区的动机是通过增加更多用于存储数据的 RAM（从而避免磁盘访问），或者通过拥有更多可用的网络接口和磁盘 I/O 通道来提高数据访问带宽。\n\
  \n\n##### 垂直分区数据\n\n在传统的数据库视图中，数据按行和列存储。垂直分区是指根据列边界拆分一条记录，并将各部分存储在不同的表或集合中。可以说，采用具有一对一关系的连接表的关系数据库设计，就是一种共存垂直数据分区的形式。\n\
  \n然而，MongoDB 并不适合这种分区形式，因为其记录（文档）的结构不符合整洁的行列模型。因此，很少有机会能基于列边界清晰地拆分一行。MongoDB 也提倡使用嵌入式文档，并且它不直接支持在服务器端连接相关集合（这些操作可以在您的应用程序中完成）。\n\
  \n##### 水平分区数据\n\n使用 MongoDB 时，水平分区是唯一的选择，而分片是水平分区的一种常见形式。分片允许您将一个集合拆分到多台服务器上，以提高包含大量文档的集合的性能。\n\
  \n一个简单的分片例子是：将一个用户记录集合拆分到一组服务器上，使得姓氏以字母 A–G 开头的人的所有记录位于一台服务器上，H–M 开头的记录位于另一台服务器上，依此类推。用于拆分数据的规则被称为\
  \ `shard key`。\n\n简单来说，分片允许您将分片集群视为一个单一的集合来处理，应用程序无需感知数据分布在多台机器上。传统的分片实现要求应用程序必须积极参与确定特定文档存储在哪台服务器上，以便正确路由其请求。传统上，会有一个绑定到应用程序的库，该库负责在分片数据集中存储和查询数据。\n\
  \nMongoDB 采用了一种独特的分片方法，由一个 `MongoS` 路由进程管理数据的拆分和将请求路由到所需的分片服务器。如果一个查询需要来自多个分片的数据，那么\
  \ `MongoS` 将负责管理将从各个分片获取的数据合并回单个游标的过程。\n\n正是这一特性（而非其他），奠定了 MongoDB 作为面向云或网络的数据库的基础。\n\
  \n#### 分析一个简单的分片场景\n\n假设您想为一个虚构的盖尔语社交网络实现一个简单的分片方案。图 `12-1` 展示了此应用程序如何进行分片的简化表示。\n\
  \n![A978-1-4302-5822-3_12_Fig1_HTML.jpg](img/A978-1-4302-5822-3_12_Fig1_HTML.jpg)\n\
  \n`图 12-1`. 用户集合的简单分片\n\n我们这种对应用程序的简化视图存在一些问题。让我们看看最明显的一些。\n\n首先，如果您的盖尔语网络面向全球的爱尔兰和苏格兰社区，那么数据库中将有大量以\
  \ Mac 和 Mc 开头的苏格兰人姓名（如 MacDonald、McDougal 等），以及以 O’ 开头的爱尔兰人姓名（如 O’Reilly、O’Conner\
  \ 等）。因此，使用基于姓氏首字母的简单分片键，将会把过多的用户记录放置在支持字母范围“M–O”的分片上。同样，支持字母范围“X–Z”的分片几乎不需要处理任何工作。\n\
  \n分片系统的一个重要特性是必须确保数据均匀分布在可用的分片服务器集合中。这样可以防止影响集群整体性能的热点形成。我们称之为 `需求 1`：将数据均匀分布到所有分片上的能力。\n\
  \n另一件需要记住的事情是：当您将数据集拆分到多台服务器上时，实际上增加了数据集对硬件故障的脆弱性。也就是说，随着您添加服务器，单台服务器故障影响数据可用性的可能性也增加了。同样，可靠的分片系统的一个重要特性是——就像磁盘驱动器常用的\
  \ `RAID` 系统一样——它将每一份数据存储在多台服务器上，并且能够容忍单个分片服务器变得不可用。我们称之为 `需求 2`：以容错方式存储分片数据的能力。\n\
  \n最后，您需要确保可以在不备份和恢复数据、不重新分发数据到更小或更大分片集合的情况下，从分片集合中添加或移除服务器。此外，您需要能够在不导致集群停机的情况下完成此操作。我们称之为\
  \ `需求 3`：在系统运行时添加或移除分片的能力。\n\n接下来的章节将介绍如何满足这些要求。\n\n\n#### 使用 MongoDB 实现分片\n\nMongoDB\
  \ 使用代理机制来支持分片（参见图 12-2）；提供的 `mongos` 守护进程充当多个基于 `mongod` 的分片服务器的控制器。你的应用程序连接到 `mongos`\
  \ 进程，就像它是一个单一的 MongoDB 数据库服务器一样；之后，你的应用程序将其所有命令（如更新、查询和删除）发送到该 `mongos` 进程。\n\n\
  ![A978-1-4302-5822-3_12_Fig2_HTML.jpg](img/A978-1-4302-5822-3_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 一个无冗余的简单分片设置\n\n`mongos` 进程负责管理将应用程序的命令发送到哪个 MongoDB 服务器，该守护进程会将涉及多个分片的查询重新发送到多个服务器，并将结果聚合在一起。\n\
  \n##### 分片级别与关键概念\n\nMongoDB 在集合级别实现分片，而非数据库级别。在许多系统中，可能只有一两个集合会增长到需要分片的程度。因此，应谨慎使用分片；如果不需要，你不会希望为较小的集合强加管理数据分布的开销。\n\
  \n让我们回到虚构的盖尔语社交网络示例。在此应用程序中，`user` 集合包含其用户及其个人资料的详细信息。该集合可能会增长到需要分片的程度。然而，其他集合，如\
  \ `events`、`countries` 和 `states`，不太可能变得如此之大以至于分片能带来任何好处。\n\n分片系统使用分片键将数据映射到块中，块是文档键的逻辑连续范围（有关块的更多信息，请参见第\
  \ 5 章）。每个块标识了一组具有特定连续分片键值范围的文档；这些值使 `mongos` 控制器能够快速找到包含需要处理的文档的块。MongoDB 的分片系统然后将此块存储在可用的分片存储上；配置服务器跟踪哪个块存储在哪个分片服务器上。这是实现中的一个重要特性，因为它允许你在不备份和恢复数据的情况下向集群添加和移除分片。\n\
  \n##### 管理分片和配置\n\n当你向集群添加一个新分片时，系统会在新的服务器集合中迁移一定数量的块，以使它们分布均匀。同样，当你移除一个分片时，分片控制器会将块从即将离线的分片中排出，并将它们重新分配到剩余的分片服务器。\n\
  \nMongoDB 的分片设置还需要一个地方来存储其分片的配置，以及存储集群中每个分片服务器信息的地方。为了支持这一点，需要一个名为配置服务器的 MongoDB\
  \ 服务器；此服务器实例是一个以特殊角色运行的 `mongod` 服务器。如前所述，配置服务器还充当目录，允许确定每个块的位置。你的集群中可以有一个（开发环境）或三个（生产环境）配置服务器。始终建议在生产环境中运行三个配置服务器，因为丢失配置服务器将意味着你无法再确定分片数据的哪些部分在哪些分片上！\n\
  \n##### 物理部署考虑\n\n乍一看，实现一个依赖分片的解决方案似乎需要很多服务器！但是，你可以将创建分片设置所需的不同服务的多个实例共同托管在相对较少的物理服务器上（类似于你在第\
  \ 11 章复制中所见），但你将需要实现严格的资源管理，以避免 MongoDB 进程相互竞争诸如 RAM 等资源。图 12-3 展示了一个完全冗余的分片系统，它使用副本集作为分片存储和配置服务器，以及一组\
  \ `mongos` 来管理集群。它还展示了如何将这些服务浓缩到仅三台物理服务器上运行。\n\n![A978-1-4302-5822-3_12_Fig3_HTML.jpg](img/A978-1-4302-5822-3_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 一个冗余的分片配置\n\n仔细放置分片存储实例，使其在物理服务器中正确分布，使你能够确保系统能够容忍集群中一台或多台服务器的故障。这反映了\
  \ RAID 磁盘控制器用来在多个驱动器中条带化分布数据的方法，使 RAID 配置能够从驱动器故障中恢复。\n\n\n## 设置分片配置\n\n要有效使用分片功能，理解其工作原理至关重要。下一个示例将引导您在单台机器上设置一个测试配置。您将按照图\
  \ 12-2 所示的简单分片系统配置此示例，但有两点不同：为简化起见，本示例仅使用两个分片，并且这些分片是单个`mongod`实例而非完整的副本集。最后，您将学习如何创建一个分片集合以及一个简单的\
  \ PHP 测试程序，用于演示如何使用该集合。\n\n在此测试配置中，您将使用表 12-1 中列出的服务。\n\n表 12-1. 测试配置中的服务器实例\n\n\
  | 服务 | 守护进程 | 端口 | 数据库路径 |\n| --- | --- | --- | --- |\n| 分片控制器 | `mongos` | 27021\
  \ | 不适用 |\n| 配置服务器 | `mongod` | 27022 | `/db/config/data` |\n| 分片 0 | `mongod` |\
  \ 27023 | `/db/shard1/data` |\n| 分片 1 | `mongod` | 27024 | `/db/shard2/data` |\n\
  \n让我们从设置配置服务器开始。为此，打开一个新的终端窗口并键入以下代码：\n\n```bash\n$ mkdir -p /db/config/data\n$\
  \ mongod --port 27022 --dbpath /db/config/data --configsvr\n```\n\n请确保在配置服务器启动并运行后保持终端窗口打开，或者您也可以在命令中添加`--fork`和`--logpath`选项。接下来，您需要设置分片控制器（`mongos`）。为此，打开一个新的终端窗口并键入：\n\
  \n```bash\n$ mongos --configdb localhost:27022 --port 27021 --chunkSize 1\n```\n\
  \n这将启动分片控制器，它应该会宣布正在监听端口 27021。如果您查看配置服务器的终端窗口，应该能看到分片服务器已连接到其配置服务器并在其中注册了自身。\n\n\
  在此示例中，您将块大小设置为最小的可能值 1MB。这在现实系统中不是一个实用值，因为它意味着块存储大小小于文档的最大大小（16MB）。然而，这只是一个演示，较小的块大小允许您创建大量块来测试分片设置，而无需加载大量数据。默认情况下，`chunkSize`设置为\
  \ 64MB，除非另有指定。\n\n最后，您已准备好启动两个分片服务器。为此，您需要两个新的终端窗口，每个服务器一个。在一个窗口中键入以下命令以启动第一个服务器：\n\
  \n```bash\n$ mkdir -p /db/shard0/data\n$ mongod --port 27023 --dbpath /db/shard0/data\n\
  ```\n\n在第二个窗口中键入以下命令以启动第二个服务器：\n\n```bash\n$ mkdir -p /db/shard1/data\n$ mongod\
  \ --port 27024 --dbpath /db/shard1/data\n```\n\n您的服务器现已启动并运行。接下来，您需要告诉分片系统分片服务器的位置。为此，您需要使用服务器的主机名连接到分片控制器（`mongos`）。您可以使用`localhost`，但这会将集群的可伸缩性限制在此单台机器上。在运行后续示例时，您应将`<hostname>`标签替换为您自己的主机名。重要的是要记住，尽管`mongos`不是完整的\
  \ MongoDB 实例，但对于您的应用程序来说，它看起来像是一个完整的实例。因此，您可以直接使用`mongo`命令行连接到分片控制器并添加您的两个分片，如下所示：\n\
  \n```bash\n$ mongo <hostname>:27021\n> sh.addShard(\"<hostname>:27023\")\n{ \"shardAdded\"\
  \ : \"shard0000\", \"ok\" : 1 }\n> sh.addShard(\"<hostname>:27024\")\n{ \"shardAdded\"\
  \ : \"shard0001\", \"ok\" : 1 }\n```\n\n您的两个分片服务器现已激活；接下来，您需要使用`listshards`命令检查分片：\n\
  \n```bash\n> db.printShardingStatus();\n--- Sharding Status ---\nsharding version:\
  \ {\n    \"_id\" : 1,\n    \"version\" : 3,\n    \"minCompatibleVersion\" : 3,\n\
  \    \"currentVersion\" : 4,\n    \"clusterId\" : ObjectId(\"5240282df4ee9323185c70b2\"\
  )\n}\nshards:\n    { \"_id\" : \"shard0000\", \"host\" : \"<hostname>:27023\" }\n\
  \    { \"_id\" : \"shard0001\", \"host\" : \"<hostname>:27024\" }\ndatabases:\n\
  \    { \"_id\" : \"admin\", \"partitioned\" : false, \"primary\" : \"config\" }\n\
  \    { \"_id\" : \"test\", \"partitioned\" : false, \"primary\" : \"shard0000\"\
  \ }\n```\n\n您现在拥有一个可工作的分片环境，但没有分片数据；接下来，您将创建一个名为`testdb`的新数据库，然后在此数据库中激活一个名为`testcollection`的集合。您将对这个集合进行分片，因此您需要为此集合指定一个名为`testkey`的字段，用作分片函数：\n\
  \n```bash\n> sh.enableSharding(\"testdb\")\n{ \"ok\" : 1 }\n> sh.shardCollection(\"\
  testdb.testcollection\", {testkey : 1})\n{ \"collectionsharded\" : \"testdb.testcollection\"\
  , \"ok\" : 1 }\n```\n\n至此，您已创建了一个包含两个分片存储服务器的分片集群。您还在其上创建了一个带有分片集合的数据库。一个没有存储任何数据的服务器对任何人都没有用处，因此是时候向此集合中加载一些数据，以便您可以看到分片是如何分布的。\n\
  \n为此，您将使用一个小型 PHP 程序向分片集合加载一些数据。您将加载的数据包含一个名为`testkey`的字段。此字段包含一个随机数，以及第二个字段，其中包含一段固定的文本（此第二个字段的目的是确保您可以创建合理数量的块来进行分片）。此集合用作一个名为[`TextAndARandomNumber.com`](http://textandarandomnumber.com/)的虚构网站的主要数据表。以下代码创建了一个向您的分片服务器插入数据的\
  \ PHP 程序：\n\n```php\n<?php\n// 打开到 mongos 守护进程的数据库连接\n$mongo = new MongoClient(\"\
  localhost:27021\");\n// 选择 test 数据库\n$db = $mongo->selectDB('testdb');\n// 选择 TestIndex\
  \ 集合\n$collection = $db->testcollection;\n\nfor($i=0; $i < 100000 ; $i++){\n   \
  \ $data=array();\n    $data['testkey'] = rand(1,100000);\n    $data['testtext']\
  \ = \"Because of the nature of MongoDB, many of the more \"\n        . \"traditional\
  \ functions that a DB Administrator \"\n        . \"would perform are not required.\
  \ Creating new databases, \"\n        . \"collections and new fields on the server\
  \ are no longer necessary, \"\n        . \"as MongoDB will create these elements\
  \ on-the-fly as you access them.\"\n        . \"Therefore, for the vast majority\
  \ of cases managing databases and \"\n        . \"schemas is not required.\";\n\
  \    $collection->insert($data);\n}\n```\n\n这个小程序将连接到分片控制器（`mongos`）并插入 100,000\
  \ 条记录，每条记录具有随机的`testkey`值和一些用于填充文档的`testtext`。如前所述，此示例文本使得这些文档占据足够数量的块，从而使使用分片机制变得可行。\n\
  \n以下命令运行测试程序：\n\n```bash\n$ php testshard.php\n```\n\n程序运行完成后，您可以使用命令行连接到`mongos`实例并验证数据是否已存储：\n\
  \n```bash\n$ mongo localhost:27021\n> use testdb\n> db.testcollection.count()\n\
  100000\n```\n\n此时，您可以看到服务器已存储了 100,000 条记录。现在您需要连接到每个分片，查看每个分片在`testdb.testcollection`中存储了多少条目。以下代码使您能够连接到第一个分片并查看其中存储了多少来自`testcollection`集合的记录：\n\
  \n```bash\n$ mongo localhost:27023\n> use testdb\n> db.testcollection.count()\n\
  48875\n```\n\n而此代码使您能够连接到第二个分片并查看其中存储了多少来自`testcollection`集合的记录：\n\n```bash\n$ mongo\
  \ localhost:27024\n> use testdb\n> db.testcollection.count()\n51125\n```\n\n注意\n\
  \n\n根据你查看各个分片的具体时间，你可能会看到每个分片中的文档数量有所不同。`mongos`实例最初可能会将所有块都放在一个分片上，但随着时间的推移，它会重新平衡分片集，通过移动块在所有分片之间均匀分布数据。因此，存储在给定分片中的记录数量可能会随时变化。这满足了**“要求\
  \ 1：能够将数据均匀分布到所有分片上。”**\n\n#### 向集群添加新分片\n\n我们假设 [`TextAndARandomNumber.com`](http://textandarandomnumber.com/)\
  \ 的业务正飞速发展。为了满足需求，你决定向集群添加一个新的分片服务器，以进一步分散负载。\n\n添加一个新分片很简单；只需要重复前面描述的步骤。首先，创建新的分片存储服务器，并将其放在端口\
  \ `27025` 上，以避免与你现有的服务器冲突：\n\n```bash\n$ sudo mkdir -p /db/shard2/data\n$ sudo mongod\
  \ --port 27025 --dbpath /db/shard2/data\n```\n\n接下来，你需要将新的分片服务器添加到集群中。通过登录到分片控制器（`mongos`），然后使用管理命令\
  \ `addshard` 来完成此操作：\n\n```bash\n$mongo localhost:27021\n>sh.addShard(\"localhost:27025\"\
  )\n{ \"shardAdded\" : \"shard0002\", \"ok\" : 1 }\n```\n\n此时，你可以运行 `listshards`\
  \ 命令来验证分片是否已添加到集群中。执行此操作会显示一个新的分片服务器（`shard2`）现在出现在 `shards` 数组中：\n\n```bash\n>\
  \ db.printShardingStatus();\n--- Sharding Status ---\n  sharding version: {\n  \
  \    \"_id\" : 1,\n      \"version\" : 3,\n      \"minCompatibleVersion\" : 3,\n\
  \      \"currentVersion\" : 4,\n      \"clusterId\" : ObjectId(\"5240282df4ee9323185c70b2\"\
  )\n  }\n  shards:\n      { \"_id\" : \"shard0000\", \"host\" : \"<hostname>:27023\"\
  \ }\n      { \"_id\" : \"shard0001\", \"host\" : \"<hostname>:27024\" }\n      {\
  \ \"_id\" : \"shard0002\", \"host\" : \"<hostname>:27025\" }\n  databases:\n   \
  \   { \"_id\" : \"admin\", \"partitioned\" : false, \"primary\" : \"config\" }\n\
  \      { \"_id\" : \"test\", \"partitioned\" : false, \"primary\" : \"shard0000\"\
  \ }\n```\n\n如果你登录到你在端口 `27025` 上创建的新分片存储服务器并查看 `testcollection`，你会看到一些有趣的现象：\n\n\
  ```bash\n$mongo localhost:27025\n> use testdb\nswitched to db testdb\n> show collections\n\
  system.indexes\ntestcollection\n> db.testcollection.count()\n4657\n> db.testcollection.count()\n\
  4758\n> db.testcollection.count()\n6268\n```\n\n这表明你的新 `shard2` 存储服务器上 `testcollection`\
  \ 中的项目数量正在缓慢上升。你所看到的是分片系统正在扩展后的集群中重新平衡数据的证据。随着时间的推移，分片系统将从 `shard0` 和 `shard1` 存储服务器迁移块，以在组成集群的三台服务器之间创建均匀的数据分布。这个过程是自动的，即使没有新数据插入到\
  \ `testcollection` 集合中，它也会发生。在这个例子中，`mongos` 分片控制器正在将块移动到新服务器，然后向配置服务器注册它们。\n\n\
  这是选择块大小时需要考虑的因素之一。如果你的 `chunkSize` 值非常大，你将得到不太均匀的跨分片数据分布；反之，`chunkSize` 值越小，数据分布就越均匀。\n\
  \n#### 从集群中移除分片\n\n好景不长，现在我们假设 [`TextAndARandomNumber.com`](http://textandarandomnumber.com/)\
  \ 只是昙花一现，热度已经消退。经过几周的疯狂活动后，网站的流量开始下降，因此你不得不开始寻找降低运行成本的方法——换句话说，那个新的分片服务器必须被移除！\n\
  \n在下一个例子中，你将移除之前添加的分片服务器。要启动此过程，请登录到分片控制器（`mongos`）并发出 `removeShard` 命令：\n\n```bash\n\
  $ mongo localhost:27021\n> use admin\nswitched to db admin\n> db.runCommand({removeShard\
  \ : \"localhost:27025\"})\n{\n    \"msg\" : \"draining started successfully\",\n\
  \    \"state\" : \"started\",\n    \"shard\" : \"shard0002\",\n    \"ok\" : 1\n\
  }\n```\n\n`removeShard` 命令响应一条消息，表明移除过程已开始。它还表明 `mongos` 已开始将目标分片服务器上的块重新定位到集群中的其他分片服务器。此过程被称为**清空**分片。\n\
  \n你可以通过重新发出 `removeShard` 命令来检查清空过程的进度。响应将告诉你还有多少块和数据库需要从该分片清空：\n\n```json\n> db.runCommand({removeShard\
  \ : \"localhost:27025\"})\n{\n    \"msg\" : \"draining ongoing\",\n    \"state\"\
  \ : \"ongoing\",\n    \"remaining\" : {\n        \"chunks\" : NumberLong( 12 ),\n\
  \        \"dbs\" : NumberLong( 0 )\n    },\n    \"ok\" : 1\n}\n```\n\n最终，`removeShard`\
  \ 过程将终止，你将收到一条消息，表明移除过程已完成：\n\n```json\n> db.runCommand({removeShard : \"localhost:27025\"\
  })\n{\n    \"msg\" : \"removeshard completed successfully\",\n    \"state\" : \"\
  completed\",\n    \"shard\" : \"shard0002\",\n    \"ok\" : 1\n}\n```\n\n为了验证 `removeShard`\
  \ 命令是否成功，你可以运行 `listshards` 来确认目标分片服务器已从集群中移除。例如，以下输出显示你之前创建的 `shard2` 服务器不再列在 `shards`\
  \ 数组中：\n\n```json\n>db.runCommand({listshards:1})\n{\n    \"shards\" : [\n     \
  \   {\n            \"_id\" : \"shard0000\",\n            \"host\" : \"localhost:27023\"\
  \n        },\n        {\n            \"_id\" : \"shard0001\",\n            \"host\"\
  \ : \"localhost:27024\"\n        }\n    ],\n    \"ok\" : 1\n}\n```\n\n此时，你可以终止 Shard2\
  \ 的 `mongod` 进程并删除其存储文件，因为它的数据已经迁移回其他服务器。\n\n注意\n\n无需停机即可向集群添加和移除分片的能力，是 MongoDB\
  \ 支持高度可扩展、高可用、大容量数据存储的关键组成部分。这满足了最终要求：**“要求 3：能够在系统运行时添加或移除分片。”**\n\n#### 确定你的连接方式\n\
  \n你的应用程序可以连接到一个标准的非分片数据库（`mongod`），也可以连接到一个分片控制器（`mongos`）。MongoDB 提供了这两种进程；对于除少数用例外的所有情况，数据库和分片控制器的外观和行为完全相同。然而，有时确定你连接到什么类型的系统可能很重要。\n\
  \nMongoDB 提供了 `isdbgrid` 命令，你可以使用它来查询所连接的数据系统，以确定它是否是分片的。以下代码片段展示了如何使用此命令，以及其输出的样子：\n\
  \n```bash\n$mongo\n>use testdb\n>db.runCommand({ isdbgrid : 1});\n{ \"isdbgrid\"\
  \ : 1, \"hostname\" : \"Pixl.local\", \"ok\" : 1 }\n```\n\n响应中包含 `isdbgrid:1` 字段，这告诉你所连接的数据库已启用分片。如果响应是\
  \ `isdbgrid:0`，则表示你连接的是一个非分片数据库。\n\n\n\n##### 列出分片集群的状态\n\nMongoDB 还提供了一个简单的命令来转储分片集群的状态：`printShardingStatus()`。\n\
  \n这个命令能让你深入了解分片系统的内部情况。下面的代码片段展示了如何调用 `printShardingStatus()` 命令，但省略了部分返回的输出内容，以便阅读更清晰：\n\
  \n```\n$mongo localhost:27021\n\n> sh.status();\n--- 分片状态 ---\n  分片版本: {\n    \"\
  _id\" : 1,\n    \"version\" : 3,\n    \"minCompatibleVersion\" : 3,\n    \"currentVersion\"\
  \ : 4,\n    \"clusterId\" : ObjectId(\"51c699a7dd9fc53b6cdc4718\")\n  }\n  分片:\n\
  \    { \"_id\" : \"shard0000\", \"host\" : \"localhost:27023\" }\n    { \"_id\"\
  \ : \"shard0001\", \"host\" : \"localhost:27024\" }\n  数据库:\n    { \"_id\" : \"\
  admin\", \"partitioned\" : false, \"primary\" : \"config\" }\n    { \"_id\" : \"\
  test\", \"partitioned\" : false, \"primary\" : \"shard0000\" }\n    { \"_id\" :\
  \ \"testdb\", \"partitioned\" : true, \"primary\" : \"shard0000\" }\n      testdb.testcollection\n\
  \        分片键: { \"testkey\" : 1 }\n        数据块:\n          shard0000 2\n       \
  \   shard0001 3\n        { \"testkey\" : { \"$minKey\" : 1 } } -->> { \"testkey\"\
  \ : 0 } on : shard0000 时间戳(4, 0)\n        { \"testkey\" : 0 } -->> { \"testkey\"\
  \ : 14860 } on : shard0000 时间戳(3, 1)\n        { \"testkey\" : 14860 } -->> { \"\
  testkey\" : 45477 } on : shard0001 时间戳(4, 1)\n        { \"testkey\" : 45477 } -->>\
  \ { \"testkey\" : 76041 } on : shard0001 时间戳(3, 4)\n        { \"testkey\" : 76041\
  \ } -->> { \"testkey\" : { \"$maxKey\" : 1 } } on : shard0001 时间戳(3, 5)\n```\n\n\
  此输出列出了分片服务器、每个已分片数据库/集合的配置以及分片数据集中的每个数据块。因为你使用了较小的 `chunkSize` 值来模拟更大的分片设置，所以此报告列出了许多数据块。从此列表中可以获取的一个重要信息是与每个数据块关联的分片键范围。输出还显示了特定数据块存储在哪个分片服务器上。你可以使用此命令返回的输出作为工具的基础，来分析分片服务器的键和数据块分布。例如，你可以使用这些数据来确定数据集中是否存在数据聚集现象。\n\
  \n##### 使用副本集实现分片\n\n到目前为止，你看到的示例都依赖于单个 `mongod` 实例来实现每个分片。在第 11 章中，你学习了如何创建副本集，即协同工作的\
  \ `mongod` 实例集群，以提供冗余和故障安全存储。\n\n当向分片集群添加分片时，你可以提供副本集的名称和该副本集某个成员的地址，该分片将被实例化到副本集的每个成员上。Mongos\
  \ 将跟踪哪个实例是副本集的主服务器；它还将确保所有分片写入都指向该实例。\n\n结合分片和副本集使你能够创建高性能、高可靠性的集群，能够容忍多机故障。它还能让你最大化廉价商用硬件的性能和可用性。\n\
  \n注意\n\n能够使用副本集作为分片的存储机制满足了“需求 2：以容错方式存储分片数据的能力。”\n\n##### 平衡器\n\n我们之前讨论过 MongoDB\
  \ 如何自动在集群的所有分片中保持你的工作负载分布。虽然你可能认为这是通过某种专利的 MongoDB 魔法完成的，但事实并非如此。你的 MongoS 进程内部有一个称为平衡器的组件，它在集群内移动逻辑数据块，以确保它们在所有分片之间均匀分布。平衡器与分片通信，并指示它们将数据从一个分片迁移到另一个分片。你可以在下面的\
  \ `sh.status()` 输出中看到数据块的分布情况。你可以看到我的数据被分区，`shard0000` 上有两个数据块，`shard0001` 上有三个。\n\
  \n```\n{ \"_id\" : \"testdb\", \"partitioned\" : true, \"primary\" : \"shard0000\"\
  \ }\ntestdb.testcollection\n分片键: { \"testkey\" : 1 }\n数据块:\n  shard0000 2\n  shard0001\
  \ 3\n```\n\n虽然平衡器自动代表你完成所有这些工作，但你确实可以控制它何时运行。你可以按需停止和启动平衡器，并设置它可以运行的时间窗口。要停止平衡器，你需要连接到\
  \ MongoS 并发出 `sh.stopBalancer()` 命令：\n\n```\n> sh.stopBalancer();\n等待活跃主机...\n等待平衡器锁...\n\
  平衡器关闭后再次等待活跃主机...\n```\n\n如你所见，平衡器现已关闭；该命令已将平衡器状态设置为 `off`，并等待确认平衡器已完成所有正在运行的迁移。启动平衡器是相同的过程；我们运行\
  \ `sh.startBalancer()` 命令：\n\n```\n> sh.startBalancer();\n```\n\n现在，这两个命令都需要一些时间才能完成并返回，因为它们都需要等待确认平衡器已启动并实际运行。如果你遇到问题或希望手动确认状态，可以执行以下检查。首先，你可以检查平衡器标志的设置。这是作为平衡器开关的文档，位于配置数据库中。\n\
  \n```\n> use config\n切换至数据库 config\n> db.settings.find({_id:\"balancer\"})\n{ \"\
  _id\" : \"balancer\", \"stopped\" : true }\n```\n\n现在你可以看到，这里 `_id` 值为 `balancer`\
  \ 的文档被设置为 `stopped : true`，这意味着平衡器未运行（已停止）。然而，这并不意味着没有迁移正在运行；要确认这一点，我们需要查看“平衡器锁”。\n\
  \n平衡器锁的存在是为了确保在给定时间只有一个平衡器可以执行平衡操作。你可以使用以下命令找到平衡器锁：\n\n```\n> use config\n切换至数据库\
  \ config\n> db.locks.find({_id:\"balancer\"});\n{ \"_id\" : \"balancer\", \"process\"\
  \ : \"Pixl.local:40000:1372325678:16807\", \"state\" : 0, \"ts\" : ObjectId(\"51cc11c57ce3f0ee9684caff\"\
  ), \"when\" : ISODate(\"2013-06-27T10:19:49.820Z\"), \"who\" : \"Pixl.local:40000:1372325678:16807:Balancer:282475249\"\
  , \"why\" : \"doing balance round\" }\n```\n\n你可以看到，这是一个比设置文档复杂得多的文档。然而，最重要的内容是\
  \ `state` 条目，它指示锁是否被占用，0 表示“空闲”或“未占用”，其他任何值都表示“使用中”。你还应该注意时间戳，它显示了锁被占用的时间。将刚刚显示的“空闲”锁与接下来的“已占用”锁进行比较，后者显示平衡器处于活动状态。\n\
  \n```\n> db.locks.find({_id:\"balancer\"});\n{ \"_id\" : \"balancer\", \"process\"\
  \ : \"Pixl.local:40000:1372325678:16807\", \"state\" : 1, \"ts\" : ObjectId(\"51cc11cc7ce3f0ee9684cb00\"\
  ), \"when\" : ISODate(\"2013-06-27T10:19:56.307Z\"), \"who\" : \"Pixl.local:40000:1372325678:16807:Balancer:282475249\"\
  , \"why\" : \"doing balance round\" }\n```\n\n\n\n## 设置平衡器窗口\n\n现在，你知道了如何启动和停止平衡器，以及如何检查平衡器在给定时间点的运行状态。你还需要能够设置平衡器处于活动状态的时间窗口。举个例子，让我们将平衡器设置为在晚上\
  \ 8 点到早上 6 点之间运行，这样它就可以在集群（假设）不太活跃的夜间运行。为此，我们更新之前的平衡器设置文档，因为它控制着平衡器是否运行。操作如下所示：\n\
  \n```\n> use config\nswitched to db config\n> db.settings.update({_id:\"balancer\"\
  }, { $set : { activeWindow : { start : \"20:00\", stop : \"6:00\" } } })\n```\n\n\
  这样就完成了；你的平衡器文档现在将包含一个 `activeWindow`，它将在晚上 8 点启动平衡器，在早上 6 点停止它。现在，你应该能够启动和停止平衡器、确认其状态以及上次运行的时间，并最终设置一个平衡器处于活动状态的时间窗口。\n\
  \n#### 哈希分片键\n\n之前我们讨论了选择正确的分片键是多么重要。如果你选错了分片键，可能会导致各种性能问题。例如，以 `_id`（一个不断增长的值）作为分片键。你执行的每次插入都会被发送到你集群中当前拥有最高\
  \ `_id` 值的分片。由于每个新插入的都是已插入的“最大”值，你将始终将数据插入到同一个地方。这意味着你的集群中将有一个“热点”分片，它接收所有插入操作，并且所有文档都在从它迁移到其他分片——这非常低效。\n\
  \n为了解决这个问题，MongoDB 2.4 引入了一个新功能——哈希分片键！哈希分片键会对给定字段的每个值创建一个哈希值，然后使用这些哈希值来执行块分割和分片操作。这允许你获取像\
  \ `_id` 字段这样递增的值，并为每个给定的 `_id` 值生成一个哈希值，从而赋予值随机性。增加这种随机性通常应该允许你将写入均匀分布到所有分片。然而，代价是你的读取也将是随机的，如果你需要对一系列文档执行操作，这可能会导致性能下降。因此，在某些工作负载下，与用户选择的分片键相比，哈希分片的效率可能较低。\n\
  \n> **注意**\n>\n> 由于哈希实现的方式，当你在浮点数（十进制数）上进行分片时存在一些限制，这意味着像 2.3、2.4 和 2.9 这样的值将成为相同的哈希值。\n\
  \n因此，要创建一个哈希分片，我们只需运行 `shardCollection` 并创建一个 `\"hashed\"` 索引！\n\n```\nsh.shardCollection(\
  \ \"testdb.testhashed\", { _id: \"hashed\" } )\n```\n\n就是这样！你现在已经创建了一个哈希分片键，它将对传入的\
  \ `_id` 值进行哈希处理，以便以更“随机”的方式分布你的数据。现在，考虑到这一点，你们中的一些人可能会问——为什么不总是使用哈希分片键呢？\n\n问得好；答案是分片只是一门“深奥”的学问。最佳分片键是允许你的写入在多个分片上良好分布，从而使写入能够有效并行的键。它也是一个允许你进行分组，使写入只流向一个或有限数量分片的键，并且它必须允许你更有效地利用各个分片上维护的索引。所有这些因素都将由你的用例、你存储的内容以及你如何检索它来决定。\n\
  \n## 标签分片\n\n有时，在某些情况下，说“我希望所有这些数据都在这个分片上”是合理的。这就是 MongoDB 的标签分片大放异彩的地方。你可以设置标签，以便根据分片键的给定值将其定向到集群中的特定分片！这个过程的第一步是弄清楚你想通过标签设置实现什么目标。在下一个示例中，我们将演练一个简单的设置，其中我们希望数据根据地理位置分布，一个位置在美国，另一个在欧盟。\n\
  \n这个过程的第一步是向我们现有的分片添加一些新标签。我们使用 `sh.addShardTag` 函数来完成，只需添加分片的名称和我们希望赋予它的标签。在这个例子中，我将\
  \ `shard0000` 设为美国分片，`shard0001` 设为欧盟分片：\n\n```\n> sh.addShardTag(\"shard0000\"\
  ,\"US\");\n> sh.addShardTag(\"shard0001\",\"EU\");\n```\n\n现在，为了查看这些更改，我们可以运行 `sh.status()`\
  \ 命令并检查输出：\n\n```\n> sh.status();\n--- Sharding Status ---\n  sharding version:\
  \ {\n        \"_id\" : 1,\n        \"version\" : 3,\n        \"minCompatibleVersion\"\
  \ : 3,\n        \"currentVersion\" : 4,\n        \"clusterId\" : ObjectId(\"51c699a7dd9fc53b6cdc4718\"\
  )\n  }\n  shards:\n        { \"_id\" : \"shard0000\", \"host\" : \"localhost:27023\"\
  , \"tags\" : [ \"US\" ] }\n        { \"_id\" : \"shard0001\", \"host\" : \"localhost:27024\"\
  , \"tags\" : [ \"EU\" ] }\n...\n```\n\n如你所见，我们的分片名称现在有了美国和欧盟标签，但仅靠这些还不会起作用；我们需要告诉\
  \ MongoS 根据某些规则将给定集合的数据路由到这些分片。棘手的部分就在这里；我们需要配置我们的分片，使得我们进行分片的数据包含一些可以用来执行规则评估的内容，以便正确路由它们。除此之外，我们仍然希望保持与之前相同的分布逻辑。如果你还记得之前关于块如何分解的讨论，你会看到在大多数情况下，我们只需要让这种按区域的分解“提前”发生。\n\
  \n这里的解决方案是在我们的分片键中添加一个额外的键，表示数据所属的区域，并将其作为分片键的第一个元素。所以，现在我们需要对一个新集合进行分片，以添加这些标签：\n\
  \n```\n> sh.shardCollection(\"testdb.testtagsharding\", {region:1, testkey:1})\n\
  { \"collectionsharded\" : \"testdb.testtagsharding\", \"ok\" : 1 }\n```\n\n> **注意**\n\
  >\n> 虽然键的标签部分不一定是第一个元素，但通常最好是；这样，块会首先按标签进行分解。\n\n至此，我们已经设置了标签，拥有了会将块分解为良好区域部分的分片键，现在我们需要的就是规则了！为了添加这些规则，我们使用\
  \ `sh.addTagRange` 命令。此命令接收我们集合的命名空间，以及最小值和最大值范围，以及该数据应被发送到的标签。MongoDB 的标签范围是包含最小值、排除最大值的。因此，如果我们希望任何具有\
  \ EU 值的数据被发送到标签 EU，我们需要一个从 EU 到 EV 的范围。而对于美国，我们希望一个从 US 到 UT 的范围。这给我们以下命令：\n\n```\n\
  > sh.addTagRange(\"testdb.testtagsharding\", {region:\"EU\"}, {region:\"EV\"}, \"\
  EU\")\n> sh.addTagRange(\"testdb.testtagsharding\", {region:\"US\"}, {region:\"\
  UT\"}, \"US\")\n```\n\n从现在起，任何匹配这些条件的文档都将被发送到这些分片。那么让我们引入一些文档来测试一下。我写了一个短循环，向集群中插入\
  \ 10,000 个匹配我们分片键的文档。\n\n```\nfor(i=0;i<10000;i++){db.getSiblingDB(\"testdb\").testtagsharding.insert({region:\"\
  EU\",testkey:i})}\n```\n\n现在我们运行 `sh.status()`，可以看到分片块的分布情况：\n\n```\ntestdb.testtagsharding\n\
  \        shard key: { \"region\" : 1, \"testkey\" : 1 }\n        chunks:\n     \
  \           shard0000   3\n        { \"region\" : { \"$minKey\" : 1 }, \"testkey\"\
  \ : { \"$minKey\" : 1 } } -->> { \"region\" : \"EU\", \"testkey\" : { \"$minKey\"\
  \ : 1 } } on : shard0000 Timestamp(1, 3)\n```\n\n\n\n#### 摘要\n\n`{ \"region\" :\
  \ \"EU\", \"testkey\" : { \"$minKey\" : 1 } } -->> { \"region\" : \"EU\", \"testkey\"\
  \ : 0 }` 位于：`shard0000` 时间戳(1, 4)\n\n`{ \"region\" : \"EU\", \"testkey\" : 0 } -->>\
  \ { \"region\" : { \"$maxKey\" : 1 }, \"testkey\" : { \"$maxKey\" : 1 } }` 位于：`shard0000`\
  \ 时间戳(1, 2)\n\n`标签: 欧盟 { \"region\" : \"EU\" } -->> { \"region\" : \"EV\" }`\n\n\
  `标签: 美国 { \"region\" : \"US\" } -->> { \"region\" : \"UT\" }`\n\n由此我们可以看到数据块的分布情况；欧盟分片上有三个数据块，而美国分片上没有。从范围来看，这些数据块中有两个应该是空的。如果你登录到各个分片服务器，你会发现我们插入的\
  \ 10,000 个文档全部只存储在一个分片上。你可能在日志文件中注意到了以下消息：\n```\nSun Jun 30 12:11:16.549 [Balancer]\
  \ chunk { _id: \"testdb.testtagsharding-region_\"EU\"testkey_MinKey\", lastmod:\
  \ Timestamp 1000|2, lastmodEpoch: ObjectId('51cf7c240a2cd2040f766e38'), ns: \"testdb.testtagsharding\"\
  , min: { region: \"EU\", testkey: MinKey }, max: { region: MaxKey, testkey: MaxKey\
  \ }, shard: \"shard0000\" } is not on a shard with the right tag: EU\n\nSun Jun\
  \ 30 12:11:16.549 [Balancer] going to move to: shard0001\n```\n出现这条消息是因为我们设置的标签范围仅适用于欧盟和美国的值。根据我们现在所了解的情况，我们可以稍作调整，使其覆盖所有标签范围。让我们删除那些旧的标签范围并添加新的；可以使用以下命令删除旧的文档：\n\
  ```\n> use config\n\n> db.tags.remove({ns:\"testdb.testtagsharding\"});\n```\n现在我们可以重新添加标签，但这次范围可以从\
  \ `minKey` 到 `US`，再从 `US` 到 `maxKey`，就像前一个示例中的数据块范围一样！为此，请使用特殊的 `MinKey` 和 `MaxKey`\
  \ 操作符，它们分别代表分片键范围的最小值和最大值。\n```\n> sh.addTagRange(\"testdb.testtagsharding\", {region:MinKey},\
  \ {region:\"US\"}, \"EU\")\n\n> sh.addTagRange(\"testdb.testtagsharding\", {region:\"\
  US\"}, {region:MaxKey}, \"US\")\n```\n现在如果我们再次运行 `sh.status()`，可以看到范围；这一次，情况看起来运行得更好了：\n\
  ```\ntestdb.testtagsharding\n\nshard key: { \"region\" : 1, \"testkey\" : 1 }\n\n\
  chunks:\n\nshard0001 3\n\nshard0000 1\n\n{ \"region\" : { \"$minKey\" : 1 }, \"\
  testkey\" : { \"$minKey\" : 1 } } -->> { \"region\" : \"EU\", \"testkey\" : { \"\
  $minKey\" : 1 } } on : shard0001 Timestamp(4, 0)\n\n{ \"region\" : \"EU\", \"testkey\"\
  \ : { \"$minKey\" : 1 } } -->> { \"region\" : \"EU\", \"testkey\" : 0 } on : shard0001\
  \ Timestamp(2, 0)\n\n{ \"region\" : \"EU\", \"testkey\" : 0 } -->> { \"region\"\
  \ : \"US\", \"testkey\" : { \"$minKey\" : 1 } } on : shard0001 Timestamp(3, 0)\n\
  \n{ \"region\" : \"US\", \"testkey\" : { \"$minKey\" : 1 } } -->> { \"region\" :\
  \ { \"$maxKey\" : 1 }, \"testkey\" : { \"$maxKey\" : 1 } } on : shard0000 Timestamp(4,\
  \ 1)\n\ntag: EU { \"region\" : { \"$minKey\" : 1 } } -->> { \"region\" : \"US\"\
  \ }\n\ntag: US { \"region\" : \"US\" } -->> { \"region\" : { \"$maxKey\" : 1 } }\n\
  ```\n我们的数据分布得更合理了，所涉及的范围也覆盖了从最小值到最大值的整个分片键区间。如果我们进一步向集合中插入数据，它们将被正确地路由到我们期望的分片。干净利落，毫不拖沓。\n\
  \n分片使您能够扩展数据存储以处理极大规模的数据集。它还能让集群随着系统增长而扩展。MongoDB 提供了简单、自动化的分片配置，能够满足大多数需求。尽管这个过程是自动化的，您仍然可以微调其特性以支持您的特定需求。分片是\
  \ MongoDB 区别于其他数据存储技术的关键特性之一。通过本章的学习，您应该理解如何将数据分片到多个 MongoDB 实例上，如何管理和维护分片集群，以及如何利用标签分片和哈希分片键。我们希望本书能帮助您了解\
  \ MongoDB 在诸多方面是如何设计来更好地应对现代 Web 应用程序的严苛要求，而这是使用更传统的数据库工具难以做到的。\n\n您在本书中学到的主题包括以下内容。\n\
  \n*   如何在各种平台上安装和配置 MongoDB。\n*   如何从不同的开发语言访问 MongoDB。\n*   如何与围绕该产品的社区联系，包括如何获得帮助和建议。\n\
  *   如何设计并构建利用 MongoDB 独特优势的应用程序。\n*   如何优化、管理和排查基于 MongoDB 的数据存储的问题。\n*   如何创建可跨多个服务器的可扩展、容错安装。\n\
  \n强烈建议您探索本书中提供的众多示例。其他 PHP 示例可以在位于 [`www.php.net/manual/en/book.mongo.php`](http://www.php.net/manual/en/book.mongo.php)\
  \ 的 PHP MongoDB 驱动文档中找到。MongoDB 是一款极易上手的工具，其简便的安装和操作鼓励人们进行实验。所以不要犹豫：启动它，开始玩转它！很快，您也会开始体会到这款引人入胜的产品为您的应用程序开启的所有可能性。\n\
